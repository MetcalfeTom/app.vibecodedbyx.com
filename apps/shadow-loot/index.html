<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shadow-Loot · paladin vs shadow</title>
<meta name="description" content="Descend the crypt as the last paladin. Loot the shadow-touched dead. Forge holy gear at the chapel. A short, moody Gothic RPG.">
<meta property="og:title" content="Shadow-Loot · Paladin vs Shadow">
<meta property="og:description" content="The last paladin descends the shadow-crypt. Loot the shadow-touched. Craft blessed steel. UnifrakturCook fonts, candlelight, regret.">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Dark%20gothic%20crypt%20interior%20with%20candles%2C%20stone%20gargoyles%2C%20a%20rusted%20sword%2C%20velvet%20shadows%2C%20editorial%20moody%20deep%20charcoal%20and%20blood%20red?width=1200&height=630&model=flux&nologo=true&seed=666">
<meta property="og:url" content="https://sloppy.live/shadow-loot">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/💀">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cormorant+Garamond:ital,wght@0,500;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:     #0a0608;
    --stone-1:  #1a1414;
    --stone-2:  #2a1f1c;
    --stone-3:  #3a2f2a;
    --candle:   #f5c026;
    --candle-2: #d68c1a;
    --bone:     #e8dcc4;
    --bone-2:   #b8a888;
    --blood:    #9a1a1e;
    --blood-2:  #c43d33;
    --moon:     #b8c8e0;
    --ghost:    #88c0d0;
    --rust:     #c97746;
    --ink:      #2a1f1c;
    /* tier colors */
    --t-broken:    #6a5a4a;
    --t-common:    #b8a888;
    --t-fine:      #6cb7e8;
    --t-master:    #b870ff;
    --t-legend:    #f5c026;
    --t-cursed:    #9a1a1e;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{ background: #000; color: var(--bone); height: 100vh; overflow: hidden; }
  body{
    font-family: 'IM Fell English', 'Cormorant Garamond', serif;
    display: flex; flex-direction: column;
    background:
      radial-gradient(ellipse 50% 40% at 50% 20%, rgba(245,192,38,0.05), transparent 70%),
      radial-gradient(ellipse 40% 30% at 50% 90%, rgba(154,26,30,0.06), transparent 70%),
      var(--void);
    background-attachment: fixed;
  }
  /* Heavy paper grain overlay */
  body::before{
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(7deg, rgba(120,80,60,0.02) 0 1px, transparent 1px 4px),
      repeating-linear-gradient(97deg, rgba(120,80,60,0.02) 0 1px, transparent 1px 6px);
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: screen;
  }
  /* Flickering candle vignette */
  body::after{
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 70% at 50% 50%, transparent 30%, rgba(0,0,0,0.55) 80%);
    pointer-events: none;
    z-index: 2;
    animation: flicker 4.2s ease-in-out infinite;
  }
  @keyframes flicker{
    0%, 100%{ opacity: 1; }
    20%, 60%{ opacity: 0.86; }
    40%, 80%{ opacity: 0.94; }
  }
  /* ── Top bar ────────────────────────────────────────── */
  .top{
    z-index: 5;
    background: linear-gradient(180deg, #1a1010 0%, #0a0608 100%);
    border-bottom: 2px solid #4a2a2a;
    padding: 10px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    box-shadow: 0 2px 0 #2a1818, 0 6px 16px rgba(0,0,0,0.7);
  }
  .top h1{
    font-family: 'UnifrakturCook', serif;
    font-size: clamp(24px, 3vw, 34px);
    color: var(--blood-2);
    line-height: 1;
    letter-spacing: 0.02em;
    text-shadow: 0 0 12px rgba(154,26,30,0.6), 2px 2px 0 #000;
  }
  .top h1 em{
    color: var(--bone);
    font-style: italic;
    font-family: 'IM Fell English', serif;
    font-size: 0.55em;
    font-weight: 400;
    margin-left: 8px;
    letter-spacing: 0.06em;
  }
  .hp-block{
    display: flex; align-items: center; gap: 12px;
  }
  .hp-bar{
    flex: 1;
    height: 22px;
    background: rgba(0,0,0,0.65);
    border: 1px solid var(--blood);
    box-shadow: inset 0 0 12px rgba(154,26,30,0.4);
    position: relative;
    overflow: hidden;
    max-width: 360px;
  }
  .hp-fill{
    height: 100%;
    background: linear-gradient(90deg, var(--blood), var(--blood-2));
    transition: width 0.32s cubic-bezier(0.25,0.95,0.4,1);
    box-shadow: 0 0 16px var(--blood);
  }
  .hp-label{
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font: 700 13px 'JetBrains Mono', monospace;
    color: var(--bone);
    text-shadow: 1px 1px 0 #000;
    letter-spacing: 0.06em;
  }
  .stat-row{
    display: flex; gap: 14px;
    font-family: 'IM Fell English SC', serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--bone-2);
  }
  .stat-row b{
    color: var(--bone);
    font-family: 'UnifrakturCook', serif;
    font-size: 18px;
    margin-left: 4px;
    text-shadow: 0 0 6px rgba(245,192,38,0.3);
  }
  .stat-row .gold b{ color: var(--candle); }
  .stat-row .atk b{ color: var(--blood-2); }
  .stat-row .def b{ color: var(--ghost); }

  /* ── Main layout ───────────────────────────────────── */
  .main{
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    min-height: 0;
    overflow: hidden;
    z-index: 3;
  }
  /* Left: scene + actions */
  .scene-pane{
    display: flex; flex-direction: column;
    background:
      radial-gradient(ellipse 60% 45% at 50% 35%, rgba(245,192,38,0.07), transparent 70%),
      linear-gradient(180deg, #14100e 0%, #080404 100%);
    overflow-y: auto;
    border-right: 2px solid #3a2424;
    padding: 24px;
    position: relative;
  }
  .scene-art{
    text-align: center;
    margin: 10px 0 16px;
    font-size: clamp(80px, 14vw, 140px);
    line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(154,26,30,0.4)) drop-shadow(0 0 32px rgba(245,192,38,0.18));
    animation: artBreath 5s ease-in-out infinite;
  }
  @keyframes artBreath{
    0%, 100%{ transform: scale(1); }
    50%     { transform: scale(1.03); }
  }
  .scene-title{
    font-family: 'UnifrakturCook', serif;
    font-size: clamp(28px, 4vw, 38px);
    color: var(--bone);
    text-align: center;
    margin-bottom: 4px;
    line-height: 1.1;
    text-shadow: 0 2px 0 #000, 0 0 22px rgba(245,192,38,0.18);
  }
  .scene-depth{
    text-align: center;
    font: italic 12px 'IM Fell English', serif;
    color: var(--bone-2);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .scene-desc{
    background:
      linear-gradient(180deg, rgba(232,220,196,0.04), transparent);
    border-top: 1px solid rgba(120,90,80,0.3);
    border-bottom: 1px solid rgba(120,90,80,0.3);
    padding: 16px 20px;
    font: italic 17px/1.55 'Cormorant Garamond', serif;
    color: var(--bone);
    max-width: 640px;
    margin: 0 auto 18px;
    text-align: center;
  }
  .scene-desc b{ font-style: normal; color: var(--candle); font-family: 'IM Fell English SC', serif; letter-spacing: 0.04em; }
  .scene-desc em{ color: var(--blood-2); font-style: italic; }
  .log{
    max-width: 640px;
    margin: 0 auto 18px;
    font: italic 14px/1.55 'Cormorant Garamond', serif;
    color: var(--bone-2);
    text-align: center;
    min-height: 1.55em;
  }
  .log.bad{ color: var(--blood-2); }
  .log.good{ color: var(--candle); }
  /* Action buttons */
  .actions{
    display: flex; gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 640px;
    margin: 0 auto;
  }
  .btn{
    background: linear-gradient(180deg, #3a2424 0%, #1a1010 100%);
    border: 2px solid var(--bone-2);
    color: var(--bone);
    padding: 10px 22px;
    font: 600 14px 'IM Fell English SC', serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 80ms;
    box-shadow: 0 3px 0 #0a0608, inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
  }
  .btn:hover{
    background: linear-gradient(180deg, #4a3030 0%, #2a1818 100%);
    border-color: var(--candle);
    color: var(--candle);
    text-shadow: 0 0 8px rgba(245,192,38,0.4);
  }
  .btn:active{ transform: translateY(2px); box-shadow: 0 1px 0 #0a0608; }
  .btn:disabled{ opacity: 0.4; cursor: not-allowed; }
  .btn.danger{
    border-color: var(--blood-2);
    color: var(--blood-2);
  }
  .btn.danger:hover{ background: linear-gradient(180deg, #5a2020 0%, #2a0a0a 100%); border-color: #ff5a4a; color: #fff; }
  .btn.gold{
    border-color: var(--candle);
    color: var(--candle);
  }
  .btn.gold:hover{ background: linear-gradient(180deg, #4a3a10 0%, #1a1408 100%); }
  .btn.ghost{ opacity: 0.7; }

  /* ── Right: inventory + equipped ───────────────────── */
  .inv-pane{
    background:
      linear-gradient(180deg, #181210 0%, #0e0808 100%);
    overflow-y: auto;
    padding: 18px 16px;
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .inv-section h3{
    font-family: 'UnifrakturCook', serif;
    font-size: 18px;
    color: var(--candle);
    margin-bottom: 6px;
    border-bottom: 1px solid rgba(245,192,38,0.25);
    padding-bottom: 4px;
    letter-spacing: 0.02em;
    text-shadow: 0 0 8px rgba(245,192,38,0.25);
  }
  .equipped-grid{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 4px;
  }
  .equip-slot{
    background: rgba(40,30,28,0.6);
    border: 1px dashed rgba(184,168,136,0.4);
    padding: 8px 6px;
    text-align: center;
    min-height: 72px;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 80ms, border-color 80ms;
    border-radius: 2px;
  }
  .equip-slot:hover{ background: rgba(245,192,38,0.08); border-color: var(--candle); }
  .equip-slot.empty{ color: var(--bone-2); font-style: italic; }
  .equip-slot .em{ font-size: 32px; line-height: 1; }
  .equip-slot .nm{
    font: 9.5px 'IM Fell English SC', serif;
    letter-spacing: 0.04em;
    color: var(--bone);
    margin-top: 4px;
    text-align: center;
    line-height: 1.1;
  }
  .equip-slot .slot-label{
    font: 9px 'JetBrains Mono', monospace;
    color: var(--bone-2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
    opacity: 0.55;
  }
  .inv-grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    max-height: 40vh;
    overflow-y: auto;
    padding: 2px;
  }
  .inv-cell{
    aspect-ratio: 1;
    background: rgba(40,30,28,0.4);
    border: 1px solid rgba(120,90,80,0.3);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
    border-radius: 2px;
    transition: background 80ms, border-color 80ms;
  }
  .inv-cell:hover{ background: rgba(245,192,38,0.1); border-color: var(--candle); }
  .inv-cell .em{ font-size: 22px; line-height: 1; }
  .inv-cell .qty{
    position: absolute;
    bottom: 1px; right: 3px;
    font: 700 10px 'JetBrains Mono', monospace;
    color: var(--bone);
    text-shadow: 1px 1px 0 #000;
  }
  .inv-cell .tier-mark{
    position: absolute;
    top: 2px; left: 2px;
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .inv-cell.empty{ cursor: default; background: rgba(0,0,0,0.3); }
  .inv-cell.empty:hover{ background: rgba(0,0,0,0.3); border-color: rgba(120,90,80,0.3); }
  .inv-cell .affix-dots{
    position: absolute;
    bottom: 1px; left: 3px;
    font-size: 6px;
    line-height: 1;
    color: var(--candle);
    text-shadow: 0 0 4px var(--candle);
    letter-spacing: -1px;
  }
  .inv-cell.tier-cursed .affix-dots{ color: var(--t-cursed); text-shadow: 0 0 4px var(--t-cursed); }
  .inv-cell.tier-legend .affix-dots{ color: var(--t-legend); text-shadow: 0 0 5px var(--t-legend); }
  .inv-cell .equip-tag{
    position: absolute;
    top: 1px; right: 3px;
    font: 700 9px 'JetBrains Mono', monospace;
    color: var(--candle);
    text-shadow: 0 0 4px var(--candle);
  }
  .inv-cell.is-equipped{ border-color: var(--candle); box-shadow: inset 0 0 0 1px rgba(245,192,38,0.25); }

  /* Item tooltip */
  .item-tip{
    position: absolute;
    background: #0a0608;
    border: 1px solid var(--bone-2);
    padding: 10px 14px;
    width: 240px;
    z-index: 30;
    pointer-events: none;
    box-shadow: 0 6px 24px rgba(0,0,0,0.8), 0 0 0 1px rgba(245,192,38,0.18);
    font-family: 'IM Fell English', serif;
  }
  .item-tip .nm{
    font-family: 'UnifrakturCook', serif;
    font-size: 17px;
    line-height: 1.1;
    margin-bottom: 2px;
  }
  .item-tip .tt{
    font: 10px 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bone-2);
    margin-bottom: 6px;
  }
  .item-tip .desc{
    font-style: italic;
    color: var(--bone-2);
    font-size: 13px;
    line-height: 1.4;
    margin: 6px 0;
  }
  .item-tip .stats{
    font: 12px 'JetBrains Mono', monospace;
    color: var(--bone);
  }
  .item-tip .stats{ display:flex; flex-wrap:wrap; gap:6px 10px; }
  .item-tip .stats .atk{ color: var(--blood-2); }
  .item-tip .stats .def{ color: var(--ghost); }
  .item-tip .stats .heal{ color: var(--candle); }
  .item-tip .stats .curse{ color: #8a2828; font-style:italic; }
  .item-tip .affixes{
    margin-top:8px; padding-top:8px;
    border-top: 1px dashed rgba(213,176,99,0.3);
    display:flex; flex-direction:column; gap:2px;
  }
  .item-tip .affixes .aff{
    font: italic 13px 'IM Fell English', serif;
    color: var(--candle);
    line-height: 1.4;
    letter-spacing: 0.02em;
  }
  .item-tip .affixes .aff.cursed{ color: var(--t-cursed); }

  /* Tier color helpers — applied as border-left + name color */
  .tier-broken{ color: var(--t-broken); }
  .tier-common{ color: var(--t-common); }
  .tier-fine  { color: var(--t-fine); }
  .tier-master{ color: var(--t-master); }
  .tier-legend{ color: var(--t-legend); }
  .tier-cursed{ color: var(--t-cursed); }
  .tier-mark.tier-broken{ background: var(--t-broken); }
  .tier-mark.tier-common{ background: var(--t-common); }
  .tier-mark.tier-fine  { background: var(--t-fine); }
  .tier-mark.tier-master{ background: var(--t-master); box-shadow: 0 0 6px var(--t-master); }
  .tier-mark.tier-legend{ background: var(--t-legend); box-shadow: 0 0 8px var(--t-legend); animation: legendPulse 1.4s ease-in-out infinite alternate; }
  .tier-mark.tier-cursed{ background: var(--t-cursed); box-shadow: 0 0 6px var(--t-cursed); }
  @keyframes legendPulse{
    from{ box-shadow: 0 0 4px var(--t-legend); }
    to  { box-shadow: 0 0 14px var(--t-legend); }
  }

  /* ── Modals: shop / forge / catch ───────────────────── */
  .modal-back{
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .modal-back.show{ display: flex; }
  .modal{
    background: linear-gradient(180deg, #1a1410 0%, #0a0608 100%);
    border: 2px solid var(--bone-2);
    padding: 24px 28px;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.9), inset 0 0 0 1px rgba(245,192,38,0.18);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2{
    font-family: 'UnifrakturCook', serif;
    font-size: 28px;
    color: var(--candle);
    margin-bottom: 4px;
    text-shadow: 0 0 14px rgba(245,192,38,0.4);
  }
  .modal .sub{
    font: italic 14px 'Cormorant Garamond', serif;
    color: var(--bone-2);
    margin-bottom: 16px;
  }
  .modal .close-btn{
    margin-top: 14px;
    width: 100%;
    background: #2a1818;
    border: 2px solid var(--blood-2);
    color: var(--bone);
    padding: 10px;
    font: 600 13px 'IM Fell English SC', serif;
    letter-spacing: 0.12em;
    cursor: pointer;
    text-transform: uppercase;
  }
  .modal .close-btn:hover{ background: var(--blood); color: #fff; }

  /* Forge recipe row */
  .recipe-row{
    border: 1px solid rgba(120,90,80,0.3);
    padding: 10px 12px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.4);
  }
  .recipe-row .info .name{
    font-family: 'UnifrakturCook', serif;
    font-size: 18px;
    margin-bottom: 2px;
  }
  .recipe-row .info .ingredients{
    font: 12px 'JetBrains Mono', monospace;
    color: var(--bone-2);
  }
  .recipe-row .info .ingredients .ok{ color: var(--candle); }
  .recipe-row .info .ingredients .no{ color: var(--blood-2); text-decoration: line-through; }
  .recipe-row .info .flavor{
    font: italic 12px 'Cormorant Garamond', serif;
    color: var(--bone-2);
    margin-top: 4px;
  }
  .recipe-row .craft-btn{
    background: #2a1818;
    border: 2px solid var(--candle);
    color: var(--candle);
    padding: 8px 16px;
    font: 600 12px 'IM Fell English SC', serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .recipe-row .craft-btn:hover{ background: var(--candle); color: var(--ink); }
  .recipe-row .craft-btn:disabled{ opacity: 0.35; cursor: not-allowed; }
  /* Skill tree */
  .skill-tree{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 10px;
  }
  .skill-branch{
    display: flex; flex-direction: column;
    gap: 6px;
    padding: 10px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(120,90,80,0.4);
  }
  .skill-branch h3{
    font-family: 'UnifrakturCook', serif;
    font-size: 18px;
    text-align: center;
    margin-bottom: 4px;
    text-shadow: 0 0 8px currentColor;
  }
  .skill-branch.faith   h3{ color: var(--candle); }
  .skill-branch.steel   h3{ color: var(--blood-2); }
  .skill-branch.bulwark h3{ color: var(--ghost); }
  .skill-branch .skill-tier{
    background: rgba(40,30,28,0.6);
    border: 1px dashed rgba(184,168,136,0.3);
    padding: 8px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 80ms;
  }
  .skill-branch .skill-tier:hover:not(.unlocked):not(.locked){
    background: rgba(245,192,38,0.12);
    border-color: var(--candle);
  }
  .skill-branch .skill-tier.unlocked{
    background: rgba(245,192,38,0.18);
    border-style: solid;
    border-color: var(--candle);
    cursor: default;
  }
  .skill-branch .skill-tier.locked{ opacity: 0.4; cursor: not-allowed; }
  .skill-branch .skill-tier .ic{ font-size: 22px; line-height: 1; }
  .skill-branch .skill-tier .nm{
    font-family: 'IM Fell English SC', serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    margin: 4px 0 2px;
    color: var(--bone);
  }
  .skill-branch .skill-tier .ef{
    font: italic 11px 'Cormorant Garamond', serif;
    color: var(--bone-2);
    line-height: 1.3;
  }
  .skill-branch .skill-tier.unlocked .nm{ color: var(--candle); }
  .skill-branch .skill-tier .cost{
    font: 700 10px 'JetBrains Mono', monospace;
    color: var(--candle);
    margin-top: 4px;
  }

  /* Combat panel */
  .combat-pane{

    margin-bottom: 6px;

  }
  .combat-pane .flavor{
    font: italic 13px 'Cormorant Garamond', serif;
    color: var(--bone-2);
    margin-top: 6px;
  }

  /* Damage float */
  .dmg-float{
    position: absolute;
    font: 700 26px 'UnifrakturCook', serif;
    color: var(--blood-2);
    text-shadow: 0 0 8px rgba(154,26,30,0.6), 2px 2px 0 #000;

    transform: translate(-50%, -50%);
    animation: dmgFloat 1.4s ease-out forwards;
    z-index: 20;
  }

    0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
    20%  { opacity: 1; transform: translate(-50%, -90%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -180%) scale(1); }
  }

  /* Death screen */
  .death-screen{
    position: fixed; inset: 0;
    background: rgba(10,4,6,0.95);
    display: none; align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 80;
    padding: 30px;
    text-align: center;
  }
  .death-screen.show{ display: flex; }
  .death-screen h2{
    font-family: 'UnifrakturCook', serif;
    font-size: 56px;
    color: var(--blood-2);
    text-shadow: 0 0 30px rgba(154,26,30,0.7), 3px 3px 0 #000;
    margin-bottom: 12px;
    animation: deathPulse 2s ease-in-out infinite;
  }
  @keyframes deathPulse{
    0%, 100%{ filter: brightness(1); }
    50%     { filter: brightness(1.4); }
  }
  .death-screen .epitaph{
    font: italic 18px 'Cormorant Garamond', serif;
    color: var(--bone-2);
    max-width: 400px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .death-screen button{
    background: var(--blood);
    border: 2px solid var(--bone);
    color: var(--bone);
    padding: 14px 32px;
    font: 600 14px 'IM Fell English SC', serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .death-screen button:hover{ background: var(--blood-2); }

  /* Stage shake */
  .scene-pane.shaking{ animation: shake 0.24s; }
  @keyframes shake{
    0%, 100%{ transform: translate(0, 0); }
    25%     { transform: translate(-3px, 2px); }
    50%     { transform: translate(3px, -2px); }
    75%     { transform: translate(-2px, -2px); }
  }

  @media (prefers-reduced-motion: reduce){
    .scene-art, body::after, .death-screen h2, .scene-pane.shaking{ animation: none; }
  }
  button:focus-visible{ outline: 2px solid var(--candle); outline-offset: 2px; }

  /* Mobile */
  @media (max-width: 720px){
    .main{ grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .inv-pane{ border-top: 2px solid #3a2424; border-right: none; max-height: 38vh; }

    .equipped-grid{ grid-template-columns: repeat(3, 1fr); }
    .inv-grid{ grid-template-columns: repeat(6, 1fr); max-height: 22vh; }
  }
</style>

    hp: 20, maxHp: 20, atk: 3, def: 1, gold: 0,
    depth: 0,
    deepest: 0,
    scene: 'chapel',
    inventory: [],

    skillPoints: 0,
    skills: { faith: 0, steel: 0, bulwark: 0 }, // tiers 0-3 each
    kills: 0,
    _nextUid: 1,
  };
  let loaded = null;
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) loaded = JSON.parse(raw);
  } catch(_){}
  if (loaded){
    Object.assign(def, loaded);
    if (typeof def._nextUid !== 'number') def._nextUid = 1;

        }
      }
    }
    def.inventory = fresh;

    for (const slot of ['weapon','armor','trinket']){
      const v = def.equipped[slot];
      if (typeof v === 'string'){
        const entry = fresh.find(x => x.id === v && x.uid != null);
        def.equipped[slot] = entry ? entry.uid : null;
      } else if (typeof v === 'number'){
        // verify uid still exists
        if (!fresh.find(x => x.uid === v)) def.equipped[slot] = null;
      }
    }
    return def;

    seedRobes,
    { id:'holy_water', qty:2, affixes: [] },
    { id:'garlic_bulb', qty:1, affixes: [] },
  ];
  def.equipped.weapon = seedDagger.uid;
  def.equipped.armor  = seedRobes.uid;
  return def;
})();
function save(){

}
function nextUid(){
  if (typeof player._nextUid !== 'number') player._nextUid = 1;
  return player._nextUid++;
}
function addToInv(id, qty, affixes){
  qty = qty || 1;
  const item = ITEMS[id];
  if (!item) return null;
  const stackable = (item.slot === 'mat' || item.slot === 'cons');
  if (stackable){
    const existing = player.inventory.find(x => x.id === id && (!x.affixes || x.affixes.length === 0));
    if (existing){ existing.qty += qty; return existing; }
    const entry = { id, qty, affixes: [] };
    player.inventory.push(entry);
    return entry;
  }
  // non-stackable: every instance gets its own uid + rolled affixes
  let first = null;
  for (let i = 0; i < qty; i++){
    const a = (i === 0 && affixes) ? affixes : rollAffixes(id);
    const entry = { id, qty: 1, uid: nextUid(), affixes: a };
    player.inventory.push(entry);
    if (!first) first = entry;
  }
  return first;
}
function removeFromInv(id, qty){
  // legacy id-based remove — only for stackables (mats/cons)
  qty = qty || 1;
  const i = player.inventory.findIndex(x => x.id === id && (!x.affixes || x.affixes.length === 0));
  if (i < 0) return false;
  player.inventory[i].qty -= qty;
  if (player.inventory[i].qty <= 0) player.inventory.splice(i, 1);
  return true;
}
function hasInInv(id, qty){
  qty = qty || 1;
  // sum across all matching entries (gear stacks count too for recipe ingredients)
  let total = 0;
  for (const x of player.inventory){
    if (x.id === id) total += (x.qty || 1);
    if (total >= qty) return true;
  }
  return false;
}
function consumeIngredient(id, qty){
  // for forge recipes — eat 'qty' of id across any matching entries (prefer plain/no-affix first)
  qty = qty || 1;
  // sort entries: stackables first, then no-affix gear, then affixed gear (consume affixed last)
  const matches = [];
  player.inventory.forEach((e, idx) => {
    if (e.id !== id) return;
    const score = (e.affixes && e.affixes.length) ? 2 : ((ITEMS[e.id] && (ITEMS[e.id].slot === 'mat' || ITEMS[e.id].slot === 'cons')) ? 0 : 1);
    matches.push({ idx, e, score });
  });
  matches.sort((a, b) => a.score - b.score);
  for (const m of matches){
    if (qty <= 0) break;
    const take = Math.min(qty, m.e.qty);
    m.e.qty -= take;
    qty -= take;
    // if consuming an equipped gear instance, unequip it
    if (m.e.qty <= 0 && m.e.uid != null){
      for (const slot of ['weapon','armor','trinket']){
        if (player.equipped[slot] === m.e.uid) player.equipped[slot] = null;
      }
    }
  }
  // purge spent entries
  player.inventory = player.inventory.filter(x => x.qty > 0);
  return qty === 0;
}
function findEquipped(slot){
  const uid = player.equipped[slot];
  if (uid == null) return null;
  return player.inventory.find(x => x.uid === uid) || null;
}

/* ═══ STATS WITH EQUIPMENT + AFFIXES ═══════════════════ */
function effectiveAtk(){
  let v = player.atk;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    const it = ITEMS[e.id]; if (!it) continue;
    v += (it.atk || 0) + affixBonus(e, 'atk');
  }
  v += (player.skills.steel || 0); // +1 atk per Steel tier
  return Math.max(1, v);
}
function effectiveDef(){
  let v = player.def;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    const it = ITEMS[e.id]; if (!it) continue;
    v += (it.def || 0) + affixBonus(e, 'def');
  }
  v += (player.skills.bulwark || 0); // +1 def per Bulwark tier
  return Math.max(0, v);
}
function effectiveHpRegen(){
  let v = 0;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    const it = ITEMS[e.id]; if (!it) continue;
    v += affixBonus(e, 'hpRegen') + (it.curseHpRegen || 0);
  }
  if (player.skills.bulwark >= 3) v += 1; // Bulwark tier 3 passive regen
  return v;
}
function effectiveHealMul(){
  let v = 1;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    v += affixBonus(e, 'healMul');
  }
  if (player.skills.faith >= 3) v += 0.5; // Faith tier 3: +50% healing
  return v;
}
function effectiveLifesteal(){
  let v = 0;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    v += affixBonus(e, 'lifesteal');
  }
  return v;
}
function effectiveFireDmg(){
  let v = 0;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    v += affixBonus(e, 'fireDmg');
  }
  return v;
}
function effectiveMaxHp(){
  return 20 + (player.skills.faith || 0) * 5; // +5 max HP per Faith tier
}
function recomputeMaxHp(){
  player.maxHp = effectiveMaxHp();
  if (player.hp > player.maxHp) player.hp = player.maxHp;
}
function updateHud(){
  document.getElementById('hp-fill').style.width = Math.max(0, player.hp / player.maxHp * 100) + '%';
  document.getElementById('hp-label').textContent = Math.max(0, player.hp) + ' / ' + player.maxHp + ' HP';
  document.getElementById('stat-atk').textContent = effectiveAtk();
  document.getElementById('stat-def').textContent = effectiveDef();
  document.getElementById('stat-gold').textContent = player.gold;
  document.getElementById('stat-depth').textContent = player.depth;
}

/* ═══ SCENES ═══════════════════════════════════════════ */
const sceneEl = document.getElementById('scene');
function setLog(msg, kind){
  player.log = msg || '';
  const el = document.getElementById('log');
  if (el){
    el.className = 'log' + (kind ? ' ' + kind : '');
    el.innerHTML = player.log;
  }
}
function renderScene(){
  let html = '';
  if (player.scene === 'chapel'){
    html = renderChapel();
  } else if (player.scene === 'crypt'){
    html = renderCrypt();
  } else if (player.scene === 'combat'){
    html = renderCombat();
  } else if (player.scene === 'dead'){
    html = renderChapel(); // background while death overlay shows
  }
  sceneEl.innerHTML = html;
  bindSceneActions();
  renderInventory();
  updateHud();
  // refresh log content
  setTimeout(() => setLog(player.log, player._logKind), 0);
}

/* Procedural per-depth room (deterministic on (depth, eventsCleared) seed) */
function currentRoom(){
  // simple PRNG seeded by depth so the room reads consistently until you act
  const seed = player.depth * 131 + player.eventsCleared * 7;
  const rng = mulberry32(seed);
  const roll = rng();
  // higher depth → harder rooms; trash + chest + monster + shrine + boss
  let kind;
  if (player.depth >= 10 && roll < 0.4) kind = 'monster';
  else if (player.depth === 10) kind = 'boss';
  else if (roll < 0.50) kind = 'monster';
  else if (roll < 0.72) kind = 'loot';
  else if (roll < 0.84) kind = 'chest';
  else if (roll < 0.92) kind = 'shrine';
  else kind = 'forge_relic';
  return makeRoom(kind, rng);
}
function makeRoom(kind, rng){
  if (kind === 'monster'){
    const pool = pickMonsterPool();
    const m = pool[Math.floor(rng() * pool.length)];
    return {
      art: m.em,
      title: 'You hear them before you see them.',
      kind: 'a ' + m.name.toLowerCase() + ' blocks the way',
      desc: '<em>' + m.lore + '</em><br>It has not noticed you. Yet.',
      actions:
        '<button class="btn danger" data-act="engage" data-monster="' + m.id + '">⚔ Engage</button>'
        + '<button class="btn ghost" data-act="sneak" data-monster="' + m.id + '">…sneak past</button>'
    };
  }
  if (kind === 'loot'){
    return {
      art: '🕯️',
      title: 'A forgotten alcove.',
      kind: 'an empty room with something glinting',
      desc: 'Dust thick as snow. Something dropped here, long ago. <b>Take it.</b>',
      actions:
        '<button class="btn gold" data-act="loot">✦ Search the alcove</button>'
        + '<button class="btn ghost" data-act="advance">↓ Press deeper</button>'
        + '<button class="btn" data-act="retreat">↑ Retreat to chapel</button>'
    };
  }
  if (kind === 'chest'){
    return {
      art: '🗝️',
      title: 'A blackwood chest, half-buried.',
      kind: 'a chest, possibly trapped',
      desc: 'Three locks, all picked already. <em>Someone was here before you.</em> The chest hums faintly.',
      actions:
        '<button class="btn gold" data-act="chest">✦ Open the chest</button>'
        + '<button class="btn ghost" data-act="advance">↓ Leave it</button>'
        + '<button class="btn" data-act="retreat">↑ Retreat</button>'
    };
  }
  if (kind === 'shrine'){
    return {
      art: '⛧',
      title: 'A small shrine. The candle still burns.',
      kind: 'a healing shrine',
      desc: 'A nameless saint. Whoever they were, the candle waits. <b>Pray</b> to be mended.',
      actions:
        '<button class="btn gold" data-act="pray">✟ Pray (free heal)</button>'
        + '<button class="btn ghost" data-act="advance">↓ Continue</button>'
        + '<button class="btn" data-act="retreat">↑ Retreat</button>'
    };
  }
  if (kind === 'forge_relic'){
    return {
      art: '⚒️',
      title: 'A relic forge — banked but lit.',
      kind: 'a portable forge',
      desc: 'A traveling forge, abandoned. You can <b>craft once here</b> before the embers die. The chapel forge stays lit forever; this one will not.',
      actions:
        '<button class="btn gold" data-act="forge">⚒ Use the relic forge</button>'
        + '<button class="btn ghost" data-act="advance">↓ Move on</button>'
        + '<button class="btn" data-act="retreat">↑ Retreat</button>'
    };
  }
  if (kind === 'boss'){
    return {
      art: '🧙',
      title: 'The hall opens. The cold deepens.',
      kind: 'the lich is here',
      desc: '<em>It has been waiting.</em> The walls are lined with the bones of those who tried. <b>You may turn back. Once.</b>',
      actions:
        '<button class="btn danger" data-act="engage" data-monster="lich">⚔ Face the Lich</button>'
        + '<button class="btn" data-act="retreat">↑ Retreat to chapel</button>'
    };
  }
}
function pickMonsterPool(){
  const d = player.depth;
  if (d < 2) return [MONSTERS.rat, MONSTERS.bat, MONSTERS.spider];
  if (d < 4) return [MONSTERS.rat, MONSTERS.skel, MONSTERS.bat, MONSTERS.spider, MONSTERS.hound];
  if (d < 6) return [MONSTERS.skel, MONSTERS.ghoul, MONSTERS.hound, MONSTERS.gargoyle];
  if (d < 8) return [MONSTERS.ghoul, MONSTERS.wraith, MONSTERS.vampire, MONSTERS.banshee, MONSTERS.gargoyle];
  if (d < 10) return [MONSTERS.wraith, MONSTERS.vampire, MONSTERS.knight, MONSTERS.banshee, MONSTERS.daemon];
  return [MONSTERS.knight, MONSTERS.vampire, MONSTERS.daemon, MONSTERS.inquisitor];
}
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

/* ═══ ACTIONS (delegated click handler) ═══════════════ */
function bindSceneActions(){
  sceneEl.querySelectorAll('[data-act]').forEach(b => {
    b.addEventListener('click', () => handleAction(b.dataset.act, b.dataset));
  });
}
function handleAction(act, data){
  if (act === 'descend'){
    player.scene = 'crypt'; player.depth = 1; player.eventsCleared = 0;
    setLog('You take the first step down. The chapel disappears behind a curve in the stone.', 'good');
    save(); renderScene(); return;
  }
  if (act === 'advance'){
    player.depth++; player.eventsCleared = 0;
    if (player.depth > player.deepest) player.deepest = player.depth;
    setLog('You press deeper. The air thickens.');
    save(); renderScene(); return;
  }
  if (act === 'retreat'){
    player.scene = 'chapel'; player.depth = 0; player.eventsCleared = 0; player.enemy = null;
    setLog('You climb back to the chapel. Candle smoke welcomes you home.', 'good');
    save(); renderScene(); return;
  }
  if (act === 'rest'){
    if (player.gold < 10){ setLog('You have no coin for this. The chapel offers prayer only.', 'bad'); renderScene(); return; }
    player.gold -= 10; player.hp = player.maxHp;
    setLog('You sleep on the cold stone. The candle keeps watch. You wake healed.', 'good');
    save(); renderScene(); return;
  }
  if (act === 'forge'){
    openForge();
    return;
  }
  if (act === 'skills'){
    openSkills();
    return;
  }
  if (act === 'loot'){
    doLoot();
    return;
  }
  if (act === 'chest'){
    doChest();
    return;
  }
  if (act === 'pray'){
    const healed = Math.min(player.maxHp, player.hp + Math.max(6, Math.floor(player.maxHp * 0.6))) - player.hp;
    player.hp += healed;
    setLog('The saint hears you. You are mended for <b>' + healed + '</b> HP.', 'good');
    save();
    // shrine consumed — move on
    player.eventsCleared++;
    setTimeout(() => { player.depth++; if (player.depth > player.deepest) player.deepest = player.depth; renderScene(); }, 900);
    renderScene();
    return;
  }
  if (act === 'engage'){
    const id = data.monster;
    const m = MONSTERS[id];
    player.enemy = { id, hp: m.hp };
    player.scene = 'combat';
    setLog('You ready your weapon. The <em>' + m.name.toLowerCase() + '</em> turns to face you.');
    save(); renderScene();
    return;
  }
  if (act === 'sneak'){
    const r = Math.random();
    if (r < 0.55){
      setLog('You hold your breath. You step past. You hear it growl behind you, then nothing.', 'good');
      player.eventsCleared++;
      setTimeout(() => { player.depth++; if (player.depth > player.deepest) player.deepest = player.depth; renderScene(); }, 800);
    } else {
      const id = data.monster;
      const m = MONSTERS[id];
      player.enemy = { id, hp: m.hp };
      player.scene = 'combat';
      const dmg = Math.max(1, m.atk - Math.floor(effectiveDef() / 2));
      player.hp -= dmg;
      shakeScene();
      floatDmg(dmg, false);
      setLog('You stepped on a bone. The <em>' + m.name.toLowerCase() + '</em> strikes first for <b>' + dmg + '</b>.', 'bad');
      if (player.hp <= 0) return die();
    }
    save(); renderScene();
    return;
  }
  if (act === 'attack'){
    doAttack();
    return;
  }
  if (act === 'defend'){
    doDefend();
    return;
  }
  if (act === 'flee'){
    doFlee();
    return;
  }
}

/* ═══ COMBAT ═══════════════════════════════════════════ */
function applyTurnRegen(){
  // returns true if regen killed the player (cursed item bleed)
  const r = effectiveHpRegen();
  if (r === 0) return false;
  player.hp = Math.min(player.maxHp, player.hp + r);
  if (player.hp <= 0){ die(); return true; }
  return false;
}
function doAttack(){
  const e = player.enemy; if (!e) return;
  const m = MONSTERS[e.id];
  // turn regen first (heals from of_mercy / Bulwark t3, or bleed from cursed gear)
  if (applyTurnRegen()) return;
  const baseAtk = effectiveAtk();
  // crit chance scales with Steel skill
  const critChance = 0.12 + (player.skills.steel || 0) * 0.06;
  const crit = Math.random() < critChance;
  let dmg = Math.max(1, baseAtk - m.def + Math.floor(Math.random() * 3) - 1);
  if (crit) dmg = Math.floor(dmg * 2);
  // Steel tier 3: bonus dmg vs bosses
  if (m.boss && player.skills.steel >= 3) dmg = Math.floor(dmg * 1.3);
  // ── holy fire affixes (Sunflame / Wreathed / Hellforged) add flat extra dmg per strike ──
  const fireDmg = effectiveFireDmg();
  if (fireDmg > 0) dmg += fireDmg + (crit ? fireDmg : 0); // crit also doubles fire
  e.hp -= dmg;
  floatDmg(dmg + (crit ? ' !' : ''), true);
  if (fireDmg > 0){
    setTimeout(() => floatDmg('🔥 +' + fireDmg, true), 120);
  }
  // ── lifesteal affixes (Vampyric / Bloodletting / of_the_vein / Bloodbound) heal you on hit ──
  const ls = effectiveLifesteal();
  if (ls > 0 && player.hp < player.maxHp){
    const heal = Math.max(1, Math.ceil(dmg * ls));
    player.hp = Math.min(player.maxHp, player.hp + heal);
    setTimeout(() => floatDmg('🩸 +' + heal, true), 200);
  }
  let logMsg = (crit ? '<b>CRITICAL!</b> ' : '') + 'You strike for <b>' + dmg + '</b>';
  if (fireDmg > 0) logMsg += ' <span style="color:var(--candle);">(holy fire +' + fireDmg + ')</span>';
  if (ls > 0) logMsg += ' <span style="color:var(--blood-2);">· lifesteal</span>';
  logMsg += '.';
  setLog(logMsg, 'good');
  if (e.hp <= 0){ return defeatMonster(m); }
  // enemy retaliates
  setTimeout(() => {
    const e2 = player.enemy; if (!e2) return;
    const defNeg = m.ignoreDef ? 0 : effectiveDef();
    const ed = Math.max(1, m.atk - defNeg + Math.floor(Math.random() * 3) - 1);
    player.hp -= ed;
    floatDmg(ed, false);
    shakeScene();
    setLog((player.log ? player.log + ' · ' : '') + 'It strikes back for <b>' + ed + '</b>.', 'bad');
    if (player.hp <= 0) return die();
    save();
    renderScene();
  }, 380);
  save();
  renderScene();
}
function doDefend(){
  const e = player.enemy; if (!e) return;
  const m = MONSTERS[e.id];
  if (applyTurnRegen()) return;
  // 60% damage reduction; small chance to fully parry and heal 1
  const reduce = 0.45 + Math.random() * 0.25;
  const ed = Math.max(0, Math.floor((m.atk - effectiveDef()) * (1 - reduce)));
  player.hp -= ed;
  floatDmg(ed === 0 ? 'PARRY' : ed, ed === 0);
  if (ed === 0){
    player.hp = Math.min(player.maxHp, player.hp + 1);
    setLog('You brace the blow perfectly. The <em>' + m.name.toLowerCase() + '</em> hisses.', 'good');
  } else {
    setLog('You brace. The blow lands for <b>' + ed + '</b>.', 'bad');
  }
  if (player.hp <= 0) return die();
  save();
  renderScene();
}
function doFlee(){
  const e = player.enemy; if (!e) return;
  const m = MONSTERS[e.id];
  if (m.boss){
    setLog('The lich laughs. There is no fleeing from this room.', 'bad');
    renderScene(); return;
  }
  if (Math.random() < 0.6){
    setLog('You break for the stair. You escape.', 'good');
    player.enemy = null;
    player.scene = 'crypt';
    player.eventsCleared++;
    save();
    renderScene();
  } else {
    const ed = Math.max(1, m.atk - effectiveDef() + 1);
    player.hp -= ed;
    floatDmg(ed, false);
    shakeScene();
    setLog('You stumble. It catches you. <b>-' + ed + '</b> HP.', 'bad');
    if (player.hp <= 0) return die();
    save();
    renderScene();
  }
}
function defeatMonster(m){
  const goldGain = m.gold[0] + Math.floor(Math.random() * (m.gold[1] - m.gold[0] + 1));
  player.gold += goldGain;
  // skill point: 1 per kill, 3 for boss
  const spGain = m.boss ? 3 : 1;
  player.skillPoints += spGain;
  player.kills++;
  let lootMsg = '';
  // drop 1-2 items from the drop table
  const dropCount = m.boss ? 4 : (1 + (Math.random() < 0.45 ? 1 : 0));
  const dropped = [];
  for (let i = 0; i < dropCount; i++){
    const id = m.drops[Math.floor(Math.random() * m.drops.length)];
    addToInv(id);
    dropped.push(ITEMS[id].em + ' ' + ITEMS[id].name);
  }
  if (dropped.length) lootMsg = ' Loot: ' + dropped.join(', ') + '.';
  setLog('You strike it down. +<b>' + goldGain + ' gold</b>.' + lootMsg, 'good');
  player.enemy = null;
  player.scene = 'crypt';
  player.eventsCleared++;
  // boss kill: epic message and force back to chapel
  if (m.boss){
    setLog('<b>THE LICH IS DEAD.</b> The crypt fills with cold silence. You take the moonstone from its crown.', 'good');
    addToInv('moonstone', 3);
    addToInv('ghost_essence', 2);
    player.gold += 200;
    player.scene = 'chapel'; player.depth = 0;
  }
  save();
  renderScene();
}
function die(){
  player.scene = 'dead';
  // penalty: lose half gold, lose broken/common items (mats survive)
  const lostGold = Math.floor(player.gold / 2);
  player.gold -= lostGold;
  player.inventory = player.inventory.filter(it => {
    const item = ITEMS[it.id];
    if (!item) return false;
    if (item.tier === 'broken') return false;
    if (item.tier === 'common' && item.slot !== 'mat') return false;
    return true;
  });
  // un-equip anything you lost (by uid)
  for (const slot of ['weapon','armor','trinket']){
    const uid = player.equipped[slot];
    if (uid != null && !player.inventory.find(it => it.uid === uid)) player.equipped[slot] = null;
  }
  player.hp = player.maxHp;
  player.depth = 0;
  player.enemy = null;
  // pick an epitaph
  const epitaphs = [
    'The crypt swallows you. Half your gold scatters into the dark. Coarse trinkets are taken by the dead.',
    'You wake at the chapel altar, colder than before. Something is missing.',
    'A nameless saint drags you up the stair. You owe them.',
    'You did not see the blade. You will see them all, after this.',
    'The candle was not for you, this time.',
  ];
  document.getElementById('epitaph').textContent = epitaphs[Math.floor(Math.random()*epitaphs.length)];
  document.getElementById('death').classList.add('show');
  save();
}
document.getElementById('btn-respawn').addEventListener('click', () => {
  document.getElementById('death').classList.remove('show');
  player.scene = 'chapel';
  renderScene();
});

/* ═══ AFFIXES (hardcore loot rolls) ═══════════════════ */
/* every weapon/armor/trinket drop rolls 0-3 random affixes based on tier.
   each affix grants stat bonuses (atk/def/hpRegen/healMul) when equipped.
   cursed-tier items get a powerful bonus with a real downside. */
const AFFIXES = {
  // ── prefixes (Adjective + Noun) ──
  blessed:     { name:'Blessed',     pre:true, atk:1, tags:['holy'] },
  sanctified:  { name:'Sanctified',  pre:true, def:1, tags:['holy'] },
  saintly:     { name:'Saintly',     pre:true, atk:1, def:1, tags:['holy'] },
  hallowed:    { name:'Hallowed',    pre:true, atk:2, tags:['holy','rare'] },
  consecrated: { name:'Consecrated', pre:true, def:2, tags:['holy','rare'] },
  pyre_struck: { name:'Pyre-struck', pre:true, atk:2, def:1, tags:['holy','rare'] },
  sun_touched: { name:'Sun-touched', pre:true, atk:1, hpRegen:1, tags:['holy','rare'] },
  vesper:      { name:'Vesper',      pre:true, def:2, hpRegen:1, tags:['holy','rare'] },
  // ── suffixes ("X of Y") ──
  of_verbena:      { name:'of Saint Verbena',    atk:2, tags:['holy','rare'] },
  of_sunburst:     { name:'of the Sunburst',     atk:1, def:1, tags:['holy'] },
  of_vigil:        { name:'of the Vigil',        def:2, tags:['holy'] },
  of_mercy:        { name:'of Mercy',            hpRegen:1, tags:['holy'] },
  of_choir:        { name:'of the Choir',        atk:1, def:1, tags:['holy'] },
  of_daybreak:     { name:'of Daybreak',         atk:2, hpRegen:1, tags:['holy','rare'] },
  of_chalice:      { name:'of the Chalice',      healMul:0.25, tags:['holy','rare'] },
  of_reliquary:    { name:'of the Reliquary',    def:3, tags:['holy','rare'] },
  of_saints_tongue:{ name:'of the Saint\'s Tongue', atk:1, def:1, hpRegen:1, tags:['holy','rare'] },
  // ── rare exotics (lifesteal + holy fire) ──
  vampyric:        { name:'Vampyric',             pre:true, lifesteal:0.25, tags:['holy','rare'] },
  bloodletting:    { name:'Bloodletting',         pre:true, atk:1, lifesteal:0.15, tags:['holy','rare'] },
  wreathed:        { name:'Wreathed',             pre:true, fireDmg:2, tags:['holy','rare'] },
  of_sunflame:     { name:'of the Sunflame',      fireDmg:2, tags:['holy','rare'] },
  of_immolation:   { name:'of Immolation',        fireDmg:3, atk:1, tags:['holy','rare'] },
  of_the_vein:     { name:'of the Vein',          lifesteal:0.20, tags:['holy','rare'] },
  of_pyre_dance:   { name:'of the Pyre Dance',    fireDmg:2, atk:1, tags:['holy','rare'] },
  // ── curse suffixes (only on cursed-tier items — big bonus, real downside) ──
  of_weeping:      { name:'of Weeping',          atk:3, def:-1, tags:['cursed'] },
  of_bleeding:     { name:'of Bleeding',         atk:3, hpRegen:-1, tags:['cursed'] },
  of_whispers:     { name:'of Whispers',         atk:4, def:-2, tags:['cursed'] },
  of_hollowing:    { name:'of the Hollowing',    atk:2, def:2, hpRegen:-1, tags:['cursed'] },
  of_the_pit:      { name:'of the Pit',          atk:5, def:-2, hpRegen:-1, tags:['cursed','rare'] },
  bloodbound:      { name:'Bloodbound',          pre:true, lifesteal:0.40, hpRegen:-1, tags:['cursed','rare'] },
  hellforged:      { name:'Hellforged',          pre:true, fireDmg:4, def:-1, tags:['cursed','rare'] },
};
/* per-tier: [minAffixes, maxAffixes, allowRare?, allowCursed?] */
const AFFIX_BY_TIER = {
  broken: [0, 0, false, false],
  common: [0, 1, false, false],
  fine:   [1, 2, false, false],
  master: [1, 2, true,  false],
  legend: [2, 3, true,  false],
  cursed: [1, 1, false, true],
};
function affixKeysFor(tier){
  const conf = AFFIX_BY_TIER[tier] || AFFIX_BY_TIER.common;
  const allowRare = conf[2], allowCursed = conf[3];
  return Object.keys(AFFIXES).filter(k => {
    const t = AFFIXES[k].tags || [];
    if (t.includes('cursed')) return allowCursed;
    if (t.includes('rare'))   return allowRare;
    return true;
  });
}
function rollAffixes(itemId){
  const it = ITEMS[itemId];
  if (!it) return [];
  if (it.slot === 'mat' || it.slot === 'cons') return []; // never affix stackables
  const conf = AFFIX_BY_TIER[it.tier] || AFFIX_BY_TIER.common;
  const mn = conf[0], mx = conf[1];
  if (mx === 0) return [];
  const n = mn + Math.floor(Math.random() * (mx - mn + 1));
  if (n === 0) return [];
  const pool = affixKeysFor(it.tier);
  const shuffled = pool.slice().sort(() => Math.random() - 0.5);
  const picked = [];
  let hasPre = false, sufCount = 0;
  for (const k of shuffled){
    if (picked.length >= n) break;
    const a = AFFIXES[k];
    if (a.pre){
      if (hasPre) continue;
      hasPre = true;
    } else {
      if (sufCount >= 2) continue; // cap at 2 suffixes
      sufCount++;
    }
    picked.push(k);
  }
  return picked;
}
function affixBonus(invEntry, stat){
  if (!invEntry || !invEntry.affixes) return 0;
  let v = 0;
  for (const k of invEntry.affixes){
    const a = AFFIXES[k]; if (!a) continue;
    v += (a[stat] || 0);
  }
  return v;
}
function displayName(invEntry){
  const it = ITEMS[invEntry.id]; if (!it) return '?';
  const aff = invEntry.affixes || [];
  if (!aff.length) return it.name;
  const pre = aff.filter(k => AFFIXES[k] && AFFIXES[k].pre).map(k => AFFIXES[k].name);
  const suf = aff.filter(k => AFFIXES[k] && !AFFIXES[k].pre).map(k => AFFIXES[k].name);
  return [pre.join(' '), it.name, suf.join(' ')].filter(s => s).join(' ');
}

/* ═══ LOOT / CHEST ═════════════════════════════════════ */
const LOOT_POOLS = {
  // weighted item ids by tier likelihood at depth d
  common: ['bone_frag','cursed_iron','holy_water','garlic_bulb','leather_jerkin','bone_necklace','iron_sword'],
  fine:   ['silver_ore','moonstone','bitter_tonic','holy_symbol','stake','bone_mail','silver_sword'],
  master: ['mithril_chunk','ghost_essence','blood_phial','moonstone_amulet','mithril_plate','necro_wand'],
  legend: ['saint_relic','sunsword','sun_plate'],
  cursed: ['cursed_ring','cursed_mantle','cursed_blade'],
};
function rollLootTier(){
  const d = player.depth;
  // cursed gets its own check first so it doesn't get crowded out by master/legend rolls deep in
  if (d >= 3 && Math.random() < 0.07) return 'cursed';
  const r = Math.random();
  const blessed = Math.random() < 0.05; // "blessed find" — small chance to upgrade
  if (d >= 9 && (r < 0.05 || (blessed && d >= 6))) return 'legend';
  if (d >= 6 && (r < 0.20 || blessed))             return 'master';
  if (d >= 4 && r < 0.36)                          return 'fine';
  return 'common';
}
function doLoot(){
  const tier = rollLootTier();
  const pool = LOOT_POOLS[tier];
  const id = pool[Math.floor(Math.random() * pool.length)];
  const item = ITEMS[id];
  addToInv(id);
  // also some gold
  const g = 2 + Math.floor(Math.random() * (player.depth + 4));
  player.gold += g;
  setLog('You find <b>' + item.em + ' ' + item.name + '</b> (' + TIERS[item.tier].name + ') and +<b>' + g + ' gold</b>.', 'good');
  player.eventsCleared++;
  player.depth++;
  if (player.depth > player.deepest) player.deepest = player.depth;
  save();
  renderScene();
}
function doChest(){
  // 80% loot, 20% mimic-like trap (small dmg)
  if (Math.random() < 0.2){
    const trapDmg = 2 + Math.floor(Math.random() * Math.max(2, player.depth));
    player.hp -= trapDmg;
    floatDmg(trapDmg, false);
    shakeScene();
    setLog('A needle springs out. <b>-' + trapDmg + '</b> HP. The chest is empty.', 'bad');
    if (player.hp <= 0) return die();
    player.eventsCleared++;
    save();
    renderScene();
    return;
  }
  // 2-3 items, often higher tier
  const drops = [];
  const tiers = ['fine','master','cursed'];
  const count = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < count; i++){
    let t = tiers[Math.floor(Math.random() * tiers.length)];
    if (Math.random() < 0.15 && player.depth >= 8) t = 'legend';
    const pool = LOOT_POOLS[t];
    const id = pool[Math.floor(Math.random() * pool.length)];
    addToInv(id);
    drops.push(ITEMS[id].em + ' ' + ITEMS[id].name);
  }
  const g = 8 + Math.floor(Math.random() * (player.depth * 3 + 6));
  player.gold += g;
  setLog('You open the chest. +<b>' + g + ' gold</b>. ' + drops.join(', ') + '.', 'good');
  player.eventsCleared++;
  player.depth++;
  if (player.depth > player.deepest) player.deepest = player.depth;
  save();
  renderScene();
}

/* ═══ FORGE / CRAFTING ═════════════════════════════════ */
const forgeModal = document.getElementById('forge-modal');
function openForge(){
  const p = document.getElementById('forge-panel');
  p.innerHTML =
    '<h2>The Forge</h2>'
    + '<div class="sub">bring scraps. take steel. or worse.</div>'
    + RECIPES.map(r => recipeRow(r)).join('')
    + '<button class="close-btn" id="forge-close">close</button>';
  p.querySelectorAll('[data-craft]').forEach(b => {
    b.addEventListener('click', () => craft(b.dataset.craft));
  });
  document.getElementById('forge-close').addEventListener('click', () => forgeModal.classList.remove('show'));
  forgeModal.classList.add('show');
}
function recipeRow(r){
  const res = ITEMS[r.result];
  const tier = TIERS[res.tier];
  const canCraft = Object.keys(r.ing).every(id => hasInInv(id, r.ing[id]));
  const ingHtml = Object.keys(r.ing).map(id => {
    const need = r.ing[id];
    const have = (player.inventory.find(x => x.id === id) || {qty:0}).qty;
    const ok = have >= need;
    return '<span class="' + (ok ? 'ok' : 'no') + '">' + ITEMS[id].em + ' ' + ITEMS[id].name + ' ×' + need + ' (' + have + ')</span>';
  }).join(' · ');
  return '<div class="recipe-row">'
    + '<div class="info">'
      + '<div class="name tier-' + res.tier + '">' + res.em + ' ' + res.name
        + '<span style="font-family:JetBrains Mono,monospace; font-size:11px; margin-left:8px; color:' + tier.color + ';">' + tier.name + '</span>'
      + '</div>'
      + '<div class="ingredients">' + ingHtml + '</div>'
      + '<div class="flavor">' + r.flavor + '</div>'
    + '</div>'
    + '<button class="craft-btn" data-craft="' + r.result + '"' + (canCraft ? '' : ' disabled') + '>FORGE</button>'
    + '</div>';
}
function craft(resultId){
  const recipe = RECIPES.find(r => r.result === resultId);
  if (!recipe) return;
  // verify and consume
  for (const id in recipe.ing){
    if (!hasInInv(id, recipe.ing[id])){
      setLog('you lack the materials.', 'bad');
      renderScene();
      return;
    }
  }
  for (const id in recipe.ing){
    consumeIngredient(id, recipe.ing[id]);
  }
  addToInv(resultId);
  save();
  // refresh forge panel + scene
  openForge();
  setLog('You forged <b>' + ITEMS[resultId].em + ' ' + ITEMS[resultId].name + '</b>. The flame approves.', 'good');
  renderScene();
}
forgeModal.addEventListener('click', e => {
  if (e.target === forgeModal) forgeModal.classList.remove('show');
});

/* ═══ SKILL TREE ════════════════════════════════════════ */
const SKILL_DEFS = {
  faith:   { name:'Faith',   ic:'☀️', desc:'+5 max HP per tier · +50% healing effectiveness at tier 3',
             tiers:['Acolyte','Devout','Saint-Touched'] },
  steel:   { name:'Steel',   ic:'⚔️', desc:'+1 atk per tier · crit chance scales with tier',
             tiers:['Squire','Knight','Smiter'] },
  bulwark: { name:'Bulwark', ic:'⛨',  desc:'+1 def per tier · regen 1 HP/turn at tier 3',
             tiers:['Warden','Sentinel','Bastion'] },
};
const SKILL_COST = [1, 2, 3]; // tier 1: 1SP, tier 2: 2SP, tier 3: 3SP

const skillModal = document.getElementById('skill-modal');
function openSkills(){
  const p = document.getElementById('skill-panel');
  p.innerHTML =
    '<h2>The Paladin\'s Oath</h2>'
    + '<div class="sub">spend skill points (' + player.skillPoints + ' available) on your oath. earned 1 per kill, 3 for a boss.</div>'
    + '<div class="skill-tree">'
      + ['faith','steel','bulwark'].map(branch => renderSkillBranch(branch)).join('')
    + '</div>'
    + '<button class="close-btn" id="skill-close">close</button>';
  p.querySelectorAll('[data-skill]').forEach(b => {
    b.addEventListener('click', () => investSkill(b.dataset.skill, +b.dataset.tier));
  });
  document.getElementById('skill-close').addEventListener('click', () => skillModal.classList.remove('show'));
  skillModal.classList.add('show');
}
function renderSkillBranch(branch){
  const def = SKILL_DEFS[branch];
  const current = player.skills[branch] || 0;
  return '<div class="skill-branch ' + branch + '">'
    + '<h3>' + def.ic + ' ' + def.name + '</h3>'
    + def.tiers.map((tierName, idx) => {
        const tier = idx + 1;
        const unlocked = current >= tier;
        const locked = tier > current + 1;
        const cost = SKILL_COST[idx];
        const ef = describeSkillEffect(branch, tier);
        const cls = unlocked ? 'unlocked' : (locked ? 'locked' : '');
        return '<div class="skill-tier ' + cls + '" '
          + (unlocked || locked ? '' : 'data-skill="' + branch + '" data-tier="' + tier + '"')
          + '>'
          + '<div class="ic">' + def.ic + '</div>'
          + '<div class="nm">' + tierName + '</div>'
          + '<div class="ef">' + ef + '</div>'
          + (unlocked ? '<div class="cost">★ OATH KEPT</div>'
              : locked ? '<div class="cost">requires tier ' + current + '+1</div>'
              : '<div class="cost">cost: ' + cost + ' SP</div>')
          + '</div>';
      }).join('')
    + '</div>';
}
function describeSkillEffect(branch, tier){
  if (branch === 'faith'){
    if (tier === 1) return '+5 max HP';
    if (tier === 2) return '+10 max HP total';
    if (tier === 3) return '+15 max HP total · healing items +50%';
  }
  if (branch === 'steel'){
    if (tier === 1) return '+1 atk · slight crit boost';
    if (tier === 2) return '+2 atk · crit chance 20%';
    if (tier === 3) return '+3 atk · crit chance 30% · bonus dmg vs bosses';
  }
  if (branch === 'bulwark'){
    if (tier === 1) return '+1 def · slightly better parry';
    if (tier === 2) return '+2 def · parry chance 30%';
    if (tier === 3) return '+3 def · regen 1 HP per combat turn';
  }
  return '';
}
function investSkill(branch, tier){
  const current = player.skills[branch] || 0;
  if (tier !== current + 1) return;
  const cost = SKILL_COST[tier - 1];
  if (player.skillPoints < cost){
    setLog('not enough skill points. defeat more shadow.', 'bad'); return;
  }
  player.skillPoints -= cost;
  player.skills[branch] = tier;
  recomputeMaxHp();
  // if Faith — heal up to new max
  if (branch === 'faith') player.hp = Math.min(player.maxHp, player.hp + 5);
  save();
  openSkills();
  setLog('You take the oath of <b>' + SKILL_DEFS[branch].tiers[tier - 1] + '</b>. ' + describeSkillEffect(branch, tier), 'good');
  renderScene();
}
skillModal.addEventListener('click', e => {
  if (e.target === skillModal) skillModal.classList.remove('show');
});

/* ═══ INVENTORY UI ════════════════════════════════════ */
function renderInventory(){
  // equipped slots
  const eqGrid = document.getElementById('equipped-grid');
  eqGrid.innerHTML = ['weapon','armor','trinket'].map(slot => {
    const entry = findEquipped(slot);
    const it = entry ? ITEMS[entry.id] : null;
    const dn = entry ? displayName(entry) : '';
    return '<div class="equip-slot' + (it ? '' : ' empty') + '" data-unequip="' + slot + '" title="' + (it ? 'click to unequip' : 'empty slot') + '">'
      + '<div class="slot-label">' + slot + '</div>'
      + (it
          ? '<div class="em">' + it.em + '</div><div class="nm tier-' + it.tier + '">' + dn + '</div>'
          : '<div class="em" style="opacity:0.3;">·</div><div class="nm">empty</div>')
      + '</div>';
  }).join('');
  eqGrid.querySelectorAll('[data-unequip]').forEach(el => {
    el.addEventListener('click', () => {
      const slot = el.dataset.unequip;
      const entry = findEquipped(slot);
      if (!entry) return;
      player.equipped[slot] = null;
      setLog('You unequip the ' + displayName(entry) + '.', '');
      save(); renderScene();
    });
    el.addEventListener('mouseenter', e => {
      const entry = findEquipped(el.dataset.unequip);
      if (entry) showTooltip(e, entry);
    });
    el.addEventListener('mouseleave', hideTooltip);
  });
  // satchel
  const grid = document.getElementById('inv-grid');
  const SLOTS = 24;
  let html = '';
  for (let i = 0; i < SLOTS; i++){
    const it = player.inventory[i];
    if (!it){
      html += '<div class="inv-cell empty"></div>';
    } else {
      const item = ITEMS[it.id];
      if (!item){ html += '<div class="inv-cell empty"></div>'; continue; }
      const dn = displayName(it);
      const equipped = (it.uid != null) && (
        player.equipped.weapon === it.uid ||
        player.equipped.armor  === it.uid ||
        player.equipped.trinket === it.uid
      );
      const affixDots = (it.affixes && it.affixes.length)
        ? '<div class="affix-dots">' + '●'.repeat(it.affixes.length) + '</div>'
        : '';
      html += '<div class="inv-cell tier-' + item.tier + (equipped ? ' is-equipped' : '') + '" data-idx="' + i + '" title="' + dn.replace(/"/g, '&quot;') + '">'
        + '<div class="tier-mark tier-' + item.tier + '"></div>'
        + '<div class="em">' + item.em + '</div>'
        + (it.qty > 1 ? '<div class="qty">×' + it.qty + '</div>' : '')
        + affixDots
        + (equipped ? '<div class="equip-tag">✓</div>' : '')
        + '</div>';
    }
  }
  grid.innerHTML = html;
  grid.querySelectorAll('[data-idx]').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const entry = player.inventory[idx];
    if (!entry) return;
    el.addEventListener('mouseenter', e => showTooltip(e, entry));
    el.addEventListener('mouseleave', hideTooltip);
    el.addEventListener('click', () => useOrEquipEntry(idx));
  });
}
function useOrEquipEntry(idx){
  const entry = player.inventory[idx]; if (!entry) return;
  const it = ITEMS[entry.id]; if (!it) return;
  if (it.slot === 'cons'){
    if (player.hp >= player.maxHp){ setLog('You are already at full HP.', ''); renderScene(); return; }
    const mult = effectiveHealMul();
    const healed = Math.max(1, Math.floor(it.heal * mult));
    player.hp = Math.min(player.maxHp, player.hp + healed);
    floatDmg('+' + healed, true);
    entry.qty -= 1;
    if (entry.qty <= 0) player.inventory.splice(idx, 1);
    setLog('You drink the <b>' + it.name + '</b>. +<b>' + healed + '</b> HP.', 'good');
    save(); renderScene();
    return;
  }
  if (it.slot === 'weapon' || it.slot === 'armor' || it.slot === 'trinket'){
    // toggle: clicking the equipped one unequips
    if (player.equipped[it.slot] === entry.uid){
      player.equipped[it.slot] = null;
      setLog('You unequip the <b>' + displayName(entry) + '</b>.', '');
    } else {
      player.equipped[it.slot] = entry.uid;
      setLog('You equip the <b>' + displayName(entry) + '</b>.', 'good');
    }
    save(); renderScene();
    return;
  }
  if (it.slot === 'mat'){
    setLog('A crafting material. Use it at <b>the forge</b>.', '');
    renderScene();
    return;
  }
}

/* ═══ TOOLTIP ═════════════════════════════════════════ */
const tip = document.getElementById('item-tip');
function showTooltip(e, entry){
  if (!entry || !ITEMS[entry.id]) return;
  const item = ITEMS[entry.id];
  const tierC = TIERS[item.tier].color;
  const name = displayName(entry);
  // base + affix stats merged for display
  const totalAtk = (item.atk || 0) + affixBonus(entry, 'atk');
  const totalDef = (item.def || 0) + affixBonus(entry, 'def');
  const totalRegen = affixBonus(entry, 'hpRegen') + (item.curseHpRegen || 0);
  const totalHealMul = affixBonus(entry, 'healMul');
  const totalLifesteal = affixBonus(entry, 'lifesteal');
  const totalFire = affixBonus(entry, 'fireDmg');
  let stats = '';
  if (totalAtk) stats += '<span class="' + (totalAtk>=0?'atk':'curse') + '">⚔︎ ' + (totalAtk>=0?'+':'') + totalAtk + '</span> ';
  if (totalDef) stats += '<span class="' + (totalDef>=0?'def':'curse') + '">⛨ ' + (totalDef>=0?'+':'') + totalDef + '</span> ';
  if (item.heal) stats += '<span class="heal">✚ +' + item.heal + '</span> ';
  if (totalRegen) stats += '<span class="' + (totalRegen>0?'heal':'curse') + '">❤ ' + (totalRegen>0?'+':'') + totalRegen + '/turn</span> ';
  if (totalLifesteal > 0) stats += '<span class="atk">🩸 ' + Math.round(totalLifesteal*100) + '% lifesteal</span> ';
  if (totalFire > 0) stats += '<span class="heal">🔥 +' + totalFire + ' holy fire</span> ';
  if (totalHealMul > 0) stats += '<span class="heal">✚ +' + Math.round(totalHealMul*100) + '% potions</span> ';
  const affixList = (entry.affixes || []).map(k => {
    const a = AFFIXES[k]; if (!a) return '';
    const isCursed = (a.tags || []).includes('cursed');
    return '<div class="aff' + (isCursed ? ' cursed' : '') + '">› ' + a.name + '</div>';
  }).join('');
  tip.style.display = 'block';
  tip.innerHTML =
    '<div class="nm" style="color:' + tierC + ';">' + item.em + ' ' + name + '</div>'
    + '<div class="tt">' + item.slot + ' · ' + TIERS[item.tier].name + ' · ' + (item.value || 0) + 'g</div>'
    + (stats ? '<div class="stats">' + stats + '</div>' : '')
    + (affixList ? '<div class="affixes">' + affixList + '</div>' : '')
    + '<div class="desc">' + item.desc + '</div>';
  positionTip(e);
}
function positionTip(e){
  const rect = tip.getBoundingClientRect();
  const x = Math.min(window.innerWidth - rect.width - 12, e.clientX + 16);
  const y = Math.min(window.innerHeight - rect.height - 12, e.clientY + 16);
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}
function hideTooltip(){ tip.style.display = 'none'; }
document.addEventListener('mousemove', e => {
  if (tip.style.display === 'block') positionTip(e);
});

/* ═══ EFFECTS ═════════════════════════════════════════ */
function floatDmg(text, good){
  const rect = sceneEl.getBoundingClientRect();
  const d = document.createElement('div');
  d.className = 'dmg-float' + (good ? ' heal' : '');
  d.textContent = text;
  d.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 80) + 'px';
  d.style.top  = (rect.top + rect.height / 2) + 'px';
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 1400);
}
function shakeScene(){
  sceneEl.classList.remove('shaking');
  void sceneEl.offsetWidth;
  sceneEl.classList.add('shaking');
  setTimeout(() => sceneEl.classList.remove('shaking'), 260);
}

/* ═══ INIT ═══════════════════════════════════════════ */
renderScene();
</script>
