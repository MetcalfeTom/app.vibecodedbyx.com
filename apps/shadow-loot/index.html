  of_pyre_dance:   { name:'of the Pyre Dance',    nameRu:'Танца костра',       fireDmg:2, atk:1, tags:['holy','rare'] },
  // ── curse suffixes (only on cursed-tier items — big bonus, real downside) ──
  of_weeping:      { name:'of Weeping',          nameRu:'Слёз',                atk:3, def:-1, tags:['cursed'] },
  of_bleeding:     { name:'of Bleeding',         nameRu:'Кровотечения',        atk:3, hpRegen:-1, tags:['cursed'] },
  of_whispers:     { name:'of Whispers',         nameRu:'Шёпотов',             atk:4, def:-2, tags:['cursed'] },
  of_hollowing:    { name:'of the Hollowing',    nameRu:'Опустошения',         atk:2, def:2, hpRegen:-1, tags:['cursed'] },
  of_the_pit:      { name:'of the Pit',          nameRu:'Бездны',              atk:5, def:-2, hpRegen:-1, tags:['cursed','rare'] },
  bloodbound:      { name:'Bloodbound',          nameRu:'Кровесвязанный',      pre:true, lifesteal:0.40, hpRegen:-1, tags:['cursed','rare'] },
  hellforged:      { name:'Hellforged',          nameRu:'Адскокованный',       pre:true, fireDmg:4, def:-1, tags:['cursed','rare'] },
};
/* per-tier: [minAffixes, maxAffixes, allowRare?, allowCursed?] */
const AFFIX_BY_TIER = {
  broken: [0, 0, false, false],
  common: [0, 1, false, false],
  fine:   [1, 2, false, false],
  master: [1, 2, true,  false],
  legend: [2, 3, true,  false],
  cursed: [1, 1, false, true],
};
function affixKeysFor(tier){
  const conf = AFFIX_BY_TIER[tier] || AFFIX_BY_TIER.common;
  const allowRare = conf[2], allowCursed = conf[3];
  return Object.keys(AFFIXES).filter(k => {
    const t = AFFIXES[k].tags || [];
    if (t.includes('cursed')) return allowCursed;
    if (t.includes('rare'))   return allowRare;
    return true;
  });
}
function rollAffixes(itemId){
  const it = ITEMS[itemId];
  if (!it) return [];
  if (it.slot === 'mat' || it.slot === 'cons') return []; // never affix stackables
  const conf = AFFIX_BY_TIER[it.tier] || AFFIX_BY_TIER.common;
  const mn = conf[0], mx = conf[1];
  if (mx === 0) return [];
  const n = mn + Math.floor(Math.random() * (mx - mn + 1));
  if (n === 0) return [];
  const pool = affixKeysFor(it.tier);
  const shuffled = pool.slice().sort(() => Math.random() - 0.5);
  const picked = [];
  let hasPre = false, sufCount = 0;
  for (const k of shuffled){
    if (picked.length >= n) break;
    const a = AFFIXES[k];
    if (a.pre){
      if (hasPre) continue;
      hasPre = true;
    } else {
      if (sufCount >= 2) continue; // cap at 2 suffixes
      sufCount++;
    }
    picked.push(k);
  }
  return picked;
}
function affixBonus(invEntry, stat){
  if (!invEntry || !invEntry.affixes) return 0;
  let v = 0;
  for (const k of invEntry.affixes){
    const a = AFFIXES[k]; if (!a) continue;
    v += (a[stat] || 0);
  }
  return v;
}
function displayName(invEntry){
  const it = ITEMS[invEntry.id]; if (!it) return '?';
  const aff = invEntry.affixes || [];
  const base = nameFor(it);
  if (!aff.length) return base;
  const pre = aff.filter(k => AFFIXES[k] && AFFIXES[k].pre).map(k => affixName(k));
  const suf = aff.filter(k => AFFIXES[k] && !AFFIXES[k].pre).map(k => affixName(k));
  return [pre.join(' '), base, suf.join(' ')].filter(s => s).join(' ');
}

/* ═══ LOOT / CHEST ═════════════════════════════════════ */
const LOOT_POOLS = {
  // weighted item ids by tier likelihood at depth d
  common: ['bone_frag','cursed_iron','holy_water','garlic_bulb','leather_jerkin','bone_necklace','iron_sword'],
  fine:   ['silver_ore','moonstone','bitter_tonic','holy_symbol','stake','bone_mail','silver_sword'],
  master: ['mithril_chunk','ghost_essence','blood_phial','moonstone_amulet','mithril_plate','necro_wand'],
  legend: ['saint_relic','sunsword','sun_plate'],
  cursed: ['cursed_ring','cursed_mantle','cursed_blade'],
};
function rollLootTier(){
  const d = player.depth;
  // cursed gets its own check first so it doesn't get crowded out by master/legend rolls deep in
  if (d >= 3 && Math.random() < 0.07) return 'cursed';
  const r = Math.random();
  const blessed = Math.random() < 0.05; // "blessed find" — small chance to upgrade
  if (d >= 9 && (r < 0.05 || (blessed && d >= 6))) return 'legend';
  if (d >= 6 && (r < 0.20 || blessed))             return 'master';
  if (d >= 4 && r < 0.36)                          return 'fine';
  return 'common';
}
function doLoot(){
  const tier = rollLootTier();
  const pool = LOOT_POOLS[tier];
  const id = pool[Math.floor(Math.random() * pool.length)];
  const item = ITEMS[id];
  addToInv(id);
  // also some gold
  const g = 2 + Math.floor(Math.random() * (player.depth + 4));
  player.gold += g;
  setLog(t('log_find', { em: item.em, name: nameFor(item), tier: tierName(item.tier), g: g }), 'good');
  player.eventsCleared++;
  player.depth++;
  if (player.depth > player.deepest) player.deepest = player.depth;
  save();
  renderScene();
}
function doChest(){
  // 80% loot, 20% mimic-like trap (small dmg)
  if (Math.random() < 0.2){
    const trapDmg = 2 + Math.floor(Math.random() * Math.max(2, player.depth));
    player.hp -= trapDmg;
    floatDmg(trapDmg, false);
    shakeScene();
    setLog(t('log_trap', { d: trapDmg }), 'bad');
    if (player.hp <= 0) return die();
    player.eventsCleared++;
    save();
    renderScene();
    return;
  }
  // 2-3 items, often higher tier
  const drops = [];
  const tierOptions = ['fine','master','cursed'];
  const count = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < count; i++){
    let chosenTier = tierOptions[Math.floor(Math.random() * tierOptions.length)];
    if (Math.random() < 0.15 && player.depth >= 8) chosenTier = 'legend';
    const pool = LOOT_POOLS[chosenTier];
    const id = pool[Math.floor(Math.random() * pool.length)];
    addToInv(id);
    drops.push(ITEMS[id].em + ' ' + nameFor(ITEMS[id]));
  }
  const g = 8 + Math.floor(Math.random() * (player.depth * 3 + 6));
  player.gold += g;
  setLog(t('log_chest_open', { g: g, items: drops.join(', ') }), 'good');
  player.eventsCleared++;
  player.depth++;
  if (player.depth > player.deepest) player.deepest = player.depth;
  save();
  renderScene();
}

/* ═══ FORGE / CRAFTING ═════════════════════════════════ */
const forgeModal = document.getElementById('forge-modal');
function openForge(){
  const p = document.getElementById('forge-panel');
  p.innerHTML =
    '<h2>' + t('forge_h2') + '</h2>'
    + '<div class="sub">' + t('forge_sub') + '</div>'
    + RECIPES.map(r => recipeRow(r)).join('')
    + '<button class="close-btn" id="forge-close">' + t('close') + '</button>';
  p.querySelectorAll('[data-craft]').forEach(b => {
    b.addEventListener('click', () => craft(b.dataset.craft));
  });
  document.getElementById('forge-close').addEventListener('click', () => forgeModal.classList.remove('show'));
  forgeModal.classList.add('show');
}
function recipeRow(r){
  const res = ITEMS[r.result];
  const tierObj = TIERS[res.tier];
  const canCraft = Object.keys(r.ing).every(id => hasInInv(id, r.ing[id]));
  const ingHtml = Object.keys(r.ing).map(id => {
    const need = r.ing[id];
    let have = 0;
    player.inventory.forEach(x => { if (x.id === id) have += (x.qty || 1); });
    const ok = have >= need;
    return '<span class="' + (ok ? 'ok' : 'no') + '">' + ITEMS[id].em + ' ' + nameFor(ITEMS[id]) + ' ×' + need + ' (' + have + ')</span>';
  }).join(' · ');
  const flavor = (LANG === 'ru' && r.flavorRu) ? r.flavorRu : r.flavor;
  return '<div class="recipe-row">'
    + '<div class="info">'
      + '<div class="name tier-' + res.tier + '">' + res.em + ' ' + nameFor(res)
        + '<span style="font-family:JetBrains Mono,monospace; font-size:11px; margin-left:8px; color:' + tierObj.color + ';">' + tierName(res.tier) + '</span>'
      + '</div>'
      + '<div class="ingredients">' + ingHtml + '</div>'
      + '<div class="flavor">' + flavor + '</div>'
    + '</div>'
    + '<button class="craft-btn" data-craft="' + r.result + '"' + (canCraft ? '' : ' disabled') + '>' + t('forge_craft').toUpperCase() + '</button>'
    + '</div>';
}
function craft(resultId){
  const recipe = RECIPES.find(r => r.result === resultId);
  if (!recipe) return;
  // verify and consume
  for (const id in recipe.ing){
    if (!hasInInv(id, recipe.ing[id])){
      setLog(t('log_lack_mat'), 'bad');
      renderScene();
      return;
    }
  }
  for (const id in recipe.ing){
    consumeIngredient(id, recipe.ing[id]);
  }
  addToInv(resultId);
  save();
  // refresh forge panel + scene
  openForge();
  const item = ITEMS[resultId];
  const msg = (LANG === 'ru')
    ? 'Ты сковал <b>' + item.em + ' ' + nameFor(item) + '</b>. Пламя одобряет.'
    : 'You forged <b>' + item.em + ' ' + item.name + '</b>. The flame approves.';
  setLog(msg, 'good');
  renderScene();
}
forgeModal.addEventListener('click', e => {
  if (e.target === forgeModal) forgeModal.classList.remove('show');
});

/* ═══ SKILL TREE ════════════════════════════════════════ */
const SKILL_DEFS = {
  faith:   { name:'Faith',   nameRu:'Вера',   ic:'☀️',
             tiers:['Acolyte','Devout','Saint-Touched'],
             tiersRu:['Послушник','Преданный','Святым тронутый'] },
  steel:   { name:'Steel',   nameRu:'Сталь',  ic:'⚔️',
             tiers:['Squire','Knight','Smiter'],
             tiersRu:['Оруженосец','Рыцарь','Карающий'] },
  bulwark: { name:'Bulwark', nameRu:'Оплот',  ic:'⛨',
             tiers:['Warden','Sentinel','Bastion'],
             tiersRu:['Страж','Часовой','Бастион'] },
};
const SKILL_COST = [1, 2, 3]; // tier 1: 1SP, tier 2: 2SP, tier 3: 3SP
function skillTierName(branch, idx){
  const d = SKILL_DEFS[branch]; if (!d) return '';
  if (LANG === 'ru' && d.tiersRu) return d.tiersRu[idx];
  return d.tiers[idx];
}

const skillModal = document.getElementById('skill-modal');
function openSkills(){
  const p = document.getElementById('skill-panel');
  p.innerHTML =
    '<h2>' + t('skills_h2') + '</h2>'
    + '<div class="sub">' + t('skills_sub') + '</div>'
    + '<div class="sub">' + t('skills_sp', { n: player.skillPoints, kills: player.kills || 0 }) + '</div>'
    + '<div class="skill-tree">'
      + ['faith','steel','bulwark'].map(branch => renderSkillBranch(branch)).join('')
    + '</div>'
    + '<button class="close-btn" id="skill-close">' + t('close') + '</button>';
  p.querySelectorAll('[data-skill]').forEach(b => {
    b.addEventListener('click', () => investSkill(b.dataset.skill, +b.dataset.tier));
  });
  document.getElementById('skill-close').addEventListener('click', () => skillModal.classList.remove('show'));
  skillModal.classList.add('show');
}
function renderSkillBranch(branch){
  const def = SKILL_DEFS[branch];
  const current = player.skills[branch] || 0;
  const branchName = (LANG === 'ru' && def.nameRu) ? def.nameRu : def.name;
  return '<div class="skill-branch ' + branch + '">'
    + '<h3>' + def.ic + ' ' + branchName + '</h3>'
    + def.tiers.map((_unused, idx) => {
        const tier = idx + 1;
        const tName = skillTierName(branch, idx);
        const unlocked = current >= tier;
        const locked = tier > current + 1;
        const cost = SKILL_COST[idx];
        const ef = describeSkillEffect(branch, tier);
        const cls = unlocked ? 'unlocked' : (locked ? 'locked' : '');
        return '<div class="skill-tier ' + cls + '" '
          + (unlocked || locked ? '' : 'data-skill="' + branch + '" data-tier="' + tier + '"')
          + '>'
          + '<div class="ic">' + def.ic + '</div>'
          + '<div class="nm">' + tName + '</div>'
          + '<div class="ef">' + ef + '</div>'
          + (unlocked ? '<div class="cost">' + t('skills_oath_kept') + '</div>'
              : locked ? '<div class="cost">' + t('skills_locked', { t: (current + 1) }) + '</div>'
              : '<div class="cost">' + t('skills_cost', { c: cost }) + '</div>')
          + '</div>';
      }).join('')
    + '</div>';
}
function describeSkillEffect(branch, tier){
  const RU = (LANG === 'ru');
  if (branch === 'faith'){
    if (tier === 1) return RU ? '+5 макс. ОЗ' : '+5 max HP';
    if (tier === 2) return RU ? '+10 макс. ОЗ всего' : '+10 max HP total';
    if (tier === 3) return RU ? '+15 макс. ОЗ всего · зелья лечат +50%' : '+15 max HP total · healing items +50%';
  }
  if (branch === 'steel'){
    if (tier === 1) return RU ? '+1 атк · небольшой бонус к криту' : '+1 atk · slight crit boost';
    if (tier === 2) return RU ? '+2 атк · шанс крита 20%' : '+2 atk · crit chance 20%';
    if (tier === 3) return RU ? '+3 атк · шанс крита 30% · бонус урона по боссам' : '+3 atk · crit chance 30% · bonus dmg vs bosses';
  }
  if (branch === 'bulwark'){
    if (tier === 1) return RU ? '+1 защ · чуть лучше парирование' : '+1 def · slightly better parry';
    if (tier === 2) return RU ? '+2 защ · шанс парирования 30%' : '+2 def · parry chance 30%';
    if (tier === 3) return RU ? '+3 защ · регенерация 1 ОЗ за ход боя' : '+3 def · regen 1 HP per combat turn';
  }
  return '';
}
function investSkill(branch, tier){
  const current = player.skills[branch] || 0;
  if (tier !== current + 1) return;
  const cost = SKILL_COST[tier - 1];
  if (player.skillPoints < cost){
    setLog(t('log_oath_no_sp'), 'bad'); return;
  }
  player.skillPoints -= cost;
  player.skills[branch] = tier;
  recomputeMaxHp();
  // if Faith — heal up to new max
  if (branch === 'faith') player.hp = Math.min(player.maxHp, player.hp + 5);
  save();
  openSkills();
  setLog(t('log_oath', { name: skillTierName(branch, tier - 1), ef: describeSkillEffect(branch, tier) }), 'good');
  renderScene();
}
skillModal.addEventListener('click', e => {
  if (e.target === skillModal) skillModal.classList.remove('show');
});

/* ═══ INVENTORY UI ════════════════════════════════════ */
function renderInventory(){
  // equipped slots
  const eqGrid = document.getElementById('equipped-grid');
  const clickHint = (LANG === 'ru') ? 'нажми чтобы снять' : 'click to unequip';
  eqGrid.innerHTML = ['weapon','armor','trinket'].map(slot => {
    const entry = findEquipped(slot);
    const it = entry ? ITEMS[entry.id] : null;
    const dn = entry ? displayName(entry) : '';
    const slotLabel = slotName(slot);
    return '<div class="equip-slot' + (it ? '' : ' empty') + '" data-unequip="' + slot + '" title="' + (it ? clickHint : t('slot_empty')) + '">'
      + '<div class="slot-label">' + slotLabel + '</div>'
      + (it
          ? '<div class="em">' + renderSpriteHTML(it.sp, it.em, 'md') + '</div><div class="nm tier-' + it.tier + '">' + dn + '</div>'
          : '<div class="em" style="opacity:0.3;">·</div><div class="nm">' + t('slot_empty') + '</div>')
      + '</div>';
  }).join('');
  eqGrid.querySelectorAll('[data-unequip]').forEach(el => {
    el.addEventListener('click', () => {
      const slot = el.dataset.unequip;
      const entry = findEquipped(slot);
      if (!entry) return;
      player.equipped[slot] = null;
      setLog(t('log_unequip', { name: displayName(entry) }), '');
      save(); renderScene();
    });
    el.addEventListener('mouseenter', e => {
      const entry = findEquipped(el.dataset.unequip);
      if (entry) showTooltip(e, entry);
    });
    el.addEventListener('mouseleave', hideTooltip);
  });
  // satchel
  const grid = document.getElementById('inv-grid');
  const SLOTS = 24;
  let html = '';
  for (let i = 0; i < SLOTS; i++){
    const it = player.inventory[i];
    if (!it){
      html += '<div class="inv-cell empty"></div>';
    } else {
      const item = ITEMS[it.id];
      if (!item){ html += '<div class="inv-cell empty"></div>'; continue; }
      const dn = displayName(it);
      const equipped = (it.uid != null) && (
        player.equipped.weapon === it.uid ||
        player.equipped.armor  === it.uid ||
        player.equipped.trinket === it.uid
      );
      const affixDots = (it.affixes && it.affixes.length)
        ? '<div class="affix-dots">' + '●'.repeat(it.affixes.length) + '</div>'
        : '';
      html += '<div class="inv-cell tier-' + item.tier + (equipped ? ' is-equipped' : '') + '" data-idx="' + i + '" title="' + dn.replace(/"/g, '&quot;') + '">'
        + '<div class="tier-mark tier-' + item.tier + '"></div>'
        + '<div class="em">' + renderSpriteHTML(item.sp, item.em, 'sm') + '</div>'
        + (it.qty > 1 ? '<div class="qty">×' + it.qty + '</div>' : '')
        + affixDots
        + (equipped ? '<div class="equip-tag">✓</div>' : '')
        + '</div>';
    }
  }
  grid.innerHTML = html;
  grid.querySelectorAll('[data-idx]').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const entry = player.inventory[idx];
    if (!entry) return;
    el.addEventListener('mouseenter', e => showTooltip(e, entry));
    el.addEventListener('mouseleave', hideTooltip);
    el.addEventListener('click', () => useOrEquipEntry(idx));
  });
}
function useOrEquipEntry(idx){
  const entry = player.inventory[idx]; if (!entry) return;
  const it = ITEMS[entry.id]; if (!it) return;
  if (it.slot === 'cons'){
    if (player.hp >= player.maxHp){ setLog(t('log_already_full'), ''); renderScene(); return; }
    const mult = effectiveHealMul();
    const healed = Math.max(1, Math.floor(it.heal * mult));
    player.hp = Math.min(player.maxHp, player.hp + healed);
    floatDmg('+' + healed, true);
    entry.qty -= 1;
    if (entry.qty <= 0) player.inventory.splice(idx, 1);
    setLog(t('log_drink', { name: nameFor(it), n: healed }), 'good');
    save(); renderScene();
    return;
  }
  if (it.slot === 'weapon' || it.slot === 'armor' || it.slot === 'trinket'){
    // toggle: clicking the equipped one unequips
    if (player.equipped[it.slot] === entry.uid){
      player.equipped[it.slot] = null;
      setLog(t('log_unequip', { name: displayName(entry) }), '');
    } else {
      player.equipped[it.slot] = entry.uid;
      setLog(t('log_equip', { name: displayName(entry) }), 'good');
    }
    save(); renderScene();
    return;
  }
  if (it.slot === 'mat'){
    setLog(t('log_mat_hint'), '');
    renderScene();
    return;
  }
}

/* ═══ TOOLTIP ═════════════════════════════════════════ */
const tip = document.getElementById('item-tip');
function showTooltip(e, entry){
  if (!entry || !ITEMS[entry.id]) return;
  const item = ITEMS[entry.id];
  const tierC = TIERS[item.tier].color;
  const name = displayName(entry);
  // base + affix stats merged for display
  const totalAtk = (item.atk || 0) + affixBonus(entry, 'atk');
  const totalDef = (item.def || 0) + affixBonus(entry, 'def');
  const totalRegen = affixBonus(entry, 'hpRegen') + (item.curseHpRegen || 0);
  const totalHealMul = affixBonus(entry, 'healMul');
  const totalLifesteal = affixBonus(entry, 'lifesteal');
  const totalFire = affixBonus(entry, 'fireDmg');
  let stats = '';
  if (totalAtk) stats += '<span class="' + (totalAtk>=0?'atk':'curse') + '">⚔︎ ' + (totalAtk>=0?'+':'') + totalAtk + '</span> ';
  if (totalDef) stats += '<span class="' + (totalDef>=0?'def':'curse') + '">⛨ ' + (totalDef>=0?'+':'') + totalDef + '</span> ';
  if (item.heal) stats += '<span class="heal">✚ +' + item.heal + '</span> ';
  if (totalRegen) stats += '<span class="' + (totalRegen>0?'heal':'curse') + '">❤ ' + (totalRegen>0?'+':'') + totalRegen + t('regen_per_turn') + '</span> ';
  if (totalLifesteal > 0) stats += '<span class="atk">🩸 ' + Math.round(totalLifesteal*100) + '% ' + t('lifesteal_label') + '</span> ';
  if (totalFire > 0) stats += '<span class="heal">🔥 +' + totalFire + ' ' + t('fire_label') + '</span> ';
  if (totalHealMul > 0) stats += '<span class="heal">✚ +' + Math.round(totalHealMul*100) + '% ' + t('potions_label') + '</span> ';
  const affixList = (entry.affixes || []).map(k => {
    const a = AFFIXES[k]; if (!a) return '';
    const isCursed = (a.tags || []).includes('cursed');
    return '<div class="aff' + (isCursed ? ' cursed' : '') + '">› ' + affixName(k) + '</div>';
  }).join('');
  tip.style.display = 'block';
  tip.innerHTML =
    '<div class="nm" style="color:' + tierC + ';">' + item.em + ' ' + name + '</div>'
    + '<div class="tt">' + slotName(item.slot) + ' · ' + tierName(item.tier) + ' · ' + (item.value || 0) + (LANG === 'ru' ? 'з' : 'g') + '</div>'
    + (stats ? '<div class="stats">' + stats + '</div>' : '')
    + (affixList ? '<div class="affixes">' + affixList + '</div>' : '')
    + '<div class="desc">' + descFor(item) + '</div>';
  positionTip(e);
}
function positionTip(e){
  const rect = tip.getBoundingClientRect();
  const x = Math.min(window.innerWidth - rect.width - 12, e.clientX + 16);
  const y = Math.min(window.innerHeight - rect.height - 12, e.clientY + 16);
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}
function hideTooltip(){ tip.style.display = 'none'; }
document.addEventListener('mousemove', e => {
  if (tip.style.display === 'block') positionTip(e);
});

/* ═══ EFFECTS ═════════════════════════════════════════ */
function floatDmg(text, good){
  const rect = sceneEl.getBoundingClientRect();
  const d = document.createElement('div');
  d.className = 'dmg-float' + (good ? ' heal' : '');
  d.textContent = text;
  d.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 80) + 'px';
  d.style.top  = (rect.top + rect.height / 2) + 'px';
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 1400);
}
function shakeScene(){
  sceneEl.classList.remove('shaking');
  void sceneEl.offsetWidth;
  sceneEl.classList.add('shaking');
  setTimeout(() => sceneEl.classList.remove('shaking'), 260);
}

/* ═══ INIT ═══════════════════════════════════════════ */
// wire language toggle buttons
document.querySelectorAll('[data-lang-set]').forEach(b => {
  b.addEventListener('click', () => setLang(b.dataset.langSet));
});
// hook up the canvas keyboard/mouse + touch + leave button
bindInput();
updateLeaveBtnText();
// apply persisted language on boot so all chrome syncs from the saved choice
setLang(LANG);
renderScene();
</script>
