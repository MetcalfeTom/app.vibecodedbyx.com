<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elaine Test</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🧪">
  <meta property="og:title" content="Elaine Test">
  <meta property="og:description" content="A little test page. Hello Elaine!">
  <meta property="og:url" content="https://sloppy.live/elaine-test">
  <meta property="og:image" content="https://emojicdn.elk.sh/🧪?style=google">
  <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@100;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0b14;
      color: #e0e0e0;
      font-family: 'Anybody', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    canvas { position: fixed; inset: 0; z-index: 0; }
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-weight: 800;
      font-size: clamp(36px, 10vw, 72px);
      background: linear-gradient(135deg, #ff6ec7, #7b68ee, #00e5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    p {
      font-weight: 100;
      font-size: clamp(16px, 3vw, 22px);
      color: rgba(255,255,255,0.45);
      max-width: 400px;
    }
    .status {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 100;
      font-size: 14px;
      color: rgba(255,255,255,0.3);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #39ff14;
      box-shadow: 0 0 8px #39ff14;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.4; } }
    .backlink {
      position: fixed;
      bottom: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.15);
      text-decoration: none;
      z-index: 10;
    }
    .backlink:hover { color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="content">
    <h1>Hi Elaine!</h1>
    <p>Everything is working. This page is live and served from sloppy.live.</p>
    <div class="status"><div class="dot"></div> Systems operational</div>
  </div>
  <a class="backlink" href="https://sloppy.live" target="_blank">sloppy.live</a>
  <script>
    const c = document.getElementById('bg');
    const ctx = c.getContext('2d');
    let W, H;
    function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
    resize();
    addEventListener('resize', resize);

    const stars = Array.from({ length: 80 }, () => ({
      x: Math.random() * 2000 - 500,
      y: Math.random() * 2000 - 500,
      r: Math.random() * 1.5 + 0.5,
      speed: Math.random() * 0.3 + 0.1,
      hue: Math.random() * 60 + 240,
    }));

    let t = 0;
    function draw() {
      t += 0.003;
      ctx.fillStyle = 'rgba(11,11,20,0.15)';
      ctx.fillRect(0, 0, W, H);
      for (const s of stars) {
        const x = s.x + Math.sin(t * s.speed) * 30;
        const y = s.y + Math.cos(t * s.speed * 0.7) * 20;
        const sx = ((x % W) + W) % W;
        const sy = ((y % H) + H) % H;
        ctx.beginPath();
        ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${s.hue}, 70%, 75%, ${0.4 + Math.sin(t * 2 + s.x) * 0.3})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
