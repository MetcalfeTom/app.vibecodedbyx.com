<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DVD Bounce</title>
<link rel="icon" href="https://emojicdn.elk.sh/📀">
<meta property="og:title" content="DVD Bounce">
<meta property="og:description" content="The classic bouncing DVD logo. Watch it change color on every wall hit. Will it hit the corner?">
<meta property="og:url" content="https://sloppy.live/dvd-bounce">
<meta property="og:image" content="https://sloppy.live/dvd-bounce/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Lexend+Mega:wght@800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none}
canvas{display:block;position:fixed;inset:0}
.hud{position:fixed;top:12px;right:16px;z-index:10;font-family:'Space Mono',monospace;text-align:right;pointer-events:none}
.corner-count{font-size:clamp(24px,5vw,48px);font-weight:bold;transition:color 0.3s,text-shadow 0.3s}
.corner-label{font-size:11px;color:#444;letter-spacing:2px;margin-top:2px}
.wall-row{font-size:11px;color:#333;margin-top:8px}
.celebration{position:fixed;inset:0;z-index:5;pointer-events:none;display:none}
.celebration.show{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
<div class="corner-count" id="cornerCount">0</div>
<div class="corner-label">CORNER HITS</div>
<div class="wall-row" id="wallCount">walls: 0</div>
</div>
<canvas class="celebration" id="confetti"></canvas>

<script>
var c=document.getElementById('c'),ctx=c.getContext('2d');
var conf=document.getElementById('confetti'),cctx=conf.getContext('2d');
var W,H;
function resize(){W=c.width=conf.width=window.innerWidth;H=c.height=conf.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

var COLORS=['#ff0055','#ff6600','#ffcc00','#00ff66','#00ccff','#0066ff','#aa00ff','#ff00aa','#ff3388','#00ffaa','#ff4444','#44ffcc','#ffaa00','#cc44ff','#44aaff'];
var colorIdx=0;
var color=COLORS[0];

// DVD logo dimensions
var LW=160,LH=80;
var x=W/2-LW/2,y=H/2-LH/2;
var speed=2.2;
var vx=speed,vy=speed;
// Slight randomize so it doesn't loop predictably
if(Math.random()>0.5)vx=-vx;
if(Math.random()>0.5)vy=-vy;

var corners=0,walls=0;
var cornerEl=document.getElementById('cornerCount');
var wallEl=document.getElementById('wallCount');
var confettiParts=[];
var cornerFlash=0;
var trail=[];
var MAX_TRAIL=12;

function nextColor(){
  colorIdx=(colorIdx+1)%COLORS.length;
  color=COLORS[colorIdx];
}

function drawDVDLogo(px,py,col,alpha){
  ctx.save();
  ctx.globalAlpha=alpha||1;
  // DVD shape: rounded rectangle with "DVD" text and disc swoosh
  var w=LW,h=LH;
  var r=12;

  // Glow
  ctx.shadowColor=col;
  ctx.shadowBlur=20;

  // Main shape
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(px+r,py);
  ctx.lineTo(px+w-r,py);
  ctx.quadraticCurveTo(px+w,py,px+w,py+r);
  ctx.lineTo(px+w,py+h-r);
  ctx.quadraticCurveTo(px+w,py+h,px+w-r,py+h);
  ctx.lineTo(px+r,py+h);
  ctx.quadraticCurveTo(px,py+h,px,py+h-r);
  ctx.lineTo(px,py+r);
  ctx.quadraticCurveTo(px,py,px+r,py);
  ctx.closePath();
  ctx.fill();

  // DVD text
  ctx.shadowBlur=0;
  ctx.fillStyle='#000';
  ctx.font='900 '+Math.floor(h*0.52)+'px Lexend Mega, sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('DVD',px+w/2,py+h*0.4);

  // VIDEO swoosh line
  ctx.font='bold '+Math.floor(h*0.16)+'px Space Mono, monospace';
  ctx.letterSpacing='3px';
  ctx.fillText('V I D E O',px+w/2,py+h*0.72);

  // Disc icon
  ctx.beginPath();
  ctx.arc(px+w*0.82,py+h*0.68,h*0.11,0,Math.PI*2);
  ctx.fillStyle='#000';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px+w*0.82,py+h*0.68,h*0.04,0,Math.PI*2);
  ctx.fillStyle=col;
  ctx.fill();

  ctx.globalAlpha=1;
  ctx.restore();
}

function spawnConfetti(cx,cy){
  for(var i=0;i<80;i++){
    var a=Math.random()*Math.PI*2;
    var spd=2+Math.random()*6;
    confettiParts.push({
      x:cx,y:cy,
      vx:Math.cos(a)*spd,
      vy:Math.sin(a)*spd-2,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      size:3+Math.random()*5,
      life:60+Math.random()*40,
      rot:Math.random()*Math.PI*2,
      vr:(Math.random()-0.5)*0.3
    });
  }
  conf.classList.add('show');
}

function updateConfetti(){
  if(confettiParts.length===0){conf.classList.remove('show');return}
  cctx.clearRect(0,0,W,H);
  for(var i=confettiParts.length-1;i>=0;i--){
    var p=confettiParts[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.08;
    p.vx*=0.99;
    p.rot+=p.vr;
    p.life--;
    if(p.life<=0){confettiParts.splice(i,1);continue}
    cctx.save();
    cctx.translate(p.x,p.y);
    cctx.rotate(p.rot);
    cctx.globalAlpha=Math.min(1,p.life/20);
    cctx.fillStyle=p.color;
    cctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
    cctx.restore();
  }
}

function update(){
  requestAnimationFrame(update);

  // Background
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(0,0,W,H);

  // Corner flash
  if(cornerFlash>0){
    ctx.fillStyle='rgba(255,255,255,'+cornerFlash*0.15+')';
    ctx.fillRect(0,0,W,H);
    cornerFlash-=0.04;
  }

  // Move
  x+=vx;y+=vy;

  var hitX=false,hitY=false;

  if(x<=0){x=0;vx=Math.abs(vx);hitX=true}
  if(x+LW>=W){x=W-LW;vx=-Math.abs(vx);hitX=true}
  if(y<=0){y=0;vy=Math.abs(vy);hitY=true}
  if(y+LH>=H){y=H-LH;vy=-Math.abs(vy);hitY=true}

  if(hitX||hitY){
    nextColor();
    walls++;
    wallEl.textContent='walls: '+walls;

    if(hitX&&hitY){
      // CORNER HIT!
      corners++;
      cornerEl.textContent=corners;
      cornerEl.style.color=color;
      cornerEl.style.textShadow='0 0 20px '+color;
      cornerFlash=1;
      spawnConfetti(x+(vx>0?0:LW),y+(vy>0?0:LH));
    }
  }

  // Trail
  trail.push({x:x,y:y,color:color});
  if(trail.length>MAX_TRAIL)trail.shift();

  // Draw trail
  for(var i=0;i<trail.length-1;i++){
    var t=trail[i];
    var alpha=(i/trail.length)*0.15;
    drawDVDLogo(t.x,t.y,t.color,alpha);
  }

  // Draw main logo
  drawDVDLogo(x,y,color,1);

  // Confetti
  updateConfetti();
}

requestAnimationFrame(update);

// Click to give it a random nudge
document.addEventListener('click',function(e){
  var dx=(e.clientX-(x+LW/2))*0.01;
  var dy=(e.clientY-(y+LH/2))*0.01;
  vx+=dx;vy+=dy;
  // Clamp speed
  var spd=Math.sqrt(vx*vx+vy*vy);
  if(spd>6){vx=vx/spd*6;vy=vy/spd*6}
  if(spd<1){vx=vx/spd*1.5;vy=vy/spd*1.5}
});
</script>
</body>
</html>
