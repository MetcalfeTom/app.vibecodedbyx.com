<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pixel Shader — Trippy Canvas</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌈">
<meta property="og:title" content="Pixel Shader">
<meta property="og:description" content="Hypnotic pixel shaders and colorful particles. Move your mouse. Lose yourself.">
<meta property="og:url" content="https://sloppy.live/pixel-shader">
<meta property="og:image" content="https://sloppy.live/pixel-shader/og-image.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:crosshair}
canvas{display:block;width:100vw;height:100vh;image-rendering:pixelated}
#mode{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  font-family:monospace;font-size:11px;color:rgba(255,255,255,.25);
  pointer-events:none;letter-spacing:1px;text-align:center}
#controls{position:fixed;top:10px;right:10px;display:flex;gap:6px;z-index:5}
#controls button{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.4);font-family:monospace;font-size:10px;padding:5px 10px;
  border-radius:3px;cursor:pointer;transition:all .15s}
#controls button:hover{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.7)}
#controls button.active{border-color:rgba(255,255,255,.5);color:#fff}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <button class="active" data-mode="0">Plasma</button>
  <button data-mode="1">Warp</button>
  <button data-mode="2">Voronoi</button>
  <button data-mode="3">Fractal</button>
  <button data-mode="4">Melt</button>
</div>
<div id="mode">move mouse — click to burst — scroll to zoom</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Low res for pixel look
const SCALE = 4;
let W, H, pw, ph, imgData, buf;
let mx = 0.5, my = 0.5; // normalized mouse
let t = 0;
let mode = 0;
let zoom = 1;
let particles = [];
const MAX_P = 600;

function resize(){
  W = window.innerWidth; H = window.innerHeight;
  pw = Math.floor(W/SCALE); ph = Math.floor(H/SCALE);
  canvas.width = pw; canvas.height = ph;
  imgData = ctx.createImageData(pw, ph);
  buf = imgData.data;
}

// Fast sin/cos approximations
const SIN_TABLE = new Float32Array(4096);
const COS_TABLE = new Float32Array(4096);
for(let i=0;i<4096;i++){
  SIN_TABLE[i] = Math.sin(i/4096*Math.PI*2);
  COS_TABLE[i] = Math.cos(i/4096*Math.PI*2);
}
function fsin(x){ return SIN_TABLE[((x%1+1)%1*4096)|0]; }
function fcos(x){ return COS_TABLE[((x%1+1)%1*4096)|0]; }

function hsl2rgb(h,s,l){
  h=((h%1)+1)%1; s=Math.max(0,Math.min(1,s)); l=Math.max(0,Math.min(1,l));
  const c=(1-Math.abs(2*l-1))*s;
  const x=c*(1-Math.abs((h*6)%2-1));
  const m=l-c/2;
  let r,g,b;
  const hi=h*6|0;
  if(hi===0){r=c;g=x;b=0;}else if(hi===1){r=x;g=c;b=0;}else if(hi===2){r=0;g=c;b=x;}
  else if(hi===3){r=0;g=x;b=c;}else if(hi===4){r=x;g=0;b=c;}else{r=c;g=0;b=x;}
  return [(r+m)*255|0,(g+m)*255|0,(b+m)*255|0];
}

// Shader functions
function shaderPlasma(x, y, t, mx, my){
  const nx = x/pw*zoom, ny = y/ph*zoom;
  const dx = nx-mx*zoom, dy = ny-my*zoom;
  const d = Math.sqrt(dx*dx+dy*dy);
  const v1 = fsin(nx*3 + t*0.15);
  const v2 = fsin(ny*4 - t*0.12 + fcos(nx*2+t*0.08)*2);
  const v3 = fsin(d*6 - t*0.2);
  const v4 = fcos(nx*ny*3 + t*0.1);
  const v = (v1+v2+v3+v4)*0.25;
  const h = v*0.5 + t*0.02;
  const s = 0.7 + fsin(d*4)*0.3;
  const l = 0.4 + v*0.25 + fsin(d*8-t*0.3)*0.1;
  return hsl2rgb(h, s, l);
}

function shaderWarp(x, y, t, mx, my){
  let nx = x/pw*zoom - 0.5*zoom, ny = y/ph*zoom - 0.5*zoom;
  const mdx = mx*zoom-0.5*zoom, mdy = my*zoom-0.5*zoom;
  // Warp toward mouse
  const d = Math.sqrt((nx-mdx)*(nx-mdx)+(ny-mdy)*(ny-mdy));
  const warp = 0.3/(d+0.1);
  nx += fsin(ny*5+t*0.12)*warp;
  ny += fcos(nx*5-t*0.1)*warp;
  const v = fsin(nx*8+t*0.15) + fcos(ny*6-t*0.13) + fsin((nx+ny)*4+t*0.08);
  const h = v*0.15 + t*0.03 + d*0.5;
  const s = 0.8;
  const l = 0.35 + v*0.15;
  return hsl2rgb(h, s, l);
}

function shaderVoronoi(x, y, t, mx, my){
  const nx = x/pw*zoom*4, ny = y/ph*zoom*4;
  let minD = 99, minD2 = 99, cellH = 0;
  for(let i=0;i<8;i++){
    const cx = fsin(i*0.131+t*0.05)*2 + (i%3)*1.5 + mx*zoom*2;
    const cy = fcos(i*0.197-t*0.04)*2 + ((i/3)|0)*1.5 + my*zoom*2;
    const d = Math.sqrt((nx-cx)*(nx-cx)+(ny-cy)*(ny-cy));
    if(d < minD){ minD2=minD; minD=d; cellH=i*0.125+t*0.02; }
    else if(d < minD2) minD2 = d;
  }
  const edge = minD2 - minD;
  const h = cellH;
  const s = 0.7 + edge*0.5;
  const l = 0.15 + edge*0.6;
  return hsl2rgb(h, s, l);
}

function shaderFractal(x, y, t, mx, my){
  let zr = (x/pw*zoom - 0.5*zoom)*3 + mx*zoom*0.5 - 0.5;
  let zi = (y/ph*zoom - 0.5*zoom)*3 + my*zoom*0.5;
  const cr = -0.7 + fsin(t*0.02)*0.15;
  const ci = 0.27 + fcos(t*0.015)*0.1;
  let iter = 0;
  const maxIter = 20;
  while(zr*zr+zi*zi < 4 && iter < maxIter){
    const tmp = zr*zr - zi*zi + cr;
    zi = 2*zr*zi + ci;
    zr = tmp;
    iter++;
  }
  if(iter === maxIter) return [0,0,0];
  const h = iter/maxIter + t*0.01;
  const s = 0.8;
  const l = 0.1 + (iter/maxIter)*0.5;
  return hsl2rgb(h, s, l);
}

function shaderMelt(x, y, t, mx, my){
  const nx = x/pw*zoom, ny = y/ph*zoom;
  const dx = nx-mx*zoom, dy = ny-my*zoom;
  const d = Math.sqrt(dx*dx+dy*dy);
  const angle = Math.atan2(dy, dx);
  const swirl = fsin(d*8 - t*0.25 + angle*3)*0.5;
  const drip = fsin(nx*6 + fcos(ny*3+t*0.1)*3 + t*0.15);
  const v = swirl + drip + fsin(angle*5+t*0.12)*0.5;
  const h = v*0.3 + d*0.4 + t*0.025;
  const s = 0.75 + fsin(d*3)*0.2;
  const l = 0.3 + v*0.2 + (1/(d*3+1))*0.15;
  return hsl2rgb(h, s, l);
}

const shaders = [shaderPlasma, shaderWarp, shaderVoronoi, shaderFractal, shaderMelt];

// Particles
function spawnBurst(px, py, count){
  for(let i=0;i<count && particles.length < MAX_P;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 1 + Math.random()*4;
    particles.push({
      x: px, y: py,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 1,
      decay: 0.005 + Math.random()*0.01,
      hue: Math.random(),
      size: 1 + Math.random()*2,
    });
  }
}

function updateParticles(){
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.98; p.vy *= 0.98;
    p.vy += 0.02; // slight gravity
    p.life -= p.decay;
    // Bounce
    if(p.x<0||p.x>=pw) p.vx*=-0.8;
    if(p.y<0||p.y>=ph) p.vy*=-0.8;
    p.x = Math.max(0, Math.min(pw-1, p.x));
    p.y = Math.max(0, Math.min(ph-1, p.y));
  });
  particles = particles.filter(p => p.life > 0);

  // Ambient particle spawn near mouse
  if(Math.random() < 0.3){
    const px = mx*pw + (Math.random()-0.5)*20;
    const py = my*ph + (Math.random()-0.5)*20;
    if(particles.length < MAX_P){
      particles.push({
        x:px, y:py,
        vx:(Math.random()-0.5)*1.5, vy:(Math.random()-0.5)*1.5-0.5,
        life:0.6+Math.random()*0.4,
        decay:0.008+Math.random()*0.008,
        hue:Math.random(), size:1+Math.random(),
      });
    }
  }
}

function renderParticles(){
  particles.forEach(p => {
    const idx = ((p.y|0)*pw + (p.x|0))*4;
    if(idx<0||idx>=buf.length-3) return;
    const [r,g,b] = hsl2rgb(p.hue + t*0.01, 0.9, 0.4 + p.life*0.4);
    const a = p.life;
    // Additive blend
    buf[idx]   = Math.min(255, buf[idx]   + r*a|0);
    buf[idx+1] = Math.min(255, buf[idx+1] + g*a|0);
    buf[idx+2] = Math.min(255, buf[idx+2] + b*a|0);
  });
}

function frame(){
  t++;
  const shader = shaders[mode];

  // Render shader to pixel buffer
  for(let y=0; y<ph; y++){
    for(let x=0; x<pw; x++){
      const [r,g,b] = shader(x, y, t, mx, my);
      const idx = (y*pw+x)*4;
      buf[idx]=r; buf[idx+1]=g; buf[idx+2]=b; buf[idx+3]=255;
    }
  }

  // Overlay particles
  updateParticles();
  renderParticles();

  ctx.putImageData(imgData, 0, 0);
  requestAnimationFrame(frame);
}

// Input
window.addEventListener('mousemove', e => {
  mx = e.clientX / W;
  my = e.clientY / H;
});
window.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX / W;
  my = e.touches[0].clientY / H;
}, {passive:true});

window.addEventListener('click', e => {
  const px = (e.clientX / W) * pw;
  const py = (e.clientY / H) * ph;
  spawnBurst(px, py, 40);
});
window.addEventListener('touchstart', e => {
  const px = (e.touches[0].clientX / W) * pw;
  const py = (e.touches[0].clientY / H) * ph;
  spawnBurst(px, py, 40);
}, {passive:true});

window.addEventListener('wheel', e => {
  zoom = Math.max(0.3, Math.min(5, zoom + e.deltaY*0.002));
}, {passive:true});

// Mode buttons
document.querySelectorAll('#controls button').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    document.querySelectorAll('#controls button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    mode = parseInt(btn.dataset.mode);
  });
});

window.addEventListener('resize', resize);
resize();
frame();
</script>
</body>
</html>
