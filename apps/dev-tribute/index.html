<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dev Tribute</title>
<meta name="description" content="A big neon button. Push it. Fireworks. Thank the devs." />
<meta property="og:title" content="Dev Tribute" />
<meta property="og:description" content="A big neon button. Push it. Fireworks. Thank the devs." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sloppy.live/dev-tribute" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/big%20glowing%20red%20pink%20neon%20button%20night%20sky%20colorful%20firework%20bursts%20celebration%20vibrant%20joyful%20no%20text?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/🎆" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Fraunces:ital,wght@1,500&family=Silkscreen:wght@400;700&family=VT323&display=swap" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#070418;color:#f8f0ff;font-family:'Silkscreen', monospace}
  body{
    width:100vw;height:100vh;display:flex;flex-direction:column;
    background:
      radial-gradient(circle at 20% 80%, rgba(255,40,180,0.06), transparent 55%),
      radial-gradient(circle at 80% 20%, rgba(40,180,255,0.06), transparent 55%),
      radial-gradient(circle at 50% 50%, #100628 0%, #050216 70%);
    position:relative;align-items:center;justify-content:center;
    cursor:default;
  }
  /* Star field via repeating dot pattern */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
    background-image:
      radial-gradient(1px 1px at 22% 18%, rgba(255,255,255,0.7), transparent 50%),
      radial-gradient(1px 1px at 71% 36%, rgba(255,255,255,0.5), transparent 50%),
      radial-gradient(1px 1px at 12% 64%, rgba(255,255,255,0.6), transparent 50%),
      radial-gradient(1px 1px at 86% 78%, rgba(255,255,255,0.4), transparent 50%),
      radial-gradient(1px 1px at 48% 90%, rgba(255,255,255,0.55), transparent 50%),
      radial-gradient(1px 1px at 33% 8%, rgba(255,255,255,0.35), transparent 50%),
      radial-gradient(1px 1px at 92% 14%, rgba(255,255,255,0.5), transparent 50%),
      radial-gradient(1px 1px at 58% 52%, rgba(255,255,255,0.4), transparent 50%);
    animation:twinkle 4.6s ease-in-out infinite alternate;
  }
  @keyframes twinkle{0%{opacity:0.7}100%{opacity:1}}

  canvas{
    position:fixed;inset:0;width:100vw;height:100vh;z-index:2;
    pointer-events:none;
  }

  header{
    position:relative;z-index:5;text-align:center;padding-top:24px;
  }
  .brand{
    font-family:'Bungee Shade', sans-serif;font-size:clamp(38px, 6vw, 72px);
    color:#f8f0ff;letter-spacing:0.03em;line-height:1;
    text-shadow:0 0 18px rgba(255,80,200,0.6), 0 0 38px rgba(80,180,255,0.4), 4px 4px 0 #000;
  }
  .brand .b1{color:#ff3aa1}
  .brand .b2{color:#3afaff}
  .brand small{
    display:block;font-family:'Silkscreen', monospace;font-size:11px;
    letter-spacing:0.36em;color:rgba(248,240,255,0.55);margin-top:8px;
    text-shadow:none;text-transform:uppercase;
  }

  .stage{
    position:relative;z-index:5;display:flex;flex-direction:column;
    align-items:center;justify-content:center;flex:1;gap:32px;padding:24px;
  }

  .counter{
    font-family:'VT323', monospace;font-size:68px;color:#fff;
    text-shadow:0 0 22px rgba(255,200,80,0.6), 0 0 40px rgba(255,80,200,0.3);
    letter-spacing:0.04em;line-height:1;
    transition:transform 0.18s ease-out, color 0.2s;
  }
  .counter.bump{transform:scale(1.18);color:#ffd766}
  .counter-label{
    font-family:'Silkscreen', monospace;font-size:11px;letter-spacing:0.36em;
    text-transform:uppercase;color:rgba(248,240,255,0.45);margin-top:6px;
  }

  /* THE BUTTON */
  .big-btn{
    position:relative;font-family:'Bungee', sans-serif;
    font-size:clamp(28px, 4.6vw, 56px);
    letter-spacing:0.06em;text-transform:uppercase;
    color:#fff;background:linear-gradient(180deg, #ff3aa1, #c4136a);
    border:4px solid #fff;border-radius:18px;
    padding:28px 56px;cursor:pointer;
    box-shadow:
      0 8px 0 #5a0a3a,
      0 14px 32px rgba(255, 58, 161, 0.45),
      0 0 50px rgba(255, 58, 161, 0.45),
      inset 0 0 20px rgba(255,255,255,0.18);
    transition:transform 0.1s ease-out, box-shadow 0.1s ease-out;
    text-shadow:2px 2px 0 #5a0a3a;
    user-select:none;
  }
  .big-btn:hover{transform:translateY(-2px) scale(1.02)}
  .big-btn:active{
    transform:translateY(8px) scale(0.98);
    box-shadow:
      0 0 0 #5a0a3a,
      0 4px 12px rgba(255, 58, 161, 0.3),
      0 0 60px rgba(255, 58, 161, 0.7),
      inset 0 0 20px rgba(255,255,255,0.3);
  }
  .big-btn .star-l, .big-btn .star-r{
    position:absolute;font-size:32px;color:#ffd766;
    text-shadow:0 0 12px #ffd766;
    animation:starSpin 2.6s linear infinite;
  }
  .big-btn .star-l{left:-30px;top:-20px;animation-delay:-0.5s}
  .big-btn .star-r{right:-30px;bottom:-20px;animation-delay:-1.3s}
  @keyframes starSpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

  /* Floating thank-you messages */
  .float-msg{
    position:absolute;font-family:'Fraunces', serif;font-style:italic;font-weight:500;
    font-size:clamp(20px, 2.8vw, 32px);
    color:#fff;text-shadow:0 0 12px rgba(255,80,200,0.7);
    pointer-events:none;
    animation:floatUp 2.8s ease-out forwards;
    z-index:6;text-align:center;white-space:nowrap;
  }
  @keyframes floatUp{
    0%   {opacity:0;   transform:translate(-50%, 30px) scale(0.85)}
    15%  {opacity:1;   transform:translate(-50%, 0) scale(1)}
    100% {opacity:0;   transform:translate(-50%, -160px) scale(1.05)}
  }

  /* Live tribute ticker — recent thanks from other users */
  .ticker{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    z-index:6;text-align:center;pointer-events:none;
    max-width:90vw;
    font-family:'VT323', monospace;font-size:18px;color:rgba(248,240,255,0.75);
    line-height:1.5;min-height:28px;
    text-shadow:0 0 8px rgba(80,180,255,0.4);
  }
  .ticker .who{color:#3afaff;font-weight:bold}

  .meta{
    position:absolute;top:18px;right:22px;z-index:6;display:flex;gap:8px;
    font-family:'Silkscreen', monospace;font-size:10px;letter-spacing:0.32em;
    text-transform:uppercase;color:rgba(248,240,255,0.55);
    align-items:center;
  }
  .meta .dot{
    width:7px;height:7px;border-radius:50%;background:#7df09d;
    box-shadow:0 0 6px #7df09d;animation:dotPulse 1.5s infinite;
  }
  .meta .dot.gone{background:#7a7080;box-shadow:none;animation:none}
  @keyframes dotPulse{0%,100%{opacity:1}50%{opacity:0.4}}

  .hint{
    position:absolute;bottom:6px;left:0;right:0;z-index:5;text-align:center;
    font-family:'Silkscreen', monospace;font-size:8px;letter-spacing:0.4em;
    text-transform:uppercase;color:rgba(248,240,255,0.25);pointer-events:none;
  }
</style>
</head>
<body>

<canvas id="fx"></canvas>

<header>
  <div class="brand">
    <span class="b1">DEV</span> <span class="b2">TRIBUTE</span>
    <small>push the button · thank the devs · let the sky pop</small>
  </div>
</header>

<div class="meta">
  <span class="dot" id="liveDot"></span><span id="liveLabel">connecting…</span>
</div>

<div class="stage">
  <div>
    <div class="counter" id="counter">0</div>
    <div class="counter-label">thanks · delivered</div>
  </div>

  <button class="big-btn" id="bigBtn">
    <span class="star-l">✦</span>
    THANK THE DEVS
    <span class="star-r">✦</span>
  </button>
</div>

<div class="ticker" id="ticker"></div>
<div class="hint">SPACE to fire · click for chaos</div>

<script type="module">
// ===== FIREWORK CANVAS =====
const cvs = document.getElementById('fx');
const ctx = cvs.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  cvs.width = W * (window.devicePixelRatio || 1);
  cvs.height = H * (window.devicePixelRatio || 1);
  cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
  ctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Particle types: 'rocket' (rising trail) and 'spark' (post-burst).
const particles = [];
const HUES = [330, 30, 200, 285, 60, 175, 350, 0, 105];
function fireRocket(x) {
  // Rocket rises from the bottom toward a target altitude with a
  // sparkly trail. When it reaches the target, it explodes into a
  // cluster of colored sparks.
  const targetY = H * (0.10 + Math.random() * 0.30);
  const startX = x ?? (W * (0.20 + Math.random() * 0.60));
  const hue = HUES[Math.floor(Math.random() * HUES.length)];
  particles.push({
    kind:'rocket',
    x: startX, y: H + 10,
    vx: (Math.random() - 0.5) * 60, vy: -560 - Math.random() * 140,
    hue, targetY, life: 4, t: 0,
  });
  // Whoosh sfx
  blip(220 + Math.random() * 80, 0.50, 'sawtooth', 0.10, 80);
}
function explode(x, y, hue) {
  const N = 50 + Math.floor(Math.random() * 30);
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2 + Math.random() * 0.05;
    const sp = 130 + Math.random() * 120;
    particles.push({
      kind:'spark',
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      hue: hue + (Math.random() - 0.5) * 30,
      life: 1.4 + Math.random() * 0.9, t: 0,
      size: 1.5 + Math.random() * 1.5,
    });
  }
  // Bang sfx
  blip(60, 0.18, 'sawtooth', 0.30);
  setTimeout(() => blip(120, 0.10, 'square', 0.18), 30);
}

let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  // Trail fade — slight alpha clear so particles leave glowing trails
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(7, 4, 24, 0.16)';
  ctx.fillRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'lighter';
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.kind === 'rocket') {
      // Rocket dies and bursts on reaching target altitude
      if (p.y <= p.targetY || p.vy >= 0) {
        explode(p.x, p.y, p.hue);
        particles.splice(i, 1);
        continue;
      }
      // gentle drag
      p.vy *= Math.pow(0.96, dt * 60);
      // Render rocket as a bright dot with a faint trail
      ctx.fillStyle = `hsl(${p.hue}, 100%, 80%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
      // Sparkle trail — tiny dots dropping behind
      if (Math.random() < 0.6) {
        particles.push({
          kind:'spark', x: p.x + (Math.random() - 0.5) * 4, y: p.y + 4,
          vx: (Math.random() - 0.5) * 30, vy: 60 + Math.random() * 40,
          hue: p.hue + (Math.random() - 0.5) * 30,
          life: 0.5, t: 0, size: 1,
        });
      }
    } else {
      // Spark — gravity + drag, fades over life
      p.vy += 220 * dt;        // gravity
      p.vx *= Math.pow(0.985, dt * 60);
      const k = p.t / p.life;
      if (k >= 1) { particles.splice(i, 1); continue; }
      const alpha = 1 - k;
      const r = p.size * (1 - k * 0.4);
      ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalCompositeOperation = 'source-over';
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ===== AUDIO =====
let actx = null;
function ensureAudio() { if (actx) return actx; try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} return actx; }
function blip(freq, dur, type, vol, slideTo) {
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator(); const g = a.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.linearRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol || 0.16, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(a.destination);
  o.start(t); o.stop(t + dur + 0.02);
}

// ===== THANK YOU MESSAGES =====
// Curated celebratory phrases that float up from the button on each click.
const THANKS = [
  'thank you, devs ❤',
  'absolute heroes',
  'shipping unhinged things daily 🙏',
  'this stream is everything',
  'caffeinated saints',
  'building the future, badly, beautifully',
  'standing ovation',
  'commit gods',
  'bless the keyboard fingers',
  'we love you',
  'fork-shaped angels',
  'patch notes are poetry',
  'art directors of chaos',
  'thank you for the slop',
  'long live the vibes',
];
function randomThanks() {
  return THANKS[Math.floor(Math.random() * THANKS.length)];
}

// ===== SUPABASE BROADCAST (optional, fails open) =====
let channel = null, online = 0;
const CLIENT_ID = Math.random().toString(36).slice(2, 10);
const liveDot = document.getElementById('liveDot');
const liveLabel = document.getElementById('liveLabel');

async function initRealtime() {
  try {
    const mod = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    const cfg = await import('/supabase-config-fixed.js')
      .catch(() => import('/supabase-config.js'));
    if (!cfg || !cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY) throw new Error('no config');
    const supabase = mod.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    channel = supabase.channel('dev-tribute-broadcast', {
      config: { broadcast: { self: false }, presence: { key: CLIENT_ID } },
    });
    channel.on('broadcast', { event: 'tribute' }, ({ payload }) => {
      if (!payload) return;
      // Visualize a remote tribute — fire a rocket from a random spot
      // and pop a ticker line crediting the sender.
      fireRocket();
      bumpCounter(1);
      showTicker(payload.who || 'someone', payload.msg || 'thank you');
    });
    channel.on('presence', { event: 'sync' }, () => {
      online = Object.keys(channel.presenceState() || {}).length;
    });
    channel.subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        liveLabel.textContent = 'live';
        liveDot.classList.remove('gone');
        await channel.track({ id: CLIENT_ID, t: Date.now() });
      } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
        liveLabel.textContent = 'offline';
        liveDot.classList.add('gone');
      }
    });
  } catch (e) {
    liveLabel.textContent = 'solo';
    liveDot.classList.add('gone');
  }
}
initRealtime();

// ===== COUNTER + TICKER =====
let count = 0;
const counterEl = document.getElementById('counter');
function bumpCounter(n) {
  count += n || 1;
  counterEl.textContent = count.toLocaleString();
  counterEl.classList.add('bump');
  setTimeout(() => counterEl.classList.remove('bump'), 200);
}

const tickerEl = document.getElementById('ticker');
let tickerTimer = null;
function showTicker(who, msg) {
  tickerEl.innerHTML = `<span class="who">${escapeHtml(who)}</span> · ${escapeHtml(msg)}`;
  if (tickerTimer) clearTimeout(tickerTimer);
  tickerTimer = setTimeout(() => { tickerEl.innerHTML = ''; }, 4000);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ===== FLOATING MESSAGE =====
function spawnFloatMsg(text, x, y) {
  const el = document.createElement('div');
  el.className = 'float-msg';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.textContent = text;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), { once: true });
  setTimeout(() => el.remove(), 3000);
}

// ===== BUTTON CLICK =====
const btn = document.getElementById('bigBtn');
function tribute() {
  ensureAudio();
  const r = btn.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top;
  // 3-5 simultaneous rockets
  const N = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < N; i++) {
    setTimeout(() => fireRocket(W * (0.15 + Math.random() * 0.70)), i * 90);
  }
  bumpCounter(1);
  // Floating thank-you above the button
  const msg = randomThanks();
  spawnFloatMsg(msg, cx, cy);
  // Broadcast to others
  if (channel) {
    channel.send({ type:'broadcast', event:'tribute', payload: { msg, who:'· anon ·' }});
  }
  // Subtle button celebration shake
  btn.animate([
    { transform:'translateY(8px) scale(0.98)' },
    { transform:'translateY(-3px) scale(1.04) rotate(-1deg)' },
    { transform:'translateY(0) scale(1)' },
  ], { duration: 360, easing: 'cubic-bezier(.16,.84,.36,1)' });
}
btn.addEventListener('click', tribute);
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    tribute();
  }
});

// Auto-fire one celebratory rocket on first frame so the page never feels empty
setTimeout(() => fireRocket(), 600);
</script>
</body>
</html>
