<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machina Coffea</title>
<link rel="icon" href="https://emojicdn.elk.sh/☕">
<meta property="og:title" content="Machina Coffea">
<meta property="og:description" content="An ancient Roman coffee machine with mysterious Latin buttons and chaotic liquid physics.">
<meta property="og:url" content="https://app.sloppy.live/latin-coffee/">
<meta property="og:image" content="https://emojicdn.elk.sh/☕?style=apple&size=512">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a0e08;font-family:'Cinzel',serif;color:#d4a867;
  display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;
  background-image:radial-gradient(ellipse at 50% 30%,rgba(120,60,10,0.15),transparent 70%)}
h1{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.4rem,4vw,2.6rem);
  text-align:center;margin-bottom:8px;letter-spacing:0.12em;
  text-shadow:0 0 20px rgba(212,168,103,0.4),0 2px 4px rgba(0,0,0,0.6)}
#subtitle{font-family:'IM Fell English SC',serif;font-size:clamp(0.7rem,2vw,0.95rem);
  opacity:0.5;margin-bottom:16px;letter-spacing:0.2em;text-transform:uppercase}
#machine{position:relative;width:min(400px,90vw);height:min(520px,70vh)}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:16px}
#bgCanvas{z-index:0}
#liquidCanvas{z-index:1;pointer-events:none}
#buttons{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);z-index:2;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;width:85%}
.btn{cursor:pointer;background:linear-gradient(180deg,#3a2210 0%,#261508 100%);
  border:2px solid #6b4420;border-radius:8px;padding:12px 8px;text-align:center;
  color:#d4a867;font-family:'Cinzel',serif;font-size:clamp(0.65rem,1.8vw,0.85rem);
  font-weight:600;letter-spacing:0.08em;transition:all 0.15s;position:relative;
  box-shadow:0 2px 8px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,200,100,0.1);
  text-shadow:0 1px 3px rgba(0,0,0,0.8)}
.btn:hover{background:linear-gradient(180deg,#4a3018 0%,#3a2210 100%);
  border-color:#a06830;box-shadow:0 0 20px rgba(212,168,103,0.2),0 2px 8px rgba(0,0,0,0.5)}
.btn:active{transform:scale(0.96);border-color:#d4a867}
.btn .icon{font-size:1.4em;display:block;margin-bottom:4px}
.btn .sub{font-family:'IM Fell English SC',serif;font-size:0.7em;opacity:0.5;display:block;margin-top:3px}
#cup{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);z-index:2;
  text-align:center;pointer-events:none}
#cupEmoji{font-size:clamp(3rem,8vw,4.5rem);filter:drop-shadow(0 4px 12px rgba(0,0,0,0.6))}
#status{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);z-index:3;
  font-family:'IM Fell English SC',serif;font-size:clamp(0.65rem,2vw,0.85rem);
  text-align:center;opacity:0.7;min-height:1.2em;max-width:90%;
  text-shadow:0 1px 4px rgba(0,0,0,0.8)}
#pressure{position:absolute;top:8%;right:8%;z-index:2;width:50px;height:50px}
#steam{position:absolute;top:2%;left:50%;transform:translateX(-50%);z-index:1;
  pointer-events:none;width:100%;height:60px}
#backlink{position:fixed;bottom:8px;right:12px;z-index:10;font-size:0.65rem;opacity:0.3}
#backlink a{color:#d4a867;text-decoration:none}
</style>
</head>
<body>
<h1>MACHINA COFFEA</h1>
<div id="subtitle">Apparatus Antiquus Potionum</div>
<div id="machine">
  <canvas id="bgCanvas"></canvas>
  <canvas id="liquidCanvas"></canvas>
  <div id="buttons"></div>
  <div id="cup"><div id="cupEmoji">☕</div></div>
  <canvas id="pressure"></canvas>
  <div id="status"></div>
</div>
<div id="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
// --- Config ---
const DRINKS = [
  { name:'AQUA NIGRA', sub:'Tenebris Fortis', icon:'⚫', desc:'The void stares back from this cup.',
    color:'#1a0800', particle:'#3a2200', steam:'#443322' },
  { name:'LACTEUM DULCE', sub:'Suavitas Alba', icon:'🥛', desc:'Suspiciously warm. Possibly sentient milk.',
    color:'#f0e6d0', particle:'#fff8ee', steam:'#ffffff' },
  { name:'SANGUIS RUBRUM', sub:'Vim et Vigor', icon:'🩸', desc:'Not blood. Probably. Cherry espresso.',
    color:'#8b0000', particle:'#ff2020', steam:'#ff6666' },
  { name:'VIRIDIS MORBUS', sub:'Herba Amara', icon:'🧪', desc:'Matcha gone terribly, terribly wrong.',
    color:'#1a4a0a', particle:'#33ff00', steam:'#88ff44' },
  { name:'AURUM LIQUIDUM', sub:'Divitiae Potabiles', icon:'✨', desc:'24 karat flavor. Tax not included.',
    color:'#b8860b', particle:'#ffd700', steam:'#ffee88' },
  { name:'PURPURA MYSTICUM', sub:'Somnia Profunda', icon:'🔮', desc:'You will see things. Many things.',
    color:'#2a0040', particle:'#aa00ff', steam:'#cc66ff' },
  { name:'IGNIS INFERNUS', sub:'Periculum Maximum', icon:'🔥', desc:'Signed waiver required. Not available in Pompeii.',
    color:'#ff2200', particle:'#ff6600', steam:'#ffaa00' },
  { name:'CAELUM GLACIALE', sub:'Frigus Aeternum', icon:'❄️', desc:'So cold it forgot what temperature is.',
    color:'#0066cc', particle:'#00ccff', steam:'#aaeeff' },
];

const CHAOS_EVENTS = [
  'Machina tremit violenter!', // Machine shakes violently
  'Liquor in omnes partes effunditur!', // Liquid spills everywhere
  'Spiritus caffeinatus apparet!', // A caffeine ghost appears
  'Pressura nimis alta est!', // Pressure too high
  'Sonus terribilis ex machina!', // Terrible sound from machine
  'Fulgur ex calice!', // Lightning from the cup
  'Nebula mystica surgit!', // Mystical fog rises
  'Tempestas in calice!', // Storm in a cup
];

const LATIN_WARNINGS = [
  'CAVE! Potio instabilis est.',
  'MEMENTO: Non est aqua ordinaria.',
  'PERICULUM! Temperatura ignota.',
  'NOTA BENE: Effectus varii possibiles.',
  'MONITUS: Gravitatis anomalia detecta.',
  'CAVEAT EMPTOR: Nullae refusiones.',
];

// --- Canvas setup ---
const bgC = document.getElementById('bgCanvas');
const lqC = document.getElementById('liquidCanvas');
const prC = document.getElementById('pressure');
const bgCtx = bgC.getContext('2d');
const lqCtx = lqC.getContext('2d');
const prCtx = prC.getContext('2d');

function resize() {
  const m = document.getElementById('machine');
  const w = m.offsetWidth, h = m.offsetHeight;
  bgC.width = lqC.width = w; bgC.height = lqC.height = h;
  prC.width = prC.height = 50;
}
resize();
window.addEventListener('resize', resize);

// --- State ---
let liquidParticles = [];
let steamParticles = [];
let shakeTime = 0;
let shakeIntensity = 0;
let brewing = false;
let brewProgress = 0;
let currentDrink = null;
let pressureVal = 0.3;
let pressureTarget = 0.3;
let chaosLevel = 0;
let statusText = 'Parata ad ministrandum.';
let drips = [];
let sparks = [];
let glowPulse = 0;

const statusEl = document.getElementById('status');
const cupEmoji = document.getElementById('cupEmoji');

// --- Audio ---
let actx = null;
function initAudio() { if(!actx) actx = new AudioContext(); }

function playGrind() {
  if(!actx) return;
  const dur = 0.6;
  const buf = actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++){
    const t=i/d.length;
    d[i]=(Math.random()*2-1)*0.3*(1-t*0.5)*Math.sin(t*80);
  }
  const src=actx.createBufferSource(); src.buffer=buf;
  const f=actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=300; f.Q.value=2;
  const g=actx.createGain(); g.gain.value=0.4;
  src.connect(f).connect(g).connect(actx.destination); src.start();
}

function playPour() {
  if(!actx) return;
  const dur = 1.2;
  const buf = actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++){
    const t=i/d.length;
    d[i]=(Math.random()*2-1)*0.15*(0.5+Math.sin(t*40)*0.5)*(1-t*0.3);
  }
  const src=actx.createBufferSource(); src.buffer=buf;
  const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=800;
  const g=actx.createGain(); g.gain.value=0.3;
  src.connect(f).connect(g).connect(actx.destination); src.start();
}

function playHiss() {
  if(!actx) return;
  const dur = 0.4;
  const buf = actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const t=i/d.length; d[i]=(Math.random()*2-1)*0.2*(1-t);}
  const src=actx.createBufferSource(); src.buffer=buf;
  const f=actx.createBiquadFilter(); f.type='highpass'; f.frequency.value=3000;
  const g=actx.createGain(); g.gain.value=0.2;
  src.connect(f).connect(g).connect(actx.destination); src.start();
}

function playChaos() {
  if(!actx) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(80+Math.random()*200, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(40, actx.currentTime+0.5);
  g.gain.setValueAtTime(0.15, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.5);
  o.connect(g).connect(actx.destination); o.start(); o.stop(actx.currentTime+0.5);
}

function playDing() {
  if(!actx) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type='sine'; o.frequency.value=880;
  g.gain.setValueAtTime(0.3, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.6);
  o.connect(g).connect(actx.destination); o.start(); o.stop(actx.currentTime+0.6);
}

// --- Buttons ---
const btnContainer = document.getElementById('buttons');
DRINKS.forEach((drink, i) => {
  const btn = document.createElement('div');
  btn.className = 'btn';
  btn.innerHTML = `<span class="icon">${drink.icon}</span>${drink.name}<span class="sub">${drink.sub}</span>`;
  btn.addEventListener('click', () => startBrew(drink));
  btnContainer.appendChild(btn);
});

// --- Brew ---
function startBrew(drink) {
  if (brewing) return;
  initAudio();
  brewing = true;
  brewProgress = 0;
  currentDrink = drink;
  pressureTarget = 0.5 + Math.random()*0.5;
  chaosLevel = 0;
  liquidParticles = [];
  drips = [];
  sparks = [];

  statusText = `Praeparatio: ${drink.name}...`;
  cupEmoji.textContent = '☕';

  playGrind();
  shakeTime = 0.8; shakeIntensity = 3;

  // Brewing timeline
  setTimeout(() => {
    playHiss();
    statusText = 'Pressura aedificatur...';
    pressureTarget = 0.7 + Math.random()*0.3;
    shakeTime = 0.5; shakeIntensity = 5;
  }, 800);

  setTimeout(() => {
    playPour();
    statusText = 'Liquor fluit!';
    // Spawn pour particles
    spawnPour(drink);
  }, 1800);

  // Random chaos during brew
  setTimeout(() => {
    if (Math.random() < 0.6) triggerChaos(drink);
  }, 1200);

  setTimeout(() => {
    if (Math.random() < 0.4) triggerChaos(drink);
  }, 2500);

  setTimeout(() => {
    playDing();
    brewing = false;
    pressureTarget = 0.2;
    statusText = `"${drink.desc}"`;
    cupEmoji.textContent = drink.icon;

    // Warning
    setTimeout(() => {
      statusText = LATIN_WARNINGS[Math.floor(Math.random()*LATIN_WARNINGS.length)];
    }, 4000);
  }, 3500);
}

function spawnPour(drink) {
  const cx = lqC.width / 2;
  const startY = lqC.height * 0.32;
  const endY = lqC.height * 0.78;

  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      for (let j = 0; j < 3; j++) {
        liquidParticles.push({
          x: cx + (Math.random()-0.5)*20,
          y: startY,
          vx: (Math.random()-0.5)*2,
          vy: 1 + Math.random()*3,
          r: 2 + Math.random()*4,
          color: drink.particle,
          baseColor: drink.color,
          life: 1,
          decay: 0.008 + Math.random()*0.005,
          gravity: 0.15,
          splashed: false,
          endY: endY
        });
      }
    }, i * 20);
  }

  // Steam
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      steamParticles.push({
        x: cx + (Math.random()-0.5)*30,
        y: endY - 10,
        vx: (Math.random()-0.5)*0.8,
        vy: -0.5 - Math.random()*1.5,
        r: 3 + Math.random()*6,
        color: drink.steam,
        life: 1,
        decay: 0.015 + Math.random()*0.01
      });
    }, 1200 + i*40);
  }
}

function triggerChaos(drink) {
  chaosLevel++;
  const event = CHAOS_EVENTS[Math.floor(Math.random()*CHAOS_EVENTS.length)];
  statusText = '⚠️ ' + event;
  playChaos();
  shakeTime = 1.2;
  shakeIntensity = 8 + chaosLevel*3;
  pressureTarget = Math.min(1, pressureTarget + 0.2);

  // Splatter particles everywhere
  const cx = lqC.width/2, cy = lqC.height/2;
  for (let i = 0; i < 30; i++) {
    const a = Math.random()*Math.PI*2;
    const spd = 2 + Math.random()*6;
    liquidParticles.push({
      x: cx + (Math.random()-0.5)*100,
      y: cy + (Math.random()-0.5)*100,
      vx: Math.cos(a)*spd,
      vy: Math.sin(a)*spd,
      r: 2+Math.random()*5,
      color: drink.particle,
      baseColor: drink.color,
      life: 1,
      decay: 0.012,
      gravity: 0.1,
      splashed: false,
      endY: lqC.height+50
    });
  }

  // Sparks
  for (let i = 0; i < 15; i++) {
    const a = Math.random()*Math.PI*2;
    sparks.push({
      x: cx + (Math.random()-0.5)*80,
      y: cy + (Math.random()-0.5)*80,
      vx: Math.cos(a)*(3+Math.random()*4),
      vy: Math.sin(a)*(3+Math.random()*4),
      life: 1, color: '#ffd700'
    });
  }

  // Drip stains
  for (let i = 0; i < 8; i++) {
    drips.push({
      x: Math.random()*lqC.width,
      y: Math.random()*lqC.height,
      r: 5+Math.random()*15,
      color: drink.color,
      life: 1
    });
  }
}

// --- Draw background ---
function drawBg(t) {
  const w = bgC.width, h = bgC.height;
  bgCtx.clearRect(0,0,w,h);

  // Machine body
  const grad = bgCtx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, '#2a1808');
  grad.addColorStop(0.3, '#1a0e06');
  grad.addColorStop(0.7, '#1a0e06');
  grad.addColorStop(1, '#0d0703');
  bgCtx.fillStyle = grad;
  bgCtx.beginPath();
  bgCtx.roundRect(0,0,w,h,16);
  bgCtx.fill();

  // Metal trim
  bgCtx.strokeStyle = '#6b4420';
  bgCtx.lineWidth = 3;
  bgCtx.beginPath();
  bgCtx.roundRect(4,4,w-8,h-8,14);
  bgCtx.stroke();

  // Rivets
  bgCtx.fillStyle = '#4a3018';
  const rivets = [[15,15],[w-15,15],[15,h-15],[w-15,h-15],[w/2,8],[w/2,h-8]];
  for(const [rx,ry] of rivets) {
    bgCtx.beginPath(); bgCtx.arc(rx,ry,4,0,Math.PI*2); bgCtx.fill();
    bgCtx.strokeStyle='#5a3820'; bgCtx.lineWidth=1;
    bgCtx.beginPath(); bgCtx.arc(rx,ry,4,0,Math.PI*2); bgCtx.stroke();
  }

  // Nozzle area
  bgCtx.fillStyle = '#0d0703';
  bgCtx.fillRect(w*0.35, h*0.28, w*0.3, h*0.08);
  bgCtx.strokeStyle = '#3a2210';
  bgCtx.lineWidth = 2;
  bgCtx.strokeRect(w*0.35, h*0.28, w*0.3, h*0.08);

  // Nozzle drip point
  bgCtx.fillStyle = '#4a3018';
  bgCtx.fillRect(w*0.47, h*0.36, w*0.06, h*0.02);

  // Cup platform
  bgCtx.fillStyle = '#1a0e06';
  bgCtx.fillRect(w*0.2, h*0.82, w*0.6, h*0.04);
  bgCtx.strokeStyle = '#3a2210';
  bgCtx.strokeRect(w*0.2, h*0.82, w*0.6, h*0.04);

  // Glow from nozzle
  glowPulse += 0.03;
  const glowA = brewing ? 0.3+Math.sin(glowPulse*4)*0.15 : 0.05+Math.sin(glowPulse)*0.03;
  const glowCol = currentDrink ? currentDrink.particle : '#d4a867';
  const gg = bgCtx.createRadialGradient(w/2,h*0.37,2, w/2,h*0.37,60);
  gg.addColorStop(0, glowCol);
  gg.addColorStop(1, 'transparent');
  bgCtx.globalAlpha = glowA;
  bgCtx.fillStyle = gg;
  bgCtx.fillRect(w*0.2,h*0.3,w*0.6,h*0.15);
  bgCtx.globalAlpha = 1;

  // Inscription
  bgCtx.fillStyle = '#6b4420';
  bgCtx.globalAlpha = 0.4;
  bgCtx.font = '600 10px "Cinzel", serif';
  bgCtx.textAlign = 'center';
  bgCtx.fillText('SPQR · COFFEA · MMXXVI', w/2, h*0.95);
  bgCtx.globalAlpha = 1;
}

// --- Draw liquid layer ---
function drawLiquid(t) {
  const w = lqC.width, h = lqC.height;
  lqCtx.clearRect(0,0,w,h);

  // Shake offset
  let sx=0, sy=0;
  if (shakeTime > 0) {
    sx = (Math.random()-0.5)*shakeIntensity*shakeTime;
    sy = (Math.random()-0.5)*shakeIntensity*shakeTime;
    shakeTime -= 0.016;
  }
  lqCtx.save();
  lqCtx.translate(sx, sy);

  // Drip stains
  for (let i = drips.length-1; i >= 0; i--) {
    const d = drips[i];
    d.life -= 0.003;
    if (d.life <= 0) { drips.splice(i,1); continue; }
    lqCtx.globalAlpha = d.life * 0.3;
    lqCtx.fillStyle = d.color;
    lqCtx.beginPath();
    lqCtx.ellipse(d.x, d.y, d.r, d.r*0.6, Math.random()*0.3, 0, Math.PI*2);
    lqCtx.fill();
  }
  lqCtx.globalAlpha = 1;

  // Liquid particles
  for (let i = liquidParticles.length-1; i >= 0; i--) {
    const p = liquidParticles[i];
    p.vy += p.gravity;
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;

    // Splash at endY
    if (!p.splashed && p.y >= p.endY) {
      p.splashed = true;
      p.vy *= -0.3;
      p.vx += (Math.random()-0.5)*3;
      // Sub-splashes
      for (let j = 0; j < 3; j++) {
        liquidParticles.push({
          x:p.x, y:p.y,
          vx:(Math.random()-0.5)*3, vy:-1-Math.random()*2,
          r:1+Math.random()*2, color:p.color, baseColor:p.baseColor,
          life:0.5, decay:0.02, gravity:0.2, splashed:true, endY:p.endY+50
        });
      }
    }

    if (p.life <= 0 || p.y > h+20) { liquidParticles.splice(i,1); continue; }

    lqCtx.globalAlpha = p.life;
    lqCtx.fillStyle = p.color;
    lqCtx.shadowColor = p.color;
    lqCtx.shadowBlur = p.r * 2;
    lqCtx.beginPath();
    lqCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    lqCtx.fill();
  }
  lqCtx.shadowBlur = 0;

  // Steam
  for (let i = steamParticles.length-1; i >= 0; i--) {
    const s = steamParticles[i];
    s.x += s.vx + Math.sin(t*3+i)*0.3;
    s.y += s.vy;
    s.r += 0.05;
    s.life -= s.decay;
    if (s.life <= 0) { steamParticles.splice(i,1); continue; }
    lqCtx.globalAlpha = s.life * 0.3;
    lqCtx.fillStyle = s.color;
    lqCtx.beginPath();
    lqCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    lqCtx.fill();
  }

  // Sparks
  for (let i = sparks.length-1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.1;
    s.life -= 0.025;
    if (s.life <= 0) { sparks.splice(i,1); continue; }
    lqCtx.globalAlpha = s.life;
    lqCtx.fillStyle = s.color;
    lqCtx.shadowColor = s.color;
    lqCtx.shadowBlur = 8;
    lqCtx.beginPath();
    lqCtx.arc(s.x, s.y, 1.5, 0, Math.PI*2);
    lqCtx.fill();
  }
  lqCtx.shadowBlur = 0;
  lqCtx.globalAlpha = 1;

  lqCtx.restore();
}

// --- Pressure gauge ---
function drawPressure(t) {
  const w=50, h=50;
  prCtx.clearRect(0,0,w,h);
  
  pressureVal += (pressureTarget - pressureVal) * 0.05;
  // Jitter when brewing
  const jitter = brewing ? (Math.random()-0.5)*0.05 : 0;
  const val = Math.min(1, pressureVal + jitter);

  // Dial bg
  prCtx.fillStyle = '#1a0e06';
  prCtx.strokeStyle = '#6b4420';
  prCtx.lineWidth = 2;
  prCtx.beginPath(); prCtx.arc(25,25,22,0,Math.PI*2); prCtx.fill(); prCtx.stroke();

  // Arc (danger zone)
  prCtx.strokeStyle = val > 0.7 ? '#ff3300' : '#d4a867';
  prCtx.lineWidth = 3;
  prCtx.beginPath();
  prCtx.arc(25,25,16, Math.PI*0.75, Math.PI*0.75 + val*Math.PI*1.5);
  prCtx.stroke();

  // Needle
  const angle = Math.PI*0.75 + val*Math.PI*1.5;
  prCtx.strokeStyle = '#ff6644';
  prCtx.lineWidth = 1.5;
  prCtx.beginPath();
  prCtx.moveTo(25,25);
  prCtx.lineTo(25+Math.cos(angle)*14, 25+Math.sin(angle)*14);
  prCtx.stroke();

  // Center dot
  prCtx.fillStyle = '#d4a867';
  prCtx.beginPath(); prCtx.arc(25,25,2,0,Math.PI*2); prCtx.fill();

  // Label
  prCtx.fillStyle = '#6b4420';
  prCtx.font = '5px "Cinzel",serif';
  prCtx.textAlign = 'center';
  prCtx.fillText('PRESSURA', 25, 40);
}

// --- Status ---
function updateStatus() {
  statusEl.textContent = statusText;
}

// --- Main loop ---
function loop(ts) {
  requestAnimationFrame(loop);
  const t = ts / 1000;
  drawBg(t);
  drawLiquid(t);
  drawPressure(t);
  updateStatus();

  // Ambient steam when idle
  if (!brewing && Math.random() < 0.02) {
    steamParticles.push({
      x: lqC.width/2 + (Math.random()-0.5)*20,
      y: lqC.height*0.78,
      vx: (Math.random()-0.5)*0.3,
      vy: -0.3-Math.random()*0.5,
      r: 2+Math.random()*3,
      color: '#443322',
      life: 0.6,
      decay: 0.015
    });
  }
}

requestAnimationFrame(loop);

// Idle Latin wisdom
const IDLE_MSGS = [
  'Carpe Coffea.',
  'Veni, Vidi, Bibi.',
  'In vino veritas, in coffea vigilantia.',
  'Alea iacta est... in calice.',
  'Tempus fugit. Bibe nunc.',
  'E pluribus unum espressum.',
  'Sic semper coffeanis.',
  'Cogito ergo bibo.',
  'Parata ad ministrandum.',
  'Machina otiosa est. Preme aliquid.',
  'Dum spiro, bibo.',
  'Fortes fortuna caffeinat.',
];
setInterval(() => {
  if (!brewing) {
    statusText = IDLE_MSGS[Math.floor(Math.random()*IDLE_MSGS.length)];
  }
}, 6000);
</script>
