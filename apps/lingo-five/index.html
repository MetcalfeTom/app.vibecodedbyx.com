  <meta property="og:title" content="Lingo Five">
  <meta property="og:description" content="A retro game-show word puzzle. Five guesses, five letters, the first one's on the house. Circle = right place, diamond = wrong place.">
  <meta property="og:url" content="https://sloppy.live/lingo-five">

  <style>
    :root {
      --bg:      #0a0a18;
      --bg-2:    #14122c;
      --board:   #1b1840;
      --tile:    #241f52;
      --tile-b:  #3a3270;
      --ink:     #f4f0ff;
      --ink-dim: rgba(244,240,255,0.5);
      --exact:   #e23b4e;     /* right letter, right spot (red circle, Lingo-style) */
      --exact-2: #ff5a6c;
      --close:   #f2b134;     /* right letter, wrong spot (amber diamond) */
      --close-2: #ffd166;
      --miss:    #2c2850;
      --neon:    #4ff0ff;
      --line:    rgba(244,240,255,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 50% -10%, rgba(79,240,255,0.12), transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(226,59,78,0.12), transparent 55%),
        var(--bg);
      color: var(--ink);
      font-family: 'Space Grotesk', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 0.8rem 0.7rem 1.5rem;
      min-height: 100dvh;
      user-select: none;
    }

    /* ============ HEADER ============ */
    header.mast {
      text-align: center;
      margin-bottom: 0.7rem;
    }
    header.mast h1 {
      font-family: 'Bungee', sans-serif;
      font-size: clamp(2rem, 7vw, 3.2rem);
      line-height: 1;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, var(--exact-2), var(--exact));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(226,59,78,0.4);
    }
    header.mast h1 span { color: var(--close); -webkit-text-fill-color: var(--close); }
    header.mast .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-top: 0.2rem;
    }

    /* ============ BOARD ============ */
    .board {
      display: grid;
      gap: 0.4rem;
      margin: 0.5rem 0;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.4rem;
    }
    .tile {
      width: clamp(2.8rem, 13vw, 3.6rem);
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: clamp(1.3rem, 6vw, 1.9rem);
      text-transform: uppercase;
      color: var(--ink);
      background: var(--tile);
      border: 2px solid var(--tile-b);
      border-radius: 8px;
      position: relative;
      transition: transform 0.12s;
    }
    .tile.filled { border-color: var(--neon); animation: pop 0.12s ease-out; }
    @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
    /* Exact = filled red circle behind letter */
    .tile.exact {
      background: var(--miss);
      border-color: var(--exact);
    }
    .tile.exact::before {
      content: '';
      position: absolute; inset: 12%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, var(--exact-2), var(--exact));
      box-shadow: 0 0 14px rgba(226,59,78,0.5);
      z-index: 0;
    }
    /* Close = amber diamond behind letter */
    .tile.close {
      background: var(--miss);
      border-color: var(--close);
    }
    .tile.close::before {
      content: '';
      position: absolute; inset: 16%;
      background: linear-gradient(135deg, var(--close-2), var(--close));
      transform: rotate(45deg);
      box-shadow: 0 0 12px rgba(242,177,52,0.45);
      z-index: 0;
    }
    .tile.miss {
      background: var(--miss);
      border-color: #232048;
      color: var(--ink-dim);
    }
    .tile span { position: relative; z-index: 1; }
    .tile.exact span, .tile.close span { color: #1a0a10; text-shadow: 0 1px 0 rgba(255,255,255,0.25); }
    .row.shake { animation: shake 0.36s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .row.reveal .tile { animation: flip 0.5s ease both; }
    .row.reveal .tile:nth-child(1) { animation-delay: 0s; }
    .row.reveal .tile:nth-child(2) { animation-delay: 0.1s; }
    .row.reveal .tile:nth-child(3) { animation-delay: 0.2s; }
    .row.reveal .tile:nth-child(4) { animation-delay: 0.3s; }
    .row.reveal .tile:nth-child(5) { animation-delay: 0.4s; }
    @keyframes flip {
      0%   { transform: rotateX(0); }
      50%  { transform: rotateX(90deg); }
      100% { transform: rotateX(0); }
    }

    /* ============ MESSAGE ============ */
    .msg {
      min-height: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: var(--close);
      text-align: center;
      margin: 0.3rem 0;
      transition: opacity 0.2s;
      height: 1.5rem;
    }
    .msg.win { color: var(--exact-2); font-weight: 700; }

    /* ============ KEYBOARD ============ */
    .keyboard {
      display: flex; flex-direction: column; gap: 0.35rem;
      margin-top: 0.4rem;
      width: 100%;
      max-width: 30rem;
    }
    .krow { display: flex; gap: 0.3rem; justify-content: center; }
    .key {
      flex: 1;
      min-width: 0;
      height: 3rem;
      border: none;
      border-radius: 6px;
      background: var(--tile-b);
      color: var(--ink);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: filter 0.1s, transform 0.08s, background 0.2s;
    }
    .key:hover { filter: brightness(1.15); }
    .key:active { transform: translateY(1px); }
    .key:focus-visible { outline: 2px solid var(--neon); outline-offset: 2px; }
    .key.wide { flex: 1.6; font-size: 0.78rem; letter-spacing: 0.04em; }
    .key.exact { background: var(--exact); color: #fff; }
    .key.close { background: var(--close); color: #1a0a10; }
    .key.miss  { background: #1a1838; color: var(--ink-dim); }

    /* ============ OVERLAY ============ */
    .overlay {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      padding: 1.5rem;
      background: rgba(10,10,24,0.85);
      backdrop-filter: blur(6px);
      z-index: 20;
      animation: fade 0.3s ease-out;
    }
    .overlay.visible { display: flex; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .overlay-card {
      text-align: center;
      max-width: 24rem;
      padding: 1.8rem 1.5rem;
      background: var(--board);
      border: 2px solid var(--tile-b);
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(226,59,78,0.3);
    }
    .overlay-card h2 {
      font-family: 'Bungee', sans-serif;
      font-size: 1.8rem;
      color: var(--close);
      margin-bottom: 0.4rem;
    }
    .overlay-card.win h2 { color: var(--exact-2); }
    .overlay-card .answer {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--neon);
      margin: 0.6rem 0;
    }
    .overlay-card p {
      font-size: 0.95rem; color: var(--ink-dim); line-height: 1.4; margin-bottom: 1rem;
    }
    .overlay-card .streak {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--ink-dim);
      margin-bottom: 1rem;
    }
    .overlay-card .streak b { color: var(--close); }
    .overlay-card button {
      font-family: 'Bungee', sans-serif;
      font-size: 1rem;
      padding: 0.7rem 1.6rem;
      background: linear-gradient(135deg, var(--exact), var(--close));
      color: #1a0a10;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(226,59,78,0.4);
      transition: filter 0.12s, transform 0.1s;
      min-height: 2.75rem;
    }
    .overlay-card button:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .overlay-card button:focus-visible { outline: 3px solid var(--neon); outline-offset: 3px; }

    .legend {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: var(--ink-dim);
      margin-top: 0.8rem;
      text-transform: uppercase;
    }
    .legend span { display: inline-flex; align-items: center; gap: 0.3rem; }
    .legend .swatch { width: 0.8rem; height: 0.8rem; border-radius: 50%; }
    .legend .swatch.c { border-radius: 0; transform: rotate(45deg); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition: none !important; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>

<body>
  <header class="mast">
    <h1>LINGO <span>FIVE</span></h1>
    <div class="tag">five letters · five tries · first one's free</div>
  </header>

  <div class="board" id="board" role="grid" aria-label="Guess board"></div>
  <div class="msg" id="msg" role="status" aria-live="polite"></div>

  <div class="legend" aria-hidden="true">
    <span><span class="swatch" style="background:var(--exact)"></span> right spot</span>
    <span><span class="swatch c" style="background:var(--close)"></span> wrong spot</span>

  <div class="keyboard" id="keyboard" aria-label="On-screen keyboard"></div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="ov-title">

  <script>

proxy prune pulse punch pupil puppy purge purse pygmy quack quaff quail quake qualm quark quart queen query quest queue quick quiet quill quilt quirk quite quota quote rabid radar radio rainy raise rally ranch range rapid raven reach react ready realm rebel refer reign relax relay relic remit renal renew repay reply reset resin retro rhino rhyme rider ridge rifle right rigid rinse ripen risen risky rival river roast robin robot rocky rogue roman rouge rough round route royal rugby ruler rumor rural sadly safer saint salad salon salsa sandy satin sauce saucy sauna saved scald scale scalp scamp scant scare scarf scene scent scoff scold scone scoop scope score scorn scour scout scowl scrap scrub scuba seize sense serif serum serve seven sever shade shaft shake shall shame shape share shark sharp shawl shear sheen sheep sheer sheet shelf shell shine shiny shirt shoal shock shone shook shoot shore short shout shown shrub shrug shush sibyl siege sight sigma silky silly since sinew siren sixth sixty skate skill skirt skull skunk slack slain slang slant slash slate slave sleek sleep sleet slept slice slick slide slime sling slope slosh sloth slump slung slush small smart smash smear smell smile smirk smoke smoky snack snail snake snaky snare sneak snide sniff snore snort snout snowy snuff soapy sober solar solid solve sonar sonic sooth sorry sound south space spade spank spare spark spawn speak spear speck spell spend spent sperm spice spicy spike spill spilt spine spire spite splat split spoil spoke spool spoon sport spout spray spree sprig spurn spurt squad squat squid stack staff stage stain stair stake stale stalk stall stamp stand stank stare stark start stash state stave steak steal steam steed steel steep steer stein stern stick stiff still stilt sting stink stint stock stoic stoke stole stomp stone stony stood stool stoop store stork storm story stout stove strap straw stray strip strut stuck study stuff stump stung stunt style suave sugar suite sulky sunny super surge swamp swarm swear sweat sweep sweet swell swept swift swine swing swirl sword sworn syrup table taboo tacit taffy taken talon tango taper tardy tarot taste tasty taunt tawny teach tease teddy teeth tempo tenet tenor tense tenth tepid terra terse thank theft theme there these thick thief thigh thing think third thong thorn those three threw throb throw thumb thump tiara tidal tiger tight tiles timer timid tipsy titan title toast today token tonal toner tonic tooth topaz topic torch total touch tough towel tower toxic trace track trade trail train trait tramp trash tread treat tread trend trial tribe trick tried tripe trite troll tromp troop trope trout truce truck truly trump trunk trust truth tubby tuber tulip tummy tumor tunic turbo tutor twang tweak tweed tweet twice twine twins twirl twist tying udder ulcer ultra umbra uncle under undue unfit union unite unity until unzip upend upper upset urban urged usage usher usual utile utter vague valet valid valor value valve vapor vault vegan venom verge verse video vigil villa vinyl viola viper viral virus visit visor vista vital vivid vocal vodka vogue voice vomit voted voter vouch vowel wacky wafer wager wagon waist waltz waste watch water waver waxen weary weave wedge weedy weigh weird whale wharf wheat wheel where which while whine whirl whisk white whole whoop whose widen widow width wield wince winch windy wiper wired wires witch witty woken woman women woods woozy words world worry worse worst worth would wound woven wrack wrath wreck wrist write wrong wrote wrung yacht yearn yeast yield young yours youth yummy zebra zesty zonal").split(' ');
    // Valid-guess list = answers (we'll accept any answer-list word + a few extras)
    const VALID = new Set(ANSWERS);
    const EXTRA = ("aback abase abate abbey abide acorn acrid acute adage adept aglow aider amber amble amend amiss ample angst antic anvil aphid arbor ardor armed askew assay atoll attic augur aught avert avian avowed awoke axiom azure bacon badge bagel bandy banjo banal barge basil baste bathe bayou beech beefy befit beget begun belie belle belly bezel bicep bigot biome blare blasé blob bloat bluff blurb blurt boozy borax bored bough bossy botch boxer brace braid bran brash bravo brawl bream briar bribe brine bunny butch caddy caulk caviar cease cedar champ chard charm chasm chime chirp chock churn cider cinch clack clang clank clave clink cloak clomp clout cloud coast cocoa colic comfy condo conic crank crate crepe crick croak croft crone crony croon crore crumb cubby cumin cupid curio curly curry cynic dandy dapper dazed deity demon depot devil dingo dingy diode ditto divan dodgy dogma doily donor dowel downy dowry drape dross duchy dummy dunce duple dusty eaten eclat elite elope elude email emcee endow ennui ergot ester evade exert expel extol fanny farce fauna feign fella felon femme fetal feign fibre filly filmy filth finch finer firth flair flair flake flank fleck flier flora fluff flump foamy folio folly foray forte frail freak fritz frock froth gaffe gamut gawky gayer geeky genus girth glaze glean glint gloat gloss glyph gnarl godly golem goner gorge gourd grail graze grime gripe gross grout grovel gruel guile gulch gully gumbo gusto gutsy hazel heady heron homer hooch howdy hunch icily idiot inane inbox incur inept ingot inlet ionic irate islet jaunt jazzy jiffy joist joust kappa karma kebab kelpie ketch khaki kiosk knave knead kneel knoll kraut ladle lanky lapel larva latch lathe leper lilac lithe llama llano loamy locus lofty loony loopy lurid lyric madly mafia mango mania manor mason mealy mecca mealy meaty mommy moody moony moped moral mossy motel mucus mufti mulch mummy munch mural musky musty mutton nadir naive nanny nappy natty navel neigh nerdy ne     EXTRA.forEach(w => { if (w.length === 5) VALID.add(w); });

    // Pick a random answer
    function randomAnswer() {
      const cands = ANSWERS.filter(w => w.length === 5);
      return cands[Math.floor(Math.random() * cands.length)].toUpperCase();
    }

    // ============================================================
    // STATE
    // ============================================================
    const ROWS = 5, COLS = 5;
    let answer = randomAnswer();
    let row = 0, col = 0;
    let grid = [];           // grid[r] = array of 5 letters
    let states = [];         // states[r] = array of 'exact'|'close'|'miss'
    let finished = false;
    let firstLetter = answer[0];

    // persisted stats
    const STATS_KEY = 'lingo_five_stats';
    let stats = { played: 0, won: 0, streak: 0, best: 0 };
    try { Object.assign(stats, JSON.parse(localStorage.getItem(STATS_KEY) || '{}')); } catch {}

    // ============================================================
    // BUILD BOARD + KEYBOARD
    // ============================================================
    const boardEl = document.getElementById('board');
    const msgEl = document.getElementById('msg');
    function buildBoard() {
      boardEl.innerHTML = '';
      grid = []; states = [];
      for (let r = 0; r < ROWS; r++) {
        grid.push(['', '', '', '', '']);
        states.push([null, null, null, null, null]);
        const rowEl = document.createElement('div');
        rowEl.className = 'row';
        rowEl.dataset.r = r;
        for (let c = 0; c < COLS; c++) {
          const t = document.createElement('div');
          t.className = 'tile';
          t.dataset.r = r; t.dataset.c = c;
          t.innerHTML = '<span></span>';
          rowEl.appendChild(t);
        }
        boardEl.appendChild(rowEl);
      }
      // Pre-fill the first letter of the first row (Lingo: first letter free)
      revealFirstLetter();
    }
    function revealFirstLetter() {
      grid[row][0] = firstLetter;
      col = 1;
      const t = tileAt(row, 0);
      t.querySelector('span').textContent = firstLetter;
      t.classList.add('filled');
    }
    function tileAt(r, c) { return boardEl.querySelector('.tile[data-r="' + r + '"][data-c="' + c + '"]'); }

    const KEYS = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
    const keyEls = {};
    function buildKeyboard() {
      const kb = document.getElementById('keyboard');
      kb.innerHTML = '';
      KEYS.forEach((rowStr, i) => {
        const kr = document.createElement('div');
        kr.className = 'krow';
        if (i === 2) {
          kr.appendChild(makeKey('ENTER', 'wide', () => submit()));
        }
        for (const ch of rowStr) {
          const k = makeKey(ch, '', () => typeLetter(ch));
          keyEls[ch] = k;
          kr.appendChild(k);

        if (i === 2) {
          kr.appendChild(makeKey('⌫', 'wide', () => backspace()));
        }
        kb.appendChild(kr);
      });
    }
    function makeKey(label, cls, fn) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'key' + (cls ? ' ' + cls : '');
      b.textContent = label;
      b.setAttribute('aria-label', label === '⌫' ? 'backspace' : label);
      b.addEventListener('click', fn);
      return b;
    }

    // ============================================================
    // INPUT
    // ============================================================
    function typeLetter(ch) {
      if (finished) return;
      if (col >= COLS) return;
      ch = ch.toUpperCase();
      if (!/[A-Z]/.test(ch)) return;
      grid[row][col] = ch;
      const t = tileAt(row, col);
      t.querySelector('span').textContent = ch;
      t.classList.add('filled');
      col++;
    }
    function backspace() {
      if (finished) return;
      if (col <= 1) return;       // never erase the free first letter
      col--;
      grid[row][col] = '';
      const t = tileAt(row, col);
      t.querySelector('span').textContent = '';
      t.classList.remove('filled');
    }
    function flashMsg(text, win) {
      msgEl.textContent = text;
      msgEl.classList.toggle('win', !!win);
    }
    function submit() {
      if (finished) return;
      if (col < COLS) { flashMsg('not enough letters'); shakeRow(); return; }
      const guess = grid[row].join('');
      if (!VALID.has(guess.toLowerCase())) {
        flashMsg('not in word list'); shakeRow(); return;
      }
      flashMsg('');
      scoreRow(guess);
    }
    function shakeRow() {
      const rEl = boardEl.querySelector('.row[data-r="' + row + '"]');
      rEl.classList.remove('shake'); void rEl.offsetWidth; rEl.classList.add('shake');
    }

    // ============================================================
    // SCORING — Lingo / Wordle two-pass (exact first, then close)
    // ============================================================
    function scoreRow(guess) {
      const ans = answer.split('');
      const res = ['miss', 'miss', 'miss', 'miss', 'miss'];
      const used = [false, false, false, false, false];
      // Pass 1 — exact matches
      for (let i = 0; i < COLS; i++) {
        if (guess[i] === ans[i]) { res[i] = 'exact'; used[i] = true; }
      }
      // Pass 2 — close (letter elsewhere, not already used)
      for (let i = 0; i < COLS; i++) {
        if (res[i] === 'exact') continue;
        for (let j = 0; j < COLS; j++) {
          if (!used[j] && guess[i] === ans[j]) { res[i] = 'close'; used[j] = true; break; }
        }
      }
      states[row] = res;
      // Animate reveal
      const rEl = boardEl.querySelector('.row[data-r="' + row + '"]');
      rEl.classList.add('reveal');
      for (let i = 0; i < COLS; i++) {
        const t = tileAt(row, i);
        // Apply state mid-flip for a nice flip-to-color effect
        setTimeout(() => {
          t.classList.remove('filled');
          t.classList.add(res[i]);
        }, i * 100 + 230);
      }
      // Update keyboard colors (best state wins: exact > close > miss)
      setTimeout(() => updateKeyboard(guess, res), COLS * 100 + 230);

      const won = res.every(s => s === 'exact');
      setTimeout(() => {
        if (won) { endGame(true); return; }
        row++;
        if (row >= ROWS) { endGame(false); return; }
        col = 0;
        revealFirstLetter();
      }, COLS * 100 + 500);
    }
    function updateKeyboard(guess, res) {
      const rank = { miss: 0, close: 1, exact: 2 };
      for (let i = 0; i < COLS; i++) {
        const k = keyEls[guess[i]];
        if (!k) continue;
        const curState = k.classList.contains('exact') ? 'exact' : k.classList.contains('close') ? 'close' : k.classList.contains('miss') ? 'miss' : null;
        if (!curState || rank[res[i]] > rank[curState]) {
          k.classList.remove('exact', 'close', 'miss');
          k.classList.add(res[i]);
        }
      }
    }

    // ============================================================
    // END GAME
    // ============================================================
    function endGame(won) {
      finished = true;
      stats.played++;
      if (won) {
        stats.won++;
        stats.streak++;
        if (stats.streak > stats.best) stats.best = stats.streak;
      } else {
        stats.streak = 0;
      }
      try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch {}
      const ov = document.getElementById('overlay');
      const card = document.getElementById('ov-card');
      card.classList.toggle('win', won);
      document.getElementById('ov-title').textContent = won
        ? ['nice!', 'got it!', 'winner!', 'lingo!'][Math.min(3, row)]
        : 'out of tries';
      document.getElementById('ov-answer').textContent = answer;
      document.getElementById('ov-msg').textContent = won
        ? 'solved in ' + (row + 1) + (row === 0 ? ' try' : ' tries') + '.'
        : 'better luck next round.';
      document.getElementById('ov-streak').innerHTML =
        'streak <b>' + stats.streak + '</b> · best ' + stats.best + ' · played ' + stats.played + ' · won ' + stats.won;
      ov.classList.add('visible');
    }
    document.getElementById('ov-again').addEventListener('click', () => {
      document.getElementById('overlay').classList.remove('visible');
      newGame();
    });

    function newGame() {
      answer = randomAnswer();
      firstLetter = answer[0];
      row = 0; col = 0; finished = false;
      Object.values(keyEls).forEach(k => k.classList.remove('exact', 'close', 'miss'));
      flashMsg('');
      buildBoard();
    }

    // ============================================================
    // PHYSICAL KEYBOARD
    // ============================================================
    window.addEventListener('keydown', e => {
      if (document.getElementById('overlay').classList.contains('visible')) {
        if (e.key === 'Enter') { document.getElementById('ov-again').click(); }
        return;
      }
      if (e.key === 'Enter') { e.preventDefault(); submit(); }
      else if (e.key === 'Backspace') { e.preventDefault(); backspace(); }
      else if (/^[a-zA-Z]$/.test(e.key)) { typeLetter(e.key); }
    });

    // ============================================================
    // BOOT
    // ============================================================
    buildKeyboard();
    buildBoard();
    flashMsg('the first letter is yours — guess away');
  })();
  </script>
</body>
</html>
