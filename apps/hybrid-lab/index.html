<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hybrid Lab</title>
<meta name="description" content="Pick two animals. Fuse them. Get a brand new bizarre creature, illustrated and described.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%AC">
<meta property="og:title" content="Hybrid Lab">
<meta property="og:description" content="Pick two animals. Fuse them. Witness the abomination.">
<meta property="og:url" content="https://sloppy.live/hybrid-lab">
<meta property="og:image" content="https://image.pollinations.ai/prompt/mad%20science%20lab%2C%20glowing%20green%20test%20tubes%2C%20bizarre%20hybrid%20creature%20in%20a%20jar%2C%20dark%20cinematic%20comic%20illustration?width=1200&height=630&seed=1207&nologo=true">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Bungee&family=Special+Elite&family=Crimson+Pro:ital,wght@0,500;1,500&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #06120e;
    --moss-1: #0d2018;
    --moss-2: #163128;
    --neon: #6cfa5e;
    --electric: #00f0a0;
    --pulse: #b3ff7f;
    --amber: #f5c453;
    --magenta: #ff6ec4;
    --bone: #f1e7d4;
    --dim: #8b9183;
    --danger: #ff5a64;
    --glass: rgba(108, 250, 94, 0.08);
  }
  * { box-sizing: border-box; }
  html { font-size: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 18% 12%, rgba(108,250,94,0.16), transparent 55%),
      radial-gradient(ellipse at 82% 88%, rgba(255,110,196,0.10), transparent 55%),
      radial-gradient(ellipse at 50% 60%, rgba(0,240,160,0.08), transparent 60%),
      linear-gradient(180deg, var(--moss-1), var(--void) 70%);
    color: var(--bone);
    font-family: 'Space Mono', ui-monospace, monospace;
    padding: 1rem 0.85rem 1.5rem;
    overscroll-behavior: none;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      repeating-linear-gradient(0deg, rgba(108,250,94,0.02) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 80px);
  }
  main {
    position: relative;
    z-index: 2;
    max-width: 64rem;
    margin: 0 auto;
    display: grid;
    gap: 1.1rem;
  }
  header.head {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
    padding: 0.1rem 0.2rem 0.65rem;
    border-bottom: 1px dashed rgba(108,250,94,0.3);
  }
  .stamp {
    font-family: 'Special Elite', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: var(--neon);
    padding: 0.25rem 0.55rem;
    border: 1px dashed rgba(108,250,94,0.45);
    border-radius: 0.2rem;
    background: rgba(108,250,94,0.05);
  }
  h1 {
    font-family: 'Bungee Shade', display;
    font-weight: 400;
    font-size: clamp(2.4rem, 7vw, 4.6rem);
    line-height: 0.95;
    margin: 0;
    letter-spacing: 0.02em;
    color: var(--neon);
    text-shadow:
      0 0 24px rgba(108,250,94,0.5),
      0 0 60px rgba(0,240,160,0.25);
  }
  h1 .lab {
    color: var(--magenta);
    text-shadow:
      0 0 24px rgba(255,110,196,0.5),
      0 0 60px rgba(255,110,196,0.25);
  }
  .tagline {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    color: var(--dim);
    margin-left: auto;
  }
  .tagline em { color: var(--electric); }

  /* SPECIMEN PICKERS */
  .pickers {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.9rem;
    align-items: stretch;
  }
  @media (min-width: 44rem) {
    .pickers {
      grid-template-columns: 1fr auto 1fr;
      gap: 0.9rem;
      align-items: stretch;
    }
  }
  .picker {
    background:
      radial-gradient(ellipse at 50% 30%, rgba(108,250,94,0.16), transparent 70%),
      linear-gradient(180deg, rgba(22,49,40,0.9), rgba(13,32,24,0.95));
    border: 1.5px solid rgba(108,250,94,0.3);
    border-radius: 0.8rem;
    padding: 1rem 0.9rem;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5), 0 0 24px rgba(108,250,94,0.12);
    display: grid;
    gap: 0.65rem;
    position: relative;
  }
  .picker-label {
    font-family: 'Special Elite', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--neon);
    text-align: center;
  }
  .viewer {
    position: relative;
    aspect-ratio: 1.2 / 1;
    background:
      radial-gradient(ellipse at center, rgba(108,250,94,0.2), transparent 60%),
      linear-gradient(180deg, rgba(7,18,14,0.7), rgba(7,18,14,0.95));
    border: 1px solid rgba(108,250,94,0.4);
    border-radius: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: inset 0 0 60px rgba(108,250,94,0.15);
  }
  .viewer::before {
    /* Glass bubble */
    content: '';
    position: absolute;
    top: 8%;
    left: 8%;
    width: 30%;
    height: 18%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.15), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .viewer-emoji {
    font-size: clamp(4rem, 14vw, 8rem);
    line-height: 1;
    filter: drop-shadow(0 0 18px rgba(108,250,94,0.5));
    transition: transform 0.3s ease;
  }
  .viewer.swap .viewer-emoji {
    animation: viewerSwap 0.4s ease;
  }
  @keyframes viewerSwap {
    0% { transform: scale(0.5) rotate(-90deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .viewer-name {
    position: absolute;
    bottom: 0.6rem;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Bungee', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 0.1em;
    color: var(--bone);
    text-shadow: 0 0 8px rgba(0,0,0,0.9);
    text-transform: uppercase;
  }
  .viewer-tag {
    position: absolute;
    top: 0.5rem;
    right: 0.6rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    color: var(--electric);
    text-transform: uppercase;
    opacity: 0.7;
  }
  .picker-controls {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 0.4rem;
  }
  .picker-btn {
    font-family: 'Special Elite', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    padding: 0.55rem 0.4rem;
    border-radius: 0.4rem;
    border: 1px solid rgba(108,250,94,0.4);
    background: rgba(7,18,14,0.6);
    color: var(--bone);
    cursor: pointer;
    text-transform: uppercase;
    min-height: 2.5rem;
    transition: all 0.16s ease;
  }
  .picker-btn:hover { border-color: var(--neon); color: var(--neon); }
  .picker-btn:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }
  .picker-btn.random { background: rgba(0,240,160,0.12); color: var(--electric); }
  .picker-btn.random:hover { background: rgba(0,240,160,0.22); }

  .fuse-col {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 6rem;
  }
  .fuse-btn {
    font-family: 'Bungee', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.18em;
    padding: 1.1rem 1.6rem;
    border-radius: 0.6rem;
    border: 2px solid var(--neon);
    background: linear-gradient(180deg, rgba(108,250,94,0.25), rgba(0,240,160,0.18));
    color: var(--bone);
    cursor: pointer;
    text-transform: uppercase;
    box-shadow:
      0 0 24px rgba(108,250,94,0.45),
      inset 0 1px 0 rgba(255,255,255,0.15),
      0 6px 0 rgba(7,18,14,0.9);
    transition: all 0.16s ease;
    position: relative;
    min-height: 2.75rem;
  }
  .fuse-btn:hover {
    color: var(--bone);
    background: linear-gradient(180deg, rgba(108,250,94,0.45), rgba(0,240,160,0.3));
    box-shadow: 0 0 36px rgba(108,250,94,0.7), 0 6px 0 rgba(7,18,14,0.9);
  }
  .fuse-btn:active { transform: translateY(2px); box-shadow: 0 0 24px rgba(108,250,94,0.7), 0 2px 0 rgba(7,18,14,0.9); }
  .fuse-btn:focus-visible { outline: 3px solid var(--amber); outline-offset: 4px; }
  .fuse-btn:disabled { opacity: 0.5; cursor: progress; }
  .fuse-btn .bolt { font-family: 'Bungee Shade', display; font-size: 1.6rem; }

  /* RESULT */
  .result-card {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(108,250,94,0.16), transparent 60%),
      linear-gradient(180deg, rgba(22,49,40,0.9), rgba(13,32,24,0.95));
    border: 1.5px solid rgba(108,250,94,0.3);
    border-radius: 0.8rem;
    padding: 1.2rem 1rem;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5), 0 12px 40px rgba(0,0,0,0.4);
    display: grid;
    gap: 0.9rem;
    grid-template-columns: 1fr;
    position: relative;
  }
  @media (min-width: 42rem) {
    .result-card { grid-template-columns: 16rem 1fr; }
  }
  .result-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--dim);
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 1.05rem;
  }
  .result-empty .arrow {
    display: block;
    font-size: 2.4rem;
    color: var(--neon);
    margin-bottom: 0.4rem;
    text-shadow: 0 0 14px rgba(108,250,94,0.6);
  }
  .specimen-jar {
    position: relative;
    aspect-ratio: 1 / 1;
    background:
      radial-gradient(ellipse at 50% 35%, rgba(108,250,94,0.28), transparent 65%),
      linear-gradient(180deg, rgba(7,18,14,0.65), rgba(7,18,14,0.95));
    border: 1.5px solid rgba(108,250,94,0.4);
    border-radius: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: inset 0 0 60px rgba(108,250,94,0.18);
  }
  .specimen-jar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 0.4rem;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .specimen-jar img.loaded { opacity: 1; }
  .specimen-jar .fallback-emoji {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(3rem, 12vw, 6rem);
    line-height: 1;
    pointer-events: none;
    text-shadow: 0 0 18px rgba(108,250,94,0.5);
    opacity: 0.6;
    transition: opacity 0.4s ease;
  }
  .specimen-jar .fallback-emoji.hidden { opacity: 0; }
  .specimen-jar .incubating {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(13,32,24,0.65);
    z-index: 3;
    pointer-events: none;
    font-family: 'Special Elite', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.28em;
    color: var(--neon);
    text-transform: uppercase;
    gap: 0.4rem;
  }
  .specimen-jar .incubating.hidden { display: none; }
  .specimen-jar .incubating .arcs {
    width: 60%;
    height: 0.25rem;
    background: linear-gradient(90deg, transparent, var(--neon), var(--electric), var(--neon), transparent);
    background-size: 200% 100%;
    border-radius: 1rem;
    animation: incubate 1.4s linear infinite;
    box-shadow: 0 0 14px rgba(108,250,94,0.6);
  }
  @keyframes incubate {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .specimen-stamp {
    font-family: 'Special Elite', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.32em;
    color: var(--electric);
    text-transform: uppercase;
    padding: 0.25rem 0.4rem;
    border: 1px dashed rgba(108,250,94,0.4);
    background: rgba(7,18,14,0.55);
    display: inline-block;
    align-self: start;
    justify-self: start;
    margin-top: 0.3rem;
  }
  .specimen-info {
    display: grid;
    gap: 0.6rem;
    align-content: start;
  }
  .creature-name {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    color: var(--neon);
    letter-spacing: 0.04em;
    line-height: 1;
    text-shadow: 0 0 18px rgba(108,250,94,0.45);
    margin: 0;
  }
  .creature-tagline {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--magenta);
    line-height: 1.3;
    margin: 0;
  }
  .creature-desc {
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    color: var(--bone);
    line-height: 1.55;
    margin: 0;
  }
  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
    margin-top: 0.3rem;
  }
  .meta {
    background: rgba(7,18,14,0.6);
    border: 1px solid rgba(108,250,94,0.22);
    border-radius: 0.4rem;
    padding: 0.45rem 0.55rem;
    display: grid;
    gap: 0.1rem;
  }
  .meta-key {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--electric);
    text-transform: uppercase;
  }
  .meta-val {
    font-family: 'Special Elite', monospace;
    font-size: 0.95rem;
    color: var(--bone);
    line-height: 1.3;
  }
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
    margin-top: 0.3rem;
  }
  .stat-bar {
    background: rgba(7,18,14,0.55);
    border: 1px solid rgba(108,250,94,0.22);
    border-radius: 0.4rem;
    padding: 0.45rem 0.55rem;
    display: grid;
    gap: 0.3rem;
  }
  .stat-bar-top {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .stat-bar-val {
    color: var(--bone);
    font-family: 'VT323', monospace;
    font-size: 1rem;
    letter-spacing: 0.06em;
  }
  .stat-bar-meter {
    height: 0.5rem;
    background: rgba(7,18,14,0.7);
    border-radius: 0.3rem;
    overflow: hidden;
    border: 1px solid rgba(108,250,94,0.2);
  }
  .stat-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--electric), var(--neon));
    border-radius: 0.3rem;
    transition: width 0.5s ease;
    box-shadow: 0 0 8px rgba(108,250,94,0.5);
  }
  .stat-bar-fill.danger {
    background: linear-gradient(90deg, var(--amber), var(--danger));
    box-shadow: 0 0 8px rgba(255,90,100,0.6);
  }
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.4rem;
    margin-top: 0.4rem;
  }
  .btn {
    font-family: 'Bungee', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    padding: 0.55rem 0.3rem;
    border-radius: 0.4rem;
    border: 1.5px solid rgba(108,250,94,0.4);
    background: rgba(7,18,14,0.6);
    color: var(--bone);
    cursor: pointer;
    text-transform: uppercase;
    min-height: 2.75rem;
    transition: all 0.16s ease;
  }
  .btn:hover { border-color: var(--neon); color: var(--neon); }
  .btn:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* Saved log */
  .saved-list {
    background: linear-gradient(180deg, rgba(22,49,40,0.55), rgba(13,32,24,0.7));
    border: 1px solid rgba(108,250,94,0.22);
    border-radius: 0.6rem;
    padding: 0.85rem;
    display: grid;
    gap: 0.5rem;
  }
  .saved-list-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Special Elite', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.32em;
    color: var(--neon);
    text-transform: uppercase;
  }
  .saved-empty {
    color: var(--dim);
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    text-align: center;
    padding: 0.8rem 0;
  }
  .saved-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(8rem, 1fr));
    gap: 0.4rem;
  }
  .saved-item {
    background: rgba(7,18,14,0.6);
    border: 1px solid rgba(108,250,94,0.22);
    border-radius: 0.4rem;
    padding: 0.5rem;
    display: grid;
    gap: 0.2rem;
    cursor: pointer;
    transition: border-color 0.15s ease;
    position: relative;
  }
  .saved-item:hover { border-color: var(--neon); }
  .saved-item .emoji-pair {
    font-size: 1.2rem;
    letter-spacing: 0.05em;
  }
  .saved-item .saved-name {
    font-family: 'Bungee', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    color: var(--neon);
    text-transform: uppercase;
    line-height: 1.1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .saved-item .saved-x {
    position: absolute;
    top: 2px;
    right: 4px;
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 0.7rem;
    padding: 0.1rem 0.25rem;
  }
  .saved-item .saved-x:hover { color: var(--danger); }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(1rem);
    background: rgba(7,18,14,0.94);
    color: var(--neon);
    font-family: 'Bungee', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    padding: 0.55rem 1.1rem;
    border: 1.5px solid var(--neon);
    border-radius: 0.4rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease, transform 0.3s ease;
    z-index: 50;
    text-transform: uppercase;
    box-shadow: 0 0 14px rgba(108,250,94,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0,0,0,0);
    border: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>
<main>
  <header class="head">
    <span class="stamp">SPECIMEN №<span id="specNum">001</span></span>
    <h1>HYBRID·<span class="lab">LAB</span></h1>
    <p class="tagline">two beasts in. <em>one abomination out.</em></p>
  </header>

  <section class="pickers" aria-label="Animal selectors">
    <div class="picker">
      <div class="picker-label">Specimen A</div>
      <div class="viewer" id="viewerA">
        <span class="viewer-tag" id="tagA">mammal</span>
        <span class="viewer-emoji" id="emojiA">🦈</span>
        <span class="viewer-name" id="nameA">SHARK</span>
      </div>
      <div class="picker-controls">
        <button class="picker-btn" data-side="A" data-act="prev" type="button" aria-label="Previous animal A">◂</button>
        <button class="picker-btn random" data-side="A" data-act="random" type="button">⟲ Random</button>
        <button class="picker-btn" data-side="A" data-act="next" type="button" aria-label="Next animal A">▸</button>
      </div>
    </div>

    <div class="fuse-col">
      <button class="fuse-btn" id="fuseBtn" type="button">
        <span class="bolt" aria-hidden="true">⚡</span> Fuse <span class="bolt" aria-hidden="true">⚡</span>
      </button>
    </div>

    <div class="picker">
      <div class="picker-label">Specimen B</div>
      <div class="viewer" id="viewerB">
        <span class="viewer-tag" id="tagB">bird</span>
        <span class="viewer-emoji" id="emojiB">🦉</span>
        <span class="viewer-name" id="nameB">OWL</span>
      </div>
      <div class="picker-controls">
        <button class="picker-btn" data-side="B" data-act="prev" type="button" aria-label="Previous animal B">◂</button>
        <button class="picker-btn random" data-side="B" data-act="random" type="button">⟲ Random</button>
        <button class="picker-btn" data-side="B" data-act="next" type="button" aria-label="Next animal B">▸</button>
      </div>
    </div>
  </section>

  <section class="result-card" id="resultCard" aria-live="polite">
    <div class="result-empty" id="resultEmpty">
      <span class="arrow" aria-hidden="true">⌁</span>
      Pick two specimens and pull the lever.
    </div>
  </section>

  <section class="saved-list" aria-label="Specimen log">
    <div class="saved-list-head">
      <span>Specimen Log</span>
      <span style="color: var(--dim);" id="logCount">0 saved</span>
    </div>
    <div class="saved-grid" id="savedGrid"></div>
    <div class="saved-empty" id="savedEmpty">No specimens yet. Fuse something.</div>
  </section>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  const ANIMALS = [
    { id: 'shark', emoji: '🦈', name: 'Shark', tag: 'sea' },
    { id: 'owl', emoji: '🦉', name: 'Owl', tag: 'bird' },
    { id: 'octopus', emoji: '🐙', name: 'Octopus', tag: 'sea' },
    { id: 'giraffe', emoji: '🦒', name: 'Giraffe', tag: 'mammal' },
    { id: 'rhino', emoji: '🦏', name: 'Rhino', tag: 'mammal' },
    { id: 'turtle', emoji: '🐢', name: 'Turtle', tag: 'reptile' },
    { id: 'lizard', emoji: '🦎', name: 'Lizard', tag: 'reptile' },
    { id: 'snail', emoji: '🐌', name: 'Snail', tag: 'bug' },
    { id: 'hedgehog', emoji: '🦔', name: 'Hedgehog', tag: 'mammal' },
    { id: 'kangaroo', emoji: '🦘', name: 'Kangaroo', tag: 'mammal' },
    { id: 'skunk', emoji: '🦨', name: 'Skunk', tag: 'mammal' },
    { id: 'badger', emoji: '🦡', name: 'Badger', tag: 'mammal' },
    { id: 'otter', emoji: '🦦', name: 'Otter', tag: 'mammal' },
    { id: 'sloth', emoji: '🦥', name: 'Sloth', tag: 'mammal' },
    { id: 'beaver', emoji: '🦫', name: 'Beaver', tag: 'mammal' },
    { id: 'tiger', emoji: '🐅', name: 'Tiger', tag: 'mammal' },
    { id: 'wolf', emoji: '🐺', name: 'Wolf', tag: 'mammal' },
    { id: 'fox', emoji: '🦊', name: 'Fox', tag: 'mammal' },
    { id: 'horse', emoji: '🐴', name: 'Horse', tag: 'mammal' },
    { id: 'pig', emoji: '🐷', name: 'Pig', tag: 'mammal' },
    { id: 'cow', emoji: '🐮', name: 'Cow', tag: 'mammal' },
    { id: 'chicken', emoji: '🐔', name: 'Chicken', tag: 'bird' },
    { id: 'penguin', emoji: '🐧', name: 'Penguin', tag: 'bird' },
    { id: 'flamingo', emoji: '🦩', name: 'Flamingo', tag: 'bird' },
    { id: 'eagle', emoji: '🦅', name: 'Eagle', tag: 'bird' },
    { id: 'parrot', emoji: '🦜', name: 'Parrot', tag: 'bird' },
    { id: 'peacock', emoji: '🦚', name: 'Peacock', tag: 'bird' },
    { id: 'snake', emoji: '🐍', name: 'Snake', tag: 'reptile' },
    { id: 'scorpion', emoji: '🦂', name: 'Scorpion', tag: 'bug' },
    { id: 'crab', emoji: '🦀', name: 'Crab', tag: 'sea' },
    { id: 'lobster', emoji: '🦞', name: 'Lobster', tag: 'sea' },
    { id: 'shrimp', emoji: '🦐', name: 'Shrimp', tag: 'sea' },
    { id: 'whale', emoji: '🐳', name: 'Whale', tag: 'sea' },
    { id: 'dolphin', emoji: '🐬', name: 'Dolphin', tag: 'sea' },
    { id: 'squid', emoji: '🦑', name: 'Squid', tag: 'sea' },
    { id: 'frog', emoji: '🐸', name: 'Frog', tag: 'amphibian' },
    { id: 'zebra', emoji: '🦓', name: 'Zebra', tag: 'mammal' },
    { id: 'elephant', emoji: '🐘', name: 'Elephant', tag: 'mammal' },
    { id: 'camel', emoji: '🐪', name: 'Camel', tag: 'mammal' },
    { id: 'llama', emoji: '🦙', name: 'Llama', tag: 'mammal' },
    { id: 'rabbit', emoji: '🐰', name: 'Rabbit', tag: 'mammal' },
    { id: 'mouse', emoji: '🐭', name: 'Mouse', tag: 'mammal' },
    { id: 'hamster', emoji: '🐹', name: 'Hamster', tag: 'mammal' },
    { id: 'raccoon', emoji: '🦝', name: 'Raccoon', tag: 'mammal' },
    { id: 'panda', emoji: '🐼', name: 'Panda', tag: 'mammal' },
    { id: 'bear', emoji: '🐻', name: 'Bear', tag: 'mammal' },
    { id: 'lion', emoji: '🦁', name: 'Lion', tag: 'mammal' },
    { id: 'bat', emoji: '🦇', name: 'Bat', tag: 'mammal' },
    { id: 'butterfly', emoji: '🦋', name: 'Butterfly', tag: 'bug' },
    { id: 'spider', emoji: '🕷️', name: 'Spider', tag: 'bug' },
    { id: 'ant', emoji: '🐜', name: 'Ant', tag: 'bug' },
    { id: 'jellyfish', emoji: '🪼', name: 'Jellyfish', tag: 'sea' },
  ];

  const $ = (id) => document.getElementById(id);
  const els = {
    viewerA: $('viewerA'), viewerB: $('viewerB'),
    emojiA: $('emojiA'), emojiB: $('emojiB'),
    nameA: $('nameA'), nameB: $('nameB'),
    tagA: $('tagA'), tagB: $('tagB'),
    fuseBtn: $('fuseBtn'),
    resultCard: $('resultCard'),
    resultEmpty: $('resultEmpty'),
    toast: $('toast'),
    specNum: $('specNum'),
    savedGrid: $('savedGrid'),
    savedEmpty: $('savedEmpty'),
    logCount: $('logCount'),
  };

  const SAVED_KEY = 'hybrid-lab-saved-v1';
  const COUNTER_KEY = 'hybrid-lab-counter-v1';

  const state = {
    indexA: 0,
    indexB: 1,
    lastSeed: null,
    current: null,
    saved: [],
    counter: 1,
    fusing: false,
  };

  try {
    const sv = JSON.parse(localStorage.getItem(SAVED_KEY) || '[]');
    if (Array.isArray(sv)) state.saved = sv.slice(0, 60);
  } catch (e) {}
  try {
    const c = parseInt(localStorage.getItem(COUNTER_KEY), 10);
    if (!isNaN(c) && c > 0) state.counter = c;
  } catch (e) {}
  els.specNum.textContent = String(state.counter).padStart(3, '0');

  function refreshSide(side) {
    const idx = side === 'A' ? state.indexA : state.indexB;
    const animal = ANIMALS[idx];
    const emojiEl = side === 'A' ? els.emojiA : els.emojiB;
    const nameEl = side === 'A' ? els.nameA : els.nameB;
    const tagEl = side === 'A' ? els.tagA : els.tagB;
    const viewerEl = side === 'A' ? els.viewerA : els.viewerB;
    emojiEl.textContent = animal.emoji;
    nameEl.textContent = animal.name.toUpperCase();
    tagEl.textContent = animal.tag;
    viewerEl.classList.remove('swap');
    void viewerEl.offsetWidth;
    viewerEl.classList.add('swap');
  }

  function step(side, delta) {
    if (side === 'A') {
      state.indexA = (state.indexA + delta + ANIMALS.length) % ANIMALS.length;
      if (state.indexA === state.indexB) state.indexA = (state.indexA + delta + ANIMALS.length) % ANIMALS.length;
    } else {
      state.indexB = (state.indexB + delta + ANIMALS.length) % ANIMALS.length;
      if (state.indexB === state.indexA) state.indexB = (state.indexB + delta + ANIMALS.length) % ANIMALS.length;
    }
    refreshSide(side);
  }

  function randomize(side) {
    let next;
    const other = side === 'A' ? state.indexB : state.indexA;
    do { next = Math.floor(Math.random() * ANIMALS.length); } while (next === other);
    if (side === 'A') state.indexA = next; else state.indexB = next;
    refreshSide(side);
  }

  document.querySelectorAll('.picker-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const side = btn.dataset.side;
      const act = btn.dataset.act;
      if (act === 'prev') step(side, -1);
      else if (act === 'next') step(side, 1);
      else if (act === 'random') randomize(side);
    });
  });

  function showToast(text, ms) {
    els.toast.textContent = text;
    els.toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => els.toast.classList.remove('show'), ms || 1400);
  }

  // ---- JSON extraction ----
  function extractJSON(text) {
    if (!text) return null;
    // Strip openai-message-content wrapper if present (some endpoints return nested)
    try { return JSON.parse(text); } catch {}
    const fenced = text.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
    if (fenced) { try { return JSON.parse(fenced[1]); } catch {} }
    const slice = text.match(/{[\s\S]*}/);
    if (slice) { try { return JSON.parse(slice[0]); } catch {} }
    return null;
  }

  function normalize(parsed, a, b) {
    if (!parsed || typeof parsed !== 'object') return makeFallback(a, b);
    const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
    const numericOr = (v, fb) => {
      const n = parseInt(v, 10);
      return isNaN(n) ? fb : clamp(n, 1, 10);
    };
    const trim = (s, max) => String(s || '').slice(0, max).trim();
    return {
      name: trim(parsed.name, 36) || makePortmanteau(a, b),
      tagline: trim(parsed.tagline, 90) || 'an unsupervised collaboration',
      description: trim(parsed.description, 320) || `Inherits the anatomy of a ${a.name.toLowerCase()} with the foraging habits of a ${b.name.toLowerCase()}.`,
      habitat: trim(parsed.habitat, 60) || 'undisclosed',
      diet: trim(parsed.diet, 60) || 'crumbs and rumors',
      danger: numericOr(parsed.danger, 5),
      cuteness: numericOr(parsed.cuteness, 6),
    };
  }

  function makePortmanteau(a, b) {
    const an = a.name.toLowerCase();
    const bn = b.name.toLowerCase();
    const cut = Math.ceil(an.length / 2);
    return (an.slice(0, cut) + bn.slice(Math.floor(bn.length / 2))).replace(/^./, c => c.toUpperCase());
  }

  function makeFallback(a, b) {
    return {
      name: makePortmanteau(a, b),
      tagline: `${a.name} body plan, ${b.name} habits`,
      description: `Inherits the body plan and locomotion of a ${a.name.toLowerCase()}, including most of its primary anatomy. Forages and shelters using strategies typical of a ${b.name.toLowerCase()}, occupying the overlap between both parents' natural ranges.`,
      habitat: `overlap of ${a.name.toLowerCase()} and ${b.name.toLowerCase()} range`,
      diet: `mix of ${a.name.toLowerCase()} and ${b.name.toLowerCase()} prey`,
      danger: 5,
      cuteness: 6,
    };
  }

  async function callPollinations(a, b) {
    const prompt = `You are a deadpan field biologist documenting a hybrid species. Two real animals were combined: a ${a.name} and a ${b.name}.

Write the entry in a straight-faced encyclopedic tone. The description MUST be grounded in real biology — each sentence should reference an actual anatomical feature, sense, behavior, or ecological niche of one of the source animals (examples: a shark's electroreception, an owl's asymmetric ear placement, an octopus's chromatophores, a sloth's algae-symbiotic fur, a flamingo's filter-feeding lamellae, a bat's echolocation). Combine those real traits into one plausible hybrid. The humor should come from the combination itself, not from random absurdity. Avoid generic words like "weird" or "bizarre" — let specific biological details do the work.

Schema:
{
  "name": "single-word portmanteau combining the two animal names (max 24 chars)",
  "tagline": "6-12 word descriptor that names one inherited trait",
  "description": "2 sentences, 80-260 chars total. Sentence 1 references a real trait of one parent and how it manifests. Sentence 2 references a trait of the OTHER parent and the hybrid's resulting behavior or niche.",
  "habitat": "noun phrase consistent with the natural ranges or environments of BOTH parents (5-40 chars)",
  "diet": "drawn from one or both parents' actual diets (5-40 chars)",
  "danger": integer 1-10,
  "cuteness": integer 1-10
}

Output ONLY the JSON object. No preamble, no code fences.`;

    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 14000);
    try {
      const res = await fetch('https://text.pollinations.ai/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          model: 'openai',
          messages: [{ role: 'user', content: prompt }],
          jsonMode: true,
        }),
        signal: ctrl.signal,
      });
      clearTimeout(timeout);
      if (!res.ok) throw new Error('http ' + res.status);
      const data = await res.json();
      let raw = '';
      if (typeof data === 'object') {
        raw = data.choices?.[0]?.message?.content || JSON.stringify(data);
      } else {
        raw = String(data);
      }
      return normalize(extractJSON(raw), a, b);
    } catch (e) {
      clearTimeout(timeout);
      return makeFallback(a, b);
    }
  }

  function imageUrlFor(a, b, seed) {
    const p = `bizarre hybrid creature, fusion of a ${a.name.toLowerCase()} and a ${b.name.toLowerCase()}, single creature centered, illustrated field guide style, dark teal background, dramatic specimen lighting, detailed bio illustration`;
    return `https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=640&height=640&seed=${seed}&nologo=true`;
  }

  function renderResult(a, b, data, opts) {
    state.current = { a: a.id, b: b.id, data, seed: opts.seed };
    els.resultEmpty.remove();
    const seed = opts.seed;
    const imgUrl = imageUrlFor(a, b, seed);
    const dangerCls = data.danger >= 7 ? ' danger' : '';
    els.resultCard.innerHTML = `
      <div>
        <div class="specimen-jar">
          <span class="fallback-emoji" aria-hidden="true">${a.emoji}${b.emoji}</span>
          <img alt="Hybrid of ${a.name} and ${b.name}" src="${imgUrl}">
          <div class="incubating"><div class="arcs"></div>incubating…</div>
        </div>
        <div class="specimen-stamp">SPECIMEN №${String(state.counter).padStart(3, '0')}</div>
      </div>
      <div class="specimen-info">
        <h2 class="creature-name">${escapeHtml(data.name)}</h2>
        <p class="creature-tagline">${escapeHtml(data.tagline)}</p>
        <p class="creature-desc">${escapeHtml(data.description)}</p>
        <div class="meta-grid">
          <div class="meta"><span class="meta-key">Habitat</span><span class="meta-val">${escapeHtml(data.habitat)}</span></div>
          <div class="meta"><span class="meta-key">Diet</span><span class="meta-val">${escapeHtml(data.diet)}</span></div>
        </div>
        <div class="stats-row">
          <div class="stat-bar">
            <div class="stat-bar-top"><span>Cuteness</span><span class="stat-bar-val">${data.cuteness} / 10</span></div>
            <div class="stat-bar-meter"><div class="stat-bar-fill" style="width:${data.cuteness*10}%"></div></div>
          </div>
          <div class="stat-bar">
            <div class="stat-bar-top"><span>Danger</span><span class="stat-bar-val">${data.danger} / 10</span></div>
            <div class="stat-bar-meter"><div class="stat-bar-fill${dangerCls}" style="width:${data.danger*10}%"></div></div>
          </div>
        </div>
        <div class="actions">
          <button class="btn" data-act="reroll" type="button">↻ Reroll</button>
          <button class="btn" data-act="save" type="button">★ Save</button>
          <button class="btn" data-act="share" type="button">↗ Share</button>
        </div>
      </div>
    `;
    // Image load
    const img = els.resultCard.querySelector('img');
    const incub = els.resultCard.querySelector('.incubating');
    const fallback = els.resultCard.querySelector('.fallback-emoji');
    img.addEventListener('load', () => {
      img.classList.add('loaded');
      incub.classList.add('hidden');
      if (fallback) fallback.classList.add('hidden');
    });
    img.addEventListener('error', () => {
      img.style.display = 'none';
      incub.classList.add('hidden');
      if (fallback) fallback.classList.remove('hidden');
    });

    // Actions
    els.resultCard.querySelector('[data-act="reroll"]').addEventListener('click', () => {
      handleFuse();
    });
    els.resultCard.querySelector('[data-act="save"]').addEventListener('click', () => {
      saveCurrent();
    });
    els.resultCard.querySelector('[data-act="share"]').addEventListener('click', () => {
      shareCurrent();
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  async function handleFuse() {
    if (state.fusing) return;
    state.fusing = true;
    els.fuseBtn.disabled = true;
    const oldLabel = els.fuseBtn.innerHTML;
    els.fuseBtn.innerHTML = '<span class="bolt" aria-hidden="true">⚡</span> Incubating <span class="bolt" aria-hidden="true">⚡</span>';
    const a = ANIMALS[state.indexA];
    const b = ANIMALS[state.indexB];
    try {
      const data = await callPollinations(a, b);
      state.counter += 1;
      try { localStorage.setItem(COUNTER_KEY, String(state.counter)); } catch {}
      els.specNum.textContent = String(state.counter).padStart(3, '0');
      const seed = Math.floor(Math.random() * 999999);
      renderResult(a, b, data, { seed });
    } finally {
      state.fusing = false;
      els.fuseBtn.disabled = false;
      els.fuseBtn.innerHTML = oldLabel;
    }
  }

  els.fuseBtn.addEventListener('click', handleFuse);

  function saveCurrent() {
    if (!state.current) return;
    const a = ANIMALS.find(x => x.id === state.current.a);
    const b = ANIMALS.find(x => x.id === state.current.b);
    if (!a || !b) return;
    state.saved.unshift({
      a: state.current.a, b: state.current.b,
      aEmoji: a.emoji, bEmoji: b.emoji,
      data: state.current.data,
      seed: state.current.seed,
      ts: Date.now(),
    });
    state.saved = state.saved.slice(0, 60);
    try { localStorage.setItem(SAVED_KEY, JSON.stringify(state.saved)); } catch {}
    renderSaved();
    showToast('Saved ★');
  }

  function shareCurrent() {
    if (!state.current) return;
    const d = state.current.data;
    const text = `${d.name} — ${d.tagline}\n\n${d.description}\n\nHabitat: ${d.habitat}\nDiet: ${d.diet}\nDanger: ${d.danger}/10 · Cuteness: ${d.cuteness}/10\n\nfrom hybrid-lab on sloppy.live`;
    if (navigator.share) {
      navigator.share({ title: d.name, text }).catch(() => copyText(text));
    } else {
      copyText(text);
    }
  }
  function copyText(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(
        () => showToast('Copied to clipboard'),
        () => showToast('Copy failed')
      );
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); showToast('Copied'); } catch (e) { showToast('Copy failed'); }
      ta.remove();
    }
  }

  function renderSaved() {
    els.savedGrid.innerHTML = '';
    if (state.saved.length === 0) {
      els.savedEmpty.style.display = '';
      els.logCount.textContent = '0 saved';
      return;
    }
    els.savedEmpty.style.display = 'none';
    els.logCount.textContent = state.saved.length + ' saved';
    state.saved.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'saved-item';
      div.tabIndex = 0;
      div.setAttribute('role', 'button');
      div.setAttribute('aria-label', 'Show ' + s.data.name);
      div.innerHTML = `
        <button class="saved-x" type="button" data-del="${i}" aria-label="Remove ${escapeHtml(s.data.name)}">×</button>
        <div class="emoji-pair">${s.aEmoji}＋${s.bEmoji}</div>
        <div class="saved-name">${escapeHtml(s.data.name)}</div>
      `;
      div.addEventListener('click', (e) => {
        if (e.target.matches('[data-del]')) return;
        const a = ANIMALS.find(x => x.id === s.a);
        const b = ANIMALS.find(x => x.id === s.b);
        if (!a || !b) return;
        state.indexA = ANIMALS.indexOf(a);
        state.indexB = ANIMALS.indexOf(b);
        refreshSide('A'); refreshSide('B');
        renderResult(a, b, s.data, { seed: s.seed });
      });
      div.querySelector('[data-del]').addEventListener('click', (e) => {
        e.stopPropagation();
        state.saved.splice(i, 1);
        try { localStorage.setItem(SAVED_KEY, JSON.stringify(state.saved)); } catch {}
        renderSaved();
      });
      els.savedGrid.appendChild(div);
    });
  }

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === ' ' || e.key === 'Enter') {
      if (e.target.tagName === 'BUTTON') return; // let buttons handle
    }
    if (e.key === 'f' || e.key === 'F') { e.preventDefault(); els.fuseBtn.click(); }
    else if (e.key === 'r' || e.key === 'R') { randomize('A'); randomize('B'); }
    else if (e.key === '1') step('A', -1);
    else if (e.key === '2') step('A', 1);
    else if (e.key === '3') step('B', -1);
    else if (e.key === '4') step('B', 1);
  });

  // Boot
  refreshSide('A');
  refreshSide('B');
  renderSaved();
})();
</script>
</body>
</html>
