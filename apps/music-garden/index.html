<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Music Garden · plants grow to ambient synths</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌸">
<meta name="description" content="A generative music garden — plants grow, bloom, and shift colors in response to ambient synth frequencies.">
<meta property="og:title" content="Music Garden" />
<meta property="og:description" content="Plants grow to ambient synth sounds and shift hues with the frequencies. Click to plant a seed." />
<meta property="og:image" content="https://image.pollinations.ai/prompt/dreamy%20twilight%20garden%20with%20glowing%20neon%20pink%20violet%20cyan%20amber%20flowers%20on%20delicate%20stems%20swaying%20in%20soft%20synth%20light%20ambient%20generative%20abstract%20art?width=1200&height=630&nologo=true&seed=8802" />
<meta property="og:url" content="https://sloppy.live/music-garden" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,300;1,400;1,500&family=Syne+Mono&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #06020f;
    --bg-1: #140a2e;
    --bg-2: #1d1147;
    --bg-3: #2b1456;
    --moss: #7bc097;
    --flower-1: #ff8bd1;
    --flower-2: #c497ff;
    --flower-3: #8ff0e1;
    --flower-4: #ffd47a;
    --paper: #f5ecd9;
    --accent: #ffb6f0;
    --dim: #9c87c8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(110, 60, 180, 0.38), transparent 55%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 120, 180, 0.22), transparent 60%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 55%, var(--bg-3));
    color: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas#scene {
    position: fixed;
    inset: 0;
    display: block;
    cursor: crosshair;
  }

  .overlay {
    position: fixed;
    z-index: 5;
    pointer-events: none;
  }
  .overlay > * { pointer-events: auto; }

  .header {
    top: 22px; left: 32px;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(38px, 5.6vw, 68px);
    letter-spacing: 0.005em;
    line-height: 1;
    color: var(--paper);
    text-shadow: 0 0 28px rgba(255, 139, 209, 0.45);
  }
  .header h1 em {
    color: var(--flower-1);
    font-weight: 500;
  }
  .header .sub {
    font-family: 'Syne Mono', monospace;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .header .sub::before { content: '♪ '; color: var(--flower-3); }

  .stats {
    position: fixed;
    top: 26px; right: 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-transform: uppercase;
    text-align: right;
    z-index: 4;
  }
  .stats .row {
    margin: 5px 0;
    display: flex;
    justify-content: flex-end;
    align-items: baseline;
    gap: 10px;
  }
  .stats b {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--paper);
    font-weight: 500;
    min-width: 42px;
    text-align: right;
  }
  .stats b.tone { color: var(--flower-3); }

  .hint {
    position: fixed;
    bottom: 92px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--dim);
    text-align: center;
    letter-spacing: 0.04em;
    transition: opacity 1.4s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 4;
  }
  .hint.faded { opacity: 0; }

  .controls {
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    align-items: center;
    padding: 12px 18px;
    border: 1px solid rgba(255, 182, 240, 0.18);
    border-radius: 999px;
    background: rgba(10, 4, 28, 0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  button.pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 9px 18px;
    background: transparent;
    color: var(--paper);
    border: 1px solid rgba(255, 182, 240, 0.35);
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 500;
  }
  button.pill:hover {
    background: rgba(255, 139, 209, 0.15);
    border-color: var(--flower-1);
    color: var(--flower-1);
  }
  button.pill.primary {
    background: linear-gradient(135deg, var(--flower-1), var(--flower-2));
    color: var(--bg-1);
    border-color: transparent;
  }
  button.pill.primary:hover {
    color: var(--bg-0);
    box-shadow: 0 0 22px rgba(255, 139, 209, 0.55);
  }

  .scale-pick {
    display: flex;
    gap: 4px;
  }
  .scale-pick .s {
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    padding: 6px 10px;
    color: var(--dim);
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 999px;
    text-transform: lowercase;
    transition: all 0.15s;
  }
  .scale-pick .s:hover { color: var(--flower-3); }
  .scale-pick .s.active {
    color: var(--flower-3);
    border-color: rgba(143, 240, 225, 0.38);
    background: rgba(143, 240, 225, 0.08);
  }

  @media (max-width: 700px) {
    .header { left: 18px; top: 14px; }
    .header h1 { font-size: 34px; }
    .header .sub { font-size: 10px; letter-spacing: 0.2em; }
    .stats { top: 14px; right: 18px; font-size: 9px; }
    .stats b { font-size: 13px; }
    .controls {
      padding: 10px 14px;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 94vw;
    }
    .scale-pick { flex-wrap: wrap; justify-content: center; }
    button.pill { padding: 8px 12px; font-size: 9px; letter-spacing: 0.18em; }
    .scale-pick .s { padding: 5px 8px; font-size: 9px; }
    .hint { font-size: 13px; bottom: 130px; white-space: normal; max-width: 80vw; }
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="overlay header">
    <h1><em>music</em> garden</h1>
    <div class="sub">plants listen · bloom · glow</div>
  </div>

  <div class="stats">
    <div class="row"><span>plants</span><b id="stat-plants">0</b></div>
    <div class="row"><span>blooms</span><b id="stat-blooms">0</b></div>
    <div class="row"><span>last tone</span><b class="tone" id="stat-tone">—</b></div>
  </div>

  <div class="hint" id="hint">click anywhere to plant a seed · turn sound on</div>

  <div class="overlay controls">
    <button class="pill primary" id="audioBtn">▶ begin</button>
    <div class="scale-pick" id="scales">
      <div class="s active" data-s="pentatonic">pentatonic</div>
      <div class="s" data-s="dorian">dorian</div>
      <div class="s" data-s="lydian">lydian</div>
      <div class="s" data-s="mixolydian">mixolydian</div>
    </div>
    <button class="pill" id="plantBtn">＋ seed</button>
  </div>

<script>
(() => {
  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');
  const statPlantsEl = document.getElementById('stat-plants');
  const statBloomsEl = document.getElementById('stat-blooms');
  const statToneEl = document.getElementById('stat-tone');
  const audioBtn = document.getElementById('audioBtn');
  const plantBtn = document.getElementById('plantBtn');
  const hintEl = document.getElementById('hint');

  let W = 0, H = 0;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    stars.length = 0; // regen stars
  }

  const plants = [];
  const stars = [];
  const pollen = [];
  let blooms = 0;
  let hintFaded = false;

  // ---------- Audio ----------
  const SCALES = {
    pentatonic: [0, 2, 4, 7, 9],
    dorian:     [0, 2, 3, 5, 7, 9, 10],
    lydian:     [0, 2, 4, 6, 7, 9, 11],
    mixolydian: [0, 2, 4, 5, 7, 9, 10]
  };
  let currentScale = 'pentatonic';
  const ROOT_MIDI = 57; // A3

  let audioCtx = null, analyser = null, freqData = null;
  let chimeBus = null, droneGain = null, droneStarted = false;
  let audioStarted = false;
  let chimeTimer = null;

  function initAudio() {
    const Ctor = window.AudioContext || window.webkitAudioContext;
    audioCtx = new Ctor();

    const master = audioCtx.createGain();
    master.gain.value = 0.42;
    master.connect(audioCtx.destination);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.78;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    analyser.connect(master);

    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -14;
    comp.ratio.value = 4;
    comp.attack.value = 0.012;
    comp.release.value = 0.3;
    comp.connect(analyser);

    // Reverb impulse
    const reverb = audioCtx.createConvolver();
    const rLen = Math.floor(audioCtx.sampleRate * 3.4);
    const imp = audioCtx.createBuffer(2, rLen, audioCtx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = imp.getChannelData(ch);
      for (let i = 0; i < rLen; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / rLen, 3.4);
      }
    }
    reverb.buffer = imp;

    const wet = audioCtx.createGain();
    wet.gain.value = 0.58;
    reverb.connect(wet);
    wet.connect(comp);

    const dry = audioCtx.createGain();
    dry.gain.value = 0.72;
    dry.connect(comp);

    // Drone bus + LPF with slow LFO
    droneGain = audioCtx.createGain();
    droneGain.gain.value = 0;
    droneGain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 3.2);

    const lpf = audioCtx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 900;
    lpf.Q.value = 0.6;

    droneGain.connect(lpf);
    lpf.connect(dry);
    lpf.connect(reverb);

    const filterLFO = audioCtx.createOscillator();
    filterLFO.frequency.value = 0.08;
    const filterLFOGain = audioCtx.createGain();
    filterLFOGain.gain.value = 450;
    filterLFO.connect(filterLFOGain).connect(lpf.frequency);
    filterLFO.start();

    // Four drone voices — A1, E2, A2, C#3 (A minor feel)
    const droneFreqs = [55, 82.4, 110, 138.6];
    droneFreqs.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = i % 2 === 0 ? 'sine' : 'triangle';
      osc.frequency.value = f;

      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.04 + Math.random() * 0.14;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 2 + Math.random() * 4;
      lfo.connect(lfoGain).connect(osc.detune);

      const g = audioCtx.createGain();
      g.gain.value = 0.22;
      osc.connect(g).connect(droneGain);
      osc.start();
      lfo.start();
    });

    // Chime bus
    chimeBus = audioCtx.createGain();
    chimeBus.gain.value = 0.55;
    chimeBus.connect(dry);
    chimeBus.connect(reverb);

    droneStarted = true;
    audioStarted = true;
    audioBtn.textContent = '◼ pause';
    audioBtn.classList.remove('primary');

    scheduleChime();

    if (!hintFaded) {
      hintEl.classList.add('faded');
      hintFaded = true;
    }
  }

  function suspendAudio() {
    if (!audioCtx) return;
    audioCtx.suspend();
    audioStarted = false;
    audioBtn.textContent = '▶ resume';
    audioBtn.classList.add('primary');
  }
  function resumeAudio() {
    if (!audioCtx) return;
    audioCtx.resume();
    audioStarted = true;
    audioBtn.textContent = '◼ pause';
    audioBtn.classList.remove('primary');
  }

  function scheduleChime() {
    if (!audioCtx) return;
    const delay = 0.9 + Math.random() * 3.6;
    chimeTimer = setTimeout(() => {
      if (audioCtx && audioCtx.state === 'running') playChime();
      scheduleChime();
    }, delay * 1000);
  }

  function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }
  const NOTE_NAMES = ['A', 'A#', 'B', 'C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#'];
  function midiName(m) {
    const n = NOTE_NAMES[((m - 21) % 12 + 12) % 12];
    const o = Math.floor((m - 12) / 12);
    return n + o;
  }

  function playChime(forcedMidi) {
    if (!audioCtx || !chimeBus) return;
    const scale = SCALES[currentScale];
    let midi;
    if (forcedMidi != null) {
      midi = forcedMidi;
    } else {
      const deg = scale[Math.floor(Math.random() * scale.length)];
      const oct = 1 + Math.floor(Math.random() * 3); // 1..3 octaves above root
      midi = ROOT_MIDI + deg + oct * 12;
    }
    const freq = midiToFreq(midi);
    const t = audioCtx.currentTime;

    const osc1 = audioCtx.createOscillator();
    osc1.type = 'triangle';
    osc1.frequency.value = freq;
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2.005;
    const osc3 = audioCtx.createOscillator();
    osc3.type = 'sine';
    osc3.frequency.value = freq * 3.02;

    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.2, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.9);

    const harmonicGain = audioCtx.createGain();
    harmonicGain.gain.value = 0.22;
    osc3.connect(harmonicGain).connect(g);

    osc1.connect(g);
    osc2.connect(g);
    g.connect(chimeBus);

    osc1.start(t); osc2.start(t); osc3.start(t);
    osc1.stop(t + 2.0); osc2.stop(t + 2.0); osc3.stop(t + 2.0);

    statToneEl.textContent = midiName(midi);

    // Nudge plants in the matching band
    const band = freq < 200 ? 0 : freq < 420 ? 1 : freq < 900 ? 2 : 3;
    const matches = plants.filter(p => p.freqBand === band);
    if (matches.length) {
      const p = matches[Math.floor(Math.random() * matches.length)];
      p.bloomNudge = (p.bloomNudge || 0) + 0.6;
    }
  }

  // ---------- Plants ----------
  function plantSeed(x, baseY) {
    if (plants.length >= 18) plants.shift();
    const band = Math.floor(Math.random() * 4);
    // Flower hue: each band has preferred palette
    const bandPalettes = [
      [18, 30, 10],        // low: amber/coral
      [140, 160, 120],     // low-mid: jade/green-gold
      [285, 310, 260],     // mid: violet/magenta
      [190, 200, 170, 330] // high: cyan/pink
    ];
    const pal = bandPalettes[band];
    const hueFlower = pal[Math.floor(Math.random() * pal.length)] + (Math.random() - 0.5) * 24;
    return plants.push({
      x,
      baseY,
      height: 0,
      maxHeight: 170 + Math.random() * 260,
      stemBend: (Math.random() - 0.5) * 0.28,
      swayPhase: Math.random() * Math.PI * 2,
      swaySpeed: 0.45 + Math.random() * 0.85,
      hueBase: 80 + Math.random() * 70,
      hueFlower,
      freqBand: band,
      leavesDrawn: [],
      maxLeaves: 2 + Math.floor(Math.random() * 4),
      petalCount: 5 + Math.floor(Math.random() * 8),
      petalShape: Math.random() < 0.5 ? 'round' : 'teardrop',
      centerR: 3 + Math.random() * 3.5,
      flowerSize: 0,
      flowerMaxSize: 14 + Math.random() * 24,
      bloomed: false,
      bloomPulse: 0,
      bloomNudge: 0,
      age: 0,
      pollenTimer: 0,
      energy: 0,
      energyAvg: 0,
      visualHueShift: 0
    });
  }

  // ---------- Render helpers ----------
  function bezierPoint(a, b, c, d, t) {
    const mt = 1 - t;
    return mt*mt*mt*a + 3*mt*mt*t*b + 3*mt*t*t*c + t*t*t*d;
  }

  function plantStemPoints(p, t) {
    const sway = Math.sin(t * p.swaySpeed + p.swayPhase) * 7;
    const topX = p.x + p.stemBend * p.height + sway;
    const topY = p.baseY - p.height;
    const cx1 = p.x + p.stemBend * p.height * 0.25;
    const cy1 = p.baseY - p.height * 0.55;
    const cx2 = topX - sway * 0.35;
    const cy2 = p.baseY - p.height * 0.88;
    return { topX, topY, cx1, cy1, cx2, cy2, sway };
  }

  function pointAt(p, stem, t2) {
    const bx = bezierPoint(p.x, stem.cx1, stem.cx2, stem.topX, t2);
    const by = bezierPoint(p.baseY, stem.cy1, stem.cy2, stem.topY, t2);
    return { x: bx, y: by };
  }

  // ---------- Update ----------
  let bgT = 0;
  function update(dt) {
    bgT += dt;

    // Stars
    if (stars.length < 130) {
      while (stars.length < 130) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H * 0.82,
          r: Math.random() * 1.2 + 0.3,
          phase: Math.random() * Math.PI * 2,
          twSpeed: 0.5 + Math.random() * 1.7,
          hue: 200 + Math.random() * 140
        });
      }
    }

    // Plants
    for (const p of plants) {
      p.age += dt;

      let energy = 0;
      if (freqData && audioStarted) {
        const bands = [[0, 0.12], [0.12, 0.3], [0.3, 0.55], [0.55, 0.9]];
        const [s, e] = bands[p.freqBand];
        const si = Math.floor(s * freqData.length);
        const ei = Math.floor(e * freqData.length);
        for (let i = si; i < ei; i++) energy += freqData[i];
        energy /= Math.max(1, (ei - si) * 255);
      } else {
        energy = 0.05; // tiny trickle growth even without audio
      }
      p.energy = energy;
      p.energyAvg = p.energyAvg * 0.88 + energy * 0.12;

      // Grow stem
      if (p.height < p.maxHeight) {
        const growSpeed = 12 + energy * 110 + p.bloomNudge * 14;
        p.height += growSpeed * dt;
        if (p.height > p.maxHeight) p.height = p.maxHeight;

        // Sprout leaves as we grow
        const wanted = Math.floor((p.height / p.maxHeight) * p.maxLeaves);
        while (p.leavesDrawn.length < wanted) {
          p.leavesDrawn.push({
            t: (p.leavesDrawn.length + 1) / (p.maxLeaves + 1),
            side: p.leavesDrawn.length % 2 === 0 ? 1 : -1,
            size: 0,
            maxSize: 14 + Math.random() * 10,
            growRate: 0.5 + Math.random() * 0.6
          });
        }
      }

      for (const lf of p.leavesDrawn) {
        if (lf.size < lf.maxSize) {
          lf.size += lf.maxSize * lf.growRate * dt;
          if (lf.size > lf.maxSize) lf.size = lf.maxSize;
        }
      }

      // Flower
      if (p.height >= p.maxHeight && !p.bloomed) {
        p.flowerSize += (6 + energy * 40 + p.bloomNudge * 22) * dt;
        if (p.flowerSize >= p.flowerMaxSize) {
          p.flowerSize = p.flowerMaxSize;
          p.bloomed = true;
          blooms++;
          // Pollen burst
          for (let i = 0; i < 22; i++) {
            const a = (i / 22) * Math.PI * 2 + Math.random() * 0.3;
            pollen.push({
              x: p.x + Math.cos(a) * p.flowerSize,
              y: p.baseY - p.height + Math.sin(a) * p.flowerSize * 0.6,
              vx: Math.cos(a) * (22 + Math.random() * 30),
              vy: Math.sin(a) * 15 - 22 - Math.random() * 24,
              hue: p.hueFlower,
              life: 2.2 + Math.random() * 2.2,
              age: 0,
              r: 1.4 + Math.random() * 1.6
            });
          }
          // Play a chime in the plant's band
          if (audioCtx && audioCtx.state === 'running') {
            const scale = SCALES[currentScale];
            const deg = scale[Math.floor(Math.random() * scale.length)];
            const bandOct = [0, 12, 24, 36][p.freqBand];
            playChime(ROOT_MIDI + deg + bandOct);
          }
        }
      } else if (p.bloomed) {
        p.bloomPulse = Math.sin(p.age * 3.2) * (0.05 + energy * 0.32);
        p.pollenTimer -= dt;
        if (p.pollenTimer <= 0 && energy > 0.18) {
          p.pollenTimer = 0.4 + Math.random() * 1.4;
          pollen.push({
            x: p.x + (Math.random() - 0.5) * p.flowerSize * 0.8,
            y: p.baseY - p.height + (Math.random() - 0.5) * p.flowerSize * 0.5,
            vx: (Math.random() - 0.5) * 16,
            vy: -6 - Math.random() * 22,
            hue: p.hueFlower + (Math.random() - 0.5) * 30,
            life: 3 + Math.random() * 2,
            age: 0,
            r: 1 + Math.random() * 1.4
          });
        }
      }

      p.bloomNudge *= Math.pow(0.35, dt);
      const targetHueShift = energy * 40;
      p.visualHueShift += (targetHueShift - p.visualHueShift) * Math.min(1, dt * 3);
    }

    // Pollen
    for (let i = pollen.length - 1; i >= 0; i--) {
      const pp = pollen[i];
      pp.vy += 16 * dt;
      pp.vx *= Math.pow(0.99, dt * 60);
      pp.vy *= Math.pow(0.992, dt * 60);
      pp.x += pp.vx * dt;
      pp.y += pp.vy * dt;
      pp.age += dt;
      if (pp.age > pp.life || pp.y > H + 20) pollen.splice(i, 1);
    }

    statPlantsEl.textContent = plants.length;
    statBloomsEl.textContent = blooms;
  }

  // ---------- Render ----------
  function drawStars(t) {
    for (const s of stars) {
      const a = 0.32 + Math.sin(t * s.twSpeed + s.phase) * 0.3 + 0.3;
      ctx.fillStyle = `hsla(${s.hue}, 65%, 85%, ${a})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawGround() {
    const grad = ctx.createLinearGradient(0, H - 120, 0, H);
    grad.addColorStop(0, 'rgba(6, 2, 15, 0)');
    grad.addColorStop(0.55, 'rgba(22, 8, 40, 0.55)');
    grad.addColorStop(1, 'rgba(44, 14, 72, 0.9)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, H - 120, W, 120);

    // Grass tufts — sway with bgT
    ctx.strokeStyle = 'rgba(120, 200, 160, 0.22)';
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    for (let x = 0; x < W; x += 11) {
      const h = 5 + (Math.sin(x * 0.07 + bgT * 0.5) * 2 + 3) + (x * 0.137 % 3);
      const tx = Math.sin(bgT * 0.8 + x * 0.08) * 1.6;
      ctx.beginPath();
      ctx.moveTo(x, H - 6);
      ctx.lineTo(x + tx, H - 6 - h);
      ctx.stroke();
    }
  }

  function drawSpectrum() {
    if (!freqData || !audioStarted) return;
    const bars = 72;
    const barW = W / bars;
    for (let i = 0; i < bars; i++) {
      const binStart = Math.floor((i / bars) * freqData.length * 0.7);
      const binEnd = Math.floor(((i + 1) / bars) * freqData.length * 0.7);
      let v = 0;
      for (let j = binStart; j < binEnd; j++) v += freqData[j];
      v /= Math.max(1, (binEnd - binStart) * 255);
      const h = v * 52;
      if (h < 0.5) continue;
      const hue = 170 + i * 3.1;
      const grad = ctx.createLinearGradient(0, H, 0, H - h);
      grad.addColorStop(0, `hsla(${hue}, 85%, 60%, 0.38)`);
      grad.addColorStop(1, `hsla(${hue}, 95%, 82%, 0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(i * barW + 0.5, H - h, barW - 1, h);
    }
  }

  function drawPlant(p, t) {
    const stem = plantStemPoints(p, t);

    // Stem
    const stemHue = (p.hueBase + p.visualHueShift + 360) % 360;
    const stemSat = 48 + p.energyAvg * 40;
    const stemLight = 38 + p.energyAvg * 25;

    ctx.strokeStyle = `hsla(${stemHue}, ${stemSat}%, ${stemLight}%, 0.92)`;
    ctx.lineWidth = 2.3 + p.height / 260;
    ctx.lineCap = 'round';
    ctx.shadowColor = `hsla(${stemHue}, 90%, 62%, 0.5)`;
    ctx.shadowBlur = 8 + p.energy * 16;
    ctx.beginPath();
    ctx.moveTo(p.x, p.baseY);
    ctx.bezierCurveTo(stem.cx1, stem.cy1, stem.cx2, stem.cy2, stem.topX, stem.topY);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Leaves
    for (const lf of p.leavesDrawn) {
      if (lf.size < 0.6) continue;
      const a = pointAt(p, stem, lf.t);
      const b = pointAt(p, stem, Math.min(1, lf.t + 0.02));
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len, ny = dx / len;
      const rootX = a.x + nx * lf.side * 3;
      const rootY = a.y + ny * lf.side * 3;
      const tipX = rootX + nx * lf.side * lf.size * 1.6 + (Math.sin(t * 1.4 + lf.t * 6) * 2);
      const tipY = rootY + ny * lf.side * lf.size * 1.6 - lf.size * 0.3;

      ctx.save();
      ctx.translate((rootX + tipX) / 2, (rootY + tipY) / 2);
      ctx.rotate(Math.atan2(tipY - rootY, tipX - rootX));
      const lfHue = ((p.hueBase - 8 + p.visualHueShift * 0.7) + 360) % 360;
      ctx.fillStyle = `hsla(${lfHue}, ${stemSat + 10}%, ${stemLight + 10}%, 0.85)`;
      ctx.shadowColor = `hsla(${lfHue}, 80%, 60%, 0.45)`;
      ctx.shadowBlur = 6 + p.energy * 8;
      ctx.beginPath();
      ctx.ellipse(0, 0, lf.size * 0.6, lf.size * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = `hsla(${lfHue}, 40%, 28%, 0.45)`;
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(-lf.size * 0.55, 0);
      ctx.lineTo(lf.size * 0.55, 0);
      ctx.stroke();
      ctx.restore();
      ctx.shadowBlur = 0;
    }

    // Flower
    if (p.flowerSize > 0.4) {
      const fx = stem.topX, fy = stem.topY;
      const fSize = p.flowerSize * (1 + p.bloomPulse);
      const fHue = (p.hueFlower + p.visualHueShift + 360) % 360;

      // Outer glow halo
      const gg = ctx.createRadialGradient(fx, fy, 0, fx, fy, fSize * 3.2);
      gg.addColorStop(0, `hsla(${fHue}, 92%, 72%, ${0.35 + p.energy * 0.4})`);
      gg.addColorStop(1, `hsla(${fHue}, 92%, 72%, 0)`);
      ctx.fillStyle = gg;
      ctx.fillRect(fx - fSize * 3.2, fy - fSize * 3.2, fSize * 6.4, fSize * 6.4);

      // Petals
      const petalL = fSize;
      const petalW = fSize * 0.52;
      for (let i = 0; i < p.petalCount; i++) {
        const a = (i / p.petalCount) * Math.PI * 2 + t * 0.1;
        ctx.save();
        ctx.translate(fx, fy);
        ctx.rotate(a);
        const petalGrad = ctx.createRadialGradient(0, -petalL * 0.45, 0, 0, -petalL * 0.45, petalL);
        petalGrad.addColorStop(0, `hsla(${fHue}, 96%, 82%, 0.98)`);
        petalGrad.addColorStop(0.6, `hsla(${(fHue + 18) % 360}, 85%, 64%, 0.82)`);
        petalGrad.addColorStop(1, `hsla(${(fHue + 28) % 360}, 70%, 42%, 0.08)`);
        ctx.fillStyle = petalGrad;
        ctx.shadowColor = `hsla(${fHue}, 94%, 68%, ${0.6 + p.energy * 0.4})`;
        ctx.shadowBlur = 12 + p.energy * 18;
        ctx.beginPath();
        if (p.petalShape === 'round') {
          ctx.ellipse(0, -petalL * 0.5, petalW * 0.5, petalL * 0.5, 0, 0, Math.PI * 2);
        } else {
          ctx.moveTo(0, 0);
          ctx.quadraticCurveTo(petalW * 0.65, -petalL * 0.4, 0, -petalL);
          ctx.quadraticCurveTo(-petalW * 0.65, -petalL * 0.4, 0, 0);
        }
        ctx.fill();
        ctx.restore();
      }
      ctx.shadowBlur = 0;

      // Center + highlight
      const ratio = p.flowerSize / p.flowerMaxSize;
      ctx.fillStyle = `hsla(${(fHue + 50) % 360}, 92%, 72%, 0.95)`;
      ctx.beginPath();
      ctx.arc(fx, fy, p.centerR * ratio, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `hsla(${(fHue + 65) % 360}, 95%, 88%, 1)`;
      ctx.beginPath();
      ctx.arc(fx - 1.2, fy - 1.2, p.centerR * 0.5 * ratio, 0, Math.PI * 2);
      ctx.fill();

      // Speckle stamens on mature bloom
      if (p.bloomed) {
        ctx.fillStyle = `hsla(${(fHue + 80) % 360}, 95%, 85%, 0.9)`;
        const stamens = Math.min(6, Math.floor(ratio * 6));
        for (let s = 0; s < stamens; s++) {
          const ang = (s / stamens) * Math.PI * 2 + t * 0.4;
          ctx.beginPath();
          ctx.arc(fx + Math.cos(ang) * p.centerR * 0.6, fy + Math.sin(ang) * p.centerR * 0.6, 0.9, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  function drawPollen() {
    for (const pp of pollen) {
      const a = Math.min(1, 1 - pp.age / pp.life);
      ctx.fillStyle = `hsla(${pp.hue}, 92%, 75%, ${a})`;
      ctx.shadowColor = `hsla(${pp.hue}, 95%, 65%, ${a})`;
      ctx.shadowBlur = 9;
      ctx.beginPath();
      ctx.arc(pp.x, pp.y, pp.r + a * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function draw(t) {
    if (analyser && freqData && audioStarted) analyser.getByteFrequencyData(freqData);

    // Soft fade for trail
    ctx.fillStyle = 'rgba(6, 2, 15, 0.22)';
    ctx.fillRect(0, 0, W, H);

    drawStars(t);
    drawSpectrum();
    drawGround();

    // Sort plants by baseY so they stack visually
    const sorted = plants.slice().sort((a, b) => a.baseY - b.baseY);
    for (const p of sorted) drawPlant(p, t);

    drawPollen();
  }

  // ---------- Loop ----------
  let lastTs = null;
  let autoSeedTimer = 3.2;
  function loop(ts) {
    if (lastTs == null) lastTs = ts;
    const dt = Math.min((ts - lastTs) / 1000, 1 / 30);
    lastTs = ts;
    const t = ts / 1000;

    // Auto-plant once audio has started
    autoSeedTimer -= dt;
    if (autoSeedTimer <= 0 && audioStarted && plants.length < 14) {
      autoSeedTimer = 5 + Math.random() * 9;
      const x = 60 + Math.random() * (W - 120);
      plantSeed(x, H - 14 + Math.random() * 8);
    }

    update(dt);
    draw(t);
    requestAnimationFrame(loop);
  }

  // ---------- Input ----------
  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const x = Math.max(20, Math.min(W - 20, e.clientX - rect.left));
    plantSeed(x, H - 14 + Math.random() * 6);
    if (!hintFaded) {
      hintEl.classList.add('faded');
      hintFaded = true;
    }
  });

  audioBtn.addEventListener('click', () => {
    if (!audioCtx) initAudio();
    else if (audioStarted) suspendAudio();
    else resumeAudio();
  });

  plantBtn.addEventListener('click', () => {
    const x = 60 + Math.random() * (W - 120);
    plantSeed(x, H - 14 + Math.random() * 6);
  });

  document.querySelectorAll('.scale-pick .s').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.scale-pick .s').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      currentScale = el.dataset.s;
    });
  });

  window.addEventListener('resize', resize);
  resize();

  // Seed a few starter plants so the garden isn't empty
  for (let i = 0; i < 3; i++) {
    const p = plants[plantSeed(W * (0.22 + i * 0.28), H - 14) - 1];
    // Give them a visible head start
    p.height = 60 + Math.random() * 80;
    const lc = Math.floor((p.height / p.maxHeight) * p.maxLeaves);
    for (let k = 0; k < lc; k++) {
      p.leavesDrawn.push({
        t: (k + 1) / (p.maxLeaves + 1),
        side: k % 2 === 0 ? 1 : -1,
        size: 8 + Math.random() * 6,
        maxSize: 14 + Math.random() * 8,
        growRate: 0.6
      });
    }
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
