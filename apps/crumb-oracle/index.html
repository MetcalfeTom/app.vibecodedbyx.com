const SYMBOL_NAMES=Object.keys(SYMBOLS);

// Audio
let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function crackleSound(){
 if(!actx)return;const t=actx.currentTime;
 const sz=actx.sampleRate*.06,buf=actx.createBuffer(1,sz,actx.sampleRate);
 const d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*.08*(1-i/sz);
 const s=actx.createBufferSource(),bp=actx.createBiquadFilter(),g=actx.createGain();
 bp.type='bandpass';bp.frequency.value=2000+Math.random()*3000;bp.Q.value=1;
 g.gain.setValueAtTime(.05,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);
 s.buffer=buf;s.connect(bp);bp.connect(g);g.connect(actx.destination);s.start(t);
}
function dingSound(){
 if(!actx)return;const t=actx.currentTime;
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='sine';o.frequency.value=880;
 g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);
 o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.4);
}
function popSound(){
 if(!actx)return;const t=actx.currentTime;
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='triangle';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(60,t+.05);
 g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);
 o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.06);
}

function initBread(){
 breadPixels=[];
 for(let y=0;y<PH;y++){
  for(let x=0;x<PW;x++){
   // Bread shape — rounded rectangle
   const inBread=x>=4&&x<PW-4&&y>=3&&y<PH-3;
   const corner=(!inBread&&x>=3&&x<PW-3&&y>=2&&y<PH-2);
   breadPixels.push({
    isBread:inBread||corner,
    burn:0,// 0=raw, 1=fully charred
    noise:Math.random(),// texture variation
    symbolBurn:false,// is this pixel part of the symbol?
   });
  }
 }
}

function stampSymbol(symbolName){
 const sym=SYMBOLS[symbolName];
 const grid=sym.grid;
 // Center the 8x8 symbol on the bread
 const ox=Math.floor((PW-8*3)/2);// 3x scale
 const oy=Math.floor((PH-8*3)/2);
 for(let sy=0;sy<8;sy++){
  for(let sx=0;sx<8;sx++){
   if(grid[sy][sx]==='1'){
    // 3x3 block per symbol pixel
    for(let dy=0;dy<3;dy++){
     for(let dx=0;dx<3;dx++){
      const px=ox+sx*3+dx;
      const py=oy+sy*3+dy;
      if(px>=0&&px<PW&&py>=0&&py<PH){
       const idx=py*PW+px;
       if(breadPixels[idx].isBread){
        breadPixels[idx].symbolBurn=true;
       }
      }
     }
    }
   }
  }
 }
}

function startToast(){
 if(toasting)return;
 initAudio();
 heatLevel=parseInt(document.getElementById('heat-slider').value);
 document.getElementById('heat-val').textContent=heatLevel;

 // Pick random symbol
 currentSymbol=SYMBOL_NAMES[Math.floor(Math.random()*SYMBOL_NAMES.length)];
 const sym=SYMBOLS[currentSymbol];
 currentProphecy=sym.prophecies[Math.floor(Math.random()*sym.prophecies.length)];

 initBread();
 stampSymbol(currentSymbol);
 toasting=true;
 toastProgress=0;
 smokeParticles=[];
 document.getElementById('toast-btn').disabled=true;
 document.getElementById('prophecy').style.opacity='0';
 document.getElementById('symbol-name').style.opacity='0';
 popSound();
}

function finishToast(){
 toasting=false;
 document.getElementById('toast-btn').disabled=false;
 dingSound();

 // Reveal prophecy
 setTimeout(()=>{
  document.getElementById('prophecy').textContent=currentProphecy;
  document.getElementById('prophecy').style.opacity='1';
  document.getElementById('symbol-name').textContent='⸎ '+currentSymbol.toUpperCase()+' ⸎';
  document.getElementById('symbol-name').style.opacity='1';
 },300);

 // Save to history
 history.unshift({symbol:currentSymbol,prophecy:currentProphecy,heat:heatLevel});
 if(history.length>10)history.pop();
 updateHistory();
}

function updateHistory(){
 const list=document.getElementById('h-list');
 list.innerHTML='';
 history.forEach(h=>{
  const el=document.createElement('div');
  el.className='h-item';
  // Mini canvas of the symbol
  const mc=document.createElement('canvas');
  mc.width=PW;mc.height=PH;
  const mx=mc.getContext('2d');
  drawBreadToContext(mx,h.symbol,h.heat);
  el.appendChild(mc);
  const txt=document.createElement('div');
  txt.className='h-text';
  txt.innerHTML='<span class="h-sym">'+h.symbol+'</span><br>'+h.prophecy;
  el.appendChild(txt);
  list.appendChild(el);
 });
}

function drawBreadToContext(ctx,symbolName,heat){
 // Static render for history thumbnails
 const sym=SYMBOLS[symbolName];
 const grid=sym.grid;
 for(let y=0;y<PH;y++){
  for(let x=0;x<PW;x++){
   const inBread=(x>=4&&x<PW-4&&y>=3&&y<PH-3)||(x>=3&&x<PW-3&&y>=2&&y<PH-2);
   if(!inBread){ctx.fillStyle='#1a1008';ctx.fillRect(x,y,1,1);continue}
   // Check if symbol pixel
   const ox=Math.floor((PW-8*3)/2),oy=Math.floor((PH-8*3)/2);
   const sx=Math.floor((x-ox)/3),sy=Math.floor((y-oy)/3);
   let isSym=false;
   if(sx>=0&&sx<8&&sy>=0&&sy<8&&grid[sy]&&grid[sy][sx]==='1'){
    const lx=(x-ox)%3,ly=(y-oy)%3;
    if(lx>=0&&ly>=0)isSym=true;
   }
   const baseBurn=heat*.15;
   const burn=isSym?Math.min(1,baseBurn+.5+Math.random()*.2):baseBurn+Math.random()*.05;
   const r=Math.floor(210-burn*160+(Math.random()-.5)*8);
   const g2=Math.floor(170-burn*140+(Math.random()-.5)*8);
   const b=Math.floor(90-burn*80+(Math.random()-.5)*5);
   ctx.fillStyle='rgb('+r+','+g2+','+b+')';
   ctx.fillRect(x,y,1,1);
  }
 }
}

function update(dt){
 if(!toasting)return;
 const speed=heatLevel*.4;
 toastProgress+=dt*speed;

 // Burn bread progressively
 const burnTarget=Math.min(1,toastProgress/3);
 breadPixels.forEach(p=>{
  if(!p.isBread)return;
  // Symbol pixels burn faster and darker
  const target=p.symbolBurn?Math.min(1,burnTarget*2+.3):burnTarget*.6;
  p.burn+=(target-p.burn)*dt*2;
  // Add noise-based variation
  p.burn=Math.min(1,p.burn+p.noise*dt*.05);
 });

 // Crackling sounds
 if(Math.random()<dt*heatLevel*3)crackleSound();

 // Smoke particles
 if(toastProgress>.5&&Math.random()<dt*heatLevel*2){
  smokeParticles.push({
   x:4+Math.random()*(PW-8),
   y:3+Math.random()*(PH-6),
   vy:-(8+Math.random()*12),
   life:1+Math.random(),
   r:.5+Math.random(),
  });
 }

 // Done?
 if(toastProgress>=3/speed+1){
  finishToast();
 }
}

function draw(){
 // Background (toaster slot)
 X.fillStyle='#1a1008';X.fillRect(0,0,PW,PH);

 // Draw bread pixels
 breadPixels.forEach((p,i)=>{
  const x=i%PW,y=Math.floor(i/PW);
  if(!p.isBread)return;
  const burn=p.burn;
  const n=p.noise;
  // Bread color: golden → dark brown → charred black
  const r=Math.floor(210-burn*180+n*8-4);
  const g=Math.floor(170-burn*150+n*6-3);
  const b=Math.floor(90-burn*85+n*4-2);
  X.fillStyle='rgb('+Math.max(5,r)+','+Math.max(5,g)+','+Math.max(3,b)+')';
  X.fillRect(x,y,1,1);
 });

 // Bread crust edge — slightly darker ring
 X.strokeStyle='rgba(80,50,20,.3)';X.lineWidth=.5;
 X.strokeRect(4.5,3.5,PW-9,PH-7);

 // Smoke
 smokeParticles.forEach(p=>{
  X.globalAlpha=p.life*.15;
  X.fillStyle='#aaa';
  X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();
 });
 X.globalAlpha=1;

 // Heat glow when toasting
 if(toasting){
  const glowAlpha=Math.sin(Date.now()*.005)*.03+.04;
  X.fillStyle='rgba(255,80,20,'+glowAlpha*heatLevel*.3+')';
  X.fillRect(0,0,PW,PH);
  // Coil glow at edges
  X.fillStyle='rgba(255,60,10,'+glowAlpha*heatLevel*.15+')';
  X.fillRect(0,0,3,PH);X.fillRect(PW-3,0,3,PH);
 }
}

function updateSmoke(dt){
 smokeParticles.forEach(p=>{
  p.y+=p.vy*dt;
  p.x+=Math.sin(p.life*3)*.3;
  p.life-=dt*.8;
  p.r+=dt*.3;
 });
 smokeParticles=smokeParticles.filter(p=>p.life>0);
}

// Slider display
document.getElementById('heat-slider').addEventListener('input',e=>{
 document.getElementById('heat-val').textContent=e.target.value;
});

initBread();

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.05);lastTime=t;
 update(dt);updateSmoke(dt);draw();
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
