<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge to Miranda</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%89">
<meta name="description" content="Drop a message into the river. It will reach Miranda eventually, or it won't, but it will float in the meantime.">
<meta property="og:title" content="Bridge to Miranda">
<meta property="og:description" content="Drop a message into the river. It will reach Miranda eventually, or it won't, but it will float in the meantime.">
<meta property="og:url" content="https://sloppy.live/bridge-to-miranda">
<meta property="og:image" content="https://image.pollinations.ai/prompt/moonlit%20wooden%20bridge%20over%20dark%20indigo%20river%20paper%20boats%20with%20tiny%20amber%20lanterns%20drifting%20away%20melancholy%20painterly?width=1200&height=630&nologo=true&model=flux">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@500&family=Fraunces:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --night:#080a1a;
  --indigo:#0e1430;
  --slate:#181a36;
  --moon:#cfe4f3;
  --paper:#f4e9d2;
  --paper-dim:#8a8568;
  --amber:#f5c453;
  --amber-warm:#ffb84a;
  --cream:#dac9a8;
  --dim:#5a6082;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--night);color:var(--cream);font-family:'Cormorant Garamond',serif;overflow:hidden}
body{
  background:radial-gradient(ellipse at 50% 0%, #2a2848 0%, var(--night) 70%);
  min-height:100vh;
  display:flex;flex-direction:column;
  padding:1rem 1rem 0.5rem;
}
header{
  width:100%;max-width:50rem;margin:0 auto 0.6rem;
  text-align:center;
}
h1{
  font-family:'Fraunces',serif;font-style:italic;font-weight:500;
  font-size:clamp(1.7rem, 4.6vw, 2.6rem);
  color:var(--paper);
  letter-spacing:-0.01em;
  text-shadow:0 0 12px rgba(244,233,210,0.25);
}
.tag{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--dim);font-size:0.95rem;
  margin-top:0.15rem;
}

.composer{
  width:100%;max-width:50rem;margin:0 auto 0.6rem;
  display:flex;flex-direction:column;gap:0.4rem;
  background:rgba(20,18,40,0.55);
  border:1px solid rgba(245,196,83,0.18);
  border-radius:3px;
  padding:0.6rem 0.8rem;
  box-shadow:0 4px 18px rgba(0,0,0,0.45);
}
.composer textarea{
  background:rgba(244,233,210,0.04);
  color:var(--paper);
  border:1px solid rgba(245,196,83,0.18);
  border-radius:2px;
  padding:0.55rem 0.75rem;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.05rem;line-height:1.4;
  resize:none;
  min-height:3.2rem;
  outline:none;
  caret-color:var(--amber);
}
.composer textarea:focus{border-color:var(--amber);box-shadow:0 0 12px rgba(245,196,83,0.12)}
.composer .row{display:flex;justify-content:space-between;align-items:center;gap:0.7rem;flex-wrap:wrap}
.composer .charcount{
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  color:var(--dim);letter-spacing:0.14em;text-transform:uppercase;
}
.btn{
  background:transparent;
  border:1px solid var(--amber);
  color:var(--amber);
  padding:0.46rem 1.1rem;
  font-family:'JetBrains Mono',monospace;font-size:0.74rem;
  letter-spacing:0.2em;text-transform:uppercase;font-weight:500;
  cursor:pointer;border-radius:2px;
  min-height:2.4rem;
  transition:all 0.16s;
}
.btn:hover{background:rgba(245,196,83,0.12);color:var(--amber-warm);box-shadow:0 0 14px rgba(245,196,83,0.25)}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:2px solid var(--moon);outline-offset:2px}
.btn[disabled]{opacity:0.4;cursor:not-allowed}
.btn.ghost-btn{
  border-color:rgba(176,200,243,0.55);
  color:#b0c8f3;
  padding:0.42rem 0.85rem;
  font-size:0.68rem;
  letter-spacing:0.18em;
}
.btn.ghost-btn:hover{background:rgba(176,200,243,0.10);color:#cfe4f3;box-shadow:0 0 12px rgba(176,200,243,0.22)}
.btn.ghost-btn[aria-pressed="false"]{opacity:0.45}
.btn.ghost-btn[aria-pressed="false"]:hover{opacity:0.85}

.river-wrap{
  position:relative;
  width:100%;flex:1;
  background:#000;
  border-top:2px solid #1a1830;
  border-bottom:2px solid #050410;
  overflow:hidden;
  box-shadow:inset 0 0 100px rgba(0,0,0,0.7);
  min-height:18rem;
}
canvas{display:block;width:100%;height:100%}

.status{
  position:absolute;left:0.8rem;bottom:0.6rem;z-index:6;
  font-family:'JetBrains Mono',monospace;font-size:0.62rem;
  letter-spacing:0.18em;color:var(--paper-dim);text-transform:uppercase;
  display:flex;align-items:center;gap:0.4rem;
  text-shadow:0 1px 2px rgba(0,0,0,0.6);
}
.status .dot{width:0.45rem;height:0.45rem;border-radius:50%;background:#aa8848}
.status .dot.live{background:#7dc97a;box-shadow:0 0 6px #7dc97a}
.status .dot.away{background:#c47a14;box-shadow:0 0 6px #c47a14}

footer{
  text-align:center;
  margin-top:0.4rem;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:0.78rem;
  color:var(--dim);
  flex-shrink:0;
}
@media (max-width:560px){
  .composer textarea{font-size:0.95rem}
}
</style>
</head>
<body>
<header>
  <h1>Bridge to Miranda</h1>
  <p class="tag">a digital river — drop a message, watch it drift</p>
</header>

<form class="composer" id="composer" autocomplete="off">
  <textarea id="msg" placeholder="dear Miranda, …" maxlength="180" rows="2" aria-label="Message to release into the river"></textarea>
  <div class="row">
    <span class="charcount" id="charcount">0 / 180</span>
    <button type="button" class="btn ghost-btn" id="hostBtn" aria-pressed="true" title="The AI host drops occasional messages of its own. Click to pause.">✦ host: on</button>
    <button type="submit" class="btn" id="releaseBtn">release into the river</button>
  </div>
</form>

<div class="river-wrap">
  <canvas id="stage" width="1280" height="540" role="application" aria-label="A dark indigo river with paper-boat messages drifting across. Click a boat to read its message."></canvas>
  <div class="status" aria-live="polite">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">unhooking the boat…</span>
  </div>
</div>

<footer>some boats reach Miranda. most just float for a while.</footer>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// BRIDGE TO MIRANDA — drop a message into a digital river.
// Each release becomes a small paper boat with an amber lantern
// that drifts across the canvas at ~30 px/s, swaying gently,
// reflecting in the water. Other users see your boat in real
// time via a Supabase Realtime broadcast channel.
//
// NOTE: supabase is loaded LAZILY via dynamic import. A static
// module-level import meant that if supabase-config-fixed.js
// failed to fetch (CDN blip, jsdelivr edge issue), the entire
// module never ran — input listeners never wired, char count
// stayed dead. The page now boots offline-capable and upgrades
// to realtime once the import resolves.
// ─────────────────────────────────────────────────────────────

let supabase = null; // resolved by loadSupabase()

const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
let W = cv.width, H = cv.height, DPR = 1;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  const r = cv.getBoundingClientRect();
  W = r.width; H = r.height;
  cv.width = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

// ── audio: gentle water + soft splash on release ────────────
let actx = null, master = null, waterNode = null, waterGain = null;
function ensureAudio(){
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = 0.55;
  master.connect(actx.destination);
  // soft river hum: lowpassed noise loop
  const buf = actx.createBuffer(1, actx.sampleRate * 3, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  waterNode = actx.createBufferSource(); waterNode.buffer = buf; waterNode.loop = true;
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 380; lp.Q.value = 0.6;
  const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 80;
  waterGain = actx.createGain(); waterGain.gain.value = 0.0;
  waterNode.connect(hp).connect(lp).connect(waterGain).connect(master);
  waterNode.start();
  // fade water in
  waterGain.gain.linearRampToValueAtTime(0.08, actx.currentTime + 2);
}
function noiseBuf(dur){
  const n = Math.floor(actx.sampleRate * dur);
  const b = actx.createBuffer(1, n, actx.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1);
  return b;
}
function sfxSplash(){
  if (!actx) return;
  const t = actx.currentTime;
  const ns = actx.createBufferSource(); ns.buffer = noiseBuf(0.5);
  const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1400; bp.Q.value = 0.7;
  const g = actx.createGain(); g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.14, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
  ns.connect(bp).connect(g).connect(master); ns.start(t); ns.stop(t + 0.5);
  // pebble drop
  const o = actx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(380, t); o.frequency.exponentialRampToValueAtTime(160, t + 0.18);
  const og = actx.createGain(); og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.18, t + 0.005);
  og.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(og).connect(master); o.start(t); o.stop(t + 0.25);
}
function sfxChime(){
  if (!actx) return;
  const t = actx.currentTime;
  for (const f of [660, 880]){
    const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    const g = actx.createGain(); g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.06, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 2.4);
    o.connect(g).connect(master); o.start(t); o.stop(t + 2.5);
  }
}

// ── river state ───────────────────────────────────────────────
const PALETTE_BOATS = ['#f4e9d2', '#ffe6b8', '#f7d9c2', '#e6e2d2'];
const BOAT_LIFE = 70;   // seconds before a boat drifts off-screen
const boats = [];
let waveT = 0;
const ripples = [];

// boats from the AI host get a cooler paper tint
const PALETTE_HOST = ['#cbe4ff', '#bcd6f7', '#dde7f7', '#b8d0ed'];

function makeBoat({ id, text, byName, direction, ts, x, dropFromBridge, host }){
  const dir = direction != null ? direction : (Math.random() < 0.5 ? 1 : -1);
  // boats now spawn UNDER THE BRIDGE LANTERN with a slight horizontal offset
  // and drift outward. The splash is visible. Old behaviour (off-screen edge
  // spawn) made submits feel broken — no visual feedback at the bridge.
  const spawnX = (x != null)
    ? x
    : W * 0.5 + (Math.random() * 0.18 - 0.09) * W;
  const palette = host ? PALETTE_HOST : PALETTE_BOATS;
  return {
    id: id || ('b' + Math.random().toString(36).slice(2, 9)),
    text: String(text || '').slice(0, 180),
    byName: byName || 'anon',
    host: !!host,
    direction: dir,
    color: palette[Math.floor(Math.random() * palette.length)],
    x: spawnX,
    spawnX,
    dropFrom: dropFromBridge ? H * 0.55 : null, // drop animation y-start
    dropProgress: dropFromBridge ? 0 : 1,        // 0..1, 1 = on water
    yBase: 0,         // set on first render
    yPhase: Math.random() * Math.PI * 2,
    bob: 0,
    speed: 22 + Math.random() * 16,    // px/s
    rot: 0,
    ts: ts || Date.now(),
    age: 0,
  };
}

function dropMyBoat(text){
  const dir = Math.random() < 0.5 ? 1 : -1;
  const boat = makeBoat({ text, byName: 'me', direction: dir, dropFromBridge: true });
  boats.push(boat);
  // splash ripple at the boat's spawn point on the water
  ripples.push({ x: boat.spawnX, y: H * 0.66, life: 0, max: 1.6, r: 4 });
  sfxSplash();
  return boat;
}

// ── realtime sync ────────────────────────────────────────────
let channel = null;
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
function setStatus(kind, text){
  statusDot.className = 'dot ' + (kind || '');
  statusText.textContent = text;
}

async function loadSupabase(){
  try {
    const mod = await import('/supabase-config-fixed.js');
    supabase = mod.default;
    return supabase;
  } catch (e){
    console.warn('[bridge-to-miranda] supabase load failed, running offline:', e);
    return null;
  }
}

async function connect(){
  setStatus('away', 'reaching the river…');
  const sb = await loadSupabase();
  if (!sb){
    setStatus('away', 'offline · solo river');
    // still seed boats so the river isn't empty
    setTimeout(() => { if (boats.length < 3) seedBoats(); }, 1200);
    return;
  }
  try {
    channel = sb.channel('bridge-to-miranda-river', {
      config: { broadcast: { self: false, ack: false } },
    });
    channel.on('broadcast', { event: 'drop' }, ({ payload }) => {
      if (!payload || !payload.text) return;
      const boat = makeBoat({ ...payload, dropFromBridge: true });
      boats.push(boat);
      ripples.push({ x: boat.spawnX, y: H * 0.66, life: 0, max: 1.6, r: 4 });
    });
    channel.subscribe((status) => {
      if (status === 'SUBSCRIBED'){
        setStatus('live', '0 boats drifting');
        setTimeout(() => {
          if (boats.length < 3) seedBoats();
        }, 4000);
      } else if (status === 'CHANNEL_ERROR' || status === 'CLOSED'){
        setStatus('away', 'reconnecting…');
      }
    });
  } catch (e){
    console.warn('[bridge-to-miranda] realtime channel failed:', e);
    setStatus('away', 'offline · solo river');
    setTimeout(() => { if (boats.length < 3) seedBoats(); }, 1200);
  }
}

function broadcastDrop(boat){
  if (!channel) return;
  try {
    channel.send({
      type: 'broadcast',
      event: 'drop',
      payload: {
        id: boat.id, text: boat.text, byName: boat.byName,
        direction: boat.direction, ts: boat.ts, x: boat.spawnX,
        host: !!boat.host,
      },
    });
  } catch (e){
    console.warn('[bridge-to-miranda] broadcast failed:', e);
  }
}

// ── AI host: drops occasional ambient messages of its own ──
// Uses Pollinations text API (POST openai-compatible w/ text/plain content-type
// to avoid CORS preflight; falls back to GET text.pollinations.ai/<prompt> if
// POST fails). Each client runs its own host loop and the AI's boats are
// broadcast like any other so all viewers see them.
const HOST_FALLBACK = [
  "the bench is still ours",
  "i remembered your laugh wrong",
  "the bread proved overnight",
  "tell the dog i said hi",
  "the kettle keeps whistling",
  "your handwriting is on the milk carton",
  "i kept the postcard",
  "i'm proud of you, quietly",
  "the porch light is on",
  "i still talk to you sometimes",
  "the moss came back this year",
  "send word when you can",
  "the linoleum still creaks where you left it",
  "i forgot how to be angry about it",
  "i passed your old street today",
];

const HOST_SYS = "You are a poet drafting one quiet message to drop into a digital river to someone named Miranda. Tone: bittersweet, ordinary, oblique, lower-case, melancholy but kind. Write ONE sentence under 14 words. No quotation marks. No greeting. No name. No emoji. Just the sentence. Examples in the right register: 'your mug is still in the cupboard', 'happy birthday, late', 'i think i forgive you', 'tell me you're warm', 'the bridge looks smaller every year'.";
const HOST_USER = "one new sentence in that exact register please";

let hostEnabled = true;
let hostTimer = null;
let hostInFlight = false;

async function fetchHostMessage(){
  const payload = {
    model: 'openai',
    messages: [
      { role: 'system', content: HOST_SYS },
      { role: 'user', content: HOST_USER },
    ],
  };
  // POST attempt — text/plain content-type bypasses CORS preflight
  try {
    const r = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    });
    if (r.ok){
      const data = await r.json();
      const t = (data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
      const cleaned = cleanHostText(t);
      if (cleaned) return cleaned;
    }
  } catch (e){ /* fall through */ }
  // GET fallback — fully avoids preflight
  try {
    const url = 'https://text.pollinations.ai/' + encodeURIComponent(HOST_SYS + '\n\n' + HOST_USER);
    const r2 = await fetch(url);
    if (r2.ok){
      const txt = await r2.text();
      const cleaned = cleanHostText(txt);
      if (cleaned) return cleaned;
    }
  } catch (e){ /* fall through */ }
  // local fallback so the host still drops something
  return HOST_FALLBACK[Math.floor(Math.random() * HOST_FALLBACK.length)];
}

function cleanHostText(raw){
  if (!raw) return null;
  let t = String(raw).trim();
  // strip code-fence / wrapping quotes
  t = t.replace(/^```[a-z]*\s*/i, '').replace(/```\s*$/, '');
  t = t.replace(/^["'`]+|["'`]+$/g, '');
  // take only the first non-empty line, in case the model multi-lined
  const firstLine = t.split(/\n+/).map(s => s.trim()).find(Boolean);
  if (!firstLine) return null;
  // drop any leading "Message:" / "Sentence:" labels
  let line = firstLine.replace(/^(message|sentence|line|reply)\s*[:\-—]\s*/i, '');
  // hard length cap
  if (line.length > 140) line = line.slice(0, 137).replace(/\s+\S*$/, '') + '…';
  // reject empty / refusal / weird output
  if (line.length < 4) return null;
  if (/^(i (cannot|can't|won't)|sorry|as an ai)/i.test(line)) return null;
  return line;
}

async function hostTick(){
  if (!hostEnabled){ scheduleNextHost(); return; }
  if (hostInFlight){ scheduleNextHost(); return; }
  hostInFlight = true;
  let text = null;
  try { text = await fetchHostMessage(); }
  catch (e){ console.warn('[bridge] host fetch failed', e); }
  hostInFlight = false;
  if (text && hostEnabled){
    const dir = Math.random() < 0.5 ? 1 : -1;
    const boat = makeBoat({ text, byName: 'host', direction: dir, dropFromBridge: true, host: true });
    boats.push(boat);
    ripples.push({ x: boat.spawnX, y: H * 0.66, life: 0, max: 1.6, r: 4 });
    sfxSplash();
    if (Math.random() < 0.35) sfxChime();
    broadcastDrop(boat);
  }
  scheduleNextHost();
}

function scheduleNextHost(){
  if (hostTimer) clearTimeout(hostTimer);
  // 35–80s between host drops, jittered
  const wait = (35 + Math.random() * 45) * 1000;
  hostTimer = setTimeout(hostTick, wait);
}

function startHost(){
  hostEnabled = true;
  // first drop arrives ~10–20s after enable so users see one early
  if (hostTimer) clearTimeout(hostTimer);
  hostTimer = setTimeout(hostTick, (10 + Math.random() * 10) * 1000);
}
function stopHost(){
  hostEnabled = false;
  if (hostTimer){ clearTimeout(hostTimer); hostTimer = null; }
}

// Seed boats — short, ambiguous-melancholy default messages
function seedBoats(){
  const seeds = [
    "i think i forgive you",
    "the bread came out wrong today",
    "your mug is still in the cupboard",
    "tell me you're warm",
    "the bridge looks smaller every year",
    "i didn't say it but it was important",
    "i'm fine. ish.",
    "happy birthday, late",
  ];
  let delay = 0;
  for (const s of seeds){
    setTimeout(() => {
      const dir = Math.random() < 0.5 ? 1 : -1;
      // seed boats enter naturally from off-screen so the river feels lived-in
      const x = dir > 0 ? -80 : W + 80;
      const b = makeBoat({ text: s, byName: 'anon', direction: dir, x });
      boats.push(b);
    }, delay);
    delay += 1300 + Math.random() * 1100;
  }
}

// ── render ────────────────────────────────────────────────────
let stars = [];
function buildStars(){
  stars = [];
  for (let i = 0; i < 60; i++){
    stars.push({ x: Math.random() * W, y: Math.random() * H * 0.35, r: 0.4 + Math.random() * 1.1, twinkle: Math.random() * 6.28 });
  }
}

let lastTs = 0;
function loop(ts){
  const dt = Math.min(0.05, (ts - lastTs || 16) / 1000);
  lastTs = ts;
  waveT += dt;

  // sky
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#181a36');
  sky.addColorStop(0.4, '#0e1430');
  sky.addColorStop(0.6, '#0a0e26');
  sky.addColorStop(0.62, '#070a18');   // waterline transition
  sky.addColorStop(1, '#03050c');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // stars
  for (const s of stars){
    s.twinkle += 0.02;
    const a = 0.4 + Math.sin(s.twinkle) * 0.35;
    ctx.fillStyle = 'rgba(207,228,243,' + a.toFixed(3) + ')';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }

  // distant moon (top-right)
  const moonX = W * 0.78, moonY = H * 0.15;
  const moonG = ctx.createRadialGradient(moonX, moonY, 6, moonX, moonY, 90);
  moonG.addColorStop(0, 'rgba(255,250,228,0.95)');
  moonG.addColorStop(0.4, 'rgba(255,220,180,0.18)');
  moonG.addColorStop(1, 'rgba(255,220,180,0)');
  ctx.fillStyle = moonG;
  ctx.beginPath(); ctx.arc(moonX, moonY, 90, 0, Math.PI * 2); ctx.fill();
  // moon body
  ctx.fillStyle = '#f3eed4';
  ctx.beginPath(); ctx.arc(moonX, moonY, 16, 0, Math.PI * 2); ctx.fill();

  // bridge silhouette across top — gentle arch with railing
  drawBridge();

  // water surface (below waterline H*0.62)
  drawWater();

  // moonlight reflection on water
  drawMoonReflection(moonX);

  // boats
  for (let i = boats.length - 1; i >= 0; i--){
    const b = boats[i];
    b.age += dt;
    if (b.yBase === 0){
      b.yBase = H * 0.68 + Math.random() * (H * 0.22);
    }
    // drop-from-bridge animation: 0..1 over ~0.8s
    if (b.dropProgress < 1){
      b.dropProgress = Math.min(1, b.dropProgress + dt / 0.8);
    }
    // only start drifting once boat has touched the water
    if (b.dropProgress >= 1){
      b.x += b.speed * b.direction * dt;
    }
    b.yPhase += dt * (0.6 + b.speed * 0.01);
    b.bob = Math.sin(b.yPhase) * 3;
    b.rot = Math.sin(b.yPhase * 0.6) * 0.06;
    if (b.x < -120 || b.x > W + 120 || b.age > BOAT_LIFE){
      boats.splice(i, 1);
      continue;
    }
    drawBoat(b);
  }

  // ripples
  for (let i = ripples.length - 1; i >= 0; i--){
    const r = ripples[i];
    r.life += dt;
    if (r.life >= r.max){ ripples.splice(i, 1); continue; }
    const k = r.life / r.max;
    const alpha = (1 - k) * 0.5;
    ctx.strokeStyle = 'rgba(207,228,243,' + alpha.toFixed(3) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, 8 + k * 40, 2 + k * 6, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // update count in status
  setStatus('live', boats.length + ' boat' + (boats.length === 1 ? '' : 's') + ' drifting');

  requestAnimationFrame(loop);
}

function drawBridge(){
  const railY = H * 0.55;
  // arch shadow
  ctx.fillStyle = '#181018';
  ctx.beginPath();
  ctx.moveTo(0, railY + 4);
  ctx.bezierCurveTo(W * 0.25, railY - 18, W * 0.75, railY - 18, W, railY + 4);
  ctx.lineTo(W, railY + 14);
  ctx.lineTo(0, railY + 14);
  ctx.closePath();
  ctx.fill();
  // top rail
  ctx.fillStyle = '#2a1a10';
  ctx.beginPath();
  ctx.moveTo(0, railY);
  ctx.bezierCurveTo(W * 0.25, railY - 22, W * 0.75, railY - 22, W, railY);
  ctx.lineTo(W, railY + 6);
  ctx.bezierCurveTo(W * 0.75, railY - 16, W * 0.25, railY - 16, 0, railY + 6);
  ctx.closePath();
  ctx.fill();
  // balusters
  ctx.strokeStyle = 'rgba(60,42,28,0.75)';
  ctx.lineWidth = 2;
  for (let x = 28; x < W; x += 42){
    const archY = railY - Math.sin((x / W) * Math.PI) * 18;
    ctx.beginPath();
    ctx.moveTo(x, archY + 4); ctx.lineTo(x, archY + 26);
    ctx.stroke();
  }
  // lantern in centre with warm glow
  const lx = W * 0.5, ly = railY - 22;
  const glow = ctx.createRadialGradient(lx, ly, 4, lx, ly, 120);
  glow.addColorStop(0, 'rgba(245,196,83,0.5)');
  glow.addColorStop(1, 'rgba(245,196,83,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(lx, ly, 120, 0, Math.PI * 2); ctx.fill();
  // post
  ctx.strokeStyle = '#1a0f08'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(lx, ly + 4); ctx.lineTo(lx, ly + 24); ctx.stroke();
  // lamp body
  ctx.fillStyle = '#1a0f08';
  ctx.fillRect(lx - 5, ly - 4, 10, 9);
  ctx.fillStyle = '#f5c453';
  ctx.fillRect(lx - 3, ly - 2, 6, 5);
}

function drawWater(){
  const waterTop = H * 0.62;
  // horizontal stripes simulating gentle ripples
  ctx.strokeStyle = 'rgba(207,228,243,0.04)';
  ctx.lineWidth = 1;
  for (let y = waterTop + 6; y < H; y += 8){
    const w1 = Math.sin(waveT * 0.4 + y * 0.06) * 6;
    const w2 = Math.sin(waveT * 0.8 + y * 0.04 + 1.2) * 4;
    ctx.beginPath();
    ctx.moveTo(0 + w1, y);
    ctx.lineTo(W + w2, y - 1);
    ctx.stroke();
  }
}

function drawMoonReflection(mx){
  const top = H * 0.62, bot = H;
  for (let i = 0; i < 16; i++){
    const k = i / 16;
    const y = top + k * (bot - top);
    const w = Math.sin(waveT * 1.2 + i * 0.6) * 30 + 6;
    const xc = mx + Math.sin(waveT * 0.6 + i * 0.4) * 4;
    const len = 50 + k * 60;
    const alpha = (1 - k) * 0.18;
    ctx.fillStyle = 'rgba(255,250,228,' + alpha.toFixed(3) + ')';
    ctx.fillRect(xc - len/2 + w, y, len, 1.6);
  }
}

function drawBoat(b){
  ctx.save();
  // during drop animation, ease the boat from bridge level to its water yBase
  let drawY = b.yBase + b.bob;
  if (b.dropProgress < 1 && b.dropFrom != null){
    const k = b.dropProgress;
    const eased = 1 - Math.pow(1 - k, 2.2); // ease-out quadratic-ish
    drawY = b.dropFrom + (b.yBase - b.dropFrom) * eased;
  }
  ctx.translate(b.x, drawY);
  ctx.rotate(b.rot * b.direction);
  // hull — folded paper triangle base + trapezoid keel
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.moveTo(-22, 4);
  ctx.lineTo(22, 4);
  ctx.lineTo(14, 14);
  ctx.lineTo(-14, 14);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(60,42,28,0.55)'; ctx.lineWidth = 1; ctx.stroke();
  // sail / mast triangle (folded paper)
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.moveTo(0, -12);
  ctx.lineTo(-10, 4);
  ctx.lineTo(10, 4);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // crease fold line
  ctx.strokeStyle = 'rgba(60,42,28,0.35)';
  ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(0, 4); ctx.stroke();
  // lantern dot — amber for users, cool white-blue for the AI host
  if (b.host){
    const lampGlow = ctx.createRadialGradient(0, -8, 1, 0, -8, 14);
    lampGlow.addColorStop(0, 'rgba(210,232,255,0.9)');
    lampGlow.addColorStop(1, 'rgba(210,232,255,0)');
    ctx.fillStyle = lampGlow;
    ctx.beginPath(); ctx.arc(0, -8, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#eaf3ff';
    ctx.beginPath(); ctx.arc(0, -8, 1.6, 0, Math.PI * 2); ctx.fill();
    // tiny four-point star above the sail to mark a host boat
    ctx.fillStyle = 'rgba(210,232,255,0.95)';
    const sx = 0, sy = -20;
    ctx.beginPath();
    ctx.moveTo(sx, sy - 3);
    ctx.lineTo(sx + 1, sy - 1);
    ctx.lineTo(sx + 3, sy);
    ctx.lineTo(sx + 1, sy + 1);
    ctx.lineTo(sx, sy + 3);
    ctx.lineTo(sx - 1, sy + 1);
    ctx.lineTo(sx - 3, sy);
    ctx.lineTo(sx - 1, sy - 1);
    ctx.closePath();
    ctx.fill();
  } else {
    const lampGlow = ctx.createRadialGradient(0, -8, 1, 0, -8, 12);
    lampGlow.addColorStop(0, 'rgba(255,210,120,0.85)');
    lampGlow.addColorStop(1, 'rgba(255,210,120,0)');
    ctx.fillStyle = lampGlow;
    ctx.beginPath(); ctx.arc(0, -8, 12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff4d0';
    ctx.beginPath(); ctx.arc(0, -8, 1.5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  // message text above the boat — italic, low-contrast, line-wrapped
  if (b.text){
    const tx = b.x;
    const ty = drawY - 22;
    const text = b.text;
    ctx.save();
    ctx.font = 'italic 13px "Cormorant Garamond", serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = b.host ? 'rgba(210,232,255,0.88)' : 'rgba(244,233,210,0.88)';
    ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 4;
    // single-line wrap up to 36 chars
    const lines = wrapText(text, 36);
    for (let i = 0; i < lines.length; i++){
      ctx.fillText(lines[i], tx, ty - (lines.length - 1 - i) * 16);
    }
    ctx.restore();
  }
}

function wrapText(s, charsPerLine){
  const words = s.split(/\s+/);
  const lines = [];
  let cur = '';
  for (const w of words){
    if ((cur + ' ' + w).trim().length > charsPerLine){
      lines.push(cur);
      cur = w;
    } else {
      cur = (cur + ' ' + w).trim();
    }
  }
  if (cur) lines.push(cur);
  return lines.slice(0, 3);
}

// ── ui wiring ────────────────────────────────────────────────
const composerForm = document.getElementById('composer');
const msgEl = document.getElementById('msg');
const charcount = document.getElementById('charcount');
const releaseBtn = document.getElementById('releaseBtn');
const hostBtn = document.getElementById('hostBtn');

msgEl.addEventListener('input', () => {
  charcount.textContent = msgEl.value.length + ' / 180';
});

hostBtn.addEventListener('click', () => {
  if (hostEnabled){
    stopHost();
    hostBtn.textContent = '✦ host: off';
    hostBtn.setAttribute('aria-pressed', 'false');
  } else {
    startHost();
    hostBtn.textContent = '✦ host: on';
    hostBtn.setAttribute('aria-pressed', 'true');
  }
});
composerForm.addEventListener('submit', (ev) => {
  ev.preventDefault();
  const txt = msgEl.value.trim();
  if (txt.length < 1) return;
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
  const boat = dropMyBoat(txt);
  broadcastDrop(boat);
  msgEl.value = '';
  charcount.textContent = '0 / 180';
  // occasional chime when releasing
  if (Math.random() < 0.5) sfxChime();
});

// boot
resize();
buildStars();
window.addEventListener('resize', () => { resize(); buildStars(); });
connect();
startHost();
requestAnimationFrame(loop);
</script>
