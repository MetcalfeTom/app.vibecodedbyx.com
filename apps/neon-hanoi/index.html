<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neon Hanoi</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070418">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%97%BC">
<meta name="description" content="A recursive Towers of Hanoi solver. Animated disks, adjustable speed, step-through for studying the recursion.">
<meta property="og:title" content="Neon Hanoi">
<meta property="og:description" content="A recursive Towers of Hanoi solver. Animated disks, adjustable speed, step-through for studying the recursion.">
<meta property="og:url" content="https://sloppy.live/neon-hanoi">
<meta property="og:image" content="https://image.pollinations.ai/prompt/towers%20of%20hanoi%20puzzle%20with%20glowing%20neon%20colored%20disks%20on%20three%20cyan%20pegs%2C%20dark%20synthwave%20background%2C%20educational%20arcade?width=1200&height=630&model=flux&seed=2057&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Share+Tech+Mono&family=Rubik+Mono+One&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070418;
    --void-2:#120832;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --lime:#a5ff52;
    --violet:#9b5bff;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Share Tech Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,43,214,0.15), transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(92,230,255,0.10), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;
  }
  header{
    width:100%;text-align:center;padding:0.7rem 1rem 0.3rem;pointer-events:none;
  }
  h1{
    font-family:'Audiowide', monospace;
    font-size:clamp(1.4rem, 3.4vw, 2.2rem);letter-spacing:0.08em;
    background:linear-gradient(180deg, var(--cyan), var(--magenta) 70%, var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 10px rgba(255,43,214,0.4));line-height:1;
  }
  .tag{
    font-family:'Major Mono Display', monospace;font-size:clamp(0.6rem, 1.2vw, 0.85rem);
    letter-spacing:0.35em;color:var(--silver);margin-top:0.2rem;text-transform:lowercase;
  }
  main{flex:1;display:flex;align-items:center;justify-content:center;width:100%;padding:0.3rem 0.4rem 1rem}
  canvas{
    display:block;background:#02011a;
    border:1px solid rgba(92,230,255,0.18);
    box-shadow:0 0 36px rgba(255,43,214,0.18), inset 0 0 22px rgba(0,0,0,0.6);
    max-width:100%;
  }

  /* HUD */
  .hud-top{
    position:fixed;top:3.4rem;left:0.6rem;right:0.6rem;
    display:flex;justify-content:center;gap:0.6rem;flex-wrap:wrap;
    z-index:5;pointer-events:none;font-family:'Share Tech Mono', monospace;
  }
  .hud-top .card{
    background:rgba(7,4,24,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(92,230,255,0.32);
    padding:0.45rem 0.75rem;border-radius:0.4rem;
    display:flex;flex-direction:column;gap:0.15rem;
    box-shadow:0 0 12px rgba(92,230,255,0.12);min-width:4.4rem;
    text-align:center;
  }
  .hud-top .label{font-size:0.55rem;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase}
  .hud-top .val{font-family:'Rubik Mono One', monospace;font-size:1.2rem;color:var(--cyan);letter-spacing:0.04em;line-height:1}
  .hud-top .card.optimal .val{color:var(--gold)}
  .hud-top .card.n .val{color:var(--violet)}
  .hud-top .card.speed .val{color:var(--magenta)}
  .hud-top .card.done .val{color:var(--lime)}
  .hud-top .card .unit{font-size:0.6rem;color:var(--silver-dim);margin-left:0.18rem}

  /* current move display under hud */
  .move-readout{
    position:fixed;top:7.2rem;left:50%;transform:translateX(-50%);
    background:rgba(7,4,24,0.85);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    border:1px solid rgba(165,255,82,0.4);border-radius:0.3rem;
    padding:0.3rem 0.7rem;
    font-family:'Share Tech Mono', monospace;font-size:0.75rem;
    color:var(--lime);letter-spacing:0.12em;text-transform:uppercase;
    z-index:5;pointer-events:none;
    box-shadow:0 0 12px rgba(165,255,82,0.18);
    white-space:nowrap;
    opacity:0;transition:opacity 0.25s;
  }
  .move-readout.show{opacity:1}
  .move-readout .arrow{color:var(--gold);margin:0 0.4rem}
  .move-readout .peg{color:var(--cyan);font-weight:700}

  /* controls */
  .controls{
    position:fixed;bottom:0.8rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(7,4,24,0.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(92,230,255,0.3);
    padding:0.5rem 0.7rem;border-radius:0.45rem;z-index:6;
    max-width:calc(100% - 1rem);
    box-shadow:0 0 18px rgba(92,230,255,0.16);
  }
  .controls .grp{display:flex;align-items:center;gap:0.4rem;font-size:0.65rem;letter-spacing:0.14em;color:var(--silver);text-transform:uppercase}
  .controls .grp .v{color:var(--cyan);font-family:'Rubik Mono One', monospace;font-size:0.85rem;min-width:1.6rem;text-align:center}
  .controls input[type="range"]{
    accent-color:var(--cyan);
    width:7rem;height:2.75rem;cursor:pointer;
  }
  .controls .sep{width:1px;background:rgba(92,230,255,0.2);height:1.6rem}
  .controls button{
    background:transparent;color:var(--cyan);border:1.5px solid var(--cyan);
    font-family:'Audiowide', monospace;font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;
    padding:0.5rem 0.8rem;border-radius:0.28rem;cursor:pointer;min-height:2.75rem;min-width:2.75rem;
    box-shadow:0 0 8px rgba(92,230,255,0.18);
  }
  .controls button:hover{background:rgba(92,230,255,0.14)}
  .controls button:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .controls button.play{color:var(--lime);border-color:var(--lime);box-shadow:0 0 12px rgba(165,255,82,0.32)}
  .controls button.play:hover{background:rgba(165,255,82,0.14)}
  .controls button.step{color:var(--gold);border-color:var(--gold)}
  .controls button.step:hover{background:rgba(255,212,84,0.14)}
  .controls button.reset{color:var(--magenta);border-color:var(--magenta)}
  .controls button.reset:hover{background:rgba(255,43,214,0.14)}
  .controls button.mute{color:var(--silver);border-color:rgba(163,168,194,0.4);padding:0.4rem 0.55rem;font-size:0.7rem}

  /* completion banner */
  .done-banner{
    position:fixed;left:50%;top:42%;transform:translate(-50%, -50%);
    font-family:'Audiowide', monospace;font-size:clamp(2rem, 6vw, 3.5rem);
    color:var(--lime);letter-spacing:0.1em;text-transform:uppercase;
    text-shadow:0 0 18px var(--lime), 0 0 36px rgba(165,255,82,0.5);
    pointer-events:none;z-index:8;opacity:0;
    text-align:center;
  }
  .done-banner.show{opacity:1;animation:donePop 1.2s cubic-bezier(0.34, 1.56, 0.64, 1)}
  @keyframes donePop{
    0%{transform:translate(-50%, -50%) scale(0.4);opacity:0}
    20%{opacity:1;transform:translate(-50%, -50%) scale(1.15)}
    60%{transform:translate(-50%, -50%) scale(1)}
    100%{opacity:1;transform:translate(-50%, -50%) scale(1)}
  }

  @media (max-width: 720px){
    .hud-top{top:2.8rem;left:0.4rem;right:0.4rem;gap:0.4rem}
    .hud-top .card{padding:0.3rem 0.5rem;min-width:3.4rem}
    .hud-top .val{font-size:0.95rem}
    .move-readout{top:6.4rem;font-size:0.65rem;padding:0.25rem 0.5rem}
    .controls{font-size:0.55rem;padding:0.4rem 0.5rem;gap:0.35rem}
    .controls input[type="range"]{width:4.5rem}
    .controls button{font-size:0.65rem;padding:0.4rem 0.55rem}
  }
  @media (prefers-reduced-motion: reduce){
    .done-banner.show{animation:none;opacity:1}
  }
</style>
</head>
<body>
  <header>
    <h1>NEON HANOI</h1>
    <div class="tag">recursive solver · animated · step or fly</div>
  </header>

  <div class="hud-top">
    <div class="card n">
      <div class="label">disks</div>
      <div class="val"><span id="nVal">5</span></div>
    </div>
    <div class="card">
      <div class="label">move</div>
      <div class="val"><span id="moveVal">0</span><span class="unit">/<span id="totalVal">31</span></span></div>
    </div>
    <div class="card optimal">
      <div class="label">optimal</div>
      <div class="val"><span id="optVal">31</span></div>
    </div>
    <div class="card speed">
      <div class="label">speed</div>
      <div class="val"><span id="speedVal">2</span><span class="unit">×</span></div>
    </div>
  </div>

  <div class="move-readout" id="moveReadout">
    <span>step</span> <span id="rMoveNum">1</span>:
    disk <span id="rDisk">—</span>
    <span class="arrow">→</span>
    <span class="peg" id="rFrom">A</span> <span class="arrow">⟶</span> <span class="peg" id="rTo">C</span>
  </div>

  <main>
    <canvas id="game" width="720" height="440" role="application" aria-label="Animated Towers of Hanoi solver. Adjust the disk count and playback speed in the controls. Use Play/Pause and Step to control the recursive solver."></canvas>
  </main>

  <div class="done-banner" id="doneBanner" aria-live="polite">SOLVED</div>

  <div class="controls">
    <label class="grp" for="nInput">N <input id="nInput" type="range" min="3" max="10" step="1" value="5" aria-label="Number of disks"><span class="v" id="nDisplay">5</span></label>
    <span class="sep" aria-hidden="true"></span>
    <label class="grp" for="speedInput">speed <input id="speedInput" type="range" min="0.5" max="20" step="0.5" value="2" aria-label="Playback speed multiplier"><span class="v" id="speedDisplay">2×</span></label>
    <span class="sep" aria-hidden="true"></span>
    <button class="play" id="playBtn" type="button" aria-pressed="true" aria-label="Play or pause">▶ pause</button>
    <button class="step" id="stepBtn" type="button" aria-label="Advance one move">step ▶</button>
    <button class="reset" id="resetBtn" type="button" aria-label="Reset to start">↻ reset</button>
    <button class="mute" id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ on</button>
  </div>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  var canvas = document.getElementById('game');
  var ctx;
  try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); return; }
  if (!ctx){ showError('canvas 2d unavailable'); return; }

  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var W = 720, H = 440;
  function resize(){
    try {
      var maxW = Math.min(window.innerWidth - 12, 880);
      var maxH = Math.max(320, window.innerHeight - 220);
      var ratio = 18/11;
      var w = Math.min(maxW, maxH * ratio);
      var h = w / ratio;
      if (h > maxH){ h = maxH; w = h * ratio; }
      W = Math.floor(w); H = Math.floor(h);
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    } catch(e){ showError('resize: ' + e.message); }
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Recursive solver ──
  // Computes the complete optimal sequence of moves to solve a Hanoi puzzle of N disks
  // moving from pegFrom to pegTo using pegVia. Each move is [diskNumber, fromPeg, toPeg].
  function solveHanoi(n, from, to, via, out){
    if (n <= 0) return;
    solveHanoi(n - 1, from, via, to, out);
    out.push({ disk: n, from: from, to: to });
    solveHanoi(n - 1, via, to, from, out);
  }

  // ── State ──
  var state = {
    N: 5,
    pegs: [[], [], []],
    moves: [],
    moveIdx: 0,
    animating: null,    // { disk, from, to, phase, t, dur }
    speed: 2,
    playing: true,
    completed: false
  };

  function rebuild(){
    state.pegs = [[], [], []];
    for (var i = state.N; i >= 1; i--) state.pegs[0].push(i);
    state.moves = [];
    solveHanoi(state.N, 0, 2, 1, state.moves);
    state.moveIdx = 0;
    state.animating = null;
    state.completed = false;
    document.getElementById('totalVal').textContent = state.moves.length;
    document.getElementById('optVal').textContent = state.moves.length;
    document.getElementById('nVal').textContent = state.N;
    document.getElementById('moveVal').textContent = '0';
    document.getElementById('doneBanner').classList.remove('show');
    hideMoveReadout();
  }
  rebuild();

  // ── Animation ──
  // Each move is 3 phases: lift up off peg, travel across, drop down
  // Phase durations are in seconds at speed=1
  var PHASE_DUR = { lift: 0.16, travel: 0.26, drop: 0.16 };

  function startNextMove(){
    if (state.moveIdx >= state.moves.length){
      if (!state.completed){
        state.completed = true;
        document.getElementById('doneBanner').classList.add('show');
        sndComplete();
      }
      return;
    }
    var mv = state.moves[state.moveIdx];
    // Sanity: ensure the disk is on top of the from peg
    var topOfFrom = state.pegs[mv.from][state.pegs[mv.from].length - 1];
    if (topOfFrom !== mv.disk){
      showError('move ' + state.moveIdx + ' inconsistent: expected disk ' + mv.disk + ' on top of peg ' + mv.from);
      state.playing = false;
      return;
    }
    state.animating = {
      disk: mv.disk,
      from: mv.from,
      to: mv.to,
      phase: 'lift',
      t: 0,
      dur: PHASE_DUR.lift,
      // Capture starting peg-top y (the disk's current visual y)
      startStackIdx: state.pegs[mv.from].length - 1
    };
    // Remove from source peg immediately — visually the disk floats above pegs during animation
    state.pegs[mv.from].pop();

    sndLift(mv.disk);
    updateMoveReadout(mv);
  }

  // ── HUD updates ──
  function updateMoveReadout(mv){
    var pegName = ['A', 'B', 'C'];
    document.getElementById('rMoveNum').textContent = state.moveIdx + 1;
    document.getElementById('rDisk').textContent = mv.disk;
    document.getElementById('rFrom').textContent = pegName[mv.from];
    document.getElementById('rTo').textContent = pegName[mv.to];
    document.getElementById('moveReadout').classList.add('show');
  }
  function hideMoveReadout(){
    document.getElementById('moveReadout').classList.remove('show');
  }

  // ── Audio ──
  var audioCtx = null, muted = false;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function tone(type, freq, dur, gain, slideTo, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var o = c.createOscillator(); o.type = type;
    var t = t0 || c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noiseBurst(dur, freq, Q, gain){
    var c = ensureAudio(); if (!c || muted) return;
    var n = Math.floor(c.sampleRate * dur);
    var buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/n, 1.6);
    var s = c.createBufferSource(); s.buffer = buf;
    var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = Q;
    var g = c.createGain(); g.gain.value = gain;
    s.connect(bp).connect(g).connect(c.destination);
    s.start();
  }
  // Pitch by disk size: small disks = high pitch, big = low
  function diskPitch(disk){
    // disk 1..N → freq ~ 1200..240, exponential
    var t = (disk - 1) / Math.max(1, state.N - 1);
    return Math.round(1200 * Math.pow(240/1200, t));
  }
  function sndLift(disk){
    if (state.speed > 12) return; // skip lift sound at very fast speeds to avoid audio spam
    var f = diskPitch(disk);
    tone('triangle', f, 0.10, 0.06, f * 1.5);
  }
  function sndDrop(disk){
    var f = diskPitch(disk);
    tone('triangle', f, 0.14, 0.12, f * 0.6);
    // tiny thump for big disks
    if (disk > state.N * 0.6){
      tone('sine', 80, 0.10, 0.10, 50);
    }
    if (state.speed <= 8){
      noiseBurst(0.04, 1800, 1.4, 0.04);
    }
  }
  function sndComplete(){
    [523, 659, 784, 1047, 1318].forEach(function(f, i){
      tone('triangle', f, 0.25, 0.18, null, ensureAudio() && audioCtx.currentTime + i * 0.10);
    });
  }

  // ── Update ──
  var lastT = performance.now();
  function update(now){
    var dtRaw = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    var dt = dtRaw * (prefersReducedMotion ? 0.8 : 1) * state.speed;

    if (state.completed) return;
    if (!state.playing){
      if (!state.animating) return; // when paused with no current animation, nothing advances
      // Allow current in-flight animation to finish so a Step doesn't leave the disk mid-air
    }

    if (!state.animating){
      if (state.playing) startNextMove();
      return;
    }

    var a = state.animating;
    a.t += dt;
    if (a.t >= a.dur){
      // Move to next phase or finish
      if (a.phase === 'lift'){
        a.phase = 'travel'; a.t = 0; a.dur = PHASE_DUR.travel;
      } else if (a.phase === 'travel'){
        a.phase = 'drop'; a.t = 0; a.dur = PHASE_DUR.drop;
      } else {
        // drop done
        state.pegs[a.to].push(a.disk);
        sndDrop(a.disk);
        state.animating = null;
        state.moveIdx++;
        document.getElementById('moveVal').textContent = state.moveIdx;
        // Continue automatically if playing
        if (state.playing && state.moveIdx < state.moves.length){
          startNextMove();
        } else if (state.moveIdx >= state.moves.length){
          state.completed = true;
          document.getElementById('doneBanner').classList.add('show');
          hideMoveReadout();
          sndComplete();
        }
      }
    }
  }

  // ── Render ──
  function pegX(idx){
    var marginX = Math.max(60, W * 0.13);
    var available = W - marginX * 2;
    return marginX + (idx + 0.5) * (available / 3);
  }
  function pegBaseY(){
    return H - Math.max(70, H * 0.18);
  }
  var DISK_H = 20;
  function diskWidth(disk){
    // smallest disk: ~40px, largest scales with N
    var maxDiskW = Math.min(W * 0.28, 160);
    var minDiskW = 36;
    if (state.N === 1) return maxDiskW;
    return minDiskW + (maxDiskW - minDiskW) * ((disk - 1) / (state.N - 1));
  }
  function diskHue(disk){
    // Hue ramps with disk size — small = cool, large = warm
    var t = (disk - 1) / Math.max(1, state.N - 1);
    return Math.round(190 + t * 180); // 190 → 370 (which wraps to ~10 / warm-magenta)
  }

  function drawBackground(){
    ctx.fillStyle = '#02011a';
    ctx.fillRect(0, 0, W, H);
    // soft horizon glow
    var g = ctx.createLinearGradient(0, pegBaseY() - 20, 0, H);
    g.addColorStop(0, 'rgba(155,91,255,0)');
    g.addColorStop(1, 'rgba(255,43,214,0.25)');
    ctx.fillStyle = g;
    ctx.fillRect(0, pegBaseY() - 20, W, H);
    // floor grid horizontal
    ctx.strokeStyle = 'rgba(92,230,255,0.20)';
    ctx.lineWidth = 1;
    for (var y = pegBaseY() + 10; y < H; y += 14){
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    // perspective verticals
    for (var i = 0; i < 12; i++){
      var x = (i / 11) * W;
      ctx.beginPath();
      ctx.moveTo(x, pegBaseY() + 10);
      ctx.lineTo((x - W / 2) * 1.6 + W / 2, H);
      ctx.stroke();
    }
    // platform base bar
    ctx.fillStyle = '#1a1f3a';
    ctx.fillRect(20, pegBaseY(), W - 40, 8);
    ctx.fillStyle = '#2a3050';
    ctx.fillRect(20, pegBaseY(), W - 40, 3);
    // platform glow edge
    ctx.strokeStyle = 'rgba(92,230,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#5ce6ff'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(20, pegBaseY()); ctx.lineTo(W - 20, pegBaseY()); ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function drawPeg(idx){
    var x = pegX(idx);
    var topY = pegBaseY() - Math.max(170, H * 0.45);
    // peg shaft
    ctx.fillStyle = '#3a4a78';
    ctx.fillRect(x - 4, topY, 8, pegBaseY() - topY);
    // glow column
    ctx.strokeStyle = 'rgba(92,230,255,0.45)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#5ce6ff'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(x, topY); ctx.lineTo(x, pegBaseY()); ctx.stroke();
    ctx.shadowBlur = 0;
    // top cap
    ctx.fillStyle = '#5ce6ff';
    ctx.beginPath(); ctx.arc(x, topY, 4, 0, Math.PI * 2); ctx.fill();
    ctx.shadowColor = '#5ce6ff'; ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
    // peg label
    ctx.fillStyle = 'rgba(244,240,255,0.6)';
    ctx.font = 'bold 13px "Audiowide", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(['A','B','C'][idx], x, pegBaseY() + 26);
  }

  function drawDisk(centerX, centerY, disk, opts){
    opts = opts || {};
    var w = diskWidth(disk);
    var h = DISK_H;
    var hue = diskHue(disk);
    var x = centerX - w / 2;
    var y = centerY - h / 2;
    ctx.save();
    // glow
    ctx.shadowColor = 'hsl(' + hue + ',95%,65%)';
    ctx.shadowBlur = opts.lift ? 22 : 14;
    // body gradient
    var grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, 'hsl(' + hue + ',95%,72%)');
    grad.addColorStop(0.45, 'hsl(' + hue + ',95%,52%)');
    grad.addColorStop(1, 'hsl(' + hue + ',95%,28%)');
    ctx.fillStyle = grad;
    // rounded rectangle
    var r = h * 0.45;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
    // outline
    ctx.strokeStyle = 'hsl(' + hue + ',100%,82%)';
    ctx.lineWidth = 1.4;
    ctx.stroke();
    // top highlight strip
    ctx.fillStyle = 'hsla(' + hue + ',100%,90%,0.55)';
    ctx.fillRect(x + r, y + 2, w - r * 2, 1.5);
    // bottom shadow strip
    ctx.fillStyle = 'hsla(' + hue + ',100%,20%,0.7)';
    ctx.fillRect(x + r, y + h - 3, w - r * 2, 2);
    // disk number label (centered)
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(7,4,24,0.85)';
    ctx.font = 'bold 11px "Rubik Mono One", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (w > 40) ctx.fillText(String(disk), centerX, centerY);
    ctx.restore();
  }

  function diskYOnPeg(pegIdx, stackIdx){
    // stackIdx 0 = bottom
    return pegBaseY() - 4 - DISK_H/2 - stackIdx * (DISK_H + 1);
  }

  function render(){
    drawBackground();
    drawPeg(0); drawPeg(1); drawPeg(2);

    // Draw resting disks on each peg
    for (var p = 0; p < 3; p++){
      var stack = state.pegs[p];
      for (var s = 0; s < stack.length; s++){
        var cy = diskYOnPeg(p, s);
        var cx = pegX(p);
        drawDisk(cx, cy, stack[s], {});
      }
    }

    // Draw the in-flight disk if any
    if (state.animating){
      var a = state.animating;
      var fromX = pegX(a.from);
      var toX = pegX(a.to);
      var startStackY = diskYOnPeg(a.from, a.startStackIdx); // where it was before lift
      var apexY = pegBaseY() - Math.max(190, H * 0.50) - DISK_H * 0.5;
      // landing stack idx = current length of dest peg (since disk hasn't been added yet)
      var landStackY = diskYOnPeg(a.to, state.pegs[a.to].length);

      var cx, cy;
      if (a.phase === 'lift'){
        var t = ease(a.t / a.dur);
        cx = fromX;
        cy = startStackY + (apexY - startStackY) * t;
      } else if (a.phase === 'travel'){
        var t2 = a.t / a.dur;
        var et = ease(t2);
        cx = fromX + (toX - fromX) * et;
        // slight arc apex during travel
        var arc = Math.sin(t2 * Math.PI) * 6;
        cy = apexY - arc;
      } else {
        var t3 = ease(a.t / a.dur);
        cx = toX;
        cy = apexY + (landStackY - apexY) * t3;
      }
      drawDisk(cx, cy, a.disk, { lift: true });
    }
  }

  function ease(t){
    // ease-in-out cubic
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  // ── Main loop ──
  function frame(now){
    try {
      update(now);
      render();
    } catch(e){ showError('loop: ' + e.message); }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ── Controls wiring ──
  var nInput = document.getElementById('nInput');
  var nDisplay = document.getElementById('nDisplay');
  var speedInput = document.getElementById('speedInput');
  var speedDisplay = document.getElementById('speedDisplay');
  var playBtn = document.getElementById('playBtn');
  var stepBtn = document.getElementById('stepBtn');
  var resetBtn = document.getElementById('resetBtn');
  var muteBtn = document.getElementById('muteBtn');

  nInput.addEventListener('input', function(){
    state.N = parseInt(nInput.value, 10) || 5;
    nDisplay.textContent = state.N;
    rebuild();
  });
  speedInput.addEventListener('input', function(){
    state.speed = parseFloat(speedInput.value) || 2;
    speedDisplay.textContent = state.speed + '×';
    document.getElementById('speedVal').textContent = state.speed;
  });
  playBtn.addEventListener('click', function(){
    state.playing = !state.playing;
    playBtn.setAttribute('aria-pressed', state.playing ? 'true' : 'false');
    playBtn.textContent = state.playing ? '▶ pause' : '⏸ play';
    if (state.playing && state.completed){
      // restart
      rebuild();
    }
  });
  stepBtn.addEventListener('click', function(){
    // Pause auto-play, then execute exactly one move
    if (state.completed) return;
    state.playing = false;
    playBtn.setAttribute('aria-pressed', 'false');
    playBtn.textContent = '⏸ play';
    if (state.animating){
      // finish the current animation instantly first
      // not great UX — instead complete the current move then stop
      finishCurrentMoveImmediately();
    } else {
      startNextMove();
      // then run update once with very fast speed to complete this move?
      // Actually simpler: step-mode plays until animation completes, then auto-pauses
      stepUntilAnimationDone = true;
    }
  });
  var stepUntilAnimationDone = false;

  function finishCurrentMoveImmediately(){
    if (!state.animating) return;
    var a = state.animating;
    // jump to drop end
    state.pegs[a.to].push(a.disk);
    sndDrop(a.disk);
    state.animating = null;
    state.moveIdx++;
    document.getElementById('moveVal').textContent = state.moveIdx;
  }

  resetBtn.addEventListener('click', function(){
    rebuild();
    state.playing = true;
    playBtn.setAttribute('aria-pressed', 'true');
    playBtn.textContent = '▶ pause';
  });
  muteBtn.addEventListener('click', function(){
    muted = !muted;
    muteBtn.textContent = muted ? '♪ off' : '♪ on';
    muteBtn.setAttribute('aria-pressed', muted ? 'true' : 'false');
    if (!muted) ensureAudio();
  });

  // Keyboard shortcuts
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    if (e.code === 'Space'){ e.preventDefault(); playBtn.click(); ensureAudio(); }
    else if (e.code === 'KeyS' || e.code === 'ArrowRight'){ e.preventDefault(); stepBtn.click(); ensureAudio(); }
    else if (e.code === 'KeyR'){ resetBtn.click(); }
    else if (e.code === 'KeyM'){ muteBtn.click(); }
  });

  // Override update tick to handle step-pause behavior
  var origUpdate = update;
  update = function(now){
    if (stepUntilAnimationDone){
      // Run update with original speed scaling
      origUpdate(now);
      if (!state.animating){
        stepUntilAnimationDone = false;
      }
    } else {
      origUpdate(now);
    }
  };

  // Initial display sync
  speedDisplay.textContent = state.speed + '×';
  nDisplay.textContent = state.N;
  document.getElementById('speedVal').textContent = state.speed;
})();
</script>
</body>
</html>
