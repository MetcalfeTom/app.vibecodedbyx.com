<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Physics UI</title>
<meta name="description" content="An app where the entire UI is a Matter.js physics simulation. Drag the windows. Watch the sliders fall. Bonk the buttons.">
<meta property="og:title" content="Physics UI">
<meta property="og:description" content="An app where the entire UI is a Matter.js physics simulation. Drag the windows. Watch the sliders fall. Bonk the buttons.">
<meta property="og:url" content="https://sloppy.live/physics-ui">
<meta property="og:image" content="https://image.pollinations.ai/prompt/physics%20simulation%20UI%20draggable%20windows%20colorful%20rigid%20bodies%20sliders%20falling%20paper%20editorial?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9A%99%EF%B8%8F">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>

<style>
:root{
  --bg:#f3ede0;
  --bg-2:#e8e0cf;
  --ink:#1a1a1c;
  --ink-mute:#6b6258;
  --rule:rgba(26,26,28,0.18);
  --mint:#7ed7b8;
  --coral:#ff7a6a;
  --sky:#7ab8e0;
  --lavender:#b39be0;
  --gold:#e8b94a;
  --rose:#e87a9c;
  --sage:#a8c39c;
}
body.dark{
  --bg:#181822;
  --bg-2:#23232f;
  --ink:#f0eadc;
  --ink-mute:#9b948a;
  --rule:rgba(240,234,220,0.20);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:16px;-webkit-font-smoothing:antialiased}
html{font-size:100%}

body{
  background:
    repeating-linear-gradient(11deg, rgba(26,26,28,0.020) 0 1px, transparent 1px 5px),
    var(--bg);
  transition: background-color 0.3s ease, color 0.3s ease;
}

.skip{position:absolute;left:-9999px;top:auto}
.skip:focus{left:1rem;top:1rem;background:var(--ink);color:var(--bg);padding:0.5rem;z-index:100}

#stage{
  position:fixed; inset:0;
  width:100%; height:100%;
  display:block;
  cursor: grab;
  touch-action: none;
}
#stage.dragging{ cursor: grabbing }

/* tiny header */
.tag{
  position: fixed;
  top: 1rem; left: 1rem;
  z-index: 5;
  pointer-events: none;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
}
.tag b{ color: var(--ink); font-weight: 500 }

/* hint banner bottom */
.hint{
  position: fixed;
  bottom: 0.85rem; left: 50%; transform: translateX(-50%);
  z-index: 5;
  pointer-events: none;
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--ink-mute);
  background: rgba(243,237,224,0.74);
  padding: 0.4rem 0.85rem;
  border: 1px solid var(--rule);
  backdrop-filter: blur(4px);
  white-space: nowrap;
}
body.dark .hint{ background: rgba(24,24,34,0.74) }

@media (max-width: 540px){
  .hint{ font-size: 0.85rem; padding: 0.35rem 0.7rem }
}
</style>
</head>
<body>
<a href="#stage" class="skip">Skip to canvas</a>

<canvas id="stage" role="application" aria-label="Physics-driven UI. Every visible element — windows, sliders, buttons, toggles, and floating letters — is a rigid body simulated by Matter.js. Drag any element with the mouse or finger. Tap a button to trigger its action. Move the GRAVITY slider to change how quickly things fall."></canvas>

<div class="tag">PHYSICS · <b>UI</b> · matter.js</div>
<div class="hint" id="hintEl">drag a window · tap a button · push a slider · upgrade the module to dispense more controls</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//   PHYSICS UI — every UI element is a Matter.js rigid body.
//   Custom canvas render so we can style each body as a real UI piece.
// ════════════════════════════════════════════════════════════════

const { Engine, World, Bodies, Body, Composite, Constraint, Mouse, MouseConstraint, Events, Vector, Common } = Matter;

const cvs = document.getElementById('stage');
const ctx = cvs.getContext('2d');
let W = 0, H = 0, DPR = 1;
function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  cvs.width = Math.floor(W * DPR); cvs.height = Math.floor(H * DPR);
  cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
fit();

// ──────── engine + world ────────
const engine = Engine.create();
engine.gravity.y = 0.6;     // start with mild gravity
const world = engine.world;
let walls = [];
function buildWalls(){
  for (const w of walls) Composite.remove(world, w);
  walls = [
    Bodies.rectangle(W/2, H + 30, W * 1.5, 60, { isStatic: true, label: 'wall', restitution: 0.55 }),
    Bodies.rectangle(W/2, -30, W * 1.5, 60, { isStatic: true, label: 'wall', restitution: 0.55 }),
    Bodies.rectangle(-30, H/2, 60, H * 1.5, { isStatic: true, label: 'wall', restitution: 0.55 }),
    Bodies.rectangle(W + 30, H/2, 60, H * 1.5, { isStatic: true, label: 'wall', restitution: 0.55 }),
  ];
  Composite.add(world, walls);
}
buildWalls();
window.addEventListener('resize', () => { fit(); buildWalls(); });

// ──────── audio ────────
let actx = null, audioOn = false;
function ac(){
  if (!actx){ try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch{ return null; } }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function bonkSfx(intensity = 1){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = 'sine';
  const f0 = 180 + Math.random() * 80;
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(f0 * 0.4, t + 0.12);
  const g = c.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(Math.min(0.18, 0.04 + intensity * 0.06), t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.18);
}
function clickSfx(){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = 'square'; o.frequency.value = 880;
  const g = c.createGain();
  g.gain.setValueAtTime(0.06, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.07);
}
function snapSfx(){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  for (let i = 0; i < 2; i++){
    const o = c.createOscillator(); o.type = 'square';
    o.frequency.setValueAtTime(i ? 1320 : 660, t + i * 0.04);
    const g = c.createGain();
    g.gain.setValueAtTime(0.07, t + i * 0.04); g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.06);
    o.connect(g); g.connect(c.destination);
    o.start(t + i * 0.04); o.stop(t + i * 0.04 + 0.07);
  }
}
function confettiPopSfx(){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = 'triangle';
  o.frequency.setValueAtTime(440, t);
  o.frequency.exponentialRampToValueAtTime(2200, t + 0.18);
  const g = c.createGain();
  g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.22);
}

// ──────── element registry ────────
// Each entry: { body, kind, ...options }. We render based on kind + options.
const PALETTE = ['#ff7a6a','#7ed7b8','#7ab8e0','#b39be0','#e8b94a','#e87a9c','#a8c39c'];
const elements = [];

function addElement(el){ elements.push(el); }

function spawnWindow(x, y, w, h, title, color){
  const body = Bodies.rectangle(x, y, w, h, {
    chamfer: { radius: 8 },
    friction: 0.4,
    frictionAir: 0.012,
    restitution: 0.18,
    density: 0.0014,
    label: 'window',
  });
  Composite.add(world, body);
  addElement({ body, kind: 'window', w, h, title, color });
}

function spawnButton(x, y, label, color, onTap){
  const body = Bodies.circle(x, y, 28, {
    friction: 0.5,
    frictionAir: 0.012,
    restitution: 0.55,
    density: 0.0018,
    label: 'button',
  });
  Composite.add(world, body);
  addElement({ body, kind: 'button', r: 28, label, color, onTap, pressedT: 0 });
}

function spawnLetter(x, y, char, color){
  const body = Bodies.rectangle(x, y, 38, 38, {
    chamfer: { radius: 4 },
    friction: 0.6,
    frictionAir: 0.012,
    restitution: 0.4,
    density: 0.001,
    label: 'letter',
  });
  Composite.add(world, body);
  addElement({ body, kind: 'letter', size: 38, char, color });
}

function spawnSlider(x, y, label, knobColor, range, value, onChange){
  // Vertical slider: a static track + a knob constrained to slide along it.
  const trackW = 14, trackH = 220;
  const trackBody = Bodies.rectangle(x, y, trackW, trackH, {
    isStatic: true,
    label: 'slider-track',
    chamfer: { radius: 6 },
  });
  const knobR = 22;
  const knobY = y - trackH / 2 + (1 - value) * trackH;     // value 0 = bottom, 1 = top
  const knob = Bodies.circle(x, knobY, knobR, {
    friction: 0.4,
    frictionAir: 0.04,
    restitution: 0.2,
    density: 0.0025,
    label: 'slider-knob',
  });
  Composite.add(world, [trackBody, knob]);
  addElement({ body: trackBody, kind: 'slider-track', label, w: trackW, h: trackH, range, knob, x });
  addElement({ body: knob, kind: 'slider-knob', r: knobR, color: knobColor, label, range, parent: trackBody, x, onChange, lastValue: value });
}

function spawnControlModule(x, y){
  const w = 230, h = 64;
  const body = Bodies.rectangle(x, y, w, h, {
    chamfer: { radius: 10 },
    friction: 0.5,
    frictionAir: 0.012,
    restitution: 0.18,
    density: 0.0018,
    label: 'control-module',
  });
  Composite.add(world, body);
  const TIERS = [
    { name: 'BASIC',  color: '#c8c1b1', spawn: () => null },               // baseline; nothing extra
    { name: 'TUNER',  color: '#7ab8e0',
      spawn: () => spawnSlider(W * 0.92, H * 0.45, 'bounce', '#ff7a6a', [0,1], 0.4, (v) => setRestitution(v)),
    },
    { name: 'CHAOS',  color: '#b39be0',
      spawn: () => { spawnSlider(W * 0.78, H * 0.45, 'time',  '#7ed7b8', [0.2, 1.6], 1.0, (v) => { engine.timing.timeScale = v; });
                    spawnToggle(W * 0.18, H * 0.42, 'wall ⤴', false, (s) => { for (const w of walls) Body.setStatic(w, !s); snapSfx(); }); },
    },
    { name: 'MAX',    color: '#ff7a6a',
      spawn: () => { spawnConfetti(); spawnConfetti();
                    spawnButton(W * 0.50, H * 0.10, '★', '#e8b94a', () => { for (let i = 0; i < 8; i++) spawnLetter(W*0.5 + (Math.random()-0.5)*240, 30, '★', '#e8b94a'); }); },
    },
  ];
  const moduleEl = { body, kind: 'control-module', w, h, tier: 0, tiers: TIERS, swapAnimT: 0 };
  // Upgrade button as a visual sub-region we hit-test in mouseup. Easier than a separate body
  // attached via constraint, and lets the whole module stay one rigid piece you can drag freely.
  moduleEl.upgrade = () => {
    if (moduleEl.tier >= TIERS.length - 1){
      // wrap-around: clear non-essential elements + reset to BASIC, with a debris drop
      cycleToBasic(moduleEl);
      return;
    }
    moduleEl.tier += 1;
    moduleEl.swapAnimT = 0.5;
    const t = TIERS[moduleEl.tier];
    if (t.spawn) t.spawn();
    snapSfx();
    setTimeout(() => clickSfx(), 60);
  };
  addElement(moduleEl);
  return moduleEl;
}
function cycleToBasic(moduleEl){
  // Detach + drop everything except walls, the module itself, and the original three windows.
  // The dropped elements stay as physical debris that falls to the floor — visualises the "swap".
  for (let i = elements.length - 1; i >= 0; i--){
    const el = elements[i];
    if (el === moduleEl) continue;
    if (el.kind === 'window') continue;            // keep the three original windows
    if (el.kind === 'control-module') continue;
    // Mark it as inert debris and let physics carry it down
    el.kind = 'debris';
    el.color = el.color || '#c8c1b1';
    // shake it
    Body.setVelocity(el.body, { x: (Math.random()-0.5) * 6, y: -2 });
    Body.setAngularVelocity(el.body, (Math.random()-0.5) * 0.25);
  }
  moduleEl.tier = 0;
  moduleEl.swapAnimT = 0.7;
  // re-spawn the baseline gravity slider so the module always has at least one knob
  spawnSlider(W * 0.86, H * 0.45, 'gravity',   '#e8b94a', [0, 2], engine.gravity.y / 2, (v) => { engine.gravity.y = v * 2; });
  snapSfx();
}

function spawnToggle(x, y, label, state, onChange){
  // Pill-shaped body — toggling is done by tapping (snaps state, sets visual)
  const w = 92, h = 40;
  const body = Bodies.rectangle(x, y, w, h, {
    chamfer: { radius: 20 },
    friction: 0.5,
    frictionAir: 0.012,
    restitution: 0.3,
    density: 0.0014,
    label: 'toggle',
  });
  Composite.add(world, body);
  addElement({ body, kind: 'toggle', w, h, label, state, onChange, snapT: 0 });
}

// ──────── world content ────────
function buildWorld(){
  // 3 windows scattered above the center
  spawnWindow(W * 0.32, H * 0.30, 260, 170, 'SETTINGS',  '#7ed7b8');
  spawnWindow(W * 0.62, H * 0.20, 240, 150, 'TOOLS',     '#7ab8e0');
  spawnWindow(W * 0.50, H * 0.50, 280, 180, 'ABOUT',     '#b39be0');

  // sliders on the right — only the baseline gravity slider lives here at start.
  // The Control Module physically dispenses more sliders/buttons as you upgrade it.
  spawnSlider(W * 0.86, H * 0.45, 'gravity',   '#e8b94a', [0, 2],     engine.gravity.y / 2,    (v) => { engine.gravity.y = v * 2; });

  // Control module — a draggable physical bar with a tier label + an UPGRADE button on its right edge
  spawnControlModule(W * 0.78, H * 0.78);

  // buttons in a strip
  const bx = W * 0.18, by = H * 0.78;
  spawnButton(bx + 0,   by, '✿', '#ff7a6a', () => { spawnConfetti(); confettiPopSfx(); });
  spawnButton(bx + 70,  by, '✦', '#7ab8e0', () => { for (let i = 0; i < 14; i++){ spawnLetter(W*0.5 + (Math.random()-0.5)*200, 30, ['P','U','S','H'][i%4], pick(PALETTE)); } });
  spawnButton(bx + 140, by, '↻', '#7ed7b8', () => { resetWorld(); });
  spawnButton(bx + 210, by, '☾', '#b39be0', () => { document.body.classList.toggle('dark'); clickSfx(); });

  // toggles
  spawnToggle(W * 0.18, H * 0.18, 'sound', false, (s) => { audioOn = s; if (audioOn){ ac(); } snapSfx(); });
  spawnToggle(W * 0.18, H * 0.30, 'walls', true,  (s) => { /* future toggle */ snapSfx(); });

  // floating letters spelling PHYSICS UI
  const word = 'PHYSICS UI';
  for (let i = 0; i < word.length; i++){
    const ch = word[i];
    if (ch === ' ') continue;
    spawnLetter(80 + i * 44, 80, ch, PALETTE[i % PALETTE.length]);
  }
}

function pick(a){ return a[(Math.random() * a.length) | 0]; }
function setRestitution(v){
  for (const el of elements){
    if (!el.body || el.body.isStatic) continue;
    el.body.restitution = v;
  }
}
function spawnConfetti(){
  for (let i = 0; i < 28; i++){
    const c = Bodies.rectangle(W/2 + (Math.random()-0.5)*80, 60, 10 + Math.random()*8, 6 + Math.random()*4, {
      friction: 0.4, frictionAir: 0.02, restitution: 0.6, density: 0.0008, label: 'confetti',
    });
    Body.setVelocity(c, { x: (Math.random()-0.5)*8, y: -2 - Math.random()*5 });
    Body.setAngularVelocity(c, (Math.random()-0.5) * 0.4);
    Composite.add(world, c);
    addElement({ body: c, kind: 'confetti', w: 14, h: 8, color: pick(PALETTE), life: 8 });
  }
}
function resetWorld(){
  Composite.clear(world, false, true);
  elements.length = 0;
  buildWalls();
  buildWorld();
  clickSfx();
}

buildWorld();

// ──────── slider value tracking ────────
function sliderValueOf(knob){
  // Find parent track via the knob entry
  const knobEl = elements.find(e => e.kind === 'slider-knob' && e.body === knob);
  if (!knobEl) return 0;
  const trackEl = elements.find(e => e.kind === 'slider-track' && e.body === knobEl.parent);
  if (!trackEl) return 0;
  const yTop = trackEl.body.position.y - trackEl.h / 2;
  const yBot = trackEl.body.position.y + trackEl.h / 2;
  // Clamp knob to track Y range and X to track X
  const yC = Math.max(yTop, Math.min(yBot, knob.position.y));
  // value 0 (bottom) → 1 (top)
  const t = 1 - (yC - yTop) / (yBot - yTop);
  return knobEl.range[0] + t * (knobEl.range[1] - knobEl.range[0]);
}

// Constrain knobs to their tracks AFTER each engine update — clamp X to track X and Y to track Y range.
Events.on(engine, 'afterUpdate', () => {
  for (const el of elements){
    if (el.kind !== 'slider-knob') continue;
    const trackEl = elements.find(e => e.kind === 'slider-track' && e.body === el.parent);
    if (!trackEl) continue;
    const tx = trackEl.body.position.x;
    const yTop = trackEl.body.position.y - trackEl.h / 2 + el.r;
    const yBot = trackEl.body.position.y + trackEl.h / 2 - el.r;
    // Lock x to track center
    Body.setPosition(el.body, { x: tx, y: Math.max(yTop, Math.min(yBot, el.body.position.y)) });
    // Zero out lateral velocity so the knob doesn't drift sideways
    Body.setVelocity(el.body, { x: 0, y: el.body.velocity.y });
    Body.setAngularVelocity(el.body, 0);
    // Fire onChange if value changed
    const v = sliderValueOf(el.body);
    if (Math.abs(v - el.lastValue) > 0.005){
      el.lastValue = v;
      if (el.onChange) el.onChange(v);
    }
  }
});

// ──────── mouse interaction ────────
const mouse = Mouse.create(cvs);
const mouseConstraint = MouseConstraint.create(engine, {
  mouse,
  constraint: { stiffness: 0.18, render: { visible: false } },
});
Composite.add(world, mouseConstraint);

// Track mouse-down body + position for click detection
let mouseDownBody = null;
let mouseDownAt = 0;
let mouseDownPos = { x: 0, y: 0 };
Events.on(mouseConstraint, 'mousedown', (ev) => {
  cvs.classList.add('dragging');
  mouseDownBody = mouseConstraint.body || null;
  mouseDownAt = performance.now();
  mouseDownPos = { x: mouse.position.x, y: mouse.position.y };
  if (!audioOn){ /* leave to user toggle */ }
});
Events.on(mouseConstraint, 'mouseup', (ev) => {
  cvs.classList.remove('dragging');
  const elapsed = performance.now() - mouseDownAt;
  const dx = mouse.position.x - mouseDownPos.x;
  const dy = mouse.position.y - mouseDownPos.y;
  const dist2 = dx * dx + dy * dy;
  if (mouseDownBody && elapsed < 220 && dist2 < 64){
    // It was a tap, not a drag — find the element + fire its action
    const el = elements.find(e => e.body === mouseDownBody);
    if (el){
      if (el.kind === 'button' && el.onTap){
        el.pressedT = 0.3;
        el.onTap();
        clickSfx();
      } else if (el.kind === 'toggle'){
        el.state = !el.state;
        el.snapT = 0.5;
        if (el.onChange) el.onChange(el.state);
      } else if (el.kind === 'control-module'){
        // Hit-test the upgrade-button sub-region in body-local space.
        const lp = Vector.sub(mouse.position, el.body.position);
        const cos = Math.cos(-el.body.angle), sin = Math.sin(-el.body.angle);
        const lx = lp.x * cos - lp.y * sin;
        const ly = lp.x * sin + lp.y * cos;
        // upgrade region = right ~70px of the module
        if (lx > el.w/2 - 78 && lx < el.w/2 - 6 && Math.abs(ly) < el.h/2 - 6){
          el.upgrade();
        }
      }
    }
  }
  mouseDownBody = null;
});

// ──────── collision sound ────────
Events.on(engine, 'collisionStart', (ev) => {
  for (const pair of ev.pairs){
    const a = pair.bodyA, b = pair.bodyB;
    // ignore wall-wall (impossible) and skip if either is the slider-knob (lots of internal contact)
    if (a.label === 'slider-knob' || b.label === 'slider-knob') continue;
    // intensity from collision normal-velocity magnitude
    const v = Math.hypot(
      (a.velocity.x - b.velocity.x),
      (a.velocity.y - b.velocity.y)
    );
    if (v > 3){ bonkSfx(Math.min(1, v / 14)); }
  }
});

// ──────── render ────────
function clear(){
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg') || '#f3ede0';
  ctx.fillRect(0, 0, W, H);
}
function drawWindow(el){
  const b = el.body;
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(-el.w/2 + 4, -el.h/2 + 6, el.w, el.h);
  // panel
  ctx.fillStyle = '#fff';
  if (document.body.classList.contains('dark')) ctx.fillStyle = '#23232f';
  roundRect(ctx, -el.w/2, -el.h/2, el.w, el.h, 8);
  ctx.fill();
  // 1px outline
  ctx.lineWidth = 1.2;
  ctx.strokeStyle = inkRule();
  ctx.stroke();
  // title bar
  ctx.fillStyle = el.color;
  roundRect(ctx, -el.w/2, -el.h/2, el.w, 28, 8, true);
  ctx.fill();
  // title text
  ctx.fillStyle = '#1a1a1c';
  ctx.font = 'bold 11px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(el.title, -el.w/2 + 12, -el.h/2 + 14);
  // window dots (close/min/max)
  for (let i = 0; i < 3; i++){
    ctx.fillStyle = ['#1a1a1c','#1a1a1c','#1a1a1c'][i];
    ctx.globalAlpha = 0.55;
    ctx.beginPath(); ctx.arc(el.w/2 - 12 - i * 12, -el.h/2 + 14, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // body lines (fake content)
  const ink = getCssVar('--ink');
  ctx.fillStyle = ink;
  ctx.globalAlpha = 0.7;
  ctx.font = '10px "IBM Plex Mono", monospace';
  ctx.fillText('▸ pickup the corner', -el.w/2 + 16, -el.h/2 + 50);
  ctx.fillText('▸ everything moves', -el.w/2 + 16, -el.h/2 + 68);
  ctx.fillText('▸ nothing is sacred', -el.w/2 + 16, -el.h/2 + 86);
  ctx.globalAlpha = 0.45;
  ctx.fillRect(-el.w/2 + 16, -el.h/2 + 100, el.w - 32, 1);
  ctx.fillRect(-el.w/2 + 16, -el.h/2 + 110, el.w * 0.6 - 16, 1);
  ctx.fillRect(-el.w/2 + 16, -el.h/2 + 120, el.w * 0.4 - 16, 1);
  ctx.globalAlpha = 1;
  ctx.restore();
}
function drawButton(el){
  const b = el.body;
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.arc(2, 4, el.r, 0, Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle = el.color;
  const press = el.pressedT > 0 ? (1 - el.pressedT * 0.3) : 1;
  ctx.beginPath(); ctx.arc(0, 0, el.r * press, 0, Math.PI*2); ctx.fill();
  // inner ring
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, el.r - 4, 0, Math.PI*2); ctx.stroke();
  // label glyph
  ctx.fillStyle = '#1a1a1c';
  ctx.font = 'bold 22px "IBM Plex Sans", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(el.label, 0, 1);
  ctx.restore();
  if (el.pressedT > 0) el.pressedT -= 1/60;
}
function drawLetter(el){
  const b = el.body;
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(-el.size/2 + 2, -el.size/2 + 3, el.size, el.size);
  ctx.fillStyle = el.color;
  roundRect(ctx, -el.size/2, -el.size/2, el.size, el.size, 4);
  ctx.fill();
  ctx.fillStyle = '#1a1a1c';
  ctx.font = 'bold 22px "IBM Plex Sans", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(el.char, 0, 1);
  ctx.restore();
}
function drawSliderTrack(el){
  const b = el.body;
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  ctx.fillStyle = inkRule();
  roundRect(ctx, -el.w/2, -el.h/2, el.w, el.h, 6);
  ctx.fill();
  ctx.strokeStyle = inkRule(0.5);
  ctx.lineWidth = 1;
  ctx.stroke();
  // tick marks
  ctx.fillStyle = inkRule(1.4);
  for (let i = 0; i <= 6; i++){
    const ty = -el.h/2 + (i / 6) * el.h;
    ctx.fillRect(el.w/2 + 4, ty - 0.5, 8, 1);
  }
  // label below
  ctx.fillStyle = getCssVar('--ink-mute');
  ctx.font = '500 9px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(el.label.toUpperCase(), 0, el.h/2 + 18);
  ctx.restore();
}
function drawSliderKnob(el){
  const b = el.body;
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.arc(2, 3, el.r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = el.color;
  ctx.beginPath(); ctx.arc(0, 0, el.r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, el.r - 3, 0, Math.PI*2); ctx.stroke();
  // tactile dots
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  for (let i = -1; i <= 1; i++) ctx.fillRect(-2, i * 5 - 0.5, 4, 1.5);
  ctx.restore();
  // value tag
  const v = sliderValueOf(b);
  ctx.fillStyle = getCssVar('--ink');
  ctx.font = '500 10px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(v.toFixed(2), b.position.x, b.position.y + el.r + 14);
}
function drawToggle(el){
  const b = el.body;
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  roundRect(ctx, -el.w/2 + 2, -el.h/2 + 3, el.w, el.h, el.h/2);
  ctx.fill();
  // pill body — color depends on state
  ctx.fillStyle = el.state ? '#7ed7b8' : '#c8c1b1';
  roundRect(ctx, -el.w/2, -el.h/2, el.w, el.h, el.h/2);
  ctx.fill();
  ctx.strokeStyle = inkRule(0.7); ctx.lineWidth = 1;
  ctx.stroke();
  // knob disc
  const knobR = el.h/2 - 4;
  const knobX = el.state ? el.w/2 - knobR - 4 : -el.w/2 + knobR + 4;
  const targetX = el.snapT > 0 ? knobX + (el.state ? -1 : 1) * el.snapT * 8 : knobX;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(targetX, 0, knobR, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1; ctx.stroke();
  // label
  ctx.fillStyle = '#1a1a1c';
  ctx.font = 'bold 9px "IBM Plex Mono", monospace';
  ctx.textAlign = el.state ? 'left' : 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(el.label.toUpperCase(), el.state ? -el.w/2 + 10 : el.w/2 - 10, 0);
  ctx.restore();
  if (el.snapT > 0) el.snapT -= 1/60;
}
function drawControlModule(el){
  const b = el.body;
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  roundRect(ctx, -el.w/2 + 3, -el.h/2 + 5, el.w, el.h, 10);
  ctx.fill();
  // body
  const tier = el.tiers[el.tier];
  ctx.fillStyle = '#fff';
  if (document.body.classList.contains('dark')) ctx.fillStyle = '#23232f';
  roundRect(ctx, -el.w/2, -el.h/2, el.w, el.h, 10);
  ctx.fill();
  ctx.lineWidth = 1.4;
  ctx.strokeStyle = inkRule();
  ctx.stroke();
  // tier color stripe on the left edge
  ctx.fillStyle = tier.color;
  roundRect(ctx, -el.w/2, -el.h/2, 8, el.h, 4);
  ctx.fill();
  // label area
  ctx.fillStyle = getCssVar('--ink-mute');
  ctx.font = 'bold 9px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('CONTROL · MODULE', -el.w/2 + 16, -el.h/2 + 8);
  ctx.fillStyle = getCssVar('--ink');
  ctx.font = 'bold 14px "IBM Plex Mono", monospace';
  ctx.textBaseline = 'top';
  ctx.fillText('TIER · ' + tier.name, -el.w/2 + 16, -el.h/2 + 22);
  // tier dots (4 pips, filled up to current)
  for (let i = 0; i < el.tiers.length; i++){
    ctx.fillStyle = i <= el.tier ? el.tiers[i].color : 'rgba(120,120,120,0.25)';
    ctx.beginPath();
    ctx.arc(-el.w/2 + 18 + i * 14, el.h/2 - 12, 4, 0, Math.PI * 2);
    ctx.fill();
  }
  // upgrade button on the right
  const bx = el.w/2 - 42, by = 0;
  const bw = 70, bh = 40;
  // pulse on swap
  const pulse = el.swapAnimT > 0 ? 1 + el.swapAnimT * 0.12 : 1;
  ctx.fillStyle = el.tier >= el.tiers.length - 1 ? '#ff7a6a' : '#7ed7b8';
  roundRect(ctx, bx - bw/2 * pulse, by - bh/2 * pulse, bw * pulse, bh * pulse, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#1a1a1c';
  ctx.font = 'bold 10px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(el.tier >= el.tiers.length - 1 ? '↻ RESET' : '↑ UPGRADE', bx, by);
  ctx.restore();
  if (el.swapAnimT > 0) el.swapAnimT -= 1/60;
}

function drawDebris(el){
  // Detached / inert UI piece — same shape memory but desaturated, with a subtle X
  const b = el.body;
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = 'rgba(120,120,120,0.4)';
  // shape from original size hints if available
  const w = el.w || (el.r ? el.r * 2 : 24);
  const h = el.h || (el.r ? el.r * 2 : 24);
  roundRect(ctx, -w/2, -h/2, w, h, 4);
  ctx.fill();
  ctx.strokeStyle = inkRule(0.7);
  ctx.lineWidth = 1; ctx.stroke();
  // tiny label "x"
  ctx.fillStyle = inkRule(1.5);
  ctx.font = 'bold 10px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('×', 0, 1);
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawConfetti(el){
  const b = el.body;
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  ctx.fillStyle = el.color;
  const wScale = Math.abs(Math.cos(b.angle * 1.8));
  ctx.fillRect(-el.w/2 * wScale, -el.h/2, el.w * wScale, el.h);
  ctx.restore();
}

// helpers
function roundRect(c, x, y, w, h, r, topOnly){
  c.beginPath();
  if (topOnly){
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h);
    c.lineTo(x, y + h);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
    c.closePath();
  } else {
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
    c.closePath();
  }
}
function getCssVar(name){
  return getComputedStyle(document.body).getPropertyValue(name).trim() || '#000';
}
function inkRule(scale = 1){
  const isDark = document.body.classList.contains('dark');
  const a = isDark ? 0.20 : 0.18;
  return `rgba(${isDark ? '240,234,220' : '26,26,28'}, ${a * scale})`;
}

// ──────── render frame ────────
let last = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  Engine.update(engine, dt * 1000);
  // tick confetti life
  for (let i = elements.length - 1; i >= 0; i--){
    const el = elements[i];
    if (el.kind === 'confetti'){
      el.life -= dt;
      if (el.life <= 0){ Composite.remove(world, el.body); elements.splice(i, 1); }
    }
  }
  clear();
  // draw walls (subtle bottom shadow line)
  ctx.fillStyle = inkRule(0.6);
  ctx.fillRect(0, H - 1, W, 1);
  // draw bodies in a sensible z-order
  const order = ['confetti','debris','slider-track','letter','toggle','slider-knob','window','control-module','button'];
  const grouped = {};
  for (const el of elements){
    (grouped[el.kind] = grouped[el.kind] || []).push(el);
  }
  for (const k of order){
    if (!grouped[k]) continue;
    for (const el of grouped[k]){
      switch (el.kind){
        case 'window':         drawWindow(el); break;
        case 'button':         drawButton(el); break;
        case 'letter':         drawLetter(el); break;
        case 'slider-track':   drawSliderTrack(el); break;
        case 'slider-knob':    drawSliderKnob(el); break;
        case 'toggle':         drawToggle(el); break;
        case 'confetti':       drawConfetti(el); break;
        case 'control-module': drawControlModule(el); break;
        case 'debris':         drawDebris(el); break;
      }
    }
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ──────── tiny helpers ────────
function fmtNumber(n){ return Math.round(n * 100) / 100; }

// ──────── boot hint fade ────────
setTimeout(() => { const h = document.getElementById('hintEl'); if (h) h.style.opacity = '0.4'; }, 8000);
</script>
