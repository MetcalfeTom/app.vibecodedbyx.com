<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Neon Pac</title>
<link rel="icon" href="https://emojicdn.elk.sh/👾">
<meta property="og:title" content="Neon Pac">
<meta property="og:description" content="Classic maze chomper with neon glow and swipe controls.">
<meta property="og:url" content="https://sloppy.live/neon-pacman">
<meta property="og:image" content="https://emojicdn.elk.sh/👾?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Fira+Code:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;overflow:hidden;background:#060612;touch-action:none;user-select:none;-webkit-user-select:none}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Fira Code',monospace}
canvas{display:block;image-rendering:pixelated}
#hud{display:flex;justify-content:space-between;width:100%;max-width:500px;padding:8px 12px;font-size:12px;color:rgba(255,255,80,0.7);font-family:'Silkscreen',monospace}
#hud span{letter-spacing:1px}
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(6,6,18,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;opacity:0;pointer-events:none;transition:opacity .3s}
#overlay.show{opacity:1;pointer-events:auto}
#overlay h1{font-family:'Silkscreen',monospace;font-size:2rem;color:#ff0;text-shadow:0 0 20px rgba(255,255,0,0.5);letter-spacing:4px}
#overlay .sub{font-size:11px;color:rgba(255,255,255,0.4)}
#overlay button{padding:14px 32px;background:transparent;border:2px solid #ff0;color:#ff0;font-family:'Silkscreen',monospace;font-size:14px;letter-spacing:2px;cursor:pointer;border-radius:4px;min-height:48px;transition:all .2s}
#overlay button:hover{background:#ff0;color:#060612}
a#back{position:fixed;bottom:6px;left:10px;font-size:9px;opacity:0.15;color:#660;text-decoration:none;z-index:5}
#dpad{position:fixed;bottom:16px;right:16px;width:140px;height:140px;z-index:10;display:none}
.dpad-btn{position:absolute;width:44px;height:44px;background:rgba(255,255,0,0.08);border:1.5px solid rgba(255,255,0,0.25);border-radius:8px;color:rgba(255,255,0,0.5);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.dpad-btn:active{background:rgba(255,255,0,0.2);color:#ff0}
.dpad-up{top:0;left:50%;transform:translateX(-50%)}
.dpad-down{bottom:0;left:50%;transform:translateX(-50%)}
.dpad-left{left:0;top:50%;transform:translateY(-50%)}
.dpad-right{right:0;top:50%;transform:translateY(-50%)}
@media(pointer:coarse){#dpad{display:block}}
@media(max-height:600px){#dpad{bottom:8px;right:8px;width:120px;height:120px}.dpad-btn{width:38px;height:38px;font-size:16px}}
</style>
</head>
<body>
<div id="hud">
  <span id="scoreDisp">0</span>
  <span id="livesDisp"></span>
  <span id="levelDisp">LV 1</span>
</div>
<canvas id="c"></canvas>
<div id="overlay" class="show">
  <h1>NEON PAC</h1>
  <div class="sub">Arrow keys or swipe to move</div>
  <button id="playBtn">PLAY</button>
</div>
<div id="dpad">
  <button class="dpad-btn dpad-up" data-dir="3">▲</button>
  <button class="dpad-btn dpad-down" data-dir="1">▼</button>
  <button class="dpad-btn dpad-left" data-dir="2">◀</button>
  <button class="dpad-btn dpad-right" data-dir="0">▶</button>
</div>
<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
var C=document.getElementById('c'),X=C.getContext('2d');

// --- MAZE (21 cols x 27 rows) ---
// 0=path, 1=wall, 2=dot, 3=power pellet, 4=empty, 5=ghost house door
var MAZE_TEMPLATE=[
  "111111111111111111111",
  "122222222122222222221",
  "121111121121121111121",
  "131111121121121111131",
  "121111121121121111121",
  "122222222222222222221",
  "121121111211111211121",
  "121121111211111211121",
  "122221222212222122221",
  "111121110010011211111",
  "000021110010011210000",
  "111121100000001211111",
  "000020004440000200000",
  "111121004440001211111",
  "000021004440001210000",
  "111121000000001211111",
  "000020111011101200000",
  "111121111011101211111",
  "122222222212222222221",
  "121111121212121111121",
  "131121222202222121131",
  "111121121212121211111",
  "122222122212222122221",
  "121111111211111111121",
  "122222222222222222221",
  "121111111111111111121",
  "111111111111111111111"
];
var COLS=21,ROWS=27;
var maze=[];
var TILE=0; // computed on resize
var totalDots=0;
var dotsEaten=0;

function buildMaze(){
  maze=[];totalDots=0;dotsEaten=0;
  for(var r=0;r<ROWS;r++){
    maze[r]=[];
    for(var c=0;c<COLS;c++){
      var ch=parseInt(MAZE_TEMPLATE[r][c]);
      maze[r][c]=ch;
      if(ch===2||ch===3)totalDots++;
    }
  }
}

// --- ENTITIES ---
var pac={x:10,y:20,dir:0,nextDir:0,moving:false,mouthAngle:0,mouthOpen:true,speed:0.08};
var ghosts=[];
var GHOST_COLORS=['#ff4444','#ffaacc','#44ddff','#ffaa44'];
var GHOST_NAMES=['Blinky','Pinky','Inky','Clyde'];
var GHOST_SCATTER=[{x:19,y:0},{x:0,y:0},{x:19,y:26},{x:0,y:26}];

function initGhosts(){
  ghosts=[];
  for(var i=0;i<4;i++){
    ghosts.push({
      x:9+i,y:13,
      dir:Math.floor(Math.random()*4),
      speed:0.07+level*0.005,
      color:GHOST_COLORS[i],
      name:GHOST_NAMES[i],
      scared:false,scaredTimer:0,
      eaten:false,
      exitTimer:i*90, // stagger exits — aggressive: come out fast
      inHouse:true,
      mode:'scatter', // scatter, chase
      modeTimer:0
    });
  }
}

// --- GAME STATE ---
var score=0,lives=3,level=1;
var gameOver=false,gameStarted=false,paused=false;
var powerTimer=0;
var ghostCombo=0;
var freezeTimer=0;

// directions: 0=right,1=down,2=left,3=up
var DX=[1,0,-1,0],DY=[0,1,0,-1];

function canMove(gx,gy,dir){
  var nx=Math.round(gx+DX[dir]);
  var ny=Math.round(gy+DY[dir]);
  // wrap tunnel
  if(nx<0)nx=COLS-1;
  if(nx>=COLS)nx=0;
  if(ny<0||ny>=ROWS)return false;
  return maze[ny][nx]!==1;
}

function isAligned(entity){
  return Math.abs(entity.x-Math.round(entity.x))<0.05&&Math.abs(entity.y-Math.round(entity.y))<0.05;
}

// --- UPDATE ---
function update(){
  if(gameOver||!gameStarted||paused)return;
  if(freezeTimer>0){freezeTimer--;return;}

  // pac movement
  if(isAligned(pac)){
    pac.x=Math.round(pac.x);
    pac.y=Math.round(pac.y);
    // try next direction first
    if(canMove(pac.x,pac.y,pac.nextDir)){
      pac.dir=pac.nextDir;
      pac.moving=true;
    }else if(!canMove(pac.x,pac.y,pac.dir)){
      pac.moving=false;
    }
  }

  if(pac.moving){
    pac.x+=DX[pac.dir]*pac.speed;
    pac.y+=DY[pac.dir]*pac.speed;
  }

  // wrap tunnels
  if(pac.x<-0.5)pac.x=COLS-0.5;
  if(pac.x>COLS-0.5)pac.x=-0.5;

  // mouth animation
  pac.mouthAngle+=pac.moving?0.15:0.05;

  // eat dots
  var cx=Math.round(pac.x),cy=Math.round(pac.y);
  if(cx>=0&&cx<COLS&&cy>=0&&cy<ROWS){
    if(maze[cy][cx]===2){
      maze[cy][cx]=4;
      score+=10;
      dotsEaten++;
    }else if(maze[cy][cx]===3){
      maze[cy][cx]=4;
      score+=50;
      dotsEaten++;
      // power mode
      powerTimer=360-level*20;
      if(powerTimer<120)powerTimer=120;
      ghostCombo=0;
      for(var i=0;i<ghosts.length;i++){
        if(!ghosts[i].eaten)ghosts[i].scared=true;
        ghosts[i].scaredTimer=powerTimer;
      }
    }
  }

  // level complete?
  if(dotsEaten>=totalDots){
    level++;
    freezeTimer=90;
    buildMaze();
    resetPositions();
    initGhosts();
    updateHUD();
    return;
  }

  // power timer
  if(powerTimer>0){
    powerTimer--;
    if(powerTimer===0){
      for(var i=0;i<ghosts.length;i++){
        ghosts[i].scared=false;
        ghosts[i].scaredTimer=0;
      }
    }
  }

  // update ghosts
  for(var i=0;i<ghosts.length;i++){
    var g=ghosts[i];

    // exit house
    if(g.inHouse){
      g.exitTimer--;
      if(g.exitTimer<=0){
        g.x=10;g.y=11;
        g.inHouse=false;
        g.dir=3; // up
      }
      continue;
    }

    // scared timer
    if(g.scared){
      g.scaredTimer--;
      if(g.scaredTimer<=0){g.scared=false;}
    }

    // eaten — return to house
    if(g.eaten){
      var hdx=10-g.x,hdy=13-g.y;
      var hd=Math.sqrt(hdx*hdx+hdy*hdy);
      if(hd<0.5){
        g.eaten=false;g.scared=false;g.inHouse=true;g.exitTimer=60;
        g.x=10;g.y=13;
        continue;
      }
      // move toward house fast
      g.x+=hdx/hd*0.15;
      g.y+=hdy/hd*0.15;
      continue;
    }

    // mode switching
    g.modeTimer++;
    // aggressive: mostly chase, short scatter
    var scatterLen=g.mode==='scatter'?180:480;
    if(g.modeTimer>scatterLen){g.mode=g.mode==='scatter'?'chase':'scatter';g.modeTimer=0;}

    // movement at grid intersections
    if(isAligned(g)){
      g.x=Math.round(g.x);
      g.y=Math.round(g.y);

      // choose direction
      var bestDir=-1,bestDist=99999;
      var tx,ty;

      if(g.scared){
        // random direction when scared
        var dirs=[];
        for(var d=0;d<4;d++){
          if(d===(g.dir+2)%4)continue; // no reversing
          if(canMove(g.x,g.y,d))dirs.push(d);
        }
        bestDir=dirs.length>0?dirs[Math.floor(Math.random()*dirs.length)]:g.dir;
      }else{
        // target based on ghost personality
        if(g.mode==='scatter'){
          tx=GHOST_SCATTER[i].x;ty=GHOST_SCATTER[i].y;
        }else{
          // chase
          if(i===0){tx=pac.x;ty=pac.y;} // Blinky: direct chase
          else if(i===1){tx=pac.x+DX[pac.dir]*4;ty=pac.y+DY[pac.dir]*4;} // Pinky: ambush
          else if(i===2){ // Inky: uses Blinky's position
            var bx=ghosts[0].x,by=ghosts[0].y;
            var ax=pac.x+DX[pac.dir]*2,ay=pac.y+DY[pac.dir]*2;
            tx=ax+(ax-bx);ty=ay+(ay-by);
          }else{ // Clyde: chase if far, scatter if close
            var cd=Math.sqrt((pac.x-g.x)*(pac.x-g.x)+(pac.y-g.y)*(pac.y-g.y));
            if(cd>8){tx=pac.x;ty=pac.y;}
            else{tx=GHOST_SCATTER[i].x;ty=GHOST_SCATTER[i].y;}
          }
        }

        for(var d=0;d<4;d++){
          if(d===(g.dir+2)%4)continue; // no reversing
          if(!canMove(g.x,g.y,d))continue;
          var nx=g.x+DX[d],ny=g.y+DY[d];
          var dist=(nx-tx)*(nx-tx)+(ny-ty)*(ny-ty);
          if(dist<bestDist){bestDist=dist;bestDir=d;}
        }
      }
      if(bestDir>=0)g.dir=bestDir;
      else if(!canMove(g.x,g.y,g.dir))g.dir=(g.dir+2)%4; // reverse if stuck
    }

    var spd=g.scared?g.speed*0.6:g.speed;
    g.x+=DX[g.dir]*spd;
    g.y+=DY[g.dir]*spd;

    // wrap tunnels
    if(g.x<-0.5)g.x=COLS-0.5;
    if(g.x>COLS-0.5)g.x=-0.5;

    // collision with pac
    var dx=pac.x-g.x,dy=pac.y-g.y;
    if(dx*dx+dy*dy<0.6){
      if(g.scared){
        // eat ghost
        g.eaten=true;g.scared=false;
        ghostCombo++;
        score+=100*(1<<ghostCombo);
        freezeTimer=20;
      }else{
        // pac dies
        lives--;
        freezeTimer=60;
        if(lives<=0){
          gameOver=true;
          showOverlay('GAME OVER','Score: '+score);
        }else{
          resetPositions();
        }
        updateHUD();
        return;
      }
    }
  }

  updateHUD();
}

function resetPositions(){
  pac.x=10;pac.y=20;pac.dir=0;pac.nextDir=0;pac.moving=false;
  for(var i=0;i<ghosts.length;i++){
    ghosts[i].x=9+i;ghosts[i].y=13;ghosts[i].inHouse=true;ghosts[i].exitTimer=i*180;
    ghosts[i].eaten=false;ghosts[i].scared=false;
  }
}

function updateHUD(){
  document.getElementById('scoreDisp').textContent=score;
  var hearts='';for(var i=0;i<lives;i++)hearts+='♥';
  document.getElementById('livesDisp').textContent=hearts;
  document.getElementById('levelDisp').textContent='LV '+level;
}

// --- DRAW ---
function draw(){
  X.fillStyle='#060612';
  X.fillRect(0,0,C.width,C.height);

  var ox=(C.width-COLS*TILE)/2;
  var oy=0;

  // draw maze
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var tx=ox+c*TILE,ty=oy+r*TILE;
      var cell=maze[r][c];

      if(cell===1){
        // wall — check neighbors for edge drawing
        X.fillStyle='rgba(30,30,100,0.5)';
        X.fillRect(tx+1,ty+1,TILE-2,TILE-2);
        // neon wall edges
        X.strokeStyle='rgba(60,60,220,0.4)';
        X.lineWidth=1;
        if(r>0&&maze[r-1][c]!==1){X.beginPath();X.moveTo(tx,ty+0.5);X.lineTo(tx+TILE,ty+0.5);X.stroke();}
        if(r<ROWS-1&&maze[r+1][c]!==1){X.beginPath();X.moveTo(tx,ty+TILE-0.5);X.lineTo(tx+TILE,ty+TILE-0.5);X.stroke();}
        if(c>0&&maze[r][c-1]!==1){X.beginPath();X.moveTo(tx+0.5,ty);X.lineTo(tx+0.5,ty+TILE);X.stroke();}
        if(c<COLS-1&&maze[r][c+1]!==1){X.beginPath();X.moveTo(tx+TILE-0.5,ty);X.lineTo(tx+TILE-0.5,ty+TILE);X.stroke();}
      }else if(cell===2){
        // dot
        X.fillStyle='rgba(255,255,180,0.7)';
        X.beginPath();X.arc(tx+TILE/2,ty+TILE/2,TILE*0.12,0,Math.PI*2);X.fill();
      }else if(cell===3){
        // power pellet — pulsing
        var pulse=0.6+Math.sin(Date.now()*0.006)*0.4;
        X.fillStyle='rgba(255,255,100,'+pulse+')';
        X.beginPath();X.arc(tx+TILE/2,ty+TILE/2,TILE*0.3,0,Math.PI*2);X.fill();
        // glow
        X.fillStyle='rgba(255,255,100,'+(pulse*0.15)+')';
        X.beginPath();X.arc(tx+TILE/2,ty+TILE/2,TILE*0.6,0,Math.PI*2);X.fill();
      }
    }
  }

  // draw ghosts
  for(var i=0;i<ghosts.length;i++){
    var g=ghosts[i];
    if(g.inHouse&&g.exitTimer>0)continue; // hide during initial wait
    var gx=ox+g.x*TILE+TILE/2;
    var gy=oy+g.y*TILE+TILE/2;
    var gs=TILE*0.45;

    if(g.eaten){
      // just eyes
      drawGhostEyes(gx,gy,gs,g.dir);
      continue;
    }

    var color=g.scared?(g.scaredTimer<120&&g.scaredTimer%16<8?'#fff':'#4444ff'):g.color;

    // ghost body glow
    X.fillStyle=color.replace(')',',0.12)').replace('#','rgba(');
    var gAlpha=g.scared?0.06:0.12;
    var gg=X.createRadialGradient(gx,gy,gs*0.3,gx,gy,gs*2.5);
    gg.addColorStop(0,hexToRgba(color,gAlpha));
    gg.addColorStop(1,hexToRgba(color,0));
    X.fillStyle=gg;
    X.beginPath();X.arc(gx,gy,gs*2.5,0,Math.PI*2);X.fill();

    // ghost body
    X.fillStyle=color;
    X.beginPath();
    X.arc(gx,gy-gs*0.15,gs,Math.PI,0);
    // wavy bottom
    var waveY=gy+gs*0.6;
    X.lineTo(gx+gs,waveY);
    for(var w=0;w<3;w++){
      var wx=gx+gs-gs*0.667*(w+0.5);
      var wpy=waveY+Math.sin(Date.now()*0.008+w*2)*gs*0.2;
      X.quadraticCurveTo(gx+gs-gs*0.667*w-gs*0.333,wpy+gs*0.25,wx,wpy);
    }
    X.lineTo(gx-gs,waveY);
    X.lineTo(gx-gs,gy-gs*0.15);
    X.fill();

    // eyes
    if(!g.scared){
      drawGhostEyes(gx,gy,gs,g.dir);
    }else{
      // scared face
      X.fillStyle='#fff';
      X.beginPath();X.arc(gx-gs*0.25,gy-gs*0.1,gs*0.12,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(gx+gs*0.25,gy-gs*0.1,gs*0.12,0,Math.PI*2);X.fill();
      // wavy mouth
      X.strokeStyle='#fff';X.lineWidth=1.5;
      X.beginPath();X.moveTo(gx-gs*0.3,gy+gs*0.2);
      for(var w=0;w<4;w++){
        X.lineTo(gx-gs*0.3+gs*0.2*(w+0.5),gy+gs*(w%2===0?0.3:0.15));
      }
      X.stroke();
    }
  }

  // draw pac
  if(!gameOver){
    var px=ox+pac.x*TILE+TILE/2;
    var py=oy+pac.y*TILE+TILE/2;
    var ps=TILE*0.45;
    var mouth=Math.abs(Math.sin(pac.mouthAngle))*0.35+0.02;
    var angles=[0,Math.PI/2,Math.PI,Math.PI*1.5]; // right,down,left,up
    var baseAngle=angles[pac.dir];

    // pac glow
    var pg=X.createRadialGradient(px,py,ps*0.3,px,py,ps*2.5);
    pg.addColorStop(0,'rgba(255,255,0,0.15)');
    pg.addColorStop(1,'rgba(255,255,0,0)');
    X.fillStyle=pg;
    X.beginPath();X.arc(px,py,ps*2.5,0,Math.PI*2);X.fill();

    // pac body
    X.fillStyle='#ffdd00';
    X.beginPath();
    X.arc(px,py,ps,baseAngle+mouth,baseAngle+Math.PI*2-mouth);
    X.lineTo(px,py);
    X.fill();

    // eye
    var eyeAngle=baseAngle-0.5;
    var ex=px+Math.cos(eyeAngle)*ps*0.35;
    var ey=py+Math.sin(eyeAngle)*ps*0.35;
    X.fillStyle='#111';
    X.beginPath();X.arc(ex,ey,ps*0.12,0,Math.PI*2);X.fill();
  }
}

function drawGhostEyes(gx,gy,gs,dir){
  var edx=[0.12,0,-.12,0][dir];
  var edy=[0,0.12,0,-.12][dir];
  for(var e=-1;e<=1;e+=2){
    var ex=gx+e*gs*0.3;
    var ey=gy-gs*0.15;
    X.fillStyle='#fff';
    X.beginPath();X.ellipse(ex,ey,gs*0.18,gs*0.22,0,0,Math.PI*2);X.fill();
    X.fillStyle='#22c';
    X.beginPath();X.arc(ex+edx*gs,ey+edy*gs,gs*0.1,0,Math.PI*2);X.fill();
  }
}

function hexToRgba(hex,a){
  if(hex.startsWith('rgba'))return hex;
  var r=parseInt(hex.slice(1,3),16)||0;
  var g=parseInt(hex.slice(3,5),16)||0;
  var b=parseInt(hex.slice(5,7),16)||0;
  return'rgba('+r+','+g+','+b+','+a+')';
}

// --- OVERLAY ---
function showOverlay(title,sub){
  document.getElementById('overlay').querySelector('h1').textContent=title;
  document.getElementById('overlay').querySelector('.sub').textContent=sub||'';
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay(){
  document.getElementById('overlay').classList.remove('show');
}

// --- INPUT ---
document.addEventListener('keydown',function(e){
  if(!gameStarted||gameOver)return;
  switch(e.key){
    case'ArrowRight':pac.nextDir=0;e.preventDefault();break;
    case'ArrowDown':pac.nextDir=1;e.preventDefault();break;
    case'ArrowLeft':pac.nextDir=2;e.preventDefault();break;
    case'ArrowUp':pac.nextDir=3;e.preventDefault();break;
  }
});

// D-pad buttons
var dpadBtns=document.querySelectorAll('.dpad-btn');
for(var i=0;i<dpadBtns.length;i++){
  (function(btn){
    btn.addEventListener('touchstart',function(e){
      e.preventDefault();
      if(!gameStarted||gameOver)return;
      pac.nextDir=parseInt(btn.getAttribute('data-dir'));
    });
    btn.addEventListener('mousedown',function(e){
      if(!gameStarted||gameOver)return;
      pac.nextDir=parseInt(btn.getAttribute('data-dir'));
    });
  })(dpadBtns[i]);
}

// swipe controls
var touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',function(e){
  if(!gameStarted||gameOver)return;
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',function(e){
  if(!gameStarted||gameOver)return;
  var dx=e.changedTouches[0].clientX-touchStartX;
  var dy=e.changedTouches[0].clientY-touchStartY;
  var adx=Math.abs(dx),ady=Math.abs(dy);
  if(adx<15&&ady<15)return; // too small
  if(adx>ady){
    pac.nextDir=dx>0?0:2;
  }else{
    pac.nextDir=dy>0?1:3;
  }
});

// --- RESIZE ---
function resize(){
  var maxW=Math.min(window.innerWidth,500);
  TILE=Math.floor(maxW/COLS);
  C.width=COLS*TILE+Math.floor((maxW-COLS*TILE));
  C.height=ROWS*TILE+4;
}
resize();
window.addEventListener('resize',resize);

// --- START ---
document.getElementById('playBtn').addEventListener('click',function(){
  gameStarted=true;
  gameOver=false;
  score=0;lives=3;level=1;
  powerTimer=0;ghostCombo=0;
  buildMaze();
  resetPositions();
  initGhosts();
  updateHUD();
  hideOverlay();
});

buildMaze();
updateHUD();

// --- LOOP ---
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
