<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Harsh Grader</title>
<link rel="icon" href="https://emojicdn.elk.sh/🖊️">
<meta property="og:title" content="The Harsh Grader">
<meta property="og:description" content="Grade exam papers with your red pen — PASS or FAIL. Can you survive the marking pile?">
<meta property="og:url" content="https://sloppy.live/harsh-grader">
<meta property="og:image" content="https://sloppy.live/harsh-grader/og-image.png">

<style>
/* ═══════════════════════════════════════════════════════
   THE HARSH GRADER — CSS
   Exam-paper grading game with desk/paper aesthetic
   ═══════════════════════════════════════════════════════ */

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --desk: #5c4033;        /* Wooden desk brown */
  --desk-light: #7a5c4a;  /* Desk highlight */
  --paper: #fdf6e3;       /* Warm cream paper */
  --paper-line: #c8d8e8;  /* Blue ruled lines */
  --red-ink: #c0392b;     /* Classic red pen */
  --red-light: #e74c3c;   /* Brighter red for hover */
  --green-ink: #27ae60;   /* Green for pass stamps */
  --pencil: #444;         /* Student pencil text */
  --text: #2c2420;
  --dim: #8a7a6a;
}

html, body {
  height: 100%;
  font-family: 'Crimson Pro', serif;
  overflow: hidden;
  background: var(--desk);
}

/* Wooden desk texture via CSS gradients */
body {
  background:
    repeating-linear-gradient(
      90deg,
      rgba(0,0,0,.03) 0px,
      transparent 2px,
      transparent 18px,
      rgba(0,0,0,.03) 20px
    ),
    linear-gradient(180deg, #5c4033 0%, #4a3328 50%, #5c4033 100%);
}

/* ── Layout ──────────────────────────────────────── */

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  position: relative;
}

/* ── Top HUD ─────────────────────────────────────── */

#hud {
  position: absolute;
  top: 12px;
  left: 16px;
  right: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}

.hud-item {
  font-family: 'Special Elite', cursive;
  font-size: 15px;
  color: #d4c4a8;
  text-shadow: 1px 1px 2px rgba(0,0,0,.5);
}

.hud-item strong {
  color: #f0dfc0;
  font-size: 18px;
}

#timer { color: var(--red-light); }

#streak-display {
  font-size: 13px;
  color: var(--green-ink);
  opacity: 0;
  transition: opacity .3s;
}
#streak-display.show { opacity: 1; }

/* ── Exam Paper ──────────────────────────────────── */

#paper-container {
  position: relative;
  width: 100%;
  max-width: 480px;
}

#paper {
  background: var(--paper);
  border-radius: 4px;
  padding: 32px 36px 28px;
  box-shadow:
    4px 4px 15px rgba(0,0,0,.35),
    -1px -1px 3px rgba(255,255,255,.1);
  position: relative;
  min-height: 420px;
  transform: rotate(-0.5deg);
  transition: transform .3s ease;
  /* Ruled lines */
  background-image:
    linear-gradient(var(--paper-line) 1px, transparent 1px);
  background-size: 100% 28px;
  background-position: 0 60px;
}

#paper::before {
  /* Red margin line */
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 52px;
  width: 2px;
  background: rgba(192,57,43,.25);
}

/* Paper header: student name, subject, etc */
#paper-header {
  border-bottom: 2px solid #ddd;
  padding-bottom: 10px;
  margin-bottom: 18px;
}

#student-name {
  font-family: 'Caveat', cursive;
  font-size: 22px;
  color: var(--pencil);
}

#subject-line {
  font-family: 'Special Elite', cursive;
  font-size: 12px;
  color: var(--dim);
  margin-top: 4px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Question block */
.question-block {
  margin-bottom: 20px;
}

.q-label {
  font-family: 'Crimson Pro', serif;
  font-weight: 800;
  font-size: 13px;
  color: var(--text);
  margin-bottom: 4px;
}

.q-text {
  font-family: 'Crimson Pro', serif;
  font-size: 14px;
  color: #555;
  margin-bottom: 8px;
  line-height: 1.5;
}

.q-answer {
  font-family: 'Caveat', cursive;
  font-size: 20px;
  color: var(--pencil);
  padding-left: 12px;
  line-height: 1.4;
}

/* Tiny note at bottom of paper */
#paper-note {
  font-family: 'Special Elite', cursive;
  font-size: 10px;
  color: #bbb;
  text-align: right;
  margin-top: 16px;
}

/* ── Stamp Overlay (PASS / FAIL) ─────────────────── */

#stamp {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-12deg) scale(0);
  font-family: 'Archivo Black', 'Special Elite', cursive;
  font-size: 72px;
  font-weight: 900;
  letter-spacing: 6px;
  text-transform: uppercase;
  pointer-events: none;
  opacity: 0;
  z-index: 20;
  text-shadow: 2px 2px 4px rgba(0,0,0,.2);
  transition: none;
}

#stamp.fail {
  color: var(--red-ink);
  border: 6px solid var(--red-ink);
  padding: 8px 24px;
  border-radius: 8px;
}

#stamp.pass {
  color: var(--green-ink);
  border: 6px solid var(--green-ink);
  padding: 8px 24px;
  border-radius: 8px;
}

#stamp.show {
  animation: stampIn .35s ease-out forwards;
}

@keyframes stampIn {
  0% { opacity: 0; transform: translate(-50%,-50%) rotate(-12deg) scale(2.5); }
  60% { opacity: .9; transform: translate(-50%,-50%) rotate(-12deg) scale(.95); }
  100% { opacity: .85; transform: translate(-50%,-50%) rotate(-12deg) scale(1); }
}

/* ── Grade Buttons ───────────────────────────────── */

#buttons {
  display: flex;
  gap: 20px;
  margin-top: 24px;
}

.grade-btn {
  font-family: 'Special Elite', cursive;
  font-size: 22px;
  letter-spacing: 3px;
  padding: 14px 40px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: transform .12s, box-shadow .15s;
  text-transform: uppercase;
  user-select: none;
}

.grade-btn:active { transform: scale(.92); }

#btn-fail {
  background: var(--red-ink);
  color: #fff;
  box-shadow: 0 4px 12px rgba(192,57,43,.4);
}
#btn-fail:hover {
  background: var(--red-light);
  box-shadow: 0 4px 16px rgba(231,76,60,.5);
}

#btn-pass {
  background: var(--green-ink);
  color: #fff;
  box-shadow: 0 4px 12px rgba(39,174,96,.4);
}
#btn-pass:hover {
  background: #2ecc71;
  box-shadow: 0 4px 16px rgba(46,204,113,.5);
}

/* ── Red Pen Marks (decorative scribbles) ────────── */

.red-mark {
  position: absolute;
  color: var(--red-ink);
  font-family: 'Caveat', cursive;
  font-size: 16px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s;
}

/* ── Start / Game Over Screens ───────────────────── */

#start-screen, #end-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(44,30,20,.88);
  z-index: 50;
  transition: opacity .4s;
}

#start-screen.hide, #end-screen.hide {
  opacity: 0;
  pointer-events: none;
}

#start-screen h1 {
  font-family: 'Special Elite', cursive;
  font-size: 42px;
  color: var(--red-light);
  text-shadow: 2px 2px 6px rgba(0,0,0,.5);
  margin-bottom: 8px;
}

#start-screen .subtitle {
  font-family: 'Caveat', cursive;
  font-size: 20px;
  color: #d4c4a8;
  margin-bottom: 28px;
}

#start-screen .instructions {
  font-family: 'Crimson Pro', serif;
  font-size: 14px;
  color: #a89880;
  max-width: 340px;
  text-align: center;
  line-height: 1.7;
  margin-bottom: 24px;
}

.start-btn {
  font-family: 'Special Elite', cursive;
  font-size: 20px;
  padding: 14px 44px;
  background: var(--red-ink);
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  letter-spacing: 2px;
  box-shadow: 0 4px 15px rgba(192,57,43,.4);
  transition: transform .1s;
}
.start-btn:hover { background: var(--red-light); }
.start-btn:active { transform: scale(.94); }

/* End screen */
#end-screen h2 {
  font-family: 'Special Elite', cursive;
  font-size: 36px;
  color: var(--red-light);
  margin-bottom: 12px;
}

#end-stats {
  font-family: 'Crimson Pro', serif;
  font-size: 16px;
  color: #d4c4a8;
  text-align: center;
  line-height: 2;
  margin-bottom: 24px;
}

#end-stats strong { color: #f0dfc0; font-size: 20px; }

#end-rank {
  font-family: 'Caveat', cursive;
  font-size: 28px;
  margin-bottom: 20px;
}

/* ── Mobile ──────────────────────────────────────── */

@media (max-width: 520px) {
  #paper { padding: 24px 20px 20px; min-height: 350px; }
  #paper::before { left: 32px; }
  .q-answer { font-size: 18px; }
  #student-name { font-size: 19px; }
  .grade-btn { font-size: 18px; padding: 12px 28px; }
  #start-screen h1 { font-size: 30px; }
  #stamp { font-size: 52px; }
  #hud { top: 6px; }
  .hud-item { font-size: 13px; }
}
</style>
</head>
<body>

<div id="app">
  <!-- HUD: score, timer, papers left -->
  <div id="hud">
    <div class="hud-item">Score: <strong id="score-val">0</strong></div>
    <div id="streak-display">Streak x<span id="streak-val">0</span></div>
    <div class="hud-item" id="timer">⏱ <strong id="timer-val">60</strong>s</div>
    <div class="hud-item">Papers: <strong id="papers-val">0</strong></div>
  </div>

  <!-- The exam paper -->
  <div id="paper-container">
    <div id="paper">
      <div id="paper-header">
        <div id="student-name"></div>
        <div id="subject-line"></div>
      </div>
      <div id="questions"></div>
      <div id="paper-note">Page 1 of 1</div>
    </div>
    <div id="stamp"></div>
  </div>

  <!-- PASS / FAIL buttons -->
  <div id="buttons">
    <button class="grade-btn" id="btn-fail">✗ Fail</button>
    <button class="grade-btn" id="btn-pass">✓ Pass</button>
  </div>
</div>

<!-- Start screen -->
<div id="start-screen">
  <h1>The Harsh Grader</h1>
  <div class="subtitle">~ Professor of Disappointment ~</div>
  <div class="instructions">
    Exam papers are piling up. Read each student's answers and decide:
    <strong>PASS</strong> or <strong>FAIL</strong>.<br><br>
    Grade correctly to earn points. Wrong calls lose points.
    Speed matters — the clock is ticking!
  </div>
  <button class="start-btn" onclick="startGame()">Start Grading</button>
</div>

<!-- End screen -->
<div id="end-screen" class="hide">
  <h2>Marking Complete!</h2>
  <div id="end-stats"></div>
  <div id="end-rank"></div>
  <button class="start-btn" onclick="startGame()">Grade Again</button>
</div>
<script>
/* ═══════════════════════════════════════════════════════
   THE HARSH GRADER — Game Logic

   Players grade exam papers by reading student answers
   and deciding PASS or FAIL. Each paper has 2-3 questions
   with pre-written answers. The "correct" grade depends
   on whether the answer quality crosses a threshold.

   Scoring: +10 correct, -5 wrong, streak bonus.
   60-second time limit.
   ═══════════════════════════════════════════════════════ */

/* ─────────────────────────────────────────────────────
   1. EXAM PAPER DATA
   Each entry is one exam paper with a subject, student
   name, questions, answers, and whether it should pass.
   ───────────────────────────────────────────────────── */

const FIRST_NAMES = [
  'Timmy', 'Jessica', 'Brad', 'Chloe', 'Derek', 'Luna',
  'Kevin', 'Samantha', 'Tyler', 'Olivia', 'Chad', 'Emma',
  'Hunter', 'Britney', 'Aiden', 'Zoe', 'Mason', 'Riley',
  'Jayden', 'Kayla', 'Bryce', 'Destiny', 'Kyle', 'Amber',
];

const LAST_NAMES = [
  'Johnson', 'Smith', 'Williams', 'McLovin', 'Thompson',

];

];

/**

const QUESTION_BANK = [

  {

/**
 * Generate a random exam paper with 2-3 questions.
 * Returns { studentName, subject, questions[], shouldPass }
 * A paper passes only if ALL answers are correct.
 */
function generatePaper() {
  const firstName = FIRST_NAMES[Math.floor(Math.random() * FIRST_NAMES.length)];
  const lastName = LAST_NAMES[Math.floor(Math.random() * LAST_NAMES.length)];
  const subject = SUBJECTS[Math.floor(Math.random() * SUBJECTS.length)];

  // Pick 2-3 random questions (no repeats)
  const numQ = Math.random() < 0.4 ? 2 : 3;
  const shuffled = [...QUESTION_BANK].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, numQ);

  let allPass = true;
  const questions = selected.map((qb, i) => {
    const ans = qb.answers[Math.floor(Math.random() * qb.answers.length)];
    if (!ans.pass) allPass = false;
    return {
      number: i + 1,
      question: qb.q,
      answer: ans.text,
      isCorrect: ans.pass,
    };
  });

  return {
    studentName: `${firstName} ${lastName}`,
    subject,
    questions,
    shouldPass: allPass,  // Pass only if every answer is correct
  };
}

/* ─────────────────────────────────────────────────────
   2. GAME STATE
   ───────────────────────────────────────────────────── */

let score = 0;
let papersGraded = 0;
let correctGrades = 0;
let streak = 0;
let bestStreak = 0;
let timeLeft = 60;
let timerInterval = null;
let currentPaper = null;
let gameActive = false;

/* ─────────────────────────────────────────────────────
   3. UI REFERENCES
   ───────────────────────────────────────────────────── */

const scoreEl = document.getElementById('score-val');
const timerEl = document.getElementById('timer-val');
const papersEl = document.getElementById('papers-val');
const streakEl = document.getElementById('streak-val');
const streakDisplay = document.getElementById('streak-display');
const studentNameEl = document.getElementById('student-name');
const subjectEl = document.getElementById('subject-line');
const questionsEl = document.getElementById('questions');
const stampEl = document.getElementById('stamp');
const paperEl = document.getElementById('paper');
const startScreen = document.getElementById('start-screen');
const endScreen = document.getElementById('end-screen');
const endStats = document.getElementById('end-stats');
const endRank = document.getElementById('end-rank');

/* ─────────────────────────────────────────────────────
   4. GAME FLOW
   ───────────────────────────────────────────────────── */

/** Start a new game — reset state, start timer, show first paper. */
function startGame() {
  score = 0;
  papersGraded = 0;
  correctGrades = 0;
  streak = 0;
  bestStreak = 0;
  timeLeft = 60;
  gameActive = true;

  updateHUD();
  startScreen.classList.add('hide');
  endScreen.classList.add('hide');
  showNextPaper();

  // Start the countdown timer
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;

    // Flash red when low on time
    if (timeLeft <= 10) {
      document.getElementById('timer').style.color = '#c0392b';
      timerEl.style.fontWeight = '900';
    }

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

/** End the game — show results and rank. */
function endGame() {
  gameActive = false;
  clearInterval(timerInterval);

  const accuracy = papersGraded > 0 ? Math.round((correctGrades / papersGraded) * 100) : 0;

  endStats.innerHTML = `
    Papers Graded: <strong>${papersGraded}</strong><br>
    Correct Grades: <strong>${correctGrades}</strong> / ${papersGraded}<br>
    Accuracy: <strong>${accuracy}%</strong><br>
    Best Streak: <strong>${bestStreak}</strong><br>
    Final Score: <strong>${score}</strong>
  `;

  // Assign a rank based on score
  let rank, rankColor;
  if (score >= 300) { rank = 'Legendary Professor'; rankColor = '#f5c518'; }
  else if (score >= 200) { rank = 'Tenured Faculty'; rankColor = '#27ae60'; }
  else if (score >= 120) { rank = 'Associate Professor'; rankColor = '#3498db'; }
  else if (score >= 60) { rank = 'Teaching Assistant'; rankColor = '#e67e22'; }
  else if (score >= 20) { rank = 'Substitute Teacher'; rankColor = '#95a5a6'; }
  else { rank = 'Expelled From Faculty'; rankColor = '#c0392b'; }

  endRank.textContent = rank;
  endRank.style.color = rankColor;

  endScreen.classList.remove('hide');
}

/** Load the next random paper onto the desk. */
function showNextPaper() {
  currentPaper = generatePaper();

  // Populate the paper UI
  studentNameEl.textContent = currentPaper.studentName;
  subjectEl.textContent = currentPaper.subject;

  questionsEl.innerHTML = '';
  currentPaper.questions.forEach(q => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.innerHTML = `
      <div class="q-label">Q${q.number}.</div>
      <div class="q-text">${q.question}</div>
      <div class="q-answer">${q.answer}</div>
    `;
    questionsEl.appendChild(block);
  });

  // Random slight paper rotation for realism
  paperEl.style.transform = `rotate(${(Math.random() - 0.5) * 2}deg)`;

  // Clear any previous stamp
  stampEl.className = '';
  stampEl.textContent = '';
}

/* ─────────────────────────────────────────────────────
   5. GRADING LOGIC
   ───────────────────────────────────────────────────── */

/**
 * Grade the current paper.
 * @param {boolean} playerSaysPass — true if player chose PASS
 */
function gradePaper(playerSaysPass) {
  if (!gameActive || !currentPaper) return;

  const correct = (playerSaysPass === currentPaper.shouldPass);
  papersGraded++;

  if (correct) {
    // Correct grade — earn points + streak bonus
    correctGrades++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    const streakBonus = Math.min(streak - 1, 5) * 2;  // Up to +10 bonus
    score += 10 + streakBonus;
  } else {
    // Wrong grade — lose points, break streak
    score -= 5;
    if (score < 0) score = 0;
    streak = 0;
  }

  // Show stamp animation
  showStamp(playerSaysPass, correct);
  updateHUD();

  // Brief delay, then show next paper
  setTimeout(() => {
    if (gameActive) showNextPaper();
  }, 600);
}

/** Display the PASS/FAIL stamp with visual feedback. */
function showStamp(pass, wasCorrect) {
  stampEl.textContent = pass ? 'PASS' : 'FAIL';
  stampEl.className = (pass ? 'pass' : 'fail') + ' show';

  // Flash paper green/red to indicate correct/wrong call
  paperEl.style.boxShadow = wasCorrect
    ? '0 0 30px rgba(39,174,96,.5)'
    : '0 0 30px rgba(192,57,43,.5)';

  setTimeout(() => {
    paperEl.style.boxShadow = '4px 4px 15px rgba(0,0,0,.35), -1px -1px 3px rgba(255,255,255,.1)';
  }, 400);
}

/** Update all HUD numbers. */
function updateHUD() {
  scoreEl.textContent = score;
  papersEl.textContent = papersGraded;
  streakEl.textContent = streak;
  streakDisplay.classList.toggle('show', streak >= 2);
}

/* ─────────────────────────────────────────────────────
   6. EVENT LISTENERS
   Buttons + keyboard shortcuts.
   ───────────────────────────────────────────────────── */

document.getElementById('btn-fail').addEventListener('click', () => gradePaper(false));
document.getElementById('btn-pass').addEventListener('click', () => gradePaper(true));

// Keyboard: left arrow or F = Fail, right arrow or P = Pass
window.addEventListener('keydown', e => {
  if (!gameActive) return;
  if (e.key === 'ArrowLeft' || e.key === 'f' || e.key === 'F') gradePaper(false);
  if (e.key === 'ArrowRight' || e.key === 'p' || e.key === 'P') gradePaper(true);
});

// Swipe support for mobile
let touchStartX = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!gameActive) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) {
    // Swipe right = pass, swipe left = fail
    gradePaper(dx > 0);
  }
}, { passive: true });
</script>
</body>
