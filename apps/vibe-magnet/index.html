<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vibe Magnet</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧲">
<meta property="og:title" content="Vibe Magnet">
<meta property="og:description" content="Your cursor is a magnet. Your mood controls its power. Pull joy, push anger, absorb everything.">
<meta property="og:url" content="https://sloppy.live/vibe-magnet">
<meta property="og:image" content="https://sloppy.live/vibe-magnet/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Lexend:wght@200;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08060e}
body{background:var(--bg);overflow:hidden;cursor:none;font-family:'Lexend',sans-serif}
canvas{display:block;width:100vw;height:100vh}

#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
  align-items:flex-start;padding:14px 18px;pointer-events:none;z-index:10}
#score-box{font-family:'Rubik Mono One',monospace;font-size:clamp(16px,3vw,28px);
  color:#fff;text-shadow:0 0 20px currentColor;transition:color .5s}
#score-label{font-family:'Lexend',sans-serif;font-weight:200;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);display:block}
#combo{font-size:clamp(10px,1.5vw,14px);color:rgba(255,255,255,0.5);margin-top:2px}

#vibe-display{text-align:right}
#vibe-name{font-family:'Rubik Mono One',monospace;font-size:clamp(12px,2vw,20px);
  text-transform:uppercase;letter-spacing:2px;transition:color .5s}
#vibe-hint{font-weight:200;font-size:10px;color:rgba(255,255,255,0.25);
  letter-spacing:2px;margin-top:2px}
#vibe-bar{width:clamp(100px,15vw,180px);height:4px;background:rgba(255,255,255,0.06);
  border-radius:2px;margin-top:6px;overflow:hidden;margin-left:auto}
#vibe-fill{height:100%;border-radius:2px;transition:width .3s,background .5s;width:100%}

#instructions{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  text-align:center;font-weight:200;font-size:11px;color:rgba(255,255,255,0.2);
  letter-spacing:1px;pointer-events:none;z-index:10;transition:opacity 1s}

#start-screen{position:fixed;inset:0;background:var(--bg);display:flex;
  flex-direction:column;align-items:center;justify-content:center;z-index:100;
  cursor:pointer}
#start-screen h1{font-family:'Rubik Mono One',monospace;font-size:clamp(28px,6vw,60px);
  color:#fff;letter-spacing:4px;margin-bottom:8px}
#start-screen .sub{font-weight:200;font-size:clamp(12px,2vw,16px);
  color:rgba(255,255,255,0.3);letter-spacing:3px;margin-bottom:30px}
#start-screen .controls{display:flex;flex-direction:column;gap:6px;
  margin-bottom:28px;font-weight:200;font-size:clamp(10px,1.5vw,13px);
  color:rgba(255,255,255,0.18);letter-spacing:2px}
#start-screen .controls .row{display:flex;align-items:center;gap:8px;justify-content:center}
#start-screen .controls kbd{display:inline-block;padding:2px 7px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:3px;font-family:'Rubik Mono One',monospace;font-size:10px;
  color:rgba(255,255,255,0.3);min-width:20px;text-align:center}
#start-screen .cta{font-family:'Rubik Mono One',monospace;font-size:14px;
  color:rgba(255,255,255,0.15);letter-spacing:4px;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}
</style>
</head>
<body>

<div id="start-screen" onclick="startGame()">
  <h1>VIBE MAGNET</h1>
  <div class="sub">your mood is your weapon</div>
  <div class="controls">
    <div class="row"><kbd>MOVE</kbd> attract &amp; repel objects</div>
    <div class="row"><kbd>CLICK</kbd> cycle to next vibe</div>
    <div class="row"><kbd>1</kbd> calm · <kbd>2</kbd> hyped · <kbd>3</kbd> angry · <kbd>4</kbd> dreamy · <kbd>5</kbd> chaotic</div>
    <div class="row">match your vibe color to score</div>
  </div>
  <div class="cta">CLICK TO PLAY</div>
</div>

<div id="hud" style="display:none">
  <div>
    <span id="score-label">SCORE</span>
    <div id="score-box">0</div>
    <div id="combo"></div>
  </div>
  <div id="vibe-display">
    <div id="vibe-name">CALM</div>
    <div id="vibe-hint">click or 1-5 to shift vibe</div>
    <div id="vibe-bar"><div id="vibe-fill"></div></div>
  </div>
</div>
<div id="instructions" style="display:none">MOVE to attract · CLICK or 1-5 to shift vibe · MATCH colors to score</div>

<canvas id="c"></canvas>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H;

function resize(){
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// === VIBES ===
const VIBES = [
  { name:'CALM',    color:'#40d8c0', glow:'#20a898', pull:1,   push:0,   speed:0.6, desc:'gentle pull',    bg:'#060e0c' },
  { name:'HYPED',   color:'#e8d040', glow:'#c8a020', pull:2.5, push:0,   speed:1.4, desc:'strong attract', bg:'#0e0c06' },
  { name:'ANGRY',   color:'#e04848', glow:'#a02020', pull:0,   push:2.8, speed:1.2, desc:'repel all',      bg:'#0e0606' },
  { name:'DREAMY',  color:'#b060e8', glow:'#7040a8', pull:0.8, push:0.3, speed:0.4, desc:'float & drift',  bg:'#0a060e' },
  { name:'CHAOTIC', color:'#e0e0e0', glow:'#808080', pull:1.5, push:1.5, speed:1.8, desc:'random forces',  bg:'#0a0a0a' },
];

let vibeIdx = 0;
let vibeEnergy = 100;
let vibeDecay = 0;

function vibe(){ return VIBES[vibeIdx]; }

// === STATE ===
let mx = W/2, my = H/2;
let score = 0;
let combo = 0;
let comboTimer = 0;
let running = false;
let objects = [];
let particles = [];
let cursorTrail = [];
let gameTime = 0;
let instructionTimer = 0;
let spawnTimer = 0;

// === OBJECTS ===
function spawnObject(){
  const vibeMatch = Math.random() < 0.4 ? vibeIdx : Math.floor(Math.random()*VIBES.length);
  const v = VIBES[vibeMatch];
  const edge = Math.floor(Math.random()*4);
  let x, y;
  if(edge===0){ x=Math.random()*W; y=-30; }
  else if(edge===1){ x=W+30; y=Math.random()*H; }
  else if(edge===2){ x=Math.random()*W; y=H+30; }
  else { x=-30; y=Math.random()*H; }

  const size = 8 + Math.random()*18;
  const shape = Math.random() < 0.3 ? 'square' : Math.random() < 0.6 ? 'circle' : 'diamond';

  objects.push({
    x, y, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
    size, shape, vibeIdx: vibeMatch, color: v.color, glow: v.glow,
    alpha: 1, life: 1, absorbed: false, pushed: false,
    rotation: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.03,
    pulse: Math.random()*Math.PI*2,
  });
}

function absorbEffect(obj){
  const n = 8 + Math.floor(obj.size/2);
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const spd = 1 + Math.random()*3;
    particles.push({
      x:obj.x, y:obj.y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      size: 1.5+Math.random()*3, color:obj.color, alpha:1, decay:0.02+Math.random()*0.03,
    });
  }
}

function pushEffect(obj){
  const dx = obj.x - mx, dy = obj.y - my;
  const a = Math.atan2(dy, dx);
  for(let i=0;i<5;i++){
    const sa = a + (Math.random()-0.5)*0.8;
    particles.push({
      x:obj.x, y:obj.y, vx:Math.cos(sa)*2, vy:Math.sin(sa)*2,
      size:1+Math.random()*2, color:vibe().color, alpha:0.6, decay:0.03,
    });
  }
}

// === GAME LOGIC ===
function update(dt){
  gameTime += dt;
  instructionTimer += dt;
  if(instructionTimer > 8){
    document.getElementById('instructions').style.opacity = '0';
  }

  // Spawn
  spawnTimer += dt;
  const spawnRate = Math.max(0.3, 1.5 - gameTime*0.005);
  if(spawnTimer > spawnRate && objects.length < 50){
    spawnTimer = 0;
    spawnObject();
  }

  // Vibe energy decay
  vibeDecay += dt;
  if(vibeDecay > 0.1){
    vibeDecay = 0;
    vibeEnergy = Math.max(0, vibeEnergy - 0.3);
  }

  // Combo decay
  if(combo > 0){
    comboTimer += dt;
    if(comboTimer > 2){ combo = 0; comboTimer = 0; }
  }

  const v = vibe();

  // Update objects
  for(let i = objects.length-1; i>=0; i--){
    const o = objects[i];
    if(o.absorbed || o.pushed) {
      o.alpha -= 0.04;
      if(o.alpha <= 0){ objects.splice(i,1); continue; }
      if(o.absorbed){
        // Rush toward cursor
        const dx = mx-o.x, dy = my-o.y;
        o.x += dx*0.15;
        o.y += dy*0.15;
        o.size *= 0.95;
      }
      continue;
    }

    const dx = mx - o.x, dy = my - o.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const ndx = dx/dist, ndy = dy/dist;

    // Magnet force
    const range = 300;
    if(dist < range){
      const strength = (1 - dist/range);
      let fx = 0, fy = 0;

      if(v.name === 'CHAOTIC'){
        // Random flip
        const flip = Math.sin(gameTime*3 + i*7) > 0 ? 1 : -1;
        fx = ndx * strength * 2.5 * flip;
        fy = ndy * strength * 2.5 * flip;
      } else {
        fx = ndx * strength * v.pull * 1.5;
        fy = ndy * strength * v.pull * 1.5;
        // Push
        fx -= ndx * strength * v.push * 1.5;
        fy -= ndy * strength * v.push * 1.5;
      }

      o.vx += fx * dt * 60;
      o.vy += fy * dt * 60;
    }

    // Damping
    o.vx *= 0.98;
    o.vy *= 0.98;
    o.x += o.vx * v.speed * dt * 60;
    o.y += o.vy * v.speed * dt * 60;
    o.rotation += o.rotSpeed;
    o.pulse += dt * 2;

    // Check absorption (close to cursor + matching vibe + pulling)
    if(dist < o.size + 15 && v.pull > 0){
      if(o.vibeIdx === vibeIdx){
        // Match! Absorb for points
        o.absorbed = true;
        const pts = Math.ceil(10 * (1 + combo*0.5));
        score += pts;
        combo++;
        comboTimer = 0;
        vibeEnergy = Math.min(100, vibeEnergy + 8);
        absorbEffect(o);
      } else if(v.name !== 'CHAOTIC'){
        // Wrong vibe — penalty
        o.absorbed = true;
        score = Math.max(0, score - 5);
        combo = 0;
        vibeEnergy = Math.max(0, vibeEnergy - 15);
        // Red flash particles
        for(let j=0;j<6;j++){
          const a = Math.random()*Math.PI*2;
          particles.push({
            x:o.x,y:o.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,
            size:3,color:'#ff2020',alpha:1,decay:0.04,
          });
        }
      }
    }

    // Check pushed off screen
    if(v.push > 0 && (o.x < -80 || o.x > W+80 || o.y < -80 || o.y > H+80)){
      if(o.vibeIdx !== vibeIdx){
        // Pushed wrong-vibe away — bonus!
        score += 5;
        pushEffect(o);
      }
      objects.splice(i,1);
      continue;
    }

    // Wrap around (gentle, not instant)
    if(o.x < -60) o.x = W+30;
    if(o.x > W+60) o.x = -30;
    if(o.y < -60) o.y = H+30;
    if(o.y > H+60) o.y = -30;
  }

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.alpha -= p.decay;
    if(p.alpha <= 0) particles.splice(i,1);
  }

  // Cursor trail
  cursorTrail.push({ x:mx, y:my, alpha:1 });
  if(cursorTrail.length > 20) cursorTrail.shift();
  for(const t of cursorTrail) t.alpha -= 0.05;

  // Update HUD
  document.getElementById('score-box').textContent = score;
  document.getElementById('score-box').style.color = v.color;
  document.getElementById('vibe-name').textContent = v.name;
  document.getElementById('vibe-name').style.color = v.color;
  document.getElementById('vibe-fill').style.width = vibeEnergy+'%';
  document.getElementById('vibe-fill').style.background = v.color;
  const comboEl = document.getElementById('combo');
  comboEl.textContent = combo > 1 ? `${combo}× COMBO` : '';
  comboEl.style.color = v.color;
}

// === RENDERING ===
function draw(){
  const v = vibe();

  // Background with vibe tint
  ctx.fillStyle = v.bg;
  ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.012)';
  ctx.lineWidth = 1;
  const gridSize = 60;
  const offsetX = (gameTime*10*v.speed) % gridSize;
  const offsetY = (gameTime*8*v.speed) % gridSize;
  for(let x = -gridSize+offsetX; x < W+gridSize; x += gridSize){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for(let y = -gridSize+offsetY; y < H+gridSize; y += gridSize){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Force field visualization
  const fieldRange = 300;
  const grad = ctx.createRadialGradient(mx,my,0,mx,my,fieldRange);
  grad.addColorStop(0, v.color+'10');
  grad.addColorStop(0.4, v.color+'08');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(mx-fieldRange, my-fieldRange, fieldRange*2, fieldRange*2);

  // Force lines
  ctx.strokeStyle = v.color+'15';
  ctx.lineWidth = 0.5;
  const lineCount = 12;
  for(let i=0;i<lineCount;i++){
    const a = (i/lineCount)*Math.PI*2 + gameTime*0.5*(v.pull>v.push?1:-1);
    const inner = 20;
    const outer = 100 + Math.sin(gameTime*2+i)*30;
    ctx.beginPath();
    ctx.moveTo(mx+Math.cos(a)*inner, my+Math.sin(a)*inner);
    ctx.lineTo(mx+Math.cos(a)*outer, my+Math.sin(a)*outer);
    ctx.stroke();
  }

  // Cursor trail
  for(let i=0;i<cursorTrail.length;i++){
    const t = cursorTrail[i];
    if(t.alpha <= 0) continue;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 3+i*0.3, 0, Math.PI*2);
    ctx.fillStyle = v.color + Math.floor(t.alpha*30).toString(16).padStart(2,'0');
    ctx.fill();
  }

  // Objects
  for(const o of objects){
    ctx.save();
    ctx.translate(o.x, o.y);
    ctx.rotate(o.rotation);
    ctx.globalAlpha = o.alpha;

    const pulseSize = o.size + Math.sin(o.pulse)*2;

    // Glow
    ctx.shadowColor = o.glow;
    ctx.shadowBlur = 12 + Math.sin(o.pulse)*4;

    ctx.fillStyle = o.color;
    ctx.strokeStyle = o.color + '60';
    ctx.lineWidth = 1.5;

    if(o.shape === 'circle'){
      ctx.beginPath();
      ctx.arc(0, 0, pulseSize/2, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
    } else if(o.shape === 'square'){
      const hs = pulseSize/2;
      ctx.fillRect(-hs,-hs,pulseSize,pulseSize);
      ctx.strokeRect(-hs,-hs,pulseSize,pulseSize);
    } else { // diamond
      const hs = pulseSize/2;
      ctx.beginPath();
      ctx.moveTo(0,-hs); ctx.lineTo(hs,0); ctx.lineTo(0,hs); ctx.lineTo(-hs,0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    // Matching indicator — inner bright dot
    if(o.vibeIdx === vibeIdx && !o.absorbed){
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(0,0, 2 + Math.sin(o.pulse*2), 0, Math.PI*2);
      ctx.fill();
    }

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Particles
  for(const p of particles){
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Cursor magnet
  const cSize = 12;
  ctx.save();
  ctx.translate(mx, my);

  // Outer ring
  ctx.strokeStyle = v.color;
  ctx.lineWidth = 2;
  ctx.shadowColor = v.color;
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(0, 0, cSize, 0, Math.PI*2);
  ctx.stroke();

  // Inner ring — pulse
  const innerR = 4 + Math.sin(gameTime*4)*2;
  ctx.fillStyle = v.color;
  ctx.beginPath();
  ctx.arc(0, 0, innerR, 0, Math.PI*2);
  ctx.fill();

  // Pull/push arrows
  ctx.strokeStyle = v.color+'80';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 0;
  const arrowDist = cSize + 8 + Math.sin(gameTime*3)*3;
  const arrowDir = v.pull >= v.push ? -1 : 1; // -1 = inward, 1 = outward
  for(let i=0;i<4;i++){
    const a = (i/4)*Math.PI*2 + gameTime*0.8;
    const bx = Math.cos(a)*arrowDist;
    const by = Math.sin(a)*arrowDist;
    const tipLen = 4;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx + Math.cos(a)*tipLen*arrowDir, by + Math.sin(a)*tipLen*arrowDir);
    ctx.stroke();
  }

  ctx.restore();
}

// === INPUT ===
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mx = e.touches[0].clientX;
  my = e.touches[0].clientY;
}, {passive:false});
window.addEventListener('touchstart', e => {
  mx = e.touches[0].clientX;
  my = e.touches[0].clientY;
  if(running) shiftVibe();
});

window.addEventListener('click', () => {
  if(running) shiftVibe();
});

function shiftVibe(idx){
  if(idx !== undefined){ if(idx === vibeIdx) return; vibeIdx = idx; }
  else { vibeIdx = (vibeIdx + 1) % VIBES.length; }
  vibeEnergy = 100;
  // Burst particles on vibe shift
  const v = vibe();
  for(let i=0;i<16;i++){
    const a = (i/16)*Math.PI*2;
    particles.push({
      x:mx, y:my, vx:Math.cos(a)*4, vy:Math.sin(a)*4,
      size:2+Math.random()*3, color:v.color, alpha:1, decay:0.03,
    });
  }
  // Update hint
  document.getElementById('vibe-hint').textContent = v.desc;
}

window.addEventListener('keydown', e => {
  if(!running) return;
  const n = parseInt(e.key);
  if(n >= 1 && n <= VIBES.length) shiftVibe(n - 1);
});

// === GAME LOOP ===
let lastTime = 0;
function loop(ts){
  if(!running) return;
  const dt = Math.min(0.05, (ts - lastTime)/1000);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('instructions').style.display = 'block';
  running = true;
  // Pre-spawn some objects
  for(let i=0;i<12;i++){
    const o = {
      x: 80 + Math.random()*(W-160),
      y: 80 + Math.random()*(H-160),
      vx: (Math.random()-0.5)*0.5,
      vy: (Math.random()-0.5)*0.5,
      size: 8 + Math.random()*18,
      shape: ['circle','square','diamond'][Math.floor(Math.random()*3)],
      vibeIdx: Math.floor(Math.random()*VIBES.length),
      color: VIBES[Math.floor(Math.random()*VIBES.length)].color,
      glow: VIBES[Math.floor(Math.random()*VIBES.length)].glow,
      alpha:1, life:1, absorbed:false, pushed:false,
      rotation: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*0.03,
      pulse: Math.random()*Math.PI*2,
    };
    // Fix color to match vibeIdx
    o.color = VIBES[o.vibeIdx].color;
    o.glow = VIBES[o.vibeIdx].glow;
    objects.push(o);
  }
  document.getElementById('vibe-hint').textContent = vibe().desc;
  requestAnimationFrame(ts => { lastTime = ts; loop(ts); });
}
</script>
</body>
</html>
