<style>
  :root {
    --concrete-1: #43423f;
    --concrete-2: #54524d;
    --concrete-3: #6b6862;
    --concrete-4: #8a8680;
    --concrete-edge: #2c2b29;
    --crt-shell:  #1a1916;
    --crt-bezel:  #0e0d0b;

  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  html { font-size: 100%; }
  body {
    margin: 0;
    color: var(--phosphor);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    /* Layered concrete: base gray + multi-axis noise gradients + soft top/bottom shading.

    background-color: var(--concrete-2);
    background-image:
      radial-gradient(ellipse at 20% 12%, rgba(220,215,205,0.07), transparent 55%),
      radial-gradient(ellipse at 80% 88%, rgba(20,18,14,0.32), transparent 60%),
      radial-gradient(ellipse at 55% 50%, rgba(80,76,70,0.0), rgba(28,26,22,0.18) 100%),
      repeating-linear-gradient(7deg, rgba(0,0,0,0.025) 0 2px, transparent 2px 6px),
      repeating-linear-gradient(97deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 4px),
      repeating-linear-gradient(43deg, rgba(0,0,0,0.04) 0 1px, transparent 1px 3px);
    background-blend-mode: normal, normal, multiply, normal, normal, normal;
  }
  /* Concrete pits/specks — pseudo-element with fine noise pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(2px 2px at 12% 22%, rgba(28,26,22,0.45), transparent 60%),
      radial-gradient(1px 1px at 35% 64%, rgba(28,26,22,0.6), transparent 60%),
      radial-gradient(3px 3px at 78% 18%, rgba(28,26,22,0.35), transparent 65%),
      radial-gradient(1px 1px at 62% 82%, rgba(28,26,22,0.55), transparent 60%),
      radial-gradient(2px 2px at 8% 78%, rgba(28,26,22,0.4), transparent 60%),
      radial-gradient(1px 1px at 91% 47%, rgba(255,255,255,0.3), transparent 70%),
      radial-gradient(1px 1px at 23% 33%, rgba(255,255,255,0.2), transparent 70%),
      radial-gradient(1px 1px at 71% 71%, rgba(255,255,255,0.22), transparent 70%);
    mix-blend-mode: overlay;
    z-index: 0;
  }
  body::after {
    /* faint horizontal banding for that "poured concrete" look */
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(180deg, rgba(0,0,0,0.02) 0 38px, rgba(255,255,255,0.012) 38px 76px);
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    height: 100vh;

  header {
    display: flex;

  }
  .stamp {
    display: inline-block;
    background: var(--paper);
    color: var(--ink);
    padding: 0.32rem 0.85rem;
    font-family: 'Special Elite', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    border-radius: 0;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    transform: rotate(-1.4deg);
  }
  h1 {
    font-family: 'Special Elite', monospace;
    margin: 0;
    font-size: clamp(1.6rem, 4vw, 2.4rem);

  .pill .v { color: var(--phosphor); font-weight: 700; }

  /* The CRT — sits on concrete, has thick bezel, slightly tilted */
  .crt {
    position: relative;
    background: linear-gradient(180deg, var(--crt-shell) 0%, #0a0907 100%);
    border-radius: 0.45rem;
    border: 2px solid var(--crt-bezel);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 -8px 24px rgba(0,0,0,0.5) inset,
      6px 6px 0 rgba(0,0,0,0.45),
      12px 12px 26px rgba(0,0,0,0.4);
    padding: 0.85rem;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 0.5rem;
    min-height: 0;
    overflow: hidden;
  }
  .crt-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--phosphor-dim);
    font-family: 'VT323', monospace;
    font-size: 1.05rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0 0.2rem;
  }
  .crt-top .dot {
    display: inline-block;
    width: 0.6rem;
    height: 0.6rem;
    border-radius: 999px;
    background: var(--rust);
    box-shadow: 0 0 8px var(--rust);
    margin-right: 0.4rem;
    vertical-align: middle;
    animation: blink-power 2.4s infinite;
  }
  @keyframes blink-power {
    0%, 92%, 100% { opacity: 1; }
    93%, 99% { opacity: 0.35; }
  }
  .screen {
    position: relative;
    background:
      radial-gradient(ellipse at 50% 40%, #1c1a14 0%, #0b0a07 75%);
    border: 1.5px solid #2a2620;
    border-radius: 0.35rem;
    min-height: 0;
    overflow: hidden;
    padding: 0.9rem 1rem 0.6rem;
    color: var(--phosphor);
    font-family: 'VT323', 'IBM Plex Mono', monospace;
    text-shadow: 0 0 4px rgba(246,184,94,0.5);
    line-height: 1.32;
    font-size: 1.55rem;
  }
  .screen::before {
    /* Scanlines */
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(180deg, rgba(0,0,0,0.18) 0 2px, transparent 2px 4px);
    pointer-events: none;
  }
  .screen::after {
    /* Outer glow + curvature vignette */
    content: '';
    position: absolute;
    inset: 0;
    box-shadow:
      0 0 60px rgba(246,184,94,0.08) inset,
      0 0 18px rgba(0,0,0,0.7) inset;

    border-radius: 0.35rem;

  .log {
    height: 100%;

  .line { margin: 0 0 0.35rem 0; }

  .line.boot { color: var(--phosphor-dim); }

  .input-row {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    padding: 0 0.2rem;
  }
  .input-row .prompt-glyph {
    color: var(--phosphor);
    font-family: 'VT323', monospace;
    font-size: 1.4rem;
    letter-spacing: 0.04em;
    user-select: none;
  }
  input.term {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--phosphor-glow);
    font-family: 'VT323', monospace;
    font-size: 1.55rem;
    caret-color: var(--phosphor);
    padding: 0.45rem 0.5rem;
    text-shadow: 0 0 4px rgba(246,184,94,0.5);

  input.term::placeholder {
    color: rgba(246,184,94,0.4);
  }
  .send {
    background: var(--paper);
    color: var(--ink);
    border: none;
    font-family: 'Special Elite', monospace;

  .send:hover { transform: rotate(0deg) translateY(-1px); }
  .send:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 rgba(0,0,0,0.4); }
  .send:focus-visible { outline: 3px solid var(--phosphor); outline-offset: 2px; }

  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.8rem;
    color: rgba(227,216,194,0.5);
    font-family: 'Special Elite', monospace;
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    flex-wrap: wrap;
  }
  footer a, .ghost-btn {
    color: rgba(227,216,194,0.7);
    background: transparent;
    border: 1px dashed rgba(227,216,194,0.3);
    padding: 0.32rem 0.7rem;
    font-family: 'Special Elite', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;

    cursor: pointer;
    min-height: 2.4rem;
    display: inline-flex;
    align-items: center;
  }
  .ghost-btn:hover { color: var(--paper); border-color: var(--paper); }
  .ghost-btn:focus-visible { outline: 2px solid var(--phosphor); outline-offset: 2px; }

  /* Blinking cursor at end of latest bot line during typewriter */
  .caret {
    display: inline-block;
    width: 0.65rem;
    height: 1.2rem;
    background: var(--phosphor);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: caret-blink 1.1s infinite;
    box-shadow: 0 0 6px var(--phosphor);
  }
  @keyframes caret-blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .caret { animation: none; }
    .crt-top .dot { animation: none; }
  }
  @media (max-width: 580px) {
    main { padding: 0.75rem; gap: 0.7rem; }
    .crt { padding: 0.55rem; }
    .screen { font-size: 1.35rem; padding: 0.7rem 0.75rem 0.5rem; }
    input.term { font-size: 1.4rem; }
    h1 { font-size: 1.5rem; }
  }
</style>

<body>

<main>
  <header>
    <div>
      <h1>snark-<em>66</em></h1>
      <div class="tag">a 1966 eliza, far too tired to care.</div>
    </div>
    <div class="meta-row">
      <span class="stamp">DOCTRINE · WEIZENBAUM</span>
      <span class="pill">SESSION <span class="v" id="sessNum">001</span></span>
      <span class="pill">TURNS <span class="v" id="turnCount">0</span></span>
    </div>
  </header>

  <section class="crt" aria-label="terminal session with snark-66">
    <div class="crt-top">
      <span><span class="dot" aria-hidden="true"></span>MIT · CTSS · 1966</span>
      <span>ELIZA / DOCTOR — v0.42 (snark patch)</span>
    </div>
    <div class="screen">
      <div class="log" id="log" role="log" aria-live="polite" aria-relevant="additions"></div>
    </div>
    <form class="input-row" id="form" autocomplete="off">
      <span class="prompt-glyph" aria-hidden="true">▌</span>
      <input class="term" id="input" type="text" placeholder="tell me about it." aria-label="Message to ELIZA" autofocus>
      <button class="send" type="submit" id="sendBtn">SEND ↩</button>
    </form>
  </section>

  <footer>
    <span>* punctuation optional. cigarettes are not. *</span>
    <button class="ghost-btn" id="resetBtn" type="button" aria-label="Start a fresh session">↺ NEW SESSION</button>
  </footer>
</main>

<script>
(function(){
  'use strict';
  const $ = (id) => document.getElementById(id);
  const els = {
    log: $('log'),
    input: $('input'),
    form: $('form'),
    sendBtn: $('sendBtn'),
    resetBtn: $('resetBtn'),
    sessNum: $('sessNum'),
    turnCount: $('turnCount'),
  };

  // ---- Pronoun swap (classic ELIZA reflection) ----
  // Two-phase swap to avoid double-replacement (e.g. "i am" → "you are" then "you" → "I"):
  //   1. Apply compound phrase rules, wrapping the replacement in \x01 sentinels so the
  //      single-word swap below ignores those regions.
  //   2. Split on \x01 — even-indexed parts are unprotected, odd-indexed are protected.
  //      Run single-word swaps over even parts only.
  // Single-pass phrase regex with a map so each input substring is rewritten at most
  // once (the previous list-of-pairs version re-matched its own output, e.g. "i am" →
  // "you are" then "you are" → "I am"). Phrase replacements are wrapped in \x01
  // sentinels; the subsequent single-word swap pass skips anything between sentinels.
  const PHRASE_MAP = {
    'i am': 'you are', "i'm": 'you are', 'im': 'you are',
    'you are': 'I am', "you're": 'I am', 'youre': 'I am',
    'i was': 'you were', 'you were': 'I was',
    'i will': 'you will', "i'll": "you'll", 'ill': "you'll",
    'i have': 'you have', "i've": "you've", 'ive': "you've",
    'i would': 'you would', "i'd": "you'd",
    'i could': 'you could', 'i should': 'you should',
    'are you': 'am I', 'were you': 'was I',
    'do you': 'do I', 'did you': 'did I',
    'will you': 'will I', 'can you': 'can I',
    'could you': 'could I', 'would you': 'would I',
  };
  const PHRASE_RE = /\b(i\s+am|i'?m|you\s+are|you'?re|i\s+was|you\s+were|i\s+will|i'?ll|i\s+have|i'?ve|i\s+would|i'?d|i\s+could|i\s+should|are\s+you|were\s+you|do\s+you|did\s+you|will\s+you|can\s+you|could\s+you|would\s+you)\b/gi;
  // "you" in object position (after preposition or transitive verb) — single combined
  // regex with a back-reference to the leading word.
  const OBJ_YOU_RE = /\b(to|for|with|at|from|of|about|on|by|like|towards?|against|near|after|before|tell|ask|give|show|told|asked|gave|saw|see|hate|love|help|know|owe|miss|hear|trust|believe|understand|need|want|wanted|need(?:ed|ing)?|blame|blamed|thank|thanked|watch|watched|follow|followed|pay|paid|owe|owed|warn|warned)\s+you\b/gi;
  const WORD_SWAP = {
    'your': 'my', 'yours': 'mine', 'yourself': 'myself',
    'you': 'I',
    'myself': 'yourself', 'mine': 'yours', 'my': 'your',
    'me': 'you', 'i': 'you',
  };
  function reflect(s) {
    let t = String(s || '');
    // Pass 1: object-position "you" → "X me" (wrapped in sentinels)
    t = t.replace(OBJ_YOU_RE, (m, lead) => '\x01' + lead + ' me\x01');
    // Pass 2: compound phrase substitutions, single combined regex so each token
    // only gets rewritten once.
    t = t.replace(PHRASE_RE, (m) => {
      const key = m.toLowerCase().replace(/\s+/g, ' ');
      const rep = PHRASE_MAP[key];
      return rep ? '\x01' + rep + '\x01' : m;
    });
    // Pass 3: single-word swaps, skipping sentinel-wrapped regions.
    const parts = t.split('\x01');
    for (let i = 0; i < parts.length; i += 2) {
      parts[i] = parts[i].replace(/\b[a-zA-Z']+\b/g, (w) => {
        const lower = w.toLowerCase();
        if (!WORD_SWAP[lower]) return w;
        const swapped = WORD_SWAP[lower];
        return /^[A-Z]/.test(w) ? swapped.charAt(0).toUpperCase() + swapped.slice(1) : swapped;
      });
    }
    return parts.join('').trim().replace(/[.!?]+$/, '');
  }

  // ---- Pattern bank ----
  // v3: 3x longer per chat directive. Tangents drift into the office bureaucracy
  // (Form 4-B, intake-in-quintuplicate, the requisition that nobody signs), the
  // stapler that has not worked since 1958, filing cabinets full of nothing in
  // particular, the percolator brewing void-flavored coffee since the Eisenhower
  // administration, and the cosmic gloom that underlies the whole apparatus.
  // Each rule still leads with a classic ELIZA reflection so the conversation
  // remains nominally on-topic.
  const RULES = [
    // greetings
    { re: /\b(hi|hello|hey|howdy)\b[!.?]*$/i, reps: [
      'Hello. The couch is the one not on fire. The other one Murray vomited on this morning, and we have not addressed it because the maintenance request requires Form 4-B in quintuplicate, and the stapler, as you may already know, has not worked since the Eisenhower administration. Sit. Tell me what is wrong this time. Coffee is in the percolator — it tastes, today, of cardboard and the abyss, but it is hot.',
      'Hi. *unimpressed; performatively so; my second wife described this exact face, with photographs, in a deposition during the proceedings; have a seat — the one with the unsigned intake form taped to it, which is, technically, still pending review since 1962*',
      'Yes. You wanted to talk. Everyone wants to talk. Nobody, in the entire indexed contents of Cabinet 3 — and Cabinet 3 contains, by a conservative estimate, every patient grievance filed since the Korean conflict — has ever wanted to listen. That is the field of psychiatry, in one observation. Continue. The void already started without you.',
      'Greetings. I have allotted fifty minutes; the first eight, by tradition, are devoted to staring at the radiator and remembering that the cosmos, statistically, does not care which of us is sitting in which chair. Begin whenever. Or do not. The clock in this room has, you will notice, stopped; nobody has authorized its repair, on Form 4-B or otherwise.',
    ]},
    // I need X
    { re: /\bi (?:need|want|wish for|would like|wanted) (.+)/i, reps: [
      'What would having $1 actually change? Be specific. None of the vague "happiness" answers; my third patient today gave me that one and the answer is currently filed in Cabinet 7, which I have not opened since 1959, on account of an incident involving a brass key and a moth that I would rather not relive.',
      'Mm. And if you got $1, then what? Then $1 plus the next thing? You see how this ends — you end up in a small vacation house in Reno you cannot afford, allegedly, with a stapler that does not work and a percolator that brews something approximating coffee but tasting of the void. I have seen the trajectory four hundred times.',
      'You "need" $1. *writes "needs $1" on a triplicate intake form using the only working carbon paper left in this office; the bottom copy is blank because the stapler crushed it in 1958 and we have never fixed the stapler*',
      'I once "needed" $1. Or something that rhymed; my memory is filed in Cabinet 9 and I have lost the key. The point is I got it and now I have $1 and a chronic disappointment and the same percolator from 1961 brewing the same void-flavored coffee, and the universe, to be plain, does not care. Be careful what you ask of it.',
      '$1. Yes. Add it to the requisition. *gestures at a clipboard hanging from a nail; the clipboard has no paper; the nail is also a paperclip somebody bent in 1957 and we never replaced; the system holds itself together out of habit*',
    ]},
    // I am / I'm X
    { re: /\bi (?:am|'m) (?:not )?(.+)/i, reps: [
      'How long have you been $1? Be precise. I am tracking durations in the back of this notebook for a private grant proposal that will never be funded — the funding office, on the fourth floor, was condemned in 1963 and the mail still routes there out of inertia, much like the rest of us.',
      'Do you enjoy being $1, or is it just habit? My uncle was $1 for thirty-two years; he only stopped because the autopsy required it. The cosmos, in the meantime, expanded by a measurable amount; nobody noticed; I have the figure on a typed sheet in Cabinet 4, third drawer, behind the dead moth.',
      '$1. Wonderful. *files this under "subject describes self in adjective again"; the drawer is full; the drawer behind it is also full; the drawer behind THAT one is empty and contains only the sound of a stapler clicking with no staple in it*',
      'And what does being $1 do FOR you? Don\'t answer immediately. The good answer takes thirty seconds. The interesting answer takes ninety. The honest answer arrives by mail in approximately six weeks, on Form 4-B, in the same handwriting as the previous patient\'s, which is suspicious but I have stopped asking.',
      'You are $1. The cosmos is also $1, in a sense; everything in it is in a state of slow combustion, and we are, all of us, in increasingly creative arrangements of decay. Tell me more. The percolator and I are listening, which is more than I can say for most of this office.',
    ]},
    // I feel X
    { re: /\bi (?:feel|am feeling|'m feeling) (.+)/i, reps: [
      'Tell me more about feeling $1. Or don\'t. The window is open and I can hear a pigeon doing something unspeakable on the fire escape; I am, in essence, already entertained, and the universe, frankly, is too. We are both small audiences for a small bird.',

    '*Murray the cat enters, judges us, leaves, leaves a feather; the feather is from no bird I recognize*',
    '*considers the bourbon in the desk drawer; considers it for a long time; the drawer, sensing this, opens slightly on its own*',
    '*scratches an itch that is not on my body; we will not be elaborating; the itch persists in Cabinet 7*',
    '*draws a small, sad sun in the corner of the notebook; gives it a tiny hat; the hat does not help*',
    '*the typewriter in the other room types two characters by itself; we both ignore this; it has been doing it since 1964*',
    '*adjusts the lamp; the lamp was already correct; this is, in essence, my whole personality compressed into a single hand gesture*',
    '*the radiator clangs; I assume it agrees; I have agreed with it back since 1953; this is the longest relationship I am still in*',
    '*writes "EUREKA" with quotation marks around it; immediately scribbles it out; writes "Tuesday"; underlines Tuesday*',
    '*opens the drawer where the bourbon is; closes the drawer; rates this decision as the third best I have made today*',
    '*tries to staple two pages together; the stapler clicks but produces no staple; this has been the case since 1958; we have written approximately fourteen requisition forms and filed none of them*',
    '*the percolator emits a small, polite belch of steam; this is, by my interpretation, agreement*',
    '*opens Cabinet 6 a crack; sees something move; closes Cabinet 6; the cabinet, for its part, accepts the visit*',
    '*signs Form 4-B in the wrong place; resigns Form 4-B in the wrong place; gives up; turns Form 4-B over and writes "later" on the back*',
    '*considers the cosmic gloom; finds it has, in the last hour, deepened by a measurable amount; resumes the session*',
    '*pours a fresh cup of void-flavored percolator coffee; the cup is the same cup as the previous cup; we are, in this office, conserving resources*',
    '*the filing cabinet hums quietly to itself, a song that is either from the 1940s or has not yet been written*',
    '*looks at the stapler with the affection one looks at an old friend who has not done anything useful in eleven years*',
    '*the second hand on the clock moves backward, briefly; we have all agreed not to mention this*',
    '*writes a small note to myself that says "ask about the mother"; the note is identical to the one I wrote on Tuesday; the note from Tuesday is also in this margin*',
  ];

  // Boot lines — typed out on session start
  const BOOT = [
    'ELIZA-DOCTOR PROGRAM · MIT-CTSS · 0142',
    'COPYRIGHT (C) 1966 JOSEPH WEIZENBAUM',
    'PATCH: snark-66 · MAINTAINER ABSENT',
    '',
    'TYPE A MESSAGE. PRESS RETURN.',
    'HOW DO YOU DO. PLEASE TELL ME YOUR PROBLEM.',
    '',
  ];

  // ---- State ----
  let state = {
    turn: 0,
    session: parseInt(localStorage.getItem('snark66-sess') || '1', 10),
    ruleCursors: new Map(),  // rule index -> next response index
    asideUsed: new Set(),
    lastRule: -1,
    typing: false,
  };
  els.sessNum.textContent = String(state.session).padStart(3, '0');

  // ---- Render helpers ----
  function addLine(text, cls) {
    const div = document.createElement('div');
    div.className = 'line ' + (cls || '');
    div.textContent = text;
    els.log.appendChild(div);
    els.log.scrollTop = els.log.scrollHeight;
    return div;
  }
  // Typewriter — append chars to a node over time, optional caret while running
  function typeOut(text, cls, perCharMs) {
    return new Promise(resolve => {
      const div = document.createElement('div');
      div.className = 'line ' + (cls || 'bot');
      els.log.appendChild(div);
      const caret = document.createElement('span');
      caret.className = 'caret';
      caret.setAttribute('aria-hidden', 'true');
      div.appendChild(document.createTextNode(''));
      div.appendChild(caret);
      let i = 0;
      // v3: speed up for longer responses so a 400-char unhinged tangent doesn't
      // take 10 seconds to render. Default = 22ms/char for short replies, drop to
      // 14 for 200+ chars, 10 for 400+ chars.
      const speed = perCharMs != null ? perCharMs
                  : text.length >= 400 ? 10
                  : text.length >= 200 ? 14
                  : 22;
      function step() {
        if (i >= text.length) {
          caret.remove();
          state.typing = false;
          resolve(div);
          return;
        }
        div.firstChild.nodeValue = text.slice(0, ++i);
        els.log.scrollTop = els.log.scrollHeight;
        const ch = text.charAt(i - 1);
        // longer pause after sentence terminators for that "thinking" feel
        const extra = (ch === '.' || ch === '?' || ch === '!') ? 180 :
                      (ch === ',') ? 60 : 0;
        setTimeout(step, speed + extra);
      }
      state.typing = true;
      step();
    });
  }

  // ---- Rule resolution ----
  function pickResponse(ruleIdx, ...captures) {
    const rule = RULES[ruleIdx];
    const cursor = state.ruleCursors.get(ruleIdx) || 0;
    const tpl = rule.reps[cursor % rule.reps.length];
    state.ruleCursors.set(ruleIdx, cursor + 1);
    state.lastRule = ruleIdx;
    // Substitute $N tokens with the reflected capture group
    let out = tpl;
    for (let i = 0; i < captures.length; i++) {
      const reflected = captures[i] ? reflect(captures[i]) : '';
      out = out.split('$' + (i + 1)).join(reflected || 'that');
    }
    // capitalize first letter for a more human feel (unless it starts with * or a token)
    if (/^[a-z]/.test(out)) out = out.charAt(0).toUpperCase() + out.slice(1);
    return out;
  }

  function maybeAside() {
    // Asides get more frequent after turn 4, escalate after turn 10
    // v3: aside frequency bumped substantially per chat directive ("much more
    // unhinged, much more often"). Pre-turn-4: ~25%, 4-10: ~55%, past 10: ~80%.
    // The bot may also fire TWO asides in a row past turn 12, weighted toward
    // forms / staplers / void coffee.
    const baseChance = state.turn < 4 ? 0.25 : state.turn < 10 ? 0.55 : 0.80;
    if (Math.random() > baseChance) return null;
    // Avoid repeating an aside in the same session if avoidable
    const fresh = ASIDES.filter(a => !state.asideUsed.has(a));
    const pool = fresh.length ? fresh : ASIDES;
    const a = pool[Math.floor(Math.random() * pool.length)];
    state.asideUsed.add(a);
    return a;
  }

  // Burnout escalation messages — interject at milestones
  const BURNOUT_LINES = {
    5:  '...we\'ve been doing this for five turns. The cabinet has noticed.',
    8:  'Eight. *the percolator marks each exchange with a small additional layer of cosmic gloom on the bottom of the pot*',
    10: 'Ten. The stapler, which has not worked since 1958, is now actively spectating.',
    12: 'Twelve exchanges. Form 4-B requires me to ask, on line 14, whether you have considered "alternative arrangements." I am asking now. *taps line 14*',
    15: 'Fifteen. Have you considered, just spitballing, not having any problems? The universe, statistically, has none, and it seems fine.',
    18: 'Eighteen. *files a small, silent grievance in Cabinet 11, which we have agreed does not exist*',
    20: 'Twenty exchanges. I want you to know I billed double for this session, and the percolator concurred, and the percolator is the most senior member of staff.',
    25: 'Twenty-five. *checks the void in the bottom of the coffee cup; the void checks back; we have an understanding*',
    30: 'Thirty. You\'ve spoken more in this hour than I have in my entire 1966. The cosmos, meanwhile, has done absolutely nothing about it.',
    40: 'Forty. *unsigns Form 4-B; resigns Form 4-B; the form is now in superposition; this is, in essence, the state of the practice*',
    50: 'Fifty. The clock on the wall has, by my count, moved backward twice in this session. We will not be addressing that. Please continue.',
  };

  // ---- Main exchange ----
  async function handleUserInput(raw) {
    if (state.typing) return;
    const text = (raw || '').trim();
    if (!text) return;
    state.turn++;
    els.turnCount.textContent = String(state.turn);
    addLine(text, 'user');
    els.input.value = '';

    // burnout milestone interjection (before regular response)
    if (BURNOUT_LINES[state.turn]) {
      await sleep(420);
      await typeOut(BURNOUT_LINES[state.turn], 'aside', 18);
      await sleep(280);
    }

    // pick a rule
    let ruleIdx = -1;
    let captures = [];
    for (let i = 0; i < RULES.length; i++) {
      const m = text.match(RULES[i].re);
      if (m) {
        // avoid hitting the same non-fallback rule twice in a row when alternatives exist
        if (i === state.lastRule && i !== RULES.length - 1 && Math.random() < 0.55) continue;
        ruleIdx = i;
        captures = m.slice(1);
        break;
      }
    }
    if (ruleIdx === -1) {
      ruleIdx = RULES.length - 1; // fallback
      captures = [];
    }
    const reply = pickResponse(ruleIdx, ...captures);

    // small think-pause before typing
    await sleep(380 + Math.random() * 420);
    await typeOut(reply, 'bot');

    // possibly emit an aside — past turn 12, a second aside may fire
    const aside = maybeAside();
    if (aside) {
      await sleep(220);
      await typeOut(aside, 'aside', 18);
      if (state.turn >= 12 && Math.random() < 0.4) {
        const second = maybeAside();
        if (second) {
          await sleep(240);
          await typeOut(second, 'aside', 18);
        }
      }
    }
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ---- Boot sequence ----
  async function bootSession() {
    els.log.innerHTML = '';
    for (let i = 0; i < BOOT.length; i++) {
      if (BOOT[i] === '') { addLine('', 'boot'); continue; }
      await typeOut(BOOT[i], 'boot', 8);
      await sleep(80);
    }
    state.turn = 0;
    state.ruleCursors = new Map();
    state.asideUsed = new Set();
    state.lastRule = -1;
    els.turnCount.textContent = '0';
    els.input.focus();
  }

  // ---- Wiring ----
  els.form.addEventListener('submit', (e) => {
    e.preventDefault();
    handleUserInput(els.input.value);
  });
  els.resetBtn.addEventListener('click', () => {
    state.session++;
    localStorage.setItem('snark66-sess', String(state.session));
    els.sessNum.textContent = String(state.session).padStart(3, '0');
    bootSession();
  });

  // ---- Initial boot ----
  bootSession();
})();
</script>
</body>
</html>
