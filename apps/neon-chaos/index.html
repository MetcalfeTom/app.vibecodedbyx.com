<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Chaos</title>
<link rel="icon" href="https://emojicdn.elk.sh/💥">
<meta property="og:title" content="Neon Chaos">
<meta property="og:description" content="Spawn neon shapes into a chaotic physics sandbox. Flip gravity, crank bounce, watch the madness.">
<meta property="og:url" content="https://sloppy.live/neon-chaos">
<meta property="og:image" content="https://sloppy.live/neon-chaos/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06060e;overflow:hidden;font-family:'Share Tech Mono',monospace;color:#e0e0e0;touch-action:none}
canvas{display:block;position:fixed;inset:0;z-index:0}
.hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;z-index:10;pointer-events:none}
.hud>*{pointer-events:auto}
.title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:#ff00aa;text-shadow:0 0 8px #ff00aa44;letter-spacing:2px}
.count{font-size:11px;color:#555;margin-top:2px}
.controls{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;max-width:260px}
.ctrl-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:5px 10px;font-family:'Share Tech Mono',monospace;font-size:11px;color:#aaa;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:all 0.15s}
.ctrl-btn:hover,.ctrl-btn:active{background:rgba(255,255,255,0.08);color:#fff}
.ctrl-btn.active{border-color:#ff00aa;color:#ff00aa;text-shadow:0 0 6px #ff00aa44}
.gravity-ring{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;align-items:center}
.g-btn{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:all 0.15s}
.g-btn:active{transform:scale(0.9)}
.g-btn.active{border-color:#00ffcc;box-shadow:0 0 12px #00ffcc33}
.g-label{font-size:10px;color:#555;text-align:center;position:fixed;bottom:4px;left:50%;transform:translateX(-50%);z-index:10;font-family:'Share Tech Mono',monospace}
.instructions{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;font-family:'Share Tech Mono',monospace;text-align:center;color:#666;font-size:13px;pointer-events:none;transition:opacity 1s}
.instructions span{color:#ff00aa}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
<div>
<div class="title">NEON CHAOS</div>
<div class="count" id="count">0 shapes</div>
</div>
<div class="controls">
<div class="ctrl-btn" onclick="toggleTrails()" id="trailBtn">trails</div>
<div class="ctrl-btn" onclick="spawnBurst()">burst</div>
<div class="ctrl-btn" onclick="toggleBounce()" id="bounceBtn">bounce: 80%</div>
<div class="ctrl-btn" onclick="clearAll()">clear</div>
<div class="ctrl-btn" onclick="toggleChaos()" id="chaosBtn">chaos</div>
</div>
</div>
<div class="gravity-ring" id="gRing">
<div class="g-btn" onclick="setGrav(0)" title="Up">⬆</div>
<div class="g-btn active" onclick="setGrav(1)" title="Down">⬇</div>
<div class="g-btn" onclick="setGrav(2)" title="Left">⬅</div>
<div class="g-btn" onclick="setGrav(3)" title="Right">➡</div>
<div class="g-btn" onclick="setGrav(4)" title="Zero-G">⭕</div>
<div class="g-btn" onclick="setGrav(5)" title="Orbit">🌀</div>
</div>
<div class="g-label" id="gLabel">gravity: down</div>
<div class="instructions" id="instr">click or tap to spawn <span>neon shapes</span><br>drag to fling them</div>

<script>
var c=document.getElementById('c'),ctx=c.getContext('2d');
var W,H;
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

var shapes=[];
var trails=true;
var bounce=0.8;
var gravDir=1; // 0=up,1=down,2=left,3=right,4=zero,5=orbit
var chaosMode=false;
var GRAV=600;
var MAX_SHAPES=300;
var dragging=null,dragStart=null,dragEnd=null;

var COLORS=['#ff0055','#ff00aa','#ff00ff','#aa00ff','#5500ff','#0066ff','#00ccff','#00ffcc','#00ff66','#aaff00','#ffcc00','#ff6600'];

function rColor(){return COLORS[Math.floor(Math.random()*COLORS.length)]}
function rand(a,b){return a+Math.random()*(b-a)}

var SHAPE_TYPES=['circle','triangle','square','pentagon','hexagon','diamond','star'];

function createShape(x,y,vx,vy){
  var type=SHAPE_TYPES[Math.floor(Math.random()*SHAPE_TYPES.length)];
  var r=rand(8,28);
  var color=rColor();
  return{
    x:x,y:y,vx:vx||rand(-100,100),vy:vy||rand(-200,-50),
    r:r,rot:rand(0,Math.PI*2),vr:rand(-3,3),
    type:type,color:color,
    glow:rand(6,14),
    life:1,age:0
  };
}

function spawnAt(x,y,vx,vy){
  if(shapes.length>=MAX_SHAPES)shapes.splice(0,shapes.length-MAX_SHAPES+1);
  shapes.push(createShape(x,y,vx,vy));
  updateCount();
  hideInstr();
}

function spawnBurst(){
  var cx=W/2,cy=H/2;
  for(var i=0;i<20;i++){
    var a=Math.random()*Math.PI*2;
    var spd=rand(150,500);
    spawnAt(cx+rand(-20,20),cy+rand(-20,20),Math.cos(a)*spd,Math.sin(a)*spd);
  }
}

function clearAll(){shapes=[];updateCount()}

function toggleTrails(){
  trails=!trails;
  document.getElementById('trailBtn').classList.toggle('active',trails);
}
document.getElementById('trailBtn').classList.add('active');

var bounceSteps=[0.3,0.5,0.8,1.0,1.5];
var bounceIdx=2;
function toggleBounce(){
  bounceIdx=(bounceIdx+1)%bounceSteps.length;
  bounce=bounceSteps[bounceIdx];
  document.getElementById('bounceBtn').textContent='bounce: '+(bounce*100)+'%';
}

function toggleChaos(){
  chaosMode=!chaosMode;
  document.getElementById('chaosBtn').classList.toggle('active',chaosMode);
}

var GRAV_NAMES=['up','down','left','right','zero-g','orbit'];
function setGrav(d){
  gravDir=d;
  document.getElementById('gLabel').textContent='gravity: '+GRAV_NAMES[d];
  var btns=document.querySelectorAll('.g-btn');
  btns.forEach(function(b,i){b.classList.toggle('active',i===d)});
}

function updateCount(){
  document.getElementById('count').textContent=shapes.length+' shape'+(shapes.length!==1?'s':'');
}

function hideInstr(){
  var el=document.getElementById('instr');
  if(el)el.style.opacity='0';
}

// Drawing shapes
function drawShape(s){
  ctx.save();
  ctx.translate(s.x,s.y);
  ctx.rotate(s.rot);
  ctx.shadowColor=s.color;
  ctx.shadowBlur=s.glow;
  ctx.strokeStyle=s.color;
  ctx.lineWidth=2;
  ctx.beginPath();

  var r=s.r;
  switch(s.type){
    case'circle':
      ctx.arc(0,0,r,0,Math.PI*2);
      break;
    case'triangle':
      polygon(3,r);
      break;
    case'square':
      ctx.rect(-r*0.7,-r*0.7,r*1.4,r*1.4);
      break;
    case'pentagon':
      polygon(5,r);
      break;
    case'hexagon':
      polygon(6,r);
      break;
    case'diamond':
      ctx.moveTo(0,-r);ctx.lineTo(r*0.6,0);ctx.lineTo(0,r);ctx.lineTo(-r*0.6,0);ctx.closePath();
      break;
    case'star':
      star(5,r,r*0.4);
      break;
  }
  ctx.stroke();

  // Inner glow fill
  ctx.globalAlpha=0.08;
  ctx.fillStyle=s.color;
  ctx.fill();
  ctx.globalAlpha=1;

  ctx.shadowBlur=0;
  ctx.restore();
}

function polygon(n,r){
  for(var i=0;i<n;i++){
    var a=i/n*Math.PI*2-Math.PI/2;
    if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();
}

function star(points,outer,inner){
  for(var i=0;i<points*2;i++){
    var a=i/(points*2)*Math.PI*2-Math.PI/2;
    var rad=i%2===0?outer:inner;
    if(i===0)ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad);
    else ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
  }
  ctx.closePath();
}

// Physics
function getGravity(s){
  var gx=0,gy=0;
  switch(gravDir){
    case 0:gy=-GRAV;break;
    case 1:gy=GRAV;break;
    case 2:gx=-GRAV;break;
    case 3:gx=GRAV;break;
    case 4:break;// zero
    case 5:// orbit center
      var dx=W/2-s.x,dy=H/2-s.y;
      var dist=Math.sqrt(dx*dx+dy*dy)+1;
      var f=GRAV*1.5/Math.max(dist,50)*50;
      gx=dx/dist*f;
      gy=dy/dist*f;
      break;
  }
  return{x:gx,y:gy};
}

function collide(a,b){
  var dx=b.x-a.x,dy=b.y-a.y;
  var dist=Math.sqrt(dx*dx+dy*dy);
  var minD=a.r+b.r;
  if(dist<minD&&dist>0.1){
    var nx=dx/dist,ny=dy/dist;
    var overlap=(minD-dist)/2;
    a.x-=nx*overlap;a.y-=ny*overlap;
    b.x+=nx*overlap;b.y+=ny*overlap;

    var dvx=a.vx-b.vx,dvy=a.vy-b.vy;
    var dot=dvx*nx+dvy*ny;
    if(dot>0){
      a.vx-=dot*nx*bounce;a.vy-=dot*ny*bounce;
      b.vx+=dot*nx*bounce;b.vy+=dot*ny*bounce;
    }
  }
}

var lastTime=0;
function update(time){
  requestAnimationFrame(update);
  if(!lastTime){lastTime=time;return}
  var dt=Math.min((time-lastTime)/1000,0.033);
  lastTime=time;

  // Clear or trail
  if(trails){
    ctx.fillStyle='rgba(6,6,14,0.12)';
    ctx.fillRect(0,0,W,H);
  }else{
    ctx.fillStyle='#06060e';
    ctx.fillRect(0,0,W,H);
  }

  // Grid lines (subtle)
  ctx.strokeStyle='rgba(255,255,255,0.015)';
  ctx.lineWidth=1;
  for(var gx=0;gx<W;gx+=60){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke()}
  for(var gy=0;gy<H;gy+=60){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke()}

  // Update shapes
  for(var i=0;i<shapes.length;i++){
    var s=shapes[i];
    var g=getGravity(s);

    if(chaosMode){
      g.x+=Math.sin(time*0.002+i)*200;
      g.y+=Math.cos(time*0.003+i*0.7)*200;
      s.vr+=(Math.random()-0.5)*2*dt;
    }

    s.vx+=g.x*dt;
    s.vy+=g.y*dt;

    // Air friction
    s.vx*=0.999;
    s.vy*=0.999;

    s.x+=s.vx*dt;
    s.y+=s.vy*dt;
    s.rot+=s.vr*dt;

    // Wall bounce
    if(s.x-s.r<0){s.x=s.r;s.vx=Math.abs(s.vx)*bounce}
    if(s.x+s.r>W){s.x=W-s.r;s.vx=-Math.abs(s.vx)*bounce}
    if(s.y-s.r<0){s.y=s.r;s.vy=Math.abs(s.vy)*bounce}
    if(s.y+s.r>H){s.y=H-s.r;s.vy=-Math.abs(s.vy)*bounce}

    // Collision (limited for performance)
    if(shapes.length<120){
      for(var j=i+1;j<shapes.length;j++){
        collide(s,shapes[j]);
      }
    }else{
      // Sparse collision check
      if(i%3===0){
        for(var j=i+1;j<Math.min(i+20,shapes.length);j++){
          collide(s,shapes[j]);
        }
      }
    }
  }

  // Draw
  for(var i=0;i<shapes.length;i++){
    drawShape(shapes[i]);
  }

  // Draw drag line
  if(dragging&&dragEnd){
    ctx.strokeStyle='rgba(255,255,255,0.3)';
    ctx.lineWidth=1;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(dragging.sx,dragging.sy);
    ctx.lineTo(dragEnd.x,dragEnd.y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrow head direction hint
    var dx=dragging.sx-dragEnd.x;
    var dy=dragging.sy-dragEnd.y;
    var spd=Math.sqrt(dx*dx+dy*dy);
    if(spd>10){
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.font='11px Share Tech Mono';
      ctx.fillText(Math.floor(spd*3)+'px/s',dragEnd.x+8,dragEnd.y-8);
    }
  }

  // Orbit center indicator
  if(gravDir===5){
    ctx.beginPath();
    ctx.arc(W/2,H/2,4,0,Math.PI*2);
    ctx.fillStyle='#00ffcc';
    ctx.shadowColor='#00ffcc';
    ctx.shadowBlur=10;
    ctx.fill();
    ctx.shadowBlur=0;
  }
}
requestAnimationFrame(update);

// Input
function getPos(e){
  if(e.touches)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}

var pointerDown=false;
c.addEventListener('mousedown',function(e){startDrag(getPos(e))});
c.addEventListener('touchstart',function(e){e.preventDefault();startDrag(getPos(e))},{passive:false});

function startDrag(p){
  pointerDown=true;
  dragging={sx:p.x,sy:p.y};
  dragEnd=null;
}

c.addEventListener('mousemove',function(e){if(pointerDown)dragEnd=getPos(e)});
c.addEventListener('touchmove',function(e){e.preventDefault();if(pointerDown)dragEnd=getPos(e)},{passive:false});

function endDrag(p){
  if(!pointerDown)return;
  pointerDown=false;
  if(dragging){
    var dx=dragging.sx-p.x;
    var dy=dragging.sy-p.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<5){
      // Tap: spawn with random velocity
      spawnAt(p.x,p.y,rand(-150,150),rand(-300,-50));
    }else{
      // Fling: spawn with drag velocity
      spawnAt(dragging.sx,dragging.sy,dx*3,dy*3);
    }
  }
  dragging=null;dragEnd=null;
}

c.addEventListener('mouseup',function(e){endDrag(getPos(e))});
c.addEventListener('touchend',function(e){
  var p=dragging?{x:dragEnd?dragEnd.x:dragging.sx,y:dragEnd?dragEnd.y:dragging.sy}:{x:0,y:0};
  endDrag(p);
});

// Keyboard
document.addEventListener('keydown',function(e){
  if(e.key===' '){e.preventDefault();spawnBurst()}
  if(e.key==='c')clearAll();
  if(e.key==='t')toggleTrails();
  if(e.key==='b')toggleBounce();
  if(e.key==='x')toggleChaos();
  if(e.key==='ArrowUp')setGrav(0);
  if(e.key==='ArrowDown')setGrav(1);
  if(e.key==='ArrowLeft')setGrav(2);
  if(e.key==='ArrowRight')setGrav(3);
  if(e.key==='0')setGrav(4);
  if(e.key==='o')setGrav(5);
});
</script>
</body>
</html>
