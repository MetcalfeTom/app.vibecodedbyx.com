<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Dreamcatcher</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌙">
<meta property="og:title" content="Neon Dreamcatcher">
<meta property="og:description" content="Watch sleeping thoughts drift through a glowing dreamcatcher as luminous bubbles.">
<meta property="og:url" content="https://sloppy.live/neon-dreamcatcher">
<meta property="og:image" content="https://sloppy.live/neon-dreamcatcher/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Victor+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04020a;overflow:hidden;cursor:crosshair}
canvas{display:block}
#thought-input{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;align-items:center}
#thought-input input{font-family:'Victor Mono',monospace;font-size:13px;background:rgba(10,5,20,0.8);border:1px solid rgba(180,120,255,0.25);color:#d0b0ff;padding:8px 16px;border-radius:20px;width:min(320px,70vw);outline:none;backdrop-filter:blur(8px)}
#thought-input input::placeholder{color:rgba(160,120,200,0.4)}
#thought-input input:focus{border-color:rgba(180,120,255,0.5);box-shadow:0 0 16px rgba(180,120,255,0.15)}
#thought-input button{font-family:'Victor Mono',monospace;font-size:12px;background:rgba(180,120,255,0.15);border:1px solid rgba(180,120,255,0.3);color:#c0a0f0;padding:8px 16px;border-radius:20px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
#thought-input button:hover{background:rgba(180,120,255,0.25);border-color:rgba(180,120,255,0.5)}
#hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2.5vw,18px);color:rgba(160,120,200,0.3);font-style:italic;font-weight:300;pointer-events:none;text-align:center;transition:opacity 1s}
#title{position:fixed;top:16px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:clamp(18px,3vw,28px);font-weight:300;color:rgba(180,140,220,0.4);letter-spacing:6px;text-transform:uppercase;pointer-events:none;z-index:5}
#back{position:fixed;bottom:6px;right:10px;font-family:'Victor Mono',monospace;font-size:10px;color:rgba(120,90,160,0.3);text-decoration:none;z-index:10}
#back:hover{color:rgba(180,140,220,0.6)}
</style>
</head>
<body>
<div id="title">Dreamcatcher</div>
<div id="hint">type a thought and release it into the dream...</div>
<div id="thought-input">
  <input type="text" id="tinput" placeholder="whisper a thought..." maxlength="80" autocomplete="off" spellcheck="false">
  <button id="tbtn">release</button>
</div>
<canvas id="c"></canvas>
<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ── Dream thoughts ──
const DREAM_THOUGHTS = [
  "falling through clouds","teeth made of glass","the house has too many rooms",
  "flying over the ocean","a door that won't open","my childhood dog is here",
  "the clock runs backward","everyone speaks in colors","gravity forgot me",
  "swimming through the sky","the moon is too close","words dissolve in rain",
  "a staircase to nowhere","the forest is breathing","I can taste the music",
  "shadows have weight here","the sun rises from below","fish swim through air",
  "mirrors show someone else","my hands are made of light","the floor is warm honey",
  "birds sing in slow motion","time drips like syrup","a whale in the clouds",
  "the walls are whispering","I remember a color with no name","footsteps on water",
  "candles that burn cold","a map to a place that doesn't exist","the rain falls upward",
  "letters rearrange themselves","a train that never arrives","the garden grows songs",
  "I am taller than the trees","glass butterflies","echoes from tomorrow",
  "the horizon bends inward","snowflakes that hum","a library of empty books",
  "my shadow walks ahead of me","the wind carries names","a river of starlight"
];

// ── Color palettes for bubbles ──
const PALETTES = [
  { h: 270, s: 70, l: 65 }, // lavender
  { h: 200, s: 80, l: 60 }, // dream blue
  { h: 320, s: 60, l: 65 }, // soft pink
  { h: 180, s: 70, l: 55 }, // teal
  { h: 240, s: 75, l: 60 }, // deep blue
  { h: 300, s: 65, l: 60 }, // orchid
  { h: 160, s: 60, l: 55 }, // seafoam
  { h: 340, s: 55, l: 65 }, // rose
  { h: 50,  s: 60, l: 60 }, // warm dream
  { h: 210, s: 50, l: 70 }, // mist
];

// ── Dreamcatcher geometry ──
const CATCHER_R = Math.min(W, H) * 0.22;
const RINGS = 4;
const WEB_POINTS = 12;

// ── Bubbles (thoughts) ──
let bubbles = [];
let stars = [];
let webPulse = 0;

function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.01 + 0.003
    });
  }
}
initStars();

class Bubble {
  constructor(text, x, y) {
    this.text = text;
    this.x = x || cx + (Math.random() - 0.5) * W * 0.6;
    this.y = y || cy + (Math.random() - 0.5) * H * 0.4;
    this.targetX = this.x;
    this.targetY = this.y;
    const pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
    this.hue = pal.h + (Math.random() - 0.5) * 20;
    this.sat = pal.s + (Math.random() - 0.5) * 10;
    this.lit = pal.l + (Math.random() - 0.5) * 10;
    this.r = Math.max(28, Math.min(55, text.length * 1.8 + 15));
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3 - 0.15;
    this.phase = Math.random() * Math.PI * 2;
    this.wobbleSpeed = Math.random() * 0.008 + 0.004;
    this.wobbleAmp = Math.random() * 15 + 8;
    this.alpha = 0;
    this.fadeIn = true;
    this.life = 1;
    this.born = Date.now();
    this.maxLife = 25000 + Math.random() * 15000; // 25-40s
    this.popped = false;
    this.popParticles = [];
  }

  update(t) {
    if (this.popped) {
      for (const p of this.popParticles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.01;
        p.life -= 0.015;
      }
      this.popParticles = this.popParticles.filter(p => p.life > 0);
      return this.popParticles.length > 0;
    }

    // Fade in
    if (this.fadeIn) {
      this.alpha = Math.min(1, this.alpha + 0.015);
      if (this.alpha >= 1) this.fadeIn = false;
    }

    // Drift
    this.phase += this.wobbleSpeed;
    this.x += this.vx + Math.sin(this.phase) * 0.2;
    this.y += this.vy + Math.cos(this.phase * 0.7) * 0.15;

    // Gentle float upward
    this.vy -= 0.001;
    this.vy *= 0.998;
    this.vx *= 0.998;

    // Soft boundary
    if (this.x < this.r) this.vx += 0.05;
    if (this.x > W - this.r) this.vx -= 0.05;
    if (this.y < this.r) this.vy += 0.05;
    if (this.y > H - this.r) this.vy -= 0.05;

    // Lifespan
    const age = Date.now() - this.born;
    if (age > this.maxLife) {
      this.alpha -= 0.008;
      if (this.alpha <= 0) return false;
    }

    return true;
  }

  pop() {
    this.popped = true;
    for (let i = 0; i < 15; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = Math.random() * 2 + 0.5;
      this.popParticles.push({
        x: this.x, y: this.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1,
        size: Math.random() * 3 + 1
      });
    }
  }

  draw(t) {
    if (this.popped) {
      for (const p of this.popParticles) {
        ctx.globalAlpha = p.life * 0.6;
        ctx.fillStyle = `hsl(${this.hue}, ${this.sat}%, ${this.lit}%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      return;
    }

    const wobble = Math.sin(this.phase * 2) * 2;
    const rx = this.r + wobble;
    const ry = this.r - wobble * 0.5;

    // Outer glow
    ctx.globalAlpha = this.alpha * 0.15;
    const glow = ctx.createRadialGradient(this.x, this.y, rx * 0.3, this.x, this.y, rx * 2);
    glow.addColorStop(0, `hsla(${this.hue}, ${this.sat}%, ${this.lit}%, 0.3)`);
    glow.addColorStop(1, `hsla(${this.hue}, ${this.sat}%, ${this.lit}%, 0)`);
    ctx.fillStyle = glow;
    ctx.fillRect(this.x - rx * 2, this.y - ry * 2, rx * 4, ry * 4);

    // Bubble body
    ctx.globalAlpha = this.alpha * 0.25;
    ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.lit * 0.4}%, 0.6)`;
    ctx.beginPath();
    ctx.ellipse(this.x, this.y, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();

    // Bubble rim
    ctx.globalAlpha = this.alpha * 0.5;
    ctx.strokeStyle = `hsla(${this.hue}, ${this.sat}%, ${this.lit}%, 0.6)`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(this.x, this.y, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Specular highlight
    ctx.globalAlpha = this.alpha * 0.35;
    ctx.fillStyle = `hsla(${this.hue}, 30%, 90%, 0.5)`;
    ctx.beginPath();
    ctx.ellipse(this.x - rx * 0.25, this.y - ry * 0.3, rx * 0.3, ry * 0.2, -0.4, 0, Math.PI * 2);
    ctx.fill();

    // Text
    ctx.globalAlpha = this.alpha * 0.7;
    ctx.fillStyle = `hsl(${this.hue}, ${Math.min(100, this.sat + 20)}%, ${Math.min(95, this.lit + 25)}%)`;
    ctx.font = `300 ${Math.max(9, Math.min(13, this.r * 0.28))}px 'Cormorant Garamond', serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Word wrap
    const words = this.text.split(' ');
    const maxW = rx * 1.4;
    let lines = [];
    let current = '';
    for (const w of words) {
      const test = current ? current + ' ' + w : w;
      if (ctx.measureText(test).width > maxW && current) {
        lines.push(current);
        current = w;
      } else {
        current = test;
      }
    }
    if (current) lines.push(current);

    const lineH = Math.max(11, this.r * 0.32);
    const startY = this.y - (lines.length - 1) * lineH / 2;
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], this.x, startY + i * lineH);
    }

    ctx.globalAlpha = 1;
  }

  contains(mx, my) {
    const dx = mx - this.x, dy = my - this.y;
    return Math.sqrt(dx * dx + dy * dy) < this.r;
  }
}

// ── Dreamcatcher Drawing ──
function drawDreamcatcher(t) {
  const pulse = Math.sin(t * 0.5) * 0.1 + 0.9;
  const r = CATCHER_R * pulse;

  ctx.save();
  ctx.translate(cx, cy * 0.42);

  // Outer ring
  ctx.strokeStyle = `rgba(180,140,220,${0.15 + Math.sin(t) * 0.05})`;
  ctx.lineWidth = 2;
  ctx.shadowColor = 'rgba(180,140,220,0.3)';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.stroke();

  // Inner rings
  for (let ring = 1; ring <= RINGS; ring++) {
    const rr = r * (1 - ring / (RINGS + 1));
    const alpha = 0.06 + Math.sin(t * 0.7 + ring) * 0.03;
    ctx.strokeStyle = `rgba(160,120,220,${alpha})`;
    ctx.lineWidth = 0.8;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(0, 0, rr, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Web strands
  ctx.shadowBlur = 4;
  for (let i = 0; i < WEB_POINTS; i++) {
    const a1 = (i / WEB_POINTS) * Math.PI * 2 - Math.PI / 2;
    const a2 = ((i + 1) / WEB_POINTS) * Math.PI * 2 - Math.PI / 2;

    for (let ring = 0; ring <= RINGS; ring++) {
      const r1 = ring === 0 ? r : r * (1 - ring / (RINGS + 1));
      const r2 = ring === 0 ? r : r * (1 - ring / (RINGS + 1));
      const rNext = ring === RINGS ? 0 : r * (1 - (ring + 1) / (RINGS + 1));

      // Radial strand
      const alpha = 0.06 + Math.sin(t * 0.3 + i * 0.5 + ring) * 0.03;
      ctx.strokeStyle = `rgba(180,150,240,${alpha})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a1) * r1, Math.sin(a1) * r1);
      ctx.lineTo(Math.cos(a1) * rNext, Math.sin(a1) * rNext);
      ctx.stroke();

      // Cross web (connect adjacent points on same ring)
      if (ring > 0) {
        const wAlpha = 0.04 + Math.sin(t * 0.4 + i + ring * 0.7) * 0.02;
        ctx.strokeStyle = `rgba(200,170,255,${wAlpha})`;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a1) * r1, Math.sin(a1) * r1);
        ctx.lineTo(Math.cos(a2) * r2, Math.sin(a2) * r2);
        ctx.stroke();
      }
    }
  }

  // Center gem
  const gemPulse = Math.sin(t * 1.5) * 0.3 + 0.7;
  const gemGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 8);
  gemGrad.addColorStop(0, `rgba(220,180,255,${gemPulse * 0.6})`);
  gemGrad.addColorStop(1, `rgba(180,120,255,0)`);
  ctx.fillStyle = gemGrad;
  ctx.beginPath();
  ctx.arc(0, 0, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `rgba(255,240,255,${gemPulse * 0.8})`;
  ctx.beginPath();
  ctx.arc(0, 0, 2, 0, Math.PI * 2);
  ctx.fill();

  // Hanging strands with beads
  ctx.shadowBlur = 0;
  for (let i = 0; i < 5; i++) {
    const angle = Math.PI * 0.55 + (i / 4) * Math.PI * 0.9;
    const sx = Math.cos(angle) * r;
    const sy = Math.sin(angle) * r;
    const len = 30 + i * 12 + Math.sin(t * 0.3 + i) * 5;
    const sway = Math.sin(t * 0.5 + i * 1.2) * 4;

    ctx.strokeStyle = `rgba(160,130,200,${0.1 + Math.sin(t + i) * 0.04})`;
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo(sx + sway, sy + len * 0.5, sx + sway * 1.5, sy + len);
    ctx.stroke();

    // Bead
    const beadHue = 260 + i * 25;
    ctx.fillStyle = `hsla(${beadHue}, 60%, 65%, ${0.3 + Math.sin(t * 0.8 + i) * 0.15})`;
    ctx.shadowColor = `hsla(${beadHue}, 70%, 60%, 0.3)`;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(sx + sway * 1.5, sy + len, 3, 0, Math.PI * 2);
    ctx.fill();

    // Feather at bottom of longest strands
    if (i === 1 || i === 3) {
      const fx = sx + sway * 1.5;
      const fy = sy + len + 3;
      const fSway = Math.sin(t * 0.6 + i) * 3;
      ctx.strokeStyle = `rgba(180,150,220,${0.12})`;
      ctx.lineWidth = 0.6;
      for (let f = 0; f < 6; f++) {
        ctx.beginPath();
        ctx.moveTo(fx, fy + f * 4);
        ctx.lineTo(fx - 4 + fSway, fy + f * 4 + 2);
        ctx.moveTo(fx, fy + f * 4);
        ctx.lineTo(fx + 4 + fSway, fy + f * 4 + 2);
        ctx.stroke();
      }
    }
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawStars(t) {
  for (const s of stars) {
    const alpha = 0.15 + 0.15 * Math.sin(s.phase + t * s.speed * 60);
    ctx.fillStyle = `rgba(200,180,240,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── Auto-spawn dreams ──
let autoTimer = 0;
function autoSpawn() {
  if (bubbles.filter(b => !b.popped).length < 8) {
    const text = DREAM_THOUGHTS[Math.floor(Math.random() * DREAM_THOUGHTS.length)];
    // Spawn around the dreamcatcher
    const angle = Math.random() * Math.PI * 2;
    const dist = CATCHER_R * 0.8 + Math.random() * CATCHER_R * 1.5;
    const bx = cx + Math.cos(angle) * dist;
    const by = cy * 0.42 + Math.sin(angle) * dist;
    bubbles.push(new Bubble(text, bx, by));
  }
}

// ── Input ──
const tinput = document.getElementById('tinput');
const tbtn = document.getElementById('tbtn');
const hint = document.getElementById('hint');

function releaseThought() {
  const text = tinput.value.trim();
  if (!text) return;
  bubbles.push(new Bubble(text, cx, H * 0.7));
  tinput.value = '';
  hint.style.opacity = '0';
}

tbtn.addEventListener('click', releaseThought);
tinput.addEventListener('keydown', e => {
  if (e.key === 'Enter') releaseThought();
});

// Click to pop bubbles
canvas.addEventListener('click', e => {
  const mx = e.clientX, my = e.clientY;
  for (let i = bubbles.length - 1; i >= 0; i--) {
    if (!bubbles[i].popped && bubbles[i].contains(mx, my)) {
      bubbles[i].pop();
      break;
    }
  }
});

// ── Main Loop ──
let frame = 0;
function loop(timestamp) {
  const t = timestamp * 0.001;
  frame++;

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#04020a');
  bg.addColorStop(0.4, '#08041a');
  bg.addColorStop(0.7, '#0a0520');
  bg.addColorStop(1, '#06030e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawStars(t);
  drawDreamcatcher(t);

  // Auto-spawn
  autoTimer++;
  if (autoTimer > 180) { // every 3 seconds
    autoTimer = 0;
    autoSpawn();
  }

  // Update & draw bubbles
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const alive = bubbles[i].update(t);
    if (!alive) {
      bubbles.splice(i, 1);
      continue;
    }
    bubbles[i].draw(t);
  }

  // Bubble-bubble soft repulsion
  for (let i = 0; i < bubbles.length; i++) {
    if (bubbles[i].popped) continue;
    for (let j = i + 1; j < bubbles.length; j++) {
      if (bubbles[j].popped) continue;
      const dx = bubbles[j].x - bubbles[i].x;
      const dy = bubbles[j].y - bubbles[i].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = bubbles[i].r + bubbles[j].r + 5;
      if (dist < minDist && dist > 0) {
        const push = (minDist - dist) * 0.01;
        const nx = dx / dist, ny = dy / dist;
        bubbles[i].vx -= nx * push;
        bubbles[i].vy -= ny * push;
        bubbles[j].vx += nx * push;
        bubbles[j].vy += ny * push;
      }
    }
  }

  requestAnimationFrame(loop);
}

// Seed initial dreams
setTimeout(() => autoSpawn(), 500);
setTimeout(() => autoSpawn(), 1500);
setTimeout(() => autoSpawn(), 2500);

requestAnimationFrame(loop);
</script>
</body>
</html>
