<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Eldritch Tarot</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0509">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%AE">
<meta name="description" content="A reskinned tarot deck for things that should not be named. Draw single cards or a past-present-future spread.">
<meta property="og:title" content="Eldritch Tarot">
<meta property="og:description" content="A reskinned tarot deck for things that should not be named. Draw single cards or a past-present-future spread.">
<meta property="og:url" content="https://sloppy.live/eldritch-tarot">
<meta property="og:image" content="https://image.pollinations.ai/prompt/eldritch%20tarot%20deck%20laid%20out%20on%20black%20velvet%2C%20candlelight%2C%20occult%20sigils%2C%20deep%20purple%20and%20blood%20red%2C%20parchment%20cards%2C%20Lovecraftian%20gothic?width=1200&height=630&model=flux&seed=1313&nologo=true">

<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,600&family=IM+Fell+English:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0c0509;
    --void-2:#1a0a15;
    --candle:#e3a73f;
    --candle-glow:rgba(227,167,63,0.55);
    --blood:#9a1830;
    --blood-2:#5a0e1e;
    --parchment:#d8c89a;
    --parchment-dim:#a89668;
    --ink:#1a0e0c;
    --violet:#3a1b4a;
    --violet-glow:rgba(120,60,180,0.4);
    --ghost:#c8b0e8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{min-height:100%;background:var(--void);color:var(--ghost);font-family:'Cormorant Garamond', serif;-webkit-tap-highlight-color:transparent}
  body{
    background:
      radial-gradient(ellipse 70% 50% at 50% 100%, rgba(227,167,63,0.10), transparent 70%),
      radial-gradient(ellipse 50% 70% at 50% 0%, rgba(120,30,80,0.10), transparent 60%),
      radial-gradient(circle at 18% 30%, rgba(154,24,48,0.08), transparent 40%),
      radial-gradient(circle at 82% 70%, rgba(120,60,180,0.10), transparent 40%),
      var(--void);
    overflow-x:hidden;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
  }
  /* candle flicker bg */
  body::before{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(circle at 50% 110%, rgba(227,167,63,0.18), transparent 35%);
    animation:flicker 3.2s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{opacity:1}
    47%{opacity:0.88}
    50%{opacity:1.05}
    53%{opacity:0.9}
    72%{opacity:1}
  }
  header{
    text-align:center;padding:1.4rem 1rem 0.5rem;position:relative;z-index:2;width:100%;
  }
  h1{
    font-family:'UnifrakturCook', serif;
    font-size:clamp(2.2rem, 6vw, 4rem);
    color:var(--candle);
    letter-spacing:0.02em;
    text-shadow:0 0 14px var(--candle-glow), 0 0 26px rgba(154,24,48,0.4);
    line-height:1;
  }
  .tag{
    font-family:'IM Fell English', serif;font-style:italic;
    font-size:clamp(0.85rem, 1.6vw, 1.1rem);
    color:var(--parchment-dim);margin-top:0.35rem;
    letter-spacing:0.05em;
  }
  .tag .dot{color:var(--blood);font-style:normal;padding:0 0.4rem}
  main{
    flex:1;display:flex;flex-direction:column;align-items:center;
    padding:0.5rem 1rem 4rem;position:relative;z-index:2;width:100%;max-width:1100px;
  }
  .controls{
    display:flex;gap:0.6rem;align-items:center;justify-content:center;flex-wrap:wrap;
    margin:1rem 0 1.5rem;
  }
  .btn{
    background:linear-gradient(180deg, #1c0e15, #0c0509);
    color:var(--candle);border:1.5px solid var(--blood-2);
    font-family:'IM Fell English', serif;font-style:italic;
    font-size:1rem;letter-spacing:0.06em;
    padding:0.75rem 1.4rem;cursor:pointer;border-radius:0.25rem;
    box-shadow:0 0 0 1px rgba(154,24,48,0.2), 0 0 14px rgba(154,24,48,0.18), inset 0 0 14px rgba(227,167,63,0.08);
    transition:all 0.25s;
    min-height:2.75rem;
    text-shadow:0 0 8px rgba(227,167,63,0.4);
  }
  .btn:hover{
    border-color:var(--candle);color:#fff5dc;
    box-shadow:0 0 0 1px rgba(227,167,63,0.4), 0 0 22px rgba(227,167,63,0.35), inset 0 0 18px rgba(154,24,48,0.18);
    transform:translateY(-1px);
  }
  .btn:focus-visible{outline:3px solid var(--candle);outline-offset:3px}
  .btn:disabled{opacity:0.4;cursor:not-allowed}
  .btn.secondary{
    color:var(--ghost);border-color:rgba(120,60,180,0.35);
    text-shadow:0 0 6px rgba(120,60,180,0.3);
  }
  .btn.secondary:hover{border-color:var(--ghost);color:#fff}

  .spread{
    display:flex;flex-direction:column;align-items:center;gap:1.6rem;
    width:100%;min-height:23rem;
  }
  .cards-row{
    display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap;
    perspective:1400px;
  }
  .card-slot{
    display:flex;flex-direction:column;align-items:center;gap:0.5rem;
    width:11rem;
  }
  .pos-label{
    font-family:'IM Fell English', serif;font-style:italic;
    color:var(--parchment-dim);font-size:0.85rem;letter-spacing:0.18em;text-transform:uppercase;
    height:1.2rem;
    text-shadow:0 0 6px rgba(227,167,63,0.2);
  }
  .card{
    width:11rem;height:16.5rem;
    position:relative;cursor:pointer;
    transform-style:preserve-3d;
    transition:transform 0.85s cubic-bezier(0.7, 0.05, 0.3, 1);
    border-radius:0.7rem;
    will-change:transform;
  }
  .card.flipped{transform:rotateY(180deg)}
  .card.dealing{animation:dealIn 0.7s ease-out backwards}
  @keyframes dealIn{
    from{opacity:0;transform:translateY(-40px) rotateZ(-12deg) scale(0.85)}
    to{opacity:1;transform:translateY(0) rotateZ(0) scale(1)}
  }
  .card .face{
    position:absolute;inset:0;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:0.7rem;overflow:hidden;
    border:2px solid var(--blood-2);
    box-shadow:
      0 0 22px rgba(154,24,48,0.30),
      0 4px 16px rgba(0,0,0,0.65),
      inset 0 0 10px rgba(0,0,0,0.5);
  }
  .card .back{
    background:
      radial-gradient(circle at 50% 50%, #3a1b4a 0%, #1a0a15 60%, #0c0509 100%);
    display:flex;align-items:center;justify-content:center;
  }
  .card .back::before{
    content:'';position:absolute;inset:0.4rem;
    border:1px solid rgba(227,167,63,0.35);border-radius:0.45rem;
    pointer-events:none;
  }
  .card .back::after{
    content:'';position:absolute;inset:0.7rem;
    border:1px solid rgba(154,24,48,0.25);border-radius:0.35rem;
    pointer-events:none;
  }
  .card .back svg{width:65%;height:65%;filter:drop-shadow(0 0 6px var(--candle-glow))}
  .card .front{
    background:
      linear-gradient(180deg, #ebd9a8 0%, #d8c89a 50%, #c4b287 100%);
    transform:rotateY(180deg);
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:0.6rem 0.5rem 0.5rem;
    color:var(--ink);
  }
  .card .front::before{
    content:'';position:absolute;inset:0.3rem;
    border:1.5px solid var(--ink);border-radius:0.45rem;
    box-shadow:inset 0 0 8px rgba(0,0,0,0.15);
    pointer-events:none;
  }
  .card .front::after{
    /* parchment grain */
    content:'';position:absolute;inset:0;
    background:
      repeating-linear-gradient(11deg, rgba(0,0,0,0.03) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(103deg, rgba(0,0,0,0.025) 0 1px, transparent 1px 4px),
      radial-gradient(circle at 30% 25%, rgba(154,24,48,0.08), transparent 60%);
    pointer-events:none;mix-blend-mode:multiply;border-radius:0.7rem;
  }
  .card .front .num{
    font-family:'IM Fell English', serif;font-style:italic;
    font-size:0.85rem;letter-spacing:0.18em;color:var(--blood-2);
    margin-top:0.4rem;
    text-transform:uppercase;
    position:relative;z-index:1;
  }
  .card .front .sigil{
    flex:1;display:flex;align-items:center;justify-content:center;
    width:100%;padding:0.3rem;position:relative;z-index:1;
  }
  .card .front .sigil svg{width:100%;height:100%;max-height:9rem;color:var(--ink)}
  .card .front .name{
    font-family:'UnifrakturCook', serif;
    font-size:1.05rem;color:var(--ink);
    text-align:center;line-height:1.05;
    padding:0 0.3rem;
    position:relative;z-index:1;
    text-shadow:0 1px 0 rgba(255,255,255,0.2);
  }
  .card.reversed .front .sigil svg, .card.reversed .front .num, .card.reversed .front .name{
    transform:rotate(180deg);
  }
  .card.reversed .front .name::before{
    content:'~ ';color:var(--blood);
  }
  .card.reversed .front .name::after{
    content:' ~';color:var(--blood);
  }
  .reading-area{
    margin-top:1.5rem;width:100%;max-width:42rem;
    display:flex;flex-direction:column;gap:1.4rem;
    min-height:5rem;
  }
  .reading{
    padding:1.2rem 1.4rem;
    border-left:2px solid var(--blood);
    background:linear-gradient(90deg, rgba(154,24,48,0.06), transparent 70%);
    border-radius:0 0.3rem 0.3rem 0;
    position:relative;
    opacity:0;transform:translateY(8px);
    animation:revelaText 0.8s ease-out forwards;
  }
  @keyframes revelaText{
    to{opacity:1;transform:translateY(0)}
  }
  .reading .pos{
    font-family:'IM Fell English', serif;font-style:italic;
    font-size:0.75rem;letter-spacing:0.3em;text-transform:uppercase;
    color:var(--candle);margin-bottom:0.4rem;
    text-shadow:0 0 8px var(--candle-glow);
  }
  .reading .card-name{
    font-family:'UnifrakturCook', serif;
    font-size:1.5rem;color:var(--blood);margin-bottom:0.6rem;
    text-shadow:0 0 8px rgba(154,24,48,0.4);
  }
  .reading .card-name .rev{
    font-family:'IM Fell English', serif;font-style:italic;
    font-size:0.85rem;color:var(--parchment-dim);letter-spacing:0.2em;
    text-transform:uppercase;margin-left:0.6rem;
    text-shadow:none;
  }
  .reading .prediction{
    font-family:'Cormorant Garamond', serif;font-style:italic;
    font-size:1.15rem;color:var(--parchment);line-height:1.6;
    text-shadow:0 0 12px rgba(216,200,154,0.15);
  }
  .reading .prediction p{margin-bottom:0.45rem}
  .reading .prediction p:last-child{margin-bottom:0}
  .reading .prediction p::first-letter{
    font-family:'UnifrakturCook', serif;
    font-size:1.6em;color:var(--candle);
    margin-right:0.05em;
    text-shadow:0 0 8px var(--candle-glow);
  }

  /* initial empty state */
  .empty-state{
    text-align:center;
    padding:2rem 1rem;color:var(--parchment-dim);
    font-family:'IM Fell English', serif;font-style:italic;
    font-size:1.05rem;letter-spacing:0.05em;
  }

  /* small floating motes */
  .mote{
    position:fixed;width:3px;height:3px;border-radius:50%;
    background:var(--candle);box-shadow:0 0 8px var(--candle);
    pointer-events:none;z-index:1;opacity:0;
    animation:moteRise 9s linear infinite;
  }
  @keyframes moteRise{
    0%{opacity:0;transform:translateY(20vh) translateX(0)}
    10%{opacity:0.6}
    90%{opacity:0.5}
    100%{opacity:0;transform:translateY(-110vh) translateX(40px)}
  }

  /* footer hud */
  .hud{
    position:fixed;bottom:0.7rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(12,5,9,0.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid var(--blood-2);
    padding:0.45rem 0.7rem;border-radius:0.35rem;
    font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;
    z-index:6;max-width:calc(100% - 1.2rem);
    color:var(--parchment-dim);font-family:'IBM Plex Mono', monospace;
  }
  .hud .pill{
    background:rgba(154,24,48,0.18);color:var(--candle);
    padding:0.35rem 0.6rem;border-radius:0.2rem;border:1px solid var(--blood-2);
    font-size:0.65rem;
  }
  .hud button{
    background:transparent;color:var(--ghost);border:1px solid rgba(120,60,180,0.4);
    font-family:inherit;font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;
    padding:0.4rem 0.7rem;border-radius:0.2rem;cursor:pointer;min-height:2.5rem;
  }
  .hud button:hover{border-color:var(--candle);color:var(--candle)}
  .hud button:focus-visible{outline:3px solid var(--candle);outline-offset:2px}
  .hud button[aria-pressed="true"]{background:rgba(227,167,63,0.18);color:var(--candle);border-color:var(--candle)}

  @media (max-width: 640px){
    .card{width:8.6rem;height:13rem}
    .card-slot{width:8.6rem}
    .card .front .name{font-size:0.85rem}
    .card .front .num{font-size:0.7rem}
    .cards-row{gap:0.6rem}
    .reading .prediction{font-size:1.05rem}
    .reading .card-name{font-size:1.3rem}
    .pos-label{font-size:0.7rem;letter-spacing:0.12em}
  }
  @media (prefers-reduced-motion: reduce){
    .card{transition:transform 0.2s linear}
    .card.dealing{animation:none}
    .reading{animation:none;opacity:1;transform:none}
    body::before{animation:none}
    .mote{animation:none;opacity:0.3}
  }
</style>
</head>
<body>
  <header>
    <h1>Eldritch Tarot</h1>
    <div class="tag">readings from the seam <span class="dot">✦</span> draw what waits</div>
  </header>

  <main>
    <div class="controls">
      <button class="btn" id="drawOne" type="button">Draw One Card</button>
      <button class="btn" id="drawThree" type="button">Past · Present · Future</button>
      <button class="btn secondary" id="shuffle" type="button" aria-label="Shuffle deck">⟲ Shuffle</button>
    </div>

    <section class="spread" id="spread" aria-label="Tarot spread area"></section>

    <section class="reading-area" id="readingArea" aria-live="polite" aria-atomic="false"></section>
  </main>

  <div class="hud" role="group" aria-label="Sound and shuffle">
    <span class="pill" id="deckCount">22 cards · sealed</span>
    <button id="droneBtn" type="button" aria-pressed="false" aria-label="Toggle ambient drone">~ drone</button>
    <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound effects">♪ on</button>
  </div>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));

        'A reunion you did not request is already in the hallway.'
      ] },
    { n: 21, num: 'XXI',   name: 'The Void', sigil: 'void',
      upright: [
        'A circle closes. Inside it, your shape changes.',
        'Completion is a small dark sphere. You may carry it.',
        'You are not finished. You are full.'
      ],
      reversed: [
        'A loop you wanted to leave hums on, just out of frame.',
        'The container is unlatched. Whatever was inside steps out.'
      ] }
  ];

  // ── Persistent state ──
  var deckOrder = []; // shuffled indices
  function shuffleDeck(){
    deckOrder = DECK.map(function(_, i){ return i; });
    for (var i = deckOrder.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var t = deckOrder[i]; deckOrder[i] = deckOrder[j]; deckOrder[j] = t;
    }
  }
  shuffleDeck();

  function drawCardData(){
    if (deckOrder.length === 0) shuffleDeck();
    var idx = deckOrder.pop();
    var c = DECK[idx];
    var reversed = Math.random() < 0.33;
    return { data: c, reversed: reversed };
  }

  // ── Audio ──
  var audioCtx = null;
  var muted = false;
  var droneOn = false;
  var droneNodes = null;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function noiseBuffer(c, dur){
    var n = Math.floor(c.sampleRate * dur);
    var buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/n, 1.6);
    return buf;
  }
  function sndShuffle(){
    if (muted) return; var c = ensureAudio(); if (!c) return;
    for (var i = 0; i < 4; i++){
      (function(k){
        setTimeout(function(){
          if (muted) return;
          var b = noiseBuffer(audioCtx, 0.18);
          var s = audioCtx.createBufferSource(); s.buffer = b;
          var bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1800 + k*200; bp.Q.value = 1.4;
          var g = audioCtx.createGain(); g.gain.value = 0.08;
          s.connect(bp).connect(g).connect(audioCtx.destination);
          s.start();
        }, k * 90);
      })(i);
    }
  }
  function sndDeal(){
    if (muted) return; var c = ensureAudio(); if (!c) return;
    var b = noiseBuffer(c, 0.10);
    var s = c.createBufferSource(); s.buffer = b;
    var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 3200; bp.Q.value = 1.8;
    var g = c.createGain(); g.gain.value = 0.10;
    s.connect(bp).connect(g).connect(c.destination); s.start();
  }
  function sndFlip(){
    if (muted) return; var c = ensureAudio(); if (!c) return;
    var t = c.currentTime;
    var o = c.createOscillator(); o.type = 'triangle';
    o.frequency.setValueAtTime(620, t);
    o.frequency.exponentialRampToValueAtTime(240, t + 0.18);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + 0.24);
    // thunk
    var b = noiseBuffer(c, 0.08);
    var s = c.createBufferSource(); s.buffer = b;
    var lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 380;
    var ng = c.createGain(); ng.gain.value = 0.10;
    s.connect(lp).connect(ng).connect(c.destination);
    s.start(t + 0.12);
  }
  function toggleDrone(){
    droneOn = !droneOn;
    var c = ensureAudio(); if (!c){ droneOn = false; return; }
    if (droneOn){
      var t = c.currentTime;
      var freqs = [55, 73.42, 110, 138.59];
      var nodes = freqs.map(function(f, i){
        var o1 = c.createOscillator(); o1.type = 'sine'; o1.frequency.value = f;
        var o2 = c.createOscillator(); o2.type = 'triangle'; o2.frequency.value = f * 1.005;
        var g = c.createGain(); g.gain.setValueAtTime(0.0001, t);
        g.gain.linearRampToValueAtTime(0.025, t + 2.4);
        var lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 380; lp.Q.value = 0.7;
        var lfo = c.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.04 + i * 0.03;
        var lfoG = c.createGain(); lfoG.gain.value = 180;
        lfo.connect(lfoG).connect(lp.frequency);
        o1.connect(g); o2.connect(g);
        g.connect(lp).connect(c.destination);
        o1.start(t); o2.start(t); lfo.start(t);
        return { o1: o1, o2: o2, g: g, lfo: lfo };
      });
      droneNodes = nodes;
    } else if (droneNodes){
      var t2 = c.currentTime;
      droneNodes.forEach(function(n){
        n.g.gain.cancelScheduledValues(t2);
        n.g.gain.setValueAtTime(n.g.gain.value, t2);
        n.g.gain.exponentialRampToValueAtTime(0.0001, t2 + 1.6);
        n.o1.stop(t2 + 1.8); n.o2.stop(t2 + 1.8); n.lfo.stop(t2 + 1.8);
      });
      droneNodes = null;
    }
  }

  // ── Rendering helpers ──
  var spread = document.getElementById('spread');
  var readingArea = document.getElementById('readingArea');
  var deckCountEl = document.getElementById('deckCount');

  function updateDeckCount(){
    var n = deckOrder.length;
    deckCountEl.textContent = n + ' card' + (n === 1 ? '' : 's') + (n === 22 ? ' · sealed' : ' · remain');
  }

  function buildCardEl(cardInfo, posLabel, dealDelayMs){
    var slot = document.createElement('div');
    slot.className = 'card-slot';
    var label = document.createElement('div');
    label.className = 'pos-label';
    label.textContent = posLabel || '';
    slot.appendChild(label);

    var card = document.createElement('div');
    card.className = 'card dealing';
    if (cardInfo.reversed) card.classList.add('reversed');
    card.style.animationDelay = (dealDelayMs / 1000) + 's';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', 'Face-down card' + (posLabel ? ' for ' + posLabel : '') + '. Click to reveal.');

    // Back
    var back = document.createElement('div');
    back.className = 'face back';
    back.innerHTML = SIGILS.void;   // arcane circle on every back
    card.appendChild(back);

    // Front
    var front = document.createElement('div');
    front.className = 'face front';
    front.innerHTML =
      '<div class="num">' + cardInfo.data.num + '</div>' +
      '<div class="sigil">' + (SIGILS[cardInfo.data.sigil] || SIGILS.void) + '</div>' +
      '<div class="name">' + cardInfo.data.name + '</div>';
    card.appendChild(front);

    slot.appendChild(card);

    var revealed = false;
    function reveal(){
      if (revealed) return;
      revealed = true;
      card.classList.add('flipped');
      sndFlip();
      card.setAttribute('aria-label', cardInfo.data.name + (cardInfo.reversed ? ' (reversed)' : '') + (posLabel ? ' — ' + posLabel : ''));
      setTimeout(function(){
        renderReading(cardInfo, posLabel);
      }, 380);
    }
    card.addEventListener('click', reveal);
    card.addEventListener('keydown', function(e){
      if (e.code === 'Space' || e.code === 'Enter'){ e.preventDefault(); reveal(); }
    });

    return { slot: slot, card: card, reveal: reveal, info: cardInfo, posLabel: posLabel };
  }

  function renderReading(cardInfo, posLabel){
    var pool = cardInfo.reversed ? cardInfo.data.reversed : cardInfo.data.upright;
    // Pick 2 lines without repeats
    var lines;
    if (pool.length <= 2){ lines = pool.slice(); }
    else {
      var idx1 = Math.floor(Math.random() * pool.length);
      var idx2;
      do { idx2 = Math.floor(Math.random() * pool.length); } while (idx2 === idx1);
      lines = [pool[idx1], pool[idx2]];
    }
    var div = document.createElement('div');
    div.className = 'reading';
    div.innerHTML =
      (posLabel ? '<div class="pos">' + posLabel + '</div>' : '') +
      '<div class="card-name">' + cardInfo.data.name + (cardInfo.reversed ? '<span class="rev">reversed</span>' : '') + '</div>' +
      '<div class="prediction">' + lines.map(function(l){ return '<p>' + l + '</p>'; }).join('') + '</div>';
    readingArea.appendChild(div);
    // scroll into view softly
    try { div.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); } catch(_){}
  }

  // ── Spread builders ──
  function clearSpread(){
    spread.innerHTML = '';
    readingArea.innerHTML = '';
  }

  function dealOne(){
    clearSpread();
    sndDeal();
    var row = document.createElement('div');
    row.className = 'cards-row';
    spread.appendChild(row);
    var info = drawCardData();
    var built = buildCardEl(info, '', 0);
    row.appendChild(built.slot);
    updateDeckCount();
    setTimeout(function(){
      // auto-reveal hint: pulse it once
      built.card.focus();
    }, 800);
  }

  function dealThree(){
    clearSpread();
    var positions = ['Past', 'Present', 'Future'];
    var row = document.createElement('div');
    row.className = 'cards-row';
    spread.appendChild(row);
    for (var i = 0; i < 3; i++){
      var info = drawCardData();
      var built = buildCardEl(info, positions[i], i * 220);
      row.appendChild(built.slot);
      setTimeout(sndDeal, i * 220);
    }
    updateDeckCount();
  }

  // ── Initial state ──
  function setEmpty(){
    spread.innerHTML = '<div class="empty-state">The deck waits in shadow. Choose a draw.</div>';
    readingArea.innerHTML = '';
  }
  setEmpty();
  updateDeckCount();

  // ── Buttons ──
  document.getElementById('drawOne').addEventListener('click', function(){ ensureAudio(); dealOne(); });
  document.getElementById('drawThree').addEventListener('click', function(){ ensureAudio(); dealThree(); });
  document.getElementById('shuffle').addEventListener('click', function(){
    ensureAudio();
    shuffleDeck();
    updateDeckCount();
    sndShuffle();
    setEmpty();
  });

  var muteBtn = document.getElementById('muteBtn');
  muteBtn.addEventListener('click', function(){
    muted = !muted;
    muteBtn.textContent = muted ? '♪ off' : '♪ on';
    muteBtn.setAttribute('aria-pressed', muted ? 'true' : 'false');
    if (!muted) ensureAudio();
  });
  var droneBtn = document.getElementById('droneBtn');
  droneBtn.addEventListener('click', function(){
    ensureAudio();
    toggleDrone();
    droneBtn.setAttribute('aria-pressed', droneOn ? 'true' : 'false');
    droneBtn.textContent = droneOn ? '~ drone' : '~ drone';
    droneBtn.style.color = droneOn ? 'var(--candle)' : '';
  });

  // ── Floating candle motes ──
  function spawnMote(){
    var m = document.createElement('div');
    m.className = 'mote';
    m.style.left = (Math.random() * 100) + 'vw';
    m.style.animationDuration = (7 + Math.random() * 6) + 's';
    m.style.animationDelay = (Math.random() * 2) + 's';
    document.body.appendChild(m);
    setTimeout(function(){ try { m.remove(); } catch(_){} }, 15000);
  }
  for (var i = 0; i < 6; i++) spawnMote();
  setInterval(spawnMote, 2200);
})();
</script>
</body>
</html>
