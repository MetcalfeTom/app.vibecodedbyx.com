<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Marble Melodies</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%AE">
  <meta name="description" content="Neon marbles bouncing on musical platforms. Generative music by gravity.">
  <meta property="og:title" content="Marble Melodies">
  <meta property="og:description" content="Drop neon marbles onto glowing rails. Each bounce is a note. The music composes itself.">
  <meta property="og:url" content="https://sloppy.live/marble-melodies">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/glowing%20neon%20marbles%20bouncing%20on%20purple%20platforms%20synthwave%20dark%20background%20luminous%20trails?width=1200&height=630&nologo=true">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0514;
      --bg-2: #120926;
      --panel: rgba(18, 8, 40, 0.72);
      --ink: #f3ecff;
      --muted: #8a7bbe;
      --accent: #ff2e9a;
      --accent2: #2ee6ff;
      --accent3: #b8ff4e;
      --line: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: 'JetBrains Mono', ui-monospace, monospace; overflow: hidden; }
    body {
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(255,46,154,0.18), transparent 60%),
        radial-gradient(900px 500px at 90% 110%, rgba(46,230,255,0.14), transparent 60%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    }
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      background: linear-gradient(180deg, rgba(8,4,18,0.88), rgba(8,4,18,0.0));
      z-index: 10;
      pointer-events: none;
    }
    header > * { pointer-events: auto; }
    h1 {
      font-family: 'Audiowide', sans-serif;
      font-size: clamp(18px, 2.6vw, 26px);
      letter-spacing: 0.08em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 28px rgba(255,46,154,0.35);
      white-space: nowrap;
    }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }
    .control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding: 5px 9px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      backdrop-filter: blur(8px);
    }
    select, button, input[type="range"] {
      font-family: 'Space Mono', monospace;
      background: transparent;
      color: var(--ink);
      border: none;
      outline: none;
      font-size: 12px;
      letter-spacing: 0.06em;
    }
    select {
      background: rgba(0,0,0,0.4);
      padding: 3px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
    }
    select option { background: #1a0a2e; color: var(--ink); }
    button {
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255,46,154,0.12);
      border: 1px solid rgba(255,46,154,0.42);
      color: var(--ink);
      transition: all 0.15s ease;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    button:hover { background: rgba(255,46,154,0.22); transform: translateY(-1px); box-shadow: 0 0 22px rgba(255,46,154,0.35); }
    button.alt { background: rgba(46,230,255,0.10); border-color: rgba(46,230,255,0.42); }
    button.alt:hover { background: rgba(46,230,255,0.22); box-shadow: 0 0 22px rgba(46,230,255,0.35); }
    input[type="range"] {
      width: 80px;
      accent-color: var(--accent);
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      touch-action: none;
    }
    .hint {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 7px 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    .hint.dim { opacity: 0.35; }
    .hint b { color: var(--accent2); font-weight: 700; }
    .stats {
      position: fixed;
      top: 62px;
      right: 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 6px 10px;
      border-radius: 8px;
      z-index: 10;
      pointer-events: none;
      min-width: 110px;
      text-align: right;
    }
    .stats .v { color: var(--ink); font-weight: 700; }
    @media (max-width: 720px) {
      header { padding: 8px 10px; gap: 8px; }
      .controls { gap: 6px; font-size: 10px; }
      .control { padding: 3px 7px; }
      .hint { font-size: 10px; padding: 6px 10px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>MARBLE MELODIES</h1>
    <div class="controls">
      <label class="control">Scale
        <select id="scale">
          <option value="pentMaj" selected>Pentatonic+</option>
          <option value="pentMin">Pentatonic−</option>
          <option value="dorian">Dorian</option>
          <option value="lydian">Lydian</option>
          <option value="phrygian">Phrygian</option>
          <option value="blues">Blues</option>
          <option value="wholetone">Wholetone</option>
          <option value="japanese">Hirajoshi</option>
        </select>
      </label>
      <label class="control">Root
        <select id="root">
          <option>C</option><option>C#</option><option>D</option><option>D#</option>
          <option>E</option><option>F</option><option>F#</option>
          <option selected>G</option>
          <option>G#</option><option>A</option><option>A#</option><option>B</option>
        </select>
      </label>
      <label class="control">Gravity
        <input type="range" id="gravity" min="0.1" max="0.9" step="0.05" value="0.35">
      </label>
      <label class="control">Auto
        <input type="checkbox" id="auto">
      </label>
      <button id="preset" class="alt">Preset</button>
      <button id="clearMarbles">Clear ○</button>
      <button id="clearAll">Reset</button>
    </div>
  </header>
  <div class="stats" id="stats">○ <span class="v" id="sMarbles">0</span> · ─ <span class="v" id="sPlatforms">0</span></div>
  <canvas id="c"></canvas>
  <div class="hint" id="hint"><b>Tap</b> to drop a marble · <b>Drag</b> to draw a platform</div>

  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const hintEl = document.getElementById('hint');
    const sMarbles = document.getElementById('sMarbles');
    const sPlatforms = document.getElementById('sPlatforms');

    let W = innerWidth, H = innerHeight, DPR = devicePixelRatio || 1;
    function resize() {
      DPR = devicePixelRatio || 1;
      W = innerWidth; H = innerHeight;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    addEventListener('resize', resize);
    resize();

    const SCALES = {
      pentMaj: [0, 2, 4, 7, 9],
      pentMin: [0, 3, 5, 7, 10],
      dorian: [0, 2, 3, 5, 7, 9, 10],
      lydian: [0, 2, 4, 6, 7, 9, 11],
      phrygian: [0, 1, 3, 5, 7, 8, 10],
      blues: [0, 3, 5, 6, 7, 10],
      wholetone: [0, 2, 4, 6, 8, 10],
      japanese: [0, 1, 5, 7, 8]
    };
    const ROOTS = { 'C':0,'C#':1,'D':2,'D#':3,'E':4,'F':5,'F#':6,'G':7,'G#':8,'A':9,'A#':10,'B':11 };

    let currentScale = 'pentMaj';
    let currentRoot = 7;
    let gravity = 0.35;
    let autoDrop = false;
    const MAX_MARBLES = 14;
    const MIN_DRAG = 14;

    const marbles = [];
    const platforms = [];
    const particles = [];

    // Audio ---------------------------------------------------------------
    let ac, master, convolver, revGain;
    function initAudio() {
      if (ac) { if (ac.state === 'suspended') ac.resume(); return; }
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createDynamicsCompressor();
      master.threshold.value = -16;
      master.knee.value = 10;
      master.ratio.value = 6;
      master.attack.value = 0.003;
      master.release.value = 0.18;
      const masterGain = ac.createGain();
      masterGain.gain.value = 0.85;
      master.connect(masterGain).connect(ac.destination);
      convolver = ac.createConvolver();
      convolver.buffer = makeImpulse(2.6, 2.8);
      revGain = ac.createGain();
      revGain.gain.value = 0.45;
      convolver.connect(revGain).connect(master);
    }
    function makeImpulse(duration, decay) {
      const rate = ac.sampleRate;
      const len = Math.floor(rate * duration);
      const buf = ac.createBuffer(2, len, rate);
      for (let ch = 0; ch < 2; ch++) {
        const d = buf.getChannelData(ch);
        for (let i = 0; i < len; i++) {
          d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
      }
      return buf;
    }
    function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }
    function playNote(freq, vel, pan) {
      if (!ac) return;
      const t = ac.currentTime;
      const out = ac.createGain();
      const o1 = ac.createOscillator();
      o1.type = 'triangle';
      o1.frequency.value = freq;
      const o2 = ac.createOscillator();
      o2.type = 'sine';
      o2.frequency.value = freq * 2;
      const o2g = ac.createGain(); o2g.gain.value = 0.35;
      const o3 = ac.createOscillator();
      o3.type = 'sine';
      o3.frequency.value = freq * 3;
      const o3g = ac.createGain(); o3g.gain.value = 0.14;
      o1.connect(out);
      o2.connect(o2g).connect(out);
      o3.connect(o3g).connect(out);
      const v = Math.max(0.04, Math.min(0.6, vel));
      out.gain.setValueAtTime(0, t);
      out.gain.linearRampToValueAtTime(v, t + 0.004);
      out.gain.exponentialRampToValueAtTime(0.0001, t + 1.4);
      const panner = ac.createStereoPanner ? ac.createStereoPanner() : null;
      let postPan = out;
      if (panner) {
        panner.pan.value = Math.max(-1, Math.min(1, pan));
        out.connect(panner);
        postPan = panner;
      }
      const dry = ac.createGain(); dry.gain.value = 0.7;
      const wet = ac.createGain(); wet.gain.value = 0.55;
      postPan.connect(dry).connect(master);
      postPan.connect(wet).connect(convolver);
      o1.start(t); o2.start(t); o3.start(t);
      o1.stop(t + 1.5); o2.stop(t + 1.5); o3.stop(t + 1.5);
    }

    // Factory -------------------------------------------------------------
    function addMarble(x, y, opts = {}) {
      if (marbles.length >= MAX_MARBLES) marbles.shift();
      marbles.push({
        x, y,
        vx: opts.vx ?? (Math.random() - 0.5) * 1.6,
        vy: opts.vy ?? 0,
        r: opts.r ?? (8 + Math.random() * 5),
        hue: opts.hue ?? (Math.random() * 360),
        trail: [],
        born: performance.now()
      });
    }
    function addPlatform(x1, y1, x2, y2) {
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.hypot(dx, dy);
      if (len < MIN_DRAG) return;
      const degrees = SCALES[currentScale];
      // Pitch inversely correlated with platform height (lower on screen = lower pitch).
      const avgY = (y1 + y2) / 2;
      const yRatio = 1 - Math.min(1, Math.max(0, avgY / H));
      const octaveBase = 3 + Math.round(yRatio * 2.2);
      const degIdx = Math.floor(Math.random() * degrees.length);
      const midi = 12 * octaveBase + currentRoot + degrees[degIdx];
      const freq = midiToFreq(midi);
      const hue = (degIdx / degrees.length) * 300 + (midi % 12) * 5;
      platforms.push({ x1, y1, x2, y2, midi, freq, hue: hue % 360, lastBounce: -1e9, thickness: 3 + Math.random() * 1.5 });
    }

    // Collision: moving circle vs segment with continuous sweep ------------
    function collideMarble(m, p) {
      const dx = p.x2 - p.x1, dy = p.y2 - p.y1;
      const len = Math.hypot(dx, dy); if (len === 0) return false;
      const nx = dx / len, ny = dy / len;
      const t = (m.x - p.x1) * nx + (m.y - p.y1) * ny;
      const tc = Math.max(0, Math.min(len, t));
      const px = p.x1 + nx * tc, py = p.y1 + ny * tc;
      const ddx = m.x - px, ddy = m.y - py;
      const dist = Math.hypot(ddx, ddy);
      if (dist < m.r) {
        const inv = 1 / (dist || 0.0001);
        const normX = ddx * inv, normY = ddy * inv;
        const pen = m.r - dist + 0.2;
        m.x += normX * pen;
        m.y += normY * pen;
        const dot = m.vx * normX + m.vy * normY;
        if (dot < 0) {
          m.vx -= 2 * dot * normX;
          m.vy -= 2 * dot * normY;
          m.vx *= 0.74; m.vy *= 0.78;
          const now = performance.now();
          if (now - p.lastBounce > 45) {
            const vel = Math.min(0.55, 0.08 + Math.abs(dot) / 14);
            const pan = Math.max(-1, Math.min(1, (m.x / W) * 2 - 1));
            playNote(p.freq, vel, pan);
            p.lastBounce = now;
            spawnParticles(px, py, p.hue, Math.abs(dot));
          }
          return true;
        }
      }
      return false;
    }

    function spawnParticles(x, y, hue, strength) {
      const n = Math.min(14, 5 + Math.floor(strength * 0.6));
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 1 + Math.random() * (2.5 + strength * 0.08);
        particles.push({
          x, y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s - 1,
          life: 1,
          hue: hue + (Math.random() - 0.5) * 30,
          r: 1.5 + Math.random() * 1.5
        });
      }
    }

    // Step ----------------------------------------------------------------
    function step(dt) {
      for (const m of marbles) {
        m.vy += gravity;
        m.vx *= 0.998;
        m.x += m.vx;
        m.y += m.vy;
        if (m.x < m.r) { m.x = m.r; m.vx = -m.vx * 0.78; }
        if (m.x > W - m.r) { m.x = W - m.r; m.vx = -m.vx * 0.78; }
        for (const p of platforms) collideMarble(m, p);
        m.trail.push({ x: m.x, y: m.y });
        if (m.trail.length > 16) m.trail.shift();
        if (m.y > H + 120) {
          m.y = -30 - Math.random() * 40;
          m.x = 60 + Math.random() * (W - 120);
          m.vy = 0; m.vx = (Math.random() - 0.5) * 1.6;
          m.hue = (m.hue + 33) % 360;
        }
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.07;
        p.vx *= 0.98;
        p.life -= 0.028;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    // Render --------------------------------------------------------------
    function draw(now) {
      ctx.fillStyle = 'rgba(10, 5, 20, 0.32)';
      ctx.fillRect(0, 0, W, H);
      // platforms
      for (const p of platforms) {
        const since = now - p.lastBounce;
        const glow = Math.max(0, 1 - since / 650);
        const baseLight = 52 + glow * 26;
        ctx.lineCap = 'round';
        ctx.lineWidth = p.thickness + glow * 4.5;
        ctx.shadowBlur = 8 + glow * 22;
        ctx.shadowColor = `hsl(${p.hue}, 100%, 58%)`;
        ctx.strokeStyle = `hsl(${p.hue}, 100%, ${baseLight}%)`;
        ctx.beginPath();
        ctx.moveTo(p.x1, p.y1);
        ctx.lineTo(p.x2, p.y2);
        ctx.stroke();
        if (glow > 0.05) {
          ctx.lineWidth = 1 + glow * 1.5;
          ctx.strokeStyle = `rgba(255,255,255,${0.65 * glow})`;
          ctx.shadowBlur = 0;
          ctx.stroke();
        }
      }
      ctx.shadowBlur = 0;
      // marbles
      for (const m of marbles) {
        for (let i = 0; i < m.trail.length - 1; i++) {
          const t = m.trail[i];
          const alpha = (i / m.trail.length) * 0.45;
          ctx.fillStyle = `hsla(${m.hue}, 100%, 65%, ${alpha})`;
          ctx.beginPath();
          ctx.arc(t.x, t.y, m.r * (0.35 + i / m.trail.length * 0.5), 0, Math.PI * 2);
          ctx.fill();
        }
        const grad = ctx.createRadialGradient(m.x - m.r * 0.35, m.y - m.r * 0.35, 0.5, m.x, m.y, m.r * 1.05);
        grad.addColorStop(0, `hsl(${m.hue}, 100%, 92%)`);
        grad.addColorStop(0.4, `hsl(${m.hue}, 100%, 64%)`);
        grad.addColorStop(1, `hsl(${m.hue}, 80%, 32%)`);
        ctx.fillStyle = grad;
        ctx.shadowBlur = 22;
        ctx.shadowColor = `hsl(${m.hue}, 100%, 55%)`;
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      // particles
      for (const p of particles) {
        ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${p.life})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
      // drag preview
      if (drag.active && drag.moved) {
        const hue = (performance.now() * 0.08) % 360;
        ctx.strokeStyle = `hsla(${hue}, 100%, 70%, 0.75)`;
        ctx.lineWidth = 3;
        ctx.setLineDash([6, 6]);
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(drag.x1, drag.y1);
        ctx.lineTo(drag.x2, drag.y2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min(48, now - last);
      last = now;
      step(dt);
      draw(now);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // Auto-drop -----------------------------------------------------------
    let autoTimer = 0;
    setInterval(() => {
      if (!autoDrop) return;
      if (marbles.length >= MAX_MARBLES) return;
      addMarble(80 + Math.random() * (W - 160), -20);
      initAudio();
    }, 1400);

    // Stats HUD -----------------------------------------------------------
    setInterval(() => {
      sMarbles.textContent = marbles.length;
      sPlatforms.textContent = platforms.length;
    }, 180);

    // Interaction ---------------------------------------------------------
    const drag = { active: false, moved: false, x1: 0, y1: 0, x2: 0, y2: 0, startTime: 0 };
    let hintDimmed = false;
    function dimHint() {
      if (hintDimmed) return;
      hintDimmed = true;
      hintEl.classList.add('dim');
      setTimeout(() => hintEl.style.display = 'none', 2500);
    }

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      initAudio();
      const rect = canvas.getBoundingClientRect();
      drag.x1 = e.clientX - rect.left;
      drag.y1 = e.clientY - rect.top;
      drag.x2 = drag.x1; drag.y2 = drag.y1;
      drag.active = true;
      drag.moved = false;
      drag.startTime = performance.now();
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', (e) => {
      if (!drag.active) return;
      const rect = canvas.getBoundingClientRect();
      drag.x2 = e.clientX - rect.left;
      drag.y2 = e.clientY - rect.top;
      if (Math.hypot(drag.x2 - drag.x1, drag.y2 - drag.y1) > 6) drag.moved = true;
    });
    canvas.addEventListener('pointerup', (e) => {
      if (!drag.active) return;
      drag.active = false;
      const len = Math.hypot(drag.x2 - drag.x1, drag.y2 - drag.y1);
      if (len < MIN_DRAG) {
        addMarble(drag.x1, drag.y1);
      } else {
        addPlatform(drag.x1, drag.y1, drag.x2, drag.y2);
      }
      dimHint();
    });
    canvas.addEventListener('pointercancel', () => { drag.active = false; });
    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      // remove nearest platform within 20px
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      let best = -1, bestD = 22;
      platforms.forEach((p, i) => {
        const dx = p.x2 - p.x1, dy = p.y2 - p.y1;
        const len = Math.hypot(dx, dy) || 1;
        const nx = dx / len, ny = dy / len;
        const t = Math.max(0, Math.min(len, (mx - p.x1) * nx + (my - p.y1) * ny));
        const px = p.x1 + nx * t, py = p.y1 + ny * t;
        const d = Math.hypot(mx - px, my - py);
        if (d < bestD) { bestD = d; best = i; }
      });
      if (best >= 0) platforms.splice(best, 1);
    });

    // Controls wiring -----------------------------------------------------
    document.getElementById('scale').addEventListener('change', (e) => { currentScale = e.target.value; });
    document.getElementById('root').addEventListener('change', (e) => { currentRoot = ROOTS[e.target.value]; });
    document.getElementById('gravity').addEventListener('input', (e) => { gravity = parseFloat(e.target.value); });
    document.getElementById('auto').addEventListener('change', (e) => { autoDrop = e.target.checked; if (autoDrop) initAudio(); });
    document.getElementById('preset').addEventListener('click', () => {
      initAudio();
      platforms.length = 0;
      const bands = 5;
      for (let b = 0; b < bands; b++) {
        const y = 140 + b * (H - 220) / (bands - 1);
        const segs = 2 + Math.floor(Math.random() * 2);
        for (let s = 0; s < segs; s++) {
          const x1 = (s / segs) * W + 40 + Math.random() * 20;
          const x2 = ((s + 1) / segs) * W - 40 - Math.random() * 20;
          const slope = (Math.random() - 0.5) * 80;
          addPlatform(x1, y - slope / 2, x2, y + slope / 2);
        }
      }
      // seed 3 marbles
      for (let i = 0; i < 3; i++) {
        addMarble(160 + i * (W - 320) / 2, -40, { vx: (Math.random() - 0.5) * 2 });
      }
      dimHint();
    });
    document.getElementById('clearMarbles').addEventListener('click', () => { marbles.length = 0; particles.length = 0; });
    document.getElementById('clearAll').addEventListener('click', () => {
      marbles.length = 0; platforms.length = 0; particles.length = 0;
    });

    // Keyboard shortcuts --------------------------------------------------
    addEventListener('keydown', (e) => {
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
      if (e.key === ' ') { e.preventDefault(); initAudio(); addMarble(W / 2 + (Math.random() - 0.5) * 200, -20); dimHint(); }
      else if (e.key.toLowerCase() === 'c') { marbles.length = 0; particles.length = 0; }
      else if (e.key.toLowerCase() === 'p') { document.getElementById('preset').click(); }
      else if (e.key.toLowerCase() === 'a') { const el = document.getElementById('auto'); el.checked = !el.checked; el.dispatchEvent(new Event('change')); }
    });
  })();
  </script>
</body>
</html>
