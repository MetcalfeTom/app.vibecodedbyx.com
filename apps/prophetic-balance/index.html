<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prophetic Balance — Walk on Water</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌊">
<meta property="og:title" content="Prophetic Balance">
<meta property="og:description" content="Keep your faith. Keep your rhythm. Walk on water.">
<meta property="og:url" content="https://sloppy.live/prophetic-balance">
<meta property="og:image" content="https://sloppy.live/prophetic-balance/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --deep:#060d1a;--water:#0a1a30;--foam:#1a3a5a;
  --gold:#d4a840;--light:#f0e8d0;--dim:#3a4a5a;
  --text:#7a8a9a;--bright:#c0d0e0;
}
body{background:var(--deep);color:var(--text);font-family:'Cormorant Garamond',serif;
  min-height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center}
canvas{display:block;width:100vw;height:100vh}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#hud{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:28px;
  font-size:14px;color:var(--bright);text-shadow:0 1px 8px rgba(0,0,0,.5)}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.hud-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:2px}
.hud-val{font-weight:700;font-size:22px}
#faithBar{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:clamp(200px,40vw,320px);
  height:6px;background:rgba(10,26,48,.8);border-radius:3px;overflow:hidden;border:1px solid var(--dim)}
#faithFill{height:100%;width:100%;background:linear-gradient(90deg,var(--gold),#f0d060);
  border-radius:3px;transition:width .15s}
#prompt{position:absolute;bottom:clamp(100px,18vh,160px);left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none}
#keys{display:flex;gap:12px;justify-content:center;margin-bottom:12px}
.key-slot{width:54px;height:54px;border:2px solid var(--dim);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;
  font-size:22px;font-weight:700;color:var(--dim);background:rgba(6,13,26,.7);
  transition:all .12s;position:relative}
.key-slot.active{border-color:var(--gold);color:var(--gold);box-shadow:0 0 20px rgba(212,168,64,.3);
  transform:scale(1.1)}
.key-slot.hit{border-color:#40d080;color:#40d080;box-shadow:0 0 20px rgba(64,208,128,.4);
  background:rgba(64,208,128,.1)}
.key-slot.miss{border-color:#d04040;color:#d04040;box-shadow:0 0 20px rgba(208,64,64,.4);
  background:rgba(208,64,64,.1)}
.key-slot .timing{position:absolute;bottom:-16px;font-size:9px;letter-spacing:1px}
#beatLine{width:clamp(200px,40vw,320px);height:3px;background:var(--dim);border-radius:2px;
  margin:0 auto;position:relative;overflow:visible}
#beatDot{width:10px;height:10px;background:var(--gold);border-radius:50%;position:absolute;
  top:-3.5px;transition:none;box-shadow:0 0 8px rgba(212,168,64,.5)}
#message{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(16px,3vw,24px);font-weight:300;color:var(--gold);opacity:0;
  text-shadow:0 0 20px rgba(212,168,64,.3);transition:opacity .4s;letter-spacing:2px;
  text-align:center;pointer-events:none}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(6,13,26,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;pointer-events:auto}
#overlay.hidden{display:none}
#overlay h1{font-size:clamp(28px,5vw,48px);font-weight:700;color:var(--gold);
  letter-spacing:3px;margin-bottom:4px;text-shadow:0 2px 20px rgba(212,168,64,.3)}
#overlay .sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);margin-bottom:24px;letter-spacing:1px}
#overlay .instructions{max-width:380px;text-align:center;font-size:14px;color:var(--text);
  line-height:1.8;margin-bottom:24px}
#overlay .instructions b{color:var(--bright)}
#overlay .stats{font-size:13px;color:var(--text);line-height:2;margin-bottom:20px;text-align:center}
#overlay .stats span{color:var(--gold);font-weight:600}
#startBtn{background:transparent;border:2px solid var(--gold);color:var(--gold);
  font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;padding:14px 40px;
  border-radius:6px;cursor:pointer;letter-spacing:3px;transition:all .2s;pointer-events:auto}
#startBtn:hover{background:var(--gold);color:var(--deep);box-shadow:0 0 30px rgba(212,168,64,.3)}
.touch-keys{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;
  z-index:15;pointer-events:auto}
.touch-btn{width:64px;height:64px;border:2px solid var(--dim);border-radius:12px;
  background:rgba(6,13,26,.8);color:var(--dim);font-family:'DM Mono',monospace;font-size:24px;
  font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .1s;-webkit-tap-highlight-color:transparent}
.touch-btn:active{border-color:var(--gold);color:var(--gold);background:rgba(212,168,64,.1)}
@media(min-width:800px){.touch-keys{display:none}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hud-item"><span class="hud-label">DISTANCE</span><span class="hud-val" id="distVal">0</span></div>
    <div class="hud-item"><span class="hud-label">STREAK</span><span class="hud-val" id="streakVal">0</span></div>
    <div class="hud-item"><span class="hud-label">BEST</span><span class="hud-val" id="bestVal">0</span></div>
  </div>
  <div id="faithBar"><div id="faithFill"></div></div>
  <div id="prompt">
    <div id="keys"></div>
    <div id="beatLine"><div id="beatDot"></div></div>
  </div>
  <div id="message"></div>
  <div id="overlay">
    <h1>PROPHETIC BALANCE</h1>
    <div class="sub">walk on water</div>
    <div class="instructions">
      Press the <b>highlighted key</b> in rhythm with the beat.<br>
      Stay on beat to maintain <b>faith</b>.<br>
      Lose faith and you <b>sink</b>.
    </div>
    <div class="stats" id="finalStats"></div>
    <button id="startBtn">BEGIN</button>
  </div>
</div>
<div class="touch-keys" id="touchKeys"></div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const messageEl = document.getElementById('message');
const keysEl = document.getElementById('keys');
const beatDot = document.getElementById('beatDot');
const touchKeysEl = document.getElementById('touchKeys');

const BALANCE_KEYS = ['A','S','D','F','J','K','L'];
const ACTIVE_KEYS = 4; // how many keys shown at once
let W, H;

// Game state
let playing = false;
let faith = 100; // 0-100, sink at 0
let distance = 0;
let streak = 0;
let maxStreak = 0;
let bestDistance = parseInt(localStorage.getItem('prophetic-best') || '0');
let bpm = 72; // beats per minute, increases with distance
let beatInterval, lastBeatTime, beatPhase;
let currentKeys = [];
let activeKeyIdx = 0; // which key to press next
let sinkDepth = 0; // 0=surface, 1=sunk
let playerY = 0; // visual bob
let ripples = [];
let footsteps = [];
let clouds = [];
let waterPhase = 0;
let messages = [];
let gameStartTime = 0;

// Spiritual messages at milestones
const BLESSINGS = [
  'Your faith steadies the waters...',
  'The deep obeys your step.',
  'Walk without doubt.',
  'The horizon bends to greet you.',
  'Even the wind holds its breath.',
  'Grace carries you forward.',
  'The waters remember your name.',
  'You are lighter than the deep.',
  'Stillness beneath, courage above.',
  'The path reveals itself to those who walk.',
  'Your rhythm is a prayer.',
  'The sea parts in reverence.',
  'Balance is a conversation with the infinite.',
  'Each step writes a verse on the water.',
  'The deep has no claim on you.',
];

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

// Init key slots
function initKeys(){
  // Pick random subset of keys
  const shuffled = [...BALANCE_KEYS].sort(() => Math.random()-0.5);
  currentKeys = shuffled.slice(0, ACTIVE_KEYS);
  activeKeyIdx = 0;

  keysEl.innerHTML = '';
  currentKeys.forEach((k,i) => {
    const slot = document.createElement('div');
    slot.className = 'key-slot';
    slot.id = 'key-' + k;
    slot.textContent = k;
    const timing = document.createElement('span');
    timing.className = 'timing';
    slot.appendChild(timing);
    keysEl.appendChild(slot);
  });

  // Touch buttons
  touchKeysEl.innerHTML = '';
  currentKeys.forEach(k => {
    const btn = document.createElement('div');
    btn.className = 'touch-btn';
    btn.textContent = k;
    btn.addEventListener('touchstart', e => { e.preventDefault(); handleKey(k); }, {passive:false});
    touchKeysEl.appendChild(btn);
  });

  highlightNext();
}

function highlightNext(){
  document.querySelectorAll('.key-slot').forEach(el => el.classList.remove('active','hit','miss'));
  const next = document.getElementById('key-' + currentKeys[activeKeyIdx]);
  if(next) next.classList.add('active');
}

function advancePattern(){
  activeKeyIdx = (activeKeyIdx + 1) % currentKeys.length;
  // Occasionally shuffle keys at distance milestones
  if(distance > 0 && distance % 30 === 0){
    const shuffled = [...BALANCE_KEYS].sort(() => Math.random()-0.5);
    currentKeys = shuffled.slice(0, ACTIVE_KEYS);
    keysEl.innerHTML = '';
    currentKeys.forEach(k => {
      const slot = document.createElement('div');
      slot.className = 'key-slot';
      slot.id = 'key-' + k;
      slot.textContent = k;
      const timing = document.createElement('span');
      timing.className = 'timing';
      slot.appendChild(timing);
      keysEl.appendChild(slot);
    });
    // Update touch buttons
    touchKeysEl.innerHTML = '';
    currentKeys.forEach(k => {
      const btn = document.createElement('div');
      btn.className = 'touch-btn';
      btn.textContent = k;
      btn.addEventListener('touchstart', e => { e.preventDefault(); handleKey(k); }, {passive:false});
      touchKeysEl.appendChild(btn);
    });
    activeKeyIdx = 0;
  }
  highlightNext();
}

function getBeatWindow(){
  return 60000 / bpm; // ms per beat
}

function getBeatTiming(){
  // How close to the beat are we? Returns 0-1 (0=perfect, 1=worst)
  const interval = getBeatWindow();
  const elapsed = Date.now() - lastBeatTime;
  const half = interval / 2;
  const off = Math.abs(elapsed % interval - half);
  return off / half; // 0=dead center, 1=furthest from beat
}

function handleKey(key){
  if(!playing) return;
  const expectedKey = currentKeys[activeKeyIdx];
  const slot = document.getElementById('key-' + key);

  if(key === expectedKey){
    const timing = getBeatTiming();
    let grade, faithGain;
    if(timing < 0.2){ grade = 'PERFECT'; faithGain = 8; }
    else if(timing < 0.4){ grade = 'GREAT'; faithGain = 5; }
    else if(timing < 0.65){ grade = 'GOOD'; faithGain = 2; }
    else { grade = 'LATE'; faithGain = -2; }

    faith = Math.min(100, faith + faithGain);
    streak++;
    if(streak > maxStreak) maxStreak = streak;
    distance++;

    // Speed up gradually
    bpm = Math.min(160, 72 + distance * 0.5);

    // Visual feedback
    if(slot){
      slot.classList.remove('active');
      slot.classList.add('hit');
      const timingEl = slot.querySelector('.timing');
      if(timingEl){ timingEl.textContent = grade; timingEl.style.color = faithGain>0?'#40d080':'#d08040'; }
      setTimeout(()=>{ slot.classList.remove('hit'); if(timingEl) timingEl.textContent=''; }, 300);
    }

    // Footstep ripple
    addRipple(W/2 + (Math.random()-0.5)*40, H*0.55);
    footsteps.push({ x: W/2, y: H*0.55, age:0, side: distance%2===0?-1:1 });

    // Milestone messages
    if(distance % 15 === 0){
      showMessage(BLESSINGS[Math.floor(distance/15) % BLESSINGS.length]);
    }

    advancePattern();
  } else {
    // Wrong key
    faith = Math.max(0, faith - 8);
    streak = 0;
    if(slot){
      slot.classList.add('miss');
      const timingEl = slot.querySelector('.timing');
      if(timingEl){ timingEl.textContent = 'WRONG'; timingEl.style.color='#d04040'; }
      setTimeout(()=>{ slot.classList.remove('miss'); if(timingEl) timingEl.textContent=''; }, 300);
    }
  }
}

function addRipple(x, y){
  ripples.push({ x, y, r:0, maxR: 30+Math.random()*20, alpha:0.6 });
}

function showMessage(text){
  messageEl.textContent = text;
  messageEl.style.opacity = '1';
  setTimeout(()=> messageEl.style.opacity = '0', 2500);
}

// Drawing
function drawWater(){
  const t = Date.now() / 1000;
  waterPhase = t;

  // Deep water gradient
  const grad = ctx.createLinearGradient(0, H*0.3, 0, H);
  grad.addColorStop(0, '#081828');
  grad.addColorStop(0.4, '#0a1a30');
  grad.addColorStop(1, '#040c18');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H*0.3, W, H*0.7);

  // Wave lines
  ctx.strokeStyle = 'rgba(40,80,120,0.15)';
  ctx.lineWidth = 1;
  for(let row=0; row<12; row++){
    const y = H*0.35 + row * H*0.05;
    ctx.beginPath();
    for(let x=0; x<=W; x+=4){
      const wave = Math.sin(x*0.008 + t*1.2 + row*0.7) * (3+row*0.8)
                 + Math.sin(x*0.015 + t*0.8 - row*0.3) * 2;
      ctx.lineTo(x, y + wave);
    }
    ctx.stroke();
  }

  // Light caustics on water
  for(let i=0;i<8;i++){
    const cx = (Math.sin(t*0.3 + i*2.1) * 0.3 + 0.5) * W;
    const cy = H*0.4 + Math.sin(t*0.5 + i*1.7) * H*0.1;
    const r = 30 + Math.sin(t + i)*15;
    ctx.fillStyle = `rgba(100,180,255,${0.015 + Math.sin(t*0.7+i)*0.008})`;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r*0.4, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawSky(){
  const grad = ctx.createLinearGradient(0, 0, 0, H*0.4);
  grad.addColorStop(0, '#0a0e1a');
  grad.addColorStop(0.5, '#10182a');
  grad.addColorStop(1, '#081828');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H*0.4);

  // Stars
  const t = Date.now()/1000;
  for(let i=0;i<50;i++){
    const sx = (Math.sin(i*127.1)*0.5+0.5)*W;
    const sy = (Math.sin(i*311.7)*0.5+0.5)*H*0.3;
    const twinkle = Math.sin(t*0.5+i*2.3)*0.3+0.7;
    ctx.fillStyle = `rgba(200,220,255,${twinkle*0.4})`;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Moon
  const moonX = W*0.75, moonY = H*0.12;
  ctx.fillStyle = 'rgba(240,232,200,0.04)';
  ctx.beginPath();
  ctx.arc(moonX, moonY, 60, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(240,232,200,0.12)';
  ctx.beginPath();
  ctx.arc(moonX, moonY, 30, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(240,232,200,0.6)';
  ctx.beginPath();
  ctx.arc(moonX, moonY, 16, 0, Math.PI*2);
  ctx.fill();

  // Moon reflection on water
  ctx.fillStyle = 'rgba(240,232,200,0.03)';
  ctx.beginPath();
  ctx.ellipse(moonX, H*0.5, 8, H*0.15, 0, 0, Math.PI*2);
  ctx.fill();

  // Clouds
  clouds.forEach(c => {
    ctx.fillStyle = `rgba(20,30,50,${c.alpha})`;
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w, c.h, 0, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawPlayer(){
  const t = Date.now()/1000;
  const cx = W/2;
  const waterLine = H*0.55;

  // Sink depth affects y
  const sinkY = sinkDepth * 60;
  const bob = Math.sin(t*2) * (2 - sinkDepth*2);
  const py = waterLine - 30 + sinkY + bob;

  // Walking sway
  const sway = playing ? Math.sin(t * (bpm/60) * Math.PI) * 4 : 0;

  ctx.save();
  ctx.translate(cx + sway, py);

  // Robe / body
  const robeGrad = ctx.createLinearGradient(0, -20, 0, 30);
  robeGrad.addColorStop(0, '#e8dcc0');
  robeGrad.addColorStop(0.5, '#c8b898');
  robeGrad.addColorStop(1, '#a89878');
  ctx.fillStyle = robeGrad;
  ctx.beginPath();
  ctx.moveTo(-12, -8);
  ctx.lineTo(-16, 28);
  ctx.lineTo(16, 28);
  ctx.lineTo(12, -8);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.fillStyle = '#ddc8a0';
  ctx.beginPath();
  ctx.arc(0, -16, 9, 0, Math.PI*2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#4a3828';
  ctx.beginPath();
  ctx.arc(0, -19, 8, Math.PI, Math.PI*2);
  ctx.fill();

  // Arms (swaying with steps)
  const armSwing = playing ? Math.sin(t*(bpm/60)*Math.PI) * 15 : 0;
  ctx.strokeStyle = '#c8b898';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  // Left arm
  ctx.beginPath();
  ctx.moveTo(-10, -2);
  ctx.lineTo(-18, 10 + Math.sin(armSwing*0.03)*5);
  ctx.stroke();
  // Right arm
  ctx.beginPath();
  ctx.moveTo(10, -2);
  ctx.lineTo(18, 10 - Math.sin(armSwing*0.03)*5);
  ctx.stroke();

  // Golden halo (stronger with more faith)
  const haloAlpha = faith / 100 * 0.3;
  ctx.strokeStyle = `rgba(212,168,64,${haloAlpha})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, -24, 12 + Math.sin(t*2)*1, 4, 0, 0, Math.PI*2);
  ctx.stroke();
  ctx.fillStyle = `rgba(212,168,64,${haloAlpha*0.3})`;
  ctx.beginPath();
  ctx.ellipse(0, -24, 12, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Submerge effect
  if(sinkDepth > 0.1){
    ctx.fillStyle = `rgba(10,26,48,${sinkDepth*0.6})`;
    ctx.fillRect(-20, 28 - sinkDepth*30, 40, sinkDepth*60);
  }

  ctx.restore();

  // Shadow/reflection on water
  ctx.fillStyle = `rgba(0,0,0,${0.15 - sinkDepth*0.1})`;
  ctx.beginPath();
  ctx.ellipse(cx, waterLine + 2, 14, 3, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawRipples(){
  ripples.forEach(r => {
    ctx.strokeStyle = `rgba(100,180,240,${r.alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, r.r, r.r*0.3, 0, 0, Math.PI*2);
    ctx.stroke();
  });
}

function drawFootsteps(){
  footsteps.forEach(f => {
    const alpha = Math.max(0, 0.3 - f.age*0.005);
    ctx.fillStyle = `rgba(200,220,240,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(f.x + f.side*12, f.y + 5, 5, 2, f.side*0.2, 0, Math.PI*2);
    ctx.fill();
  });
}

function updateHUD(){
  document.getElementById('distVal').textContent = distance;
  document.getElementById('streakVal').textContent = streak;
  document.getElementById('bestVal').textContent = bestDistance;
  document.getElementById('faithFill').style.width = faith + '%';
}

function gameOverSequence(){
  playing = false;
  showMessage('Your faith wavered...');
  if(distance > bestDistance){
    bestDistance = distance;
    localStorage.setItem('prophetic-best', bestDistance);
  }
  setTimeout(()=>{
    document.getElementById('finalStats').innerHTML = `
      Distance: <span>${distance} steps</span><br>
      Max streak: <span>${maxStreak}</span><br>
      Best ever: <span>${bestDistance} steps</span>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('startBtn').textContent = 'WALK AGAIN';
  }, 2000);
}

function startGame(){
  faith = 100; distance = 0; streak = 0; maxStreak = 0;
  sinkDepth = 0; bpm = 72;
  ripples = []; footsteps = [];
  playing = true;
  lastBeatTime = Date.now();
  overlay.classList.add('hidden');
  initKeys();
  gameStartTime = Date.now();
}

document.getElementById('startBtn').onclick = startGame;

// Keyboard
document.addEventListener('keydown', e => {
  const key = e.key.toUpperCase();
  if(currentKeys.includes(key)){
    e.preventDefault();
    handleKey(key);
  }
});

// Init clouds
for(let i=0;i<6;i++){
  clouds.push({
    x: Math.random()*W*1.5 - W*0.25,
    y: H*0.05 + Math.random()*H*0.15,
    w: 60 + Math.random()*100,
    h: 15 + Math.random()*20,
    alpha: 0.2 + Math.random()*0.2,
    speed: 0.1 + Math.random()*0.3,
  });
}

function frame(){
  resize();
  const dt = 1/60;

  if(playing){
    // Faith decays slowly, faster at higher BPM
    faith = Math.max(0, faith - (0.04 + bpm*0.0002));

    // Beat dot position
    const interval = getBeatWindow();
    const elapsed = (Date.now() - lastBeatTime) % interval;
    const beatPos = elapsed / interval;
    const lineWidth = parseInt(getComputedStyle(document.getElementById('beatLine')).width);
    beatDot.style.left = (beatPos * lineWidth - 5) + 'px';

    // Track beats for auto-miss
    if(elapsed < 50 && Date.now() - lastBeatTime > interval * 0.9){
      lastBeatTime = Date.now();
    }

    // Sink based on faith
    const targetSink = faith < 20 ? (20 - faith)/20 * 0.8 : 0;
    sinkDepth += (targetSink - sinkDepth) * 0.03;

    if(faith <= 0){
      sinkDepth = Math.min(1, sinkDepth + 0.01);
      if(sinkDepth > 0.9) gameOverSequence();
    }
  }

  // Update ripples
  ripples.forEach(r => { r.r += 0.8; r.alpha -= 0.008; });
  ripples = ripples.filter(r => r.alpha > 0);

  // Update footsteps
  footsteps.forEach(f => f.age++);
  footsteps = footsteps.filter(f => f.age < 80);

  // Update clouds
  clouds.forEach(c => {
    c.x += c.speed;
    if(c.x > W + c.w) c.x = -c.w;
  });

  // Ambient ripples
  if(Math.random() < 0.03){
    addRipple(Math.random()*W, H*0.4 + Math.random()*H*0.3);
  }

  // Draw
  ctx.clearRect(0,0,W,H);
  drawSky();
  drawWater();
  drawRipples();
  drawFootsteps();
  drawPlayer();

  updateHUD();
  requestAnimationFrame(frame);
}

frame();
</script>
</body>
</html>
