<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cube Drift</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧊">
<meta property="og:title" content="Cube Drift">
<meta property="og:description" content="Colorful cubes float and drift through space with soft gravity. A screensaver for your soul.">
<meta property="og:url" content="https://sloppy.live/cube-drift/">
<meta property="og:image" content="https://sloppy.live/cube-drift/og-image.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08080c;cursor:none}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
var CV=document.getElementById('cv');
var X=CV.getContext('2d');
var W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

var mx=-999,my=-999;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});
document.addEventListener('touchmove',function(e){mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:true});
document.addEventListener('mouseleave',function(){mx=-999;my=-999;});

// --- PALETTE ---
var PALETTES=[
  ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0'],
  ['#ee5a24','#fad390','#6a89cc','#82ccdd','#b8e994','#e55039','#4a69bd','#60a3bc'],
  ['#fd79a8','#a29bfe','#55efc4','#fdcb6e','#e17055','#0984e3','#00b894','#6c5ce7'],
];
var palette=PALETTES[Math.floor(Math.random()*PALETTES.length)];

// --- CUBES ---
var cubes=[];
var CUBE_COUNT=18;

function hslToRgba(h,s,l,a){
  return 'hsla('+h+','+s+'%,'+l+'%,'+a+')';
}

function createCube(){
  var size=20+Math.random()*45;
  var color=palette[Math.floor(Math.random()*palette.length)];
  return {
    x:Math.random()*W,
    y:Math.random()*H,
    z:0.3+Math.random()*0.7, // depth (affects size and speed)
    size:size,
    vx:(Math.random()-.5)*12,
    vy:(Math.random()-.5)*8,
    rotX:Math.random()*Math.PI*2,
    rotY:Math.random()*Math.PI*2,
    rotZ:Math.random()*Math.PI*2,
    spinX:(Math.random()-.5)*0.3,
    spinY:(Math.random()-.5)*0.4,
    spinZ:(Math.random()-.5)*0.2,
    color:color,
    alpha:0.4+Math.random()*0.4,
    pulse:Math.random()*Math.PI*2,
    pulseSpeed:0.3+Math.random()*0.6
  };
}

for(var i=0;i<CUBE_COUNT;i++) cubes.push(createCube());
// Sort by depth for painter's algorithm
cubes.sort(function(a,b){return a.z-b.z;});

// --- 3D CUBE PROJECTION ---
function project3D(x,y,z,cx,cy){
  // Simple perspective
  var fov=300;
  var scale=fov/(fov+z*100);
  return {x:cx+x*scale,y:cy+y*scale,s:scale};
}

function rotatePoint(x,y,z,rx,ry,rz){
  // Rotate around X
  var cosA=Math.cos(rx),sinA=Math.sin(rx);
  var y1=y*cosA-z*sinA,z1=y*sinA+z*cosA;
  // Rotate around Y
  var cosB=Math.cos(ry),sinB=Math.sin(ry);
  var x2=x*cosB+z1*sinB,z2=-x*sinB+z1*cosB;
  // Rotate around Z
  var cosC=Math.cos(rz),sinC=Math.sin(rz);
  var x3=x2*cosC-y1*sinC,y3=x2*sinC+y1*cosC;
  return {x:x3,y:y3,z:z2};
}

function getCubeVertices(size,rx,ry,rz){
  var h=size/2;
  var raw=[
    [-h,-h,-h],[h,-h,-h],[h,h,-h],[-h,h,-h],
    [-h,-h,h],[h,-h,h],[h,h,h],[-h,h,h]
  ];
  var verts=[];
  for(var i=0;i<8;i++){
    var r=rotatePoint(raw[i][0],raw[i][1],raw[i][2],rx,ry,rz);
    verts.push(r);
  }
  return verts;
}

var FACES=[
  [0,1,2,3],[4,5,6,7], // front, back
  [0,1,5,4],[2,3,7,6], // top, bottom
  [0,3,7,4],[1,2,6,5]  // left, right
];
var FACE_SHADES=[0.9,0.5,0.75,0.6,0.7,0.85];

function drawCube3D(cube){
  var verts=getCubeVertices(cube.size*cube.z,cube.rotX,cube.rotY,cube.rotZ);
  var cx=cube.x,cy=cube.y;
  var projected=[];
  for(var i=0;i<8;i++){
    var p=project3D(verts[i].x,verts[i].y,verts[i].z+cube.z*50,cx,cy);
    projected.push(p);
  }

  // Calculate face depths for sorting
  var faceData=[];
  for(var f=0;f<6;f++){
    var avgZ=0;
    for(var fi=0;fi<4;fi++) avgZ+=verts[FACES[f][fi]].z;
    avgZ/=4;
    faceData.push({face:FACES[f],shade:FACE_SHADES[f],z:avgZ});
  }
  faceData.sort(function(a,b){return a.z-b.z;});

  // Glow
  var pulse=Math.sin(cube.pulse)*0.15+0.85;
  var glowR=cube.size*cube.z*1.5*pulse;
  var grd=X.createRadialGradient(cx,cy,0,cx,cy,glowR);
  grd.addColorStop(0,cube.color+'22');
  grd.addColorStop(1,'transparent');
  X.fillStyle=grd;
  X.beginPath();X.arc(cx,cy,glowR,0,Math.PI*2);X.fill();

  // Draw faces back-to-front
  for(var f=0;f<6;f++){
    var face=faceData[f].face;
    var shade=faceData[f].shade*pulse;
    X.beginPath();
    X.moveTo(projected[face[0]].x,projected[face[0]].y);
    for(var fi=1;fi<4;fi++) X.lineTo(projected[face[fi]].x,projected[face[fi]].y);
    X.closePath();
    // Parse color and apply shade
    X.fillStyle=cube.color;
    X.globalAlpha=cube.alpha*shade*0.5;
    X.fill();
    X.globalAlpha=cube.alpha*shade*0.8;
    X.strokeStyle=cube.color;
    X.lineWidth=1.5*cube.z;
    X.stroke();
  }
  X.globalAlpha=1;
}

// --- SOFT GRAVITY POINT ---
var gravX=W/2,gravY=H/2;
var gravAngle=0;

// --- UPDATE ---
function update(dt){
  // Gravity center orbits slowly
  gravAngle+=dt*0.08;
  gravX=W/2+Math.sin(gravAngle)*W*0.15;
  gravY=H/2+Math.cos(gravAngle*0.7)*H*0.12;

  for(var i=0;i<cubes.length;i++){
    var c=cubes[i];

    // Soft gravity toward center
    var dx=gravX-c.x,dy=gravY-c.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>1){
      var gForce=8/(dist*0.01+1);
      c.vx+=dx/dist*gForce*dt;
      c.vy+=dy/dist*gForce*dt;
    }

    // Mouse repulsion
    if(mx>0){
      var mdx=c.x-mx,mdy=c.y-my;
      var mdist=Math.sqrt(mdx*mdx+mdy*mdy);
      if(mdist<200&&mdist>1){
        var repel=(200-mdist)*0.3;
        c.vx+=mdx/mdist*repel*dt;
        c.vy+=mdy/mdist*repel*dt;
      }
    }

    // Cube-cube soft repulsion
    for(var j=i+1;j<cubes.length;j++){
      var o=cubes[j];
      var cx2=c.x-o.x,cy2=c.y-o.y;
      var cd=Math.sqrt(cx2*cx2+cy2*cy2);
      var minDist=(c.size*c.z+o.size*o.z)*0.8;
      if(cd<minDist&&cd>1){
        var push=(minDist-cd)*0.5;
        var nx=cx2/cd,ny=cy2/cd;
        c.vx+=nx*push*dt;c.vy+=ny*push*dt;
        o.vx-=nx*push*dt;o.vy-=ny*push*dt;
      }
    }

    // Damping for relaxing drift
    c.vx*=Math.pow(0.3,dt);
    c.vy*=Math.pow(0.3,dt);

    // Speed cap
    var speed=Math.sqrt(c.vx*c.vx+c.vy*c.vy);
    if(speed>40){c.vx=c.vx/speed*40;c.vy=c.vy/speed*40;}

    c.x+=c.vx*dt;
    c.y+=c.vy*dt;

    // Soft boundary
    var margin=80;
    if(c.x<margin)c.vx+=20*dt;
    if(c.x>W-margin)c.vx-=20*dt;
    if(c.y<margin)c.vy+=20*dt;
    if(c.y>H-margin)c.vy-=20*dt;

    // Rotation
    c.rotX+=c.spinX*dt;
    c.rotY+=c.spinY*dt;
    c.rotZ+=c.spinZ*dt;

    // Pulse
    c.pulse+=c.pulseSpeed*dt;
  }
}

// --- TRAILS ---
// Fading background creates trail effect

// --- DRAW ---
function draw(){
  // Fade previous frame for trail
  X.fillStyle='rgba(8,8,12,0.12)';
  X.fillRect(0,0,W,H);

  // Very subtle radial glow at gravity center
  var grd=X.createRadialGradient(gravX,gravY,0,gravX,gravY,H*0.4);
  grd.addColorStop(0,'rgba(30,25,50,0.02)');
  grd.addColorStop(1,'transparent');
  X.fillStyle=grd;
  X.fillRect(0,0,W,H);

  // Draw cubes sorted by depth
  for(var i=0;i<cubes.length;i++){
    drawCube3D(cubes[i]);
  }
}

// --- CONNECTION LINES ---
function drawConnections(){
  for(var i=0;i<cubes.length;i++){
    for(var j=i+1;j<cubes.length;j++){
      var a=cubes[i],b=cubes[j];
      var dx=a.x-b.x,dy=a.y-b.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<200){
        var alpha=(1-dist/200)*0.06;
        X.strokeStyle='rgba(255,255,255,'+alpha+')';
        X.lineWidth=0.5;
        X.beginPath();X.moveTo(a.x,a.y);X.lineTo(b.x,b.y);X.stroke();
      }
    }
  }
}

// --- MAIN LOOP ---
var lastTime=performance.now();
function loop(now){
  var dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  update(dt);
  draw();
  drawConnections();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Change palette on click
document.addEventListener('click',function(){
  palette=PALETTES[Math.floor(Math.random()*PALETTES.length)];
  for(var i=0;i<cubes.length;i++) cubes[i].color=palette[Math.floor(Math.random()*palette.length)];
});
document.addEventListener('touchstart',function(){
  palette=PALETTES[Math.floor(Math.random()*PALETTES.length)];
  for(var i=0;i<cubes.length;i++) cubes[i].color=palette[Math.floor(Math.random()*palette.length)];
});
</script>
</body>
</html>
