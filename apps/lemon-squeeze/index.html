<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemon Squeeze</title>
<meta name="description" content="Click the big lemon. Make juice. Buy juicers, stands and trees until the juice makes itself.">
<link rel="icon" href="https://emojicdn.elk.sh/🍋">
<meta property="og:title" content="Lemon Squeeze">
<meta property="og:description" content="One big lemon. Infinite juice. Click it, squeeze it, industrialize it.">
<meta property="og:url" content="https://sloppy.live/lemon-squeeze/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/one%20giant%20glossy%20lemon%20with%20green%20tip%20on%20bright%20sunny%20yellow%20background%2C%20juice%20droplets%20flying%2C%20cheerful%20cartoon%20poster%20style%2C%20bold%20shapes.png?width=1200&height=630&seed=7734&model=flux&nologo=true">
<style>
  :root{
    --sun:#ffd94a;
    --sun-deep:#ffc21a;
    --cream:#fff9e8;
    --ink:#4a3200;
    --leaf:#3e8a2e;
    --leaf-deep:#2c6b20;
    --pulp:#ffef9e;
    --hot:#e8541a;
    --card:#fffdf4;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Baloo 2", sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 22% 18%, rgba(255,255,255,0.55), transparent 34%),
      radial-gradient(circle at 78% 82%, rgba(255,171,26,0.35), transparent 40%),
      repeating-conic-gradient(from 0.12turn at 50% 42%, var(--sun) 0deg 14deg, var(--sun-deep) 14deg 28deg);
    min-height:100dvh;
    /* the requested green-tipped lemon cursor */
    cursor:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30"><ellipse cx="16" cy="17" rx="11" ry="9" transform="rotate(-28 16 17)" fill="%23ffd21a" stroke="%234a3200" stroke-width="1.4"/><ellipse cx="12" cy="14" rx="3.4" ry="2.2" transform="rotate(-28 12 14)" fill="%23fff3a6"/><circle cx="25.2" cy="9.4" r="3.1" fill="%233e8a2e" stroke="%234a3200" stroke-width="1.2"/><path d="M24 6.8 Q28 4 29 7.5 Q26 9 24 6.8" fill="%2355b23e"/></svg>') 15 15, auto;
  }
  main{
    max-width:64rem;
    margin:0 auto;
    padding:1rem 1rem 3rem;
    display:grid;
    grid-template-columns:1fr 21rem;
    gap:1.2rem;
    align-items:start;
  }
  header.top{
    grid-column:1 / -1;
    text-align:center;
    padding-top:0.6rem;
  }
  h1{
    font-family:"Lilita One", sans-serif;
    font-size:clamp(2.2rem, 7vw, 3.8rem);
    letter-spacing:0.02em;
    color:var(--ink);
    text-shadow:0.18rem 0.18rem 0 rgba(255,255,255,0.75), 0.3rem 0.3rem 0 rgba(232,84,26,0.35);
  }
  h1 .zest{ color:var(--hot); }
  .tag{
    font-size:1.05rem;
    font-weight:600;
    color:#6b4c00;
  }

  /* ── squeeze side ── */
  .squeezer{
    display:flex; flex-direction:column;
    align-items:center;
    gap:0.4rem;
    position:relative;
  }
  .counts{
    text-align:center;
    background:var(--cream);
    border:0.2rem solid var(--ink);
    border-radius:1.2rem;
    box-shadow:0.35rem 0.35rem 0 rgba(74,50,0,0.35);
    padding:0.5rem 1.6rem 0.7rem;
    min-width:16rem;
  }
  #juice{
    font-family:"Lilita One", sans-serif;
    font-size:clamp(1.9rem, 5vw, 2.8rem);
    line-height:1.1;
  }
  .rates{
    display:flex; gap:1.2rem; justify-content:center;
    font-size:0.95rem; font-weight:600; color:#6b4c00;
  }
  #bigLemon{
    background:none; border:none;
    width:min(19rem, 62vw);
    aspect-ratio:1;
    margin-top:0.8rem;
    filter:drop-shadow(0 1.2rem 1.6rem rgba(120,70,0,0.35));
    transition:transform 0.08s ease;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  #bigLemon:active{ transform:scale(0.94); }
  #bigLemon.squish svg{ animation:squish 0.16s ease; }
  #bigLemon:focus-visible{ outline:0.3rem solid var(--hot); outline-offset:0.5rem; border-radius:50%; }
  @keyframes squish{
    0%{ transform:scale(1,1); }
    45%{ transform:scale(1.09, 0.86) rotate(-2deg); }
    100%{ transform:scale(1,1); }
  }
  #bigLemon svg{ width:100%; height:100%; display:block; }
  .drop{
    position:absolute;
    width:0.85rem; height:1.1rem;
    background:radial-gradient(circle at 35% 30%, #fff8c0, #ffd21a 70%);
    border:2px solid rgba(74,50,0,0.7);
    border-radius:50% 50% 55% 55% / 40% 40% 62% 62%;
    pointer-events:none;
    z-index:4;
  }
  .plusone{
    position:absolute;
    font-family:"Lilita One", sans-serif;
    font-size:1.3rem;
    color:var(--ink);
    text-shadow:0.1rem 0.1rem 0 rgba(255,255,255,0.8);
    pointer-events:none;
    animation:rise 0.9s ease-out forwards;
    z-index:5;
  }
  .plusone.crit{ color:var(--hot); font-size:1.8rem; }
  @keyframes rise{
    0%{ opacity:1; transform:translateY(0) scale(1); }
    100%{ opacity:0; transform:translateY(-4.2rem) scale(1.25); }
  }
  #toast{
    min-height:1.6rem;
    font-weight:700;
    color:var(--leaf-deep);
    text-align:center;
    padding:0 1rem;
  }

  /* ── shop ── */
  .shop{
    background:var(--card);
    border:0.2rem solid var(--ink);
    border-radius:1.2rem;
    box-shadow:0.35rem 0.35rem 0 rgba(74,50,0,0.35);
    padding:0.9rem 0.9rem 1rem;
  }
  .shop h2{
    font-family:"Lilita One", sans-serif;
    font-size:1.4rem;
    text-align:center;
    margin-bottom:0.2rem;
  }
  .shop .sub{ text-align:center; font-size:0.85rem; color:#6b4c00; margin-bottom:0.7rem; }
  .item{
    width:100%;
    display:grid;
    grid-template-columns:2.6rem 1fr auto;
    gap:0.6rem;
    align-items:center;
    text-align:left;
    background:var(--cream);
    border:0.15rem solid var(--ink);
    border-radius:0.8rem;
    padding:0.45rem 0.6rem;
    margin-bottom:0.55rem;
    min-height:2.75rem;
    font-family:inherit;
    color:inherit;
    transition:transform 0.06s ease;
  }
  .item:not([aria-disabled="true"]):hover{ transform:translate(-0.1rem,-0.1rem); box-shadow:0.2rem 0.2rem 0 rgba(74,50,0,0.3); }
  .item[aria-disabled="true"]{ opacity:0.55; }
  .item .ico{ font-size:1.7rem; text-align:center; }
  .item .nm{ font-weight:700; line-height:1.1; }
  .item .fx{ font-size:0.78rem; color:#6b4c00; font-weight:600; }
  .item .cost{
    font-family:"Lilita One", sans-serif;
    font-size:1rem;
    color:var(--leaf-deep);
    text-align:right;
    line-height:1.1;
  }
  .item .own{ font-size:0.78rem; color:#6b4c00; text-align:right; font-weight:700; }
  .foot{
    display:flex; gap:0.6rem; justify-content:center; margin-top:0.5rem;
  }
  .foot button{
    font-family:inherit; font-weight:700;
    font-size:0.85rem;
    min-height:2.75rem;
    padding:0.2rem 0.9rem;
    background:transparent;
    border:0.15rem solid var(--ink);
    border-radius:0.7rem;
    color:var(--ink);
  }
  button:focus-visible, .item:focus-visible{ outline:0.25rem solid var(--hot); outline-offset:0.15rem; }

  @media (max-width:760px){
    main{ grid-template-columns:1fr; }
  }
  @media (prefers-reduced-motion: reduce){
    .plusone{ animation-duration:0.01s; }
    #bigLemon.squish svg{ animation:none; }
    .drop{ display:none; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
<main>
  <header class="top">
    <h1>LEMON <span class="zest">SQUEEZE</span></h1>
    <p class="tag">when life gives you a lemon, click it several thousand times</p>
  </header>

  <section class="squeezer" aria-label="The lemon">
    <div class="counts">
      <p id="juice">0 juice</p>
      <div class="rates"><span id="perClick">+1 / click</span><span id="perSec">0 / sec</span></div>
    </div>

    <button type="button" id="bigLemon" aria-label="Squeeze the big lemon for juice">
      <svg viewBox="0 0 200 200" aria-hidden="true">
        <ellipse cx="100" cy="112" rx="78" ry="64" transform="rotate(-18 100 112)" fill="#ffd21a"/>
        <ellipse cx="100" cy="112" rx="78" ry="64" transform="rotate(-18 100 112)" fill="none" stroke="#4a3200" stroke-width="5"/>
        <ellipse cx="74" cy="88" rx="26" ry="16" transform="rotate(-24 74 88)" fill="#fff3a6" opacity="0.9"/>
        <ellipse cx="150" cy="140" rx="30" ry="18" transform="rotate(-18 150 140)" fill="#f5b800" opacity="0.5"/>
        <circle cx="166" cy="52" r="15" fill="#3e8a2e" stroke="#4a3200" stroke-width="5"/>
        <circle cx="161" cy="47" r="4.5" fill="#68c24e"/>
        <path d="M158 36 Q176 12 192 26 Q180 42 160 40 Q157 38 158 36 Z" fill="#55b23e" stroke="#4a3200" stroke-width="4.5" stroke-linejoin="round"/>
        <path d="M166 34 Q176 24 184 28" fill="none" stroke="#2c6b20" stroke-width="3" stroke-linecap="round"/>
        <g id="face">
          <circle cx="78" cy="108" r="6.5" fill="#4a3200"/>
          <circle cx="120" cy="100" r="6.5" fill="#4a3200"/>
          <path id="mouth" d="M84 130 Q100 144 116 124" fill="none" stroke="#4a3200" stroke-width="5.5" stroke-linecap="round"/>
        </g>
      </svg>
    </button>

    <p id="toast" role="status" aria-live="polite"></p>
  </section>

  <section class="shop" aria-label="Upgrades shop">
    <h2>🛒 ZEST SHOP</h2>
    <p class="sub">spend juice, earn more juice. capitalism, but yellow.</p>
    <div id="items"></div>
    <div class="foot">
      <button type="button" id="muteBtn" aria-pressed="false">🔊 sound on</button>
      <button type="button" id="wipeBtn">🗑 fresh lemon</button>
    </div>
  </section>
</main>

<script>
(function(){
'use strict';

/* ── defs ── */
var GRIP = { name:'Firmer Grip', ico:'💪', base:15, mult:1.7, fx:'+1 juice per click' };
var ITEMS = [
  { key:'juicer',  name:'Hand Juicer',        ico:'🥤', base:30,     mult:1.15, rate:0.5,  fx:'0.5 juice/sec' },
  { key:'stand',   name:'Lemonade Stand',     ico:'🏪', base:220,    mult:1.15, rate:3,    fx:'3 juice/sec' },
  { key:'tree',    name:'Lemon Tree',         ico:'🌳', base:1300,   mult:1.16, rate:14,   fx:'14 juice/sec' },
  { key:'squeezo', name:'Squeez-o-Matic',     ico:'🤖', base:9500,   mult:1.17, rate:70,   fx:'70 juice/sec' },
  { key:'factory', name:'Citrus Factory',     ico:'🏭', base:64000,  mult:1.18, rate:380,  fx:'380 juice/sec' },
  { key:'planet',  name:'Planet of Lemons',   ico:'🪐', base:500000, mult:1.20, rate:2400, fx:'2.4k juice/sec' }
];
var MILESTONES = [
  [100,    'first pitcher poured 🍹'],
  [1000,   'the neighborhood is talking about your lemonade'],
  [10000,  'local news: "who IS the lemon kid?"'],
  [100000, 'citrus futures are up 4000%'],
  [1e6,    'ONE MILLION JUICE. your hands smell permanent'],
  [1e7,    'nations trade in juice now'],
  [1e8,    'the lemon dreams. you dream of the lemon'],
  [1e9,    'you have become zest, destroyer of scurvy 🏆']
];

/* ── state ── */
var S = { j:0, total:0, clicks:0, grip:0, own:{}, mile:0, muted:false, ts:Date.now() };
ITEMS.forEach(function(it){ S.own[it.key] = 0; });
try{
  var saved = JSON.parse(localStorage.getItem('lemon-squeeze-v1'));
  if(saved && typeof saved.j === 'number'){
    for(var k in S) if(saved[k] !== undefined) S[k] = saved[k];
    ITEMS.forEach(function(it){ if(typeof S.own[it.key] !== 'number') S.own[it.key] = 0; });
  }
}catch(e){}

function perClick(){ return 1 + S.grip; }
function perSec(){
  var r = 0;
  ITEMS.forEach(function(it){ r += it.rate * S.own[it.key]; });
  return r;
}
function cost(base, mult, owned){ return Math.ceil(base * Math.pow(mult, owned)); }
function fmt(n){
  if(n < 10) return (n % 1 > 0.001 ? n.toFixed(1) : Math.floor(n).toString());
  if(n < 1000) return Math.floor(n).toString();
  var u = [['b',1e9],['m',1e6],['k',1e3]];
  for(var i = 0; i < u.length; i++)
    if(n >= u[i][1]) return (n / u[i][1] >= 100 ? Math.floor(n/u[i][1]) : (n/u[i][1]).toFixed(1)) + u[i][0];
  return Math.floor(n).toString();
}

/* offline juice: half rate, capped at 2 hours */
(function(){
  var away = Math.min(7200, (Date.now() - (S.ts || Date.now())) / 1000);
  var gain = perSec() * away * 0.5;
  if(gain >= 1){
    S.j += gain; S.total += gain;
    setTimeout(function(){ toast('the lemons kept working: +' + fmt(gain) + ' juice while you were away'); }, 600);
  }
})();

/* ── audio ── */
var ac = null;
function snd(fn){
  if(S.muted) return;
  try{
    if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    fn(ac, ac.currentTime);
  }catch(e){}
}
function sndSquish(crit){
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'triangle';
    var f = (crit ? 420 : 300) + Math.random() * 80;
    o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(f * 0.55, t + 0.09);
    g.gain.setValueAtTime(0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t + 0.11);
    var len = a.sampleRate * 0.05 | 0, buf = a.createBuffer(1, len, a.sampleRate), d = buf.getChannelData(0);
    for(var i = 0; i < len; i++) d[i] = (Math.random()*2-1) * (1 - i/len);
    var n = a.createBufferSource(); n.buffer = buf;
    var bp = a.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 2;
    var g2 = a.createGain(); g2.gain.value = 0.05;
    n.connect(bp); bp.connect(g2); g2.connect(a.destination);
    n.start(t);
  });
}
function sndBuy(){
  snd(function(a, t){
    [523, 659, 784].forEach(function(f, i){
      var o = a.createOscillator(), g = a.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t + i*0.06);
      g.gain.linearRampToValueAtTime(0.07, t + i*0.06 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + i*0.06 + 0.4);
      o.connect(g); g.connect(a.destination);
      o.start(t + i*0.06); o.stop(t + i*0.06 + 0.45);
    });
  });
}

/* ── ui ── */
var juiceEl = document.getElementById('juice');
var pcEl = document.getElementById('perClick');
var psEl = document.getElementById('perSec');
var toastEl = document.getElementById('toast');
var itemsEl = document.getElementById('items');
var lemonBtn = document.getElementById('bigLemon');
var mouth = document.getElementById('mouth');
var toastT = 0;
function toast(msg){
  toastEl.textContent = msg;
  clearTimeout(toastT);
  toastT = setTimeout(function(){ toastEl.textContent = ''; }, 4200);
}

var rows = [];
function buildShop(){
  itemsEl.textContent = '';
  rows = [];
  var defs = [{ grip:true, key:'grip', name:GRIP.name, ico:GRIP.ico, fx:GRIP.fx }].concat(ITEMS);
  defs.forEach(function(it){
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'item';
    var ico = document.createElement('span'); ico.className = 'ico'; ico.textContent = it.ico;
    ico.setAttribute('aria-hidden', 'true');
    var mid = document.createElement('span');
    var nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = it.name;
    var fx = document.createElement('span'); fx.className = 'fx'; fx.textContent = ' ' + it.fx;
    mid.appendChild(nm); mid.appendChild(document.createElement('br')); mid.appendChild(fx);
    var right = document.createElement('span');
    var c = document.createElement('span'); c.className = 'cost';
    var o = document.createElement('span'); o.className = 'own';
    right.appendChild(c); right.appendChild(document.createElement('br')); right.appendChild(o);
    b.append(ico, mid, right);
    b.addEventListener('click', function(){ buy(it); });
    itemsEl.appendChild(b);
    rows.push({ def: it, btn: b, costEl: c, ownEl: o });
  });
}
function itemCost(it){
  return it.grip ? cost(GRIP.base, GRIP.mult, S.grip) : cost(it.base, it.mult, S.own[it.key]);
}
function buy(it){
  var c = itemCost(it);
  if(S.j < c) return;
  S.j -= c;
  if(it.grip) S.grip++;
  else S.own[it.key]++;
  sndBuy();
  toast(it.grip ? 'grip level ' + S.grip + ' — the lemon respects you now' : '+1 ' + it.name + '!');
  save();
  paint(true);
}
function paint(full){
  juiceEl.textContent = fmt(S.j) + ' juice';
  pcEl.textContent = '+' + fmt(perClick()) + ' / click';
  psEl.textContent = fmt(perSec()) + ' / sec';
  rows.forEach(function(r){
    var c = itemCost(r.def);
    var afford = S.j >= c;
    r.costEl.textContent = fmt(c) + ' 🍋';
    r.ownEl.textContent = r.def.grip ? 'lv ' + S.grip : 'x' + S.own[r.def.key];
    r.btn.setAttribute('aria-disabled', afford ? 'false' : 'true');
  });
  while(S.mile < MILESTONES.length && S.total >= MILESTONES[S.mile][0]){
    toast('🏅 ' + MILESTONES[S.mile][1]);
    S.mile++;
  }
}

/* ── click ── */
var squishT = 0;
lemonBtn.addEventListener('click', function(e){
  var crit = Math.random() < 0.04;
  var gain = perClick() * (crit ? 5 : 1);
  S.j += gain; S.total += gain; S.clicks++;
  sndSquish(crit);
  lemonBtn.classList.remove('squish');
  void lemonBtn.offsetWidth;
  lemonBtn.classList.add('squish');
  mouth.setAttribute('d', S.clicks % 2 ? 'M84 126 Q100 148 116 120' : 'M84 130 Q100 144 116 124');
  /* +N floater + juice drops near the click point */
  var rect = lemonBtn.getBoundingClientRect();
  var x = (e.clientX || rect.left + rect.width/2), y = (e.clientY || rect.top + rect.height/3);
  var f = document.createElement('div');
  f.className = 'plusone' + (crit ? ' crit' : '');
  f.textContent = (crit ? 'JUICY! +' : '+') + fmt(gain);
  f.style.left = (x - 10 + (Math.random()*24 - 12)) + 'px';
  f.style.top = (y - 30) + 'px';
  f.style.position = 'fixed';
  document.body.appendChild(f);
  setTimeout(function(){ f.remove(); }, 900);
  for(var i = 0; i < (crit ? 7 : 3); i++) spawnDrop(x, y);
  paint();
});
var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function spawnDrop(x, y){
  if(reduceMotion) return;
  var d = document.createElement('div');
  d.className = 'drop';
  d.style.position = 'fixed';
  var vx = (Math.random() - 0.5) * 220, vy = -(80 + Math.random() * 160);
  var px = x, py = y, t0 = performance.now();
  d.style.left = px + 'px'; d.style.top = py + 'px';
  document.body.appendChild(d);
  function step(now){
    var t = (now - t0) / 1000;
    if(t > 1){ d.remove(); return; }
    d.style.left = (px + vx * t) + 'px';
    d.style.top = (py + vy * t + 420 * t * t) + 'px';
    d.style.opacity = String(1 - t * 0.7);
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ── passive income ── */
var last = performance.now(), acc = 0;
setInterval(function(){
  var now = performance.now();
  var dt = (now - last) / 1000;
  last = now;
  var g = perSec() * dt;
  if(g > 0){ S.j += g; S.total += g; }
  acc += dt;
  if(acc >= 0.25){ acc = 0; paint(); }
}, 100);

/* ── save / misc ── */
function save(){
  S.ts = Date.now();
  try{ localStorage.setItem('lemon-squeeze-v1', JSON.stringify(S)); }catch(e){}
}
setInterval(save, 5000);
window.addEventListener('beforeunload', save);

var muteBtn = document.getElementById('muteBtn');
function muteUi(){
  muteBtn.textContent = S.muted ? '🔇 sound off' : '🔊 sound on';
  muteBtn.setAttribute('aria-pressed', S.muted ? 'true' : 'false');
}
muteBtn.addEventListener('click', function(){ S.muted = !S.muted; muteUi(); save(); });
document.getElementById('wipeBtn').addEventListener('click', function(){
  if(!confirm('Start over with a fresh lemon? All juice will be lost.')) return;
  try{ localStorage.removeItem('lemon-squeeze-v1'); }catch(e){}
  location.reload();
});

buildShop();
muteUi();
paint(true);
})();
</script>
</body>
</html>
