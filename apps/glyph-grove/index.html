<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glyph Grove</title>
<meta name="description" content="Wander a ring of moonlit rooms, gather letters into your satchel, and type any word you can afford.">
<link rel="icon" href="https://emojicdn.elk.sh/🔤">
<meta property="og:title" content="Glyph Grove">
<meta property="og:description" content="A moody word-dungeon: eight connected rooms, rarer letters the deeper you walk, and a typing inventory — spell anything you have the letters for.">
<meta property="og:url" content="https://sloppy.live/glyph-grove/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/moody%20pixel%20art%20top%20down%20dark%20dungeon%20rooms%20connected%20by%20doorways%2C%20glowing%20golden%20letter%20tiles%2C%20tiny%20lantern%20wisp%20character%2C%20mist%2C%20deep%20indigo%20palette.png?width=1200&height=630&seed=2613&model=flux&nologo=true">
<style>
  :root{
    --void:#0b0d1a;
    --stone:#171a2e;
    --ink:#cdd3ec;
    --dim:#6d7494;
    --gold:#e8c476;
    --moss:#5a8f7a;
    --bad:#c25a5a;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Silkscreen", monospace;
    background:
      radial-gradient(ellipse 70% 50% at 50% 12%, #141830 0%, var(--void) 65%);
    color:var(--ink);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
  }
  header{ text-align:center; padding:0.6rem 1rem 0.2rem; }
  h1{
    font-family:"Cormorant Garamond", serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(1.5rem, 4.6vw, 2.4rem);
    letter-spacing:0.14em;
    color:var(--gold);
    text-shadow:0 0 1.4rem rgba(232,196,118,0.35);
  }
  .sub{ font-size:0.62rem; color:var(--dim); letter-spacing:0.22em; }
  #roomTag{
    font-size:0.62rem;
    color:var(--dim);
    letter-spacing:0.2em;
    margin-top:0.2rem;
  }
  #roomTag b{ color:var(--gold); font-weight:400; }
  #frame{
    position:relative;
    margin-top:0.4rem;
    border:2px solid #262b4a;
    box-shadow:0 0 0 1px #05060d, 0 1.2rem 3rem rgba(0,0,0,0.7), inset 0 0 3rem rgba(0,0,0,0.6);
  }
  canvas{
    display:block;
    width:min(92vw, 56rem);   /* refined per-viewport by fitFrame() */
    aspect-ratio:3 / 2;
    image-rendering:pixelated;
    touch-action:none;
  }
  #frame::after{
    content:'';
    position:absolute; inset:0;
    pointer-events:none;
    background:radial-gradient(ellipse at 50% 45%, transparent 55%, rgba(4,5,12,0.55) 100%);
  }

  /* ── satchel + spell bar ── */
  #panel{
    width:min(92vw, 56rem);
    margin-top:0.7rem;
    display:flex;
    flex-direction:column;
    gap:0.5rem;
  }
  #inv{
    display:flex;
    gap:0.3rem;
    flex-wrap:wrap;
    justify-content:center;
    min-height:2.5rem;
    align-items:center;
    padding:0.3rem 0.5rem;
    background:rgba(13,16,32,0.8);
    border:2px solid #262b4a;
  }
  #inv .empty{ font-size:0.6rem; color:var(--dim); letter-spacing:0.18em; }
  .inv{
    position:relative;
    width:2rem; height:2rem;
    display:grid; place-items:center;
    background:#1d2140;
    border:1px solid #3a4170;
    color:var(--gold);
    font-family:"Cormorant Garamond", serif;
    font-weight:700;
    font-size:1.3rem;
    text-transform:uppercase;
    box-shadow:0 0.2rem 0 rgba(0,0,0,0.5);
  }
  .inv.used{ opacity:0.35; }
  .inv .n{
    position:absolute;
    right:-0.25rem; bottom:-0.35rem;
    font-family:"Silkscreen", monospace;
    font-size:0.55rem;
    color:var(--ink);
    background:#0b0d1a;
    border:1px solid #3a4170;
    padding:0 0.15rem;
  }
  #spellrow{
    display:flex;
    gap:0.5rem;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
  }
  #spellIn{
    font-family:"Cormorant Garamond", serif;
    font-weight:700;
    font-size:1.4rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    width:min(16rem, 50vw);
    min-height:2.75rem;
    padding:0.2rem 0.8rem;
    background:rgba(13,16,32,0.9);
    border:2px solid #3a4170;
    color:var(--gold);
    text-align:center;
  }
  #spellIn::placeholder{
    font-family:"Silkscreen", monospace;
    font-size:0.6rem;
    letter-spacing:0.15em;
    color:var(--dim);
  }
  #spellIn.ok{ border-color:var(--moss); box-shadow:0 0 0.9rem rgba(90,143,122,0.3); }
  #spellIn.no{ border-color:var(--bad); }
  #spellIn:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
  #spellrow button{
    font-family:inherit;
    font-size:0.7rem;
    letter-spacing:0.12em;
    min-height:2.75rem;
    padding:0.4rem 1rem;
    background:#1d2140;
    color:var(--ink);
    border:2px solid #3a4170;
    cursor:pointer;
  }
  #spellrow button:hover{ border-color:var(--gold); color:var(--gold); }
  #spellrow button:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
  #spellrow button.go{ background:var(--moss); color:#0b1410; border-color:var(--moss); font-weight:700; }
  #spellrow button.go:hover{ color:#0b1410; filter:brightness(1.15); }
  #stats{
    display:flex; gap:1.3rem;
    justify-content:center;
    font-size:0.66rem;
    color:var(--dim);
    letter-spacing:0.14em;
  }
  #stats b{ color:var(--gold); font-weight:400; }
  #msg{
    min-height:1.1rem;
    font-size:0.64rem;
    letter-spacing:0.16em;
    color:var(--moss);
    text-align:center;
    padding:0.2rem 0 0.7rem;
  }
  #msg.bad{ color:var(--bad); }
  @keyframes inShake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-0.3rem); }
    75%{ transform:translateX(0.3rem); }
  }
  #spellIn.shake{ animation:inShake 0.22s ease 2; }
  @media (prefers-reduced-motion: reduce){ #spellIn.shake{ animation:none; } }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600;1,700&family=Silkscreen&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <h1>Glyph Grove</h1>
  <p class="sub">EIGHT ROOMS · ONE SATCHEL · ANY WORD YOU CAN AFFORD</p>
  <p id="roomTag">ROOM <b id="roomName">I</b> <span id="roomHint"></span></p>
</header>

<div id="frame">
  <canvas id="g" width="384" height="256" role="application"
    aria-label="Glyph Grove: walk between rooms with arrow keys or WASD, step onto letters to gather them into your satchel, then type any word you have the letters for and press Enter."></canvas>
</div>

<section id="panel" aria-label="Letter satchel and spelling">
  <div id="inv" aria-live="off"><span class="empty">your satchel is empty — gather letters…</span></div>
  <div id="spellrow">
    <input id="spellIn" maxlength="10" autocomplete="off" spellcheck="false"
      placeholder="TYPE A WORD (ENTER)" aria-label="Type a word using letters from your satchel">
    <button type="button" class="go" id="btnGo">SPELL&nbsp;IT</button>
    <button type="button" id="btnMute" aria-pressed="false">♪ ON</button>
  </div>
  <div id="stats">
    <span>SCORE <b id="score">0</b></span>
    <span>BEST <b id="best">0</b></span>
    <span>WORDS <b id="wcount">0</b></span>
  </div>
</section>
<p id="msg" role="status" aria-live="polite"></p>

<script src="words.js"></script>
<script>
(function(){
'use strict';

var DICT = new Set(window.GG_WORDS || []);
/* the bundled list starts at 3 letters — teach the grove the little words */
'hi no so go my we he it at on in up us an as by do if is of or to be me am ah oh ox pi mu id ad ex ye yo'
  .split(' ').forEach(function(w){ DICT.add(w); });
/* the grove is polite: these never score, even with the letters in hand */
var VULGAR = new Set(('fuck shit cunt bitch cock dick pussy asshole bastard whore slut fag faggot ' +
  'nigger nigga retard twat wank wanker prick bollocks piss tit tits boner cum jizz').split(' '));
function isVulgar(w){
  return VULGAR.has(w) || (w.slice(-1) === 's' && VULGAR.has(w.slice(0, -1))) ||
         (w.slice(-3) === 'ing' && VULGAR.has(w.slice(0, -3))) ||
         (w.slice(-2) === 'ed' && VULGAR.has(w.slice(0, -2)));
}
var TILE = 16, GW = 24, GH = 16;
var canvas = document.getElementById('g');
var ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

var VALS = { e:1,a:1,i:1,o:1,n:1,r:1,t:1,l:1,s:1,u:1, d:2,g:2, b:3,c:3,m:3,p:3, f:4,h:4,v:4,w:4,y:4, k:5, j:8,x:8, q:10,z:10 };

/* ── the ring of rooms ──
   a closed loop on a 3×3 room grid; letters get rarer the deeper you walk */
var PATH = [[0,0],[1,0],[2,0],[2,1],[2,2],[1,2],[0,2],[0,1]];
var ROOM_LETTERS = ['hi', 'nt', 'aeo', 'rsld', 'mcugp', 'bfwyv', 'kjaei', 'qzeou'];
var ROMAN = ['I','II','III','IV','V','VI','VII','VIII'];
var rooms = PATH.map(function(p, i){
  return { gx: p[0], gy: p[1], set: ROOM_LETTERS[i], rocks: null, letters: {} };
});
function roomAt(gx, gy){
  for(var i = 0; i < rooms.length; i++)
    if(rooms[i].gx === gx && rooms[i].gy === gy) return i;
  return -1;
}
/* neighbors in the ring (prev/next) — doors only along the path */
function neighbors(i){
  return [ (i + rooms.length - 1) % rooms.length, (i + 1) % rooms.length ];
}
function doorDirs(i){
  var out = {};
  neighbors(i).forEach(function(j){
    var dx = rooms[j].gx - rooms[i].gx, dy = rooms[j].gy - rooms[i].gy;
    if(dx === 1) out.right = j; else if(dx === -1) out.left = j;
    else if(dy === 1) out.down = j; else if(dy === -1) out.up = j;
  });
  return out;
}
var DOOR_Y = [7, 8], DOOR_X = [11, 12];   /* gap cells in each wall */

var cur = 0;
var fade = 0;

/* ── inventory (the typing satchel) ── */
var inv = {};
var score = 0, wcount = 0, best = 0;
var usedWords = new Set();   /* one run, one chance per word — survives level reshuffles */
try{ best = +localStorage.getItem('glyph-grove-best') || 0; }catch(e){}
var greeted = false;

/* ── player ── */
var player = { gx: 2, gy: 8, tx: 2, ty: 8, t: 1, fx: 1, fy: 0, bob: 0 };
var STEP_MS = 130;

function key(x, y){ return x + ',' + y; }
function isWall(x, y){
  if(x < 0 || y < 0 || x >= GW || y >= GH) return true;
  if(x > 0 && x < GW-1 && y > 0 && y < GH-1) return false;
  var d = doorDirs(cur);
  if(x === 0 && d.left !== undefined && DOOR_Y.indexOf(y) >= 0) return false;
  if(x === GW-1 && d.right !== undefined && DOOR_Y.indexOf(y) >= 0) return false;
  if(y === 0 && d.up !== undefined && DOOR_X.indexOf(x) >= 0) return false;
  if(y === GH-1 && d.down !== undefined && DOOR_X.indexOf(x) >= 0) return false;
  return true;
}
function blocked(x, y){
  if(isWall(x, y)) return true;
  return !!rooms[cur].rocks[key(x, y)];
}

/* ── room generation ── */
function seedRoom(i){
  var r = rooms[i];
  if(!r.rocks){
    r.rocks = {};
    var n = 8 + Math.floor(Math.random() * 6);
    var guard = 300;
    while(n > 0 && guard-- > 0){
      var x = 2 + Math.floor(Math.random() * (GW - 4));
      var y = 2 + Math.floor(Math.random() * (GH - 4));
      if(Math.abs(x - 12) < 3 && Math.abs(y - 8) < 3) continue;   /* keep center open */
      if(Math.abs(x - player.gx) < 2 && Math.abs(y - player.gy) < 2) continue;  /* never on/around the player */
      if(r.rocks[key(x, y)]) continue;
      r.rocks[key(x, y)] = true;
      n--;
    }
  }
  /* replant this room's letter set — every letter of the set present exactly once */
  var have = {};
  for(var k in r.letters) have[r.letters[k]] = true;
  for(var c = 0; c < r.set.length; c++){
    var ch = r.set[c];
    if(have[ch]) continue;
    var g2 = 300;
    while(g2-- > 0){
      var x2 = 2 + Math.floor(Math.random() * (GW - 4));
      var y2 = 2 + Math.floor(Math.random() * (GH - 4));
      var k2 = key(x2, y2);
      if(r.rocks[k2] || r.letters[k2]) continue;
      if(x2 === player.gx && y2 === player.gy) continue;
      r.letters[k2] = ch;
      break;
    }
  }
}
function enterRoom(j, enterSide){
  cur = j;
  seedRoom(j);
  fade = 1;
  autoPath = [];                 /* old room's path means nothing here */
  if(enterSide === 'left'){ player.gx = 1; player.gy = DOOR_Y[0]; }
  if(enterSide === 'right'){ player.gx = GW-2; player.gy = DOOR_Y[0]; }
  if(enterSide === 'up'){ player.gx = DOOR_X[0]; player.gy = 1; }
  if(enterSide === 'down'){ player.gx = DOOR_X[0]; player.gy = GH-2; }
  player.x = player.tx = player.gx; player.ty = player.gy; player.t = 1;
  document.getElementById('roomName').textContent = ROMAN[j];
  document.getElementById('roomHint').textContent = '· ' + rooms[j].set.toUpperCase().split('').join(' ');
  sndDoor();
}

/* ── audio ── */
var ac = null, muted = false;
try{ muted = localStorage.getItem('glyph-grove-mute') === '1'; }catch(e){}
function snd(fn){
  if(muted) return;
  try{
    if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    fn(ac, ac.currentTime);
  }catch(e){}
}
function sndStep(){
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'triangle'; o.frequency.value = 90 + Math.random() * 25;
    g.gain.setValueAtTime(0.035, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + 0.07);
  });
}
function sndPick(n){
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'sine';
    o.frequency.value = 440 * Math.pow(2, Math.min(12, n * 2) / 12);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.09, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + 0.55);
  });
}
function sndDoor(){
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(220, t);
    o.frequency.exponentialRampToValueAtTime(110, t + 0.3);
    g.gain.setValueAtTime(0.06, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + 0.4);
  });
}
function sndWord(len){
  snd(function(a, t){
    for(var i = 0; i < Math.min(6, len); i++){
      var o = a.createOscillator(), g = a.createGain();
      o.type = 'triangle';
      o.frequency.value = 523 * Math.pow(2, [0,4,7,12,16,19][i] / 12);
      g.gain.setValueAtTime(0.0001, t + i * 0.07);
      g.gain.linearRampToValueAtTime(0.08, t + i * 0.07 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.7);
      o.connect(g); g.connect(a.destination);
      o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.75);
    }
  });
}
function sndBad(){
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(160, t);
    o.frequency.exponentialRampToValueAtTime(70, t + 0.25);
    g.gain.setValueAtTime(0.07, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + 0.3);
  });
}

/* ── ui ── */
var invEl = document.getElementById('inv');
var spellIn = document.getElementById('spellIn');
var msgEl = document.getElementById('msg');
var msgT = 0;
function message(txt, bad){
  msgEl.textContent = txt;
  msgEl.className = bad ? 'bad' : '';
  clearTimeout(msgT);
  msgT = setTimeout(function(){ msgEl.textContent = ''; }, 3400);
}
function invTotal(){ var n = 0; for(var k in inv) n += inv[k]; return n; }
function renderInv(){
  invEl.textContent = '';
  var ks = Object.keys(inv).filter(function(k){ return inv[k] > 0; }).sort();
  if(!ks.length){
    var e = document.createElement('span');
    e.className = 'empty';
    e.textContent = 'your satchel is empty — gather letters…';
    invEl.appendChild(e);
  }
  /* letters currently "spent" by what's typed in the spell bar dim out */
  var typed = {};
  spellIn.value.toLowerCase().split('').forEach(function(c){ typed[c] = (typed[c] || 0) + 1; });
  ks.forEach(function(k){
    var d = document.createElement('span');
    d.className = 'inv' + (typed[k] >= inv[k] ? ' used' : '');
    d.textContent = k;
    var n = document.createElement('span');
    n.className = 'n';
    n.textContent = '×' + inv[k];
    d.appendChild(n);
    invEl.appendChild(d);
  });
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('wcount').textContent = wcount;
}
function canAfford(w){
  var need = {};
  for(var i = 0; i < w.length; i++) need[w[i]] = (need[w[i]] || 0) + 1;
  for(var k in need) if((inv[k] || 0) < need[k]) return false;
  return true;
}
function liveCheck(){
  var w = spellIn.value.toLowerCase().replace(/[^a-z]/g, '');
  if(w !== spellIn.value.toLowerCase()) spellIn.value = w;
  spellIn.classList.remove('ok', 'no');
  if(w.length >= 2){
    if(usedWords.has(w) || !canAfford(w)) spellIn.classList.add('no');
    else if(DICT.has(w)) spellIn.classList.add('ok');
  }
  renderInv();
}
spellIn.addEventListener('input', liveCheck);

function submitWord(){
  var w = spellIn.value.toLowerCase().replace(/[^a-z]/g, '');
  if(w.length < 2){ message('TWO LETTERS AT LEAST', true); sndBad(); return; }
  if(isVulgar(w)){
    message('SORRY, THIS WORD IS TOO VULGAR', true);
    sndBad();
    spellIn.classList.remove('shake'); void spellIn.offsetWidth; spellIn.classList.add('shake');
    return;
  }
  if(usedWords.has(w)){
    message('YOU\'VE ALREADY SPELLED THAT WORD', true);
    sndBad();
    spellIn.classList.remove('shake'); void spellIn.offsetWidth; spellIn.classList.add('shake');
    return;
  }
  if(!canAfford(w)){
    message('YOUR SATCHEL LACKS THE LETTERS', true);
    sndBad();
    spellIn.classList.remove('shake'); void spellIn.offsetWidth; spellIn.classList.add('shake');
    return;
  }
  if(!DICT.has(w)){
    message('"' + w.toUpperCase() + '" IS NOT IN THE GROVE\'S TONGUE', true);
    sndBad();
    spellIn.classList.remove('shake'); void spellIn.offsetWidth; spellIn.classList.add('shake');
    return;
  }
  usedWords.add(w);
  for(var i = 0; i < w.length; i++) inv[w[i]]--;
  var pts = 0;
  for(var j = 0; j < w.length; j++) pts += VALS[w[j]] || 1;
  pts *= w.length;
  score += pts;
  wcount++;
  if(score > best){
    best = score;
    try{ localStorage.setItem('glyph-grove-best', String(best)); }catch(e){}
  }
  message('"' + w.toUpperCase() + '" · +' + pts + ' · THE GROVE RESHUFFLES');
  sndWord(w.length);
  spellIn.value = '';
  freshLevel();
  liveCheck();
}
/* every solved word reshuffles the ring: new rocks, new letter positions */
function freshLevel(){
  rooms.forEach(function(r){ r.rocks = null; r.letters = {}; });
  seedRoom(cur);
  fade = 1;
}
document.getElementById('btnGo').addEventListener('click', submitWord);
spellIn.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){ e.preventDefault(); submitWord(); }
  if(e.key === 'Escape'){ spellIn.blur(); }
});
var muteBtn = document.getElementById('btnMute');
function muteUi(){
  muteBtn.textContent = muted ? '♪ OFF' : '♪ ON';
  muteBtn.setAttribute('aria-pressed', muted ? 'true' : 'false');
}
muteBtn.addEventListener('click', function(){
  muted = !muted;
  try{ localStorage.setItem('glyph-grove-mute', muted ? '1' : '0'); }catch(e){}
  muteUi();
});

/* ── movement ── */
var held = {};
document.addEventListener('keydown', function(e){
  var tag = (e.target && e.target.tagName || '').toLowerCase();
  if(tag === 'input' || tag === 'textarea') return;
  var k = e.key.toLowerCase();
  if(k === 'enter'){ e.preventDefault(); spellIn.focus(); return; }
  var map = { w:'u', arrowup:'u', s:'d', arrowdown:'d', a:'l', arrowleft:'l', d:'r', arrowright:'r' };
  if(map[k]){
    e.preventDefault();
    held[map[k]] = true;
    autoPath = [];               /* manual input overrides click-walking */
    var dv = { u:[0,-1], d:[0,1], l:[-1,0], r:[1,0] }[map[k]];
    tryStep(dv[0], dv[1]);
  }
});
document.addEventListener('keyup', function(e){
  var k = e.key.toLowerCase();
  var map = { w:'u', arrowup:'u', s:'d', arrowdown:'d', a:'l', arrowleft:'l', d:'r', arrowright:'r' };
  if(map[k]) held[map[k]] = false;
});
window.addEventListener('blur', function(){ held = {}; });

/* ── click-to-move: BFS to any walkable tile ── */
var autoPath = [];
function bfsTo(txg, tyg){
  if(blocked(txg, tyg)) return null;
  var prev = {};
  prev[key(player.gx, player.gy)] = null;
  var q = [[player.gx, player.gy]];
  while(q.length){
    var c = q.shift();
    if(c[0] === txg && c[1] === tyg){
      var path = [], k = key(c[0], c[1]);
      while(prev[k] !== null){ path.unshift(k.split(',').map(Number)); k = prev[k]; }
      return path;
    }
    for(var di = 0; di < 4; di++){
      var dv = [[1,0],[-1,0],[0,1],[0,-1]][di];
      var nx = c[0] + dv[0], ny = c[1] + dv[1], nk = key(nx, ny);
      if(prev[nk] !== undefined || blocked(nx, ny)) continue;
      prev[nk] = key(c[0], c[1]);
      q.push([nx, ny]);
    }
  }
  return null;
}
function clickToMove(e){
  var r = canvas.getBoundingClientRect();
  var x = Math.floor((e.clientX - r.left) / r.width * GW);
  var y = Math.floor((e.clientY - r.top) / r.height * GH);
  var path = bfsTo(x, y);
  if(path && path.length){ autoPath = path; sndStep(); }
}

var swipe = null, press = null;
canvas.addEventListener('pointerdown', function(e){
  e.preventDefault();
  swipe = { x: e.clientX, y: e.clientY };
  press = { x: e.clientX, y: e.clientY, moved: false };
});
canvas.addEventListener('pointermove', function(e){
  if(!swipe) return;
  var dx = e.clientX - swipe.x, dy = e.clientY - swipe.y;
  if(Math.hypot(dx, dy) > 26){
    if(press) press.moved = true;
    autoPath = [];
    if(Math.abs(dx) > Math.abs(dy)) tryStep(dx > 0 ? 1 : -1, 0);
    else tryStep(0, dy > 0 ? 1 : -1);
    swipe = { x: e.clientX, y: e.clientY };
  }
});
canvas.addEventListener('pointerup', function(e){
  if(press && !press.moved && Math.hypot(e.clientX - press.x, e.clientY - press.y) < 10){
    clickToMove(e);
  }
  swipe = null; press = null;
});
canvas.addEventListener('pointercancel', function(){ swipe = null; press = null; });

function tryStep(dx, dy){
  if(player.t < 1) return;
  player.fx = dx; player.fy = dy;
  var nx = player.gx + dx, ny = player.gy + dy;
  if(blocked(nx, ny)) return;
  player.tx = player.gx; player.ty = player.gy;
  player.gx = nx; player.gy = ny;
  player.t = 0;
  sndStep();
}
function onArrive(){
  var d = doorDirs(cur);
  /* stepping into a doorway carries you through */
  if(player.gx === 0 && d.left !== undefined){ enterRoom(d.left, 'right'); return; }
  if(player.gx === GW-1 && d.right !== undefined){ enterRoom(d.right, 'left'); return; }
  if(player.gy === 0 && d.up !== undefined){ enterRoom(d.up, 'down'); return; }
  if(player.gy === GH-1 && d.down !== undefined){ enterRoom(d.down, 'up'); return; }
  var k = key(player.gx, player.gy);
  var r = rooms[cur];
  if(r.letters[k]){
    var ch = r.letters[k];
    delete r.letters[k];
    inv[ch] = (inv[ch] || 0) + 1;
    sndPick(Math.min(6, invTotal()));
    renderInv();
    if(!greeted && (inv.h || 0) > 0 && (inv.i || 0) > 0){
      greeted = true;
      message('H + I — THE GROVE SAYS HI BACK');
      sndWord(2);
    }
  }
}

/* ── mist ── */
var mist = [];
for(var mi = 0; mi < 26; mi++){
  mist.push({ x: Math.random()*384, y: Math.random()*256, r: 14 + Math.random()*26, s: 2 + Math.random()*6, ph: Math.random()*6.28 });
}

/* ── render ── */
function draw(time){
  ctx.fillStyle = '#10131f';
  ctx.fillRect(0, 0, 384, 256);
  var d = doorDirs(cur);
  for(var y = 0; y < GH; y++){
    for(var x = 0; x < GW; x++){
      if(isWall(x, y)){
        ctx.fillStyle = '#1e2340';
        ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
        ctx.fillStyle = '#262c50';
        ctx.fillRect(x*TILE, y*TILE, TILE, 3);
        ctx.fillStyle = '#12152a';
        ctx.fillRect(x*TILE, y*TILE + TILE - 2, TILE, 2);
        continue;
      }
      ctx.fillStyle = (x + y) % 2 ? '#121525' : '#10131f';
      ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
      if(((x*7 + y*13) % 9) === 0){
        ctx.fillStyle = '#1a1e33';
        ctx.fillRect(x*TILE + (x%3)*4 + 2, y*TILE + (y%3)*4 + 2, 1, 1);
      }
      ctx.fillStyle = 'rgba(30,34,60,0.5)';
      ctx.fillRect(x*TILE, y*TILE, TILE, 1);
      ctx.fillRect(x*TILE, y*TILE, 1, TILE);
    }
  }
  /* doorway darkness — the corridor beyond */
  ctx.fillStyle = '#05060f';
  if(d.left !== undefined) ctx.fillRect(0, DOOR_Y[0]*TILE, 4, TILE*2);
  if(d.right !== undefined) ctx.fillRect(384-4, DOOR_Y[0]*TILE, 4, TILE*2);
  if(d.up !== undefined) ctx.fillRect(DOOR_X[0]*TILE, 0, TILE*2, 4);
  if(d.down !== undefined) ctx.fillRect(DOOR_X[0]*TILE, 256-4, TILE*2, 4);
  /* rocks */
  var r = rooms[cur];
  for(var rk in r.rocks){
    var rp = rk.split(',');
    var rx = +rp[0]*TILE, ry = +rp[1]*TILE;
    ctx.fillStyle = '#232948';
    ctx.fillRect(rx+2, ry+4, 12, 10);
    ctx.fillStyle = '#2f3760';
    ctx.fillRect(rx+3, ry+5, 8, 4);
    ctx.fillStyle = '#151a30';
    ctx.fillRect(rx+2, ry+12, 12, 2);
  }
  /* letters */
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for(var lk in r.letters){
    var lp = lk.split(',');
    var lx = +lp[0]*TILE, ly = +lp[1]*TILE;
    var pulse = reduceMotion ? 0.75 : 0.55 + 0.35 * Math.sin(time*0.003 + (+lp[0])*1.7 + (+lp[1])*0.9);
    var lift = reduceMotion ? 0 : Math.round(Math.sin(time*0.002 + (+lp[0]) + (+lp[1])*2) * 1.5);
    ctx.globalAlpha = pulse * 0.25;
    ctx.fillStyle = '#e8c476';
    ctx.fillRect(lx+1, ly+1+lift, 14, 14);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#1d2140';
    ctx.fillRect(lx+3, ly+3+lift, 10, 10);
    ctx.strokeStyle = 'rgba(232,196,118,' + (0.4 + pulse*0.5) + ')';
    ctx.strokeRect(lx+3.5, ly+3.5+lift, 9, 9);
    ctx.fillStyle = '#e8c476';
    ctx.font = '9px "Cormorant Garamond", serif';
    ctx.fillText(r.letters[lk].toUpperCase(), lx+8, ly+8.5+lift);
  }
  /* player */
  var px = (player.tx + (player.gx - player.tx) * ease(player.t) + 0.5) * TILE;
  var py = (player.ty + (player.gy - player.ty) * ease(player.t) + 0.5) * TILE;
  player.bob = reduceMotion ? 0 : Math.sin(time*0.004) * 1.2;
  var by = Math.round(py + player.bob);
  var halo = ctx.createRadialGradient(px, by, 2, px, by, 26);
  halo.addColorStop(0, 'rgba(232,196,118,0.18)');
  halo.addColorStop(1, 'rgba(232,196,118,0)');
  ctx.fillStyle = halo;
  ctx.fillRect(px-26, by-26, 52, 52);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(Math.round(px)-3, Math.round(py)+5, 7, 2);
  ctx.fillStyle = '#2c3258';
  ctx.fillRect(Math.round(px)-3, by-4, 7, 9);
  ctx.fillStyle = '#3d4576';
  ctx.fillRect(Math.round(px)-2, by-6, 5, 4);
  ctx.fillStyle = '#e8c476';
  ctx.fillRect(Math.round(px) + (player.fx >= 0 ? 4 : -5), by-1, 2, 3);
  ctx.fillStyle = '#f5e3b0';
  ctx.fillRect(Math.round(px)-1, by-4, 2, 1);
  /* click-to-move destination marker */
  if(autoPath.length){
    var dest = autoPath[autoPath.length - 1];
    var mxp = dest[0]*TILE, myp = dest[1]*TILE;
    var mk = reduceMotion ? 0.8 : 0.45 + 0.45 * Math.sin(time*0.008);
    ctx.globalAlpha = mk;
    ctx.fillStyle = '#e8c476';
    ctx.fillRect(mxp+1, myp+1, 4, 1); ctx.fillRect(mxp+1, myp+1, 1, 4);
    ctx.fillRect(mxp+11, myp+1, 4, 1); ctx.fillRect(mxp+14, myp+1, 1, 4);
    ctx.fillRect(mxp+1, myp+14, 4, 1); ctx.fillRect(mxp+1, myp+11, 1, 4);
    ctx.fillRect(mxp+11, myp+14, 4, 1); ctx.fillRect(mxp+14, myp+11, 1, 4);
    ctx.globalAlpha = 1;
  }
  /* mist */
  if(!reduceMotion){
    for(var m = 0; m < mist.length; m++){
      var mm = mist[m];
      var mx = (mm.x + time*0.001*mm.s) % (384 + mm.r*2) - mm.r;
      var my = mm.y + Math.sin(time*0.0006 + mm.ph) * 6;
      var mg = ctx.createRadialGradient(mx, my, 1, mx, my, mm.r);
      mg.addColorStop(0, 'rgba(120,130,180,0.05)');
      mg.addColorStop(1, 'rgba(120,130,180,0)');
      ctx.fillStyle = mg;
      ctx.fillRect(mx-mm.r, my-mm.r, mm.r*2, mm.r*2);
    }
  }
  /* room-change fade */
  if(fade > 0){
    ctx.globalAlpha = fade;
    ctx.fillStyle = '#05060f';
    ctx.fillRect(0, 0, 384, 256);
    ctx.globalAlpha = 1;
  }
}
function ease(t){ return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2; }

/* ── loop ── */
var last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  var dt = Math.min(50, now - last);
  last = now;
  if(fade > 0) fade = Math.max(0, fade - dt / (reduceMotion ? 1 : 300));
  if(player.t < 1){
    player.t = Math.min(1, player.t + dt / STEP_MS);
    if(player.t >= 1) onArrive();
  } else {
    if(held.u) tryStep(0, -1);
    else if(held.d) tryStep(0, 1);
    else if(held.l) tryStep(-1, 0);
    else if(held.r) tryStep(1, 0);
    else if(autoPath.length){
      var nxt = autoPath[0];
      var pdx = nxt[0] - player.gx, pdy = nxt[1] - player.gy;
      tryStep(pdx, pdy);
      if(player.t < 1) autoPath.shift();
      else autoPath = [];        /* something now blocks the way — stop */
    }
  }
  draw(now);
}

/* debug/testing peek (read-only snapshot) */
window.__gg = function(){
  return {
    cur: cur,
    letters: JSON.parse(JSON.stringify(rooms[cur].letters)),
    rocks: Object.keys(rooms[cur].rocks || {}),
    gx: player.gx, gy: player.gy,
    inv: JSON.parse(JSON.stringify(inv)),
    doors: doorDirs(cur)
  };
};

/* ── responsive frame: always fit header + grove + panel on screen ── */
function fitFrame(){
  var head = document.querySelector('header');
  var panel = document.getElementById('panel');
  var chrome = head.offsetHeight + panel.offsetHeight + 70;
  var availH = Math.max(160, window.innerHeight - chrome);
  var w = Math.min(window.innerWidth * 0.92, 56 * 16, availH * 1.5);
  canvas.style.width = Math.max(260, Math.round(w)) + 'px';
}
window.addEventListener('resize', fitFrame);
window.addEventListener('orientationchange', fitFrame);

/* ── boot ── */
seedRoom(0);
fitFrame();
setTimeout(fitFrame, 300);   /* re-fit once fonts/panel settle */
document.getElementById('roomHint').textContent = '· ' + rooms[0].set.toUpperCase().split('').join(' ');
renderInv();
muteUi();
requestAnimationFrame(frame);
})();
</script>
</body>
