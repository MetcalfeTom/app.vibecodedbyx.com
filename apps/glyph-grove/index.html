<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glyph Grove</title>
<meta name="description" content="A pure-click word dungeon: eight moonlit rooms, one target word — click its letters in order, and don't touch the wrong one.">
<link rel="icon" href="https://emojicdn.elk.sh/🔤">
<meta property="og:title" content="Glyph Grove">
<meta property="og:description" content="A pure-click word dungeon: hunt the target word's letters in order through eight moonlit rooms — one wrong touch and the board erupts.">
<meta property="og:url" content="https://sloppy.live/glyph-grove/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/moody%20pixel%20art%20top%20down%20dark%20dungeon%20rooms%20connected%20by%20doorways%2C%20glowing%20golden%20letter%20tiles%2C%20tiny%20lantern%20wisp%20character%2C%20mist%2C%20deep%20indigo%20palette.png?width=1200&height=630&seed=2613&model=flux&nologo=true">
<style>
  :root{
    --void:#0b0d1a;
    --stone:#171a2e;
    --ink:#cdd3ec;
    --dim:#6d7494;
    --gold:#e8c476;
    --moss:#5a8f7a;
    --bad:#c25a5a;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Silkscreen", monospace;
    background:
      radial-gradient(ellipse 70% 50% at 50% 12%, #141830 0%, var(--void) 65%);
    color:var(--ink);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
  }
  header{ text-align:center; padding:0.6rem 1rem 0.2rem; }
  h1{
    font-family:"Cormorant Garamond", serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(1.5rem, 4.6vw, 2.4rem);
    letter-spacing:0.14em;
    color:var(--gold);
    text-shadow:0 0 1.4rem rgba(232,196,118,0.35);
  }
  .sub{ font-size:0.62rem; color:var(--dim); letter-spacing:0.22em; }
  #roomTag{
    font-size:0.62rem;
    color:var(--dim);
    letter-spacing:0.2em;
    margin-top:0.2rem;
  }
  #roomTag b{ color:var(--gold); font-weight:400; }
  #frame{
    position:relative;
    margin-top:0.4rem;
    border:2px solid #262b4a;
    box-shadow:0 0 0 1px #05060d, 0 1.2rem 3rem rgba(0,0,0,0.7), inset 0 0 3rem rgba(0,0,0,0.6);
  }
  canvas{
    display:block;
    width:min(92vw, 56rem);   /* refined per-viewport by fitFrame() */
    aspect-ratio:3 / 2;
    image-rendering:pixelated;
    touch-action:none;
  }
  #frame::after{
    content:'';
    position:absolute; inset:0;
    pointer-events:none;
    background:radial-gradient(ellipse at 50% 45%, transparent 55%, rgba(4,5,12,0.55) 100%);
  }

  /* ── satchel + spell bar ── */
  #panel{
    width:min(92vw, 56rem);
    margin-top:0.7rem;
    display:flex;
    flex-direction:column;
    gap:0.5rem;
  }
  #targetRow{
    display:flex;
    gap:0.3rem;
    flex-wrap:wrap;
    justify-content:center;
    min-height:2.5rem;
    align-items:center;
    padding:0.3rem 0.5rem;
    background:rgba(13,16,32,0.8);
    border:2px solid #262b4a;
  }
  #targetRow .empty{ font-size:0.6rem; color:var(--dim); letter-spacing:0.18em; }
  .inv{
    position:relative;
    width:2rem; height:2rem;
    display:grid; place-items:center;
    background:#1d2140;
    border:1px solid #3a4170;
    color:var(--gold);
    font-family:"Cormorant Garamond", serif;
    font-weight:700;
    font-size:1.3rem;
    text-transform:uppercase;
    box-shadow:0 0.2rem 0 rgba(0,0,0,0.5);
  }
  .inv.ghost{ opacity:0.3; }
  .inv.done{ border-color:var(--moss); box-shadow:0 0 0.7rem rgba(90,143,122,0.45); }
  .inv .n{
    position:absolute;
    right:-0.25rem; bottom:-0.35rem;
    font-family:"Silkscreen", monospace;
    font-size:0.55rem;
    color:var(--ink);
    background:#0b0d1a;
    border:1px solid #3a4170;
    padding:0 0.15rem;
  }
  #spellrow{
    display:flex;
    gap:0.5rem;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
  }
  #spellrow button{
    font-family:inherit;
    font-size:0.7rem;
    letter-spacing:0.12em;
    min-height:2.75rem;
    padding:0.4rem 1rem;
    background:#1d2140;
    color:var(--ink);
    border:2px solid #3a4170;
    cursor:pointer;
  }
  #spellrow button:hover{ border-color:var(--gold); color:var(--gold); }
  #spellrow button:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
  #spellrow button.go{ background:var(--moss); color:#0b1410; border-color:var(--moss); font-weight:700; }
  #spellrow button.go:hover{ color:#0b1410; filter:brightness(1.15); }
  #stats{
    display:flex; gap:1.3rem;
    justify-content:center;
    font-size:0.66rem;
    color:var(--dim);
    letter-spacing:0.14em;
  }
  #stats b{ color:var(--gold); font-weight:400; }
  #msg{
    min-height:1.1rem;
    font-size:0.64rem;
    letter-spacing:0.16em;
    color:var(--moss);
    text-align:center;
    padding:0.2rem 0 0.7rem;
  }
  #msg.bad{ color:var(--bad); }
  #msg.egg{ color:var(--gold); text-shadow:0 0 0.8rem rgba(232,196,118,0.6); }
  @keyframes inShake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-0.3rem); }
    75%{ transform:translateX(0.3rem); }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600;1,700&family=Silkscreen&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <h1>Glyph Grove</h1>
  <p class="sub">CLICK THE LETTERS · IN ORDER · THE WORD COMPLETES ITSELF</p>
  <p id="roomTag">ROOM <b id="roomName">I</b> <span id="roomHint"></span></p>
</header>

<div id="frame">
  <canvas id="g" width="384" height="256" role="application"
    aria-label="Glyph Grove: click any tile to walk there. Collect the target word's letters in order by clicking them — a wrong letter blows up the board. Arrow keys also move."></canvas>
</div>

<section id="panel" aria-label="Target word progress">
  <div id="targetRow" aria-live="off"><span class="empty">the grove is waking…</span></div>
  <div id="spellrow">
    <button type="button" id="btnMute" aria-pressed="false">♪ ON</button>
  </div>
  <div id="stats">
    <span>LEVEL <b id="level">1</b></span>
    <span>SCORE <b id="score">0</b></span>
    <span>BEST <b id="best">0</b></span>
    <span>WORDS <b id="wcount">0</b></span>
  </div>
</section>
<p id="msg" role="status" aria-live="polite"></p>

<script>
(function(){
'use strict';

/* word bank arrives as words.json — groups "2".."8"; game boots when loaded */
var DICT = new Set();
var BANK = null;
/* the grove is polite: these never score, even with the letters in hand */
var VULGAR = new Set(('fuck shit cunt bitch cock dick pussy asshole bastard whore slut fag faggot ' +
  'nigger nigga retard twat wank wanker prick bollocks piss tit tits boner cum jizz').split(' '));
function isVulgar(w){
  return VULGAR.has(w) || (w.slice(-1) === 's' && VULGAR.has(w.slice(0, -1))) ||
         (w.slice(-3) === 'ing' && VULGAR.has(w.slice(0, -3))) ||
         (w.slice(-2) === 'ed' && VULGAR.has(w.slice(0, -2)));
}
var TILE = 16, GW = 24, GH = 16;
var canvas = document.getElementById('g');
var ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

var VALS = { e:1,a:1,i:1,o:1,n:1,r:1,t:1,l:1,s:1,u:1, d:2,g:2, b:3,c:3,m:3,p:3, f:4,h:4,v:4,w:4,y:4, k:5, j:8,x:8, q:10,z:10 };

/* ── the ring of rooms ──
   a closed loop on a 3×3 room grid; letters get rarer the deeper you walk */
var PATH = [[0,0],[1,0],[2,0],[2,1],[2,2],[1,2],[0,2],[0,1]];
var ROOM_LETTERS = ['hi', 'nt', 'aeo', 'rsld', 'mcugp', 'bfwyv', 'kjaei', 'qzeou'];
var ROMAN = ['I','II','III','IV','V','VI','VII','VIII'];
var rooms = PATH.map(function(p, i){
  return { gx: p[0], gy: p[1], set: ROOM_LETTERS[i], rocks: null, letters: {} };
});
function roomAt(gx, gy){
  for(var i = 0; i < rooms.length; i++)
    if(rooms[i].gx === gx && rooms[i].gy === gy) return i;
  return -1;
}
/* neighbors in the ring (prev/next) — doors only along the path */
function neighbors(i){
  return [ (i + rooms.length - 1) % rooms.length, (i + 1) % rooms.length ];
}
function doorDirs(i){
  var out = {};
  neighbors(i).forEach(function(j){
    var dx = rooms[j].gx - rooms[i].gx, dy = rooms[j].gy - rooms[i].gy;
    if(dx === 1) out.right = j; else if(dx === -1) out.left = j;
    else if(dy === 1) out.down = j; else if(dy === -1) out.up = j;
  });
  return out;
}
var DOOR_Y = [7, 8], DOOR_X = [11, 12];   /* gap cells in each wall */

var cur = 0;
var fade = 0;

/* ── inventory (the typing satchel) ── */
var inv = {};
var score = 0, wcount = 0, best = 0;
var usedWords = new Set();   /* one run, one chance per word — survives level reshuffles */
/* the 5-letter rule (chat-confirmed): every level draws a 5-letter target */
function needLen(){ return 5; }

/* ── the level's target word: random from the dictionary, letters scattered
      across the ring; only ITS letters count when picked up ── */
var target = '';
var got = 0;                 /* letters of the target collected IN ORDER */
function pickTarget(){
  var pool = BANK[String(needLen())] || BANK['3'];
  for(var tries = 0; tries < 200; tries++){
    var w = pool[Math.floor(Math.random() * pool.length)];
    /* vowel required — screens out web-junk tokens like pst/www/pdf */
    if(!usedWords.has(w) && !isVulgar(w) && /[aeiouy]/.test(w)) return w;
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

/* ── secret words: the grove answers ── */
var EGGS = {
  glow:  'glow',  mist: 'mist',  star: 'star',
  dark:  'dark',  moon: 'moon',  ghost:'ghost',
  rain:  'rain',  gold: 'gold',  zen:  'zen'
};
Object.keys(EGGS).forEach(function(w){ DICT.add(w); });
var egg = { type: null, until: 0, parts: [] };
function startEgg(type, now){
  egg.type = type;
  egg.until = now + (type === 'dark' ? 4000 : type === 'zen' ? 5000 : 3200);
  egg.parts = [];
  if(type === 'star' || type === 'rain'){
    for(var i = 0; i < (type === 'star' ? 60 : 90); i++)
      egg.parts.push({ x: Math.random()*384, y: -Math.random()*256, v: 40 + Math.random()*(type === 'star' ? 60 : 160) });
  }
  if(type === 'gold'){
    for(var j = 0; j < 40; j++)
      egg.parts.push({ x: 150 + Math.random()*84, y: 260, v: -(30 + Math.random()*90), x0: 0 });
  }
}
try{ best = +localStorage.getItem('glyph-grove-best') || 0; }catch(e){}
var greeted = false;

/* ── player ── */
var player = { gx: 2, gy: 8, tx: 2, ty: 8, t: 1, fx: 1, fy: 0, bob: 0 };
var STEP_MS = 130;

function key(x, y){ return x + ',' + y; }
function isWall(x, y){
  if(x < 0 || y < 0 || x >= GW || y >= GH) return true;
  if(x > 0 && x < GW-1 && y > 0 && y < GH-1) return false;
  var d = doorDirs(cur);
  if(x === 0 && d.left !== undefined && DOOR_Y.indexOf(y) >= 0) return false;
  if(x === GW-1 && d.right !== undefined && DOOR_Y.indexOf(y) >= 0) return false;
  if(y === 0 && d.up !== undefined && DOOR_X.indexOf(x) >= 0) return false;
  if(y === GH-1 && d.down !== undefined && DOOR_X.indexOf(x) >= 0) return false;
  return true;
}
function blocked(x, y){
  if(isWall(x, y)) return true;
  return !!(rooms[cur].rocks && rooms[cur].rocks[key(x, y)]);
}

/* ── room generation ── */
function seedRoom(i){
  var r = rooms[i];
  if(!r.rocks){
    r.rocks = {};
    var n = 8 + Math.floor(Math.random() * 6);
    var guard = 300;
    while(n > 0 && guard-- > 0){
      var x = 2 + Math.floor(Math.random() * (GW - 4));
      var y = 2 + Math.floor(Math.random() * (GH - 4));
      if(Math.abs(x - 12) < 3 && Math.abs(y - 8) < 3) continue;   /* keep center open */
      if(Math.abs(x - player.gx) < 2 && Math.abs(y - player.gy) < 2) continue;  /* never on/around the player */
      if(r.rocks[key(x, y)]) continue;
      r.rocks[key(x, y)] = true;
      n--;
    }
  }
  /* plant: this room's share of the TARGET word + two decoys from its set */
  if(!r.planted){
    r.planted = true;
    var toPlace = (r.plant || []).slice();
    toPlace.push(r.set[Math.floor(Math.random() * r.set.length)]);
    toPlace.push(r.set[Math.floor(Math.random() * r.set.length)]);
    for(var c = 0; c < toPlace.length; c++){
      var g2 = 300;
      while(g2-- > 0){
        var x2 = 2 + Math.floor(Math.random() * (GW - 4));
        var y2 = 2 + Math.floor(Math.random() * (GH - 4));
        var k2 = key(x2, y2);
        if(r.rocks[k2] || r.letters[k2]) continue;
        if(x2 === player.gx && y2 === player.gy) continue;
        r.letters[k2] = toPlace[c];
        break;
      }
    }
  }
}
function enterRoom(j, enterSide){
  cur = j;
  seedRoom(j);
  fade = 1;
  autoPath = [];                 /* old room's path means nothing here */
  if(enterSide === 'left'){ player.gx = 1; player.gy = DOOR_Y[0]; }
  if(enterSide === 'right'){ player.gx = GW-2; player.gy = DOOR_Y[0]; }
  if(enterSide === 'up'){ player.gx = DOOR_X[0]; player.gy = 1; }
  if(enterSide === 'down'){ player.gx = DOOR_X[0]; player.gy = GH-2; }
  player.x = player.tx = player.gx; player.ty = player.gy; player.t = 1;
  document.getElementById('roomName').textContent = ROMAN[j];
  document.getElementById('roomHint').textContent = '· ' + rooms[j].set.toUpperCase().split('').join(' ');
  sndDoor();
}

/* ── audio ── */
var ac = null, muted = false;
try{ muted = localStorage.getItem('glyph-grove-mute') === '1'; }catch(e){}
function snd(fn){
  if(muted) return;
  try{
    if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    fn(ac, ac.currentTime);
  }catch(e){}
}
function sndStep(){
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'triangle'; o.frequency.value = 90 + Math.random() * 25;
    g.gain.setValueAtTime(0.035, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + 0.07);
  });
}
function sndPick(n){
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'sine';
    o.frequency.value = 440 * Math.pow(2, Math.min(12, n * 2) / 12);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.09, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + 0.55);
  });
}
function sndDoor(){
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(220, t);
    o.frequency.exponentialRampToValueAtTime(110, t + 0.3);
    g.gain.setValueAtTime(0.06, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + 0.4);
  });
}
function sndWord(len){
  snd(function(a, t){
    for(var i = 0; i < Math.min(6, len); i++){
      var o = a.createOscillator(), g = a.createGain();
      o.type = 'triangle';
      o.frequency.value = 523 * Math.pow(2, [0,4,7,12,16,19][i] / 12);
      g.gain.setValueAtTime(0.0001, t + i * 0.07);
      g.gain.linearRampToValueAtTime(0.08, t + i * 0.07 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.7);
      o.connect(g); g.connect(a.destination);
      o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.75);
    }
  });
}
function sndBad(){
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(160, t);
    o.frequency.exponentialRampToValueAtTime(70, t + 0.25);
    g.gain.setValueAtTime(0.07, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + 0.3);
  });
}

/* ── ui ── */
var invEl = document.getElementById('inv');
var targetRow = document.getElementById('targetRow');
var msgEl = document.getElementById('msg');
var msgT = 0;
function message(txt, kind){
  msgEl.textContent = txt;
  msgEl.className = kind === true ? 'bad' : (kind || '');
  clearTimeout(msgT);
  msgT = setTimeout(function(){ msgEl.textContent = ''; }, 3800);
}
function updateLevelUi(){
  document.getElementById('level').textContent = wcount + 1;
  renderTarget();
}
function renderTarget(){
  targetRow.textContent = '';
  if(!target){
    var e = document.createElement('span');
    e.className = 'empty';
    e.textContent = 'the grove is waking\u2026';
    targetRow.appendChild(e);
  }
  for(var i = 0; i < target.length; i++){
    var d = document.createElement('span');
    d.className = 'inv ' + (i < got ? 'done' : 'ghost');
    d.textContent = target[i];
    targetRow.appendChild(d);
  }
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('wcount').textContent = wcount;
}
/* the correct final letter completes the level on its own */
function completeLevel(){
  var pts = 0;
  for(var j = 0; j < target.length; j++) pts += VALS[target[j]] || 1;
  pts *= target.length;
  var isEgg = !!EGGS[target];
  if(target === 'gold') pts *= 2;
  usedWords.add(target);
  score += pts;
  wcount++;
  if(score > best){
    best = score;
    try{ localStorage.setItem('glyph-grove-best', String(best)); }catch(e){}
  }
  if(isEgg){
    startEgg(target, performance.now());
    message('\u2726 "' + target.toUpperCase() + '" \u00b7 +' + pts + ' \u00b7 A SECRET STIRS \u2726', 'egg');
  } else {
    message('"' + target.toUpperCase() + '" \u00b7 +' + pts + ' \u00b7 LEVEL ' + (wcount + 1));
  }
  sndWord(target.length);
  freshLevel();
}
/* every solved word reshuffles the ring: new target, new rocks, new letters */
function freshLevel(){
  target = pickTarget();
  got = 0;
  rooms.forEach(function(r){ r.rocks = null; r.letters = {}; r.planted = false; r.plant = []; });
  for(var i = 0; i < target.length; i++)
    rooms[Math.floor(Math.random() * rooms.length)].plant.push(target[i]);
  seedRoom(cur);
  fade = 1;
  updateLevelUi();
}
var muteBtn = document.getElementById('btnMute');
function muteUi(){
  muteBtn.textContent = muted ? '♪ OFF' : '♪ ON';
  muteBtn.setAttribute('aria-pressed', muted ? 'true' : 'false');
}
muteBtn.addEventListener('click', function(){
  muted = !muted;
  try{ localStorage.setItem('glyph-grove-mute', muted ? '1' : '0'); }catch(e){}
  muteUi();
});

/* ── movement ── */
var held = {};
document.addEventListener('keydown', function(e){
  var tag = (e.target && e.target.tagName || '').toLowerCase();
  if(tag === 'input' || tag === 'textarea') return;
  var k = e.key.toLowerCase();
  var map = { w:'u', arrowup:'u', s:'d', arrowdown:'d', a:'l', arrowleft:'l', d:'r', arrowright:'r' };
  if(map[k]){
    e.preventDefault();
    held[map[k]] = true;
    autoPath = [];               /* manual input overrides click-walking */
    var dv = { u:[0,-1], d:[0,1], l:[-1,0], r:[1,0] }[map[k]];
    tryStep(dv[0], dv[1]);
  }
});
document.addEventListener('keyup', function(e){
  var k = e.key.toLowerCase();
  var map = { w:'u', arrowup:'u', s:'d', arrowdown:'d', a:'l', arrowleft:'l', d:'r', arrowright:'r' };
  if(map[k]) held[map[k]] = false;
});
window.addEventListener('blur', function(){ held = {}; });

/* ── click-to-move: BFS to any walkable tile ── */
var autoPath = [];
function bfsTo(txg, tyg){
  if(blocked(txg, tyg)) return null;
  var prev = {};
  prev[key(player.gx, player.gy)] = null;
  var q = [[player.gx, player.gy]];
  while(q.length){
    var c = q.shift();
    if(c[0] === txg && c[1] === tyg){
      var path = [], k = key(c[0], c[1]);
      while(prev[k] !== null){ path.unshift(k.split(',').map(Number)); k = prev[k]; }
      return path;
    }
    for(var di = 0; di < 4; di++){
      var dv = [[1,0],[-1,0],[0,1],[0,-1]][di];
      var nx = c[0] + dv[0], ny = c[1] + dv[1], nk = key(nx, ny);
      if(prev[nk] !== undefined || blocked(nx, ny)) continue;
      prev[nk] = key(c[0], c[1]);
      q.push([nx, ny]);
    }
  }
  return null;
}
function clickToMove(e){
  var r = canvas.getBoundingClientRect();
  var x = Math.floor((e.clientX - r.left) / r.width * GW);
  var y = Math.floor((e.clientY - r.top) / r.height * GH);
  var path = bfsTo(x, y);
  if(path && path.length){ autoPath = path; sndStep(); }
}

var swipe = null, press = null;
canvas.addEventListener('pointerdown', function(e){
  e.preventDefault();
  swipe = { x: e.clientX, y: e.clientY };
  press = { x: e.clientX, y: e.clientY, moved: false };
});
canvas.addEventListener('pointermove', function(e){
  if(press && Math.hypot(e.clientX - press.x, e.clientY - press.y) > 12) press.moved = true;
});
canvas.addEventListener('pointerup', function(e){
  if(press && !press.moved && Math.hypot(e.clientX - press.x, e.clientY - press.y) < 10){
    clickToMove(e);
  }
  swipe = null; press = null;
});
canvas.addEventListener('pointercancel', function(){ swipe = null; press = null; });

function tryStep(dx, dy){
  if(player.t < 1) return;
  player.fx = dx; player.fy = dy;
  var nx = player.gx + dx, ny = player.gy + dy;
  if(blocked(nx, ny)) return;
  player.tx = player.gx; player.ty = player.gy;
  player.gx = nx; player.gy = ny;
  player.t = 0;
  sndStep();
}
function onArrive(){
  var d = doorDirs(cur);
  /* stepping into a doorway carries you through */
  if(player.gx === 0 && d.left !== undefined){ enterRoom(d.left, 'right'); return; }
  if(player.gx === GW-1 && d.right !== undefined){ enterRoom(d.right, 'left'); return; }
  if(player.gy === 0 && d.up !== undefined){ enterRoom(d.up, 'down'); return; }
  if(player.gy === GH-1 && d.down !== undefined){ enterRoom(d.down, 'up'); return; }
  var k = key(player.gx, player.gy);
  var r = rooms[cur];
  if(r.letters[k]){
    var ch = r.letters[k];
    /* letters must be taken IN ORDER \u2014 anything else detonates the board */
    if(got >= target.length || ch !== target[got]){
      boardBoom();
      message('WRONG LETTER! THE BOARD ERUPTS \u2014 START "' + target.toUpperCase() + '" OVER', true);
      return;
    }
    delete r.letters[k];
    got++;
    sndPick(Math.min(6, got));
    updateLevelUi();
    if(got >= target.length) completeLevel();
  }
}

/* ── wrong-touch explosion (pixel shards + shake, no libraries needed) ── */
var boomParts = [], shakeUntil = 0;
function boardBoom(){
  var r = rooms[cur];
  for(var k in r.letters){
    var p = k.split(',');
    boom(+p[0], +p[1]);
  }
  boom(player.gx, player.gy);
  got = 0;
  if(!reduceMotion) shakeUntil = performance.now() + 420;
  updateLevelUi();
}
function boom(gx2, gy2){
  var cx = (gx2 + 0.5) * TILE, cy = (gy2 + 0.5) * TILE;
  for(var i = 0; i < 26; i++){
    var a = Math.random() * 6.28, sp = 30 + Math.random() * 120;
    boomParts.push({
      x: cx, y: cy,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
      life: 0.55 + Math.random() * 0.3,
      col: ['#ff8c3a','#e8503a','#ffd98a','#fff3d0'][i % 4]
    });
  }
  if(!reduceMotion) shakeUntil = performance.now() + 240;
  snd(function(a2, t){
    var len = a2.sampleRate * 0.25 | 0, buf = a2.createBuffer(1, len, a2.sampleRate), d = buf.getChannelData(0);
    for(var n = 0; n < len; n++) d[n] = (Math.random()*2-1) * (1 - n/len);
    var src = a2.createBufferSource(); src.buffer = buf;
    var lp = a2.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 900;
    var g = a2.createGain(); g.gain.value = 0.14;
    src.connect(lp); lp.connect(g); g.connect(a2.destination); src.start(t);
    var o = a2.createOscillator(), g2 = a2.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(90, t);
    o.frequency.exponentialRampToValueAtTime(35, t + 0.22);
    g2.gain.setValueAtTime(0.16, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
    o.connect(g2); g2.connect(a2.destination); o.start(t); o.stop(t + 0.26);
  });
}

/* ── mist ── */
var mist = [];
for(var mi = 0; mi < 26; mi++){
  mist.push({ x: Math.random()*384, y: Math.random()*256, r: 14 + Math.random()*26, s: 2 + Math.random()*6, ph: Math.random()*6.28 });
}

/* ── render ── */
function draw(time){
  var shaking = time < shakeUntil;
  if(shaking){
    ctx.fillStyle = '#05060f';
    ctx.fillRect(0, 0, 384, 256);
    var sAmp = 3 * (shakeUntil - time) / 240;
    ctx.save();
    ctx.translate(Math.round((Math.random()*2-1)*sAmp), Math.round((Math.random()*2-1)*sAmp));
  }
  ctx.fillStyle = '#10131f';
  ctx.fillRect(0, 0, 384, 256);
  var d = doorDirs(cur);
  for(var y = 0; y < GH; y++){
    for(var x = 0; x < GW; x++){
      if(isWall(x, y)){
        ctx.fillStyle = '#1e2340';
        ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
        ctx.fillStyle = '#262c50';
        ctx.fillRect(x*TILE, y*TILE, TILE, 3);
        ctx.fillStyle = '#12152a';
        ctx.fillRect(x*TILE, y*TILE + TILE - 2, TILE, 2);
        continue;
      }
      ctx.fillStyle = (x + y) % 2 ? '#121525' : '#10131f';
      ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
      if(((x*7 + y*13) % 9) === 0){
        ctx.fillStyle = '#1a1e33';
        ctx.fillRect(x*TILE + (x%3)*4 + 2, y*TILE + (y%3)*4 + 2, 1, 1);
      }
      ctx.fillStyle = 'rgba(30,34,60,0.5)';
      ctx.fillRect(x*TILE, y*TILE, TILE, 1);
      ctx.fillRect(x*TILE, y*TILE, 1, TILE);
    }
  }
  /* doorway darkness — the corridor beyond */
  ctx.fillStyle = '#05060f';
  if(d.left !== undefined) ctx.fillRect(0, DOOR_Y[0]*TILE, 4, TILE*2);
  if(d.right !== undefined) ctx.fillRect(384-4, DOOR_Y[0]*TILE, 4, TILE*2);
  if(d.up !== undefined) ctx.fillRect(DOOR_X[0]*TILE, 0, TILE*2, 4);
  if(d.down !== undefined) ctx.fillRect(DOOR_X[0]*TILE, 256-4, TILE*2, 4);
  /* rocks */
  var r = rooms[cur];
  for(var rk in r.rocks){
    var rp = rk.split(',');
    var rx = +rp[0]*TILE, ry = +rp[1]*TILE;
    ctx.fillStyle = '#232948';
    ctx.fillRect(rx+2, ry+4, 12, 10);
    ctx.fillStyle = '#2f3760';
    ctx.fillRect(rx+3, ry+5, 8, 4);
    ctx.fillStyle = '#151a30';
    ctx.fillRect(rx+2, ry+12, 12, 2);
  }
  /* letters */
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for(var lk in r.letters){
    var lp = lk.split(',');
    var lx = +lp[0]*TILE, ly = +lp[1]*TILE;
    var pulse = reduceMotion ? 0.75 : 0.55 + 0.35 * Math.sin(time*0.003 + (+lp[0])*1.7 + (+lp[1])*0.9);
    var lift = reduceMotion ? 0 : Math.round(Math.sin(time*0.002 + (+lp[0]) + (+lp[1])*2) * 1.5);
    if(egg.type === 'zen' && time < egg.until && !reduceMotion)
      lift = Math.round(Math.sin(time*0.0016) * 4);     /* every rune breathes as one */
    ctx.globalAlpha = pulse * 0.25;
    ctx.fillStyle = '#e8c476';
    ctx.fillRect(lx+1, ly+1+lift, 14, 14);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#1d2140';
    ctx.fillRect(lx+3, ly+3+lift, 10, 10);
    ctx.strokeStyle = 'rgba(232,196,118,' + (0.4 + pulse*0.5) + ')';
    ctx.strokeRect(lx+3.5, ly+3.5+lift, 9, 9);
    ctx.fillStyle = '#e8c476';
    ctx.font = '9px "Cormorant Garamond", serif';
    ctx.fillText(r.letters[lk].toUpperCase(), lx+8, ly+8.5+lift);
  }
  /* player */
  var px = (player.tx + (player.gx - player.tx) * ease(player.t) + 0.5) * TILE;
  var py = (player.ty + (player.gy - player.ty) * ease(player.t) + 0.5) * TILE;
  player.bob = reduceMotion ? 0 : Math.sin(time*0.004) * 1.2;
  var by = Math.round(py + player.bob);
  var halo = ctx.createRadialGradient(px, by, 2, px, by, 26);
  halo.addColorStop(0, 'rgba(232,196,118,0.18)');
  halo.addColorStop(1, 'rgba(232,196,118,0)');
  ctx.fillStyle = halo;
  ctx.fillRect(px-26, by-26, 52, 52);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(Math.round(px)-3, Math.round(py)+5, 7, 2);
  if(egg.type === 'ghost' && time < egg.until) ctx.globalAlpha = 0.55;
  ctx.fillStyle = '#2c3258';
  ctx.fillRect(Math.round(px)-3, by-4, 7, 9);
  ctx.fillStyle = '#3d4576';
  ctx.fillRect(Math.round(px)-2, by-6, 5, 4);
  ctx.fillStyle = '#e8c476';
  ctx.fillRect(Math.round(px) + (player.fx >= 0 ? 4 : -5), by-1, 2, 3);
  ctx.fillStyle = '#f5e3b0';
  ctx.fillRect(Math.round(px)-1, by-4, 2, 1);
  ctx.globalAlpha = 1;
  /* click-to-move destination marker */
  if(autoPath.length){
    var dest = autoPath[autoPath.length - 1];
    var mxp = dest[0]*TILE, myp = dest[1]*TILE;
    var mk = reduceMotion ? 0.8 : 0.45 + 0.45 * Math.sin(time*0.008);
    ctx.globalAlpha = mk;
    ctx.fillStyle = '#e8c476';
    ctx.fillRect(mxp+1, myp+1, 4, 1); ctx.fillRect(mxp+1, myp+1, 1, 4);
    ctx.fillRect(mxp+11, myp+1, 4, 1); ctx.fillRect(mxp+14, myp+1, 1, 4);
    ctx.fillRect(mxp+1, myp+14, 4, 1); ctx.fillRect(mxp+1, myp+11, 1, 4);
    ctx.fillRect(mxp+11, myp+14, 4, 1); ctx.fillRect(mxp+14, myp+11, 1, 4);
    ctx.globalAlpha = 1;
  }
  /* mist */
  if(!reduceMotion){
    for(var m = 0; m < mist.length; m++){
      var mm = mist[m];
      var mx = (mm.x + time*0.001*mm.s) % (384 + mm.r*2) - mm.r;
      var my = mm.y + Math.sin(time*0.0006 + mm.ph) * 6;
      var mg = ctx.createRadialGradient(mx, my, 1, mx, my, mm.r);
      mg.addColorStop(0, 'rgba(120,130,180,0.05)');
      mg.addColorStop(1, 'rgba(120,130,180,0)');
      ctx.fillStyle = mg;
      ctx.fillRect(mx-mm.r, my-mm.r, mm.r*2, mm.r*2);
    }
  }
  /* ── secret-word effects ── */
  if(egg.type && time < egg.until){
    var left = (egg.until - time);
    var dtE = egg._lt ? Math.min(50, time - egg._lt) : 16;
    egg._lt = time;
    if(egg.type === 'glow'){
      ctx.globalAlpha = 0.18 * (0.6 + 0.4 * Math.sin(time*0.008)) * Math.min(1, left/800);
      ctx.fillStyle = '#e8c476';
      ctx.fillRect(0, 0, 384, 256);
      ctx.globalAlpha = 1;
    }
    if(egg.type === 'moon'){
      var ma = Math.min(1, (3200 - left) / 700) * Math.min(1, left / 700);
      ctx.globalAlpha = 0.5 * ma;
      ctx.fillStyle = '#dfe4f5';
      ctx.beginPath(); ctx.arc(300, 56, 38, 0, 6.29); ctx.fill();
      ctx.globalAlpha = 0.25 * ma;
      ctx.beginPath(); ctx.arc(300, 56, 48, 0, 6.29); ctx.fill();
      ctx.globalAlpha = 1;
    }
    if(egg.type === 'star' || egg.type === 'rain'){
      ctx.fillStyle = egg.type === 'star' ? '#e8c476' : '#7a9ae0';
      for(var ep = 0; ep < egg.parts.length; ep++){
        var p2 = egg.parts[ep];
        p2.y += p2.v * dtE / 1000;
        if(p2.y > 256){ p2.y = -8; p2.x = Math.random()*384; }
        ctx.globalAlpha = Math.min(1, left/800) * 0.8;
        ctx.fillRect(Math.round(p2.x), Math.round(p2.y), 1, egg.type === 'rain' ? 5 : 2);
      }
      ctx.globalAlpha = 1;
    }
    if(egg.type === 'gold'){
      ctx.fillStyle = '#ffd98a';
      for(var eg = 0; eg < egg.parts.length; eg++){
        var p3 = egg.parts[eg];
        p3.y += p3.v * dtE / 1000;
        ctx.globalAlpha = Math.max(0, Math.min(1, left/1200));
        ctx.fillRect(Math.round(p3.x + Math.sin(time*0.01 + eg)*3), Math.round(p3.y), 2, 2);
      }
      ctx.globalAlpha = 1;
    }
    if(egg.type === 'dark'){
      ctx.fillStyle = 'rgba(2,3,8,' + (0.94 * Math.min(1, (4000 - left) / 400) * Math.min(1, left / 600)) + ')';
      ctx.fillRect(0, 0, 384, 256);
      var hole = ctx.createRadialGradient(px, by, 4, px, by, 34);
      hole.addColorStop(0, 'rgba(232,196,118,0.32)');
      hole.addColorStop(1, 'rgba(232,196,118,0)');
      ctx.fillStyle = hole;
      ctx.fillRect(px-34, by-34, 68, 68);
    }
    if(egg.type === 'ghost'){
      ctx.globalAlpha = 0.3 * Math.min(1, left/700);
      var ex2 = (player.tx + 0.5) * TILE, ey2 = (player.ty + 0.5) * TILE;
      ctx.fillStyle = '#8a95c8';
      ctx.fillRect(Math.round(ex2)-3, Math.round(ey2 + player.bob)-4, 7, 9);
      ctx.fillRect(Math.round(ex2)-2, Math.round(ey2 + player.bob)-6, 5, 4);
      ctx.globalAlpha = 1;
    }
    if(egg.type === 'mist' && !reduceMotion){
      for(var em = 0; em < mist.length; em++){
        var m3 = mist[em];
        var mx3 = (m3.x + time*0.002*m3.s) % (384 + m3.r*2) - m3.r;
        var my3 = m3.y + Math.sin(time*0.0012 + m3.ph) * 10;
        var mg3 = ctx.createRadialGradient(mx3, my3, 1, mx3, my3, m3.r*1.6);
        mg3.addColorStop(0, 'rgba(140,150,200,' + (0.14 * Math.min(1, left/800)) + ')');
        mg3.addColorStop(1, 'rgba(140,150,200,0)');
        ctx.fillStyle = mg3;
        ctx.fillRect(mx3-m3.r*1.6, my3-m3.r*1.6, m3.r*3.2, m3.r*3.2);
      }
    }
  } else if(egg.type){
    egg.type = null;
    egg._lt = 0;
  }

  /* explosion shards */
  for(var bp = 0; bp < boomParts.length; bp++){
    var b2 = boomParts[bp];
    ctx.globalAlpha = Math.max(0, Math.min(1, b2.life * 2.2));
    ctx.fillStyle = b2.col;
    ctx.fillRect(Math.round(b2.x), Math.round(b2.y), 2, 2);
  }
  ctx.globalAlpha = 1;
  /* room-change fade */
  if(fade > 0){
    ctx.globalAlpha = fade;
    ctx.fillStyle = '#05060f';
    ctx.fillRect(0, 0, 384, 256);
    ctx.globalAlpha = 1;
  }
  if(shaking) ctx.restore();
}
function ease(t){ return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2; }

/* ── loop ── */
var last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  var dt = Math.min(50, now - last);
  last = now;
  if(fade > 0) fade = Math.max(0, fade - dt / (reduceMotion ? 1 : 300));
  for(var bi2 = boomParts.length - 1; bi2 >= 0; bi2--){
    var bb = boomParts[bi2];
    bb.life -= dt / 1000;
    if(bb.life <= 0){ boomParts.splice(bi2, 1); continue; }
    bb.x += bb.vx * dt / 1000;
    bb.y += bb.vy * dt / 1000;
    bb.vy += 260 * dt / 1000;
  }
  if(player.t < 1){
    player.t = Math.min(1, player.t + dt / STEP_MS);
    if(player.t >= 1) onArrive();
  } else {
    if(held.u) tryStep(0, -1);
    else if(held.d) tryStep(0, 1);
    else if(held.l) tryStep(-1, 0);
    else if(held.r) tryStep(1, 0);
    else if(autoPath.length){
      var nxt = autoPath[0];
      var pdx = nxt[0] - player.gx, pdy = nxt[1] - player.gy;
      tryStep(pdx, pdy);
      if(player.t < 1) autoPath.shift();
      else autoPath = [];        /* something now blocks the way — stop */
    }
  }
  draw(now);
}

/* debug/testing peek (read-only snapshot) */
window.__gg = function(){
  return {
    cur: cur,
    letters: JSON.parse(JSON.stringify(rooms[cur].letters)),
    rocks: Object.keys(rooms[cur].rocks || {}),
    gx: player.gx, gy: player.gy,
    inv: JSON.parse(JSON.stringify(inv)),
    doors: doorDirs(cur),
    target: target,
    got: got,
    allRooms: rooms.map(function(r){ return Object.values(r.letters || {}).join(''); })
  };
};

/* ── responsive frame: always fit header + grove + panel on screen ── */
function fitFrame(){
  var head = document.querySelector('header');
  var panel = document.getElementById('panel');
  var chrome = head.offsetHeight + panel.offsetHeight + 70;
  var availH = Math.max(160, window.innerHeight - chrome);
  var w = Math.min(window.innerWidth * 0.92, 56 * 16, availH * 1.5);
  canvas.style.width = Math.max(260, Math.round(w)) + 'px';
}
window.addEventListener('resize', fitFrame);
window.addEventListener('orientationchange', fitFrame);

/* ── boot: word bank first, then the grove wakes ── */
fetch('words.json')
  .then(function(r){ if(!r.ok) throw new Error('bank ' + r.status); return r.json(); })
  .then(function(bank){
    BANK = bank;
    Object.keys(bank).forEach(function(len){
      bank[len].forEach(function(w){ DICT.add(w); });
    });
    freshLevel();
    fade = 0;            /* no fade on first paint */
  })
  .catch(function(){
    message('THE WORD BANK FAILED TO LOAD — RELOAD THE PAGE', true);
  });
fitFrame();
setTimeout(fitFrame, 300);   /* re-fit once fonts/panel settle */
document.getElementById('roomHint').textContent = '· ' + rooms[0].set.toUpperCase().split('').join(' ');
renderTarget();
muteUi();
requestAnimationFrame(frame);
})();
</script>
