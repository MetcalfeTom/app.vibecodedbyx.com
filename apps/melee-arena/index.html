<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeleeArena — 4 fighters, one dusty square</title>
<meta name="description" content="Semi-top-down pixel melee fighter: pick one of 4 fighters, best-of-3 against the AI. WASD + J attack + K special.">
<link rel="icon" href="https://emojicdn.elk.sh/🥊">
<meta property="og:title" content="MeleeArena">
<meta property="og:description" content="4 pixel fighters, balanced kits, best-of-3 vs the AI. Pick your fighter.">
<meta property="og:url" content="https://sloppy.live/melee-arena">
<meta property="og:image" content="https://image.pollinations.ai/prompt/pixel%20art%20fighting%20game%20character%20select%20screen%2C%20four%20tiny%20warriors%20hammer%20sword%20daggers%20staff%2C%20dusty%20dojo%20arena%20at%20dusk%2C%20red%20banners%2C%20warm%20terracotta%20palette%2C%20crisp%20retro%20game%20art?width=1200&height=630&seed=6260&nologo=true&model=flux&image=.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --dusk:#2a1a24; --sky:#8a4a52; --sand:#c98d52; --ink:#1d1016;
  --red:#d94f3d; --gold:#eec46a; --teal:#5fb8a5; --violet:#9a7ab8; --bone:#f4e8d0; --dim:#a08a86;
}
*{box-sizing:border-box;}
html{font-size:100%;}
html,body{height:100%;}
body{margin:0; overflow:hidden; font-family:Silkscreen,monospace; color:var(--bone);
  background:linear-gradient(180deg,var(--dusk),#3d2430 55%,#241018);}
canvas{position:fixed; inset:0; display:block; image-rendering:pixelated;}
/* ── HUD ── */
#hud{position:fixed; top:0; left:0; right:0; z-index:5; padding:.6rem .8rem 0; display:none; pointer-events:none;}
#hud.on{display:block;}
.bars{display:flex; align-items:flex-start; gap:.8rem;}
.side{flex:1;}
.side .nm{font-family:'Jersey 10',monospace; font-size:1.5rem; line-height:1; letter-spacing:.04em;}
.side.right .nm{text-align:right;}
.hpout{height:1.05rem; border:3px solid var(--ink); background:#00000055; margin-top:.2rem; position:relative;}
.hpin{position:absolute; inset:0; background:linear-gradient(180deg,#ffe9a8,var(--gold) 60%); transform-origin:left; transition:transform .15s;}
.side.right .hpin{ transform-origin:right; }
.hpin.hurt{background:linear-gradient(180deg,#ff9a80,var(--red) 60%);}
.pips{margin-top:.25rem; font-size:.7rem; letter-spacing:.3em; color:var(--gold);}
.side.right .pips{text-align:right;}
#clock{font-family:'Jersey 10',monospace; font-size:2.2rem; line-height:1; min-width:3.2rem; text-align:center; color:var(--bone); text-shadow:2px 2px 0 var(--ink);}
/* ── overlays ── */
.ov{position:fixed; inset:0; z-index:10; display:none; align-items:center; justify-content:center; flex-direction:column; gap:1rem;
  background:rgba(29,16,22,.9);}
.ov.on{display:flex;}
h1{font-family:'Jersey 10',monospace; font-weight:400; font-size:clamp(3rem,11vw,5.5rem); margin:0; line-height:.85; text-align:center;
  color:var(--gold); text-shadow:4px 4px 0 var(--ink), -2px -2px 0 rgba(217,79,61,.6);}
h1 small{display:block; font-size:.32em; color:var(--dim); letter-spacing:.4em; text-shadow:none; margin-top:.4rem;}
.roster{display:grid; grid-template-columns:repeat(4,minmax(9rem,11rem)); gap:.9rem; padding:0 1rem;}
@media (max-width:52rem){ .roster{grid-template-columns:repeat(2,minmax(9rem,11.5rem));} }
.fcard{
  border:3px solid var(--ink); background:#3a2230; padding:.7rem .7rem .8rem; cursor:pointer; text-align:center;
  box-shadow:4px 4px 0 var(--ink); transition:transform .1s;
  font-family:inherit; color:inherit; min-height:2.75rem;
}
.fcard:hover{transform:translate(-2px,-2px); box-shadow:6px 6px 0 var(--ink);}
.fcard:focus-visible{outline:3px solid var(--gold); outline-offset:3px;}
.fcard canvas{width:4.5rem; height:6rem; image-rendering:pixelated; background:#00000033; border:2px solid var(--ink);}
.fcard .fn{font-family:'Jersey 10',monospace; font-size:1.6rem; line-height:1; margin:.35rem 0 .1rem;}
.fcard .ft{font-size:.55rem; color:var(--dim); min-height:2.2em; line-height:1.7;}
.fcard .st{display:grid; grid-template-columns:2.2rem 1fr; gap:.15rem .35rem; margin-top:.45rem; font-size:.5rem; color:var(--dim); text-align:left;}
.fcard .st i{align-self:center; height:.45rem; background:#00000066; position:relative;}
.fcard .st i::after{content:''; position:absolute; inset:0; background:var(--c,var(--gold)); transform-origin:left; transform:scaleX(var(--v,.5));}
.vs{font-family:'Jersey 10',monospace; font-size:1.2rem; color:var(--dim);}
button.big{
  font-family:'Jersey 10',monospace; font-size:1.5rem; letter-spacing:.06em; cursor:pointer;
  min-height:2.75rem; padding:.5rem 2.2rem; border:3px solid var(--ink); background:var(--red); color:var(--bone);
  box-shadow:4px 4px 0 var(--ink);
}
button.big:hover{filter:brightness(1.1);}
button.big:focus-visible{outline:3px solid var(--gold); outline-offset:3px;}
#banner{
  position:fixed; top:34%; left:0; right:0; z-index:8; text-align:center; pointer-events:none;
  font-family:'Jersey 10',monospace; font-size:clamp(3rem,12vw,6rem); color:var(--bone);
  text-shadow:4px 4px 0 var(--ink); opacity:0; transform:scale(.6);
}
#banner.pop{animation:bpop .9s cubic-bezier(.2,1.6,.3,1) forwards;}
@keyframes bpop{ 0%{opacity:0; transform:scale(.6);} 25%{opacity:1; transform:scale(1.08);} 80%{opacity:1; transform:scale(1);} 100%{opacity:0; transform:scale(1.02);} }
#hint{position:fixed; bottom:.7rem; left:50%; transform:translateX(-50%); z-index:5; font-size:.6rem; letter-spacing:.18em; color:var(--dim); text-transform:uppercase; pointer-events:none; transition:opacity 1s;}
#hint.gone{opacity:0;}
/* touch */
#joy{position:fixed; left:1rem; bottom:1rem; width:8.2rem; height:8.2rem; z-index:6; display:none; touch-action:none;}
#joy .ring{position:absolute; inset:0; border-radius:50%; border:2px solid rgba(244,232,208,.3); background:rgba(244,232,208,.05);}
#joy .nub{position:absolute; left:50%; top:50%; width:3rem; height:3rem; border-radius:50%; transform:translate(-50%,-50%); background:rgba(238,196,106,.35); border:2px solid var(--gold);}
.tbs{position:fixed; right:.9rem; bottom:1rem; z-index:6; display:none; gap:.6rem;}
.tb{width:4.6rem; height:4.6rem; border-radius:50%; border:3px solid var(--ink); font-family:'Jersey 10',monospace; font-size:1.05rem; color:var(--ink); padding:0; touch-action:none;}
.tb.a{background:var(--gold);} .tb.s{background:var(--teal);} .tb.d{background:var(--bone);}
.tb.cd{opacity:.4;}
@media (pointer:coarse){ #joy{display:block;} .tbs{display:flex;} #hint{display:none;} }
@media (prefers-reduced-motion: reduce){ #banner.pop{animation:none; opacity:1; transform:none;} .hpin{transition:none;} .fcard{transition:none;} }
</style>
</head>
<body>
<canvas id="cv" role="application" aria-label="MeleeArena fight. WASD move, J attack, K special, L dash. Touch: joystick plus ATK, SPC, DASH buttons."></canvas>

<div id="hud">
  <div class="bars">
    <div class="side left"><div class="nm" id="n1">—</div><div class="hpout"><div class="hpin" id="hp1"></div></div><div class="pips" id="pp1"></div></div>
    <div id="clock">60</div>
    <div class="side right"><div class="nm" id="n2">—</div><div class="hpout"><div class="hpin hurt" id="hp2"></div></div><div class="pips" id="pp2"></div></div>
  </div>
</div>
<div id="banner" aria-live="polite"></div>
<p id="hint">wasd move · J attack · K special · L dash · m mute</p>

<div class="ov on" id="sel-ov" role="dialog" aria-modal="true" aria-labelledby="sel-h">
  <h1 id="sel-h">MELEE<span style="color:var(--red)">ARENA</span><small>choose your fighter</small></h1>
  <div class="roster" id="roster"></div>
  <p class="vs" id="foe-line">the machine picks its champion after you</p>
</div>
<div class="ov" id="end-ov" role="dialog" aria-modal="true" aria-labelledby="end-h">
  <h1 id="end-h">VICTORY</h1>
  <p class="vs" id="end-line"></p>
  <button class="big" id="again-btn" type="button">REMATCH</button>
  <button class="big" id="select-btn" type="button" style="background:#3a2230;color:var(--bone);">CHANGE FIGHTER</button>
</div>

<div id="joy" aria-hidden="true"><div class="ring"></div><div class="nub" id="nub"></div></div>
<div class="tbs" aria-hidden="true">
  <button class="tb d" id="t-dash" type="button">DASH</button>
  <button class="tb s" id="t-spec" type="button">SPC</button>
  <button class="tb a" id="t-atk" type="button">ATK</button>
</div>

<script>
(function(){
"use strict";
/* ═══ fighters: the balanced stat matrix ═══
   dps ≈ dmg/cd stays in a tight band; each buys power differently. */
var CHARS=[
 {id:'brute', name:'BRUTE', tag:'hammer. patience. gravity.', c1:'#d94f3d', c2:'#8a2f26', skin:'#e8b48a',
  hp:140, spd:150, dmg:26, range:50, arc:2.4, cd:.85, weapon:'hammer',
  sp:{name:'QUAKE', cd:6, kind:'slam', r:78, dmg:34, kb:340}},
 {id:'blade', name:'BLADE', tag:'a sword and no plan b.', c1:'#eec46a', c2:'#9a7522', skin:'#d8a06a',
  hp:100, spd:200, dmg:16, range:44, arc:1.9, cd:.5, weapon:'sword',
  sp:{name:'WHIRL', cd:5, kind:'spin', r:58, dmg:22, kb:220}},
 {id:'wisp', name:'WISP', tag:'two knives. zero hesitation.', c1:'#5fb8a5', c2:'#2e6a5e', skin:'#e8c8a0',
  hp:78, spd:250, dmg:9, range:36, arc:1.6, cd:.26, weapon:'daggers',
  sp:{name:'FLICKER', cd:4, kind:'blink', dist:150, dmg:20, kb:160}},
 {id:'monk', name:'MONK', tag:'the staff arrives before you do.', c1:'#9a7ab8', c2:'#5c4478', skin:'#c89468',
  hp:110, spd:185, dmg:14, range:62, arc:1.2, cd:.55, weapon:'staff',
  sp:{name:'GALE', cd:4.5, kind:'sweep', r:70, dmg:12, kb:420}}
];

/* ═══ pixel sprites (12×16 maps, palette chars) ═══ */
var BODY=[
'....hhhh....',
'...hhhhhh...',
'...hffffh...',
'...hfefef...',
'...hffffh...',
'....ffff....',
'..cccccccc..',
'.c.cccccc.c.',
'.c.cccccc.c.',
'.s.cccccc.s.',
'...cccccc...',
'...dddddd...',
'...dd..dd...',
'...dd..dd...',
'...ss..ss...',
'..sss..sss..'
];
function makeSprite(ch,scale){
  var cnv=document.createElement('canvas');
  var w=BODY[0].length, h=BODY.length;
  cnv.width=w*scale; cnv.height=h*scale;
  var c=cnv.getContext('2d');
  var pal={h:ch.c2, f:ch.skin, e:'#1d1016', c:ch.c1, d:ch.c2, s:'#1d1016'};
  for(var y=0;y<h;y++)for(var x=0;x<w;x++){
    var k=BODY[y][x]; if(k==='.')continue;
    c.fillStyle=pal[k]||'#fff';
    c.fillRect(x*scale,y*scale,scale,scale);
  }
  return cnv;
}

var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
var W=0,H=0;
/* 45° semi-top-down: world is a flat rect, Y drawn compressed */
var YSQ=.62, AR={x0:0,y0:0,x1:0,y1:0};
function resize(){
  var dpr=Math.min(devicePixelRatio||1,2);
  W=innerWidth; H=innerHeight;
  cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.imageSmoothingEnabled=false;
  var aw=Math.min(W*.86,860), ah=Math.min(H*.52,430)/YSQ;
  AR.x0=(W-aw)/2; AR.x1=AR.x0+aw;
  AR.y0=120/YSQ; AR.y1=AR.y0+ah;
}
function sy(y){ return H*.30+(y-AR.y0)*YSQ; }   // project world y → screen y
addEventListener('resize',resize); resize();

/* ═══ audio ═══ */
var AC=null, muted=false;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function snd(f){ if(!muted&&ac()) try{ f(AC); }catch(e){} }
function tone(c,ty,f0,f1,d,v){ var o=c.createOscillator(),g=c.createGain(); o.type=ty; o.frequency.setValueAtTime(f0,c.currentTime); if(f1)o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),c.currentTime+d); g.gain.setValueAtTime(v,c.currentTime); g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d); o.connect(g).connect(c.destination); o.start(); o.stop(c.currentTime+d+.02); }
function nz(c,d,v,fq){ var n=c.sampleRate*d|0,b=c.createBuffer(1,n,c.sampleRate),dd=b.getChannelData(0); for(var i=0;i<n;i++)dd[i]=(Math.random()*2-1)*(1-i/n); var s=c.createBufferSource(); s.buffer=b; var f=c.createBiquadFilter(); f.type='bandpass'; f.frequency.value=fq; var g=c.createGain(); g.gain.value=v; s.connect(f).connect(g).connect(c.destination); s.start(); }
var sSwing=function(){ snd(function(c){ nz(c,.1,.22,2600); }); };
var sHit=function(){ snd(function(c){ tone(c,'square',180,70,.09,.16); nz(c,.06,.25,800); }); };
var sSpec=function(){ snd(function(c){ tone(c,'sawtooth',120,480,.25,.14); nz(c,.2,.3,1200); }); };
var sDash=function(){ snd(function(c){ nz(c,.12,.25,2000); }); };
var sKO=function(){ snd(function(c){ tone(c,'sawtooth',300,50,.7,.22); nz(c,.4,.4,600); }); };
var sBell=function(){ snd(function(c){ tone(c,'triangle',880,880,.5,.16); tone(c,'triangle',1320,1320,.5,.07); }); };

/* ═══ match state ═══ */
var st=null, screen='select';  // select | fight | end
var pickIdx=0;
function makeFighter(ch,side){
  return {ch:ch, x:side<0?AR.x0+120:AR.x1-120, y:(AR.y0+AR.y1)/2,
    hp:ch.hp, face:side<0?1:-1, vx:0, vy:0,
    atkT:0, atkAnim:0, spCd:0, dashT:0, dashCd:0, iframes:0, stun:0,
    kx:0, ky:0, walk:0, side:side, spr:null, ai:side>0,
    think:0, aim:{x:1,y:0}, strafe:1, wantDist:40};
}
function newMatch(pIdx,eIdx){
  var p=makeFighter(CHARS[pIdx],-1), e=makeFighter(CHARS[eIdx],1);
  p.spr=makeSprite(CHARS[pIdx],3); e.spr=makeSprite(CHARS[eIdx],3);
  st={p:p,e:e,round:1,wins:[0,0],time:60,phase:'intro',phaseT:1.4,parts:[],fx:[],shake:0,t:0};
  document.getElementById('n1').textContent=CHARS[pIdx].name;
  document.getElementById('n2').textContent=CHARS[eIdx].name+' · CPU';
  document.getElementById('hud').classList.add('on');
  banner('ROUND 1'); sBell();
  hud();
}
function hud(){
  document.getElementById('hp1').style.transform='scaleX('+Math.max(0,st.p.hp/st.p.ch.hp)+')';
  document.getElementById('hp2').style.transform='scaleX('+Math.max(0,st.e.hp/st.e.ch.hp)+')';
  document.getElementById('pp1').textContent='●'.repeat(st.wins[0])+'○'.repeat(2-st.wins[0]);
  document.getElementById('pp2').textContent=('●'.repeat(st.wins[1])+'○'.repeat(2-st.wins[1])).split('').reverse().join('');
  document.getElementById('clock').textContent=Math.ceil(st.time);
}
function banner(txt){
  var b=document.getElementById('banner');
  b.textContent=txt; b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop');
}

/* ═══ combat ═══ */
function tryAttack(f,foe){
  if(f.atkT>0||f.stun>0||f.dashT>0) return false;
  f.atkT=f.ch.cd; f.atkAnim=.22; sSwing();
  var dx=foe.x-f.x, dy=foe.y-f.y, d=Math.hypot(dx,dy)||1;
  f.face=dx>=0?1:-1;
  if(d<f.ch.range+14){
    var ang=Math.abs(Math.atan2(dy,dx)-Math.atan2(f.aim.y,f.aim.x));
    ang=Math.min(ang,6.283-ang);
    if(ang<f.ch.arc/2+.5){ landHit(f,foe,f.ch.dmg,180); return true; }
  }
  return false;
}
function trySpecial(f,foe){
  if(f.spCd>0||f.stun>0) return false;
  var sp=f.ch.sp; f.spCd=sp.cd; sSpec();
  var dx=foe.x-f.x, dy=foe.y-f.y, d=Math.hypot(dx,dy)||1;
  if(sp.kind==='blink'){
    var m=Math.min(sp.dist,d-10);
    f.x+=dx/d*m; f.y+=dy/d*m; f.iframes=.25;
    st.fx.push({k:'flash',x:f.x,y:f.y,t:.25,life:.25,c:f.ch.c1});
    if(Math.hypot(foe.x-f.x,foe.y-f.y)<sp.r||Math.hypot(foe.x-f.x,foe.y-f.y)<60) landHit(f,foe,sp.dmg,sp.kb);
  }else{
    st.fx.push({k:sp.kind==='slam'?'ring':'spin',x:f.x,y:f.y,r:sp.r,t:.3,life:.3,c:f.ch.c1});
    if(d<sp.r+14){
      if(sp.kind==='sweep'){
        var ang=Math.abs(Math.atan2(dy,dx)-Math.atan2(f.aim.y,f.aim.x));
        ang=Math.min(ang,6.283-ang);
        if(ang<1.5) landHit(f,foe,sp.dmg,sp.kb);
      }else landHit(f,foe,sp.dmg,sp.kb);
    }
    st.shake=Math.max(st.shake,8);
  }
  return true;
}
function landHit(f,foe,dmg,kb){
  if(foe.iframes>0||foe.dashT>0) return;
  foe.hp-=dmg; foe.stun=.22; foe.iframes=.28; sHit();
  var dx=foe.x-f.x, dy=foe.y-f.y, d=Math.hypot(dx,dy)||1;
  foe.kx=dx/d*kb; foe.ky=dy/d*kb;
  st.shake=Math.max(st.shake,5);
  for(var i=0;i<8;i++){ var a=Math.random()*6.283,v=60+Math.random()*180;
    st.parts.push({x:foe.x,y:foe.y-20,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:.35+Math.random()*.3,c:'#eec46a'}); }
  hud();
  if(foe.hp<=0) roundEnd(f===st.p?0:1);
}
function tryDash(f){
  if(f.dashCd>0||f.stun>0) return false;
  var v=(f===st.p&&!f.ai)?moveVec():{x:f.aim.x*f.strafe===0?f.aim.x:-f.aim.x*0+f.aim.x, y:f.aim.y};
  if(f.ai){ /* dash sideways relative to aim */ v={x:-f.aim.y*f.strafe, y:f.aim.x*f.strafe}; }
  if(!v.x&&!v.y) v={x:f.face,y:0};
  var m=Math.hypot(v.x,v.y)||1;
  f.dvx=v.x/m; f.dvy=v.y/m;
  f.dashT=.16; f.dashCd=1.1; f.iframes=.24; sDash();
  return true;
}

/* ═══ rounds ═══ */
function roundEnd(winner){
  if(st.phase!=='fight') return;
  st.wins[winner]++; st.phase='ko'; st.phaseT=1.8;
  banner(winner===0?'K.O.':'FELLED'); sKO(); hud();
}
function nextPhase(){
  if(st.phase==='intro'){ st.phase='fight'; banner('FIGHT'); return; }
  if(st.phase==='ko'){
    if(st.wins[0]>=2||st.wins[1]>=2){ endMatch(); return; }
    st.round++;
    var pc=st.p.ch, ec=st.e.ch;
    var ns=makeFighter(pc,-1); ns.spr=st.p.spr; st.p=ns;
    var ne=makeFighter(ec,1); ne.spr=st.e.spr; st.e=ne;
    st.time=60; st.phase='intro'; st.phaseT=1.2;
    banner('ROUND '+st.round); sBell(); hud();
  }
}
function endMatch(){
  screen='end';
  var won=st.wins[0]>=2;
  document.getElementById('end-h').textContent=won?'VICTORY':'DEFEATED';
  document.getElementById('end-h').style.color=won?'var(--gold)':'var(--red)';
  document.getElementById('end-line').textContent=st.p.ch.name+' '+st.wins[0]+' — '+st.wins[1]+' '+st.e.ch.name+' (CPU)';
  document.getElementById('end-ov').classList.add('on');
  document.getElementById('again-btn').focus();
}

/* ═══ input ═══ */
var keys={}, joyVec={x:0,y:0};
addEventListener('keydown',function(e){
  var k=e.key.toLowerCase();
  if(k==='m'){ muted=!muted; return; }
  keys[k]=true;
  if(screen!=='fight') return;
  if('wasdjkl '.indexOf(k)>=0||k.indexOf('arrow')===0) e.preventDefault();
  if(st&&st.phase==='fight'){
    if(k==='j'||k==='z') playerAtk();
    if(k==='k'||k==='x') trySpecial(st.p,st.e);
    if(k==='l'||k==='shift'||k===' ') tryDash(st.p);
  }
  document.getElementById('hint').classList.add('gone');
});
addEventListener('keyup',function(e){ keys[e.key.toLowerCase()]=false; });
function moveVec(){
  var x=0,y=0;
  if(keys.w||keys.arrowup)y-=1; if(keys.s||keys.arrowdown)y+=1;
  if(keys.a||keys.arrowleft)x-=1; if(keys.d||keys.arrowright)x+=1;
  x+=joyVec.x; y+=joyVec.y;
  var m=Math.hypot(x,y); return m>1?{x:x/m,y:y/m}:{x:x,y:y};
}
function playerAtk(){
  var p=st.p, e=st.e;
  p.aim={x:(e.x-p.x)||1, y:e.y-p.y};
  var m=Math.hypot(p.aim.x,p.aim.y)||1; p.aim.x/=m; p.aim.y/=m;
  tryAttack(p,e);
}

/* ═══ AI ═══ */
function aiThink(f,foe,dt){
  f.think-=dt;
  var dx=foe.x-f.x, dy=foe.y-f.y, d=Math.hypot(dx,dy)||1;
  f.aim={x:dx/d,y:dy/d}; f.face=dx>=0?1:-1;
  if(f.think<=0){
    f.think=.18+Math.random()*.15;
    f.strafe=Math.random()<.5?-1:1;
    var low=f.hp<f.ch.hp*.3;
    f.wantDist=low&&Math.random()<.5?f.ch.range*2.2:f.ch.range*.75;
    /* reactive dodge: foe mid-swing and close */
    if(foe.atkAnim>0&&d<foe.ch.range+30&&Math.random()<.3) tryDash(f);
    /* special: in range-ish and off cooldown */
    var sp=f.ch.sp;
    var spRange=sp.kind==='blink'?sp.dist:sp.r;
    if(f.spCd<=0&&d<spRange+10&&Math.random()<.55) trySpecial(f,foe);
    /* attack when in range */
    if(d<f.ch.range+8&&Math.random()<.8) tryAttack(f,foe);
  }
  /* steering: close to wantDist + strafe */
  var err=d-f.wantDist;
  var ux=dx/d, uy=dy/d;
  var mvx=ux*Math.max(-1,Math.min(1,err/40))+(-uy)*f.strafe*.55;
  var mvy=uy*Math.max(-1,Math.min(1,err/40))+(ux)*f.strafe*.55;
  var m=Math.hypot(mvx,mvy)||1;
  return {x:mvx/m*Math.min(1,Math.abs(err/30)+.5), y:mvy/m*Math.min(1,Math.abs(err/30)+.5)};
}

/* ═══ update ═══ */
function stepFighter(f,mv,dt){
  if(f.stun>0){ f.stun-=dt; mv={x:0,y:0}; }
  if(f.dashT>0){ f.dashT-=dt; f.x+=f.dvx*640*dt; f.y+=f.dvy*640*dt; }
  else{ f.x+=mv.x*f.ch.spd*dt; f.y+=mv.y*f.ch.spd*dt; }
  /* knockback */
  f.x+=f.kx*dt; f.y+=f.ky*dt; f.kx*=Math.pow(.005,dt); f.ky*=Math.pow(.005,dt);
  f.x=Math.max(AR.x0+20,Math.min(AR.x1-20,f.x));
  f.y=Math.max(AR.y0+16,Math.min(AR.y1-16,f.y));
  f.atkT=Math.max(0,f.atkT-dt); f.atkAnim=Math.max(0,f.atkAnim-dt);
  f.spCd=Math.max(0,f.spCd-dt); f.dashCd=Math.max(0,f.dashCd-dt);
  f.iframes=Math.max(0,f.iframes-dt);
  if(mv.x||mv.y){ f.walk+=dt*11; if(mv.x) f.face=mv.x>0?1:-1; }
}
function update(dt){
  if(!st||screen!=='fight') return;
  st.t+=dt;
  if(st.phase!=='fight'){
    st.phaseT-=dt;
    if(st.phaseT<=0) nextPhase();
  }else{
    st.time-=dt;
    if(st.time<=0){ roundEnd(st.p.hp>=st.e.hp?0:1); }
    var pm=moveVec();
    var p=st.p,e=st.e;
    var dx=e.x-p.x,dy=e.y-p.y,dm=Math.hypot(dx,dy)||1;
    p.aim={x:dx/dm,y:dy/dm};
    stepFighter(p,pm,dt);
    var em=aiThink(e,p,dt);
    stepFighter(e,em,dt);
    document.getElementById('clock').textContent=Math.ceil(Math.max(0,st.time));
  }
  st.parts=st.parts.filter(function(q){ q.x+=q.vx*dt; q.y+=q.vy*dt; q.vx*=.92; q.vy*=.92; return (q.life-=dt)>0; });
  st.fx=st.fx.filter(function(x){ return (x.t-=dt)>0; });
  if(st.shake>0) st.shake=Math.max(0,st.shake-dt*36);
}

/* ═══ render ═══ */
function drawWeapon(f){
  var px=f.x, py=sy(f.y)-26;
  var baseA=f.face>0?-.5:Math.PI+.5;
  var a=baseA;
  if(f.atkAnim>0){
    var k=1-f.atkAnim/.22;
    a=Math.atan2(f.aim.y*YSQ,f.aim.x)-1.2*f.face+k*2.4*f.face;
  }
  ctx.save(); ctx.translate(px,py); ctx.rotate(a);
  var w=f.ch.weapon;
  if(w==='hammer'){
    ctx.fillStyle='#7a5a34'; ctx.fillRect(6,-2,22,4);
    ctx.fillStyle='#6a6a72'; ctx.fillRect(24,-9,10,18);
  }else if(w==='sword'){
    ctx.fillStyle='#c8ccd8'; ctx.fillRect(8,-2,24,4);
    ctx.fillStyle='#8a6a2a'; ctx.fillRect(4,-4,5,8);
  }else if(w==='daggers'){
    ctx.fillStyle='#c8ccd8'; ctx.fillRect(6,-1,14,3); ctx.fillRect(2,6,12,3);
  }else{
    ctx.fillStyle='#9a7ab8'; ctx.fillRect(-6,-2,40,4);
    ctx.fillStyle='#d8c8ea'; ctx.fillRect(30,-3,6,6);
  }
  ctx.restore();
}
function drawFighter(f){
  var px=f.x, pyw=f.y, py=sy(pyw);
  /* shadow */
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath(); ctx.ellipse(px,py,16,6,0,0,6.283); ctx.fill();
  var flick=f.iframes>0&&Math.floor(st.t*22)%2===0;
  if(flick) return;
  var bob=Math.abs(Math.sin(f.walk))*2.5;
  var lunge=f.atkAnim>0?(1-f.atkAnim/.22)*6*f.face:0;
  ctx.save();
  ctx.translate(px+lunge,py-48-bob);
  if(f.face<0){ ctx.scale(-1,1); }
  ctx.drawImage(f.spr,-f.spr.width/2,0);
  ctx.restore();
  drawWeapon(f);
}
function render(){
  ctx.fillStyle='#2a1a24'; ctx.fillRect(0,0,W,H);
  /* dusk sky band */
  var g=ctx.createLinearGradient(0,0,0,H*.3);
  g.addColorStop(0,'#3d2430'); g.addColorStop(1,'#8a4a52');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H*.3);
  ctx.save();
  if(st&&st.shake) ctx.translate((Math.random()-.5)*st.shake,(Math.random()-.5)*st.shake);
  /* arena floor: projected trapezoid-ish rect w/ tile bands */
  var y0=sy(AR.y0), y1=sy(AR.y1);
  ctx.fillStyle='#c98d52';
  ctx.fillRect(AR.x0-30,y0-8,AR.x1-AR.x0+60,y1-y0+34);
  ctx.fillStyle='rgba(0,0,0,.12)';
  for(var b=0;b<6;b++){ var by=y0+(y1-y0)*b/6; ctx.fillRect(AR.x0-30,by,AR.x1-AR.x0+60,2); }
  for(var vb=0;vb<9;vb++){ var bx=AR.x0-30+(AR.x1-AR.x0+60)*vb/9; ctx.fillRect(bx,y0-8,2,y1-y0+34); }
  /* rope ring */
  ctx.strokeStyle='#8a2f26'; ctx.lineWidth=4;
  ctx.strokeRect(AR.x0-10,y0-14,AR.x1-AR.x0+20,y1-y0+22);
  ctx.strokeStyle='rgba(238,196,106,.5)'; ctx.lineWidth=1.5;
  ctx.strokeRect(AR.x0-10,y0-14,AR.x1-AR.x0+20,y1-y0+22);

  if(st){
    /* fx under fighters */
    st.fx.forEach(function(x){
      var k=1-x.t/x.life;
      if(x.k==='ring'||x.k==='spin'){
        ctx.strokeStyle=x.c; ctx.globalAlpha=1-k; ctx.lineWidth=6*(1-k)+2;
        ctx.beginPath(); ctx.ellipse(x.x,sy(x.y),x.r*k+8,(x.r*k+8)*YSQ,0,0,6.283); ctx.stroke();
        ctx.globalAlpha=1;
      }else if(x.k==='flash'){
        ctx.fillStyle=x.c; ctx.globalAlpha=(1-k)*.8;
        ctx.beginPath(); ctx.ellipse(x.x,sy(x.y)-24,18*(1-k)+4,26*(1-k)+6,0,0,6.283); ctx.fill();
        ctx.globalAlpha=1;
      }
    });
    /* y-sort fighters */
    var order=st.p.y<=st.e.y?[st.p,st.e]:[st.e,st.p];
    order.forEach(drawFighter);
    /* sparks */
    st.parts.forEach(function(q){
      ctx.globalAlpha=Math.min(1,q.life*2.4); ctx.fillStyle=q.c;
      ctx.fillRect(q.x-2,sy(q.y)-22,4,4);
    });
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

/* ═══ loop ═══ */
var last=0;
function loop(t){
  requestAnimationFrame(loop);
  var dt=Math.min(.05,(t-last)/1000||.016); last=t;
  update(dt); render();
}

/* ═══ character select ═══ */
var roster=document.getElementById('roster');
CHARS.forEach(function(ch,i){
  var card=document.createElement('button');
  card.className='fcard'; card.type='button';
  card.setAttribute('aria-label',ch.name+'. '+ch.tag);
  var pv=makeSprite(ch,4);
  card.appendChild(pv);
  var mx={hp:140,spd:250,dmg:26,rng:62};
  card.insertAdjacentHTML('beforeend',
    '<div class="fn" style="color:'+ch.c1+'">'+ch.name+'</div>'+
    '<div class="ft">'+ch.tag+'<br>SP: '+ch.sp.name+'</div>'+
    '<div class="st">'+
    '<span>HP</span><i style="--v:'+(ch.hp/mx.hp)+';--c:'+ch.c1+'"></i>'+
    '<span>SPD</span><i style="--v:'+(ch.spd/mx.spd)+';--c:'+ch.c1+'"></i>'+
    '<span>DMG</span><i style="--v:'+(ch.dmg/mx.dmg)+';--c:'+ch.c1+'"></i>'+
    '<span>RNG</span><i style="--v:'+(ch.range/mx.rng)+';--c:'+ch.c1+'"></i>'+
    '</div>');
  card.addEventListener('click',function(){ choose(i); });
  roster.appendChild(card);
});
function choose(i){
  pickIdx=i;
  var eIdx=Math.floor(Math.random()*4);
  document.getElementById('sel-ov').classList.remove('on');
  screen='fight';
  ac();
  newMatch(i,eIdx);
}
document.getElementById('again-btn').addEventListener('click',function(){
  document.getElementById('end-ov').classList.remove('on');
  screen='fight'; newMatch(pickIdx,Math.floor(Math.random()*4));
});
document.getElementById('select-btn').addEventListener('click',function(){
  document.getElementById('end-ov').classList.remove('on');
  document.getElementById('hud').classList.remove('on');
  document.getElementById('sel-ov').classList.add('on');
  screen='select';
});

/* ═══ touch ═══ */
var joy=document.getElementById('joy'), nub=document.getElementById('nub'), joyId=null;
function joyUpd(e){
  var r=joy.getBoundingClientRect(), t=null;
  for(var i=0;i<e.touches.length;i++) if(e.touches[i].identifier===joyId) t=e.touches[i];
  if(!t) return;
  var dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
  var m=Math.hypot(dx,dy), mx=r.width/2;
  if(m>mx){ dx=dx/m*mx; dy=dy/m*mx; }
  joyVec.x=dx/mx; joyVec.y=dy/mx;
  nub.style.left='calc(50% + '+dx+'px)'; nub.style.top='calc(50% + '+dy+'px)';
}
joy.addEventListener('touchstart',function(e){ e.preventDefault(); joyId=e.changedTouches[0].identifier; joyUpd(e); },{passive:false});
joy.addEventListener('touchmove',function(e){ e.preventDefault(); joyUpd(e); },{passive:false});
joy.addEventListener('touchend',function(e){ e.preventDefault(); joyId=null; joyVec={x:0,y:0}; nub.style.left='50%'; nub.style.top='50%'; },{passive:false});
document.getElementById('t-atk').addEventListener('touchstart',function(e){ e.preventDefault(); if(st&&st.phase==='fight')playerAtk(); },{passive:false});
document.getElementById('t-spec').addEventListener('touchstart',function(e){ e.preventDefault(); if(st&&st.phase==='fight')trySpecial(st.p,st.e); },{passive:false});
document.getElementById('t-dash').addEventListener('touchstart',function(e){ e.preventDefault(); if(st&&st.phase==='fight')tryDash(st.p); },{passive:false});

requestAnimationFrame(loop);

/* debug hook */
window.__melee={
  chars:CHARS,
  choose:choose,
  state:function(){ return st?{screen:screen,phase:st.phase,round:st.round,wins:st.wins.slice(),
    p:{hp:st.p.hp,x:st.p.x,y:st.p.y,ch:st.p.ch.id}, e:{hp:st.e.hp,x:st.e.x,y:st.e.y,ch:st.e.ch.id}, time:st.time}:{screen:screen}; },
  step:function(n,dt){ for(var i=0;i<(n||1);i++) update(dt||.016); },
  key:function(k,d){ keys[k]=d!==false; },
  atk:function(){ playerAtk(); },
  spec:function(){ return trySpecial(st.p,st.e); },
  dash:function(){ return tryDash(st.p); },
  place:function(px,py,ex,ey){ st.p.x=px; st.p.y=py; st.e.x=ex; st.e.y=ey; },
  forcePhase:function(){ st.phaseT=0; nextPhase(); }
};
})();
</script>
