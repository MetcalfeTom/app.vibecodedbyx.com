<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Quest</title>
  <link rel="icon" href="https://emojicdn.elk.sh/⚔️" type="image/png">
  <meta name="description" content="A procedurally generated text adventure. Choose your path through endless dungeons, forests, and strange worlds.">
  <meta property="og:title" content="Infinite Quest">
  <meta property="og:description" content="Endless procedural text adventure — 3 choices, infinite paths.">
  <meta property="og:url" content="https://sloppy.live/infinite-quest">
  <meta property="og:image" content="https://sloppy.live/infinite-quest/og-image.png">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0b0e;
      --surface: #16131a;
      --surface-2: #1e1a24;
      --border: #2a2433;
      --text: #d4cfc8;
      --text-dim: #7a7269;
      --text-faint: #4a4440;
      --accent: #c9a55a;
      --accent-glow: #e8c36880;
      --health: #c45c5c;
      --gold: #d4a843;
      --item: #6aad8e;
      --depth: #8b7ec8;
      --danger: #c44040;
      --success: #4a9e6a;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.7;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,165,90,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139,126,200,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 20px 100px;
      min-height: 100vh;
    }

    /* Stats bar */
    .stats-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 6px;
      padding: 10px 0;
      background: linear-gradient(to bottom, var(--bg) 70%, transparent);
      flex-wrap: wrap;
    }

    .stat {
      font-family: 'Fira Code', monospace;
      font-size: 0.72rem;
      padding: 4px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .stat-icon { font-size: 0.85rem; }
    .stat-val { font-weight: 600; }
    .stat.health .stat-val { color: var(--health); }
    .stat.gold .stat-val { color: var(--gold); }
    .stat.items .stat-val { color: var(--item); }
    .stat.depth .stat-val { color: var(--depth); }

    .health-bar-bg {
      width: 50px; height: 4px;
      background: var(--surface-2);
      border-radius: 2px;
      overflow: hidden;
    }
    .health-bar-fill {
      height: 100%;
      background: var(--health);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* Scene log */
    .scene-log {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 20px 0;
    }

    .scene-entry {
      position: relative;
      padding-left: 20px;
      border-left: 2px solid var(--border);
      transition: opacity 0.5s;
    }

    .scene-entry.past { opacity: 0.4; }
    .scene-entry.past:hover { opacity: 0.7; }
    .scene-entry.current { opacity: 1; }

    .scene-depth {
      font-family: 'Fira Code', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .scene-theme {
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }

    .scene-text {
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 1.8;
      color: var(--text);
    }

    .scene-text .typewriter-cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .scene-event {
      margin-top: 10px;
      padding: 8px 12px;
      background: var(--surface);
      border-left: 3px solid var(--accent);
      border-radius: 0 4px 4px 0;
      font-size: 0.95rem;
      font-style: italic;
      color: var(--accent);
    }

    .scene-event.danger { border-left-color: var(--danger); color: var(--health); }
    .scene-event.success { border-left-color: var(--success); color: var(--item); }

    .choice-made {
      margin-top: 10px;
      font-family: 'Fira Code', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    .choice-made::before { content: '→ '; color: var(--accent); }

    /* Choices */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }

    .choice-btn {
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 18px;
      cursor: pointer;
      text-align: left;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .choice-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--accent-glow), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .choice-btn:hover {
      border-color: var(--accent);
      transform: translateX(4px);
      box-shadow: 0 0 20px rgba(201,165,90,0.08);
    }

    .choice-btn:hover::before { opacity: 1; }

    .choice-btn:active { transform: translateX(2px); }

    .choice-key {
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      margin-right: 8px;
      font-weight: 600;
    }

    .choice-btn span { position: relative; z-index: 1; }

    /* Game over / inventory */
    .game-over {
      text-align: center;
      padding: 40px 20px;
    }

    .game-over h2 {
      font-size: 2rem;
      font-weight: 900;
      color: var(--health);
      margin-bottom: 10px;
    }

    .game-over p { color: var(--text-dim); margin-bottom: 20px; }

    .restart-btn {
      font-family: 'Crimson Pro', serif;
      font-size: 1.1rem;
      padding: 12px 32px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
    }

    .restart-btn:hover { background: #ddb660; }

    .inventory-panel {
      margin-top: 10px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Fira Code', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
      display: none;
    }
    .inventory-panel.has-items { display: block; }

        
    @media (max-width: 600px) {
      #app { padding: 14px 14px 90px; }
      .stats-bar { gap: 4px; }
      .stat { font-size: 0.65rem; padding: 3px 7px; }
      .scene-text { font-size: 1.05rem; }
      .choice-btn { font-size: 0.95rem; padding: 12px 14px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="stats-bar" id="statsBar">
      <div class="stat health">
        <span class="stat-icon">❤️</span>
        <div class="health-bar-bg"><div class="health-bar-fill" id="healthFill" style="width:100%"></div></div>
        <span class="stat-val" id="healthVal">100</span>
      </div>
      <div class="stat gold">
        <span class="stat-icon">🪙</span>
        <span class="stat-val" id="goldVal">0</span>
      </div>
      <div class="stat items">
        <span class="stat-icon">🎒</span>
        <span class="stat-val" id="itemsVal">0</span>
      </div>
      <div class="stat depth">
        <span class="stat-icon">📜</span>
        <span class="stat-val" id="depthVal">1</span>
      </div>
    </div>
    <div class="scene-log" id="sceneLog"></div>
    <div class="inventory-panel" id="inventoryPanel"></div>
  </div>
<script>
    const G = {
      health: 100,
      maxHealth: 100,
      gold: 0,
      items: [],
      depth: 0,
      theme: 'dungeon',
      alive: true
    };

    const THEMES = ['dungeon','forest','space-station','underwater-temple','haunted-castle','crystal-caves'];

    const THEME_LABELS = {
      'dungeon': 'The Deep Dungeon',
      'forest': 'The Whispering Forest',
      'space-station': 'Orbital Station Theta',
      'underwater-temple': 'The Sunken Temple',
      'haunted-castle': 'Castle of Shadows',
      'crystal-caves': 'The Crystal Deeps'
    };

    const SCENE_TEMPLATES = {
      'dungeon': [
        'A narrow corridor stretches before you, torches flickering with {adj} flame. The stone walls are etched with {detail}.',
        'You enter a vast underground hall. Broken pillars line the path. {creature_hint} echoes from the darkness ahead.',
        'A locked iron gate blocks your way. Through the bars you see {sight}. The air smells of {smell}.',
        'The passage opens into a flooded chamber. Water laps at {feature}. Something stirs beneath the surface.',
        'Rows of ancient sarcophagi fill this crypt. One lid is ajar, revealing {discovery}.',
        'A spiral staircase winds {direction}. Scratching sounds come from {location}.'
      ],
      'forest': [
        'Colossal trees tower overhead, their canopy filtering {light}. The undergrowth rustles with {creature_hint}.',
        'A {adj} clearing opens before you. In its center stands {feature}. Birds fall silent as you approach.',
        'The path forks at a {adj} oak split by lightning. {creature_hint} watches from the branches above.',
        'Thick mist rolls between the trunks. You can barely see {sight}. The ground is soft with {detail}.',
        'A stream of {adj} water cuts across the trail. On the far bank, {discovery}.',
        'Luminous mushrooms carpet the forest floor, pulsing with {light}. Something has been {detail} recently.'
      ],
      'space-station': [
        'Warning lights pulse {adj} red across the corridor. A hull breach alarm blares. {creature_hint} reverberates through the deck plating.',
        'The observation deck reveals {sight} through cracked glass. Floating debris drifts past. A console blinks with {detail}.',
        'Emergency bulkheads have sealed this section. {feature} hums in the corner. The gravity feels {adj}.',
        'A cargo bay stretches before you, crates scattered by {detail}. Among the wreckage you spot {discovery}.',
        'The med-bay is {adj} and silent. Cryo pods line the wall — most are dark, but one still glows with {light}.',
        'An airlock cycles open revealing {sight}. The station groans. {creature_hint} comes from the vents above.'
      ],
      'underwater-temple': [
        'Bioluminescent coral illuminates the {adj} chamber. Water trickles through cracks in the ceiling. {creature_hint} drifts past.',
        'A massive stone idol dominates this room, its eyes set with {discovery}. The water here is {adj} warm.',
        'Kelp curtains part to reveal {sight}. The current pulls gently toward {feature}.',
        'The temple floor is a mosaic depicting {detail}. Air pockets trapped in the ceiling glow with {light}.',
        'A sacrificial pool bubbles in the center. Around its rim, {detail}. {creature_hint} stirs in the depths.',
        'Barnacle-covered steps lead {direction}. The pressure changes. You notice {discovery} wedged between stones.'
      ],
      'haunted-castle': [
        'A {adj} portrait gallery stretches before you. The painted eyes seem to follow. {creature_hint} whispers from behind the frames.',
        'The grand ballroom is frozen in time — chandeliers sway without wind. {feature} casts {adj} shadows across the floor.',
        'You climb a tower staircase. Through arrow slits you glimpse {sight}. The steps are worn by {detail}.',
        'A library of decaying books fills this chamber. One volume lies open to {discovery}. The pages turn by themselves.',
        'The castle kitchen reeks of {smell}. Something has been cooking — {feature} bubbles over a fire with no source.',
        'Suits of armor line the corridor, each posed differently. The last one holds {discovery}. {creature_hint} echoes above.'
      ],
      'crystal-caves': [
        'Enormous crystals jut from every surface, refracting {light} into prismatic shards. The air hums with {adj} resonance.',
        'A geode the size of a house has cracked open, revealing {discovery}. The crystals inside pulse with {detail}.',
        'The cave narrows between two massive crystal formations. {creature_hint} vibrates through the stone. The path ahead glows {adj}.',
        'An underground lake reflects {light} from crystal clusters above. {feature} floats at its center.',
        'Crystal stalagmites form a natural maze. Through the translucent walls you see {sight}. Something moves parallel to you.',
        'A collapsed tunnel reveals {discovery}. Crystal dust fills the air, making everything shimmer with {adj} iridescence.'
      ]
    };

    const FILLS = {
      adj: ['eerie','pale','crimson','violet','sickly','golden','spectral','phosphorescent','ancient','whispering','trembling','bitter','hollow','molten','frozen','fading'],
      detail: ['forgotten runes','claw marks deep in stone','dried blood trails','strange fungal growth','shattered pottery','star charts','alien glyphs','tally marks scratched by prisoners','mosaic tiles depicting a war','offerings of bone and feather','crystallized amber deposits','scorch marks'],
      creature_hint: ['a low growl','skittering legs','a mournful cry','heavy breathing','clicking mandibles','a wet slithering','distant howling','mechanical whirring','bubbling laughter','chitinous scraping','a child\'s humming','rhythmic thumping'],
      sight: ['a faint glow in the distance','shapes moving in shadow','a doorway carved with faces','something enormous and still','a sky full of unfamiliar stars','an impossible garden','a mirror reflecting someone else','a bridge over nothing','floating geometric shapes','a throne of twisted metal'],
      smell: ['ozone and rust','old parchment','sulfur and honey','sea brine','rotting flowers','machine oil','damp earth','burning cinnamon','something sweet and wrong','cold iron'],
      feature: ['a crumbling altar','a massive gear mechanism','a pool of dark liquid','a crystalline pillar','a suspended cage','a nest of strange eggs','a glowing sigil on the ground','a vine-wrapped obelisk','a humming monolith','a fossilized creature'],
      discovery: ['a tarnished key','a journal written in blood','a map fragment','a vial of luminous liquid','a bone flute','a mechanical eye','a sealed letter','a crown of thorns','a compass that spins wildly','a shard of black glass'],
      light: ['shifting green light','pulsing amber glow','cold blue radiance','warm rose luminescence','strobing white flashes','deep violet phosphorescence'],
      direction: ['downward into darkness','upward toward a distant glow','sideways through a crack','into mist','toward a rumbling sound'],
      location: ['above you','behind the wall','beneath the floor','somewhere close','the shadows to your left']
    };

    const ITEM_NAMES = [
      'Rusted Key','Crystal Shard','Old Map','Health Potion','Golden Idol','Shadow Cloak',
      'Fire Gem','Bone Charm','Star Fragment','Void Lens','Serpent Scale','Iron Rune',
      'Ghost Lantern','Thunder Seed','Frozen Tear','Blood Amber','Wind Feather','Echo Stone',
      'Worm Tooth','Silk Thread','Moon Dial','Rust Crown','Dusk Petal','Spark Wire'
    ];

    const NPC_NAMES = [
      'a hooded stranger','a wounded soldier','an old woman with no eyes','a child who speaks in riddles',
      'a merchant covered in dust','a chained spirit','a talking fox','a mechanical pilgrim',
      'a weeping statue that moves','a figure made of smoke','a librarian with too many arms'
    ];

    const MONSTER_NAMES = [
      'a Hollow Sentinel','a Fang Crawler','a Shade Wraith','a Crystal Golem',
      'a Bone Collector','a Void Leech','a Rust Stalker','a Spore Fiend',
      'a Grief Phantom','an Iron Mimic','a Thorn Beast','a Depth Lurker'
    ];

    const CHOICE_TEMPLATES = {
      explore: [
        'Press deeper into the {theme_noun}','Investigate the {adj} passage','Search the area carefully',
        'Follow the strange sounds','Climb toward the light','Descend further','Push through the barrier'
      ],
      cautious: [
        'Proceed carefully, watching for traps','Take the safer-looking path','Rest here and observe',
        'Listen before moving','Scout ahead quietly','Check your surroundings first'
      ],
      bold: [
        'Charge forward recklessly','Break through the obstacle','Confront whatever lurks ahead',
        'Leap across the gap','Smash the lock','Challenge the darkness','Rush toward the sound'
      ],
      interact: [
        'Examine the strange object','Touch the glowing surface','Read the ancient inscription',
        'Pull the lever','Open the container','Take what you find','Drink from the pool'
      ]
    };

    const THEME_NOUNS = {
      'dungeon':'depths','forest':'woods','space-station':'station','underwater-temple':'temple','haunted-castle':'castle','crystal-caves':'caverns'
    };

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function roll(n) { return Math.random() < n; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    function fillTemplate(tpl, theme) {
      return tpl.replace(/\{(\w+)\}/g, (_, key) => {
        if (key === 'theme_noun') return THEME_NOUNS[theme] || 'unknown';
        return FILLS[key] ? pick(FILLS[key]) : key;
      });
    }

    function generateScene() {
      G.depth++;
      const shouldShift = G.depth > 1 && roll(0.25);
      if (shouldShift) {
        const others = THEMES.filter(t => t !== G.theme);
        G.theme = pick(others);
      }

      const templates = SCENE_TEMPLATES[G.theme] || SCENE_TEMPLATES['dungeon'];
      let text = fillTemplate(pick(templates), G.theme);

      let event = null;

      if (G.depth > 1) {
        const r = Math.random();
        if (r < 0.18) {
          event = generateTreasureEvent();
        } else if (r < 0.35) {
          event = generateMonsterEvent();
        } else if (r < 0.48) {
          event = generateNPCEvent();
        } else if (r < 0.55) {
          event = generateSecretEvent();
        }
      }

      const choices = generateChoices();
      return { text, event, choices, theme: G.theme, depth: G.depth };
    }

    function generateTreasureEvent() {
      if (roll(0.5)) {
        const amount = Math.floor(Math.random() * 20) + 5;
        G.gold += amount;
        return { type: 'success', text: 'You discover a hidden cache — ' + amount + ' gold found!' };
      } else {
        const item = pick(ITEM_NAMES.filter(i => !G.items.includes(i))) || pick(ITEM_NAMES);
        G.items.push(item);
        return { type: 'success', text: 'You find a ' + item + '! Added to your pack.' };
      }
    }

    function generateMonsterEvent() {
      const monster = pick(MONSTER_NAMES);
      const dmg = Math.floor(Math.random() * 20) + 5;
      const loot = Math.floor(Math.random() * 15) + 3;

      if (roll(0.6)) {
        G.health = clamp(G.health - Math.floor(dmg * 0.4), 0, G.maxHealth);
        G.gold += loot;
        return { type: 'success', text: 'You encounter ' + monster + '! After a fierce struggle, you prevail and claim ' + loot + ' gold. You took some scratches.' };
      } else {
        G.health = clamp(G.health - dmg, 0, G.maxHealth);
        if (G.health <= 0) {
          G.alive = false;
          return { type: 'danger', text: monster + ' overwhelms you. Your vision fades to black...' };
        }
        return { type: 'danger', text: monster + ' ambushes you! You escape but lose ' + dmg + ' health.' };
      }
    }

    function generateNPCEvent() {
      const npc = pick(NPC_NAMES);
      if (roll(0.5)) {
        const gold = Math.floor(Math.random() * 10) + 2;
        G.gold += gold;
        return { type: 'success', text: 'You meet ' + npc + ', who shares ' + gold + ' gold and a cryptic warning.' };
      } else if (roll(0.5)) {
        const heal = Math.floor(Math.random() * 15) + 5;
        G.health = clamp(G.health + heal, 0, G.maxHealth);
        return { type: 'success', text: 'You encounter ' + npc + ', who tends to your wounds. +' + heal + ' health restored.' };
      } else {
        return { type: 'success', text: 'You meet ' + npc + '. They speak of dangers ahead and vanish into shadow.' };
      }
    }

    function generateSecretEvent() {
      const item = pick(ITEM_NAMES.filter(i => !G.items.includes(i))) || pick(ITEM_NAMES);
      G.items.push(item);
      const gold = Math.floor(Math.random() * 25) + 10;
      G.gold += gold;
      return { type: 'success', text: 'A hidden alcove! You discover a ' + item + ' and ' + gold + ' gold concealed behind a false wall.' };
    }

    function generateChoices() {
      const types = ['explore','cautious','bold','interact'];
      const shuffled = types.sort(() => Math.random() - 0.5).slice(0, 3);
      return shuffled.map(type => {
        const tpl = pick(CHOICE_TEMPLATES[type]);
        return { text: fillTemplate(tpl, G.theme), type };
      });
    }

    function updateStats() {
      document.getElementById('healthVal').textContent = G.health;
      document.getElementById('healthFill').style.width = (G.health / G.maxHealth * 100) + '%';
      document.getElementById('goldVal').textContent = G.gold;
      document.getElementById('itemsVal').textContent = G.items.length;
      document.getElementById('depthVal').textContent = G.depth;

      const inv = document.getElementById('inventoryPanel');
      if (G.items.length > 0) {
        inv.classList.add('has-items');
        inv.textContent = 'Pack: ' + G.items.join(' · ');
      } else {
        inv.classList.remove('has-items');
      }
    }

    function typewriterEffect(el, text, cb) {
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'typewriter-cursor';
      el.textContent = '';
      el.appendChild(cursor);

      const speed = Math.max(12, 30 - G.depth);
      function tick() {
        if (i < text.length) {
          el.insertBefore(document.createTextNode(text[i]), cursor);
          i++;
          setTimeout(tick, speed);
        } else {
          cursor.remove();
          if (cb) cb();
        }
      }
      tick();
    }

    function markPastScenes() {
      const entries = document.querySelectorAll('.scene-entry.current');
      entries.forEach(e => {
        e.classList.remove('current');
        e.classList.add('past');
      });
    }

    function renderScene(scene) {
      markPastScenes();
      updateStats();

      const log = document.getElementById('sceneLog');
      const entry = document.createElement('div');
      entry.className = 'scene-entry current';

      const depthEl = document.createElement('div');
      depthEl.className = 'scene-depth';
      depthEl.textContent = 'SCENE ' + scene.depth;
      entry.appendChild(depthEl);

      const themeEl = document.createElement('div');
      themeEl.className = 'scene-theme';
      themeEl.textContent = THEME_LABELS[scene.theme];
      entry.appendChild(themeEl);

      const textEl = document.createElement('div');
      textEl.className = 'scene-text';
      entry.appendChild(textEl);

      log.appendChild(entry);

      entry.scrollIntoView({ behavior: 'smooth', block: 'center' });

      typewriterEffect(textEl, scene.text, () => {
        if (scene.event) {
          const evEl = document.createElement('div');
          evEl.className = 'scene-event ' + scene.event.type;
          evEl.textContent = scene.event.text;
          entry.appendChild(evEl);
          updateStats();
        }

        if (!G.alive) {
          renderGameOver(entry);
          return;
        }

        const choicesDiv = document.createElement('div');
        choicesDiv.className = 'choices';

        scene.choices.forEach((choice, idx) => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.innerHTML = '<span><span class="choice-key">[' + (idx + 1) + ']</span>' + choice.text + '</span>';
          btn.addEventListener('click', () => makeChoice(choice, entry, choicesDiv));
          choicesDiv.appendChild(btn);
        });

        entry.appendChild(choicesDiv);

        // keyboard shortcuts
        const handler = (e) => {
          const n = parseInt(e.key);
          if (n >= 1 && n <= 3 && scene.choices[n - 1]) {
            document.removeEventListener('keydown', handler);
            makeChoice(scene.choices[n - 1], entry, choicesDiv);
          }
        };
        document.addEventListener('keydown', handler);
        entry._keyHandler = handler;
      });
    }

    function makeChoice(choice, entry, choicesDiv) {
      if (entry._keyHandler) {
        document.removeEventListener('keydown', entry._keyHandler);
        delete entry._keyHandler;
      }

      choicesDiv.remove();

      const chosen = document.createElement('div');
      chosen.className = 'choice-made';
      chosen.textContent = choice.text;
      entry.appendChild(chosen);

      // Slight health drain each scene
      if (roll(0.2)) {
        G.health = clamp(G.health - Math.floor(Math.random() * 5 + 1), 0, G.maxHealth);
        if (G.health <= 0) G.alive = false;
      }

      // Rare health recovery from cautious play
      if (choice.type === 'cautious' && roll(0.3)) {
        G.health = clamp(G.health + Math.floor(Math.random() * 8 + 2), 0, G.maxHealth);
      }

      setTimeout(() => {
        if (!G.alive) {
          markPastScenes();
          updateStats();
          const log = document.getElementById('sceneLog');
          const deathEntry = document.createElement('div');
          deathEntry.className = 'scene-entry current';
          log.appendChild(deathEntry);
          renderGameOver(deathEntry);
          deathEntry.scrollIntoView({ behavior: 'smooth', block: 'center' });
          return;
        }
        const next = generateScene();
        renderScene(next);
      }, 400);
    }

    function renderGameOver(container) {
      const div = document.createElement('div');
      div.className = 'game-over';
      div.innerHTML =
        '<h2>Your Quest Ends</h2>' +
        '<p>You explored ' + G.depth + ' scenes, collected ' + G.gold + ' gold and ' + G.items.length + ' items.</p>' +
        (G.items.length > 0 ? '<p style="font-size:0.85rem;color:var(--text-dim);margin-bottom:16px">Final pack: ' + G.items.join(', ') + '</p>' : '') +
        '<button class="restart-btn" onclick="restartGame()">Begin Again</button>';
      container.appendChild(div);
    }

    function restartGame() {
      G.health = 100;
      G.maxHealth = 100;
      G.gold = 0;
      G.items = [];
      G.depth = 0;
      G.theme = pick(THEMES);
      G.alive = true;

      document.getElementById('sceneLog').innerHTML = '';
      updateStats();
      startGame();
    }

    function startGame() {
      const firstScene = {
        text: 'You awaken in a dimly lit chamber. Strange symbols glow on the walls. A distant rumble shakes the dust from the ceiling. Three passages beckon — each shrouded in a different darkness.',
        event: null,
        choices: [
          { text: 'Take the passage marked with a burning sigil', type: 'bold' },
          { text: 'Follow the faint sound of running water', type: 'cautious' },
          { text: 'Examine the glowing symbols before choosing', type: 'interact' }
        ],
        theme: G.theme,
        depth: (G.depth = 1)
      };
      renderScene(firstScene);
    }

    G.theme = pick(THEMES);
    startGame();
  </script>
  <script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
