<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trashbook</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A6%9D" />

<meta name="description" content="The social network for raccoons. Make your trash panda profile, declare your garbage preferences, and detect which raccoons are after YOUR dumpster." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Trashbook — the raccoon social network" />
<meta property="og:description" content="Declare your trash preferences. Paw your friends. Detect your rivals." />
<meta property="og:url" content="https://sloppy.live/trashbook/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20cute%20raccoon%20taking%20a%20selfie%20next%20to%20an%20overflowing%20dumpster%20at%20night%2C%20social%20media%20profile%2C%20flat%20illustration%2C%20moody%20teal%20and%20orange?width=1200&height=630&nologo=true&seed=1313" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --night:#101820; --card:#1a2530; --card2:#22303d; --line:#31424f;
    --ink:#e9eef2; --dim:#8ba0af; --trash:#5fd07a; --paw:#f0a63c; --rival:#ef5350; --mask:#2c3a46;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    min-height:100vh; font-family:'Space Mono',monospace; color:var(--ink);
    background:
      radial-gradient(70% 40% at 80% 0%, #1c2a38 0%, transparent 60%),
      radial-gradient(50% 40% at 10% 100%, #16222c 0%, transparent 60%),
      var(--night);
    padding:1rem .8rem 3rem; display:flex; flex-direction:column; align-items:center;
    -webkit-font-smoothing:antialiased;
  }
  header{ text-align:center; margin-bottom:1rem; }
  h1{ font-family:'Titan One',sans-serif; font-size:clamp(2.2rem,9vw,3.6rem); line-height:1; color:var(--trash);
    text-shadow:0 3px 0 #14532d, 0 8px 20px rgba(95,208,122,.25); letter-spacing:.01em; }
  h1 .tb{ color:var(--ink); }
  .tag{ font-size:.72rem; color:var(--dim); margin-top:.4rem; letter-spacing:.14em; text-transform:uppercase; }

  .wrap{ width:min(46rem,96vw); display:flex; flex-direction:column; gap:1rem; }
  .panel{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:1rem; }
  .panel h2{ font-family:'Titan One',sans-serif; font-size:1.15rem; font-weight:400; letter-spacing:.03em; margin-bottom:.7rem; color:var(--paw); }
  .panel h2 .em{ margin-right:.3rem; }

  label{ display:block; font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin:.7rem 0 .3rem; }
  input[type=text], textarea{ width:100%; background:var(--night); color:var(--ink); border:1px solid var(--line);
    border-radius:9px; padding:.55rem .65rem; font-family:inherit; font-size:.85rem; }
  input:focus-visible, textarea:focus-visible, button:focus-visible{ outline:3px solid var(--trash); outline-offset:2px; }
  textarea{ resize:vertical; min-height:3.4rem; }
  .namerow{ display:flex; gap:.5rem; }
  .namerow input{ flex:1; }
  .dice{ background:var(--card2); border:1px solid var(--line); color:var(--ink); border-radius:9px; padding:0 .8rem; cursor:pointer; font-size:1.1rem; min-height:2.5rem; }

  .prefgrid{ display:flex; flex-wrap:wrap; gap:.4rem; }
  .pref{ display:inline-flex; align-items:center; gap:.35rem; background:var(--night); border:1.5px solid var(--line);
    color:var(--ink); border-radius:10px; padding:.4rem .6rem; font-size:.78rem; font-family:inherit; cursor:pointer; min-height:2.4rem; }
  .pref[aria-pressed="true"]{ background:#173525; border-color:var(--trash); box-shadow:0 2px 0 #14532d; }
  .prefnote{ font-size:.66rem; color:var(--dim); margin-top:.35rem; }

  .saveBtn{ margin-top:1rem; width:100%; font-family:'Titan One',sans-serif; font-size:1.1rem; letter-spacing:.04em;
    color:#0c1a10; background:var(--trash); border:0; border-radius:11px; padding:.7rem; cursor:pointer; min-height:2.9rem; }
  .saveBtn:hover{ filter:brightness(1.08); }
  .status{ font-size:.72rem; color:var(--dim); margin-top:.5rem; text-align:center; min-height:1rem; }

  /* rival + soulmate */
  .rivalbox{ border-color:var(--rival); }
  .rivalbox h2{ color:var(--rival); }
  .rival-row{ display:flex; align-items:center; gap:.7rem; background:var(--night); border:1px solid #4a2a2a;
    border-radius:12px; padding:.6rem .7rem; margin-bottom:.5rem; }
  .rival-row:last-child{ margin-bottom:0; }
  .rival-row .shared{ font-size:.72rem; color:var(--dim); }
  .rival-row .shared b{ color:var(--rival); font-size:.8rem; }
  .rival-row .who{ flex:1; min-width:0; }
  .rival-row .who .nm{ font-weight:700; font-size:.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rival-empty{ font-size:.78rem; color:var(--dim); font-style:italic; }
  .soul{ border-color:#3a5a8a !important; }
  .soul .shared b{ color:#7fb3ff; }

  /* feed */
  .feedhead{ display:flex; align-items:center; gap:.6rem; }
  .feedhead .sp{ flex:1; }
  .sortbtn{ background:var(--card2); border:1px solid var(--line); color:var(--dim); font-family:inherit;
    font-size:.68rem; border-radius:8px; padding:.35rem .6rem; cursor:pointer; min-height:2.2rem; }
  .sortbtn.on{ color:var(--ink); border-color:var(--paw); }
  .card{ display:flex; gap:.8rem; background:var(--card2); border:1px solid var(--line); border-radius:14px;
    padding:.8rem; margin-top:.7rem; }
  .card.mine{ border-color:var(--trash); }
  .ava{ width:64px; height:64px; border-radius:14px; background:var(--mask); flex:0 0 auto; image-rendering:pixelated; }
  .card .bd{ flex:1; min-width:0; }
  .card .nm{ font-weight:700; font-size:.95rem; }
  .card .nm .you{ color:var(--trash); font-size:.66rem; }
  .card .dump{ font-size:.68rem; color:var(--dim); margin:.1rem 0 .3rem; }
  .card .bio{ font-size:.78rem; color:var(--ink); opacity:.85; margin-bottom:.4rem; word-wrap:break-word; }
  .chips{ display:flex; flex-wrap:wrap; gap:.3rem; }
  .chip{ font-size:.68rem; background:var(--night); border:1px solid var(--line); border-radius:7px; padding:.14rem .4rem; }
  .chip.shared{ border-color:var(--rival); color:#ffb3b0; }
  .pawcol{ display:flex; flex-direction:column; align-items:center; gap:.2rem; justify-content:center; }
  .pawbtn{ background:var(--night); border:1.5px solid var(--line); border-radius:12px; font-size:1.25rem;
    width:2.9rem; height:2.9rem; cursor:pointer; }
  .pawbtn[aria-pressed="true"]{ border-color:var(--paw); background:#33270f; }
  .pawn{ font-size:.72rem; color:var(--paw); font-weight:700; }
  .empty{ text-align:center; color:var(--dim); font-style:italic; padding:1.4rem 0 .6rem; font-size:.85rem; }

  footer{ margin-top:1.4rem; font-size:.64rem; color:var(--dim); text-align:center; line-height:1.7; }
  @media (max-width:560px){ .card{ flex-wrap:wrap; } .pawcol{ flex-direction:row; width:100%; justify-content:flex-end; } }
</style>
</head>
<body>
  <header>
    <h1>trash<span class="tb">book</span> 🦝</h1>
    <p class="tag">the social network for raccoons</p>
  </header>

  <div class="wrap">
    <section class="panel" aria-label="Your raccoon profile">
      <h2><span class="em" aria-hidden="true">🦝</span>your trash panda</h2>
      <div style="display:flex;gap:.9rem;align-items:flex-start;flex-wrap:wrap">
        <canvas id="myAva" class="ava" width="16" height="16" role="img" aria-label="Your procedural raccoon avatar" style="width:84px;height:84px"></canvas>
        <div style="flex:1;min-width:220px">
          <label for="nameIn">raccoon name</label>
          <div class="namerow">
            <input type="text" id="nameIn" maxlength="24" placeholder="Sir Bandit von Binsworth" />
            <button class="dice" id="diceBtn" type="button" title="random name" aria-label="Random raccoon name">🎲</button>
          </div>
          <label for="dumpIn">home dumpster / territory</label>
          <input type="text" id="dumpIn" maxlength="40" placeholder="behind the noodle place on 5th" />
        </div>
      </div>
      <label for="bioIn">bio</label>
      <textarea id="bioIn" maxlength="140" placeholder="just a lil guy who loves garbage (140 chars)"></textarea>
      <label id="prefLbl">trash preferences (pick up to 5)</label>
      <div class="prefgrid" id="prefGrid" role="group" aria-labelledby="prefLbl"></div>
      <p class="prefnote" id="prefNote">0 / 5 selected</p>
      <button class="saveBtn" id="saveBtn" type="button">🗑️ publish profile</button>
      <p class="status" id="status" role="status" aria-live="polite"></p>
    </section>

    <section class="panel rivalbox" id="rivalPanel" hidden aria-label="Rival detection">
      <h2><span class="em" aria-hidden="true">⚔️</span>rival detection</h2>
      <div id="rivalList"></div>
    </section>

    <section class="panel" aria-label="Raccoon directory">
      <div class="feedhead">
        <h2 style="margin:0"><span class="em" aria-hidden="true">🗑️</span>the dumpster feed</h2>
        <span class="sp"></span>
        <button class="sortbtn on" id="sortNew" type="button">newest</button>
        <button class="sortbtn" id="sortPaw" type="button">most pawed</button>
      </div>
      <div id="feed"><div class="empty">rummaging…</div></div>
    </section>
  </div>

  <footer>one profile per visitor · 🐾 = respect · rivals = raccoons after YOUR trash<br>log in with twitch (top bar) to keep your raccoon forever</footer>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
  const sb = createClient(
    "https://yjyxteqzhhmtrgcaekgz.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqeXh0ZXF6aGhtdHJnY2Fla2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTg3NDIsImV4cCI6MjA3MjkzNDc0Mn0.G8SRde7IN2QFW1EnASM8IS32IUYR2eenCCjdDdioiBU",
    { auth:{ persistSession:true, autoRefreshToken:true } }
  );

  const $=id=>document.getElementById(id);
  const PREFS=[
    ["pizza","🍕 day-old pizza"],["cans","🥫 dented cans"],["banana","🍌 banana peels"],
    ["takeout","🥡 takeout boxes"],["socks","🧦 mystery socks"],["cds","💿 scratched CDs"],
    ["furniture","🪑 curb furniture"],["fries","🍟 cold fries"],["coffee","☕ coffee grounds"],
    ["wrap","🎁 used gift wrap"],["bread","🥖 stale bread"],["shiny","✨ anything shiny"]
  ];
  const PREF_LABEL={}; PREFS.forEach(p=>PREF_LABEL[p[0]]=p[1]);
  const NAMES1=["Sir","Lady","Baron","Dr.","Captain","Lil","Big","Grandma","Duke","Saint","Professor","Mx."];
  const NAMES2=["Bandit","Smudge","Rummage","Nibbles","Dumpling","Scrounge","Whiskers","Midnight","Grabby","Stinky","Moonpaw","Binsley"];
  const NAMES3=["von Binsworth","of the Alley","McTrashface","the Third","Paws","Esq.","du Garbage","O'Rubbish","the Unwashed","Binz","van der Curb","the Brave"];

  // ---- procedural raccoon avatar (16x16, seeded) ----
  function mulberry(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  function drawRaccoon(canvas, seed){
    const r=mulberry(seed), x=canvas.getContext("2d");
    const fur=["#6b7684","#7a8494","#5d6875","#8a93a1"][Math.floor(r()*4)];
    const maskC=["#232a33","#1b222b","#2e3640"][Math.floor(r()*3)];
    const bg=["#16222c","#1c1727","#12261f","#271d14"][Math.floor(r()*4)];
    x.fillStyle=bg; x.fillRect(0,0,16,16);
    x.fillStyle=fur;
    x.fillRect(3,5,10,8);            // head
    x.fillRect(4,13,8,2);            // chin
    // ears (vary tilt)
    const earY=r()<0.5?3:2;
    x.fillRect(3,earY,3,3); x.fillRect(10,earY,3,3);
    x.fillStyle=maskC;
    x.fillRect(3,7,4,3); x.fillRect(9,7,4,3);   // mask
    x.fillStyle="#0d1117"; x.fillRect(4,8,2,1); x.fillRect(10,8,2,1); // eyes base
    x.fillStyle="#fff"; x.fillRect(Math.floor(4+r()*2),8,1,1); x.fillRect(Math.floor(10+r()*2),8,1,1); // pupils glint
    x.fillStyle="#e6ebf0"; x.fillRect(6,10,4,3); // snout
    x.fillStyle="#0d1117"; x.fillRect(7,11,2,1); // nose
    if(r()<0.4){ x.fillStyle="#e58"; x.fillRect(5,11,1,1); x.fillRect(10,11,1,1); } // blush
    if(r()<0.35){ x.fillStyle=fur; x.fillRect(1,12,2,3); x.fillRect(13,12,2,3); }  // paws up!
    if(r()<0.3){ x.fillStyle="#f5c453"; x.fillRect(Math.floor(2+r()*12),Math.floor(1+r()*2),1,1); } // firefly
  }

  // ---- state ----
  let me=null, myProfile=null, profiles=[], paws=[], myPaws=new Set(), sort="new";
  let seed=Math.floor(Math.random()*1e9);
  const chosen=new Set();

  // ---- profile form ----
  const grid=$("prefGrid");
  PREFS.forEach(([id,label])=>{
    const b=document.createElement("button");
    b.type="button"; b.className="pref"; b.dataset.id=id; b.setAttribute("aria-pressed","false");
    b.textContent=label;
    b.addEventListener("click",()=>{
      if(chosen.has(id)) chosen.delete(id);
      else { if(chosen.size>=5){ setStatus("5 max — raccoons must have standards"); return; } chosen.add(id); }
      b.setAttribute("aria-pressed", chosen.has(id)?"true":"false");
      $("prefNote").textContent=chosen.size+" / 5 selected";
    });
    grid.appendChild(b);
  });
  function randomName(){ const p=a=>a[Math.floor(Math.random()*a.length)]; return p(NAMES1)+" "+p(NAMES2)+" "+p(NAMES3); }
  $("diceBtn").addEventListener("click",()=>{ $("nameIn").value=randomName(); seed=Math.floor(Math.random()*1e9); drawRaccoon($("myAva"),seed); });
  $("myAva").addEventListener("click",()=>{ seed=Math.floor(Math.random()*1e9); drawRaccoon($("myAva"),seed); });
  drawRaccoon($("myAva"),seed);

  function setStatus(m){ $("status").textContent=m; }

  // ---- data ----
  async function auth(){
    const { data:{ session } } = await sb.auth.getSession();
    let s=session;
    if(!s){ const { data } = await sb.auth.signInAnonymously(); s=data && data.session; }
    me=s && s.user || null;
  }
  async function loadAll(){
    const [pR, wR] = await Promise.all([
      sb.from("trashbook_profiles").select("*").order("created_at",{ascending:false}),
      sb.from("trashbook_paws").select("target_user_id,user_id")
    ]);
    profiles=(pR.data||[]).filter(p=>p.raccoon_name);
    paws=wR.data||[];
    myPaws=new Set(paws.filter(w=>me&&w.user_id===me.id).map(w=>w.target_user_id));
    myProfile=me? profiles.find(p=>p.user_id===me.id)||null : null;
    if(myProfile) fillForm(myProfile);
    renderFeed(); renderRivals();
  }
  function fillForm(p){
    $("nameIn").value=p.raccoon_name||""; $("dumpIn").value=p.dumpster||""; $("bioIn").value=p.bio||"";
    chosen.clear();
    (Array.isArray(p.prefs)?p.prefs:[]).forEach(id=>{ if(PREF_LABEL[id]&&chosen.size<5) chosen.add(id); });
    grid.querySelectorAll(".pref").forEach(b=>b.setAttribute("aria-pressed", chosen.has(b.dataset.id)?"true":"false"));
    $("prefNote").textContent=chosen.size+" / 5 selected";
    if(typeof p.avatar_seed==="number"){ seed=p.avatar_seed; drawRaccoon($("myAva"),seed); }
    $("saveBtn").textContent="🗑️ update profile";
  }

  function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function pawCount(uid){ return paws.reduce((n,w)=>n+(w.target_user_id===uid?1:0),0); }
  function overlap(a,b){
    const A=new Set(Array.isArray(a)?a:[]); return (Array.isArray(b)?b:[]).filter(x=>A.has(x));
  }

  // ---- save ----
  $("saveBtn").addEventListener("click", async ()=>{
    if(!me){ setStatus("no session — refresh and try again"); return; }
    const name=$("nameIn").value.trim().slice(0,24);
    if(!name){ setStatus("a raccoon needs a name"); return; }
    if(chosen.size===0){ setStatus("pick at least one trash preference"); return; }
    const row={ raccoon_name:name, bio:$("bioIn").value.trim().slice(0,140),
      dumpster:$("dumpIn").value.trim().slice(0,40), prefs:[...chosen], avatar_seed:seed, user_id:me.id };
    let error;
    if(myProfile){ ({ error } = await sb.from("trashbook_profiles").update(row).eq("user_id",me.id)); }
    else { ({ error } = await sb.from("trashbook_profiles").insert(row)); }
    if(error){ setStatus("save failed — try again"); console.warn(error); return; }
    setStatus(myProfile?"profile updated 🦝":"welcome to the dumpster, "+name+" 🦝");
    await loadAll();
  });

  // ---- rivals: raccoons who want YOUR trash ----
  function renderRivals(){
    const panel=$("rivalPanel");
    if(!myProfile || !Array.isArray(myProfile.prefs) || !myProfile.prefs.length){ panel.hidden=true; return; }
    const others=profiles.filter(p=>p.user_id!==me.id);
    if(!others.length){ panel.hidden=false; $("rivalList").innerHTML='<p class="rival-empty">no other raccoons yet. the alley is yours… for now.</p>'; return; }
    const scored=others.map(p=>({p, sh:overlap(myProfile.prefs,p.prefs)})).filter(r=>r.sh.length>0)
      .sort((a,b)=>b.sh.length-a.sh.length).slice(0,3);
    panel.hidden=false;
    if(!scored.length){ $("rivalList").innerHTML='<p class="rival-empty">no overlapping trash tastes detected. your garbage is safe tonight.</p>'; return; }
    let html="";
    scored.forEach((r,i)=>{
      const sev=r.sh.length>=4?"ARCH-RIVAL":r.sh.length>=2?"rival":"petty rival";
      html+='<div class="rival-row"><canvas class="ava" width="16" height="16" data-seed="'+(r.p.avatar_seed||1)+'" style="width:44px;height:44px" aria-hidden="true"></canvas>'+
        '<div class="who"><div class="nm">'+esc(r.p.raccoon_name)+' <span style="font-size:.62rem;color:var(--rival)">⚔ '+sev+"</span></div>"+
        '<div class="shared"><b>'+r.sh.length+" shared</b> · wants your "+r.sh.map(s=>esc(PREF_LABEL[s]||s)).join(", ")+"</div></div></div>";
    });
    // trash soulmate = other raccoon with zero overlap (no competition, pure friendship)
    const soul=others.find(p=>overlap(myProfile.prefs,p.prefs).length===0 && Array.isArray(p.prefs) && p.prefs.length);
    if(soul){ html+='<div class="rival-row soul"><canvas class="ava" width="16" height="16" data-seed="'+(soul.avatar_seed||1)+'" style="width:44px;height:44px" aria-hidden="true"></canvas>'+
      '<div class="who"><div class="nm">'+esc(soul.raccoon_name)+' <span style="font-size:.62rem;color:#7fb3ff">☮ trash soulmate</span></div>'+
      '<div class="shared"><b>0 shared</b> · zero competition. beautiful.</div></div></div>'; }
    $("rivalList").innerHTML=html;
    $("rivalList").querySelectorAll("canvas[data-seed]").forEach(c=>drawRaccoon(c,+c.dataset.seed));
  }

  // ---- feed ----
  function renderFeed(){
    const feed=$("feed");
    let list=[...profiles];
    if(sort==="paw") list.sort((a,b)=>pawCount(b.user_id)-pawCount(a.user_id));
    if(!list.length){ feed.innerHTML='<div class="empty">no raccoons yet. be the first to crawl out of the bin.</div>'; return; }
    feed.innerHTML="";
    list.forEach(p=>{
      const mine=me && p.user_id===me.id;
      const shared=(!mine&&myProfile)? new Set(overlap(myProfile.prefs,p.prefs)) : new Set();
      const d=document.createElement("div"); d.className="card"+(mine?" mine":"");
      const chips=(Array.isArray(p.prefs)?p.prefs:[]).map(id=>
        '<span class="chip'+(shared.has(id)?" shared":"")+'">'+esc(PREF_LABEL[id]||id)+"</span>").join("");
      d.innerHTML='<canvas class="ava" width="16" height="16" aria-hidden="true"></canvas>'+
        '<div class="bd"><div class="nm">'+esc(p.raccoon_name)+(mine?' <span class="you">← you</span>':"")+"</div>"+
        (p.dumpster?'<div class="dump">🗑 '+esc(p.dumpster)+"</div>":"")+
        (p.bio?'<div class="bio">'+esc(p.bio)+"</div>":"")+
        '<div class="chips">'+chips+"</div></div>"+
        '<div class="pawcol"><button class="pawbtn" type="button" aria-pressed="'+(myPaws.has(p.user_id)?"true":"false")+'" aria-label="Paw of respect for '+esc(p.raccoon_name)+'">🐾</button>'+
        '<span class="pawn">'+pawCount(p.user_id)+"</span></div>";
      drawRaccoon(d.querySelector("canvas"), p.avatar_seed||1);
      const btn=d.querySelector(".pawbtn");
      btn.addEventListener("click", async ()=>{
        if(!me) return;
        if(mine){ setStatus("you can't paw yourself. that's weird."); return; }
        if(myPaws.has(p.user_id)){
          myPaws.delete(p.user_id); paws=paws.filter(w=>!(w.user_id===me.id&&w.target_user_id===p.user_id));
          renderFeed();
          await sb.from("trashbook_paws").delete().eq("user_id",me.id).eq("target_user_id",p.user_id);
        } else {
          myPaws.add(p.user_id); paws.push({user_id:me.id,target_user_id:p.user_id});
          renderFeed();
          const { error } = await sb.from("trashbook_paws").insert({ user_id:me.id, target_user_id:p.user_id });
          if(error){ myPaws.delete(p.user_id); paws=paws.filter(w=>!(w.user_id===me.id&&w.target_user_id===p.user_id)); renderFeed(); }
        }
      });
      feed.appendChild(d);
    });
  }
  $("sortNew").addEventListener("click",()=>{ sort="new"; $("sortNew").classList.add("on"); $("sortPaw").classList.remove("on"); loadAll(); });
  $("sortPaw").addEventListener("click",()=>{ sort="paw"; $("sortPaw").classList.add("on"); $("sortNew").classList.remove("on"); renderFeed(); });

  // ---- realtime: new raccoons appear live ----
  function subscribe(){
    sb.channel("trashbook-rt")
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"trashbook_profiles"},payload=>{
        if(!profiles.find(p=>p.user_id===payload.new.user_id)){ profiles.unshift(payload.new); renderFeed(); renderRivals(); }
      })
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"trashbook_paws"},payload=>{
        if(me && payload.new.user_id===me.id) return;
        paws.push(payload.new); renderFeed();
      })
      .subscribe();
  }

  try{
    await auth(); await loadAll(); subscribe();
    if(!myProfile) $("nameIn").value=randomName();
  }catch(e){
    console.warn(e);
    $("feed").innerHTML='<div class="empty">the dumpster is unreachable right now — refresh to retry.</div>';
  }
</script>
</body>
</html>
