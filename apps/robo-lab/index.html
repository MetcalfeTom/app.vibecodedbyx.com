<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robo Lab — Robotic Testing Facility</title>
<link rel="icon" href="https://emojicdn.elk.sh/🤖">
<meta property="og:title" content="Robo Lab">
<meta property="og:description" content="Run diagnostics on your robot. Gauges, buttons, sparks.">
<meta property="og:url" content="https://app.sloppy.live/robo-lab/">
<meta property="og:image" content="https://emojicdn.elk.sh/🤖?style=google">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0c10;color:#c8ccd4;font-family:'Chakra Petch',sans-serif;min-height:100vh;overflow-x:hidden}
.facility{max-width:900px;margin:0 auto;padding:16px}
h1{font-size:clamp(22px,5vw,36px);font-weight:700;text-align:center;color:#ff6b2e;text-shadow:0 0 20px rgba(255,107,46,0.5);letter-spacing:3px;margin-bottom:4px}
.subtitle{text-align:center;font-family:'Share Tech Mono',monospace;font-size:11px;color:#556;letter-spacing:4px;margin-bottom:20px}
.robot-view{display:flex;justify-content:center;margin-bottom:20px}
canvas#robot{border:1px solid #1a1e28;border-radius:8px;background:#06080c;max-width:100%}
.panel{background:#0e1018;border:1px solid #1a1e28;border-radius:8px;padding:16px;margin-bottom:14px}
.panel-title{font-size:13px;font-weight:600;color:#ff6b2e;letter-spacing:2px;margin-bottom:12px;text-transform:uppercase}
.gauges{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px}
.gauge{text-align:center}
.gauge canvas{display:block;margin:0 auto 6px}
.gauge-label{font-family:'Share Tech Mono',monospace;font-size:11px;color:#667;letter-spacing:1px}
.gauge-value{font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:700;color:#22d68a;text-shadow:0 0 8px rgba(34,214,138,0.4)}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.btn{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:13px;padding:12px 8px;border:none;border-radius:6px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s;position:relative;overflow:hidden}
.btn:active{transform:scale(0.96)}
.btn-power{background:#1a0a0a;color:#ff3b3b;border:1px solid #ff3b3b;box-shadow:0 0 12px rgba(255,59,59,0.2)}
.btn-power.on{background:#ff3b3b;color:#0a0c10;box-shadow:0 0 20px rgba(255,59,59,0.5)}
.btn-diag{background:#0a1a0a;color:#22d68a;border:1px solid #22d68a;box-shadow:0 0 12px rgba(34,214,138,0.2)}
.btn-diag:hover{background:#22d68a;color:#0a0c10}
.btn-stress{background:#1a1a0a;color:#ffb830;border:1px solid #ffb830;box-shadow:0 0 12px rgba(255,184,48,0.2)}
.btn-stress:hover{background:#ffb830;color:#0a0c10}
.btn-reset{background:#0a0a1a;color:#3b8bff;border:1px solid #3b8bff;box-shadow:0 0 12px rgba(59,139,255,0.2)}
.btn-reset:hover{background:#3b8bff;color:#0a0c10}
.btn-servo{background:#1a0a1a;color:#c466ff;border:1px solid #c466ff;box-shadow:0 0 12px rgba(196,102,255,0.2)}
.btn-servo:hover{background:#c466ff;color:#0a0c10}
.btn-shock{background:#1a1510;color:#ff6b2e;border:1px solid #ff6b2e;box-shadow:0 0 12px rgba(255,107,46,0.2)}
.btn-shock:hover{background:#ff6b2e;color:#0a0c10}
.log-box{background:#06080c;border:1px solid #1a1e28;border-radius:6px;padding:10px;height:140px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.6}
.log-box::-webkit-scrollbar{width:4px}
.log-box::-webkit-scrollbar-thumb{background:#2a2e38;border-radius:2px}
.log-entry{opacity:0;animation:fadeIn 0.3s forwards}
@keyframes fadeIn{to{opacity:1}}
.log-ok{color:#22d68a}.log-warn{color:#ffb830}.log-err{color:#ff3b3b}.log-info{color:#3b8bff}.log-sys{color:#667}
.status-bar{display:flex;justify-content:space-between;align-items:center;font-family:'Share Tech Mono',monospace;font-size:10px;color:#445;padding:8px 0;border-top:1px solid #1a1e28;margin-top:10px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-off{background:#333}.dot-on{background:#22d68a;box-shadow:0 0 8px rgba(34,214,138,0.6)}
.dot-warn{background:#ffb830;box-shadow:0 0 8px rgba(255,184,48,0.6)}
.dot-err{background:#ff3b3b;box-shadow:0 0 8px rgba(255,59,59,0.6)}
aa</style>
</head>
<body>
<div class="facility">
<h1>ROBO LAB</h1>
<p class="subtitle">ROBOTIC TESTING FACILITY v2.4</p>

<div class="robot-view"><canvas id="robot" width="360" height="280"></canvas></div>

<div class="panel">
<div class="panel-title">System Gauges</div>
<div class="gauges" id="gaugeGrid"></div>
</div>

<div class="panel">
<div class="panel-title">Control Panel</div>
<div class="controls">
<button class="btn btn-power" id="btnPower" onclick="togglePower()">Power Off</button>
<button class="btn btn-diag" onclick="runDiagnostics()">Diagnostics</button>
<button class="btn btn-stress" onclick="stressTest()">Stress Test</button>
<button class="btn btn-servo" onclick="servoTest()">Servo Test</button>
<button class="btn btn-shock" onclick="shockTest()">Shock Test</button>
<button class="btn btn-reset" onclick="resetAll()">Factory Reset</button>
</div>
</div>

<div class="panel">
<div class="panel-title">System Log</div>
<div class="log-box" id="logBox"></div>
</div>

<div class="status-bar">
<span><span class="status-dot dot-off" id="statusDot"></span><span id="statusText">OFFLINE</span></span>
<span id="uptimeText">UPTIME: 00:00:00</span>
<span>UNIT: RBX-7742</span>
</div>
</div>

<script>
const RC = document.getElementById('robot').getContext('2d');
const RW = 360, RH = 280;
const logBox = document.getElementById('logBox');

// --- State ---
let powered = false;
let uptimeStart = 0;
let gauges = {
  cpu: { label: 'CPU LOAD', value: 0, target: 0, max: 100, unit: '%', color: '#22d68a', warn: 75, crit: 90 },
  temp: { label: 'CORE TEMP', value: 22, target: 22, max: 120, unit: '°C', color: '#3b8bff', warn: 75, crit: 95 },
  power: { label: 'POWER', value: 0, target: 0, max: 100, unit: '%', color: '#ffb830', warn: 20, crit: 10, invertWarn: true },
  servo: { label: 'SERVO RPM', value: 0, target: 0, max: 8000, unit: '', color: '#c466ff', warn: 6000, crit: 7500 },
  signal: { label: 'SIGNAL', value: 0, target: 0, max: 100, unit: 'dB', color: '#ff6b2e', warn: 30, crit: 15, invertWarn: true },
  memory: { label: 'MEMORY', value: 0, target: 0, max: 100, unit: '%', color: '#22d68a', warn: 80, crit: 95 }
};

// --- Audio ---
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }

function playSound(type) {
  const ctx = ensureAudio();
  const now = ctx.currentTime;
  if (type === 'boot') {
    [200,400,600,800].forEach((f,i) => {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = 'square'; o.frequency.setValueAtTime(f, now + i*0.08);
      g.gain.setValueAtTime(0.08, now + i*0.08); g.gain.exponentialDecayTo && 0;
      g.gain.setValueAtTime(0.08, now + i*0.08); g.gain.linearRampToValueAtTime(0, now + i*0.08 + 0.1);
      o.connect(g); g.connect(ctx.destination); o.start(now + i*0.08); o.stop(now + i*0.08 + 0.1);
    });
  } else if (type === 'shutdown') {
    [800,600,400,150].forEach((f,i) => {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = 'square'; o.frequency.setValueAtTime(f, now + i*0.12);
      g.gain.setValueAtTime(0.06, now + i*0.12); g.gain.linearRampToValueAtTime(0, now + i*0.12 + 0.15);
      o.connect(g); g.connect(ctx.destination); o.start(now + i*0.12); o.stop(now + i*0.12 + 0.15);
    });
  } else if (type === 'click') {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = 'triangle'; o.frequency.setValueAtTime(1200, now);
    g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now + 0.05);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now + 0.05);
  } else if (type === 'beep') {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(880, now);
    g.gain.setValueAtTime(0.08, now); g.gain.linearRampToValueAtTime(0, now + 0.1);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now + 0.1);
  } else if (type === 'alarm') {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(300, now); o.frequency.linearRampToValueAtTime(900, now+0.15);
    o.frequency.linearRampToValueAtTime(300, now+0.3);
    g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now + 0.35);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now + 0.35);
  } else if (type === 'servo') {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(60, now); o.frequency.linearRampToValueAtTime(200, now+0.4);
    g.gain.setValueAtTime(0.06, now); g.gain.linearRampToValueAtTime(0, now + 0.5);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now + 0.5);
  } else if (type === 'shock') {
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.3, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.08));
    const s = ctx.createBufferSource(); const g = ctx.createGain();
    s.buffer = buf; g.gain.setValueAtTime(0.15, now);
    s.connect(g); g.connect(ctx.destination); s.start(now);
  } else if (type === 'reset') {
    [600,500,400,300,200,600,800,1000].forEach((f,i) => {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(f, now + i*0.06);
      g.gain.setValueAtTime(0.06, now + i*0.06); g.gain.linearRampToValueAtTime(0, now + i*0.06 + 0.08);
      o.connect(g); g.connect(ctx.destination); o.start(now + i*0.06); o.stop(now + i*0.06 + 0.08);
    });
  }
}

// --- Logging ---
function log(msg, cls = 'log-info') {
  const d = new Date();
  const ts = d.toTimeString().slice(0,8);
  const el = document.createElement('div');
  el.className = 'log-entry ' + cls;
  el.textContent = `[${ts}] ${msg}`;
  logBox.appendChild(el);
  logBox.scrollTop = logBox.scrollHeight;
  if (logBox.children.length > 200) logBox.removeChild(logBox.firstChild);
}

// --- Power ---
function togglePower() {
  powered = !powered;
  const btn = document.getElementById('btnPower');
  const dot = document.getElementById('statusDot');
  const stxt = document.getElementById('statusText');
  if (powered) {
    playSound('boot');
    btn.textContent = 'Power On';
    btn.classList.add('on');
    dot.className = 'status-dot dot-on';
    stxt.textContent = 'ONLINE';
    uptimeStart = Date.now();
    gauges.power.target = 85 + Math.random() * 15;
    gauges.signal.target = 60 + Math.random() * 30;
    gauges.memory.target = 15 + Math.random() * 20;
    gauges.cpu.target = 5 + Math.random() * 15;
    gauges.temp.target = 28 + Math.random() * 10;
    log('SYSTEM BOOT SEQUENCE INITIATED', 'log-ok');
    log('Power core online — output ' + gauges.power.target.toFixed(0) + '%', 'log-ok');
    log('Signal acquired — strength ' + gauges.signal.target.toFixed(0) + 'dB', 'log-info');
    log('All subsystems nominal', 'log-ok');
  } else {
    playSound('shutdown');
    btn.textContent = 'Power Off';
    btn.classList.remove('on');
    dot.className = 'status-dot dot-off';
    stxt.textContent = 'OFFLINE';
    Object.values(gauges).forEach(g => { g.target = g.label === 'CORE TEMP' ? 22 : 0; });
    log('SHUTDOWN SEQUENCE — all systems powering down', 'log-warn');
    robotShake = 0; servoAngle = 0; sparkParticles = [];
  }
}

// --- Tests ---
function runDiagnostics() {
  if (!powered) { log('ERROR: System offline — power on first', 'log-err'); playSound('alarm'); return; }
  playSound('beep');
  log('Running full diagnostic scan...', 'log-info');
  const checks = ['Motor Controller','Gyroscope','Actuator Array','Neural Link','Cooling System','Sensor Grid'];
  checks.forEach((c, i) => {
    setTimeout(() => {
      const pass = Math.random() > 0.15;
      log(`  ${c}: ${pass ? 'PASS' : 'FAIL — recalibration needed'}`, pass ? 'log-ok' : 'log-err');
      playSound(pass ? 'click' : 'alarm');
      if (!pass) { gauges.temp.target = Math.min(gauges.temp.max, gauges.temp.target + 8); }
      if (i === checks.length - 1) {
        log('Diagnostic scan complete', 'log-info');
      }
    }, (i + 1) * 600);
  });
}

function stressTest() {
  if (!powered) { log('ERROR: System offline', 'log-err'); playSound('alarm'); return; }
  playSound('servo');
  log('STRESS TEST — pushing all systems to max', 'log-warn');
  gauges.cpu.target = 85 + Math.random() * 15;
  gauges.temp.target = 70 + Math.random() * 30;
  gauges.memory.target = 75 + Math.random() * 20;
  gauges.servo.target = 5000 + Math.random() * 2500;
  gauges.power.target = Math.max(20, gauges.power.target - 20);
  robotShake = 12;
  setTimeout(() => {
    if (!powered) return;
    log('Stress test holding...', 'log-warn');
    if (gauges.temp.target > 90) log('WARNING: Thermal limit approaching!', 'log-err');
  }, 2000);
  setTimeout(() => {
    if (!powered) return;
    gauges.cpu.target = 10 + Math.random() * 20;
    gauges.temp.target = 30 + Math.random() * 15;
    gauges.memory.target = 20 + Math.random() * 20;
    gauges.servo.target = 0;
    gauges.power.target = 80 + Math.random() * 15;
    robotShake = 0;
    log('Stress test complete — systems cooling down', 'log-ok');
  }, 6000);
}

function servoTest() {
  if (!powered) { log('ERROR: System offline', 'log-err'); playSound('alarm'); return; }
  playSound('servo');
  log('Servo calibration test initiated', 'log-info');
  gauges.servo.target = 3000 + Math.random() * 2000;
  servoTestActive = true;
  setTimeout(() => {
    gauges.servo.target = 6000 + Math.random() * 1500;
    log('Servo test — high RPM phase', 'log-warn');
  }, 2000);
  setTimeout(() => {
    gauges.servo.target = 0;
    servoTestActive = false;
    log('Servo calibration complete — nominal', 'log-ok');
    playSound('beep');
  }, 4500);
}

let sparkParticles = [];
function shockTest() {
  if (!powered) { log('ERROR: System offline', 'log-err'); playSound('alarm'); return; }
  playSound('shock');
  log('ELECTRIC SHOCK TEST — discharging capacitors', 'log-err');
  robotShake = 20;
  for (let i = 0; i < 30; i++) {
    sparkParticles.push({
      x: RW/2 + (Math.random()-0.5)*120,
      y: RH/2 + (Math.random()-0.5)*80,
      vx: (Math.random()-0.5)*6,
      vy: (Math.random()-0.5)*6,
      life: 30 + Math.random()*30,
      maxLife: 60
    });
  }
  gauges.temp.target = Math.min(100, gauges.temp.value + 15);
  setTimeout(() => { robotShake = 0; log('Shock test complete — all circuits intact', 'log-ok'); }, 2000);
}

function resetAll() {
  playSound('reset');
  log('FACTORY RESET — restoring defaults...', 'log-warn');
  powered = false;
  const btn = document.getElementById('btnPower');
  btn.textContent = 'Power Off';
  btn.classList.remove('on');
  document.getElementById('statusDot').className = 'status-dot dot-off';
  document.getElementById('statusText').textContent = 'OFFLINE';
  Object.values(gauges).forEach(g => { g.value = g.label === 'CORE TEMP' ? 22 : 0; g.target = g.value; });
  robotShake = 0; servoAngle = 0; sparkParticles = [];
  setTimeout(() => log('Factory reset complete', 'log-sys'), 1500);
}

// --- Gauge rendering ---
const gaugeCanvases = {};
function initGauges() {
  const grid = document.getElementById('gaugeGrid');
  Object.keys(gauges).forEach(key => {
    const g = gauges[key];
    const div = document.createElement('div');
    div.className = 'gauge';
    const c = document.createElement('canvas');
    c.width = 120; c.height = 80;
    const lbl = document.createElement('div');
    lbl.className = 'gauge-label';
    lbl.textContent = g.label;
    const val = document.createElement('div');
    val.className = 'gauge-value';
    val.id = 'gval-' + key;
    val.textContent = '0';
    div.appendChild(c);
    div.appendChild(lbl);
    div.appendChild(val);
    grid.appendChild(div);
    gaugeCanvases[key] = c.getContext('2d');
  });
}

function drawGauge(ctx, g, t) {
  const w = 120, h = 80, cx = 60, cy = 65, r = 48;
  ctx.clearRect(0, 0, w, h);
  const startA = Math.PI * 0.8;
  const endA = Math.PI * 0.2;
  const range = (2 * Math.PI - (startA - endA));
  // bg arc
  ctx.beginPath(); ctx.arc(cx, cy, r, startA, 2*Math.PI + endA); ctx.strokeStyle = '#1a1e28'; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke();
  // value arc
  const ratio = Math.min(g.value / g.max, 1);
  const valA = startA + ratio * range;
  let col = g.color;
  if (g.invertWarn) {
    if (g.value < g.crit) col = '#ff3b3b';
    else if (g.value < g.warn) col = '#ffb830';
  } else {
    if (g.value > g.crit) col = '#ff3b3b';
    else if (g.value > g.warn) col = '#ffb830';
  }
  if (ratio > 0.01) {
    ctx.beginPath(); ctx.arc(cx, cy, r, startA, valA); ctx.strokeStyle = col; ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.shadowColor = col; ctx.shadowBlur = 10; ctx.stroke(); ctx.shadowBlur = 0;
  }
  // needle
  const nA = valA - Math.PI/2 + Math.PI*0.3;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(startA + ratio * range - Math.PI/2 - Math.PI*0.3 + Math.PI);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -(r-12)); ctx.strokeStyle = '#c8ccd4'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fillStyle = col; ctx.fill();
  ctx.restore();
  // ticks
  for (let i = 0; i <= 10; i++) {
    const a = startA + (i/10) * range;
    const inner = r - 10, outer = r - 4;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a)*inner, cy + Math.sin(a)*inner);
    ctx.lineTo(cx + Math.cos(a)*outer, cy + Math.sin(a)*outer);
    ctx.strokeStyle = '#334'; ctx.lineWidth = 1; ctx.stroke();
  }
}

// --- Robot rendering ---
let robotShake = 0;
let servoAngle = 0;
let servoTestActive = false;
let eyeGlow = 0;
let frame = 0;

function drawRobot(t) {
  RC.clearRect(0, 0, RW, RH);
  // grid floor
  RC.strokeStyle = '#0d1018';
  for (let x = 0; x < RW; x += 20) { RC.beginPath(); RC.moveTo(x,0); RC.lineTo(x,RH); RC.stroke(); }
  for (let y = 0; y < RH; y += 20) { RC.beginPath(); RC.moveTo(0,y); RC.lineTo(RW,y); RC.stroke(); }

  const sx = powered ? (Math.random()-0.5) * robotShake : 0;
  const sy = powered ? (Math.random()-0.5) * robotShake : 0;
  RC.save();
  RC.translate(RW/2 + sx, RH/2 + sy);

  const bodyCol = powered ? '#1a2030' : '#111620';
  const accentCol = powered ? '#22d68a' : '#1a2a22';
  const eyeCol = powered ? `rgba(34,214,138,${0.7 + Math.sin(t*0.005)*0.3})` : '#1a2a22';
  const outlineCol = powered ? '#22d68a' : '#1a2a22';

  // Legs
  const legSwing = servoTestActive ? Math.sin(t*0.02)*8 : 0;
  RC.fillStyle = '#151a24';
  RC.fillRect(-55, 50 + legSwing, 22, 60);
  RC.fillRect(33, 50 - legSwing, 22, 60);
  // Feet
  RC.fillStyle = '#1a2030';
  RC.fillRect(-60, 105 + legSwing, 32, 12);
  RC.fillRect(28, 105 - legSwing, 32, 12);
  // foot glow
  if (powered) {
    RC.shadowColor = accentCol; RC.shadowBlur = 6;
    RC.strokeStyle = outlineCol; RC.lineWidth = 1;
    RC.strokeRect(-60, 105 + legSwing, 32, 12);
    RC.strokeRect(28, 105 - legSwing, 32, 12);
    RC.shadowBlur = 0;
  }

  // Body
  RC.fillStyle = bodyCol;
  RC.beginPath();
  RC.roundRect(-50, -40, 100, 90, 8);
  RC.fill();
  if (powered) {
    RC.shadowColor = outlineCol; RC.shadowBlur = 8;
    RC.strokeStyle = outlineCol; RC.lineWidth = 1;
    RC.stroke();
    RC.shadowBlur = 0;
  }

  // Chest panel
  RC.fillStyle = '#0a0e14';
  RC.fillRect(-35, -25, 70, 50);
  RC.strokeStyle = '#1a2a22'; RC.lineWidth = 0.5; RC.strokeRect(-35, -25, 70, 50);

  // Chest LEDs
  if (powered) {
    const ledColors = ['#22d68a','#3b8bff','#ffb830','#ff3b3b','#c466ff','#22d68a'];
    ledColors.forEach((c, i) => {
      const lx = -25 + (i % 3) * 20;
      const ly = -18 + Math.floor(i / 3) * 16;
      const on = Math.sin(t * 0.003 + i * 1.2) > 0;
      RC.beginPath(); RC.arc(lx, ly, 3, 0, Math.PI*2);
      RC.fillStyle = on ? c : '#111';
      if (on) { RC.shadowColor = c; RC.shadowBlur = 8; }
      RC.fill(); RC.shadowBlur = 0;
    });
    // chest bar
    const barW = 50;
    const barFill = gauges.cpu.value / 100;
    RC.fillStyle = '#0a0e14'; RC.fillRect(-25, 5, barW, 6);
    const barCol = gauges.cpu.value > 90 ? '#ff3b3b' : gauges.cpu.value > 70 ? '#ffb830' : '#22d68a';
    RC.fillStyle = barCol; RC.fillRect(-25, 5, barW * barFill, 6);
    RC.shadowColor = barCol; RC.shadowBlur = 4;
    RC.fillRect(-25, 5, barW * barFill, 6);
    RC.shadowBlur = 0;
    // label
    RC.fillStyle = '#556'; RC.font = '7px Share Tech Mono';
    RC.fillText('CPU', -25, 22);
    RC.fillText(gauges.cpu.value.toFixed(0) + '%', 5, 22);
  }

  // Arms
  const armSwing = servoTestActive ? Math.sin(t*0.015)*15 : (powered ? Math.sin(t*0.002)*3 : 0);
  RC.fillStyle = '#151a24';
  RC.save(); RC.translate(-55, -20); RC.rotate((armSwing) * Math.PI/180);
  RC.fillRect(-18, 0, 16, 55);
  // claw
  RC.fillStyle = '#1a2030';
  RC.fillRect(-20, 50, 8, 14); RC.fillRect(-8, 50, 8, 14);
  if (powered) { RC.shadowColor = accentCol; RC.shadowBlur = 4; RC.strokeStyle = outlineCol; RC.lineWidth = 0.5; RC.strokeRect(-18,0,16,55); RC.shadowBlur = 0; }
  RC.restore();

  RC.save(); RC.translate(55, -20); RC.rotate((-armSwing) * Math.PI/180);
  RC.fillStyle = '#151a24';
  RC.fillRect(2, 0, 16, 55);
  RC.fillStyle = '#1a2030';
  RC.fillRect(0, 50, 8, 14); RC.fillRect(12, 50, 8, 14);
  if (powered) { RC.shadowColor = accentCol; RC.shadowBlur = 4; RC.strokeStyle = outlineCol; RC.lineWidth = 0.5; RC.strokeRect(2,0,16,55); RC.shadowBlur = 0; }
  RC.restore();

  // Head
  RC.fillStyle = bodyCol;
  RC.beginPath(); RC.roundRect(-35, -85, 70, 48, 6); RC.fill();
  if (powered) { RC.shadowColor = outlineCol; RC.shadowBlur = 10; RC.strokeStyle = outlineCol; RC.lineWidth = 1; RC.stroke(); RC.shadowBlur = 0; }

  // Antenna
  RC.strokeStyle = '#334'; RC.lineWidth = 2;
  RC.beginPath(); RC.moveTo(0, -85); RC.lineTo(0, -105); RC.stroke();
  if (powered) {
    const antOn = Math.sin(t * 0.008) > 0;
    RC.beginPath(); RC.arc(0, -108, 4, 0, Math.PI*2);
    RC.fillStyle = antOn ? '#ff3b3b' : '#331111';
    if (antOn) { RC.shadowColor = '#ff3b3b'; RC.shadowBlur = 10; }
    RC.fill(); RC.shadowBlur = 0;
  }

  // Eyes
  RC.fillStyle = '#0a0e14';
  RC.fillRect(-25, -78, 18, 12);
  RC.fillRect(7, -78, 18, 12);
  RC.fillStyle = eyeCol;
  if (powered) {
    RC.shadowColor = '#22d68a'; RC.shadowBlur = 12;
    RC.fillRect(-23, -76, 14, 8);
    RC.fillRect(9, -76, 14, 8);
    // pupils
    const px = Math.sin(t * 0.001) * 3;
    RC.fillStyle = '#0a0e14';
    RC.fillRect(-18 + px, -74, 5, 5);
    RC.fillRect(14 + px, -74, 5, 5);
    RC.shadowBlur = 0;
  }

  // Mouth
  RC.fillStyle = powered ? '#1a2a22' : '#111';
  RC.fillRect(-12, -62, 24, 4);
  if (powered) {
    const mouthBars = 6;
    for (let i = 0; i < mouthBars; i++) {
      const h = Math.sin(t * 0.01 + i * 0.8) * 2 + 2;
      RC.fillStyle = accentCol;
      RC.fillRect(-10 + i * 4, -62 + (4-h)/2, 3, h);
    }
  }

  RC.restore();

  // Spark particles
  sparkParticles.forEach((p, i) => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
    const a = p.life / p.maxLife;
    RC.beginPath();
    RC.moveTo(p.x, p.y);
    RC.lineTo(p.x + p.vx * 3, p.y + p.vy * 3);
    RC.strokeStyle = `rgba(255,${150+Math.random()*100|0},50,${a})`;
    RC.lineWidth = 1.5;
    RC.shadowColor = '#ff6b2e'; RC.shadowBlur = 6;
    RC.stroke(); RC.shadowBlur = 0;
  });
  sparkParticles = sparkParticles.filter(p => p.life > 0);

  if (robotShake > 0) robotShake *= 0.95;
  if (robotShake < 0.3) robotShake = 0;
}

// --- Update loop ---
function update(t) {
  frame++;
  // Lerp gauge values
  Object.keys(gauges).forEach(key => {
    const g = gauges[key];
    g.value += (g.target - g.value) * 0.04;
    if (powered) {
      g.target += (Math.random() - 0.5) * (g.max * 0.005); // drift
      g.target = Math.max(0, Math.min(g.max, g.target));
    }
    const valEl = document.getElementById('gval-' + key);
    if (valEl) valEl.textContent = g.value.toFixed(g.unit === '°C' ? 1 : 0) + g.unit;
    if (gaugeCanvases[key]) drawGauge(gaugeCanvases[key], g, t);
  });

  // Update gauge value colors
  Object.keys(gauges).forEach(key => {
    const g = gauges[key];
    const valEl = document.getElementById('gval-' + key);
    if (!valEl) return;
    let col = g.color;
    if (g.invertWarn) {
      if (g.value < g.crit) col = '#ff3b3b';
      else if (g.value < g.warn) col = '#ffb830';
    } else {
      if (g.value > g.crit) col = '#ff3b3b';
      else if (g.value > g.warn) col = '#ffb830';
    }
    valEl.style.color = col;
    valEl.style.textShadow = `0 0 8px ${col}40`;
  });

  // Status dot
  if (powered) {
    const dot = document.getElementById('statusDot');
    if (gauges.temp.value > gauges.temp.crit || gauges.cpu.value > gauges.cpu.crit) {
      dot.className = 'status-dot dot-err';
    } else if (gauges.temp.value > gauges.temp.warn || gauges.cpu.value > gauges.cpu.warn) {
      dot.className = 'status-dot dot-warn';
    } else {
      dot.className = 'status-dot dot-on';
    }
  }

  // Uptime
  if (powered) {
    const elapsed = Math.floor((Date.now() - uptimeStart) / 1000);
    const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
    const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    document.getElementById('uptimeText').textContent = `UPTIME: ${h}:${m}:${s}`;
  }

  drawRobot(t);
  requestAnimationFrame(update);
}

// --- Init ---
initGauges();
log('Robo Lab v2.4 — awaiting power on', 'log-sys');
requestAnimationFrame(update);
</script>
