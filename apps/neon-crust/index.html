<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<meta name="description" content="A glowing procedural desert. Roam the dunes, point your gathering laser at crystal nodes, drain them dry.">
<meta property="og:title" content="neon crust · desert harvester">
<meta property="og:description" content="3D procedural desert. Resource nodes glow on the dunes. A gathering laser does the rest.">
<meta property="og:url" content="https://sloppy.live/neon-crust">
<meta property="og:image" content="https://image.pollinations.ai/prompt/3D%20synthwave%20procedural%20desert%20landscape%20with%20glowing%20pink%20cyan%20crystal%20clusters%20on%20rolling%20dunes%2C%20deep%20purple%20sky%2C%20stylised%20low-poly%2C%20no%20text%20no%20logo?width=1200&height=630&nologo=true">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%B6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  *,*::before,*::after{box-sizing:border-box}
  html{font-size:100%}
  html,body{margin:0;height:100%;background:#1a0826;color:#fce7ff;font-family:'IBM Plex Mono',monospace;overflow:hidden;-webkit-tap-highlight-color:transparent}
  .skip{position:absolute;left:-100vw;top:0;background:#0a0626;color:#fff;padding:.5rem .9rem;border:1px solid #ff4dc8;z-index:99;font-size:.85rem}
  .skip:focus{left:1rem;top:1rem}
  canvas#stage{
    position:fixed;inset:0;width:100vw;height:100vh;display:block;
    cursor:crosshair;touch-action:none;
  }

  /* ── HUD ────────────────────────────────────────────────────────── */
  .hud-top{
    position:fixed;left:0;right:0;top:0;padding:.55rem .8rem;
    display:flex;align-items:center;justify-content:space-between;gap:.55rem;
    z-index:5;pointer-events:none;flex-wrap:wrap;
    font-family:'Press Start 2P',monospace;font-size:.6rem;letter-spacing:.18em;
  }
  .pill{
    pointer-events:auto;
    background:rgba(20,4,32,0.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    border:1px solid rgba(255,77,200,0.35);border-radius:.32rem;
    padding:.45rem .7rem;color:#fce7ff;line-height:1;
    box-shadow:0 0 .6rem rgba(255,77,200,0.18);
    display:inline-flex;align-items:center;gap:.4rem;
  }
  .pill .ic{display:inline-block;width:.6rem;height:.6rem;border-radius:.1rem;box-shadow:0 0 .3rem currentColor}
  .pill.cyan   { color:#7af0ff;border-color:rgba(122,240,255,0.45) }
  .pill.cyan   .ic{ background:#7af0ff }
  .pill.pink   { color:#ff5fbf;border-color:rgba(255,95,191,0.45) }
  .pill.pink   .ic{ background:#ff5fbf }
  .pill.gold   { color:#ffd45e;border-color:rgba(255,212,94,0.45) }
  .pill.gold   .ic{ background:#ffd45e }
  .pill.energy { color:#9aff5e;border-color:rgba(154,255,94,0.45) }
  .pill.energy .ic{ background:#9aff5e }
  .pill.energy.crit{ color:#fff;background:rgba(255,77,90,0.7);border-color:#ff5f88;animation:pulse .8s linear infinite }
  @keyframes pulse{50%{background:rgba(255,77,90,0.3)}}

  /* center crosshair */
  .crosshair{
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
    width:24px;height:24px;pointer-events:none;z-index:4;display:none;
  }
  .crosshair.show{display:block}
  .crosshair::before, .crosshair::after{
    content:'';position:absolute;background:#7af0ff;box-shadow:0 0 .35rem rgba(122,240,255,0.7);
  }
  .crosshair::before{ left:11px;top:0;width:2px;height:24px }
  .crosshair::after { left:0;top:11px;width:24px;height:2px }
  .crosshair.locked-on::before, .crosshair.locked-on::after{ background:#ff5fbf;box-shadow:0 0 .35rem rgba(255,95,191,0.85) }
  .crosshair.firing::before, .crosshair.firing::after{ background:#ffd45e }

  /* targeted-node info */
  .target-info{
    position:fixed;left:50%;top:54%;transform:translateX(-50%);z-index:4;
    display:none;background:rgba(20,4,32,0.7);backdrop-filter:blur(6px);
    padding:.45rem .8rem;border-radius:.32rem;border:1px solid rgba(255,255,255,0.2);
    font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.06em;
    text-align:center;min-width:11rem;pointer-events:none;
  }
  .target-info.show{display:block}
  .target-info .name{font-family:'Press Start 2P',monospace;font-size:.7rem;letter-spacing:.18em;margin-bottom:.3rem}
  .target-info .bar{
    height:.36rem;background:#1a0a26;border:1px solid currentColor;border-radius:.18rem;overflow:hidden;
  }
  .target-info .bar > span{display:block;height:100%;background:currentColor;transition:width .12s}

  /* lock-prompt + title */
  .lock-prompt{
    position:fixed;left:50%;top:62%;transform:translate(-50%,-50%);
    color:#ffd45e;font-family:'Press Start 2P',monospace;font-size:.7rem;
    letter-spacing:.18em;text-align:center;z-index:5;pointer-events:none;
    background:rgba(20,4,32,0.7);padding:.6rem .9rem;border-radius:.32rem;
    border:1px solid #ffd45e;text-shadow:0 0 .5rem rgba(255,212,94,0.55);display:none;
  }
  .lock-prompt.show{display:block}

  .title-overlay, .end-overlay{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    flex-direction:column;text-align:center;padding:1rem;z-index:10;
    background:radial-gradient(ellipse at 50% 30%, rgba(40,8,60,0.85), rgba(20,4,32,0.97) 80%);
    backdrop-filter:blur(4px);
  }
  .title-overlay.show, .end-overlay.show{display:flex}
  .title-overlay h1{
    margin:0;font-family:'Audiowide',cursive;font-size:clamp(2rem, 7vw, 4.2rem);
    color:#fff;letter-spacing:.06em;line-height:1;
    text-shadow:0 0 .8rem rgba(255,77,200,0.6),0 0 1.8rem rgba(255,77,200,0.4),.18rem .18rem 0 rgba(122,240,255,0.45);
  }
  .title-overlay h1 .accent{color:#ffd45e}
  .title-overlay .sub{
    margin:.7rem 0 1.4rem;font-family:'Press Start 2P',monospace;font-size:.7rem;
    color:#cdb6ff;letter-spacing:.2em;line-height:1.7;max-width:32rem;
  }
  .title-overlay .sub b{color:#7af0ff}
  .title-overlay .controls{
    font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:#9aa0c8;
    letter-spacing:.04em;line-height:1.6;margin-bottom:1.2rem;max-width:34rem;
  }
  .title-overlay .controls kbd{
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,77,200,0.4);
    padding:.1rem .35rem;border-radius:.2rem;color:#fff;
    font-family:'Press Start 2P',monospace;font-size:.6rem;margin:0 .15rem;
  }
  .big-btn{
    background:transparent;color:#ffd45e;border:.18rem solid #ffd45e;
    padding:1rem 1.6rem;border-radius:.4rem;font-family:'Press Start 2P',monospace;
    font-size:.85rem;letter-spacing:.22em;cursor:pointer;text-transform:uppercase;min-height:3.4rem;
    box-shadow:0 0 1rem rgba(255,212,94,0.35);
    transition:background .15s, color .15s, transform .12s;
  }
  .big-btn:hover{background:#ffd45e;color:#28051a}
  .big-btn:active{transform:translateY(2px)}
  .big-btn:focus-visible{outline:.2rem solid #fff;outline-offset:.2rem}

  /* mobile touch controls */
  .joy, .fire-btn{
    position:fixed;z-index:6;pointer-events:auto;display:none;user-select:none;-webkit-user-select:none;
  }
  .joy{
    left:1rem;bottom:1rem;width:7.5rem;height:7.5rem;border-radius:50%;
    background:rgba(20,4,32,0.55);border:.18rem solid rgba(255,77,200,0.5);
    backdrop-filter:blur(8px);touch-action:none;
  }
  .joy .knob{
    position:absolute;left:50%;top:50%;width:3rem;height:3rem;border-radius:50%;
    background:#ff4dc8;transform:translate(-50%,-50%);box-shadow:0 0 .6rem #ff4dc8;
  }
  .fire-btn{
    right:1rem;bottom:1rem;width:5rem;height:5rem;border-radius:50%;border:.18rem solid #7af0ff;
    backdrop-filter:blur(8px);background:rgba(20,4,32,0.55);color:#7af0ff;
    font-family:'Press Start 2P',monospace;font-size:.6rem;cursor:pointer;
    align-items:center;justify-content:center;
  }
  @media (pointer: coarse){.joy, .fire-btn{display:flex}}

  /* toast */
  .toast{
    position:fixed;left:50%;top:25%;transform:translate(-50%,-50%);z-index:8;
    color:#9aff5e;font-family:'Press Start 2P',monospace;font-size:.75rem;letter-spacing:.18em;
    text-shadow:0 0 .6rem rgba(154,255,94,0.7);pointer-events:none;opacity:0;
    transition:opacity .25s, transform .25s;
  }
  .toast.show{opacity:1;transform:translate(-50%,-50%) translateY(-.4rem)}

  @media (prefers-reduced-motion: reduce){
    .pill.energy.crit{animation:none;background:rgba(255,77,90,0.45)}
  }
</style>
</head>
<body>
<a class="skip" href="#stage">skip to game</a>

<canvas id="stage" role="application" aria-label="3D desert harvester. WASD to move, mouse to look, hold left-click to fire the gathering laser at glowing nodes."></canvas>

<div class="hud-top" aria-live="polite">
  <div class="pill cyan"  ><span class="ic"></span>Aether <b id="hudCyan">0</b></div>
  <div class="pill pink"  ><span class="ic"></span>Solis  <b id="hudPink">0</b></div>
  <div class="pill gold"  ><span class="ic"></span>Lumen  <b id="hudGold">0</b></div>
  <div class="pill energy" id="hudEnergy"><span class="ic"></span>Cell <b id="hudEnergyV">100%</b></div>
</div>

<div class="crosshair" id="crosshair" aria-hidden="true"></div>
<div class="target-info" id="targetInfo">
  <div class="name" id="targetName">—</div>
  <div class="bar"><span id="targetBar" style="width:100%"></span></div>
</div>
<div class="lock-prompt" id="lockPrompt">click to capture cursor · esc to release</div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<div class="title-overlay show" id="title" role="dialog" aria-modal="true">
  <h1>NEON <span class="accent">CRUST</span></h1>
  <p class="sub">Procedural neon dunes. Glowing resource nodes. A gathering laser. Drain the desert dry.</p>
  <div class="controls">
    <kbd>W A S D</kbd> roam ·
    <kbd>shift</kbd> sprint ·
    <kbd>mouse</kbd> look ·
    <kbd>hold click</kbd> fire laser<br>
    <kbd>R</kbd> reseed terrain ·
    <kbd>esc</kbd> release cursor
  </div>
  <button type="button" class="big-btn" id="startBtn">▶ DEPLOY</button>
</div>

<div class="joy" id="joy" aria-hidden="true"><div class="knob" id="joyKnob"></div></div>
<button class="fire-btn" id="fireBtn" aria-label="Fire laser">FIRE</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
'use strict';

// =====================================================================
// neon-crust — 3D procedural desert with resource nodes + gathering
// laser. First-person, three.js. Scope: short-loop harvest sandbox.
// =====================================================================

const cvs = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ canvas: cvs, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.6));
renderer.setSize(window.innerWidth, window.innerHeight, false);
renderer.setClearColor(0x14041a, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x14041a, 0.014);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(0, 1.7, 0);

// Player rig — camera lives inside, headset (if XR) writes the camera.
// We move the rig only.
const playerRig = new THREE.Group();
scene.add(playerRig);
playerRig.add(camera);

// ── seeded PRNG (so terrain reseed feels coherent) ───────────────────
function fnv1a(s){ let h=0x811c9dc5; for (let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=(h*0x01000193)>>>0; } return h>>>0; }
function mulberry32(a){
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
let worldSeed = (Math.random() * 1e9) | 0;
let rng = mulberry32(worldSeed);

// ── procedural heightmap ─────────────────────────────────────────────
// Multi-frequency sine + 1 layer of pseudo-Perlin via lattice random.
// Cheap, deterministic from worldSeed, gives rolling dunes.
const TERRAIN_SIZE = 240;        // world units (radius=120 each side)
const TERRAIN_SEGS = 160;        // grid resolution
function heightAt(x, z){
  // base big dunes + medium ripple + tiny chop, all sin-based but seeded
  // through worldSeed so reseed reshapes coherently.
  const s = worldSeed * 0.00001;
  const h1 = Math.sin( (x + s*173) * 0.018) * Math.cos((z + s*97) * 0.014) * 6.5;
  const h2 = Math.sin( (x - s*53)  * 0.046 + 1.7) * Math.cos((z + s*131) * 0.052) * 2.0;
  const h3 = Math.sin( (x + s*199) * 0.11  + 0.4) * Math.cos((z - s*37)  * 0.13) * 0.6;
  const h4 = Math.sin( (x*0.32 + z*0.18) + s*7) * 0.5;
  return h1 + h2 + h3 + h4;
}

// terrain mesh
let terrainMesh = null;
function rebuildTerrain(){
  if (terrainMesh){
    scene.remove(terrainMesh);
    terrainMesh.geometry.dispose();
    terrainMesh.material.dispose();
  }
  const geo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGS, TERRAIN_SEGS);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++){
    const x = pos.getX(i);
    const z = pos.getZ(i);
    pos.setY(i, heightAt(x, z));
  }
  geo.computeVertexNormals();
  // vertex colors: dune crests brighter, valleys darker
  const colors = new Float32Array(pos.count * 3);
  for (let i = 0; i < pos.count; i++){
    const y = pos.getY(i);
    // 0..1 normalised brightness from height
    const n = Math.max(0, Math.min(1, (y + 8) / 16));
    // base color = warm sand; tint with heightful pink at crest
    const r = 0.62 + n * 0.30;
    const g = 0.30 + n * 0.16;
    const b = 0.45 + n * 0.18;
    colors[i*3] = r; colors[i*3+1] = g; colors[i*3+2] = b;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true,
    roughness: 0.85,
    metalness: 0.05,
    emissive: 0x2a1140,
    emissiveIntensity: 0.18,
    flatShading: false,
  });
  terrainMesh = new THREE.Mesh(geo, mat);
  scene.add(terrainMesh);
}

// ── grid overlay — neon cyan wire grid faintly atop the dunes ────────
let gridMesh = null;
function rebuildGrid(){
  if (gridMesh){ scene.remove(gridMesh); gridMesh.geometry.dispose(); gridMesh.material.dispose(); }
  const geo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGS / 2, TERRAIN_SEGS / 2);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++){
    pos.setY(i, heightAt(pos.getX(i), pos.getZ(i)) + 0.03);
  }
  const mat = new THREE.MeshBasicMaterial({
    color: 0x7af0ff, wireframe: true, transparent: true, opacity: 0.18,
  });
  gridMesh = new THREE.Mesh(geo, mat);
  scene.add(gridMesh);
}

// ── lighting ─────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffaad0, 0.32);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xff8acc, 0.85);
sun.position.set(40, 80, 30);
scene.add(sun);
// rim light from the opposite side (cyan)
const rim = new THREE.DirectionalLight(0x7af0ff, 0.35);
rim.position.set(-30, 50, -40);
scene.add(rim);
// player-attached point light so caves of dune valleys aren't pitch black
const headLamp = new THREE.PointLight(0xffd5ff, 1.1, 8);
headLamp.position.set(0, 0.2, -0.6);
camera.add(headLamp);

// far-distance starfield
(function addStars(){
  const N = 600;
  const positions = new Float32Array(N * 3);
  for (let i = 0; i < N; i++){
    const r = 280 + Math.random() * 60;
    const t = Math.random() * Math.PI * 2;
    const p = Math.acos(2 * Math.random() - 1);
    positions[i*3]   = r * Math.sin(p) * Math.cos(t);
    positions[i*3+1] = Math.abs(r * Math.cos(p)) + 30;
    positions[i*3+2] = r * Math.sin(p) * Math.sin(t);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xff8ad6, size: 0.6, transparent: true, opacity: 0.55 })));
})();

// distant moon
(function addMoon(){
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(20, 28, 20),
    new THREE.MeshBasicMaterial({ color: 0xffd45e })
  );
  m.position.set(140, 90, -160);
  scene.add(m);
  const halo = new THREE.Mesh(
    new THREE.SphereGeometry(28, 28, 20),
    new THREE.MeshBasicMaterial({ color: 0xffd45e, transparent: true, opacity: 0.18 })
  );
  halo.position.copy(m.position);
  scene.add(halo);
})();

// ── RESOURCE NODES ───────────────────────────────────────────────────
const RESOURCE_KINDS = [
  { key:'cyan', name:'Aether Crystal',  color: 0x7af0ff, glow: 0x7af0ff, capHp: 100, yieldPerHit: 1, hpKey: 'cyan' },
  { key:'pink', name:'Solis Shard',     color: 0xff5fbf, glow: 0xff5fbf, capHp: 140, yieldPerHit: 1, hpKey: 'pink' },
  { key:'gold', name:'Lumen Geode',     color: 0xffd45e, glow: 0xffd45e, capHp: 200, yieldPerHit: 2, hpKey: 'gold' },
];
const NODE_COUNT = 36;
const nodes = [];
const inventory = { cyan: 0, pink: 0, gold: 0 };

function spawnNodes(){
  // remove existing
  for (const n of nodes){
    scene.remove(n.group);
    n.group.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
  }
  nodes.length = 0;
  for (let i = 0; i < NODE_COUNT; i++){
    const r = (rng() * 0.6 + 0.2) * (TERRAIN_SIZE / 2);
    const theta = rng() * Math.PI * 2;
    const x = Math.cos(theta) * r;
    const z = Math.sin(theta) * r;
    const y = heightAt(x, z);
    const kind = RESOURCE_KINDS[Math.floor(rng() * RESOURCE_KINDS.length)];
    const g = new THREE.Group();
    g.position.set(x, y, z);
    // crystal cluster — 3-5 tilted cones rising from the dune
    const N = 3 + Math.floor(rng() * 3);
    for (let k = 0; k < N; k++){
      const h = 0.7 + rng() * 1.6;
      const w = 0.18 + rng() * 0.16;
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(w, h, 6),
        new THREE.MeshStandardMaterial({
          color: kind.color, emissive: kind.glow, emissiveIntensity: 0.85,
          roughness: 0.25, metalness: 0.5, transparent: false,
        }),
      );
      cone.position.set((rng() - 0.5) * 0.6, h / 2 + 0.05, (rng() - 0.5) * 0.6);
      cone.rotation.set((rng() - 0.5) * 0.4, rng() * Math.PI * 2, (rng() - 0.5) * 0.4);
      g.add(cone);
    }
    // small halo light per cluster
    const light = new THREE.PointLight(kind.glow, 1.2, 5);
    light.position.y = 0.8;
    g.add(light);
    scene.add(g);
    nodes.push({
      group: g, kind, x, y, z,
      hp: kind.capHp, maxHp: kind.capHp,
      depleted: false,
      _phase: rng() * 6.28,
      _light: light,
    });
  }
}

// ── PLAYER STATE ─────────────────────────────────────────────────────
const player = {
  x: 0, z: 0, y: 0,        // y = ground height under player
  yaw: 0, pitch: -0.1,
  vx: 0, vz: 0,
  bobT: 0, bobAmount: 0,
  energy: 100, maxEnergy: 100,
  laserTarget: null,        // currently-targeted node
};
const HEAD_HEIGHT = 1.7;

// ── INPUT ────────────────────────────────────────────────────────────
const keys = {};
const mouse = { down: false };
const MOUSE_SENS = 0.0023;
function isLocked(){ return document.pointerLockElement === cvs; }

window.addEventListener('keydown', e => {
  if (e.repeat) return;
  const k = e.key.toLowerCase();
  if (k === 'r' && state.phase === 'play'){
    worldSeed = (Math.random() * 1e9) | 0;
    rng = mulberry32(worldSeed);
    rebuildTerrain(); rebuildGrid(); spawnNodes();
    // re-snap player to new ground
    player.y = heightAt(player.x, player.z);
    flashToast('terrain reseeded · ' + worldSeed);
  }
  keys[k] = true;
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
window.addEventListener('blur', () => { for (const k in keys) keys[k] = false; mouse.down = false; });
cvs.addEventListener('click', () => {
  if (state.phase !== 'play') return;
  ensureAudio();
  if (!isLocked()) cvs.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  document.getElementById('crosshair').classList.toggle('show', isLocked());
  document.getElementById('lockPrompt').classList.toggle('show', !isLocked() && state.phase === 'play');
});
window.addEventListener('mousemove', e => {
  if (!isLocked()) return;
  player.yaw   -= e.movementX * MOUSE_SENS;
  player.pitch -= e.movementY * MOUSE_SENS;
  const PMAX = Math.PI / 2 - 0.05;
  if (player.pitch > PMAX) player.pitch = PMAX;
  if (player.pitch < -PMAX) player.pitch = -PMAX;
});
cvs.addEventListener('mousedown', e => {
  if (state.phase !== 'play' || !isLocked()) return;
  if (e.button === 0) mouse.down = true;
});
cvs.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
cvs.addEventListener('contextmenu', e => e.preventDefault());

// touch joystick
const joy = { active:false, dx:0, dy:0, baseX:0, baseY:0 };
const joyEl = document.getElementById('joy');
const joyKnob = document.getElementById('joyKnob');
joyEl.addEventListener('touchstart', e => {
  const t = e.touches[0];
  const r = joyEl.getBoundingClientRect();
  joy.baseX = r.left + r.width/2; joy.baseY = r.top + r.height/2;
  joy.active = true; updateJoy(t.clientX, t.clientY);
  e.preventDefault();
}, { passive:false });
joyEl.addEventListener('touchmove', e => { if (!joy.active) return; const t = e.touches[0]; updateJoy(t.clientX, t.clientY); e.preventDefault(); }, { passive:false });
joyEl.addEventListener('touchend', () => { joy.active = false; joy.dx=0; joy.dy=0; joyKnob.style.transform='translate(-50%,-50%)'; }, { passive:true });
function updateJoy(cx, cy){
  let dx = cx - joy.baseX, dy = cy - joy.baseY;
  const m = Math.hypot(dx,dy), max = 48;
  if (m > max){ dx = dx*max/m; dy = dy*max/m; }
  joy.dx = dx/max; joy.dy = dy/max;
  joyKnob.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
}
const fireBtn = document.getElementById('fireBtn');
fireBtn.addEventListener('touchstart', () => { mouse.down = true; ensureAudio(); }, { passive:true });
fireBtn.addEventListener('touchend',   () => { mouse.down = false; }, { passive:true });

// ── AUDIO ────────────────────────────────────────────────────────────
let audioCtx = null, masterGain = null, laserOsc = null, laserGain = null, laserNoise = null;
function ensureAudio(){
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.18;
    masterGain.connect(audioCtx.destination);
    setupLaser();
  } catch(e){}
}
function setupLaser(){
  // looping carrier — gain modulated when firing
  laserOsc = audioCtx.createOscillator();
  laserOsc.type = 'sawtooth';
  laserOsc.frequency.value = 220;
  // bandpass for color
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 1800;
  bp.Q.value = 4;
  laserGain = audioCtx.createGain();
  laserGain.gain.value = 0;
  laserOsc.connect(bp); bp.connect(laserGain); laserGain.connect(masterGain);
  laserOsc.start();
  // noise sub
  const buf = audioCtx.createBuffer(1, 0.5 * audioCtx.sampleRate, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  laserNoise = audioCtx.createBufferSource();
  laserNoise.buffer = buf; laserNoise.loop = true;
  const ng = audioCtx.createGain(); ng.gain.value = 0;
  const nf = audioCtx.createBiquadFilter(); nf.type = 'highpass'; nf.frequency.value = 800;
  laserNoise.connect(nf); nf.connect(ng); ng.connect(masterGain);
  laserNoise.start();
  laserNoise._gain = ng;
}
function setLaserActive(on){
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  laserGain.gain.cancelScheduledValues(t);
  laserGain.gain.linearRampToValueAtTime(on ? 0.16 : 0, t + (on ? 0.04 : 0.08));
  laserNoise._gain.gain.cancelScheduledValues(t);
  laserNoise._gain.gain.linearRampToValueAtTime(on ? 0.06 : 0, t + (on ? 0.04 : 0.08));
}
function blip(freq, dur, type, vol){
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol || 0.15, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + dur + 0.05);
}
function sndCollect(){ blip(880, 0.06, 'triangle', 0.18); blip(1320, 0.07, 'triangle', 0.12); }
function sndDeplete(kind){
  blip(440, 0.1, 'square', 0.15);
  blip(660, 0.12, 'triangle', 0.12);
  blip(880, 0.16, 'triangle', 0.10);
}

// ── LASER VISUAL ─────────────────────────────────────────────────────
// A line from the camera's near-front to the impact point. Updated each
// frame while firing; disabled otherwise. Plus a small beam-end glow.
const laserGeo = new THREE.BufferGeometry();
laserGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
const laserMat = new THREE.LineBasicMaterial({
  color: 0x7af0ff, transparent: true, opacity: 0,
});
const laserLine = new THREE.Line(laserGeo, laserMat);
laserLine.frustumCulled = false;
scene.add(laserLine);
// halo at the muzzle + at the hit point
const laserMuzzle = new THREE.Mesh(
  new THREE.SphereGeometry(0.05, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0x7af0ff, transparent: true, opacity: 0 })
);
camera.add(laserMuzzle);
laserMuzzle.position.set(0.18, -0.18, -0.5);
const laserImpact = new THREE.Mesh(
  new THREE.SphereGeometry(0.18, 12, 12),
  new THREE.MeshBasicMaterial({ color: 0x7af0ff, transparent: true, opacity: 0 })
);
scene.add(laserImpact);
const impactLight = new THREE.PointLight(0x7af0ff, 0, 4);
scene.add(impactLight);

// ── TARGETING / RAYCAST ──────────────────────────────────────────────
const ray = new THREE.Raycaster();
ray.far = 60;
const _camDir = new THREE.Vector3();
const _camOrigin = new THREE.Vector3();
function findTargetedNode(){
  // raycast from camera forward against all node groups
  camera.getWorldPosition(_camOrigin);
  camera.getWorldDirection(_camDir);
  ray.set(_camOrigin, _camDir);
  let best = null, bestDist = Infinity;
  for (const n of nodes){
    if (n.depleted) continue;
    // quick distance check first — skip far nodes
    const d2 = (n.x - _camOrigin.x)**2 + (n.z - _camOrigin.z)**2;
    if (d2 > 50*50) continue;
    const hits = ray.intersectObject(n.group, true);
    if (hits.length && hits[0].distance < bestDist){
      bestDist = hits[0].distance;
      best = { node: n, point: hits[0].point };
    }
  }
  return best;
}

// ── FIRE LOOP ────────────────────────────────────────────────────────
const LASER_DRAIN_PER_SEC = 80;        // node hp drained per second
const ENERGY_DRAIN_PER_SEC = 22;       // player energy drained per second of firing
const ENERGY_REGEN_PER_SEC = 18;       // regen when not firing

let firingThisFrame = false;
function tickLaser(dt){
  // crosshair + target info reset
  const xh = document.getElementById('crosshair');
  const ti = document.getElementById('targetInfo');
  xh.classList.remove('locked-on', 'firing');

  // figure out targeted node
  const target = findTargetedNode();
  player.laserTarget = target ? target.node : null;
  if (target){
    xh.classList.add('locked-on');
    ti.classList.add('show');
    ti.style.color = '#' + target.node.kind.color.toString(16).padStart(6, '0');
    document.getElementById('targetName').textContent = target.node.kind.name;
    const ratio = Math.max(0, target.node.hp) / target.node.maxHp;
    document.getElementById('targetBar').style.width = (ratio * 100) + '%';
  } else {
    ti.classList.remove('show');
  }

  // are we firing?
  const wantFire = mouse.down && state.phase === 'play';
  const canFire  = player.energy > 0;
  const isFiring = wantFire && canFire && target;

  if (isFiring){
    xh.classList.add('firing');
    // drain node + add resources gradually (in fractional accumulator)
    target.node.hp -= LASER_DRAIN_PER_SEC * dt;
    if (target.node.hp <= 0){
      target.node.hp = 0;
      depleteNode(target.node);
    }
    // gain the kind's yield over time, in fractional units
    const gain = target.node.kind.yieldPerHit * (LASER_DRAIN_PER_SEC * dt) / target.node.kind.capHp * 6;
    player.energy = Math.max(0, player.energy - ENERGY_DRAIN_PER_SEC * dt);
    addResource(target.node.kind.hpKey, gain);
    laserMat.color.setHex(target.node.kind.glow);
    laserMuzzle.material.color.setHex(target.node.kind.glow);
    laserImpact.material.color.setHex(target.node.kind.glow);
    impactLight.color.setHex(target.node.kind.glow);
  } else {
    player.energy = Math.min(player.maxEnergy, player.energy + ENERGY_REGEN_PER_SEC * dt);
  }
  setLaserActive(isFiring);
  // beam visibility + position
  if (isFiring){
    const muzzleWorld = new THREE.Vector3();
    laserMuzzle.getWorldPosition(muzzleWorld);
    const positions = laserGeo.attributes.position.array;
    positions[0] = muzzleWorld.x; positions[1] = muzzleWorld.y; positions[2] = muzzleWorld.z;
    positions[3] = target.point.x; positions[4] = target.point.y; positions[5] = target.point.z;
    laserGeo.attributes.position.needsUpdate = true;
    // beam pulse opacity
    const pulse = 0.7 + Math.sin(performance.now() * 0.04) * 0.25;
    laserMat.opacity   = pulse;
    laserMuzzle.material.opacity = pulse;
    laserImpact.material.opacity = 0.85;
    laserImpact.position.copy(target.point);
    impactLight.position.copy(target.point);
    impactLight.intensity = 1.6 + Math.sin(performance.now() * 0.03) * 0.6;
  } else {
    laserMat.opacity   = 0;
    laserMuzzle.material.opacity = 0;
    laserImpact.material.opacity = 0;
    impactLight.intensity = 0;
  }

  refreshHud();
}

// fractional resource bucket (laser ticks at fps, integers update on whole units)
const _frac = { cyan: 0, pink: 0, gold: 0 };
function addResource(key, amt){
  _frac[key] = (_frac[key] || 0) + amt;
  while (_frac[key] >= 1){
    inventory[key]++; _frac[key]--;
    sndCollect();
  }
}

function depleteNode(node){
  if (node.depleted) return;
  node.depleted = true;
  // pop visual: scale down + spawn 12 sparks
  const start = performance.now();
  const dur = 700;
  const startScales = [];
  node.group.children.forEach((c, i) => { startScales[i] = c.scale.clone ? c.scale.clone() : null; });
  function anim(){
    const t = (performance.now() - start) / dur;
    if (t >= 1){
      scene.remove(node.group);
      node.group.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
      return;
    }
    const s = 1 - t;
    node.group.children.forEach((c, i) => {
      if (startScales[i]) c.scale.set(s, s, s);
    });
    if (node._light) node._light.intensity = 1.2 * (1 - t);
    requestAnimationFrame(anim);
  }
  // spawn sparks
  const burst = node.kind.glow;
  for (let i = 0; i < 12; i++){
    const a = Math.random() * Math.PI * 2;
    const p = Math.random() * Math.PI;
    const sp = 2 + Math.random() * 4;
    spawnParticle(node.x, node.y + 1, node.z,
      Math.cos(a) * sp, 1 + Math.random() * 3, Math.sin(a) * sp,
      0.7 + Math.random() * 0.4, burst, 0.16);
  }
  flashToast('+' + node.kind.yieldPerHit + ' bonus · ' + node.kind.name + ' depleted');
  sndDeplete(node.kind);
  inventory[node.kind.hpKey] += node.kind.yieldPerHit;   // small bonus drop
  refreshHud();
  anim();
}

// ── PARTICLES ────────────────────────────────────────────────────────
const particles = [];
const particleGroup = new THREE.Group();
scene.add(particleGroup);
function spawnParticle(x, y, z, vx, vy, vz, dur, color, size){
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(size || 0.1, 6, 6),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 })
  );
  m.position.set(x, y, z);
  particleGroup.add(m);
  particles.push({ x, y, z, vx, vy, vz, life: 0, dur, color, size: size || 0.1, mesh: m });
}
function tickParticles(dt){
  for (let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.life += dt;
    if (p.life >= p.dur){
      particleGroup.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose();
      particles.splice(i, 1); continue;
    }
    p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
    p.vy -= dt * 5;          // gravity
    p.vx *= 0.92; p.vz *= 0.92;
    p.mesh.position.set(p.x, p.y, p.z);
    p.mesh.material.opacity = 1 - p.life / p.dur;
  }
}

// ── PLAYER MOVEMENT ──────────────────────────────────────────────────
function tickPlayer(dt){
  let strafe = 0, fwd = 0;
  if (keys['w'] || keys['arrowup'])    fwd    += 1;
  if (keys['s'] || keys['arrowdown'])  fwd    -= 1;
  if (keys['a'] || keys['arrowleft'])  strafe -= 1;
  if (keys['d'] || keys['arrowright']) strafe += 1;
  if (joy.active){ strafe += joy.dx; fwd -= joy.dy; }
  const sprint = keys['shift'] ? 1.55 : 1;
  const inMag = Math.hypot(strafe, fwd);
  if (inMag > 1){ strafe /= inMag; fwd /= inMag; }
  const sinY = Math.sin(player.yaw), cosY = Math.cos(player.yaw);
  // standard FPS: forward = (-sin(yaw), -cos(yaw)) on XZ
  const mx =  strafe * cosY - fwd * sinY;
  const mz = -strafe * sinY - fwd * cosY;
  let speed = 8 * sprint;
  player.vx = mx * speed; player.vz = mz * speed;
  player.x += player.vx * dt;
  player.z += player.vz * dt;
  // clamp to terrain bounds
  const half = TERRAIN_SIZE / 2 - 2;
  if (player.x >  half) player.x =  half;
  if (player.x < -half) player.x = -half;
  if (player.z >  half) player.z =  half;
  if (player.z < -half) player.z = -half;
  // ground follow
  player.y = heightAt(player.x, player.z);

  // head bob
  const moveMag = Math.hypot(player.vx, player.vz);
  const bobTarget = Math.min(1, moveMag / 8);
  player.bobAmount += (bobTarget - player.bobAmount) * Math.min(1, dt * 8);
  player.bobT += dt * (8 * sprint) * (moveMag > 0.5 ? 1 : 0);
  const bobY = Math.sin(player.bobT * 2) * 0.04 * player.bobAmount;
  const bobLat = Math.cos(player.bobT) * 0.025 * player.bobAmount;

  // rig + camera
  playerRig.position.set(player.x, player.y, player.z);
  camera.position.set(bobLat, HEAD_HEIGHT + bobY, 0);
  camera.rotation.set(player.pitch, player.yaw, 0, 'YXZ');
}

// ── HUD ──────────────────────────────────────────────────────────────
function refreshHud(){
  document.getElementById('hudCyan').textContent = inventory.cyan | 0;
  document.getElementById('hudPink').textContent = inventory.pink | 0;
  document.getElementById('hudGold').textContent = inventory.gold | 0;
  const eEl = document.getElementById('hudEnergy');
  const eVal = document.getElementById('hudEnergyV');
  const ep = (player.energy / player.maxEnergy) * 100;
  eVal.textContent = Math.round(ep) + '%';
  eEl.classList.toggle('crit', ep < 25);
}
let toastT = null;
function flashToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 1700);
}

// ── STATE / BOOT ─────────────────────────────────────────────────────
const state = { phase: 'title' };
function startGame(){
  ensureAudio();
  state.phase = 'play';
  document.getElementById('title').classList.remove('show');
  // try to lock from this gesture
  try {
    const lp = cvs.requestPointerLock();
    if (lp && lp.catch) lp.catch(() => {});
  } catch(e){}
  if (!isLocked()) document.getElementById('lockPrompt').classList.add('show');
  flashToast('terrain seed · ' + worldSeed);
}
document.getElementById('startBtn').addEventListener('click', startGame);

// ── RESIZE ───────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── MAIN LOOP ────────────────────────────────────────────────────────
let lastT = performance.now();
function loop(){
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (state.phase === 'play'){
    tickPlayer(dt);
    tickLaser(dt);
    tickParticles(dt);
  } else {
    tickParticles(dt);
  }
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

// boot
rebuildTerrain();
rebuildGrid();
spawnNodes();
player.y = heightAt(0, 0);
playerRig.position.set(0, player.y, 0);
camera.position.set(0, HEAD_HEIGHT, 0);
refreshHud();
requestAnimationFrame(loop);
})();
</script>
