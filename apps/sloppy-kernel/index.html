<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sloppy-kernel</title>
  <meta name="description" content="A fake interactive alien kernel dashboard. Fire absurd syscalls like scream(), dance(), and forget_the_stack(). Do NOT run the Android app.">
  <meta property="og:title" content="sloppy-kernel">
  <meta property="og:description" content="An interactive fake kernel from another planet. Telepathy load, antimatter buffers, and syscalls that scream. There is a button you should not press.">
  <meta property="og:url" content="https://sloppy.live/sloppy-kernel">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/An%20alien%20operating%20system%20terminal%20with%20glowing%20green%20and%20magenta%20glyphs%20on%20black,%20retro%20CRT%20scanlines,%20editorial%20sci-fi%20render?model=flux&seed=4242&width=1200&height=630&nologo=true">
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%91%BD">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --void:    #03070a;
      --void-2:  #061015;
      --panel:   rgba(8,24,20,0.72);
      --phos:    #4dff9e;     /* phosphor green */
      --phos-d:  #1c8a52;
      --cyan:    #45e0ff;
      --magenta: #ff5ed0;
      --amber:   #ffd24a;
      --red:     #ff5a6c;
      --ink:     #c8ffe0;
      --ink-dim: rgba(200,255,224,0.5);
      --line:    rgba(77,255,158,0.16);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 15% 0%, rgba(77,255,158,0.08), transparent 55%),
        radial-gradient(ellipse at 100% 100%, rgba(255,94,208,0.07), transparent 55%),
        var(--void);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      padding: 0.8rem;
      position: relative;
      overflow-x: hidden;
    }
    /* CRT scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 50;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 3px);
      mix-blend-mode: multiply;
    }
    body.glitch { animation: scr-glitch 0.4s steps(2) infinite; }
    @keyframes scr-glitch {
      0% { filter: hue-rotate(0) saturate(1); transform: translate(0,0); }
      25% { filter: hue-rotate(40deg) saturate(1.6); transform: translate(-2px,1px); }
      50% { filter: hue-rotate(-30deg); transform: translate(2px,-1px); }
      75% { filter: hue-rotate(70deg) saturate(2); transform: translate(-1px,0); }
    }
    body.dance .panel { animation: wobble 0.6s ease-in-out infinite; }
    @keyframes wobble {
      0%,100% { transform: rotate(-1.2deg) translateY(0); }
      50%     { transform: rotate(1.2deg) translateY(-4px); }
    }

    main { max-width: 64rem; margin: 0 auto; position: relative; z-index: 1; }

    /* ============ HEADER ============ */
    header.mast {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 0.5rem;
      border-bottom: 2px solid var(--line);
      padding-bottom: 0.6rem;
      margin-bottom: 0.8rem;
    }
    header.mast h1 {
      font-family: 'Major Mono Display', monospace;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      letter-spacing: 0.1em;
      color: var(--phos);
      text-shadow: 0 0 14px rgba(77,255,158,0.5), 0 0 36px rgba(77,255,158,0.2);
      line-height: 1;
    }
    header.mast .meta {
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      color: var(--ink-dim);
      letter-spacing: 0.03em;
      text-align: right;
    }
    header.mast .meta b { color: var(--cyan); }

    /* ============ GRID ============ */
    .grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 0.8rem;
    }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.8rem 0.9rem 0.9rem;
      box-shadow: 0 0 0 1px rgba(77,255,158,0.05) inset, 0 10px 30px rgba(0,0,0,0.4);
    }
    .panel h2 {
      font-family: 'VT323', monospace;
      font-size: 1.25rem;
      letter-spacing: 0.06em;
      color: var(--phos);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .panel h2 .blip {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--phos);
      box-shadow: 0 0 8px var(--phos);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 50% { opacity: 0.25; } }

    /* ============ VITALS ============ */
    .vital { margin-bottom: 0.55rem; }
    .vital .vlabel {
      display: flex; justify-content: space-between;
      font-size: 0.72rem; letter-spacing: 0.04em;
      color: var(--ink-dim);
      margin-bottom: 0.2rem;
    }
    .vital .vlabel b { color: var(--cyan); font-weight: 500; }
    .vbar {
      height: 9px; border-radius: 5px;
      background: rgba(77,255,158,0.08);
      border: 1px solid var(--line);
      overflow: hidden;
    }
    .vbar .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--phos-d), var(--phos));
      box-shadow: 0 0 10px rgba(77,255,158,0.5);
      transition: width 0.4s ease-out;
    }
    .vbar .fill.hot { background: linear-gradient(90deg, #aa3a2a, var(--red)); box-shadow: 0 0 12px rgba(255,90,108,0.6); }
    .vbar .fill.warn { background: linear-gradient(90deg, #aa7a1a, var(--amber)); }

    /* ============ SYSCALL CONSOLE ============ */
    .syscalls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.4rem;
      margin-bottom: 0.6rem;
    }
    .sc {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 0.78rem;
      padding: 0.55rem 0.5rem;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: rgba(77,255,158,0.05);
      color: var(--phos);
      cursor: pointer;
      transition: all 0.12s;
      text-align: left;
      min-height: 2.6rem;
    }
    .sc:hover { background: rgba(77,255,158,0.14); border-color: var(--phos); box-shadow: 0 0 14px rgba(77,255,158,0.25); }
    .sc:active { transform: translateY(1px); }
    .sc:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
    .sc .arg { color: var(--ink-dim); font-size: 0.66rem; }

    .danger-btn {
      width: 100%;
      font-family: 'VT323', monospace;
      font-size: 1.35rem;
      letter-spacing: 0.04em;
      padding: 0.7rem;
      border-radius: 8px;
      border: 2px solid var(--magenta);
      background: linear-gradient(180deg, rgba(255,94,208,0.18), rgba(255,94,208,0.05));
      color: var(--magenta);
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.12s;
      box-shadow: 0 0 18px rgba(255,94,208,0.25);
      animation: danger-pulse 2.4s ease-in-out infinite;
    }
    @keyframes danger-pulse {
      0%,100% { box-shadow: 0 0 18px rgba(255,94,208,0.25); }
      50%     { box-shadow: 0 0 30px rgba(255,94,208,0.5); }
    }
    .danger-btn:hover { background: rgba(255,94,208,0.28); }
    .danger-btn:active { transform: translateY(1px); }
    .danger-btn:focus-visible { outline: 2px solid var(--cyan); outline-offset: 3px; }
    .danger-note {
      font-family: 'VT323', monospace;
      font-size: 0.95rem;
      color: var(--red);
      text-align: center;
      margin-top: 0.3rem;
      letter-spacing: 0.02em;
    }

    /* ============ PROCESS TABLE ============ */
    .proc-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
    .proc-table th {
      text-align: left;
      font-family: 'VT323', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      color: var(--cyan);
      padding: 0.2rem 0.4rem;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
    }
    .proc-table td {
      padding: 0.22rem 0.4rem;
      border-bottom: 1px dotted rgba(77,255,158,0.08);
      color: var(--ink);
    }
    .proc-table td.pid { color: var(--ink-dim); }
    .proc-table td.cpu { color: var(--amber); text-align: right; }
    .proc-table td.st  { color: var(--phos); }
    .proc-table td.st.zombie { color: var(--magenta); }
    .proc-table td.st.screaming { color: var(--red); }

    /* ============ KERNEL LOG ============ */
    .log {
      grid-column: 1 / -1;
    }
    .log-stream {
      font-family: 'VT323', monospace;
      font-size: 1rem;
      line-height: 1.35;
      height: 14rem;
      overflow-y: auto;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0.5rem 0.7rem;
      letter-spacing: 0.01em;
    }
    .log-stream .ln { white-space: pre-wrap; word-break: break-word; }
    .log-stream .ln .t { color: var(--phos-d); }
    .log-stream .ln.info .m { color: var(--ink); }
    .log-stream .ln.ok   .m { color: var(--phos); }
    .log-stream .ln.warn .m { color: var(--amber); }
    .log-stream .ln.err  .m { color: var(--red); }
    .log-stream .ln.alien .m { color: var(--magenta); }
    .log-stream::-webkit-scrollbar { width: 6px; }
    .log-stream::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

    .cmd-row {
      display: flex; gap: 0.4rem; margin-top: 0.5rem;
    }
    .cmd-row .prompt {
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      color: var(--cyan);
      align-self: center;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .cmd-row input {
      flex: 1;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--phos);
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      padding: 0.4rem 0.6rem;
      outline: none;
    }
    .cmd-row input:focus { border-color: var(--phos); box-shadow: 0 0 12px rgba(77,255,158,0.2); }
    .cmd-row input::placeholder { color: var(--ink-dim); }

    /* ============ SCREAM OVERLAY ============ */
    .scream-overlay {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      z-index: 40;
      pointer-events: none;
    }
    .scream-overlay.on { display: flex; }
    .scream-overlay .txt {
      font-family: 'Major Mono Display', monospace;
      font-size: clamp(3rem, 16vw, 11rem);
      color: var(--red);
      text-shadow: 0 0 40px rgba(255,90,108,0.8);
      animation: scream-jit 0.08s steps(2) infinite;
      letter-spacing: 0.04em;
    }
    @keyframes scream-jit {
      0% { transform: translate(0,0) scale(1); }
      50% { transform: translate(6px,-4px) scale(1.04); }
    }

    /* ============ ANDROID CRASH OVERLAY ============ */
    .android-overlay {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem;
      z-index: 45;
      background: #0c8a3a;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      padding: 2rem 1rem;
      text-align: center;
    }
    .android-overlay.on { display: flex; }
    .android-overlay .bot { font-size: 5rem; animation: bot-spin 1.2s linear infinite; }
    @keyframes bot-spin { to { transform: rotate(360deg); } }
    .android-overlay h2 {
      font-family: 'Major Mono Display', monospace;
      font-size: clamp(1.4rem, 5vw, 2.4rem);
      letter-spacing: 0.08em;
    }
    .android-overlay .code {
      font-family: 'VT323', monospace;
      font-size: 1.2rem;
      max-width: 30rem;
      line-height: 1.4;
      opacity: 0.9;
      white-space: pre-wrap;
    }
    .android-overlay .err {
      background: #061018; color: var(--magenta);
      padding: 1rem; border-radius: 8px;
      border: 1px solid var(--magenta);
      max-width: 30rem; width: 100%;
      font-family: 'VT323', monospace;
      font-size: 1.05rem;
      text-align: left;
      line-height: 1.4;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition: none !important; }
      body.glitch, body.dance .panel { animation: none !important; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <main>
    <header class="mast">
      <h1>sloppy-kernel</h1>
      <div class="meta">
        v<b id="kver">9.0.0-zëta</b> · uptime <b id="uptime">00:00:00</b><br>
        arch <b>xenu64</b> · host <b>nebula-7</b>
      </div>
    </header>

    <div class="grid">
      <!-- VITALS -->
      <section class="panel" aria-label="System vitals">
        <h2><span class="blip"></span> core vitals</h2>
        <div id="vitals"></div>
      </section>

      <!-- SYSCALL CONSOLE -->
      <section class="panel" aria-label="Syscall console">
        <h2><span class="blip"></span> syscalls</h2>
        <div class="syscalls" id="syscalls"></div>
        <button type="button" class="danger-btn" id="android-btn">▶ run android app</button>
        <div class="danger-note">⚠ this kernel is not android compatible</div>
      </section>

      <!-- PROCESS TABLE -->
      <section class="panel" aria-label="Process table">
        <h2><span class="blip"></span> processes</h2>
        <table class="proc-table">
          <thead><tr><th>pid</th><th>name</th><th>cpu</th><th>state</th></tr></thead>
          <tbody id="proc-body"></tbody>
        </table>
      </section>

      <!-- KERNEL LOG -->
      <section class="panel log" aria-label="Kernel log">
        <h2><span class="blip"></span> dmesg · live</h2>
        <div class="log-stream" id="log" role="log" aria-live="polite"></div>
        <div class="cmd-row">
          <span class="prompt" aria-hidden="true" id="ps-prompt">PS C:\xenu&gt;</span>
          <input type="text" id="cmd" placeholder="Invoke-Scream  ·  Get-Process  ·  Get-Help" aria-label="PowerShell command input" autocomplete="off" spellcheck="false">
        </div>
      </section>
    </div>
  </main>

  <div class="scream-overlay" id="scream"><div class="txt" id="scream-txt">AAAAA</div></div>

  <div class="android-overlay" id="android" role="dialog" aria-modal="true" aria-label="Android app crash">
    <div class="bot" aria-hidden="true">🤖</div>
    <h2 id="android-title">installing android…</h2>
    <div class="code" id="android-code">resolving dependencies…</div>
    <div class="err" id="android-err" style="display:none"></div>
  </div>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // KERNEL LOG
    // ============================================================
    const logEl = document.getElementById('log');
    function now() {
      const t = uptimeSec;
      const h = String(Math.floor(t / 3600)).padStart(2, '0');
      const m = String(Math.floor((t % 3600) / 60)).padStart(2, '0');
      const s = String(Math.floor(t % 60)).padStart(2, '0');
      return h + ':' + m + ':' + s;
    }
    function klog(msg, cls) {
      const ln = document.createElement('div');
      ln.className = 'ln ' + (cls || 'info');
      ln.innerHTML = '<span class="t">[' + now() + ']</span> <span class="m"></span>';
      ln.querySelector('.m').textContent = ' ' + msg;
      logEl.appendChild(ln);
      // Cap to 200 lines
      while (logEl.children.length > 200) logEl.removeChild(logEl.firstChild);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // ============================================================
    // UPTIME
    // ============================================================
    let uptimeSec = 0;
    const upEl = document.getElementById('uptime');
    setInterval(() => {
      uptimeSec++;
      const h = String(Math.floor(uptimeSec / 3600)).padStart(2, '0');
      const m = String(Math.floor((uptimeSec % 3600) / 60)).padStart(2, '0');
      const s = String(uptimeSec % 60).padStart(2, '0');
      upEl.textContent = h + ':' + m + ':' + s;
    }, 1000);

    // ============================================================
    // VITALS — alien-flavored fluctuating bars
    // ============================================================
    const VITALS = [
      { id: 'telepathy', label: 'telepathy load',   unit: '%',   v: 34, drift: 10, max: 100 },
      { id: 'antimatter', label: 'antimatter buffer', unit: 'mol', v: 62, drift: 6, max: 100 },
      { id: 'scream', label: 'scream pressure',   unit: 'dB',  v: 18, drift: 8, max: 100 },
      { id: 'flux', label: 'temporal flux',     unit: 'Hz',  v: 47, drift: 14, max: 100 },
      { id: 'goo', label: 'primordial goo',    unit: 'L',   v: 71, drift: 5, max: 100 },
      { id: 'vibes', label: 'ambient vibes',     unit: '✨',  v: 88, drift: 4, max: 100 }
    ];
    const vitalsEl = document.getElementById('vitals');
    VITALS.forEach(v => {
      const row = document.createElement('div');
      row.className = 'vital';
      row.innerHTML =
        '<div class="vlabel">' + v.label + ' <b id="v-' + v.id + '">0' + v.unit + '</b></div>' +
        '<div class="vbar"><div class="fill" id="f-' + v.id + '" style="width:0%"></div></div>';
      vitalsEl.appendChild(row);
    });
    function tickVitals() {
      for (const v of VITALS) {
        v.v += (Math.random() - 0.5) * v.drift;
        v.v = Math.max(2, Math.min(v.max, v.v));
        const pct = (v.v / v.max) * 100;
        const fill = document.getElementById('f-' + v.id);
        const lbl  = document.getElementById('v-' + v.id);
        fill.style.width = pct.toFixed(0) + '%';
        fill.classList.toggle('hot', pct > 85);
        fill.classList.toggle('warn', pct > 65 && pct <= 85);
        lbl.textContent = v.v.toFixed(0) + v.unit;
      }
    }
    setInterval(tickVitals, 1200);
    tickVitals();

    // ============================================================
    // PROCESS TABLE — silly alien processes
    // ============================================================
    const PROC_NAMES = [
      'screamd', 'wobble_engine', 'goo.sync', 'telepathy-relay', 'antimatter.ko',
      'vibe-daemon', 'forgetd', 'dancehall', 'cosmic_gc', 'glyph_render',
      'tentacle.fs', 'mood_swing', 'void_listener', 'snack_scheduler', 'purr.service',
      'overthink', 'existential.d', 'snore-loop', 'hum_buffer', 'orbit_sync'
    ];
    const STATES = ['running', 'sleeping', 'running', 'zombie', 'screaming', 'dreaming'];
    let procs = [];
    function seedProcs() {
      procs = [];
      const pool = PROC_NAMES.slice().sort(() => Math.random() - 0.5).slice(0, 9);
      pool.forEach((name, i) => {
        procs.push({
          pid: 1000 + Math.floor(Math.random() * 8999),
          name,
          cpu: Math.random() * 60,
          state: STATES[Math.floor(Math.random() * STATES.length)]
        });
      });
    }
    const procBody = document.getElementById('proc-body');
    function renderProcs() {
      procBody.innerHTML = '';
      for (const p of procs) {
        const tr = document.createElement('tr');
        const stCls = p.state === 'zombie' ? ' zombie' : p.state === 'screaming' ? ' screaming' : '';
        tr.innerHTML =
          '<td class="pid">' + p.pid + '</td>' +
          '<td>' + p.name + '</td>' +
          '<td class="cpu">' + p.cpu.toFixed(1) + '%</td>' +
          '<td class="st' + stCls + '">' + p.state + '</td>';
        procBody.appendChild(tr);
      }
    }
    function tickProcs() {
      for (const p of procs) {
        p.cpu = Math.max(0, Math.min(99, p.cpu + (Math.random() - 0.5) * 18));
        if (Math.random() < 0.06) p.state = STATES[Math.floor(Math.random() * STATES.length)];
      }
      renderProcs();
    }
    seedProcs(); renderProcs();
    setInterval(tickProcs, 1600);

    // ============================================================
    // SYSCALLS
    // ============================================================
    const SYSCALLS = {
      scream: {
        sig: 'scream(volume=∞)',
        run() {
          klog('syscall scream() invoked — venting to /dev/void', 'err');
          const overlay = document.getElementById('scream');
          const txt = document.getElementById('scream-txt');
          let i = 0;
          overlay.classList.add('on');
          const iv = setInterval(() => {
            txt.textContent = 'A'.repeat(4 + Math.floor(Math.random() * 9)) + '!'.repeat(Math.random() < 0.5 ? 1 : 0);
            klog('AAAA' + 'A'.repeat(Math.floor(Math.random() * 20)), 'err');
            if (++i > 12) { clearInterval(iv); overlay.classList.remove('on'); klog('scream buffer flushed. throat sore.', 'warn'); }
          }, 110);
          // mark a process as screaming
          if (procs.length) { procs[Math.floor(Math.random() * procs.length)].state = 'screaming'; renderProcs(); }
        }
      },
      dance: {
        sig: 'dance(bpm=128)',
        run() {
          klog('syscall dance() — engaging wobble_engine at 128bpm', 'alien');
          document.body.classList.add('dance');
          let beat = 0;
          const colors = ['#4dff9e', '#45e0ff', '#ff5ed0', '#ffd24a'];
          const iv = setInterval(() => {
            document.documentElement.style.setProperty('--phos', colors[beat % colors.length]);
            klog(['💃', '🕺', '🪩', '✨'][beat % 4] + ' boogie tick ' + (beat + 1), 'ok');
            if (++beat > 10) {
              clearInterval(iv);
              document.body.classList.remove('dance');
              document.documentElement.style.setProperty('--phos', '#4dff9e');
              klog('dance() returned. wobble_engine cooling down.', 'info');
            }
          }, 400);
        }
      },
      forget_the_stack: {
        sig: 'forget_the_stack()',
        run() {
          klog('syscall forget_the_stack() — what is a stack? where am i?', 'alien');
          klog('unwinding... unwinding... gone.', 'warn');
          // Wipe the process table dramatically
          const snapshot = procs.slice();
          procs = [];
          renderProcs();
          // Memory drops
          const buf = VITALS.find(v => v.id === 'antimatter');
          if (buf) buf.v = 2;
          tickVitals();
          klog('stack forgotten. 0 frames remain. it is peaceful here.', 'ok');
          setTimeout(() => {
            klog('...slowly remembering how to exist...', 'info');
            seedProcs(); renderProcs();
            klog('processes respawned from muscle memory.', 'ok');
          }, 2600);
        }
      },
      summon: {
        sig: 'summon(entity)',
        run() {
          const e = ['a small moon', 'the concept of tuesdays', '47 raccoons', 'an unpaid invoice', 'your sleep paralysis demon', 'a sentient sandwich'];
          const pick = e[Math.floor(Math.random() * e.length)];
          klog('syscall summon() — materializing ' + pick + '…', 'alien');
          setTimeout(() => klog(pick + ' has joined the process group. it seems polite.', 'ok'), 800);
        }
      },
      vibe_check: {
        sig: 'vibe_check()',
        run() {
          const v = VITALS.find(x => x.id === 'vibes');
          const score = v ? v.v.toFixed(0) : '??';
          klog('syscall vibe_check() — scanning ambient frequencies…', 'info');
          const verdict = +score > 70 ? 'immaculate. proceed.' : +score > 40 ? 'acceptable. mild static.' : 'concerning. recommend a nap.';
          setTimeout(() => klog('vibes at ' + score + '✨ — ' + verdict, +score > 70 ? 'ok' : 'warn'), 600);
        }
      },
      panic: {
        sig: 'panic(reason)',
        run() {
          klog('KERNEL PANIC — not really though, just dramatic', 'err');
          document.body.classList.add('glitch');
          klog('CPU0: Oops: 0000 [#1] ALIEN', 'err');
          klog('RIP: 0x???????? in screamd()', 'err');
          setTimeout(() => {
            document.body.classList.remove('glitch');
            klog('false alarm. kernel was just being dramatic. carry on.', 'ok');
          }, 1500);
        }
      },
      snack: {
        sig: 'snack()',
        run() {
          const s = ['a moon pie', 'compressed stardust', 'leftover photons', 'a byte (literal)', 'cosmic trail mix'];
          klog('syscall snack() — fetching ' + s[Math.floor(Math.random() * s.length)] + ' from /pantry', 'info');
          setTimeout(() => klog('nom. blood-sugar restored. vitals improving.', 'ok'), 700);
          VITALS.forEach(v => { if (v.id === 'vibes' || v.id === 'goo') v.v = Math.min(v.max, v.v + 15); });
          tickVitals();
        }
      },
      reboot: {
        sig: 'reboot()',
        run() {
          klog('syscall reboot() — turning it off and on again…', 'warn');
          document.body.classList.add('glitch');
          setTimeout(() => {
            document.body.classList.remove('glitch');
            logEl.innerHTML = '';
            uptimeSec = 0;
            seedProcs(); renderProcs();
            VITALS.forEach(v => { v.v = 20 + Math.random() * 60; });
            tickVitals();
            bootSequence();
          }, 1400);
        }
      }
    };

    // Render syscall buttons
    const scEl = document.getElementById('syscalls');
    Object.keys(SYSCALLS).forEach(name => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'sc';
      b.innerHTML = name + '<br><span class="arg">' + SYSCALLS[name].sig + '</span>';
      b.addEventListener('click', () => SYSCALLS[name].run());
      scEl.appendChild(b);
    });

    // ============================================================
    // RUN ANDROID APP — the forbidden button
    // ============================================================
    document.getElementById('android-btn').addEventListener('click', runAndroid);
    function runAndroid() {
      const ov = document.getElementById('android');
      const title = document.getElementById('android-title');
      const code = document.getElementById('android-code');
      const err = document.getElementById('android-err');
      err.style.display = 'none';
      ov.classList.add('on');
      klog('user requested: run android app', 'warn');
      const steps = [
        'resolving dependencies…',
        'downloading libcompat.so (2.3 TB)…',
        'translating Java bytecode to telepathy…',
        'asking the kernel nicely…',
        'kernel said no.',
        'asking again, but louder…'
      ];
      let i = 0;
      const iv = setInterval(() => {
        code.textContent = steps[i];
        klog('android: ' + steps[i], i >= 4 ? 'err' : 'info');
        if (++i >= steps.length) {
          clearInterval(iv);
          title.textContent = 'incompatible architecture';
          code.textContent = '';
          err.style.display = 'block';
          err.textContent =
            'FATAL: cannot run android on a kernel made of vibes.\n' +
            'errno -42: EXENO (not from this dimension)\n' +
            'the dalvik VM has been escorted off the premises.\n\n' +
            '> touch screen to dismiss <';
          document.body.classList.add('glitch');
          klog('android refused to load. kernel integrity preserved. phew.', 'ok');
          // make a process a zombie
          if (procs.length) { procs[0].state = 'zombie'; renderProcs(); }
        }
      }, 700);
      // Dismiss on click
      const dismiss = () => {
        ov.classList.remove('on');
        document.body.classList.remove('glitch');
        ov.removeEventListener('pointerdown', dismiss);
        klog('android overlay dismissed. we do not speak of this again.', 'info');
      };
      setTimeout(() => ov.addEventListener('pointerdown', dismiss), steps.length * 700 + 200);
    }

    // ============================================================
    // COMMAND INPUT — faux PowerShell terminal blended with syscalls.
    // Accepts BOTH the bare syscall names (scream, dance…) AND PowerShell
    // cmdlet-style aliases (Invoke-Scream, Get-Process, Clear-Host…).
    // Verb-Noun cmdlets are normalized to lowercase + the noun mapped to
    // a syscall where it makes sense.
    // ============================================================
    const cmdEl = document.getElementById('cmd');
    // PowerShell cmdlet → action. Keys are lowercased for matching.
    const PS_ALIASES = {
      'invoke-scream':   () => SYSCALLS.scream.run(),
      'invoke-dance':    () => SYSCALLS.dance.run(),
      'start-dance':     () => SYSCALLS.dance.run(),
      'clear-stack':     () => SYSCALLS.forget_the_stack.run(),
      'remove-stack':    () => SYSCALLS.forget_the_stack.run(),
      'invoke-summon':   () => SYSCALLS.summon.run(),
      'new-entity':      () => SYSCALLS.summon.run(),
      'test-vibe':       () => SYSCALLS.vibe_check.run(),
      'get-vibe':        () => SYSCALLS.vibe_check.run(),
      'invoke-panic':    () => SYSCALLS.panic.run(),
      'get-snack':       () => SYSCALLS.snack.run(),
      'restart-computer':() => SYSCALLS.reboot.run(),
      'restart-kernel':  () => SYSCALLS.reboot.run(),
      'start-androidapp':() => runAndroid(),
      'invoke-androidapp':() => runAndroid()
    };
    function psGetProcess() {
      klog('', 'info');
      klog('Handles  NPM(K)   PID  ProcessName              State', 'ok');
      klog('-------  ------   ---  -----------              -----', 'info');
      for (const p of procs) {
        const line =
          String(Math.floor(p.cpu * 3)).padStart(7) + ' ' +
          String(Math.floor(p.cpu)).padStart(6) + '  ' +
          String(p.pid).padStart(4) + '  ' +
          p.name.padEnd(24) + ' ' + p.state;
        klog(line, p.state === 'screaming' ? 'err' : p.state === 'zombie' ? 'alien' : 'info');
      }
    }
    function psGetHelp() {
      klog('', 'info');
      klog('TOPIC: sloppy-kernel · faux-PowerShell on xenu64', 'ok');
      klog('Native syscalls : ' + Object.keys(SYSCALLS).join(', '), 'info');
      klog('Cmdlet aliases  : Invoke-Scream, Start-Dance, Clear-Stack,', 'info');
      klog('                  Invoke-Summon, Test-Vibe, Invoke-Panic,', 'info');
      klog('                  Get-Snack, Restart-Kernel, Start-AndroidApp', 'info');
      klog('Utilities       : Get-Process, Clear-Host, Get-Help, exit', 'info');
      klog('Tip: cmdlets are Verb-Noun and case-insensitive.', 'alien');
    }
    cmdEl.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const rawInput = cmdEl.value.trim();
      cmdEl.value = '';
      if (!rawInput) return;
      // Echo with the PS prompt for terminal feel
      klog('PS C:\\xenu> ' + rawInput, 'info');
      // Normalize: strip trailing (...), lowercase, collapse spaces
      const cmd = rawInput.toLowerCase().replace(/\(.*\)$/, '').replace(/\s+/g, ' ').trim();
      const verb = cmd.split(' ')[0];

      // --- PowerShell built-ins ---
      if (verb === 'get-help' || verb === 'help' || verb === '?' || verb === 'man') { psGetHelp(); return; }
      if (verb === 'get-process' || verb === 'ps' || verb === 'gps') { psGetProcess(); return; }
      if (verb === 'clear-host' || verb === 'clear' || verb === 'cls') { logEl.innerHTML = ''; return; }
      if (verb === 'get-uptime' || verb === 'uptime') { klog('Uptime: ' + upEl.textContent + ' (kernel has been awake too long)', 'ok'); return; }
      if (verb === 'exit' || verb === 'quit') { klog("there is no exit. there is only the kernel. (type Get-Help)", 'alien'); return; }
      if (verb === 'whoami') { klog('XENU\\you · member of: Administrators, Screamers, VibeCurators', 'ok'); return; }
      if (verb === 'get-vitals' || verb === 'vitals') {
        VITALS.forEach(v => klog('  ' + v.label.padEnd(20) + v.v.toFixed(0) + v.unit, 'info'));
        return;
      }

      // --- Cmdlet aliases (Verb-Noun) ---
      if (PS_ALIASES[verb]) { PS_ALIASES[verb](); return; }

      // --- Bare alien syscall names ---
      if (verb === 'android' || verb === 'run_android') { runAndroid(); return; }
      if (SYSCALLS[verb]) { SYSCALLS[verb].run(); return; }

      // --- Not found, PowerShell-flavored error ---
      klog("'" + verb + "' is not recognized as a cmdlet, syscall, or being from this", 'err');
      klog('dimension. Check the spelling, or try Get-Help. (CommandNotFoundFromAnotherTimeline)', 'err');
    });

    // ============================================================
    // BOOT SEQUENCE + AMBIENT LOG
    // ============================================================
    const AMBIENT = [
      'goo.sync: viscosity nominal',
      'telepathy-relay: received faint hello from sector 9',
      'cosmic_gc: collected 3 orphaned thoughts',
      'vibe-daemon: ambient vibes holding steady',
      'orbit_sync: drifting 0.0002° off true north star',
      'snore-loop: hum_buffer at 12% capacity',
      'purr.service: heartbeat ok',
      'void_listener: heard nothing. as expected.',
      'mood_swing: pendulum swung left',
      'snack_scheduler: next snack in T-minus a while',
      'glyph_render: redrew 1 forbidden symbol',
      'overthink: re-evaluated a decision from 2019'
    ];
    function bootSequence() {
      const boot = [
        ['sloppy-kernel v9.0.0-zëta booting on xenu64…', 'ok'],
        ['detected 1 brain, 0 spines', 'info'],
        ['mounting /dev/void … ok', 'ok'],
        ['mounting /pantry … ok', 'ok'],
        ['loading module antimatter.ko … ok', 'ok'],
        ['loading module tentacle.fs … ok', 'ok'],
        ['telepathy subsystem online', 'ok'],
        ['WARNING: this kernel is not android compatible', 'warn'],
        ['xenu-PowerShell 9.0 loaded — try Get-Help or Invoke-Scream', 'alien'],
        ['ready. type a cmdlet or click a button.', 'ok']
      ];
      let i = 0;
      const iv = setInterval(() => {
        klog(boot[i][0], boot[i][1]);
        if (++i >= boot.length) clearInterval(iv);
      }, 280);
    }
    bootSequence();
    // Ambient drip
    setInterval(() => {
      if (Math.random() < 0.7) klog(AMBIENT[Math.floor(Math.random() * AMBIENT.length)], Math.random() < 0.15 ? 'alien' : 'info');
    }, 3200);
  })();
  </script>
