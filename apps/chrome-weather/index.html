<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrome Weather</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪩">
<meta property="og:title" content="Chrome Weather">
<meta property="og:description" content="Live weather on Planet Chrome — mirror storms, LED sun, and liquid metal rain.">
<meta property="og:url" content="https://sloppy.live/chrome-weather">
<meta property="og:image" content="https://sloppy.live/chrome-weather/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Azeret+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0c;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:'Azeret Mono',monospace;
  color:#c8c8d0;
  overflow-x:hidden;
  position:relative;
}

/* Chrome reflection background */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 50% 20%,rgba(200,200,220,0.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 70%,rgba(160,180,200,0.04) 0%,transparent 40%),
    radial-gradient(ellipse at 20% 80%,rgba(180,160,200,0.03) 0%,transparent 40%);
  pointer-events:none;
}

#scene{
  width:100%;max-width:800px;
  position:relative;
  margin-top:20px;
}

canvas#planet{
  width:100%;
  aspect-ratio:16/9;
  display:block;
  border-radius:8px;
}

/* Header */
#header{
  width:100%;max-width:800px;
  padding:20px 16px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
#title{
  font-family:'Orbitron',sans-serif;
  font-weight:900;
  font-size:clamp(18px,4vw,28px);
  background:linear-gradient(135deg,#e8e8f0,#8888aa,#e8e8f0,#6666aa);
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:chromeShift 4s ease infinite;
}
@keyframes chromeShift{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
#clock{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(11px,2.5vw,15px);
  color:#666;
  font-weight:400;
}

/* Weather panels */
#panels{
  width:100%;max-width:800px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:12px 16px;
}
.panel{
  background:linear-gradient(145deg,rgba(40,40,50,0.9),rgba(20,20,28,0.95));
  border:1px solid rgba(120,120,140,0.15);
  border-radius:10px;
  padding:14px;
  position:relative;
  overflow:hidden;
}
.panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,200,220,0.3),transparent);
}
.panel-label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:2px;
  color:#555;
  margin-bottom:6px;
}
.panel-value{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(20px,4vw,28px);
  font-weight:700;
  color:#ddd;
}
.panel-unit{
  font-size:11px;
  color:#666;
  margin-left:4px;
}
.panel-sub{
  font-size:11px;
  color:#555;
  margin-top:4px;
}

/* Forecast strip */
#forecast{
  width:100%;max-width:800px;
  padding:0 16px 12px;
}
#forecast-title{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:2px;
  color:#444;
  margin-bottom:8px;
}
#forecast-strip{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding-bottom:4px;
  scrollbar-width:thin;
  scrollbar-color:#333 transparent;
}
.fc-card{
  min-width:90px;
  background:linear-gradient(145deg,rgba(35,35,45,0.9),rgba(18,18,25,0.95));
  border:1px solid rgba(100,100,120,0.12);
  border-radius:8px;
  padding:10px 8px;
  text-align:center;
  flex-shrink:0;
}
.fc-time{font-size:10px;color:#555;letter-spacing:1px}
.fc-icon{font-size:22px;margin:6px 0}
.fc-temp{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:#ccc}
.fc-cond{font-size:9px;color:#555;margin-top:3px}

/* Alerts */
#alerts{
  width:100%;max-width:800px;
  padding:0 16px 16px;
}
.alert{
  background:linear-gradient(135deg,rgba(60,20,20,0.6),rgba(30,10,10,0.8));
  border:1px solid rgba(200,60,60,0.2);
  border-radius:8px;
  padding:10px 14px;
  margin-bottom:6px;
  font-size:12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.alert-icon{font-size:16px}
.alert-text{color:#c88;line-height:1.4}

/* Backlink */
#backlink{
  padding:8px 16px 20px;
  text-align:center;
}
#backlink a{
  color:#444;
  text-decoration:none;
  font-size:11px;
  letter-spacing:1px;
}
#backlink a:hover{color:#888}

@media(max-width:500px){
  #panels{grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px}
  .panel{padding:10px}
  #forecast{padding:0 12px 10px}
}
</style>
</head>
<body>

<div id="header">
  <div id="title">CHROME WEATHER</div>
  <div id="clock"></div>
</div>

<div id="scene">
  <canvas id="planet"></canvas>
</div>

<div id="panels">
  <div class="panel">
    <div class="panel-label">Surface Temp</div>
    <div class="panel-value" id="v-temp">—</div>
    <div class="panel-sub" id="v-temp-sub"></div>
  </div>
  <div class="panel">
    <div class="panel-label">LED Sun Output</div>
    <div class="panel-value" id="v-sun">—</div>
    <div class="panel-sub" id="v-sun-sub"></div>
  </div>
  <div class="panel">
    <div class="panel-label">Reflectivity</div>
    <div class="panel-value" id="v-reflect">—</div>
    <div class="panel-sub" id="v-reflect-sub"></div>
  </div>
  <div class="panel">
    <div class="panel-label">Chrome Wind</div>
    <div class="panel-value" id="v-wind">—</div>
    <div class="panel-sub" id="v-wind-sub"></div>
  </div>
  <div class="panel">
    <div class="panel-label">Mirror Storms</div>
    <div class="panel-value" id="v-storm">—</div>
    <div class="panel-sub" id="v-storm-sub"></div>
  </div>
  <div class="panel">
    <div class="panel-label">Metal Humidity</div>
    <div class="panel-value" id="v-humid">—</div>
    <div class="panel-sub" id="v-humid-sub"></div>
  </div>
</div>

<div id="forecast">
  <div id="forecast-title">8-Cycle Forecast</div>
  <div id="forecast-strip" id="fc-strip"></div>
</div>

<div id="alerts"></div>

<div id="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const C = document.getElementById('planet');
const ctx = C.getContext('2d');
let W, H, t = 0, mouse = {x:0.5, y:0.5};

function resize(){
  const r = window.devicePixelRatio || 1;
  const rect = C.getBoundingClientRect();
  W = C.width = rect.width * r;
  H = C.height = rect.height * r;
  ctx.scale(r, r);
}
resize();
window.addEventListener('resize', resize);

// Mouse tracking for reflection shift
C.addEventListener('mousemove', e => {
  const r = C.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) / r.width;
  mouse.y = (e.clientY - r.top) / r.height;
});
C.addEventListener('touchmove', e => {
  const r = C.getBoundingClientRect();
  const touch = e.touches[0];
  mouse.x = (touch.clientX - r.left) / r.width;
  mouse.y = (touch.clientY - r.top) / r.height;
}, {passive:true});

// Weather simulation state
const weather = {
  temp: 1200,
  sunOutput: 85,
  reflectivity: 94,
  windSpeed: 340,
  windDir: 0,
  stormLevel: 0,
  humidity: 12,
  condition: 'Clear Chrome',
  sunPulse: 0,
  chromeDrift: 0,
};

const conditions = [
  {name:'Clear Chrome', icon:'🪩', stormMin:0, stormMax:0, tempMod:0, reflMod:0},
  {name:'Mirror Haze', icon:'🌫️', stormMin:0, stormMax:1, tempMod:-40, reflMod:-8},
  {name:'Liquid Metal Rain', icon:'🫧', stormMin:1, stormMax:3, tempMod:-120, reflMod:-15},
  {name:'Chrome Storm', icon:'⚡', stormMin:3, stormMax:6, tempMod:80, reflMod:-25},
  {name:'Solar Flare Bounce', icon:'☀️', stormMin:0, stormMax:2, tempMod:300, reflMod:10},
  {name:'Mercury Fog', icon:'💨', stormMin:1, stormMax:2, tempMod:-200, reflMod:-40},
  {name:'Prismatic Shower', icon:'🌈', stormMin:2, stormMax:4, tempMod:-60, reflMod:5},
  {name:'Polished Calm', icon:'✨', stormMin:0, stormMax:0, tempMod:-20, reflMod:8},
];

let currentCondition = conditions[0];
let targetCondition = conditions[0];
let conditionTimer = 0;
const CONDITION_DURATION = 600; // frames

// Particles for chrome rain / storm
const particles = [];
const MAX_PARTICLES = 150;

// Stars
const stars = [];
for(let i = 0; i < 120; i++){
  stars.push({
    x: Math.random(),
    y: Math.random() * 0.55,
    s: Math.random() * 1.5 + 0.3,
    b: Math.random(),
    speed: Math.random() * 0.001 + 0.0002
  });
}

function lerp(a,b,t){ return a + (b - a) * t; }

// LED Sun
function drawSun(cx, cy, radius){
  const pulse = Math.sin(t * 0.02) * 0.15 + 1;
  const r = radius * pulse;
  const output = weather.sunOutput / 100;

  // Outer glow layers
  for(let i = 5; i >= 0; i--){
    const gr = r * (1 + i * 0.6);
    const alpha = output * 0.04 * (6 - i) / 6;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, gr);
    grad.addColorStop(0, `rgba(255,240,200,${alpha})`);
    grad.addColorStop(0.3, `rgba(255,200,80,${alpha * 0.6})`);
    grad.addColorStop(1, 'rgba(255,160,40,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, gr, 0, Math.PI * 2);
    ctx.fill();
  }

  // LED segments (concentric rings)
  const segments = 24;
  for(let ring = 0; ring < 4; ring++){
    const rr = r * (0.3 + ring * 0.2);
    for(let i = 0; i < segments; i++){
      const a = (i / segments) * Math.PI * 2 + t * 0.005 * (ring % 2 ? 1 : -1);
      const px = cx + Math.cos(a) * rr;
      const py = cy + Math.sin(a) * rr;
      const flicker = Math.sin(t * 0.1 + i * 0.5 + ring * 2) * 0.3 + 0.7;
      const sz = (3 - ring * 0.4) * pulse;

      ctx.fillStyle = `rgba(255,${200 + ring * 15},${80 + ring * 30},${flicker * output})`;
      ctx.shadowColor = `rgba(255,200,60,${flicker * output * 0.8})`;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(px, py, sz, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.shadowBlur = 0;

  // Core
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.25);
  coreGrad.addColorStop(0, `rgba(255,255,240,${output})`);
  coreGrad.addColorStop(0.5, `rgba(255,220,120,${output * 0.7})`);
  coreGrad.addColorStop(1, `rgba(255,180,60,0)`);
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.25, 0, Math.PI * 2);
  ctx.fill();
}

// Chrome planet
function drawPlanet(cx, cy, radius){
  const refl = weather.reflectivity / 100;

  // Planet body — chrome gradient responding to mouse (reflection)
  const lightX = cx + (mouse.x - 0.5) * radius * 0.8;
  const lightY = cy + (mouse.y - 0.5) * radius * 0.4;

  const grad = ctx.createRadialGradient(lightX, lightY, 0, cx, cy, radius);
  grad.addColorStop(0, `rgba(${200 + refl * 55},${200 + refl * 55},${210 + refl * 45},1)`);
  grad.addColorStop(0.25, `rgba(${140 + refl * 40},${145 + refl * 40},${160 + refl * 40},1)`);
  grad.addColorStop(0.5, `rgba(${80 + refl * 20},${85 + refl * 20},${100 + refl * 20},1)`);
  grad.addColorStop(0.75, `rgba(${40 + refl * 10},${42 + refl * 10},${55 + refl * 10},1)`);
  grad.addColorStop(1, `rgba(20,22,30,1)`);

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.clip();

  ctx.fillStyle = grad;
  ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);

  // Chrome bands (latitude lines)
  for(let i = -5; i <= 5; i++){
    const y = cy + i * radius * 0.16;
    const drift = Math.sin(t * 0.008 + i * 0.7) * 12;
    const bandAlpha = 0.04 + refl * 0.06;
    ctx.strokeStyle = `rgba(200,210,230,${bandAlpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    const w = Math.sqrt(Math.max(0, radius * radius - (y - cy) * (y - cy)));
    ctx.moveTo(cx - w + drift, y);
    ctx.bezierCurveTo(cx - w * 0.5 + drift + 10, y - 3, cx + w * 0.5 + drift - 10, y + 3, cx + w + drift, y);
    ctx.stroke();
  }

  // Mirror storm patches
  if(weather.stormLevel > 0){
    for(let s = 0; s < weather.stormLevel; s++){
      const sa = t * 0.003 + s * 2.1;
      const sr = radius * (0.3 + s * 0.12);
      const sx = cx + Math.cos(sa) * sr * 0.7;
      const sy = cy + Math.sin(sa) * sr * 0.4;
      const stormR = radius * (0.08 + weather.stormLevel * 0.02);
      const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, stormR);
      sg.addColorStop(0, `rgba(180,200,255,${0.15 * weather.stormLevel / 6})`);
      sg.addColorStop(0.5, `rgba(120,140,200,${0.08 * weather.stormLevel / 6})`);
      sg.addColorStop(1, 'rgba(100,100,160,0)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.ellipse(sx, sy, stormR, stormR * 0.6, sa, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Specular highlight (follows mouse)
  const specGrad = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, radius * 0.35);
  specGrad.addColorStop(0, `rgba(255,255,255,${0.15 + refl * 0.2})`);
  specGrad.addColorStop(0.4, `rgba(200,210,230,${0.05 + refl * 0.05})`);
  specGrad.addColorStop(1, 'rgba(200,210,230,0)');
  ctx.fillStyle = specGrad;
  ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);

  // Environment reflection distortion (horizontal streaks)
  for(let i = 0; i < 8; i++){
    const ry = cy - radius + (i / 8) * radius * 2 + Math.sin(t * 0.01 + i) * 5;
    const rw = Math.sqrt(Math.max(0, radius * radius - (ry - cy) * (ry - cy)));
    const ra = 0.02 + Math.sin(t * 0.015 + i * 0.8) * 0.015;
    ctx.fillStyle = `rgba(${180 + i * 8},${190 + i * 6},${210 + i * 4},${ra * refl})`;
    ctx.fillRect(cx - rw, ry, rw * 2, 2);
  }

  ctx.restore();

  // Atmosphere ring
  const atmGrad = ctx.createRadialGradient(cx, cy, radius * 0.95, cx, cy, radius * 1.08);
  atmGrad.addColorStop(0, 'rgba(150,160,200,0.08)');
  atmGrad.addColorStop(0.5, 'rgba(120,130,180,0.04)');
  atmGrad.addColorStop(1, 'rgba(100,100,160,0)');
  ctx.fillStyle = atmGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, radius * 1.08, 0, Math.PI * 2);
  ctx.fill();
}

// Particles (rain, sparks)
function spawnParticle(type){
  if(particles.length >= MAX_PARTICLES) return;
  const vw = W / (window.devicePixelRatio || 1);
  const vh = H / (window.devicePixelRatio || 1);
  if(type === 'rain'){
    particles.push({
      x: Math.random() * vw,
      y: -5,
      vx: weather.windSpeed * 0.002 * (Math.random() - 0.3),
      vy: 2 + Math.random() * 3,
      life: 1,
      decay: 0.005 + Math.random() * 0.005,
      type: 'rain',
      len: 8 + Math.random() * 12,
    });
  } else if(type === 'spark'){
    const cx = vw * (0.3 + Math.random() * 0.4);
    const cy = vh * (0.2 + Math.random() * 0.4);
    particles.push({
      x: cx, y: cy,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      type: 'spark',
      size: 1 + Math.random() * 2,
    });
  }
}

function updateParticles(){
  const vw = W / (window.devicePixelRatio || 1);
  const vh = H / (window.devicePixelRatio || 1);
  for(let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if(p.life <= 0 || p.y > vh + 20 || p.x < -20 || p.x > vw + 20){
      particles.splice(i, 1);
    }
  }
}

function drawParticles(){
  for(const p of particles){
    if(p.type === 'rain'){
      ctx.strokeStyle = `rgba(180,200,230,${p.life * 0.4})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + p.vx * 2, p.y + p.len);
      ctx.stroke();
    } else if(p.type === 'spark'){
      ctx.fillStyle = `rgba(255,240,180,${p.life * 0.8})`;
      ctx.shadowColor = `rgba(255,200,100,${p.life * 0.6})`;
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

// Weather simulation tick
function simulateWeather(){
  conditionTimer++;
  if(conditionTimer >= CONDITION_DURATION){
    conditionTimer = 0;
    targetCondition = conditions[Math.floor(Math.random() * conditions.length)];
  }

  const blend = Math.min(conditionTimer / 120, 1);
  if(blend >= 1 && currentCondition !== targetCondition){
    currentCondition = targetCondition;
  }

  const baseTemp = 1200 + Math.sin(t * 0.002) * 80;
  const targetTemp = baseTemp + targetCondition.tempMod;
  weather.temp = lerp(weather.temp, targetTemp, 0.01);

  weather.sunOutput = lerp(weather.sunOutput, 75 + Math.sin(t * 0.003) * 15 + (targetCondition.name === 'Solar Flare Bounce' ? 20 : 0), 0.01);
  weather.sunPulse = Math.sin(t * 0.02) * 0.5 + 0.5;

  const baseRefl = 94 + targetCondition.reflMod;
  weather.reflectivity = lerp(weather.reflectivity, baseRefl + Math.sin(t * 0.004) * 3, 0.01);

  weather.windSpeed = lerp(weather.windSpeed, 300 + Math.sin(t * 0.001) * 120 + targetCondition.stormMax * 40, 0.005);
  weather.windDir += 0.2;

  const targetStorm = targetCondition.stormMin + Math.random() * (targetCondition.stormMax - targetCondition.stormMin);
  weather.stormLevel = lerp(weather.stormLevel, targetStorm, 0.005);

  weather.humidity = lerp(weather.humidity, 8 + targetCondition.stormMax * 5 + Math.sin(t * 0.003) * 4, 0.01);

  // Spawn particles based on condition
  if(targetCondition.name === 'Liquid Metal Rain' || targetCondition.name === 'Prismatic Shower'){
    if(Math.random() < 0.3) spawnParticle('rain');
  }
  if(targetCondition.name === 'Chrome Storm' || targetCondition.name === 'Solar Flare Bounce'){
    if(Math.random() < 0.15) spawnParticle('spark');
  }
  if(targetCondition.name === 'Mercury Fog'){
    if(Math.random() < 0.05) spawnParticle('rain');
  }
}

// Update DOM
function updatePanels(){
  document.getElementById('v-temp').innerHTML = `${Math.round(weather.temp)}<span class="panel-unit">°C</span>`;
  document.getElementById('v-temp-sub').textContent = weather.temp > 1300 ? 'Surface softening' : weather.temp < 1000 ? 'Frost crystals forming' : 'Stable chrome lattice';

  document.getElementById('v-sun').innerHTML = `${weather.sunOutput.toFixed(1)}<span class="panel-unit">%</span>`;
  document.getElementById('v-sun-sub').textContent = `Pulse: ${(weather.sunPulse * 100).toFixed(0)}% · ${weather.sunOutput > 90 ? 'Flare risk' : 'Nominal'}`;

  document.getElementById('v-reflect').innerHTML = `${weather.reflectivity.toFixed(1)}<span class="panel-unit">%</span>`;
  document.getElementById('v-reflect-sub').textContent = weather.reflectivity > 90 ? 'Mirror grade' : weather.reflectivity > 70 ? 'Brushed finish' : 'Oxidized surface';

  document.getElementById('v-wind').innerHTML = `${Math.round(weather.windSpeed)}<span class="panel-unit">km/h</span>`;
  document.getElementById('v-wind-sub').textContent = `Dir: ${Math.round(weather.windDir % 360)}° · ${weather.windSpeed > 400 ? 'Gale force' : 'Moderate'}`;

  document.getElementById('v-storm').innerHTML = weather.stormLevel < 0.5 ? 'None' : `Lv ${Math.ceil(weather.stormLevel)}`;
  document.getElementById('v-storm-sub').textContent = weather.stormLevel < 0.5 ? 'All clear' : `${Math.ceil(weather.stormLevel)} active cells`;

  document.getElementById('v-humid').innerHTML = `${weather.humidity.toFixed(1)}<span class="panel-unit">%</span>`;
  document.getElementById('v-humid-sub').textContent = weather.humidity > 20 ? 'Mercury vapor detected' : 'Dry chrome atmosphere';
}

// Forecast
function buildForecast(){
  const strip = document.getElementById('forecast-strip');
  strip.innerHTML = '';
  let tempBase = weather.temp;
  for(let i = 0; i < 8; i++){
    const cond = conditions[Math.floor(Math.random() * conditions.length)];
    tempBase += cond.tempMod * 0.3 + (Math.random() - 0.5) * 60;
    tempBase = Math.max(600, Math.min(1800, tempBase));
    const card = document.createElement('div');
    card.className = 'fc-card';
    card.innerHTML = `
      <div class="fc-time">+${(i + 1) * 3}h</div>
      <div class="fc-icon">${cond.icon}</div>
      <div class="fc-temp">${Math.round(tempBase)}°</div>
      <div class="fc-cond">${cond.name}</div>
    `;
    strip.appendChild(card);
  }
}

// Alerts
function updateAlerts(){
  const el = document.getElementById('alerts');
  const alerts = [];
  if(weather.stormLevel >= 3) alerts.push({icon:'⚡', text:'Chrome Storm Warning — mirror debris expected in low orbit sectors.'});
  if(weather.temp > 1400) alerts.push({icon:'🔥', text:'Extreme heat advisory — surface deformation possible in exposed zones.'});
  if(weather.reflectivity < 60) alerts.push({icon:'🌫️', text:'Low reflectivity alert — navigation beacons may be obscured.'});
  if(weather.windSpeed > 420) alerts.push({icon:'💨', text:'High wind advisory — unsecured chrome panels may detach.'});
  if(weather.humidity > 25) alerts.push({icon:'🫧', text:'Mercury condensation warning — liquid metal pooling likely.'});

  el.innerHTML = alerts.map(a => `<div class="alert"><span class="alert-icon">${a.icon}</span><span class="alert-text">${a.text}</span></div>`).join('');
}

// Clock
function updateClock(){
  const now = new Date();
  const chromeHour = (now.getHours() * 3 + now.getMinutes()) % 100;
  const chromMin = Math.floor((now.getSeconds() / 60) * 100);
  document.getElementById('clock').textContent = `${String(chromeHour).padStart(2,'0')}:${String(chromMin).padStart(2,'0')} CT`;
}

// Main render
function draw(){
  t++;
  const vw = W / (window.devicePixelRatio || 1);
  const vh = H / (window.devicePixelRatio || 1);

  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, vh);
  skyGrad.addColorStop(0, '#06060a');
  skyGrad.addColorStop(0.4, '#0a0a12');
  skyGrad.addColorStop(0.7, '#101018');
  skyGrad.addColorStop(1, '#18181f');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, vw, vh);

  // Stars
  for(const s of stars){
    s.b += s.speed;
    const flicker = Math.sin(s.b * 6) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(200,210,230,${flicker * 0.6})`;
    ctx.beginPath();
    ctx.arc(s.x * vw, s.y * vh, s.s, 0, Math.PI * 2);
    ctx.fill();
  }

  // Sun
  const sunX = vw * (0.78 + Math.sin(t * 0.001) * 0.05);
  const sunY = vh * 0.18;
  drawSun(sunX, sunY, Math.min(vw, vh) * 0.1);

  // Sun reflection on planet surface (light ray)
  const planetCX = vw * 0.42;
  const planetCY = vh * 0.62;
  const planetR = Math.min(vw, vh) * 0.28;
  const rayAlpha = weather.sunOutput / 100 * 0.04;
  ctx.strokeStyle = `rgba(255,220,120,${rayAlpha})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sunX, sunY + 10);
  ctx.lineTo(planetCX + planetR * 0.2, planetCY - planetR * 0.3);
  ctx.stroke();

  // Planet
  drawPlanet(planetCX, planetCY, planetR);

  // Mercury fog overlay
  if(currentCondition.name === 'Mercury Fog' || targetCondition.name === 'Mercury Fog'){
    const fogAlpha = Math.min(weather.stormLevel * 0.02 + 0.02, 0.08);
    for(let i = 0; i < 5; i++){
      const fy = vh * (0.4 + i * 0.12) + Math.sin(t * 0.005 + i) * 15;
      const fg = ctx.createLinearGradient(0, fy - 20, 0, fy + 20);
      fg.addColorStop(0, 'rgba(150,160,180,0)');
      fg.addColorStop(0.5, `rgba(150,160,180,${fogAlpha})`);
      fg.addColorStop(1, 'rgba(150,160,180,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(0, fy - 20, vw, 40);
    }
  }

  // Particles
  updateParticles();
  drawParticles();

  // Simulate
  simulateWeather();

  // Update DOM periodically
  if(t % 15 === 0) updatePanels();
  if(t % 30 === 0) updateClock();
  if(t % 120 === 0) updateAlerts();

  requestAnimationFrame(draw);
}

// Init
updatePanels();
updateClock();
buildForecast();
updateAlerts();
setInterval(buildForecast, 30000);

draw();
</script>
