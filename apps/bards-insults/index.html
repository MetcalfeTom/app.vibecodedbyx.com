<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Bard's Insult · Shakespearean slanders on parchment</title>
<link rel="icon" href="https://emojicdn.elk.sh/📜">
<meta name="description" content="Press the wax seal and receive a fresh Shakespearean insult on parchment. 125,000+ bardly barbs.">
<meta property="og:title" content="The Bard's Insult" />
<meta property="og:description" content="Aged parchment, blackletter type, and a pressable wax seal. Press to generate a fresh Shakespearean slander." />
<meta property="og:image" content="https://image.pollinations.ai/prompt/antique%20parchment%20scroll%20with%20shakespearean%20blackletter%20title%20and%20large%20red%20wax%20seal%20in%20center%20ornate%20gold%20flourish%20borders%20cinematic%20moody%20candlelight?width=1200&height=630&nologo=true&seed=15202" />
<meta property="og:url" content="https://sloppy.live/bards-insults" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment-0: #f2dfb4;
    --parchment-1: #e6cf9b;
    --parchment-2: #d7b981;
    --parchment-edge: #9c7240;
    --ink: #2a1808;
    --ink-soft: #5a3a20;
    --gold: #9e7332;
    --gold-light: #c69a52;
    --wax: #9a1a1e;
    --wax-mid: #b02c2c;
    --wax-hi: #e15656;
    --wax-lo: #48040a;
    --wax-emb: #2e0204;
    --hint: #8a6840;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    height: 100%;
    color: var(--ink);
    font-family: 'IM Fell English', 'EB Garamond', serif;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(130, 80, 30, 0.35), transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(90, 50, 20, 0.4), transparent 55%),
      radial-gradient(ellipse at 50% 50%, var(--parchment-0), var(--parchment-2) 80%);
    background-attachment: fixed;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Parchment grain overlay (paper fibers) */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    background-image:
      radial-gradient(ellipse at 12% 18%, rgba(80, 40, 10, 0.18), transparent 28%),
      radial-gradient(ellipse at 84% 62%, rgba(100, 50, 15, 0.14), transparent 22%),
      radial-gradient(ellipse at 44% 88%, rgba(70, 30, 5, 0.12), transparent 25%);
    mix-blend-mode: multiply;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      repeating-linear-gradient(7deg, rgba(120, 80, 30, 0.035) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(97deg, rgba(60, 30, 5, 0.025) 0 1px, transparent 1px 4px);
  }

  main {
    position: relative;
    z-index: 2;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 28px 80px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .flourish {
    width: 100%;
    max-width: 520px;
    color: var(--gold);
    opacity: 0.85;
    margin: 12px 0;
    flex-shrink: 0;
  }
  .flourish svg { width: 100%; height: auto; display: block; }

  h1.title {
    font-family: 'UnifrakturCook', serif;
    font-weight: 700;
    font-size: clamp(40px, 7vw, 76px);
    color: var(--ink);
    text-align: center;
    line-height: 1;
    letter-spacing: 0.01em;
    text-shadow:
      0 0 0.5px var(--ink-soft),
      1px 1px 0 rgba(0,0,0,0.08);
    position: relative;
    margin: 12px 0 6px;
  }
  h1.title .amp { color: var(--wax); font-size: 0.7em; vertical-align: 0.1em; margin: 0 0.06em; }

  .subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(15px, 2vw, 19px);
    color: var(--ink-soft);
    text-align: center;
    letter-spacing: 0.04em;
    margin-bottom: 18px;
  }
  .subtitle::before, .subtitle::after {
    content: '❦';
    color: var(--wax);
    font-style: normal;
    margin: 0 0.6em;
    font-size: 0.85em;
  }

  .parchment {
    width: 100%;
    max-width: 640px;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(230, 210, 170, 0.95), transparent 65%),
      radial-gradient(ellipse at 10% 100%, rgba(180, 140, 80, 0.25), transparent 55%),
      radial-gradient(ellipse at 50% 50%, #f6e3b6, #e6ce96 75%);
    box-shadow:
      inset 0 0 40px rgba(120, 70, 20, 0.28),
      inset 0 0 120px rgba(150, 90, 30, 0.18),
      0 6px 30px rgba(60, 30, 5, 0.35),
      0 1px 2px rgba(60, 30, 5, 0.4);
    border: 1px solid rgba(120, 70, 20, 0.5);
    border-radius: 3px;
    padding: 50px 42px 60px;
    position: relative;
    margin-top: 8px;
  }
  .parchment::before,
  .parchment::after {
    content: '';
    position: absolute;
    width: 42px; height: 42px;
    background: radial-gradient(circle at 30% 30%, rgba(120, 70, 15, 0.55), rgba(100, 50, 8, 0) 70%);
    pointer-events: none;
  }
  .parchment::before { top: -8px; left: -8px; }
  .parchment::after { bottom: -8px; right: -8px; }

  /* Stains */
  .stain {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.28;
  }
  .stain.s1 { width: 80px; height: 48px; top: 8%; right: 6%; background: radial-gradient(ellipse, rgba(90, 50, 10, 0.5), transparent 70%); transform: rotate(-18deg); }
  .stain.s2 { width: 55px; height: 35px; bottom: 22%; left: 4%; background: radial-gradient(ellipse, rgba(70, 30, 5, 0.45), transparent 72%); transform: rotate(28deg); }
  .stain.s3 { width: 18px; height: 18px; top: 32%; left: 8%; background: radial-gradient(circle, rgba(30, 15, 5, 0.7), transparent 60%); }
  .stain.s4 { width: 8px; height: 8px; top: 24%; left: 12%; background: rgba(30, 15, 5, 0.6); }

  .plate {
    font-family: 'IM Fell English SC', 'IM Fell English', serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 32px;
    opacity: 0.75;
  }
  .plate::before, .plate::after { content: '·'; margin: 0 0.6em; color: var(--wax); }

  .insult-wrap {
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 38px;
    perspective: 800px;
  }

  .insult {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(24px, 4.2vw, 38px);
    color: var(--ink);
    text-align: center;
    line-height: 1.35;
    letter-spacing: 0.005em;
    padding: 0 10px;
    text-shadow:
      0 0 0.2px var(--ink-soft),
      0.8px 0.8px 0 rgba(60, 30, 8, 0.15);
    transition: opacity 0.22s ease, transform 0.35s ease, filter 0.22s;
    will-change: opacity, transform;
  }
  .insult.fading {
    opacity: 0;
    transform: translateY(-6px) rotateX(12deg);
    filter: blur(2px);
  }
  .insult.appearing {
    animation: ink-appear 0.7s ease;
  }
  @keyframes ink-appear {
    0% { opacity: 0; transform: translateY(10px) rotateX(-14deg); filter: blur(3px); }
    50% { filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) rotateX(0deg); filter: blur(0); }
  }

  .seal-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
  }

  .seal-btn {
    width: 172px; height: 172px;
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
    position: relative;
    filter: drop-shadow(3px 6px 5px rgba(60, 0, 0, 0.45));
    transition: transform 0.15s ease, filter 0.15s;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .seal-btn:hover { filter: drop-shadow(2px 4px 10px rgba(180, 40, 40, 0.55)); }
  .seal-btn:active { transform: translateY(2px) scale(0.97); }
  .seal-btn.pressing .seal-svg { animation: seal-press 0.6s ease; }
  @keyframes seal-press {
    0% { transform: scale(1) rotate(0deg); }
    20% { transform: scale(0.94) rotate(-1.5deg); }
    40% { transform: scale(0.98) rotate(2.5deg); }
    60% { transform: scale(1.02) rotate(-1deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .seal-svg { transform-origin: center; display: block; }

  .seal-btn .cracks {
    opacity: 0;
    transition: opacity 0.1s;
  }
  .seal-btn.pressing .cracks { animation: crack-flash 0.6s ease; }
  @keyframes crack-flash {
    0% { opacity: 0; }
    12% { opacity: 0.9; }
    70% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  .seal-label {
    font-family: 'IM Fell English SC', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--wax);
    text-transform: uppercase;
    opacity: 0.85;
    animation: pulse-label 2.6s ease-in-out infinite;
  }
  @keyframes pulse-label {
    0%, 100% { opacity: 0.65; }
    50% { opacity: 1; }
  }

  .particle {
    position: absolute;
    width: 6px; height: 6px;
    background: radial-gradient(circle at 30% 30%, var(--wax-hi), var(--wax) 65%, var(--wax-lo));
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 8px rgba(180, 40, 40, 0.6);
  }

  .tools {
    margin-top: 28px;
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .tools button {
    background: transparent;
    border: 1px solid rgba(120, 70, 20, 0.55);
    color: var(--ink);
    font-family: 'IM Fell English SC', serif;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.18s;
    background-color: rgba(255, 240, 210, 0.3);
  }
  .tools button:hover {
    background-color: rgba(200, 160, 100, 0.3);
    border-color: var(--wax);
    color: var(--wax);
  }
  .tools button.active { color: var(--wax); border-color: var(--wax); }
  .tools .copied { color: var(--gold); border-color: var(--gold); }

  .history {
    margin-top: 30px;
    padding-top: 22px;
    border-top: 1px dashed rgba(120, 70, 20, 0.4);
    font-size: 14px;
    color: var(--ink-soft);
    max-height: 180px;
    overflow: auto;
  }
  .history .h-title {
    font-family: 'IM Fell English SC', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--hint);
    margin-bottom: 8px;
    text-align: center;
    opacity: 0.7;
  }
  .history ul { list-style: none; padding: 0; }
  .history li {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    padding: 6px 0;
    border-bottom: 1px dotted rgba(120, 70, 20, 0.15);
    color: var(--ink-soft);
    cursor: pointer;
    transition: color 0.15s, transform 0.15s;
  }
  .history li:hover { color: var(--ink); transform: translateX(4px); }
  .history li::before { content: '— '; color: var(--wax); opacity: 0.6; }

  .foot {
    margin-top: 18px;
    font-family: 'IM Fell English SC', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--hint);
    text-align: center;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .foot kbd {
    font-family: 'IM Fell English SC', serif;
    padding: 1px 6px;
    border: 1px solid rgba(120, 70, 20, 0.5);
    border-radius: 2px;
    margin: 0 2px;
    background: rgba(255, 240, 210, 0.4);
  }

  @media (max-width: 600px) {
    main { padding: 28px 14px 60px; }
    .parchment { padding: 34px 22px 44px; }
    .seal-btn { width: 140px; height: 140px; }
    .insult-wrap { min-height: 140px; margin-bottom: 24px; }
  }
</style>
</head>
<body>
<main>
  <!-- Top flourish -->
  <div class="flourish" aria-hidden="true">
    <svg viewBox="0 0 520 24">
      <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
        <path d="M10,12 L180,12"/>

  <h1 class="title">The Bard's<span class="amp">·</span>Insult</h1>

          <circle cx="0" cy="0" r="58" fill="none" stroke="#2a0202" stroke-width="0.6" opacity="0.5" stroke-dasharray="2 3"/>

          <text x="-1" y="11" text-anchor="middle"
                font-family="'UnifrakturCook', serif"
                font-weight="700"
                font-size="82"
                fill="#ff7a7a"
                opacity="0.28">S</text>

          <!-- Highlight shine -->
          <ellipse cx="-32" cy="-46" rx="22" ry="10" fill="#ffbaba" opacity="0.28" transform="rotate(-28 -32 -46)"/>

          <!-- Crack lines (hidden by default) -->

    <div class="tools">

  const NOUNS = [
    'apple-john','baggage','barnacle','bladder','boar-pig','bugbear','bum-bailey','canker-blossom',
    'clack-dish','clotpole','coxcomb','codpiece','death-token','dewberry','flap-dragon','flax-wench',
    'flirt-gill','foot-licker','fustilarian','giglet','gudgeon','haggard','harpy','hedge-pig',
    'horn-beast','hugger-mugger','jolthead','lewdster','lout','maggot-pie','malt-worm','mammet',
    'measle','minnow','miscreant','moldwarp','mumble-news','nut-hook','pigeon-egg','pignut',
    'puttock','pumpion','ratsbane','scut','skainsmate','strumpet','varlet','vassal','whey-face',
    'wagtail'
  ];

  const FRAMES = [
    'Thou {a1} {a2} {n}!',
    'Thou {a1} {a2} {n}!',
    'Thou {a1} {a2} {n}!',
    'Thou art a {a1} {a2} {n}!',
    'Away, thou {a1} {a2} {n}!',
    'Avaunt, you {a1} {a2} {n}!',
    'Hence, thou {a1} {a2} {n}!',
    'Begone, thou {a1} {a2} {n}!',
    'Out, thou {a1} {a2} {n}!',
    'I do defy thee, thou {a1} {a2} {n}!',
    'Methinks thee a {a1} {a2} {n}.',
    'Thou craven {a2} {n}!'
  ];

  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  let lastInsult = '';
  function generateInsult() {
    let out;
    let tries = 0;
    do {
      const frame = pick(FRAMES);
      out = frame
        .replace('{a1}', pick(ADJ1))
        .replace('{a2}', pick(ADJ2))
        .replace('{n}', pick(NOUNS));
      tries++;
    } while (out === lastInsult && tries < 6);
    lastInsult = out;
    return out;
  }

  const insultEl = document.getElementById('insult');
  const sealBtn = document.getElementById('sealBtn');
  const copyBtn = document.getElementById('copyBtn');
  const muteBtn = document.getElementById('muteBtn');
  const newBtn = document.getElementById('newBtn');
  const historyList = document.getElementById('historyList');

  const history = [];
  function addToHistory(text) {
    history.unshift(text);
    if (history.length > 6) history.pop();
    historyList.innerHTML = history.slice(1).map((t) =>
      `<li tabindex="0" data-text="${t.replace(/"/g,'&quot;')}">${t}</li>`
    ).join('');
    historyList.querySelectorAll('li').forEach(li => {
      li.addEventListener('click', () => {
        insultEl.textContent = li.dataset.text;
      });
    });
  }
  addToHistory(insultEl.textContent);

  let animating = false;
  function swapInsult() {
    if (animating) return;
    animating = true;
    insultEl.classList.add('fading');
    setTimeout(() => {
      const next = generateInsult();
      insultEl.textContent = next;
      insultEl.classList.remove('fading');
      insultEl.classList.add('appearing');
      addToHistory(next);
      setTimeout(() => {
        insultEl.classList.remove('appearing');
        animating = false;
      }, 700);
    }, 200);
  }

  // --- Wax particles ---
  function spawnParticles() {
    const rect = sealBtn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2 + window.scrollX;
    const cy = rect.top + rect.height / 2 + window.scrollY;
    const n = 14 + Math.floor(Math.random() * 6);
    for (let i = 0; i < n; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const a = Math.random() * Math.PI * 2;
      const v = 60 + Math.random() * 90;
      const dx = Math.cos(a) * v;
      const dy = Math.sin(a) * v - 30;
      const size = 4 + Math.random() * 6;
      p.style.left = (cx - size / 2) + 'px';
      p.style.top = (cy - size / 2) + 'px';
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.position = 'absolute';
      document.body.appendChild(p);
      const startTime = performance.now();
      const life = 700 + Math.random() * 400;
      function step(t) {
        const dt = (t - startTime);
        const prog = dt / life;
        if (prog >= 1) {
          p.remove();
          return;
        }
        const x = cx + dx * prog * (1 - prog * 0.3);
        const y = cy + dy * prog + 180 * prog * prog; // gravity
        p.style.left = (x - size / 2) + 'px';
        p.style.top = (y - size / 2) + 'px';
        p.style.opacity = String(1 - prog);
        p.style.transform = `rotate(${prog * 420}deg)`;
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }
  }

  // --- Audio ---
  let audioCtx = null;
  let muted = false;
  function ensureAudio() {
    if (muted) return null;
    if (!audioCtx) {
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) return null;
      audioCtx = new Ctor();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playCrack() {
    const ctx = ensureAudio();
    if (!ctx) return;
    const t = ctx.currentTime;

    // Bass thump
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(80, t);
    osc.frequency.exponentialRampToValueAtTime(38, t + 0.14);
    const og = ctx.createGain();
    og.gain.setValueAtTime(0.0001, t);
    og.gain.exponentialRampToValueAtTime(0.5, t + 0.01);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.connect(og).connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.25);

    // Noise crack
    const nlen = Math.floor(ctx.sampleRate * 0.25);
    const buf = ctx.createBuffer(1, nlen, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < nlen; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / nlen, 2.2);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.0001, t);
    ng.gain.exponentialRampToValueAtTime(0.34, t + 0.008);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(1200, t);
    bp.frequency.exponentialRampToValueAtTime(420, t + 0.2);
    bp.Q.value = 0.9;
    noise.connect(bp).connect(ng).connect(ctx.destination);
    noise.start(t); noise.stop(t + 0.3);
  }

  function playQuill() {
    const ctx = ensureAudio();
    if (!ctx) return;
    const t = ctx.currentTime;
    const nlen = Math.floor(ctx.sampleRate * 0.55);
    const buf = ctx.createBuffer(1, nlen, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < nlen; i++) {
      const env = Math.pow(1 - i / nlen, 1.3);
      d[i] = (Math.random() * 2 - 1) * env * (0.5 + 0.5 * Math.sin(i * 0.002));
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0, t);
    ng.gain.linearRampToValueAtTime(0.12, t + 0.08);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 1800;
    noise.connect(hp).connect(ng).connect(ctx.destination);
    noise.start(t); noise.stop(t + 0.6);
  }

  // --- Seal click ---
  function pressSeal() {
    if (animating) return;
    sealBtn.classList.add('pressing');
    spawnParticles();
    playCrack();
    setTimeout(() => {
      playQuill();
      swapInsult();
    }, 260);
    setTimeout(() => sealBtn.classList.remove('pressing'), 650);
  }
  sealBtn.addEventListener('click', pressSeal);

  // Copy
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(insultEl.textContent).then(() => {
      const orig = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = orig;
        copyBtn.classList.remove('copied');
      }, 1400);
    }).catch(() => {
      copyBtn.textContent = 'Oops';
      setTimeout(() => copyBtn.textContent = 'Copy', 1400);
    });
  });

  // Mute toggle
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '♪ Off' : '♪ On';
    muteBtn.classList.toggle('active', muted);
  });

  // "Again" button — same as pressing seal
  newBtn.addEventListener('click', pressSeal);

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      pressSeal();
    } else if (e.key === 'c' || e.key === 'C') {
      copyBtn.click();
    } else if (e.key === 'm' || e.key === 'M') {
      muteBtn.click();
    }
  });

  // Initial insult (fresh one on load)
  insultEl.textContent = generateInsult();
  addToHistory(insultEl.textContent);
})();
</script>
</body>
</html>
