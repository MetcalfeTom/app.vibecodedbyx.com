<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binary Gates</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🔢" type="image/png">
  <meta name="description" content="Visual binary converter with animated sliding gates">
  <meta property="og:title" content="Binary Gates">
  <meta property="og:description" content="Flip bits, watch gates slide. Convert between decimal, binary, hex, and octal.">
  <meta property="og:url" content="https://sloppy.live/binary-gates">
  <meta property="og:image" content="https://emojicdn.elk.sh/🔢?style=google&size=512.png">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;500;700&family=Bricolage+Grotesque:wght@200;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #161b24;
      --border: #252d3a;
      --text: #c8cdd5;
      --text-dim: #5a6270;
      --on-color: #3dd68c;
      --on-glow: #3dd68c44;
      --on-glow-strong: #3dd68c22;
      --off-color: #2a3040;
      --accent: #e8a832;
      --accent-dim: #e8a83244;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, #3dd68c08 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 49px, #ffffff03 50px),
        repeating-linear-gradient(90deg, transparent, transparent 49px, #ffffff03 50px);
      pointer-events: none;
      z-index: 0;
    }

    .app-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      padding: 80px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      font-size: 2.4rem;
      letter-spacing: -0.03em;
      color: #eef0f3;
    }

    h1 span {
      color: var(--on-color);
      font-weight: 200;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: -24px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Input area */
    .input-section {
      width: 100%;
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .input-section select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      padding: 0 10px;
      cursor: pointer;
      outline: none;
    }

    .input-section select:focus {
      border-color: var(--on-color);
    }

    .input-section input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #eef0f3;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-section input:focus {
      border-color: var(--on-color);
    }

    .input-section input::placeholder {
      color: var(--text-dim);
      font-weight: 300;
    }

    /* Gates */
    .gates-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .gates-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding-left: 4px;
    }

    .gates-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .gate-bit-label {
      font-size: 0.55rem;
      color: var(--text-dim);
      font-weight: 300;
    }

    .gate-track {
      width: 48px;
      height: 80px;
      background: var(--off-color);
      border-radius: 12px;
      position: relative;
      transition: background 0.35s, box-shadow 0.35s;
      border: 1px solid var(--border);
    }

    .gate.on .gate-track {
      background: #1a2e24;
      border-color: #2a5a3a;
      box-shadow: 0 0 20px var(--on-glow), 0 0 40px var(--on-glow-strong);
    }

    .gate-slider {
      position: absolute;
      left: 4px;
      right: 4px;
      height: 34px;
      border-radius: 8px;
      background: #3a4250;
      transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s, box-shadow 0.3s;
      top: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-dim);
    }

    .gate.on .gate-slider {
      top: 4px;
      background: var(--on-color);
      color: #0c0f14;
      box-shadow: 0 2px 12px #3dd68c55;
    }

    .gate-power {
      font-size: 0.6rem;
      color: var(--text-dim);
      font-weight: 300;
    }

    .gate.on .gate-power {
      color: var(--on-color);
    }

    /* Representations */
    .repr-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .repr-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .repr-card-label {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .repr-card-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: #eef0f3;
      word-break: break-all;
    }

    .repr-card.highlight {
      border-color: var(--on-color);
    }

    .repr-card.highlight .repr-card-value {
      color: var(--on-color);
    }

    /* Text mode */
    .text-output {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: none;
    }

    .text-output.visible { display: block; }

    .text-output-label {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .text-binary {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.8;
      word-break: break-all;
    }

    .text-binary .one { color: var(--on-color); font-weight: 700; }
    .text-binary .zero { color: var(--text-dim); }
    .text-binary .sep { color: var(--accent); margin: 0 2px; }

    /* Backlink */
        
    /* Responsive */
    @media (max-width: 500px) {
      h1 { font-size: 1.6rem; }
      .gate-track { width: 38px; height: 64px; }
      .gate-slider { height: 26px; font-size: 0.85rem; }
      .gate.on .gate-slider { top: 4px; }
      .gate-slider { top: 34px; }
      .gates-row { gap: 5px; }
      .repr-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .repr-card { padding: 10px 12px; }
      .repr-card-value { font-size: 0.95rem; }
      .app-wrap { padding: 70px 12px 80px; gap: 24px; }
    }
  </style>
</head>
<body>

<div class="app-wrap">
  <h1>Binary <span>Gates</span></h1>
  <p class="subtitle">flip bits. watch gates slide.</p>

  <div class="input-section">
    <select id="mode">
      <option value="decimal">DEC</option>
      <option value="text">TEXT</option>
    </select>
    <input type="text" id="input" placeholder="Enter a number (0-255)" autocomplete="off" spellcheck="false">
  </div>

  <div class="gates-container">
    <div class="gates-label">8-Bit Register</div>
    <div class="gates-row" id="gates"></div>
  </div>

  <div class="repr-grid" id="reprGrid">
    <div class="repr-card highlight">
      <div class="repr-card-label">Decimal</div>
      <div class="repr-card-value" id="decVal">0</div>
    </div>
    <div class="repr-card">
      <div class="repr-card-label">Binary</div>
      <div class="repr-card-value" id="binVal">00000000</div>
    </div>
    <div class="repr-card">
      <div class="repr-card-label">Hexadecimal</div>
      <div class="repr-card-value" id="hexVal">0x00</div>
    </div>
    <div class="repr-card">
      <div class="repr-card-label">Octal</div>
      <div class="repr-card-value" id="octVal">0o000</div>
    </div>
  </div>

  <div class="text-output" id="textOutput">
    <div class="text-output-label">Full Binary Representation</div>
    <div class="text-binary" id="textBinary"></div>
  </div>
</div>
<script>
(function() {
  var bits = [0, 0, 0, 0, 0, 0, 0, 0];
  var gatesEl = document.getElementById('gates');
  var inputEl = document.getElementById('input');
  var modeEl = document.getElementById('mode');
  var decVal = document.getElementById('decVal');
  var binVal = document.getElementById('binVal');
  var hexVal = document.getElementById('hexVal');
  var octVal = document.getElementById('octVal');
  var reprGrid = document.getElementById('reprGrid');
  var textOutput = document.getElementById('textOutput');
  var textBinary = document.getElementById('textBinary');

  function createGates() {
    gatesEl.innerHTML = '';
    for (var i = 0; i < 8; i++) {
      var gate = document.createElement('div');
      gate.className = 'gate' + (bits[i] ? ' on' : '');
      gate.dataset.index = i;

      var bitLabel = document.createElement('div');
      bitLabel.className = 'gate-bit-label';
      bitLabel.textContent = 'b' + (7 - i);

      var track = document.createElement('div');
      track.className = 'gate-track';

      var slider = document.createElement('div');
      slider.className = 'gate-slider';
      slider.textContent = bits[i] ? '1' : '0';

      track.appendChild(slider);

      var power = document.createElement('div');
      power.className = 'gate-power';
      power.textContent = Math.pow(2, 7 - i);

      gate.appendChild(bitLabel);
      gate.appendChild(track);
      gate.appendChild(power);

      gate.addEventListener('click', (function(idx) {
        return function() {
          if (modeEl.value === 'text') return;
          bits[idx] = bits[idx] ? 0 : 1;
          updateFromBits();
        };
      })(i));

      gatesEl.appendChild(gate);
    }
  }

  function updateGateElements() {
    var gates = gatesEl.querySelectorAll('.gate');
    for (var i = 0; i < gates.length; i++) {
      var g = gates[i];
      var slider = g.querySelector('.gate-slider');
      if (bits[i]) {
        g.classList.add('on');
        slider.textContent = '1';
      } else {
        g.classList.remove('on');
        slider.textContent = '0';
      }
    }
  }

  function bitsToDecimal() {
    var val = 0;
    for (var i = 0; i < 8; i++) {
      val += bits[i] * Math.pow(2, 7 - i);
    }
    return val;
  }

  function decimalToBits(n) {
    n = Math.max(0, Math.min(255, Math.floor(n)));
    for (var i = 0; i < 8; i++) {
      bits[7 - i] = (n >> i) & 1;
    }
  }

  function updateRepresentations(val) {
    decVal.textContent = val;
    binVal.textContent = val.toString(2).padStart(8, '0');
    hexVal.textContent = '0x' + val.toString(16).toUpperCase().padStart(2, '0');
    octVal.textContent = '0o' + val.toString(8).padStart(3, '0');
  }

  function updateFromBits() {
    var val = bitsToDecimal();
    updateGateElements();
    updateRepresentations(val);
    inputEl.value = val;
  }

  function updateFromInput() {
    var mode = modeEl.value;
    if (mode === 'decimal') {
      var raw = inputEl.value.trim();
      if (raw === '') {
        decimalToBits(0);
      } else {
        var n = parseInt(raw, 10);
        if (isNaN(n)) n = 0;
        n = Math.max(0, Math.min(255, n));
        decimalToBits(n);
      }
      updateGateElements();
      updateRepresentations(bitsToDecimal());
      reprGrid.style.display = '';
      textOutput.classList.remove('visible');
    } else {
      var text = inputEl.value;
      showTextBinary(text);
      if (text.length > 0) {
        var code = text.charCodeAt(text.length - 1) & 0xFF;
        decimalToBits(code);
        updateGateElements();
        updateRepresentations(code);
      } else {
        decimalToBits(0);
        updateGateElements();
        updateRepresentations(0);
      }
      reprGrid.style.display = '';
      textOutput.classList.add('visible');
    }
  }

  function showTextBinary(text) {
    var html = '';
    for (var c = 0; c < text.length; c++) {
      var code = text.charCodeAt(c) & 0xFF;
      var bin = code.toString(2).padStart(8, '0');
      for (var b = 0; b < 8; b++) {
        html += '<span class="' + (bin[b] === '1' ? 'one' : 'zero') + '">' + bin[b] + '</span>';
      }
      if (c < text.length - 1) {
        html += '<span class="sep">|</span>';
      }
    }
    textBinary.innerHTML = html;
  }

  modeEl.addEventListener('change', function() {
    if (modeEl.value === 'decimal') {
      inputEl.placeholder = 'Enter a number (0-255)';
      inputEl.value = bitsToDecimal();
      textOutput.classList.remove('visible');
    } else {
      inputEl.placeholder = 'Type text to see binary...';
      inputEl.value = '';
      decimalToBits(0);
      updateGateElements();
      updateRepresentations(0);
      textOutput.classList.add('visible');
    }
  });

  inputEl.addEventListener('input', function() {
    updateFromInput();
  });

  createGates();
  updateRepresentations(0);
})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
