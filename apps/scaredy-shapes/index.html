<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scaredy Shapes — Chase the Shy Puzzle Pieces</title>
<link rel="icon" href="https://emojicdn.elk.sh/😱">
<meta property="og:title" content="Scaredy Shapes">
<meta property="og:description" content="The shapes are afraid of you! Corner them to win.">
<meta property="og:url" content="https://sloppy.live/scaredy-shapes">
<meta property="og:image" content="https://sloppy.live/scaredy-shapes/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf5eb;--grid:#e8dfd0;--text:#3a2f28;
  --catch:#6bc95b;--accent:#ff6b8a;--blue:#5b9ee6;
  --purple:#9b7be6;--orange:#f5a623;--teal:#4ecdc4;
}
body{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--bg);font-family:'Gaegu',cursive;color:var(--text);
  overflow:hidden;cursor:default;
  background-image:
    radial-gradient(circle at 15% 85%,rgba(107,201,91,.06) 0%,transparent 40%),
    radial-gradient(circle at 85% 15%,rgba(255,107,138,.06) 0%,transparent 40%);
}
#hud{
  position:fixed;top:0;left:0;width:100%;
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;z-index:10;pointer-events:none;
}
#level-label{
  font-family:'Inconsolata',monospace;font-size:14px;
  color:var(--text);opacity:.6;letter-spacing:1px;
}
#timer{
  font-family:'Inconsolata',monospace;font-size:16px;
  color:var(--accent);font-weight:700;
}
#caught-counter{
  font-size:18px;font-weight:700;color:var(--catch);
}
canvas{
  display:block;border-radius:16px;
  box-shadow:0 4px 30px rgba(0,0,0,.08);
  touch-action:none;
}
#msg{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:42px;font-weight:700;color:var(--catch);
  text-shadow:0 2px 12px rgba(107,201,91,.3);
  pointer-events:none;z-index:20;opacity:0;
  transition:opacity .4s;
}
#start-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(250,245,235,.95);z-index:30;gap:12px;
}
#start-overlay h1{font-size:38px;color:var(--accent);margin-bottom:4px}
#start-overlay p{font-size:18px;color:var(--text);opacity:.7;max-width:320px;text-align:center;line-height:1.4}
#start-btn{
  margin-top:12px;padding:14px 36px;
  background:var(--catch);color:#fff;border:none;
  border-radius:12px;font-family:'Gaegu',cursive;
  font-size:22px;font-weight:700;cursor:pointer;
  box-shadow:0 3px 12px rgba(107,201,91,.3);
  transition:transform .15s;
}
#start-btn:hover{transform:scale(1.06)}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="hud">
  <span id="level-label">LEVEL 1</span>
  <span id="caught-counter">0 / 5</span>
  <span id="timer">0.0s</span>
</div>
<div id="msg"></div>
<div id="start-overlay">
  <h1>😱 Scaredy Shapes</h1>
  <p>The shapes are terrified of your cursor! Herd them into corners to catch them.</p>
  <button id="start-btn">START</button>
</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hudLevel = document.getElementById('level-label');
const hudCaught = document.getElementById('caught-counter');
const hudTimer = document.getElementById('timer');
const msgEl = document.getElementById('msg');
const startOverlay = document.getElementById('start-overlay');
const startBtn = document.getElementById('start-btn');

let W, H;
function resize(){
  const s = Math.min(window.innerWidth-20, window.innerHeight-80, 600);
  W = canvas.width = s;
  H = canvas.height = s;
}
resize();
window.addEventListener('resize', resize);

// ── Constants ──
const COLORS = ['#ff6b8a','#5b9ee6','#9b7be6','#f5a623','#4ecdc4','#ff9a5c','#e66ba8','#7bc96b'];
const SHAPE_TYPES = ['circle','square','triangle','diamond','pentagon','star'];
const FEAR_RADIUS = 120;
const PANIC_RADIUS = 70;
const CORNER_MARGIN = 32;
const CATCH_TIME = 0.6; // seconds stuck in corner to catch

// ── State ──
let mx = -999, my = -999;
let shapes = [];
let caught = 0;
let totalShapes = 0;
let level = 1;
let timer = 0;
let playing = false;
let levelComplete = false;
let frame = 0;
let particles = [];

// ── Audio ──
let audioCtx = null;
function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function playSound(freq, dur, type, vol){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type=type||'sine';o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.1,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function playCatch(){
  playSound(523,.15,'triangle',.12);
  setTimeout(()=>playSound(659,.15,'triangle',.1),80);
  setTimeout(()=>playSound(784,.25,'triangle',.1),160);
}
function playLevelUp(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSound(f,.2,'triangle',.1),i*100));
}

// ── Shape factory ──
function makeShape(i,total){
  const padding = 60;
  return {
    x: padding + Math.random()*(W-padding*2),
    y: padding + Math.random()*(H-padding*2),
    vx: 0, vy: 0,
    size: 16 + Math.random()*8,
    color: COLORS[i % COLORS.length],
    type: SHAPE_TYPES[i % SHAPE_TYPES.length],
    rotation: Math.random()*Math.PI*2,
    rotSpeed: (Math.random()-.5)*0.03,
    caught: false,
    cornerTime: 0,
    catchAnim: 0,
    scared: 0, // 0-1 fear intensity
    eyeDir: 0,
    shakeX: 0, shakeY: 0,
    personality: {
      speed: 1.5 + Math.random()*1.5 + level*0.3,
      nervousness: 0.5 + Math.random()*0.5,
      zigzag: Math.random()*0.3,
    },
    trail: [],
  };
}

function startLevel(lv){
  level = lv;
  totalShapes = 3 + Math.floor(lv * 1.5);
  caught = 0;
  timer = 0;
  shapes = [];
  levelComplete = false;
  particles = [];
  for(let i=0;i<totalShapes;i++) shapes.push(makeShape(i,totalShapes));
  hudLevel.textContent = 'LEVEL ' + lv;
  updateHUD();
}

function updateHUD(){
  hudCaught.textContent = caught + ' / ' + totalShapes;
  hudTimer.textContent = timer.toFixed(1) + 's';
}

// ── Drawing shapes ──
function drawShape(s){
  ctx.save();
  ctx.translate(s.x + s.shakeX, s.y + s.shakeY);
  ctx.rotate(s.rotation);

  const sz = s.size * (s.catchAnim > 0 ? 1 + Math.sin(s.catchAnim*0.3)*0.3 : 1);

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.beginPath();
  ctx.ellipse(2, 3, sz*0.8, sz*0.3, 0, 0, Math.PI*2);
  ctx.fill();

  // body
  ctx.fillStyle = s.color;
  ctx.strokeStyle = 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 1.5;

  switch(s.type){
    case 'circle':
      ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);ctx.fill();ctx.stroke();
      break;
    case 'square':
      roundRect(ctx,-sz,-sz,sz*2,sz*2,4);ctx.fill();ctx.stroke();
      break;
    case 'triangle':
      ctx.beginPath();
      ctx.moveTo(0,-sz);ctx.lineTo(sz,sz*0.8);ctx.lineTo(-sz,sz*0.8);ctx.closePath();
      ctx.fill();ctx.stroke();
      break;
    case 'diamond':
      ctx.beginPath();
      ctx.moveTo(0,-sz*1.2);ctx.lineTo(sz*0.8,0);ctx.lineTo(0,sz*1.2);ctx.lineTo(-sz*0.8,0);ctx.closePath();
      ctx.fill();ctx.stroke();
      break;
    case 'pentagon':
      ctx.beginPath();
      for(let i=0;i<5;i++){
        const a=i/5*Math.PI*2-Math.PI/2;
        i===0?ctx.moveTo(Math.cos(a)*sz,Math.sin(a)*sz):ctx.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);
      }ctx.closePath();ctx.fill();ctx.stroke();
      break;
    case 'star':
      ctx.beginPath();
      for(let i=0;i<10;i++){
        const a=i/10*Math.PI*2-Math.PI/2;
        const r=i%2===0?sz:sz*0.45;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }ctx.closePath();ctx.fill();ctx.stroke();
      break;
  }

  // eyes (unrotated)
  ctx.rotate(-s.rotation);
  const eyeSpread = sz*0.35;
  const eyeY = -sz*0.15;
  const eyeScale = Math.min(1, sz/20);
  const lookX = Math.cos(s.eyeDir)*2*eyeScale;
  const lookY = Math.sin(s.eyeDir)*1.5*eyeScale;

  // whites
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(-eyeSpread,eyeY,4*eyeScale,5*eyeScale,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(eyeSpread,eyeY,4*eyeScale,5*eyeScale,0,0,Math.PI*2);ctx.fill();

  // pupils — bigger when scared
  const pupilSize = (2 + s.scared*1.5)*eyeScale;
  ctx.fillStyle='#2a2020';
  ctx.beginPath();ctx.arc(-eyeSpread+lookX,eyeY+lookY,pupilSize,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(eyeSpread+lookX,eyeY+lookY,pupilSize,0,Math.PI*2);ctx.fill();

  // scared mouth
  if(s.scared > 0.3){
    const mouthOpen = s.scared * 3 * eyeScale;
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.beginPath();ctx.ellipse(0,eyeY+8*eyeScale,2.5*eyeScale,mouthOpen,0,0,Math.PI*2);ctx.fill();
  }

  // sweat drop when very scared
  if(s.scared > 0.7){
    const sweatY = -sz*0.5 + Math.sin(frame*0.1)*2;
    ctx.fillStyle='rgba(91,158,230,0.5)';
    ctx.beginPath();
    ctx.moveTo(eyeSpread+6*eyeScale, sweatY);
    ctx.quadraticCurveTo(eyeSpread+9*eyeScale, sweatY+6*eyeScale, eyeSpread+6*eyeScale, sweatY+8*eyeScale);
    ctx.quadraticCurveTo(eyeSpread+3*eyeScale, sweatY+6*eyeScale, eyeSpread+6*eyeScale, sweatY);
    ctx.fill();
  }

  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── Trail ──
function drawTrail(s){
  if(s.trail.length<2) return;
  ctx.strokeStyle = s.color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.15;
  ctx.beginPath();
  s.trail.forEach((p,i)=>{
    i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
  });
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ── Particles ──
function spawnCatchParticles(x,y,color){
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2;
    const spd=2+Math.random()*3;
    particles.push({
      x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      life:30+Math.random()*20,maxLife:50,
      color,size:3+Math.random()*4,
    });
  }
  // confetti sparkle
  for(let i=0;i<6;i++){
    particles.push({
      x:x+(Math.random()-.5)*20,y:y+(Math.random()-.5)*20,
      vx:(Math.random()-.5)*1.5,vy:-2-Math.random()*2,
      life:40,maxLife:40,color:'#ffd646',size:2,
    });
  }
}

function updateParticles(){
  particles = particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;
    return p.life>0;
  });
}

function drawParticles(){
  particles.forEach(p=>{
    const a = p.life/p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ── Corner detection ──
function isInCorner(x,y){
  return (x < CORNER_MARGIN || x > W-CORNER_MARGIN) &&
         (y < CORNER_MARGIN || y > H-CORNER_MARGIN);
}

function isNearWall(x,y){
  return x < CORNER_MARGIN*1.5 || x > W-CORNER_MARGIN*1.5 ||
         y < CORNER_MARGIN*1.5 || y > H-CORNER_MARGIN*1.5;
}

// ── Physics ──
function updateShape(s, dt){
  if(s.caught) return;

  const dx = s.x - mx;
  const dy = s.y - my;
  const dist = Math.sqrt(dx*dx + dy*dy);

  // fear level
  let targetFear = 0;
  if(dist < FEAR_RADIUS) targetFear = 1 - dist/FEAR_RADIUS;
  if(dist < PANIC_RADIUS) targetFear = 1;
  s.scared += (targetFear - s.scared) * 0.1;

  // eye direction — look at cursor
  s.eyeDir = Math.atan2(my - s.y, mx - s.x);

  // flee force
  if(dist < FEAR_RADIUS && dist > 1){
    const force = (1 - dist/FEAR_RADIUS) * s.personality.speed * 0.8;
    const nx = dx/dist, ny = dy/dist;
    // add zigzag based on personality
    const zig = Math.sin(frame*0.1 + s.rotation*10) * s.personality.zigzag;
    s.vx += (nx + ny*zig) * force;
    s.vy += (ny - nx*zig) * force;
  }

  // jitter when very scared
  if(s.scared > 0.8){
    s.shakeX = (Math.random()-.5) * s.scared * 3;
    s.shakeY = (Math.random()-.5) * s.scared * 3;
  } else {
    s.shakeX *= 0.8;
    s.shakeY *= 0.8;
  }

  // wall bounce (soft)
  const pad = s.size + 4;
  if(s.x < pad){ s.vx += (pad-s.x)*0.2; s.x = pad; }
  if(s.x > W-pad){ s.vx -= (s.x-(W-pad))*0.2; s.x = W-pad; }
  if(s.y < pad){ s.vy += (pad-s.y)*0.2; s.y = pad; }
  if(s.y > H-pad){ s.vy -= (s.y-(H-pad))*0.2; s.y = H-pad; }

  // friction
  s.vx *= 0.88;
  s.vy *= 0.88;

  // apply velocity
  s.x += s.vx;
  s.y += s.vy;

  // rotation
  s.rotation += s.rotSpeed + s.vx*0.02;

  // trail
  if(Math.abs(s.vx)+Math.abs(s.vy) > 0.5){
    s.trail.push({x:s.x,y:s.y});
    if(s.trail.length>15) s.trail.shift();
  } else {
    if(s.trail.length>0) s.trail.shift();
  }

  // corner catch check — must be scared AND in corner AND cursor nearby
  if(isInCorner(s.x,s.y) && s.scared > 0.3 && dist < FEAR_RADIUS*1.3){
    s.cornerTime += dt;
    if(s.cornerTime >= CATCH_TIME){
      s.caught = true;
      s.catchAnim = 30;
      caught++;
      playCatch();
      spawnCatchParticles(s.x,s.y,s.color);
      updateHUD();
    }
  } else {
    s.cornerTime = Math.max(0, s.cornerTime - dt*0.5);
  }

  // catch animation
  if(s.catchAnim > 0) s.catchAnim--;
}

// ── Background ──
function drawBG(){
  ctx.fillStyle = '#faf5eb';
  ctx.fillRect(0,0,W,H);

  // subtle grid
  ctx.strokeStyle = 'rgba(0,0,0,0.03)';
  ctx.lineWidth = 1;
  const gs = 30;
  for(let x=gs;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=gs;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // corner zones
  const cm = CORNER_MARGIN;
  ctx.fillStyle = 'rgba(107,201,91,0.06)';
  ctx.fillRect(0,0,cm,cm);
  ctx.fillRect(W-cm,0,cm,cm);
  ctx.fillRect(0,H-cm,cm,cm);
  ctx.fillRect(W-cm,H-cm,cm,cm);

  // corner catch indicators
  ctx.strokeStyle = 'rgba(107,201,91,0.2)';
  ctx.lineWidth = 2;
  ctx.setLineDash([4,4]);
  [[0,0],[W-cm,0],[0,H-cm],[W-cm,H-cm]].forEach(([x,y])=>{
    ctx.strokeRect(x+1,y+1,cm-2,cm-2);
  });
  ctx.setLineDash([]);
}

// ── Cursor ──
function drawCursor(){
  if(mx<0) return;
  // fear radius indicator
  ctx.strokeStyle = 'rgba(255,107,138,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();ctx.arc(mx,my,FEAR_RADIUS,0,Math.PI*2);ctx.stroke();

  // cursor dot
  ctx.fillStyle = 'rgba(255,107,138,0.5)';
  ctx.beginPath();ctx.arc(mx,my,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle = 'rgba(255,107,138,0.15)';
  ctx.beginPath();ctx.arc(mx,my,12,0,Math.PI*2);ctx.fill();
}

// ── Corner progress ring ──
function drawCornerProgress(s){
  if(s.caught || s.cornerTime <= 0) return;
  const pct = s.cornerTime / CATCH_TIME;
  ctx.strokeStyle = '#6bc95b';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(s.x,s.y,s.size+6,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);
  ctx.stroke();
}

// ── Message flash ──
let msgTimeout = null;
function showMsg(text,dur){
  msgEl.textContent=text;msgEl.style.opacity='1';
  clearTimeout(msgTimeout);
  msgTimeout=setTimeout(()=>{msgEl.style.opacity='0'},dur||1500);
}

// ── Input ──
function onInput(px,py){
  initAudio();
  const rect=canvas.getBoundingClientRect();
  mx = (px-rect.left)*(W/rect.width);
  my = (py-rect.top)*(H/rect.height);
}
canvas.addEventListener('mousemove',e=>onInput(e.clientX,e.clientY));
canvas.addEventListener('touchmove',e=>{e.preventDefault();onInput(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();initAudio();onInput(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
canvas.addEventListener('mouseleave',()=>{mx=-999;my=-999});

// ── Start ──
startBtn.onclick=()=>{
  initAudio();
  startOverlay.classList.add('hidden');
  playing=true;
  startLevel(1);
};

// ── Main Loop ──
let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  frame++;

  drawBG();

  if(!playing){
    // idle animation — show some shapes bouncing around
    ctx.globalAlpha=0.3;
    ctx.font='80px serif';
    ctx.fillText('😱',W/2-40,H/2+20);
    ctx.globalAlpha=1;
    requestAnimationFrame(loop);
    return;
  }

  timer += dt;
  updateHUD();

  // update shapes
  shapes.forEach(s=>updateShape(s,dt));
  updateParticles();

  // draw trails
  shapes.forEach(s=>{if(!s.caught) drawTrail(s)});
  // draw shapes
  shapes.forEach(s=>{
    if(s.caught){
      // caught: shrink away
      if(s.catchAnim>0){
        const scale=s.catchAnim/30;
        ctx.globalAlpha=scale;
        drawShape(s);
        ctx.globalAlpha=1;
      }
    } else {
      drawCornerProgress(s);
      drawShape(s);
    }
  });

  drawParticles();
  drawCursor();

  // level complete check
  if(caught >= totalShapes && !levelComplete){
    levelComplete=true;
    playLevelUp();
    showMsg(level>=10?'🏆 MASTER HERDER!':'✨ Level '+level+' Complete!',2000);
    setTimeout(()=>{
      if(level<15) startLevel(level+1);
      else {
        showMsg('🎉 You caught ALL the shapes!',4000);
      }
    },2200);
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
