<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>chronos · well</title>
<meta name="description" content="Drop massive spheres into a black void and watch time crawl for the particles nearby." />
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9A%AB" />
<meta property="og:title" content="chronos well" />
<meta property="og:description" content="Drop massive spheres into a black void and watch time crawl for the particles nearby." />
<meta property="og:url" content="https://sloppy.live/chronos-well/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/dark%20cosmic%20void%20with%20black%20hole%20bending%20a%20glowing%20neon%20grid%2C%20gravitational%20lensing%2C%20deep%20violet%20and%20cyan%20accents%2C%20astrophysics%20diagram%20aesthetic?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Cormorant+Garamond:ital,wght@1,300;1,500&family=JetBrains+Mono:wght@300;500&family=Syne+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #04030c;
    --void: #07051a;
    --grid: rgba(120, 110, 220, 0.18);
    --grid-hot: rgba(180, 220, 255, 0.55);
    --cyan: #6ec8ff;
    --magenta: #ff5ea1;
    --amber: #ffb35a;
    --plum: #b09cff;
    --ink: #efeaff;
    --dim: rgba(239, 234, 255, 0.55);
    --bone: rgba(239, 234, 255, 0.92);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(ellipse at 20% 12%, rgba(120, 60, 220, 0.22), transparent 50%),
      radial-gradient(ellipse at 82% 86%, rgba(40, 180, 220, 0.18), transparent 56%),
      radial-gradient(ellipse at 50% 50%, rgba(20, 12, 60, 0.6), #03020a 80%),
      var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    touch-action: none;
  }
  #stage {
    position: fixed; inset: 0;
    cursor: crosshair;
  }
  canvas { display: block; position: absolute; inset: 0; width: 100%; height: 100%; }
  #grid { z-index: 1; }
  #space { z-index: 2; }
  .ui {
    position: fixed;
    z-index: 5;
    pointer-events: none;
    color: var(--bone);
  }
  .ui > * { pointer-events: auto; }
  header.ui {
    top: 1.2rem; left: 1.4rem;
    max-width: 28rem;
  }
  h1 {
    font-family: 'Major Mono Display', monospace;
    font-weight: 400;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    letter-spacing: 0.18em;
    color: var(--bone);
    text-shadow: 0 0 14px rgba(180, 220, 255, 0.18);
    line-height: 1;
  }
  h1 .glyph {
    color: var(--cyan);
    text-shadow: 0 0 18px rgba(110, 200, 255, 0.45);
    margin: 0 0.18em;
  }
  .eyebrow {
    font-family: 'Syne Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.42em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: rgba(239, 234, 255, 0.7);
    margin-top: 0.65rem;
    line-height: 1.35;
    max-width: 22rem;
  }
  .hud {
    position: fixed;
    top: 1.2rem; right: 1.4rem;
    z-index: 5;
    text-align: right;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    font-family: 'Syne Mono', monospace;
    color: var(--dim);
    text-transform: uppercase;
    line-height: 1.7;
  }
  .hud .val {
    color: var(--bone);
    letter-spacing: 0.06em;
  }
  .hud .val.hot { color: var(--magenta); }
  .hud .val.cold { color: var(--cyan); }
  .toolbar {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 1.2rem;
    z-index: 6;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.6rem;
    background: rgba(10, 6, 28, 0.7);
    border: 1px solid rgba(160, 140, 255, 0.18);
    border-radius: 999px;
    backdrop-filter: blur(8px);
    box-shadow: 0 12px 38px rgba(0, 0, 0, 0.55), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    max-width: calc(100vw - 2rem);
    flex-wrap: wrap;
    justify-content: center;
  }
  .tool {
    appearance: none;
    border: 1px solid rgba(200, 200, 255, 0.18);
    background: rgba(20, 14, 44, 0.55);
    color: var(--bone);
    font-family: 'Syne Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 0.55rem 0.9rem;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s, border-color 0.12s, box-shadow 0.12s;
  }
  .tool:hover { transform: translateY(-1px); border-color: rgba(255, 255, 255, 0.32); }
  .tool.on {
    background: linear-gradient(135deg, rgba(255, 94, 161, 0.32), rgba(176, 156, 255, 0.32));
    border-color: rgba(255, 200, 220, 0.55);
    box-shadow: 0 0 22px rgba(255, 94, 161, 0.35);
  }
  .tool.ghost { background: transparent; }
  .sep { width: 1px; height: 1.4rem; background: rgba(200, 200, 255, 0.16); margin: 0 0.15rem; }
  .slider {
    display: flex; align-items: center; gap: 0.45rem;
    font-family: 'Syne Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.22em;
    color: var(--dim); text-transform: uppercase;
    padding: 0 0.4rem;
  }
  .slider input[type=range] {
    appearance: none;
    width: 6.5rem; height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    border-radius: 4px;
    outline: none;
  }
  .slider input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 12px; height: 12px;
    background: var(--bone);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(180, 220, 255, 0.6);
    cursor: pointer;
  }
  .slider input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px;
    background: var(--bone);
    border: none;
    border-radius: 50%;
    cursor: pointer;
  }
  .hint {
    position: fixed;
    left: 50%; transform: translateX(-50%);
    bottom: 4.6rem;
    z-index: 5;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: rgba(239, 234, 255, 0.5);
    text-align: center;
    transition: opacity 0.6s ease;
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 0 12px rgba(0,0,0,0.6);
  }
  .hint.fade { opacity: 0; }
  .clock-readout {
    position: fixed;
    left: 1.4rem;
    bottom: 1.2rem;
    z-index: 5;
    font-family: 'Syne Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    color: var(--dim);
    text-transform: uppercase;
    line-height: 1.7;
    pointer-events: none;
  }
  .clock-readout .row { display: flex; gap: 0.6rem; align-items: baseline; }
  .clock-readout .label { width: 6.5rem; }
  .clock-readout .v {
    color: var(--bone);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .clock-readout .v.slow { color: var(--magenta); }
  @media (max-width: 720px) {
    header.ui { left: 0.9rem; top: 0.8rem; max-width: 20rem; }
    .hud { right: 0.9rem; top: 0.8rem; font-size: 0.6rem; }
    .tagline { display: none; }
    .toolbar { gap: 0.3rem; padding: 0.45rem 0.5rem; }
    .tool { padding: 0.45rem 0.6rem; font-size: 0.6rem; letter-spacing: 0.16em; }
    .slider input[type=range] { width: 4rem; }
    .clock-readout { font-size: 0.6rem; left: 0.9rem; }
    .hint { font-size: 0.85rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    .tool { transition: none; }
  }
</style>
</head>
<body>
<div id="stage" role="application" aria-label="Gravitational time dilation playground. Click to place a massive sphere. Particles near the sphere slow down in time.">
  <canvas id="grid"></canvas>
  <canvas id="space"></canvas>
</div>

<header class="ui">
  <div class="eyebrow">spacetime · sandbox</div>
  <h1>chronos<span class="glyph">·</span>well</h1>
  <p class="tagline">Place a mass. Watch the grid bend. Watch the clocks crawl.</p>
</header>

<div class="hud" aria-live="polite">
  <div>wells <span class="val" id="wellCount">0</span></div>
  <div>motes <span class="val" id="moteCount">0</span></div>
  <div>deepest dilation <span class="val cold" id="dilation">1.000×</span></div>
</div>

<div class="clock-readout" aria-hidden="true">
  <div class="row"><span class="label">observer t</span><span class="v" id="obsT">0.00s</span></div>
  <div class="row"><span class="label">deepest τ</span><span class="v slow" id="propT">0.00s</span></div>
</div>

<div class="hint" id="hint">click to drop a mass · drag to fling · space to seed motes</div>

<div class="toolbar" role="toolbar" aria-label="playground controls">
  <button class="tool on" id="toolWell" title="Place a gravity well (1)">◉ well</button>
  <button class="tool" id="toolMote" title="Seed test motes (2)">· mote</button>
  <button class="tool" id="toolFling" title="Drag to fling a mote (3)">↗ fling</button>
  <div class="sep"></div>
  <div class="slider"><span>mass</span><input type="range" id="massRange" min="20" max="200" value="80" /></div>
  <div class="sep"></div>
  <button class="tool ghost" id="clearBtn" title="Clear (C)">⟲ clear</button>
  <button class="tool ghost" id="muteBtn" title="Mute (M)">♪ on</button>
</div>

<script>
(() => {
  'use strict';
  const grid = document.getElementById('grid');
  const space = document.getElementById('space');
  const gctx = grid.getContext('2d');
  const sctx = space.getContext('2d');

  const wellCountEl = document.getElementById('wellCount');
  const moteCountEl = document.getElementById('moteCount');
  const dilationEl = document.getElementById('dilation');
  const obsTEl = document.getElementById('obsT');
  const propTEl = document.getElementById('propT');
  const hint = document.getElementById('hint');
  const toolWell = document.getElementById('toolWell');
  const toolMote = document.getElementById('toolMote');
  const toolFling = document.getElementById('toolFling');
  const massRange = document.getElementById('massRange');
  const clearBtn = document.getElementById('clearBtn');
  const muteBtn = document.getElementById('muteBtn');

  let W = 0, H = 0, DPR = 1;
  function fit() {
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;
    for (const c of [grid, space]) {
      c.width = Math.floor(W * DPR);
      c.height = Math.floor(H * DPR);
      c.style.width = W + 'px';
      c.style.height = H + 'px';
    }
    gctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    sctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    seedStars();
    drawGrid();
  }

  // ---------- background starfield ----------
  let stars = [];
  function seedStars() {
    stars = [];
    const target = Math.floor((W * H) / 14000);
    for (let i = 0; i < target; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.1 + 0.2,
        h: 200 + Math.random() * 140,
        tw: Math.random() * Math.PI * 2,
        tws: 0.4 + Math.random() * 1.6,
      });
    }
  }

  // ---------- physics state ----------
  const wells = [];   // { x, y, mass, vx, vy, born }
  const motes = [];   // { x, y, vx, vy, hue, tau, age, alive, lastDt }
  const flashes = []; // ripple rings when a well is placed
  const trails = [];  // short particle trails for slow motes

  // tuning
  const G_BASE = 7000;          // newtonian-ish strength
  const SOFTEN = 800;           // r^2 softening to avoid singularities
  const DILATE_K = 0.35;        // local proper-time = dt / (1 + DILATE_K * potential)
  const MAX_DILATE = 0.04;      // floor on local dt (avoid full freeze)
  const MOTE_DAMP = 0.9985;
  const MOTE_HIT_DIST = 0;      // 0 means: only consume if inside event-horizon-ish radius

  // ---------- tools ----------
  let tool = 'well'; // 'well' | 'mote' | 'fling'
  function setTool(t) {
    tool = t;
    toolWell.classList.toggle('on', t === 'well');
    toolMote.classList.toggle('on', t === 'mote');
    toolFling.classList.toggle('on', t === 'fling');
    document.getElementById('stage').style.cursor =
      t === 'fling' ? 'grab' : (t === 'mote' ? 'cell' : 'crosshair');
  }
  toolWell.addEventListener('click', () => setTool('well'));
  toolMote.addEventListener('click', () => setTool('mote'));
  toolFling.addEventListener('click', () => setTool('fling'));

  clearBtn.addEventListener('click', () => {
    wells.length = 0;
    motes.length = 0;
    trails.length = 0;
    obsTime = 0;
    deepestTau = 0;
    burst(W / 2, H / 2, 1.0);
  });

  // ---------- audio ----------
  let audio = null;
  let drone = null;
  let droneGain = null;
  let dronFilter = null;
  let muted = false;
  let userGestured = false;

  function ensureAudio() {
    if (!userGestured || muted) return null;
    if (!audio) {
      try {
        audio = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { return null; }
    }
    if (audio.state === 'suspended') audio.resume();
    return audio;
  }

  function startDrone() {
    const ctx = ensureAudio();
    if (!ctx || drone) return;
    drone = ctx.createOscillator();
    drone.type = 'sine';
    drone.frequency.value = 48;
    const sub = ctx.createOscillator();
    sub.type = 'triangle';
    sub.frequency.value = 28;
    droneGain = ctx.createGain();
    droneGain.gain.value = 0;
    dronFilter = ctx.createBiquadFilter();
    dronFilter.type = 'lowpass';
    dronFilter.frequency.value = 220;
    dronFilter.Q.value = 0.6;
    drone.connect(dronFilter);
    sub.connect(dronFilter);
    dronFilter.connect(droneGain);
    droneGain.connect(ctx.destination);
    drone.start();
    sub.start();
    droneGain.gain.linearRampToValueAtTime(0.02, ctx.currentTime + 2.2);
  }

  function playPlace(mass) {
    const ctx = ensureAudio();
    if (!ctx) return;
    const t = ctx.currentTime;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    const f = ctx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.setValueAtTime(800, t);
    f.frequency.exponentialRampToValueAtTime(120, t + 0.9);
    o.type = 'sawtooth';
    const baseHz = 220 - Math.min(120, mass * 0.7);
    o.frequency.setValueAtTime(baseHz * 1.4, t);
    o.frequency.exponentialRampToValueAtTime(baseHz * 0.35, t + 0.9);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
    o.connect(f); f.connect(g); g.connect(ctx.destination);
    o.start(t);
    o.stop(t + 1.05);

    // noise thud
    const len = Math.floor(ctx.sampleRate * 0.4);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 90;
    bp.Q.value = 0.8;
    const ng = ctx.createGain();
    ng.gain.value = 0.22;
    src.connect(bp); bp.connect(ng); ng.connect(ctx.destination);
    src.start(t);
  }

  function playMote() {
    const ctx = ensureAudio();
    if (!ctx) return;
    const t = ctx.currentTime;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(880 + Math.random() * 320, t);
    o.frequency.exponentialRampToValueAtTime(420, t + 0.18);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.08, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
    o.connect(g); g.connect(ctx.destination);
    o.start(t);
    o.stop(t + 0.22);
  }

  function playSwallow() {
    const ctx = ensureAudio();
    if (!ctx) return;
    const t = ctx.currentTime;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(160, t);
    o.frequency.exponentialRampToValueAtTime(36, t + 0.5);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.12, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
    o.connect(g); g.connect(ctx.destination);
    o.start(t);
    o.stop(t + 0.6);
  }

  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '♪ off' : '♪ on';
    if (muted && droneGain) {
      droneGain.gain.cancelScheduledValues(audio.currentTime);
      droneGain.gain.linearRampToValueAtTime(0, audio.currentTime + 0.3);
    } else if (!muted && drone && audio) {
      droneGain.gain.cancelScheduledValues(audio.currentTime);
      droneGain.gain.linearRampToValueAtTime(0.02, audio.currentTime + 0.5);
    }
  });

  // ---------- helpers ----------
  function rng(a, b) { return a + Math.random() * (b - a); }
  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  function massRadius(m) {
    return 4 + Math.pow(m, 0.62) * 0.85;
  }

  function spawnWell(x, y, mass, vx = 0, vy = 0) {
    wells.push({ x, y, mass, vx, vy, born: performance.now() });
    burst(x, y, mass / 80);
  }

  function spawnMote(x, y, vx, vy) {
    motes.push({
      x, y, vx, vy,
      hue: 180 + Math.random() * 180,
      tau: 0,
      age: 0,
      alive: true,
      lastDt: 1,
    });
  }

  function seedClusterAt(x, y, n = 18, radius = 90, swirl = 60) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.sqrt(Math.random()) * radius + 14;
      const px = x + Math.cos(a) * r;
      const py = y + Math.sin(a) * r;
      // tangent velocity for orbital feel
      const tx = -Math.sin(a) * swirl;
      const ty = Math.cos(a) * swirl;
      spawnMote(px, py, tx + rng(-12, 12), ty + rng(-12, 12));
    }
  }

  function burst(x, y, scale = 1) {
    flashes.push({ x, y, r: 0, max: 180 * Math.max(0.6, scale), born: performance.now() });
  }

  // ---------- input ----------
  let dragging = false;
  let dragStart = null;
  let dragCurrent = null;

  function eventXY(e) {
    if (e.touches && e.touches[0]) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    if (e.changedTouches && e.changedTouches[0]) {
      return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function onDown(e) {
    e.preventDefault();
    userGestured = true;
    startDrone();
    const p = eventXY(e);
    dragging = true;
    dragStart = { ...p, t: performance.now() };
    dragCurrent = { ...p };
    fadeHint();
  }

  function onMove(e) {
    if (!dragging) return;
    dragCurrent = eventXY(e);
  }

  function onUp(e) {
    if (!dragging) return;
    const p = dragCurrent || eventXY(e);
    const dx = p.x - dragStart.x;
    const dy = p.y - dragStart.y;
    const distSq = dx * dx + dy * dy;
    const elapsed = performance.now() - dragStart.t;

    if (tool === 'well') {
      const m = parseFloat(massRange.value);
      // drag → initial velocity for a moving well
      const vx = elapsed > 0 ? clamp(dx / (elapsed / 1000), -240, 240) : 0;
      const vy = elapsed > 0 ? clamp(dy / (elapsed / 1000), -240, 240) : 0;
      // If barely dragged, drop a stationary well
      const usableV = distSq > 36 ? { vx: vx * 0.4, vy: vy * 0.4 } : { vx: 0, vy: 0 };
      spawnWell(dragStart.x, dragStart.y, m, usableV.vx, usableV.vy);
      playPlace(m);
    } else if (tool === 'mote') {
      seedClusterAt(dragStart.x, dragStart.y, 12, 70, 50);
      playMote();
    } else if (tool === 'fling') {
      const vx = (dx / Math.max(elapsed, 30)) * 1000;
      const vy = (dy / Math.max(elapsed, 30)) * 1000;
      spawnMote(dragStart.x, dragStart.y, clamp(vx, -380, 380), clamp(vy, -380, 380));
      playMote();
    }

    dragging = false;
    dragStart = null;
    dragCurrent = null;
  }

  window.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Digit1') setTool('well');
    else if (e.code === 'Digit2') setTool('mote');
    else if (e.code === 'Digit3') setTool('fling');
    else if (e.code === 'KeyC') clearBtn.click();
    else if (e.code === 'KeyM') muteBtn.click();
    else if (e.code === 'Space') {
      e.preventDefault();
      userGestured = true;
      startDrone();
      seedClusterAt(W / 2, H / 2, 30, Math.min(W, H) * 0.32, 80);
      fadeHint();
    }
  });

  let hintFaded = false;
  function fadeHint() {
    if (hintFaded) return;
    hintFaded = true;
    setTimeout(() => hint.classList.add('fade'), 1800);
  }

  // ---------- spacetime grid ----------
  const GRID_STEP = 38;
  function drawGrid() {
    gctx.clearRect(0, 0, W, H);
    // base soft glow
    const radial = gctx.createRadialGradient(W / 2, H / 2, 40, W / 2, H / 2, Math.max(W, H) * 0.7);
    radial.addColorStop(0, 'rgba(20, 12, 60, 0.0)');
    radial.addColorStop(1, 'rgba(2, 1, 8, 0.65)');
    gctx.fillStyle = radial;
    gctx.fillRect(0, 0, W, H);

    // stars
    const now = performance.now() / 1000;
    for (const s of stars) {
      const tw = 0.6 + 0.4 * Math.sin(now * s.tws + s.tw);
      gctx.fillStyle = `hsla(${s.h}, 70%, 80%, ${tw * 0.7})`;
      gctx.beginPath();
      gctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      gctx.fill();
    }

    // distorted grid
    // lensing: each vertex at (x,y) is pulled radially toward each well:
    //   offset = mass / (r + soft) clamped so we don't tear the grid
    gctx.lineWidth = 1;
    gctx.strokeStyle = 'rgba(140, 130, 230, 0.18)';

    const cols = Math.ceil(W / GRID_STEP) + 1;
    const rows = Math.ceil(H / GRID_STEP) + 1;

    // precompute distorted vertex grid
    const verts = new Float32Array(cols * rows * 2);
    for (let j = 0; j < rows; j++) {
      for (let i = 0; i < cols; i++) {
        let x = i * GRID_STEP;
        let y = j * GRID_STEP;
        let dxTot = 0, dyTot = 0;
        for (const w of wells) {
          const ddx = x - w.x;
          const ddy = y - w.y;
          const r = Math.sqrt(ddx * ddx + ddy * ddy);
          const eventR = massRadius(w.mass) + 6;
          const pull = (w.mass * 1.6) / (r + 90);
          const pullClamp = Math.min(pull, Math.max(0, r - eventR * 0.6));
          if (r > 0.0001) {
            dxTot -= (ddx / r) * pullClamp;
            dyTot -= (ddy / r) * pullClamp;
          }
        }
        const idx = (j * cols + i) * 2;
        verts[idx] = x + dxTot;
        verts[idx + 1] = y + dyTot;
      }
    }

    // horizontal lines
    gctx.beginPath();
    for (let j = 0; j < rows; j++) {
      for (let i = 0; i < cols; i++) {
        const idx = (j * cols + i) * 2;
        const vx = verts[idx], vy = verts[idx + 1];
        if (i === 0) gctx.moveTo(vx, vy); else gctx.lineTo(vx, vy);
      }
    }
    gctx.stroke();

    // vertical lines
    gctx.beginPath();
    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        const idx = (j * cols + i) * 2;
        const vx = verts[idx], vy = verts[idx + 1];
        if (j === 0) gctx.moveTo(vx, vy); else gctx.lineTo(vx, vy);
      }
    }
    gctx.stroke();

    // brighter accent lines near each well (radial bright rings)
    for (const w of wells) {
      const r0 = massRadius(w.mass);
      const grd = gctx.createRadialGradient(w.x, w.y, r0, w.x, w.y, r0 + 220);
      grd.addColorStop(0, 'rgba(255, 130, 200, 0.35)');
      grd.addColorStop(0.5, 'rgba(110, 200, 255, 0.08)');
      grd.addColorStop(1, 'rgba(0, 0, 0, 0)');
      gctx.fillStyle = grd;
      gctx.fillRect(0, 0, W, H);
    }
  }

  // ---------- dilation calc ----------
  // For a point (x,y) the "gravitational potential proxy" is Σ mass_i / (r_i + soft).
  // localDtFactor = clamp(1 / (1 + DILATE_K * potential), MAX_DILATE, 1)
  function dilationAt(x, y) {
    let pot = 0;
    for (const w of wells) {
      const dx = x - w.x, dy = y - w.y;
      const r2 = dx * dx + dy * dy + SOFTEN;
      const r = Math.sqrt(r2);
      pot += w.mass / r;
    }
    const f = 1 / (1 + DILATE_K * pot);
    return f < MAX_DILATE ? MAX_DILATE : f;
  }

  function gravityAt(x, y) {
    let ax = 0, ay = 0;
    for (const w of wells) {
      const dx = w.x - x, dy = w.y - y;
      const r2 = dx * dx + dy * dy + SOFTEN;
      const inv = G_BASE * w.mass / (r2 * Math.sqrt(r2));
      ax += dx * inv;
      ay += dy * inv;
    }
    return { ax, ay };
  }

  // ---------- physics step ----------
  let lastT = performance.now();
  let obsTime = 0;
  let deepestTau = 0;
  let deepestFactor = 1;

  function step(now) {
    const rawDt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    obsTime += rawDt;

    // move wells (only if they have velocity, e.g. tossed in)
    for (const w of wells) {
      w.x += w.vx * rawDt;
      w.y += w.vy * rawDt;
      // soft attraction between wells (so heavies cluster)
      let ax = 0, ay = 0;
      for (const o of wells) {
        if (o === w) continue;
        const dx = o.x - w.x, dy = o.y - w.y;
        const r2 = dx * dx + dy * dy + 4000;
        const inv = (G_BASE * 0.15 * o.mass) / (r2 * Math.sqrt(r2));
        ax += dx * inv;
        ay += dy * inv;
      }
      w.vx = (w.vx + ax * rawDt) * 0.998;
      w.vy = (w.vy + ay * rawDt) * 0.998;
      // soft confinement
      if (w.x < 30) w.vx += rawDt * 60;
      if (w.x > W - 30) w.vx -= rawDt * 60;
      if (w.y < 30) w.vy += rawDt * 60;
      if (w.y > H - 30) w.vy -= rawDt * 60;
    }

    // motes
    deepestFactor = 1;
    let deepestMoteTau = 0;
    for (let i = motes.length - 1; i >= 0; i--) {
      const m = motes[i];
      if (!m.alive) { motes.splice(i, 1); continue; }
      const localFactor = dilationAt(m.x, m.y);
      if (localFactor < deepestFactor) deepestFactor = localFactor;
      const dt = rawDt * localFactor;
      m.lastDt = localFactor;
      m.tau += dt;
      m.age += rawDt;
      if (m.tau > deepestMoteTau) deepestMoteTau = m.tau;

      const { ax, ay } = gravityAt(m.x, m.y);
      m.vx = (m.vx + ax * dt) * MOTE_DAMP;
      m.vy = (m.vy + ay * dt) * MOTE_DAMP;
      m.x += m.vx * dt;
      m.y += m.vy * dt;

      // check capture
      let captured = false;
      for (const w of wells) {
        const dx = m.x - w.x, dy = m.y - w.y;
        const r = Math.sqrt(dx * dx + dy * dy);
        const horizon = massRadius(w.mass) * 0.92;
        if (r < horizon) {
          captured = true;
          w.mass += 4; // accretion
          burst(w.x, w.y, 0.4);
          playSwallow();
          break;
        }
      }
      if (captured) {
        motes.splice(i, 1);
        continue;
      }

      // edge bleed: wrap softly
      if (m.x < -40 || m.x > W + 40 || m.y < -40 || m.y > H + 40) {
        motes.splice(i, 1);
        continue;
      }

      // trail
      if (Math.random() < 0.5) {
        trails.push({ x: m.x, y: m.y, hue: m.hue, life: 0.55, born: now, factor: localFactor });
      }
    }

    // observer-time uses real dt; deepest tau is the slowest mote we know about
    if (motes.length) deepestTau = deepestMoteTau;
    obsTEl.textContent = obsTime.toFixed(2) + 's';
    propTEl.textContent = deepestTau.toFixed(2) + 's';
    dilationEl.textContent = (1 / deepestFactor).toFixed(2) + '× slow';
    dilationEl.classList.toggle('hot', deepestFactor < 0.4);
    dilationEl.classList.toggle('cold', deepestFactor >= 0.4);

    wellCountEl.textContent = wells.length;
    moteCountEl.textContent = motes.length;

    // drone color: deeper dilation → lower filter cutoff, slight gain swell
    if (dronFilter && droneGain && audio && !muted) {
      const target = 80 + (deepestFactor) * 320;
      dronFilter.frequency.setTargetAtTime(target, audio.currentTime, 0.4);
      const gtarget = 0.018 + (1 - deepestFactor) * 0.07;
      droneGain.gain.setTargetAtTime(gtarget, audio.currentTime, 0.4);
    }
  }

  // ---------- render ----------
  function render(now) {
    drawGrid();

    sctx.clearRect(0, 0, W, H);

    // trails
    for (let i = trails.length - 1; i >= 0; i--) {
      const t = trails[i];
      const age = (now - t.born) / 1000;
      const k = age / t.life;
      if (k >= 1) { trails.splice(i, 1); continue; }
      const a = (1 - k) * 0.45;
      sctx.globalCompositeOperation = 'lighter';
      sctx.fillStyle = `hsla(${t.hue}, 90%, 70%, ${a})`;
      sctx.beginPath();
      sctx.arc(t.x, t.y, 1.2 + (1 - t.factor) * 3.4, 0, Math.PI * 2);
      sctx.fill();
    }
    sctx.globalCompositeOperation = 'source-over';

    // flashes (well drops)
    for (let i = flashes.length - 1; i >= 0; i--) {
      const f = flashes[i];
      const age = (now - f.born) / 1000;
      const dur = 1.3;
      if (age >= dur) { flashes.splice(i, 1); continue; }
      const k = age / dur;
      f.r = f.max * easeOutCubic(k);
      sctx.strokeStyle = `rgba(255, 130, 200, ${(1 - k) * 0.55})`;
      sctx.lineWidth = 1.5;
      sctx.beginPath();
      sctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      sctx.stroke();
      sctx.strokeStyle = `rgba(120, 220, 255, ${(1 - k) * 0.3})`;
      sctx.beginPath();
      sctx.arc(f.x, f.y, f.r * 0.6, 0, Math.PI * 2);
      sctx.stroke();
    }

    // motes
    for (const m of motes) {
      const f = m.lastDt;
      // slower = redder, faster = brighter cyan
      const baseHue = m.hue;
      const slow = 1 - f;
      const drawHue = baseHue - slow * 60;
      const sat = 90;
      const li = 60 + slow * 12;
      const r = 2.2 + slow * 2.4;
      sctx.shadowColor = `hsla(${drawHue}, ${sat}%, ${li}%, 0.85)`;
      sctx.shadowBlur = 14 + slow * 18;
      sctx.fillStyle = `hsla(${drawHue}, ${sat}%, ${li}%, 0.9)`;
      sctx.beginPath();
      sctx.arc(m.x, m.y, r, 0, Math.PI * 2);
      sctx.fill();
    }
    sctx.shadowBlur = 0;

    // wells
    for (const w of wells) {
      const r = massRadius(w.mass);
      // accretion disk halo
      const halo = sctx.createRadialGradient(w.x, w.y, r * 0.95, w.x, w.y, r * 6);
      halo.addColorStop(0, 'rgba(255, 200, 230, 0.55)');
      halo.addColorStop(0.45, 'rgba(160, 120, 255, 0.28)');
      halo.addColorStop(1, 'rgba(20, 8, 40, 0)');
      sctx.fillStyle = halo;
      sctx.beginPath();
      sctx.arc(w.x, w.y, r * 6, 0, Math.PI * 2);
      sctx.fill();

      // bright photon ring
      sctx.strokeStyle = 'rgba(255, 220, 250, 0.75)';
      sctx.lineWidth = 1.2;
      sctx.beginPath();
      sctx.arc(w.x, w.y, r * 1.5, 0, Math.PI * 2);
      sctx.stroke();

      // event horizon (pure black)
      sctx.fillStyle = '#000';
      sctx.beginPath();
      sctx.arc(w.x, w.y, r, 0, Math.PI * 2);
      sctx.fill();

      // subtle rim
      sctx.strokeStyle = 'rgba(170, 200, 255, 0.4)';
      sctx.lineWidth = 0.8;
      sctx.beginPath();
      sctx.arc(w.x, w.y, r + 1.5, 0, Math.PI * 2);
      sctx.stroke();
    }

    // drag preview
    if (dragging && dragStart && dragCurrent) {
      if (tool === 'well') {
        const m = parseFloat(massRange.value);
        const r = massRadius(m);
        sctx.strokeStyle = 'rgba(255, 200, 230, 0.45)';
        sctx.setLineDash([4, 4]);
        sctx.lineWidth = 1;
        sctx.beginPath();
        sctx.arc(dragStart.x, dragStart.y, r, 0, Math.PI * 2);
        sctx.stroke();
        sctx.setLineDash([]);
        // velocity arrow
        sctx.strokeStyle = 'rgba(180, 220, 255, 0.7)';
        sctx.beginPath();
        sctx.moveTo(dragStart.x, dragStart.y);
        sctx.lineTo(dragCurrent.x, dragCurrent.y);
        sctx.stroke();
      } else if (tool === 'fling') {
        sctx.strokeStyle = 'rgba(255, 180, 90, 0.7)';
        sctx.lineWidth = 1.2;
        sctx.beginPath();
        sctx.moveTo(dragStart.x, dragStart.y);
        sctx.lineTo(dragCurrent.x, dragCurrent.y);
        sctx.stroke();
        sctx.fillStyle = 'rgba(255, 180, 90, 0.9)';
        sctx.beginPath();
        sctx.arc(dragStart.x, dragStart.y, 3, 0, Math.PI * 2);
        sctx.fill();
      } else if (tool === 'mote') {
        sctx.strokeStyle = 'rgba(180, 220, 255, 0.4)';
        sctx.setLineDash([2, 5]);
        sctx.beginPath();
        sctx.arc(dragStart.x, dragStart.y, 60, 0, Math.PI * 2);
        sctx.stroke();
        sctx.setLineDash([]);
      }
    }
  }

  function easeOutCubic(k) { return 1 - Math.pow(1 - k, 3); }

  // ---------- main loop ----------
  function loop(now) {
    step(now);
    render(now);
    requestAnimationFrame(loop);
  }

  // seed an inviting opening scene
  function openingScene() {
    spawnWell(W * 0.5, H * 0.5, 90);
    setTimeout(() => {
      seedClusterAt(W * 0.5, H * 0.5, 22, Math.min(W, H) * 0.28, 90);
    }, 350);
  }

  window.addEventListener('resize', fit);
  fit();
  openingScene();
  requestAnimationFrame((t) => { lastT = t; loop(t); });
})();
</script>
</body>
</html>
