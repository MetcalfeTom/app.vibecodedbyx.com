<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hum Garden</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌸">
<meta property="og:title" content="Hum Garden">
<meta property="og:description" content="Plant glowing musical flowers with a click — each one hums a unique tone">
<meta property="og:url" content="https://sloppy.live/hum-garden">
<meta property="og:image" content="https://sloppy.live/hum-garden/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,200;0,400;1,200&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060d08}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;cursor:crosshair}
.back-link{position:fixed;top:8px;left:10px;color:rgba(140,180,140,0.25);font-size:11px;text-decoration:none;z-index:100;font-family:'Newsreader',serif;font-weight:200}
.back-link:hover{color:rgba(180,220,160,0.5)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:rgba(6,13,8,0.92);transition:opacity 1s;cursor:pointer}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h1{font-family:'Newsreader',serif;font-weight:200;font-style:italic;font-size:clamp(26px,5vw,44px);color:rgba(180,220,160,0.6);letter-spacing:2px;margin-bottom:6px}
.overlay p{font-family:'Newsreader',serif;font-weight:200;font-size:13px;color:rgba(140,180,140,0.3);margin-bottom:28px}
.overlay button{font-family:'Newsreader',serif;font-weight:200;font-style:italic;font-size:15px;color:rgba(180,220,160,0.4);background:none;border:1px solid rgba(140,180,140,0.15);padding:10px 36px;cursor:pointer;letter-spacing:2px;transition:all 0.3s}
.overlay button:hover{border-color:rgba(180,220,160,0.4);color:rgba(200,240,180,0.7)}
.hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-family:'Newsreader',serif;font-weight:200;font-size:10px;color:rgba(140,180,140,0.15);z-index:20;pointer-events:none;transition:opacity 3s}
.count{position:fixed;top:8px;right:12px;font-family:'Newsreader',serif;font-weight:200;font-size:10px;color:rgba(140,180,140,0.15);z-index:20;pointer-events:none}
</style>
</head>
<body>
<a class="back-link" href="https://sloppy.live">← sloppy.live</a>
<canvas id="cv"></canvas>
<div class="overlay" id="overlay">
  <h1>Hum Garden</h1>
  <p>click anywhere to plant glowing flowers that sing</p>
  <button onclick="startGarden()">plant your first seed</button>
</div>
<div class="hint" id="hint">click to plant — each flower hums its own note</div>
<div class="count" id="count"></div>
<script>
var C=document.getElementById('cv'),X=C.getContext('2d');
var W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

var started=false,t=0;
var flowers=[],fireflies=[],pollen=[];

// Audio
var ac=null;
function initAudio(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
}

// Pentatonic scale in multiple octaves — all notes sound good together
var SCALE=[130.81,146.83,164.81,196.00,220.00,
           261.63,293.66,329.63,392.00,440.00,
           523.25,587.33,659.26,783.99,880.00];

// Flower types
var FLOWER_TYPES=[
  {name:'bell',petals:5,petalW:0.6,petalH:1.0,style:'round'},
  {name:'star',petals:6,petalW:0.3,petalH:1.2,style:'pointed'},
  {name:'lotus',petals:8,petalW:0.5,petalH:0.8,style:'round'},
  {name:'tulip',petals:3,petalW:0.8,petalH:1.1,style:'round'},
  {name:'dahlia',petals:12,petalW:0.25,petalH:0.7,style:'pointed'},
  {name:'orchid',petals:4,petalW:0.7,petalH:1.3,style:'round'}
];

var PALETTES=[
  ['#ff90b8','#ffb0d0','#ffd0e0'], // pink
  ['#a080ff','#c0a0ff','#d8c0ff'], // purple
  ['#80d0ff','#a0e0ff','#c0f0ff'], // blue
  ['#90ffb0','#b0ffc8','#d0ffe0'], // green
  ['#ffe080','#fff0a0','#fff8c0'], // yellow
  ['#ff9060','#ffb080','#ffd0a0'], // peach
  ['#e0a0ff','#f0c0ff','#f8e0ff'], // lavender
  ['#60ffd0','#80ffe0','#a0fff0']  // mint
];

function createFlower(x,y){
  var type=FLOWER_TYPES[Math.floor(Math.random()*FLOWER_TYPES.length)];
  var pal=PALETTES[Math.floor(Math.random()*PALETTES.length)];
  var note=SCALE[Math.floor(Math.random()*SCALE.length)];
  var f={
    x:x,y:y,
    type:type,
    colors:pal,
    note:note,
    size:0,
    maxSize:16+Math.random()*18,
    stemH:0,
    maxStemH:30+Math.random()*50,
    phase:Math.random()*Math.PI*2,
    swayAmp:2+Math.random()*3,
    swaySpd:0.5+Math.random()*0.5,
    growState:0, // 0-1 grow, then alive
    hum:0, // 0=silent, 1=humming
    humTarget:0,
    pulsePhase:Math.random()*Math.PI*2,
    glowR:0,
    born:t,
    osc:null,
    gain:null
  };
  flowers.push(f);
  startHum(f);
  return f;
}

function startHum(f){
  if(!ac)return;
  var now=ac.currentTime;
  // Main tone
  f.osc=ac.createOscillator();
  f.gain=ac.createGain();
  var filter=ac.createBiquadFilter();

  f.osc.type='sine';
  f.osc.frequency.setValueAtTime(f.note,now);

  filter.type='lowpass';
  filter.frequency.setValueAtTime(800,now);
  filter.Q.setValueAtTime(2,now);

  f.gain.gain.setValueAtTime(0,now);

  f.osc.connect(filter);
  filter.connect(f.gain);
  f.gain.connect(ac.destination);
  f.osc.start(now);

  // Subtle harmonic
  var osc2=ac.createOscillator();
  var gain2=ac.createGain();
  osc2.type='sine';
  osc2.frequency.setValueAtTime(f.note*2,now);
  gain2.gain.setValueAtTime(0,now);
  osc2.connect(gain2);gain2.connect(ac.destination);
  osc2.start(now);
  f._osc2=osc2;f._gain2=gain2;

  // Third harmonic (very quiet)
  var osc3=ac.createOscillator();
  var gain3=ac.createGain();
  osc3.type='sine';
  osc3.frequency.setValueAtTime(f.note*3,now);
  gain3.gain.setValueAtTime(0,now);
  osc3.connect(gain3);gain3.connect(ac.destination);
  osc3.start(now);
  f._osc3=osc3;f._gain3=gain3;

  f.humTarget=1;
}

function updateFlowerAudio(f){
  if(!f.gain||!ac)return;
  // Smooth hum volume
  f.hum+=(f.humTarget-f.hum)*0.02;
  var vol=f.hum*0.04/(1+flowers.length*0.08); // quieter with more flowers
  var now=ac.currentTime;
  f.gain.gain.setTargetAtTime(vol,now,0.1);
  if(f._gain2)f._gain2.gain.setTargetAtTime(vol*0.15,now,0.1);
  if(f._gain3)f._gain3.gain.setTargetAtTime(vol*0.05,now,0.1);

  // Gentle vibrato
  var vib=Math.sin(t*4+f.phase)*0.5;
  f.osc.frequency.setTargetAtTime(f.note+vib,now,0.05);
}

function hexAlpha(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return'rgba('+r+','+g+','+b+','+Math.max(0,Math.min(1,a))+')';
}

function drawFlower(f){
  var age=t-f.born;
  f.growState=Math.min(1,age*0.8);
  f.size=f.maxSize*f.growState;
  f.stemH=f.maxStemH*f.growState;

  var sway=Math.sin(t*f.swaySpd+f.phase)*f.swayAmp*f.growState;
  var fx=f.x+sway;
  var fy=f.y;

  // Stem
  var stemBot=fy;
  var stemTop=fy-f.stemH;
  X.strokeStyle=hexAlpha('#3a6830',0.5+f.hum*0.2);
  X.lineWidth=2;
  X.beginPath();
  X.moveTo(fx,stemBot);
  X.quadraticCurveTo(fx+sway*0.5,stemBot-(f.stemH*0.5),fx+sway,stemTop);
  X.stroke();

  // Small leaves on stem
  if(f.stemH>20){
    var leafY=stemBot-f.stemH*0.4;
    var leafDir=Math.sin(f.phase)>0?1:-1;
    X.fillStyle=hexAlpha('#4a8840',0.3+f.hum*0.15);
    X.save();
    X.translate(fx+sway*0.3,leafY);
    X.rotate(leafDir*0.5+sway*0.02);
    X.beginPath();
    X.ellipse(leafDir*6,0,8,3,0,0,Math.PI*2);
    X.fill();
    X.restore();
  }

  // Flower head position
  var headX=fx+sway;
  var headY=stemTop;
  var sz=f.size;

  if(sz<2)return;

  // Glow
  f.pulsePhase+=0.03;
  var pulse=0.5+Math.sin(f.pulsePhase)*0.3;
  var glowAmt=(0.15+f.hum*0.2)*pulse;
  var rg=X.createRadialGradient(headX,headY,0,headX,headY,sz*2.5);
  rg.addColorStop(0,hexAlpha(f.colors[0],glowAmt));
  rg.addColorStop(1,'transparent');
  X.fillStyle=rg;
  X.fillRect(headX-sz*2.5,headY-sz*2.5,sz*5,sz*5);

  // Petals
  X.save();
  X.translate(headX,headY);
  var type=f.type;
  for(var i=0;i<type.petals;i++){
    var angle=(i/type.petals)*Math.PI*2-Math.PI/2;
    var breathe=1+Math.sin(t*1.5+f.phase+i*0.5)*0.08;
    X.save();
    X.rotate(angle+sway*0.01);
    var pw=sz*type.petalW*breathe;
    var ph=sz*type.petalH*breathe;

    if(type.style==='round'){
      X.fillStyle=hexAlpha(f.colors[0],0.35+f.hum*0.2);
      X.beginPath();
      X.ellipse(0,-ph*0.5,pw,ph*0.5,0,0,Math.PI*2);
      X.fill();
      // Inner lighter layer
      X.fillStyle=hexAlpha(f.colors[1],0.2+f.hum*0.15);
      X.beginPath();
      X.ellipse(0,-ph*0.4,pw*0.6,ph*0.35,0,0,Math.PI*2);
      X.fill();
    }else{
      // Pointed petals
      X.fillStyle=hexAlpha(f.colors[0],0.35+f.hum*0.2);
      X.beginPath();
      X.moveTo(0,0);
      X.lineTo(-pw,-(ph*0.6));
      X.lineTo(0,-ph);
      X.lineTo(pw,-(ph*0.6));
      X.closePath();
      X.fill();
    }
    X.restore();
  }

  // Center
  X.fillStyle=hexAlpha(f.colors[2],0.4+f.hum*0.3);
  X.beginPath();X.arc(0,0,sz*0.2,0,Math.PI*2);X.fill();
  // Center glow dot
  X.fillStyle=hexAlpha('#ffffff',0.2*pulse);
  X.beginPath();X.arc(0,0,sz*0.1,0,Math.PI*2);X.fill();

  X.restore();

  // Pollen emission when humming
  if(f.hum>0.5&&Math.random()<0.03){
    pollen.push({
      x:headX,y:headY,
      vx:(Math.random()-0.5)*0.8,vy:-0.3-Math.random()*0.5,
      life:60+Math.random()*80,maxLife:60+Math.random()*80,
      size:1+Math.random()*2,
      color:f.colors[Math.floor(Math.random()*f.colors.length)]
    });
  }
}

function startGarden(){
  initAudio();
  started=true;
  document.getElementById('overlay').classList.add('hidden');
}

function onClick(x,y){
  if(!started){startGarden();return;}
  // Plant in lower 70% of screen (above ground level)
  var py=Math.max(H*0.2,Math.min(H*0.92,y));
  createFlower(x,py);
  document.getElementById('count').textContent=flowers.length+' flower'+(flowers.length!==1?'s':'');
  if(flowers.length===1){
    setTimeout(function(){document.getElementById('hint').style.opacity='0';},3000);
  }
}

C.addEventListener('click',function(e){onClick(e.clientX,e.clientY);});
C.addEventListener('touchstart',function(e){
  e.preventDefault();var tc=e.touches[0];onClick(tc.clientX,tc.clientY);
},{passive:false});

// Firefly spawner
function spawnFirefly(){
  if(fireflies.length>30)return;
  fireflies.push({
    x:Math.random()*W,y:H*0.2+Math.random()*H*0.6,
    vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
    life:300+Math.random()*400,maxLife:300+Math.random()*400,
    blink:Math.random()*Math.PI*2,blinkSpd:1+Math.random()*2,
    size:1+Math.random()*1.5,
    color:['#ffe080','#c0ff80','#80ffc0','#ffc0ff'][Math.floor(Math.random()*4)]
  });
}

function draw(){
  t+=0.016;

  // Soft fade
  X.fillStyle='rgba(6,13,8,0.08)';
  X.fillRect(0,0,W,H);

  // Ground gradient (redraw occasionally to prevent full fade)
  if(Math.floor(t*60)%30===0){
    var gg=X.createLinearGradient(0,H*0.7,0,H);
    gg.addColorStop(0,'transparent');
    gg.addColorStop(0.5,'rgba(15,30,15,0.06)');
    gg.addColorStop(1,'rgba(10,25,10,0.1)');
    X.fillStyle=gg;
    X.fillRect(0,H*0.7,W,H*0.3);

    // Subtle sky
    var sg=X.createRadialGradient(W/2,H*0.1,0,W/2,H*0.1,W*0.5);
    sg.addColorStop(0,'rgba(20,30,40,0.03)');
    sg.addColorStop(1,'transparent');
    X.fillStyle=sg;
    X.fillRect(0,0,W,H*0.4);
  }

  // Grass tufts
  if(Math.floor(t*60)%120===0){
    X.fillStyle='rgba(30,60,25,0.04)';
    for(var gx=0;gx<W;gx+=20+Math.random()*30){
      var gy=H*0.85+Math.sin(gx*0.03)*H*0.05;
      for(var gi=0;gi<3;gi++){
        var ga=-(Math.PI/2)+(gi-1)*0.3+Math.sin(t+gx)*0.05;
        X.save();X.translate(gx,gy);X.rotate(ga);
        X.fillRect(-1,0,2,-8-Math.random()*6);
        X.restore();
      }
    }
  }

  // Fireflies
  if(Math.random()<0.03)spawnFirefly();
  for(var i=fireflies.length-1;i>=0;i--){
    var ff=fireflies[i];
    ff.x+=ff.vx+Math.sin(t+ff.blink)*0.15;
    ff.y+=ff.vy+Math.cos(t*0.7+ff.blink)*0.1;
    ff.life--;
    if(ff.life<=0){fireflies.splice(i,1);continue;}
    var fa=(ff.life/ff.maxLife)*(0.2+Math.max(0,Math.sin(t*ff.blinkSpd+ff.blink))*0.4);
    var fg=X.createRadialGradient(ff.x,ff.y,0,ff.x,ff.y,ff.size*5);
    fg.addColorStop(0,hexAlpha(ff.color,fa));
    fg.addColorStop(1,'transparent');
    X.fillStyle=fg;
    X.fillRect(ff.x-ff.size*5,ff.y-ff.size*5,ff.size*10,ff.size*10);
  }

  // Draw flowers (sorted by Y for depth)
  flowers.sort(function(a,b){return a.y-b.y;});
  for(var i=0;i<flowers.length;i++){
    updateFlowerAudio(flowers[i]);
    drawFlower(flowers[i]);
  }

  // Pollen particles
  for(var i=pollen.length-1;i>=0;i--){
    var p=pollen[i];
    p.x+=p.vx+Math.sin(t*2+p.x*0.01)*0.2;
    p.y+=p.vy;
    p.life--;
    if(p.life<=0){pollen.splice(i,1);continue;}
    var pa=p.life/p.maxLife;
    var pg=X.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3);
    pg.addColorStop(0,hexAlpha(p.color,pa*0.4));
    pg.addColorStop(1,'transparent');
    X.fillStyle=pg;
    X.fillRect(p.x-p.size*3,p.y-p.size*3,p.size*6,p.size*6);
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
