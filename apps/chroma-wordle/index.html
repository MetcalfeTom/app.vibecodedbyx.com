<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chroma Wordle — Multi-Color Word Puzzle</title>
<link rel="icon" href="https://emojicdn.elk.sh/🟪">
<meta property="og:title" content="Chroma Wordle">
<meta property="og:description" content="Wordle with 4 feedback colors — green, yellow, orange, and gray for deeper deduction.">
<meta property="og:url" content="https://sloppy.live/chroma-wordle">
<meta property="og:image" content="https://sloppy.live/chroma-wordle/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#101018;--card:#18161f;--border:#2a2838;
  --exact:#22c55e;--close:#eab308;
  --warm:#e8713a;--absent:#333040;--text:#e8e4f0;--muted:#6b6580;
}
body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;
  overflow-x:hidden;
}
.wrap{max-width:440px;width:100%;padding:12px}
header{text-align:center;padding:14px 0 6px}
header h1{font-size:26px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(90deg,var(--exact),var(--close),var(--warm));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
header .sub{font-size:11px;color:var(--muted);font-family:'Fira Code',monospace;margin-top:2px}
#mode-bar{
  display:flex;justify-content:center;gap:6px;margin:8px 0;
}
.mode-btn{
  padding:6px 14px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;
  font-size:12px;cursor:pointer;transition:all .15s;
}
.mode-btn.active{border-color:var(--close);color:var(--close);background:rgba(234,179,8,.08)}
#legend{
  display:flex;justify-content:center;gap:12px;margin:6px 0 12px;
  font-size:10px;font-family:'Fira Code',monospace;color:var(--muted);
}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:12px;height:12px;border-radius:3px}
#grid-wrap{display:flex;justify-content:center;margin-bottom:12px}
#grid{display:grid;gap:5px}
.cell{
  width:52px;height:52px;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--border);border-radius:6px;
  font-size:24px;font-weight:800;text-transform:uppercase;
  transition:all .3s;font-family:'Outfit',sans-serif;
}
.cell.filled{border-color:#4a4660;animation:pop .1s}
.cell.exact{background:var(--exact);border-color:var(--exact);color:#fff}
.cell.close{background:var(--close);border-color:var(--close);color:#111}
.cell.warm{background:var(--warm);border-color:var(--warm);color:#fff}
.cell.absent{background:var(--absent);border-color:var(--absent);color:#666}
@keyframes pop{50%{transform:scale(1.1)}}
@keyframes flip{
  0%{transform:rotateX(0)}
  50%{transform:rotateX(90deg)}
  100%{transform:rotateX(0)}
}
.cell.flip{animation:flip .4s ease-in-out}
#keyboard{
  display:flex;flex-direction:column;gap:5px;align-items:center;margin-bottom:10px;
}
.kb-row{display:flex;gap:4px}
.key{
  min-width:30px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:5px;border:none;background:#28253a;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .15s;padding:0 6px;
}
.key:hover{background:#3a3650}
.key:active{transform:scale(.95)}
.key.wide{min-width:52px;font-size:11px;font-family:'Fira Code',monospace}
.key.exact{background:var(--exact);color:#fff}
.key.close{background:var(--close);color:#111}
.key.warm{background:var(--warm);color:#fff}
.key.absent{background:var(--absent);color:#555}
#msg{
  text-align:center;min-height:24px;font-size:14px;
  font-family:'Fira Code',monospace;margin-bottom:8px;
}
#msg.win{color:var(--exact)}
#msg.lose{color:#cc5566}
#stats{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px;text-align:center;font-family:'Fira Code',monospace;
  font-size:12px;color:var(--muted);margin-bottom:10px;
}
#stats b{color:var(--text);font-size:14px}
.bl{text-align:center;padding:6px 0 16px;font-size:10px;opacity:.25}
.bl a{color:var(--muted);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>CHROMA WORDLE</h1>
    <div class="sub">5 colors • deeper deduction</div>
  </header>
  <div id="mode-bar">
    <button class="mode-btn active" data-len="5">5 letters</button>
    <button class="mode-btn" data-len="6">6 letters</button>
    <button class="mode-btn" data-len="7">7 letters</button>
  </div>
  <div id="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--exact)"></div>exact</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--close)"></div>in word</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--warm)"></div>±3 abc</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--absent)"></div>absent</div>
  </div>
  <div id="grid-wrap"><div id="grid"></div></div>
  <div id="msg"></div>
  <div id="keyboard"></div>
  <div id="stats">
    Played: <b id="st-played">0</b> &nbsp; Won: <b id="st-won">0</b> &nbsp; Streak: <b id="st-streak">0</b>
  </div>
</div>
<div class="bl"><a href="https://sloppy.live">sloppy.live</a></div>

const LISTS={5:WORDS_5,6:WORDS_6,7:WORDS_7};

// ── State ──
let wordLen=5,maxGuesses=6,target='',guesses=[],currentInput='',gameActive=false;
let stats={played:0,won:0,streak:0};

function loadStats(){try{const s=JSON.parse(localStorage.getItem('chroma_wordle_stats'));if(s)stats=s}catch(e){}}
function saveStats(){localStorage.setItem('chroma_wordle_stats',JSON.stringify(stats))}

// ── Color logic ──
// exact = correct position (green)
// close = in word somewhere (yellow)
// warm = wrong letter but ±3 in alphabet (orange)
// absent = not in word (gray)
function getColors(guess,answer){
  const result=new Array(wordLen).fill('absent');
  const ansArr=[...answer];
  const used=new Array(wordLen).fill(false);
  const guessArr=[...guess];

  // pass 1: exact matches
  for(let i=0;i<wordLen;i++){
    if(guessArr[i]===ansArr[i]){
      result[i]='exact';used[i]=true;guessArr[i]=null;
    }
  }
  // pass 2: close (anywhere in word → yellow)
  for(let i=0;i<wordLen;i++){
    if(guessArr[i]===null) continue;
    for(let j=0;j<wordLen;j++){
      if(!used[j]&&ansArr[j]===guessArr[i]){
        result[i]='close';used[j]=true;guessArr[i]=null;break;
      }
    }
  }
  // pass 3: warm — letter not in word but within ±3 in alphabet of correct letter at that position
  for(let i=0;i<wordLen;i++){
    if(result[i]!=='absent') continue;
    const g=guess.charCodeAt(i);
    const a=answer.charCodeAt(i);
    if(Math.abs(g-a)<=3 && g!==a){
      result[i]='warm';
    }
  }
  return result;
}

// ── Grid ──
function buildGrid(){
  const grid=document.getElementById('grid');
  grid.style.gridTemplateColumns=`repeat(${wordLen},52px)`;
  grid.innerHTML='';
  for(let r=0;r<maxGuesses;r++){
    for(let c=0;c<wordLen;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      cell.id=`c${r}-${c}`;
      grid.appendChild(cell);
    }
  }
}

function updateGrid(){
  // render submitted guesses
  guesses.forEach((g,r)=>{
    const colors=getColors(g,target);
    for(let c=0;c<wordLen;c++){
      const cell=document.getElementById(`c${r}-${c}`);
      cell.textContent=g[c];
      cell.className='cell '+colors[c];
    }
  });
  // render current input
  const row=guesses.length;
  if(row<maxGuesses){
    for(let c=0;c<wordLen;c++){
      const cell=document.getElementById(`c${row}-${c}`);
      cell.textContent=c<currentInput.length?currentInput[c]:'';
      cell.className='cell'+(c<currentInput.length?' filled':'');
    }
  }
  // clear rows below
  for(let r=guesses.length+1;r<maxGuesses;r++){
    for(let c=0;c<wordLen;c++){
      const cell=document.getElementById(`c${r}-${c}`);
      cell.textContent='';cell.className='cell';
    }
  }
}

// ── Keyboard ──
const KB_ROWS=[
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['ENTER','Z','X','C','V','B','N','M','⌫'],
];
let keyStates={}; // letter -> best color

function buildKeyboard(){
  const kb=document.getElementById('keyboard');
  kb.innerHTML='';
  KB_ROWS.forEach(row=>{
    const rowDiv=document.createElement('div');
    rowDiv.className='kb-row';
    row.forEach(k=>{
      const btn=document.createElement('button');
      btn.className='key'+(k.length>1?' wide':'');
      const ks=keyStates[k];
      if(ks) btn.classList.add(ks);
      btn.textContent=k;
      btn.addEventListener('click',()=>handleKey(k));
      rowDiv.appendChild(btn);
    });
    kb.appendChild(rowDiv);
  });
}

function updateKeyStates(guess,colors){
  const priority={exact:5,close:4,warm:2,absent:1};
  for(let i=0;i<guess.length;i++){
    const l=guess[i].toUpperCase();
    const cur=keyStates[l];
    if(!cur||(priority[colors[i]]||0)>(priority[cur]||0)){
      keyStates[l]=colors[i];
    }
  }
  buildKeyboard();
}

// ── Input ──
function handleKey(k){
  if(!gameActive) return;
  if(k==='ENTER'){submitGuess();return}
  if(k==='⌫'){currentInput=currentInput.slice(0,-1);updateGrid();return}
  if(currentInput.length<wordLen&&k.length===1){
    currentInput+=k.toLowerCase();updateGrid();
  }
}

document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  if(e.key==='Enter') handleKey('ENTER');
  else if(e.key==='Backspace') handleKey('⌫');
  else if(/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

// ── Submit ──
function submitGuess(){
  const msg=document.getElementById('msg');
  if(currentInput.length!==wordLen){
    msg.textContent='Not enough letters';msg.className='';return;
  }
  const list=LISTS[wordLen];
  if(!list.includes(currentInput)){
    msg.textContent='Not in word list';msg.className='';
    // shake current row
    return;
  }

  const colors=getColors(currentInput,target);
  guesses.push(currentInput);
  updateKeyStates(currentInput,colors);
  currentInput='';
  updateGrid();

  if(colors.every(c=>c==='exact')){
    msg.textContent='🎉 Brilliant! Found in '+guesses.length+'/'+maxGuesses;
    msg.className='win';
    gameActive=false;
    stats.played++;stats.won++;stats.streak++;
    saveStats();renderStats();
    return;
  }
  if(guesses.length>=maxGuesses){
    msg.textContent='The word was: '+target.toUpperCase();
    msg.className='lose';
    gameActive=false;
    stats.played++;stats.streak=0;
    saveStats();renderStats();
    return;
  }
  msg.textContent='';msg.className='';
}

// ── Mode switching ──
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    wordLen=parseInt(btn.dataset.len);
    maxGuesses=wordLen+1;
    newGame();
  });
});

// ── Game ──
function newGame(){
  const list=LISTS[wordLen];
  target=list[Math.floor(Math.random()*list.length)];
  guesses=[];currentInput='';gameActive=true;keyStates={};
  document.getElementById('msg').textContent='';
  document.getElementById('msg').className='';
  buildGrid();updateGrid();buildKeyboard();renderStats();
}

function renderStats(){
  loadStats();
  document.getElementById('st-played').textContent=stats.played;
  document.getElementById('st-won').textContent=stats.won;
  document.getElementById('st-streak').textContent=stats.streak;
}

newGame();
</script>
