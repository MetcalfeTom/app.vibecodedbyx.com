<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Celery Smash</title>
<meta name="description" content="Crunchy little click game. Smash falling celery before it hits the floor.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A5%AC">
<meta property="og:title" content="Celery Smash">
<meta property="og:description" content="Falling celery. Crunchy clicks. Don't let them hit the floor.">
<meta property="og:url" content="https://sloppy.live/celery-smash">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cartoon%20celery%20stalk%20falling%2C%20green%20leaves%2C%20wooden%20kitchen%20counter%2C%20chunky%20comic%20style%2C%20bright%20color?width=1200&height=630&seed=909&nologo=true">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Lilita+One&family=Fraunces:ital,wght@0,600;1,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf3df;
    --paper-2: #f3e9c8;
    --ink: #1f2a17;
    --leaf: #4d8b1c;
    --stalk-dark: #2c4a10;
    --stalk-mid: #6fa330;
    --stalk-light: #a8d168;
    --pop: #f47c2c;
    --hot: #d4382e;
    --shade: #d6cba4;
    --dim: #7d7a64;
  }
  * { box-sizing: border-box; }
  html { font-size: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 18% 0%, rgba(244,124,44,0.16), transparent 55%),
      radial-gradient(ellipse at 82% 100%, rgba(77,139,28,0.12), transparent 55%),
      linear-gradient(180deg, var(--paper), var(--paper-2));
    color: var(--ink);
    font-family: 'Space Mono', ui-monospace, monospace;
    padding: 1rem 0.85rem 1.5rem;
    overscroll-behavior: none;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      repeating-linear-gradient(13deg, rgba(31,42,23,0.04) 0 1px, transparent 1px 7px),
      repeating-linear-gradient(103deg, rgba(31,42,23,0.03) 0 1px, transparent 1px 11px);
    mix-blend-mode: multiply;
  }
  main {
    position: relative;
    z-index: 2;
    max-width: 56rem;
    margin: 0 auto;
    display: grid;
    gap: 1rem;
  }
  header.head {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
    padding: 0.1rem 0.2rem 0.6rem;
    border-bottom: 2px dashed rgba(77,139,28,0.4);
  }
  .stamp {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--leaf);
    padding: 0.25rem 0.5rem;
    border: 1px solid rgba(77,139,28,0.4);
    border-radius: 0.2rem;
    background: rgba(77,139,28,0.06);
  }
  h1 {
    font-family: 'Bungee', sans-serif;
    font-weight: 400;
    font-size: clamp(2.2rem, 6.2vw, 4rem);
    line-height: 0.95;
    margin: 0;
    letter-spacing: 0.01em;
    color: var(--ink);
    text-shadow:
      -2px 2px 0 var(--stalk-light),
      -4px 4px 0 var(--leaf),
      -6px 6px 0 var(--stalk-dark);
  }
  h1 .smash {
    color: var(--hot);
    -webkit-text-stroke: 1px var(--ink);
  }
  .tagline {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: clamp(0.95rem, 2vw, 1.15rem);
    color: var(--dim);
    margin-left: auto;
    margin-right: 0.4rem;
  }
  .tagline em { color: var(--pop); font-style: italic; }

  .stage-wrap {
    position: relative;
    background: linear-gradient(180deg, #d7e9b0, #aed176 75%, #84a84e);
    border: 2px solid var(--stalk-dark);
    border-radius: 0.8rem;
    overflow: hidden;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.18),
      0 8px 0 0 var(--stalk-dark),
      0 24px 40px rgba(31,42,23,0.18);
    touch-action: none;
  }
  canvas#stage {
    display: block;
    width: 100%;
    height: 72vh;
    min-height: 22rem;
    max-height: 40rem;
    cursor: pointer;
  }
  .hud {
    position: absolute;
    top: 0.6rem;
    left: 0.7rem;
    right: 0.7rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    font-family: 'Space Mono', monospace;
    z-index: 3;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .hud-cell {
    background: rgba(31,42,23,0.78);
    color: var(--paper);
    border: 1.5px solid var(--stalk-light);
    padding: 0.3rem 0.65rem;
    border-radius: 0.4rem;
    display: flex;
    gap: 0.45rem;
    align-items: center;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    box-shadow: 0 2px 0 var(--stalk-dark);
  }
  .hud-cell strong {
    color: var(--stalk-light);
    font-family: 'Lilita One', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.04em;
  }
  .hud-cell.score strong { color: #ffe16a; }
  .hud-cell.lives strong { color: #ffb1a6; }
  .lives-pip {
    display: inline-block;
    width: 0.75rem;
    height: 0.75rem;
    margin-right: 0.2rem;
    border-radius: 50%;
    background: var(--hot);
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.3);
  }
  .lives-pip.spent {
    background: transparent;
    border: 1.5px solid rgba(255,177,166,0.5);
    box-shadow: none;
  }
  .combo {
    position: absolute;
    top: 3.4rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Lilita One', sans-serif;
    font-size: 1.8rem;
    color: var(--hot);
    letter-spacing: 0.06em;
    text-shadow: -2px 2px 0 var(--paper), -4px 4px 0 var(--ink);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease;
    z-index: 3;
  }
  .combo.show { opacity: 1; }

  .panel {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.5rem;
    padding: 0.85rem;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.5), rgba(255,255,255,0.2));
    border: 1px solid rgba(77,139,28,0.3);
    border-radius: 0.6rem;
  }
  @media (min-width: 36rem) {
    .panel { grid-template-columns: 1fr 1fr 1fr; }
  }
  .btn {
    font-family: 'Lilita One', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.16em;
    padding: 0.7rem 0.8rem;
    border-radius: 0.5rem;
    border: 2px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    text-transform: uppercase;
    cursor: pointer;
    min-height: 2.75rem;
    transition: all 0.12s ease;
    box-shadow: 0 4px 0 var(--ink);
  }
  .btn:hover { background: var(--stalk-light); }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--ink); }
  .btn:focus-visible { outline: 3px solid var(--pop); outline-offset: 3px; }
  .btn.primary {
    background: var(--hot);
    color: var(--paper);
    border-color: var(--ink);
    box-shadow: 0 4px 0 var(--ink);
  }
  .btn.primary:hover { background: var(--pop); }
  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0.7rem;
    background: rgba(31,42,23,0.06);
    border: 1px solid rgba(77,139,28,0.25);
    border-radius: 0.4rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    min-height: 2.5rem;
    cursor: pointer;
  }
  .toggle-row input { display: none; }
  .toggle-row .pill {
    width: 2rem;
    height: 1rem;
    border-radius: 1rem;
    background: var(--shade);
    border: 1px solid var(--stalk-dark);
    position: relative;
    flex-shrink: 0;
  }
  .toggle-row .pill::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 1px;
    width: 0.75rem;
    height: 0.75rem;
    border-radius: 50%;
    background: var(--ink);
    transition: all 0.2s ease;
  }
  .toggle-row input:checked + .pill { background: var(--stalk-light); }
  .toggle-row input:checked + .pill::after { left: 1rem; background: var(--leaf); }

  .floor-mark {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 0.25rem;
    background: repeating-linear-gradient(135deg, var(--hot) 0 8px, var(--ink) 8px 16px);
    pointer-events: none;
    z-index: 2;
    opacity: 0.6;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(31,42,23,0.78);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .overlay[aria-hidden="false"] {
    opacity: 1;
    pointer-events: auto;
  }
  .overlay-card {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 0.7rem;
    padding: 1.6rem 1.6rem;
    max-width: 26rem;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 0 var(--ink);
  }
  .overlay-card h2 {
    font-family: 'Bungee', sans-serif;
    font-weight: 400;
    margin: 0 0 0.5rem;
    font-size: clamp(1.8rem, 4.5vw, 2.4rem);
    color: var(--ink);
    text-shadow: -2px 2px 0 var(--stalk-light);
  }
  .overlay-card p {
    color: var(--dim);
    font-family: 'Fraunces', serif;
    font-style: italic;
    margin: 0 0 1.2rem;
    line-height: 1.5;
  }
  .overlay-card .big-num {
    font-family: 'Lilita One', sans-serif;
    font-size: 3.6rem;
    color: var(--hot);
    margin: 0.4rem 0 0.8rem;
    line-height: 1;
    text-shadow: -3px 3px 0 var(--stalk-light);
  }
  .stat-line {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink);
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
    display: flex;
    justify-content: space-around;
  }
  .stat-line strong {
    font-family: 'Lilita One', sans-serif;
    color: var(--leaf);
  }
  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0,0,0,0);
    border: 0;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>
<main>
  <header class="head">
    <span class="stamp">FARM TO FACE · LOT №12</span>
    <h1>celery<span class="smash">·smash</span></h1>
    <p class="tagline">tap the stalks. <em>save the floor.</em></p>
  </header>

  <div class="stage-wrap">
    <div class="hud">
      <div class="hud-cell score" aria-label="Score"><span>Score</span><strong id="scoreOut" aria-live="polite">0</strong></div>
      <div class="hud-cell" aria-label="Level"><span>Lv</span><strong id="levelOut">1</strong></div>
      <div class="hud-cell lives" aria-label="Lives"><span>Lives</span><strong id="livesOut"></strong></div>
    </div>
    <div class="combo" id="combo" aria-live="polite"></div>
    <canvas id="stage" role="application" aria-label="Celery smash playfield. Tap or click falling celery to smash it before it reaches the floor."></canvas>
    <div class="floor-mark" aria-hidden="true"></div>

    <div class="overlay" id="introOverlay" aria-hidden="false" role="dialog" aria-modal="true" aria-labelledby="introTitle">
      <div class="overlay-card">
        <h2 id="introTitle">smash 'em</h2>
        <p>Celery is falling. Tap each stalk before it hits the floor. Three misses and you're out. Combos add up — keep the rhythm.</p>
        <button class="btn primary" id="introStart" type="button">Start</button>
      </div>
    </div>

    <div class="overlay" id="endOverlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="endTitle">
      <div class="overlay-card">
        <h2 id="endTitle">overcooked</h2>
        <div class="big-num" id="endScore">0</div>
        <div class="stat-line">
          <div>Best <strong id="endBest">0</strong></div>
          <div>Combo <strong id="endCombo">0</strong></div>
          <div>Lv <strong id="endLevel">1</strong></div>
        </div>
        <button class="btn primary" id="endRestart" type="button">Smash again</button>
      </div>
    </div>
  </div>

  <section class="panel" aria-label="Controls">
    <button class="btn" id="pauseBtn" type="button">⏸ Pause</button>
    <button class="btn primary" id="restartBtn" type="button">↻ Restart</button>
    <label class="toggle-row" for="soundToggle"><span>Sound</span><input type="checkbox" id="soundToggle" checked><span class="pill" aria-hidden="true"></span></label>
  </section>
</main>

<script>
(function(){
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const stageWrap = canvas.parentElement;

  const els = {
    scoreOut: document.getElementById('scoreOut'),
    levelOut: document.getElementById('levelOut'),
    livesOut: document.getElementById('livesOut'),
    combo: document.getElementById('combo'),
    introOverlay: document.getElementById('introOverlay'),
    introStart: document.getElementById('introStart'),
    endOverlay: document.getElementById('endOverlay'),
    endScore: document.getElementById('endScore'),
    endBest: document.getElementById('endBest'),
    endCombo: document.getElementById('endCombo'),
    endLevel: document.getElementById('endLevel'),
    endRestart: document.getElementById('endRestart'),
    pauseBtn: document.getElementById('pauseBtn'),
    restartBtn: document.getElementById('restartBtn'),
    soundToggle: document.getElementById('soundToggle'),
  };

  const BEST_KEY = 'celery-smash-best-v1';

  const state = {
    W: 0, H: 0, floorY: 0,
    dpr: Math.min(window.devicePixelRatio || 1, 2),
    playing: false,
    paused: false,
    score: 0,
    best: 0,
    lives: 3,
    maxLives: 3,
    level: 1,
    smashes: 0,
    combo: 0,
    bestCombo: 0,
    comboTimer: 0,
    spawnRate: 1.1,
    spawnTimer: 0.6,
    gravity: 220,
    fallSpeed: 1,
    sound: true,
    floatTexts: [],
  };

  try {
    const v = parseInt(localStorage.getItem(BEST_KEY), 10);
    if (!isNaN(v) && v > 0) state.best = v;
  } catch(e) {}
  function saveBest() {
    try { localStorage.setItem(BEST_KEY, String(state.best)); } catch(e) {}
  }

  const celeries = [];
  const particles = [];
  const splats = [];

  function resize() {
    const rect = stageWrap.getBoundingClientRect();
    state.W = Math.floor(rect.width);
    state.H = Math.floor(rect.height);
    canvas.width = state.W * state.dpr;
    canvas.height = state.H * state.dpr;
    canvas.style.width = state.W + 'px';
    canvas.style.height = state.H + 'px';
    ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
    state.floorY = state.H - 8;
  }
  window.addEventListener('resize', resize);

  // ---- Audio ----
  let audioCtx = null, masterGain = null;
  function ensureAudio() {
    if (audioCtx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audioCtx = new Ctx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.55;
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -16;
    comp.ratio.value = 4;
    masterGain.connect(comp);
    comp.connect(audioCtx.destination);
  }

  let lastSnap = 0;
  function playSnap(intensity) {
    if (!state.sound) return;
    ensureAudio(); if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = performance.now();
    if (now - lastSnap < 30) return;
    lastSnap = now;
    const t = audioCtx.currentTime;
    const I = Math.max(0.3, Math.min(1.3, intensity));
    // High snap: bandpass noise burst
    const len = Math.floor(0.09 * audioCtx.sampleRate);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 0.55);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 1700 + Math.random()*500;
    filt.Q.value = 1.6;
    const g = audioCtx.createGain();
    g.gain.value = 0.32 * I;
    src.connect(filt); filt.connect(g); g.connect(masterGain);
    src.start(t);
    // Low thud
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(190, t);
    o.frequency.exponentialRampToValueAtTime(58, t + 0.14);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.22 * I, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    o.connect(og); og.connect(masterGain);
    o.start(t); o.stop(t + 0.2);
    // Leafy chirp
    const o2 = audioCtx.createOscillator();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(620 + Math.random()*120, t);
    o2.frequency.exponentialRampToValueAtTime(380, t + 0.08);
    const og2 = audioCtx.createGain();
    og2.gain.setValueAtTime(0.06, t);
    og2.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
    o2.connect(og2); og2.connect(masterGain);
    o2.start(t); o2.stop(t + 0.11);
  }
  function playMiss() {
    if (!state.sound) return;
    ensureAudio(); if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(260, t);
    o.frequency.exponentialRampToValueAtTime(78, t + 0.28);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 1400;
    o.connect(filt); filt.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t + 0.34);
  }
  function playLevel() {
    if (!state.sound) return;
    ensureAudio(); if (!audioCtx) return;
    const notes = [392, 523, 659, 784];
    notes.forEach((f, i) => {
      setTimeout(() => {
        const t = audioCtx.currentTime;
        const o = audioCtx.createOscillator();
        o.type = 'triangle'; o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.16, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        o.connect(g); g.connect(masterGain);
        o.start(t); o.stop(t + 0.32);
      }, i * 70);
    });
  }
  function playGameOver() {
    if (!state.sound) return;
    ensureAudio(); if (!audioCtx) return;
    const notes = [392, 311, 247, 196];
    notes.forEach((f, i) => {
      setTimeout(() => {
        const t = audioCtx.currentTime;
        const o = audioCtx.createOscillator();
        o.type = 'sawtooth'; o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.16, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'lowpass'; filt.frequency.value = 900;
        o.connect(filt); filt.connect(g); g.connect(masterGain);
        o.start(t); o.stop(t + 0.42);
      }, i * 120);
    });
  }

  // ---- Spawning ----
  function spawnCelery() {
    const margin = 30;
    const x = margin + Math.random() * (state.W - margin * 2);
    const h = 56 + Math.random() * 38;
    const w = 14 + Math.random() * 5;
    celeries.push({
      x, y: -h,
      vy: 70 + Math.random() * 40 + state.level * 5,
      angle: (Math.random() - 0.5) * 0.35,
      va: (Math.random() - 0.5) * 0.8,
      wob: Math.random() * Math.PI * 2,
      wobAmp: 8 + Math.random() * 16,
      hsl: 90 + Math.random() * 22,
      h, w,
      leafCount: 3 + Math.floor(Math.random() * 3),
      smashed: false,
      smashT: 0,
      id: Math.random(),
    });
  }

  // ---- Game flow ----
  function startGame() {
    state.playing = true;
    state.paused = false;
    state.score = 0;
    state.lives = state.maxLives;
    state.level = 1;
    state.smashes = 0;
    state.combo = 0;
    state.bestCombo = 0;
    state.comboTimer = 0;
    state.spawnRate = 1.1;
    state.spawnTimer = 0.6;
    state.gravity = 220;
    celeries.length = 0;
    particles.length = 0;
    splats.length = 0;
    state.floatTexts.length = 0;
    els.introOverlay.setAttribute('aria-hidden', 'true');
    els.endOverlay.setAttribute('aria-hidden', 'true');
    els.pauseBtn.textContent = '⏸ Pause';
    updateHud();
  }

  function endGame() {
    state.playing = false;
    if (state.score > state.best) {
      state.best = state.score;
      saveBest();
    }
    els.endScore.textContent = state.score;
    els.endBest.textContent = state.best;
    els.endCombo.textContent = state.bestCombo;
    els.endLevel.textContent = state.level;
    els.endOverlay.setAttribute('aria-hidden', 'false');
    playGameOver();
    setTimeout(() => els.endRestart.focus(), 200);
  }

  function loseLife() {
    state.lives -= 1;
    state.combo = 0;
    state.comboTimer = 0;
    state.floatTexts.push({
      x: state.W / 2,
      y: state.floorY - 36,
      text: 'MISS',
      color: '#d4382e',
      life: 0.9,
      maxLife: 0.9,
      vy: -40,
    });
    // Floor splat
    splats.push({
      x: Math.random() * state.W,
      y: state.floorY - 4,
      r: 22 + Math.random()*12,
      life: 3.5,
    });
    playMiss();
    updateHud();
    if (state.lives <= 0) {
      endGame();
    }
  }

  function smashCelery(c) {
    if (c.smashed) return;
    c.smashed = true;
    state.smashes += 1;
    // Combo
    state.combo += 1;
    if (state.combo > state.bestCombo) state.bestCombo = state.combo;
    state.comboTimer = 1.6;
    const mult = state.combo >= 8 ? 3 : state.combo >= 5 ? 2 : state.combo >= 3 ? 1.5 : 1;
    const gain = Math.round(10 * mult);
    state.score += gain;

    // Spawn chunks
    const nChunks = 10 + Math.floor(Math.random() * 6);
    for (let i = 0; i < nChunks; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 90 + Math.random() * 220;
      particles.push({
        x: c.x + (Math.random()-0.5) * 8,
        y: c.y + (Math.random()-0.5) * c.h * 0.5,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 80,
        size: 2.5 + Math.random() * 3.2,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random()-0.5) * 8,
        hsl: c.hsl + (Math.random()-0.5) * 18,
        life: 0.6 + Math.random() * 0.5,
        maxLife: 1.1,
        kind: i < 3 ? 'leaf' : 'chunk',
      });
    }

    // Float score text
    state.floatTexts.push({
      x: c.x,
      y: c.y - 24,
      text: '+' + gain + (mult > 1 ? ' x' + mult : ''),
      color: mult > 1 ? '#d4382e' : '#1f2a17',
      life: 0.7,
      maxLife: 0.7,
      vy: -70,
    });

    playSnap(0.6 + mult * 0.18);

    // Level up every 18 smashes
    if (state.smashes % 18 === 0) {
      state.level += 1;
      state.spawnRate = Math.min(4.2, state.spawnRate * 1.22);
      state.gravity = Math.min(720, state.gravity * 1.12);
      state.floatTexts.push({
        x: state.W / 2,
        y: state.H / 2,
        text: 'LV ' + state.level,
        color: '#1f2a17',
        life: 1.4,
        maxLife: 1.4,
        vy: 0,
        big: true,
      });
      playLevel();
    }
    updateHud();
  }

  function updateHud() {
    els.scoreOut.textContent = state.score;
    els.levelOut.textContent = state.level;
    let pips = '';
    for (let i = 0; i < state.maxLives; i++) {
      pips += `<span class="lives-pip${i < state.lives ? '' : ' spent'}" aria-hidden="true"></span>`;
    }
    els.livesOut.innerHTML = pips;
    els.livesOut.setAttribute('aria-label', state.lives + ' of ' + state.maxLives + ' lives');

    if (state.combo >= 2) {
      els.combo.textContent = 'COMBO × ' + state.combo;
      els.combo.classList.add('show');
    } else {
      els.combo.classList.remove('show');
    }
  }

  // ---- Hit test ----
  function pointerPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  function hitTest(px, py) {
    let hit = false;
    for (let i = celeries.length - 1; i >= 0; i--) {
      const c = celeries[i];
      if (c.smashed) continue;
      const dx = px - c.x;
      const dy = py - c.y;
      const cos = Math.cos(-c.angle);
      const sin = Math.sin(-c.angle);
      const lx = dx * cos - dy * sin;
      const ly = dx * sin + dy * cos;
      const padW = c.w / 2 + 14;
      const padH = c.h / 2 + 12;
      if (Math.abs(lx) < padW && Math.abs(ly) < padH) {
        smashCelery(c);
        hit = true;
        break;
      }
    }
    if (!hit && state.playing) {
      state.combo = 0;
      state.comboTimer = 0;
      updateHud();
    }
  }

  canvas.addEventListener('pointerdown', (e) => {
    ensureAudio();
    if (!state.playing) return;
    if (state.paused) return;
    const p = pointerPos(e);
    hitTest(p.x, p.y);
  });

  // ---- Update / Render ----
  function update(dt) {
    if (!state.playing || state.paused) return;
    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0) {
      spawnCelery();
      // Occasional double-drop on higher levels
      if (state.level >= 3 && Math.random() < 0.18) {
        setTimeout(() => state.playing && spawnCelery(), 120);
      }
      state.spawnTimer = 1 / state.spawnRate;
    }

    for (let i = celeries.length - 1; i >= 0; i--) {
      const c = celeries[i];
      if (c.smashed) {
        c.smashT += dt;
        if (c.smashT > 0.05) celeries.splice(i, 1);
        continue;
      }
      c.vy += state.gravity * dt;
      c.y += c.vy * dt;
      c.angle += c.va * dt;
      c.wob += dt * 2.4;
      c.x += Math.sin(c.wob) * dt * c.wobAmp;
      if (c.x < 16) c.x = 16;
      if (c.x > state.W - 16) c.x = state.W - 16;
      if (c.y - c.h / 2 > state.floorY) {
        celeries.splice(i, 1);
        loseLife();
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 480 * dt;
      p.vx *= 0.96;
      p.rot += p.vr * dt;
      p.life -= dt;
      if (p.y > state.floorY) {
        p.y = state.floorY;
        p.vy = -p.vy * 0.25;
        p.vx *= 0.6;
      }
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = splats.length - 1; i >= 0; i--) {
      splats[i].life -= dt;
      if (splats[i].life <= 0) splats.splice(i, 1);
    }
    for (let i = state.floatTexts.length - 1; i >= 0; i--) {
      const t = state.floatTexts[i];
      t.y += t.vy * dt;
      t.life -= dt;
      if (t.life <= 0) state.floatTexts.splice(i, 1);
    }

    state.comboTimer -= dt;
    if (state.comboTimer <= 0 && state.combo > 0) {
      state.combo = 0;
      updateHud();
    }
  }

  function drawLeaf(x, y, rot, size, hsl) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    const grad = ctx.createRadialGradient(0, -size*0.4, 1, 0, -size*0.4, size);
    grad.addColorStop(0, `hsl(${hsl}, 60%, 55%)`);
    grad.addColorStop(1, `hsl(${hsl}, 70%, 28%)`);
    ctx.fillStyle = grad;
    ctx.strokeStyle = `hsl(${hsl}, 78%, 18%)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(0, -size*0.55, size*0.55, size, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.strokeStyle = `hsl(${hsl}, 50%, 38%)`;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, -0.05);
    ctx.lineTo(0, -size*1.3);
    ctx.stroke();
    ctx.restore();
  }

  function drawCelery(c) {
    const w = c.w, h = c.h;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.angle);
    // Soft drop shadow
    if (!c.smashed) {
      ctx.save();
      ctx.rotate(-c.angle);
      const dist = state.floorY - c.y;
      const sa = Math.max(0, 0.22 - dist / 700);
      if (sa > 0.02) {
        ctx.fillStyle = `rgba(31,42,23,${sa})`;
        ctx.beginPath();
        ctx.ellipse(0, dist, w*0.7, 4, 0, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
    // Stalk
    const grad = ctx.createLinearGradient(0, -h/2, 0, h/2);
    grad.addColorStop(0, `hsl(${c.hsl}, 55%, 65%)`);
    grad.addColorStop(0.45, `hsl(${c.hsl}, 60%, 48%)`);
    grad.addColorStop(1, `hsl(${c.hsl}, 70%, 28%)`);
    ctx.fillStyle = grad;
    ctx.strokeStyle = `hsl(${c.hsl}, 78%, 14%)`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-w/2, h/2);
    ctx.lineTo(w/2, h/2);
    ctx.lineTo(w/2 - 2, -h/2 * 0.72);
    ctx.lineTo(-w/2 + 2, -h/2 * 0.72);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Grooves
    ctx.strokeStyle = `hsl(${c.hsl}, 60%, 22%)`;
    ctx.lineWidth = 1;
    for (let gi = -1; gi <= 1; gi++) {
      ctx.beginPath();
      ctx.moveTo(gi * w * 0.2, h/2 - 5);
      ctx.lineTo(gi * w * 0.2 - 0.4, -h/2 * 0.72 + 5);
      ctx.stroke();
    }
    // Highlight stripe
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.fillRect(-w/2 + 2.5, -h/2 * 0.55, 2, h * 0.7);

    // Leaves
    const lc = c.leafCount;
    for (let li = 0; li < lc; li++) {
      const ratio = lc === 1 ? 0 : (li / (lc - 1)) - 0.5;
      const ang = -Math.PI/2 + ratio * 1.1;
      const r = 14 + Math.random()*0;
      const lx = Math.cos(ang) * r * 0.8;
      const ly = -h/2 * 0.72 + Math.sin(ang) * r - 2;
      drawLeaf(lx, ly, ang + Math.PI/2, 10 + (li === Math.floor(lc/2) ? 3 : 1), c.hsl);
    }
    ctx.restore();
  }

  function drawScene() {
    const W = state.W, H = state.H, fy = state.floorY;

    // Sky/background gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#d7e9b0');
    g.addColorStop(0.7, '#aed176');
    g.addColorStop(1, '#84a84e');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Background dotted grass texture
    ctx.fillStyle = 'rgba(31,42,23,0.06)';
    for (let i = 0; i < 90; i++) {
      const x = (i * 71) % W;
      const y = (i * 137) % H;
      ctx.fillRect(x, y, 2, 2);
    }

    // Floor splats (decaying green stains)
    for (const s of splats) {
      const a = Math.min(0.45, s.life / 3.5);
      ctx.fillStyle = `rgba(77,139,28,${a})`;
      ctx.beginPath();
      ctx.ellipse(s.x, s.y, s.r, s.r * 0.4, 0, 0, Math.PI*2);
      ctx.fill();
    }

    // Floor strip
    ctx.fillStyle = '#5a8125';
    ctx.fillRect(0, fy - 4, W, 4);

    // Particles (chunks)
    for (const p of particles) {
      const a = Math.max(0, p.life / p.maxLife);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      if (p.kind === 'leaf') {
        ctx.fillStyle = `hsla(${p.hsl}, 60%, 38%, ${a})`;
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size*0.7, p.size*1.2, 0, 0, Math.PI*2);
        ctx.fill();
      } else {
        ctx.fillStyle = `hsla(${p.hsl}, 60%, 48%, ${a})`;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      }
      ctx.restore();
    }

    // Celery
    for (const c of celeries) drawCelery(c);

    // Float texts
    for (const t of state.floatTexts) {
      const a = Math.max(0, t.life / t.maxLife);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle = t.color;
      ctx.font = (t.big ? 'bold 48px ' : 'bold 22px ') + '"Lilita One", "Bungee", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.strokeStyle = '#faf3df';
      ctx.lineWidth = t.big ? 6 : 3;
      ctx.strokeText(t.text, t.x, t.y);
      ctx.fillText(t.text, t.x, t.y);
      ctx.restore();
    }
  }

  // ---- Main loop ----
  let last = performance.now();
  function frame(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 1/15) dt = 1/15;
    update(dt);
    drawScene();
    requestAnimationFrame(frame);
  }

  // ---- UI events ----
  els.introStart.addEventListener('click', () => { ensureAudio(); startGame(); });
  els.endRestart.addEventListener('click', () => { ensureAudio(); startGame(); });
  els.restartBtn.addEventListener('click', () => { ensureAudio(); startGame(); });
  els.pauseBtn.addEventListener('click', () => {
    if (!state.playing) return;
    state.paused = !state.paused;
    els.pauseBtn.textContent = state.paused ? '▶ Resume' : '⏸ Pause';
  });
  els.soundToggle.addEventListener('change', () => {
    state.sound = els.soundToggle.checked;
    if (state.sound) ensureAudio();
  });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === ' ') {
      e.preventDefault();
      els.pauseBtn.click();
    } else if (e.key === 'r' || e.key === 'R') {
      els.restartBtn.click();
    } else if (e.key === 'm' || e.key === 'M') {
      els.soundToggle.checked = !els.soundToggle.checked;
      els.soundToggle.dispatchEvent(new Event('change'));
    }
  });

  // ---- Boot ----
  resize();
  updateHud();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
