<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Xenoglyph</title>
<link rel="icon" href="https://emojicdn.elk.sh/👽" />
<meta name="description" content="30 procedural alien symbols. Each one unique. Each one named." />
<meta property="og:title" content="Xenoglyph" />
<meta property="og:description" content="30 procedural alien symbols. Each one unique. Each one named." />
<meta property="og:url" content="https://sloppy.live/xenoglyph" />
<meta property="og:image" content="https://sloppy.live/screenshots/xenoglyph.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #08060e;
    --surface: #0e0b18;
    --border: #1e1830;
    --dim: #554a78;
    --text: #c8b8f0;
    --accent: #a06cff;
    --glow: rgba(160,108,255,0.3);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(160,108,255,0.06), transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(80,200,255,0.04), transparent 50%),
      var(--bg);
  }

  header {
    padding: 28px 24px 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(32px, 6vw, 52px);
    color: var(--accent);
    letter-spacing: 0.12em;
    text-shadow: 0 0 30px var(--glow);
  }
  header p {
    font-family: 'Fira Code', monospace;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 6px;
  }
  header a {
    color: var(--dim);
    text-decoration: none;
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  header a:hover { color: var(--accent); }

  .controls {
    text-align: center;
    padding: 16px;
  }
  .controls button {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 16px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 28px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: background 0.2s, color 0.2s;
  }
  .controls button:hover { background: var(--accent); color: var(--bg); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    padding: 20px 24px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .glyph-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    text-align: center;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    cursor: default;
  }
  .glyph-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
    transform: translateY(-2px);
  }
  .glyph-card canvas {
    display: block;
    margin: 0 auto 10px;
    image-rendering: pixelated;
  }
  .glyph-card .gname {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 17px;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .glyph-card .gid {
    font-family: 'Fira Code', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid var(--border);
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.15em;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 14px; }
    .glyph-card { padding: 12px; }
  }
</style>
</head>
<body>
  <header>
    <h1>Xenoglyph</h1>
    <p>procedural alien symbology — 30 unique glyphs</p>
</header>

  <div class="controls">
    <button id="regenBtn">Regenerate Codex</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer">each glyph is procedurally unique — no two codexes are alike</div>

<script>
(() => {
  const GLYPH_COUNT = 30;
  const SIZE = 120; // canvas size
  const gridEl = document.getElementById('grid');
  const regenBtn = document.getElementById('regenBtn');

  // Seeded PRNG (mulberry32)
  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  // Name generation
  const PREFIXES = [
    'Zar', 'Keth', 'Vor', 'Xil', 'Tho', 'Nyr', 'Qel', 'Dra', 'Phi', 'Osh',
    'Ven', 'Gri', 'Bex', 'Hal', 'Yul', 'Isk', 'Myr', 'Oze', 'Wex', 'Cyr',
    'Ael', 'Rho', 'Zur', 'Fex', 'Pla', 'Ith', 'Sho', 'Una', 'Jex', 'Kel',
  ];
  const MIDS = [
    'an', 'or', 'ix', 'ul', 'en', 'ar', 'ith', 'on', 'um', 'el',
    'ax', 'is', 'oth', 'yn', 'ev', 'az', 'ir', 'ok', 'ux', 'em',
  ];
  const SUFFIXES = [
    'dal', 'ven', 'thos', 'mir', 'zek', 'phi', 'xon', 'ryn', 'kul', 'nar',
    'gal', 'thex', 'sol', 'vir', 'dex', 'qor', 'pel', 'zin', 'tok', 'mar',
  ];

  function generateName(rng) {
    const pre = PREFIXES[Math.floor(rng() * PREFIXES.length)];
    const mid = rng() < 0.6 ? MIDS[Math.floor(rng() * MIDS.length)] : '';
    const suf = SUFFIXES[Math.floor(rng() * SUFFIXES.length)];
    return pre + mid + suf;
  }

  // Glyph color palettes
  const PALETTES = [
    ['#a06cff', '#7b3fff', '#c99eff'],  // violet
    ['#ff6ec7', '#ff3db0', '#ffa0dd'],  // pink
    ['#4dffe0', '#2effb5', '#80ffee'],  // cyan
    ['#ff4500', '#ff6633', '#ff8855'],  // lava
    ['#ccff00', '#aadd00', '#eeff66'],  // acid
    ['#2fd8ff', '#1ab4ff', '#66e4ff'],  // sky
    ['#ffd700', '#ffcc00', '#ffe666'],  // gold
    ['#39ff14', '#22dd00', '#66ff44'],  // neon
    ['#ff2f4d', '#ff1133', '#ff6680'],  // red
    ['#6e7bff', '#4455ff', '#99a4ff'],  // indigo
  ];

  // Procedural glyph drawing primitives
  function drawGlyph(ctx, rng, w, h) {
    const palette = PALETTES[Math.floor(rng() * PALETTES.length)];
    const primary = palette[0];
    const secondary = palette[1];
    const highlight = palette[2];

    ctx.clearRect(0, 0, w, h);

    const cx = w / 2;
    const cy = h / 2;
    const baseR = w * 0.32;

    // Background subtle circle
    ctx.beginPath();
    ctx.arc(cx, cy, baseR * 1.1, 0, Math.PI * 2);
    ctx.fillStyle = primary.replace(')', ',0.06)').replace('rgb', 'rgba');
    ctx.fill();

    // Choose a structural form
    const form = Math.floor(rng() * 8);
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Draw main structure
    ctx.strokeStyle = primary;
    ctx.shadowColor = primary;
    ctx.shadowBlur = 8;

    if (form === 0) {
      // Radial spokes with arcs
      const spokes = 3 + Math.floor(rng() * 5);
      for (let i = 0; i < spokes; i++) {
        const angle = (i / spokes) * Math.PI * 2 + rng() * 0.3;
        const len = baseR * (0.5 + rng() * 0.5);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
        ctx.stroke();
        // Arc at end
        if (rng() < 0.6) {
          ctx.beginPath();
          ctx.arc(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len, 4 + rng() * 6, 0, Math.PI * (1 + rng()));
          ctx.stroke();
        }
      }
    } else if (form === 1) {
      // Concentric polygons
      const sides = 3 + Math.floor(rng() * 4);
      const layers = 2 + Math.floor(rng() * 3);
      const rot = rng() * Math.PI;
      for (let l = 0; l < layers; l++) {
        const r = baseR * (0.3 + (l / layers) * 0.7);
        ctx.beginPath();
        for (let i = 0; i <= sides; i++) {
          const a = rot + (i / sides) * Math.PI * 2;
          const x = cx + Math.cos(a) * r;
          const y = cy + Math.sin(a) * r;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = l % 2 === 0 ? primary : secondary;
        ctx.stroke();
      }
    } else if (form === 2) {
      // Curved sigil — bezier paths
      const points = 4 + Math.floor(rng() * 4);
      ctx.beginPath();
      let sx = cx + (rng() - 0.5) * baseR;
      let sy = cy + (rng() - 0.5) * baseR;
      ctx.moveTo(sx, sy);
      for (let i = 0; i < points; i++) {
        const cp1x = cx + (rng() - 0.5) * baseR * 2;
        const cp1y = cy + (rng() - 0.5) * baseR * 2;
        const cp2x = cx + (rng() - 0.5) * baseR * 2;
        const cp2y = cy + (rng() - 0.5) * baseR * 2;
        const ex = cx + (rng() - 0.5) * baseR * 1.5;
        const ey = cy + (rng() - 0.5) * baseR * 1.5;
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, ex, ey);
      }
      ctx.stroke();
      // Accent dots at intersections
      ctx.fillStyle = highlight;
      for (let i = 0; i < 3; i++) {
        const dx = cx + (rng() - 0.5) * baseR;
        const dy = cy + (rng() - 0.5) * baseR;
        ctx.beginPath();
        ctx.arc(dx, dy, 2 + rng() * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (form === 3) {
      // Grid rune — filled cells in a matrix
      const cols = 3 + Math.floor(rng() * 3);
      const rows = 3 + Math.floor(rng() * 3);
      const cellW = (baseR * 1.6) / cols;
      const cellH = (baseR * 1.6) / rows;
      const ox = cx - (cols * cellW) / 2;
      const oy = cy - (rows * cellH) / 2;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (rng() < 0.45) {
            ctx.fillStyle = rng() < 0.7 ? primary : secondary;
            ctx.fillRect(ox + c * cellW + 1, oy + r * cellH + 1, cellW - 2, cellH - 2);
          }
        }
      }
      // Border
      ctx.strokeStyle = secondary;
      ctx.strokeRect(ox, oy, cols * cellW, rows * cellH);
    } else if (form === 4) {
      // Orbital rings with nodes
      const orbits = 2 + Math.floor(rng() * 3);
      for (let o = 0; o < orbits; o++) {
        const r = baseR * (0.3 + o * 0.25);
        const tilt = rng() * Math.PI * 0.4;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(tilt);
        ctx.scale(1, 0.4 + rng() * 0.4);
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.restore();
        ctx.strokeStyle = o % 2 === 0 ? primary : highlight;
        ctx.stroke();
        // Node on orbit
        const nodeAngle = rng() * Math.PI * 2;
        const nx = cx + Math.cos(nodeAngle + tilt) * r;
        const ny = cy + Math.sin(nodeAngle + tilt) * r * 0.5;
        ctx.fillStyle = highlight;
        ctx.beginPath();
        ctx.arc(nx, ny, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      // Central point
      ctx.fillStyle = primary;
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fill();
    } else if (form === 5) {
      // Spiral with branches
      const turns = 2 + rng() * 3;
      const dir = rng() < 0.5 ? 1 : -1;
      ctx.beginPath();
      for (let t = 0; t < turns * Math.PI * 2; t += 0.1) {
        const r = 4 + (t / (turns * Math.PI * 2)) * baseR;
        const x = cx + Math.cos(t * dir) * r;
        const y = cy + Math.sin(t * dir) * r;
        t === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      // Branch spurs
      const spurs = 2 + Math.floor(rng() * 4);
      ctx.strokeStyle = secondary;
      for (let i = 0; i < spurs; i++) {
        const t = rng() * turns * Math.PI * 2;
        const r = 4 + (t / (turns * Math.PI * 2)) * baseR;
        const bx = cx + Math.cos(t * dir) * r;
        const by = cy + Math.sin(t * dir) * r;
        const ba = t * dir + (rng() < 0.5 ? Math.PI / 2 : -Math.PI / 2);
        ctx.beginPath();
        ctx.moveTo(bx, by);
        ctx.lineTo(bx + Math.cos(ba) * (8 + rng() * 12), by + Math.sin(ba) * (8 + rng() * 12));
        ctx.stroke();
      }
    } else if (form === 6) {
      // Stacked bars / totem
      const bars = 3 + Math.floor(rng() * 5);
      const totalH = baseR * 1.8;
      const barH = totalH / bars;
      const oy = cy - totalH / 2;
      for (let i = 0; i < bars; i++) {
        const bw = (0.3 + rng() * 0.7) * baseR * 1.4;
        const bx = cx - bw / 2;
        const by = oy + i * barH;
        ctx.fillStyle = rng() < 0.5 ? primary : secondary;
        ctx.globalAlpha = 0.5 + rng() * 0.5;
        ctx.fillRect(bx, by + 1, bw, barH - 2);
        ctx.globalAlpha = 1;
        // Notch or circle detail
        if (rng() < 0.5) {
          ctx.fillStyle = highlight;
          ctx.beginPath();
          ctx.arc(cx + (rng() - 0.5) * bw * 0.6, by + barH / 2, 2 + rng() * 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      // Vertical spine
      ctx.strokeStyle = highlight;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx, oy);
      ctx.lineTo(cx, oy + totalH);
      ctx.stroke();
      ctx.lineWidth = 2;
    } else {
      // Connected constellation
      const stars = 5 + Math.floor(rng() * 6);
      const pts = [];
      for (let i = 0; i < stars; i++) {
        pts.push({
          x: cx + (rng() - 0.5) * baseR * 2,
          y: cy + (rng() - 0.5) * baseR * 2,
        });
      }
      // Connect nearest pairs
      ctx.strokeStyle = secondary;
      ctx.lineWidth = 1;
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const d = Math.hypot(pts[i].x - pts[j].x, pts[i].y - pts[j].y);
          if (d < baseR * 1.2 && rng() < 0.6) {
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.lineWidth = 2;
      // Star dots
      pts.forEach((p, i) => {
        ctx.fillStyle = i === 0 ? highlight : primary;
        ctx.beginPath();
        ctx.arc(p.x, p.y, i === 0 ? 5 : 3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    // Secondary overlay detail (50% chance)
    ctx.shadowBlur = 0;
    if (rng() < 0.5) {
      ctx.strokeStyle = highlight;
      ctx.globalAlpha = 0.3;
      ctx.lineWidth = 1;
      // Small inner circle or cross
      if (rng() < 0.5) {
        ctx.beginPath();
        ctx.arc(cx, cy, 6 + rng() * 10, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        const s = 6 + rng() * 8;
        ctx.beginPath();
        ctx.moveTo(cx - s, cy); ctx.lineTo(cx + s, cy);
        ctx.moveTo(cx, cy - s); ctx.lineTo(cx, cy + s);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.lineWidth = 2;
    }
  }

  function generateCodex() {
    const seed = Date.now() ^ Math.floor(Math.random() * 999999);
    const rng = mulberry32(seed);
    const usedNames = new Set();

    gridEl.innerHTML = '';

    for (let i = 0; i < GLYPH_COUNT; i++) {
      // Generate unique name
      let name;
      do { name = generateName(rng); } while (usedNames.has(name));
      usedNames.add(name);

      const card = document.createElement('div');
      card.className = 'glyph-card';
      card.style.animationDelay = (i * 30) + 'ms';

      const canvas = document.createElement('canvas');
      canvas.width = SIZE;
      canvas.height = SIZE;
      canvas.style.width = (SIZE / 1.5) + 'px';
      canvas.style.height = (SIZE / 1.5) + 'px';
      const ctx = canvas.getContext('2d');
      drawGlyph(ctx, rng, SIZE, SIZE);

      const nameEl = document.createElement('div');
      nameEl.className = 'gname';
      nameEl.textContent = name;

      const idEl = document.createElement('div');
      idEl.className = 'gid';
      const hexId = (seed + i * 7919).toString(16).toUpperCase().slice(-6);
      idEl.textContent = 'XG-' + hexId;

      card.appendChild(canvas);
      card.appendChild(nameEl);
      card.appendChild(idEl);
      gridEl.appendChild(card);
    }
  }

  regenBtn.addEventListener('click', generateCodex);
  generateCodex();
})();
</script>
</body>
</html>
