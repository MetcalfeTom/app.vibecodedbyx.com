<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>glitch tower escape</title>
<meta name="description" content="Climb a crumbling motherboard. Jump from chip to capacitor. Don't fall, don't get zapped." />
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9A%A1" />
<meta property="og:title" content="Glitch Tower Escape" />
<meta property="og:description" content="Climb a crumbling motherboard. Jump from chip to capacitor. Don't fall, don't get zapped." />
<meta property="og:url" content="https://sloppy.live/glitch-tower-escape/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/vertical%20pixel%20platformer%20glitch%20circuit%20board%20climbing%20capacitors%20chips%20neon%20green%20arcs%20electricity%20chromatic%20aberration?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Share+Tech+Mono&family=Major+Mono+Display&display=swap" rel="stylesheet" />
<style>
  :root {
    --board: #0a3b21;        /* PCB green */
    --board-dark: #062613;
    --board-light: #1c5c2e;
    --trace: #6dff8c;        /* trace cyan-green */
    --trace-dim: #2a8a3f;
    --solder: #d8c97a;
    --capacitor: #1b2a4f;
    --capacitor-ring: #fff4a8;
    --chip: #11161e;
    --chip-leg: #b9c6cf;
    --led-red: #ff3a5e;
    --led-green: #6dff8c;
    --led-amber: #ffd86a;
    --arc: #b6f0ff;
    --rgb-r: #ff2dc7;
    --rgb-b: #00f6ff;
    --bg-deep: #020a04;
    --bone: #fff4f6;
    --ink: #d6f5dd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--ink);
    font-family: 'VT323', monospace;
    user-select: none;
    touch-action: none;
  }
  #stage { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #bgCanvas { z-index: 1; }
  #gameCanvas { z-index: 2; }
  #fxCanvas { z-index: 3; pointer-events: none; mix-blend-mode: screen; }

  .ui { position: fixed; z-index: 5; pointer-events: none; }
  .ui > * { pointer-events: auto; }

  header.ui {
    top: 1rem; left: 1.4rem;
    line-height: 0.95;
  }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.85rem, 2.2vw, 1.3rem);
    letter-spacing: 0.06em;
    color: var(--bone);
    text-shadow:
      2px 2px 0 var(--led-red),
      -2px 0 0 var(--rgb-b),
      0 0 14px rgba(109, 255, 140, 0.6);
    line-height: 1.2;
  }
  h1 .glitch {
    color: var(--trace);
    animation: titleGlitch 4.4s steps(1) infinite;
  }
  @keyframes titleGlitch {
    0%, 92%, 100% { transform: translate(0, 0); }
    93% { transform: translate(2px, -1px); }
    94% { transform: translate(-3px, 1px); }
    95% { transform: translate(0, 2px); }
    96% { transform: translate(2px, 0); }
    97% { transform: translate(-1px, -2px); }
  }
  .sub {
    font-family: 'Major Mono Display', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.32em;
    text-transform: lowercase;
    color: rgba(214, 245, 221, 0.65);
    margin-top: 0.5rem;
  }

  .hud {
    position: fixed;
    top: 1rem; right: 1.4rem;
    text-align: right;
    z-index: 5;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(214, 245, 221, 0.65);
    line-height: 1.6;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .hud .val {
    display: block;
    font-family: 'Press Start 2P', monospace;
    font-size: 1.4rem;
    letter-spacing: 0.02em;
    color: var(--bone);
    text-shadow: 0 0 8px rgba(109, 255, 140, 0.85), 2px 0 0 var(--led-red);
    margin-top: 0.18rem;
    line-height: 1;
  }
  .hud .val.height { color: var(--trace); text-shadow: 0 0 10px rgba(109, 255, 140, 0.85), 2px 0 0 var(--rgb-r); }
  .hud .val.best { color: var(--led-amber); text-shadow: 0 0 10px rgba(255, 216, 106, 0.85); }

  .start-overlay, .end-overlay {
    position: fixed; inset: 0;
    z-index: 10;
    background: radial-gradient(ellipse at 50% 50%, rgba(8, 60, 36, 0.85), rgba(2, 10, 4, 0.96));
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center; padding: 2rem;
  }
  .end-overlay { display: none; }
  .end-overlay.show { display: flex; }
  .start-overlay.hide { display: none; }
  .start-overlay h2, .end-overlay .title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.2rem, 3.4vw, 1.9rem);
    color: var(--bone);
    text-shadow:
      0 0 20px rgba(109, 255, 140, 0.95),
      3px 0 0 var(--led-red),
      -3px 0 0 var(--rgb-b);
    letter-spacing: 0.08em;
    margin-bottom: 0.7rem;
    line-height: 1.5;
  }
  .start-overlay .pitch {
    font-family: 'Major Mono Display', monospace;
    font-size: 0.82rem;
    letter-spacing: 0.32em;
    color: rgba(214, 245, 221, 0.55);
    margin-bottom: 1.8rem;
  }
  .controls-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.45rem 0.9rem;
    margin: 1rem 0 1.6rem;
    color: rgba(214, 245, 221, 0.85);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.86rem;
    text-align: left;
    align-items: center;
  }
  .kbd {
    display: inline-block;
    border: 1.5px solid var(--trace);
    border-radius: 4px;
    color: var(--trace);
    padding: 0.32rem 0.6rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    box-shadow: 0 0 10px rgba(109, 255, 140, 0.45);
    min-width: 2rem;
    text-align: center;
  }
  .start-overlay button, .end-overlay button {
    appearance: none;
    background: linear-gradient(135deg, var(--trace), #16a040);
    border: 2px solid var(--bone);
    color: var(--board-dark);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    padding: 0.85rem 2.2rem;
    cursor: pointer;
    border-radius: 4px;
    box-shadow:
      0 0 22px rgba(109, 255, 140, 0.7),
      inset 0 0 4px var(--bone);
    transition: transform 0.08s, box-shadow 0.12s;
    margin-top: 0.6rem;
  }
  .start-overlay button:hover, .end-overlay button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 36px rgba(109, 255, 140, 0.95), inset 0 0 6px var(--bone);
  }
  .start-overlay button:focus-visible, .end-overlay button:focus-visible {
    outline: 3px solid var(--led-amber); outline-offset: 4px;
  }
  .end-overlay .title { color: var(--led-red); text-shadow: 0 0 18px rgba(255, 58, 94, 0.95), 3px 0 0 var(--rgb-b); }
  .end-overlay .stats {
    display: flex; gap: 2rem; margin-bottom: 1.8rem;
    flex-wrap: wrap; justify-content: center;
  }
  .end-overlay .stat {
    color: rgba(214, 245, 221, 0.6);
    font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase;
  }
  .end-overlay .stat .v {
    display: block;
    font-family: 'Press Start 2P', monospace;
    font-size: 1.5rem;
    color: var(--bone);
    text-shadow: 0 0 12px rgba(109, 255, 140, 0.7);
    margin-top: 0.2rem;
  }

  .touchpad {
    position: fixed;
    inset: auto 0 0 0;
    z-index: 7;
    display: none;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 1.2rem 1.2rem;
    pointer-events: none;
  }
  .touchpad.show { display: flex; }
  .touchpad .cluster {
    pointer-events: none;
    display: flex;
    gap: 0.7rem;
  }
  .touchpad .pad {
    pointer-events: auto;
    width: 6rem; height: 6rem;
    border-radius: 14px;
    border: 3px solid var(--trace);
    background: rgba(10, 60, 30, 0.55);
    color: var(--trace);
    font-family: 'Press Start 2P', monospace;
    font-size: 1.4rem;
    display: grid;
    place-items: center;
    box-shadow: 0 0 22px rgba(109, 255, 140, 0.5), inset 0 0 14px rgba(109, 255, 140, 0.16);
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.06s, background 0.08s;
  }
  .touchpad .pad.jump {
    width: 7rem; height: 7rem;
    border-color: var(--led-amber);
    color: var(--led-amber);
    box-shadow: 0 0 24px rgba(255, 216, 106, 0.65), inset 0 0 16px rgba(255, 216, 106, 0.2);
    font-size: 1.1rem;
    letter-spacing: 0.14em;
  }
  .touchpad .pad.pressed {
    transform: scale(0.94);
    background: rgba(109, 255, 140, 0.25);
  }
  @media (hover: none) and (pointer: coarse) {
    .touchpad { display: flex; }
    .hud { font-size: 0.56rem; }
    .hud .val { font-size: 1rem; }
  }
  @media (max-width: 720px) {
    header.ui { top: 0.7rem; left: 0.9rem; }
    .hud { top: 0.7rem; right: 0.9rem; }
    .sub { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    h1 .glitch { animation: none; }
  }
</style>
</head>
<body>

<div id="stage" role="application" aria-label="Climb a crumbling motherboard. Left and right arrows move, up arrow or space jumps. Avoid the falling capacitors and electric arcs.">
  <canvas id="bgCanvas"></canvas>
  <canvas id="gameCanvas"></canvas>
  <canvas id="fxCanvas"></canvas>
</div>

<header class="ui">
  <h1>GLITCH·<span class="glitch">TOWER</span>·ESCAPE</h1>
  <p class="sub">·· climb · circuit · survive ··</p>
</header>

<div class="hud" aria-live="polite">
  <div>height <span class="val height" id="height">0m</span></div>
  <div>score <span class="val" id="score">0</span></div>
  <div>best <span class="val best" id="best">0m</span></div>
</div>

<div class="start-overlay" id="startOverlay">
  <h2>glitch tower<br>escape</h2>
  <div class="pitch">climb the crumbling motherboard</div>
  <div class="controls-grid">
    <span class="kbd">← →</span><span>move</span>
    <span class="kbd">↑ / Space</span><span>jump (hold = higher)</span>
    <span class="kbd">M</span><span>mute</span>
  </div>
  <button id="startBtn" type="button">jack in</button>
</div>

<div class="end-overlay" id="endOverlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="title" id="endTitle">SEGFAULT</div>
  <div class="stats">
    <div class="stat">height<span class="v" id="endHeight">0m</span></div>
    <div class="stat">score<span class="v" id="endScore">0</span></div>
    <div class="stat">best<span class="v" id="endBest">0m</span></div>
  </div>
  <button id="restartBtn" type="button">recompile</button>
</div>

<div class="touchpad" id="touchpad" aria-hidden="true">
  <div class="cluster">
    <button class="pad" id="padLeft" aria-label="move left">◀</button>
    <button class="pad" id="padRight" aria-label="move right">▶</button>
  </div>
  <div class="cluster">
    <button class="pad jump" id="padJump" aria-label="jump">JUMP</button>
  </div>
</div>

<script>
'use strict';

// ═════════════════════════════════════════════════════════════════════════
// glitch tower escape — vertical platformer on a crumbling motherboard
// player climbs upward, platforms generate procedurally, some crumble,
// hazards (zap arcs, falling capacitors) escalate with height
// ═════════════════════════════════════════════════════════════════════════

const bg = document.getElementById('bgCanvas').getContext('2d');
const ctx = document.getElementById('gameCanvas').getContext('2d');
const fx = document.getElementById('fxCanvas').getContext('2d');

let W = 0, H = 0, DPR = 1;
function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  for (const c of [bg.canvas, ctx.canvas, fx.canvas]){
    c.width = Math.floor(W * DPR);
    c.height = Math.floor(H * DPR);
    c.style.width = W + 'px';
    c.style.height = H + 'px';
  }
  bg.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  fx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

// ── INPUT ────────────────────────────────────────────────────────────────
const input = { left: 0, right: 0, jump: 0 };
let jumpJustPressed = false;
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  switch (e.code){
    case 'ArrowLeft':  case 'KeyA': input.left = 1; break;
    case 'ArrowRight': case 'KeyD': input.right = 1; break;
    case 'ArrowUp':    case 'KeyW':
    case 'Space':                   if (!input.jump) jumpJustPressed = true;
                                    input.jump = 1; e.preventDefault(); break;
    case 'KeyM': muted = !muted; break;
    case 'Escape': if (gameState !== 'menu'){ endGame(); } break;
  }
});
document.addEventListener('keyup', (e) => {
  switch (e.code){
    case 'ArrowLeft':  case 'KeyA': input.left = 0; break;
    case 'ArrowRight': case 'KeyD': input.right = 0; break;
    case 'ArrowUp':    case 'KeyW':
    case 'Space':                   input.jump = 0; break;
  }
});
function bindTouch(el, set, isJump){
  if (!el) return;
  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (isJump && !input.jump) jumpJustPressed = true;
    set(1); el.classList.add('pressed');
  }, {passive:false});
  el.addEventListener('touchend',   (e) => { e.preventDefault(); set(0); el.classList.remove('pressed'); }, {passive:false});
  el.addEventListener('mousedown',  (e) => { e.preventDefault(); if (isJump && !input.jump) jumpJustPressed = true; set(1); el.classList.add('pressed'); });
  el.addEventListener('mouseup',    (e) => { e.preventDefault(); set(0); el.classList.remove('pressed'); });
  el.addEventListener('mouseleave', () => { set(0); el.classList.remove('pressed'); });
}
bindTouch(document.getElementById('padLeft'),  (v) => input.left = v, false);
bindTouch(document.getElementById('padRight'), (v) => input.right = v, false);
bindTouch(document.getElementById('padJump'),  (v) => input.jump = v, true);

// ── AUDIO ────────────────────────────────────────────────────────────────
let actx = null, masterGain = null;
let droneOsc = null, droneGain = null, droneFilter = null;
let muted = false;

function ensureAudio(){
  if (actx) return actx;
  try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch(e){ return null; }
  masterGain = actx.createGain(); masterGain.gain.value = 0.55;
  masterGain.connect(actx.destination);
  // electrical hum — square wave at low freq through a swept lowpass
  droneOsc = actx.createOscillator();
  droneOsc.type = 'square';
  droneOsc.frequency.value = 55;
  const sub = actx.createOscillator();
  sub.type = 'sine';
  sub.frequency.value = 110;
  droneFilter = actx.createBiquadFilter();
  droneFilter.type = 'lowpass';
  droneFilter.frequency.value = 320;
  droneFilter.Q.value = 1.2;
  droneGain = actx.createGain();
  droneGain.gain.value = 0;
  droneOsc.connect(droneFilter);
  sub.connect(droneFilter);
  droneFilter.connect(droneGain);
  droneGain.connect(masterGain);
  droneOsc.start(); sub.start();
  return actx;
}
function updateDrone(intensity){
  if (!actx || muted) return;
  droneGain.gain.setTargetAtTime(0.05 + intensity * 0.07, actx.currentTime, 0.5);
  droneFilter.frequency.setTargetAtTime(300 + intensity * 700, actx.currentTime, 0.3);
}
function sfxJump(){
  if (!actx || muted) return;
  const t = actx.currentTime;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(420, t);
  o.frequency.exponentialRampToValueAtTime(880, t + 0.14);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.14, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.2);
}
function sfxLand(){
  if (!actx || muted) return;
  const t = actx.currentTime;
  const len = Math.floor(actx.sampleRate * 0.1);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 2);
  const src = actx.createBufferSource(); src.buffer = buf;
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 400;
  const g = actx.createGain(); g.gain.value = 0.16;
  src.connect(lp); lp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + 0.12);
}
function sfxCrumble(){
  if (!actx || muted) return;
  const t = actx.currentTime;
  const len = Math.floor(actx.sampleRate * 0.3);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 1.4);
  const src = actx.createBufferSource(); src.buffer = buf;
  const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2200;
  const g = actx.createGain(); g.gain.value = 0.16;
  src.connect(hp); hp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + 0.32);
}
function sfxZap(){
  if (!actx || muted) return;
  const t = actx.currentTime;
  // bandpass noise burst at high freq + descending square chirp
  const len = Math.floor(actx.sampleRate * 0.22);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 1.0);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 4200; bp.Q.value = 8;
  const g = actx.createGain(); g.gain.value = 0.22;
  src.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + 0.24);
  const o = actx.createOscillator();
  const og = actx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(2200, t);
  o.frequency.exponentialRampToValueAtTime(560, t + 0.18);
  og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.14, t + 0.005);
  og.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
  o.connect(og); og.connect(masterGain);
  o.start(t); o.stop(t + 0.22);
}
function sfxDeath(){
  if (!actx || muted) return;
  const t = actx.currentTime;
  // chiptune game-over: descending square notes
  let f = 460;
  for (let i = 0; i < 5; i++){
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = 'square';
    o.frequency.value = f;
    const dt = i * 0.16;
    g.gain.setValueAtTime(0.0001, t + dt);
    g.gain.exponentialRampToValueAtTime(0.16, t + dt + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dt + 0.18);
    o.connect(g); g.connect(masterGain);
    o.start(t + dt); o.stop(t + dt + 0.2);
    f *= 0.75;
  }
}

// ── PHYSICS / TUNING ─────────────────────────────────────────────────────
const GRAVITY = 1700;
const MOVE_ACC = 1600;
const MOVE_MAX = 280;
const GROUND_FRIC = 12;
const AIR_FRIC = 1.4;
const JUMP_IMPULSE = -680;
const JUMP_HOLD_ACC = -1500;      // extra upward acc while ↑ held just after launch
const JUMP_HOLD_TIME = 0.18;
const COYOTE = 0.12;
const JUMP_BUFFER = 0.10;
const PLAYER_W = 22, PLAYER_H = 28;

// ── WORLD ────────────────────────────────────────────────────────────────
// world space: y INCREASES downward, but the player climbs by decreasing y.
// camera follows player upward.
let player = null;
let platforms = [];    // each: { x, y, w, kind:'chip'|'capacitor'|'resistor'|'fragile', state:'ok'|'cracking'|'gone', timer, seed }
let hazards = [];      // each: { kind:'arc'|'fallcap', ... }
let particles = [];
let camY = 0;          // top edge of screen in world y
let gameState = 'menu';
let score = 0;
let bestHeight = 0;
let startY = 0;
let highestReached = 0;
let lastFrame = performance.now();

// load best from localStorage
try {
  const b = parseInt(localStorage.getItem('glitch-tower-best') || '0', 10);
  if (!isNaN(b)) bestHeight = b;
} catch(e) {}
document.getElementById('best').textContent = bestHeight + 'm';
document.getElementById('endBest').textContent = bestHeight + 'm';

// player factory
function newPlayer(){
  return {
    x: W / 2 - PLAYER_W / 2,
    y: startY - PLAYER_H,
    vx: 0, vy: 0,
    onGround: false,
    lastGroundT: -10,
    lastJumpReqT: -10,
    holdJumpTime: 0,
    facing: 1,
    alive: true,
    blinkPhase: Math.random() * Math.PI * 2,
  };
}

// platform factory
function newPlatform(x, y, w, kind){
  return { x, y, w, kind: kind || 'chip',
           state: 'ok', timer: 0,
           seed: Math.floor(Math.random() * 1e6),
           legPattern: Math.random() < 0.5 };
}

function resetGame(){
  startY = H - 80;
  platforms = [];
  hazards = [];
  particles = [];
  // starting platform: wide chip across the bottom
  platforms.push(newPlatform(W * 0.1, startY, W * 0.8, 'chip'));
  // seed a few platforms above
  let y = startY - 80;
  let lastX = W / 2 - 60;
  for (let i = 0; i < 50; i++){
    const w = 70 + Math.random() * 90;
    const dx = (Math.random() - 0.5) * 220;
    let x = lastX + dx;
    if (x < 8) x = 8;
    if (x + w > W - 8) x = W - 8 - w;
    const kindRoll = Math.random();
    let kind;
    if (i < 4) kind = 'chip';            // first few are stable
    else if (kindRoll < 0.45) kind = 'chip';
    else if (kindRoll < 0.65) kind = 'capacitor';
    else if (kindRoll < 0.82) kind = 'resistor';
    else kind = 'fragile';
    platforms.push(newPlatform(x, y, w, kind));
    lastX = x;
    y -= 70 + Math.random() * 50;
  }
  player = newPlayer();
  camY = 0;
  score = 0;
  highestReached = 0;
  document.getElementById('endOverlay').classList.remove('show');
  document.getElementById('endOverlay').setAttribute('aria-hidden', 'true');
}

function startGame(){
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
  resetGame();
  gameState = 'playing';
  document.getElementById('startOverlay').classList.add('hide');
}

function endGame(){
  if (gameState === 'ended') return;
  gameState = 'ended';
  sfxDeath();
  // save best
  const h = Math.max(0, Math.floor((startY - highestReached) / 12));
  if (h > bestHeight){
    bestHeight = h;
    try { localStorage.setItem('glitch-tower-best', String(bestHeight)); } catch(e){}
  }
  document.getElementById('endHeight').textContent = h + 'm';
  document.getElementById('endScore').textContent = score.toLocaleString();
  document.getElementById('endBest').textContent = bestHeight + 'm';
  document.getElementById('best').textContent = bestHeight + 'm';
  // dramatic end-title scramble
  const titles = ['SEGFAULT', 'STACK SMASH', 'KERNEL PANIC', 'NULLPTR', 'BUS ERROR', 'OUT OF SCOPE'];
  document.getElementById('endTitle').textContent = titles[Math.floor(Math.random() * titles.length)];
  document.getElementById('endOverlay').classList.add('show');
  document.getElementById('endOverlay').setAttribute('aria-hidden', 'false');
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// ── PROCEDURAL GENERATION ────────────────────────────────────────────────
// keep ~50 platforms above the camera at all times
function maintainPlatforms(){
  // remove off-screen below (anything below camY + H + 200)
  for (let i = platforms.length - 1; i >= 0; i--){
    if (platforms[i].y > camY + H + 300 && platforms[i].state !== 'cracking') platforms.splice(i, 1);
  }
  // find topmost
  let topY = startY;
  for (const p of platforms){ if (p.y < topY) topY = p.y; }
  // extend upward until we have plenty of platforms above the player
  while (topY > player.y - H * 3){
    const dy = 70 + Math.random() * 50;
    const newY = topY - dy;
    // pick x near the previous topmost — limit reach so platforms feel scattered but reachable
    let prevX = W / 2;
    for (const p of platforms){ if (Math.abs(p.y - topY) < 1) prevX = p.x + p.w / 2; }
    const w = 60 + Math.random() * 100;
    const dx = (Math.random() - 0.5) * 260;
    let x = prevX + dx - w / 2;
    if (x < 8) x = 8;
    if (x + w > W - 8) x = W - 8 - w;
    // kind weighted by height — higher = more fragile / capacitor / resistor
    const heightFrac = Math.min(1, (startY - newY) / 6000);
    const kindRoll = Math.random();
    let kind;
    if (kindRoll < 0.40 - heightFrac * 0.18) kind = 'chip';
    else if (kindRoll < 0.62) kind = 'capacitor';
    else if (kindRoll < 0.80) kind = 'resistor';
    else kind = 'fragile';
    platforms.push(newPlatform(x, newY, w, kind));
    topY = newY;
  }
  // cull excess hazards far below
  for (let i = hazards.length - 1; i >= 0; i--){
    if (hazards[i].y > camY + H + 400) hazards.splice(i, 1);
  }
}

// ── HAZARDS ──────────────────────────────────────────────────────────────
// arc: stationary electric arc between two PCB pads, briefly fires
// fallcap: capacitor that detaches and falls from above
let hazardTimer = 1.2;
function spawnHazardTick(dt){
  // intensity grows with height
  const h = (startY - player.y);
  const intensity = Math.min(1, h / 4500);
  hazardTimer -= dt;
  if (hazardTimer > 0) return;
  hazardTimer = (1.8 - intensity * 1.0) + Math.random() * (1.4 - intensity * 0.5);
  // 50/50 arc vs fallcap once intensity > 0.2
  const roll = Math.random();
  if (intensity > 0.2 && roll < 0.45){
    spawnFallingCapacitor();
  } else if (intensity > 0.1){
    spawnArc();
  }
}

function spawnArc(){
  // an arc between two platforms above the player, fires after a brief warning
  const candidates = platforms.filter(p => p.y < player.y - 50 && p.y > player.y - H * 1.8);
  if (candidates.length < 2) return;
  const p1 = candidates[Math.floor(Math.random() * candidates.length)];
  const others = candidates.filter(c => c !== p1 && Math.abs(c.y - p1.y) < 60 && Math.abs((c.x + c.w/2) - (p1.x + p1.w/2)) < 240);
  if (others.length === 0) return;
  const p2 = others[Math.floor(Math.random() * others.length)];
  hazards.push({
    kind: 'arc',
    x1: p1.x + p1.w / 2, y1: p1.y - 4,
    x2: p2.x + p2.w / 2, y2: p2.y - 4,
    warnT: 0.7,
    activeT: 0.5,
    age: 0,
    seed: Math.floor(Math.random() * 1e6),
  });
}

function spawnFallingCapacitor(){
  const x = 30 + Math.random() * (W - 60);
  hazards.push({
    kind: 'fallcap',
    x, y: player.y - H * 0.9,
    vy: 80 + Math.random() * 60,
    age: 0,
    spin: Math.random() * Math.PI * 2,
    spinVel: (Math.random() - 0.5) * 6,
    warnUntil: 1.4,
  });
}

// ── PHYSICS STEP ─────────────────────────────────────────────────────────
function step(dt){
  if (!player.alive) return;
  const now = performance.now() / 1000;

  // horizontal accel
  const dir = (input.right - input.left);
  if (dir !== 0){
    player.vx += dir * MOVE_ACC * dt;
    player.facing = dir > 0 ? 1 : -1;
  }
  // friction
  const fric = player.onGround ? GROUND_FRIC : AIR_FRIC;
  player.vx -= player.vx * Math.min(1, fric * dt);
  if (player.vx > MOVE_MAX) player.vx = MOVE_MAX;
  if (player.vx < -MOVE_MAX) player.vx = -MOVE_MAX;

  // gravity
  player.vy += GRAVITY * dt;

  // jump buffer + coyote
  if (jumpJustPressed){
    player.lastJumpReqT = now;
    jumpJustPressed = false;
  }
  const canJump = (now - player.lastGroundT) < COYOTE;
  const wantsJump = (now - player.lastJumpReqT) < JUMP_BUFFER;
  if (canJump && wantsJump){
    player.vy = JUMP_IMPULSE;
    player.onGround = false;
    player.lastGroundT = -10;     // consume coyote
    player.lastJumpReqT = -10;    // consume buffer
    player.holdJumpTime = 0;
    sfxJump();
    // dust puff
    for (let k = 0; k < 6; k++){
      const a = Math.PI + (Math.random() - 0.5) * 1.6;
      particles.push({
        x: player.x + PLAYER_W / 2, y: player.y + PLAYER_H,
        vx: Math.cos(a) * 60, vy: Math.sin(a) * 60 - 40,
        r: 1.6 + Math.random() * 1.4, life: 0.35, age: 0,
        color: '#6dff8c',
      });
    }
  }
  // variable jump height — extra upward acc while ↑ held shortly after launch
  if (input.jump && player.vy < 0 && player.holdJumpTime < JUMP_HOLD_TIME){
    player.vy += JUMP_HOLD_ACC * dt;
    player.holdJumpTime += dt;
  }

  // move + collide
  player.onGround = false;
  // X first
  player.x += player.vx * dt;
  if (player.x < 4){ player.x = 4; player.vx = 0; }
  if (player.x + PLAYER_W > W - 4){ player.x = W - 4 - PLAYER_W; player.vx = 0; }
  // Y next, with platform top collision (only when moving down)
  const prevY = player.y;
  player.y += player.vy * dt;
  if (player.vy > 0){
    for (const p of platforms){
      if (p.state === 'gone') continue;
      if (player.x + PLAYER_W <= p.x + 2) continue;
      if (player.x >= p.x + p.w - 2) continue;
      const platTop = p.y;
      if (prevY + PLAYER_H <= platTop + 0.5 && player.y + PLAYER_H >= platTop){
        player.y = platTop - PLAYER_H;
        player.vy = 0;
        player.onGround = true;
        player.lastGroundT = now;
        // landing — kick the platform's crumble timer for fragile kinds
        if (p.kind === 'fragile' || p.state === 'cracking'){
          if (p.state === 'ok'){
            p.state = 'cracking';
            p.timer = 0;
            sfxCrumble();
          }
        }
        if (Math.abs(player.vy) < 1 && prevY + PLAYER_H < platTop - 1){
          // hard landing — small particle pop
          for (let k = 0; k < 5; k++){
            const a = Math.PI + (Math.random() - 0.5) * 1.4;
            particles.push({
              x: player.x + PLAYER_W / 2, y: platTop,
              vx: Math.cos(a) * 40, vy: Math.sin(a) * 30 - 30,
              r: 1.6 + Math.random() * 1.4, life: 0.3, age: 0,
              color: '#6dff8c',
            });
          }
          sfxLand();
        }
      }
    }
  }

  // update crumbling platforms
  for (let i = platforms.length - 1; i >= 0; i--){
    const p = platforms[i];
    if (p.state === 'cracking'){
      p.timer += dt;
      // crumble particles
      if (Math.random() < 0.4){
        particles.push({
          x: p.x + Math.random() * p.w,
          y: p.y + 14,
          vx: (Math.random() - 0.5) * 40,
          vy: 60 + Math.random() * 80,
          r: 1 + Math.random() * 1.6, life: 0.7, age: 0,
          color: '#1c5c2e',
        });
      }
      if (p.timer > 0.55){
        p.state = 'gone';
        // small puff
        for (let k = 0; k < 16; k++){
          const a = Math.random() * Math.PI * 2;
          particles.push({
            x: p.x + p.w / 2, y: p.y + 8,
            vx: Math.cos(a) * (80 + Math.random() * 60),
            vy: Math.sin(a) * (50 + Math.random() * 60) - 30,
            r: 1.4 + Math.random() * 1.6, life: 0.7, age: 0,
            color: Math.random() < 0.5 ? '#6dff8c' : '#1c5c2e',
          });
        }
      }
    }
  }

  // hazards
  spawnHazardTick(dt);
  for (let i = hazards.length - 1; i >= 0; i--){
    const h = hazards[i];
    h.age += dt;
    if (h.kind === 'arc'){
      if (h.age > h.warnT + h.activeT){ hazards.splice(i, 1); continue; }
      // active phase: collision check (line segment between p1 and p2 vs player AABB)
      if (h.age > h.warnT){
        if (lineHitsPlayer(h.x1, h.y1, h.x2, h.y2, player)){
          killPlayer('zap');
        }
      }
    } else if (h.kind === 'fallcap'){
      h.spin += h.spinVel * dt;
      h.vy += 600 * dt;   // gravity on the cap
      h.y += h.vy * dt;
      // collision (player AABB vs cap circle ~14r)
      const cx = h.x, cy = h.y;
      const px = player.x + PLAYER_W/2, py = player.y + PLAYER_H/2;
      if (Math.abs(cx - px) < 16 && Math.abs(cy - py) < 16){
        killPlayer('cap');
      }
      // hits a platform → shatter
      let landed = false;
      for (const p of platforms){
        if (p.state === 'gone') continue;
        if (h.x > p.x && h.x < p.x + p.w && h.y > p.y - 4 && h.y < p.y + 4){
          landed = true; break;
        }
      }
      if (landed || h.y > camY + H + 60){
        // shatter sparks
        if (landed){
          for (let k = 0; k < 14; k++){
            const a = Math.random() * Math.PI * 2;
            particles.push({ x: h.x, y: h.y, vx: Math.cos(a) * 120, vy: Math.sin(a) * 120 - 60,
                             r: 1.4, life: 0.5, age: 0, color: '#ffd86a' });
          }
        }
        hazards.splice(i, 1);
      }
    }
  }

  // particle update
  for (let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.age += dt;
    if (p.age >= p.life){ particles.splice(i, 1); continue; }
    p.vy += 500 * dt * 0.6;
    p.vx *= 0.98; p.vy *= 0.98;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }

  // camera follow — keep player at ~50% screen y, with a smooth lerp
  const targetCamY = player.y - H * 0.5;
  camY += (targetCamY - camY) * Math.min(1, dt * 4);

  // height tracking
  if (player.y < highestReached || highestReached === 0) highestReached = player.y;
  const h = Math.max(0, Math.floor((startY - highestReached) / 12));
  document.getElementById('height').textContent = h + 'm';
  // score: height + bonuses for jumping on platforms (handled implicitly)
  score = h * 10;
  document.getElementById('score').textContent = score.toLocaleString();
  // drone tracks height intensity
  updateDrone(Math.min(1, h / 500));

  // fall off the bottom → death
  if (player.y > camY + H + 40){
    killPlayer('fall');
  }

  // platform generation extension as we climb
  maintainPlatforms();
}

function lineHitsPlayer(x1, y1, x2, y2, pl){
  // expand player AABB by 6px (arc has some thickness)
  const minX = pl.x - 6, maxX = pl.x + PLAYER_W + 6;
  const minY = pl.y - 6, maxY = pl.y + PLAYER_H + 6;
  return segmentIntersectsAABB(x1, y1, x2, y2, minX, minY, maxX, maxY);
}
function segmentIntersectsAABB(x1, y1, x2, y2, minX, minY, maxX, maxY){
  // Cohen-Sutherland-ish — if either endpoint inside, hit. otherwise clip and check.
  if (x1 >= minX && x1 <= maxX && y1 >= minY && y1 <= maxY) return true;
  if (x2 >= minX && x2 <= maxX && y2 >= minY && y2 <= maxY) return true;
  // test against each edge by parameter t
  const edges = [
    [minX, minY, maxX, minY], [maxX, minY, maxX, maxY],
    [maxX, maxY, minX, maxY], [minX, maxY, minX, minY],
  ];
  for (const e of edges){
    if (segSegIntersect(x1, y1, x2, y2, e[0], e[1], e[2], e[3])) return true;
  }
  return false;
}
function segSegIntersect(ax, ay, bx, by, cx, cy, dx, dy){
  const r = { x: bx - ax, y: by - ay };
  const s = { x: dx - cx, y: dy - cy };
  const denom = r.x * s.y - r.y * s.x;
  if (denom === 0) return false;
  const t = ((cx - ax) * s.y - (cy - ay) * s.x) / denom;
  const u = ((cx - ax) * r.y - (cy - ay) * r.x) / denom;
  return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

function killPlayer(cause){
  if (!player.alive) return;
  player.alive = false;
  // explode particles
  for (let k = 0; k < 38; k++){
    const a = Math.random() * Math.PI * 2;
    const s = 140 + Math.random() * 320;
    particles.push({
      x: player.x + PLAYER_W / 2, y: player.y + PLAYER_H / 2,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      r: 2 + Math.random() * 2.4, life: 0.8 + Math.random() * 0.5, age: 0,
      color: cause === 'zap' ? '#b6f0ff' : cause === 'cap' ? '#ffd86a' : '#6dff8c',
    });
  }
  setTimeout(endGame, 350);
}

// ── BACKGROUND (motherboard scrolls with the camera, parallax-fast) ──────
const traceSeed = [];
function ensureTraceSeed(){
  if (traceSeed.length > 0) return;
  for (let i = 0; i < 80; i++){
    traceSeed.push({
      x: Math.random(),
      yOff: Math.random() * 1400,
      len: 80 + Math.random() * 280,
      bends: Math.floor(Math.random() * 3) + 1,
      hue: 0.85 + Math.random() * 0.3,   // intensity multiplier
      thick: 1.5 + Math.random() * 1.2,
      lane: Math.floor(Math.random() * 5),
    });
  }
}

function drawBackground(now){
  bg.clearRect(0, 0, W, H);
  // base board
  const boardG = bg.createLinearGradient(0, 0, 0, H);
  boardG.addColorStop(0, '#0d4326');
  boardG.addColorStop(0.5, '#0a3b21');
  boardG.addColorStop(1, '#06281a');
  bg.fillStyle = boardG;
  bg.fillRect(0, 0, W, H);
  // grain dots (vias)
  bg.fillStyle = 'rgba(255, 244, 168, 0.16)';
  const gridStep = 28;
  const offY = ((-camY * 0.85) % gridStep + gridStep) % gridStep;
  for (let y = -offY; y < H + gridStep; y += gridStep){
    for (let x = 0; x < W + gridStep; x += gridStep){
      // skip ~80% to keep things sparse
      if (((x / gridStep | 0) + (y / gridStep | 0)) % 4 !== 0) continue;
      bg.beginPath();
      bg.arc(x + (y % 2 ? gridStep/2 : 0), y, 1, 0, Math.PI * 2);
      bg.fill();
    }
  }
  // PCB traces — vertical zig-zag lines scrolling with camera
  ensureTraceSeed();
  bg.lineCap = 'round';
  bg.lineJoin = 'round';
  for (const s of traceSeed){
    const lx = s.x * W;
    const offset = ((s.yOff - camY * 0.85) % H);
    let y = offset - 200;
    bg.strokeStyle = `rgba(109, 255, 140, ${(0.22 * s.hue).toFixed(2)})`;
    bg.lineWidth = s.thick;
    bg.shadowColor = 'rgba(109, 255, 140, 0.4)';
    bg.shadowBlur = 6;
    bg.beginPath();
    let cx = lx;
    bg.moveTo(cx, y);
    for (let b = 0; b < s.bends; b++){
      const dy = s.len * (0.4 + Math.random() * 0);  // deterministic since we use seed in renderBumpY below
      y += s.len / s.bends;
      cx += (b % 2 === 0 ? 1 : -1) * 24;
      bg.lineTo(cx, y);
    }
    bg.stroke();
  }
  bg.shadowBlur = 0;
  // soldier joints occasionally
  bg.fillStyle = 'rgba(216, 201, 122, 0.5)';
  for (let i = 0; i < 30; i++){
    const sx = (i * 173 + 41) % W;
    const sy = ((i * 89 - camY * 0.85) % (H + 60));
    const yy = (sy + H + 60) % (H + 60) - 30;
    bg.beginPath();
    bg.arc(sx, yy, 1.4, 0, Math.PI * 2);
    bg.fill();
  }
}

// ── WORLD RENDER ─────────────────────────────────────────────────────────
function w2s(x, y){
  return [x, y - camY];
}

function drawPlatforms(){
  for (const p of platforms){
    if (p.state === 'gone') continue;
    const [sx, sy] = w2s(p.x, p.y);
    if (sy > H + 40 || sy < -40) continue;
    if (p.kind === 'chip') drawChip(sx, sy, p.w, p.seed, p.legPattern, p.state === 'cracking', p.timer);
    else if (p.kind === 'capacitor') drawCapacitor(sx, sy, p.w, p.seed, p.state === 'cracking', p.timer);
    else if (p.kind === 'resistor') drawResistor(sx, sy, p.w, p.seed, p.state === 'cracking', p.timer);
    else if (p.kind === 'fragile') drawFragile(sx, sy, p.w, p.seed, p.state === 'cracking', p.timer);
  }
}

function shakeJitter(state, t){
  if (state !== 'cracking') return { dx: 0, dy: 0 };
  const k = Math.min(1, t / 0.55);
  const amp = 1 + k * 3;
  return { dx: (Math.random() - 0.5) * amp, dy: (Math.random() - 0.5) * amp };
}

function drawChip(x, y, w, seed, legPattern, cracking, t){
  const j = shakeJitter(cracking ? 'cracking' : 'ok', t);
  ctx.save();
  ctx.translate(x + j.dx, y + j.dy);
  const h = 18;
  // legs (silver pins) — top + bottom
  ctx.fillStyle = '#b9c6cf';
  const pinW = 4;
  const pinStep = 9;
  for (let i = pinStep / 2; i < w - 2; i += pinStep){
    if (legPattern){
      ctx.fillRect(i - pinW / 2, -4, pinW, 4);
    }
    ctx.fillRect(i - pinW / 2, h, pinW, 4);
  }
  // chip body
  ctx.fillStyle = '#11161e';
  ctx.fillRect(0, 0, w, h);
  // body outline
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, w - 1, h - 1);
  // notch dot
  ctx.fillStyle = '#1c5c2e';
  ctx.beginPath();
  ctx.arc(7, 6, 1.8, 0, Math.PI * 2);
  ctx.fill();
  // chip text
  ctx.fillStyle = 'rgba(216, 201, 122, 0.85)';
  ctx.font = "7px 'Share Tech Mono', monospace";
  ctx.fillText(((seed % 10000) + 1000).toString(16).toUpperCase().slice(0, 5), 14, 12);
  // LED on the side
  ctx.fillStyle = (seed % 3 === 0) ? '#ff3a5e' : (seed % 3 === 1) ? '#6dff8c' : '#ffd86a';
  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(w - 6, 5, 1.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // cracks if cracking
  if (cracking){
    const k = Math.min(1, t / 0.55);
    ctx.strokeStyle = `rgba(255, 58, 94, ${0.5 + k * 0.5})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    let cx = 6;
    while (cx < w - 6){
      ctx.moveTo(cx, 1);
      ctx.lineTo(cx + 5 + Math.random() * 4, h - 1);
      cx += 8 + Math.random() * 8;
    }
    ctx.stroke();
  }
  ctx.restore();
}

function drawCapacitor(x, y, w, seed, cracking, t){
  const j = shakeJitter(cracking ? 'cracking' : 'ok', t);
  ctx.save();
  ctx.translate(x + j.dx, y + j.dy);
  // wide flat capacitor — drawn as 2 cylinders side by side spanning the width
  const radius = 9;
  const count = Math.max(1, Math.floor(w / 22));
  const cap = w / count;
  for (let i = 0; i < count; i++){
    const cx = i * cap + cap / 2;
    // body
    ctx.fillStyle = '#1b2a4f';
    ctx.fillRect(cx - cap * 0.42, -2, cap * 0.84, 18);
    // top rim
    ctx.fillStyle = '#314978';
    ctx.fillRect(cx - cap * 0.42, -2, cap * 0.84, 3);
    // ring
    ctx.fillStyle = '#fff4a8';
    ctx.fillRect(cx - cap * 0.42, 8, cap * 0.84, 1.6);
    // negative stripe (polarity mark)
    ctx.fillStyle = '#a8b4e0';
    ctx.fillRect(cx - cap * 0.32, 11, cap * 0.18, 1.4);
    // top X marks
    ctx.strokeStyle = '#0a112a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 2, 0); ctx.lineTo(cx + 2, 0);
    ctx.moveTo(cx, -2); ctx.lineTo(cx, 2);
    ctx.stroke();
  }
  // outline
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, -2.5, w - 1, 19);
  if (cracking){
    const k = Math.min(1, t / 0.55);
    ctx.strokeStyle = `rgba(255, 58, 94, ${0.5 + k * 0.5})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    let cx = 6;
    while (cx < w - 6){
      ctx.moveTo(cx, -2);
      ctx.lineTo(cx + 4, 16);
      cx += 10;
    }
    ctx.stroke();
  }
  ctx.restore();
}

function drawResistor(x, y, w, seed, cracking, t){
  const j = shakeJitter(cracking ? 'cracking' : 'ok', t);
  ctx.save();
  ctx.translate(x + j.dx, y + j.dy);
  const h = 16;
  // pin tabs
  ctx.fillStyle = '#b9c6cf';
  ctx.fillRect(0, 6, 6, 4);
  ctx.fillRect(w - 6, 6, 6, 4);
  // body (capsule-ish)
  ctx.fillStyle = '#f0d8a8';
  ctx.beginPath();
  ctx.moveTo(6, 0);
  ctx.lineTo(w - 6, 0);
  ctx.quadraticCurveTo(w - 2, 0, w - 2, h / 2);
  ctx.quadraticCurveTo(w - 2, h, w - 6, h);
  ctx.lineTo(6, h);
  ctx.quadraticCurveTo(2, h, 2, h / 2);
  ctx.quadraticCurveTo(2, 0, 6, 0);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#7a5c30';
  ctx.lineWidth = 1;
  ctx.stroke();
  // color bands (typical 4-band resistor)
  const bandColors = ['#1a0d05', '#a85a18', '#d83a3a', '#f7a836', '#ffd86a', '#6dff8c'];
  const bandCount = 4;
  const bandStart = 8;
  const bandSpacing = (w - 16) / (bandCount + 1);
  for (let i = 0; i < bandCount; i++){
    const bx = bandStart + (i + 1) * bandSpacing - 2;
    ctx.fillStyle = bandColors[(seed + i * 37) % bandColors.length];
    ctx.fillRect(bx, 1, 3, h - 2);
  }
  if (cracking){
    const k = Math.min(1, t / 0.55);
    ctx.strokeStyle = `rgba(255, 58, 94, ${0.5 + k * 0.5})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(w / 2 - 6, 1); ctx.lineTo(w / 2 + 8, h - 1);
    ctx.moveTo(w / 2 + 3, 1); ctx.lineTo(w / 2 - 5, h - 1);
    ctx.stroke();
  }
  ctx.restore();
}

function drawFragile(x, y, w, seed, cracking, t){
  const j = shakeJitter(cracking ? 'cracking' : 'ok', t);
  ctx.save();
  ctx.translate(x + j.dx, y + j.dy);
  // ribbon cable look — striped, semi-translucent, hint of unreliability
  const h = 12;
  for (let i = 0; i < 7; i++){
    const r = i / 7;
    const hue = 0 + Math.floor(r * 12) * 30;
    ctx.fillStyle = `hsla(${hue}, 80%, ${cracking ? 35 : 55}%, ${cracking ? 0.5 : 0.9})`;
    ctx.fillRect(0, i * (h / 7), w, h / 7);
  }
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, w - 1, h - 1);
  // glitchy slice
  if (cracking){
    const k = Math.min(1, t / 0.55);
    ctx.fillStyle = `rgba(255, 58, 94, ${0.4 + k * 0.6})`;
    const sliceY = (seed + Math.floor(performance.now() / 60)) % h;
    ctx.fillRect(0, sliceY, w, 2);
  }
  ctx.restore();
}

function drawPlayer(){
  const [sx, sy] = w2s(player.x, player.y);
  ctx.save();
  ctx.translate(sx, sy);
  // body — chunky "bit" character
  const w = PLAYER_W, h = PLAYER_H;
  // shadow underfoot
  ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
  ctx.beginPath();
  ctx.ellipse(w / 2, h + 4, w * 0.45, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  // outer chromatic stroke (RGB split)
  ctx.fillStyle = 'rgba(255, 45, 199, 0.6)';
  ctx.fillRect(-2, 0, w, h);
  ctx.fillStyle = 'rgba(0, 246, 255, 0.6)';
  ctx.fillRect(2, 0, w, h);
  // main body
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#9bff70');
  grad.addColorStop(1, '#3aa040');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = '#0a3b21';
  ctx.lineWidth = 1.4;
  ctx.strokeRect(0.5, 0.5, w - 1, h - 1);
  // face — two eyes (blink every ~3.5s)
  player.blinkPhase += 0.025;
  const blink = (Math.sin(player.blinkPhase * 0.6) > 0.985) ? 0.2 : 1.0;
  ctx.fillStyle = '#0a3b21';
  const eyeY = 9;
  const eyeR = 2.4;
  const dx = player.facing > 0 ? 1 : -1;
  ctx.beginPath();
  ctx.ellipse(7 + dx * 1, eyeY, eyeR, eyeR * blink, 0, 0, Math.PI * 2);
  ctx.ellipse(w - 7 + dx * 1, eyeY, eyeR, eyeR * blink, 0, 0, Math.PI * 2);
  ctx.fill();
  // sparkle on each eye
  ctx.fillStyle = '#fff4f6';
  if (blink > 0.5){
    ctx.fillRect(6 + dx, eyeY - 1, 1, 1);
    ctx.fillRect(w - 8 + dx, eyeY - 1, 1, 1);
  }
  // mouth — small bitmap depending on vy
  ctx.fillStyle = '#0a3b21';
  if (player.vy < -200){
    // surprised "o"
    ctx.fillRect(w/2 - 1, 16, 2, 2);
  } else if (player.vy > 400){
    // worried zigzag
    ctx.fillRect(w/2 - 3, 17, 6, 1);
  } else {
    // happy smirk
    ctx.fillRect(w/2 - 3, 17, 6, 1);
    ctx.fillRect(w/2 - 3 + (player.facing > 0 ? 3 : 0), 16, 1, 1);
  }
  // chip leg legs (look like a tiny chip)
  ctx.fillStyle = '#b9c6cf';
  ctx.fillRect(2, h, 3, 3);
  ctx.fillRect(w - 5, h, 3, 3);
  ctx.restore();
}

function drawHazards(){
  for (const h of hazards){
    if (h.kind === 'arc'){
      const [sx1, sy1] = w2s(h.x1, h.y1);
      const [sx2, sy2] = w2s(h.x2, h.y2);
      if (h.age < h.warnT){
        // warning — dashed thin line
        ctx.save();
        ctx.setLineDash([4, 5]);
        ctx.strokeStyle = `rgba(182, 240, 255, ${0.3 + Math.sin(h.age * 20) * 0.2})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      } else {
        // active arc — jagged lightning
        const segs = 14;
        ctx.save();
        ctx.strokeStyle = '#b6f0ff';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#b6f0ff';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        for (let i = 0; i <= segs; i++){
          const tt = i / segs;
          const x = sx1 + (sx2 - sx1) * tt + (Math.random() - 0.5) * 14;
          const y = sy1 + (sy2 - sy1) * tt + (Math.random() - 0.5) * 14;
          if (i === 0) ctx.moveTo(sx1, sy1);
          else ctx.lineTo(x, y);
        }
        ctx.lineTo(sx2, sy2);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
        // fire zap sfx once per arc activation
        if (!h.zapFired){
          h.zapFired = true;
          sfxZap();
        }
      }
    } else if (h.kind === 'fallcap'){
      const [sx, sy] = w2s(h.x, h.y);
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(h.spin);
      // shadow trail
      ctx.fillStyle = 'rgba(255, 216, 106, 0.5)';
      ctx.beginPath();
      ctx.arc(0, -8, 12, 0, Math.PI * 2);
      ctx.fill();
      // cap body
      ctx.fillStyle = '#1b2a4f';
      ctx.beginPath();
      ctx.arc(0, 0, 12, 0, Math.PI * 2);
      ctx.fill();
      // ring
      ctx.fillStyle = '#fff4a8';
      ctx.beginPath();
      ctx.arc(0, 0, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1b2a4f';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      // legs
      ctx.strokeStyle = '#b9c6cf';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(-4, 8); ctx.lineTo(-4, 18);
      ctx.moveTo(4, 8); ctx.lineTo(4, 18);
      ctx.stroke();
      ctx.restore();
      // warning indicator at the top of the screen if still off-screen above
      if (sy < 0){
        ctx.save();
        ctx.fillStyle = `rgba(255, 58, 94, ${0.5 + Math.sin(h.age * 24) * 0.3})`;
        ctx.beginPath();
        ctx.moveTo(sx - 8, 6); ctx.lineTo(sx + 8, 6); ctx.lineTo(sx, 18);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }
  }
}

function drawParticles(){
  for (const p of particles){
    const k = 1 - p.age / p.life;
    const [sx, sy] = w2s(p.x, p.y);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = k;
    ctx.beginPath();
    ctx.arc(sx, sy, p.r * (1 - p.age / (p.life * 2)), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── GLITCH FX OVERLAY ────────────────────────────────────────────────────
let glitchClock = 0;
function drawFx(dt){
  fx.clearRect(0, 0, W, H);
  glitchClock += dt;
  // occasional horizontal slice tear — every ~3s
  if (glitchClock > 3 + Math.random() * 4){
    glitchClock = 0;
    // do nothing here; the slice is drawn briefly within fxFlash below
  }
  // scanlines
  fx.fillStyle = 'rgba(109, 255, 140, 0.04)';
  for (let y = 0; y < H; y += 3){ fx.fillRect(0, y, W, 1); }
  // light rgb fringe at the edges (vignette)
  const grad = fx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.4, W/2, H/2, Math.max(W,H)*0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(255, 58, 94, 0.18)');
  fx.fillStyle = grad;
  fx.fillRect(0, 0, W, H);
}

// ── MAIN LOOP ────────────────────────────────────────────────────────────
function frame(now){
  const dt = Math.min(0.04, (now - lastFrame) / 1000);
  lastFrame = now;
  drawBackground(now);
  if (gameState === 'playing'){
    step(dt);
  }
  if (player){
    ctx.clearRect(0, 0, W, H);
    drawPlatforms();
    drawHazards();
    drawParticles();
    if (player.alive) drawPlayer();
  }
  drawFx(dt);
  requestAnimationFrame(frame);
}

// ── BOOT ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  fit();
});
fit();
resetGame();
gameState = 'menu';
requestAnimationFrame(frame);
</script>
