<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Skyline</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌃">
<meta property="og:title" content="Neon Skyline">
<meta property="og:description" content="Procedural pixel art city skyline with parallax neon layers.">
<meta property="og:url" content="https://sloppy.live/neon-skyline">
<meta property="og:image" content="https://emojicdn.elk.sh/🌃?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;background:#06020e;overflow:hidden}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}

#ui{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;flex-wrap:wrap;justify-content:center}
#ui button{
  font-family:'Silkscreen',monospace;font-size:9px;letter-spacing:1px;
  border:1px solid rgba(255,60,200,0.25);background:rgba(0,0,0,0.55);color:rgba(255,60,200,0.5);
  padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px);
}
#ui button:hover,#ui button.active{border-color:rgba(255,60,200,0.6);color:#ff60cc;background:rgba(255,60,200,0.08)}

#hint{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  font-family:'Silkscreen',monospace;font-size:8px;color:rgba(255,60,200,0.12);
  letter-spacing:2px;pointer-events:none;z-index:2;transition:opacity 2s;
}

a#back{position:fixed;bottom:8px;left:10px;font-size:9px;opacity:0.1;color:#402;text-decoration:none;z-index:5;font-family:monospace}
</style>
</head>
<body>
<div id="hint">CLICK TO REGENERATE</div>
<canvas id="c"></canvas>
<div id="ui">
  <button id="regen-btn">NEW CITY</button>
  <button id="theme-btn">THEME</button>
  <button id="speed-btn">SPEED</button>
  <button id="stars-btn">STARS</button>
</div>
<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
var C=document.getElementById('c');
var ctx=C.getContext('2d');

// Pixel scale — we render at low res for pixel art look
var PX=3;
var W,H,PW,PH;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  PW=Math.ceil(W/PX);PH=Math.ceil(H/PX);
  C.width=PW;C.height=PH;
  generate();
}

// --- THEMES ---
var themes=[
  {name:'Cyberpunk',sky:[6,2,14],horizon:[30,5,50],
   layers:[[255,40,180],[200,0,255],[0,200,255],[80,255,180]],
   windows:[[255,200,50],[0,255,200],[255,60,120],[100,180,255]],
   stars:[255,220,255]},
  {name:'Sunset',sky:[10,2,4],horizon:[60,15,10],
   layers:[[255,80,20],[255,40,60],[200,20,80],[120,10,60]],
   windows:[[255,255,100],[255,180,50],[255,100,30],[255,220,80]],
   stars:[255,200,180]},
  {name:'Ice',sky:[2,4,14],horizon:[5,15,40],
   layers:[[40,160,255],[20,100,200],[60,220,255],[100,255,255]],
   windows:[[200,240,255],[100,200,255],[150,255,255],[80,180,240]],
   stars:[200,220,255]},
  {name:'Toxic',sky:[2,8,2],horizon:[10,30,5],
   layers:[[80,255,40],[40,200,20],[120,255,80],[200,255,40]],
   windows:[[255,255,60],[180,255,40],[100,255,100],[220,255,80]],
   stars:[180,255,200]},
  {name:'Vapor',sky:[10,2,20],horizon:[40,10,50],
   layers:[[255,100,200],[100,80,255],[255,150,255],[80,200,255]],
   windows:[[255,200,255],[150,100,255],[255,150,200],[100,255,255]],
   stars:[255,200,255]},
];
var themeIdx=0;
var theme=themes[0];

// --- SPEED ---
var speeds=[0.3,0.7,1.5,0];
var speedIdx=0;
var speedLabel=['SLOW','MED','FAST','STOP'];

// --- STARS ---
var starsOn=true;
var starField=[];

function genStars(){
  starField=[];
  for(var i=0;i<120;i++){
    starField.push({
      x:Math.random()*PW*3,
      y:Math.random()*PH*0.55,
      b:0.3+Math.random()*0.7,
      blink:Math.random()*Math.PI*2,
      blinkSpeed:0.01+Math.random()*0.03,
      size:Math.random()<0.15?2:1
    });
  }
}

// --- LAYER DATA ---
var NUM_LAYERS=4;
var layers=[]; // each: {buildings:[], color:[], scrollX:0, speed:float, baseY:float}

function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}

// Chicago landmark templates (pixel proportions): shape='step' has setbacks
var LANDMARKS=[
  {name:'Willis',w:14,h:0.7,spire:12,shape:'step',steps:[{at:0.6,shrink:2},{at:0.8,shrink:2}]},
  {name:'Hancock',w:10,h:0.6,spire:8,shape:'taper',taperStart:0.3,taperPx:2},
  {name:'Trump',w:8,h:0.55,spire:6,shape:'normal'},
  {name:'Aon',w:12,h:0.5,spire:3,shape:'normal'},
  {name:'Aqua',w:14,h:0.48,spire:0,shape:'wave'},
];

function genBuildings(layerIdx){
  var buildings=[];
  var totalWidth=PW*3;
  var x=0;
  var minH,maxH,minW,maxW,gapChance;

  if(layerIdx===0){minH=PH*0.15;maxH=PH*0.35;minW=8;maxW=20;gapChance=0.1}
  else if(layerIdx===1){minH=PH*0.2;maxH=PH*0.45;minW=6;maxW=16;gapChance=0.08}
  else if(layerIdx===2){minH=PH*0.25;maxH=PH*0.55;minW=5;maxW=14;gapChance=0.05}
  else{minH=PH*0.3;maxH=PH*0.65;minW=4;maxW=12;gapChance=0.03}

  // Place 1-2 landmarks in the front two layers
  var landmarksPlaced=0;
  if(layerIdx>=2){
    var lmCount=randInt(1,2);
    var lmPool=LANDMARKS.slice();
    for(var li=0;li<lmCount&&lmPool.length>0;li++){
      var pick=randInt(0,lmPool.length-1);
      var lm=lmPool.splice(pick,1)[0];
      var lx=randInt(Math.floor(totalWidth*0.1),Math.floor(totalWidth*0.8));
      var lh=Math.floor(PH*lm.h);
      buildings.push({x:lx,w:lm.w,h:lh,spire:lm.spire,shape:lm.shape,
        steps:lm.steps,taperStart:lm.taperStart,taperPx:lm.taperPx,
        winW:Math.max(1,Math.floor(lm.w/4)),winH:Math.max(1,Math.floor(lh/5)),
        winSpacing:Math.max(2,Math.floor(lm.w/3)),winSeed:Math.random()*1000,landmark:true});
      landmarksPlaced++;
    }
  }

  while(x<totalWidth){
    if(Math.random()<gapChance){x+=randInt(2,6);continue}
    var w=randInt(minW,maxW);
    var h=randInt(Math.floor(minH),Math.floor(maxH));
    var spire=Math.random()<0.2?randInt(3,10):0;
    var winW=Math.max(1,Math.floor(w/4));
    var winH=Math.max(1,Math.floor(h/5));
    var winSpacing=Math.max(2,Math.floor(w/(winW+1)));
    buildings.push({x:x,w:w,h:h,spire:spire,shape:'normal',
      winW:winW,winH:winH,winSpacing:winSpacing,
      winSeed:Math.random()*1000});
    x+=w+randInt(1,3);
  }
  return buildings;
}

function generate(){
  genStars();
  layers=[];
  for(var i=0;i<NUM_LAYERS;i++){
    layers.push({
      buildings:genBuildings(i),
      color:theme.layers[i],
      scrollX:0,
      speed:(i+1)*0.15,
      baseY:PH-Math.floor(PH*0.02)*(NUM_LAYERS-i),
      alpha:0.3+i*0.2
    });
  }
}

// --- RENDER ---
function drawSky(){
  var sky=theme.sky;
  var hor=theme.horizon;
  for(var y=0;y<PH;y++){
    var t=y/PH;
    var t2=Math.pow(t,1.5);
    var r=Math.floor(sky[0]+(hor[0]-sky[0])*t2);
    var g=Math.floor(sky[1]+(hor[1]-sky[1])*t2);
    var b=Math.floor(sky[2]+(hor[2]-sky[2])*t2);
    ctx.fillStyle='rgb('+r+','+g+','+b+')';
    ctx.fillRect(0,y,PW,1);
  }
}

function drawStars(time){
  if(!starsOn)return;
  var sc=theme.stars;
  for(var i=0;i<starField.length;i++){
    var s=starField[i];
    var sx=((s.x-layers[0].scrollX*0.05)%PW+PW)%PW;
    var blink=(Math.sin(s.blink+time*s.blinkSpeed)+1)*0.5;
    var a=s.b*blink;
    if(a<0.05)continue;
    ctx.fillStyle='rgba('+sc[0]+','+sc[1]+','+sc[2]+','+a.toFixed(2)+')';
    ctx.fillRect(Math.floor(sx),Math.floor(s.y),s.size,s.size);
  }
}

function drawMoon(time){
  // Subtle moon in upper area
  var mx=Math.floor(PW*0.75);
  var my=Math.floor(PH*0.12);
  var mr=Math.floor(PH*0.04);
  var sc=theme.stars;
  // glow
  for(var gy=-mr*3;gy<=mr*3;gy++){
    for(var gx=-mr*3;gx<=mr*3;gx++){
      var d=Math.sqrt(gx*gx+gy*gy);
      if(d>mr*3)continue;
      var a=0.06*(1-d/(mr*3));
      if(a<0.01)continue;
      ctx.fillStyle='rgba('+sc[0]+','+sc[1]+','+sc[2]+','+a.toFixed(3)+')';
      ctx.fillRect(mx+gx,my+gy,1,1);
    }
  }
  // solid moon
  for(var dy=-mr;dy<=mr;dy++){
    for(var dx=-mr;dx<=mr;dx++){
      if(dx*dx+dy*dy<=mr*mr){
        ctx.fillStyle='rgba('+sc[0]+','+sc[1]+','+sc[2]+',0.7)';
        ctx.fillRect(mx+dx,my+dy,1,1);
      }
    }
  }
}

function drawLayer(layer,layerIdx,time){
  var col=layer.color;
  var baseY=layer.baseY;
  var ox=Math.floor(layer.scrollX)%((PW*3)||1);
  var wc=theme.windows[layerIdx];

  for(var bi=0;bi<layer.buildings.length;bi++){
    var b=layer.buildings[bi];
    var bx=b.x-ox;
    // wrap
    if(bx+b.w<-PW)continue;
    if(bx>PW*2)continue;
    // handle wrapping for seamless scroll
    var drawX=((bx%((PW*3)||1))+(PW*3))%(PW*3);
    if(drawX>PW+b.w)drawX-=PW*3;
    if(drawX+b.w<0)continue;
    if(drawX>PW)continue;

    var top=baseY-b.h;

    // Building body — darker shade
    var br=Math.floor(col[0]*0.2);
    var bg=Math.floor(col[1]*0.2);
    var bb=Math.floor(col[2]*0.2);
    var bShape=b.shape||'normal';
    var dx=Math.floor(drawX);
    ctx.fillStyle='rgb('+br+','+bg+','+bb+')';

    if(bShape==='step'&&b.steps){
      // Stepped setback building (Willis Tower style)
      var curW=b.w,curX=dx;
      var lastY=baseY;
      for(var si=0;si<b.steps.length;si++){
        var stepY=Math.floor(top+b.h*(1-b.steps[si].at));
        ctx.fillRect(curX,stepY,curW,lastY-stepY);
        lastY=stepY;
        var sh=b.steps[si].shrink||1;
        curX+=sh;curW-=sh*2;
      }
      ctx.fillRect(curX,Math.floor(top),curW,lastY-Math.floor(top));
    }else if(bShape==='taper'){
      // Tapered building (Hancock style)
      var tStart=b.taperStart||0.3;
      var tPx=b.taperPx||2;
      var splitY=Math.floor(top+b.h*tStart);
      ctx.fillRect(dx,splitY,b.w,baseY-splitY);
      // narrower top
      ctx.fillRect(dx+tPx,Math.floor(top),b.w-tPx*2,splitY-Math.floor(top));
    }else if(bShape==='wave'){
      // Wavy facade (Aqua Tower style) — simple pixel steps
      for(var wy=Math.floor(top);wy<baseY;wy++){
        var waveOff=Math.floor(Math.sin((wy-top)*0.4)*1.5);
        ctx.fillRect(dx+waveOff,wy,b.w,1);
      }
    }else{
      ctx.fillRect(dx,Math.floor(top),b.w,b.h);
    }

    // Edge highlight (left)
    ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+',0.25)';
    ctx.fillRect(dx,Math.floor(top),1,b.h);

    // Top edge
    ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(b.landmark?0.6:0.4)+')';
    ctx.fillRect(dx,Math.floor(top),b.w,1);

    // Spire
    if(b.spire>0){
      var sx=Math.floor(drawX+b.w/2);
      ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+',0.3)';
      ctx.fillRect(sx,Math.floor(top-b.spire),1,b.spire);
      // Blinking light on top
      var blinkA=(Math.sin(time*0.003+b.winSeed)+1)*0.5;
      ctx.fillStyle='rgba(255,40,40,'+blinkA.toFixed(2)+')';
      ctx.fillRect(sx,Math.floor(top-b.spire),1,1);
    }

    // Windows
    var wy=Math.floor(top)+2;
    var row=0;
    while(wy+2<baseY){
      var wx=Math.floor(drawX)+2;
      var col2=0;
      while(wx+1<drawX+b.w-1){
        // pseudo-random on/off
        var seed=Math.sin(b.winSeed+row*7.3+col2*13.7+layerIdx*31)*43758.5453;
        var lit=(seed-Math.floor(seed))>0.45;
        if(lit){
          var flicker=1;
          // occasional flicker
          if((seed*100-Math.floor(seed*100))>0.92){
            flicker=(Math.sin(time*0.01+seed*100)+1)*0.5;
          }
          ctx.fillStyle='rgba('+wc[0]+','+wc[1]+','+wc[2]+','+(0.5+flicker*0.5).toFixed(2)+')';
        }else{
          ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+',0.06)';
        }
        ctx.fillRect(wx,wy,1,1);
        wx+=b.winSpacing;
        col2++;
      }
      wy+=3;
      row++;
    }
  }

  // Neon glow line at base
  ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+',0.15)';
  ctx.fillRect(0,Math.floor(baseY),PW,1);
  ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+',0.06)';
  ctx.fillRect(0,Math.floor(baseY)+1,PW,2);
}

function drawReflection(){
  // Water/ground reflection at bottom
  var groundY=layers[NUM_LAYERS-1].baseY+1;
  var groundH=PH-groundY;
  if(groundH<=0)return;
  var col=theme.layers[NUM_LAYERS-1];
  for(var y=0;y<groundH;y++){
    var a=0.08*(1-y/groundH);
    ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+a.toFixed(3)+')';
    ctx.fillRect(0,groundY+y,PW,1);
  }
}

// --- ANIMATION ---
var time=0;

function frame(){
  time++;

  // Scroll layers
  var spd=speeds[speedIdx];
  for(var i=0;i<NUM_LAYERS;i++){
    layers[i].scrollX+=layers[i].speed*spd;
  }

  // Draw
  drawSky();
  drawMoon(time);
  drawStars(time);

  for(var i=0;i<NUM_LAYERS;i++){
    drawLayer(layers[i],i,time);
  }

  drawReflection();

  requestAnimationFrame(frame);
}

// --- CONTROLS ---
document.getElementById('regen-btn').addEventListener('click',function(){generate()});
document.getElementById('theme-btn').addEventListener('click',function(){
  themeIdx=(themeIdx+1)%themes.length;
  theme=themes[themeIdx];
  this.textContent=theme.name.toUpperCase();
  generate();
});
document.getElementById('speed-btn').addEventListener('click',function(){
  speedIdx=(speedIdx+1)%speeds.length;
  this.textContent=speedLabel[speedIdx];
});
document.getElementById('stars-btn').addEventListener('click',function(){
  starsOn=!starsOn;
  this.classList.toggle('active',starsOn);
});
document.getElementById('stars-btn').classList.add('active');

C.addEventListener('click',function(){generate()});

window.addEventListener('resize',resize);
resize();
frame();

// hide hint after first interaction
C.addEventListener('pointerdown',function(){
  var h=document.getElementById('hint');
  if(h)h.style.opacity='0';
},{once:true});

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
