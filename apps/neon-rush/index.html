<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Neon Rush</title>
<link rel="icon" href="https://emojicdn.elk.sh/🏎️" />
<meta name="description" content="Infinite neon racer. Dodge obstacles at light speed." />
<meta property="og:title" content="Neon Rush" />
<meta property="og:description" content="Infinite neon racer. Dodge obstacles at light speed." />
<meta property="og:url" content="https://sloppy.live/neon-rush" />
<meta property="og:image" content="https://sloppy.live/screenshots/neon-rush.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Azeret+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100vh;background:#05020a;overflow:hidden;position:fixed;width:100%;touch-action:none;user-select:none}
  body{display:flex;flex-direction:column;align-items:center}
  canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0}

  .hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:12px 20px;z-index:5;pointer-events:none}
  .hud-item{font-family:'Azeret Mono',monospace;font-size:11px;color:rgba(0,255,200,0.7);letter-spacing:0.08em}
  .hud-item .val{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:#00ffc8;display:block;margin-top:2px;text-shadow:0 0 15px rgba(0,255,200,0.5)}
  .hud-item .val.speed{color:#ff2080;text-shadow:0 0 15px rgba(255,32,128,0.5)}

  .overlay{position:fixed;inset:0;z-index:10;background:rgba(5,2,10,0.92);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
  .overlay.hidden{display:none}
  .overlay-box{text-align:center;padding:24px}
  .overlay-box h1{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;color:#00ffc8;text-shadow:0 0 30px rgba(0,255,200,0.4);letter-spacing:0.08em;margin-bottom:4px}
  .overlay-box .tagline{font-family:'Azeret Mono',monospace;font-size:12px;color:#ff2080;letter-spacing:0.1em;margin-bottom:20px}
  .overlay-box .final-score{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;color:#ff2080;text-shadow:0 0 30px rgba(255,32,128,0.5);margin:8px 0}
  .overlay-box .best{font-family:'Azeret Mono',monospace;font-size:11px;color:rgba(0,255,200,0.6);margin-bottom:16px}
  .go-btn{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;padding:14px 40px;background:transparent;border:2px solid #00ffc8;color:#00ffc8;border-radius:6px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;transition:all .15s;pointer-events:auto}
  .go-btn:hover{background:rgba(0,255,200,0.1);box-shadow:0 0 20px rgba(0,255,200,0.2)}
  .link{position:fixed;bottom:10px;right:14px;font-family:'Azeret Mono',monospace;font-size:9px;color:rgba(255,255,255,0.2);text-decoration:none;z-index:6}

  .mobile-controls{position:fixed;bottom:20px;left:0;right:0;display:none;justify-content:center;gap:60px;z-index:6;pointer-events:none}
  .mob-btn{width:64px;height:64px;border-radius:50%;border:2px solid rgba(0,255,200,0.3);background:rgba(0,255,200,0.05);display:flex;align-items:center;justify-content:center;font-size:24px;pointer-events:auto;-webkit-tap-highlight-color:transparent}
  .mob-btn:active{background:rgba(0,255,200,0.15);border-color:#00ffc8}
  @media(max-width:768px){.mobile-controls{display:flex}}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="hud">
  <div class="hud-item">SCORE<span class="val" id="scoreEl">0</span></div>
  <div class="hud-item">SPEED<span class="val speed" id="speedEl">1x</span></div>
  <div class="hud-item">BEST<span class="val" id="bestEl">0</span></div>
</div>

<div class="overlay" id="startOverlay">
  <div class="overlay-box">
    <h1>NEON RUSH</h1>
    <div class="tagline">DODGE. SURVIVE. ACCELERATE.</div>
    <button class="go-btn" id="startBtn">LAUNCH</button>
  </div>
</div>

<div class="overlay hidden" id="deathOverlay">
  <div class="overlay-box">
    <h1 style="font-size:24px;color:#ff2080">WRECKED</h1>
    <div class="final-score" id="finalScore">0</div>
    <div class="best" id="bestLabel">BEST: 0</div>
    <button class="go-btn" id="retryBtn">RETRY</button>
  </div>
</div>

<div class="mobile-controls">
  <div class="mob-btn" id="mobLeft">◀</div>
  <div class="mob-btn" id="mobRight">▶</div>
</div>

<a class="link" href="https://sloppy.live">&larr; sloppy.live</a>

<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// === AUDIO ===
let actx;
function au(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sfx(f,d,t,v){try{const c=au();if(c.state==='suspended')c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t||'square';o.frequency.setValueAtTime(f,c.currentTime);o.frequency.exponentialRampToValueAtTime(f*0.3,c.currentTime+d);g.gain.setValueAtTime(v||0.03,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}

// === CONSTANTS ===
const LANE_COUNT = 5;
const PLAYER_W = 22;
const PLAYER_H = 36;
const OBS_MIN_W = 18;
const OBS_MAX_W = 40;
const OBS_H = 20;
const SPAWN_BASE = 50;
const SPAWN_MIN = 18;

// === STATE ===
let W, H, laneW, lanes;
let running = false;
let score = 0;
let best = parseInt(localStorage.getItem('neonrush_best') || '0');
let speed = 1;
let spawnTimer = 0;
let frameCount = 0;
let shakeX = 0, shakeY = 0;

const player = { lane: 2, x: 0, y: 0, targetX: 0, trail: [] };
let obstacles = [];
let particles = [];
let gridOffset = 0;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  laneW = Math.min(W * 0.7, 400) / LANE_COUNT;
  const roadLeft = (W - laneW * LANE_COUNT) / 2;
  lanes = [];
  for(let i = 0; i < LANE_COUNT; i++){
    lanes.push(roadLeft + laneW * i + laneW / 2);
  }
  player.y = H - 100;
  player.targetX = lanes[player.lane];
  player.x = player.targetX;
}

window.addEventListener('resize', resize);
resize();

// === INPUT ===
const keys = {};
window.addEventListener('keydown', (e) => {
  if(keys[e.key]) return;
  keys[e.key] = true;
  if(!running) return;
  if((e.key === 'ArrowLeft' || e.key === 'a') && player.lane > 0){
    player.lane--;
    player.targetX = lanes[player.lane];
    sfx(600, 0.04, 'sine', 0.03);
  }
  if((e.key === 'ArrowRight' || e.key === 'd') && player.lane < LANE_COUNT - 1){
    player.lane++;
    player.targetX = lanes[player.lane];
    sfx(600, 0.04, 'sine', 0.03);
  }
});
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

// Mobile
function mobMove(dir){
  if(!running) return;
  if(dir < 0 && player.lane > 0){ player.lane--; player.targetX = lanes[player.lane]; sfx(600,0.04,'sine',0.03); }
  if(dir > 0 && player.lane < LANE_COUNT-1){ player.lane++; player.targetX = lanes[player.lane]; sfx(600,0.04,'sine',0.03); }
}
document.getElementById('mobLeft').addEventListener('touchstart', (e)=>{ e.preventDefault(); mobMove(-1); });
document.getElementById('mobRight').addEventListener('touchstart', (e)=>{ e.preventDefault(); mobMove(1); });

// Swipe
let touchStartX = 0;
canvas.addEventListener('touchstart', (e)=>{ touchStartX = e.touches[0].clientX; });
canvas.addEventListener('touchend', (e)=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 30){
    mobMove(dx > 0 ? 1 : -1);
  }
});

// === OBSTACLES ===
function spawnObstacle(){
  const lane = Math.floor(Math.random() * LANE_COUNT);
  const w = OBS_MIN_W + Math.random() * (OBS_MAX_W - OBS_MIN_W);
  // Pick a neon color
  const colors = ['#ff2080','#ff8020','#ffdd20','#20ffaa','#2080ff','#c040ff'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  obstacles.push({
    x: lanes[lane],
    y: -OBS_H,
    w, h: OBS_H,
    lane, color,
    glow: 0.8 + Math.random() * 0.4,
  });
}

function spawnParticles(x, y, color, count){
  for(let i = 0; i < count; i++){
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 2,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 2 + Math.random() * 3,
    });
  }
}

// === COLLISION ===
function checkCollision(){
  const px = player.x;
  const py = player.y;
  const pw2 = PLAYER_W / 2;
  const ph2 = PLAYER_H / 2;
  for(const o of obstacles){
    const ow2 = o.w / 2;
    const oh2 = o.h / 2;
    if(Math.abs(px - o.x) < pw2 + ow2 && Math.abs(py - o.y) < ph2 + oh2){
      return o;
    }
  }
  return null;
}

// === GAME LOOP ===
function update(){
  if(!running) return;
  frameCount++;

  // Speed increases over time
  speed = 1 + frameCount * 0.0003;
  const scrollSpeed = 3 + speed * 2.5;

  // Score
  score = Math.floor(frameCount * speed * 0.1);

  // Player lerp
  player.x += (player.targetX - player.x) * 0.18;

  // Trail
  player.trail.push({ x: player.x, y: player.y, age: 0 });
  if(player.trail.length > 12) player.trail.shift();
  for(const t of player.trail) t.age++;

  // Spawn
  const spawnRate = Math.max(SPAWN_MIN, SPAWN_BASE - speed * 3);
  spawnTimer++;
  if(spawnTimer >= spawnRate){
    spawnTimer = 0;
    spawnObstacle();
    // Double spawn at high speed
    if(speed > 3 && Math.random() < 0.4) spawnObstacle();
    if(speed > 5 && Math.random() < 0.3) spawnObstacle();
  }

  // Move obstacles
  for(const o of obstacles){
    o.y += scrollSpeed;
  }
  obstacles = obstacles.filter(o => o.y < H + 50);

  // Particles
  for(const p of particles){
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  // Grid scroll
  gridOffset = (gridOffset + scrollSpeed) % 40;

  // Shake decay
  shakeX *= 0.85;
  shakeY *= 0.85;

  // Collision
  const hit = checkCollision();
  if(hit){
    die(hit);
    return;
  }

  // HUD
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('speedEl').textContent = speed.toFixed(1) + 'x';
}

function die(hitObs){
  running = false;
  spawnParticles(player.x, player.y, '#00ffc8', 30);
  spawnParticles(hitObs.x, hitObs.y, hitObs.color, 20);
  shakeX = (Math.random() - 0.5) * 16;
  shakeY = (Math.random() - 0.5) * 16;
  sfx(120, 0.3, 'sawtooth', 0.08);
  sfx(80, 0.4, 'square', 0.06);

  if(score > best){
    best = score;
    localStorage.setItem('neonrush_best', String(best));
  }

  document.getElementById('finalScore').textContent = score;
  document.getElementById('bestLabel').textContent = 'BEST: ' + best;
  document.getElementById('bestEl').textContent = best;

  setTimeout(()=>{
    document.getElementById('deathOverlay').classList.remove('hidden');
  }, 600);
}

function resetGame(){
  obstacles = [];
  particles = [];
  player.lane = 2;
  player.x = lanes[2];
  player.targetX = lanes[2];
  player.trail = [];
  score = 0;
  speed = 1;
  spawnTimer = 0;
  frameCount = 0;
  shakeX = 0;
  shakeY = 0;
  gridOffset = 0;
  document.getElementById('scoreEl').textContent = '0';
  document.getElementById('speedEl').textContent = '1x';
  document.getElementById('bestEl').textContent = best;
  running = true;
}

// === RENDERING ===
function draw(){
  ctx.fillStyle = '#05020a';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(shakeX, shakeY);

  const roadLeft = lanes[0] - laneW / 2;
  const roadRight = lanes[LANE_COUNT - 1] + laneW / 2;
  const roadW = roadRight - roadLeft;

  // Road background
  const roadGrad = ctx.createLinearGradient(roadLeft, 0, roadRight, 0);
  roadGrad.addColorStop(0, 'rgba(0,255,200,0.02)');
  roadGrad.addColorStop(0.5, 'rgba(0,255,200,0.04)');
  roadGrad.addColorStop(1, 'rgba(0,255,200,0.02)');
  ctx.fillStyle = roadGrad;
  ctx.fillRect(roadLeft, 0, roadW, H);

  // Grid lines (horizontal, scrolling)
  ctx.strokeStyle = 'rgba(0,255,200,0.06)';
  ctx.lineWidth = 1;
  for(let y = gridOffset - 40; y < H + 40; y += 40){
    ctx.beginPath();
    ctx.moveTo(roadLeft, y);
    ctx.lineTo(roadRight, y);
    ctx.stroke();
  }

  // Lane dividers
  ctx.strokeStyle = 'rgba(0,255,200,0.12)';
  ctx.lineWidth = 1;
  ctx.setLineDash([12, 20]);
  for(let i = 1; i < LANE_COUNT; i++){
    const lx = roadLeft + laneW * i;
    ctx.beginPath();
    ctx.moveTo(lx, 0);
    ctx.lineTo(lx, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Road edges
  ctx.strokeStyle = '#00ffc840';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(roadLeft, 0); ctx.lineTo(roadLeft, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(roadRight, 0); ctx.lineTo(roadRight, H); ctx.stroke();
  // Edge glow
  const edgeGrad = ctx.createLinearGradient(roadLeft - 20, 0, roadLeft + 10, 0);
  edgeGrad.addColorStop(0, 'transparent');
  edgeGrad.addColorStop(1, 'rgba(0,255,200,0.03)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(roadLeft - 20, 0, 30, H);
  const edgeGrad2 = ctx.createLinearGradient(roadRight - 10, 0, roadRight + 20, 0);
  edgeGrad2.addColorStop(0, 'rgba(0,255,200,0.03)');
  edgeGrad2.addColorStop(1, 'transparent');
  ctx.fillStyle = edgeGrad2;
  ctx.fillRect(roadRight - 10, 0, 30, H);

  // Player trail
  for(let i = 0; i < player.trail.length; i++){
    const t = player.trail[i];
    const alpha = (1 - t.age / 14) * 0.4;
    if(alpha <= 0) continue;
    ctx.fillStyle = `rgba(0,255,200,${alpha})`;
    const s = PLAYER_W * (1 - t.age / 16) * 0.6;
    ctx.fillRect(t.x - s/2, t.y - PLAYER_H/2 + t.age*0.5, s, 4);
  }

  // Player ship
  const px = player.x, py = player.y;
  // Glow
  const pGlow = ctx.createRadialGradient(px, py, 5, px, py, 35);
  pGlow.addColorStop(0, 'rgba(0,255,200,0.15)');
  pGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = pGlow;
  ctx.beginPath();
  ctx.arc(px, py, 35, 0, Math.PI * 2);
  ctx.fill();
  // Body
  ctx.fillStyle = '#00ffc8';
  ctx.beginPath();
  ctx.moveTo(px, py - PLAYER_H / 2);
  ctx.lineTo(px + PLAYER_W / 2, py + PLAYER_H / 2);
  ctx.lineTo(px, py + PLAYER_H / 2 - 8);
  ctx.lineTo(px - PLAYER_W / 2, py + PLAYER_H / 2);
  ctx.closePath();
  ctx.fill();
  // Cockpit
  ctx.fillStyle = '#05020a';
  ctx.beginPath();
  ctx.ellipse(px, py - 2, 5, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  // Engine glow
  ctx.fillStyle = '#ff2080';
  ctx.beginPath();
  ctx.ellipse(px, py + PLAYER_H / 2, 4, 2 + Math.random() * 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Obstacles
  for(const o of obstacles){
    // Glow
    ctx.shadowColor = o.color;
    ctx.shadowBlur = 12 * o.glow;
    ctx.fillStyle = o.color;
    const r = 4;
    ctx.beginPath();
    ctx.moveTo(o.x - o.w/2 + r, o.y - o.h/2);
    ctx.lineTo(o.x + o.w/2 - r, o.y - o.h/2);
    ctx.quadraticCurveTo(o.x + o.w/2, o.y - o.h/2, o.x + o.w/2, o.y - o.h/2 + r);
    ctx.lineTo(o.x + o.w/2, o.y + o.h/2 - r);
    ctx.quadraticCurveTo(o.x + o.w/2, o.y + o.h/2, o.x + o.w/2 - r, o.y + o.h/2);
    ctx.lineTo(o.x - o.w/2 + r, o.y + o.h/2);
    ctx.quadraticCurveTo(o.x - o.w/2, o.y + o.h/2, o.x - o.w/2, o.y + o.h/2 - r);
    ctx.lineTo(o.x - o.w/2, o.y - o.h/2 + r);
    ctx.quadraticCurveTo(o.x - o.w/2, o.y - o.h/2, o.x - o.w/2 + r, o.y - o.h/2);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    // Inner line
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.strokeRect(o.x - o.w/2 + 3, o.y - o.h/2 + 3, o.w - 6, o.h - 6);
  }

  // Particles
  for(const p of particles){
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color + Math.floor(alpha * 200).toString(16).padStart(2, '0');
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }

  // Speed lines at edges
  if(speed > 2){
    const intensity = Math.min(1, (speed - 2) * 0.2);
    ctx.strokeStyle = `rgba(0,255,200,${intensity * 0.15})`;
    ctx.lineWidth = 1;
    for(let i = 0; i < 8; i++){
      const sx = Math.random() < 0.5 ? roadLeft - 10 - Math.random()*30 : roadRight + 10 + Math.random()*30;
      const sy = Math.random() * H;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx, sy + 20 + speed * 5);
      ctx.stroke();
    }
  }

  ctx.restore();

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.8);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(5,2,10,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

// === MAIN LOOP ===
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// === START / RETRY ===
document.getElementById('startBtn').addEventListener('click', ()=>{
  document.getElementById('startOverlay').classList.add('hidden');
  resetGame();
});

document.getElementById('retryBtn').addEventListener('click', ()=>{
  document.getElementById('deathOverlay').classList.add('hidden');
  resetGame();
});

document.getElementById('bestEl').textContent = best;
loop();

})();
</script>
</body>
</html>
