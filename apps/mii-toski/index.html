<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mii-Toski · launch the Mii, hit the rings</title>
<meta name="description" content="Drag back, release, watch the Mii arc through the sky. Hit every ring to clear the stage.">
<meta property="og:title" content="Mii-Toski">
<meta property="og:description" content="Slingshot a Mii through 9 stages of floating ring targets. Physics + aim + a flying scream.">
<meta property="og:url" content="https://sloppy.live/mii-toski">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cute%20Wii%20mii%20character%20launched%20by%20giant%20slingshot%20into%20pastel%20blue%20sky%20with%20floating%20gold%20rings%2C%20cheerful%20mid-2000s%20Nintendo%20marketing%20aesthetic%2C%20rounded%20shapes%2C%20bright%20colors?width=1200&height=630&model=flux&nologo=true&seed=2266">
<meta property="og:type" content="website">

<style>
  :root{
    --sky-1:    #b8e2ff;
    --sky-2:    #e8f4ff;
    --grass-1:  #6cba56;
    --grass-2:  #3c8a32;
    --wood-1:   #c08a44;
    --wood-2:   #7a4a18;
    --gold:     #f5c842;
    --gold-2:   #b8842e;
    --ring:     #ff5a82;
    --ring-2:   #e02850;
    --mii-skin: #ffd7b8;
    --mii-shirt:#5fa8e8;
    --mii-hair: #2a1810;
    --ink:      #1a1410;
    --paper:    #fdf9f0;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{ height: 100vh; overflow: hidden; background: var(--ink); }
  body{
    font-family: 'Fredoka', system-ui, sans-serif;
    color: var(--ink);
    display: flex; flex-direction: column;
    user-select: none;
    touch-action: none;
  }
  .top{
    background: linear-gradient(180deg, #fff 0%, #f0e8d8 100%);
    border-bottom: 4px solid var(--wood-2);
    padding: 10px 18px;
    display: flex; align-items: center; gap: 14px;
    flex-wrap: wrap;
    box-shadow: 0 2px 0 var(--gold), 0 4px 12px rgba(0,0,0,0.18);
    z-index: 6;
  }
  .top h1{
    font-family: 'Bungee', system-ui;
    font-size: clamp(22px, 3.4vw, 32px);
    color: var(--ring-2);
    text-shadow: 3px 3px 0 var(--gold), 5px 5px 0 var(--wood-2);
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .top h1 em{
    color: var(--mii-shirt);
    font-style: normal;
    font-size: 0.85em;
  }
  .pills{
    display: flex; gap: 10px; align-items: center;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .pill{
    background: var(--paper);
    border: 2px solid var(--wood-2);
    padding: 4px 12px;
    border-radius: 999px;
    font: 700 13px 'Space Mono', monospace;
    color: var(--ink);
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 2px 0 var(--wood-2);
  }
  .pill .v{ color: var(--ring-2); font-size: 15px; }
  .pill.gold{ background: var(--gold); }
  .pill.gold .v{ color: var(--ink); }
  .pill.score{ background: var(--mii-shirt); color: #fff; border-color: #2a6ab8; box-shadow: 0 2px 0 #2a6ab8; }
  .pill.score .v{ color: #fff; }
  .btn-row{
    display: flex; gap: 8px;
  }
  .btn{
    background: var(--gold);
    border: 2px solid var(--wood-2);
    padding: 6px 16px;
    border-radius: 999px;
    font: 700 13px 'Fredoka', sans-serif;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.04em;
    box-shadow: 0 3px 0 var(--wood-2);
    transition: transform 0.06s, box-shadow 0.06s;
  }
  .btn:hover{ background: #fad968; }
  .btn:active{ transform: translateY(2px); box-shadow: 0 1px 0 var(--wood-2); }
  .btn.secondary{ background: var(--paper); }

  .stage{
    flex: 1;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, var(--sky-2) 0%, var(--sky-1) 60%, #93cae0 100%);
  }
  #cv{
    width: 100%; height: 100%;
    display: block;
    cursor: grab;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #cv.aiming{ cursor: grabbing; }

  .stage-label{
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 6px 18px;
    border-radius: 999px;
    font: 700 13px 'Fredoka', sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 4;
  }
  .stage-label.show{ opacity: 1; }
  .hint{
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.92);
    border: 2px solid var(--wood-2);
    color: var(--ink);
    padding: 6px 18px;
    border-radius: 999px;
    font: 600 12px 'Space Mono', monospace;
    pointer-events: none;
    box-shadow: 0 2px 0 var(--wood-2);
    z-index: 3;
  }
  .toast{
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--gold);
    border: 3px solid var(--wood-2);
    color: var(--ink);
    padding: 14px 32px;
    border-radius: 18px;
    font: 700 22px 'Bungee', sans-serif;
    box-shadow: 0 6px 0 var(--wood-2);
    pointer-events: none;
    opacity: 0;
    z-index: 5;
    text-align: center;
    letter-spacing: 0.04em;
  }
  .toast.show{ animation: toastPop 1.8s ease-out forwards; }
  @keyframes toastPop{
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
    20%{ opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(-3deg); }
    40%{ opacity: 1; transform: translate(-50%, -50%) scale(0.96) rotate(2deg); }
    60%{ opacity: 1; transform: translate(-50%, -50%) scale(1.02) rotate(0deg); }
    100%{ opacity: 0; transform: translate(-50%, -55%) scale(1); }
  }
  .end{
    position: absolute;
    inset: 0;
    background: rgba(20, 12, 22, 0.78);
    display: none;
    align-items: center; justify-content: center;
    z-index: 10;
    padding: 20px;
  }
  .end.show{ display: flex; }
  .end-card{
    background: var(--paper);
    border: 4px solid var(--wood-2);
    padding: 28px 36px;
    border-radius: 24px;
    box-shadow: 0 10px 0 var(--wood-2);
    text-align: center;
    max-width: 440px;
  }
  .end-card h2{
    font-family: 'Bungee', sans-serif;
    font-size: clamp(28px, 5vw, 42px);
    color: var(--ring-2);
    text-shadow: 3px 3px 0 var(--gold);
    margin-bottom: 12px;
  }
  .end-card .stat-row{
    display: flex; justify-content: space-around;
    margin: 18px 0;
    gap: 12px;
  }
  .end-card .stat{
    flex: 1;
    background: var(--mii-shirt);
    color: #fff;
    padding: 12px 6px;
    border-radius: 14px;
    border: 2px solid #2a6ab8;
    box-shadow: 0 3px 0 #2a6ab8;
  }
  .end-card .stat .num{
    font: 700 28px 'Bungee', sans-serif;
    display: block;
    margin-bottom: 2px;
  }
  .end-card .stat .lbl{
    font: 600 10px 'Space Mono', monospace;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.92;
  }
  .end-card p{
    font: italic 14px 'Fredoka', sans-serif;
    color: #5a4a40;
    margin: 8px 0 16px;
    line-height: 1.4;
  }
  .end-card .btn{ font-size: 14px; padding: 9px 22px; margin: 4px; }

  @media (max-width: 600px){
    .top h1{ font-size: 20px; }
    .pills{ width: 100%; justify-content: space-between; margin-left: 0; }
    .pill{ padding: 3px 10px; font-size: 11px; }
    .btn{ padding: 5px 12px; font-size: 12px; }
    .hint{ font-size: 10px; padding: 4px 10px; }
  }
  @media (prefers-reduced-motion: reduce){
    .toast.show{ animation: none; opacity: 1; }
  }
</style>
</head>
<body>
<div class="top">
  <h1>Mii<em>·Toski</em></h1>
  <div class="pills">
    <div class="pill"><span>Stage</span><span class="v" id="ui-stage">1</span><span>/9</span></div>
    <div class="pill gold"><span>Launches</span><span class="v" id="ui-shots">6</span></div>
    <div class="pill score"><span>Score</span><span class="v" id="ui-score">0</span></div>
    <div class="btn-row">
      <button class="btn" id="btn-reset" type="button">↺ retry</button>
      <button class="btn secondary" id="btn-mute" type="button">🔊</button>
    </div>
  </div>
</div>
<main class="stage">
  <canvas id="cv"></canvas>
  <div class="stage-label" id="stage-label"></div>
  <div class="hint" id="hint">drag the Mii back · release to launch · hit every ring</div>
  <div class="toast" id="toast"></div>
  <div class="end" id="end">
    <div class="end-card">
      <h2 id="end-title">Stage Cleared!</h2>
      <p id="end-msg">All rings struck. The Mii is overjoyed.</p>
      <div class="stat-row">
        <div class="stat"><span class="num" id="end-score">0</span><span class="lbl">score</span></div>
        <div class="stat"><span class="num" id="end-rings">0</span><span class="lbl">rings hit</span></div>
        <div class="stat"><span class="num" id="end-shots">0</span><span class="lbl">shots used</span></div>
      </div>
      <div>
        <button class="btn" id="btn-next" type="button">▶ Next stage</button>
        <button class="btn secondary" id="btn-replay" type="button">↺ Replay</button>
      </div>
    </div>
  </div>
</main>
<script>
'use strict';

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function fit(){
  DPR = window.devicePixelRatio || 1;
  const r = cv.getBoundingClientRect();
  W = Math.floor(r.width); H = Math.floor(r.height);
  cv.width = Math.floor(W * DPR); cv.height = Math.floor(H * DPR);
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', fit);

/* ── Stage definitions: ring positions + wind ──────────── */
const STAGES = [
  { name: 'Sunny Field',    rings: 3, wind: 0,    layout: 'arc' },
  { name: 'Breezy Hill',    rings: 4, wind: 30,   layout: 'staggered' },
  { name: 'Cliff Toss',     rings: 4, wind: -40,  layout: 'far' },
  { name: 'Floating Isles', rings: 5, wind: 60,   layout: 'staircase' },
  { name: 'Cloud Loop',     rings: 5, wind: -50,  layout: 'circle' },
  { name: 'Skybound Tower', rings: 5, wind: 40,   layout: 'tower' },
  { name: 'Storm Run',      rings: 6, wind: 100,  layout: 'staggered' },
  { name: 'Crosswinds',     rings: 6, wind: -120, layout: 'staircase' },
  { name: 'The Long Throw', rings: 7, wind: 70,   layout: 'far' },
];

const state = {
  stageIdx: 0,
  shotsLeft: 6,
  score: 0,
  totalScore: 0,
  rings: [],          // active rings
  ringsHit: 0,
  ringsTotal: 0,
  mii: null,          // active in-flight mii { x, y, vx, vy, alive, spin, scale }
  miiReady: { x: 0, y: 0 }, // resting at slingshot
  drag: null,         // { x, y } current drag pointer in canvas coords
  aiming: false,
  trail: [],
  particles: [],
  flying: false,
  shotsThisStage: 0,
  cleared: false,
  startedRound: false,
  shake: 0,
};

const PHYS = {
  g: 0.55,             // gravity (units per frame²-ish; integrated below)
  drag: 0.0028,        // air resistance
  launchScale: 0.13,   // drag pixel → velocity scale
  maxPull: 200,        // max drag distance
  groundY: 0.85,       // fraction of H
};
const SLING = {
  baseX: 0.16,         // fraction of W
  baseY: 0.78,         // fraction of H
  bandLen: 80,
};

function recompute(){
  // re-derive slingshot anchor each frame for resize safety
  const a = { x: W * SLING.baseX, y: H * SLING.baseY };
  state.slingAnchor = a;
  if (!state.flying){
    state.miiReady.x = a.x; state.miiReady.y = a.y - 28;
  }
  PHYS.groundPx = H * PHYS.groundY;
}

function setupStage(idx){
  state.stageIdx = idx;
  const cfg = STAGES[idx];
  state.shotsLeft = 6;
  state.shotsThisStage = 0;
  state.score = 0;
  state.ringsHit = 0;
  state.ringsTotal = cfg.rings;
  state.cleared = false;
  state.rings = layoutRings(cfg);
  state.particles = [];
  state.trail = [];
  state.flying = false;
  state.mii = null;
  uiRefresh();
  showStageLabel(cfg.name);
  hideEnd();
}

function layoutRings(cfg){
  const rings = [];
  const baseY = H * 0.5;
  // ring positions depend on layout
  const minX = W * 0.45, maxX = W * 0.95;
  const span = maxX - minX;
  switch (cfg.layout){
    case 'arc': {
      for (let i = 0; i < cfg.rings; i++){
        const t = (i + 0.5) / cfg.rings;
        const x = minX + span * t;
        const y = baseY - Math.sin(t * Math.PI) * 130 + 60;
        rings.push(makeRing(x, y));
      }
      break;
    }
    case 'staggered': {
      for (let i = 0; i < cfg.rings; i++){
        const t = (i + 0.5) / cfg.rings;
        const x = minX + span * t;
        const y = baseY - 90 + ((i % 2 === 0) ? -90 : 80) + Math.sin(i * 1.3) * 30;
        rings.push(makeRing(x, y));
      }
      break;
    }
    case 'far': {
      for (let i = 0; i < cfg.rings; i++){
        const t = (i + 0.5) / cfg.rings;
        const x = minX + span * t;
        const y = baseY - 60 - i * 40;
        rings.push(makeRing(x, y, i === cfg.rings - 1 ? 'gold' : 'pink'));
      }
      // make last ring really far + high
      const last = rings[rings.length - 1];
      last.x = W * 0.92; last.y = H * 0.18;
      break;
    }
    case 'staircase': {
      for (let i = 0; i < cfg.rings; i++){
        const t = i / Math.max(1, cfg.rings - 1);
        const x = minX + span * t;
        const y = baseY - 50 - i * 50;
        rings.push(makeRing(x, y));
      }
      break;
    }
    case 'circle': {
      const cx = W * 0.7, cy = H * 0.42, r = Math.min(W, H) * 0.22;
      for (let i = 0; i < cfg.rings; i++){
        const ang = (i / cfg.rings) * Math.PI * 2 - Math.PI/2;
        rings.push(makeRing(cx + Math.cos(ang) * r, cy + Math.sin(ang) * r));
      }
      break;
    }
    case 'tower': {
      const cx = W * 0.75;
      for (let i = 0; i < cfg.rings; i++){
        const y = baseY - 30 - i * 70;
        const x = cx + Math.sin(i * 1.8) * 50;
        rings.push(makeRing(x, y, i === cfg.rings - 1 ? 'gold' : 'pink'));
      }
      break;
    }
  }
  return rings;
}
function makeRing(x, y, kind){
  return {
    x, y, r: 30,
    kind: kind || 'pink',
    bob: Math.random() * Math.PI * 2,
    hit: false,
    spin: 0,
  };
}

function uiRefresh(){
  document.getElementById('ui-stage').textContent = state.stageIdx + 1;
  document.getElementById('ui-shots').textContent = state.shotsLeft;
  document.getElementById('ui-score').textContent = state.totalScore + state.score;
}

function showStageLabel(name){
  const el = document.getElementById('stage-label');
  el.textContent = '★ Stage ' + (state.stageIdx + 1) + ' — ' + name + ' ★';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2400);
}
function showToast(text){
  const el = document.getElementById('toast');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}
function showEnd(stageCleared){
  const e = document.getElementById('end');
  document.getElementById('end-title').textContent = stageCleared
    ? (state.stageIdx === STAGES.length - 1 ? 'CHAMPION!' : 'Stage Cleared!')
    : 'Out of launches';
  document.getElementById('end-msg').textContent = stageCleared
    ? (state.stageIdx === STAGES.length - 1
        ? 'You cleared all 9 stages. The Mii is in orbit somewhere.'
        : 'All rings struck. Onward, into thinner air.')
    : 'You hit ' + state.ringsHit + '/' + state.ringsTotal + ' rings. Retry the stage to try again.';
  document.getElementById('end-score').textContent = state.score;
  document.getElementById('end-rings').textContent = state.ringsHit + '/' + state.ringsTotal;
  document.getElementById('end-shots').textContent = state.shotsThisStage;
  document.getElementById('btn-next').style.display = stageCleared && state.stageIdx < STAGES.length - 1 ? '' : 'none';
  e.classList.add('show');
}
function hideEnd(){ document.getElementById('end').classList.remove('show'); }

/* ── Input: drag from Mii's resting pos to set launch vector ── */
function ptFromEvt(e){
  const r = cv.getBoundingClientRect();
  const p = (e.touches && e.touches[0]) || e;
  return { x: p.clientX - r.left, y: p.clientY - r.top };
}
function onDown(e){
  if (state.flying || state.cleared) return;
  if (state.shotsLeft <= 0) return;
  const p = ptFromEvt(e);
  // pickable area = within 90px of mii rest position
  const dx = p.x - state.miiReady.x, dy = p.y - state.miiReady.y;
  if (Math.hypot(dx, dy) > 90) return;
  state.aiming = true;
  cv.classList.add('aiming');
  state.drag = p;
  e.preventDefault();
}
function onMove(e){
  if (!state.aiming) return;
  state.drag = ptFromEvt(e);
  e.preventDefault();
}
function onUp(e){
  if (!state.aiming) return;
  state.aiming = false;
  cv.classList.remove('aiming');
  const anchor = state.slingAnchor;
  const m = state.miiReady;
  // launch vector = (anchor - drag) — pull back to fling forward
  const dx = anchor.x - state.drag.x;
  const dy = anchor.y - 30 - state.drag.y;
  const pull = Math.min(PHYS.maxPull, Math.hypot(dx, dy));
  if (pull < 12) return; // too small — cancel
  const ang = Math.atan2(dy, dx);
  const speed = pull * PHYS.launchScale * 14;
  launch(m.x, m.y, Math.cos(ang) * speed, Math.sin(ang) * speed);
}
cv.addEventListener('mousedown',  onDown);
cv.addEventListener('mousemove',  onMove);
cv.addEventListener('mouseup',    onUp);
cv.addEventListener('mouseleave', onUp);
cv.addEventListener('touchstart', onDown, { passive: false });
cv.addEventListener('touchmove',  onMove, { passive: false });
cv.addEventListener('touchend',   onUp);

function launch(x, y, vx, vy){
  state.flying = true;
  state.trail = [];
  state.mii = {
    x, y, vx, vy,
    spin: 0, spinV: (Math.abs(vx) + Math.abs(vy)) * 0.0008,
    alive: true,
    flightT: 0,
    landed: false,
  };
  state.shotsLeft--;
  state.shotsThisStage++;
  sndLaunch();
  scream(true);
  uiRefresh();
}

/* ── Web Audio (cute synth) ──────────────────────────── */
let actx = null, muted = false, screamGain = null, screamOsc = null;
function ensureAudio(){
  if (actx) return actx;
  try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch(_){ actx = null; }
  return actx;
}
function tone(freq, dur, type, gainV, atk){
  if (muted) return;
  const a = ensureAudio(); if (!a) return;
  const o = a.createOscillator();
  const g = a.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, a.currentTime);
  g.gain.linearRampToValueAtTime(gainV || 0.22, a.currentTime + (atk || 0.01));
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
  o.connect(g).connect(a.destination);
  o.start(); o.stop(a.currentTime + dur + 0.05);
}
function sndLaunch(){
  tone(220, 0.18, 'square', 0.28);
  setTimeout(() => tone(440, 0.12, 'square', 0.22), 60);
}
function sndPing(combo){
  // ring-hit chime, ascending with combo
  const base = 440 + combo * 80;
  tone(base, 0.18, 'triangle', 0.3);
  tone(base * 1.5, 0.22, 'triangle', 0.18);
  setTimeout(() => tone(base * 2, 0.16, 'triangle', 0.14), 50);
}
function sndBoing(){
  if (muted) return;
  const a = ensureAudio(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(560, a.currentTime);
  o.frequency.exponentialRampToValueAtTime(120, a.currentTime + 0.32);
  g.gain.setValueAtTime(0.35, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.35);
  o.connect(g).connect(a.destination);
  o.start(); o.stop(a.currentTime + 0.4);
}
function sndCheer(){
  // 4-note major
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.22, 'triangle', 0.22), i * 90));
}
function scream(on){
  if (muted){ scream(false); return; }
  const a = ensureAudio(); if (!a) return;
  if (on){
    if (screamOsc) return;
    screamOsc = a.createOscillator();
    screamGain = a.createGain();
    screamOsc.type = 'sawtooth';
    screamOsc.frequency.value = 320;
    screamGain.gain.value = 0;
    screamGain.gain.linearRampToValueAtTime(0.06, a.currentTime + 0.1);
    screamOsc.connect(screamGain).connect(a.destination);
    screamOsc.start();
  } else {
    if (!screamOsc) return;
    try {
      screamGain.gain.linearRampToValueAtTime(0, a.currentTime + 0.1);
      screamOsc.stop(a.currentTime + 0.12);
    } catch(_){}
    screamOsc = null; screamGain = null;
  }
}
function updateScreamPitch(speed){
  if (!screamOsc) return;
  const f = 240 + Math.min(700, speed * 1.4);
  try { screamOsc.frequency.setTargetAtTime(f, ensureAudio().currentTime, 0.05); } catch(_){}
}

document.getElementById('btn-mute').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('btn-mute').textContent = muted ? '🔇' : '🔊';
  if (muted) scream(false);
});

/* ── Physics + ring collision ────────────────────────── */
function step(dt){
  // ambient ring bob + spin
  for (const r of state.rings){
    r.bob += dt * 2;
    r.spin += dt * 1.5;
  }
  // particles
  for (let i = state.particles.length - 1; i >= 0; i--){
    const p = state.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 240 * dt;
    p.age += dt;
    if (p.age >= p.life) state.particles.splice(i, 1);
  }
  // mii flight
  if (state.mii && state.mii.alive){
    const m = state.mii;
    m.flightT += dt;
    const cfg = STAGES[state.stageIdx];
    // wind = +x px/s² (positive blows right)
    m.vx += cfg.wind * dt;
    // gravity
    m.vy += PHYS.g * dt * 1000;
    // air drag
    const speed = Math.hypot(m.vx, m.vy);
    if (speed > 0){
      const dragForce = PHYS.drag * speed * speed * dt;
      m.vx -= (m.vx / speed) * dragForce;
      m.vy -= (m.vy / speed) * dragForce;
    }
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.spin += m.spinV * speed * dt;
    updateScreamPitch(speed);
    state.trail.push({ x: m.x, y: m.y, age: 0 });
    if (state.trail.length > 60) state.trail.shift();
    // ring collision
    for (const r of state.rings){
      if (r.hit) continue;
      const dx = m.x - r.x, dy = m.y - r.y;
      if (Math.hypot(dx, dy) < r.r + 6){
        hitRing(r);
      }
    }
    // ground / out-of-bounds
    if (m.y > PHYS.groundPx - 12){
      m.y = PHYS.groundPx - 12;
      m.alive = false; m.landed = true;
      sndBoing();
      spawnDust(m.x, m.y + 12, 24);
      scream(false);
      onLandedOrLost();
    } else if (m.x > W + 80 || m.x < -80 || m.y < -200){
      m.alive = false;
      scream(false);
      onLandedOrLost();
    }
  }
  // trail age
  for (const t of state.trail) t.age += dt;
}
function hitRing(r){
  r.hit = true;
  state.ringsHit++;
  const combo = state.ringsHit;
  const pts = (r.kind === 'gold' ? 250 : 100) + combo * 25;
  state.score += pts;
  sndPing(combo - 1);
  spawnConfetti(r.x, r.y, 24);
  showFloatText(r.x, r.y - 30, '+' + pts);
  uiRefresh();
  state.shake = Math.min(8, state.shake + 3);
  if (state.ringsHit >= state.ringsTotal){
    state.cleared = true;
    state.totalScore += state.score;
    setTimeout(() => { sndCheer(); showToast('STAGE CLEAR!'); }, 250);
    setTimeout(() => showEnd(true), 1100);
  }
}
function onLandedOrLost(){
  if (state.cleared) return;
  setTimeout(() => {
    if (state.cleared) return;
    state.flying = false;
    state.mii = null;
    state.trail = [];
    if (state.shotsLeft <= 0){
      showEnd(false);
    }
  }, 700);
}
function spawnDust(x, y, n){
  for (let i = 0; i < n; i++){
    state.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 220,
      vy: -Math.random() * 240 - 30,
      r: 2 + Math.random() * 3,
      color: '#b8a070',
      life: 0.7 + Math.random() * 0.4,
      age: 0,
    });
  }
}
function spawnConfetti(x, y, n){
  const cols = ['#ff5a82','#f5c842','#5fa8e8','#6cba56','#b97cff','#ff8a3a'];
  for (let i = 0; i < n; i++){
    state.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 360,
      vy: -Math.random() * 320 - 40,
      r: 3 + Math.random() * 4,
      color: cols[Math.floor(Math.random() * cols.length)],
      life: 1.1 + Math.random() * 0.6,
      age: 0,
      spin: Math.random() * 6,
      square: true,
    });
  }
}
const _floats = [];
function showFloatText(x, y, text){
  _floats.push({ x, y, text, age: 0, life: 1.2 });
}

/* ── Render ─────────────────────────────────────────── */
function render(){
  recompute();
  const t = performance.now() * 0.001;
  ctx.clearRect(0, 0, W, H);
  drawBg(t);
  drawGround();
  drawClouds(t);
  // shake
  ctx.save();
  if (state.shake > 0){
    ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
    state.shake = Math.max(0, state.shake - 0.4);
  }
  drawTrajectoryPreview();
  drawRings(t);
  drawSlingshot();
  drawMii();
  drawTrail();
  drawAimGuide();
  drawParticles();
  drawFloats();
  ctx.restore();
  drawWindIndicator();
}
function drawBg(t){
  // distant hills + parallax sun
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#e8f4ff');
  grd.addColorStop(0.5, '#b8e2ff');
  grd.addColorStop(1, '#93cae0');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
  // sun
  const sx = W * 0.82, sy = H * 0.18;
  const sun = ctx.createRadialGradient(sx, sy, 10, sx, sy, 120);
  sun.addColorStop(0, 'rgba(255,236,170,0.95)');
  sun.addColorStop(1, 'rgba(255,236,170,0)');
  ctx.fillStyle = sun;
  ctx.fillRect(sx - 130, sy - 130, 260, 260);
  ctx.fillStyle = '#fff5c8';
  ctx.beginPath(); ctx.arc(sx, sy, 28, 0, Math.PI * 2); ctx.fill();
  // distant hills
  ctx.fillStyle = '#82b8d4';
  for (let i = 0; i < 5; i++){
    const cx = (i * 280 + Math.sin(t * 0.2 + i) * 12) - 60;
    const cy = H * PHYS.groundY - 20;
    ctx.beginPath();
    ctx.ellipse(cx, cy + 10, 180, 60, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#7aa8b8';
  for (let i = 0; i < 4; i++){
    const cx = (i * 360 + Math.sin(t * 0.3 + i) * 18);
    const cy = H * PHYS.groundY - 8;
    ctx.beginPath();
    ctx.ellipse(cx, cy + 14, 240, 56, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}
function drawGround(){
  const gy = PHYS.groundPx;
  const grd = ctx.createLinearGradient(0, gy, 0, H);
  grd.addColorStop(0, '#6cba56');
  grd.addColorStop(0.4, '#5aa748');
  grd.addColorStop(1, '#3c8a32');
  ctx.fillStyle = grd;
  ctx.fillRect(0, gy, W, H - gy);
  // grass tufts
  ctx.fillStyle = '#3c8a32';
  for (let x = 0; x < W; x += 18){
    const h = 5 + ((x * 17) % 7);
    ctx.fillRect(x, gy - h, 2, h);
  }
  // dirt strip
  ctx.fillStyle = '#7a5230';
  ctx.fillRect(0, gy + 4, W, 4);
}
function drawClouds(t){
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const yBase = H * 0.18;
  for (let i = 0; i < 5; i++){
    const phase = i * 1.3;
    const x = ((t * 14 + i * 220) % (W + 240)) - 120;
    const y = yBase + Math.sin(t * 0.4 + phase) * 26 + i * 26;
    drawCloud(x, y, 30 + (i % 3) * 10);
  }
}
function drawCloud(x, y, r){
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.arc(x + r * 0.8, y + 4, r * 0.85, 0, Math.PI * 2);
  ctx.arc(x - r * 0.8, y + 4, r * 0.8, 0, Math.PI * 2);
  ctx.arc(x + r * 1.4, y, r * 0.7, 0, Math.PI * 2);
  ctx.arc(x - r * 1.4, y, r * 0.6, 0, Math.PI * 2);
  ctx.fill();
}
function drawSlingshot(){
  const a = state.slingAnchor;
  // wooden Y-frame
  ctx.fillStyle = '#7a4a18';
  ctx.fillRect(a.x - 6, a.y, 12, 110);
  // base nub
  ctx.fillRect(a.x - 14, a.y + 100, 28, 12);
  // fork arms
  ctx.strokeStyle = '#7a4a18';
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(a.x - 30, a.y - 40);
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(a.x + 30, a.y - 40);
  ctx.stroke();
  // bark texture lines
  ctx.strokeStyle = '#5a3210';
  ctx.lineWidth = 2;
  for (let y = 0; y < 100; y += 14){
    ctx.beginPath();
    ctx.moveTo(a.x - 4, a.y + y);
    ctx.lineTo(a.x + 4, a.y + y + 6);
    ctx.stroke();
  }
  // bands when not flying
  if (!state.flying && state.shotsLeft > 0){
    let mx = state.miiReady.x, my = state.miiReady.y;
    if (state.aiming && state.drag){
      const anchor = state.slingAnchor;
      const dx = state.drag.x - anchor.x;
      const dy = state.drag.y - (anchor.y - 30);
      const d = Math.hypot(dx, dy);
      const cl = Math.min(PHYS.maxPull, d);
      const sc = d > 0 ? cl / d : 0;
      mx = anchor.x + dx * sc;
      my = anchor.y - 30 + dy * sc;
    }
    ctx.strokeStyle = '#3a2010';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(a.x - 30, a.y - 40);
    ctx.lineTo(mx, my);
    ctx.moveTo(a.x + 30, a.y - 40);
    ctx.lineTo(mx, my);
    ctx.stroke();
    // little pouch
    ctx.fillStyle = '#5a3a18';
    ctx.beginPath();
    ctx.ellipse(mx, my + 14, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}
function drawMii(){
  // pick position
  let x, y, spin = 0, scaleX = 1;
  if (state.flying && state.mii && state.mii.alive){
    x = state.mii.x; y = state.mii.y; spin = state.mii.spin;
    // squish in flight direction
  } else if (!state.flying && state.shotsLeft > 0){
    if (state.aiming && state.drag){
      const anchor = state.slingAnchor;
      const dx = state.drag.x - anchor.x;
      const dy = state.drag.y - (anchor.y - 30);
      const d = Math.hypot(dx, dy);
      const cl = Math.min(PHYS.maxPull, d);
      const sc = d > 0 ? cl / d : 0;
      x = anchor.x + dx * sc;
      y = anchor.y - 30 + dy * sc;
    } else {
      x = state.miiReady.x; y = state.miiReady.y;
    }
  } else if (state.mii && state.mii.landed){
    x = state.mii.x; y = state.mii.y;
  } else {
    return;
  }
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(spin);
  // shadow on ground (only when low)
  ctx.restore();
  drawMiiBody(x, y, spin);
}
function drawMiiBody(x, y, spin){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(spin);
  // body (shirt)
  ctx.fillStyle = '#5fa8e8';
  ctx.beginPath();
  ctx.ellipse(0, 12, 14, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  // arms
  ctx.fillStyle = '#ffd7b8';
  ctx.beginPath(); ctx.arc(-12, 12, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 12, 12, 4, 0, Math.PI * 2); ctx.fill();
  // head
  ctx.fillStyle = '#ffd7b8';
  ctx.beginPath(); ctx.arc(0, -6, 14, 0, Math.PI * 2); ctx.fill();
  // head outline
  ctx.strokeStyle = '#d4a883';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, -6, 14, 0, Math.PI * 2); ctx.stroke();
  // hair (cap top)
  ctx.fillStyle = '#2a1810';
  ctx.beginPath();
  ctx.moveTo(-14, -6);
  ctx.quadraticCurveTo(-12, -22, 0, -20);
  ctx.quadraticCurveTo(12, -22, 14, -6);
  ctx.lineTo(10, -10);
  ctx.lineTo(0, -14);
  ctx.lineTo(-10, -10);
  ctx.closePath();
  ctx.fill();
  // eyes
  const eyeOpen = !state.flying || (state.mii && state.mii.flightT < 0.4) ? 0 : 1;
  if (eyeOpen){
    ctx.strokeStyle = '#1a0e08';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(-4, -6, 3, Math.PI, 0);
    ctx.arc( 4, -6, 3, Math.PI, 0);
    ctx.stroke();
  } else {
    ctx.fillStyle = '#1a0e08';
    ctx.fillRect(-6, -8, 4, 4);
    ctx.fillRect( 2, -8, 4, 4);
    // pupils sparkle
    ctx.fillStyle = '#fff';
    ctx.fillRect(-5, -7, 1, 1);
    ctx.fillRect( 3, -7, 1, 1);
  }
  // mouth — open scream while flying
  if (state.flying){
    ctx.fillStyle = '#2a0e10';
    ctx.beginPath();
    ctx.ellipse(0, 0, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (state.cleared){
    ctx.strokeStyle = '#2a0e10';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -2, 5, 0.2, Math.PI - 0.2);
    ctx.stroke();
  } else {
    ctx.fillStyle = '#a04030';
    ctx.beginPath();
    ctx.ellipse(0, 1, 2.5, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // cheek dots
  ctx.fillStyle = 'rgba(232,90,90,0.5)';
  ctx.beginPath(); ctx.arc(-8, 0, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 8, 0, 2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}
function drawRings(t){
  for (const r of state.rings){
    const bob = Math.sin(r.bob) * 4;
    const ry = r.y + bob;
    if (r.hit){
      // faded hit ring
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(r.x, ry, r.r, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
      continue;
    }
    // glow
    const isGold = r.kind === 'gold';
    const ringColor = isGold ? '#f5c842' : '#ff5a82';
    const ringColor2 = isGold ? '#b8842e' : '#e02850';
    const glow = ctx.createRadialGradient(r.x, ry, r.r * 0.4, r.x, ry, r.r * 2);
    glow.addColorStop(0, isGold ? 'rgba(245,200,66,0.45)' : 'rgba(255,90,130,0.4)');
    glow.addColorStop(1, isGold ? 'rgba(245,200,66,0)' : 'rgba(255,90,130,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(r.x - r.r * 2, ry - r.r * 2, r.r * 4, r.r * 4);
    // ring outer
    ctx.strokeStyle = ringColor2;
    ctx.lineWidth = 9;
    ctx.beginPath(); ctx.arc(r.x, ry, r.r, 0, Math.PI * 2); ctx.stroke();
    // inner ring
    ctx.strokeStyle = ringColor;
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(r.x, ry, r.r, 0, Math.PI * 2); ctx.stroke();
    // glint
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(r.x, ry, r.r - 1, -Math.PI * 0.5 + Math.sin(t * 3) * 0.3, -Math.PI * 0.2); ctx.stroke();
  }
}
function drawTrail(){
  if (!state.trail.length) return;
  for (let i = 0; i < state.trail.length; i++){
    const tr = state.trail[i];
    const a = (i / state.trail.length) * 0.5;
    ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
    ctx.beginPath();
    ctx.arc(tr.x, tr.y, 3 + i * 0.06, 0, Math.PI * 2);
    ctx.fill();
  }
}
function drawAimGuide(){
  if (!state.aiming || !state.drag) return;
  const anchor = state.slingAnchor;
  const dx = anchor.x - state.drag.x;
  const dy = (anchor.y - 30) - state.drag.y;
  const pull = Math.min(PHYS.maxPull, Math.hypot(dx, dy));
  if (pull < 12) return;
  const ang = Math.atan2(dy, dx);
  const speed = pull * PHYS.launchScale * 14;
  const vx0 = Math.cos(ang) * speed, vy0 = Math.sin(ang) * speed;
  const cfg = STAGES[state.stageIdx];
  // simulate forward 0.6s with dt 0.04 — render dots
  let x = state.miiReady.x, y = state.miiReady.y;
  let vx = vx0, vy = vy0;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (let i = 0; i < 26; i++){
    vx += cfg.wind * 0.04;
    vy += PHYS.g * 40;
    const sp = Math.hypot(vx, vy);
    if (sp > 0){
      const f = PHYS.drag * sp * sp * 0.04;
      vx -= (vx / sp) * f; vy -= (vy / sp) * f;
    }
    x += vx * 0.04;
    y += vy * 0.04;
    if (y > PHYS.groundPx) break;
    if (x < 0 || x > W) break;
    ctx.beginPath();
    ctx.arc(x, y, 2.5 - i * 0.04, 0, Math.PI * 2);
    ctx.fill();
  }
  // pull strength bar above slingshot
  const bx = anchor.x - 30, by = anchor.y - 70;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(bx, by, 60, 6);
  ctx.fillStyle = pull > 150 ? '#ff5a82' : '#f5c842';
  ctx.fillRect(bx, by, 60 * (pull / PHYS.maxPull), 6);
}
function drawTrajectoryPreview(){
  // shadow for the mii in flight
  if (state.mii && state.mii.alive){
    const sX = state.mii.x;
    const sY = PHYS.groundPx;
    const distFactor = Math.max(0.2, 1 - (sY - state.mii.y) / 600);
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath();
    ctx.ellipse(sX, sY + 2, 14 * distFactor, 4 * distFactor, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}
function drawParticles(){
  for (const p of state.particles){
    const a = 1 - p.age / p.life;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = a;
    if (p.square){
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.spin + p.age * 6);
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}
function drawFloats(){
  ctx.font = '700 18px "Bungee", sans-serif';
  ctx.textAlign = 'center';
  for (let i = _floats.length - 1; i >= 0; i--){
    const f = _floats[i];
    f.age += 1/60;
    f.y -= 0.8;
    if (f.age >= f.life){ _floats.splice(i, 1); continue; }
    const a = 1 - f.age / f.life;
    ctx.fillStyle = 'rgba(20,16,12,' + a + ')';
    ctx.fillText(f.text, f.x + 2, f.y + 2);
    ctx.fillStyle = 'rgba(245,200,66,' + a + ')';
    ctx.fillText(f.text, f.x, f.y);
  }
}
function drawWindIndicator(){
  const cfg = STAGES[state.stageIdx];
  if (!cfg.wind) return;
  ctx.font = '700 11px "Space Mono", monospace';
  ctx.fillStyle = 'rgba(20,16,12,0.7)';
  ctx.textAlign = 'left';
  const arr = cfg.wind > 0 ? '→' : '←';
  ctx.fillText('WIND ' + arr + ' ' + Math.abs(cfg.wind), 12, 22);
  // arrow icon
  const ax = 92, ay = 16;
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const len = Math.min(80, Math.abs(cfg.wind) * 0.6);
  const dir = cfg.wind > 0 ? 1 : -1;
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax + len * dir, ay);
  ctx.moveTo(ax + len * dir, ay);
  ctx.lineTo(ax + (len - 8) * dir, ay - 5);
  ctx.lineTo(ax + (len - 8) * dir, ay + 5);
  ctx.closePath();
  ctx.fill();
}

/* ── Main loop ──────────────────────────────────────── */
let last = performance.now();
function loop(now){
  const dt = Math.min(1/30, (now - last) / 1000);
  last = now;
  step(dt);
  render();
  requestAnimationFrame(loop);
}

/* ── UI buttons ─────────────────────────────────────── */
document.getElementById('btn-reset').addEventListener('click', () => {
  state.totalScore -= state.score;
  setupStage(state.stageIdx);
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (state.stageIdx < STAGES.length - 1){
    setupStage(state.stageIdx + 1);
  } else {
    state.totalScore = 0;
    setupStage(0);
  }
});
document.getElementById('btn-replay').addEventListener('click', () => {
  state.totalScore -= state.score;
  setupStage(state.stageIdx);
});

/* ── Boot ───────────────────────────────────────────── */
fit();
setupStage(0);
requestAnimationFrame(loop);
</script>
