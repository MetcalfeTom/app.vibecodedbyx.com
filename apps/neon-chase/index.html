<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Neon Chase</title>
<link rel="icon" href="https://emojicdn.elk.sh/🏎️">
<meta property="og:title" content="Neon Chase">
<meta property="og:description" content="Blazing neon tunnel racer. Dodge obstacles at hyperspeed.">
<meta property="og:url" content="https://app.sloppy.live/neon-chase/">
<meta property="og:image" content="https://emojicdn.elk.sh/🏎️?style=google">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;user-select:none}
canvas{display:block}
#hud{position:fixed;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;z-index:10;pointer-events:none}
#hud span{color:rgba(255,255,255,.6);font-size:12px}
#hud b{color:#fff}
#speed-bar{position:fixed;right:12px;top:50%;transform:translateY(-50%);width:6px;height:120px;background:rgba(255,255,255,.06);border-radius:3px;z-index:10;pointer-events:none}
#speed-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#0ff,#f0f);border-radius:3px;transition:height .1s}
#start-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.85)}
#start-screen h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(32px,8vw,56px);background:linear-gradient(135deg,#0ff,#f0f,#ff0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;letter-spacing:4px}
#start-screen .sub{color:rgba(255,255,255,.3);font-size:13px;margin-bottom:32px}
#start-screen button{background:none;border:2px solid rgba(0,255,255,.4);color:#0ff;padding:14px 40px;font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;cursor:pointer;border-radius:6px;letter-spacing:2px;transition:all .2s}
#start-screen button:hover{background:rgba(0,255,255,.1);border-color:#0ff;box-shadow:0 0 30px rgba(0,255,255,.2)}
#start-screen .hi{color:rgba(255,255,255,.25);font-size:11px;margin-top:16px}
#start-screen .controls{color:rgba(255,255,255,.2);font-size:10px;margin-top:8px}
#game-over{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.8)}
#game-over.show{display:flex}
#game-over h2{font-family:'Orbitron',sans-serif;font-weight:700;font-size:28px;color:#f44;margin-bottom:6px}
#game-over .stats{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:24px}
#game-over button{background:none;border:2px solid rgba(255,60,60,.4);color:#f66;padding:12px 32px;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border-radius:6px;letter-spacing:2px;transition:all .2s}
#game-over button:hover{background:rgba(255,60,60,.1);border-color:#f66}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <span>SCORE <b id="hud-score">0</b></span>
  <span>SPEED <b id="hud-speed">0</b></span>
  <span>HI <b id="hud-hi">0</b></span>
</div>
<div id="speed-bar"><div id="speed-fill" style="height:0%"></div></div>
<div id="start-screen">
  <h1>NEON CHASE</h1>
  <div class="sub">// hyperspeed tunnel racer</div>
  <button id="start-btn">LAUNCH</button>
  <div class="hi" id="start-hi"></div>
  <div class="controls">Arrow keys / WASD / Touch to steer</div>
</div>
<div id="game-over">
  <h2>WRECKED</h2>
  <div class="stats" id="go-stats"></div>
  <button id="retry-btn">RETRY</button>
</div>
<script>
var CV=document.getElementById('c'),X=CV.getContext('2d');
var W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

var TUNNEL_SEGMENTS=80;
var SEGMENT_DEPTH=12;
var LANES=5;
var BASE_SPEED=4;
var MAX_SPEED=14;
var ACCEL=0.008;
var OBSTACLE_RATE=0.025;
var POWERUP_RATE=0.004;

var playing=false,dead=false;
var speed=BASE_SPEED,score=0,hiScore=0;
var playerLane=2,playerX=0,targetX=0;
var camZ=0;
var shake=0;
var segments=[];
var obstacles=[];
var particles=[];
var powerups=[];
var shield=0;
var combo=1,comboTimer=0;
var tunnelHue=180;
var flashAlpha=0;

function hsl(h,s,l){return 'hsl('+h+','+s+'%,'+l+'%)';}
function hsla(h,s,l,a){return 'hsla('+h+','+s+'%,'+l+'%,'+a+')';}

function initSegments(){
  segments=[];
  for(var i=0;i<TUNNEL_SEGMENTS;i++){
    segments.push({curve:(Math.random()-0.5)*0.3,narrow:1});
  }
}

function project(z,x,y){
  var depth=z-camZ;
  if(depth<=0.5)depth=0.5;
  var scale=300/depth;
  return{sx:W/2+x*scale,sy:H*0.48+y*scale,scale:scale};
}

function drawTunnel(){
  var baseW=260,baseH=200;
  var curveAccum=0;
  for(var i=TUNNEL_SEGMENTS-1;i>=1;i--){
    var z0=camZ+i*SEGMENT_DEPTH;
    var seg=segments[i%segments.length];
    curveAccum+=seg.curve*0.4;
    var p0=project(z0,curveAccum,0);
    var p1=project(z0-SEGMENT_DEPTH,curveAccum+seg.curve*0.4,0);
    var w0=baseW*p0.scale*0.01;
    var h0=baseH*p0.scale*0.01;
    var w1=baseW*p1.scale*0.01;
    var h1=baseH*p1.scale*0.01;
    var fade=1-i/TUNNEL_SEGMENTS;
    var hue=(tunnelHue+i*2)%360;
    X.strokeStyle=hsla(hue,80,50,fade*0.25);
    X.lineWidth=1;
    X.beginPath();X.moveTo(p0.sx-w0,p0.sy-h0);X.lineTo(p1.sx-w1,p1.sy-h1);X.stroke();
    X.beginPath();X.moveTo(p0.sx+w0,p0.sy-h0);X.lineTo(p1.sx+w1,p1.sy-h1);X.stroke();
    X.beginPath();X.moveTo(p0.sx-w0,p0.sy+h0);X.lineTo(p1.sx-w1,p1.sy+h1);X.stroke();
    X.beginPath();X.moveTo(p0.sx+w0,p0.sy+h0);X.lineTo(p1.sx+w1,p1.sy+h1);X.stroke();
    if(i%4===0){
      X.strokeStyle=hsla(hue,70,40,fade*0.15);
      X.beginPath();X.moveTo(p0.sx-w0,p0.sy-h0);X.lineTo(p0.sx+w0,p0.sy-h0);X.stroke();
      X.beginPath();X.moveTo(p0.sx-w0,p0.sy+h0);X.lineTo(p0.sx+w0,p0.sy+h0);X.stroke();
    }
    if(i%3===0){
      X.strokeStyle=hsla(hue,60,35,fade*0.12);
      X.lineWidth=0.5;
      X.beginPath();X.moveTo(p0.sx-w0,p0.sy+h0);X.lineTo(p0.sx+w0,p0.sy+h0);X.stroke();
    }
    if(i%6===0){
      for(var lane=0;lane<=LANES;lane++){
        var lx=(lane/LANES-0.5)*2;
        var fx0=p0.sx+lx*w0*0.8;
        var fx1=p1.sx+lx*w1*0.8;
        X.strokeStyle=hsla(hue,50,50,fade*0.08);
        X.beginPath();X.moveTo(fx0,p0.sy+h0);X.lineTo(fx1,p1.sy+h1);X.stroke();
      }
    }
  }
}

function laneToX(lane){return (lane/(LANES-1)-0.5)*2*0.65;}

function spawnObstacle(){
  var lane=Math.floor(Math.random()*LANES);
  var type=Math.random()<0.3?'wide':'block';
  var lanes=type==='wide'?2:1;
  if(type==='wide')lane=Math.min(lane,LANES-2);
  obstacles.push({z:camZ+TUNNEL_SEGMENTS*SEGMENT_DEPTH,lane:lane,lanes:lanes,type:type,hue:Math.random()*360,hit:false,scored:false});
}

function spawnPowerup(){
  powerups.push({z:camZ+TUNNEL_SEGMENTS*SEGMENT_DEPTH,lane:Math.floor(Math.random()*LANES),type:Math.random()<0.5?'shield':'boost',collected:false});
}

function drawObstacles(){
  var baseW=260;
  obstacles.forEach(function(ob){
    if(ob.hit)return;
    var relZ=ob.z-camZ;
    if(relZ<0||relZ>TUNNEL_SEGMENTS*SEGMENT_DEPTH)return;
    var p=project(ob.z,0,0);
    var w=baseW*p.scale*0.01;
    var laneW=w*2*0.8/LANES;
    var centerX=p.sx+((ob.lane+ob.lanes*0.5-0.5)/(LANES-1)-0.5)*2*w*0.65;
    var bw=laneW*ob.lanes*0.85;
    var bh=p.scale*1.8;
    var by=p.sy-bh/2;
    var fade=Math.max(0,1-relZ/(TUNNEL_SEGMENTS*SEGMENT_DEPTH));
    X.shadowColor=hsla(ob.hue,100,60,.5*fade);
    X.shadowBlur=15*fade;
    X.fillStyle=hsla(ob.hue,80,45,fade*0.7);
    X.fillRect(centerX-bw/2,by,bw,bh);
    X.strokeStyle=hsla(ob.hue,100,65,fade);
    X.lineWidth=1.5;
    X.strokeRect(centerX-bw/2,by,bw,bh);
    X.strokeStyle=hsla(ob.hue,100,75,fade*0.3);
    X.lineWidth=0.5;
    X.strokeRect(centerX-bw/2+3,by+3,bw-6,bh-6);
    X.shadowBlur=0;
  });
  powerups.forEach(function(pu){
    if(pu.collected)return;
    var relZ=pu.z-camZ;
    if(relZ<0||relZ>TUNNEL_SEGMENTS*SEGMENT_DEPTH)return;
    var p=project(pu.z,0,0);
    var w=260*p.scale*0.01;
    var centerX=p.sx+laneToX(pu.lane)*w*0.78;
    var size=p.scale*0.8;
    var fade=Math.max(0,1-relZ/(TUNNEL_SEGMENTS*SEGMENT_DEPTH));
    var pulse=0.8+Math.sin(Date.now()*0.008)*0.2;
    var col=pu.type==='shield'?'0,200,255':'255,220,0';
    X.shadowColor='rgba('+col+','+fade*0.6+')';
    X.shadowBlur=12*fade;
    X.fillStyle='rgba('+col+','+fade*0.8*pulse+')';
    X.beginPath();X.arc(centerX,p.sy,size*pulse,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
  });
}

function drawPlayer(){
  var px=W/2+playerX*130;
  var py=H*0.72;
  var size=18;
  if(shield>0){
    var sa=Math.min(1,shield/2);
    X.shadowColor='rgba(0,200,255,'+sa*0.5+')';
    X.shadowBlur=20;
    X.strokeStyle='rgba(0,200,255,'+sa*0.6+')';
    X.lineWidth=2;
    X.beginPath();X.arc(px,py,size+8,0,Math.PI*2);X.stroke();
    X.shadowBlur=0;
  }
  X.shadowColor='rgba(0,255,200,.5)';
  X.shadowBlur=12;
  X.fillStyle='#0fc';
  X.beginPath();
  X.moveTo(px,py-size);
  X.lineTo(px+size*0.7,py+size*0.5);
  X.lineTo(px+size*0.2,py+size*0.2);
  X.lineTo(px-size*0.2,py+size*0.2);
  X.lineTo(px-size*0.7,py+size*0.5);
  X.closePath();X.fill();
  X.fillStyle='rgba(0,0,0,.4)';
  X.beginPath();
  X.moveTo(px,py-size*0.4);
  X.lineTo(px+size*0.25,py+size*0.15);
  X.lineTo(px-size*0.25,py+size*0.15);
  X.closePath();X.fill();
  var flicker=0.6+Math.random()*0.4;
  var engineSize=size*0.3*(speed/BASE_SPEED)*flicker;
  X.fillStyle='rgba(255,'+Math.floor(100+speed*10)+',0,'+flicker*0.8+')';
  X.beginPath();
  X.moveTo(px-size*0.15,py+size*0.25);
  X.lineTo(px,py+size*0.25+engineSize);
  X.lineTo(px+size*0.15,py+size*0.25);
  X.closePath();X.fill();
  X.shadowBlur=0;
}

function spawnExplosion(x,y,hue,count){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2;
    var sp=80+Math.random()*250;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.5+Math.random()*0.6,maxLife:0.5+Math.random()*0.6,size:1.5+Math.random()*3,hue:hue+Math.random()*40-20});
  }
}
function updateParticles(dt){
  particles.forEach(function(p){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.97;p.vy*=0.97;p.life-=dt;});
  particles=particles.filter(function(p){return p.life>0;});
}
function drawParticles(){
  particles.forEach(function(p){
    var a=p.life/p.maxLife;
    X.globalAlpha=a;
    X.shadowColor=hsla(p.hue,100,60,.5);
    X.shadowBlur=6*a;
    X.fillStyle=hsl(p.hue,100,70);
    X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });
  X.globalAlpha=1;X.shadowBlur=0;
}

var speedLines=[];
function initSpeedLines(){
  speedLines=[];
  for(var i=0;i<30;i++){
    speedLines.push({x:(Math.random()-0.5)*W*1.5,y:Math.random()*H,len:20+Math.random()*40,speed:200+Math.random()*300});
  }
}
initSpeedLines();

function drawSpeedLines(dt){
  var intensity=Math.max(0,(speed-BASE_SPEED)/(MAX_SPEED-BASE_SPEED));
  if(intensity<0.05)return;
  X.strokeStyle='rgba(255,255,255,'+intensity*0.08+')';
  X.lineWidth=0.5;
  speedLines.forEach(function(l){
    l.y+=l.speed*intensity*dt;
    if(l.y>H+20){l.y=-20;l.x=(Math.random()-0.5)*W*1.5+W/2;}
    var sx=W/2+(l.x-W/2)*1.2;
    X.beginPath();X.moveTo(sx,l.y);X.lineTo(sx,l.y+l.len*intensity);X.stroke();
  });
}

function checkCollisions(){
  var pLane=playerLane;
  var pz=camZ+5*SEGMENT_DEPTH;
  obstacles.forEach(function(ob){
    if(ob.hit)return;
    var dz=Math.abs(ob.z-pz);
    if(dz<SEGMENT_DEPTH*2){
      var hit=false;
      for(var l=0;l<ob.lanes;l++){if(ob.lane+l===pLane)hit=true;}
      if(hit){
        if(shield>0){
          shield=0;ob.hit=true;
          spawnExplosion(W/2+playerX*130,H*0.72,180,20);
          shake=5;score+=50*combo;
        } else {ob.hit=true;die();}
      }
    }
  });
  powerups.forEach(function(pu){
    if(pu.collected)return;
    var dz=Math.abs(pu.z-pz);
    if(dz<SEGMENT_DEPTH*2&&pu.lane===pLane){
      pu.collected=true;
      if(pu.type==='shield'){shield=8;spawnExplosion(W/2+playerX*130,H*0.72,200,12);}
      else{speed=Math.min(MAX_SPEED,speed+3);spawnExplosion(W/2+playerX*130,H*0.72,50,12);}
      score+=25;
    }
  });
}

function die(){
  dead=true;playing=false;
  spawnExplosion(W/2+playerX*130,H*0.72,0,40);
  flashAlpha=0.6;shake=15;
  if(score>hiScore){hiScore=score;try{localStorage.setItem('neon_chase_hi',hiScore);}catch(e){}}
  setTimeout(function(){
    document.getElementById('go-stats').textContent='Score: '+score+(score>=hiScore?' (NEW BEST!)':'')+'  |  Top Speed: '+Math.floor(speed*20)+'km/h';
    document.getElementById('game-over').classList.add('show');
  },800);
}

var keys={};
document.addEventListener('keydown',function(e){keys[e.key]=true;});
document.addEventListener('keyup',function(e){keys[e.key]=false;});

var touchX=null;
CV.addEventListener('touchstart',function(e){e.preventDefault();touchX=e.touches[0].clientX;},{passive:false});
CV.addEventListener('touchmove',function(e){e.preventDefault();
  var tx=e.touches[0].clientX;
  var dx=tx-touchX;
  if(Math.abs(dx)>20){
    if(dx>0&&playerLane<LANES-1)playerLane++;
    else if(dx<0&&playerLane>0)playerLane--;
    touchX=tx;
  }
},{passive:false});
CV.addEventListener('touchend',function(){touchX=null;});

function handleInput(){
  if(!playing)return;
  if(keys['ArrowLeft']||keys['a']||keys['A']){
    if(playerLane>0)playerLane--;
    keys['ArrowLeft']=false;keys['a']=false;keys['A']=false;
  }
  if(keys['ArrowRight']||keys['d']||keys['D']){
    if(playerLane<LANES-1)playerLane++;
    keys['ArrowRight']=false;keys['d']=false;keys['D']=false;
  }
}

var lastTime=0;

function startGame(){
  playing=true;dead=false;
  speed=BASE_SPEED;score=0;
  playerLane=2;playerX=0;targetX=0;
  camZ=0;shield=0;combo=1;comboTimer=0;
  tunnelHue=180;shake=0;flashAlpha=0;
  obstacles=[];powerups=[];particles=[];
  initSegments();
  document.getElementById('start-screen').style.display='none';
  document.getElementById('game-over').classList.remove('show');
}

function loop(time){
  var dt=Math.min((time-lastTime)/1000,0.04);
  lastTime=time;
  handleInput();
  if(playing){
    camZ+=speed*dt*60;
    speed=Math.min(MAX_SPEED,speed+ACCEL*dt*60);
    score+=Math.floor(speed*dt*10);
    tunnelHue=(tunnelHue+dt*15)%360;
    targetX=laneToX(playerLane);
    playerX+=(targetX-playerX)*0.15;
    if(shield>0)shield-=dt;
    comboTimer-=dt;
    if(comboTimer<=0)combo=1;
    if(Math.random()<OBSTACLE_RATE+speed*0.001)spawnObstacle();
    if(Math.random()<POWERUP_RATE)spawnPowerup();
    obstacles=obstacles.filter(function(o){return o.z>camZ-50;});
    powerups=powerups.filter(function(p){return p.z>camZ-50;});
    obstacles.forEach(function(ob){
      if(ob.hit||ob.scored)return;
      if(ob.z<camZ+3*SEGMENT_DEPTH){
        ob.scored=true;
        var isNear=false;
        for(var l=0;l<ob.lanes;l++){if(Math.abs((ob.lane+l)-playerLane)===1)isNear=true;}
        if(isNear){score+=20*combo;combo=Math.min(10,combo+1);comboTimer=3;}
      }
    });
    checkCollisions();
  }
  shake*=0.9;flashAlpha*=0.92;
  updateParticles(dt);

  X.save();
  if(shake>0.5)X.translate((Math.random()-0.5)*shake*2,(Math.random()-0.5)*shake*2);
  X.fillStyle='#06060e';
  X.fillRect(0,0,W,H);
  var vg=X.createRadialGradient(W/2,H*0.5,0,W/2,H*0.5,W*0.6);
  vg.addColorStop(0,hsla(tunnelHue,60,8,.3));
  vg.addColorStop(1,'transparent');
  X.fillStyle=vg;X.fillRect(0,0,W,H);
  drawSpeedLines(dt);
  drawTunnel();
  drawObstacles();
  if(!dead)drawPlayer();
  drawParticles();
  if(flashAlpha>0.01){X.fillStyle='rgba(255,50,50,'+flashAlpha+')';X.fillRect(0,0,W,H);}
  if(playing&&combo>1){
    X.fillStyle='rgba(255,220,0,'+Math.min(1,comboTimer/2)*0.7+')';
    X.font='bold 16px Orbitron';X.textAlign='center';
    X.fillText('x'+combo,W/2,H*0.62);
  }
  X.restore();

  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-speed').textContent=Math.floor(speed*20)+'km/h';
  document.getElementById('hud-hi').textContent=hiScore;
  document.getElementById('speed-fill').style.height=Math.floor((speed-BASE_SPEED)/(MAX_SPEED-BASE_SPEED)*100)+'%';
  requestAnimationFrame(loop);
}

try{hiScore=parseInt(localStorage.getItem('neon_chase_hi'))||0;}catch(e){}
document.getElementById('start-hi').textContent=hiScore>0?'Best: '+hiScore:'';
document.getElementById('hud-hi').textContent=hiScore;
document.getElementById('start-btn').onclick=startGame;
document.getElementById('retry-btn').onclick=startGame;
requestAnimationFrame(loop);
</script>
</body>
</html>
