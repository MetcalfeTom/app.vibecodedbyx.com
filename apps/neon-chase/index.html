<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Chase</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚡">
<meta property="og:title" content="Neon Chase">
<meta property="og:description" content="Dodge neon obstacles at breakneck speed. How far can you survive?">
<meta property="og:url" content="https://app.sloppy.live/neon-chase/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20obstacle%20course%20game%20glowing%20geometric%20shapes%20dark%20background%20speed%20lines?width=1200&height=630&nologo=true&referrer=sloppy.live">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;font-family:'Share Tech Mono',monospace;color:#fff;touch-action:none;user-select:none}
canvas{display:block;width:100%;height:100%}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:10}
#score-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;font-family:'Orbitron',sans-serif}
#score-bar .lbl{font-size:10px;color:#888;letter-spacing:2px;text-transform:uppercase}
#score-bar .val{font-size:22px;font-weight:900;text-shadow:0 0 12px currentColor}
.score-col{text-align:center}
#score-val{color:#0ff}
#speed-val{color:#f0f}
#best-val{color:#ff0}
#combo-val{color:#0f0}
#start-screen,#death-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;pointer-events:all}
#start-screen{background:radial-gradient(ellipse at center,#0a0a2a 0%,#050510 70%)}
#death-screen{background:rgba(5,5,16,0.92);display:none}
h1{font-family:'Orbitron',sans-serif;font-size:clamp(32px,8vw,64px);font-weight:900;background:linear-gradient(135deg,#0ff,#f0f,#ff0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;margin-bottom:8px}
.sub{font-size:14px;color:#888;margin-bottom:30px;letter-spacing:3px}
.btn{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;padding:14px 40px;border:2px solid #0ff;background:transparent;color:#0ff;cursor:pointer;letter-spacing:2px;transition:all .2s;pointer-events:all}
.btn:hover{background:#0ff;color:#050510;box-shadow:0 0 30px #0ff}
#death-score{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;color:#f0f;margin:10px 0}
#death-best{font-size:16px;color:#ff0;margin-bottom:20px}
#death-msg{font-size:14px;color:#888;margin-bottom:30px}
#controls-hint{font-size:11px;color:#555;margin-top:20px;text-align:center;line-height:1.8}
#backlink{position:absolute;bottom:10px;right:14px;font-size:11px;color:#333;text-decoration:none;z-index:30}
#backlink:hover{color:#0ff}
#mobile-controls{display:none;position:absolute;bottom:20px;left:0;width:100%;z-index:15;pointer-events:all}
.touch-zone{position:absolute;bottom:0;width:50%;height:120px;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:0.15}
.touch-zone.left{left:0}
.touch-zone.right{right:0}
@media(hover:none)and(pointer:coarse){
  #mobile-controls{display:block}
  #controls-hint{display:none}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="score-bar">
    <div class="score-col"><div class="lbl">Score</div><div class="val" id="score-val">0</div></div>
    <div class="score-col"><div class="lbl">Speed</div><div class="val" id="speed-val">1.0x</div></div>
    <div class="score-col"><div class="lbl">Combo</div><div class="val" id="combo-val">x1</div></div>
    <div class="score-col"><div class="lbl">Best</div><div class="val" id="best-val">0</div></div>
  </div>
</div>
<div id="start-screen">
  <h1>NEON CHASE</h1>
  <div class="sub">DODGE · SURVIVE · CHASE THE GLOW</div>
  <button class="btn" id="start-btn">START</button>
  <div id="controls-hint">← → or A/D to move<br>Hold SHIFT to focus (slow + narrow)</div>
</div>
<div id="death-screen">
  <div class="sub">SYSTEM OVERLOAD</div>
  <div id="death-score">0</div>
  <div id="death-best"></div>
  <div id="death-msg"></div>
  <button class="btn" id="retry-btn">RETRY</button>
</div>
<div id="mobile-controls">
  <div class="touch-zone left" id="touch-left">◀</div>
  <div class="touch-zone right" id="touch-right">▶</div>
</div>
<a id="backlink" href="https://sloppy.live" target="_blank">sloppy.live</a>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score-val');
const speedEl = document.getElementById('speed-val');
const bestEl = document.getElementById('best-val');
const comboEl = document.getElementById('combo-val');
const startScreen = document.getElementById('start-screen');
const deathScreen = document.getElementById('death-screen');

let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, dur, type='sine', vol=0.1) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function playDodge() { playTone(800 + Math.random()*400, 0.08, 'sine', 0.04); }
function playCrash() {
  playTone(120, 0.4, 'sawtooth', 0.15);
  playTone(80, 0.5, 'square', 0.1);
}
function playPickup() { playTone(1200, 0.1, 'sine', 0.08); setTimeout(()=>playTone(1600,0.1,'sine',0.08),80); }
function playCombo() { playTone(600, 0.15, 'triangle', 0.06); playTone(900, 0.15, 'triangle', 0.06); }

// State
let best = parseInt(localStorage.getItem('neon-chase-best')) || 0;
bestEl.textContent = best;

let player, obstacles, pickups, particles, trails;
let gameSpeed, score, combo, comboTimer, frame, gameRunning, gameOver;
let shakes = [];
let laneCount = 5;
let laneW, courseL, courseR;

const keys = {};
let touchL = false, touchR = false;

function initGame() {
  laneW = Math.min(70, W / 6);
  const courseW = laneW * laneCount;
  courseL = (W - courseW) / 2;
  courseR = courseL + courseW;
  
  player = {
    x: W / 2,
    y: H * 0.78,
    w: laneW * 0.45,
    h: laneW * 0.55,
    vx: 0,
    focus: false,
    immune: 0,
    trail: []
  };
  obstacles = [];
  pickups = [];
  particles = [];
  trails = [];
  gameSpeed = 2.5;
  score = 0;
  combo = 1;
  comboTimer = 0;
  frame = 0;
  gameRunning = true;
  gameOver = false;
  shakes = [];
}

// Obstacle types
function spawnObstacle() {
  const types = ['bar','diamond','zigzag','pulse','sweep'];
  const t = types[Math.floor(Math.random() * (gameSpeed > 6 ? 5 : gameSpeed > 4 ? 4 : 3))];
  const spd = gameSpeed * (0.7 + Math.random() * 0.5);
  
  if (t === 'bar') {
    const gapLane = Math.floor(Math.random() * laneCount);
    const gapW = laneW * (1 + (Math.random() > 0.5 ? 1 : 0));
    const gapX = courseL + gapLane * laneW;
    obstacles.push({ type:'bar', x: courseL, y: -30, w: gapX - courseL, h: 18, vy: spd, color: '#f0f' });
    obstacles.push({ type:'bar', x: gapX + gapW, y: -30, w: courseR - (gapX + gapW), h: 18, vy: spd, color: '#f0f' });
  } else if (t === 'diamond') {
    const cx = courseL + laneW * (0.5 + Math.floor(Math.random() * laneCount));
    const sz = laneW * (0.6 + Math.random() * 0.4);
    obstacles.push({ type:'diamond', x: cx, y: -sz, size: sz, vy: spd, color: '#ff3060', rot: 0 });
  } else if (t === 'zigzag') {
    const startX = courseL + Math.random() * (courseR - courseL - laneW);
    obstacles.push({ type:'zigzag', x: startX, y: -20, w: laneW * 0.7, h: 14, vy: spd, vx: (Math.random()>0.5?1:-1) * spd * 0.6, color: '#ff8800' });
  } else if (t === 'pulse') {
    const cx = courseL + laneW * (0.5 + Math.floor(Math.random() * laneCount));
    obstacles.push({ type:'pulse', x: cx, y: -30, baseR: laneW * 0.3, r: laneW * 0.3, vy: spd * 0.8, phase: 0, color: '#00ff88' });
  } else if (t === 'sweep') {
    const dir = Math.random() > 0.5 ? 1 : -1;
    obstacles.push({ type:'sweep', x: dir > 0 ? courseL - laneW : courseR + laneW, y: -20 - Math.random()*40, w: laneW * 2.5, h: 14, vy: spd * 0.5, vx: dir * spd * 1.2, color: '#aa00ff' });
  }
}

function spawnPickup() {
  const cx = courseL + laneW * (0.5 + Math.floor(Math.random() * laneCount));
  const types = ['point','combo','shield'];
  const weights = [0.6, 0.3, 0.1];
  let r = Math.random(), cum = 0, t = 'point';
  for (let i = 0; i < types.length; i++) { cum += weights[i]; if (r < cum) { t = types[i]; break; } }
  pickups.push({ type: t, x: cx, y: -20, vy: gameSpeed * 0.8, size: 12, pulse: 0 });
}

function addParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = Math.random() * spread;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 1, life: 1, color, size: 2 + Math.random()*3 });
  }
}

function hitTest(px, py, pw, ph, ox, oy, ow, oh) {
  return px - pw/2 < ox + ow/2 && px + pw/2 > ox - ow/2 && py - ph/2 < oy + oh/2 && py + ph/2 > oy - oh/2;
}

function getObstBounds(o) {
  if (o.type === 'bar') return { x: o.x + o.w/2, y: o.y + o.h/2, w: o.w, h: o.h };
  if (o.type === 'diamond') return { x: o.x, y: o.y, w: o.size*0.8, h: o.size*0.8 };
  if (o.type === 'zigzag') return { x: o.x + o.w/2, y: o.y + o.h/2, w: o.w, h: o.h };
  if (o.type === 'pulse') return { x: o.x, y: o.y, w: o.r*2, h: o.r*2 };
  if (o.type === 'sweep') return { x: o.x + o.w/2, y: o.y + o.h/2, w: o.w, h: o.h };
  return { x: o.x, y: o.y, w: 20, h: 20 };
}

function update() {
  if (!gameRunning) return;
  frame++;
  
  // Speed ramp
  gameSpeed = 2.5 + frame * 0.0012;
  
  // Input
  const moveSpd = player.focus ? 3.5 : 7;
  const accel = 0.8;
  let targetVx = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touchL) targetVx = -moveSpd;
  if (keys['ArrowRight'] || keys['KeyD'] || touchR) targetVx = moveSpd;
  player.focus = keys['ShiftLeft'] || keys['ShiftRight'];
  
  player.vx += (targetVx - player.vx) * accel;
  player.x += player.vx;
  
  // Clamp to course
  player.x = Math.max(courseL + player.w/2 + 4, Math.min(courseR - player.w/2 - 4, player.x));
  
  // Trail
  player.trail.unshift({ x: player.x, y: player.y });
  if (player.trail.length > 12) player.trail.pop();
  
  // Immune timer
  if (player.immune > 0) player.immune--;
  
  // Spawn
  const spawnRate = Math.max(12, 40 - gameSpeed * 3);
  if (frame % Math.floor(spawnRate) === 0) spawnObstacle();
  if (frame % 90 === 0) spawnPickup();
  
  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) { combo = 1; }
  }
  
  // Update obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.y += o.vy;
    if (o.vx) {
      o.x += o.vx;
      if (o.type === 'zigzag' && (o.x < courseL || o.x + o.w > courseR)) o.vx *= -1;
    }
    if (o.type === 'pulse') { o.phase += 0.08; o.r = o.baseR * (1 + 0.4 * Math.sin(o.phase)); }
    if (o.type === 'diamond') o.rot += 0.03;
    
    // Off screen
    if (o.y > H + 60) {
      obstacles.splice(i, 1);
      score += Math.floor(combo);
      playDodge();
      continue;
    }
    
    // Collision
    if (player.immune <= 0) {
      const b = getObstBounds(o);
      if (hitTest(player.x, player.y, player.w * 0.7, player.h * 0.7, b.x, b.y, b.w, b.h)) {
        die();
        return;
      }
    }
  }
  
  // Update pickups
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.y += p.vy;
    p.pulse += 0.1;
    if (p.y > H + 30) { pickups.splice(i, 1); continue; }
    
    const dist = Math.hypot(player.x - p.x, player.y - p.y);
    if (dist < player.w/2 + p.size) {
      if (p.type === 'point') { score += 25 * combo; playPickup(); addParticles(p.x, p.y, '#0ff', 8, 3); }
      else if (p.type === 'combo') { combo = Math.min(combo + 1, 10); comboTimer = 300; playCombo(); addParticles(p.x, p.y, '#0f0', 12, 4); }
      else if (p.type === 'shield') { player.immune = 120; playPickup(); addParticles(p.x, p.y, '#ff0', 15, 5); }
      pickups.splice(i, 1);
    }
  }
  
  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life -= 0.025;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  // Score ticks up with speed
  if (frame % 3 === 0) score += Math.floor(combo);
  
  // Shake decay
  shakes = shakes.map(s => s * 0.85).filter(s => Math.abs(s) > 0.3);
  
  // UI
  scoreEl.textContent = score;
  speedEl.textContent = gameSpeed.toFixed(1) + 'x';
  comboEl.textContent = 'x' + combo;
  comboEl.style.color = combo > 1 ? `hsl(${combo*30},100%,60%)` : '#0f0';
}

function die() {
  gameRunning = false;
  gameOver = true;
  playCrash();
  shakes.push(15, -12, 10, -8);
  addParticles(player.x, player.y, '#f0f', 30, 6);
  addParticles(player.x, player.y, '#0ff', 20, 5);
  
  if (score > best) {
    best = score;
    localStorage.setItem('neon-chase-best', best);
    bestEl.textContent = best;
  }
  
  document.getElementById('death-score').textContent = score;
  document.getElementById('death-best').textContent = score >= best ? '★ NEW BEST! ★' : 'Best: ' + best;
  const msgs = ['The neon claims another.','Too slow.','Almost had it.','The grid wins again.','Respawn in 3... 2... 1...'];
  document.getElementById('death-msg').textContent = msgs[Math.floor(Math.random()*msgs.length)];
  deathScreen.style.display = 'flex';
}

function draw() {
  const sx = shakes.reduce((a,b) => a+b, 0);
  ctx.save();
  ctx.translate(sx, sx * 0.5);
  
  // Background
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);
  
  // Speed lines
  const lineAlpha = Math.min(0.15, gameSpeed * 0.015);
  ctx.strokeStyle = `rgba(0,255,255,${lineAlpha})`;
  ctx.lineWidth = 1;
  for (let i = 0; i < 12; i++) {
    const lx = courseL + Math.random() * (courseR - courseL);
    const ly = (frame * 8 + i * 73) % H;
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx, ly + 20 + gameSpeed * 5); ctx.stroke();
  }
  
  // Course borders
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(0,255,255,0.3)');
  grad.addColorStop(1, 'rgba(255,0,255,0.3)');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(courseL, 0); ctx.lineTo(courseL, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(courseR, 0); ctx.lineTo(courseR, H); ctx.stroke();
  
  // Lane lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 1; i < laneCount; i++) {
    const lx = courseL + i * laneW;
    for (let y = (frame * 3) % 30; y < H; y += 30) {
      ctx.beginPath(); ctx.moveTo(lx, y); ctx.lineTo(lx, y + 15); ctx.stroke();
    }
  }
  
  // Floor grid perspective hint
  ctx.strokeStyle = 'rgba(0,255,255,0.03)';
  for (let y = (frame * 4) % 40; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(courseL, y); ctx.lineTo(courseR, y); ctx.stroke();
  }
  
  // Pickups
  pickups.forEach(p => {
    const glow = 0.5 + 0.5 * Math.sin(p.pulse);
    ctx.save();
    ctx.translate(p.x, p.y);
    if (p.type === 'point') {
      ctx.fillStyle = `rgba(0,255,255,${0.6+glow*0.4})`;
      ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(0, 0, p.size * (0.8+glow*0.2), 0, Math.PI*2); ctx.fill();
    } else if (p.type === 'combo') {
      ctx.fillStyle = `rgba(0,255,100,${0.6+glow*0.4})`;
      ctx.shadowColor = '#0f0'; ctx.shadowBlur = 12;
      ctx.font = `${p.size*2}px Orbitron`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('×', 0, 0);
    } else if (p.type === 'shield') {
      ctx.strokeStyle = `rgba(255,255,0,${0.6+glow*0.4})`;
      ctx.shadowColor = '#ff0'; ctx.shadowBlur = 12;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -p.size); ctx.lineTo(p.size, -p.size*0.3); ctx.lineTo(p.size*0.7, p.size);
      ctx.lineTo(-p.size*0.7, p.size); ctx.lineTo(-p.size, -p.size*0.3); ctx.closePath(); ctx.stroke();
    }
    ctx.restore();
  });
  
  // Obstacles
  obstacles.forEach(o => {
    ctx.save();
    ctx.shadowColor = o.color;
    ctx.shadowBlur = 12;
    if (o.type === 'bar') {
      ctx.fillStyle = o.color;
      ctx.globalAlpha = 0.85;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.globalAlpha = 0.4;
      ctx.fillRect(o.x, o.y - 2, o.w, o.h + 4);
    } else if (o.type === 'diamond') {
      ctx.translate(o.x, o.y);
      ctx.rotate(o.rot);
      ctx.fillStyle = o.color;
      ctx.globalAlpha = 0.85;
      const s = o.size / 2;
      ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(s,0); ctx.lineTo(0,s); ctx.lineTo(-s,0); ctx.closePath(); ctx.fill();
    } else if (o.type === 'zigzag') {
      ctx.fillStyle = o.color;
      ctx.globalAlpha = 0.85;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      // direction indicator
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.3;
      const arrow = o.vx > 0 ? '►' : '◄';
      ctx.font = '10px monospace'; ctx.fillText(arrow, o.x + o.w/2 - 3, o.y + o.h - 3);
    } else if (o.type === 'pulse') {
      ctx.fillStyle = o.color;
      ctx.globalAlpha = 0.7;
      ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.2;
      ctx.beginPath(); ctx.arc(o.x, o.y, o.r * 1.3, 0, Math.PI * 2); ctx.fill();
    } else if (o.type === 'sweep') {
      ctx.fillStyle = o.color;
      ctx.globalAlpha = 0.8;
      ctx.fillRect(o.x, o.y, o.w, o.h);
    }
    ctx.restore();
  });
  
  // Player trail
  player.trail.forEach((t, i) => {
    const a = (1 - i / player.trail.length) * 0.25;
    ctx.fillStyle = player.immune > 0 ? `rgba(255,255,0,${a})` : `rgba(0,255,255,${a})`;
    const s = player.w * (1 - i * 0.05);
    ctx.fillRect(t.x - s/2, t.y - player.h/2 + i*2, s, player.h * 0.6);
  });
  
  // Player
  if (!gameOver) {
    ctx.save();
    ctx.translate(player.x, player.y);
    
    // Glow
    const glowColor = player.immune > 0 ? '#ff0' : '#0ff';
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = player.immune > 0 ? 20 : 12;
    
    // Ship body
    ctx.fillStyle = player.immune > 0 ? '#ff0' : '#0ff';
    ctx.beginPath();
    ctx.moveTo(0, -player.h/2);
    ctx.lineTo(player.w/2, player.h/2);
    ctx.lineTo(player.w/4, player.h/3);
    ctx.lineTo(-player.w/4, player.h/3);
    ctx.lineTo(-player.w/2, player.h/2);
    ctx.closePath();
    ctx.fill();
    
    // Core
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
    
    // Engine glow
    ctx.fillStyle = player.focus ? 'rgba(255,0,255,0.6)' : 'rgba(0,255,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(-player.w/4, player.h/3);
    ctx.lineTo(0, player.h/2 + 6 + Math.random()*8);
    ctx.lineTo(player.w/4, player.h/3);
    ctx.closePath();
    ctx.fill();
    
    // Shield ring
    if (player.immune > 0) {
      ctx.strokeStyle = `rgba(255,255,0,${0.3 + 0.3*Math.sin(frame*0.2)})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, player.w * 0.8, 0, Math.PI * 2); ctx.stroke();
    }
    
    ctx.restore();
  }
  
  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  
  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch
document.getElementById('touch-left').addEventListener('touchstart', e => { e.preventDefault(); touchL = true; });
document.getElementById('touch-left').addEventListener('touchend', e => { touchL = false; });
document.getElementById('touch-right').addEventListener('touchstart', e => { e.preventDefault(); touchR = true; });
document.getElementById('touch-right').addEventListener('touchend', e => { touchR = false; });

// Tilt controls for mobile
let tiltEnabled = false;
window.addEventListener('deviceorientation', e => {
  if (!gameRunning || !e.gamma) return;
  tiltEnabled = true;
  const tilt = e.gamma; // -90 to 90
  const deadzone = 5;
  if (Math.abs(tilt) > deadzone) {
    const moveSpd = player.focus ? 3.5 : 7;
    player.vx += (Math.sign(tilt) * moveSpd * Math.min(1, (Math.abs(tilt)-deadzone)/30) - player.vx) * 0.3;
  }
});

// Start / retry
function startGame() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  initGame();
  startScreen.style.display = 'none';
  deathScreen.style.display = 'none';
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && gameOver) startGame();
});

// Init display loop
initGame();
gameRunning = false;
loop();
</script>
</body>
