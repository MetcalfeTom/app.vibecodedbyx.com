<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Chase</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐱">
<meta property="og:title" content="Neon Chase">
<meta property="og:description" content="Chase a laser dot through mirrors that teleport or shatter. You are the cat.">
<meta property="og:url" content="https://app.sloppy.live/neon-chase/">
<meta property="og:image" content="https://emojicdn.elk.sh/🐱?style=google">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08060e}
canvas{display:block;position:fixed;top:0;left:0}

.ui{position:fixed;z-index:10;font-family:'Silkscreen',monospace;pointer-events:none}
.score-bar{
  top:12px;left:12px;right:12px;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.score{color:#ff3377;font-size:1.4rem;font-weight:700;text-shadow:0 0 12px #ff337766}
.combo{color:#ffcc00;font-size:0.75rem;text-shadow:0 0 8px #ffcc0044}
.lives-row{display:flex;gap:4px;margin-top:4px}
.life{width:10px;height:10px;background:#ff3377;border-radius:50%;box-shadow:0 0 6px #ff3377}
.life.lost{background:#333;box-shadow:none}
.level{color:#00eeff;font-size:0.7rem;text-align:right;text-shadow:0 0 8px #00eeff44}
.timer-bar{
  bottom:60px;left:50%;transform:translateX(-50%);
  width:min(300px,60vw);height:4px;background:#1a1a2e;border-radius:2px;overflow:hidden;
}
.timer-fill{height:100%;background:linear-gradient(90deg,#ff3377,#ffcc00);border-radius:2px;transition:width 0.1s linear}

.screen{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,6,14,0.92);font-family:'Outfit',sans-serif;
  text-align:center;gap:16px;
}
.screen h1{
  font-family:'Silkscreen',monospace;font-size:clamp(2rem,6vw,3.2rem);
  color:#ff3377;text-shadow:0 0 30px #ff337788;
}
.screen h2{
  font-family:'Silkscreen',monospace;font-size:1.2rem;
  color:#00eeff;text-shadow:0 0 15px #00eeff66;
}
.screen p{color:#888;font-size:0.8rem;font-weight:300;max-width:340px;line-height:1.5}
.screen .big-score{font-family:'Silkscreen',monospace;font-size:2.5rem;color:#ffcc00;text-shadow:0 0 20px #ffcc0066}
.play-btn{
  padding:14px 40px;border:2px solid #ff3377;border-radius:10px;
  background:transparent;color:#ff3377;font-family:'Silkscreen',monospace;
  font-size:1rem;cursor:pointer;pointer-events:all;
  transition:all 0.2s;text-shadow:0 0 8px #ff337766;
}
.play-btn:hover{background:#ff3377;color:#08060e;box-shadow:0 0 30px #ff337766}

.mobile-controls{
  position:fixed;bottom:10px;left:0;right:0;z-index:15;
  display:none;justify-content:center;gap:4px;
  pointer-events:all;
}
.d-row{display:flex;gap:4px;justify-content:center}
.d-btn{
  width:52px;height:52px;border-radius:10px;
  border:1px solid rgba(255,51,119,0.25);
  background:rgba(255,51,119,0.08);
  color:rgba(255,51,119,0.6);font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.d-btn:active{background:rgba(255,51,119,0.25)}
@media(max-width:768px){.mobile-controls{display:flex;flex-direction:column;gap:2px}}

.back-link{
  position:fixed;top:12px;right:12px;z-index:25;
  font-family:'Outfit',sans-serif;
}
.back-link a{color:rgba(255,255,255,0.15);text-decoration:none;font-size:0.55rem;font-weight:300}
.back-link a:hover{color:rgba(255,51,119,0.5)}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui score-bar">
  <div>
    <div class="score" id="score">0</div>
    <div class="combo" id="combo"></div>
    <div class="lives-row" id="lives"></div>
  </div>
  <div class="level" id="level">LEVEL 1</div>
</div>
<div class="ui timer-bar"><div class="timer-fill" id="timer-fill"></div></div>

<div class="screen" id="start-screen">
  <h1>NEON CHASE</h1>
  <p>You're a cat. Chase the laser dot through mirrors that teleport or shatter. Don't let the dot escape.</p>
  <button class="play-btn" onclick="startGame()">PLAY</button>
</div>

<div class="screen" id="over-screen" style="display:none">
  <h2>GAME OVER</h2>
  <div class="big-score" id="final-score">0</div>
  <p id="over-msg">The laser escaped...</p>
  <button class="play-btn" onclick="startGame()">RETRY</button>
</div>

<div class="mobile-controls" id="mobile-controls">
  <div class="d-row"><div class="d-btn" data-dir="up">▲</div></div>
  <div class="d-row">
    <div class="d-btn" data-dir="left">◀</div>
    <div class="d-btn" data-dir="down">▼</div>
    <div class="d-btn" data-dir="right">▶</div>
  </div>
</div>

<div class="back-link"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Game state
const TILE = 32;
let cols, rows;
let cat, laser, mirrors, shards, particles, trails;
let score, combo, lives, level, levelTimer, maxLevelTime;
let gameActive = false;
let keys = {};
let lastTime = 0;

// Input
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Mobile
document.querySelectorAll('.d-btn').forEach(btn => {
  const dir = btn.dataset.dir;
  const kmap = { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' };
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[kmap[dir]] = true; }, { passive: false });
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[kmap[dir]] = false; }, { passive: false });
  btn.addEventListener('mousedown', e => { keys[kmap[dir]] = true; });
  btn.addEventListener('mouseup', e => { keys[kmap[dir]] = false; });
});

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('over-screen').style.display = 'none';
  score = 0; combo = 0; lives = 5; level = 1;
  shards = []; particles = []; trails = [];
  initLevel();
  gameActive = true;
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function initLevel() {
  cols = Math.floor(W / TILE);
  rows = Math.floor(H / TILE);

  // Place cat at center-ish
  cat = {
    x: Math.floor(cols / 2) * TILE + TILE / 2,
    y: Math.floor(rows / 2) * TILE + TILE / 2,
    vx: 0, vy: 0,
    speed: 3.5 + level * 0.3,
    r: 10, facing: 0, blinkTimer: 0, tailPhase: 0
  };

  // Place laser far from cat
  placeLaser();

  // Generate mirrors
  mirrors = [];
  const numMirrors = Math.min(3 + level * 2, 18);
  for (let i = 0; i < numMirrors; i++) {
    let mx, my, tries = 0;
    do {
      mx = (2 + Math.floor(Math.random() * (cols - 4))) * TILE + TILE / 2;
      my = (2 + Math.floor(Math.random() * (rows - 6))) * TILE + TILE / 2;
      tries++;
    } while (tries < 50 && (dist(mx, my, cat.x, cat.y) < 80 || dist(mx, my, laser.x, laser.y) < 60));

    const isTeleport = Math.random() < 0.5;
    mirrors.push({
      x: mx, y: my, w: 6, h: 36,
      type: isTeleport ? 'teleport' : 'shatter',
      angle: Math.random() * Math.PI,
      hp: isTeleport ? 999 : 1 + Math.floor(level / 3),
      glowPhase: Math.random() * Math.PI * 2,
      shattered: false,
      pair: null
    });
  }

  // Link teleport pairs
  const teleports = mirrors.filter(m => m.type === 'teleport' && !m.shattered);
  for (let i = 0; i < teleports.length - 1; i += 2) {
    teleports[i].pair = teleports[i + 1];
    teleports[i + 1].pair = teleports[i];
  }

  // Timer
  maxLevelTime = Math.max(5, 15 - level * 0.5);
  levelTimer = maxLevelTime;

  document.getElementById('level').textContent = 'LEVEL ' + level;
  updateLives();
}

function placeLaser() {
  let lx, ly, tries = 0;
  do {
    lx = (2 + Math.floor(Math.random() * (cols - 4))) * TILE + TILE / 2;
    ly = (2 + Math.floor(Math.random() * (rows - 6))) * TILE + TILE / 2;
    tries++;
  } while (tries < 80 && dist(lx, ly, cat.x, cat.y) < 120);

  laser = {
    x: lx, y: ly, r: 5,
    vx: (Math.random() - 0.5) * 2,
    vy: (Math.random() - 0.5) * 2,
    baseSpeed: 1.5 + level * 0.35,
    fleeing: false, fleeTimer: 0,
    wobble: 0
  };
}

function dist(ax, ay, bx, by) {
  return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
}

function updateLives() {
  let html = '';
  for (let i = 0; i < 5; i++) {
    html += `<div class="life${i >= lives ? ' lost' : ''}"></div>`;
  }
  document.getElementById('lives').innerHTML = html;
}

function spawnParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * spread;
    particles.push({
      x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
      life: 1, decay: 0.015 + Math.random() * 0.02,
      color, r: 1 + Math.random() * 3
    });
  }
}

function spawnShards(x, y) {
  for (let i = 0; i < 8; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 4;
    shards.push({
      x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd + 1,
      rot: Math.random() * Math.PI * 2, rotV: (Math.random() - 0.5) * 0.3,
      w: 3 + Math.random() * 6, h: 8 + Math.random() * 12,
      life: 1, decay: 0.008 + Math.random() * 0.008
    });
  }
}

function update(dt) {
  const t = performance.now() * 0.001;

  // Cat movement
  let ax = 0, ay = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) ax -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) ax += 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) ay -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) ay += 1;

  if (ax || ay) {
    const len = Math.sqrt(ax * ax + ay * ay);
    ax /= len; ay /= len;
    cat.facing = Math.atan2(ay, ax);
  }

  cat.vx += ax * cat.speed * 0.4;
  cat.vy += ay * cat.speed * 0.4;
  cat.vx *= 0.82;
  cat.vy *= 0.82;
  cat.x += cat.vx;
  cat.y += cat.vy;

  // Walls
  cat.x = Math.max(cat.r, Math.min(W - cat.r, cat.x));
  cat.y = Math.max(cat.r, Math.min(H - cat.r - 60, cat.y));

  cat.tailPhase += 0.08;
  cat.blinkTimer -= dt;
  if (cat.blinkTimer <= 0) cat.blinkTimer = 2 + Math.random() * 4;

  // Laser AI
  const dToC = dist(laser.x, laser.y, cat.x, cat.y);
  laser.wobble += 0.1;

  if (dToC < 150) {
    laser.fleeing = true;
    laser.fleeTimer = 1.5;
  }
  if (laser.fleeTimer > 0) laser.fleeTimer -= dt;
  else laser.fleeing = false;

  if (laser.fleeing) {
    // Run away from cat
    const fx = laser.x - cat.x, fy = laser.y - cat.y;
    const fd = Math.sqrt(fx * fx + fy * fy) || 1;
    laser.vx += (fx / fd) * laser.baseSpeed * 0.3;
    laser.vy += (fy / fd) * laser.baseSpeed * 0.3;
  } else {
    // Random wander
    laser.vx += (Math.random() - 0.5) * 0.8;
    laser.vy += (Math.random() - 0.5) * 0.8;
  }

  // Jittery laser behavior
  laser.vx += Math.sin(laser.wobble * 3.7) * 0.3;
  laser.vy += Math.cos(laser.wobble * 2.9) * 0.3;

  // Speed cap
  const lspd = Math.sqrt(laser.vx ** 2 + laser.vy ** 2);
  const maxSpd = laser.baseSpeed * (laser.fleeing ? 1.6 : 1);
  if (lspd > maxSpd) {
    laser.vx = (laser.vx / lspd) * maxSpd;
    laser.vy = (laser.vy / lspd) * maxSpd;
  }

  laser.x += laser.vx;
  laser.y += laser.vy;

  // Laser wall bounce
  if (laser.x < laser.r) { laser.x = laser.r; laser.vx *= -1; }
  if (laser.x > W - laser.r) { laser.x = W - laser.r; laser.vx *= -1; }
  if (laser.y < laser.r) { laser.y = laser.r; laser.vy *= -1; }
  if (laser.y > H - laser.r - 60) { laser.y = H - laser.r - 60; laser.vy *= -1; }

  // Laser trail
  trails.push({ x: laser.x, y: laser.y, life: 1 });
  if (trails.length > 40) trails.shift();

  // Mirror interactions with laser
  for (const m of mirrors) {
    if (m.shattered) continue;
    const md = dist(laser.x, laser.y, m.x, m.y);
    if (md < 24) {
      if (m.type === 'teleport' && m.pair && !m.pair.shattered) {
        // Teleport laser
        laser.x = m.pair.x + (Math.random() - 0.5) * 30;
        laser.y = m.pair.y + (Math.random() - 0.5) * 30;
        spawnParticles(m.x, m.y, '#00eeff', 12, 3);
        spawnParticles(m.pair.x, m.pair.y, '#00eeff', 12, 3);
        trails = [];
      } else if (m.type === 'shatter') {
        // Reflect laser
        const nx = Math.cos(m.angle), ny = Math.sin(m.angle);
        const dot = laser.vx * nx + laser.vy * ny;
        laser.vx -= 2 * dot * nx;
        laser.vy -= 2 * dot * ny;
        laser.vx *= 1.3;
        laser.vy *= 1.3;
        m.hp--;
        spawnParticles(m.x, m.y, '#ffcc00', 6, 2);
        if (m.hp <= 0) {
          m.shattered = true;
          spawnShards(m.x, m.y);
          spawnParticles(m.x, m.y, '#ffffff', 15, 5);
          score += 5 * combo;
        }
      }
    }
  }

  // Cat catches laser
  if (dToC < cat.r + laser.r + 4) {
    combo++;
    score += 10 * combo;
    spawnParticles(laser.x, laser.y, '#ff3377', 20, 4);

    // Next level check
    if (combo > 0 && combo % 5 === 0) {
      level++;
      initLevel();
      return;
    }

    placeLaser();
    levelTimer = maxLevelTime;
  }

  // Timer countdown
  levelTimer -= dt;
  const pct = Math.max(0, levelTimer / maxLevelTime) * 100;
  document.getElementById('timer-fill').style.width = pct + '%';

  if (levelTimer <= 0) {
    // Laser escaped
    lives--;
    combo = 0;
    updateLives();
    if (lives <= 0) {
      gameOver();
      return;
    }
    placeLaser();
    levelTimer = maxLevelTime;
    spawnParticles(cat.x, cat.y, '#ff3377', 10, 2);
  }

  // Particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.vx *= 0.98; p.vy *= 0.98;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);

  // Shards
  for (const s of shards) {
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.12;
    s.rot += s.rotV;
    s.life -= s.decay;
  }
  shards = shards.filter(s => s.life > 0);

  // Trails
  for (const t of trails) t.life -= 0.04;
  trails = trails.filter(t => t.life > 0);

  // HUD
  document.getElementById('score').textContent = score;
  document.getElementById('combo').textContent = combo > 1 ? combo + 'x COMBO' : '';
}

function draw() {
  ctx.fillStyle = '#08060e';
  ctx.fillRect(0, 0, W, H);

  const t = performance.now() * 0.001;

  // Subtle floor grid
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += TILE) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += TILE) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Laser trail
  for (let i = 1; i < trails.length; i++) {
    const a = trails[i - 1], b = trails[i];
    ctx.strokeStyle = `rgba(255,51,119,${b.life * 0.3})`;
    ctx.lineWidth = b.life * 3;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }

  // Mirrors
  for (const m of mirrors) {
    if (m.shattered) continue;
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.angle);

    const glow = 0.4 + Math.sin(t * 2 + m.glowPhase) * 0.15;
    if (m.type === 'teleport') {
      // Cyan portal mirror
      ctx.shadowColor = '#00eeff';
      ctx.shadowBlur = 15;
      ctx.fillStyle = `rgba(0,238,255,${glow})`;
      ctx.fillRect(-m.w / 2, -m.h / 2, m.w, m.h);
      ctx.strokeStyle = `rgba(0,238,255,${glow + 0.2})`;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(-m.w / 2, -m.h / 2, m.w, m.h);

      // Portal swirl
      ctx.beginPath();
      for (let a = 0; a < Math.PI * 4; a += 0.3) {
        const sr = a * 1.2 + t * 3;
        const sx = Math.cos(sr) * (a * 0.8);
        const sy = Math.sin(sr) * (a * 0.8);
        if (a === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
      }
      ctx.strokeStyle = `rgba(0,238,255,${glow * 0.3})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    } else {
      // Gold shatter mirror
      ctx.shadowColor = '#ffcc00';
      ctx.shadowBlur = 10;
      const crack = 1 - (m.hp / (1 + Math.floor(level / 3)));
      ctx.fillStyle = `rgba(255,204,0,${glow * (1 - crack * 0.5)})`;
      ctx.fillRect(-m.w / 2, -m.h / 2, m.w, m.h);
      ctx.strokeStyle = `rgba(255,204,0,${glow + 0.2})`;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(-m.w / 2, -m.h / 2, m.w, m.h);

      // Crack lines
      if (crack > 0) {
        ctx.strokeStyle = `rgba(255,255,255,${crack * 0.5})`;
        ctx.lineWidth = 0.8;
        for (let c = 0; c < 3 * crack; c++) {
          ctx.beginPath();
          ctx.moveTo(0, -m.h * 0.3 + c * 5);
          ctx.lineTo((c % 2 ? 1 : -1) * m.w, m.h * 0.1 + c * 3);
          ctx.stroke();
        }
      }
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Shards
  for (const s of shards) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.fillStyle = `rgba(255,220,100,${s.life * 0.7})`;
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = s.life * 8;
    ctx.fillRect(-s.w / 2, -s.h / 2, s.w, s.h);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color + Math.round(p.life * 255).toString(16).padStart(2, '0');
    ctx.fill();
  }

  // Laser dot
  const lPulse = 1 + Math.sin(t * 8) * 0.3;
  ctx.shadowColor = '#ff3377';
  ctx.shadowBlur = 25;
  ctx.beginPath();
  ctx.arc(laser.x, laser.y, laser.r * lPulse, 0, Math.PI * 2);
  ctx.fillStyle = '#ff3377';
  ctx.fill();
  // Inner bright core
  ctx.beginPath();
  ctx.arc(laser.x, laser.y, laser.r * 0.4, 0, Math.PI * 2);
  ctx.fillStyle = '#ffaacc';
  ctx.fill();
  // Outer ring
  ctx.beginPath();
  ctx.arc(laser.x, laser.y, laser.r * lPulse * 2, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,51,119,${0.15 + Math.sin(t * 6) * 0.1})`;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Cat
  drawCat(cat, t);

  // Direction indicator (line from cat toward laser when far)
  const dToL = dist(cat.x, cat.y, laser.x, laser.y);
  if (dToL > 200) {
    const ang = Math.atan2(laser.y - cat.y, laser.x - cat.x);
    const ix = cat.x + Math.cos(ang) * 30;
    const iy = cat.y + Math.sin(ang) * 30;
    ctx.strokeStyle = `rgba(255,51,119,${0.1 + Math.sin(t * 4) * 0.05})`;
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    ctx.beginPath(); ctx.moveTo(ix, iy);
    ctx.lineTo(cat.x + Math.cos(ang) * 60, cat.y + Math.sin(ang) * 60);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawCat(c, t) {
  ctx.save();
  ctx.translate(c.x, c.y);

  const moving = Math.abs(c.vx) > 0.3 || Math.abs(c.vy) > 0.3;
  const bobY = moving ? Math.sin(t * 12) * 2 : 0;

  // Tail
  const tailAng = c.facing + Math.PI + Math.sin(c.tailPhase) * 0.6;
  ctx.strokeStyle = '#d4d4d8';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  const tx1 = Math.cos(tailAng) * 12, ty1 = Math.sin(tailAng) * 12;
  const tx2 = tx1 + Math.cos(tailAng + Math.sin(c.tailPhase * 1.3) * 0.8) * 8;
  const ty2 = ty1 + Math.sin(tailAng + Math.sin(c.tailPhase * 1.3) * 0.8) * 8;
  ctx.quadraticCurveTo(tx1, ty1, tx2, ty2);
  ctx.stroke();

  // Body
  ctx.translate(0, bobY);
  ctx.fillStyle = '#e4e4e7';
  ctx.beginPath();
  ctx.ellipse(0, 0, c.r, c.r * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#e4e4e7';
  ctx.beginPath();
  ctx.moveTo(-6, -8); ctx.lineTo(-3, -16); ctx.lineTo(0, -8); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -8); ctx.lineTo(3, -16); ctx.lineTo(6, -8); ctx.fill();
  // Inner ears
  ctx.fillStyle = '#fca5a5';
  ctx.beginPath();
  ctx.moveTo(-5, -9); ctx.lineTo(-3, -14); ctx.lineTo(-1, -9); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(1, -9); ctx.lineTo(3, -14); ctx.lineTo(5, -9); ctx.fill();

  // Eyes
  const blink = c.blinkTimer < 0.1;
  const eyeY = -2;
  if (blink) {
    ctx.strokeStyle = '#18181b';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-5, eyeY); ctx.lineTo(-2, eyeY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2, eyeY); ctx.lineTo(5, eyeY); ctx.stroke();
  } else {
    // Pupils track laser
    const lAng = Math.atan2(laser.y - c.y, laser.x - c.x);
    const pd = 1.2;

    ctx.fillStyle = '#22c55e';
    ctx.beginPath(); ctx.ellipse(-3.5, eyeY, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(3.5, eyeY, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#18181b';
    ctx.beginPath();
    ctx.arc(-3.5 + Math.cos(lAng) * pd, eyeY + Math.sin(lAng) * pd, 1.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(3.5 + Math.cos(lAng) * pd, eyeY + Math.sin(lAng) * pd, 1.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Nose
  ctx.fillStyle = '#fca5a5';
  ctx.beginPath();
  ctx.moveTo(-1.5, 2); ctx.lineTo(0, 1); ctx.lineTo(1.5, 2); ctx.lineTo(0, 3);
  ctx.fill();

  // Whiskers
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 0.5;
  for (const side of [-1, 1]) {
    for (let w = -1; w <= 1; w++) {
      ctx.beginPath();
      ctx.moveTo(side * 4, 2 + w);
      ctx.lineTo(side * 14, w * 3);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function gameOver() {
  gameActive = false;
  document.getElementById('final-score').textContent = score;
  const msgs = [
    'The laser escaped...', 'Even cats lose sometimes.',
    'That dot was too fast!', 'Nap time. Try again?',
    'The red dot wins this round.', 'Your cat reflexes need work.'
  ];
  document.getElementById('over-msg').textContent = msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById('over-screen').style.display = 'flex';
}

function loop(now) {
  if (!gameActive) return;
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

// Idle animation before game starts
function idleDraw() {
  if (gameActive) return;
  const t = performance.now() * 0.001;
  ctx.fillStyle = '#08060e';
  ctx.fillRect(0, 0, W, H);

  // Floating dots
  for (let i = 0; i < 5; i++) {
    const dx = W * 0.3 + Math.sin(t * 0.5 + i * 1.3) * W * 0.25;
    const dy = H * 0.3 + Math.cos(t * 0.7 + i * 0.9) * H * 0.2;
    const pulse = 3 + Math.sin(t * 3 + i) * 1.5;
    ctx.shadowColor = '#ff3377';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(dx, dy, pulse, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,51,119,${0.3 + Math.sin(t * 2 + i) * 0.15})`;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  requestAnimationFrame(idleDraw);
}
idleDraw();
</script>
