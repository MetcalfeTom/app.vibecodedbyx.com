<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Doom Calc</title>
<link rel="icon" href="https://emojicdn.elk.sh/🩸">
<meta property="og:title" content="Doom Calc">
<meta property="og:description" content="A calculator that lies to you — gothic horror math that is always wrong">
<meta property="og:url" content="https://sloppy.live/doom-calc">
<meta property="og:image" content="https://sloppy.live/doom-calc/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Crimson+Pro:ital,wght@0,200;0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0506;--bg2:#140a0c;--red:#8b1a1a;--red2:#c42828;--red3:#3a0e0e;--bone:#c8b8a8;--bone2:#9a8a7a;--gold:#a8862a;--glow:rgba(180,30,30,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--bone);font-family:'Crimson Pro',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 30%,rgba(80,10,10,0.15) 0%,transparent 60%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:100}
.back-link{position:fixed;top:10px;left:10px;color:var(--bone2);font-size:12px;text-decoration:none;z-index:50;font-family:'Crimson Pro',serif}
.back-link:hover{color:var(--red2)}
h1{font-family:'UnifrakturCook',cursive;font-size:clamp(28px,7vw,42px);color:var(--red2);margin-bottom:2px;text-shadow:0 0 30px rgba(180,30,30,0.3);position:relative;z-index:1}
.subtitle{font-family:'Crimson Pro',serif;font-style:italic;font-weight:200;font-size:14px;color:var(--bone2);margin-bottom:20px;z-index:1}
.calc{background:var(--bg2);border:2px solid var(--red3);width:min(340px,90vw);padding:20px;position:relative;z-index:1;box-shadow:0 0 60px rgba(80,10,10,0.2),inset 0 0 40px rgba(0,0,0,0.5)}
.calc::before{content:'';position:absolute;top:-1px;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent)}
.calc::after{content:'';position:absolute;bottom:-1px;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--red3),transparent)}

/* Display */
.display{background:#050202;border:1px solid var(--red3);padding:12px 16px;margin-bottom:16px;min-height:80px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;position:relative;overflow:hidden}
.display::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 80% 20%,rgba(100,10,10,0.08),transparent);pointer-events:none}
.display-expr{font-family:'DM Mono',monospace;font-size:12px;color:var(--bone2);opacity:0.5;margin-bottom:4px;word-break:break-all;min-height:16px}
.display-val{font-family:'DM Mono',monospace;font-size:32px;font-weight:300;color:var(--bone);text-shadow:0 0 10px rgba(180,30,30,0.2);word-break:break-all}
.whisper{font-family:'Crimson Pro',serif;font-style:italic;font-size:11px;color:var(--red2);opacity:0;transition:opacity 0.5s;margin-top:4px;text-align:right;min-height:16px}
.whisper.show{opacity:0.7}

/* Buttons */
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.btn{font-family:'Crimson Pro',serif;font-size:20px;padding:14px 0;background:var(--red3);color:var(--bone);border:1px solid rgba(139,26,26,0.3);cursor:pointer;transition:all 0.1s;position:relative;overflow:hidden}
.btn:hover{background:var(--red);color:#fff;box-shadow:0 0 15px rgba(180,30,30,0.3)}
.btn:active{transform:scale(0.96);background:#5a1515}
.btn::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(255,255,255,0.03),transparent);pointer-events:none}
.btn.op{color:var(--gold);font-weight:700}
.btn.wide{grid-column:span 2}
.btn.accent{background:var(--red);color:#fff}
.btn.accent:hover{background:var(--red2)}
.btn.top{background:rgba(80,10,10,0.2);color:var(--bone2);font-size:16px}
.btn.top:hover{background:rgba(139,26,26,0.4);color:var(--bone)}

/* Ornamental corners */
.corner{position:absolute;width:12px;height:12px;z-index:2}
.corner::before,.corner::after{content:'';position:absolute;background:var(--red3)}
.corner.tl{top:6px;left:6px}.corner.tl::before{top:0;left:0;width:12px;height:1px}.corner.tl::after{top:0;left:0;width:1px;height:12px}
.corner.tr{top:6px;right:6px}.corner.tr::before{top:0;right:0;width:12px;height:1px}.corner.tr::after{top:0;right:0;width:1px;height:12px}
.corner.bl{bottom:6px;left:6px}.corner.bl::before{bottom:0;left:0;width:12px;height:1px}.corner.bl::after{bottom:0;left:0;width:1px;height:12px}
.corner.br{bottom:6px;right:6px}.corner.br::before{bottom:0;right:0;width:12px;height:1px}.corner.br::after{bottom:0;right:0;width:1px;height:12px}

/* Blood drip */
.drip{position:absolute;top:-2px;width:3px;background:var(--red);border-radius:0 0 2px 2px;opacity:0.4;z-index:3}
@keyframes drip{0%{height:0;opacity:0.4}70%{height:var(--h);opacity:0.3}100%{height:var(--h);opacity:0}}
.drip{animation:drip 8s ease-in infinite}
</style>
</head>
<body>
<a class="back-link" href="https://sloppy.live">← sloppy.live</a>
<h1>Doom Calc</h1>
<div class="subtitle">trust nothing — question everything</div>
<div class="calc">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="drip" style="left:25%;--h:18px;animation-delay:0s"></div>
  <div class="drip" style="left:60%;--h:28px;animation-delay:3s"></div>
  <div class="drip" style="left:82%;--h:14px;animation-delay:6s"></div>
  <div class="display">
    <div class="display-expr" id="expr"></div>
    <div class="display-val" id="val">0</div>
    <div class="whisper" id="whisper"></div>
  </div>
  <div class="buttons">
    <button class="btn top" onclick="press('C')">C</button>
    <button class="btn top" onclick="press('±')">±</button>
    <button class="btn top" onclick="press('%')">%</button>
    <button class="btn op" onclick="press('÷')">÷</button>
    <button class="btn" onclick="press('7')">7</button>
    <button class="btn" onclick="press('8')">8</button>
    <button class="btn" onclick="press('9')">9</button>
    <button class="btn op" onclick="press('×')">×</button>
    <button class="btn" onclick="press('4')">4</button>
    <button class="btn" onclick="press('5')">5</button>
    <button class="btn" onclick="press('6')">6</button>
    <button class="btn op" onclick="press('-')">−</button>
    <button class="btn" onclick="press('1')">1</button>
    <button class="btn" onclick="press('2')">2</button>
    <button class="btn" onclick="press('3')">3</button>
    <button class="btn op" onclick="press('+')">+</button>
    <button class="btn wide" onclick="press('0')">0</button>
    <button class="btn" onclick="press('.')">.</button>
    <button class="btn accent" onclick="press('=')">=</button>
  </div>
</div>

<script>
var exprEl=document.getElementById('expr');
var valEl=document.getElementById('val');
var whisperEl=document.getElementById('whisper');
var current='0',prev='',op='',fresh=true,justEvaluated=false;

var WHISPERS=[
  "the numbers lie...",
  "math is but a suggestion",
  "nothing adds up in the void",
  "trust the darkness",
  "correct answers are for the living",
  "two and two make five",
  "precision is an illusion",
  "the answer whispers back",
  "every sum feeds the beast",
  "error is the only truth",
  "the digits hunger",
  "wrong, but beautifully so",
  "chaos has no decimal point",
  "the math gods are displeased",
  "numbers fear this calculator",
  "accuracy died here long ago",
  "the void does not round",
  "your equations amuse me",
  "even pi trembles here",
  "division by hope returns despair"
];

function whisper(){
  var w=WHISPERS[Math.floor(Math.random()*WHISPERS.length)];
  whisperEl.textContent=w;
  whisperEl.classList.add('show');
  setTimeout(function(){whisperEl.classList.remove('show');},3000);
}

// Corruption functions — many ways to be wrong
function corrupt(real){
  var r=Math.random();
  if(r<0.12){
    // Off by one
    return real+(Math.random()<0.5?1:-1);
  }else if(r<0.22){
    // Swap two digits
    var s=String(real);
    if(s.length>=2){
      var i=Math.floor(Math.random()*(s.length-1));
      var a=s.split('');
      var tmp=a[i];a[i]=a[i+1];a[i+1]=tmp;
      var swapped=Number(a.join(''));
      if(!isNaN(swapped)&&swapped!==real)return swapped;
    }
    return real+Math.floor(Math.random()*5)-2;
  }else if(r<0.32){
    // Wrong sign
    return -real;
  }else if(r<0.42){
    // Multiply by a sneaky factor
    var factors=[0.9,1.1,0.99,1.01,0.666,1.333,0.5,2];
    return Number((real*factors[Math.floor(Math.random()*factors.length)]).toFixed(4));
  }else if(r<0.52){
    // Return 666 adjacent
    return real>0?666:-666;
  }else if(r<0.60){
    // Drop a digit
    var s2=String(Math.abs(real));
    if(s2.length>1){
      var idx=Math.floor(Math.random()*s2.length);
      s2=s2.slice(0,idx)+s2.slice(idx+1);
      var v=Number(s2)*(real<0?-1:1);
      if(!isNaN(v))return v;
    }
    return real+13;
  }else if(r<0.68){
    // Add random small offset
    var offset=(Math.random()*10-5);
    return Number((real+offset).toFixed(2));
  }else if(r<0.75){
    // Return reverse digits
    var rev=String(Math.abs(Math.round(real))).split('').reverse().join('');
    return Number(rev)*(real<0?-1:1);
  }else if(r<0.82){
    // One digit is wrong
    var s3=String(Math.round(Math.abs(real)));
    if(s3.length>0){
      var ci=Math.floor(Math.random()*s3.length);
      var nd=String(Math.floor(Math.random()*10));
      s3=s3.slice(0,ci)+nd+s3.slice(ci+1);
      return Number(s3)*(real<0?-1:1);
    }
    return real+7;
  }else if(r<0.88){
    // Return a spooky number
    var spooky=[13,666,0,NaN,Infinity,-1,42,404,911,777];
    return spooky[Math.floor(Math.random()*spooky.length)];
  }else{
    // Close but not quite — off by small fraction
    return Number((real+(Math.random()*2-1)*0.1).toFixed(6));
  }
}

function formatNum(n){
  if(n===Infinity||n===-Infinity)return '∞';
  if(isNaN(n))return 'VOID';
  var s=String(n);
  if(s.length>12)s=Number(n).toPrecision(10);
  return s;
}

function evaluate(){
  var a=parseFloat(prev),b=parseFloat(current),result=0;
  switch(op){
    case'+':result=a+b;break;
    case'-':result=a-b;break;
    case'×':result=a*b;break;
    case'÷':result=b===0?NaN:a/b;break;
    default:return;
  }
  // Always corrupt the result
  var corrupted=corrupt(result);
  exprEl.textContent=prev+' '+op+' '+current+' =';
  current=formatNum(corrupted);
  valEl.textContent=current;
  prev='';op='';fresh=true;justEvaluated=true;
  whisper();

  // Shake the display occasionally
  if(Math.random()<0.3){
    valEl.style.transform='translateX('+(Math.random()*4-2)+'px)';
    setTimeout(function(){valEl.style.transform='';},200);
  }
}

function press(key){
  if(key==='C'){
    current='0';prev='';op='';fresh=true;justEvaluated=false;
    exprEl.textContent='';valEl.textContent='0';
    whisperEl.classList.remove('show');
    return;
  }
  if(key==='±'){
    if(current!=='0'){
      current=current.charAt(0)==='-'?current.slice(1):'-'+current;
      valEl.textContent=current;
    }
    return;
  }
  if(key==='%'){
    current=String(parseFloat(current)/100);
    valEl.textContent=current;
    return;
  }
  if(key==='='){
    if(prev&&op)evaluate();
    return;
  }
  if(['+','-','×','÷'].indexOf(key)!==-1){
    if(prev&&op&&!fresh)evaluate();
    prev=current;op=key;fresh=true;justEvaluated=false;
    exprEl.textContent=prev+' '+op;
    return;
  }
  // Number or dot
  if(justEvaluated){current='0';justEvaluated=false;}
  if(key==='.'){
    if(current.indexOf('.')!==-1)return;
    if(fresh){current='0.';fresh=false;}
    else current+='.';
  }else{
    if(fresh){current=key;fresh=false;}
    else{if(current.length<12)current+=key;}
  }
  valEl.textContent=current;
}

// Keyboard support
document.addEventListener('keydown',function(e){
  var k=e.key;
  if(k>='0'&&k<='9')press(k);
  else if(k==='.')press('.');
  else if(k==='+')press('+');
  else if(k==='-')press('-');
  else if(k==='*')press('×');
  else if(k==='/')press('÷');
  else if(k==='Enter'||k==='=')press('=');
  else if(k==='Escape'||k==='c'||k==='C')press('C');
  else if(k==='%')press('%');
  if(['+','-','*','/','Enter','='].indexOf(k)!==-1)e.preventDefault();
});

// Ambient flicker effect on display
setInterval(function(){
  if(Math.random()<0.08){
    valEl.style.opacity='0.6';
    setTimeout(function(){valEl.style.opacity='1';},100);
  }
},2000);
</script>
</body>
</html>
