<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Glitch Pinball</title>
<link rel="icon" href="https://emojicdn.elk.sh/🕹️" type="image/png">
<meta property="og:title" content="Glitch Pinball">
<meta property="og:description" content="Neon pinball where physics randomly glitch out. Gravity flips, balls multiply, time warps.">
<meta property="og:url" content="https://sloppy.live/glitch-pinball">
<meta property="og:image" content="https://sloppy.live/glitch-pinball/og-image.png">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d1a;font-family:'Press Start 2P',monospace}
#game-wrap{position:relative;width:100%;height:100%}
canvas{display:block;margin:0 auto;touch-action:none}
#crt-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#crt-overlay::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.15) 0px,
    rgba(0,0,0,0.15) 1px,
    transparent 1px,
    transparent 3px
  );
  z-index:11;
}
#crt-overlay::after{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
  z-index:12;
}
</style>
</head>
<body>
<div id="game-wrap">
<canvas id="c"></canvas>
<div id="crt-overlay"></div>
</div>
<script>
(function(){
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

/* Offscreen buffer for pixel scaling */
const offCanvas=document.createElement('canvas');
const offCtx=offCanvas.getContext('2d');
const OFF_W=290, OFF_H=450;
offCanvas.width=OFF_W; offCanvas.height=OFF_H;
offCtx.imageSmoothingEnabled=false;

/* Pixel font loaded flag */
let pixelFontReady=false;
document.fonts.ready.then(()=>{pixelFontReady=true;});

/* Retro color palette */
const PAL={
  cyan:'#5bc0be',
  magenta:'#c45baa',
  yellow:'#d4a843',
  green:'#6bba62',
  white:'#e0d6c8',
  bg:'#1a1a2e',
  bgDark:'#0d0d1a',
  wallColor:'#2a3a5a',
  dimWall:'#1e2a40',
  gridColor:'#222240',
  warpPurple:'#8b5fbf',
  warpLight:'#b88ad8',
  red:'#c0503a',
  blue:'#4a6fb5',
};

/* ============================
   LAYOUT & SCALING
   ============================ */
let W,H,SCALE,TX,TY,TW,TH;
/* We use a half-res approach: render to offscreen at 290x450, draw scaled to main canvas */
let usePixelScale=true;
let renderW, renderH, renderScale;

function resize(){
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W; canvas.height=H;
  const aspect=0.65;
  if(W/H<aspect){TW=W*0.96;TH=TW/aspect;}
  else{TH=H*0.94;TW=TH*aspect;}
  TX=(W-TW)/2; TY=(H-TH)/2;
  SCALE=TH/900;
  renderScale=0.5;
  renderW=Math.floor(TW*renderScale);
  renderH=Math.floor(TH*renderScale);
}
resize();
window.addEventListener('resize',resize);

/* ============================
   DESIGN CONSTANTS
   ============================ */
const DW=580, DH=900;
const GRAVITY=0.144;
const MAX_SPEED=17;
const BALL_R=9;
const FLIPPER_LEN=75;
const FLIPPER_REST=0.45;
const FLIPPER_UP=-0.55;
const FLIPPER_SPEED=0.28;
const LAUNCHER_CHANNEL_X=510;
const LAUNCHER_OUTER_X=575;
const LAUNCHER_BALL_X=542;
const LAUNCHER_TOP_Y=60;
const LAUNCHER_BOT_Y=860;

/* ============================
   COORDINATE TRANSFORMS (for offscreen half-res canvas)
   ============================ */
let shakeX=0, shakeY=0, shakeMag=0;
/* These transform design coords to offscreen pixel coords */
function otx(x){return (x/DW)*OFF_W + shakeX*0.5;}
function oty(y){return (y/DH)*OFF_H + shakeY*0.5;}
function ots(s){return s*OFF_W/DW;}

/* These transform design coords to main canvas coords (for start/gameover screens) */
function tx(x){return TX+x*TW/DW+shakeX;}
function ty(y){return TY+y*TH/DH+shakeY;}
function ts(s){return s*SCALE;}

/* ============================
   GAME STATE
   ============================ */
let state='start';
let score=0, balls=3, ballInPlay=false;
let launchPower=0, launching=false;
let glitchTimer=0, glitchActive=null, glitchDuration=0, glitchCountdown=0;
let scorePopups=[];
let ghostBalls=[];
let spinnerAngle=0, spinnerSpeed=0;

/* ============================
   BALL
   ============================ */
let ball={x:LAUNCHER_BALL_X, y:LAUNCHER_BOT_Y-30, vx:0, vy:0, trail:[]};

/* ============================
   FLIPPERS
   ============================ */
let flipperL={x:200, y:DH-75, angle:FLIPPER_REST, prevAngle:FLIPPER_REST, side:-1};
let flipperR={x:320, y:DH-75, angle:-FLIPPER_REST, prevAngle:-FLIPPER_REST, side:1};

function getFlipperLine(f){
  let ex=f.x+f.side*FLIPPER_LEN*Math.cos(f.angle);
  let ey=f.y+FLIPPER_LEN*Math.sin(f.angle);
  return {x1:f.x, y1:f.y, x2:ex, y2:ey};
}

/* ============================
   INPUT
   ============================ */
let keys={};
let touchL=false, touchR=false, touchLaunch=false;

/* ============================
   BUMPERS
   ============================ */
const bumpers=[
  {x:155, y:230, r:28, color:PAL.cyan},
  {x:385, y:210, r:28, color:PAL.magenta},
  {x:270, y:310, r:26, color:PAL.yellow},
  {x:115, y:390, r:22, color:PAL.green},
  {x:410, y:370, r:22, color:PAL.cyan},
  {x:270, y:175, r:22, color:PAL.magenta},
  {x:185, y:490, r:20, color:PAL.yellow},
  {x:365, y:480, r:20, color:PAL.green},
];
bumpers.forEach(b=>{b.flash=0; b.baseR=b.r;});

/* Space-time bumper */
const stBumper={x:270, y:285, r:36, baseR:36, color:PAL.white, flash:0, distort:0, distortAngle:0, hits:0};

/* ============================
   DROP TARGETS
   ============================ */
let dropTargets=[
  {x:175, y:535, w:45, h:12, alive:true},
  {x:250, y:535, w:45, h:12, alive:true},
  {x:325, y:535, w:45, h:12, alive:true},
];
function resetDropTargets(){dropTargets.forEach(t=>t.alive=true);}

/* ============================
   SLINGSHOTS
   ============================ */
const slingshots=[
  {x1:100, y1:DH-170, x2:165, y2:DH-95, color:PAL.magenta},
  {x1:360, y1:DH-170, x2:425, y2:DH-95, color:PAL.cyan},
];

/* ============================
   SPINNER
   ============================ */
const spinner={x:270, y:415, w:55};

/* ============================
   GLITCH TYPES
   ============================ */
const GLITCHES=['GRAVITY FLIP','MULTI-BALL','SLOW-MO','TELEPORT','MEGA BALL','ZERO FRICTION','INVERT CONTROLS'];

/* ============================
   WALL GEOMETRY — CLEAN BUILD
   ============================ */
function buildWalls(){
  const walls=[];
  const domeCX=250, domeCY=115, domeRX=225, domeRY=95;
  const domeSegs=18;
  for(let i=0;i<domeSegs;i++){
    let a1=Math.PI - i*(Math.PI*0.90/domeSegs);
    let a2=Math.PI - (i+1)*(Math.PI*0.90/domeSegs);
    walls.push({
      x1: domeCX+Math.cos(a1)*domeRX,
      y1: domeCY+Math.sin(a1)*domeRY,
      x2: domeCX+Math.cos(a2)*domeRX,
      y2: domeCY+Math.sin(a2)*domeRY
    });
  }
  let leftX=domeCX+Math.cos(Math.PI)*domeRX;
  walls.push({x1:leftX, y1:domeCY, x2:leftX, y2:DH-30});
  let rightX=LAUNCHER_CHANNEL_X;
  walls.push({x1:rightX, y1:350, x2:rightX, y2:DH-30});
  walls.push({x1:rightX, y1:80, x2:LAUNCHER_OUTER_X, y2:LAUNCHER_TOP_Y});
  walls.push({x1:LAUNCHER_OUTER_X, y1:LAUNCHER_TOP_Y, x2:LAUNCHER_OUTER_X, y2:DH-5});
  walls.push({x1:rightX, y1:LAUNCHER_BOT_Y-160, x2:rightX, y2:DH-5});
  walls.push({x1:leftX, y1:DH-30, x2:170, y2:DH-60});
  walls.push({x1:rightX, y1:DH-30, x2:350, y2:DH-60});
  return walls;
}
const WALLS=buildWalls();

/* ============================
   HELPERS
   ============================ */
function dist(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}

function clampSpeed(b){
  let spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
  let mx=glitchActive==='ZERO FRICTION'?MAX_SPEED*1.5:MAX_SPEED;
  if(spd>mx){b.vx*=mx/spd;b.vy*=mx/spd;}
}

function addPopup(x,y,text,color){
  scorePopups.push({x,y,text,color:color||PAL.white,life:1.0});
}

function addShake(amount){
  shakeMag=amount;
  shakeX=(Math.random()-0.5)*amount;
  shakeY=(Math.random()-0.5)*amount;
}

/* ============================
   COLLISION: BALL vs LINE SEGMENT
   ============================ */
function pointLineClosest(px,py,x1,y1,x2,y2){
  let dx=x2-x1, dy=y2-y1;
  let len2=dx*dx+dy*dy;
  if(len2===0) return {x:x1,y:y1,t:0};
  let t=((px-x1)*dx+(py-y1)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  return {x:x1+t*dx, y:y1+t*dy, t:t};
}

function collideBallLine(b, r, x1, y1, x2, y2, restitution, isFlipper, flipAngVel){
  let c=pointLineClosest(b.x,b.y,x1,y1,x2,y2);
  let d=dist(b.x,b.y,c.x,c.y);
  if(d<r && d>0.001){
    let nx=(b.x-c.x)/d, ny=(b.y-c.y)/d;
    b.x=c.x+nx*(r+0.5);
    b.y=c.y+ny*(r+0.5);
    let dot=b.vx*nx+b.vy*ny;
    if(dot<0){
      b.vx-=(1+restitution)*dot*nx;
      b.vy-=(1+restitution)*dot*ny;
    }
    if(isFlipper && flipAngVel){
      let rawKick=Math.abs(flipAngVel)*FLIPPER_LEN;
      let kick=Math.pow(rawKick,1.6)*0.16;
      b.vy -= kick*9;
      b.vx += nx*kick*2.5;
    }
    return true;
  }
  return false;
}

function sweptBallLine(b, r, x1, y1, x2, y2, restitution, isFlipper, flipAngVel){
  let spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
  if(spd<r*0.5){
    return collideBallLine(b,r,x1,y1,x2,y2,restitution,isFlipper,flipAngVel);
  }
  let hit=collideBallLine(b,r,x1,y1,x2,y2,restitution,isFlipper,flipAngVel);
  return hit;
}

/* ============================
   COLLISION: BALL vs CIRCLE
   ============================ */
function collideBallCircle(b, r, cx, cy, cr, restitution){
  let d=dist(b.x,b.y,cx,cy);
  let minD=r+cr;
  if(d<minD && d>0.001){
    let nx=(b.x-cx)/d, ny=(b.y-cy)/d;
    b.x=cx+nx*(minD+0.5);
    b.y=cy+ny*(minD+0.5);
    let dot=b.vx*nx+b.vy*ny;
    if(dot<0){
      b.vx-=(1+restitution)*dot*nx;
      b.vy-=(1+restitution)*dot*ny;
    }
    return true;
  }
  return false;
}

/* ============================
   BALL RESET & GAME FLOW
   ============================ */
function resetBall(){
  ball.x=LAUNCHER_BALL_X; ball.y=LAUNCHER_BOT_Y-30;
  ball.vx=0; ball.vy=0; ball.trail=[];
  ballInPlay=false; launching=false; launchPower=0;
  ghostBalls=[];
}

function startNewBall(){
  if(balls<=0){state='gameover'; return;}
  resetBall();
}

/* ============================
   GLITCH SYSTEM
   ============================ */
function pickGlitch(){
  glitchActive=GLITCHES[Math.floor(Math.random()*GLITCHES.length)];
  glitchDuration=3+Math.random()*2;
  glitchCountdown=glitchDuration;
  if(glitchActive==='MULTI-BALL'){
    ghostBalls=[
      {x:ball.x+20, y:ball.y-20, vx:ball.vx+2, vy:ball.vy-1, trail:[]},
      {x:ball.x-20, y:ball.y-20, vx:ball.vx-2, vy:ball.vy-1, trail:[]},
    ];
  }
  if(glitchActive==='TELEPORT'){
    ball.x=80+Math.random()*(DW-280);
    ball.y=100+Math.random()*400;
    ball.vx=(Math.random()-0.5)*4;
    ball.vy=-2-Math.random()*3;
    addShake(12);
  }
  if(glitchActive==='MEGA BALL'){ball._megaR=BALL_R*3;}
}

function endGlitch(){
  if(glitchActive==='MULTI-BALL') ghostBalls=[];
  if(glitchActive==='MEGA BALL') delete ball._megaR;
  score+=300; addPopup(DW/2,DH/2,'+300 GLITCH SURVIVED',PAL.green);
  glitchActive=null;
  glitchTimer=10+Math.random()*5;
}

/* ============================
   PHYSICS UPDATE (per ball)
   ============================ */
function updateBall(b, dt, isGhost){
  let grav=GRAVITY*dt;
  if(glitchActive==='GRAVITY FLIP') grav=-grav;
  if(glitchActive==='SLOW-MO'){grav*=0.3; dt*=0.3;}

  b.vy+=grav;
  if(glitchActive!=='ZERO FRICTION'){
    b.vx*=0.999; b.vy*=0.999;
  }

  let steps=1;
  let spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
  if(spd*dt>BALL_R*0.8) steps=Math.ceil(spd*dt/(BALL_R*0.8));
  if(steps>8) steps=8;

  let subDt=dt/steps;
  for(let step=0;step<steps;step++){
    b.x+=b.vx*subDt;
    b.y+=b.vy*subDt;

    let r=b._megaR||BALL_R;
    let isMega=glitchActive==='MEGA BALL'&&!isGhost;

    for(let w of WALLS){
      collideBallLine(b,r,w.x1,w.y1,w.x2,w.y2,0.4,false,0);
    }

    let flippers=[flipperL,flipperR];
    for(let f of flippers){
      let fl=getFlipperLine(f);
      let angVel=f.angle-f.prevAngle;
      collideBallLine(b,r,fl.x1,fl.y1,fl.x2,fl.y2,0.5,true,angVel);
    }

    for(let bmp of bumpers){
      if(isMega){
        let d2=dist(b.x,b.y,bmp.x,bmp.y);
        if(d2<r+bmp.baseR){
          bmp.flash=1; score+=100;
          addPopup(bmp.x,bmp.y,'+100',bmp.color);
          addShake(4);
          let nx2=(b.x-bmp.x)/d2, ny2=(b.y-bmp.y)/d2;
          b.x=bmp.x+nx2*(r+bmp.baseR);
          b.y=bmp.y+ny2*(r+bmp.baseR);
        }
      } else if(collideBallCircle(b,r,bmp.x,bmp.y,bmp.baseR,1.2)){
        bmp.flash=1; score+=100;
        addPopup(bmp.x,bmp.y,'+100',bmp.color);
        addShake(6);
      }
    }

    if(collideBallCircle(b,r,stBumper.x,stBumper.y,stBumper.baseR,1.4)){
      stBumper.flash=1; stBumper.distort=1; stBumper.hits++;
      stBumper.distortAngle=Math.atan2(b.vy,b.vx);
      score+=250; addPopup(stBumper.x,stBumper.y,'+250 WARP!',PAL.warpLight);
      addShake(10);
    }

    for(let t of dropTargets){
      if(!t.alive) continue;
      let tcx=t.x+t.w/2, tcy=t.y+t.h/2;
      if(Math.abs(b.x-tcx)<t.w/2+r && Math.abs(b.y-tcy)<t.h/2+r){
        t.alive=false; score+=200;
        addPopup(t.x,t.y,'+200',PAL.yellow);
        b.vy=-Math.abs(b.vy)*0.8-2;
        if(dropTargets.every(d=>!d.alive)){
          score+=1000;
          addPopup(DW/2,500,'+1000 CLEAR!',PAL.magenta);
          setTimeout(resetDropTargets,2000);
        }
      }
    }

    for(let s of slingshots){
      if(collideBallLine(b,r,s.x1,s.y1,s.x2,s.y2,1.5,false,0)){
        score+=50;
        addPopup((s.x1+s.x2)/2,(s.y1+s.y2)/2,'+50',s.color);
      }
    }

    if(Math.abs(b.x-spinner.x)<spinner.w/2+r && Math.abs(b.y-spinner.y)<r+4){
      let spdS=Math.abs(b.vx)+Math.abs(b.vy);
      spinnerSpeed+=spdS*0.3;
      let rots=Math.floor(spdS/2);
      if(rots>0){score+=25*rots; addPopup(spinner.x,spinner.y,'+'+25*rots,PAL.cyan);}
    }

    if(b.x<25+r){b.x=25+r; b.vx=Math.abs(b.vx)*0.6;}
    if(b.x>LAUNCHER_OUTER_X-r){b.x=LAUNCHER_OUTER_X-r; b.vx=-Math.abs(b.vx)*0.6;}
    if(b.y<20+r){b.y=20+r; b.vy=Math.abs(b.vy)*0.6;}
  }

  clampSpeed(b);

  if(b.y>DH+20){
    if(!isGhost){
      balls--;
      if(balls<=0) state='gameover';
      else startNewBall();
      return;
    } else {
      b.y=200; b.vy=-5;
    }
  }

  b.trail.push({x:b.x,y:b.y});
  if(b.trail.length>12) b.trail.shift();
}

/* ============================
   MAIN UPDATE
   ============================ */
function update(dt){
  if(state!=='play') return;

  let leftActive=keys['ArrowLeft']||keys['KeyA']||touchL;
  let rightActive=keys['ArrowRight']||keys['KeyD']||touchR;
  if(glitchActive==='INVERT CONTROLS'){
    let tmp=leftActive; leftActive=rightActive; rightActive=tmp;
  }

  flipperL.prevAngle=flipperL.angle;
  flipperR.prevAngle=flipperR.angle;
  flipperL.target=leftActive?FLIPPER_UP:FLIPPER_REST;
  flipperR.target=rightActive?-FLIPPER_UP:-FLIPPER_REST;
  flipperL.angle+=(flipperL.target-flipperL.angle)*FLIPPER_SPEED*dt;
  flipperR.angle+=(flipperR.target-flipperR.angle)*FLIPPER_SPEED*dt;

  if(!ballInPlay){
    if(keys['Space']||touchLaunch){
      launching=true;
      launchPower=Math.min(launchPower+0.03*dt,1);
    } else if(launching){
      ball.vy=-24-launchPower*36;
      ball.vx=-6;
      ballInPlay=true; launching=false; launchPower=0;
    }
    return;
  }

  if(glitchActive){
    glitchCountdown-=dt/60;
    if(glitchCountdown<=0) endGlitch();
  } else {
    glitchTimer-=dt/60;
    if(glitchTimer<=0) pickGlitch();
  }

  updateBall(ball,dt,false);
  for(let g of ghostBalls) updateBall(g,dt,true);

  spinnerAngle+=spinnerSpeed*dt;
  spinnerSpeed*=0.97;

  /* Bumper flash: instant on/off (stepped) */
  for(let b of bumpers){if(b.flash>0) b.flash-=0.08*dt; if(b.flash<0.3) b.flash=0;}
  if(stBumper.flash>0) stBumper.flash-=0.06*dt; if(stBumper.flash<0.3) stBumper.flash=0;
  if(stBumper.distort>0) stBumper.distort-=0.012*dt;

  for(let p of scorePopups){p.y-=0.8*dt; p.life-=0.015*dt;}
  scorePopups=scorePopups.filter(p=>p.life>0);

  if(shakeMag>0){
    shakeMag*=0.85;
    shakeX=(Math.random()-0.5)*shakeMag;
    shakeY=(Math.random()-0.5)*shakeMag;
    if(shakeMag<0.3){shakeX=0;shakeY=0;shakeMag=0;}
  }
}

/* ============================
   PIXEL DRAWING HELPERS (offscreen)
   ============================ */
const C=offCtx; /* shorthand for offscreen context */

function pixLine(x1,y1,x2,y2,color,width){
  C.strokeStyle=color; C.lineWidth=ots(width||2);
  C.beginPath(); C.moveTo(otx(x1),oty(y1)); C.lineTo(otx(x2),oty(y2)); C.stroke();
}

function pixRect(x,y,w,h,color,fill){
  if(fill){
    C.fillStyle=fill;
    C.fillRect(Math.floor(otx(x)),Math.floor(oty(y)),Math.ceil(ots(w)),Math.ceil(ots(h)));
  }
  C.strokeStyle=color; C.lineWidth=ots(2);
  C.strokeRect(Math.floor(otx(x)),Math.floor(oty(y)),Math.ceil(ots(w)),Math.ceil(ots(h)));
}

function pixCircle(cx2,cy2,r,color,fill){
  /* Draw blocky circle: outline with hard pixels */
  let px=otx(cx2), py=oty(cy2), pr=ots(r);
  if(fill){
    C.fillStyle=fill;
    C.beginPath(); C.arc(px,py,pr,0,Math.PI*2); C.fill();
  }
  /* Hard 2px outline */
  C.strokeStyle=color; C.lineWidth=ots(2);
  C.beginPath(); C.arc(px,py,pr,0,Math.PI*2); C.stroke();
}

/* ============================
   DRAW TABLE (offscreen)
   ============================ */
function drawTable(){
  /* Background */
  C.fillStyle=PAL.bg;
  C.fillRect(otx(20),oty(20),ots(DW-40),ots(DH-40));

  /* Subtle grid pattern */
  C.save(); C.globalAlpha=0.08; C.strokeStyle=PAL.gridColor; C.lineWidth=1;
  for(let i=0;i<22;i++){
    let y=40+i*40;
    C.beginPath(); C.moveTo(otx(30),oty(y)); C.lineTo(otx(DW-80),oty(y)); C.stroke();
  }
  for(let i=0;i<14;i++){
    let x=40+i*36;
    C.beginPath(); C.moveTo(otx(x),oty(30)); C.lineTo(otx(x),oty(DH-30)); C.stroke();
  }
  C.restore();

  /* Walls — flat hard lines */
  for(let w of WALLS){
    pixLine(w.x1,w.y1,w.x2,w.y2,PAL.wallColor,3);
  }

  /* Slingshots */
  for(let s of slingshots){
    pixLine(s.x1,s.y1,s.x2,s.y2,s.color,3);
  }

  /* Bumpers — flat circles with hard outlines */
  for(let b of bumpers){
    let r=b.baseR;
    if(b.flash>0){
      /* Instant flash: bright fill */
      pixCircle(b.x,b.y,r+2,PAL.white,PAL.white);
    } else {
      /* Outline circle + darker fill */
      let darkFill=b.color+'33';
      pixCircle(b.x,b.y,r,b.color,darkFill);
    }
  }

  /* Space-time bumper */
  drawSpaceTimeBumper();

  /* Drop targets */
  for(let t of dropTargets){
    if(t.alive){
      pixRect(t.x,t.y,t.w,t.h,PAL.yellow,PAL.yellow+'44');
    } else {
      C.save(); C.globalAlpha=0.2;
      pixRect(t.x,t.y,t.w,t.h,PAL.yellow+'55');
      C.restore();
    }
  }

  /* Spinner */
  C.save();
  C.translate(otx(spinner.x),oty(spinner.y));
  C.rotate(spinnerAngle);
  C.strokeStyle=PAL.cyan; C.lineWidth=ots(2);
  C.beginPath(); C.moveTo(ots(-spinner.w/2),0); C.lineTo(ots(spinner.w/2),0); C.stroke();
  C.restore();

  /* Launcher area */
  pixRect(LAUNCHER_CHANNEL_X+5,LAUNCHER_BOT_Y-160,LAUNCHER_OUTER_X-LAUNCHER_CHANNEL_X-10,170,PAL.dimWall);
  if(launching){
    let h=launchPower*150;
    let hue=(1-launchPower)*120;
    C.fillStyle='hsl('+hue+',70%,45%)';
    C.fillRect(otx(LAUNCHER_CHANNEL_X+8),oty(LAUNCHER_BOT_Y-h),ots(LAUNCHER_OUTER_X-LAUNCHER_CHANNEL_X-16),ots(h));
  }
}

/* ============================
   SPACE-TIME BUMPER DRAWING (offscreen)
   ============================ */
function drawSpaceTimeBumper(){
  let st=stBumper;
  let r=st.baseR;

  /* Distortion ripples — simplified pixel version */
  if(st.distort>0){
    let d=st.distort;
    C.save();
    for(let i=1;i<=3;i++){
      let ripR=r+i*(1-d)*80;
      let a=d*(0.3-i*0.08); if(a<=0) continue;
      C.globalAlpha=a;
      C.strokeStyle=i%2===0?PAL.warpLight:PAL.warpPurple;
      C.lineWidth=ots(2);
      C.beginPath();
      C.arc(otx(st.x),oty(st.y),ots(ripR),0,Math.PI*2);
      C.stroke();
    }
    C.restore();
  }

  /* Core bumper */
  if(st.flash>0){
    pixCircle(st.x,st.y,r+3,PAL.white,PAL.white);
  } else {
    let pulse=Math.sin(Date.now()*0.004)>0?PAL.warpPurple:PAL.warpLight;
    pixCircle(st.x,st.y,r,pulse,PAL.warpPurple+'33');
  }

  /* Spiral arms — simplified */
  let spin=Date.now()*0.003;
  C.save();
  C.strokeStyle=PAL.warpPurple+'88'; C.lineWidth=ots(1);
  let scx=otx(st.x), scy=oty(st.y);
  for(let arm=0;arm<3;arm++){
    C.beginPath();
    for(let a=0;a<Math.PI*2;a+=0.2){
      let sr=ots(6+a*r*0.1);
      let sx2=scx+Math.cos(a+spin+arm*Math.PI*2/3)*sr;
      let sy2=scy+Math.sin(a+spin+arm*Math.PI*2/3)*sr;
      if(a===0) C.moveTo(sx2,sy2); else C.lineTo(sx2,sy2);
    }
    C.stroke();
  }
  C.restore();

  /* Label */
  C.font=ots(7)+'px "Press Start 2P",monospace';
  C.textAlign='center';
  C.fillStyle=PAL.warpLight+'aa';
  C.fillText('SPACETIME',otx(st.x),oty(st.y)+ots(r+12));
}

/* ============================
   DRAW FLIPPER (offscreen)
   ============================ */
function drawFlipper(f,color){
  let fl=getFlipperLine(f);
  /* Hard-edged thick line */
  C.strokeStyle=color; C.lineWidth=ots(8); C.lineCap='butt';
  C.beginPath(); C.moveTo(otx(fl.x1),oty(fl.y1)); C.lineTo(otx(fl.x2),oty(fl.y2)); C.stroke();
  /* Outline */
  C.strokeStyle=PAL.white+'44'; C.lineWidth=ots(10); C.lineCap='butt';
  C.beginPath(); C.moveTo(otx(fl.x1),oty(fl.y1)); C.lineTo(otx(fl.x2),oty(fl.y2)); C.stroke();
  /* Foreground */
  C.strokeStyle=color; C.lineWidth=ots(7); C.lineCap='butt';
  C.beginPath(); C.moveTo(otx(fl.x1),oty(fl.y1)); C.lineTo(otx(fl.x2),oty(fl.y2)); C.stroke();
}

/* ============================
   DRAW BALL (offscreen)
   ============================ */
function drawBallObj(b,alpha,isMega){
  let r=isMega?(b._megaR||BALL_R):BALL_R;

  /* Trail — square blocks */
  C.save();
  for(let i=0;i<b.trail.length;i++){
    let a=(i/b.trail.length)*0.5*alpha;
    let sz=ots(r*(0.3+0.7*i/b.trail.length))*2;
    C.globalAlpha=a; C.fillStyle=PAL.cyan;
    C.fillRect(otx(b.trail[i].x)-sz/2, oty(b.trail[i].y)-sz/2, sz, sz);
  }
  C.restore();

  /* RGB offset during glitch */
  if(glitchActive){
    C.save(); C.globalAlpha=0.35*alpha;
    let sz=ots(r)*2;
    C.fillStyle=PAL.red;
    C.fillRect(otx(b.x-3)-sz/2, oty(b.y)-sz/2, sz, sz);
    C.fillStyle=PAL.blue;
    C.fillRect(otx(b.x+3)-sz/2, oty(b.y)-sz/2, sz, sz);
    C.restore();
  }

  /* Ball core: square pixel ball */
  C.save(); C.globalAlpha=alpha;
  let sz=ots(r)*2;
  /* Outline */
  C.fillStyle=PAL.white;
  C.fillRect(otx(b.x)-sz/2-1, oty(b.y)-sz/2-1, sz+2, sz+2);
  /* Fill */
  C.fillStyle=PAL.cyan;
  C.fillRect(otx(b.x)-sz/2, oty(b.y)-sz/2, sz, sz);
  /* Inner highlight */
  let hl=sz*0.3;
  C.fillStyle=PAL.white+'88';
  C.fillRect(otx(b.x)-sz/2+1, oty(b.y)-sz/2+1, hl, hl);
  C.restore();
}

/* ============================
   GLITCH OVERLAY (offscreen)
   ============================ */
function drawGlitchOverlay(){
  if(!glitchActive) return;

  /* Random pixel blocks */
  C.save(); C.globalAlpha=0.15;
  let colors=[PAL.red,PAL.green,PAL.blue,PAL.yellow,PAL.magenta,PAL.cyan];
  for(let i=0;i<6;i++){
    let bx=Math.random()*OFF_W, by=Math.random()*OFF_H;
    let bw=4+Math.random()*20, bh=2+Math.random()*6;
    C.fillStyle=colors[Math.floor(Math.random()*6)];
    C.fillRect(bx,by,bw,bh);
  }
  C.restore();

  /* Glitch name — stepped flash (on/off) */
  if(Math.floor(Date.now()/200)%2===0){
    C.save();
    C.font=ots(20)+'px "Press Start 2P",monospace';
    C.textAlign='center';
    C.fillStyle=PAL.magenta;
    C.fillText(glitchActive,OFF_W/2,oty(DH/2-70));
    C.restore();
  }
}

/* ============================
   HUD (offscreen)
   ============================ */
function drawHUD(){
  /* Score - top center */
  C.save();
  C.font=ots(22)+'px "Press Start 2P",monospace';
  C.textAlign='center';
  C.fillStyle=PAL.cyan;
  C.fillText(score.toLocaleString(),OFF_W/2,oty(-8));
  C.restore();

  /* Balls remaining */
  C.save();
  C.font=ots(12)+'px "Press Start 2P",monospace';
  C.textAlign='right';
  C.fillStyle=PAL.magenta;
  let ballText='';
  for(let i=0;i<balls;i++) ballText+='\u25A0';
  C.fillText(ballText,otx(DW-15),oty(-8));
  C.restore();

  /* Glitch countdown */
  if(!glitchActive && ballInPlay){
    C.save();
    C.font=ots(8)+'px "Press Start 2P",monospace';
    C.textAlign='left';
    C.fillStyle=PAL.dimWall;
    C.fillText('GLITCH:'+Math.max(0,glitchTimer*60/60).toFixed(0)+'s',otx(35),oty(-8));
    C.restore();
  }

  /* Score popups */
  for(let p of scorePopups){
    C.save(); C.globalAlpha=p.life;
    C.font=ots(10)+'px "Press Start 2P",monospace';
    C.textAlign='center'; C.fillStyle=p.color;
    C.fillText(p.text,otx(p.x),oty(p.y));
    C.restore();
  }
}

/* ============================
   START SCREEN (main canvas, full res)
   ============================ */
function drawStartScreen(){
  ctx.fillStyle=PAL.bgDark; ctx.fillRect(0,0,W,H);

  let t=Date.now()*0.001;
  ctx.save();
  ctx.textAlign='center';

  let sz=Math.min(ts(42),W*0.07);
  ctx.font=sz+'px "Press Start 2P",monospace';
  let yPos=H*0.36;

  /* Stepped RGB split */
  let off=Math.floor(Date.now()/150)%2===0?3:0;
  ctx.globalAlpha=0.4; ctx.fillStyle=PAL.red;
  ctx.fillText('GLITCH',W/2+off,yPos-off);
  ctx.fillStyle=PAL.blue;
  ctx.fillText('GLITCH',W/2-off,yPos+off);
  ctx.globalAlpha=1; ctx.fillStyle=PAL.white;
  ctx.fillText('GLITCH',W/2,yPos);

  ctx.fillStyle=PAL.cyan;
  ctx.fillText('PINBALL',W/2,yPos+sz+12);

  /* Prompt — blink on/off */
  if(Math.floor(Date.now()/500)%2===0){
    ctx.font=Math.max(ts(10),10)+'px "Press Start 2P",monospace';
    ctx.fillStyle=PAL.magenta;
    ctx.fillText('PRESS SPACE / TAP',W/2,H*0.60);
  }

  ctx.restore();
}

/* ============================
   GAME OVER SCREEN (main canvas)
   ============================ */
function drawGameOver(){
  ctx.save();
  ctx.fillStyle='rgba(13,13,26,0.8)'; ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  ctx.font=ts(30)+'px "Press Start 2P",monospace';
  ctx.fillStyle=PAL.red;
  ctx.fillText('GAME OVER',W/2,H*0.35);

  ctx.font=ts(22)+'px "Press Start 2P",monospace';
  ctx.fillStyle=PAL.cyan;
  ctx.fillText(score.toLocaleString(),W/2,H*0.48);

  if(Math.floor(Date.now()/500)%2===0){
    ctx.font=Math.max(ts(10),10)+'px "Press Start 2P",monospace';
    ctx.fillStyle=PAL.magenta;
    ctx.fillText('INSERT COIN',W/2,H*0.6);
  }
  ctx.restore();
}

/* ============================
   MAIN DRAW
   ============================ */
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=PAL.bgDark; ctx.fillRect(0,0,W,H);

  if(state==='start'){drawStartScreen(); return;}

  /* Render game to offscreen at half res */
  C.imageSmoothingEnabled=false;
  C.clearRect(0,0,OFF_W,OFF_H);
  C.fillStyle=PAL.bgDark;
  C.fillRect(0,0,OFF_W,OFF_H);

  drawTable();
  drawFlipper(flipperL,PAL.magenta);
  drawFlipper(flipperR,PAL.cyan);

  let isMega=glitchActive==='MEGA BALL';
  drawBallObj(ball,1,isMega);
  for(let g of ghostBalls) drawBallObj(g,0.45,false);

  drawGlitchOverlay();
  drawHUD();

  /* Scale offscreen to main canvas — chunky pixels */
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(offCanvas, TX, TY, TW, TH);

  if(state==='gameover') drawGameOver();
}

/* ============================
   GAME LOOP
   ============================ */
let lastTime=0;
function loop(time){
  let dt=lastTime?Math.min((time-lastTime)/16.67,3):1;
  lastTime=time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function startGame(){
  state='play'; score=0; balls=3;
  glitchTimer=12; glitchActive=null; ghostBalls=[];
  scorePopups=[];
  flipperL.angle=FLIPPER_REST; flipperL.prevAngle=FLIPPER_REST;
  flipperR.angle=-FLIPPER_REST; flipperR.prevAngle=-FLIPPER_REST;
  resetDropTargets();
  startNewBall();
}

/* ============================
   INPUT HANDLERS
   ============================ */
window.addEventListener('keydown',function(e){
  keys[e.code]=true;
  if(e.code==='Space'){
    e.preventDefault();
    if(state==='start'||state==='gameover') startGame();
  }
});
window.addEventListener('keyup',function(e){keys[e.code]=false;});

canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  for(let i=0;i<e.changedTouches.length;i++){
    let t=e.changedTouches[i];
    let x=t.clientX/W;
    if(state==='start'||state==='gameover'){startGame(); return;}
    if(x<0.35) touchL=true;
    else if(x>0.75) touchR=true;
    if(x>0.65) touchLaunch=true;
  }
},{passive:false});

canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  for(let i=0;i<e.changedTouches.length;i++){
    let t=e.changedTouches[i];
    let x=t.clientX/W;
    if(x<0.35) touchL=false;
    else if(x>0.75) touchR=false;
    touchLaunch=false;
  }
},{passive:false});

canvas.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});

canvas.addEventListener('mousedown',function(e){
  if(state==='start'||state==='gameover'){startGame(); return;}
  let x=e.clientX/W;
  if(x<0.35) touchL=true;
  else if(x>0.65){touchR=true; touchLaunch=true;}
});
canvas.addEventListener('mouseup',function(){touchL=false; touchR=false; touchLaunch=false;});

requestAnimationFrame(loop);
})();
</script>
