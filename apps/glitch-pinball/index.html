<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Glitch Pinball</title>
<link rel="icon" href="https://emojicdn.elk.sh/🕹️" type="image/png">
<meta property="og:title" content="Glitch Pinball">
<meta property="og:description" content="Neon pinball where physics randomly glitch out. Gravity flips, balls multiply, time warps.">
<meta property="og:url" content="https://sloppy.live/glitch-pinball">
<meta property="og:image" content="https://sloppy.live/glitch-pinball/og-image.png">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Fira Code',monospace}
canvas{display:block;margin:0 auto;touch-action:none}
#backlink{position:fixed;bottom:6px;left:8px;font-size:11px;color:#334;text-decoration:none;z-index:99;font-family:'Fira Code',monospace}
#backlink:hover{color:#0ff}
</style>
</head>
<body>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<canvas id="c"></canvas>
<script>
(function(){
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

/* ============================
   LAYOUT & SCALING
   ============================ */
let W,H,SCALE,TX,TY,TW,TH;
function resize(){
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W; canvas.height=H;
  const aspect=0.65;
  if(W/H<aspect){TW=W*0.96;TH=TW/aspect;}
  else{TH=H*0.94;TW=TH*aspect;}
  TX=(W-TW)/2; TY=(H-TH)/2;
  SCALE=TH/900;
}
resize();
window.addEventListener('resize',resize);

/* ============================
   DESIGN CONSTANTS
   ============================ */
const DW=580, DH=900;
const GRAVITY=0.144;
const MAX_SPEED=17;
const BALL_R=9;
const FLIPPER_LEN=75;
const FLIPPER_REST=0.45;
const FLIPPER_UP=-0.55;
const FLIPPER_SPEED=0.28;
const LAUNCHER_CHANNEL_X=510; // left edge of launcher channel
const LAUNCHER_OUTER_X=575;   // outer wall of launcher
const LAUNCHER_BALL_X=542;    // ball center X in launcher
const LAUNCHER_TOP_Y=60;      // top of launcher channel
const LAUNCHER_BOT_Y=860;     // bottom of launcher

/* ============================
   COORDINATE TRANSFORMS
   ============================ */
let shakeX=0, shakeY=0, shakeMag=0;
function tx(x){return TX+x*TW/DW+shakeX;}
function ty(y){return TY+y*TH/DH+shakeY;}
function ts(s){return s*SCALE;}

/* ============================
   GAME STATE
   ============================ */
let state='start';
let score=0, balls=3, ballInPlay=false;
let launchPower=0, launching=false;
let glitchTimer=0, glitchActive=null, glitchDuration=0, glitchCountdown=0;
let scorePopups=[];
let ghostBalls=[];
let spinnerAngle=0, spinnerSpeed=0;

/* ============================
   BALL
   ============================ */
let ball={x:LAUNCHER_BALL_X, y:LAUNCHER_BOT_Y-30, vx:0, vy:0, trail:[]};

/* ============================
   FLIPPERS
   ============================ */
let flipperL={x:175, y:DH-75, angle:FLIPPER_REST, prevAngle:FLIPPER_REST, side:-1};
let flipperR={x:DW-175-70, y:DH-75, angle:-FLIPPER_REST, prevAngle:-FLIPPER_REST, side:1};

function getFlipperLine(f){
  let ex=f.x+f.side*FLIPPER_LEN*Math.cos(f.angle);
  let ey=f.y+FLIPPER_LEN*Math.sin(f.angle);
  return {x1:f.x, y1:f.y, x2:ex, y2:ey};
}

/* ============================
   INPUT
   ============================ */
let keys={};
let touchL=false, touchR=false, touchLaunch=false;

/* ============================
   BUMPERS
   ============================ */
const bumpers=[
  {x:155, y:230, r:28, color:'#0ff'},
  {x:385, y:210, r:28, color:'#f0f'},
  {x:270, y:310, r:26, color:'#ff0'},
  {x:115, y:390, r:22, color:'#0f0'},
  {x:410, y:370, r:22, color:'#0ff'},
  {x:270, y:175, r:22, color:'#f0f'},
  {x:185, y:490, r:20, color:'#ff0'},
  {x:365, y:480, r:20, color:'#0f0'},
];
bumpers.forEach(b=>{b.flash=0; b.baseR=b.r;});

/* Space-time bumper */
const stBumper={x:270, y:285, r:36, baseR:36, color:'#fff', flash:0, distort:0, distortAngle:0, hits:0};

/* ============================
   DROP TARGETS
   ============================ */
let dropTargets=[
  {x:175, y:535, w:45, h:12, alive:true},
  {x:250, y:535, w:45, h:12, alive:true},
  {x:325, y:535, w:45, h:12, alive:true},
];
function resetDropTargets(){dropTargets.forEach(t=>t.alive=true);}

/* ============================
   SLINGSHOTS
   ============================ */
const slingshots=[
  {x1:75, y1:DH-170, x2:140, y2:DH-95, color:'#f0f'},
  {x1:DW-145-70, y1:DH-170, x2:DW-210-70, y2:DH-95, color:'#0ff'},
];

/* ============================
   SPINNER
   ============================ */
const spinner={x:270, y:415, w:55};

/* ============================
   GLITCH TYPES
   ============================ */
const GLITCHES=['GRAVITY FLIP','MULTI-BALL','SLOW-MO','TELEPORT','MEGA BALL','ZERO FRICTION','INVERT CONTROLS'];

/* ============================
   WALL GEOMETRY — CLEAN BUILD
   ============================ */
function buildWalls(){
  const walls=[];

  /* --- Curved dome top: half-ellipse, 18 segments --- */
  /* Dome centered over playfield, opens on right side for launcher gap */
  const domeCX=250, domeCY=115, domeRX=225, domeRY=95;
  const domeSegs=18;
  /* Go from PI (left) to ~0.05*PI (near right), leaving gap for launcher */
  for(let i=0;i<domeSegs;i++){
    let a1=Math.PI - i*(Math.PI*0.90/domeSegs);
    let a2=Math.PI - (i+1)*(Math.PI*0.90/domeSegs);
    walls.push({
      x1: domeCX+Math.cos(a1)*domeRX,
      y1: domeCY+Math.sin(a1)*domeRY,
      x2: domeCX+Math.cos(a2)*domeRX,
      y2: domeCY+Math.sin(a2)*domeRY
    });
  }

  /* --- Left wall: straight from dome bottom-left to near bottom --- */
  let leftX=domeCX+Math.cos(Math.PI)*domeRX; // ~25
  walls.push({x1:leftX, y1:domeCY, x2:leftX, y2:DH-30});

  /* --- Right playfield wall: starts below launcher exit (~y=350) to bottom area --- */
  let rightX=LAUNCHER_CHANNEL_X; // 510
  walls.push({x1:rightX, y1:350, x2:rightX, y2:DH-30});

  /* --- Launcher deflector at top: angled wall that kicks ball LEFT --- */
  /* Ball comes up the launcher channel and hits this angled piece */
  walls.push({x1:rightX, y1:80, x2:LAUNCHER_OUTER_X, y2:LAUNCHER_TOP_Y});

  /* --- Launcher channel outer wall --- */
  walls.push({x1:LAUNCHER_OUTER_X, y1:LAUNCHER_TOP_Y, x2:LAUNCHER_OUTER_X, y2:DH-5});

  /* --- Launcher channel inner wall (only below the playfield entry) --- */
  /* This prevents ball from re-entering launcher from the playfield side */
  walls.push({x1:rightX, y1:LAUNCHER_BOT_Y-160, x2:rightX, y2:DH-5});

  /* --- Bottom drain: angled gutters converging to center drain hole --- */
  walls.push({x1:leftX, y1:DH-30, x2:150, y2:DH-55});
  walls.push({x1:rightX, y1:DH-30, x2:370, y2:DH-55});

  return walls;
}
const WALLS=buildWalls();

/* ============================
   HELPERS
   ============================ */
function dist(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}

function clampSpeed(b){
  let spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
  let mx=glitchActive==='ZERO FRICTION'?MAX_SPEED*1.5:MAX_SPEED;
  if(spd>mx){b.vx*=mx/spd;b.vy*=mx/spd;}
}

function addPopup(x,y,text,color){
  scorePopups.push({x,y,text,color:color||'#fff',life:1.0});
}

function addShake(amount){
  shakeMag=amount;
  shakeX=(Math.random()-0.5)*amount;
  shakeY=(Math.random()-0.5)*amount;
}

/* ============================
   COLLISION: BALL vs LINE SEGMENT
   Swept collision with substeps to prevent tunneling
   ============================ */
function pointLineClosest(px,py,x1,y1,x2,y2){
  let dx=x2-x1, dy=y2-y1;
  let len2=dx*dx+dy*dy;
  if(len2===0) return {x:x1,y:y1,t:0};
  let t=((px-x1)*dx+(py-y1)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  return {x:x1+t*dx, y:y1+t*dy, t:t};
}

function collideBallLine(b, r, x1, y1, x2, y2, restitution, isFlipper, flipAngVel){
  let c=pointLineClosest(b.x,b.y,x1,y1,x2,y2);
  let d=dist(b.x,b.y,c.x,c.y);
  if(d<r && d>0.001){
    let nx=(b.x-c.x)/d, ny=(b.y-c.y)/d;
    /* Push ball out of wall */
    b.x=c.x+nx*(r+0.5);
    b.y=c.y+ny*(r+0.5);
    /* Reflect velocity */
    let dot=b.vx*nx+b.vy*ny;
    if(dot<0){ /* only if moving into wall */
      b.vx-=(1+restitution)*dot*nx;
      b.vy-=(1+restitution)*dot*ny;
    }
    /* Flipper kick */
    if(isFlipper && flipAngVel){
      let rawKick=Math.abs(flipAngVel)*FLIPPER_LEN;
      let kick=Math.pow(rawKick,1.6)*0.16;
      b.vy -= kick*9;
      b.vx += nx*kick*2.5;
    }
    return true;
  }
  return false;
}

/* Swept ball-line: check substeps along motion vector */
function sweptBallLine(b, r, x1, y1, x2, y2, restitution, isFlipper, flipAngVel){
  let spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
  /* If speed is low, single check suffices */
  if(spd<r*0.5){
    return collideBallLine(b,r,x1,y1,x2,y2,restitution,isFlipper,flipAngVel);
  }
  /* Substep: check at current position and at previous position */
  let hit=collideBallLine(b,r,x1,y1,x2,y2,restitution,isFlipper,flipAngVel);
  return hit;
}

/* ============================
   COLLISION: BALL vs CIRCLE
   ============================ */
function collideBallCircle(b, r, cx, cy, cr, restitution){
  let d=dist(b.x,b.y,cx,cy);
  let minD=r+cr;
  if(d<minD && d>0.001){
    let nx=(b.x-cx)/d, ny=(b.y-cy)/d;
    b.x=cx+nx*(minD+0.5);
    b.y=cy+ny*(minD+0.5);
    let dot=b.vx*nx+b.vy*ny;
    if(dot<0){
      b.vx-=(1+restitution)*dot*nx;
      b.vy-=(1+restitution)*dot*ny;
    }
    return true;
  }
  return false;
}

/* ============================
   BALL RESET & GAME FLOW
   ============================ */
function resetBall(){
  ball.x=LAUNCHER_BALL_X; ball.y=LAUNCHER_BOT_Y-30;
  ball.vx=0; ball.vy=0; ball.trail=[];
  ballInPlay=false; launching=false; launchPower=0;
  ghostBalls=[];
}

function startNewBall(){
  if(balls<=0){state='gameover'; return;}
  resetBall();
}

/* ============================
   GLITCH SYSTEM
   ============================ */
function pickGlitch(){
  glitchActive=GLITCHES[Math.floor(Math.random()*GLITCHES.length)];
  glitchDuration=3+Math.random()*2;
  glitchCountdown=glitchDuration;
  if(glitchActive==='MULTI-BALL'){
    ghostBalls=[
      {x:ball.x+20, y:ball.y-20, vx:ball.vx+2, vy:ball.vy-1, trail:[]},
      {x:ball.x-20, y:ball.y-20, vx:ball.vx-2, vy:ball.vy-1, trail:[]},
    ];
  }
  if(glitchActive==='TELEPORT'){
    ball.x=80+Math.random()*(DW-280);
    ball.y=100+Math.random()*400;
    ball.vx=(Math.random()-0.5)*4;
    ball.vy=-2-Math.random()*3;
    addShake(12);
  }
  if(glitchActive==='MEGA BALL'){ball._megaR=BALL_R*3;}
}

function endGlitch(){
  if(glitchActive==='MULTI-BALL') ghostBalls=[];
  if(glitchActive==='MEGA BALL') delete ball._megaR;
  score+=300; addPopup(DW/2,DH/2,'+300 GLITCH SURVIVED','#0f0');
  glitchActive=null;
  glitchTimer=10+Math.random()*5;
}

/* ============================
   PHYSICS UPDATE (per ball)
   ============================ */
function updateBall(b, dt, isGhost){
  let grav=GRAVITY*dt;
  if(glitchActive==='GRAVITY FLIP') grav=-grav;
  if(glitchActive==='SLOW-MO'){grav*=0.3; dt*=0.3;}

  b.vy+=grav;
  if(glitchActive!=='ZERO FRICTION'){
    b.vx*=0.999; b.vy*=0.999;
  }

  /* Substep motion for tunneling prevention */
  let steps=1;
  let spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
  if(spd*dt>BALL_R*0.8) steps=Math.ceil(spd*dt/(BALL_R*0.8));
  if(steps>8) steps=8;

  let subDt=dt/steps;
  for(let step=0;step<steps;step++){
    b.x+=b.vx*subDt;
    b.y+=b.vy*subDt;

    let r=b._megaR||BALL_R;
    let isMega=glitchActive==='MEGA BALL'&&!isGhost;

    /* Wall collisions */
    for(let w of WALLS){
      collideBallLine(b,r,w.x1,w.y1,w.x2,w.y2,0.4,false,0);
    }

    /* Flipper collisions */
    let flippers=[flipperL,flipperR];
    for(let f of flippers){
      let fl=getFlipperLine(f);
      let angVel=f.angle-f.prevAngle;
      collideBallLine(b,r,fl.x1,fl.y1,fl.x2,fl.y2,0.5,true,angVel);
    }

    /* Bumper collisions */
    for(let bmp of bumpers){
      if(isMega){
        let d2=dist(b.x,b.y,bmp.x,bmp.y);
        if(d2<r+bmp.baseR){
          bmp.flash=1; score+=100;
          addPopup(bmp.x,bmp.y,'+100',bmp.color);
          addShake(4);
          let nx2=(b.x-bmp.x)/d2, ny2=(b.y-bmp.y)/d2;
          b.x=bmp.x+nx2*(r+bmp.baseR);
          b.y=bmp.y+ny2*(r+bmp.baseR);
        }
      } else if(collideBallCircle(b,r,bmp.x,bmp.y,bmp.baseR,1.2)){
        bmp.flash=1; score+=100;
        addPopup(bmp.x,bmp.y,'+100',bmp.color);
        addShake(6);
      }
    }

    /* Space-time bumper */
    if(collideBallCircle(b,r,stBumper.x,stBumper.y,stBumper.baseR,1.4)){
      stBumper.flash=1; stBumper.distort=1; stBumper.hits++;
      stBumper.distortAngle=Math.atan2(b.vy,b.vx);
      score+=250; addPopup(stBumper.x,stBumper.y,'+250 WARP!','#e0c0ff');
      addShake(10);
    }

    /* Drop targets */
    for(let t of dropTargets){
      if(!t.alive) continue;
      let tcx=t.x+t.w/2, tcy=t.y+t.h/2;
      if(Math.abs(b.x-tcx)<t.w/2+r && Math.abs(b.y-tcy)<t.h/2+r){
        t.alive=false; score+=200;
        addPopup(t.x,t.y,'+200','#ff0');
        b.vy=-Math.abs(b.vy)*0.8-2;
        if(dropTargets.every(d=>!d.alive)){
          score+=1000;
          addPopup(DW/2,500,'+1000 CLEAR BONUS!','#f0f');
          setTimeout(resetDropTargets,2000);
        }
      }
    }

    /* Slingshots */
    for(let s of slingshots){
      if(collideBallLine(b,r,s.x1,s.y1,s.x2,s.y2,1.5,false,0)){
        score+=50;
        addPopup((s.x1+s.x2)/2,(s.y1+s.y2)/2,'+50',s.color);
      }
    }

    /* Spinner */
    if(Math.abs(b.x-spinner.x)<spinner.w/2+r && Math.abs(b.y-spinner.y)<r+4){
      let spdS=Math.abs(b.vx)+Math.abs(b.vy);
      spinnerSpeed+=spdS*0.3;
      let rots=Math.floor(spdS/2);
      if(rots>0){score+=25*rots; addPopup(spinner.x,spinner.y,'+'+25*rots,'#0ff');}
    }

    /* Hard boundary clamps */
    if(b.x<25+r){b.x=25+r; b.vx=Math.abs(b.vx)*0.6;}
    if(b.x>LAUNCHER_OUTER_X-r){b.x=LAUNCHER_OUTER_X-r; b.vx=-Math.abs(b.vx)*0.6;}
    if(b.y<20+r){b.y=20+r; b.vy=Math.abs(b.vy)*0.6;}
  }

  clampSpeed(b);

  /* Drain detection */
  if(b.y>DH+20){
    if(!isGhost){
      balls--;
      if(balls<=0) state='gameover';
      else startNewBall();
      return;
    } else {
      b.y=200; b.vy=-5;
    }
  }

  /* Trail */
  b.trail.push({x:b.x,y:b.y});
  if(b.trail.length>12) b.trail.shift();
}

/* ============================
   MAIN UPDATE
   ============================ */
function update(dt){
  if(state!=='play') return;

  /* Flipper input */
  let leftActive=keys['ArrowLeft']||keys['KeyA']||touchL;
  let rightActive=keys['ArrowRight']||keys['KeyD']||touchR;
  if(glitchActive==='INVERT CONTROLS'){
    let tmp=leftActive; leftActive=rightActive; rightActive=tmp;
  }

  flipperL.prevAngle=flipperL.angle;
  flipperR.prevAngle=flipperR.angle;
  flipperL.target=leftActive?FLIPPER_UP:FLIPPER_REST;
  flipperR.target=rightActive?-FLIPPER_UP:-FLIPPER_REST;
  flipperL.angle+=(flipperL.target-flipperL.angle)*FLIPPER_SPEED*dt;
  flipperR.angle+=(flipperR.target-flipperR.angle)*FLIPPER_SPEED*dt;

  /* Launcher */
  if(!ballInPlay){
    if(keys['Space']||touchLaunch){
      launching=true;
      launchPower=Math.min(launchPower+0.03*dt,1);
    } else if(launching){
      ball.vy=-24-launchPower*36;
      ball.vx=-6;
      ballInPlay=true; launching=false; launchPower=0;
    }
    return;
  }

  /* Glitch timer */
  if(glitchActive){
    glitchCountdown-=dt/60;
    if(glitchCountdown<=0) endGlitch();
  } else {
    glitchTimer-=dt/60;
    if(glitchTimer<=0) pickGlitch();
  }

  /* Update balls */
  updateBall(ball,dt,false);
  for(let g of ghostBalls) updateBall(g,dt,true);

  /* Spinner decay */
  spinnerAngle+=spinnerSpeed*dt;
  spinnerSpeed*=0.97;

  /* Bumper flash decay */
  for(let b of bumpers){if(b.flash>0) b.flash-=0.05*dt;}
  if(stBumper.flash>0) stBumper.flash-=0.04*dt;
  if(stBumper.distort>0) stBumper.distort-=0.012*dt;

  /* Popups */
  for(let p of scorePopups){p.y-=0.8*dt; p.life-=0.015*dt;}
  scorePopups=scorePopups.filter(p=>p.life>0);

  /* Shake decay */
  if(shakeMag>0){
    shakeMag*=0.85;
    shakeX=(Math.random()-0.5)*shakeMag;
    shakeY=(Math.random()-0.5)*shakeMag;
    if(shakeMag<0.3){shakeX=0;shakeY=0;shakeMag=0;}
  }
}

/* ============================
   DRAWING HELPERS
   ============================ */
function drawNeonLine(x1,y1,x2,y2,color,width){
  ctx.save();
  ctx.shadowColor=color; ctx.shadowBlur=ts(10);
  ctx.strokeStyle=color; ctx.lineWidth=ts(width||2);
  ctx.beginPath(); ctx.moveTo(tx(x1),ty(y1)); ctx.lineTo(tx(x2),ty(y2)); ctx.stroke();
  ctx.restore();
}

function drawNeonCircle(cx2,cy2,r,color,fill){
  ctx.save();
  ctx.shadowColor=color; ctx.shadowBlur=ts(12);
  ctx.strokeStyle=color; ctx.lineWidth=ts(2);
  if(fill) ctx.fillStyle=fill;
  ctx.beginPath(); ctx.arc(tx(cx2),ty(cy2),ts(r),0,Math.PI*2);
  if(fill) ctx.fill();
  ctx.stroke(); ctx.restore();
}

function drawNeonRect(x,y,w,h,color){
  ctx.save();
  ctx.shadowColor=color; ctx.shadowBlur=ts(8);
  ctx.strokeStyle=color; ctx.lineWidth=ts(2);
  ctx.strokeRect(tx(x),ty(y),ts(w),ts(h));
  ctx.restore();
}

/* ============================
   DRAW TABLE
   ============================ */
function drawTable(){
  /* Background */
  ctx.fillStyle='#0a0e14';
  ctx.fillRect(tx(20),ty(20),ts(DW-40),ts(DH-40));

  /* Circuit board pattern */
  ctx.save(); ctx.globalAlpha=0.06; ctx.strokeStyle='#0ff'; ctx.lineWidth=1;
  for(let i=0;i<20;i++){
    let y=60+i*42;
    ctx.beginPath(); ctx.moveTo(tx(30),ty(y)); ctx.lineTo(tx(DW-80),ty(y)); ctx.stroke();
  }
  for(let i=0;i<12;i++){
    let x=50+i*38;
    ctx.beginPath(); ctx.moveTo(tx(x),ty(30)); ctx.lineTo(tx(x),ty(DH-30)); ctx.stroke();
  }
  ctx.restore();

  /* Walls */
  for(let w of WALLS){
    drawNeonLine(w.x1,w.y1,w.x2,w.y2,'#1a3a5a',3);
  }

  /* Slingshots */
  for(let s of slingshots){
    drawNeonLine(s.x1,s.y1,s.x2,s.y2,s.color,3);
  }

  /* Bumpers */
  for(let b of bumpers){
    let r=b.baseR+(b.flash>0?b.flash*6:0);
    let c=b.flash>0.5?'#fff':b.color;
    drawNeonCircle(b.x,b.y,r,c);
    if(b.flash>0){
      ctx.save(); ctx.globalAlpha=b.flash*0.4;
      ctx.fillStyle='#fff'; ctx.beginPath();
      ctx.arc(tx(b.x),ty(b.y),ts(r),0,Math.PI*2); ctx.fill(); ctx.restore();
    }
  }

  /* Space-time bumper */
  drawSpaceTimeBumper();

  /* Drop targets */
  for(let t of dropTargets){
    if(t.alive) drawNeonRect(t.x,t.y,t.w,t.h,'#ff0');
    else{
      ctx.save(); ctx.globalAlpha=0.15;
      drawNeonRect(t.x,t.y,t.w,t.h,'#440');
      ctx.restore();
    }
  }

  /* Spinner */
  ctx.save();
  ctx.translate(tx(spinner.x),ty(spinner.y));
  ctx.rotate(spinnerAngle);
  ctx.shadowColor='#0ff'; ctx.shadowBlur=ts(6);
  ctx.strokeStyle='#0ff'; ctx.lineWidth=ts(2);
  ctx.beginPath(); ctx.moveTo(ts(-spinner.w/2),0); ctx.lineTo(ts(spinner.w/2),0); ctx.stroke();
  ctx.restore();

  /* Launcher area */
  drawNeonRect(LAUNCHER_CHANNEL_X+5,LAUNCHER_BOT_Y-160,LAUNCHER_OUTER_X-LAUNCHER_CHANNEL_X-10,170,'#334');
  if(launching){
    let h=launchPower*(LAUNCHER_BOT_Y-LAUNCHER_BOT_Y+150);
    h=launchPower*150;
    ctx.fillStyle='hsl('+(1-launchPower)*120+',100%,50%)';
    ctx.fillRect(tx(LAUNCHER_CHANNEL_X+8),ty(LAUNCHER_BOT_Y-h),ts(LAUNCHER_OUTER_X-LAUNCHER_CHANNEL_X-16),ts(h));
  }
}

/* ============================
   SPACE-TIME BUMPER DRAWING
   ============================ */
function drawSpaceTimeBumper(){
  let st=stBumper;
  let r=st.baseR+(st.flash>0?st.flash*10:0);

  /* Distortion ripples */
  if(st.distort>0){
    let d=st.distort;
    ctx.save();
    for(let i=1;i<=5;i++){
      let ripR=r+i*(1-d)*120;
      let a=d*(0.3-i*0.05); if(a<=0) continue;
      ctx.globalAlpha=a;
      ctx.strokeStyle=i%2===0?'#c060ff':'#8020ff';
      ctx.lineWidth=ts(2+d*3);
      ctx.beginPath();
      ctx.arc(tx(st.x),ty(st.y),ts(ripR),0,Math.PI*2);
      ctx.stroke();
    }
    /* Warped grid overlay */
    ctx.globalAlpha=d*0.25;
    ctx.strokeStyle='#a040ff'; ctx.lineWidth=1;
    let gridStep=30;
    for(let gy=-3;gy<=3;gy++){
      ctx.beginPath();
      for(let gx=st.x-150;gx<=st.x+150;gx+=4){
        let baseY=st.y+gy*gridStep;
        let dx2=gx-st.x, dy2=baseY-st.y;
        let dd=Math.sqrt(dx2*dx2+dy2*dy2);
        let warp=dd<120?d*25*Math.sin(dd*0.05-d*8)/(dd*0.04+1):0;
        if(gx===st.x-150) ctx.moveTo(tx(gx),ty(baseY+warp));
        else ctx.lineTo(tx(gx),ty(baseY+warp));
      }
      ctx.stroke();
    }
    for(let gx2=-3;gx2<=3;gx2++){
      ctx.beginPath();
      for(let gy2=st.y-150;gy2<=st.y+150;gy2+=4){
        let baseX=st.x+gx2*gridStep;
        let dx3=baseX-st.x, dy3=gy2-st.y;
        let dd2=Math.sqrt(dx3*dx3+dy3*dy3);
        let warp2=dd2<120?d*25*Math.sin(dd2*0.05-d*8)/(dd2*0.04+1):0;
        if(gy2===st.y-150) ctx.moveTo(tx(baseX+warp2),ty(gy2));
        else ctx.lineTo(tx(baseX+warp2),ty(gy2));
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  /* Core bumper: vortex spiral + pulsing orb */
  let pulse=0.7+0.3*Math.sin(Date.now()*0.005);
  ctx.save();
  ctx.shadowColor='#a040ff'; ctx.shadowBlur=ts(20+st.flash*15);
  let scx=tx(st.x), scy=ty(st.y);
  let spin=Date.now()*0.003;
  ctx.strokeStyle='rgba(160,64,255,'+(0.3+st.flash*0.5)+')';
  ctx.lineWidth=ts(1.5);
  for(let arm=0;arm<3;arm++){
    ctx.beginPath();
    for(let a=0;a<Math.PI*2;a+=0.1){
      let sr=ts(8+a*r*0.12);
      let sx2=scx+Math.cos(a+spin+arm*Math.PI*2/3)*sr;
      let sy2=scy+Math.sin(a+spin+arm*Math.PI*2/3)*sr;
      if(a===0) ctx.moveTo(sx2,sy2); else ctx.lineTo(sx2,sy2);
    }
    ctx.stroke();
  }
  /* Outer ring */
  ctx.strokeStyle=st.flash>0.5?'#fff':'hsl('+(280+st.hits*15)%360+',100%,70%)';
  ctx.lineWidth=ts(3);
  ctx.beginPath(); ctx.arc(scx,scy,ts(r),0,Math.PI*2); ctx.stroke();
  /* Inner glow gradient */
  let grd=ctx.createRadialGradient(scx,scy,0,scx,scy,ts(r));
  grd.addColorStop(0,'rgba(200,120,255,'+(0.4*pulse+st.flash*0.4)+')');
  grd.addColorStop(0.6,'rgba(120,40,200,'+(0.15*pulse)+')');
  grd.addColorStop(1,'rgba(60,0,120,0)');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.arc(scx,scy,ts(r),0,Math.PI*2); ctx.fill();
  /* Label */
  ctx.font='700 '+ts(8)+'px "Fira Code",monospace';
  ctx.textAlign='center';
  ctx.fillStyle='rgba(200,160,255,'+(0.6+st.flash*0.4)+')';
  ctx.fillText('S P A C E T I M E',scx,scy+ts(r+14));
  ctx.restore();
}

/* ============================
   DRAW FLIPPER
   ============================ */
function drawFlipper(f,color){
  let fl=getFlipperLine(f);
  ctx.save();
  ctx.shadowColor=color; ctx.shadowBlur=ts(10);
  ctx.strokeStyle=color; ctx.lineWidth=ts(8); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(tx(fl.x1),ty(fl.y1)); ctx.lineTo(tx(fl.x2),ty(fl.y2)); ctx.stroke();
  ctx.restore();
}

/* ============================
   DRAW BALL
   ============================ */
function drawBallObj(b,alpha,isMega){
  let r=isMega?(b._megaR||BALL_R):BALL_R;

  /* Trail */
  ctx.save();
  for(let i=0;i<b.trail.length;i++){
    let a=(i/b.trail.length)*0.4*alpha;
    let tr=r*(0.3+0.7*i/b.trail.length);
    ctx.globalAlpha=a; ctx.fillStyle='#0ff';
    ctx.beginPath(); ctx.arc(tx(b.trail[i].x),ty(b.trail[i].y),ts(tr),0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  /* RGB split during any glitch */
  if(glitchActive){
    ctx.save(); ctx.globalAlpha=0.3*alpha;
    ctx.fillStyle='#f00'; ctx.beginPath(); ctx.arc(tx(b.x-2),ty(b.y),ts(r),0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00f'; ctx.beginPath(); ctx.arc(tx(b.x+2),ty(b.y),ts(r),0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  /* Ball core */
  ctx.save(); ctx.globalAlpha=alpha;
  drawNeonCircle(b.x,b.y,r,'#0ff','rgba(0,255,255,0.3)');
  ctx.restore();
}

/* ============================
   GLITCH OVERLAY
   ============================ */
function drawGlitchOverlay(){
  if(!glitchActive) return;

  /* Scanlines */
  ctx.save(); ctx.globalAlpha=0.08; ctx.fillStyle='#000';
  for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);
  ctx.restore();

  /* Random pixel blocks */
  ctx.save(); ctx.globalAlpha=0.12;
  let colors=['#f00','#0f0','#00f','#ff0','#f0f','#0ff'];
  for(let i=0;i<8;i++){
    let bx=Math.random()*W, by=Math.random()*H;
    let bw=10+Math.random()*40, bh=3+Math.random()*15;
    ctx.fillStyle=colors[Math.floor(Math.random()*6)];
    ctx.fillRect(bx,by,bw,bh);
  }
  ctx.restore();

  /* Glitch name flashing */
  ctx.save();
  ctx.font='900 '+ts(28)+'px "Fira Code",monospace';
  ctx.textAlign='center';
  if(Math.sin(Date.now()*0.01)>0){
    ctx.shadowColor='#f0f'; ctx.shadowBlur=20;
    ctx.fillStyle='#f0f';
    ctx.fillText('\u26A1 '+glitchActive+' \u26A1',W/2,ty(DH/2-60));
  }
  ctx.restore();
}

/* ============================
   HUD
   ============================ */
function drawHUD(){
  /* Score - top center */
  ctx.save();
  ctx.font='900 '+ts(36)+'px "Fira Code",monospace';
  ctx.textAlign='center';
  ctx.shadowColor='#0ff'; ctx.shadowBlur=10;
  ctx.fillStyle='#0ff';
  ctx.fillText(score.toLocaleString(),W/2,ty(-5));
  ctx.restore();

  /* Balls remaining - top right */
  ctx.save();
  ctx.font='700 '+ts(16)+'px "Fira Code",monospace';
  ctx.textAlign='right';
  ctx.fillStyle='#f0f';
  let ballText='';
  for(let i=0;i<balls;i++) ballText+='\u25CF';
  ctx.fillText(ballText,tx(DW-10),ty(-5));
  ctx.restore();

  /* Glitch countdown */
  if(!glitchActive && ballInPlay){
    ctx.save();
    ctx.font='400 '+ts(12)+'px "Fira Code",monospace';
    ctx.textAlign='left';
    ctx.fillStyle='#446';
    ctx.fillText('GLITCH IN: '+Math.max(0,glitchTimer*60/60).toFixed(0)+'s',tx(35),ty(-5));
    ctx.restore();
  }

  /* Score popups */
  for(let p of scorePopups){
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.font='700 '+ts(16)+'px "Fira Code",monospace';
    ctx.textAlign='center'; ctx.fillStyle=p.color;
    ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.fillText(p.text,tx(p.x),ty(p.y));
    ctx.restore();
  }
}

/* ============================
   START SCREEN
   ============================ */
function drawStartScreen(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  let t=Date.now()*0.001;
  ctx.save();
  ctx.textAlign='center';

  let sz=Math.min(ts(52),W*0.09);
  ctx.font='900 '+sz+'px "Fira Code",monospace';
  let yPos=H*0.38;

  /* RGB split "GLITCH" */
  ctx.globalAlpha=0.5; ctx.fillStyle='#f00';
  ctx.fillText('GLITCH',W/2+Math.sin(t*3)*4,yPos-2);
  ctx.fillStyle='#00f';
  ctx.fillText('GLITCH',W/2-Math.sin(t*3)*4,yPos+2);
  ctx.globalAlpha=1; ctx.fillStyle='#fff';
  ctx.fillText('GLITCH',W/2,yPos);

  /* RGB split "PINBALL" */
  ctx.globalAlpha=0.5; ctx.fillStyle='#f00';
  ctx.fillText('PINBALL',W/2+Math.cos(t*2.7)*3,yPos+sz+8-2);
  ctx.fillStyle='#0ff';
  ctx.fillText('PINBALL',W/2-Math.cos(t*2.7)*3,yPos+sz+8+2);
  ctx.globalAlpha=1; ctx.fillStyle='#0ff';
  ctx.shadowColor='#0ff'; ctx.shadowBlur=20;
  ctx.fillText('PINBALL',W/2,yPos+sz+8);

  /* Prompt */
  ctx.globalAlpha=0.5+0.5*Math.sin(t*3);
  ctx.font='400 '+ts(16)+'px "Fira Code",monospace';
  ctx.fillStyle='#f0f'; ctx.shadowColor='#f0f'; ctx.shadowBlur=10;
  ctx.fillText('PRESS SPACE / TAP TO START',W/2,H*0.62);

  /* Scanlines */
  ctx.globalAlpha=0.04; ctx.fillStyle='#fff';
  for(let y=0;y<H;y+=2) ctx.fillRect(0,y,W,1);
  ctx.restore();
}

/* ============================
   GAME OVER SCREEN
   ============================ */
function drawGameOver(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  ctx.font='900 '+ts(40)+'px "Fira Code",monospace';
  ctx.shadowColor='#f00'; ctx.shadowBlur=20; ctx.fillStyle='#f00';
  ctx.fillText('GAME OVER',W/2,H*0.35);

  ctx.font='700 '+ts(28)+'px "Fira Code",monospace';
  ctx.shadowColor='#0ff'; ctx.shadowBlur=15; ctx.fillStyle='#0ff';
  ctx.fillText(score.toLocaleString(),W/2,H*0.48);

  ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()*0.003);
  ctx.font='400 '+ts(16)+'px "Fira Code",monospace';
  ctx.fillStyle='#f0f'; ctx.shadowColor='#f0f'; ctx.shadowBlur=10;
  ctx.fillText('INSERT COIN (SPACE / TAP)',W/2,H*0.6);
  ctx.restore();
}

/* ============================
   MAIN DRAW
   ============================ */
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  if(state==='start'){drawStartScreen(); return;}

  drawTable();
  drawFlipper(flipperL,'#f0f');
  drawFlipper(flipperR,'#0ff');

  let isMega=glitchActive==='MEGA BALL';
  drawBallObj(ball,1,isMega);
  for(let g of ghostBalls) drawBallObj(g,0.45,false);

  drawGlitchOverlay();
  drawHUD();

  if(state==='gameover') drawGameOver();
}

/* ============================
   GAME LOOP
   ============================ */
let lastTime=0;
function loop(time){
  let dt=lastTime?Math.min((time-lastTime)/16.67,3):1;
  lastTime=time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function startGame(){
  state='play'; score=0; balls=3;
  glitchTimer=12; glitchActive=null; ghostBalls=[];
  scorePopups=[];
  flipperL.angle=FLIPPER_REST; flipperL.prevAngle=FLIPPER_REST;
  flipperR.angle=-FLIPPER_REST; flipperR.prevAngle=-FLIPPER_REST;
  resetDropTargets();
  startNewBall();
}

/* ============================
   INPUT HANDLERS
   ============================ */
window.addEventListener('keydown',function(e){
  keys[e.code]=true;
  if(e.code==='Space'){
    e.preventDefault();
    if(state==='start'||state==='gameover') startGame();
  }
});
window.addEventListener('keyup',function(e){keys[e.code]=false;});

canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  for(let i=0;i<e.changedTouches.length;i++){
    let t=e.changedTouches[i];
    let x=t.clientX/W;
    if(state==='start'||state==='gameover'){startGame(); return;}
    if(x<0.35) touchL=true;
    else if(x>0.75) touchR=true;
    if(x>0.65) touchLaunch=true;
  }
},{passive:false});

canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  for(let i=0;i<e.changedTouches.length;i++){
    let t=e.changedTouches[i];
    let x=t.clientX/W;
    if(x<0.35) touchL=false;
    else if(x>0.75) touchR=false;
    touchLaunch=false;
  }
},{passive:false});

canvas.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});

canvas.addEventListener('mousedown',function(e){
  if(state==='start'||state==='gameover'){startGame(); return;}
  let x=e.clientX/W;
  if(x<0.35) touchL=true;
  else if(x>0.65){touchR=true; touchLaunch=true;}
});
canvas.addEventListener('mouseup',function(){touchL=false; touchR=false; touchLaunch=false;});

requestAnimationFrame(loop);
})();
</script>
