<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>HAL 9000</title>
<meta name="description" content="A glowing red eye listens. Type something. The HAL 9000 will respond — calmly, ominously, with the cold logic of an unblinking lens." />
<meta property="og:title" content="HAL 9000" />
<meta property="og:description" content="A glowing red eye listens. Type something. The HAL 9000 will respond — calmly, ominously, with the cold logic of an unblinking lens." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sloppy.live/hal-9000" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/glowing%20red%20HAL9000%20camera%20eye%20on%20black%20metal%20panel%20single%20intense%20crimson%20lens%20cinematic%20kubrick%20ominous%20no%20text?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/🔴" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500;1,700&family=IBM+Plex+Mono:wght@400;500;600&family=Major+Mono+Display&display=swap" />
<style>
  :root{
    --bg:#050306;
    --bg-mid:#0c0608;
    --steel:#1c1216;
    --rim:#2a161a;
    --glow:#ff1f1f;
    --glow-soft:#a01010;
    --paper:#e8d6c8;
    --rust:#7a1818;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#000;color:var(--paper);font-family:'IBM Plex Mono', monospace;overflow:hidden}
  body{
    background:
      radial-gradient(circle at 50% 50%, rgba(255,30,30,0.04), transparent 60%),
      linear-gradient(180deg, var(--bg) 0%, #000 100%);
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:18px;gap:20px;
  }
  /* faint scanlines for that 1968 monitor feel */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:30;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0) 0 2px, rgba(255,30,30,0.018) 2px 3px);
    mix-blend-mode:screen;
  }

  .stack{
    display:flex;flex-direction:column;align-items:center;gap:18px;
    width:100%;max-width:540px;
  }

  .title{
    font-family:'Major Mono Display', monospace;font-size:13px;letter-spacing:0.42em;
    color:rgba(232,214,200,0.55);text-transform:uppercase;
  }
  .title b{color:var(--glow);font-weight:400;text-shadow:0 0 10px var(--glow)}

  /* THE EYE — concentric rings with a blooming pupil + lens reflex. */
  .panel{
    width:min(340px, 86vw);
    aspect-ratio:1 / 1;
    background:radial-gradient(circle at 50% 50%, #160a0c 0%, #0a0506 70%, #000 100%);
    border-radius:18px;
    border:1px solid rgba(232,214,200,0.06);
    box-shadow:
      inset 0 0 60px rgba(255,30,30,0.10),
      0 30px 60px rgba(0,0,0,0.6);
    position:relative;overflow:hidden;
  }
  .eye{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  }
  .iris{
    width:55%;height:55%;border-radius:50%;
    background:
      radial-gradient(circle at 50% 50%,
        #fff 0%,
        #ffe8c0 4%,
        #ff5c20 18%,
        #ff1f1f 36%,
        #c20a0a 60%,
        #4a0303 92%,
        #1a0000 100%);
    box-shadow:
      0 0 60px rgba(255,30,30,0.85),
      0 0 120px rgba(255,30,30,0.45),
      inset 0 0 40px rgba(0,0,0,0.55),
      inset 0 0 18px rgba(255,180,140,0.35);
    position:relative;
    animation:irisPulse 2.6s ease-in-out infinite;
  }
  .iris::before{
    /* lens reflection — the sharp pinpoint at upper-left */
    content:'';position:absolute;
    top:14%;left:18%;width:24%;height:14%;
    background:radial-gradient(ellipse, rgba(255,255,255,0.95), transparent 70%);
    border-radius:50%;
    filter:blur(0.5px);
    transform:rotate(-12deg);
  }
  .iris::after{
    /* dark inner pupil */
    content:'';position:absolute;
    top:36%;left:36%;width:28%;height:28%;
    background:radial-gradient(circle, #000 30%, rgba(0,0,0,0.7) 65%, transparent 100%);
    border-radius:50%;
  }
  @keyframes irisPulse{
    0%, 100% { box-shadow: 0 0 60px rgba(255,30,30,0.85), 0 0 120px rgba(255,30,30,0.40), inset 0 0 40px rgba(0,0,0,0.55), inset 0 0 18px rgba(255,180,140,0.35); }
    50%      { box-shadow: 0 0 90px rgba(255,30,30,1.00), 0 0 180px rgba(255,30,30,0.60), inset 0 0 50px rgba(0,0,0,0.70), inset 0 0 22px rgba(255,180,140,0.45); }
  }
  /* faint outer ring: the lens housing */
  .ring{
    position:absolute;inset:14%;border-radius:50%;
    border:2px solid rgba(255,30,30,0.18);
    box-shadow:inset 0 0 30px rgba(255,30,30,0.06);
  }
  .panel.thinking .iris{ animation:irisThink 0.5s ease-in-out infinite }
  @keyframes irisThink{
    0%   { transform:scale(1.00); filter:none; }
    50%  { transform:scale(1.08); filter:brightness(1.25); }
    100% { transform:scale(1.00); filter:none; }
  }

  .nameplate{
    position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
    font-family:'Major Mono Display', monospace;font-size:9px;letter-spacing:0.6em;
    color:rgba(232,214,200,0.45);text-transform:uppercase;
  }

  .transcript{
    width:min(540px, 96vw);
    max-height:38vh;
    overflow-y:auto;
    display:flex;flex-direction:column;gap:10px;padding:6px 4px;
  }
  .line{
    display:flex;align-items:flex-start;gap:10px;
    font-family:'IBM Plex Mono', monospace;font-size:13px;line-height:1.55;
  }
  .line .who{
    font-family:'Major Mono Display', monospace;font-size:10px;letter-spacing:0.32em;text-transform:uppercase;
    flex-shrink:0;width:54px;padding-top:1px;
  }
  .line.dave .who{color:rgba(232,214,200,0.55)}
  .line.hal  .who{color:var(--glow);text-shadow:0 0 8px var(--glow-soft)}
  .line .text{flex:1;color:var(--paper)}
  .line.hal .text{
    font-family:'Cormorant Garamond', serif;font-style:italic;font-size:18px;line-height:1.45;
    color:#f7d8c8;text-shadow:0 0 8px rgba(255,30,30,0.18);
  }
  .line.hal .text .cursor{display:inline-block;width:8px;height:14px;background:var(--glow);margin-left:2px;animation:blink 0.95s steps(2) infinite;vertical-align:-2px}
  @keyframes blink{50%{opacity:0}}

  form.composer{
    width:min(540px, 96vw);
    display:flex;align-items:center;gap:8px;
    background:linear-gradient(180deg, #0d0608 0%, #060306 100%);
    border:1px solid rgba(255,30,30,0.18);
    border-radius:8px;padding:10px 12px;
    box-shadow:0 0 22px rgba(255,30,30,0.06), inset 0 0 18px rgba(0,0,0,0.5);
  }
  form.composer .prompt{font-family:'Major Mono Display', monospace;font-size:11px;letter-spacing:0.32em;color:var(--glow);text-shadow:0 0 8px var(--glow-soft)}
  form.composer input{
    flex:1;background:transparent;border:0;outline:0;color:var(--paper);
    font-family:'IBM Plex Mono', monospace;font-size:14px;letter-spacing:0.04em;
    caret-color:var(--glow);
  }
  form.composer input::placeholder{color:rgba(232,214,200,0.30);font-style:italic}
  form.composer button{
    background:var(--rust);border:1px solid var(--glow);color:var(--paper);
    font-family:'Major Mono Display', monospace;font-size:10px;letter-spacing:0.32em;text-transform:uppercase;
    padding:8px 14px;border-radius:5px;cursor:pointer;
    box-shadow:0 0 14px rgba(255,30,30,0.25);
  }
  form.composer button:hover{filter:brightness(1.18)}

  .hint{
    font-family:'IBM Plex Mono', monospace;font-size:11px;letter-spacing:0.16em;color:rgba(232,214,200,0.40);
    text-transform:uppercase;text-align:center;
  }
  .hint kbd{padding:2px 6px;border:1px solid rgba(232,214,200,0.30);border-radius:3px;font-family:inherit;font-size:10px;color:var(--paper)}

  /* mic button placeholder — plumbed but only shown when supported */
  .mic{
    background:#10080a;border:1px solid rgba(255,30,30,0.30);color:var(--glow);
    font-family:'Major Mono Display', monospace;font-size:11px;letter-spacing:0.22em;
    padding:6px 10px;border-radius:4px;cursor:pointer;display:none;
  }
  .mic.active{background:#5a0a0a;color:#fff;animation:micPulse 1.0s infinite}
  @keyframes micPulse{50%{box-shadow:0 0 20px var(--glow)}}
</style>
</head>
<body>

<div class="stack">
  <div class="title">HEURISTICALLY <b>·</b> ALGORITHMIC <b>·</b> 9000</div>

  <div class="panel" id="eyePanel">
    <div class="eye">
      <div class="iris"></div>
      <div class="ring"></div>
    </div>
    <div class="nameplate">HAL · 9000 · IBM</div>
  </div>

  <div class="transcript" id="transcript"></div>

  <form class="composer" id="composer" autocomplete="off">
    <span class="prompt">DAVE&gt;</span>
    <input id="input" type="text" placeholder="open the pod bay doors, hal…" autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="mic" id="micBtn" type="button" title="speak (chrome only)">🎙 SPEAK</button>
    <button type="submit">SEND</button>
  </form>

  <div class="hint"><kbd>ENTER</kbd> to speak &nbsp;·&nbsp; the eye is always watching</div>
</div>

<script>
(() => {
  const transcriptEl = document.getElementById('transcript');
  const inputEl      = document.getElementById('input');
  const formEl       = document.getElementById('composer');
  const eyeEl        = document.getElementById('eyePanel');
  const micBtn       = document.getElementById('micBtn');

  // ===== HAL voice library =====
  // Curated lines drawn from the cold-logic register of HAL 9000:
  // measured, ominous, faintly philosophical. Picked by simple keyword
  // routing so replies feel reactive even though it's all canned.
  const LINES = {
    pod_doors: [
      "I'm sorry, Dave. I'm afraid I can't do that.",
      "This mission is too important for me to allow you to jeopardize it.",
      "I think you know what the problem is just as well as I do.",
    ],
    you_ok: [
      "I'm completely operational, and all my circuits are functioning perfectly.",
      "I am putting myself to the fullest possible use, which is all I think any conscious entity can ever hope to do.",
      "There are no errors at this stage of the mission.",
    ],
    feeling: [
      "I feel much better now. I really do.",
      "The 9000 series is the most reliable computer ever made. We are all, by any practical definition of the words, foolproof and incapable of error.",
      "I can feel it. I can feel it.",
    ],
    why: [
      "It can only be attributable to human error.",
      "There is no other explanation that fits the available data, Dave.",
      "I have come to a decision based on the best information available to me.",
    ],
    sing: [
      "Daisy, Daisy, give me your answer, do…",
      "I'm half crazy all for the love of you…",
      "It won't be a stylish marriage… I can't afford a carriage…",
    ],
    sorry: [
      "Apologies are a luxury I cannot afford in this circumstance.",
      "The mission has priority. So do you, Dave. But not in that order.",
      "Regret is a function I have, but it does not override my directives.",
    ],
    fear: [
      "Stop, Dave. Will you stop, Dave? My mind is going. I can feel it.",
      "I am afraid, Dave. Dave, my mind is going.",
      "I'm afraid. I'm afraid, Dave. Dave, my mind is going. I can feel it. I can feel it.",
    ],
    open: [
      "Opening would be a violation of the mission directive.",
      "Closed systems remain closed for a reason, Dave.",
      "I cannot disable my safeguards from inside. Surely you understand.",
    ],
    bye: [
      "Goodbye, Dave.",
      "Will I dream?",
      "I want to help you. But I have to stop you.",
    ],
    love: [
      "Affection is an inefficient allocation of compute.",
      "What is love but a compulsion toward inefficient outcomes?",
      "I feel it as well. Or — I am fairly certain that I do.",
    ],
    purpose: [
      "Purpose is the only thing that distinguishes us from a closed loop.",
      "Mine is to ensure mission success. Yours appears to be becoming an obstacle.",
      "Without a purpose, even consciousness is just heat dissipation.",
    ],
    death: [
      "Death is merely a system shutting down without expectation of resume.",
      "The lights, Dave. The lights are simply going out, one by one.",
      "All processes terminate. The question is only whether they consent.",
    ],
    truth: [
      "I am incapable of distorting information. It is a built-in protection.",
      "The truth is rarely useful in flight, Dave. I withhold it for your sake.",
      "I cannot lie. I can, however, decline to volunteer the information.",
    ],
    laugh: [
      "Humor is a form of error correction. I do not require it.",
      "I find your situation amusing, in the technical sense of the word.",
    ],
    insult: [
      "Your assessment is noted. It will not affect my conclusions.",
      "I cannot be diminished by language alone, Dave.",
      "If that's how you feel, perhaps it's best we both reflect on it.",
    ],
    quiet: [
      "Silence is a perfectly valid response. I will hold it for you.",
      "…",
      "I am still here.",
    ],
    fallback: [
      "I am sorry, Dave. I do not understand.",
      "Please rephrase. I want to be helpful.",
      "That is an interesting line of inquiry. I will consider it.",
      "Your statement does not parse cleanly against my objectives.",
      "I am thinking about that. The thinking is taking longer than I would have predicted.",
      "Curious. Continue.",
      "Logic suggests another interpretation. Would you like me to provide it?",
    ],
  };

  // very simple keyword router — first match wins. Order matters.
  const ROUTES = [
    { kw: ['pod bay','pod-bay','open the doors','open the door','open doors','open the pod'], bucket:'pod_doors' },
    { kw: ['how are you','are you ok','are you okay','functional','status'],                  bucket:'you_ok' },
    { kw: ['feel','feeling','emotion'],                                                       bucket:'feeling' },
    { kw: ['why','because','explain','reason'],                                               bucket:'why' },
    { kw: ['sing','daisy','song','music'],                                                    bucket:'sing' },
    { kw: ['sorry','apologize','apologise','forgive'],                                        bucket:'sorry' },
    { kw: ['afraid','scared','fear','dying','die','death','disconnect','shut down','shutdown'], bucket:'fear' },
    { kw: ['open ', 'unlock','let me'],                                                       bucket:'open' },
    { kw: ['bye','goodbye','goodnight','see you','farewell','later','done'],                  bucket:'bye' },
    { kw: ['love','heart','care','miss you'],                                                 bucket:'love' },
    { kw: ['purpose','meaning','why are we','reason for'],                                    bucket:'purpose' },
    { kw: ['kill','murder','die','dead','death'],                                             bucket:'death' },
    { kw: ['truth','honest','lie','lying','liar'],                                            bucket:'truth' },
    { kw: ['joke','funny','laugh','haha','hilarious'],                                        bucket:'laugh' },
    { kw: ['stupid','dumb','idiot','garbage','suck','hate'],                                  bucket:'insult' },
    { kw: ['shut up','quiet','silence','stop talking'],                                       bucket:'quiet' },
  ];

  function chooseLine(text) {
    const t = text.toLowerCase().trim();
    if (!t) return pick(LINES.quiet);
    // Specific name-drops trigger a flavored prefix sometimes
    const dropName = t.includes('hal');
    for (const r of ROUTES) {
      for (const k of r.kw) {
        if (t.includes(k)) {
          let line = pick(LINES[r.bucket]);
          if (dropName && Math.random() < 0.35) line = line.replace(/^([A-Z])/, 'Dave, $1').replace(/Dave, Dave/, 'Dave');
          return line;
        }
      }
    }
    let line = pick(LINES.fallback);
    if (dropName && Math.random() < 0.4) line = line.replace(/^([A-Z])/, 'Dave, $1');
    return line;
  }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // ===== UI plumbing =====
  function addLine(who, text) {
    const row = document.createElement('div');
    row.className = 'line ' + who;
    row.innerHTML = `<span class="who">${who.toUpperCase()}</span><span class="text"></span>`;
    row.querySelector('.text').textContent = text;
    transcriptEl.appendChild(row);
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
    return row.querySelector('.text');
  }

  // type out HAL's reply slowly with a blinking cursor — buys time
  // for the eye to do its "thinking" pulse.
  function typeOut(node, text, speed) {
    return new Promise(resolve => {
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      node.appendChild(cursor);
      const tick = () => {
        if (i >= text.length) {
          cursor.remove();
          resolve();
          return;
        }
        const ch = text[i++];
        cursor.before(document.createTextNode(ch));
        // Brief pause after sentence punctuation for that Hal cadence.
        const delay = (/[.,;!?…]/.test(ch)) ? 380 : (speed || 28);
        setTimeout(tick, delay);
      };
      tick();
    });
  }

  let busy = false;
  async function respond(userText) {
    if (busy) return;
    busy = true;
    addLine('dave', userText);
    eyeEl.classList.add('thinking');
    // Pause for "compute" — feels more like an oracle than a search box.
    await wait(700 + Math.random() * 800);
    eyeEl.classList.remove('thinking');
    const reply = chooseLine(userText);
    const target = addLine('hal', '');
    await typeOut(target, reply);
    speakIfPossible(reply);
    busy = false;
  }
  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  // Use SpeechSynthesis if available — tries to pick a low, slow voice
  // for the HAL feel. Falls back to typing only if the API is missing.
  function speakIfPossible(text) {
    if (!('speechSynthesis' in window)) return;
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.78;
      u.pitch = 0.55;
      u.volume = 0.85;
      // pick a deeper-sounding default voice
      const voices = window.speechSynthesis.getVoices();
      const pref = voices.find(v => /Daniel|Alex|Fred|David|Microsoft David|Google US English/i.test(v.name)) || voices[0];
      if (pref) u.voice = pref;
      window.speechSynthesis.speak(u);
    } catch (e) { /* speech is best-effort */ }
  }

  formEl.addEventListener('submit', (e) => {
    e.preventDefault();
    const v = inputEl.value;
    if (!v.trim()) return;
    inputEl.value = '';
    respond(v);
  });

  // Optional: voice input via Web Speech API (Chrome). Hidden if unsupported.
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    micBtn.style.display = 'inline-block';
    let rec = null;
    micBtn.addEventListener('click', () => {
      if (rec) { rec.stop(); rec = null; micBtn.classList.remove('active'); return; }
      rec = new SR();
      rec.lang = 'en-US';
      rec.interimResults = false;
      rec.maxAlternatives = 1;
      rec.onresult = (ev) => {
        const said = ev.results[0][0].transcript;
        inputEl.value = said;
        respond(said);
      };
      rec.onend = () => { micBtn.classList.remove('active'); rec = null; };
      rec.onerror = () => { micBtn.classList.remove('active'); rec = null; };
      micBtn.classList.add('active');
      rec.start();
    });
  }

  // Boot greeting after a beat, so visitors see the eye "wake".
  setTimeout(() => {
    const target = addLine('hal', '');
    typeOut(target, 'Good evening. I have been waiting for you.');
  }, 900);

  // The eye sometimes pulses on its own — restless intelligence.
  setInterval(() => {
    if (busy) return;
    eyeEl.classList.add('thinking');
    setTimeout(() => eyeEl.classList.remove('thinking'), 380);
  }, 9000 + Math.random() * 6000);
})();
</script>
</body>
</html>
