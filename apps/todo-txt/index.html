<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Todo</title>
<link rel="icon" href="https://emojicdn.elk.sh/✓">
<meta property="og:title" content="Todo">
<meta property="og:description" content="A clean, minimal todo list that saves locally.">
<meta property="og:url" content="https://sloppy.live/todo-txt">
<meta property="og:image" content="https://emojicdn.elk.sh/✓?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Literata:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{background:#faf9f6}
body{
  min-height:100dvh;background:#faf9f6;
  font-family:'Literata',serif;color:#2a2a2a;
  display:flex;flex-direction:column;align-items:center;
  padding:0 16px 80px;
}

header{
  width:100%;max-width:480px;padding:40px 0 20px;
}
header h1{font-size:22px;font-weight:600;color:#1a1a1a;letter-spacing:-0.5px}
header p{font-size:11px;color:#aaa;margin-top:2px;font-family:'JetBrains Mono',monospace}

#input-row{
  width:100%;max-width:480px;
  display:flex;gap:8px;margin-bottom:24px;
}
#input-row input{
  flex:1;font-family:'Literata',serif;font-size:15px;
  border:none;border-bottom:1.5px solid #ddd;
  background:transparent;color:#2a2a2a;
  padding:8px 0;outline:none;
}
#input-row input::placeholder{color:#ccc}
#input-row input:focus{border-color:#888}
#input-row button{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  background:none;border:1.5px solid #ddd;
  color:#888;padding:6px 14px;border-radius:4px;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
#input-row button:hover{border-color:#888;color:#444}

#filters{
  width:100%;max-width:480px;
  display:flex;gap:4px;margin-bottom:16px;
}
.filter-btn{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  background:none;border:none;color:#aaa;
  padding:4px 10px;cursor:pointer;border-radius:3px;
  transition:all .12s;
}
.filter-btn:hover{color:#666}
.filter-btn.active{color:#2a2a2a;background:rgba(0,0,0,0.04)}

#list{
  width:100%;max-width:480px;
  list-style:none;
}

.todo-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 0;
  border-bottom:1px solid rgba(0,0,0,0.04);
  transition:opacity .3s;
}
.todo-item.done{opacity:0.35}
.todo-item.done .todo-text{text-decoration:line-through}

.todo-check{
  width:18px;height:18px;min-width:18px;
  border:1.5px solid #ccc;border-radius:50%;
  cursor:pointer;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
  background:none;
}
.todo-check:hover{border-color:#888}
.todo-check.checked{border-color:#2a2a2a;background:#2a2a2a}
.todo-check.checked::after{
  content:'✓';color:#faf9f6;font-size:11px;font-weight:600;
}

.todo-text{
  flex:1;font-size:15px;line-height:1.5;
  word-break:break-word;color:#2a2a2a;
}

.todo-delete{
  font-size:14px;color:#ccc;cursor:pointer;
  background:none;border:none;padding:2px 4px;
  opacity:0;transition:opacity .15s;
}
.todo-item:hover .todo-delete{opacity:1}

#count{
  width:100%;max-width:480px;
  margin-top:12px;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:#bbb;display:flex;justify-content:space-between;
}
#clear-done{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  background:none;border:none;color:#bbb;cursor:pointer;
}
#clear-done:hover{color:#888}

#empty{
  width:100%;max-width:480px;
  text-align:center;padding:40px 0;
  font-size:13px;color:#ccc;
}

a</style>
</head>
<body>

<header>
  <h1>Todo</h1>
  <p id="date-line"></p>
</header>

<div id="input-row">
  <input type="text" id="new-todo" placeholder="What needs to be done?" maxlength="200">
  <button id="add-btn">add</button>
</div>

<div id="filters">
  <button class="filter-btn active" data-f="all">all</button>
  <button class="filter-btn" data-f="active">active</button>
  <button class="filter-btn" data-f="done">done</button>
</div>

<ul id="list"></ul>
<div id="empty" style="display:none">Nothing here yet.</div>

<div id="count">
  <span id="count-text"></span>
  <button id="clear-done">clear done</button>
</div>
<script>
(function(){
'use strict';

var todos=[];
var filter='all';
var KEY='todo_txt_items';

function load(){
  try{var d=localStorage.getItem(KEY);if(d)todos=JSON.parse(d)}catch(e){todos=[]}
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(todos))}catch(e){}}

function addTodo(text){
  text=text.trim();
  if(!text)return;
  todos.unshift({id:Date.now(),text:text,done:false});
  save();render();
}

function toggle(id){
  for(var i=0;i<todos.length;i++){
    if(todos[i].id===id)todos[i].done=!todos[i].done;
  }
  save();render();
}

function remove(id){
  todos=todos.filter(function(t){return t.id!==id});
  save();render();
}

function clearDone(){
  todos=todos.filter(function(t){return!t.done});
  save();render();
}

function getFiltered(){
  if(filter==='active')return todos.filter(function(t){return!t.done});
  if(filter==='done')return todos.filter(function(t){return t.done});
  return todos;
}

function render(){
  var list=document.getElementById('list');
  var items=getFiltered();
  var empty=document.getElementById('empty');

  list.innerHTML='';

  if(items.length===0){
    empty.style.display='block';
    empty.textContent=filter==='all'?'Nothing here yet.':filter==='active'?'All done!':'No completed items.';
  }else{
    empty.style.display='none';
  }

  for(var i=0;i<items.length;i++){
    var t=items[i];
    var li=document.createElement('li');
    li.className='todo-item'+(t.done?' done':'');

    var check=document.createElement('button');
    check.className='todo-check'+(t.done?' checked':'');
    check.dataset.id=t.id;
    check.addEventListener('click',function(){toggle(parseInt(this.dataset.id))});

    var text=document.createElement('span');
    text.className='todo-text';
    text.textContent=t.text;

    var del=document.createElement('button');
    del.className='todo-delete';
    del.textContent='×';
    del.dataset.id=t.id;
    del.addEventListener('click',function(){remove(parseInt(this.dataset.id))});

    li.appendChild(check);
    li.appendChild(text);
    li.appendChild(del);
    list.appendChild(li);
  }

  var active=todos.filter(function(t){return!t.done}).length;
  var done=todos.length-active;
  document.getElementById('count-text').textContent=active+' remaining'+(done?' · '+done+' done':'');
  document.getElementById('clear-done').style.display=done>0?'inline':'none';
}

// Input
var input=document.getElementById('new-todo');
input.addEventListener('keydown',function(e){
  if(e.key==='Enter'){addTodo(input.value);input.value=''}
});
document.getElementById('add-btn').addEventListener('click',function(){
  addTodo(input.value);input.value='';input.focus();
});

// Filters
var fBtns=document.querySelectorAll('.filter-btn');
for(var i=0;i<fBtns.length;i++){
  fBtns[i].addEventListener('click',function(){
    for(var j=0;j<fBtns.length;j++)fBtns[j].classList.remove('active');
    this.classList.add('active');
    filter=this.dataset.f;
    render();
  });
}

// Clear done
document.getElementById('clear-done').addEventListener('click',clearDone);

// Date
var d=new Date();
var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('date-line').textContent=days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate();

load();
render();
input.focus();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
