<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Aggressive Garage Sale Sim</title>
<meta name="description" content="Haggle with a stubborn digital grandmother over cursed yard-sale items. She remembers what you offered. She is not in a hurry." />
<meta property="og:title" content="Aggressive Garage Sale Sim" />
<meta property="og:description" content="Haggle with a stubborn digital grandmother over cursed yard-sale items. She remembers what you offered. She is not in a hurry." />
<meta property="og:url" content="https://sloppy.live/aggressive-garage-sale/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/cluttered%20garage%20sale%20with%20cursed%20items%20ceramic%20cats%20creepy%20doll%20old%20lamp%20hand-written%20price%20tags%20stern%20grandma%20in%20chair%20with%20teacup%20warm%20cream%20brown%20coral%20mustard%20mid-century%20palette?width=1200&height=630&model=flux&nologo=true&seed=11919" />
<meta property="og:type" content="website" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%91%B5" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Fraunces:ital,wght@1,300;1,400&family=Bungee&family=Fredoka:wght@400;700&family=Special+Elite&display=swap" />
<style>
:root{
  --paper: #f5edd6;
  --paper-dark: #e8dab8;
  --ink: #2a1810;
  --dim: #7a5a45;
  --coral: #d65a3a;
  --mustard: #d99a3a;
  --teal: #2b8a8a;
  --sage: #738a4e;
  --plum: #6a2b6b;
  --price-red: #c4140d;
}
*{ box-sizing: border-box; }
html, body{ overscroll-behavior: none; }
html{ font-size: 100%; }
body{
  margin: 0;
  min-height: 100vh;
  font-family: 'Fredoka', system-ui, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 20% 8%, rgba(214, 90, 58, 0.16), transparent 40%),
    radial-gradient(circle at 80% 12%, rgba(217, 154, 58, 0.18), transparent 38%),
    radial-gradient(circle at 78% 86%, rgba(43, 138, 138, 0.14), transparent 42%),
    linear-gradient(180deg, var(--paper) 0%, var(--paper-dark) 100%);
  background-attachment: fixed;
  padding: 1.5rem 1rem 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
}
main{
  max-width: 60rem;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* ── HEADER ── */
header{ text-align: center; }
header h1{
  margin: 0;
  font-family: 'Bungee', cursive;
  font-size: clamp(1.8rem, 6vw, 3rem);
  letter-spacing: 0.02em;
  line-height: 0.95;
  color: var(--ink);
  text-shadow: 3px 3px 0 var(--coral), 6px 6px 0 rgba(0,0,0,0.10);
}
header h1 .em{ color: var(--coral); }
header .tag{
  margin-top: 0.4rem;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(0.95rem, 2.4vw, 1.2rem);
  color: var(--dim);
}
header .tag b{ color: var(--coral); font-style: normal; font-family: 'Bungee', cursive; font-size: 0.85em; }

/* ── HUD ── */
.hud{
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
}
.hud .chip{
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 999px;
  padding: 0.32rem 0.85rem;
  font-family: 'Special Elite', 'JetBrains Mono', monospace;
  font-size: 0.86rem;
  color: var(--ink);
  letter-spacing: 0.04em;
  box-shadow: 2px 2px 0 var(--mustard);
}
.hud .chip.wallet{ box-shadow: 2px 2px 0 var(--sage); }
.hud .chip.wallet b{ color: var(--sage); font-family: 'Bungee', cursive; font-size: 0.92rem; }
.hud .chip.haul{ box-shadow: 2px 2px 0 var(--plum); }
.hud .chip.haul b{ color: var(--plum); font-family: 'Bungee', cursive; font-size: 0.92rem; }
.hud .chip.snaps{ box-shadow: 2px 2px 0 var(--coral); }
.hud .chip.snaps b{ color: var(--coral); font-family: 'Bungee', cursive; font-size: 0.92rem; }

/* ── BROWSE GRID ── */
.browse{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(13rem, 1fr));
  gap: 0.7rem;
}
.item-card{
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 8px;
  padding: 0.7rem 0.8rem 0.85rem;
  cursor: pointer;
  position: relative;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.20);
  transition: transform 0.1s, box-shadow 0.1s, opacity 0.3s;
  display: flex;
  flex-direction: column;
  gap: 0.32rem;
  min-height: 9rem;
  overflow: hidden;
}
.item-card::before{
  /* old-paper grain */
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(7deg, rgba(122, 90, 69, 0.05) 0 1px, transparent 1px 9px);
  pointer-events: none;
}
.item-card:hover{ transform: translate(-2px, -2px); box-shadow: 5px 5px 0 rgba(0,0,0,0.20); }
.item-card:active{ transform: translate(1px, 1px); box-shadow: 2px 2px 0 rgba(0,0,0,0.20); }
.item-card.sold{ opacity: 0.45; cursor: not-allowed; }
.item-card.sold:hover{ transform: none; box-shadow: 3px 3px 0 rgba(0,0,0,0.20); }
.item-card.sold::after{
  content: 'SOLD';
  position: absolute;
  top: 30%; left: 50%;
  transform: translate(-50%, -50%) rotate(-12deg);
  font-family: 'Bungee', cursive;
  font-size: 2rem;
  color: var(--price-red);
  text-shadow: 0 0 0 var(--paper);
  border: 4px solid var(--price-red);
  padding: 0.18rem 0.7rem;
  border-radius: 4px;
  letter-spacing: 0.06em;
  pointer-events: none;
}
.item-card.kicked{ opacity: 0.3; }
.item-card.kicked::after{
  content: 'REVOKED';
  position: absolute;
  top: 30%; left: 50%;
  transform: translate(-50%, -50%) rotate(-8deg);
  font-family: 'Bungee', cursive;
  font-size: 1.4rem;
  color: var(--dim);
  border: 3px solid var(--dim);
  padding: 0.12rem 0.4rem;
  border-radius: 4px;
  letter-spacing: 0.04em;
}
.item-card .ico{
  font-size: 2.6rem;
  line-height: 1;
  margin-top: 0.2rem;
  text-align: center;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.30));
}
.item-card .nm{
  font-family: 'Bungee', cursive;
  font-size: 0.86rem;
  letter-spacing: 0.02em;
  color: var(--ink);
  line-height: 1.15;
}
.item-card .quirk{
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 1.02rem;
  color: var(--dim);
  line-height: 1.2;
  flex: 1;
}
.item-card .price-tag{
  position: absolute;
  top: -0.4rem;
  right: 0.6rem;
  transform: rotate(8deg);
  background: var(--paper);
  border: 1.5px solid var(--price-red);
  padding: 0.16rem 0.5rem;
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--price-red);
  border-radius: 4px;
  box-shadow: 1px 1px 0 var(--ink);
  z-index: 2;
}

/* ── NEGOTIATION PANE ── */
.negotiate{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  background: var(--paper);
  border: 3px solid var(--ink);
  border-radius: 14px;
  padding: 1rem;
  box-shadow: 5px 5px 0 var(--coral);
}
.negotiate .grandma-pane{ position: relative; min-height: 18rem; }
.grandma{
  position: relative;
  width: 100%;
  height: 18rem;
  background:
    linear-gradient(180deg, #f5d99c 0%, #d49058 60%, #8a5028 100%);
  border-radius: 10px;
  border: 2px solid var(--ink);
  overflow: hidden;
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.30);
}
/* sun + lawn */
.grandma::before{
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 22%;
  background: linear-gradient(180deg, #738a4e, #4a5b30);
  border-top: 2px solid var(--ink);
}
/* grandma body */
.grandma .body{
  position: absolute;
  bottom: 14%;
  left: 50%;
  transform: translateX(-50%);
  width: 9rem; height: 10rem;
}
.grandma .head{
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 4.4rem; height: 4.4rem;
  background: #f5d3b3;
  border: 2.5px solid var(--ink);
  border-radius: 50%;
  box-shadow: inset -4px -8px 0 rgba(0,0,0,0.10);
}
.grandma .hair{
  position: absolute;
  top: -0.25rem; left: 50%;
  transform: translateX(-50%);
  width: 5rem; height: 2.4rem;
  background: #c2c2c2;
  border: 2.5px solid var(--ink);
  border-radius: 50% 50% 35% 35%;
  z-index: 2;
}
.grandma .glasses{
  position: absolute;
  top: 1.7rem; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 0.35rem;
  z-index: 3;
}
.grandma .glasses .lens{
  width: 1.4rem; height: 1.2rem;
  border: 2.5px solid var(--ink);
  border-radius: 50%;
  background: rgba(255, 245, 220, 0.85);
}
.grandma .mouth{
  position: absolute;
  top: 3.2rem; left: 50%;
  transform: translateX(-50%);
  width: 1.4rem; height: 0.32rem;
  background: var(--ink);
  border-radius: 50%;
  z-index: 2;
  transition: all 0.2s;
}
.grandma.talking .mouth{ height: 0.7rem; border-radius: 50%; background: #4a1a08; }
.grandma.offended .mouth{ width: 1rem; height: 0.18rem; }
.grandma .torso{
  position: absolute;
  top: 4rem; left: 50%;
  transform: translateX(-50%);
  width: 7.5rem; height: 6.4rem;
  background: var(--coral);
  border: 2.5px solid var(--ink);
  border-radius: 50% 50% 20% 20% / 30% 30% 18% 18%;
}
.grandma .torso::after{
  /* sweater pattern */
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 25% 30%, rgba(255,255,255,0.30) 6%, transparent 7%),
    radial-gradient(circle at 70% 50%, rgba(255,255,255,0.30) 6%, transparent 7%),
    radial-gradient(circle at 45% 70%, rgba(255,255,255,0.30) 6%, transparent 7%);
  border-radius: inherit;
}
.grandma .arms{
  position: absolute;
  top: 4.6rem; left: 50%;
  transform: translateX(-50%);
  width: 9rem; height: 3rem;
  pointer-events: none;
}
.grandma .arm{
  position: absolute;
  top: 0;
  width: 1.3rem; height: 3rem;
  background: var(--coral);
  border: 2.5px solid var(--ink);
  border-radius: 50%/30%;
}
.grandma .arm.l{ left: -0.5rem; transform-origin: 50% 5%; transform: rotate(15deg); }
.grandma .arm.r{ right: -0.5rem; transform-origin: 50% 5%; transform: rotate(-15deg); }
.grandma.offended .arm.l{ transform: rotate(-25deg); }
.grandma.offended .arm.r{ transform: rotate(25deg); }
/* teacup */
.grandma .teacup{
  position: absolute;
  bottom: 24%;
  right: 6%;
  width: 2rem; height: 1.6rem;
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 0 0 50% 50%;
  z-index: 1;
}
.grandma .teacup::after{
  content: '';
  position: absolute;
  top: 30%; right: -0.5rem;
  width: 0.7rem; height: 0.9rem;
  border: 2px solid var(--ink);
  border-left: none;
  border-radius: 0 50% 50% 0;
}
.grandma .teacup::before{
  content: '☕';
  position: absolute;
  top: -0.9rem; left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  opacity: 0.5;
}
/* speech bubble */
.bubble{
  position: absolute;
  top: 0.8rem; left: 0.8rem; right: 0.8rem;
  background: var(--paper);
  border: 2.5px solid var(--ink);
  border-radius: 14px;
  padding: 0.55rem 0.8rem;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 1rem;
  line-height: 1.36;
  color: var(--ink);
  box-shadow: 3px 3px 0 var(--ink);
  z-index: 4;
  min-height: 4.2rem;
}
.bubble::after{
  content: '';
  position: absolute;
  bottom: -10px;
  left: 30%;
  width: 0; height: 0;
  border: 8px solid transparent;
  border-top-color: var(--paper);
  border-bottom: 0;
}
.bubble::before{
  content: '';
  position: absolute;
  bottom: -14px;
  left: calc(30% - 1px);
  width: 0; height: 0;
  border: 9px solid transparent;
  border-top-color: var(--ink);
  border-bottom: 0;
}
.bubble b{ color: var(--coral); font-family: 'Bungee', cursive; font-style: normal; font-size: 0.92em; }

/* item pane on the right */
.item-pane{
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}
.item-pane .focused{
  background: var(--paper);
  border: 2px dashed var(--ink);
  border-radius: 8px;
  padding: 0.7rem 0.9rem;
  position: relative;
}
.item-pane .focused .row{ display: flex; align-items: center; gap: 0.8rem; }
.item-pane .focused .ico{ font-size: 2.8rem; line-height: 1; }
.item-pane .focused .meta{ flex: 1; }
.item-pane .focused .nm{
  font-family: 'Bungee', cursive;
  font-size: 0.94rem;
  color: var(--ink);
  letter-spacing: 0.02em;
  line-height: 1.1;
}
.item-pane .focused .quirk{
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--dim);
  margin-top: 0.2rem;
}
.item-pane .focused .ask{
  margin-top: 0.4rem;
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 1.7rem;
  color: var(--price-red);
  letter-spacing: 0.02em;
}
.item-pane .focused .ask small{
  color: var(--dim);
  font-family: 'Fredoka', sans-serif;
  font-size: 0.78rem;
  font-weight: 400;
  letter-spacing: 0.04em;
}

/* OFFER ROW */
.offer-row{
  display: flex;
  gap: 0.4rem;
  align-items: center;
  flex-wrap: wrap;
}
.offer-row input{
  flex: 1;
  min-width: 6rem;
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 1.5rem;
  padding: 0.34rem 0.6rem;
  background: #fff;
  border: 2px solid var(--ink);
  border-radius: 6px;
  color: var(--price-red);
  text-align: center;
  outline: none;
}
.offer-row input:focus{ box-shadow: 0 0 0 3px var(--mustard); }
.offer-btn{
  background: var(--coral);
  color: #fff;
  border: 2px solid var(--ink);
  font-family: 'Bungee', cursive;
  font-size: 0.78rem;
  letter-spacing: 0.04em;
  padding: 0.45rem 0.7rem;
  border-radius: 6px;
  cursor: pointer;
  min-height: 2.6rem;
  box-shadow: 2px 2px 0 var(--ink);
  transition: transform 0.08s, box-shadow 0.08s;
}
.offer-btn:hover{ transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
.offer-btn:active{ transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
.offer-btn.alt{ background: var(--mustard); }
.offer-btn.cool{ background: var(--paper); color: var(--ink); }
.offer-btn.danger{ background: var(--ink); color: var(--paper); }
.offer-btn:disabled{ opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: 2px 2px 0 var(--ink); }

.quick-offers{
  display: flex;
  flex-wrap: wrap;
  gap: 0.32rem;
  margin-top: 0.4rem;
}
.quick-offers .offer-btn{ padding: 0.32rem 0.55rem; font-size: 0.72rem; min-height: 2.4rem; }

.commit-row{
  display: flex;
  gap: 0.4rem;
  margin-top: 0.4rem;
  flex-wrap: wrap;
}
.commit-row .offer-btn{ flex: 1 1 5rem; }

*:focus-visible{ outline: 3px solid var(--mustard); outline-offset: 3px; }

/* ── HAUL (lifetime inventory) ── */
.haul{
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 12px;
  padding: 0.65rem 0.85rem 0.8rem;
  box-shadow: 4px 4px 0 var(--plum);
}
.haul h3{
  margin: 0 0 0.4rem;
  font-family: 'Bungee', cursive;
  font-size: 0.86rem;
  letter-spacing: 0.06em;
  color: var(--plum);
  text-transform: uppercase;
}
.haul .chips{
  display: flex;
  flex-wrap: wrap;
  gap: 0.32rem;
}
.haul .chips .none{
  font-family: 'Caveat', cursive;
  font-weight: 700;
  color: var(--dim);
  font-size: 1.1rem;
}
.haul-chip{
  background: var(--paper-dark);
  border: 1.5px solid var(--ink);
  border-radius: 999px;
  padding: 0.2rem 0.5rem;
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--ink);
  display: inline-flex;
  align-items: center;
  gap: 0.32rem;
}
.haul-chip .em{ font-size: 1rem; }

/* ── TOOLBAR ── */
.toolbar{
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
}
.btn{
  background: var(--ink);
  color: var(--paper);
  border: 2px solid var(--ink);
  font-family: 'Bungee', cursive;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  padding: 0.5rem 1rem;
  border-radius: 999px;
  cursor: pointer;
  min-height: 2.75rem;
  box-shadow: 3px 3px 0 var(--coral);
  text-transform: uppercase;
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn:hover{ transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--coral); }
.btn:active{ transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--coral); }
.btn.alt{ background: var(--paper); color: var(--ink); box-shadow: 3px 3px 0 var(--mustard); }

/* ── TOAST ── */
#toast{
  position: fixed;
  bottom: 1rem; left: 50%;
  transform: translate(-50%, 0.5rem);
  background: var(--ink); color: var(--paper);
  font-family: 'Bungee', cursive;
  font-size: 0.86rem;
  padding: 0.5rem 1rem;
  border-radius: 999px;
  border: 2px solid var(--coral);
  box-shadow: 0 0 0 1px var(--coral), 0 8px 22px rgba(0,0,0,0.3);
  opacity: 0;
  pointer-events: none;
  z-index: 60;
  transition: opacity 0.22s, transform 0.22s;
}
#toast.show{ opacity: 1; transform: translate(-50%, 0); }

footer{
  text-align: center;
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: var(--dim);
  font-size: 0.9rem;
}
footer .credit{ color: var(--coral); }

@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; transition: none !important; }
  .item-card:hover, .offer-btn:hover, .btn:hover{ transform: none; }
}
@media (max-width: 36rem){
  .negotiate{ grid-template-columns: 1fr; }
  .grandma{ height: 12rem; }
}
</style>
</head>
<body>

<main>
  <header>
    <h1>AGGRESSIVE <span class="em">·</span> GARAGE SALE</h1>
    <p class="tag">haggle with a <b>stubborn digital grandmother</b> over cursed items · she remembers what you offered</p>
  </header>

  <div class="hud" role="status" aria-live="polite">
    <span class="chip wallet">wallet · <b id="hud-wallet">$200</b></span>
    <span class="chip haul">haul · <b id="hud-haul">0</b></span>
    <span class="chip snaps">grandma snaps · <b id="hud-snaps">0</b></span>
  </div>

  <!-- BROWSE STATE -->
  <section id="state-browse" class="browse" aria-label="garage sale items"></section>

  <!-- NEGOTIATE STATE -->
  <section id="state-negotiate" class="negotiate" style="display: none;" aria-label="haggling">
    <div class="grandma-pane">
      <div class="grandma" id="grandma">
        <div class="bubble" id="bubble">—</div>
        <div class="body">
          <div class="hair"></div>
          <div class="head">
            <div class="glasses"><div class="lens"></div><div class="lens"></div></div>
            <div class="mouth"></div>
          </div>
          <div class="torso"></div>
          <div class="arms"><div class="arm l"></div><div class="arm r"></div></div>
          <div class="teacup"></div>
        </div>
      </div>
    </div>
    <div class="item-pane">
      <div class="focused" id="focused">— item —</div>
      <label for="offer-input" style="font-family: 'Bungee', cursive; font-size: 0.72rem; letter-spacing: 0.10em; color: var(--dim); text-transform: uppercase;">your offer</label>
      <div class="offer-row">
        <span style="font-family: 'Bungee', cursive; font-size: 1.4rem; color: var(--price-red);">$</span>
        <input id="offer-input" type="number" inputmode="numeric" min="1" step="1" value="10" aria-label="your offer in dollars" />
        <button class="offer-btn alt" type="button" id="btn-offer">OFFER</button>
      </div>
      <div class="quick-offers" aria-label="quick offer buttons">
        <button class="offer-btn cool" type="button" data-q="-50">−50%</button>
        <button class="offer-btn cool" type="button" data-q="-25">−25%</button>
        <button class="offer-btn cool" type="button" data-q="match">match ask</button>
        <button class="offer-btn cool" type="button" data-q="+10">+10% (suck-up)</button>
      </div>
      <div class="commit-row">
        <button class="offer-btn" type="button" id="btn-compliment">🌸 compliment her</button>
        <button class="offer-btn danger" type="button" id="btn-walk">walk away</button>
      </div>
    </div>
  </section>

  <!-- HAUL -->
  <section class="haul" aria-label="your lifetime cursed haul">
    <h3>your cursed haul (lifetime)</h3>
    <div class="chips" id="haul-chips"><span class="none">— nothing yet — go buy something cursed —</span></div>
  </section>

  <div class="toolbar">
    <button class="btn alt" type="button" id="btn-back-browse">back to sale</button>
    <button class="btn" type="button" id="btn-new-sale">new yard sale</button>
  </div>

  <footer><p>haggling is a love language · <span class="credit">sloppy.live</span></p></footer>
</main>

<div id="toast" role="status" aria-live="polite"></div>

<script>
/* ────────── AGGRESSIVE GARAGE SALE SIM ──────────
   12 cursed items at the sale. Click one to haggle. Grandma quotes an
   asking price; you offer a counter (number input + quick buttons).
   She may:
     - accept (immediately or grudgingly)
     - counter at her preferred minimum
     - get OFFENDED at lowball offers (asking price goes UP)
     - eventually kick you off (item REVOKED for the session)
   After ~3-5 turns of disrespect she snaps and revokes the item.
   You can also "compliment her" once per item to lower her threshold.
   Wallet $200. Bought items move to your LIFETIME cursed haul
   (localStorage). "New yard sale" reshuffles the stock + refreshes
   your wallet. */

const ITEMS = [
  { id: 'cat',   ico: '🐈', nm: 'Ceramic cat that stares', quirk: '"Watches you eat dinner. Won\'t blink."', ask: 47, min: 25 },
  { id: 'vhs',   ico: '📼', nm: 'VHS · "Christmas 1987 — DO NOT WATCH"', quirk: '"Smells like rust."', ask: 18, min: 8 },
  { id: 'doll',  ico: '🪆', nm: 'Doll with one eye open', quirk: '"Has been in 6 photos with my late husband."', ask: 89, min: 55 },
  { id: 'gnome', ico: '🧚', nm: 'Garden gnome with teeth', quirk: '"Used to belong to my mother. She moved out."', ask: 35, min: 18 },
  { id: 'pcs',   ico: '✉️', nm: 'Box of postcards from a stranger', quirk: '"All addressed to you."', ask: 12, min: 4 },
  { id: 'lava',  ico: '🪔', nm: 'Lava lamp that hums in Latin', quirk: '"Plug it in at your own risk."', ask: 65, min: 38 },
  { id: 'spns',  ico: '🥄', nm: 'Set of 47 spoons', quirk: '"Only 46. One came back this morning."', ask: 9, min: 3 },
  { id: 'clown', ico: '🤡', nm: 'Painting of a sad clown', quirk: '"The clown follows you. Pricing reflects this."', ask: 199, min: 135 },
  { id: 'alb',   ico: '📒', nm: 'Wedding album, 1962 (couple unknown)', quirk: '"Page 14 is sealed shut."', ask: 25, min: 12 },
  { id: 'mir',   ico: '🪞', nm: 'Antique mirror with a slight ripple', quirk: '"It looks at you. Just looks."', ask: 120, min: 80 },
  { id: 'marb',  ico: '🟢', nm: 'Bag of marbles, three are warm', quirk: '"Don\'t ask which three."', ask: 6, min: 2 },
  { id: 'book',  ico: '📖', nm: 'Cookbook missing all the recipes', quirk: '"It\'s just commentary now."', ask: 14, min: 7 },
];

const LINES = {
  greet: [
    "Oh. You. I was hoping someone better would come by.",
    "Lovely day. Don't touch the spoons.",
    "Welcome. The prices are firm. I am not.",
    "Hello, dear. Don't think I don't see you eyeing my things.",
  ],
  acceptFull: [
    "Fine. Sold. Take it before I change my mind.",
    "At asking? You're a fool. Sold.",
    "Take it. I'd rather not look at it.",
    "Done. Don't bring it back. Ever.",
  ],
  acceptGrudging: [
    "Hmm. Fine. Sold. I'm doing you a favour.",
    "Alright. Take it. You wore me down.",
    "Done. I want it gone.",
    "Fine. SOLD. Don't make eye contact.",
  ],
  acceptHaggled: [
    "Mmm. Fine. I'll allow it.",
    "Alright. Sold. I'm tired.",
    "Take it. You'll regret it. Sold.",
  ],
  counter: [
    "I'll take <b>$X</b>. Final.",
    "<b>$X</b>. No lower.",
    "<b>$X</b>, and I'll throw in my disapproval for free.",
    "Won't go lower than <b>$X</b>. The thing has WANT.",
    "<b>$X</b> or it goes back to the attic.",
  ],
  gentleCounter: [
    "Closer to <b>$X</b> and you've got yourself a friend.",
    "<b>$X</b>? I might consider that. Try it.",
    "Make it <b>$X</b>. Honestly.",
  ],
  offended: [
    "How DARE you. The price is now <b>$X</b>.",
    "That price is an INSULT. <b>$X</b>, now.",
    "My husband would weep. <b>$X</b>.",
    "Did your mother teach you NOTHING? <b>$X</b>.",
    "I would rather feed it to the bin. <b>$X</b>.",
    "You think I was born yesterday? <b>$X</b>.",
    "That price was an insult to ceramics. <b>$X</b>.",
  ],
  kick: [
    "I've had ENOUGH. Get off my driveway.",
    "We're done here. Don't look at me. Don't look at the lawn.",
    "I'm taking it back inside. Don't follow.",
    "I'm sorry. Wait. No I'm not. LEAVE.",
    "Out. Out out out. Take your offers and go.",
  ],
  walked: [
    "Mmhm. I thought you would.",
    "Good. I didn't want to sell it to YOU anyway.",
    "Don't come back. Or do. I won't notice.",
    "*sips tea* That's right. Off you go.",
  ],
  compliment: [
    "Mm. That's kind. The price is still <b>$X</b>, but kind.",
    "Don't think flattery works on me. But it might. <b>$X</b>.",
    "You're not as awful as the last one. <b>$X</b>.",
    "Goodness. Well. <b>$X</b>, but I appreciate it.",
  ],
};

const SAVE_KEY = 'aggressive-garage-sale-v1';
const saved = (() => { try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '{}'); } catch(e){ return {}; } })();
const state = {
  wallet: 200,
  haul: saved.haul || [],     // [{ id, nm, ico, paid }]
  snaps: 0,
  itemsInSale: [],
  currentItem: null,
  turns: 0,                   // turns in current negotiation
  complimented: false,        // can compliment once per item
  totalSpent: 0,
};

function persist(){
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({ haul: state.haul.slice(0, 60) })); } catch(e){}
}

/* shuffle in 8 items for this sale (random selection from the 12 pool) */
function rollSale(){
  const pool = ITEMS.slice();
  for (let i = pool.length - 1; i > 0; i--){
    const j = (Math.random() * (i + 1)) | 0;
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  state.itemsInSale = pool.slice(0, 8).map(it => ({
    ...it,
    currentAsk: it.ask,
    minAccept: it.min,
    mood: 0,
    sold: false,
    revoked: false,
  }));
}

/* ── BROWSE state render ── */
function renderBrowse(){
  const grid = document.getElementById('state-browse');
  grid.innerHTML = '';
  for (const it of state.itemsInSale){
    const card = document.createElement('div');
    card.className = 'item-card' + (it.sold ? ' sold' : '') + (it.revoked ? ' kicked' : '');
    card.innerHTML = `
      <span class="price-tag">$${it.currentAsk}</span>
      <div class="ico">${it.ico}</div>
      <div class="nm">${esc(it.nm)}</div>
      <div class="quirk">${esc(it.quirk)}</div>
    `;
    if (!it.sold && !it.revoked){
      card.addEventListener('click', () => beginNegotiate(it));
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.addEventListener('keydown', (e) => {
        if (e.code === 'Enter' || e.code === 'Space'){ e.preventDefault(); beginNegotiate(it); }
      });
    }
    grid.appendChild(card);
  }
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── NEGOTIATE state ── */
const grandmaEl = document.getElementById('grandma');
const bubbleEl = document.getElementById('bubble');
const focusedEl = document.getElementById('focused');
const offerInput = document.getElementById('offer-input');

function beginNegotiate(item){
  state.currentItem = item;
  state.turns = 0;
  state.complimented = false;
  // grandma greeting
  say(pickLine(LINES.greet));
  renderFocused();
  document.getElementById('state-browse').style.display = 'none';
  document.getElementById('state-negotiate').style.display = '';
  offerInput.value = Math.max(1, Math.floor(item.currentAsk * 0.5));
  offerInput.focus();
}
function renderFocused(){
  const it = state.currentItem;
  focusedEl.innerHTML = `
    <div class="row">
      <div class="ico">${it.ico}</div>
      <div class="meta">
        <div class="nm">${esc(it.nm)}</div>
        <div class="quirk">${esc(it.quirk)}</div>
      </div>
    </div>
    <div class="ask">she wants <b>$${it.currentAsk}</b> <small>· you have $${state.wallet}</small></div>
  `;
}
function say(text){
  bubbleEl.innerHTML = text;
  grandmaEl.classList.add('talking');
  clearTimeout(say._t);
  say._t = setTimeout(() => grandmaEl.classList.remove('talking'), 1400);
}
function setMood(mood){
  grandmaEl.classList.remove('offended');
  if (mood === 'offended') grandmaEl.classList.add('offended');
}
function pickLine(arr){ return arr[(Math.random() * arr.length) | 0]; }

/* ── core negotiation handler ── */
function makeOffer(amount){
  const it = state.currentItem;
  if (!it) return;
  if (it.sold || it.revoked){ showToast('this item is no longer for sale'); return; }
  if (amount <= 0 || isNaN(amount)){ showToast('you have to offer SOMETHING'); return; }
  if (amount > state.wallet){
    showToast("you don't have that much");
    say('"Cute. You don\'t even have that much."');
    return;
  }
  state.turns++;
  // === decision tree ===
  const ratioVsAsk = amount / it.currentAsk;
  const ratioVsMin = amount / it.minAccept;
  // 1. offer >= ask → accept full
  if (amount >= it.currentAsk){
    finalizePurchase(it, amount);
    say('"' + pickLine(LINES.acceptFull) + '"');
    setMood('happy');
    return;
  }
  // 2. offer >= 0.92 of ask → grudging
  if (ratioVsAsk >= 0.92){
    finalizePurchase(it, amount);
    say('"' + pickLine(LINES.acceptGrudging) + '"');
    return;
  }
  // 3. offer >= minAccept (within range): sometimes accept, sometimes counter
  if (amount >= it.minAccept){
    if (Math.random() < 0.55 + it.mood * 0.04){
      finalizePurchase(it, amount);
      say('"' + pickLine(LINES.acceptHaggled) + '"');
      return;
    }
    // counter at her preferred mid-point (closer to her minAccept)
    const counter = Math.max(it.minAccept, Math.round((it.currentAsk + amount) / 2));
    it.currentAsk = counter;
    setMood(null);
    say('"' + pickLine(LINES.counter).replaceAll('$X', '$' + counter) + '"');
    renderFocused();
    offerInput.value = Math.max(1, Math.floor((counter + amount) / 2));
    if (state.turns >= 4 && Math.random() < 0.35){
      // soft-kick warning
      setTimeout(() => say('"I haven\'t got all day. Decide."'), 1500);
    }
    return;
  }
  // 4. offer < minAccept — OFFENDED
  const short = it.minAccept - amount;
  const shortRatio = short / it.minAccept;
  it.mood -= (shortRatio > 0.5 ? 3 : 1);
  // raise the ask price
  const raise = Math.round(it.ask * (shortRatio > 0.5 ? 0.18 : 0.08));
  it.currentAsk = Math.min(Math.round(it.ask * 1.6), it.currentAsk + raise);
  setMood('offended');
  // KICK threshold
  if (it.mood <= -6 || state.turns >= 6){
    it.revoked = true;
    state.snaps++;
    say('"' + pickLine(LINES.kick) + '"');
    setTimeout(() => {
      backToBrowse();
      showToast('🚪 REVOKED · grandma has had enough');
    }, 1900);
    return;
  }
  // OFFENDED line w/ new price
  if (shortRatio > 0.5){
    say('"' + pickLine(LINES.offended).replaceAll('$X', '$' + it.currentAsk) + '"');
  } else {
    say('"' + pickLine(LINES.gentleCounter).replaceAll('$X', '$' + it.currentAsk) + '"');
  }
  renderFocused();
  offerInput.value = Math.max(1, Math.floor((it.currentAsk + amount) / 2));
}

function finalizePurchase(it, paid){
  it.sold = true;
  state.wallet -= paid;
  state.totalSpent += paid;
  state.haul.unshift({ id: it.id, nm: it.nm, ico: it.ico, paid });
  state.haul = state.haul.slice(0, 60);
  persist();
  renderHud();
  renderHaul();
  setTimeout(() => {
    backToBrowse();
    showToast('✓ bought "' + it.nm.slice(0, 30) + '" for $' + paid);
  }, 1500);
}

function compliment(){
  if (state.complimented) { showToast('you already tried that'); return; }
  state.complimented = true;
  const it = state.currentItem;
  it.minAccept = Math.max(1, Math.round(it.minAccept * 0.92));
  it.mood = Math.max(it.mood, 0);
  // soften any offended raise too
  if (it.currentAsk > it.ask) it.currentAsk = Math.round((it.currentAsk + it.ask) / 2);
  setMood(null);
  say('"' + pickLine(LINES.compliment).replaceAll('$X', '$' + it.currentAsk) + '"');
  renderFocused();
}

function walkAway(){
  const it = state.currentItem;
  if (!it) return;
  // grandma comments + maybe drops the price slightly to bait you back next time
  if (Math.random() < 0.4 && it.mood >= -3){
    it.currentAsk = Math.max(it.minAccept, Math.round(it.currentAsk * 0.92));
  }
  say('"' + pickLine(LINES.walked) + '"');
  setTimeout(backToBrowse, 1100);
}

function backToBrowse(){
  state.currentItem = null;
  document.getElementById('state-negotiate').style.display = 'none';
  document.getElementById('state-browse').style.display = '';
  renderBrowse();
}

/* ── HUD + haul ── */
function renderHud(){
  document.getElementById('hud-wallet').textContent = '$' + state.wallet;
  document.getElementById('hud-haul').textContent = state.haul.length;
  document.getElementById('hud-snaps').textContent = state.snaps;
}
function renderHaul(){
  const wrap = document.getElementById('haul-chips');
  if (!state.haul.length){
    wrap.innerHTML = '<span class="none">— nothing yet — go buy something cursed —</span>';
    return;
  }
  wrap.innerHTML = state.haul.slice(0, 24).map(it => (
    '<span class="haul-chip" title="paid $' + it.paid + '"><span class="em">' + it.ico + '</span>' + esc(it.nm.slice(0, 28)) + ' · $' + it.paid + '</span>'
  )).join('');
}

/* ── TOAST ── */
let toastT = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 1800);
}

/* ── BUTTONS ── */
document.getElementById('btn-offer').addEventListener('click', () => {
  const v = parseInt(offerInput.value, 10);
  if (isNaN(v)){ showToast('enter a number'); return; }
  makeOffer(v);
});
offerInput.addEventListener('keydown', (e) => {
  if (e.code === 'Enter'){
    e.preventDefault();
    const v = parseInt(offerInput.value, 10);
    if (!isNaN(v)) makeOffer(v);
  }
});
document.querySelectorAll('[data-q]').forEach(b => {
  b.addEventListener('click', () => {
    const q = b.dataset.q;
    const it = state.currentItem;
    if (!it) return;
    let v;
    if (q === '-50') v = Math.max(1, Math.round(it.currentAsk * 0.5));
    else if (q === '-25') v = Math.max(1, Math.round(it.currentAsk * 0.75));
    else if (q === 'match') v = it.currentAsk;
    else if (q === '+10') v = Math.round(it.currentAsk * 1.10);
    offerInput.value = v;
    makeOffer(v);
  });
});
document.getElementById('btn-compliment').addEventListener('click', compliment);
document.getElementById('btn-walk').addEventListener('click', walkAway);
document.getElementById('btn-back-browse').addEventListener('click', () => {
  if (state.currentItem) walkAway(); else { /* already browsing */ }
});
document.getElementById('btn-new-sale').addEventListener('click', () => {
  if (!confirm('Roll a new yard sale? Wallet refreshes to $200.')) return;
  state.wallet = 200;
  state.snaps = 0;
  state.totalSpent = 0;
  rollSale();
  renderBrowse();
  renderHud();
  if (state.currentItem){ backToBrowse(); }
  showToast('🛒 new yard sale · grandma is back outside');
});

/* ── BOOT ── */
rollSale();
renderBrowse();
renderHud();
renderHaul();
</script>
</body>
</html>
