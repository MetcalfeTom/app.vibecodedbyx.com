<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Server Defense</title>
<link rel="icon" href="https://emojicdn.elk.sh/🦊">
<meta property="og:title" content="Server Defense">
<meta property="og:description" content="Zap digital foxes with lasers before they reach your server rack.">
<meta property="og:url" content="https://app.sloppy.live/server-defense/">
<meta property="og:image" content="https://emojicdn.elk.sh/🦊?style=google">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#060810;touch-action:none}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated;cursor:crosshair}
#hud{
position:fixed;top:0;left:0;right:0;
display:flex;justify-content:space-between;
padding:8px 14px;
font-family:'Share Tech Mono',monospace;
font-size:11px;z-index:5;pointer-events:none;
}
#hud .left{color:#0f0;text-shadow:0 0 6px rgba(0,255,0,0.4)}
#hud .right{color:#0ff;text-shadow:0 0 6px rgba(0,255,255,0.4);text-align:right}
#hud .hp-bar{width:120px;height:6px;background:#111;border:1px solid #0a3;display:inline-block;vertical-align:middle}
#hud .hp-fill{height:100%;background:#0f0;transition:width 0.2s;box-shadow:0 0 4px #0f0}
#overlay{
position:fixed;inset:0;display:flex;flex-direction:column;
align-items:center;justify-content:center;z-index:10;
background:rgba(6,8,16,0.92);
}
#overlay.hidden{display:none}
#overlay h1{
font-family:'Orbitron',sans-serif;font-weight:900;
font-size:clamp(20px,5vw,32px);color:#0ff;
text-shadow:0 0 20px rgba(0,255,255,0.5);
letter-spacing:4px;margin-bottom:6px;
}
#overlay .sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:#446;letter-spacing:3px;margin-bottom:16px}
#overlay button{
font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
padding:12px 28px;background:transparent;
border:2px solid #0ff;color:#0ff;cursor:pointer;
letter-spacing:3px;text-shadow:0 0 8px rgba(0,255,255,0.4);
animation:blink 1.2s ease infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
#overlay .hint{font-family:'Share Tech Mono',monospace;font-size:8px;color:#335;margin-top:14px;text-align:center;line-height:2}
#gameover{
position:fixed;inset:0;display:none;flex-direction:column;
align-items:center;justify-content:center;z-index:10;
background:rgba(6,8,16,0.92);
}
#gameover.show{display:flex}
#gameover h2{font-family:'Orbitron',sans-serif;font-size:24px;color:#f00;text-shadow:0 0 20px rgba(255,0,0,0.5);letter-spacing:3px}
#gameover .stats{font-family:'Share Tech Mono',monospace;font-size:11px;color:#668;line-height:2.2;text-align:center;margin:10px 0}
#gameover button{
font-family:'Orbitron',sans-serif;font-size:10px;padding:10px 24px;
background:transparent;border:2px solid #0ff;color:#0ff;cursor:pointer;letter-spacing:2px;
}
</style>
</head>
<body>
<div id="overlay">
<h1>SERVER DEFENSE</h1>
<div class="sub">LASER VS DIGITAL FOXES</div>
<button onclick="startGame()">DEPLOY LASERS</button>
<div class="hint">CLICK / TAP TO ZAP FOXES<br>PROTECT YOUR SERVER RACK<br>Q = MEGA LASER (SCREEN CLEAR)</div>
</div>
<canvas id="c"></canvas>
<div id="hud">
<div class="left">
SERVER HP <div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div>
<span id="hp-text">100%</span>
</div>
<div class="right">
WAVE <span id="h-wave">1</span> | SCORE <span id="h-score">0</span> | ZAPS <span id="h-kills">0</span>
<br><span id="mega-btn" style="display:inline-block;margin-top:4px;padding:4px 10px;border:1px solid #224;color:#335;font-size:9px;pointer-events:auto;cursor:pointer" onclick="fireMega()">MEGA</span>
</div>
</div>
<div id="gameover">
<h2>SERVERS DOWN</h2>
<div class="stats" id="go-stats"></div>
<button onclick="startGame()">REBOOT</button>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,gameRunning=false;
let foxes,lasers,particles,sparks;
let serverHP,wave,score,kills,spawnTimer,waveTimer,foxesThisWave,foxesSpawned;
let shake={x:0,y:0,t:0};
let megaCharge,megaCooldown,megaFlash;
let audioCtx;

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function sfx(type){
  initAudio();const t=audioCtx.currentTime;
  if(type==='zap'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(3000,t);o.frequency.exponentialRampToValueAtTime(200,t+0.08);
    g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.1);
  }else if(type==='hit'){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.06,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.15));
    const s=audioCtx.createBufferSource();s.buffer=buf;
    const g=audioCtx.createGain();g.gain.value=0.12;
    s.connect(g);g.connect(audioCtx.destination);s.start(t);
  }else if(type==='damage'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='square';o.frequency.value=100;
    g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.15);
  }else if(type==='wave'){
    [523,659,784].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0.05,t+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.2);
      o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.1);o.stop(t+i*0.1+0.2);
    });
  }else if(type==='gameover'){
    [300,250,200,150].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='square';o.frequency.value=f;
      g.gain.setValueAtTime(0.08,t+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.15+0.2);
      o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.15);o.stop(t+i*0.15+0.2);
    });
  }else if(type==='mega'){
    // Charge-up whine then blast
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(100,t);o.frequency.exponentialRampToValueAtTime(4000,t+0.3);
    g.gain.setValueAtTime(0.12,t);g.gain.setValueAtTime(0.15,t+0.3);g.gain.exponentialRampToValueAtTime(0.001,t+0.6);
    const fl=audioCtx.createBiquadFilter();fl.type='bandpass';fl.frequency.setValueAtTime(200,t);fl.frequency.exponentialRampToValueAtTime(3000,t+0.3);fl.Q.value=2;
    o.connect(fl);fl.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.6);
    // Bass boom at blast
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.type='sine';o2.frequency.setValueAtTime(80,t+0.3);o2.frequency.exponentialRampToValueAtTime(20,t+0.6);
    g2.gain.setValueAtTime(0.001,t);g2.gain.setValueAtTime(0.2,t+0.3);g2.gain.exponentialRampToValueAtTime(0.001,t+0.6);
    o2.connect(g2);g2.connect(audioCtx.destination);o2.start(t);o2.stop(t+0.6);
    // Noise blast
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.3,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.25));
    const s=audioCtx.createBufferSource();s.buffer=buf;
    const g3=audioCtx.createGain();g3.gain.setValueAtTime(0.001,t);g3.gain.setValueAtTime(0.15,t+0.3);g3.gain.exponentialRampToValueAtTime(0.001,t+0.6);
    s.connect(g3);g3.connect(audioCtx.destination);s.start(t);
  }
}

function resize(){
  W=C.width=window.innerWidth;
  H=C.height=window.innerHeight;
}
window.addEventListener('resize',resize);
resize();

// Server rack position (right side)
const rackX=()=>W-60;
const rackW=50,rackH=120;

// Fox sprite (8x8 pixel art)
const FOX_SPRITE=[
  '..ff..ff',
  '.fOOf.fO',
  'fOOOOfOO',
  'fOOWWOOO',
  '.fOOOOOf',
  '..fOOOf.',
  '.f.ff.f.',
  'f......f',
];

const FOX_TYPES=[
  {name:'Scout',color:'#f80',speed:1.5,hp:1,size:12,points:10},
  {name:'Runner',color:'#ff0',speed:2.5,hp:1,size:10,points:15},
  {name:'Tank',color:'#f44',speed:0.8,hp:3,size:16,points:25},
  {name:'Glitch',color:'#f0f',speed:2,hp:2,size:11,points:20},
  {name:'Alpha',color:'#0ff',speed:1,hp:5,size:18,points:40},
];

function spawnFox(){
  const maxType=Math.min(FOX_TYPES.length-1,Math.floor(wave/2));
  const typeIdx=Math.floor(Math.random()*(maxType+1));
  const type=FOX_TYPES[typeIdx];
  const y=60+Math.random()*(H-140);
  foxes.push({
    x:-20,y,
    vx:type.speed*(0.8+wave*0.05),
    vy:(Math.random()-0.5)*0.5,
    type,hp:type.hp,maxHp:type.hp,
    size:type.size,color:type.color,
    frame:0,hitFlash:0,
    wobble:Math.random()*Math.PI*2,
  });
}

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('gameover').classList.remove('show');
  foxes=[];lasers=[];particles=[];sparks=[];
  serverHP=100;wave=1;score=0;kills=0;
  spawnTimer=0;waveTimer=0;
  foxesThisWave=5;foxesSpawned=0;
  megaCharge=100;megaCooldown=0;megaFlash=0;
  gameRunning=true;
  sfx('wave');
  resize();
  loop();
}

function handleClick(mx,my){
  if(!gameRunning)return;
  // Find closest fox to click
  let best=-1,bestD=Infinity;
  foxes.forEach((f,i)=>{
    const d=Math.hypot(mx-f.x,my-f.y);
    if(d<f.size*2.5&&d<bestD){bestD=d;best=i}
  });

  if(best>=0){
    const f=foxes[best];
    // Laser beam from rack to fox
    lasers.push({
      x1:rackX(),y1:H/2-rackH/2+Math.random()*rackH,
      x2:f.x,y2:f.y,
      life:8,color:'#0f0',
    });
    f.hp--;
    f.hitFlash=6;
    sfx('zap');

    // Hit sparks
    for(let i=0;i<8;i++){
      sparks.push({
        x:f.x,y:f.y,
        vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,
        life:8+Math.random()*8,color:f.color,size:1+Math.random(),
      });
    }

    if(f.hp<=0){
      // Kill
      score+=f.type.points*wave;
      kills++;
      // Death particles
      for(let i=0;i<15;i++){
        particles.push({
          x:f.x,y:f.y,
          vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,
          life:15+Math.random()*15,color:f.color,size:2+Math.random()*2,
        });
      }
      sfx('hit');
      foxes.splice(best,1);
    }
  }else{
    // Miss laser — shoot toward click point
    lasers.push({
      x1:rackX(),y1:H/2,
      x2:mx,y2:my,
      life:6,color:'rgba(0,255,0,0.3)',
    });
  }
}

C.addEventListener('click',e=>handleClick(e.clientX,e.clientY));
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  handleClick(t.clientX,t.clientY);
},{passive:false});

function fireMega(){
  if(!gameRunning||megaCharge<100||megaCooldown>0)return;
  megaCharge=0;megaCooldown=600; // 10s cooldown at 60fps
  megaFlash=20;
  shake.t=12;
  sfx('mega');

  // Horizontal beam lasers across entire screen
  for(let y=0;y<H;y+=30){
    lasers.push({
      x1:rackX(),y1:H/2,
      x2:-20,y2:y+Math.random()*20,
      life:15,color:'#0ff',mega:true,
    });
  }

  // Kill all foxes
  for(const f of foxes){
    score+=f.type.points*wave;
    kills++;
    for(let i=0;i<12;i++){
      particles.push({
        x:f.x,y:f.y,
        vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,
        life:15+Math.random()*15,color:f.color,size:2+Math.random()*3,
      });
    }
  }
  foxes=[];
}

document.addEventListener('keydown',e=>{
  if(e.key==='q'||e.key==='Q')fireMega();
});

function update(){
  if(!gameRunning)return;

  // Spawn foxes
  spawnTimer++;
  const spawnRate=Math.max(20,60-wave*3);
  if(spawnTimer>=spawnRate&&foxesSpawned<foxesThisWave){
    spawnFox();foxesSpawned++;spawnTimer=0;
  }

  // Check wave complete
  if(foxesSpawned>=foxesThisWave&&foxes.length===0){
    waveTimer++;
    if(waveTimer>60){
      wave++;
      foxesThisWave=5+wave*3;
      foxesSpawned=0;waveTimer=0;
      sfx('wave');
    }
  }

  // Update foxes
  for(let i=foxes.length-1;i>=0;i--){
    const f=foxes[i];
    f.wobble+=0.08;
    f.x+=f.vx;
    f.y+=f.vy+Math.sin(f.wobble)*0.3;
    f.frame++;
    if(f.hitFlash>0)f.hitFlash--;

    // Keep in bounds
    if(f.y<40)f.vy=Math.abs(f.vy);
    if(f.y>H-40)f.vy=-Math.abs(f.vy);

    // Reached server rack
    if(f.x>=rackX()-30){
      const dmg=f.type.hp*3+wave;
      serverHP-=dmg;
      shake.t=8;
      sfx('damage');
      // Damage sparks
      for(let j=0;j<10;j++){
        sparks.push({
          x:rackX(),y:f.y,
          vx:-Math.random()*4,vy:(Math.random()-0.5)*4,
          life:10+Math.random()*10,color:'#f00',size:2,
        });
      }
      foxes.splice(i,1);

      if(serverHP<=0){
        serverHP=0;
        gameRunning=false;
        sfx('gameover');
        setTimeout(()=>{
          document.getElementById('go-stats').innerHTML=
            `WAVE: ${wave}<br>SCORE: ${score}<br>FOXES ZAPPED: ${kills}`;
          document.getElementById('gameover').classList.add('show');
        },600);
      }
    }
  }

  // Update lasers
  for(let i=lasers.length-1;i>=0;i--){
    lasers[i].life--;
    if(lasers[i].life<=0)lasers.splice(i,1);
  }

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.x+=s.vx;s.y+=s.vy;s.vx*=0.95;s.vy*=0.95;s.life--;
    if(s.life<=0)sparks.splice(i,1);
  }

  // Mega charge + cooldown
  if(megaCooldown>0)megaCooldown--;
  if(megaCharge<100&&megaCooldown<=0)megaCharge=Math.min(100,megaCharge+0.25);
  if(megaFlash>0)megaFlash--;

  // Shake
  if(shake.t>0){shake.x=(Math.random()-0.5)*6;shake.y=(Math.random()-0.5)*6;shake.t--}
  else{shake.x=0;shake.y=0}

  // HUD
  document.getElementById('hp-fill').style.width=serverHP+'%';
  document.getElementById('hp-fill').style.background=serverHP>50?'#0f0':serverHP>25?'#ff0':'#f00';
  document.getElementById('hp-text').textContent=serverHP+'%';
  document.getElementById('h-wave').textContent=wave;
  document.getElementById('h-score').textContent=score;
  document.getElementById('h-kills').textContent=kills;
  const megaBtn=document.getElementById('mega-btn');
  if(megaCharge>=100){
    megaBtn.style.borderColor='#0ff';megaBtn.style.color='#0ff';
    megaBtn.style.textShadow='0 0 6px rgba(0,255,255,0.5)';
    megaBtn.textContent='⚡ MEGA';
  }else{
    megaBtn.style.borderColor='#224';megaBtn.style.color='#335';
    megaBtn.style.textShadow='none';
    megaBtn.textContent='MEGA '+Math.floor(megaCharge)+'%';
  }
}

function draw(){
  X.fillStyle='#060810';X.fillRect(0,0,W,H);

  X.save();
  X.translate(shake.x,shake.y);

  // Grid floor
  X.strokeStyle='rgba(0,255,0,0.03)';X.lineWidth=1;
  for(let x=0;x<W;x+=40){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke()}
  for(let y=0;y<H;y+=40){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}

  // Server rack
  drawServerRack();

  // Laser beams
  for(const l of lasers){
    const maxLife=l.mega?15:8;
    const a=l.life/maxLife;
    X.strokeStyle=l.color;X.lineWidth=l.mega?4:2;X.globalAlpha=a;
    X.shadowColor=l.mega?'#0ff':'#0f0';X.shadowBlur=l.mega?20:10;
    X.beginPath();X.moveTo(l.x1,l.y1);X.lineTo(l.x2,l.y2);X.stroke();
    // Thick glow
    X.lineWidth=l.mega?16:6;X.globalAlpha=a*(l.mega?0.4:0.3);X.stroke();
    X.globalAlpha=1;X.shadowBlur=0;
  }

  // Foxes
  for(const f of foxes){
    drawFox(f);
  }

  // Particles
  for(const p of particles){
    X.fillStyle=p.color;X.globalAlpha=p.life/30;
    X.fillRect(p.x,p.y,p.size,p.size);
  }
  X.globalAlpha=1;

  // Sparks
  for(const s of sparks){
    X.fillStyle=s.color;X.globalAlpha=s.life/18;
    X.shadowColor=s.color;X.shadowBlur=4;
    X.fillRect(s.x,s.y,s.size,s.size);
  }
  X.globalAlpha=1;X.shadowBlur=0;

  X.restore();

  // Mega flash overlay
  if(megaFlash>0){
    X.fillStyle=`rgba(0,255,255,${megaFlash/20*0.25})`;
    X.fillRect(0,0,W,H);
  }

  // Mega charge bar (bottom center)
  if(gameRunning){
    const bw=120,bh=8;
    const bx=W/2-bw/2,by=H-30;
    X.fillStyle='#111';X.fillRect(bx,by,bw,bh);
    X.strokeStyle=megaCharge>=100?'#0ff':'#224';X.lineWidth=1;
    X.strokeRect(bx,by,bw,bh);
    const fillColor=megaCharge>=100?'#0ff':'#066';
    X.fillStyle=fillColor;
    X.fillRect(bx+1,by+1,(bw-2)*megaCharge/100,bh-2);
    if(megaCharge>=100){
      X.shadowColor='#0ff';X.shadowBlur=8;
      X.fillRect(bx+1,by+1,bw-2,bh-2);
      X.shadowBlur=0;
    }
    X.fillStyle=megaCharge>=100?'#0ff':'#335';
    X.font="8px 'Share Tech Mono',monospace";
    X.textAlign='center';
    X.fillText(megaCharge>=100?'[Q] MEGA LASER READY':'CHARGING '+Math.floor(megaCharge)+'%',W/2,by-4);
  }
}

function drawFox(f){
  const s=f.size;
  const px=s/8;

  X.save();
  X.translate(f.x,f.y);

  // White flash on hit
  if(f.hitFlash>0&&f.hitFlash%2===0){
    X.fillStyle='#fff';
    X.shadowColor='#fff';X.shadowBlur=10;
    X.fillRect(-s/2,-s/2,s,s);
    X.shadowBlur=0;
    X.restore();return;
  }

  // Draw pixel fox
  const baseColor=f.color;
  const darkColor=darken(baseColor,0.5);
  const lightColor='#fff';

  const sprite=FOX_SPRITE;
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const ch=sprite[r][c];
      if(ch==='.')continue;
      let col;
      if(ch==='f')col=baseColor;
      else if(ch==='O')col=darkColor;
      else if(ch==='W')col=lightColor;
      else col=baseColor;
      X.fillStyle=col;
      X.fillRect(-s/2+c*px,-s/2+r*px,px+0.5,px+0.5);
    }
  }

  // Neon glow outline
  X.shadowColor=baseColor;X.shadowBlur=8;
  X.strokeStyle=baseColor;X.lineWidth=1;X.globalAlpha=0.4;
  X.strokeRect(-s/2-1,-s/2-1,s+2,s+2);
  X.globalAlpha=1;X.shadowBlur=0;

  // HP bar if damaged
  if(f.hp<f.maxHp){
    const bw=s+4;
    X.fillStyle='#300';X.fillRect(-bw/2,-s/2-5,bw,3);
    X.fillStyle=f.color;X.fillRect(-bw/2,-s/2-5,bw*(f.hp/f.maxHp),3);
  }

  X.restore();
}

function darken(hex,amt){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.floor(r*amt)},${Math.floor(g*amt)},${Math.floor(b*amt)})`;
}

function drawServerRack(){
  const rx=rackX()-rackW/2;
  const ry=H/2-rackH/2;

  // Rack body
  X.fillStyle='#0a0c14';
  X.fillRect(rx,ry,rackW,rackH);
  X.strokeStyle='#1a2030';X.lineWidth=2;
  X.strokeRect(rx,ry,rackW,rackH);

  // Server units
  for(let i=0;i<5;i++){
    const uy=ry+6+i*22;
    X.fillStyle='#101420';
    X.fillRect(rx+4,uy,rackW-8,18);
    X.strokeStyle='#1a2838';X.lineWidth=1;
    X.strokeRect(rx+4,uy,rackW-8,18);
    // LED lights
    const blink=Math.sin(Date.now()*0.005+i*2)>0;
    X.fillStyle=blink?'#0f0':'#040';
    X.fillRect(rx+8,uy+7,3,3);
    X.fillStyle=serverHP<30?(Math.sin(Date.now()*0.01)>0?'#f00':'#400'):'#060';
    X.fillRect(rx+14,uy+7,3,3);
    // Vents
    X.fillStyle='#0a0e18';
    for(let v=0;v<4;v++){
      X.fillRect(rx+22+v*5,uy+6,3,6);
    }
  }

  // Glow
  X.shadowColor=serverHP>50?'rgba(0,255,0,0.15)':'rgba(255,0,0,0.2)';
  X.shadowBlur=20;
  X.strokeStyle='transparent';X.strokeRect(rx,ry,rackW,rackH);
  X.shadowBlur=0;

  // Label
  X.fillStyle='rgba(0,255,255,0.15)';
  X.font="7px 'Share Tech Mono',monospace";
  X.textAlign='center';
  X.fillText('RACK-01',rx+rackW/2,ry+rackH+12);
}

function loop(){
  update();
  draw();
  if(gameRunning||lasers.length>0||particles.length>0||sparks.length>0)
    requestAnimationFrame(loop);
}
</script>
