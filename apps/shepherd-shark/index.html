<style>
:root{
  --abyss:#031722;
  --deep:#0a3954;
  --teal:#1a7896;
  --shallow:#5fbcd6;
  --foam:#dff5fb;
  --gold:#f5c453;
  --coral:#e7704c;
  --warning:#ff5a4a;
  --paper:#f4ecd8;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100vh;background:var(--abyss);color:var(--foam);
  font-family:'Space Mono',ui-monospace,monospace;
  font-size:1rem;line-height:1.45;overflow:hidden;
}
a.skip-link{position:absolute;left:0.5rem;top:-3rem;z-index:200;
  background:var(--coral);color:var(--paper);padding:0.5rem 0.75rem;
  text-decoration:none;border-radius:0.25rem;
  font-family:'Major Mono Display',monospace;font-size:0.875rem}
a.skip-link:focus{top:0.5rem;outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

main{position:fixed;inset:0;display:grid;grid-template-rows:1fr}
canvas#sea{
  display:block;width:100%;height:100%;background:var(--abyss);outline:none;
}
canvas#sea:focus-visible{box-shadow:inset 0 0 0 0.1875rem var(--gold)}

.hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:0.875rem 1rem;pointer-events:none;z-index:6;flex-wrap:wrap;gap:0.5rem;
}
.brand{
  pointer-events:none;display:flex;flex-direction:column;gap:0.125rem;

}
h1{
  font-family:'Bagel Fat One',cursive;
  font-size:clamp(1.1rem, 2.4vw, 1.625rem);
  letter-spacing:0.04em;color:var(--foam);line-height:1;
}
h1 .accent{color:var(--gold)}
.tag{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1rem;color:rgba(223,245,251,0.78);
}
.stats{display:flex;gap:0.375rem;flex-wrap:wrap;font-size:0.6875rem;align-items:flex-start;pointer-events:auto}
.stats .pill{
  background:rgba(3,23,34,0.78);
  border:0.0625rem solid rgba(223,245,251,0.25);
  border-radius:0.25rem;padding:0.4375rem 0.625rem;letter-spacing:0.16em;
  text-transform:uppercase;display:flex;gap:0.4375rem;align-items:center;
  min-height:2.25rem;backdrop-filter:blur(2px);color:var(--foam);
}
.stats b{color:var(--gold);font-family:'Bagel Fat One',cursive;font-size:1rem;font-weight:400}
.stats .pill.warn b{color:var(--warning)}

.mute-btn{
  background:rgba(3,23,34,0.78);
  border:0.0625rem solid rgba(223,245,251,0.25);
  color:var(--foam);font-family:'Major Mono Display',monospace;
  padding:0.4375rem 0.625rem;border-radius:0.25rem;cursor:pointer;
  letter-spacing:0.16em;font-size:0.6875rem;min-height:2.25rem;
}

.leaderboard{
  position:absolute;left:1rem;bottom:1rem;
  background:rgba(3,23,34,0.82);
  border:0.0625rem solid rgba(223,245,251,0.25);
  border-radius:0.375rem;padding:0.75rem 0.875rem;
  font-family:'Space Mono',monospace;font-size:0.8125rem;

}

  font-family:'Major Mono Display',monospace;font-size:0.6875rem;

}
.leaderboard ol{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:0.25rem}

  display:flex;justify-content:space-between;gap:0.625rem;

}

.leaderboard .nm{color:var(--foam);font-family:'Major Mono Display',monospace;font-size:0.75rem;letter-spacing:0.04em}

.feed{
  position:absolute;right:1rem;bottom:1rem;

}

  font-family:'Major Mono Display',monospace;font-size:0.6875rem;

}

}

}

@media (max-width:760px){
  .leaderboard, .feed{font-size:0.75rem;padding:0.625rem 0.75rem;min-width:11rem}

}

@media (prefers-reduced-motion: reduce){
  /* no transforms relied on */
}

<body>

<a href="#sea" class="skip-link">Skip to ocean</a>

<main>
  <canvas id="sea" tabindex="0"
          role="application"
          aria-label="Shepherd Shark — an autonomous fish-eat-fish ocean. Fish named after recent chat users hunt each other in real time."></canvas>

  <div class="hud">
    <div class="brand">
      <h1>Shepherd <span class="accent">Shark</span></h1>
      <div class="tag">an autonomous ocean — chat names hunt each other</div>
    </div>
    <div class="stats" role="status" aria-live="polite">
      <div class="pill" aria-label="Population"><span>FISH</span> <b id="hPop">0</b></div>
      <div class="pill" aria-label="Named fish alive"><span>NAMED</span> <b id="hNamed">0</b></div>
      <div class="pill" aria-label="Total kills"><span>KILLS</span> <b id="hKills">0</b></div>
      <div class="pill" aria-label="Apex"><span>APEX</span> <b id="hApex">—</b></div>
      <div class="pill" aria-label="Plankton bounty target"><span>ARASAIN</span> <b id="hPlankton">—</b></div>
      <button id="muteBtn" class="mute-btn" type="button" aria-label="Toggle audio" aria-pressed="false">♪</button>
    </div>
  </div>

  <aside class="leaderboard" aria-label="Top named fish">
    <h2>LEADERBOARD</h2>
    <ol id="lbList"></ol>
  </aside>

  <aside class="feed" aria-label="Hunt feed" aria-live="polite">
    <h2>HUNT FEED</h2>
    <ul id="feedList"></ul>
  </aside>

  <div class="overlay" id="ovPause" role="dialog" aria-modal="true" aria-labelledby="pauseTitle" hidden>
    <div class="card">
      <h2 id="pauseTitle">Held Breath</h2>
      <p class="sub">The ocean waits. Press <kbd>P</kbd> to release.</p>
    </div>
  </div>
</main>

<script type="module">
"use strict";

// ============================================================
// SHEPHERD SHARK — autonomous fish-eat-fish ocean.
// No player. Fish are named after recent vibespace users (pulled
// from Supabase) and hunt each other in real time. The simulation
// runs forever; new small fish trickle in at the edges as the apex
// fish grow.
// ============================================================

// === Lazy supabase ===
let supabase = null;
let supabaseReady = (async () => {
  try {
    const mod = await import('/supabase-config-fixed.js');
    supabase = mod.default;
  } catch (e) {
    console.warn('[shepherd-shark] supabase unavailable:', e);
  }
})();

// === Canvas ===
const sea = document.getElementById('sea');
const ctx = sea.getContext('2d');
let W = 0, H = 0, DPR = 1;
function fitCanvas(){
  DPR = Math.min(window.devicePixelRatio || 1, 1.5);
  const r = sea.getBoundingClientRect();
  W = Math.max(320, Math.floor(r.width));
  H = Math.max(240, Math.floor(r.height));
  sea.width  = Math.floor(W * DPR);
  sea.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

// === World ===
// Fixed wide world. Camera centered, scales to fit viewport while
// preserving aspect. Fish wrap softly near edges so the ocean feels
// boundless without runaway escape vectors.
const WORLD_W = 1800;
const WORLD_H = 1100;
function viewScale(){
  return Math.min(W / WORLD_W, H / WORLD_H);
}
function worldToScreen(wx, wy){
  const z = viewScale();
  return [W/2 + wx * z, H/2 + wy * z];
}

// === Hash / RNG ===
function mulberry32(seed){
  let t = seed >>> 0;
  return function(){ t |= 0; t = (t + 0x6D2B79F5) | 0; let r = Math.imul(t ^ (t >>> 15), 1 | t); r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r; return ((r ^ (r >>> 14)) >>> 0) / 4294967296; };
}

// === Fish palette: distinct color-shapes ===
const FISH_PALETTES = [
  { body:'#e7c46a', belly:'#fff3c4', fin:'#a3792a' },
  { body:'#ec7a52', belly:'#ffd8c4', fin:'#922f0e' },
  { body:'#5b9dd0', belly:'#c8e2f5', fin:'#1d4670' },
  { body:'#7dba6c', belly:'#dff0d6', fin:'#2f5a25' },
  { body:'#c66ec0', belly:'#f5d0f0', fin:'#5e2658' },
  { body:'#5fc1b3', belly:'#cef2ec', fin:'#175c50' },
  { body:'#d8d8d8', belly:'#ffffff', fin:'#7a7a7a' },
  { body:'#1f3550', belly:'#3a587a', fin:'#0d1d2e' },
  { body:'#a04a32', belly:'#cc8a72', fin:'#5b2410' },
  { body:'#dec85a', belly:'#fdf0a6', fin:'#827322' },
];
function pickPalette(rng){
  return FISH_PALETTES[Math.floor(rng() * FISH_PALETTES.length)];
}

// === Chat user names — pulled from sloppygram_profiles + fallback ===
const FALLBACK_NAMES = [
  'SLOPPY','PIETER','XENOFISH','GUPPY','BARRACUDA','MARLIN','BRINE','MOLLUSK',
  'KRILL','TUNA','ANCHOVY','WHALEFOOD','REEFRAT','CHUM','CORAL','SARDINE',
  'OCTOPRINCE','GLUB','PUFFER','LANTERN','MORAY','ABYSSAL','DRIFT','TIDE',
];
let chatNames = [];
let nameQueue = [];
async function loadChatNames(){
  await supabaseReady;
  if (!supabase){
    chatNames = FALLBACK_NAMES.slice();
    return;
  }
  try {
    // Pull recent active users from the most-populated profile table.
    // Order by updated_at desc so 'recent chat users' is a real signal.
    const r = await supabase.from('sloppygram_profiles')
      .select('username, updated_at')
      .order('updated_at', { ascending: false })
      .limit(60);
    if (r.error) throw new Error(r.error.message);
    const names = (r.data || [])
      .map(x => (x.username || '').trim())
      .filter(n => n && n.length >= 2 && n.length <= 18)
      .map(n => n.toUpperCase());
    if (!names.length) throw new Error('no usernames returned');
    // Dedupe + cap
    const seen = new Set();
    chatNames = [];
    for (const n of names){
      if (seen.has(n)) continue;
      seen.add(n);
      chatNames.push(n);
      if (chatNames.length >= 40) break;
    }
  } catch (e) {
    console.warn('[shepherd-shark] chat-name fetch failed, using fallback:', e);
    chatNames = FALLBACK_NAMES.slice();
  }
  refreshNameTag();
}
function refreshNameTag(){
  // Show name source in the brand tag — keeps the chat aware that
  // their handles are genuinely in the ocean.
  const tagEl = document.querySelector('.tag');
  if (!tagEl) return;
  tagEl.textContent = chatNames.length
    ? `an autonomous ocean — ${chatNames.length} chat handles hunt each other`
    : 'an autonomous ocean — chat names hunt each other';
}
function reshuffleNameQueue(){
  nameQueue = chatNames.slice();
  for (let i = nameQueue.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [nameQueue[i], nameQueue[j]] = [nameQueue[j], nameQueue[i]];
  }
}
function nextName(){
  if (!chatNames.length) return null;
  if (!nameQueue.length) reshuffleNameQueue();
  return nameQueue.shift();
}

// === Fish ===
// Each fish has size, position, velocity, AI state (hunt|flee|wander)
// and an optional name. Sizes are world units; on-screen size = size * viewScale().
const fishes = [];
let kills = 0;
let apexName = '—';

// Spawn distribution: most fish small, a few medium, very few big.
// Log-uniform-ish across 8..52 world units.
function rollSize(rng){
  const r = rng();
  // Bias toward smaller: cube the random.
  const t = r * r * r;
  return 8 + t * 44;
}

function makeFish(opts){
  opts = opts || {};
  const seed = (Math.random() * 1e9) | 0;
  const rng = mulberry32(seed);
  const size = opts.size != null ? opts.size : rollSize(rng);
  const palette = pickPalette(rng);
  return {
    seed, rng, palette,
    worldX: opts.x != null ? opts.x : (Math.random()-0.5) * WORLD_W,
    worldY: opts.y != null ? opts.y : (Math.random()-0.5) * WORLD_H,
    vx: 0, vy: 0,
    size,
    facing: rng() * Math.PI * 2,
    wanderT: 0, wanderA: rng() * Math.PI * 2,
    name: opts.name || null,
    speedScalar: 60 + rng() * 50,
    huntCD: 0,
    state: 'wander',  // 'wander' | 'hunt' | 'flee'
    target: null,
    age: 0,
    kills: 0,
  };
}

function spawnAtEdge(opts){
  const ang = Math.random() * Math.PI * 2;
  const margin = 50;
  const rx = (Math.cos(ang) > 0 ? 1 : -1) * (WORLD_W/2 + margin);
  const ry = Math.sin(ang) * WORLD_H/2;
  // Pick which axis to anchor based on |cos|/|sin|
  let x, y;
  if (Math.abs(Math.cos(ang)) > Math.abs(Math.sin(ang))){
    x = rx;
    y = (Math.random()-0.5) * WORLD_H;
  } else {
    x = (Math.random()-0.5) * WORLD_W;
    y = (Math.sin(ang) > 0 ? 1 : -1) * (WORLD_H/2 + margin);
  }
  const f = makeFish(Object.assign({}, opts, { x, y }));
  // Aim inward
  f.vx = -Math.sign(x) * 30 + (Math.random()-0.5)*10;
  f.vy = -Math.sign(y) * 30 + (Math.random()-0.5)*10;
  return f;
}

// === Plankton (the singular ARASAIN) ===
// One tiny plankton always exists in the ocean. Every predator
// prioritizes it WAY above other prey — they detect it from 2.5×
// their normal sense radius and target it through normal prey. It
// flees with high speed + erratic jitter. When eaten, respawns at a
// random edge after 5-9s so the chase never ends for long.
const PLANKTON_NAME = 'ARASAIN';
const PLANKTON_SIZE = 4.5;
const PLANKTON_SPEED = 150;
const PLANKTON_PRIORITY_MULT = 2.5;   // sense range mult for plankton
let plankton = null;
let planktonRespawnT = 0;
let planktonKilledBy = null;

function spawnPlankton(){
  const ang = Math.random() * Math.PI * 2;
  // Spawn somewhere away from the action — pick from the middle ring.
  const dist = Math.min(WORLD_W, WORLD_H) * 0.32;
  plankton = {
    isPlankton: true,
    name: PLANKTON_NAME,
    seed: (Math.random() * 1e9) | 0,
    palette: { body:'#aef0ff', belly:'#ffffff', fin:'#5fc1b3' },
    worldX: Math.cos(ang) * dist,
    worldY: Math.sin(ang) * dist,
    vx: 0, vy: 0,
    size: PLANKTON_SIZE,
    facing: Math.random() * Math.PI * 2,
    wanderT: 0, wanderA: 0,
    speedScalar: PLANKTON_SPEED,
    huntCD: 0,
    state: 'flee',
    target: null,
    age: 0,
    kills: 0,
  };
  fishes.push(plankton);
}

// === Initial spawn ===
function seedOcean(){
  fishes.length = 0;
  kills = 0;
  plankton = null; planktonRespawnT = 0; planktonKilledBy = null;
  reshuffleNameQueue();
  // Spread fish across the world; smaller fish more common (rollSize bias).
  for (let i = 0; i < 48; i++){
    const f = makeFish({});
    fishes.push(f);
  }
  // Assign names to a chunk of mid-sized fish so the leaderboard has
  // varied starting candidates (not just one tiny fish carrying it).
  // Skip the smallest fish — they'd get eaten in 5 seconds.
  const sorted = fishes.slice().sort((a, b) => b.size - a.size);
  const nameCount = Math.min(chatNames.length, 18);
  for (let i = 0; i < nameCount; i++){
    // Pick from the top half by size for survivability
    const f = sorted[Math.floor(i * sorted.length * 0.5 / nameCount)];
    if (!f.name) f.name = nextName();
  }
  // Plankton enters last so it doesn't get auto-named or eaten on frame 1
  spawnPlankton();
}

// === AI ===
const SENSE_BASE = 90;
const SAFE_RATIO  = 1.18;   // anything > size * SAFE_RATIO is a threat
const PREY_RATIO  = 0.82;   // anything < size * PREY_RATIO is prey
const HUNT_DURATION = 4.0;  // seconds before reacquiring target

function tickPlanktonAI(f, dt){
  // Plankton: pure flee from nearest fish + erratic random jitter so
  // its trajectory is hard to predict. No hunting, no wandering.
  let threat = null, threatD = 1e9;
  for (let i = 0; i < fishes.length; i++){
    const o = fishes[i];
    if (o === f) continue;
    const dx = o.worldX - f.worldX;
    const dy = o.worldY - f.worldY;
    const d = Math.hypot(dx, dy);
    if (d < threatD){ threat = o; threatD = d; }
  }
  if (threat && threatD < 280){
    const dx = f.worldX - threat.worldX;
    const dy = f.worldY - threat.worldY;
    const m = Math.hypot(dx, dy) || 1;
    f.vx += (dx/m) * 260 * dt;
    f.vy += (dy/m) * 260 * dt;
  } else {
    // ambient drift even when nothing is chasing
    f.vx += (Math.random()-0.5) * 60 * dt;
    f.vy += (Math.random()-0.5) * 60 * dt;
  }
  // erratic jitter every tick — plankton motion looks random by design
  f.vx += (Math.random()-0.5) * 110 * dt;
  f.vy += (Math.random()-0.5) * 110 * dt;
  f.vx *= Math.pow(0.94, dt*60);
  f.vy *= Math.pow(0.94, dt*60);
  const sp = Math.hypot(f.vx, f.vy);
  if (sp > f.speedScalar){ f.vx *= f.speedScalar/sp; f.vy *= f.speedScalar/sp; }
  if (sp > 5){
    const t = Math.atan2(f.vy, f.vx);
    let dA = ((t - f.facing + Math.PI*3) % (Math.PI*2)) - Math.PI;
    f.facing += dA * (1 - Math.exp(-14 * dt));
  }
  f.worldX += f.vx * dt;
  f.worldY += f.vy * dt;
  const margin = 60;
  if (f.worldX >  WORLD_W/2 + margin){ f.worldX =  WORLD_W/2 + margin; f.vx *= -0.7; }
  if (f.worldX < -WORLD_W/2 - margin){ f.worldX = -WORLD_W/2 - margin; f.vx *= -0.7; }
  if (f.worldY >  WORLD_H/2 + margin){ f.worldY =  WORLD_H/2 + margin; f.vy *= -0.7; }
  if (f.worldY < -WORLD_H/2 - margin){ f.worldY = -WORLD_H/2 - margin; f.vy *= -0.7; }
}

function tickAI(f, dt){
  f.age += dt;
  // Plankton has its own behaviour — pure flee with erratic jitter.
  if (f.isPlankton){ tickPlanktonAI(f, dt); return; }
  // Find nearest threat + nearest prey in sense radius. Plankton is
  // detected at PLANKTON_PRIORITY_MULT × the normal range and ALWAYS
  // wins the prey slot if seen — every predator drops what it's doing
  // and chases ARASAIN.
  const sense = f.size * 8 + SENSE_BASE;
  const planktonSense = sense * PLANKTON_PRIORITY_MULT;
  let threat = null, threatD = sense;
  let prey   = null, preyD   = sense;
  let saw    = false;
  for (let i = 0; i < fishes.length; i++){
    const o = fishes[i];
    if (o === f) continue;
    const dx = o.worldX - f.worldX;
    const dy = o.worldY - f.worldY;
    const d = Math.hypot(dx, dy);
    if (o.isPlankton){
      // Plankton-priority detection: if within extended range AND we
      // could eat it (which is everyone, since plankton is tiny),
      // override prey choice.
      if (d < planktonSense && f.size > o.size * (1/PREY_RATIO)){
        prey = o; preyD = d; saw = true;
      }
      continue;
    }
    if (d > sense) continue;
    if (o.size > f.size * SAFE_RATIO){
      const eff = d / (1 + Math.log(o.size / f.size));
      if (eff < threatD){ threat = o; threatD = eff; }
    } else if (o.size < f.size * PREY_RATIO && !saw){
      // Only consider regular prey if we haven't locked onto plankton.
      if (d < preyD){ prey = o; preyD = d; }
    }
  }
  // Threats override hunting — ARASAIN priority does NOT override
  // self-preservation. A predator running from a bigger predator
  // won't suicide-chase plankton.
  if (threat){
    f.state = 'flee';
    f.target = threat;
  } else if (prey){
    f.state = 'hunt';
    f.target = prey;
  } else {
    f.state = 'wander';
    f.target = null;
  }
  // Apply behavior
  if (f.state === 'flee' && f.target){
    const dx = f.worldX - f.target.worldX;
    const dy = f.worldY - f.target.worldY;
    const m = Math.hypot(dx, dy) || 1;
    const fleeSpeed = 1.4;
    f.vx += (dx/m) * 110 * fleeSpeed * dt;
    f.vy += (dy/m) * 110 * fleeSpeed * dt;
  } else if (f.state === 'hunt' && f.target){
    const dx = f.target.worldX - f.worldX;
    const dy = f.target.worldY - f.worldY;
    const m = Math.hypot(dx, dy) || 1;
    f.vx += (dx/m) * 95 * dt;
    f.vy += (dy/m) * 95 * dt;
  } else {
    f.wanderT -= dt;
    if (f.wanderT <= 0){
      f.wanderA = Math.random() * Math.PI * 2;
      f.wanderT = 1.5 + Math.random() * 2.5;
    }
    f.vx += Math.cos(f.wanderA) * 28 * dt;
    f.vy += Math.sin(f.wanderA) * 28 * dt;
  }
  // damping
  f.vx *= Math.pow(0.92, dt*60);
  f.vy *= Math.pow(0.92, dt*60);
  // cap
  const sp = Math.hypot(f.vx, f.vy);
  const isPredator = f.state === 'hunt';
  const isPrey     = f.state === 'flee';
  let maxSp = f.speedScalar;
  if (isPredator) maxSp *= 1.25;
  if (isPrey)     maxSp *= 1.55;
  // bigger fish move slower (proportionally)
  maxSp *= Math.max(0.55, 1 - f.size * 0.005);
  if (sp > maxSp){ f.vx *= maxSp/sp; f.vy *= maxSp/sp; }
  // facing follows velocity
  if (sp > 5){
    const t = Math.atan2(f.vy, f.vx);
    let dA = ((t - f.facing + Math.PI*3) % (Math.PI*2)) - Math.PI;
    f.facing += dA * (1 - Math.exp(-6 * dt));
  }
  // move
  f.worldX += f.vx * dt;
  f.worldY += f.vy * dt;
  // soft world wrap so fish don't escape forever — push them back.
  const margin = 60;
  if (f.worldX >  WORLD_W/2 + margin){ f.worldX =  WORLD_W/2 + margin; f.vx *= -0.6; }
  if (f.worldX < -WORLD_W/2 - margin){ f.worldX = -WORLD_W/2 - margin; f.vx *= -0.6; }
  if (f.worldY >  WORLD_H/2 + margin){ f.worldY =  WORLD_H/2 + margin; f.vy *= -0.6; }
  if (f.worldY < -WORLD_H/2 - margin){ f.worldY = -WORLD_H/2 - margin; f.vy *= -0.6; }
}

// === Eat resolution ===
function resolveEats(){
  // For each pair within bite radius, larger eats smaller (at PREY_RATIO).
  // O(N²) but N≈50 so fine.
  for (let i = 0; i < fishes.length; i++){
    const a = fishes[i];
    for (let j = i+1; j < fishes.length; j++){
      const b = fishes[j];
      const dx = a.worldX - b.worldX;
      const dy = a.worldY - b.worldY;
      const d = Math.hypot(dx, dy);
      const collide = (a.size + b.size) * 0.45;
      if (d > collide) continue;
      let eater = null, eaten = null;
      if (a.size > b.size * (1/PREY_RATIO)){ eater = a; eaten = b; }
      else if (b.size > a.size * (1/PREY_RATIO)){ eater = b; eaten = a; }
      else {
        // similar size — bump
        const ang = Math.atan2(dy, dx);
        const push = (collide - d) * 0.5;
        a.worldX += Math.cos(ang) * push * 0.5;
        a.worldY += Math.sin(ang) * push * 0.5;
        b.worldX -= Math.cos(ang) * push * 0.5;
        b.worldY -= Math.sin(ang) * push * 0.5;
        continue;
      }
      // perform eat
      eater.size += eaten.size * 0.30;
      eater.kills++;
      kills++;
      // ARASAIN bounty: eating the plankton is a much bigger deal —
      // size pop, golden burst, the eater's name flashed in the feed.
      if (eaten.isPlankton){
        eater.size += 6;            // bonus chunk on top of the normal stake
        plankton = null;
        planktonRespawnT = 5 + Math.random() * 4;
        planktonKilledBy = eater.name || ('a ' + sizeWord(eater.size) + ' fish');
        spawnPlanktonBurst(eaten);
      }
      // record event
      addFeedItem(eater, eaten);
      // burst
      spawnEatBurst(eaten);
      sndEat(eater.size);
      // remove eaten
      const idx = fishes.indexOf(eaten);
      if (idx >= 0) fishes.splice(idx, 1);
      // adjust j if we removed something at index <= j
      if (idx <= j) j--;
      // if eater was at index i and eaten was below it, the array shifted but
      // i still points to eater since eaten was at idx > i (j > i). Safe.
      break;
    }
  }
}

// === Population maintenance ===
const TARGET_POP_BASE = 50;
function targetPop(){
  // Rough constant population, scaled gently by total mass.
  let totalMass = 0;
  for (const f of fishes) totalMass += f.size;
  return Math.max(28, Math.min(70, Math.floor(TARGET_POP_BASE - (fishes.length / 30))));
}
let spawnAcc = 0;
function maintainPopulation(dt){
  spawnAcc += dt;
  // Spawn rate: fast if pop low, slow if pop high.
  const want = targetPop();
  const ratio = fishes.length / want;
  const rate = ratio < 0.7 ? 4.0 : ratio < 1.0 ? 1.2 : 0.4;
  while (spawnAcc > 1/rate && fishes.length < 80){
    spawnAcc -= 1/rate;
    const f = spawnAtEdge({});
    // 30% chance the new fish gets a name (keeps chat handles cycling in)
    if (Math.random() < 0.30 && chatNames.length){
      // Avoid duplicating an alive named fish.
      const aliveNames = new Set(fishes.filter(x => x.name).map(x => x.name));
      let candidate = nextName();
      let tries = 0;
      while (candidate && aliveNames.has(candidate) && tries < 6){
        candidate = nextName();
        tries++;
      }
      if (candidate) f.name = candidate;
    }
    fishes.push(f);
  }
}

// === Particles + audio ===
const particles = [];
function spawnEatBurst(f){
  for (let i = 0; i < 14; i++){
    particles.push({
      worldX: f.worldX, worldY: f.worldY,
      vx: (Math.random()-0.5)*120, vy: (Math.random()-0.5)*120,
      life: 0.6 + Math.random()*0.5,
      maxLife: 0.6 + Math.random()*0.5,
      color: f.palette.body,
      size: 2 + Math.random()*4,
    });
  }
}
function spawnPlanktonBurst(f){
  // Bigger, golden burst when ARASAIN is consumed.
  for (let i = 0; i < 28; i++){
    particles.push({
      worldX: f.worldX, worldY: f.worldY,
      vx: (Math.random()-0.5)*220, vy: (Math.random()-0.5)*220,
      life: 1.0 + Math.random()*0.8,
      maxLife: 1.0 + Math.random()*0.8,
      color: i % 3 === 0 ? '#f5c453' : (i % 3 === 1 ? '#aef0ff' : '#dff5fb'),
      size: 3 + Math.random()*5,
    });
  }
}
function tickParticles(dt){
  for (let i = particles.length-1; i >= 0; i--){
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0){ particles.splice(i, 1); continue; }
    p.worldX += p.vx * dt;
    p.worldY += p.vy * dt;
    p.vx *= Math.pow(0.92, dt*60);
    p.vy *= Math.pow(0.92, dt*60);
  }
}

let actx = null, masterGain = null, droneGain = null, muted = false;
function ensureAudio(){
  if (actx) return;
  try{
    actx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = actx.createGain();
    masterGain.gain.value = muted ? 0 : 0.30;
    masterGain.connect(actx.destination);
    droneGain = actx.createGain(); droneGain.gain.value = 0.06;
    droneGain.connect(masterGain);
    const o1 = actx.createOscillator(); o1.type='sine'; o1.frequency.value = 55;
    const o2 = actx.createOscillator(); o2.type='triangle'; o2.frequency.value = 82.4;
    const lp = actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 360; lp.Q.value = 0.6;
    o1.connect(lp); o2.connect(lp); lp.connect(droneGain);
    o1.start(); o2.start();
  } catch(e){}
}
function toggleMute(){
  muted = !muted;
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.30;
  const btn = document.getElementById('muteBtn');
  btn.textContent = muted ? '✕' : '♪';
  btn.setAttribute('aria-pressed', muted ? 'true' : 'false');
}
document.getElementById('muteBtn').addEventListener('click', () => { ensureAudio(); toggleMute(); });
function blip(freq, dur, type, vol, slide){
  if (!actx) return;
  const o = actx.createOscillator(); o.type = type || 'triangle';
  o.frequency.setValueAtTime(freq, actx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, actx.currentTime + dur);
  const g = actx.createGain(); g.gain.value = 0;
  o.connect(g); g.connect(masterGain);
  const t = actx.currentTime;
  g.gain.linearRampToValueAtTime(vol || 0.12, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
}
function noiseBurst(dur, freq, q, vol){
  if (!actx) return;
  const buf = actx.createBuffer(1, Math.floor(actx.sampleRate*dur), actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = freq||1000; bp.Q.value = q||3;
  const g = actx.createGain(); g.gain.value = vol||0.18;
  src.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start();
}
// Eat pitch scales with eater size — bigger eats = lower thunk
let lastEatT = 0;
function sndEat(eaterSize){
  // Throttle in case of cascade so we don't spam.
  const now = performance.now();
  if (now - lastEatT < 60) return;
  lastEatT = now;
  const base = 720 - Math.min(560, eaterSize * 8);
  blip(base, 0.10, 'triangle', 0.12, base * 1.6);
  noiseBurst(0.08, 1400, 1.5, 0.06);
}

// === Hunt feed ===
const FEED_VERBS = ['snapped up', 'devoured', 'consumed', 'engulfed', 'snacked on', 'inhaled', 'swallowed', 'ambushed'];
const feedItems = [];   // {who, prey, t}
const FEED_TTL = 8;     // seconds
function addFeedItem(eater, eaten){
  const eaterTag = eater.name || ('a ' + sizeWord(eater.size) + ' fish');
  const eatenTag = eaten.name || ('a ' + sizeWord(eaten.size) + ' fish');
  // Special verbs reserved for the plankton bounty
  const verb = eaten.isPlankton
    ? (Math.random() < 0.5 ? 'CLAIMED THE BOUNTY ON' : 'cracked open')
    : FEED_VERBS[Math.floor(Math.random()*FEED_VERBS.length)];
  feedItems.unshift({
    text: `<b>${eaterTag}</b> ${verb} <b>${eatenTag}</b>`,
    t: 0,
    named: !!(eater.name || eaten.name),
    bounty: !!eaten.isPlankton,
  });
  while (feedItems.length > 6) feedItems.pop();
}
function sizeWord(s){
  if (s < 14) return 'tiny';
  if (s < 24) return 'small';
  if (s < 36) return 'medium';
  if (s < 50) return 'large';
  return 'colossal';
}

// === HUD ===
const hPop   = document.getElementById('hPop');
const hNamed = document.getElementById('hNamed');
const hKills = document.getElementById('hKills');
const hApex  = document.getElementById('hApex');
const hPlankton = document.getElementById('hPlankton');
const lbList = document.getElementById('lbList');
const feedListEl = document.getElementById('feedList');
let hudAcc = 0;
function refreshHud(){
  hPop.textContent = fishes.length;
  let namedAlive = 0;
  for (const f of fishes) if (f.name) namedAlive++;
  hNamed.textContent = namedAlive;
  hKills.textContent = kills;
  // ARASAIN status — alive = "ALIVE", dead = countdown, otherwise pending
  if (plankton){
    hPlankton.textContent = 'ALIVE';
    hPlankton.style.color = '#aef0ff';
  } else if (planktonRespawnT > 0){
    hPlankton.textContent = 'RESPAWN ' + Math.ceil(planktonRespawnT) + 's';
    hPlankton.style.color = '#e7704c';
  } else {
    hPlankton.textContent = '—';
    hPlankton.style.color = '';
  }
  // leaderboard: top 5 named by size
  const named = fishes.filter(f => f.name).slice().sort((a, b) => b.size - a.size);
  const top = named.slice(0, 5);
  hApex.textContent = top.length ? top[0].name : '—';
  apexName = hApex.textContent;
  lbList.innerHTML = top.map((f, i) => {
    const cls = i === 0 ? 'sz king' : 'sz';
    return `<li><span class="nm">${i+1}. ${f.name}</span><span class="${cls}">${f.size.toFixed(1)}</span></li>`;
  }).join('') || '<li><span class="nm" style="opacity:0.6">no named fish yet…</span></li>';
  // feed
  feedListEl.innerHTML = feedItems.map(it =>
    `<li class="${it.t > FEED_TTL*0.6 ? 'fade' : ''}">${it.text}</li>`
  ).join('') || '<li style="opacity:0.5">silence in the deep…</li>';
}

// === Render (mostly preserved from previous version) ===
function drawBackground(t){
  const g = ctx.createRadialGradient(W/2, H*0.4, 40, W/2, H*0.5, Math.max(W,H)*0.85);
  g.addColorStop(0, '#0a3954');
  g.addColorStop(0.55, '#062537');
  g.addColorStop(1, '#020e16');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.globalAlpha = 0.10;
  ctx.fillStyle = '#dff5fb';
  for (let i = 0; i < 5; i++){
    const x = (i * W * 0.27 + Math.sin(t * 0.0002 + i * 1.4) * W * 0.06) % (W * 1.2) - W * 0.1;
    ctx.beginPath();
    ctx.moveTo(x, -20);
    ctx.lineTo(x + 80, -20);
    ctx.lineTo(x + 240 + Math.sin(t * 0.0006 + i) * 30, H);
    ctx.lineTo(x - 100 + Math.sin(t * 0.0005 + i * 2) * 20, H);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
  ctx.fillStyle = 'rgba(223,245,251,0.30)';
  for (let i = 0; i < 28; i++){
    const phase = (t * 0.00006 + i * 0.143) % 1;
    const bx = ((i * W * 0.067 + Math.sin(t * 0.0003 + i) * 30) % W + W) % W;
    const by = (1 - phase) * H + Math.sin(t * 0.002 + i) * 8;
    const r = 1.2 + ((i * 7) % 5);
    ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.fill();
  }
}

function drawPlankton(f){
  // Plankton: tiny luminous orb with pulsing halo + spotlight beam, so
  // chat can spot ARASAIN at any zoom level.
  const [sx, sy] = worldToScreen(f.worldX, f.worldY);
  const z = viewScale();
  const r = Math.max(3, f.size * z * 0.55);
  const t = performance.now() * 0.004;
  const pulse = 1 + Math.sin(t) * 0.18;
  // Outer halo (large, so it's locatable)
  const haloR = r * 8 * pulse;
  const halo = ctx.createRadialGradient(sx, sy, r*0.5, sx, sy, haloR);
  halo.addColorStop(0,    'rgba(245,196,83,0.55)');
  halo.addColorStop(0.55, 'rgba(174,240,255,0.18)');
  halo.addColorStop(1,    'rgba(174,240,255,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(sx, sy, haloR, 0, Math.PI*2); ctx.fill();
  // Body — small bright orb
  const body = ctx.createRadialGradient(sx - r*0.3, sy - r*0.3, 0, sx, sy, r);
  body.addColorStop(0, '#ffffff');
  body.addColorStop(0.4, '#aef0ff');
  body.addColorStop(1, '#5fc1b3');
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(sx, sy, r * pulse, 0, Math.PI*2); ctx.fill();
  // Antennae / cilia — three radiating dots
  ctx.fillStyle = '#aef0ff';
  for (let i = 0; i < 3; i++){
    const a = t + i * Math.PI*2/3;
    ctx.beginPath();
    ctx.arc(sx + Math.cos(a) * r * 1.6, sy + Math.sin(a) * r * 1.6, r * 0.22, 0, Math.PI*2);
    ctx.fill();
  }
  // Always-on label in coral
  ctx.font = `${Math.max(11, r * 1.6)}px 'Major Mono Display', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const text = f.name;
  const tw = ctx.measureText(text).width;
  const padX = 6, padY = 3;
  const labelY = sy + r + 8;
  ctx.fillStyle = 'rgba(3,23,34,0.85)';
  roundRect(ctx, sx - tw/2 - padX, labelY, tw + padX*2, parseInt(ctx.font, 10) + padY*2, 4);
  ctx.fill();
  ctx.fillStyle = '#e7704c';
  ctx.fillText(text, sx, labelY + padY);
  // Tag arrow
  ctx.fillStyle = 'rgba(3,23,34,0.85)';
  ctx.beginPath();
  ctx.moveTo(sx - 5, labelY);
  ctx.lineTo(sx + 5, labelY);
  ctx.lineTo(sx,     labelY - 6);
  ctx.closePath(); ctx.fill();
}

function drawFish(f){
  if (f.isPlankton){ drawPlankton(f); return; }
  const [sx, sy] = worldToScreen(f.worldX, f.worldY);
  const z = viewScale();
  const len = f.size * z;
  if (len < 2) return;
  if (sx < -len*2 || sx > W+len*2 || sy < -len*2 || sy > H+len*2) return;
  const wagAng = Math.sin(performance.now()*0.012 + f.seed*0.01) * (0.18 + 0.06 * Math.sin(performance.now()*0.005 + f.seed));
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(f.facing);
  const bodyL = len, bodyH = len * 0.40;
  // glow under named fish
  if (f.name){
    ctx.save();
    ctx.globalAlpha = 0.30;
    ctx.fillStyle = '#f5c453';
    ctx.beginPath(); ctx.ellipse(0, 0, bodyL*0.7, bodyH*1.3, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // tail
  ctx.fillStyle = f.palette.fin;
  ctx.beginPath();
  const tx = -bodyL*0.42;
  const tw = bodyL * 0.3;
  const th = bodyH * 1.4;
  ctx.moveTo(tx, 0);
  ctx.lineTo(tx - tw, -th/2 + Math.sin(wagAng)*th*0.2);
  ctx.lineTo(tx - tw*0.7, 0);
  ctx.lineTo(tx - tw,  th/2 + Math.sin(wagAng+0.5)*th*0.2);
  ctx.closePath(); ctx.fill();
  // top fin
  ctx.beginPath();
  ctx.moveTo(-bodyL*0.05, -bodyH*0.55);
  ctx.lineTo( bodyL*0.10, -bodyH*1.1);
  ctx.lineTo( bodyL*0.20, -bodyH*0.55);
  ctx.closePath(); ctx.fill();
  // bottom fin
  ctx.beginPath();
  ctx.moveTo(-bodyL*0.10, bodyH*0.55);
  ctx.lineTo(-bodyL*0.05, bodyH*0.95);
  ctx.lineTo( bodyL*0.05, bodyH*0.55);
  ctx.closePath(); ctx.fill();
  // body
  const grad = ctx.createLinearGradient(0, -bodyH, 0, bodyH);
  grad.addColorStop(0, f.palette.body);
  grad.addColorStop(0.55, f.palette.body);
  grad.addColorStop(1, f.palette.belly);
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(0, 0, bodyL*0.5, bodyH, 0, 0, Math.PI*2); ctx.fill();
  // gill arc
  ctx.strokeStyle = f.palette.fin;
  ctx.lineWidth = Math.max(1, bodyL*0.012);
  ctx.beginPath();
  ctx.arc(bodyL*0.18, 0, bodyH*0.55, -0.7, 0.7);
  ctx.stroke();
  // eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bodyL*0.34, -bodyH*0.18, Math.max(1.4, bodyL*0.05), 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0d1018';
  ctx.beginPath(); ctx.arc(bodyL*0.36, -bodyH*0.18, Math.max(0.9, bodyL*0.025), 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // === Name label (unrotated so always readable) ===
  if (f.name){
    ctx.save();
    ctx.font = `${Math.max(10, Math.min(20, len*0.22))}px 'Major Mono Display', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const labelY = sy + bodyH + 6;
    const text = f.name;
    const w = ctx.measureText(text).width;
    const padX = 6, padY = 3;
    ctx.fillStyle = 'rgba(3,23,34,0.78)';
    roundRect(ctx, sx - w/2 - padX, labelY, w + padX*2, parseInt(ctx.font, 10) + padY*2, 4);
    ctx.fill();
    // apex coral, others foam
    ctx.fillStyle = (f.name === apexName) ? '#e7704c' : '#dff5fb';
    ctx.fillText(text, sx, labelY + padY);
    ctx.fillStyle = 'rgba(3,23,34,0.78)';
    ctx.beginPath();
    ctx.moveTo(sx - 5, labelY);
    ctx.lineTo(sx + 5, labelY);
    ctx.lineTo(sx,     labelY - 6);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawParticles(){
  for (const p of particles){
    const [sx, sy] = worldToScreen(p.worldX, p.worldY);
    const a = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(sx, sy, p.size, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function draw(){
  drawBackground(performance.now());
  // Sort by size desc — big rendered first (behind), small on top
  const sorted = fishes.slice().sort((a, b) => b.size - a.size);
  for (const f of sorted) drawFish(f);
  drawParticles();
}

// === Input (P pause, M mute) ===
window.addEventListener('keydown', e => {
  if (e.code === 'KeyP') togglePause();
  if (e.code === 'KeyM'){ ensureAudio(); toggleMute(); }
});
sea.addEventListener('pointerdown', () => ensureAudio());

// === Loop (fixed-step) ===
const FIXED_DT = 1/120;
const MAX_DT = 0.25;
const MAX_STEPS = 8;
let prev = performance.now();
let physAcc = 0;
let state = 'playing';
function update(dt){
  for (const f of fishes) tickAI(f, dt);
  resolveEats();
  tickParticles(dt);
  maintainPopulation(dt);
  // Plankton respawn — ARASAIN never stays gone for long.
  if (!plankton && planktonRespawnT > 0){
    planktonRespawnT -= dt;
    if (planktonRespawnT <= 0){
      spawnPlankton();
      // Announce its return so chat sees the chase resume.
      feedItems.unshift({ text: `<b>ARASAIN</b> drifts back into the deep`, t: 0, named: true });
      while (feedItems.length > 6) feedItems.pop();
    }
  }
  // Age out feed items
  for (let i = feedItems.length - 1; i >= 0; i--){
    feedItems[i].t += dt;
    if (feedItems[i].t > FEED_TTL) feedItems.splice(i, 1);
  }
  hudAcc += dt;
  if (hudAcc > 0.18){ hudAcc = 0; refreshHud(); }
}
function loop(now){
  let dt = (now - prev) / 1000;
  prev = now;
  if (dt > MAX_DT) dt = MAX_DT;
  if (state === 'playing'){
    physAcc += dt;
    let steps = 0;
    while (physAcc >= FIXED_DT && steps < MAX_STEPS){
      update(FIXED_DT);
      physAcc -= FIXED_DT;
      steps++;
    }
    if (steps >= MAX_STEPS) physAcc = 0;
  } else {
    physAcc = 0;
  }
  draw();
  requestAnimationFrame(loop);
}

// === Pause overlay ===
const ovPause = document.getElementById('ovPause');
function togglePause(){
  if (state === 'playing'){
    state = 'paused';
    ovPause.hidden = false;
    ovPause.inert = false;
  } else {
    state = 'playing';
    ovPause.hidden = true;
    ovPause.inert = true;
    prev = performance.now();
  }
}
ovPause.inert = true;

// === Boot ===
(async () => {
  await loadChatNames();
  seedOcean();
  refreshHud();
  prev = performance.now();
  requestAnimationFrame(loop);
})();
</script>
