<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BF Snake</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧠">
<meta property="og:title" content="BF Snake">
<meta property="og:description" content="Snake game where food is brainfuck characters. Eat code, watch it execute on a live memory tape.">
<meta property="og:url" content="https://sloppy.live/bf-snake/">
<meta property="og:image" content="https://sloppy.live/bf-snake/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--tape:#0d0f18;--cell:#1a1d2e;--ptr:#00ff88;--ptr2:#00cc66;--food:#ffaa00;--dead:#ff3355;--dim:rgba(255,255,255,0.35);--text:#c8ccd4;--border:rgba(0,255,136,0.12)}
html,body{width:100%;height:100dvh;overflow:hidden;background:var(--bg);font-family:'Fira Code',monospace;color:var(--text)}
#wrap{display:flex;flex-direction:column;height:100dvh}
canvas{flex:1;display:block;cursor:none;touch-action:none}
#tape-area{background:var(--tape);border-top:1px solid var(--border);padding:6px 8px;flex-shrink:0}
#tape-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:11px;color:var(--dim)}
#tape-header span{color:var(--ptr)}
#memory-tape{display:flex;gap:2px;overflow-x:auto;padding:2px 0;scrollbar-width:thin;scrollbar-color:rgba(0,255,136,0.2) transparent}
#memory-tape::-webkit-scrollbar{height:4px}
#memory-tape::-webkit-scrollbar-thumb{background:rgba(0,255,136,0.2);border-radius:2px}
.mem-cell{min-width:28px;height:34px;background:var(--cell);border:1px solid var(--border);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--dim);flex-shrink:0;transition:all .15s}
.mem-cell.active{border-color:var(--ptr);color:var(--ptr);background:rgba(0,255,136,0.06)}
.mem-cell .val{font-size:12px;font-weight:700}
#program-row{display:flex;gap:1px;margin-top:4px;overflow-x:auto;padding:2px 0;scrollbar-width:thin;scrollbar-color:rgba(255,170,0,0.2) transparent}
#program-row::-webkit-scrollbar{height:3px}
#program-row::-webkit-scrollbar-thumb{background:rgba(255,170,0,0.2);border-radius:2px}
.prog-char{font-size:13px;font-weight:700;color:var(--food);opacity:0.6;padding:0 1px;flex-shrink:0}
.prog-char.exec{opacity:1;color:#fff}
.prog-char.cur{color:var(--ptr);opacity:1;text-decoration:underline}
#output-row{font-size:11px;color:var(--ptr);margin-top:3px;min-height:14px;white-space:pre;overflow-x:auto}
#start-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(10,10,15,0.95)}
#start-screen h1{font-size:clamp(28px,5vw,48px);font-weight:700;color:var(--ptr);margin-bottom:8px;letter-spacing:-1px}
#start-screen .sub{font-size:clamp(12px,2vw,16px);color:var(--dim);margin-bottom:24px;text-align:center;max-width:320px;line-height:1.5}
#start-screen button{font-family:'Fira Code',monospace;font-size:16px;font-weight:600;background:rgba(0,255,136,0.1);border:1px solid var(--ptr);border-radius:8px;color:var(--ptr);padding:12px 32px;cursor:pointer;transition:all .2s}
#start-screen button:hover{background:rgba(0,255,136,0.2)}
#start-screen .keys{font-size:11px;color:var(--dim);margin-top:16px}
#game-over{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(10,10,15,0.92)}
#game-over h2{font-size:clamp(24px,4vw,40px);font-weight:700;color:var(--dead);margin-bottom:6px}
#game-over .score{font-size:18px;color:var(--food);margin-bottom:6px}
#game-over .prog{font-size:12px;color:var(--dim);margin-bottom:16px;max-width:80%;word-break:break-all;text-align:center}
#game-over button{font-family:'Fira Code',monospace;font-size:14px;font-weight:600;background:rgba(0,255,136,0.1);border:1px solid var(--ptr);border-radius:8px;color:var(--ptr);padding:10px 28px;cursor:pointer}
#hud{position:absolute;top:8px;left:10px;z-index:5;font-size:12px;color:var(--dim)}
#hud span{color:var(--ptr)}
#dpad{display:none;position:fixed;bottom:130px;right:12px;z-index:30;width:130px;height:130px}
#dpad button{position:absolute;width:42px;height:42px;border-radius:6px;border:1px solid var(--border);background:rgba(0,255,136,0.06);color:var(--ptr);font-size:18px;font-weight:700;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#dpad .up{top:0;left:50%;transform:translateX(-50%)}
#dpad .down{bottom:0;left:50%;transform:translateX(-50%)}
#dpad .left{top:50%;left:0;transform:translateY(-50%)}
#dpad .right{top:50%;right:0;transform:translateY(-50%)}
@media(pointer:coarse){#dpad{display:block}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="cv"></canvas>
<div id="tape-area">
  <div id="tape-header"><span>MEMORY TAPE</span><span id="ptrIdx">PTR:0</span></div>
  <div id="memory-tape"></div>
  <div id="program-row"></div>
  <div id="output-row"></div>
</div>
</div>
<div id="hud">SCORE: <span id="scoreEl">0</span></div>
<div id="start-screen">
  <h1>BF Snake</h1>
  <div class="sub">Eat brainfuck characters.<br>Watch your program execute on the memory tape in real-time.</div>
  <button id="startBtn">START</button>
  <div class="keys">WASD / Arrows / Swipe</div>
</div>
<div id="game-over">
  <h2>SEGFAULT</h2>
  <div class="score" id="finalScore"></div>
  <div class="prog" id="finalProg"></div>
  <button id="retryBtn">RETRY</button>
</div>
<div id="dpad">
  <button class="up" data-dir="0">&#9650;</button>
  <button class="down" data-dir="2">&#9660;</button>
  <button class="left" data-dir="3">&#9664;</button>
  <button class="right" data-dir="1">&#9654;</button>
</div>
<script>
var CV=document.getElementById('cv'),X=CV.getContext('2d');
var startScreen=document.getElementById('start-screen');
var gameOverScreen=document.getElementById('game-over');
var scoreEl=document.getElementById('scoreEl');
var memoryTape=document.getElementById('memory-tape');
var programRow=document.getElementById('program-row');
var outputRow=document.getElementById('output-row');
var ptrIdxEl=document.getElementById('ptrIdx');

var GRID=20; // cell size
var COLS,ROWS;
var snake=[],dir=1,nextDir=1; // 0=up,1=right,2=down,3=left
var food={x:0,y:0,ch:''};
var BF_CHARS=['+','+','+','-','-','>','>','<','[',']','.'];
var score=0;
var gameState='start'; // start, playing, dead
var moveTimer=0;
var MOVE_INTERVAL=0.12;
var program=[];
var bfMem=[];
var bfPtr=0;
var bfPC=0;
var bfOutput='';
var bfStepsPerTick=3;
var bfRunning=false;

// DX/DY for directions
var DX=[0,1,0,-1],DY=[-1,0,1,0];

function resize(){
  var tapeH=document.getElementById('tape-area').offsetHeight||100;
  CV.width=window.innerWidth;
  CV.height=window.innerHeight-tapeH;
  COLS=Math.floor(CV.width/GRID);
  ROWS=Math.floor(CV.height/GRID);
}
resize();
window.addEventListener('resize',resize);

function initGame(){
  var cx=Math.floor(COLS/2),cy=Math.floor(ROWS/2);
  snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir=1;nextDir=1;
  score=0;scoreEl.textContent='0';
  program=[];
  bfMem=new Array(30).fill(0);
  bfPtr=0;bfPC=0;bfOutput='';bfRunning=false;
  moveTimer=0;
  MOVE_INTERVAL=0.12;
  spawnFood();
  updateTapeUI();
  updateProgramUI();
  outputRow.textContent='';
}

function spawnFood(){
  var attempts=0;
  do{
    food.x=Math.floor(Math.random()*COLS);
    food.y=Math.floor(Math.random()*ROWS);
    attempts++;
  }while(isSnake(food.x,food.y)&&attempts<200);
  food.ch=BF_CHARS[Math.floor(Math.random()*BF_CHARS.length)];
}

function isSnake(x,y){
  for(var i=0;i<snake.length;i++) if(snake[i].x===x&&snake[i].y===y) return true;
  return false;
}

// --- BF INTERPRETER (stepped) ---
function findMatchingBracket(pc,dir){
  var depth=0;
  while(pc>=0&&pc<program.length){
    if(program[pc]==='[') depth+=dir;
    if(program[pc]===']') depth-=dir;
    if(depth===0) return pc;
    pc+=dir;
  }
  return -1;
}

function bfStep(){
  if(bfPC>=program.length){bfRunning=false;return;}
  var ch=program[bfPC];
  switch(ch){
    case '+': bfMem[bfPtr]=(bfMem[bfPtr]+1)&255; break;
    case '-': bfMem[bfPtr]=(bfMem[bfPtr]-1+256)&255; break;
    case '>': bfPtr++;if(bfPtr>=bfMem.length) bfMem.push(0); break;
    case '<': if(bfPtr>0)bfPtr--; break;
    case '.':
      var c=bfMem[bfPtr];
      if(c>=32&&c<127) bfOutput+=String.fromCharCode(c);
      else bfOutput+='\\'+c;
      break;
    case '[':
      if(bfMem[bfPtr]===0){
        var j=findMatchingBracket(bfPC,1);
        if(j>=0) bfPC=j; else {bfRunning=false;return;}
      }
      break;
    case ']':
      if(bfMem[bfPtr]!==0){
        var j=findMatchingBracket(bfPC,-1);
        if(j>=0) bfPC=j; else {bfRunning=false;return;}
      }
      break;
  }
  bfPC++;
  if(bfPC>=program.length) bfRunning=false;
}

function runBFSteps(){
  if(!bfRunning) return;
  var safety=0;
  for(var i=0;i<bfStepsPerTick&&bfRunning;i++){
    bfStep();
    safety++;
    if(safety>500){bfRunning=false;break;}
  }
  updateTapeUI();
  updateProgramUI();
  outputRow.textContent=bfOutput.slice(-60);
}

// --- TAPE UI ---
function updateTapeUI(){
  var showCells=Math.min(bfMem.length,30);
  var html='';
  for(var i=0;i<showCells;i++){
    var active=i===bfPtr?' active':'';
    html+='<div class="mem-cell'+active+'"><div class="val">'+bfMem[i]+'</div><div>'+i+'</div></div>';
  }
  memoryTape.innerHTML=html;
  ptrIdxEl.textContent='PTR:'+bfPtr;
  // Auto-scroll to active cell
  var activeCell=memoryTape.querySelector('.mem-cell.active');
  if(activeCell) activeCell.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function updateProgramUI(){
  var html='';
  for(var i=0;i<program.length;i++){
    var cls='prog-char';
    if(i<bfPC) cls+=' exec';
    if(i===bfPC&&bfRunning) cls+=' cur';
    html+='<span class="'+cls+'">'+program[i]+'</span>';
  }
  programRow.innerHTML=html;
  // Auto-scroll to end
  programRow.scrollLeft=programRow.scrollWidth;
}

// --- INPUT ---
document.addEventListener('keydown',function(e){
  if(gameState==='start'){if(e.key==='Enter'||e.key===' '){startGame();return;}}
  if(gameState==='dead'){if(e.key==='Enter'||e.key===' '){restartGame();return;}}
  if(gameState!=='playing') return;
  switch(e.key){
    case'ArrowUp':case'w':case'W': if(dir!==2) nextDir=0; break;
    case'ArrowRight':case'd':case'D': if(dir!==3) nextDir=1; break;
    case'ArrowDown':case's':case'S': if(dir!==0) nextDir=2; break;
    case'ArrowLeft':case'a':case'A': if(dir!==1) nextDir=3; break;
  }
});

// Swipe
var touchStart=null;
CV.addEventListener('touchstart',function(e){
  touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:true});
CV.addEventListener('touchend',function(e){
  if(!touchStart||gameState!=='playing') return;
  var dx=e.changedTouches[0].clientX-touchStart.x;
  var dy=e.changedTouches[0].clientY-touchStart.y;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20&&dir!==3) nextDir=1;
    else if(dx<-20&&dir!==1) nextDir=3;
  }else{
    if(dy>20&&dir!==0) nextDir=2;
    else if(dy<-20&&dir!==2) nextDir=0;
  }
  touchStart=null;
});

// D-pad
document.getElementById('dpad').addEventListener('click',function(e){
  var btn=e.target.closest('button');
  if(!btn||gameState!=='playing') return;
  var d=parseInt(btn.dataset.dir);
  if((d===0&&dir!==2)||(d===1&&dir!==3)||(d===2&&dir!==0)||(d===3&&dir!==1)) nextDir=d;
});

function startGame(){
  startScreen.style.display='none';
  gameOverScreen.style.display='none';
  gameState='playing';
  initGame();
}
function restartGame(){
  gameOverScreen.style.display='none';
  gameState='playing';
  initGame();
}
function die(){
  gameState='dead';
  gameOverScreen.style.display='flex';
  document.getElementById('finalScore').textContent='PROGRAM LENGTH: '+program.length;
  document.getElementById('finalProg').textContent=program.join('')||'(empty)';
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',restartGame);

// --- GAME LOOP ---
function moveSnake(){
  dir=nextDir;
  var head=snake[0];
  var nx=head.x+DX[dir],ny=head.y+DY[dir];
  // Wall collision
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS){die();return;}
  // Self collision
  for(var i=0;i<snake.length-1;i++){
    if(snake[i].x===nx&&snake[i].y===ny){die();return;}
  }
  snake.unshift({x:nx,y:ny});

  // Food collision
  if(nx===food.x&&ny===food.y){
    score++;scoreEl.textContent=score;
    program.push(food.ch);
    // Restart BF execution from beginning with each new char
    bfMem=new Array(30).fill(0);
    bfPtr=0;bfPC=0;bfOutput='';bfRunning=true;
    spawnFood();
    // Speed up slightly
    if(MOVE_INTERVAL>0.06) MOVE_INTERVAL-=0.001;
  }else{
    snake.pop();
  }
}

// --- RENDER ---
function draw(now){
  X.fillStyle=ALL_COLORS_BG;
  X.fillRect(0,0,CV.width,CV.height);

  // Grid dots
  X.fillStyle='rgba(255,255,255,0.02)';
  for(var gx=0;gx<COLS;gx++){
    for(var gy=0;gy<ROWS;gy++){
      X.fillRect(gx*GRID,gy*GRID,1,1);
    }
  }

  // Snake
  for(var i=0;i<snake.length;i++){
    var s=snake[i];
    var t=i/snake.length;
    if(i===0){
      // Head — bright pointer
      X.fillStyle='#00ff88';
      X.shadowColor='#00ff88';X.shadowBlur=12;
      X.fillRect(s.x*GRID+1,s.y*GRID+1,GRID-2,GRID-2);
      X.shadowBlur=0;
      // Pointer symbol
      X.fillStyle='#0a0a0f';
      X.font='bold '+(GRID-6)+'px Fira Code';
      X.textAlign='center';X.textBaseline='middle';
      X.fillText('>',s.x*GRID+GRID/2,s.y*GRID+GRID/2+1);
    }else{
      // Body — gradient fade
      var alpha=1-t*0.7;
      X.fillStyle='rgba(0,204,102,'+alpha+')';
      X.fillRect(s.x*GRID+2,s.y*GRID+2,GRID-3,GRID-3);
    }
  }

  // Food
  var pulse=0.7+0.3*Math.sin(now/200);
  X.fillStyle='rgba(255,170,0,'+pulse*0.2+')';
  X.fillRect(food.x*GRID-4,food.y*GRID-4,GRID+8,GRID+8);
  X.fillStyle='#ffaa00';
  X.shadowColor='#ffaa00';X.shadowBlur=8;
  X.fillRect(food.x*GRID+1,food.y*GRID+1,GRID-2,GRID-2);
  X.shadowBlur=0;
  // Character on food
  X.fillStyle='#0a0a0f';
  X.font='bold '+(GRID-4)+'px Fira Code';
  X.textAlign='center';X.textBaseline='middle';
  X.fillText(food.ch,food.x*GRID+GRID/2,food.y*GRID+GRID/2+1);
}

var ALL_COLORS_BG='#0a0a0f';
var lastTime=performance.now();
function loop(now){
  var dt=(now-lastTime)/1000;lastTime=now;
  if(gameState==='playing'){
    moveTimer+=dt;
    if(moveTimer>=MOVE_INTERVAL){
      moveTimer-=MOVE_INTERVAL;
      moveSnake();
    }
    runBFSteps();
  }
  draw(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
