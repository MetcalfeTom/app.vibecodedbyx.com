<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wolf Howl Dashboard · moon phases &amp; the pack leaderboard</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%BA">
  <meta name="description" content="Tonight's real moon phase, a big HOWL button, and a live leaderboard of the loudest wolves. Howl with the pack.">
  <meta property="og:title" content="Wolf Howl Dashboard — howl at the real moon">
  <meta property="og:description" content="Live moon phase, synthesized wolf howls, and a pack leaderboard. Full moon nights count double.">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/wolf%20silhouette%20howling%20at%20giant%20full%20moon%20over%20pine%20forest%20night%20indigo%20sky%20stars%20minimal%20poster?width=1200&height=630&seed=2953&nologo=true&model=flux">
  <meta property="og:url" content="https://sloppy.live/wolf-howl-dashboard">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;700;900&family=Alegreya:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --night:#0a0e1f;
      --night-deep:#060814;
      --mist:#8f9bc4;
      --bone:#e8e4d8;
      --moon:#f2ecd8;
      --moon-shadow:#1c2138;
      --gold:#e8c56a;
      --blood:#b3402e;
      --pine:#0d1326;
      --panel:rgba(16,21,42,0.72);
      --line:rgba(143,155,196,0.22);
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; min-height:100%; }
    body{
      background:var(--night);
      color:var(--bone);
      font:400 1rem/1.6 'Alegreya', serif;
      background-image:
        radial-gradient(ellipse 70rem 45rem at 50% -18%, #17203f 0%, transparent 62%),
        radial-gradient(ellipse 40rem 26rem at 88% 108%, rgba(30,24,58,0.9), transparent 60%),
        linear-gradient(var(--night) 0%, var(--night-deep) 100%);
      min-height:100vh;
      overflow-x:hidden;
    }
    #stars{ position:fixed; inset:0; z-index:0; pointer-events:none; }
    .pines{
      position:fixed; left:0; right:0; bottom:0; height:8.5rem; z-index:1;
      pointer-events:none; opacity:0.95;
    }
    .wrap{
      position:relative; z-index:2;
      max-width:64rem; margin:0 auto;
      padding:1.6rem 1.25rem 11rem;
    }
    header{ text-align:center; margin-bottom:1.2rem; }
    h1{
      font:900 clamp(2.6rem,8vw,4.2rem)/1 'Grenze Gotisch', serif;
      margin:0; letter-spacing:0.01em;
      color:var(--bone);
      text-shadow:0 0 28px rgba(242,236,216,0.18);
    }
    h1 .o{ color:var(--gold); }
    .sub{
      font:italic 400 1rem 'Alegreya', serif;
      color:var(--mist); margin:0.3rem 0 0;
    }
    .fullmoon-banner{
      display:none;
      margin:0.9rem auto 0; max-width:26rem;
      border:1px solid rgba(232,197,106,0.5);
      background:rgba(232,197,106,0.1);
      color:var(--gold);
      font:600 0.85rem 'IBM Plex Mono', monospace;
      letter-spacing:0.14em; text-transform:uppercase;
      padding:0.5rem 1rem; text-align:center;
      animation:bannerPulse 2.8s ease-in-out infinite;
    }
    .fullmoon-banner.on{ display:block; }
    @keyframes bannerPulse{ 50%{ box-shadow:0 0 24px rgba(232,197,106,0.25);} }
    .grid{
      display:grid; grid-template-columns:1fr 1fr; gap:1.4rem;
      align-items:start;
    }
    @media (max-width:47rem){ .grid{ grid-template-columns:1fr; } }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      backdrop-filter:blur(6px);
      padding:1.3rem;
    }
    /* — moon side — */
    .moon-side{ text-align:center; }
    #moonCanvas{
      width:min(15.5rem, 62vw); height:auto; aspect-ratio:1;
      filter:drop-shadow(0 0 34px rgba(242,236,216,0.22));
    }
    .phase-name{
      font:700 1.7rem/1.15 'Grenze Gotisch', serif;
      margin:0.7rem 0 0.1rem; color:var(--moon);
    }
    .phase-stats{
      font:400 0.78rem 'IBM Plex Mono', monospace;
      color:var(--mist); margin:0.35rem 0 0;
      display:flex; flex-direction:column; gap:0.18rem;
    }
    .phase-stats b{ color:var(--bone); font-weight:600; }
    .phase-stats .nf{ color:var(--gold); }
    /* — howl side — */
    .howl-side{ display:flex; flex-direction:column; gap:1.4rem; }
    .howl-card{ text-align:center; padding:1.6rem 1.3rem; }
    #howlBtn{
      position:relative;
      width:min(13rem,70vw); height:min(13rem,70vw);
      border-radius:50%;
      border:2px solid rgba(232,197,106,0.55);
      background:radial-gradient(circle at 38% 30%, #232b52 0%, #131832 58%, #0b0f22 100%);
      color:var(--bone);
      cursor:pointer;
      font:900 2rem 'Grenze Gotisch', serif;
      letter-spacing:0.08em;
      box-shadow:0 0 0 6px rgba(232,197,106,0.07), 0 10px 40px rgba(0,0,0,0.5);
      transition:transform 0.1s, box-shadow 0.25s;
      display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:0.1rem;
    }
    #howlBtn .wolf{ font-size:3rem; line-height:1; filter:drop-shadow(0 3px 8px rgba(0,0,0,0.6)); }
    #howlBtn:hover{ box-shadow:0 0 0 10px rgba(232,197,106,0.12), 0 0 44px rgba(232,197,106,0.22), 0 10px 40px rgba(0,0,0,0.5); }
    #howlBtn:active{ transform:scale(0.96); }
    #howlBtn:focus-visible{ outline:3px solid var(--gold); outline-offset:4px; }
    #howlBtn:disabled{ opacity:0.6; cursor:default; }
    #howlBtn.howling{ animation:howlRing 1.1s ease-out; }
    @keyframes howlRing{
      0%{ box-shadow:0 0 0 6px rgba(232,197,106,0.35), 0 10px 40px rgba(0,0,0,0.5); }
      100%{ box-shadow:0 0 0 60px rgba(232,197,106,0), 0 10px 40px rgba(0,0,0,0.5); }
    }
    .your-count{
      margin:1rem 0 0;
      font:400 0.85rem 'IBM Plex Mono', monospace; color:var(--mist);
    }
    .your-count b{ color:var(--gold); font-size:1.05rem; }
    .pack-pill{
      margin:0.5rem 0 0;
      font:400 0.72rem 'IBM Plex Mono', monospace; color:var(--mist);
    }
    .pack-pill .dot{ color:#5fae6e; }
    /* — leaderboard — */
    .lb h2{
      font:700 1.35rem 'Grenze Gotisch', serif; margin:0 0 0.7rem;
      color:var(--bone); letter-spacing:0.03em;
    }
    .lb ol{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:0.35rem; }
    .lb li{
      display:flex; align-items:center; gap:0.7rem;
      padding:0.45rem 0.6rem;
      border:1px solid transparent;
      font:400 0.92rem 'Alegreya', serif;
    }
    .lb li.me{ border-color:rgba(232,197,106,0.4); background:rgba(232,197,106,0.06); }
    .lb .rank{
      font:600 0.78rem 'IBM Plex Mono', monospace; color:var(--mist);
      width:1.6rem; text-align:right; flex-shrink:0;
    }
    .lb li:nth-child(1) .rank{ color:var(--gold); }
    .lb .who{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .lb .n{ font:600 0.88rem 'IBM Plex Mono', monospace; color:var(--gold); }
    .lb .empty{ color:var(--mist); font-style:italic; padding:0.4rem 0.6rem; }
    .rename-row{
      display:flex; gap:0.4rem; margin-top:0.85rem;
      border-top:1px dashed var(--line); padding-top:0.85rem;
    }
    #nameInput{
      flex:1; min-width:0;
      background:rgba(10,14,31,0.7); border:1px solid var(--line);
      color:var(--bone); font:400 0.85rem 'IBM Plex Mono', monospace;
      padding:0.5rem 0.7rem; min-height:2.75rem;
    }
    #nameInput:focus{ outline:none; border-color:var(--gold); }
    #nameSave{
      background:transparent; border:1px solid var(--line); color:var(--mist);
      font:600 0.78rem 'IBM Plex Mono', monospace; cursor:pointer;
      padding:0.5rem 0.9rem; min-height:2.75rem;
    }
    #nameSave:hover{ border-color:var(--gold); color:var(--gold); }
    #nameSave:focus-visible, #howlBtn:focus-visible, #nameInput:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
    /* — floating awoos — */
    .awoo{
      position:fixed; z-index:5; pointer-events:none;
      font:700 1.1rem 'Grenze Gotisch', serif; color:var(--gold);
      text-shadow:0 0 14px rgba(232,197,106,0.5);
      animation:awooRise 3.2s ease-out forwards;
      white-space:nowrap;
    }
    .awoo small{ display:block; font:400 0.62rem 'IBM Plex Mono', monospace; color:var(--mist); text-align:center; }
    @keyframes awooRise{
      0%{ opacity:0; transform:translateY(0) rotate(-3deg); }
      12%{ opacity:1; }
      100%{ opacity:0; transform:translateY(-38vh) rotate(4deg); }
    }
    .toast{
      position:fixed; left:50%; bottom:1.2rem; transform:translateX(-50%);
      z-index:9; background:rgba(16,21,42,0.94); border:1px solid var(--line);
      color:var(--bone); font:400 0.85rem 'IBM Plex Mono', monospace;
      padding:0.6rem 1.1rem; opacity:0; transition:opacity 0.25s; pointer-events:none;
      max-width:90vw;
    }
    .toast.show{ opacity:1; }
    @media (prefers-reduced-motion: reduce){
      .awoo{ animation-duration:0.01s; }
      #howlBtn.howling{ animation:none; }
      .fullmoon-banner{ animation:none; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <header>
      <h1>W<span class="o">o</span>lf H<span class="o">o</span>wl Dashb<span class="o">o</span>ard</h1>
      <p class="sub">the moon is real · the howls are yours · the pack is listening</p>

  <script type="module">
    import supabase, { supabaseSession } from '/supabase-config-fixed.js';

    /* ───────── moon math — no API, just the sky ─────────
       Age from the 2000-01-06 18:14 UTC new moon, synodic month 29.530589 d.
       Illuminated fraction = (1 − cos(2π·age/syn))/2. Waxing while age < syn/2. */
    const SYN = 29.53058867;
    const EPOCH = Date.UTC(2000, 0, 6, 18, 14);
    function moonNow(t = Date.now()){
      const days = (t - EPOCH) / 86400000;
      const age = ((days % SYN) + SYN) % SYN;
      const illum = (1 - Math.cos(2 * Math.PI * age / SYN)) / 2;
      const waxing = age < SYN / 2;
      let name;
      if (age < 1.0 || age > SYN - 1.0) name = 'New Moon';
      else if (age < 6.38) name = 'Waxing Crescent';
      else if (age < 8.38) name = 'First Quarter';
      else if (age < 13.77) name = 'Waxing Gibbous';
      else if (age < 15.77) name = 'Full Moon';
      else if (age < 21.15) name = 'Waning Gibbous';
      else if (age < 23.15) name = 'Last Quarter';
      else name = 'Waning Crescent';
      // next full moon: first (n + 0.5)·SYN after now
      const cyclesDone = Math.floor(days / SYN);
      let nextFull = EPOCH + (cyclesDone + 0.5) * SYN * 86400000;
      if (nextFull <= t) nextFull = EPOCH + (cyclesDone + 1.5) * SYN * 86400000;
      return { age, illum, waxing, name, nextFull, isFull: illum >= 0.97 };
    }

    /* ───────── moon render ───────── */
    const mcv = document.getElementById('moonCanvas');
    const mctx = mcv.getContext('2d');
    // deterministic craters
    const CRATERS = (() => {
      let s = 2953; const rnd = () => (s = (s * 16807) % 2147483647) / 2147483647;
      return Array.from({ length: 26 }, () => {
        const a = rnd() * Math.PI * 2, d = Math.sqrt(rnd()) * 0.82;
        return { x: Math.cos(a) * d, y: Math.sin(a) * d, r: 0.03 + rnd() * 0.085, dk: 0.05 + rnd() * 0.1 };
      });
    })();
    function drawMoon(m){
      const W = mcv.width, cx = W / 2, cy = W / 2, r = W * 0.42;
      mctx.clearRect(0, 0, W, W);
      // dark disc
      mctx.fillStyle = '#131a33';
      mctx.beginPath(); mctx.arc(cx, cy, r, 0, Math.PI * 2); mctx.fill();
      // lit region: semicircle on lit side, then terminator ellipse adds (gibbous) or carves (crescent)
      const t = Math.cos(2 * Math.PI * m.age / SYN);   // +1 new → −1 full
      const litRight = m.waxing;                        // northern-hemisphere convention
      const lit = mctx.createRadialGradient(cx - r * 0.25, cy - r * 0.3, r * 0.1, cx, cy, r);
      lit.addColorStop(0, '#f7f2e0'); lit.addColorStop(0.7, '#e9e2c8'); lit.addColorStop(1, '#cfc6a8');
      mctx.fillStyle = lit;
      mctx.beginPath();
      mctx.arc(cx, cy, r, Math.PI / 2, -Math.PI / 2, litRight ? true : false);
      mctx.closePath(); mctx.fill();
      const exr = Math.abs(t) * r;
      if (exr > 0.5){
        mctx.beginPath();
        mctx.ellipse(cx, cy, exr, r, 0, 0, Math.PI * 2);
        mctx.fillStyle = t < 0 ? lit : '#131a33';   // gibbous: extend light · crescent: bite it back
        mctx.fill();
      }
      // craters (barely-there on the dark side by design)
      for (const c of CRATERS){
        mctx.beginPath();
        mctx.arc(cx + c.x * r, cy + c.y * r, c.r * r, 0, Math.PI * 2);
        mctx.fillStyle = 'rgba(90,86,64,' + c.dk + ')';
        mctx.fill();
        mctx.beginPath();
        mctx.arc(cx + c.x * r - c.r * r * 0.18, cy + c.y * r - c.r * r * 0.18, c.r * r * 0.72, 0, Math.PI * 2);
        mctx.fillStyle = 'rgba(255,250,228,' + (c.dk * 0.5) + ')';
        mctx.fill();
      }
      // limb
      mctx.beginPath(); mctx.arc(cx, cy, r, 0, Math.PI * 2);
      mctx.strokeStyle = 'rgba(242,236,216,0.16)'; mctx.lineWidth = 2; mctx.stroke();
    }

    const phaseNameEl = document.getElementById('phaseName');
    const phaseStatsEl = document.getElementById('phaseStats');
    const fmBanner = document.getElementById('fmBanner');
    const dblNote = document.getElementById('dblNote');
    let moon = moonNow();
    function paintMoonUI(){
      moon = moonNow();
      drawMoon(moon);
      phaseNameEl.textContent = moon.name;
      const days = (moon.nextFull - Date.now()) / 86400000;
      const nf = new Date(moon.nextFull);
      phaseStatsEl.innerHTML =
        '<span><b>' + Math.round(moon.illum * 100) + '%</b> illuminated · day <b>' +
        moon.age.toFixed(1) + '</b> of ' + SYN.toFixed(1) + '</span>' +
        '<span class="nf">next full moon: ' + nf.toISOString().slice(0, 10) +
        ' · in ' + (days < 1 ? Math.round(days * 24) + ' h' : days.toFixed(1) + ' days') + '</span>';
      fmBanner.classList.toggle('on', moon.isFull);
      dblNote.textContent = moon.isFull ? '  (×2 tonight)' : '';
    }
    paintMoonUI();
    setInterval(paintMoonUI, 60000);

    /* ───────── star field ───────── */
    const scv = document.getElementById('stars'), sctx = scv.getContext('2d');
    let starList = [];
    function seedStars(){
      scv.width = innerWidth; scv.height = innerHeight;
      starList = Array.from({ length: Math.min(220, innerWidth / 6) }, () => ({
        x: Math.random() * scv.width, y: Math.random() * scv.height * 0.85,
        r: Math.random() * 1.3 + 0.3, p: Math.random() * Math.PI * 2, sp: 0.4 + Math.random() * 1.2
      }));
    }
    seedStars(); addEventListener('resize', seedStars);
    const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
    (function twinkle(t){
      sctx.clearRect(0, 0, scv.width, scv.height);
      for (const s of starList){
        const a = REDUCED ? 0.7 : 0.35 + 0.5 * (0.5 + 0.5 * Math.sin(t / 1000 * s.sp + s.p));
        sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        sctx.fillStyle = 'rgba(232,228,216,' + a + ')'; sctx.fill();
      }
      requestAnimationFrame(twinkle);
    })(0);

    /* ───────── the howl — Web Audio wolf ─────────
       Fundamental glide 240→470 Hz, 1.2s sustain with slow-blooming vibrato,
       mournful fall. Harmonic stack + formant bandpass + breath noise, all
       into a long cave reverb. Distant pack howls: quieter, wetter, panned. */
    let ac = null, verb = null, dryBus = null, wetBus = null;
    function ensureAudio(){
      if (ac) return;
      ac = new (window.AudioContext || window.webkitAudioContext)();
      dryBus = ac.createGain(); dryBus.gain.value = 0.9;
      wetBus = ac.createGain(); wetBus.gain.value = 0.55;
      verb = ac.createConvolver();
      const len = Math.floor(ac.sampleRate * 3.2), buf = ac.createBuffer(2, len, ac.sampleRate);
      for (let ch = 0; ch < 2; ch++){
        const d = buf.getChannelData(ch);
        for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.6);
      }
      verb.buffer = buf;
      dryBus.connect(ac.destination);
      verb.connect(wetBus); wetBus.connect(ac.destination);
    }
    function howlSound(distant){
      ensureAudio();
      if (ac.state === 'suspended') ac.resume();
      const t0 = ac.currentTime + 0.02;
      const DUR = 2.6, vol = distant ? 0.1 : 0.3;
      const out = ac.createGain(); out.gain.value = 1;
      let last = out;
      if (distant && ac.createStereoPanner){
        const pan = ac.createStereoPanner(); pan.pan.value = (Math.random() * 2 - 1) * 0.8;
        out.connect(pan); last = pan;
      }
      last.connect(dryBus); last.connect(verb);
      if (distant) { /* wetter for distance */ }
      // pitch envelope on a base "frequency conductor"
      const jit = 0.94 + Math.random() * 0.12;
      const f0 = 240 * jit, fPeak = 470 * jit, fFall = 320 * jit;
      // vibrato that blooms during the sustain
      const lfo = ac.createOscillator(); lfo.frequency.value = 4.6 + Math.random();
      const lfoG = ac.createGain();
      lfoG.gain.setValueAtTime(0, t0);
      lfoG.gain.linearRampToValueAtTime(0, t0 + 0.55);
      lfoG.gain.linearRampToValueAtTime(9, t0 + 1.3);
      lfo.connect(lfoG); lfo.start(t0); lfo.stop(t0 + DUR);
      // formant sweep
      const formant = ac.createBiquadFilter(); formant.type = 'bandpass'; formant.Q.value = 0.9;
      formant.frequency.setValueAtTime(520, t0);
      formant.frequency.linearRampToValueAtTime(980, t0 + 0.6);
      formant.frequency.linearRampToValueAtTime(640, t0 + DUR);
      const body = ac.createGain();
      body.gain.setValueAtTime(0, t0);
      body.gain.linearRampToValueAtTime(vol, t0 + 0.35);
      body.gain.setValueAtTime(vol, t0 + 1.55);
      body.gain.exponentialRampToValueAtTime(0.0001, t0 + DUR);
      formant.connect(body); body.connect(out);
      [[1, 1], [2, 0.34], [3, 0.1]].forEach(([mul, g]) => {
        const o = ac.createOscillator(); o.type = mul === 1 ? 'sine' : 'triangle';
        o.frequency.setValueAtTime(f0 * mul, t0);
        o.frequency.exponentialRampToValueAtTime(fPeak * mul, t0 + 0.55);
        o.frequency.setValueAtTime(fPeak * mul, t0 + 1.5);
        o.frequency.exponentialRampToValueAtTime(fFall * mul, t0 + DUR);
        lfoG.connect(o.detune);
        const og = ac.createGain(); og.gain.value = g;
        o.connect(og); og.connect(formant);
        o.start(t0); o.stop(t0 + DUR + 0.1);
      });
      // breath
      const nlen = Math.floor(ac.sampleRate * DUR), nb = ac.createBuffer(1, nlen, ac.sampleRate);
      const nd = nb.getChannelData(0);
      for (let i = 0; i < nlen; i++) nd[i] = (Math.random() * 2 - 1) * 0.3;
      const nz = ac.createBufferSource(); nz.buffer = nb;
      const nf = ac.createBiquadFilter(); nf.type = 'lowpass'; nf.frequency.value = 900;
      const ng = ac.createGain();
      ng.gain.setValueAtTime(0, t0);
      ng.gain.linearRampToValueAtTime(vol * 0.12, t0 + 0.4);
      ng.gain.exponentialRampToValueAtTime(0.0001, t0 + DUR);
      nz.connect(nf); nf.connect(ng); ng.connect(out);
      nz.start(t0); nz.stop(t0 + DUR);
    }

    /* ───────── identity + pack state ───────── */
    const btn = document.getElementById('howlBtn');
    const myCountEl = document.getElementById('myCount');
    const lbList = document.getElementById('lbList');
    const packCountEl = document.getElementById('packCount');
    const nameInput = document.getElementById('nameInput');
    const nameSave = document.getElementById('nameSave');
    const toast = document.getElementById('toast');
    let toastTimer = null;
    function say(msg){
      toast.textContent = msg; toast.classList.add('show');
      clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
    }
    function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    let me = { uid: null, name: null, howls: 0, rowExists: false };
    let online = true;

    function barName(){
      try {
        const ctx = window.sloppyBarGetContext && window.sloppyBarGetContext();
        return (ctx && (ctx.username || (ctx.profile && ctx.profile.username))) || null;
      } catch(e){ return null; }
    }

    async function boot(){
      try {
        const { user } = await supabaseSession();
        me.uid = user.id;
        const { data } = await supabase.from('wolf_howls').select('howls,name').eq('user_id', me.uid).limit(1);
        if (data && data.length){
          me.rowExists = true;
          me.howls = data[0].howls || 0;
          me.name = data[0].name;
        }
        if (!me.name) me.name = barName() || ('lone wolf ' + me.uid.slice(0, 4));
        myCountEl.textContent = me.howls;
        nameInput.value = me.name;
        joinChannel();
        refreshLb();
      } catch(e){
        online = false;
        say('the den is offline — howls stay local tonight');
        packCountEl.textContent = 'offline · solo howling';
      }
    }

    /* debounced persistence: rapid howls batch into one write */
    let saveTimer = null;
    function persistSoon(){
      if (!online || !me.uid) return;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        const row = { howls: me.howls, name: me.name, last_howl_at: new Date().toISOString() };
        try {
          if (me.rowExists){
            await supabase.from('wolf_howls').update(row).eq('user_id', me.uid);
          } else {
            const { error } = await supabase.from('wolf_howls').insert({ ...row, user_id: me.uid });
            if (!error) me.rowExists = true;
          }
        } catch(e){ /* leaderboard catches up next refresh */ }
      }, 700);
    }

    /* ───────── realtime pack ───────── */
    let chan = null;
    function joinChannel(){
      chan = supabase.channel('wolf-howl-live-v1', { config: { broadcast: { self: false }, presence: { key: me.uid } } });
      chan.on('broadcast', { event: 'howl' }, ({ payload }) => {
        howlSound(true);
        floatAwoo(payload.n || 'a distant wolf', true);
        clearTimeout(lbEcho); lbEcho = setTimeout(refreshLb, 1800);
      });
      chan.on('presence', { event: 'sync' }, () => {
        const n = Object.keys(chan.presenceState()).length;
        packCountEl.textContent = n + (n === 1 ? ' wolf' : ' wolves') + ' in the night';
      });
      chan.subscribe(status => {
        if (status === 'SUBSCRIBED') chan.track({ at: Date.now() });
      });
    }
    let lbEcho = null;

    /* ───────── leaderboard ───────── */
    async function refreshLb(){
      if (!online) return;
      const { data, error } = await supabase.from('wolf_howls')
        .select('user_id,name,howls').order('howls', { ascending: false }).limit(10);
      if (error || !data) return;
      if (!data.length){
        lbList.innerHTML = '<li class="empty">no howls yet — be the first voice tonight</li>';
        return;
      }
      lbList.innerHTML = data.map((r, i) =>
        '<li' + (r.user_id === me.uid ? ' class="me"' : '') + '>' +
        '<span class="rank">' + (i + 1) + '</span>' +
        '<span class="who">' + esc(r.name || 'nameless wolf') + '</span>' +
        '<span class="n">' + (r.howls || 0) + '</span></li>'
      ).join('');
    }
    setInterval(refreshLb, 20000);

    /* ───────── awoo floaters ───────── */
    function floatAwoo(name, distant){
      const el = document.createElement('div');
      el.className = 'awoo';
      el.style.left = (10 + Math.random() * 80) + 'vw';
      el.style.bottom = (18 + Math.random() * 20) + 'vh';
      el.style.fontSize = distant ? '0.9rem' : '1.25rem';
      el.innerHTML = 'AW' + 'O'.repeat(2 + Math.floor(Math.random() * 3)) + '!<small>' + esc(name) + '</small>';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3300);
    }

    /* ───────── howl! ───────── */
    let coolUntil = 0;
    btn.addEventListener('click', () => {
      const now = Date.now();
      if (now < coolUntil) return;
      coolUntil = now + 900;
      const gain = moon.isFull ? 2 : 1;
      me.howls += gain;
      myCountEl.textContent = me.howls;
      howlSound(false);
      floatAwoo(me.name || 'you', false);
      btn.classList.remove('howling'); void btn.offsetWidth; btn.classList.add('howling');
      persistSoon();
      if (chan) chan.send({ type: 'broadcast', event: 'howl', payload: { n: me.name } });
    });
    document.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'h' && document.activeElement !== nameInput) btn.click();
    });

    /* ───────── rename ───────── */
    nameSave.addEventListener('click', async () => {
      const v = nameInput.value.trim().slice(0, 24);
      if (!v) return;
      me.name = v;
      say('the pack knows you as “' + v + '”');
      persistSoon();
      setTimeout(refreshLb, 900);
    });
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') nameSave.click(); });

    boot();
  </script>
</body>
</html>
