<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Type</title>
<link rel="icon" href="https://emojicdn.elk.sh/⌨️">
<meta property="og:title" content="Neon Type">
<meta property="og:description" content="How fast can you type? Neon-lit speed test with WPM and accuracy.">
<meta property="og:url" content="https://sloppy.live/neon-type">
<meta property="og:image" content="https://emojicdn.elk.sh/⌨️?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Megrim&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{background:#0a0a14}
body{
  min-height:100dvh;background:#0a0a14;
  font-family:'Fira Code',monospace;color:#c0c8d8;
  display:flex;flex-direction:column;align-items:center;
  padding:0 16px;
}

header{
  width:100%;max-width:720px;padding:28px 0 12px;
  display:flex;justify-content:space-between;align-items:baseline;
}
header h1{
  font-family:'Megrim',cursive;font-size:28px;font-weight:400;
  color:#0ff;letter-spacing:4px;
  text-shadow:0 0 20px rgba(0,255,255,0.3);
}
#timer-display{
  font-size:13px;color:rgba(255,255,255,0.25);
}
#online-count{
  font-size:10px;color:rgba(0,255,255,0.3);
  position:fixed;top:10px;right:12px;z-index:10;
  display:flex;align-items:center;gap:4px;
}
#online-dot{
  width:6px;height:6px;border-radius:50%;
  background:#0ff;box-shadow:0 0 6px rgba(0,255,255,0.5);
  animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:0.6}50%{opacity:1}}

#mode-bar{
  width:100%;max-width:720px;
  display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;
}
.mode-btn{
  font-family:'Fira Code',monospace;font-size:11px;
  background:rgba(0,255,255,0.04);border:1px solid rgba(0,255,255,0.12);
  color:rgba(0,255,255,0.5);padding:4px 12px;border-radius:4px;cursor:pointer;
  transition:all .15s;
}
.mode-btn:hover{background:rgba(0,255,255,0.1)}
.mode-btn.active{background:rgba(0,255,255,0.15);border-color:rgba(0,255,255,0.4);color:#0ff}

#text-area{
  width:100%;max-width:720px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(0,255,255,0.08);
  border-radius:8px;padding:24px;
  font-size:18px;line-height:1.8;
  min-height:160px;
  position:relative;
  cursor:text;
}
#text-area:focus-within{border-color:rgba(0,255,255,0.2)}

#text-display{
  white-space:pre-wrap;word-break:break-word;
  font-family:'Fira Code',monospace;font-size:18px;line-height:1.8;
}

.char{color:rgba(255,255,255,0.2);transition:color .05s}
.char.correct{color:#0ff;text-shadow:0 0 6px rgba(0,255,255,0.3)}
.char.wrong{color:#ff3366;text-shadow:0 0 6px rgba(255,51,102,0.4);border-bottom:2px solid #ff3366}
.char.cursor{
  border-left:2px solid #0ff;
  animation:blink 1s step-end infinite;
  margin-left:-1px;padding-left:1px;
}
@keyframes blink{50%{border-color:transparent}}

#hidden-input{
  position:absolute;opacity:0;width:1px;height:1px;
  top:0;left:0;pointer-events:none;
}

#results{
  width:100%;max-width:720px;margin-top:20px;
  display:none;
}
#results-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}
.stat-card{
  background:rgba(0,255,255,0.04);
  border:1px solid rgba(0,255,255,0.1);
  border-radius:6px;padding:16px;text-align:center;
}
.stat-val{
  font-family:'Megrim',cursive;font-size:36px;color:#0ff;
  text-shadow:0 0 15px rgba(0,255,255,0.3);
  line-height:1.2;
}
.stat-label{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-top:4px}
.stat-card.accent .stat-val{color:#ff3366;text-shadow:0 0 15px rgba(255,51,102,0.3)}
.stat-card.gold .stat-val{color:#ffcc00;text-shadow:0 0 15px rgba(255,204,0,0.3)}

#restart-btn{
  font-family:'Fira Code',monospace;font-size:12px;
  background:none;border:1px solid rgba(0,255,255,0.25);
  color:#0ff;padding:8px 24px;border-radius:4px;cursor:pointer;
  margin-top:16px;transition:all .15s;letter-spacing:1px;
}
#restart-btn:hover{background:rgba(0,255,255,0.08);border-color:#0ff}

#wpm-live{
  width:100%;max-width:720px;margin-top:12px;
  display:flex;justify-content:space-between;
  font-size:11px;color:rgba(255,255,255,0.2);
}

#click-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:13px;color:rgba(0,255,255,0.25);pointer-events:none;
}

a#back{position:fixed;bottom:8px;left:10px;font-size:9px;opacity:0.15;color:#888;text-decoration:none;z-index:5}
</style>
</head>
<body>

<header>
  <h1>NEON TYPE</h1>
  <span id="timer-display"></span>
</header>
<div id="online-count"><span id="online-dot"></span><span id="online-num">-</span> online</div>

<div id="mode-bar">
  <button class="mode-btn active" data-time="15">15s</button>
  <button class="mode-btn" data-time="30">30s</button>
  <button class="mode-btn" data-time="60">60s</button>
  <button class="mode-btn" data-time="120">120s</button>
</div>

<div id="text-area" tabindex="0">
  <div id="text-display"></div>
  <span id="click-hint">click here to start typing</span>
  <input id="hidden-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
</div>

<div id="wpm-live">
  <span id="live-wpm"></span>
  <span id="live-acc"></span>
</div>

<div id="results">
  <div id="results-grid">
    <div class="stat-card gold"><div class="stat-val" id="r-wpm">0</div><div class="stat-label">WPM</div></div>
    <div class="stat-card"><div class="stat-val" id="r-raw">0</div><div class="stat-label">RAW WPM</div></div>
    <div class="stat-card accent"><div class="stat-val" id="r-acc">0%</div><div class="stat-label">ACCURACY</div></div>
    <div class="stat-card"><div class="stat-val" id="r-chars">0</div><div class="stat-label">CHARACTERS</div></div>
    <div class="stat-card"><div class="stat-val" id="r-correct">0</div><div class="stat-label">CORRECT</div></div>
    <div class="stat-card accent"><div class="stat-val" id="r-errors">0</div><div class="stat-label">ERRORS</div></div>
  </div>
  <div style="text-align:center">
    <button id="restart-btn">RESTART</button>
  </div>
</div>

<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
'use strict';

var WORDS=[
  'the','be','to','of','and','a','in','that','have','i','it','for','not','on','with',
  'he','as','you','do','at','this','but','his','by','from','they','we','her','she','or',
  'an','will','my','one','all','would','there','their','what','so','up','out','if','about',
  'who','get','which','go','me','when','make','can','like','time','no','just','him','know',
  'take','people','into','year','your','good','some','could','them','see','other','than',
  'then','now','look','only','come','its','over','think','also','back','after','use','two',
  'how','our','work','first','well','way','even','new','want','because','any','these','give',
  'day','most','us','great','between','need','large','often','around','each','under','turn',
  'same','move','every','point','hand','high','place','found','old','while','home','might',
  'next','still','never','last','let','thought','long','far','away','keep','head','own',
  'through','line','world','run','does','another','much','should','real','left','right','both',
  'house','water','small','number','before','part','open','night','light','change','close',
  'such','city','earth','start','story','side','hard','kind','why','call','help','put',
  'end','late','name','play','live','state','read','tell','ask','write','along','watch',
  'system','program','question','report','group','example','computer','point','music','power',
  'learn','value','always','study','paper','young','life','together','game','found','mind',
  'school','develop','quite','during','enough','river','fact','love','better','must','family',
  'control','follow','problem','once','begin','those','second','important','human','person'
];

var testDuration=15;
var textChars=[];
var pos=0;
var started=false;
var finished=false;
var startTime=0;
var timerInterval=null;
var totalKeystrokes=0;
var correctKeystrokes=0;

var display=document.getElementById('text-display');
var input=document.getElementById('hidden-input');
var hint=document.getElementById('click-hint');
var timerEl=document.getElementById('timer-display');
var liveWpm=document.getElementById('live-wpm');
var liveAcc=document.getElementById('live-acc');

function generateText(len){
  var result=[];
  while(result.length<len){
    var w=WORDS[Math.floor(Math.random()*WORDS.length)];
    if(result.length>0)result.push(' ');
    for(var i=0;i<w.length;i++)result.push(w[i]);
  }
  return result;
}

function initTest(){
  finished=false;started=false;pos=0;
  totalKeystrokes=0;correctKeystrokes=0;
  startTime=0;
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
  timerEl.textContent=testDuration+'s';
  liveWpm.textContent='';liveAcc.textContent='';

  textChars=generateText(300);

  renderText();
  document.getElementById('results').style.display='none';
  document.getElementById('text-area').style.display='block';
  document.getElementById('wpm-live').style.display='flex';
  hint.style.display='block';
  input.value='';
  input.focus();
}

function renderText(){
  var html='';
  for(var i=0;i<textChars.length;i++){
    var cls='char';
    if(i<pos){
      cls+=' '+(textChars[i]._correct?'correct':'wrong');
    }else if(i===pos){
      cls+=' cursor';
    }
    var ch=textChars[i];
    var c=typeof ch==='string'?ch:ch.ch||ch;
    if(typeof ch==='object'&&ch.ch)c=ch.ch;
    else if(typeof ch==='string')c=ch;

    // Get the actual character
    var actual=getChar(i);
    if(actual===' ')html+='<span class="'+cls+'"> </span>';
    else html+='<span class="'+cls+'">'+escapeHtml(actual)+'</span>';
  }
  display.innerHTML=html;
}

function getChar(i){
  var ch=textChars[i];
  if(typeof ch==='string')return ch;
  if(ch&&ch.ch)return ch.ch;
  return '';
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function startTimer(){
  started=true;
  startTime=Date.now();
  hint.style.display='none';

  timerInterval=setInterval(function(){
    var elapsed=(Date.now()-startTime)/1000;
    var remaining=Math.max(0,Math.ceil(testDuration-elapsed));
    timerEl.textContent=remaining+'s';

    // Live WPM
    if(elapsed>0.5){
      var mins=elapsed/60;
      var rawWpm=Math.round((totalKeystrokes/5)/mins);
      var netWpm=Math.round((correctKeystrokes/5)/mins);
      var acc=totalKeystrokes>0?Math.round(correctKeystrokes/totalKeystrokes*100):100;
      liveWpm.textContent=netWpm+' wpm';
      liveAcc.textContent=acc+'% acc';
    }

    if(remaining<=0){
      finishTest();
    }
  },100);
}

function finishTest(){
  finished=true;
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
  timerEl.textContent='done';

  var elapsed=testDuration;
  var mins=elapsed/60;
  var rawWpm=Math.round((totalKeystrokes/5)/mins);
  var netWpm=Math.max(0,Math.round((correctKeystrokes/5)/mins));
  var acc=totalKeystrokes>0?Math.round(correctKeystrokes/totalKeystrokes*100):100;
  var errors=totalKeystrokes-correctKeystrokes;

  document.getElementById('r-wpm').textContent=netWpm;
  document.getElementById('r-raw').textContent=rawWpm;
  document.getElementById('r-acc').textContent=acc+'%';
  document.getElementById('r-chars').textContent=totalKeystrokes;
  document.getElementById('r-correct').textContent=correctKeystrokes;
  document.getElementById('r-errors').textContent=errors;

  document.getElementById('results').style.display='block';
  document.getElementById('wpm-live').style.display='none';
  liveWpm.textContent='';liveAcc.textContent='';

  // Save best
  var key='neontype_best_'+testDuration;
  var prev=parseInt(localStorage.getItem(key))||0;
  if(netWpm>prev)localStorage.setItem(key,netWpm);
}

function handleInput(e){
  if(finished)return;
  // Prevent if overlay showing
  var key=e.key;

  if(key==='Tab'||key==='Escape'){
    e.preventDefault();
    initTest();
    return;
  }

  if(key.length>1&&key!=='Backspace')return;

  e.preventDefault();

  if(!started&&key!=='Backspace')startTimer();

  if(key==='Backspace'){
    if(pos>0){
      pos--;
      textChars[pos]=getChar(pos); // reset to plain char
    }
    renderText();
    return;
  }

  if(pos>=textChars.length)return;

  var expected=getChar(pos);
  totalKeystrokes++;

  if(key===expected){
    correctKeystrokes++;
    textChars[pos]={ch:expected,_correct:true};
  }else{
    textChars[pos]={ch:expected,_correct:false};
  }

  pos++;

  // Generate more text if running low
  if(pos>textChars.length-50){
    var more=generateText(100);
    textChars.push(' ');
    for(var i=0;i<more.length;i++)textChars.push(more[i]);
  }

  renderText();

  // Scroll text into view
  var cursorEl=display.querySelector('.cursor');
  if(cursorEl){
    var area=document.getElementById('text-area');
    var aRect=area.getBoundingClientRect();
    var cRect=cursorEl.getBoundingClientRect();
    if(cRect.top>aRect.bottom-30||cRect.top<aRect.top){
      cursorEl.scrollIntoView({block:'center',behavior:'smooth'});
    }
  }
}

// Focus management
document.getElementById('text-area').addEventListener('click',function(){
  input.focus();
  hint.style.display='none';
});

input.addEventListener('keydown',handleInput);

// Refocus if clicking anywhere during test
document.addEventListener('click',function(){
  if(!finished)input.focus();
});

// Mode buttons
var modeBtns=document.querySelectorAll('.mode-btn');
for(var i=0;i<modeBtns.length;i++){
  modeBtns[i].addEventListener('click',function(){
    for(var j=0;j<modeBtns.length;j++)modeBtns[j].classList.remove('active');
    this.classList.add('active');
    testDuration=parseInt(this.dataset.time);
    initTest();
  });
}

// Restart
document.getElementById('restart-btn').addEventListener('click',function(){initTest()});

// Init
initTest();

})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// Supabase Presence — live player counter
(function(){
  if(!window.supabase)return;
  var el=document.getElementById('online-num');
  try{
    var x=new XMLHttpRequest();
    x.open('GET','/supabase-config.js',false);x.send();
    var t=x.responseText;
    var u=t.match(/SUPABASE_URL\s*=\s*['"]([^'"]+)/);
    var k=t.match(/SUPABASE_ANON_KEY\s*=\s*['"]([^'"]+)/);
    if(!u||!k)return;
    var sb=window.supabase.createClient(u[1],k[1]);

    sb.auth.getSession().then(function(res){
      var p=res.data.session?Promise.resolve():sb.auth.signInAnonymously();
      return p;
    }).then(function(){
      var ch=sb.channel('neon-type-presence',{config:{presence:{key:'user'}}});
      ch.on('presence',{event:'sync'},function(){
        var state=ch.presenceState();
        var count=0;
        for(var key in state)count+=state[key].length;
        el.textContent=count;
      });
      ch.subscribe(function(status){
        if(status==='SUBSCRIBED')ch.track({online_at:Date.now()});
      });
    });
  }catch(e){}
})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
