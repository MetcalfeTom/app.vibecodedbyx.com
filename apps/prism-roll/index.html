<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Prism Roll</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06031a">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%B2">
<meta name="description" content="A minimalist neon random number generator with smooth scramble-to-lock counter animations. Set the range, hit roll, watch the digits settle.">
<meta property="og:title" content="Prism Roll">
<meta property="og:description" content="A minimalist neon random number generator with smooth scramble-to-lock counter animations. Set the range, hit roll, watch the digits settle.">
<meta property="og:url" content="https://sloppy.live/prism-roll">
<meta property="og:image" content="https://image.pollinations.ai/prompt/huge%20glowing%20neon%20numerals%20on%20pure%20black%2C%20minimalist%20random%20number%20generator%2C%20pink%20cyan%20lime%20accent%2C%20vegas%20phosphor%20display?width=1200&height=630&model=flux&seed=4242&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=JetBrains+Mono:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#06031a;
    --void-2:#0d0728;
    --pink:#ff2bd6;
    --cyan:#5ce6ff;
    --lime:#a5ff52;
    --amber:#ffd454;
    --violet:#c44dff;
    --orange:#ff8a3a;
    --ink:#f5ecff;
    --silver:#a89cc8;
    --silver-dim:#6b5d8c;
    --border:rgba(168,156,200,0.18);
    --accent:var(--pink);          /* swaps per roll */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    width:100%;height:100%;
    background:var(--void);color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    -webkit-tap-highlight-color:transparent;user-select:none;
    overflow:hidden;
  }
  body{
    display:flex;flex-direction:column;
    background:
      radial-gradient(ellipse 55% 40% at 50% 50%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 70%),
      var(--void);
    transition:background 0.7s ease-out;
  }
  /* Faint scanlines */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:90;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 3px);
  }

  header{
    padding:1rem 1.4rem 0.6rem;
    border-bottom:1px solid var(--border);
    background:rgba(13,7,40,0.55);
    backdrop-filter:blur(8px);
    display:flex;justify-content:space-between;align-items:flex-end;gap:0.8rem;flex-wrap:wrap;
    z-index:5;position:relative;
  }
  .title{
    font-family:'Audiowide', sans-serif;
    font-size:clamp(1.1rem, 2.5vw, 1.5rem);letter-spacing:0.08em;line-height:1;
    color:var(--ink);
    text-shadow:0 0 12px var(--accent), 0 0 24px color-mix(in srgb, var(--accent) 40%, transparent);
    transition:text-shadow 0.5s;
  }
  .title .dot{color:var(--accent);transition:color 0.5s}
  .tag{
    font-family:'JetBrains Mono', monospace;font-size:0.66rem;
    color:var(--silver-dim);margin-top:0.3rem;letter-spacing:0.16em;text-transform:uppercase;
  }

  /* Range controls */
  .controls{
    display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap;
  }
  .range-pill{
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border);
    border-radius:0.4rem;
    padding:0.45rem 0.7rem;
    display:inline-flex;align-items:center;gap:0.4rem;
    font-family:'JetBrains Mono', monospace;font-size:0.7rem;
    color:var(--silver);letter-spacing:0.08em;
  }
  .range-pill label{
    font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--silver-dim);
  }
  .range-pill input{
    background:transparent;border:none;color:var(--ink);
    font-family:'JetBrains Mono', monospace;font-weight:700;font-size:0.9rem;
    width:5rem;text-align:right;
    -moz-appearance:textfield;
  }
  .range-pill input::-webkit-outer-spin-button,
  .range-pill input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .range-pill input:focus{outline:none;color:var(--accent)}
  .range-pill input:focus + .underbar, .range-pill input:focus{
    text-shadow:0 0 6px var(--accent);
  }

  .preset-row{
    display:flex;gap:0.3rem;flex-wrap:wrap;
  }
  .preset{
    background:transparent;border:1px solid var(--border);color:var(--silver);
    font-family:'JetBrains Mono', monospace;font-size:0.66rem;font-weight:700;
    padding:0.4rem 0.65rem;border-radius:999px;cursor:pointer;
    letter-spacing:0.1em;text-transform:uppercase;
    min-height:2rem;
  }
  .preset:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px color-mix(in srgb, var(--accent) 35%, transparent)}
  .preset:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* Main display */
  main{
    flex:1;position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:1rem 1.4rem 1rem;
    z-index:5;min-height:0;
  }
  .display-frame{
    text-align:center;
    width:100%;max-width:60rem;
  }
  .display-label{
    font-family:'JetBrains Mono', monospace;font-size:0.65rem;
    color:var(--silver-dim);letter-spacing:0.28em;text-transform:uppercase;
    margin-bottom:0.4rem;
    transition:color 0.4s;
  }
  .display-label.live{color:var(--accent);text-shadow:0 0 6px var(--accent)}
  .number-display{
    font-family:'VT323', monospace;
    font-size:clamp(7rem, 26vw, 18rem);
    font-weight:400;line-height:0.85;
    color:var(--accent);
    text-shadow:
      0 0 12px var(--accent),
      0 0 28px color-mix(in srgb, var(--accent) 55%, transparent),
      0 0 60px color-mix(in srgb, var(--accent) 32%, transparent);
    letter-spacing:0.02em;
    transition:filter 0.2s, transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change:transform, filter;
  }
  .number-display.rolling{
    filter:blur(0.4px);
  }
  .number-display.landed{
    animation:landPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes landPop{
    0%{transform:scale(1)}
    20%{transform:scale(1.12)}
    100%{transform:scale(1)}
  }
  .number-display .digit{
    display:inline-block;min-width:0.6em;
  }
  .number-display .digit.locking{
    animation:digitLock 0.22s ease-out;
  }
  @keyframes digitLock{
    0%{transform:translateY(-12px);opacity:0.35;filter:blur(3px)}
    100%{transform:translateY(0);opacity:1;filter:blur(0)}
  }

  .range-meta{
    font-family:'JetBrains Mono', monospace;font-size:0.72rem;
    color:var(--silver);letter-spacing:0.14em;
    margin-top:0.6rem;
  }
  .range-meta .em{color:var(--accent);text-shadow:0 0 6px var(--accent)}

  .roll-row{
    display:flex;justify-content:center;gap:0.5rem;margin-top:1.4rem;
  }
  .roll-btn{
    background:linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 65%, black));
    color:#06031a;border:none;
    font-family:'Audiowide', sans-serif;font-size:1.05rem;
    padding:0.95rem 2rem;border-radius:0.4rem;cursor:pointer;
    letter-spacing:0.2em;text-transform:uppercase;
    min-height:3.2rem;
    box-shadow:
      0 0 18px color-mix(in srgb, var(--accent) 60%, transparent),
      inset 0 1px 0 rgba(255,255,255,0.25);
    transition:transform 0.12s, box-shadow 0.15s, background 0.5s;
  }
  .roll-btn:hover{transform:translateY(-2px);box-shadow:0 0 28px color-mix(in srgb, var(--accent) 80%, transparent), inset 0 1px 0 rgba(255,255,255,0.3)}
  .roll-btn:active{transform:translateY(0)}
  .roll-btn:disabled{opacity:0.55;cursor:not-allowed;transform:none}
  .roll-btn:focus-visible{outline:3px solid var(--cyan);outline-offset:3px}

  /* History strip */
  .history{
    position:absolute;bottom:0;left:0;right:0;
    padding:0.7rem 1.4rem;
    border-top:1px solid var(--border);
    background:rgba(13,7,40,0.55);
    backdrop-filter:blur(8px);
    display:flex;align-items:center;gap:0.5rem;
    z-index:6;
  }
  .history .lab{
    font-family:'JetBrains Mono', monospace;font-size:0.58rem;
    color:var(--silver-dim);letter-spacing:0.2em;text-transform:uppercase;
    flex:0 0 auto;
  }
  .history-track{
    flex:1;display:flex;gap:0.35rem;overflow-x:auto;
    scrollbar-width:none;
    align-items:center;
  }
  .history-track::-webkit-scrollbar{display:none}
  .h-pill{
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border);
    border-radius:0.25rem;
    padding:0.3rem 0.55rem;
    font-family:'VT323', monospace;font-size:1.1rem;
    color:var(--silver);line-height:1;letter-spacing:0.04em;
    flex:0 0 auto;
    animation:hPillIn 0.3s ease-out;
  }
  .h-pill .seq{
    font-family:'JetBrains Mono', monospace;font-size:0.5rem;
    color:var(--silver-dim);margin-right:0.3rem;letter-spacing:0.12em;
  }
  .h-pill:first-child{
    color:var(--accent);
    border-color:var(--accent);
    text-shadow:0 0 6px var(--accent);
    box-shadow:0 0 10px color-mix(in srgb, var(--accent) 35%, transparent);
  }
  @keyframes hPillIn{
    from{opacity:0;transform:translateX(-6px) scale(0.9)}
    to{opacity:1;transform:translateX(0) scale(1)}
  }
  .clear-btn{
    background:transparent;border:1px solid var(--border);color:var(--silver-dim);
    font-family:'JetBrains Mono', monospace;font-size:0.6rem;
    padding:0.4rem 0.6rem;border-radius:0.2rem;cursor:pointer;
    letter-spacing:0.14em;text-transform:uppercase;
    min-height:2rem;flex:0 0 auto;
  }
  .clear-btn:hover{border-color:var(--accent);color:var(--accent)}
  .clear-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* Mute toggle floats top-right of main area */
  .mute-btn{
    position:absolute;top:0.7rem;right:0.7rem;z-index:7;
    background:rgba(13,7,40,0.6);border:1px solid var(--border);color:var(--silver);
    font-family:'JetBrains Mono', monospace;font-size:0.6rem;
    padding:0.4rem 0.6rem;border-radius:0.2rem;cursor:pointer;
    letter-spacing:0.12em;text-transform:uppercase;
    backdrop-filter:blur(6px);
    min-height:2rem;
  }
  .mute-btn:hover{border-color:var(--accent);color:var(--accent)}
  .mute-btn[aria-pressed="true"]{color:var(--amber);border-color:var(--amber)}
  .mute-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  @media (prefers-reduced-motion: reduce){
    .number-display.landed, .number-display .digit.locking, .h-pill{animation:none}
    .number-display{transition:none}
    body{transition:none}
  }
  @media (max-width: 560px){
    header{padding:0.7rem 0.85rem 0.5rem}
    main{padding:0.7rem 0.85rem}
    .history{padding:0.55rem 0.85rem}
  }
</style>
</head>
<body>
  <header>
    <div>
      <h1 class="title">prism<span class="dot"> · </span>roll</h1>
      <div class="tag">minimalist random · smooth scramble-to-lock</div>
    </div>
    <div class="controls">
      <span class="range-pill">
        <label for="minInput">min</label>
        <input type="number" id="minInput" value="1" step="1" inputmode="numeric">
      </span>
      <span class="range-pill">
        <label for="maxInput">max</label>
        <input type="number" id="maxInput" value="100" step="1" inputmode="numeric">
      </span>
      <div class="preset-row" role="group" aria-label="Common range presets">
        <button class="preset" type="button" data-min="1" data-max="6">d6</button>
        <button class="preset" type="button" data-min="1" data-max="20">d20</button>
        <button class="preset" type="button" data-min="1" data-max="100">1-100</button>
        <button class="preset" type="button" data-min="0" data-max="999">0-999</button>
        <button class="preset" type="button" data-min="1" data-max="10000">1-10k</button>
      </div>
    </div>
  </header>

  <main>
    <button class="mute-btn" id="muteBtn" type="button" aria-pressed="false" aria-label="Mute audio">🔊 sound</button>

    <div class="display-frame">
      <div class="display-label" id="displayLabel">tap roll to begin</div>
      <div class="number-display" id="numberDisplay" role="status" aria-live="polite">—</div>
      <div class="range-meta">
        range <span class="em" id="rangeMeta">1 → 100</span>
      </div>
      <div class="roll-row">
        <button class="roll-btn" id="rollBtn" type="button">▸ roll</button>
      </div>
    </div>

    <div class="history" aria-label="Recent rolls">
      <span class="lab">history</span>
      <div class="history-track" id="historyTrack" role="list"></div>
      <button class="clear-btn" id="clearBtn" type="button" aria-label="Clear history">✕ clear</button>
    </div>
  </main>

<script>
'use strict';
(function(){
  function showError(msg){
    try{
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a061f;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff8ac0;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    }catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  // ── Accent rotation — each roll picks a new neon hue so the page
  // breathes across rolls instead of locking to one colour.
  const ACCENTS = ['#ff2bd6','#5ce6ff','#a5ff52','#ffd454','#c44dff','#ff8a3a','#7af8d8','#ffabc8'];

  // ── State ──
  const state = {
    min: 1, max: 100,
    history: [],
    rolling: false,
    muted: false,
    rollSeq: 0
  };

  // ── DOM ──
  const numEl = document.getElementById('numberDisplay');
  const labelEl = document.getElementById('displayLabel');
  const rangeMeta = document.getElementById('rangeMeta');
  const rollBtn = document.getElementById('rollBtn');
  const minInput = document.getElementById('minInput');
  const maxInput = document.getElementById('maxInput');
  const historyTrack = document.getElementById('historyTrack');

  function setAccent(hex){
    document.documentElement.style.setProperty('--accent', hex);
  }
  function updateRangeMeta(){
    rangeMeta.textContent = state.min + ' → ' + state.max;
  }
  function sanitizeRange(){
    let mn = parseInt(minInput.value, 10);
    let mx = parseInt(maxInput.value, 10);
    if (!isFinite(mn)) mn = 1;
    if (!isFinite(mx)) mx = 100;
    if (mn > mx){ const t = mn; mn = mx; mx = t; }
    if (mx - mn > 999999){ mx = mn + 999999; } // sanity cap
    minInput.value = mn;
    maxInput.value = mx;
    state.min = mn;
    state.max = mx;
    updateRangeMeta();
  }
  minInput.addEventListener('change', sanitizeRange);
  maxInput.addEventListener('change', sanitizeRange);
  minInput.addEventListener('blur', sanitizeRange);
  maxInput.addEventListener('blur', sanitizeRange);

  // ── Audio (subtle tick + land chime) ──
  let actx = null;
  function ensureAudio(){
    if (actx) return actx;
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){}
    return actx;
  }
  function tick(pitch){
    if (state.muted || !actx) return;
    const t = actx.currentTime;
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(pitch || 1200, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.035, t + 0.002);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.03);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + 0.04);
  }
  function landChime(){
    if (state.muted) return;
    ensureAudio(); if (!actx) return;
    if (actx.state === 'suspended') actx.resume();
    const t = actx.currentTime;
    [880, 1320].forEach((f, i) => {
      const o = actx.createOscillator();
      const g = actx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(f, t + i * 0.04);
      g.gain.setValueAtTime(0, t + i * 0.04);
      g.gain.linearRampToValueAtTime(0.10, t + i * 0.04 + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.04 + 0.32);
      o.connect(g); g.connect(actx.destination);
      o.start(t + i * 0.04); o.stop(t + i * 0.04 + 0.34);
    });
  }

  // ── Smooth roll animation ──
  // The animation has two phases:
  // 1. SCRAMBLE: at ~28 fps we replace each digit with random ones for
  //    700ms, easing the speed down via cubic-out.
  // 2. LOCK: once scramble ends, the digits LOCK left-to-right in
  //    sequence (~90ms each), revealing the final number. Each lock
  //    plays a short tick + the matching digit animates in.
  function renderDigits(str, lockingIdx){
    // Wrap each char in a span so we can animate individual digits
    let html = '';
    for (let i = 0; i < str.length; i++){
      const ch = str[i];
      const cls = 'digit' + (lockingIdx === i ? ' locking' : '');
      html += '<span class="' + cls + '">' + ch + '</span>';
    }
    numEl.innerHTML = html;
  }
  function pad(n, len){
    let s = String(Math.abs(n));
    while (s.length < len) s = '0' + s;
    return (n < 0 ? '-' : '') + s;
  }
  function randomInRange(lo, hi){
    if (window.crypto && window.crypto.getRandomValues){
      const span = hi - lo + 1;
      const arr = new Uint32Array(1);
      window.crypto.getRandomValues(arr);
      return lo + (arr[0] % span);
    }
    return lo + Math.floor(Math.random() * (hi - lo + 1));
  }

  let scrambleTimer = null;
  function clearScramble(){
    if (scrambleTimer){ clearInterval(scrambleTimer); scrambleTimer = null; }
  }

  async function roll(){
    if (state.rolling) return;
    state.rolling = true;
    rollBtn.disabled = true;
    state.rollSeq++;
    const accent = ACCENTS[(state.rollSeq - 1) % ACCENTS.length];
    setAccent(accent);
    ensureAudio();
    if (actx && actx.state === 'suspended') actx.resume();

    const target = randomInRange(state.min, state.max);
    const targetStr = String(target);
    const len = targetStr.length;
    numEl.classList.remove('landed');
    numEl.classList.add('rolling');
    labelEl.textContent = 'rolling…';
    labelEl.classList.add('live');

    // Phase 1 — scramble
    const scrambleStart = performance.now();
    const scrambleDur = 700;
    let lastTick = 0;
    clearScramble();
    scrambleTimer = setInterval(() => {
      const t = performance.now();
      const elapsed = t - scrambleStart;
      if (elapsed >= scrambleDur){
        clearScramble();
        return;
      }
      // Scramble — each digit gets a random 0-9
      let s = '';
      for (let i = 0; i < len; i++){
        s += Math.floor(Math.random() * 10);
      }
      // Preserve a leading '-' if target is negative
      if (target < 0) s = '-' + s.slice(1);
      renderDigits(s, -1);
      // Occasional click tick (rate slows with the scramble)
      const tickGate = 60 + (elapsed / scrambleDur) * 90; // 60ms → 150ms
      if (t - lastTick > tickGate){
        lastTick = t;
        tick(900 + Math.random() * 500);
      }
    }, 28);

    await sleep(scrambleDur);
    clearScramble();

    // Phase 2 — left-to-right lock
    const lockStep = Math.max(50, Math.min(110, 480 / len));
    let lockedSoFar = '';
    for (let i = 0; i < len; i++){
      lockedSoFar += targetStr[i];
      // Build display = lockedSoFar + remaining-random
      let s = lockedSoFar;
      for (let j = i + 1; j < len; j++) s += Math.floor(Math.random() * 10);
      renderDigits(s, i);
      tick(700 + i * 80);
      await sleep(lockStep);
    }

    // Phase 3 — landed
    renderDigits(targetStr, -1);
    numEl.classList.remove('rolling');
    numEl.classList.add('landed');
    labelEl.textContent = 'rolled';
    setTimeout(() => labelEl.classList.remove('live'), 1200);
    landChime();

    // History
    state.history.unshift(target);
    if (state.history.length > 30) state.history.pop();
    renderHistory();

    state.rolling = false;
    rollBtn.disabled = false;
  }
  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  function renderHistory(){
    historyTrack.innerHTML = state.history.map((n, i) =>
      '<div class="h-pill" role="listitem"><span class="seq">#' + (state.history.length - i) + '</span>' + n + '</div>'
    ).join('');
  }

  // ── Wiring ──
  rollBtn.addEventListener('click', roll);
  document.getElementById('clearBtn').addEventListener('click', () => {
    state.history = [];
    renderHistory();
  });
  document.getElementById('muteBtn').addEventListener('click', e => {
    state.muted = !state.muted;
    const btn = e.currentTarget;
    btn.setAttribute('aria-pressed', state.muted ? 'true' : 'false');
    btn.textContent = state.muted ? '🔇 muted' : '🔊 sound';
  });
  document.querySelectorAll('.preset').forEach(b => {
    b.addEventListener('click', () => {
      minInput.value = b.dataset.min;
      maxInput.value = b.dataset.max;
      sanitizeRange();
    });
  });
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space' || e.key === 'Enter'){ e.preventDefault(); roll(); }
    else if (e.key === 'm' || e.key === 'M') document.getElementById('muteBtn').click();
    else if (e.key === 'c' || e.key === 'C') document.getElementById('clearBtn').click();
  });

  // Boot
  sanitizeRange();
  renderDigits('—', -1);
  setAccent(ACCENTS[0]);
})();
</script>
</body>
</html>
