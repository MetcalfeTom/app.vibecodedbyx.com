<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burn List</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔥">
<meta property="og:title" content="Burn List">
<meta property="og:description" content="A task manager where neglected tasks catch fire and melt into charcoal. Stay productive or watch it burn.">
<meta property="og:url" content="https://app.sloppy.live/burn-list/">
<meta property="og:image" content="https://emojicdn.elk.sh/🔥?style=google">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@300;700;900&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0806;--surface:#1a1210;--surface-hot:#201410;
  --border:#2a1e16;--border-hot:#4a2a10;
  --fire:#ff6a1a;--ember:#ff3a00;--char:#2a2220;
  --ash:#4a4440;--smoke:rgba(120,110,100,0.15);
  --text:#c8b8a0;--dim:#5a4a3a;--done:#4a8a3a;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Fira Code',monospace;min-height:100vh;
  position:relative;overflow-x:hidden;
}

/* Ambient smoke */
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 80%,rgba(255,106,26,0.03) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(255,58,0,0.02) 0%,transparent 50%);
}

.container{max-width:560px;margin:0 auto;padding:16px;position:relative;z-index:1}

h1{
  font-family:'Anybody',sans-serif;font-size:clamp(1.6rem,5vw,2.4rem);
  font-weight:900;text-align:center;margin-bottom:4px;
  background:linear-gradient(180deg,#ff8a30,#ff4a00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.sub{text-align:center;font-size:0.55rem;color:var(--dim);letter-spacing:0.12em;margin-bottom:16px}

/* Stats */
.stats{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.stat{text-align:center;min-width:60px}
.stat-val{font-family:'Anybody',sans-serif;font-size:1rem;font-weight:700}
.stat-val.alive{color:var(--text)}
.stat-val.done{color:var(--done)}
.stat-val.burned{color:var(--ember)}
.stat-label{font-size:0.4rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em}

/* Add task */
.add-row{display:flex;gap:6px;margin-bottom:16px}
.add-input{
  flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);color:var(--text);font-family:'Fira Code',monospace;
  font-size:0.75rem;outline:none;
}
.add-input:focus{border-color:var(--fire);box-shadow:0 0 8px rgba(255,106,26,0.1)}
.add-input::placeholder{color:var(--dim)}
.add-btn{
  padding:10px 16px;border:1px solid var(--fire);border-radius:6px;
  background:transparent;color:var(--fire);font-family:'Anybody',sans-serif;
  font-weight:700;font-size:0.7rem;cursor:pointer;transition:all 0.2s;
  white-space:nowrap;
}
.add-btn:hover{background:var(--fire);color:var(--bg)}

/* Task list */
.task-list{display:flex;flex-direction:column;gap:6px}

.task{
  position:relative;overflow:hidden;
  border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;transition:all 0.3s;
  display:flex;align-items:center;gap:10px;
}

/* Heat levels */
.task.heat-0{background:var(--surface);border-color:var(--border)}
.task.heat-1{background:#1c1410;border-color:#3a2a18}
.task.heat-2{background:#201812;border-color:#5a3a18;box-shadow:0 0 8px rgba(255,106,26,0.05)}
.task.heat-3{background:#281c10;border-color:#7a4a10;box-shadow:0 0 12px rgba(255,106,26,0.1)}
.task.heat-4{background:#301e0c;border-color:#aa5a00;box-shadow:0 0 20px rgba(255,58,0,0.15)}
.task.heat-5{background:#381a08;border-color:#cc4400;box-shadow:0 0 30px rgba(255,58,0,0.2);animation:flamePulse 0.5s ease-in-out infinite alternate}
.task.charcoal{
  background:#141210;border-color:#222;opacity:0.5;
  text-decoration:line-through;color:#4a4440;
}
.task.done{background:#0e1a0c;border-color:#2a4a22;opacity:0.7}

@keyframes flamePulse{
  from{box-shadow:0 0 20px rgba(255,58,0,0.15)}
  to{box-shadow:0 0 35px rgba(255,58,0,0.3)}
}

/* Fire overlay on hot tasks */
.fire-bar{
  position:absolute;bottom:0;left:0;right:0;height:0;
  background:linear-gradient(0deg,rgba(255,58,0,0.3),rgba(255,106,26,0.1),transparent);
  transition:height 0.5s;pointer-events:none;
}
.task.heat-3 .fire-bar{height:20%}
.task.heat-4 .fire-bar{height:40%}
.task.heat-5 .fire-bar{height:70%}

.task-check{
  width:18px;height:18px;border:2px solid var(--dim);border-radius:4px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;background:transparent;color:transparent;
  font-size:0.6rem;
}
.task-check:hover{border-color:var(--done);color:var(--done)}
.task.done .task-check{border-color:var(--done);background:rgba(74,138,58,0.2);color:var(--done)}

.task-content{flex:1;min-width:0}
.task-name{font-size:0.75rem;word-break:break-word}
.task-meta{font-size:0.45rem;color:var(--dim);margin-top:2px}

.task-heat-indicator{
  font-family:'Anybody',sans-serif;font-size:0.55rem;font-weight:700;
  min-width:40px;text-align:right;flex-shrink:0;
}

.task-delete{
  background:none;border:none;color:var(--dim);cursor:pointer;
  font-size:0.7rem;padding:2px 4px;flex-shrink:0;transition:color 0.2s;
}
.task-delete:hover{color:var(--ember)}

.empty{text-align:center;color:var(--dim);font-size:0.7rem;padding:40px;font-style:italic}

/* Charcoal graveyard */
.graveyard-toggle{
  text-align:center;margin-top:14px;
}
.graveyard-toggle button{
  background:none;border:none;color:var(--dim);font-family:'Fira Code',monospace;
  font-size:0.55rem;cursor:pointer;padding:4px 8px;
}
.graveyard-toggle button:hover{color:var(--ash)}

/* Fire canvas overlay */
#fire-canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:2;
}
</style>
</head>
<body>

<canvas id="fire-canvas"></canvas>

<div class="container">
  <h1>BURN LIST</h1>
  <div class="sub">finish your tasks before they turn to ash</div>

  <div class="stats">
    <div class="stat"><div class="stat-val alive" id="s-alive">0</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-val done" id="s-done">0</div><div class="stat-label">Done</div></div>
    <div class="stat"><div class="stat-val burned" id="s-burned">0</div><div class="stat-label">Charcoal</div></div>
  </div>

  <div class="add-row">
    <input class="add-input" id="task-input" placeholder="Add a task before it's too late..." maxlength="120" onkeydown="if(event.key==='Enter')addTask()">
    <button class="add-btn" onclick="addTask()">ADD</button>
  </div>

  <div class="task-list" id="task-list"></div>

  <div class="graveyard-toggle">
    <button onclick="toggleGraveyard()" id="grave-btn">Show charcoal graveyard</button>
  </div>
  <div class="task-list" id="graveyard" style="display:none;margin-top:8px"></div>
</div>

<script>
// Fire particle canvas
const fc = document.getElementById('fire-canvas');
const fctx = fc.getContext('2d');
let fireParticles = [];
let FW, FH;

function resizeFire() {
  FW = fc.width = window.innerWidth;
  FH = fc.height = window.innerHeight;
}
resizeFire();
window.addEventListener('resize', resizeFire);

function spawnFireBurst(x, y, count) {
  for (let i = 0; i < count; i++) {
    fireParticles.push({
      x: x + (Math.random() - 0.5) * 30,
      y: y + (Math.random() - 0.5) * 10,
      vx: (Math.random() - 0.5) * 2,
      vy: -1 - Math.random() * 3,
      life: 30 + Math.random() * 40,
      maxLife: 70,
      size: 2 + Math.random() * 4,
      type: Math.random() < 0.3 ? 'ember' : 'flame'
    });
  }
}

function spawnSmoke(x, y) {
  for (let i = 0; i < 6; i++) {
    fireParticles.push({
      x: x + (Math.random() - 0.5) * 20,
      y,
      vx: (Math.random() - 0.5) * 0.5,
      vy: -0.5 - Math.random() * 1,
      life: 40 + Math.random() * 40,
      maxLife: 80,
      size: 4 + Math.random() * 6,
      type: 'smoke'
    });
  }
}

function drawFireParticles() {
  fctx.clearRect(0, 0, FW, FH);
  fireParticles = fireParticles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.type === 'smoke') p.vy *= 0.99;
    p.life--;
    const a = p.life / p.maxLife;
    if (p.type === 'flame') {
      fctx.fillStyle = `rgba(255,${Math.floor(80 + a * 120)},${Math.floor(a * 40)},${a * 0.7})`;
    } else if (p.type === 'ember') {
      fctx.fillStyle = `rgba(255,${Math.floor(40 + a * 60)},0,${a * 0.9})`;
    } else {
      fctx.fillStyle = `rgba(100,90,80,${a * 0.15})`;
      p.size += 0.05;
    }
    fctx.beginPath();
    fctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
    fctx.fill();
    return p.life > 0;
  });
  requestAnimationFrame(drawFireParticles);
}
drawFireParticles();

// Task manager
let tasks = [];
let showGraveyard = false;

try {
  const saved = localStorage.getItem('burn-list-tasks');
  if (saved) tasks = JSON.parse(saved);
} catch(e) {}

function save() {
  localStorage.setItem('burn-list-tasks', JSON.stringify(tasks));
}

function getHeatLevel(task) {
  if (task.done || task.charcoal) return 0;
  const age = (Date.now() - task.created) / 1000;
  // Heat ramps up over 5 minutes (300s) for demo speed
  const heat = Math.floor(age / 60); // 1 heat per minute
  return Math.min(heat, 5);
}

function getHeatLabel(heat) {
  const labels = ['Cool', 'Warm', 'Hot', 'Burning', 'Blazing', 'INFERNO'];
  const colors = ['#6a8a6a', '#aa8a30', '#cc6a20', '#ee4a10', '#ff3a00', '#ff1a00'];
  return { text: labels[heat], color: colors[heat] };
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  return h + 'h ago';
}

window.addTask = function() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;
  tasks.push({
    id: Date.now() + Math.random().toString(36).slice(2, 6),
    text,
    created: Date.now(),
    done: false,
    charcoal: false
  });
  input.value = '';
  save();
  render();
};

window.completeTask = function(id) {
  const t = tasks.find(t => t.id === id);
  if (!t || t.charcoal) return;
  t.done = !t.done;
  if (t.done) t.completedAt = Date.now();
  save();
  render();
};

window.deleteTask = function(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
};

window.toggleGraveyard = function() {
  showGraveyard = !showGraveyard;
  document.getElementById('graveyard').style.display = showGraveyard ? 'flex' : 'none';
  document.getElementById('grave-btn').textContent = showGraveyard ? 'Hide charcoal graveyard' : 'Show charcoal graveyard';
  render();
};

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  const list = document.getElementById('task-list');
  const grave = document.getElementById('graveyard');

  // Check for tasks that should turn to charcoal (6+ minutes = heat 6 would be)
  tasks.forEach(t => {
    if (!t.done && !t.charcoal) {
      const age = (Date.now() - t.created) / 1000;
      if (age > 360) { // 6 minutes
        t.charcoal = true;
        t.charredAt = Date.now();
        // Fire burst on charcoal conversion
        const el = document.querySelector(`[data-id="${t.id}"]`);
        if (el) {
          const r = el.getBoundingClientRect();
          spawnSmoke(r.left + r.width / 2, r.top);
        }
      }
    }
  });

  const active = tasks.filter(t => !t.charcoal && !t.done);
  const done = tasks.filter(t => t.done);
  const charcoal = tasks.filter(t => t.charcoal);

  document.getElementById('s-alive').textContent = active.length;
  document.getElementById('s-done').textContent = done.length;
  document.getElementById('s-burned').textContent = charcoal.length;

  // Active + done tasks
  const visible = [...active, ...done].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return b.created - a.created;
  });

  if (visible.length === 0) {
    list.innerHTML = '<div class="empty">No tasks yet. Add one before the fire starts...</div>';
  } else {
    list.innerHTML = visible.map(t => {
      const heat = t.done ? 0 : getHeatLevel(t);
      const hl = getHeatLabel(heat);
      const cls = t.done ? 'done' : `heat-${heat}`;

      // Spawn ambient fire particles for hot tasks
      if (heat >= 4 && Math.random() < 0.3) {
        const el = document.querySelector(`[data-id="${t.id}"]`);
        if (el) {
          const r = el.getBoundingClientRect();
          spawnFireBurst(r.left + Math.random() * r.width, r.top + r.height * 0.7, 2);
        }
      }

      return `<div class="task ${cls}" data-id="${t.id}">
        <div class="fire-bar"></div>
        <button class="task-check" onclick="completeTask('${t.id}')">${t.done ? '✓' : ''}</button>
        <div class="task-content">
          <div class="task-name">${esc(t.text)}</div>
          <div class="task-meta">${timeAgo(t.created)}${t.done ? ' · completed' : ''}</div>
        </div>
        ${!t.done ? `<div class="task-heat-indicator" style="color:${hl.color}">${hl.text}</div>` : ''}
        <button class="task-delete" onclick="deleteTask('${t.id}')">×</button>
      </div>`;
    }).join('');
  }

  // Graveyard
  if (showGraveyard) {
    if (charcoal.length === 0) {
      grave.innerHTML = '<div class="empty">No charcoal yet. Your tasks are safe... for now.</div>';
    } else {
      grave.innerHTML = charcoal.map(t => `
        <div class="task charcoal" data-id="${t.id}">
          <div class="task-content">
            <div class="task-name">${esc(t.text)}</div>
            <div class="task-meta">burned ${timeAgo(t.charredAt || t.created)}</div>
          </div>
          <button class="task-delete" onclick="deleteTask('${t.id}')">×</button>
        </div>
      `).join('');
    }
  }
}

// Periodic fire particle spawning for hot tasks
setInterval(() => {
  tasks.forEach(t => {
    if (t.done || t.charcoal) return;
    const heat = getHeatLevel(t);
    if (heat >= 3) {
      const el = document.querySelector(`[data-id="${t.id}"]`);
      if (el) {
        const r = el.getBoundingClientRect();
        if (r.top > 0 && r.bottom < FH) {
          spawnFireBurst(
            r.left + Math.random() * r.width,
            r.top + r.height * (0.3 + Math.random() * 0.5),
            heat - 1
          );
        }
      }
    }
  });
}, 400);

// Update heat levels and check for charcoaling
setInterval(() => { render(); save(); }, 5000);

render();
</script>
</body>
</html>
