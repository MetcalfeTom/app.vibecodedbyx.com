<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Smooth Pong — neon paddles, butter physics</title>
<meta name="description" content="A neon pong with acceleration-based paddle motion. First to 7.">
<meta property="og:title" content="Smooth Pong">
<meta property="og:description" content="Neon pong with buttery paddle physics. First to seven wins.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/smooth-pong/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/synthwave%20neon%20pong%20arcade%20glowing%20pink%20cyan%20paddles%20bright%20ball%20trail%20dark%20violet%20void%20scanlines%20centered?width=1200&height=630&model=flux&nologo=true&seed=70707">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8F%93">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff3fa8; --cyan:#3ff0ff; --violet:#a86bff; --gold:#ffdf5e;
  --paper:#f6e7ff; --void:#06021a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--void);color:var(--paper);font-family:'Space Mono',monospace}
body{
  display:flex; flex-direction:column; min-height:100vh;
  background:
    radial-gradient(ellipse at 25% 15%, rgba(255,63,168,0.22), transparent 55%),
    radial-gradient(ellipse at 75% 85%, rgba(63,240,255,0.20), transparent 55%),
    linear-gradient(180deg, #0d0322 0%, var(--void) 100%);
  background-attachment: fixed;
  align-items:center; justify-content:center;
  position:relative;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px);
  mix-blend-mode:overlay;
}
.shell{
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; gap:1rem;
  width:min(96vw, 920px);
}
header{ text-align:center; }
.eyebrow{
  font-family:'Space Mono',monospace; font-weight:700;
  font-size:.7rem; letter-spacing:.5em; color:var(--cyan);
  text-transform:uppercase; text-shadow:0 0 8px rgba(63,240,255,0.5);
  margin-bottom:.3rem;
}
h1{
  font-family:'Audiowide', sans-serif; font-weight:400;
  font-size:clamp(2.4rem, 7vw, 4rem); line-height:1; margin:0;
  background: linear-gradient(90deg, var(--pink), var(--cyan), var(--violet), var(--pink));
  background-size: 250% 100%;
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
  animation: shimmer 6s linear infinite;
}
@keyframes shimmer{0%{background-position:0 0}100%{background-position:200% 0}}
.score{
  display:flex; gap:3rem; justify-content:center;
  font-family:'Major Mono Display', monospace;
  font-size:clamp(2rem, 5vw, 3.4rem); letter-spacing:.2em;
}
.score .l{ color:var(--pink); text-shadow:0 0 18px rgba(255,63,168,0.7); }
.score .r{ color:var(--cyan); text-shadow:0 0 18px rgba(63,240,255,0.7); }
.score .sep{ color:rgba(246,231,255,0.25); font-size:.7em; align-self:center; }

.stage{
  position:relative; width:100%; aspect-ratio: 8/5;
  border:2px solid var(--violet);
  box-shadow:
    0 0 30px rgba(168,107,255,0.5),
    0 0 60px rgba(168,107,255,0.2),
    inset 0 0 50px rgba(0,0,0,0.5);
  border-radius:6px;
  background: #06021a;
  overflow:hidden;
}
canvas{ display:block; width:100%; height:100%; }
.center-msg{
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:.7rem;
  color:var(--paper); pointer-events:none; opacity:0;
  transition: opacity .3s;
  background: rgba(6,2,26,0.6); backdrop-filter: blur(1px);
}
.center-msg.show{ opacity:1; pointer-events:auto; }
.center-msg .big{
  font-family:'Audiowide', sans-serif; font-size:clamp(2rem, 6vw, 3.6rem);
  letter-spacing:.15em;
  background: linear-gradient(90deg, var(--pink), var(--cyan));
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
  text-shadow: 0 0 28px rgba(168,107,255,0.4);
}
.center-msg .sub{
  font-family:'Space Mono', monospace; font-size:.95rem;
  color: rgba(246,231,255,0.75); letter-spacing:.1em; text-align:center; padding:0 1rem;
}
.center-msg button{
  appearance:none; background:transparent; border:1px solid var(--cyan);
  color:var(--cyan); font-family:'Space Mono',monospace; font-weight:700;
  padding:.8rem 1.6rem; cursor:pointer; letter-spacing:.2em; text-transform:uppercase;
  font-size:.85rem; min-height:2.75rem;
  transition: all .15s;
}
.center-msg button:hover, .center-msg button:focus-visible{
  background: rgba(63,240,255,0.15); box-shadow: 0 0 14px rgba(63,240,255,0.6);
  outline:none;
}
.center-msg button:focus-visible{ outline:2px solid var(--pink); outline-offset:3px; }

.hud-row{
  display:flex; justify-content:space-between; width:100%;
  font-family:'Space Mono', monospace; font-size:.75rem;
  color:rgba(246,231,255,0.55); letter-spacing:.1em;
  flex-wrap:wrap; gap:.8rem;
}
.hud-row .l{ color:var(--pink); }
.hud-row .r{ color:var(--cyan); }
.hud-row button{
  appearance:none; background:transparent; border:1px solid rgba(168,107,255,0.4);
  color:rgba(246,231,255,0.65); font-family:'Space Mono',monospace; font-weight:700;
  padding:.4rem .7rem; cursor:pointer; font-size:.7rem; letter-spacing:.15em;
  text-transform:uppercase; min-height:2rem; border-radius:0;
}
.hud-row button:hover{ color:var(--gold); border-color:var(--gold); }
.hud-row button:focus-visible{ outline:2px solid var(--cyan); outline-offset:2px; }

@media (prefers-reduced-motion: reduce){
  h1{ animation:none; }
}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="eyebrow">▮ ▮ ▯ ▮ smooth motion · synth ball · first to 7</div>
    <h1>Smooth Pong</h1>
  </header>

  <div class="score" aria-live="polite">
    <span class="l" id="score-l">0</span>
    <span class="sep">·</span>
    <span class="r" id="score-r">0</span>
  </div>

  <div class="stage">
    <canvas id="c" role="application" aria-label="Pong court. Use W/S or mouse or touch to move the pink paddle on the left."></canvas>
    <div id="msg" class="center-msg show">
      <div class="big" id="msg-big">Smooth Pong</div>
      <div class="sub" id="msg-sub">W / S · mouse · touch &nbsp;to move &nbsp;·&nbsp; first to 7</div>
      <button type="button" id="msg-btn">Start</button>
    </div>
  </div>

  <div class="hud-row">
    <span><span class="l">●</span> you</span>
    <span><button type="button" id="mute-btn" aria-pressed="false">♪ sound</button></span>
    <span><span class="r">●</span> bot</span>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const $msg = document.getElementById('msg');
  const $msgBig = document.getElementById('msg-big');
  const $msgSub = document.getElementById('msg-sub');
  const $msgBtn = document.getElementById('msg-btn');
  const $scoreL = document.getElementById('score-l');
  const $scoreR = document.getElementById('score-r');
  const $muteBtn = document.getElementById('mute-btn');

  // Logical court 800x500. Render scales to canvas size.
  const W = 800, H = 500;

  function resize(){
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // --- audio synth ---
  let audioCtx = null;
  let muted = false;
  function ac(){
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    return audioCtx;
  }
  function blip(freq, dur, type, gain){
    if (muted) return;
    const a = ac(); if (!a) return;
    const o = a.createOscillator();
    const g = a.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, a.currentTime);
    g.gain.setValueAtTime(0, a.currentTime);
    g.gain.linearRampToValueAtTime(gain || 0.18, a.currentTime + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.connect(g).connect(a.destination);
    o.start();
    o.stop(a.currentTime + dur + 0.02);
  }
  function sweep(f1, f2, dur){
    if (muted) return;
    const a = ac(); if (!a) return;
    const o = a.createOscillator();
    const g = a.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(f1, a.currentTime);
    o.frequency.exponentialRampToValueAtTime(Math.max(20, f2), a.currentTime + dur);
    g.gain.setValueAtTime(0, a.currentTime);
    g.gain.linearRampToValueAtTime(0.16, a.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.connect(g).connect(a.destination);
    o.start();
    o.stop(a.currentTime + dur + 0.02);
  }

  $muteBtn.addEventListener('click', () => {
    muted = !muted;
    $muteBtn.textContent = muted ? '♪ muted' : '♪ sound';
    $muteBtn.setAttribute('aria-pressed', String(muted));
  });

  // --- physics ---
  const PADDLE_W = 14;
  const PADDLE_H = 96;
  const BALL_R = 8;
  const MAX_PADDLE_SPEED = 720; // px/s
  const PADDLE_ACCEL = 4200;    // px/s^2 — gives buttery feel
  const PADDLE_DRAG = 7.5;      // when no input, decelerate per second
  const BALL_BASE_SPEED = 360;
  const BALL_SPEED_BUMP = 28;
  const MAX_BALL_SPEED = 820;
  const AI_REACT = 0.085;       // smoothing factor toward target (per ms)
  const AI_MISS = 22;           // px of vertical jitter
  const WIN_SCORE = 7;

  const state = {
    running: false,
    paused: false,
    leftY: H/2 - PADDLE_H/2,
    leftV: 0,
    leftTargetY: null, // for mouse/touch input
    rightY: H/2 - PADDLE_H/2,
    rightV: 0,
    rightTargetY: H/2,
    ball: { x: W/2, y: H/2, vx: 0, vy: 0 },
    scoreL: 0,
    scoreR: 0,
    keys: { up:false, down:false },
    trail: [],
    particles: [],
    lastT: 0,
    serveDelay: 0, // wait before launching after a score
    serveDir: 1,
  };

  function resetBall(dir){
    state.ball.x = W/2; state.ball.y = H/2;
    const angle = (Math.random()*0.6 - 0.3); // -0.3..0.3 rad
    const speed = BALL_BASE_SPEED;
    state.ball.vx = Math.cos(angle) * speed * dir;
    state.ball.vy = Math.sin(angle) * speed;
    state.serveDelay = 0.8;
    state.trail.length = 0;
  }

  function startGame(){
    state.scoreL = 0; state.scoreR = 0;
    updateScore();
    state.leftY = state.rightY = H/2 - PADDLE_H/2;
    state.leftV = state.rightV = 0;
    state.leftTargetY = null;
    state.particles.length = 0;
    state.running = true;
    state.paused = false;
    hideMsg();
    resetBall(Math.random() < 0.5 ? -1 : 1);
    // ensure audio context starts on user gesture
    ac();
  }

  function showMsg(big, sub, btn){
    $msgBig.textContent = big;
    $msgSub.textContent = sub;
    $msgBtn.textContent = btn || 'Start';
    $msg.classList.add('show');
  }
  function hideMsg(){ $msg.classList.remove('show'); }

  function updateScore(){
    $scoreL.textContent = state.scoreL;
    $scoreR.textContent = state.scoreR;
  }

  function spawnParticles(x, y, hue, count){
    for (let i = 0; i < count; i++){
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 140;
      state.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.5 + Math.random() * 0.4,
        age: 0,
        hue,
        size: 2 + Math.random() * 2,
      });
    }
  }

  // --- input ---
  document.addEventListener('keydown', e => {
    if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp')   { state.keys.up = true;   state.leftTargetY = null; e.preventDefault(); }
    if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') { state.keys.down = true; state.leftTargetY = null; e.preventDefault(); }
    if (e.key === 'p' || e.key === 'P') togglePause();
    if (e.key === ' ' && !state.running) { startGame(); e.preventDefault(); }
  });
  document.addEventListener('keyup', e => {
    if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp')   { state.keys.up = false; }
    if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') { state.keys.down = false; }
  });

  function ptToLogicalY(clientY){
    const rect = canvas.getBoundingClientRect();
    const y = (clientY - rect.top) / rect.height * H;
    return Math.max(0, Math.min(H, y));
  }

  canvas.addEventListener('mousemove', e => {
    if (!state.running) return;
    state.leftTargetY = ptToLogicalY(e.clientY) - PADDLE_H/2;
    state.keys.up = false; state.keys.down = false;
  });

  canvas.addEventListener('touchstart', e => {
    if (!state.running) return;
    const t = e.touches[0]; if (!t) return;
    state.leftTargetY = ptToLogicalY(t.clientY) - PADDLE_H/2;
    state.keys.up = false; state.keys.down = false;
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    if (!state.running) return;
    const t = e.touches[0]; if (!t) return;
    state.leftTargetY = ptToLogicalY(t.clientY) - PADDLE_H/2;
    e.preventDefault();
  }, { passive: false });

  $msgBtn.addEventListener('click', () => {
    if (state.scoreL >= WIN_SCORE || state.scoreR >= WIN_SCORE){
      startGame();
    } else if (!state.running) {
      startGame();
    } else {
      togglePause();
    }
  });

  function togglePause(){
    if (!state.running) return;
    state.paused = !state.paused;
    if (state.paused) {
      showMsg('paused', 'press P or click to resume', 'Resume');
    } else {
      hideMsg();
    }
  }

  // --- update ---
  function update(dt){
    // smooth paddle motion via acceleration + drag
    let accel = 0;
    if (state.leftTargetY != null){
      // mouse/touch: accelerate toward target with smoothing
      const targetCenter = state.leftTargetY + PADDLE_H/2;
      const currentCenter = state.leftY + PADDLE_H/2;
      const diff = targetCenter - currentCenter;
      // critically damped follow: desired velocity proportional to diff, capped
      const desiredV = Math.sign(diff) * Math.min(Math.abs(diff) * 14, MAX_PADDLE_SPEED);
      accel = (desiredV - state.leftV) * 12; // softly approach desired
    } else {
      if (state.keys.up)   accel -= PADDLE_ACCEL;
      if (state.keys.down) accel += PADDLE_ACCEL;
      // drag when no input
      if (!state.keys.up && !state.keys.down) {
        state.leftV *= Math.max(0, 1 - PADDLE_DRAG * dt);
      }
    }
    state.leftV += accel * dt;
    if (state.leftV > MAX_PADDLE_SPEED)  state.leftV = MAX_PADDLE_SPEED;
    if (state.leftV < -MAX_PADDLE_SPEED) state.leftV = -MAX_PADDLE_SPEED;
    state.leftY += state.leftV * dt;
    if (state.leftY < 0) { state.leftY = 0; state.leftV = 0; }
    if (state.leftY > H - PADDLE_H) { state.leftY = H - PADDLE_H; state.leftV = 0; }

    // AI paddle: track ball with smoothing + jitter
    let target = state.ball.y - PADDLE_H/2;
    // dampen anticipation when ball is moving away
    if (state.ball.vx < 0) {
      target = H/2 - PADDLE_H/2 + Math.sin(performance.now()*0.0007)*40; // idle drift
    } else {
      // add jitter so AI isn't perfect
      target += (Math.sin(performance.now()*0.003) * AI_MISS);
    }
    const aiCenterDelta = target - state.rightY;
    state.rightV = aiCenterDelta * AI_REACT * 60; // smoothing
    state.rightV = Math.max(-MAX_PADDLE_SPEED*0.78, Math.min(MAX_PADDLE_SPEED*0.78, state.rightV));
    state.rightY += state.rightV * dt;
    if (state.rightY < 0) state.rightY = 0;
    if (state.rightY > H - PADDLE_H) state.rightY = H - PADDLE_H;

    // ball
    if (state.serveDelay > 0){
      state.serveDelay -= dt;
      return;
    }

    // store trail
    state.trail.push({ x: state.ball.x, y: state.ball.y });
    if (state.trail.length > 16) state.trail.shift();

    state.ball.x += state.ball.vx * dt;
    state.ball.y += state.ball.vy * dt;

    // wall bounce
    if (state.ball.y - BALL_R < 0){
      state.ball.y = BALL_R; state.ball.vy = Math.abs(state.ball.vy);
      blip(280, 0.06, 'square', 0.14);
      spawnParticles(state.ball.x, 0, 270, 5);
    }
    if (state.ball.y + BALL_R > H){
      state.ball.y = H - BALL_R; state.ball.vy = -Math.abs(state.ball.vy);
      blip(280, 0.06, 'square', 0.14);
      spawnParticles(state.ball.x, H, 270, 5);
    }

    // paddle collision left
    const leftX = 22, leftRX = leftX + PADDLE_W;
    if (state.ball.vx < 0 && state.ball.x - BALL_R <= leftRX && state.ball.x + BALL_R >= leftX){
      if (state.ball.y >= state.leftY && state.ball.y <= state.leftY + PADDLE_H){
        state.ball.x = leftRX + BALL_R;
        // compute reflection angle based on hit position
        const hit = (state.ball.y - (state.leftY + PADDLE_H/2)) / (PADDLE_H/2); // -1..1
        const speed = Math.min(Math.hypot(state.ball.vx, state.ball.vy) + BALL_SPEED_BUMP, MAX_BALL_SPEED);
        const angle = hit * 0.85; // up to ~49°
        state.ball.vx = Math.cos(angle) * speed;
        state.ball.vy = Math.sin(angle) * speed;
        // add a bit of paddle momentum
        state.ball.vy += state.leftV * 0.18;
        blip(520, 0.07, 'square', 0.18);
        spawnParticles(state.ball.x, state.ball.y, 320, 8);
      }
    }
    // paddle collision right
    const rightX = W - 22 - PADDLE_W, rightRX = rightX + PADDLE_W;
    if (state.ball.vx > 0 && state.ball.x + BALL_R >= rightX && state.ball.x - BALL_R <= rightRX){
      if (state.ball.y >= state.rightY && state.ball.y <= state.rightY + PADDLE_H){
        state.ball.x = rightX - BALL_R;
        const hit = (state.ball.y - (state.rightY + PADDLE_H/2)) / (PADDLE_H/2);
        const speed = Math.min(Math.hypot(state.ball.vx, state.ball.vy) + BALL_SPEED_BUMP, MAX_BALL_SPEED);
        const angle = hit * 0.85;
        state.ball.vx = -Math.cos(angle) * speed;
        state.ball.vy = Math.sin(angle) * speed;
        state.ball.vy += state.rightV * 0.18;
        blip(440, 0.07, 'square', 0.18);
        spawnParticles(state.ball.x, state.ball.y, 190, 8);
      }
    }

    // out of bounds
    if (state.ball.x < -BALL_R){
      state.scoreR++; updateScore();
      sweep(220, 90, 0.35);
      spawnParticles(0, state.ball.y, 190, 18);
      if (state.scoreR >= WIN_SCORE) endGame(false);
      else resetBall(-1);
    } else if (state.ball.x > W + BALL_R){
      state.scoreL++; updateScore();
      sweep(440, 200, 0.35);
      spawnParticles(W, state.ball.y, 320, 18);
      if (state.scoreL >= WIN_SCORE) endGame(true);
      else resetBall(1);
    }

    // particles
    for (let i = state.particles.length - 1; i >= 0; i--){
      const p = state.particles[i];
      p.age += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= Math.max(0, 1 - 1.2 * dt);
      p.vy *= Math.max(0, 1 - 1.2 * dt);
      if (p.age >= p.life) state.particles.splice(i, 1);
    }
  }

  function endGame(won){
    state.running = false;
    state.particles.length = 0;
    if (won){
      showMsg('You win', 'first to 7 · you closed it out', 'Play again');
      // chord burst
      blip(523, 0.5, 'triangle', 0.18);
      setTimeout(()=>blip(659, 0.5, 'triangle', 0.18), 120);
      setTimeout(()=>blip(784, 0.7, 'triangle', 0.18), 240);
    } else {
      showMsg('Bot wins', 'first to 7 · the synth got you', 'Rematch');
      sweep(420, 90, 0.7);
    }
  }

  // --- render ---
  function render(){
    ctx.fillStyle = 'rgba(6, 2, 26, 0.40)';
    ctx.fillRect(0, 0, W, H);

    // midline glow
    ctx.save();
    ctx.strokeStyle = 'rgba(168, 107, 255, 0.55)';
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 12]);
    ctx.shadowColor = 'rgba(168, 107, 255, 0.6)';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.moveTo(W/2, 6); ctx.lineTo(W/2, H - 6);
    ctx.stroke();
    ctx.restore();

    // particles
    for (const p of state.particles){
      const alpha = 1 - (p.age / p.life);
      ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${alpha})`;
      ctx.shadowColor = `hsl(${p.hue}, 100%, 70%)`;
      ctx.shadowBlur = 10;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.shadowBlur = 0;

    // ball trail
    for (let i = 0; i < state.trail.length; i++){
      const t = state.trail[i];
      const k = i / state.trail.length;
      const r = BALL_R * (0.4 + k * 0.7);
      ctx.fillStyle = `rgba(255, 223, 94, ${0.06 + k * 0.35})`;
      ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI*2); ctx.fill();
    }

    // paddles
    drawPaddle(22, state.leftY, '#ff3fa8', 'rgba(255,63,168,0.7)');
    drawPaddle(W - 22 - PADDLE_W, state.rightY, '#3ff0ff', 'rgba(63,240,255,0.7)');

    // ball
    ctx.save();
    ctx.shadowColor = '#ffdf5e'; ctx.shadowBlur = 24;
    ctx.fillStyle = '#fff7c8';
    ctx.beginPath(); ctx.arc(state.ball.x, state.ball.y, BALL_R, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffdf5e';
    ctx.beginPath(); ctx.arc(state.ball.x, state.ball.y, BALL_R*0.55, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawPaddle(x, y, color, glow){
    ctx.save();
    ctx.shadowColor = glow; ctx.shadowBlur = 22;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(x, y, PADDLE_W, PADDLE_H);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, PADDLE_W, PADDLE_H);
    ctx.shadowBlur = 0;
    // inner highlight stripe
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(x + 3, y + 5, 2, PADDLE_H - 10);
    ctx.restore();
  }

  // --- main loop ---
  function frame(t){
    if (!state.lastT) state.lastT = t;
    const dt = Math.min(0.033, (t - state.lastT) / 1000);
    state.lastT = t;
    if (state.running && !state.paused) update(dt);
    render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
