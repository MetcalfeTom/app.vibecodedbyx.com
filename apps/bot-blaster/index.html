<html lang="en">
<head>

<style>
  :root{
    --hot:#ff37c8;
    --cool:#4ec9d6;
    --gold:#ffce4a;
    --green:#7dff8a;
    --paper:#f6e7c2;
    --bg-deep:#0b0420;
    --bg-mid:#1a0838;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;color:var(--paper);font-family:'JetBrains Mono', monospace;cursor:none}
  canvas{display:block;width:100vw;height:100vh}

  /* HUD */
  .hud{position:fixed;inset:0;pointer-events:none;z-index:5}
  .crosshair{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:18px;height:18px;
    background:
      linear-gradient(transparent 8px, var(--gold) 8px, var(--gold) 10px, transparent 10px),
      linear-gradient(90deg, transparent 8px, var(--gold) 8px, var(--gold) 10px, transparent 10px);
    mix-blend-mode:screen;
    filter:drop-shadow(0 0 4px var(--gold));
    opacity:0.85;
  }
  .crosshair.hit{filter:drop-shadow(0 0 8px var(--hot));opacity:1;background:
      linear-gradient(transparent 8px, var(--hot) 8px, var(--hot) 10px, transparent 10px),
      linear-gradient(90deg, transparent 8px, var(--hot) 8px, var(--hot) 10px, transparent 10px);}

  .stats{
    position:absolute;left:18px;bottom:18px;
    display:flex;flex-direction:column;gap:6px;
    font-family:'Silkscreen', monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
  }
  .stats .row{
    display:flex;align-items:center;gap:8px;
    background:rgba(10,4,30,0.55);
    border:1px solid rgba(247,231,194,0.18);
    border-radius:6px;padding:6px 10px;backdrop-filter:blur(6px);
  }
  .stats .row.hp   {border-color:var(--hot);color:var(--hot);text-shadow:0 0 6px var(--hot)}
  .stats .row.kills{border-color:var(--cool);color:var(--cool);text-shadow:0 0 6px var(--cool)}
  .stats .row.bots {border-color:var(--green);color:var(--green);text-shadow:0 0 6px var(--green)}
  .stats .num{font-family:'Bungee', sans-serif;font-size:14px;color:var(--paper);min-width:1.4ch}
  .bar{
    width:160px;height:8px;border-radius:4px;
    background:rgba(247,231,194,0.10);overflow:hidden;border:1px solid rgba(247,231,194,0.20);
  }
  .bar-fill{height:100%;background:linear-gradient(90deg, var(--hot), var(--gold));transition:width 0.18s ease}

  .hint{
    position:absolute;left:50%;top:60%;transform:translateX(-50%);
    font-family:'Silkscreen', monospace;font-size:11px;letter-spacing:0.22em;
    color:rgba(247,231,194,0.55);text-align:center;line-height:1.7;text-transform:uppercase;
    pointer-events:none;
  }
  .hint .kbd{
    display:inline-block;padding:2px 7px;margin:0 2px;
    border:1px solid rgba(247,231,194,0.35);border-radius:4px;
    color:var(--paper);background:rgba(10,4,30,0.5);
  }
  .hint.gone{display:none}

  /* damage / hit flash */
  .damage-flash{
    position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(circle at center, transparent 30%, rgba(255,40,80,0.5) 100%);
    opacity:0;transition:opacity 0.16s ease-out;
  }
  .damage-flash.on{opacity:1;transition:none}

  /* title overlay */
  .title{
    position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%, rgba(255,55,200,0.22), transparent 60%),
               linear-gradient(180deg, var(--bg-deep), #000);
    z-index:20;cursor:pointer;
  }
  .title h1{
    font-family:'Bungee Shade', sans-serif;
    font-size:clamp(46px, 9vw, 88px);
    letter-spacing:0.04em;margin:0;
    background:linear-gradient(180deg, var(--hot) 0%, var(--gold) 50%, var(--cool) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    text-shadow:0 0 22px rgba(255,55,200,0.5);
    line-height:1;
  }
  .title .sub{
    font-family:'JetBrains Mono', monospace;font-size:13px;letter-spacing:0.32em;
    color:var(--cool);text-shadow:0 0 10px var(--cool);margin-top:14px;text-transform:uppercase;
  }
  .title .ctas{margin-top:32px;font-family:'Silkscreen',monospace;font-size:11px;letter-spacing:0.18em;color:rgba(247,231,194,0.65);text-transform:uppercase;text-align:center;line-height:2}
  .title .ctas .kbd{display:inline-block;padding:2px 8px;margin:0 3px;border:1px solid rgba(247,231,194,0.35);border-radius:4px;color:var(--paper);background:rgba(10,4,30,0.5)}
  .title.gone{display:none}

  /* end overlay */
  .end{
    position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(10,4,30,0.85);backdrop-filter:blur(10px);
    z-index:25;
  }
  .end.show{display:flex}
  .end h2{
    font-family:'Bungee Shade', sans-serif;font-size:62px;margin:0;letter-spacing:0.04em;line-height:1;
  }
  .end h2.win{color:var(--green);text-shadow:0 0 20px var(--green)}
  .end h2.lose{color:var(--hot);text-shadow:0 0 20px var(--hot)}
  .end .stats-final{
    margin:24px 0 28px;
    font-family:'Silkscreen', monospace;font-size:12px;letter-spacing:0.22em;
    color:rgba(247,231,194,0.7);text-transform:uppercase;text-align:center;line-height:2.0;
  }
  .end .stats-final .v{font-family:'Bungee', sans-serif;font-size:24px;color:var(--paper)}
  .end button{
    background:linear-gradient(180deg, var(--hot), #c33269);
    border:2px solid var(--paper);color:var(--paper);
    font-family:'Bungee', sans-serif;font-size:14px;letter-spacing:0.18em;text-transform:uppercase;
    padding:12px 30px;border-radius:8px;cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,0.4), 0 0 22px rgba(255,55,200,0.6);
  }
  .end button:hover{filter:brightness(1.12)}
  .end button:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,0.4)}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="hud">
  <div class="damage-flash" id="dmg"></div>
  <div class="crosshair" id="ch"></div>
  <div class="stats">
    <div class="row hp">HP <div class="bar"><div class="bar-fill" id="hpFill" style="width:100%"></div></div></div>
    <div class="row kills">KILLS<span class="num" id="kills">0</span></div>
    <div class="row bots">BOTS LEFT<span class="num" id="botsLeft">5</span></div>
  </div>

</div>

<div class="title" id="title">
  <h1>BOT · BLASTER</h1>
  <div class="sub">neon arena · low-poly enemies</div>
  <div class="ctas">
    <span class="kbd">CLICK</span> begin & lock pointer<br>
    <span class="kbd">WASD</span> move &nbsp; <span class="kbd">MOUSE</span> aim &nbsp; <span class="kbd">CLICK</span> fire &nbsp; <span class="kbd">ESC</span> release
  </div>
</div>

<div class="end" id="end">
  <h2 id="endTitle">YOU WIN</h2>
  <div class="stats-final">
    KILLS<br><span class="v" id="endKills">0</span><br>
    HP REMAINING<br><span class="v" id="endHp">0</span>
  </div>
  <button id="restartBtn">PLAY AGAIN</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ===== SCENE / CAMERA / RENDERER =====
const cvs = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas: cvs, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight, false);
renderer.setClearColor(0x05031a);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05031a, 0.045);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 80);
camera.position.set(0, 1.55, 0);   // 1.55 = eye height
const yawObj   = new THREE.Object3D();    // rotates left/right
const pitchObj = new THREE.Object3D();    // rotates up/down
yawObj.add(pitchObj);
pitchObj.add(camera);
scene.add(yawObj);

// ===== MAP =====
// 1 = wall, 0 = floor, 2 = bot spawn, 3 = player spawn. Walls share a
// common neon-stripe material; floor + ceiling are big planes.
//
// NEON FACILITY — homage to GoldenEye 007's iconic level. Top-left
// 4-cell room is the BATHROOM (player spawn '3' on the inside; the
// real Facility starts you locked in a stall). North wing splits into
// six cubicle/lab rooms (3 over 3) — that's the bottling room + lab.
// A long corridor with a parallel vent shaft drops south to the
// LOADING BAY (bottom-right open area). Bot spawns ('2') are placed
// in each major room so combat plays out in every corner of the map.
//
// All 21 rows are exactly 24 chars wide; perimeter sealed.
const MAP_TXT = [
  '########################',
  '#3...#.................#',
  '#....#..######.######..#',
  '#....#..#....#.#....#..#',
  '###.##..#.##.#.#.##.#..#',
  '#.......#.##.#.#.##.#..#',
  '#.#####.#.2..#.#..2.#..#',
  '#.#...#.#.##.#.#.##.#..#',
  '#.#.2.#.######.######..#',
  '#.#...#.2.....2.....2..#',
  '#.#####.################',
  '#.......#.............2#',
  '########.#.#############',
  '#........#.#..........##',
  '#.######.#.#.########.##',
  '#.#......#.#.#......#.##',
  '#.#.2..2.#.#.#.######.##',
  '#.#......#.#.#........##',
  '#.#.######.#.#.######.##',
  '#.#......2.#.#......2.##',
  '########################',
];
const MAP_W = MAP_TXT[0].length;
const MAP_H = MAP_TXT.length;
const TILE  = 2.0;   // world-units per cell
const wallAt = (cx, cy) => {
  if (cx < 0 || cy < 0 || cx >= MAP_W || cy >= MAP_H) return true;
  return MAP_TXT[cy][cx] === '#';
};

// ===== FLOOR / CEILING / WALLS =====
const floorMat = new THREE.MeshBasicMaterial({ color: 0x0a0526 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(MAP_W*TILE*2, MAP_H*TILE*2), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(MAP_W*TILE/2, 0, MAP_H*TILE/2);
scene.add(floor);

// neon grid overlay (semi-transparent lines on the floor)
const gridHelper = new THREE.GridHelper(MAP_W*TILE*2, MAP_W*2, 0xff37c8, 0x4ec9d6);
gridHelper.material.opacity = 0.18;
gridHelper.material.transparent = true;
gridHelper.position.set(MAP_W*TILE/2, 0.01, MAP_H*TILE/2);
scene.add(gridHelper);

const ceilMat = new THREE.MeshBasicMaterial({ color: 0x0c0535, side: THREE.DoubleSide });
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(MAP_W*TILE*2, MAP_H*TILE*2), ceilMat);
ceil.rotation.x =  Math.PI / 2;
ceil.position.set(MAP_W*TILE/2, 4.4, MAP_H*TILE/2);
scene.add(ceil);

// Walls: instance per cell. Three colour rotations so the arena feels
// less monotone.
const wallColors = [0xff37c8, 0x4ec9d6, 0xffce4a];
const wallGeo = new THREE.BoxGeometry(TILE, 4, TILE);
const wallMats = wallColors.map(c => new THREE.MeshBasicMaterial({ color: c }));
let playerSpawn = { x: 1*TILE + TILE/2, z: 1*TILE + TILE/2 };
const botSpawns  = [];
for (let cy = 0; cy < MAP_H; cy++) {
  for (let cx = 0; cx < MAP_W; cx++) {
    const ch = MAP_TXT[cy][cx];
    if (ch === '#') {
      const mat = wallMats[(cx * 7 + cy * 13) % wallMats.length];
      const m = new THREE.Mesh(wallGeo, mat);
      m.position.set(cx*TILE + TILE/2, 2, cy*TILE + TILE/2);
      // Wireframe pulse: add a slim outline so the wall reads as a
      // neon volume rather than a flat fill.
      const edge = new THREE.LineSegments(
        new THREE.EdgesGeometry(wallGeo),
        new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.18 })
      );
      m.add(edge);
      scene.add(m);
    } else if (ch === '2') {
      botSpawns.push({ x: cx*TILE + TILE/2, z: cy*TILE + TILE/2 });
    } else if (ch === '3') {
      playerSpawn = { x: cx*TILE + TILE/2, z: cy*TILE + TILE/2 };
    }
  }
}

// ===== BOTS =====
// Each bot is a low-poly stack: body box + glowing sphere head + two
// light pinprick eyes. State machine: idle wander → chase → shoot.
class Bot {
  constructor(x, z) {
    this.group = new THREE.Group();
    this.group.position.set(x, 0, z);
    this.r = 0.55;
    this.hp = 3;
    this.alive = true;
    this.state = 'idle';
    this.shootCD = 1.5 + Math.random();
    this.wanderT = 0;
    this.wanderDir = new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize();

    // body — magenta glowing cube
    const bodyMat = new THREE.MeshBasicMaterial({ color: 0xff37c8 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.9, 0.6), bodyMat);
    body.position.y = 0.85;
    this.group.add(body);
    this.body = body;

    // head — cyan sphere
    const headMat = new THREE.MeshBasicMaterial({ color: 0x4ec9d6 });
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 8), headMat);
    head.position.y = 1.55;
    this.group.add(head);
    this.head = head;

    // eyes — tiny gold dots
    const eyeGeo = new THREE.SphereGeometry(0.06, 6, 6);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffce4a });
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.12, 1.6, 0.30); this.group.add(eyeL);
    const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set( 0.12, 1.6, 0.30); this.group.add(eyeR);

    // antenna
    const antMat = new THREE.MeshBasicMaterial({ color: 0xffce4a });
    const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4), antMat);
    antenna.position.y = 2.0;
    this.group.add(antenna);

    // wireframe
    const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(0.7, 0.9, 0.6));
    const wf = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.4, transparent: true }));
    wf.position.y = 0.85;
    this.group.add(wf);

    scene.add(this.group);
  }
  takeHit(dmg) {
    this.hp -= dmg;
    // flash white
    this.body.material.color.setHex(0xffffff);
    this.head.material.color.setHex(0xffffff);
    setTimeout(() => {
      if (this.alive) {
        this.body.material.color.setHex(0xff37c8);
        this.head.material.color.setHex(0x4ec9d6);
      }
    }, 80);
    if (this.hp <= 0) this.die();
  }
  die() {
    this.alive = false;
    // implosion: shrink + fade
    const start = performance.now();
    const dur = 350;
    const baseScale = this.group.scale.x;
    const fade = () => {
      const t = (performance.now() - start) / dur;
      if (t >= 1) {
        scene.remove(this.group);
        return;
      }
      const k = 1 - t;
      this.group.scale.setScalar(baseScale * k);
      this.group.position.y = t * 0.6;
      requestAnimationFrame(fade);
    };
    fade();
    addKill();
  }
  update(dt, player) {
    if (!this.alive) return;
    const px = player.position.x, pz = player.position.z;
    const dx = px - this.group.position.x;
    const dz = pz - this.group.position.z;
    const dist = Math.hypot(dx, dz);
    // line-of-sight check: cast a ray through the cell grid
    const sees = this.canSee(px, pz);
    // pick state
    if (sees && dist < 14) {
      this.state = dist < 4 ? 'attack' : 'chase';
    } else {
      this.state = 'idle';
    }
    let mvx = 0, mvz = 0;
    const SPEED = 1.4;
    if (this.state === 'chase' || this.state === 'attack') {
      const ax = dx / (dist || 1), az = dz / (dist || 1);
      // attack: keep distance ~3-4
      if (this.state === 'attack' && dist < 3.0) {
        mvx = -ax * SPEED * 0.4;
        mvz = -az * SPEED * 0.4;
      } else if (this.state === 'chase') {
        mvx = ax * SPEED;
        mvz = az * SPEED;
      }
      // shoot
      this.shootCD -= dt;
      if (this.shootCD <= 0 && sees && dist < 12) {
        this.shoot(player);
        this.shootCD = 1.6 + Math.random() * 1.2;
      }
      // face the player
      this.group.rotation.y = Math.atan2(dx, dz);
    } else {
      this.wanderT -= dt;
      if (this.wanderT <= 0) {
        this.wanderT = 1.5 + Math.random() * 2;
        this.wanderDir.set(Math.random()-0.5, 0, Math.random()-0.5).normalize();
      }
      mvx = this.wanderDir.x * SPEED * 0.4;
      mvz = this.wanderDir.z * SPEED * 0.4;
      this.group.rotation.y += dt * 0.3;
    }
    // step with wall collision
    const nx = this.group.position.x + mvx * dt;
    const nz = this.group.position.z + mvz * dt;
    if (!collidesWall(nx, this.group.position.z, this.r)) this.group.position.x = nx;
    if (!collidesWall(this.group.position.x, nz, this.r)) this.group.position.z = nz;
    // gentle bob
    this.head.position.y = 1.55 + Math.sin(performance.now() * 0.004 + this.group.position.x) * 0.06;
  }
  canSee(px, pz) {
    // step along the line in 0.2u increments, abort if any wall cell.
    const sx = this.group.position.x, sz = this.group.position.z;
    const dx = px - sx, dz = pz - sz;
    const len = Math.hypot(dx, dz);
    const steps = Math.ceil(len / 0.25);
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const x = sx + dx * t;
      const z = sz + dz * t;
      const cx = Math.floor(x / TILE);
      const cy = Math.floor(z / TILE);
      if (wallAt(cx, cy)) return false;
    }
    return true;
  }
  shoot(player) {
    // hitscan with random spread; deals 8-12 damage.
    const sx = this.group.position.x, sz = this.group.position.z;
    const px = player.position.x, pz = player.position.z;
    // spawn a tracer line
    spawnTracer(sx, 1.6, sz, px, 1.55, pz, 0xffce4a);
    // 70% hit if in close range
    const dist = Math.hypot(px - sx, pz - sz);
    const hitChance = Math.max(0.25, 0.85 - dist * 0.05);
    if (Math.random() < hitChance) {
      const dmg = 6 + Math.floor(Math.random() * 6);
      damagePlayer(dmg);
    }
    sfxBotShoot();
  }
}

// ===== TRACER FX =====
const tracers = [];
function spawnTracer(x1, y1, z1, x2, y2, z2, color) {
  const geom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x1, y1, z1),
    new THREE.Vector3(x2, y2, z2),
  ]);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.95 });
  const line = new THREE.Line(geom, mat);
  scene.add(line);
  tracers.push({ line, born: performance.now(), dur: 200 });
}
function tickTracers() {
  for (let i = tracers.length - 1; i >= 0; i--) {
    const t = tracers[i];
    const age = performance.now() - t.born;
    if (age > t.dur) {
      scene.remove(t.line);
      tracers.splice(i, 1);
    } else {
      t.line.material.opacity = 1 - age / t.dur;
    }
  }
}

// ===== COLLISION =====
function collidesWall(x, z, r) {
  // axis-aligned circle-vs-grid check
  const minCx = Math.floor((x - r) / TILE);
  const maxCx = Math.floor((x + r) / TILE);
  const minCy = Math.floor((z - r) / TILE);
  const maxCy = Math.floor((z + r) / TILE);
  for (let cy = minCy; cy <= maxCy; cy++) {
    for (let cx = minCx; cx <= maxCx; cx++) {
      if (!wallAt(cx, cy)) continue;
      // closest point on cell rect to circle centre
      const rx = cx * TILE, ry = cy * TILE;
      const px = Math.max(rx, Math.min(x, rx + TILE));
      const pz = Math.max(ry, Math.min(z, ry + TILE));
      const dd = (x - px) * (x - px) + (z - pz) * (z - pz);
      if (dd < r * r) return true;
    }
  }
  return false;
}

// ===== INPUT =====
const keys = Object.create(null);
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

let pointerLocked = false;
cvs.addEventListener('click', () => {
  if (!started) { startGame(); return; }
  if (gameOver) return;
  if (!pointerLocked) { cvs.requestPointerLock(); return; }
  fireGun();
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === cvs;
});
document.addEventListener('mousemove', e => {
  if (!pointerLocked) return;
  const SENS = 0.0024;
  yawObj.rotation.y -= e.movementX * SENS;
  pitchObj.rotation.x -= e.movementY * SENS;
  pitchObj.rotation.x = Math.max(-1.2, Math.min(1.2, pitchObj.rotation.x));
});

// ===== AUDIO =====
let actx = null;
function ensureAudio() {
  if (actx) return actx;
  try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  return actx;
}
function blip(freq, dur, type, vol) {
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator();
  const g = a.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol || 0.18, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(a.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function sfxShoot() {
  blip(900, 0.05, 'square', 0.22);
  setTimeout(() => blip(280, 0.10, 'sawtooth', 0.16), 12);
}
function sfxBotShoot() {
  blip(440, 0.05, 'sawtooth', 0.14);
  setTimeout(() => blip(180, 0.10, 'square', 0.10), 10);
}
function sfxHit() {
  blip(600, 0.06, 'square', 0.18);
  setTimeout(() => blip(820, 0.08, 'triangle', 0.14), 30);
}
function sfxKill() {
  blip(660, 0.10, 'sawtooth', 0.20);
  setTimeout(() => blip(440, 0.10, 'sawtooth', 0.18),  60);
  setTimeout(() => blip(220, 0.18, 'sawtooth', 0.16), 130);
}
function sfxDamage() {
  blip(120, 0.18, 'sawtooth', 0.20);
}
function sfxEnd() {
  blip(523, 0.18, 'triangle', 0.20);
  setTimeout(() => blip(659, 0.18, 'triangle', 0.18),  90);
  setTimeout(() => blip(784, 0.28, 'triangle', 0.16), 180);
}

// ===== STATE =====
const player = {
  position: new THREE.Vector3(playerSpawn.x, 1.55, playerSpawn.z),
  hp: 100,
  maxHp: 100,
  r: 0.35,
  speed: 4.0,
  fireCD: 0,
};
yawObj.position.copy(player.position);

const bots = [];
for (const s of botSpawns) bots.push(new Bot(s.x, s.z));

let kills = 0;
let started = false;
let gameOver = false;
function addKill() {
  kills++;
  document.getElementById('kills').textContent = kills;
  document.getElementById('botsLeft').textContent = bots.filter(b => b.alive).length;
  sfxKill();
  if (bots.every(b => !b.alive)) endGame(true);
}
function damagePlayer(dmg) {
  if (gameOver) return;
  player.hp = Math.max(0, player.hp - dmg);
  document.getElementById('hpFill').style.width = (player.hp / player.maxHp * 100) + '%';
  const flash = document.getElementById('dmg');
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 180);
  sfxDamage();
  if (player.hp <= 0) endGame(false);
}

// ===== FIRE =====
const ray = new THREE.Raycaster();
function fireGun() {
  if (player.fireCD > 0) return;
  player.fireCD = 0.16;
  sfxShoot();
  // muzzle flash + tracer
  const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.getWorldQuaternion(new THREE.Quaternion()));
  // align: get camera world position
  const camPos = new THREE.Vector3();
  camera.getWorldPosition(camPos);
  ray.set(camPos, camDir);
  // hit-test bots first (closest)
  let nearest = null, nd = Infinity;
  for (const b of bots) {
    if (!b.alive) continue;
    // fake bot collider sphere
    const center = new THREE.Vector3(b.group.position.x, 1.2, b.group.position.z);
    const t = raySphereDist(camPos, camDir, center, 0.95);
    if (t !== null && t < nd) { nd = t; nearest = b; }
  }
  // also check wall before bot
  const wallT = raycastWall(camPos, camDir);
  if (nearest && (wallT === null || nd < wallT)) {
    const hit = camPos.clone().add(camDir.clone().multiplyScalar(nd));
    spawnTracer(camPos.x, camPos.y - 0.1, camPos.z, hit.x, hit.y, hit.z, 0xffce4a);
    nearest.takeHit(1);
    sfxHit();
    crosshairHit();
  } else {
    const tEnd = wallT === null ? 30 : wallT;
    const end = camPos.clone().add(camDir.clone().multiplyScalar(tEnd));
    spawnTracer(camPos.x, camPos.y - 0.1, camPos.z, end.x, end.y, end.z, 0xff37c8);
  }
}
function raySphereDist(ro, rd, c, r) {
  const oc = ro.clone().sub(c);
  const b = oc.dot(rd);
  const cv = oc.dot(oc) - r * r;
  const disc = b * b - cv;
  if (disc < 0) return null;
  const t = -b - Math.sqrt(disc);
  return t > 0 ? t : null;
}
function raycastWall(ro, rd) {
  // step along ray, return distance to first wall (cell boundary). 0.1u step.
  const STEP = 0.1, MAX = 30;
  for (let t = 0; t < MAX; t += STEP) {
    const x = ro.x + rd.x * t;
    const z = ro.z + rd.z * t;
    const cx = Math.floor(x / TILE);
    const cy = Math.floor(z / TILE);
    if (wallAt(cx, cy)) return t;
  }
  return null;
}
function crosshairHit() {
  const ch = document.getElementById('ch');
  ch.classList.add('hit');
  setTimeout(() => ch.classList.remove('hit'), 130);
}

// ===== UPDATE LOOP =====
let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (started && !gameOver) {
    updatePlayer(dt);
    for (const b of bots) b.update(dt, player);
  }
  tickTracers();
  // slowly regen HP when not damaged recently
  // (intentional: keeps the pace forgiving but not trivial)
  if (player.hp > 0 && player.hp < player.maxHp) {
    player.hp = Math.min(player.maxHp, player.hp + dt * 1.5);
    document.getElementById('hpFill').style.width = (player.hp / player.maxHp * 100) + '%';
  }
  if (player.fireCD > 0) player.fireCD -= dt;
  yawObj.position.copy(player.position);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function updatePlayer(dt) {
  // build move vector in camera-yaw space
  let fx = 0, fz = 0;
  if (keys['KeyW'] || keys['ArrowUp'])    fz -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  fz += 1;
  if (keys['KeyA'] || keys['ArrowLeft'])  fx -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) fx += 1;
  const mag = Math.hypot(fx, fz);
  if (mag > 0) { fx /= mag; fz /= mag; }
  // rotate by yaw
  const cos = Math.cos(yawObj.rotation.y), sin = Math.sin(yawObj.rotation.y);
  const wx = fx * cos + fz * sin;
  const wz = -fx * sin + fz * cos;
  const dx = wx * player.speed * dt;
  const dz = wz * player.speed * dt;
  const nx = player.position.x + dx;
  const nz = player.position.z + dz;
  if (!collidesWall(nx, player.position.z, player.r)) player.position.x = nx;
  if (!collidesWall(player.position.x, nz, player.r)) player.position.z = nz;
  // tiny head-bob
  const moving = mag > 0;
  const bob = moving ? Math.sin(performance.now() * 0.012) * 0.02 : 0;
  pitchObj.position.y = bob;
}

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ===== START / END =====
const titleEl = document.getElementById('title');
const endEl = document.getElementById('end');
const hintEl = document.getElementById('hint');

function startGame() {
  titleEl.classList.add('gone');
  endEl.classList.remove('show');
  ensureAudio();
  cvs.requestPointerLock();
  started = true;
  setTimeout(() => hintEl.classList.add('gone'), 4000);
}
function endGame(win) {
  gameOver = true;
  document.exitPointerLock();
  document.getElementById('endTitle').textContent = win ? 'YOU WIN' : 'BOTS WIN';
  document.getElementById('endTitle').className = win ? 'win' : 'lose';
  document.getElementById('endKills').textContent = kills;
  document.getElementById('endHp').textContent = Math.ceil(player.hp);
  endEl.classList.add('show');
  sfxEnd();
}
document.getElementById('restartBtn').addEventListener('click', () => {
  // hard reset by reloading — keeps the code small
  location.reload();
});
</script>
