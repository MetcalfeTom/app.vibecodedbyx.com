<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Code Creatures</title>
  <meta name="description" content="Type to forge tiny creatures. Their DNA is your keystrokes." />
  <meta property="og:title" content="Code Creatures" />
  <meta property="og:description" content="Type to forge tiny creatures. Their DNA is your keystrokes." />
  <meta property="og:image" content="https://image.pollinations.ai/prompt/glowing%20pixel%20art%20creature%20made%20of%20code%20glyphs%20on%20deep%20violet%20background%20cinematic%20neon?width=1200&height=630&nologo=true" />
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%AC" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=JetBrains+Mono:wght@300;500&family=Silkscreen&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0420;
      --bg2: #1b0838;
      --ink: #f6e7ff;
      --dim: #8a76b8;
      --kw: #c986e0;
      --str: #7ec97a;
      --num: #f5b362;
      --fn: #5fc0e0;
      --op: #ff7e9a;
      --line: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: radial-gradient(circle at 50% -10%, var(--bg2), var(--bg) 60%);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 18% 22%, rgba(201, 134, 224, 0.10), transparent 40%),
        radial-gradient(circle at 82% 70%, rgba(95, 192, 224, 0.08), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }
    main {
      position: relative;
      z-index: 1;
      max-width: 880px;
      margin: 0 auto;
      padding: 56px 24px 96px;
    }
    header { text-align: center; margin-bottom: 44px; }
    h1 {
      font-family: 'Major Mono Display', monospace;
      font-size: clamp(40px, 8vw, 72px);
      margin: 0;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-shadow: 0 0 32px rgba(201, 134, 224, 0.35);
    }
    h1 em { color: var(--kw); font-style: normal; }
    .sub {
      font-family: 'Silkscreen', monospace;
      font-size: 11px;
      letter-spacing: 0.45em;
      color: var(--dim);
      margin-top: 14px;
      text-transform: uppercase;
    }
    section {
      background: rgba(10, 1, 36, 0.55);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 28px;
      backdrop-filter: blur(8px);
    }
    .label {
      font-family: 'Silkscreen', monospace;
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .dna-input {
      width: 100%;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--line);
      color: var(--str);
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      padding: 16px 18px;
      border-radius: 12px;
      outline: none;
      letter-spacing: 0.04em;
    }
    .dna-input:focus { border-color: var(--kw); box-shadow: 0 0 0 3px rgba(201,134,224,0.18); }
    .row { display: flex; gap: 12px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
    .meter {
      flex: 1; min-width: 200px;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }
    .meter > div {
      height: 100%;
      background: linear-gradient(90deg, var(--kw), var(--fn));
      width: 0%;
      transition: width 0.18s ease;
    }
    .count {
      font-family: 'Silkscreen', monospace;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--dim);
    }
    button {
      font-family: 'Silkscreen', monospace;
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--kw), #6b3da6);
      border: none;
      color: white;
      padding: 12px 22px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(201,134,224,0.4); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .roster {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 18px;
    }
    .creature {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      position: relative;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .creature:hover { border-color: var(--kw); transform: translateY(-2px); }
    .creature canvas {
      width: 96px; height: 96px;
      image-rendering: pixelated;
      display: block;
      margin: 0 auto 10px;
    }
    .creature .name {
      font-family: 'Major Mono Display', monospace;
      font-size: 15px;
      color: var(--ink);
      margin: 0;
    }
    .creature .stats {
      font-family: 'Silkscreen', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--dim);
      margin-top: 6px;
    }
    .release {
      position: absolute;
      top: 6px; right: 8px;
      background: transparent;
      color: var(--dim);
      padding: 4px 6px;
      font-size: 9px;
      letter-spacing: 0.2em;
    }
    .release:hover { color: var(--op); background: transparent; box-shadow: none; transform: none; }

    .empty {
      text-align: center;
      color: var(--dim);
      font-style: italic;
      padding: 32px 0;
    }
    .note {
      text-align: center;
      color: var(--dim);
      font-size: 11px;
      margin-top: 12px;
    }
    .note a { color: var(--fn); text-decoration: none; }
    .note a:hover { text-decoration: underline; }

    .garden-wrap {
      position: relative;
      width: 100%;
      height: 360px;
      border-radius: 14px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 110%, rgba(95,192,224,0.10), transparent 55%),
        linear-gradient(180deg, #0a0420 0%, #1a0d3a 70%, #2a1854 100%);
      border: 1px solid var(--line);
    }
    #garden {
      display: block;
      width: 100%;
      height: 100%;
    }
    .garden-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dim);
      font-style: italic;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>code <em>creatures</em></h1>
      <div class="sub">type · forge · keep</div>
    </header>

    <section>
      <div class="label">forge a creature — type up to 32 chars</div>
      <input id="dnaInput" class="dna-input" placeholder="e.g. fn(life => spark + glow)" maxlength="32" autocomplete="off" spellcheck="false" />
      <div class="row">
        <div class="meter"><div id="meterFill"></div></div>
        <div class="count" id="dnaCount">0 / 32</div>
        <button id="hatchBtn" disabled>Hatch</button>
      </div>
    </section>

    <section>
      <div class="label">the garden</div>
      <div class="garden-wrap">
        <canvas id="garden"></canvas>
        <div id="gardenEmpty" class="garden-empty">empty · hatch a creature to populate</div>
      </div>
    </section>

    <section>
      <div class="label">your creatures — <span id="rosterCount">0</span></div>
      <div id="roster" class="roster"></div>
      <div id="empty" class="empty">no creatures yet · type some DNA above</div>
      <div class="note">an older, denser version lives at <a href="/code-creatures-legacy">/code-creatures-legacy</a></div>
    </section>
  </main>

  <script type="module">
    const KEY = 'code-creatures-mini-v1';
    const MAX_DNA = 32;

    // --- Atomic persistence: one key, one JSON array, one save fn. ---
    function loadAll(){
      let raw;
      try { raw = localStorage.getItem(KEY); } catch(_){ return []; }
      if (!raw) return [];
      try {
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr.filter(c => c && c.id && c.dna) : [];
      } catch(_){ return []; }
    }
    let saveScheduled = false;
    function save(){
      if (saveScheduled) return;
      saveScheduled = true;
      Promise.resolve().then(() => {
        saveScheduled = false;
        try { localStorage.setItem(KEY, JSON.stringify(state.creatures)); }
        catch(e){ console.error('[code-creatures] save failed', e); }
      });
    }

    // --- DNA → deterministic sprite + stats + name ---
    function fnv1a(str){
      let h = 0x811c9dc5;
      for (let i = 0; i < str.length; i++){
        h ^= str.charCodeAt(i);
        h = (h * 0x01000193) >>> 0;
      }
      return h >>> 0;
    }
    function mulberry32(seed){
      return function(){
        seed = (seed + 0x6d2b79f5) >>> 0;
        let t = seed;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    function classify(ch){
      if (/[aeiouAEIOU]/.test(ch)) return 'vowel';
      if (/[a-zA-Z]/.test(ch)) return 'cons';
      if (/[0-9]/.test(ch)) return 'digit';
      if (/[+\-*/=<>]/.test(ch)) return 'op';
      if (/[(){}\[\]]/.test(ch)) return 'bracket';
      return 'punct';
    }
    function statsFromDna(dna){
      const counts = { vowel:0, cons:0, digit:0, op:0, bracket:0, punct:0 };
      for (const ch of dna) counts[classify(ch)]++;
      return {
        hp:  60 + counts.vowel * 4 + counts.cons * 2,
        atk: 8 + counts.cons * 2 + counts.digit * 1.5 + counts.op * 1.2 | 0,
        def: 6 + counts.bracket * 2.5 + counts.vowel * 0.6 | 0,
        spd: 6 + counts.digit * 1.6 + counts.punct * 1.1 | 0,
      };
    }
    const SYL_A = ['ae','io','un','vex','zar','mox','kel','ny','ori','sha','byt','hex','arc'];
    const SYL_B = ['lyn','rim','tox','ven','dur','mok','ral','sek','jin','vor','pix','byte','glo'];
    function nameFromDna(dna){
      const rng = mulberry32(fnv1a(dna || 'seed'));
      return (SYL_A[(rng()*SYL_A.length)|0] + SYL_B[(rng()*SYL_B.length)|0])
        .replace(/^./, c => c.toUpperCase());
    }
    function paletteFromDna(dna){
      const counts = { vowel:0, cons:0, digit:0, op:0, bracket:0, punct:0 };
      for (const ch of dna) counts[classify(ch)]++;
      const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
      return ({
        vowel:  ['#7ec97a', '#1a3a18'],
        cons:   ['#c986e0', '#3a1a4a'],
        digit:  ['#5fc0e0', '#0d2a3a'],
        op:     ['#ff7e9a', '#3a0d20'],
        bracket:['#f5b362', '#3a2208'],
        punct:  ['#a4b1bd', '#1a1f24'],
      })[top];
    }
    const GLYPHS = ['o','0','#','%','&','*','+','x','/','\\','=','<','>','{','}'];
    function drawCreature(canvas, dna){
      const ctx = canvas.getContext('2d');
      const W = canvas.width = 96;
      const H = canvas.height = 96;
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, W, H);
      const rng = mulberry32(fnv1a(dna));
      const [main, dark] = paletteFromDna(dna);
      const grid = 16;
      const cell = W / grid;
      // body silhouette: deterministic blob
      const body = Array.from({length: grid}, () => new Array(grid).fill(0));
      const cx = grid / 2, cy = grid / 2;
      for (let y = 0; y < grid; y++){
        for (let x = 0; x < grid / 2 + 1; x++){
          const dx = x - cx, dy = y - cy;
          const r = Math.sqrt(dx*dx + dy*dy * 1.1);
          const noise = rng() * 1.4;
          if (r + noise < grid * 0.42){
            body[y][x] = 1;
            body[y][grid - 1 - x] = 1; // mirror for symmetry
          }
        }
      }
      // fill body with palette glyphs
      ctx.font = `${cell * 1.1 | 0}px monospace`;
      ctx.textBaseline = 'top';
      ctx.textAlign = 'center';
      for (let y = 0; y < grid; y++){
        for (let x = 0; x < grid; x++){
          if (!body[y][x]) continue;
          const ch = GLYPHS[(rng() * GLYPHS.length) | 0];
          const isEdge = !body[y - 1]?.[x] || !body[y + 1]?.[x] || !body[y]?.[x - 1] || !body[y]?.[x + 1];
          ctx.fillStyle = isEdge ? dark : main;
          ctx.fillText(ch, x * cell + cell / 2, y * cell);
        }
      }
      // eyes
      const eyeY = cy - 1, eyeX1 = cx - 2, eyeX2 = cx + 1;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(eyeX1 * cell, eyeY * cell, cell, cell);
      ctx.fillRect(eyeX2 * cell, eyeY * cell, cell, cell);
      ctx.fillStyle = '#000000';
      ctx.fillRect(eyeX1 * cell + cell * 0.25, eyeY * cell + cell * 0.25, cell * 0.5, cell * 0.5);
      ctx.fillRect(eyeX2 * cell + cell * 0.25, eyeY * cell + cell * 0.25, cell * 0.5, cell * 0.5);
    }

    // --- State ---
    const state = { creatures: loadAll() };

    // --- DOM refs (all guarded) ---
    const dnaInput   = document.getElementById('dnaInput');
    const meterFill  = document.getElementById('meterFill');
    const dnaCount   = document.getElementById('dnaCount');
    const hatchBtn   = document.getElementById('hatchBtn');
    const roster     = document.getElementById('roster');
    const rosterCount= document.getElementById('rosterCount');
    const emptyMsg   = document.getElementById('empty');

    function refreshInput(){
      const len = dnaInput?.value.length || 0;
      if (meterFill) meterFill.style.width = (len / MAX_DNA * 100) + '%';
      if (dnaCount)  dnaCount.textContent = `${len} / ${MAX_DNA}`;
      if (hatchBtn)  hatchBtn.disabled = len < 3;
    }
    function refreshRoster(){
      if (!roster) return;
      roster.innerHTML = '';
      if (rosterCount) rosterCount.textContent = state.creatures.length;
      if (emptyMsg) emptyMsg.style.display = state.creatures.length ? 'none' : '';
      for (const c of state.creatures){
        const card = document.createElement('div');
        card.className = 'creature';
        const stats = statsFromDna(c.dna);
        card.innerHTML = `
          <button class="release" title="release">×</button>
          <canvas></canvas>
          <p class="name">${c.name}</p>
          <div class="stats">HP ${stats.hp} · ATK ${stats.atk} · DEF ${stats.def} · SPD ${stats.spd}</div>
        `;
        drawCreature(card.querySelector('canvas'), c.dna);
        card.querySelector('.release').addEventListener('click', () => {
          state.creatures = state.creatures.filter(x => x.id !== c.id);
          garden.agents.delete(c.id);
          save();
          refreshRoster();
        });
        roster.appendChild(card);
      }
    }

    function hatch(){
      const dna = dnaInput?.value.trim();
      if (!dna || dna.length < 3) return;
      const c = {
        id: 'c_' + Date.now() + '_' + Math.floor(Math.random() * 9999),
        dna,
        name: nameFromDna(dna),
        born: new Date().toISOString(),
      };
      state.creatures.unshift(c);
      save();
      if (dnaInput) dnaInput.value = '';
      refreshInput();
      refreshRoster();
      // syncAgents picks the new id up on the next frame.
    }

    dnaInput?.addEventListener('input', refreshInput);
    dnaInput?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !hatchBtn?.disabled) hatch();
    });
    hatchBtn?.addEventListener('click', hatch);

    // ============================================================
    // GARDEN — wandering canvas where each creature roams
    // ============================================================
    const gardenCanvas = document.getElementById('garden');
    const gardenEmpty  = document.getElementById('gardenEmpty');
    const garden = {
      W: 0, H: 0,
      ctx: gardenCanvas?.getContext('2d') || null,
      dpr: 1,
      agents: new Map(),  // creature.id → { x, y, vx, vy, facing, wanderT, bob, sprite }
      spriteCache: new Map(),  // dna → offscreen canvas
      lastTime: performance.now(),
    };

    function resizeGarden(){
      if (!gardenCanvas || !garden.ctx) return;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = gardenCanvas.getBoundingClientRect();
      garden.W = rect.width;
      garden.H = rect.height;
      garden.dpr = dpr;
      gardenCanvas.width  = (rect.width * dpr) | 0;
      gardenCanvas.height = (rect.height * dpr) | 0;
      garden.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      garden.ctx.imageSmoothingEnabled = false;
    }
    resizeGarden();
    window.addEventListener('resize', resizeGarden);

    function spriteFor(dna){
      let cv = garden.spriteCache.get(dna);
      if (cv) return cv;
      cv = document.createElement('canvas');
      cv.width = 96; cv.height = 96;
      drawCreature(cv, dna);
      garden.spriteCache.set(dna, cv);
      return cv;
    }

    function syncAgents(){
      if (!garden.W) return;
      const haveIds = new Set();
      for (const c of state.creatures){
        haveIds.add(c.id);
        if (!garden.agents.has(c.id)){
          garden.agents.set(c.id, {
            x: 40 + Math.random() * Math.max(1, garden.W - 80),
            y: 60 + Math.random() * Math.max(1, garden.H - 120),
            vx: (Math.random() * 2 - 1) * 24,
            vy: (Math.random() * 2 - 1) * 16,
            facing: 1,
            wanderT: 0,
            bob: Math.random() * Math.PI * 2,
          });
        }
      }
      for (const id of garden.agents.keys()){
        if (!haveIds.has(id)) garden.agents.delete(id);
      }
      if (gardenEmpty) gardenEmpty.style.display = state.creatures.length ? 'none' : '';
    }

    function tickGarden(now){
      const dt = Math.min(0.05, (now - garden.lastTime) / 1000);
      garden.lastTime = now;
      syncAgents();
      const ctx = garden.ctx;
      if (!ctx || !garden.W) { requestAnimationFrame(tickGarden); return; }

      // bg: faint horizon grid
      ctx.clearRect(0, 0, garden.W, garden.H);
      ctx.strokeStyle = 'rgba(201,134,224,0.10)';
      ctx.lineWidth = 1;
      const horizon = garden.H * 0.62;
      ctx.beginPath();
      ctx.moveTo(0, horizon); ctx.lineTo(garden.W, horizon);
      ctx.stroke();
      // perspective verticals
      ctx.strokeStyle = 'rgba(95,192,224,0.09)';
      for (let i = 0; i <= 12; i++){
        const t = i / 12;
        const x = t * garden.W;
        ctx.beginPath();
        ctx.moveTo(garden.W / 2 + (x - garden.W / 2) * 0.3, horizon);
        ctx.lineTo(x, garden.H);
        ctx.stroke();
      }
      // soil glow
      ctx.fillStyle = 'rgba(126,201,122,0.05)';
      ctx.fillRect(0, garden.H - 30, garden.W, 30);

      // depth-sort agents by y so closer ones overlap farther ones
      const sorted = [...garden.agents.entries()].sort((a, b) => a[1].y - b[1].y);
      for (const [id, ag] of sorted){
        const c = state.creatures.find(x => x.id === id);
        if (!c) continue;

        // wander: pick new vx/vy every 1.4–4s
        ag.wanderT -= dt;
        if (ag.wanderT <= 0){
          ag.wanderT = 1.4 + Math.random() * 2.6;
          const speed = 18 + Math.random() * 26;
          const ang = Math.random() * Math.PI * 2;
          ag.vx = Math.cos(ang) * speed;
          ag.vy = Math.sin(ang) * speed * 0.5;
        }
        ag.x += ag.vx * dt;
        ag.y += ag.vy * dt;
        // soft bounds
        const margin = 36;
        if (ag.x < margin)            { ag.x = margin;             ag.vx = Math.abs(ag.vx); }
        if (ag.x > garden.W - margin) { ag.x = garden.W - margin;  ag.vx = -Math.abs(ag.vx); }
        if (ag.y < 40)                { ag.y = 40;                 ag.vy = Math.abs(ag.vy); }
        if (ag.y > garden.H - 36)     { ag.y = garden.H - 36;      ag.vy = -Math.abs(ag.vy); }
        if (Math.abs(ag.vx) > 4) ag.facing = ag.vx >= 0 ? 1 : -1;
        ag.bob += dt * 4;

        const sprite = spriteFor(c.dna);
        const size = 56;
        const yBob = Math.sin(ag.bob) * 2;
        // shadow
        ctx.fillStyle = 'rgba(0,0,0,0.28)';
        ctx.beginPath();
        ctx.ellipse(ag.x, ag.y + size * 0.45, size * 0.32, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        // sprite (mirror by facing)
        ctx.save();
        ctx.translate(ag.x, ag.y + yBob);
        ctx.scale(ag.facing, 1);
        ctx.drawImage(sprite, -size / 2, -size / 2, size, size);
        ctx.restore();
        // name plate
        ctx.font = '10px "Silkscreen", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(ag.x - 30, ag.y - size * 0.55 - 12, 60, 14);
        ctx.fillStyle = 'rgba(246,231,255,0.92)';
        ctx.fillText(c.name.slice(0, 12), ag.x, ag.y - size * 0.55 - 2);
      }

      requestAnimationFrame(tickGarden);
    }

    refreshInput();
    refreshRoster();
    requestAnimationFrame(tickGarden);
  </script>
</body>
</html>
