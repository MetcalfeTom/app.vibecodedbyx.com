<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Code Creatures</title>
  <meta name="description" content="Type to forge tiny creatures. Their DNA is your keystrokes." />
  <meta property="og:title" content="Code Creatures" />
  <meta property="og:description" content="Type to forge tiny creatures. Their DNA is your keystrokes." />
  <meta property="og:image" content="https://image.pollinations.ai/prompt/glowing%20pixel%20art%20creature%20made%20of%20code%20glyphs%20on%20deep%20violet%20background%20cinematic%20neon?width=1200&height=630&nologo=true" />
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%AC" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=JetBrains+Mono:wght@300;500;800&family=Silkscreen&family=Fraunces:ital,wght@1,500&display=swap" rel="stylesheet" />
  <style>
    /* Palette + type lifted from /code-creatures-legacy â€” VS Code dark+ vibe.
       The structural / behavioural pieces stay V2-light: no glitch overlay,
       no tabs, no garden grid. */
    :root{
      --bg:#0a0e14;
      --bg-2:#0f1620;
      --panel:rgba(20,28,40,0.7);
      --panel-2:rgba(30,42,60,0.5);
      --line:rgba(120,180,220,0.18);
      --ink:#cfe6ff;
      --dim:#7a93b3;
      --null:#6b7a90;
      --kw:#c986e0;       /* keyword purple */
      --str:#7ec97a;      /* string green */
      --num:#f5b362;      /* number orange */
      --fn:#5fc0e0;       /* function cyan */
      --op:#ff7e9a;       /* operator pink */
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html, body{
      min-height:100vh;
      font-family:'JetBrains Mono', monospace;
      color:var(--ink);
      background:
        radial-gradient(ellipse at 18% 20%, rgba(95,192,224,0.08), transparent 55%),
        radial-gradient(ellipse at 82% 80%, rgba(201,134,224,0.08), transparent 55%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      background-attachment:fixed;
    }
    body::before{
      content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
      background-image:repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    }

    /* Header â€” multi-color brand mark like legacy */
    .head{
      padding:18px 22px 14px;
      border-bottom:1px solid var(--line);
      display:flex; justify-content:space-between; align-items:center;
      flex-wrap:wrap; gap:14px;
    }
    .brand{
      font-family:'Major Mono Display', monospace;
      font-size:clamp(22px, 3vw, 38px);
      letter-spacing:0.05em;
      line-height:1;
    }
    .brand .b1{ color:var(--kw); }
    .brand .b2{ color:var(--fn); }
    .brand .b3{ color:var(--op); }
    .tag{
      font-family:'Fraunces', serif;
      font-style:italic; font-size:13px;
      color:var(--dim);
    }
    .head .legacy{
      font-size:10px; letter-spacing:0.18em; text-transform:uppercase;
      color:var(--dim); text-decoration:none;
      border:1px solid var(--line); padding:6px 10px; border-radius:2px;
      transition:color .15s, border-color .15s;
    }
    .head .legacy:hover{ color:var(--fn); border-color:var(--fn); }

    main{
      max-width:980px; margin:0 auto;
      padding:24px 22px 64px;
    }

    /* Sharp angular panels â€” legacy style */
    section{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:2px;
      padding:22px 22px 24px;
      margin-bottom:18px;
    }
    .label{
      font-family:'JetBrains Mono', monospace;
      font-size:11px; letter-spacing:0.18em;
      color:var(--dim); text-transform:uppercase;
      margin-bottom:14px;
    }
    .label .accent{ color:var(--str); }

    /* DNA input mimics the legacy code-textarea palette */
    .dna-input{
      width:100%;
      background:rgba(8,12,18,0.72);
      border:1px solid var(--line);
      color:var(--str);
      font-family:'JetBrains Mono', monospace;
      font-size:16px; font-weight:500;
      padding:14px 16px;
      border-radius:2px;
      outline:none;
      letter-spacing:0.04em;
      transition:border-color .15s, box-shadow .15s;
    }
    .dna-input::placeholder{ color:var(--null); font-style:italic; }
    .dna-input:focus{ border-color:var(--fn); box-shadow:0 0 0 1px rgba(95,192,224,0.18); }

    .row{ display:flex; gap:12px; align-items:center; margin-top:14px; flex-wrap:wrap; }
    .meter{
      flex:1; min-width:200px;
      height:4px;
      background:rgba(120,180,220,0.10);
      border-radius:0;
      overflow:hidden;
    }
    .meter > div{
      height:100%;
      background:linear-gradient(90deg, var(--kw), var(--fn));
      width:0%;
      transition:width .18s ease;
    }
    .count{
      font-family:'JetBrains Mono', monospace;
      font-size:11px; letter-spacing:0.18em;
      color:var(--dim);
    }

    /* Buttons â€” legacy `.btn.primary` look */
    button{
      font-family:'JetBrains Mono', monospace;
      font-size:12px; letter-spacing:0.12em;
      text-transform:uppercase; font-weight:800;
      background:linear-gradient(180deg, var(--fn) 0%, #4090b0 100%);
      color:var(--bg);
      border:1px solid var(--fn);
      padding:10px 18px;
      border-radius:2px;
      cursor:pointer;
      transition:background .12s, transform .1s;
    }
    button:hover{ background:linear-gradient(180deg, #7fd0f0 0%, var(--fn) 100%); }
    button:active{ transform:translateY(1px); }
    button:disabled{ opacity:0.35; cursor:not-allowed; transform:none; }

    /* Garden â€” keep V2 simple, but lean dark teal like legacy */
    .garden-wrap{
      position:relative;
      width:100%;
      aspect-ratio:16 / 9;
      max-height:480px;
      border-radius:2px;
      overflow:hidden;
      border:1px solid var(--line);
      background:
        radial-gradient(circle at 50% 110%, rgba(126,201,122,0.08), transparent 55%),
        linear-gradient(180deg, #08111c 0%, #0d1a2a 70%, #122236 100%);
    }
    #garden{ display:block; width:100%; height:100%; }
    .garden-empty{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      color:var(--dim); font-style:italic; pointer-events:none;
      font-family:'Fraunces', serif;
    }

    /* Roster cards */
    .roster{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
      gap:14px;
    }
    .creature{
      background:var(--panel-2);
      border:1px solid var(--line);
      border-radius:2px;
      padding:14px 12px 12px;
      text-align:center;
      position:relative;
      transition:border-color .18s, transform .18s;
    }
    .creature:hover{ border-color:var(--fn); transform:translateY(-2px); }
    .creature canvas{
      width:96px; height:96px;
      image-rendering:pixelated;
      display:block; margin:0 auto 8px;
    }
    .creature .name{
      font-family:'Major Mono Display', monospace;
      font-size:14px;
      color:var(--ink);
      margin:0;
      letter-spacing:0.04em;
    }
    .creature .stats{
      font-family:'JetBrains Mono', monospace;
      font-size:10px; letter-spacing:0.04em;
      color:var(--dim);
      margin-top:6px;
      line-height:1.5;
    }
    .creature .stats .k{ color:var(--num); }
    .release{
      position:absolute;
      top:4px; right:6px;
      background:transparent;
      color:var(--dim);
      border:none;
      padding:4px 6px;
      font-size:11px; letter-spacing:0.14em;
      font-weight:500;
      cursor:pointer;
    }
    .release:hover{ color:var(--op); background:transparent; transform:none; }

    .empty{
      text-align:center;
      color:var(--null);
      font-family:'Fraunces', serif;
      font-style:italic;
      padding:28px 0;
    }
    .note{
      text-align:center;
      color:var(--dim);
      font-size:11px; letter-spacing:0.06em;
      margin-top:14px;
    }
    .note a{ color:var(--fn); text-decoration:none; border-bottom:1px dashed rgba(95,192,224,0.4); }
    .note a:hover{ color:var(--str); border-bottom-color:var(--str); }
  </style>
</head>
<body>
  <div class="head">
    <div>
      <div class="brand"><span class="b1">code</span> <span class="b2">Â·</span> <span class="b3">creatures</span></div>
      <div class="tag">type to forge Â· keystrokes are DNA</div>
    </div>
    <a class="legacy" href="/code-creatures-legacy">legacy build â†’</a>
  </div>

  <main>
    <section>
      <div class="label">forge â€” <span class="accent">DNA up to 32 chars</span></div>
      <input id="dnaInput" class="dna-input" placeholder="fn(life => spark + glow)" maxlength="32" autocomplete="off" spellcheck="false" />
      <div class="row">
        <div class="meter"><div id="meterFill"></div></div>
        <div class="count" id="dnaCount">0 / 32</div>
        <button id="hatchBtn" disabled>Hatch</button>
      </div>
    </section>

    <section>
      <div class="label">garden â€” <span class="accent">they wander when alive</span></div>
      <div class="garden-wrap">
        <canvas id="garden"></canvas>
        <div id="gardenEmpty" class="garden-empty">empty Â· hatch a creature to populate</div>
      </div>
    </section>

    <section>
      <div class="label">roster â€” <span id="rosterCount">0</span> kept</div>
      <div id="roster" class="roster"></div>
      <div id="empty" class="empty">no creatures yet Â· type some DNA above</div>
      <div class="note">denser legacy build at <a href="/code-creatures-legacy">/code-creatures-legacy</a></div>
    </section>
  </main>

  <script type="module">
    const KEY = 'code-creatures-v2';
    const LEGACY_MINI_KEY = 'code-creatures-mini-v1'; // one-shot migration source
    const MAX_DNA = 32;

    // --- Atomic persistence: one key, one JSON array, ONE synchronous write.
    // Earlier V2 used microtask debouncing â€” that loses writes when the tab
    // closes between schedule and flush. Now save() writes immediately, then
    // verifies by reading back. pagehide/visibilitychange add a safety flush
    // in case any future caller mutates state.creatures without calling save().
    function loadAll(){
      let raw;
      try { raw = localStorage.getItem(KEY); } catch(e){
        console.error('[code-creatures] loadAll: getItem failed', e);
        return [];
      }
      // One-shot migration from the prior `-mini-v1` key.
      if (!raw){
        try {
          const legacy = localStorage.getItem(LEGACY_MINI_KEY);
          if (legacy){
            localStorage.setItem(KEY, legacy);
            localStorage.removeItem(LEGACY_MINI_KEY);
            raw = legacy;
            console.log('[code-creatures] migrated', legacy.length, 'B from', LEGACY_MINI_KEY, 'â†’', KEY);
          }
        } catch(_){}
      }
      if (!raw){ console.log('[code-creatures] loadAll: empty disk â†’ []'); return []; }
      let arr;
      try { arr = JSON.parse(raw); } catch(e){
        console.error('[code-creatures] loadAll: parse failed â€” disk was', raw.slice(0,200), e);
        return [];
      }
      if (!Array.isArray(arr)){
        console.error('[code-creatures] loadAll: not an array', typeof arr);
        return [];
      }
      const out = arr.filter(c => c && c.id && c.dna);
      console.log(`[code-creatures] loadAll: ${out.length} creatures from ${raw.length}B`);
      return out;
    }
    function save(){
      const arr = Array.isArray(state.creatures) ? state.creatures : [];
      let payload;
      try { payload = JSON.stringify(arr); }
      catch(e){
        console.error('[code-creatures] save: stringify failed', e);
        return;
      }
      try { localStorage.setItem(KEY, payload); }
      catch(e){
        console.error('[code-creatures] save: setItem failed bytes=' + payload.length, e);
        return;
      }
      // Verify-after-write: catch silent quota or storage failures.
      let verify;
      try { verify = localStorage.getItem(KEY); } catch(_){ verify = null; }
      const ok = verify === payload;
      console.log(`[code-creatures] save: ${arr.length} creatures, ${payload.length}B, verify=${ok ? 'OK' : 'MISMATCH'}`);
      if (!ok){
        console.error('[code-creatures] save: verify FAILED â€” disk has', verify ? verify.length + 'B' : 'null');
      }
    }
    // Safety flush on tab close / hide. localStorage is synchronous so this
    // always lands before the page unloads.
    window.addEventListener('pagehide',         () => save());
    window.addEventListener('beforeunload',     () => save());
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') save(); });
    // Console helper for live debugging.
    try { window.__cc_dump = () => ({ memory: state.creatures, disk: localStorage.getItem(KEY) }); } catch(_){}

    // --- DNA â†’ deterministic sprite + stats + name ---
    function fnv1a(str){
      let h = 0x811c9dc5;
      for (let i = 0; i < str.length; i++){
        h ^= str.charCodeAt(i);
        h = (h * 0x01000193) >>> 0;
      }
      return h >>> 0;
    }
    function mulberry32(seed){
      return function(){
        seed = (seed + 0x6d2b79f5) >>> 0;
        let t = seed;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    function classify(ch){
      if (/[aeiouAEIOU]/.test(ch)) return 'vowel';
      if (/[a-zA-Z]/.test(ch)) return 'cons';
      if (/[0-9]/.test(ch)) return 'digit';
      if (/[+\-*/=<>]/.test(ch)) return 'op';
      if (/[(){}\[\]]/.test(ch)) return 'bracket';
      return 'punct';
    }
    function statsFromDna(dna){
      const counts = { vowel:0, cons:0, digit:0, op:0, bracket:0, punct:0 };
      for (const ch of dna) counts[classify(ch)]++;
      return {
        hp:  60 + counts.vowel * 4 + counts.cons * 2,
        atk: 8 + counts.cons * 2 + counts.digit * 1.5 + counts.op * 1.2 | 0,
        def: 6 + counts.bracket * 2.5 + counts.vowel * 0.6 | 0,
        spd: 6 + counts.digit * 1.6 + counts.punct * 1.1 | 0,
      };
    }
    const SYL_A = ['ae','io','un','vex','zar','mox','kel','ny','ori','sha','byt','hex','arc'];
    const SYL_B = ['lyn','rim','tox','ven','dur','mok','ral','sek','jin','vor','pix','byte','glo'];
    function nameFromDna(dna){
      const rng = mulberry32(fnv1a(dna || 'seed'));
      return (SYL_A[(rng()*SYL_A.length)|0] + SYL_B[(rng()*SYL_B.length)|0])
        .replace(/^./, c => c.toUpperCase());
    }
    function paletteFromDna(dna){
      const counts = { vowel:0, cons:0, digit:0, op:0, bracket:0, punct:0 };
      for (const ch of dna) counts[classify(ch)]++;
      const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
      return ({
        vowel:  ['#7ec97a', '#1a3a18'],
        cons:   ['#c986e0', '#3a1a4a'],
        digit:  ['#5fc0e0', '#0d2a3a'],
        op:     ['#ff7e9a', '#3a0d20'],
        bracket:['#f5b362', '#3a2208'],
        punct:  ['#a4b1bd', '#1a1f24'],
      })[top];
    }
    const GLYPHS = ['o','0','#','%','&','*','+','x','/','\\','=','<','>','{','}'];
    function drawCreature(canvas, dna){
      const ctx = canvas.getContext('2d');
      const W = canvas.width = 96;
      const H = canvas.height = 96;
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, W, H);
      const rng = mulberry32(fnv1a(dna));
      const [main, dark] = paletteFromDna(dna);
      const grid = 16;
      const cell = W / grid;
      // body silhouette: deterministic blob
      const body = Array.from({length: grid}, () => new Array(grid).fill(0));
      const cx = grid / 2, cy = grid / 2;
      for (let y = 0; y < grid; y++){
        for (let x = 0; x < grid / 2 + 1; x++){
          const dx = x - cx, dy = y - cy;
          const r = Math.sqrt(dx*dx + dy*dy * 1.1);
          const noise = rng() * 1.4;
          if (r + noise < grid * 0.42){
            body[y][x] = 1;
            body[y][grid - 1 - x] = 1; // mirror for symmetry
          }
        }
      }
      // fill body with palette glyphs
      ctx.font = `${cell * 1.1 | 0}px monospace`;
      ctx.textBaseline = 'top';
      ctx.textAlign = 'center';
      for (let y = 0; y < grid; y++){
        for (let x = 0; x < grid; x++){
          if (!body[y][x]) continue;
          const ch = GLYPHS[(rng() * GLYPHS.length) | 0];
          const isEdge = !body[y - 1]?.[x] || !body[y + 1]?.[x] || !body[y]?.[x - 1] || !body[y]?.[x + 1];
          ctx.fillStyle = isEdge ? dark : main;
          ctx.fillText(ch, x * cell + cell / 2, y * cell);
        }
      }
      // eyes
      const eyeY = cy - 1, eyeX1 = cx - 2, eyeX2 = cx + 1;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(eyeX1 * cell, eyeY * cell, cell, cell);
      ctx.fillRect(eyeX2 * cell, eyeY * cell, cell, cell);
      ctx.fillStyle = '#000000';
      ctx.fillRect(eyeX1 * cell + cell * 0.25, eyeY * cell + cell * 0.25, cell * 0.5, cell * 0.5);
      ctx.fillRect(eyeX2 * cell + cell * 0.25, eyeY * cell + cell * 0.25, cell * 0.5, cell * 0.5);
    }

    // --- State ---
    const state = { creatures: loadAll() };

    // --- DOM refs (all guarded) ---
    const dnaInput   = document.getElementById('dnaInput');
    const meterFill  = document.getElementById('meterFill');
    const dnaCount   = document.getElementById('dnaCount');
    const hatchBtn   = document.getElementById('hatchBtn');
    const roster     = document.getElementById('roster');
    const rosterCount= document.getElementById('rosterCount');
    const emptyMsg   = document.getElementById('empty');

    function refreshInput(){
      const len = dnaInput?.value.length || 0;
      if (meterFill) meterFill.style.width = (len / MAX_DNA * 100) + '%';
      if (dnaCount)  dnaCount.textContent = `${len} / ${MAX_DNA}`;
      if (hatchBtn)  hatchBtn.disabled = len < 3;
    }
    function refreshRoster(){
      if (!roster) return;
      roster.innerHTML = '';
      if (rosterCount) rosterCount.textContent = state.creatures.length;
      if (emptyMsg) emptyMsg.style.display = state.creatures.length ? 'none' : '';
      for (const c of state.creatures){
        const card = document.createElement('div');
        card.className = 'creature';
        const stats = statsFromDna(c.dna);
        card.innerHTML = `
          <button class="release" title="release">Ă—</button>
          <canvas></canvas>
          <p class="name">${c.name}</p>
          <div class="stats"><span class="k">HP</span> ${stats.hp} Â· <span class="k">ATK</span> ${stats.atk} Â· <span class="k">DEF</span> ${stats.def} Â· <span class="k">SPD</span> ${stats.spd}</div>
        `;
        drawCreature(card.querySelector('canvas'), c.dna);
        card.querySelector('.release').addEventListener('click', () => {
          state.creatures = state.creatures.filter(x => x.id !== c.id);
          garden.agents.delete(c.id);
          save();
          refreshRoster();
        });
        roster.appendChild(card);
      }
    }

    function hatch(){
      const dna = dnaInput?.value.trim();
      if (!dna || dna.length < 3) return;
      const c = {
        id: 'c_' + Date.now() + '_' + Math.floor(Math.random() * 9999),
        dna,
        name: nameFromDna(dna),
        born: new Date().toISOString(),
      };
      state.creatures.unshift(c);
      save();
      if (dnaInput) dnaInput.value = '';
      refreshInput();
      refreshRoster();
      // syncAgents picks the new id up on the next frame.
    }

    dnaInput?.addEventListener('input', refreshInput);
    dnaInput?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !hatchBtn?.disabled) hatch();
    });
    hatchBtn?.addEventListener('click', hatch);

    // ============================================================
    // GARDEN â€” wandering canvas where each creature roams
    // ============================================================
    const gardenCanvas = document.getElementById('garden');
    const gardenEmpty  = document.getElementById('gardenEmpty');
    const garden = {
      W: 0, H: 0,
      ctx: gardenCanvas?.getContext('2d') || null,
      dpr: 1,
      agents: new Map(),  // creature.id â†’ { x, y, vx, vy, facing, wanderT, bob, sprite }
      spriteCache: new Map(),  // dna â†’ offscreen canvas
      lastTime: performance.now(),
    };

    function resizeGarden(){
      if (!gardenCanvas || !garden.ctx) return;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = gardenCanvas.getBoundingClientRect();
      garden.W = rect.width;
      garden.H = rect.height;
      garden.dpr = dpr;
      gardenCanvas.width  = (rect.width * dpr) | 0;
      gardenCanvas.height = (rect.height * dpr) | 0;
      garden.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      garden.ctx.imageSmoothingEnabled = false;
    }
    resizeGarden();
    window.addEventListener('resize', resizeGarden);

    function spriteFor(dna){
      let cv = garden.spriteCache.get(dna);
      if (cv) return cv;
      cv = document.createElement('canvas');
      cv.width = 96; cv.height = 96;
      drawCreature(cv, dna);
      garden.spriteCache.set(dna, cv);
      return cv;
    }

    function syncAgents(){
      if (!garden.W) return;
      const haveIds = new Set();
      for (const c of state.creatures){
        haveIds.add(c.id);
        if (!garden.agents.has(c.id)){
          garden.agents.set(c.id, {
            x: 40 + Math.random() * Math.max(1, garden.W - 80),
            y: 60 + Math.random() * Math.max(1, garden.H - 120),
            vx: (Math.random() * 2 - 1) * 24,
            vy: (Math.random() * 2 - 1) * 16,
            facing: 1,
            wanderT: 0,
            bob: Math.random() * Math.PI * 2,
          });
        }
      }
      for (const id of garden.agents.keys()){
        if (!haveIds.has(id)) garden.agents.delete(id);
      }
      if (gardenEmpty) gardenEmpty.style.display = state.creatures.length ? 'none' : '';
    }

    function tickGarden(now){
      const dt = Math.min(0.05, (now - garden.lastTime) / 1000);
      garden.lastTime = now;
      syncAgents();
      const ctx = garden.ctx;
      if (!ctx || !garden.W) { requestAnimationFrame(tickGarden); return; }

      // bg: faint horizon grid
      ctx.clearRect(0, 0, garden.W, garden.H);
      ctx.strokeStyle = 'rgba(201,134,224,0.10)';
      ctx.lineWidth = 1;
      const horizon = garden.H * 0.62;
      ctx.beginPath();
      ctx.moveTo(0, horizon); ctx.lineTo(garden.W, horizon);
      ctx.stroke();
      // perspective verticals
      ctx.strokeStyle = 'rgba(95,192,224,0.09)';
      for (let i = 0; i <= 12; i++){
        const t = i / 12;
        const x = t * garden.W;
        ctx.beginPath();
        ctx.moveTo(garden.W / 2 + (x - garden.W / 2) * 0.3, horizon);
        ctx.lineTo(x, garden.H);
        ctx.stroke();
      }
      // soil glow
      ctx.fillStyle = 'rgba(126,201,122,0.05)';
      ctx.fillRect(0, garden.H - 30, garden.W, 30);

      // depth-sort agents by y so closer ones overlap farther ones
      const sorted = [...garden.agents.entries()].sort((a, b) => a[1].y - b[1].y);
      for (const [id, ag] of sorted){
        const c = state.creatures.find(x => x.id === id);
        if (!c) continue;

        // wander: pick new vx/vy every 1.4â€“4s
        ag.wanderT -= dt;
        if (ag.wanderT <= 0){
          ag.wanderT = 1.4 + Math.random() * 2.6;
          const speed = 18 + Math.random() * 26;
          const ang = Math.random() * Math.PI * 2;
          ag.vx = Math.cos(ang) * speed;
          ag.vy = Math.sin(ang) * speed * 0.5;
        }
        ag.x += ag.vx * dt;
        ag.y += ag.vy * dt;
        // soft bounds
        const margin = 36;
        if (ag.x < margin)            { ag.x = margin;             ag.vx = Math.abs(ag.vx); }
        if (ag.x > garden.W - margin) { ag.x = garden.W - margin;  ag.vx = -Math.abs(ag.vx); }
        if (ag.y < 40)                { ag.y = 40;                 ag.vy = Math.abs(ag.vy); }
        if (ag.y > garden.H - 36)     { ag.y = garden.H - 36;      ag.vy = -Math.abs(ag.vy); }
        if (Math.abs(ag.vx) > 4) ag.facing = ag.vx >= 0 ? 1 : -1;
        ag.bob += dt * 4;

        const sprite = spriteFor(c.dna);
        const size = 56;
        const yBob = Math.sin(ag.bob) * 2;
        // shadow
        ctx.fillStyle = 'rgba(0,0,0,0.28)';
        ctx.beginPath();
        ctx.ellipse(ag.x, ag.y + size * 0.45, size * 0.32, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        // sprite (mirror by facing)
        ctx.save();
        ctx.translate(ag.x, ag.y + yBob);
        ctx.scale(ag.facing, 1);
        ctx.drawImage(sprite, -size / 2, -size / 2, size, size);
        ctx.restore();
        // name plate
        ctx.font = '10px "Silkscreen", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(ag.x - 30, ag.y - size * 0.55 - 12, 60, 14);
        ctx.fillStyle = 'rgba(246,231,255,0.92)';
        ctx.fillText(c.name.slice(0, 12), ag.x, ag.y - size * 0.55 - 2);
      }

      requestAnimationFrame(tickGarden);
    }

    refreshInput();
    refreshRoster();
    requestAnimationFrame(tickGarden);
  </script>
</body>
</html>
