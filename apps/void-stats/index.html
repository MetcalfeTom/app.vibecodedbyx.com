<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>void-stats</title>
<meta name="description" content="A minimalist dashboard that counts the seconds since the last chat message landed. Color shifts as the silence grows." />
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9A%AB" />
<meta property="og:title" content="void-stats — seconds since chat" />
<meta property="og:description" content="A minimalist live counter: how long has the chat been silent? Watch the void grow." />
<meta property="og:url" content="https://sloppy.live/void-stats/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimalist%20dashboard%20pure%20black%20background%20huge%20white%20counter%20typography%20void?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --void:    #050505;
    --void-2:  #0c0c0e;
    --rule:    #1c1c1f;
    --rule-2:  #2a2a2e;
    --ink:     #ffffff;
    --dim:     #5a5a64;
    --dimmer:  #2f2f35;
    --live:    #2bff66;
    --amber:   #ffb24a;
    --orange:  #ff7c00;
    --red:     #ff3838;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: var(--void);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(180deg, transparent 0 3px, rgba(255,255,255,0.018) 3px 4px);
    z-index: 5;
  }

  /* layout */
  #shell {
    position: fixed; inset: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    z-index: 1;
  }

  /* — top status bar — */
  .topbar {
    padding: 1.1rem 1.4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--rule);
    color: var(--dim);
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    flex-wrap: wrap;
    gap: 0.6rem;
  }
  .topbar .left, .topbar .right { display: flex; gap: 1rem; align-items: center; }
  .topbar .brand {
    color: var(--ink);
    font-weight: 700;
    letter-spacing: 0.28em;
  }
  .topbar .channel {
    color: var(--ink);
  }
  .topbar .channel::before { content: '#'; color: var(--dim); margin-right: 0.1em; }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dimmer);
    margin-right: 0.4em;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.live    { background: var(--live);   box-shadow: 0 0 12px var(--live); animation: pulse 2s ease-in-out infinite; }
  .status-dot.connect { background: var(--amber);  box-shadow: 0 0 8px var(--amber); animation: pulse 1s ease-in-out infinite; }
  .status-dot.off     { background: var(--red);    box-shadow: 0 0 6px var(--red); }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(0.7); opacity: 0.5; }
  }

  /* — center counter — */
  .counter-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    position: relative;
  }
  .counter-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 1rem;
    text-align: center;
  }
  #counter {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 900;
    font-size: clamp(8rem, 30vw, 22rem);
    line-height: 0.84;
    letter-spacing: -0.04em;
    color: var(--ink);
    text-align: center;
    transition: color 0.35s, text-shadow 0.35s;
    font-variant-numeric: tabular-nums;
    transform: translateZ(0);  /* force GPU layer */
  }
  #counter.tier-warn   { color: var(--amber);  text-shadow: 0 0 28px rgba(255, 178, 74, 0.35); }
  #counter.tier-orange { color: var(--orange); text-shadow: 0 0 32px rgba(255, 124, 0, 0.4); }
  #counter.tier-danger { color: var(--red);    text-shadow: 0 0 36px rgba(255, 56, 56, 0.5); animation: jitter 0.25s steps(2) infinite; }
  @keyframes jitter {
    0%   { transform: translate(0, 0); }
    100% { transform: translate(-0.5px, 0.5px); }
  }

  .counter-unit {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 400;
    font-size: clamp(1.6rem, 5vw, 3rem);
    color: var(--dim);
    letter-spacing: 0.04em;
    line-height: 1;
    margin-top: 0.4rem;
  }

  /* flash on new message */
  .counter-wrap.pulse-msg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(43,255,102,0.18), transparent 60%);
    animation: msgFlash 0.55s ease-out forwards;
    pointer-events: none;
  }
  @keyframes msgFlash {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  .last-msg {
    margin-top: 1.4rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.74rem;
    color: var(--dim);
    letter-spacing: 0.06em;
    max-width: 60ch;
    text-align: center;
    min-height: 1.2em;
    transition: opacity 0.4s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 1rem;
  }
  .last-msg .who {
    color: var(--ink);
    font-weight: 700;
    margin-right: 0.5em;
  }
  .last-msg .when {
    color: var(--dimmer);
    margin-left: 0.5em;
  }

  /* — bottom stat strip — */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid var(--rule);
  }
  .stat {
    padding: 1.1rem 1.2rem;
    text-align: center;
    border-right: 1px solid var(--rule);
  }
  .stat:last-child { border-right: none; }
  .stat .v {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--ink);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .stat .l {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
    margin-top: 0.45rem;
  }

  @media (max-width: 600px) {
    .topbar { font-size: 0.62rem; padding: 0.8rem 0.9rem; gap: 0.4rem; }
    .stats  { grid-template-columns: repeat(2, 1fr); }
    .stat   { border-bottom: 1px solid var(--rule); }
    .stat:nth-child(odd) { border-right: 1px solid var(--rule); }
    .stat:nth-child(2n) { border-right: none; }
    .counter-label { font-size: 0.62rem; letter-spacing: 0.22em; }
  }
</style>
</head>
<body>
<div id="shell" role="application" aria-label="void-stats — seconds since the last chat message">
  <header class="topbar">
    <div class="left">
      <span class="brand">VOID-STATS</span>
      <span class="channel" id="channelLbl">sloppy_ai</span>
    </div>
    <div class="right">
      <span><span class="status-dot off" id="statusDot"></span><span id="statusLbl">offline</span></span>
    </div>
  </header>

  <section class="counter-wrap" id="counterWrap">
    <div class="counter-label">seconds since last chat message</div>
    <div id="counter">—</div>
    <div class="counter-unit">seconds in the void</div>
    <div class="last-msg" id="lastMsg">waiting for chat…</div>
  </section>

  <footer class="stats">
    <div class="stat"><div class="v" id="statTotal">0</div><div class="l">messages received</div></div>
    <div class="stat"><div class="v" id="statLongest">0</div><div class="l">longest gap (sec)</div></div>
    <div class="stat"><div class="v" id="statAvg">—</div><div class="l">average gap (sec)</div></div>
    <div class="stat"><div class="v" id="statUptime">0</div><div class="l">uptime (min)</div></div>
  </footer>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════════════
// VOID-STATS — anonymous Twitch IRC over WSS, listen for PRIVMSG, paint
// a giant counter showing seconds since the most recent message. Color
// tiers up as the silence grows. Pulses green when a message lands.
// Channel default is sloppy_ai (matches other sloppy.live apps);
// override via ?channel=otherchan.
// ════════════════════════════════════════════════════════════════════════

const $ = (id) => document.getElementById(id);

// — config from URL —
const params = new URLSearchParams(location.search);
const CHANNEL = (params.get('channel') || 'sloppy_ai').toLowerCase().replace(/^#/, '');
$('channelLbl').textContent = CHANNEL;

// — state —
const bootedAt = Date.now();
let lastMessageAt = null;       // ms — null until first message lands
let totalMessages = 0;
let longestGap = 0;
let lastUser = null;
let lastText  = null;
let lastWhenMs = null;
let connected = false;

// — WS connect (with backoff) —
let ws = null;
let connectAttempts = 0;
function setStatus(kind, label){
  $('statusDot').className = 'status-dot ' + kind;
  $('statusLbl').textContent = label;
}
setStatus('connect', 'connecting…');

function connect(){
  try {
    ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  } catch (e){
    setStatus('off', 'no websocket');
    return;
  }
  const nick = 'justinfan' + ((Math.random() * 90000 + 10000) | 0);
  ws.addEventListener('open', () => {
    try {
      ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands\r\n');
      ws.send('PASS SCHMOOPIIE\r\n');
      ws.send('NICK ' + nick + '\r\n');
      ws.send('JOIN #' + CHANNEL + '\r\n');
      setStatus('connect', 'joining #' + CHANNEL + '…');
    } catch(e){}
  });
  ws.addEventListener('message', (e) => {
    // Twitch IRC frames can carry multiple lines separated by \r\n
    const lines = (e.data || '').split('\r\n');
    for (const line of lines){
      if (!line) continue;
      if (line.startsWith('PING ')){
        try { ws.send('PONG ' + line.slice(5) + '\r\n'); } catch(e){}
        continue;
      }
      // JOIN ack — confirms we're connected and listening
      if (line.includes(' JOIN #' + CHANNEL)){
        connected = true;
        setStatus('live', 'listening · #' + CHANNEL);
        // do NOT touch lastMessageAt — that only ticks on a real PRIVMSG
        if (lastMessageAt == null) lastMessageAt = Date.now();
        continue;
      }
      // PRIVMSG = a chat message
      const pm = line.match(/:([^!]+)![^ ]* PRIVMSG #([^ ]+) :([\s\S]*)$/);
      if (pm){
        const who = pm[1];
        const channelName = pm[2];
        const text = pm[3];
        if (channelName.toLowerCase() === CHANNEL) onChatMessage(who, text);
      }
    }
  });
  ws.addEventListener('close', () => {
    connected = false;
    setStatus('off', 'disconnected — retrying');
    connectAttempts++;
    setTimeout(connect, Math.min(15000, 1500 * Math.pow(1.5, connectAttempts)));
  });
  ws.addEventListener('error', () => {
    // close handler will fire after — let it manage the retry
  });
}
connect();

// — message handler —
function onChatMessage(who, text){
  const now = Date.now();
  const gapPrev = lastMessageAt ? (now - lastMessageAt) / 1000 : 0;
  if (gapPrev > longestGap) longestGap = gapPrev;
  lastMessageAt = now;
  totalMessages++;
  lastUser = who;
  lastText = text;
  lastWhenMs = now;
  // pulse the counter wrap with a brief green flash
  const wrap = $('counterWrap');
  wrap.classList.remove('pulse-msg');
  void wrap.offsetWidth;
  wrap.classList.add('pulse-msg');
  // pop the last-msg line with the freshest chat preview
  updateLastMsg();
  updateStats();
}

function updateLastMsg(){
  const el = $('lastMsg');
  if (!lastUser){
    el.textContent = 'waiting for chat…';
    return;
  }
  const preview = (lastText || '').slice(0, 80);
  el.innerHTML =
    '<span class="who">' + esc(lastUser) + '</span>' +
    '<span class="text">' + esc(preview) + '</span>' +
    '<span class="when"> · ' + relTime(lastWhenMs) + '</span>';
}

// — tick the counter (100ms interval — counter shows whole seconds) —
const counterEl = $('counter');
function tick(){
  const now = Date.now();
  const elapsed = lastMessageAt ? Math.floor((now - lastMessageAt) / 1000) : 0;
  // when not connected and no messages, show em dash
  if (lastMessageAt == null && !connected){
    counterEl.textContent = '—';
  } else {
    counterEl.textContent = String(elapsed);
  }
  // color tiers
  counterEl.classList.toggle('tier-warn',   elapsed > 30  && elapsed <= 120);
  counterEl.classList.toggle('tier-orange', elapsed > 120 && elapsed <= 300);
  counterEl.classList.toggle('tier-danger', elapsed > 300);
  // also keep last-msg "when" updated
  if (lastWhenMs) updateLastMsg();
  // uptime stat
  $('statUptime').textContent = Math.floor((now - bootedAt) / 60000);
}
setInterval(tick, 100);

// — stats panel update —
function updateStats(){
  $('statTotal').textContent = totalMessages;
  $('statLongest').textContent = Math.floor(longestGap);
  if (totalMessages > 0){
    const totalSec = (Date.now() - bootedAt) / 1000;
    const avg = totalSec / totalMessages;
    $('statAvg').textContent = avg < 10 ? avg.toFixed(1) : Math.floor(avg);
  }
}

function relTime(ms){
  const s = (Date.now() - ms) / 1000;
  if (s < 5) return 'just now';
  if (s < 60) return Math.floor(s) + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}
function esc(s){ const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
</script>
</body>
</html>
