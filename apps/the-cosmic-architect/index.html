<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Cosmic Architect · Magical Plans for Mundane Chores</title>
<meta name="description" content="Hand it any chore. It returns a three-step magical plan, written by the celestial bureaucracy that governs all dishes." />
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9C%A8" />
<meta property="og:title" content="The Cosmic Architect" />
<meta property="og:description" content="Type a chore. Receive a grandiose three-step magical plan. Invocation, Crucible, Denouement." />
<meta property="og:url" content="https://sloppy.live/the-cosmic-architect/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/cosmic%20occult%20parchment%20with%20sacred%20geometry%20and%20constellation%20diagrams%20mystic%20three-step%20plan%20gold%20on%20dark%20violet?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,500;1,500;1,700&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Major+Mono+Display&display=swap" rel="stylesheet" />
<style>
:root{
  --void:#06051a;
  --deep:#0c0a30;
  --paper:#f0e3b6;
  --aged:#caa867;
  --ink:#1a0b32;
  --gold:#c2a347;
  --hotgold:#ffe18c;
  --rose:#e0639a;
  --violet:#8b5bff;
  --cyan:#7be4ff;
  --bone:#fff8e2;
  --dim:rgba(255,248,226,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--void);color:var(--bone);font-family:'IM Fell English', serif}
body{
  background:
    radial-gradient(ellipse at 50% 8%, rgba(255,225,140,0.10), transparent 55%),
    radial-gradient(ellipse at 22% 80%, rgba(139,91,255,0.16), transparent 55%),
    radial-gradient(ellipse at 80% 70%, rgba(123,228,255,0.10), transparent 55%),
    linear-gradient(180deg, var(--void) 0%, var(--deep) 100%);
  min-height:100vh;
  overflow-x:hidden;
}
/* starfield */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    radial-gradient(rgba(255,225,140,0.35) 1px, transparent 1px),
    radial-gradient(rgba(123,228,255,0.18) 1px, transparent 1.5px);
  background-size: 280px 280px, 180px 180px, 410px 410px;
  background-position: 0 0, 80px 60px, 200px 130px;
  animation:starDrift 220s linear infinite;
}
@keyframes starDrift{
  to { background-position: -560px -560px, -360px -360px, -820px -820px; }
}
.frame{position:relative;z-index:2;max-width:880px;margin:0 auto;padding:36px 22px 60px}

/* === HEADER === */
header{text-align:center;margin-bottom:24px;position:relative}
.crest{
  font-family:'IM Fell English SC', serif;
  letter-spacing:0.5em;font-size:11px;color:var(--gold);opacity:0.7;
}
h1{
  font-family:'Cinzel Decorative', serif;
  font-weight:900;
  font-size:clamp(36px, 6vw, 70px);
  color:var(--bone);
  line-height:1.05;
  margin:6px 0 4px;
  letter-spacing:0.02em;
  text-shadow:
    0 0 24px rgba(255,225,140,0.45),
    0 0 16px rgba(139,91,255,0.35),
    0 3px 0 #000;
}
h1 .b{color:var(--hotgold)}
h1 .v{color:var(--violet);font-style:italic}
.tagline{
  font-family:'Cormorant Garamond', serif;font-style:italic;
  font-size:clamp(14px, 1.8vw, 20px);
  color:rgba(255,248,226,0.78);
  margin-top:6px;letter-spacing:0.06em;
}
.tagline em{color:var(--rose);font-style:italic}
.flourish{
  font-family:'IM Fell English', serif;
  color:var(--gold);font-size:18px;
  letter-spacing:0.5em;
  margin:8px 0 0;
}

/* === FORM === */
.form{
  margin:24px auto 22px;
  max-width:580px;
  display:flex;flex-direction:column;gap:10px;
}
.form label{
  font-family:'IM Fell English SC', serif;
  font-size:11px;letter-spacing:0.42em;color:var(--gold);
  text-align:center;
}
.form input[type=text]{
  background:rgba(255,250,235,0.08);
  border:1px solid rgba(194,163,71,0.4);
  border-bottom:1.5px solid var(--gold);
  color:var(--bone);
  font-family:'IM Fell English', serif;
  font-size:18px;
  padding:10px 14px;
  outline:none;border-radius:1px;
  transition:border-color 0.15s, box-shadow 0.15s;
  text-align:center;
}
.form input[type=text]:focus{
  border-color:var(--hotgold);
  box-shadow:0 0 0 2px rgba(255,225,140,0.18), 0 0 18px rgba(139,91,255,0.25);
}
.form .actions{display:flex;justify-content:center;gap:8px}
.btn{
  background:linear-gradient(160deg, #c2a347 0%, #5a4012 100%);
  color:var(--bone);
  border:1px solid #2a1a08;
  font-family:'Cinzel Decorative', serif;font-weight:700;font-size:18px;letter-spacing:0.06em;
  padding:10px 22px;border-radius:1px;cursor:pointer;
  text-shadow:0 1px 0 #000, 0 0 8px rgba(255,225,140,0.4);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.2),
    inset 0 -3px 6px rgba(0,0,0,0.35),
    0 4px 0 rgba(0,0,0,0.45),
    0 0 22px rgba(194,163,71,0.4);
  transition:transform 0.12s ease, box-shadow 0.14s ease;
}
.btn:hover{transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -3px 6px rgba(0,0,0,0.4), 0 6px 0 rgba(0,0,0,0.5), 0 0 32px rgba(255,225,140,0.6)}
.btn:active{transform:translateY(2px);box-shadow:inset 0 1px 0 rgba(255,255,255,0.1), inset 0 -2px 4px rgba(0,0,0,0.3), 0 2px 0 rgba(0,0,0,0.45)}
.btn.alt{
  background:linear-gradient(160deg, #2a1a40 0%, #1a0c30 100%);
  border-color:#0a0418;color:var(--cyan);
  text-shadow:0 1px 0 #000, 0 0 8px rgba(123,228,255,0.4);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1), 0 4px 0 rgba(0,0,0,0.45), 0 0 18px rgba(139,91,255,0.3);
}

/* === SCROLL CARD === */
.scroll{
  background:
    radial-gradient(ellipse at 30% 5%, rgba(0,0,0,0.18), transparent 60%),
    radial-gradient(ellipse at 80% 95%, rgba(0,0,0,0.22), transparent 60%),
    repeating-linear-gradient(11deg, rgba(0,0,0,0.05) 0 2px, transparent 2px 9px),
    linear-gradient(160deg, var(--paper) 0%, var(--aged) 100%);
  color:var(--ink);
  border:1px solid rgba(0,0,0,0.45);
  padding:30px 32px 26px;
  border-radius:3px;
  position:relative;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.18),
    inset 0 0 80px rgba(0,0,0,0.22),
    0 22px 38px rgba(0,0,0,0.55),
    0 8px 0 rgba(0,0,0,0.35);
  display:none;
}
.scroll.show{display:block;animation:scrollOpen 0.7s cubic-bezier(.18,.8,.4,1.05)}
@keyframes scrollOpen{
  0%{opacity:0;transform:translateY(20px) scaleY(0.6);transform-origin:top center;filter:blur(6px)}
  100%{opacity:1;transform:translateY(0) scaleY(1);filter:blur(0)}
}
.scroll::before, .scroll::after{
  content:'';position:absolute;width:64px;height:64px;pointer-events:none;
  background:radial-gradient(circle at center, rgba(0,0,0,0.4), transparent 70%);
}
.scroll::before{top:-12px;left:-12px}
.scroll::after{bottom:-12px;right:-12px}

.scroll-head{
  text-align:center;border-bottom:1px dashed rgba(0,0,0,0.3);padding-bottom:14px;margin-bottom:18px;
}
.scroll-head .grimoire{
  font-family:'IM Fell English SC', serif;
  font-size:11px;letter-spacing:0.42em;color:var(--ink);opacity:0.55;
}
.scroll-head h2{
  font-family:'Cinzel Decorative', serif;font-weight:900;
  font-size:clamp(22px, 3.6vw, 34px);
  color:var(--ink);
  margin:6px 0 4px;
  text-shadow:0 1px 0 rgba(255,255,255,0.4);
}
.scroll-head h2 em{color:#5e2418;font-style:italic;font-weight:700}
.scroll-head .sub{
  font-family:'Cormorant Garamond', serif;font-style:italic;
  font-size:14px;color:rgba(40,15,5,0.7);
}

.step{
  display:grid;grid-template-columns:48px 1fr;gap:14px;
  padding:14px 0;border-bottom:1px dashed rgba(0,0,0,0.2);
}
.step:last-child{border-bottom:none}
.step .glyph{
  font-family:'Cinzel Decorative', serif;font-weight:900;font-size:34px;
  color:#5e2418;line-height:1;text-align:center;
  text-shadow:0 1px 0 rgba(255,255,255,0.5), 0 0 14px rgba(139,91,255,0.18);
}
.step .body{display:flex;flex-direction:column;gap:6px;min-width:0}
.step .phase{
  font-family:'IM Fell English SC', serif;
  font-size:11px;letter-spacing:0.36em;color:#5e2418;
}
.step .phase .n{font-family:'Major Mono Display', monospace;letter-spacing:0;color:#3a1408;margin-right:4px}
.step .text{
  font-family:'Cormorant Garamond', serif;font-style:italic;font-weight:500;
  font-size:18px;line-height:1.55;color:var(--ink);
  word-wrap:break-word;
}
.step .text b{font-style:normal;color:#7a1c10;font-weight:700;letter-spacing:0.02em}

.scroll-foot{
  margin-top:14px;text-align:center;
  font-family:'IM Fell English SC', serif;
  font-size:10px;letter-spacing:0.34em;
  color:var(--ink);opacity:0.55;
}
.dna{
  font-family:'Major Mono Display', monospace;font-size:10px;letter-spacing:0.16em;
  color:#5e2418;opacity:0.55;margin-top:4px;
}

@media (max-width:560px){
  .scroll{padding:22px 18px 18px}
  .step{grid-template-columns:36px 1fr;gap:10px}
  .step .glyph{font-size:24px}
  .step .text{font-size:16px}
}
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="crest">VOL · I · ANNO MMXXVI · CHORES OF MORTAL CONCERN</div>
    <h1>The <span class="v">Cosmic</span> <span class="b">Architect</span></h1>
    <div class="tagline">a three-step magical plan for <em>any chore</em>, drafted by the celestial bureaucracy.</div>
    <div class="flourish">⛧ ✦ ⛧</div>
  </header>

  <form class="form" id="form" onsubmit="return false">
    <label>name thy chore</label>
    <input id="iTask" type="text" maxlength="80" placeholder="do the dishes" autocomplete="off" />
    <div class="actions">
      <button class="btn" id="bGen" type="submit">⛧ Draft the Plan ⛧</button>
      <button class="btn alt" id="bAgain" type="button">⟲ Reroll</button>
    </div>
  </form>

  <section class="scroll" id="scroll">
    <div class="scroll-head">
      <div class="grimoire">FOLIO · I · OF THE COSMIC ARCHITECT</div>
      <h2 id="scrollTitle">A Plan Forthcoming</h2>
      <div class="sub" id="scrollSub">— commissioned this hour —</div>
    </div>
    <div id="steps"></div>
    <div class="scroll-foot">
      <div>SO IT IS WRITTEN · SO IT SHALL BE SCRUBBED</div>
      <div class="dna" id="dna"></div>
    </div>
  </section>
</div>

<script>
(() => {
  const TASK = '{T}';

  // 3 phases — pick one template from each, in order.
  const PHASES = [
    {
      name: 'INVOCATION',
      glyph: 'I',
      pool: [
        "Light a single beeswax candle to the southwest. Whisper the name of the chore — '{T}' — into the flame seven times, each whisper a half-step lower than the last.",
        "Open thy eastern window, even slightly. The act of <b>{T}</b> requires the consent of any breeze. Wait for one to enter; if none comes, you have permission to skip this.",
        "Draw a five-pointed star in the air with your dominant hand. At each point, name a thing you would rather be doing. The chore — <b>{T}</b> — must be told what it is up against.",
        "Stand in the threshold of the room where <b>{T}</b> awaits. Do not enter yet. Recite the household's true name. (You may have to invent one.)",
        "Place three small stones in a triangle. The triangle must point at the chore. The chore — <b>{T}</b> — now knows it has been targeted.",
        "Brew the strongest beverage you can lawfully drink and place it within arm's reach. The completion of <b>{T}</b> is now bound to the cup; should the cup empty, the spell weakens.",
      ],
    },
    {
      name: 'CRUCIBLE',
      glyph: 'II',
      pool: [
        "Cross the threshold. Begin <b>{T}</b> as if you are the only living person who could ever do it correctly — because, in this exact configuration of the timeline, you are.",
        "Move only with the rhythm of your own breath. Each inhale is a step toward the completion of <b>{T}</b>; each exhale releases a small fraction of the dread that delayed it.",
        "Speak no word during the act of <b>{T}</b>. The Architect cannot hear plans that explain themselves; she rewards only the deeds you commit in silence.",
        "Halve the chore in your mind. Do only the first half. Then halve the remaining half. Then halve again. By the seventh halving, <b>{T}</b> will be finished — Zeno was wrong about chores.",
        "Imagine that a being of immeasurable power is watching, and is mildly annoyed that <b>{T}</b> is still incomplete. Move accordingly. The being may or may not be your mother.",
        "Set a timer for nine minutes and forty-four seconds. Within that span, attempt <b>{T}</b> with the focused fury of a comet on intercept course. When the timer rings, stop, regardless. Resume only after a brief offering (a sip of water, a small noise).",
      ],
    },
    {
      name: 'DENOUEMENT',
      glyph: 'III',
      pool: [
        "Once <b>{T}</b> is complete, return to the candle and snuff it with your fingertips. (Wet them first; the Architect respects intelligence over flair.)",
        "Survey what you have done. Speak the words 'it is finished, and the gods are mildly impressed' aloud. Do not check whether the gods agree; the speaking is enough.",
        "Place the three stones outdoors, somewhere they will not be moved before sunrise. The completion of <b>{T}</b> belongs to the earth now, not to you. Do not take credit beyond a quiet smile.",
        "Drink the rest of the cup. Whatever is left in it is a small payment to the Architect for her work. (She rarely cashes in.)",
        "Reward yourself with one (1) frivolity of your choice — a song, a snack, a small lie-down. The reward must be at least 30 seconds long, or the spell will not seal.",
        "Turn slowly in place once, widdershins. With each rotation, name a chore that is <em>not</em> yours today. <b>{T}</b> is finished, and the rest belong to the Architect, the cat, or no one.",
      ],
    },
  ];

  const TITLES = [
    "A Plan for {T}",
    "The Sealed Manuscript of {T}",
    "On the Completion of {T}",
    "Folio of {T}, In Three Movements",
    "The Architect's Ruling on {T}",
    "Decree Concerning {T}",
  ];

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  function pickFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function fnv1a(s) {
    let h = 2166136261;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    return (h >>> 0).toString(16).padStart(8, '0');
  }

  const iTask = document.getElementById('iTask');
  const bGen = document.getElementById('bGen');
  const bAgain = document.getElementById('bAgain');
  const scrollEl = document.getElementById('scroll');
  const stepsEl = document.getElementById('steps');
  const scrollTitle = document.getElementById('scrollTitle');
  const scrollSub = document.getElementById('scrollSub');
  const dnaEl = document.getElementById('dna');

  let lastTask = null;

  function render(task) {
    if (!task) return;
    lastTask = task;
    const safeTask = esc(task);
    // pick + substitute
    const stepsHTML = PHASES.map((phase, i) => {
      const tpl = pickFrom(phase.pool).split('{T}').join(safeTask);
      return `
        <div class="step">
          <div class="glyph">${phase.glyph}</div>
          <div class="body">
            <div class="phase"><span class="n">${i + 1}.</span>${phase.name}</div>
            <div class="text">${tpl}</div>
          </div>
        </div>
      `;
    }).join('');
    stepsEl.innerHTML = stepsHTML;
    const titleTpl = pickFrom(TITLES).split('{T}').join(safeTask);
    // Use unicode capitalization for the bound word so it reads as a proper title.
    scrollTitle.innerHTML = titleTpl;
    const now = new Date();
    const date = now.toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' });
    scrollSub.textContent = `— commissioned ${date} —`;
    const dna = fnv1a(task + '|' + Date.now());
    dnaEl.textContent = `SEAL · ${dna.toUpperCase()} · WITNESSED BY THE ARCHITECT`;
    scrollEl.classList.remove('show');
    void scrollEl.offsetWidth;
    scrollEl.classList.add('show');
  }

  bGen.addEventListener('click', (e) => {
    e.preventDefault();
    const task = iTask.value.trim();
    if (!task) {
      iTask.focus();
      iTask.style.boxShadow = '0 0 0 2px rgba(224,99,154,0.5)';
      setTimeout(() => { iTask.style.boxShadow = ''; }, 600);
      return;
    }
    render(task);
  });
  bAgain.addEventListener('click', () => {
    if (!lastTask) {
      const t = iTask.value.trim();
      if (t) render(t);
      return;
    }
    render(lastTask);
  });
  iTask.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') bGen.click();
  });

  // restore last task
  const saved = localStorage.getItem('cosmic-architect-last');
  if (saved) iTask.value = saved;
  iTask.addEventListener('input', () => { localStorage.setItem('cosmic-architect-last', iTask.value); });
})();
</script>
</body>
</html>
