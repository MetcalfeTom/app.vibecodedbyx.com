<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>gigglepan</title>
<meta name="description" content="Generate funny one-pan high-protein meals on demand. Pick a protein, some veggies, the heat level, and GigglePan invents the dish for you." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8D%B3" />
<meta property="og:title" content="GigglePan — funny one-pan high-protein recipes" />
<meta property="og:description" content="A vibrant recipe generator that invents one-pan high-protein meals with silly names. Pick your protein and veggies and laugh while you cook." />
<meta property="og:url" content="https://sloppy.live/gigglepan/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/cartoon%20cast%20iron%20pan%20with%20chicken%20broccoli%20bell%20peppers%20vibrant%20kitchen%20illustration%20joyful?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;600&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream:   #fff5e6;
    --paper:   #fffaf0;
    --paper-d: #f0e3c8;
    --coral:   #ff6b6b;
    --coral-d: #c93e3e;
    --mustard: #ffc945;
    --sage:    #4cba8b;
    --plum:    #6a4c93;
    --ink:     #1f1a17;
    --ink-2:   #534436;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background:
      radial-gradient(circle at 12% 10%, rgba(76,186,139,0.22) 0%, transparent 45%),
      radial-gradient(circle at 88% 14%, rgba(255,201,69,0.28) 0%, transparent 40%),
      radial-gradient(circle at 50% 95%, rgba(255,107,107,0.20) 0%, transparent 55%),
      var(--cream);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(11deg, transparent 0 4px, rgba(31,26,23,0.025) 4px 5px);
    z-index: 1;
  }

  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 1.6rem 1.4rem 4rem;
    position: relative;
    z-index: 2;
  }

  /* ── HEADER ─────────────────────────────────────────────────── */
  header.brand {
    text-align: center;
    margin-bottom: 1.4rem;
  }
  h1.logo {
    font-family: 'Bowlby One SC', sans-serif;
    font-size: clamp(2.5rem, 7vw, 4.8rem);
    line-height: 1;
    letter-spacing: 0.02em;
    color: var(--ink);
    text-shadow:
      4px 4px 0 var(--mustard),
      8px 8px 0 var(--coral);
    margin-bottom: 0.4rem;
  }
  h1.logo .pan {
    display: inline-block;
    color: var(--coral);
    text-shadow:
      4px 4px 0 var(--mustard),
      8px 8px 0 var(--plum);
    transform: rotate(-3deg);
  }
  .tagline {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.2rem, 2.6vw, 1.7rem);
    color: var(--plum);
    font-weight: 700;
    transform: rotate(-1.2deg);
    display: inline-block;
  }
  .strap {
    margin-top: 0.4rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    color: var(--ink-2);
    text-transform: uppercase;
  }
  .strap span.dot { color: var(--coral); }

  /* ── CHOOSER ────────────────────────────────────────────────── */
  .chooser {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 22px;
    padding: 1.4rem;
    box-shadow: 8px 8px 0 var(--ink);
    margin-bottom: 1.6rem;
    position: relative;
  }
  .chooser::before {
    content: '';
    position: absolute;
    top: -14px; left: 24px;
    width: 70px; height: 28px;
    background: var(--mustard);
    border: 3px solid var(--ink);
    border-radius: 8px;
    transform: rotate(-4deg);
    z-index: 0;
  }
  .chooser::after {
    content: 'TODAY';
    position: absolute;
    top: -11px; left: 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--ink);
    letter-spacing: 0.2em;
    font-weight: 700;
    transform: rotate(-4deg);
    z-index: 1;
  }
  .row {
    display: grid;
    grid-template-columns: 6em 1fr;
    align-items: flex-start;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }
  .row > label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    color: var(--plum);
    text-transform: uppercase;
    padding-top: 0.35rem;
    font-weight: 600;
  }
  .chip-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .chip {
    appearance: none;
    background: var(--paper);
    border: 2px solid var(--ink);
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 0.4rem 0.9rem;
    border-radius: 18px;
    cursor: pointer;
    transition: transform 0.06s, box-shadow 0.06s, background 0.12s;
    user-select: none;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .chip:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
  .chip:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
  .chip.active   { background: var(--coral);   color: var(--paper); }
  .chip.veg.active { background: var(--sage);  color: var(--paper); }
  .chip.heat.active { background: var(--mustard); color: var(--ink); }
  .chip.mood.active { background: var(--plum);  color: var(--paper); }
  .chip .emoji { margin-right: 0.25em; }

  .portion-line {
    display: flex; gap: 0.4rem; align-items: center;
  }
  .portion-line input[type=number] {
    width: 4em;
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 700;
    text-align: center;
    border: 2px solid var(--ink);
    background: var(--paper);
    border-radius: 12px;
    padding: 0.2rem 0.4rem;
    box-shadow: 2px 2px 0 var(--ink);
    color: var(--ink);
  }
  .portion-line .lbl {
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    color: var(--ink-2);
  }

  .generate {
    width: 100%;
    appearance: none;
    background: var(--coral);
    border: 3px solid var(--ink);
    color: var(--paper);
    font-family: 'Bowlby One SC', sans-serif;
    font-size: clamp(1.4rem, 3.4vw, 2rem);
    letter-spacing: 0.06em;
    padding: 0.7rem 1.4rem;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 6px 6px 0 var(--ink);
    transition: transform 0.08s, box-shadow 0.08s, background 0.12s;
    margin-top: 0.6rem;
  }
  .generate:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 var(--ink); background: #ff7e7e; }
  .generate:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
  .generate:disabled { background: var(--paper-d); color: var(--ink-2); cursor: progress; transform: none; box-shadow: 4px 4px 0 var(--ink); }
  .generate .emoji { margin-right: 0.3em; }

  /* ── RESULT CARD ────────────────────────────────────────────── */
  .result {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 22px;
    padding: 1.4rem 1.6rem 1.8rem;
    box-shadow: 8px 8px 0 var(--ink);
    margin-bottom: 1.6rem;
    position: relative;
    display: none;
  }
  .result.show { display: block; }
  .result::before {
    content: '';
    position: absolute;
    top: -14px; right: 30px;
    width: 90px; height: 28px;
    background: var(--sage);
    border: 3px solid var(--ink);
    border-radius: 8px;
    transform: rotate(3deg);
  }
  .result::after {
    content: 'FRESH!';
    position: absolute;
    top: -11px; right: 38px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--paper);
    letter-spacing: 0.16em;
    font-weight: 700;
    transform: rotate(3deg);
  }
  .result h2 {
    font-family: 'Bowlby One SC', sans-serif;
    font-size: clamp(1.6rem, 4.4vw, 2.6rem);
    line-height: 1.05;
    margin-bottom: 0.4rem;
    color: var(--ink);
  }
  .result .quote {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.05rem, 2.2vw, 1.4rem);
    color: var(--coral-d);
    font-weight: 700;
    margin-bottom: 1.2rem;
    transform: rotate(-0.6deg);
    display: inline-block;
  }
  .result .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem 1.2rem;
    margin-bottom: 1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .result .meta b {
    color: var(--plum);
    font-weight: 700;
  }

  .result .body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.4rem;
  }
  .result .body > section h3 {
    font-family: 'Bowlby One SC', sans-serif;
    font-size: 1.1rem;
    color: var(--coral-d);
    margin-bottom: 0.5rem;
    letter-spacing: 0.04em;
  }
  .result .body > section.steps h3 { color: var(--plum); }

  .result ul.ingr {
    list-style: none;
    padding: 0;
  }
  .result ul.ingr li {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    line-height: 1.55;
    padding-left: 0.4em;
    text-indent: -0.4em;
  }
  .result ul.ingr li::before {
    content: '✦';
    color: var(--sage);
    margin-right: 0.45em;
  }

  .result ol.steps {
    counter-reset: step;
    list-style: none;
    padding: 0;
  }
  .result ol.steps li {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    line-height: 1.45;
    margin-bottom: 0.6rem;
    padding-left: 2em;
    position: relative;
    counter-increment: step;
  }
  .result ol.steps li::before {
    content: counter(step);
    position: absolute;
    left: 0; top: -0.1em;
    width: 1.5em; height: 1.5em;
    background: var(--coral);
    color: var(--paper);
    font-family: 'Bowlby One SC', sans-serif;
    font-size: 0.85em;
    display: inline-flex;
    align-items: center; justify-content: center;
    border-radius: 50%;
    border: 2px solid var(--ink);
  }

  .macros {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.6rem;
    margin: 1rem 0;
  }
  .macro {
    background: var(--paper-d);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 0.6rem 0.8rem;
    text-align: center;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .macro .v {
    font-family: 'Bowlby One SC', sans-serif;
    font-size: 1.6rem;
    color: var(--coral-d);
    line-height: 1;
  }
  .macro .l {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    color: var(--ink-2);
    text-transform: uppercase;
    margin-top: 0.2rem;
  }
  .macro.protein .v { color: var(--coral-d); }
  .macro.carbs   .v { color: var(--mustard); }
  .macro.fat     .v { color: var(--plum); }

  .pan-photo {
    background: var(--paper-d);
    border: 3px solid var(--ink);
    border-radius: 16px;
    aspect-ratio: 5 / 3;
    margin-bottom: 1rem;
    overflow: hidden;
    box-shadow: 4px 4px 0 var(--ink);
    position: relative;
  }
  .pan-photo img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .pan-photo .placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--ink-2);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
    background:
      repeating-linear-gradient(45deg, transparent 0 12px, rgba(31,26,23,0.06) 12px 14px),
      var(--paper-d);
  }

  .actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .actions button {
    appearance: none;
    background: var(--paper);
    border: 2px solid var(--ink);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 0.5rem 0.9rem;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.06s, box-shadow 0.06s, background 0.12s;
  }
  .actions button:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
  .actions button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
  .actions button.save.saved { background: var(--sage); color: var(--paper); }

  .err {
    background: #ffe6e6;
    border: 2px dashed var(--coral-d);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    margin: 1rem 0;
    color: var(--coral-d);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
  }

  /* ── SAVED RECIPES ──────────────────────────────────────────── */
  .saved-panel {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 22px;
    padding: 1.2rem 1.4rem;
    box-shadow: 6px 6px 0 var(--ink);
    margin-bottom: 2rem;
  }
  .saved-panel h3 {
    font-family: 'Bowlby One SC', sans-serif;
    font-size: 1.1rem;
    color: var(--plum);
    margin-bottom: 0.6rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .saved-panel h3 .count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--ink-2);
    font-weight: 400;
    letter-spacing: 0.1em;
  }
  .saved-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.6rem;
  }
  .saved-grid .empty {
    grid-column: 1 / -1;
    font-family: 'Caveat', cursive;
    color: var(--ink-2);
    font-size: 1.2rem;
    text-align: center;
    padding: 0.8rem;
  }
  .saved-card {
    background: var(--paper-d);
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 0.6rem 0.7rem;
    box-shadow: 2px 2px 0 var(--ink);
    cursor: pointer;
    transition: transform 0.06s, box-shadow 0.06s;
    position: relative;
  }
  .saved-card:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
  .saved-card .name {
    font-family: 'Bowlby One SC', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    line-height: 1.15;
    margin-bottom: 0.2rem;
  }
  .saved-card .when {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--ink-2);
    letter-spacing: 0.08em;
  }
  .saved-card .x {
    position: absolute;
    top: 4px; right: 6px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--coral-d);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 0 0.2em;
  }
  .saved-card .x:hover { background: var(--coral); color: var(--paper); border-radius: 4px; }

  /* ── FOOT ───────────────────────────────────────────────────── */
  footer {
    text-align: center;
    font-family: 'Caveat', cursive;
    font-size: 1.1rem;
    color: var(--ink-2);
    margin-top: 1.4rem;
  }

  /* ── RESPONSIVE ─────────────────────────────────────────────── */
  @media (max-width: 720px) {
    .row { grid-template-columns: 1fr; gap: 0.3rem; }
    .row > label { padding-top: 0; }
    .result .body { grid-template-columns: 1fr; }
    .macros { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<main class="wrap">
  <header class="brand">
    <h1 class="logo">GIGGLE<span class="pan">PAN</span></h1>
    <div class="tagline">one-pan recipes that crack you up &amp; pack the protein</div>
    <div class="strap">PROTEIN <span class="dot">·</span> VEGGIES <span class="dot">·</span> ONE PAN <span class="dot">·</span> ZERO BORING</div>
  </header>

  <section class="chooser">
    <div class="row">
      <label>protein</label>
      <div class="chip-grid" id="proteinGrid"></div>
    </div>
    <div class="row">
      <label>veggies</label>
      <div class="chip-grid" id="veggieGrid"></div>
    </div>
    <div class="row">
      <label>heat</label>
      <div class="chip-grid" id="heatGrid"></div>
    </div>
    <div class="row">
      <label>mood</label>
      <div class="chip-grid" id="moodGrid"></div>
    </div>
    <div class="row">
      <label>servings</label>
      <div class="portion-line">
        <button class="chip" id="servDown" type="button">−</button>
        <input type="number" id="servings" min="1" max="8" value="2" />
        <button class="chip" id="servUp" type="button">+</button>
        <span class="lbl">hungry people</span>
      </div>
    </div>
    <button class="generate" id="genBtn" type="button"><span class="emoji">🍳</span>COOK ME UP A LAUGH</button>
  </section>

  <section class="result" id="resultCard" aria-live="polite"></section>

  <section class="saved-panel">
    <h3>your faves <span class="count" id="savedCount">0 saved</span></h3>
    <div class="saved-grid" id="savedGrid">
      <div class="empty">no saved recipes yet — hit GENERATE then SAVE the keepers</div>
    </div>
  </section>

  <footer>made with extra protein · enjoy ✿</footer>
</main>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════════════
// GIGGLEPAN — vibrant one-pan recipe generator. Uses Pollinations text
// API (openai chat-completion endpoint, jsonMode) to invent a recipe
// matching the player's protein / veggies / heat / mood / servings, and
// Pollinations image API to plate it up. Heavy protein + veggie emphasis
// is enforced in the system prompt + a low-carb directive. Falls back to
// a hand-written sample if the API errors so the page stays useful.
// ════════════════════════════════════════════════════════════════════════

const $ = (id) => document.getElementById(id);

const PROTEINS = [
  { id: 'chicken',  label: 'chicken',  emoji: '🐔' },
  { id: 'salmon',   label: 'salmon',   emoji: '🐟' },
  { id: 'beef',     label: 'beef',     emoji: '🐄' },
  { id: 'pork',     label: 'pork',     emoji: '🥓' },
  { id: 'shrimp',   label: 'shrimp',   emoji: '🦐' },
  { id: 'tofu',     label: 'tofu',     emoji: '🌱' },
  { id: 'tempeh',   label: 'tempeh',   emoji: '🍱' },
  { id: 'egg',      label: 'eggs',     emoji: '🥚' },
  { id: 'cottage',  label: 'cottage cheese', emoji: '🧀' },
  { id: 'turkey',   label: 'turkey',   emoji: '🦃' },
  { id: 'sardine',  label: 'sardines', emoji: '🐠' },
  { id: 'lamb',     label: 'lamb',     emoji: '🐑' },
];

const VEGGIES = [
  { id: 'broccoli',   label: 'broccoli',     emoji: '🥦' },
  { id: 'spinach',    label: 'spinach',      emoji: '🥬' },
  { id: 'kale',       label: 'kale',         emoji: '🥬' },
  { id: 'asparagus',  label: 'asparagus',    emoji: '🌿' },
  { id: 'pepper',     label: 'bell pepper',  emoji: '🫑' },
  { id: 'zucchini',   label: 'zucchini',     emoji: '🥒' },
  { id: 'mushroom',   label: 'mushrooms',    emoji: '🍄' },
  { id: 'cauli',      label: 'cauliflower',  emoji: '🥦' },
  { id: 'green beans',label: 'green beans',  emoji: '🌱' },
  { id: 'brussels',   label: 'brussels',     emoji: '🥬' },
  { id: 'tomato',     label: 'tomato',       emoji: '🍅' },
  { id: 'sweet potato', label: 'sweet potato', emoji: '🍠' },
  { id: 'onion',      label: 'onion',        emoji: '🧅' },
  { id: 'garlic',     label: 'garlic',       emoji: '🧄' },
];

const HEAT = [
  { id: 'mild',     label: 'mild',     emoji: '😌' },
  { id: 'warm',     label: 'warm',     emoji: '🌶️' },
  { id: 'spicy',    label: 'spicy',    emoji: '🔥' },
  { id: 'wreck me', label: 'wreck me', emoji: '🥵' },
];

const MOODS = [
  { id: 'cozy',     label: 'cozy',         emoji: '🛋️' },
  { id: 'feisty',   label: 'feisty',       emoji: '⚡' },
  { id: 'fancy',    label: 'fancy',        emoji: '🎩' },
  { id: 'goblin',   label: 'goblin mode',  emoji: '👹' },
  { id: 'beach',    label: 'beach trip',   emoji: '🌴' },
  { id: 'monk',     label: 'monk vibes',   emoji: '🧘' },
];

const state = {
  protein: 'chicken',
  veggies: new Set(['broccoli', 'pepper', 'garlic']),
  heat: 'warm',
  mood: 'feisty',
  servings: 2,
};

// ── CHIP BUILDERS ──────────────────────────────────────────────────────
function buildChips(gridId, items, kind, getActive, onPick){
  const grid = $(gridId);
  grid.innerHTML = '';
  for (const item of items){
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'chip ' + kind;
    b.dataset.id = item.id;
    b.innerHTML = '<span class="emoji">' + item.emoji + '</span>' + item.label;
    if (getActive(item.id)) b.classList.add('active');
    b.addEventListener('click', () => onPick(item.id, b));
    grid.appendChild(b);
  }
}
function refreshAll(){
  buildChips('proteinGrid', PROTEINS, 'protein',
    id => state.protein === id,
    id => { state.protein = id; refreshAll(); });
  buildChips('veggieGrid', VEGGIES, 'veg',
    id => state.veggies.has(id),
    id => {
      if (state.veggies.has(id)) state.veggies.delete(id);
      else state.veggies.add(id);
      refreshAll();
    });
  buildChips('heatGrid', HEAT, 'heat',
    id => state.heat === id,
    id => { state.heat = id; refreshAll(); });
  buildChips('moodGrid', MOODS, 'mood',
    id => state.mood === id,
    id => { state.mood = id; refreshAll(); });
}
refreshAll();

// servings widget
$('servDown').addEventListener('click', () => { state.servings = Math.max(1, state.servings - 1); $('servings').value = state.servings; });
$('servUp').addEventListener('click',   () => { state.servings = Math.min(8, state.servings + 1); $('servings').value = state.servings; });
$('servings').addEventListener('input', (e) => {
  const v = parseInt(e.target.value, 10);
  if (!isNaN(v)) state.servings = Math.max(1, Math.min(8, v));
});

// ── GENERATE ───────────────────────────────────────────────────────────
const genBtn = $('genBtn');
const resultCard = $('resultCard');
let currentRecipe = null;

genBtn.addEventListener('click', generate);

async function generate(){
  if (state.veggies.size === 0){
    showError('pick at least one veggie — this is a HEAVY VEGGIE app');
    return;
  }
  genBtn.disabled = true;
  genBtn.innerHTML = '<span class="emoji">⏳</span>SIZZLING…';
  resultCard.classList.add('show');
  resultCard.innerHTML = '<div class="quote">simmering ideas…</div>';

  const sysPrompt = [
    'You are GigglePan, a deeply funny but skilled home cook who only writes ONE-PAN recipes.',
    'Every recipe must be:',
    '  - ONE pan only (skillet, sheet pan, dutch oven — pick one).',
    '  - HEAVY on protein. The protein should be the largest macro by grams.',
    '  - HEAVY on vegetables. At least HALF the volume of the dish is non-starchy veggies.',
    '  - LOW on starchy carbs (no rice / pasta / bread / potatoes unless explicitly chosen).',
    '  - 4-8 clear cooking steps, each a single short sentence.',
    '  - Real measurements (g / oz / tsp / tbsp), scaled to the requested servings.',
    '',
    'The "name" field MUST be funny and original — a punny title, an absurd boast, or a',
    'character-style nickname (e.g., "Sergeant Chicken\'s Broccoli Boot Camp", "The Salmon',
    'Who Knew Too Much", "Tofu Skywalker vs the Dark Pan"). No generic names.',
    '',
    'The "tagline" is a single witty line ≤ 80 chars in the chef\'s voice.',
    'The "chef_quote" is one sentence the chef would actually yell while cooking.',
    'Reply with JSON ONLY, no extra prose.',
  ].join('\n');

  const userPrompt = [
    'protein: ' + state.protein,
    'veggies: ' + [...state.veggies].join(', '),
    'heat level: ' + state.heat,
    'mood: ' + state.mood,
    'servings: ' + state.servings,
    '',
    'Schema:',
    '{',
    '  "name": "string — funny dish name",',
    '  "tagline": "string — witty one-liner",',
    '  "chef_quote": "string — what the chef yells",',
    '  "pan": "skillet | sheet pan | wok | dutch oven | grill pan",',
    '  "prep_min": number, "cook_min": number, "servings": number,',
    '  "protein_g": number, "carbs_g": number, "fat_g": number, "calories": number,',
    '  "ingredients": ["string", ...],',
    '  "steps": ["string", ...],',
    '  "image_hint": "string — visual description for an illustrator"',
    '}',
  ].join('\n');

  let recipe = null;
  try {
    const res = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'openai',
        jsonMode: true,
        messages: [
          { role: 'system', content: sysPrompt },
          { role: 'user',   content: userPrompt },
        ],
      }),
    });
    const text = await res.text();
    recipe = extractRecipe(text);
  } catch (e){
    console.warn('pollinations fetch failed', e);
  }
  if (!recipe){
    recipe = fallbackRecipe();
    showError('the AI is napping — here\'s a fallback chef\'s special');
  }

  // light normalize
  recipe.servings = recipe.servings || state.servings;
  recipe.protein_g = Math.max(0, Math.round(recipe.protein_g || 0));
  recipe.carbs_g   = Math.max(0, Math.round(recipe.carbs_g   || 0));
  recipe.fat_g     = Math.max(0, Math.round(recipe.fat_g     || 0));
  recipe.calories  = Math.max(0, Math.round(recipe.calories  || (recipe.protein_g * 4 + recipe.carbs_g * 4 + recipe.fat_g * 9)));
  if (!Array.isArray(recipe.ingredients)) recipe.ingredients = [];
  if (!Array.isArray(recipe.steps)) recipe.steps = [];

  currentRecipe = recipe;
  renderRecipe(recipe);

  genBtn.disabled = false;
  genBtn.innerHTML = '<span class="emoji">🍳</span>COOK ME UP A LAUGH';
}

function extractRecipe(text){
  // try strict JSON first
  try {
    const o = JSON.parse(text);
    if (o.choices && o.choices[0] && o.choices[0].message){
      const inner = o.choices[0].message.content;
      try { return JSON.parse(inner); } catch(e){}
      // extract first JSON object
      const m = inner.match(/\{[\s\S]*\}/);
      if (m) return JSON.parse(m[0]);
    } else if (o.name && o.ingredients){
      return o;
    }
  } catch(e){}
  // strip code fences and try again
  const stripped = text.replace(/```(?:json)?/g, '').trim();
  try { return JSON.parse(stripped); } catch(e){}
  const m = stripped.match(/\{[\s\S]*\}/);
  if (m){
    try { return JSON.parse(m[0]); } catch(e){}
  }
  return null;
}

function fallbackRecipe(){
  const veggies = [...state.veggies];
  const main = state.protein;
  return {
    name: 'Sergeant ' + cap(main) + "'s One-Pan Broccoli Boot Camp",
    tagline: 'High protein, zero excuses, pan still hot.',
    chef_quote: 'DROP AND GIVE ME TWENTY GRAMS OF PROTEIN!',
    pan: 'skillet',
    prep_min: 8,
    cook_min: 14,
    servings: state.servings,
    protein_g: 42 * state.servings,
    carbs_g: 14 * state.servings,
    fat_g: 18 * state.servings,
    calories: (42*4 + 14*4 + 18*9) * state.servings,
    ingredients: [
      (state.servings * 180) + 'g ' + main,
      veggies.map(v => (state.servings * 120) + 'g ' + v).join(', '),
      '2 tbsp olive oil',
      '4 cloves garlic, smashed',
      '1 tsp smoked paprika',
      'salt + black pepper to taste',
      '1 squeeze of lemon',
    ],
    steps: [
      'Heat the pan over medium-high heat with the olive oil.',
      'Sear the ' + main + ' on both sides for 3-4 minutes per side.',
      'Push the protein to one side and toss in the veggies + garlic.',
      'Sprinkle with smoked paprika, salt, pepper. Stir to coat.',
      'Cover for 4 minutes until veggies are bright and just-tender.',
      'Finish with a lemon squeeze. Yell once. Serve.',
    ],
    image_hint: 'top-down photo of a cast iron pan filled with golden seared ' + main + ' and bright green broccoli, garlic, paprika',
  };
}

function renderRecipe(r){
  resultCard.innerHTML = '';
  const html = `
    <h2></h2>
    <div class="quote"></div>
    <div class="meta">
      <span><b>${esc(r.pan || 'one pan')}</b></span>
      <span>prep <b>${r.prep_min || 0}m</b></span>
      <span>cook <b>${r.cook_min || 0}m</b></span>
      <span>serves <b>${r.servings || state.servings}</b></span>
      <span>~<b>${r.calories}</b> kcal</span>
    </div>
    <div class="pan-photo" id="panPhoto"><div class="placeholder">PLATING…</div></div>
    <div class="macros">
      <div class="macro protein"><div class="v">${r.protein_g}g</div><div class="l">PROTEIN</div></div>
      <div class="macro carbs"><div class="v">${r.carbs_g}g</div><div class="l">CARBS</div></div>
      <div class="macro fat"><div class="v">${r.fat_g}g</div><div class="l">FAT</div></div>
    </div>
    <div class="body">
      <section>
        <h3>Ingredients</h3>
        <ul class="ingr"></ul>
      </section>
      <section class="steps">
        <h3>Steps</h3>
        <ol class="steps"></ol>
      </section>
    </div>
    <div class="actions">
      <button class="save" type="button">⭐ SAVE</button>
      <button class="reroll" type="button">↻ REROLL</button>
      <button class="copy" type="button">📋 COPY</button>
      <button class="share" type="button">🔗 SHARE</button>
    </div>
  `;
  resultCard.innerHTML = html;
  resultCard.querySelector('h2').textContent = r.name;
  resultCard.querySelector('.quote').textContent = '"' + (r.tagline || r.chef_quote || 'it is what it is') + '"';
  const ul = resultCard.querySelector('ul.ingr');
  for (const ing of r.ingredients){
    const li = document.createElement('li');
    li.textContent = ing;
    ul.appendChild(li);
  }
  const ol = resultCard.querySelector('ol.steps');
  for (const st of r.steps){
    const li = document.createElement('li');
    li.textContent = st;
    ol.appendChild(li);
  }
  // image — lazy load from Pollinations
  const photoEl = $('panPhoto');
  const hint = (r.image_hint || (r.name + ' ' + r.ingredients.slice(0, 4).join(' ')));
  const prompt = encodeURIComponent('top-down vibrant photo of ' + hint + ' in a cast iron pan, bright natural light, cheerful kitchen styling');
  const img = new Image();
  img.alt = r.name;
  img.onload = () => { photoEl.innerHTML = ''; photoEl.appendChild(img); };
  img.onerror = () => { photoEl.querySelector('.placeholder').textContent = '(no plating today)'; };
  img.src = 'https://image.pollinations.ai/prompt/' + prompt + '?width=600&height=360&nologo=true';

  // action buttons
  const saveBtn = resultCard.querySelector('button.save');
  const isSaved = saved.some(s => s.name === r.name);
  if (isSaved) saveBtn.classList.add('saved'), saveBtn.textContent = '✓ SAVED';
  saveBtn.addEventListener('click', () => saveRecipe(r, saveBtn));
  resultCard.querySelector('button.reroll').addEventListener('click', generate);
  resultCard.querySelector('button.copy').addEventListener('click', () => copyRecipe(r));
  resultCard.querySelector('button.share').addEventListener('click', () => shareRecipe(r));

  // smooth scroll into view
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showError(msg){
  const e = document.createElement('div');
  e.className = 'err';
  e.textContent = '⚠ ' + msg;
  resultCard.classList.add('show');
  resultCard.prepend(e);
  setTimeout(() => e.remove(), 6000);
}

function copyRecipe(r){
  const text = [
    r.name,
    r.tagline ? '"' + r.tagline + '"' : '',
    '',
    'Pan: ' + (r.pan || 'one pan'),
    'Prep ' + r.prep_min + 'm · Cook ' + r.cook_min + 'm · Serves ' + r.servings,
    'Macros (per recipe): P ' + r.protein_g + 'g · C ' + r.carbs_g + 'g · F ' + r.fat_g + 'g · ' + r.calories + ' kcal',
    '',
    'INGREDIENTS',
    ...r.ingredients.map(i => '  • ' + i),
    '',
    'STEPS',
    ...r.steps.map((s, i) => '  ' + (i + 1) + '. ' + s),
    '',
    '— made on GigglePan',
  ].filter(Boolean).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const b = resultCard.querySelector('button.copy');
    const old = b.textContent;
    b.textContent = '✓ COPIED';
    setTimeout(() => { b.textContent = old; }, 1400);
  }).catch(() => {});
}
function shareRecipe(r){
  if (navigator.share){
    navigator.share({
      title: r.name,
      text: (r.tagline || '') + ' — recipe by GigglePan',
      url: location.href,
    }).catch(() => {});
  } else {
    copyRecipe(r);
  }
}

// ── SAVED RECIPES (localStorage) ───────────────────────────────────────
let saved = [];
const SAVE_KEY = 'gigglepan-saved-v1';
try { saved = JSON.parse(localStorage.getItem(SAVE_KEY) || '[]'); } catch(e){ saved = []; }
renderSaved();

function saveRecipe(r, btn){
  if (saved.some(s => s.name === r.name)){
    // unsave
    saved = saved.filter(s => s.name !== r.name);
    if (btn){ btn.classList.remove('saved'); btn.textContent = '⭐ SAVE'; }
  } else {
    saved.unshift({ ...r, _ts: Date.now() });
    if (saved.length > 50) saved = saved.slice(0, 50);
    if (btn){ btn.classList.add('saved'); btn.textContent = '✓ SAVED'; }
  }
  localStorage.setItem(SAVE_KEY, JSON.stringify(saved));
  renderSaved();
}

function renderSaved(){
  const grid = $('savedGrid');
  $('savedCount').textContent = saved.length + ' saved';
  if (!saved.length){
    grid.innerHTML = '<div class="empty">no saved recipes yet — hit GENERATE then SAVE the keepers</div>';
    return;
  }
  grid.innerHTML = '';
  for (const r of saved){
    const card = document.createElement('div');
    card.className = 'saved-card';
    card.innerHTML = `
      <div class="name">${esc(r.name)}</div>
      <div class="when">${relTime(r._ts)} · P ${r.protein_g}g</div>
      <span class="x" title="remove">✕</span>
    `;
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('x')){
        saved = saved.filter(s => s.name !== r.name);
        localStorage.setItem(SAVE_KEY, JSON.stringify(saved));
        renderSaved();
        return;
      }
      currentRecipe = r;
      renderRecipe(r);
    });
    grid.appendChild(card);
  }
}

function relTime(ts){
  if (!ts) return 'saved';
  const s = (Date.now() - ts) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

// ── UTILS ──────────────────────────────────────────────────────────────
function esc(s){ const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
function cap(s){ return s ? s[0].toUpperCase() + s.slice(1) : ''; }
</script>
</body>
</html>
