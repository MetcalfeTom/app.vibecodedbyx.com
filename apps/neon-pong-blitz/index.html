<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>neon pong blitz</title>
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9A%A1" />
<meta name="description" content="High-speed neon pong with glowing comet trails and particle explosions on every hit." />
<meta property="og:title" content="neon pong blitz" />
<meta property="og:description" content="High-speed neon pong with glowing comet trails and particle explosions on every hit." />
<meta property="og:url" content="https://sloppy.live/neon-pong-blitz/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20pong%20arcade%20glowing%20comet%20trail%20particle%20explosion%20cyan%20pink%20synthwave%2C%201200x630?width=1200&height=630&nofeed=true&format=png" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bungee&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
<style>
:root{
  --pink:#ff37c8;
  --cyan:#3affff;
  --violet:#a455ff;
  --amber:#ffce4a;
  --green:#7dff8a;
  --hot:#ff5070;
  --bone:#f0e6d6;
  --bg:#04020c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;background:var(--bg);color:var(--bone);font-family:'VT323', monospace;overflow:hidden;touch-action:none}
body{
  background:
    radial-gradient(ellipse at 50% 0%, rgba(58,255,255,0.10), transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(255,55,200,0.10), transparent 55%),
    var(--bg);
  display:flex;flex-direction:column;align-items:center;
  padding:6px;
}

.head{
  width:100%;max-width:1080px;
  display:flex;justify-content:space-between;align-items:baseline;
  padding:6px 8px 8px;
}
.brand{
  font-family:'Bungee', sans-serif;font-size:24px;letter-spacing:0.10em;
  color:#fff;
  text-shadow:0 0 10px var(--cyan), 0 0 20px var(--pink), 2px 2px 0 #000;
}
.brand .left{color:var(--cyan)}
.brand .right{color:var(--pink)}
.brand small{
  display:block;font-family:'VT323', monospace;font-size:13px;letter-spacing:0.20em;
  color:rgba(240,230,214,0.45);margin-top:1px;font-weight:400;text-shadow:none;
}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn{
  background:rgba(58,255,255,0.06);border:1px solid rgba(58,255,255,0.30);
  color:rgba(240,230,214,0.80);
  font-family:'Audiowide', sans-serif;font-size:10px;letter-spacing:0.18em;
  padding:7px 11px;border-radius:2px;cursor:pointer;text-transform:uppercase;
  transition:all 0.15s;
}
.btn:hover{color:#fff;border-color:var(--cyan);box-shadow:0 0 12px rgba(58,255,255,0.40)}
.btn.on{
  color:#fff;border-color:var(--pink);
  background:rgba(255,55,200,0.20);
  box-shadow:0 0 14px rgba(255,55,200,0.50);
}

.stage-wrap{
  position:relative;width:100%;max-width:1080px;flex:1;
  border:2px solid rgba(58,255,255,0.25);border-radius:6px;
  background:#02030a;
  box-shadow:0 0 32px rgba(58,255,255,0.10), inset 0 0 32px rgba(255,55,200,0.04);
  overflow:hidden;
  aspect-ratio:16/10;
  max-height:calc(100vh - 130px);
}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

.score-overlay{
  position:absolute;top:14px;left:0;right:0;z-index:5;
  display:flex;justify-content:space-between;padding:0 6%;
  pointer-events:none;
  font-family:'Press Start 2P', monospace;font-size:48px;letter-spacing:0.04em;
}
.score-overlay .left {color:var(--cyan);text-shadow:0 0 16px var(--cyan), 0 0 32px var(--cyan)}
.score-overlay .right{color:var(--pink);text-shadow:0 0 16px var(--pink), 0 0 32px var(--pink)}

.tip{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  z-index:10;text-align:center;pointer-events:none;
  font-family:'Press Start 2P', monospace;font-size:13px;letter-spacing:0.08em;
  color:rgba(240,230,214,0.85);line-height:2.2;width:80%;
  text-shadow:0 0 10px var(--cyan), 0 0 18px var(--cyan);
}
.tip .big{
  font-family:'Bungee', sans-serif;font-size:32px;letter-spacing:0.08em;
  color:#fff;text-shadow:0 0 14px var(--pink), 0 0 28px var(--pink);
  display:block;margin-bottom:8px;
}
.tip kbd{
  background:rgba(58,255,255,0.10);border:1px solid var(--cyan);
  padding:2px 8px;border-radius:3px;color:var(--cyan);font-family:inherit;font-size:11px;
}
.tip.gone{display:none}
.tip .winner{
  font-family:'Bungee', sans-serif;font-size:42px;letter-spacing:0.06em;
  color:var(--amber);text-shadow:0 0 18px var(--amber);display:block;margin-bottom:6px;
}

.foot{
  font-family:'VT323', monospace;font-size:14px;letter-spacing:0.20em;
  color:rgba(240,230,214,0.45);padding:6px 0;
}
.foot kbd{
  background:rgba(58,255,255,0.10);border:1px solid rgba(58,255,255,0.40);border-radius:2px;
  padding:1px 6px;color:var(--cyan);font-family:inherit;
}

@media (max-width:560px){
  .brand{font-size:18px}
  .brand small{font-size:10px;letter-spacing:0.16em}
  .score-overlay{font-size:32px}
  .tip .big{font-size:22px}
  .tip{font-size:11px}
  .foot{font-size:11px}
}
</style>
</head>
<body>

<div class="head">
  <div class="brand"><span class="left">NEON</span> <span class="right">PONG</span> BLITZ<small>volley · break · explode</small></div>
  <div class="toolbar">
    <button class="btn on" id="btnMode" data-mode="ai">vs AI</button>
    <button class="btn" id="btn2P" data-mode="2p">2 PLAYER</button>
    <button class="btn" id="btnReset">RESET</button>
    <button class="btn" id="btnAudio">♪ ON</button>
  </div>
</div>

<div class="stage-wrap">
  <canvas id="stage"></canvas>
  <div class="score-overlay">
    <span class="left" id="scL">0</span>
    <span class="right" id="scR">0</span>
  </div>
  <div class="tip" id="tip">
    <span class="big">NEON PONG BLITZ</span>
    first to <span style="color:var(--amber);text-shadow:0 0 10px var(--amber)">11</span><br>
    <kbd>W</kbd> / <kbd>S</kbd> · left paddle &nbsp; <kbd>↑</kbd> / <kbd>↓</kbd> · right paddle<br>
    <kbd>SPACE</kbd> serve · <kbd>P</kbd> pause<br>
    <span style="color:var(--amber);text-shadow:0 0 10px var(--amber)">press SPACE to begin</span>
  </div>
</div>

<div class="foot">
  <kbd>W</kbd>/<kbd>S</kbd> &middot; <kbd>↑</kbd>/<kbd>↓</kbd> &middot; <kbd>SPACE</kbd> serve &middot; <kbd>P</kbd> pause &middot; <kbd>R</kbd> reset
</div>

<script>
(() => {
  // ===== CANVAS =====
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = 1;
  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    dpr = Math.min(2, window.devicePixelRatio || 1);
    W = rect.width;  H = rect.height;
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ===== STATE =====
  const STATE = { TITLE: 0, PLAYING: 1, PAUSED: 2, OVER: 3 };
  const TARGET = 11;
  const state = {
    phase: STATE.TITLE,
    mode: 'ai',          // 'ai' or '2p'
    audio: true,
    shake: 0,
    flash: 0,
    flashHue: 0,
    serveTo: 1,          // 1 = right serves toward left, -1 = left serves toward right
  };
  const PADDLE_W = 14, PADDLE_H = 96;
  const left  = { x: 0, y: 0, vy: 0, score: 0, color: '#3affff' };
  const right = { x: 0, y: 0, vy: 0, score: 0, color: '#ff37c8' };
  const ball = { x: 0, y: 0, vx: 0, vy: 0, r: 8, stuck: true, age: 0 };
  let particles = [];
  let trail = [];      // [{x,y,age,life,hue}]
  let keys = {};

  function reset(softServe = false) {
    left.x = 28; left.y = H / 2; left.vy = 0;
    right.x = W - 28; right.y = H / 2; right.vy = 0;
    ball.x = W / 2; ball.y = H / 2; ball.vx = 0; ball.vy = 0;
    ball.stuck = true; ball.age = 0;
    trail = []; particles = [];
    if (!softServe) { left.score = 0; right.score = 0; }
    updateScore();
  }
  function fullReset() {
    left.score = 0; right.score = 0;
    state.phase = STATE.TITLE;
    state.serveTo = Math.random() < 0.5 ? 1 : -1;
    reset();
    document.getElementById('tip').classList.remove('gone');
    showTitleTip();
  }
  function showTitleTip() {
    document.getElementById('tip').innerHTML = `
      <span class="big">NEON PONG BLITZ</span>
      first to <span style="color:var(--amber);text-shadow:0 0 10px var(--amber)">${TARGET}</span><br>
      <kbd>W</kbd> / <kbd>S</kbd> · left paddle &nbsp; <kbd>↑</kbd> / <kbd>↓</kbd> · right paddle<br>
      mode: <strong>${state.mode === 'ai' ? 'vs AI' : '2 player'}</strong> &middot;
      <kbd>SPACE</kbd> serve &middot; <kbd>P</kbd> pause<br>
      <span style="color:var(--amber);text-shadow:0 0 10px var(--amber)">press SPACE to begin</span>`;
  }

  function serve() {
    const dir = state.serveTo;
    const sp = baseSpeed();
    const ang = (Math.random() * 0.6 - 0.3);
    ball.vx = dir * Math.cos(ang) * sp;
    ball.vy = Math.sin(ang) * sp;
    ball.stuck = false; ball.age = 0;
  }
  function baseSpeed() {
    return Math.min(1100, 480 + (left.score + right.score) * 22);
  }

  function updateScore() {
    document.getElementById('scL').textContent = left.score;
    document.getElementById('scR').textContent = right.score;
  }

  // ===== AUDIO =====
  let actx;
  function audio() { if (!actx && state.audio) try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} return actx; }
  function tone(f, dur, type='triangle', g=0.10) {
    if (!state.audio) return;
    const ac = audio(); if (!ac) return;
    const o = ac.createOscillator(), gain = ac.createGain();
    o.type = type; o.frequency.value = f;
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.linearRampToValueAtTime(g, ac.currentTime + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(gain); gain.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur + 0.05);
  }
  const sfx = {
    paddle: (side) => tone(side === 'L' ? 720 : 980, 0.06, 'square', 0.08),
    wall:   () => tone(220, 0.08, 'triangle', 0.10),
    score:  (side) => { [side === 'L' ? 660 : 360, side === 'L' ? 880 : 240, side === 'L' ? 1100 : 180].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'triangle', 0.10), i * 70)); },
    win:    () => { [523, 659, 784, 1047, 1318].forEach((f, i) => setTimeout(() => tone(f, 0.22, 'triangle', 0.12), i * 90)); },
  };
  document.getElementById('btnAudio').addEventListener('click', () => {
    state.audio = !state.audio;
    document.getElementById('btnAudio').textContent = state.audio ? '♪ ON' : '♪ OFF';
    document.getElementById('btnAudio').style.opacity = state.audio ? 1 : 0.4;
    if (state.audio) sfx.paddle('L');
  });

  // ===== PARTICLES =====
  function burst(x, y, hue, count = 28, opts = {}) {
    for (let i = 0; i < count; i++) {
      const ang = (opts.cone != null) ? opts.cone + (Math.random() - 0.5) * (opts.spread || 1.0) : Math.random() * Math.PI * 2;
      const sp = (60 + Math.random() * 360) * (opts.power || 1);
      particles.push({
        x, y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp,
        age: 0,
        life: 0.45 + Math.random() * 0.85,
        hue: hue + (Math.random() - 0.5) * 30,
        r: 2 + Math.random() * 3,
      });
    }
  }

  // ===== INPUT =====
  document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === ' ') {
      e.preventDefault();
      if (state.phase === STATE.TITLE || state.phase === STATE.OVER) {
        state.phase = STATE.PLAYING;
        document.getElementById('tip').classList.add('gone');
        if (state.phase === STATE.PLAYING && left.score === 0 && right.score === 0) reset();
        if (ball.stuck) serve();
      } else if (state.phase === STATE.PLAYING && ball.stuck) {
        serve();
      }
    }
    if (e.key.toLowerCase() === 'p') {
      if (state.phase === STATE.PLAYING) state.phase = STATE.PAUSED;
      else if (state.phase === STATE.PAUSED) state.phase = STATE.PLAYING;
    }
    if (e.key.toLowerCase() === 'r') fullReset();
  });
  document.addEventListener('keyup', (e) => { keys[e.key] = false; });

  // pointer for left paddle (touch / mouse)
  function pointerY(ev) {
    const rect = canvas.getBoundingClientRect();
    const y = (ev.touches ? ev.touches[0].clientY : ev.clientY) - rect.top;
    return y;
  }
  let pointerSide = null;   // tracking pointer to which side based on x
  canvas.addEventListener('pointermove', (ev) => {
    const rect = canvas.getBoundingClientRect();
    const x = (ev.touches ? ev.touches[0].clientX : ev.clientX) - rect.left;
    const y = pointerY(ev);
    if (x < W / 2) left.y = clamp(y, PADDLE_H/2, H - PADDLE_H/2);
    else if (state.mode === '2p') right.y = clamp(y, PADDLE_H/2, H - PADDLE_H/2);
    if (state.mode === 'ai' && x < W / 2 && pointerSide !== 'left') { pointerSide = 'left'; }
  });
  canvas.addEventListener('pointerdown', () => {
    if (state.phase === STATE.TITLE || state.phase === STATE.OVER) {
      state.phase = STATE.PLAYING; document.getElementById('tip').classList.add('gone');
      if (left.score === 0 && right.score === 0) reset();
      if (ball.stuck) serve();
    } else if (ball.stuck) serve();
  });
  canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });

  // ===== MODE TOGGLE =====
  document.getElementById('btnMode').addEventListener('click', () => {
    state.mode = 'ai';
    document.getElementById('btnMode').classList.add('on');
    document.getElementById('btn2P').classList.remove('on');
    fullReset();
  });
  document.getElementById('btn2P').addEventListener('click', () => {
    state.mode = '2p';
    document.getElementById('btn2P').classList.add('on');
    document.getElementById('btnMode').classList.remove('on');
    fullReset();
  });
  document.getElementById('btnReset').addEventListener('click', fullReset);

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // ===== UPDATE =====
  function update(dt) {
    if (state.phase !== STATE.PLAYING) return;
    // paddle input
    const speed = 720;
    if (keys['w'] || keys['W']) left.y -= speed * dt;
    if (keys['s'] || keys['S']) left.y += speed * dt;
    if (state.mode === '2p') {
      if (keys['ArrowUp'])   right.y -= speed * dt;
      if (keys['ArrowDown']) right.y += speed * dt;
    } else {
      // AI: track ball with reaction lag + small error
      if (!ball.stuck && ball.vx > 0) {
        const target = ball.y + (Math.sin(ball.age * 4) * 14);   // small wobble
        const dy = target - right.y;
        const aiSpeed = 480 + (left.score + right.score) * 16;
        right.y += clamp(dy, -aiSpeed * dt, aiSpeed * dt);
      } else {
        // drift toward center when ball moving away
        right.y += clamp(H/2 - right.y, -180 * dt, 180 * dt);
      }
    }
    left.y  = clamp(left.y,  PADDLE_H/2, H - PADDLE_H/2);
    right.y = clamp(right.y, PADDLE_H/2, H - PADDLE_H/2);

    if (ball.stuck) {
      // park at the SERVER's paddle (opposite side from where ball will fly).
      // serveTo === 1 → ball flies right → server is left paddle.
      if (state.serveTo === 1) { ball.x = left.x  + 22; ball.y = left.y;  }
      else                     { ball.x = right.x - 22; ball.y = right.y; }
      return;
    }

    // ball step (sub-step for high speed accuracy)
    const steps = Math.max(1, Math.ceil(Math.hypot(ball.vx, ball.vy) * dt / 8));
    const sdt = dt / steps;
    for (let i = 0; i < steps; i++) {
      ball.x += ball.vx * sdt;
      ball.y += ball.vy * sdt;
      // wall bounces
      if (ball.y < ball.r) {
        ball.y = ball.r; ball.vy = -ball.vy;
        burst(ball.x, ball.y, 60, 14, { cone: Math.PI/2, spread: 1.4, power: 0.7 });
        sfx.wall();
      }
      if (ball.y > H - ball.r) {
        ball.y = H - ball.r; ball.vy = -ball.vy;
        burst(ball.x, ball.y, 60, 14, { cone: -Math.PI/2, spread: 1.4, power: 0.7 });
        sfx.wall();
      }
      // paddle hit checks
      // left paddle (x = 28)
      if (ball.vx < 0 && ball.x - ball.r <= left.x + PADDLE_W/2 && ball.x + ball.r >= left.x - PADDLE_W/2) {
        if (ball.y >= left.y - PADDLE_H/2 - ball.r && ball.y <= left.y + PADDLE_H/2 + ball.r) {
          ball.x = left.x + PADDLE_W/2 + ball.r + 0.5;
          const offset = (ball.y - left.y) / (PADDLE_H/2);
          const sp = Math.hypot(ball.vx, ball.vy) * 1.06;
          const ang = offset * 0.8;
          ball.vx =  Math.cos(ang) * sp;
          ball.vy =  Math.sin(ang) * sp;
          burst(ball.x, ball.y, 180, 30, { cone: 0, spread: 1.4 });
          flash(180);
          sfx.paddle('L');
        }
      }
      // right paddle
      if (ball.vx > 0 && ball.x + ball.r >= right.x - PADDLE_W/2 && ball.x - ball.r <= right.x + PADDLE_W/2) {
        if (ball.y >= right.y - PADDLE_H/2 - ball.r && ball.y <= right.y + PADDLE_H/2 + ball.r) {
          ball.x = right.x - PADDLE_W/2 - ball.r - 0.5;
          const offset = (ball.y - right.y) / (PADDLE_H/2);
          const sp = Math.hypot(ball.vx, ball.vy) * 1.06;
          const ang = Math.PI - offset * 0.8;
          ball.vx =  Math.cos(ang) * sp;
          ball.vy = -Math.sin(ang) * sp;
          burst(ball.x, ball.y, 320, 30, { cone: Math.PI, spread: 1.4 });
          flash(320);
          sfx.paddle('R');
        }
      }
      // score
      if (ball.x < -ball.r) {
        right.score++;
        burst(ball.x, ball.y, 320, 60, { power: 1.6 });
        flash(320, 1.0);
        state.shake = 14;
        sfx.score('R');
        afterPoint(-1);
        return;
      }
      if (ball.x > W + ball.r) {
        left.score++;
        burst(ball.x, ball.y, 180, 60, { power: 1.6 });
        flash(180, 1.0);
        state.shake = 14;
        sfx.score('L');
        afterPoint(1);
        return;
      }
    }
    // age + trail
    ball.age += dt;
    trail.push({ x: ball.x, y: ball.y, age: 0, life: 0.45, hue: 280 + Math.sin(ball.age * 4) * 60 });
    if (trail.length > 40) trail.shift();

    // particles
    for (const p of particles) {
      p.age += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.97; p.vy *= 0.97;
    }
    particles = particles.filter(p => p.age < p.life);

    for (const t of trail) t.age += dt;
    trail = trail.filter(t => t.age < t.life);

    state.shake *= 0.85;
    state.flash *= 0.88;
  }
  function flash(hue, level = 0.5) {
    state.flash = Math.max(state.flash, level);
    state.flashHue = hue;
  }
  function afterPoint(loserSign) {
    updateScore();
    state.serveTo = loserSign;     // loser serves next
    ball.stuck = true;
    if (left.score >= TARGET || right.score >= TARGET) {
      state.phase = STATE.OVER;
      sfx.win();
      const winner = left.score > right.score ? 'LEFT' : 'RIGHT';
      const color = left.score > right.score ? 'var(--cyan)' : 'var(--pink)';
      document.getElementById('tip').classList.remove('gone');
      document.getElementById('tip').innerHTML = `
        <span class="winner" style="color:${color};text-shadow:0 0 18px ${color}">${winner} WINS</span>
        ${left.score} – ${right.score}<br><br>
        <kbd>SPACE</kbd> · play again &nbsp; <kbd>R</kbd> · reset`;
    }
  }

  // ===== RENDER =====
  function render() {
    // motion-trail wash for glow persistence
    ctx.fillStyle = 'rgba(2,3,10,0.30)';
    ctx.fillRect(0, 0, W, H);

    // shake
    const sx = state.shake ? (Math.random() - 0.5) * state.shake : 0;
    const sy = state.shake ? (Math.random() - 0.5) * state.shake : 0;
    ctx.save();
    ctx.translate(sx, sy);

    // center dashed line (rainbow chase)
    const dashLen = 14;
    for (let y = 0; y < H; y += dashLen * 2) {
      const t = (y / H + performance.now() * 0.0005) % 1;
      const hue = 200 + Math.sin(t * Math.PI * 2) * 80;
      ctx.fillStyle = `hsla(${hue}, 100%, 75%, 0.45)`;
      ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
      ctx.shadowBlur = 8;
      ctx.fillRect(W/2 - 1.5, y, 3, dashLen);
    }
    ctx.shadowBlur = 0;

    // trail (additive)
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const a = 1 - (t.age / t.life);
      ctx.fillStyle = `hsla(${t.hue}, 100%, 70%, ${a * 0.35})`;
      ctx.beginPath(); ctx.arc(t.x, t.y, ball.r * (0.5 + a * 1.2), 0, Math.PI * 2); ctx.fill();
    }
    // particles
    for (const p of particles) {
      const a = 1 - (p.age / p.life);
      ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${a * 0.85})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';

    // paddles
    drawPaddle(left,  '#3affff');
    drawPaddle(right, '#ff37c8');

    // ball
    const grad = ctx.createRadialGradient(ball.x, ball.y, 1, ball.x, ball.y, ball.r * 4);
    grad.addColorStop(0,    'rgba(255,255,255,1)');
    grad.addColorStop(0.4,  'rgba(255,255,255,0.6)');
    grad.addColorStop(1,    'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r * 4, 0, Math.PI * 2); ctx.fill();
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // flash overlay
    if (state.flash > 0.01) {
      ctx.fillStyle = `hsla(${state.flashHue}, 100%, 65%, ${state.flash * 0.18})`;
      ctx.fillRect(0, 0, W, H);
    }

    // pause overlay
    if (state.phase === STATE.PAUSED) {
      ctx.fillStyle = 'rgba(2,3,10,0.65)';
      ctx.fillRect(0, 0, W, H);
      ctx.font = 'bold 24px Bungee, sans-serif';
      ctx.fillStyle = '#3affff';
      ctx.shadowColor = '#3affff'; ctx.shadowBlur = 14;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('PAUSED', W/2, H/2);
      ctx.shadowBlur = 0;
      ctx.font = 'bold 12px Press Start 2P, monospace';
      ctx.fillStyle = '#f0e6d6';
      ctx.fillText('press P to resume', W/2, H/2 + 36);
    }
    ctx.restore();
  }
  function drawPaddle(p, color) {
    ctx.shadowColor = color; ctx.shadowBlur = 22;
    const grad = ctx.createLinearGradient(p.x - PADDLE_W/2, 0, p.x + PADDLE_W/2, 0);
    grad.addColorStop(0,   color);
    grad.addColorStop(0.5, '#ffffff');
    grad.addColorStop(1,   color);
    ctx.fillStyle = grad;
    ctx.fillRect(p.x - PADDLE_W/2, p.y - PADDLE_H/2, PADDLE_W, PADDLE_H);
    ctx.shadowBlur = 0;
    // bright edge
    ctx.fillStyle = `rgba(255,255,255,0.85)`;
    ctx.fillRect(p.x - PADDLE_W/2, p.y - PADDLE_H/2, PADDLE_W, 2);
    ctx.fillRect(p.x - PADDLE_W/2, p.y + PADDLE_H/2 - 2, PADDLE_W, 2);
  }

  // ===== LOOP =====
  let lastT = 0;
  function loop(now) {
    requestAnimationFrame(loop);
    const dt = Math.min(0.05, (now - (lastT || now)) / 1000);
    lastT = now;
    update(dt);
    render();
  }
  requestAnimationFrame(loop);

  // ===== INIT =====
  reset();
})();
</script>
</body>
</html>
