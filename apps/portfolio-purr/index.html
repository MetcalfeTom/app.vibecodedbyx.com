<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Portfolio-Purr · a financial pet</title>
<meta name="description" content="Your portfolio is a small orange cat. It purrs on gains, hides during dips, eats snacks when you win, and occasionally falls asleep.">
<meta property="og:title" content="Portfolio-Purr">
<meta property="og:description" content="A pixel-art cat reacts in real time to your crypto holdings. Snacks drop on gains, ears flatten on dips. It naps when nothing changes.">
<meta property="og:url" content="https://sloppy.live/portfolio-purr">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cute%20pixel%20art%20orange%20cat%20sitting%20on%20a%20desk%20surrounded%20by%20floating%20stock%20chart%20candlesticks%20and%20fish%20snacks%2C%20cozy%20pastel%20aesthetic%2C%20isometric?width=1200&height=630&model=flux&nologo=true&seed=2424">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/🐱">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Silkscreen&family=IBM+Plex+Mono:wght@400;500;700&family=Fraunces:ital,wght@1,500;0,700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:     #f3eee0;
    --bg-2:     #e8ddc4;
    --bg-3:     #dbcfb0;
    --paper:    #fdf7e8;
    --wood-1:   #b88848;
    --wood-2:   #8a6038;
    --wood-3:   #5a3e20;
    --cat-1:    #f5a854;
    --cat-2:    #d68030;
    --cat-3:    #9a5a18;
    --cat-belly:#fde8c8;
    --plant:    #6cb35e;
    --plant-2:  #4a8c3e;
    --pink:     #f4a8b8;
    --pink-2:   #d87090;
    --good:     #3cab6d;
    --good-2:   #2a8a55;
    --bad:      #d85a48;
    --bad-2:    #b03828;
    --warn:     #d8a428;
    --ink:      #2a1810;
    --ink-2:    #5a3e20;
    --mute:     #8a7458;
    --link:     #d68030;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{
    min-height: 100vh; height: 100vh; overflow: hidden;
    background: var(--bg-1);
    color: var(--ink);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body{
    font-family: 'Fredoka', system-ui, sans-serif;
    display: flex; flex-direction: column;
    background:
      radial-gradient(ellipse at 80% 0%, rgba(255,210,160,0.45), transparent 60%),
      radial-gradient(ellipse at 0% 100%, rgba(180,140,200,0.18), transparent 60%),
      var(--bg-1);
  }
  .top{
    background: linear-gradient(180deg, var(--paper) 0%, #f6ecd2 100%);
    border-bottom: 3px solid var(--wood-2);
    padding: 10px 18px;
    display: flex; align-items: center; gap: 14px;
    flex-wrap: wrap;
    box-shadow: 0 2px 0 var(--wood-3), 0 4px 12px rgba(58,40,16,0.12);
    z-index: 6;
  }
  .top h1{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 700;
    font-size: clamp(22px, 3vw, 28px);
    color: var(--ink);
    line-height: 1;
    display: flex; align-items: center; gap: 6px;
  }
  .top h1 em{
    color: var(--cat-2);
    font-style: italic;
    font-weight: 700;
  }
  .top h1 .pawglyph{
    background: var(--cat-1);
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 2px 0 var(--cat-3), 0 0 0 1px var(--cat-3);
  }
  .top .sub{
    font: italic 13px 'Fraunces', serif;
    color: var(--ink-2);
  }
  .grow{ flex: 1; }
  .portfolio{
    display: flex; align-items: baseline; gap: 12px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink);
  }
  .portfolio .v{
    font: 700 22px 'IBM Plex Mono', monospace;
    letter-spacing: -0.02em;
  }
  .portfolio .pct{
    font: 700 13px 'IBM Plex Mono', monospace;
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: 0.04em;
  }
  .portfolio .pct.up{ background: rgba(60,171,109,0.16); color: var(--good-2); }
  .portfolio .pct.down{ background: rgba(216,90,72,0.16); color: var(--bad-2); }
  .portfolio .pct.flat{ background: rgba(138,116,88,0.16); color: var(--ink-2); }
  .live{
    font: 600 10px 'IBM Plex Mono', monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mute);
    display: flex; align-items: center; gap: 6px;
  }
  .live .dot{
    width: 7px; height: 7px;
    background: var(--good);
    border-radius: 50%;
    animation: livePulse 1.4s ease-in-out infinite;
  }
  .live.stale .dot{ background: var(--warn); animation-duration: 2.6s; }
  .live.off .dot{ background: var(--mute); animation: none; }
  @keyframes livePulse{ 0%,100%{ opacity: 1; } 50%{ opacity: 0.35; } }

  .main{
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 12px;
    padding: 12px;
    min-height: 0;
  }
  @media (max-width: 900px){
    .main{ grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
  }
  .pane{
    background: var(--paper);
    border: 2px solid var(--wood-2);
    border-radius: 14px;
    padding: 14px;
    box-shadow: 4px 4px 0 var(--wood-3);
    display: flex; flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .pane h3{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 17px;
    color: var(--ink);
    margin-bottom: 4px;
    display: flex; align-items: baseline; gap: 8px;
    line-height: 1;
  }
  .pane h3 .small{ font: 600 10px 'IBM Plex Mono', monospace; color: var(--mute); letter-spacing: 0.14em; text-transform: uppercase; }

  /* ── Cat stage ──────────────────────────────── */
  .cat-stage{
    flex: 1;
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    background:
      radial-gradient(ellipse at 70% 25%, rgba(255,230,180,0.5), transparent 60%),
      linear-gradient(180deg, #fdf7e4 0%, #ecdcbc 70%, #d4b88a 100%);
    margin-top: 8px;
    border: 1px solid rgba(138,96,56,0.18);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #cat{
    width: 100%; height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .cat-status-bar{
    margin-top: 8px;
    background: rgba(255,255,255,0.5);
    border: 1px dashed rgba(138,96,56,0.32);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
  }
  .cat-status-bar .mood{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 16px;
    color: var(--cat-3);
  }
  .cat-status-bar .talk{
    flex: 1;
    font: italic 14px 'Fraunces', serif;
    color: var(--ink-2);
    min-width: 0;
  }
  .cat-status-bar .feed{
    background: linear-gradient(180deg, var(--cat-1), var(--cat-2));
    border: 2px solid var(--cat-3);
    color: var(--paper);
    padding: 6px 14px;
    font: 700 12px 'Fredoka', sans-serif;
    cursor: pointer;
    border-radius: 999px;
    box-shadow: 0 3px 0 var(--cat-3);
    transition: transform 0.06s, box-shadow 0.06s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .cat-status-bar .feed:hover{ filter: brightness(1.08); }
  .cat-status-bar .feed:active{ transform: translateY(2px); box-shadow: 0 1px 0 var(--cat-3); }

  .reactions{
    margin-top: 8px;
    flex: 1;
    overflow-y: auto;
    background: rgba(255,255,255,0.4);
    border: 1px dashed rgba(138,96,56,0.32);
    border-radius: 8px;
    padding: 6px 12px;
    font: 13px 'Fredoka', sans-serif;
    color: var(--ink-2);
    min-height: 80px;
    max-height: 140px;
  }
  .reactions .row{
    display: flex; gap: 8px;
    padding: 2px 0;
    line-height: 1.4;
    border-bottom: 1px dotted rgba(138,96,56,0.16);
  }
  .reactions .row:last-child{ border-bottom: 0; }
  .reactions .row .t{
    font: 500 11px 'IBM Plex Mono', monospace;
    color: var(--mute);
    flex-shrink: 0;
    width: 48px;
  }
  .reactions .row .msg{ flex: 1; }
  .reactions .row.up .msg b{ color: var(--good-2); }
  .reactions .row.down .msg b{ color: var(--bad-2); }
  .reactions .row .em{ flex-shrink: 0; }

  /* ── Holdings panel ─────────────────────────── */
  .holdings{
    flex: 1;
    overflow-y: auto;
    margin-top: 8px;
    padding-right: 2px;
  }
  .holdings::-webkit-scrollbar{ width: 6px; }
  .holdings::-webkit-scrollbar-thumb{ background: rgba(138,96,56,0.32); border-radius: 3px; }
  .holding{
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(138,96,56,0.18);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px 10px;
    align-items: center;
  }
  .holding .ico{
    width: 32px; height: 32px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font: 700 14px 'IBM Plex Mono', monospace;
    color: #fff;
    flex-shrink: 0;
  }
  .holding .ico.btc{ background: #f7931a; }
  .holding .ico.eth{ background: #627eea; }
  .holding .ico.doge{ background: #c2a633; }
  .holding .ico.sol{ background: #9945ff; }
  .holding .nm{
    display: flex; flex-direction: column;
    line-height: 1.1;
    min-width: 0;
  }
  .holding .nm .sym{
    font: 700 14px 'IBM Plex Mono', monospace;
    color: var(--ink);
  }
  .holding .nm .full{
    font: 11px 'Fredoka', sans-serif;
    color: var(--mute);
  }
  .holding .price{
    text-align: right;
    line-height: 1.1;
  }
  .holding .price .now{
    font: 700 13px 'IBM Plex Mono', monospace;
    color: var(--ink);
  }
  .holding .price .pct{
    font: 600 10px 'IBM Plex Mono', monospace;
    letter-spacing: 0.04em;
  }
  .holding .pct.up{ color: var(--good-2); }
  .holding .pct.down{ color: var(--bad-2); }
  .holding .pct.flat{ color: var(--mute); }
  .holding .qty{
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 6px;
    font: 11px 'IBM Plex Mono', monospace;
    color: var(--mute);
    border-top: 1px dotted rgba(138,96,56,0.18);
    padding-top: 6px;
  }
  .holding .qty input{
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(138,96,56,0.32);
    color: var(--ink);
    padding: 2px 6px;
    border-radius: 3px;
    font: inherit;
    width: 80px;
    outline: none;
  }
  .holding .qty input:focus{ border-color: var(--cat-2); }
  .holding .qty .val{
    margin-left: auto;
    font-weight: 700;
    color: var(--ink);
  }
  .holding .spark{
    grid-column: 1 / -1;
    height: 28px;
    width: 100%;
  }
  .holdings-foot{
    margin-top: 4px;
    padding-top: 8px;
    border-top: 1px dashed rgba(138,96,56,0.32);
    display: flex; gap: 6px; align-items: center;
    flex-wrap: wrap;
  }
  .holdings-foot .add{
    background: transparent;
    border: 1px dashed var(--wood-2);
    color: var(--wood-2);
    padding: 6px 12px;
    font: 600 11px 'Fredoka', sans-serif;
    cursor: pointer;
    border-radius: 999px;
    letter-spacing: 0.04em;
  }
  .holdings-foot .add:hover{ background: rgba(184,136,72,0.12); border-style: solid; color: var(--ink); }
  .holdings-foot .reset{
    background: transparent;
    border: 1px dashed var(--mute);
    color: var(--mute);
    padding: 6px 10px;
    font: 600 10px 'Fredoka', sans-serif;
    cursor: pointer;
    border-radius: 999px;
  }

  /* Floating snack/heart particles overlay (uses DOM for emoji+animation) */
  .fx{
    position: absolute;
    pointer-events: none;
    z-index: 4;
    font-size: 20px;
    opacity: 0;
  }
  .fx.snack{ animation: snackFall 2.6s ease-in forwards; }
  @keyframes snackFall{
    0%   { opacity: 0; transform: translate(0, -40px) rotate(-12deg); }
    10%  { opacity: 1; }
    100% { opacity: 0; transform: translate(0, 240px) rotate(180deg); }
  }
  .fx.heart{ animation: heartUp 1.6s ease-out forwards; font-size: 18px; }
  @keyframes heartUp{
    0%   { opacity: 0; transform: translate(0, 0) scale(0.5); }
    20%  { opacity: 1; transform: translate(0, -10px) scale(1.1); }
    100% { opacity: 0; transform: translate(0, -80px) scale(1); }
  }
  .fx.tear{ animation: tearDrop 1.2s ease-in forwards; font-size: 16px; }
  @keyframes tearDrop{
    0%   { opacity: 0; transform: translate(0, 0); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translate(0, 70px); }
  }
  .fx.spark{ animation: sparkPop 1.0s ease-out forwards; font-size: 14px; }
  @keyframes sparkPop{
    0%   { opacity: 0; transform: scale(0.4); }
    30%  { opacity: 1; transform: scale(1.2) rotate(40deg); }
    100% { opacity: 0; transform: scale(0.8) rotate(0); }
  }

  @media (prefers-reduced-motion: reduce){
    .live .dot{ animation: none; }
    .fx.snack, .fx.heart, .fx.tear, .fx.spark{ animation-duration: 0.001ms; opacity: 0; }
  }

  @media (max-width: 540px){
    .top h1{ font-size: 18px; }
    .top .sub{ display: none; }
    .portfolio .v{ font-size: 18px; }
  }
</style>
</head>
<body>
<header class="top">
  <h1><span class="pawglyph">🐾</span> Portfolio<em>·Purr</em></h1>
  <span class="sub">— your portfolio is a small orange cat.</span>
  <span class="grow"></span>
  <div class="portfolio">
    <span class="v" id="pf-value">$0.00</span>
    <span class="pct flat" id="pf-pct">+0.00%</span>
  </div>
  <span class="live" id="live-pill"><span class="dot"></span><span id="live-text">connecting…</span></span>
</header>

<main class="main">
  <section class="pane">
    <h3>The Cat <span class="small" id="cat-state">— content</span></h3>
    <div class="cat-stage" id="cat-stage">
      <canvas id="cat"></canvas>
    </div>
    <div class="cat-status-bar">
      <span class="mood" id="cat-mood">content.</span>
      <span class="talk" id="cat-talk">she watches the chart. she is patient.</span>
      <button class="feed" id="feed" type="button">🐟 feed snack</button>
    </div>
    <div class="reactions" id="reactions"></div>
  </section>

  <section class="pane">
    <h3>Holdings <span class="small" id="hold-count">— 4 assets</span></h3>
    <div class="holdings" id="holdings"></div>
    <div class="holdings-foot">
      <button class="add" id="add-hold" type="button">＋ add holding</button>
      <button class="reset" id="reset-hold" type="button">↺ reset</button>
    </div>
  </section>
</main>

<script>
'use strict';

/* ── Assets we track (CoinGecko ids) ────────────── */
const ASSETS = {
  BTC:  { id:'bitcoin',  name:'Bitcoin',   color:'#f7931a', glyph:'₿' },
  ETH:  { id:'ethereum', name:'Ethereum',  color:'#627eea', glyph:'Ξ' },
  DOGE: { id:'dogecoin', name:'Dogecoin',  color:'#c2a633', glyph:'Ð' },
  SOL:  { id:'solana',   name:'Solana',    color:'#9945ff', glyph:'◎' },
};
const DEFAULT_HOLDINGS = [
  { sym:'BTC',  qty: 0.08 },
  { sym:'ETH',  qty: 1.4 },
  { sym:'DOGE', qty: 1200 },
  { sym:'SOL',  qty: 6 },
];
const STORAGE_KEY = 'portfolio-purr-v1';

/* ── State ──────────────────────────────────────── */
const state = {
  holdings: [],        // [{ sym, qty }]
  prices: {},          // sym → { usd, chg24h, history: [{t, v}], lastUpdate }
  prevTotal: 0,
  total: 0,
  totalChg: 0,
  catMood: 'content',
  lastMoodAt: 0,
  bigEventAt: 0,
  reactions: [],
  apiAlive: false,
  lastSuccess: 0,
  simStartedAt: 0,
};

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw){
      const o = JSON.parse(raw);
      if (Array.isArray(o.holdings) && o.holdings.length){
        state.holdings = o.holdings.filter(h => ASSETS[h.sym] && h.qty >= 0);
      }
    }
  } catch(_){}
  if (!state.holdings.length){
    state.holdings = DEFAULT_HOLDINGS.map(h => Object.assign({}, h));
  }
}
function saveState(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ holdings: state.holdings }));
  } catch(_){}
}

/* ── Reactions log ──────────────────────────────── */
function logReaction(msg, kind, em){
  state.reactions.unshift({ at: Date.now(), msg, kind, em });
  if (state.reactions.length > 50) state.reactions.pop();
  renderReactions();
}
function renderReactions(){
  const el = document.getElementById('reactions');
  if (state.reactions.length === 0){
    el.innerHTML = '<div style="color: var(--mute); font-style: italic; padding: 4px 0;">no movements yet. the cat is observing.</div>';
    return;
  }
  el.innerHTML = state.reactions.slice(0, 20).map(r => {
    const d = new Date(r.at);
    const ts = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
    return '<div class="row ' + (r.kind || '') + '">'
      + '<span class="t">' + ts + '</span>'
      + '<span class="em">' + (r.em || '·') + '</span>'
      + '<span class="msg">' + r.msg + '</span>'
      + '</div>';
  }).join('');
}

/* ── Price fetching ─────────────────────────────── */
async function fetchPrices(){
  const ids = Object.values(ASSETS).map(a => a.id).join(',');
  const url = 'https://api.coingecko.com/api/v3/simple/price?ids=' + ids + '&vs_currencies=usd&include_24hr_change=true';
  try {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 8000);
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(to);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    // map back to sym
    let got = 0;
    for (const sym of Object.keys(ASSETS)){
      const id = ASSETS[sym].id;
      const row = json[id];
      if (row && typeof row.usd === 'number'){
        const prev = state.prices[sym] && state.prices[sym].usd;
        state.prices[sym] = state.prices[sym] || { history: [] };
        state.prices[sym].usd = row.usd;
        state.prices[sym].chg24h = row.usd_24h_change || 0;
        state.prices[sym].lastUpdate = Date.now();
        if (prev !== undefined && prev !== row.usd){
          // record a tick for the sparkline
          pushHistory(sym, row.usd);
        } else if (state.prices[sym].history.length === 0){
          pushHistory(sym, row.usd);
        }
        got++;
      }
    }
    if (got > 0){
      state.apiAlive = true;
      state.lastSuccess = Date.now();
      setLive('on');
    }
  } catch(err){
    // fall through — we'll use simulated drift
    state.apiAlive = false;
    setLive(state.lastSuccess ? 'stale' : 'off');
  }
}
function pushHistory(sym, v){
  state.prices[sym].history.push({ t: Date.now(), v });
  if (state.prices[sym].history.length > 60) state.prices[sym].history.shift();
}
function setLive(mode){
  const pill = document.getElementById('live-pill');
  const txt = document.getElementById('live-text');
  pill.classList.remove('on','stale','off');
  pill.classList.add(mode);
  txt.textContent = mode === 'on' ? 'live · coingecko' : mode === 'stale' ? 'stale · using last' : 'simulating';
}

/* ── Simulated micro-drift between polls + fallback ─ */
function tickSim(){
  // walk every price slightly so the cat feels alive between 30s polls
  // if no real price exists yet, seed defaults
  const seeds = { BTC: 67200, ETH: 3450, DOGE: 0.16, SOL: 162 };
  for (const sym of Object.keys(ASSETS)){
    if (!state.prices[sym]){
      state.prices[sym] = { usd: seeds[sym] || 1, chg24h: (Math.random() - 0.5) * 4, history: [] };
      pushHistory(sym, state.prices[sym].usd);
    }
    if (!state.apiAlive){
      // bigger walk when fully simulating
      const drift = (Math.random() - 0.5) * 0.008;  // ±0.4%
      state.prices[sym].usd *= 1 + drift;
      state.prices[sym].chg24h += drift * 100 * 0.05; // drift the 24h pct slightly
      state.prices[sym].chg24h = Math.max(-12, Math.min(12, state.prices[sym].chg24h));
      pushHistory(sym, state.prices[sym].usd);
    } else {
      // tiny shimmer so sparklines aren't flat between API hits
      const shimmer = (Math.random() - 0.5) * 0.0012;
      const v = state.prices[sym].usd * (1 + shimmer);
      pushHistory(sym, v);
    }
  }
}

/* ── Portfolio calc + cat mood logic ─────────────── */
function recomputeTotals(){
  let total = 0;
  for (const h of state.holdings){
    const p = state.prices[h.sym]; if (!p) continue;
    total += p.usd * h.qty;
  }
  // weighted 24h % change
  let wPct = 0;
  let denom = 0;
  for (const h of state.holdings){
    const p = state.prices[h.sym]; if (!p) continue;
    const w = p.usd * h.qty;
    if (w <= 0) continue;
    wPct += (p.chg24h || 0) * w;
    denom += w;
  }
  state.total = total;
  state.totalChg = denom > 0 ? wPct / denom : 0;
  // update mood from %change
  updateCatMood(state.totalChg);
}
function updateCatMood(pct){
  // hysteresis-light: only change mood if pct is past a threshold AND mood differs
  const now = Date.now() / 1000;
  let next;
  if (pct >= 5)        next = 'hyper';
  else if (pct >= 1.5) next = 'happy';
  else if (pct > -1.5) next = 'content';
  else if (pct > -5)   next = 'worried';
  else                 next = 'distressed';

  // sleep override: no significant change OR mood unchanged for 60s
  if (state.catMood !== 'eating'){
    if (Math.abs(pct) < 0.3 && (now - state.lastMoodAt) > 60){
      next = 'sleeping';
    }
  }

  if (next !== state.catMood){
    const prev = state.catMood;
    state.catMood = next;
    state.lastMoodAt = now;
    onMoodChange(prev, next, pct);
  }
}
const MOOD_BLURBS = {
  hyper:      ['ZOOMIES.', 'someone bought the dip.', 'cat is in orbit.', 'unlimited credit.'],
  happy:      ['purring.', 'tail swishes.', 'a good day.', 'kneading the desk.'],
  content:    ['watching the chart.', 'she is patient.', 'a slow blink.', 'tail wraps around paws.'],
  worried:    ['ears flatten.', 'tail twitch.', 'she does not like this.', 'one whisker droops.'],
  distressed: ['hiding behind the keyboard.', 'tail tucked.', 'she will not look at the screen.', 'tiny cat tears.'],
  sleeping:   ['curled up. zzz.', 'dreaming of fish.', 'do not wake.', 'soft snore.'],
  eating:     ['nom nom.', 'crunch.', 'she found the treat.', 'flick of the whiskers.'],
};
const MOOD_LABELS = {
  hyper:'hyper!', happy:'happy', content:'content',
  worried:'worried', distressed:'distressed', sleeping:'asleep', eating:'eating',
};
function onMoodChange(prev, next, pct){
  document.getElementById('cat-state').textContent = '— ' + MOOD_LABELS[next];
  document.getElementById('cat-mood').textContent = MOOD_LABELS[next] + '.';
  const blurbs = MOOD_BLURBS[next];
  document.getElementById('cat-talk').textContent = blurbs[Math.floor(Math.random() * blurbs.length)];
  // particle effects + log
  if (next === 'hyper'){
    burstSparks(8);
    rainSnacks(4);
    logReaction('zoomies! portfolio up <b>' + pct.toFixed(2) + '%</b>', 'up', '🎉');
  } else if (next === 'happy'){
    burstHearts(3);
    logReaction('purring · <b>+' + pct.toFixed(2) + '%</b> on the day', 'up', '💛');
  } else if (next === 'worried'){
    logReaction('ears down · <b>' + pct.toFixed(2) + '%</b>', 'down', '😟');
  } else if (next === 'distressed'){
    rainTears(3);
    logReaction('hiding · <b>' + pct.toFixed(2) + '%</b> — she will recover', 'down', '😿');
  } else if (next === 'sleeping'){
    logReaction('asleep · nothing\'s moving', '', '😴');
  } else if (next === 'content'){
    if (prev === 'worried' || prev === 'distressed'){
      logReaction('relaxed back into a loaf', 'up', '😌');
    }
  }
}

        + '<span style="margin-left:auto;">value</span>'

      + '</div>'
      + '</div>';
  }).join('');
  // wire qty inputs
  host.querySelectorAll('input[data-idx]').forEach(el => {
    el.addEventListener('change', () => {
      const idx = parseInt(el.dataset.idx);
      const v = parseFloat(el.value);
      if (!isNaN(v) && v >= 0){ state.holdings[idx].qty = v; saveState(); recomputeTotals(); renderHoldings(); refreshTop(); }
    });
    // prevent text-select on input drag
    el.addEventListener('focus', () => el.select());
  });
  host.querySelectorAll('[data-rm]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.rm);
      if (state.holdings.length <= 1){ return; }

  // draw sparklines
  host.querySelectorAll('canvas.spark').forEach(cv => {
    const idx = parseInt(cv.dataset.idx);
    const h = state.holdings[idx]; if (!h) return;
    const p = state.prices[h.sym]; if (!p) return;
    drawSparkline(cv, p.history, p.chg24h >= 0 ? '#3cab6d' : '#d85a48');
  });
}
function drawSparkline(canvas, history, color){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = Math.floor(w * dpr); canvas.height = Math.floor(h * dpr);
  const c = canvas.getContext('2d');
  c.setTransform(dpr, 0, 0, dpr, 0, 0);
  c.clearRect(0, 0, w, h);
  if (!history || history.length < 2) return;
  const vals = history.map(p => p.v);
  const min = Math.min.apply(null, vals);
  const max = Math.max.apply(null, vals);
  const range = (max - min) || 1;
  c.strokeStyle = color;
  c.lineWidth = 1.5;
  c.beginPath();
  for (let i = 0; i < vals.length; i++){
    const x = (i / (vals.length - 1)) * w;
    const y = h - ((vals[i] - min) / range) * (h - 4) - 2;
    if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
  }
  c.stroke();
  // soft fill below
  const grd = c.createLinearGradient(0, 0, 0, h);
  grd.addColorStop(0, color + '40');
  grd.addColorStop(1, color + '00');
  c.fillStyle = grd;
  c.lineTo(w, h); c.lineTo(0, h); c.closePath();
  c.fill();
}
function fmtUsd(n, dp){
  dp = dp == null ? 2 : dp;
  if (n == null || isNaN(n)) return '$—';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + n.toLocaleString(undefined, { maximumFractionDigits: 2 });
  if (n >= 0.01) return '$' + n.toFixed(dp);
  return '$' + n.toFixed(6);
}
function refreshTop(){
  document.getElementById('pf-value').textContent = fmtUsd(state.total, 2);
  const sign = state.totalChg >= 0 ? '+' : '';
  const pctEl = document.getElementById('pf-pct');

  pctEl.className = 'pct ' + (state.totalChg > 0.2 ? 'up' : state.totalChg < -0.2 ? 'down' : 'flat');
}

/* ── Cat canvas (pixel-art procedural) ──────────── */
const catCv = document.getElementById('cat');
const catCtx = catCv.getContext('2d');
let CW = 0, CH = 0, DPR = 1;
function fitCat(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const r = catCv.getBoundingClientRect();
  CW = Math.floor(r.width); CH = Math.floor(r.height);
  catCv.width = Math.floor(CW * DPR); catCv.height = Math.floor(CH * DPR);
  catCv.style.width = CW + 'px'; catCv.style.height = CH + 'px';
  catCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  catCtx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', () => { fitCat(); });

/* Pixel-art cat — drawn as a grid of squares at integer coords.
   We scale the grid so the cat fills the stage nicely. */
const CAT_PALETTE = {
  '.':null,      // transparent
  k:'#2a1810',   // outline
  K:'#3a2010',   // dark outline
  o:'#9a5a18',   // dark fur
  O:'#d68030',   // mid fur
  L:'#f5a854',   // light fur
  H:'#fde8c8',   // belly / muzzle (highlight)
  W:'#ffffff',   // sclera / nose highlight
  p:'#f4a8b8',   // pink (inner ear, nose, tongue)
  P:'#d87090',   // dark pink
  g:'#3a6b3a',   // eye green
  G:'#5fa05a',   // eye green light
  e:'#1a0a08',   // eye dark
  z:'#5a3e20',   // tail tip
};
function drawPixelGrid(grid, cellSize, ox, oy, palette){
  palette = palette || CAT_PALETTE;
  for (let y = 0; y < grid.length; y++){
    const row = grid[y];
    for (let x = 0; x < row.length; x++){
      const ch = row[x];
      const col = palette[ch];
      if (!col) continue;
      catCtx.fillStyle = col;
      catCtx.fillRect(ox + x * cellSize, oy + y * cellSize, cellSize, cellSize);
    }
  }
}

/* Cat body sprite — 22 wide x 22 tall — sitting cat with body
   that I overlay mood-specific eyes and accessories on top of. */
const CAT_BASE = [
  '......................',
  '......kkk......kkk....',
  '.....kOOOk....kOOOk...',
  '....kOpOOk..kOOpOk....',
  '....kOpOOkkkOOpOk.....',
  '.....kOOOOOOOOOOk.....',
  '....kOOOOOOOOOOOOk....',
  '...kOOOOOOOOOOOOOOk...',
  '...kOHHHHHHHHHHHHOk...',
  '...kOH..........HOk...',
  '...kOH..........HOk...',
  '...kOHHHHHHHHHHHHOk...',
  '...kOOOOOOOOOOOOOOk...',
  '...kOOOOOOOOOOOOOOk...',
  '...kOOOHHHHHHHHHOOk...',
  '..kOOOHHHHHHHHHHHOOk..',
  '..kOOHHHHHHHHHHHHHOOk.',
  '..kOOHHHHHHHHHHHHHOOk.',
  '..kOOOHHHHHHHHHHHOOOk.',
  '..kOOkkOOOOOOOOkkOOOk.',
  '..kOOkOOkOOOOkOOkOOOk.',
  '...kkk.kkkkkkkk.kkkk..',
];
/* Tail base — drawn separately so it can curl/wag */
const CAT_TAIL_LEFT = [
  '....................',
  '...........kkkz.....',
  '..........kOOOz.....',
  '.........kOOOzk.....',
  '........kOOOzz......',
  '.......kOOzz........',
  '......kOOzk.........',
  '......kOzk..........',
  '......kOzk..........',
  '......kOzkk.........',
];

function drawCat(t){
  // pick cell size so cat fits — base sprite is 22×22, leave room for accessories
  // we want body width = ~38% of stage width
  const targetW = Math.max(120, Math.min(220, CW * 0.45));
  const cell = Math.max(3, Math.floor(targetW / 22));
  const bodyW = cell * 22;
  const bodyH = cell * 22;
  const ox = Math.floor(CW / 2 - bodyW / 2);
  const oy = Math.floor(CH * 0.62 - bodyH / 2);
  // breathing / mood-specific body bounce
  let bounce = Math.round(Math.sin(t * 1.5) * cell * 0.18);
  let scaleY = 1;
  let shake = 0;
  const m = state.catMood;
  if (m === 'sleeping'){ bounce = Math.round(Math.sin(t * 1.0) * cell * 0.32); }
  if (m === 'happy'){ bounce = Math.round(Math.sin(t * 2.2) * cell * 0.28); }
  if (m === 'worried'){ bounce = Math.round(Math.sin(t * 1.0) * cell * 0.10); }
  if (m === 'distressed'){
    bounce = Math.round(cell * 0.5); // hunched
    shake = Math.round((Math.random() - 0.5) * cell * 0.18);
  }
  if (m === 'hyper'){
    // zoomies — bigger horizontal sway + occasional jump
    shake = Math.round(Math.sin(t * 18) * cell * 0.4);
    bounce = Math.round(Math.sin(t * 8) * cell * 0.6);
  }
  if (m === 'eating'){ bounce = Math.round(Math.sin(t * 8) * cell * 0.18); }
  // soft floor shadow
  catCtx.fillStyle = 'rgba(0,0,0,0.16)';
  catCtx.beginPath();
  catCtx.ellipse(ox + bodyW / 2, oy + bodyH + cell * 0.6, bodyW * 0.42, cell * 0.9, 0, 0, Math.PI * 2);
  catCtx.fill();
  // tail behind the body (left side)
  if (m !== 'distressed'){
    // tail wag offset varies by mood
    const wagAmp = m === 'hyper' ? 4 : m === 'happy' ? 3 : m === 'sleeping' ? 0 : 1.4;
    const wagOff = Math.round(Math.sin(t * (m === 'hyper' ? 8 : 3)) * cell * wagAmp * 0.3);
    drawPixelGrid(CAT_TAIL_LEFT, cell, ox - cell * 6, oy + cell * 8 + wagOff, CAT_PALETTE);
  }
  // body
  drawPixelGrid(CAT_BASE, cell, ox + shake, oy + bounce, CAT_PALETTE);
  // mood-specific overlay: eyes/mouth/accessories drawn at correct cell offsets
  drawCatFace(ox + shake, oy + bounce, cell, t);
  // status particles
  drawMoodParticles(ox + shake + bodyW / 2, oy + bounce + bodyH / 2, cell, t);
  // hyper motion lines
  if (m === 'hyper'){
    catCtx.strokeStyle = 'rgba(216,128,48,0.55)';
    catCtx.lineWidth = Math.max(1, cell * 0.3);
    for (let i = 0; i < 4; i++){
      const yy = oy + bounce + bodyH * (0.3 + i * 0.15);
      const xa = ox + shake + (i % 2 === 0 ? -cell * 6 : -cell * 3);
      catCtx.beginPath();
      catCtx.moveTo(xa, yy);
      catCtx.lineTo(xa + cell * 4, yy);
      catCtx.stroke();
    }
  }
}
function drawCatFace(ox, oy, cell, t){
  // eye coordinates (relative grid cells in CAT_BASE):
  // eyes at row 9-10, cols 7-9 (left), 12-14 (right)
  const lex = ox + 8 * cell, ley = oy + 9 * cell;
  const rex = ox + 13 * cell, rey = oy + 9 * cell;
  const m = state.catMood;
  // blink timer for content state
  const blink = m === 'content' ? (Math.sin(t * 0.7) > 0.94 ? 0.1 : 1) : 1;
  const drawEye = (cx, cy, kind) => {
    if (kind === 'closed' || (kind === 'normal' && blink < 0.5)){
      // closed/blink: horizontal line
      catCtx.fillStyle = '#2a1810';
      catCtx.fillRect(cx, cy + cell * 0.7, cell * 2.5, cell * 0.5);
      return;
    }
    if (kind === 'happy'){
      // upward curve (^ ^)
      catCtx.strokeStyle = '#2a1810';
      catCtx.lineWidth = Math.max(1, cell * 0.4);
      catCtx.lineCap = 'round';
      catCtx.beginPath();
      catCtx.moveTo(cx, cy + cell * 0.9);
      catCtx.lineTo(cx + cell * 1.3, cy + cell * 0.3);
      catCtx.lineTo(cx + cell * 2.6, cy + cell * 0.9);
      catCtx.stroke();
      return;
    }
    if (kind === 'tear'){
      // sad teardrop X
      catCtx.fillStyle = '#2a1810';
      catCtx.fillRect(cx, cy, cell * 2.4, cell * 0.5);
      catCtx.fillStyle = '#88b8e8';
      catCtx.beginPath();
      catCtx.arc(cx + cell * 1.2, cy + cell * 1.7, cell * 0.5, 0, Math.PI * 2);
      catCtx.fill();
      return;
    }
    if (kind === 'wide'){
      // big round eyes (HYPER / worried look)
      catCtx.fillStyle = '#fff';
      catCtx.beginPath();
      catCtx.arc(cx + cell * 1.2, cy + cell * 0.8, cell * 1.0, 0, Math.PI * 2);
      catCtx.fill();
      catCtx.fillStyle = '#1a0a08';
      catCtx.beginPath();
      catCtx.arc(cx + cell * 1.2, cy + cell * 0.9, cell * 0.55, 0, Math.PI * 2);
      catCtx.fill();
      // sparkle
      catCtx.fillStyle = '#fff';
      catCtx.fillRect(cx + cell * 1.4, cy + cell * 0.7, cell * 0.4, cell * 0.4);
      return;
    }
    // normal — green almond eye with slit pupil
    catCtx.fillStyle = '#3a6b3a';
    catCtx.beginPath();
    catCtx.ellipse(cx + cell * 1.2, cy + cell * 0.9, cell * 1.0, cell * 0.8, 0, 0, Math.PI * 2);
    catCtx.fill();
    catCtx.fillStyle = '#5fa05a';
    catCtx.beginPath();
    catCtx.ellipse(cx + cell * 1.0, cy + cell * 0.7, cell * 0.4, cell * 0.3, 0, 0, Math.PI * 2);
    catCtx.fill();
    catCtx.fillStyle = '#1a0a08';
    catCtx.fillRect(cx + cell * 1.05, cy + cell * 0.4, cell * 0.3, cell * 1.1);
  };
  const eyeKind = m === 'happy' || m === 'sleeping' || m === 'eating' ? 'happy'
                : m === 'distressed' ? 'tear'
                : m === 'hyper' || m === 'worried' ? 'wide'
                : 'normal';
  drawEye(lex, ley, eyeKind);
  drawEye(rex, rey, eyeKind);
  // nose (small pink triangle) — row 12 col 10-11
  catCtx.fillStyle = '#f4a8b8';
  const nx = ox + 10 * cell, ny = oy + 12 * cell;
  catCtx.beginPath();
  catCtx.moveTo(nx, ny);
  catCtx.lineTo(nx + cell * 2.4, ny);
  catCtx.lineTo(nx + cell * 1.2, ny + cell * 1);
  catCtx.closePath();
  catCtx.fill();
  // mouth
  const mx = ox + 11 * cell, my = ny + cell * 1.2;
  catCtx.strokeStyle = '#2a1810';
  catCtx.lineWidth = Math.max(1, cell * 0.35);
  catCtx.lineCap = 'round';
  if (m === 'happy' || m === 'hyper' || m === 'eating'){
    // big smile
    catCtx.beginPath();
    catCtx.arc(mx, my, cell * 1.4, 0.1, Math.PI - 0.1);
    catCtx.stroke();
  } else if (m === 'sleeping'){
    // tiny u
    catCtx.beginPath();
    catCtx.arc(mx, my + cell * 0.3, cell * 0.5, 0.1, Math.PI - 0.1);
    catCtx.stroke();
  } else if (m === 'distressed' || m === 'worried'){
    // frown
    catCtx.beginPath();
    catCtx.arc(mx, my + cell * 1.5, cell * 0.8, Math.PI + 0.1, Math.PI * 2 - 0.1);
    catCtx.stroke();
  } else {
    // tiny normal — two short lines like '⌣'
    catCtx.beginPath();
    catCtx.moveTo(mx - cell * 0.8, my);
    catCtx.quadraticCurveTo(mx - cell * 0.4, my + cell * 0.5, mx, my + cell * 0.2);
    catCtx.quadraticCurveTo(mx + cell * 0.4, my + cell * 0.5, mx + cell * 0.8, my);
    catCtx.stroke();
  }
  // whiskers
  catCtx.strokeStyle = 'rgba(255,255,255,0.85)';
  catCtx.lineWidth = Math.max(1, cell * 0.18);
  const wy = ny + cell * 0.6;
  catCtx.beginPath();
  catCtx.moveTo(nx - cell * 0.5, wy);          catCtx.lineTo(nx - cell * 3, wy - cell * 0.4);
  catCtx.moveTo(nx - cell * 0.5, wy + cell * 0.5); catCtx.lineTo(nx - cell * 3, wy + cell * 0.6);
  catCtx.moveTo(nx + cell * 2.9, wy);          catCtx.lineTo(nx + cell * 5.4, wy - cell * 0.4);
  catCtx.moveTo(nx + cell * 2.9, wy + cell * 0.5); catCtx.lineTo(nx + cell * 5.4, wy + cell * 0.6);
  catCtx.stroke();
  // ear inner pink: 3-4 cells
  catCtx.fillStyle = '#f4a8b8';
  catCtx.fillRect(ox + 6 * cell, oy + 3 * cell, cell * 2, cell * 2);
  catCtx.fillRect(ox + 14 * cell, oy + 3 * cell, cell * 2, cell * 2);
  // when eating, show a tiny fish hovering near mouth
  if (m === 'eating'){
    catCtx.font = (cell * 4) + 'px serif';
    catCtx.textAlign = 'left';
    catCtx.textBaseline = 'middle';
    catCtx.fillText('🐟', ox + 18 * cell, my + Math.sin(t * 14) * 2);
  }
}
function drawMoodParticles(cx, cy, cell, t){
  const m = state.catMood;
  if (m === 'sleeping'){
    // Z's floating up
    catCtx.font = (cell * 3.5) + 'px "Fredoka", sans-serif';
    catCtx.fillStyle = 'rgba(90,62,32,0.65)';
    catCtx.textAlign = 'center';
    for (let i = 0; i < 3; i++){
      const ph = (t * 0.5 + i * 0.7) % 1;
      const x = cx + cell * 6 + Math.sin(ph * Math.PI * 2 + i) * cell * 0.8;
      const y = cy - cell * 4 - ph * cell * 8;
      catCtx.globalAlpha = 1 - ph;
      catCtx.fillText(['z','z','Z'][i], x, y);
    }
    catCtx.globalAlpha = 1;
  } else if (m === 'happy'){
    // hearts pulsing nearby
    if (Math.sin(t * 3) > 0.6){
      catCtx.font = (cell * 3) + 'px serif';
      catCtx.fillText('💛', cx - cell * 9, cy - cell * 3);
    }
  } else if (m === 'hyper'){
    // tiny stars
    catCtx.font = (cell * 2.4) + 'px serif';
    catCtx.fillText('✨', cx + cell * 6 + Math.sin(t * 8) * 4, cy - cell * 6);
    catCtx.fillText('⭐', cx - cell * 9, cy - cell * 5 + Math.cos(t * 9) * 3);
  } else if (m === 'distressed'){
    // little rain cloud over head
    catCtx.fillStyle = 'rgba(90,90,110,0.55)';
    catCtx.beginPath();
    catCtx.ellipse(cx, cy - cell * 11, cell * 4.5, cell * 1.6, 0, 0, Math.PI * 2);
    catCtx.fill();
    catCtx.fillStyle = '#88b8e8';
    for (let i = 0; i < 3; i++){
      const dx = (i - 1) * cell * 1.8 + Math.sin(t * 4 + i) * 1;
      const dy = (t * 24 + i * 30) % (cell * 5);
      catCtx.fillRect(cx + dx, cy - cell * 8 + dy, cell * 0.4, cell * 1.2);
    }
  } else if (m === 'eating'){
    // chomp marks
    if ((Math.floor(t * 4) % 2) === 0){
      catCtx.fillStyle = 'rgba(216,128,48,0.55)';
      catCtx.font = (cell * 2) + 'px "Fredoka", sans-serif';
      catCtx.fillText('chomp!', cx + cell * 7, cy + cell * 3);
    }
  }
}

/* ── Main render loop ──────────────────────────── */
let lastFrame = performance.now();
function tickRender(now){
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  catCtx.clearRect(0, 0, CW, CH);
  drawCatBackground(now * 0.001);
  drawCat(now * 0.001);
  requestAnimationFrame(tickRender);
}
function drawCatBackground(t){
  // a small windowsill / desk scene behind the cat
  // sunlight band sweeps slightly
  const grd = catCtx.createLinearGradient(0, 0, 0, CH);
  grd.addColorStop(0, 'rgba(255,230,180,0.0)');
  grd.addColorStop(0.4, 'rgba(255,210,140,0.32)');
  grd.addColorStop(1, 'rgba(220,160,90,0.0)');
  catCtx.fillStyle = grd;
  catCtx.fillRect(CW * 0.55 + Math.sin(t * 0.15) * 10, 0, CW * 0.35, CH);
  // distant houseplant on the left
  const px = 28, py = CH * 0.72;
  // pot
  catCtx.fillStyle = '#9a6038';
  catCtx.fillRect(px, py, 40, 24);
  catCtx.fillStyle = '#7a4a28';
  catCtx.fillRect(px, py, 40, 4);
  catCtx.fillStyle = '#6a3818';
  catCtx.fillRect(px + 36, py, 4, 24);
  // leaves
  catCtx.fillStyle = '#4a8c3e';
  for (let i = 0; i < 6; i++){
    const ang = -Math.PI / 2 + (i - 2.5) * 0.32 + Math.sin(t * 0.7 + i) * 0.06;
    const r = 22 + i * 2;
    const lx = px + 20 + Math.cos(ang) * r;
    const ly = py + Math.sin(ang) * r;
    catCtx.beginPath();
    catCtx.ellipse(lx, ly, 8, 18, ang + Math.PI/2, 0, Math.PI * 2);
    catCtx.fill();
  }
  catCtx.fillStyle = '#6cb35e';
  for (let i = 0; i < 4; i++){
    const ang = -Math.PI / 2 + (i - 1.5) * 0.4 + Math.sin(t * 0.5 + i) * 0.06;
    const r = 16;
    const lx = px + 20 + Math.cos(ang) * r;
    const ly = py - 4 + Math.sin(ang) * r;
    catCtx.beginPath();
    catCtx.ellipse(lx, ly, 5, 12, ang + Math.PI/2, 0, Math.PI * 2);
    catCtx.fill();
  }
  // ground line
  catCtx.fillStyle = 'rgba(138,96,56,0.32)';
  catCtx.fillRect(0, CH * 0.84, CW, 2);
  // floating chart candlesticks behind the cat (depending on mood color)
  const goodTint = state.totalChg > 0.2;
  const badTint  = state.totalChg < -0.2;
  catCtx.globalAlpha = 0.32;
  for (let i = 0; i < 5; i++){
    const x = CW * 0.62 + i * 22;
    const phase = (t * 0.4 + i * 0.6) % (Math.PI * 2);
    const h = 18 + Math.sin(phase) * 14;
    const y = CH * 0.32 + Math.sin(phase + 1) * 6;
    catCtx.fillStyle = goodTint ? '#3cab6d' : badTint ? '#d85a48' : '#8a7458';
    catCtx.fillRect(x, y, 4, h);
    catCtx.fillRect(x - 4, y + h * 0.3, 12, 4);
  }
  catCtx.globalAlpha = 1;
}

/* ── Clock-ish tick that drives everything ────── */
async function pollLoop(){
  await fetchPrices();
  recomputeTotals();
  renderHoldings();
  refreshTop();
}
function microTick(){
  tickSim();
  recomputeTotals();
  refreshTop();
  // only re-render the right pane every few ticks for perf
  if ((microTick._n = (microTick._n || 0) + 1) % 6 === 0){
    renderHoldings();
  }
}

/* ── Boot ──────────────────────────────────────── */
loadState();
renderHoldings();
renderReactions();
refreshTop();
fitCat();
setLive('off');
requestAnimationFrame(tickRender);
// initial fetch + recurring polls
pollLoop();
setInterval(pollLoop, 32000);       // every 32s — well under CoinGecko's gentle rate-limit
setInterval(microTick, 1100);       // gentle shimmer between polls so the cat feels alive
// occasional event-driven moments — every ~40s, if portfolio moved in last minute, post a flavor reaction
setInterval(() => {
  if (Math.abs(state.totalChg) > 0.3 && Math.random() < 0.4){
    const up = state.totalChg > 0;
    const msgs = up
      ? ['a tiny click of the claws.', 'tail flicks confidently.', 'a satisfied chirp.']
      : ['ears swivel.', 'pupils dilate.', 'she pretends not to look.'];
    logReaction(msgs[Math.floor(Math.random() * msgs.length)], up ? 'up' : 'down', up ? '🐾' : '·');
  }
}, 45000);
</script>
