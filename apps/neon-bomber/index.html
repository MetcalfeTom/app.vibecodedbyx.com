<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Bomber</title>
<link rel="icon" href="https://emojicdn.elk.sh/💣">
<meta property="og:title" content="Neon Bomber">
<meta property="og:description" content="Local 2-player Bomberman. Plant bombs, dodge blasts, collect power-ups.">
<meta property="og:url" content="https://sloppy.live/neon-bomber">
<meta property="og:image" content="https://emojicdn.elk.sh/💣?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100dvh;overflow:hidden;background:#05060f;font-family:'Share Tech Mono',monospace;color:#e0e0e0}
#wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:8px}
canvas{display:block;image-rendering:pixelated;border:2px solid #1a1a3a;border-radius:4px}
#hud{display:flex;gap:24px;font-size:13px;opacity:0.85}
.p1c{color:#00ffff}.p2c{color:#ff44cc}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,6,15,0.92);z-index:10;gap:16px}
#overlay h1{font-family:'Orbitron',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:900;background:linear-gradient(90deg,#00ffff,#ff44cc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#overlay p{max-width:420px;text-align:center;line-height:1.6;font-size:14px;opacity:0.8}
#overlay .controls{display:flex;gap:32px;font-size:13px;text-align:left}
.btn{font-family:'Orbitron',sans-serif;padding:12px 28px;background:transparent;border:2px solid #00ffff;color:#00ffff;font-size:16px;cursor:pointer;border-radius:4px;transition:all 0.2s}
.btn:hover{background:#00ffff22}
.hidden{display:none!important}
/* touch d-pads */
.dpad{display:none;position:fixed;bottom:16px;z-index:20;width:140px;height:140px}
.dpad.left{left:12px}.dpad.right{right:12px}
.dpad .d{position:absolute;width:44px;height:44px;border-radius:10px;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:18px;user-select:none;-webkit-user-select:none;touch-action:none;opacity:0.7;transition:opacity 0.1s}
.dpad .d:active,.dpad .d.pressed{opacity:1;filter:brightness(1.4)}
.dpad .d-u{top:0;left:48px}.dpad .d-d{bottom:0;left:48px}
.dpad .d-l{top:48px;left:0}.dpad .d-r{top:48px;right:0}
.dpad .d-bomb{top:48px;left:48px;border-radius:50%;font-size:14px;font-weight:700}
.dpad.left .d{border-color:#00ffff66;color:#00ffff;background:#00ffff11}
.dpad.right .d{border-color:#ff44cc66;color:#ff44cc;background:#ff44cc11}
@media(pointer:coarse){.dpad{display:block}}
/* leaderboard */
#lb{position:fixed;top:12px;right:12px;z-index:18;width:190px;background:rgba(5,6,15,0.95);border:1px solid #1a1c2a;border-radius:10px;padding:10px 12px;display:none;overflow-y:auto;max-height:300px}
#lb h3{font-family:'Orbitron',sans-serif;font-size:10px;color:#00ffff;letter-spacing:2px;margin-bottom:6px;text-align:center}
#lb table{width:100%;border-collapse:collapse;font-family:'Share Tech Mono',monospace;font-size:11px}
#lb td{padding:2px 3px;color:#aaa}
#lb td:first-child{color:#555;width:20px}
#lb td:nth-child(2){color:#d0d0d8}
#lb td:last-child{text-align:right;color:#00ffff}
#lb tr.me td{color:#ffaa00}
#name-input{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;background:rgba(5,6,15,0.97);border:1px solid #1a1c2a;border-radius:12px;padding:20px;display:none;text-align:center}
#name-input input{background:#0e1018;border:1px solid #1a1c2a;border-radius:6px;color:#d0d0d8;font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 12px;width:180px;text-align:center;outline:none;margin:8px 0}
#name-input input:focus{border-color:#00ffff}
#name-input button{font-family:'Orbitron',sans-serif;font-size:12px;padding:8px 18px;background:rgba(0,255,255,0.08);border:1px solid #00ffff;color:#00ffff;border-radius:6px;cursor:pointer}
#name-input label{font-family:'Share Tech Mono',monospace;font-size:12px;color:#888;display:block}
@media(max-width:600px){#lb{top:auto;right:auto;bottom:0;left:50%;transform:translateX(-50%);width:240px;border-radius:10px 10px 0 0}}
</style>
</head>
<body>
<div id="lb"><h3>TOP BOMBERS</h3><table id="lb-body"></table></div>
<div id="name-input"><label>Enter name for leaderboard</label><input id="pname" maxlength="16" placeholder="your name"><br><button id="pname-ok">Submit</button></div>
<div class="dpad left" id="dpad1">
<div class="d d-u" data-d="u">&#9650;</div>
<div class="d d-d" data-d="d">&#9660;</div>
<div class="d d-l" data-d="l">&#9664;</div>
<div class="d d-r" data-d="r">&#9654;</div>
<div class="d d-bomb" data-d="bomb">&#128163;</div>
</div>
<div class="dpad right" id="dpad2">
<div class="d d-u" data-d="u">&#9650;</div>
<div class="d d-d" data-d="d">&#9660;</div>
<div class="d d-l" data-d="l">&#9664;</div>
<div class="d d-r" data-d="r">&#9654;</div>
<div class="d d-bomb" data-d="bomb">&#128163;</div>
</div>
<div id="wrap">
<canvas id="c"></canvas>
<div id="hud">
<span class="p1c">P1 — WASD + Space</span>
<span class="p2c">P2 — Arrows + Enter</span>
</div>
</div>
<div id="overlay">
<h1>NEON BOMBER</h1>
<div class="controls">
<div><span class="p1c">Player 1</span><br>WASD — Move<br>Space — Bomb</div>
<div><span class="p2c">Player 2</span><br>Arrows — Move<br>Enter — Bomb</div>
</div>
<p>Plant bombs, dodge blasts, grab power-ups. Last one standing wins!</p>
<button class="btn" id="startBtn">START</button>
</div>
<script>
(function(){
var C=document.getElementById('c'),X=C.getContext('2d');
var overlay=document.getElementById('overlay'),startBtn=document.getElementById('startBtn');
var COLS=15,ROWS=13,CELL=40;
C.width=COLS*CELL;C.height=ROWS*CELL;
var EMPTY=0,WALL=1,BRICK=2,BOMB=3;
var grid=[];var bombs=[];var explosions=[];var powerups=[];var particles=[];
var players=[
  {x:1,y:1,color:'#00ffff',glow:'#00ffff88',maxBombs:1,bombs:0,range:2,speed:4.5,alive:true,dir:0,moveT:0,wins:0,keys:{u:false,d:false,l:false,r:false,bomb:false},lastBomb:false},
  {x:COLS-2,y:ROWS-2,color:'#ff44cc',glow:'#ff44cc88',maxBombs:1,bombs:0,range:2,speed:4.5,alive:true,dir:2,moveT:0,wins:0,keys:{u:false,d:false,l:false,r:false,bomb:false},lastBomb:false}
];
var state='menu',roundTimer=0,roundWinner=-1,roundPause=0;
var DX=[0,1,0,-1],DY=[-1,0,1,0];
var POWERUP_BOMB=1,POWERUP_RANGE=2,POWERUP_SPEED=3;
var PU_COLORS={1:'#ffcc00',2:'#ff4444',3:'#44ff44'};
var PU_LABELS={1:'B',2:'R',3:'S'};

function initGrid(){
  grid=[];bombs=[];explosions=[];powerups=[];particles=[];
  for(var y=0;y<ROWS;y++){
    grid[y]=[];
    for(var x=0;x<COLS;x++){
      if(y===0||y===ROWS-1||x===0||x===COLS-1){grid[y][x]=WALL;}
      else if(x%2===0&&y%2===0){grid[y][x]=WALL;}
      else{grid[y][x]=EMPTY;}
    }
  }
  // fill bricks randomly
  for(var y=1;y<ROWS-1;y++){
    for(var x=1;x<COLS-1;x++){
      if(grid[y][x]!==EMPTY)continue;
      // keep spawn corners clear
      if((x<=2&&y<=2)||(x>=COLS-3&&y>=ROWS-3))continue;
      if((x<=2&&y>=ROWS-3)||(x>=COLS-3&&y<=2))continue;
      if(Math.random()<0.7)grid[y][x]=BRICK;
    }
  }
}

function resetPlayers(){
  players[0].x=1;players[0].y=1;players[0].alive=true;players[0].bombs=0;
  players[0].maxBombs=1;players[0].range=2;players[0].speed=4.5;players[0].moveT=0;
  players[1].x=COLS-2;players[1].y=ROWS-2;players[1].alive=true;players[1].bombs=0;
  players[1].maxBombs=1;players[1].range=2;players[1].speed=4.5;players[1].moveT=0;
}

function startRound(){
  initGrid();resetPlayers();state='play';roundTimer=0;roundWinner=-1;roundPause=0;
}

function canWalk(x,y){
  if(x<0||x>=COLS||y<0||y>=ROWS)return false;
  if(grid[y][x]===WALL||grid[y][x]===BRICK)return false;
  for(var i=0;i<bombs.length;i++){if(bombs[i].x===x&&bombs[i].y===y)return false;}
  return true;
}

function placeBomb(p){
  if(p.bombs>=p.maxBombs)return;
  var bx=p.x,by=p.y;
  for(var i=0;i<bombs.length;i++){if(bombs[i].x===bx&&bombs[i].y===by)return;}
  bombs.push({x:bx,y:by,owner:p,timer:2.5,range:p.range});
  p.bombs++;
}

function explode(b){
  var dirs=[[0,0],[1,0],[-1,0],[0,1],[0,-1]];
  var cells=[{x:b.x,y:b.y}];
  for(var d=1;d<5;d++){
    for(var i=1;i<=b.range;i++){
      var ex=b.x+dirs[d][0]*i,ey=b.y+dirs[d][1]*i;
      if(ex<0||ex>=COLS||ey<0||ey>=ROWS)break;
      if(grid[ey][ex]===WALL)break;
      cells.push({x:ex,y:ey});
      if(grid[ey][ex]===BRICK){
        grid[ey][ex]=EMPTY;
        if(Math.random()<0.35){
          var t=Math.random();
          var kind=t<0.4?POWERUP_BOMB:t<0.7?POWERUP_RANGE:POWERUP_SPEED;
          powerups.push({x:ex,y:ey,kind:kind,t:0});
        }
        break;
      }
    }
  }
  for(var i=0;i<cells.length;i++){
    explosions.push({x:cells[i].x,y:cells[i].y,t:0,dur:0.4});
    // chain other bombs
    for(var j=bombs.length-1;j>=0;j--){
      if(bombs[j].x===cells[i].x&&bombs[j].y===cells[i].y&&bombs[j]!==b){
        bombs[j].timer=0.01;
      }
    }
    // spawn particles
    for(var k=0;k<3;k++){
      particles.push({x:(cells[i].x+0.5)*CELL,y:(cells[i].y+0.5)*CELL,
        vx:(Math.random()-0.5)*120,vy:(Math.random()-0.5)*120,
        t:0,dur:0.5+Math.random()*0.3,color:'#ff8800'});
    }
  }
  b.owner.bombs--;
}

function checkExplosionHit(){
  for(var i=0;i<explosions.length;i++){
    var e=explosions[i];
    for(var j=0;j<players.length;j++){
      if(!players[j].alive)continue;
      if(players[j].x===e.x&&players[j].y===e.y){
        players[j].alive=false;
        for(var k=0;k<20;k++){
          particles.push({x:(players[j].x+0.5)*CELL,y:(players[j].y+0.5)*CELL,
            vx:(Math.random()-0.5)*200,vy:(Math.random()-0.5)*200,
            t:0,dur:0.6+Math.random()*0.4,color:players[j].color});
        }
      }
    }
    // destroy powerups in blast
    for(var j=powerups.length-1;j>=0;j--){
      if(powerups[j].x===e.x&&powerups[j].y===e.y)powerups.splice(j,1);
    }
  }
}

function checkPowerups(){
  for(var i=powerups.length-1;i>=0;i--){
    var pu=powerups[i];
    for(var j=0;j<players.length;j++){
      if(!players[j].alive)continue;
      if(players[j].x===pu.x&&players[j].y===pu.y){
        if(pu.kind===POWERUP_BOMB)players[j].maxBombs=Math.min(players[j].maxBombs+1,5);
        if(pu.kind===POWERUP_RANGE)players[j].range=Math.min(players[j].range+1,6);
        if(pu.kind===POWERUP_SPEED)players[j].speed=Math.min(players[j].speed+0.8,8);
        powerups.splice(i,1);break;
      }
    }
  }
}

var keys={};
document.addEventListener('keydown',function(e){
  keys[e.code]=true;
  if(['Space','Enter','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code)!==-1)e.preventDefault();
});
document.addEventListener('keyup',function(e){keys[e.code]=false;});

function updatePlayerKeys(){
  var p=players[0];
  p.keys.u=!!keys['KeyW']||!!touchP[0].u;
  p.keys.d=!!keys['KeyS']||!!touchP[0].d;
  p.keys.l=!!keys['KeyA']||!!touchP[0].l;
  p.keys.r=!!keys['KeyD']||!!touchP[0].r;
  p.keys.bomb=!!keys['Space']||!!touchP[0].bomb;
  var q=players[1];
  q.keys.u=!!keys['ArrowUp']||!!touchP[1].u;
  q.keys.d=!!keys['ArrowDown']||!!touchP[1].d;
  q.keys.l=!!keys['ArrowLeft']||!!touchP[1].l;
  q.keys.r=!!keys['ArrowRight']||!!touchP[1].r;
  q.keys.bomb=!!keys['Enter']||!!touchP[1].bomb;
}

function movePlayer(p,dt){
  if(!p.alive)return;
  p.moveT-=dt;
  if(p.moveT>0)return;
  var dx=0,dy=0;
  if(p.keys.u){dy=-1;p.dir=0;}
  else if(p.keys.d){dy=1;p.dir=2;}
  else if(p.keys.l){dx=-1;p.dir=3;}
  else if(p.keys.r){dx=1;p.dir=1;}
  if(dx!==0||dy!==0){
    var nx=p.x+dx,ny=p.y+dy;
    if(canWalk(nx,ny)){p.x=nx;p.y=ny;}
    p.moveT=1/p.speed;
  }
  // bomb
  if(p.keys.bomb&&!p.lastBomb){placeBomb(p);}
  p.lastBomb=p.keys.bomb;
}

function update(dt){
  if(state!=='play')return;
  roundTimer+=dt;
  updatePlayerKeys();
  for(var i=0;i<players.length;i++)movePlayer(players[i],dt);
  // bombs
  for(var i=bombs.length-1;i>=0;i--){
    bombs[i].timer-=dt;
    if(bombs[i].timer<=0){explode(bombs[i]);bombs.splice(i,1);}
  }
  // explosions
  for(var i=explosions.length-1;i>=0;i--){
    explosions[i].t+=dt;
    if(explosions[i].t>=explosions[i].dur){explosions.splice(i,1);}
  }
  checkExplosionHit();
  checkPowerups();
  // particles
  for(var i=particles.length-1;i>=0;i--){
    var pt=particles[i];
    pt.t+=dt;pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;
    if(pt.t>=pt.dur)particles.splice(i,1);
  }
  // check win
  var alive=[];
  for(var i=0;i<players.length;i++){if(players[i].alive)alive.push(i);}
  if(alive.length<=1&&roundPause===0){
    if(alive.length===1){roundWinner=alive[0];players[alive[0]].wins++;}
    else{roundWinner=-1;}// draw
    roundPause=2.5;
  }
  if(roundPause>0){
    roundPause-=dt;
    if(roundPause<=0){startRound();}
  }
}

function draw(){
  X.fillStyle='#05060f';X.fillRect(0,0,C.width,C.height);
  // grid lines
  X.strokeStyle='#0a0b1a';X.lineWidth=1;
  for(var x=0;x<=COLS;x++){X.beginPath();X.moveTo(x*CELL,0);X.lineTo(x*CELL,ROWS*CELL);X.stroke();}
  for(var y=0;y<=ROWS;y++){X.beginPath();X.moveTo(0,y*CELL);X.lineTo(COLS*CELL,y*CELL);X.stroke();}
  // walls and bricks
  for(var y=0;y<ROWS;y++){
    for(var x=0;x<COLS;x++){
      var cx=x*CELL,cy=y*CELL;
      if(grid[y][x]===WALL){
        X.fillStyle='#1a1a3a';X.fillRect(cx+1,cy+1,CELL-2,CELL-2);
        X.strokeStyle='#2a2a5a';X.lineWidth=1;X.strokeRect(cx+2,cy+2,CELL-4,CELL-4);
      }else if(grid[y][x]===BRICK){
        X.fillStyle='#2a1a0a';X.fillRect(cx+1,cy+1,CELL-2,CELL-2);
        X.strokeStyle='#ff660033';X.lineWidth=1;X.strokeRect(cx+3,cy+3,CELL-6,CELL-6);
        // brick pattern
        X.fillStyle='#ff660018';
        X.fillRect(cx+2,cy+CELL/2-1,CELL-4,2);
        X.fillRect(cx+CELL/2-1,cy+2,2,CELL-4);
      }
    }
  }
  // powerups
  for(var i=0;i<powerups.length;i++){
    var pu=powerups[i];pu.t+=0.016;
    var px=(pu.x+0.5)*CELL,py=(pu.y+0.5)*CELL;
    var pulse=1+Math.sin(pu.t*4)*0.15;
    X.save();X.globalAlpha=0.8;
    X.shadowColor=PU_COLORS[pu.kind];X.shadowBlur=12*pulse;
    X.fillStyle=PU_COLORS[pu.kind];
    X.beginPath();X.arc(px,py,10*pulse,0,Math.PI*2);X.fill();
    X.fillStyle='#000';X.font='bold 12px Orbitron';X.textAlign='center';X.textBaseline='middle';
    X.fillText(PU_LABELS[pu.kind],px,py+1);
    X.restore();
  }
  // bombs
  for(var i=0;i<bombs.length;i++){
    var b=bombs[i];
    var bx=(b.x+0.5)*CELL,by=(b.y+0.5)*CELL;
    var pulse=1+Math.sin(b.timer*8)*0.2;
    X.save();
    X.shadowColor='#ff4400';X.shadowBlur=16*pulse;
    X.fillStyle='#222';
    X.beginPath();X.arc(bx,by,13*pulse,0,Math.PI*2);X.fill();
    X.strokeStyle='#ff4400';X.lineWidth=2;
    X.beginPath();X.arc(bx,by,13*pulse,0,Math.PI*2);X.stroke();
    // fuse
    X.strokeStyle='#ff8800';X.lineWidth=2;
    X.beginPath();X.moveTo(bx,by-13*pulse);X.lineTo(bx+5,by-18*pulse);X.stroke();
    var ft=Math.sin(Date.now()*0.02)*0.5+0.5;
    X.fillStyle='rgba(255,'+Math.floor(100+155*ft)+',0,0.9)';
    X.beginPath();X.arc(bx+5,by-18*pulse,3,0,Math.PI*2);X.fill();
    X.restore();
  }
  // explosions
  for(var i=0;i<explosions.length;i++){
    var e=explosions[i];
    var prog=e.t/e.dur;
    var alpha=1-prog;
    var ex=e.x*CELL,ey=e.y*CELL;
    X.save();X.globalAlpha=alpha;
    X.shadowColor='#ff8800';X.shadowBlur=20*(1-prog);
    var g=X.createRadialGradient(ex+CELL/2,ey+CELL/2,0,ex+CELL/2,ey+CELL/2,CELL*0.7);
    g.addColorStop(0,'#ffffff');g.addColorStop(0.3,'#ffaa00');g.addColorStop(1,'#ff440000');
    X.fillStyle=g;X.fillRect(ex-4,ey-4,CELL+8,CELL+8);
    X.restore();
  }
  // players
  for(var i=0;i<players.length;i++){
    var p=players[i];
    if(!p.alive)continue;
    var px=(p.x+0.5)*CELL,py=(p.y+0.5)*CELL;
    X.save();
    X.shadowColor=p.color;X.shadowBlur=18;
    X.fillStyle=p.color;
    X.beginPath();X.arc(px,py,14,0,Math.PI*2);X.fill();
    // inner
    X.fillStyle='#05060f';
    X.beginPath();X.arc(px,py,8,0,Math.PI*2);X.fill();
    // eye direction
    var edx=DX[p.dir]*4,edy=DY[p.dir]*4;
    X.fillStyle=p.color;
    X.beginPath();X.arc(px+edx,py+edy,4,0,Math.PI*2);X.fill();
    // label
    X.fillStyle=p.color;X.font='bold 9px Orbitron';X.textAlign='center';
    X.fillText('P'+(i+1),px,py-20);
    X.restore();
  }
  // particles
  for(var i=0;i<particles.length;i++){
    var pt=particles[i];
    var alpha=1-pt.t/pt.dur;
    X.save();X.globalAlpha=alpha;
    X.fillStyle=pt.color;
    X.beginPath();X.arc(pt.x,pt.y,2+alpha*2,0,Math.PI*2);X.fill();
    X.restore();
  }
  // round end
  if(roundPause>0){
    X.save();X.globalAlpha=0.7;X.fillStyle='#05060f';X.fillRect(0,0,C.width,C.height);X.restore();
    X.font='bold 32px Orbitron';X.textAlign='center';X.textBaseline='middle';
    if(roundWinner>=0){
      X.fillStyle=players[roundWinner].color;
      X.shadowColor=players[roundWinner].color;X.shadowBlur=20;
      X.fillText('P'+(roundWinner+1)+' WINS!',C.width/2,C.height/2-20);
    }else{
      X.fillStyle='#888';X.fillText('DRAW!',C.width/2,C.height/2-20);
    }
    X.shadowBlur=0;X.font='16px Share Tech Mono';X.fillStyle='#888';
    X.fillText('P1: '+players[0].wins+'  —  P2: '+players[1].wins,C.width/2,C.height/2+20);
  }
  // score at top
  if(state==='play'&&roundPause<=0){
    X.save();X.font='13px Share Tech Mono';X.textBaseline='top';
    X.fillStyle='#00ffff88';X.textAlign='left';
    X.fillText('P1 wins: '+players[0].wins+'  |  Bombs:'+players[0].maxBombs+' Range:'+players[0].range,8,4);
    X.fillStyle='#ff44cc88';X.textAlign='right';
    X.fillText('P2 wins: '+players[1].wins+'  |  Bombs:'+players[1].maxBombs+' Range:'+players[1].range,C.width-8,4);
    X.restore();
  }
}

var lastTime=0;
function loop(t){
  var dt=Math.min((t-lastTime)/1000,0.05);lastTime=t;
  update(dt);draw();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click',function(){
  overlay.classList.add('hidden');
  startRound();
  requestAnimationFrame(function(t){lastTime=t;loop(t);});
});

// touch d-pad wiring
var touchP={0:{},1:{}};
function setupDpad(el,pIdx){
  function handler(e){
    e.preventDefault();
    var active={};
    for(var i=0;i<e.touches.length;i++){
      var t=e.touches[i];
      var btn=document.elementFromPoint(t.clientX,t.clientY);
      if(btn&&btn.closest('#dpad'+(pIdx+1))){
        var d=btn.dataset.d;if(d)active[d]=true;
      }
    }
    touchP[pIdx]=active;
  }
  el.addEventListener('touchstart',handler,{passive:false});
  el.addEventListener('touchmove',handler,{passive:false});
  el.addEventListener('touchend',function(e){
    e.preventDefault();
    var active={};
    for(var i=0;i<e.touches.length;i++){
      var t=e.touches[i];
      var btn=document.elementFromPoint(t.clientX,t.clientY);
      if(btn&&btn.closest('#dpad'+(pIdx+1))){
        var d=btn.dataset.d;if(d)active[d]=true;
      }
    }
    touchP[pIdx]=active;
  },{passive:false});
}
setupDpad(document.getElementById('dpad1'),0);
setupDpad(document.getElementById('dpad2'),1);

// resize canvas to fit
function resize(){
  var isTouch=matchMedia('(pointer:coarse)').matches;
  var maxW=window.innerWidth-24,maxH=window.innerHeight-(isTouch?200:60);
  var scale=Math.min(maxW/(COLS*CELL),maxH/(ROWS*CELL),1);
  C.style.width=(COLS*CELL*scale)+'px';
  C.style.height=(ROWS*CELL*scale)+'px';
}
window.addEventListener('resize',resize);resize();

window._bomberGame={
  getWins:function(){return{p1:players[0].wins,p2:players[1].wins};},
  lastWinner:-1
};
// expose win events
var _origStartRound=startRound;
startRound=function(){
  if(roundWinner>=0) window._bomberGame.lastWinner=roundWinner;
  _origStartRound();
};
})();
</script>
<script type="module">
import supabase,{supabaseSession} from '/supabase-config-fixed.js';
var lb=document.getElementById('lb'),lbBody=document.getElementById('lb-body');
var nameBox=document.getElementById('name-input'),pname=document.getElementById('pname');
var pnameOk=document.getElementById('pname-ok');
var userId=null;var KEY='nb-username';
pname.value=localStorage.getItem(KEY)||'';
var pendingWins=0;

async function init(){
  try{var s=await supabaseSession();userId=s.user.id;}catch(e){console.warn('Auth:',e);}
  loadBoard();
}
init();

async function loadBoard(){
  try{
    var{data}=await supabase.from('neon_bomber_scores').select('username,wins,user_id').order('wins',{ascending:false}).limit(10);
    if(!data)return;
    var html='';
    for(var i=0;i<data.length;i++){
      var r=data[i];
      var me=r.user_id===userId?'me':'';
      html+='<tr class="'+me+'"><td>'+(i+1)+'</td><td>'+esc(r.username)+'</td><td>'+r.wins+'W</td></tr>';
    }
    lbBody.innerHTML=html||'<tr><td colspan="3" style="text-align:center;color:#555">No scores yet</td></tr>';
  }catch(e){console.warn('LB:',e);}
}

function esc(s){return String(s||'???').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function submitScore(name,wins){
  if(!userId)return;
  localStorage.setItem(KEY,name);
  try{
    await supabase.from('neon_bomber_scores').insert({username:name,wins:wins,user_id:userId});
    loadBoard();
  }catch(e){console.warn('Submit:',e);}
}

// poll for round wins
var lastW={p1:0,p2:0};
setInterval(function(){
  var g=window._bomberGame;
  var w=g.getWins();
  if(w.p1>lastW.p1||w.p2>lastW.p2){
    lb.style.display='block';
    loadBoard();
    var winner=w.p1>lastW.p1?0:1;
    var totalWins=winner===0?w.p1:w.p2;
    // submit every 3 wins
    if(totalWins>0&&totalWins%3===0){
      var savedName=localStorage.getItem(KEY);
      pendingWins=totalWins;
      if(savedName){submitScore(savedName,totalWins);}
      else{nameBox.style.display='block';pname.focus();}
    }
  }
  lastW={p1:w.p1,p2:w.p2};
},300);

// show lb on start
document.getElementById('startBtn').addEventListener('click',function(){
  setTimeout(function(){lb.style.display='block';},500);
});

pnameOk.addEventListener('click',function(){
  var n=pname.value.trim();if(!n)return;
  nameBox.style.display='none';
  submitScore(n,pendingWins||1);
});
pname.addEventListener('keydown',function(e){if(e.key==='Enter')pnameOk.click();});
</script>
</body>
