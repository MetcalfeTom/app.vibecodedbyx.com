<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Neon Purr · The Glowing Cat That Follows You</title>
<meta name="description" content="A neon cat that pads after your cursor and purrs when you stand still." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%88" />
<meta property="og:title" content="Neon Purr" />
<meta property="og:description" content="A glowing neon cat trails your cursor across the void. Click to pet. Stand still to hear the purr." />
<meta property="og:url" content="https://sloppy.live/neon-purr/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/glowing%20neon%20cyan%20cat%20with%20pink%20outline%20chasing%20a%20cursor%20across%20a%20dark%20violet%20void%20synthwave?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Cormorant+Garamond:ital,wght@1,500&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
:root{
  --void:#040616;
  --deep:#0c1330;
  --cyan:#7be4ff;
  --pink:#ff5ea1;
  --gold:#ffce4a;
  --bone:#f0eef8;
  --dim:rgba(240,238,248,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--void);color:var(--bone);font-family:'Space Mono',monospace}
body{
  background:
    radial-gradient(ellipse at 50% 50%, rgba(123,228,255,0.10), transparent 55%),
    radial-gradient(ellipse at 18% 12%, rgba(255,94,161,0.08), transparent 55%),
    radial-gradient(ellipse at 82% 88%, rgba(255,206,74,0.06), transparent 55%),
    linear-gradient(180deg, var(--void) 0%, var(--deep) 100%);
  cursor:none;
}
#stage{position:fixed;inset:0;z-index:2;display:block}
.title{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Cormorant Garamond', serif;font-style:italic;
  color:rgba(240,238,248,0.78);
  font-size:clamp(15px, 2vw, 22px);letter-spacing:0.18em;
  text-align:center;pointer-events:none;
  text-shadow:0 0 14px rgba(123,228,255,0.4);
}
.title .b{color:var(--cyan)}
.hud{
  position:fixed;top:14px;left:18px;z-index:5;
  font-family:'Major Mono Display', monospace;font-size:11px;letter-spacing:0.18em;
  color:var(--dim);line-height:1.7;pointer-events:none;
  text-shadow:0 0 6px rgba(0,0,0,0.7);
}
.hud b{color:var(--bone)}
.hud .purrbar{
  display:inline-block;width:80px;height:6px;background:rgba(255,255,255,0.12);
  border-radius:3px;margin-left:6px;vertical-align:middle;overflow:hidden;
  border:1px solid rgba(123,228,255,0.3);
}
.hud .purrfill{
  height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--pink));
  box-shadow:0 0 8px rgba(255,94,161,0.55);
  transition:width 0.18s ease;
}
.muted{
  position:fixed;top:14px;right:18px;z-index:5;
  background:transparent;border:1px solid rgba(255,255,255,0.18);
  color:var(--dim);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.18em;
  padding:6px 12px;border-radius:999px;cursor:pointer;
}
.muted:hover{color:var(--bone);border-color:var(--cyan)}
.hint{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Space Mono',monospace;font-size:11px;color:var(--dim);
  letter-spacing:0.16em;pointer-events:none;text-align:center;
  text-shadow:0 0 4px rgba(0,0,0,0.7);
}
.hint b{color:var(--cyan);font-weight:400}
@media (max-width:520px){.hint{display:none}.title{font-size:13px}}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="title">— neon <span class="b">purr</span> —</div>
<div class="hud">
  <div>STATE · <b id="hState">stalking</b></div>
  <div>PURR · <span class="purrbar"><span class="purrfill" id="purrFill"></span></span></div>
</div>
<button class="muted" id="bMute">♪ on</button>
<div class="hint">move the cursor · she follows. <b>click</b> to pet · <b>stand still</b> to hear her purr.</div>

<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  let W = innerWidth, H = innerHeight;
  const dpr = Math.max(1, Math.min(2, devicePixelRatio || 1));
  function resize() {
    W = innerWidth; H = innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  addEventListener('resize', resize);

  // === state ===
  const cursor = { x: W * 0.5, y: H * 0.5, lastMoveAt: performance.now() };
  const cat = {
    x: W * 0.5 - 200, y: H * 0.5 + 60,
    vx: 0, vy: 0,
    facing: 1,
    walkPhase: 0,
    blinkAt: performance.now() + 4000 + Math.random() * 4000,
    blinkOpen: 1,
    earTwitch: 0,
    tailPhase: 0,
    petGlow: 0,           // 0..1 spike when clicked
    pettedAt: 0,
    pawTrail: [],
    purr: 0,              // 0..1 increases when standing still near cat
  };
  let mood = 'stalking';

  addEventListener('mousemove', (e) => {
    cursor.x = e.clientX; cursor.y = e.clientY;
    cursor.lastMoveAt = performance.now();
  });
  addEventListener('touchmove', (e) => {
    if (e.touches[0]) {
      cursor.x = e.touches[0].clientX;
      cursor.y = e.touches[0].clientY;
      cursor.lastMoveAt = performance.now();
    }
  }, { passive: true });
  canvas.addEventListener('click', (e) => {
    audio();
    cat.petGlow = 1;
    cat.pettedAt = performance.now();
    meowSfx();
    // burst hearts at click point
    for (let i = 0; i < 5; i++) {
      hearts.push({
        x: e.clientX + (Math.random() - 0.5) * 20,
        y: e.clientY + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 30,
        vy: -40 - Math.random() * 40,
        life: 1.2, max: 1.2,
      });
    }
  });

  // === floating hearts on click ===
  const hearts = [];

  // === paw trail ===
  function addPaw(x, y, side) {
    cat.pawTrail.push({ x, y, side, life: 1.2, max: 1.2 });
    if (cat.pawTrail.length > 30) cat.pawTrail.shift();
  }

  // === main tick ===
  let lastTime = performance.now();
  let lastPawAt = 0;

  function tick(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    const idleFor = (now - cursor.lastMoveAt) / 1000;

    // === cat AI: ease toward cursor with a comfortable trailing distance ===
    const FOLLOW_DIST = 60;  // stays this many pixels behind the cursor
    const dx = cursor.x - cat.x;
    const dy = cursor.y - cat.y;
    const dist = Math.hypot(dx, dy);
    let targetX = cat.x, targetY = cat.y;
    if (dist > FOLLOW_DIST) {
      const move = dist - FOLLOW_DIST;
      targetX = cat.x + (dx / dist) * move;
      targetY = cat.y + (dy / dist) * move;
    }
    // smooth: lerp toward target with damping that goes higher when far
    const k = Math.min(1, dt * (3 + Math.min(8, dist * 0.04)));
    cat.x += (targetX - cat.x) * k;
    cat.y += (targetY - cat.y) * k;
    // velocity for animation phase
    cat.vx = (targetX - cat.x);  // approx
    cat.vy = (targetY - cat.y);
    const speed = Math.hypot(cat.vx, cat.vy);
    cat.walkPhase += dt * (1.4 + speed * 0.05);
    cat.tailPhase += dt * 1.2;
    cat.earTwitch *= Math.pow(0.94, dt * 60);

    // facing: only flip when cursor is solidly to one side
    if (cursor.x > cat.x + 16) cat.facing = 1;
    else if (cursor.x < cat.x - 16) cat.facing = -1;

    // === mood ===
    if (idleFor < 0.4) mood = 'stalking';
    else if (idleFor < 2.5) mood = 'curious';
    else if (idleFor < 5) mood = 'sitting';
    else mood = 'purring';
    document.getElementById('hState').textContent = mood;

    // === purr level — rises when cursor is still AND near, decays otherwise ===
    const cursorDist = Math.hypot(cursor.x - cat.x, cursor.y - cat.y);
    const cursorIsStill = idleFor > 1.2;
    const cursorIsNear = cursorDist < 240;
    if (cursorIsStill && cursorIsNear) {
      cat.purr = Math.min(1, cat.purr + dt * 0.4);
    } else {
      cat.purr = Math.max(0, cat.purr - dt * 0.5);
    }
    // recently petted bumps purr instantly
    if (now - cat.pettedAt < 1500) cat.purr = Math.min(1, cat.purr + dt * 1.4);
    document.getElementById('purrFill').style.width = (cat.purr * 100).toFixed(1) + '%';

    // purr audio amplitude tracks level
    setPurrLevel(cat.purr);

    // pet glow decay
    cat.petGlow = Math.max(0, cat.petGlow - dt * 1.6);

    // blink
    if (now > cat.blinkAt) {
      cat.blinkOpen -= dt * 12;
      if (cat.blinkOpen < 0) cat.blinkOpen = 0;
      if (now > cat.blinkAt + 100) {
        cat.blinkOpen += dt * 10;
        if (cat.blinkOpen >= 1) {
          cat.blinkOpen = 1;
          cat.blinkAt = now + 3500 + Math.random() * 5000;
        }
      }
    }

    // paw trails
    if (speed > 0.5 && now - lastPawAt > 240) {
      lastPawAt = now;
      addPaw(cat.x - cat.facing * 16, cat.y + 22, 1);
      setTimeout(() => addPaw(cat.x - cat.facing * 8, cat.y + 22, -1), 120);
    }
    for (let i = cat.pawTrail.length - 1; i >= 0; i--) {
      cat.pawTrail[i].life -= dt;
      if (cat.pawTrail[i].life <= 0) cat.pawTrail.splice(i, 1);
    }
    // hearts
    for (let i = hearts.length - 1; i >= 0; i--) {
      const h = hearts[i];
      h.x += h.vx * dt;
      h.y += h.vy * dt;
      h.vy *= 0.96;
      h.life -= dt;
      if (h.life <= 0) hearts.splice(i, 1);
    }

    render(now);
    requestAnimationFrame(tick);
  }

  function render(now) {
    // motion-trail wash for soft ghosting
    ctx.fillStyle = 'rgba(4,6,22,0.35)';
    ctx.fillRect(0, 0, W, H);

    // === paw prints ===
    for (const p of cat.pawTrail) {
      const a = Math.max(0, p.life / p.max);
      ctx.fillStyle = `rgba(255,94,161,${0.35 * a})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fill();
      // toes
      for (let k = -1; k <= 1; k++) {
        ctx.beginPath();
        ctx.arc(p.x + k * 4, p.y - 5, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // === hearts ===
    for (const h of hearts) {
      const a = Math.max(0, h.life / h.max);
      ctx.save();
      ctx.translate(h.x, h.y);
      ctx.scale(0.6 + (1 - a) * 0.4, 0.6 + (1 - a) * 0.4);
      ctx.fillStyle = `rgba(255,94,161,${a})`;
      ctx.shadowColor = '#ff5ea1';
      ctx.shadowBlur = 10;
      drawHeartShape(ctx, 0, 0, 8);
      ctx.restore();
    }

    // === cat ===
    drawCat(now);

    // === cursor crosshair (since we hid the OS cursor) ===
    drawCursor(cursor.x, cursor.y);
  }

  function drawCursor(x, y) {
    ctx.save();
    ctx.translate(x, y);
    const r = 8;
    const a = 0.65 + 0.25 * Math.sin(performance.now() * 0.006);
    ctx.strokeStyle = `rgba(123,228,255,${a})`;
    ctx.lineWidth = 1.4;
    ctx.shadowColor = '#7be4ff';
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-r - 4, 0); ctx.lineTo(-r, 0);
    ctx.moveTo(r, 0); ctx.lineTo(r + 4, 0);
    ctx.moveTo(0, -r - 4); ctx.lineTo(0, -r);
    ctx.moveTo(0, r); ctx.lineTo(0, r + 4);
    ctx.stroke();
    ctx.restore();
  }

  function drawHeartShape(ctx, x, y, s) {
    ctx.beginPath();
    ctx.moveTo(x, y + s * 0.6);
    ctx.bezierCurveTo(x - s * 1.4, y - s * 0.4, x - s * 1.4, y - s * 1.4, x - s * 0.4, y - s * 1.4);
    ctx.bezierCurveTo(x - s * 0.1, y - s * 1.5, x, y - s * 1.0, x, y - s * 0.6);
    ctx.bezierCurveTo(x, y - s * 1.0, x + s * 0.1, y - s * 1.5, x + s * 0.4, y - s * 1.4);
    ctx.bezierCurveTo(x + s * 1.4, y - s * 1.4, x + s * 1.4, y - s * 0.4, x, y + s * 0.6);
    ctx.fill();
  }

  function drawCat(now) {
    const sx = cat.facing;
    ctx.save();
    ctx.translate(cat.x, cat.y);
    ctx.scale(sx * 1.0, 1.0);

    const breathing = Math.sin(now * 0.003) * 0.04 + 1;
    const purrShake = cat.purr * (1 + Math.sin(now * 0.06) * 0.4);
    const petPop = cat.petGlow;

    // === outer halo (mood-tinted) ===
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const haloR = 80 + petPop * 40;
    const halo = ctx.createRadialGradient(0, 0, 10, 0, 0, haloR);
    const haloHue = mood === 'purring' ? 320 : 195; // pink when purring, cyan otherwise
    halo.addColorStop(0, `hsla(${haloHue}, 90%, 70%, ${0.35 + petPop * 0.4 + cat.purr * 0.18})`);
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(0, 0, haloR, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // === tail (wags behind) ===
    ctx.save();
    ctx.translate(-44, -2);
    const tailSegs = 8;
    ctx.lineCap = 'round';
    for (let i = 0; i < tailSegs; i++) {
      const u = i / (tailSegs - 1);
      const wag = Math.sin(cat.tailPhase * 1.5 + u * 4) * 18 * (mood === 'sitting' ? 0.4 : 1);
      const px = -i * 6, py = wag - i * 2;
      ctx.lineWidth = 7 - u * 5;
      ctx.strokeStyle = '#ff5ea1';
      ctx.shadowColor = '#ff5ea1'; ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(px, py, ctx.lineWidth * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = '#ff5ea1';
      ctx.fill();
    }
    ctx.restore();

    // === body (oval) ===
    ctx.save();
    ctx.scale(1, breathing);
    ctx.shadowColor = '#7be4ff';
    ctx.shadowBlur = 24 + petPop * 18;
    ctx.fillStyle = 'rgba(20,40,80,0.85)';
    ctx.beginPath();
    ctx.ellipse(0, 4, 36, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 2.2;
    ctx.strokeStyle = '#7be4ff';
    ctx.stroke();
    // pink underglow line on belly
    ctx.strokeStyle = 'rgba(255,94,161,0.7)';
    ctx.shadowColor = '#ff5ea1';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.ellipse(0, 8, 30, 16, 0, Math.PI * 0.15, Math.PI * 0.85);
    ctx.stroke();
    ctx.restore();

    // === head (separate, follows cursor slightly) ===
    const headBob = Math.sin(now * 0.004) * 1.5;
    const cursorPullX = (cursor.x - cat.x) * 0.04 * sx;  // small head-turn lookahead
    const cursorPullY = (cursor.y - cat.y) * 0.04;
    ctx.save();
    ctx.translate(28 + cursorPullX, -10 + headBob + cursorPullY);
    // ears (translated to head — drawn before face so they sit behind)
    drawEar(-9, -16, -0.45 + cat.earTwitch);
    drawEar( 9, -18,  0.4 + cat.earTwitch * -0.6);
    // head body
    ctx.shadowColor = '#7be4ff'; ctx.shadowBlur = 22 + petPop * 14;
    ctx.fillStyle = 'rgba(20,40,80,0.92)';
    ctx.beginPath();
    ctx.arc(0, 0, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 2.4;
    ctx.strokeStyle = '#7be4ff';
    ctx.stroke();
    // cheeks (purring tinted)
    if (cat.purr > 0.2) {
      ctx.shadowBlur = 10;
      ctx.fillStyle = `rgba(255,94,161,${cat.purr * 0.7})`;
      ctx.beginPath();
      ctx.arc(-10, 4, 5, 0, Math.PI * 2);
      ctx.arc(10, 4, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    // eyes
    ctx.shadowBlur = 0;
    drawEye(-7, -2, cat.blinkOpen, cursor);
    drawEye( 7, -2, cat.blinkOpen, cursor);
    // nose
    ctx.fillStyle = '#ff5ea1';
    ctx.shadowColor = '#ff5ea1'; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(0, 4);
    ctx.lineTo(-3, 7);
    ctx.lineTo(3, 7);
    ctx.closePath();
    ctx.fill();
    // mouth — Y shape
    ctx.shadowBlur = 6;
    ctx.strokeStyle = '#ff5ea1';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(0, 7);
    ctx.lineTo(0, 10);
    ctx.moveTo(0, 10);
    ctx.quadraticCurveTo(-3, 12, -5, 10);
    ctx.moveTo(0, 10);
    ctx.quadraticCurveTo(3, 12, 5, 10);
    ctx.stroke();
    // whiskers (purring shimmies them)
    ctx.strokeStyle = `rgba(240,238,248,${0.6 + cat.purr * 0.3})`;
    ctx.lineWidth = 0.9;
    ctx.shadowBlur = 0;
    const ws = purrShake * 0.6;
    [-1, 1].forEach(side => {
      [4, 6, 7].forEach((y, k) => {
        ctx.beginPath();
        ctx.moveTo(side * 6, y);
        ctx.lineTo(side * 18, y - 1 + k - 1 + ws * (k - 1));
        ctx.stroke();
      });
    });
    ctx.restore();

    // === legs (4 — small phased pulses while moving) ===
    const legPhase = cat.walkPhase;
    const legs = [
      { x: -22, p: 0 },
      { x: -8, p: Math.PI },
      { x: 8, p: 0.5 },
      { x: 22, p: Math.PI + 0.5 },
    ];
    for (const lg of legs) {
      const lift = Math.max(0, Math.sin(legPhase + lg.p)) * 4;
      ctx.fillStyle = '#7be4ff';
      ctx.shadowColor = '#7be4ff'; ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.roundRect(lg.x - 3, 18 - lift, 6, 12, 3);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    ctx.restore();

    // purr shimmy waves above when purring
    if (cat.purr > 0.4) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const cx = cat.x, cy = cat.y - 50;
      for (let i = 0; i < 3; i++) {
        const t = (now * 0.001 + i * 0.4) % 1;
        ctx.strokeStyle = `rgba(255,94,161,${(1 - t) * cat.purr * 0.7})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy - t * 24, 18 + t * 22, Math.PI, 0);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawEar(x, y, lean) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(lean);
    ctx.shadowColor = '#7be4ff'; ctx.shadowBlur = 12;
    ctx.fillStyle = 'rgba(20,40,80,0.92)';
    ctx.strokeStyle = '#7be4ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-3, -10);
    ctx.lineTo(5, -2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // inner pink
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,94,161,0.6)';
    ctx.beginPath();
    ctx.moveTo(-1, -2);
    ctx.lineTo(-2, -7);
    ctx.lineTo(2, -3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawEye(lx, ly, open, cur) {
    ctx.save();
    ctx.translate(lx, ly);
    if (open < 0.15) {
      // closed eye — line
      ctx.strokeStyle = '#7be4ff';
      ctx.shadowColor = '#7be4ff'; ctx.shadowBlur = 8;
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(-3, 0);
      ctx.quadraticCurveTo(0, 1, 3, 0);
      ctx.stroke();
      ctx.restore();
      return;
    }
    // sclera (yellow-green glow)
    ctx.fillStyle = '#ffce4a';
    ctx.shadowColor = '#ffce4a'; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.ellipse(0, 0, 4, 4 * open, 0, 0, Math.PI * 2);
    ctx.fill();
    // vertical slit pupil tracks cursor
    const dx = (cur.x - cat.x) - 28;
    const dy = (cur.y - cat.y) - -10;
    const off = Math.atan2(dy, Math.abs(dx) + 0.001);
    const px = (dx > 0 ? 1 : -1) * Math.min(2, Math.abs(dx) * 0.02);
    const py = Math.max(-1.2, Math.min(1.2, dy * 0.02));
    ctx.fillStyle = '#000';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.ellipse(px, py, 0.9, 3 * open, 0, 0, Math.PI * 2);
    ctx.fill();
    // inner ember hint
    ctx.fillStyle = `rgba(255,94,161,${0.5 + cat.purr * 0.4})`;
    ctx.fillRect(px - 0.3, py - 2.4 * open, 0.6, 1.2 * open);
    ctx.restore();
  }

  // polyfill roundRect (older browsers)
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      this.beginPath();
      this.moveTo(x + r, y);
      this.arcTo(x + w, y, x + w, y + h, r);
      this.arcTo(x + w, y + h, x, y + h, r);
      this.arcTo(x, y + h, x, y, r);
      this.arcTo(x, y, x + w, y, r);
      this.closePath();
    };
  }

  // === audio ===
  let audioCtx = null, master = null, muted = true;
  let purrOsc = null, purrLfo = null, purrLfoG = null, purrFilt = null, purrGain = null;
  function audio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      master = audioCtx.createGain();
      master.gain.value = 0.32;
      master.connect(audioCtx.destination);
      muted = false;
      document.getElementById('bMute').textContent = '♪ off';
      // build purr graph (always running, gain modulated by purr level)
      buildPurr();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function buildPurr() {
    if (!audioCtx) return;
    // sawtooth wobble — purring is ~25Hz tremolo on a low rumble
    const ac = audioCtx;
    purrOsc = ac.createOscillator();
    purrOsc.type = 'sawtooth';
    purrOsc.frequency.value = 36;
    purrFilt = ac.createBiquadFilter();
    purrFilt.type = 'lowpass';
    purrFilt.frequency.value = 220;
    purrFilt.Q.value = 4;
    purrGain = ac.createGain();
    purrGain.gain.value = 0;
    purrLfo = ac.createOscillator();
    purrLfo.type = 'sine';
    purrLfo.frequency.value = 26; // tremolo rate
    purrLfoG = ac.createGain();
    purrLfoG.gain.value = 0.5;
    purrLfo.connect(purrLfoG);
    purrLfoG.connect(purrGain.gain);
    purrOsc.connect(purrFilt);
    purrFilt.connect(purrGain);
    purrGain.connect(master);
    purrOsc.start(); purrLfo.start();
  }
  function setPurrLevel(level) {
    if (!audioCtx || muted || !purrLfoG || !purrFilt) return;
    // map purr level 0..1 to LFO depth and filter cutoff so it sounds bigger as it grows
    purrLfoG.gain.linearRampToValueAtTime(0.01 + level * 0.5, audioCtx.currentTime + 0.1);
    purrFilt.frequency.linearRampToValueAtTime(180 + level * 280, audioCtx.currentTime + 0.1);
  }
  function meowSfx() {
    if (muted || !audioCtx) return;
    const ac = audioCtx;
    const t = ac.currentTime;
    // a tiny squeaky meow — 600→900→500 freq sweep through bandpass
    const o = ac.createOscillator(); o.type = 'triangle';
    o.frequency.setValueAtTime(560, t);
    o.frequency.linearRampToValueAtTime(940, t + 0.08);
    o.frequency.linearRampToValueAtTime(520, t + 0.34);
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 700; bp.Q.value = 4;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);
    o.connect(bp); bp.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.46);
  }
  document.getElementById('bMute').addEventListener('click', () => {
    if (muted) {
      audio();
    } else {
      muted = true;
      if (purrLfoG) purrLfoG.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
      document.getElementById('bMute').textContent = '♪ on';
    }
  });

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
