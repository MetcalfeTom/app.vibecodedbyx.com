<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Font Quest — Platformer</title>
<link rel="icon" href="https://emojicdn.elk.sh/🦊">
<meta property="og:title" content="Fox Font Quest">
<meta property="og:description" content="Play as the letter F with fox ears — collect floating letters in order to spell words, dodge spikes, reach the flag!">
<meta property="og:url" content="https://sloppy.live/fox-font-quest">
<meta property="og:image" content="https://sloppy.live/fox-font-quest/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Vollkorn:wght@700;900&family=Azeret+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e0b16;--card:#1a1525;--border:#2e2844;
  --fox:#ff8c42;--fox2:#e06820;--gold:#ffd166;
  --leaf:#4ecdc4;--text:#ede8f5;--muted:#7a7092;
}
body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);color:var(--text);font-family:'Vollkorn',serif;
  overflow:hidden;
}
#ui{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:rgba(14,11,22,.85);
  font-family:'Azeret Mono',monospace;font-size:12px;
  border-bottom:1px solid var(--border);
}
#ui .title{font-family:'Vollkorn',serif;font-weight:900;font-size:18px;
  background:linear-gradient(90deg,var(--fox),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#ui .stats{display:flex;gap:16px;color:var(--muted)}
#ui .stats b{color:var(--gold)}
canvas{display:block;image-rendering:pixelated}
#start-screen{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);gap:16px;
}
#start-screen h1{
  font-size:42px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(90deg,var(--fox),var(--gold),var(--leaf));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#start-screen .sub{font-family:'Azeret Mono',monospace;font-size:13px;color:var(--muted)}
#start-screen .fox-preview{font-size:80px;line-height:1;color:var(--fox);position:relative}
#start-screen .controls{
  margin-top:12px;font-family:'Azeret Mono',monospace;font-size:11px;
  color:var(--muted);text-align:center;line-height:1.8;
}
#start-screen .controls kbd{
  background:var(--card);border:1px solid var(--border);border-radius:4px;
  padding:2px 8px;color:var(--text);font-size:12px;
}
#start-btn{
  margin-top:8px;padding:12px 40px;border:none;border-radius:8px;
  background:var(--fox);color:#fff;font-family:'Vollkorn',serif;
  font-size:18px;font-weight:700;cursor:pointer;transition:all .15s;
}
#start-btn:hover{background:var(--fox2);transform:scale(1.05)}
#death-screen{
  position:fixed;inset:0;z-index:20;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(14,11,22,.92);gap:12px;
}
#death-screen h2{font-size:32px;color:var(--fox)}
#death-screen .info{font-family:'Azeret Mono',monospace;font-size:13px;color:var(--muted)}
#win-screen{
  position:fixed;inset:0;z-index:20;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(14,11,22,.92);gap:12px;
}
#win-screen h2{font-size:36px;color:var(--gold)}
#win-screen .info{font-family:'Azeret Mono',monospace;font-size:13px;color:var(--muted)}
.retry-btn{
  margin-top:8px;padding:10px 32px;border:none;border-radius:8px;
  background:var(--fox);color:#fff;font-family:'Vollkorn',serif;
  font-size:16px;font-weight:700;cursor:pointer;
}
.retry-btn:hover{background:var(--fox2)}
/* Mobile controls */
#touch-controls{
  position:fixed;bottom:12px;left:0;right:0;z-index:15;
  display:none;justify-content:space-between;padding:0 16px;
}
.touch-zone{display:flex;gap:8px}
.touch-btn{
  width:56px;height:56px;border-radius:12px;
  background:rgba(255,140,66,.2);border:2px solid rgba(255,140,66,.4);
  color:var(--fox);font-family:'Azeret Mono',monospace;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
}
.touch-btn:active{background:rgba(255,140,66,.45)}
.bl{position:fixed;bottom:4px;left:50%;transform:translateX(-50%);font-size:10px;opacity:.2;z-index:5}
.bl a{color:var(--muted);text-decoration:none}
@media(pointer:coarse){#touch-controls{display:flex}}
@media(max-width:600px){
  #start-screen h1{font-size:28px}
  #start-screen .fox-preview{font-size:56px}
}
</style>
</head>
<body>

<div id="ui">
  <span class="title">FOX FONT QUEST</span>
  <div class="stats">
    <span>Level <b id="ui-level">1</b></span>
    <span>Word <b id="ui-word" style="color:#4ecdc4;letter-spacing:2px">_ _ _</b></span>
    <span>Lives <b id="ui-lives">3</b></span>
  </div>
</div>

<div id="start-screen">
  <div class="fox-preview">F</div>
  <h1>FOX FONT QUEST</h1>
  <div class="sub">collect letters in order to spell words!</div>
  <div class="controls">
    <kbd>W</kbd> / <kbd>↑</kbd> / <kbd>Space</kbd> Jump<br>
    <kbd>A</kbd> / <kbd>←</kbd> Left &nbsp; <kbd>D</kbd> / <kbd>→</kbd> Right
  </div>
  <button id="start-btn">START</button>
</div>

<div id="death-screen">
  <h2>YOU FELL!</h2>
  <div class="info" id="death-info"></div>
  <button class="retry-btn" id="retry-btn">TRY AGAIN</button>
</div>

<div id="win-screen">
  <h2>LEVEL COMPLETE!</h2>
  <div class="info" id="win-info"></div>
  <button class="retry-btn" id="next-btn">NEXT LEVEL</button>
</div>

<div id="touch-controls">
  <div class="touch-zone">
    <button class="touch-btn" id="tb-left">◀</button>
    <button class="touch-btn" id="tb-right">▶</button>
  </div>
  <div class="touch-zone">
    <button class="touch-btn" id="tb-jump">▲</button>
  </div>
</div>

<canvas id="c"></canvas>
<div class="bl"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Constants ──
const TILE = 32;
const GRAVITY = 0.55;
const JUMP_FORCE = -10.5;
const MOVE_SPEED = 4.2;
const FRICTION = 0.82;
const MAX_FALL = 12;

// ── Colors ──
const COL = {
  bg: '#0e0b16', bgGrad: '#16122a',
  fox: '#ff8c42', fox2: '#e06820', foxLight: '#ffb088',
  gold: '#ffd166', leaf: '#4ecdc4', purple: '#8b5cf6',
  spike: '#e05555', platform: '#2e2844', platTop: '#443a66',
  flag: '#4ecdc4', text: '#ede8f5',
};

// ── Game state ──
let W, H, cols, rows;
let player, camera, keys, level, letters, lives, totalLetters, currentLevel, running, gameStarted;
let particles = [];
let frameCount = 0;
let wordBuffer = '';      // letters collected so far
let targetWord = '';      // the word to spell this level
let wordsCompleted = 0;   // total words spelled across all levels
let wordFlash = 0;        // flash timer when word completed

// ── Word lists per level ──
const LEVEL_WORDS = [
  ['FOX','DEN','PAW','RUN','SUN','OWL','FUR','GEM','OAK','DEW'],
  ['AMBER','FLAME','BRUSH','CEDAR','THORN','STORM','RAVEN','QUEST','NOBLE','ORBIT'],
  ['LUNAR','GLYPH','PLUME','JEWEL','VIVID','IVORY','EMBER','DELTA','HASTE','ZESTY'],
  ['SERPENT','ALCHEMY','CASCADE','FLICKER','LANTERN','HARMONY','MYSTERY','RADIANT'],
  ['WHISPER','PARADOX','KINGDOM','ENCHANT','ORCHARD','TEMPEST','IMPULSE','NURTURE'],
  ['JUBILEE','ZEALOUS','VANTAGE','BLOSSOM','DELIGHT','GLIMPSE','QUILTED','UMBRAGE'],
];

// ── Levels ──
// Legend: . = air, # = platform, S = spike, L = letter, F = flag, P = player start
// M = moving platform anchor
const LEVELS = [
  { name: 'Whispering Meadow', bg1: '#0e1a12', bg2: '#0e0b16', map: [
    '................................',
    '................................',
    '................................',
    '..............L....L............',
    '.......####...####..####........',
    '................................',
    '...L........L...........L..F....',
    '..####....####.....########.....',
    '................................',
    '.......L........................',
    '...########...L......L..........',
    '...............####...####......',
    '.P..............................',
    '####...####....####.....####....',
    '................................',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name: 'Amber Thicket', bg1: '#1a1008', bg2: '#0e0b16', map: [
    '................................',
    '.......................F.........',
    '....................########....',
    '................................',
    '...........L......L.............',
    '.........####..####.............',
    '................................',
    '....L..........L....L...........',
    '..####.......####..####.........',
    '................................',
    '..........L.....................',
    '.P.......####....L..............',
    '####.............####...........',
    '..............####.....####.....',
    '................................',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name: 'Moonlit Cavern', bg1: '#0e0e20', bg2: '#080818', map: [
    '................................',
    '..F.............................',
    '.####...........................',
    '.........L......................',
    '......####......................',
    '...............L..L.............',
    '..........S..####..####........',
    '................................',
    '...L...........L................',
    '..####.......####....L..........',
    '..........S.........####.S.....',
    '................................',
    '.P............L.................',
    '####..S..####..####....####....',
    '................................',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name: 'Crimson Peak', bg1: '#1a0808', bg2: '#0e0b16', map: [
    '................................',
    '.....................F..........',
    '....................####........',
    '.................L..............',
    '...............####.............',
    '...........S.......S............',
    '..........L......L..............',
    '........####..####..............',
    '.....S..........................',
    '....L.......L...................',
    '..####.S..####.S................',
    '................................',
    '.P.............................L',
    '####..S..####..S..####..S.####.',
    '................................',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name: 'Frozen Archive', bg1: '#081820', bg2: '#050e18', map: [
    '................................',
    '..............................F.',
    '............................####',
    '.....................L..........',
    '..................S.####........',
    '................L...............',
    '.............####..S............',
    '..........L.....................',
    '.........####.......L..........',
    '......S..........####.S........',
    '....L.....L.....................',
    '..####..####..S.................',
    '.P..............................',
    '####.S...####.S...####.S..####.',
    '................................',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name: 'The Void Spire', bg1: '#10061a', bg2: '#06020e', map: [
    '..............F.................',
    '.............####...............',
    '...........L....................',
    '..........####..................',
    '........S....S..................',
    '.......L......L.................',
    '......####..####................',
    '....S.............S.............',
    '...L........L...................',
    '..####.S..####.S................',
    '.........S......................',
    '......L.......L....L............',
    '.P...####..####..####...........',
    '####.S.........S.......S..####.',
    '................................',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
];

// ── Tile parsing ──
let tiles, spikes, letterPickups, flag, startPos, movingPlatforms;

function pickTargetWord(idx) {
  const pool = LEVEL_WORDS[idx % LEVEL_WORDS.length];
  return pool[Math.floor(Math.random() * pool.length)];
}

function parseLevel(idx) {
  const lv = LEVELS[idx % LEVELS.length];
  tiles = []; spikes = []; letterPickups = []; flag = null; startPos = {x:2,y:12};
  movingPlatforms = [];
  const map = lv.map;
  rows = map.length;
  cols = map[0].length;

  // Pick a target word and assign its letters to L slots
  targetWord = pickTargetWord(idx);
  wordBuffer = '';
  wordFlash = 0;

  // Collect all L positions from the map
  const letterSlots = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const ch = map[r][c];
      if (ch === '#') tiles.push({x: c*TILE, y: r*TILE, w: TILE, h: TILE});
      else if (ch === 'S') spikes.push({x: c*TILE, y: r*TILE, w: TILE, h: TILE});
      else if (ch === 'L') letterSlots.push({x: c*TILE + TILE/2, y: r*TILE + TILE/2});
      else if (ch === 'F') flag = {x: c*TILE, y: r*TILE - TILE/2};
      else if (ch === 'P') startPos = {x: c*TILE, y: r*TILE - TILE};
    }
  }

  // Place the target word's letters in order across the slots
  // If more slots than letters, fill extras with random decoy letters
  const wordLetters = [...targetWord];
  const decoys = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

  for (let i = 0; i < letterSlots.length; i++) {
    const slot = letterSlots[i];
    let letter, isTarget;
    if (i < wordLetters.length) {
      letter = wordLetters[i];
      isTarget = true;
    } else {
      // Decoy letter (not in remaining needed letters to avoid confusion)
      let d;
      do { d = decoys[Math.floor(Math.random() * 26)]; }
      while (targetWord.includes(d));
      letter = d;
      isTarget = false;
    }
    letterPickups.push({
      x: slot.x, y: slot.y,
      letter, collected: false, bobOffset: Math.random()*Math.PI*2,
      isTarget, // true = part of the word, false = decoy
      wordIndex: isTarget ? i : -1, // position in the target word
    });
  }

  totalLetters = wordLetters.length;
}

// ── Player ──
function createPlayer() {
  return {
    x: startPos.x, y: startPos.y,
    vx: 0, vy: 0,
    w: 26, h: 32,
    onGround: false,
    facing: 1,
    jumpBuffer: 0,
    coyoteTime: 0,
    squash: 1, // for squash/stretch
    earBob: 0,
  };
}

// ── Input ──
keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Touch
function setupTouch() {
  const bind = (id, key) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; }, {passive:false});
    el.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; }, {passive:false});
    el.addEventListener('mousedown', e => { keys[key] = true; });
    el.addEventListener('mouseup', e => { keys[key] = false; });
  };
  bind('tb-left', 'a');
  bind('tb-right', 'd');
  bind('tb-jump', 'w');
}

// ── Physics ──
function updatePlayer() {
  const p = player;
  p.earBob += 0.12;

  // Input
  let moveX = 0;
  if (keys['a'] || keys['arrowleft']) { moveX = -1; p.facing = -1; }
  if (keys['d'] || keys['arrowright']) { moveX = 1; p.facing = 1; }

  p.vx += moveX * 1.2;
  p.vx *= FRICTION;
  if (Math.abs(p.vx) > MOVE_SPEED) p.vx = Math.sign(p.vx) * MOVE_SPEED;
  if (Math.abs(p.vx) < 0.1) p.vx = 0;

  // Jump
  const wantJump = keys['w'] || keys['arrowup'] || keys[' '];
  if (wantJump) p.jumpBuffer = 6;
  if (p.jumpBuffer > 0 && p.coyoteTime > 0) {
    p.vy = JUMP_FORCE;
    p.jumpBuffer = 0;
    p.coyoteTime = 0;
    p.squash = 0.7;
    spawnParticles(p.x + p.w/2, p.y + p.h, 5, COL.fox, 'jump');
  }
  if (p.jumpBuffer > 0) p.jumpBuffer--;

  // Gravity
  p.vy += GRAVITY;
  if (p.vy > MAX_FALL) p.vy = MAX_FALL;

  // Move X
  p.x += p.vx;
  resolveCollisions('x');

  // Move Y
  const wasOnGround = p.onGround;
  p.onGround = false;
  p.y += p.vy;
  resolveCollisions('y');

  if (p.onGround) {
    if (!wasOnGround && p.vy >= 0) {
      p.squash = 1.3;
      spawnParticles(p.x + p.w/2, p.y + p.h, 3, COL.fox, 'land');
    }
    p.coyoteTime = 6;
  } else {
    if (p.coyoteTime > 0) p.coyoteTime--;
  }

  // Squash recovery
  p.squash += (1 - p.squash) * 0.2;

  // World bounds
  if (p.x < 0) { p.x = 0; p.vx = 0; }
  if (p.x + p.w > cols * TILE) { p.x = cols * TILE - p.w; p.vx = 0; }

  // Spike check
  for (const s of spikes) {
    if (boxOverlap(p.x+4, p.y+4, p.w-8, p.h-8, s.x+4, s.y+8, s.w-8, s.h-12)) {
      die();
      return;
    }
  }

  // Letter pickups
  for (const l of letterPickups) {
    if (l.collected) continue;
    const dx = (p.x + p.w/2) - l.x;
    const dy = (p.y + p.h/2) - l.y;
    if (Math.sqrt(dx*dx + dy*dy) < 22) {
      l.collected = true;
      p.squash = 0.8;

      if (l.isTarget) {
        // Check if this is the next letter we need
        const nextIdx = wordBuffer.length;
        if (l.wordIndex === nextIdx) {
          wordBuffer += l.letter;
          letters = wordBuffer.length;
          spawnParticles(l.x, l.y, 10, COL.gold, 'collect');
          // Word complete?
          if (wordBuffer === targetWord) {
            wordsCompleted++;
            wordFlash = 60;
            // Big celebration particles
            for (let k = 0; k < 3; k++) {
              spawnParticles(p.x + p.w/2, p.y, 8, ['#ff8c42','#ffd166','#4ecdc4','#8b5cf6'][k%4], 'collect');
            }
          }
        } else {
          // Wrong order — collected but doesn't count, flash red
          spawnParticles(l.x, l.y, 6, COL.spike, 'collect');
        }
      } else {
        // Decoy letter — small penalty flash
        spawnParticles(l.x, l.y, 4, '#666', 'collect');
      }
      updateUI();
    }
  }

  // Flag check
  if (flag) {
    const dx = (p.x + p.w/2) - (flag.x + TILE/2);
    const dy = (p.y + p.h/2) - (flag.y + TILE/2);
    if (Math.sqrt(dx*dx + dy*dy) < 28) {
      winLevel();
    }
  }

  // Fall death
  if (p.y > rows * TILE + 100) die();
}

function resolveCollisions(axis) {
  const p = player;
  for (const t of tiles) {
    if (!boxOverlap(p.x, p.y, p.w, p.h, t.x, t.y, t.w, t.h)) continue;
    if (axis === 'x') {
      if (p.vx > 0) p.x = t.x - p.w;
      else if (p.vx < 0) p.x = t.x + t.w;
      p.vx = 0;
    } else {
      if (p.vy > 0) { p.y = t.y - p.h; p.vy = 0; p.onGround = true; }
      else if (p.vy < 0) { p.y = t.y + t.h; p.vy = 0; }
    }
  }
}

function boxOverlap(x1,y1,w1,h1,x2,y2,w2,h2) {
  return x1 < x2+w2 && x1+w1 > x2 && y1 < y2+h2 && y1+h1 > y2;
}

// ── Particles ──
function spawnParticles(x, y, count, color, type) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5) * (type==='collect'?6:3),
      vy: -Math.random() * (type==='jump'?4:type==='collect'?5:2) - 1,
      life: 1,
      decay: 0.02 + Math.random()*0.03,
      size: type==='collect' ? 3+Math.random()*3 : 2+Math.random()*2,
      color,
    });
  }
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ── Camera ──
function updateCamera() {
  const targetX = player.x + player.w/2 - W/2;
  const targetY = player.y + player.h/2 - H/2;
  camera.x += (targetX - camera.x) * 0.1;
  camera.y += (targetY - camera.y) * 0.1;
  camera.x = Math.max(0, Math.min(camera.x, cols*TILE - W));
  camera.y = Math.max(0, Math.min(camera.y, rows*TILE - H));
}

// ── Drawing ──
function draw() {
  const lv = LEVELS[currentLevel % LEVELS.length];

  // Background
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, lv.bg1);
  grad.addColorStop(1, lv.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Parallax stars
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  const seed = currentLevel * 1000;
  for (let i = 0; i < 40; i++) {
    const sx = ((seed+i*137)%1000)/1000 * (cols*TILE) - camera.x * 0.3;
    const sy = ((seed+i*251)%1000)/1000 * (rows*TILE) - camera.y * 0.3;
    const sz = 1 + ((seed+i*73)%3);
    ctx.fillRect(((sx % W) + W) % W, ((sy % H) + H) % H, sz, sz);
  }

  ctx.save();
  ctx.translate(-Math.round(camera.x), -Math.round(camera.y));

  // Platforms
  for (const t of tiles) {
    ctx.fillStyle = COL.platform;
    ctx.fillRect(t.x, t.y, t.w, t.h);
    ctx.fillStyle = COL.platTop;
    ctx.fillRect(t.x, t.y, t.w, 4);
    // Edge highlight
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(t.x, t.y, 2, t.h);
  }

  // Spikes
  for (const s of spikes) {
    ctx.fillStyle = COL.spike;
    const cx = s.x + TILE/2;
    ctx.beginPath();
    ctx.moveTo(s.x + 4, s.y + TILE);
    ctx.lineTo(cx, s.y + 6);
    ctx.lineTo(s.x + TILE - 4, s.y + TILE);
    ctx.fill();
    ctx.fillStyle = '#ff8888';
    ctx.beginPath();
    ctx.moveTo(s.x + 8, s.y + TILE);
    ctx.lineTo(cx, s.y + 12);
    ctx.lineTo(s.x + TILE - 8, s.y + TILE);
    ctx.fill();
  }

  // Letters
  for (const l of letterPickups) {
    if (l.collected) continue;
    const bob = Math.sin(frameCount * 0.06 + l.bobOffset) * 4;
    const glow = 0.3 + Math.sin(frameCount * 0.08 + l.bobOffset) * 0.2;
    const isNext = l.isTarget && l.wordIndex === wordBuffer.length;
    const col = l.isTarget ? COL.gold : '#665577';
    const glowCol = l.isTarget ? `rgba(255,209,102,${glow})` : `rgba(100,80,120,${glow*0.6})`;
    // Pulse ring on next target letter
    if (isNext) {
      const pulse = 0.4 + Math.sin(frameCount * 0.12) * 0.3;
      ctx.strokeStyle = `rgba(78,205,196,${pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(l.x, l.y + bob, 16 + Math.sin(frameCount*0.1)*2, 0, Math.PI*2);
      ctx.stroke();
    }
    // Glow
    ctx.fillStyle = glowCol;
    ctx.beginPath();
    ctx.arc(l.x, l.y + bob, 14, 0, Math.PI*2);
    ctx.fill();
    // Letter
    ctx.fillStyle = col;
    ctx.font = 'bold 18px Vollkorn, serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(l.letter, l.x, l.y + bob);
  }

  // Flag
  if (flag) {
    const wave = Math.sin(frameCount * 0.08) * 3;
    // Pole
    ctx.fillStyle = '#aaa';
    ctx.fillRect(flag.x + TILE/2 - 2, flag.y, 4, TILE*1.5);
    // Flag cloth
    ctx.fillStyle = COL.flag;
    ctx.beginPath();
    ctx.moveTo(flag.x + TILE/2 + 2, flag.y);
    ctx.lineTo(flag.x + TILE/2 + 22, flag.y + 10 + wave);
    ctx.lineTo(flag.x + TILE/2 + 2, flag.y + 22);
    ctx.fill();
    // Sparkle
    if (frameCount % 20 < 10) {
      ctx.fillStyle = 'rgba(78,205,196,0.5)';
      ctx.beginPath();
      ctx.arc(flag.x+TILE/2+12, flag.y+11, 3+Math.sin(frameCount*0.15)*2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Player (the letter F with fox ears!)
  drawPlayer();

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // ── Word buffer HUD (screen-space) ──
  if (running || wordFlash > 0) {
    const hudY = H - 48;
    const hudX = W / 2;
    const tLen = targetWord.length;
    const boxW = 28;
    const boxH = 34;
    const gap = 6;
    const totalW = tLen * boxW + (tLen - 1) * gap;
    const startX = hudX - totalW / 2;

    // Background bar
    ctx.fillStyle = 'rgba(14,11,22,0.8)';
    const pad = 12;
    ctx.beginPath();
    ctx.roundRect(startX - pad, hudY - pad, totalW + pad*2, boxH + pad*2, 8);
    ctx.fill();
    ctx.strokeStyle = 'rgba(46,40,68,0.8)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(startX - pad, hudY - pad, totalW + pad*2, boxH + pad*2, 8);
    ctx.stroke();

    // Word flash effect
    if (wordFlash > 0) {
      const flashAlpha = wordFlash / 60 * 0.4;
      ctx.fillStyle = `rgba(78,205,196,${flashAlpha})`;
      ctx.beginPath();
      ctx.roundRect(startX - pad, hudY - pad, totalW + pad*2, boxH + pad*2, 8);
      ctx.fill();
      wordFlash--;
    }

    for (let i = 0; i < tLen; i++) {
      const bx = startX + i * (boxW + gap);
      const filled = i < wordBuffer.length;
      const isNext = i === wordBuffer.length;

      // Box
      ctx.fillStyle = filled ? 'rgba(255,209,102,0.15)' : 'rgba(26,21,37,0.6)';
      ctx.strokeStyle = filled ? COL.gold : isNext ? COL.leaf : '#2e2844';
      ctx.lineWidth = filled ? 2 : isNext ? 2 : 1;
      ctx.beginPath();
      ctx.roundRect(bx, hudY, boxW, boxH, 4);
      ctx.fill();
      ctx.stroke();

      // Letter
      if (filled) {
        ctx.fillStyle = COL.gold;
        ctx.font = 'bold 20px Vollkorn, serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(wordBuffer[i], bx + boxW/2, hudY + boxH/2);
      } else if (isNext) {
        // Hint: show a dim underscore
        ctx.fillStyle = 'rgba(78,205,196,0.4)';
        ctx.font = 'bold 20px Vollkorn, serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('_', bx + boxW/2, hudY + boxH/2 - 2);
      }
    }

    // Word label
    if (wordBuffer === targetWord) {
      ctx.fillStyle = COL.leaf;
      ctx.font = 'bold 13px "Azeret Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('WORD COMPLETE!', hudX, hudY - 18);
    }
  }
}

function drawPlayer() {
  const p = player;
  const cx = p.x + p.w/2;
  const cy = p.y + p.h/2;

  ctx.save();
  ctx.translate(cx, cy);

  // Squash/stretch
  const sy = p.squash;
  const sx = 2 - sy;
  ctx.scale(sx * p.facing, sy);

  // Ear bob
  const earWag = Math.sin(p.earBob) * (Math.abs(p.vx) > 1 ? 6 : 2);
  const earWag2 = Math.sin(p.earBob + 0.8) * (Math.abs(p.vx) > 1 ? 6 : 2);

  // Fox ears (behind)
  // Left ear
  ctx.fillStyle = COL.fox;
  ctx.beginPath();
  ctx.moveTo(-10, -8);
  ctx.lineTo(-6 + earWag*0.3, -26);
  ctx.lineTo(0, -10);
  ctx.fill();
  // Inner ear
  ctx.fillStyle = COL.foxLight;
  ctx.beginPath();
  ctx.moveTo(-8, -10);
  ctx.lineTo(-5 + earWag*0.3, -22);
  ctx.lineTo(-1, -11);
  ctx.fill();

  // Right ear
  ctx.fillStyle = COL.fox;
  ctx.beginPath();
  ctx.moveTo(10, -8);
  ctx.lineTo(6 + earWag2*0.3, -26);
  ctx.lineTo(0, -10);
  ctx.fill();
  // Inner ear
  ctx.fillStyle = COL.foxLight;
  ctx.beginPath();
  ctx.moveTo(8, -10);
  ctx.lineTo(5 + earWag2*0.3, -22);
  ctx.lineTo(1, -11);
  ctx.fill();

  // The letter F
  ctx.fillStyle = COL.fox;
  ctx.font = 'bold 36px Vollkorn, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('F', 0, 2);

  // Outline glow when moving
  if (Math.abs(p.vx) > 2) {
    ctx.strokeStyle = `rgba(255,140,66,0.4)`;
    ctx.lineWidth = 2;
    ctx.strokeText('F', 0, 2);
  }

  // Eyes (on the F)
  const blink = (frameCount % 180 < 5);
  const eyeY = -4;
  if (!blink) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-4, eyeY, 2.5, 0, Math.PI*2);
    ctx.arc(5, eyeY, 2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#1a1525';
    ctx.beginPath();
    ctx.arc(-4, eyeY, 1.2, 0, Math.PI*2);
    ctx.arc(5, eyeY, 1.2, 0, Math.PI*2);
    ctx.fill();
  } else {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-6, eyeY); ctx.lineTo(-2, eyeY);
    ctx.moveTo(3, eyeY); ctx.lineTo(7, eyeY);
    ctx.stroke();
  }

  // Tail
  const tailX = -10;
  const tailY = 10;
  const tailWag = Math.sin(p.earBob * 1.5) * 8;
  ctx.strokeStyle = COL.fox;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(tailX, tailY);
  ctx.quadraticCurveTo(tailX - 12, tailY - 5 + tailWag, tailX - 16, tailY - 12 + tailWag);
  ctx.stroke();
  // Tail tip
  ctx.strokeStyle = COL.gold;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(tailX - 14, tailY - 10 + tailWag);
  ctx.lineTo(tailX - 18, tailY - 14 + tailWag);
  ctx.stroke();

  ctx.restore();
}

// ── Game flow ──
function die() {
  lives--;
  updateUI();
  if (lives <= 0) {
    running = false;
    spawnParticles(player.x+player.w/2, player.y+player.h/2, 20, COL.spike, 'collect');
    document.getElementById('death-info').textContent = `Spelled "${wordBuffer || '...'}" of "${targetWord}" on level ${currentLevel+1}`;
    document.getElementById('death-screen').style.display = 'flex';
  } else {
    // Respawn
    spawnParticles(player.x+player.w/2, player.y+player.h/2, 12, COL.spike, 'collect');
    player.x = startPos.x;
    player.y = startPos.y;
    player.vx = 0;
    player.vy = 0;
  }
}

function winLevel() {
  running = false;
  const wordBonus = wordBuffer === targetWord ? 50 : 0;
  const letterBonus = wordBuffer.length * 10;
  let info = `Word: ${wordBuffer.length}/${targetWord.length} letters`;
  if (wordBuffer === targetWord) info += ` — "${targetWord}" spelled! +${wordBonus} bonus!`;
  else info += ` (+${letterBonus} pts)`;
  document.getElementById('win-info').textContent = info;
  document.getElementById('win-screen').style.display = 'flex';
  saveBest();
}

function startLevel(idx) {
  currentLevel = idx;
  parseLevel(idx);
  player = createPlayer();
  camera = {x: 0, y: 0};
  letters = 0;
  wordBuffer = '';
  wordFlash = 0;
  particles = [];
  frameCount = 0;
  running = true;
  updateUI();
  document.getElementById('death-screen').style.display = 'none';
  document.getElementById('win-screen').style.display = 'none';
}

function startGame() {
  lives = 3;
  document.getElementById('start-screen').style.display = 'none';
  startLevel(0);
}

function updateUI() {
  document.getElementById('ui-level').textContent = currentLevel + 1;
  // Show word progress as letter boxes
  let wordDisp = '';
  for (let i = 0; i < targetWord.length; i++) {
    wordDisp += i < wordBuffer.length ? wordBuffer[i] : '_';
    if (i < targetWord.length - 1) wordDisp += ' ';
  }
  document.getElementById('ui-word').textContent = wordDisp;
  document.getElementById('ui-word').style.color = wordBuffer === targetWord ? '#4ecdc4' : '#ffd166';
  document.getElementById('ui-lives').textContent = lives;
}

// ── Save/load ──
function saveBest() {
  try {
    const data = JSON.parse(localStorage.getItem('fox_font_quest_plat') || '{}');
    data.bestLevel = Math.max(data.bestLevel || 0, currentLevel + 1);
    localStorage.setItem('fox_font_quest_plat', JSON.stringify(data));
  } catch(e) {}
}

// ── Resize ──
function resize() {
  W = Math.min(window.innerWidth, 960);
  H = Math.min(window.innerHeight, 640);
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── Game loop ──
function loop() {
  if (running) {
    updatePlayer();
    updateCamera();
    updateParticles();
    frameCount++;
  }
  draw();
  requestAnimationFrame(loop);
}

// ── Events ──
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', () => {
  lives = 3;
  startLevel(currentLevel);
});
document.getElementById('next-btn').addEventListener('click', () => {
  if (currentLevel + 1 < LEVELS.length) {
    startLevel(currentLevel + 1);
  } else {
    // Loop back with more lives
    lives = 3;
    startLevel(0);
  }
});
setupTouch();

// Prevent scrolling on space/arrows
window.addEventListener('keydown', e => {
  if ([32, 37, 38, 39, 40].includes(e.keyCode)) e.preventDefault();
});

// Start loop (shows start screen)
gameStarted = false;
running = false;
currentLevel = 0;
lives = 3;
letters = 0;
totalLetters = 0;
parseLevel(0);
player = createPlayer();
camera = {x: 0, y: 0};
loop();
</script>
