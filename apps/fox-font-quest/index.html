<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Font Quest — Word Puzzle Adventure</title>
<link rel="icon" href="https://emojicdn.elk.sh/🦊">
<meta property="og:title" content="Fox Font Quest">
<meta property="og:description" content="Guide a fox-eared hero through word puzzles across enchanted lands.">
<meta property="og:url" content="https://sloppy.live/fox-font-quest">
<meta property="og:image" content="https://sloppy.live/fox-font-quest/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Vollkorn:wght@400;700;900&family=Azeret+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e0b16;--card:#1a1525;--border:#2e2844;
  --fox:#ff8c42;--fox2:#e06820;--gold:#ffd166;
  --leaf:#4ecdc4;--text:#ede8f5;--muted:#7a7092;
  --correct:#4ecdc4;--wrong:#e05555;
}
body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background:var(--bg);color:var(--text);font-family:'Vollkorn',serif;
  overflow-x:hidden;
}
.wrap{max-width:600px;width:100%;padding:14px}

/* Fox character */
#fox-area{display:flex;justify-content:center;margin:10px 0}
.fox{position:relative;width:80px;height:80px}
.fox-body{
  width:60px;height:50px;background:var(--fox);border-radius:50% 50% 40% 40%;
  position:absolute;bottom:0;left:10px;
}
.fox-head{
  width:44px;height:36px;background:var(--fox);border-radius:50% 50% 30% 30%;
  position:absolute;top:14px;left:18px;z-index:2;
}
.fox-ear{
  width:0;height:0;position:absolute;top:0;z-index:3;
  border-left:8px solid transparent;border-right:8px solid transparent;
  border-bottom:20px solid var(--fox);
}
.fox-ear.l{left:16px;transform:rotate(-12deg)}
.fox-ear.r{right:16px;transform:rotate(12deg)}
.fox-ear-inner{
  width:0;height:0;position:absolute;top:5px;z-index:4;
  border-left:5px solid transparent;border-right:5px solid transparent;
  border-bottom:12px solid #ffb088;
}
.fox-ear-inner.l{left:19px;transform:rotate(-12deg)}
.fox-ear-inner.r{right:19px;transform:rotate(12deg)}
.fox-eye{
  width:6px;height:7px;background:#1a1525;border-radius:50%;
  position:absolute;top:24px;z-index:5;
}
.fox-eye.l{left:26px}
.fox-eye.r{left:44px}
.fox-nose{
  width:8px;height:5px;background:#2a1a10;border-radius:50%;
  position:absolute;top:32px;left:36px;z-index:5;
}
.fox-tail{
  width:30px;height:14px;background:var(--fox);border-radius:0 50% 50% 0;
  position:absolute;bottom:12px;right:-8px;transform:rotate(-20deg);
}
.fox-tail-tip{
  width:12px;height:14px;background:var(--gold);border-radius:0 50% 50% 0;
  position:absolute;bottom:12px;right:-16px;transform:rotate(-20deg);
}
.fox-mouth{
  width:10px;height:4px;border-bottom:2px solid #2a1a10;border-radius:0 0 50% 50%;
  position:absolute;top:34px;left:33px;z-index:5;
}
.fox.happy .fox-eye{height:3px;top:26px;border-radius:50% 50% 0 0}
.fox.sad .fox-mouth{border-bottom:none;border-top:2px solid #2a1a10;border-radius:50% 50% 0 0;top:36px}
@keyframes foxBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fox.bounce{animation:foxBounce .4s ease}

/* Header */
header{text-align:center;padding:8px 0}
header h1{
  font-size:26px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(90deg,var(--fox),var(--gold),var(--leaf));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
header .sub{font-size:11px;color:var(--muted);font-family:'Azeret Mono',monospace;margin-top:2px}

/* Progress */
#progress-bar{
  display:flex;align-items:center;gap:8px;margin:8px 0 12px;
  font-family:'Azeret Mono',monospace;font-size:11px;color:var(--muted);
}
#progress-track{flex:1;height:8px;background:var(--card);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
#progress-fill{height:100%;background:linear-gradient(90deg,var(--fox),var(--gold));border-radius:4px;transition:width .4s}
#level-badge{
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:3px 10px;font-family:'Azeret Mono',monospace;font-size:11px;color:var(--gold);
}

/* World info */
#world-name{
  text-align:center;font-size:16px;font-weight:700;color:var(--leaf);
  margin-bottom:4px;letter-spacing:1px;
}
#puzzle-type{
  text-align:center;font-size:11px;color:var(--muted);
  font-family:'Azeret Mono',monospace;margin-bottom:12px;
}

/* Puzzle area */
#puzzle-area{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:20px;margin-bottom:12px;min-height:160px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#clue{
  font-size:15px;color:var(--text);text-align:center;margin-bottom:14px;
  line-height:1.5;max-width:460px;
}
#letter-display{
  display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;
}
.letter-box{
  width:38px;height:44px;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--border);border-radius:6px;
  font-size:22px;font-weight:900;text-transform:uppercase;
  font-family:'Vollkorn',serif;transition:all .2s;
}
.letter-box.filled{border-color:var(--fox);color:var(--fox)}
.letter-box.correct{border-color:var(--correct);color:var(--correct);background:rgba(78,205,196,.08)}
.letter-box.wrong{border-color:var(--wrong);color:var(--wrong);animation:shake .3s}
.letter-box.space{width:16px;border:none}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Input */
#input-row{display:flex;gap:6px;justify-content:center;align-items:center;margin-bottom:10px;flex-wrap:wrap}
#guess-input{
  width:220px;padding:8px 14px;border-radius:8px;
  background:var(--bg);border:2px solid var(--border);
  color:var(--text);font-family:'Vollkorn',serif;font-size:16px;
  text-transform:uppercase;outline:none;text-align:center;
}
#guess-input:focus{border-color:var(--fox)}
#submit-btn{
  padding:8px 18px;border-radius:8px;border:none;
  background:var(--fox);color:#fff;font-family:'Azeret Mono',monospace;
  font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;
}
#submit-btn:hover{background:var(--fox2)}

/* Scramble puzzle */
#scramble-tiles{
  display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;
}
.scr-tile{
  width:36px;height:40px;display:flex;align-items:center;justify-content:center;
  background:var(--bg);border:2px solid var(--border);border-radius:6px;
  font-size:20px;font-weight:900;text-transform:uppercase;
  font-family:'Vollkorn',serif;color:var(--gold);cursor:pointer;
  transition:all .15s;user-select:none;
}
.scr-tile:hover{border-color:var(--fox);transform:scale(1.08)}
.scr-tile.used{opacity:.25;pointer-events:none}

/* Message */
#msg{
  text-align:center;min-height:22px;font-size:13px;
  font-family:'Azeret Mono',monospace;margin-bottom:8px;
}
#msg.win{color:var(--correct)}
#msg.wrong{color:var(--wrong)}

/* Stats */
#stats{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px;text-align:center;font-family:'Azeret Mono',monospace;
  font-size:11px;color:var(--muted);
}
#stats b{color:var(--text);font-size:13px}
.bl{text-align:center;padding:8px 0 16px;font-size:10px;opacity:.25}
.bl a{color:var(--muted);text-decoration:none}

/* Choice buttons */
#choices{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.choice-btn{
  padding:8px 16px;border-radius:8px;border:2px solid var(--border);
  background:var(--bg);color:var(--text);font-family:'Vollkorn',serif;
  font-size:14px;cursor:pointer;transition:all .15s;
}
.choice-btn:hover{border-color:var(--fox);color:var(--fox)}
.choice-btn.correct-pick{border-color:var(--correct);background:rgba(78,205,196,.1);color:var(--correct)}
.choice-btn.wrong-pick{border-color:var(--wrong);background:rgba(224,85,85,.1);color:var(--wrong)}

@media(max-width:480px){
  .letter-box{width:32px;height:38px;font-size:18px}
  .scr-tile{width:30px;height:34px;font-size:16px}
  #guess-input{width:160px;font-size:14px}
  header h1{font-size:22px}
  .fox{transform:scale(.85)}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>FOX FONT QUEST</h1>
    <div class="sub">word puzzles across enchanted lands</div>
  </header>
  <div id="fox-area">
    <div class="fox" id="fox">
      <div class="fox-ear l"></div>
      <div class="fox-ear r"></div>
      <div class="fox-ear-inner l"></div>
      <div class="fox-ear-inner r"></div>
      <div class="fox-head"></div>
      <div class="fox-eye l"></div>
      <div class="fox-eye r"></div>
      <div class="fox-nose"></div>
      <div class="fox-mouth"></div>
      <div class="fox-body"></div>
      <div class="fox-tail"></div>
      <div class="fox-tail-tip"></div>
    </div>
  </div>
  <div id="progress-bar">
    <span id="level-badge">LV 1</span>
    <div id="progress-track"><div id="progress-fill" style="width:0%"></div></div>
    <span id="score-display">0 pts</span>
  </div>
  <div id="world-name"></div>
  <div id="puzzle-type"></div>
  <div id="puzzle-area">
    <div id="clue"></div>
    <div id="letter-display"></div>
    <div id="scramble-tiles"></div>
    <div id="choices"></div>
    <div id="input-row">
      <input type="text" id="guess-input" autocomplete="off" spellcheck="false" placeholder="Type answer...">
      <button id="submit-btn">GO</button>
    </div>
  </div>
  <div id="msg"></div>
  <div id="stats">
    Puzzles: <b id="st-solved">0</b> &nbsp; Score: <b id="st-score">0</b> &nbsp; Level: <b id="st-level">1</b>
  </div>
</div>
<div class="bl"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
// ── Worlds — 6 themed regions ──
const WORLDS=[
  {name:'Whispering Meadow',color:'#4ecdc4',puzzles:5},
  {name:'Amber Thicket',color:'#ff8c42',puzzles:6},
  {name:'Moonlit Cavern',color:'#818cf8',puzzles:6},
  {name:'Crimson Peak',color:'#e05555',puzzles:7},
  {name:'Frozen Archive',color:'#8ecae6',puzzles:7},
  {name:'The Void Spire',color:'#c084fc',puzzles:8},
];

// ── Word data ──
const WORDS={
  easy:["fox","den","paw","fur","run","sun","log","dew","owl","elm","fin","gem","hue","ink","jam","key","lip","mud","net","oak"],
  medium:["amber","brush","cedar","delta","ember","flame","glyph","haste","ivory","jewel","knack","lunar","mossy","noble","orbit","plume","quest","raven","storm","thorn","ultra","vivid","wager","xenon","yield","zesty"],
  hard:["alchemy","blossom","cascade","delight","enchant","flicker","glimpse","harmony","impulse","jubilee","kingdom","lantern","mystery","nurture","orchard","paradox","quilted","radiant","serpent","tempest","umbrage","vantage","whisper","zealous"],
};

// ── Puzzle types ──
// 1. Anagram: unscramble letters
// 2. Fill blanks: word with missing letters + clue
// 3. Definition: pick the right word from 4 choices
// 4. Riddle: solve a riddle

const CLUES={
  easy:{
    fox:"A cunning orange animal with a bushy tail",
    den:"Where animals sleep at night",
    paw:"An animal's foot",
    fur:"Soft covering on an animal",
    run:"To move quickly on foot",
    sun:"The star that lights the day",
    log:"A fallen piece of tree",
    dew:"Morning water drops on grass",
    owl:"A bird that hoots at night",
    elm:"A type of tall tree",
    fin:"A fish uses this to swim",
    gem:"A precious shiny stone",
    hue:"Another word for color",
    ink:"Used to write on paper",
    jam:"Sweet fruit spread",
    key:"Opens a lock",
    lip:"Part of your mouth",
    mud:"Wet dirt",
    net:"Used to catch fish or butterflies",
    oak:"A strong tree with acorns",
  },
  medium:{
    amber:"Fossilized tree resin, golden in color",
    brush:"A tool for painting or grooming",
    cedar:"An aromatic evergreen tree",
    delta:"Where a river meets the sea",
    ember:"A glowing piece from a dying fire",
    flame:"The visible part of fire",
    glyph:"A carved or written symbol",
    haste:"Great speed or urgency",
    ivory:"The color of elephant tusks",
    jewel:"A precious ornamental stone",
    knack:"A natural talent for something",
    lunar:"Relating to the moon",
    mossy:"Covered in soft green growth",
    noble:"Of high moral character",
    orbit:"The path around a planet or star",
    plume:"A large feather or column of smoke",
    quest:"A long search for something",
    raven:"A large black bird",
    storm:"A violent disturbance of weather",
    thorn:"A sharp point on a plant",
    ultra:"Extremely, beyond normal",
    vivid:"Intensely bright or deep in color",
    wager:"A bet on an uncertain outcome",
    xenon:"A noble gas used in bright lamps",
    yield:"To produce or give way",
    zesty:"Having strong pleasant flavor",
  },
  hard:{
    alchemy:"Medieval science of turning metals to gold",
    blossom:"A flower, especially one on a fruit tree",
    cascade:"A waterfall or series of falling things",
    delight:"Great pleasure or joy",
    enchant:"To charm or cast a spell on",
    flicker:"To shine with an unsteady light",
    glimpse:"A brief, incomplete view of something",
    harmony:"A pleasing arrangement of parts",
    impulse:"A sudden urge to act without thinking",
    jubilee:"A special anniversary celebration",
    kingdom:"A country ruled by a king or queen",
    lantern:"A portable lamp with a case",
    mystery:"Something unexplained or secret",
    nurture:"To care for and encourage growth",
    orchard:"A garden of fruit trees",
    paradox:"A seemingly contradictory statement",
    quilted:"Stitched with padding between layers",
    radiant:"Shining brightly, glowing",
    serpent:"A large snake",
    tempest:"A violent windstorm",
    umbrage:"Offense or annoyance",
    vantage:"A position giving a good view",
    whisper:"To speak very softly",
    zealous:"Having great energy or enthusiasm",
  }
};

const RIDDLES=[
  {q:"I have a tail and ears but I am not a dog. I am orange and sly. What am I?",a:"fox"},
  {q:"I have hands but cannot clap. I have a face but cannot smile. What am I?",a:"clock"},
  {q:"I get smaller every time I take a bath. What am I?",a:"soap"},
  {q:"I have keys but no locks. I have space but no room. What am I?",a:"keyboard"},
  {q:"The more you take, the more you leave behind. What am I?",a:"footsteps"},
  {q:"I speak without a mouth and hear without ears. I have no body, but I come alive with wind. What am I?",a:"echo"},
  {q:"I can fly without wings. I can cry without eyes. Wherever I go, darkness follows. What am I?",a:"cloud"},
  {q:"What has cities but no houses, forests but no trees, and water but no fish?",a:"map"},
  {q:"I am always hungry, I must always be fed. The finger I touch will soon turn red. What am I?",a:"fire"},
  {q:"What can travel around the world while staying in a corner?",a:"stamp"},
  {q:"I have branches but no fruit, trunk, or leaves. What am I?",a:"bank"},
  {q:"What begins with T, ends with T, and has T in it?",a:"teapot"},
];

// ── State ──
let level=1, score=0, worldIdx=0, puzzleInWorld=0, totalSolved=0;
let currentPuzzle=null, currentAnswer='', scrambleInput='';

function getDifficulty(){
  if(worldIdx<=1) return 'easy';
  if(worldIdx<=3) return 'medium';
  return 'hard';
}

function getWordPool(){
  const diff=getDifficulty();
  return Object.keys(CLUES[diff]);
}

// ── Puzzle generators ──
function genAnagram(){
  const pool=getWordPool();
  const word=pool[Math.floor(Math.random()*pool.length)];
  const diff=getDifficulty();
  const letters=[...word].sort(()=>Math.random()-.5);
  // Ensure scrambled !== original
  if(letters.join('')===word) { const t=letters[0];letters[0]=letters[1];letters[1]=t; }
  return {type:'anagram',word,letters,clue:CLUES[diff][word]};
}

function genFillBlanks(){
  const pool=getWordPool();
  const word=pool[Math.floor(Math.random()*pool.length)];
  const diff=getDifficulty();
  // Remove ~40% of letters
  const indices=[...Array(word.length).keys()];
  const removeCount=Math.max(1,Math.floor(word.length*0.4));
  const blanks=new Set();
  while(blanks.size<removeCount){
    blanks.add(indices[Math.floor(Math.random()*indices.length)]);
  }
  const display=[...word].map((c,i)=>blanks.has(i)?'_':c);
  return {type:'fill',word,display,clue:CLUES[diff][word]};
}

function genDefinition(){
  const pool=getWordPool();
  const diff=getDifficulty();
  const word=pool[Math.floor(Math.random()*pool.length)];
  // Pick 3 wrong answers
  const others=pool.filter(w=>w!==word);
  const wrongs=[];
  while(wrongs.length<3&&others.length>0){
    const idx=Math.floor(Math.random()*others.length);
    wrongs.push(others.splice(idx,1)[0]);
  }
  const options=[word,...wrongs].sort(()=>Math.random()-.5);
  return {type:'definition',word,clue:CLUES[diff][word],options};
}

function genRiddle(){
  const r=RIDDLES[Math.floor(Math.random()*RIDDLES.length)];
  return {type:'riddle',word:r.a,clue:r.q};
}

function generatePuzzle(){
  const types=['anagram','fill','definition','riddle'];
  // Weight by world progress
  const weights=worldIdx<2?[3,3,3,1]:[2,2,2,4];
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total,acc=0;
  let chosen='anagram';
  for(let i=0;i<types.length;i++){
    acc+=weights[i];
    if(r<acc){chosen=types[i];break;}
  }
  switch(chosen){
    case 'anagram': return genAnagram();
    case 'fill': return genFillBlanks();
    case 'definition': return genDefinition();
    case 'riddle': return genRiddle();
  }
}

// ── Render ──
function renderPuzzle(){
  const p=currentPuzzle;
  const clueEl=document.getElementById('clue');
  const letterEl=document.getElementById('letter-display');
  const scrambleEl=document.getElementById('scramble-tiles');
  const choicesEl=document.getElementById('choices');
  const inputRow=document.getElementById('input-row');
  const inputEl=document.getElementById('guess-input');

  clueEl.textContent='';
  letterEl.innerHTML='';
  scrambleEl.innerHTML='';
  choicesEl.innerHTML='';
  inputRow.style.display='none';
  document.getElementById('msg').textContent='';
  document.getElementById('msg').className='';
  scrambleInput='';

  const world=WORLDS[worldIdx]||WORLDS[WORLDS.length-1];
  document.getElementById('world-name').textContent=world.name;
  document.getElementById('world-name').style.color=world.color;

  if(p.type==='anagram'){
    document.getElementById('puzzle-type').textContent='UNSCRAMBLE THE WORD';
    clueEl.textContent='Hint: '+p.clue;
    // Show scrambled tiles to click
    p.letters.forEach((l,i)=>{
      const tile=document.createElement('div');
      tile.className='scr-tile';
      tile.textContent=l;
      tile.dataset.idx=i;
      tile.addEventListener('click',()=>clickScrambleTile(tile,l,i));
      scrambleEl.appendChild(tile);
    });
    // Show blank letter boxes
    for(let i=0;i<p.word.length;i++){
      const box=document.createElement('div');
      box.className='letter-box';
      box.id='lb-'+i;
      letterEl.appendChild(box);
    }
    // Also allow typing
    inputRow.style.display='flex';
    inputEl.value='';
    inputEl.placeholder='Or type answer...';
    inputEl.focus();

  } else if(p.type==='fill'){
    document.getElementById('puzzle-type').textContent='FILL IN THE BLANKS';
    clueEl.textContent=p.clue;
    p.display.forEach((c,i)=>{
      const box=document.createElement('div');
      box.className='letter-box';
      box.textContent=c==='_'?'':c;
      if(c!=='_') box.classList.add('filled');
      letterEl.appendChild(box);
    });
    inputRow.style.display='flex';
    inputEl.value='';
    inputEl.placeholder='Type the full word...';
    inputEl.focus();

  } else if(p.type==='definition'){
    document.getElementById('puzzle-type').textContent='PICK THE RIGHT WORD';
    clueEl.textContent='"'+p.clue+'"';
    p.options.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.textContent=opt.toUpperCase();
      btn.addEventListener('click',()=>pickChoice(btn,opt));
      choicesEl.appendChild(btn);
    });

  } else if(p.type==='riddle'){
    document.getElementById('puzzle-type').textContent='SOLVE THE RIDDLE';
    clueEl.textContent=p.clue;
    // Show blank boxes for answer
    for(let i=0;i<p.word.length;i++){
      const box=document.createElement('div');
      box.className='letter-box';
      letterEl.appendChild(box);
    }
    inputRow.style.display='flex';
    inputEl.value='';
    inputEl.placeholder='Type your answer...';
    inputEl.focus();
  }

  updateProgress();
}

// ── Scramble tile click ──
function clickScrambleTile(tile,letter,idx){
  if(tile.classList.contains('used')) return;
  tile.classList.add('used');
  scrambleInput+=letter;
  // Fill letter boxes
  const boxes=document.querySelectorAll('#letter-display .letter-box');
  const pos=scrambleInput.length-1;
  if(pos<boxes.length){
    boxes[pos].textContent=letter;
    boxes[pos].classList.add('filled');
  }
  // Auto-submit when full
  if(scrambleInput.length===currentPuzzle.word.length){
    setTimeout(()=>checkAnswer(scrambleInput),200);
  }
}

// ── Choice pick ──
function pickChoice(btn,word){
  if(word===currentPuzzle.word){
    btn.classList.add('correct-pick');
    puzzleWin();
  } else {
    btn.classList.add('wrong-pick');
    foxReact('sad');
    showMsg('Not quite! Try again.','wrong');
    setTimeout(()=>btn.classList.remove('wrong-pick'),600);
  }
}

// ── Submit ──
function submitGuess(){
  const input=document.getElementById('guess-input');
  const guess=input.value.trim().toLowerCase();
  if(!guess) return;
  checkAnswer(guess);
  input.value='';
}

function checkAnswer(guess){
  if(guess===currentPuzzle.word){
    puzzleWin();
  } else {
    foxReact('sad');
    showMsg('Wrong! The fox shakes its head...','wrong');
    // Show wrong on letter boxes
    document.querySelectorAll('#letter-display .letter-box.filled').forEach(b=>{
      if(!b.classList.contains('correct')) b.classList.add('wrong');
    });
    setTimeout(()=>{
      document.querySelectorAll('.letter-box.wrong').forEach(b=>b.classList.remove('wrong'));
      // Reset scramble input
      if(currentPuzzle.type==='anagram'){
        scrambleInput='';
        document.querySelectorAll('.scr-tile').forEach(t=>t.classList.remove('used'));
        document.querySelectorAll('#letter-display .letter-box').forEach(b=>{
          b.textContent='';b.classList.remove('filled','wrong');
        });
      }
    },800);
  }
}

function puzzleWin(){
  foxReact('happy');
  // Light up all letters green
  const boxes=document.querySelectorAll('#letter-display .letter-box');
  const word=currentPuzzle.word;
  boxes.forEach((b,i)=>{
    b.textContent=word[i]||'';
    b.className='letter-box correct';
  });

  const pts=currentPuzzle.type==='riddle'?30:currentPuzzle.type==='definition'?15:20;
  score+=pts;
  totalSolved++;
  puzzleInWorld++;
  level=Math.floor(totalSolved/3)+1;

  showMsg('🦊 +'+pts+' points!','win');
  saveState();
  updateStats();

  // Next puzzle after delay
  setTimeout(()=>{
    const world=WORLDS[worldIdx]||WORLDS[WORLDS.length-1];
    if(puzzleInWorld>=world.puzzles){
      worldIdx=Math.min(worldIdx+1,WORLDS.length-1);
      puzzleInWorld=0;
      showMsg('✨ Entered '+WORLDS[worldIdx].name+'!','win');
    }
    nextPuzzle();
  },1500);
}

function nextPuzzle(){
  currentPuzzle=generatePuzzle();
  currentAnswer=currentPuzzle.word;
  renderPuzzle();
}

// ── Fox reactions ──
function foxReact(mood){
  const fox=document.getElementById('fox');
  fox.className='fox '+mood+' bounce';
  setTimeout(()=>fox.className='fox',1200);
}

// ── UI helpers ──
function showMsg(text,cls){
  const msg=document.getElementById('msg');
  msg.textContent=text;
  msg.className=cls||'';
}

function updateProgress(){
  const world=WORLDS[worldIdx]||WORLDS[WORLDS.length-1];
  const pct=Math.min(100,Math.round((puzzleInWorld/world.puzzles)*100));
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('level-badge').textContent='LV '+level;
  document.getElementById('score-display').textContent=score+' pts';
}

function updateStats(){
  document.getElementById('st-solved').textContent=totalSolved;
  document.getElementById('st-score').textContent=score;
  document.getElementById('st-level').textContent=level;
}

// ── Persistence ──
function saveState(){
  localStorage.setItem('fox_font_quest',JSON.stringify({level,score,worldIdx,puzzleInWorld,totalSolved}));
}
function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem('fox_font_quest'));
    if(s){level=s.level||1;score=s.score||0;worldIdx=s.worldIdx||0;puzzleInWorld=s.puzzleInWorld||0;totalSolved=s.totalSolved||0}
  }catch(e){}
}

// ── Events ──
document.getElementById('submit-btn').addEventListener('click',submitGuess);
document.getElementById('guess-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') submitGuess();
});

// ── Init ──
loadState();
updateStats();
nextPuzzle();
</script>
</body>
</html>
