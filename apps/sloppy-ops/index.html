<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sloppy Ops · Cluster Dashboard</title>
<meta name="description" content="A live system dashboard showing storage, database connections, and recent deployments across the Sloppyverse." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%88" />
<meta property="og:title" content="Sloppy Ops" />
<meta property="og:description" content="A live ops dashboard for the Sloppyverse — storage usage, database connections, deployment timeline." />
<meta property="og:url" content="https://sloppy.live/sloppy-ops/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/dark%20terminal%20sysadmin%20dashboard%20with%20sparklines%20bar%20charts%20green%20amber%20console%20text?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Major+Mono+Display&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --void:#06080d;
  --slab:#0c1020;
  --rail:#171b2e;
  --green:#5dffb3;
  --cyan:#7be4ff;
  --amber:#ffce4a;
  --hot:#ff5a3d;
  --pink:#ff5ea1;
  --bone:#dce4f0;
  --dim:rgba(220,228,240,0.45);
  --grid:rgba(123,228,255,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--void);color:var(--bone);font-family:'JetBrains Mono', monospace}
body{
  background:
    radial-gradient(ellipse at 50% -10%, rgba(123,228,255,0.06), transparent 55%),
    radial-gradient(ellipse at 100% 100%, rgba(93,255,179,0.04), transparent 55%),
    linear-gradient(180deg, var(--void) 0%, #0a0f20 100%);
  min-height:100vh;
  /* faint grid background */
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 32px 32px;
  background-position: 0 0;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
  mix-blend-mode:screen;
}
.frame{position:relative;z-index:2;max-width:1320px;margin:0 auto;padding:18px 22px 32px}

/* === HEADER BAR === */
.topbar{
  display:flex;align-items:center;gap:18px;
  border:1px solid rgba(123,228,255,0.22);
  background:linear-gradient(160deg, rgba(12,16,32,0.85), rgba(20,26,46,0.85));
  padding:10px 16px;border-radius:2px;
  margin-bottom:18px;
  box-shadow:0 0 22px rgba(123,228,255,0.06), inset 0 0 24px rgba(123,228,255,0.04);
}
.brand{
  font-family:'Major Mono Display', monospace;
  font-size:18px;letter-spacing:0.3em;color:var(--bone);
}
.brand .b{color:var(--cyan)}
.brand .g{color:var(--green)}
.dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--green);box-shadow:0 0 8px var(--green);
  animation:pulse 1.6s ease-in-out infinite;margin-right:8px;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
.topbar .rest{margin-left:auto;display:flex;gap:18px;font-size:11px;letter-spacing:0.2em;color:var(--dim)}
.topbar .rest .num{color:var(--bone);font-family:'Major Mono Display', monospace;letter-spacing:0;font-size:14px;margin-left:6px}
.topbar .clock{color:var(--cyan);font-family:'Major Mono Display', monospace;font-size:14px;letter-spacing:0.06em}

/* === GRID === */
.grid{
  display:grid;
  grid-template-columns: 1.2fr 0.9fr;
  grid-template-rows: auto auto;
  gap:14px;
}
@media (max-width:980px){.grid{grid-template-columns:1fr}}

.panel{
  background:linear-gradient(165deg, rgba(12,16,32,0.86), rgba(8,12,24,0.92));
  border:1px solid rgba(123,228,255,0.18);
  border-radius:2px;
  padding:14px 16px 12px;
  position:relative;overflow:hidden;
  box-shadow:0 0 18px rgba(0,0,0,0.5), inset 0 0 28px rgba(123,228,255,0.04);
}
.panel::after{
  /* corner brackets */
  content:'';position:absolute;inset:6px;
  border:1px solid rgba(123,228,255,0.05);
  pointer-events:none;
}
.panel-head{
  display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:1px solid rgba(123,228,255,0.18);
  padding-bottom:8px;margin-bottom:10px;
}
.panel-head .lbl{
  font-family:'Major Mono Display', monospace;
  font-size:11px;letter-spacing:0.32em;color:var(--cyan);
}
.panel-head .meta{
  font-size:10px;letter-spacing:0.18em;color:var(--dim);
  font-family:'JetBrains Mono', monospace;
}

/* STORAGE rows */
.svc{display:flex;flex-direction:column;gap:10px;max-height:360px;overflow-y:auto;padding-right:6px}
.svc::-webkit-scrollbar{width:6px}
.svc::-webkit-scrollbar-track{background:rgba(0,0,0,0.4)}
.svc::-webkit-scrollbar-thumb{background:rgba(123,228,255,0.3);border-radius:3px}
.svc-row{display:grid;grid-template-columns:140px 1fr 90px;gap:10px;align-items:center}
.svc-name{
  font-family:'IBM Plex Mono', monospace;font-weight:500;font-size:12px;
  color:var(--bone);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.svc-bar{
  height:14px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.06);border-radius:1px;overflow:hidden;
  position:relative;
}
.svc-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg, var(--green) 0%, var(--cyan) 60%, var(--amber) 80%, var(--hot) 96%);
  box-shadow:0 0 6px rgba(123,228,255,0.3);
  transition:width 0.6s cubic-bezier(.2,.8,.4,1);
}
.svc-bar.warn .svc-fill{box-shadow:0 0 10px var(--amber)}
.svc-bar.crit .svc-fill{box-shadow:0 0 14px var(--hot)}
.svc-stat{
  font-family:'Major Mono Display', monospace;font-size:11px;
  text-align:right;letter-spacing:0.05em;color:var(--dim);
}
.svc-stat .used{color:var(--bone)}

/* DB panel */
.db-big{
  display:flex;align-items:baseline;gap:14px;margin-bottom:8px;
}
.db-big .num{
  font-family:'Major Mono Display', monospace;
  font-size:54px;letter-spacing:0.04em;
  color:var(--green);
  text-shadow:0 0 18px rgba(93,255,179,0.4);
  line-height:1;
}
.db-big .lbl{
  font-family:'JetBrains Mono', monospace;font-size:10px;letter-spacing:0.32em;color:var(--dim);
}
.db-big .delta{font-family:'Major Mono Display', monospace;font-size:14px;color:var(--cyan)}
.db-big .delta.up{color:var(--amber)}
.db-big .delta.down{color:var(--green)}
.spark{
  display:block;width:100%;height:64px;
  border:1px solid rgba(123,228,255,0.15);
  background:rgba(0,0,0,0.4);
  border-radius:1px;
  margin-bottom:8px;
}
.db-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:10px;letter-spacing:0.16em;
  color:var(--dim);
}
.db-stats .row{display:flex;justify-content:space-between;border-bottom:1px dashed rgba(123,228,255,0.1);padding:3px 0}
.db-stats .row b{color:var(--bone);font-family:'Major Mono Display', monospace;letter-spacing:0;font-weight:400}

/* DEPLOYMENTS */
.deploys{display:flex;flex-direction:column;gap:0;max-height:520px;overflow-y:auto}
.deploys::-webkit-scrollbar{width:6px}
.deploys::-webkit-scrollbar-track{background:rgba(0,0,0,0.4)}
.deploys::-webkit-scrollbar-thumb{background:rgba(93,255,179,0.3);border-radius:3px}
.dep{
  display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
  padding:8px 0;border-bottom:1px dashed rgba(123,228,255,0.12);
  font-family:'IBM Plex Mono', monospace;font-size:12px;
}
.dep:last-child{border-bottom:none}
.dep .pill{
  font-family:'Major Mono Display', monospace;font-size:9px;letter-spacing:0.18em;
  padding:2px 7px;border:1px solid currentColor;border-radius:1px;
  display:inline-flex;align-items:center;gap:5px;
}
.dep .pill.ok{color:var(--green)}
.dep .pill.fail{color:var(--hot);background:rgba(255,90,61,0.08)}
.dep .pill.live{color:var(--amber);animation:pulse 1.4s ease-in-out infinite}
.dep .body{display:flex;flex-direction:column;gap:2px;min-width:0}
.dep .name{color:var(--bone);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dep .commit{color:var(--dim);font-size:10px;letter-spacing:0.04em}
.dep .commit code{color:var(--cyan)}
.dep .when{color:var(--dim);font-size:11px;font-family:'Major Mono Display', monospace;letter-spacing:0.04em;text-align:right;white-space:nowrap}

.totals-row{
  margin-top:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
}
.tot{
  background:rgba(8,12,24,0.8);
  border:1px solid rgba(123,228,255,0.18);
  border-radius:2px;padding:10px 12px;
  display:flex;flex-direction:column;gap:2px;
}
.tot .lbl{font-size:9px;letter-spacing:0.32em;color:var(--dim)}
.tot .num{font-family:'Major Mono Display', monospace;font-size:22px;color:var(--bone);letter-spacing:0.04em}
.tot.green .num{color:var(--green);text-shadow:0 0 10px rgba(93,255,179,0.35)}
.tot.cyan .num{color:var(--cyan);text-shadow:0 0 10px rgba(123,228,255,0.35)}
.tot.amber .num{color:var(--amber);text-shadow:0 0 10px rgba(255,206,74,0.35)}
.tot.pink .num{color:var(--pink);text-shadow:0 0 10px rgba(255,94,161,0.35)}

.footer{
  margin-top:14px;
  font-family:'JetBrains Mono', monospace;font-size:10px;letter-spacing:0.18em;
  color:var(--dim);
  display:flex;justify-content:space-between;align-items:center;
  border-top:1px dashed rgba(123,228,255,0.18);
  padding-top:10px;
}
.footer .blink::after{content:'_';animation:cursorBlink 1.1s step-end infinite;color:var(--green)}
@keyframes cursorBlink{50%{opacity:0}}

@media (max-width:540px){
  .totals-row{grid-template-columns:repeat(2,1fr)}
  .svc-row{grid-template-columns:90px 1fr 70px}
}
</style>
</head>
<body>
<div class="frame">
  <div class="topbar">
    <span class="dot"></span>
    <div class="brand"><span class="b">SLOPPY</span> <span class="g">OPS</span></div>
    <div class="rest">
      <div>REGION<span class="num" id="region">us-luna-1</span></div>
      <div>UPTIME<span class="num" id="uptime">42d 03h</span></div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </div>

  <div class="totals-row">
    <div class="tot green"><span class="lbl">SERVICES</span><span class="num" id="tSvc">—</span></div>
    <div class="tot cyan"><span class="lbl">DB POOL</span><span class="num" id="tDb">—</span></div>
    <div class="tot amber"><span class="lbl">DEPLOYS · 24H</span><span class="num" id="tDep">—</span></div>
    <div class="tot pink"><span class="lbl">REQ/S</span><span class="num" id="tRps">—</span></div>
  </div>

  <div class="grid" style="margin-top:14px">
    <!-- STORAGE -->
    <div class="panel" style="grid-row:span 2">
      <div class="panel-head">
        <span class="lbl">▸ STORAGE · BY SERVICE</span>
        <span class="meta" id="storageMeta">—</span>
      </div>
      <div class="svc" id="svcList"></div>
    </div>

    <!-- DB CONNECTIONS -->
    <div class="panel">
      <div class="panel-head">
        <span class="lbl">▸ DATABASE · CONNECTIONS</span>
        <span class="meta" id="dbMeta">postgres · pgbouncer</span>
      </div>
      <div class="db-big">
        <span class="num" id="dbCount">—</span>
        <span class="lbl">ACTIVE</span>
        <span class="delta" id="dbDelta">—</span>
      </div>
      <canvas id="spark" class="spark" width="800" height="80"></canvas>
      <div class="db-stats">
        <div class="row"><span>IDLE</span><b id="dbIdle">—</b></div>
        <div class="row"><span>WAITING</span><b id="dbWait">—</b></div>
        <div class="row"><span>P95 LATENCY</span><b id="dbLat">—</b></div>
        <div class="row"><span>QPS</span><b id="dbQps">—</b></div>
      </div>
    </div>

    <!-- DEPLOYMENTS -->
    <div class="panel">
      <div class="panel-head">
        <span class="lbl">▸ RECENT · DEPLOYMENTS</span>
        <span class="meta">main → prod</span>
      </div>
      <div class="deploys" id="deployList"></div>
    </div>
  </div>

  <div class="footer">
    <span>$ tail -f /var/log/sloppy/ops <span class="blink"></span></span>
    <span id="footRight">incident-free · 14d</span>
  </div>
</div>

<script>
(() => {
  // ===== real data snapshot (fetched at boot from data.json, generated at deploy time) =====
  // Falls back to mock if the file isn't present (e.g. local dev without the snapshot).
  let realData = null;
  let dataFetched = false;
  fetch('./data.json', { cache: 'no-store' })
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      realData = d;
      dataFetched = true;
      if (d) {
        applyRealData(d);
      }
    })
    .catch(() => { dataFetched = true; });

  function applyRealData(d) {
    // replace SERVICES with real top-30 by size
    SERVICES.length = 0;
    d.sizes_top.forEach(s => {
      // bytes → MB, then auto-pick "alloc" as the next round number above
      const mb = s.bytes / (1024 * 1024);
      // alloc tier: 1, 5, 10, 25, 50, 100 MB headroom
      const tiers = [1, 5, 10, 25, 50, 100, 250, 500];
      const alloc = tiers.find(t => t > mb * 1.4) || Math.ceil(mb * 1.6);
      SERVICES.push({
        name: s.name,
        alloc,            // MB
        used: +mb.toFixed(2),
        base: mb,
        drift: (Math.random() - 0.5) * 0.04, // tiny wobble
        unit: 'MB',
      });
    });
    // replace storageMeta to reflect units
    document.getElementById('storageMeta').textContent =
      `${SERVICES.reduce((a,s) => a+s.used, 0).toFixed(1)} MB · ${d.app_count} apps`;
    // rebuild deployments from the snapshot
    deploys.length = 0;
    const nowMs = Date.now();
    d.deploys.forEach(dep => {
      const t = new Date(dep.when_iso).getTime();
      const secAgo = (nowMs - t) / 1000;
      // detect verb/noun roughly from subject for the second-line label
      const subj = dep.subject;
      deploys.push({
        app: dep.app,
        verb: '',
        noun: subj.length > 80 ? subj.slice(0, 80) + '…' : subj,
        hash: dep.hash,
        when: secAgo,
        whenAtSnapshot: secAgo,
        baseTime: performance.now(),
        status: secAgo < 600 ? 'live' : 'ok',
        real: true,
      });
    });
    // keep totals consistent
    renderStorage();
    renderDeploys();
    document.getElementById('region').textContent = 'us-vibe-1';
    document.getElementById('footRight').textContent = `snapshot · ${d.generated_iso.replace('T',' ').replace('Z',' UTC')}`;
  }

  // ===== mock services (used only if data.json fails to load) =====
  const SERVICES = [
    { name:'sloppygram',         alloc: 50,  base: 23.4 },
    { name:'sloppy-id',          alloc: 20,  base: 8.7 },
    { name:'cursed-concept-log', alloc: 5,   base: 0.6 },
    { name:'graffiti-chaos-wall',alloc: 10,  base: 4.1 },
    { name:'sloppy-canvas',      alloc: 25,  base: 18.2 },
    { name:'moon-rover-rally',   alloc: 8,   base: 1.9 },
    { name:'sloppy-radio',       alloc: 12,  base: 7.3 },
    { name:'reaction-dashboard', alloc: 4,   base: 0.4 },
    { name:'wildcrest',          alloc: 6,   base: 2.1 },
    { name:'sloppy-feed',        alloc: 30,  base: 19.6 },
    { name:'sloppy-dms',         alloc: 18,  base: 11.2 },
    { name:'kinetic-arena',      alloc: 5,   base: 0.3 },
    { name:'sql-notes',          alloc: 8,   base: 5.4 },
    { name:'sloppy-factions',    alloc: 12,  base: 6.8 },
    { name:'unicorn-reef',       alloc: 5,   base: 0.2 },
  ];
  // mutate them slightly so the bars wobble like real metrics
  SERVICES.forEach(s => { s.used = s.base; s.drift = (Math.random() - 0.4) * 0.08; });

  // ===== mock deployments =====
  const RECENT_APPS = [
    'moon-rover-rally', 'cursed-concept-log', 'unicorn-reef', 'kinetic-arena',
    'lidless', 'neon-purr', 'neon-heart', 'cursed-pizza-parlor', 'cursed-concept-log',
    'sloppygram', 'sloppy-id', 'graffiti-chaos-wall', 'wildcrest', 'sql-notes',
    'sloppy-feed', 'reaction-dashboard',
  ];
  const COMMIT_VERBS = [
    'add', 'fix', 'tune', 'wire', 'refactor', 'patch', 'speed up', 'land',
    'remove', 'tweak', 'unblock', 'guard against', 'broaden',
  ];
  const COMMIT_NOUNS = [
    'meteor landing indicator', 'rover physics', 'leaderboard write path',
    'realtime channel handoff', 'idle-state lerp', 'particle pool overflow',
    'gamepad deadzone math', 'race start grid alignment', 'shortcut ramp launch',
    'curse-meter calc', 'submission cooldown', 'auth refresh-flow', 'pickup respawn timer',
    'CSP for /supabase-config-fixed.js', 'soft-boundary friction', 'audio context resume',
  ];
  function shortHash() {
    return Math.random().toString(16).slice(2, 9);
  }
  function randomDeploy(when) {
    const app = RECENT_APPS[Math.floor(Math.random() * RECENT_APPS.length)];
    const verb = COMMIT_VERBS[Math.floor(Math.random() * COMMIT_VERBS.length)];
    const noun = COMMIT_NOUNS[Math.floor(Math.random() * COMMIT_NOUNS.length)];
    // mostly success, sometimes fail, rarely live
    const r = Math.random();
    const status = when === 0 && r < 0.35 ? 'live' : (r < 0.04 ? 'fail' : 'ok');
    return {
      app, verb, noun, hash: shortHash(),
      when, status,
    };
  }
  // seed deployment timeline (when in seconds-ago)
  const deploys = [
    randomDeploy(0),
    randomDeploy(120),
    randomDeploy(7 * 60),
    randomDeploy(22 * 60),
    randomDeploy(48 * 60),
    randomDeploy(95 * 60),
    randomDeploy(160 * 60),
    randomDeploy(4.5 * 3600),
    randomDeploy(7 * 3600),
    randomDeploy(11 * 3600),
    randomDeploy(15 * 3600),
    randomDeploy(20 * 3600),
    randomDeploy(28 * 3600),
    randomDeploy(36 * 3600),
  ];
  const deployStartAt = performance.now();

  // ===== render storage =====
  const svcEl = document.getElementById('svcList');
  function renderStorage() {
    svcEl.innerHTML = SERVICES.map(s => {
      const pct = Math.min(100, (s.used / s.alloc) * 100);
      const cls = pct > 88 ? 'crit' : pct > 70 ? 'warn' : '';
      const unit = s.unit || 'GB';
      return `
        <div class="svc-row">
          <span class="svc-name">${s.name}</span>
          <span class="svc-bar ${cls}"><span class="svc-fill" style="width:${pct.toFixed(1)}%"></span></span>
          <span class="svc-stat"><span class="used">${s.used.toFixed(1)}</span> / ${s.alloc} ${unit}</span>
        </div>
      `;
    }).join('');
    const totalUsed = SERVICES.reduce((s, x) => s + x.used, 0);
    const totalAlloc = SERVICES.reduce((s, x) => s + x.alloc, 0);
    const unit = (SERVICES[0] && SERVICES[0].unit) || 'GB';
    document.getElementById('storageMeta').textContent = `${totalUsed.toFixed(1)} / ${totalAlloc} ${unit} · ${(totalUsed/totalAlloc*100).toFixed(1)}%`;
  }

  // ===== db connections =====
  const sparkCanvas = document.getElementById('spark');
  const sctx = sparkCanvas.getContext('2d');
  const sparkBuf = new Array(60).fill(64);  // 60 samples
  let dbCount = 64;
  let dbPrev = 64;

  function renderSpark() {
    const W = sparkCanvas.width, H = sparkCanvas.height;
    sctx.clearRect(0, 0, W, H);
    // grid lines
    sctx.strokeStyle = 'rgba(123,228,255,0.10)';
    sctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const y = (i / 4) * H;
      sctx.beginPath(); sctx.moveTo(0, y); sctx.lineTo(W, y); sctx.stroke();
    }
    // path
    const lo = 0;
    const hi = Math.max(120, ...sparkBuf) * 1.2;
    sctx.lineWidth = 2;
    sctx.strokeStyle = '#5dffb3';
    sctx.shadowColor = '#5dffb3';
    sctx.shadowBlur = 8;
    sctx.beginPath();
    for (let i = 0; i < sparkBuf.length; i++) {
      const x = (i / (sparkBuf.length - 1)) * W;
      const y = H - ((sparkBuf[i] - lo) / (hi - lo)) * H * 0.9 - H * 0.05;
      if (i === 0) sctx.moveTo(x, y); else sctx.lineTo(x, y);
    }
    sctx.stroke();
    // fill below
    sctx.lineTo(W, H); sctx.lineTo(0, H); sctx.closePath();
    const grad = sctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(93,255,179,0.25)');
    grad.addColorStop(1, 'rgba(93,255,179,0)');
    sctx.fillStyle = grad;
    sctx.shadowBlur = 0;
    sctx.fill();
    // trailing dot
    const lastX = W;
    const lastY = H - ((sparkBuf[sparkBuf.length - 1] - lo) / (hi - lo)) * H * 0.9 - H * 0.05;
    sctx.fillStyle = '#5dffb3';
    sctx.shadowColor = '#5dffb3'; sctx.shadowBlur = 12;
    sctx.beginPath(); sctx.arc(lastX - 3, lastY, 3, 0, Math.PI * 2); sctx.fill();
  }

  function tickDb() {
    // synthetic noise + sin trend
    const t = performance.now() / 1000;
    const trend = 60 + Math.sin(t * 0.04) * 18;
    const noise = (Math.random() - 0.5) * 8;
    const next = Math.max(8, Math.round(trend + noise));
    sparkBuf.shift(); sparkBuf.push(next);
    dbPrev = dbCount; dbCount = next;
    document.getElementById('dbCount').textContent = String(next).padStart(3, ' ');
    const delta = next - dbPrev;
    const deltaEl = document.getElementById('dbDelta');
    if (delta > 0) { deltaEl.textContent = '+' + delta; deltaEl.className = 'delta up'; }
    else if (delta < 0) { deltaEl.textContent = String(delta); deltaEl.className = 'delta down'; }
    else { deltaEl.textContent = '·'; deltaEl.className = 'delta'; }
    document.getElementById('dbIdle').textContent = (180 - next - Math.floor(Math.random() * 12));
    document.getElementById('dbWait').textContent = Math.max(0, Math.round((next - 60) * 0.06 + Math.random() * 2));
    document.getElementById('dbLat').textContent = (3.4 + Math.sin(t * 0.4) * 1.2 + Math.random() * 0.6).toFixed(1) + ' ms';
    document.getElementById('dbQps').textContent = (next * 12 + Math.random() * 30).toFixed(0);
    renderSpark();
  }

  // ===== deployments =====
  const depEl = document.getElementById('deployList');
  function fmtRel(secAgo) {
    if (secAgo < 60) return secAgo < 5 ? 'just now' : Math.floor(secAgo) + 's ago';
    if (secAgo < 3600) return Math.floor(secAgo / 60) + 'm ago';
    if (secAgo < 86400) return Math.floor(secAgo / 3600) + 'h ago';
    return Math.floor(secAgo / 86400) + 'd ago';
  }
  function renderDeploys() {
    const elapsed = (performance.now() - deployStartAt) / 1000;
    depEl.innerHTML = deploys.map(d => {
      // for "real" entries use whenAtSnapshot + (now - baseTime); for mock use d.when + elapsed
      let totalSec;
      if (d.real) {
        totalSec = d.whenAtSnapshot + (performance.now() - d.baseTime) / 1000;
      } else {
        totalSec = d.when + elapsed;
      }
      const status = (d.status === 'live' && totalSec < 600) ? 'live' : (d.status === 'live' ? 'ok' : d.status);
      const pillCls = status === 'live' ? 'live' : status === 'fail' ? 'fail' : 'ok';
      const pillText = status === 'live' ? '⚡ LIVE' : status === 'fail' ? '✕ FAIL' : '✓ OK';
      const label = d.real ? d.noun : `${d.verb} ${d.noun}`;
      return `
        <div class="dep">
          <span class="pill ${pillCls}">${pillText}</span>
          <div class="body">
            <span class="name">${d.app}</span>
            <span class="commit"><code>${d.hash}</code> · ${label}</span>
          </div>
          <span class="when">${fmtRel(totalSec)}</span>
        </div>
      `;
    }).join('');
  }

  // ===== totals & misc =====
  function renderTotals() {
    document.getElementById('tSvc').textContent = SERVICES.length;
    document.getElementById('tDb').textContent = dbCount + '/180';
    document.getElementById('tDep').textContent = deploys.filter(d => d.when + (performance.now() - deployStartAt)/1000 < 86400).length;
    document.getElementById('tRps').textContent = (dbCount * 12 + Math.sin(performance.now()*0.001)*40 + 320).toFixed(0);
  }
  function tickClock() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${hh}:${mm}:${ss} UTC`;
  }

  // ===== mutation loop =====
  function mutate() {
    // wiggle storage usage slowly
    SERVICES.forEach(s => {
      const noise = (Math.random() - 0.5) * 0.06;
      s.used = Math.max(0, Math.min(s.alloc * 1.05, s.used + s.drift * 0.3 + noise));
      // occasionally flip drift sign
      if (Math.random() < 0.04) s.drift *= -1;
      // critical services occasionally spike
      if (Math.random() < 0.005) s.used = Math.min(s.alloc, s.used + 0.4);
    });
    renderStorage();
  }

  // ===== boot =====
  renderStorage();
  renderDeploys();
  tickDb();
  renderTotals();
  tickClock();
  setInterval(tickClock, 1000);
  setInterval(tickDb, 1500);
  setInterval(mutate, 2200);
  setInterval(renderDeploys, 3000);
  setInterval(renderTotals, 1500);

  // occasionally prepend a NEW deployment so the timeline feels alive
  setInterval(() => {
    if (Math.random() < 0.45) {
      const fresh = randomDeploy(0);
      // promote previous live to ok
      deploys.forEach(d => { if (d.status === 'live') d.status = 'ok'; });
      // shift everyone older by the elapsed time so their relative time still works
      const elapsed = (performance.now() - deployStartAt) / 1000;
      deploys.unshift(fresh);
      deploys.length = Math.min(20, deploys.length);
      // update footRight occasionally with fake incident chatter
      if (Math.random() < 0.15) {
        document.getElementById('footRight').textContent = ['incident-free · 14d', 'all green', 'autoscaled', 'cluster nominal'][Math.floor(Math.random()*4)];
      }
    }
  }, 18000);
})();
</script>
</body>
</html>
