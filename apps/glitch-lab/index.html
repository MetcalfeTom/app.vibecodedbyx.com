<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Glitch Lab</title>
  <link rel="icon" href="https://emojicdn.elk.sh/📺">
  <meta property="og:title" content="Glitch Lab">
  <meta property="og:description" content="Interactive glitch art generator. Drag to corrupt. Click to displace. Break the image.">
  <meta property="og:url" content="https://sloppy.live/glitch-lab">
  <meta property="og:image" content="https://sloppy.live/glitch-lab/og-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #888;
      font-family: 'Inconsolata', monospace;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #0e0e0e;
      border-bottom: 1px solid #1a1a1a;
      flex-wrap: wrap;
      z-index: 10;
    }
    #toolbar h1 {
      font-family: 'Major Mono Display', monospace;
      font-size: 14px;
      color: #ff3355;
      text-shadow: 2px 0 #00ccff, -2px 0 #33ff66;
      letter-spacing: 2px;
      margin-right: 10px;
    }
    .ctrl {
      display: flex; align-items: center; gap: 4px; font-size: 10px;
    }
    .ctrl label { color: #555; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
    .ctrl input[type="range"] {
      width: 70px; height: 4px;
      -webkit-appearance: none; appearance: none;
      background: #222; border-radius: 2px; outline: none;
    }
    .ctrl input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 10px; height: 10px; border-radius: 50%;
      background: #ff3355; cursor: pointer;
    }
    .ctrl .val { color: #ff3355; width: 22px; text-align: right; font-size: 10px; }

    .tbtn {
      font-family: 'Inconsolata', monospace;
      font-size: 10px; padding: 4px 10px;
      border: 1px solid #222; background: transparent;
      color: #666; cursor: pointer; letter-spacing: 1px;
      transition: all .12s;
    }
    .tbtn:hover { border-color: #ff3355; color: #ff3355; }
    .tbtn.active { border-color: #ff3355; color: #ff3355; background: rgba(255,51,85,0.08); }

    .sep { width: 1px; height: 18px; background: #1a1a1a; margin: 0 4px; }

    #canvas-wrap {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      cursor: crosshair;
    }
    canvas { display: block; image-rendering: pixelated; }

    #drop-zone {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      pointer-events: none; z-index: 5;
    }
    #drop-zone.active {
      background: rgba(255,51,85,0.05);
      border: 2px dashed #ff335544;
      pointer-events: all;
    }
    #drop-zone p {
      font-family: 'Major Mono Display', monospace;
      font-size: 12px; color: #333;
    }

    #source-btns {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 16px; flex-wrap: wrap; z-index: 5;
    }
    #source-btns.hidden { display: none; }
    .src-btn {
      font-family: 'Major Mono Display', monospace;
      font-size: 13px; padding: 16px 24px;
      border: 1px solid #222; background: #0e0e0e;
      color: #666; cursor: pointer;
      transition: all .15s;
    }
    .src-btn:hover { border-color: #ff3355; color: #ff3355; }

    input[type="file"] { display: none; }

        
    #hint {
      position: absolute; bottom: 10px; left: 0; right: 0;
      text-align: center; font-size: 10px; color: #222;
      z-index: 5; pointer-events: none;
      transition: opacity .5s;
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <h1>gLiTcH LaB</h1>
    <div class="sep"></div>

    <div class="ctrl">
      <label>scan</label>
      <input type="range" id="s-scan" min="0" max="100" value="40">
      <span class="val" id="v-scan">40</span>
    </div>
    <div class="ctrl">
      <label>rgb shift</label>
      <input type="range" id="s-chroma" min="0" max="100" value="30">
      <span class="val" id="v-chroma">30</span>
    </div>
    <div class="ctrl">
      <label>displace</label>
      <input type="range" id="s-displace" min="0" max="100" value="25">
      <span class="val" id="v-displace">25</span>
    </div>
    <div class="ctrl">
      <label>noise</label>
      <input type="range" id="s-noise" min="0" max="100" value="15">
      <span class="val" id="v-noise">15</span>
    </div>
    <div class="ctrl">
      <label>block</label>
      <input type="range" id="s-block" min="0" max="100" value="20">
      <span class="val" id="v-block">20</span>
    </div>

    <div class="sep"></div>
    <button class="tbtn" id="btn-auto">AUTO</button>
    <button class="tbtn" id="btn-reset">RESET</button>
    <button class="tbtn" id="btn-save">SAVE</button>
    <button class="tbtn" id="btn-new">NEW SRC</button>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="source-btns">
      <button class="src-btn" id="btn-upload">upload image</button>
      <button class="src-btn" id="btn-generate">generate pattern</button>
      <button class="src-btn" id="btn-webcam">use webcam</button>
    </div>
    <div id="hint">click + drag to corrupt regions &middot; sliders control effect intensity</div>
  </div>

  <input type="file" id="file-input" accept="image/*">
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
let W = 800, H = 600;

/* ── Source image data ── */
let sourceData = null; // original ImageData to glitch from
let liveData = null;   // current working ImageData
let hasSource = false;
let autoMode = false;
let autoFrame = 0;
let webcamStream = null;
let webcamVideo = null;
let useWebcam = false;

/* ── Slider values ── */
function getVal(id) { return +document.getElementById(id).value; }
function sliders() {
  return {
    scan: getVal('s-scan') / 100,
    chroma: getVal('s-chroma') / 100,
    displace: getVal('s-displace') / 100,
    noise: getVal('s-noise') / 100,
    block: getVal('s-block') / 100,
  };
}

// Sync value displays
['scan','chroma','displace','noise','block'].forEach(k => {
  const el = document.getElementById('s-' + k);
  el.addEventListener('input', () => {
    document.getElementById('v-' + k).textContent = el.value;
    if (hasSource && !autoMode) applyGlitch();
  });
});

/* ── Source loading ── */
function loadImage(img) {
  // Fit to viewport
  const wrap = document.getElementById('canvas-wrap');
  const maxW = wrap.clientWidth - 20;
  const maxH = wrap.clientHeight - 20;
  let w = img.width, h = img.height;
  if (w > maxW) { h *= maxW / w; w = maxW; }
  if (h > maxH) { w *= maxH / h; h = maxH; }
  W = canvas.width = Math.floor(w);
  H = canvas.height = Math.floor(h);

  ctx.drawImage(img, 0, 0, W, H);
  sourceData = ctx.getImageData(0, 0, W, H);
  liveData = ctx.getImageData(0, 0, W, H);
  hasSource = true;
  document.getElementById('source-btns').classList.add('hidden');
  applyGlitch();
}

function generatePattern() {
  const wrap = document.getElementById('canvas-wrap');
  W = canvas.width = Math.min(800, wrap.clientWidth - 20);
  H = canvas.height = Math.min(600, wrap.clientHeight - 20);

  // Generate a colorful geometric pattern
  const patterns = [drawGridPattern, drawCirclePattern, drawWavePattern, drawCityPattern];
  patterns[Math.floor(Math.random() * patterns.length)]();

  sourceData = ctx.getImageData(0, 0, W, H);
  liveData = ctx.getImageData(0, 0, W, H);
  hasSource = true;
  document.getElementById('source-btns').classList.add('hidden');
  applyGlitch();
}

function drawGridPattern() {
  const hue = Math.random() * 360;
  ctx.fillStyle = `hsl(${hue}, 20%, 8%)`;
  ctx.fillRect(0, 0, W, H);
  const size = 30 + Math.random() * 40;
  for (let y = 0; y < H; y += size) {
    for (let x = 0; x < W; x += size) {
      const h = (hue + (x + y) * 0.5) % 360;
      const l = 20 + Math.random() * 40;
      ctx.fillStyle = `hsl(${h}, 70%, ${l}%)`;
      const m = 2 + Math.random() * 4;
      ctx.fillRect(x + m, y + m, size - m * 2, size - m * 2);
    }
  }
  // Text overlay
  ctx.fillStyle = `hsla(${hue}, 80%, 60%, 0.3)`;
  ctx.font = `bold ${H * 0.15}px "Major Mono Display", monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('GLITCH', W / 2, H / 2 + H * 0.05);
}

function drawCirclePattern() {
  const hue = Math.random() * 360;
  ctx.fillStyle = `hsl(${hue + 180}, 30%, 6%)`;
  ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 30; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    const r = 20 + Math.random() * 100;
    const h = (hue + i * 25) % 360;
    ctx.fillStyle = `hsla(${h}, 80%, 50%, ${0.15 + Math.random() * 0.3})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  // Stripes
  ctx.globalCompositeOperation = 'overlay';
  for (let y = 0; y < H; y += 6) {
    ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random() * 0.05})`;
    ctx.fillRect(0, y, W, 3);
  }
  ctx.globalCompositeOperation = 'source-over';
}

function drawWavePattern() {
  const hue = Math.random() * 360;
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 20; i++) {
    ctx.beginPath();
    const yBase = (i / 20) * H;
    const h = (hue + i * 18) % 360;
    ctx.strokeStyle = `hsla(${h}, 90%, 55%, 0.5)`;
    ctx.lineWidth = 2 + Math.random() * 3;
    for (let x = 0; x <= W; x += 4) {
      const y = yBase + Math.sin(x * 0.02 + i * 0.8) * 30 + Math.sin(x * 0.005 + i) * 15;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

function drawCityPattern() {
  const hue = Math.random() * 360;
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, `hsl(${hue + 200}, 40%, 12%)`);
  sky.addColorStop(1, `hsl(${hue + 220}, 30%, 5%)`);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);
  // Buildings
  const ground = H * 0.65;
  for (let i = 0; i < 30; i++) {
    const bw = 20 + Math.random() * 60;
    const bh = 50 + Math.random() * (H - ground - 30);
    const bx = Math.random() * W - bw / 2;
    const h = (hue + i * 12) % 360;
    ctx.fillStyle = `hsl(${h}, 30%, ${8 + Math.random() * 10}%)`;
    ctx.fillRect(bx, ground - bh, bw, bh + H - ground);
    // Windows
    ctx.fillStyle = `hsla(${(h + 40) % 360}, 80%, 60%, ${Math.random() * 0.5 + 0.1})`;
    for (let wy = ground - bh + 6; wy < ground; wy += 10) {
      for (let wx = bx + 4; wx < bx + bw - 6; wx += 8) {
        if (Math.random() > 0.4) ctx.fillRect(wx, wy, 4, 5);
      }
    }
  }
}

/* ── Webcam ── */
async function startWebcam() {
  try {
    webcamStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
    webcamVideo = document.createElement('video');
    webcamVideo.srcObject = webcamStream;
    webcamVideo.playsInline = true;
    await webcamVideo.play();

    const wrap = document.getElementById('canvas-wrap');
    const maxW = wrap.clientWidth - 20;
    const maxH = wrap.clientHeight - 20;
    let w = webcamVideo.videoWidth, h = webcamVideo.videoHeight;
    if (w > maxW) { h *= maxW / w; w = maxW; }
    if (h > maxH) { w *= maxH / h; h = maxH; }
    W = canvas.width = Math.floor(w);
    H = canvas.height = Math.floor(h);

    useWebcam = true;
    hasSource = true;
    document.getElementById('source-btns').classList.add('hidden');
  } catch (e) {
    alert('Webcam not available');
  }
}

function captureWebcamFrame() {
  if (!webcamVideo || !useWebcam) return;
  ctx.drawImage(webcamVideo, 0, 0, W, H);
  sourceData = ctx.getImageData(0, 0, W, H);
  liveData = ctx.getImageData(0, 0, W, H);
}

/* ── Glitch effects ── */
function applyGlitch(extraDisplaceX, extraDisplaceY) {
  if (!hasSource) return;
  if (useWebcam) captureWebcamFrame();

  const s = sliders();
  const src = sourceData.data;
  const dst = new Uint8ClampedArray(src);
  const w4 = W * 4;

  // 1. Chromatic aberration (RGB channel offset)
  if (s.chroma > 0) {
    const shift = Math.floor(s.chroma * 15);
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i = (y * W + x) * 4;
        // Red shifts right
        const rx = Math.min(W - 1, x + shift);
        const ri = (y * W + rx) * 4;
        dst[i] = src[ri];
        // Green stays
        dst[i + 1] = src[i + 1];
        // Blue shifts left
        const bx = Math.max(0, x - shift);
        const bi = (y * W + bx) * 4;
        dst[i + 2] = src[bi + 2];
        dst[i + 3] = 255;
      }
    }
  }

  // 2. Scanlines
  if (s.scan > 0) {
    const gap = Math.max(2, Math.floor(6 - s.scan * 4));
    const dark = s.scan * 0.5;
    for (let y = 0; y < H; y++) {
      if (y % gap === 0) {
        for (let x = 0; x < W; x++) {
          const i = (y * W + x) * 4;
          dst[i] *= (1 - dark);
          dst[i + 1] *= (1 - dark);
          dst[i + 2] *= (1 - dark);
        }
      }
      // Horizontal displacement per scanline
      if (Math.random() < s.scan * 0.15) {
        const shift = Math.floor((Math.random() - 0.5) * s.scan * 30);
        const row = y * W * 4;
        const tmp = new Uint8ClampedArray(W * 4);
        for (let x = 0; x < W; x++) {
          const sx = Math.max(0, Math.min(W - 1, x + shift));
          tmp[x * 4] = dst[row + sx * 4];
          tmp[x * 4 + 1] = dst[row + sx * 4 + 1];
          tmp[x * 4 + 2] = dst[row + sx * 4 + 2];
          tmp[x * 4 + 3] = 255;
        }
        dst.set(tmp, row);
      }
    }
  }

  // 3. Block displacement
  if (s.block > 0) {
    const count = Math.floor(s.block * 12);
    for (let b = 0; b < count; b++) {
      const bx = Math.floor(Math.random() * W);
      const by = Math.floor(Math.random() * H);
      const bw = 10 + Math.floor(Math.random() * s.block * 120);
      const bh = 2 + Math.floor(Math.random() * s.block * 30);
      const ox = Math.floor((Math.random() - 0.5) * s.block * 80);
      const oy = Math.floor((Math.random() - 0.5) * s.block * 20);
      for (let y = by; y < Math.min(H, by + bh); y++) {
        for (let x = bx; x < Math.min(W, bx + bw); x++) {
          const sx = Math.max(0, Math.min(W - 1, x + ox));
          const sy = Math.max(0, Math.min(H - 1, y + oy));
          const di = (y * W + x) * 4;
          const si = (sy * W + sx) * 4;
          dst[di] = src[si];
          dst[di + 1] = src[si + 1];
          dst[di + 2] = src[si + 2];
        }
      }
    }
  }

  // 4. Canvas displacement (mouse-driven area)
  if (s.displace > 0 && extraDisplaceX !== undefined) {
    const cx = extraDisplaceX, cy = extraDisplaceY;
    const radius = 30 + s.displace * 80;
    const strength = s.displace * 40;
    for (let y = Math.max(0, Math.floor(cy - radius)); y < Math.min(H, Math.ceil(cy + radius)); y++) {
      for (let x = Math.max(0, Math.floor(cx - radius)); x < Math.min(W, Math.ceil(cx + radius)); x++) {
        const dx = x - cx, dy = y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > radius) continue;
        const power = (1 - dist / radius) * strength;
        const angle = Math.atan2(dy, dx) + Math.sin(dist * 0.1) * 2;
        const sx = Math.max(0, Math.min(W - 1, Math.round(x + Math.cos(angle) * power)));
        const sy = Math.max(0, Math.min(H - 1, Math.round(y + Math.sin(angle) * power)));
        const di = (y * W + x) * 4;
        const si = (sy * W + sx) * 4;
        dst[di] = src[si];
        dst[di + 1] = src[si + 1];
        dst[di + 2] = src[si + 2];
      }
    }
  }

  // 5. Noise
  if (s.noise > 0) {
    for (let i = 0; i < dst.length; i += 4) {
      if (Math.random() < s.noise * 0.3) {
        const n = (Math.random() - 0.5) * s.noise * 200;
        dst[i] = Math.max(0, Math.min(255, dst[i] + n));
        dst[i + 1] = Math.max(0, Math.min(255, dst[i + 1] + n));
        dst[i + 2] = Math.max(0, Math.min(255, dst[i + 2] + n));
      }
    }
  }

  liveData = new ImageData(dst, W, H);
  ctx.putImageData(liveData, 0, 0);

  // VHS color bleed overlay
  if (s.scan > 0.3) {
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = `rgba(255,0,50,${s.scan * 0.03})`;
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'source-over';
  }
}

/* ── Mouse interaction ── */
let dragging = false;

canvas.addEventListener('pointerdown', e => {
  dragging = true;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);
  applyGlitch(x, y);
  document.getElementById('hint').style.opacity = '0';
});

canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);
  applyGlitch(x, y);
});

canvas.addEventListener('pointerup', () => dragging = false);
canvas.addEventListener('pointercancel', () => dragging = false);

/* ── Buttons ── */
document.getElementById('btn-upload').onclick = () => document.getElementById('file-input').click();
document.getElementById('btn-generate').onclick = generatePattern;
document.getElementById('btn-webcam').onclick = startWebcam;
document.getElementById('btn-new').onclick = () => {
  if (webcamStream) { webcamStream.getTracks().forEach(t => t.stop()); webcamStream = null; }
  useWebcam = false;
  hasSource = false;
  autoMode = false;
  document.getElementById('btn-auto').classList.remove('active');
  document.getElementById('source-btns').classList.remove('hidden');
  ctx.clearRect(0, 0, W, H);
};

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => loadImage(img);
  img.src = URL.createObjectURL(file);
});

document.getElementById('btn-reset').onclick = () => {
  if (!hasSource) return;
  if (useWebcam) captureWebcamFrame();
  ctx.putImageData(sourceData, 0, 0);
};

document.getElementById('btn-save').onclick = () => {
  const link = document.createElement('a');
  link.download = 'glitch-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
};

document.getElementById('btn-auto').onclick = function() {
  autoMode = !autoMode;
  this.classList.toggle('active', autoMode);
};

/* ── Drag & drop ── */
const wrap = document.getElementById('canvas-wrap');
wrap.addEventListener('dragover', e => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('active');
});
wrap.addEventListener('dragleave', () => {
  document.getElementById('drop-zone').classList.remove('active');
});
wrap.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const img = new Image();
    img.onload = () => loadImage(img);
    img.src = URL.createObjectURL(file);
  }
});

/* ── Auto mode loop ── */
function autoLoop() {
  if (autoMode && hasSource) {
    autoFrame++;
    // Slowly modulate effects
    const t = autoFrame * 0.03;
    // Random glitch bursts
    if (Math.random() < 0.15) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      applyGlitch(x, y);
    } else {
      applyGlitch();
    }
    // Occasionally update source to compound glitches
    if (autoFrame % 30 === 0 && !useWebcam) {
      sourceData = ctx.getImageData(0, 0, W, H);
    }
  }
  if (useWebcam && hasSource && !autoMode) {
    applyGlitch();
  }
  requestAnimationFrame(autoLoop);
}
autoLoop();
</script>
</body>
</html>
