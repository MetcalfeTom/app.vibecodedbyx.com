<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haunted Thailand</title>
  <link rel="icon" href="https://emojicdn.elk.sh/👻">
  <meta property="og:title" content="Haunted Thailand">
  <meta property="og:description" content="An interactive dark map of Thailand's most haunted and eerie locations.">
  <meta property="og:url" content="https://sloppy.live/haunted-thailand">
  <meta property="og:image" content="https://emojicdn.elk.sh/👻?style=google">
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0808;
      --red: #cc1111;
      --glow: #ff2222;
      --blood: #8b0000;
      --dim: rgba(255,200,200,0.4);
      --text: #d4c4c4;
      --panel: rgba(10,8,8,0.94);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      cursor: default;
    }

    /* Fog overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(80,0,0,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(80,0,0,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 999;
      animation: fogDrift 15s ease-in-out infinite alternate;
    }
    @keyframes fogDrift {
      to { opacity: 0.5; }
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 14px 20px;
      background: linear-gradient(to bottom, rgba(10,8,8,0.95), transparent);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    h1 {
      font-family: 'Creepster', cursive;
      font-size: clamp(20px, 4vw, 32px);
      color: var(--glow);
      text-shadow: 0 0 8px var(--red), 0 0 25px rgba(255,34,34,0.3);
      letter-spacing: 2px;
    }
    .counter {
      font-size: 12px;
      color: var(--dim);
    }
    .counter span { color: var(--glow); text-shadow: 0 0 4px var(--red); }

    /* Map container */
    #map-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    /* SVG map */
    #map-svg {
      position: absolute;
      cursor: grab;
    }
    #map-svg:active { cursor: grabbing; }

    /* Thailand outline */
    .thailand-outline {
      fill: rgba(20,12,12,0.95);
      stroke: rgba(204,17,17,0.2);
      stroke-width: 1;
    }
    .thailand-outline:hover {
      fill: rgba(30,15,15,0.95);
    }

    /* Province borders (subtle) */
    .province-border {
      fill: none;
      stroke: rgba(204,17,17,0.06);
      stroke-width: 0.3;
    }

    /* Markers */
    .marker {
      cursor: pointer;
      transition: transform 0.2s;
    }
    .marker:hover { transform: scale(1.3); filter: brightness(1.5); }
    .marker:hover .marker-glow { animation: spookyHover 0.3s ease-in-out infinite alternate; }
    @keyframes spookyHover {
      0% { opacity: 0.35; r: 14; }
      50% { opacity: 0.1; r: 18; }
      100% { opacity: 0.4; r: 13; }
    }
    .marker-glow {
      fill: var(--glow);
      opacity: 0.15;
      animation: pulseGlow 3s ease-in-out infinite;
    }
    .marker-core {
      fill: var(--glow);
      filter: drop-shadow(0 0 4px var(--red)) drop-shadow(0 0 8px rgba(255,34,34,0.5));
    }
    .marker-inner {
      fill: var(--blood);
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.1; r: 12; }
      50% { opacity: 0.25; r: 16; }
    }

    /* Info panel */
    .info-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      background: linear-gradient(to top, rgba(10,8,8,0.97), rgba(10,8,8,0.9), transparent);
      padding: 60px 20px 20px;
      transform: translateY(100%);
      transition: transform 0.35s ease-out;
      max-height: 50vh;
      overflow-y: auto;
    }
    .info-panel.visible { transform: translateY(0); }
    .info-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: 1px solid rgba(204,17,17,0.3);
      color: var(--dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
    }
    .info-close:hover { border-color: var(--glow); color: var(--glow); }
    .info-name {
      font-family: 'Creepster', cursive;
      font-size: clamp(22px, 5vw, 34px);
      color: var(--glow);
      text-shadow: 0 0 10px var(--red);
      margin-bottom: 4px;
    }
    .info-location {
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 10px;
    }
    .info-type {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border: 1px solid rgba(204,17,17,0.3);
      color: var(--red);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .info-desc {
      font-size: clamp(12px, 2.5vw, 14px);
      color: var(--text);
      line-height: 1.7;
      max-width: 600px;
    }
    .info-warning {
      font-size: 11px;
      color: rgba(204,17,17,0.6);
      margin-top: 10px;
      font-style: italic;
    }

    /* Legend */
    .legend {
      position: fixed;
      bottom: 12px; left: 12px;
      z-index: 15;
      font-size: 9px;
      color: var(--dim);
      line-height: 1.8;
      transition: opacity 0.3s;
    }
    .legend-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .legend-dot.ghost { background: var(--glow); box-shadow: 0 0 4px var(--red); }
    .legend-dot.temple { background: #ff6600; box-shadow: 0 0 4px #ff4400; }
    .legend-dot.forest { background: #44cc44; box-shadow: 0 0 4px #22aa22; }
    .legend-dot.urban { background: #cc44ff; box-shadow: 0 0 4px #aa22dd; }

        
    /* Zoom controls */
    .zoom-controls {
      position: fixed;
      top: 60px; right: 12px;
      z-index: 15;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .zoom-btn {
      width: 32px; height: 32px;
      background: rgba(10,8,8,0.8);
      border: 1px solid rgba(204,17,17,0.2);
      color: var(--dim);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
    }
    .zoom-btn:hover { border-color: var(--glow); color: var(--glow); }
  </style>
</head>
<body>
  <header>
    <h1>HAUNTED THAILAND</h1>
    <div class="counter"><span id="loc-count">0</span> eerie locations</div>
  </header>

  <div id="map-container">
    <svg id="map-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" onclick="zoomIn()">+</button>
    <button class="zoom-btn" onclick="zoomOut()">−</button>
    <button class="zoom-btn" onclick="resetView()" style="font-size:11px">⟳</button>
  </div>

  <div class="info-panel" id="info-panel">
    <button class="info-close" onclick="closeInfo()">✕ close</button>
    <div class="info-name" id="info-name"></div>
    <div class="info-location" id="info-location"></div>
    <div class="info-type" id="info-type"></div>
    <div class="info-desc" id="info-desc"></div>
    <div class="info-warning" id="info-warning"></div>
  </div>

  <div class="legend" id="legend">
    <div><span class="legend-dot ghost"></span>Ghost / Spirit</div>
    <div><span class="legend-dot temple"></span>Cursed Temple</div>
    <div><span class="legend-dot forest"></span>Haunted Forest</div>
    <div><span class="legend-dot urban"></span>Urban Legend</div>
  </div>
<script>
    // ─── Scary Locations Data ───
    // Coordinates in approximate lat/lon mapped to SVG space
    // Thailand roughly: lat 5.5-20.5, lon 97.5-105.5
    const LOCATIONS = [
      {
        name: 'Sathorn Unique Tower',
        lat: 13.72, lon: 100.52,
        province: 'Bangkok',
        type: 'urban',
        desc: 'The Ghost Tower. A 49-story abandoned skyscraper left unfinished after the 1997 financial crisis. Locals report shadow figures in the empty floors and an overwhelming sense of dread. Thrill-seekers who sneak in often leave before reaching the top.',
        warning: 'Structurally unstable. Trespassing is illegal.',
      },
      {
        name: 'Wat Phai Rong Wua',
        lat: 14.48, lon: 99.80,
        province: 'Suphan Buri',
        type: 'temple',
        desc: 'The Hell Garden temple. Life-size sculptures depict sinners being punished in Buddhist hell — impaled, boiled, sawed in half. The graphic statues were built to warn against immoral behavior, but the effect is deeply unsettling.',
        warning: 'Not for the faint of heart.',
      },
      {
        name: 'Phi Ta Khon Festival Grounds',
        lat: 17.37, lon: 101.62,
        province: 'Loei',
        type: 'ghost',
        desc: 'Home of the Ghost Mask Festival. Legend says spirits of the dead once rose from the Mun River to celebrate with the living. Villagers now wear terrifying painted masks and costumes to reenact the spirit parade each year.',
        warning: 'The masks are said to channel real spirits during the ceremony.',
      },
      {
        name: 'Khao Yai Dark Trail',
        lat: 14.44, lon: 101.37,
        province: 'Nakhon Ratchasima',
        type: 'forest',
        desc: 'Deep within Khao Yai National Park, rangers speak of a trail where compasses spin and hikers hear whispered Thai voices with no source. Several unexplained disappearances have occurred in this region over the decades.',
        warning: 'Do not stray from marked paths after sunset.',
      },
      {
        name: 'Krasue Bridge',
        lat: 14.04, lon: 98.94,
        province: 'Kanchanaburi',
        type: 'ghost',
        desc: 'Near the infamous Death Railway, locals report sightings of the Krasue — a floating female head with dangling entrails that hunts at night. The bridge area is considered one of Thailand\'s most active paranormal hotspots, tied to the thousands who died building the railway.',
        warning: 'Sightings most common during new moon nights.',
      },
      {
        name: 'Mae Nak Shrine',
        lat: 13.71, lon: 100.60,
        province: 'Bangkok (Phra Khanong)',
        type: 'ghost',
        desc: 'Shrine of Thailand\'s most famous ghost. Mae Nak died in childbirth while her husband was at war. Her ghost continued living as if alive, hiding her death. When discovered, she became vengeful. The shrine is visited by thousands seeking her blessing — or begging not to be haunted.',
        warning: 'Always leave an offering. Never speak ill of Mae Nak.',
      },
      {
        name: 'Hellfire Pass',
        lat: 14.35, lon: 98.83,
        province: 'Kanchanaburi',
        type: 'ghost',
        desc: 'A cutting in solid rock made by Allied POWs and Asian laborers under Japanese occupation. Thousands died here from exhaustion, disease, and brutality. At night, visitors report hearing phantom hammering, screams, and seeing ghostly figures working by torchlight.',
        warning: 'The museum closes at sunset. There are reasons for this.',
      },
      {
        name: 'Phi Pop Village',
        lat: 16.43, lon: 102.83,
        province: 'Khon Kaen',
        type: 'ghost',
        desc: 'Villages in Isan are plagued by the Phi Pop — a spirit that possesses people and devours their internal organs. Entire communities have performed mass exorcisms. Accused individuals are sometimes shunned or driven from their homes.',
        warning: 'Spirit mediums are consulted before any major village decision.',
      },
      {
        name: 'Doi Suthep Shadow Monks',
        lat: 18.80, lon: 98.92,
        province: 'Chiang Mai',
        type: 'temple',
        desc: 'The ancient temple atop Doi Suthep is revered, but the forested mountain below holds darker stories. Monks who meditate in caves along the trail report encountering shadow figures in saffron robes — spirits of monks who died during meditation and never left.',
        warning: 'Cave meditation after dark is strongly discouraged.',
      },
      {
        name: 'Sanam Luang Execution Ground',
        lat: 13.76, lon: 100.50,
        province: 'Bangkok',
        type: 'urban',
        desc: 'The Royal Field was historically used for royal cremations and public executions. Security guards working overnight shifts report cold spots, disembodied footsteps, and spectral figures dressed in ancient court attire walking the grounds after midnight.',
        warning: 'The field empties quickly after dark for good reason.',
      },
      {
        name: 'Khao San Road Guesthouse',
        lat: 13.76, lon: 100.50,
        province: 'Bangkok',
        type: 'urban',
        desc: 'Several old guesthouses along the famous backpacker street are said to be haunted by the spirits of travelers who never made it home. Room doors open on their own, belongings are rearranged, and guests wake to find someone sitting on the edge of their bed — with no one there.',
        warning: 'Ask for a different room if the temperature drops suddenly.',
      },
      {
        name: 'Tham Luang Cave',
        lat: 20.38, lon: 99.83,
        province: 'Chiang Rai',
        type: 'forest',
        desc: 'Famous for the 2018 rescue of trapped football players. But long before that, locals considered the cave home to a princess spirit named Jao Mae Nang Non — the Reclining Lady. Offerings are left at the cave mouth. Those who disrespect the spirit are said to become hopelessly lost inside.',
        warning: 'The cave floods without warning during monsoon season.',
      },
      {
        name: 'Wat Mahabut',
        lat: 13.70, lon: 100.61,
        province: 'Bangkok',
        type: 'temple',
        desc: 'The temple where Mae Nak\'s spirit is formally enshrined. Devotees bring dresses, perfume, and offerings to keep her spirit appeased. Lottery players visit to ask Mae Nak for winning numbers. The temple grounds feel heavy with an ancient, watchful presence.',
        warning: 'Photographs sometimes show unexplained figures.',
      },
      {
        name: 'Phuket\'s Tsunami Ghost Coast',
        lat: 7.88, lon: 98.30,
        province: 'Phuket',
        type: 'ghost',
        desc: 'After the 2004 tsunami killed thousands along these beaches, taxi drivers and hotel staff reported picking up passengers who vanished mid-ride, phones ringing from numbers of the deceased, and wet footprints appearing in empty hotel rooms along the coast.',
        warning: 'Memorial ceremonies are held annually. Respect the lost.',
      },
      {
        name: 'Ban Nong Bua Lamphu School',
        lat: 17.22, lon: 102.44,
        province: 'Nong Bua Lamphu',
        type: 'urban',
        desc: 'The site of a devastating tragedy in 2022. The community has reported paranormal activity in the area since, with sounds of children playing heard at night when the grounds are empty. Locals maintain a spirit house and leave offerings daily.',
        warning: 'This is a place of deep grief. Visit with utmost respect.',
      },
      {
        name: 'Koh Chang Shipwreck Coast',
        lat: 12.05, lon: 102.36,
        province: 'Trat',
        type: 'ghost',
        desc: 'The waters off Koh Chang hold the wrecks of Thai warships sunk during a 1941 naval battle with France. Fishermen report seeing ghostly lights beneath the water on moonless nights and hearing ship horns from vessels long destroyed.',
        warning: 'Divers are advised not to enter the wrecks.',
      },
      {
        name: 'Erawan Falls Spirit Pool',
        lat: 14.37, lon: 98.77,
        province: 'Kanchanaburi',
        type: 'forest',
        desc: 'The upper tiers of Erawan Falls are stunningly beautiful but locals say the pools are guarded by forest spirits. Swimmers who venture too far into certain pools report being pulled underwater by invisible hands. The fish that nibble your feet? Some say they\'re not really fish.',
        warning: 'Never swim alone in the upper pools.',
      },
      {
        name: 'Ayutthaya Ruins at Night',
        lat: 14.35, lon: 100.57,
        province: 'Ayutthaya',
        type: 'temple',
        desc: 'The ancient capital destroyed by Burmese invaders in 1767. Thousands were slaughtered. The headless Buddha statues and crumbling temples take on a different character after dark. Guards report hearing ancient Siamese spoken in empty ruins and seeing processions of spectral torches.',
        warning: 'The ruins officially close at sunset.',
      },
      {
        name: 'Nana Plaza After Hours',
        lat: 13.74, lon: 100.55,
        province: 'Bangkok (Sukhumvit)',
        type: 'urban',
        desc: 'Behind the neon lights and pounding music, the oldest buildings in the Nana district hold secrets. Staff in late-night establishments report a woman in traditional Thai dress who appears in mirrors but isn\'t in the room. Cold drafts sweep through windowless corridors. The area was once a quiet residential neighborhood — before the spirits were given reasons to be angry.',
        warning: 'The regulars know which floors to avoid. Ask before you wander.',
      },
    ];

    // ─── Map Setup ───
    const svg = document.getElementById('map-svg');
    const container = document.getElementById('map-container');

    // Map projection: simple linear mapping of lat/lon to SVG coords
    // Thailand bounds (approximate)
    const LAT_MIN = 5.3, LAT_MAX = 20.6;
    const LON_MIN = 97.2, LON_MAX = 105.8;
    const MAP_W = 500, MAP_H = 800;

    function project(lat, lon) {
      const x = ((lon - LON_MIN) / (LON_MAX - LON_MIN)) * MAP_W;
      const y = ((LAT_MAX - lat) / (LAT_MAX - LAT_MIN)) * MAP_H;
      return [x, y];
    }

    // Simplified Thailand outline (polygon points)
    const THAILAND_OUTLINE = [
      [20.4, 100.1], [20.3, 100.5], [19.8, 100.4], [19.5, 101.2],
      [19.0, 100.1], [18.5, 100.5], [18.1, 100.0], [17.8, 100.9],
      [17.5, 101.0], [17.2, 101.5], [16.5, 102.1], [16.0, 102.6],
      [15.7, 103.3], [15.2, 104.6], [15.0, 105.0], [14.5, 105.2],
      [14.0, 105.4], [13.5, 105.0], [13.0, 104.5], [12.5, 103.0],
      [12.0, 102.5], [11.5, 102.8], [10.5, 102.0], [10.0, 101.5],
      [9.5, 100.5], [8.5, 100.0], [7.5, 99.5], [7.0, 99.3],
      [6.5, 99.8], [6.2, 100.1], [6.0, 100.5], [5.8, 101.0],
      [6.5, 101.5], [7.0, 100.5], [7.5, 100.3], [8.0, 100.0],
      [8.5, 98.5], [8.8, 98.2], [9.2, 98.5], [9.5, 99.0],
      [10.0, 99.0], [10.5, 99.5], [11.0, 99.2], [11.5, 99.0],
      [12.0, 99.5], [12.5, 99.8], [13.0, 100.0], [13.5, 99.5],
      [14.0, 99.0], [14.5, 98.8], [15.0, 98.5], [15.5, 98.2],
      [16.0, 97.8], [16.5, 97.5], [17.0, 97.8], [17.5, 97.5],
      [18.0, 97.8], [18.5, 98.2], [19.0, 98.4], [19.5, 98.0],
      [19.8, 98.5], [20.0, 99.0], [20.2, 99.5], [20.4, 100.1],
    ];

    // Build SVG
    function buildMap() {
      // Country outline
      const outlinePoints = THAILAND_OUTLINE.map(([lat, lon]) => project(lat, lon).join(',')).join(' ');
      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      polygon.setAttribute('points', outlinePoints);
      polygon.setAttribute('class', 'thailand-outline');
      svg.appendChild(polygon);

      // Markers
      const typeColors = {
        ghost: '#ff2222',
        temple: '#ff6600',
        forest: '#44cc44',
        urban: '#cc44ff',
      };

      LOCATIONS.forEach((loc, i) => {
        const [x, y] = project(loc.lat, loc.lon);
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'marker');
        g.setAttribute('data-index', i);
        g.style.transformOrigin = `${x}px ${y}px`;

        const color = typeColors[loc.type] || '#ff2222';

        // Outer glow
        const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        glow.setAttribute('cx', x);
        glow.setAttribute('cy', y);
        glow.setAttribute('r', 12);
        glow.setAttribute('class', 'marker-glow');
        glow.style.fill = color;
        glow.style.animationDelay = `${Math.random() * 3}s`;
        g.appendChild(glow);

        // Core
        const core = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        core.setAttribute('cx', x);
        core.setAttribute('cy', y);
        core.setAttribute('r', 5);
        core.setAttribute('class', 'marker-core');
        core.style.fill = color;
        core.style.filter = `drop-shadow(0 0 4px ${color}) drop-shadow(0 0 8px ${color}80)`;
        g.appendChild(core);

        // Inner dot
        const inner = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        inner.setAttribute('cx', x);
        inner.setAttribute('cy', y);
        inner.setAttribute('r', 2);
        inner.style.fill = '#fff';
        inner.style.opacity = '0.6';
        g.appendChild(inner);

        g.addEventListener('click', () => showInfo(i));
        svg.appendChild(g);
      });

      // Set viewBox
      svg.setAttribute('viewBox', `0 0 ${MAP_W} ${MAP_H}`);
      svg.setAttribute('width', MAP_W);
      svg.setAttribute('height', MAP_H);

      document.getElementById('loc-count').textContent = LOCATIONS.length;
    }

    // ─── Pan & Zoom ───
    let scale = 1, panX = 0, panY = 0;
    let isDragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;

    function updateTransform() {
      // Center the map
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      const sw = MAP_W * scale;
      const sh = MAP_H * scale;
      const ox = (cw - sw) / 2 + panX;
      const oy = (ch - sh) / 2 + panY;
      svg.style.width = sw + 'px';
      svg.style.height = sh + 'px';
      svg.style.left = ox + 'px';
      svg.style.top = oy + 'px';
    }

    function fitMap() {
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      const scaleW = cw / MAP_W;
      const scaleH = ch / MAP_H;
      scale = Math.min(scaleW, scaleH) * 0.9;
      panX = 0;
      panY = 0;
      updateTransform();
    }

    window.zoomIn = function() { scale = Math.min(4, scale * 1.3); updateTransform(); };
    window.zoomOut = function() { scale = Math.max(0.3, scale / 1.3); updateTransform(); };
    window.resetView = function() { fitMap(); };

    // Mouse pan
    container.addEventListener('mousedown', e => {
      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      panStartX = panX;
      panStartY = panY;
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      panX = panStartX + (e.clientX - dragStartX);
      panY = panStartY + (e.clientY - dragStartY);
      updateTransform();
    });
    window.addEventListener('mouseup', () => isDragging = false);

    // Touch pan
    container.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        isDragging = true;
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        panStartX = panX;
        panStartY = panY;
      }
    }, { passive: true });
    container.addEventListener('touchmove', e => {
      if (!isDragging || e.touches.length !== 1) return;
      panX = panStartX + (e.touches[0].clientX - dragStartX);
      panY = panStartY + (e.touches[0].clientY - dragStartY);
      updateTransform();
    }, { passive: true });
    container.addEventListener('touchend', () => isDragging = false);

    // Scroll zoom
    container.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      scale = Math.max(0.3, Math.min(4, scale * delta));
      updateTransform();
    }, { passive: false });

    // ─── Info Panel ───
    let activeMarker = -1;

    function showInfo(index) {
      const loc = LOCATIONS[index];
      if (!loc) return;
      activeMarker = index;
      document.getElementById('info-name').textContent = loc.name;
      document.getElementById('info-location').textContent = `${loc.province}, Thailand`;
      document.getElementById('info-type').textContent = loc.type;
      document.getElementById('info-desc').textContent = loc.desc;
      document.getElementById('info-warning').textContent = loc.warning ? `⚠ ${loc.warning}` : '';
      document.getElementById('info-panel').classList.add('visible');
      document.getElementById('legend').style.opacity = '0';
    }

    window.closeInfo = function() {
      document.getElementById('info-panel').classList.remove('visible');
      document.getElementById('legend').style.opacity = '';
      activeMarker = -1;
    };

    // Close on click outside
    container.addEventListener('click', e => {
      if (!e.target.closest('.marker') && activeMarker >= 0) {
        closeInfo();
      }
    });

    // ─── Init ───
    buildMap();
    fitMap();
    window.addEventListener('resize', fitMap);
  </script>
</body>
</html>
