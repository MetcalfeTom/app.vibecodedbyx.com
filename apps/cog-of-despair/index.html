function clickSound(){

 const o=actx.createOscillator(),g=actx.createGain();
 o.type='triangle';

}
function acidHiss(){
 if(!actx)return;
 const t=actx.currentTime;
 // Corrosive sizzle — filtered noise
 const sz=actx.sampleRate*.12,buf=actx.createBuffer(1,sz,actx.sampleRate);
 const d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*.3*(1-i/sz);
 const s=actx.createBufferSource(),bp=actx.createBiquadFilter(),g=actx.createGain();
 bp.type='bandpass';bp.frequency.value=3000+Math.random()*2000;bp.Q.value=2;
 g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);
 s.buffer=buf;s.connect(bp);bp.connect(g);g.connect(actx.destination);s.start(t);
}
function alarmSound(){

}

 }

 // Spark particles from click point
 const cx=W/2,cy=H/2;
 for(let i=0;i<3;i++){
  const a=Math.random()*Math.PI*2,sp=30+Math.random()*60;
  particles.push({x:x||cx,y:y||cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:1+Math.random()*2,color:Math.random()>.5?'#f44':'#ff4'});
 }
 // Every 100 clicks, bigger burst
 if(clicks%100===0){
  for(let i=0;i<12;i++){
   const a=Math.random()*Math.PI*2,sp=50+Math.random()*100;
   particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1.5,r:2+Math.random()*3,color:['#f00','#f80','#ff0','#fff'][Math.floor(Math.random()*4)]});
  }
  alarmSound();
 }
 // Every 1000 clicks, screen flash
 if(clicks%1000===0)cogFlash=2;

 // Save
 localStorage.setItem('cog_clicks',clicks);
 updateUI();
}

function updateUI(){
 document.getElementById('counter').textContent=clicks.toLocaleString();
 const pct=Math.min(100,clicks/GOAL*100);
 document.getElementById('progress-fill').style.width=pct+'%';
 document.getElementById('message').textContent=getMessage();
 const ss=getServerStatus();
 const el=document.getElementById('server-status');
 el.textContent=ss.text;el.style.color=ss.color;
 // CPS
 const now=Date.now();
 recentClicks=recentClicks.filter(t=>now-t<3000);
 const cps=recentClicks.length>1?(recentClicks.length/(3)).toFixed(1):'0';
 document.getElementById('cps').textContent='CPS: '+cps;
 // Deletion timer — resets/extends with clicks
 deletionTimer=Math.min(600,deletionTimer+.5);
}

function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// Draw the cog
function drawCog(cx,cy,outerR,innerR,teeth,angle){
 X.beginPath();
 const toothDepth=outerR-innerR;
 for(let i=0;i<teeth;i++){
  const a1=angle+i/teeth*Math.PI*2;
  const a2=angle+(i+.35)/teeth*Math.PI*2;
  const a3=angle+(i+.5)/teeth*Math.PI*2;
  const a4=angle+(i+.85)/teeth*Math.PI*2;
  const a5=angle+(i+1)/teeth*Math.PI*2;
  // Jagged outer edge
  const jag1=outerR+Math.sin(i*7.3)*3;
  const jag2=outerR+Math.sin(i*4.1+2)*4;
  if(i===0)X.moveTo(cx+Math.cos(a1)*innerR,cy+Math.sin(a1)*innerR);
  X.lineTo(cx+Math.cos(a2)*innerR,cy+Math.sin(a2)*innerR);
  X.lineTo(cx+Math.cos(a2)*jag1,cy+Math.sin(a2)*jag1);
  // Jagged tooth tip
  X.lineTo(cx+Math.cos(a3)*(jag2+2),cy+Math.sin(a3)*(jag2+2));
  X.lineTo(cx+Math.cos(a4)*jag1,cy+Math.sin(a4)*jag1);
  X.lineTo(cx+Math.cos(a4)*innerR,cy+Math.sin(a4)*innerR);
 }
 X.closePath();
}

// Heart shape path — centered at (hx, hy) with radius r
function drawHeart(hx,hy,r){
 X.beginPath();
 const s=r/15;
 X.moveTo(hx,hy+r*.6);
 // Left lobe
 X.bezierCurveTo(hx-r*.05,hy+r*.3,hx-r*.8,hy-r*.1,hx-r*.5,hy-r*.5);
 X.bezierCurveTo(hx-r*.2,hy-r*.8,hx,hy-r*.5,hx,hy-r*.2);
 // Right lobe
 X.bezierCurveTo(hx,hy-r*.5,hx+r*.2,hy-r*.8,hx+r*.5,hy-r*.5);
 X.bezierCurveTo(hx+r*.8,hy-r*.1,hx+r*.05,hy+r*.3,hx,hy+r*.6);
 X.closePath();
}

function draw(t){
 X.fillStyle='#080808';X.fillRect(0,0,W,H);
 const cx=W/2+shakeX,cy=H/2+shakeY;
 const baseR=Math.min(W,H)*.28;
 // Glow
 const glowAlpha=.03+cogFlash*.05;
 const grd=X.createRadialGradient(cx,cy,baseR*.3,cx,cy,baseR*1.5);
 grd.addColorStop(0,'rgba(150,0,0,'+glowAlpha+')');
 grd.addColorStop(1,'transparent');
 X.fillStyle=grd;X.fillRect(0,0,W,H);
 // Cog shadow
 X.save();X.translate(cx+3,cy+3);X.rotate(cogAngle);X.translate(-cx-3,-cy-3);
 drawCog(cx+3,cy+3,baseR*cogScale,baseR*cogScale*.75,18,0);
 X.fillStyle='rgba(0,0,0,.4)';X.fill();
 X.restore();
 // Main cog
 X.save();X.translate(cx,cy);X.rotate(cogAngle);X.translate(-cx,-cy);
 drawCog(cx,cy,baseR*cogScale,baseR*cogScale*.75,18,0);
 // Cog fill — dark with slight gradient
 const cogGrd=X.createRadialGradient(cx,cy,0,cx,cy,baseR*cogScale);
 cogGrd.addColorStop(0,'#1a1a1a');cogGrd.addColorStop(.5,'#0e0e0e');cogGrd.addColorStop(1,'#080808');
 X.fillStyle=cogGrd;X.fill();
 // Cog edge
 X.strokeStyle='#2a2a2a';X.lineWidth=2;X.stroke();
 // Heart-shaped crater
 const hr=baseR*.18*cogScale;// heart size
 const hx=cx,hy=cy-baseR*.15*cogScale;// position above center
 X.save();
 // Crater shadow (inset look)
 drawHeart(hx+1,hy+2,hr*1.02);
 X.fillStyle='rgba(0,0,0,.6)';X.fill();
 // Crater depression
 drawHeart(hx,hy,hr);
 const craterGrd=X.createRadialGradient(hx,hy,0,hx,hy,hr);
 craterGrd.addColorStop(0,'#030303');craterGrd.addColorStop(.6,'#060606');craterGrd.addColorStop(1,'#0a0a0a');
 X.fillStyle=craterGrd;X.fill();
 // Crater edge highlight
 drawHeart(hx,hy,hr);
 X.strokeStyle='rgba(40,40,40,.8)';X.lineWidth=1.5;X.stroke();
 // Acid glow inside heart (pulses on click)
 if(heartBleed>0){
  drawHeart(hx,hy,hr*.9);
  const acidGlow=X.createRadialGradient(hx,hy,0,hx,hy,hr*.9);
  acidGlow.addColorStop(0,'rgba(0,255,60,'+heartBleed*.25+')');
  acidGlow.addColorStop(.5,'rgba(0,180,30,'+heartBleed*.12+')');
  acidGlow.addColorStop(1,'rgba(0,80,10,0)');
  X.fillStyle=acidGlow;X.fill();
 }
 // Cracks radiating from heart
 X.strokeStyle='rgba(0,200,40,'+(0.08+heartBleed*.15)+')';X.lineWidth=.5;
 for(let i=0;i<5;i++){
  const ca=i*Math.PI*2/5+.3;
  const cr1=hr*.8,cr2=hr*1.6+Math.sin(i*3.7)*hr*.3;
  X.beginPath();
  X.moveTo(hx+Math.cos(ca)*cr1,hy+Math.sin(ca)*cr1);
  const mid=hr*1.2;
  X.quadraticCurveTo(hx+Math.cos(ca+.15)*mid,hy+Math.sin(ca+.15)*mid,hx+Math.cos(ca+.05)*cr2,hy+Math.sin(ca+.05)*cr2);
  X.stroke();
 }
 X.restore();
 // Flash overlay
 if(cogFlash>0){
  drawCog(cx,cy,baseR*cogScale,baseR*cogScale*.75,18,0);
  X.fillStyle='rgba(255,50,50,'+cogFlash*.15+')';X.fill();
 }
 X.restore();
 // Inner ring
 X.strokeStyle='#1a1a1a';X.lineWidth=3;
 X.beginPath();X.arc(cx,cy,baseR*.45*cogScale,0,Math.PI*2);X.stroke();
 // Center hole
 X.fillStyle='#050505';
 X.beginPath();X.arc(cx,cy,baseR*.2*cogScale,0,Math.PI*2);X.fill();
 X.strokeStyle='#222';X.lineWidth=2;X.stroke();
 // Bolt holes
 for(let i=0;i<6;i++){
  const a=cogAngle+i/6*Math.PI*2;
  const br=baseR*.58*cogScale;
  X.fillStyle='#0a0a0a';
  X.beginPath();X.arc(cx+Math.cos(a)*br,cy+Math.sin(a)*br,4,0,Math.PI*2);X.fill();
  X.strokeStyle='#1a1a1a';X.lineWidth=1;X.stroke();
 }
 // Scratches on surface
 X.strokeStyle='rgba(255,255,255,.015)';X.lineWidth=.5;
 for(let i=0;i<8;i++){
  const a=i*.7+cogAngle;
  const r1=baseR*.3,r2=baseR*.65;
  X.beginPath();
  X.moveTo(cx+Math.cos(a)*r1*cogScale,cy+Math.sin(a)*r1*cogScale);
  X.lineTo(cx+Math.cos(a+.1)*r2*cogScale,cy+Math.sin(a+.1)*r2*cogScale);
  X.stroke();
 }
 // Particles
 particles.forEach(p=>{
  X.globalAlpha=p.life;X.fillStyle=p.color;
  X.fillRect(p.x-p.r/2,p.y-p.r/2,p.r,p.r);
 });
 X.globalAlpha=1;
 // Binary acid drops
 X.font='bold 12px "IBM Plex Mono",monospace';
 X.textAlign='center';X.textBaseline='middle';
 acidDrops.forEach(d=>{
  const alpha=Math.min(1,d.life);
  // Acid glow behind character
  X.globalAlpha=alpha*.3;
  X.fillStyle='#0f0';
  X.beginPath();X.arc(d.x,d.y,d.size*.6,0,Math.PI*2);X.fill();
  // The binary digit
  X.globalAlpha=alpha;
  X.font='bold '+Math.floor(d.size)+'px "IBM Plex Mono",monospace';
  X.fillStyle='rgba(0,'+Math.floor(180+75*Math.sin(d.life*4))+',20,1)';
  X.save();X.translate(d.x,d.y);X.rotate(d.rot);
  X.fillText(d.char,0,0);
  X.restore();
  // Drip trail
  X.globalAlpha=alpha*.15;
  X.fillStyle='#0a3';
  X.fillRect(d.x-1,d.y-d.size*1.5,2,d.size*1.5);
 });
 X.globalAlpha=1;
 // Screen flash
 if(cogFlash>1){
  X.fillStyle='rgba(255,0,0,'+(cogFlash-1)*.1+')';X.fillRect(0,0,W,H);
 }
 // Vignette
 const vg=X.createRadialGradient(W/2,H/2,Math.min(W,H)*.15,W/2,H/2,Math.max(W,H)*.65);
 vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.6)');
 X.fillStyle=vg;X.fillRect(0,0,W,H);
}

function update(dt){
 // Cog rotation — turns slightly with each click, crawls by itself
 cogAngle+=dt*.05+(cogFlash>.5?dt*.5:0);
 // Scale bounce back
 cogScale+=(1-cogScale)*.15;
 cogFlash=Math.max(0,cogFlash-dt*4);
 // Shake decay
 if(shakeTimer>0){shakeTimer-=dt;shakeX*=.7;shakeY*=.7}else{shakeX=0;shakeY=0}
 // Particles
 particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=60*dt;p.life-=dt*1.5});
 particles=particles.filter(p=>p.life>0);
 // Acid drops — fall with gravity, wobble, dissolve
 acidDrops.forEach(d=>{
  d.x+=d.vx*dt;d.y+=d.vy*dt;d.vy+=80*dt;
  d.vx+=Math.sin(d.life*6)*.5;// wobble
  d.rot+=dt*2;d.life-=dt*.6;d.size*=1+dt*.3;// grow as they fall
 });
 acidDrops=acidDrops.filter(d=>d.life>0);
 // Heart bleed decay
 heartBleed=Math.max(0,heartBleed-dt*2);
 // Deletion timer countdown
 if(started&&clicks<GOAL){
  deletionTimer-=dt;
  if(deletionTimer<0)deletionTimer=0;
  const m=Math.floor(deletionTimer/60);
  const s=Math.floor(deletionTimer%60);
  document.getElementById('timer').textContent='DELETION IN: '+m.toString().padStart(2,'0')+':'+s.toString().padStart(2,'0');
  document.getElementById('timer').style.color=deletionTimer<60?'rgba(255,0,0,.6)':'rgba(255,50,50,.25)';
  // Alarm flash when low
  if(deletionTimer<30&&Math.sin(Date.now()*.01)>.5&&deletionTimer>0){
   document.getElementById('timer').style.color='#f00';
  }
  // "Deleted" — just resets the timer dramatically
  if(deletionTimer<=0){
   deletionTimer=300;
   document.getElementById('message').textContent='SERVER DELETION SIMULATED. Timer reset. Keep clicking.';
  }
 }
 if(clicks>=GOAL){
  document.getElementById('timer').textContent='DELETION: AVERTED ✓';
  document.getElementById('timer').style.color='rgba(0,200,0,.4)';
  document.getElementById('message').textContent='You did it. One million clicks. The server is saved. You absolute legend.';
 }
 // Time tracking
 if(started){totalTime+=dt;localStorage.setItem('cog_time',totalTime)}
}

// Click handler
C.addEventListener('click',e=>{doClick(e.clientX,e.clientY)});
C.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];doClick(t.clientX,t.clientY)},{passive:false});

// Init display
updateUI();

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.05);lastTime=t;
 update(dt);draw(t/1000);
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
