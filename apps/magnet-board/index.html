<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Magnet Board — Colors Repel</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧲">
<meta property="og:title" content="Magnet Board">
<meta property="og:description" content="Draw with magnetic colors that push each other apart.">
<meta property="og:url" content="https://sloppy.live/magnet-board">
<meta property="og:image" content="https://sloppy.live/magnet-board/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c10;--panel:#14141a;--border:#2a2a35;
  --text:#6a6a7a;--bright:#b0b0c0;--accent:#5050ff;
}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden}
canvas{display:block;cursor:crosshair;touch-action:none;border-radius:4px}
#toolbar{display:flex;gap:6px;padding:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.color-btn{width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer;
  transition:all .15s;position:relative}
.color-btn.active{border-color:#fff;transform:scale(1.15);box-shadow:0 0 12px rgba(255,255,255,.2)}
.color-btn:hover{transform:scale(1.1)}
.tool-sep{width:1px;height:24px;background:var(--border);margin:0 4px}
.tool-btn{background:var(--panel);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;
  cursor:pointer;transition:all .15s}
.tool-btn:hover{border-color:var(--bright);color:var(--bright)}
.tool-btn.active{border-color:var(--accent);color:var(--accent)}
#info{font-family:'DM Mono',monospace;font-size:10px;color:var(--text);padding:4px;text-align:center}
#header{font-size:clamp(16px,3vw,22px);font-weight:700;color:var(--bright);padding:10px 0 2px;
  letter-spacing:1px}
#sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text);margin-bottom:4px}
.back-link{padding:6px;text-align:center}
.back-link a{color:var(--text);font-family:'DM Mono',monospace;font-size:9px;text-decoration:none}
.back-link a:hover{color:var(--bright)}
.size-slider{width:80px;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);
  border-radius:2px;outline:none;cursor:pointer}
.size-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--bright);cursor:pointer}
</style>
</head>
<body>
<div id="header">MAGNET BOARD</div>
<div id="sub">draw with colors that repel each other</div>
<div id="toolbar">
  <div class="color-btn active" data-color="#ff3050" style="background:#ff3050"></div>
  <div class="color-btn" data-color="#ff8020" style="background:#ff8020"></div>
  <div class="color-btn" data-color="#f0d020" style="background:#f0d020"></div>
  <div class="color-btn" data-color="#30d060" style="background:#30d060"></div>
  <div class="color-btn" data-color="#20b0f0" style="background:#20b0f0"></div>
  <div class="color-btn" data-color="#6060ff" style="background:#6060ff"></div>
  <div class="color-btn" data-color="#c040e0" style="background:#c040e0"></div>
  <div class="color-btn" data-color="#ff60a0" style="background:#ff60a0"></div>
  <div class="color-btn" data-color="#e0e0e0" style="background:#e0e0e0"></div>
  <div class="tool-sep"></div>
  <input type="range" class="size-slider" id="sizeSlider" min="3" max="20" value="8" title="Brush size">
  <div class="tool-sep"></div>
  <button class="tool-btn" id="repelBtn" title="Toggle repulsion">🧲 Repel</button>
  <button class="tool-btn" id="freezeBtn" title="Freeze particles">❄️ Freeze</button>
  <button class="tool-btn" id="clearBtn" title="Clear board">🗑️ Clear</button>
</div>
<canvas id="board"></canvas>
<div id="info"><span id="countVal">0</span> particles — different colors push apart</div>
<div class="back-link"><a href="https://sloppy.live">← sloppy.live</a></div>
<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let W, H;

// Particles
const MAX_PARTICLES = 4000;
let particles = [];
let currentColor = '#ff3050';
let brushSize = 8;
let repulsionOn = true;
let frozen = false;
let drawing = false;
let lastX = -1, lastY = -1;

const REPEL_RADIUS = 40;
const REPEL_FORCE = 0.8;
const DAMPING = 0.92;
const SAME_COLOR_ATTRACT = 0.02; // slight attraction between same color

function resize(){
  const maxW = Math.min(window.innerWidth - 16, 900);
  const maxH = Math.min(window.innerHeight - 180, 600);
  W = canvas.width = maxW;
  H = canvas.height = maxH;
}

function addParticle(x, y, color){
  if(particles.length >= MAX_PARTICLES) return;
  particles.push({
    x, y,
    vx: (Math.random()-0.5)*0.5,
    vy: (Math.random()-0.5)*0.5,
    color,
    r: 2 + Math.random()*1.5,
  });
}

function spawnBrush(x, y){
  const count = Math.ceil(brushSize / 3);
  for(let i=0; i<count; i++){
    const angle = Math.random()*Math.PI*2;
    const dist = Math.random()*brushSize*0.5;
    addParticle(x + Math.cos(angle)*dist, y + Math.sin(angle)*dist, currentColor);
  }
}

// Spatial grid for fast neighbor lookups
const GRID_SIZE = 50;
let grid;

function buildGrid(){
  const cols = Math.ceil(W/GRID_SIZE);
  const rows = Math.ceil(H/GRID_SIZE);
  grid = Array.from({length:cols*rows}, ()=>[]);
  particles.forEach((p,i) => {
    const gx = Math.floor(p.x/GRID_SIZE);
    const gy = Math.floor(p.y/GRID_SIZE);
    if(gx>=0 && gx<cols && gy>=0 && gy<rows){
      grid[gy*cols+gx].push(i);
    }
  });
}

function updatePhysics(){
  if(frozen) return;
  if(!repulsionOn){
    // Just damping
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx *= DAMPING; p.vy *= DAMPING;
      if(p.x<p.r){p.x=p.r;p.vx*=-0.5;} if(p.x>W-p.r){p.x=W-p.r;p.vx*=-0.5;}
      if(p.y<p.r){p.y=p.r;p.vy*=-0.5;} if(p.y>H-p.r){p.y=H-p.r;p.vy*=-0.5;}
    });
    return;
  }

  const cols = Math.ceil(W/GRID_SIZE);
  const rows = Math.ceil(H/GRID_SIZE);
  buildGrid();

  particles.forEach((a, i) => {
    const gx = Math.floor(a.x/GRID_SIZE);
    const gy = Math.floor(a.y/GRID_SIZE);

    // Check neighboring grid cells
    for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
      const nx=gx+dx, ny=gy+dy;
      if(nx<0||nx>=cols||ny<0||ny>=rows) continue;
      const cell = grid[ny*cols+nx];
      for(let ji=0;ji<cell.length;ji++){
        const j = cell[ji];
        if(j <= i) continue;
        const b = particles[j];
        const ddx = a.x-b.x, ddy = a.y-b.y;
        const distSq = ddx*ddx + ddy*ddy;
        if(distSq > REPEL_RADIUS*REPEL_RADIUS || distSq < 0.1) continue;

        const dist = Math.sqrt(distSq);
        const sameColor = a.color === b.color;

        if(sameColor){
          // Slight attraction between same color (cohesion)
          const attract = SAME_COLOR_ATTRACT * (dist / REPEL_RADIUS);
          const fx = (ddx/dist) * attract;
          const fy = (ddy/dist) * attract;
          a.vx -= fx; a.vy -= fy;
          b.vx += fx; b.vy += fy;
        } else {
          // Different colors repel
          const force = REPEL_FORCE * (1 - dist/REPEL_RADIUS);
          const fx = (ddx/dist) * force;
          const fy = (ddy/dist) * force;
          a.vx += fx; a.vy += fy;
          b.vx -= fx; b.vy -= fy;
        }
      }
    }
  });

  // Integrate
  particles.forEach(p => {
    p.vx *= DAMPING;
    p.vy *= DAMPING;
    // Clamp velocity
    const maxV = 4;
    const v = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(v > maxV){ p.vx *= maxV/v; p.vy *= maxV/v; }
    p.x += p.vx;
    p.y += p.vy;
    // Bounce off walls
    if(p.x<p.r){p.x=p.r;p.vx*=-0.5;}
    if(p.x>W-p.r){p.x=W-p.r;p.vx*=-0.5;}
    if(p.y<p.r){p.y=p.r;p.vy*=-0.5;}
    if(p.y>H-p.r){p.y=H-p.r;p.vy*=-0.5;}
  });
}

function render(){
  ctx.fillStyle = '#0c0c10';
  ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.015)';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<H;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Draw particles with glow
  particles.forEach(p => {
    // Glow
    ctx.fillStyle = p.color + '18';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*3, 0, Math.PI*2);
    ctx.fill();
    // Core
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(p.x - p.r*0.3, p.y - p.r*0.3, p.r*0.4, 0, Math.PI*2);
    ctx.fill();
  });

  // Brush preview
  if(lastX > 0){
    ctx.strokeStyle = currentColor + '40';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(lastX, lastY, brushSize*0.5, 0, Math.PI*2);
    ctx.stroke();
  }

  document.getElementById('countVal').textContent = particles.length;
}

function frame(){
  updatePhysics();
  render();
  requestAnimationFrame(frame);
}

// Input handling
function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - rect.left;
  const y = (e.clientY || e.touches[0].clientY) - rect.top;
  return [x * (W/rect.width), y * (H/rect.height)];
}

canvas.addEventListener('mousedown', e => { drawing=true; const [x,y]=getPos(e); spawnBrush(x,y); lastX=x;lastY=y; });
canvas.addEventListener('mousemove', e => {
  const [x,y]=getPos(e); lastX=x;lastY=y;
  if(drawing) spawnBrush(x,y);
});
canvas.addEventListener('mouseup', ()=>drawing=false);
canvas.addEventListener('mouseleave', ()=>{drawing=false;lastX=-1;});

canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; const [x,y]=getPos(e); spawnBrush(x,y); lastX=x;lastY=y; }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); const [x,y]=getPos(e); lastX=x;lastY=y; if(drawing) spawnBrush(x,y); }, {passive:false});
canvas.addEventListener('touchend', ()=>{drawing=false;lastX=-1;});

// Color buttons
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = btn.dataset.color;
  });
});

// Size slider
document.getElementById('sizeSlider').addEventListener('input', e => { brushSize = parseInt(e.target.value); });

// Tool buttons
const repelBtn = document.getElementById('repelBtn');
repelBtn.addEventListener('click', ()=>{
  repulsionOn = !repulsionOn;
  repelBtn.classList.toggle('active', repulsionOn);
  repelBtn.textContent = repulsionOn ? '🧲 Repel' : '🧲 Off';
});
repelBtn.classList.add('active');

const freezeBtn = document.getElementById('freezeBtn');
freezeBtn.addEventListener('click', ()=>{
  frozen = !frozen;
  freezeBtn.classList.toggle('active', frozen);
  freezeBtn.textContent = frozen ? '❄️ Frozen' : '❄️ Freeze';
});

document.getElementById('clearBtn').addEventListener('click', ()=>{
  particles = [];
});

resize();
window.addEventListener('resize', resize);
frame();
</script>
</body>
</html>
