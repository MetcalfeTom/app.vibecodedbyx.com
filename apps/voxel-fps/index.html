<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxel FPS</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔫">
<meta property="og:title" content="Voxel FPS">
<meta property="og:description" content="First-person neon voxel target practice in a blocky arena.">
<meta property="og:url" content="https://sloppy.live/voxel-fps">
<meta property="og:image" content="https://sloppy.live/voxel-fps/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;cursor:none}
canvas{display:block}
#blocker{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);z-index:30;cursor:default}
#blocker h1{font-family:'Silkscreen',monospace;font-size:clamp(24px,5vw,48px);color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #088;margin-bottom:10px}
#blocker .sub{color:#0f8;font-size:14px;margin-bottom:30px}
#blocker .controls{color:#888;font-size:12px;margin-bottom:20px;text-align:center;line-height:2}
#blocker button{font-family:'Silkscreen',monospace;font-size:16px;background:none;border:2px solid #0ff;color:#0ff;padding:14px 36px;cursor:pointer;transition:all .2s}
#blocker button:hover{background:#0ff;color:#000}
#hud{position:fixed;top:0;left:0;width:100%;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:10}
#score-display{font-family:'Silkscreen',monospace;font-size:20px;color:#0ff;text-shadow:0 0 10px #0ff}
#ammo-display{font-family:'Silkscreen',monospace;font-size:16px;color:#f80;text-shadow:0 0 8px #f80}
#combo-display{font-family:'Silkscreen',monospace;font-size:14px;color:#f0a;text-shadow:0 0 8px #f0a;opacity:0;transition:opacity .3s}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;pointer-events:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:#0ff;box-shadow:0 0 6px #0ff}
#crosshair::before{width:20px;height:2px;top:-1px;left:-10px}
#crosshair::after{width:2px;height:20px;left:-1px;top:-10px}
#hit-marker{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:16;pointer-events:none;opacity:0;transition:opacity .1s}
#hit-marker span{position:absolute;width:12px;height:2px;background:#f44;box-shadow:0 0 8px #f44}
#hit-marker span:nth-child(1){transform:translate(-3px,-8px) rotate(45deg)}
#hit-marker span:nth-child(2){transform:translate(3px,-8px) rotate(-45deg)}
#hit-marker span:nth-child(3){transform:translate(-3px,8px) rotate(-45deg)}
#hit-marker span:nth-child(4){transform:translate(3px,8px) rotate(45deg)}
#damage-flash{position:fixed;inset:0;background:rgba(255,0,0,0.15);pointer-events:none;z-index:12;opacity:0;transition:opacity .15s}
#backlink a{color:#0ff;text-decoration:none}
#wave-announce{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);font-family:'Silkscreen',monospace;font-size:36px;color:#f0a;text-shadow:0 0 30px #f0a;z-index:15;pointer-events:none;opacity:0;transition:opacity .5s}
#minimap{position:fixed;bottom:12px;right:12px;width:120px;height:120px;border:1px solid rgba(0,255,255,0.3);background:rgba(0,0,0,0.5);z-index:10;pointer-events:none}
</style>
</head>
<body>
<div id="blocker">
  <h1>VOXEL FPS</h1>
  <div class="sub">Neon target practice in a blocky arena</div>
  <div class="controls">WASD — move &nbsp;|&nbsp; MOUSE — aim &nbsp;|&nbsp; CLICK — shoot &nbsp;|&nbsp; R — reload &nbsp;|&nbsp; SHIFT — sprint</div>
  <button id="play-btn">PLAY</button>
</div>
<div id="hud">
  <div id="score-display">0</div>
  <div id="combo-display"></div>
  <div id="ammo-display">30 / 30</div>
</div>
<div id="crosshair"></div>
<div id="hit-marker"><span></span><span></span><span></span><span></span></div>
<div id="damage-flash"></div>
<div id="wave-announce"></div>
<canvas id="minimap"></canvas>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.012);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.prepend(renderer.domElement);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Minimap
const minimapCanvas = document.getElementById('minimap');
const mCtx = minimapCanvas.getContext('2d');
minimapCanvas.width = 120; minimapCanvas.height = 120;

// Lighting
const ambient = new THREE.AmbientLight(0x222244, 0.6);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0x8888ff, 0.4);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// Textures - procedural blocky textures
function makeBlockTexture(baseColor, gridColor) {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const x = c.getContext('2d');
  x.fillStyle = baseColor;
  x.fillRect(0, 0, 64, 64);
  x.strokeStyle = gridColor;
  x.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 4; j++) {
      x.strokeRect(i * 16 + 1, j * 16 + 1, 14, 14);
    }
  }
  // Noise
  for (let i = 0; i < 80; i++) {
    x.fillStyle = `rgba(0,0,0,${Math.random() * 0.15})`;
    x.fillRect(Math.random() * 64, Math.random() * 64, 2, 2);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}

const floorTex = makeBlockTexture('#1a1a2e', '#252540');
floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
floorTex.repeat.set(20, 20);

const wallTex = makeBlockTexture('#1e1e3a', '#2a2a4e');
wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;

const pillarTex = makeBlockTexture('#2a1a3e', '#3a2a50');

// Arena floor
const floorGeo = new THREE.PlaneGeometry(80, 80);
const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Ceiling
const ceilMat = new THREE.MeshStandardMaterial({ color: 0x0a0a1a, roughness: 1 });
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), ceilMat);
ceil.rotation.x = Math.PI / 2;
ceil.position.y = 6;
scene.add(ceil);

// Arena walls
const ARENA = 38;
const wallGeo = new THREE.BoxGeometry(80, 6, 2);
const wallMatI = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.8 });
const wallPositions = [
  { pos: [0, 3, -ARENA], rot: 0 },
  { pos: [0, 3, ARENA], rot: 0 },
  { pos: [-ARENA, 3, 0], rot: Math.PI / 2 },
  { pos: [ARENA, 3, 0], rot: Math.PI / 2 }
];
const wallMeshes = [];
wallPositions.forEach(w => {
  const wt2 = wallTex.clone();
  wt2.wrapS = wt2.wrapT = THREE.RepeatWrapping;
  wt2.repeat.set(10, 1);
  const mesh = new THREE.Mesh(wallGeo, new THREE.MeshStandardMaterial({ map: wt2, roughness: 0.8 }));
  mesh.position.set(...w.pos);
  mesh.rotation.y = w.rot;
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  wallMeshes.push(mesh);
});

// Pillars and cover blocks
const structures = [];
const structurePositions = [
  { p: [10, 1.5, 10], s: [3, 3, 3] }, { p: [-10, 1.5, -10], s: [3, 3, 3] },
  { p: [10, 1.5, -10], s: [3, 3, 3] }, { p: [-10, 1.5, 10], s: [3, 3, 3] },
  { p: [0, 1, 15], s: [5, 2, 2] }, { p: [0, 1, -15], s: [5, 2, 2] },
  { p: [15, 1, 0], s: [2, 2, 5] }, { p: [-15, 1, 0], s: [2, 2, 5] },
  { p: [20, 2, 20], s: [4, 4, 4] }, { p: [-20, 2, -20], s: [4, 4, 4] },
  { p: [20, 2, -20], s: [4, 4, 4] }, { p: [-20, 2, 20], s: [4, 4, 4] },
  { p: [0, 1.5, 0], s: [2, 3, 2] },
  { p: [25, 1, 10], s: [3, 2, 3] }, { p: [-25, 1, -10], s: [3, 2, 3] },
  { p: [5, 0.5, -25], s: [6, 1, 2] }, { p: [-5, 0.5, 25], s: [6, 1, 2] },
];
structurePositions.forEach(sp => {
  const geo = new THREE.BoxGeometry(...sp.s);
  const mat = new THREE.MeshStandardMaterial({ map: pillarTex, roughness: 0.7 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...sp.p);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  structures.push({ mesh, box: new THREE.Box3().setFromObject(mesh) });
});

// Neon strip lights on walls
const neonColors = [0x00ffff, 0xff00aa, 0x00ff88, 0xffaa00, 0xaa00ff];
for (let i = 0; i < 16; i++) {
  const color = neonColors[i % neonColors.length];
  const light = new THREE.PointLight(color, 1.5, 15);
  const angle = (i / 16) * Math.PI * 2;
  const dist = ARENA - 1.5;
  light.position.set(Math.cos(angle) * dist, 3, Math.sin(angle) * dist);
  scene.add(light);
  // Glow strip
  const stripGeo = new THREE.BoxGeometry(0.3, 0.3, 2);
  const stripMat = new THREE.MeshBasicMaterial({ color });
  const strip = new THREE.Mesh(stripGeo, stripMat);
  strip.position.copy(light.position);
  strip.lookAt(0, 3, 0);
  scene.add(strip);
}

// FPS Controls
let yaw = 0, pitch = 0;
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
const keys = {};
let locked = false;
let playing = false;

document.getElementById('play-btn').addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  locked = !!document.pointerLockElement;
  document.getElementById('blocker').style.display = locked ? 'none' : 'flex';
  if (locked && !playing) { playing = true; spawnWave(); }
});

document.addEventListener('mousemove', e => {
  if (!locked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));
});

addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'KeyR') reload(); });
addEventListener('keyup', e => keys[e.code] = false);

// Shooting
let ammo = 30, maxAmmo = 30, reloading = false, reloadTime = 0;
let score = 0, combo = 0, comboTimer = 0;
const raycaster = new THREE.Raycaster();
const shootables = [];

// Gun model
const gunGroup = new THREE.Group();
const gunBody = new THREE.Mesh(
  new THREE.BoxGeometry(0.12, 0.14, 0.5),
  new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.3, metalness: 0.8 })
);
const gunBarrel = new THREE.Mesh(
  new THREE.BoxGeometry(0.06, 0.06, 0.3),
  new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.2, metalness: 0.9 })
);
gunBarrel.position.z = -0.35;
gunBarrel.position.y = 0.02;
const gunGlow = new THREE.Mesh(
  new THREE.BoxGeometry(0.04, 0.04, 0.5),
  new THREE.MeshBasicMaterial({ color: 0x00ffff })
);
gunGlow.position.y = -0.05;
gunGroup.add(gunBody, gunBarrel, gunGlow);
gunGroup.position.set(0.3, -0.25, -0.5);
camera.add(gunGroup);
scene.add(camera);

let gunRecoil = 0;
let muzzleFlash = null;

// Targets
const targetGeo = new THREE.BoxGeometry(1.2, 1.8, 1.2);
const targets = [];
let wave = 0;
let targetsPerWave = 5;

function createTarget() {
  const colorIdx = Math.floor(Math.random() * neonColors.length);
  const color = neonColors[colorIdx];
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 0.5,
    roughness: 0.3, metalness: 0.5
  });
  const mesh = new THREE.Mesh(targetGeo, mat);

  // Random position avoiding structures and player
  let px, pz, valid;
  do {
    valid = true;
    px = (Math.random() - 0.5) * 60;
    pz = (Math.random() - 0.5) * 60;
    if (Math.hypot(px - camera.position.x, pz - camera.position.z) < 6) valid = false;
    const tb = new THREE.Box3().setFromCenterAndSize(
      new THREE.Vector3(px, 0.9, pz), new THREE.Vector3(1.5, 2, 1.5)
    );
    for (const s of structures) {
      if (s.box.intersectsBox(tb)) { valid = false; break; }
    }
  } while (!valid);

  mesh.position.set(px, 0.9, pz);
  mesh.userData = { hp: 2 + Math.floor(wave / 3), maxHp: 2 + Math.floor(wave / 3), color, speed: 1 + wave * 0.15, dir: Math.random() * Math.PI * 2, moveTimer: 0 };
  scene.add(mesh);
  targets.push(mesh);
  shootables.push(mesh);

  // Glow light
  const glow = new THREE.PointLight(color, 2, 8);
  glow.position.copy(mesh.position);
  glow.position.y = 1.5;
  scene.add(glow);
  mesh.userData.glow = glow;

  // HP bar background
  const hpBg = new THREE.Mesh(
    new THREE.PlaneGeometry(1.4, 0.15),
    new THREE.MeshBasicMaterial({ color: 0x333333 })
  );
  hpBg.position.set(0, 1.3, 0);
  mesh.add(hpBg);

  const hpBar = new THREE.Mesh(
    new THREE.PlaneGeometry(1.3, 0.1),
    new THREE.MeshBasicMaterial({ color })
  );
  hpBar.position.set(0, 1.3, 0.01);
  mesh.add(hpBar);
  mesh.userData.hpBar = hpBar;
}

function spawnWave() {
  wave++;
  targetsPerWave = 4 + wave * 2;
  for (let i = 0; i < targetsPerWave; i++) createTarget();
  // Announce
  const ann = document.getElementById('wave-announce');
  ann.textContent = 'WAVE ' + wave;
  ann.style.opacity = 1;
  setTimeout(() => { ann.style.opacity = 0; }, 2000);
}

function reload() {
  if (reloading || ammo === maxAmmo) return;
  reloading = true;
  reloadTime = 1.5;
}

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playShoot() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(200, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.1);
  // Noise burst
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const n = audioCtx.createBufferSource();
  const ng = audioCtx.createGain();
  n.buffer = buf;
  ng.gain.setValueAtTime(0.12, audioCtx.currentTime);
  ng.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  n.connect(ng); ng.connect(audioCtx.destination);
  n.start();
}
function playHit() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(600, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.08);
  g.gain.setValueAtTime(0.08, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.08);
}
function playKill() {
  [400, 600, 800].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.06);
    g.gain.setValueAtTime(0.06, audioCtx.currentTime + i * 0.06);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.06 + 0.15);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime + i * 0.06);
    o.stop(audioCtx.currentTime + i * 0.06 + 0.15);
  });
}

// Hit particles
const hitParticles = [];
function spawnHitParticles(pos, color) {
  for (let i = 0; i < 8; i++) {
    const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    const vel = new THREE.Vector3((Math.random()-0.5)*4, Math.random()*4, (Math.random()-0.5)*4);
    scene.add(mesh);
    hitParticles.push({ mesh, vel, life: 1 });
  }
}

// Shoot
let canShoot = true;
let shootCooldown = 0;
document.addEventListener('mousedown', e => {
  if (!locked || e.button !== 0) return;
  shoot();
});

function shoot() {
  if (!canShoot || reloading || ammo <= 0) return;
  ammo--;
  canShoot = false;
  shootCooldown = 0.12;
  gunRecoil = 0.08;
  playShoot();
  updateHUD();

  // Muzzle flash
  if (muzzleFlash) camera.remove(muzzleFlash);
  const flashGeo = new THREE.SphereGeometry(0.04, 4, 4);
  const flashMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
  muzzleFlash = new THREE.Mesh(flashGeo, flashMat);
  muzzleFlash.position.set(0.3, -0.18, -0.85);
  camera.add(muzzleFlash);
  setTimeout(() => { if (muzzleFlash) { camera.remove(muzzleFlash); muzzleFlash = null; } }, 50);

  // Raycast
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const hits = raycaster.intersectObjects(shootables);
  if (hits.length > 0) {
    const hit = hits[0];
    const target = hit.object;
    if (target.userData.hp !== undefined) {
      target.userData.hp--;
      playHit();
      spawnHitParticles(hit.point, target.userData.color);

      // Hit marker
      const hm = document.getElementById('hit-marker');
      hm.style.opacity = 1;
      setTimeout(() => { hm.style.opacity = 0; }, 100);

      // Update HP bar
      const hpRatio = target.userData.hp / target.userData.maxHp;
      target.userData.hpBar.scale.x = Math.max(0, hpRatio);

      // Flash target
      target.material.emissiveIntensity = 2;
      setTimeout(() => { if (target.material) target.material.emissiveIntensity = 0.5; }, 80);

      if (target.userData.hp <= 0) {
        // Kill
        combo++;
        comboTimer = 3;
        const points = 100 * combo;
        score += points;
        playKill();

        // Big explosion particles
        spawnHitParticles(target.position, target.userData.color);
        spawnHitParticles(target.position, target.userData.color);

        // Remove
        scene.remove(target);
        if (target.userData.glow) scene.remove(target.userData.glow);
        const ti = targets.indexOf(target);
        if (ti >= 0) targets.splice(ti, 1);
        const si = shootables.indexOf(target);
        if (si >= 0) shootables.splice(si, 1);

        updateHUD();

        // Next wave
        if (targets.length === 0) {
          setTimeout(spawnWave, 1500);
        }
      }
    }
  }

  if (ammo <= 0) reload();
}

function updateHUD() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('ammo-display').textContent = ammo + ' / ' + maxAmmo;
  const cd = document.getElementById('combo-display');
  if (combo > 1) {
    cd.textContent = combo + 'x COMBO';
    cd.style.opacity = 1;
  }
}

// Collision detection
function checkCollision(newPos) {
  const playerBox = new THREE.Box3().setFromCenterAndSize(
    new THREE.Vector3(newPos.x, 1, newPos.z), new THREE.Vector3(0.6, 1.7, 0.6)
  );
  for (const s of structures) {
    if (s.box.intersectsBox(playerBox)) return true;
  }
  // Arena bounds
  if (Math.abs(newPos.x) > ARENA - 1 || Math.abs(newPos.z) > ARENA - 1) return true;
  return false;
}

// Game loop
const clock = new THREE.Clock();
let bobTimer = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (!locked || !playing) { renderer.render(scene, camera); return; }

  // Camera rotation
  const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
  camera.quaternion.setFromEuler(euler);

  // Movement
  const sprint = keys['ShiftLeft'] || keys['ShiftRight'];
  const moveSpeed = sprint ? 12 : 7;
  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0, yaw, 0)));
  const right = new THREE.Vector3(1, 0, 0).applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0, yaw, 0)));

  direction.set(0, 0, 0);
  if (keys['KeyW']) direction.add(forward);
  if (keys['KeyS']) direction.sub(forward);
  if (keys['KeyD']) direction.add(right);
  if (keys['KeyA']) direction.sub(right);
  if (direction.length() > 0) direction.normalize();

  velocity.x += direction.x * moveSpeed * dt;
  velocity.z += direction.z * moveSpeed * dt;
  velocity.x *= 0.85;
  velocity.z *= 0.85;

  const newPos = camera.position.clone();
  newPos.x += velocity.x;
  if (checkCollision(newPos)) { velocity.x = 0; newPos.x = camera.position.x; }
  newPos.z += velocity.z;
  if (checkCollision(newPos)) { velocity.z = 0; newPos.z = camera.position.z; }
  camera.position.x = newPos.x;
  camera.position.z = newPos.z;

  // Head bob
  if (direction.length() > 0) {
    bobTimer += dt * (sprint ? 14 : 10);
    camera.position.y = 1.7 + Math.sin(bobTimer) * 0.04;
  } else {
    camera.position.y += (1.7 - camera.position.y) * 0.1;
  }

  // Gun bob & recoil
  gunGroup.position.y = -0.25 + Math.sin(bobTimer * 0.8) * 0.01;
  gunGroup.position.x = 0.3 + Math.cos(bobTimer * 0.4) * 0.005;
  if (gunRecoil > 0) {
    gunGroup.position.z = -0.5 + gunRecoil;
    gunRecoil *= 0.8;
    if (gunRecoil < 0.002) gunRecoil = 0;
  } else {
    gunGroup.position.z = -0.5;
  }

  // Shoot cooldown
  if (shootCooldown > 0) {
    shootCooldown -= dt;
    if (shootCooldown <= 0) canShoot = true;
  }

  // Reload
  if (reloading) {
    reloadTime -= dt;
    gunGroup.rotation.x = Math.sin(reloadTime * 4) * 0.3;
    if (reloadTime <= 0) {
      reloading = false;
      ammo = maxAmmo;
      gunGroup.rotation.x = 0;
      updateHUD();
    }
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) {
      combo = 0;
      document.getElementById('combo-display').style.opacity = 0;
    }
  }

  // Target AI — move and face player
  targets.forEach(t => {
    t.userData.moveTimer += dt;
    if (t.userData.moveTimer > 2) {
      t.userData.dir = Math.random() * Math.PI * 2;
      t.userData.moveTimer = 0;
    }
    const spd = t.userData.speed * dt;
    const nx = t.position.x + Math.cos(t.userData.dir) * spd;
    const nz = t.position.z + Math.sin(t.userData.dir) * spd;
    // Bounds
    if (Math.abs(nx) < ARENA - 2 && Math.abs(nz) < ARENA - 2) {
      const tb = new THREE.Box3().setFromCenterAndSize(
        new THREE.Vector3(nx, 0.9, nz), new THREE.Vector3(1.5, 2, 1.5)
      );
      let blocked = false;
      for (const s of structures) { if (s.box.intersectsBox(tb)) { blocked = true; break; } }
      if (!blocked) {
        t.position.x = nx;
        t.position.z = nz;
        if (t.userData.glow) { t.userData.glow.position.x = nx; t.userData.glow.position.z = nz; }
      } else {
        t.userData.dir += Math.PI * 0.7;
      }
    } else {
      t.userData.dir += Math.PI;
    }
    // Hover bob
    t.position.y = 0.9 + Math.sin(Date.now() * 0.003 + t.id) * 0.15;
    // Look at player
    t.lookAt(camera.position.x, t.position.y, camera.position.z);
    // HP bar faces player
    t.children.forEach(c => c.lookAt(camera.position));
  });

  // Particles
  for (let i = hitParticles.length - 1; i >= 0; i--) {
    const p = hitParticles[i];
    p.vel.y -= 9.8 * dt;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    p.mesh.rotation.x += dt * 5;
    p.mesh.rotation.z += dt * 3;
    p.life -= dt * 2;
    p.mesh.material.opacity = p.life;
    p.mesh.material.transparent = true;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      hitParticles.splice(i, 1);
    }
  }

  // Minimap
  mCtx.fillStyle = 'rgba(0,0,0,0.8)';
  mCtx.fillRect(0, 0, 120, 120);
  const mapScale = 120 / (ARENA * 2);
  // Structures
  mCtx.fillStyle = '#2a2a4e';
  structures.forEach(s => {
    const sp = s.mesh.position;
    const ss = s.mesh.geometry.parameters;
    mCtx.fillRect(
      60 + (sp.x - ss.width / 2) * mapScale,
      60 + (sp.z - ss.depth / 2) * mapScale,
      ss.width * mapScale, ss.depth * mapScale
    );
  });
  // Targets
  targets.forEach(t => {
    mCtx.fillStyle = '#' + t.userData.color.toString(16).padStart(6, '0');
    mCtx.fillRect(60 + t.position.x * mapScale - 2, 60 + t.position.z * mapScale - 2, 4, 4);
  });
  // Player
  mCtx.fillStyle = '#fff';
  mCtx.beginPath();
  mCtx.arc(60 + camera.position.x * mapScale, 60 + camera.position.z * mapScale, 3, 0, Math.PI * 2);
  mCtx.fill();
  // Direction
  mCtx.strokeStyle = '#0ff';
  mCtx.lineWidth = 1;
  mCtx.beginPath();
  mCtx.moveTo(60 + camera.position.x * mapScale, 60 + camera.position.z * mapScale);
  const lookDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  mCtx.lineTo(60 + (camera.position.x + lookDir.x * 5) * mapScale, 60 + (camera.position.z + lookDir.z * 5) * mapScale);
  mCtx.stroke();

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
