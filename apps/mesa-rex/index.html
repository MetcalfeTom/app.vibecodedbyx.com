<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mesa Rex · a desert runner</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%A6%96">
  <meta name="description" content="Jump cacti, duck pterodactyls, outrun the sunset. A T-Rex runner where the desert day fades to starry night as you go.">
  <meta property="og:title" content="Mesa Rex — outrun the sunset">
  <meta property="og:description" content="A desert T-Rex runner: jump cacti, duck pterodactyls, watch day turn to night at speed. How far can you run?">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/pixel%20art%20trex%20dinosaur%20running%20through%20desert%20sunset%20mesas%20cacti%20silhouette%20orange%20purple%20sky?width=1200&height=630&seed=8666&nologo=true&model=flux">
  <meta property="og:url" content="https://sloppy.live/mesa-rex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{ --sand:#e8c58a; --ink:#2b1c14; --ember:#d4552e; --dusk:#5a2d52; }
    *{ box-sizing:border-box; }
    html,body{ margin:0; min-height:100%; }
    body{
      background:#1a0f14;
      color:var(--sand);
      font:400 1rem/1.5 'Space Mono', monospace;
      display:flex; flex-direction:column; align-items:center;
      padding:1.4rem 1rem 2.5rem;
      background-image:radial-gradient(ellipse 60rem 30rem at 50% -10%, rgba(212,85,46,0.12), transparent 60%);
    }
    header{ text-align:center; margin-bottom:0.9rem; }
    h1{
      font:600 clamp(2rem,7vw,3rem)/1 'Pixelify Sans', monospace;
      margin:0; color:var(--sand); letter-spacing:0.03em;
    }
    h1 .rx{ color:var(--ember); }
    .tag{ font-size:0.78rem; color:#a8825f; margin:0.25rem 0 0; }
    .stage{
      position:relative; width:min(56rem,96vw);
      border:3px solid var(--ink); border-radius:10px;
      box-shadow:0 6px 0 var(--ink), 0 18px 44px rgba(0,0,0,0.5);
      overflow:hidden; background:#f7b96a;
    }
    canvas{ display:block; width:100%; height:auto; aspect-ratio:900/300; }
    .touchrow{
      display:none; gap:0.6rem; width:min(56rem,96vw); margin-top:0.7rem;
    }
    .touchrow button{
      flex:1; min-height:3.4rem; font:600 1rem 'Pixelify Sans', monospace;
      background:#2b1c14; color:var(--sand); border:2px solid #4a3020; border-radius:10px;
      cursor:pointer; touch-action:manipulation;
    }
    .touchrow button:active{ background:var(--ember); color:#fff; }
    @media (pointer:coarse){ .touchrow{ display:flex; } }
    .foot{ margin-top:0.8rem; font-size:0.72rem; color:#8a6a4a; text-align:center; }
    .foot kbd{ background:#2b1c14; border:1px solid #4a3020; border-radius:4px; padding:0.05rem 0.4rem; }
    button:focus-visible{ outline:3px solid var(--ember); outline-offset:2px; }
    @media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }
  </style>
</head>
<body>
  <header>
    <h1>MESA <span class="rx">REX</span></h1>
    <p class="tag">outrun the sunset · the desert goes dark at speed</p>
  </header>
  <div class="stage">
    <canvas id="cv" width="900" height="300" role="application"
      aria-label="T-Rex desert runner. Press space or up arrow, or tap, to jump over cacti. Press down arrow to duck under pterodactyls."></canvas>
  </div>
  <div class="touchrow" aria-hidden="false">
    <button id="tJump" type="button">▲ JUMP</button>
    <button id="tDuck" type="button">▼ DUCK</button>
  </div>
  <p class="foot"><kbd>space</kbd>/<kbd>↑</kbd> jump · <kbd>↓</kbd> duck · <kbd>M</kbd> sound · every run ends. make it a long one.</p>
  <p id="live" role="status" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)"></p>

  <script>
  (function(){
    'use strict';
    var W=900, H=300, GROUND=252;
    var cv=document.getElementById('cv'), X=cv.getContext('2d');
    var live=document.getElementById('live');

    /* ── state ── */
    var st={
      mode:'ready',            // ready | run | dead
      t:0, speed:6, score:0, hi:0,
      dino:{ y:GROUND, vy:0, duck:false, frame:0, blink:0 },
      obs:[], birds:[], nextSpawn:0,
      clouds:[], stones:[], stars:[],
      shakeT:0, milestone:0,
    };
    try{ st.hi=parseInt(localStorage.getItem('mesa-rex-hi'),10)||0; }catch(e){}
    var reduceMotion=false;
    try{ reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){}

    function seedScene(){
      st.clouds=[]; st.stones=[]; st.stars=[];
      for(var i=0;i<4;i++) st.clouds.push({ x:Math.random()*W, y:30+Math.random()*80, w:40+Math.random()*50 });
      for(var s=0;s<14;s++) st.stones.push({ x:Math.random()*W, y:GROUND+10+Math.random()*30, r:1+Math.random()*2.4 });
      for(var k=0;k<70;k++) st.stars.push({ x:Math.random()*W, y:Math.random()*180, r:Math.random()*1.3+0.4, p:Math.random()*6.28 });
    }
    seedScene();

    /* ── audio (tiny synth, 4ms attacks — no clicks in this desert) ── */
    var AC=null, muted=false;
    function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
    function boop(f0,f1,dur,vol,type){
      if(muted||!ac()) return;
      try{
        var t=AC.currentTime, o=AC.createOscillator(), g=AC.createGain();
        o.type=type||'square'; o.frequency.setValueAtTime(f0,t);
        o.frequency.exponentialRampToValueAtTime(f1,t+dur);
        g.gain.setValueAtTime(0.0008,t); g.gain.linearRampToValueAtTime(vol,t+0.004);
        g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
        o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+dur+0.02);
      }catch(e){}
    }
    var sndJump=function(){ boop(280,520,0.14,0.07); };
    var sndDie=function(){ boop(300,60,0.5,0.1,'sawtooth'); };
    var sndMile=function(){ boop(660,880,0.09,0.05,'triangle'); setTimeout(function(){ boop(880,1100,0.09,0.05,'triangle'); },90); };

    /* ── day/night: one full cycle per 600 points ── */
    function skyPhase(){ return (st.score%600)/600; }   // 0 day → 0.5 night → 1 day
    function lerp(a,b,t){ return a+(b-a)*t; }
    function mix(c1,c2,t){ return [Math.round(lerp(c1[0],c2[0],t)),Math.round(lerp(c1[1],c2[1],t)),Math.round(lerp(c1[2],c2[2],t))]; }
    function rgb(c){ return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }
    function nightness(){ var p=skyPhase(); return p<0.5 ? p*2 : (1-p)*2; }   // 0=noon 1=midnight

    /* ── spawning ── */
    function spawn(){
      var canBird=st.score>250;
      if(canBird && Math.random()<0.28){
        var hgt=Math.random()<0.5 ? GROUND-52 : GROUND-14;   // high = run under? no: duck or jump lanes
        st.birds.push({ x:W+40, y:hgt, flap:0 });
      } else {
        var n=1+Math.floor(Math.random()*Math.min(3, 1+st.score/300));
        var group=[];
        for(var i=0;i<n;i++){
          var big=Math.random()<0.4;
          group.push({ x:W+40+i*26, w:big?20:13, h:big?46:32 });
        }
        st.obs.push.apply(st.obs, group);
      }
      // gap shrinks with speed but always clearable
      st.nextSpawn = st.t + (52+Math.random()*46) * (6/st.speed) * 3;
    }

    /* ── input ── */
    function jump(){
      if(st.mode==='ready'){ start(); return; }
      if(st.mode==='dead'){ restart(); return; }
      if(st.dino.y>=GROUND-0.5){ st.dino.vy=-13.2; st.dino.duck=false; sndJump(); }
    }
    function setDuck(on){
      if(st.mode!=='run') return;
      st.dino.duck=on;
      if(on && st.dino.y<GROUND) st.dino.vy=Math.max(st.dino.vy, 10);   // fast-fall
    }
    document.addEventListener('keydown', function(e){
      if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); jump(); }
      else if(e.code==='ArrowDown'){ e.preventDefault(); setDuck(true); }
      else if(e.key==='m'||e.key==='M'){ muted=!muted; live.textContent=muted?'sound off':'sound on'; }
    });
    document.addEventListener('keyup', function(e){ if(e.code==='ArrowDown') setDuck(false); });
    cv.addEventListener('pointerdown', function(e){ e.preventDefault(); jump(); });
    var tj=document.getElementById('tJump'), td=document.getElementById('tDuck');
    tj.addEventListener('pointerdown', function(e){ e.preventDefault(); jump(); });
    td.addEventListener('pointerdown', function(e){ e.preventDefault(); setDuck(true); });
    td.addEventListener('pointerup', function(){ setDuck(false); });
    td.addEventListener('pointerleave', function(){ setDuck(false); });

    function start(){ st.mode='run'; st.score=0; st.speed=6; st.obs=[]; st.birds=[]; st.nextSpawn=st.t+90; live.textContent='Run!'; }
    function restart(){ st.mode='ready'; st.dino.y=GROUND; st.dino.vy=0; st.dino.duck=false; start(); }
    function die(){
      st.mode='dead'; st.shakeT=12; sndDie();
      if(st.score>st.hi){ st.hi=Math.floor(st.score); try{ localStorage.setItem('mesa-rex-hi', String(st.hi)); }catch(e){} }
      live.textContent='Extinct at '+Math.floor(st.score)+' points. Press space or tap to run again.';
    }

    /* ── hitboxes (forgiving insets — deaths should feel fair) ── */
    function dinoBox(){
      var duck=st.dino.duck && st.dino.y>=GROUND-0.5;
      return duck ? { x:52, y:st.dino.y-26, w:52, h:24 } : { x:58, y:st.dino.y-52, w:34, h:50 };
    }
    function hit(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

    /* ── update ── */
    function update(){
      st.t++;
      if(st.mode!=='run') return;
      st.score+=st.speed*0.024;
      st.speed=Math.min(14, 6+st.score/220);
      if(Math.floor(st.score/100)>st.milestone){ st.milestone=Math.floor(st.score/100); sndMile(); }
      // dino physics
      var d=st.dino;
      if(d.y<GROUND || d.vy<0){ d.vy+=0.72; d.y=Math.min(GROUND, d.y+d.vy); }
      if(d.y>=GROUND && d.vy>0) d.vy=0;
      d.frame+=st.speed*0.05;
      if(--d.blink<0 && Math.random()<0.01) d.blink=8;
      // world
      if(st.t>=st.nextSpawn) spawn();
      for(var i=st.obs.length-1;i>=0;i--){ st.obs[i].x-=st.speed; if(st.obs[i].x<-40) st.obs.splice(i,1); }
      for(var b=st.birds.length-1;b>=0;b--){ var bd=st.birds[b]; bd.x-=st.speed*1.15; bd.flap+=0.2; if(bd.x<-60) st.birds.splice(b,1); }
      for(var c=0;c<st.clouds.length;c++){ st.clouds[c].x-=st.speed*0.12; if(st.clouds[c].x<-80) st.clouds[c].x=W+40; }
      for(var s2=0;s2<st.stones.length;s2++){ st.stones[s2].x-=st.speed; if(st.stones[s2].x<-5) st.stones[s2].x=W+5; }
      // collisions
      var box=dinoBox();
      for(var o2=0;o2<st.obs.length;o2++){
        var ob=st.obs[o2];
        if(hit(box, { x:ob.x+2, y:GROUND-ob.h+3, w:ob.w-4, h:ob.h-3 })){ die(); return; }
      }
      for(var b2=0;b2<st.birds.length;b2++){
        var brd=st.birds[b2];
        if(hit(box, { x:brd.x+4, y:brd.y-10, w:34, h:18 })){ die(); return; }
      }
    }

    /* ── draw ── */
    function drawSky(){
      var n=nightness();
      var top=mix([255,183,105],[16,12,40],n), bot=mix([247,185,106],[42,26,58],n);
      var g=X.createLinearGradient(0,0,0,H);
      g.addColorStop(0,rgb(top)); g.addColorStop(1,rgb(bot));
      X.fillStyle=g; X.fillRect(0,0,W,H);
      // sun ↘ moon ↗ across the cycle
      var p=skyPhase(), cx=W*0.78, cy=70;
      if(n<0.85){ // sun
        X.beginPath(); X.arc(cx, cy+n*90, 26, 0, 6.283);
        X.fillStyle='rgba(255,'+Math.round(220-n*120)+',120,'+(1-n*0.7)+')'; X.fill();
      }
      if(n>0.25){ // moon + stars
        X.beginPath(); X.arc(W*0.2, 60, 16, 0, 6.283); X.fillStyle='rgba(240,238,220,'+((n-0.25)*1.2)+')'; X.fill();
        X.beginPath(); X.arc(W*0.2+7, 56, 13, 0, 6.283); X.fillStyle=rgb(mix([255,183,105],[16,12,40],n)); X.fill();
        for(var s3=0;s3<st.stars.length;s3++){ var sr=st.stars[s3];
          var tw=reduceMotion?0.8:0.5+0.5*Math.sin(st.t*0.05+sr.p);
          X.fillStyle='rgba(255,250,230,'+((n-0.25)*tw)+')';
          X.fillRect(sr.x, sr.y, sr.r, sr.r);
        }
      }
      // clouds
      X.fillStyle='rgba(255,240,220,'+(0.5-n*0.3)+')';
      for(var c2=0;c2<st.clouds.length;c2++){ var cl=st.clouds[c2];
        X.fillRect(cl.x, cl.y, cl.w, 8); X.fillRect(cl.x+8, cl.y-6, cl.w*0.6, 7);
      }
      // far mesas (parallax via t)
      var n2=nightness();
      X.fillStyle=rgb(mix([196,110,70],[30,20,44],n2));
      var off=(st.t*0.4)%520;
      for(var m=-1;m<3;m++){
        var mx=m*520-off;
        X.fillRect(mx+40,140,150,120); X.fillRect(mx+55,120,120,20);
        X.fillRect(mx+300,165,90,95); X.fillRect(mx+312,150,66,15);
      }
      // ground
      X.fillStyle=rgb(mix([222,168,102],[52,34,52],n2));
      X.fillRect(0,GROUND+8,W,H-GROUND);
      X.strokeStyle=rgb(mix([120,70,40],[20,14,30],n2)); X.lineWidth=3;
      X.beginPath(); X.moveTo(0,GROUND+9); X.lineTo(W,GROUND+9); X.stroke();
      X.fillStyle=rgb(mix([170,115,66],[36,24,40],n2));
      for(var s4=0;s4<st.stones.length;s4++){ var stn=st.stones[s4]; X.fillRect(stn.x,stn.y,stn.r*2,stn.r); }
    }
    function drawCactus(ob){
      var n=nightness();
      X.fillStyle=rgb(mix([44,102,58],[18,34,30],n));
      var x=ob.x, h=ob.h, w=ob.w, y=GROUND+8;
      X.fillRect(x, y-h, w, h);
      X.fillRect(x-6, y-h*0.72, 6, 5); X.fillRect(x-6, y-h*0.72, 5, h*0.3);
      X.fillRect(x+w, y-h*0.55, 6, 5); X.fillRect(x+w+1, y-h*0.55, 5, h*0.22);
      X.fillStyle='rgba(255,255,255,0.14)'; X.fillRect(x+2, y-h, 3, h);
    }
    function drawBird(b){
      var n=nightness();
      X.fillStyle=rgb(mix([80,48,60],[220,200,170],n*0.4));
      var wing=Math.sin(b.flap)>0;
      X.fillRect(b.x+8, b.y-8, 26, 8);                       // body
      X.fillRect(b.x+30, b.y-12, 12, 6);                     // head
      X.fillRect(b.x+40, b.y-10, 8, 3);                      // beak
      if(wing){ X.fillRect(b.x+14, b.y-20, 12, 12); } else { X.fillRect(b.x+14, b.y-2, 12, 12); }
    }
    function drawDino(){
      var d=st.dino, n=nightness();
      X.save();
      X.translate(56, d.y);
      var landSquash=(d.y>=GROUND-0.5 && Math.abs(d.vy)<0.1 && st.mode==='run');
      X.fillStyle=rgb(mix([64,58,46],[228,214,182],n*0.55));
      if(d.duck && d.y>=GROUND-0.5){
        X.fillRect(-6,-24,46,20);                            // long low body
        X.fillRect(38,-30,20,14);                            // head forward
        X.fillRect(-18,-20,14,8);                            // tail
        var step=Math.floor(d.frame)%2;
        X.fillRect(4,-4,8,4+(step?0:2)); X.fillRect(22,-4,8,4+(step?2:0));
        if(d.blink<=0){ X.fillStyle='#1a0f14'; X.fillRect(50,-27,3,3); }
      } else {
        X.fillRect(0,-44,26,26);                             // body
        X.fillRect(16,-56,22,18);                            // head
        X.fillRect(34,-46,8,4);                              // jaw
        X.fillRect(-14,-38,16,9);                            // tail
        X.fillRect(22,-38,6,6);                              // arm
        var air=d.y<GROUND-0.5;
        if(air){ X.fillRect(4,-18,8,12); X.fillRect(16,-18,8,10); }
        else {
          var stp=Math.floor(d.frame)%2;
          X.fillRect(4,-18,8,stp?18:12); X.fillRect(16,-18,8,stp?12:18);
        }
        if(d.blink<=0){ X.fillStyle='#1a0f14'; X.fillRect(28,-52,4,4); }
        if(landSquash){ /* subtle contact shadow */ }
      }
      X.restore();
      // shadow
      X.fillStyle='rgba(40,20,10,0.25)';
      var sw=34-(GROUND-d.y)*0.1;
      X.beginPath(); X.ellipse(74, GROUND+12, Math.max(14,sw), 4, 0, 0, 6.283); X.fill();
    }
    function drawHud(){
      var n=nightness();
      X.font='700 20px "Space Mono", monospace';
      X.textAlign='right';
      X.fillStyle=rgb(mix([70,40,20],[240,220,180],n));
      X.fillText(String(Math.floor(st.score)).padStart(5,'0'), W-18, 32);
      X.font='400 12px "Space Mono", monospace';
      X.fillText('HI '+String(st.hi).padStart(5,'0'), W-18, 50);
      X.textAlign='left';
      if(st.mode==='ready'){
        X.font='600 30px "Pixelify Sans", monospace';
        X.fillStyle=rgb(mix([60,30,18],[240,220,180],n));
        X.fillText('press SPACE / tap to run', W/2-170, 130);
      }
      if(st.mode==='dead'){
        X.font='600 42px "Pixelify Sans", monospace';
        X.fillStyle='#7a1e12';
        X.fillText('EXTINCT.', W/2-90, 120);
        X.font='400 15px "Space Mono", monospace';
        X.fillStyle=rgb(mix([60,30,18],[240,220,180],n));
        X.fillText('the desert remembers '+Math.floor(st.score)+' points · space to try again', W/2-210, 150);
      }
    }
    function draw(){
      X.save();
      if(st.shakeT>0 && !reduceMotion){ st.shakeT--; X.translate((Math.random()-0.5)*6,(Math.random()-0.5)*6); }
      drawSky();
      for(var i=0;i<st.obs.length;i++) drawCactus(st.obs[i]);
      for(var b=0;b<st.birds.length;b++) drawBird(st.birds[b]);
      drawDino();
      drawHud();
      X.restore();
    }
    function loop(){ update(); draw(); requestAnimationFrame(loop); }
    loop();
  })();
  </script>
</body>
</html>
