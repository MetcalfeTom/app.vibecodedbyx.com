<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>tiny-c-lab</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%9A" />
<meta name="description" content="A tiny C interpreter in your browser, with a live virtual stack and a neon console." />
<meta property="og:title" content="tiny-c-lab" />
<meta property="og:description" content="A tiny C interpreter in your browser, with a live virtual stack and a neon console." />
<meta property="og:url" content="https://sloppy.live/tiny-c-lab/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/retro%20neon%20terminal%20with%20C%20code%20and%20stack%20frames%20glowing%20green%20on%20black%2C%201200x630?width=1200&height=630&nofeed=true&format=png" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Space+Mono:wght@400;700&family=VT323&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --phosphor:#5dffb3;
  --phosphor-dim:rgba(93,255,179,0.55);
  --phosphor-faint:rgba(93,255,179,0.18);
  --pink:#ff5ea1;
  --cyan:#7be4ff;
  --amber:#ffce4a;
  --hot:#ff5e6c;
  --violet:#b386ff;
  --bg:#04060a;
  --panel:#070a10;
  --line:rgba(123,228,255,0.14);
  --bone:#f0e6d6;
  --dim:rgba(240,230,214,0.55);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--bone);font-family:'JetBrains Mono', monospace;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 20% 10%, rgba(123,228,255,0.07), transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(255,94,161,0.06), transparent 55%),
    var(--bg);
  display:flex;flex-direction:column;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0.30) 0 1px, transparent 1px 3px);
  mix-blend-mode:multiply;
}

.head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-bottom:1px solid var(--line);
  z-index:5;flex-wrap:wrap;gap:10px;
}
.brand{
  font-family:'Major Mono Display', monospace;
  font-size:24px;letter-spacing:0.18em;color:var(--bone);
  text-shadow:0 0 12px var(--phosphor-dim), 0 0 22px rgba(123,228,255,0.30);
}
.brand em{font-style:normal;color:var(--cyan)}
.brand small{
  display:block;font-family:'Space Mono', monospace;font-size:9px;letter-spacing:0.32em;
  color:var(--dim);margin-top:3px;
}
.toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{
  background:rgba(123,228,255,0.06);border:1px solid rgba(123,228,255,0.30);
  color:var(--bone);font-family:'Audiowide', sans-serif;font-size:10px;letter-spacing:0.20em;
  padding:7px 12px;border-radius:2px;cursor:pointer;
  transition:all 0.15s;text-transform:uppercase;
}
.btn:hover{color:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(123,228,255,0.30)}
.btn.primary{
  border-color:var(--phosphor);color:var(--phosphor);
  background:linear-gradient(180deg, rgba(93,255,179,0.18), rgba(93,255,179,0.04));
  box-shadow:0 0 14px rgba(93,255,179,0.30);
}
.btn.primary:hover{background:rgba(93,255,179,0.30)}
.btn.warn{border-color:var(--amber);color:var(--amber)}
.btn.hot{border-color:var(--hot);color:var(--hot)}
.btn:disabled{opacity:0.45;cursor:not-allowed}
.btn .kbd{font-size:8px;letter-spacing:0;color:var(--dim);margin-left:6px}
select.btn{appearance:none;-webkit-appearance:none;padding-right:22px;background-image:linear-gradient(45deg, transparent 50%, var(--cyan) 50%), linear-gradient(-45deg, transparent 50%, var(--cyan) 50%);background-position:right 10px top 13px, right 6px top 13px;background-size:4px 4px;background-repeat:no-repeat}

.layout{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:minmax(0, 1.1fr) minmax(0, 0.9fr);
  grid-template-rows:1fr 1fr;
  gap:10px;padding:12px;
}
.editor{
  grid-column:1;grid-row:1 / 3;
  background:var(--panel);
  border:1px solid var(--line);border-radius:3px;
  display:flex;flex-direction:column;overflow:hidden;
}
.stack{
  grid-column:2;grid-row:1;
  background:var(--panel);
  border:1px solid var(--line);border-radius:3px;
  display:flex;flex-direction:column;overflow:hidden;
}
.console{
  grid-column:2;grid-row:2;
  background:#020308;
  border:1px solid rgba(93,255,179,0.30);border-radius:3px;
  display:flex;flex-direction:column;overflow:hidden;
}
.pane-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;border-bottom:1px solid var(--line);
  font-family:'Audiowide', sans-serif;font-size:10px;letter-spacing:0.30em;
  color:var(--cyan);
  text-shadow:0 0 8px rgba(123,228,255,0.40);
  flex-shrink:0;
}
.pane-head .meta{color:var(--dim);font-family:'Space Mono', monospace;font-size:10px;letter-spacing:0.10em;text-shadow:none}

.pane-body{flex:1;min-height:0;overflow:auto;padding:10px 12px;font-family:'JetBrains Mono', monospace;font-size:13px;line-height:1.5}
.pane-body::-webkit-scrollbar{width:6px;height:6px}
.pane-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

/* ===== EDITOR ===== */
.editor-wrap{position:relative;flex:1;min-height:0;display:flex}
#editor{
  flex:1;background:transparent;border:0;outline:0;resize:none;
  color:var(--bone);font-family:'JetBrains Mono', monospace;font-size:13.5px;line-height:1.55;
  letter-spacing:0;
  padding:10px 12px 14px;tab-size:2;
  caret-color:var(--phosphor);
  white-space:pre;overflow:auto;
}
.editor .running-line{
  position:absolute;left:0;right:0;height:1.55em;
  background:rgba(93,255,179,0.10);
  border-left:3px solid var(--phosphor);
  pointer-events:none;transition:top 0.15s ease;
  box-shadow:inset 0 0 18px rgba(93,255,179,0.06);
}

/* ===== STACK ===== */
.stack-body{
  flex:1;overflow:auto;padding:14px;
  display:flex;flex-direction:column-reverse;gap:8px;
  align-items:stretch;
}
.frame{
  background:linear-gradient(180deg, rgba(123,228,255,0.10), rgba(123,228,255,0.02));
  border:1px solid rgba(123,228,255,0.40);
  border-radius:3px;
  padding:8px 10px;
  position:relative;
  animation:framePush 0.32s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 18px rgba(123,228,255,0.15), inset 0 0 22px rgba(123,228,255,0.05);
}
@keyframes framePush{
  from{transform:translateY(8px) scale(0.98);opacity:0;filter:blur(2px)}
  to  {transform:none;opacity:1;filter:none}
}
.frame.top{
  border-color:var(--phosphor);
  background:linear-gradient(180deg, rgba(93,255,179,0.12), rgba(93,255,179,0.02));
  box-shadow:0 0 22px rgba(93,255,179,0.30), inset 0 0 22px rgba(93,255,179,0.06);
}
.frame .fname{
  font-family:'Audiowide', sans-serif;font-size:10px;letter-spacing:0.22em;
  color:var(--cyan);text-shadow:0 0 8px rgba(123,228,255,0.40);
  display:flex;justify-content:space-between;align-items:baseline;
}
.frame.top .fname{color:var(--phosphor);text-shadow:0 0 8px var(--phosphor)}
.frame .fmeta{font-family:'Space Mono', monospace;font-size:9px;letter-spacing:0.08em;color:var(--dim)}
.frame .vars{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.var-row{
  display:grid;grid-template-columns:1fr auto;gap:8px;
  font-family:'JetBrains Mono', monospace;font-size:12px;
  padding:3px 6px;border-radius:2px;
  background:rgba(0,0,0,0.30);
  border:1px solid rgba(255,255,255,0.04);
}
.var-row .name{color:var(--amber)}
.var-row .val{color:var(--bone);font-weight:700;text-shadow:0 0 6px rgba(255,255,255,0.20)}
.var-row.flash{animation:varFlash 0.5s ease-out}
@keyframes varFlash{
  0%  {background:rgba(93,255,179,0.45);box-shadow:0 0 12px rgba(93,255,179,0.6)}
  100%{background:rgba(0,0,0,0.30);box-shadow:none}
}
.stack-empty{color:var(--dim);font-style:italic;font-size:11px;text-align:center;padding:20px}

/* ===== CONSOLE ===== */
.con-head{border-bottom:1px solid rgba(93,255,179,0.25);color:var(--phosphor);text-shadow:0 0 8px var(--phosphor)}
.con-body{
  flex:1;overflow:auto;padding:10px 12px;
  font-family:'VT323', monospace;font-size:18px;line-height:1.32;
  color:var(--phosphor);text-shadow:0 0 6px var(--phosphor-dim);
  position:relative;
}
.con-body::after{
  content:'_';animation:blinkCursor 1s step-end infinite;color:var(--phosphor);
}
@keyframes blinkCursor{50%{opacity:0}}
.con-line{white-space:pre-wrap;word-break:break-word}
.con-line.dim{color:var(--phosphor-dim)}
.con-line.err{color:var(--hot);text-shadow:0 0 6px rgba(255,94,108,0.5)}
.con-line.info{color:var(--cyan);text-shadow:0 0 6px rgba(123,228,255,0.5)}
.con-line.ok{color:var(--phosphor)}
.con-line .ts{color:rgba(93,255,179,0.30);margin-right:6px}

@media (max-width:880px){
  .layout{
    grid-template-columns:1fr;
    grid-template-rows:50% 25% 25%;
  }
  .editor{grid-column:1;grid-row:1}
  .stack{grid-column:1;grid-row:2}
  .console{grid-column:1;grid-row:3}
  .brand{font-size:18px}
}
</style>
</head>
<body>

<div class="head">
  <div class="brand">TINY·<em>C</em>·LAB<small>parse · interpret · visualize</small></div>
  <div class="toolbar">
    <select class="btn" id="presetSel">
      <option value="hello">hello</option>
      <option value="fact">factorial</option>
      <option value="fib">fibonacci</option>
      <option value="sum">sum 1..n</option>
      <option value="gcd">gcd</option>
      <option value="prime">primes ≤ N</option>
    </select>
    <button class="btn primary" id="btnRun">▶ RUN<span class="kbd">⏎</span></button>
    <button class="btn warn"    id="btnStep">⏵ STEP<span class="kbd">→</span></button>
    <button class="btn hot"     id="btnStop">■ STOP</button>
    <button class="btn"         id="btnReset">↺ RESET</button>
    <select class="btn" id="speedSel" title="step delay">
      <option value="0">no-delay</option>
      <option value="40">fast</option>
      <option value="120" selected>normal</option>
      <option value="320">slow</option>
      <option value="700">crawl</option>
    </select>
  </div>
</div>

<div class="layout">

  <div class="editor">
    <div class="pane-head">▸ SOURCE<span class="meta" id="srcMeta">tiny-c · int only</span></div>
    <div class="editor-wrap">
      <div class="running-line" id="runLine" style="display:none"></div>
      <textarea id="editor" spellcheck="false" autocapitalize="off" autocorrect="off"></textarea>
    </div>
  </div>

  <div class="stack">
    <div class="pane-head">▸ STACK<span class="meta" id="stackMeta">0 frames</span></div>
    <div class="stack-body" id="stackBody">
      <div class="stack-empty">— program not running —</div>
    </div>
  </div>

  <div class="console">
    <div class="pane-head con-head">▸ CONSOLE<span class="meta" id="conMeta">stdout · stderr</span></div>
    <div class="pane-body con-body" id="console"></div>
  </div>

</div>

<script>
(() => {
  // ============================================
  // ===== LEXER ===============================
  // ============================================
  const KEYWORDS = new Set(['int','if','else','while','return','void']);
  const PUNCT = ['==','!=','<=','>=','&&','||','+','-','*','/','%','=','<','>','!','(',')','{','}',';',','];

  function lex(src) {
    const tokens = [];
    let i = 0, line = 1, col = 1;
    function bump(n=1){ for (let k=0;k<n;k++){ if(src[i+k]==='\n'){line++;col=1;}else{col++;} } i+=n; }
    while (i < src.length) {
      const c = src[i];
      if (c === ' ' || c === '\t' || c === '\r') { bump(); continue; }
      if (c === '\n') { bump(); continue; }
      // comments
      if (c === '/' && src[i+1] === '/') { while (i < src.length && src[i] !== '\n') bump(); continue; }
      if (c === '/' && src[i+1] === '*') {
        bump(2);
        while (i < src.length && !(src[i] === '*' && src[i+1] === '/')) bump();
        bump(2); continue;
      }
      // string literal
      if (c === '"') {
        const start = { line, col };
        bump();
        let s = '';
        while (i < src.length && src[i] !== '"') {
          if (src[i] === '\\' && i+1 < src.length) {
            const n = src[i+1];
            s += (n === 'n' ? '\n' : n === 't' ? '\t' : n === '\\' ? '\\' : n === '"' ? '"' : n);
            bump(2);
          } else { s += src[i]; bump(); }
        }
        if (src[i] !== '"') throw err(start, 'unterminated string');
        bump();
        tokens.push({ type: 'str', val: s, line: start.line });
        continue;
      }
      // number
      if (c >= '0' && c <= '9') {
        const start = { line, col };
        let n = '';
        while (i < src.length && src[i] >= '0' && src[i] <= '9') { n += src[i]; bump(); }
        tokens.push({ type: 'num', val: parseInt(n, 10), line: start.line });
        continue;
      }
      // identifier / keyword
      if (/[a-zA-Z_]/.test(c)) {
        const start = { line, col };
        let s = '';
        while (i < src.length && /[a-zA-Z0-9_]/.test(src[i])) { s += src[i]; bump(); }
        if (KEYWORDS.has(s)) tokens.push({ type: 'kw',    val: s, line: start.line });
        else                 tokens.push({ type: 'ident', val: s, line: start.line });
        continue;
      }
      // punctuation
      let matched = false;
      for (const p of PUNCT) {
        if (src.startsWith(p, i)) {
          tokens.push({ type: 'punct', val: p, line });
          bump(p.length);
          matched = true;
          break;
        }
      }
      if (!matched) throw err({line, col}, `unexpected char '${c}'`);
    }
    tokens.push({ type: 'eof', val: 'EOF', line });
    return tokens;
  }
  function err(pos, msg) { return new Error(`line ${pos.line}: ${msg}`); }

  // ============================================
  // ===== PARSER (recursive descent) ===========
  // ============================================
  function parse(tokens) {
    let i = 0;
    const peek = (k=0) => tokens[i+k];
    const eat  = (t,v) => {
      const tk = tokens[i];
      if (tk.type !== t || (v != null && tk.val !== v)) throw err(tk, `expected ${v||t}, got ${tk.val}`);
      i++; return tk;
    };
    const match = (t,v) => peek().type === t && (v == null || peek().val === v);

    function program() {
      const decls = [];
      while (!match('eof')) decls.push(topLevel());
      return { type: 'program', body: decls };
    }
    function topLevel() {
      // 'int' IDENT ( ... )  -> func
      // 'int' IDENT (= expr)? ;  -> global var
      // 'void' IDENT ( ... )  -> func returning nothing
      const ret = (match('kw','int') ? eat('kw','int') : eat('kw','void'));
      const name = eat('ident').val;
      if (match('punct', '(')) {
        eat('punct','(');
        const params = [];
        while (!match('punct',')')) {
          eat('kw','int');
          const pn = eat('ident').val;
          params.push(pn);
          if (match('punct',',')) eat('punct',',');
        }
        eat('punct',')');
        const body = block();
        return { type: 'fn', name, params, body, retType: ret.val, line: ret.line };
      } else {
        // global var
        let init = null;
        if (match('punct','=')) { eat('punct','='); init = expr(); }
        eat('punct',';');
        return { type: 'gvar', name, init, line: ret.line };
      }
    }
    function block() {
      eat('punct','{');
      const stmts = [];
      while (!match('punct','}')) stmts.push(stmt());
      eat('punct','}');
      return { type: 'block', body: stmts };
    }
    function stmt() {
      const tk = peek();
      if (tk.type === 'kw' && tk.val === 'int') return varDecl();
      if (tk.type === 'kw' && tk.val === 'if') return ifStmt();
      if (tk.type === 'kw' && tk.val === 'while') return whileStmt();
      if (tk.type === 'kw' && tk.val === 'return') return returnStmt();
      if (tk.type === 'punct' && tk.val === '{') return block();
      // expr statement
      const e = expr();
      eat('punct',';');
      return { type: 'exprStmt', expr: e, line: tk.line };
    }
    function varDecl() {
      const t = eat('kw','int');
      const name = eat('ident').val;
      let init = null;
      if (match('punct','=')) { eat('punct','='); init = expr(); }
      eat('punct',';');
      return { type: 'varDecl', name, init, line: t.line };
    }
    function ifStmt() {
      const t = eat('kw','if');
      eat('punct','('); const cond = expr(); eat('punct',')');
      const cons = stmt();
      let alt = null;
      if (match('kw','else')) { eat('kw','else'); alt = stmt(); }
      return { type:'if', cond, cons, alt, line: t.line };
    }
    function whileStmt() {
      const t = eat('kw','while');
      eat('punct','('); const cond = expr(); eat('punct',')');
      const body = stmt();
      return { type:'while', cond, body, line: t.line };
    }
    function returnStmt() {
      const t = eat('kw','return');
      let value = null;
      if (!match('punct',';')) value = expr();
      eat('punct',';');
      return { type: 'return', value, line: t.line };
    }
    // expression precedence
    function expr() { return assignment(); }
    function assignment() {
      const left = logicOr();
      if (match('punct','=')) {
        eat('punct','=');
        const right = assignment();
        if (left.type !== 'ident') throw err(left, 'lvalue must be a name');
        return { type:'assign', name:left.name, value:right, line:left.line };
      }
      return left;
    }
    function bin(next, ops) {
      let left = next();
      while (peek().type === 'punct' && ops.includes(peek().val)) {
        const op = eat('punct').val;
        const right = next();
        left = { type:'bin', op, left, right, line:left.line };
      }
      return left;
    }
    const logicOr  = () => bin(logicAnd, ['||']);
    const logicAnd = () => bin(equality, ['&&']);
    const equality = () => bin(relation, ['==','!=']);
    const relation = () => bin(addsub,   ['<','>','<=','>=']);
    const addsub   = () => bin(muldiv,   ['+','-']);
    const muldiv   = () => bin(unary,    ['*','/','%']);
    function unary() {
      if (match('punct','-') || match('punct','!')) {
        const op = eat('punct').val;
        return { type:'un', op, arg: unary(), line: peek().line };
      }
      return primary();
    }
    function primary() {
      const tk = peek();
      if (tk.type === 'num') { i++; return { type:'num', val: tk.val, line: tk.line }; }
      if (tk.type === 'str') { i++; return { type:'str', val: tk.val, line: tk.line }; }
      if (tk.type === 'punct' && tk.val === '(') {
        eat('punct','('); const e = expr(); eat('punct',')'); return e;
      }
      if (tk.type === 'ident') {
        i++;
        if (match('punct','(')) {
          eat('punct','(');
          const args = [];
          while (!match('punct',')')) {
            args.push(expr());
            if (match('punct',',')) eat('punct',',');
          }
          eat('punct',')');
          return { type:'call', name: tk.val, args, line: tk.line };
        }
        return { type:'ident', name: tk.val, line: tk.line };
      }
      throw err(tk, `unexpected token '${tk.val}'`);
    }

    return program();
  }

  // ============================================
  // ===== INTERPRETER ==========================
  // ============================================
  class Interpreter {
    constructor() {
      this.functions = {};
      this.globals = {};
      this.callStack = [];
      this.running = false;
      this.aborted = false;
      this.stepMode = false;
      this.stepDelay = 120;
      this.stepResolve = null;
      this.lastVarChange = null;
      this.onTick = null;     // callback: (line, frameTop) => void
      this.onPrint = null;    // callback: (text) => void
    }
    abort() { this.aborted = true; if (this.stepResolve) { this.stepResolve(); this.stepResolve = null; } }
    async pause(line) {
      if (this.onTick) this.onTick(line);
      if (this.stepMode) {
        await new Promise(r => { this.stepResolve = r; });
        if (this.aborted) throw new Error('aborted');
      } else if (this.stepDelay > 0) {
        await new Promise(r => setTimeout(r, this.stepDelay));
        if (this.aborted) throw new Error('aborted');
      } else {
        // yield to UI occasionally
        this._tickCount = (this._tickCount || 0) + 1;
        if (this._tickCount % 200 === 0) await new Promise(r => setTimeout(r, 0));
        if (this.aborted) throw new Error('aborted');
      }
    }
    advanceStep() { if (this.stepResolve) { const r = this.stepResolve; this.stepResolve = null; r(); } }

    async run(ast) {
      // collect globals + functions
      for (const decl of ast.body) {
        if (decl.type === 'fn')   this.functions[decl.name] = decl;
        else if (decl.type === 'gvar') {
          this.globals[decl.name] = decl.init ? await this.evalExpr(decl.init, null) : 0;
        }
      }
      const main = this.functions['main'];
      if (!main) throw new Error('no main() defined');
      this.running = true;
      const ret = await this.callFn(main, []);
      this.running = false;
      return ret;
    }

    async callFn(fnDecl, argVals) {
      const frame = { name: fnDecl.name, vars: {}, line: fnDecl.line, returning: false, retVal: 0 };
      fnDecl.params.forEach((p, i) => { frame.vars[p] = argVals[i] || 0; });
      this.callStack.push(frame);
      try {
        await this.execBlock(fnDecl.body, frame);
      } catch (e) {
        if (e !== '__return__') throw e;
      }
      this.callStack.pop();
      if (this.onTick) this.onTick(this.currentTopLine());
      return frame.retVal;
    }

    currentTopLine() {
      if (this.callStack.length === 0) return null;
      return this.callStack[this.callStack.length-1].line;
    }

    async execBlock(node, frame) {
      // local scope: shadowed by entries declared inside; we just use frame.vars
      for (const s of node.body) {
        if (frame.returning) return;
        await this.execStmt(s, frame);
      }
    }
    async execStmt(s, frame) {
      frame.line = s.line || frame.line;
      await this.pause(frame.line);
      if (this.aborted) throw new Error('aborted');
      switch (s.type) {
        case 'block':    return this.execBlock(s, frame);
        case 'varDecl': {
          const v = s.init ? await this.evalExpr(s.init, frame) : 0;
          frame.vars[s.name] = (v|0);
          this.lastVarChange = { fn: frame.name, name: s.name };
          return;
        }
        case 'exprStmt': return this.evalExpr(s.expr, frame);
        case 'if': {
          const c = await this.evalExpr(s.cond, frame);
          if (c) await this.execStmt(s.cons, frame);
          else if (s.alt) await this.execStmt(s.alt, frame);
          return;
        }
        case 'while': {
          let safety = 0;
          while (true) {
            if (this.aborted) throw new Error('aborted');
            if (++safety > 1_000_000) throw new Error('infinite loop guard tripped (1M iters)');
            const c = await this.evalExpr(s.cond, frame);
            if (!c) return;
            await this.execStmt(s.body, frame);
            if (frame.returning) return;
          }
        }
        case 'return': {
          frame.retVal = s.value ? await this.evalExpr(s.value, frame) : 0;
          frame.returning = true;
          throw '__return__';
        }
      }
    }
    async evalExpr(e, frame) {
      switch (e.type) {
        case 'num': return e.val | 0;
        case 'str': return e.val; // strings only valid as printf arg
        case 'ident': {
          if (frame && e.name in frame.vars) return frame.vars[e.name] | 0;
          if (e.name in this.globals) return this.globals[e.name] | 0;
          throw err(e, `undefined identifier '${e.name}'`);
        }
        case 'assign': {
          const v = (await this.evalExpr(e.value, frame)) | 0;
          if (frame && e.name in frame.vars) { frame.vars[e.name] = v; this.lastVarChange = {fn: frame.name, name: e.name}; }
          else if (e.name in this.globals)   { this.globals[e.name] = v;  this.lastVarChange = {fn: '<globals>', name: e.name}; }
          else throw err(e, `undefined variable '${e.name}'`);
          return v;
        }
        case 'bin': {
          const a = await this.evalExpr(e.left,  frame);
          if (e.op === '&&') return (a && (await this.evalExpr(e.right, frame))) ? 1 : 0;
          if (e.op === '||') return (a || (await this.evalExpr(e.right, frame))) ? 1 : 0;
          const b = await this.evalExpr(e.right, frame);
          switch (e.op) {
            case '+': return (a + b) | 0;
            case '-': return (a - b) | 0;
            case '*': return (a * b) | 0;
            case '/': if (b === 0) throw err(e, 'division by zero'); return (a / b) | 0;
            case '%': if (b === 0) throw err(e, 'modulo by zero');   return (a % b) | 0;
            case '<': return a <  b ? 1 : 0;
            case '>': return a >  b ? 1 : 0;
            case '<=': return a <= b ? 1 : 0;
            case '>=': return a >= b ? 1 : 0;
            case '==': return a === b ? 1 : 0;
            case '!=': return a !== b ? 1 : 0;
          }
          throw err(e, `unknown op ${e.op}`);
        }
        case 'un': {
          const v = await this.evalExpr(e.arg, frame);
          if (e.op === '-') return (-v) | 0;
          if (e.op === '!') return v ? 0 : 1;
          throw err(e, `unknown unary ${e.op}`);
        }
        case 'call': {
          // built-ins
          if (e.name === 'printf') return this.doPrintf(e, frame);
          if (e.name === 'putchar') {
            const v = await this.evalExpr(e.args[0], frame);
            this.onPrint && this.onPrint(String.fromCharCode(v));
            return 0;
          }
          const fn = this.functions[e.name];
          if (!fn) throw err(e, `undefined function '${e.name}'`);
          const argVals = [];
          for (const a of e.args) argVals.push(await this.evalExpr(a, frame));
          return await this.callFn(fn, argVals);
        }
      }
      throw err(e, `bad expr type '${e.type}'`);
    }
    async doPrintf(e, frame) {
      if (!e.args.length) return 0;
      const fmtNode = e.args[0];
      let fmt = fmtNode.type === 'str' ? fmtNode.val : String(await this.evalExpr(fmtNode, frame));
      const args = [];
      for (let k = 1; k < e.args.length; k++) args.push(await this.evalExpr(e.args[k], frame));
      let out = '', ai = 0;
      for (let k = 0; k < fmt.length; k++) {
        if (fmt[k] === '%' && k + 1 < fmt.length) {
          const c = fmt[k+1];
          if (c === 'd' || c === 'i') { out += String(args[ai++] | 0); k++; }
          else if (c === 's')         { out += String(args[ai++]);     k++; }
          else if (c === 'c')         { out += String.fromCharCode(args[ai++] | 0); k++; }
          else if (c === '%')         { out += '%'; k++; }
          else                        out += fmt[k];
        } else out += fmt[k];
      }
      this.onPrint && this.onPrint(out);
      return out.length;
    }
  }

  // ============================================
  // ===== UI WIRING ============================
  // ============================================
  const editor = document.getElementById('editor');
  const conEl  = document.getElementById('console');
  const stackBody = document.getElementById('stackBody');
  const stackMeta = document.getElementById('stackMeta');
  const conMeta   = document.getElementById('conMeta');
  const srcMeta   = document.getElementById('srcMeta');
  const runLine   = document.getElementById('runLine');
  let interp = null;

  const PRESETS = {
    hello:
`// hello, tiny C
int main() {
  printf("hello, vibespace!\\n");
  int sum = 0;
  int i = 1;
  while (i <= 5) {
    sum = sum + i;
    i = i + 1;
  }
  printf("sum 1..5 = %d\\n", sum);
  return 0;
}
`,
    fact:
`// factorial via recursion
int fact(int n) {
  if (n <= 1) return 1;
  return n * fact(n - 1);
}

int main() {
  int n = 6;
  printf("%d! = %d\\n", n, fact(n));
  return 0;
}
`,
    fib:
`// fibonacci, iterative
int main() {
  int a = 0;
  int b = 1;
  int i = 0;
  while (i < 10) {
    printf("fib(%d) = %d\\n", i, a);
    int t = a + b;
    a = b;
    b = t;
    i = i + 1;
  }
  return 0;
}
`,
    sum:
`int sumTo(int n) {
  int s = 0;
  int i = 1;
  while (i <= n) {
    s = s + i;
    i = i + 1;
  }
  return s;
}

int main() {
  printf("sum 1..100 = %d\\n", sumTo(100));
  return 0;
}
`,
    gcd:
`// euclid's gcd
int gcd(int a, int b) {
  while (b != 0) {
    int t = a % b;
    a = b;
    b = t;
  }
  return a;
}

int main() {
  printf("gcd(48, 18) = %d\\n", gcd(48, 18));
  printf("gcd(1071, 462) = %d\\n", gcd(1071, 462));
  return 0;
}
`,
    prime:
`// primes <= N
int isPrime(int n) {
  if (n < 2) return 0;
  int i = 2;
  while (i * i <= n) {
    if (n % i == 0) return 0;
    i = i + 1;
  }
  return 1;
}

int main() {
  int N = 30;
  int n = 2;
  while (n <= N) {
    if (isPrime(n)) printf("%d ", n);
    n = n + 1;
  }
  printf("\\n");
  return 0;
}
`,
  };

  function loadPreset(key) {
    editor.value = PRESETS[key] || PRESETS.hello;
    srcMeta.textContent = key + ' · ' + countLines(editor.value) + ' lines';
  }
  function countLines(s) { return s.split('\n').length; }
  editor.addEventListener('input', () => srcMeta.textContent = 'edited · ' + countLines(editor.value) + ' lines');
  document.getElementById('presetSel').addEventListener('change', e => loadPreset(e.target.value));

  function consoleAdd(text, cls = '') {
    text.split('\n').forEach((ln, i, arr) => {
      // empty trailing line from a final \n is ok
      if (i === arr.length - 1 && ln === '') return;
      const div = document.createElement('div');
      div.className = 'con-line ' + cls;
      div.textContent = ln;
      conEl.appendChild(div);
    });
    conEl.scrollTop = conEl.scrollHeight;
  }
  function consoleClear() { conEl.innerHTML = ''; }

  function renderStack(highlight) {
    if (!interp || interp.callStack.length === 0) {
      stackBody.innerHTML = '<div class="stack-empty">— program not running —</div>';
      stackMeta.textContent = '0 frames';
      return;
    }
    stackBody.innerHTML = '';
    const len = interp.callStack.length;
    interp.callStack.forEach((fr, idx) => {
      const isTop = idx === len - 1;
      const card = document.createElement('div');
      card.className = 'frame' + (isTop ? ' top' : '');
      const vars = Object.entries(fr.vars).map(([k, v]) => {
        const flash = isTop && interp.lastVarChange && interp.lastVarChange.fn === fr.name && interp.lastVarChange.name === k;
        return `<div class="var-row${flash ? ' flash' : ''}"><span class="name">${k}</span><span class="val">${v}</span></div>`;
      }).join('') || '<div class="var-row" style="opacity:0.5;font-style:italic">no locals</div>';
      card.innerHTML = `
        <div class="fname">${fr.name}()<span class="fmeta">depth ${idx} · line ${fr.line}</span></div>
        <div class="vars">${vars}</div>
      `;
      stackBody.appendChild(card);
    });
    if (interp.lastVarChange) interp.lastVarChange = null;   // consume one-shot
    stackMeta.textContent = len + ' frame' + (len === 1 ? '' : 's');
  }

  function highlightLine(line) {
    if (!line) { runLine.style.display = 'none'; return; }
    const lines = editor.value.split('\n');
    const lineH = parseFloat(getComputedStyle(editor).lineHeight) || 21;
    const padTop = parseFloat(getComputedStyle(editor).paddingTop) || 10;
    runLine.style.display = 'block';
    runLine.style.height = lineH + 'px';
    runLine.style.top = (padTop + (line - 1) * lineH - editor.scrollTop) + 'px';
  }
  editor.addEventListener('scroll', () => {
    if (interp && interp.callStack.length) highlightLine(interp.currentTopLine());
  });

  async function runProgram(stepMode) {
    if (interp && interp.running) return;
    consoleClear();
    runLine.style.display = 'none';
    interp = new Interpreter();
    interp.stepMode = !!stepMode;
    interp.stepDelay = parseInt(document.getElementById('speedSel').value, 10);
    interp.onTick  = (line) => { highlightLine(line); renderStack(); };
    interp.onPrint = (txt) => consoleAdd(txt);

    document.getElementById('btnRun').disabled = true;
    document.getElementById('btnStep').disabled = false;
    document.getElementById('btnStop').disabled = false;
    conMeta.textContent = stepMode ? 'paused · press STEP' : 'running…';

    try {
      const tokens = lex(editor.value);
      const ast = parse(tokens);
      consoleAdd('[parsed: ' + ast.body.length + ' top-level decls]', 'info');
      const t0 = performance.now();
      const ret = await interp.run(ast);
      const t1 = performance.now();
      consoleAdd(`[program exited with ${ret} in ${(t1-t0).toFixed(0)}ms]`, 'ok');
    } catch (e) {
      if (e === '__return__' || (e && e.message === 'aborted')) {
        consoleAdd('[aborted]', 'err');
      } else {
        consoleAdd('error: ' + (e.message || e), 'err');
      }
    } finally {
      document.getElementById('btnRun').disabled = false;
      document.getElementById('btnStep').disabled = true;
      document.getElementById('btnStop').disabled = true;
      conMeta.textContent = 'idle';
      runLine.style.display = 'none';
      renderStack();
    }
  }

  document.getElementById('btnRun').addEventListener('click', () => runProgram(false));
  document.getElementById('btnStep').addEventListener('click', () => {
    if (!interp || !interp.running) {
      runProgram(true);
    } else {
      interp.advanceStep();
    }
  });
  document.getElementById('btnStop').addEventListener('click', () => { if (interp) interp.abort(); });
  document.getElementById('btnReset').addEventListener('click', () => {
    if (interp) interp.abort();
    consoleClear();
    runLine.style.display = 'none';
    document.getElementById('btnStep').disabled = true;
    document.getElementById('btnStop').disabled = true;
  });
  document.getElementById('speedSel').addEventListener('change', () => {
    if (interp) interp.stepDelay = parseInt(document.getElementById('speedSel').value, 10);
  });

  // keyboard
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart, end = editor.selectionEnd;
      editor.setRangeText('  ', start, end, 'end');
    }
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      runProgram(false);
    }
  });
  document.addEventListener('keydown', (e) => {
    if (e.target === editor) return;
    if (e.key === 'ArrowRight' && interp && interp.running && interp.stepMode) {
      e.preventDefault();
      interp.advanceStep();
    }
  });

  // boot
  loadPreset('hello');
  document.getElementById('btnStep').disabled = true;
  document.getElementById('btnStop').disabled = true;

  consoleAdd('tiny-c-lab v0.1 ready', 'info');
  consoleAdd('keywords: int, void, if, else, while, return', 'dim');
  consoleAdd('built-ins: printf("%d %s %c"), putchar(c)', 'dim');
  consoleAdd('press RUN, or STEP to debug one statement at a time.', 'dim');
})();
</script>
</body>
</html>
