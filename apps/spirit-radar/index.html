<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Spirit Radar</title>
<link rel="icon" href="https://emojicdn.elk.sh/👻" />
<meta name="description" content="Haunted radar that detects glitchy pixel spirits nearby." />
<meta property="og:title" content="Spirit Radar" />
<meta property="og:description" content="Haunted radar that detects glitchy pixel spirits nearby." />
<meta property="og:url" content="https://sloppy.live/spirit-radar" />
<meta property="og:image" content="https://sloppy.live/screenshots/spirit-radar.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen&display=swap" rel="stylesheet" />
<style>
:root{--bg:#04060a;--green:#20ff60;--dim:#0a4020;--ghost:#60ffa0;--warn:#ff4040;--purple:#a040ff;--cyan:#40e0ff}
*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none}
*::-webkit-scrollbar{display:none}
html,body{height:100vh;background:var(--bg);color:var(--green);font-family:'VT323',monospace;user-select:none;overflow:hidden;position:fixed;width:100%;touch-action:none}
body{display:flex;flex-direction:column;align-items:center;height:100vh}

.hud{width:100%;max-width:500px;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--dim);flex-shrink:0}
.hud h1{font-family:'Silkscreen',cursive;font-size:14px;color:var(--green);letter-spacing:0.1em;text-shadow:0 0 10px rgba(32,255,96,0.4)}
.hud a{color:var(--dim);font-size:11px;text-decoration:none}
.hud-stats{display:flex;gap:14px;font-size:13px;padding:4px 16px;width:100%;max-width:500px;color:var(--dim);border-bottom:1px solid #0a1a10;flex-shrink:0}
.hud-stats .sv{color:var(--green)}
.hud-stats .wv{color:var(--warn)}

.radar-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0}
canvas{border-radius:50%;image-rendering:pixelated}

.feed{width:100%;max-width:500px;height:100px;overflow-y:auto;padding:6px 16px;border-top:1px solid var(--dim);font-size:12px;line-height:1.6;color:var(--dim);flex-shrink:0}
.feed .fg{color:var(--ghost)}.feed .fw{color:var(--warn)}.feed .fp{color:var(--purple)}.feed .fc{color:var(--cyan)}

.scan-btn{position:absolute;bottom:16px;font-family:'Silkscreen',cursive;font-size:11px;padding:8px 20px;background:rgba(32,255,96,0.06);border:1px solid var(--green);color:var(--green);border-radius:4px;cursor:pointer;letter-spacing:0.08em;text-shadow:0 0 8px rgba(32,255,96,0.3);z-index:2;transition:all .15s}
.scan-btn:hover{background:rgba(32,255,96,0.12)}
.scan-btn:active{transform:scale(0.96)}

@media(max-width:400px){canvas{width:280px!important;height:280px!important}}
</style>
</head>
<body>

<div class="hud">
  <h1>SPIRIT RADAR</h1>
  <a href="https://sloppy.live">&larr; sloppy.live</a>
</div>
<div class="hud-stats">
  <span>Spirits: <span class="sv" id="countEl">0</span></span>
  <span>Threat: <span class="wv" id="threatEl">CALM</span></span>
  <span>Scans: <span class="sv" id="scanEl">0</span></span>
</div>

<div class="radar-wrap">
  <canvas id="radar" width="340" height="340"></canvas>
  <button class="scan-btn" id="scanBtn">DEEP SCAN</button>
</div>

<div class="feed" id="feed"></div>

<script>
(function(){
'use strict';

const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');
const R = canvas.width / 2;
const feedEl = document.getElementById('feed');

// Audio
let actx;
function au(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sfx(f,d,t,v){try{const c=au();if(c.state==='suspended')c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t||'sine';o.frequency.setValueAtTime(f,c.currentTime);o.frequency.exponentialRampToValueAtTime(f*0.3,c.currentTime+d);g.gain.setValueAtTime(v||0.02,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}

// === SPIRIT TYPES ===
const SPIRIT_TYPES = [
  {name:'Pixel Wraith',icon:'👻',color:'#60ffa0',cls:'fg',threat:1,desc:'flickers at the edge of vision'},
  {name:'Glitch Shade',icon:'🌀',color:'#a040ff',cls:'fp',desc:'corrupts nearby pixels',threat:2},
  {name:'Data Phantom',icon:'💀',color:'#40e0ff',cls:'fc',desc:'leaves digital static in its wake',threat:1},
  {name:'Byte Specter',icon:'🔮',color:'#ff80ff',cls:'fp',desc:'hums at an impossible frequency',threat:2},
  {name:'Static Ghost',icon:'⚡',color:'#ffff40',cls:'fc',desc:'crackles with dead signal',threat:1},
  {name:'Hex Poltergeist',icon:'🎭',color:'#ff4040',cls:'fw',desc:'rearranges memory addresses',threat:3},
  {name:'Null Entity',icon:'🕳️',color:'#ffffff',cls:'fg',desc:'exists in unallocated space',threat:2},
  {name:'Echo Spirit',icon:'👁️',color:'#40ffff',cls:'fc',desc:'repeats movements from the past',threat:1},
  {name:'Void Lurker',icon:'🌑',color:'#8040c0',cls:'fp',desc:'devours render cycles',threat:3},
  {name:'Fragment Haunt',icon:'✨',color:'#80ff80',cls:'fg',desc:'scatters across broken tiles',threat:1},
];

// === STATE ===
let sweepAngle = 0;
let spirits = [];
let blips = [];
let feedLines = [];
let scanCount = 0;
let glitchFrames = 0;
let staticNoise = [];

// Pre-generate static noise
for(let i = 0; i < 200; i++){
  staticNoise.push({
    x: (Math.random() - 0.5) * 2 * R * 0.9,
    y: (Math.random() - 0.5) * 2 * R * 0.9,
    life: Math.random() * 30,
    maxLife: 20 + Math.random() * 30,
  });
}

function addFeed(html){
  feedLines.push(html);
  if(feedLines.length > 30) feedLines.shift();
  feedEl.innerHTML = feedLines.join('<br>');
  feedEl.scrollTop = feedEl.scrollHeight;
}

// === SPIRIT GENERATION ===
function spawnSpirit(){
  const type = SPIRIT_TYPES[Math.floor(Math.random() * SPIRIT_TYPES.length)];
  const angle = Math.random() * Math.PI * 2;
  const dist = 0.2 + Math.random() * 0.75; // 0.2-0.95 of radius
  const spirit = {
    type,
    angle,
    dist,
    driftSpeed: (Math.random() - 0.5) * 0.003,
    driftDist: (Math.random() - 0.5) * 0.001,
    pulsePhase: Math.random() * Math.PI * 2,
    glitchTimer: 0,
    glitching: false,
    size: 3 + Math.random() * 3,
    life: 300 + Math.random() * 500, // frames until fade
    maxLife: 600,
    detected: false,
  };
  spirits.push(spirit);
}

function spawnBlip(x, y, color){
  blips.push({ x, y, color, age: 0, maxAge: 40 });
}

// Auto-spawn spirits over time
let autoSpawnTimer = 0;
function autoSpawn(){
  autoSpawnTimer++;
  if(autoSpawnTimer > 120 + Math.random() * 180){
    autoSpawnTimer = 0;
    if(spirits.length < 12) spawnSpirit();
  }
}

// Deep scan — reveal many spirits at once
function deepScan(){
  scanCount++;
  document.getElementById('scanEl').textContent = scanCount;
  const count = 3 + Math.floor(Math.random() * 4);
  for(let i = 0; i < count; i++) spawnSpirit();
  glitchFrames = 15;
  sfx(200, 0.2, 'sawtooth', 0.04);
  sfx(100, 0.3, 'square', 0.03);
  setTimeout(() => sfx(400, 0.1, 'sine', 0.02), 100);
  addFeed(`<span class="fw">DEEP SCAN INITIATED — ${count} signals detected</span>`);
}

document.getElementById('scanBtn').addEventListener('click', deepScan);

// === RENDERING ===
function draw(){
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  ctx.translate(R, R);

  // Background circle
  const bgGrad = ctx.createRadialGradient(0, 0, 10, 0, 0, R);
  bgGrad.addColorStop(0, '#061210');
  bgGrad.addColorStop(0.8, '#040a08');
  bgGrad.addColorStop(1, '#020604');
  ctx.fillStyle = bgGrad;
  ctx.beginPath();
  ctx.arc(0, 0, R - 2, 0, Math.PI * 2);
  ctx.fill();

  // Grid rings
  ctx.strokeStyle = 'rgba(32,255,96,0.08)';
  ctx.lineWidth = 1;
  for(let i = 1; i <= 4; i++){
    ctx.beginPath();
    ctx.arc(0, 0, R * i / 4 - 2, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Crosshairs
  ctx.strokeStyle = 'rgba(32,255,96,0.06)';
  ctx.beginPath(); ctx.moveTo(-R, 0); ctx.lineTo(R, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -R); ctx.lineTo(0, R); ctx.stroke();
  // Diagonal
  ctx.strokeStyle = 'rgba(32,255,96,0.03)';
  for(let a = Math.PI/4; a < Math.PI*2; a += Math.PI/2){
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * R, Math.sin(a) * R);
    ctx.stroke();
  }

  // Sweep line
  sweepAngle += 0.018;
  if(sweepAngle > Math.PI * 2) sweepAngle -= Math.PI * 2;

  // Sweep trail (fading arc)
  for(let i = 0; i < 30; i++){
    const a = sweepAngle - i * 0.015;
    const alpha = (1 - i / 30) * 0.15;
    ctx.strokeStyle = `rgba(32,255,96,${alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * (R - 4), Math.sin(a) * (R - 4));
    ctx.stroke();
  }

  // Sweep glow
  const sweepGrad = ctx.createLinearGradient(0, 0, Math.cos(sweepAngle) * R, Math.sin(sweepAngle) * R);
  sweepGrad.addColorStop(0, 'rgba(32,255,96,0.0)');
  sweepGrad.addColorStop(0.5, 'rgba(32,255,96,0.08)');
  sweepGrad.addColorStop(1, 'rgba(32,255,96,0.2)');
  ctx.strokeStyle = sweepGrad;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(Math.cos(sweepAngle) * (R - 4), Math.sin(sweepAngle) * (R - 4));
  ctx.stroke();

  // Static noise particles
  for(const n of staticNoise){
    n.life--;
    if(n.life <= 0){
      n.x = (Math.random() - 0.5) * 2 * R * 0.9;
      n.y = (Math.random() - 0.5) * 2 * R * 0.9;
      n.life = n.maxLife;
    }
    if(Math.sqrt(n.x*n.x + n.y*n.y) > R - 4) continue;
    const alpha = (n.life / n.maxLife) * 0.06;
    ctx.fillStyle = `rgba(32,255,96,${alpha})`;
    ctx.fillRect(n.x - 0.5, n.y - 0.5, 1, 1);
  }

  // Update & draw spirits
  const now = Date.now() / 1000;
  for(let i = spirits.length - 1; i >= 0; i--){
    const s = spirits[i];
    s.life--;
    if(s.life <= 0){ spirits.splice(i, 1); continue; }

    // Drift
    s.angle += s.driftSpeed;
    s.dist = Math.max(0.1, Math.min(0.95, s.dist + s.driftDist));

    // Random glitch
    s.glitchTimer++;
    if(!s.glitching && s.glitchTimer > 50 + Math.random() * 80){
      s.glitching = true;
      s.glitchTimer = 0;
    }
    if(s.glitching && s.glitchTimer > 5 + Math.random() * 8){
      s.glitching = false;
      s.glitchTimer = 0;
    }

    const sx = Math.cos(s.angle) * s.dist * (R - 8);
    const sy = Math.sin(s.angle) * s.dist * (R - 8);

    // Check if sweep just passed over this spirit
    const spiritAngleNorm = ((s.angle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
    const sweepNorm = ((sweepAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
    const diff = Math.abs(spiritAngleNorm - sweepNorm);
    if((diff < 0.05 || diff > Math.PI*2 - 0.05) && !s.detected){
      s.detected = true;
      spawnBlip(sx, sy, s.type.color);
      sfx(800 + Math.random() * 400, 0.04, 'sine', 0.015);
      if(Math.random() < 0.3){
        addFeed(`<span class="${s.type.cls}">${s.type.icon} ${s.type.name} — ${s.type.desc}</span>`);
      }
      setTimeout(() => { s.detected = false; }, 2000);
    }

    // Pulse
    const pulse = Math.sin(now * 3 + s.pulsePhase) * 0.3 + 0.7;
    const fadeAlpha = Math.min(1, s.life / 60);
    const size = s.size * pulse;

    // Draw spirit pixel cluster
    if(s.glitching){
      // Glitch: scatter pixels
      ctx.fillStyle = s.type.color;
      for(let g = 0; g < 6; g++){
        const gx = sx + (Math.random() - 0.5) * 16;
        const gy = sy + (Math.random() - 0.5) * 16;
        ctx.globalAlpha = fadeAlpha * 0.6;
        ctx.fillRect(gx - 1, gy - 1, 2 + Math.random()*2, 1 + Math.random()*2);
      }
      ctx.globalAlpha = 1;
    } else {
      // Normal pixel spirit
      ctx.globalAlpha = fadeAlpha * pulse;
      ctx.fillStyle = s.type.color;
      // Core
      ctx.fillRect(sx - size/2, sy - size/2, size, size);
      // Surrounding pixels
      ctx.globalAlpha = fadeAlpha * pulse * 0.4;
      ctx.fillRect(sx - size, sy - 1, 2, 2);
      ctx.fillRect(sx + size - 1, sy - 1, 2, 2);
      ctx.fillRect(sx - 1, sy - size, 2, 2);
      ctx.fillRect(sx - 1, sy + size - 1, 2, 2);
      ctx.globalAlpha = 1;
    }
  }

  // Draw blips (detection pings)
  for(let i = blips.length - 1; i >= 0; i--){
    const b = blips[i];
    b.age++;
    if(b.age > b.maxAge){ blips.splice(i, 1); continue; }
    const alpha = (1 - b.age / b.maxAge);
    const radius = 4 + b.age * 0.5;
    ctx.strokeStyle = b.color;
    ctx.globalAlpha = alpha * 0.6;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(b.x, b.y, radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Glitch overlay on deep scan
  if(glitchFrames > 0){
    glitchFrames--;
    ctx.globalAlpha = glitchFrames / 20;
    ctx.fillStyle = '#20ff60';
    for(let i = 0; i < 40; i++){
      const gy = (Math.random() - 0.5) * R * 2;
      ctx.fillRect(-R, gy, R * 2, 1 + Math.random() * 2);
    }
    ctx.globalAlpha = 1;
  }

  // Center dot
  ctx.fillStyle = '#20ff60';
  ctx.beginPath();
  ctx.arc(0, 0, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(32,255,96,0.15)';
  ctx.beginPath();
  ctx.arc(0, 0, 8, 0, Math.PI * 2);
  ctx.fill();

  // Border ring
  ctx.strokeStyle = 'rgba(32,255,96,0.2)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, R - 2, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();

  // Scanline CRT effect
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for(let y = 0; y < H; y += 3){
    ctx.fillRect(0, y, W, 1);
  }
}

// === HUD UPDATE ===
function updateHud(){
  document.getElementById('countEl').textContent = spirits.length;
  const totalThreat = spirits.reduce((a, s) => a + s.type.threat, 0);
  const threatEl = document.getElementById('threatEl');
  if(totalThreat < 3){ threatEl.textContent = 'CALM'; threatEl.style.color = 'var(--green)'; }
  else if(totalThreat < 8){ threatEl.textContent = 'ACTIVE'; threatEl.style.color = 'var(--cyan)'; }
  else if(totalThreat < 15){ threatEl.textContent = 'HIGH'; threatEl.style.color = '#ffaa20'; }
  else { threatEl.textContent = 'CRITICAL'; threatEl.style.color = 'var(--warn)'; }
}

// === MAIN LOOP ===
function loop(){
  autoSpawn();
  draw();
  updateHud();
  requestAnimationFrame(loop);
}

// Spawn a few initial spirits
for(let i = 0; i < 4; i++) spawnSpirit();
addFeed(`<span class="fg">SPIRIT RADAR v2.0 — Scanning for paranormal signals...</span>`);
addFeed(`<span class="fc">Tip: Hit DEEP SCAN to reveal hidden spirits</span>`);

loop();

})();
</script>
</body>
</html>
