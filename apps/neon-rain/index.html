<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Rain</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌧️">
<meta property="og:title" content="Neon Rain">
<meta property="og:description" content="Pixel art neon rain falling through a cyberpunk cityscape. Click to change palette.">
<meta property="og:url" content="https://sloppy.live/neon-rain/">
<meta property="og:image" content="https://sloppy.live/neon-rain/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08080e;cursor:crosshair}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
#hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Press Start 2P',monospace;color:rgba(255,255,255,.3);font-size:clamp(.55rem,1.5vw,.75rem);pointer-events:none;z-index:5;text-align:center;line-height:2;transition:opacity 1s}
.back-link{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:20;color:rgba(255,255,255,.12);font-size:9px;text-decoration:none;font-family:'Press Start 2P',monospace}
.back-link:hover{color:#0ff}
</style>
</head>
<body>
<div id="hint">CLICK TO SHIFT PALETTE<br>MOVE MOUSE FOR WIND</div>
<canvas id="cv"></canvas>
<a class="back-link" href="https://sloppy.live">sloppy.live</a>
<script>
const CV=document.getElementById('cv');
const X=CV.getContext('2d');
X.imageSmoothingEnabled=false;

const PX=3;
let W,H,GW,GH;
function resize(){
  W=CV.width=window.innerWidth;
  H=CV.height=window.innerHeight;
  GW=Math.floor(W/PX);
  GH=Math.floor(H/PX);
  generateCity();
}
resize();
window.addEventListener('resize',resize);

// --- PALETTES ---
const PALETTES=[
  {name:'Cyber',sky:'#08080e',rain:['#00f0ff','#00c8ff','#0090cc','#006699'],splash:'#00f0ff',city:['#0a0a18','#0d0d22','#10102c'],windows:['#00f0ff','#ff2d95','#ffd700'],glow:'rgba(0,240,255,'},
  {name:'Sakura',sky:'#0e0810',rain:['#ff69b4','#ff85c8','#cc5599','#993377'],splash:'#ff69b4',city:['#12081a','#180c22','#1e102a'],windows:['#ff69b4','#ff9ed2','#ffd700'],glow:'rgba(255,105,180,'},
  {name:'Acid',sky:'#060e08',rain:['#39ff14','#32e612','#28cc10','#1fa30d'],splash:'#39ff14',city:['#081208','#0a180a','#0c1e0c'],windows:['#39ff14','#ffcc00','#ff4500'],glow:'rgba(57,255,20,'},
  {name:'Vaporwave',sky:'#0c0618',rain:['#e040fb','#bb30dd','#9920bb','#771199'],splash:'#e040fb',city:['#100820','#140c28','#181030'],windows:['#e040fb','#00f0ff','#ffcc00'],glow:'rgba(224,64,251,'},
  {name:'Ember',sky:'#0e0804',rain:['#ff4500','#ff6622','#cc3800','#992a00'],splash:'#ff4500',city:['#140a06','#1a0e08','#20120a'],windows:['#ff4500','#ffd700','#ff2d95'],glow:'rgba(255,69,0,'},
  {name:'Ice',sky:'#040810',rain:['#88ccff','#66aaee','#4488cc','#2266aa'],splash:'#88ccff',city:['#060c18','#081020','#0a1428'],windows:['#88ccff','#ffffff','#aaddff'],glow:'rgba(136,204,255,'},
];
let palIdx=2;
let pal=PALETTES[2];

// --- CITY SKYLINE ---
let buildings=[];
function generateCity(){
  buildings=[];
  let x=0;
  while(x<GW+20){
    let w=8+Math.floor(Math.random()*14);
    let h=20+Math.floor(Math.random()*50);
    let windows=[];
    for(let wy=4;wy<h-4;wy+=5){
      for(let wx=2;wx<w-2;wx+=4){
        if(Math.random()<0.6){
          windows.push({x:wx,y:wy,on:Math.random()<0.7,flicker:Math.random()*10});
        }
      }
    }
    buildings.push({x,w,h,windows,shade:Math.floor(Math.random()*3)});
    x+=w+1+Math.floor(Math.random()*3);
  }
}
generateCity();

// --- RAIN DROPS ---
let drops=[];
const MAX_DROPS=600;
let wind=0,targetWind=0;
let mouseX=0;

function spawnDrop(){
  let speed=2+Math.random()*4;
  let len=2+Math.floor(Math.random()*4);
  drops.push({
    x:Math.random()*GW+wind*-10,
    y:-len-Math.random()*20,
    speed,len,
    bright:Math.random(),
    colorIdx:Math.floor(Math.random()*pal.rain.length)
  });
}

// --- SPLASHES ---
let splashes=[];
function spawnSplash(x,y){
  for(let i=0;i<3;i++){
    splashes.push({
      x:x+Math.floor(Math.random()*5-2),
      y:y-Math.floor(Math.random()*2),
      life:0.15+Math.random()*0.1,
      dx:(Math.random()-.5)*15,
      dy:-8-Math.random()*12
    });
  }
}

// --- PUDDLE REFLECTIONS ---
let puddles=[];
function initPuddles(){
  puddles=[];
  for(let i=0;i<12;i++){
    puddles.push({x:Math.floor(Math.random()*GW),w:6+Math.floor(Math.random()*20),shimmer:Math.random()*10});
  }
}
initPuddles();

// --- LIGHTNING ---
let lightning=0;

// --- INPUT ---
CV.addEventListener('click',()=>{
  palIdx=(palIdx+1)%PALETTES.length;
  pal=PALETTES[palIdx];
  lightning=0.15;
});
CV.addEventListener('mousemove',e=>{mouseX=e.clientX;});
CV.addEventListener('touchmove',e=>{e.preventDefault();mouseX=e.touches[0].clientX;},{passive:false});
CV.addEventListener('touchstart',e=>{
  palIdx=(palIdx+1)%PALETTES.length;
  pal=PALETTES[palIdx];
  lightning=0.15;
});

// Hide hint after first interaction
let hintShown=true;
function hideHint(){
  if(!hintShown) return;
  hintShown=false;
  document.getElementById('hint').style.opacity='0';
}
CV.addEventListener('click',hideHint);
CV.addEventListener('touchstart',hideHint);

// --- PIXEL HELPERS ---
function px(x,y,c){
  X.fillStyle=c;
  X.fillRect(Math.floor(x)*PX,Math.floor(y)*PX,PX,PX);
}
function pxRect(x,y,w,h,c){
  X.fillStyle=c;
  X.fillRect(Math.floor(x)*PX,Math.floor(y)*PX,w*PX,h*PX);
}

// --- DRAW ---
function drawSky(){
  X.fillStyle=pal.sky;
  X.fillRect(0,0,W,H);

  // Distant glow on horizon
  let grad=X.createRadialGradient(W/2,H,0,W/2,H,H*0.6);
  grad.addColorStop(0,pal.glow+'0.06)');
  grad.addColorStop(1,'transparent');
  X.fillStyle=grad;
  X.fillRect(0,0,W,H);
}

function drawCity(now){
  for(let b of buildings){
    let bx=b.x,by=GH-b.h;
    let shade=pal.city[b.shade]||pal.city[0];
    pxRect(bx,by,b.w,b.h,shade);
    // Roof edge
    pxRect(bx,by,b.w,1,pal.city[2]);
    // Windows
    for(let win of b.windows){
      if(!win.on) continue;
      let flick=Math.sin(now/1000+win.flicker);
      if(flick<-0.8) continue; // occasional flicker off
      let wc=pal.windows[Math.floor(win.flicker)%pal.windows.length];
      px(bx+win.x,by+win.y,wc);
      px(bx+win.x+1,by+win.y,wc);
      px(bx+win.x,by+win.y+1,wc);
      px(bx+win.x+1,by+win.y+1,wc);
    }
  }
  // Ground line
  pxRect(0,GH-1,GW,1,pal.city[2]);
}

function drawRain(){
  for(let d of drops){
    let c=pal.rain[d.colorIdx];
    let a=0.4+d.bright*0.6;
    X.fillStyle=c;
    X.globalAlpha=a;
    for(let i=0;i<d.len;i++){
      let dy=d.y+i;
      let dx=d.x+wind*i*0.3;
      if(dy>=0&&dy<GH&&dx>=0&&dx<GW){
        X.fillRect(Math.floor(dx)*PX,Math.floor(dy)*PX,PX,PX);
      }
    }
  }
  X.globalAlpha=1;
}

function drawSplashes(){
  for(let s of splashes){
    let a=s.life*6;
    X.globalAlpha=Math.min(1,a);
    px(Math.floor(s.x),Math.floor(s.y),pal.splash);
  }
  X.globalAlpha=1;
}

function drawPuddles(now){
  for(let p of puddles){
    let shimmer=Math.sin(now/500+p.shimmer)*0.3+0.2;
    X.globalAlpha=shimmer;
    for(let i=0;i<p.w;i++){
      let rx=p.x+i;
      if(rx<0||rx>=GW) continue;
      let ry=GH-1;
      // Reflection color from nearest building window
      let rc=pal.rain[Math.floor(p.shimmer+i)%pal.rain.length];
      px(rx,ry,rc);
    }
  }
  X.globalAlpha=1;
}

function drawLightning(){
  if(lightning<=0) return;
  X.fillStyle='rgba(255,255,255,'+lightning*0.4+')';
  X.fillRect(0,0,W,H);
}

// --- UPDATE ---
function update(dt,now){
  // Wind follows mouse
  targetWind=(mouseX/W-0.5)*6;
  wind+=(targetWind-wind)*2*dt;

  // Spawn rain
  let targetDrops=MAX_DROPS;
  while(drops.length<targetDrops) spawnDrop();

  // Update drops
  for(let i=drops.length-1;i>=0;i--){
    let d=drops[i];
    d.y+=d.speed;
    d.x+=wind*0.5;
    // Hit ground or building
    let groundY=GH-1;
    // Check building collision
    let hitBuilding=false;
    for(let b of buildings){
      if(d.x>=b.x&&d.x<b.x+b.w){
        let roofY=GH-b.h;
        if(d.y>=roofY){groundY=roofY;hitBuilding=true;break;}
      }
    }
    if(d.y>=groundY){
      spawnSplash(d.x,groundY);
      // Reset drop
      d.x=Math.random()*GW+wind*-10;
      d.y=-d.len-Math.random()*20;
      d.colorIdx=Math.floor(Math.random()*pal.rain.length);
    }
    // Off screen
    if(d.x<-10||d.x>GW+10){
      d.x=Math.random()*GW;
      d.y=-d.len;
    }
  }

  // Update splashes
  for(let i=splashes.length-1;i>=0;i--){
    let s=splashes[i];
    s.x+=s.dx*dt;
    s.y+=s.dy*dt;
    s.dy+=60*dt;
    s.life-=dt;
    if(s.life<=0) splashes.splice(i,1);
  }

  // Lightning decay
  if(lightning>0) lightning-=dt*2;

  // Random lightning
  if(Math.random()<0.0005) lightning=0.12+Math.random()*0.1;

  // Window flicker
  if(Math.random()<0.01){
    let b=buildings[Math.floor(Math.random()*buildings.length)];
    if(b&&b.windows.length){
      let w=b.windows[Math.floor(Math.random()*b.windows.length)];
      w.on=!w.on;
    }
  }
}

// --- MAIN LOOP ---
let lastTime=performance.now();
function loop(now){
  let dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  update(dt,now);

  drawSky();
  drawPuddles(now);
  drawCity(now);
  drawRain();
  drawSplashes();
  drawLightning();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
