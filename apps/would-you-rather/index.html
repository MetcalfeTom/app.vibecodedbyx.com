<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Would You Rather</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%B4" />

<meta name="description" content="Impossible choices, live community percentages — starting with the classic: 100 duck-sized horses or 1 horse-sized duck?" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Would You Rather" />
<meta property="og:description" content="100 duck-sized horses or 1 horse-sized duck? Pick a side, see how many agree." />
<meta property="og:url" content="https://sloppy.live/would-you-rather/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20hundred%20tiny%20cartoon%20horses%20facing%20one%20giant%20duck%2C%20epic%20standoff%2C%20split%20poster%20red%20versus%20teal%2C%20bold%20graphic%20style?width=1200&height=630&nologo=true&seed=100" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#131017; --ink:#f4eee6; --dim:#8d8496;
    --a:#e5484d; --a-d:#8f1d24; --b:#12a594; --b-d:#0b5d54; --gold:#f5c453;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    min-height:100vh; font-family:'Space Mono',monospace; color:var(--ink); background:var(--bg);
    display:flex; flex-direction:column; align-items:center; padding:1rem .8rem 2.5rem;
    -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent;
  }
  header{ text-align:center; margin-bottom:.9rem; }
  h1{ font-family:'Passion One',sans-serif; font-weight:900; font-size:clamp(2rem,8vw,3.4rem);
    letter-spacing:.01em; line-height:.95; text-transform:uppercase; }
  h1 .or{ color:var(--gold); }
  .tag{ font-size:.72rem; color:var(--dim); margin-top:.35rem; letter-spacing:.14em; text-transform:uppercase; }

  .qmeta{ display:flex; align-items:center; gap:.6rem; margin-bottom:.8rem; flex-wrap:wrap; justify-content:center; }
  .qnum{ font-size:.72rem; color:var(--dim); }
  .classic-badge{ font-family:'Passion One',sans-serif; font-size:.85rem; letter-spacing:.08em; color:#131017;
    background:var(--gold); border-radius:6px; padding:.15rem .55rem; text-transform:uppercase; }
  .classic-badge[hidden]{ display:none; }

  .arena{ display:grid; grid-template-columns:1fr auto 1fr; gap:0; width:min(56rem,96vw); align-items:stretch; }
  .opt{ position:relative; border:0; cursor:pointer; border-radius:18px; padding:2.2rem 1.4rem 2.6rem; min-height:16rem;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.9rem; text-align:center;
    font-family:inherit; color:#fff; transition:transform .12s, filter .12s; overflow:hidden; }
  .opt .em{ font-size:clamp(2.6rem,8vw,4rem); line-height:1; filter:drop-shadow(0 6px 10px rgba(0,0,0,.35)); }
  .opt .txt{ font-family:'Passion One',sans-serif; font-weight:700; font-size:clamp(1.25rem,3.6vw,1.9rem); line-height:1.12; max-width:18em; }
  .opt .kbd{ position:absolute; top:.7rem; left:.9rem; font-size:.66rem; opacity:.65; border:1px solid rgba(255,255,255,.5); border-radius:5px; padding:.06rem .4rem; }
  .opt.a{ background:linear-gradient(160deg,#f0565b,var(--a) 45%,var(--a-d)); box-shadow:0 12px 30px rgba(229,72,77,.25); }
  .opt.b{ background:linear-gradient(200deg,#19c2ae,var(--b) 45%,var(--b-d)); box-shadow:0 12px 30px rgba(18,165,148,.25); }
  .opt:hover{ transform:translateY(-4px) scale(1.012); filter:brightness(1.06); }
  .opt:focus-visible{ outline:4px solid var(--gold); outline-offset:3px; }
  .opt[disabled]{ cursor:default; }
  .opt.dimmed{ filter:saturate(.35) brightness(.6); }
  .opt.chosen{ outline:4px solid var(--gold); outline-offset:3px; }
  .opt .pct{ position:absolute; inset:auto 0 0 0; padding:.5rem; font-family:'Passion One',sans-serif;
    font-size:2rem; background:rgba(0,0,0,.32); opacity:0; transform:translateY(100%); transition:transform .35s, opacity .35s; }
  .opt.reveal .pct{ opacity:1; transform:none; }
  .opt .pct small{ display:block; font-family:'Space Mono',monospace; font-size:.62rem; letter-spacing:.1em; opacity:.8; }

  .vs{ display:flex; align-items:center; justify-content:center; padding:0 1rem; }
  .vs span{ font-family:'Passion One',sans-serif; font-weight:900; font-size:clamp(1.6rem,5vw,2.6rem); color:var(--gold);
    text-shadow:0 3px 0 rgba(0,0,0,.4); transform:rotate(-8deg); }

  .below{ margin-top:1.1rem; min-height:3.4rem; display:flex; flex-direction:column; align-items:center; gap:.7rem; text-align:center; }
  .verdict{ font-size:.86rem; color:var(--ink); }
  .verdict b{ color:var(--gold); }
  .totals{ font-size:.7rem; color:var(--dim); }
  .btnrow{ display:flex; gap:.6rem; flex-wrap:wrap; justify-content:center; }
  .btn{ font-family:'Passion One',sans-serif; font-size:1.15rem; letter-spacing:.05em; color:#131017; background:var(--ink);
    border:0; border-radius:10px; padding:.55rem 1.4rem; cursor:pointer; min-height:2.75rem; text-transform:uppercase; }
  .btn.gold{ background:var(--gold); }
  .btn.ghost{ background:transparent; color:var(--dim); border:1px solid #383241; font-size:.95rem; }
  .btn:hover{ filter:brightness(1.08); }
  .btn:focus-visible{ outline:3px solid var(--gold); outline-offset:3px; }

  footer{ margin-top:1.6rem; font-size:.66rem; color:var(--dim); text-align:center; line-height:1.7; }

  @media (max-width:720px){
    .arena{ grid-template-columns:1fr; gap:.6rem; }
    .vs{ padding:.1rem 0; }
    .opt{ min-height:10.5rem; padding:1.4rem 1rem 2.4rem; }
  }
  @media (prefers-reduced-motion:reduce){
    .opt, .opt .pct{ transition:none; }
  }
</style>
</head>
<body>
  <header>
    <h1>Would <span class="or">·you·</span> Rather</h1>
    <p class="tag">pick a side · see who agrees</p>
  </header>

  <main style="display:flex;flex-direction:column;align-items:center;width:100%">
    <div class="qmeta">
      <span class="classic-badge" id="classicBadge">★ the classic</span>
      <span class="qnum" id="qnum">question 1</span>
    </div>

    <div class="arena">
      <button class="opt a" id="optA" type="button">
        <span class="kbd" aria-hidden="true">1</span>
        <span class="em" id="emA" aria-hidden="true">🐴</span>
        <span class="txt" id="txtA">…</span>
        <span class="pct" aria-hidden="true"><span id="pctA">0%</span><small id="cntA"></small></span>
      </button>
      <div class="vs" aria-hidden="true"><span>VS</span></div>
      <button class="opt b" id="optB" type="button">
        <span class="kbd" aria-hidden="true">2</span>
        <span class="em" id="emB" aria-hidden="true">🦆</span>
        <span class="txt" id="txtB">…</span>
        <span class="pct" aria-hidden="true"><span id="pctB">0%</span><small id="cntB"></small></span>
      </button>
    </div>

    <div class="below">
      <div class="verdict" id="verdict" role="status" aria-live="polite"></div>
      <div class="totals" id="totals"></div>
      <div class="btnrow">
        <button class="btn gold" id="nextBtn" type="button" hidden>next dilemma →</button>
        <button class="btn ghost" id="horseBtn" type="button">🐴 take me to the tiny horses</button>
        <button class="btn ghost" id="skipBtn" type="button">skip</button>
      </div>
    </div>
  </main>

  <footer>keys: 1 / 2 to choose · enter for next · one vote per question<br>percentages are real votes from everyone who played</footer>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
  const SB_URL = "https://yjyxteqzhhmtrgcaekgz.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqeXh0ZXF6aGhtdHJnY2Fla2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTg3NDIsImV4cCI6MjA3MjkzNDc0Mn0.G8SRde7IN2QFW1EnASM8IS32IUYR2eenCCjdDdioiBU";

  // ---- question bank (id, emojiA, textA, emojiB, textB) ----
  const Q = [
    ["tiny-horses","🐴","fight 100 duck-sized horses","🦆","fight 1 horse-sized duck"],
    ["loud-quiet","📢","always have to shout","🤫","only ever be able to whisper"],
    ["past-future","⏪","visit the past","⏩","visit the future"],
    ["fly-invis","🕊️","fly, but only 1 meter high","👻","turn invisible, but only when nobody is looking"],
    ["wifi-coffee","📶","have perfect wifi forever","☕","have perfect coffee forever"],
    ["talk-animals","🐕","talk to animals (they gossip)","🌍","speak every human language"],
    ["rewind-pause","⏮️","rewind life 10 seconds at will","⏸️","pause life for 10 minutes at will"],
    ["sing-dance","🎤","sing everything you say","🕺","dance everywhere you walk"],
    ["hiccups-sneeze","😵","have hiccups for a year","🤧","feel a sneeze that never comes for a year"],
    ["knight-pirate","⚔️","be a mediocre knight","🏴‍☠️","be a legendary pirate who gets seasick"],
    ["socks-wet","🧦","permanently slightly wet socks","🏷️","permanently itchy clothing tag"],
    ["mind-read","🧠","read minds but can't turn it off","🔮","see 10 minutes into the future but only your own"],
    ["pizza-taco","🍕","pizza is the only food forever","🌮","tacos are the only food forever"],
    ["giant-tiny","🏔️","be 3 meters tall","🐜","be 30 centimeters tall"],
    ["fame-anon","🌟","be famous but always misquoted","🥸","be unknown but always believed"],
    ["typo-autocorrect","⌨️","every message has one typo","🤖","autocorrect chooses your words 5% of the time"],
    ["cat-dog","🐱","all cats obey you","🐶","all dogs understand you but disagree"],
    ["moon-ocean","🌕","one-way trip to a moon base","🌊","one-way trip to an ocean-floor base"],
    ["laugh-cry","😂","laugh at every bad thing","😭","cry at every good thing"],
    ["button-lever","🔴","press a button: 50% chance of 1M, 50% nothing, once","💰","take a guaranteed 100k"],
    ["old-tech","💾","use only 1995 technology","📵","use current tech but 1 hour per day"],
    ["superhero-sidekick","🦸","be the sidekick of a great hero","🦹","be the archnemesis of a terrible hero"],
    ["always-late","⏰","always be 20 minutes late","🕐","always be 2 hours early"],
    ["ghost-alien","👻","prove ghosts exist","👽","prove aliens exist"],
    ["chef-critic","👨‍🍳","cook like a god, taste nothing","👅","taste everything perfectly, cook terribly"],
    ["horse-duck-2","🐎","ride a horse that quacks","🦢","ride a giant duck that neighs"],
    ["book-movie","📚","live in the last book you read","🎬","live in the last movie you watched"],
    ["rain-sun","🌧️","perfect memory of every rainy day","☀️","no memory of any sunny day"],
    ["teleport-slow","🌀","teleport anywhere, arrive nauseous","🚄","travel anywhere at 300km/h instantly comfy"],
    ["debug-write","🐛","fix bugs you didn't write forever","✍️","write code someone else always refactors"],
    ["stream-chat","📺","stream with zero viewers who are all bots","💬","chat in a stream that never notices you"],
    ["sleep-food","😴","never need sleep","🍽️","never need food"],
    ["loud-neighbors","🔊","neighbors who party every night","🎺","one neighbor learning trumpet forever"],
    ["win-argue","🏆","win every argument but feel wrong","🤝","lose every argument but feel right"],
    ["snow-beach","❄️","eternal cozy winter","🏖️","eternal golden summer"],
    ["speak-first","🗣️","always say the first thing you think","🤐","never be able to say the first thing you think"],
    ["shoes-hat","👟","everyone notices your shoes","🎩","nobody ever notices your hat"],
    ["time-money","⏳","10 extra years of life","💎","10 million now"],
    ["dragon-wizard","🐉","own a small unreliable dragon","🧙","be a wizard with one spell: lukewarm"],
    ["applause-silence","👏","applause every time you enter a room","🤫","total silence every time you speak"]
  ];

  const $=id=>document.getElementById(id);
  const optA=$('optA'), optB=$('optB'), verdict=$('verdict'), totals=$('totals'),
        nextBtn=$('nextBtn'), skipBtn=$('skipBtn'), horseBtn=$('horseBtn');

  // order: classic first, rest shuffled
  const order=[0].concat(
    Q.map((_,i)=>i).slice(1).sort(()=>Math.random()-0.5)
  );
  let pos=0, answered=false, myVotes={};

  // ---- supabase (graceful if it fails) ----
  let sb=null, me=null;
  try{
    sb=createClient(SB_URL, SB_KEY, { auth:{ persistSession:true, autoRefreshToken:true } });
    const { data:{ session } } = await sb.auth.getSession();
    let s=session;
    if(!s){ const { data } = await sb.auth.signInAnonymously(); s=data && data.session; }
    me = s && s.user || null;
    if(me){
      const { data } = await sb.from('wyr_votes').select('question_id,choice').eq('user_id', me.id);
      (data||[]).forEach(v=>{ myVotes[v.question_id]=v.choice; });
    }
  }catch(e){ console.warn('offline mode', e); }

  function q(){ return Q[order[pos]]; }

  function showQuestion(){
    answered=false;
    const [id,ea,ta,eb,tb]=q();
    $('emA').textContent=ea; $('txtA').textContent=ta;
    $('emB').textContent=eb; $('txtB').textContent=tb;
    $('qnum').textContent='question '+(pos+1)+' / '+Q.length;
    $('classicBadge').hidden = id!=='tiny-horses';
    [optA,optB].forEach(o=>{ o.disabled=false; o.classList.remove('dimmed','chosen','reveal'); });
    verdict.textContent=''; totals.textContent='';
    nextBtn.hidden=true;
    horseBtn.hidden = id==='tiny-horses';
    skipBtn.hidden=false;
    // already answered in a previous session? show results immediately
    if(myVotes[id]!==undefined){ reveal(myVotes[id], false); }
  }

  async function fetchSplit(id){
    if(!sb) return null;
    try{
      const { data, error } = await sb.from('wyr_votes').select('choice').eq('question_id', id);
      if(error) return null;
      let a=0,b=0; (data||[]).forEach(r=>{ if(r.choice===0)a++; else if(r.choice===1)b++; });
      return {a,b};
    }catch(e){ return null; }
  }

  async function reveal(choice, freshVote){
    answered=true;
    const [id]=q();
    optA.disabled=true; optB.disabled=true;
    (choice===0?optA:optB).classList.add('chosen');
    (choice===0?optB:optA).classList.add('dimmed');
    nextBtn.hidden=false; skipBtn.hidden=true; nextBtn.focus();

    if(freshVote && sb && me && myVotes[id]===undefined){
      myVotes[id]=choice;
      sb.from('wyr_votes').insert({ question_id:id, choice:choice, user_id:me.id })
        .then(({error})=>{ if(error) console.warn('vote insert failed', error); });
    }
    const split=await fetchSplit(id);
    if(split){
      // include the fresh local vote if the insert hasn't landed yet
      if(freshVote){ if(choice===0 && split.a===0) split.a=1; else if(choice===1 && split.b===0) split.b=1; }
      const tot=split.a+split.b;
      const pa=tot? Math.round(split.a/tot*100) : 0, pb=tot? 100-pa : 0;
      $('pctA').textContent=pa+'%'; $('pctB').textContent=pb+'%';
      $('cntA').textContent=split.a+' votes'; $('cntB').textContent=split.b+' votes';
      optA.classList.add('reveal'); optB.classList.add('reveal');
      const mine=choice===0?pa:pb;
      verdict.innerHTML = mine>=50
        ? 'you’re with the <b>majority</b> ('+mine+'% agree)'
        : 'bold. only <b>'+mine+'%</b> chose your side';
      totals.textContent = tot+' total vote'+(tot===1?'':'s')+' on this dilemma';
    } else {
      verdict.textContent='choice locked in. (community results unavailable right now)';
    }
  }

  function next(){ pos=(pos+1)%Q.length; showQuestion(); }

  optA.addEventListener('click', ()=>{ if(!answered) reveal(0,true); });
  optB.addEventListener('click', ()=>{ if(!answered) reveal(1,true); });
  nextBtn.addEventListener('click', next);
  skipBtn.addEventListener('click', next);
  horseBtn.addEventListener('click', ()=>{ pos=0; showQuestion(); });
  document.addEventListener('keydown', e=>{
    if(e.key==='1' && !answered) reveal(0,true);
    else if(e.key==='2' && !answered) reveal(1,true);
    else if((e.key==='Enter'||e.key===' ') && answered && document.activeElement.tagName!=='BUTTON'){ e.preventDefault(); next(); }
  });

  showQuestion();
</script>
</body>
</html>
