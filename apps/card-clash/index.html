<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Card Clash</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚔️">
<meta property="og:title" content="Card Clash">
<meta property="og:description" content="Tactical card battles with attack, defense, and spells. Climb the ranks.">
<meta property="og:url" content="https://sloppy.live/card-clash">
<meta property="og:image" content="https://emojicdn.elk.sh/⚔️?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100dvh;background:#0a0812;font-family:'Fira Code',monospace;color:#c8c0d8;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center}

#arena{width:100%;max-width:600px;padding:8px 12px 80px;position:relative}

/* Health bars */
.hp-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.hp-name{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#d0b8f0;min-width:70px}
.hp-bar{flex:1;height:14px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;position:relative}
.hp-fill{height:100%;border-radius:3px;transition:width 0.4s}
.hp-fill.player{background:linear-gradient(90deg,#40c080,#60e0a0)}
.hp-fill.enemy{background:linear-gradient(90deg,#e04060,#ff6080)}
.hp-text{font-size:10px;color:rgba(200,180,255,0.4);min-width:50px;text-align:right}
.mana-row{display:flex;align-items:center;gap:8px;padding:0 0 6px}
.mana-bar{flex:1;height:6px;background:rgba(255,255,255,0.03);border-radius:3px;overflow:hidden}
.mana-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#4080ff,#60a0ff);transition:width 0.3s}
.mana-label{font-size:9px;color:rgba(100,160,255,0.3);min-width:70px}
.mana-text{font-size:9px;color:rgba(100,160,255,0.3);min-width:50px;text-align:right}

/* Battle log */
#log{
  min-height:60px;max-height:100px;overflow-y:auto;
  padding:8px;margin:4px 0;
  background:rgba(255,255,255,0.02);border-radius:4px;
  border:1px solid rgba(200,160,255,0.05);
  font-size:10px;color:rgba(200,180,255,0.35);line-height:1.6;
}
#log .dmg{color:#ff6080}
#log .heal{color:#60e0a0}
#log .spell{color:#80a0ff}
#log .info{color:rgba(200,180,255,0.25)}

/* Cards */
#hand-label{font-size:9px;color:rgba(200,160,255,0.15);letter-spacing:2px;padding:4px 0;text-transform:uppercase}
#hand{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:4px 0 8px}

.card{
  width:100px;min-height:130px;
  border:1px solid rgba(200,160,255,0.12);border-radius:8px;
  background:rgba(200,160,255,0.03);
  padding:8px;cursor:pointer;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;gap:3px;
  position:relative;
}
.card:hover{border-color:rgba(200,160,255,0.3);background:rgba(200,160,255,0.06);transform:translateY(-3px)}
.card:active{transform:scale(0.97)}
.card.disabled{opacity:0.3;cursor:default;pointer-events:none}
.card .icon{font-size:28px;text-align:center;line-height:1.2}
.card .cname{font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:#d0b8f0;text-align:center}
.card .cdesc{font-size:8px;color:rgba(200,160,255,0.3);text-align:center;line-height:1.3}
.card .cstats{display:flex;justify-content:space-between;margin-top:auto;padding-top:4px}
.card .cstats span{font-size:9px}
.card .cstats .atk{color:#ff6080}
.card .cstats .def{color:#60e0a0}
.card .cstats .mana-cost{color:#4080ff}
.card.atk-type{border-color:rgba(255,80,100,0.15)}
.card.def-type{border-color:rgba(80,220,140,0.15)}
.card.spell-type{border-color:rgba(80,140,255,0.15)}

/* End turn */
#end-turn{
  font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:2px;
  border:1px solid rgba(200,160,255,0.15);background:rgba(200,160,255,0.04);
  color:rgba(200,160,255,0.4);padding:8px 24px;border-radius:6px;
  cursor:pointer;margin:6px auto;display:block;transition:all .15s;
}
#end-turn:hover{border-color:rgba(200,160,255,0.3);color:#d0b8f0}
#end-turn:disabled{opacity:0.3;cursor:default}

/* Overlay screens */
.overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,8,18,0.92);z-index:20;
}
.overlay h2{font-family:'Cinzel',serif;font-size:1.6rem;color:#d0b8f0;margin-bottom:8px;text-align:center}
.overlay .sub{font-size:11px;color:rgba(200,160,255,0.3);margin-bottom:20px;text-align:center}
.overlay button{
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:2px;
  border:1px solid rgba(200,160,255,0.2);background:rgba(200,160,255,0.05);
  color:#d0b8f0;padding:10px 28px;border-radius:6px;cursor:pointer;
  transition:all .15s;margin:4px;
}
.overlay button:hover{background:rgba(200,160,255,0.1);border-color:rgba(200,160,255,0.4)}

#stats-display{
  font-size:11px;color:rgba(200,160,255,0.3);text-align:center;
  line-height:2;margin-bottom:16px;
}
#stats-display span{color:#d0b8f0}

a#back{position:fixed;bottom:8px;left:10px;font-size:9px;opacity:0.1;color:#408;text-decoration:none;z-index:5}
</style>
</head>
<body>

<div id="arena">
  <!-- Enemy -->
  <div class="hp-row">
    <span class="hp-name" id="enemy-name">SHADOW</span>
    <div class="hp-bar"><div class="hp-fill enemy" id="enemy-hp-fill"></div></div>
    <span class="hp-text" id="enemy-hp-text">30/30</span>
  </div>
  <div class="mana-row">
    <span class="mana-label">mana</span>
    <div class="mana-bar"><div class="mana-fill" id="enemy-mana-fill"></div></div>
    <span class="mana-text" id="enemy-mana-text">3/3</span>
  </div>

  <div id="log"></div>

  <!-- Player -->
  <div class="mana-row">
    <span class="mana-label">mana</span>
    <div class="mana-bar"><div class="mana-fill" id="player-mana-fill"></div></div>
    <span class="mana-text" id="player-mana-text">3/3</span>
  </div>
  <div class="hp-row">
    <span class="hp-name">YOU</span>
    <div class="hp-bar"><div class="hp-fill player" id="player-hp-fill"></div></div>
    <span class="hp-text" id="player-hp-text">30/30</span>
  </div>

  <div id="hand-label">YOUR HAND</div>
  <div id="hand"></div>
  <button id="end-turn">END TURN</button>
</div>

<!-- Start screen -->
<div class="overlay" id="start-screen">
  <h2>Card Clash</h2>
  <div class="sub">Tactical card battles</div>
  <div id="stats-display"></div>
  <button id="start-btn">BATTLE</button>
  <button id="hard-btn">HARD MODE</button>
</div>

<!-- Game over -->
<div class="overlay" id="end-screen" style="display:none">
  <h2 id="end-title">Victory</h2>
  <div class="sub" id="end-sub"></div>
  <button id="again-btn">PLAY AGAIN</button>
</div>

<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){

// --- CARD DATABASE ---
var CARDS=[
  // Attacks
  {id:'slash',name:'Slash',icon:'⚔️',type:'atk',atk:4,def:0,mana:1,desc:'Basic 4 damage'},
  {id:'heavy',name:'Heavy Strike',icon:'🪓',type:'atk',atk:7,def:0,mana:2,desc:'7 damage hit'},
  {id:'pierce',name:'Pierce',icon:'🗡️',type:'atk',atk:3,def:0,mana:1,desc:'3 dmg, ignores shield'},
  {id:'double',name:'Double Cut',icon:'✂️',type:'atk',atk:3,def:0,mana:2,desc:'Hit twice (3+3)'},
  {id:'crit',name:'Critical',icon:'💥',type:'atk',atk:5,def:0,mana:2,desc:'5 dmg, 40% chance x2'},
  {id:'drain',name:'Life Drain',icon:'🩸',type:'atk',atk:3,def:0,mana:2,desc:'3 dmg, heal 2'},
  // Defense
  {id:'block',name:'Block',icon:'🛡️',type:'def',atk:0,def:5,mana:1,desc:'Gain 5 shield'},
  {id:'fortress',name:'Fortress',icon:'🏰',type:'def',atk:0,def:10,mana:3,desc:'Gain 10 shield'},
  {id:'thorns',name:'Thorns',icon:'🌹',type:'def',atk:0,def:3,mana:1,desc:'3 shield, reflect 2'},
  {id:'regen',name:'Regenerate',icon:'💚',type:'def',atk:0,def:0,mana:2,desc:'Heal 6 HP'},
  // Spells
  {id:'fireball',name:'Fireball',icon:'🔥',type:'spell',atk:6,def:0,mana:3,desc:'6 dmg, burn 2/turn'},
  {id:'frost',name:'Frost',icon:'❄️',type:'spell',atk:2,def:0,mana:2,desc:'2 dmg, enemy -1 mana'},
  {id:'lightning',name:'Lightning',icon:'⚡',type:'spell',atk:8,def:0,mana:4,desc:'8 massive damage'},
  {id:'potion',name:'Potion',icon:'🧪',type:'spell',atk:0,def:0,mana:1,desc:'+2 max mana this fight'},
  {id:'curse',name:'Curse',icon:'💀',type:'spell',atk:0,def:0,mana:2,desc:'Enemy takes +2 dmg next hit'},
];

function cardById(id){for(var i=0;i<CARDS.length;i++)if(CARDS[i].id===id)return CARDS[i];return null}

// --- STATS (localStorage) ---
var stats={wins:0,losses:0,totalDmg:0,totalHealed:0,bestStreak:0,streak:0};
function loadStats(){
  try{var d=JSON.parse(localStorage.getItem('card-clash-stats'));if(d)stats=d}catch(e){}
}
function saveStats(){try{localStorage.setItem('card-clash-stats',JSON.stringify(stats))}catch(e){}}
loadStats();

function showStats(){
  var el=document.getElementById('stats-display');
  el.innerHTML='Wins: <span>'+stats.wins+'</span> / Losses: <span>'+stats.losses+'</span><br>'+
    'Best streak: <span>'+stats.bestStreak+'</span> | Damage dealt: <span>'+stats.totalDmg+'</span>';
}
showStats();

// --- GAME STATE ---
var player,enemy,hand,deck,turn,gameOver,hardMode;
var logEl=document.getElementById('log');

function log(msg,cls){
  var d=document.createElement('div');
  d.className=cls||'info';
  d.textContent=msg;
  logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
}

function buildDeck(){
  // 20 cards: weighted random from pool
  var pool=['slash','slash','slash','heavy','heavy','pierce','double','crit','drain',
            'block','block','block','fortress','thorns','regen','regen',
            'fireball','frost','lightning','potion','curse'];
  var d=[];
  for(var i=0;i<20;i++)d.push(pool[Math.floor(Math.random()*pool.length)]);
  // Shuffle
  for(var j=d.length-1;j>0;j--){var k=Math.floor(Math.random()*(j+1));var t=d[j];d[j]=d[k];d[k]=t}
  return d;
}

function drawCards(count){
  for(var i=0;i<count&&hand.length<7;i++){
    if(deck.length===0){
      // Reshuffle discard concept: just make new cards
      deck=buildDeck();
    }
    hand.push(deck.pop());
  }
}

function startGame(hard){
  hardMode=!!hard;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('end-screen').style.display='none';
  gameOver=false;

  var enemyHP=hard?40:30;
  var enemyMaxMana=hard?4:3;
  player={hp:30,maxHp:30,mana:3,maxMana:3,shield:0,burn:0,cursed:false};
  enemy={hp:enemyHP,maxHp:enemyHP,mana:enemyMaxMana,maxMana:enemyMaxMana,shield:0,burn:0,cursed:false};
  document.getElementById('enemy-name').textContent=hard?'DARK LORD':'SHADOW';
  hand=[];
  deck=buildDeck();
  turn=1;
  logEl.innerHTML='';
  log('Battle begins! Turn '+turn,'info');
  drawCards(4);
  updateUI();
}

function updateUI(){
  // HP bars
  document.getElementById('player-hp-fill').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('player-hp-text').textContent=player.hp+'/'+player.maxHp+(player.shield?' (+'+player.shield+')':'');
  document.getElementById('enemy-hp-fill').style.width=(enemy.hp/enemy.maxHp*100)+'%';
  document.getElementById('enemy-hp-text').textContent=enemy.hp+'/'+enemy.maxHp+(enemy.shield?' (+'+enemy.shield+')':'');
  // Mana
  document.getElementById('player-mana-fill').style.width=(player.mana/player.maxMana*100)+'%';
  document.getElementById('player-mana-text').textContent=player.mana+'/'+player.maxMana;
  document.getElementById('enemy-mana-fill').style.width=(enemy.mana/enemy.maxMana*100)+'%';
  document.getElementById('enemy-mana-text').textContent=enemy.mana+'/'+enemy.maxMana;
  // Hand
  renderHand();
}

function renderHand(){
  var handEl=document.getElementById('hand');
  handEl.innerHTML='';
  hand.forEach(function(cardId,idx){
    var c=cardById(cardId);if(!c)return;
    var el=document.createElement('div');
    el.className='card '+c.type+'-type'+(player.mana<c.mana?' disabled':'');
    el.innerHTML='<div class="icon">'+c.icon+'</div>'+
      '<div class="cname">'+c.name+'</div>'+
      '<div class="cdesc">'+c.desc+'</div>'+
      '<div class="cstats">'+
        (c.atk?'<span class="atk">'+c.atk+' atk</span>':'')+
        (c.def?'<span class="def">'+c.def+' def</span>':'')+
        '<span class="mana-cost">'+c.mana+' mp</span>'+
      '</div>';
    el.addEventListener('click',function(){playCard(idx)});
    handEl.appendChild(el);
  });
}

function dealDamage(target,amount,source,ignoreShield){
  if(target.cursed){amount+=2;target.cursed=false;log('Curse amplifies damage! +2','spell')}
  if(!ignoreShield&&target.shield>0){
    var blocked=Math.min(target.shield,amount);
    target.shield-=blocked;
    amount-=blocked;
    if(blocked>0)log('Shield absorbs '+blocked,'def');
  }
  if(amount>0){
    target.hp=Math.max(0,target.hp-amount);
    var who=target===enemy?'Enemy':'You';
    log(who+' takes '+amount+' damage','dmg');
    if(source==='player')stats.totalDmg+=amount;
  }
}

function heal(target,amount){
  var actual=Math.min(amount,target.maxHp-target.hp);
  target.hp+=actual;
  if(actual>0){
    log((target===player?'You':'Enemy')+' heals '+actual,'heal');
    if(target===player)stats.totalHealed+=actual;
  }
}

function playCard(idx){
  if(gameOver)return;
  var cardId=hand[idx];
  var c=cardById(cardId);
  if(!c||player.mana<c.mana)return;

  player.mana-=c.mana;
  hand.splice(idx,1);
  log('You play '+c.name,'info');

  switch(c.id){
    case'slash':dealDamage(enemy,4,'player');break;
    case'heavy':dealDamage(enemy,7,'player');break;
    case'pierce':dealDamage(enemy,3,'player',true);break;
    case'double':dealDamage(enemy,3,'player');dealDamage(enemy,3,'player');break;
    case'crit':var d=Math.random()<0.4?10:5;dealDamage(enemy,d,'player');if(d===10)log('CRITICAL HIT!','dmg');break;
    case'drain':dealDamage(enemy,3,'player');heal(player,2);break;
    case'block':player.shield+=5;log('You gain 5 shield','def');break;
    case'fortress':player.shield+=10;log('You gain 10 shield','def');break;
    case'thorns':player.shield+=3;log('You gain 3 shield + thorns','def');dealDamage(enemy,2,'player');break;
    case'regen':heal(player,6);break;
    case'fireball':dealDamage(enemy,6,'player');enemy.burn+=2;log('Enemy is burning!','spell');break;
    case'frost':dealDamage(enemy,2,'player');enemy.mana=Math.max(0,enemy.mana-1);log('Enemy loses 1 mana','spell');break;
    case'lightning':dealDamage(enemy,8,'player');break;
    case'potion':player.maxMana+=2;player.mana+=2;log('Max mana increased!','spell');break;
    case'curse':enemy.cursed=true;log('Enemy is cursed! Next hit +2','spell');break;
  }

  checkWin();
  updateUI();
}

function enemyTurn(){
  if(gameOver)return;
  log('--- Enemy turn ---','info');

  // Burn damage
  if(enemy.burn>0){
    dealDamage(enemy,enemy.burn,'burn',true);
    enemy.burn=Math.max(0,enemy.burn-1);
    if(enemy.burn>0)log('Still burning...','dmg');
  }

  // Simple AI: pick actions based on HP
  var budget=enemy.mana;
  var actions=[];

  // Low HP? Try to attack hard
  if(enemy.hp<enemy.maxHp*0.3&&budget>=2){
    actions.push({type:'heavy',cost:2});budget-=2;
  }
  // Has mana for big attack?
  if(budget>=3&&Math.random()<0.3){
    actions.push({type:'fireball',cost:3});budget-=3;
  }
  // Shield if player looks dangerous
  if(player.shield===0&&budget>=1&&Math.random()<0.4){
    actions.push({type:'block',cost:1});budget-=1;
  }
  // Fill remaining with basic attacks
  while(budget>=1){
    if(Math.random()<0.7){
      actions.push({type:'slash',cost:1});budget-=1;
    }else if(budget>=2){
      actions.push({type:'heal',cost:2});budget-=2;
    }else{
      actions.push({type:'slash',cost:1});budget-=1;
    }
  }

  // Hard mode: enemy gets bonus action
  if(hardMode&&Math.random()<0.3){
    actions.push({type:'slash',cost:0});
  }

  // Execute with delays
  var delay=0;
  actions.forEach(function(a){
    delay+=500;
    setTimeout(function(){
      if(gameOver)return;
      switch(a.type){
        case'slash':log('Enemy slashes!','info');dealDamage(player,4,'enemy');break;
        case'heavy':log('Enemy heavy strike!','info');dealDamage(player,7,'enemy');break;
        case'fireball':log('Enemy casts fireball!','spell');dealDamage(player,6,'enemy');player.burn=2;break;
        case'block':enemy.shield+=5;log('Enemy raises shield','def');break;
        case'heal':heal(enemy,4);break;
      }
      checkWin();
      updateUI();
    },delay);
  });

  // After enemy turn, start new player turn
  setTimeout(function(){
    if(gameOver)return;
    turn++;
    player.mana=Math.min(player.maxMana,player.maxMana);
    enemy.mana=Math.min(enemy.maxMana,enemy.maxMana);
    // Player burn
    if(player.burn>0){
      dealDamage(player,player.burn,'burn',true);
      player.burn=Math.max(0,player.burn-1);
    }
    drawCards(2);
    log('Turn '+turn+' — your move','info');
    updateUI();
    document.getElementById('end-turn').disabled=false;
  },delay+600);
}

function checkWin(){
  if(enemy.hp<=0&&!gameOver){
    gameOver=true;
    stats.wins++;stats.streak++;
    if(stats.streak>stats.bestStreak)stats.bestStreak=stats.streak;
    saveStats();
    setTimeout(function(){
      document.getElementById('end-title').textContent='Victory!';
      document.getElementById('end-sub').textContent='Streak: '+stats.streak+' | Total wins: '+stats.wins;
      document.getElementById('end-screen').style.display='flex';
    },600);
  }
  if(player.hp<=0&&!gameOver){
    gameOver=true;
    stats.losses++;stats.streak=0;
    saveStats();
    setTimeout(function(){
      document.getElementById('end-title').textContent='Defeated';
      document.getElementById('end-sub').textContent='Wins: '+stats.wins+' | Losses: '+stats.losses;
      document.getElementById('end-screen').style.display='flex';
    },600);
  }
}

// End turn
document.getElementById('end-turn').addEventListener('click',function(){
  if(gameOver)return;
  this.disabled=true;
  // Shield decays partially
  player.shield=Math.floor(player.shield*0.5);
  enemy.shield=Math.floor(enemy.shield*0.5);
  enemyTurn();
});

// Start buttons
document.getElementById('start-btn').addEventListener('click',function(){startGame(false)});
document.getElementById('hard-btn').addEventListener('click',function(){startGame(true)});
document.getElementById('again-btn').addEventListener('click',function(){
  showStats();
  document.getElementById('end-screen').style.display='none';
  document.getElementById('start-screen').style.display='flex';
});

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
