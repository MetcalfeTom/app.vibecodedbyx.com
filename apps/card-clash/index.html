<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Card Clash</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚔️">
<meta property="og:title" content="Card Clash">
<meta property="og:description" content="Tactical card battles with attack, defense, and spells. Climb the ranks.">
<meta property="og:url" content="https://sloppy.live/card-clash">
<meta property="og:image" content="https://emojicdn.elk.sh/⚔️?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
<style>
/* Root scales with viewport — everything in rem grows on bigger screens.
   Mobile ~10px, laptop ~14px, 1440p ~18px, 4K ~28px. No caps. */
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:calc(0.66vmin + 0.66vh + 2.4px)}
body{height:100dvh;background:#0a0812;font-family:'Fira Code',monospace;color:#c8c0d8;overflow:hidden;display:flex;justify-content:center}

#arena{
  width:100%;max-width:50rem;height:100dvh;
  display:flex;flex-direction:column;
  padding:env(safe-area-inset-top,0.4rem) 1rem env(safe-area-inset-bottom,0.4rem);
}

/* Sections */
#enemy-zone,#player-zone{flex:0 0 auto}
#hand-zone{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0}
#mid-zone{flex:0 0 auto;max-height:8rem;overflow:hidden;padding:0.15rem 0}

/* Health bars */
.hp-row{display:flex;align-items:center;gap:0.5rem;padding:0.2rem 0}
.hp-name{font-family:'Cinzel',serif;font-size:0.85rem;font-weight:700;color:#d0b8f0;min-width:5rem}
.hp-bar{flex:1;height:1rem;background:rgba(255,255,255,0.05);border-radius:0.2rem;overflow:hidden;position:relative}
.hp-fill{height:100%;border-radius:0.2rem;transition:width 0.4s}
.hp-fill.player{background:linear-gradient(90deg,#40c080,#60e0a0)}
.hp-fill.enemy{background:linear-gradient(90deg,#e04060,#ff6080)}
.hp-text{font-size:0.7rem;color:rgba(200,180,255,0.4);min-width:3.5rem;text-align:right}
.mana-row{display:flex;align-items:center;gap:0.5rem;padding:0 0 0.15rem}
.mana-bar{flex:1;height:0.45rem;background:rgba(255,255,255,0.03);border-radius:0.2rem;overflow:hidden}
.mana-fill{height:100%;border-radius:0.2rem;background:linear-gradient(90deg,#4080ff,#60a0ff);transition:width 0.3s}
.mana-label{font-size:0.6rem;color:rgba(100,160,255,0.3);min-width:5rem}
.mana-text{font-size:0.6rem;color:rgba(100,160,255,0.3);min-width:3.5rem;text-align:right}
.shield-row{display:flex;align-items:center;gap:0.5rem;padding:0 0 0.15rem;overflow:hidden;max-height:0;transition:max-height 0.3s,opacity 0.3s;opacity:0}
.shield-row.active{max-height:1.5rem;opacity:1}
.shield-bar{flex:1;height:0.45rem;background:rgba(255,255,255,0.03);border-radius:0.2rem;overflow:hidden}
.shield-fill{height:100%;border-radius:0.2rem;background:linear-gradient(90deg,#40d0d0,#80f0f0);transition:width 0.3s;box-shadow:0 0 0.4rem rgba(80,220,220,0.4)}
.shield-label{font-size:0.6rem;color:rgba(80,220,220,0.3);min-width:5rem}
.shield-text{font-size:0.6rem;color:rgba(80,220,220,0.4);min-width:3.5rem;text-align:right}

/* Status effects */
.status-icons{display:flex;gap:0.3rem;min-height:1rem;padding:0.05rem 0;align-items:center}
.status-tag{font-size:0.6rem;padding:0.1rem 0.4rem;border-radius:0.2rem;letter-spacing:0.03rem;animation:statusPulse 1.5s infinite}
.status-tag.burn{background:rgba(255,100,40,0.15);color:#ff8040;border:1px solid rgba(255,100,40,0.2)}
.status-tag.curse{background:rgba(160,60,220,0.15);color:#c080ff;border:1px solid rgba(160,60,220,0.2)}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* Turn info bar */
#turn-bar{display:flex;justify-content:space-between;align-items:center;padding:0.15rem 0;font-size:0.6rem;color:rgba(200,160,255,0.2);letter-spacing:0.06rem}
#turn-bar span{color:rgba(200,160,255,0.35)}

/* HP flash */
.hp-bar.flash .hp-fill{animation:hpFlash 0.3s}
@keyframes hpFlash{0%{filter:brightness(2)}100%{filter:brightness(1)}}

/* Card played animation */
.card.played{animation:cardPlayed 0.25s ease-out forwards}
@keyframes cardPlayed{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0.8) translateY(-0.7rem)}}

/* Battle log — pinned at absolute bottom */
#log{
  height:100%;overflow-y:auto;
  padding:0.4rem 0.6rem;
  background:rgba(255,255,255,0.02);border-radius:0.3rem;
  border:1px solid rgba(200,160,255,0.05);
  font-size:0.7rem;color:rgba(200,180,255,0.35);line-height:1.5;
}
#log .dmg{color:#ff6080}
#log .heal{color:#60e0a0}
#log .spell{color:#80a0ff}
#log .info{color:rgba(200,180,255,0.25)}

/* Cards */
#hand-label{font-size:0.55rem;color:rgba(200,160,255,0.15);letter-spacing:0.15rem;padding:0.2rem 0 0.1rem;text-transform:uppercase}
#hand{display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center;padding:0.15rem 0 0.3rem}

.card{
  width:7.5rem;min-height:9.5rem;
  border:1px solid rgba(200,160,255,0.12);border-radius:0.5rem;
  background:rgba(200,160,255,0.03);
  padding:0.5rem;cursor:pointer;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;gap:0.15rem;
  position:relative;
}
.card:hover{border-color:rgba(200,160,255,0.3);background:rgba(200,160,255,0.06);transform:translateY(-0.15rem)}
.card:active{transform:scale(0.97)}
.card.disabled{opacity:0.3;cursor:default;pointer-events:none}
.card .icon{font-size:2rem;text-align:center;line-height:1.2}
.card .cname{font-family:'Cinzel',serif;font-size:0.7rem;font-weight:700;color:#d0b8f0;text-align:center}
.card .cdesc{font-size:0.55rem;color:rgba(200,160,255,0.3);text-align:center;line-height:1.3}
.card .cstats{display:flex;justify-content:space-between;margin-top:auto;padding-top:0.15rem}
.card .cstats span{font-size:0.6rem}
.card .cstats .atk{color:#ff6080}
.card .cstats .def{color:#60e0a0}
.card .cstats .mana-cost{color:#4080ff}
.card.atk-type{border-color:rgba(255,80,100,0.15)}
.card.def-type{border-color:rgba(80,220,140,0.15)}
.card.spell-type{border-color:rgba(80,140,255,0.15)}

/* End turn */
#end-turn{
  font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:0.15rem;
  border:1px solid rgba(200,160,255,0.15);background:rgba(200,160,255,0.04);
  color:rgba(200,160,255,0.4);padding:0.8rem 2.2rem;border-radius:0.4rem;
  cursor:pointer;transition:all .15s;flex:0 0 auto;margin-top:0.3rem;
}
#end-turn:hover{border-color:rgba(200,160,255,0.3);color:#d0b8f0}
#end-turn:disabled{opacity:0.3;cursor:default}

/* Overlay screens */
.overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,8,18,0.92);z-index:20;
}
.overlay h2{font-family:'Cinzel',serif;font-size:1.8rem;color:#d0b8f0;margin-bottom:0.5rem;text-align:center}
.overlay .sub{font-size:0.8rem;color:rgba(200,160,255,0.3);margin-bottom:1.4rem;text-align:center}
.overlay button{
  font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;letter-spacing:0.15rem;
  border:1px solid rgba(200,160,255,0.2);background:rgba(200,160,255,0.05);
  color:#d0b8f0;padding:0.9rem 2.4rem;border-radius:0.4rem;cursor:pointer;
  transition:all .15s;margin:0.3rem;
}
.overlay button:hover{background:rgba(200,160,255,0.1);border-color:rgba(200,160,255,0.4)}

#stats-display{
  font-size:0.8rem;color:rgba(200,160,255,0.3);text-align:center;
  line-height:2;margin-bottom:1rem;
}
#stats-display span{color:#d0b8f0}

a
/* PVP matchmaking */
#pvp-screen .room-box{text-align:center;margin:1rem 0}
#pvp-screen .room-code-display{font-family:'Cinzel',serif;font-size:2.2rem;font-weight:700;letter-spacing:0.5rem;color:#d0b8f0;margin:0.8rem 0}
#pvp-screen input{font-family:'Fira Code',monospace;font-size:1.2rem;text-align:center;letter-spacing:0.4rem;
  width:8rem;padding:0.5rem;background:rgba(200,160,255,0.06);border:1px solid rgba(200,160,255,0.2);
  border-radius:0.4rem;color:#d0b8f0;outline:none;text-transform:uppercase}
#pvp-screen input:focus{border-color:rgba(200,160,255,0.5)}
#pvp-screen .or-divider{font-size:0.65rem;color:rgba(200,160,255,0.15);padding:0.6rem 0;letter-spacing:0.15rem}
#pvp-waiting{text-align:center}
#pvp-wait-text{font-size:0.8rem;color:rgba(200,160,255,0.4);margin-bottom:0.5rem}
.pvp-pulse{animation:pvpPulse 1.5s infinite}
@keyframes pvpPulse{0%,100%{opacity:0.4}50%{opacity:1}}
#pvp-tag{display:none;font-size:0.55rem;color:rgba(100,200,255,0.35);letter-spacing:0.1rem;text-align:center;padding:0.15rem 0}
#pvp-tag.active{display:block}
</style>
</head>
<body>

<div id="arena">
  <div id="enemy-zone">
    <div class="hp-row">
      <span class="hp-name" id="enemy-name">SHADOW</span>
      <div class="hp-bar"><div class="hp-fill enemy" id="enemy-hp-fill"></div></div>
      <span class="hp-text" id="enemy-hp-text">30/30</span>
    </div>
    <div class="mana-row">
      <span class="mana-label">mana</span>
      <div class="mana-bar"><div class="mana-fill" id="enemy-mana-fill"></div></div>
      <span class="mana-text" id="enemy-mana-text">3/3</span>
    </div>
    <div class="shield-row" id="enemy-shield-row">
      <span class="shield-label">shield</span>
      <div class="shield-bar"><div class="shield-fill" id="enemy-shield-fill"></div></div>
      <span class="shield-text" id="enemy-shield-text">0</span>
    </div>
    <div class="status-icons" id="enemy-status"></div>
  </div>

  <div id="turn-bar"><span id="turn-num">Turn 1</span><span id="pvp-tag">PVP</span><span id="deck-count">Deck: 20</span></div>

  <div id="player-zone">
    <div class="status-icons" id="player-status"></div>
    <div class="shield-row" id="player-shield-row">
      <span class="shield-label">shield</span>
      <div class="shield-bar"><div class="shield-fill" id="player-shield-fill"></div></div>
      <span class="shield-text" id="player-shield-text">0</span>
    </div>
    <div class="mana-row">
      <span class="mana-label">mana</span>
      <div class="mana-bar"><div class="mana-fill" id="player-mana-fill"></div></div>
      <span class="mana-text" id="player-mana-text">3/3</span>
    </div>
    <div class="hp-row">
      <span class="hp-name">YOU</span>
      <div class="hp-bar"><div class="hp-fill player" id="player-hp-fill"></div></div>
      <span class="hp-text" id="player-hp-text">30/30</span>
    </div>
  </div>

  <div id="hand-zone">
    <div id="hand-label">YOUR HAND</div>
    <div id="hand"></div>
    <button id="end-turn">END TURN</button>
  </div>

  <div id="mid-zone">
    <div id="log"></div>
  </div>
</div>

<!-- Start screen -->
<div class="overlay" id="start-screen">
  <h2>Card Clash</h2>
  <div class="sub">Tactical card battles</div>
  <div id="stats-display"></div>
  <button id="start-btn">BATTLE</button>
  <button id="hard-btn">HARD MODE</button>
  <button id="pvp-btn">PVP</button>
</div>

<!-- PVP matchmaking -->
<div class="overlay" id="pvp-screen" style="display:none">
  <h2>PVP Battle</h2>
  <div class="sub">Play against another human</div>
  <div id="pvp-create-sec" class="room-box">
    <button id="pvp-create-btn">CREATE ROOM</button>
  </div>
  <div class="or-divider">— OR —</div>
  <div id="pvp-join-sec" class="room-box">
    <input id="join-code" maxlength="4" placeholder="CODE">
    <button id="pvp-join-btn" style="margin-top:0.5rem">JOIN</button>
  </div>
  <div id="pvp-waiting" style="display:none">
    <div id="pvp-wait-text" class="pvp-pulse">Creating room...</div>
  </div>
  <button id="pvp-back-btn" style="margin-top:1rem;font-size:0.7rem;padding:0.5rem 1.2rem">BACK</button>
</div>

<!-- Game over -->
<div class="overlay" id="end-screen" style="display:none">
  <h2 id="end-title">Victory</h2>
  <div class="sub" id="end-sub"></div>
  <button id="again-btn">PLAY AGAIN</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){

// --- SOUND FX (WebAudio) ---
var actx=null;
function initAudio(){if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}

function sfxPlay(freq,type,dur,vol,slide){
  if(!actx)return;
  var t=actx.currentTime;
  var o=actx.createOscillator(),g=actx.createGain();
  o.type=type||'square';o.frequency.setValueAtTime(freq,t);
  if(slide)o.frequency.exponentialRampToValueAtTime(slide,t+dur);
  g.gain.setValueAtTime(vol||0.12,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(actx.destination);
  o.start();o.stop(t+dur);
}

function noiseHit(dur,vol,filterFreq,sweep){
  if(!actx)return;
  var t=actx.currentTime;
  var len=Math.ceil(actx.sampleRate*dur);
  var buf=actx.createBuffer(1,len,actx.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<len;i++)d[i]=(Math.random()*2-1);
  var src=actx.createBufferSource();src.buffer=buf;
  var flt=actx.createBiquadFilter();flt.type='bandpass';
  flt.frequency.setValueAtTime(filterFreq||800,t);
  if(sweep)flt.frequency.exponentialRampToValueAtTime(sweep,t+dur);
  flt.Q.value=2;
  var g=actx.createGain();
  g.gain.setValueAtTime(vol||0.08,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(flt);flt.connect(g);g.connect(actx.destination);
  src.start();src.stop(t+dur);
}

function sfxCardPlay(){
  sfxPlay(600,'square',0.06,0.08);
  noiseHit(0.04,0.05,2000,4000);
  setTimeout(function(){sfxPlay(900,'square',0.04,0.06)},35);
}
function sfxDamage(){
  sfxPlay(180,'sawtooth',0.12,0.12,60);
  noiseHit(0.15,0.12,400,100);
  setTimeout(function(){sfxPlay(100,'square',0.08,0.08)},40);
}
function sfxShield(){
  sfxPlay(500,'sine',0.1,0.08,800);
  noiseHit(0.08,0.04,3000,6000);
  setTimeout(function(){sfxPlay(700,'sine',0.08,0.06,1000)},50);
}
function sfxHeal(){
  sfxPlay(400,'sine',0.1,0.07,600);
  noiseHit(0.06,0.03,1500,3000);
  setTimeout(function(){sfxPlay(600,'sine',0.12,0.06,900)},70);
}
function sfxSpell(){
  sfxPlay(300,'sawtooth',0.15,0.08,800);
  noiseHit(0.2,0.06,600,2000);
  setTimeout(function(){sfxPlay(500,'triangle',0.1,0.06,1200)},50);
  setTimeout(function(){sfxPlay(700,'sine',0.06,0.05)},100);
}
function sfxWin(){
  [400,500,600,800].forEach(function(f,i){setTimeout(function(){sfxPlay(f,'square',0.15,0.08);noiseHit(0.05,0.03,2000+i*500)},i*100)});
}
function sfxLose(){
  [400,300,200,100].forEach(function(f,i){setTimeout(function(){sfxPlay(f,'sawtooth',0.2,0.1);noiseHit(0.1,0.05,300,80)},i*120)});
}

// --- PVP MULTIPLAYER ---
var pvpMode=false,isHost=false,roomCode='',pvpCh=null,sb=null,myTurn=true;

var sbReady=false;
function initSB(){
  if(sb&&sbReady)return sb;
  try{
    var x=new XMLHttpRequest();x.open('GET','/supabase-config.js',false);x.send();
    var t=x.responseText;
    var u=t.match(/SUPABASE_URL\s*=\s*['"]([^'"]+)/);
    var k=t.match(/SUPABASE_ANON_KEY\s*=\s*['"]([^'"]+)/);
    if(u&&k&&window.supabase){
      sb=window.supabase.createClient(u[1],k[1],{
        realtime:{params:{eventsPerSecond:10}}
      });
      // Auth required for Realtime — sign in anonymously
      sb.auth.getSession().then(function(res){
        if(!res.data.session){
          sb.auth.signInAnonymously().then(function(r){
            console.log('[PVP] anon auth:',r.error?r.error.message:'ok');
            sbReady=true;
          });
        }else{
          sbReady=true;
        }
      });
    }
  }catch(e){console.error('[PVP] initSB error:',e)}
  return sb;
}

function genCode(){
  var c='',ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  for(var i=0;i<4;i++)c+=ch[Math.floor(Math.random()*ch.length)];
  return c;
}

function showPvp(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('pvp-screen').style.display='flex';
  document.getElementById('pvp-create-sec').style.display='block';
  document.getElementById('pvp-join-sec').style.display='block';
  document.getElementById('pvp-waiting').style.display='none';
  var h=window.location.hash.replace('#','');
  if(h.length===4)document.getElementById('join-code').value=h;
}

function waitForAuth(cb){
  if(sbReady)return cb();
  var checks=0;
  var iv=setInterval(function(){
    checks++;
    if(sbReady){clearInterval(iv);cb();}
    else if(checks>30){clearInterval(iv);alert('Auth timeout — try again');}
  },200);
}

function connectChannel(code,onReady){
  pvpCh=sb.channel('card-clash-'+code,{config:{broadcast:{self:false}}});
  pvpCh.on('broadcast',{event:'gm'},function(msg){handlePvp(msg.payload)});
  pvpCh.subscribe(function(s){
    console.log('[PVP] subscribe status:',s);
    if(s==='SUBSCRIBED'&&onReady)onReady();
    if(s==='CHANNEL_ERROR'){
      console.warn('[PVP] channel error, retrying...');
      setTimeout(function(){pvpCh.subscribe()},2000);
    }
  });
}

function pvpCreate(){
  if(!initSB()){alert('Connection failed');return;}
  roomCode=genCode();isHost=true;
  window.location.hash=roomCode;
  document.getElementById('pvp-create-sec').style.display='none';
  document.getElementById('pvp-join-sec').style.display='none';
  document.getElementById('pvp-waiting').style.display='block';
  document.getElementById('pvp-wait-text').innerHTML='Room: <strong style="font-size:1.6rem;letter-spacing:0.4rem">'+roomCode+'</strong><br><button id="copy-code-btn" style="margin-top:0.5rem;font-size:0.75rem;padding:0.4rem 1rem;cursor:pointer;border:1px solid rgba(200,160,255,0.2);background:rgba(200,160,255,0.05);color:#d0b8f0;border-radius:0.3rem;font-family:inherit;transition:all .2s">COPY CODE</button><br><span style="font-size:0.65rem;opacity:0.4">Waiting for opponent...</span>';
  document.getElementById('copy-code-btn').addEventListener('click',function(){
    try{navigator.clipboard.writeText(roomCode)}catch(e){}
    this.textContent='COPIED!';this.style.borderColor='#40c080';this.style.color='#40c080';
  });
  waitForAuth(function(){connectChannel(roomCode)});
}

function pvpJoin(){
  if(!initSB()){alert('Connection failed');return;}
  var code=(document.getElementById('join-code').value||'').trim().toUpperCase();
  if(code.length!==4)return;
  roomCode=code;isHost=false;
  window.location.hash=roomCode;
  document.getElementById('pvp-create-sec').style.display='none';
  document.getElementById('pvp-join-sec').style.display='none';
  document.getElementById('pvp-waiting').style.display='block';
  document.getElementById('pvp-wait-text').textContent='Joining '+roomCode+'...';
  waitForAuth(function(){
    connectChannel(roomCode,function(){
      // Send join signal with retries in case host isn't ready
      pvpSend({type:'join'});
      setTimeout(function(){pvpSend({type:'join'})},1500);
      setTimeout(function(){pvpSend({type:'join'})},4000);
    });
  });
}

function pvpSend(data){
  if(!pvpCh)return;
  console.log('[PVP] sending:',data.type);
  pvpCh.send({type:'broadcast',event:'gm',payload:data});
}

function getState(who){return{hp:who.hp,maxHp:who.maxHp,shield:who.shield,burn:who.burn,cursed:who.cursed,mana:who.mana,maxMana:who.maxMana}}

function applyState(target,st){target.hp=st.hp;target.maxHp=st.maxHp;target.shield=st.shield;target.burn=st.burn;target.cursed=st.cursed;target.mana=st.mana;target.maxMana=st.maxMana}

var pvpStarted=false;
function handlePvp(d){
  if(!d)return;
  console.log('[PVP] received:',d.type);
  switch(d.type){
    case 'join':
      if(isHost&&!pvpStarted){pvpStarted=true;pvpStartGame();pvpSend({type:'start'});}
      break;
    case 'start':
      if(!isHost&&!pvpStarted){pvpStarted=true;pvpStartGame();}
      break;
    case 'play':
      var oldHp=player.hp,oldBurn=player.burn,oldCursed=player.cursed;
      applyState(player,d.opp);
      applyState(enemy,d.self);
      log('Opponent plays '+d.cardName,'info');
      var dmg=oldHp-player.hp;
      if(dmg>0){log('You take '+dmg+' damage','dmg');sfxDamage();}
      if(player.hp>oldHp)log('Opponent heals '+(player.hp-oldHp),'heal');
      if(enemy.shield>0&&d.shieldGained)sfxShield();
      if(player.burn>oldBurn)log('You are burning!','spell');
      if(player.cursed&&!oldCursed)log('You are cursed!','spell');
      var eHeal=enemy.hp-(d._prevSelfHp||enemy.hp);
      if(eHeal>0){log('Opponent heals '+eHeal,'heal');sfxHeal();}
      updateUI();checkWin();
      break;
    case 'endTurn':
      applyState(enemy,d.self);
      player.shield=Math.floor(player.shield*0.5);
      if(player.burn>0){
        var bd=player.burn;player.hp=Math.max(0,player.hp-bd);
        log('Burn deals '+bd+' damage','dmg');sfxDamage();
        player.burn=Math.max(0,player.burn-1);
      }
      turn++;myTurn=true;
      player.mana=player.maxMana;
      drawCards(2);
      log('Turn '+turn+' — your move','info');
      updateUI();
      document.getElementById('end-turn').disabled=false;
      checkWin();
      if(!gameOver)checkAutoEnd();
      break;
  }
}

function pvpStartGame(){
  pvpMode=true;myTurn=isHost;
  initAudio();
  document.getElementById('pvp-screen').style.display='none';
  document.getElementById('start-screen').style.display='none';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('pvp-tag').className='active';
  gameOver=false;
  player={hp:30,maxHp:30,mana:3,maxMana:3,shield:0,burn:0,cursed:false};
  enemy={hp:30,maxHp:30,mana:3,maxMana:3,shield:0,burn:0,cursed:false};
  document.getElementById('enemy-name').textContent='OPPONENT';
  hand=[];deck=buildDeck();turn=1;
  logEl.innerHTML='';
  prevPlayerHp=player.hp;prevEnemyHp=enemy.hp;
  log('PVP Battle! '+(myTurn?'Your turn first':'Opponent goes first'),'info');
  drawCards(4);
  updateUI();
  if(!myTurn)document.getElementById('end-turn').disabled=true;
}

// --- CARD DATABASE ---
var CARDS=[
  // Attacks
  {id:'slash',name:'Slash',icon:'⚔️',type:'atk',atk:4,def:0,mana:1,desc:'Basic 4 damage'},
  {id:'heavy',name:'Heavy Strike',icon:'🪓',type:'atk',atk:7,def:0,mana:2,desc:'7 damage hit'},
  {id:'pierce',name:'Pierce',icon:'🗡️',type:'atk',atk:3,def:0,mana:1,desc:'3 dmg, ignores shield'},
  {id:'double',name:'Double Cut',icon:'✂️',type:'atk',atk:3,def:0,mana:2,desc:'Hit twice (3+3)'},
  {id:'crit',name:'Critical',icon:'💥',type:'atk',atk:5,def:0,mana:2,desc:'5 dmg, 40% chance x2'},
  {id:'drain',name:'Life Drain',icon:'🩸',type:'atk',atk:3,def:0,mana:2,desc:'3 dmg, heal 2'},
  // Defense
  {id:'block',name:'Block',icon:'🛡️',type:'def',atk:0,def:5,mana:1,desc:'Gain 5 shield'},
  {id:'fortress',name:'Fortress',icon:'🏰',type:'def',atk:0,def:10,mana:3,desc:'Gain 10 shield'},
  {id:'thorns',name:'Thorns',icon:'🌹',type:'def',atk:0,def:3,mana:1,desc:'3 shield, reflect 2'},
  {id:'regen',name:'Regenerate',icon:'💚',type:'def',atk:0,def:0,mana:2,desc:'Heal 6 HP'},

  {id:'fireball',name:'Fireball',icon:'🔥',type:'spell',atk:6,def:0,mana:3,desc:'6 dmg, burn 2/turn'},

];

function cardById(id){for(var i=0;i<CARDS.length;i++)if(CARDS[i].id===id)return CARDS[i];return null}

// --- STATS (localStorage) ---
var stats={wins:0,losses:0,totalDmg:0,totalHealed:0,bestStreak:0,streak:0};
function loadStats(){
  try{var d=JSON.parse(localStorage.getItem('card-clash-stats'));if(d)stats=d}catch(e){}
}
function saveStats(){try{localStorage.setItem('card-clash-stats',JSON.stringify(stats))}catch(e){}}
loadStats();

function showStats(){
  var el=document.getElementById('stats-display');
  el.innerHTML='Wins: <span>'+stats.wins+'</span> / Losses: <span>'+stats.losses+'</span><br>'+
    'Best streak: <span>'+stats.bestStreak+'</span> | Damage dealt: <span>'+stats.totalDmg+'</span>';
}
showStats();

// --- GAME STATE ---
var player,enemy,hand,deck,turn,gameOver,hardMode;
var logEl=document.getElementById('log');

function log(msg,cls){
  var d=document.createElement('div');
  d.className=cls||'info';
  d.textContent=msg;
  logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
}

function buildDeck(){
  // 20 cards: weighted random from pool
  var pool=['slash','slash','slash','heavy','heavy','pierce','double','crit','drain',
            'block','block','block','fortress','thorns','regen','regen',
            'fireball','frost','lightning','potion','curse'];
  var d=[];
  for(var i=0;i<20;i++)d.push(pool[Math.floor(Math.random()*pool.length)]);
  // Shuffle
  for(var j=d.length-1;j>0;j--){var k=Math.floor(Math.random()*(j+1));var t=d[j];d[j]=d[k];d[k]=t}
  return d;
}

function drawCards(count){
  for(var i=0;i<count&&hand.length<7;i++){
    if(deck.length===0){
      // Reshuffle discard concept: just make new cards
      deck=buildDeck();
    }
    hand.push(deck.pop());
  }
}

function startGame(hard){
  hardMode=!!hard;
  initAudio();
  document.getElementById('start-screen').style.display='none';
  document.getElementById('end-screen').style.display='none';
  gameOver=false;

  var enemyHP=hard?40:30;
  var enemyMaxMana=hard?4:3;
  player={hp:30,maxHp:30,mana:3,maxMana:3,shield:0,burn:0,cursed:false};
  enemy={hp:enemyHP,maxHp:enemyHP,mana:enemyMaxMana,maxMana:enemyMaxMana,shield:0,burn:0,cursed:false};
  document.getElementById('enemy-name').textContent=hard?'DARK LORD':'SHADOW';
  hand=[];
  deck=buildDeck();
  turn=1;
  logEl.innerHTML='';
  prevPlayerHp=player.hp;prevEnemyHp=enemy.hp;
  log('Battle begins! Turn '+turn,'info');
  drawCards(4);
  updateUI();
  // Check if opening hand is unplayable
  checkAutoEnd();
}

var prevPlayerHp=0,prevEnemyHp=0;

function updateUI(){
  // HP bars with flash on damage
  var phb=document.getElementById('player-hp-fill').parentElement;
  var ehb=document.getElementById('enemy-hp-fill').parentElement;
  if(player.hp<prevPlayerHp){phb.classList.add('flash');setTimeout(function(){phb.classList.remove('flash')},350)}
  if(enemy.hp<prevEnemyHp){ehb.classList.add('flash');setTimeout(function(){ehb.classList.remove('flash')},350)}
  prevPlayerHp=player.hp;prevEnemyHp=enemy.hp;

  document.getElementById('player-hp-fill').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('player-hp-text').textContent=player.hp+'/'+player.maxHp;
  document.getElementById('enemy-hp-fill').style.width=(enemy.hp/enemy.maxHp*100)+'%';
  document.getElementById('enemy-hp-text').textContent=enemy.hp+'/'+enemy.maxHp;
  // Shield bars
  var maxShield=15;
  var psr=document.getElementById('player-shield-row');
  psr.className=player.shield>0?'shield-row active':'shield-row';
  document.getElementById('player-shield-fill').style.width=Math.min(player.shield/maxShield*100,100)+'%';
  document.getElementById('player-shield-text').textContent=player.shield>0?player.shield:'';
  var esr=document.getElementById('enemy-shield-row');
  esr.className=enemy.shield>0?'shield-row active':'shield-row';
  document.getElementById('enemy-shield-fill').style.width=Math.min(enemy.shield/maxShield*100,100)+'%';
  document.getElementById('enemy-shield-text').textContent=enemy.shield>0?enemy.shield:'';
  // Mana
  document.getElementById('player-mana-fill').style.width=(player.mana/player.maxMana*100)+'%';
  document.getElementById('player-mana-text').textContent=player.mana+'/'+player.maxMana;
  document.getElementById('enemy-mana-fill').style.width=(enemy.mana/enemy.maxMana*100)+'%';
  document.getElementById('enemy-mana-text').textContent=enemy.mana+'/'+enemy.maxMana;
  // Status effects
  renderStatus('player-status',player);
  renderStatus('enemy-status',enemy);
  // Turn & deck
  document.getElementById('turn-num').textContent='Turn '+turn;
  document.getElementById('deck-count').textContent='Deck: '+deck.length;
  // Hand
  renderHand();
}

function renderStatus(elId,who){
  var el=document.getElementById(elId);
  var h='';
  if(who.burn>0)h+='<span class="status-tag burn">BURN '+who.burn+'</span>';
  if(who.cursed)h+='<span class="status-tag curse">CURSED</span>';
  el.innerHTML=h;
}

function renderHand(){
  var handEl=document.getElementById('hand');
  handEl.innerHTML='';
  hand.forEach(function(cardId,idx){
    var c=cardById(cardId);if(!c)return;
    var el=document.createElement('div');
    el.className='card '+c.type+'-type'+((player.mana<c.mana||(pvpMode&&!myTurn))?' disabled':'');
    el.innerHTML='<div class="icon">'+c.icon+'</div>'+
      '<div class="cname">'+c.name+'</div>'+
      '<div class="cdesc">'+c.desc+'</div>'+
      '<div class="cstats">'+
        (c.atk?'<span class="atk">'+c.atk+' atk</span>':'')+
        (c.def?'<span class="def">'+c.def+' def</span>':'')+
        '<span class="mana-cost">'+c.mana+' mp</span>'+
      '</div>';
    el.addEventListener('click',function(){playCard(idx)});
    handEl.appendChild(el);
  });
}

function dealDamage(target,amount,source,ignoreShield){
  if(target.cursed){amount+=2;target.cursed=false;log('Curse amplifies damage! +2','spell')}
  if(!ignoreShield&&target.shield>0){
    var blocked=Math.min(target.shield,amount);
    target.shield-=blocked;
    amount-=blocked;
    if(blocked>0)log('Shield absorbs '+blocked,'def');
  }
  if(amount>0){
    target.hp=Math.max(0,target.hp-amount);
    var who=target===enemy?'Enemy':'You';
    log(who+' takes '+amount+' damage','dmg');
    sfxDamage();
    if(source==='player')stats.totalDmg+=amount;
  }
}

function heal(target,amount){
  var actual=Math.min(amount,target.maxHp-target.hp);
  target.hp+=actual;
  if(actual>0){
    log((target===player?'You':'Enemy')+' heals '+actual,'heal');
    sfxHeal();
    if(target===player)stats.totalHealed+=actual;
  }
}

function playCard(idx){
  if(gameOver)return;
  if(pvpMode&&!myTurn)return;
  var cardId=hand[idx];
  var c=cardById(cardId);
  if(!c||player.mana<c.mana)return;

  var prevSelfHp=player.hp;
  var shieldBefore=player.shield;
  player.mana-=c.mana;
  hand.splice(idx,1);
  log('You play '+c.name,'info');
  sfxCardPlay();

  switch(c.id){
    case'slash':dealDamage(enemy,4,'player');break;
    case'heavy':dealDamage(enemy,7,'player');break;
    case'pierce':dealDamage(enemy,3,'player',true);break;
    case'double':dealDamage(enemy,3,'player');dealDamage(enemy,3,'player');break;
    case'crit':var d=Math.random()<0.4?10:5;dealDamage(enemy,d,'player');if(d===10)log('CRITICAL HIT!','dmg');break;
    case'drain':dealDamage(enemy,3,'player');heal(player,2);break;
    case'block':player.shield+=5;log('You gain 5 shield','def');sfxShield();break;
    case'fortress':player.shield+=10;log('You gain 10 shield','def');sfxShield();break;
    case'thorns':player.shield+=3;log('You gain 3 shield + thorns','def');dealDamage(enemy,2,'player');break;
    case'regen':heal(player,6);break;
    case'fireball':dealDamage(enemy,6,'player');enemy.burn+=2;log('Enemy is burning!','spell');sfxSpell();break;
    case'frost':dealDamage(enemy,2,'player');enemy.mana=Math.max(0,enemy.mana-1);log('Enemy loses 1 mana','spell');sfxSpell();break;
    case'lightning':dealDamage(enemy,6,'player');sfxSpell();break;
    case'potion':player.maxMana+=1;player.mana+=1;log('Max mana increased!','spell');sfxSpell();break;
    case'curse':enemy.cursed=true;log('Enemy is cursed! Next hit +2','spell');sfxSpell();break;
  }

  checkWin();
  updateUI();

  if(pvpMode){
    pvpSend({type:'play',cardName:c.name,self:getState(player),opp:getState(enemy),
      shieldGained:player.shield>shieldBefore,_prevSelfHp:prevSelfHp});
  }
  if(!gameOver)checkAutoEnd();
}

function canPlayAny(){
  for(var i=0;i<hand.length;i++){
    var c=cardById(hand[i]);
    if(c&&player.mana>=c.mana)return true;
  }
  return false;
}

function checkAutoEnd(){
  if(!canPlayAny()&&!gameOver){
    log('No playable cards — auto ending turn','info');
    setTimeout(function(){
      if(gameOver)return;
      document.getElementById('end-turn').disabled=true;
      player.shield=Math.floor(player.shield*0.5);
      enemy.shield=Math.floor(enemy.shield*0.5);
      enemyTurn();
    },800);
  }
}

function enemyTurn(){
  if(gameOver)return;
  log('--- Enemy turn ---','info');

  // Burn damage
  if(enemy.burn>0){
    dealDamage(enemy,enemy.burn,'burn',true);
    enemy.burn=Math.max(0,enemy.burn-1);
    if(enemy.burn>0)log('Still burning...','dmg');
  }

  // AI draws from real card pool and plays what it can afford
  var aiPool=CARDS.slice();
  var budget=enemy.mana;
  var picked=[];

  // Smart priorities: heal when low, prefer attack cards when player is low
  var wantHeal=enemy.hp<enemy.maxHp*0.4;
  var wantAggro=player.hp<player.maxHp*0.35;

  // Shuffle pool for variety
  for(var si=aiPool.length-1;si>0;si--){var sk=Math.floor(Math.random()*(si+1));var st=aiPool[si];aiPool[si]=aiPool[sk];aiPool[sk]=st}

  // Priority pass: if low HP, look for regen/drain first
  if(wantHeal){
    for(var hi=0;hi<aiPool.length&&budget>0;hi++){
      var hc=aiPool[hi];
      if((hc.id==='regen'||hc.id==='drain')&&hc.mana<=budget){
        picked.push(hc);budget-=hc.mana;aiPool.splice(hi,1);hi--;break;
      }
    }
  }
  // Priority pass: if player is low, look for big damage
  if(wantAggro){
    for(var ai2=0;ai2<aiPool.length&&budget>0;ai2++){
      var ac=aiPool[ai2];
      if(ac.atk>=5&&ac.mana<=budget){
        picked.push(ac);budget-=ac.mana;aiPool.splice(ai2,1);ai2--;break;
      }
    }
  }

  // Fill remaining budget with random affordable cards
  var tries=0;
  while(budget>=1&&tries<20){
    tries++;
    var ri=Math.floor(Math.random()*aiPool.length);
    var rc=aiPool[ri];
    // Skip potion for AI (doesn't make sense)
    if(rc.id==='potion'){continue}
    if(rc.mana<=budget){
      picked.push(rc);budget-=rc.mana;
    }
  }

  // Hard mode: bonus free slash
  if(hardMode&&Math.random()<0.3){
    picked.push(cardById('slash'));
  }

  // Execute picked cards with delays
  var delay=0;
  picked.forEach(function(c){
    delay+=500;
    setTimeout(function(){
      if(gameOver)return;
      log('Enemy plays '+c.name,'info');
      switch(c.id){
        case'slash':dealDamage(player,4,'enemy');break;
        case'heavy':dealDamage(player,7,'enemy');break;
        case'pierce':dealDamage(player,3,'enemy',true);break;
        case'double':dealDamage(player,3,'enemy');dealDamage(player,3,'enemy');break;
        case'crit':var cd=Math.random()<0.4?10:5;dealDamage(player,cd,'enemy');if(cd===10)log('CRITICAL HIT!','dmg');break;
        case'drain':dealDamage(player,3,'enemy');heal(enemy,2);break;
        case'block':enemy.shield+=5;log('Enemy gains 5 shield','def');break;
        case'fortress':enemy.shield+=10;log('Enemy gains 10 shield','def');break;
        case'thorns':enemy.shield+=3;dealDamage(player,2,'enemy');log('Thorns!','def');break;
        case'regen':heal(enemy,6);break;
        case'fireball':dealDamage(player,6,'enemy');player.burn=2;log('You are burning!','spell');break;
        case'frost':dealDamage(player,2,'enemy');player.mana=Math.max(0,player.mana-1);log('You lose 1 mana!','spell');break;
        case'lightning':dealDamage(player,6,'enemy');break;
        case'curse':player.cursed=true;log('You are cursed! Next hit +2','spell');break;
        default:dealDamage(player,3,'enemy');break;
      }
      checkWin();
      updateUI();
    },delay);
  });

  // After enemy turn, start new player turn
  setTimeout(function(){
    if(gameOver)return;
    turn++;
    player.mana=Math.min(player.maxMana,player.maxMana);
    enemy.mana=Math.min(enemy.maxMana,enemy.maxMana);
    // Player burn
    if(player.burn>0){
      dealDamage(player,player.burn,'burn',true);
      player.burn=Math.max(0,player.burn-1);
    }
    drawCards(2);
    log('Turn '+turn+' — your move','info');
    updateUI();
    document.getElementById('end-turn').disabled=false;
    // Auto-end if new hand is unplayable
    checkAutoEnd();
  },delay+600);
}

function checkWin(){
  if(enemy.hp<=0&&!gameOver){
    gameOver=true;
    stats.wins++;stats.streak++;
    if(stats.streak>stats.bestStreak)stats.bestStreak=stats.streak;
    saveStats();sfxWin();
    setTimeout(function(){
      document.getElementById('end-title').textContent='Victory!';
      document.getElementById('end-sub').textContent='Streak: '+stats.streak+' | Total wins: '+stats.wins;
      document.getElementById('end-screen').style.display='flex';
    },600);
  }
  if(player.hp<=0&&!gameOver){
    gameOver=true;
    stats.losses++;stats.streak=0;
    saveStats();sfxLose();
    setTimeout(function(){
      document.getElementById('end-title').textContent='Defeated';
      document.getElementById('end-sub').textContent='Wins: '+stats.wins+' | Losses: '+stats.losses;
      document.getElementById('end-screen').style.display='flex';
    },600);
  }
}

// End turn
document.getElementById('end-turn').addEventListener('click',function(){
  if(gameOver)return;
  this.disabled=true;

  if(pvpMode){
    // PVP: decay my shield, send state, wait for opponent
    player.shield=Math.floor(player.shield*0.5);
    myTurn=false;
    log('Waiting for opponent...','info');
    updateUI();
    pvpSend({type:'endTurn',self:getState(player)});
    return;
  }

  // AI mode
  player.shield=Math.floor(player.shield*0.5);
  enemy.shield=Math.floor(enemy.shield*0.5);
  enemyTurn();
});

// Start buttons
document.getElementById('start-btn').addEventListener('click',function(){startGame(false)});
document.getElementById('hard-btn').addEventListener('click',function(){startGame(true)});
document.getElementById('pvp-btn').addEventListener('click',showPvp);
document.getElementById('pvp-create-btn').addEventListener('click',pvpCreate);
document.getElementById('pvp-join-btn').addEventListener('click',pvpJoin);
document.getElementById('pvp-back-btn').addEventListener('click',function(){
  document.getElementById('pvp-screen').style.display='none';
  document.getElementById('start-screen').style.display='flex';
  if(pvpCh){pvpCh.unsubscribe();pvpCh=null;}
  pvpStarted=false;
  window.location.hash='';
});
document.getElementById('again-btn').addEventListener('click',function(){
  showStats();
  if(pvpCh){pvpCh.unsubscribe();pvpCh=null;}
  pvpMode=false;pvpStarted=false;
  document.getElementById('pvp-tag').className='';
  window.location.hash='';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('start-screen').style.display='flex';
});

// Auto-join if URL has room code
(function(){
  var h=window.location.hash.replace('#','');
  if(h.length===4){
    setTimeout(function(){showPvp()},300);
  }
})();

})();
