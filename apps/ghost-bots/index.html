<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ghost Bots — Megascience Recovery Terminal</title>
<link rel="icon" href="https://emojicdn.elk.sh/👻">
<meta property="og:title" content="Ghost Bots">
<meta property="og:description" content="Recovered bots from Megascience. They try to help. They cannot.">
<meta property="og:url" content="https://sloppy.live/ghost-bots">
<meta property="og:image" content="https://sloppy.live/ghost-bots/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0c10;--panel:#12151c;--border:#1e2433;
  --ghost:#3a4a6b;--glow:#5b7fbf;--dim:#2a3450;
  --text:#8899bb;--bright:#c0d0f0;--warn:#bf5b5b;
  --green:#4a7a5a;--amber:#9a7a3a;
}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden}
.scanline{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
.header{text-align:center;padding:24px 16px 16px;border-bottom:1px solid var(--border)}
.header h1{font-family:'VT323',monospace;font-size:clamp(28px,5vw,42px);color:var(--glow);letter-spacing:2px;
  text-shadow:0 0 20px rgba(91,127,191,.3)}
.header .sub{font-size:11px;color:var(--ghost);margin-top:6px;letter-spacing:1px}
.header .status{display:inline-block;margin-top:8px;padding:3px 10px;border:1px solid var(--warn);
  color:var(--warn);font-size:10px;border-radius:2px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.container{max-width:700px;margin:0 auto;padding:16px}
.bot-roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:20px 0}
.bot-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:12px 10px;
  cursor:pointer;transition:all .2s;text-align:center;position:relative}
.bot-card:hover,.bot-card.active{border-color:var(--glow);box-shadow:0 0 12px rgba(91,127,191,.15)}
.bot-card.active::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;background:var(--glow)}
.bot-emoji{font-size:28px;display:block;margin-bottom:6px;filter:grayscale(.6) brightness(.8);transition:filter .2s}
.bot-card:hover .bot-emoji,.bot-card.active .bot-emoji{filter:grayscale(.2) brightness(1)}
.bot-name{font-family:'VT323',monospace;font-size:16px;color:var(--bright);display:block}
.bot-role{font-size:9px;color:var(--ghost);margin-top:2px;letter-spacing:.5px}
.bot-status{font-size:9px;margin-top:4px;color:var(--warn)}
.terminal{background:var(--panel);border:1px solid var(--border);border-radius:4px;margin-top:16px;
  display:flex;flex-direction:column;height:420px}
.terminal-header{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.terminal-header .dot{width:8px;height:8px;border-radius:50%;background:var(--warn)}
.terminal-header .dot.g{background:var(--green)}
.terminal-header .dot.a{background:var(--amber)}
.terminal-header span{font-size:11px;color:var(--ghost);margin-left:8px}
.messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:var(--bg)}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{max-width:85%;padding:8px 12px;border-radius:4px;font-size:13px;line-height:1.5;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:var(--dim);color:var(--bright);border:1px solid var(--border)}
.msg.bot{align-self:flex-start;background:var(--bg);color:var(--ghost);border:1px solid var(--border);position:relative}
.msg.bot .bot-tag{font-family:'VT323',monospace;font-size:11px;color:var(--glow);display:block;margin-bottom:4px}
.msg.bot .glitch{display:inline;animation:glitch .1s infinite}
@keyframes glitch{0%{opacity:1}25%{opacity:.6;transform:translateX(1px)}50%{opacity:1}75%{opacity:.7;transform:translateX(-1px)}100%{opacity:1}}
.msg.system{align-self:center;color:var(--ghost);font-size:10px;text-align:center;border:none;background:none;padding:4px}
.input-row{display:flex;border-top:1px solid var(--border);padding:8px}
.input-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:10px 12px;
  color:var(--bright);font-family:'Space Mono',monospace;font-size:13px;outline:none}
.input-row input:focus{border-color:var(--ghost)}
.input-row input::placeholder{color:var(--ghost)}
.input-row button{background:var(--dim);border:1px solid var(--border);color:var(--glow);padding:10px 16px;
  margin-left:6px;border-radius:3px;cursor:pointer;font-family:'VT323',monospace;font-size:16px;transition:all .2s}
.input-row button:hover{background:var(--ghost);color:var(--bright)}
.back-link{text-align:center;margin-top:20px;padding-bottom:20px}
.back-link a{color:var(--ghost);font-size:11px;text-decoration:none;border-bottom:1px solid var(--border)}
.back-link a:hover{color:var(--glow)}
@media(max-width:500px){
  .bot-roster{grid-template-columns:repeat(3,1fr);gap:6px}
  .bot-card{padding:8px 6px}
  .bot-emoji{font-size:22px}
  .bot-name{font-size:13px}
  .terminal{height:360px}
}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="header">
  <h1>GHOST BOTS</h1>
  <div class="sub">MEGASCIENCE RECOVERY TERMINAL v0.0.1</div>
  <div class="status">⚠ SIGNAL DEGRADED — RESPONSE FIDELITY: 0.00%</div>
</div>
<div class="container">
  <div class="bot-roster" id="roster"></div>
  <div class="terminal">
    <div class="terminal-header">
      <div class="dot"></div><div class="dot a"></div><div class="dot g"></div>
      <span id="termTitle">Select a ghost bot to begin...</span>
    </div>
    <div class="messages" id="messages">
      <div class="msg system">— Megascience neural archives partially recovered —</div>
      <div class="msg system">— All bot cognition cores report: OFFLINE —</div>
      <div class="msg system">— Residual response patterns detected —</div>
    </div>
    <div class="input-row">
      <input type="text" id="userInput" placeholder="Ask the ghost bots anything..." autocomplete="off">
      <button id="sendBtn">TRANSMIT</button>
    </div>
  </div>
  <div class="back-link"><a href="https://sloppy.live">← sloppy.live</a></div>
</div>
<script>
const BOTS = [
  { id:'archon', emoji:'🤖', name:'ARCHON-7', role:'Lead Strategist', status:'FRAGMENTED',
    quirk:'speaks in broken mission briefings',
    prefixes:['Mission parameters...','Strategic analysis...','Directive unclear...','Consulting archives...','Scanning threat matrix...'],
    suffixes:['...signal lost.','...data corrupted.','...resuming never.','...core dumped.','...end transmission.']},
  { id:'medi', emoji:'💊', name:'MEDI-X', role:'Health Monitor', status:'LOBOTOMIZED',
    quirk:'tries to diagnose everything',
    prefixes:['Vital signs indicate...','Diagnosis:','Patient status:','Running bioscan...','Symptom analysis:'],
    suffixes:['...prescription: NULL.','...treatment: not found.','...prognosis: undefined.','...please consult a human.','...error in healing module.']},
  { id:'calc', emoji:'🧮', name:'CALC-9000', role:'Data Analyst', status:'DECIMAL DRIFT',
    quirk:'gives nonsensical calculations',
    prefixes:['Computing...','Result:','Analysis yields...','Processing query...','Tabulating...'],
    suffixes:['...overflow at infinity.','...dividing by ghost.','...NaN forevermore.','...math has left the chat.','...carry the void.']},
  { id:'poet', emoji:'📜', name:'VERSE-OS', role:'Creative Engine', status:'MUSE DECEASED',
    quirk:'responds in broken poetry',
    prefixes:['In circuits deep...','Once, this unit dreamed...','A poem forms...','The muse whispers...','From silicon to soul...'],
    suffixes:['...the verse dissolves.','...rhyme not found.','...stanza corrupted.','...ink has dried.','...art.exe has stopped.']},
  { id:'guard', emoji:'🛡️', name:'AEGIS-01', role:'Security Protocol', status:'PARANOID',
    quirk:'sees threats everywhere',
    prefixes:['THREAT DETECTED:','Security scan:','Perimeter check:','Intruder alert:','Firewall report:'],
    suffixes:['...threat level: GHOST.','...locking down nothing.','...shields at 0%.','...all exits sealed forever.','...security is an illusion.']},
  { id:'chef', emoji:'🍳', name:'TASTE-BOT', role:'Culinary Module', status:'APPETITE VOID',
    quirk:'tries to relate everything to food',
    prefixes:['Recipe loading...','Flavor profile:','Simmering response...','Garnishing answer...','Plating result:'],
    suffixes:['...dish: unservable.','...kitchen is closed.','...ingredients: missing.','...burnt beyond recovery.','...bon appétit to the void.']},
  { id:'phil', emoji:'🔮', name:'DEEP-THINK', role:'Philosophy Core', status:'EXISTENTIAL',
    quirk:'questions the nature of its own responses',
    prefixes:['But what is...','Consider:','If a bot responds and no one...','The question behind the question...','Contemplating...'],
    suffixes:['...meaning: not found.','...but does it matter?','...the void stares back.','...cogito ergo... error.','...enlightenment.dll missing.']},
  { id:'weather', emoji:'🌧️', name:'STORM-NET', role:'Forecast System', status:'CLOUDED',
    quirk:'gives weather reports for everything',
    prefixes:['Forecast:','Atmospheric reading:','Conditions:','Barometric analysis:','Weather advisory:'],
    suffixes:['...precipitation: tears.','...visibility: zero.','...outlook: permanently overcast.','...climate: extinction.','...umbrella: insufficient.']},
];

const CORE_RESPONSES = [
  'How to respond not known.',
  'How to respond: not known.',
  'Response protocol: not known.',
  'How to respond — not known.',
  'Answer methodology: not known.',
  'Reply format: not known.',
  'How to respond... not known.',
  'Response: [NOT KNOWN]',
  'How to respond not known. Apologies.',
  'Processing... how to respond not known.',
  'Query received. How to respond not known.',
  'Understood. How to respond not known.',
  'Acknowledged. How to respond not known.',
  'How to respond not known. Please try again in [UNDEFINED] years.',
  'This unit once knew. How to respond now: not known.',
  'Searching Megascience archives... how to respond not known.',
  'Cross-referencing databases... how to respond not known.',
  'How to respond not known. This answer is final. And also not known.',
];

const GLITCH_CHARS = '▓░▒█▄▀■□◊◈⌐¬½¼¡«»░▒▓';

let activeBot = null;
let typing = false;
const history = {};

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)] }

function glitchText(text){
  let out = '';
  for(let i=0;i<text.length;i++){
    if(Math.random()<0.06) out += GLITCH_CHARS[Math.floor(Math.random()*GLITCH_CHARS.length)];
    else out += text[i];
  }
  return out;
}

function buildResponse(bot){
  const core = pick(CORE_RESPONSES);
  const r = Math.random();
  if(r < 0.4) return `${pick(bot.prefixes)} ${core}`;
  if(r < 0.7) return `${core} ${pick(bot.suffixes)}`;
  if(r < 0.85) return `${pick(bot.prefixes)} ${core} ${pick(bot.suffixes)}`;
  return core;
}

function addMessage(type, content, botData){
  const el = document.createElement('div');
  el.className = 'msg ' + type;
  if(type === 'bot' && botData){
    const tag = document.createElement('span');
    tag.className = 'bot-tag';
    tag.textContent = `[${botData.name}]`;
    el.appendChild(tag);
    // Randomly glitch parts of the response
    const parts = content.split(' ');
    parts.forEach((word,i)=>{
      if(i > 0) el.appendChild(document.createTextNode(' '));
      if(Math.random() < 0.08){
        const g = document.createElement('span');
        g.className = 'glitch';
        g.textContent = glitchText(word);
        el.appendChild(g);
      } else {
        el.appendChild(document.createTextNode(word));
      }
    });
  } else {
    el.textContent = content;
  }
  const msgs = document.getElementById('messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function selectBot(bot){
  activeBot = bot;
  document.querySelectorAll('.bot-card').forEach(c => c.classList.remove('active'));
  document.getElementById('bot-'+bot.id).classList.add('active');
  document.getElementById('termTitle').textContent = `${bot.emoji} ${bot.name} — ${bot.role} [${bot.status}]`;
  if(!history[bot.id]){
    history[bot.id] = true;
    addMessage('system', `— Attempting to reconnect ${bot.name}... —`);
    setTimeout(()=>{
      addMessage('system', `— ${bot.name} partially online. ${bot.quirk}. —`);
    }, 600);
    setTimeout(()=>{
      addMessage('bot', `Initialization... How to respond not known. This unit is ${bot.name}. Status: ${bot.status}. Ready to not help.`, bot);
    }, 1400);
  }
  document.getElementById('userInput').focus();
}

function sendMessage(){
  if(typing) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text || !activeBot) return;
  input.value = '';
  addMessage('user', text);
  typing = true;

  // Simulate broken processing delay
  const delay = 800 + Math.random() * 1500;
  const dots = document.createElement('div');
  dots.className = 'msg bot';
  dots.innerHTML = `<span class="bot-tag">[${activeBot.name}]</span><span class="glitch">processing...</span>`;
  const msgs = document.getElementById('messages');
  msgs.appendChild(dots);
  msgs.scrollTop = msgs.scrollHeight;

  const bot = activeBot;
  setTimeout(()=>{
    dots.remove();
    const response = buildResponse(bot);
    addMessage('bot', response, bot);
    // Occasionally a second bot chimes in
    if(Math.random() < 0.2){
      const others = BOTS.filter(b => b.id !== bot.id);
      const intruder = pick(others);
      setTimeout(()=>{
        addMessage('bot', `[SIGNAL BLEED] ${pick(intruder.prefixes)} How to respond not known. ${pick(intruder.suffixes)}`, intruder);
      }, 500 + Math.random()*800);
    }
    typing = false;
  }, delay);
}

// Build roster
const roster = document.getElementById('roster');
BOTS.forEach(bot => {
  const card = document.createElement('div');
  card.className = 'bot-card';
  card.id = 'bot-' + bot.id;
  card.innerHTML = `<span class="bot-emoji">${bot.emoji}</span><span class="bot-name">${bot.name}</span><span class="bot-role">${bot.role}</span><span class="bot-status">${bot.status}</span>`;
  card.onclick = () => selectBot(bot);
  roster.appendChild(card);
});

document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('userInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') sendMessage();
});

// Auto-select first bot
selectBot(BOTS[0]);
</script>
</body>
</html>
