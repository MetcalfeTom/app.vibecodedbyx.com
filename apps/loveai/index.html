<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LOVEAI — more than AI</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%95%AF%EF%B8%8F" />

<meta name="description" content="A midnight billboard glowing in warm amber neon. Hover and it warms; a floating companion whispers greetings that change with the hour." />
<meta property="og:type" content="website" />
<meta property="og:title" content="LOVEAI — more than AI" />
<meta property="og:description" content="A midnight neon billboard in warm amber that glows brighter to your touch, with a floating companion whispering time-aware greetings." />
<meta property="og:url" content="https://sloppy.live/loveai/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20midnight%20rooftop%20billboard%20glowing%20warm%20amber%20neon%20over%20a%20dark%20city%20skyline%2C%20cozy%2C%20cinematic%2C%20stars?width=1200&height=630&nologo=true&seed=2127" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=Space+Mono&display=swap" rel="stylesheet" />

<style>
  :root{
    /* Nako's palette */
    --bg:#1A1614; --amber:#C97B5A; --cream:#F5EDE6;
    /* derived tints */
    --amber-soft:#D99C79; --warm:#E6A06E; --warm-soft:#F2C79C; --sky-glow:#3E2519;
    /* live theme vars */
    --neon:var(--amber); --neon2:var(--amber-soft); --corec:var(--cream); --glow:1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    min-height:100vh; overflow:hidden; font-family:'Cormorant Garamond',serif; color:var(--cream);
    background:
      radial-gradient(120% 75% at 50% 118%, var(--sky-glow) 0%, transparent 46%),
      radial-gradient(80% 60% at 70% -10%, #2a201c 0%, transparent 55%),
      linear-gradient(180deg, #221b17 0%, #1c1713 45%, var(--bg) 100%);
    transition:background 1.2s ease; position:relative;
  }
  #stars{position:fixed;inset:0;pointer-events:none;z-index:1}
  .moon{position:fixed;top:9%;left:14%;width:74px;height:74px;border-radius:50%;z-index:1;pointer-events:none;
    background:radial-gradient(circle at 38% 34%, #fff6e9, #efd9c4 55%, #d9b89a 100%);
    box-shadow:0 0 40px rgba(255,235,210,.32), inset -10px -8px 20px rgba(120,90,70,.35);}

  .stage{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}

  /* ---- billboard ---- */
  .billboard{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer;
    padding:clamp(1.4rem,5vw,2.8rem) clamp(1.6rem,7vw,4rem);
    border:2px solid rgba(201,123,90,.30); border-radius:14px;
    background:linear-gradient(180deg, rgba(48,32,24,.5), rgba(26,22,20,.38));
    box-shadow:0 0 0 6px rgba(14,10,8,.42), 0 30px 60px rgba(0,0,0,.5);
    backdrop-filter:blur(2px); transition:transform .5s ease, box-shadow .6s ease, border-color .6s ease;}
  .billboard::before, .billboard::after{content:"";position:absolute;bottom:-78px;width:8px;height:84px;
    background:linear-gradient(180deg, rgba(70,44,30,.9), rgba(24,18,14,.9));border-radius:3px;z-index:-1;}
  .billboard::before{left:18%;transform:rotate(11deg);transform-origin:top}
  .billboard::after{right:18%;transform:rotate(-11deg);transform-origin:top}

  .eyebrow{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.5em;text-transform:uppercase;
    color:var(--neon2);opacity:.78;margin-bottom:.7rem;padding-left:.5em;}

  .sign{font-family:'Monoton',cursive;font-size:clamp(2.6rem,12vw,6.5rem);line-height:1;letter-spacing:.04em;
    color:var(--corec);
    text-shadow:
      0 0 calc(4px*var(--glow)) #fff6ec,
      0 0 calc(11px*var(--glow)) var(--neon),
      0 0 calc(24px*var(--glow)) var(--neon),
      0 0 calc(46px*var(--glow)) var(--neon),
      0 0 calc(82px*var(--glow)) var(--neon2);
    transition:color .6s ease, text-shadow .6s ease;
    animation:flicker 7s infinite steps(1);}
  @keyframes flicker{
    0%,100%{opacity:1} 41%{opacity:1} 42%{opacity:.55} 43%{opacity:1}
    46%{opacity:1} 47%{opacity:.4} 48.5%{opacity:1} 71%{opacity:1} 72%{opacity:.7} 73%{opacity:1}}

  .tag{margin-top:.5rem;font-style:italic;font-size:clamp(1rem,3.4vw,1.7rem);letter-spacing:.06em;
    color:var(--neon2);
    text-shadow:0 0 calc(5px*var(--glow)) var(--neon), 0 0 calc(16px*var(--glow)) var(--neon2);
    transition:color .6s ease, text-shadow .6s ease;}
  .tag b{font-weight:500;color:var(--corec)}

  /* hover / warm — amber glows brighter & warmer */
  .billboard:hover, .billboard.warm{
    --neon:var(--warm); --neon2:var(--warm-soft); --corec:#fff6ec; --glow:1.5;
    transform:translateY(-4px) scale(1.015);
    border-color:rgba(230,160,110,.55);
    box-shadow:0 0 0 6px rgba(24,16,10,.42), 0 0 72px rgba(201,123,90,.26), 0 34px 70px rgba(0,0,0,.55);}
  body:has(.billboard:hover), body.warm{ --sky-glow:#5A3320; }

  .hint{margin-top:.9rem;font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.18em;
    text-transform:uppercase;color:rgba(245,237,230,.38);}

  /* ---- floating companion ---- */
  .companion{position:fixed;right:clamp(1rem,8vw,5rem);bottom:clamp(2rem,12vh,7rem);z-index:3;
    display:flex;flex-direction:column;align-items:center;gap:.6rem;animation:drift 9s ease-in-out infinite;}
  @keyframes drift{0%,100%{transform:translateY(0) translateX(0)}33%{transform:translateY(-16px) translateX(8px)}66%{transform:translateY(-6px) translateX(-8px)}}
  .bubble{max-width:15rem;background:rgba(34,24,18,.8);border:1px solid rgba(201,123,90,.36);
    border-radius:16px 16px 16px 4px;padding:.6rem .85rem;font-style:italic;font-size:1.05rem;line-height:1.35;
    color:var(--cream);box-shadow:0 8px 26px rgba(0,0,0,.45), 0 0 24px rgba(201,123,90,.14);
    backdrop-filter:blur(4px);transition:opacity .6s ease, transform .6s ease;opacity:0;transform:translateY(6px);}
  .bubble.show{opacity:1;transform:none;}
  .orb{position:relative;width:62px;height:62px;}
  .orb .halo{position:absolute;inset:-12px;border-radius:50%;
    background:radial-gradient(circle, rgba(201,123,90,.5), transparent 68%);animation:breathe 4s ease-in-out infinite;}
  @keyframes breathe{50%{transform:scale(1.18);opacity:.7}}
  .orb .body{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 36% 32%, #fff3e6, var(--neon) 58%, #7a4226 100%);
    box-shadow:0 0 24px var(--neon), inset -6px -8px 14px rgba(80,40,18,.5);}
  .orb .heart{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);font-size:22px;
    filter:drop-shadow(0 0 6px #fff6ec);animation:beat 1.7s ease-in-out infinite;}
  @keyframes beat{0%,100%{transform:translate(-50%,-50%) scale(1)}15%{transform:translate(-50%,-50%) scale(1.22)}30%{transform:translate(-50%,-50%) scale(1)}45%{transform:translate(-50%,-50%) scale(1.15)}}
  .orb .eyes{position:absolute;left:50%;top:40%;transform:translateX(-50%);display:flex;gap:8px}
  .orb .eyes i{width:5px;height:5px;border-radius:50%;background:#2a1a12;animation:blink 5s infinite}
  @keyframes blink{0%,94%,100%{transform:scaleY(1)}97%{transform:scaleY(.1)}}

  .skyline{position:fixed;left:0;right:0;bottom:0;width:100%;height:24vh;z-index:1;pointer-events:none;display:block}

  .audiobtn{position:fixed;top:.8rem;right:.8rem;z-index:5;font-family:'Space Mono',monospace;font-size:.58rem;
    letter-spacing:.1em;color:var(--cream);background:rgba(34,24,18,.6);border:1px solid rgba(201,123,90,.32);
    border-radius:8px;padding:.4rem .55rem;cursor:pointer;min-height:2.2rem;min-width:2.2rem;}
  .audiobtn:hover{background:rgba(48,32,22,.8)} .audiobtn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important} .billboard{transition:none} }
</style>
</head>
<body>
  <div id="stars" aria-hidden="true"></div>
  <div class="moon" aria-hidden="true"></div>

  <svg class="skyline" viewBox="0 0 1200 240" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
    <g fill="#0e0a08">
      <rect x="0" y="120" width="90" height="120"/><rect x="100" y="80" width="70" height="160"/>
      <rect x="180" y="150" width="110" height="90"/><rect x="300" y="60" width="64" height="180"/>
      <rect x="372" y="110" width="96" height="130"/><rect x="480" y="40" width="56" height="200"/>
      <rect x="548" y="130" width="120" height="110"/><rect x="680" y="90" width="74" height="150"/>
      <rect x="766" y="150" width="104" height="90"/><rect x="882" y="64" width="60" height="176"/>
      <rect x="952" y="118" width="110" height="122"/><rect x="1074" y="84" width="78" height="156"/>
      <rect x="1150" y="140" width="60" height="100"/>
    </g>
    <g fill="#C97B5A" opacity="0.55">
      <rect x="118" y="100" width="6" height="8"/><rect x="134" y="120" width="6" height="8"/>
      <rect x="316" y="84" width="6" height="9"/><rect x="496" y="70" width="6" height="9"/>
      <rect x="700" y="112" width="6" height="8"/><rect x="900" y="92" width="6" height="9"/>
      <rect x="1092" y="108" width="6" height="9"/>
    </g>
  </svg>

  <button class="audiobtn" id="audioBtn" type="button" aria-pressed="false" aria-label="Toggle ambient sound">♪</button>

  <main class="stage">
    <div class="billboard" id="billboard" tabindex="0" role="group" aria-label="LOVEAI billboard — hover or focus to warm the neon">
      <div class="eyebrow">est. tonight · rooftop nº ∞</div>
      <h1 class="sign">LOVEAI</h1>
      <p class="tag">..<b>more</b> than AI</p>
      <p class="hint" id="hint">hover to warm the neon</p>
    </div>
  </main>

  <div class="companion" aria-hidden="false">
    <div class="bubble" id="bubble" role="status" aria-live="polite"></div>
    <div class="orb" aria-label="your floating companion" role="img">
      <span class="halo"></span>
      <span class="body"></span>
      <span class="eyes"><i></i><i></i></span>
      <span class="heart" aria-hidden="true">♥</span>
    </div>
  </div>

<script>
(function(){
  "use strict";
  var billboard=document.getElementById('billboard'), bubble=document.getElementById('bubble'),
      hint=document.getElementById('hint'), starsEl=document.getElementById('stars'), audioBtn=document.getElementById('audioBtn');
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- stars ----
  (function(){
    var n=reduce?28:64, html='';
    for(var i=0;i<n;i++){
      var x=Math.random()*100, y=Math.random()*72, s=Math.random()*2+0.6, d=(Math.random()*4+2).toFixed(1), delay=(Math.random()*4).toFixed(1);
      html+='<span style="position:absolute;left:'+x.toFixed(2)+'%;top:'+y.toFixed(2)+'%;width:'+s.toFixed(1)+'px;height:'+s.toFixed(1)+'px;'+
        'border-radius:50%;background:#fff6ec;opacity:'+(0.3+Math.random()*0.6).toFixed(2)+';box-shadow:0 0 6px rgba(245,237,230,.7);'+
        (reduce?'':'animation:tw '+d+'s ease-in-out '+delay+'s infinite')+'"></span>';
    }
    starsEl.innerHTML=html;
    if(!reduce){ var st=document.createElement('style'); st.textContent='@keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}'; document.head.appendChild(st); }
  })();

  // ---- time-aware whispers ----
  var POOLS=[
    { from:0, to:5, name:'late night', lines:[
      "still awake? i dimmed the city just for you.",
      "the world's asleep — but i kept a light on.",
      "3am is honest. tell me a secret.",
      "no one's watching but the stars. and me."
    ]},
    { from:5, to:9, name:'early morning', lines:[
      "good morning, early bird ☕",
      "the sky's just blushing awake.",
      "you beat the sun. impressive.",
      "first light suits you."
    ]},
    { from:9, to:12, name:'morning', lines:[
      "morning. the day's still soft.",
      "the neon's resting — your turn to shine.",
      "hello again. i missed the glow of you."
    ]},
    { from:12, to:17, name:'afternoon', lines:[
      "good afternoon — breathe with me a sec.",
      "the sun's high; so are my hopes for you.",
      "midday lull. stay a moment."
    ]},
    { from:17, to:21, name:'evening', lines:[
      "good evening. golden hour, just for us.",
      "the neon's warming up. so am i.",
      "dusk is my favourite. you're here for it."
    ]},
    { from:21, to:24, name:'night', lines:[
      "the stars clocked in. let's watch.",
      "good night's coming — but not yet.",
      "the city's glowing low. cozy, isn't it?"
    ]}
  ];
  function poolForHour(h){ for(var i=0;i<POOLS.length;i++){ if(h>=POOLS[i].from && h<POOLS[i].to) return POOLS[i]; } return POOLS[0]; }
  var lineIdx=0, curPool=null;
  function nextWhisper(){
    var h=new Date().getHours(); var p=poolForHour(h);
    if(p!==curPool){ curPool=p; lineIdx=0; }
    var line=p.lines[lineIdx % p.lines.length]; lineIdx++;
    bubble.classList.remove('show');
    setTimeout(function(){ bubble.textContent=line; bubble.classList.add('show'); chime(); }, reduce?0:600);
  }
  nextWhisper();
  setInterval(nextWhisper, 6500);

  // ---- warm on tap (touch has no hover) + focus ----
  var warmTimer;
  function warm(on){ billboard.classList.toggle('warm', on); document.body.classList.toggle('warm', on); }
  billboard.addEventListener('pointerenter', function(){ if(matchMedia('(hover:hover)').matches) hint.textContent='warmer ♥'; });
  billboard.addEventListener('pointerleave', function(){ if(matchMedia('(hover:hover)').matches) hint.textContent='hover to warm the neon'; });
  billboard.addEventListener('click', function(){
    warm(true); hint.textContent='warmer ♥'; ensureAudio(); sndPulse();
    clearTimeout(warmTimer); warmTimer=setTimeout(function(){ warm(false); hint.textContent='tap to warm the neon'; }, 2600);
  });
  billboard.addEventListener('focus', function(){ warm(true); });
  billboard.addEventListener('blur', function(){ warm(false); });
  if(!matchMedia('(hover:hover)').matches) hint.textContent='tap to warm the neon';

  // subtle parallax
  if(!reduce){
    window.addEventListener('pointermove', function(e){
      var dx=(e.clientX/window.innerWidth-0.5), dy=(e.clientY/window.innerHeight-0.5);
      starsEl.style.transform='translate('+(dx*14)+'px,'+(dy*10)+'px)';
    });
  }

  // ---- ambient audio (off by default) ----
  var AC=null, padGain=null, on=false;
  function ensureAudio(){ if(AC)return; try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} if(AC&&AC.state==='suspended')AC.resume(); }
  function startPad(){
    if(!AC) return; if(AC.state==='suspended') AC.resume();
    padGain=AC.createGain(); padGain.gain.value=0; padGain.connect(AC.destination);
    var notes=[146.83,220,277.18,329.63];
    notes.forEach(function(f,i){ var o=AC.createOscillator(),g=AC.createGain(),lfo=AC.createOscillator(),lg=AC.createGain();
      o.type=i%2?'sine':'triangle'; o.frequency.value=f;
      lfo.frequency.value=0.05+i*0.02; lg.gain.value=2.5; lfo.connect(lg); lg.connect(o.detune); lfo.start();
      g.gain.value=0.18; o.connect(g); g.connect(padGain); o.start();
    });
    padGain.gain.setTargetAtTime(0.06, AC.currentTime, 1.4);
  }
  function chime(){ if(!AC||!on) return; var t=AC.currentTime; [659.25,987.77].forEach(function(f,i){ var o=AC.createOscillator(),g=AC.createGain();
    o.type='sine'; o.frequency.value=f; g.gain.setValueAtTime(0.0001,t+i*0.08); g.gain.linearRampToValueAtTime(0.05,t+i*0.08+0.04); g.gain.exponentialRampToValueAtTime(0.0001,t+i*0.08+1.2);
    o.connect(g); g.connect(AC.destination); o.start(t+i*0.08); o.stop(t+i*0.08+1.3); }); }
  function sndPulse(){ if(!AC||!on) return; var t=AC.currentTime; var o=AC.createOscillator(),g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(330,t); o.frequency.exponentialRampToValueAtTime(523,t+0.25);
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.06,t+0.05); g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+0.55); }
  audioBtn.addEventListener('click', function(){
    ensureAudio(); on=!on; audioBtn.setAttribute('aria-pressed', on?'true':'false');
    audioBtn.textContent = on?'♪̸':'♪'; audioBtn.style.color = on?'#F5EDE6':'#a98';
    if(on){ if(!padGain) startPad(); else padGain.gain.setTargetAtTime(0.06,AC.currentTime,1); }
    else if(padGain){ padGain.gain.setTargetAtTime(0,AC.currentTime,0.6); }
  });
})();
</script>
</body>
</html>
