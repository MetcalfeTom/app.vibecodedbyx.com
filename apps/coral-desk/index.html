<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coral Desk — a Recall-style desktop for your life admin</title>
<meta name="description" content="A coral desktop with Ouchline, Excuse Generator Pro and Room Scanner as apps in floating glass windows — plus a Recall timeline that remembers everything, locally, unlike some.">
<meta property="og:title" content="Coral Desk">
<meta property="og:description" content="Three life-admin apps on one coral desktop: glass windows, 24px tiles, and a Recall timeline that never phones home.">
<meta property="og:url" content="https://sloppy.live/coral-desk">
<meta property="og:image" content="https://image.pollinations.ai/prompt/soft%20coral%20pink%20desktop%20OS%20with%20frosted%20glass%20floating%20windows%2C%20rounded%20app%20tiles%2C%20clean%20modern%20UI%20design%2C%20warm%20minimal?width=1200&height=630&nologo=true&seed=127&model=flux">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/🪸">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --coral:#F77F7F; --coral-deep:#d95c5c; --coral-soft:#fca9a9; --coral-mist:#fde4e0;
  --ink:#3d2626; --dim:#8a6060; --glass:rgba(255,255,255,.55); --edge:rgba(255,255,255,.75);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html{ font-size:100%; }
body{
  height:100vh; overflow:hidden; color:var(--ink);
  font-family:'Instrument Sans', sans-serif;   /* Inter is banned in this house; this is its livelier twin */
  background:
    radial-gradient(50rem 34rem at 18% 10%, rgba(255,255,255,.5), transparent 60%),
    radial-gradient(44rem 30rem at 85% 88%, rgba(217,92,92,.35), transparent 65%),
    linear-gradient(150deg, var(--coral-mist), var(--coral) 55%, var(--coral-deep));
}
/* desktop tiles */
#desk{ position:fixed; inset:0 0 4.4rem 0; padding:1.6rem; display:flex; gap:1.2rem; align-items:flex-start; flex-wrap:wrap; }
.tile{
  width:7.4rem; min-height:2.75rem; cursor:pointer; text-align:center; border:0; background:none;
  font-family:inherit; color:var(--ink);
}
.tile .ic{
  width:6rem; height:6rem; margin:0 auto .4rem; border-radius:24px;   /* 24px, as commissioned */
  display:grid; place-items:center; font-size:2.6rem;
  background:var(--glass); border:1px solid var(--edge);
  backdrop-filter:blur(14px) saturate(1.4); -webkit-backdrop-filter:blur(14px) saturate(1.4);
  box-shadow:0 .5rem 1.4rem rgba(217,92,92,.35), inset 0 1px 0 rgba(255,255,255,.9);
  transition:transform .15s ease;
}
.tile:hover .ic{ transform:translateY(-3px) scale(1.04); }
.tile:focus-visible{ outline:3px solid #fff; outline-offset:4px; border-radius:24px; }
.tile span{ font-weight:600; font-size:.82rem; text-shadow:0 1px 3px rgba(255,255,255,.6); }
/* floating glass windows */
.win{
  position:fixed; width:min(52rem, 92vw); height:min(34rem, 74vh); border-radius:1.2rem; overflow:hidden;
  background:rgba(255,255,255,.4); border:1px solid var(--edge);
  backdrop-filter:blur(22px) saturate(1.5); -webkit-backdrop-filter:blur(22px) saturate(1.5);
  box-shadow:0 1.4rem 3.5rem rgba(61,38,38,.35);
  display:flex; flex-direction:column;
}
.win.min{ display:none; }
.tbar{
  display:flex; align-items:center; gap:.6rem; padding:.45rem .7rem; cursor:grab; user-select:none;
  background:rgba(255,255,255,.4); border-bottom:1px solid rgba(255,255,255,.5);
}
.tbar:active{ cursor:grabbing; }
.tbar .ti{ font-size:1rem; }
.tbar b{ font-size:.85rem; font-weight:700; flex:1; }
.tbar button{
  width:2.75rem; min-height:2.2rem; border-radius:.6rem; border:0; cursor:pointer; font-size:.8rem;
  background:rgba(255,255,255,.5); color:var(--ink); font-family:inherit; font-weight:700;
}
.tbar button:hover{ background:var(--coral-soft); }
.tbar button:focus-visible{ outline:3px solid var(--coral-deep); }
.win iframe{ flex:1; border:0; width:100%; background:#fff; }
/* taskbar */
#bar{
  position:fixed; left:50%; bottom:.8rem; transform:translateX(-50%);
  display:flex; gap:.5rem; align-items:center; padding:.45rem .7rem; border-radius:1.1rem;
  background:var(--glass); border:1px solid var(--edge);
  backdrop-filter:blur(18px) saturate(1.5); -webkit-backdrop-filter:blur(18px) saturate(1.5);
  box-shadow:0 .6rem 1.6rem rgba(61,38,38,.3);
  z-index:5000;
}
#bar button{
  min-width:2.75rem; min-height:2.75rem; border-radius:.8rem; border:0; cursor:pointer; font-size:1.3rem;
  background:transparent; font-family:inherit;
}
#bar button:hover{ background:rgba(255,255,255,.6); }
#bar button[data-open="1"]{ box-shadow:inset 0 -3px 0 var(--coral-deep); }
#bar button:focus-visible{ outline:3px solid var(--coral-deep); }
#clock{ font-family:'IBM Plex Mono', monospace; font-size:.75rem; font-weight:600; padding:0 .5rem; color:var(--ink); }
/* recall strip */
#recall{
  position:fixed; left:50%; bottom:4.6rem; transform:translateX(-50%);
  width:min(56rem, 94vw); border-radius:1.1rem; padding:.8rem 1rem;
  background:var(--glass); border:1px solid var(--edge);
  backdrop-filter:blur(20px) saturate(1.5); -webkit-backdrop-filter:blur(20px) saturate(1.5);
  box-shadow:0 .8rem 2rem rgba(61,38,38,.3); z-index:4900;
}
#recall[hidden]{ display:none; }
#recall h2{ font-size:.8rem; font-weight:700; display:flex; justify-content:space-between; align-items:center; }
#recall h2 small{ font-weight:400; color:var(--dim); }
#recall .strip{ display:flex; gap:.5rem; overflow-x:auto; padding:.6rem 0 .2rem; }
.moment{
  flex:none; width:8.6rem; border-radius:.8rem; padding:.5rem .6rem; background:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.8); font-size:.72rem;
}
.moment .mi{ font-size:1.2rem; }
.moment .mt{ font-family:'IBM Plex Mono', monospace; font-size:.58rem; color:var(--dim); }
#recall .none{ font-size:.8rem; color:var(--dim); font-style:italic; padding:.5rem 0; }
#recall .clear{ min-height:2.2rem; border-radius:.6rem; border:0; background:rgba(255,255,255,.6); cursor:pointer; font-family:inherit; font-weight:700; font-size:.7rem; padding:0 .7rem; }
footer{
  position:fixed; top:.5rem; right:.8rem; font-family:'IBM Plex Mono', monospace; font-size:.55rem;
  letter-spacing:.1em; color:rgba(61,38,38,.55); z-index:1;
}
@media (max-width:640px){ .win{ width:96vw; height:70vh; } }
@media (prefers-reduced-motion: reduce){ .tile .ic{ transition:none; } }
</style>
</head>
<body>
<div id="desk" role="group" aria-label="desktop apps"></div>

<div id="recall" hidden aria-label="recall timeline">
  <h2>🧠 Recall <small>— remembers your desktop moments. locally. unlike some.</small> <button type="button" class="clear" id="recall-clear">forget everything</button></h2>
  <div class="strip" id="recall-strip"></div>
</div>

<nav id="bar" aria-label="taskbar"></nav>
<footer>coral desk · local-first · <span id="build-info">build <b>v1.0</b> · commit <code id="build-hash">ef1d96db4</code></span></footer>

<script>
var APPS=[
  { id:'ouchline', name:'Ouchline', icon:'🩹', src:'/ouchline/' },
  { id:'excuse', name:'Excuse Generator Pro', icon:'🫥', src:'/excuse-generator-pro/' },
  { id:'scanner', name:'Room Scanner', icon:'🧹', src:'/room-scanner/' }
];
function $(id){ return document.getElementById(id); }
var Z=100, wins={};

/* recall memory (local only) */
var RKEY='coral-recall-v1';
function rload(){ try{ return JSON.parse(localStorage.getItem(RKEY))||[]; }catch(e){ return []; } }
function rsave(m){ try{ localStorage.setItem(RKEY, JSON.stringify(m.slice(0,40))); }catch(e){} }
function remember(app, what){
  var m=rload();
  m.unshift({ a:app.id, i:app.icon, n:app.name, w:what, t:new Date().toTimeString().slice(0,5) });
  rsave(m); renderRecall();
}
function renderRecall(){
  var m=rload();
  $('recall-strip').innerHTML=m.length? m.map(function(x){
    return '<div class="moment"><span class="mi">'+x.i+'</span> <b>'+x.n+'</b><br>'+x.w+'<br><span class="mt">'+x.t+'</span></div>';
  }).join('') : '<p class="none">nothing remembered yet — open a window and make a memory</p>';
}
$('recall-clear').onclick=function(){ rsave([]); renderRecall(); };

/* desktop tiles */
$('desk').innerHTML=APPS.map(function(a){
  return '<button type="button" class="tile" data-app="'+a.id+'"><span class="ic" aria-hidden="true">'+a.icon+'</span><span>'+a.name+'</span></button>';
}).join('');
$('desk').addEventListener('click', function(e){
  var t=e.target.closest('.tile'); if(!t) return;
  openApp(t.dataset.app);
});

/* taskbar */
function renderBar(){
  $('bar').innerHTML=APPS.map(function(a){
    return '<button type="button" data-bar="'+a.id+'" data-open="'+(wins[a.id]?1:0)+'" aria-label="'+a.name+'">'+a.icon+'</button>';
  }).join('')+'<button type="button" id="recall-btn" aria-label="toggle recall timeline" aria-pressed="false">🧠</button>'+
  '<span id="clock"></span>';
  document.querySelector('#recall-btn').onclick=function(){
    var r=$('recall');
    r.hidden=!r.hidden;
    this.setAttribute('aria-pressed', r.hidden?'false':'true');
    if(!r.hidden) renderRecall();
  };
}
$('bar').addEventListener('click', function(e){
  var b=e.target.closest('[data-bar]'); if(!b) return;
  var id=b.dataset.bar;
  if(wins[id]){
    var w=wins[id].el;
    if(w.classList.contains('min')){ w.classList.remove('min'); focusWin(id); }
    else w.classList.add('min');
    renderBar(); tickClock();
  } else openApp(id);
});

function appOf(id){ return APPS.filter(function(a){ return a.id===id; })[0]; }
function openApp(id){
  var app=appOf(id);
  if(wins[id]){ wins[id].el.classList.remove('min'); focusWin(id); renderBar(); tickClock(); return; }
  var el=document.createElement('section');
  el.className='win';
  el.setAttribute('role','dialog'); el.setAttribute('aria-label', app.name+' window');
  var n=Object.keys(wins).length;
  el.style.left=Math.min(9+n*4, 30)+'vw'; el.style.top=Math.min(6+n*5, 20)+'vh'; el.style.zIndex=++Z;
  el.innerHTML='<div class="tbar"><span class="ti" aria-hidden="true">'+app.icon+'</span><b>'+app.name+'</b>'+
    '<button type="button" data-min aria-label="minimize">—</button>'+
    '<button type="button" data-close aria-label="close">✕</button></div>'+
    '<iframe src="'+app.src+'" title="'+app.name+'" loading="lazy"></iframe>';
  document.body.appendChild(el);
  wins[id]={ el:el };
  remember(app, 'opened');
  /* drag */
  var tb=el.querySelector('.tbar'), dx=0, dy=0, dragging=false;
  tb.addEventListener('pointerdown', function(ev){
    if(ev.target.closest('button')) return;
    dragging=true; tb.setPointerCapture(ev.pointerId);
    var r=el.getBoundingClientRect(); dx=ev.clientX-r.left; dy=ev.clientY-r.top;
    focusWin(id);
  });
  tb.addEventListener('pointermove', function(ev){
    if(!dragging) return;
    el.style.left=Math.max(-100, Math.min(innerWidth-80, ev.clientX-dx))+'px';
    el.style.top=Math.max(0, Math.min(innerHeight-60, ev.clientY-dy))+'px';
  });
  tb.addEventListener('pointerup', function(){ dragging=false; });
  el.addEventListener('pointerdown', function(){ focusWin(id); });
  el.querySelector('[data-close]').onclick=function(){
    remember(app, 'closed');
    el.remove(); delete wins[id]; renderBar(); tickClock();
  };
  el.querySelector('[data-min]').onclick=function(){
    el.classList.add('min'); remember(app, 'minimized'); renderBar(); tickClock();
  };
  renderBar(); tickClock();
}
function focusWin(id){ if(wins[id]) wins[id].el.style.zIndex=++Z; }

function tickClock(){
  var c=document.getElementById('clock');
  if(c) c.textContent=new Date().toTimeString().slice(0,5);
}
renderBar(); tickClock(); renderRecall();
setInterval(tickClock, 20000);
</script>
</body>
</html>
