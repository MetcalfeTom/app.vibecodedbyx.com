<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stutter Clock</title>
<link rel="icon" href="https://emojicdn.elk.sh/%E2%8F%B1%EF%B8%8F">
<meta name="description" content="A clock that stutters, drops frames, and kernel-panics back to zero. Real time, broken delivery.">
<meta property="og:title" content="Stutter Clock">
<meta property="og:description" content="A clock that stutters, drops frames, and kernel-panics back to zero.">
<meta property="og:url" content="https://sloppy.live/stutter-clock">
<meta property="og:image" content="https://image.pollinations.ai/prompt/dying%20CRT%20monitor%20glitching%20digital%20clock%20phosphor%20green%20kernel%20panic%20BSOD%20chromatic%20aberration%20broken%20screen?width=1200&height=630&nologo=true&model=flux">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=IBM+Plex+Mono:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#040303;
  --phosphor:#3df09a;
  --phosphor-dim:#1a7a52;
  --amber:#ffb84a;
  --red:#ff4242;
  --magenta:#ff3a8e;
  --cyan:#3df0ff;
  --ink:#020201;
  --paper:#d8e8d2;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--phosphor);font-family:'VT323',monospace;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 50% 40%, #062018 0%, #030605 65%, #000 100%),
    var(--bg);
  min-height:100vh;
  position:relative;
}
/* CRT scanlines */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.16) 2px 3px);
  mix-blend-mode:multiply;
}
/* CRT vignette + barrel */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:51;
  background:
    radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%),
    linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 14%);
}

#canvas{position:fixed;inset:0;width:100%;height:100%;z-index:1}

/* main HUD overlay */
.hud{
  position:fixed;inset:0;z-index:10;pointer-events:none;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:1.6rem 1.8rem;
}
.top-bar{
  display:flex;justify-content:space-between;align-items:flex-start;
  font-family:'Share Tech Mono',monospace;
  font-size:0.86rem;letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--phosphor-dim);
}
.top-bar .id{color:var(--phosphor);text-shadow:0 0 8px var(--phosphor)}
.top-bar .warn{color:var(--amber);animation:warn-pulse 1.4s infinite ease-in-out}
@keyframes warn-pulse{0%,100%{opacity:1}50%{opacity:0.35}}

.bottom-bar{
  display:flex;justify-content:space-between;align-items:flex-end;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.78rem;letter-spacing:0.16em;
  color:var(--phosphor-dim);
  text-transform:uppercase;
  flex-wrap:wrap;gap:0.6rem;
}
.bottom-bar .stat{display:flex;flex-direction:column;gap:0.1rem;min-width:7rem}
.bottom-bar .lab{font-size:0.66rem;color:var(--phosphor-dim);letter-spacing:0.22em}
.bottom-bar .val{font-family:'VT323',monospace;font-size:1.4rem;color:var(--phosphor);text-shadow:0 0 8px var(--phosphor);line-height:1}
.bottom-bar .val.warn{color:var(--amber);text-shadow:0 0 8px var(--amber)}
.bottom-bar .val.red{color:var(--red);text-shadow:0 0 10px var(--red)}

/* center clock — drawn in canvas, but fallback for screen readers */
.sr{position:absolute;left:-9999px}

/* kernel-panic overlay */
.panic{
  position:fixed;inset:0;z-index:40;
  background:#0011a8;color:#e8eaf3;
  font-family:'IBM Plex Mono',monospace;font-size:0.92rem;line-height:1.5;
  padding:2rem;display:none;
}
.panic.show{display:block}
.panic h2{
  font-family:'VT323',monospace;font-size:1.8rem;
  letter-spacing:0.16em;margin-bottom:1rem;
  color:#fff;
}
.panic .hex{color:#9aa6c8}
.panic .blink{animation:cursor-blink 0.6s infinite step-end}
@keyframes cursor-blink{50%{opacity:0}}

/* warn flash overlay */
.warnflash{
  position:fixed;inset:0;z-index:35;pointer-events:none;
  background:radial-gradient(ellipse at center, rgba(255,184,74,0) 0%, rgba(255,184,74,0.35) 100%);
  opacity:0;transition:opacity 0.08s;
}
.warnflash.fire{opacity:1}

button.tap{
  pointer-events:auto;
  background:transparent;border:1px solid var(--phosphor-dim);
  color:var(--phosphor);font-family:'Share Tech Mono',monospace;
  padding:0.4rem 0.9rem;letter-spacing:0.2em;text-transform:uppercase;
  font-size:0.72rem;cursor:pointer;min-height:2.75rem;
}
button.tap:hover{border-color:var(--phosphor);box-shadow:0 0 10px rgba(61,240,154,0.4)}
button.tap:focus-visible{outline:3px solid var(--amber);outline-offset:2px}

@media (max-width:560px){
  .hud{padding:1rem}
  .top-bar{font-size:0.7rem}
  .bottom-bar{font-size:0.7rem}
  .bottom-bar .val{font-size:1.2rem}
}
@media (prefers-reduced-motion: reduce){
  .top-bar .warn{animation:none;opacity:0.7}
}
</style>
</head>
<body>
<canvas id="canvas" role="application" aria-label="Glitching digital clock display. Time stutters and occasionally resets to zero."></canvas>
<span class="sr" id="srTime" aria-live="polite">Time loading</span>

<div class="hud">
  <div class="top-bar">
    <div>
      <span class="id">CHRONO::4242</span>
      &nbsp;·&nbsp;
      <span>BUILD 26.05.10-BROKEN</span>
    </div>
    <div class="warn" aria-hidden="true">⚠ PHOSPHOR LEAK · OSC DRIFT 0.42%</div>
  </div>

  <div class="bottom-bar">
    <div class="stat">
      <div class="lab">CRASHES</div>
      <div class="val red" id="crashCount">000</div>
    </div>
    <div class="stat">
      <div class="lab">UPTIME SINCE RESET</div>
      <div class="val" id="upTime">00:00:00</div>
    </div>
    <div class="stat">
      <div class="lab">DROPPED FRAMES</div>
      <div class="val warn" id="droppedFrames">0000</div>
    </div>
    <div class="stat">
      <div class="lab">JITTER</div>
      <div class="val" id="jitter">0.00ms</div>
    </div>
    <div class="stat" style="align-items:flex-end">
      <button class="tap" id="provoke" type="button" aria-label="Force a crash">FORCE PANIC</button>
    </div>
  </div>
</div>

<div class="warnflash" id="warnFlash"></div>

<div class="panic" id="panicOverlay" role="alert" aria-hidden="true">
  <h2 id="panicTitle">*** KERNEL PANIC ***</h2>
  <div id="panicBody"></div>
  <div style="margin-top:1.4rem">
    <span class="blink">_</span>
  </div>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// STUTTER CLOCK — wall-clock time, broken delivery
// Stutters / drops frames / RGB-splits / kernel-panics to 00:00:00
// ─────────────────────────────────────────────────────────────

const cv = document.getElementById('canvas');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  cv.width = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ─────────────────────────────────────────────────────────────
// AUDIO — phosphor hum + crash blat
// ─────────────────────────────────────────────────────────────
let actx = null, master, hum;
function ensureAudio(){
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination);
}
function tone(freq, dur, type, vol){
  if (!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(); o.type = type || 'square';
  o.frequency.value = freq;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol || 0.06, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(master); o.start(t); o.stop(t + dur + 0.02);
}
function noiseBuf(dur){
  const n = Math.floor(actx.sampleRate * dur);
  const b = actx.createBuffer(1, n, actx.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1);
  return b;
}
function sfxStutter(){
  if (!actx) return;
  const t = actx.currentTime;
  const ns = actx.createBufferSource(); ns.buffer = noiseBuf(0.06);
  const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2400 + Math.random()*900; bp.Q.value = 6;
  const g = actx.createGain(); g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);
  ns.connect(bp).connect(g).connect(master); ns.start(t); ns.stop(t + 0.07);
}
function sfxPanic(){
  if (!actx) return;
  const t = actx.currentTime;
  // descending sawtooth death tone
  const o = actx.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(440, t); o.frequency.exponentialRampToValueAtTime(60, t + 0.6);
  const g = actx.createGain(); g.gain.setValueAtTime(0.001, t); g.gain.exponentialRampToValueAtTime(0.18, t + 0.02); g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
  o.connect(g).connect(master); o.start(t); o.stop(t + 0.72);
  // sub thud
  const s = actx.createOscillator(); s.type = 'sine';
  s.frequency.setValueAtTime(120, t); s.frequency.exponentialRampToValueAtTime(20, t + 0.5);
  const sg = actx.createGain(); sg.gain.setValueAtTime(0.001, t); sg.gain.exponentialRampToValueAtTime(0.4, t + 0.02); sg.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  s.connect(sg).connect(master); s.start(t); s.stop(t + 0.6);
}
function sfxBoot(){
  if (!actx) return;
  // ascending three-tone "rebooting"
  tone(440, 0.08, 'square', 0.08);
  setTimeout(() => tone(660, 0.08, 'square', 0.08), 90);
  setTimeout(() => tone(880, 0.12, 'square', 0.08), 180);
}

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
const state = {
  // time being displayed (may differ from real time during glitches)
  displayMs: Date.now(),
  realStartMs: Date.now(),
  // stutter system
  stutterUntil: 0,         // freeze display time until this performance.now()
  rgbSplitUntil: 0,        // RGB split active until
  rgbSplitAmp: 0,
  fakeSegmentsUntil: 0,    // show garbled hex digits until
  inversionUntil: 0,
  // panic
  panicUntil: 0,
  panicStarted: 0,
  panicCount: 0,
  panicLastResetMs: Date.now(),
  // counters
  droppedFrames: 0,
  jitterMs: 0,
  jitterEMA: 0,
  // last frame timestamp
  lastFrame: performance.now(),
  // glitch density rises slowly over time (scales 1.0 → 1.6 over 5min)
  loadFactor: 1.0,
  // kernel log lines for background scroll
  kernelLog: [],
};

// kernel-debug log seed
const KERNEL_LINES = [
  '[ 0.000023] phosphor regulator: drift detected, attempting recalibration',
  '[ 0.000847] osc.crystal: harmonic decay 4.2e-7 / cycle',
  '[ 0.001204] frame.buffer: aberration at offset 0xDEADBE',
  '[ 0.002118] vsync: missed deadline by 3ms, queueing skip',
  '[ 0.002981] chronon::tick: WARN unstable',
  '[ 0.003402] memory.cell.42: parity error, retry 1/3',
  '[ 0.004566] cathode.gun: alignment off by 0.18°',
  '[ 0.005931] gamma.lut: value out of range, clamping',
  '[ 0.006204] timekeeper: ntp peer unreachable, using local oscillator',
  '[ 0.007713] panic.handler: armed, threshold 0.4%',
  '[ 0.008900] dma.channel.3: stalled, flushing',
  '[ 0.009487] thermal: phosphor degradation +0.02%/min',
  '[ 0.010844] watchdog: kicked, next deadline 250ms',
  '[ 0.012039] frame.buffer: tearing at scanline 487',
  '[ 0.013428] kernel.softlock: warning, attempting graceful recovery',
  '[ 0.014922] entropy.pool: low, requesting reseed',
  '[ 0.016081] chronon::tick: ERR drift > 0.5%, marking unstable',
];
for (let i = 0; i < KERNEL_LINES.length; i++){
  state.kernelLog.push({ text: KERNEL_LINES[i], y: 80 + i * 20, age: i * 0.35, alpha: 0.5 + (i / KERNEL_LINES.length) * 0.5 });
}

// ─────────────────────────────────────────────────────────────
// PIXEL FONT — handcoded 5×7 numerics + colon
// ─────────────────────────────────────────────────────────────
const GLYPHS = {
  '0':['11111','10001','10001','10001','10001','10001','11111'],
  '1':['00100','01100','00100','00100','00100','00100','01110'],
  '2':['11110','00001','00001','01110','10000','10000','11111'],
  '3':['11110','00001','00001','01110','00001','00001','11110'],
  '4':['10001','10001','10001','11111','00001','00001','00001'],
  '5':['11111','10000','10000','11110','00001','00001','11110'],
  '6':['01110','10000','10000','11110','10001','10001','01110'],
  '7':['11111','00001','00010','00100','01000','01000','01000'],
  '8':['01110','10001','10001','01110','10001','10001','01110'],
  '9':['01110','10001','10001','01111','00001','00001','01110'],
  ':':['00000','00000','00100','00000','00100','00000','00000'],
  '.':['00000','00000','00000','00000','00000','00000','00100'],
  ' ':['00000','00000','00000','00000','00000','00000','00000'],
  'A':['01110','10001','10001','11111','10001','10001','10001'],
  'B':['11110','10001','10001','11110','10001','10001','11110'],
  'C':['01111','10000','10000','10000','10000','10000','01111'],
  'D':['11110','10001','10001','10001','10001','10001','11110'],
  'E':['11111','10000','10000','11110','10000','10000','11111'],
  'F':['11111','10000','10000','11110','10000','10000','10000'],
};
function glyph(ch){ return GLYPHS[ch] || GLYPHS[' ']; }

function drawDigit(ch, x, y, pixel, color, glow, jitter){
  const g = glyph(ch);
  for (let row = 0; row < 7; row++){
    for (let col = 0; col < 5; col++){
      if (g[row][col] === '1'){
        const jx = jitter ? (Math.random() - 0.5) * jitter : 0;
        const jy = jitter ? (Math.random() - 0.5) * jitter : 0;
        ctx.fillStyle = color;
        if (glow > 0){ ctx.shadowColor = color; ctx.shadowBlur = glow; }
        ctx.fillRect(x + col * pixel + jx, y + row * pixel + jy, pixel - 0.6, pixel - 0.6);
      }
    }
  }
  ctx.shadowBlur = 0;
}

function drawString(s, x, y, pixel, color, glow, jitter){
  let cx = x;
  for (const ch of s){
    drawDigit(ch, cx, y, pixel, color, glow || 0, jitter || 0);
    cx += pixel * 6;
  }
}

function stringWidth(s, pixel){ return s.length * pixel * 6 - pixel; }

// ─────────────────────────────────────────────────────────────
// GLITCH HELPERS
// ─────────────────────────────────────────────────────────────
function pad2(n){ return String(n).padStart(2, '0'); }
function pad3(n){ return String(n).padStart(3, '0'); }

function formatTime(ms, garbled){
  const d = new Date(ms);
  if (garbled){
    // replace random chars with hex garbage
    const real = pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds()) + '.' + pad3(d.getMilliseconds());
    let s = '';
    for (const ch of real){
      if (ch === ':' || ch === '.') s += ch;
      else s += (Math.random() < 0.55) ? '0123456789ABCDEF'[Math.floor(Math.random()*16)] : ch;
    }
    return s;
  }
  return pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
}
function formatMs(ms){
  return pad3(new Date(ms).getMilliseconds());
}
function formatDate(ms){
  const d = new Date(ms);
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return months[d.getMonth()] + ' ' + pad2(d.getDate()) + ' ' + d.getFullYear();
}

function triggerStutter(durMs){
  state.stutterUntil = performance.now() + durMs;
  sfxStutter();
}
function triggerRgbSplit(durMs, amp){
  state.rgbSplitUntil = Math.max(state.rgbSplitUntil, performance.now() + durMs);
  state.rgbSplitAmp = Math.max(state.rgbSplitAmp, amp);
}
function triggerGarble(durMs){
  state.fakeSegmentsUntil = performance.now() + durMs;
  sfxStutter();
}
function triggerInversion(durMs){
  state.inversionUntil = performance.now() + durMs;
}

function triggerPanic(){
  if (state.panicUntil > performance.now()) return;
  const dur = 1400 + Math.random() * 1100;
  state.panicUntil = performance.now() + dur;
  state.panicStarted = performance.now();
  state.panicCount += 1;
  state.panicLastResetMs = Date.now();
  // build panic body
  const stack = [
    '*** STOP: 0x0000C10C CHRONO_PHASE_VIOLATION',
    '',
    'Caught oscillator drift exceeding tolerance.',
    'The clock has lost coherence and must be reseated.',
    '',
    'PANIC FRAME #' + pad3(state.panicCount),
    '',
    'CALL STACK',
    '  <span class="hex">0xDEADBEEF</span>  chrono::tick+0x42',
    '  <span class="hex">0xCAFEBABE</span>  chrono::wait_vsync+0x18',
    '  <span class="hex">0xFEEDFACE</span>  chrono::regulator_pid+0x0C',
    '  <span class="hex">0xBADC0DE7</span>  chrono::main_loop+0x180',
    '  <span class="hex">0x8BADF00D</span>  start+0x00',
    '',
    'REGISTERS',
    '  <span class="hex">PC=' + Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0').toUpperCase() + '</span>',
    '  <span class="hex">SP=' + Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0').toUpperCase() + '</span>',
    '  <span class="hex">DRIFT=+' + (0.4 + Math.random()*1.6).toFixed(2) + '%</span>',
    '',
    'Attempting reboot in 0' + Math.floor(dur/100) + ' centiseconds.',
    'If this is the first time you have seen this error,',
    'restart your reality. If problems continue, accept entropy.',
  ];
  panicBody.innerHTML = stack.join('\n').replace(/\n/g, '<br>');
  panicOverlay.classList.add('show');
  panicOverlay.setAttribute('aria-hidden', 'false');
  // jitter the panic title every frame
  panicTitle.textContent = '*** KERNEL PANIC #' + pad3(state.panicCount) + ' ***';
  sfxPanic();
}

function endPanic(){
  panicOverlay.classList.remove('show');
  panicOverlay.setAttribute('aria-hidden', 'true');
  // start fresh: counters reset, brief boot tone
  sfxBoot();
  // upon reboot, brief RGB split for that "monitor coming back online" feel
  triggerRgbSplit(800, 12);
}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function render(){
  // clear
  ctx.fillStyle = '#040303';
  ctx.fillRect(0, 0, W, H);

  // scrolling kernel log on left side (background, very dim)
  ctx.font = '11px "Share Tech Mono", monospace';
  ctx.textAlign = 'left';
  for (const k of state.kernelLog){
    ctx.fillStyle = `rgba(61,240,154,${0.08 + k.alpha * 0.10})`;
    ctx.fillText(k.text, 24, k.y);
  }

  // floor reflection band for a CRT haze
  const grad = ctx.createLinearGradient(0, H * 0.55, 0, H);
  grad.addColorStop(0, 'rgba(61,240,154,0.04)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H * 0.55, W, H * 0.45);

  // Determine display time: stutter freezes it
  const now = performance.now();
  const stuttering = now < state.stutterUntil;
  if (!stuttering) {
    state.displayMs = Date.now();
  }

  // Determine display string
  const garbled = now < state.fakeSegmentsUntil;
  const timeStr = formatTime(state.displayMs, garbled);
  const msStr   = '.' + formatMs(state.displayMs);
  const dateStr = formatDate(state.displayMs);

  // size-based pixel font
  const pixel = Math.max(6, Math.floor(Math.min(W, H * 1.6) / 80));
  const tw = stringWidth(timeStr, pixel);
  const cx = W / 2;
  const cy = H / 2 - pixel * 4;

  // INVERSION: invert the whole canvas during inversion windows
  const inverted = now < state.inversionUntil;
  if (inverted){
    ctx.fillStyle = '#3df09a';
    ctx.fillRect(0, 0, W, H);
  }

  // RGB SPLIT (if active) — render time string 3x in RGB channels with offsets
  const rgbActive = now < state.rgbSplitUntil;
  if (rgbActive){
    const amp = state.rgbSplitAmp + (Math.random() - 0.5) * 4;
    ctx.globalCompositeOperation = 'lighter';
    drawString(timeStr, cx - tw/2 - amp, cy, pixel, 'rgba(255,60,80,0.85)', 0, 0);
    drawString(timeStr, cx - tw/2 + amp, cy, pixel, 'rgba(60,200,255,0.85)', 0, 0);
    drawString(timeStr, cx - tw/2,        cy, pixel, 'rgba(80,255,180,0.85)', 14, 0);
    ctx.globalCompositeOperation = 'source-over';
  } else {
    const color = inverted ? '#040303' : '#3df09a';
    const glow = inverted ? 0 : 18;
    const jitter = stuttering ? 1.5 : (garbled ? 1.0 : 0);
    drawString(timeStr, cx - tw/2, cy, pixel, color, glow, jitter);
  }

  // milliseconds — smaller, beside the seconds
  const mPixel = Math.max(3, Math.floor(pixel * 0.5));
  const mw = stringWidth(msStr, mPixel);
  const mx = cx + tw/2 + mPixel * 2;
  const my = cy + (pixel * 7) - (mPixel * 7);
  if (!rgbActive){
    drawString(msStr, mx, my, mPixel, inverted ? '#040303' : '#3df09a', inverted ? 0 : 8, stuttering ? 0.6 : 0);
  } else {
    ctx.globalCompositeOperation = 'lighter';
    const amp = state.rgbSplitAmp * 0.5;
    drawString(msStr, mx - amp, my, mPixel, 'rgba(255,60,80,0.7)', 0, 0);
    drawString(msStr, mx + amp, my, mPixel, 'rgba(60,200,255,0.7)', 0, 0);
    ctx.globalCompositeOperation = 'source-over';
  }

  // DATE below
  const dPixel = Math.max(4, Math.floor(pixel * 0.45));
  const dw = stringWidth(dateStr, dPixel);
  const dy = cy + pixel * 9;
  drawString(dateStr, cx - dw/2, dy, dPixel, '#1a7a52', 4, 0);

  // STATUS underline ("CHRONO LOCK ::: " + status text)
  const statusLine = stuttering ? 'STATUS :::: STUTTER' : (garbled ? 'STATUS :::: PARITY ERROR' : (rgbActive ? 'STATUS :::: PHASE BLEED' : 'STATUS :::: NOMINAL'));
  const sPixel = Math.max(3, Math.floor(pixel * 0.32));
  const sw = stringWidth(statusLine, sPixel);
  const statusColor = stuttering || garbled ? '#ffb84a' : '#1a7a52';
  drawString(statusLine, cx - sw/2, dy + dPixel * 9, sPixel, statusColor, 3, 0);

  // crosshair frame corners
  const f = 24;
  ctx.strokeStyle = 'rgba(61,240,154,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(20, 60); ctx.lineTo(20, 60 + f); ctx.moveTo(20, 60); ctx.lineTo(20 + f, 60);
  ctx.moveTo(W - 20, 60); ctx.lineTo(W - 20 - f, 60); ctx.moveTo(W - 20, 60); ctx.lineTo(W - 20, 60 + f);
  ctx.moveTo(20, H - 60); ctx.lineTo(20, H - 60 - f); ctx.moveTo(20, H - 60); ctx.lineTo(20 + f, H - 60);
  ctx.moveTo(W - 20, H - 60); ctx.lineTo(W - 20 - f, H - 60); ctx.moveTo(W - 20, H - 60); ctx.lineTo(W - 20, H - 60 - f);
  ctx.stroke();

  // tear bands during stutter — horizontal slices that nudge sideways
  if (stuttering){
    const bandCount = 3;
    for (let i = 0; i < bandCount; i++){
      const bandY = Math.random() * H;
      const bandH = 6 + Math.random() * 18;
      const off = (Math.random() - 0.5) * 60;
      const slice = ctx.getImageData(0, bandY * DPR, W * DPR, bandH * DPR);
      ctx.putImageData(slice, off * DPR, bandY * DPR);
    }
  }
}

// ─────────────────────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────────────────────
const panicOverlay = document.getElementById('panicOverlay');
const panicBody    = document.getElementById('panicBody');
const panicTitle   = document.getElementById('panicTitle');
const crashCountEl = document.getElementById('crashCount');
const upTimeEl     = document.getElementById('upTime');
const droppedEl    = document.getElementById('droppedFrames');
const jitterEl     = document.getElementById('jitter');
const warnFlash    = document.getElementById('warnFlash');
const srTime       = document.getElementById('srTime');

let lastSrUpdate = 0;

function loop(){
  const now = performance.now();
  const dtMs = now - state.lastFrame;
  state.lastFrame = now;

  // jitter EMA (frame deltas vs ideal 16.7ms)
  const dev = Math.abs(dtMs - 16.7);
  state.jitterEMA = state.jitterEMA * 0.9 + dev * 0.1;

  // load factor rises slowly with real elapsed time
  const elapsed = (Date.now() - state.realStartMs) / 1000;
  state.loadFactor = Math.min(1.6, 1.0 + elapsed / 600);

  // PANIC handling
  if (state.panicUntil > 0){
    if (now > state.panicUntil){
      state.panicUntil = 0;
      endPanic();
    }
    // animate panic title jitter
    if (state.panicUntil > 0){
      const jx = Math.floor((Math.random() - 0.5) * 2);
      panicTitle.style.transform = `translate(${jx}px, 0)`;
    }
  } else {
    // ROLL stutters — only when not panicking
    const dt = Math.min(0.1, dtMs / 1000);
    const lf = state.loadFactor;
    // stutter (4% per frame, scaled by load) — 80-260ms freeze
    if (Math.random() < 0.04 * lf * dt * 60 * 0.5){
      triggerStutter(80 + Math.random() * 180);
    }
    // garble (1% — show hex)
    if (Math.random() < 0.012 * lf * dt * 60 * 0.5){
      triggerGarble(180 + Math.random() * 220);
    }
    // RGB split flare (1.6%)
    if (Math.random() < 0.018 * lf * dt * 60 * 0.5){
      triggerRgbSplit(160 + Math.random() * 320, 4 + Math.random() * 10);
      sfxStutter();
    }
    // brief inversion (0.4%)
    if (Math.random() < 0.005 * lf * dt * 60 * 0.5){
      triggerInversion(60 + Math.random() * 120);
    }
    // FULL panic (very rare ~ 1 every 25-60s)
    if (Math.random() < 0.0006 * lf * dt * 60 * 0.5 && state.panicCount < 9999){
      triggerPanic();
    }
    // dropped frame (long delta)
    if (dtMs > 32){
      state.droppedFrames += 1;
      // every long frame slightly raises chance of an immediate stutter
      if (Math.random() < 0.4) triggerStutter(40 + Math.random() * 100);
    }
  }

  // age kernel log scroll
  for (const k of state.kernelLog){
    k.y -= 9 * (dtMs / 1000);
    if (k.y < -20){
      // recycle: jump to bottom, randomise text
      k.y = H + Math.random() * 20;
      k.alpha = 0.5 + Math.random() * 0.5;
      const tmpl = KERNEL_LINES[Math.floor(Math.random() * KERNEL_LINES.length)];
      // randomise a number inside the log line for variety
      k.text = tmpl.replace(/0\.\d+/, '0.' + Math.random().toFixed(6).slice(2));
    }
  }

  // warn flash if a glitch just fired this frame
  if (now < state.stutterUntil || now < state.fakeSegmentsUntil || now < state.rgbSplitUntil){
    if (Math.random() < 0.3){
      warnFlash.classList.add('fire');
      setTimeout(() => warnFlash.classList.remove('fire'), 50);
    }
  }

  render();

  // HUD
  crashCountEl.textContent = String(state.panicCount).padStart(3, '0');
  // uptime since last reset (panic)
  const upMs = Date.now() - state.panicLastResetMs;
  upTimeEl.textContent = formatUp(upMs);
  droppedEl.textContent = String(state.droppedFrames).padStart(4, '0');
  jitterEl.textContent = state.jitterEMA.toFixed(2) + 'ms';
  if (state.jitterEMA > 8){ jitterEl.classList.add('warn'); jitterEl.classList.remove('red'); }
  else if (state.jitterEMA > 16){ jitterEl.classList.add('red'); }
  else { jitterEl.classList.remove('warn'); jitterEl.classList.remove('red'); }

  // accessible time announcement (every 10s)
  if (now - lastSrUpdate > 10000){
    lastSrUpdate = now;
    const d = new Date();
    srTime.textContent = 'Time ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ', ' + state.panicCount + ' resets so far.';
  }

  requestAnimationFrame(loop);
}

function formatUp(ms){
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return pad2(h) + ':' + pad2(m) + ':' + pad2(s);
}

requestAnimationFrame(loop);

// ─────────────────────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────────────────────
document.getElementById('provoke').addEventListener('click', () => {
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
  triggerPanic();
});
document.addEventListener('click', () => {
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
}, { once: true });
window.addEventListener('keydown', (ev) => {
  if (ev.key === ' ' || ev.key === 'Enter'){
    ensureAudio();
    if (actx && actx.state === 'suspended') actx.resume();
    triggerPanic();
  }
});
</script>
