<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Neon Synth Garden</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🎵">
  <meta property="og:title" content="Neon Synth Garden">
  <meta property="og:description" content="Click anywhere to plant glowing music notes that harmonize together. Grow a living soundscape.">
  <meta property="og:url" content="https://sloppy.live/neon-synth-garden">
  <meta property="og:image" content="https://sloppy.live/neon-synth-garden/og-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Martian+Mono:wght@300;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080810;
      overflow: hidden;
      height: 100dvh;
      font-family: 'Martian Mono', monospace;
      color: #778;
      touch-action: none;
      user-select: none;
    }
    canvas { display: block; position: fixed; inset: 0; }

    #start-overlay {
      position: fixed; inset: 0;
      background: rgba(8,8,16,0.95);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 30;
      cursor: pointer;
    }
    #start-overlay h1 {
      font-family: 'Poiret One', cursive;
      font-size: clamp(32px, 7vw, 64px);
      color: #cc55ff;
      text-shadow: 0 0 40px #cc55ff44, 0 0 80px #cc55ff22;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    #start-overlay p {
      font-size: clamp(11px, 2vw, 14px);
      color: #445;
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.7;
      padding: 0 24px;
    }
    #start-overlay .tap {
      font-family: 'Poiret One', cursive;
      font-size: 18px;
      color: #cc55ff88;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: .5; } 50% { opacity: 1; } }

    #hud {
      position: fixed; top: 10px; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 14px; z-index: 10; pointer-events: none;
      font-size: 11px;
    }
    #hud > div { pointer-events: all; }
    .note-count { color: #cc55ff; }
    .key-label { color: #55ddaa; }

    #controls {
      display: flex; gap: 6px; align-items: center;
    }
    .btn {
      font-family: 'Martian Mono', monospace;
      font-size: 10px; font-weight: 500;
      padding: 4px 10px;
      border: 1px solid #223;
      background: rgba(15,15,25,0.85);
      color: #667;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all .15s;
    }
    .btn:hover { border-color: #cc55ff; color: #cc55ff; }
    .btn.active { border-color: #cc55ff; color: #cc55ff; background: rgba(204,85,255,0.08); }

    #scale-sel {
      font-family: 'Martian Mono', monospace;
      font-size: 10px;
      padding: 4px 6px;
      border: 1px solid #223;
      background: rgba(15,15,25,0.85);
      color: #667;
      cursor: pointer;
    }
    #scale-sel:focus { border-color: #cc55ff; outline: none; }

    #instructions {
      position: fixed; bottom: 36px;
      left: 0; right: 0; text-align: center;
      font-size: 10px; color: #223;
      z-index: 10; pointer-events: none;
      transition: opacity .8s;
    }
    #backlink {
      position: fixed; bottom: 6px; right: 10px;
      font-size: 10px; color: #1a1a2a;
      text-decoration: none; z-index: 10;
    }
    #backlink:hover { color: #cc55ff; }
  </style>
</head>
<body>

  <div id="start-overlay">
    <h1>NEON SYNTH GARDEN</h1>
    <p>Click to plant glowing notes that pulse and harmonize.<br>Each click grows the soundscape.</p>
    <span class="tap">tap anywhere to begin</span>
  </div>

  <canvas id="c"></canvas>

  <div id="hud" style="display:none">
    <div>
      <span class="note-count" id="s-notes">0</span> notes
      &nbsp;&middot;&nbsp;
      <span class="key-label" id="s-key">C major</span>
    </div>
    <div id="controls">
      <select id="scale-sel">
        <option value="major">Major</option>
        <option value="minor">Minor</option>
        <option value="pentatonic">Pentatonic</option>
        <option value="dorian">Dorian</option>
        <option value="mixolydian">Mixolydian</option>
        <option value="blues">Blues</option>
        <option value="japanese">Japanese</option>
      </select>
      <button class="btn" id="btn-clear">CLEAR</button>
    </div>
  </div>

  <div id="instructions" style="display:none">click to plant notes &middot; they harmonize in the chosen scale &middot; notes fade after 30s</div>

  <a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

/* ── Audio ── */
let audioCtx = null;
let masterGain = null;
let reverbNode = null;
let compressor = null;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Master chain: compressor → gain → reverb → destination
  compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -24;
  compressor.ratio.value = 8;
  compressor.attack.value = 0.003;
  compressor.release.value = 0.15;

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.35;

  // Convolution reverb (generate impulse)
  reverbNode = audioCtx.createConvolver();
  const irLen = audioCtx.sampleRate * 2.5;
  const ir = audioCtx.createBuffer(2, irLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = ir.getChannelData(ch);
    for (let i = 0; i < irLen; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.2);
    }
  }
  reverbNode.buffer = ir;

  const reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.3;

  const dryGain = audioCtx.createGain();
  dryGain.gain.value = 0.7;

  compressor.connect(masterGain);
  masterGain.connect(dryGain);
  masterGain.connect(reverbNode);
  reverbNode.connect(reverbGain);
  dryGain.connect(audioCtx.destination);
  reverbGain.connect(audioCtx.destination);
}

/* ── Scales ── */
const SCALES = {
  major:      [0, 2, 4, 5, 7, 9, 11],
  minor:      [0, 2, 3, 5, 7, 8, 10],
  pentatonic: [0, 2, 4, 7, 9],
  dorian:     [0, 2, 3, 5, 7, 9, 10],
  mixolydian: [0, 2, 4, 5, 7, 9, 10],
  blues:      [0, 3, 5, 6, 7, 10],
  japanese:   [0, 1, 5, 7, 8],
};
const ROOT_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let currentScale = 'major';
let rootNote = 0; // C

function getFreq(midiNote) {
  return 440 * Math.pow(2, (midiNote - 69) / 12);
}

function scaleNoteFromPosition(x, y) {
  // X position → octave range (3-6), Y position → note in scale
  const scale = SCALES[currentScale];
  const octave = Math.floor(3 + (x / W) * 3.5);
  const idx = Math.floor((1 - y / H) * scale.length);
  const degree = scale[Math.max(0, Math.min(scale.length - 1, idx))];
  return rootNote + degree + octave * 12;
}

/* ── Synth voices ── */
const WAVE_TYPES = ['sine', 'triangle', 'sawtooth'];

function playNote(midiNote, duration, x) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const freq = getFreq(midiNote);

  // Pick waveform based on horizontal position
  const waveIdx = Math.floor((x / W) * WAVE_TYPES.length);
  const wave = WAVE_TYPES[Math.min(waveIdx, WAVE_TYPES.length - 1)];

  // Main oscillator
  const osc = audioCtx.createOscillator();
  osc.type = wave;
  osc.frequency.value = freq;

  // Slight detune for warmth
  const osc2 = audioCtx.createOscillator();
  osc2.type = wave;
  osc2.frequency.value = freq * 1.003;

  // Envelope
  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(0.12, t + 0.08);
  env.gain.exponentialRampToValueAtTime(0.04, t + duration * 0.4);
  env.gain.exponentialRampToValueAtTime(0.001, t + duration);

  // Slight filter
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 1200 + (1 - x / W) * 3000;
  filter.Q.value = 1.5;

  osc.connect(env);
  osc2.connect(env);
  env.connect(filter);
  filter.connect(compressor);

  osc.start(t);
  osc2.start(t);
  osc.stop(t + duration + 0.1);
  osc2.stop(t + duration + 0.1);
}

/* ── Notes (visual + audio) ── */
let notes = [];
const MAX_NOTES = 60;
const NOTE_LIFETIME = 30; // seconds

// Hue palette per scale degree
function noteHue(midiNote) {
  const degree = ((midiNote - rootNote) % 12 + 12) % 12;
  // Map chromatic degree to hue
  const hues = [280, 310, 340, 10, 40, 65, 100, 140, 170, 200, 230, 260];
  return hues[degree] || 280;
}

function spawnNote(x, y) {
  const midi = scaleNoteFromPosition(x, y);
  const hue = noteHue(midi);

  // Re-trigger interval: how often this note re-plays
  // Higher notes pulse faster
  const baseInterval = 2.5 - (y / H) * 1.5; // 1.0s to 2.5s
  const interval = baseInterval + Math.random() * 0.5;

  notes.push({
    x, y, midi, hue,
    radius: 0, targetRadius: 14 + Math.random() * 8,
    birth: performance.now() / 1000,
    lastPlayed: 0,
    interval,
    pulsePhase: Math.random() * Math.PI * 2,
    rings: [],
    alive: true
  });

  // Immediate play
  playNote(midi, interval * 0.8, x);

  // Cap
  if (notes.length > MAX_NOTES) {
    notes[0].alive = false;
    notes.shift();
  }
}

/* ── Input ── */
let started = false;
let instructionTimer = 400;

function handleStart(e) {
  if (!started) {
    started = true;
    initAudio();
    document.getElementById('start-overlay').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('instructions').style.display = 'block';
  }
}

function handleClick(x, y) {
  if (!started) return;
  spawnNote(x, y);
  instructionTimer = 0;
}

document.getElementById('start-overlay').addEventListener('click', e => {
  handleStart(e);
  handleClick(e.clientX, e.clientY);
});
document.getElementById('start-overlay').addEventListener('touchstart', e => {
  e.preventDefault();
  handleStart(e);
  const t = e.touches[0];
  handleClick(t.clientX, t.clientY);
});

canvas.addEventListener('pointerdown', e => {
  if (!started) return;
  handleClick(e.clientX, e.clientY);
});

// Scale selector
document.getElementById('scale-sel').addEventListener('change', function() {
  currentScale = this.value;
  updateKeyLabel();
});

document.getElementById('btn-clear').addEventListener('click', () => {
  notes = [];
});

function updateKeyLabel() {
  document.getElementById('s-key').textContent =
    ROOT_NAMES[rootNote] + ' ' + currentScale;
}
updateKeyLabel();

/* ── Ambient background particles ── */
let bgDust = [];
for (let i = 0; i < 50; i++) {
  bgDust.push({
    x: Math.random() * 2000, y: Math.random() * 1200,
    vx: (Math.random() - 0.5) * 0.2,
    vy: -Math.random() * 0.15 - 0.05,
    size: Math.random() * 1.5 + 0.3,
    alpha: Math.random() * 0.15 + 0.03,
    hue: 260 + Math.random() * 60
  });
}

/* ── Main loop ── */
let frame = 0;
const startT = performance.now();

function loop() {
  frame++;
  const now = performance.now() / 1000;

  // ── Update notes ──
  for (let i = notes.length - 1; i >= 0; i--) {
    const n = notes[i];
    const age = now - n.birth;

    // Fade in
    n.radius += (n.targetRadius - n.radius) * 0.08;

    // Lifetime fade
    if (age > NOTE_LIFETIME) {
      n.alive = false;
      notes.splice(i, 1);
      continue;
    }

    // Re-trigger
    if (now - n.lastPlayed >= n.interval) {
      n.lastPlayed = now;
      const fadeVol = age > NOTE_LIFETIME * 0.7 ? (NOTE_LIFETIME - age) / (NOTE_LIFETIME * 0.3) : 1;
      if (fadeVol > 0.05) {
        playNote(n.midi, n.interval * 0.7, n.x);
      }
      // Spawn ring
      n.rings.push({ r: n.radius, maxR: n.radius + 40 + Math.random() * 20, alpha: 0.5 });
    }

    // Update rings
    for (let j = n.rings.length - 1; j >= 0; j--) {
      const ring = n.rings[j];
      ring.r += 1.2;
      ring.alpha *= 0.96;
      if (ring.alpha < 0.01 || ring.r > ring.maxR) {
        n.rings.splice(j, 1);
      }
    }
  }

  // ── Render ──
  ctx.fillStyle = 'rgba(8,8,16,0.15)';
  ctx.fillRect(0, 0, W, H);

  // Background dust
  for (const d of bgDust) {
    d.x += d.vx; d.y += d.vy;
    if (d.y < -5) { d.y = H + 5; d.x = Math.random() * W; }
    if (d.x < -5) d.x = W + 5;
    if (d.x > W + 5) d.x = -5;
    ctx.fillStyle = `hsla(${d.hue}, 40%, 50%, ${d.alpha})`;
    ctx.fillRect(d.x, d.y, d.size, d.size);
  }

  // Connection lines between harmonically related notes
  if (notes.length > 1 && notes.length < 40) {
    for (let i = 0; i < notes.length; i++) {
      for (let j = i + 1; j < notes.length; j++) {
        const a = notes[i], b = notes[j];
        const interval = Math.abs(a.midi - b.midi) % 12;
        // Perfect fifth (7), octave (0), major third (4)
        if (interval === 0 || interval === 7 || interval === 4 || interval === 5) {
          const dx = b.x - a.x, dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 350) {
            const alpha = (1 - dist / 350) * 0.08;
            const hue = (a.hue + b.hue) / 2;
            ctx.strokeStyle = `hsla(${hue}, 60%, 55%, ${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            // Gentle curve
            const mx = (a.x + b.x) / 2 + Math.sin(now * 0.5 + i) * 15;
            const my = (a.y + b.y) / 2 + Math.cos(now * 0.7 + j) * 15;
            ctx.quadraticCurveTo(mx, my, b.x, b.y);
            ctx.stroke();
          }
        }
      }
    }
  }

  // Notes
  for (const n of notes) {
    const age = now - n.birth;
    const lifeFrac = Math.min(age / NOTE_LIFETIME, 1);
    const fadeAlpha = lifeFrac > 0.7 ? (1 - lifeFrac) / 0.3 : 1;
    const pulse = Math.sin(now * 3 + n.pulsePhase) * 0.2 + 0.8;

    // Expanding rings
    for (const ring of n.rings) {
      ctx.strokeStyle = `hsla(${n.hue}, 80%, 60%, ${ring.alpha * fadeAlpha})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(n.x, n.y, ring.r, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Outer glow
    const glowR = n.radius * 2.5 * pulse;
    const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowR);
    grd.addColorStop(0, `hsla(${n.hue}, 90%, 60%, ${0.15 * fadeAlpha * pulse})`);
    grd.addColorStop(0.5, `hsla(${n.hue}, 80%, 50%, ${0.05 * fadeAlpha})`);
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.fillRect(n.x - glowR, n.y - glowR, glowR * 2, glowR * 2);

    // Core
    ctx.shadowColor = `hsla(${n.hue}, 100%, 65%, 0.8)`;
    ctx.shadowBlur = 12 * pulse;
    ctx.fillStyle = `hsla(${n.hue}, 85%, ${60 + pulse * 15}%, ${0.85 * fadeAlpha})`;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius * pulse * 0.5, 0, Math.PI * 2);
    ctx.fill();

    // Bright center
    ctx.fillStyle = `hsla(${n.hue}, 60%, 90%, ${0.7 * fadeAlpha * pulse})`;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Note name label (subtle)
    if (fadeAlpha > 0.3) {
      const noteName = ROOT_NAMES[n.midi % 12];
      const octave = Math.floor(n.midi / 12) - 1;
      ctx.fillStyle = `hsla(${n.hue}, 50%, 70%, ${0.35 * fadeAlpha})`;
      ctx.font = '9px "Martian Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(noteName + octave, n.x, n.y + n.radius + 12);
    }
  }

  // Instructions fade
  if (instructionTimer > 0) {
    instructionTimer--;
  } else {
    document.getElementById('instructions').style.opacity = '0';
  }

  // HUD
  document.getElementById('s-notes').textContent = notes.length;

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
