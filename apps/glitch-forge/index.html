<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch Forge</title>
<link rel="icon" href="https://emojicdn.elk.sh/📡">
<meta property="og:title" content="Glitch Forge">
<meta property="og:description" content="Generate glitch art from any image. Pixel sort, channel shift, scan lines, and more.">
<meta property="og:url" content="https://app.sloppy.live/glitch-forge/">
<meta property="og:image" content="https://emojicdn.elk.sh/📡?style=google">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#111118;--border:#1e1e2a;
  --text:#d4d4dc;--dim:#555566;--accent:#e040fb;
  --accent2:#00e5ff;--red:#ff1744;--green:#69f0ae;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Space Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:16px;
}
.container{max-width:800px;width:100%}

header{text-align:center;margin-bottom:20px}
h1{
  font-family:'Instrument Serif',serif;font-weight:400;
  font-size:clamp(1.8rem,4vw,2.8rem);letter-spacing:-0.02em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{color:var(--dim);font-size:0.6rem;margin-top:2px}

.canvas-wrap{
  position:relative;width:100%;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;
  overflow:hidden;margin-bottom:16px;
  min-height:200px;display:flex;align-items:center;justify-content:center;
}
canvas{display:block;max-width:100%;max-height:60vh}
.drop-zone{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;
}
.drop-zone.hidden{display:none}
.drop-zone span{color:var(--dim);font-size:0.7rem}
.drop-zone .big{font-size:1.8rem;color:var(--accent);opacity:0.5}
.drop-zone input{display:none}

.controls{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;
}
@media(max-width:500px){.controls{grid-template-columns:1fr}}

.ctrl{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;
}
.ctrl-label{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;
}
.ctrl-label span{font-size:0.55rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em}
.ctrl-label .val{color:var(--accent);font-size:0.6rem;font-weight:700}

input[type=range]{
  -webkit-appearance:none;width:100%;height:4px;
  background:var(--border);border-radius:2px;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  background:var(--accent);border-radius:50%;cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:14px;height:14px;background:var(--accent);
  border-radius:50%;cursor:pointer;border:none;
}

.toggle-row{display:flex;flex-wrap:wrap;gap:4px}
.toggle{
  padding:5px 10px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--dim);font-family:inherit;
  font-size:0.55rem;cursor:pointer;transition:all 0.15s;
}
.toggle.on{border-color:var(--accent);color:var(--accent);background:rgba(224,64,251,0.06)}
.toggle:hover{border-color:var(--accent)}

.actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.btn{
  padding:10px 18px;border:1px solid var(--border);border-radius:8px;
  background:var(--surface);color:var(--text);font-family:inherit;
  font-size:0.65rem;font-weight:700;cursor:pointer;transition:all 0.15s;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{border-color:var(--accent);color:var(--accent)}
.btn.primary:hover{background:var(--accent);color:var(--bg)}
.btn:disabled{opacity:0.3;cursor:default}

.presets{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.preset{
  padding:6px 12px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--dim);font-family:inherit;
  font-size:0.55rem;cursor:pointer;transition:all 0.15s;
}
.preset:hover{border-color:var(--accent2);color:var(--accent2)}

.back-link{text-align:center;margin-top:12px}
.back-link a{color:var(--dim);text-decoration:none;font-size:0.5rem;transition:color 0.2s}
.back-link a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Glitch Forge</h1>
    <div class="sub">drop an image, glitch it, export the result</div>
  </header>

  <div class="canvas-wrap">
    <canvas id="canvas" width="640" height="400"></canvas>
    <div class="drop-zone" id="drop-zone">
      <div class="big">+</div>
      <span>drop image or click to upload</span>
      <input type="file" id="file-input" accept="image/*">
    </div>
  </div>

  <div class="presets">
    <button class="preset" onclick="applyPreset('vhs')">VHS</button>
    <button class="preset" onclick="applyPreset('corrupt')">Corrupt</button>
    <button class="preset" onclick="applyPreset('cyber')">Cyber</button>
    <button class="preset" onclick="applyPreset('acid')">Acid</button>
    <button class="preset" onclick="applyPreset('subtle')">Subtle</button>
    <button class="preset" onclick="applyPreset('reset')">Reset</button>
  </div>

  <div class="controls">
    <div class="ctrl">
      <div class="ctrl-label"><span>Channel Shift</span><span class="val" id="v-shift">0</span></div>
      <input type="range" id="s-shift" min="0" max="80" value="0" oninput="updateVal('shift');render()">
    </div>
    <div class="ctrl">
      <div class="ctrl-label"><span>Pixel Sort</span><span class="val" id="v-sort">0</span></div>
      <input type="range" id="s-sort" min="0" max="100" value="0" oninput="updateVal('sort');render()">
    </div>
    <div class="ctrl">
      <div class="ctrl-label"><span>Scan Lines</span><span class="val" id="v-scan">0</span></div>
      <input type="range" id="s-scan" min="0" max="100" value="0" oninput="updateVal('scan');render()">
    </div>
    <div class="ctrl">
      <div class="ctrl-label"><span>Noise</span><span class="val" id="v-noise">0</span></div>
      <input type="range" id="s-noise" min="0" max="100" value="0" oninput="updateVal('noise');render()">
    </div>
    <div class="ctrl">
      <div class="ctrl-label"><span>Slice Offset</span><span class="val" id="v-slice">0</span></div>
      <input type="range" id="s-slice" min="0" max="60" value="0" oninput="updateVal('slice');render()">
    </div>
    <div class="ctrl">
      <div class="ctrl-label"><span>Color Crush</span><span class="val" id="v-crush">0</span></div>
      <input type="range" id="s-crush" min="0" max="7" value="0" oninput="updateVal('crush');render()">
    </div>
    <div class="ctrl">
      <div class="ctrl-label"><span>Distortion</span><span class="val" id="v-distort">0</span></div>
      <input type="range" id="s-distort" min="0" max="50" value="0" oninput="updateVal('distort');render()">
    </div>
    <div class="ctrl">
      <div class="ctrl-label"><span>Effects</span></div>
      <div class="toggle-row">
        <button class="toggle" id="t-invert" onclick="toggleFx('invert')">Invert</button>
        <button class="toggle" id="t-mirror" onclick="toggleFx('mirror')">Mirror</button>
        <button class="toggle" id="t-vhs" onclick="toggleFx('vhs')">VHS Bars</button>
        <button class="toggle" id="t-rgb" onclick="toggleFx('rgb')">RGB Split</button>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn primary" onclick="render()">Reglitch</button>
    <button class="btn" onclick="randomize()">Random</button>
    <button class="btn" onclick="exportPNG()">Export PNG</button>
    <button class="btn" id="gif-btn" onclick="exportGIF()">Export GIF (5 frames)</button>
  </div>
</div>

<div class="back-link"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
let sourceImg = null;
let sourceData = null;

const params = {
  shift: 0, sort: 0, scan: 0, noise: 0,
  slice: 0, crush: 0, distort: 0,
  invert: false, mirror: false, vhs: false, rgb: false
};

function updateVal(key) {
  const v = document.getElementById('s-' + key).value;
  params[key] = parseInt(v);
  document.getElementById('v-' + key).textContent = v;
}

function toggleFx(key) {
  params[key] = !params[key];
  document.getElementById('t-' + key).classList.toggle('on', params[key]);
  render();
}

function setSlider(key, val) {
  document.getElementById('s-' + key).value = val;
  params[key] = val;
  document.getElementById('v-' + key).textContent = val;
}

function setToggle(key, val) {
  params[key] = val;
  document.getElementById('t-' + key).classList.toggle('on', val);
}

// File input
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.borderColor = '';
  if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});

function loadImage(file) {
  const img = new Image();
  img.onload = () => {
    sourceImg = img;
    // Fit to max 800x600 for perf
    let w = img.width, h = img.height;
    const maxW = 800, maxH = 600;
    if (w > maxW || h > maxH) {
      const s = Math.min(maxW / w, maxH / h);
      w = Math.round(w * s); h = Math.round(h * s);
    }
    canvas.width = w; canvas.height = h;
    ctx.drawImage(img, 0, 0, w, h);
    sourceData = ctx.getImageData(0, 0, w, h);
    dropZone.classList.add('hidden');
    render();
  };
  img.src = URL.createObjectURL(file);
}

// Generate a default pattern if no image loaded
function generatePattern() {
  const w = 640, h = 400;
  canvas.width = w; canvas.height = h;
  const img = ctx.createImageData(w, h);
  const d = img.data;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      d[i] = (x ^ y) & 0xFF;
      d[i+1] = (x * 3 + y * 7) & 0xFF;
      d[i+2] = (Math.sin(x*0.02)*128+128) & 0xFF;
      d[i+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  sourceData = ctx.getImageData(0, 0, w, h);
  dropZone.classList.add('hidden');
}

function render() {
  if (!sourceData) return;
  const w = canvas.width, h = canvas.height;
  const src = new Uint8ClampedArray(sourceData.data);
  const out = ctx.createImageData(w, h);
  const d = out.data;

  // Copy source
  d.set(src);

  // Channel shift
  if (params.shift > 0) {
    const s = params.shift;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = (y * w + x) * 4;
        // Shift red channel right
        const rx = Math.min(w - 1, x + s);
        const ri = (y * w + rx) * 4;
        d[i] = src[ri];
        // Shift blue channel left
        const bx = Math.max(0, x - s);
        const bi = (y * w + bx) * 4;
        d[i + 2] = src[bi + 2];
      }
    }
  }

  // Pixel sort (sort rows by brightness in segments)
  if (params.sort > 0) {
    const threshold = 255 - params.sort * 2.5;
    for (let y = 0; y < h; y++) {
      let segStart = -1;
      for (let x = 0; x <= w; x++) {
        const i = (y * w + x) * 4;
        const bright = x < w ? (d[i] + d[i+1] + d[i+2]) / 3 : 0;
        if (bright > threshold && segStart < 0) {
          segStart = x;
        } else if ((bright <= threshold || x === w) && segStart >= 0) {
          // Sort segment
          const seg = [];
          for (let sx = segStart; sx < x; sx++) {
            const si = (y * w + sx) * 4;
            seg.push({ r: d[si], g: d[si+1], b: d[si+2], a: d[si+3],
              br: d[si] + d[si+1] + d[si+2] });
          }
          seg.sort((a, b) => a.br - b.br);
          for (let j = 0; j < seg.length; j++) {
            const si = (y * w + (segStart + j)) * 4;
            d[si] = seg[j].r; d[si+1] = seg[j].g; d[si+2] = seg[j].b; d[si+3] = seg[j].a;
          }
          segStart = -1;
        }
      }
    }
  }

  // Slice offset (horizontal slices shifted randomly)
  if (params.slice > 0) {
    const numSlices = 5 + params.slice / 4;
    for (let s = 0; s < numSlices; s++) {
      const sy = Math.floor(Math.random() * h);
      const sh = 1 + Math.floor(Math.random() * (4 + params.slice / 5));
      const offset = Math.floor((Math.random() - 0.5) * params.slice * 2);
      for (let y = sy; y < Math.min(h, sy + sh); y++) {
        const row = new Uint8ClampedArray(w * 4);
        for (let x = 0; x < w; x++) {
          const si = (y * w + x) * 4;
          row[x * 4] = d[si]; row[x*4+1] = d[si+1]; row[x*4+2] = d[si+2]; row[x*4+3] = d[si+3];
        }
        for (let x = 0; x < w; x++) {
          const nx = ((x + offset) % w + w) % w;
          const di = (y * w + x) * 4;
          d[di] = row[nx*4]; d[di+1] = row[nx*4+1]; d[di+2] = row[nx*4+2]; d[di+3] = row[nx*4+3];
        }
      }
    }
  }

  // Distortion (wave displacement)
  if (params.distort > 0) {
    const copy = new Uint8ClampedArray(d);
    const amp = params.distort;
    const freq = 0.02 + Math.random() * 0.03;
    const phase = Math.random() * Math.PI * 2;
    for (let y = 0; y < h; y++) {
      const xOff = Math.round(Math.sin(y * freq + phase) * amp);
      for (let x = 0; x < w; x++) {
        const sx = ((x + xOff) % w + w) % w;
        const di = (y * w + x) * 4;
        const si = (y * w + sx) * 4;
        d[di] = copy[si]; d[di+1] = copy[si+1]; d[di+2] = copy[si+2]; d[di+3] = copy[si+3];
      }
    }
  }

  // Color crush (reduce bit depth)
  if (params.crush > 0) {
    const levels = Math.max(2, 8 - params.crush);
    const step = 256 / levels;
    for (let i = 0; i < d.length; i += 4) {
      d[i] = Math.round(d[i] / step) * step;
      d[i+1] = Math.round(d[i+1] / step) * step;
      d[i+2] = Math.round(d[i+2] / step) * step;
    }
  }

  // Scan lines
  if (params.scan > 0) {
    const intensity = params.scan / 100;
    const gap = Math.max(2, 6 - Math.floor(params.scan / 25));
    for (let y = 0; y < h; y++) {
      if (y % gap === 0) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          d[i] = Math.round(d[i] * (1 - intensity * 0.7));
          d[i+1] = Math.round(d[i+1] * (1 - intensity * 0.7));
          d[i+2] = Math.round(d[i+2] * (1 - intensity * 0.7));
        }
      }
    }
  }

  // Noise
  if (params.noise > 0) {
    const amt = params.noise * 2.55;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * amt;
      d[i] = Math.max(0, Math.min(255, d[i] + n));
      d[i+1] = Math.max(0, Math.min(255, d[i+1] + n));
      d[i+2] = Math.max(0, Math.min(255, d[i+2] + n));
    }
  }

  // Invert
  if (params.invert) {
    for (let i = 0; i < d.length; i += 4) {
      d[i] = 255 - d[i]; d[i+1] = 255 - d[i+1]; d[i+2] = 255 - d[i+2];
    }
  }

  // Mirror
  if (params.mirror) {
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w / 2; x++) {
        const li = (y * w + x) * 4;
        const ri = (y * w + (w - 1 - x)) * 4;
        d[ri] = d[li]; d[ri+1] = d[li+1]; d[ri+2] = d[li+2]; d[ri+3] = d[li+3];
      }
    }
  }

  ctx.putImageData(out, 0, 0);

  // VHS bars (draw on top)
  if (params.vhs) {
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    for (let y = 0; y < h; y += 3) {
      ctx.fillRect(0, y, w, 1);
    }
    // Color bar at bottom
    ctx.fillStyle = 'rgba(224,64,251,0.08)';
    ctx.fillRect(0, h - 30, w, 30);
    ctx.fillStyle = 'rgba(0,229,255,0.06)';
    ctx.fillRect(0, h - 20, w, 10);
    // Timestamp
    ctx.font = '10px "Space Mono", monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    const ts = new Date().toLocaleTimeString();
    ctx.fillText('REC ' + ts, 8, h - 8);
    ctx.fillText('PLAY >', w - 60, h - 8);
  }

  // RGB split overlay
  if (params.rgb) {
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 0.08;
    ctx.drawImage(canvas, 3, 0);
    ctx.drawImage(canvas, -3, 0);
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
  }
}

function randomize() {
  setSlider('shift', Math.floor(Math.random() * 60));
  setSlider('sort', Math.floor(Math.random() * 80));
  setSlider('scan', Math.floor(Math.random() * 80));
  setSlider('noise', Math.floor(Math.random() * 50));
  setSlider('slice', Math.floor(Math.random() * 40));
  setSlider('crush', Math.floor(Math.random() * 6));
  setSlider('distort', Math.floor(Math.random() * 30));
  setToggle('invert', Math.random() < 0.2);
  setToggle('mirror', Math.random() < 0.2);
  setToggle('vhs', Math.random() < 0.3);
  setToggle('rgb', Math.random() < 0.3);
  render();
}

function applyPreset(name) {
  // Reset all first
  ['shift','sort','scan','noise','slice','crush','distort'].forEach(k => setSlider(k, 0));
  ['invert','mirror','vhs','rgb'].forEach(k => setToggle(k, false));

  switch(name) {
    case 'vhs':
      setSlider('shift', 8); setSlider('scan', 60); setSlider('noise', 20);
      setSlider('distort', 5); setToggle('vhs', true);
      break;
    case 'corrupt':
      setSlider('shift', 40); setSlider('slice', 50); setSlider('noise', 30);
      setSlider('crush', 3); setSlider('sort', 40);
      break;
    case 'cyber':
      setSlider('shift', 15); setSlider('scan', 40); setSlider('crush', 2);
      setToggle('rgb', true); setToggle('mirror', true);
      break;
    case 'acid':
      setSlider('shift', 60); setSlider('distort', 35); setSlider('crush', 5);
      setSlider('sort', 70); setToggle('invert', true);
      break;
    case 'subtle':
      setSlider('shift', 4); setSlider('scan', 20); setSlider('noise', 8);
      break;
    case 'reset':
      break;
  }
  render();
}

function exportPNG() {
  if (!sourceData) return;
  const link = document.createElement('a');
  link.download = 'glitch-forge-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function exportGIF() {
  if (!sourceData) return;
  const btn = document.getElementById('gif-btn');
  btn.disabled = true;
  btn.textContent = 'Rendering...';

  const frames = [];
  for (let i = 0; i < 5; i++) {
    render(); // Each render has random noise/slice variation
    frames.push(canvas.toDataURL('image/png'));
  }

  // Since we can't use a GIF lib easily, export as a zip of PNGs
  // Instead, create an animated preview and let user save individual frames
  let frameIdx = 0;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,15,0.95);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;';

  const preview = document.createElement('img');
  preview.style.cssText = 'max-width:90vw;max-height:50vh;border:1px solid #1e1e2a;border-radius:8px;';
  preview.src = frames[0];

  const info = document.createElement('div');
  info.style.cssText = 'color:#555;font-family:"Space Mono",monospace;font-size:0.6rem;';
  info.textContent = 'Frame 1 of 5 — click to cycle';

  const dlBtn = document.createElement('button');
  dlBtn.className = 'btn primary';
  dlBtn.textContent = 'Download This Frame';
  dlBtn.onclick = () => {
    const a = document.createElement('a');
    a.download = 'glitch-frame-' + (frameIdx + 1) + '.png';
    a.href = frames[frameIdx];
    a.click();
  };

  const dlAll = document.createElement('button');
  dlAll.className = 'btn';
  dlAll.textContent = 'Download All 5 Frames';
  dlAll.onclick = () => {
    frames.forEach((f, i) => {
      setTimeout(() => {
        const a = document.createElement('a');
        a.download = 'glitch-frame-' + (i + 1) + '.png';
        a.href = f;
        a.click();
      }, i * 200);
    });
  };

  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn';
  closeBtn.textContent = 'Close';
  closeBtn.onclick = () => { clearInterval(anim); overlay.remove(); };

  preview.onclick = () => {
    frameIdx = (frameIdx + 1) % 5;
    preview.src = frames[frameIdx];
    info.textContent = `Frame ${frameIdx + 1} of 5 — click to cycle`;
  };

  overlay.appendChild(preview);
  overlay.appendChild(info);
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;justify-content:center;';
  btnRow.appendChild(dlBtn);
  btnRow.appendChild(dlAll);
  btnRow.appendChild(closeBtn);
  overlay.appendChild(btnRow);
  document.body.appendChild(overlay);

  // Auto-animate
  const anim = setInterval(() => {
    frameIdx = (frameIdx + 1) % 5;
    preview.src = frames[frameIdx];
    info.textContent = `Frame ${frameIdx + 1} of 5 — click to cycle`;
  }, 300);

  btn.disabled = false;
  btn.textContent = 'Export GIF (5 frames)';
}

// Start with generated pattern
generatePattern();
render();
</script>
</body>
</html>
