<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Chaotic Keyboard</title>
<meta name="description" content="Every key you press releases a random animal sound. The keyboard is a zoo. Good luck typing." />
<meta property="og:title" content="Chaotic Keyboard" />
<meta property="og:description" content="Every key you press releases a random animal sound. The keyboard is a zoo. Good luck typing." />
<meta property="og:url" content="https://sloppy.live/chaotic-keyboard/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/cartoon%20keyboard%20with%20animals%20bursting%20out%20of%20the%20keys%20chaotic%20colorful%20cow%20cat%20dog%20duck%20lion%20bee%20chicken%20pig%20bright%20pastel%20background%20chunky%20type%20joyful%20mayhem?width=1200&height=630&model=flux&nologo=true&seed=2424" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;700&family=Caveat:wght@400;700&family=Space+Mono:wght@400;700&display=swap" />
<style>
:root{
  --bg-a: #1d0f3d;
  --bg-b: #3a1a6a;
  --ink: #fff5ec;
  --dim: #c3afea;
  --accent: #ffd54a;
  --pink: #ff5ec8;
  --cyan: #5ee2ff;
  --lime: #b8ff5a;
}
*{ box-sizing: border-box; }
html{ font-size: 100%; }
body{
  margin: 0;
  min-height: 100vh;
  font-family: 'Fredoka', system-ui, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255, 213, 74, 0.20), transparent 70%),
    radial-gradient(ellipse 70% 60% at 100% 100%, rgba(184, 255, 90, 0.18), transparent 70%),
    radial-gradient(ellipse 70% 60% at 0% 100%, rgba(255, 94, 200, 0.20), transparent 70%),
    linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-a) 100%);
  background-attachment: fixed;
  overflow-x: hidden;
  padding: 1.5rem 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}
main{
  width: 100%;
  max-width: 56rem;
  text-align: center;
  position: relative;
  z-index: 1;
}
header h1{
  margin: 0;
  font-family: 'Bungee', cursive;
  font-weight: 400;
  font-size: clamp(2.4rem, 8vw, 5rem);
  line-height: 0.95;
  letter-spacing: -0.005em;
  background: linear-gradient(96deg, #ff5ec8 0%, #ffd54a 35%, #b8ff5a 65%, #5ee2ff 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 6px 0 rgba(0,0,0,0.20);
  filter: drop-shadow(0 4px 0 rgba(0,0,0,0.30));
}
header h1 .e{
  display: inline-block;
  vertical-align: -0.05em;
  background: none;
  -webkit-text-fill-color: initial;
  animation: bobble 2.6s ease-in-out infinite;
}
@keyframes bobble{ 0%,100%{ transform: rotate(-6deg); } 50%{ transform: rotate(6deg); } }
.tag{
  margin: 0.6rem 0 0;
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: clamp(1.1rem, 3vw, 1.7rem);
  color: var(--accent);
}
.tag b{ color: var(--pink); }
.stats{
  margin-top: 0.6rem;
  display: inline-flex;
  gap: 0.6rem;
  flex-wrap: wrap;
  justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: var(--dim);
}
.stats .chip{
  background: rgba(255,255,255,0.10);
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
}
.stats .chip b{ color: var(--ink); }
.controls{
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 0.8rem;
}
.btn{
  background: rgba(0,0,0,0.30);
  color: var(--ink);
  border: 2px solid rgba(255,255,255,0.30);
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: 0.92rem;
  padding: 0.55rem 1rem;
  border-radius: 999px;
  cursor: pointer;
  min-height: 2.75rem;
  letter-spacing: 0.02em;
  transition: transform 0.12s, background 0.18s, border-color 0.18s, color 0.18s;
}
.btn:hover{ background: rgba(0,0,0,0.50); border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
.btn:active{ transform: translateY(1px); }
.btn[aria-pressed="true"]{ background: var(--accent); color: var(--bg-a); border-color: var(--accent); }
*:focus-visible{ outline: 3px solid var(--accent); outline-offset: 3px; }

/* ── CENTER STAGE ── */
.stage{
  margin: 1.2rem auto 0.8rem;
  position: relative;
  width: 100%;
  max-width: 32rem;
  padding: 2.2rem 1.4rem;
  background: rgba(0,0,0,0.30);
  border: 2px solid rgba(255,255,255,0.20);
  border-radius: 18px;
  box-shadow:
    0 0 0 1px rgba(255, 213, 74, 0.18),
    0 12px 30px rgba(0,0,0,0.40);
  min-height: 14rem;
}
.stage .prompt{
  font-family: 'Bungee', cursive;
  color: var(--ink);
  font-size: clamp(1.2rem, 3.5vw, 1.6rem);
  letter-spacing: 0.06em;
}
.stage .prompt small{
  display: block;
  margin-top: 0.4rem;
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--dim);
  letter-spacing: 0;
}
.stage .big-emoji{
  display: block;
  font-size: clamp(5rem, 18vw, 9rem);
  line-height: 1;
  margin: 0.2rem auto 0.6rem;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.45));
  animation: thump 0.45s cubic-bezier(.34,1.40,.50,1);
}
@keyframes thump{
  0%{ transform: scale(0.5) rotate(-12deg); opacity: 0; }
  60%{ transform: scale(1.15) rotate(4deg); opacity: 1; }
  100%{ transform: scale(1) rotate(0); opacity: 1; }
}
.stage .ono{
  font-family: 'Bungee', cursive;
  font-size: clamp(1.4rem, 5vw, 2.2rem);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  text-shadow:
    0 0 18px rgba(255, 213, 74, 0.50),
    0 4px 0 rgba(0,0,0,0.40);
  margin: 0.2rem 0 0.2rem;
}
.stage .name{
  font-family: 'Caveat', cursive;
  font-size: 1.4rem;
  color: var(--dim);
  font-weight: 700;
}
.stage .kbd{
  display: inline-block;
  margin-top: 0.6rem;
  background: rgba(255,255,255,0.10);
  padding: 0.2rem 0.6rem;
  border-radius: 6px;
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  color: var(--dim);
}

/* ── MENAGERIE GRID ── */
.menagerie{
  margin-top: 1rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(5.4rem, 1fr));
  gap: 0.5rem;
  width: 100%;
  max-width: 52rem;
  margin-left: auto;
  margin-right: auto;
}
.beast{
  background: rgba(0,0,0,0.30);
  border: 2px solid rgba(255,255,255,0.16);
  border-radius: 10px;
  padding: 0.55rem 0.4rem 0.45rem;
  text-align: center;
  cursor: pointer;
  transition: transform 0.12s, background 0.18s, border-color 0.18s;
  position: relative;
}
.beast:hover{ background: rgba(0,0,0,0.55); border-color: var(--accent); transform: translateY(-2px); }
.beast.recent{ border-color: var(--pink); box-shadow: 0 0 16px rgba(255, 94, 200, 0.45); }
.beast .em{
  display: block;
  font-size: 1.8rem;
  line-height: 1;
  margin-bottom: 0.18rem;
}
.beast .nm{
  font-family: 'Fredoka', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.04em;
  color: var(--ink);
  font-weight: 700;
  text-transform: lowercase;
}
.beast .ct{
  margin-top: 0.16rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.66rem;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

/* ── FLYING EMOJIS (chaos confetti on keypress) ── */
#confetti{
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  overflow: hidden;
}
.flier{
  position: absolute;
  font-size: 2.2rem;
  user-select: none;
  pointer-events: none;
  animation: fly 1.6s cubic-bezier(.2,.7,.2,1) forwards;
}
@keyframes fly{
  0%{ transform: translate(0,0) rotate(0deg) scale(0.5); opacity: 0; }
  10%{ opacity: 1; transform: translate(0,0) rotate(15deg) scale(1.1); }
  100%{ transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.6); opacity: 0; }
}

footer{
  margin-top: 1.5rem;
  text-align: center;
  color: var(--dim);
  font-family: 'Fredoka', sans-serif;
  font-size: 0.92rem;
}
footer .credit{ color: var(--accent); }

@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; transition: none !important; }
  .stage .big-emoji, .btn:hover, .beast:hover{ transform: none; }
}
</style>
</head>
<body>

<main>
  <header>
    <h1><span class="e">🐄</span> CHAOTIC <span class="e">🐔</span> KEYBOARD <span class="e">🐝</span></h1>
    <p class="tag">every key = a <b>random animal</b> · type at your own risk</p>
    <div class="stats" role="status" aria-live="polite">
      <span class="chip">🐾 total presses · <b id="stat-total">0</b></span>
      <span class="chip">🦁 unique unleashed · <b id="stat-unique">0</b></span>
      <span class="chip">⌨️ most-chaotic key · <b id="stat-key">—</b></span>
    </div>
    <div class="controls">
      <button class="btn" type="button" id="btn-mute" aria-pressed="false">🔊 sound on</button>
      <button class="btn" type="button" id="btn-tame">🐾 release all</button>
      <button class="btn" type="button" id="btn-reset">↺ reset stats</button>
    </div>
  </header>

  <section class="stage" id="stage" aria-label="current animal stage">
    <div class="prompt" id="stage-prompt">
      press <strong style="color: var(--accent);">any key</strong> to release a beast
      <small>(or click anywhere on this card · works on mobile too)</small>
    </div>
  </section>

  <section class="menagerie" id="menagerie" role="list" aria-label="the menagerie · click any to summon"></section>

  <footer>
    <p>16 beasts · all synthesised via Web Audio · <span class="credit">sloppy.live</span></p>
  </footer>
</main>

<div id="confetti" aria-hidden="true"></div>

<script>
/* ────────── CHAOTIC KEYBOARD ──────────
   Every keydown (and pointer-tap on the stage card) releases a random
   animal: synth audio + huge emoji on stage + 12-particle confetti burst
   in the animal's accent colour. All 16 sounds are pure Web Audio
   (oscillators + noise + filters). Track per-animal counts + per-key
   most-pressed leader for the HUD. */

const beasts = [
  { id:'dog',      em:'🐶', name:'Dog',      ono:'WOOF!',     color:'#d2a373',  synth: dog },
  { id:'cat',      em:'🐱', name:'Cat',      ono:'MEOW!',     color:'#ff8fab',  synth: cat },
  { id:'cow',      em:'🐄', name:'Cow',      ono:'MOOO!',     color:'#fff5ec',  synth: cow },
  { id:'chicken',  em:'🐔', name:'Chicken',  ono:'BAWK!',     color:'#fcbf49',  synth: chicken },
  { id:'duck',     em:'🦆', name:'Duck',     ono:'QUACK!',    color:'#80b918',  synth: duck },
  { id:'pig',      em:'🐷', name:'Pig',      ono:'OINK!',     color:'#ffafcc',  synth: pig },
  { id:'sheep',    em:'🐑', name:'Sheep',    ono:'BAAAA!',    color:'#f5f1e3',  synth: sheep },
  { id:'frog',     em:'🐸', name:'Frog',     ono:'CROAK!',    color:'#80b918',  synth: frog },
  { id:'owl',      em:'🦉', name:'Owl',      ono:'HOOO-HOO!', color:'#7a4c1f',  synth: owl },
  { id:'wolf',     em:'🐺', name:'Wolf',     ono:'AWOOOO!',   color:'#9ba3b5',  synth: wolf },
  { id:'lion',     em:'🦁', name:'Lion',     ono:'RRROAR!',   color:'#f4a300',  synth: lion },
  { id:'bee',      em:'🐝', name:'Bee',      ono:'BZZZZ!',    color:'#ffd54a',  synth: bee },
  { id:'horse',    em:'🐎', name:'Horse',    ono:'NEIGH!',    color:'#a96f3f',  synth: horse },
  { id:'penguin',  em:'🐧', name:'Penguin',  ono:'SQUAWK!',   color:'#5ec2ff',  synth: penguin },
  { id:'eagle',    em:'🦅', name:'Eagle',    ono:'SHREEK!',   color:'#d2a373',  synth: eagle },
  { id:'elephant', em:'🐘', name:'Elephant', ono:'PAAARP!',   color:'#b9b6c3',  synth: elephant },
];

const state = {
  total: 0,
  unique: new Set(),
  perBeast: {},     // id -> count
  perKey: {},       // key -> count
  lastBeast: null,
  muted: false,
};

/* ── AUDIO ── */
let audioCtx = null;
function ensureAudio(){
  if (audioCtx) return audioCtx;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch(e){ audioCtx = null; }
  return audioCtx;
}

/* small helpers shared by the synth functions */
function env(g, t0, atk, dur, peak){
  // exponential decay envelope
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(peak, t0 + atk);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + atk + dur);
}
function noise(dur){
  const ac = audioCtx;
  const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * dur), ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  return src;
}
function osc(type, freq){
  const o = audioCtx.createOscillator();
  o.type = type;
  o.frequency.value = freq;
  return o;
}
function biq(type, freq, Q){
  const f = audioCtx.createBiquadFilter();
  f.type = type; f.frequency.value = freq; f.Q.value = Q || 1;
  return f;
}
function jitter(freq, pct){
  return freq * (1 + (Math.random() - 0.5) * pct);
}

/* ── 16 SYNTH FUNCTIONS ──
   Each takes the AudioContext currentTime and renders a short
   characteristic sound (200-1000ms). Designed to be recognisable in
   ~0.5s. Plays through audioCtx.destination directly (no master). */
function dog(t0){
  // bark = sawtooth burst (250→180Hz) + bandpassed noise transient
  const o = osc('sawtooth', jitter(250, 0.06));
  o.frequency.setValueAtTime(jitter(250, 0.06), t0);
  o.frequency.exponentialRampToValueAtTime(jitter(180, 0.06), t0 + 0.16);
  const g = audioCtx.createGain();
  env(g, t0, 0.005, 0.18, 0.25);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 0.22);
  // bite transient
  const n = noise(0.08);
  const f = biq('bandpass', 1500, 5);
  const ng = audioCtx.createGain();
  env(ng, t0, 0.002, 0.07, 0.18);
  n.connect(f); f.connect(ng); ng.connect(audioCtx.destination);
  n.start(t0); n.stop(t0 + 0.09);
}
function cat(t0){
  // meow = sine pitch sweep 800→1100→650 over 0.5s with vibrato
  const o = osc('sine', 800);
  o.frequency.setValueAtTime(jitter(700, 0.06), t0);
  o.frequency.linearRampToValueAtTime(jitter(1100, 0.06), t0 + 0.20);
  o.frequency.linearRampToValueAtTime(jitter(650, 0.06), t0 + 0.55);
  // vibrato via LFO
  const lfo = osc('sine', 6);
  const lfoG = audioCtx.createGain(); lfoG.gain.value = 22;
  lfo.connect(lfoG); lfoG.connect(o.frequency);
  const g = audioCtx.createGain();
  env(g, t0, 0.04, 0.50, 0.12);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 0.60);
  lfo.start(t0); lfo.stop(t0 + 0.60);
}
function cow(t0){
  // moo = low sustained sine 120Hz + sub 60Hz, slight wobble
  const o = osc('sine', jitter(120, 0.04));
  const s = osc('sine', jitter(60, 0.04));
  // slow descending tail
  o.frequency.linearRampToValueAtTime(jitter(110, 0.04), t0 + 0.75);
  const lfo = osc('sine', 3);
  const lfoG = audioCtx.createGain(); lfoG.gain.value = 3;
  lfo.connect(lfoG); lfoG.connect(o.frequency);
  const g = audioCtx.createGain();
  env(g, t0, 0.08, 0.75, 0.22);
  const sg = audioCtx.createGain();
  env(sg, t0, 0.10, 0.75, 0.16);
  o.connect(g); s.connect(sg);
  g.connect(audioCtx.destination); sg.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 0.86);
  s.start(t0); s.stop(t0 + 0.86);
  lfo.start(t0); lfo.stop(t0 + 0.86);
}
function chicken(t0){
  // cluck = 3 short bandpassed-noise bursts ~80ms apart
  for (let i = 0; i < 3; i++){
    const ts = t0 + i * 0.085;
    const n = noise(0.06);
    const f = biq('bandpass', 800 + i * 200, 6);
    const g = audioCtx.createGain();
    env(g, ts, 0.003, 0.05, 0.18);
    n.connect(f); f.connect(g); g.connect(audioCtx.destination);
    n.start(ts); n.stop(ts + 0.07);
  }
  // final "buk-AWK" rising tone
  const o = osc('sawtooth', 600);
  o.frequency.setValueAtTime(600, t0 + 0.26);
  o.frequency.linearRampToValueAtTime(1100, t0 + 0.36);
  const g = audioCtx.createGain();
  env(g, t0 + 0.26, 0.005, 0.10, 0.14);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0 + 0.26); o.stop(t0 + 0.42);
}
function duck(t0){
  // quack = sawtooth 350→260 through vowel-formant bandpass stack
  const o = osc('sawtooth', jitter(350, 0.05));
  o.frequency.setValueAtTime(jitter(380, 0.05), t0);
  o.frequency.linearRampToValueAtTime(jitter(240, 0.05), t0 + 0.20);
  const f1 = biq('bandpass', 800, 8);
  const f2 = biq('bandpass', 1200, 8);
  const g = audioCtx.createGain();
  env(g, t0, 0.008, 0.22, 0.30);
  o.connect(f1); f1.connect(f2); f2.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 0.28);
}
function pig(t0){
  // oink = 2 low grunts ~140ms apart
  for (let i = 0; i < 2; i++){
    const ts = t0 + i * 0.16;
    const o = osc('sawtooth', jitter(180, 0.05));
    o.frequency.setValueAtTime(jitter(200, 0.05), ts);
    o.frequency.exponentialRampToValueAtTime(jitter(140, 0.05), ts + 0.14);
    const f = biq('lowpass', 800, 1.5);
    const g = audioCtx.createGain();
    env(g, ts, 0.01, 0.13, 0.20);
    o.connect(f); f.connect(g); g.connect(audioCtx.destination);
    o.start(ts); o.stop(ts + 0.16);
  }
}
function sheep(t0){
  // bleat = buzzy sawtooth with strong vibrato + amp tremolo
  const o = osc('sawtooth', jitter(320, 0.05));
  // pitch vibrato
  const lfo = osc('sine', 11);
  const lfoG = audioCtx.createGain(); lfoG.gain.value = 38;
  lfo.connect(lfoG); lfoG.connect(o.frequency);
  // amp tremolo
  const trem = osc('sine', 22);
  const tremG = audioCtx.createGain(); tremG.gain.value = 0.10;
  const g = audioCtx.createGain();
  env(g, t0, 0.02, 0.55, 0.16);
  trem.connect(tremG); tremG.connect(g.gain);
  const lp = biq('lowpass', 1600, 1.2);
  o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 0.65);
  lfo.start(t0); lfo.stop(t0 + 0.65);
  trem.start(t0); trem.stop(t0 + 0.65);
}
function frog(t0){
  // croak = lowpassed noise pulsed at 28Hz + a click
  const n = noise(0.42);
  const f = biq('lowpass', 340, 3);
  const trem = osc('sine', 28);
  const tremG = audioCtx.createGain(); tremG.gain.value = 0.16;
  const g = audioCtx.createGain();
  env(g, t0, 0.01, 0.42, 0.22);
  trem.connect(tremG); tremG.connect(g.gain);
  n.connect(f); f.connect(g); g.connect(audioCtx.destination);
  n.start(t0); n.stop(t0 + 0.50);
  trem.start(t0); trem.stop(t0 + 0.50);
}
function owl(t0){
  // hoot = two soft sine pulses "hoo-hoo" 0.34s apart
  for (let i = 0; i < 2; i++){
    const ts = t0 + i * 0.34;
    const o = osc('sine', jitter(330, 0.03));
    const g = audioCtx.createGain();
    env(g, ts, 0.06, 0.24, 0.20);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(ts); o.stop(ts + 0.30);
  }
}
function wolf(t0){
  // howl = long sine 400Hz, slow up to 520 then down to 320 with vibrato
  const o = osc('sine', 400);
  o.frequency.setValueAtTime(jitter(400, 0.04), t0);
  o.frequency.linearRampToValueAtTime(jitter(520, 0.04), t0 + 0.55);
  o.frequency.linearRampToValueAtTime(jitter(330, 0.04), t0 + 1.25);
  const lfo = osc('sine', 4.5);
  const lfoG = audioCtx.createGain(); lfoG.gain.value = 14;
  lfo.connect(lfoG); lfoG.connect(o.frequency);
  const g = audioCtx.createGain();
  env(g, t0, 0.12, 1.20, 0.18);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 1.35);
  lfo.start(t0); lfo.stop(t0 + 1.35);
}
function lion(t0){
  // roar = low sawtooth 80Hz through tanh waveshaper + noise
  const o = osc('sawtooth', jitter(80, 0.04));
  const ws = audioCtx.createWaveShaper();
  const curve = new Float32Array(512);
  for (let i = 0; i < 512; i++){ const x = (i / 256) - 1; curve[i] = Math.tanh(x * 4); }
  ws.curve = curve; ws.oversample = '2x';
  const og = audioCtx.createGain();
  env(og, t0, 0.06, 0.75, 0.30);
  o.connect(ws); ws.connect(og); og.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 0.90);
  // grit noise layer
  const n = noise(0.7);
  const f = biq('bandpass', 600, 1.4);
  const ng = audioCtx.createGain();
  env(ng, t0, 0.06, 0.65, 0.10);
  n.connect(f); f.connect(ng); ng.connect(audioCtx.destination);
  n.start(t0); n.stop(t0 + 0.80);
}
function bee(t0){
  // buzz = sawtooth 200Hz with 65Hz amplitude modulation
  const o = osc('sawtooth', jitter(200, 0.04));
  const mod = osc('sine', 65);
  const modG = audioCtx.createGain(); modG.gain.value = 0.55;
  const g = audioCtx.createGain();
  env(g, t0, 0.02, 0.45, 0.14);
  mod.connect(modG); modG.connect(g.gain);
  const lp = biq('lowpass', 1800, 1);
  o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 0.55);
  mod.start(t0); mod.stop(t0 + 0.55);
}
function horse(t0){
  // whinny = 4 descending sawtooth blips
  const freqs = [620, 540, 460, 380];
  for (let i = 0; i < freqs.length; i++){
    const ts = t0 + i * 0.085;
    const o = osc('sawtooth', freqs[i]);
    o.frequency.setValueAtTime(freqs[i], ts);
    o.frequency.linearRampToValueAtTime(freqs[i] * 0.86, ts + 0.08);
    const lp = biq('lowpass', 1200, 1.5);
    const g = audioCtx.createGain();
    env(g, ts, 0.008, 0.09, 0.18);
    o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    o.start(ts); o.stop(ts + 0.11);
  }
}
function penguin(t0){
  // squawk = mid-band noise + sawtooth 460Hz, very short
  const o = osc('sawtooth', jitter(460, 0.05));
  const og = audioCtx.createGain();
  env(og, t0, 0.005, 0.18, 0.22);
  o.connect(og); og.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 0.22);
  const n = noise(0.18);
  const f = biq('bandpass', 1200, 4);
  const ng = audioCtx.createGain();
  env(ng, t0, 0.005, 0.16, 0.18);
  n.connect(f); f.connect(ng); ng.connect(audioCtx.destination);
  n.start(t0); n.stop(t0 + 0.20);
}
function eagle(t0){
  // screech = highpass noise 3500Hz, sharp attack, short tail
  const n = noise(0.30);
  const hp = biq('highpass', 3000, 1);
  const bp = biq('bandpass', 3800, 6);
  const g = audioCtx.createGain();
  env(g, t0, 0.005, 0.28, 0.16);
  n.connect(hp); hp.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
  n.start(t0); n.stop(t0 + 0.32);
  // descending whistle layer
  const o = osc('sine', 2400);
  o.frequency.setValueAtTime(jitter(2400, 0.04), t0);
  o.frequency.linearRampToValueAtTime(jitter(1600, 0.04), t0 + 0.28);
  const og = audioCtx.createGain();
  env(og, t0, 0.008, 0.26, 0.10);
  o.connect(og); og.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 0.30);
}
function elephant(t0){
  // trumpet = sawtooth 200Hz with bright lowpass that opens up + pitch climb
  const o = osc('sawtooth', jitter(200, 0.04));
  o.frequency.setValueAtTime(jitter(200, 0.04), t0);
  o.frequency.linearRampToValueAtTime(jitter(260, 0.04), t0 + 0.30);
  o.frequency.linearRampToValueAtTime(jitter(220, 0.04), t0 + 0.65);
  const lp = biq('lowpass', 600, 2.4);
  lp.frequency.setValueAtTime(600, t0);
  lp.frequency.linearRampToValueAtTime(1600, t0 + 0.20);
  lp.frequency.linearRampToValueAtTime(900, t0 + 0.65);
  const g = audioCtx.createGain();
  env(g, t0, 0.04, 0.65, 0.24);
  o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 0.75);
}

/* ── ROLL + RELEASE ── */
let lastFireT = 0;
const FIRE_THROTTLE_MS = 40;     // cap super-spam so audio doesn't melt

function release(beast, key){
  state.total++;
  state.perBeast[beast.id] = (state.perBeast[beast.id] || 0) + 1;
  state.unique.add(beast.id);
  if (key){ state.perKey[key] = (state.perKey[key] || 0) + 1; }
  state.lastBeast = beast.id;
  renderStage(beast, key);
  renderStats();
  renderMenagerie();
  spawnConfetti(beast);
  if (!state.muted){
    const ac = ensureAudio();
    if (ac){
      if (ac.state === 'suspended') ac.resume();
      try { beast.synth(ac.currentTime); } catch(e){}
    }
  }
}
function fireRandomBeast(key){
  const now = performance.now();
  if (now - lastFireT < FIRE_THROTTLE_MS) return;
  lastFireT = now;
  // pick a random beast, but avoid repeating the immediately-previous one
  let pool = beasts;
  if (state.lastBeast && beasts.length > 1){
    pool = beasts.filter(b => b.id !== state.lastBeast);
  }
  const beast = pool[(Math.random() * pool.length) | 0];
  release(beast, key);
}
function fireSpecificBeast(id){
  const beast = beasts.find(b => b.id === id);
  if (!beast) return;
  release(beast, null);
}

/* ── STAGE ── */
const stageEl = document.getElementById('stage');
function renderStage(beast, key){
  // prompt fades after first press
  const keyLabel = key ? prettyKey(key) : '(menagerie tap)';
  stageEl.innerHTML = `
    <div class="big-emoji" aria-hidden="true">${beast.em}</div>
    <div class="ono" style="color: ${beast.color}; text-shadow: 0 0 20px ${beast.color}80, 0 4px 0 rgba(0,0,0,0.40);">${beast.ono}</div>
    <div class="name">${beast.name} · #${state.perBeast[beast.id]}</div>
    <div class="kbd">key: <b style="color: var(--accent);">${escapeHtml(keyLabel)}</b></div>
  `;
}
function prettyKey(k){
  if (k === ' ') return 'SPACE';
  if (k === 'Enter') return 'ENTER';
  if (k === 'Backspace') return 'BACKSPACE';
  if (k === 'Tab') return 'TAB';
  if (k === 'Escape') return 'ESC';
  if (k === 'Shift') return 'SHIFT';
  if (k === 'Control') return 'CTRL';
  if (k === 'Alt') return 'ALT';
  if (k === 'Meta') return 'CMD';
  if (k.startsWith('Arrow')) return k.replace('Arrow', '').toUpperCase();
  return k.toUpperCase();
}
function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── STATS ── */
function renderStats(){
  document.getElementById('stat-total').textContent = state.total;
  document.getElementById('stat-unique').textContent = state.unique.size + ' / ' + beasts.length;
  // find most-pressed key
  let bestK = '—', bestN = 0;
  for (const k in state.perKey){
    if (state.perKey[k] > bestN){ bestN = state.perKey[k]; bestK = k; }
  }
  document.getElementById('stat-key').textContent = (bestK === '—') ? '—' : (prettyKey(bestK) + ' (×' + bestN + ')');
}

/* ── MENAGERIE GRID ── */
const menEl = document.getElementById('menagerie');
function renderMenagerie(){
  menEl.innerHTML = '';
  for (const b of beasts){
    const card = document.createElement('div');
    card.className = 'beast' + (state.lastBeast === b.id ? ' recent' : '');
    card.setAttribute('role', 'listitem');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', 'summon ' + b.name);
    card.title = b.name + ' · click to summon';
    card.innerHTML = `
      <span class="em">${b.em}</span>
      <span class="nm">${b.name}</span>
      <span class="ct">× ${state.perBeast[b.id] || 0}</span>
    `;
    card.addEventListener('click', () => fireSpecificBeast(b.id));
    card.addEventListener('keydown', (e) => {
      if (e.code === 'Enter' || e.code === 'Space'){ e.preventDefault(); fireSpecificBeast(b.id); }
    });
    menEl.appendChild(card);
  }
}
renderMenagerie();
renderStats();

/* ── CONFETTI (chaos emoji bursts) ── */
const confettiRoot = document.getElementById('confetti');
function spawnConfetti(beast){
  // spawn 8-14 fliers from a point near the centre stage
  const rect = stageEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2 + (Math.random() - 0.5) * rect.width * 0.3;
  const cy = rect.top + rect.height / 2 + (Math.random() - 0.5) * rect.height * 0.2;
  const n = 8 + ((Math.random() * 7) | 0);
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2;
    const dist = 120 + Math.random() * 260;
    const f = document.createElement('div');
    f.className = 'flier';
    f.textContent = beast.em;
    f.style.left = cx + 'px';
    f.style.top = cy + 'px';
    f.style.setProperty('--dx', (Math.cos(a) * dist).toFixed(0) + 'px');
    f.style.setProperty('--dy', (Math.sin(a) * dist + (Math.random() * 80)).toFixed(0) + 'px');
    f.style.setProperty('--rot', ((Math.random() - 0.5) * 720).toFixed(0) + 'deg');
    f.style.fontSize = (1.6 + Math.random() * 1.4) + 'rem';
    f.style.animationDelay = (Math.random() * 0.08) + 's';
    confettiRoot.appendChild(f);
    setTimeout(() => f.remove(), 1700);
  }
}

/* ── KEY + POINTER LISTENERS ──
   Listen on the window for ALL keydown — even modifier keys and arrows
   release a beast. Repeat events (keydown firing rapidly while held) fire
   throttled by FIRE_THROTTLE_MS so audio doesn't pile up.
   Pointer-tap on the stage card also releases a random beast — friendly
   for touch + mouse-only users. */
window.addEventListener('keydown', (e) => {
  // ignore when modifier-only chord (e.g. Cmd+R) so we don't interfere with reload
  if ((e.ctrlKey || e.metaKey) && !e.repeat && e.key !== 'Control' && e.key !== 'Meta' && e.key.length === 1){
    // single-char with modifier — let the browser handle (refresh etc) but
    // STILL fire a sound so chat hears the chaos
  }
  fireRandomBeast(e.key);
});
stageEl.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  fireRandomBeast(null);
});

/* ── CONTROLS ── */
document.getElementById('btn-mute').addEventListener('click', (e) => {
  state.muted = !state.muted;
  const b = e.currentTarget;
  b.setAttribute('aria-pressed', String(state.muted));
  b.textContent = state.muted ? '🔇 muted' : '🔊 sound on';
});
document.getElementById('btn-tame').addEventListener('click', () => {
  // "release all" = a stampede of every beast, staggered ~80ms apart
  const ac = ensureAudio();
  if (ac && ac.state === 'suspended') ac.resume();
  for (let i = 0; i < beasts.length; i++){
    setTimeout(() => release(beasts[i], null), i * 95);
  }
});
document.getElementById('btn-reset').addEventListener('click', () => {
  state.total = 0;
  state.unique = new Set();
  state.perBeast = {};
  state.perKey = {};
  state.lastBeast = null;
  stageEl.innerHTML = `
    <div class="prompt">
      press <strong style="color: var(--accent);">any key</strong> to release a beast
      <small>(or click anywhere on this card · works on mobile too)</small>
    </div>
  `;
  renderStats();
  renderMenagerie();
});
</script>
</body>
</html>
