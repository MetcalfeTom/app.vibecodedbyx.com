<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>OBS CLI — minimal scene-switcher terminal</title>
<meta name="description" content="A minimalist web-based CLI dashboard for a fake OBS studio. Scene transitions, recording, mic toggle, all from the command line.">
<meta property="og:title" content="OBS CLI">
<meta property="og:description" content="Minimal web-based CLI for a fake OBS studio. Type 'help' to begin.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/obs-cli/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimal%20phosphor%20green%20terminal%20on%20black%20background%20with%20OBS%20scene%20switching%20commands%20clean%20typography%20centered?width=1200&height=630&model=flux&nologo=true&seed=66603">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%9B%EF%B8%8F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04060a;
  --grid:#0c1014;
  --green:#7aff94;
  --green-bright:#a8ffba;
  --green-dim:#3a8a4a;
  --amber:#ffb45a;
  --rose:#ff5d7a;
  --dim:rgba(122,255,148,0.55);
  --faint:rgba(122,255,148,0.30);
  --line: rgba(122,255,148,0.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100vh;overflow:hidden;background:var(--bg);color:var(--green);font-family:'IBM Plex Mono', monospace;font-size:13px;line-height:1.45}
body{
  background:
    radial-gradient(70vmin 60vmin at 50% 100%, rgba(122,255,148,0.06), transparent 70%),
    var(--bg);
  text-shadow: 0 0 1.5px rgba(122,255,148,0.4);
}
body::before{
  content:''; position:fixed; inset:0; z-index:50; pointer-events:none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0 1px, transparent 1px 3px);
  mix-blend-mode: multiply;
}
body::after{
  content:''; position:fixed; inset:0; z-index:51; pointer-events:none;
  background: radial-gradient(110vmin 110vmin at 50% 50%, transparent 55%, rgba(0,0,0,0.6) 100%);
}

.app{
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  padding: .8rem 1rem;
  gap:.5rem;
  z-index:1;
}

/* status strip */
.status{
  display:flex; gap: 1.1rem; flex-wrap: wrap;
  align-items: baseline;
  padding-bottom: .5rem;
  border-bottom: 1px dashed var(--line);
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.status .it{ color: var(--dim); }
.status .it b{
  color: var(--green-bright); font-weight: 500;
  letter-spacing: .04em; margin-left:.4em;
  text-transform: none;
}
.status .it.live b{ color: var(--rose); text-transform: uppercase; }
.status .it.rec  b{ color: var(--amber); text-transform: uppercase; }
.status .it.mic-off b{ color: var(--rose); }
.status .dot{
  display:inline-block; width: .55em; height:.55em; border-radius:50%;
  background: var(--green-dim); margin-right: .3em; vertical-align: middle;
}
.status .it.live .dot{
  background: var(--rose);
  box-shadow: 0 0 6px var(--rose);
  animation: liveBlink 1.4s steps(2,end) infinite;
}
.status .it.rec .dot{
  background: var(--amber);
  box-shadow: 0 0 5px var(--amber);
  animation: liveBlink 2s steps(2,end) infinite;
}
@keyframes liveBlink { 0%{opacity:1} 50%{opacity:.3} }

/* current scene preview "card" — pure ascii block */
.preview{
  border: 1px solid var(--line);
  padding: .65rem .9rem;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 1rem;
  align-items: center;
  background: linear-gradient(180deg, rgba(122,255,148,0.04), rgba(122,255,148,0));
}
.preview .label{
  font-size: 11px; letter-spacing: .25em; text-transform: uppercase; color: var(--dim);
}
.preview .name{
  font-family: 'IBM Plex Mono', monospace; font-weight: 700;
  font-size: 18px;
  color: var(--green-bright);
  letter-spacing: .04em;
}
.preview .name .ax{ color: var(--amber); margin-right:.4em; }
.preview .vu{
  display: flex; gap: 2px; align-items: flex-end;
  height: 28px; width: 80px;
}
.preview .vu .b{
  flex:1; min-width:3px;
  background: var(--green);
  border-radius: 0;
  transition: height .12s linear, background .12s;
  height: 10%;
}
.preview .vu .b.amb{ background: var(--amber); }
.preview .vu .b.red{ background: var(--rose); }
.preview.muted .vu{ opacity:.18; }
.preview.muted .name::after{ content:' · MIC MUTED'; color: var(--rose); font-size: 11px; letter-spacing: .2em; margin-left:.6em; }
.preview.transition .name{ animation: flicker .3s steps(2,end) 4; }
@keyframes flicker { 0%,100%{opacity:1} 50%{opacity:.35} }

/* log feed */
.log{
  flex:1; overflow-y: auto; overflow-x: hidden;
  padding-right: .3rem;
  scrollbar-width: thin;
  scrollbar-color: var(--green-dim) transparent;
}
.log::-webkit-scrollbar{ width: 6px; }
.log::-webkit-scrollbar-thumb{ background: var(--green-dim); border-radius: 3px; }
.log .ln{
  white-space: pre-wrap; word-break: break-word;
  font-size: 13px;
  padding: 1px 0;
}
.log .ln .ts  { color: var(--green-dim); }
.log .ln.cmd  { color: var(--green-bright); }
.log .ln.cmd::before{ content: '>'; color: var(--amber); margin-right: .35em; }
.log .ln.info { color: var(--green); }
.log .ln.warn { color: var(--amber); }
.log .ln.err  { color: var(--rose); }
.log .ln.dim  { color: var(--green-dim); }
.log .ln .acc { color: var(--amber); }
.log .ln .sc  { color: var(--green-bright); }

/* prompt */
.prompt-row{
  display: flex; align-items: baseline; gap: .5rem;
  border-top: 1px dashed var(--line);
  padding-top: .55rem;
  font-size: 13px;
}
.prompt-row .ps{
  color: var(--amber); font-weight: 700;
  flex-shrink: 0;
}
.prompt-row form{ flex:1; display: flex; align-items: baseline; }
.prompt-row input{
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--green-bright);
  font: inherit; font-weight: 500;
  padding: 0;
  text-shadow: inherit;
  caret-color: var(--green-bright);
}
.prompt-row input::selection{ background: rgba(122,255,148,0.2); }
.prompt-row .hint{
  color: var(--faint); font-size: 11px;
  letter-spacing: .12em; text-transform: uppercase;
}

/* mobile-friendly */
@media (max-width: 560px){
  .status{ font-size: 10.5px; gap: .7rem; }
  .preview .name{ font-size: 15px; }
  .preview .vu{ width: 60px; height: 22px; }
  .log .ln{ font-size: 12.5px; }
}
@media (prefers-reduced-motion: reduce){
  .status .it.live .dot, .status .it.rec .dot, .preview.transition .name{ animation: none; }
}
</style>
</head>
<body>
<main class="app" role="application" aria-label="OBS command-line dashboard mockup">

  <!-- status strip -->
  <header class="status" role="status" aria-live="polite">
    <span class="it" id="st-scene"><span class="dot"></span>scene<b id="v-scene">intro</b></span>
    <span class="it" id="st-live"><span class="dot"></span>stream<b id="v-stream">idle</b></span>
    <span class="it" id="st-rec"><span class="dot"></span>rec<b id="v-rec">off</b></span>
    <span class="it">uptime<b id="v-uptime">00:00:00</b></span>
    <span class="it">bitrate<b id="v-bitrate">0 kbps</b></span>
    <span class="it">drop<b id="v-dropped">0</b></span>
    <span class="it" id="st-mic">mic<b id="v-mic">on</b></span>
  </header>

  <!-- current scene preview -->
  <div class="preview" id="preview">
    <span class="label">now showing</span>
    <span class="name" id="now-name"><span class="ax">▸</span>intro</span>
    <span class="vu" id="vu"></span>
  </div>

  <!-- log feed -->
  <div class="log" id="log" aria-live="polite"></div>

  <!-- input -->
  <div class="prompt-row">
    <span class="ps">obs&gt;</span>
    <form id="form" autocomplete="off">
      <input id="cmd" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="OBS command input"/>
    </form>
    <span class="hint">help · tab · ↑↓</span>
  </div>
</main>

<script>
'use strict';

// ─── state ───────────────────────────────────────────────────────────
const SCENES = [
  { id: 'intro',     sources: ['logo overlay', 'lower-third', 'bgm bed'] },
  { id: 'gameplay',  sources: ['game capture', 'webcam', 'chat overlay', 'mic'] },
  { id: 'webcam',    sources: ['webcam (full)', 'bgm bed', 'mic'] },
  { id: 'brb',       sources: ['brb card', 'looping music'] },
  { id: 'desktop',   sources: ['screen capture', 'webcam (corner)', 'mic'] },
  { id: 'outro',     sources: ['outro card', 'credits ticker', 'bgm fade'] },
];

const state = {
  scene: 'intro',
  streaming: false,
  recording: false,
  mic: 'on',           // 'on' | 'off'
  bitrate: 0,          // kbps
  dropped: 0,
  streamStart: null,   // ms when stream went live
  transitioning: false,
  hist: [],            // command history
  histPos: 0,
};

// ─── DOM refs ─────────────────────────────────────────────────────────
const $log = document.getElementById('log');
const $cmd = document.getElementById('cmd');
const $form = document.getElementById('form');
const $preview = document.getElementById('preview');
const $nowName = document.getElementById('now-name');

// status DOM
const D = {
  scene:  document.getElementById('v-scene'),
  stream: document.getElementById('v-stream'),
  rec:    document.getElementById('v-rec'),
  uptime: document.getElementById('v-uptime'),
  bitrate:document.getElementById('v-bitrate'),
  dropped:document.getElementById('v-dropped'),
  mic:    document.getElementById('v-mic'),
};
const Ds = {
  live: document.getElementById('st-live'),
  rec:  document.getElementById('st-rec'),
  mic:  document.getElementById('st-mic'),
};

// ─── log helpers ─────────────────────────────────────────────────────
function tsStr(){
  const d = new Date();
  const z = n => String(n).padStart(2, '0');
  return z(d.getHours()) + ':' + z(d.getMinutes()) + ':' + z(d.getSeconds());
}
function logLine(html, cls){
  const div = document.createElement('div');
  div.className = 'ln' + (cls ? ' ' + cls : '');
  div.innerHTML = `<span class="ts">[${tsStr()}]</span> ` + html;
  $log.appendChild(div);
  // cap to last 400 lines
  while ($log.children.length > 400) $log.removeChild($log.firstChild);
  $log.scrollTop = $log.scrollHeight;
}
function logRaw(html, cls){
  const div = document.createElement('div');
  div.className = 'ln' + (cls ? ' ' + cls : '');
  div.innerHTML = html;
  $log.appendChild(div);
  $log.scrollTop = $log.scrollHeight;
}

function esc(s){
  return String(s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
}

// ─── status renderer ────────────────────────────────────────────────
function render(){
  D.scene.textContent = state.scene;
  D.stream.textContent = state.streaming ? 'LIVE' : 'idle';
  Ds.live.classList.toggle('live', state.streaming);
  D.rec.textContent = state.recording ? 'REC' : 'off';
  Ds.rec.classList.toggle('rec', state.recording);
  D.mic.textContent = state.mic;
  Ds.mic.classList.toggle('mic-off', state.mic === 'off');
  D.bitrate.textContent = state.bitrate + ' kbps';
  D.dropped.textContent = state.dropped;
  // uptime
  if (state.streamStart){
    const sec = Math.floor((Date.now() - state.streamStart) / 1000);
    const z = n => String(n).padStart(2, '0');
    D.uptime.textContent = z(Math.floor(sec/3600)) + ':' + z(Math.floor(sec/60)%60) + ':' + z(sec%60);
  } else {
    D.uptime.textContent = '00:00:00';
  }
  // preview
  $nowName.innerHTML = `<span class="ax">▸</span>${esc(state.scene)}`;
  $preview.classList.toggle('muted', state.mic === 'off');
}
render();

// uptime + bitrate jitter
setInterval(() => {
  if (state.streaming){
    state.bitrate = Math.max(2200, Math.min(8400, state.bitrate + Math.round((Math.random() - 0.45) * 220)));
    if (Math.random() < 0.04) state.dropped += Math.round(Math.random() * 3);
    render();
  }
}, 1000);

// vu meter
const $vu = document.getElementById('vu');
const VU_BARS = 8;
for (let i = 0; i < VU_BARS; i++){
  const b = document.createElement('span');
  b.className = 'b';
  $vu.appendChild(b);
}
setInterval(() => {
  const bars = $vu.children;
  for (let i = 0; i < bars.length; i++){
    let h = 8;
    if (state.mic === 'on'){
      // gentle level signal: ~20-50% with occasional spikes
      h = 20 + Math.random() * 30 + (Math.random() < 0.18 ? Math.random() * 50 : 0);
    } else {
      h = 4 + Math.random() * 4;
    }
    bars[i].style.height = Math.min(100, h) + '%';
    bars[i].classList.toggle('amb', h > 65);
    bars[i].classList.toggle('red', h > 88);
  }
}, 110);

// ─── command handler ─────────────────────────────────────────────────
const HELP = [
  { c: 'help',                     d: 'show this list' },
  { c: 'scene list',               d: 'list available scenes' },
  { c: 'scene <name>',             d: 'transition to <name> (defaults to cut)' },
  { c: 'cut <name>',               d: 'hard-cut to <name>' },
  { c: 'fade <name> [ms]',         d: 'fade to <name> over [ms] (default 800)' },
  { c: 'sources [scene]',          d: 'list sources for current or named scene' },
  { c: 'start',                    d: 'start streaming' },
  { c: 'stop',                     d: 'stop streaming' },
  { c: 'record start | stop',      d: 'toggle recording' },
  { c: 'mic on | off | toggle',    d: 'control microphone' },
  { c: 'status',                   d: 'print current status' },
  { c: 'clear',                    d: 'clear the log' },
  { c: 'tip',                      d: 'random streaming tip' },
];

const TIPS = [
  'rule of thirds applies even at 4 AM',
  'always pre-flight the brb scene before going live',
  "if you can\'t hear yourself, your audience can\'t either",
  'soft cuts under 200 ms are perceived as instantaneous',
  'leave 6 dB of headroom — the loud bits get louder',
  'always have a "be right back" scene loaded and tested',
  "your overlays look fine; trust the framing, not the preview",
  'set a 3-second pre-roll buffer for transitions to nowhere',
];

const ALIASES = {
  'switch': 'scene',
  'go':     'scene',
};

const COMPLETIONS = [
  'help','scene','cut','fade','sources','start','stop','record','mic','status','clear','tip',
  ...SCENES.map(s => s.id),
];

function findScene(name){
  if (!name) return null;
  return SCENES.find(s => s.id === name.toLowerCase()) || null;
}

function runCmd(raw){
  const trim = raw.trim();
  if (!trim) return;
  logLine('<span class="cmd">' + esc(trim) + '</span>', 'cmd');
  const parts = trim.split(/\s+/);
  let head = parts[0].toLowerCase();
  if (ALIASES[head]) head = ALIASES[head];
  const args = parts.slice(1);
  try {
    switch (head){
      case 'help':         cmdHelp(); break;
      case 'scene':        cmdScene(args); break;
      case 'cut':          cmdCut(args); break;
      case 'fade':         cmdFade(args); break;
      case 'sources':      cmdSources(args); break;
      case 'start':        cmdStart(); break;
      case 'stop':         cmdStop(); break;
      case 'record':       cmdRecord(args); break;
      case 'mic':          cmdMic(args); break;
      case 'status':       cmdStatus(); break;
      case 'clear':        $log.innerHTML = ''; break;
      case 'tip':          logLine('<span class="acc">tip:</span> ' + TIPS[Math.floor(Math.random() * TIPS.length)], 'info'); break;
      default:
        logLine(`unknown command: <span class="acc">${esc(head)}</span>. type <span class="acc">help</span>.`, 'err');
    }
  } catch(e){
    logLine('error: ' + esc(e.message), 'err');
  }
  render();
}

function cmdHelp(){
  logLine('available commands:', 'info');
  for (const h of HELP){
    logRaw(`  <span class="acc">${esc(h.c.padEnd(28))}</span> ${esc(h.d)}`, 'dim');
  }
  logLine('tab completes commands &amp; scene names; ↑/↓ recall history', 'dim');
}

function cmdScene(args){
  if (!args.length || args[0] === 'list'){
    if (!args.length) {
      // bare "scene" → show current + suggest
      logLine(`current scene: <span class="sc">${esc(state.scene)}</span>`, 'info');
      logLine('try: <span class="acc">scene list</span> or <span class="acc">scene gameplay</span>', 'dim');
      return;
    }
    logLine('scenes:', 'info');
    for (const s of SCENES){
      const m = s.id === state.scene ? '▸ ' : '  ';
      logRaw(`  <span class="acc">${m}</span><span class="sc">${esc(s.id.padEnd(12))}</span><span class="dim">${esc(s.sources.length)} sources</span>`, 'dim');
    }
    return;
  }
  // scene <name>: default to a fade
  cmdFade([args[0], '450']);
}
function cmdCut(args){
  const target = findScene(args[0]);
  if (!target) return logLine(`no such scene: <span class="acc">${esc(args[0] || '?')}</span>`, 'err');
  if (target.id === state.scene) return logLine(`already on <span class="sc">${esc(target.id)}</span>`, 'warn');
  const from = state.scene;
  state.scene = target.id;
  state.transitioning = true;
  $preview.classList.add('transition');
  setTimeout(() => { state.transitioning = false; $preview.classList.remove('transition'); render(); }, 250);
  logLine(`cut: <span class="sc">${esc(from)}</span> → <span class="sc">${esc(target.id)}</span>`, 'info');
  render();
}
function cmdFade(args){
  const target = findScene(args[0]);
  if (!target) return logLine(`no such scene: <span class="acc">${esc(args[0] || '?')}</span>`, 'err');
  if (target.id === state.scene) return logLine(`already on <span class="sc">${esc(target.id)}</span>`, 'warn');
  let ms = parseInt(args[1] || '800', 10);
  if (!isFinite(ms) || ms < 50 || ms > 5000) ms = 800;
  const from = state.scene;
  logLine(`fading: <span class="sc">${esc(from)}</span> → <span class="sc">${esc(target.id)}</span> · ${ms}ms`, 'info');
  state.transitioning = true;
  $preview.classList.add('transition');
  // change mid-fade so the flicker animation feels coherent
  setTimeout(() => {
    state.scene = target.id;
    render();
  }, Math.max(60, Math.floor(ms / 2)));
  setTimeout(() => {
    state.transitioning = false;
    $preview.classList.remove('transition');
    logLine(`fade done.`, 'dim');
    render();
  }, ms);
}
function cmdSources(args){
  const target = args.length ? findScene(args[0]) : findScene(state.scene);
  if (!target) return logLine(`no such scene: <span class="acc">${esc(args[0])}</span>`, 'err');
  logLine(`sources for <span class="sc">${esc(target.id)}</span>:`, 'info');
  for (const s of target.sources){
    logRaw(`  <span class="acc">·</span> ${esc(s)}`, 'dim');
  }
}
function cmdStart(){
  if (state.streaming) return logLine('stream is already <span class="acc">LIVE</span>', 'warn');
  logLine('starting stream… handshake → rtmp://ingest.sloppy.live/live', 'dim');
  setTimeout(() => {
    state.streaming = true;
    state.streamStart = Date.now();
    state.bitrate = 5200 + Math.floor(Math.random() * 1200);
    state.dropped = 0;
    logLine('stream <span class="acc">LIVE</span> · 1080p60 · bitrate ' + state.bitrate + ' kbps', 'info');
    render();
  }, 380);
}
function cmdStop(){
  if (!state.streaming) return logLine('not streaming', 'warn');
  state.streaming = false;
  state.streamStart = null;
  state.bitrate = 0;
  logLine('stream stopped. dropped frames: ' + state.dropped, 'info');
}
function cmdRecord(args){
  const a = (args[0] || '').toLowerCase();
  if (a === 'start' || (a === '' && !state.recording)){
    if (state.recording) return logLine('already recording', 'warn');
    state.recording = true;
    logLine('recording started → ~/recordings/' + new Date().toISOString().slice(0,10) + '.mkv', 'info');
  } else if (a === 'stop' || (a === '' && state.recording)){
    if (!state.recording) return logLine('not recording', 'warn');
    state.recording = false;
    logLine('recording stopped. saved.', 'info');
  } else {
    logLine('usage: <span class="acc">record start | stop</span>', 'dim');
  }
}
function cmdMic(args){
  const a = (args[0] || '').toLowerCase();
  if (a === 'on')     { state.mic = 'on';  logLine('mic on', 'info'); }
  else if (a === 'off'){ state.mic = 'off'; logLine('mic off', 'warn'); }
  else if (a === 'toggle' || a === ''){
    state.mic = state.mic === 'on' ? 'off' : 'on';
    logLine('mic ' + state.mic, state.mic === 'off' ? 'warn' : 'info');
  } else {
    logLine('usage: <span class="acc">mic on | off | toggle</span>', 'dim');
  }
}
function cmdStatus(){
  logLine('—— STATUS ——', 'info');
  logLine(`scene    : <span class="sc">${esc(state.scene)}</span>`, 'dim');
  logLine(`stream   : ${state.streaming ? '<span class="acc">LIVE</span>' : 'idle'}`, 'dim');
  logLine(`recording: ${state.recording ? '<span class="acc">REC</span>' : 'off'}`, 'dim');
  logLine(`mic      : ${state.mic}`, 'dim');
  if (state.streaming){
    logLine(`bitrate  : ${state.bitrate} kbps`, 'dim');
    logLine(`dropped  : ${state.dropped} frames`, 'dim');
    logLine(`uptime   : ${D.uptime.textContent}`, 'dim');
  }
  logLine('————————————', 'info');
}

// ─── input handlers (history, tab completion) ────────────────────────
$form.addEventListener('submit', (e) => {
  e.preventDefault();
  const v = $cmd.value;
  state.hist.push(v);
  if (state.hist.length > 80) state.hist.shift();
  state.histPos = state.hist.length;
  $cmd.value = '';
  runCmd(v);
});
$cmd.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp'){
    if (!state.hist.length) return;
    state.histPos = Math.max(0, state.histPos - 1);
    $cmd.value = state.hist[state.histPos] || '';
    e.preventDefault();
  } else if (e.key === 'ArrowDown'){
    if (!state.hist.length) return;
    state.histPos = Math.min(state.hist.length, state.histPos + 1);
    $cmd.value = state.hist[state.histPos] || '';
    e.preventDefault();
  } else if (e.key === 'Tab'){
    e.preventDefault();
    const cur = $cmd.value;
    // complete on current cursor word
    const parts = cur.split(/\s+/);
    const tail = parts[parts.length - 1].toLowerCase();
    if (!tail) return;
    const matches = COMPLETIONS.filter(w => w.startsWith(tail));
    if (matches.length === 1){
      parts[parts.length - 1] = matches[0];
      $cmd.value = parts.join(' ') + (parts.length === 1 ? ' ' : '');
    } else if (matches.length > 1){
      logLine('tab: ' + matches.map(m => '<span class="acc">' + m + '</span>').join('   '), 'dim');
    }
  } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'l'){
    e.preventDefault();
    $log.innerHTML = '';
  }
});

// keep input focused
window.addEventListener('click', (e) => {
  // don't steal focus from text selections inside the log
  if (window.getSelection && window.getSelection().toString().length) return;
  $cmd.focus();
});
$cmd.focus();

// ─── boot banner ────────────────────────────────────────────────────
logRaw('────────────────────────────────────────────', 'dim');
logRaw('<span class="acc">OBS</span> · cli interface · build 0.1.0 · sloppy ops', 'info');
logRaw('type <span class="acc">help</span> for commands · <span class="acc">tab</span> completes · <span class="acc">↑↓</span> recalls history', 'dim');
logRaw('────────────────────────────────────────────', 'dim');
logLine('idle. scene loaded: <span class="sc">intro</span>. ready.', 'info');
</script>
