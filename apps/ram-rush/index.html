<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAM RUSH</title>
<link rel="icon" href="https://emojicdn.elk.sh/📈">
<meta property="og:title" content="RAM RUSH">
<meta property="og:description" content="Trade DDR4, DDR5, and volatile RAM stocks in a neon market sim. Buy low, sell high, don't go broke.">
<meta property="og:url" content="https://sloppy.live/ram-rush">
<meta property="og:image" content="https://sloppy.live/ram-rush/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Azeret+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#06060f;
  min-height:100vh;
  font-family:'Azeret Mono',monospace;
  color:#c8c8e0;
  overflow-x:hidden;
}

header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
#logo{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(16px,4vw,24px);
  font-weight:900;
  background:linear-gradient(135deg,#00ff88,#00ddff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:3px;
}
#portfolio{display:flex;gap:16px;align-items:center;font-size:12px}
#cash{color:#00ff88}
#holdings-val{color:#00ddff}
#day{color:rgba(200,200,224,0.4)}

/* Ticker bar */
#ticker{
  display:flex;gap:12px;padding:8px 16px;
  overflow-x:auto;border-bottom:1px solid rgba(255,255,255,0.03);
}
#ticker::-webkit-scrollbar{height:0}
.tick{
  flex-shrink:0;
  padding:6px 12px;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:6px;
  cursor:pointer;
  transition:all 0.15s;
  font-size:11px;
  min-width:110px;
}
.tick:hover{border-color:rgba(255,255,255,0.15)}
.tick.active{border-color:var(--c);box-shadow:0 0 12px var(--glow)}
.tick .sym{font-weight:600;font-size:13px}
.tick .price{margin-top:2px}
.tick .change{font-size:10px}
.tick .change.up{color:#00ff88}
.tick .change.down{color:#ff4466}

/* Chart */
#chart-wrap{
  position:relative;
  height:min(40vh,320px);
  padding:12px 16px;
}
canvas#chart{width:100%;height:100%;display:block}
#chart-label{
  position:absolute;top:16px;left:24px;
  font-family:'Orbitron',sans-serif;
  font-size:18px;font-weight:700;
  pointer-events:none;
}
#chart-price{
  position:absolute;top:40px;left:24px;
  font-size:24px;font-weight:600;
  pointer-events:none;
}
#chart-change{
  position:absolute;top:68px;left:24px;
  font-size:12px;
  pointer-events:none;
}

/* Trade panel */
#trade{
  padding:12px 16px;
  display:flex;gap:8px;align-items:center;
  flex-wrap:wrap;
  border-top:1px solid rgba(255,255,255,0.03);
}
#trade label{font-size:11px;color:rgba(200,200,224,0.4)}
#qty{
  width:60px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:4px;padding:5px 8px;
  color:#c8c8e0;font-family:'Azeret Mono',monospace;
  font-size:13px;outline:none;text-align:center;
}
#qty:focus{border-color:rgba(0,255,136,0.3)}
.trade-btn{
  padding:6px 18px;border:none;border-radius:6px;
  font-family:'Azeret Mono',monospace;font-size:12px;
  font-weight:600;cursor:pointer;transition:all 0.15s;
  letter-spacing:1px;
}
#buy-btn{background:#00ff8822;color:#00ff88;border:1px solid #00ff8844}
#buy-btn:hover{background:#00ff8833}
#sell-btn{background:#ff446622;color:#ff4466;border:1px solid #ff446644}
#sell-btn:hover{background:#ff446633}
#max-btn{
  background:none;border:1px solid rgba(255,255,255,0.08);
  color:rgba(200,200,224,0.4);font-family:'Azeret Mono',monospace;
  font-size:10px;padding:4px 8px;border-radius:4px;cursor:pointer;
}
#max-btn:hover{color:#c8c8e0;border-color:rgba(255,255,255,0.2)}
#trade-msg{font-size:11px;min-height:16px;margin-left:8px}

/* Holdings */
#holdings{
  padding:8px 16px 16px;
}
#holdings h3{
  font-size:11px;color:rgba(200,200,224,0.3);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:8px;
}
#holdings-list{display:flex;flex-direction:column;gap:4px}
.hold-row{
  display:flex;align-items:center;gap:10px;
  padding:6px 10px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.03);
  border-radius:6px;font-size:12px;
}
.hold-sym{font-weight:600;width:50px}
.hold-qty{color:rgba(200,200,224,0.5);width:40px}
.hold-val{flex:1;text-align:right}
.hold-pnl{width:80px;text-align:right;font-weight:600}
.hold-pnl.up{color:#00ff88}
.hold-pnl.down{color:#ff4466}

/* News */
#news{
  padding:8px 16px 24px;
}
#news h3{
  font-size:11px;color:rgba(200,200,224,0.3);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:6px;
}
#news-feed{font-size:11px;color:rgba(200,200,224,0.4);line-height:1.6}
.news-item{margin-bottom:4px}
.news-item .time{color:rgba(200,200,224,0.2)}
.news-item.bullish{color:#00ff88aa}
.news-item.bearish{color:#ff4466aa}

/* Speed */
#speed-wrap{
  display:flex;gap:4px;align-items:center;
}
.speed-btn{
  background:none;border:1px solid rgba(255,255,255,0.06);
  color:rgba(200,200,224,0.3);font-family:'Azeret Mono',monospace;
  font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer;
}
.speed-btn.active{color:#00ddff;border-color:#00ddff44}
.speed-btn:hover{color:#c8c8e0}

@media(max-width:500px){
  #portfolio{gap:8px;font-size:10px}
  .tick{min-width:90px;padding:5px 8px}
  #chart-wrap{height:200px}
  #trade{gap:6px}
}
</style>
</head>
<body>

<header>
  <div id="logo">RAM RUSH</div>
  <div id="portfolio">
    <span id="cash">$10,000.00</span>
    <span id="holdings-val">Portfolio: $10,000.00</span>
    <span id="day">Day 1</span>
    <div id="speed-wrap">
      <button class="speed-btn active" data-speed="1">1x</button>
      <button class="speed-btn" data-speed="3">3x</button>
      <button class="speed-btn" data-speed="8">8x</button>
    </div>
  </div>
</header>

<div id="ticker"></div>

<div id="chart-wrap">
  <canvas id="chart"></canvas>
  <div id="chart-label"></div>
  <div id="chart-price"></div>
  <div id="chart-change"></div>
</div>

<div id="trade">
  <label>QTY</label>
  <input type="number" id="qty" value="1" min="1">
  <button id="max-btn">MAX</button>
  <button class="trade-btn" id="buy-btn">BUY</button>
  <button class="trade-btn" id="sell-btn">SELL</button>
  <span id="trade-msg"></span>
</div>

<div id="holdings">
  <h3>Holdings</h3>
  <div id="holdings-list"></div>
</div>

<div id="news">
  <h3>Market Feed</h3>
  <div id="news-feed"></div>
</div>

<script>
// Stocks
const STOCKS = [
  { sym:'DDR4', name:'DDR4 Standard',     color:'#00ff88', base:42,   vol:0.03  },
  { sym:'DDR5', name:'DDR5 Premium',      color:'#00ddff', base:128,  vol:0.04  },
  { sym:'DIMM', name:'DimmWorks Corp',    color:'#ff44aa', base:87,   vol:0.035 },
  { sym:'VRAM', name:'VidRAM Graphics',   color:'#ffaa00', base:234,  vol:0.045 },
  { sym:'ECC',  name:'ECC ServerTech',    color:'#aa66ff', base:178,  vol:0.025 },
  { sym:'NAND', name:'NandFlash Inc',     color:'#ff6644', base:312,  vol:0.028 },
  { sym:'SRAM', name:'StaticRAM Labs',    color:'#44ffcc', base:28,   vol:0.06  },
  { sym:'HBM',  name:'HBM Stacks Ltd',   color:'#8888ff', base:67,   vol:0.05  },
];

// State
let cash = 10000;
let day = 0;
let selected = 0;
let speed = 1;
let holdings = {}; // sym -> {qty, avgCost}
let newsItems = [];

// Price history per stock
const HISTORY_LEN = 200;
for (const s of STOCKS) {
  s.price = s.base;
  s.history = [s.base];
  s.trend = 0; // momentum
  s.event = 0; // event modifier
  s.eventTimer = 0;
}

// Price simulation
function tickPrices() {
  for (const s of STOCKS) {
    // Mean reversion + momentum + random walk + events
    const revert = (s.base - s.price) * 0.002;
    s.trend = s.trend * 0.97 + (Math.random() - 0.5) * 0.008;
    const noise = (Math.random() - 0.5) * s.vol * s.price;
    const eventForce = s.event * s.price * 0.01;

    s.price += revert + s.trend * s.price + noise + eventForce;
    s.price = Math.max(1, s.price);

    s.history.push(s.price);
    if (s.history.length > HISTORY_LEN) s.history.shift();

    // Event decay
    if (s.eventTimer > 0) {
      s.eventTimer--;
      if (s.eventTimer <= 0) s.event = 0;
    }
  }
}

// Random events
const BULL_NEWS = [
  '{sym} announces next-gen memory die shrink — yields up 30%',
  '{sym} beats earnings estimates by 40%, server demand surges',
  '{sym} secures $2B hyperscaler contract for AI training rigs',
  '{sym} partnership with major chipmaker drives demand',
  'Analysts upgrade {sym} to strong buy on memory supercycle',
  '{sym} new overclocking kits sell out in hours',
  '{sym} acquires competitor\'s fab at discount',
  'Global RAM shortage drives {sym} pricing power',
  'Data center boom lifts {sym} order backlog to record',
  '{sym} achieves world record memory clock speeds',
];
const BEAR_NEWS = [
  '{sym} CEO resigns amid accounting probe',
  '{sym} misses revenue targets — oversupply fears grow',
  '{sym} fab contamination halts production for weeks',
  '{sym} faces antitrust investigation in three countries',
  '{sym} product recall: faulty modules causing BSODs',
  'Short sellers pile into {sym} on margin compression fears',
  '{sym} supply glut worsens as PC demand softens',
  '{sym} loses major OEM client to rival supplier',
  'Memory prices crash — {sym} slashes production guidance',
  '{sym} warehouse fire destroys $500M in inventory',
];

function triggerEvent() {
  if (Math.random() > 0.15) return; // 15% chance per day
  const s = STOCKS[Math.floor(Math.random() * STOCKS.length)];
  const bull = Math.random() > 0.45;
  s.event = bull ? (0.5 + Math.random() * 1.5) : -(0.5 + Math.random() * 1.5);
  s.eventTimer = 10 + Math.floor(Math.random() * 20);

  const templates = bull ? BULL_NEWS : BEAR_NEWS;
  const headline = templates[Math.floor(Math.random() * templates.length)].replace('{sym}', s.sym);
  addNews(headline, bull ? 'bullish' : 'bearish');
}

function addNews(text, type) {
  newsItems.unshift({ text, type, day });
  if (newsItems.length > 12) newsItems.pop();
  renderNews();
}

// Render
function renderTicker() {
  const el = document.getElementById('ticker');
  el.innerHTML = '';
  STOCKS.forEach((s, i) => {
    const prev = s.history.length > 1 ? s.history[s.history.length - 2] : s.price;
    const change = ((s.price - prev) / prev * 100);
    const dayChange = s.history.length > 1 ? ((s.price - s.history[0]) / s.history[0] * 100) : 0;
    const up = change >= 0;
    const tick = document.createElement('div');
    tick.className = 'tick' + (i === selected ? ' active' : '');
    tick.style.setProperty('--c', s.color);
    tick.style.setProperty('--glow', s.color + '33');
    tick.innerHTML = `<div class="sym" style="color:${s.color}">${s.sym}</div>
      <div class="price">$${s.price.toFixed(2)}</div>
      <div class="change ${up?'up':'down'}">${up?'+':''}${change.toFixed(2)}%</div>`;
    tick.addEventListener('click', () => { selected = i; renderTicker(); renderChart(); });
    el.appendChild(tick);
  });
}

function renderChart() {
  const s = STOCKS[selected];
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const wrap = document.getElementById('chart-wrap');
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
  ctx.scale(dpr, dpr);
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  ctx.clearRect(0, 0, W, H);

  const hist = s.history;
  if (hist.length < 2) return;

  const min = Math.min(...hist) * 0.98;
  const max = Math.max(...hist) * 1.02;
  const range = max - min || 1;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const y = H * 0.05 + (H * 0.85) * (i / 4);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    const price = max - (i / 4) * range;
    ctx.fillStyle = 'rgba(200,200,224,0.15)';
    ctx.font = '9px "Azeret Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText('$' + price.toFixed(2), W - 4, y - 3);
  }

  // Line
  const gradient = ctx.createLinearGradient(0, 0, 0, H);
  gradient.addColorStop(0, s.color + '40');
  gradient.addColorStop(1, s.color + '00');

  // Fill area
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i = 0; i < hist.length; i++) {
    const x = (i / (HISTORY_LEN - 1)) * W;
    const y = H * 0.05 + (1 - (hist[i] - min) / range) * H * 0.85;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(((hist.length - 1) / (HISTORY_LEN - 1)) * W, H);
  ctx.fillStyle = gradient;
  ctx.fill();

  // Line stroke
  ctx.beginPath();
  for (let i = 0; i < hist.length; i++) {
    const x = (i / (HISTORY_LEN - 1)) * W;
    const y = H * 0.05 + (1 - (hist[i] - min) / range) * H * 0.85;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = s.color;
  ctx.lineWidth = 2;
  ctx.shadowColor = s.color;
  ctx.shadowBlur = 8;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Current price dot
  const lastX = ((hist.length - 1) / (HISTORY_LEN - 1)) * W;
  const lastY = H * 0.05 + (1 - (s.price - min) / range) * H * 0.85;
  ctx.fillStyle = s.color;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(lastX, lastY, 2, 0, Math.PI * 2);
  ctx.fill();

  // Labels
  const overall = ((s.price - s.history[0]) / s.history[0] * 100);
  const up = overall >= 0;
  document.getElementById('chart-label').textContent = s.sym;
  document.getElementById('chart-label').style.color = s.color;
  document.getElementById('chart-price').textContent = '$' + s.price.toFixed(2);
  document.getElementById('chart-price').style.color = s.color;
  document.getElementById('chart-change').textContent = `${up ? '+' : ''}${overall.toFixed(2)}% all time`;
  document.getElementById('chart-change').style.color = up ? '#00ff88' : '#ff4466';
}

function renderHoldings() {
  const list = document.getElementById('holdings-list');
  const syms = Object.keys(holdings).filter(k => holdings[k].qty > 0);
  if (!syms.length) {
    list.innerHTML = '<div style="font-size:11px;color:rgba(200,200,224,0.2);padding:8px">No holdings yet</div>';
    return;
  }
  list.innerHTML = syms.map(sym => {
    const h = holdings[sym];
    const s = STOCKS.find(x => x.sym === sym);
    const val = h.qty * s.price;
    const cost = h.qty * h.avgCost;
    const pnl = val - cost;
    const pnlPct = (pnl / cost * 100);
    const up = pnl >= 0;
    return `<div class="hold-row">
      <span class="hold-sym" style="color:${s.color}">${sym}</span>
      <span class="hold-qty">${h.qty}x</span>
      <span class="hold-val">$${val.toFixed(2)}</span>
      <span class="hold-pnl ${up?'up':'down'}">${up?'+':''}$${pnl.toFixed(2)} (${up?'+':''}${pnlPct.toFixed(1)}%)</span>
    </div>`;
  }).join('');
}

function renderNews() {
  const el = document.getElementById('news-feed');
  el.innerHTML = newsItems.map(n =>
    `<div class="news-item ${n.type}"><span class="time">Day ${n.day}</span> ${n.text}</div>`
  ).join('');
}

function updatePortfolio() {
  let holdVal = 0;
  for (const sym of Object.keys(holdings)) {
    const h = holdings[sym];
    if (h.qty > 0) {
      const s = STOCKS.find(x => x.sym === sym);
      holdVal += h.qty * s.price;
    }
  }
  const total = cash + holdVal;
  document.getElementById('cash').textContent = '$' + cash.toFixed(2);
  document.getElementById('holdings-val').textContent = 'Portfolio: $' + total.toFixed(2);
  document.getElementById('day').textContent = 'Day ' + day;
}

// Trade
function showMsg(text, color) {
  const el = document.getElementById('trade-msg');
  el.textContent = text;
  el.style.color = color || '#c8c8e0';
  setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 2000);
}

document.getElementById('buy-btn').addEventListener('click', () => {
  const s = STOCKS[selected];
  const qty = parseInt(document.getElementById('qty').value) || 0;
  if (qty <= 0) return showMsg('Invalid quantity', '#ff4466');
  const cost = qty * s.price;
  if (cost > cash) return showMsg('Not enough cash', '#ff4466');
  cash -= cost;
  if (!holdings[s.sym]) holdings[s.sym] = { qty: 0, avgCost: 0 };
  const h = holdings[s.sym];
  const totalCost = h.qty * h.avgCost + cost;
  h.qty += qty;
  h.avgCost = totalCost / h.qty;
  showMsg(`Bought ${qty} ${s.sym} @ $${s.price.toFixed(2)}`, '#00ff88');
  renderHoldings();
  updatePortfolio();
});

document.getElementById('sell-btn').addEventListener('click', () => {
  const s = STOCKS[selected];
  const qty = parseInt(document.getElementById('qty').value) || 0;
  if (qty <= 0) return showMsg('Invalid quantity', '#ff4466');
  const h = holdings[s.sym];
  if (!h || h.qty < qty) return showMsg('Not enough shares', '#ff4466');
  const revenue = qty * s.price;
  cash += revenue;
  h.qty -= qty;
  if (h.qty === 0) h.avgCost = 0;
  showMsg(`Sold ${qty} ${s.sym} @ $${s.price.toFixed(2)}`, '#00ddff');
  renderHoldings();
  updatePortfolio();
});

document.getElementById('max-btn').addEventListener('click', () => {
  const s = STOCKS[selected];
  const maxQty = Math.floor(cash / s.price);
  document.getElementById('qty').value = Math.max(1, maxQty);
});

// Speed controls
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    speed = parseInt(btn.dataset.speed);
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// Game loop
let tickAccum = 0;
function gameLoop() {
  tickAccum += speed;
  while (tickAccum >= 1) {
    tickAccum--;
    day++;
    tickPrices();
    triggerEvent();
  }
  renderTicker();
  renderChart();
  updatePortfolio();
}

// Init
renderTicker();
renderChart();
renderHoldings();
updatePortfolio();
addNews('Memory markets open. Welcome to RAM RUSH. Trade wisely.', 'bullish');

setInterval(gameLoop, 600);
window.addEventListener('resize', renderChart);
</script>
</body>
</html>
