<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shrimp Tank</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A6%90" />

<meta name="description" content="A cozy micro-aquarium with exactly one pixel shrimp. It drifts when chat types, kelp sways, bubbles rise. Click to drop a food pellet." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Shrimp Tank" />
<meta property="og:description" content="One pixel shrimp. Kelp. Bubbles. Chat makes it drift. That's the whole tank." />
<meta property="og:url" content="https://sloppy.live/shrimp-tank/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/tiny%20pixel%20art%20shrimp%20in%20a%20cozy%20aquarium%20with%20kelp%20and%20bubbles%2C%20warm%20teal%20gradients%2C%20peaceful%2C%208bit?width=1200&height=630&nologo=true&seed=90" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Sometype+Mono:wght@400&display=swap" rel="stylesheet" />

<style>
  :root{ --ink:#bfd8d4; --dim:#6f8f8a; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%}
  body{
    font-family:'Sometype Mono',monospace; color:var(--ink); overflow:hidden;
    background:radial-gradient(90% 70% at 50% 20%, #163832 0%, #0c211e 55%, #071512 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; padding:1rem;
  }
  h1{ font-family:'Silkscreen',monospace; font-size:clamp(1.1rem,4.5vw,1.6rem); color:#8fd4c4; letter-spacing:.08em; }
  .tankwrap{ position:relative; }
  canvas{
    width:min(30rem,92vw); aspect-ratio:4/3; display:block; image-rendering:pixelated;
    border-radius:12px; border:3px solid #2c4a44;
    box-shadow:0 0 0 2px #0a1a17, 0 16px 40px rgba(0,0,0,.6), inset 0 0 30px rgba(140,220,200,.08);
    cursor:pointer;
  }
  .caption{ font-size:.72rem; color:var(--dim); text-align:center; min-height:1rem; }
  .caption b{ color:#8fd4c4; }
  .hud{ display:flex; gap:1.2rem; font-size:.64rem; color:var(--dim); align-items:center; }
  .hud b{ color:#8fd4c4; }
  .dot{ display:inline-block; width:.45rem; height:.45rem; border-radius:50%; background:#c9a227; margin-right:.3rem; }
  .live .dot{ background:#7dbd7a; }
  .err .dot{ background:#d47a6a; }
  footer{ font-size:.58rem; color:#3f5c56; text-align:center; line-height:1.7; }
</style>
</head>
<body>
  <h1>🦐 SHRIMP TANK</h1>
  <div class="tankwrap">
    <canvas id="c" width="192" height="144" role="application" aria-label="Micro aquarium with one pixel shrimp. Click or tap to drop a food pellet. Chat messages make the shrimp drift."></canvas>
  </div>
  <p class="caption" id="cap">the shrimp is settling in…</p>
  <div class="hud">
    <span id="twitch"><span class="dot"></span><span id="twitchTxt">connecting…</span></span>
    <span>drifts <b id="nDrifts">0</b></span>
    <span>pellets <b id="nFed">0</b></span>
  </div>
  <footer>one shrimp · type in chat and it drifts · click = food pellet</footer>

<script>
(function(){
  "use strict";
  var canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  var W=canvas.width, H=canvas.height;   // low-res pixel buffer (192×144)
  var reduce=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var SAND=H-16;

  // ---- shrimp ----
  var shrimp={ x:W*0.5, y:H*0.62, vx:0, vy:0, dir:1, tailT:0, legT:0,
    target:null, idleT:2, driftT:0, nibbleT:0 };
  var drifts=0, fed=0;

  // ---- kelp: 3 strands of pixel segments ----
  var kelps=[ {x:28,h:52,ph:0.3,f:0.8}, {x:44,h:38,ph:2.1,f:1.1}, {x:158,h:60,ph:4.2,f:0.7} ];

  // ---- bubbles + pellets ----
  var bubbles=[], pellets=[], sparkles=[];
  function bubble(x,y,r){ bubbles.push({x:x,y:y,r:r||1,t:0,wob:Math.random()*6.28}); }

  // ---- chat drift ----
  function drift(who){
    drifts++; document.getElementById('nDrifts').textContent=drifts;
    var tx=14+Math.random()*(W-28), ty=18+Math.random()*(SAND-34);
    shrimp.target={x:tx,y:ty,pellet:null};
    shrimp.driftT=1;
    for(var i=0;i<3;i++) bubble(shrimp.x+(Math.random()-0.5)*4, shrimp.y-2-i*2, 1);
    if(who){ var cap=document.getElementById('cap');
      cap.innerHTML='drifting for <b></b>'; cap.querySelector('b').textContent=who; }
    blip(660+Math.random()*220);
  }

  // ---- feeding ----
  canvas.addEventListener('pointerdown', function(e){
    var r=canvas.getBoundingClientRect();
    var x=(e.clientX-r.left)/r.width*W, y=8;
    pellets.push({x:Math.max(8,Math.min(W-8,x)), y:y, vy:0, settled:false});
    unlock();
    blip(440);
  });

  // ---- audio (tiny, gesture-unlocked) ----
  var AC=null, unlocked=false;
  function unlock(){ unlocked=true;
    if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(AC&&AC.state==='suspended') AC.resume(); }
  document.addEventListener('pointerdown', unlock);
  function blip(f){
    if(!AC||!unlocked) return; var t=AC.currentTime;
    var o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(f,t); o.frequency.exponentialRampToValueAtTime(f*0.7,t+0.18);
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.045,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+0.3);
  }

  // ---- Twitch ----
  var ws=null;
  function setConn(cls,msg){ var el=document.getElementById('twitch'); el.className=cls;
    document.getElementById('twitchTxt').textContent=msg; }
  function connect(){
    try{ ws=new WebSocket('wss://irc-ws.chat.twitch.tv:443'); }catch(e){ setConn('err','chat unreachable'); return; }
    ws.onopen=function(){ ws.send('PASS SCHMOOPIIE'); ws.send('NICK justinfan'+Math.floor(Math.random()*99999));
      ws.send('JOIN #sloppy_ai'); setConn('live','live · #sloppy_ai'); };
    ws.onmessage=function(ev){
      ev.data.split('\r\n').forEach(function(line){
        if(!line) return;
        if(line.indexOf('PING')===0){ ws.send('PONG :tmi.twitch.tv'); return; }
        var m=line.match(/^:([A-Za-z0-9_]+)![^ ]+ PRIVMSG #[^ ]+ :(.*)$/);
        if(m) drift(m[1]);
      });
    };
    ws.onclose=function(){ setConn('conn','reconnecting…'); setTimeout(connect,4000); };
    ws.onerror=function(){ try{ws.close();}catch(e){} };
  }
  connect();

  // ---- pixel helpers ----
  function px(x,y,w,h,col){ ctx.fillStyle=col; ctx.fillRect(Math.round(x),Math.round(y),w,h); }

  function drawShrimp(){
    var s=shrimp, f=s.dir;
    ctx.save();
    ctx.translate(Math.round(s.x), Math.round(s.y));
    if(f<0){ ctx.scale(-1,1); }
    var bob=Math.sin(s.tailT*3)*0.8;
    ctx.translate(0, Math.round(bob));
    // body: curved segments (pixel blocks)
    var B='#f4a08c', D='#d97862', L='#ffd0c0';
    px(-6,-2,3,3,B); px(-4,-4,4,4,B); px(0,-5,4,4,B); px(4,-4,3,4,B); px(6,-2,3,3,D);
    px(-4,-4,4,1,L); px(0,-5,4,1,L);
    // tail fan (flicks when drifting)
    var flick=s.driftT>0? Math.sin(s.tailT*14)*2 : Math.sin(s.tailT*4)*0.6;
    px(-9,-3+flick,3,2,D); px(-10,-1+flick,3,2,B);
    // eye
    px(7,-3,1,1,'#1c1210');
    // antennae (two thin arcs)
    px(8,-5,3,1,D); px(10,-7,2,1,D);
    px(8,-4,2,1,B); px(10,-5,2,1,B);
    // legs flutter
    for(var i=0;i<4;i++){
      var ly=Math.sin(s.legT*8+i*1.4)>0?1:0;
      px(-3+i*2, 0+ly, 1, 2, D);
    }
    ctx.restore();
  }

  function drawKelp(t){
    kelps.forEach(function(k){
      for(var seg=0; seg*4<k.h; seg++){
        var sway=Math.sin(t*k.f + k.ph + seg*0.5) * (seg*0.55) * (reduce?0.4:1);
        var y=SAND - seg*4;
        px(k.x+sway, y-4, 3, 4, seg%2? '#2c6b4f':'#35805e');
        if(seg%3===2) px(k.x+sway+(seg%2?3:-2), y-3, 2, 2, '#3f9468');
      }
    });
  }

  // ---- loop ----
  var last=performance.now();
  function frame(now){
    requestAnimationFrame(frame);
    var t=now/1000, dt=Math.min(0.05,(now-last)/1000); last=now;

    // water gradient
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#1e5c54'); g.addColorStop(0.55,'#174a46'); g.addColorStop(1,'#123a38');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // light shafts
    ctx.globalAlpha=0.05+Math.sin(t*0.4)*0.015;
    ctx.fillStyle='#bfe8d8';
    ctx.beginPath(); ctx.moveTo(30,0); ctx.lineTo(58,0); ctx.lineTo(96,H); ctx.lineTo(52,H); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(120,0); ctx.lineTo(136,0); ctx.lineTo(178,H); ctx.lineTo(150,H); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=1;
    // sand
    px(0,SAND,W,H-SAND,'#c9b284');
    px(0,SAND,W,2,'#dcc79a');
    [18,52,88,120,150,175].forEach(function(x,i){ px(x,SAND+4+(i%3),5-(i%2),3,'#a89065'); });
    drawKelp(t);

    // bubbler stone stream
    if(Math.random()<0.06) bubble(178+Math.random()*4, SAND-2, Math.random()<0.3?2:1);
    px(174,SAND-3,10,4,'#7d8a8a'); px(176,SAND-5,6,2,'#93a3a3');

    // pellets sink + settle
    pellets.forEach(function(p){
      if(!p.settled){ p.vy=Math.min(14,p.vy+18*dt); p.y+=p.vy*dt;
        if(p.y>=SAND-2){ p.y=SAND-2; p.settled=true; } }
      px(p.x,p.y,2,2,'#8a5c34');
    });

    // shrimp brain
    var s=shrimp;
    s.tailT+=dt*(1+s.driftT*2); s.legT+=dt;
    s.driftT=Math.max(0,s.driftT-dt*0.5);
    // choose pellet target if any
    if(!s.target || (!s.target.pellet && pellets.length)){
      var nearest=null,bd=1e9;
      pellets.forEach(function(p){ var d=Math.hypot(p.x-s.x,p.y-s.y); if(d<bd){bd=d;nearest=p;} });
      if(nearest) s.target={x:nearest.x, y:Math.min(nearest.y-2,SAND-6), pellet:nearest};
    }
    if(!s.target){
      s.idleT-=dt;
      if(s.idleT<=0){ s.idleT=3+Math.random()*5;
        s.target={x:20+Math.random()*(W-40), y:24+Math.random()*(SAND-44), pellet:null}; }
    }
    if(s.target){
      var dx=s.target.x-s.x, dy=s.target.y-s.y, d=Math.hypot(dx,dy);
      var sp=(s.driftT>0?26:9) * (reduce?0.6:1);
      if(d>2){ s.vx=dx/d*sp; s.vy=dy/d*sp; s.dir=dx>0.5?1:dx<-0.5?-1:s.dir; }
      else{
        if(s.target.pellet){
          var p=s.target.pellet;
          s.nibbleT+=dt;
          if(s.nibbleT>1.1){
            pellets=pellets.filter(function(x){return x!==p;});
            fed++; document.getElementById('nFed').textContent=fed;
            document.getElementById('cap').textContent='nom. (' + fed + ' pellets and counting)';
            for(var i=0;i<4;i++) bubble(s.x+(Math.random()-0.5)*6, s.y-3-i, 1);
            blip(880); s.nibbleT=0; s.target=null;
          }
        } else s.target=null;
        s.vx*=0.8; s.vy*=0.8;
      }
    }
    s.x+=s.vx*dt; s.y+=s.vy*dt;
    s.x=Math.max(10,Math.min(W-10,s.x)); s.y=Math.max(14,Math.min(SAND-6,s.y));
    if(Math.random()<0.008) bubble(s.x+s.dir*7, s.y-4, 1);
    drawShrimp();

    // bubbles rise
    for(var i=bubbles.length-1;i>=0;i--){
      var b=bubbles[i]; b.t+=dt; b.wob+=dt*4;
      b.y-=(10+b.r*4)*dt; b.x+=Math.sin(b.wob)*0.18;
      if(b.y<4){ bubbles.splice(i,1); continue; }
      ctx.strokeStyle='rgba(210,240,235,.55)'; ctx.lineWidth=1;
      ctx.strokeRect(Math.round(b.x), Math.round(b.y), b.r+1, b.r+1);
    }
    // glass shine
    ctx.globalAlpha=0.08; px(4,4,3,H-8,'#eafff8'); ctx.globalAlpha=1;
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
