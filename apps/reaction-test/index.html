<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Test</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚡">
<meta property="og:title" content="Reaction Test">
<meta property="og:description" content="How fast are your reflexes? Tap when the screen turns green.">
<meta property="og:url" content="https://sloppy.live/reaction-test">
<meta property="og:image" content="https://sloppy.live/reaction-test/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a14;
  min-height:100vh;
  font-family:'Chakra Petch',sans-serif;
  color:#e0e0f0;
  display:flex;
  flex-direction:column;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

#game{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:background 0.05s;
  position:relative;
  min-height:55vh;
}
#game.waiting{background:#0a0a14}
#game.ready{background:#1a0a2e}
#game.go{background:#003a00}
#game.result{background:#0a0a14}
#game.early{background:#2a0a0a}

#prompt{
  font-size:clamp(20px,5vw,36px);
  font-weight:700;
  text-align:center;
  padding:0 20px;
  line-height:1.4;
}

#time-display{
  font-family:'Azeret Mono',monospace;
  font-size:clamp(48px,14vw,96px);
  font-weight:700;
  margin:12px 0;
  letter-spacing:-2px;
}
#time-unit{
  font-size:clamp(14px,3vw,20px);
  font-weight:400;
  color:rgba(224,224,240,0.4);
  font-family:'Azeret Mono',monospace;
  letter-spacing:2px;
}

#sub-prompt{
  font-size:clamp(12px,2.5vw,16px);
  color:rgba(224,224,240,0.4);
  margin-top:16px;
}

/* Neon ring */
#ring{
  width:clamp(160px,40vw,240px);
  height:clamp(160px,40vw,240px);
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  margin:20px 0;
  transition:border-color 0.3s, box-shadow 0.3s;
}
.waiting #ring{border-color:#ff00ff44;box-shadow:0 0 30px #ff00ff11}
.ready #ring{border-color:#ff006644;box-shadow:0 0 40px #ff006622;animation:pulse-red 0.8s ease-in-out infinite alternate}
.go #ring{border-color:#00ff88;box-shadow:0 0 60px #00ff8844,0 0 120px #00ff8822}
.result #ring{border-color:#00ddff44;box-shadow:0 0 30px #00ddff22}
.early #ring{border-color:#ff333344;box-shadow:0 0 30px #ff333322}

@keyframes pulse-red{0%{box-shadow:0 0 30px #ff006622}100%{box-shadow:0 0 60px #ff006644}}

/* Results area */
#results{
  text-align:center;
  padding:8px 20px;
}
#attempts{
  display:flex;
  gap:6px;
  justify-content:center;
  margin:8px 0 4px;
  flex-wrap:wrap;
}
.attempt{
  font-family:'Azeret Mono',monospace;
  font-size:12px;
  padding:4px 10px;
  border-radius:6px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
}
.attempt.best{border-color:#00ff88;color:#00ff88}
#avg{
  font-family:'Azeret Mono',monospace;
  font-size:13px;
  color:rgba(224,224,240,0.4);
  margin-top:4px;
}

/* Leaderboard */
#lb-section{
  padding:16px 20px 32px;
  max-width:500px;
  width:100%;
  margin:0 auto;
}
#lb-section h2{
  font-size:14px;
  font-weight:600;
  color:#00ddff;
  text-shadow:0 0 10px #00ddff44;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:12px;
  text-align:center;
}
#lb-list{display:flex;flex-direction:column;gap:4px}
.lb-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 14px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:8px;
  font-family:'Azeret Mono',monospace;
  font-size:13px;
}
.lb-row.me{border-color:#00ff8844;background:rgba(0,255,136,0.04)}
.lb-rank{width:28px;font-weight:700;color:rgba(224,224,240,0.3);text-align:center}
.lb-row:nth-child(1) .lb-rank{color:#ffd700}
.lb-row:nth-child(2) .lb-rank{color:#c0c0c0}
.lb-row:nth-child(3) .lb-rank{color:#cd7f32}
.lb-name{flex:1;color:rgba(224,224,240,0.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-time{font-weight:700;color:#00ff88;text-shadow:0 0 8px #00ff8844}
.lb-date{font-size:10px;color:rgba(224,224,240,0.2)}

/* Name input */
#name-row{
  display:flex;gap:8px;
  justify-content:center;
  align-items:center;
  margin:10px 0 6px;
}
#name-input{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;
  padding:6px 12px;
  font-family:'Azeret Mono',monospace;
  font-size:13px;
  color:#e0e0f0;
  outline:none;
  width:140px;
}
#name-input:focus{border-color:#00ddff}
#submit-btn{
  background:#00ddff22;
  border:1px solid #00ddff44;
  color:#00ddff;
  font-family:'Chakra Petch',sans-serif;
  font-size:13px;font-weight:600;
  padding:6px 16px;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.15s;
}
#submit-btn:hover{background:#00ddff33;border-color:#00ddff}
#submit-btn:disabled{opacity:0.3;cursor:default}
#submit-msg{font-size:12px;color:#00ff88;text-align:center;min-height:18px}

/* Scanlines */
#scan{
  position:fixed;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 6px);
}
</style>
</head>
<body>

<div id="game" class="waiting">
  <div id="ring">
    <div id="prompt">Tap anywhere to start</div>
    <div id="time-display" style="display:none"></div>
    <div id="time-unit" style="display:none">milliseconds</div>
  </div>
  <div id="sub-prompt">5 rounds · best time wins</div>
</div>

<div id="results">
  <div id="attempts"></div>
  <div id="avg"></div>
</div>

<div id="lb-section">
  <h2>⚡ Leaderboard</h2>
  <div id="name-row">
    <input type="text" id="name-input" placeholder="Your name" maxlength="20">
    <button id="submit-btn" disabled>Submit</button>
  </div>
  <div id="submit-msg"></div>
  <div id="lb-list"></div>
</div>

<div id="scan"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// Supabase
let supabase = null;
let userId = null;

async function initSupabase() {
  try {
    const cfg = await fetch('/supabase-config.js').then(r => r.text());
    const urlMatch = cfg.match(/SUPABASE_URL\s*=\s*['"]([^'"]+)['"]/);
    const keyMatch = cfg.match(/SUPABASE_ANON_KEY\s*=\s*['"]([^'"]+)['"]/);
    if (!urlMatch || !keyMatch) return;
    supabase = createClient(urlMatch[1], keyMatch[1]);
    const { data } = await supabase.auth.getSession();
    if (!data.session) {
      await supabase.auth.signInAnonymously();
    }
    const { data: userData } = await supabase.auth.getUser();
    userId = userData?.user?.id;
    loadLeaderboard();
  } catch(e) { console.warn('Supabase init failed:', e); }
}
initSupabase();

// Game state
const ROUNDS = 5;
let state = 'idle'; // idle, waiting, go, result, early, done
let round = 0;
let times = [];
let startTime = 0;
let timeout = null;

const gameEl = document.getElementById('game');
const promptEl = document.getElementById('prompt');
const timeEl = document.getElementById('time-display');
const unitEl = document.getElementById('time-unit');
const subEl = document.getElementById('sub-prompt');
const attemptsEl = document.getElementById('attempts');
const avgEl = document.getElementById('avg');
const submitBtn = document.getElementById('submit-btn');
const submitMsg = document.getElementById('submit-msg');
const nameInput = document.getElementById('name-input');

// Load saved name
nameInput.value = localStorage.getItem('reaction-name') || '';

gameEl.addEventListener('click', handleClick);
gameEl.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(); });

function handleClick() {
  switch(state) {
    case 'idle':
      startRound();
      break;
    case 'waiting':
      // Clicked too early
      clearTimeout(timeout);
      state = 'early';
      gameEl.className = 'early';
      promptEl.textContent = 'Too early!';
      timeEl.style.display = 'none';
      unitEl.style.display = 'none';
      subEl.textContent = 'Tap to try again';
      setTimeout(() => { state = 'idle-retry'; }, 300);
      break;
    case 'idle-retry':
      startRound();
      break;
    case 'go':
      // Record time
      const ms = performance.now() - startTime;
      const rounded = Math.round(ms);
      times.push(rounded);
      round++;
      state = 'result';
      gameEl.className = 'result';
      promptEl.textContent = getRating(rounded);
      timeEl.style.display = 'block';
      timeEl.textContent = rounded;
      timeEl.style.color = getTimeColor(rounded);
      timeEl.style.textShadow = `0 0 30px ${getTimeColor(rounded)}66`;
      unitEl.style.display = 'block';
      subEl.textContent = round < ROUNDS ? `Round ${round}/${ROUNDS} · Tap to continue` : 'Tap to see results';
      renderAttempts();
      setTimeout(() => { state = round < ROUNDS ? 'idle' : 'pre-done'; }, 200);
      break;
    case 'pre-done':
      showFinal();
      break;
    case 'done':
      // Reset
      round = 0;
      times = [];
      state = 'idle';
      attemptsEl.innerHTML = '';
      avgEl.textContent = '';
      submitBtn.disabled = true;
      submitMsg.textContent = '';
      gameEl.className = 'waiting';
      promptEl.textContent = 'Tap anywhere to start';
      timeEl.style.display = 'none';
      unitEl.style.display = 'none';
      subEl.textContent = '5 rounds · best time wins';
      break;
  }
}

function startRound() {
  state = 'waiting';
  gameEl.className = 'ready';
  promptEl.textContent = 'Wait for green...';
  timeEl.style.display = 'none';
  unitEl.style.display = 'none';
  subEl.textContent = `Round ${round + 1}/${ROUNDS}`;

  const delay = 1500 + Math.random() * 3500;
  timeout = setTimeout(() => {
    state = 'go';
    gameEl.className = 'go';
    promptEl.textContent = 'TAP NOW!';
    startTime = performance.now();
  }, delay);
}

function getRating(ms) {
  if (ms < 150) return 'Inhuman!';
  if (ms < 200) return 'Lightning!';
  if (ms < 250) return 'Blazing fast!';
  if (ms < 300) return 'Quick!';
  if (ms < 400) return 'Not bad';
  if (ms < 500) return 'Average';
  return 'Sleepy?';
}

function getTimeColor(ms) {
  if (ms < 200) return '#00ff88';
  if (ms < 300) return '#00ddff';
  if (ms < 400) return '#ffcc00';
  if (ms < 500) return '#ff8800';
  return '#ff4444';
}

function renderAttempts() {
  const best = Math.min(...times);
  attemptsEl.innerHTML = times.map((t, i) =>
    `<span class="attempt${t === best ? ' best' : ''}">${t}ms</span>`
  ).join('');
}

function showFinal() {
  state = 'done';
  gameEl.className = 'result';
  const best = Math.min(...times);
  const avg = Math.round(times.reduce((a, b) => a + b, 0) / times.length);
  promptEl.textContent = 'Final Results';
  timeEl.style.display = 'block';
  timeEl.textContent = best;
  timeEl.style.color = getTimeColor(best);
  timeEl.style.textShadow = `0 0 30px ${getTimeColor(best)}66`;
  unitEl.style.display = 'block';
  unitEl.textContent = 'ms best time';
  subEl.textContent = 'Tap to play again';
  avgEl.textContent = `Average: ${avg}ms`;
  submitBtn.disabled = false;

  // Save local best
  const localBest = parseInt(localStorage.getItem('reaction-best') || '99999');
  if (best < localBest) {
    localStorage.setItem('reaction-best', String(best));
  }
}

// Leaderboard
async function loadLeaderboard() {
  if (!supabase) return;
  try {
    const { data, error } = await supabase
      .from('reaction_test_scores')
      .select('*')
      .order('best_time', { ascending: true })
      .limit(15);
    if (error) throw error;
    renderLeaderboard(data || []);
  } catch(e) { console.warn('Leaderboard load failed:', e); }
}

function renderLeaderboard(rows) {
  const list = document.getElementById('lb-list');
  if (!rows.length) {
    list.innerHTML = '<div style="text-align:center;color:rgba(224,224,240,0.2);font-size:13px;padding:20px">No scores yet — be the first!</div>';
    return;
  }
  list.innerHTML = rows.map((r, i) => {
    const isMe = r.user_id === userId;
    const d = new Date(r.created_at);
    const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
    return `<div class="lb-row${isMe ? ' me' : ''}">
      <span class="lb-rank">${i + 1}</span>
      <span class="lb-name">${escHtml(r.player_name || 'Anon')}</span>
      <span class="lb-time">${r.best_time}ms</span>
      <span class="lb-date">${dateStr}</span>
    </div>`;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

submitBtn.addEventListener('click', async () => {
  if (times.length < ROUNDS || !supabase || !userId) return;
  const name = nameInput.value.trim().slice(0, 20) || 'Anon';
  localStorage.setItem('reaction-name', name);
  const best = Math.min(...times);
  const avg = Math.round(times.reduce((a, b) => a + b, 0) / times.length);

  submitBtn.disabled = true;
  submitMsg.textContent = 'Submitting...';

  try {
    const { error } = await supabase.from('reaction_test_scores').insert({
      user_id: userId,
      player_name: name,
      best_time: best,
      avg_time: avg,
      all_times: times,
    });
    if (error) throw error;
    submitMsg.textContent = '✓ Score submitted!';
    loadLeaderboard();
  } catch(e) {
    submitMsg.textContent = 'Error submitting';
    console.warn(e);
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
