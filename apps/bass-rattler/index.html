<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bass Rattler — Toxic Neon Pinball</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐍">
<meta property="og:title" content="Bass Rattler">
<meta property="og:description" content="Neon pinball with vibrating paddles and toxic sludge pits. Don't sink.">
<meta property="og:url" content="https://app.sloppy.live/bass-rattler/">
<meta property="og:image" content="https://emojicdn.elk.sh/🐍?style=google">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050808;color:#44ff66;font-family:'Chakra Petch',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden}
h1{font-family:'Bungee Shade',cursive;font-size:clamp(16px,4vw,26px);color:#44ff66;text-shadow:0 0 15px rgba(68,255,102,0.5);letter-spacing:2px;margin:6px 0 2px}
canvas{display:block;border:1px solid #0a1a0e}
.hud{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:clamp(11px,2vw,14px);display:flex;gap:16px;padding:4px 12px;letter-spacing:1px}
.hud .score{color:#44ff66;text-shadow:0 0 6px rgba(68,255,102,0.4)}
.hud .balls{color:#ff4466}
.hud .multi{color:#ffcc00}
.controls-hint{font-size:9px;color:#1a3a1e;letter-spacing:1px;padding:2px}
.controls-hint a{color:#1a3a1e;text-decoration:none}.controls-hint a:hover{color:#44ff66}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;background:rgba(5,8,8,0.8)}
.overlay.hidden{display:none}
.overlay-box{text-align:center}
.overlay-box h2{font-family:'Bungee Shade',cursive;font-size:clamp(20px,5vw,36px);color:#44ff66;margin-bottom:8px}
.overlay-box p{font-size:13px;color:#669966;margin-bottom:6px;line-height:1.6}
.overlay-box button{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:13px;background:#44ff66;color:#050808;border:none;padding:10px 24px;cursor:pointer;border-radius:4px;letter-spacing:1px}
.overlay-box button:hover{background:#88ffaa}
</style>
</head>
<body>
<h1>BASS RATTLER</h1>
<canvas id="c"></canvas>
<div class="hud">
<span class="score" id="scoreText">0</span>
<span class="multi" id="multiText">x1</span>
<span class="balls" id="ballsText">●●●</span>
</div>
<div class="controls-hint">Z/◄ left — M/► right — SPACE launch</div>

<div class="overlay" id="startOverlay">
<div class="overlay-box">
<h2>BASS RATTLER</h2>
<p>Toxic neon pinball.<br>Hit bumpers. Avoid the sludge.<br>Z/← left flipper — M/→ right flipper<br>SPACE to launch</p>
<button onclick="startGame()">RATTLE</button>
</div>
</div>
<div class="overlay hidden" id="gameOverOverlay">
<div class="overlay-box">
<h2>DRAINED</h2>
<p id="goScore">SCORE: 0</p>
<button onclick="startGame()">AGAIN</button>
</div>
</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const TW = 320, TH = 520;
C.width = TW; C.height = TH;
const SCALE = Math.min((window.innerWidth - 8) / TW, (window.innerHeight - 100) / TH, 2);
C.style.width = TW * SCALE + 'px';
C.style.height = TH * SCALE + 'px';

const G = 0.18; // gravity
const BALL_R = 6;
const FLIPPER_LEN = 50;
const FLIPPER_W = 8;

let ball, balls, score, multiplier, gameState, frame;
let leftFlip, rightFlip;
let launching, launchPower;
let bumpers, sludgePits, walls, targets;
let particles, shakeInt;
let vibePhase = 0;

// Audio
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playFlip(){const c=ensureAudio(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.setValueAtTime(150,n);o.frequency.linearRampToValueAtTime(80,n+0.04);g.gain.setValueAtTime(0.1,n);g.gain.linearRampToValueAtTime(0,n+0.04);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+0.04);}
function playBumper(pitch){const c=ensureAudio(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(pitch||600,n);o.frequency.exponentialRampToValueAtTime(200,n+0.1);g.gain.setValueAtTime(0.08,n);g.gain.linearRampToValueAtTime(0,n+0.1);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+0.1);}
function playSludge(){const c=ensureAudio(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(60,n);o.frequency.linearRampToValueAtTime(30,n+0.3);g.gain.setValueAtTime(0.12,n);g.gain.linearRampToValueAtTime(0,n+0.3);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+0.3);}
function playLaunch(){const c=ensureAudio(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(100,n);o.frequency.exponentialRampToValueAtTime(600,n+0.15);g.gain.setValueAtTime(0.06,n);g.gain.linearRampToValueAtTime(0,n+0.2);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+0.2);}
function playTarget(){const c=ensureAudio(),n=c.currentTime;[660,880].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.04,n+i*0.06);g.gain.linearRampToValueAtTime(0,n+i*0.06+0.08);o.connect(g);g.connect(c.destination);o.start(n+i*0.06);o.stop(n+i*0.06+0.08);});}
function playDrain(){const c=ensureAudio(),n=c.currentTime;[300,200,100].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.06,n+i*0.1);g.gain.linearRampToValueAtTime(0,n+i*0.1+0.15);o.connect(g);g.connect(c.destination);o.start(n+i*0.1);o.stop(n+i*0.1+0.15);});}

function initTable(){
  bumpers = [
    {x:100,y:160,r:18,color:'#ff44aa',glow:0,pts:100},
    {x:220,y:160,r:18,color:'#44aaff',glow:0,pts:100},
    {x:160,y:120,r:22,color:'#ffcc00',glow:0,pts:200},
    {x:130,y:240,r:15,color:'#ff6644',glow:0,pts:150},
    {x:190,y:240,r:15,color:'#aa44ff',glow:0,pts:150},
    {x:160,y:200,r:12,color:'#44ff66',glow:0,pts:250},
  ];
  sludgePits = [
    {x:40,y:420,w:60,h:20,bubbles:[]},
    {x:220,y:420,w:60,h:20,bubbles:[]},
  ];
  targets = [
    {x:70,y:90,w:30,h:8,lit:false,color:'#44ff66',pts:300},
    {x:145,y:70,w:30,h:8,lit:false,color:'#ffcc00',pts:300},
    {x:220,y:90,w:30,h:8,lit:false,color:'#ff44aa',pts:300},
  ];
  walls = [
    // Left wall
    {x1:20,y1:0,x2:20,y2:400},
    {x1:20,y1:400,x2:80,y2:460},
    // Right wall
    {x1:300,y1:0,x2:300,y2:400},
    {x1:300,y1:400,x2:240,y2:460},
    // Top
    {x1:20,y1:20,x2:280,y2:20},
    // Launch lane wall
    {x1:280,y1:20,x2:280,y2:480},
    // Guide rails
    {x1:60,y1:100,x2:40,y2:160},
    {x1:260,y1:100,x2:280,y2:160},
  ];
}

function resetBall(){
  ball = {x:290,y:470,vx:0,vy:0,alive:true,inLauncher:true};
  launching = false; launchPower = 0;
}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  gameState='playing';score=0;balls=3;multiplier=1;frame=0;
  particles=[];shakeInt=0;
  initTable();
  targets.forEach(t=>t.lit=false);
  resetBall();
}

// Input
let keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>{
  keys[e.key]=false;
  if(e.key===' '&&ball&&ball.inLauncher&&launchPower>0){
    ball.vy=-launchPower*0.15-5;ball.vx=-1;ball.inLauncher=false;
    playLaunch();launchPower=0;
  }
});
// Touch flippers
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=C.getBoundingClientRect();
  Array.from(e.changedTouches).forEach(t=>{
    const x=(t.clientX-r.left)/SCALE;
    if(x<TW/2)keys.z=true; else keys.m=true;
  });
  if(ball&&ball.inLauncher){keys[' ']=true;}
},{passive:false});
C.addEventListener('touchend',e=>{
  const r=C.getBoundingClientRect();
  Array.from(e.changedTouches).forEach(t=>{
    const x=(t.clientX-r.left)/SCALE;
    if(x<TW/2)keys.z=false; else keys.m=false;
  });
  if(keys[' ']&&ball&&ball.inLauncher&&launchPower>0){
    ball.vy=-launchPower*0.15-5;ball.vx=-1;ball.inLauncher=false;
    playLaunch();launchPower=0;keys[' ']=false;
  }
});

// Flipper physics
function initFlippers(){
  leftFlip={x:100,y:470,angle:0.4,targetAngle:0.4,restAngle:0.4,upAngle:-0.5,vibe:0};
  rightFlip={x:220,y:470,angle:Math.PI-0.4,targetAngle:Math.PI-0.4,restAngle:Math.PI-0.4,upAngle:Math.PI+0.5,vibe:0};
}
initFlippers();

function lineCircle(x1,y1,x2,y2,cx,cy,r){
  const dx=x2-x1,dy=y2-y1;
  const fx=x1-cx,fy=y1-cy;
  const a=dx*dx+dy*dy,b=2*(fx*dx+fy*dy),c2=fx*fx+fy*fy-r*r;
  let disc=b*b-4*a*c2;
  if(disc<0)return null;
  disc=Math.sqrt(disc);
  const t1=(-b-disc)/(2*a);
  if(t1>=0&&t1<=1){
    const ix=x1+t1*dx,iy=y1+t1*dy;
    const nx=cx-ix,ny=cy-iy;
    const nl=Math.hypot(nx,ny);
    return{t:t1,nx:nx/nl,ny:ny/nl,ix,iy};
  }
  return null;
}

function update(){
  if(gameState!=='playing')return;
  frame++;
  vibePhase+=0.15;

  // Launch charge
  if(keys[' ']&&ball.inLauncher){
    launchPower=Math.min(100,launchPower+2);
  }

  // Flippers
  const lUp=keys.z||keys.Z||keys.ArrowLeft;
  const rUp=keys.m||keys.M||keys.ArrowRight;
  leftFlip.targetAngle=lUp?leftFlip.upAngle:leftFlip.restAngle;
  rightFlip.targetAngle=rUp?rightFlip.upAngle:rightFlip.restAngle;
  const flipSpeed=0.25;
  leftFlip.angle+=(leftFlip.targetAngle-leftFlip.angle)*flipSpeed;
  rightFlip.angle+=(rightFlip.targetAngle-rightFlip.angle)*flipSpeed;
  if(lUp)leftFlip.vibe=6;
  if(rUp)rightFlip.vibe=6;
  if(leftFlip.vibe>0)leftFlip.vibe--;
  if(rightFlip.vibe>0)rightFlip.vibe--;

  if(lUp&&Math.abs(leftFlip.angle-leftFlip.upAngle)<0.1)playFlip();
  if(rUp&&Math.abs(rightFlip.angle-rightFlip.upAngle)<0.1)playFlip();

  if(!ball.alive||ball.inLauncher)return;

  // Physics substeps
  for(let step=0;step<3;step++){
    ball.vy+=G/3;
    ball.x+=ball.vx/3;
    ball.y+=ball.vy/3;

    // Speed cap
    const spd=Math.hypot(ball.vx,ball.vy);
    if(spd>14){ball.vx*=14/spd;ball.vy*=14/spd;}

    // Wall bounces
    if(ball.x<20+BALL_R){ball.x=20+BALL_R;ball.vx=Math.abs(ball.vx)*0.8;}
    if(ball.x>280-BALL_R&&ball.y<480){ball.x=280-BALL_R;ball.vx=-Math.abs(ball.vx)*0.8;}
    if(ball.x>300-BALL_R){ball.x=300-BALL_R;ball.vx=-Math.abs(ball.vx)*0.8;}
    if(ball.y<20+BALL_R){ball.y=20+BALL_R;ball.vy=Math.abs(ball.vy)*0.8;}

    // Guide rail bounces
    walls.slice(6).forEach(w=>{
      const hit=lineCircle(w.x1,w.y1,w.x2,w.y2,ball.x,ball.y,BALL_R);
      if(hit){
        const dot=ball.vx*hit.nx+ball.vy*hit.ny;
        if(dot<0){
          ball.vx-=2*dot*hit.nx*0.9;
          ball.vy-=2*dot*hit.ny*0.9;
        }
      }
    });

    // Angled walls (left/right gutters)
    [{x1:20,y1:400,x2:80,y2:460},{x1:300,y1:400,x2:240,y2:460}].forEach(w=>{
      const hit=lineCircle(w.x1,w.y1,w.x2,w.y2,ball.x,ball.y,BALL_R);
      if(hit){
        const dot=ball.vx*hit.nx+ball.vy*hit.ny;
        if(dot<0){ball.vx-=2*dot*hit.nx*0.85;ball.vy-=2*dot*hit.ny*0.85;}
      }
    });

    // Bumpers
    bumpers.forEach(b=>{
      const dx=ball.x-b.x,dy=ball.y-b.y;
      const dist=Math.hypot(dx,dy);
      if(dist<b.r+BALL_R){
        const nx=dx/dist,ny=dy/dist;
        ball.x=b.x+nx*(b.r+BALL_R);
        ball.y=b.y+ny*(b.r+BALL_R);
        const kick=6;
        ball.vx=nx*kick;ball.vy=ny*kick;
        b.glow=1;
        score+=b.pts*multiplier;
        shakeInt=4;
        playBumper(300+b.pts);
        for(let i=0;i<8;i++){
          const a2=Math.PI*2*i/8;
          particles.push({x:ball.x,y:ball.y,vx:Math.cos(a2)*3,vy:Math.sin(a2)*3,life:1,color:b.color,size:3});
        }
      }
    });

    // Flipper collision
    [leftFlip,rightFlip].forEach((fl,fi)=>{
      const cos=Math.cos(fl.angle),sin=Math.sin(fl.angle);
      const ex=fl.x+cos*FLIPPER_LEN,ey=fl.y+sin*FLIPPER_LEN;
      const hit=lineCircle(fl.x,fl.y,ex,ey,ball.x,ball.y,BALL_R+FLIPPER_W/2);
      if(hit){
        const angVel=(fl.targetAngle-fl.angle)*3;
        const perpX=-sin,perpY=cos;
        const kickStr=Math.abs(angVel)*8+2;
        ball.vx+=hit.nx*kickStr*0.6+perpX*angVel*3;
        ball.vy+=hit.ny*kickStr*0.6+perpY*angVel*3-2;
        ball.x+=hit.nx*3;ball.y+=hit.ny*3;
      }
    });

    // Targets
    targets.forEach(t=>{
      if(!t.lit&&ball.x>t.x&&ball.x<t.x+t.w&&Math.abs(ball.y-t.y)<BALL_R+t.h/2){
        t.lit=true;score+=t.pts*multiplier;ball.vy=-Math.abs(ball.vy)*0.8-2;
        playTarget();
        for(let i=0;i<6;i++)particles.push({x:t.x+t.w/2,y:t.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*3,life:1,color:t.color,size:2});
        if(targets.every(tt=>tt.lit)){multiplier=Math.min(5,multiplier+1);targets.forEach(tt=>tt.lit=false);}
      }
    });

    // Sludge pits
    sludgePits.forEach(sp=>{
      if(ball.x>sp.x&&ball.x<sp.x+sp.w&&ball.y>sp.y-BALL_R&&ball.y<sp.y+sp.h+BALL_R){
        // Slow the ball dramatically
        ball.vx*=0.8;ball.vy*=0.8;
        // If stuck in sludge, drain
        if(Math.hypot(ball.vx,ball.vy)<1.5){
          drainBall('sludge');
        }
      }
    });
  }

  // Drain check
  if(ball.y>TH+20) drainBall('drain');

  // Bumper glow decay
  bumpers.forEach(b=>{if(b.glow>0)b.glow*=0.92;});

  // Sludge bubbles
  sludgePits.forEach(sp=>{
    if(Math.random()<0.06)sp.bubbles.push({x:sp.x+Math.random()*sp.w,y:sp.y+sp.h,vy:-0.3-Math.random()*0.3,r:1+Math.random()*2,life:30});
    sp.bubbles.forEach(b=>{b.y+=b.vy;b.life--;});
    sp.bubbles=sp.bubbles.filter(b=>b.life>0);
  });

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=0.04;p.vx*=0.98;});
  particles=particles.filter(p=>p.life>0);

  if(shakeInt>0)shakeInt*=0.85;

  // HUD
  document.getElementById('scoreText').textContent=score;
  document.getElementById('multiText').textContent='x'+multiplier;
  document.getElementById('ballsText').textContent='●'.repeat(balls);
}

function drainBall(type){
  if(!ball.alive)return;
  ball.alive=false;
  balls--;
  if(type==='sludge'){playSludge();shakeInt=8;}else{playDrain();}
  multiplier=1;
  for(let i=0;i<12;i++)particles.push({x:ball.x,y:ball.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*4,life:1,color:type==='sludge'?'#44ff66':'#ff4466',size:3});
  if(balls<=0){
    gameState='over';
    document.getElementById('goScore').textContent='SCORE: '+score;
    document.getElementById('gameOverOverlay').classList.remove('hidden');
  }else{
    setTimeout(resetBall,800);
  }
}

// Render
function render(){
  const sx=shakeInt>0.5?(Math.random()-0.5)*shakeInt:0;
  const sy=shakeInt>0.5?(Math.random()-0.5)*shakeInt:0;
  ctx.save();
  ctx.translate(sx,sy);

  // Background
  ctx.fillStyle='#050808';
  ctx.fillRect(0,0,TW,TH);

  // Grid pattern
  ctx.strokeStyle='#0a1a0e';ctx.lineWidth=0.5;
  for(let x=0;x<TW;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,TH);ctx.stroke();}
  for(let y=0;y<TH;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(TW,y);ctx.stroke();}

  // Walls
  ctx.strokeStyle='#226633';ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(20,20);ctx.lineTo(20,400);ctx.lineTo(80,460);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(280,20);ctx.lineTo(300,20);ctx.lineTo(300,400);ctx.lineTo(240,460);
  ctx.stroke();
  ctx.beginPath();ctx.moveTo(20,20);ctx.lineTo(280,20);ctx.stroke();
  // Launch lane
  ctx.strokeStyle='#1a3322';
  ctx.beginPath();ctx.moveTo(280,20);ctx.lineTo(280,480);ctx.stroke();
  // Guide rails
  ctx.strokeStyle='#226633';ctx.lineWidth=1.5;
  walls.slice(6).forEach(w=>{ctx.beginPath();ctx.moveTo(w.x1,w.y1);ctx.lineTo(w.x2,w.y2);ctx.stroke();});

  // Sludge pits
  sludgePits.forEach(sp=>{
    // Glow
    const grad=ctx.createLinearGradient(sp.x,sp.y-10,sp.x,sp.y+sp.h);
    grad.addColorStop(0,'rgba(68,255,102,0)');
    grad.addColorStop(1,'rgba(68,255,102,0.1)');
    ctx.fillStyle=grad;
    ctx.fillRect(sp.x,sp.y-10,sp.w,sp.h+10);
    // Sludge body
    ctx.fillStyle='#0a2a10';
    ctx.fillRect(sp.x,sp.y,sp.w,sp.h);
    // Surface with wave
    ctx.beginPath();ctx.moveTo(sp.x,sp.y);
    for(let i=0;i<=sp.w;i+=4){
      ctx.lineTo(sp.x+i,sp.y+Math.sin((frame*0.05+i*0.15))*2);
    }
    ctx.lineTo(sp.x+sp.w,sp.y+sp.h);ctx.lineTo(sp.x,sp.y+sp.h);ctx.closePath();
    ctx.fillStyle='#1a4a22';ctx.fill();
    ctx.strokeStyle='#44ff66';ctx.lineWidth=1;
    ctx.shadowColor='#44ff66';ctx.shadowBlur=6;
    ctx.beginPath();
    for(let i=0;i<=sp.w;i+=4){
      const px=sp.x+i,py=sp.y+Math.sin((frame*0.05+i*0.15))*2;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.stroke();ctx.shadowBlur=0;
    // Bubbles
    sp.bubbles.forEach(b=>{
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(68,255,102,${b.life/30*0.5})`;ctx.lineWidth=0.5;ctx.stroke();
    });
    // Label
    ctx.font='7px Chakra Petch';ctx.fillStyle='#44ff6640';ctx.textAlign='center';
    ctx.fillText('TOXIC',sp.x+sp.w/2,sp.y+sp.h-3);
  });

  // Targets
  targets.forEach(t=>{
    ctx.fillStyle=t.lit?t.color:'#112218';
    ctx.shadowColor=t.lit?t.color:'transparent';
    ctx.shadowBlur=t.lit?8:0;
    ctx.fillRect(t.x,t.y,t.w,t.h);
    ctx.strokeStyle=t.color;ctx.lineWidth=1;ctx.strokeRect(t.x,t.y,t.w,t.h);
    ctx.shadowBlur=0;
  });

  // Bumpers
  bumpers.forEach(b=>{
    const glow=b.glow;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=glow>0.1?b.color:'#0a1a10';
    ctx.shadowColor=b.color;ctx.shadowBlur=8+glow*20;
    ctx.fill();
    ctx.strokeStyle=b.color;ctx.lineWidth=1.5;ctx.stroke();
    ctx.shadowBlur=0;
    // Inner ring
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.6,0,Math.PI*2);
    ctx.strokeStyle=b.color+'80';ctx.lineWidth=1;ctx.stroke();
    // Points label
    ctx.font='7px Chakra Petch';ctx.fillStyle=b.color;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.pts,b.x,b.y);
  });

  // Flippers
  [leftFlip,rightFlip].forEach((fl,fi)=>{
    const cos=Math.cos(fl.angle),sin=Math.sin(fl.angle);
    const ex=fl.x+cos*FLIPPER_LEN,ey=fl.y+sin*FLIPPER_LEN;
    // Vibration offset
    const vOff=fl.vibe>0?Math.sin(vibePhase*8)*fl.vibe*0.5:0;

    ctx.save();
    ctx.translate(0,vOff);
    ctx.beginPath();
    ctx.moveTo(fl.x,fl.y);ctx.lineTo(ex,ey);
    ctx.strokeStyle='#44ff66';ctx.lineWidth=FLIPPER_W;ctx.lineCap='round';
    ctx.shadowColor='#44ff66';ctx.shadowBlur=fl.vibe>0?12:6;
    ctx.stroke();
    ctx.shadowBlur=0;
    // Pivot
    ctx.beginPath();ctx.arc(fl.x,fl.y,5,0,Math.PI*2);
    ctx.fillStyle='#226633';ctx.fill();
    ctx.restore();
  });

  // Launch lane
  if(ball&&ball.inLauncher){
    // Power meter
    const meterH=80;
    const fillH=meterH*(launchPower/100);
    ctx.fillStyle='#0a1a10';ctx.fillRect(285,400,10,meterH);
    const mGrad=ctx.createLinearGradient(0,400+meterH,0,400);
    mGrad.addColorStop(0,'#44ff66');mGrad.addColorStop(1,'#ffcc00');
    ctx.fillStyle=mGrad;ctx.fillRect(285,400+meterH-fillH,10,fillH);
    ctx.strokeStyle='#226633';ctx.lineWidth=1;ctx.strokeRect(285,400,10,meterH);
  }

  // Ball
  if(ball&&ball.alive){
    ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);
    ctx.fillStyle='#ccddcc';
    ctx.shadowColor='#44ff66';ctx.shadowBlur=10;
    ctx.fill();
    ctx.shadowBlur=0;
    // Highlight
    ctx.beginPath();ctx.arc(ball.x-2,ball.y-2,BALL_R*0.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
  }

  // Particles
  particles.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.globalAlpha=p.life;ctx.fill();
  });
  ctx.globalAlpha=1;

  // Drain zone indicator
  ctx.fillStyle='#ff446620';
  ctx.fillRect(80,490,160,10);
  ctx.strokeStyle='#ff4466';ctx.lineWidth=0.5;
  ctx.strokeRect(80,490,160,10);
  ctx.font='6px Chakra Petch';ctx.fillStyle='#ff446660';ctx.textAlign='center';
  ctx.fillText('DRAIN',160,498);

  ctx.restore();
}

function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
</body>
