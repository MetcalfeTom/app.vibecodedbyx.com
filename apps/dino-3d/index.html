<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dino Run 3D</title>
<link rel="icon" href="https://emojicdn.elk.sh/🦖">
<meta property="og:title" content="Dino Run 3D">
<meta property="og:description" content="The classic dino runner in 3D. Jump over cacti and duck under pterodactyls on an endless desert highway.">
<meta property="og:url" content="https://app.sloppy.live/dino-3d/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/3D%20pixel%20dinosaur%20running%20desert%20cacti%20obstacles%20chrome%20dino%20game%20low%20poly?width=1200&height=630&nologo=true&referrer=sloppy.live">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f7f7f7;font-family:'Share Tech Mono',monospace;touch-action:none;user-select:none}
canvas{display:block}
#hud{position:absolute;top:12px;right:16px;z-index:10;text-align:right;pointer-events:none}
#score{font-family:'Press Start 2P',monospace;font-size:clamp(14px,3vw,22px);color:#535353;letter-spacing:2px}
#hi{font-family:'Press Start 2P',monospace;font-size:clamp(9px,1.8vw,12px);color:#999;margin-top:2px}
#msg{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Press Start 2P',monospace;font-size:clamp(16px,4vw,28px);color:#535353;z-index:20;pointer-events:none;text-align:center;line-height:2;display:none}
#mobile-btn{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:90%;max-width:400px;height:80px;z-index:15;border:2px dashed #ccc;border-radius:12px;background:rgba(200,200,200,0.08);font-family:'Press Start 2P',monospace;font-size:10px;color:#bbb;line-height:80px;text-align:center;cursor:pointer}
@media(hover:none)and(pointer:coarse){#mobile-btn{display:block}}
#backlink{position:absolute;bottom:4px;right:10px;font-size:9px;color:#ccc;text-decoration:none;z-index:10}
#backlink:hover{color:#535353}
</style>
</head>
<body>
<div id="hud">
  <div id="score">00000</div>
  <div id="hi">HI 00000</div>
</div>
<div id="msg">GAME OVER<br><span style="font-size:0.5em">SPACE / TAP TO RESTART</span></div>
<div id="mobile-btn">TAP TO JUMP · DOUBLE TAP TO DUCK</div>
<a id="backlink" href="https://sloppy.live" target="_blank">sloppy.live</a>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

const msgEl = document.getElementById('msg');
const scoreEl = document.getElementById('score');
const hiEl = document.getElementById('hi');

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf7f7f7);
scene.fog = new THREE.Fog(0xf7f7f7, 60, 120);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 4, 10);
camera.lookAt(0, 1.5, 0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.camera.left = -30; dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 20; dirLight.shadow.camera.bottom = -5;
dirLight.shadow.camera.far = 60;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

// Materials
const groundMat = new THREE.MeshLambertMaterial({color:0xe8e8e8});
const dinoMat = new THREE.MeshLambertMaterial({color:0x22bb55});
const dinoHeadMat = new THREE.MeshLambertMaterial({color:0x33cc66});
const dinoJawMat = new THREE.MeshLambertMaterial({color:0x119944});
const dinoTailMat = new THREE.MeshLambertMaterial({color:0x1a9950});
const dinoLegMat = new THREE.MeshLambertMaterial({color:0x178040});
const dinoBellyMat = new THREE.MeshLambertMaterial({color:0x88ddaa});
const cactusMat = new THREE.MeshLambertMaterial({color:0x535353});
const pterMat = new THREE.MeshLambertMaterial({color:0x757575});
const lineMat = new THREE.MeshLambertMaterial({color:0xcccccc});

// Ground
const ground = new THREE.Mesh(new THREE.BoxGeometry(200, 0.3, 12), groundMat);
ground.position.set(0, -0.15, 0);
ground.receiveShadow = true;
scene.add(ground);

// Ground line
const line = new THREE.Mesh(new THREE.BoxGeometry(200, 0.05, 0.1), new THREE.MeshBasicMaterial({color:0xaaaaaa}));
line.position.set(0, 0.02, 0);
scene.add(line);

// Dashed lines (ground texture)
for (let i = -100; i < 100; i += 3) {
  if (Math.random() > 0.4) continue;
  const dash = new THREE.Mesh(new THREE.BoxGeometry(0.5+Math.random(), 0.02, 0.03), new THREE.MeshBasicMaterial({color:0xcccccc}));
  dash.position.set(i, 0.01, (Math.random()-0.5)*6);
  scene.add(dash);
}

// Build dino
function createDino() {
  const group = new THREE.Group();
  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 1), dinoMat);
  body.position.set(0, 1.4, 0); body.castShadow = true;
  group.add(body);
  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.7, 0.8), dinoHeadMat);
  head.position.set(0.3, 2.4, 0); head.castShadow = true;
  group.add(head);
  // Jaw
  const jaw = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.2, 0.6), dinoJawMat);
  jaw.position.set(0.5, 2.0, 0); jaw.castShadow = true;
  group.add(jaw);
  // Eye
  const eye = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.15), new THREE.MeshBasicMaterial({color:0xffffff}));
  eye.position.set(0.6, 2.55, 0.25);
  group.add(eye);
  const pupil = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshBasicMaterial({color:0x000000}));
  pupil.position.set(0.68, 2.55, 0.25);
  group.add(pupil);
  // Tail
  const tail = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 0.5), dinoTailMat);
  tail.position.set(-1, 1.6, 0); tail.castShadow = true;
  group.add(tail);
  const tailTip = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.3), dinoTailMat);
  tailTip.position.set(-1.8, 1.7, 0); tailTip.castShadow = true;
  group.add(tailTip);
  // Legs
  const legGeo = new THREE.BoxGeometry(0.3, 0.7, 0.35);
  const legL = new THREE.Mesh(legGeo, dinoLegMat); legL.position.set(0.1, 0.35, 0.25); legL.castShadow = true;
  const legR = new THREE.Mesh(legGeo, dinoLegMat); legR.position.set(0.1, 0.35, -0.25); legR.castShadow = true;
  group.add(legL, legR);
  group.userData = {legL, legR, body, head, jaw};
  return group;
}

const dino = createDino();
dino.position.set(0, 0, 0);
scene.add(dino);

// Obstacle pool
const obstacles = [];

function createCactus(variant) {
  const group = new THREE.Group();
  if (variant === 0) {
    // Small single
    const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2, 0.5), cactusMat);
    trunk.position.y = 1; trunk.castShadow = true;
    group.add(trunk);
  } else if (variant === 1) {
    // Tall with arms
    const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.6, 3, 0.6), cactusMat);
    trunk.position.y = 1.5; trunk.castShadow = true;
    group.add(trunk);
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), cactusMat);
    arm.position.set(0.5, 2.2, 0); arm.castShadow = true;
    group.add(arm);
    const arm2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), cactusMat);
    arm2.position.set(-0.5, 1.8, 0); arm2.castShadow = true;
    group.add(arm2);
  } else {
    // Double cluster
    const t1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2.2, 0.5), cactusMat);
    t1.position.set(-0.4, 1.1, 0); t1.castShadow = true;
    group.add(t1);
    const t2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.6, 0.5), cactusMat);
    t2.position.set(0.4, 0.8, 0); t2.castShadow = true;
    group.add(t2);
  }
  group.userData.type = 'cactus';
  group.userData.hitW = variant === 2 ? 1.4 : 0.8;
  group.userData.hitH = variant === 1 ? 3 : 2.2;
  return group;
}

function createPterodactyl() {
  const group = new THREE.Group();
  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.4, 0.5), pterMat);
  body.castShadow = true;
  group.add(body);
  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 0.3), pterMat);
  head.position.set(0.7, 0.1, 0);
  group.add(head);
  // Beak
  const beak = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.15), pterMat);
  beak.position.set(1.2, 0, 0);
  group.add(beak);
  // Wings
  const wingGeo = new THREE.BoxGeometry(0.8, 0.08, 1.8);
  const wingL = new THREE.Mesh(wingGeo, pterMat); wingL.castShadow = true;
  const wingR = new THREE.Mesh(wingGeo, pterMat); wingR.castShadow = true;
  wingL.position.set(-0.1, 0.1, 1.1);
  wingR.position.set(-0.1, 0.1, -1.1);
  group.add(wingL, wingR);
  group.userData = {type:'pterodactyl', wingL, wingR, hitW:2, hitH:0.8};
  return group;
}

// Audio
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playJump(){
  const o=AC.createOscillator();const g=AC.createGain();
  o.type='sine';o.frequency.setValueAtTime(400,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(800,AC.currentTime+0.08);
  g.gain.setValueAtTime(0.06,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.1);
}
function playScore(){
  const o=AC.createOscillator();const g=AC.createGain();
  o.type='square';o.frequency.value=1200;
  g.gain.setValueAtTime(0.04,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.05);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.05);
}
function playDie(){
  const o=AC.createOscillator();const g=AC.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(300,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(50,AC.currentTime+0.4);
  g.gain.setValueAtTime(0.1,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.4);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.4);
}

// State
let best = parseInt(localStorage.getItem('dino3d-best')) || 0;
hiEl.textContent = 'HI ' + String(best).padStart(5, '0');

let gameState = 'start'; // start, running, dead
let score = 0, speed = 0, frame = 0;
let dinoVY = 0, dinoY = 0, ducking = false;
let spawnTimer = 0, lastMilestone = 0;
let jumpPressed = false, duckPressed = false;

// Clouds
const clouds = [];
for (let i = 0; i < 8; i++) {
  const cg = new THREE.Mesh(
    new THREE.BoxGeometry(2+Math.random()*3, 0.6+Math.random()*0.4, 1+Math.random()),
    new THREE.MeshBasicMaterial({color:0xdddddd})
  );
  cg.position.set(-50+Math.random()*100, 8+Math.random()*6, -5-Math.random()*10);
  scene.add(cg);
  clouds.push(cg);
}

function initGame() {
  score = 0; speed = 0.15; frame = 0;
  dinoVY = 0; dinoY = 0; ducking = false;
  spawnTimer = 60; lastMilestone = 0;
  dino.position.set(0, 0, 0);
  dino.scale.set(1, 1, 1);
  obstacles.forEach(o => scene.remove(o));
  obstacles.length = 0;
  gameState = 'running';
  msgEl.style.display = 'none';
}

function spawnObstacle() {
  const far = -80;
  if (speed > 0.25 && Math.random() < 0.3) {
    // Pterodactyl
    const p = createPterodactyl();
    const h = Math.random() < 0.5 ? 1.5 : 3.5; // low or high
    p.position.set(far, h, 0);
    p.userData.flyHeight = h;
    scene.add(p);
    obstacles.push(p);
  } else {
    const variant = Math.floor(Math.random() * 3);
    const c = createCactus(variant);
    c.position.set(far, 0, 0);
    scene.add(c);
    obstacles.push(c);
  }
}

function update(dt) {
  if (gameState !== 'running') return;
  frame++;
  speed = 0.15 + frame * 0.00003;

  // Jump
  if (jumpPressed && dinoY <= 0.01) {
    dinoVY = 0.28;
    ducking = false;
    playJump();
  }
  // Duck
  if (duckPressed && dinoY <= 0.01) {
    ducking = true;
  } else if (!duckPressed) {
    ducking = false;
  }
  // Fast fall while ducking in air
  if (duckPressed && dinoY > 0.5) {
    dinoVY -= 0.025;
  }

  // Physics
  dinoVY -= 0.012;
  dinoY += dinoVY;
  if (dinoY <= 0) { dinoY = 0; dinoVY = 0; }
  dino.position.y = dinoY;

  // Duck squash
  if (ducking && dinoY < 0.1) {
    dino.scale.y = 0.5;
    dino.position.y = 0;
  } else {
    dino.scale.y = 1;
  }

  // Leg animation
  const legPhase = Math.sin(frame * 0.3) * 0.4;
  if (dinoY < 0.1) {
    dino.userData.legL.position.y = 0.35 + legPhase * 0.2;
    dino.userData.legR.position.y = 0.35 - legPhase * 0.2;
  }

  // Move obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.position.x += speed * 60 * dt;
    // Pterodactyl wing flap
    if (o.userData.type === 'pterodactyl') {
      const flap = Math.sin(frame * 0.15) * 0.4;
      if (o.userData.wingL) {
        o.userData.wingL.rotation.x = flap;
        o.userData.wingR.rotation.x = -flap;
      }
    }
    // Remove if past
    if (o.position.x > 15) {
      scene.remove(o);
      obstacles.splice(i, 1);
      continue;
    }
    // Collision
    const dx = Math.abs(o.position.x - dino.position.x);
    const hw = (o.userData.hitW || 1) / 2 + 0.4;
    if (dx < hw) {
      let dinoTop = dinoY + (ducking ? 1.2 : 2.8);
      let dinoBot = dinoY;
      let obstTop, obstBot;
      if (o.userData.type === 'pterodactyl') {
        obstBot = o.userData.flyHeight - 0.4;
        obstTop = o.userData.flyHeight + 0.4;
      } else {
        obstBot = 0;
        obstTop = o.userData.hitH || 2;
      }
      if (dinoTop > obstBot && dinoBot < obstTop) {
        die();
        return;
      }
    }
  }

  // Spawn
  spawnTimer -= speed * 60 * dt;
  if (spawnTimer <= 0) {
    spawnObstacle();
    spawnTimer = 40 + Math.random() * 30 - Math.min(speed * 30, 15);
  }

  // Clouds
  clouds.forEach(c => { c.position.x += speed * 10 * dt; if (c.position.x > 60) c.position.x = -60; });

  // Score
  score += speed * 60 * dt * 0.5;
  const s = Math.floor(score);
  scoreEl.textContent = String(s).padStart(5, '0');

  // Milestone sound
  if (s > 0 && s % 100 < 2 && s - lastMilestone >= 98) {
    lastMilestone = s;
    playScore();
    // Flash
    scene.background = new THREE.Color(0x535353);
    setTimeout(() => scene.background = new THREE.Color(0xf7f7f7), 100);
  }

  // Camera slight bob
  camera.position.y = 4 + Math.sin(frame * 0.05) * 0.05;
}

function die() {
  gameState = 'dead';
  playDie();
  const s = Math.floor(score);
  if (s > best) { best = s; localStorage.setItem('dino3d-best', best); }
  hiEl.textContent = 'HI ' + String(best).padStart(5, '0');
  msgEl.style.display = 'block';
}

// Input
const keys = {};
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    jumpPressed = true;
    if (gameState === 'start' || gameState === 'dead') initGame();
  }
  if (e.code === 'ArrowDown') { e.preventDefault(); duckPressed = true; }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') jumpPressed = false;
  if (e.code === 'ArrowDown') duckPressed = false;
});

// Touch
let lastTap = 0;
function handleTouch(e) {
  e.preventDefault();
  if (AC.state === 'suspended') AC.resume();
  const now = Date.now();
  if (now - lastTap < 300) {
    // Double tap = duck
    duckPressed = true;
    setTimeout(() => duckPressed = false, 500);
  } else {
    jumpPressed = true;
    setTimeout(() => jumpPressed = false, 100);
  }
  lastTap = now;
  if (gameState === 'start' || gameState === 'dead') initGame();
}
document.addEventListener('touchstart', handleTouch, {passive:false});
document.getElementById('mobile-btn').addEventListener('touchstart', handleTouch, {passive:false});

// Render
const clock = new THREE.Clock();
function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
