<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosquito Repellent</title>
<link rel="icon" href="https://emojicdn.elk.sh/🦟">
<meta property="og:title" content="Mosquito Repellent">
<meta property="og:description" content="Press the big red button. Unleash ultrasonic fury. Mosquitoes hate this one weird trick.">
<meta property="og:url" content="https://app.sloppy.live/mosquito-repel/">
<meta property="og:image" content="https://emojicdn.elk.sh/🦟?style=apple&size=512">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0a0a12;color:#e0e0e0;font-family:'Rajdhani',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;position:relative}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;
  gap:16px;padding:20px}
h1{font-family:'Orbitron',sans-serif;font-size:clamp(1rem,3.5vw,1.6rem);font-weight:900;
  letter-spacing:0.15em;text-transform:uppercase;
  background:linear-gradient(135deg,#ff3333,#ff6644);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;filter:drop-shadow(0 0 15px rgba(255,50,50,0.3))}
#sub{font-size:clamp(0.65rem,2vw,0.8rem);font-weight:300;opacity:0.4;letter-spacing:0.15em;
  text-transform:uppercase;margin-top:-8px}
#buttonWrap{position:relative;width:min(280px,65vw);height:min(280px,65vw);
  display:flex;align-items:center;justify-content:center;margin:10px 0}
#pulseRing1,#pulseRing2,#pulseRing3{position:absolute;border-radius:50%;
  border:2px solid rgba(255,50,50,0.2);pointer-events:none;opacity:0;
  width:100%;height:100%}
#pulseRing1.active,#pulseRing2.active,#pulseRing3.active{
  animation:pulseOut 1.5s ease-out infinite}
#pulseRing2.active{animation-delay:0.5s}
#pulseRing3.active{animation-delay:1s}
@keyframes pulseOut{0%{transform:scale(1);opacity:0.6}100%{transform:scale(1.8);opacity:0}}
#bigBtn{width:75%;height:75%;border-radius:50%;cursor:pointer;border:none;position:relative;
  background:radial-gradient(circle at 35% 35%,#ff4444,#cc0000 50%,#880000);
  box-shadow:0 8px 30px rgba(255,0,0,0.3),inset 0 -4px 12px rgba(0,0,0,0.4),
    inset 0 4px 8px rgba(255,150,150,0.2);
  transition:transform 0.1s,box-shadow 0.2s;
  display:flex;align-items:center;justify-content:center;flex-direction:column}
#bigBtn:hover{box-shadow:0 8px 40px rgba(255,0,0,0.5),inset 0 -4px 12px rgba(0,0,0,0.4),
    inset 0 4px 8px rgba(255,150,150,0.3)}
#bigBtn:active,#bigBtn.active{transform:scale(0.96);
  box-shadow:0 4px 20px rgba(255,0,0,0.6),inset 0 4px 12px rgba(0,0,0,0.5)}
#bigBtn.active{background:radial-gradient(circle at 35% 35%,#ff6666,#ee1111 50%,#aa0000);
  animation:btnGlow 0.8s ease-in-out infinite alternate}
@keyframes btnGlow{from{box-shadow:0 0 30px rgba(255,0,0,0.4),0 0 60px rgba(255,0,0,0.2),
  inset 0 -4px 12px rgba(0,0,0,0.4)}to{box-shadow:0 0 50px rgba(255,0,0,0.6),
  0 0 100px rgba(255,0,0,0.3),inset 0 -4px 12px rgba(0,0,0,0.4)}}
#btnIcon{font-size:clamp(2.5rem,8vw,4rem);line-height:1;pointer-events:none}
#btnText{font-family:'Orbitron',sans-serif;font-size:clamp(0.6rem,2vw,0.85rem);
  font-weight:700;color:#fff;letter-spacing:0.2em;pointer-events:none;margin-top:4px;
  text-shadow:0 1px 4px rgba(0,0,0,0.5)}
#controls{display:flex;flex-direction:column;gap:12px;width:min(320px,85vw);align-items:center}
.slider-row{display:flex;align-items:center;gap:10px;width:100%}
.slider-label{font-size:0.7rem;font-weight:500;letter-spacing:0.1em;width:80px;
  text-align:right;opacity:0.6;text-transform:uppercase}
.slider-val{font-family:'Orbitron',sans-serif;font-size:0.7rem;width:60px;color:#ff6644}
input[type=range]{flex:1;-webkit-appearance:none;background:rgba(255,255,255,0.08);
  height:4px;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:#ff3333;cursor:pointer;box-shadow:0 0 8px rgba(255,50,50,0.4)}
#modeRow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.mode-btn{cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;padding:8px 14px;font-family:'Rajdhani',sans-serif;font-size:0.75rem;
  font-weight:500;color:#aaa;letter-spacing:0.1em;transition:all 0.2s}
.mode-btn:hover{border-color:rgba(255,80,80,0.4);color:#ff8866}
.mode-btn.active{border-color:#ff3333;color:#ff4444;background:rgba(255,50,50,0.1);
  box-shadow:0 0 15px rgba(255,50,50,0.15)}
#status{font-family:'Orbitron',sans-serif;font-size:clamp(0.6rem,2vw,0.75rem);
  letter-spacing:0.2em;opacity:0.5;margin-top:4px;min-height:1.2em}
#disclaimer{font-size:0.55rem;opacity:0.25;text-align:center;max-width:300px;
  margin-top:8px;line-height:1.4}
#backlink{position:fixed;bottom:8px;right:12px;z-index:10;font-size:0.65rem;opacity:0.25}
#backlink a{color:#ff8866;text-decoration:none}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="content">
  <h1>Mosquito Repellent</h1>
  <div id="sub">ultrasonic defense system</div>
  <div id="buttonWrap">
    <div id="pulseRing1"></div>
    <div id="pulseRing2"></div>
    <div id="pulseRing3"></div>
    <button id="bigBtn">
      <div id="btnIcon">🦟</div>
      <div id="btnText">ACTIVATE</div>
    </button>
  </div>
  <div id="status">STANDBY</div>
  <div id="controls">
    <div class="slider-row">
      <span class="slider-label">Frequency</span>
      <input type="range" id="freqSlider" min="8000" max="22000" value="17000" step="100">
      <span class="slider-val" id="freqVal">17.0 kHz</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Oscillation</span>
      <input type="range" id="oscSlider" min="0" max="100" value="40" step="1">
      <span class="slider-val" id="oscVal">40 Hz</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Volume</span>
      <input type="range" id="volSlider" min="0" max="100" value="60" step="1">
      <span class="slider-val" id="volVal">60%</span>
    </div>
    <div id="modeRow">
      <button class="mode-btn active" data-mode="sweep">SWEEP</button>
      <button class="mode-btn" data-mode="pulse">PULSE</button>
      <button class="mode-btn" data-mode="chaos">CHAOS</button>
      <button class="mode-btn" data-mode="stealth">STEALTH</button>
    </div>
  </div>
  <div id="disclaimer">⚠ This app produces high-frequency sounds. Not scientifically proven to repel mosquitoes. Side effects may include annoyed pets and confused bats. Use at your own risk.</div>
</div>
<div id="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
// --- Elements ---
const bigBtn = document.getElementById('bigBtn');
const btnText = document.getElementById('btnText');
const btnIcon = document.getElementById('btnIcon');
const statusEl = document.getElementById('status');
const freqSlider = document.getElementById('freqSlider');
const oscSlider = document.getElementById('oscSlider');
const volSlider = document.getElementById('volSlider');
const freqVal = document.getElementById('freqVal');
const oscVal = document.getElementById('oscVal');
const volVal = document.getElementById('volVal');
const rings = [document.getElementById('pulseRing1'),document.getElementById('pulseRing2'),document.getElementById('pulseRing3')];
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');

// --- State ---
let active = false;
let mode = 'sweep';
let actx = null;
let mainOsc = null;
let lfo = null;
let gainNode = null;
let lfoGain = null;
let analyser = null;
let freqData = null;
let deadMosquitoes = [];
let aliveMosquitoes = [];
let runTime = 0;

// --- Audio ---
function startAudio() {
  if (!actx) actx = new AudioContext();
  if (actx.state === 'suspended') actx.resume();

  mainOsc = actx.createOscillator();
  mainOsc.type = 'sine';
  mainOsc.frequency.value = parseInt(freqSlider.value);

  gainNode = actx.createGain();
  gainNode.gain.value = parseInt(volSlider.value) / 100 * 0.5;

  lfo = actx.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = parseInt(oscSlider.value);

  lfoGain = actx.createGain();
  lfoGain.gain.value = 500; // LFO depth in Hz

  analyser = actx.createAnalyser();
  analyser.fftSize = 256;
  freqData = new Uint8Array(analyser.frequencyBinCount);

  lfo.connect(lfoGain);
  lfoGain.connect(mainOsc.frequency);
  mainOsc.connect(gainNode);
  gainNode.connect(analyser);
  analyser.connect(actx.destination);

  mainOsc.start();
  lfo.start();

  updateMode();
}

function stopAudio() {
  if (mainOsc) { mainOsc.stop(); mainOsc.disconnect(); mainOsc = null; }
  if (lfo) { lfo.stop(); lfo.disconnect(); lfo = null; }
  if (gainNode) { gainNode.disconnect(); gainNode = null; }
  if (lfoGain) { lfoGain.disconnect(); lfoGain = null; }
  analyser = null;
}

function updateMode() {
  if (!mainOsc || !lfo || !lfoGain) return;
  const baseFreq = parseInt(freqSlider.value);
  const oscRate = parseInt(oscSlider.value);

  switch(mode) {
    case 'sweep':
      mainOsc.type = 'sine';
      lfo.frequency.value = oscRate * 0.5;
      lfoGain.gain.value = baseFreq * 0.15;
      break;
    case 'pulse':
      mainOsc.type = 'square';
      lfo.frequency.value = oscRate * 0.3;
      lfoGain.gain.value = baseFreq * 0.05;
      break;
    case 'chaos':
      mainOsc.type = 'sawtooth';
      lfo.frequency.value = oscRate;
      lfoGain.gain.value = baseFreq * 0.3;
      break;
    case 'stealth':
      mainOsc.type = 'sine';
      lfo.frequency.value = oscRate * 0.1;
      lfoGain.gain.value = baseFreq * 0.02;
      break;
  }
}

// --- Controls ---
freqSlider.addEventListener('input', () => {
  freqVal.textContent = (parseInt(freqSlider.value)/1000).toFixed(1) + ' kHz';
  if (mainOsc) mainOsc.frequency.value = parseInt(freqSlider.value);
  updateMode();
});
oscSlider.addEventListener('input', () => {
  oscVal.textContent = oscSlider.value + ' Hz';
  updateMode();
});
volSlider.addEventListener('input', () => {
  volVal.textContent = volSlider.value + '%';
  if (gainNode) gainNode.gain.value = parseInt(volSlider.value) / 100 * 0.5;
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    updateMode();
  });
});

bigBtn.addEventListener('click', () => {
  active = !active;
  if (active) {
    startAudio();
    bigBtn.classList.add('active');
    btnText.textContent = 'ACTIVE';
    btnIcon.textContent = '🔊';
    rings.forEach(r => r.classList.add('active'));
    statusEl.textContent = 'EMITTING — ' + mode.toUpperCase();
    runTime = 0;
  } else {
    stopAudio();
    bigBtn.classList.remove('active');
    btnText.textContent = 'ACTIVATE';
    btnIcon.textContent = '🦟';
    rings.forEach(r => r.classList.remove('active'));
    statusEl.textContent = 'STANDBY';
  }
});

// --- Background visualization ---
function resizeBg() {
  bgCanvas.width = innerWidth;
  bgCanvas.height = innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

// Mosquitoes
function spawnMosquito() {
  const side = Math.random() < 0.5;
  aliveMosquitoes.push({
    x: side ? -20 : bgCanvas.width + 20,
    y: Math.random() * bgCanvas.height,
    vx: (side ? 1 : -1) * (0.5 + Math.random() * 1.5),
    vy: (Math.random() - 0.5) * 2,
    size: 8 + Math.random() * 6,
    wingPhase: Math.random() * Math.PI * 2,
    life: 1
  });
}

function drawMosquito(m, t) {
  bgCtx.save();
  bgCtx.translate(m.x, m.y);
  bgCtx.globalAlpha = m.life * 0.6;

  // Body
  bgCtx.fillStyle = '#333';
  bgCtx.beginPath();
  bgCtx.ellipse(0, 0, m.size * 0.3, m.size * 0.8, 0, 0, Math.PI * 2);
  bgCtx.fill();

  // Wings
  const wingAngle = Math.sin(t * 30 + m.wingPhase) * 0.4;
  bgCtx.strokeStyle = 'rgba(255,255,255,0.15)';
  bgCtx.lineWidth = 1;
  bgCtx.beginPath();
  bgCtx.ellipse(-m.size * 0.5, -m.size * 0.2, m.size * 0.5, m.size * 0.2, wingAngle, 0, Math.PI * 2);
  bgCtx.stroke();
  bgCtx.beginPath();
  bgCtx.ellipse(m.size * 0.5, -m.size * 0.2, m.size * 0.5, m.size * 0.2, -wingAngle, 0, Math.PI * 2);
  bgCtx.stroke();

  // Legs
  bgCtx.strokeStyle = 'rgba(80,80,80,0.4)';
  bgCtx.lineWidth = 0.5;
  for (let i = -1; i <= 1; i++) {
    const ly = i * m.size * 0.25;
    bgCtx.beginPath(); bgCtx.moveTo(-2, ly); bgCtx.lineTo(-m.size * 0.6, ly + m.size * 0.3); bgCtx.stroke();
    bgCtx.beginPath(); bgCtx.moveTo(2, ly); bgCtx.lineTo(m.size * 0.6, ly + m.size * 0.3); bgCtx.stroke();
  }

  // Proboscis
  bgCtx.strokeStyle = 'rgba(80,80,80,0.5)';
  bgCtx.lineWidth = 1;
  bgCtx.beginPath(); bgCtx.moveTo(0, -m.size * 0.8); bgCtx.lineTo(0, -m.size * 1.3); bgCtx.stroke();

  bgCtx.restore();
}

function drawDeadMosquito(m) {
  bgCtx.save();
  bgCtx.translate(m.x, m.y);
  bgCtx.rotate(m.rot);
  bgCtx.globalAlpha = m.life * 0.4;
  bgCtx.fillStyle = '#553333';
  bgCtx.beginPath();
  bgCtx.ellipse(0, 0, m.size * 0.25, m.size * 0.6, 0, 0, Math.PI * 2);
  bgCtx.fill();
  // X eyes
  bgCtx.strokeStyle = 'rgba(255,0,0,0.5)';
  bgCtx.lineWidth = 1.5;
  const ex = m.size * 0.15;
  bgCtx.beginPath(); bgCtx.moveTo(-ex - 2, -m.size * 0.3 - 2); bgCtx.lineTo(-ex + 2, -m.size * 0.3 + 2); bgCtx.stroke();
  bgCtx.beginPath(); bgCtx.moveTo(-ex + 2, -m.size * 0.3 - 2); bgCtx.lineTo(-ex - 2, -m.size * 0.3 + 2); bgCtx.stroke();
  bgCtx.restore();
}

// Sound wave rings
let waveRings = [];

function drawBg(t) {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0, 0, w, h);

  // Subtle radial gradient
  const grad = bgCtx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w * 0.6);
  grad.addColorStop(0, active ? 'rgba(40,0,0,0.15)' : 'rgba(10,10,20,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, w, h);

  // Wave rings when active
  if (active) {
    if (Math.random() < 0.08) {
      waveRings.push({ r: 30, maxR: 200 + Math.random() * 200, life: 1 });
    }
  }
  for (let i = waveRings.length - 1; i >= 0; i--) {
    const ring = waveRings[i];
    ring.r += 2;
    ring.life -= 0.015;
    if (ring.life <= 0) { waveRings.splice(i, 1); continue; }
    bgCtx.strokeStyle = `rgba(255,60,60,${ring.life * 0.12})`;
    bgCtx.lineWidth = 1;
    bgCtx.beginPath();
    bgCtx.arc(w / 2, h / 2, ring.r, 0, Math.PI * 2);
    bgCtx.stroke();
  }

  // Frequency visualizer bar at bottom
  if (active && analyser) {
    analyser.getByteFrequencyData(freqData);
    const barW = w / freqData.length;
    for (let i = 0; i < freqData.length; i++) {
      const val = freqData[i] / 255;
      const barH = val * 40;
      bgCtx.fillStyle = `rgba(255,${60 + val * 100},${50},${0.15 + val * 0.3})`;
      bgCtx.fillRect(i * barW, h - barH, barW - 1, barH);
    }
  }

  // Mosquitoes
  if (Math.random() < (active ? 0.005 : 0.03) && aliveMosquitoes.length < (active ? 5 : 15)) {
    spawnMosquito();
  }

  for (let i = aliveMosquitoes.length - 1; i >= 0; i--) {
    const m = aliveMosquitoes[i];

    if (active) {
      // Flee from center
      const dx = m.x - w / 2, dy = m.y - h / 2;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 300) {
        m.vx += (dx / dist) * 0.3;
        m.vy += (dy / dist) * 0.3;
      }
      // Random death chance near center
      if (dist < 150 && Math.random() < 0.02) {
        deadMosquitoes.push({
          x: m.x, y: m.y, size: m.size,
          vy: 1 + Math.random(), rot: (Math.random() - 0.5) * 2,
          life: 1
        });
        aliveMosquitoes.splice(i, 1);
        continue;
      }
    }

    // Erratic movement
    m.vx += (Math.random() - 0.5) * 0.3;
    m.vy += (Math.random() - 0.5) * 0.3;
    m.x += m.vx;
    m.y += m.vy;

    // Remove if off screen
    if (m.x < -50 || m.x > w + 50 || m.y < -50 || m.y > h + 50) {
      aliveMosquitoes.splice(i, 1);
      continue;
    }

    drawMosquito(m, t);
  }

  // Dead mosquitoes fall
  for (let i = deadMosquitoes.length - 1; i >= 0; i--) {
    const m = deadMosquitoes[i];
    m.y += m.vy;
    m.vy += 0.05;
    m.rot += 0.02;
    m.life -= 0.005;
    if (m.life <= 0 || m.y > h + 20) { deadMosquitoes.splice(i, 1); continue; }
    drawDeadMosquito(m);
  }
}

// --- Status updates ---
const STATUS_MSGS = [
  'EMITTING — {mode}',
  'SCANNING FOR TARGETS...',
  'FREQUENCY LOCK — {freq}',
  '{kills} MOSQUITOES NEUTRALIZED',
  'OSCILLATION STABLE — {mode}',
  'PERIMETER SECURED',
  'ULTRASONIC SHIELD ACTIVE',
  'DEFENSE GRID ONLINE',
];

let killCount = 0;
let statusTimer = 0;

function updateStatus(dt) {
  if (!active) return;
  runTime += dt;
  statusTimer += dt;
  if (statusTimer > 3) {
    statusTimer = 0;
    killCount += deadMosquitoes.length;
    let msg = STATUS_MSGS[Math.floor(Math.random() * STATUS_MSGS.length)];
    msg = msg.replace('{mode}', mode.toUpperCase());
    msg = msg.replace('{freq}', (parseInt(freqSlider.value) / 1000).toFixed(1) + ' kHz');
    msg = msg.replace('{kills}', killCount);
    statusEl.textContent = msg;
  }
}

// --- Main loop ---
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;

  // Chaos mode: randomize frequency
  if (active && mode === 'chaos' && mainOsc && Math.random() < 0.05) {
    const base = parseInt(freqSlider.value);
    mainOsc.frequency.value = base + (Math.random() - 0.5) * 4000;
  }

  drawBg(ts / 1000);
  updateStatus(dt);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
