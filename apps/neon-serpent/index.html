<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Serpent</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐍">
<meta property="og:title" content="Neon Serpent">
<meta property="og:description" content="Classic snake with neon glow, color-shifting fire trail, and pulsing food.">
<meta property="og:url" content="https://app.sloppy.live/neon-serpent/">
<meta property="og:image" content="https://emojicdn.elk.sh/🐍?style=google">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#07060d}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Outfit',sans-serif}

canvas{display:block;border-radius:4px}

.hud{
  display:flex;justify-content:space-between;align-items:center;
  width:min(92vw,520px);padding:8px 4px;
  font-family:'Press Start 2P',monospace;font-size:0.55rem;color:#555;
}
.score-val{color:#00ff88;text-shadow:0 0 10px #00ff8844}
.hi-val{color:#ff5544;text-shadow:0 0 10px #ff554444}
.streak-val{color:#ffcc00;text-shadow:0 0 8px #ffcc0044}

.overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(7,6,13,0.9);z-index:10;gap:12px;text-align:center;
}
.overlay h1{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(1.1rem,4vw,1.8rem);line-height:1.5;
  background:linear-gradient(135deg,#00ff88,#00eeff,#ff3377,#ffcc00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.overlay .sub{color:#555;font-size:0.75rem;font-weight:300;max-width:320px;line-height:1.5}
.overlay .final{font-family:'Press Start 2P',monospace;font-size:2rem;color:#ffcc00;text-shadow:0 0 20px #ffcc0055}
.play-btn{
  margin-top:6px;padding:12px 36px;border:2px solid #00ff88;border-radius:8px;
  background:transparent;color:#00ff88;font-family:'Press Start 2P',monospace;
  font-size:0.65rem;cursor:pointer;transition:all 0.2s;
}
.play-btn:hover{background:#00ff88;color:#07060d;box-shadow:0 0 20px #00ff8855}

.mobile-controls{
  display:none;padding-top:6px;
}
.d-row{display:flex;gap:4px;justify-content:center}
.d-btn{
  width:50px;height:50px;border-radius:10px;
  border:1px solid rgba(0,255,136,0.2);background:rgba(0,255,136,0.05);
  color:rgba(0,255,136,0.5);font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
}
.d-btn:active{background:rgba(0,255,136,0.2)}
@media(pointer:coarse){.mobile-controls{display:flex;flex-direction:column;gap:2px}}
@media(max-width:768px){.mobile-controls{display:flex;flex-direction:column;gap:2px}}

</style>
</head>
<body>

<div class="hud">
  <div>SCORE <span class="score-val" id="score">0</span></div>
  <div>STREAK <span class="streak-val" id="streak">0</span></div>
  <div>HI <span class="hi-val" id="hi">0</span></div>
</div>
<canvas id="c"></canvas>

<div class="mobile-controls">
  <div class="d-row"><div class="d-btn" data-dir="up">▲</div></div>
  <div class="d-row">
    <div class="d-btn" data-dir="left">◀</div>
    <div class="d-btn" data-dir="down">▼</div>
    <div class="d-btn" data-dir="right">▶</div>
  </div>
</div>

<div class="overlay" id="start-overlay">
  <h1>NEON SERPENT</h1>
  <div class="sub">Eat glowing food. Your fire trail shifts color with each bite. Don't crash.</div>
  <button class="play-btn" onclick="startGame()">PLAY</button>
</div>
<div class="overlay" id="over-overlay" style="display:none">
  <h1>GAME OVER</h1>
  <div class="final" id="final-score">0</div>
  <div class="sub" id="over-msg"></div>
  <button class="play-btn" onclick="startGame()">RETRY</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const CELL = 18;
const COLS = 26;
const ROWS = 26;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

const maxW = Math.min(window.innerWidth * 0.92, 520);
const maxH = Math.min(window.innerHeight * 0.52, 520);
const sc = Math.min(maxW / canvas.width, maxH / canvas.height);
canvas.style.width = Math.floor(canvas.width * sc) + 'px';
canvas.style.height = Math.floor(canvas.height * sc) + 'px';

const PALETTE = [
  {h:155,name:'green'},  {h:190,name:'cyan'},   {h:330,name:'pink'},
  {h:270,name:'purple'}, {h:45,name:'gold'},    {h:15,name:'orange'},
  {h:210,name:'blue'},   {h:0,name:'red'},
];

let snake, dir, nextDir, food, score, hiScore, gameOn, speed, tick;
let hueIdx, trailHue, fireTrail, streak, eatFlash, foodBob;
hiScore = parseInt(localStorage.getItem('neon-serpent-hi') || '0');
document.getElementById('hi').textContent = hiScore;

function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  document.getElementById('over-overlay').style.display = 'none';
  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  snake = [];
  for (let i = 0; i < 4; i++) snake.push({x: cx - i, y: cy});
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; streak = 0; speed = 110; eatFlash = 0; foodBob = 0;
  hueIdx = 0; trailHue = PALETTE[0].h;
  fireTrail = [];
  document.getElementById('score').textContent = 0;
  document.getElementById('streak').textContent = 0;
  placeFood();
  gameOn = true;
  clearInterval(tick);
  tick = setInterval(step, speed);
  render();
}

function placeFood() {
  const occ = new Set(snake.map(s => s.x+','+s.y));
  let fx, fy;
  do { fx = Math.floor(Math.random()*COLS); fy = Math.floor(Math.random()*ROWS); }
  while (occ.has(fx+','+fy));
  food = {
    x: fx, y: fy,
    hue: PALETTE[(hueIdx + 1) % PALETTE.length].h,
    special: Math.random() < 0.15
  };
}

function step() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wrap
  if (head.x < 0) head.x = COLS-1;
  if (head.x >= COLS) head.x = 0;
  if (head.y < 0) head.y = ROWS-1;
  if (head.y >= ROWS) head.y = 0;

  // Self collision
  for (const s of snake) {
    if (s.x === head.x && s.y === head.y) { gameOver(); return; }
  }

  // Add fire trail from tail before moving
  const tail = snake[snake.length - 1];
  fireTrail.push({
    x: tail.x * CELL + CELL/2, y: tail.y * CELL + CELL/2,
    hue: trailHue, life: 1.0, r: CELL * 0.4 + Math.random() * 2
  });
  if (fireTrail.length > 80) fireTrail.shift();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    // Eat
    const pts = food.special ? 30 : 10;
    score += pts;
    streak++;
    eatFlash = 6;
    hueIdx = (hueIdx + 1) % PALETTE.length;
    trailHue = PALETTE[hueIdx].h;

    document.getElementById('score').textContent = score;
    document.getElementById('streak').textContent = streak;

    // Burst fire particles
    for (let i = 0; i < 12; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 1 + Math.random() * 2;
      fireTrail.push({
        x: head.x * CELL + CELL/2, y: head.y * CELL + CELL/2,
        hue: trailHue, life: 1.2,
        r: 2 + Math.random() * 4,
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd
      });
    }

    placeFood();
    if (speed > 55) { speed -= 2; clearInterval(tick); tick = setInterval(step, speed); }
  } else {
    snake.pop();
  }
}

function gameOver() {
  gameOn = false;
  clearInterval(tick);
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('neon-serpent-hi', hiScore);
    document.getElementById('hi').textContent = hiScore;
  }
  document.getElementById('final-score').textContent = score;
  const msgs = ['Your glow fades...','The neon dims.','Crashed into yourself!','So close...','The serpent rests.'];
  document.getElementById('over-msg').textContent = msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById('over-overlay').style.display = 'flex';
}

function render() {
  const t = performance.now() * 0.001;
  foodBob = t;

  ctx.fillStyle = '#07060d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.018)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, ROWS*CELL); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(COLS*CELL, y*CELL); ctx.stroke();
  }

  // Fire trail
  for (const f of fireTrail) {
    if (f.vx !== undefined) { f.x += f.vx; f.y += f.vy; f.vx *= 0.92; f.vy *= 0.92; }
    f.life -= 0.025;
    const a = Math.max(0, f.life);
    ctx.shadowColor = `hsla(${f.hue},100%,60%,${a})`;
    ctx.shadowBlur = 10 * a;
    ctx.fillStyle = `hsla(${f.hue},100%,${55 + a*20}%,${a * 0.6})`;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r * a, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  // Clean dead
  while (fireTrail.length && fireTrail[0].life <= 0) fireTrail.shift();

  // Food
  const fcx = food.x * CELL + CELL/2, fcy = food.y * CELL + CELL/2;
  const fp = 1 + Math.sin(foodBob * 5) * 0.25;
  const fh = food.hue;

  // Food outer glow
  const fGrad = ctx.createRadialGradient(fcx, fcy, 0, fcx, fcy, CELL * 2.5);
  fGrad.addColorStop(0, `hsla(${fh},100%,60%,0.15)`);
  fGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = fGrad;
  ctx.fillRect(fcx - CELL*2.5, fcy - CELL*2.5, CELL*5, CELL*5);

  ctx.shadowColor = `hsl(${fh},100%,60%)`;
  ctx.shadowBlur = food.special ? 20 : 14;

  if (food.special) {
    // Star shape for special food
    ctx.fillStyle = `hsl(${fh},100%,70%)`;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = (Math.PI * 2 / 5) * i - Math.PI/2 + t * 2;
      const a2 = a1 + Math.PI / 5;
      const ro = CELL * 0.45 * fp, ri = CELL * 0.2 * fp;
      if (i === 0) ctx.moveTo(fcx + Math.cos(a1)*ro, fcy + Math.sin(a1)*ro);
      else ctx.lineTo(fcx + Math.cos(a1)*ro, fcy + Math.sin(a1)*ro);
      ctx.lineTo(fcx + Math.cos(a2)*ri, fcy + Math.sin(a2)*ri);
    }
    ctx.closePath(); ctx.fill();
  } else {
    ctx.fillStyle = `hsl(${fh},100%,65%)`;
    ctx.beginPath();
    ctx.arc(fcx, fcy, (CELL/2 - 3) * fp, 0, Math.PI * 2);
    ctx.fill();
  }
  // Bright core
  ctx.fillStyle = `hsla(${fh},100%,90%,0.7)`;
  ctx.beginPath();
  ctx.arc(fcx, fcy, (CELL/2 - 3) * fp * 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake body
  const len = snake.length;
  for (let i = len - 1; i >= 0; i--) {
    const s = snake[i];
    const px = s.x * CELL, py = s.y * CELL;
    const prog = i / len;
    const segHue = trailHue;
    const light = 55 - prog * 15;
    const sat = 100;

    // Glow
    ctx.shadowColor = `hsl(${segHue},${sat}%,${light}%)`;
    ctx.shadowBlur = i === 0 ? 14 : 6;

    const inset = i === 0 ? 0 : 1;
    const bulge = (i === 0 && eatFlash > 0) ? 2 : 0;

    // Body
    ctx.fillStyle = `hsl(${segHue},${sat}%,${light}%)`;
    const bx = px + inset - bulge, by = py + inset - bulge;
    const bw = CELL - inset*2 + bulge*2, bh = CELL - inset*2 + bulge*2;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, i === 0 ? 5 : 3);
    ctx.fill();

    // Highlight
    ctx.fillStyle = `hsla(${segHue},100%,${light+25}%,0.25)`;
    ctx.fillRect(bx + 2, by + 1, bw - 4, 2);

    ctx.shadowBlur = 0;
  }

  // Head details
  if (len > 0) {
    const h = snake[0];
    const hx = h.x * CELL + CELL/2, hy = h.y * CELL + CELL/2;
    const eo = 4;
    let e1x, e1y, e2x, e2y;
    if (dir.x === 1) { e1x=hx+3;e1y=hy-eo;e2x=hx+3;e2y=hy+eo; }
    else if (dir.x === -1) { e1x=hx-3;e1y=hy-eo;e2x=hx-3;e2y=hy+eo; }
    else if (dir.y === -1) { e1x=hx-eo;e1y=hy-3;e2x=hx+eo;e2y=hy-3; }
    else { e1x=hx-eo;e1y=hy+3;e2x=hx+eo;e2y=hy+3; }

    // Eye whites
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(e1x, e1y, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e2x, e2y, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Pupils
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(e1x+dir.x*0.8, e1y+dir.y*0.8, 1.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e2x+dir.x*0.8, e2y+dir.y*0.8, 1.2, 0, Math.PI*2); ctx.fill();

    // Tongue flicker
    if (Math.sin(t * 6) > 0.3) {
      const tx = hx + dir.x * (CELL/2 + 3), ty = hy + dir.y * (CELL/2 + 3);
      ctx.strokeStyle = '#ff3355';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(hx + dir.x * CELL/2, hy + dir.y * CELL/2);
      ctx.lineTo(tx, ty);
      // Fork
      const perp = dir.x !== 0 ? {x:0,y:1} : {x:1,y:0};
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx + dir.x*3 + perp.x*2, ty + dir.y*3 + perp.y*2);
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx + dir.x*3 - perp.x*2, ty + dir.y*3 - perp.y*2);
      ctx.stroke();
    }
  }

  if (eatFlash > 0) eatFlash--;

  if (gameOn) requestAnimationFrame(render);
}

// Input
window.addEventListener('keydown', e => {
  if (!gameOn) return;
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': if (dir.y!==1) nextDir={x:0,y:-1}; break;
    case 'ArrowDown': case 's': case 'S': if (dir.y!==-1) nextDir={x:0,y:1}; break;
    case 'ArrowLeft': case 'a': case 'A': if (dir.x!==1) nextDir={x:-1,y:0}; break;
    case 'ArrowRight': case 'd': case 'D': if (dir.x!==-1) nextDir={x:1,y:0}; break;
  }
  e.preventDefault();
});

document.querySelectorAll('.d-btn').forEach(btn => {
  const d = btn.dataset.dir;
  const DIRS = {up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
  function press(e) {
    e.preventDefault();
    if (!gameOn) return;
    const nd = DIRS[d];
    if (nd.x !== 0 && dir.x === -nd.x) return;
    if (nd.y !== 0 && dir.y === -nd.y) return;
    nextDir = nd;
  }
  btn.addEventListener('touchstart', press, {passive:false});
  btn.addEventListener('mousedown', press);
});

// Swipe
let ts = null;
canvas.addEventListener('touchstart', e => { ts = {x:e.touches[0].clientX, y:e.touches[0].clientY}; }, {passive:true});
canvas.addEventListener('touchend', e => {
  if (!ts || !gameOn) return;
  const dx = e.changedTouches[0].clientX - ts.x, dy = e.changedTouches[0].clientY - ts.y;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && dir.x !== -1) nextDir = {x:1,y:0};
    else if (dx < 0 && dir.x !== 1) nextDir = {x:-1,y:0};
  } else {
    if (dy > 0 && dir.y !== -1) nextDir = {x:0,y:1};
    else if (dy < 0 && dir.y !== 1) nextDir = {x:0,y:-1};
  }
  ts = null;
});

// Idle
(function idle() {
  if (gameOn) return;
  const t = performance.now() * 0.001;
  ctx.fillStyle = '#07060d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < PALETTE.length; i++) {
    const px = canvas.width * 0.15 + (canvas.width * 0.7 / (PALETTE.length-1)) * i;
    const py = canvas.height/2 + Math.sin(t*2 + i*0.7) * 25;
    const r = 4 + Math.sin(t*3 + i) * 2;
    ctx.shadowColor = `hsl(${PALETTE[i].h},100%,60%)`;
    ctx.shadowBlur = 12;
    ctx.fillStyle = `hsl(${PALETTE[i].h},100%,60%)`;
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;
  requestAnimationFrame(idle);
})();
</script>
</body>
</html>
