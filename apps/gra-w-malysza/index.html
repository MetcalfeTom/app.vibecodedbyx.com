<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Gra w Małysza</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0625">
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9B%B7%EF%B8%8F">
<meta name="description" content="Tuck, launch, lean, land — for the glory of Polish ski jumping. Hold Space at the lip and chase the K-95.">
<meta property="og:title" content="Gra w Małysza">
<meta property="og:description" content="Tuck, launch, lean, land — for the glory of Polish ski jumping. Hold Space at the lip and chase the K-95.">
<meta property="og:url" content="https://sloppy.live/gra-w-malysza">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Polish%20ski%20jumper%20mid-flight%20in%20red%20and%20white%20suit%20over%20neon%20synthwave%20ramp%20at%20night%2C%20arcade%20game%20art%2C%20legendary%20glory?width=1200&height=630&model=flux&seed=2026&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Share+Tech+Mono&family=Rubik+Mono+One&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0625;
    --void-2:#15083a;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
    --slope:#1a0f3a;
    --pl-red:#dc143c;
    --pl-red-glow:rgba(220,20,60,0.55);
    --pl-white:#fdfdfd;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Share Tech Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,43,214,0.18), transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(92,230,255,0.10), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;
  }
  header{
    width:100%;text-align:center;padding:0.6rem 1rem 0.2rem;position:relative;z-index:2;
    pointer-events:none;
  }
  h1{
    font-family:'Audiowide', monospace;
    font-size:clamp(1.4rem, 3.4vw, 2.2rem);
    letter-spacing:0.08em;
    line-height:1;
    display:inline-flex;align-items:center;gap:0.5rem;justify-content:center;
  }
  h1 .pl-w{color:var(--pl-white);text-shadow:0 0 10px rgba(253,253,253,0.5), 0 0 20px rgba(220,20,60,0.4)}
  h1 .pl-r{color:var(--pl-red);text-shadow:0 0 12px var(--pl-red-glow), 0 0 24px rgba(220,20,60,0.5)}
  h1 .flag{
    display:inline-block;width:1.4em;height:0.85em;
    background:linear-gradient(to bottom, var(--pl-white) 50%, var(--pl-red) 50%);
    border:1px solid rgba(255,255,255,0.25);border-radius:0.12em;
    box-shadow:0 0 8px rgba(220,20,60,0.35);
    vertical-align:middle;
  }
  .tag{
    font-family:'Major Mono Display', monospace;font-size:clamp(0.6rem, 1.2vw, 0.8rem);
    letter-spacing:0.35em;color:var(--silver);margin-top:0.2rem;text-transform:lowercase;
  }
  .tag .accent{color:var(--pl-red);text-shadow:0 0 6px var(--pl-red-glow)}
  main{
    flex:1;display:flex;align-items:center;justify-content:center;
    width:100%;padding:0.3rem 0.4rem 1rem;
    position:relative;
  }
  canvas{
    display:block;background:#02011a;
    border:1px solid rgba(92,230,255,0.18);
    box-shadow:0 0 36px rgba(255,43,214,0.18), inset 0 0 22px rgba(0,0,0,0.6);
    max-width:100%;
  }
  /* HUD */
  .hud-top{
    position:fixed;top:3.4rem;left:0.6rem;right:0.6rem;
    display:flex;justify-content:space-between;align-items:flex-start;
    z-index:5;pointer-events:none;
    font-family:'Share Tech Mono', monospace;
  }
  .hud-top .card{
    background:rgba(10,6,37,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(92,230,255,0.32);
    padding:0.55rem 0.85rem;border-radius:0.4rem;
    display:flex;flex-direction:column;gap:0.2rem;
    box-shadow:0 0 14px rgba(92,230,255,0.15);
    min-width:5.5rem;
  }
  .hud-top .label{font-size:0.6rem;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase}
  .hud-top .val{font-family:'Rubik Mono One', monospace;font-size:1.5rem;color:var(--cyan);letter-spacing:0.04em;line-height:1}
  .hud-top .card.best .val{color:var(--gold)}
  .hud-top .card.attempt .val{color:var(--magenta)}
  .hud-top .card .unit{font-size:0.7rem;color:var(--silver-dim);margin-left:0.18rem}

  /* phase prompt */
  .prompt{
    position:fixed;top:55%;left:50%;transform:translate(-50%, -50%);
    font-family:'Audiowide', monospace;
    font-size:clamp(1.4rem, 4vw, 2.6rem);
    color:var(--ink);letter-spacing:0.1em;
    text-shadow:0 0 14px var(--magenta), 0 0 28px rgba(255,43,214,0.4);
    pointer-events:none;z-index:6;opacity:0;
    transition:opacity 0.3s, transform 0.35s;
    text-align:center;text-transform:uppercase;
  }
  .prompt.show{opacity:1}
  .prompt.show.pulse{animation:promptPulse 1.2s ease-out}
  @keyframes promptPulse{
    0%{transform:translate(-50%, -50%) scale(1.4)}
    20%{transform:translate(-50%, -50%) scale(1)}
    100%{transform:translate(-50%, -50%) scale(1)}
  }

  /* timing meter for launch */
  .timing-meter{
    position:fixed;bottom:8.5rem;left:50%;transform:translateX(-50%);
    width:18rem;height:1.2rem;background:rgba(10,6,37,0.78);
    border:1px solid rgba(92,230,255,0.4);border-radius:0.6rem;
    overflow:hidden;z-index:5;display:none;
    box-shadow:0 0 18px rgba(255,43,214,0.3);
  }
  .timing-meter.show{display:block}
  .timing-meter .sweet{
    position:absolute;top:0;bottom:0;
    background:linear-gradient(180deg, var(--gold), #ffaa3a);
    box-shadow:0 0 12px var(--gold);
  }
  .timing-meter .marker{
    position:absolute;top:-3px;bottom:-3px;width:3px;background:var(--cyan);
    box-shadow:0 0 12px var(--cyan), 0 0 24px rgba(92,230,255,0.7);
  }

  /* result panel */
  .result{
    position:fixed;left:50%;top:50%;transform:translate(-50%, -50%);
    background:rgba(10,6,37,0.94);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:2px solid var(--cyan);border-radius:0.8rem;
    padding:1.5rem 2rem;text-align:center;z-index:20;
    box-shadow:0 0 40px rgba(92,230,255,0.4);
    display:none;min-width:18rem;
  }
  .result.show{display:block;animation:popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1)}
  @keyframes popIn{
    from{opacity:0;transform:translate(-50%, -50%) scale(0.7)}
    to{opacity:1;transform:translate(-50%, -50%) scale(1)}
  }
  .result h2{
    font-family:'Audiowide', monospace;font-size:1.5rem;color:var(--cyan);letter-spacing:0.1em;
    margin-bottom:0.4rem;text-shadow:0 0 10px var(--cyan);
  }
  .result.crash h2{color:var(--magenta);text-shadow:0 0 10px var(--magenta)}
  .result.best h2{color:var(--gold);text-shadow:0 0 12px var(--gold)}
  .result .dist{
    font-family:'Rubik Mono One', monospace;
    font-size:clamp(2.6rem, 7vw, 4.2rem);color:var(--ink);
    line-height:1;letter-spacing:0.04em;margin:0.6rem 0;
  }
  .result .dist .u{font-size:0.5em;color:var(--silver);margin-left:0.2em}
  .result .grade{font-size:1rem;letter-spacing:0.2em;color:var(--gold);margin-bottom:0.4rem}
  .result .meta{color:var(--silver);font-size:0.85rem;margin-bottom:1rem;letter-spacing:0.08em}
  .result .actions{display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap}
  .result .btn{
    background:transparent;color:var(--cyan);
    border:2px solid var(--cyan);
    font-family:'Audiowide', monospace;font-size:0.85rem;letter-spacing:0.12em;text-transform:uppercase;
    padding:0.7rem 1.3rem;cursor:pointer;border-radius:0.4rem;min-height:2.75rem;
    box-shadow:0 0 12px rgba(92,230,255,0.3);
  }
  .result .btn:hover{background:rgba(92,230,255,0.14)}
  .result .btn:focus-visible{outline:3px solid var(--ink);outline-offset:2px}

  /* controls hint */
  .hints{
    position:fixed;bottom:0.8rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.7rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(10,6,37,0.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(92,230,255,0.25);
    padding:0.4rem 0.65rem;border-radius:0.4rem;z-index:5;
    font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--silver);
    max-width:calc(100% - 1rem);
  }
  .hints kbd{
    background:#161035;border:1px solid rgba(92,230,255,0.4);border-radius:0.2rem;
    color:var(--ink);padding:0.25rem 0.4rem;font-family:'Share Tech Mono', monospace;font-size:0.6rem;
    min-width:1.6rem;text-align:center;display:inline-block;
  }
  .hints .sep{width:1px;background:rgba(92,230,255,0.2);height:1rem}
  .hints button{
    background:transparent;color:var(--cyan);border:1px solid var(--cyan);
    font-family:inherit;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
    padding:0.35rem 0.55rem;border-radius:0.2rem;cursor:pointer;min-height:2.5rem;
  }
  .hints button:hover{background:rgba(92,230,255,0.12)}
  .hints button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  /* mobile tap button */
  .tap-btn{
    position:fixed;right:1rem;bottom:6rem;
    width:6rem;height:6rem;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,43,214,0.25), rgba(10,6,37,0.85));
    border:2.5px solid var(--magenta);color:var(--magenta);
    font-family:'Audiowide', monospace;font-size:0.85rem;letter-spacing:0.12em;
    box-shadow:0 0 20px rgba(255,43,214,0.5);
    display:none;align-items:center;justify-content:center;
    z-index:7;cursor:pointer;
  }
  .tap-btn.show{display:flex}
  @media (pointer: coarse), (max-width: 720px){
    .tap-btn.always-on{display:flex}
  }

  @media (max-width: 720px){
    .hud-top{top:2.8rem;left:0.4rem;right:0.4rem}
    .hud-top .card{padding:0.35rem 0.55rem;min-width:4rem}
    .hud-top .val{font-size:1.05rem}
    .timing-meter{width:14rem;bottom:8rem}
  }
  @media (prefers-reduced-motion: reduce){
    .result.show{animation:none}
    .prompt.show.pulse{animation:none}
  }
</style>
</head>
<body>
  <header>
    <h1><span class="flag" aria-hidden="true"></span><span class="pl-w">GRA</span> <span class="pl-w">W</span> <span class="pl-r">MAŁYSZA</span></h1>
    <div class="tag">tuck <span class="accent">·</span> launch <span class="accent">·</span> lean <span class="accent">·</span> land · for Polish glory</div>
  </header>

  <div class="hud-top">
    <div class="card attempt">
      <div class="label">attempt</div>
      <div class="val"><span id="attemptVal">1</span><span class="unit">/3</span></div>
    </div>
    <div class="card" id="speedCard">
      <div class="label">speed</div>
      <div class="val"><span id="speedVal">0</span><span class="unit">km/h</span></div>
    </div>
    <div class="card best">
      <div class="label">best</div>
      <div class="val"><span id="bestVal">0</span><span class="unit">m</span></div>
    </div>
  </div>

  <main>
    <canvas id="game" width="960" height="540" role="application" aria-label="Neon ski jump. Hold Space to tuck on the in-run. Release Space inside the gold timing window at the lip to launch. In flight, use Up and Down arrows to lean. Press Down on landing to telemark."></canvas>
  </main>

  <div class="timing-meter" id="timingMeter" aria-hidden="true">
    <div class="sweet" id="sweetSpot"></div>
    <div class="marker" id="timeMarker"></div>
  </div>

  <div class="prompt" id="prompt" aria-live="polite"></div>

  <div class="result" id="result" role="dialog" aria-modal="true" aria-hidden="true">
    <h2 id="resultTitle">LANDED</h2>
    <div class="dist"><span id="resultDist">0</span><span class="u">m</span></div>
    <div class="grade" id="resultGrade">— style 0 —</div>
    <div class="meta" id="resultMeta">speed at launch: 0 km/h</div>
    <div class="actions">
      <button class="btn" id="nextBtn" type="button">Next jump</button>
      <button class="btn" id="restartBtn" type="button">Restart series</button>
    </div>
  </div>

  <div class="hints">
    <span><kbd>Hold Space</kbd> tuck</span>
    <span class="sep" aria-hidden="true"></span>
    <span><kbd>Release</kbd> launch</span>
    <span class="sep" aria-hidden="true"></span>
    <span><kbd>↑↓</kbd> lean</span>
    <span class="sep" aria-hidden="true"></span>
    <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ on</button>
  </div>

  <button class="tap-btn always-on" id="tapBtn" type="button" aria-label="Tap and hold to tuck. Release to launch.">TUCK</button>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  var canvas = document.getElementById('game');
  var ctx;
  try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); return; }
  if (!ctx){ showError('canvas 2d unavailable'); return; }

  // ── Canvas sizing ──
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var W = 960, H = 540;
  function resize(){
    try {
      var maxW = Math.min(window.innerWidth - 8, 1100);
      var maxH = Math.max(320, window.innerHeight - 180);
      var ratio = 16/9;
      var w = maxW, h = w / ratio;
      if (h > maxH){ h = maxH; w = h * ratio; }
      W = Math.floor(w); H = Math.floor(h);
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    } catch(e){ showError('resize: ' + e.message); }
  }
  resize();
  window.addEventListener('resize', resize);

  // ── World geometry (world units = px) ──
  // Ramp: cubic-easing curve from top to lip
  var RAMP_START_X = 0;
  var RAMP_LEN = 540;          // horizontal span of in-run
  var RAMP_TOP_Y = -240;       // top of ramp (negative y = up in world)
  var RAMP_LIP_X = RAMP_LEN;   // lip at end of in-run
  var RAMP_LIP_Y = 60;         // lip height
  var LIP_KICK_ANGLE = -0.12;  // slight upward kick at lip (rad, ~-7°)

  // Landing hill: starts at lip, ~37° initial, eases to outrun
  var HILL_START_X = RAMP_LIP_X;
  var HILL_START_Y = RAMP_LIP_Y;

  // Ramp height function (interpolated curve) — returns world y for given world x
  function rampY(x){
    if (x <= RAMP_START_X) return RAMP_TOP_Y;
    if (x >= RAMP_LIP_X) return RAMP_LIP_Y;
    var t = (x - RAMP_START_X) / RAMP_LEN;
    // Ease-in cubic, then final 15% smooths to lip-kick
    var base = RAMP_TOP_Y + (RAMP_LIP_Y - RAMP_TOP_Y) * (1 - Math.pow(1 - t, 2.4));
    // Apply small kick — final 80px curls slightly upward
    if (t > 0.85){
      var k = (t - 0.85) / 0.15;
      base += -10 * Math.sin(k * Math.PI / 2);
    }
    return base;
  }
  function rampSlope(x){
    var d = 1.5;
    return (rampY(x + d) - rampY(x - d)) / (2 * d);
  }
  function rampAngle(x){
    return Math.atan(rampSlope(x));
  }
  function landingY(x){
    if (x < HILL_START_X) return HILL_START_Y;
    var dx = x - HILL_START_X;
    if (dx < 700){
      // steep descent ~37° (tan 0.75)
      return HILL_START_Y + dx * 0.75;
    } else {
      var flatY = HILL_START_Y + 700 * 0.75;
      return flatY + (dx - 700) * 0.06; // gradual outrun
    }
  }
  function landingSlope(x){
    var d = 2;
    return (landingY(x + d) - landingY(x - d)) / (2 * d);
  }

  // ── State ──
  var state = 'inrun';     // inrun | flight | landed | crash
  var keys = {};
  var skier = {};
  var cam = { x: 0, y: 0 };
  var bestDistance = 0;
  var attemptNum = 1;
  var maxAttempts = 3;
  var seriesTotal = 0;
  var particles = [];
  var trail = [];
  var launchSpeed = 0;
  var launchMul = 1;
  var landingMessage = '';

  try {
    bestDistance = parseInt(localStorage.getItem('neon-ski-jump-best') || '0', 10) || 0;
  } catch(_){}
  document.getElementById('bestVal').textContent = bestDistance;

  function resetSkier(){
    skier = {
      x: RAMP_START_X + 4,
      y: rampY(RAMP_START_X + 4) - 4,
      vx: 0, vy: 0,
      angle: rampAngle(RAMP_START_X),
      targetAngle: 0,
      tucking: false,
      tumbleW: 0,
      tumbleAngle: 0,
      crashed: false,
      legAngle: 0,
      telemark: false,
      tumbleStop: false
    };
    particles = [];
    trail = [];
    launchSpeed = 0;
    launchMul = 1;
    landingMessage = '';
    state = 'inrun';
    spacePressedT = -1;
  }
  resetSkier();

  // ── Audio ──
  var audioCtx = null;
  var muted = false;
  var windNode = null;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function tone(type, freq, dur, gain, slideTo, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var o = c.createOscillator(); o.type = type;
    var t = t0 || c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noiseBurst(dur, freq, Q, gain){
    var c = ensureAudio(); if (!c || muted) return;
    var n = Math.floor(c.sampleRate * dur);
    var buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/n, 1.6);
    var s = c.createBufferSource(); s.buffer = buf;
    var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = Q;
    var g = c.createGain(); g.gain.value = gain;
    s.connect(bp).connect(g).connect(c.destination);
    s.start();
  }
  function startWind(){
    var c = ensureAudio(); if (!c || muted || windNode) return;
    var bufSize = c.sampleRate * 2;
    var buf = c.createBuffer(1, bufSize, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) d[i] = (Math.random()*2-1) * 0.5;
    var s = c.createBufferSource(); s.buffer = buf; s.loop = true;
    var lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 600; lp.Q.value = 0.7;
    var g = c.createGain(); g.gain.value = 0;
    s.connect(lp).connect(g).connect(c.destination);
    s.start();
    windNode = { s: s, lp: lp, g: g };
  }
  function setWindLevel(amount){
    if (!windNode) return;
    try {
      var t = audioCtx.currentTime;
      windNode.g.gain.cancelScheduledValues(t);
      windNode.g.gain.setTargetAtTime(Math.max(0, Math.min(0.16, amount)), t, 0.15);
      windNode.lp.frequency.setTargetAtTime(400 + amount * 1600, t, 0.2);
    } catch(_){}
  }
  function stopWind(){
    if (!windNode) return;
    try {
      var t = audioCtx.currentTime;
      windNode.g.gain.cancelScheduledValues(t);
      windNode.g.gain.setTargetAtTime(0, t, 0.2);
      windNode.s.stop(t + 0.6);
    } catch(_){}
    windNode = null;
  }
  function sndLaunch(qual){
    tone('triangle', 320, 0.18, 0.18, 880);
    tone('square',  220, 0.10, 0.10, 480, ensureAudio() && audioCtx.currentTime + 0.05);
    noiseBurst(0.12, 800, 1.4, 0.10);
    if (qual === 'perfect'){
      tone('triangle', 980, 0.20, 0.16, 1320, ensureAudio() && audioCtx.currentTime + 0.18);
    }
  }
  function sndSwoosh(){ noiseBurst(0.08, 2400, 1.6, 0.06); }
  function sndLand(){
    tone('sawtooth', 140, 0.18, 0.16, 60);
    noiseBurst(0.18, 320, 1.2, 0.14);
  }
  function sndCrash(){
    tone('sawtooth', 200, 0.30, 0.20, 50);
    noiseBurst(0.35, 280, 1.0, 0.20);
    tone('square', 120, 0.18, 0.12, 60, ensureAudio() && audioCtx.currentTime + 0.10);
  }
  function sndTelemark(){
    tone('triangle', 660, 0.10, 0.14, 880);
    tone('triangle', 880, 0.12, 0.14, 1320, ensureAudio() && audioCtx.currentTime + 0.06);
  }
  function sndPerfectChime(){
    [880, 1320, 1760].forEach(function(f, i){
      tone('triangle', f, 0.18, 0.16, null, ensureAudio() && audioCtx.currentTime + i * 0.08);
    });
  }

  // ── Input ──
  var spacePressedT = -1;
  function onSpaceDown(){
    if (state === 'inrun'){
      skier.tucking = true;
      spacePressedT = performance.now();
    }
  }
  function onSpaceUp(){
    if (state === 'inrun'){
      // Player released — this is the launch trigger
      doLaunch();
    }
  }
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    keys[e.code] = true;
    if (e.code === 'Space'){
      e.preventDefault();
      ensureAudio();
      if (e.repeat) return;
      onSpaceDown();
    }
    if (e.code === 'ArrowDown' && state === 'landed') return;
  });
  window.addEventListener('keyup', function(e){
    keys[e.code] = false;
    if (e.code === 'Space'){
      e.preventDefault();
      onSpaceUp();
    }
  });

  // Mobile tap button
  var tapBtn = document.getElementById('tapBtn');
  tapBtn.addEventListener('pointerdown', function(e){

  tapBtn.addEventListener('pointerup', function(e){

  tapBtn.addEventListener('pointercancel', function(e){

  // Tap on canvas for flight lean — top half = back lean, bottom half = forward lean
  canvas.addEventListener('pointerdown', function(e){
    if (state !== 'flight' && state !== 'inrun') return;
    var r = canvas.getBoundingClientRect();
    var py = e.clientY - r.top;
    if (state === 'flight'){
      if (py < r.height / 2) keys['ArrowUp'] = true;
      else keys['ArrowDown'] = true;
    }
  });
  canvas.addEventListener('pointerup', function(){
    keys['ArrowUp'] = false; keys['ArrowDown'] = false;
  });
  canvas.addEventListener('pointercancel', function(){
    keys['ArrowUp'] = false; keys['ArrowDown'] = false;
  });

  // ── Launch logic ──
  function doLaunch(){
    if (state !== 'inrun') return;
    skier.tucking = false;
    // Compute timing bonus based on x position relative to lip
    // Ideal: release in last 60px of ramp (sweet spot around lip)
    var dxFromLip = skier.x - (RAMP_LIP_X - 40);
    var bonus = 1.0;
    var qual = 'okay';
    if (dxFromLip > -10 && dxFromLip < 30){
      // Perfect window
      bonus = 1.22; qual = 'perfect';
      flashPrompt('PERFECT!', 'gold');
    } else if (dxFromLip > -40 && dxFromLip < 50){
      bonus = 1.10; qual = 'good';
      flashPrompt('GOOD', 'cyan');
    } else if (dxFromLip > -90 && dxFromLip < 80){
      bonus = 1.0; qual = 'okay';
      flashPrompt('OK', 'silver');
    } else {
      bonus = 0.85; qual = 'poor';
      flashPrompt('EARLY...', 'magenta');
    }
    // If skier is past lip already (overshoot), they're already airborne — apply default
    if (skier.x > RAMP_LIP_X + 10){
      bonus = 0.92; qual = 'late';
      flashPrompt('LATE', 'magenta');
    }
    launchMul = bonus;
    launchSpeed = skier.vx;
    // Convert to launch velocity with lip-kick angle and bonus
    var exitAngle = rampAngle(Math.min(skier.x, RAMP_LIP_X - 1)) + LIP_KICK_ANGLE * 0.7;
    var speed = skier.vx * bonus;
    skier.vx = Math.cos(exitAngle) * speed;
    skier.vy = Math.sin(exitAngle) * speed;
    // Upward kick from spring
    skier.vy -= 60 * bonus;
    skier.angle = exitAngle - 0.15;
    skier.targetAngle = skier.angle;
    state = 'flight';
    sndLaunch(qual);
    startWind();
    document.getElementById('timingMeter').classList.remove('show');
  }

  // ── Update functions ──
  function update(dt){
    if (state === 'inrun') updateInrun(dt);
    else if (state === 'flight') updateFlight(dt);
    else if (state === 'landed') updateLanded(dt);
    else if (state === 'crash') updateCrash(dt);
    updateParticles(dt);
    updateCamera(dt);
  }

  function updateInrun(dt){
    // Slide along ramp. Skier follows rampY(x); speed accumulates from gravity along slope.
    var slope = rampSlope(skier.x);
    var angle = Math.atan(slope);
    var gravAccel = 320; // tuned
    var alongSlope = gravAccel * Math.sin(angle);
    var friction = skier.tucking ? 0.04 : 0.10;
    var dragMul = skier.tucking ? 0.0006 : 0.0024;
    skier.vx += alongSlope * dt;
    // Friction proportional to vx
    skier.vx -= friction * skier.vx * dt;
    // Air drag (more if standing)
    skier.vx -= dragMul * skier.vx * skier.vx * dt;

    // Update position along ramp
    skier.x += skier.vx * dt;
    skier.y = rampY(skier.x) - 4;
    skier.angle = angle;

    // Snow particles
    if (Math.random() < dt * 24){
      particles.push({
        x: skier.x - 6, y: skier.y + 8,
        vx: -skier.vx * 0.3 + (Math.random() - 0.5) * 20,
        vy: -30 - Math.random() * 30,
        life: 0, ttl: 0.5 + Math.random() * 0.5,
        size: 1.5 + Math.random() * 1.5,
        type: 'snow'
      });
    }

    // Show timing meter when near lip
    var meter = document.getElementById('timingMeter');
    if (skier.x > RAMP_LIP_X - 220){
      meter.classList.add('show');
      var sweet = document.getElementById('sweetSpot');
      var marker = document.getElementById('timeMarker');
      // sweet spot fixed at, say, 60–80% of meter width
      var meterW = meter.clientWidth;
      sweet.style.left = (meterW * 0.62) + 'px';
      sweet.style.width = (meterW * 0.20) + 'px';
      // marker tracks skier x progress through the meter range
      var t = (skier.x - (RAMP_LIP_X - 220)) / 220; // 0..1.x
      marker.style.left = (Math.max(0, Math.min(1.05, t)) * meterW) + 'px';
    } else {
      meter.classList.remove('show');
    }

    // If skier passes lip without releasing, auto-launch with no bonus
    if (skier.x >= RAMP_LIP_X + 10){
      flashPrompt('AUTO LAUNCH', 'silver');
      doLaunch();
    }
  }

  function updateFlight(dt){
    var g = 380;
    skier.vy += g * dt;

    var speed = Math.hypot(skier.vx, skier.vy);
    if (speed < 0.1) speed = 0.1;
    var flightAngle = Math.atan2(skier.vy, skier.vx);
    var aoa = skier.angle - flightAngle; // angle of attack
    // Clamp displayable AoA influence
    var aoaClamped = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, aoa));

    // Drag: base + AoA-induced. Sin² spreads drag from broadside
    var cdBase = 0.00065;
    var cdAoA = 0.0026 * Math.sin(aoaClamped) * Math.sin(aoaClamped);
    var dragForce = (cdBase + cdAoA) * speed * speed;
    skier.vx -= (skier.vx / speed) * dragForce * dt;
    skier.vy -= (skier.vy / speed) * dragForce * dt;

    // Lift: simplified airfoil — peaks around 18-22°, stalls past 32°
    var liftAoA = aoaClamped;
    var cl;
    var stallStart = 0.55, stallEnd = 0.85;
    if (Math.abs(liftAoA) < stallStart){
      cl = Math.sin(liftAoA * 1.8) * 1.5;
    } else if (Math.abs(liftAoA) < stallEnd){
      var stallT = (Math.abs(liftAoA) - stallStart) / (stallEnd - stallStart);
      cl = Math.sin(stallStart * 1.8) * Math.sign(liftAoA) * (1.5 - 1.3 * stallT);
    } else {
      cl = 0;
    }
    var liftForce = cl * speed * speed * 0.00085;
    // Perpendicular to velocity, pointing "up" relative to flight (rotated -90°)
    var perpX = Math.sin(flightAngle);
    var perpY = -Math.cos(flightAngle);
    skier.vx += perpX * liftForce * dt;
    skier.vy += perpY * liftForce * dt;

    // Player lean — adjusts target body angle
    var leanRate = 1.8;
    if (keys['ArrowUp']) skier.targetAngle -= leanRate * dt;
    if (keys['ArrowDown']) skier.targetAngle += leanRate * dt;
    // clamp target
    if (skier.targetAngle < -1.2) skier.targetAngle = -1.2;
    if (skier.targetAngle > 1.2) skier.targetAngle = 1.2;
    skier.angle += (skier.targetAngle - skier.angle) * Math.min(1, dt * 4.5);

    // Integrate position
    skier.x += skier.vx * dt;
    skier.y += skier.vy * dt;

    // Trail
    trail.push({ x: skier.x, y: skier.y, life: 0 });
    if (trail.length > 90) trail.shift();
    for (var i = 0; i < trail.length; i++) trail[i].life += dt;

    // Wind level based on speed
    setWindLevel(Math.min(0.14, speed / 1800));

    // Telemark prep on landing — if player pressing Down within 0.4s of touchdown
    if (keys['ArrowDown'] || keys['Space']){
      skier.telemark = true;
    } else {
      skier.telemark = false;
    }

    // Check landing
    if (skier.y >= landingY(skier.x) - 4){
      finalizeLanding(dt);
    }
    // Out of frame guard (way overshoot)
    if (skier.x > HILL_START_X + 1600){
      finalizeLanding(dt);
    }
  }

  function finalizeLanding(){
    var slope = landingSlope(skier.x);
    var slopeAngle = Math.atan(slope);
    var flightAngle = Math.atan2(skier.vy, skier.vx);
    var mismatch = Math.abs(flightAngle - slopeAngle); // angle between flight vector and slope
    var bodyMismatch = Math.abs(skier.angle - slopeAngle);
    var totalMismatch = mismatch * 0.6 + bodyMismatch * 0.4;
    var landingSpeed = Math.hypot(skier.vx, skier.vy);

    // Distance in meters (1 meter = 4 world px)
    var dist = Math.max(0, Math.floor((skier.x - HILL_START_X) / 4));
    var style = 0;

    if (totalMismatch < 0.32){
      // perfect landing
      style += 60;
      if (skier.telemark) style += 30;
      landingMessage = skier.telemark ? 'PERFECT TELEMARK' : 'CLEAN LANDING';
      sndLand();
      sndPerfectChime();
      skier.crashed = false;
      state = 'landed';
    } else if (totalMismatch < 0.6){
      // acceptable landing
      style += 25;
      if (skier.telemark) style += 10;
      landingMessage = 'LANDED';
      sndLand();
      skier.crashed = false;
      state = 'landed';
    } else {
      // crash
      skier.crashed = true;
      style -= 40;
      var penalty = Math.min(0.4, (totalMismatch - 0.6) * 0.4);
      dist = Math.floor(dist * (1 - penalty));
      landingMessage = totalMismatch > 1.0 ? 'WIPEOUT' : 'CRASH';
      sndCrash();
      state = 'crash';
      skier.tumbleW = (Math.random() < 0.5 ? -1 : 1) * (10 + Math.random() * 6);
    }

    skier.y = landingY(skier.x) - 4;
    // partial bounce
    skier.vy = -skier.vy * 0.2;
    skier.vx *= skier.crashed ? 0.78 : 0.92;

    // particles
    for (var i = 0; i < 22; i++){
      var ang = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.9;
      var sp = 80 + Math.random() * 240;
      particles.push({
        x: skier.x, y: skier.y + 4,
        vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
        life: 0, ttl: 0.6 + Math.random() * 0.6,
        size: 2 + Math.random() * 3,
        type: skier.crashed ? 'snow' : 'snow',
        hue: skier.crashed ? 0 : 200
      });
    }

    stopWind();
    showResult(dist, style, landingSpeed);
  }

  function updateLanded(dt){
    // slide out
    skier.vx -= 12 * skier.vx * dt * 0.02 + 30 * dt;
    if (skier.vx < 0) skier.vx = 0;
    skier.x += skier.vx * dt;
    skier.y = landingY(skier.x) - 4;
    skier.angle += (Math.atan(landingSlope(skier.x)) - skier.angle) * Math.min(1, dt * 4);
  }
  function updateCrash(dt){
    skier.vy += 380 * dt;
    skier.vx *= Math.pow(0.92, dt * 60);
    skier.x += skier.vx * dt;
    skier.y += skier.vy * dt;
    skier.tumbleAngle += skier.tumbleW * dt;
    // bounce on hill
    var ly = landingY(skier.x) - 3;
    if (skier.y > ly){
      skier.y = ly;
      if (Math.abs(skier.vy) > 30) {
        skier.vy = -Math.abs(skier.vy) * 0.4;
        skier.tumbleW *= 0.85;
        // poof
        for (var i = 0; i < 8; i++){
          var ang = -Math.PI / 2 + (Math.random() - 0.5) * 1.4;
          var sp = 60 + Math.random() * 140;
          particles.push({ x: skier.x, y: skier.y, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp, life: 0, ttl: 0.5 + Math.random()*0.5, size: 2 + Math.random()*2, type: 'snow' });
        }
      } else {
        skier.vy = 0;
        skier.tumbleW *= 0.6;
      }
    }
  }

  function updateParticles(dt){
    for (var i = particles.length - 1; i >= 0; i--){
      var p = particles[i];
      p.life += dt;
      if (p.life >= p.ttl){ particles.splice(i, 1); continue; }
      if (p.type === 'snow'){
        p.vy += 220 * dt;
        p.vx *= Math.pow(0.92, dt * 60);
      }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }
  }

  function updateCamera(dt){
    // Camera follows skier with lead and smoothing
    var targetCamX = skier.x + (state === 'flight' ? skier.vx * 0.18 : 40);
    var targetCamY = skier.y + (state === 'flight' ? skier.vy * 0.05 : 0) - 40;
    // While in run, hold camera near ramp
    if (state === 'inrun') {
      targetCamX = Math.max(W * 0.3, skier.x + 60);
      targetCamY = Math.max(-100, skier.y - 30);
    }
    cam.x += (targetCamX - cam.x) * Math.min(1, dt * 3.2);
    cam.y += (targetCamY - cam.y) * Math.min(1, dt * 3.0);
  }

  // ── HUD updates ──
  var speedVal = document.getElementById('speedVal');
  var bestVal = document.getElementById('bestVal');
  var attemptVal = document.getElementById('attemptVal');
  function updateHUD(){
    var speed = Math.hypot(skier.vx, skier.vy);
    // Convert to km/h: assume 1 world px/s = 0.15 km/h (tuned to feel right)
    speedVal.textContent = Math.floor(speed * 0.18);
    bestVal.textContent = bestDistance;
    attemptVal.textContent = attemptNum;
  }

  // ── Prompt overlay ──
  var promptEl = document.getElementById('prompt');

    );

  // ── Result panel ──
  var result = document.getElementById('result');
  var resultTitle = document.getElementById('resultTitle');
  var resultDist = document.getElementById('resultDist');
  var resultGrade = document.getElementById('resultGrade');
  var resultMeta = document.getElementById('resultMeta');
  function showResult(dist, style, landingSpeed){
    setTimeout(function(){
      var isBest = dist > bestDistance;
      if (isBest){
        bestDistance = dist;
        try { localStorage.setItem('neon-ski-jump-best', String(bestDistance)); } catch(_){}
        bestVal.textContent = bestDistance;
      }
      seriesTotal += dist;
      resultTitle.textContent = landingMessage;
      result.classList.remove('crash', 'best');
      if (skier.crashed) result.classList.add('crash');
      else if (isBest) result.classList.add('best');
      resultDist.textContent = dist;
      var grade;
      if (skier.crashed) grade = '— style ' + style + ' —';
      else if (style >= 75) grade = '★ ★ ★ — style ' + style + ' —';
      else if (style >= 40) grade = '★ ★ — style ' + style + ' —';
      else grade = '★ — style ' + style + ' —';
      resultGrade.textContent = grade;
      var launchKmh = Math.floor(launchSpeed * 0.18);
      var launchPct = Math.floor(launchMul * 100);
      resultMeta.textContent = 'launch: ' + launchKmh + ' km/h × ' + launchPct + '%   ·   series: ' + seriesTotal + 'm';
      result.classList.add('show');
      result.setAttribute('aria-hidden', 'false');
      // Focus first button after animation

  document.getElementById('muteBtn').addEventListener('click', function(){

  // ── Rendering ──
  function worldToScreen(wx, wy){
    return { x: wx - cam.x + W / 2, y: wy - cam.y + H / 2 };
  }

  function drawBackground(){
    // sky gradient — synthwave: deep purple → magenta-pink at horizon
    var sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#0a0625');
    sky.addColorStop(0.55, '#1d0f4a');
    sky.addColorStop(0.78, '#3a1450');
    sky.addColorStop(0.9, '#7a1c5a');
    sky.addColorStop(1, '#1a0a2a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // distant glow sun (large yellow-magenta orb)
    var sunX = W * 0.65 - cam.x * 0.05;
    var sunY = H * 0.62;
    var grad = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 180);
    grad.addColorStop(0, 'rgba(255,235,140,0.85)');
    grad.addColorStop(0.5, 'rgba(255,90,160,0.55)');
    grad.addColorStop(1, 'rgba(255,40,140,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // sun core disk
    ctx.fillStyle = '#ffe680';
    ctx.beginPath(); ctx.arc(sunX, sunY, 40, 0, Math.PI * 2); ctx.fill();
    ctx.shadowColor = '#ffaa3a'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#ffc060';
    ctx.beginPath(); ctx.arc(sunX, sunY, 30, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // background mountains (parallax)
    drawMountainsLayer(-0.1, '#1a0a45', 0.55, 80, 4);
    drawMountainsLayer(-0.25, '#2a0c50', 0.60, 100, 6);
    drawMountainsLayer(-0.4, '#3a1060', 0.66, 70, 8);

    // stars
    for (var i = 0; i < 40; i++){
      var sx = (i * 137.5) % W;
      var sy = (i * 73.3) % (H * 0.5);
      ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + (i % 5) * 0.1) + ')';
      ctx.fillRect(sx, sy, 1.5, 1.5);
    }
  }

  function drawMountainsLayer(parallax, color, vh, amp, steps){
    var startScreenY = H * vh;
    var camX = cam.x * parallax;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, H);
    var lastY = startScreenY;
    for (var x = 0; x <= W + 40; x += W / steps){
      var n = Math.sin((x + camX) * 0.005 + parallax * 7.7) * Math.cos((x + camX) * 0.013);
      var y = startScreenY - amp * (0.5 + n * 0.5);
      ctx.lineTo(x, y);
      lastY = y;
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
    // top neon edge
    ctx.strokeStyle = parallax < -0.3 ? 'rgba(255,43,214,0.30)' : 'rgba(92,230,255,0.20)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 8;
    ctx.beginPath();
    var first = true;
    for (var x2 = 0; x2 <= W + 40; x2 += W / steps){
      var n2 = Math.sin((x2 + camX) * 0.005 + parallax * 7.7) * Math.cos((x2 + camX) * 0.013);
      var y2 = startScreenY - amp * (0.5 + n2 * 0.5);
      if (first){ ctx.moveTo(x2, y2); first = false; }
      else ctx.lineTo(x2, y2);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function drawTerrain(){
    // ramp
    ctx.beginPath();
    var first = true;
    for (var x = RAMP_START_X - 20; x <= RAMP_LIP_X + 4; x += 6){
      var ys = worldToScreen(x, rampY(x));
      if (first){ ctx.moveTo(ys.x, ys.y); first = false; }
      else ctx.lineTo(ys.x, ys.y);
    }
    // close ramp shape down to bottom
    var endS = worldToScreen(RAMP_LIP_X + 4, rampY(RAMP_LIP_X) + 250);
    var startS = worldToScreen(RAMP_START_X - 20, rampY(RAMP_START_X) + 280);
    ctx.lineTo(endS.x, endS.y);
    ctx.lineTo(startS.x, endS.y);
    ctx.closePath();
    var rampGrad = ctx.createLinearGradient(0, H * 0.3, 0, H);
    rampGrad.addColorStop(0, '#1a0a4a');
    rampGrad.addColorStop(1, '#0a0420');
    ctx.fillStyle = rampGrad;
    ctx.fill();

    // ramp snow surface line — bright cyan
    ctx.strokeStyle = '#5ce6ff';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#5ce6ff'; ctx.shadowBlur = 14;
    ctx.beginPath();
    var f2 = true;
    for (var x2 = RAMP_START_X; x2 <= RAMP_LIP_X; x2 += 4){
      var s = worldToScreen(x2, rampY(x2));
      if (f2){ ctx.moveTo(s.x, s.y); f2 = false; }
      else ctx.lineTo(s.x, s.y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // ramp scaffold (vertical struts under it)
    ctx.strokeStyle = 'rgba(255,43,214,0.4)';
    ctx.lineWidth = 1.5;
    for (var sx = RAMP_START_X + 40; sx <= RAMP_LIP_X; sx += 60){
      var top = worldToScreen(sx, rampY(sx));
      var bot = worldToScreen(sx, rampY(sx) + 230);
      ctx.beginPath();
      ctx.moveTo(top.x, top.y); ctx.lineTo(bot.x, bot.y);
      ctx.stroke();
    }

    // landing hill — fill
    ctx.beginPath();
    var fl = true;
    for (var lx = HILL_START_X; lx <= HILL_START_X + 1800; lx += 12){
      var s2 = worldToScreen(lx, landingY(lx));
      if (fl){ ctx.moveTo(s2.x, s2.y); fl = false; }
      else ctx.lineTo(s2.x, s2.y);
    }
    var hillEnd = worldToScreen(HILL_START_X + 1800, landingY(HILL_START_X + 1800) + 400);
    var hillStart = worldToScreen(HILL_START_X, landingY(HILL_START_X) + 400);
    ctx.lineTo(hillEnd.x, hillEnd.y);
    ctx.lineTo(hillStart.x, hillEnd.y);
    ctx.closePath();
    var hillGrad = ctx.createLinearGradient(0, H * 0.5, 0, H);
    hillGrad.addColorStop(0, '#241456');
    hillGrad.addColorStop(1, '#0a0420');
    ctx.fillStyle = hillGrad;
    ctx.fill();

    // hill surface neon line
    ctx.strokeStyle = '#ff2bd6';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ff2bd6'; ctx.shadowBlur = 14;
    ctx.beginPath();
    var fl2 = true;
    for (var lx2 = HILL_START_X; lx2 <= HILL_START_X + 1800; lx2 += 6){
      var s3 = worldToScreen(lx2, landingY(lx2));
      if (fl2){ ctx.moveTo(s3.x, s3.y); fl2 = false; }
      else ctx.lineTo(s3.x, s3.y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // distance markers every 20m (= 80px world)
    ctx.fillStyle = 'rgba(244,240,255,0.55)';
    ctx.font = 'bold 11px "Share Tech Mono", monospace';
    ctx.textAlign = 'center';
    for (var d = 20; d <= 200; d += 20){
      var mx = HILL_START_X + d * 4;
      var my = landingY(mx);
      var sm = worldToScreen(mx, my);
      ctx.strokeStyle = 'rgba(244,240,255,0.45)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(sm.x, sm.y);
      ctx.lineTo(sm.x, sm.y - 8);
      ctx.stroke();
      ctx.fillText(d + 'm', sm.x, sm.y - 12);
    }

    // K-point marker (typical ski jump construction point)
    var kx = HILL_START_X + 95 * 4;
    var ky = landingY(kx);
    var ks = worldToScreen(kx, ky);
    ctx.strokeStyle = '#ffd454';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ffd454'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(ks.x, ks.y);
    ctx.lineTo(ks.x, ks.y - 18);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffd454';
    ctx.font = 'bold 12px "Audiowide", monospace';
    ctx.fillText('K-95', ks.x, ks.y - 22);
  }

  function drawTrail(){
    if (trail.length < 2) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (var pass = 0; pass < 2; pass++){
      ctx.strokeStyle = pass === 0 ? 'rgba(255,43,214,0.5)' : 'rgba(92,230,255,0.55)';
      ctx.lineWidth = pass === 0 ? 6 : 3;
      ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 12;
      ctx.beginPath();
      var ts = worldToScreen(trail[0].x, trail[0].y);
      ctx.moveTo(ts.x + (pass === 0 ? -1 : 1), ts.y);
      for (var i = 1; i < trail.length; i++){
        var t = trail[i];
        var s = worldToScreen(t.x, t.y);
        var alpha = 1 - t.life / 1.8;
        if (alpha <= 0) continue;
        ctx.lineTo(s.x + (pass === 0 ? -1 : 1), s.y);
      }
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawSkier(){
    var ss = worldToScreen(skier.x, skier.y);
    var angle = state === 'crash' ? skier.tumbleAngle : skier.angle;
    ctx.save();
    ctx.translate(ss.x, ss.y);
    ctx.rotate(angle);
    // tuck adjusts crouch height
    var tuck = (state === 'inrun' && skier.tucking) ? 1 : 0;
    var crouch = tuck * 4;
    var bodyLen = 14 - crouch;
    var headR = 4.5;

    // skis (long horizontal lines under feet)
    ctx.strokeStyle = '#5ce6ff';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#5ce6ff'; ctx.shadowBlur = 10;
    ctx.lineCap = 'round';
    if (state === 'flight'){
      // skis splay slightly in flight, like a V
      ctx.beginPath(); ctx.moveTo(-12, 4); ctx.lineTo(14, 0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-12, 8); ctx.lineTo(14, 12); ctx.stroke();
    } else if (state === 'landed' && skier.telemark){
      // telemark: one ski forward, one back, knee bent
      ctx.beginPath(); ctx.moveTo(-14, 6); ctx.lineTo(14, 6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-2, 12); ctx.lineTo(16, 12); ctx.stroke();
    } else {
      // parallel skis
      ctx.beginPath(); ctx.moveTo(-12, 6); ctx.lineTo(14, 6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-12, 10); ctx.lineTo(14, 10); ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // legs
    ctx.strokeStyle = '#ff2bd6';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ff2bd6'; ctx.shadowBlur = 8;
    if (state === 'landed' && skier.telemark){
      // telemark legs — front leg bent down
      ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(8, 4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(-2, 6); ctx.stroke();
    } else if (state === 'inrun' && skier.tucking){
      // tucked legs
      ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(6, 4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(-6, 4); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(4, 6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(-4, 6); ctx.stroke();
    }

    // body — red Polish suit with white chest stripe
    ctx.strokeStyle = '#dc143c';
    ctx.lineWidth = 5;
    ctx.shadowColor = '#dc143c'; ctx.shadowBlur = 10;
    var tuckHeadOffset = tuck * 5;
    ctx.beginPath();
    ctx.moveTo(0, -2);
    ctx.lineTo(2 + tuck * 4, -2 - bodyLen + tuckHeadOffset);
    ctx.stroke();
    // thin white stripe down the suit
    ctx.strokeStyle = '#fdfdfd';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#fdfdfd'; ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(0, -2);
    ctx.lineTo(2 + tuck * 4, -2 - bodyLen + tuckHeadOffset);
    ctx.stroke();

    // arms (forward stretched in flight)
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = '#dc143c';
    ctx.shadowColor = '#dc143c'; ctx.shadowBlur = 8;
    if (state === 'flight'){
      ctx.beginPath(); ctx.moveTo(2 + tuck * 4, -8); ctx.lineTo(14, -10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(2 + tuck * 4, -6); ctx.lineTo(14, -6); ctx.stroke();
    } else if (state === 'inrun' && skier.tucking){
      // arms tucked at sides
      ctx.beginPath(); ctx.moveTo(2 + tuck * 4, -6); ctx.lineTo(6, -2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(2 + tuck * 4, -6); ctx.lineTo(-2, -2); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(2, -8); ctx.lineTo(8, -4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(2, -8); ctx.lineTo(-4, -4); ctx.stroke();
    }

    // head — Polish white helmet with red band
    ctx.fillStyle = '#fdfdfd';
    ctx.shadowColor = '#fdfdfd'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(2 + tuck * 4, -bodyLen - 2 + tuckHeadOffset, headR, 0, Math.PI * 2);
    ctx.fill();
    // red helmet band
    ctx.fillStyle = '#dc143c';
    ctx.shadowColor = '#dc143c'; ctx.shadowBlur = 8;
    ctx.fillRect(2 + tuck * 4 - headR, -bodyLen - 1 + tuckHeadOffset, headR * 2, 1.5);
    // visor (cyan)
    ctx.fillStyle = '#5ce6ff';
    ctx.shadowColor = '#5ce6ff'; ctx.shadowBlur = 8;
    ctx.fillRect(2 + tuck * 4 - 2, -bodyLen - 4 + tuckHeadOffset, 4, 1.5);

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawParticles(){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (var i = 0; i < particles.length; i++){
      var p = particles[i];
      var s = worldToScreen(p.x, p.y);
      var a = 1 - p.life / p.ttl;
      if (p.type === 'snow'){
        ctx.fillStyle = 'rgba(255,255,255,' + (a * 0.9) + ')';
        ctx.beginPath(); ctx.arc(s.x, s.y, p.size * (0.5 + a * 0.5), 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.fillStyle = 'hsla(' + (p.hue || 200) + ',100%,60%,' + a + ')';
        ctx.fillRect(s.x, s.y, p.size, p.size);
      }
    }
    ctx.restore();
  }

  function render(now){
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawTerrain();
    drawTrail();
    drawSkier();
    drawParticles();

    // Scanline overlay subtle
    ctx.fillStyle = 'rgba(255,255,255,0.018)';
    for (var sl = 0; sl < H; sl += 3) ctx.fillRect(0, sl, W, 1);
  }

  // ── Main loop ──
  var lastT = performance.now();
  function frame(now){
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    if (prefersReducedMotion) dt *= 0.85;
    try {
      update(dt);
      render(now);
      updateHUD();
    } catch(e){ showError('loop: ' + e.message); }
    requestAnimationFrame(frame);
  }

  // Initialize camera at skier position
  cam.x = skier.x; cam.y = skier.y;
  requestAnimationFrame(frame);

  // Initial prompt
  flashPrompt('HOLD SPACE / TAP TO TUCK', 'cyan');
})();
</script>
</body>
</html>
