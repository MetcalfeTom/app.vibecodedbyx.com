<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Abyss</title>
<meta name="description" content="Type something. It vanishes in five seconds. Forever." />
<meta property="og:title" content="The Abyss" />
<meta property="og:description" content="Type something. It vanishes in five seconds. Forever." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sloppy.live/the-abyss" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/dark%20void%20deep%20space%20bottomless%20pit%20misty%20words%20fading%20into%20black%20cormorant%20serif%20italic%20whisper%20ghostly%20no%20text?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/🕳️" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300;1,500&family=Syne+Mono&display=swap" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#000;color:#e8e6f0;font-family:'Cormorant Garamond', serif}
  body{
    width:100vw;height:100vh;display:flex;flex-direction:column;
    background:
      radial-gradient(circle at 50% 0%, rgba(20,18,38,0.95), transparent 55%),
      radial-gradient(circle at 50% 110%, rgba(0,0,0,1), rgba(2,2,8,1) 60%);
    position:relative;cursor:default;
  }

  /* Top brand bar — quiet */
  header{
    padding:24px 28px 0;display:flex;justify-content:space-between;align-items:flex-start;
    pointer-events:none;
  }
  .title{
    font-family:'Cormorant Garamond', serif;font-style:italic;font-weight:300;
    font-size:clamp(28px, 4vw, 46px);color:rgba(232,230,240,0.85);letter-spacing:0.02em;
    line-height:1;
  }
  .title em{font-weight:500;color:rgba(232,230,240,1);font-style:italic}
  .title small{
    display:block;font-family:'Syne Mono', monospace;font-size:10px;
    letter-spacing:0.36em;color:rgba(232,230,240,0.4);margin-top:7px;
    text-transform:uppercase;font-style:normal;font-weight:normal;
  }
  .meta{
    font-family:'Syne Mono', monospace;font-size:10px;letter-spacing:0.32em;
    text-transform:uppercase;color:rgba(232,230,240,0.45);text-align:right;line-height:1.6;
    pointer-events:auto;
  }
  .meta b{display:block;color:rgba(232,230,240,0.75);letter-spacing:0.18em}
  .meta .pulse{
    display:inline-block;width:6px;height:6px;border-radius:50%;background:#7df09d;
    margin-right:6px;box-shadow:0 0 6px #7df09d;
    animation:pulse 1.6s infinite;
  }
  .meta .pulse.gone{background:#7a7080;box-shadow:none;animation:none}
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%    {opacity:0.4;transform:scale(0.85)}
  }

  /* The well — messages float here, drift down, fade. */
  .well{
    flex:1;position:relative;overflow:hidden;
    /* The lower 60% of the well fades to pure black so messages
       literally dissolve into the abyss as they descend. */
    mask-image:linear-gradient(to bottom, black 30%, transparent 95%);
    -webkit-mask-image:linear-gradient(to bottom, black 30%, transparent 95%);
  }
  .msg{
    position:absolute;left:50%;top:24%;transform:translateX(-50%);
    max-width:min(640px, 90vw);text-align:center;
    font-family:'Cormorant Garamond', serif;font-style:italic;font-weight:300;
    font-size:clamp(22px, 3.4vw, 38px);line-height:1.3;
    color:rgba(232,230,240,0.95);
    /* CSS animation handles the entire 5s fade-and-fall lifecycle —
       no JS tween needed. The animation runs forwards/once and the
       JS removes the node when the animation ends. */
    animation:descend 5s linear forwards;
    letter-spacing:0.01em;
    text-shadow:0 0 18px rgba(232,230,240,0.18);
    will-change:transform, opacity, filter;
  }
  .msg .who{
    display:block;font-family:'Syne Mono', monospace;font-style:normal;
    font-size:10px;letter-spacing:0.32em;text-transform:uppercase;
    color:rgba(232,230,240,0.55);margin-bottom:6px;
  }
  @keyframes descend{
    0%   {opacity:0;   transform:translate(-50%, -8px) scale(0.97); filter:blur(2px)}
    8%   {opacity:1;   transform:translate(-50%, 0) scale(1);       filter:blur(0)}
    70%  {opacity:0.62;transform:translate(-50%, 220px) scale(0.94)}
    100% {opacity:0;   transform:translate(-50%, 480px) scale(0.86);filter:blur(6px)}
  }

  /* Composer at the bottom — floats above the descend mask via z-index */
  footer{
    padding:18px 24px 26px;z-index:10;position:relative;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,0.78) 50%);
  }
  form{
    max-width:min(720px, 96vw);margin:0 auto;display:flex;gap:10px;align-items:flex-end;
  }
  input[type=text]{
    flex:1;background:transparent;border:none;border-bottom:1px solid rgba(232,230,240,0.32);
    font-family:'Cormorant Garamond', serif;font-style:italic;font-weight:300;
    font-size:22px;color:rgba(232,230,240,0.96);padding:8px 4px;
    outline:none;letter-spacing:0.01em;
  }
  input[type=text]::placeholder{color:rgba(232,230,240,0.32)}
  input[type=text]:focus{border-bottom-color:rgba(232,230,240,0.9)}
  button{
    background:transparent;border:1px solid rgba(232,230,240,0.32);
    color:rgba(232,230,240,0.85);
    font-family:'Syne Mono', monospace;font-size:11px;letter-spacing:0.32em;
    text-transform:uppercase;padding:9px 16px;border-radius:0;
    cursor:pointer;transition:color 0.15s, border-color 0.15s, background 0.15s;
  }
  button:hover{
    color:#fff;border-color:rgba(232,230,240,0.9);
    background:rgba(232,230,240,0.05);
  }
  .hint{
    font-family:'Syne Mono', monospace;font-size:9px;letter-spacing:0.36em;
    text-transform:uppercase;color:rgba(232,230,240,0.32);text-align:center;
    margin-top:10px;
  }
  .hint b{color:rgba(232,230,240,0.55)}
</style>
</head>
<body>

<header>
  <div class="title">
    The <em>Abyss</em>.
    <small>five seconds · then nothing</small>
  </div>
  <div class="meta">
    <b id="metaCount">0 souls</b>
    <span><span class="pulse" id="livePulse"></span><span id="liveLabel">connecting…</span></span>
  </div>
</header>

<div class="well" id="well"></div>

<footer>
  <form id="form" autocomplete="off">
    <input type="text" id="msg" placeholder="speak into the void · 140 chars" maxlength="140" />
    <button type="submit">CAST</button>
  </form>
  <div class="hint">
    nothing here is saved · everything fades · <b>5 seconds</b>
  </div>
</footer>

<script type="module">
// ===== SUPABASE BROADCAST =====
// We use a realtime broadcast channel — no DB writes, no persistence.
// Every cast is delivered live to whoever's connected and forgotten.
// If the supabase config can't be loaded the app degrades to a
// solo-only experience (your own casts still appear and fade).
let supabase = null, channel = null, online = 0;
const CLIENT_ID = (Math.random().toString(36).slice(2, 10));
const HUES = [330, 290, 200, 170, 50, 25, 200, 350];
const myHue = HUES[Math.floor(Math.random() * HUES.length)];

const liveLabel = document.getElementById('liveLabel');
const livePulse = document.getElementById('livePulse');
const metaCount = document.getElementById('metaCount');

async function initRealtime() {
  try {
    const mod = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    const cfg = await import('/supabase-config-fixed.js')
      .catch(() => import('/supabase-config.js'));
    if (!cfg || !cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY) throw new Error('no config');
    supabase = mod.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    channel = supabase.channel('the-abyss-broadcast', {
      config: { broadcast: { self: false }, presence: { key: CLIENT_ID } },
    });
    channel.on('broadcast', { event: 'cast' }, ({ payload }) => {
      if (!payload || !payload.text) return;
      drop(payload.text, payload.who, payload.hue);
    });
    channel.on('presence', { event: 'sync' }, () => {
      online = Object.keys(channel.presenceState() || {}).length;
      metaCount.textContent = online + ' soul' + (online === 1 ? '' : 's');
    });
    channel.subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        liveLabel.textContent = 'live';
        livePulse.classList.remove('gone');
        await channel.track({ id: CLIENT_ID, hue: myHue, t: Date.now() });
      } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
        liveLabel.textContent = 'offline';
        livePulse.classList.add('gone');
      }
    });
  } catch (e) {
    liveLabel.textContent = 'solo · no relay';
    livePulse.classList.add('gone');
  }
}
initRealtime();

// ===== DROP A MESSAGE INTO THE WELL =====
// Each cast spawns a div that runs the descend keyframe animation
// for exactly 5 seconds, then fires animationend → cleanup.
const well = document.getElementById('well');
function drop(text, who, hue) {
  const m = document.createElement('div');
  m.className = 'msg';
  // Slight horizontal jitter so simultaneous messages don't stack
  // perfectly on top of each other
  const jitter = (Math.random() - 0.5) * 60;
  m.style.left = `calc(50% + ${jitter.toFixed(0)}px)`;
  // Anchor color tints the small "who" label so each speaker reads
  // distinct without being shouty
  const color = `hsl(${hue || myHue}, 70%, 78%)`;
  m.innerHTML = `<span class="who" style="color:${color}">${escapeHtml(who || 'you')}</span>${escapeHtml(text)}`;
  well.appendChild(m);
  m.addEventListener('animationend', () => m.remove(), { once: true });
  // Belt + suspenders: in case animationend doesn't fire (e.g. tab
  // background) hard-prune after 5.5s
  setTimeout(() => m.remove(), 5500);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ===== COMPOSE =====
const form = document.getElementById('form');
const inputEl = document.getElementById('msg');
form.addEventListener('submit', e => {
  e.preventDefault();
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  // Local echo first so it shows even when the relay is offline
  drop(text, 'you', myHue);
  if (channel) {
    channel.send({ type: 'broadcast', event: 'cast', payload: {
      text, who: '· anon ·', hue: myHue,
    }});
  }
});
inputEl.focus();
</script>
</body>
</html>
