<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Cipher Snap</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%A3" />
<meta name="description" content="Defuse the bomb. Find the glyphs. The keypad won't stay still." />
<meta property="og:title" content="Cipher Snap" />
<meta property="og:description" content="Defuse the bomb. Find the glyphs. The keypad won't stay still." />
<meta property="og:url" content="https://sloppy.live/cipher-snap" />
<meta property="og:image" content="https://sloppy.live/screenshots/cipher-snap.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0603;
    --panel: #140a05;
    --frame: #3a1f0c;
    --dim: #7a4a20;
    --ink: #f0c070;
    --hot: #ff3b2f;
    --cool: #ffb300;
    --good: #4ade80;
    --shadow: rgba(255, 60, 0, 0.2);
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Share Tech Mono', monospace;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow-x: hidden;
  }
  body {
    background:
      radial-gradient(ellipse at center, rgba(255, 100, 20, 0.08), transparent 60%),
      repeating-linear-gradient(0deg, transparent 0 2px, rgba(255, 180, 60, 0.025) 2px 3px),
      var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 100;
  }

  header {
    padding: 14px 22px 10px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--frame);
  }
  header h1 {
    font-family: 'Major Mono Display', monospace;
    font-weight: 400;
    font-size: clamp(22px, 4.2vw, 36px);
    margin: 0;
    color: var(--hot);
    text-shadow: 0 0 12px var(--shadow);
    letter-spacing: 0.08em;
  }
  header .subtitle {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  header a {
    color: var(--dim);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  header a:hover { color: var(--cool); }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .briefcase {
    width: 100%;
    max-width: 520px;
    background: linear-gradient(160deg, #18100a, #0f0704);
    border: 3px solid var(--frame);
    border-radius: 10px;
    padding: 20px 18px 22px;
    box-shadow:
      0 0 0 2px rgba(255, 100, 20, 0.05) inset,
      0 0 60px rgba(255, 60, 0, 0.12),
      0 20px 60px rgba(0,0,0,0.6);
    position: relative;
  }
  .briefcase::before {
    content: '';
    position: absolute;
    top: 6px; left: 6px; right: 6px; bottom: 6px;
    border: 1px dashed rgba(255, 180, 60, 0.15);
    border-radius: 6px;
    pointer-events: none;
  }

  .screen {
    background: #05020a;
    border: 1px solid var(--frame);
    padding: 14px 18px;
    margin-bottom: 14px;
    text-align: center;
    position: relative;
    box-shadow: inset 0 0 30px rgba(255,60,0,0.15);
  }
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,0.3) 2px 3px);
    pointer-events: none;
  }
  .timer {
    font-family: 'VT323', monospace;
    font-size: clamp(56px, 12vw, 88px);
    line-height: 1;
    color: var(--hot);
    text-shadow: 0 0 18px var(--hot), 0 0 3px #fff;
    letter-spacing: 0.06em;
  }
  .timer.warn { animation: pulse 0.4s infinite alternate; }
  @keyframes pulse {
    from { text-shadow: 0 0 18px var(--hot), 0 0 3px #fff; }
    to   { text-shadow: 0 0 38px #fff, 0 0 8px var(--hot); color: #fff; }
  }
  .status {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--cool);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
    min-height: 20px;
    position: relative;
    z-index: 1;
  }

  .sequence {
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: #05020a;
    border: 1px solid var(--frame);
    padding: 12px;
    margin-bottom: 14px;
    box-shadow: inset 0 0 20px rgba(255,60,0,0.1);
  }
  .sequence-label {
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .sequence-glyphs {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .sequence-glyphs .glyph {
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Major Mono Display', monospace;
    font-size: 24px;
    border: 1px solid var(--frame);
    color: var(--ink);
    background: rgba(255, 180, 60, 0.03);
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  /* sequence glyph inherits the wire color */
  .sequence-glyphs .glyph.c-red    { color: #ff2f4d; border-color: rgba(255,47,77,0.55); text-shadow: 0 0 6px rgba(255,47,77,0.7); }
  .sequence-glyphs .glyph.c-blue   { color: #2fd8ff; border-color: rgba(47,216,255,0.55); text-shadow: 0 0 6px rgba(47,216,255,0.7); }
  .sequence-glyphs .glyph.c-green  { color: #5cff7a; border-color: rgba(92,255,122,0.55); text-shadow: 0 0 6px rgba(92,255,122,0.7); }
  .sequence-glyphs .glyph.c-amber  { color: #ffc04a; border-color: rgba(255,192,74,0.55); text-shadow: 0 0 6px rgba(255,192,74,0.7); }
  .sequence-glyphs .glyph.c-magenta{ color: #ff3dd4; border-color: rgba(255,61,212,0.55); text-shadow: 0 0 6px rgba(255,61,212,0.7); }
  .sequence-glyphs .glyph.c-orange { color: #ff7a1f; border-color: rgba(255,122,31,0.55); text-shadow: 0 0 6px rgba(255,122,31,0.7); }
  .sequence-glyphs .glyph.c-purple { color: #a44bff; border-color: rgba(164,75,255,0.55); text-shadow: 0 0 6px rgba(164,75,255,0.7); }
  .sequence-glyphs .glyph.c-cyan   { color: #4dffe0; border-color: rgba(77,255,224,0.55); text-shadow: 0 0 6px rgba(77,255,224,0.7); }
  .sequence-glyphs .glyph.done {
    opacity: 0.35;
    text-decoration: line-through;
  }
  .sequence-glyphs .glyph.next {
    animation: nextPulse 0.8s infinite;
    box-shadow: 0 0 14px currentColor;
  }
  @keyframes nextPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .keypad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .key {
    aspect-ratio: 1/1;
    background: linear-gradient(180deg, #241510, #120805);
    border: 1px solid var(--frame);
    color: var(--ink);
    font-family: 'Major Mono Display', monospace;
    font-size: clamp(22px, 5.5vw, 34px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.08s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -3px 0 rgba(0,0,0,0.5);
    position: relative;
  }
  /* neon wire variants тАФ each color also wears a distinct pattern */
  .key.c-red {
    --kc: #ff2f4d;
    border-color: rgba(255, 47, 77, 0.6);
    color: var(--kc);
    /* diagonal stripes */
    background:
      repeating-linear-gradient(45deg, rgba(255,47,77,0.18) 0 6px, transparent 6px 12px),
      linear-gradient(180deg, #2a070c, #140205);
    text-shadow: 0 0 8px rgba(255,47,77,0.6);
    box-shadow: inset 0 1px 0 rgba(255,80,100,0.25), inset 0 -3px 0 rgba(0,0,0,0.5), 0 0 10px rgba(255,47,77,0.15);
  }
  .key.c-blue {
    --kc: #2fd8ff;
    border-color: rgba(47, 216, 255, 0.6);
    color: var(--kc);
    /* polka dots */
    background:
      radial-gradient(circle at 25% 25%, rgba(47,216,255,0.35) 2px, transparent 2.5px) 0 0 / 14px 14px,
      radial-gradient(circle at 75% 75%, rgba(47,216,255,0.35) 2px, transparent 2.5px) 0 0 / 14px 14px,
      linear-gradient(180deg, #02212a, #010a12);
    text-shadow: 0 0 8px rgba(47,216,255,0.6);
    box-shadow: inset 0 1px 0 rgba(120,220,255,0.25), inset 0 -3px 0 rgba(0,0,0,0.5), 0 0 10px rgba(47,216,255,0.15);
  }
  .key.c-green {
    --kc: #5cff7a;
    border-color: rgba(92, 255, 122, 0.6);
    color: var(--kc);
    /* square grid */
    background:
      linear-gradient(rgba(92,255,122,0.22) 1px, transparent 1px) 0 0 / 10px 10px,
      linear-gradient(90deg, rgba(92,255,122,0.22) 1px, transparent 1px) 0 0 / 10px 10px,
      linear-gradient(180deg, #042810, #020f06);
    text-shadow: 0 0 8px rgba(92,255,122,0.6);
    box-shadow: inset 0 1px 0 rgba(140,255,160,0.25), inset 0 -3px 0 rgba(0,0,0,0.5), 0 0 10px rgba(92,255,122,0.15);
  }
  .key.c-amber {
    --kc: #ffc04a;
    border-color: rgba(255, 192, 74, 0.6);
    color: var(--kc);
    /* horizontal stripes */
    background:
      repeating-linear-gradient(0deg, rgba(255,192,74,0.22) 0 3px, transparent 3px 9px),
      linear-gradient(180deg, #2a1a04, #140b02);
    text-shadow: 0 0 8px rgba(255,192,74,0.6);
    box-shadow: inset 0 1px 0 rgba(255,220,140,0.25), inset 0 -3px 0 rgba(0,0,0,0.5), 0 0 10px rgba(255,192,74,0.15);
  }
  .key.c-magenta {
    --kc: #ff3dd4;
    border-color: rgba(255, 61, 212, 0.6);
    color: var(--kc);
    /* chevron zigzag */
    background:
      linear-gradient(135deg, rgba(255,61,212,0.22) 25%, transparent 25%) 0 0 / 12px 12px,
      linear-gradient(225deg, rgba(255,61,212,0.22) 25%, transparent 25%) 0 0 / 12px 12px,
      linear-gradient(180deg, #2a0524, #12020f);
    text-shadow: 0 0 8px rgba(255,61,212,0.6);
    box-shadow: inset 0 1px 0 rgba(255,130,230,0.25), inset 0 -3px 0 rgba(0,0,0,0.5), 0 0 10px rgba(255,61,212,0.15);
  }
  .key.c-orange {
    --kc: #ff7a1f;
    border-color: rgba(255, 122, 31, 0.6);
    color: var(--kc);
    /* checkerboard */
    background:
      linear-gradient(45deg, rgba(255,122,31,0.28) 25%, transparent 25% 75%, rgba(255,122,31,0.28) 75%) 0 0 / 14px 14px,
      linear-gradient(45deg, rgba(255,122,31,0.28) 25%, transparent 25% 75%, rgba(255,122,31,0.28) 75%) 7px 7px / 14px 14px,
      linear-gradient(180deg, #2a1205, #140803);
    text-shadow: 0 0 8px rgba(255,122,31,0.7);
    box-shadow: inset 0 1px 0 rgba(255,170,90,0.25), inset 0 -3px 0 rgba(0,0,0,0.5), 0 0 10px rgba(255,122,31,0.15);
  }
  .key.c-purple {
    --kc: #a44bff;
    border-color: rgba(164, 75, 255, 0.6);
    color: var(--kc);
    /* vertical stripes */
    background:
      repeating-linear-gradient(90deg, rgba(164,75,255,0.22) 0 3px, transparent 3px 9px),
      linear-gradient(180deg, #16062a, #08021a);
    text-shadow: 0 0 8px rgba(164,75,255,0.7);
    box-shadow: inset 0 1px 0 rgba(200,150,255,0.25), inset 0 -3px 0 rgba(0,0,0,0.5), 0 0 10px rgba(164,75,255,0.15);
  }
  .key.c-cyan {
    --kc: #4dffe0;
    border-color: rgba(77, 255, 224, 0.6);
    color: var(--kc);
    /* crosshatch (two diagonal stripe sets) */
    background:
      repeating-linear-gradient(45deg, rgba(77,255,224,0.18) 0 2px, transparent 2px 10px),
      repeating-linear-gradient(-45deg, rgba(77,255,224,0.18) 0 2px, transparent 2px 10px),
      linear-gradient(180deg, #04221e, #020f0d);
    text-shadow: 0 0 8px rgba(77,255,224,0.6);
    box-shadow: inset 0 1px 0 rgba(150,255,230,0.25), inset 0 -3px 0 rgba(0,0,0,0.5), 0 0 10px rgba(77,255,224,0.15);
  }
  .key:hover {
    filter: brightness(1.35);
    transform: translateY(-1px);
  }
  .key:active {
    transform: translateY(2px);
    box-shadow: inset 0 1px 0 rgba(255,180,60,0.1), inset 0 -1px 0 rgba(0,0,0,0.5);
  }
  .key.shifting {
    animation: shift 0.4s ease-out;
  }
  /* trap tiles: subtle glitch + inverted hue, only visible if you look close */
  .key.trap {
    filter: invert(0.08) hue-rotate(-8deg) contrast(1.05);
    animation: trapGlitch 3.6s infinite steps(1, end);
  }
  .key.trap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,0.04) 3px 4px);
    mix-blend-mode: overlay;
    pointer-events: none;
    opacity: 0.6;
  }
  @keyframes trapGlitch {
    0%, 88%, 100% { transform: translate(0,0); filter: invert(0.08) hue-rotate(-8deg) contrast(1.05); }
    89% { transform: translate(-1px, 0); filter: invert(0.15) hue-rotate(-12deg) contrast(1.15); }
    90% { transform: translate(1px, -1px); filter: invert(0.05) hue-rotate(6deg) contrast(0.95); }
    91% { transform: translate(-1px, 1px); filter: invert(0.18) hue-rotate(-20deg) contrast(1.2); }
    92% { transform: translate(0, 0); filter: invert(0.08) hue-rotate(-8deg) contrast(1.05); }
  }
  /* keep shift animation on trap too */
  .key.trap.shifting { animation: shift 0.4s ease-out, trapGlitch 3.6s infinite steps(1, end) 0.4s; }
  @keyframes shift {
    0% { opacity: 0; transform: translateY(-6px) rotate(-4deg); }
    100% { opacity: 1; transform: translateY(0) rotate(0); }
  }
  .key.correct {
    border-color: var(--good);
    color: var(--good);
    box-shadow: 0 0 20px rgba(74,222,128,0.5), inset 0 0 10px rgba(74,222,128,0.2);
  }
  .key.wrong {
    border-color: var(--hot);
    color: var(--hot);
    background: linear-gradient(180deg, #4a1208, #200604);
    box-shadow: 0 0 20px var(--hot), inset 0 0 10px var(--hot);
    animation: wrongShake 0.3s;
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .hud {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    font-family: 'VT323', monospace;
    font-size: 15px;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hud .v { color: var(--cool); }

  /* overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(6,2,2,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay .card {
    background: var(--panel);
    border: 2px solid var(--frame);
    padding: 30px 26px;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,60,0,0.3);
  }
  .overlay h2 {
    font-family: 'Major Mono Display', monospace;
    font-size: 32px;
    margin: 0 0 8px;
    color: var(--hot);
    letter-spacing: 0.06em;
  }
  .overlay.win h2 { color: var(--good); }
  .overlay p {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--ink);
    line-height: 1.5;
    margin: 10px 0 20px;
    letter-spacing: 0.08em;
  }
  .overlay .stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin: 14px 0 22px;
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: var(--cool);
  }
  .overlay .stats span { color: var(--dim); font-size: 13px; display: block; text-transform: uppercase; letter-spacing: 0.2em; }
  .overlay button {
    font-family: 'Major Mono Display', monospace;
    background: transparent;
    border: 2px solid var(--hot);
    color: var(--hot);
    padding: 12px 26px;
    font-size: 16px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: background 0.15s, color 0.15s;
  }
  .overlay button:hover { background: var(--hot); color: var(--bg); }
  .overlay.win button { border-color: var(--good); color: var(--good); }
  .overlay.win button:hover { background: var(--good); color: var(--bg); }

  /* colorblind mode: high-contrast text labels on every colored tile */
  .key .label {
    display: none;
    position: absolute;
    bottom: 4px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #fff;
    text-shadow: 0 0 3px #000, 0 0 2px #000, 0 1px 0 #000;
    pointer-events: none;
    font-weight: bold;
  }
  .sequence-glyphs .glyph .label {
    display: none;
    position: absolute;
    bottom: 1px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    color: #fff;
    text-shadow: 0 0 3px #000, 0 1px 0 #000;
    pointer-events: none;
    font-weight: bold;
  }
  .sequence-glyphs .glyph { position: relative; }
  body.cb .key .label,
  body.cb .sequence-glyphs .glyph .label { display: block; }
  body.cb .sequence-glyphs .glyph { padding-bottom: 8px; }
  body.cb .key {
    /* tighten key glyph to make room for label */
    padding-bottom: 10px;
    font-size: clamp(20px, 5vw, 30px);
  }

  .cb-toggle {
    background: transparent;
    border: 1px solid var(--frame);
    color: var(--dim);
    font-family: 'VT323', monospace;
    font-size: 13px;
    padding: 3px 10px;
    cursor: pointer;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.15s, border-color 0.15s;
  }
  .cb-toggle:hover { color: var(--cool); border-color: var(--cool); }
  .cb-toggle.active { color: var(--good); border-color: var(--good); }

  .flash {
    position: fixed;
    inset: 0;
    background: var(--hot);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 150;
    mix-blend-mode: screen;
  }
  .flash.on { opacity: 0.35; transition: opacity 0.05s; }

  @media (max-width: 420px) {
    .briefcase { padding: 14px 12px 16px; }
    .sequence-glyphs .glyph { width: 36px; height: 36px; font-size: 20px; }
    .keypad { gap: 6px; }
  }
</style>
</head>
<body>
  <header>
    <h1>Cipher Snap</h1>
    <span class="subtitle">bomb defusal protocol</span>
    <a href="https://sloppy.live">тЖР sloppy.live</a>
  </header>

  <main>
    <div class="briefcase">
      <div class="screen">
        <div class="timer" id="timer">90</div>
        <div class="status" id="status">standby</div>
      </div>

      <div class="sequence">
        <div class="sequence-label">тЖТ decode: match glyph + wire color</div>
        <div class="sequence-glyphs" id="sequenceGlyphs"></div>
      </div>

      <div class="keypad" id="keypad"></div>

      <div class="hud">
        <div>wave <span class="v" id="waveNum">1</span></div>
        <div>score <span class="v" id="scoreNum">0</span></div>
        <div>defused <span class="v" id="defusedNum">0</span></div>
        <button class="cb-toggle" id="cbToggle" title="Toggle colorblind labels">CB</button>
      </div>
    </div>
  </main>

  <div class="flash" id="flash"></div>

  <div class="overlay" id="overlay">
    <div class="card">
      <h2 id="overlayTitle">Cipher Snap</h2>
      <p id="overlayMsg">Decode the hidden sequence.<br/>Every step: match the <strong>glyph</strong> AND the <strong>wire color</strong>.<br/>Traps share a glyph but not the color. Keypad shifts. Clock ticks.</p>
      <div class="stats" id="overlayStats" style="display:none"></div>
      <button id="overlayBtn">Arm Device</button>
    </div>
  </div>

<script>
(() => {
  // ---------- config ----------
  const GLYPH_POOL = ['╬и','╬й','╬г','╬ж','╬Ф','╬Ш','╬Ю','╬Ы','╬а','╬У','╬╗','тИЖ','тИЗ','тИЮ','тЧК','тЧИ','тКХ','тКЧ','тКЩ','тКЪ','тЬж','тЬз','тЬ║','тШМ','тШН','тЛЗ','тЯБ','тЯа','тЯЬ','тМм','тМШ','тПг','тНЛ','тНЩ','тОФ','тЧЙ','тЧР','тЧС','тЭЦ','тЭД','тЪЩ','тЪЫ','тНЯ','тПГ','тПА'];
  const KEYPAD_SIZE = 16;
  const START_TIME = 90;
  const WRONG_PENALTY = 4;
  const BOMB_BONUS = 6; // time added per defuse (capped)
  const TIME_CAP = 90;

  // ---------- state ----------
  const state = {
    phase: 'idle', // idle | playing | won | lost
    timeLeft: START_TIME,
    wave: 1,
    score: 0,
    defused: 0,
    keypadSlots: [],
    sequence: [],
    sequenceIdx: 0,
    shiftTimer: null,
    tickInterval: null,
    lastTick: 0,
  };

  // ---------- elements ----------
  const timerEl = document.getElementById('timer');
  const statusEl = document.getElementById('status');
  const sequenceEl = document.getElementById('sequenceGlyphs');
  const keypadEl = document.getElementById('keypad');
  const waveNumEl = document.getElementById('waveNum');
  const scoreNumEl = document.getElementById('scoreNum');
  const defusedNumEl = document.getElementById('defusedNum');
  const overlayEl = document.getElementById('overlay');
  const overlayTitleEl = document.getElementById('overlayTitle');
  const overlayMsgEl = document.getElementById('overlayMsg');
  const overlayBtnEl = document.getElementById('overlayBtn');
  const overlayStatsEl = document.getElementById('overlayStats');
  const flashEl = document.getElementById('flash');

  // ---------- audio ----------
  let audioCtx = null;
  function audio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; }
    }
    return audioCtx;
  }
  function beep(freq, dur, type = 'square', gain = 0.08) {
    const ctx = audio();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.value = gain;
    g.gain.setValueAtTime(gain, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  }
  function tickSound() { beep(880, 0.04, 'square', 0.04); }
  function correctSound() { beep(660, 0.06, 'square', 0.08); beep(990, 0.08, 'square', 0.06); }
  function wrongSound() { beep(120, 0.2, 'sawtooth', 0.12); }
  function defuseSound() {
    beep(523, 0.08, 'square', 0.09);
    setTimeout(() => beep(659, 0.08, 'square', 0.09), 80);
    setTimeout(() => beep(784, 0.14, 'square', 0.09), 160);
  }
  function explodeSound() {
    beep(80, 0.5, 'sawtooth', 0.18);
    beep(40, 0.8, 'sawtooth', 0.14);
  }
  function shiftSound() { beep(300, 0.03, 'triangle', 0.03); }

  // ---------- utils ----------
  function sample(arr, n) {
    const pool = [...arr];
    const out = [];
    for (let i = 0; i < n && pool.length; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      out.push(pool.splice(idx, 1)[0]);
    }
    return out;
  }

  // ---------- render ----------
  const KEY_COLORS = ['c-red', 'c-blue', 'c-green', 'c-amber', 'c-magenta', 'c-orange', 'c-purple', 'c-cyan'];
  const COLOR_LABELS = {
    'c-red': 'RED', 'c-blue': 'BLU', 'c-green': 'GRN', 'c-amber': 'AMB',
    'c-magenta': 'MAG', 'c-orange': 'ORG', 'c-purple': 'PUR', 'c-cyan': 'CYN',
  };
  function renderKeypad(animate = false) {
    keypadEl.innerHTML = '';
    state.keypadSlots.forEach((slot, i) => {
      const btn = document.createElement('button');
      btn.className = 'key ' + slot.color + (animate ? ' shifting' : '') + (slot.trap ? ' trap' : '');
      btn.dataset.idx = i;
      const glyphSpan = document.createElement('span');
      glyphSpan.textContent = slot.glyph;
      const labelSpan = document.createElement('span');
      labelSpan.className = 'label';
      labelSpan.textContent = COLOR_LABELS[slot.color] || '';
      btn.appendChild(glyphSpan);
      btn.appendChild(labelSpan);
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handleKeyPress(slot, btn);
      });
      keypadEl.appendChild(btn);
    });
  }

  function renderSequence() {
    sequenceEl.innerHTML = '';
    state.sequence.forEach((slot, i) => {
      const el = document.createElement('div');
      el.className = 'glyph ' + slot.color;
      if (i < state.sequenceIdx) el.classList.add('done');
      else if (i === state.sequenceIdx) el.classList.add('next');
      const glyphSpan = document.createElement('span');
      glyphSpan.textContent = slot.glyph;
      const labelSpan = document.createElement('span');
      labelSpan.className = 'label';
      labelSpan.textContent = COLOR_LABELS[slot.color] || '';
      el.appendChild(glyphSpan);
      el.appendChild(labelSpan);
      sequenceEl.appendChild(el);
    });
  }

  function updateHud() {
    waveNumEl.textContent = state.wave;
    scoreNumEl.textContent = state.score;
    defusedNumEl.textContent = state.defused;
  }

  function updateTimer() {
    const t = Math.max(0, Math.ceil(state.timeLeft));
    timerEl.textContent = String(t).padStart(2, '0');
    if (t <= 10) timerEl.classList.add('warn');
    else timerEl.classList.remove('warn');
  }

  // ---------- game ----------
  function randColor() {
    return KEY_COLORS[Math.floor(Math.random() * KEY_COLORS.length)];
  }
  function slotKey(s) { return s.glyph + '|' + s.color; }
  function slotsEqual(a, b) { return a.glyph === b.glyph && a.color === b.color; }

  function buildKeypadSlots(requiredSlots) {
    // requiredSlots: array of {glyph, color} that MUST appear on the keypad
    const slots = requiredSlots.map(s => ({ ...s, trap: false }));
    const usedKeys = new Set(slots.map(slotKey));
    // Add "trap" distractors: for each required slot, ~50% chance of a same-glyph-different-color decoy
    requiredSlots.forEach(r => {
      if (Math.random() < 0.55 && slots.length < KEYPAD_SIZE) {
        const otherColors = KEY_COLORS.filter(c => c !== r.color);
        const trapColor = otherColors[Math.floor(Math.random() * otherColors.length)];
        const trap = { glyph: r.glyph, color: trapColor, trap: true };
        if (!usedKeys.has(slotKey(trap))) {
          slots.push(trap);
          usedKeys.add(slotKey(trap));
        }
      }
    });
    // Fill remaining with random glyph+color pairs, avoiding duplicates
    const pool = GLYPH_POOL.filter(g => !requiredSlots.some(r => r.glyph === g));
    while (slots.length < KEYPAD_SIZE && pool.length) {
      const gIdx = Math.floor(Math.random() * pool.length);
      const glyph = pool[gIdx];
      const color = randColor();
      const key = glyph + '|' + color;
      if (!usedKeys.has(key)) {
        slots.push({ glyph, color, trap: false });
        usedKeys.add(key);
      }
      pool.splice(gIdx, 1);
    }
    // If still short (pool exhausted), pad with random color on any glyph
    while (slots.length < KEYPAD_SIZE) {
      const glyph = GLYPH_POOL[Math.floor(Math.random() * GLYPH_POOL.length)];
      slots.push({ glyph, color: randColor(), trap: false });
    }
    // Shuffle positions
    for (let i = slots.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [slots[i], slots[j]] = [slots[j], slots[i]];
    }
    return slots;
  }

  function newSequence() {
    const len = Math.min(7, 3 + Math.floor(state.wave / 2));
    // Pick unique glyphs, each paired with a random color тАФ this is the hidden code
    const glyphs = sample(GLYPH_POOL, len);
    state.sequence = glyphs.map(g => ({ glyph: g, color: randColor() }));
    state.keypadSlots = buildKeypadSlots(state.sequence);
    state.sequenceIdx = 0;
    renderKeypad(true);
    renderSequence();
    statusEl.textContent = `wave ${state.wave} тАФ decode ${len} glyphs`;
  }

  function shiftKeypad() {
    if (state.phase !== 'playing') return;
    // Rebuild keypad: keep remaining sequence pairs, refresh distractors, reshuffle positions
    const remaining = state.sequence.slice(state.sequenceIdx);
    state.keypadSlots = buildKeypadSlots(remaining);
    renderKeypad(true);
    shiftSound();
  }

  function scheduleShift() {
    if (state.shiftTimer) clearTimeout(state.shiftTimer);
    // shift interval tightens with wave
    const base = Math.max(1600, 4200 - state.wave * 200);
    const jitter = 400 + Math.random() * 800;
    state.shiftTimer = setTimeout(() => {
      shiftKeypad();
      scheduleShift();
    }, base + jitter);
  }

  function handleKeyPress(slot, btnEl) {
    if (state.phase !== 'playing') return;
    const expected = state.sequence[state.sequenceIdx];
    if (slotsEqual(slot, expected)) {
      state.sequenceIdx++;
      state.score += 10 + state.wave * 2;
      correctSound();
      btnEl.classList.add('correct');
      setTimeout(() => btnEl.classList.remove('correct'), 300);
      renderSequence();
      updateHud();
      if (state.sequenceIdx >= state.sequence.length) {
        defuseRound();
      }
    } else {
      state.timeLeft = Math.max(0, state.timeLeft - WRONG_PENALTY);
      updateTimer();
      wrongSound();
      btnEl.classList.add('wrong');
      setTimeout(() => btnEl.classList.remove('wrong'), 300);
      flashEl.classList.add('on');
      setTimeout(() => flashEl.classList.remove('on'), 120);
      statusEl.textContent = `mistap тАФ -${WRONG_PENALTY}s`;
      // re-shift immediately as punishment
      setTimeout(shiftKeypad, 150);
    }
  }

  function defuseRound() {
    state.defused++;
    state.score += 50 + state.wave * 10;
    state.timeLeft = Math.min(TIME_CAP, state.timeLeft + BOMB_BONUS);
    state.wave++;
    defuseSound();
    statusEl.textContent = `defused +${BOMB_BONUS}s`;
    updateHud();
    updateTimer();
    setTimeout(() => {
      if (state.phase === 'playing') {
        newSequence();
        scheduleShift();
      }
    }, 550);
  }

  function startTick() {
    state.lastTick = performance.now();
    if (state.tickInterval) clearInterval(state.tickInterval);
    state.tickInterval = setInterval(() => {
      if (state.phase !== 'playing') return;
      const now = performance.now();
      const dt = (now - state.lastTick) / 1000;
      state.lastTick = now;
      state.timeLeft -= dt;
      updateTimer();
      // tick sound every full second under 10
      if (state.timeLeft <= 10 && Math.floor(state.timeLeft) !== Math.floor(state.timeLeft + dt)) {
        tickSound();
      }
      if (state.timeLeft <= 0) {
        state.timeLeft = 0;
        endGame(false);
      }
    }, 60);
  }

  function startGame() {
    state.phase = 'playing';
    state.timeLeft = START_TIME;
    state.wave = 1;
    state.score = 0;
    state.defused = 0;
    overlayEl.classList.add('hidden');
    updateHud();
    updateTimer();
    newSequence();
    scheduleShift();
    startTick();
  }

  function endGame(won) {
    state.phase = won ? 'won' : 'lost';
    if (state.shiftTimer) clearTimeout(state.shiftTimer);
    if (state.tickInterval) clearInterval(state.tickInterval);
    if (!won) explodeSound();
    overlayEl.classList.remove('hidden');
    overlayEl.classList.toggle('win', won);
    overlayTitleEl.textContent = won ? 'Cipher Cracked' : 'Detonation';
    overlayMsgEl.textContent = won ? 'The device is inert. Evac the vault.' : 'You ran out of time. The briefcase coughs smoke.';
    overlayStatsEl.style.display = 'flex';
    overlayStatsEl.innerHTML = `
      <div>${state.defused}<span>defused</span></div>
      <div>${state.score}<span>score</span></div>
      <div>${state.wave - 1}<span>waves</span></div>
    `;
    overlayBtnEl.textContent = 'Rearm';
  }

  // ---------- keyboard quick tap ----------
  window.addEventListener('keydown', (e) => {
    if (state.phase !== 'playing') {
      if (e.code === 'Space' || e.code === 'Enter') startGame();
      return;
    }
    // number keys 1-9, qwer, asdf, zxcv for keypad slots
    const map = {
      Digit1: 0, Digit2: 1, Digit3: 2, Digit4: 3,
      KeyQ: 4, KeyW: 5, KeyE: 6, KeyR: 7,
      KeyA: 8, KeyS: 9, KeyD: 10, KeyF: 11,
      KeyZ: 12, KeyX: 13, KeyC: 14, KeyV: 15,
    };
    if (e.code in map) {
      const idx = map[e.code];
      const btn = keypadEl.children[idx];
      if (btn) handleKeyPress(state.keypadSlots[idx], btn);
    }
  });

  overlayBtnEl.addEventListener('click', startGame);

  // colorblind mode toggle (persisted)
  const cbToggleEl = document.getElementById('cbToggle');
  function applyCb(on) {
    document.body.classList.toggle('cb', on);
    cbToggleEl.classList.toggle('active', on);
    cbToggleEl.textContent = on ? 'CB ON' : 'CB';
  }
  try {
    applyCb(localStorage.getItem('cipherSnapCb') === '1');
  } catch { applyCb(false); }
  cbToggleEl.addEventListener('click', () => {
    const on = !document.body.classList.contains('cb');
    applyCb(on);
    try { localStorage.setItem('cipherSnapCb', on ? '1' : '0'); } catch {}
  });

  // initial render
  updateHud();
  updateTimer();
})();
</script>
</body>
</html>
