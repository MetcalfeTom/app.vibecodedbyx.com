<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>App Archive Navigator — search 1,100+ sloppy.live apps</title>
<meta name="description" content="Search and browse every app in the vibespace by category and popularity.">
<meta property="og:title" content="App Archive Navigator">
<meta property="og:description" content="Search and browse every app in the vibespace by category and popularity.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/app-archive-navigator/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/library%20card%20catalog%20cabinet%20dim%20amber%20reading%20lamp%20bronze%20brass%20handles%20deep%20mahogany%20wood%20rows%20of%20index%20cards%20editorial%20warm%20glow%20wide%20composition?width=1200&height=630&model=flux&nologo=true&seed=11157">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%97%84%EF%B8%8F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,500&family=JetBrains+Mono:wght@400;600;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#120c08; --bg2:#1c130c; --paper:#f5e6cf; --ink:#1a120a;
  --amber:#d99547; --amber-soft:#a86f29; --rust:#a3391a;
  --sage:#7e8f5b; --pen:#cdbb9b; --hairline:rgba(245,230,207,0.12);
  --shadow:0 0 0 1px rgba(245,230,207,0.06);
}
*{box-sizing:border-box}
html{font-size:100%}
body{
  margin:0; min-height:100vh; color:var(--paper);
  background:
    radial-gradient(ellipse at 20% 10%, rgba(217,149,71,0.12), transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(163,57,26,0.10), transparent 55%),
    repeating-linear-gradient(7deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 4px),
    repeating-linear-gradient(97deg, rgba(245,230,207,0.02) 0 1px, transparent 1px 5px),
    linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
  background-attachment: fixed;
  font-family:'IBM Plex Sans', sans-serif;
  font-size:1rem; line-height:1.45;
}
main{ max-width:1300px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }
header{ display:flex; flex-direction:column; gap:.6rem; margin-bottom:2rem; }
.brand{
  font-family:'JetBrains Mono', monospace; font-weight:800;
  font-size:.7rem; letter-spacing:.4em; color:var(--amber);
  text-transform:uppercase;
}
h1{
  font-family:'Newsreader', serif; font-weight:400;
  font-size:clamp(2.6rem, 7vw, 4.6rem); line-height:1; margin:0;
  font-style:italic; color:var(--paper);
}
h1 .accent{ color:var(--amber); font-style:normal; font-weight:700; }
.tag{
  font-family:'Newsreader', serif; font-style:italic;
  color:var(--pen); font-size:1.05rem; max-width:60ch;
}
.controls{
  display:grid; grid-template-columns: 1fr 200px; gap:.75rem;
  margin:1.6rem 0 .8rem;
}
.search-wrap{ position:relative; }
.search-wrap::before{
  content:'/'; position:absolute; left:1rem; top:50%;
  transform:translateY(-50%); color:var(--amber-soft);
  font-family:'JetBrains Mono', monospace; font-weight:800;
  pointer-events:none; font-size:1.1rem;
}
#search{
  width:100%; padding:.95rem 1rem .95rem 2.2rem;
  background:rgba(245,230,207,0.04); border:1px solid var(--hairline);
  color:var(--paper); font-family:'JetBrains Mono', monospace;
  font-size:1.05rem; border-radius:0; outline:none;
  transition: border-color .15s, background .15s;
  min-height:2.75rem;
}
#search:focus{ border-color:var(--amber); background:rgba(245,230,207,0.06); }
#search::placeholder{ color:rgba(205,187,155,0.4); }
#sort{
  padding:.95rem 1rem; background:rgba(245,230,207,0.04);
  border:1px solid var(--hairline); color:var(--paper);
  font-family:'JetBrains Mono', monospace; font-size:.95rem;
  outline:none; cursor:pointer; min-height:2.75rem;
  appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' stroke='%23d99547' stroke-width='1.4' fill='none'/></svg>");
  background-repeat:no-repeat; background-position:right 1rem center;
  padding-right:2.5rem;
}
#sort:focus{ border-color:var(--amber); }
.cats{
  display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:1.4rem;
}
.cat-pill{
  appearance:none; padding:.5rem .9rem; background:transparent;
  border:1px solid var(--hairline); color:var(--pen);
  font-family:'JetBrains Mono', monospace; font-size:.8rem;
  font-weight:600; cursor:pointer; text-transform:lowercase;
  letter-spacing:.05em; transition: all .15s; border-radius:0;
  min-height:2rem; line-height:1;
}
.cat-pill:hover{ border-color:var(--amber-soft); color:var(--paper); }
.cat-pill[aria-pressed="true"]{
  background:var(--amber); border-color:var(--amber);
  color:var(--ink);
}
.cat-pill .ct{
  font-weight:400; font-size:.7rem; opacity:.6;
  margin-left:.4rem;
}
.cat-pill[aria-pressed="true"] .ct{ color:var(--ink); opacity:.7; }
.meta-row{
  display:flex; justify-content:space-between; align-items:baseline;
  font-family:'JetBrains Mono', monospace; font-size:.78rem;
  color:var(--pen); margin-bottom:1rem; gap:1rem; flex-wrap:wrap;
  letter-spacing:.05em;
}
.meta-row .count{ color:var(--amber); }
#status-dot{
  display:inline-block; width:.5rem; height:.5rem; border-radius:50%;
  background:#5a5a5a; margin-right:.4rem; vertical-align:middle;
  transition:background .3s;
}
#status-dot.live{ background:#7af0c8; box-shadow:0 0 6px #7af0c8; }
#status-dot.err{ background:var(--rust); }
.grid{
  display:grid; gap:.9rem;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
}
.card{
  display:flex; flex-direction:column; gap:.45rem;
  background:rgba(245,230,207,0.025);
  border:1px solid var(--hairline);
  padding:.95rem 1rem 1rem;
  text-decoration:none; color:inherit;
  transition: border-color .15s, transform .15s, background .15s;
  min-height:9rem; position:relative;
}
.card:hover, .card:focus-visible{
  border-color:var(--amber-soft); background:rgba(245,230,207,0.055);
  transform: translateY(-1px); outline:none;
}
.card:focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }
.card .ctag{
  font-family:'JetBrains Mono', monospace; font-size:.65rem;
  font-weight:800; letter-spacing:.2em; text-transform:uppercase;
  color:var(--amber);
}
.card h2{
  font-family:'Newsreader', serif; font-weight:500;
  font-size:1.2rem; line-height:1.15; margin:0;
  color:var(--paper);
}
.card .slug{
  font-family:'JetBrains Mono', monospace; font-size:.7rem;
  color:rgba(205,187,155,0.5); letter-spacing:.04em;
}
.card .desc{
  font-size:.88rem; line-height:1.4; color:var(--pen);
  flex:1; display:-webkit-box; -webkit-line-clamp:3;
  -webkit-box-orient:vertical; overflow:hidden;
}
.card .foot{
  display:flex; justify-content:space-between; align-items:center;
  font-family:'JetBrains Mono', monospace; font-size:.72rem;
  color:rgba(205,187,155,0.5); margin-top:.25rem;
}
.card .votes{
  color:var(--sage); font-weight:600;
}
.card .votes.hot{ color:var(--amber); }
.card .votes.cold{ color:rgba(205,187,155,0.4); }
.empty{
  text-align:center; padding:4rem 1rem; color:var(--pen);
  font-family:'Newsreader', serif; font-style:italic; font-size:1.2rem;
}
footer{
  margin-top:3rem; padding-top:1.5rem; border-top:1px solid var(--hairline);
  font-family:'JetBrains Mono', monospace; font-size:.75rem;
  color:rgba(205,187,155,0.4); display:flex;
  justify-content:space-between; flex-wrap:wrap; gap:1rem;
  letter-spacing:.05em;
}
@media (max-width:640px){
  main{ padding:1.5rem 1rem 3rem; }
  .controls{ grid-template-columns:1fr; }
  #sort{ width:100%; }
  .grid{ grid-template-columns:1fr; gap:.7rem; }
  .card{ min-height:auto; padding:.8rem .9rem .9rem; }
}
@media (prefers-reduced-motion: reduce){
  .card{ transition:none; }
  .card:hover, .card:focus-visible{ transform:none; }
}
</style>
</head>
<body>
<main>
  <header>
    <div class="brand">▣ vibespace · archive</div>
    <h1>App <span class="accent">Archive</span> <em>Navigator</em></h1>
    <p class="tag">Every app on sloppy.live — searchable, browsable, sortable by what the chat actually loved.</p>
  </header>

  <section aria-label="search and sort">
    <div class="controls">
      <div class="search-wrap">
        <input id="search" type="search" placeholder="search titles, descriptions, slugs…" autocomplete="off" autofocus aria-label="Search apps">
      </div>
      <select id="sort" aria-label="Sort order">
        <option value="popular">popular</option>
        <option value="recent">most recent</option>
        <option value="oldest">oldest</option>
        <option value="alpha">alphabetical</option>
        <option value="random">shuffle</option>
      </select>
    </div>
    <div class="cats" id="cats" role="group" aria-label="Filter by category"></div>
    <div class="meta-row">
      <div><span id="status-dot"></span><span id="status-text">loading index…</span></div>
      <div><span class="count" id="visible-ct">0</span> of <span id="total-ct">0</span> apps</div>
    </div>
  </section>

  <section id="grid" class="grid" aria-label="App results"></section>

  <footer>
    <div>archive · <span id="index-iso"></span></div>
    <div>data: /apps · votes: app_votes</div>
  </footer>
</main>

<script type="module">
import { createBrowserClient } from "https://cdn.jsdelivr.net/npm/@supabase/ssr@0.7.0/+esm";

const SB_URL = 'https://yjyxteqzhhmtrgcaekgz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqeXh0ZXF6aGhtdHJnY2Fla2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTg3NDIsImV4cCI6MjA3MjkzNDc0Mn0.G8SRde7IN2QFW1EnASM8IS32IUYR2eenCCjdDdioiBU';
const supabase = createBrowserClient(SB_URL, SB_KEY);

const $grid = document.getElementById('grid');
const $search = document.getElementById('search');
const $sort = document.getElementById('sort');
const $cats = document.getElementById('cats');
const $statusDot = document.getElementById('status-dot');
const $statusText = document.getElementById('status-text');
const $visibleCt = document.getElementById('visible-ct');
const $totalCt = document.getElementById('total-ct');
const $indexIso = document.getElementById('index-iso');

const CAT_LABELS = {
  all: 'all',
  game: 'games',
  sim: 'sims',
  art: 'art',
  music: 'music',
  utility: 'utilities',
  chat: 'chat·ai',
  text: 'text',
  social: 'social',
  weird: 'cursed',
  misc: 'misc',
};

const state = {
  apps: [],
  votes: {}, // slug -> count
  search: '',
  cat: 'all',
  sort: 'popular',
  renderBatch: 60, // initial cards; grow on scroll
};

function fmtDate(unixSec){
  if (!unixSec) return '';
  const d = new Date(unixSec * 1000);
  return d.toISOString().slice(0,10);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadIndex(){
  const res = await fetch('apps-index.json', {cache:'no-cache'});
  if (!res.ok) throw new Error('index fetch failed: '+res.status);
  return res.json();
}

async function loadVotes(){
  // Pull only what we need; aggregate client-side.
  // RLS allows anyone to read app_votes.
  const { data, error } = await supabase
    .from('app_votes')
    .select('app_slug, vote')
    .limit(50000);
  if (error) throw error;
  const tally = {};
  for (const row of (data || [])){
    if (!row.app_slug) continue;
    tally[row.app_slug] = (tally[row.app_slug] || 0) + (row.vote || 0);
  }
  return tally;
}

function setStatus(text, mode){
  $statusText.textContent = text;
  $statusDot.classList.remove('live','err');
  if (mode) $statusDot.classList.add(mode);
}

function buildCategoryPills(){
  const counts = {};
  for (const a of state.apps) counts[a.cat] = (counts[a.cat] || 0) + 1;
  const cats = ['all', 'game', 'sim', 'art', 'music', 'utility', 'chat', 'text', 'social', 'weird', 'misc'];
  $cats.innerHTML = '';
  for (const c of cats){
    if (c !== 'all' && !counts[c]) continue;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cat-pill';
    btn.setAttribute('aria-pressed', c === state.cat ? 'true' : 'false');
    btn.dataset.cat = c;
    const ct = c === 'all' ? state.apps.length : counts[c];
    btn.innerHTML = `${CAT_LABELS[c] || c}<span class="ct">${ct}</span>`;
    btn.addEventListener('click', () => {
      state.cat = c;
      for (const p of $cats.querySelectorAll('.cat-pill')){
        p.setAttribute('aria-pressed', p.dataset.cat === c ? 'true' : 'false');
      }
      state.renderBatch = 60;
      render();
    });
    $cats.appendChild(btn);
  }
}

function applyFilter(){
  const q = state.search.trim().toLowerCase();
  let results = state.apps;
  if (state.cat !== 'all'){
    results = results.filter(a => a.cat === state.cat);
  }
  if (q){
    const terms = q.split(/\s+/).filter(Boolean);
    results = results.filter(a => {
      const hay = (a.slug + ' ' + a.title + ' ' + a.desc).toLowerCase();
      return terms.every(t => hay.includes(t));
    });
  }
  const v = state.votes;
  if (state.sort === 'popular'){
    results = [...results].sort((a,b) => (v[b.slug]||0) - (v[a.slug]||0) || b.mtime - a.mtime);
  } else if (state.sort === 'recent'){
    results = [...results].sort((a,b) => b.mtime - a.mtime);
  } else if (state.sort === 'oldest'){
    results = [...results].sort((a,b) => a.mtime - b.mtime);
  } else if (state.sort === 'alpha'){
    results = [...results].sort((a,b) => a.slug.localeCompare(b.slug));
  } else if (state.sort === 'random'){
    results = [...results].sort(() => Math.random() - 0.5);
  }
  return results;
}

function cardHtml(a){
  const v = state.votes[a.slug] || 0;
  const voteCls = v >= 5 ? 'hot' : v <= 0 ? 'cold' : '';
  const voteTxt = v > 0 ? `▲ ${v}` : '· no votes';
  const desc = a.desc || `(no description)`;
  return `<a class="card" href="/${escapeHtml(a.slug)}/" target="_blank" rel="noopener">
    <div class="ctag">${escapeHtml(a.cat)}</div>
    <h2>${escapeHtml(a.title)}</h2>
    <div class="slug">/${escapeHtml(a.slug)}/</div>
    <div class="desc">${escapeHtml(desc)}</div>
    <div class="foot">
      <span>${fmtDate(a.mtime)}</span>
      <span class="votes ${voteCls}">${voteTxt}</span>
    </div>
  </a>`;
}

let observer = null;
let lastResults = [];

function render(){
  const results = applyFilter();
  lastResults = results;
  $visibleCt.textContent = results.length;
  if (!results.length){
    $grid.innerHTML = `<div class="empty">no results — try a different word</div>`;
    return;
  }
  const slice = results.slice(0, state.renderBatch);
  $grid.innerHTML = slice.map(cardHtml).join('');
  // setup sentinel for infinite-scroll-style batch growth
  if (observer) observer.disconnect();
  if (results.length > state.renderBatch){
    const sentinel = document.createElement('div');
    sentinel.style.gridColumn = '1 / -1';
    sentinel.style.padding = '1rem';
    sentinel.style.textAlign = 'center';
    sentinel.style.color = 'var(--pen)';
    sentinel.style.fontFamily = "'JetBrains Mono', monospace";
    sentinel.style.fontSize = '.8rem';
    sentinel.textContent = `${results.length - state.renderBatch} more · scroll to load`;
    $grid.appendChild(sentinel);
    observer = new IntersectionObserver((entries) => {
      for (const e of entries){
        if (e.isIntersecting){
          state.renderBatch += 80;
          render();
          return;
        }
      }
    }, { rootMargin: '600px' });
    observer.observe(sentinel);
  }
}

function debounce(fn, ms){
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

$search.addEventListener('input', debounce(e => {
  state.search = e.target.value;
  state.renderBatch = 60;
  render();
}, 130));

$sort.addEventListener('change', e => {
  state.sort = e.target.value;
  state.renderBatch = 60;
  render();
});

(async () => {
  try {
    const idx = await loadIndex();
    state.apps = idx.apps;
    $totalCt.textContent = idx.count;
    $indexIso.textContent = fmtDate(idx.generated);
    setStatus('loading votes…', '');
    buildCategoryPills();
    render(); // show cards immediately, even before votes
  } catch (e) {
    setStatus('index failed: ' + e.message, 'err');
    return;
  }
  try {
    const tally = await loadVotes();
    state.votes = tally;
    const voted = Object.keys(tally).length;
    setStatus(`live · ${voted} apps with votes`, 'live');
    render();
  } catch (e) {
    setStatus('votes unavailable · showing by date', 'err');
    state.sort = 'recent';
    $sort.value = 'recent';
    render();
  }
})();
</script>
</body>
</html>
