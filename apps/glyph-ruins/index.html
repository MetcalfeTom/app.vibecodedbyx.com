<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glyph Ruins</title>
<link rel="icon" href="https://emojicdn.elk.sh/🏛️">
<meta property="og:title" content="Glyph Ruins">
<meta property="og:description" content="Explore ancient 3D ruins. Find hidden glowing letters. Solve the word.">
<meta property="og:url" content="https://sloppy.live/glyph-ruins">
<meta property="og:image" content="https://sloppy.live/glyph-ruins/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden;font-family:'Cinzel',serif;color:#d4c8a0}
canvas{display:block;width:100vw;height:100vh}
#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:none;padding:10px 16px;
  background:linear-gradient(180deg,rgba(10,10,18,.85),transparent);
  pointer-events:none;
}
#hud-top{display:flex;justify-content:space-between;align-items:center}
.hud-title{font-size:14px;font-weight:700;color:#c8a84c;letter-spacing:3px;text-shadow:0 0 10px rgba(200,168,76,.3)}
.hud-info{font-family:'Fira Code',monospace;font-size:11px;color:#887744}
#word-display{
  text-align:center;margin-top:14px;
}
.word-slot{
  display:inline-block;width:36px;height:44px;margin:0 4px;
  border-bottom:2px solid rgba(200,168,76,.3);
  font-size:28px;font-weight:900;color:#c8a84c;
  text-align:center;line-height:44px;letter-spacing:0;
  text-shadow:0 0 12px rgba(200,168,76,.5);
  transition:all .3s;
}
.word-slot.filled{border-bottom-color:#c8a84c;animation:slotGlow .5s}
@keyframes slotGlow{0%{text-shadow:0 0 20px #c8a84c}100%{text-shadow:0 0 12px rgba(200,168,76,.5)}}
#collected{
  text-align:center;margin-top:8px;font-family:'Fira Code',monospace;
  font-size:11px;color:#665533;letter-spacing:1px;
}
#crosshair{
  position:fixed;top:50%;left:50%;z-index:10;
  width:4px;height:4px;margin:-2px 0 0 -2px;
  border-radius:50%;background:rgba(200,168,76,.4);
  pointer-events:none;display:none;
  box-shadow:0 0 6px rgba(200,168,76,.3);
}
#start-screen{
  position:fixed;inset:0;z-index:30;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#141018,#0a0a12);gap:12px;
}
#start-screen h1{
  font-size:52px;font-weight:900;color:#c8a84c;letter-spacing:8px;
  text-shadow:0 0 40px rgba(200,168,76,.3);
}
.sub{font-size:13px;color:#665533;letter-spacing:4px}
.info{font-size:12px;color:#554422;line-height:2.2;text-align:center;margin:8px 0;max-width:400px}
.info kbd{
  background:rgba(200,168,76,.1);border:1px solid rgba(200,168,76,.2);
  border-radius:3px;padding:1px 7px;color:#aa8844;font-size:11px;font-family:'Fira Code',monospace;
}
.btn{
  margin-top:8px;padding:14px 44px;border:2px solid #c8a84c;border-radius:4px;
  background:transparent;color:#c8a84c;font-size:18px;font-weight:700;
  cursor:pointer;font-family:'Cinzel',serif;letter-spacing:3px;transition:all .15s;
}
.btn:hover{background:rgba(200,168,76,.12);box-shadow:0 0 20px rgba(200,168,76,.2)}
#complete-screen{
  position:fixed;inset:0;z-index:30;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,10,18,.9);gap:10px;
}
#complete-screen h2{font-size:36px;color:#c8a84c;text-shadow:0 0 30px rgba(200,168,76,.4)}
.complete-word{font-size:48px;font-weight:900;color:#eedd88;letter-spacing:8px;text-shadow:0 0 20px rgba(238,221,136,.5)}
#complete-sub{font-size:13px;color:#887744;font-family:'Fira Code',monospace}
#mobile-controls{
  position:fixed;bottom:0;left:0;right:0;z-index:15;
  display:none;padding:10px;pointer-events:none;
}
#mobile-controls>*{pointer-events:auto}
#joystick-zone{
  position:fixed;bottom:20px;left:20px;z-index:15;
  width:110px;height:110px;border-radius:50%;
  background:rgba(200,168,76,.06);border:2px solid rgba(200,168,76,.12);
  display:none;touch-action:none;
}
#joystick-zone .knob{
  position:absolute;width:40px;height:40px;border-radius:50%;
  background:rgba(200,168,76,.2);border:1px solid rgba(200,168,76,.3);
  top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;
}
#look-zone{
  position:fixed;bottom:0;right:0;top:0;width:50%;z-index:14;
  display:none;touch-action:none;
}
@media(pointer:coarse){
  #joystick-zone{display:block}
  #look-zone{display:block}
}
</style>
</head>
<body>

<div id="hud">
  <div id="hud-top">
    <span class="hud-title">GLYPH RUINS</span>
    <span class="hud-info"><span id="hud-round">1</span>/5 &nbsp; Found: <span id="hud-found">0</span>/<span id="hud-total">0</span></span>
  </div>
  <div id="word-display"></div>
  <div id="collected">inventory: <span id="inv-letters">—</span></div>
</div>
<div id="crosshair"></div>

<div id="start-screen">
  <h1>GLYPH RUINS</h1>
  <div class="sub">EXPLORE · DISCOVER · SPELL</div>
  <div class="info">
    Wander ancient ruins and find hidden glowing letters.<br>
    Collect them to complete the mystery word.<br><br>
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;
    <kbd>Mouse</kbd> Look &nbsp;
    <kbd>Space</kbd> Jump<br>
    Click to lock cursor · <kbd>Esc</kbd> to unlock
  </div>
  <button class="btn" id="start-btn">ENTER THE RUINS</button>
</div>

<div id="complete-screen">
  <h2>WORD FOUND</h2>
  <div class="complete-word" id="complete-word"></div>
  <div id="complete-sub"></div>
  <button class="btn" id="next-btn">NEXT WORD</button>
</div>

<div id="joystick-zone"><div class="knob" id="jknob"></div></div>
<div id="look-zone"></div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.163.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ── Words ──
const WORDS=['TEMPLE','CIPHER','RUNES','GLYPH','ORACLE','ANCIENT','MYSTIC','PRISM','VORTEX','ZENITH','OBELISK','SHADOW','QUARTZ','ARCANE','NEBULA'];
let wordQueue=[], currentWord='', collectedLetters=[], placedCount=0;
let round=0, totalRounds=5;

function shuffleWords(){
  wordQueue=[...WORDS].sort(()=>Math.random()-.5);
}

// ── Three.js setup ──
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a12);
scene.fog=new THREE.FogExp2(0x0a0a12,0.018);

const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,200);
camera.position.set(0,2,0);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

// ── Lighting ──
const ambient=new THREE.AmbientLight(0x1a1428,0.6);
scene.add(ambient);
const moonLight=new THREE.DirectionalLight(0x6688cc,0.4);
moonLight.position.set(20,40,-10);
moonLight.castShadow=true;
moonLight.shadow.mapSize.set(1024,1024);
moonLight.shadow.camera.far=80;
moonLight.shadow.camera.left=-40;moonLight.shadow.camera.right=40;
moonLight.shadow.camera.top=40;moonLight.shadow.camera.bottom=-40;
scene.add(moonLight);

// Point lights for atmosphere
const torch1=new THREE.PointLight(0xcc8844,1.5,25);
torch1.position.set(-8,3,6);scene.add(torch1);
const torch2=new THREE.PointLight(0xcc8844,1.5,25);
torch2.position.set(12,3,-8);scene.add(torch2);
const torch3=new THREE.PointLight(0x6644aa,1,20);
torch3.position.set(0,4,-15);scene.add(torch3);

// ── Materials ──
const stoneMat=new THREE.MeshStandardMaterial({color:0x3a3530,roughness:0.9,metalness:0.1});
const darkStoneMat=new THREE.MeshStandardMaterial({color:0x252220,roughness:0.95,metalness:0.05});
const pillarMat=new THREE.MeshStandardMaterial({color:0x4a4540,roughness:0.8,metalness:0.15});
const floorMat=new THREE.MeshStandardMaterial({color:0x2a2825,roughness:0.95,metalness:0.05});
const glowMat=new THREE.MeshStandardMaterial({color:0xc8a84c,emissive:0xc8a84c,emissiveIntensity:0.8,roughness:0.3});

// ── Build arena ──
// Floor
const floor=new THREE.Mesh(new THREE.PlaneGeometry(80,80),floorMat);
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);

// Floor pattern — stone tiles
for(let x=-38;x<40;x+=4){
  for(let z=-38;z<40;z+=4){
    if(Math.random()<0.3){
      const tile=new THREE.Mesh(new THREE.BoxGeometry(3.8,0.05,3.8),
        Math.random()<0.5?stoneMat:darkStoneMat);
      tile.position.set(x+2,0.025,z+2);tile.receiveShadow=true;scene.add(tile);
    }
  }
}

// ── Structure generation ──
const structures=[];
const colliders=[]; // {x,z,hw,hd} axis-aligned boxes for collision

function addWall(x,z,w,h,d,mat){
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat||stoneMat);
  mesh.position.set(x,h/2,z);mesh.castShadow=true;mesh.receiveShadow=true;
  scene.add(mesh);structures.push(mesh);
  colliders.push({x:x-w/2,z:z-d/2,w,d,h});
}

function addPillar(x,z,r,h){
  const mesh=new THREE.Mesh(new THREE.CylinderGeometry(r,r*1.1,h,8),pillarMat);
  mesh.position.set(x,h/2,z);mesh.castShadow=true;mesh.receiveShadow=true;
  scene.add(mesh);structures.push(mesh);
  colliders.push({x:x-r*1.2,z:z-r*1.2,w:r*2.4,d:r*2.4,h});
  // Capital on top
  const cap=new THREE.Mesh(new THREE.BoxGeometry(r*2.5,0.3,r*2.5),pillarMat);
  cap.position.set(x,h+0.15,z);cap.castShadow=true;scene.add(cap);
}

function addArch(x,z,rot){
  const g=new THREE.Group();
  // Two pillars
  const pH=5, pR=0.5;
  const p1=new THREE.Mesh(new THREE.CylinderGeometry(pR,pR*1.1,pH,8),pillarMat);
  p1.position.set(-2,pH/2,0);p1.castShadow=true;g.add(p1);
  const p2=new THREE.Mesh(new THREE.CylinderGeometry(pR,pR*1.1,pH,8),pillarMat);
  p2.position.set(2,pH/2,0);p2.castShadow=true;g.add(p2);
  // Lintel
  const lintel=new THREE.Mesh(new THREE.BoxGeometry(5.5,0.6,1),stoneMat);
  lintel.position.set(0,pH+0.3,0);lintel.castShadow=true;g.add(lintel);
  g.position.set(x,0,z);
  g.rotation.y=rot||0;
  scene.add(g);
  // Colliders for pillars
  const cos=Math.cos(rot||0), sin=Math.sin(rot||0);
  [{lx:-2},{lx:2}].forEach(({lx})=>{
    const wx=x+lx*cos, wz=z+lx*sin;
    colliders.push({x:wx-pR*1.2,z:wz-pR*1.2,w:pR*2.4,d:pR*2.4,h:pH});
  });
}

function buildWorld(){
  // Clear old structures (except floor)
  // Outer walls
  addWall(0,38,80,4,2);addWall(0,-38,80,4,2);
  addWall(38,0,2,4,80);addWall(-38,0,2,4,80);

  // Central temple structure
  addWall(0,-12,10,3,1);addWall(0,-8,1,3,8);
  addWall(-5,-8,1,3,8);addWall(5,-8,1,3,8);

  // Scattered ruins
  addWall(-15,5,6,2.5,1);addWall(-18,8,1,2.5,6);
  addWall(14,-5,1,3,8);addWall(18,-5,8,3,1);
  addWall(-10,-20,8,2,1);addWall(-14,-16,1,2,8);
  addWall(8,15,1,2.5,10);addWall(12,20,8,2.5,1);
  addWall(-20,-25,6,2,1);addWall(25,10,1,3,6);
  addWall(-25,20,8,2,1);addWall(-28,16,1,2,8);
  addWall(20,-20,1,3,10);addWall(25,-25,10,3,1);
  addWall(-8,28,12,2,1);addWall(15,28,6,2,1);

  // Pillars
  const pillarSpots=[[-8,-12],[8,-12],[-12,0],[12,0],[-6,12],[6,12],
    [0,-25],[16,8],[-16,-8],[22,-12],[-22,14],[10,-28],[-10,22],
    [28,0],[-28,-10],[0,20],[18,25],[-18,-28]];
  for(const [px,pz] of pillarSpots){
    addPillar(px,pz,0.4+Math.random()*0.3,3+Math.random()*3);
  }

  // Arches
  addArch(0,-4,0);
  addArch(-15,12,Math.PI/2);
  addArch(20,5,0);
  addArch(-10,25,Math.PI/4);
  addArch(25,-15,Math.PI/3);
}
buildWorld();

// ── Letter objects ──
let letterMeshes=[];
const letterLights=[];

function createLetterMesh(char,x,z){
  // Glowing cube with letter texture
  const canvas=document.createElement('canvas');
  canvas.width=64;canvas.height=64;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#1a1408';ctx.fillRect(0,0,64,64);
  ctx.fillStyle='#c8a84c';ctx.font='bold 42px Cinzel,serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(char,32,34);
  const tex=new THREE.CanvasTexture(canvas);

  const geo=new THREE.BoxGeometry(0.6,0.8,0.6);
  const mat=new THREE.MeshStandardMaterial({
    map:tex,emissive:0xc8a84c,emissiveIntensity:0.5,
    roughness:0.4,metalness:0.3
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(x,1.2+Math.random()*0.5,z);
  mesh.castShadow=true;
  mesh.userData={char,collected:false};
  scene.add(mesh);

  // Point light
  const light=new THREE.PointLight(0xc8a84c,0.8,6);
  light.position.copy(mesh.position);
  scene.add(light);
  letterLights.push({light,mesh});

  return mesh;
}

function placeLetters(){
  // Remove old
  for(const m of letterMeshes){scene.remove(m)}
  for(const l of letterLights){scene.remove(l.light)}
  letterMeshes=[];letterLights.length=0;

  const positions=[];
  // Generate valid positions (not too close to each other or center)
  const minDist=6;
  for(const ch of currentWord){
    let px,pz,ok;
    for(let attempt=0;attempt<200;attempt++){
      px=(Math.random()-0.5)*60;
      pz=(Math.random()-0.5)*60;
      // Not inside a collider
      ok=true;
      for(const c of colliders){
        if(px>c.x-0.5&&px<c.x+c.w+0.5&&pz>c.z-0.5&&pz<c.z+c.d+0.5){ok=false;break}
      }
      // Not too close to other letters
      if(ok){
        for(const pp of positions){
          if(Math.hypot(px-pp[0],pz-pp[1])<minDist){ok=false;break}
        }
      }
      // Not too close to start
      if(ok&&Math.hypot(px,pz)<5) ok=false;
      if(ok) break;
    }
    positions.push([px,pz]);
    letterMeshes.push(createLetterMesh(ch,px,pz));
  }
}

// ── Player physics ──
let yaw=0, pitch=0;
let velY=0, onGround=true, jumping=false;
const playerHeight=2, playerRadius=0.4;

function playerCollides(nx,nz){
  for(const c of colliders){
    if(nx+playerRadius>c.x && nx-playerRadius<c.x+c.w &&
       nz+playerRadius>c.z && nz-playerRadius<c.z+c.d){
      return true;
    }
  }
  // Arena bounds
  if(Math.abs(nx)>37||Math.abs(nz)>37) return true;
  return false;
}

let keys={};
addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')e.preventDefault()});
addEventListener('keyup',e=>{keys[e.code]=false});

// Pointer lock
let locked=false;
renderer.domElement.addEventListener('click',()=>{
  if(gameRunning&&!locked) renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange',()=>{
  locked=!!document.pointerLockElement;
  document.getElementById('crosshair').style.display=locked?'block':'none';
});
document.addEventListener('mousemove',e=>{
  if(!locked)return;
  yaw-=e.movementX*0.002;
  pitch-=e.movementY*0.002;
  pitch=Math.max(-1.4,Math.min(1.4,pitch));
});

// Touch look
const lookZone=document.getElementById('look-zone');
let lookTouchId=null,lastLookX=0,lastLookY=0;
lookZone.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  lookTouchId=t.identifier;lastLookX=t.clientX;lastLookY=t.clientY;
},{passive:false});
lookZone.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===lookTouchId){
      yaw-=(t.clientX-lastLookX)*0.004;
      pitch-=(t.clientY-lastLookY)*0.004;
      pitch=Math.max(-1.4,Math.min(1.4,pitch));
      lastLookX=t.clientX;lastLookY=t.clientY;
    }
  }
},{passive:false});
lookZone.addEventListener('touchend',e=>{
  for(const t of e.changedTouches) if(t.identifier===lookTouchId) lookTouchId=null;
});

// Touch joystick
let touchDir={x:0,z:0},joyTouchId=null;
const joyEl=document.getElementById('joystick-zone');
const jknob=document.getElementById('jknob');
joyEl.addEventListener('touchstart',e=>{
  e.preventDefault();joyTouchId=e.changedTouches[0].identifier;
  handleJoy(e.changedTouches[0]);
},{passive:false});
joyEl.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===joyTouchId) handleJoy(t);
},{passive:false});
joyEl.addEventListener('touchend',e=>{
  for(const t of e.changedTouches) if(t.identifier===joyTouchId){
    touchDir={x:0,z:0};joyTouchId=null;
    jknob.style.transform='translate(-50%,-50%)';
  }
});
function handleJoy(t){
  const r=joyEl.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  let dx=t.clientX-cx,dy=t.clientY-cy;
  const maxR=r.width/2,d=Math.hypot(dx,dy);
  if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR}
  touchDir.x=dx/maxR;touchDir.z=dy/maxR;
  jknob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
}

// ── Game state ──
let gameRunning=false, frame2=0;

function startRound(){
  if(wordQueue.length===0) shuffleWords();
  currentWord=wordQueue.pop();
  collectedLetters=[];placedCount=0;round++;

  placeLetters();
  camera.position.set(0,playerHeight,0);
  yaw=0;pitch=0;velY=0;onGround=true;

  // Update HUD
  document.getElementById('hud-round').textContent=round;
  document.getElementById('hud-found').textContent='0';
  document.getElementById('hud-total').textContent=currentWord.length;
  updateWordDisplay();
  updateInventory();

  document.getElementById('complete-screen').style.display='none';
  if(!locked && !('ontouchstart' in window)){
    renderer.domElement.requestPointerLock();
  }
}

function startGame(){
  shuffleWords();round=0;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('hud').style.display='block';
  gameRunning=true;
  startRound();
}

function updateWordDisplay(){
  const wrap=document.getElementById('word-display');
  wrap.innerHTML='';
  for(let i=0;i<currentWord.length;i++){
    const slot=document.createElement('span');
    slot.className='word-slot';
    // Show letter if placed
    if(i<placedCount){
      slot.textContent=currentWord[i];
      slot.classList.add('filled');
    }
    wrap.appendChild(slot);
  }
}

function updateInventory(){
  const el=document.getElementById('inv-letters');
  el.textContent=collectedLetters.length>0?collectedLetters.join(' '):'—';
}

function tryPlaceLetters(){
  // Auto-place: check if collected letters can fill next slots
  let changed=true;
  while(changed){
    changed=false;
    if(placedCount>=currentWord.length) break;
    const needed=currentWord[placedCount];
    const idx=collectedLetters.indexOf(needed);
    if(idx>=0){
      collectedLetters.splice(idx,1);
      placedCount++;
      changed=true;
    }
  }
  updateWordDisplay();
  updateInventory();
  document.getElementById('hud-found').textContent=placedCount;

  if(placedCount>=currentWord.length){
    // Word complete!
    setTimeout(()=>wordComplete(),500);
  }
}

function wordComplete(){
  document.getElementById('complete-word').textContent=currentWord;
  document.getElementById('complete-sub').textContent=
    round>=totalRounds?`All ${totalRounds} words found!`:`${totalRounds-round} words remaining`;
  document.getElementById('complete-screen').style.display='flex';
  document.exitPointerLock();

  if(round>=totalRounds){
    document.getElementById('next-btn').textContent='PLAY AGAIN';
    document.getElementById('next-btn').onclick=()=>{round=0;startRound()};
  } else {
    document.getElementById('next-btn').textContent='NEXT WORD';
    document.getElementById('next-btn').onclick=()=>startRound();
  }
}

// ── Game loop ──
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  frame2++;

  if(gameRunning){
    // Movement
    let mx=0,mz=0;
    if(keys['KeyW']||keys['ArrowUp'])mz=-1;
    if(keys['KeyS']||keys['ArrowDown'])mz=1;
    if(keys['KeyA']||keys['ArrowLeft'])mx=-1;
    if(keys['KeyD']||keys['ArrowRight'])mx=1;
    if(touchDir.x||touchDir.z){mx=touchDir.x;mz=touchDir.z}

    const speed=6*dt;
    const sin=Math.sin(yaw),cos=Math.cos(yaw);
    const moveX=(mx*cos-mz*sin)*speed;
    const moveZ=(mx*sin+mz*cos)*speed;

    const nx=camera.position.x+moveX;
    const nz=camera.position.z+moveZ;
    if(!playerCollides(nx,camera.position.z)) camera.position.x=nx;
    if(!playerCollides(camera.position.x,nz)) camera.position.z=nz;

    // Jump
    if((keys['Space'])&&onGround){velY=6;onGround=false;jumping=true}
    velY-=15*dt;
    camera.position.y+=velY*dt;
    if(camera.position.y<=playerHeight){
      camera.position.y=playerHeight;velY=0;onGround=true;jumping=false;
    }

    // Camera rotation
    camera.rotation.order='YXZ';
    camera.rotation.y=yaw;
    camera.rotation.x=pitch;

    // Collect letters
    for(const m of letterMeshes){
      if(m.userData.collected) continue;
      const d=camera.position.distanceTo(m.position);
      if(d<1.8){
        m.userData.collected=true;
        collectedLetters.push(m.userData.char);
        // Hide
        m.visible=false;
        // Remove light
        const ll=letterLights.find(l=>l.mesh===m);
        if(ll) ll.light.intensity=0;
        tryPlaceLetters();
      }
    }

    // Animate letter meshes
    for(const m of letterMeshes){
      if(m.userData.collected) continue;
      m.rotation.y+=0.02;
      m.position.y=1.2+Math.sin(frame2*0.03+m.position.x)*0.2;
    }

    // Flicker torch lights
    torch1.intensity=1.5+Math.sin(frame2*0.07)*0.3;
    torch2.intensity=1.5+Math.sin(frame2*0.09+1)*0.3;
    torch3.intensity=1+Math.sin(frame2*0.05+2)*0.2;
  }

  renderer.render(scene,camera);
}

// ── Resize ──
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── Events ──
document.getElementById('start-btn').onclick=startGame;

animate();
</script>
</body>
</html>
