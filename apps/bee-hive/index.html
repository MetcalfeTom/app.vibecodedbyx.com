<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bee Hive</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐝">
<meta property="og:title" content="Bee Hive">
<meta property="og:description" content="Fly your bee, collect pollen from flowers, and grow the ultimate hive.">
<meta property="og:url" content="https://sloppy.live/bee-hive/">
<meta property="og:image" content="https://sloppy.live/bee-hive/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#87ceeb;font-family:'Fredoka',sans-serif}
canvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;z-index:10;font-size:13px;color:#4a3520;pointer-events:none}
#hud>div{background:rgba(255,240,200,.85);padding:3px 10px;border-radius:16px;display:flex;align-items:center;gap:4px;border:1.5px solid rgba(180,140,60,.25);pointer-events:auto;white-space:nowrap}
#hud .rare{border-color:rgba(255,200,0,.5);background:rgba(255,245,200,.9)}
.spacer{flex:1}
#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(74,53,32,.5);font-size:13px;pointer-events:none;transition:opacity 1.5s;letter-spacing:.5px}
.back-link{position:fixed;bottom:4px;right:8px;font-size:9px;color:rgba(0,0,0,.2);text-decoration:none;z-index:10}
.back-link:hover{color:rgba(0,0,0,.4)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div>🏠 Lv.<b id="hive-lv">1</b></div>
  <div>🍯 <b id="honey-ct">0</b></div>
  <div>🏺 <b id="hive-pollen-ct">0</b> <span id="production-rate" style="font-size:.7em;opacity:.6"></span></div>
  <div>👑 <b id="queen-ct">1</b></div>
  <div>🐝 <b id="bee-ct">0</b></div>
  <span class="spacer"></span>
  <div id="deposit-hint" style="opacity:0;transition:opacity .3s">Fly to hive!</div>
</div>
<div id="hint">Arrow keys / WASD / tap to fly</div>
<a class="back-link" href="https://sloppy.live">sloppy.live</a>
<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H;

function resize(){
  let dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  CV.width=W*dpr;CV.height=H*dpr;
  CV.style.width=W+'px';CV.style.height=H+'px';
  X.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize',resize);

// Game state
let pollen=0, honey=0, rareHoney=0, hivePollen=0, hiveLevel=1, honeyMultiplier=1;
let interacted=false;
const HIVE_COSTS=[0,10,25,50,100,200,400,800,1500,3000,5000,8000,12000];
const BEE_COST=15;
function getQueenCount(){return Math.floor(hiveLevel/3)+1;}
function getMaxWorkers(){return hiveLevel*getQueenCount();}

// Weather system
let weather={state:'sunny',timer:0,duration:25,raindrops:[],cloudAlpha:0,targetCloudAlpha:0};
const WEATHER_STATES=['sunny','cloudy','rain','sunny','sunny'];
function advanceWeather(){
  let idx=WEATHER_STATES.indexOf(weather.state);
  weather.state=WEATHER_STATES[(idx+1)%WEATHER_STATES.length];
  weather.timer=0;
  weather.duration=15+Math.random()*20;
  weather.targetCloudAlpha=weather.state==='cloudy'?0.25:weather.state==='rain'?0.4:0;
}
function updateWeather(dt){
  weather.timer+=dt;
  if(weather.timer>=weather.duration) advanceWeather();
  // Smooth cloud transition
  weather.cloudAlpha+=(weather.targetCloudAlpha-weather.cloudAlpha)*dt*0.8;
  // Raindrops
  if(weather.state==='rain'){
    let count=Math.floor(3+Math.random()*3);
    for(let i=0;i<count;i++){
      weather.raindrops.push({x:Math.random()*W,y:-5,vy:250+Math.random()*150,len:8+Math.random()*8,alpha:0.15+Math.random()*0.15});
    }
  }
  for(let i=weather.raindrops.length-1;i>=0;i--){
    let r=weather.raindrops[i];
    r.y+=r.vy*dt;
    if(r.y>H) weather.raindrops.splice(i,1);
  }
}

// Bee skins unlocked at hive levels: [bodyColor, stripeColor, wingTint, name]
const BEE_SKINS=[
  {body:'#ffc107',stripe:'#212121',wing:'rgba(200,220,255,.5)',name:'Classic'},       // Lv1
  {body:'#ffc107',stripe:'#212121',wing:'rgba(200,220,255,.5)',name:'Classic'},       // Lv2
  {body:'#ffc107',stripe:'#212121',wing:'rgba(200,220,255,.5)',name:'Classic'},       // Lv3
  {body:'#ffc107',stripe:'#212121',wing:'rgba(200,220,255,.5)',name:'Classic'},       // Lv4
  {body:'#ffc107',stripe:'#212121',wing:'rgba(200,220,255,.5)',name:'Classic'},       // Lv5
  {body:'#ffc107',stripe:'#212121',wing:'rgba(200,220,255,.5)',name:'Classic'},       // Lv6
  {body:'#ffc107',stripe:'#212121',wing:'rgba(200,220,255,.5)',name:'Classic'},       // Lv7
  {body:'#ffc107',stripe:'#212121',wing:'rgba(200,220,255,.5)',name:'Classic'},       // Lv8
  {body:'#ff6b6b',stripe:'#8b0000',wing:'rgba(255,180,180,.5)',name:'Fire Bee'},     // Lv9
  {body:'#72ddf7',stripe:'#1a5276',wing:'rgba(180,230,255,.6)',name:'Frost Bee'},    // Lv10
  {body:'#c77dff',stripe:'#4a0080',wing:'rgba(220,180,255,.5)',name:'Royal Bee'},    // Lv11
  {body:'#ffd700',stripe:'#b8860b',wing:'rgba(255,245,180,.6)',name:'Golden Bee'},   // Lv12
  {body:'#50ff50',stripe:'#006400',wing:'rgba(180,255,200,.5)',name:'Emerald Bee'},  // Lv13
];

// Random HSL worker bee skin generator
function randomWorkerSkin(){
  let h=Math.floor(Math.random()*360);
  let s=50+Math.floor(Math.random()*40);
  let l=45+Math.floor(Math.random()*25);
  let sh=Math.floor(Math.random()*360);
  return {
    body:`hsl(${h},${s}%,${l}%)`,
    stripe:`hsl(${sh},30%,${15+Math.floor(Math.random()*15)}%)`,
    wing:`hsla(${(h+180)%360},40%,80%,0.5)`
  };
}

// Flower types: name, color, petalCount, pollenMin, pollenMax, sizeMin, sizeMax, rarity, isRare
const FLOWER_TYPES=[
  {name:'Daisy',colors:['#fff5cc','#ffe680'],petals:8,pMin:2,pMax:4,sMin:10,sMax:14,weight:30},
  {name:'Poppy',colors:['#ff6b6b','#ff4444'],petals:5,pMin:3,pMax:5,sMin:12,sMax:16,weight:25},
  {name:'Lavender',colors:['#c77dff','#9b59b6'],petals:6,pMin:3,pMax:6,sMin:10,sMax:14,weight:20},
  {name:'Sunflower',colors:['#ffd93d','#f39c12'],petals:12,pMin:5,pMax:8,sMin:16,sMax:22,weight:15},
  {name:'Bluebell',colors:['#72ddf7','#3498db'],petals:5,pMin:2,pMax:4,sMin:8,sMax:12,weight:20},
  {name:'Rose',colors:['#ff6b9d','#e74c6f'],petals:10,pMin:4,pMax:7,sMin:14,sMax:18,weight:12},
  {name:'Royal Orchid',colors:['#ffd700','#ffaa00'],petals:6,pMin:6,pMax:10,sMin:18,sMax:24,weight:3,rare:true},
  // Neon flowers — unlock at higher hive levels
  {name:'Neon Lotus',colors:['#00ffcc','#00ff88'],petals:9,pMin:5,pMax:9,sMin:14,sMax:20,weight:10,minLevel:4,glow:'#00ffcc'},
  {name:'Electric Dahlia',colors:['#ff00ff','#ff44cc'],petals:14,pMin:6,pMax:10,sMin:16,sMax:22,weight:8,minLevel:6,glow:'#ff00ff'},
  {name:'Plasma Iris',colors:['#00ccff','#0088ff'],petals:6,pMin:7,pMax:11,sMin:12,sMax:18,weight:7,minLevel:8,glow:'#00ccff'},
  {name:'Void Bloom',colors:['#bf00ff','#8800cc'],petals:8,pMin:8,pMax:14,sMin:18,sMax:26,weight:5,minLevel:10,glow:'#bf00ff'},
  {name:'Starfire Lily',colors:['#ffff00','#ff8800'],petals:7,pMin:10,pMax:16,sMin:20,sMax:28,weight:4,minLevel:12,glow:'#ffff00',rare:true},
];

// Bee
const bee={x:0,y:0,vx:0,vy:0,angle:0,wingPhase:0,pollenCarried:0,maxPollen:5};
bee.x=W/2; bee.y=H/2;

// Helper bees (auto-collect)
let helperBees=[];

// Flowers
let flowers=[];

function pickFlowerType(){
  let available=FLOWER_TYPES.filter(t=>!t.minLevel||hiveLevel>=t.minLevel);
  let totalW=available.reduce((s,t)=>s+t.weight,0);
  let r=Math.random()*totalW;
  for(let t of available){r-=t.weight;if(r<=0)return t;}
  return available[0];
}

function spawnFlowers(){
  flowers=[];
  let count=12+hiveLevel*3;
  let groundY=H*0.65;
  for(let i=0;i<count;i++){
    let ft=pickFlowerType();
    let pol=ft.pMin+Math.floor(Math.random()*(ft.pMax-ft.pMin+1));
    flowers.push({
      x:40+Math.random()*(W-80),
      y:groundY+Math.random()*(H*0.25),
      type:ft,
      color:ft.colors[0],
      color2:ft.colors[1],
      petals:ft.petals,
      pollen:pol, maxPollen:pol,
      swayPhase:Math.random()*Math.PI*2,
      size:ft.sMin+Math.random()*(ft.sMax-ft.sMin),
      regrowTimer:0,
      rare:!!ft.rare,
      glow:ft.glow||null
    });
  }
}

// Hive position
let hive={x:W/2, y:H*0.18, w:80, h:60};

// Particles
let particles=[];

function spawnParticle(x,y,color,type){
  particles.push({x,y,vx:(Math.random()-.5)*2,vy:-Math.random()*2-1,life:1,color,size:3+Math.random()*3,type});
}

// Input
const keys={};
let touchTarget=null;
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(!interacted){interacted=true;document.getElementById('hint').style.opacity='0';}
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

CV.addEventListener('touchstart',e=>{
  e.preventDefault();
  let t=e.touches[0];
  touchTarget={x:t.clientX,y:t.clientY};
  if(!interacted){interacted=true;document.getElementById('hint').style.opacity='0';}
},{passive:false});
CV.addEventListener('touchmove',e=>{
  e.preventDefault();
  let t=e.touches[0];
  touchTarget={x:t.clientX,y:t.clientY};
},{passive:false});
CV.addEventListener('touchend',()=>{touchTarget=null;},{passive:false});

function updateBee(dt){
  let ax=0,ay=0;
  let spd=280;
  if(keys['ArrowLeft']||keys['a']||keys['A']) ax=-spd;
  if(keys['ArrowRight']||keys['d']||keys['D']) ax=spd;
  if(keys['ArrowUp']||keys['w']||keys['W']) ay=-spd;
  if(keys['ArrowDown']||keys['s']||keys['S']) ay=spd;

  if(touchTarget){
    let dx=touchTarget.x-bee.x, dy=touchTarget.y-bee.y;
    let dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>10){
      ax=dx/dist*spd;
      ay=dy/dist*spd;
    }
  }

  // Gravity-lite (bee floats but slowly sinks)
  ay+=40;

  bee.vx+=ax*dt;
  bee.vy+=ay*dt;

  // Damping
  bee.vx*=0.92;
  bee.vy*=0.92;

  bee.x+=bee.vx*dt;
  bee.y+=bee.vy*dt;

  // Bounds
  bee.x=Math.max(15,Math.min(W-15,bee.x));
  bee.y=Math.max(15,Math.min(H-15,bee.y));

  // Angle
  if(Math.abs(bee.vx)>5) bee.angle=bee.vx>0?0:Math.PI;
  bee.wingPhase+=dt*25;

  // Collect pollen from flowers
  if(!bee.visitedFlowers) bee.visitedFlowers=new Set();
  for(let f of flowers){
    if(f.pollen<=0) continue;
    let dx=bee.x-f.x, dy=bee.y-f.y;
    if(dx*dx+dy*dy<(f.size+12)*(f.size+12)){
      if(bee.pollenCarried<bee.maxPollen){
        f.pollen--;
        bee.pollenCarried++;
        bee.visitedFlowers.add(f);
        if(f.rare) bee.rareCarried=(bee.rareCarried||0)+1;
        pollen++;
        let pcol=f.rare?'#ffd700':'#ffd93d';
        for(let i=0;i<3;i++) spawnParticle(f.x,f.y-f.size,pcol,'pollen');
        if(bee.pollenCarried>=bee.maxPollen){
          document.getElementById('deposit-hint').style.opacity='1';
        }
      }
    }
  }

  // Deposit at hive — pollen goes into hive storage, converts to honey over time
  let dx=bee.x-hive.x, dy=bee.y-(hive.y+hive.h/2);
  if(dx*dx+dy*dy<(hive.w)*(hive.w)&&bee.pollenCarried>0){
    let visited=bee.visitedFlowers?bee.visitedFlowers.size:1;
    honeyMultiplier=1+(visited-1)*0.5;
    let pollenDeposit=Math.round(bee.pollenCarried*honeyMultiplier);
    hivePollen+=pollenDeposit;
    if(bee.rareCarried>0){
      rareHoney+=bee.rareCarried;
      for(let i=0;i<bee.rareCarried*3;i++) spawnParticle(hive.x,hive.y+hive.h,'#ffd700','honey');
      bee.rareCarried=0;
    }
    for(let i=0;i<Math.min(pollenDeposit*2,30);i++) spawnParticle(hive.x,hive.y+hive.h,'#ffaa00','pollen');
    bee.pollenCarried=0;
    bee.visitedFlowers=new Set();
    document.getElementById('deposit-hint').style.opacity='0';
    saveGame();
  }
}

function checkUpgrades(){
  // Auto hive upgrade
  let cost=HIVE_COSTS[hiveLevel]||999999;
  if(honey>=cost&&hiveLevel<HIVE_COSTS.length-1){
    honey-=cost;
    hiveLevel++;
    bee.maxPollen=5+hiveLevel*2;
    hive.w=80+hiveLevel*10;
    hive.h=60+hiveLevel*8;
    spawnFlowers();
    for(let i=0;i<20;i++) spawnParticle(hive.x,hive.y+hive.h,'#ffd700','honey');
    saveGame();
  }
  // Auto buy helper bee — queued for gradual spawn
  if(honey>=BEE_COST&&targetHelperCount<getMaxWorkers()){
    honey-=BEE_COST;
    targetHelperCount++;
  }
}

function updateHelpers(dt){
  for(let h of helperBees){
    // Dead bees wait to respawn
    if(h.dead){
      h.respawnTimer-=dt;
      if(h.respawnTimer<=0){
        h.dead=false;
        h.trips=0;
        h.skin=randomWorkerSkin();
        h.x=hive.x+(Math.random()-.5)*30;
        h.y=hive.y+hive.h;
        h.vx=0;h.vy=0;
        h.target=null;
        h.pollenCarried=0;
        h.returning=false;
        for(let i=0;i<5;i++) spawnParticle(h.x,h.y,'#ffc107','pollen');
      }
      continue;
    }
    h.wingPhase+=dt*20;
    // Resting inside hive after deposit
    if(h.resting){
      h.restTimer-=dt;
      h.x+=(hive.x-h.x)*dt*2;
      h.y+=(hive.y+hive.h*0.5-h.y)*dt*2;
      if(h.restTimer<=0){
        h.resting=false;
      }
      continue;
    }
    if(h.returning){
      // Fly to hive
      let dx=hive.x-h.x, dy=(hive.y+hive.h/2)-h.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<20){
        hivePollen+=h.pollenCarried;
        if(h.rareCarried>0){rareHoney+=h.rareCarried;h.rareCarried=0;}
        for(let i=0;i<h.pollenCarried;i++) spawnParticle(hive.x,hive.y+hive.h,'#ffaa00','pollen');
        h.pollenCarried=0;
        h.returning=false;
        h.target=null;
        h.dead=true;
        h.respawnTimer=15;
        for(let i=0;i<8;i++) spawnParticle(h.x,h.y,'#aaa','honey');
        saveGame();
      } else {
        let rspd=(h.speed||160)+20;
        h.vx+=(dx/dist*rspd)*dt;
        h.vy+=(dy/dist*rspd)*dt;
      }
    } else {
      // Find flower — each bee has a searchBias to spread across flowers
      if(!h.target||h.target.pollen<=0){
        let candidates=[];
        for(let f of flowers){
          if(f.pollen<=0) continue;
          let dx=f.x-h.x,dy=f.y-h.y;
          candidates.push({f,d:dx*dx+dy*dy});
        }
        candidates.sort((a,b)=>a.d-b.d);
        // Pick from top candidates using searchBias to spread bees out
        let pick=(h.searchBias||0)%Math.max(candidates.length,1);
        h.target=candidates.length>0?candidates[Math.min(pick,candidates.length-1)].f:null;
      }
      if(h.target){
        // Fly toward target with unique offset so bees don't stack
        let ox=h.offsetX||0, oy=h.offsetY||0;
        let dx=(h.target.x+ox)-h.x, dy=(h.target.y+oy)-h.y;
        let dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<20){
          if(h.target.pollen>0&&h.pollenCarried<h.maxPollen){
            h.target.pollen--;
            h.pollenCarried++;
            if(h.target.rare) h.rareCarried=(h.rareCarried||0)+1;
            pollen++;
            spawnParticle(h.target.x,h.target.y-h.target.size,h.target.rare?'#ffd700':'#ffd93d','pollen');
          }
          if(h.pollenCarried>=h.maxPollen){
            h.returning=true;
          } else if(h.target.pollen<=0){
            h.target=null; // flower empty, find another
          }
        } else {
          let spd=h.speed||160;
          h.vx+=(dx/dist*spd)*dt;
          h.vy+=(dy/dist*spd)*dt;
        }
      } else {
        // No flowers available — return home if carrying any pollen, else wander
        if(h.pollenCarried>0){
          h.returning=true;
        } else {
          h.vx+=(Math.random()-.5)*100*dt;
          h.vy+=(Math.random()-.5)*100*dt;
        }
      }
    }
    h.vx*=0.94;h.vy*=0.94;
    h.x+=h.vx*dt;h.y+=h.vy*dt;
    h.x=Math.max(10,Math.min(W-10,h.x));
    h.y=Math.max(10,Math.min(H-10,h.y));
    if(Math.abs(h.vx)>3) h.angle=h.vx>0?0:Math.PI;
  }
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.05;
    p.life-=dt*2;
    if(p.life<=0) particles.splice(i,1);
  }
}

// Hive converts stored pollen into honey over time
let honeyProductionAccum=0;
function produceHoney(dt){
  if(hivePollen<=0) return;
  // Production rate: 1 + 0.5 per hive level, per second
  let rate=(1+hiveLevel*0.5)*getQueenCount();
  honeyProductionAccum+=rate*dt;
  if(honeyProductionAccum>=1){
    let produced=Math.min(Math.floor(honeyProductionAccum),hivePollen);
    hivePollen-=produced;
    honey+=produced;
    honeyProductionAccum-=produced;
    // Particles for honey production
    if(produced>0){
      for(let i=0;i<Math.min(produced,5);i++) spawnParticle(hive.x,hive.y+hive.h*0.5,'#ffcc00','honey');
      checkUpgrades();
    }
  }
}

function regrowFlowers(dt){
  let groundY=H*0.65;
  let growMult=weather.state==='rain'?3:weather.state==='cloudy'?1.5:1;
  for(let f of flowers){
    if(f.pollen<=0){
      // Respawn as a new random flower type
      f.regrowTimer+=dt*growMult;
      if(f.regrowTimer>6){
        let ft=pickFlowerType();
        let pol=ft.pMin+Math.floor(Math.random()*(ft.pMax-ft.pMin+1));
        f.x=40+Math.random()*(W-80);
        f.y=groundY+Math.random()*(H*0.25);
        f.type=ft;f.color=ft.colors[0];f.color2=ft.colors[1];
        f.petals=ft.petals;f.pollen=pol;f.maxPollen=pol;
        f.size=ft.sMin+Math.random()*(ft.sMax-ft.sMin);
        f.rare=!!ft.rare;f.glow=ft.glow||null;f.regrowTimer=0;
        f.swayPhase=Math.random()*Math.PI*2;
      }
    }
  }
}

// Drawing
function drawSky(){
  let grad=X.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#4fc3f7');
  grad.addColorStop(0.5,'#81d4fa');
  grad.addColorStop(0.7,'#a5d6a7');
  grad.addColorStop(1,'#66bb6a');
  X.fillStyle=grad;
  X.fillRect(0,0,W,H);

  // Clouds
  let t=performance.now()*0.0000006;
  X.fillStyle='rgba(255,255,255,.45)';
  for(let i=0;i<5;i++){
    let cx=((i*W/3+t*W*200)%(W+200))-100;
    let cy=40+i*30;
    X.beginPath();
    X.ellipse(cx,cy,60+i*10,20+i*3,0,0,Math.PI*2);
    X.fill();
    X.beginPath();
    X.ellipse(cx-30,cy+5,35,15,0,0,Math.PI*2);
    X.fill();
    X.beginPath();
    X.ellipse(cx+35,cy+5,40,15,0,0,Math.PI*2);
    X.fill();
  }

  // Weather cloud overlay
  if(weather.cloudAlpha>0.01){
    X.fillStyle='rgba(120,130,140,'+weather.cloudAlpha+')';
    X.fillRect(0,0,W,H*0.65);
    // Extra dark clouds
    let t2=performance.now()*0.000001;
    X.fillStyle='rgba(90,95,105,'+(weather.cloudAlpha*0.8)+')';
    for(let i=0;i<7;i++){
      let cx2=((i*W/4+t2*W*300)%(W+300))-150;
      X.beginPath();
      X.ellipse(cx2,30+i*18,80+i*12,25+i*4,0,0,Math.PI*2);
      X.fill();
    }
  }

  // Ground (slightly darker in rain)
  let gDark=weather.state==='rain'?0.85:1;
  X.fillStyle=`rgb(${Math.round(76*gDark)},${Math.round(175*gDark)},${Math.round(80*gDark)})`;
  X.fillRect(0,H*0.65,W,H*0.35);
  X.fillStyle=`rgb(${Math.round(67*gDark)},${Math.round(160*gDark)},${Math.round(71*gDark)})`;
  X.fillRect(0,H*0.65,W,4);
}

function drawWeather(){
  // Raindrops
  if(weather.raindrops.length>0){
    for(let r of weather.raindrops){
      X.strokeStyle='rgba(180,210,240,'+r.alpha+')';
      X.lineWidth=1;
      X.beginPath();
      X.moveTo(r.x,r.y);
      X.lineTo(r.x-1,r.y+r.len);
      X.stroke();
    }
  }
  // Weather indicator
  let icon=weather.state==='rain'?'🌧️':weather.state==='cloudy'?'☁️':'☀️';
  X.font='16px sans-serif';
  X.textAlign='right';
  X.fillText(icon,W-12,20);
}

function drawFlower(f){
  if(f.pollen<=0) return;
  let t=performance.now()*0.001;
  let sway=Math.sin(t+f.swayPhase)*3;
  let s=f.size;
  let fx=f.x+sway, fy=f.y;

  // Flower head position (close to stem top)
  let headY=fy-s*0.35;

  // Stem (connects to flower head)
  X.strokeStyle='#2e7d32';
  X.lineWidth=2;
  X.beginPath();
  X.moveTo(fx,headY+s*0.2);
  X.lineTo(fx-sway*0.3,fy+s*2);
  X.stroke();

  // Neon glow for special flowers
  if(f.glow&&f.pollen>0){
    let pulse=0.12+Math.sin(t*2+f.swayPhase)*0.06;
    let grad=X.createRadialGradient(fx,headY,0,fx,headY,s*2.5);
    grad.addColorStop(0,f.glow+'40');
    grad.addColorStop(0.5,f.glow+'18');
    grad.addColorStop(1,f.glow+'00');
    X.fillStyle=grad;
    X.fillRect(fx-s*2.5,headY-s*2.5,s*5,s*5);
  } else if(f.rare&&f.pollen>0){
    let grad=X.createRadialGradient(fx,headY,0,fx,headY,s*2);
    grad.addColorStop(0,'rgba(255,215,0,.15)');
    grad.addColorStop(1,'rgba(255,215,0,0)');
    X.fillStyle=grad;
    X.fillRect(fx-s*2,headY-s*2,s*4,s*4);
  }

  // Petals
  let petalCount=f.petals||6;
  for(let i=0;i<petalCount;i++){
    let a=i/petalCount*Math.PI*2+t*0.3;
    X.fillStyle=i%2===0?f.color:f.color2;
    X.beginPath();
    X.ellipse(fx+Math.cos(a)*s*0.45,headY+Math.sin(a)*s*0.45,s*0.38,s*0.22,a,0,Math.PI*2);
    X.fill();
  }
  // Center
  X.fillStyle='#ffd93d';
  X.beginPath();
  X.arc(fx,headY,s*0.25,0,Math.PI*2);
  X.fill();
  // Pollen indicator
  X.fillStyle='rgba(255,217,61,'+(0.3+f.pollen/f.maxPollen*0.7)+')';
  X.beginPath();
  X.arc(fx,headY,s*0.15*(f.pollen/f.maxPollen),0,Math.PI*2);
  X.fill();
}

function drawHive(){
  let hx=hive.x,hy=hive.y,hw=hive.w,hh=hive.h;
  // Hive body (hexagonal-ish)
  X.fillStyle='#d4a030';
  X.beginPath();
  X.moveTo(hx,hy);
  X.bezierCurveTo(hx-hw*0.6,hy,hx-hw*0.7,hy+hh*0.5,hx-hw*0.4,hy+hh);
  X.lineTo(hx+hw*0.4,hy+hh);
  X.bezierCurveTo(hx+hw*0.7,hy+hh*0.5,hx+hw*0.6,hy,hx,hy);
  X.fill();

  // Stripes
  X.strokeStyle='#c49025';
  X.lineWidth=2;
  for(let i=1;i<4;i++){
    let sy=hy+hh*i/4;
    let sw=hw*0.3*(1+Math.sin(i*1.2)*0.3);
    X.beginPath();
    X.moveTo(hx-sw,sy);
    X.lineTo(hx+sw,sy);
    X.stroke();
  }

  // Entrance
  X.fillStyle='#5d4037';
  X.beginPath();
  X.ellipse(hx,hy+hh*0.85,hw*0.12,hh*0.1,0,0,Math.PI*2);
  X.fill();

  // Level text
  X.fillStyle='rgba(93,64,55,.6)';
  X.font='bold 11px Fredoka';
  X.textAlign='center';
  X.fillText('Lv.'+hiveLevel,hx,hy+hh+16);
  // Next upgrade cost
  let nextCost=HIVE_COSTS[hiveLevel]||null;
  if(nextCost){
    X.fillStyle='rgba(93,64,55,.35)';
    X.font='9px Fredoka';
    X.fillText('Next: '+nextCost+' honey',hx,hy+hh+27);
  }
  // Skin name at high levels
  let sk=BEE_SKINS[Math.min(hiveLevel,BEE_SKINS.length-1)];
  if(hiveLevel>=9){
    X.fillStyle=sk.body;
    X.font='bold 10px Fredoka';
    X.fillText(sk.name,hx,hy-8);
  }

  // Honey production glow — hive pulses warm when converting pollen
  if(hivePollen>0){
    let t=performance.now()*0.003;
    let pulse=0.08+Math.sin(t)*0.05;
    let grad=X.createRadialGradient(hx,hy+hh/2,hw*0.2,hx,hy+hh/2,hw*1.2);
    grad.addColorStop(0,'rgba(255,180,0,'+pulse+')');
    grad.addColorStop(1,'rgba(255,180,0,0)');
    X.fillStyle=grad;
    X.fillRect(hx-hw*1.2,hy-hw*0.4,hw*2.4,hh+hw*0.8);
    // Honey drips from entrance
    for(let i=0;i<3;i++){
      let dripY=(t*20+i*33)%30;
      let dripAlpha=Math.max(0,1-dripY/30)*0.5;
      X.fillStyle='rgba(255,170,0,'+dripAlpha+')';
      X.beginPath();
      X.ellipse(hx+(i-1)*hw*0.08,hy+hh*0.85+dripY,2,3,0,0,Math.PI*2);
      X.fill();
    }
  }

  // Glow when bee is near with pollen
  let dx=bee.x-hx, dy=bee.y-(hy+hh/2);
  if(dx*dx+dy*dy<hw*hw*4&&bee.pollenCarried>0){
    let grad=X.createRadialGradient(hx,hy+hh/2,0,hx,hy+hh/2,hw);
    grad.addColorStop(0,'rgba(255,200,50,.15)');
    grad.addColorStop(1,'rgba(255,200,50,0)');
    X.fillStyle=grad;
    X.fillRect(hx-hw,hy-hw/2,hw*2,hh+hw);
  }
}

function drawBee(bx,by,angle,wingPhase,size,carried,max,skin){
  X.save();
  X.translate(bx,by);
  let facing=Math.cos(angle)<0?-1:1;
  X.scale(facing,1);
  let s=size||1;
  let sk=skin||BEE_SKINS[0];

  // Wings
  let wingA=Math.sin(wingPhase)*0.4;
  X.fillStyle=sk.wing;
  X.beginPath();
  X.ellipse(-2*s,-8*s+wingA*3,6*s,10*s,-.3+wingA,0,Math.PI*2);
  X.fill();
  X.beginPath();
  X.ellipse(4*s,-7*s-wingA*3,5*s,8*s,.3-wingA,0,Math.PI*2);
  X.fill();

  // Body
  X.fillStyle=sk.body;
  X.beginPath();
  X.ellipse(0,0,10*s,7*s,0,0,Math.PI*2);
  X.fill();

  // Stripes
  X.fillStyle=sk.stripe;
  for(let i=-1;i<=1;i++){
    X.fillRect(-3*s+i*6*s,-5*s,3*s,10*s);
  }

  // Head
  X.fillStyle=sk.stripe;
  X.beginPath();
  X.arc(10*s,0,5*s,0,Math.PI*2);
  X.fill();

  // Eyes
  X.fillStyle='#fff';
  X.beginPath();
  X.arc(12*s,-2*s,2*s,0,Math.PI*2);
  X.fill();
  X.fillStyle='#000';
  X.beginPath();
  X.arc(12.5*s,-2*s,1*s,0,Math.PI*2);
  X.fill();

  // Stinger
  X.fillStyle='#5d4037';
  X.beginPath();
  X.moveTo(-10*s,0);
  X.lineTo(-14*s,-1*s);
  X.lineTo(-14*s,1*s);
  X.closePath();
  X.fill();

  // Pollen bags
  if(carried>0){
    let fill=carried/max;
    X.fillStyle='rgba(255,200,50,'+(0.4+fill*0.6)+')';
    X.beginPath();
    X.arc(-4*s,6*s,3*s*fill+1,0,Math.PI*2);
    X.fill();
    X.beginPath();
    X.arc(4*s,6*s,3*s*fill+1,0,Math.PI*2);
    X.fill();
  }

  X.restore();
}

function drawParticles(){
  for(let p of particles){
    X.globalAlpha=p.life;
    X.fillStyle=p.color;
    X.beginPath();
    X.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    X.fill();
  }
  X.globalAlpha=1;
}

function updateHUD(){
  document.getElementById('hive-pollen-ct').textContent=hivePollen;
  let rateEl=document.getElementById('production-rate');
  if(hivePollen>0){
    let rate=((1+hiveLevel*0.5)*getQueenCount()).toFixed(1);
    rateEl.textContent='→🍯 '+rate+'/s';
  } else {
    rateEl.textContent='';
  }
  document.getElementById('honey-ct').textContent=honey;
  document.getElementById('hive-lv').textContent=hiveLevel;
  document.getElementById('queen-ct').textContent=getQueenCount();
  let aliveWorkers=helperBees.filter(h=>!h.dead).length;
  document.getElementById('bee-ct').textContent=aliveWorkers+'/'+getMaxWorkers();
}

function saveGame(){
  try{localStorage.setItem('beehive_save',JSON.stringify({
    pollen,honey,rareHoney,hivePollen,hiveLevel,
    helperCount:targetHelperCount
  }));}catch(e){}
}

let beeSpawnTimer=0, targetHelperCount=0;

function loadGame(){
  try{
    let s=JSON.parse(localStorage.getItem('beehive_save'));
    if(!s) return false;
    pollen=s.pollen||0;honey=s.honey||0;rareHoney=s.rareHoney||0;hivePollen=s.hivePollen||0;
    hiveLevel=s.hiveLevel||1;
    bee.maxPollen=5+hiveLevel*2;
    hive.w=80+hiveLevel*10;hive.h=60+hiveLevel*8;
    // Don't recreate all helpers instantly — spawn them over time (capped)
    targetHelperCount=Math.min(s.helperCount||0, getMaxWorkers());
    return true;
  }catch(e){return false;}
}

function spawnHelperOverTime(dt){
  // Hard cap: never exceed getMaxWorkers() bees in the array
  let maxBees=getMaxWorkers();
  if(targetHelperCount>maxBees) targetHelperCount=maxBees;
  // Prune excess bees from array
  while(helperBees.length>maxBees) helperBees.pop();
  if(helperBees.length>=targetHelperCount) return;
  beeSpawnTimer+=dt;
  let spawnDelay=2+Math.random()*3;
  if(beeSpawnTimer>=spawnDelay){
    beeSpawnTimer=0;
    let i=helperBees.length;
    helperBees.push({
      x:hive.x+(Math.random()-.5)*30,y:hive.y+hive.h,
      vx:0,vy:0,target:null,pollenCarried:0,rareCarried:0,
      maxPollen:2+hiveLevel,returning:false,wingPhase:Math.random()*10,angle:0,
      offsetX:Math.sin(i*2.3)*20,offsetY:Math.cos(i*1.7)*12,
      searchBias:i%5,speed:140+Math.random()*60,
      trips:0,dead:false,respawnTimer:0,skin:randomWorkerSkin()
    });
    for(let j=0;j<5;j++) spawnParticle(hive.x,hive.y+hive.h,'#ffc107','pollen');
  }
}

// Main loop
loadGame();
spawnFlowers();
let lastTime=performance.now();
let saveTimer=0;

function loop(now){
  let dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  updateWeather(dt);
  updateBee(dt);
  updateHelpers(dt);
  updateParticles(dt);
  regrowFlowers(dt);
  produceHoney(dt);
  spawnHelperOverTime(dt);

  // Reposition hive on resize
  hive.x=W/2;
  hive.y=H*0.18;

  // Draw
  drawSky();
  drawHive();
  for(let f of flowers) drawFlower(f);
  drawParticles();

  // Draw helpers with pollen indicators (skip dead ones)
  for(let h of helperBees){
    if(h.dead||h.resting) continue;
    drawBee(h.x,h.y,h.angle,h.wingPhase,0.7,h.pollenCarried,h.maxPollen,h.skin||randomWorkerSkin());
    if(h.pollenCarried>0){
      X.fillStyle='rgba(255,200,50,.7)';
      X.font='bold 9px Fredoka';
      X.textAlign='center';
      X.fillText(h.pollenCarried+'/'+h.maxPollen,h.x,h.y-14);
    }
  }

  // Draw player bee
  let playerSkin=BEE_SKINS[Math.min(hiveLevel,BEE_SKINS.length-1)];
  drawBee(bee.x,bee.y,bee.angle,bee.wingPhase,1,bee.pollenCarried,bee.maxPollen,playerSkin);

  // Pollen carried indicator near bee
  if(bee.pollenCarried>0){
    let visited=bee.visitedFlowers?bee.visitedFlowers.size:0;
    let mult=1+(visited-1)*0.5;
    X.fillStyle='rgba(255,200,50,.8)';
    X.font='bold 11px Fredoka';
    X.textAlign='center';
    let label=bee.pollenCarried+'/'+bee.maxPollen;
    if(visited>1) label+='  x'+mult.toFixed(2);
    X.fillText(label,bee.x,bee.y-18);
    if(visited>1){
      X.fillStyle='rgba(255,255,100,.6)';
      X.font='9px Fredoka';
      X.fillText(visited+' flowers',bee.x,bee.y-28);
    }
  }

  drawWeather();
  updateHUD();
  saveTimer+=dt;
  if(saveTimer>10){saveTimer=0;saveGame();}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
