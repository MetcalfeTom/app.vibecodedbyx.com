<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grub-Spin · spin for what to eat</title>
<meta name="description" content="Can't decide what to eat? Pick a mood, set a budget, spin the wheel. Done.">
<meta property="og:title" content="Grub-Spin">
<meta property="og:description" content="A spinning wheel of food, filtered by mood and budget. Stop arguing with your roommate.">
<meta property="og:url" content="https://sloppy.live/grub-spin">
<meta property="og:image" content="https://image.pollinations.ai/prompt/colorful%20spinning%20wheel%20of%20food%20with%20pizza%20tacos%20sushi%20burger%20slices%2C%20diner%20menu%20aesthetic%2C%20checkered%20tablecloth%20background%2C%20neon%20sign%20glow?width=1200&height=630&model=flux&nologo=true&seed=3434">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/🎡">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Space+Grotesk:wght@400;600;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --diner-red:    #d62b3a;
    --diner-red-2:  #9a1822;
    --diner-cream:  #fef3d8;
    --diner-cream-2:#f0e4c0;
    --diner-teal:   #2a8a8c;
    --diner-teal-2: #1a5a5c;
    --neon-pink:    #ff5cba;
    --neon-yellow:  #ffd84a;
    --ink:          #1d1410;
    --ink-2:        #3a2a20;
    --bone:         #fffaf0;
    --bone-2:       #e8dcc4;
    --paper:        #fbf3e0;
    --shadow:       rgba(29,20,16,0.35);
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{
    min-height: 100vh;
    background: var(--diner-red);
    color: var(--ink);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }
  body{
    font-family: 'Space Grotesk', system-ui, sans-serif;
    /* red & cream checker tablecloth */
    background:
      linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 60%),
      repeating-conic-gradient(
        var(--diner-red) 0deg 90deg,
        var(--diner-cream) 90deg 180deg
      ) 0 0 / 80px 80px;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  @media (max-width: 720px){
    body{ background-size: 56px 56px; }
  }
  .neon-bar{
    background: linear-gradient(180deg, #0c0a08 0%, #1a0e08 100%);
    color: var(--bone);
    border-bottom: 4px solid var(--ink);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap;
    box-shadow: 0 4px 0 var(--diner-red-2), 0 8px 24px rgba(0,0,0,0.4);
    position: sticky; top: 0; z-index: 10;
  }
  .neon-bar h1{
    font-family: 'Monoton', cursive;
    font-size: clamp(28px, 5vw, 42px);
    color: var(--neon-yellow);
    letter-spacing: 0.04em;
    line-height: 1;
    text-shadow:
      0 0 8px var(--neon-yellow),
      0 0 18px var(--neon-yellow),
      0 0 32px rgba(255,216,74,0.5),
      0 4px 0 rgba(0,0,0,0.5);
  }
  .neon-bar h1 em{
    color: var(--neon-pink);
    font-style: normal;
    text-shadow:
      0 0 8px var(--neon-pink),
      0 0 18px var(--neon-pink),
      0 0 32px rgba(255,92,186,0.5),
      0 4px 0 rgba(0,0,0,0.5);
  }
  .neon-bar .tagline{
    font: italic 14px 'Caveat', cursive;
    color: var(--bone-2);
    font-size: 18px;
    margin-left: 4px;
  }
  .neon-bar .grow{ flex: 1; }
  .neon-bar .btn{
    background: var(--neon-yellow);
    color: var(--ink);
    border: 0;
    padding: 7px 14px;
    font: 700 12px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 3px 0 #b89020;
    transition: transform 0.06s, box-shadow 0.06s;
  }
  .neon-bar .btn:hover{ background: #ffe277; }
  .neon-bar .btn:active{ transform: translateY(2px); box-shadow: 0 1px 0 #b89020; }

  .main{
    flex: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 28px;
    padding: 28px;
    align-items: start;
    max-width: 1320px;
    width: 100%;
    margin: 0 auto;
  }
  @media (max-width: 920px){
    .main{ grid-template-columns: 1fr; padding: 18px; gap: 18px; }
  }

  .panel{
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 10px;
    padding: 22px 22px 18px;
    box-shadow: 6px 6px 0 var(--ink);
    position: relative;
  }
  .panel::before{
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(29,20,16,0.4);
    border-radius: 7px;
    pointer-events: none;
  }
  .panel h2{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 24px;
    color: var(--diner-red);
    margin-bottom: 4px;
    line-height: 1;
  }
  .panel h2 + .lead{
    font: italic 14px 'Caveat', cursive;
    color: var(--ink-2);
    font-size: 16px;
    margin-bottom: 16px;
  }

  .filter-grp{
    margin-bottom: 18px;
  }
  .filter-grp .lbl{
    font: 700 10px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-2);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .filter-grp .lbl .ct{
    color: var(--diner-red);
    font-size: 11px;
    letter-spacing: 0.1em;
    background: rgba(214,43,58,0.1);
    padding: 1px 6px;
    border-radius: 3px;
  }
  .chips{ display: flex; flex-wrap: wrap; gap: 6px; }
  .chip{
    background: var(--bone);
    border: 2px solid var(--ink);
    padding: 5px 11px;
    font: 600 12px 'Space Grotesk', sans-serif;
    color: var(--ink);
    cursor: pointer;
    border-radius: 999px;
    display: flex; align-items: center; gap: 4px;
    transition: transform 0.06s, background 0.1s;
    box-shadow: 0 2px 0 var(--ink);
  }
  .chip .em{ font-size: 14px; }
  .chip:hover{ background: var(--diner-cream); transform: translateY(-1px); }
  .chip.on{
    background: var(--diner-red);
    color: var(--bone);
    border-color: var(--diner-red-2);
    box-shadow: 0 2px 0 var(--diner-red-2);
  }
  .chip.on.mood{ background: var(--diner-teal); border-color: var(--diner-teal-2); box-shadow: 0 2px 0 var(--diner-teal-2); }
  .chip.on.bud{ background: var(--ink); border-color: #000; box-shadow: 0 2px 0 #000; color: var(--neon-yellow); }

  .reset-row{
    display: flex; gap: 8px; margin-top: 4px;
  }
  .mini-btn{
    background: transparent;
    border: 1px dashed var(--ink-2);
    color: var(--ink-2);
    padding: 4px 10px;
    font: 600 10px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    border-radius: 4px;
  }
  .mini-btn:hover{ border-style: solid; color: var(--diner-red); }

  .wheel-pane{
    display: flex; flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .wheel-wrap{
    position: relative;
    width: min(560px, 92vw);
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
  }
  #wheel{
    width: 100%; height: 100%;
    display: block;
    filter: drop-shadow(0 12px 0 rgba(0,0,0,0.25)) drop-shadow(0 16px 28px rgba(0,0,0,0.4));
  }
  .pointer{
    position: absolute;
    top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 22px solid transparent;
    border-right: 22px solid transparent;
    border-top: 40px solid var(--ink);
    filter: drop-shadow(0 -2px 0 var(--neon-yellow));
    z-index: 3;
  }
  .pointer::after{
    content: '';
    position: absolute;
    top: -42px; left: -10px;
    width: 20px; height: 20px;
    background: var(--neon-yellow);
    border: 3px solid var(--ink);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--neon-yellow);
  }
  .hub{
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 22%; height: 22%;
    background: radial-gradient(circle, var(--neon-yellow) 0%, var(--diner-red) 80%);
    border: 4px solid var(--ink);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Monoton', cursive;
    font-size: clamp(18px, 3vw, 28px);
    color: var(--ink);
    text-shadow: 0 0 8px var(--neon-yellow);
    cursor: pointer;
    z-index: 2;
    box-shadow: inset 0 4px 8px rgba(255,255,255,0.4), inset 0 -6px 12px rgba(0,0,0,0.3), 0 0 30px rgba(255,216,74,0.4);
    transition: transform 0.08s;
    pointer-events: auto;
  }
  .hub:active{ transform: translate(-50%, -50%) scale(0.94); }
  .hub.spinning{ pointer-events: none; opacity: 0.7; }
  .hub.disabled{ background: radial-gradient(circle, #aaa 0%, #555 80%); cursor: not-allowed; }

  .btn-row{
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .big-btn{
    background: var(--neon-yellow);
    color: var(--ink);
    border: 3px solid var(--ink);
    padding: 12px 32px;
    font: 700 16px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 8px;
    box-shadow: 0 5px 0 var(--ink);
    transition: transform 0.07s, box-shadow 0.07s, background 0.1s;
  }
  .big-btn:hover{ background: #ffe277; }
  .big-btn:active{ transform: translateY(3px); box-shadow: 0 2px 0 var(--ink); }
  .big-btn:disabled{ background: #ccc; cursor: not-allowed; box-shadow: 0 3px 0 #999; }
  .big-btn.pink{ background: var(--neon-pink); color: var(--bone); }
  .big-btn.pink:hover{ background: #ff7fc8; }

  .pool-count{
    background: var(--bone);
    border: 2px solid var(--ink);
    border-radius: 999px;
    padding: 6px 16px;
    font: 700 13px 'Space Grotesk', sans-serif;
    color: var(--ink);
    box-shadow: 0 2px 0 var(--ink);
  }
  .pool-count.warn{ background: var(--diner-red); color: var(--bone); border-color: var(--diner-red-2); box-shadow: 0 2px 0 var(--diner-red-2); }

  /* Result overlay */
  .result{
    position: fixed;
    inset: 0;
    background: rgba(20, 12, 8, 0.78);
    display: none;
    align-items: center; justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .result.show{ display: flex; animation: fadein 0.3s ease-out; }
  @keyframes fadein{ from{ opacity: 0; } to{ opacity: 1; } }
  .result-card{
    background: var(--paper);
    border: 4px solid var(--ink);
    border-radius: 18px;
    padding: 32px 36px 28px;
    box-shadow: 8px 8px 0 var(--diner-red), 8px 8px 0 4px var(--ink);
    text-align: center;
    max-width: 460px;
    position: relative;
    animation: cardpop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes cardpop{
    0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .result-card .stamp{
    font: 700 10px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    color: var(--diner-red);
    margin-bottom: 8px;
  }
  .result-card .pick-em{
    font-size: clamp(64px, 13vw, 96px);
    line-height: 1;
    margin-bottom: 4px;
    filter: drop-shadow(0 6px 0 rgba(0,0,0,0.18));
  }
  .result-card .pick-name{
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(28px, 5vw, 38px);
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1.1;
  }
  .result-card .pick-tags{
    display: flex; justify-content: center; gap: 6px; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .result-card .pick-tags .tg{
    font: 700 10px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    background: var(--bone-2);
    color: var(--ink);
    padding: 3px 9px;
    border-radius: 999px;
  }
  .result-card .pick-tags .tg.b{ background: var(--ink); color: var(--neon-yellow); }
  .result-card .pick-tags .tg.m{ background: var(--diner-teal); color: var(--bone); }
  .result-card .pick-blurb{
    font: italic 16px 'Caveat', cursive;
    font-size: 22px;
    color: var(--ink-2);
    margin: 8px 0 18px;
    line-height: 1.35;
  }
  .result-card .actions{
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
  }
  .result-card .btn-sm{
    border: 2px solid var(--ink);
    background: var(--bone);
    color: var(--ink);
    padding: 8px 18px;
    font: 700 12px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    border-radius: 6px;
    box-shadow: 0 3px 0 var(--ink);
  }
  .result-card .btn-sm:hover{ background: var(--diner-cream); }
  .result-card .btn-sm.primary{ background: var(--diner-red); color: var(--bone); }
  .result-card .btn-sm.primary:hover{ background: #ef3a4a; }

  /* Quiz CTA button (in filter panel) */
  .quiz-btn{
    width: 100%;
    margin-top: 14px;
    background: linear-gradient(135deg, var(--diner-teal) 0%, var(--diner-teal-2) 100%);
    color: var(--bone);
    border: 3px solid var(--ink);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--ink);
    display: flex; align-items: center; gap: 12px;
    text-align: left;
    transition: transform 0.07s, box-shadow 0.07s;
    font-family: inherit;
  }
  .quiz-btn:hover{ background: linear-gradient(135deg, #3aa6a8 0%, var(--diner-teal) 100%); }
  .quiz-btn:active{ transform: translateY(2px); box-shadow: 0 2px 0 var(--ink); }
  .quiz-btn .quiz-em{
    font-size: 26px;
    filter: drop-shadow(0 2px 0 rgba(0,0,0,0.3));
  }
  .quiz-btn .quiz-txt{ flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .quiz-btn .quiz-title{
    font: 900 14px 'Fraunces', serif;
    font-style: italic;
    letter-spacing: 0.01em;
    line-height: 1.1;
  }
  .quiz-btn .quiz-sub{
    font: 600 10px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: rgba(255,250,240,0.78);
  }
  .quiz-btn .quiz-arrow{
    font: 700 22px 'Space Grotesk', sans-serif;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-yellow);
  }

  /* Quiz overlay */
  .quiz-overlay{
    position: fixed; inset: 0;
    background: rgba(20,12,8,0.86);
    display: none;
    align-items: center; justify-content: center;
    z-index: 60;
    padding: 18px;
  }
  .quiz-overlay.show{ display: flex; animation: fadein 0.25s ease-out; }
  .quiz-card{
    background: var(--paper);
    border: 4px solid var(--ink);
    border-radius: 16px;
    padding: 26px 28px 22px;
    box-shadow: 8px 8px 0 var(--diner-teal), 8px 8px 0 4px var(--ink);
    max-width: 520px;
    width: 100%;
    text-align: center;
    position: relative;
  }
  .quiz-card .progress{
    display: flex; gap: 5px;
    justify-content: center;
    margin-bottom: 14px;
  }
  .quiz-card .progress .dot{
    width: 12px; height: 12px;
    background: var(--bone-2);
    border: 2px solid var(--ink-2);
    border-radius: 50%;
    transition: background 0.2s, transform 0.2s;
  }
  .quiz-card .progress .dot.done{ background: var(--diner-teal); border-color: var(--diner-teal-2); }
  .quiz-card .progress .dot.cur{ background: var(--neon-yellow); border-color: var(--ink); transform: scale(1.35); box-shadow: 0 0 10px var(--neon-yellow); }
  .quiz-card .q-num{
    font: 700 10px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--ink-2);
    margin-bottom: 4px;
  }
  .quiz-card .q-text{
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-style: italic;
    font-size: clamp(22px, 4vw, 28px);
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 18px;
  }
  .quiz-card .options{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 480px){ .quiz-card .options{ grid-template-columns: 1fr; } }
  .quiz-card .opt{
    background: var(--bone);
    border: 2px solid var(--ink);
    border-radius: 10px;
    padding: 14px 12px;
    text-align: left;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--ink);
    transition: transform 0.07s, box-shadow 0.07s, background 0.1s;
    display: flex; gap: 10px; align-items: flex-start;
    font-family: inherit;
    color: var(--ink);
  }
  .quiz-card .opt:hover{ background: var(--diner-cream); transform: translateY(-1px); }
  .quiz-card .opt:active{ transform: translateY(2px); box-shadow: 0 1px 0 var(--ink); }
  .quiz-card .opt .opt-em{ font-size: 26px; line-height: 1; }
  .quiz-card .opt .opt-text{ flex: 1; }
  .quiz-card .opt .opt-title{
    font: 700 14px 'Space Grotesk', sans-serif;
    line-height: 1.2;
    margin-bottom: 3px;
  }
  .quiz-card .opt .opt-flavor{
    font: italic 13px 'Caveat', cursive;
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.2;
  }
  .quiz-card .controls{
    display: flex; justify-content: space-between; margin-top: 16px;
    align-items: center;
  }
  .quiz-card .controls .mini-btn{
    background: transparent;
    border: 1px dashed var(--ink-2);
  }
  .quiz-card .controls .mini-btn:hover{ border-style: solid; color: var(--diner-red); }
  /* Quiz result step */
  .quiz-card.result-mode .verdict{
    display: block;
  }
  .quiz-card .verdict{
    display: none;
    margin-top: 8px;
  }
  .quiz-card .verdict .v-em{
    font-size: 64px;
    line-height: 1;
    filter: drop-shadow(0 4px 0 rgba(0,0,0,0.18));
    margin-bottom: 4px;
  }
  .quiz-card .verdict .v-summary{
    font: italic 18px 'Caveat', cursive;
    font-size: 22px;
    color: var(--ink-2);
    margin-bottom: 14px;
    line-height: 1.3;
  }
  .quiz-card .verdict .v-applied{
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    margin-bottom: 16px;
  }
  .quiz-card .verdict .v-applied .tg{
    background: var(--diner-teal);
    color: var(--bone);
    padding: 4px 10px;
    border-radius: 999px;
    font: 700 11px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex; align-items: center; gap: 4px;
  }
  .quiz-card .verdict .v-applied .tg.b{ background: var(--ink); color: var(--neon-yellow); }
  .quiz-card .verdict .v-pool{
    font: 600 12px 'Space Grotesk', sans-serif;
    color: var(--ink-2);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 14px;
  }
  .quiz-card .verdict .v-pool b{
    color: var(--diner-red);
    font-size: 16px;
  }
  .quiz-card .verdict .v-actions{
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
  }
  .quiz-card .verdict .v-actions .btn-sm{
    border: 2px solid var(--ink);
    background: var(--bone);
    color: var(--ink);
    padding: 9px 18px;
    font: 700 12px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    border-radius: 6px;
    box-shadow: 0 3px 0 var(--ink);
  }
  .quiz-card .verdict .v-actions .btn-sm:hover{ background: var(--diner-cream); }
  .quiz-card .verdict .v-actions .btn-sm.primary{ background: var(--neon-yellow); }
  .quiz-card .verdict .v-actions .btn-sm.primary:hover{ background: #ffe277; }
  .quiz-card.result-mode .q-num,
  .quiz-card.result-mode .q-text,
  .quiz-card.result-mode .options,
  .quiz-card.result-mode .controls{ display: none; }

  .history{
    margin-top: 12px;
  }
  .history h3{
    font: 700 10px 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.24em;
    color: var(--ink-2);
    margin-bottom: 8px;
  }
  .history .items{
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .history .hi{

  { name: 'Tasting Menu',        em: '🍽️', moods: ['date_night','indulgent','adventurous'],     budget: 'splurge', diets: ['meat'],               blurb: "11 courses. 3 hours. Wear the nice shirt." },
  { name: 'Cereal',              em: '🥣', moods: ['quick','hangover'],                          budget: 'cheap',   diets: ['veg'],                blurb: "It's 11pm. Cinnamon Toast Crunch is dinner now." },
  { name: 'Spaghetti Aglio',     em: '🍝', moods: ['quick','cozy'],                              budget: 'cheap',   diets: ['vegan'],              blurb: "Garlic, olive oil, chili flakes, parsley. Four ingredients." },

/* ── State ─────────────────────────────────────────── */
const state = {
  mood: new Set(),
  budget: new Set(),
  diet: new Set(),
  pool: [],
  rotation: 0,        // current wheel rotation in radians
  spinning: false,
  spinV: 0,
  history: [],        // last 8 picks
  spinAng: 0,
  lastPick: null,
  muted: false,
};

const HIST_KEY = 'grub-spin-history-v1';
try {
  const raw = localStorage.getItem(HIST_KEY);
  if (raw) state.history = JSON.parse(raw).slice(0, 8);
} catch(_){}

/* ── Filter chip wiring ────────────────────────────── */
function renderChips(grpEl, dict, set, classExtra){
  let html = '';
  for (const k of Object.keys(dict)){
    const d = dict[k];
    const on = set.has(k);
    html += '<button class="chip ' + (on ? ('on ' + classExtra) : '')
      + '" data-k="' + k + '" type="button">'
      + '<span class="em">' + d.em + '</span>'
      + '<span>' + d.name + '</span>'
      + '</button>';
  }
  grpEl.innerHTML = html;
  grpEl.querySelectorAll('.chip').forEach(b => {
    b.addEventListener('click', () => {
      const k = b.dataset.k;
      if (set.has(k)) set.delete(k); else set.add(k);
      refilterAndDraw();
    });
  });
}
function refreshChipState(grpEl, dict, set, classExtra){
  grpEl.querySelectorAll('.chip').forEach(b => {
    const on = set.has(b.dataset.k);
    b.classList.toggle('on', on);
    b.classList.toggle(classExtra, on);
    // remove other state classes
    ['mood','bud'].forEach(c => { if (c !== classExtra) b.classList.remove(c); });
  });
}

function refilterAndDraw(){
  state.pool = FOODS.filter(f => {
    // mood: match if any food.moods is in selected (OR), if none selected → all pass
    if (state.mood.size > 0 && ![...state.mood].some(m => f.moods.includes(m))) return false;
    // budget: must be one of selected (OR), if none → all pass
    if (state.budget.size > 0 && !state.budget.has(f.budget)) return false;
    // diet: all selected must be in f.diets (AND-subset)
    if (state.diet.size > 0){
      for (const d of state.diet) if (!f.diets.includes(d)) return false;
    }
    return true;
  });
  refreshChipState(document.getElementById('mood-chips'), MOODS, state.mood, 'mood');
  refreshChipState(document.getElementById('bud-chips'), BUDGETS, state.budget, 'bud');
  refreshChipState(document.getElementById('diet-chips'), DIETS, state.diet, '');
  document.getElementById('mood-ct').textContent = state.mood.size ? (state.mood.size + ' on') : 'any';
  document.getElementById('bud-ct').textContent = state.budget.size ? (state.budget.size + ' on') : 'any';
  document.getElementById('diet-ct').textContent = state.diet.size ? (state.diet.size + ' on') : 'any';
  const pc = document.getElementById('pool-count');
  if (state.pool.length === 0){
    pc.textContent = '0 foods — loosen up the filters';
    pc.classList.add('warn');
    document.getElementById('btn-spin').disabled = true;
    document.getElementById('btn-quick').disabled = true;
    document.getElementById('hub').classList.add('disabled');
  } else {
    pc.textContent = state.pool.length + (state.pool.length === 1 ? ' food in the pool' : ' foods in the pool');
    pc.classList.remove('warn');
    document.getElementById('btn-spin').disabled = false;
    document.getElementById('btn-quick').disabled = false;
    document.getElementById('hub').classList.remove('disabled');
  }
  drawWheel();
}

/* ── Wheel rendering ───────────────────────────────── */
const cv = document.getElementById('wheel');
const ctx = cv.getContext('2d');
let WHEEL_SIZE = 560;
function fit(){
  const dpr = window.devicePixelRatio || 1;
  const r = cv.getBoundingClientRect();
  WHEEL_SIZE = Math.floor(r.width);
  cv.width = Math.floor(WHEEL_SIZE * dpr);
  cv.height = Math.floor(WHEEL_SIZE * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawWheel();
}
window.addEventListener('resize', fit);

const SLICE_COLORS = [
  '#ef5252','#f5a330','#f5c842','#7fbe4a','#3aaeae','#5a8ad8','#9568cc','#e066b8',
  '#d63a4a','#e8943a','#dbb83a','#6aab3a','#2a9090','#4a72bc','#7a4ab8','#c84a9c',
];

function drawWheel(){
  const W = WHEEL_SIZE, H = WHEEL_SIZE;
  const cx = W / 2, cy = H / 2;
  const R = W / 2 - 6;
  ctx.clearRect(0, 0, W, H);
  // outer dark rim
  ctx.fillStyle = '#1d1410';
  ctx.beginPath(); ctx.arc(cx, cy, R + 6, 0, Math.PI * 2); ctx.fill();
  // light ring
  ctx.fillStyle = '#fbf3e0';
  ctx.beginPath(); ctx.arc(cx, cy, R + 3, 0, Math.PI * 2); ctx.fill();
  // bulbs around the rim (carnival style)
  const bulbCount = 24;
  for (let i = 0; i < bulbCount; i++){
    const a = (i / bulbCount) * Math.PI * 2;
    const bx = cx + Math.cos(a) * (R + 0.5);
    const by = cy + Math.sin(a) * (R + 0.5);
    const lit = (Math.floor(performance.now() / 250) + i) % 2 === 0;
    ctx.fillStyle = lit ? '#ffd84a' : '#a8881a';
    ctx.beginPath(); ctx.arc(bx, by, 5, 0, Math.PI * 2); ctx.fill();
    if (lit){
      const g = ctx.createRadialGradient(bx, by, 0, bx, by, 12);
      g.addColorStop(0, 'rgba(255,216,74,0.45)');
      g.addColorStop(1, 'rgba(255,216,74,0)');
      ctx.fillStyle = g;
      ctx.fillRect(bx - 14, by - 14, 28, 28);
    }
  }
  // slices
  const N = Math.max(1, state.pool.length);
  const slice = (Math.PI * 2) / N;
  if (state.pool.length === 0){
    ctx.fillStyle = '#3a2a20';
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fbf3e0';
    ctx.font = 'italic 600 16px Caveat, cursive';
    ctx.textAlign = 'center';
    ctx.fillText("empty pool", cx, cy - 4);
    ctx.fillText("loosen up the filters", cx, cy + 18);
    return;
  }
  // wheel rotation — sliced from -PI/2 (top) for pointer alignment
  for (let i = 0; i < N; i++){
    const a0 = state.rotation + i * slice - Math.PI / 2;
    const a1 = a0 + slice;
    const col = SLICE_COLORS[i % SLICE_COLORS.length];
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, a0, a1);
    ctx.closePath();
    ctx.fillStyle = col;
    ctx.fill();
    // divider line
    ctx.strokeStyle = 'rgba(29,20,16,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // label
    const mid = a0 + slice / 2;
    const food = state.pool[i];
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(mid);
    // emoji (further out)
    ctx.font = (Math.min(28, R * 0.13)) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(food.em, R * 0.78, 0);
    // name (closer in, sized to fit slice)
    ctx.fillStyle = pickReadable(col);
    const labelFontSize = Math.max(9, Math.min(14, slice * R * 0.16));
    ctx.font = '700 ' + labelFontSize + 'px "Space Grotesk", sans-serif';
    ctx.textBaseline = 'middle';
    // truncate if needed
    const maxLabelW = R * 0.55;
    let label = food.name;
    if (ctx.measureText(label).width > maxLabelW){
      while (label.length > 6 && ctx.measureText(label + '…').width > maxLabelW) label = label.slice(0, -1);
      label = label + '…';
    }
    ctx.fillText(label, R * 0.4, 0);
    ctx.restore();
  }
  // inner ring
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.22, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(29,20,16,0.4)';
  ctx.lineWidth = 1;
  ctx.stroke();
}
function pickReadable(hex){
  // crude luminance check
  const m = hex.match(/[0-9a-f]{2}/gi);
  if (!m) return '#fff';
  const [r,g,b] = m.map(x => parseInt(x, 16));
  const lum = (0.299*r + 0.587*g + 0.114*b);
  return lum > 150 ? '#1d1410' : '#fffaf0';
}

/* ── Spinning ──────────────────────────────────────── */
function spin(){
  if (state.spinning || state.pool.length === 0) return;
  state.spinning = true;
  document.getElementById('hub').classList.add('spinning');
  document.getElementById('btn-spin').disabled = true;
  document.getElementById('btn-quick').disabled = true;
  // pick winner index first, then spin to land there with extra full rotations
  const winner = Math.floor(Math.random() * state.pool.length);
  const slice = (Math.PI * 2) / state.pool.length;
  const fullRotations = 4 + Math.floor(Math.random() * 3); // 4-6 full
  // target rotation: such that slice[winner] is centered at the top (-PI/2)
  // current top = rotation + i*slice - PI/2 + slice/2 == -PI/2 ⇒ rotation + i*slice + slice/2 == 0
  // so finalRotation ≡ -(i*slice + slice/2) (mod 2π)
  const baseFinal = -(winner * slice + slice / 2);
  // wrap so we always spin forward (positive) past the current rotation
  const cur = state.rotation % (Math.PI * 2);
  let final = baseFinal;
  while (final < cur + 0.01) final += Math.PI * 2;
  final += fullRotations * Math.PI * 2;
  // add a tiny jitter so it doesn't land dead center
  final += (Math.random() - 0.5) * slice * 0.6;
  // animate with ease-out cubic
  const startRot = state.rotation;
  const totalDelta = final - startRot;
  const duration = 4200 + Math.random() * 900;
  const t0 = performance.now();
  let lastTickI = -1;
  sndStart();
  function tick(now){
    const elapsed = now - t0;
    if (elapsed >= duration){
      state.rotation = final;
      state.spinning = false;
      document.getElementById('hub').classList.remove('spinning');
      document.getElementById('btn-spin').disabled = false;
      document.getElementById('btn-quick').disabled = false;
      showResult(state.pool[winner]);
      sndDing();
      return;
    }
    const u = elapsed / duration;
    const ease = 1 - Math.pow(1 - u, 3);
    state.rotation = startRot + totalDelta * ease;
    drawWheel();
    // tick-tock sound as the pointer crosses slices
    const pointerSlot = pointerSliceIndex();
    if (pointerSlot !== lastTickI){
      lastTickI = pointerSlot;
      sndTick(1 - u);
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function pointerSliceIndex(){
  const N = state.pool.length; if (!N) return -1;
  const slice = (Math.PI * 2) / N;
  // pointer is at angle -PI/2; food i center is at rotation + i*slice + slice/2 - PI/2
  // index whose slice contains -PI/2: solve i = ((-PI/2 - rotation + PI/2) / slice) mod N
  // simplify: i = floor(((-rotation) mod 2π) / slice)
  let a = (-state.rotation) % (Math.PI * 2);
  if (a < 0) a += Math.PI * 2;
  return Math.floor(a / slice) % N;
}

document.getElementById('btn-spin').addEventListener('click', spin);

/* ── Sound ─────────────────────────────────────────── */
let actx = null;
function ensureAudio(){
  if (actx) return actx;
  try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){}
  return actx;
}
function tone(freq, dur, type, gain, atk){
  if (state.muted) return;
  const a = ensureAudio(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, a.currentTime);
  g.gain.linearRampToValueAtTime(gain || 0.12, a.currentTime + (atk || 0.005));
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
  o.connect(g).connect(a.destination);
  o.start(); o.stop(a.currentTime + dur + 0.04);
}
function sndTick(strength){
  // little click that gets softer as wheel slows
  tone(1400, 0.03, 'square', 0.04 + strength * 0.06);
}
function sndStart(){
  // whoosh
  tone(220, 0.12, 'sawtooth', 0.08);
  setTimeout(() => tone(440, 0.12, 'sawtooth', 0.06), 60);
}
function sndDing(){
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.22, 'triangle', 0.16), i * 70));
}
document.getElementById('btn-mute').addEventListener('click', e => {
  state.muted = !state.muted;
  e.currentTarget.textContent = state.muted ? '🔇 OFF' : '🔊 SFX';
});

/* ── Psychological quiz ────────────────────────────── */
/* 5-question read on mood + energy + wallet → maps to weighted mood + budget filters.
   Answers are NOT direct mappings — they nudge weights. The strongest 1-2 moods
   and the highest-scoring budget get applied. Diets are left alone (personal). */
const QUIZ = [
  { q: "What kind of day has it been?",
    opts: [
      { em:'😩', t:'A long one',         f:'survived',           mood:{comfort:3, hangover:1, cozy:2} },
      { em:'😎', t:'Great, actually',    f:'feeling myself',     mood:{date_night:3, adventurous:2, healthy:1}, bud:{splurge:2, medium:1} },
      { em:'😐', t:'Just a day',         f:'fine, whatever',     mood:{quick:3, comfort:1}, bud:{cheap:2, medium:1} },
      { em:'💀', t:'Cursed',             f:"don't ask",          mood:{hangover:3, indulgent:2, comfort:1}, bud:{cheap:1} },
    ] },
  { q: "How much energy do you have for cooking?",
    opts: [
      { em:'🔥', t:'I could make a roast', f:'apron is on',      mood:{date_night:1, cozy:2, adventurous:1}, bud:{splurge:1, medium:1} },
      { em:'🧂', t:'Toast level',           f:"that's the cap",  mood:{quick:3, comfort:1, cozy:1} },
      { em:'📞', t:'Phone-only',            f:"someone else cooks", mood:{indulgent:2, comfort:1}, bud:{medium:1, splurge:1} },
      { em:'🛏️', t:'I am in bed',          f:'delivery please', mood:{indulgent:2, comfort:2, hangover:1}, bud:{medium:1} },
    ] },
  { q: "Pick the strongest feeling right now.",
    opts: [
      { em:'🤗', t:'Need a hug',           f:'in food form',     mood:{comfort:3, cozy:3, indulgent:1} },
      { em:'🌶️', t:'I want a fight',        f:'with my mouth',   mood:{adventurous:3, indulgent:1}, bud:{medium:1, splurge:1} },
      { em:'🌱', t:'Trying to be good',     f:'this week',       mood:{healthy:3, quick:1}, bud:{medium:1} },
      { em:'🍷', t:'Romantic / showy',      f:'I look great',    mood:{date_night:3, indulgent:2}, bud:{splurge:3, medium:1} },
    ] },
  { q: "Wallet check — how flush are we?",
    opts: [
      { em:'💸', t:'Loaded',               f:"treat-yourself day", bud:{splurge:5, medium:1}, mood:{date_night:1, indulgent:1} },
      { em:'💵', t:'Normal',               f:'mid week, mid mood', bud:{medium:5, cheap:1, splurge:1} },
      { em:'🪙', t:'Tight',                f:'rent was today',     bud:{cheap:5, medium:1}, mood:{comfort:1, quick:1} },
      { em:'🪺', t:"Don't even ask",       f:'pantry mode',        bud:{cheap:6}, mood:{quick:2, comfort:1} },
    ] },
  { q: "Be honest. How hungry are you?",
    opts: [
      { em:'🦖', t:'STARVING',             f:'feed me NOW',       mood:{indulgent:3, comfort:1, hangover:1} },
      { em:'😋', t:'Properly hungry',      f:'a real meal',       mood:{date_night:1, adventurous:1, comfort:1, cozy:1} },
      { em:'🤏', t:'Peckish',              f:'a small thing',     mood:{quick:3, healthy:1} },
      { em:'🥱', t:"Not really",           f:'but it is time',    mood:{healthy:2, cozy:2, quick:1} },
    ] },
];

const quiz = {
  step: 0,
  picks: [],          // option index per step
  weights: { mood: {}, bud: {} },
  active: false,
};

function openQuiz(){
  quiz.step = 0;
  quiz.picks = [];
  quiz.weights = { mood: {}, bud: {} };
  quiz.active = true;
  document.getElementById('quiz-card').classList.remove('result-mode');
  document.getElementById('quiz-overlay').classList.add('show');
  document.getElementById('quiz-overlay').setAttribute('aria-hidden', 'false');
  renderQuizStep();
}
function closeQuiz(){
  quiz.active = false;
  document.getElementById('quiz-overlay').classList.remove('show');
  document.getElementById('quiz-overlay').setAttribute('aria-hidden', 'true');
}
function renderQuizStep(){
  const q = QUIZ[quiz.step];
  document.getElementById('q-num').textContent = 'Question ' + (quiz.step + 1) + ' of ' + QUIZ.length;
  document.getElementById('q-text').textContent = q.q;
  const opts = document.getElementById('q-options');
  opts.innerHTML = q.opts.map((o, i) =>
    '<button class="opt" data-i="' + i + '" type="button">'
    + '<span class="opt-em">' + o.em + '</span>'
    + '<span class="opt-text">'
    +   '<span class="opt-title">' + o.t + '</span>'
    +   '<span class="opt-flavor">' + o.f + '</span>'
    + '</span>'
    + '</button>'
  ).join('');
  opts.querySelectorAll('.opt').forEach(b => {
    b.addEventListener('click', () => pickQuiz(parseInt(b.dataset.i)));
  });
  // progress dots
  const prog = document.getElementById('q-progress');
  prog.innerHTML = QUIZ.map((_, i) =>
    '<div class="dot ' + (i < quiz.step ? 'done' : (i === quiz.step ? 'cur' : '')) + '"></div>'
  ).join('');
  // back button visibility
  const back = document.getElementById('q-back');
  back.style.visibility = quiz.step > 0 ? 'visible' : 'hidden';
}
function pickQuiz(i){
  const q = QUIZ[quiz.step];
  const opt = q.opts[i];
  // remove any prior pick at this step (in case user went back)
  if (quiz.picks.length > quiz.step) quiz.picks = quiz.picks.slice(0, quiz.step);
  quiz.picks[quiz.step] = i;
  // accumulate weights from THIS pick + reapply all picks (cleaner if user went back)
  quiz.weights = { mood: {}, bud: {} };
  for (let s = 0; s <= quiz.step; s++){
    const o = QUIZ[s].opts[quiz.picks[s]];
    if (o.mood) for (const m in o.mood) quiz.weights.mood[m] = (quiz.weights.mood[m] || 0) + o.mood[m];
    if (o.bud)  for (const b in o.bud)  quiz.weights.bud[b]  = (quiz.weights.bud[b]  || 0) + o.bud[b];
  }
  if (quiz.step + 1 < QUIZ.length){
    quiz.step++;
    renderQuizStep();
  } else {
    showQuizVerdict();
  }
}
function backQuiz(){
  if (quiz.step > 0){ quiz.step--; renderQuizStep(); }
}
function showQuizVerdict(){
  // pick top moods + top budget from weights
  const moodSorted = Object.keys(quiz.weights.mood).sort((a, b) => quiz.weights.mood[b] - quiz.weights.mood[a]);
  const budSorted = Object.keys(quiz.weights.bud).sort((a, b) => quiz.weights.bud[b] - quiz.weights.bud[a]);
  // take top 2 moods (only those within 60% of top score)
  const topMoodScore = quiz.weights.mood[moodSorted[0]] || 0;
  const chosenMoods = moodSorted.filter(m => quiz.weights.mood[m] >= topMoodScore * 0.6).slice(0, 2);
  const chosenBuds = budSorted.length ? [budSorted[0]] : [];
  // apply to state — REPLACE mood and budget filters; leave diet alone
  state.mood.clear();
  state.budget.clear();
  chosenMoods.forEach(m => state.mood.add(m));
  chosenBuds.forEach(b => state.budget.add(b));
  refilterAndDraw();
  // craft a summary line
  const summaries = [
    'reading the room: you want',
    "what you actually need is",
    "the algorithm has spoken — it's",
    'verdict: today is for',
    "diagnosis: a craving for",
  ];
  const summary = summaries[Math.floor(Math.random() * summaries.length)];
  const moodNames = chosenMoods.map(m => MOODS[m].name.toLowerCase()).join(' & ');
  const budName = chosenBuds.length ? BUDGETS[chosenBuds[0]].name : '';
  document.getElementById('v-em').textContent = chosenMoods[0] ? MOODS[chosenMoods[0]].em : '🍴';
  document.getElementById('v-summary').textContent = summary + ' ' + (moodNames || 'food') + (budName ? ' at ' + budName : '') + '.';
  let appliedHtml = '';
  for (const m of chosenMoods){
    appliedHtml += '<span class="tg">' + MOODS[m].em + ' ' + MOODS[m].name + '</span>';
  }
  for (const b of chosenBuds){
    appliedHtml += '<span class="tg b">' + BUDGETS[b].em + ' ' + BUDGETS[b].name + '</span>';
  }
  document.getElementById('v-applied').innerHTML = appliedHtml;
  document.getElementById('v-pool').innerHTML = 'narrows your wheel to <b>' + state.pool.length + '</b> ' + (state.pool.length === 1 ? 'food' : 'foods');
  // switch to verdict mode
  document.getElementById('quiz-card').classList.add('result-mode');
  // fill progress dots all done
  const prog = document.getElementById('q-progress');
  prog.innerHTML = QUIZ.map(() => '<div class="dot done"></div>').join('');
}

document.getElementById('btn-quiz').addEventListener('click', openQuiz);
document.getElementById('q-close').addEventListener('click', closeQuiz);
document.getElementById('q-back').addEventListener('click', backQuiz);
document.getElementById('quiz-overlay').addEventListener('click', e => {
  if (e.target.id === 'quiz-overlay') closeQuiz();
});
document.getElementById('v-spin').addEventListener('click', () => {
  closeQuiz();
  if (state.pool.length > 0) setTimeout(spin, 250);
});
document.getElementById('v-keep').addEventListener('click', closeQuiz);
document.getElementById('v-retry').addEventListener('click', () => {
  document.getElementById('quiz-card').classList.remove('result-mode');
  openQuiz();
});

/* ── Boot ──────────────────────────────────────────── */
renderChips(document.getElementById('mood-chips'), MOODS, state.mood, 'mood');
renderChips(document.getElementById('bud-chips'), BUDGETS, state.budget, 'bud');
renderChips(document.getElementById('diet-chips'), DIETS, state.diet, '');
refilterAndDraw();
renderHistory();
fit();
// idle redraw (only for bulb flicker)
let _lastBulbT = 0;
function idleAnim(now){
  if (!state.spinning && now - _lastBulbT > 250){
    _lastBulbT = now;
    drawWheel();
  }
  requestAnimationFrame(idleAnim);
}
requestAnimationFrame(idleAnim);
