<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Meditation Garden</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪷">
<meta property="og:title" content="Meditation Garden">
<meta property="og:description" content="Glowing stones, calming ripples, and soft light. Breathe.">
<meta property="og:url" content="https://sloppy.live/meditation-garden">
<meta property="og:image" content="https://emojicdn.elk.sh/🪷?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;overflow:hidden;background:#060810}
canvas{display:block;width:100%;height:100%;touch-action:none}

#breath{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:1.4rem;color:rgba(160,220,255,0);
  letter-spacing:6px;pointer-events:none;z-index:2;
  transition:color 3s;text-align:center;
}
#breath.show{color:rgba(160,220,255,0.12)}

#ui{position:fixed;top:12px;right:12px;display:flex;flex-direction:column;gap:6px;z-index:10}
#ui button{
  font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:2px;
  border:1px solid rgba(160,220,255,0.1);background:rgba(0,0,0,0.3);
  color:rgba(160,220,255,0.25);padding:5px 12px;border-radius:20px;
  cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent;
  backdrop-filter:blur(4px);
}
#ui button:hover{border-color:rgba(160,220,255,0.25);color:rgba(160,220,255,0.4)}

a#back{position:fixed;bottom:8px;left:10px;font-size:9px;opacity:0.08;color:#446;text-decoration:none;z-index:5}
</style>
</head>
<body>
<div id="breath">breathe</div>
<canvas id="c"></canvas>
<div id="ui">
  <button id="tone-btn">TONE</button>
  <button id="stone-btn">+ STONE</button>
</div>
<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
var C=document.getElementById('c');
var ctx=C.getContext('2d');
var W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;initWater()}
resize();
window.addEventListener('resize',resize);

// --- AUDIO ---
var actx=null,droneNodes=[];
function ensureAudio(){
  if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended')actx.resume();
  return actx;
}

var toneOn=false;
function startDrone(){
  if(toneOn)return;
  var c=ensureAudio();toneOn=true;
  var freqs=[110,165,220,330];
  var types=['sine','sine','triangle','sine'];
  freqs.forEach(function(f,i){
    var o=c.createOscillator();o.type=types[i];o.frequency.value=f;
    var g=c.createGain();g.gain.value=0;
    g.gain.linearRampToValueAtTime([0.06,0.04,0.025,0.015][i],c.currentTime+3);
    var lfo=c.createOscillator();lfo.frequency.value=0.1+i*0.05;
    var lg=c.createGain();lg.gain.value=0.008;
    lfo.connect(lg);lg.connect(g.gain);lfo.start();
    o.connect(g);g.connect(c.destination);o.start();
    droneNodes.push({o:o,g:g,lfo:lfo});
  });
}

function stopDrone(){
  if(!toneOn)return;toneOn=false;
  var c=ensureAudio();
  droneNodes.forEach(function(n){
    n.g.gain.linearRampToValueAtTime(0.001,c.currentTime+2);
    setTimeout(function(){try{n.o.stop();n.lfo.stop()}catch(e){}},2500);
  });
  droneNodes=[];
}

function playBowl(freq){
  var c=ensureAudio();var t=c.currentTime;
  var o=c.createOscillator();o.type='sine';o.frequency.value=freq||300+Math.random()*200;
  var g=c.createGain();g.gain.setValueAtTime(0.12,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+4);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+4);
  var o2=c.createOscillator();o2.type='sine';o2.frequency.value=o.frequency.value*2.01;
  var g2=c.createGain();g2.gain.setValueAtTime(0.04,t);
  g2.gain.exponentialRampToValueAtTime(0.001,t+3);
  o2.connect(g2);g2.connect(c.destination);o2.start(t);o2.stop(t+3);
}

function playRipple(){
  var c=ensureAudio();var t=c.currentTime;
  var o=c.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(600+Math.random()*300,t);
  o.frequency.exponentialRampToValueAtTime(200,t+0.8);
  var g=c.createGain();g.gain.setValueAtTime(0.04,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.8);
}

document.getElementById('tone-btn').addEventListener('click',function(){
  ensureAudio();
  if(toneOn){stopDrone();this.textContent='TONE'}
  else{startDrone();this.textContent='MUTE'}
});

// --- STONES ---
var stones=[];
var STONE_COLORS=[
  {h:200,s:30,l:50},{h:280,s:25,l:45},{h:160,s:35,l:40},
  {h:30,s:20,l:55},{h:340,s:20,l:50},{h:180,s:40,l:35},
  {h:50,s:30,l:50},{h:220,s:30,l:40}
];

function addStone(x,y){
  if(stones.length>=12)return;
  var col=STONE_COLORS[stones.length%STONE_COLORS.length];
  var w=30+Math.random()*40;
  var h=w*(0.5+Math.random()*0.3);
  stones.push({
    x:x||W*0.2+Math.random()*W*0.6,
    y:y||H*0.4+Math.random()*H*0.4,
    w:w,h:h,rot:(Math.random()-0.5)*0.4,col:col,
    glowPhase:Math.random()*Math.PI*2,
    glowSpeed:0.005+Math.random()*0.008
  });
  playBowl(250+stones.length*40);
}

function seedStones(){stones=[];for(var i=0;i<5;i++)addStone()}
seedStones();

document.getElementById('stone-btn').addEventListener('click',function(){
  addStone(W*0.15+Math.random()*W*0.7,H*0.3+Math.random()*H*0.5);
});

// --- WATER ---
var waterLines=[];
var ripples=[];

function initWater(){
  waterLines=[];
  var lineCount=Math.floor(H*0.6/8);
  for(var i=0;i<lineCount;i++){
    waterLines.push({
      y:H*0.35+i*8,
      phase:Math.random()*Math.PI*2,
      speed:0.003+Math.random()*0.004,
      amp:2+Math.random()*4,
      freq:0.005+Math.random()*0.005
    });
  }
}
initWater();

// Tap to place stone + ripple
C.addEventListener('pointerdown',function(e){
  ensureAudio();
  var x=e.clientX,y=e.clientY;
  if(y>H*0.3){
    addStone(x,y);
    ripples.push({x:x,y:y,r:0,maxR:80+Math.random()*40,life:1});
    playRipple();
  }
});

// --- FIREFLIES ---
var fireflies=[];
for(var i=0;i<20;i++){
  fireflies.push({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.2,
    phase:Math.random()*Math.PI*2,speed:0.01+Math.random()*0.02,
    hue:160+Math.random()*100,size:1+Math.random()*1.5
  });
}

// --- BREATH CYCLE ---
var breathTexts=['breathe in','hold','breathe out','rest'];
var breathDurations=[240,60,300,60];
var breathIdx=0,breathTimer=0;

function updateBreath(){
  breathTimer++;
  if(breathTimer>=breathDurations[breathIdx]){
    breathTimer=0;
    breathIdx=(breathIdx+1)%4;
    var el=document.getElementById('breath');
    el.textContent=breathTexts[breathIdx];
    el.classList.add('show');
    setTimeout(function(){el.classList.remove('show')},3000);
  }
}

setTimeout(function(){
  var el=document.getElementById('breath');
  el.textContent='breathe in';
  el.classList.add('show');
  setTimeout(function(){el.classList.remove('show')},3000);
},3000);

// --- STARS (cached) ---
var stars=[];
for(var si=0;si<60;si++){
  stars.push({x:Math.random()*4000,y:Math.random()*0.4,b:0.2+Math.random()*0.5,
    blink:Math.random()*Math.PI*2,bs:0.005+Math.random()*0.01});
}

// --- RENDER ---
var time=0;

function draw(){
  time++;
  updateBreath();

  // Sky
  var skyGrad=ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0,'#060810');
  skyGrad.addColorStop(0.3,'#0a0e1a');
  skyGrad.addColorStop(0.5,'#0c1220');
  skyGrad.addColorStop(1,'#080c14');
  ctx.fillStyle=skyGrad;
  ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(function(s){
    var sx=s.x%W;
    var sy=s.y*H;
    var a=s.b*(0.5+Math.sin(s.blink+time*s.bs)*0.5);
    ctx.fillStyle='rgba(180,200,255,'+a.toFixed(2)+')';
    ctx.fillRect(Math.floor(sx),Math.floor(sy),1,1);
  });

  // Moon
  var moonX=W*0.8,moonY=H*0.1,moonR=20;
  var moonGrad=ctx.createRadialGradient(moonX,moonY,moonR*0.2,moonX,moonY,moonR*4);
  moonGrad.addColorStop(0,'rgba(200,220,255,0.15)');
  moonGrad.addColorStop(0.3,'rgba(160,200,255,0.04)');
  moonGrad.addColorStop(1,'rgba(160,200,255,0)');
  ctx.fillStyle=moonGrad;
  ctx.fillRect(moonX-moonR*4,moonY-moonR*4,moonR*8,moonR*8);
  ctx.fillStyle='rgba(220,230,255,0.6)';
  ctx.beginPath();ctx.arc(moonX,moonY,moonR,0,Math.PI*2);ctx.fill();

  // Water lines
  waterLines.forEach(function(wl){
    wl.phase+=wl.speed;
    var alpha=0.03+Math.sin(wl.phase)*0.015;
    ctx.strokeStyle='rgba(100,180,255,'+Math.max(0,alpha).toFixed(3)+')';
    ctx.lineWidth=0.5;
    ctx.beginPath();
    for(var x=0;x<W;x+=4){
      var wy=wl.y+Math.sin(x*wl.freq+wl.phase)*wl.amp;
      if(x===0)ctx.moveTo(x,wy);else ctx.lineTo(x,wy);
    }
    ctx.stroke();
  });

  // Ripples
  ripples.forEach(function(rp){
    rp.r+=1.2;rp.life-=0.012;
    if(rp.life<=0)return;
    ctx.strokeStyle='rgba(120,200,255,'+(rp.life*0.15).toFixed(3)+')';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(rp.x,rp.y,rp.r,0,Math.PI*2);ctx.stroke();
    if(rp.r>15){
      ctx.strokeStyle='rgba(120,200,255,'+(rp.life*0.08).toFixed(3)+')';
      ctx.beginPath();ctx.arc(rp.x,rp.y,rp.r*0.6,0,Math.PI*2);ctx.stroke();
    }
  });
  ripples=ripples.filter(function(rp){return rp.life>0});

  // Stones
  stones.forEach(function(s){
    s.glowPhase+=s.glowSpeed;
    var glow=0.3+Math.sin(s.glowPhase)*0.2;
    var c=s.col;

    ctx.save();
    ctx.translate(s.x,s.y);
    ctx.rotate(s.rot);

    // Outer glow
    var gg=ctx.createRadialGradient(0,0,s.w*0.2,0,0,s.w*2);
    gg.addColorStop(0,'hsla('+c.h+','+c.s+'%,'+c.l+'%,'+(glow*0.15).toFixed(2)+')');
    gg.addColorStop(0.5,'hsla('+c.h+','+c.s+'%,'+c.l+'%,'+(glow*0.04).toFixed(3)+')');
    gg.addColorStop(1,'hsla('+c.h+','+c.s+'%,'+c.l+'%,0)');
    ctx.fillStyle=gg;
    ctx.fillRect(-s.w*2,-s.w*2,s.w*4,s.w*4);

    // Stone body
    var bg=ctx.createRadialGradient(-s.w*0.15,-s.h*0.2,s.w*0.1,0,0,s.w*0.6);
    bg.addColorStop(0,'hsl('+c.h+','+(c.s+10)+'%,'+(c.l+15)+'%)');
    bg.addColorStop(0.7,'hsl('+c.h+','+c.s+'%,'+c.l+'%)');
    bg.addColorStop(1,'hsl('+c.h+','+(c.s-5)+'%,'+(c.l-15)+'%)');
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.ellipse(0,0,s.w/2,s.h/2,0,0,Math.PI*2);ctx.fill();

    // Highlight
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.beginPath();ctx.ellipse(-s.w*0.12,-s.h*0.15,s.w*0.25,s.h*0.15,-0.3,0,Math.PI*2);ctx.fill();

    // Edge glow
    ctx.strokeStyle='hsla('+c.h+','+(c.s+10)+'%,'+(c.l+20)+'%,'+(glow*0.3).toFixed(2)+')';
    ctx.lineWidth=0.8;
    ctx.beginPath();ctx.ellipse(0,0,s.w/2,s.h/2,0,0,Math.PI*2);ctx.stroke();

    ctx.restore();

    // Water reflection
    if(s.y>H*0.35){
      ctx.fillStyle='hsla('+c.h+','+c.s+'%,'+c.l+'%,0.02)';
      ctx.beginPath();ctx.ellipse(s.x,s.y+s.h*0.6,s.w*0.4,s.h*0.15,s.rot,0,Math.PI*2);ctx.fill();
    }
  });

  // Fireflies
  fireflies.forEach(function(f){
    f.phase+=f.speed;
    f.x+=f.vx+Math.sin(f.phase)*0.2;
    f.y+=f.vy+Math.cos(f.phase*0.7)*0.15;
    if(f.x<-10)f.x=W+10;if(f.x>W+10)f.x=-10;
    if(f.y<-10)f.y=H+10;if(f.y>H+10)f.y=-10;
    var a=(Math.sin(f.phase)+1)*0.5;
    if(a<0.1)return;
    var grd=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size*6);
    grd.addColorStop(0,'hsla('+f.hue+',60%,70%,'+(a*0.2).toFixed(2)+')');
    grd.addColorStop(1,'hsla('+f.hue+',60%,70%,0)');
    ctx.fillStyle=grd;
    ctx.fillRect(f.x-f.size*6,f.y-f.size*6,f.size*12,f.size*12);
    ctx.fillStyle='hsla('+f.hue+',60%,80%,'+(a*0.6).toFixed(2)+')';
    ctx.beginPath();ctx.arc(f.x,f.y,f.size,0,Math.PI*2);ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
