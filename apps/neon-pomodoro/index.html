<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Pomodoro</title>
<meta name="description" content="A sleek pomodoro timer with neon aesthetics. Customizable focus and break intervals, glowing ring, synth bell.">
<meta property="og:title" content="Neon Pomodoro">
<meta property="og:description" content="A sleek pomodoro timer with neon aesthetics. Customizable focus and break intervals, glowing ring, synth bell.">
<meta property="og:url" content="https://sloppy.live/neon-pomodoro">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20pomodoro%20timer%20synthwave%20glowing%20ring%20pink%20cyan%20focus%20minimalist?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8D%85">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@500;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#180304;            /* deep crimson-black */
  --bg-2:#2a0a0c;
  --panel:rgba(28,8,8,0.78);
  --rule:rgba(255,200,150,0.14);
  --rule-strong:rgba(255,200,150,0.34);
  --ink:#fff1e3;
  --ink-mute:#c89c80;
  /* red + orange neon palette */
  --red:#ff2e3a;           /* focus phase */
  --red-deep:#a0111a;
  --orange:#ff7a2e;        /* short break */
  --orange-deep:#a04416;
  --amber:#ffb838;         /* long break */
  --amber-deep:#a07522;
  --ember:#ff5e2e;         /* mid accent */
  --gold:#ffd03e;          /* highlight numerals */
  --coral:#ff3a5e;         /* secondary glow */

  /* phase color — JS swaps this on phase change */
  --phase: var(--red);
  --phase-deep: var(--red-deep);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Orbitron',sans-serif;font-size:16px;-webkit-font-smoothing:antialiased}
html{font-size:100%}

body{
  background:
    radial-gradient(900px 700px at 18% 100%, rgba(255,46,58,0.22), transparent 60%),
    radial-gradient(900px 700px at 82% 0%, rgba(255,122,46,0.14), transparent 60%),
    radial-gradient(700px 500px at 50% 50%, rgba(255,184,56,0.08), transparent 70%),
    var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:1.5rem 1rem 4rem;
}

.skip{position:absolute;left:-9999px;top:auto}
.skip:focus{left:1rem;top:1rem;background:var(--pink);color:var(--bg);padding:0.5rem;z-index:100}

/* synthwave grid floor */
.grid-floor{
  position:fixed; left:0; right:0; bottom:0;
  height:30vh;
  pointer-events:none;
  z-index:0;
  opacity:0.5;
  background:
    linear-gradient(180deg, transparent 0%, rgba(255,46,58,0.05) 60%, rgba(255,46,58,0.20) 100%),
    repeating-linear-gradient(90deg, transparent 0 calc(8% - 1px), rgba(255,46,58,0.45) calc(8% - 1px) 8%),
    repeating-linear-gradient(0deg, transparent 0 calc(20% - 1px), rgba(255,122,46,0.36) calc(20% - 1px) 20%);
  -webkit-mask-image: linear-gradient(180deg, transparent, #000 35%);
          mask-image: linear-gradient(180deg, transparent, #000 35%);
  filter: blur(0.4px);
}

/* ── BRAND ── */
header.brand{
  position:relative; z-index:2;
  text-align:center;
  margin-bottom:1rem;
}
header.brand h1{
  margin:0;
  font-family:'Audiowide', sans-serif;
  font-size:clamp(1.6rem, 3.4vw, 2.4rem);
  letter-spacing:0.1em;
  color:#fff;
  text-shadow:
    0 0 12px var(--phase),
    0 0 26px var(--phase),
    3px 3px 0 var(--ember);
}
header.brand h1 em{
  font-style:normal;
  color:var(--orange);
  text-shadow:
    0 0 12px var(--orange),
    0 0 26px var(--orange),
    3px 3px 0 var(--red-deep);
}
header.brand .tagline{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:1rem;
  color: rgba(244,240,255,0.62);
  margin-top:0.2rem;
}

/* ── PHASE LABEL ── */
.phase-label{
  position:relative; z-index:2;
  font-family:'IBM Plex Mono', monospace;
  font-size:0.78rem; letter-spacing:0.32em; text-transform:uppercase;
  color: var(--phase);
  text-shadow: 0 0 12px var(--phase);
  margin: 0.5rem 0 0.6rem;
  text-align:center;
}
.phase-label .dot{
  display:inline-block; width:0.55rem; height:0.55rem; border-radius:50%;
  background: var(--phase);
  box-shadow: 0 0 10px var(--phase);
  margin-right:0.5rem;
  vertical-align: 0.05em;
  animation: phasePulse 1.6s ease-in-out infinite;
}
.phase-label[data-running="false"] .dot{ animation: none; opacity:0.5 }
@keyframes phasePulse{
  0%,100%{ opacity:1 }
  50%{ opacity:0.4 }
}

/* ── RING ── */
.ring-host{
  position:relative; z-index:2;
  width: min(22rem, 78vw);
  aspect-ratio: 1 / 1;
  margin: 0 auto;
  display:grid; place-items:center;
}
.ring-host svg{
  position:absolute; inset:0; width:100%; height:100%;
  transform: rotate(-90deg);
  filter: drop-shadow(0 0 10px var(--phase)) drop-shadow(0 0 26px rgba(255,46,156,0.25));
  transition: filter 0.35s ease;
}
.ring-host svg circle.bg{ stroke: rgba(255,255,255,0.08); }
.ring-host svg circle.fg{
  stroke: var(--phase);
  transition: stroke 0.35s ease, stroke-dashoffset 0.5s linear;
}
.timer-display{
  position:relative; z-index:1;
  text-align:center;
  pointer-events:none;
  user-select:none;
}
.timer-display .mmss{
  font-family:'Audiowide', sans-serif;
  font-size:clamp(3.4rem, 9vw, 6.4rem);
  color: #fff;
  text-shadow:
    0 0 16px var(--phase),
    0 0 32px var(--phase);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
  line-height: 0.95;
}
.timer-display .meta{
  margin-top:0.4rem;
  font-family:'IBM Plex Mono', monospace;
  font-size:0.65rem; letter-spacing:0.22em; text-transform:uppercase;
  color: var(--ink-mute);
}
.timer-display .meta b{ color: var(--gold); font-weight:500 }

/* ── CYCLE PIPS ── */
.pips{
  position:relative; z-index:2;
  display:flex; gap:0.45rem; justify-content:center;
  margin: 1rem 0 0.75rem;
}
.pips .pip{
  width:0.55rem; height:0.55rem; border-radius:50%;
  background: rgba(255,255,255,0.15);
  border:1px solid var(--rule);
  transition: background 0.35s ease, box-shadow 0.35s ease;
}
.pips .pip.done{
  background: var(--phase);
  border-color: var(--phase);
  box-shadow: 0 0 8px var(--phase);
}

/* ── CONTROLS ── */
.controls{
  position:relative; z-index:2;
  display:flex; gap:0.55rem; flex-wrap:wrap; justify-content:center;
  margin-top: 0.6rem;
}
.btn{
  font-family:'IBM Plex Mono', monospace;
  font-size:0.72rem; letter-spacing:0.18em; text-transform:uppercase;
  background: rgba(20,8,48,0.6);
  color: var(--ink);
  border: 1px solid var(--rule-strong);
  padding: 0.85rem 1.3rem;
  cursor: pointer;
  min-height: 2.85rem;
  backdrop-filter: blur(4px);
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.08s ease, box-shadow 0.15s ease;
}
.btn:hover{
  background: rgba(255,46,58,0.14);
  border-color: var(--phase);
  color: #fff;
}
.btn:active{ transform: translateY(1px) }
.btn:focus-visible{ outline: 3px solid var(--orange); outline-offset: 2px }
.btn.primary{
  background: linear-gradient(180deg, var(--phase), var(--phase-deep));
  border-color: var(--phase);
  color:#fff;
  font-weight: 500;
  box-shadow: 0 6px 22px rgba(255,46,58,0.34), 0 0 0 1px rgba(255,255,255,0.06) inset;
  min-width: 9.5rem;
}
.btn.primary:hover{
  background: linear-gradient(180deg, color-mix(in srgb, var(--phase) 90%, white 10%), var(--phase));
}
.btn .ico{ margin-right:0.35rem; opacity:0.85 }

/* ── SETTINGS PANEL ── */
.settings{
  position:relative; z-index:2;
  width: min(28rem, 92vw);
  margin-top: 1.4rem;
  background: var(--panel);
  border: 1px solid var(--rule);
  padding: 0;
  backdrop-filter: blur(6px);
}
.settings.collapsed .body{ display:none }
.settings .head{
  display:flex; align-items:center; gap:0.6rem;
  padding: 0.65rem 0.95rem;
  cursor:pointer;
  border-bottom: 1px solid var(--rule);
  font-family:'Audiowide', sans-serif;
  font-size:0.85rem; letter-spacing:0.18em; text-transform:uppercase;
  color: var(--orange);
  user-select:none;
}
.settings.collapsed .head{ border-bottom-color: transparent }
.settings .head .chev{ margin-left:auto; transition: transform 0.2s ease; color: var(--ink-mute) }
.settings:not(.collapsed) .head .chev{ transform: rotate(180deg) }
.settings .body{
  padding: 0.85rem 0.95rem 1rem;
  display: grid;
  gap: 0.75rem;
}
.row{
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.6rem;
  align-items: center;
}
.row label{
  font-family:'IBM Plex Mono', monospace;
  font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase;
  color: var(--ink-mute);
}
.row label small{ display:block; color: rgba(255,255,255,0.4); font-size:0.6rem; letter-spacing:0.06em; margin-top:0.18rem; text-transform:none }
.row .val{
  font-family:'Audiowide', sans-serif;
  font-size:0.95rem;
  color: var(--gold);
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 8px rgba(255,208,62,0.35);
  min-width: 4rem; text-align:right;
}
.row input[type="range"]{ accent-color: var(--phase); width:100% }
.row.toggles{ grid-template-columns: 1fr; }
.row.toggles .group{ display:flex; gap:0.4rem; flex-wrap:wrap }
.toggle{
  font-family:'IBM Plex Mono', monospace;
  font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase;
  background: rgba(255,255,255,0.04);
  color: var(--ink-mute);
  border: 1px solid var(--rule);
  padding: 0.42rem 0.65rem;
  cursor:pointer;
}
.toggle[aria-pressed="true"]{
  color: var(--amber);
  border-color: var(--amber);
  background: rgba(255,184,56,0.08);
}
.toggle:focus-visible{ outline: 2px solid var(--orange); outline-offset: 2px }

/* ── ALARM SELECT ── */
.alarm-select{
  font:inherit;
  font-family:'IBM Plex Mono', monospace;
  font-size:0.7rem; letter-spacing:0.1em;
  background: rgba(0,0,0,0.4);
  color: var(--ink);
  border: 1px solid var(--rule);
  padding: 0.42rem 0.55rem;
  cursor: pointer;
}
.alarm-select:focus-visible{ outline: 2px solid var(--orange); outline-offset: 2px }

/* ── PRESET CHIPS ── */
.presets{
  display:flex; gap:0.4rem; flex-wrap:wrap;
}
.preset{
  font-family:'IBM Plex Mono', monospace;
  font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase;
  background: transparent;
  color: var(--ink-mute);
  border: 1px solid var(--rule);
  padding: 0.36rem 0.6rem;
  cursor: pointer;
}
.preset:hover{ border-color: var(--orange); color: var(--orange) }
.preset[aria-pressed="true"]{ border-color: var(--gold); color: var(--gold); background: rgba(255,208,62,0.08) }

/* ── STATS BAR ── */
.stats-bar{
  position:relative; z-index:2;
  margin-top: 0.85rem;
  display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:center;
  font-family:'IBM Plex Mono', monospace;
  font-size:0.65rem; letter-spacing:0.16em; text-transform:uppercase;
  color: var(--ink-mute);
}
.stats-bar .pill{
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--rule);
  padding: 0.32rem 0.7rem;
}
.stats-bar .pill b{ color: var(--gold); font-weight:500 }

/* ── PHASE COLOR THEMES (red → orange → amber) ── */
body[data-phase="focus"]{ --phase: var(--red);    --phase-deep: var(--red-deep); }
body[data-phase="short"]{ --phase: var(--orange); --phase-deep: var(--orange-deep); }
body[data-phase="long"] { --phase: var(--amber);  --phase-deep: var(--amber-deep); }

@media (prefers-reduced-motion: reduce){
  .phase-label .dot{ animation:none }
  .ring-host svg{ transition: none }
  .ring-host svg circle.fg{ transition: stroke 0.05s linear }
}
</style>
</head>
<body data-phase="focus">
<a href="#timer" class="skip">Skip to timer</a>

<div class="grid-floor" aria-hidden="true"></div>

<header class="brand">
  <h1>neon · <em>pomodoro</em></h1>
  <div class="tagline">deep work, neon glow.</div>
</header>

<main id="timer">
  <div class="phase-label" id="phaseLabel" data-running="false" role="status" aria-live="polite">
    <span class="dot" aria-hidden="true"></span><span id="phaseText">FOCUS · ready</span>
  </div>

  <div class="ring-host">
    <svg viewBox="0 0 220 220" aria-hidden="true">
      <circle class="bg" cx="110" cy="110" r="100" fill="none" stroke-width="6"></circle>
      <circle class="fg" id="ringFg" cx="110" cy="110" r="100" fill="none" stroke-width="6"
              stroke-dasharray="628.32" stroke-dashoffset="0" stroke-linecap="round"></circle>
    </svg>
    <div class="timer-display">
      <div class="mmss" id="mmss" aria-live="polite">25:00</div>
      <div class="meta">cycle · <b id="cycleNum">1</b> / <b id="cycleTotal">4</b> &nbsp;·&nbsp; sessions · <b id="sessionsTotal">0</b></div>
    </div>
  </div>

  <div class="pips" id="pips" aria-label="Cycle progress"></div>

  <div class="controls">
    <button type="button" class="btn primary" id="startBtn" aria-label="Start or pause">
      <span class="ico">▶</span><span id="startLabel">Start</span>
    </button>
    <button type="button" class="btn" id="resetBtn" aria-label="Reset timer">Reset</button>
    <button type="button" class="btn" id="skipBtn" aria-label="Skip to next phase">Skip ▶</button>
  </div>

  <section class="settings collapsed" id="settings" aria-label="Settings">
    <div class="head" id="settingsToggle" tabindex="0" role="button" aria-expanded="false" aria-controls="settingsBody">
      <span aria-hidden="true">⚙</span> Customize <span class="chev" aria-hidden="true">▾</span>
    </div>
    <div class="body" id="settingsBody">
      <div class="presets" role="group" aria-label="Quick presets">
        <button type="button" class="preset" data-preset="classic">classic 25 / 5 / 15</button>
        <button type="button" class="preset" data-preset="long">long 50 / 10 / 30</button>
        <button type="button" class="preset" data-preset="short">short 15 / 3 / 10</button>
        <button type="button" class="preset" data-preset="sprint">sprint 45 / 5 / 20</button>
      </div>

      <div class="row">
        <label for="focusMin">Focus<small>length of a single deep-work block</small></label>
        <span class="val"><span id="focusVal">25</span>m</span>
      </div>
      <input type="range" id="focusMin" min="5" max="90" step="1" value="25">

      <div class="row">
        <label for="shortMin">Short break<small>between focus sessions</small></label>
        <span class="val"><span id="shortVal">5</span>m</span>
      </div>
      <input type="range" id="shortMin" min="1" max="20" step="1" value="5">

      <div class="row">
        <label for="longMin">Long break<small>after a full cycle</small></label>
        <span class="val"><span id="longVal">15</span>m</span>
      </div>
      <input type="range" id="longMin" min="5" max="60" step="1" value="15">

      <div class="row">
        <label for="cycleLen">Sessions per cycle<small>focus blocks before the long break</small></label>
        <span class="val"><span id="cycleLenVal">4</span></span>
      </div>
      <input type="range" id="cycleLen" min="2" max="8" step="1" value="4">

      <div class="row toggles">
        <label>Alarm sound<small>preset chime, or upload your own MP3</small></label>
        <div class="group" style="gap:0.4rem">
          <select class="alarm-select" id="alarmSelect" aria-label="Alarm preset"></select>
          <label class="toggle" for="alarmFile" id="alarmUploadLabel" style="cursor:pointer">↑ upload mp3</label>
          <input type="file" id="alarmFile" accept="audio/mpeg,audio/mp3,audio/wav,audio/ogg" style="display:none">
          <button type="button" class="toggle" id="alarmTestBtn">▶ test</button>
          <button type="button" class="toggle" id="alarmClearBtn" hidden>⌫ clear upload</button>
        </div>
        <div id="alarmStatus" style="grid-column:1/-1;font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:0.08em;color:var(--ink-mute);margin-top:-0.2rem"></div>
      </div>

      <div class="row toggles">
        <label>Behavior</label>
        <div class="group">
          <button type="button" class="toggle" id="autoBreakBtn" aria-pressed="true">⏵ auto break</button>
          <button type="button" class="toggle" id="autoFocusBtn" aria-pressed="false">⏵ auto focus</button>
          <button type="button" class="toggle" id="soundBtn" aria-pressed="true">♪ sound</button>
          <button type="button" class="toggle" id="tickBtn" aria-pressed="false">⌗ tick</button>
          <button type="button" class="toggle" id="notifBtn" aria-pressed="false">🔔 notify</button>
        </div>
      </div>
    </div>
  </section>

  <div class="stats-bar" role="status">
    <span class="pill">today · <b id="todayCount">0</b></span>
    <span class="pill">all time · <b id="totalCount">0</b></span>
    <span class="pill">streak · <b id="streakDays">0</b>d</span>
  </div>
</main>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//   NEON POMODORO — sleek timer with customizable intervals,
//   neon ring + per-phase color theme + Web Audio bell + notifs
// ════════════════════════════════════════════════════════════════

const $ = (s) => document.querySelector(s);
const SAVE_KEY = 'neon-pomodoro-v1';

// ──────── settings + state ────────
const DEFAULT_SETTINGS = {
  focusMin: 25,
  shortMin: 5,
  longMin: 15,
  cycleLen: 4,         // focus sessions before a long break
  autoBreak: true,
  autoFocus: false,
  sound: true,
  tick: false,
  notif: false,
  alarmPreset: 'bell', // 'bell' | 'chime' | 'clock' | 'buzzer' | 'triumph' | 'custom'
};

// Persisted across reloads
let settings = { ...DEFAULT_SETTINGS };
let stats = { totalSessions: 0, todayDate: '', todayCount: 0, streakDays: 0, lastSessionDate: '' };

// Live timer state (NOT persisted — fresh on each reload)
let phase = 'focus';                 // 'focus' | 'short' | 'long'
let running = false;
let remainMs = settings.focusMin * 60 * 1000;
let phaseDurMs = remainMs;
let cycleIdx = 0;                    // count of focus sessions completed THIS cycle (0..cycleLen)
let lastTick = 0;                    // ms timestamp of last update

// ──────── persistence ────────
function loadAll(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const j = JSON.parse(raw);
    if (j && typeof j === 'object'){
      Object.assign(settings, j.settings || {});
      Object.assign(stats, j.stats || {});
    }
  } catch{}
}
function saveAll(){
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({ settings, stats })); } catch{}
}

// ──────── helpers ────────
function todayKey(){
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
}
function fmtMs(ms){
  if (ms < 0) ms = 0;
  const total = Math.ceil(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}
function phaseDurFor(p){
  if (p === 'short') return settings.shortMin * 60 * 1000;
  if (p === 'long')  return settings.longMin  * 60 * 1000;
  return settings.focusMin * 60 * 1000;
}
function phaseLabelFor(p, isRunning){
  const base = p === 'short' ? 'SHORT BREAK' : p === 'long' ? 'LONG BREAK' : 'FOCUS';
  if (running) return base + ' · running';
  if (remainMs === phaseDurMs) return base + ' · ready';
  return base + ' · paused';
}

// ──────── audio ────────
let actx = null;
function ac(){
  if (!actx){ try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch{ return null; } }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
// ──── alarm presets — pure synth, no samples needed ────
function playSynthBell(highBias){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const notes = highBias ? [880, 1108.7, 1318.5] : [659.3, 830.6, 1046.5];
  notes.forEach((f, i) => {
    const o = c.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
    const g = c.createGain();
    const start = t + i * 0.13;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.18, start + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, start + 0.6);
    o.connect(g); g.connect(c.destination);
    o.start(start); o.stop(start + 0.7);
    const o2 = c.createOscillator(); o2.type = 'sine'; o2.frequency.value = f * 2;
    const g2 = c.createGain();
    g2.gain.setValueAtTime(0, start);
    g2.gain.linearRampToValueAtTime(0.05, start + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, start + 0.4);
    o2.connect(g2); g2.connect(c.destination);
    o2.start(start); o2.stop(start + 0.5);
  });
}
function playSoftChime(){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((f, i) => {
    const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    const g = c.createGain();
    const start = t + i * 0.18;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.14, start + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, start + 1.1);
    o.connect(g); g.connect(c.destination);
    o.start(start); o.stop(start + 1.2);
  });
}
function playOldClock(){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  for (let i = 0; i < 6; i++){
    const o = c.createOscillator(); o.type = 'square'; o.frequency.value = 1200;
    const filt = c.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 1500; filt.Q.value = 12;
    const g = c.createGain();
    const start = t + i * 0.18;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.12, start + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, start + 0.12);
    o.connect(filt); filt.connect(g); g.connect(c.destination);
    o.start(start); o.stop(start + 0.13);
  }
}
function playBuzzer(){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  for (let i = 0; i < 3; i++){
    const o = c.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(180, t + i * 0.32);
    o.frequency.linearRampToValueAtTime(220, t + i * 0.32 + 0.25);
    const g = c.createGain();
    const start = t + i * 0.32;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.14, start + 0.01);
    g.gain.linearRampToValueAtTime(0.001, start + 0.28);
    o.connect(g); g.connect(c.destination);
    o.start(start); o.stop(start + 0.3);
  }
}
function playTriumph(){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  // I - IV - V - I in C, brassy saw + triangle harmony
  const notes = [261.63, 329.63, 392, 523.25];
  notes.forEach((f, i) => {
    const o = c.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f;
    const o2 = c.createOscillator(); o2.type = 'triangle'; o2.frequency.value = f * 2;
    const filt = c.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 1800;
    const g = c.createGain();
    const start = t + i * 0.18;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.12, start + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, start + 0.55);
    o.connect(filt); o2.connect(filt); filt.connect(g); g.connect(c.destination);
    o.start(start); o2.start(start);
    o.stop(start + 0.6); o2.stop(start + 0.6);
  });
}

// ──── laser pulse: sci-fi descending zap (sawtooth sweep + bandpass + noise tail) ────
function playLaserPulse(){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  for (let i = 0; i < 3; i++){
    const start = t + i * 0.12;
    const o = c.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(1800 + i * 80, start);
    o.frequency.exponentialRampToValueAtTime(220, start + 0.18);
    const filt = c.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.setValueAtTime(2400, start);
    filt.frequency.linearRampToValueAtTime(800, start + 0.18);
    filt.Q.value = 6;
    const g = c.createGain();
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.16, start + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, start + 0.22);
    o.connect(filt); filt.connect(g); g.connect(c.destination);
    o.start(start); o.stop(start + 0.24);
    // brief noise tail per pulse
    const buf = c.createBuffer(1, c.sampleRate * 0.08, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let k = 0; k < d.length; k++) d[k] = (Math.random() * 2 - 1) * (1 - k / d.length);
    const ns = c.createBufferSource(); ns.buffer = buf;
    const nf = c.createBiquadFilter(); nf.type = 'highpass'; nf.frequency.value = 1500;
    const ng = c.createGain(); ng.gain.value = 0.06;
    ns.connect(nf); nf.connect(ng); ng.connect(c.destination);
    ns.start(start);
  }
}

// ──── gong: deep low-fundamental + inharmonic overtones with long tail ────
function playGong(){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  // mallet strike — short noise burst through bandpass
  const buf = c.createBuffer(1, c.sampleRate * 0.05, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  const ns = c.createBufferSource(); ns.buffer = buf;
  const nf = c.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = 600; nf.Q.value = 3;
  const ng = c.createGain(); ng.gain.value = 0.15;
  ns.connect(nf); nf.connect(ng); ng.connect(c.destination);
  ns.start(t);
  // body — fundamental + 4 inharmonic partials, long exponential decay
  const fund = 88;
  const partials = [1.0, 2.31, 3.07, 4.21, 5.83];   // intentionally inharmonic for that bronze-bowl shimmer
  const peakG = 0.18;
  partials.forEach((mult, i) => {
    const o = c.createOscillator();
    o.type = i === 0 ? 'sine' : 'triangle';
    o.frequency.value = fund * mult;
    // small detune drift
    o.detune.value = (i - 2) * 5;
    const g = c.createGain();
    const partG = peakG / (i + 1);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(partG, t + 0.012);
    // longer tails for lower partials
    g.gain.exponentialRampToValueAtTime(0.001, t + 3.4 - i * 0.4);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 4.0);
  });
  // subtle pitch dip on the fundamental for the "hit-then-settle" feel
  // (already covered by inharmonic partials, kept simple)
}

// ──── custom MP3 upload via IndexedDB (avoids the localStorage 5MB cap) ────
const IDB_NAME = 'neon-pomodoro';
const IDB_STORE = 'alarm';
function idbOpen(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbPut(key, val){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = () => { db.close(); resolve(); };
    tx.onerror = () => { db.close(); reject(tx.error); };
  });
}
async function idbGet(key){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const r = tx.objectStore(IDB_STORE).get(key);
    r.onsuccess = () => { db.close(); resolve(r.result); };
    r.onerror = () => { db.close(); reject(r.error); };
  });
}
async function idbDel(key){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = () => { db.close(); resolve(); };
    tx.onerror = () => { db.close(); reject(tx.error); };
  });
}

let customAudioUrl = null;       // object URL for the uploaded mp3, if any
let customAudioName = '';
let customAudio = null;          // pre-warmed HTMLAudioElement

async function loadCustomAlarmFromIDB(){
  try {
    const blob = await idbGet('mp3');
    const meta = await idbGet('mp3-meta');
    if (blob && blob instanceof Blob){
      if (customAudioUrl) URL.revokeObjectURL(customAudioUrl);
      customAudioUrl = URL.createObjectURL(blob);
      customAudio = new Audio(customAudioUrl);
      customAudio.preload = 'auto';
      customAudioName = (meta && meta.name) || 'custom.mp3';
      return true;
    }
  } catch (e){
    console.warn('[neon-pomodoro] custom alarm load failed:', e?.message || e);
  }
  return false;
}
async function saveCustomAlarm(file){
  await idbPut('mp3', file);
  await idbPut('mp3-meta', { name: file.name, size: file.size, type: file.type, savedAt: Date.now() });
  if (customAudioUrl) URL.revokeObjectURL(customAudioUrl);
  customAudioUrl = URL.createObjectURL(file);
  customAudio = new Audio(customAudioUrl);
  customAudio.preload = 'auto';
  customAudioName = file.name;
}
async function clearCustomAlarm(){
  await idbDel('mp3'); await idbDel('mp3-meta');
  if (customAudioUrl){ URL.revokeObjectURL(customAudioUrl); customAudioUrl = null; }
  customAudio = null; customAudioName = '';
}
function playCustomAlarm(){
  if (!customAudio) return false;
  try {
    customAudio.currentTime = 0;
    const p = customAudio.play();
    if (p && p.catch) p.catch((e) => console.warn('[neon-pomodoro] mp3 play blocked:', e?.message || e));
    return true;
  } catch (e) { console.warn(e); return false; }
}

function bell(highBias=false){
  if (!settings.sound) return;
  ac();
  if (settings.alarmPreset === 'custom' && customAudio){
    if (playCustomAlarm()) return;
    // fallback to bell if mp3 fails
  }
  const preset = ALARM_PRESETS[settings.alarmPreset] || ALARM_PRESETS.bell;
  preset.play(highBias);
}
let lastTickSecond = -1;
function tickSound(){
  if (!settings.tick || !settings.sound) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = 'square'; o.frequency.value = 1800;
  const g = c.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.018, t + 0.001);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.05);
}

// ──────── timer engine ────────
function start(){
  if (running) return;
  // unlock audio + (best effort) notifications on the first user-driven start
  ac();
  running = true;
  lastTick = performance.now();
  renderAll();
}
function pause(){
  if (!running) return;
  running = false;
  renderAll();
  saveAll();
}
function toggle(){ running ? pause() : start(); }
function resetPhase(){
  phaseDurMs = phaseDurFor(phase);
  remainMs = phaseDurMs;
  running = false;
  renderAll();
}
function fullReset(){
  phase = 'focus'; cycleIdx = 0;
  resetPhase();
  saveAll();
}
function nextPhase(autoTriggered){
  // current phase ended — bump stats + step to the next one
  if (phase === 'focus'){
    stats.totalSessions += 1;
    const tk = todayKey();
    if (stats.todayDate !== tk){
      // streak math: yesterday counted? then +1, else reset to 1.
      if (stats.todayDate){
        const d = new Date(stats.todayDate);
        const diff = Math.round((new Date(tk) - d) / 86400000);
        stats.streakDays = diff === 1 ? (stats.streakDays + 1) : 1;
      } else { stats.streakDays = 1; }
      stats.todayDate = tk;
      stats.todayCount = 1;
    } else {
      stats.todayCount += 1;
    }
    cycleIdx += 1;
    // long break every cycleLen focus sessions, otherwise short
    if (cycleIdx >= settings.cycleLen){
      phase = 'long';
      cycleIdx = 0;
    } else {
      phase = 'short';
    }
    bell(true);
    notify('Pomodoro complete', 'Time for a break.');
  } else {
    // break ended → back to focus
    phase = 'focus';
    bell(false);
    notify('Break over', 'Focus session starting.');
  }
  phaseDurMs = phaseDurFor(phase);
  remainMs = phaseDurMs;
  saveAll();
  // auto-start the next phase if the corresponding toggle is on
  const shouldAuto = phase === 'focus' ? settings.autoFocus : settings.autoBreak;
  if (autoTriggered && shouldAuto){
    running = true;
    lastTick = performance.now();
  } else {
    running = false;
  }
  renderAll();
}

// rAF tick — drives the ring smoothly
let raf = 0;
function tick(now){
  if (running){
    if (lastTick === 0) lastTick = now;
    const dt = now - lastTick;
    lastTick = now;
    remainMs -= dt;
    // tick sound on every whole-second boundary
    const sec = Math.ceil(remainMs / 1000);
    if (sec !== lastTickSecond){
      lastTickSecond = sec;
      if (running && sec > 0 && settings.tick) tickSound();
    }
    if (remainMs <= 0){
      remainMs = 0;
      running = false;
      // schedule a phase-advance after rendering this final 00:00 frame
      renderAll();
      setTimeout(() => nextPhase(true), 60);
      raf = requestAnimationFrame(tick);
      return;
    }
    // throttle DOM updates to ~10 Hz to keep things efficient
    if (!tick._lastRender || now - tick._lastRender > 100){
      tick._lastRender = now;
      renderAll();
    } else {
      // still update ring smoothly
      setRing(remainMs / phaseDurMs);
    }
  } else {
    lastTick = 0;
  }
  raf = requestAnimationFrame(tick);
}

    phaseDurMs = newDur;
    if (remainMs > phaseDurMs) remainMs = phaseDurMs;

  });

phaseDurMs = phaseDurFor(phase);
remainMs = phaseDurMs;
// load custom mp3 (if any) before building the alarm select so 'Custom · …' shows the right name
loadCustomAlarmFromIDB().finally(() => {
  buildAlarmSelect();
  refreshAlarmStatus();
});
// rebuild "today" if rolled over
if (stats.todayDate && stats.todayDate !== todayKey()){
  const d = new Date(stats.todayDate);
  const diff = Math.round((new Date(todayKey()) - d) / 86400000);
  if (diff > 1){ stats.streakDays = 0; }     // streak broken
  stats.todayCount = 0;
  stats.todayDate = '';
}
renderAll();
highlightPresetButtons();
raf = requestAnimationFrame(tick);
</script>
</body>
</html>
