<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Forest Rally — Stage Run</title>
<meta name="description" content="A pixel-3D rally stage. Wind through pines in a Lancer-Evo-flavoured rally car across three stages. Keep the engine humming.">
<meta property="og:title" content="Forest Rally — Stage Run">
<meta property="og:description" content="A pixel-3D rally stage. Wind through pines in a Lancer-Evo-flavoured rally car across three stages. Keep the engine humming.">
<meta property="og:url" content="https://sloppy.live/forest-rally">
<meta property="og:image" content="https://image.pollinations.ai/prompt/pixel%20art%20rally%20car%20mitsubishi%20evo%20pine%20forest%20winding%20road%20arcade%20outrun%20dawn?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8F%8E%EF%B8%8F">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Press+Start+2P&family=VT323&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0c0d10;
  --metal:#1a1d22;
  --metal-2:#23262d;
  --rule:rgba(255,255,255,0.08);
  --ink:#e8eef5;
  --pine:#2c5a37;
  --rally-blue:#1a4cb8;
  --rally-red:#d62a2a;
  --gold:#ffd84a;
  --warn:#ff6a3e;
  --good:#74e07a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'Audiowide','Arial',sans-serif;font-size:16px}
html{font-size:100%}

.skip{position:absolute;left:-9999px;top:auto}
.skip:focus{left:1rem;top:1rem;background:#fff;color:#000;padding:0.5rem;z-index:100}

#stage{
  position:fixed; inset:0;
  width:100%; height:100%;
  display:block;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
}

/* HUD */
.hud{
  position:fixed; left:0; right:0; bottom:0;
  z-index:5;
  pointer-events:none;
  padding:0.85rem;
  display:grid;
  grid-template-columns: 1fr auto 1fr;
  gap:1rem;
  align-items:end;
}

.dash{
  background: linear-gradient(180deg, var(--metal-2), var(--metal));
  border:1px solid var(--rule);
  border-top:1px solid rgba(255,255,255,0.18);
  padding:0.6rem 0.85rem;
  box-shadow: 0 -8px 22px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
  pointer-events:auto;
}

.left-dash{
  display:flex; flex-direction:column; gap:0.4rem;
  text-align:left;
}
.left-dash .label{
  font-family:'Press Start 2P', monospace;
  font-size:0.55rem; letter-spacing:0.18em;
  color: rgba(232,238,245,0.55);
  text-transform:uppercase;
}
.left-dash .stage-id{
  font-family:'Audiowide', sans-serif;
  font-size:1.1rem; color:var(--gold);
}
.left-dash .timer{
  font-family:'VT323', monospace;
  font-size:2.2rem; line-height:1;
  color:var(--ink);
  letter-spacing:0.04em;
  font-variant-numeric:tabular-nums;
}
.left-dash .splits{
  font-family:'VT323', monospace;
  font-size:1rem;
  color:rgba(232,238,245,0.55);
  font-variant-numeric:tabular-nums;
}

/* center: speedometer */
.center-dash{
  text-align:center;
  min-width:14rem;
  display:flex; flex-direction:column; gap:0.25rem;
}
.center-dash .speed{
  font-family:'Audiowide', sans-serif;
  font-size:clamp(2.6rem, 6vw, 4rem);
  line-height:1;
  color:var(--ink);
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 18px rgba(255,216,74,0.35);
}
.center-dash .speed.warn{ color: var(--warn); text-shadow: 0 0 16px rgba(255,106,62,0.55); }
.center-dash .speed.good{ color: var(--good); }
.center-dash .unit{
  font-family:'Press Start 2P', monospace;
  font-size:0.62rem; letter-spacing:0.2em;
  color: rgba(232,238,245,0.6);
}
.center-dash .gear{
  font-family:'Audiowide', sans-serif;
  font-size:1.4rem;
  color:var(--gold);
  margin-top:0.2rem;
}

.tach{
  height:0.55rem;
  background: rgba(0,0,0,0.5);
  border:1px solid var(--rule);
  margin-top:0.3rem;
  position:relative; overflow:hidden;
}
.tach > i{
  position:absolute; left:0; top:0; bottom:0;
  background: linear-gradient(90deg, var(--good) 0%, var(--gold) 60%, var(--warn) 80%, var(--rally-red));
}

.right-dash{
  display:flex; flex-direction:column; gap:0.4rem;
  text-align:right;
}
.right-dash .progress{
  display:flex; gap:0.3rem; justify-content:flex-end;
  font-family:'Press Start 2P', monospace;
  font-size:0.55rem; letter-spacing:0.18em;
  color: rgba(232,238,245,0.45);
}
.right-dash .progress .seg{
  display:inline-block;
  width:1.3rem; height:0.9rem;
  background: rgba(255,255,255,0.08);
  border:1px solid var(--rule);
}
.right-dash .progress .seg.done{ background: var(--good); border-color: var(--good); }
.right-dash .progress .seg.now{ background: var(--gold); border-color: var(--gold); animation: blink 1.2s ease-in-out infinite }
@keyframes blink{ 0%,100%{opacity:1} 50%{opacity:0.4} }
.right-dash .stagename{
  font-family:'Audiowide', sans-serif;
  font-size:1rem; color:var(--ink);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.right-dash .progress-bar{
  height:0.4rem; background:rgba(0,0,0,0.5);
  border:1px solid var(--rule);
  position:relative; overflow:hidden;
}
.right-dash .progress-bar > i{
  position:absolute; left:0; top:0; bottom:0;
  background: linear-gradient(90deg, var(--rally-blue), var(--gold));
}
.right-dash .pace{
  font-family:'VT323', monospace;
  font-size:1rem;
  font-variant-numeric:tabular-nums;
}
.right-dash .pace.up{ color: var(--good) }
.right-dash .pace.down{ color: var(--warn) }

/* big banner */
.banner{
  position:fixed; left:50%; top:24%;
  transform:translateX(-50%) scale(0.9);
  z-index:10;
  pointer-events:none;
  text-align:center;
  opacity:0;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.banner.show{ opacity:1; transform:translateX(-50%) scale(1) }
.banner h2{
  font-family:'Audiowide', sans-serif;
  font-size:clamp(2.4rem, 6vw, 4.6rem);
  margin:0;
  color:var(--gold);
  text-shadow: 4px 4px 0 var(--rally-red), 0 0 40px rgba(255,216,74,0.55);
  letter-spacing:0.06em;
}
.banner h2.green{ color: var(--good); text-shadow: 4px 4px 0 #1c5424, 0 0 40px rgba(116,224,122,0.55); }
.banner h2.blue{ color: #ffffff; text-shadow: 4px 4px 0 var(--rally-blue), 0 0 40px rgba(26,76,184,0.55); }
.banner .sub{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:clamp(1rem, 2vw, 1.5rem);
  color:rgba(232,238,245,0.85);
  margin-top:0.4rem;
}

/* title overlay */
.title-overlay{
  position:fixed; inset:0;
  z-index:20;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center;
  background: radial-gradient(ellipse at center, rgba(12,13,16,0) 0%, rgba(12,13,16,0.85) 70%);
  padding:1rem;
  transition: opacity 0.4s ease;
}
.title-overlay.gone{ opacity:0; pointer-events:none }
.title-overlay h1{
  font-family:'Audiowide', sans-serif;
  font-size:clamp(2.6rem, 8vw, 6rem);
  margin:0 0 0.4rem;
  color:var(--gold);
  letter-spacing:0.06em;
  text-shadow: 5px 5px 0 var(--rally-red), 0 0 60px rgba(255,216,74,0.4);
}
.title-overlay .tag{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:clamp(1rem, 2.2vw, 1.5rem);
  color:rgba(232,238,245,0.78);
  margin:0 0 1.4rem;
  max-width:34rem;
}
.title-overlay .player-info{
  font-family:'Press Start 2P', monospace;
  font-size:0.55rem; letter-spacing:0.18em;
  color: rgba(232,238,245,0.6);
  margin: 0 0 1.2rem;
  display:flex; gap:1.2rem; flex-wrap:wrap; justify-content:center;
}
.title-overlay .player-info b{ color: var(--gold) }
.title-overlay .player-info .best b{ color: var(--good) }
.title-overlay .keys{
  font-family:'Press Start 2P', monospace;
  font-size:0.62rem; letter-spacing:0.16em;
  color:rgba(232,238,245,0.5);
  display:flex; gap:0.4rem; flex-wrap:wrap; justify-content:center;
  margin-bottom:1.4rem;
}
.title-overlay .keys .k{
  background:rgba(255,255,255,0.06); border:1px solid var(--rule);
  padding:0.3rem 0.5rem;
}
.title-overlay button{
  font-family:'Audiowide', sans-serif;
  font-size:1.05rem; letter-spacing:0.12em;
  background: linear-gradient(180deg, var(--rally-red), #8b1a1a);
  color:#fff;
  border:1px solid var(--gold);
  padding:0.95rem 1.6rem;
  cursor:pointer;
  text-transform:uppercase;
  box-shadow: 0 6px 0 #5a0e0e, 0 8px 22px rgba(0,0,0,0.5);
  transition: transform 0.08s ease;
}
.title-overlay button:hover{ background: linear-gradient(180deg, #e83e3e, var(--rally-red)) }
.title-overlay button:active{ transform: translateY(2px); box-shadow: 0 4px 0 #5a0e0e }
.title-overlay button:focus-visible{ outline:3px solid var(--gold); outline-offset:3px }

/* mobile controls */
.touch{
  position:fixed; bottom:9rem; left:0; right:0;
  z-index:6;
  display:none;
  justify-content:space-between;
  padding:0 1rem;
  pointer-events:none;
}
@media (pointer: coarse), (max-width: 700px){
  .touch{ display:flex }
  .hud{ grid-template-columns: 1fr; }
  .left-dash, .right-dash{ display:none }
}
.tbtn{
  pointer-events:auto;
  font-family:'Audiowide',sans-serif;
  font-size:1.4rem;
  width:5rem; height:5rem;
  border-radius:50%;
  background: rgba(255,255,255,0.06);
  border:1px solid var(--rule);
  color:var(--ink);
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
.tbtn:active{ background: rgba(255,216,74,0.18); border-color: var(--gold) }
.touch .right{display:flex;gap:0.5rem}

@media (prefers-reduced-motion: reduce){
  .right-dash .progress .seg.now{ animation:none }
  .banner{ transition: opacity 0.1s }
}
</style>

<body>
<a href="#stage" class="skip">Skip to canvas</a>

<canvas id="stage" role="application" aria-label="Forest rally racer. Hold up arrow or W to accelerate. Hold down arrow or S to brake. Steer with left and right arrows or A/D. R to restart. Space to handbrake."></canvas>

<div class="hud">
  <section class="dash left-dash" aria-label="Stage timer">
    <div class="label">Stage</div>
    <div class="stage-id" id="stageId">SS 1 / 3</div>
    <div class="timer" id="timerEl">0:00.00</div>
    <div class="splits" id="splitsEl">total —</div>
  </section>

  <section class="dash center-dash" aria-label="Speed and gear">
    <div class="speed" id="speedEl">0</div>
    <div class="unit">km / h</div>
    <div class="gear" id="gearEl">N</div>
    <div class="tach"><i id="tachFill" style="width:0%"></i></div>
  </section>

  <section class="dash right-dash" aria-label="Stage progress">
    <div class="stagename" id="stageName">Pine Woods</div>
    <div class="progress-bar"><i id="distFill" style="width:0%"></i></div>
    <div class="progress" id="stageDots"></div>
    <div class="pace" id="paceEl">— —</div>
  </section>
</div>

<div class="banner" id="banner" aria-live="polite">
  <h2 id="bannerH2"></h2>
  <div class="sub" id="bannerSub"></div>
</div>

<div class="touch">
  <button type="button" class="tbtn" id="tLeft" aria-label="Steer left">◀</button>
  <div class="right">
    <button type="button" class="tbtn" id="tBrake" aria-label="Brake">▼</button>
    <button type="button" class="tbtn" id="tGas" aria-label="Throttle">▲</button>
    <button type="button" class="tbtn" id="tRight" aria-label="Steer right">▶</button>
  </div>
</div>

<div class="title-overlay" id="title">
  <h1>FOREST RALLY</h1>
  <p class="tag">three stages. one borrowed Evo. don't lift, don't crash, don't blink.</p>
  <div class="keys">
    <span class="k">↑/W throttle</span>
    <span class="k">↓/S brake</span>
    <span class="k">←→ steer</span>
    <span class="k">SPACE handbrake</span>
    <span class="k">R restart</span>
  </div>
  <button type="button" id="goBtn">START SS 1</button>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//   FOREST RALLY — pseudo-3D scanline rally racer
//   3 winding stages, pixel-art Evo, pixel pine forest
// ════════════════════════════════════════════════════════════════

const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));

// ════════════════════════════════════════════════════════════════
//   PER-DRIVER STATE — every driver's progress is keyed by a stable
//   id (Supabase auth user_id if logged in, otherwise a guest UID
//   minted into localStorage). Records, run counts, and best times
//   are all stored under `forest-rally-progress-<id>` so two drivers
//   sharing a browser never bleed into each other's records.
// ════════════════════════════════════════════════════════════════
let supabaseClient = null;
let supabaseUser = null;
let playerId = null;
let progress = { best_total: null, best_stages: [null, null, null], runs: 0 };

// Probe a path before attempting `import()`. Some hosts SPA-fallback
// unknown URLs to text/html, and a dynamic import on such a URL throws
// a MIME-mismatch error that the browser surfaces in the console even
// when wrapped in try/catch. By HEAD-sniffing the Content-Type first
// (and double-checking the body's first bytes for an HTML signature)
// we only invoke `import()` when the response is genuinely JS — so a
// deployment without supabase produces zero console noise.
async function safeImportJs(path){
  let res;
  try { res = await fetch(path, { method: 'GET', cache: 'no-cache' }); }
  catch { return null; }
  if (!res.ok) return null;
  const ct = (res.headers.get('Content-Type') || '').toLowerCase();
  if (!/(javascript|ecmascript)/.test(ct)) return null;
  let body;
  try { body = await res.text(); }
  catch { return null; }
  if (/^\s*(<!doctype|<html\b|<head\b|<body\b)/i.test(body)) return null;
  // Verified JS — safe to import the original URL. Browser will refetch
  // (cheap; same-origin, often cached) and parse as a real module without
  // tripping the MIME check we'd otherwise have hit.
  try { return await import(path); }
  catch (e) { console.warn('[forest-rally] verified-JS import still threw at', path, '·', e?.message || e); return null; }
}

async function initPlayer(){
  // Try the canonical supabase config locations, but probe each via
  // safeImportJs so an HTML 404/SPA-fallback never reaches `import()`.
  const tryPaths = ['/supabase-config-fixed.js', '../supabase-config-fixed.js', '/supabase-config.js'];
  for (const p of tryPaths){
    const mod = await safeImportJs(p);
    if (mod && (mod.default || mod.supabase)){
      supabaseClient = mod.default || mod.supabase;
      console.info('[forest-rally] supabase loaded from', p);
      break;
    }
  }
  if (supabaseClient){
    try {
      const { data } = await supabaseClient.auth.getUser();
      if (data?.user?.id){
        supabaseUser = data.user;
        playerId = 'sb-' + data.user.id;
      }
    } catch (e) {
      console.warn('[forest-rally] auth lookup failed:', e?.message || e);
    }
  }
  // Guest fallback — a stable per-browser UID. Multiple drivers on the
  // same browser can have separate profiles by clearing localStorage,
  // but the default behaviour is "this browser = this driver".
  if (!playerId){
    try {
      let g = localStorage.getItem('forest-rally-guest-id');
      if (!g){
        g = 'guest-' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
        localStorage.setItem('forest-rally-guest-id', g);
      }
      playerId = g;
    } catch {
      // localStorage blocked — fall back to an in-memory session id; progress
      // simply won't persist across reloads, but is still isolated per session.
      playerId = 'session-' + Math.random().toString(36).slice(2, 10);
    }
  }
  loadProgress();
  renderPlayerInfo();
}

function progressKey(){ return 'forest-rally-progress-' + playerId; }

function loadProgress(){
  try {
    const raw = localStorage.getItem(progressKey());
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p && typeof p === 'object'){
      progress.best_total = typeof p.best_total === 'number' ? p.best_total : null;
      progress.best_stages = Array.isArray(p.best_stages) ? p.best_stages.slice(0, 3) : [null, null, null];
      while (progress.best_stages.length < 3) progress.best_stages.push(null);
      progress.runs = p.runs | 0;
    }
  } catch (e){
    console.warn('[forest-rally] progress load failed, starting fresh:', e?.message || e);
  }
}

function saveProgress(){
  try { localStorage.setItem(progressKey(), JSON.stringify(progress)); }
  catch (e){ console.warn('[forest-rally] progress save failed:', e?.message || e); }
}

function recordCompletedRun(stageTimes){
  // Returns { isNewBest, total, newStageBests:[bool,bool,bool] }.
  const total = stageTimes.reduce((s, v) => s + (v || 0), 0);
  let isNewBest = false;
  if (!progress.best_total || total < progress.best_total){
    progress.best_total = total;
    isNewBest = true;
  }
  const newStageBests = [false, false, false];
  for (let i = 0; i < 3; i++){
    const t = stageTimes[i];
    if (t && (!progress.best_stages[i] || t < progress.best_stages[i])){
      progress.best_stages[i] = t;
      newStageBests[i] = true;
    }
  }
  progress.runs += 1;
  saveProgress();
  return { isNewBest, total, newStageBests };
}

function driverLabel(){
  if (supabaseUser){
    return supabaseUser.is_anonymous
      ? 'anon'
      : (supabaseUser.user_metadata?.preferred_username || supabaseUser.user_metadata?.name || 'twitch');
  }
  return 'guest';
}

function renderPlayerInfo(){
  const titleEl = document.getElementById('title');
  if (!titleEl) return;
  let infoEl = titleEl.querySelector('.player-info');
  if (!infoEl){
    infoEl = document.createElement('div');
    infoEl.className = 'player-info';
    const tag = titleEl.querySelector('.tag');
    if (tag && tag.parentNode) tag.parentNode.insertBefore(infoEl, tag.nextSibling);
    else titleEl.appendChild(infoEl);
  }
  const shortId = (playerId || '').slice(-6);
  let html = `<span>driver · <b>${escapeHtml(driverLabel())}</b> · #${escapeHtml(shortId)}</span>`;
  if (progress.best_total){
    html += `<span class="best">personal best · <b>${fmtTime(progress.best_total)}</b> · ${progress.runs} run${progress.runs===1?'':'s'}</span>`;
  } else {
    html += `<span>no record yet — first run sets the bar</span>`;
  }
  infoEl.innerHTML = html;
}

// ──────── canvas ────────
const cvs = $('#stage');
const ctx = cvs.getContext('2d');
let W = 0, H = 0, DPR = 1;

// Pseudo-3D backing buffer — bumped 320×180 → 480×270 for the graphics
// overhaul. Still scaled to viewport with nearest-neighbour for the
// chunky-but-readable pixel feel; the extra res lets sprites carry
// real gradient shading + ambient occlusion + bigger silhouettes.
const BW = 480, BH = 270;
const buf = document.createElement('canvas');
buf.width = BW; buf.height = BH;
const bctx = buf.getContext('2d');
// Secondary buffer used for bloom/glow passes (filter:blur copies of buf)
const glowBuf = document.createElement('canvas');
glowBuf.width = BW; glowBuf.height = BH;
const gctx = glowBuf.getContext('2d');

function fit(){
  DPR = 1;   // we keep pseudo-3D crisp at the buffer res; main canvas scales via CSS
  W = window.innerWidth;
  H = window.innerHeight;
  cvs.width = W; cvs.height = H;
}
fit();
window.addEventListener('resize', fit);

// ──────── input ────────
const keys = {};
window.addEventListener('keydown', (e) => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD','KeyR'].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
});
window.addEventListener('keyup', (e) => { keys[e.code] = false; });
function pressed(...codes){ return codes.some(c => keys[c]); }

// touch buttons
const touchBtn = (id, code) => {
  const el = $(id);
  if (!el) return;
  const set = (v) => { keys[code] = v; };
  el.addEventListener('pointerdown', (e) => { e.preventDefault(); set(true); el.setPointerCapture(e.pointerId); });
  el.addEventListener('pointerup',   () => set(false));
  el.addEventListener('pointercancel',() => set(false));
  el.addEventListener('pointerleave', () => set(false));
};
touchBtn('#tLeft','ArrowLeft');
touchBtn('#tRight','ArrowRight');
touchBtn('#tGas','ArrowUp');
touchBtn('#tBrake','ArrowDown');

// ──────── audio ────────
let actx = null;
let engineOsc = null, engineGain = null, engineFilter = null;
let ambientGain = null;
let audioOn = false;

function ac(){
  if (!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch{ return null; }
  }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function startEngine(){
  if (engineOsc) return;
  const c = ac(); if (!c) return;
  // 2 detuned saws + a low rumble sine, through a lowpass tied to RPM
  engineOsc = c.createOscillator();
  const o2 = c.createOscillator();
  const o3 = c.createOscillator();
  engineOsc.type = 'sawtooth'; o2.type = 'sawtooth'; o3.type = 'sine';
  engineOsc.frequency.value = 60;
  o2.frequency.value = 60;
  o2.detune.value = 12;
  o3.frequency.value = 30;
  engineFilter = c.createBiquadFilter();
  engineFilter.type = 'lowpass';
  engineFilter.frequency.value = 800;
  engineFilter.Q.value = 0.7;
  engineGain = c.createGain();
  engineGain.gain.value = 0.0;
  engineOsc.connect(engineFilter); o2.connect(engineFilter); o3.connect(engineFilter);
  engineFilter.connect(engineGain);
  engineGain.connect(c.destination);
  engineOsc.start(); o2.start(); o3.start();
  engineOsc._mate = o2; engineOsc._sub = o3;
  audioOn = true;
}
function setEngineRpm(rpm, throttle){
  if (!engineOsc) return;
  // RPM 0..1 → freq 50..240 Hz (bass-y rally engine), filter 600..3200Hz
  const f = 60 + rpm * 220;
  engineOsc.frequency.setTargetAtTime(f, actx.currentTime, 0.04);
  engineOsc._mate.frequency.setTargetAtTime(f, actx.currentTime, 0.04);
  engineOsc._sub.frequency.setTargetAtTime(f * 0.5, actx.currentTime, 0.04);
  engineFilter.frequency.setTargetAtTime(700 + rpm * 2400, actx.currentTime, 0.05);
  // gain follows throttle a bit; idle = 0.06, full = 0.16
  engineGain.gain.setTargetAtTime(0.05 + throttle * 0.12, actx.currentTime, 0.08);
}
function blip(freq, dur=0.08, type='square', vol=0.08){
  const c = ac(); if (!c) return;
  const o = c.createOscillator();
  o.type = type; o.frequency.value = freq;
  const g = c.createGain();
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(vol, c.currentTime + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
  o.connect(g); g.connect(c.destination);
  o.start(); o.stop(c.currentTime + dur + 0.02);
}
function chime(){ blip(523, 0.1); setTimeout(() => blip(659, 0.1), 90); setTimeout(() => blip(784, 0.16), 180); }
function fanfare(){
  blip(523, 0.12); setTimeout(() => blip(659, 0.12), 120); setTimeout(() => blip(784, 0.12), 240); setTimeout(() => blip(1046, 0.3, 'triangle', 0.12), 360);
}
function screech(intensity){
  if (!audioOn || intensity < 0.2) return;
  const c = ac(); if (!c) return;
  const buf = c.createBuffer(1, c.sampleRate * 0.06, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = c.createBufferSource(); src.buffer = buf;
  const filt = c.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 2400 + Math.random() * 600; filt.Q.value = 4;
  const g = c.createGain(); g.gain.value = 0.06 * intensity;
  src.connect(filt); filt.connect(g); g.connect(c.destination);
  src.start();
}

// ──────── tree / sprite generation ────────
// Each sprite is a small offscreen canvas (pixel art). We draw to the
// scanline buffer at depth-scaled size with nearest-neighbour scaling.
function makeSprite(w, h, drawFn){
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const x = c.getContext('2d');
  x.imageSmoothingEnabled = false;
  drawFn(x, w, h);
  return c;
}

// ──── richer sprites: gradient-shaded layered triangles, AO ground
// shadow, soft rim highlight on the lit side. Each tree kind has 3
// stochastic variants so the forest doesn't look repeating.
function drawTreeLayered(g, cx, cy, w, h, layers){
  // ambient occlusion ground shadow (soft ellipse)
  const ag = g.createRadialGradient(cx, cy + 1, 1, cx, cy + 1, w * 0.7);
  ag.addColorStop(0, 'rgba(0,0,0,0.45)');
  ag.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = ag;
  g.beginPath(); g.ellipse(cx, cy + 1, w * 0.55, h * 0.06 + 2, 0, 0, Math.PI*2); g.fill();
  // trunk
  const trunkW = Math.max(2, Math.floor(w * 0.18));
  const trunkH = Math.max(4, Math.floor(h * 0.18));
  const tg = g.createLinearGradient(cx - trunkW/2, 0, cx + trunkW/2, 0);
  tg.addColorStop(0, '#1c1108'); tg.addColorStop(0.55, '#3a2614'); tg.addColorStop(1, '#553820');
  g.fillStyle = tg;
  g.fillRect(Math.floor(cx - trunkW/2), Math.floor(cy - trunkH + 1), trunkW, trunkH);
  // foliage: stacked tapered shapes with vertical gradient + rim highlight
  for (const L of layers){
    const { yOff, lw, lh, dark, mid, hi } = L;
    const top = cy - yOff - lh;
    const grad = g.createLinearGradient(0, top, 0, top + lh);
    grad.addColorStop(0, hi); grad.addColorStop(0.45, mid); grad.addColorStop(1, dark);
    g.fillStyle = grad;
    g.beginPath();
    g.moveTo(cx, top);                              // peak
    g.lineTo(cx + lw / 2, top + lh);                // right base
    g.lineTo(cx - lw / 2, top + lh);                // left base
    g.closePath(); g.fill();
    // rim highlight on the lit (left) edge
    g.strokeStyle = 'rgba(255,255,255,0.18)';
    g.lineWidth = 1;
    g.beginPath(); g.moveTo(cx, top); g.lineTo(cx - lw / 2, top + lh); g.stroke();
    // small inner shadow on the right edge for depth
    g.strokeStyle = 'rgba(0,0,0,0.35)';
    g.beginPath(); g.moveTo(cx, top); g.lineTo(cx + lw / 2, top + lh); g.stroke();
  }
}

  fir:  makeFirSprite(0),   fir1:  makeFirSprite(0),  fir2:  makeFirSprite(1),  fir3:  makeFirSprite(2),

function pickTreeKind(bias){
  // Stochastic variant pick — most bias type, occasional cross-pollinator.
  const variants = bias === 'pine' ? ['pine1','pine2','pine3'] : ['fir1','fir2','fir3'];
  return variants[(Math.random() * variants.length) | 0];
}

// ──────── track generation ────────
// Each segment carries: curve (lateral road shift), pitch (vertical),
// scenery list (sprites placed at this Z), and meta tag (start/finish).
const SEG_LEN = 200;            // world units per segment
const ROAD_W  = 1200;
const DRAW_DIST = 220;          // segments rendered ahead

const STAGES = [
  { name: 'Pine Woods',
    color: { sky:'#f7d28a', skyMid:'#e88c52', skyBot:'#3a2655',
             grass1:'#3a5a2a', grass2:'#4a7235',
             road1:'#3a3a3a', road2:'#454547', stripe:'#fff', shoulder:'#d1c08a',
             mountain:'#2c1d3a', haze:'#f5b56e' },
    sun: { x: 0.75, y: 0.18, color:'#ffeac0', size: 28, glow: 1.0 },   // dawn sun on the right
    fog: 0.05, ambient: 1.0, headlights: false,
    particle: 'pollen', particleColor:'#ffeec0',
    treeBias: 'pine', length: 720,
    bloom: 0.6 },
  { name: 'Misty Bend',
    color: { sky:'#dde9ee', skyMid:'#9fb1bf', skyBot:'#6e8094',
             grass1:'#3e5a3a', grass2:'#52755b',
             road1:'#36383c', road2:'#42444a', stripe:'#fff8d0', shoulder:'#a6a08a',
             mountain:'#7c8b9a', haze:'#cfdde6' },
    sun: { x: 0.5, y: 0.28, color:'#e8efff', size: 18, glow: 0.45 },
    fog: 0.7, ambient: 0.85, headlights: false,
    particle: 'mist', particleColor:'#e8efff',
    treeBias: 'fir', length: 760,
    bloom: 0.35 },
  { name: 'Ravine Run',
    color: { sky:'#1a0d2a', skyMid:'#5c1f3a', skyBot:'#9b3340',
             grass1:'#1f2812', grass2:'#2c361a',
             road1:'#1a1c20', road2:'#262830', stripe:'#ffd84a', shoulder:'#5a4a30',
             mountain:'#3a1424', haze:'#7a2f3a' },
    sun: { x: 0.18, y: 0.32, color:'#ffb05a', size: 22, glow: 0.85 },   // setting sun behind
    fog: 0.18, ambient: 0.55, headlights: true,
    particle: 'ember', particleColor:'#ff7a3e',
    treeBias: 'fir', length: 820,
    bloom: 0.9 },

let track = [];
function buildTrack(stageIdx){
  const stage = STAGES[stageIdx];
  track = [];
  const len = stage.length;
  // generator: alternating curve + pitch sections, with chicanes mid-stage
  let pos = 0;
  const push = (segs, curve=0, pitch=0) => {
    for (let i = 0; i < segs; i++){
      const t = i / segs;
      const eased = Math.sin(t * Math.PI);    // ease in/out
      track.push({
        curve: curve * eased,
        pitch: pitch * eased,
        scenery: [],
        special: null,
      });
      pos++;
    }
  };
  // start gantry
  push(8, 0, 0);
  track[0].special = 'start';

  // Procedural sections — varies per stage. CRASH FIX: previously this
  // loop terminated on `pos < len - 16` but `pos` is only mutated by
  // push() (which we call later, in a separate loop). So pos stayed at
  // 8 forever and the while ran indefinitely, hanging the browser the
  // moment a stage started. Now we track a separate `planned` counter
  // that grows as we plan sections, with a hard 200-iteration safety
  // ceiling as belt-and-braces.
  const sections = [];
  const rng = (() => { let s = 1234 + stageIdx * 9871; return () => { s = (s * 16807) % 2147483647; return s / 2147483647; }; })();
  let planned = pos;
  let safety = 200;
  while (planned < len - 16 && safety-- > 0){
    const r = rng();
    let added = 0;
    if (r < 0.35){
      const s = { segs: 24 + Math.floor(rng()*30), curve: (rng()-0.5) * 5.5, pitch: 0 };
      sections.push(s); added = s.segs;
    } else if (r < 0.55){
      const s = { segs: 30 + Math.floor(rng()*40), curve: (rng() < 0.5 ? -1 : 1) * (3 + rng()*3.5), pitch: 0 };
      sections.push(s); added = s.segs;
    } else if (r < 0.7){
      const s = { segs: 24, curve: (rng()<0.5?-1:1)*4, pitch: rng() < 0.5 ? -160 : 220 };
      sections.push(s); added = s.segs;
    } else if (r < 0.85){
      // chicane
      const c = (rng()<0.5?-1:1) * 5;
      const s1 = { segs: 14, curve: c, pitch: 0 };
      const s2 = { segs: 14, curve: -c * 0.8, pitch: 0 };
      sections.push(s1, s2);
      added = 28;
    } else {
      const s = { segs: 18 + Math.floor(rng()*8), curve: 0, pitch: 0 };
      sections.push(s); added = s.segs;
    }
    // breather
    const breather = { segs: 8 + Math.floor(rng()*10), curve: 0, pitch: 0 };
    sections.push(breather);
    added += breather.segs;
    planned += added;
  }
  for (const s of sections){
    if (pos + s.segs > len - 8) break;
    push(s.segs, s.curve, s.pitch);
  }
  // pad to length
  while (pos < len) push(1, 0, 0);
  // finish gantry — last 8 segments
  for (let i = 0; i < 8; i++) track[track.length - 1 - i].special = 'finish';
  // scatter scenery
  const trees = stage.treeBias;
  for (let i = 6; i < track.length - 6; i++){
    // trees on both sides — denser closer to road for the canyon feel
    if (Math.random() < 0.62){
      const side = Math.random() < 0.5 ? -1 : 1;
      const dist = 1.1 + Math.random() * 1.6;
      const kind = Math.random() < 0.85 ? pickTreeKind(trees) : pickTreeKind(trees === 'pine' ? 'fir' : 'pine');
      track[i].scenery.push({ kind, x: side * dist * ROAD_W * 0.8, scale: 0.9 + Math.random()*0.5 });
    }
    if (Math.random() < 0.7){
      const side = Math.random() < 0.5 ? -1 : 1;
      const dist = 2.2 + Math.random() * 3;
      track[i].scenery.push({ kind: pickTreeKind(trees), x: side * dist * ROAD_W * 0.8, scale: 0.9 + Math.random()*0.5 });
    }
    if (Math.random() < 0.18){
      const side = Math.random() < 0.5 ? -1 : 1;
      track[i].scenery.push({ kind: 'bush', x: side * 1.05 * ROAD_W * 0.8, scale: 1 });
    }
    if (Math.random() < 0.07){
      const side = Math.random() < 0.5 ? -1 : 1;
      track[i].scenery.push({ kind: 'rock', x: side * 1.2 * ROAD_W * 0.8, scale: 1 });
    }
    // pace notes / hazard signs at hard corners
    if (Math.abs(track[i].curve) > 4 && Math.random() < 0.25 && track[i].scenery.length < 2){
      track[i].scenery.push({ kind: 'sign', x: (track[i].curve > 0 ? -1 : 1) * 1.05 * ROAD_W * 0.8, scale: 1 });
    }
  }
  // finish line sign at the gantry start
  for (let i = track.length - 9; i < track.length - 1; i++){
    track[i].scenery = [];   // clear local scenery so the sign is unmissable
  }
  track[track.length - 9].scenery.push({ kind: 'finishSign', x: -1.0 * ROAD_W * 0.8, scale: 1.2 });
  track[track.length - 9].scenery.push({ kind: 'finishSign', x:  1.0 * ROAD_W * 0.8, scale: 1.2 });
}

function fmtTime(ms){
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const ds = Math.floor((ms % 1000) / 10);
  return `${m}:${String(s).padStart(2,'0')}.${String(ds).padStart(2,'0')}`;
}

function showBanner(text, sub, cls){
  const b = $('#banner');
  $('#bannerH2').textContent = text;
  $('#bannerH2').className = cls || '';
  $('#bannerSub').textContent = sub || '';
  b.classList.add('show');
}
function hideBanner(){ $('#banner').classList.remove('show'); }

function startStage(idx){
  game.stageIdx = idx;
  buildTrack(idx);
  car.x = 0; car.z = 0; car.speed = 0; car.steer = 0; car.rpm = 0; car.gear = 0; car.yaw = 0;
  game.phase = 'countdown';
  game.countdownT = 3.2;
  $('#stageId').textContent = `SS ${idx+1} / 3`;
  $('#stageName').textContent = STAGES[idx].name;
  showBanner(`STAGE ${idx+1}`, STAGES[idx].name);
  // dots
  const dots = $('#stageDots');
  dots.innerHTML = '';
  for (let i = 0; i < 3; i++){
    const s = document.createElement('span');
    s.className = 'seg' + (i < idx ? ' done' : i === idx ? ' now' : '');
    dots.appendChild(s);
  }
  if (audioOn) chime();
}

function finishStage(){
  game.phase = 'finished';
  game.finishT = 3.0;
  const t = performance.now() - game.startedAt;
  game.splits[game.stageIdx] = t;
  showBanner(`STAGE ${game.stageIdx+1} CLEAR`, fmtTime(t), 'green');
  if (audioOn) fanfare();
}

function nextStageOrFinale(){
  if (game.stageIdx + 1 < STAGES.length){
    startStage(game.stageIdx + 1);
  } else {
    game.phase = 'rallyComplete';
    const { isNewBest, total } = recordCompletedRun(game.splits);
    const headline = isNewBest ? 'NEW PERSONAL BEST' : 'RALLY COMPLETE';
    const sub = `total · ${fmtTime(total)} · driver #${(playerId||'').slice(-6)} · ${progress.runs} run${progress.runs===1?'':'s'}`;
    showBanner(headline, sub, isNewBest ? 'green' : 'blue');
    renderPlayerInfo();   // refresh title-screen card so it shows new best on next visit
  }
}

// ──────── physics ────────
function updateCar(dt){
  if (game.phase === 'countdown'){
    game.countdownT -= dt;
    if (game.countdownT <= 0){
      game.phase = 'racing';
      game.startedAt = performance.now();
      hideBanner();
    } else {
      // little 3-2-1-GO countdown via banner text
      const n = Math.ceil(game.countdownT);
      $('#bannerH2').textContent = n > 1 ? String(n - 1) : 'GO';
      $('#bannerH2').className = n <= 1 ? 'green' : '';
      $('#bannerSub').textContent = STAGES[game.stageIdx].name;
      $('#banner').classList.add('show');
      if (n !== updateCar._lastN){
        updateCar._lastN = n;
        if (audioOn) blip(n > 1 ? 440 : 880, 0.12, 'square', 0.1);
      }
    }
    return;
  }
  if (game.phase === 'finished'){
    game.finishT -= dt;
    car.speed *= Math.pow(0.92, dt * 60);
    if (game.finishT <= 0){
      hideBanner();
      nextStageOrFinale();
    }
    return;
  }
  if (game.phase !== 'racing') return;

  const throttle = pressed('ArrowUp','KeyW') ? 1 : 0;
  const brake = pressed('ArrowDown','KeyS') ? 1 : 0;
  const sl = pressed('ArrowLeft','KeyA') ? 1 : 0;
  const sr = pressed('ArrowRight','KeyD') ? 1 : 0;
  const handbrake = pressed('Space');

  // steer with smoothing
  const targetSteer = (sr ? 1 : 0) - (sl ? 1 : 0);
  car.steer += (targetSteer - car.steer) * Math.min(1, dt * 7);

  // Speed dynamics
  const offRoad = Math.abs(car.x) > 1;
  const accelRate = 1100;
  const dragCoef = offRoad ? 0.0009 : 0.00045;   // worse coast off-road
  const brakeRate = 2200;
  const handbrakeRate = 2700;
  if (throttle){
    car.speed += accelRate * dt;
  }
  if (brake){
    car.speed -= brakeRate * dt;
  }
  if (handbrake){
    car.speed -= handbrakeRate * dt;
  }
  // air drag + rolling friction
  car.speed -= car.speed * dragCoef * dt * 60;
  // off-road heavy slow
  if (offRoad) car.speed -= 320 * dt;
  car.speed = Math.max(0, Math.min(car.maxSpeed, car.speed));

  // current curve where car sits
  const segIdx = ((car.z / SEG_LEN) | 0) % track.length;
  const seg = track[segIdx] || track[0];
  // centripetal "push" on curves — at speed, car drifts outward on tight bends
  const centriPush = seg.curve * (car.speed / car.maxSpeed) * 0.0028;
  car.x += centriPush * dt * 60;

  // steering — at speed steering is sharper (within reason)
  const steerStrength = 1.4 * (0.4 + 0.6 * Math.min(1, car.speed / 800));
  car.x += car.steer * steerStrength * dt;

  // tire screech feedback
  const tireSlip = Math.abs(car.steer) * Math.min(1, car.speed / 1200) - (offRoad ? 0 : 0.2);
  if (tireSlip > 0.4) screech(tireSlip);

  // forward
  car.z += car.speed * dt;
  if (car.z >= track.length * SEG_LEN - SEG_LEN * 4){
    if (game.phase === 'racing') finishStage();
  }
  // clamp lateral so the car doesn't fly off the world entirely
  car.x = Math.max(-2, Math.min(2, car.x));

  // visual yaw (body tilt)
  const yawTarget = -car.steer * 0.18 - centriPush * 1.2;
  car.yaw += (yawTarget - car.yaw) * Math.min(1, dt * 8);

  // gearbox + rpm
  const speedFrac = car.speed / car.maxSpeed;
  car.gear = car.speed < 30 ? 0 : Math.max(1, Math.min(5, 1 + Math.floor(speedFrac * 5)));
  // rpm: ramps with speed, dips on shift, drops when off throttle
  const idealRpm = car.gear === 0 ? 0.18 : (((speedFrac * 5) % 1));
  const rpmTarget = throttle || handbrake ? Math.max(0.25, idealRpm * 0.85 + 0.2) : Math.max(0.12, idealRpm * 0.5);
  car.rpm += (rpmTarget - car.rpm) * Math.min(1, dt * 4.5);

  if (audioOn) setEngineRpm(car.rpm, throttle * 0.85 + (handbrake ? 0.4 : 0));
}

// ──────── particle system (atmospheric) ────────
const particles = [];
function spawnParticle(stage){
  if (particles.length > 100) return;
  const kind = stage.particle;
  if (kind === 'pollen'){
    particles.push({
      kind, x: Math.random() * BW, y: BH * 0.35 + Math.random() * BH * 0.45,
      vx: (Math.random() - 0.5) * 0.3, vy: -0.05 - Math.random() * 0.1,
      life: 1, size: 1 + Math.random(),
      color: stage.particleColor,
    });
  } else if (kind === 'mist'){
    particles.push({
      kind, x: Math.random() * BW, y: BH * 0.45 + Math.random() * BH * 0.4,
      vx: 0.4 + Math.random() * 0.3, vy: -0.04 + (Math.random() - 0.5) * 0.06,
      life: 1, size: 6 + Math.random() * 8,
      color: stage.particleColor,
    });
  } else if (kind === 'ember'){
    particles.push({
      kind, x: Math.random() * BW, y: BH * 0.45 + Math.random() * BH * 0.5,
      vx: -0.2 + (Math.random() - 0.5) * 0.4, vy: -0.15 - Math.random() * 0.25,
      life: 1, size: 1 + Math.random() * 1.5,
      color: stage.particleColor,
    });
  }
}
function tickParticles(dt, speedFrac){
  // spawn more when going faster (camera relative motion)
  const stage = STAGES[game.stageIdx];
  const stageSpawn = stage.particle === 'mist' ? 1.2 : 0.6;
  let n = stageSpawn + speedFrac * 1.4;
  while (n > 0){
    if (Math.random() < n) spawnParticle(stage);
    n -= 1;
  }
  for (let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    // forward motion drag — particles streak past as we accelerate
    p.x += p.vx + (p.x - BW/2) * 0.012 * speedFrac;
    p.y += p.vy + speedFrac * 0.6 * (p.y > BH * 0.5 ? 0.4 : 0.1);
    p.life -= dt * (p.kind === 'mist' ? 0.4 : 0.7);
    if (p.life <= 0 || p.x < -20 || p.x > BW + 20 || p.y < BH * 0.3 || p.y > BH + 8){
      particles.splice(i, 1);
    }
  }
}
function drawParticles(){
  for (const p of particles){
    bctx.globalAlpha = Math.max(0, Math.min(1, p.life));
    bctx.fillStyle = p.color;
    if (p.kind === 'mist'){
      bctx.globalAlpha *= 0.18;
      bctx.beginPath(); bctx.ellipse(p.x, p.y, p.size, p.size * 0.6, 0, 0, Math.PI*2); bctx.fill();
    } else {
      bctx.beginPath(); bctx.arc(p.x, p.y, p.size, 0, Math.PI*2); bctx.fill();
      // soft glow halo for embers + pollen
      if (p.kind === 'ember' || p.kind === 'pollen'){
        bctx.globalAlpha *= 0.4;
        bctx.beginPath(); bctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI*2); bctx.fill();
      }
    }
  }
  bctx.globalAlpha = 1;
}

// Sun + clouds + mountain silhouette layers
function drawSky(stage){
  const grad = bctx.createLinearGradient(0, 0, 0, BH * 0.7);
  grad.addColorStop(0, stage.color.sky);
  grad.addColorStop(0.55, stage.color.skyMid);
  grad.addColorStop(1, stage.color.skyBot);
  bctx.fillStyle = grad;
  bctx.fillRect(0, 0, BW, BH * 0.7);
  // sun
  const sx = BW * stage.sun.x, sy = BH * stage.sun.y;
  const sg = bctx.createRadialGradient(sx, sy, 1, sx, sy, stage.sun.size * 4);
  sg.addColorStop(0, stage.sun.color);
  sg.addColorStop(0.18, `rgba(255,220,160,${0.55 * stage.sun.glow})`);
  sg.addColorStop(0.5, `rgba(255,150,80,${0.18 * stage.sun.glow})`);
  sg.addColorStop(1, 'rgba(255,80,40,0)');
  bctx.fillStyle = sg;
  bctx.fillRect(0, 0, BW, BH * 0.7);
  // sun disc
  bctx.fillStyle = stage.sun.color;
  bctx.beginPath(); bctx.arc(sx, sy, stage.sun.size, 0, Math.PI*2); bctx.fill();
  // soft cloud bands (one drifting layer; cheap)
  bctx.globalAlpha = 0.22;
  bctx.fillStyle = stage.color.haze || '#ffffff';
  const t = performance.now() / 300;
  for (let i = 0; i < 4; i++){
    const cy = BH * 0.18 + i * 12;
    const cx = ((t * 6 + i * 80) % (BW + 200)) - 100;
    bctx.beginPath();
    bctx.ellipse(cx, cy, 50 + i*8, 6, 0, 0, Math.PI*2); bctx.fill();
    bctx.beginPath();
    bctx.ellipse(cx + 30, cy + 2, 30, 4, 0, 0, Math.PI*2); bctx.fill();
  }
  bctx.globalAlpha = 1;
}

function drawMountains(stage){
  // far ridge (lighter, with haze fade)
  bctx.fillStyle = stage.color.mountain;
  bctx.globalAlpha = 0.55;
  bctx.beginPath();
  bctx.moveTo(0, BH * 0.5);
  for (let x = 0; x <= BW; x += 8){
    const y = BH * 0.42 - Math.sin(x * 0.018) * 16 - Math.sin(x * 0.045 + 1.7) * 6;
    bctx.lineTo(x, y);
  }
  bctx.lineTo(BW, BH * 0.55); bctx.lineTo(0, BH * 0.55); bctx.closePath();
  bctx.fill();
  // close ridge (darker silhouette)
  bctx.globalAlpha = 0.85;
  bctx.fillStyle = '#1a0e22';
  bctx.beginPath();
  bctx.moveTo(0, BH * 0.55);
  for (let x = 0; x <= BW; x += 6){
    const y = BH * 0.5 - Math.sin(x * 0.03 + 0.5) * 10 - Math.sin(x * 0.09) * 3;
    bctx.lineTo(x, y);
  }
  bctx.lineTo(BW, BH * 0.6); bctx.lineTo(0, BH * 0.6); bctx.closePath();
  bctx.fill();
  bctx.globalAlpha = 1;
}

// Headlight cone — projected onto road from car's screen position
function drawHeadlights(stage){
  if (!stage.headlights) return;
  const cx = BW / 2;
  const cy = BH - 40;
  const grad = bctx.createRadialGradient(cx, cy, 4, cx, cy - 40, BW * 0.55);
  grad.addColorStop(0, 'rgba(255,240,200,0.6)');
  grad.addColorStop(0.35, 'rgba(255,220,150,0.25)');
  grad.addColorStop(1, 'rgba(255,200,120,0)');
  bctx.globalCompositeOperation = 'screen';
  bctx.fillStyle = grad;
  // cone polygon — narrow top, wide near car
  bctx.beginPath();
  bctx.moveTo(cx - 10, cy);
  bctx.lineTo(cx - BW * 0.45, BH * 0.45);
  bctx.lineTo(cx + BW * 0.45, BH * 0.45);
  bctx.lineTo(cx + 10, cy);
  bctx.closePath();
  bctx.fill();
  bctx.globalCompositeOperation = 'source-over';
}

// Lens flare emanating from sun position
function drawLensFlare(stage){
  if (stage.sun.glow < 0.3) return;
  const sx = BW * stage.sun.x, sy = BH * stage.sun.y;
  bctx.globalCompositeOperation = 'screen';
  // a few colored discs along the line from sun toward screen center
  const dx = BW/2 - sx, dy = BH/2 - sy;
  const flares = [
    { t: 0.25, r: 14, c: 'rgba(255,200,150,0.35)' },
    { t: 0.55, r: 8,  c: 'rgba(180,160,255,0.28)' },
    { t: 0.85, r: 18, c: 'rgba(255,220,150,0.22)' },
    { t: 1.1,  r: 6,  c: 'rgba(255,255,255,0.32)' },
  ];
  for (const f of flares){
    const x = sx + dx * f.t, y = sy + dy * f.t;
    const g = bctx.createRadialGradient(x, y, 1, x, y, f.r * 3);
    g.addColorStop(0, f.c); g.addColorStop(1, 'rgba(0,0,0,0)');
    bctx.fillStyle = g;
    bctx.beginPath(); bctx.arc(x, y, f.r * 3, 0, Math.PI*2); bctx.fill();
  }
  bctx.globalCompositeOperation = 'source-over';
}

// Speed lines streaking outward from a center point near the horizon
function drawSpeedLines(speedFrac){
  if (speedFrac < 0.35) return;
  const cx = BW/2, cy = BH * 0.55;
  bctx.strokeStyle = `rgba(255,255,255,${0.12 * speedFrac})`;
  bctx.lineWidth = 1;
  bctx.globalCompositeOperation = 'screen';
  const t = performance.now() / 60;
  for (let i = 0; i < 18; i++){
    const a = (i / 18) * Math.PI * 2 + t * 0.05;
    const r0 = 30 + (Math.sin(t + i) * 10);
    const r1 = r0 + 30 + speedFrac * 80;
    bctx.beginPath();
    bctx.moveTo(cx + Math.cos(a) * r0, cy + Math.sin(a) * r0 * 0.6);
    bctx.lineTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1 * 0.6);
    bctx.stroke();
  }
  bctx.globalCompositeOperation = 'source-over';
}

// Vignette + slight chromatic warmth on the corners
function drawVignette(stage){
  const grad = bctx.createRadialGradient(BW/2, BH * 0.55, BH * 0.2, BW/2, BH * 0.55, BH * 0.85);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, `rgba(0,0,0,${0.55 * (1 - stage.ambient * 0.5)})`);
  bctx.fillStyle = grad;
  bctx.fillRect(0, 0, BW, BH);
}

// Bloom/glow pass — copy the buffer, blur, additive composite back.
function drawBloom(stage){
  const amount = stage.bloom || 0.5;
  if (amount <= 0) return;
  gctx.clearRect(0, 0, BW, BH);
  gctx.filter = 'blur(4px) brightness(1.4)';
  gctx.drawImage(buf, 0, 0);
  gctx.filter = 'none';
  bctx.globalCompositeOperation = 'screen';
  bctx.globalAlpha = amount;
  bctx.drawImage(glowBuf, 0, 0);
  bctx.globalAlpha = 1;
  bctx.globalCompositeOperation = 'source-over';
}

// ──────── render ────────
function project(camX, camY, camZ, segWorldZ, segCurveX, segPitchY){
  // simple pseudo-3D projection
  const dz = segWorldZ - camZ;
  if (dz < 1) return null;
  const scale = cam.depth / dz;
  const sx = (BW/2) + scale * (segCurveX - camX) * BW/2;
  const sy = (BH/2) - scale * (segPitchY - camY) * BH/2;
  const w = scale * ROAD_W * BW/2;
  return { sx, sy, w, scale };
}

function renderScene(){
  if (game.phase === 'title'){
    const stage = STAGES[0];
    drawSky(stage);
    drawMountains(stage);
    drawLensFlare(stage);
    blit();
    return;
  }
  const stage = STAGES[game.stageIdx];

  // ─── Layer 1: sky + sun + clouds ───
  drawSky(stage);
  // ─── Layer 2: mountain silhouette band ───
  drawMountains(stage);

  // ground / road
  const camZ = car.z - 80;     // camera lags the car a touch
  const camX = car.x * ROAD_W * 0.5;
  const camY = cam.height;

  const baseSeg = ((camZ / SEG_LEN) | 0);

  // accumulated curve + pitch
  let curveX = 0, dCurveX = 0;
  let pitchY = 0, dPitchY = 0;

  let lastY = BH;
  let lastW = 0;
  let lastCx = 0;

  const sprites = [];   // collect to draw back-to-front

  for (let i = 0; i < DRAW_DIST; i++){
    const segIdx = baseSeg + i;
    if (segIdx < 0 || segIdx >= track.length) break;
    const seg = track[segIdx];
    const segZ = segIdx * SEG_LEN;

    dCurveX += seg.curve;
    curveX += dCurveX;
    dPitchY += seg.pitch * 0.06;
    pitchY += dPitchY;

    const p = project(camX, camY, camZ, segZ, curveX, pitchY);
    if (!p) continue;
    if (p.sy >= lastY) continue;     // skip back-facing slices

    const y0 = Math.floor(lastY);
    const y1 = Math.floor(p.sy);
    if (y1 < 0) break;

    const grassA = (segIdx >> 1) & 1 ? stage.color.grass1 : stage.color.grass2;
    const roadA  = (segIdx >> 1) & 1 ? stage.color.road1  : stage.color.road2;
    const shoulderA = stage.color.shoulder;

    // grass band — fill the whole strip width
    bctx.fillStyle = grassA;
    bctx.fillRect(0, y1, BW, y0 - y1);

    // road
    bctx.fillStyle = roadA;
    bctx.fillRect(Math.floor(p.sx - p.w/2), y1, Math.ceil(p.w), y0 - y1);

    // shoulders
    const shW = Math.max(2, p.w * 0.08);
    bctx.fillStyle = shoulderA;
    bctx.fillRect(Math.floor(p.sx - p.w/2 - shW*0.7), y1, Math.ceil(shW), y0 - y1);
    bctx.fillRect(Math.floor(p.sx + p.w/2 - shW*0.3), y1, Math.ceil(shW), y0 - y1);

    // dashed centerline (alternating segments)
    if ((segIdx >> 0) & 1){
      bctx.fillStyle = stage.color.stripe;
      const stripeW = Math.max(1, p.w * 0.025);
      bctx.fillRect(Math.floor(p.sx - stripeW/2), y1, Math.ceil(stripeW), y0 - y1);
    }

    // start/finish gantry banding
    if (seg.special === 'start' || seg.special === 'finish'){
      bctx.fillStyle = ((segIdx) & 1) ? '#fff' : '#000';
      bctx.fillRect(Math.floor(p.sx - p.w/2), y1, Math.ceil(p.w), y0 - y1);
    }

    // collect scenery sprites for this segment (back-to-front draw later)
    if (seg.scenery.length){
      for (const s of seg.scenery){
        const sp = SPR[s.kind];
        if (!sp) continue;
        const screenX = p.sx + (s.x / ROAD_W) * p.w;
        // Tuneable: at perspective scale=1 (right at camera) a tree
        // ~ this many pixels tall. Picked empirically for the new
        // 480×270 buffer + 80-tall sprites.
        const TREE_BASE_PX = 320;
        const drawH = p.scale * TREE_BASE_PX * (s.scale || 1);
        const drawW = (sp.width / sp.height) * drawH;
        sprites.push({
          z: segZ,
          img: sp,
          x: screenX - drawW/2,
          y: p.sy - drawH,
          w: drawW,
          h: drawH,
          scale: p.scale,
        });
      }
    }

    lastY = p.sy;
    lastW = p.w;
    lastCx = p.sx;
  }

  // sprites — back to front, with depth-fog tinting on far trees
  sprites.sort((a, b) => b.z - a.z);
  bctx.imageSmoothingEnabled = false;
  for (const s of sprites){
    if (s.w < 1 || s.h < 1) continue;
    if (s.x + s.w < 0 || s.x > BW) continue;
    bctx.drawImage(s.img, Math.floor(s.x), Math.floor(s.y), Math.ceil(s.w), Math.ceil(s.h));
    // depth fog tint — small far trees fade into the haze color
    if (s.scale < 0.05){
      bctx.globalAlpha = (1 - s.scale * 18) * (0.45 + stage.fog * 0.45);
      bctx.fillStyle = stage.color.haze || '#aac0d0';
      bctx.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.w), Math.ceil(s.h));
      bctx.globalAlpha = 1;
    }
  }

  // ─── tickle particles & draw mid-depth ───
  const speedFrac = car.speed / car.maxSpeed;
  tickParticles(0.016, speedFrac);
  drawParticles();

  // ─── headlight cone (only stages with lights ON) ───
  drawHeadlights(stage);

  // ─── fog: stronger volumetric band + subtle ground haze ───
  if (stage.fog > 0){
    const fg = bctx.createLinearGradient(0, BH * 0.42, 0, BH * 0.95);
    fg.addColorStop(0, `rgba(220,225,230,${stage.fog * 0.62})`);
    fg.addColorStop(0.5, `rgba(220,225,230,${stage.fog * 0.32})`);
    fg.addColorStop(1, `rgba(220,225,230,0)`);
    bctx.fillStyle = fg;
    bctx.fillRect(0, BH * 0.42, BW, BH * 0.55);
  }

  // ─── ambient tint: dim everything slightly on dim stages ───
  if (stage.ambient < 1){
    bctx.fillStyle = `rgba(20,12,28,${(1 - stage.ambient) * 0.55})`;
    bctx.fillRect(0, 0, BW, BH);
  }

  // ─── godrays / lens flare emanating from the sun ───
  drawLensFlare(stage);

  // ─── speed lines (kicks in at high speed) ───
  drawSpeedLines(speedFrac);

  // ─── bloom pass ───
  drawBloom(stage);

  // ─── vignette & corner darken ───
  drawVignette(stage);

  // ─── car (drawn last, fixed at bottom-center, with soft shadow) ───
  drawCarPixel(bctx, BW/2, BH - 50, car.steer, car.yaw, speedFrac, stage);

  blit();
}

function blit(){
  ctx.imageSmoothingEnabled = false;
  // letterbox-fit: scale BW×BH to fill while preserving aspect
  const scale = Math.max(W / BW, H / BH);
  const dW = BW * scale, dH = BH * scale;
  const dx = (W - dW) / 2, dy = (H - dH) / 2;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(buf, 0, 0, BW, BH, dx, dy, dW, dH);
}

// ──────── Lancer Evo–style pixel car ────────
// Drawn live each frame so we can yaw + steer without baking a sheet.
// Bigger now (matches the bumped buffer res), with brake lights, head-
// light spill on the road, and a dust trail kicking up at speed.
function drawCarPixel(g, cx, cy, steer, yaw, speedFrac, stage){
  // ─── road headlight spill — drawn BEFORE the car body so the body
  //     occludes it correctly. Two soft yellow ovals on the tarmac.
  if (stage && stage.headlights){
    g.save();
    g.translate(cx, cy + 30);
    g.globalCompositeOperation = 'screen';
    const sg = g.createRadialGradient(0, 0, 4, 0, -10, 80);
    sg.addColorStop(0, 'rgba(255,235,170,0.55)');
    sg.addColorStop(1, 'rgba(255,200,120,0)');
    g.fillStyle = sg;
    g.beginPath(); g.ellipse(-10, -8, 50, 22, 0, 0, Math.PI*2); g.fill();
    g.beginPath(); g.ellipse(10, -8, 50, 22, 0, 0, Math.PI*2); g.fill();
    g.globalCompositeOperation = 'source-over';
    g.restore();
  }
  // ─── dust trail kicked up behind the car (speed-scaled) ───
  if (speedFrac > 0.18){
    g.save();
    g.translate(cx, cy + 30);
    const t = performance.now() / 80;
    g.globalAlpha = 0.55 * speedFrac;
    g.fillStyle = '#a6926a';
    for (let i = 0; i < 5; i++){
      const ox = -32 + i * 14 + Math.sin(t + i) * 4 - steer * 14 * speedFrac;
      const oy = 4 + Math.cos(t * 1.2 + i) * 2;
      const r = 5 + Math.sin(t + i * 1.7) * 2;
      g.beginPath(); g.arc(ox, oy, r, 0, Math.PI*2); g.fill();
    }
    g.globalAlpha = 1;
    g.restore();
  }
  g.save();
  g.translate(cx, cy);
  g.rotate(yaw);
  const sBob = Math.sin(performance.now() / 90) * 0.6;
  g.translate(0, sBob);
  // shadow — bigger, softer, darker on bright stages
  g.globalAlpha = stage ? 0.55 + stage.ambient * 0.25 : 0.55;
  const ag = g.createRadialGradient(0, 14, 1, 0, 14, 60);
  ag.addColorStop(0, 'rgba(0,0,0,0.7)'); ag.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = ag;
  g.beginPath(); g.ellipse(0, 14, 56, 9, 0, 0, Math.PI*2); g.fill();
  g.globalAlpha = 1;
  // Scale up the car body for the bigger buffer (was tuned to 320×180).
  g.scale(1.5, 1.5);
  // ─ body — top-down rear-three-quarter view  ─
  // Lancer Evo livery: arctic white, royal blue + red rally stripes,
  // big front grille, rally lights, rear wing.
  // Rear wing
  g.fillStyle = '#0a0a0a';
  g.fillRect(-22, -16, 44, 3);
  g.fillStyle = '#1a1a1a';
  g.fillRect(-20, -16, 40, 1);
  // Body main — trapezoid (wider at front, narrower at back due to perspective)
  g.fillStyle = '#f3f6fa';                 // arctic white
  g.beginPath();
  g.moveTo(-26, -10);  // rear-left
  g.lineTo(26, -10);   // rear-right
  g.lineTo(28, 12);    // front-right
  g.lineTo(-28, 12);   // front-left
  g.closePath();
  g.fill();
  // Side shadow
  g.fillStyle = '#c8d0db';
  g.fillRect(-28, 8, 56, 4);
  // Roof / cabin (darker)
  g.fillStyle = '#2a3340';
  g.beginPath();
  g.moveTo(-18, -6); g.lineTo(18, -6); g.lineTo(20, 6); g.lineTo(-20, 6);
  g.closePath();
  g.fill();
  // Windscreen reflection
  g.fillStyle = '#7aa6d4';
  g.fillRect(-15, -3, 30, 4);
  // Rally stripes — blue + red down the middle
  g.fillStyle = '#1a4cb8';
  g.fillRect(-4, -10, 8, 22);
  g.fillStyle = '#d62a2a';
  g.fillRect(-2, -10, 4, 22);
  // Hood scoop
  g.fillStyle = '#0a0a0a';
  g.fillRect(-6, 4, 12, 4);
  g.fillStyle = '#1a1a1a';
  g.fillRect(-5, 5, 10, 2);
  // Front grille + headlights
  g.fillStyle = '#0a0a0a';
  g.fillRect(-10, 10, 20, 3);
  // Rally lights pod (4 round spotlights on the bumper)
  g.fillStyle = '#ffeb88';
  for (let i = -2; i <= 2; i += 2){
    g.beginPath(); g.arc(i*4, 12, 1.6, 0, Math.PI*2); g.fill();
  }
  // Wheel wells / tires
  g.fillStyle = '#000';
  g.fillRect(-30, -8, 4, 6);
  g.fillRect(26, -8, 4, 6);
  g.fillRect(-32, 6, 5, 8);
  g.fillRect(27, 6, 5, 8);
  // Wheel rims (gold rally rims)
  g.fillStyle = '#ffd84a';
  g.fillRect(-31, -7, 2, 4);
  g.fillRect(27, -7, 2, 4);
  g.fillRect(-31, 8, 3, 5);
  g.fillRect(28, 8, 3, 5);
  // mud-flap shadow on body
  g.fillStyle = 'rgba(0,0,0,0.25)';
  g.fillRect(-28, 11, 56, 1);
  // antenna whip
  g.strokeStyle = '#222';
  g.lineWidth = 0.8;
  g.beginPath(); g.moveTo(20, -10); g.lineTo(22, -16); g.stroke();
  // tail lights — always on a small red glow, brighter when braking
  const braking = !!keys['ArrowDown'] || !!keys['KeyS'] || !!keys['Space'];
  const brakeBright = braking ? 1 : 0.5;
  g.fillStyle = `rgba(255,40,40,${0.65 * brakeBright})`;
  g.fillRect(-22, -12, 6, 2);
  g.fillRect(16, -12, 6, 2);
  if (braking){
    // brake light bloom — extra red halo when pressed
    g.globalCompositeOperation = 'screen';
    const rg = g.createRadialGradient(-19, -11, 1, -19, -11, 10);
    rg.addColorStop(0, 'rgba(255,80,80,0.9)'); rg.addColorStop(1, 'rgba(255,30,30,0)');
    g.fillStyle = rg; g.fillRect(-30, -22, 18, 18);
    const rg2 = g.createRadialGradient(19, -11, 1, 19, -11, 10);
    rg2.addColorStop(0, 'rgba(255,80,80,0.9)'); rg2.addColorStop(1, 'rgba(255,30,30,0)');
    g.fillStyle = rg2; g.fillRect(12, -22, 18, 18);
    g.globalCompositeOperation = 'source-over';
  }
  g.restore();
}

// ──────── HUD update ────────
let lastHudUpdate = 0;
function updateHud(now){
  // throttle to ~20fps for cheaper DOM
  if (now - lastHudUpdate < 50) return;
  lastHudUpdate = now;
  const speedKmh = Math.round(car.speed * 0.12);   // world units → km/h fudge
  const speedEl = $('#speedEl');
  speedEl.textContent = String(speedKmh);
  speedEl.className = 'speed' + (speedKmh > 200 ? ' warn' : speedKmh > 140 ? ' good' : '');
  $('#gearEl').textContent = car.gear === 0 ? 'N' : `G ${car.gear}`;
  $('#tachFill').style.width = (car.rpm * 100).toFixed(0) + '%';
  // timer
  let tNow = 0;
  if (game.phase === 'racing') tNow = now - game.startedAt;
  else if (game.phase === 'finished' || game.phase === 'rallyComplete') tNow = (game.splits[game.stageIdx] || 0);
  $('#timerEl').textContent = fmtTime(tNow);
  const totalMs = game.splits.reduce((s,v) => s+v, 0) + (game.phase === 'racing' ? tNow : 0);
  $('#splitsEl').textContent = `total · ${fmtTime(totalMs)}`;
  // distance
  const distFrac = track.length ? Math.min(1, car.z / (track.length * SEG_LEN)) : 0;
  $('#distFill').style.width = (distFrac * 100).toFixed(1) + '%';
}

// ──────── main loop ────────
let last = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  if (game.phase !== 'title') updateCar(dt);
  renderScene();
  updateHud(now);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ──────── boot ────────
// Kick off per-player progress lookup early so the title screen shows
// the right driver + best time before they hit START. Failures inside
// initPlayer fall through to a guest UID — the game never blocks on it.
initPlayer().catch(err => {
  console.warn('[forest-rally] initPlayer failed:', err?.message || err);
  // last-resort: synthesize a session-only id so progress functions work
  if (!playerId){ playerId = 'session-' + Math.random().toString(36).slice(2, 10); renderPlayerInfo(); }
});

function startGame(){
  $('#title').classList.add('gone');
  setTimeout(() => $('#title').remove(), 500);
  ac();
  startEngine();
  startStage(0);
}
$('#goBtn').addEventListener('click', startGame);
window.addEventListener('keydown', (e) => {
  if (game.phase === 'title' && (e.code === 'Enter' || e.code === 'Space')){ e.preventDefault(); startGame(); }
  if (e.code === 'KeyR' && game.phase !== 'title'){
    e.preventDefault();
    startStage(0);
    game.splits = [];
  }
});

// also unlock audio on first canvas tap (for mobile)
cvs.addEventListener('pointerdown', () => {
  if (!audioOn){ ac(); startEngine(); }
});
</script>
