<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>One Dim Dungeon</title>
  <link rel="icon" href="https://emojicdn.elk.sh/⚔️">
  <meta property="og:title" content="One Dim Dungeon">
  <meta property="og:description" content="A single pixel. One line. Infinite enemies. Slash or die.">
  <meta property="og:url" content="https://sloppy.live/one-dim-dungeon">
  <meta property="og:image" content="https://sloppy.live/one-dim-dungeon/og-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      color: #c0c0c0;
      touch-action: none;
      user-select: none;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 32px;
      font-family: 'Silkscreen', cursive;
      font-size: 14px;
      color: #888;
      z-index: 10;
      pointer-events: none;
    }
    #hud span { letter-spacing: 1px; }
    #hud .val { color: #ff2266; }
    #hud .combo-val { color: #ffaa00; }
    #hud .depth-val { color: #00eeff; }
    #start-screen, #death-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(10,10,15,0.92);
    }
    #start-screen h1, #death-screen h1 {
      font-family: 'Silkscreen', cursive;
      font-size: clamp(28px, 6vw, 52px);
      color: #ff2266;
      text-shadow: 0 0 30px #ff226688, 0 0 60px #ff226644;
      margin-bottom: 8px;
    }
    #start-screen p, #death-screen p {
      font-size: clamp(12px, 2.5vw, 16px);
      color: #667;
      margin-bottom: 24px;
      text-align: center;
      padding: 0 20px;
      line-height: 1.6;
    }
    .btn {
      font-family: 'Silkscreen', cursive;
      font-size: 16px;
      padding: 12px 32px;
      background: transparent;
      border: 2px solid #ff2266;
      color: #ff2266;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all .2s;
    }
    .btn:hover { background: #ff2266; color: #0a0a0f; }
    #death-screen .final-score {
      font-family: 'Silkscreen', cursive;
      font-size: 42px;
      color: #ff2266;
      text-shadow: 0 0 20px #ff226688;
      margin: 8px 0;
    }
    #death-screen .final-depth {
      font-size: 16px;
      color: #00eeff;
      margin-bottom: 20px;
    }
    .controls-hint {
      font-size: 11px;
      color: #445;
      margin-top: 16px;
      text-align: center;
      line-height: 1.8;
    }
    #mobile-controls {
      position: fixed;
      bottom: 20px;
      left: 0; right: 0;
      display: none;
      justify-content: center;
      gap: 16px;
      z-index: 15;
      pointer-events: none;
    }
    .m-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid #ff226644;
      background: rgba(255,34,102,0.08);
      color: #ff2266;
      font-family: 'Silkscreen', cursive;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      -webkit-tap-highlight-color: transparent;
    }
    .m-btn:active { background: rgba(255,34,102,0.25); }
    .m-btn.atk { border-color: #ffaa0044; color: #ffaa00; background: rgba(255,170,0,0.08); }
    .m-btn.atk:active { background: rgba(255,170,0,0.25); }
    #backlink {
      position: fixed;
      bottom: 6px;
      right: 10px;
      font-size: 11px;
      color: #333;
      text-decoration: none;
      z-index: 10;
    }
    #backlink:hover { color: #ff2266; }
    @media (pointer: coarse) {
      #mobile-controls { display: flex; }
    }
  </style>
</head>
<body>
  <div id="hud">
    <span>SCORE <span class="val" id="hud-score">0</span></span>
    <span>COMBO <span class="combo-val" id="hud-combo">0</span></span>
    <span>DEPTH <span class="depth-val" id="hud-depth">0</span></span>
  </div>

  <canvas id="c"></canvas>

  <div id="mobile-controls">
    <div class="m-btn" id="btn-left">◀</div>
    <div class="m-btn atk" id="btn-atk">⚔</div>
    <div class="m-btn" id="btn-right">▶</div>
  </div>

  <div id="start-screen">
    <h1>ONE DIM DUNGEON</h1>
    <p>You are a single pixel. The dungeon is a line.<br>Slash through waves of enemies descending into darkness.</p>
    <button class="btn" id="start-btn">ENTER THE LINE</button>
    <div class="controls-hint">
      ← → or A/D to move &nbsp;|&nbsp; SPACE or K to slash<br>
      Mobile: on-screen buttons
    </div>
  </div>

  <div id="death-screen" style="display:none">
    <h1>FLATLINED</h1>
    <div class="final-score" id="final-score">0</div>
    <div class="final-depth" id="final-depth">Depth 0</div>
    <button class="btn" id="retry-btn">RETRY</button>
  </div>

  <a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

/* ── Sizing ── */
let W, H, LINE_Y, GROUND_THICK;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  LINE_Y = Math.floor(H * 0.62);
  GROUND_THICK = 2;
}
resize();
window.addEventListener('resize', resize);

/* ── Game State ── */
let state = 'menu'; // menu | play | dead
let score = 0, combo = 0, maxCombo = 0, depth = 0;
let camX = 0; // camera offset (scrolls right as depth increases)
let shakeT = 0, slowT = 0;
let frame = 0;

/* ── Player ── */
const P = {
  x: 200, vx: 0, size: 6,
  speed: 4.5, facing: 1, // 1=right, -1=left
  hp: 3, maxHp: 3,
  slashing: false, slashT: 0, slashDur: 12, slashCooldown: 0,
  slashRange: 60, slashWidth: 8,
  iFrames: 0,
  trail: [] // position trail for afterimage
};

/* ── Enemies ── */
let enemies = [];
const ENEMY_TYPES = {
  grunt:   { color: '#ff4444', size: 5, speed: 1.2, hp: 1, pts: 10, glow: '#ff444488' },
  brute:   { color: '#ff8800', size: 8, speed: 0.7, hp: 3, pts: 30, glow: '#ff880088' },
  phantom: { color: '#aa44ff', size: 4, speed: 2.5, hp: 1, pts: 20, glow: '#aa44ff88' },
  skull:   { color: '#00ff88', size: 6, speed: 1.8, hp: 2, pts: 25, glow: '#00ff8888' },
};

/* ── Particles ── */
let particles = [];
let slashTrails = [];
let bgParticles = [];

// Ambient background particles
function initBgParticles() {
  bgParticles = [];
  for (let i = 0; i < 40; i++) {
    bgParticles.push({
      x: Math.random() * W * 3, y: Math.random() * H,
      size: Math.random() * 1.5 + 0.5,
      speed: Math.random() * 0.3 + 0.1,
      alpha: Math.random() * 0.3 + 0.05,
      hue: Math.random() * 60 + 330 // pinkish-red range
    });
  }
}
initBgParticles();

/* ── Spawning ── */
let spawnTimer = 0;
let spawnRate = 90; // frames between spawns
let waveNum = 0;

function spawnEnemy() {
  const types = Object.keys(ENEMY_TYPES);
  // Weighted by depth
  let pool = ['grunt', 'grunt', 'grunt'];
  if (depth > 300) pool.push('phantom', 'phantom');
  if (depth > 600) pool.push('brute', 'skull');
  if (depth > 1200) pool.push('phantom', 'skull', 'skull');
  if (depth > 2000) pool.push('brute', 'brute');
  const key = pool[Math.floor(Math.random() * pool.length)];
  const t = ENEMY_TYPES[key];
  // Spawn ahead of camera or behind
  const side = Math.random() < 0.7 ? 1 : -1;
  const dist = W * 0.55 + Math.random() * W * 0.3;
  enemies.push({
    x: P.x + side * dist,
    vx: 0, type: key,
    ...t, baseSpeed: t.speed,
    hp: t.hp + Math.floor(depth / 2000),
    flashT: 0
  });
}

/* ── Input ── */
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code === 'Space' || e.code === 'KeyK') && state === 'play') {
    e.preventDefault();
    trySlash();
  }
  if (e.code === 'Space' || e.code === 'Enter') {
    if (state === 'menu') startGame();
    else if (state === 'dead') startGame();
  }
});
window.addEventListener('keyup', e => keys[e.code] = false);

// Mobile
document.getElementById('btn-left').addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowLeft'] = true; });
document.getElementById('btn-left').addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; });
document.getElementById('btn-right').addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; });
document.getElementById('btn-right').addEventListener('touchend', e => { e.preventDefault(); keys['ArrowRight'] = false; });
document.getElementById('btn-atk').addEventListener('touchstart', e => { e.preventDefault(); if (state === 'play') trySlash(); });

document.getElementById('start-btn').onclick = startGame;
document.getElementById('retry-btn').onclick = startGame;

function trySlash() {
  if (P.slashCooldown > 0 || P.slashing) return;
  P.slashing = true;
  P.slashT = P.slashDur;
  P.slashCooldown = 18;
  // Slash trail effect
  slashTrails.push({
    x: P.x, facing: P.facing,
    range: P.slashRange, t: 10, maxT: 10
  });
}

/* ── Game Flow ── */
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('death-screen').style.display = 'none';
  state = 'play';
  score = 0; combo = 0; maxCombo = 0; depth = 0;
  camX = 0; frame = 0; shakeT = 0; slowT = 0;
  P.x = 200; P.vx = 0; P.hp = P.maxHp; P.facing = 1;
  P.slashing = false; P.slashT = 0; P.slashCooldown = 0;
  P.iFrames = 0; P.trail = [];
  enemies = []; particles = []; slashTrails = [];
  spawnTimer = 60; spawnRate = 90; waveNum = 0;
}

function die() {
  state = 'dead';
  shakeT = 20;
  // Death explosion
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: P.x, y: LINE_Y,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12,
      life: 40 + Math.random() * 30,
      maxLife: 70, size: Math.random() * 4 + 1,
      color: `hsl(${340 + Math.random() * 40}, 100%, ${50 + Math.random() * 30}%)`
    });
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-depth').textContent = `Depth ${depth} · Max Combo ×${maxCombo}`;
  setTimeout(() => {
    document.getElementById('death-screen').style.display = 'flex';
  }, 800);
}

/* ── Update ── */
function update() {
  if (state !== 'play') return;
  frame++;

  // Slow-motion effect on big kills
  if (slowT > 0) { slowT--; if (frame % 2 !== 0) return; }

  // ── Player movement ──
  let moveDir = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveDir = -1;
  if (keys['ArrowRight'] || keys['KeyD']) moveDir = 1;
  if (moveDir !== 0) P.facing = moveDir;

  P.vx = moveDir * P.speed;
  P.x += P.vx;
  depth = Math.max(depth, Math.floor(P.x / 10));

  // Camera follows player
  const targetCam = P.x - W * 0.35;
  camX += (targetCam - camX) * 0.08;

  // Trail
  P.trail.unshift(P.x);
  if (P.trail.length > 8) P.trail.pop();

  // Slash timing
  if (P.slashT > 0) P.slashT--;
  if (P.slashT === 0) P.slashing = false;
  if (P.slashCooldown > 0) P.slashCooldown--;
  if (P.iFrames > 0) P.iFrames--;

  // ── Slash hit detection ──
  if (P.slashing && P.slashT === P.slashDur - 2) {
    const slashStart = P.x;
    const slashEnd = P.x + P.facing * P.slashRange;
    const sMin = Math.min(slashStart, slashEnd);
    const sMax = Math.max(slashStart, slashEnd);

    let hitAny = false;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.x >= sMin - e.size && e.x <= sMax + e.size) {
        e.hp--;
        e.flashT = 6;
        if (e.hp <= 0) {
          // Kill!
          hitAny = true;
          combo++;
          if (combo > maxCombo) maxCombo = combo;
          const comboMult = Math.min(combo, 10);
          score += e.pts * comboMult;
          // Kill particles
          const hue = e.color.includes('ff44') ? 0 : e.color.includes('ff88') ? 30 :
                      e.color.includes('aa44') ? 270 : 150;
          for (let j = 0; j < 20; j++) {
            particles.push({
              x: e.x, y: LINE_Y,
              vx: (Math.random() - 0.5) * 8,
              vy: (Math.random() - 1) * 6,
              life: 20 + Math.random() * 20,
              maxLife: 40, size: Math.random() * 3 + 1,
              color: `hsl(${hue + Math.random() * 30}, 100%, ${50 + Math.random() * 40}%)`
            });
          }
          enemies.splice(i, 1);
          if (combo >= 5) slowT = 4;
        } else {
          // Hit but not dead — knockback
          e.x += P.facing * 20;
        }
      }
    }
    if (!hitAny && combo > 0) {
      // Whiff with active combo — no reset until enemy touches you
    }
  }

  // ── Enemy AI ──
  for (const e of enemies) {
    const dir = P.x > e.x ? 1 : -1;
    // Speed scales slightly with depth
    const speedMult = 1 + depth / 5000;
    e.vx = dir * e.baseSpeed * speedMult;
    e.x += e.vx;
    if (e.flashT > 0) e.flashT--;

    // Collision with player
    if (Math.abs(e.x - P.x) < e.size + P.size && P.iFrames <= 0) {
      P.hp--;
      P.iFrames = 45;
      combo = 0;
      shakeT = 8;
      // Hit particles
      for (let j = 0; j < 12; j++) {
        particles.push({
          x: P.x, y: LINE_Y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 1) * 5,
          life: 15 + Math.random() * 10,
          maxLife: 25, size: Math.random() * 2 + 1,
          color: '#ff2266'
        });
      }
      if (P.hp <= 0) { die(); return; }
    }
  }

  // Clean up far-away enemies
  enemies = enemies.filter(e => Math.abs(e.x - P.x) < W * 1.5);

  // ── Spawning ──
  spawnTimer--;
  if (spawnTimer <= 0) {
    const count = 1 + Math.floor(depth / 800);
    for (let i = 0; i < Math.min(count, 5); i++) spawnEnemy();
    // Difficulty curve
    spawnRate = Math.max(25, 90 - Math.floor(depth / 50));
    spawnTimer = spawnRate + Math.floor(Math.random() * 20);
    waveNum++;
  }

  // ── Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15; // gravity
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Slash trails
  for (let i = slashTrails.length - 1; i >= 0; i--) {
    slashTrails[i].t--;
    if (slashTrails[i].t <= 0) slashTrails.splice(i, 1);
  }

  // HUD
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-combo').textContent = combo > 1 ? `×${combo}` : '0';
  document.getElementById('hud-depth').textContent = depth;
}

/* ── Render ── */
function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Screen shake
  let ox = 0, oy = 0;
  if (shakeT > 0) {
    ox = (Math.random() - 0.5) * shakeT * 1.5;
    oy = (Math.random() - 0.5) * shakeT * 1.5;
    shakeT--;
  }
  ctx.save();
  ctx.translate(ox, oy);

  const cx = camX; // camera x

  // ── Background ambient particles ──
  for (const bp of bgParticles) {
    const sx = ((bp.x - cx * bp.speed * 0.5) % (W * 1.5) + W * 1.5) % (W * 1.5);
    ctx.fillStyle = `hsla(${bp.hue}, 60%, 50%, ${bp.alpha})`;
    ctx.fillRect(sx, bp.y, bp.size, bp.size);
    bp.x += bp.speed * 0.2;
  }

  // ── Dungeon floor line ──
  // Glow
  const grad = ctx.createLinearGradient(0, LINE_Y - 8, 0, LINE_Y + 8);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(0.5, 'rgba(255,34,102,0.15)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, LINE_Y - 8, W, 16);

  // Main line
  ctx.fillStyle = '#331122';
  ctx.fillRect(0, LINE_Y - 1, W, GROUND_THICK + 2);

  // Depth markers
  const markerSpacing = 200;
  const startMarker = Math.floor(cx / markerSpacing) * markerSpacing;
  ctx.fillStyle = '#221118';
  ctx.font = '9px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  for (let mx = startMarker; mx < cx + W + markerSpacing; mx += markerSpacing) {
    const sx = mx - cx;
    ctx.fillStyle = '#ff226622';
    ctx.fillRect(sx, LINE_Y + 2, 1, 8);
    ctx.fillStyle = '#442233';
    ctx.fillText(Math.floor(mx / 10), sx, LINE_Y + 22);
  }

  // ── HP pips ──
  for (let i = 0; i < P.maxHp; i++) {
    const px = 14 + i * 18;
    const py = LINE_Y - 40;
    ctx.fillStyle = i < P.hp ? '#ff2266' : '#331122';
    ctx.shadowColor = i < P.hp ? '#ff2266' : 'transparent';
    ctx.shadowBlur = i < P.hp ? 8 : 0;
    ctx.fillRect(px, py, 10, 10);
    ctx.shadowBlur = 0;
  }

  // ── Slash trails ──
  for (const s of slashTrails) {
    const progress = 1 - s.t / s.maxT;
    const alpha = 1 - progress;
    const sx = s.x - cx;
    const len = s.range * progress;
    const grd = ctx.createLinearGradient(sx, LINE_Y, sx + s.facing * len, LINE_Y);
    grd.addColorStop(0, `rgba(255,170,0,${alpha * 0.9})`);
    grd.addColorStop(0.5, `rgba(255,255,100,${alpha * 0.7})`);
    grd.addColorStop(1, `rgba(255,170,0,0)`);
    ctx.fillStyle = grd;
    ctx.fillRect(
      Math.min(sx, sx + s.facing * len),
      LINE_Y - 6 - progress * 4,
      Math.abs(len),
      12 + progress * 8
    );
    // Bright core
    ctx.fillStyle = `rgba(255,255,200,${alpha * 0.6})`;
    ctx.fillRect(
      Math.min(sx, sx + s.facing * len),
      LINE_Y - 2,
      Math.abs(len),
      4
    );
  }

  // ── Enemies ──
  for (const e of enemies) {
    const ex = e.x - cx;
    if (ex < -50 || ex > W + 50) continue;

    // Glow
    ctx.shadowColor = e.glow;
    ctx.shadowBlur = 12;

    // Flash white on hit
    const col = e.flashT > 0 ? '#ffffff' : e.color;
    ctx.fillStyle = col;

    // Different shapes per type
    if (e.type === 'grunt') {
      ctx.fillRect(ex - e.size, LINE_Y - e.size, e.size * 2, e.size * 2);
    } else if (e.type === 'brute') {
      // Diamond
      ctx.beginPath();
      ctx.moveTo(ex, LINE_Y - e.size);
      ctx.lineTo(ex + e.size, LINE_Y);
      ctx.lineTo(ex, LINE_Y + e.size);
      ctx.lineTo(ex - e.size, LINE_Y);
      ctx.fill();
    } else if (e.type === 'phantom') {
      // Flickering circle
      const flicker = Math.sin(frame * 0.3 + e.x) * 0.3 + 0.7;
      ctx.globalAlpha = flicker;
      ctx.beginPath();
      ctx.arc(ex, LINE_Y, e.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (e.type === 'skull') {
      // Triangle
      ctx.beginPath();
      ctx.moveTo(ex - e.size, LINE_Y + e.size);
      ctx.lineTo(ex, LINE_Y - e.size);
      ctx.lineTo(ex + e.size, LINE_Y + e.size);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  // ── Player ──
  if (state === 'play' || state === 'dead') {
    const px = P.x - cx;

    // Afterimage trail
    for (let i = 0; i < P.trail.length; i++) {
      const tx = P.trail[i] - cx;
      const a = (1 - i / P.trail.length) * 0.25;
      ctx.fillStyle = `rgba(255,34,102,${a})`;
      const s = P.size * (1 - i / P.trail.length * 0.4);
      ctx.fillRect(tx - s, LINE_Y - s, s * 2, s * 2);
    }

    // Player pixel — blink during iFrames
    if (P.iFrames <= 0 || frame % 4 < 2) {
      ctx.shadowColor = '#ff2266';
      ctx.shadowBlur = P.slashing ? 20 : 10;
      ctx.fillStyle = P.slashing ? '#ffdd44' : '#ff2266';
      ctx.fillRect(px - P.size, LINE_Y - P.size, P.size * 2, P.size * 2);
      ctx.shadowBlur = 0;

      // Facing indicator
      ctx.fillStyle = '#ffffff';
      const eyeX = px + P.facing * 2;
      ctx.fillRect(eyeX - 1, LINE_Y - 2, 2, 2);
    }

    // Active slash arc
    if (P.slashing) {
      const progress = 1 - P.slashT / P.slashDur;
      const arcLen = P.slashRange * progress;
      ctx.strokeStyle = `rgba(255,200,50,${1 - progress})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(px, LINE_Y);
      ctx.lineTo(px + P.facing * arcLen, LINE_Y - 10 * Math.sin(progress * Math.PI));
      ctx.stroke();
      ctx.lineWidth = 1;
    }
  }

  // ── Particles ──
  for (const p of particles) {
    const px = p.x - cx;
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillRect(px - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // ── Combo display ──
  if (combo >= 3) {
    const px = P.x - cx;
    const pulse = Math.sin(frame * 0.15) * 0.2 + 0.8;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffaa00';
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 10;
    ctx.font = `bold ${16 + combo}px "Silkscreen", cursive`;
    ctx.textAlign = 'center';
    ctx.fillText(`×${combo}`, px, LINE_Y - 30);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

/* ── Loop ── */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
