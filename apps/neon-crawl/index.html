<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Crawl</title>
<link rel="icon" href="https://emojicdn.elk.sh/🗡️">
<meta property="og:title" content="Neon Crawl">
<meta property="og:description" content="First-person dungeon crawler with raycasting, D20 combat, and neon wireframe monsters.">
<meta property="og:url" content="https://sloppy.live/neon-crawl/">
<meta property="og:image" content="https://sloppy.live/neon-crawl/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;cursor:crosshair;touch-action:none}
canvas{display:block}
#hud{position:fixed;bottom:0;left:0;right:0;z-index:10;pointer-events:none}
#hud-bar{display:flex;align-items:flex-end;justify-content:space-between;padding:8px 14px;background:linear-gradient(transparent,rgba(0,0,0,.8) 40%)}
#hp-wrap{display:flex;flex-direction:column;gap:2px}
#hp-label{font-size:9px;color:rgba(255,50,80,.6);letter-spacing:2px}
#hp-bar{width:140px;height:10px;background:rgba(255,50,80,.1);border:1px solid rgba(255,50,80,.2);border-radius:2px;overflow:hidden}
#hp-fill{height:100%;background:linear-gradient(90deg,#ff3250,#ff6080);transition:width .3s;border-radius:1px}
#stats{text-align:center;font-size:10px;color:rgba(0,230,255,.5);line-height:1.6}
#stats .big{font-family:'Press Start 2P',monospace;font-size:12px;color:#0ef}
#minimap-wrap{width:90px;height:90px;border:1px solid rgba(0,230,255,.12);background:rgba(0,0,0,.6);border-radius:3px}
#minimap{display:block}
#combat-log{position:fixed;top:10px;left:10px;z-index:10;pointer-events:none;max-width:320px}
.clog{font-size:10px;padding:2px 0;animation:cFade 4s forwards;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.clog.hit{color:#ff6a00}.clog.miss{color:#666}.clog.crit{color:#ff0;font-weight:bold}
.clog.kill{color:#0f0}.clog.dmg{color:#f33}.clog.info{color:#0af}.clog.heal{color:#0f8}
@keyframes cFade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:none;color:rgba(0,230,255,.3);font-size:20px}
#death-screen{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#death-screen h1{font-family:'Press Start 2P',monospace;font-size:20px;color:#f33;text-shadow:0 0 20px #f33}
#death-screen p{color:#888;font-size:12px}
#death-screen button{background:rgba(255,50,80,.1);border:1px solid #f33;color:#f33;font-family:'Press Start 2P',monospace;font-size:11px;padding:10px 24px;cursor:pointer;border-radius:4px}
#death-screen button:hover{background:rgba(255,50,80,.2);box-shadow:0 0 16px rgba(255,50,80,.3)}
#touch-controls{position:fixed;bottom:80px;left:0;right:0;z-index:15;display:none;justify-content:space-between;padding:0 16px;pointer-events:none}
.touch-pad{display:flex;gap:4px;pointer-events:auto;flex-wrap:wrap;width:120px}
.touch-pad.right{justify-content:flex-end}
.tbtn{width:44px;height:44px;background:rgba(0,230,255,.06);border:1px solid rgba(0,230,255,.15);border-radius:6px;color:rgba(0,230,255,.4);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none}
.tbtn:active{background:rgba(0,230,255,.15);border-color:rgba(0,230,255,.4)}
#backlink{position:fixed;top:8px;right:10px;color:rgba(255,255,255,.06);font-size:9px;text-decoration:none;z-index:10}
#backlink:hover{color:rgba(0,230,255,.3)}
@media(max-width:768px){#touch-controls{display:flex}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="crosshair">+</div>
<div id="combat-log"></div>
<div id="hud"><div id="hud-bar">
  <div id="hp-wrap"><div id="hp-label">HP</div><div id="hp-bar"><div id="hp-fill" style="width:100%"></div></div></div>
  <div id="stats"><span class="big">FLOOR 1</span><br>LVL 1 · AC 12 · ATK +3</div>
  <div id="minimap-wrap"><canvas id="minimap" width="90" height="90"></canvas></div>
</div></div>
<div id="touch-controls">
  <div class="touch-pad left">
    <div style="width:44px"></div><div class="tbtn" data-key="w">▲</div><div style="width:44px"></div>
    <div class="tbtn" data-key="a">◀</div><div class="tbtn" data-key="s">▼</div><div class="tbtn" data-key="d">▶</div>
  </div>
  <div class="touch-pad right">
    <div class="tbtn" data-key="atk" style="width:70px;font-size:11px">⚔ ATK</div>
  </div>
</div>
<div id="death-screen"><h1>YOU DIED</h1><p id="death-stats"></p><button onclick="restartGame()">RESPAWN</button></div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
const MM=document.getElementById('minimap'),MX=MM.getContext('2d');
let W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// === CONSTANTS ===
const TILE=1,FOV=Math.PI/3,RAY_COUNT_RATIO=2;
const MOVE_SPD=0.04,ROT_SPD=0.04;

// === MAP GENERATION ===
function genMap(w,h,floor){
  const m=Array.from({length:h},()=>Array(w).fill(1));
  // carve rooms
  const rooms=[];
  const rCount=4+Math.floor(floor*0.5);
  for(let i=0;i<rCount*10&&rooms.length<rCount;i++){
    const rw=3+Math.floor(Math.random()*4);
    const rh=3+Math.floor(Math.random()*4);
    const rx=1+Math.floor(Math.random()*(w-rw-2));
    const ry=1+Math.floor(Math.random()*(h-rh-2));
    let ok=true;
    for(const r of rooms){
      if(rx-1<r.x+r.w&&rx+rw+1>r.x&&ry-1<r.y+r.h&&ry+rh+1>r.y){ok=false;break;}
    }
    if(!ok)continue;
    rooms.push({x:rx,y:ry,w:rw,h:rh});
    for(let y=ry;y<ry+rh;y++)for(let x=rx;x<rx+rw;x++)m[y][x]=0;
  }
  // connect rooms with corridors
  for(let i=1;i<rooms.length;i++){
    let cx=Math.floor(rooms[i-1].x+rooms[i-1].w/2);
    let cy=Math.floor(rooms[i-1].y+rooms[i-1].h/2);
    const tx=Math.floor(rooms[i].x+rooms[i].w/2);
    const ty=Math.floor(rooms[i].y+rooms[i].h/2);
    while(cx!==tx){m[cy][cx]=0;cx+=cx<tx?1:-1;}
    while(cy!==ty){m[cy][cx]=0;cy+=cy<ty?1:-1;}
    m[cy][cx]=0;
  }
  return{map:m,rooms,w,h};
}

// === MONSTERS ===
const MONSTER_TYPES=[
  {name:'Wraith',hp:8,ac:10,atk:2,dmg:[1,4],color:'#0ef',xp:15,shape:'wraith'},
  {name:'Skeleton',hp:12,ac:12,atk:3,dmg:[1,6],color:'#ff6a00',xp:25,shape:'skeleton'},
  {name:'Demon',hp:20,ac:14,atk:5,dmg:[2,6],color:'#f33',xp:50,shape:'demon'},
  {name:'Lich',hp:30,ac:16,atk:7,dmg:[2,8],color:'#d0f',xp:100,shape:'lich'},
  {name:'Slime',hp:6,ac:8,atk:1,dmg:[1,3],color:'#0f8',xp:10,shape:'slime'},
];

function spawnMonsters(dungeon,floor){
  const mons=[];
  const count=3+Math.floor(floor*1.5);
  const types=MONSTER_TYPES.filter((_,i)=>i<=Math.min(4,floor));
  for(let i=0;i<count;i++){
    const room=dungeon.rooms[1+Math.floor(Math.random()*(dungeon.rooms.length-1))];
    if(!room)continue;
    const t=types[Math.floor(Math.random()*types.length)];
    const mx=room.x+1+Math.random()*(room.w-2);
    const my=room.y+1+Math.random()*(room.h-2);
    mons.push({...t,hp:t.hp+floor*2,maxHp:t.hp+floor*2,x:mx+0.5,y:my+0.5,
      angle:Math.random()*Math.PI*2,aggro:false,atTimer:0,moveT:Math.random()*100,alive:true});
  }
  return mons;
}

// === GAME STATE ===
let player,dungeon,monsters,floor,items;
let keys={},attacking=false,atkCooldown=0;
let gameOver=false,kills=0,totalXp=0;

function initGame(){
  floor=1;kills=0;totalXp=0;gameOver=false;
  document.getElementById('death-screen').style.display='none';
  newFloor();
}

function newFloor(){
  const size=16+floor*2;
  dungeon=genMap(size,size,floor);
  const startRoom=dungeon.rooms[0];
  player={
    x:startRoom.x+startRoom.w/2+0.5,
    y:startRoom.y+startRoom.h/2+0.5,
    angle:0,
    hp:player?Math.min(player.hp+10,player.maxHp):30,
    maxHp:player?player.maxHp:30,
    ac:12+Math.floor(totalXp/150),
    atk:3+Math.floor(totalXp/100),
    dmgDie:6+Math.floor(totalXp/200)*2,
    level:1+Math.floor(totalXp/100),
  };
  monsters=spawnMonsters(dungeon,floor);
  // place exit stairs in last room
  const exitRoom=dungeon.rooms[dungeon.rooms.length-1];
  items=[{type:'stairs',x:exitRoom.x+Math.floor(exitRoom.w/2)+0.5,y:exitRoom.y+Math.floor(exitRoom.h/2)+0.5}];
  // health potions
  for(let i=0;i<2;i++){
    const r=dungeon.rooms[1+Math.floor(Math.random()*(dungeon.rooms.length-2))];
    if(r)items.push({type:'potion',x:r.x+1+Math.random()*(r.w-2)+0.5,y:r.y+1+Math.random()*(r.h-2)+0.5});
  }
  updateHUD();
  clog('Descended to Floor '+floor,'info');
}

// === D20 COMBAT ===
function d(sides){return 1+Math.floor(Math.random()*sides);}
function rollAtk(atkBonus,targetAC){
  const roll=d(20);
  const crit=roll===20;
  const hit=crit||roll+atkBonus>=targetAC;
  return{roll,hit,crit};
}
function rollDmg(count,die,crit){
  let total=0;
  const mult=crit?2:1;
  for(let i=0;i<count*mult;i++)total+=d(die);
  return Math.max(1,total);
}

function playerAttack(){
  if(atkCooldown>0)return;
  atkCooldown=20;
  // find closest monster in front
  let best=null,bestDist=3;
  for(const m of monsters){
    if(!m.alive)continue;
    const dx=m.x-player.x,dy=m.y-player.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>bestDist)continue;
    const ang=Math.atan2(dy,dx);
    let diff=ang-player.angle;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    if(Math.abs(diff)<FOV/2&&dist<bestDist){bestDist=dist;best=m;}
  }
  if(!best){clog('Swing at air...','miss');return;}
  const r=rollAtk(player.atk,best.ac);
  if(r.hit){
    const dmg=rollDmg(1,player.dmgDie,r.crit);
    best.hp-=dmg;
    clog((r.crit?'CRIT! ':'')+'d20='+r.roll+'+'+player.atk+' vs AC'+best.ac+' → '+dmg+' dmg to '+best.name,r.crit?'crit':'hit');
    if(best.hp<=0){
      best.alive=false;kills++;totalXp+=best.xp;
      clog(best.name+' destroyed! +'+best.xp+'xp','kill');
      player.level=1+Math.floor(totalXp/100);
      player.atk=3+Math.floor(totalXp/100);
      player.ac=12+Math.floor(totalXp/150);
      player.dmgDie=6+Math.floor(totalXp/200)*2;
      updateHUD();
    }
  } else {
    clog('d20='+r.roll+'+'+player.atk+' vs AC'+best.ac+' — Miss!','miss');
  }
}

function monsterAttack(m){
  const r=rollAtk(m.atk,player.ac);
  if(r.hit){
    const dmg=rollDmg(m.dmg[0],m.dmg[1],r.crit);
    player.hp-=dmg;
    clog(m.name+(r.crit?' CRITS!':' hits')+' you for '+dmg+' dmg (d20='+r.roll+')',r.crit?'crit':'dmg');
    updateHUD();
    if(player.hp<=0)die();
  } else {
    clog(m.name+' misses (d20='+r.roll+' vs AC'+player.ac+')','miss');
  }
}

function die(){
  gameOver=true;
  document.getElementById('death-screen').style.display='flex';
  document.getElementById('death-stats').textContent='Floor '+floor+' · '+kills+' kills · '+totalXp+' XP';
}
function restartGame(){initGame();}
window.restartGame=restartGame;

// === UPDATE ===
function update(){
  if(gameOver)return;
  // movement
  let mx=0,my=0;
  if(keys.w||keys.arrowup){mx+=Math.cos(player.angle)*MOVE_SPD;my+=Math.sin(player.angle)*MOVE_SPD;}
  if(keys.s||keys.arrowdown){mx-=Math.cos(player.angle)*MOVE_SPD;my-=Math.sin(player.angle)*MOVE_SPD;}
  if(keys.a||keys.arrowleft)player.angle-=ROT_SPD;
  if(keys.d||keys.arrowright)player.angle+=ROT_SPD;
  if(keys.q){mx+=Math.cos(player.angle-Math.PI/2)*MOVE_SPD*0.6;my+=Math.sin(player.angle-Math.PI/2)*MOVE_SPD*0.6;}
  if(keys.e){mx+=Math.cos(player.angle+Math.PI/2)*MOVE_SPD*0.6;my+=Math.sin(player.angle+Math.PI/2)*MOVE_SPD*0.6;}

  // collision
  const nx=player.x+mx,ny=player.y+my;
  const r=0.2;
  if(!isWall(nx+r,player.y)&&!isWall(nx-r,player.y))player.x=nx;
  if(!isWall(player.x,ny+r)&&!isWall(player.x,ny-r))player.y=ny;

  // attack
  if(atkCooldown>0)atkCooldown--;
  if(keys[' ']||attacking){playerAttack();attacking=false;}

  // monster AI
  for(const m of monsters){
    if(!m.alive)continue;
    const dx=player.x-m.x,dy=player.y-m.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    m.moveT++;

    if(dist<6)m.aggro=true;
    if(!m.aggro)continue;

    if(dist>1.2){
      // move toward player
      const spd=0.015;
      const nx2=m.x+dx/dist*spd,ny2=m.y+dy/dist*spd;
      if(!isWall(nx2,m.y))m.x=nx2;
      if(!isWall(m.x,ny2))m.y=ny2;
    }

    m.atTimer++;
    if(dist<1.5&&m.atTimer>60){
      m.atTimer=0;
      monsterAttack(m);
    }
  }

  // items
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    const dx=player.x-it.x,dy=player.y-it.y;
    if(dx*dx+dy*dy<0.5){
      if(it.type==='stairs'){
        clog('Descending stairs...','info');
        floor++;newFloor();return;
      }
      if(it.type==='potion'){
        const heal=d(8)+2;
        player.hp=Math.min(player.maxHp,player.hp+heal);
        clog('Health potion! +'+heal+' HP','heal');
        items.splice(i,1);updateHUD();
      }
    }
  }
}

function isWall(x,y){
  const mx=Math.floor(x),my=Math.floor(y);
  if(mx<0||my<0||my>=dungeon.h||mx>=dungeon.w)return true;
  return dungeon.map[my][mx]===1;
}

// === RAYCASTING ===
function castRay(angle){
  let sin=Math.sin(angle),cos=Math.cos(angle);
  let x=player.x,y=player.y;
  const step=0.02;
  for(let i=0;i<500;i++){
    x+=cos*step;y+=sin*step;
    if(isWall(x,y)){
      const dist=Math.sqrt((x-player.x)**2+(y-player.y)**2);
      // determine if hit vertical or horizontal wall face
      const testX=x-cos*step*0.5;
      const hitVert=Math.floor(testX)!==Math.floor(x);
      return{dist,x,y,vert:hitVert};
    }
  }
  return{dist:20,x,y,vert:false};
}

// === RENDER ===
function render(){
  X.fillStyle='#000';X.fillRect(0,0,W,H);

  // ceiling gradient
  const cg=X.createLinearGradient(0,0,0,H/2);
  cg.addColorStop(0,'#0a0a18');cg.addColorStop(1,'#050510');
  X.fillStyle=cg;X.fillRect(0,0,W,H/2);
  // floor gradient
  const fg=X.createLinearGradient(0,H/2,0,H);
  fg.addColorStop(0,'#080808');fg.addColorStop(1,'#151510');
  X.fillStyle=fg;X.fillRect(0,H/2,W,H/2);

  const rayCount=Math.floor(W/RAY_COUNT_RATIO);
  const zBuffer=[];

  for(let i=0;i<rayCount;i++){
    const rayAngle=player.angle-FOV/2+FOV*i/rayCount;
    const hit=castRay(rayAngle);
    // fix fisheye
    const perp=hit.dist*Math.cos(rayAngle-player.angle);
    zBuffer[i]=perp;
    const wallH=Math.min(H*2,H/perp);
    const wallTop=(H-wallH)/2;

    // color based on distance + face
    const bright=Math.max(0.05,1-perp/10);
    const shade=hit.vert?1:0.7;
    const r=Math.floor(0*bright*shade);
    const g=Math.floor(200*bright*shade);
    const b=Math.floor(255*bright*shade);

    // wall stripe
    X.fillStyle='rgb('+r+','+g+','+b+')';
    X.fillRect(i*RAY_COUNT_RATIO,wallTop,RAY_COUNT_RATIO+1,wallH);

    // edge lines (wireframe look)
    const wx=hit.x%1;const wy=hit.y%1;
    const edge=Math.min(wx,1-wx,wy,1-wy);
    if(edge<0.05){
      X.fillStyle='rgba(0,230,255,'+(bright*0.6)+')';
      X.fillRect(i*RAY_COUNT_RATIO,wallTop,RAY_COUNT_RATIO+1,wallH);
    }

    // ceiling/floor neon grid
    if(i%8===0){
      X.strokeStyle='rgba(0,200,255,0.02)';X.lineWidth=1;
      X.beginPath();X.moveTo(i*RAY_COUNT_RATIO,0);X.lineTo(i*RAY_COUNT_RATIO,wallTop);X.stroke();
      X.beginPath();X.moveTo(i*RAY_COUNT_RATIO,wallTop+wallH);X.lineTo(i*RAY_COUNT_RATIO,H);X.stroke();
    }
  }

  // === SPRITES (monsters + items) ===
  const sprites=[];
  for(const m of monsters){
    if(!m.alive)continue;
    const dx=m.x-player.x,dy=m.y-player.y;
    sprites.push({x:m.x,y:m.y,dist:Math.sqrt(dx*dx+dy*dy),type:'monster',data:m});
  }
  for(const it of items){
    const dx=it.x-player.x,dy=it.y-player.y;
    sprites.push({x:it.x,y:it.y,dist:Math.sqrt(dx*dx+dy*dy),type:'item',data:it});
  }
  sprites.sort((a,b)=>b.dist-a.dist);

  for(const sp of sprites){
    const dx=sp.x-player.x,dy=sp.y-player.y;
    const angle=Math.atan2(dy,dx)-player.angle;
    let a=angle;while(a>Math.PI)a-=Math.PI*2;while(a<-Math.PI)a+=Math.PI*2;
    if(Math.abs(a)>FOV/2+0.2)continue;

    const screenX=W/2+Math.tan(a)*W/(2*Math.tan(FOV/2));
    const perpDist=sp.dist*Math.cos(angle);
    if(perpDist<0.3)continue;
    const sprH=H/perpDist;
    const sprW=sprH*0.6;
    const sprTop=(H-sprH)/2;

    // check z-buffer for visibility
    const col=Math.floor(screenX/RAY_COUNT_RATIO);
    if(col>=0&&col<zBuffer.length&&zBuffer[col]<perpDist*0.9)continue;

    if(sp.type==='monster'){
      drawWireframeMonster(sp.data,screenX,sprTop,sprW,sprH,perpDist);
    } else {
      drawItem(sp.data,screenX,sprTop+sprH*0.3,sprW*0.5,sprH*0.4);
    }
  }

  // attack flash
  if(atkCooldown>15){
    X.fillStyle='rgba(255,255,255,'+(0.1*(atkCooldown-15)/5)+')';
    X.fillRect(0,0,W,H);
  }

  renderMinimap();
}

// === WIREFRAME MONSTERS ===
function drawWireframeMonster(m,cx,top,w,h,dist){
  const bright=Math.max(0.2,1-dist/8);
  const col=m.color;
  const a=bright;
  const bob=Math.sin(m.moveT*0.06)*h*0.02;
  X.strokeStyle=col;X.lineWidth=1.5;X.globalAlpha=a;
  X.shadowColor=col;X.shadowBlur=8;

  const my=top+bob;

  if(m.shape==='wraith'){
    // floating cloak shape
    X.beginPath();
    X.moveTo(cx,my+h*0.1);
    X.lineTo(cx-w*0.3,my+h*0.3);X.lineTo(cx-w*0.5,my+h*0.6);
    X.lineTo(cx-w*0.35,my+h*0.9);X.lineTo(cx-w*0.15,my+h*0.75);
    X.lineTo(cx,my+h*0.95);
    X.lineTo(cx+w*0.15,my+h*0.75);X.lineTo(cx+w*0.35,my+h*0.9);
    X.lineTo(cx+w*0.5,my+h*0.6);X.lineTo(cx+w*0.3,my+h*0.3);
    X.closePath();X.stroke();
    // eyes
    X.fillStyle=col;
    X.fillRect(cx-w*0.15,my+h*0.25,w*0.08,w*0.06);
    X.fillRect(cx+w*0.07,my+h*0.25,w*0.08,w*0.06);
  } else if(m.shape==='skeleton'){
    // skull
    X.beginPath();X.arc(cx,my+h*0.15,w*0.2,0,Math.PI*2);X.stroke();
    // spine
    X.beginPath();X.moveTo(cx,my+h*0.25);X.lineTo(cx,my+h*0.6);X.stroke();
    // ribs
    for(let i=0;i<3;i++){
      const ry=my+h*(0.3+i*0.08);
      X.beginPath();X.moveTo(cx-w*0.25,ry);X.quadraticCurveTo(cx,ry+h*0.03,cx+w*0.25,ry);X.stroke();
    }
    // legs
    X.beginPath();X.moveTo(cx,my+h*0.6);X.lineTo(cx-w*0.2,my+h*0.95);X.stroke();
    X.beginPath();X.moveTo(cx,my+h*0.6);X.lineTo(cx+w*0.2,my+h*0.95);X.stroke();
    // arms
    X.beginPath();X.moveTo(cx-w*0.35,my+h*0.5);X.lineTo(cx,my+h*0.3);X.lineTo(cx+w*0.35,my+h*0.5);X.stroke();
    // eye sockets
    X.fillStyle=col;
    X.beginPath();X.arc(cx-w*0.08,my+h*0.13,w*0.05,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+w*0.08,my+h*0.13,w*0.05,0,Math.PI*2);X.fill();
  } else if(m.shape==='demon'){
    // body triangle
    X.beginPath();X.moveTo(cx,my+h*0.05);X.lineTo(cx-w*0.45,my+h*0.7);X.lineTo(cx+w*0.45,my+h*0.7);X.closePath();X.stroke();
    // horns
    X.beginPath();X.moveTo(cx-w*0.15,my+h*0.1);X.lineTo(cx-w*0.35,my-h*0.05);X.stroke();
    X.beginPath();X.moveTo(cx+w*0.15,my+h*0.1);X.lineTo(cx+w*0.35,my-h*0.05);X.stroke();
    // wings
    X.beginPath();X.moveTo(cx-w*0.4,my+h*0.3);X.lineTo(cx-w*0.7,my+h*0.1);X.lineTo(cx-w*0.5,my+h*0.5);X.stroke();
    X.beginPath();X.moveTo(cx+w*0.4,my+h*0.3);X.lineTo(cx+w*0.7,my+h*0.1);X.lineTo(cx+w*0.5,my+h*0.5);X.stroke();
    // legs
    X.beginPath();X.moveTo(cx-w*0.2,my+h*0.7);X.lineTo(cx-w*0.25,my+h);X.stroke();
    X.beginPath();X.moveTo(cx+w*0.2,my+h*0.7);X.lineTo(cx+w*0.25,my+h);X.stroke();
    // eyes
    X.fillStyle=col;
    X.beginPath();X.arc(cx-w*0.1,my+h*0.25,w*0.06,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+w*0.1,my+h*0.25,w*0.06,0,Math.PI*2);X.fill();
  } else if(m.shape==='lich'){
    // hooded figure
    X.beginPath();
    X.moveTo(cx,my);X.lineTo(cx-w*0.35,my+h*0.3);X.lineTo(cx-w*0.4,my+h*0.9);
    X.lineTo(cx+w*0.4,my+h*0.9);X.lineTo(cx+w*0.35,my+h*0.3);X.closePath();X.stroke();
    // hood
    X.beginPath();X.arc(cx,my+h*0.15,w*0.25,Math.PI,0);X.stroke();
    // staff
    X.beginPath();X.moveTo(cx+w*0.35,my+h*0.2);X.lineTo(cx+w*0.4,my+h);X.stroke();
    // orb on staff
    X.beginPath();X.arc(cx+w*0.35,my+h*0.15,w*0.08,0,Math.PI*2);X.stroke();
    X.fillStyle=col;X.beginPath();X.arc(cx+w*0.35,my+h*0.15,w*0.04,0,Math.PI*2);X.fill();
    // eyes (glowing)
    X.fillStyle=col;
    X.fillRect(cx-w*0.12,my+h*0.2,w*0.08,w*0.03);
    X.fillRect(cx+w*0.04,my+h*0.2,w*0.08,w*0.03);
  } else if(m.shape==='slime'){
    // blob
    const t=m.moveT*0.04;
    X.beginPath();
    X.moveTo(cx-w*0.35,my+h*0.8);
    X.quadraticCurveTo(cx-w*0.4,my+h*0.3+Math.sin(t)*h*0.05,cx,my+h*0.2+Math.sin(t+1)*h*0.05);
    X.quadraticCurveTo(cx+w*0.4,my+h*0.3+Math.sin(t+2)*h*0.05,cx+w*0.35,my+h*0.8);
    X.quadraticCurveTo(cx,my+h*0.85,cx-w*0.35,my+h*0.8);
    X.stroke();
    // inner glow
    X.fillStyle=m.color+'33';
    X.fill();
    // eyes
    X.fillStyle=col;
    X.beginPath();X.arc(cx-w*0.1,my+h*0.4,w*0.06,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+w*0.1,my+h*0.4,w*0.06,0,Math.PI*2);X.fill();
  }

  X.shadowBlur=0;X.globalAlpha=1;

  // HP bar
  if(m.hp<m.maxHp){
    const bw=w*0.6,bx=cx-bw/2,by=my-6;
    X.fillStyle='rgba(255,0,0,0.3)';X.fillRect(bx,by,bw,3);
    X.fillStyle='rgba(255,50,80,0.8)';X.fillRect(bx,by,bw*(m.hp/m.maxHp),3);
  }
}

function drawItem(it,cx,top,w,h){
  if(it.type==='stairs'){
    X.strokeStyle='rgba(255,220,50,.7)';X.lineWidth=2;
    X.shadowColor='#fd0';X.shadowBlur=10;
    for(let i=0;i<4;i++){
      const sy=top+h*(i/4);
      X.strokeRect(cx-w/2+i*w*0.08,sy,w-i*w*0.16,h*0.2);
    }
    X.shadowBlur=0;
  } else if(it.type==='potion'){
    X.fillStyle='rgba(0,255,120,.5)';
    X.shadowColor='#0f8';X.shadowBlur=8;
    X.beginPath();
    X.moveTo(cx-w*0.15,top);X.lineTo(cx+w*0.15,top);
    X.lineTo(cx+w*0.3,top+h*0.4);X.quadraticCurveTo(cx+w*0.3,top+h,cx,top+h);
    X.quadraticCurveTo(cx-w*0.3,top+h,cx-w*0.3,top+h*0.4);X.closePath();
    X.fill();X.strokeStyle='rgba(0,255,120,.8)';X.lineWidth=1;X.stroke();
    X.shadowBlur=0;
  }
}

// === MINIMAP ===
function renderMinimap(){
  MX.fillStyle='rgba(0,0,0,.7)';MX.fillRect(0,0,90,90);
  const s=90/dungeon.w;
  for(let y=0;y<dungeon.h;y++){
    for(let x=0;x<dungeon.w;x++){
      if(dungeon.map[y][x]===1){
        MX.fillStyle='rgba(0,200,255,.12)';
        MX.fillRect(x*s,y*s,s,s);
      }
    }
  }
  // items
  for(const it of items){
    MX.fillStyle=it.type==='stairs'?'rgba(255,220,50,.6)':'rgba(0,255,120,.5)';
    MX.fillRect(it.x*s-1,it.y*s-1,3,3);
  }
  // monsters
  for(const m of monsters){
    if(!m.alive)continue;
    MX.fillStyle=m.color;MX.globalAlpha=0.5;
    MX.fillRect(m.x*s-1,m.y*s-1,2,2);
  }
  MX.globalAlpha=1;
  // player
  MX.fillStyle='#fff';
  MX.fillRect(player.x*s-1.5,player.y*s-1.5,3,3);
  // direction
  MX.strokeStyle='rgba(255,255,255,.5)';MX.lineWidth=1;
  MX.beginPath();MX.moveTo(player.x*s,player.y*s);
  MX.lineTo(player.x*s+Math.cos(player.angle)*6,player.y*s+Math.sin(player.angle)*6);
  MX.stroke();
}

function updateHUD(){
  const pct=Math.max(0,player.hp/player.maxHp*100);
  document.getElementById('hp-fill').style.width=pct+'%';
  document.getElementById('stats').innerHTML='<span class="big">FLOOR '+floor+'</span><br>LVL '+player.level+' · AC '+player.ac+' · ATK +'+player.atk+' · '+player.hp+'/'+player.maxHp+' HP';
}

function clog(msg,cls){
  const el=document.getElementById('combat-log');
  const div=document.createElement('div');
  div.className='clog '+cls;div.textContent=msg;
  el.appendChild(div);
  if(el.children.length>8)el.firstChild.remove();
  setTimeout(()=>{if(div.parentNode)div.remove();},4000);
}

// === INPUT ===
document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
CV.addEventListener('click',()=>{attacking=true;});

// Touch controls
document.querySelectorAll('.tbtn').forEach(btn=>{
  const k=btn.dataset.key;
  const down=e=>{e.preventDefault();if(k==='atk')attacking=true;else keys[k]=true;};
  const up=e=>{e.preventDefault();if(k!=='atk')keys[k]=false;};
  btn.addEventListener('touchstart',down,{passive:false});
  btn.addEventListener('touchend',up,{passive:false});
  btn.addEventListener('mousedown',down);btn.addEventListener('mouseup',up);
});

// === GAME LOOP ===
initGame();
function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
