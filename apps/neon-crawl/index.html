<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Crawl</title>
<link rel="icon" href="https://emojicdn.elk.sh/🗡️">
<meta property="og:title" content="Neon Crawl">
<meta property="og:description" content="Turn-based dungeon crawler with raycasting, D&D character creation, and neon wireframe bosses.">
<meta property="og:url" content="https://sloppy.live/neon-crawl/">
<meta property="og:image" content="https://sloppy.live/neon-crawl/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;cursor:crosshair;touch-action:none}
canvas{display:block}

/* Character Creator */
#chargen{position:fixed;inset:0;z-index:60;background:#000;display:flex;align-items:center;justify-content:center}
#chargen-inner{max-width:480px;width:90%;padding:24px;border:1px solid rgba(0,230,255,.12);background:rgba(6,8,16,.95);border-radius:8px}
#chargen h1{font-family:'Press Start 2P',monospace;font-size:14px;color:#0ef;text-align:center;margin-bottom:16px;text-shadow:0 0 12px rgba(0,230,255,.3)}
#chargen h2{font-size:11px;color:rgba(0,230,255,.5);letter-spacing:2px;margin:12px 0 6px;text-transform:uppercase}
.cg-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.cg-opt{background:rgba(0,230,255,.04);border:1px solid rgba(0,230,255,.12);color:rgba(200,220,240,.6);padding:6px 12px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;border-radius:3px;transition:all .15s;flex:1;text-align:center;min-width:70px}
.cg-opt:hover{background:rgba(0,230,255,.08);border-color:rgba(0,230,255,.3)}
.cg-opt.sel{background:rgba(0,230,255,.12);border-color:#0ef;color:#0ef;box-shadow:0 0 8px rgba(0,230,255,.15)}
#ability-scores{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0}
.ab-box{text-align:center;padding:8px 4px;border:1px solid rgba(0,230,255,.08);border-radius:4px;background:rgba(0,0,0,.3)}
.ab-box .val{font-size:18px;color:#0ef;font-weight:bold;display:block}
.ab-box .lbl{font-size:9px;color:rgba(0,230,255,.4);letter-spacing:1px}
.ab-box .mod{font-size:10px;color:rgba(0,230,255,.6)}
#roll-btn,#start-btn{display:block;width:100%;padding:10px;margin-top:8px;font-family:'Press Start 2P',monospace;font-size:11px;cursor:pointer;border-radius:4px;border:1px solid;transition:all .2s}
#roll-btn{background:rgba(255,170,0,.08);border-color:rgba(255,170,0,.3);color:#fa0}
#roll-btn:hover{background:rgba(255,170,0,.15);box-shadow:0 0 12px rgba(255,170,0,.2)}
#start-btn{background:rgba(0,255,136,.08);border-color:rgba(0,255,136,.3);color:#0f8;margin-top:10px}
#start-btn:hover{background:rgba(0,255,136,.15);box-shadow:0 0 12px rgba(0,255,136,.2)}
#char-preview{text-align:center;padding:8px 0;font-size:10px;color:rgba(0,230,255,.4);line-height:1.7}

/* HUD */
#hud{position:fixed;bottom:0;left:0;right:0;z-index:10;pointer-events:none}
#hud-bar{display:flex;align-items:flex-end;justify-content:space-between;padding:8px 14px;background:linear-gradient(transparent,rgba(0,0,0,.85) 40%)}
#hp-wrap{display:flex;flex-direction:column;gap:2px}
#hp-label{font-size:9px;color:rgba(255,50,80,.6);letter-spacing:2px}
#hp-bar{width:140px;height:10px;background:rgba(255,50,80,.1);border:1px solid rgba(255,50,80,.2);border-radius:2px;overflow:hidden}
#hp-fill{height:100%;background:linear-gradient(90deg,#ff3250,#ff6080);transition:width .3s;border-radius:1px}
#stats{text-align:center;font-size:10px;color:rgba(0,230,255,.5);line-height:1.6}
#stats .big{font-family:'Press Start 2P',monospace;font-size:11px;color:#0ef}
#turn-count{font-size:9px;color:rgba(255,170,0,.4);margin-top:2px}
#minimap-wrap{width:90px;height:90px;border:1px solid rgba(0,230,255,.12);background:rgba(0,0,0,.6);border-radius:3px}
#minimap{display:block}

#combat-log{position:fixed;top:10px;left:10px;z-index:10;pointer-events:none;max-width:340px}
.clog{font-size:10px;padding:2px 0;animation:cFade 5s forwards;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.clog.hit{color:#ff6a00}.clog.miss{color:#666}.clog.crit{color:#ff0;font-weight:bold}
.clog.kill{color:#0f0}.clog.dmg{color:#f33}.clog.info{color:#0af}.clog.heal{color:#0f8}
.clog.boss{color:#f0f;font-weight:bold}.clog.lvl{color:#fa0;font-weight:bold}
@keyframes cFade{0%{opacity:1}75%{opacity:1}100%{opacity:0}}

#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:none;color:rgba(0,230,255,.3);font-size:20px}
#death-screen{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#death-screen h1{font-family:'Press Start 2P',monospace;font-size:20px;color:#f33;text-shadow:0 0 20px #f33}
#death-screen p{color:#888;font-size:12px}
#death-screen button{background:rgba(255,50,80,.1);border:1px solid #f33;color:#f33;font-family:'Press Start 2P',monospace;font-size:11px;padding:10px 24px;cursor:pointer;border-radius:4px}
#death-screen button:hover{background:rgba(255,50,80,.2);box-shadow:0 0 16px rgba(255,50,80,.3)}

#boss-intro{position:fixed;inset:0;z-index:45;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);pointer-events:none}
#boss-intro .inner{text-align:center;animation:bossIn 2s forwards}
#boss-intro h2{font-family:'Press Start 2P',monospace;font-size:16px;color:#f0f;text-shadow:0 0 30px #f0f;margin-bottom:8px}
#boss-intro p{color:rgba(255,100,255,.6);font-size:12px}
@keyframes bossIn{0%{opacity:0;transform:scale(1.5)}30%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0}}

#touch-controls{position:fixed;bottom:80px;left:0;right:0;z-index:15;display:none;justify-content:space-between;padding:0 16px;pointer-events:none}
.touch-pad{display:flex;gap:4px;pointer-events:auto;flex-wrap:wrap;width:130px}
.touch-pad.right{justify-content:flex-end}
.tbtn{width:44px;height:44px;background:rgba(0,230,255,.06);border:1px solid rgba(0,230,255,.15);border-radius:6px;color:rgba(0,230,255,.4);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none}
.tbtn:active{background:rgba(0,230,255,.15);border-color:rgba(0,230,255,.4)}
#backlink{position:fixed;top:8px;right:10px;color:rgba(255,255,255,.06);font-size:9px;text-decoration:none;z-index:10}
#backlink:hover{color:rgba(0,230,255,.3)}
@media(max-width:768px){#touch-controls{display:flex}#chargen-inner{padding:16px}#ability-scores{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- CHARACTER CREATOR -->
<div id="chargen">
<div id="chargen-inner">
  <h1>⚔ NEON CRAWL</h1>
  <h2>Race</h2>
  <div class="cg-row" id="race-row">
    <div class="cg-opt sel" data-val="human">Human</div>
    <div class="cg-opt" data-val="elf">Elf</div>
    <div class="cg-opt" data-val="dwarf">Dwarf</div>
    <div class="cg-opt" data-val="tiefling">Tiefling</div>
  </div>
  <h2>Class</h2>
  <div class="cg-row" id="class-row">
    <div class="cg-opt sel" data-val="fighter">Fighter</div>
    <div class="cg-opt" data-val="rogue">Rogue</div>
    <div class="cg-opt" data-val="wizard">Wizard</div>
    <div class="cg-opt" data-val="cleric">Cleric</div>
  </div>
  <h2>Ability Scores <span style="color:rgba(255,170,0,.4)">(4d6 drop lowest)</span></h2>
  <div id="ability-scores">
    <div class="ab-box"><span class="val" id="ab-str">10</span><span class="mod" id="mod-str">(+0)</span><span class="lbl">STR</span></div>
    <div class="ab-box"><span class="val" id="ab-dex">10</span><span class="mod" id="mod-dex">(+0)</span><span class="lbl">DEX</span></div>
    <div class="ab-box"><span class="val" id="ab-con">10</span><span class="mod" id="mod-con">(+0)</span><span class="lbl">CON</span></div>
    <div class="ab-box"><span class="val" id="ab-int">10</span><span class="mod" id="mod-int">(+0)</span><span class="lbl">INT</span></div>
    <div class="ab-box"><span class="val" id="ab-wis">10</span><span class="mod" id="mod-wis">(+0)</span><span class="lbl">WIS</span></div>
    <div class="ab-box"><span class="val" id="ab-cha">10</span><span class="mod" id="mod-cha">(+0)</span><span class="lbl">CHA</span></div>
  </div>
  <button id="roll-btn">🎲 ROLL ABILITIES</button>
  <div id="char-preview"></div>
  <button id="start-btn">▶ ENTER THE DUNGEON</button>
</div>
</div>

<canvas id="c"></canvas>
<div id="crosshair">+</div>
<div id="combat-log"></div>
<div id="hud"><div id="hud-bar">
  <div id="hp-wrap"><div id="hp-label">HP</div><div id="hp-bar"><div id="hp-fill" style="width:100%"></div></div></div>
  <div id="stats"><span class="big">FLOOR 1</span><br>LVL 1</div>
  <div id="minimap-wrap"><canvas id="minimap" width="90" height="90"></canvas></div>
</div></div>
<div id="touch-controls">
  <div class="touch-pad left">
    <div style="width:44px"></div><div class="tbtn" data-key="up">▲</div><div style="width:44px"></div>
    <div class="tbtn" data-key="left">◀</div><div class="tbtn" data-key="down">▼</div><div class="tbtn" data-key="right">▶</div>
  </div>
  <div class="touch-pad right">
    <div class="tbtn" data-key="atk" style="width:70px;font-size:11px">⚔ ATK</div>
    <div class="tbtn" data-key="wait" style="width:70px;font-size:10px">⏳</div>
  </div>
</div>
<div id="boss-intro"><div class="inner"><h2 id="boss-name"></h2><p id="boss-title"></p></div></div>
<div id="death-screen"><h1>YOU DIED</h1><p id="death-stats"></p><button onclick="restartGame()">NEW CHARACTER</button></div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
const MM=document.getElementById('minimap'),MX=MM.getContext('2d');
let W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// === CONSTANTS ===
const FOV=Math.PI/3,RAY_R=2;
const DIRS=[[0,-1],[1,0],[0,1],[-1,0]]; // N E S W
const DIR_ANGLES=[Math.PI*1.5,0,Math.PI*0.5,Math.PI]; // corresponding angles

// === D&D DATA ===
const RACES={
  human:{name:'Human',bonus:{str:1,dex:1,con:1,int:1,wis:1,cha:1},hpBonus:0},
  elf:{name:'Elf',bonus:{dex:2,wis:1},hpBonus:0},
  dwarf:{name:'Dwarf',bonus:{con:2,str:1},hpBonus:1},
  tiefling:{name:'Tiefling',bonus:{cha:2,int:1},hpBonus:0},
};
const CLASSES={
  fighter:{name:'Fighter',hitDie:10,baseAC:16,atkStat:'str',dmgDie:10,skills:'Heavy armor, Great Weapon'},
  rogue:{name:'Rogue',hitDie:8,baseAC:14,atkStat:'dex',dmgDie:6,skills:'Sneak Attack (2x crit range)'},
  wizard:{name:'Wizard',hitDie:6,baseAC:12,atkStat:'int',dmgDie:8,skills:'Arcane Blast (INT-based)'},
  cleric:{name:'Cleric',hitDie:8,baseAC:15,atkStat:'wis',dmgDie:8,skills:'Heal 1/floor (2d8+WIS)'},
};

// === CHARACTER CREATOR STATE ===
let charRace='human',charClass='fighter';
let abilities={str:10,dex:10,con:10,int:10,wis:10,cha:10};

function mod(v){return Math.floor((v-10)/2);}
function modStr(v){const m=mod(v);return m>=0?'(+'+m+')':'('+m+')';}

function roll4d6(){
  const rolls=[];for(let i=0;i<4;i++)rolls.push(1+Math.floor(Math.random()*6));
  rolls.sort((a,b)=>a-b);return rolls[1]+rolls[2]+rolls[3];
}

function rollAbilities(){
  const abs=['str','dex','con','int','wis','cha'];
  for(const a of abs)abilities[a]=roll4d6();
  // apply racial bonuses
  const rb=RACES[charRace].bonus;
  for(const k in rb)if(abilities[k]!==undefined)abilities[k]+=rb[k];
  updateAbilityDisplay();
}

function updateAbilityDisplay(){
  const abs=['str','dex','con','int','wis','cha'];
  for(const a of abs){
    document.getElementById('ab-'+a).textContent=abilities[a];
    document.getElementById('mod-'+a).textContent=modStr(abilities[a]);
  }
  const cl=CLASSES[charClass];
  const atkMod=mod(abilities[cl.atkStat]);
  const hp=cl.hitDie+mod(abilities.con)+RACES[charRace].hpBonus;
  const ac=cl.baseAC+Math.min(2,mod(abilities.dex));
  document.getElementById('char-preview').innerHTML=
    RACES[charRace].name+' '+cl.name+'<br>HP: '+hp+' · AC: '+ac+' · ATK: +'+Math.max(1,2+atkMod)+' · DMG: 1d'+cl.dmgDie+'<br><span style="color:rgba(255,170,0,.4)">'+cl.skills+'</span>';
}

// Wire up chargen
document.querySelectorAll('#race-row .cg-opt').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('#race-row .cg-opt').forEach(e=>e.classList.remove('sel'));
    el.classList.add('sel');charRace=el.dataset.val;rollAbilities();
  });
});
document.querySelectorAll('#class-row .cg-opt').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('#class-row .cg-opt').forEach(e=>e.classList.remove('sel'));
    el.classList.add('sel');charClass=el.dataset.val;updateAbilityDisplay();
  });
});
document.getElementById('roll-btn').addEventListener('click',rollAbilities);
document.getElementById('start-btn').addEventListener('click',startGame);
rollAbilities();

// === MAP GENERATION ===
function genMap(w,h,fl){
  const m=Array.from({length:h},()=>Array(w).fill(1));
  const rooms=[];
  const rCount=4+Math.floor(fl*0.5);
  for(let i=0;i<rCount*12&&rooms.length<rCount;i++){
    const rw=3+Math.floor(Math.random()*4),rh=3+Math.floor(Math.random()*4);
    const rx=1+Math.floor(Math.random()*(w-rw-2)),ry=1+Math.floor(Math.random()*(h-rh-2));
    let ok=true;
    for(const r of rooms){if(rx-1<r.x+r.w&&rx+rw+1>r.x&&ry-1<r.y+r.h&&ry+rh+1>r.y){ok=false;break;}}
    if(!ok)continue;
    rooms.push({x:rx,y:ry,w:rw,h:rh});
    for(let y=ry;y<ry+rh;y++)for(let x=rx;x<rx+rw;x++)m[y][x]=0;
  }
  for(let i=1;i<rooms.length;i++){
    let cx=Math.floor(rooms[i-1].x+rooms[i-1].w/2),cy=Math.floor(rooms[i-1].y+rooms[i-1].h/2);
    const tx=Math.floor(rooms[i].x+rooms[i].w/2),ty=Math.floor(rooms[i].y+rooms[i].h/2);
    while(cx!==tx){m[cy][cx]=0;cx+=cx<tx?1:-1;}
    while(cy!==ty){m[cy][cx]=0;cy+=cy<ty?1:-1;}m[cy][cx]=0;
  }
  // boss room on floors 3,6,9... — make last room bigger
  if(fl%3===0&&rooms.length>1){
    const br=rooms[rooms.length-1];
    for(let y=br.y-1;y<br.y+br.h+1;y++)for(let x=br.x-1;x<br.x+br.w+1;x++){
      if(x>0&&x<w-1&&y>0&&y<h-1)m[y][x]=0;
    }
    br.x=Math.max(1,br.x-1);br.y=Math.max(1,br.y-1);br.w+=2;br.h+=2;
  }
  return{map:m,rooms,w,h};
}

// === MONSTERS ===
const MONSTER_TYPES=[
  {name:'Slime',hp:6,ac:8,atk:1,dmg:[1,3],color:'#0f8',xp:10,shape:'slime'},
  {name:'Wraith',hp:10,ac:11,atk:2,dmg:[1,4],color:'#0ef',xp:15,shape:'wraith'},
  {name:'Skeleton',hp:14,ac:13,atk:3,dmg:[1,6],color:'#ff6a00',xp:25,shape:'skeleton'},
  {name:'Demon',hp:22,ac:14,atk:5,dmg:[2,6],color:'#f33',xp:50,shape:'demon'},
  {name:'Lich',hp:30,ac:16,atk:7,dmg:[2,8],color:'#d0f',xp:80,shape:'lich'},
];
const BOSS_TYPES=[
  {name:'Void Colossus',hp:60,ac:16,atk:7,dmg:[3,8],color:'#f0f',xp:200,shape:'colossus',title:'Guardian of the Deep'},
  {name:'Neon Hydra',hp:80,ac:14,atk:6,dmg:[2,10],color:'#0ff',xp:300,shape:'hydra',title:'Three Heads of Ruin'},
  {name:'Abyssal King',hp:100,ac:18,atk:9,dmg:[3,10],color:'#f33',xp:500,shape:'king',title:'Lord of the Abyss'},
  {name:'Chrono Wyrm',hp:120,ac:17,atk:8,dmg:[4,8],color:'#ff0',xp:700,shape:'wyrm',title:'Eater of Timelines'},
];

function spawnMonsters(dg,fl){
  const mons=[];
  const count=2+Math.floor(fl*1.2);
  const maxTier=Math.min(4,Math.floor(fl/2));
  const types=MONSTER_TYPES.slice(0,maxTier+1);
  for(let i=0;i<count;i++){
    const room=dg.rooms[1+Math.floor(Math.random()*(dg.rooms.length-1))];
    if(!room)continue;
    const t=types[Math.floor(Math.random()*types.length)];
    const mx=room.x+1+Math.floor(Math.random()*(room.w-2));
    const my=room.y+1+Math.floor(Math.random()*(room.h-2));
    if(dg.map[my][mx]!==0)continue;
    mons.push({...t,hp:t.hp+fl*2,maxHp:t.hp+fl*2,x:mx,y:my,
      aggro:false,moveT:0,alive:true,boss:false});
  }
  // boss every 3 floors
  if(fl%3===0){
    const bossRoom=dg.rooms[dg.rooms.length-1];
    const bi=Math.min(BOSS_TYPES.length-1,Math.floor(fl/3)-1);
    const bt=BOSS_TYPES[bi];
    const bx=bossRoom.x+Math.floor(bossRoom.w/2);
    const by=bossRoom.y+Math.floor(bossRoom.h/2);
    mons.push({...bt,hp:bt.hp+fl*5,maxHp:bt.hp+fl*5,x:bx,y:by,
      aggro:false,moveT:0,alive:true,boss:true});
  }
  return mons;
}

// === GAME STATE ===
let player,dungeon,monsters,floorNum,items,turnCount,gameOver,kills,totalXp,gameStarted=false;
let animT=0,atkFlash=0,viewBob=0;
let healUsed=false; // cleric heal per floor

function startGame(){
  document.getElementById('chargen').style.display='none';
  gameStarted=true;
  floorNum=1;kills=0;totalXp=0;turnCount=0;gameOver=false;
  document.getElementById('death-screen').style.display='none';
  const cl=CLASSES[charClass];
  const maxHp=cl.hitDie+mod(abilities.con)+RACES[charRace].hpBonus;
  player={
    x:0,y:0,dir:1, // 0=N,1=E,2=S,3=W
    hp:maxHp,maxHp:maxHp,
    ac:cl.baseAC+Math.min(2,mod(abilities.dex)),
    level:1,xp:0,xpNext:100,
    race:charRace,cls:charClass,
  };
  newFloor();
}

function getAtkMod(){
  const cl=CLASSES[player.cls];
  return 2+mod(abilities[cl.atkStat])+Math.floor((player.level-1)/2);
}
function getDmgDie(){return CLASSES[player.cls].dmgDie+Math.floor((player.level-1)/3)*2;}
function getPlayerDmgMod(){
  const cl=CLASSES[player.cls];
  return Math.max(0,mod(abilities[cl.atkStat==='str'?'str':cl.atkStat]));
}

function newFloor(){
  const size=16+floorNum*2;
  dungeon=genMap(Math.min(size,30),Math.min(size,30),floorNum);
  const sr=dungeon.rooms[0];
  player.x=sr.x+Math.floor(sr.w/2);
  player.y=sr.y+Math.floor(sr.h/2);
  player.dir=1;
  // heal on floor change
  player.hp=Math.min(player.maxHp,player.hp+Math.max(3,mod(abilities.con)+2));
  healUsed=false;
  monsters=spawnMonsters(dungeon,floorNum);
  const er=dungeon.rooms[dungeon.rooms.length-1];
  items=[{type:'stairs',x:er.x+Math.floor(er.w/2),y:er.y+Math.floor(er.h/2)}];
  for(let i=0;i<2+Math.floor(floorNum/2);i++){
    const r=dungeon.rooms[Math.floor(Math.random()*dungeon.rooms.length)];
    if(r){
      const px=r.x+1+Math.floor(Math.random()*(r.w-2));
      const py=r.y+1+Math.floor(Math.random()*(r.h-2));
      if(dungeon.map[py][px]===0)items.push({type:'potion',x:px,y:py});
    }
  }
  updateHUD();
  clog('— Floor '+floorNum+' —','info');
  if(floorNum%3===0){
    const bi=Math.min(BOSS_TYPES.length-1,Math.floor(floorNum/3)-1);
    showBossIntro(BOSS_TYPES[bi]);
  }
}

function showBossIntro(bt){
  document.getElementById('boss-name').textContent='⚠ '+bt.name;
  document.getElementById('boss-title').textContent=bt.title;
  const el=document.getElementById('boss-intro');
  el.style.display='flex';
  setTimeout(()=>el.style.display='none',2200);
  clog('BOSS: '+bt.name+' — '+bt.title,'boss');
}

// === TURN SYSTEM ===
function playerTurn(action){
  if(gameOver||!gameStarted)return;
  let acted=false;

  if(action==='forward'){
    const nx=player.x+DIRS[player.dir][0],ny=player.y+DIRS[player.dir][1];
    if(!isWall(nx,ny)&&!monsterAt(nx,ny)){player.x=nx;player.y=ny;acted=true;viewBob=3;}
  } else if(action==='back'){
    const bd=(player.dir+2)%4;
    const nx=player.x+DIRS[bd][0],ny=player.y+DIRS[bd][1];
    if(!isWall(nx,ny)&&!monsterAt(nx,ny)){player.x=nx;player.y=ny;acted=true;viewBob=3;}
  } else if(action==='left'){
    player.dir=(player.dir+3)%4;acted=true;
  } else if(action==='right'){
    player.dir=(player.dir+1)%4;acted=true;
  } else if(action==='strafe-left'){
    const sd=(player.dir+3)%4;
    const nx=player.x+DIRS[sd][0],ny=player.y+DIRS[sd][1];
    if(!isWall(nx,ny)&&!monsterAt(nx,ny)){player.x=nx;player.y=ny;acted=true;viewBob=3;}
  } else if(action==='strafe-right'){
    const sd=(player.dir+1)%4;
    const nx=player.x+DIRS[sd][0],ny=player.y+DIRS[sd][1];
    if(!isWall(nx,ny)&&!monsterAt(nx,ny)){player.x=nx;player.y=ny;acted=true;viewBob=3;}
  } else if(action==='attack'){
    const fx=player.x+DIRS[player.dir][0],fy=player.y+DIRS[player.dir][1];
    const tgt=monsterAt(fx,fy);
    if(!tgt){
      // check diagonal or 2-range for wizard
      let found=null;
      for(const m of monsters){
        if(!m.alive)continue;
        const dx=m.x-player.x,dy=m.y-player.y;
        const dist=Math.abs(dx)+Math.abs(dy);
        if(dist<=2){
          const ang=Math.atan2(dy,dx);
          const pAng=DIR_ANGLES[player.dir];
          let diff=ang-pAng;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
          if(Math.abs(diff)<Math.PI/3){found=m;break;}
        }
      }
      if(found)doPlayerAttack(found);
      else clog('No target in range','miss');
    } else {
      doPlayerAttack(tgt);
    }
    acted=true;atkFlash=6;
  } else if(action==='wait'){
    acted=true;
  } else if(action==='heal'){
    if(player.cls==='cleric'&&!healUsed){
      const heal=d(8)+d(8)+Math.max(0,mod(abilities.wis));
      player.hp=Math.min(player.maxHp,player.hp+heal);
      healUsed=true;
      clog('Divine Heal! +'+heal+' HP','heal');
      acted=true;
    } else if(player.cls!=='cleric'){
      clog('Only Clerics can heal','miss');
    } else {
      clog('Heal already used this floor','miss');
    }
  }

  if(!acted)return;
  turnCount++;

  // check items
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    if(it.x===player.x&&it.y===player.y){
      if(it.type==='stairs'){
        const bossAlive=monsters.some(m=>m.boss&&m.alive);
        if(bossAlive&&floorNum%3===0){clog('Defeat the boss to descend!','boss');continue;}
        floorNum++;newFloor();return;
      }
      if(it.type==='potion'){
        const heal=d(8)+2;
        player.hp=Math.min(player.maxHp,player.hp+heal);
        clog('Potion! +'+heal+' HP','heal');
        items.splice(i,1);
      }
    }
  }

  // monster turns
  monsterTurns();
  updateHUD();
}

function doPlayerAttack(tgt){
  const atkMod=getAtkMod();
  const critRange=player.cls==='rogue'?[19,20]:[20]; // rogues crit on 19-20
  const roll=d(20);
  const crit=critRange.includes(roll);
  const hit=crit||roll+atkMod>=tgt.ac;
  if(hit){
    const dmgDie=getDmgDie();
    let dmg=rollDmg(1,dmgDie,crit)+getPlayerDmgMod();
    if(crit)dmg=Math.max(dmg,dmgDie); // minimum on crit
    tgt.hp-=dmg;
    clog((crit?'CRIT! ':'')+'d20='+roll+'+'+atkMod+' vs AC'+tgt.ac+' → '+dmg+' dmg to '+tgt.name,crit?'crit':'hit');
    if(tgt.hp<=0){
      tgt.alive=false;kills++;
      player.xp+=tgt.xp;totalXp+=tgt.xp;
      clog(tgt.name+(tgt.boss?' DEFEATED':'  slain')+'! +'+tgt.xp+'xp',tgt.boss?'boss':'kill');
      checkLevelUp();
    }
  } else {
    clog('d20='+roll+'+'+atkMod+' vs AC'+tgt.ac+' — Miss!','miss');
  }
}

function checkLevelUp(){
  while(player.xp>=player.xpNext){
    player.xp-=player.xpNext;
    player.level++;
    player.xpNext=Math.floor(player.xpNext*1.5);
    const hpGain=d(CLASSES[player.cls].hitDie)+mod(abilities.con);
    player.maxHp+=Math.max(1,hpGain);
    player.hp=Math.min(player.maxHp,player.hp+Math.max(1,hpGain));
    player.ac=CLASSES[player.cls].baseAC+Math.min(2+Math.floor(player.level/3),mod(abilities.dex));
    clog('LEVEL UP! Level '+player.level+' · HP +'+Math.max(1,hpGain),'lvl');
  }
}

function monsterTurns(){
  for(const m of monsters){
    if(!m.alive)continue;
    m.moveT++;
    const dx=player.x-m.x,dy=player.y-m.y;
    const dist=Math.abs(dx)+Math.abs(dy);
    if(dist<=6)m.aggro=true;
    if(!m.aggro)continue;

    if(dist===1){
      // attack player
      const roll=d(20);
      const scaledAtk=m.atk+Math.floor(floorNum/2);
      const crit=roll===20;
      const hit=crit||roll+scaledAtk>=player.ac;
      if(hit){
        const dmg=rollDmg(m.dmg[0],m.dmg[1],crit);
        player.hp-=dmg;
        clog(m.name+(crit?' CRITS':' hits')+' for '+dmg+(m.boss?' 💀':''),crit?'crit':'dmg');
        if(player.hp<=0){die();return;}
      } else {
        clog(m.name+' misses ('+roll+' vs AC'+player.ac+')','miss');
      }
    } else if(dist<=8){
      // move toward player (simple pathfinding)
      let bestD=dist,bestX=m.x,bestY=m.y;
      for(const d of DIRS){
        const nx=m.x+d[0],ny=m.y+d[1];
        if(isWall(nx,ny))continue;
        if(monsterAt(nx,ny))continue;
        if(nx===player.x&&ny===player.y)continue;
        const nd=Math.abs(player.x-nx)+Math.abs(player.y-ny);
        if(nd<bestD){bestD=nd;bestX=nx;bestY=ny;}
      }
      m.x=bestX;m.y=bestY;
    }
  }
}

function monsterAt(x,y){
  for(const m of monsters)if(m.alive&&m.x===x&&m.y===y)return m;
  return null;
}

function die(){
  gameOver=true;
  document.getElementById('death-screen').style.display='flex';
  document.getElementById('death-stats').textContent=
    RACES[player.race].name+' '+CLASSES[player.cls].name+' · Floor '+floorNum+' · '+kills+' kills · Turn '+turnCount;
}
function restartGame(){
  document.getElementById('death-screen').style.display='none';
  document.getElementById('chargen').style.display='flex';
  gameStarted=false;rollAbilities();
}
window.restartGame=restartGame;

// === DICE ===
function d(s){return 1+Math.floor(Math.random()*s);}
function rollDmg(count,die,crit){
  let t=0;const m=crit?2:1;
  for(let i=0;i<count*m;i++)t+=d(die);
  return Math.max(1,t);
}

function isWall(x,y){
  if(x<0||y<0||y>=dungeon.h||x>=dungeon.w)return true;
  return dungeon.map[y][x]===1;
}

// === RAYCASTING ===
function castRay(ox,oy,angle){
  const sin=Math.sin(angle),cos=Math.cos(angle);
  let x=ox+0.5,y=oy+0.5;
  const step=0.02;
  for(let i=0;i<600;i++){
    x+=cos*step;y+=sin*step;
    if(isWall(Math.floor(x),Math.floor(y))){
      const dist=Math.sqrt((x-ox-0.5)**2+(y-oy-0.5)**2);
      const testX=x-cos*step*0.5;
      return{dist,x,y,vert:Math.floor(testX)!==Math.floor(x)};
    }
  }
  return{dist:20,x,y,vert:false};
}

// === RENDER ===
function render(){
  if(!gameStarted)return;
  X.fillStyle='#000';X.fillRect(0,0,W,H);

  animT++;
  if(viewBob>0)viewBob*=0.85;
  if(atkFlash>0)atkFlash--;

  const pAngle=DIR_ANGLES[player.dir];
  const bobOff=Math.sin(viewBob*0.8)*4;

  // sky/floor
  const cg=X.createLinearGradient(0,0,0,H/2);
  cg.addColorStop(0,'#0a0a18');cg.addColorStop(1,'#050510');
  X.fillStyle=cg;X.fillRect(0,0,W,H/2);
  const fg=X.createLinearGradient(0,H/2,0,H);
  fg.addColorStop(0,'#080808');fg.addColorStop(1,'#151510');
  X.fillStyle=fg;X.fillRect(0,H/2,W,H/2);

  const rayCount=Math.floor(W/RAY_R);
  const zBuf=[];

  for(let i=0;i<rayCount;i++){
    const rAngle=pAngle-FOV/2+FOV*i/rayCount;
    const hit=castRay(player.x,player.y,rAngle);
    const perp=hit.dist*Math.cos(rAngle-pAngle);
    zBuf[i]=perp;
    const wH=Math.min(H*2,H/perp);
    const wT=(H-wH)/2+bobOff;
    const bright=Math.max(0.05,1-perp/10);
    const shade=hit.vert?1:0.7;
    X.fillStyle='rgb('+Math.floor(0*bright*shade)+','+Math.floor(180*bright*shade)+','+Math.floor(240*bright*shade)+')';
    X.fillRect(i*RAY_R,wT,RAY_R+1,wH);
    const wx=hit.x%1,wy=hit.y%1;
    if(Math.min(wx,1-wx,wy,1-wy)<0.05){
      X.fillStyle='rgba(0,230,255,'+(bright*0.5)+')';
      X.fillRect(i*RAY_R,wT,RAY_R+1,wH);
    }
    if(i%8===0){
      X.strokeStyle='rgba(0,180,255,0.015)';X.lineWidth=1;
      X.beginPath();X.moveTo(i*RAY_R,0);X.lineTo(i*RAY_R,wT);X.stroke();
      X.beginPath();X.moveTo(i*RAY_R,wT+wH);X.lineTo(i*RAY_R,H);X.stroke();
    }
  }

  // sprites
  const sprites=[];
  for(const m of monsters){
    if(!m.alive)continue;
    const dx=m.x-player.x,dy=m.y-player.y;
    sprites.push({x:m.x+0.5,y:m.y+0.5,dist:Math.sqrt(dx*dx+dy*dy),type:'mon',data:m});
  }
  for(const it of items){
    const dx=it.x-player.x,dy=it.y-player.y;
    sprites.push({x:it.x+0.5,y:it.y+0.5,dist:Math.sqrt(dx*dx+dy*dy),type:'item',data:it});
  }
  sprites.sort((a,b)=>b.dist-a.dist);

  for(const sp of sprites){
    const dx=sp.x-player.x-0.5,dy=sp.y-player.y-0.5;
    const ang=Math.atan2(dy,dx)-pAngle;
    let a=ang;while(a>Math.PI)a-=Math.PI*2;while(a<-Math.PI)a+=Math.PI*2;
    if(Math.abs(a)>FOV/2+0.3)continue;
    const sX=W/2+Math.tan(a)*W/(2*Math.tan(FOV/2));
    const pD=sp.dist*Math.cos(ang);
    if(pD<0.3)continue;
    const sH=H/pD*(sp.data.boss?1.4:1);
    const sW=sH*0.6;
    const sT=(H-sH)/2+bobOff;
    const col=Math.floor(sX/RAY_R);
    if(col>=0&&col<zBuf.length&&zBuf[col]<pD*0.9)continue;

    if(sp.type==='mon')drawWireframe(sp.data,sX,sT,sW,sH,pD);
    else drawItemSprite(sp.data,sX,sT+sH*0.3,sW*0.5,sH*0.4);
  }

  if(atkFlash>3){
    X.fillStyle='rgba(255,255,255,'+(0.12*(atkFlash-3)/3)+')';
    X.fillRect(0,0,W,H);
  }

  renderMinimap();
}

// === WIREFRAME MONSTERS (same art + bosses) ===
function drawWireframe(m,cx,top,w,h,dist){
  const bright=Math.max(0.2,1-dist/8);
  const col=m.color;
  X.strokeStyle=col;X.lineWidth=m.boss?2.5:1.5;X.globalAlpha=bright;
  X.shadowColor=col;X.shadowBlur=m.boss?14:8;
  const bob=Math.sin(animT*0.06+m.x*3)*h*0.015;
  const my=top+bob;

  if(m.shape==='wraith'){
    X.beginPath();X.moveTo(cx,my+h*0.1);
    X.lineTo(cx-w*0.3,my+h*0.3);X.lineTo(cx-w*0.5,my+h*0.6);
    X.lineTo(cx-w*0.35,my+h*0.9);X.lineTo(cx-w*0.15,my+h*0.75);X.lineTo(cx,my+h*0.95);
    X.lineTo(cx+w*0.15,my+h*0.75);X.lineTo(cx+w*0.35,my+h*0.9);
    X.lineTo(cx+w*0.5,my+h*0.6);X.lineTo(cx+w*0.3,my+h*0.3);X.closePath();X.stroke();
    X.fillStyle=col;X.fillRect(cx-w*0.15,my+h*0.25,w*0.08,w*0.06);
    X.fillRect(cx+w*0.07,my+h*0.25,w*0.08,w*0.06);
  } else if(m.shape==='skeleton'){
    X.beginPath();X.arc(cx,my+h*0.15,w*0.2,0,Math.PI*2);X.stroke();
    X.beginPath();X.moveTo(cx,my+h*0.25);X.lineTo(cx,my+h*0.6);X.stroke();
    for(let i=0;i<3;i++){const ry=my+h*(0.3+i*0.08);X.beginPath();X.moveTo(cx-w*0.25,ry);X.quadraticCurveTo(cx,ry+h*0.03,cx+w*0.25,ry);X.stroke();}
    X.beginPath();X.moveTo(cx,my+h*0.6);X.lineTo(cx-w*0.2,my+h*0.95);X.stroke();
    X.beginPath();X.moveTo(cx,my+h*0.6);X.lineTo(cx+w*0.2,my+h*0.95);X.stroke();
    X.beginPath();X.moveTo(cx-w*0.35,my+h*0.5);X.lineTo(cx,my+h*0.3);X.lineTo(cx+w*0.35,my+h*0.5);X.stroke();
    X.fillStyle=col;X.beginPath();X.arc(cx-w*0.08,my+h*0.13,w*0.05,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+w*0.08,my+h*0.13,w*0.05,0,Math.PI*2);X.fill();
  } else if(m.shape==='demon'){
    X.beginPath();X.moveTo(cx,my+h*0.05);X.lineTo(cx-w*0.45,my+h*0.7);X.lineTo(cx+w*0.45,my+h*0.7);X.closePath();X.stroke();
    X.beginPath();X.moveTo(cx-w*0.15,my+h*0.1);X.lineTo(cx-w*0.35,my-h*0.05);X.stroke();
    X.beginPath();X.moveTo(cx+w*0.15,my+h*0.1);X.lineTo(cx+w*0.35,my-h*0.05);X.stroke();
    X.beginPath();X.moveTo(cx-w*0.4,my+h*0.3);X.lineTo(cx-w*0.7,my+h*0.1);X.lineTo(cx-w*0.5,my+h*0.5);X.stroke();
    X.beginPath();X.moveTo(cx+w*0.4,my+h*0.3);X.lineTo(cx+w*0.7,my+h*0.1);X.lineTo(cx+w*0.5,my+h*0.5);X.stroke();
    X.fillStyle=col;X.beginPath();X.arc(cx-w*0.1,my+h*0.25,w*0.06,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+w*0.1,my+h*0.25,w*0.06,0,Math.PI*2);X.fill();
  } else if(m.shape==='lich'){
    X.beginPath();X.moveTo(cx,my);X.lineTo(cx-w*0.35,my+h*0.3);X.lineTo(cx-w*0.4,my+h*0.9);
    X.lineTo(cx+w*0.4,my+h*0.9);X.lineTo(cx+w*0.35,my+h*0.3);X.closePath();X.stroke();
    X.beginPath();X.arc(cx,my+h*0.15,w*0.25,Math.PI,0);X.stroke();
    X.beginPath();X.moveTo(cx+w*0.35,my+h*0.2);X.lineTo(cx+w*0.4,my+h);X.stroke();
    X.beginPath();X.arc(cx+w*0.35,my+h*0.15,w*0.08,0,Math.PI*2);X.stroke();
    X.fillStyle=col;X.fillRect(cx-w*0.12,my+h*0.2,w*0.08,w*0.03);X.fillRect(cx+w*0.04,my+h*0.2,w*0.08,w*0.03);
  } else if(m.shape==='slime'){
    const t=animT*0.04+m.x;
    X.beginPath();X.moveTo(cx-w*0.35,my+h*0.8);
    X.quadraticCurveTo(cx-w*0.4,my+h*0.3+Math.sin(t)*h*0.05,cx,my+h*0.2+Math.sin(t+1)*h*0.05);
    X.quadraticCurveTo(cx+w*0.4,my+h*0.3+Math.sin(t+2)*h*0.05,cx+w*0.35,my+h*0.8);
    X.quadraticCurveTo(cx,my+h*0.85,cx-w*0.35,my+h*0.8);X.stroke();
    X.fillStyle=col+'33';X.fill();
    X.fillStyle=col;X.beginPath();X.arc(cx-w*0.1,my+h*0.4,w*0.06,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+w*0.1,my+h*0.4,w*0.06,0,Math.PI*2);X.fill();
  } else if(m.shape==='colossus'){
    // massive humanoid
    X.beginPath();X.moveTo(cx,my);X.lineTo(cx-w*0.5,my+h*0.4);X.lineTo(cx-w*0.4,my+h*0.95);
    X.lineTo(cx-w*0.1,my+h*0.95);X.lineTo(cx,my+h*0.6);
    X.lineTo(cx+w*0.1,my+h*0.95);X.lineTo(cx+w*0.4,my+h*0.95);
    X.lineTo(cx+w*0.5,my+h*0.4);X.closePath();X.stroke();
    // head
    X.beginPath();X.arc(cx,my+h*0.08,w*0.18,0,Math.PI*2);X.stroke();
    // arms
    X.beginPath();X.moveTo(cx-w*0.5,my+h*0.35);X.lineTo(cx-w*0.75,my+h*0.65);X.stroke();
    X.beginPath();X.moveTo(cx+w*0.5,my+h*0.35);X.lineTo(cx+w*0.75,my+h*0.65);X.stroke();
    // eyes
    X.fillStyle=col;X.fillRect(cx-w*0.1,my+h*0.06,w*0.06,w*0.04);X.fillRect(cx+w*0.04,my+h*0.06,w*0.06,w*0.04);
    // crown
    X.beginPath();X.moveTo(cx-w*0.15,my-h*0.02);X.lineTo(cx-w*0.1,my-h*0.08);X.lineTo(cx,my-h*0.03);
    X.lineTo(cx+w*0.1,my-h*0.08);X.lineTo(cx+w*0.15,my-h*0.02);X.stroke();
  } else if(m.shape==='hydra'){
    // body
    X.beginPath();X.moveTo(cx,my+h*0.4);X.lineTo(cx-w*0.4,my+h*0.95);X.lineTo(cx+w*0.4,my+h*0.95);X.closePath();X.stroke();
    // 3 necks + heads
    for(let i=-1;i<=1;i++){
      const nx=cx+i*w*0.3,ny=my+h*0.1+Math.abs(i)*h*0.05;
      X.beginPath();X.moveTo(cx,my+h*0.4);X.quadraticCurveTo(cx+i*w*0.15,my+h*0.2,nx,ny);X.stroke();
      X.beginPath();X.arc(nx,ny,w*0.1,0,Math.PI*2);X.stroke();
      X.fillStyle=col;X.beginPath();X.arc(nx,ny-w*0.02,w*0.03,0,Math.PI*2);X.fill();
      // jaw
      X.beginPath();X.moveTo(nx-w*0.08,ny+w*0.04);X.lineTo(nx,ny+w*0.1);X.lineTo(nx+w*0.08,ny+w*0.04);X.stroke();
    }
  } else if(m.shape==='king'){
    // armored figure
    X.beginPath();X.moveTo(cx-w*0.4,my+h*0.25);X.lineTo(cx-w*0.45,my+h*0.95);
    X.lineTo(cx+w*0.45,my+h*0.95);X.lineTo(cx+w*0.4,my+h*0.25);X.closePath();X.stroke();
    // shoulders
    X.beginPath();X.moveTo(cx-w*0.55,my+h*0.2);X.lineTo(cx-w*0.4,my+h*0.25);X.stroke();
    X.beginPath();X.moveTo(cx+w*0.55,my+h*0.2);X.lineTo(cx+w*0.4,my+h*0.25);X.stroke();
    // head with crown
    X.beginPath();X.arc(cx,my+h*0.15,w*0.15,0,Math.PI*2);X.stroke();
    X.beginPath();X.moveTo(cx-w*0.18,my+h*0.05);X.lineTo(cx-w*0.15,my-h*0.02);
    X.lineTo(cx-w*0.05,my+h*0.03);X.lineTo(cx,my-h*0.04);
    X.lineTo(cx+w*0.05,my+h*0.03);X.lineTo(cx+w*0.15,my-h*0.02);X.lineTo(cx+w*0.18,my+h*0.05);X.stroke();
    // sword
    X.beginPath();X.moveTo(cx+w*0.55,my+h*0.2);X.lineTo(cx+w*0.65,my-h*0.1);X.stroke();
    X.beginPath();X.moveTo(cx+w*0.58,my+h*0.1);X.lineTo(cx+w*0.72,my+h*0.1);X.stroke(); // crossguard
    // eyes
    X.fillStyle=col;X.fillRect(cx-w*0.08,my+h*0.13,w*0.05,w*0.03);X.fillRect(cx+w*0.03,my+h*0.13,w*0.05,w*0.03);
  } else if(m.shape==='wyrm'){
    // serpentine dragon
    const t=animT*0.03;
    X.beginPath();X.moveTo(cx-w*0.1,my+h*0.15);
    X.quadraticCurveTo(cx-w*0.4,my+h*0.3+Math.sin(t)*h*0.05,cx-w*0.2,my+h*0.5);
    X.quadraticCurveTo(cx+w*0.3,my+h*0.6+Math.sin(t+1)*h*0.05,cx+w*0.1,my+h*0.8);
    X.quadraticCurveTo(cx-w*0.2,my+h*0.9,cx-w*0.3,my+h*0.95);X.stroke();
    // head
    X.beginPath();X.moveTo(cx,my+h*0.05);X.lineTo(cx-w*0.2,my+h*0.2);X.lineTo(cx+w*0.2,my+h*0.2);X.closePath();X.stroke();
    // horns
    X.beginPath();X.moveTo(cx-w*0.15,my+h*0.08);X.lineTo(cx-w*0.3,my-h*0.05);X.stroke();
    X.beginPath();X.moveTo(cx+w*0.15,my+h*0.08);X.lineTo(cx+w*0.3,my-h*0.05);X.stroke();
    // eye
    X.fillStyle=col;X.beginPath();X.arc(cx,my+h*0.12,w*0.05,0,Math.PI*2);X.fill();
    // wings
    X.beginPath();X.moveTo(cx-w*0.2,my+h*0.2);X.lineTo(cx-w*0.7,my+h*0.05);X.lineTo(cx-w*0.4,my+h*0.35);X.stroke();
    X.beginPath();X.moveTo(cx+w*0.2,my+h*0.2);X.lineTo(cx+w*0.7,my+h*0.05);X.lineTo(cx+w*0.4,my+h*0.35);X.stroke();
  }

  X.shadowBlur=0;X.globalAlpha=1;

  // HP bar (bigger for bosses)
  if(m.hp<m.maxHp||m.boss){
    const bw=w*(m.boss?0.8:0.6),bx=cx-bw/2,by=my-8;
    X.fillStyle='rgba(255,0,0,0.3)';X.fillRect(bx,by,bw,m.boss?5:3);
    X.fillStyle=m.boss?'rgba(255,0,255,0.9)':'rgba(255,50,80,0.8)';
    X.fillRect(bx,by,bw*(m.hp/m.maxHp),m.boss?5:3);
    if(m.boss){
      X.fillStyle='rgba(255,255,255,0.6)';X.font='bold 9px "Share Tech Mono"';X.textAlign='center';
      X.fillText(m.name,cx,by-3);
    }
  }
}

function drawItemSprite(it,cx,top,w,h){
  if(it.type==='stairs'){
    X.strokeStyle='rgba(255,220,50,.7)';X.lineWidth=2;X.shadowColor='#fd0';X.shadowBlur=10;
    for(let i=0;i<4;i++){const sy=top+h*(i/4);X.strokeRect(cx-w/2+i*w*0.08,sy,w-i*w*0.16,h*0.2);}
    X.shadowBlur=0;
  } else if(it.type==='potion'){
    X.fillStyle='rgba(0,255,120,.5)';X.shadowColor='#0f8';X.shadowBlur=8;
    X.beginPath();X.moveTo(cx-w*0.15,top);X.lineTo(cx+w*0.15,top);
    X.lineTo(cx+w*0.3,top+h*0.4);X.quadraticCurveTo(cx+w*0.3,top+h,cx,top+h);
    X.quadraticCurveTo(cx-w*0.3,top+h,cx-w*0.3,top+h*0.4);X.closePath();
    X.fill();X.strokeStyle='rgba(0,255,120,.8)';X.lineWidth=1;X.stroke();X.shadowBlur=0;
  }
}

// === MINIMAP ===
function renderMinimap(){
  MX.fillStyle='rgba(0,0,0,.7)';MX.fillRect(0,0,90,90);
  if(!dungeon)return;
  const s=90/dungeon.w;
  for(let y=0;y<dungeon.h;y++)for(let x=0;x<dungeon.w;x++){
    if(dungeon.map[y][x]===1){MX.fillStyle='rgba(0,200,255,.1)';MX.fillRect(x*s,y*s,s,s);}
  }
  for(const it of items){
    MX.fillStyle=it.type==='stairs'?'rgba(255,220,50,.6)':'rgba(0,255,120,.5)';
    MX.fillRect(it.x*s,it.y*s,Math.max(2,s),Math.max(2,s));
  }
  for(const m of monsters){
    if(!m.alive)continue;
    MX.fillStyle=m.boss?'#f0f':m.color;MX.globalAlpha=m.boss?0.8:0.5;
    MX.fillRect(m.x*s,m.y*s,Math.max(2,m.boss?s*1.5:s),Math.max(2,m.boss?s*1.5:s));
  }
  MX.globalAlpha=1;MX.fillStyle='#fff';
  MX.fillRect(player.x*s,player.y*s,Math.max(2,s),Math.max(2,s));
  // direction arrow
  const d=DIRS[player.dir];
  MX.strokeStyle='rgba(255,255,255,.5)';MX.lineWidth=1;
  MX.beginPath();MX.moveTo((player.x+0.5)*s,(player.y+0.5)*s);
  MX.lineTo((player.x+0.5+d[0]*1.5)*s,(player.y+0.5+d[1]*1.5)*s);MX.stroke();
}

function updateHUD(){
  if(!player)return;
  const pct=Math.max(0,player.hp/player.maxHp*100);
  document.getElementById('hp-fill').style.width=pct+'%';
  const cl=CLASSES[player.cls];
  document.getElementById('stats').innerHTML=
    '<span class="big">FLOOR '+floorNum+'</span><br>'+
    RACES[player.race].name+' '+cl.name+' LVL '+player.level+'<br>'+
    'AC '+player.ac+' · ATK +'+getAtkMod()+' · '+player.hp+'/'+player.maxHp+' HP'+
    '<div id="turn-count">Turn '+turnCount+' · XP '+player.xp+'/'+player.xpNext+'</div>';
}

function clog(msg,cls){
  const el=document.getElementById('combat-log');
  const div=document.createElement('div');
  div.className='clog '+(cls||'');div.textContent=msg;
  el.appendChild(div);
  if(el.children.length>10)el.firstChild.remove();
  setTimeout(()=>{if(div.parentNode)div.remove();},5000);
}

// === INPUT (turn-based) ===
let inputLock=false;
function queueAction(action){
  if(inputLock||gameOver||!gameStarted)return;
  inputLock=true;
  playerTurn(action);
  setTimeout(()=>inputLock=false,120);
}

document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='w'||k==='arrowup')queueAction('forward');
  else if(k==='s'||k==='arrowdown')queueAction('back');
  else if(k==='a'||k==='arrowleft')queueAction('left');
  else if(k==='d'||k==='arrowright')queueAction('right');
  else if(k==='q')queueAction('strafe-left');
  else if(k==='e')queueAction('strafe-right');
  else if(k===' '||k==='enter'){e.preventDefault();queueAction('attack');}
  else if(k==='z'||k==='.'){queueAction('wait');}
  else if(k==='h')queueAction('heal');
});

CV.addEventListener('click',()=>queueAction('attack'));

// Touch controls
document.querySelectorAll('.tbtn').forEach(btn=>{
  const k=btn.dataset.key;
  btn.addEventListener('touchstart',e=>{e.preventDefault();
    if(k==='up')queueAction('forward');
    else if(k==='down')queueAction('back');
    else if(k==='left')queueAction('left');
    else if(k==='right')queueAction('right');
    else if(k==='atk')queueAction('attack');
    else if(k==='wait')queueAction('wait');
  },{passive:false});
  btn.addEventListener('click',()=>{
    if(k==='up')queueAction('forward');
    else if(k==='down')queueAction('back');
    else if(k==='left')queueAction('left');
    else if(k==='right')queueAction('right');
    else if(k==='atk')queueAction('attack');
    else if(k==='wait')queueAction('wait');
  });
});

// === RENDER LOOP (visuals only — game logic is turn-based) ===
function loop(){render();requestAnimationFrame(loop);}
loop();
</script>
