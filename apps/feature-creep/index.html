<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feature Creep</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐌">
<meta property="og:title" content="Feature Creep">
<meta property="og:description" content="Dodge falling innovative widgets that bloat your player and slow you down.">
<meta property="og:url" content="https://sloppy.live/feature-creep/">
<meta property="og:image" content="https://sloppy.live/feature-creep/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0c14;overflow:hidden;height:100dvh;user-select:none}
canvas{display:block;width:100%;height:100%}
#ui{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;align-items:flex-start;padding:8px 14px;pointer-events:none}
#ui-left,#ui-right{display:flex;flex-direction:column;gap:3px}
.ui-row{font-family:'Fira Code',monospace;font-size:10px;color:rgba(100,200,255,.4);letter-spacing:1px}
.ui-val{color:rgba(100,200,255,.7);font-weight:500}
#bloat-bar-wrap{width:min(200px,30vw);height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;margin-top:2px}
#bloat-bar{height:100%;width:0%;border-radius:3px;transition:width .2s,background .3s}
#feature-log{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:5;font-family:'Fira Code',monospace;font-size:9px;color:rgba(255,100,100,.4);text-align:center;min-height:1.2em;pointer-events:none;letter-spacing:1px;transition:opacity .3s}
#screens{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(6px)}
#screens.hidden{display:none}
#screen-content{text-align:center}
#screen-content h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,6vw,48px);font-weight:700;color:#fff;letter-spacing:3px}
#screen-content .sub{font-family:'Fira Code',monospace;font-size:11px;color:rgba(255,255,255,.25);letter-spacing:3px;margin:6px 0 20px}
#screen-content .stats{font-family:'Fira Code',monospace;font-size:12px;color:rgba(255,255,255,.35);line-height:2;margin-bottom:16px}
.big-btn{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;padding:10px 28px;background:rgba(100,200,255,.1);border:1px solid rgba(100,200,255,.2);border-radius:6px;color:rgba(100,200,255,.7);cursor:pointer;letter-spacing:2px;transition:all .15s}
.big-btn:hover{background:rgba(100,200,255,.2);color:#fff}
#touch-left,#touch-right{position:fixed;bottom:0;width:50%;height:30%;z-index:6;opacity:0}
#touch-left{left:0}#touch-right{right:0}
a#backlink{position:fixed;bottom:4px;right:8px;color:rgba(255,255,255,.02);font-size:7px;text-decoration:none;z-index:5}
a#backlink:hover{color:rgba(255,255,255,.1)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
 <div id="ui-left">
  <div class="ui-row">SCORE <span class="ui-val" id="score">0</span></div>
  <div class="ui-row">SPEED <span class="ui-val" id="speed">100%</span></div>
  <div id="bloat-bar-wrap"><div id="bloat-bar"></div></div>
 </div>
 <div id="ui-right">
  <div class="ui-row">WAVE <span class="ui-val" id="wave">1</span></div>
  <div class="ui-row">DODGED <span class="ui-val" id="dodged">0</span></div>
 </div>
</div>
<div id="feature-log"></div>
<div id="screens">
 <div id="screen-content">
  <h1>FEATURE CREEP</h1>
  <div class="sub">DODGE THE FEATURES · STAY LEAN</div>
  <div class="stats" id="end-stats" style="display:none"></div>
  <button class="big-btn" id="start-btn">START</button>
 </div>
</div>
<div id="touch-left"></div>
<div id="touch-right"></div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();addEventListener('resize',resize);

// Features that fall — each slows you down
const FEATURES=[
 {name:'Dark Mode Toggle',icon:'🌙',color:'#6a5acd',weight:8},
 {name:'AI Chatbot',icon:'🤖',color:'#ff6090',weight:15},
 {name:'Blockchain Integration',icon:'⛓️',color:'#f0a030',weight:20},
 {name:'Social Login',icon:'👤',color:'#4a90d9',weight:10},
 {name:'Push Notifications',icon:'🔔',color:'#ff4040',weight:12},
 {name:'Animated Onboarding',icon:'✨',color:'#ffcc00',weight:8},
 {name:'3D Parallax',icon:'🎭',color:'#40d0d0',weight:14},
 {name:'Crypto Wallet',icon:'💰',color:'#f7931a',weight:18},
 {name:'Voice Commands',icon:'🎙️',color:'#a040ff',weight:12},
 {name:'AR Preview',icon:'📱',color:'#30e060',weight:16},
 {name:'NFT Gallery',icon:'🖼️',color:'#ff60ff',weight:22},
 {name:'Metaverse Portal',icon:'🌐',color:'#00d4ff',weight:25},
 {name:'Gamification Layer',icon:'🎮',color:'#ff8c00',weight:13},
 {name:'Analytics Dashboard',icon:'📊',color:'#4caf50',weight:10},
 {name:'Recommendation Engine',icon:'🧠',color:'#e040a0',weight:15},
 {name:'Real-time Sync',icon:'🔄',color:'#20b2aa',weight:11},
 {name:'Custom Emoji Pack',icon:'😎',color:'#ffd700',weight:6},
 {name:'Infinite Scroll',icon:'📜',color:'#8b4513',weight:9},
 {name:'Gesture Controls',icon:'👋',color:'#ff6347',weight:11},
 {name:'Theme Marketplace',icon:'🎨',color:'#da70d6',weight:14},
 {name:'Quantum Computing API',icon:'⚛️',color:'#00ffff',weight:30},
 {name:'Sentiment Analysis',icon:'💭',color:'#778899',weight:13},
 {name:'Auto-Translation',icon:'🌍',color:'#32cd32',weight:12},
 {name:'Holographic UI',icon:'💎',color:'#b0c4de',weight:20},
];

// Coffee power-up — removes bloat
const COFFEE={name:'COFFEE',icon:'☕',color:'#8B4513'};

// State
let player={x:0,y:0,w:24,h:32,baseSpeed:4,speed:4,bloat:0,maxBloat:100,features:[]};
let widgets=[],particles=[];
let score=0,wave=1,dodged=0,gameActive=false;
let spawnTimer=0,waveTimer=0,surviveTimer=0;
let keys={left:false,right:false};
let lastFeatureMsg='',featureMsgTimer=0;

// Audio
let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function hitSound(){
 if(!actx)return;const t=actx.currentTime;
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+.15);
 g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
 o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.15);
}
function dodgeSound(){
 if(!actx)return;const t=actx.currentTime;
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='sine';o.frequency.value=500+Math.random()*200;
 g.gain.setValueAtTime(.02,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);
 o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.04);
}
function coffeeSound(){
 if(!actx)return;const t=actx.currentTime;
 [600,800,1000].forEach((f,i)=>{
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.value=f;
  g.gain.setValueAtTime(.05,t+i*.06);g.gain.exponentialRampToValueAtTime(.001,t+i*.06+.12);
  o.connect(g);g.connect(actx.destination);o.start(t+i*.06);o.stop(t+i*.06+.12);
 });
}
function crashSound(){
 if(!actx)return;const t=actx.currentTime;
 const sz=actx.sampleRate*.3,buf=actx.createBuffer(1,sz,actx.sampleRate);
 const d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*.15*(1-i/sz);
 const s=actx.createBufferSource(),g=actx.createGain();
 g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);
 s.buffer=buf;s.connect(g);g.connect(actx.destination);s.start(t);
}

function spawnWidget(){
 const isCoffee=Math.random()<.08;// 8% chance coffee
 if(isCoffee){
  widgets.push({
   x:40+Math.random()*(W-80),y:-30,
   w:24,h:24,vy:1.5+wave*.2+Math.random(),
   feature:COFFEE,isCoffee:true,rot:0,
  });
 }else{
  const feat=FEATURES[Math.floor(Math.random()*FEATURES.length)];
  const size=20+feat.weight*.5;
  widgets.push({
   x:40+Math.random()*(W-80),y:-size,
   w:size,h:size,vy:1+wave*.25+Math.random()*.8,
   feature:feat,isCoffee:false,rot:0,
   wobble:Math.random()*Math.PI*2,
  });
 }
}

function startGame(){
 initAudio();
 player.x=W/2;player.y=H-80;player.bloat=0;player.speed=player.baseSpeed;player.features=[];player.w=24;player.h=32;
 widgets=[];particles=[];
 score=0;wave=1;dodged=0;spawnTimer=0;waveTimer=0;surviveTimer=0;
 gameActive=true;featureMsgTimer=0;
 document.getElementById('screens').classList.add('hidden');
 document.getElementById('end-stats').style.display='none';
 document.getElementById('screen-content').querySelector('h1').textContent='FEATURE CREEP';
 document.getElementById('start-btn').textContent='START';
 updateUI();
}

function gameOver(){
 gameActive=false;
 crashSound();
 document.getElementById('screens').classList.remove('hidden');
 document.getElementById('screen-content').querySelector('h1').textContent='STACK OVERFLOW';
 document.getElementById('screen-content').querySelector('.sub').textContent='YOUR APP COLLAPSED UNDER ITS OWN FEATURES';
 document.getElementById('start-btn').textContent='REBOOT';
 const feat=player.features.length?player.features.map(f=>f.name).join(', '):'none';
 document.getElementById('end-stats').innerHTML=
  'SCORE: '+score+'<br>SURVIVED: '+Math.floor(surviveTimer)+'s<br>DODGED: '+dodged+'<br>WAVE: '+wave+
  '<br>BLOAT: '+Math.floor(player.bloat)+'%<br><br><span style="font-size:9px;color:rgba(255,100,100,.3)">INSTALLED: '+feat+'</span>';
 document.getElementById('end-stats').style.display='block';
}

function updateUI(){
 document.getElementById('score').textContent=score;
 const speedPct=Math.max(0,Math.floor((player.speed/player.baseSpeed)*100));
 document.getElementById('speed').textContent=speedPct+'%';
 document.getElementById('speed').style.color=speedPct>60?'rgba(100,200,255,.7)':speedPct>30?'rgba(255,180,60,.7)':'rgba(255,60,60,.7)';
 document.getElementById('wave').textContent=wave;
 document.getElementById('dodged').textContent=dodged;
 const bloatPct=Math.min(100,player.bloat);
 const bar=document.getElementById('bloat-bar');
 bar.style.width=bloatPct+'%';
 bar.style.background=bloatPct<40?'#40c0ff':bloatPct<70?'#ffa040':'#ff4040';
}

function update(dt){
 if(!gameActive)return;
 surviveTimer+=dt;
 score+=Math.floor(dt*10*(1+wave*.5));

 // Player movement
 const moveSpeed=player.speed*60*dt;
 if(keys.left)player.x-=moveSpeed;
 if(keys.right)player.x+=moveSpeed;
 player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x));

 // Spawn
 const rate=Math.max(.15,1.2-wave*.08);
 spawnTimer+=dt;
 if(spawnTimer>=rate){spawnTimer=0;spawnWidget();if(wave>3&&Math.random()<.3)spawnWidget()}

 // Waves
 waveTimer+=dt;
 if(waveTimer>=12){waveTimer=0;wave++}

 // Widgets
 for(let i=widgets.length-1;i>=0;i--){
  const w=widgets[i];
  w.y+=w.vy*60*dt;
  w.rot+=dt*2;
  if(w.wobble!==undefined)w.x+=Math.sin(w.wobble+surviveTimer*2)*dt*30;

  // Off screen bottom — dodged
  if(w.y>H+40){
   if(!w.isCoffee){dodged++;dodgeSound()}
   widgets.splice(i,1);continue;
  }

  // Collision with player
  const dx=w.x-player.x,dy=w.y-player.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const hitR=(player.w+w.w)/2*.7;

  if(dist<hitR){
   if(w.isCoffee){
    // Coffee! Remove bloat
    coffeeSound();
    player.bloat=Math.max(0,player.bloat-25);
    player.speed=Math.max(player.baseSpeed*.2,player.baseSpeed*(1-player.bloat/120));
    player.w=Math.max(24,24+player.bloat*.3);
    player.h=Math.max(32,32+player.bloat*.15);
    // Green particles
    for(let j=0;j<10;j++){
     const a=Math.random()*Math.PI*2,sp=40+Math.random()*60;
     particles.push({x:w.x,y:w.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:2+Math.random()*2,color:'#40ff80'});
    }
    showFeatureMsg('☕ COFFEE — BLOAT REDUCED!','#40ff80');
   }else{
    // Hit by feature
    hitSound();
    const feat=w.feature;
    player.bloat=Math.min(player.maxBloat,player.bloat+feat.weight);
    player.speed=Math.max(player.baseSpeed*.1,player.baseSpeed*(1-player.bloat/120));
    player.w=24+player.bloat*.3;
    player.h=32+player.bloat*.15;
    player.features.push(feat);
    if(player.features.length>12)player.features.shift();
    // Particles
    for(let j=0;j<6;j++){
     const a=Math.random()*Math.PI*2,sp=30+Math.random()*40;
     particles.push({x:w.x,y:w.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:.8,r:2,color:feat.color});
    }
    showFeatureMsg('+ '+feat.icon+' '+feat.name.toUpperCase()+' INSTALLED',feat.color);
   }
   widgets.splice(i,1);
   updateUI();

   // Game over at max bloat
   if(player.bloat>=player.maxBloat)gameOver();
  }
 }

 // Particles
 particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=60*dt;p.life-=dt*1.5});
 particles=particles.filter(p=>p.life>0);

 // Feature message decay
 if(featureMsgTimer>0){
  featureMsgTimer-=dt;
  if(featureMsgTimer<=0)document.getElementById('feature-log').style.opacity='0';
 }

 updateUI();
}

function showFeatureMsg(msg,color){
 const el=document.getElementById('feature-log');
 el.textContent=msg;el.style.color=color;el.style.opacity='1';
 featureMsgTimer=1.5;
}

function draw(t){
 X.fillStyle='#0a0c14';X.fillRect(0,0,W,H);

 // Grid floor
 X.strokeStyle='rgba(100,200,255,.03)';X.lineWidth=.5;
 const gs=50;
 for(let gx=0;gx<W;gx+=gs){X.beginPath();X.moveTo(gx,0);X.lineTo(gx,H);X.stroke()}
 for(let gy=0;gy<H;gy+=gs){X.beginPath();X.moveTo(0,gy);X.lineTo(W,gy);X.stroke()}

 if(!gameActive&&!document.getElementById('screens').classList.contains('hidden'))return;

 // Draw widgets
 X.font='bold 14px "Fira Code",monospace';X.textAlign='center';X.textBaseline='middle';
 widgets.forEach(w=>{
  X.save();X.translate(w.x,w.y);X.rotate(Math.sin(w.rot)*.15);
  // Widget box
  const s=w.w/2;
  // Glow
  X.globalAlpha=.15;
  X.fillStyle=w.feature.color;
  X.beginPath();X.arc(0,0,s*1.5,0,Math.PI*2);X.fill();
  // Box
  X.globalAlpha=.9;
  X.fillStyle='#1a1e2a';
  X.fillRect(-s,-s,s*2,s*2);
  X.strokeStyle=w.feature.color;X.lineWidth=1.5;
  X.strokeRect(-s,-s,s*2,s*2);
  // Icon
  X.globalAlpha=1;
  X.font=Math.floor(s*1.2)+'px sans-serif';
  X.fillText(w.feature.icon,0,1);
  X.restore();
 });

 // Draw player
 const px=player.x,py=player.y;
 const pw=player.w/2,ph=player.h/2;
 // Player glow
 const bloatPct=player.bloat/player.maxBloat;
 const glow=X.createRadialGradient(px,py,0,px,py,pw*2);
 const gc=bloatPct>.6?'rgba(255,60,60,':'rgba(100,200,255,';
 glow.addColorStop(0,gc+(.08+bloatPct*.1)+')');glow.addColorStop(1,'transparent');
 X.fillStyle=glow;X.beginPath();X.arc(px,py,pw*2,0,Math.PI*2);X.fill();
 // Body
 X.fillStyle=bloatPct>.7?'#ff4040':bloatPct>.4?'#ffa040':'#40c0ff';
 X.beginPath();
 X.moveTo(px,py-ph);
 X.lineTo(px+pw,py+ph*.6);
 X.lineTo(px+pw*.6,py+ph);
 X.lineTo(px-pw*.6,py+ph);
 X.lineTo(px-pw,py+ph*.6);
 X.closePath();X.fill();
 // Face
 X.fillStyle='#fff';
 X.beginPath();X.arc(px-pw*.25,py-ph*.2,2,0,Math.PI*2);X.fill();
 X.beginPath();X.arc(px+pw*.25,py-ph*.2,2,0,Math.PI*2);X.fill();
 // Mouth — gets sadder with bloat
 X.strokeStyle='#fff';X.lineWidth=1.5;X.lineCap='round';
 if(bloatPct<.3){
  X.beginPath();X.arc(px,py+ph*.05,pw*.25,.2,Math.PI-.2);X.stroke();
 }else if(bloatPct<.6){
  X.beginPath();X.moveTo(px-pw*.2,py+ph*.15);X.lineTo(px+pw*.2,py+ph*.15);X.stroke();
 }else{
  X.beginPath();X.arc(px,py+ph*.35,pw*.25,Math.PI+.3,-.3);X.stroke();
 }
 // Installed features orbiting player
 if(player.features.length>0){
  X.font='10px sans-serif';X.textAlign='center';X.textBaseline='middle';
  const orbitR=pw*1.8+bloatPct*10;
  player.features.slice(-8).forEach((f,i)=>{
   const a=t*.001+i*(Math.PI*2/Math.min(8,player.features.length));
   const fx=px+Math.cos(a)*orbitR;
   const fy=py+Math.sin(a)*orbitR*.6;
   X.globalAlpha=.4;
   X.fillText(f.icon,fx,fy);
  });
  X.globalAlpha=1;
 }

 // Particles
 particles.forEach(p=>{
  X.globalAlpha=p.life;X.fillStyle=p.color;
  X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();
 });
 X.globalAlpha=1;

 // Vignette
 const vg=X.createRadialGradient(W/2,H/2,Math.min(W,H)*.2,W/2,H/2,Math.max(W,H)*.6);
 vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(5,6,10,.5)');
 X.fillStyle=vg;X.fillRect(0,0,W,H);

 // Danger overlay at high bloat
 if(bloatPct>.7){
  X.fillStyle='rgba(255,0,0,'+(Math.sin(t*.006)*.03+.02)+')';
  X.fillRect(0,0,W,H);
 }
}

// Input
addEventListener('keydown',e=>{
 if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;
 if(e.key==='ArrowRight'||e.key==='d')keys.right=true;
});
addEventListener('keyup',e=>{
 if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;
 if(e.key==='ArrowRight'||e.key==='d')keys.right=false;
});
// Touch
document.getElementById('touch-left').addEventListener('touchstart',e=>{e.preventDefault();keys.left=true},{passive:false});
document.getElementById('touch-left').addEventListener('touchend',()=>keys.left=false);
document.getElementById('touch-right').addEventListener('touchstart',e=>{e.preventDefault();keys.right=true},{passive:false});
document.getElementById('touch-right').addEventListener('touchend',()=>keys.right=false);

document.getElementById('start-btn').addEventListener('click',startGame);

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.033);lastTime=t;
 update(dt);draw(t);
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
