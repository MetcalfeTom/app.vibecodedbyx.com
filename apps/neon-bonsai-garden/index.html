<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Bonsai Garden</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌿">
<meta property="og:title" content="Neon Bonsai Garden">
<meta property="og:description" content="Glowing bonsai trees grown by chat. Pick a neon fluid, send a message, watch a branch bloom.">
<meta property="og:url" content="https://sloppy.live/neon-bonsai-garden">
<meta property="og:image" content="https://emojicdn.elk.sh/🌿?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Fira+Code:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05060a;--soil:#0c0a08;--text:#607060;--dim:#2a3028;--glow1:#00ff88;--glow2:#ff66aa;--glow3:#44ddff;--glow4:#ffaa22;--glow5:#aa66ff}
html,body{height:100dvh;overflow:hidden;background:var(--bg);font-family:'Fira Code',monospace}
body{display:flex;flex-direction:column}
canvas{flex:1;display:block;cursor:pointer}
#hud{position:fixed;top:10px;left:14px;font-size:10px;color:var(--text);pointer-events:none;font-weight:300;line-height:1.8}
#hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:rgba(100,160,100,0.4);pointer-events:none;transition:opacity 1s;text-align:center;white-space:nowrap}
#controls{position:fixed;top:10px;right:12px;display:flex;gap:6px;z-index:5}
.ctrl-btn{background:rgba(10,20,10,0.6);border:1px solid rgba(40,80,40,0.25);color:var(--text);font-family:'Fira Code',monospace;font-size:9px;padding:6px 12px;border-radius:4px;cursor:pointer;transition:all .15s}
.ctrl-btn:hover{border-color:rgba(0,255,136,0.3);color:var(--glow1)}
/* ===== chat input strip ===== */
#chatBar{
  position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
  display:flex;gap:8px;align-items:center;z-index:6;
  background:rgba(10,16,12,0.55);
  border:1px solid rgba(40,80,40,0.30);
  border-radius:24px;padding:6px 6px 6px 16px;
  backdrop-filter:blur(8px);
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  width:min(540px,90vw);
}
#chatInput{
  flex:1;background:transparent;border:none;outline:none;
  color:rgba(200,240,210,0.95);font-family:'Fira Code',monospace;
  font-size:12px;letter-spacing:0.04em;padding:6px 0;
}
#chatInput::placeholder{color:rgba(100,160,110,0.45);font-style:italic;font-family:'Cormorant Garamond',serif}
#chatSend{
  background:rgba(0,255,136,0.12);border:1px solid rgba(0,255,136,0.35);
  color:var(--glow1);font-family:'Fira Code',monospace;font-size:10px;
  padding:6px 14px;border-radius:18px;cursor:pointer;text-transform:uppercase;
  letter-spacing:0.12em;transition:all .15s;
}
#chatSend:hover{background:rgba(0,255,136,0.22);box-shadow:0 0 10px rgba(0,255,136,0.4)}

/* ===== neon fluid bottle row ===== */
#fluids{
  position:fixed;left:50%;bottom:62px;transform:translateX(-50%);
  display:flex;gap:8px;justify-content:center;z-index:6;flex-wrap:wrap;
  pointer-events:auto;
}
.fluid{
  width:34px;height:46px;border-radius:6px 6px 9px 9px;
  background:linear-gradient(180deg, transparent 0%, transparent 22%, var(--fc) 22%, var(--fc) 100%);
  border:1.5px solid rgba(255,255,255,0.20);
  cursor:pointer;position:relative;
  box-shadow:0 0 10px var(--fc), inset 0 -6px 8px rgba(0,0,0,0.30);
  transition:transform .12s, box-shadow .12s;
  display:flex;align-items:flex-end;justify-content:center;
  font-family:'Fira Code',monospace;font-size:8px;color:rgba(255,255,255,0.90);
  letter-spacing:0.10em;text-transform:uppercase;padding-bottom:3px;
}
.fluid::before{
  content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:14px;height:6px;background:rgba(40,30,40,0.75);border-radius:2px 2px 0 0;
  border:1px solid rgba(255,255,255,0.15);
}
.fluid::after{
  content:'';position:absolute;top:6px;left:6px;width:6px;height:14px;
  background:linear-gradient(180deg, rgba(255,255,255,0.50), transparent);
  border-radius:3px;pointer-events:none;
}
.fluid:hover{transform:translateY(-3px);box-shadow:0 4px 14px var(--fc), inset 0 -6px 8px rgba(0,0,0,0.30)}
.fluid.on{
  transform:translateY(-5px);
  box-shadow:0 0 22px var(--fc), 0 0 40px var(--fc), inset 0 -6px 8px rgba(0,0,0,0.20);
  border-color:rgba(255,255,255,0.55);
}

/* ===== chat log ===== */
#chatLog{
  position:fixed;top:48px;right:12px;max-width:240px;
  display:flex;flex-direction:column;gap:4px;z-index:4;
  pointer-events:none;font-family:'Fira Code',monospace;font-size:10px;
}
.chat-msg{
  background:rgba(10,16,12,0.50);
  border-left:2px solid var(--mc, var(--glow1));
  padding:4px 8px;border-radius:0 4px 4px 0;
  color:rgba(220,240,220,0.85);letter-spacing:0.02em;
  animation:msgIn 0.5s ease-out;
  word-break:break-word;
}
.chat-msg .who{color:var(--mc, var(--glow1));margin-right:4px;font-weight:300}
@keyframes msgIn{
  from{opacity:0;transform:translateX(20px)}
  to  {opacity:1;transform:translateX(0)}
}

@media(max-width:500px){
  .ctrl-btn{padding:10px 14px;font-size:10px}
  #hint{font-size:12px;bottom:120px;padding:0 20px;white-space:normal}
  #chatBar{width:96vw}
  #chatLog{display:none}
  .fluid{width:28px;height:38px;font-size:7px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<div id="hint">pick a fluid · type a message · the tree grows</div>
<div id="controls">
<button class="ctrl-btn" id="seasonBtn">Season</button>
<button class="ctrl-btn" id="clearBtn">Clear</button>
</div>
<div id="chatLog"></div>
<div id="fluids"></div>
<form id="chatBar" autocomplete="off">
  <input id="chatInput" type="text" maxlength="120" placeholder="say something to grow a branch…" />
  <button id="chatSend" type="submit">grow</button>
</form>
<script>
(function(){
var C=document.getElementById('c'),X=C.getContext('2d');
var W,H;
function resize(){W=C.width=C.clientWidth;H=C.height=C.clientHeight;}
resize();window.addEventListener('resize',resize);

var PALETTES=[
  {name:'Jade',trunk:'#1a2818',branch:'#2a4020',leaf:'#00ff88',bloom:'#88ffcc',glow:'rgba(0,255,136,'},
  {name:'Sakura',trunk:'#2a1820',branch:'#3a2030',leaf:'#ff66aa',bloom:'#ffaacc',glow:'rgba(255,102,170,'},
  {name:'Frost',trunk:'#141a22',branch:'#1e2a38',leaf:'#44ddff',bloom:'#88eeff',glow:'rgba(68,221,255,'},
  {name:'Ember',trunk:'#201410',branch:'#382018',leaf:'#ffaa22',bloom:'#ffcc66',glow:'rgba(255,170,34,'},
  {name:'Violet',trunk:'#18122a',branch:'#281a3a',leaf:'#aa66ff',bloom:'#cc99ff',glow:'rgba(170,102,255,'}
];

var SEASONS=['spring','summer','autumn','winter'];
var season=0;
var trees=[];
var particles=[];
var totalGrowth=0;
var t=0;
var hint=document.getElementById('hint');
var hintVisible=true;

function makeTree(x,ground){
  var pal=PALETTES[Math.floor(Math.random()*PALETTES.length)];
  return{x:x,ground:ground,pal:pal,segments:[],maxDepth:0,age:0,energy:3,swayPhase:Math.random()*Math.PI*2,swaySpeed:0.3+Math.random()*0.3};
}

function addTrunk(tree){
  var h=30+Math.random()*20;
  tree.segments.push({x1:tree.x,y1:tree.ground,x2:tree.x+(Math.random()-0.5)*4,y2:tree.ground-h,width:3+Math.random()*2,depth:0,growProgress:0,angle:-Math.PI/2,children:[],leaf:false,palIdx:PALETTES.indexOf(tree.pal)});
  tree.maxDepth=0;
}

// fluidIdx: optional palette index — when chat or a fluid drives growth,
// the new segment uses THAT palette regardless of the tree's base palette,
// so an old jade tree can sprout sakura branches when watered with pink.
function growBranch(tree,parent,fluidIdx){
  if(tree.maxDepth>=8)return;
  var len=(18+Math.random()*14)*Math.pow(0.78,parent.depth);
  var baseAngle=Math.atan2(parent.y2-parent.y1,parent.x2-parent.x1);
  var spread=0.3+Math.random()*0.5;
  var side=parent.children.length%2===0?-1:1;
  var angle=baseAngle+side*spread+(Math.random()-0.5)*0.2;
  if(angle>-0.2)angle=-0.3-Math.random()*0.5;
  if(angle<-Math.PI+0.2)angle=-Math.PI+0.3+Math.random()*0.5;
  var x2=parent.x2+Math.cos(angle)*len;
  var y2=parent.y2+Math.sin(angle)*len;
  var w=Math.max(0.5,parent.width*0.65);
  var depth=parent.depth+1;
  var pi=(fluidIdx!=null)?fluidIdx:(parent.palIdx!=null?parent.palIdx:PALETTES.indexOf(tree.pal));
  var seg={x1:parent.x2,y1:parent.y2,x2:x2,y2:y2,width:w,depth:depth,growProgress:0,angle:angle,children:[],leaf:depth>=4&&Math.random()<0.6+depth*0.1,palIdx:pi};
  parent.children.push(seg);
  tree.segments.push(seg);
  if(depth>tree.maxDepth)tree.maxDepth=depth;
}

function growTree(tree,fluidIdx){
  if(tree.segments.length===0){addTrunk(tree);return;}
  var tips=[];
  for(var i=0;i<tree.segments.length;i++){
    var s=tree.segments[i];
    if(s.children.length<3&&s.depth<8)tips.push(s);
  }
  if(tips.length===0)return;
  tips.sort(function(a,b){return a.children.length-b.children.length;});
  var pick=tips[Math.floor(Math.random()*Math.min(5,tips.length))];
  growBranch(tree,pick,fluidIdx);
  tree.age++;
  totalGrowth++;
}

function spawnLeafParticle(x,y,pal){
  var isBloom=season===0&&Math.random()<0.4;
  particles.push({x:x,y:y,vx:(Math.random()-0.5)*0.8,vy:-0.3-Math.random()*0.5,life:1,hue:isBloom?pal.bloom:pal.leaf,size:1.5+Math.random()*2,drift:Math.random()*Math.PI*2});
}

function spawnGrowParticle(x,y,pal){
  for(var i=0;i<6;i++){
    particles.push({x:x,y:y,vx:(Math.random()-0.5)*2,vy:-1-Math.random()*2,life:1,hue:pal.glow+'0.7)',size:2+Math.random()*3,drift:0,spark:true});
  }
}

// --- FIREFLIES (ambient life) ---
var fireflies=[];
for(var i=0;i<12;i++){
  fireflies.push({x:Math.random()*2000,y:Math.random()*2000,phase:Math.random()*Math.PI*2,speed:0.2+Math.random()*0.3,dx:Math.random()*Math.PI*2});
}

function update(){
  t+=0.016;
  for(var i=0;i<trees.length;i++){
    var tr=trees[i];
    for(var j=0;j<tr.segments.length;j++){
      var s=tr.segments[j];
      if(s.growProgress<1)s.growProgress=Math.min(1,s.growProgress+0.03);
    }
    if(tr.energy>0&&Math.random()<0.02){growTree(tr);tr.energy--;}
    if(tr.segments.length>3&&Math.random()<0.01){
      var tip=tr.segments[tr.segments.length-1-Math.floor(Math.random()*Math.min(5,tr.segments.length))];
      if(tip.leaf)spawnLeafParticle(tip.x2,tip.y2,tr.pal);
    }
    if(season===2&&Math.random()<0.015&&tr.segments.length>5){
      var rs=tr.segments[Math.floor(Math.random()*tr.segments.length)];
      particles.push({x:rs.x2,y:rs.y2,vx:0.3+Math.random()*0.5,vy:0.2+Math.random()*0.3,life:1,hue:Math.random()<0.5?'#ffaa22':'#ff6633',size:2+Math.random()*2,drift:Math.random()*Math.PI*2,falling:true});
    }
  }
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    if(p.falling){p.x+=p.vx+Math.sin(t*2+p.drift)*0.3;p.y+=p.vy;p.life-=0.005;}
    else if(p.spark){p.x+=p.vx;p.y+=p.vy;p.vy+=0.03;p.life-=0.03;}
    else{p.x+=p.vx+Math.sin(t+p.drift)*0.2;p.y+=p.vy;p.life-=0.008;}
    if(p.life<=0||p.y<-10||p.y>H+10)particles.splice(i,1);
  }
}

function drawSeg(seg,pal,swayOffset){
  if(seg.growProgress<=0)return;
  var prog=seg.growProgress;
  var x1=seg.x1,y1=seg.y1;
  var dx=seg.x2-seg.x1,dy=seg.y2-seg.y1;
  var x2=x1+dx*prog,y2=y1+dy*prog;
  var sway=swayOffset*(seg.depth+1)*0.3;
  x1+=sway*0.3;x2+=sway;
  if(seg.depth>0){
    X.strokeStyle=pal.glow+(0.03+seg.depth*0.008)+')';
    X.lineWidth=seg.width*3;X.lineCap='round';
    X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();
  }
  var bright=season===3?0.25:0.5;
  X.strokeStyle=seg.depth<2?pal.trunk:pal.branch;
  X.globalAlpha=bright+seg.depth*0.05;
  X.lineWidth=seg.width*prog;X.lineCap='round';
  X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();
  X.globalAlpha=1;
  if(seg.leaf&&prog>0.8&&season!==3){
    var leafSize=3+seg.depth*0.8;
    var seasonAlpha=season===2?0.5:0.8;
    var lg=X.createRadialGradient(x2,y2,0,x2,y2,leafSize*4);
    lg.addColorStop(0,pal.glow+(0.06*seasonAlpha)+')');
    lg.addColorStop(1,pal.glow+'0)');
    X.fillStyle=lg;
    X.beginPath();X.arc(x2,y2,leafSize*4,0,Math.PI*2);X.fill();
    var nLeaves=3+Math.floor(Math.random()*3);
    for(var i=0;i<nLeaves;i++){
      var lx=x2+(Math.random()-0.5)*leafSize*2.5;
      var ly=y2+(Math.random()-0.5)*leafSize*2;
      var lr=leafSize*0.4+Math.random()*leafSize*0.3;
      var pulse=0.6+Math.sin(t*1.5+seg.depth+i)*0.3;
      X.fillStyle=pal.leaf;X.globalAlpha=seasonAlpha*pulse*0.7;
      X.beginPath();X.arc(lx,ly,lr,0,Math.PI*2);X.fill();
    }
    if(season===0&&Math.random()<0.3){
      X.fillStyle=pal.bloom;X.globalAlpha=0.6;
      X.beginPath();X.arc(x2+(Math.random()-0.5)*4,y2-Math.random()*4,1.5+Math.random(),0,Math.PI*2);X.fill();
    }
    X.globalAlpha=1;
  }
}

function drawTree(tree){
  var sway=Math.sin(t*tree.swaySpeed+tree.swayPhase)*3;
  for(var i=0;i<tree.segments.length;i++){
    var s=tree.segments[i];
    var pal=(s.palIdx!=null&&PALETTES[s.palIdx])?PALETTES[s.palIdx]:tree.pal;
    drawSeg(s,pal,sway);
  }
  if(season===3){
    for(var i=0;i<tree.segments.length;i++){
      var s=tree.segments[i];
      if(s.leaf&&s.growProgress>0.8){
        var sx=s.x2+sway*(s.depth+1)*0.3;
        X.fillStyle='rgba(200,220,240,0.15)';
        X.beginPath();X.ellipse(sx,s.y2-2,4+s.depth*0.5,2,0,0,Math.PI*2);X.fill();
      }
    }
  }
}

function draw(){
  var bg=X.createLinearGradient(0,0,0,H);
  if(season===3){bg.addColorStop(0,'#080a10');bg.addColorStop(1,'#0a0c14');}
  else if(season===2){bg.addColorStop(0,'#0a0808');bg.addColorStop(1,'#100c08');}
  else{bg.addColorStop(0,'#050608');bg.addColorStop(1,'#080a0c');}
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  // stars
  for(var i=0;i<30;i++){
    var sx=(i*331+17)%W,sy=(i*197+53)%(H*0.6);
    var twinkle=0.1+Math.sin(t*0.5+i*1.7)*0.08;
    X.fillStyle='rgba(180,200,220,'+twinkle+')';
    X.beginPath();X.arc(sx,sy,0.5+i%2*0.5,0,Math.PI*2);X.fill();
  }
  // fireflies
  for(var i=0;i<fireflies.length;i++){
    var ff=fireflies[i];
    var fx=(ff.x+Math.sin(t*ff.speed+ff.dx)*60)%W;
    var fy=(ff.y+Math.cos(t*ff.speed*0.7+ff.phase)*40)%H;
    if(fy<H*0.3||fy>H-30)continue;
    var bright=0.1+Math.sin(t*2+ff.phase)*0.12;
    if(bright<0.02)continue;
    var fg=X.createRadialGradient(fx,fy,0,fx,fy,6);
    fg.addColorStop(0,'rgba(180,255,100,'+bright+')');
    fg.addColorStop(1,'rgba(180,255,100,0)');
    X.fillStyle=fg;
    X.beginPath();X.arc(fx,fy,6,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(220,255,180,'+(bright*2)+')';
    X.beginPath();X.arc(fx,fy,1,0,Math.PI*2);X.fill();
  }
  // winter snow
  if(season===3){
    for(var i=0;i<20;i++){
      var fx2=((i*173+t*15)%W+W)%W;
      var fy2=((i*271+t*8+i*50)%H+H)%H;
      X.fillStyle='rgba(200,220,240,0.08)';
      X.beginPath();X.arc(fx2,fy2,1+Math.sin(i)*0.5,0,Math.PI*2);X.fill();
    }
  }
  // ground
  var g=X.createLinearGradient(0,H-50,0,H);
  g.addColorStop(0,'rgba(12,10,8,0)');g.addColorStop(0.3,'rgba(15,12,8,0.5)');g.addColorStop(1,'rgba(20,16,10,0.8)');
  X.fillStyle=g;X.fillRect(0,H-50,W,50);
  for(var i=0;i<15;i++){
    var px=(i*197+43)%W;
    X.fillStyle='rgba(30,25,18,0.4)';
    X.beginPath();X.ellipse(px,H-12+Math.sin(i*2.3)*6,2+i%3,1.5,0,0,Math.PI*2);X.fill();
  }
  for(var i=0;i<8;i++){
    var mx=(i*271+99)%W;
    X.fillStyle='rgba(20,60,30,0.08)';
    X.beginPath();X.ellipse(mx,H-20+Math.sin(i)*8,10+i%5*3,3,0,0,Math.PI*2);X.fill();
  }
  // trees
  for(var i=0;i<trees.length;i++)drawTree(trees[i]);
  // particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    if(p.spark){X.fillStyle=p.hue;X.globalAlpha=p.life;X.beginPath();X.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);X.fill();X.globalAlpha=1;}
    else{X.fillStyle=p.hue;X.globalAlpha=p.life*0.7;X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();X.globalAlpha=1;}
  }
  // HUD
  var segs=0;for(var i=0;i<trees.length;i++)segs+=trees[i].segments.length;
  document.getElementById('hud').innerHTML=trees.length+' trees &middot; '+segs+' branches &middot; '+totalGrowth+' grown<br>'+SEASONS[season];
}

// ===== NEON FLUIDS — pick a fluid to color new growth =====
// Each fluid maps 1-1 to a PALETTE entry. Selecting one sets the active
// fluid; subsequent waterings (chat messages OR tree clicks) tint new
// branches with that palette regardless of the tree's base color, so a
// jade tree can sprout sakura branches and an ember tree can grow
// frost-cyan tips. Old growth retains its original palette.
var fluidIdx=null;     // null = no fluid selected, use tree's own palette
var FLUIDS_EL=document.getElementById('fluids');
function buildFluids(){
  FLUIDS_EL.innerHTML='';
  for(var i=0;i<PALETTES.length;i++){
    (function(idx){
      var pal=PALETTES[idx];
      var btn=document.createElement('button');
      btn.className='fluid';
      btn.type='button';
      btn.textContent=pal.name.toUpperCase().slice(0,3);
      btn.style.setProperty('--fc',pal.leaf);
      btn.title=pal.name+' fluid — water with '+pal.leaf;
      btn.addEventListener('click',function(){
        // toggle: clicking the active fluid deselects
        fluidIdx=(fluidIdx===idx)?null:idx;
        Array.prototype.forEach.call(FLUIDS_EL.children,function(c,k){
          c.classList.toggle('on',k===fluidIdx);
        });
        if(hintVisible){hintVisible=false;hint.style.opacity='0';}
      });
      FLUIDS_EL.appendChild(btn);
    })(i);
  }
}
buildFluids();

// ===== CHAT INPUT — type a message → grow a branch =====
// Local input only (no Twitch IRC yet) — but every visitor with the page
// open shares the same garden state via localStorage on their machine.
// Each message grows 1-3 branches on a chosen tree (the closest tree to
// the active fluid, or a random tree if no fluid). Branch count scales
// with message length so longer thoughts mean more growth.
var CHAT_EL=document.getElementById('chatLog');
var chatLog=[];   // {who, text, palIdx, ts}
function pushChatMsg(text,palIdx,who){
  who=who||'you';
  chatLog.push({who:who,text:text,palIdx:palIdx,ts:Date.now()});
  while(chatLog.length>8)chatLog.shift();
  renderChatLog();
}
function renderChatLog(){
  CHAT_EL.innerHTML='';
  for(var i=0;i<chatLog.length;i++){
    var m=chatLog[i];
    var div=document.createElement('div');
    div.className='chat-msg';
    var col=(m.palIdx!=null&&PALETTES[m.palIdx])?PALETTES[m.palIdx].leaf:'#00ff88';
    div.style.setProperty('--mc',col);
    div.innerHTML='<span class="who">'+m.who+'</span>'+escHtml(m.text);
    CHAT_EL.appendChild(div);
  }
}
function escHtml(s){
  return s.replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function fnvHash(s){
  var h=0x811c9dc5;
  for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(h*0x01000193)>>>0;}
  return h>>>0;
}

// Grow N branches on a tree using the current fluid (or the message
// hash for a random palette if no fluid is selected). Spawns particles
// at each branch tip in the chosen color. Used by chat submit AND by
// the click handler when watering a tree.
function waterTree(tree,n,palIdxOrNull,cx,cy){
  for(var g=0;g<n;g++)growTree(tree,palIdxOrNull);
  var pal=(palIdxOrNull!=null)?PALETTES[palIdxOrNull]:tree.pal;
  // particle burst at the tree base in the fluid's color
  spawnGrowParticle(cx||tree.x,cy||tree.ground-10,pal);
  tree.energy+=Math.max(2,n);
}

// Pick a tree to receive a chat-driven branch. If a fluid is selected
// AND there's exactly one tree of that palette, prefer it. Otherwise
// pick the youngest tree (fewest segments) so all trees grow together.
function pickChatTree(palIdx){
  if(trees.length===0)return null;
  if(palIdx!=null){
    var matching=trees.filter(function(tr){return PALETTES.indexOf(tr.pal)===palIdx;});
    if(matching.length===1)return matching[0];
  }
  var minSegs=Infinity,picks=[];
  for(var i=0;i<trees.length;i++){
    if(trees[i].segments.length<minSegs){minSegs=trees[i].segments.length;picks=[trees[i]];}
    else if(trees[i].segments.length===minSegs)picks.push(trees[i]);
  }
  return picks[Math.floor(Math.random()*picks.length)];
}

document.getElementById('chatBar').addEventListener('submit',function(e){
  e.preventDefault();
  var input=document.getElementById('chatInput');
  var text=(input.value||'').trim().slice(0,120);
  if(!text)return;
  input.value='';
  // pick palette — active fluid takes priority, otherwise hash the
  // message text for a deterministic-but-varied per-message color
  var pi=fluidIdx;
  if(pi==null)pi=fnvHash(text)%PALETTES.length;
  // branch count: 1 for tiny, 4 for long messages
  var n=Math.min(4,Math.max(1,Math.floor(text.length/22)));
  var tree=pickChatTree(pi);
  if(!tree){
    // empty garden — auto-plant a tree first
    tree=makeTree(W/2,H-35);
    tree.pal=PALETTES[pi];
    addTrunk(tree);
    trees.push(tree);
  }
  waterTree(tree,n,pi);
  pushChatMsg(text,pi);
  if(hintVisible){hintVisible=false;hint.style.opacity='0';}
  saveState();
});

C.addEventListener('click',function(e){
  var rect=C.getBoundingClientRect();
  var cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  if(hintVisible){hintVisible=false;hint.style.opacity='0';}
  var hitTree=null,bestDist=80;
  for(var i=0;i<trees.length;i++){
    var dx=trees[i].x-cx,dy=trees[i].ground-cy;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<bestDist){bestDist=d;hitTree=trees[i];}
  }
  if(hitTree){
    // If a fluid is selected, water the tree with that palette — it'll
    // sprout 3 branches in the fluid's color regardless of base palette.
    if(fluidIdx!=null){
      waterTree(hitTree,3,fluidIdx,cx,cy);
    }else{
      hitTree.energy+=2;
      for(var g=0;g<2;g++)growTree(hitTree);
      spawnGrowParticle(cx,cy,hitTree.pal);
    }
    saveState();
  }else if(cy>H-100&&trees.length<12){
    var planPal=(fluidIdx!=null)?PALETTES[fluidIdx]:PALETTES[Math.floor(Math.random()*PALETTES.length)];
    var tr=makeTree(cx,H-35);
    tr.pal=planPal;
    addTrunk(tr);
    trees.push(tr);
    spawnGrowParticle(cx,H-35,tr.pal);
    totalGrowth++;
    saveState();
  }
});

document.getElementById('seasonBtn').addEventListener('click',function(){season=(season+1)%4;saveState();});
document.getElementById('clearBtn').addEventListener('click',function(){trees=[];particles=[];totalGrowth=0;chatLog=[];renderChatLog();hintVisible=true;hint.style.opacity='1';saveState();});

function saveState(){
  var state={trees:trees.map(function(tr){
    return{x:tr.x,ground:tr.ground,palIdx:PALETTES.indexOf(tr.pal),age:tr.age,energy:tr.energy,maxDepth:tr.maxDepth,swayPhase:tr.swayPhase,swaySpeed:tr.swaySpeed,
      segments:tr.segments.map(function(s){
        var parentIdx=-1;
        for(var j=0;j<tr.segments.length;j++){if(tr.segments[j].children.indexOf(s)>=0){parentIdx=j;break;}}
        return{x1:s.x1,y1:s.y1,x2:s.x2,y2:s.y2,width:s.width,depth:s.depth,angle:s.angle,leaf:s.leaf,growProgress:s.growProgress,parentIdx:parentIdx,palIdx:s.palIdx};
      })};
  }),totalGrowth:totalGrowth,season:season,chatLog:chatLog.slice(-8),fluidIdx:fluidIdx};
  try{localStorage.setItem('neon_bonsai_garden',JSON.stringify(state));}catch(e){}
}

function loadState(){
  try{
    var raw=localStorage.getItem('neon_bonsai_garden');
    if(!raw)return false;
    var state=JSON.parse(raw);
    if(!state.trees||!state.trees.length)return false;
    trees=[];
    for(var i=0;i<state.trees.length;i++){
      var st=state.trees[i];
      var tr=makeTree(st.x,st.ground);
      tr.pal=PALETTES[st.palIdx]||PALETTES[0];
      tr.age=st.age||0;tr.energy=st.energy||0;tr.maxDepth=st.maxDepth||0;
      tr.swayPhase=st.swayPhase||0;tr.swaySpeed=st.swaySpeed||0.3;
      tr.segments=[];
      for(var j=0;j<st.segments.length;j++){
        var ss=st.segments[j];
        tr.segments.push({x1:ss.x1,y1:ss.y1,x2:ss.x2,y2:ss.y2,width:ss.width,depth:ss.depth,angle:ss.angle,leaf:ss.leaf,growProgress:ss.growProgress||1,children:[],palIdx:(ss.palIdx!=null?ss.palIdx:st.palIdx)});
      }
      for(var j=0;j<st.segments.length;j++){
        var pi=st.segments[j].parentIdx;
        if(pi>=0&&pi<tr.segments.length)tr.segments[pi].children.push(tr.segments[j]);
      }
      trees.push(tr);
    }
    totalGrowth=state.totalGrowth||0;season=state.season||0;
    if(state.chatLog&&state.chatLog.length){chatLog=state.chatLog;renderChatLog();}
    if(state.fluidIdx!=null){
      fluidIdx=state.fluidIdx;
      Array.prototype.forEach.call(FLUIDS_EL.children,function(c,k){c.classList.toggle('on',k===fluidIdx);});
    }
    if(trees.length>0){hintVisible=false;hint.style.opacity='0';}
    return true;
  }catch(e){return false;}
}

setInterval(saveState,10000);

if(!loadState()){var tr=makeTree(W/2,H-35);addTrunk(tr);tr.energy=5;trees.push(tr);}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
})();
</script>
</body>
