<style>
  :root {
    --void: #07050a;
    --ink: #100b08;
    --wall-cream: #d6c19a;
    --wall-cream-dk: #9c8757;
    --wall-cream-hi: #f3e3bd;
    --wood: #4a2a18;
    --wood-dk: #2a1408;
    --wood-hi: #6b3e22;
    --carpet-orange: #b6491c;
    --carpet-rust: #6c2310;
    --carpet-brown: #2a160d;
    --carpet-cream: #d4a86e;
    --blood: #b3000a;
    --blood-bright: #d80f1a;
    --blood-deep: #5a0008;
    --blood-skin: #f04e3a;
    --lamp: #f5b15a;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body {
    background: radial-gradient(120% 95% at 50% 45%, #0d0908 0%, #04020a 70%, #000 100%);
    color: var(--wall-cream);
    font-family: 'IM Fell English', serif;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
    cursor: crosshair;
  }
  #stage {
    position:fixed; inset:0;
  }
  canvas {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #grain {
    pointer-events:none;
    position:fixed;
    inset:-12px;
    background-image:
      radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1.5px),
      radial-gradient(rgba(0,0,0,0.18) 1px, transparent 1.4px);
    background-size: 3px 3px, 5px 5px;
    background-position: 0 0, 1px 1px;
    mix-blend-mode: overlay;
    opacity: 0.55;
    z-index: 4;
    animation: grainShift 0.18s steps(2) infinite;
  }
  #vig {
    pointer-events:none;
    position:fixed; inset:0;
    background:
      radial-gradient(120% 95% at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 80%, #000 100%),
      linear-gradient(180deg, rgba(60,12,8,0.18), transparent 30%, transparent 70%, rgba(40,8,4,0.45));
    z-index: 5;
  }
  #scan {
    pointer-events:none;
    position:fixed; inset:0;
    background: repeating-linear-gradient(180deg, rgba(0,0,0,0.16) 0 2px, transparent 2px 4px);
    mix-blend-mode: multiply;
    opacity: 0.55;
    z-index: 6;
  }
  #flick {
    pointer-events:none;
    position:fixed; inset:0;
    background: rgba(120, 40, 30, 0);
    mix-blend-mode: screen;
    z-index: 7;
    transition: background 80ms linear;
  }
  /* HUD */
  #hud {
    position:fixed;
    top:18px; left:24px;
    z-index: 10;
    color: #c5a577;
    font-family: 'VT323', monospace;
    letter-spacing: 0.18em;
    font-size: 14px;
    text-shadow: 0 0 8px rgba(200,140,60,0.3), 0 1px 0 #000;
  }
  #hud .room {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.42em;
    color: #8c6c45;
    display:block;
    margin-bottom: 2px;
  }
  #hud .num {
    color: #d8a85a;
  }
  #counter {
    position:fixed;
    top:18px; right:24px;
    z-index: 10;
    color: #b85040;
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-align:right;
    text-shadow: 0 0 8px rgba(200,40,40,0.4), 0 1px 0 #000;
  }
  #counter .lab {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 10px;
    letter-spacing: 0.5em;
    color: #6c2820;
    display:block;
    margin-bottom: 2px;
  }
  #title {
    position:fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align:center;
    pointer-events:none;
    color: #ad7a4a;
    font-family: 'IM Fell English', serif;

  #toolbar {

  .ctrl {
    background: rgba(20,12,8,0.65);

  #intro {
    position:fixed;
    inset:0;
    z-index: 50;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(120% 95% at 50% 50%, rgba(8,4,4,0.68) 0%, rgba(0,0,0,0.92) 80%);
    backdrop-filter: blur(2px);
    transition: opacity 0.8s ease;
  }
  #intro.gone {
    opacity:0;

  #intro .card {
    text-align:center;
    padding: 40px 56px;
    border: 1px solid #3a1a10;

    max-width: 540px;
  }
  #intro h1 {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(34px, 5.4vw, 60px);

  #intro h1 b {

  }
  #intro .tag {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;

    letter-spacing: 0.3em;

  }
  #intro .quote {
    font-family: 'Special Elite', monospace;

  #intro .quote em {

  #intro button {

    text-shadow: 0 0 10px rgba(216,15,26,0.7), 0 1px 0 #000;
    transition: all 0.2s ease;
  }
  #intro button:hover {
    background: linear-gradient(180deg, #a02418, #5a0a08);
    box-shadow: 0 0 26px rgba(216,15,26,0.6);
    color: #ffeae8;
  }
  @keyframes grainShift {
    0%   { transform: translate(0,0); }
    33%  { transform: translate(-2px, 1px); }
    66%  { transform: translate(1px, -2px); }
    100% { transform: translate(-1px, 1px); }
  }
  @media (max-width: 540px) {
    #title { font-size: 11px; }
    #toolbar { font-size: 11px; gap: 6px; }
    .ctrl { padding: 5px 8px; }
    #hud, #counter { font-size: 12px; }
  }
</style>

<body>

<div id="stage">
  <canvas id="bg"></canvas>
  <canvas id="blood"></canvas>
  <canvas id="fx"></canvas>
</div>
<div id="grain"></div>
<div id="vig"></div>
<div id="scan"></div>
<div id="flick"></div>

<div id="hud">
  <span class="room">OVERLOOK · 2F</span>
  THE HALL · <span class="num" id="hl">237</span>
</div>
<div id="counter">
  <span class="lab">LITRES SPILLED</span>
  <span id="lit">0</span>
</div>

<div id="title">
  <em>one point perspective · the carpet drinks</em>
  click anywhere to bleed · space opens the elevator
</div>

<div id="toolbar">
  <button class="ctrl alert" id="elBtn">▣ OPEN ELEVATOR</button>
  <button class="ctrl" id="muteBtn">♪ ON</button>
  <button class="ctrl" id="rinseBtn">↺ RINSE</button>
</div>

<div id="intro">
  <div class="card">
    <h1>shining<br><b>hallway</b></h1>
    <div class="tag">— ROOM 237 · DO NOT ENTER —</div>
    <div class="quote">"<em>great party, isn't it?</em>"<br>the elevator hum is louder now.<br>something heavy is on the other side.</div>
    <button id="enterBtn">STEP INSIDE</button>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const bgCanvas = $('bg'), bloodCanvas = $('blood'), fxCanvas = $('fx');
  const bg = bgCanvas.getContext('2d');
  const bl = bloodCanvas.getContext('2d');
  const fx = fxCanvas.getContext('2d');

  // internal pixel resolution (small for chunky pixel feel, scaled up by CSS)
  const IRES = { w: 320, h: 200 };
  // physical canvas size
  let W = window.innerWidth, H = window.innerHeight;
  let DPR = 1; // we render at low res then CSS scales

  function fitCanvases(){
    W = window.innerWidth;
    H = window.innerHeight;
    // adaptive internal res keeping ~1.6 aspect-ish; clamp width 280..420
    IRES.w = Math.min(420, Math.max(280, Math.round(W / 4)));
    IRES.h = Math.round(IRES.w * (H / W));
    [bgCanvas, bloodCanvas, fxCanvas].forEach(c => {
      c.width = IRES.w;
      c.height = IRES.h;
      c.style.width = '100%';
      c.style.height = '100%';
    });
    drawScene(); // re-bake bg
  }

  // ============ PERSPECTIVE ============
  // Single point perspective. World coords:
  //   x: -1 .. 1 (left to right), 0 = center
  //   y: 0 .. 1 (0 = floor, 1 = ceiling)
  //   z: 0 .. inf (0 = camera plane, increases into distance)
  const VP = { x: 0.5, y: 0.5 }; // vanishing point as fraction of internal res
  const FOCAL = 0.6;             // fov knob
  const CAM_HEIGHT = 0.42;       // floor below cam
  const HALL_HALF_W = 0.9;       // hallway half-width in world units

  function project(wx, wy, wz){
    // wy: 0 floor, 1 ceiling (relative to camera-base)
    // World hallway goes z forward
    const persp = 1 / (wz * FOCAL + 1);
    const sx = VP.x * IRES.w + (wx - 0) * persp * IRES.w * 0.65;
    // y: 0 floor (below cam) -> camera is at wy=CAM_HEIGHT
    const wyOff = CAM_HEIGHT - wy; // positive = below cam
    const sy = VP.y * IRES.h + wyOff * persp * IRES.h * 0.95;
    return { x: sx, y: sy, persp };
  }

  // ============ SCENE BAKE (background) ============
  // We bake the hallway into bgCanvas once per resize.
  function drawScene(){
    const ctx = bg;
    const w = IRES.w, h = IRES.h;
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0,0,w,h);

    // -- ceiling gradient
    const ceilGrad = ctx.createLinearGradient(0,0,0,VP.y*h);
    ceilGrad.addColorStop(0, '#1a120c');
    ceilGrad.addColorStop(1, '#2a1c10');
    ctx.fillStyle = ceilGrad;
    ctx.fillRect(0,0,w, VP.y*h);

    // -- back wall (around vanishing point) — dark void with elevator
    // floor area is the trapezoid below VP, walls converge
    // Carpet (drawn first to floor)
    drawCarpet(ctx);

    // Walls
    drawWalls(ctx);

    // Doors along the hallway
    drawDoors(ctx);

    // Elevator at end
    drawElevator(ctx);

    // Wall sconces (lamps)
    drawSconces(ctx);

    // Ceiling beams + dim glow
    drawCeiling(ctx);

    // Subtle dust / shadow at vanishing
    const vx = VP.x * w, vy = VP.y * h;
    const vGrad = ctx.createRadialGradient(vx, vy, 0, vx, vy, h*0.6);
    vGrad.addColorStop(0, 'rgba(40,16,10,0.0)');
    vGrad.addColorStop(0.7, 'rgba(0,0,0,0.35)');
    vGrad.addColorStop(1, 'rgba(0,0,0,0.85)');
    ctx.fillStyle = vGrad;
    ctx.fillRect(0,0,w,h);
  }

  function drawCarpet(ctx){
    const w = IRES.w, h = IRES.h;
    // The carpet area is everything below the floor horizon line at VP.y
    // We render via z-row strips, each row is a different z, drawing trapezoidal slice
    // Pattern: zigzag/hex-ish geometric
    const horizonY = VP.y * h;
    const rows = h - horizonY;
    for(let i=0; i<rows; i++){
      const py = horizonY + i;
      const rowProg = i / rows; // 0 near, 1 far
      const z = (1 - rowProg) * 8 + 0.1; // invert: top row of floor = far
      // wait — top of floor (just below horizon) is FAR, bottom near. So:
      // i=0 → near horizon → far. Good.
      const persp = 1 / (z * FOCAL + 1);
      // half width at this z:
      const halfW = HALL_HALF_W * persp * IRES.w * 0.65;
      const cx = VP.x * w;
      const x0 = Math.max(0, cx - halfW);
      const x1 = Math.min(w, cx + halfW);
      // base color shifts darker with depth
      const dark = Math.max(0, 1 - rowProg * 0.85);
      // we'll draw the carpet pattern row-by-row, world-x-aware
      // For each pixel x in [x0..x1], compute world u
      // u in -1..1 across hallway
      // Pattern: hexagonal tiles — use mod
      const tileScale = persp * 0.55; // pattern cells shrink with depth
      const tileW = 28 * tileScale + 0.4;
      const tileH = 14 * tileScale + 0.3;
      // draw scanline
      const imgX = Math.floor(x0);
      const imgW = Math.ceil(x1 - x0);
      if(imgW < 1) continue;
      const id = ctx.createImageData(imgW, 1);
      for(let dx=0; dx<imgW; dx++){
        const xx = imgX + dx;
        // map xx to world u via perspective: xx-cx = u * persp * IRES.w * 0.65
        const u = (xx - cx) / (persp * IRES.w * 0.65);
        // pattern coords: shift carpet over time? no — static pattern in world
        // walking-axis "v" comes from z (depth), shift over time for parallax illusion if hero walks
        const v = z;
        // hex-like pattern: combine bands & diamond
        // band index along v (depth)
        const bandV = v / 0.9;
        // offset per band for staggered hex
        const stagger = (Math.floor(bandV) % 2 === 0) ? 0 : 0.5;
        // band index along u
        const bandU = u * 1.6 + stagger;
        const fu = bandU - Math.floor(bandU); // 0..1
        const fv = bandV - Math.floor(bandV); // 0..1
        // diamond/hex: two diagonals
        const d1 = Math.abs(fu - 0.5) + Math.abs(fv - 0.5);
        let r,g,b;
        if(d1 < 0.32){
          // center diamond — orange
          r = 182; g = 73; b = 28;
        } else if(d1 < 0.5){
          // ring — rust
          r = 108; g = 35; b = 16;
        } else {
          // outer — dark brown
          r = 42; g = 22; b = 13;
        }
        // accent dots in corners (cream)
        if((fu < 0.06 || fu > 0.94) && (fv < 0.06 || fv > 0.94)){
          r = 212; g = 168; b = 110;
        }
        // depth darkening
        r = Math.floor(r * dark);
        g = Math.floor(g * dark);
        b = Math.floor(b * dark);
        const p = dx * 4;
        id.data[p]   = r;
        id.data[p+1] = g;
        id.data[p+2] = b;
        id.data[p+3] = 255;
      }
      ctx.putImageData(id, imgX, py);
    }
  }

  function drawWalls(ctx){
    const w = IRES.w, h = IRES.h;
    const cx = VP.x * w;
    // Walls converge from screen edges to a small rect at VP
    // Ceiling-floor span at edge vs at vp:
    // We'll draw left & right wall as trapezoids, with vertical wallpaper stripes that warp
    // Render via column scan: for each screen column, decide if it's wall, where on it
    for(let x=0; x<w; x++){
      // compute column fraction of distance from VP (perspective ratio)
      const fromVp = Math.abs(x - cx);
      const halfWAtZ0 = HALL_HALF_W * 1 * IRES.w * 0.65; // at z=0 persp=1
      // For this column, find the z where wall surface is at this screen x
      // x = cx ± halfW(z)*sign  → halfW(z) = fromVp
      // halfW(z) = HALL_HALF_W * (1/(zF+1)) * w*0.65
      // → 1/(zF+1) = fromVp / (HALL_HALF_W * w * 0.65)
      // → z = ((HALL_HALF_W*w*0.65)/fromVp - 1) / F
      const k = (HALL_HALF_W * IRES.w * 0.65) / Math.max(fromVp, 0.001);
      const z = (k - 1) / FOCAL;
      if(z < 0) continue;
      const persp = 1 / (z * FOCAL + 1);
      // ceiling y at this z
      const ceilY = VP.y * h - (1 - CAM_HEIGHT) * persp * IRES.h * 0.95;
      const floorY = VP.y * h + CAM_HEIGHT * persp * IRES.h * 0.95;
      // wallpaper color
      // Vertical stripes every "world" 0.18 units along z
      // Pattern walks along the wall's z axis (= z)
      const stripeBand = Math.floor(z * 6.5);
      const stripeAlt = stripeBand % 4;
      let baseR=214, baseG=193, baseB=154;
      if(stripeAlt === 1){ baseR=190; baseG=166; baseB=126; }
      if(stripeAlt === 2){ baseR=174; baseG=145; baseB=98; }
      if(stripeAlt === 3){ baseR=156; baseG=135; baseB=87; }
      // depth tint
      const dark = Math.max(0.18, 1 - z * 0.16);
      const r = Math.floor(baseR * dark);
      const g = Math.floor(baseG * dark);
      const b = Math.floor(baseB * dark);
      // dado rail (brown band) at wall y = 0.32
      // wainscoting below dado
      // Loop pixels
      for(let y = Math.floor(ceilY); y < Math.floor(floorY); y++){
        if(y < 0 || y >= h) continue;
        const wallProg = (y - ceilY) / (floorY - ceilY); // 0 ceiling 1 floor
        let rr=r, gg=g, bb=b;
        if(wallProg > 0.66){
          // wainscoting wood
          const wd = wallProg > 0.96 ? 1 : (wallProg > 0.68 ? 1 : 0);
          if(wd){
            rr = Math.floor(74 * dark);
            gg = Math.floor(42 * dark);
            bb = Math.floor(24 * dark);
            // stripe of darker every other panel
            if(stripeAlt === 1 || stripeAlt === 3){
              rr = Math.floor(48 * dark);
              gg = Math.floor(26 * dark);
              bb = Math.floor(14 * dark);
            }
          }
        } else if(wallProg > 0.62 && wallProg < 0.68){
          // dado rail highlight
          rr = Math.floor(120 * dark);
          gg = Math.floor(72 * dark);
          bb = Math.floor(36 * dark);
        }
        // ceiling cornice
        if(wallProg < 0.05){
          rr = Math.floor(100 * dark);
          gg = Math.floor(64 * dark);
          bb = Math.floor(32 * dark);
        }
        // damage spots randomly
        // (use deterministic pseudo-noise)
        const n = ((x*131 + y*191 + stripeBand*53) & 1023) / 1023;
        if(n > 0.985){
          rr = Math.max(0, rr - 30);
          gg = Math.max(0, gg - 24);
          bb = Math.max(0, bb - 18);
        }
        const p = (y * w + x) * 4;
        wallPx.data[p] = rr;
        wallPx.data[p+1] = gg;
        wallPx.data[p+2] = bb;
        wallPx.data[p+3] = 255;
      }
    }
    ctx.putImageData(wallPx, 0, 0);
  }

  // walls written into a fresh imageData layer that overlays on top of carpet
  let wallPx;

  function drawDoors(ctx){
    const w = IRES.w, h = IRES.h;
    // Several doors on left and right walls at z = 1.2, 2.2, 3.4, 5.0, 7.0
    const zs = [0.9, 1.6, 2.7, 4.2, 6.4];
    zs.forEach(z => {
      drawDoorAt(ctx, -1, z); // left wall (sign -1 = on left wall surface)
      drawDoorAt(ctx, +1, z); // right wall
    });
  }

  function drawDoorAt(ctx, side, z){
    // door is on wall surface at hallway edge x = side*HALL_HALF_W
    // we draw it as a trapezoid since the wall recedes
    // door spans z..z+0.6 (depth) and y 0..0.7 (world)
    const z2 = z + 0.55;
    const persp1 = 1 / (z * FOCAL + 1);
    const persp2 = 1 / (z2 * FOCAL + 1);
    const cx = VP.x * IRES.w;
    const halfW1 = HALL_HALF_W * persp1 * IRES.w * 0.65;
    const halfW2 = HALL_HALF_W * persp2 * IRES.w * 0.65;
    const x_near = cx + side * halfW1;
    const x_far  = cx + side * halfW2;
    const yTop1 = VP.y * IRES.h - (1 - CAM_HEIGHT - 0.7) * persp1 * IRES.h * 0.95;
    const yBot1 = VP.y * IRES.h + CAM_HEIGHT * persp1 * IRES.h * 0.95;
    const yTop2 = VP.y * IRES.h - (1 - CAM_HEIGHT - 0.7) * persp2 * IRES.h * 0.95;
    const yBot2 = VP.y * IRES.h + CAM_HEIGHT * persp2 * IRES.h * 0.95;
    // raise top so the door is shorter than ceiling
    const yT1 = yTop1 + (yBot1 - yTop1) * 0.18;
    const yT2 = yTop2 + (yBot2 - yTop2) * 0.18;
    // Door frame (lighter)
    ctx.fillStyle = '#3a1f10';
    ctx.beginPath();
    ctx.moveTo(x_near, yT1 - 2);
    ctx.lineTo(x_far,  yT2 - 2);
    ctx.lineTo(x_far,  yBot2);
    ctx.lineTo(x_near, yBot1);
    ctx.closePath();
    ctx.fill();
    // Door body (darker brown — slightly inset)
    const inset = 0.06;
    const xN = x_near + (x_far - x_near) * inset;
    const xF = x_near + (x_far - x_near) * (1 - inset);
    const yT1i = yT1 + 1;
    const yT2i = yT2 + 1;
    const yB1i = yBot1 - 1;
    const yB2i = yBot2 - 1;
    ctx.fillStyle = '#2a160d';
    ctx.beginPath();
    ctx.moveTo(xN, yT1i);
    ctx.lineTo(xF, yT2i);
    ctx.lineTo(xF, yB2i);
    ctx.lineTo(xN, yB1i);
    ctx.closePath();
    ctx.fill();
    // Door panels (two stacked rectangles inside)
    ctx.fillStyle = '#4a2a18';
    const panelInsetX = 0.18, panelInsetY = 0.08;
    const ux = (xF - xN), uy1 = (yT2i - yT1i), uy2 = (yB2i - yB1i);
    for(let pn=0; pn<2; pn++){
      const py0 = panelInsetY + pn * (0.5 - panelInsetY*1.5) + (pn === 1 ? 0.08 : 0);
      const py1 = py0 + (0.5 - panelInsetY*2) * 0.85;
      const x_a = xN + ux * panelInsetX;
      const x_b = xN + ux * (1 - panelInsetX);
      const y_a1 = yT1i + uy1 * py0;
      const y_a2 = yT1i + uy1 * py1;
      const y_b1 = yB1i - (yB1i - yT1i) * (1 - py0) + (yT2i - yT1i) * py0;
      // simpler: just draw two rectangles using lerp on top/bottom
      const tl = lerpY(xN, yT1i, xF, yT2i, x_a);
      const tr = lerpY(xN, yT1i, xF, yT2i, x_b);
      const bl = lerpY(xN, yB1i, xF, yB2i, x_a);
      const br = lerpY(xN, yB1i, xF, yB2i, x_b);
      const pTopA = tl + (bl - tl) * py0;
      const pTopB = tr + (br - tr) * py0;
      const pBotA = tl + (bl - tl) * py1;
      const pBotB = tr + (br - tr) * py1;
      ctx.beginPath();
      ctx.moveTo(x_a, pTopA);
      ctx.lineTo(x_b, pTopB);
      ctx.lineTo(x_b, pBotB);
      ctx.lineTo(x_a, pBotA);
      ctx.closePath();
      ctx.fill();
    }
    // Door knob — small brass dot
    const knobX = xN + ux * (side === -1 ? 0.85 : 0.15);
    const knobYTop = lerpY(xN, yT1i, xF, yT2i, knobX);
    const knobYBot = lerpY(xN, yB1i, xF, yB2i, knobX);
    const knobY = knobYTop + (knobYBot - knobYTop) * 0.55;
    ctx.fillStyle = '#d8a85a';
    ctx.fillRect(Math.round(knobX-1), Math.round(knobY-1), 2, 2);
    // Door number (only for nearer doors)
    if(z < 2){
      ctx.fillStyle = '#d8a85a';
      const numX = xN + ux * 0.5;
      const numY = lerpY(xN, yT1i, xF, yT2i, numX) + 4;
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      const labels = ['237', '217', '237', '217', '237'];
      const idx = Math.floor(z * 3) % labels.length;
      ctx.fillText(labels[idx], numX, numY);
    }
  }
  function lerpY(x1,y1,x2,y2, x){
    if(x2 === x1) return (y1 + y2) / 2;
    const t = (x - x1) / (x2 - x1);
    return y1 + (y2 - y1) * t;
  }

  function drawElevator(ctx){
    const w = IRES.w, h = IRES.h;
    // Elevator at vanishing point, on the back wall
    // The "back wall" is at z = HALL_END
    const HALL_END = 7.5;
    const persp = 1 / (HALL_END * FOCAL + 1);
    const cx = VP.x * w;
    const halfW = HALL_HALF_W * persp * IRES.w * 0.65;
    const yTop = VP.y * h - (1 - CAM_HEIGHT) * persp * IRES.h * 0.95;
    const yBot = VP.y * h + CAM_HEIGHT * persp * IRES.h * 0.95;
    // Back wall plate
    ctx.fillStyle = '#1a120c';
    ctx.fillRect(cx - halfW, yTop, halfW*2, yBot - yTop);
    // Elevator frame: gold/brass
    const elW = halfW * 1.45;
    const elH = (yBot - yTop) * 0.78;
    const elX = cx - elW/2;
    const elY = yBot - elH - 1;
    ctx.fillStyle = '#7a5a30';
    ctx.fillRect(elX, elY, elW, elH);
    ctx.fillStyle = '#5a3e1c';
    ctx.fillRect(elX+1, elY+1, elW-2, elH-2);
    // Doors (two halves)
    const halfDoor = (elW - 4) / 2;
    // open offset
    const open = state ? state.elevatorOpen : 0;
    const offsetL = -open * halfDoor * 0.95;
    const offsetR =  open * halfDoor * 0.95;
    ctx.fillStyle = '#3a2810';
    ctx.fillRect(elX + 2 + offsetL, elY + 2, halfDoor - 1, elH - 4);
    ctx.fillRect(elX + 2 + halfDoor + offsetR + 1, elY + 2, halfDoor - 1, elH - 4);
    // Door inner darkness (revealed when open)
    if(open > 0.02){
      ctx.fillStyle = '#000';
      ctx.fillRect(elX + 2 + halfDoor - open*halfDoor*0.95 + 0, elY + 2, open*halfDoor*1.9, elH - 4);
      // hint of red glow inside
      const grad = ctx.createLinearGradient(0, elY, 0, elY+elH);
      grad.addColorStop(0, 'rgba(40,0,0,0.0)');
      grad.addColorStop(1, 'rgba(180,0,8,0.42)');
      ctx.fillStyle = grad;
      ctx.fillRect(elX + 2 + halfDoor - open*halfDoor*0.95, elY + 2, open*halfDoor*1.9, elH - 4);
    }
    // Door seam
    ctx.fillStyle = '#1a0e06';
    if(open < 0.02){
      ctx.fillRect(elX + elW/2 - 0.5, elY + 2, 1, elH - 4);
    }
    // Up arrow indicator
    ctx.fillStyle = '#d8a85a';
    const arrX = elX + elW/2;
    const arrY = elY - 4;
    ctx.fillRect(arrX-1, arrY, 2, 1);
    ctx.fillRect(arrX-2, arrY+1, 4, 1);
    ctx.fillStyle = '#5c4218';
    ctx.fillRect(arrX-3, arrY-1, 6, 1);
    // ELEVATOR cache: store geometry for blood-spawn
    state._elev = { x: cx, y: elY + elH * 0.92, w: elW * 0.85, openY: elY + elH };
  }

  function drawSconces(ctx){
    const w = IRES.w, h = IRES.h;
    // place on left and right walls at certain z
    const zs = [1.2, 2.5, 4.0, 6.0];
    zs.forEach((z, i) => {
      [-1, +1].forEach(side => {
        const persp = 1 / (z * FOCAL + 1);
        const cx = VP.x * w;
        const halfW = HALL_HALF_W * persp * IRES.w * 0.65;
        const x = cx + side * halfW + side * -1; // slight inset
        const y = VP.y * h - (1 - CAM_HEIGHT - 0.65) * persp * IRES.h * 0.95;
        // halo
        const r = 5 + 4 * persp;
        const g = ctx.createRadialGradient(x, y, 0, x, y, r*4);
        g.addColorStop(0, 'rgba(245,177,90,0.55)');
        g.addColorStop(0.4, 'rgba(220,140,60,0.22)');
        g.addColorStop(1, 'rgba(40,12,4,0)');
        ctx.fillStyle = g;
        ctx.fillRect(x - r*4, y - r*4, r*8, r*8);
        // bulb
        ctx.fillStyle = '#f5b15a';
        ctx.fillRect(Math.round(x), Math.round(y), 1, 1);
        // sconce arm
        ctx.fillStyle = '#6a4a20';
        ctx.fillRect(Math.round(x + side*0.5), Math.round(y+1), 1, 1);
      });
    });
  }

  function drawCeiling(ctx){
    const w = IRES.w, h = IRES.h;
    // dim ceiling beams converging to VP at intervals along z
    const cx = VP.x * w;
    const horizonY = VP.y * h;
    const beamZs = [0.8, 1.6, 2.6, 4.0, 6.0];
    beamZs.forEach(z => {
      const persp = 1 / (z * FOCAL + 1);
      const halfW = HALL_HALF_W * persp * IRES.w * 0.65;
      const yTop = horizonY - (1 - CAM_HEIGHT) * persp * IRES.h * 0.95;
      // draw horizontal beam strip along ceiling at this z
      ctx.fillStyle = 'rgba(0,0,0,0.42)';
      ctx.fillRect(cx - halfW, yTop, halfW*2, 1);
      ctx.fillStyle = 'rgba(80,50,28,0.45)';
      ctx.fillRect(cx - halfW, yTop + 1, halfW*2, 1);
    });
  }

  // ============ STATE ============
  const state = {
    elevatorOpen: 0,
    elevatorTarget: 0,
    drips: [],         // 3D droplets
    poolPx: null,      // imageData of pooled blood on floor
    poolMask: null,    // alpha mask
    rivers: [],        // streaming columns of blood from elevator
    splats: [],        // wall splats
    litres: 0,
    muted: false,
    flickT: 0,
    bassPhase: 0,
    timeT: 0,
    started: false,
    waveT: 0,
    waveActive: false,
    _elev: null,
    drone: null,
    droneFilter: null,
    droneGain: null,
  };

  // ============ BLOOD PHYSICS (3D pixelated) ============
  // Each droplet: {x, y, z, vx, vy, vz, life, sz, hue, kind}
  // kind: 'drip' | 'splash' | 'wall'
  // Coordinates are world coordinates same as scene.
  const GRAVITY = 1.6;            // y is increasing down? Let's say y=0 floor, vy positive = upward, gravity reduces vy
  const FLOOR_Y = 0;              // world floor
  const MAX_DROPS = 1400;

  function spawnDrip(x, y, z, vx, vy, vz, opts){
    if(state.drips.length >= MAX_DROPS) state.drips.shift();
    state.drips.push({
      x, y, z, vx, vy, vz,
      life: opts?.life ?? (1.6 + Math.random()*1.0),
      maxLife: opts?.life ?? (1.6 + Math.random()*1.0),
      sz: opts?.sz ?? (0.6 + Math.random()*0.5),
      hue: opts?.hue ?? (Math.random() < 0.15 ? 'bright' : 'normal'),
      kind: opts?.kind ?? 'drip',
    });
    state.litres += 0.001;
  }

  function tickBlood(dt){
    const drips = state.drips;
    for(let i = drips.length - 1; i >= 0; i--){
      const d = drips[i];
      d.life -= dt;
      // physics
      d.vy -= GRAVITY * dt;
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      d.z += d.vz * dt;
      // mild air drag
      d.vx *= Math.pow(0.985, dt*60);
      d.vz *= Math.pow(0.992, dt*60);
      // hallway walls bounce
      if(Math.abs(d.x) > HALL_HALF_W * 0.96){
        d.x = Math.sign(d.x) * HALL_HALF_W * 0.96;
        d.vx *= -0.4;
        // wall splat
        addWallSplat(Math.sign(d.x), d.y, d.z, 0.7 + Math.random()*0.6);
      }
      // ceiling bounce (rare)
      if(d.y > 0.9){
        d.y = 0.9;
        d.vy = -Math.abs(d.vy) * 0.3;
      }
      // floor pool
      if(d.y <= FLOOR_Y){
        // splash & pool
        addPoolDot(d.x, d.z, d.sz);
        state.litres += d.sz * 0.06;
        // small splash particles up if velocity was high
        if(d.vy < -1.4 && Math.random() < 0.25){
          for(let k=0; k<2; k++){
            const ang = Math.random()*Math.PI*2;
            const sp = Math.abs(d.vy) * 0.3 + Math.random()*0.3;
            spawnDrip(d.x, 0.01, d.z, Math.cos(ang)*sp*0.4, Math.abs(d.vy)*0.4, Math.sin(ang)*sp*0.4,
              { life: 0.6 + Math.random()*0.4, sz: d.sz*0.6, kind: 'splash' });
          }
        }
        drips.splice(i,1);
        continue;
      }
      // out of hall (depth)
      if(d.z > 8 || d.z < -0.2 || d.life <= 0){
        drips.splice(i,1);
        continue;
      }
    }
    // wall splats fade
    const ws = state.splats;
    for(let i = ws.length - 1; i >= 0; i--){
      ws[i].life -= dt;
      ws[i].drip += dt; // drip slowly grows
      if(ws[i].life <= 0) ws.splice(i,1);
    }
  }

  // Pool stored on a 1D array indexed by floor cell (u, z)
  const POOL_GRID = { u: 64, z: 64 };
  let poolGrid = null;
  function initPoolGrid(){
    poolGrid = new Float32Array(POOL_GRID.u * POOL_GRID.z);
  }
  initPoolGrid();
  function addPoolDot(x, z, amount){
    // x in -HALL_HALF_W..HALL_HALF_W, z in 0..8
    const u = (x / HALL_HALF_W + 1) * 0.5;       // 0..1
    const v = Math.min(1, Math.max(0, z / 8));   // 0..1
    const ui = Math.floor(u * (POOL_GRID.u - 1));
    const vi = Math.floor(v * (POOL_GRID.z - 1));
    if(ui<0||ui>=POOL_GRID.u||vi<0||vi>=POOL_GRID.z) return;
    // splash radius 1 cell
    for(let dvi=-1; dvi<=1; dvi++){
      for(let dui=-1; dui<=1; dui++){
        const uu = ui+dui, vv = vi+dvi;
        if(uu<0||uu>=POOL_GRID.u||vv<0||vv>=POOL_GRID.z) continue;
        const w = (dui===0&&dvi===0) ? 1 : 0.3;
        poolGrid[vv*POOL_GRID.u+uu] = Math.min(1, poolGrid[vv*POOL_GRID.u+uu] + w * amount * 0.32);
      }
    }
  }
  function tickPoolFlow(dt){
    // gentle viscous flow along v (z-axis) — pool spreads sideways and forward slightly
    // We'll do a lazy diffuse pass every other frame
    if((state.timeT*60|0) % 3 !== 0) return;
    const G = poolGrid;
    const W = POOL_GRID.u, H = POOL_GRID.z;
    for(let z=0; z<H; z++){
      for(let x=1; x<W-1; x++){
        const i = z*W+x;
        if(G[i] < 0.02) continue;
        // diffuse to neighbors
        const flowAmt = G[i] * 0.04;
        if(G[i-1] < G[i] - 0.03){ G[i-1] += flowAmt*0.4; G[i] -= flowAmt*0.4; }
        if(G[i+1] < G[i] - 0.03){ G[i+1] += flowAmt*0.4; G[i] -= flowAmt*0.4; }
      }
    }
  }

  function addWallSplat(side, y, z, amount){
    state.splats.push({
      side, y, z, amount,
      life: 14 + Math.random()*8,
      drip: 0,
    });
  }

  // ============ ELEVATOR WAVE ============
  function openElevator(){
    state.elevatorTarget = 1;
    state.waveActive = true;
    state.waveT = 0;
    playElevatorOpen();
  }
  function closeElevator(){
    state.elevatorTarget = 0;
    state.waveActive = false;
  }
  function tickElevator(dt){
    state.elevatorOpen += (state.elevatorTarget - state.elevatorOpen) * Math.min(1, dt * 0.9);
    if(state.elevatorOpen > 0.04 && state.waveActive){
      state.waveT += dt;
      // surge intensity: ramps up over 2s then sustains
      const surge = Math.min(1, state.waveT * 0.7);
      // emit drips from the elevator opening
      const E = state._elev;
      if(E){
        // we want to spawn at world position corresponding to elevator (z = HALL_END, y = small)
        const HALL_END = 7.0; // just inside
        const count = Math.floor(8 * surge + 4);
        for(let k=0; k<count; k++){
          // x within elevator opening width — elevator ~0.6 world units wide
          const wx = (Math.random()*0.6 - 0.3);
          const wy = 0.05 + Math.random() * 0.1; // just above floor
          const wz = HALL_END - Math.random()*0.4;
          // velocity mostly forward (toward camera = -z)
          const vz = -1.6 - Math.random() * 1.2 - surge * 1.2;
          const vx = (Math.random()*2-1) * 0.15;
          const vy = 0.4 + Math.random() * 0.7 + surge * 0.4;
          spawnDrip(wx, wy, wz, vx, vy, vz, { life: 4 + Math.random()*2, sz: 0.6 + Math.random()*0.7 });
        }
        // chunk wave: occasional burst
        if(Math.random() < 0.04 && surge > 0.6){
          for(let k=0; k<24; k++){
            const wx = (Math.random()*0.7 - 0.35);
            const wz = HALL_END - Math.random()*0.3;
            spawnDrip(wx, 0.18 + Math.random()*0.2, wz,
              (Math.random()*2-1)*0.5, 1.6 + Math.random()*1.2, -2.2 - Math.random()*1.4,
              { life: 3.4, sz: 0.8 + Math.random()*0.7 });
          }
          screamStinger();
        }
      }
    }
  }

  // ============ RENDER BLOOD ============
  function renderBlood(){
    const w = IRES.w, h = IRES.h;
    bl.clearRect(0, 0, w, h);
    bl.imageSmoothingEnabled = false;
    // Render pool first (under drops), as horizontal scan rows projected
    renderPool();
    // Then airborne drops
    // Sort by depth so closer pixels overwrite (painter's algorithm)
    const drips = state.drips.slice().sort((a, b) => b.z - a.z);
    for(const d of drips){
      const p = project(d.x, d.y, d.z);
      if(p.x < -10 || p.x > w+10 || p.y < -10 || p.y > h+10) continue;
      const sz = Math.max(1, Math.round(d.sz * p.persp * 7));
      // color
      let col = '#b3000a';
      if(d.hue === 'bright') col = '#d80f1a';
      if(d.kind === 'splash') col = '#d04a32';
      bl.fillStyle = col;
      bl.fillRect(Math.floor(p.x - sz/2), Math.floor(p.y - sz/2), sz, sz);
      // highlight pixel for "wet" feel
      if(sz >= 2){
        bl.fillStyle = '#ff5048';
        bl.fillRect(Math.floor(p.x - sz/2), Math.floor(p.y - sz/2), 1, 1);
      }
    }
    // Wall splats
    for(const ws of state.splats){
      const p = project(ws.side * HALL_HALF_W * 0.96, ws.y, ws.z);
      const sz = Math.max(1, Math.round(ws.amount * p.persp * 6));
      const lifeT = ws.life;
      bl.fillStyle = lifeT > 6 ? '#5a0008' : '#3a0006';
      bl.fillRect(Math.floor(p.x - sz/2), Math.floor(p.y - sz/2), sz, sz);
      // drip down
      const drip = Math.min(0.4, ws.drip * 0.05);
      if(drip > 0.02){
        const p2 = project(ws.side * HALL_HALF_W * 0.96, Math.max(0, ws.y - drip), ws.z);
        bl.fillStyle = '#6a0008';
        bl.fillRect(Math.floor(p2.x), Math.floor(Math.min(p.y, p2.y)), 1, Math.max(1, Math.round(Math.abs(p2.y - p.y))));
      }
    }
  }

  function renderPool(){
    // Render pool by sampling poolGrid into screen pixels at floor
    // Project a coarse mesh of the pool grid: each cell = quad
    const w = IRES.w, h = IRES.h;
    const G = poolGrid;
    const Wg = POOL_GRID.u, Hg = POOL_GRID.z;
    // iterate from far to near for proper layering (already cleared)
    for(let zi = Hg-1; zi >= 0; zi--){
      const v = zi / (Hg - 1);
      const z = v * 8;
      for(let xi = 0; xi < Wg; xi++){
        const cell = G[zi*Wg+xi];
        if(cell < 0.02) continue;
        const u = xi / (Wg - 1);
        const x = (u * 2 - 1) * HALL_HALF_W;
        const x2 = (((xi+1) / (Wg - 1)) * 2 - 1) * HALL_HALF_W;
        const z2 = ((zi+1) / (Hg - 1)) * 8;
        // project 4 corners (slightly above floor for visibility)
        const p1 = project(x,  0.001, z);
        const p2 = project(x2, 0.001, z);
        const p3 = project(x2, 0.001, z2);
        const p4 = project(x,  0.001, z2);
        // alpha by cell depth
        const alpha = Math.min(1, cell * 1.4);
        const isBright = cell > 0.85;
        bl.fillStyle = isBright ? `rgba(216,15,26,${alpha})` : `rgba(140,8,12,${alpha})`;
        bl.beginPath();
        bl.moveTo(p1.x, p1.y);
        bl.lineTo(p2.x, p2.y);
        bl.lineTo(p3.x, p3.y);
        bl.lineTo(p4.x, p4.y);
        bl.closePath();
        bl.fill();
        // wet highlight
        if(isBright){
          bl.fillStyle = 'rgba(255,80,72,0.4)';
          bl.fillRect(Math.floor((p1.x+p3.x)/2)-1, Math.floor((p1.y+p3.y)/2)-1, 1, 1);
        }
      }
    }
  }

  // ============ FX (foreground) ============
  function renderFx(){
    const w = IRES.w, h = IRES.h;
    fx.clearRect(0, 0, w, h);
    // dust motes near camera for depth
    const t = state.timeT;
    fx.fillStyle = 'rgba(220,180,120,0.18)';
    for(let i=0; i<14; i++){
      const seed = i*173.7;
      const dx = (Math.sin(t*0.4 + seed) * 0.5 + 0.5) * w;
      const dy = ((t * 18 + seed*7) % h);
      fx.fillRect(Math.floor(dx), Math.floor(dy), 1, 1);
    }
    // chromatic blood-tint near vp when elevator open
    if(state.elevatorOpen > 0.05){
      const cx = VP.x * w, cy = VP.y * h;
      const grad = fx.createRadialGradient(cx, cy + 6, 0, cx, cy + 6, w * 0.4 * state.elevatorOpen);
      grad.addColorStop(0, `rgba(216,15,26,${0.32 * state.elevatorOpen})`);
      grad.addColorStop(0.6, `rgba(120,8,12,${0.16 * state.elevatorOpen})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      fx.fillStyle = grad;
      fx.fillRect(0, 0, w, h);
    }
    // REDRUM flicker on far wall occasionally
    if(state.elevatorOpen > 0.5 && Math.sin(t*1.7) > 0.92){
      fx.fillStyle = 'rgba(216,15,26,0.6)';
      const cx = VP.x * w, cy = VP.y * h;
      fx.font = 'bold 6px monospace';
      fx.textAlign = 'center';
      const messages = ['REDRUM', 'ROOM 237', 'COME PLAY', 'FOREVER'];
      const m = messages[(Math.floor(t * 0.3) % messages.length)];
      fx.fillText(m, cx, cy - 4);
    }
  }

  // ============ AUDIO ============
  let actx = null;
  let conv = null;
  function ac(){
    if(actx) return actx;
    actx = new (window.AudioContext || window.webkitAudioContext)();
    // reverb
    const len = actx.sampleRate * 3.2;
    const ir = actx.createBuffer(2, len, actx.sampleRate);
    for(let ch=0; ch<2; ch++){
      const data = ir.getChannelData(ch);
      for(let i=0; i<len; i++){
        data[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.4);
      }
    }
    conv = actx.createConvolver();
    conv.buffer = ir;
    return actx;
  }
  function startDrone(){
    const a = ac();
    if(state.drone) return;
    const master = a.createGain();
    master.gain.value = 0;
    master.connect(a.destination);
    const filt = a.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 320;
    filt.Q.value = 1.4;
    filt.connect(master);
    // 4-voice chord
    const freqs = [41.2, 55, 82.4, 110];
    const oscs = [];
    freqs.forEach((f, i) => {
      const o = a.createOscillator();
      o.type = i % 2 === 0 ? 'sine' : 'triangle';
      o.frequency.value = f;
      const og = a.createGain();
      og.gain.value = 0.18;
      // detune lfo
      const lfo = a.createOscillator();
      lfo.frequency.value = 0.04 + Math.random()*0.12;
      const lfoG = a.createGain();
      lfoG.gain.value = 2.5;
      lfo.connect(lfoG);
      lfoG.connect(o.detune);
      lfo.start();
      o.connect(og);
      og.connect(filt);
      o.start();
      oscs.push({o, og, lfo});
    });
    // fade in
    master.gain.linearRampToValueAtTime(0.42, a.currentTime + 2.2);
    state.drone = master;
    state.droneFilter = filt;
    state.droneGain = master;
  }
  function stopDrone(){
    if(state.drone){
      state.drone.gain.linearRampToValueAtTime(0, ac().currentTime + 0.6);
      setTimeout(() => { try { state.drone.disconnect(); } catch(e){} state.drone=null; }, 700);
    }
  }

  function playElevatorOpen(){
    const a = ac();
    if(state.muted) return;
    // ding (creepy)
    const o = a.createOscillator();
    o.type = 'sine';
    o.frequency.value = 880;
    const g = a.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.34, a.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 1.6);
    o.connect(g).connect(conv).connect(a.destination);
    o.start();
    o.stop(a.currentTime + 1.6);
    // sub thud
    const sub = a.createOscillator();
    sub.type = 'sine';
    sub.frequency.value = 56;
    sub.frequency.exponentialRampToValueAtTime(28, a.currentTime + 0.8);
    const sg = a.createGain();
    sg.gain.value = 0;
    sg.gain.linearRampToValueAtTime(0.4, a.currentTime + 0.05);
    sg.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 1.0);
    sub.connect(sg).connect(a.destination);
    sub.start();
    sub.stop(a.currentTime + 1.0);
    // metallic creak
    setTimeout(() => {
      if(state.muted) return;
      const noise = a.createBufferSource();
      const buf = a.createBuffer(1, a.sampleRate * 0.7, a.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0; i<data.length; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 1.8);
      noise.buffer = buf;
      const bp = a.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1800;
      bp.frequency.exponentialRampToValueAtTime(420, a.currentTime + 0.6);
      bp.Q.value = 6;
      const ng = a.createGain();
      ng.gain.value = 0;
      ng.gain.linearRampToValueAtTime(0.18, a.currentTime + 0.04);
      ng.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.7);
      noise.connect(bp).connect(ng).connect(conv).connect(a.destination);
      noise.start();
    }, 200);
  }

  function playSplash(amount){
    if(state.muted) return;
    const a = ac();
    // bandpass noise
    const noise = a.createBufferSource();
    const buf = a.createBuffer(1, a.sampleRate * 0.18, a.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0; i<data.length; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 2);
    noise.buffer = buf;
    const bp = a.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 800 + Math.random()*400;
    bp.Q.value = 1.2;
    const g = a.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.06 * Math.min(1, amount), a.currentTime + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.18);
    noise.connect(bp).connect(g).connect(a.destination);
    noise.start();
  }
  let lastSplash = 0;
  function maybeSplash(amount){
    const now = performance.now();
    if(now - lastSplash > 90){
      lastSplash = now;
      playSplash(amount);
    }
  }

  function screamStinger(){
    if(state.muted) return;
    const a = ac();
    // distorted screech (bandpass noise + saw)
    const o = a.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = 380;
    o.frequency.exponentialRampToValueAtTime(120, a.currentTime + 0.5);
    const g = a.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.16, a.currentTime + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.5);
    const ws = a.createWaveShaper();
    const curve = new Float32Array(2048);
    for(let i=0; i<2048; i++){
      const x = (i/2048)*2-1;
      curve[i] = Math.tanh(x * 4) * 0.7;
    }
    ws.curve = curve;
    o.connect(ws).connect(g).connect(conv).connect(a.destination);
    o.start();
    o.stop(a.currentTime + 0.5);
  }

  function playClick(){
    if(state.muted) return;
    const a = ac();
    const o = a.createOscillator();
    o.type = 'sine';
    o.frequency.value = 660;
    o.frequency.exponentialRampToValueAtTime(110, a.currentTime + 0.1);
    const g = a.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.08, a.currentTime + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.16);
    o.connect(g).connect(a.destination);
    o.start();
    o.stop(a.currentTime + 0.16);
  }

  // ============ INTERACTION ============
  function screenToWorldFloor(sx, sy){
    // inverse-project a screen point to (x, z) at floor (y = 0)
    // y of floor at given z: yFloor = VP.y*h + CAM_HEIGHT * persp * IRES.h * 0.95
    // where persp = 1/(z*FOCAL+1)
    // solve for z: persp = (sy - VP.y*h)/(CAM_HEIGHT * IRES.h * 0.95)
    const persp = (sy - VP.y * IRES.h) / (CAM_HEIGHT * IRES.h * 0.95);
    if(persp <= 0.01) return null;
    const z = (1/persp - 1) / FOCAL;
    if(z < 0 || z > 8) return null;
    // x: (sx - VP.x*w) = wx * persp * IRES.w * 0.65
    const wx = (sx - VP.x * IRES.w) / (persp * IRES.w * 0.65);
    return { x: wx, y: 0, z };
  }

  function spawnSplashAt(sx, sy){
    // sx,sy are internal canvas coordinates
    const p = screenToWorldFloor(sx, sy);
    if(!p) return;
    if(Math.abs(p.x) > HALL_HALF_W * 0.94) return;
    // burst
    for(let k=0; k<22; k++){
      const ang = Math.random()*Math.PI*2;
      const sp = 0.4 + Math.random()*1.4;
      spawnDrip(p.x, 0.04, p.z,
        Math.cos(ang)*sp*0.3,
        0.6 + Math.random()*1.2,
        Math.sin(ang)*sp*0.4,
        { life: 1.2 + Math.random()*0.8, sz: 0.6 + Math.random()*0.6 });
    }
    // immediate pool
    addPoolDot(p.x, p.z, 1.2);
    maybeSplash(1);
  }

  function eventToInternal(e){
    const rect = bgCanvas.getBoundingClientRect();
    const cx = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
    const cy = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
    const sx = ((cx - rect.left) / rect.width) * IRES.w;
    const sy = ((cy - rect.top) / rect.height) * IRES.h;
    return { sx, sy };
  }

  function onPointerDown(e){
    const { sx, sy } = eventToInternal(e);
    spawnSplashAt(sx, sy);
    titleEl.classList.add('hidden');
    triggerFlick(0.4);
    e.preventDefault();
  }
  function onPointerMove(e){
    if(!(e.buttons & 1) && !e.touches) return;
    if(e.touches && e.touches.length === 0) return;
    const { sx, sy } = eventToInternal(e);
    spawnSplashAt(sx, sy);
    e.preventDefault();
  }

  // flicker
  function triggerFlick(amount){
    state.flickT = Math.min(1, state.flickT + amount);
  }

  // ============ MAIN LOOP ============
  let lastT = performance.now();
  const titleEl = $('title');
  const flickEl = $('flick');
  const litEl = $('lit');

  function tick(){
    const now = performance.now();
    let dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    state.timeT += dt;

    tickElevator(dt);
    tickBlood(dt);
    tickPoolFlow(dt);
    state.flickT = Math.max(0, state.flickT - dt * 0.7);

    // re-bake elevator open visual on bg
    drawElevatorOnTopOfBg();
    renderBlood();
    renderFx();

    // hud
    litEl.textContent = state.litres.toFixed(1);

    // flicker css
    flickEl.style.background = `rgba(120,40,30,${0.15 * state.flickT})`;

    // ambient flicker random
    if(Math.random() < 0.005) triggerFlick(0.18);
    if(state.elevatorOpen > 0.3 && Math.random() < 0.02) triggerFlick(0.32);

    requestAnimationFrame(tick);
  }

  // We want the elevator door state to update live without redrawing whole bg.
  // Keep a copy of bg snapshot before elevator and re-draw elevator on top.
  let bgSnapshot = null;
  function snapshotBg(){
    bgSnapshot = bg.getImageData(0, 0, IRES.w, IRES.h);
  }
  function drawElevatorOnTopOfBg(){
    if(!bgSnapshot) return;
    bg.putImageData(bgSnapshot, 0, 0);
    drawElevator(bg);
    drawSconces(bg);
  }

  // ============ INIT ============
  function buildScene(){
    wallPx = bg.createImageData(IRES.w, IRES.h);
    drawScene();
    // capture snapshot
    snapshotBg();
  }
  function fullRebuild(){
    fitCanvases();
    wallPx = bg.createImageData(IRES.w, IRES.h);
    drawScene();
    snapshotBg();
  }

  window.addEventListener('resize', () => { fullRebuild(); });
  bloodCanvas.addEventListener('pointerdown', onPointerDown);
  bloodCanvas.addEventListener('pointermove', onPointerMove);
  fxCanvas.addEventListener('pointerdown', onPointerDown);
  fxCanvas.addEventListener('pointermove', onPointerMove);
  document.addEventListener('keydown', (e) => {
    if(e.key === ' '){
      if(state.elevatorTarget < 0.5) openElevator();
      else closeElevator();
      titleEl.classList.add('hidden');
      e.preventDefault();
    }
  });

  $('elBtn').addEventListener('click', () => {
    if(state.elevatorTarget < 0.5) openElevator();
    else closeElevator();
    titleEl.classList.add('hidden');
  });
  $('rinseBtn').addEventListener('click', () => {
    initPoolGrid();
    state.drips.length = 0;
    state.splats.length = 0;
    state.litres = 0;
    closeElevator();
    titleEl.classList.add('hidden');
    playClick();
  });
  $('muteBtn').addEventListener('click', () => {
    state.muted = !state.muted;
    $('muteBtn').textContent = state.muted ? '♪ OFF' : '♪ ON';
    if(state.muted) stopDrone();
    else startDrone();
  });

  $('enterBtn').addEventListener('click', () => {
    $('intro').classList.add('gone');
    state.started = true;
    fullRebuild();
    if(!state.muted) startDrone();
    // open after 2s on entry for a beat
    setTimeout(() => openElevator(), 1800);
  });

  // initial bake (so background visible behind intro)
  setTimeout(() => { fullRebuild(); }, 30);
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
