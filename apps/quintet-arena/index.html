<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quintet Arena — five pixel heroes, one dusk arena</title>
<meta name="description" content="Pick one of five pixel heroes — each with three skills — and hold the dusk arena against the swarm. Camera punches in on every cast.">
<link rel="icon" href="https://emojicdn.elk.sh/⚔️">
<meta property="og:title" content="Quintet Arena">
<meta property="og:description" content="Five pixel heroes, three skills each, one dusk arena. Survive the waves.">
<meta property="og:url" content="https://sloppy.live/quintet-arena">
<meta property="og:image" content="https://image.pollinations.ai/prompt/five%20tiny%20pixel%20art%20heroes%20knight%20mage%20ranger%20monk%20necromancer%20standing%20in%20a%20dusk%20torch%20lit%20arena%2C%20retro%20game%2C%20dramatic%20purple%20dusk%20sky%2C%20crisp%20pixel%20art?width=1200&height=630&seed=7331&nologo=true&model=flux&image=.png">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Silkscreen:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{ --ink:#120e1a; --fg:#efe9f7; --dim:#9a8fb0; --amber:#ffb454; --red:#ff5e6a; --teal:#54e0c8; --focus:#8fd4ff; }
*{box-sizing:border-box;}
html{font-size:100%;}
html,body{height:100%; margin:0;}
body{background:var(--ink); color:var(--fg); font-family:'Space Mono',monospace; overflow:hidden; user-select:none;}
canvas#game{position:fixed; inset:0; display:block; image-rendering:pixelated;}
#vig{position:fixed; inset:0; pointer-events:none; z-index:2; background:radial-gradient(ellipse at 50% 45%, transparent 55%, rgba(6,3,12,.55) 100%);}
/* ── HUD ── */
#hud{position:fixed; inset:0; z-index:5; pointer-events:none; display:none;}
#hud.on{display:block;}
.hp-wrap{position:absolute; top:.75rem; left:.75rem; display:flex; gap:.6rem; align-items:center;
  background:rgba(14,10,22,.72); border:1px solid #322847; border-radius:10px; padding:.45rem .7rem;}
#portrait{width:3rem; height:3rem; image-rendering:pixelated; background:#0c0916; border-radius:6px; border:1px solid #322847;}
.hp-col{min-width:9rem;}
#hero-name{font-family:'Silkscreen',monospace; font-size:.72rem; letter-spacing:.08em;}
.hp-bar{height:.7rem; margin-top:.3rem; background:#241b36; border-radius:4px; overflow:hidden; border:1px solid #000;}
#hp-fill{height:100%; width:100%; background:linear-gradient(90deg,#4fd06a,#a8e05a); transition:width .15s;}
#hp-fill.low{background:linear-gradient(90deg,#ff5e6a,#ff9a54);}
.top-mid{position:absolute; top:.75rem; left:50%; transform:translateX(-50%); text-align:center;}
#wave-lbl{font-family:'Silkscreen',monospace; font-size:.62rem; letter-spacing:.2em; color:var(--dim); text-transform:uppercase;}
#wave-num{font-family:'Jersey 10',monospace; font-size:2.6rem; line-height:.9; color:var(--amber); text-shadow:0 2px 0 #000;}
#score{position:absolute; top:.75rem; right:.75rem; text-align:right; font-family:'Jersey 10',monospace; font-size:2rem; line-height:.9; color:var(--fg); text-shadow:0 2px 0 #000;}
#score small{display:block; font-family:'Silkscreen',monospace; font-size:.58rem; letter-spacing:.2em; color:var(--dim);}
/* skills */
#skills{position:absolute; bottom:.9rem; left:50%; transform:translateX(-50%); display:flex; gap:.55rem;}
.skl{position:relative; width:3.4rem; height:3.4rem; border-radius:10px; background:rgba(14,10,22,.8); border:2px solid #3a2f52; overflow:hidden;}
.skl .ic{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:1.3rem;}
.skl .cd{position:absolute; left:0; bottom:0; width:100%; height:0%; background:rgba(10,6,18,.82);}
.skl .key{position:absolute; top:.1rem; left:.25rem; font-family:'Silkscreen',monospace; font-size:.58rem; color:var(--dim);}
.skl .nm{position:absolute; bottom:.1rem; left:0; right:0; text-align:center; font-family:'Silkscreen',monospace; font-size:.44rem; color:var(--dim); letter-spacing:.02em;}
.skl.ready{border-color:var(--amber); box-shadow:0 0 10px rgba(255,180,84,.35);}
/* ── overlays ── */
.ov{position:fixed; inset:0; z-index:20; display:none; align-items:center; justify-content:center; background:rgba(9,6,15,.92); overflow-y:auto;}
.ov.on{display:flex;}
.card{max-width:60rem; text-align:center; padding:1.6rem 1rem;}
h1{font-family:'Jersey 10',monospace; font-weight:400; font-size:clamp(3.4rem,11vw,6.5rem); margin:0; line-height:.8; letter-spacing:.02em;}
h1 span{color:var(--amber);}
.tag{color:var(--dim); font-size:.8rem; margin:.6rem 0 1.2rem;}
.tag b{color:var(--fg);}
#roster{display:flex; gap:.8rem; justify-content:center; flex-wrap:wrap; margin:0; padding:0; list-style:none;}
.hero-card{width:10.5rem; background:rgba(20,14,32,.9); border:2px solid #322847; border-radius:12px; padding:.8rem .6rem;
  cursor:pointer; color:var(--fg); font-family:'Space Mono',monospace; text-align:center; min-height:2.75rem; transition:transform .12s, border-color .12s;}
.hero-card:hover{transform:translateY(-4px);}
.hero-card:focus-visible{outline:3px solid var(--focus); outline-offset:3px;}
.hero-card canvas{width:4.5rem; height:6rem; image-rendering:pixelated;}
.hero-card .hn{font-family:'Jersey 10',monospace; font-size:1.9rem; line-height:.9; margin:.2rem 0 0;}
.hero-card .hr{font-size:.6rem; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin-bottom:.5rem;}
.hero-card ul{list-style:none; margin:0; padding:0; text-align:left; font-size:.6rem; line-height:1.5; color:var(--dim);}
.hero-card ul b{color:var(--fg); font-family:'Silkscreen',monospace; font-size:.55rem;}
.hint{font-size:.68rem; color:var(--dim); margin-top:1.1rem; line-height:1.9;}
.hint .k{border:1px solid var(--dim); border-radius:4px; padding:0 .35rem;}
button.big{font-family:'Jersey 10',monospace; font-size:1.8rem; letter-spacing:.04em; cursor:pointer; min-height:2.75rem;
  padding:.4rem 2.4rem; border:0; border-radius:10px; background:var(--amber); color:#241400; box-shadow:0 5px 0 #7a4e00;}
button.big:hover{filter:brightness(1.08);} button.big:active{transform:translateY(3px); box-shadow:0 2px 0 #7a4e00;}
button.big:focus-visible{outline:3px solid var(--focus); outline-offset:3px;}
.end-h.lose{color:var(--red);}
/* ── touch ── */
#joy{position:fixed; left:1rem; bottom:1.2rem; width:8rem; height:8rem; z-index:8; display:none; touch-action:none;}
#joy .ring{position:absolute; inset:0; border-radius:50%; border:2px solid #fff3; background:#fff1;}
#joy .nub{position:absolute; left:50%; top:50%; width:3rem; height:3rem; margin:-1.5rem; border-radius:50%; background:rgba(84,224,200,.3); border:2px solid var(--teal);}
.tbtn{position:fixed; z-index:8; display:none; border-radius:50%; font-family:'Silkscreen',monospace; touch-action:none;
  border:3px solid var(--amber); background:rgba(255,180,84,.22); color:var(--amber);}
#t-atk{right:1rem; bottom:1.4rem; width:5rem; height:5rem; font-size:1rem;}
#t-q{right:6.6rem; bottom:2.4rem; width:3.2rem; height:3.2rem; font-size:.8rem; border-color:var(--teal); color:var(--teal); background:rgba(84,224,200,.18);}
#t-e{right:5.4rem; bottom:6.4rem; width:3.2rem; height:3.2rem; font-size:.8rem; border-color:var(--teal); color:var(--teal); background:rgba(84,224,200,.18);}
#t-r{right:1.6rem; bottom:7.2rem; width:3.2rem; height:3.2rem; font-size:.8rem; border-color:var(--red); color:var(--red); background:rgba(255,94,106,.18);}
@media (pointer:coarse){ #joy,.tbtn{display:block;} #skills{bottom:11rem;} }
#sr-status{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}
@media (prefers-reduced-motion:reduce){ .hero-card{transition:none;} }
</style>

<main>
<canvas id="game" role="application" aria-label="Quintet Arena battle. WASD or arrow keys to move, J or click to attack, Q E R for skills, P to pause."></canvas>
<div id="vig" aria-hidden="true"></div>

<div id="hud">
  <div class="hp-wrap">

      <div class="hp-bar"><div id="hp-fill"></div></div>
    </div>
  </div>
  <div class="top-mid"><div id="wave-lbl">wave</div><div id="wave-num">1</div></div>
  <div id="score"><small>score</small><span id="score-num">0</span></div>
  <div id="skills">
    <div class="skl" id="sk0"><div class="ic"></div><div class="cd"></div><span class="key">Q</span><span class="nm"></span></div>
    <div class="skl" id="sk1"><div class="ic"></div><div class="cd"></div><span class="key">E</span><span class="nm"></span></div>

  </div>
</div>
<p id="sr-status" role="status" aria-live="polite"></p>

<div class="ov on" id="select-ov" role="dialog" aria-modal="true" aria-labelledby="t-h">
  <div class="card">
    <h1 id="t-h">QUINTET <span>ARENA</span></h1>
    <p class="tag">five heroes · <b>three skills each</b> · one dusk arena · survive the waves</p>
    <ul id="roster"></ul>
    <p class="hint"><span class="k">WASD</span> move · <span class="k">J</span>/click attack (auto-aims) · <span class="k">Q</span> <span class="k">E</span> <span class="k">R</span> skills · <span class="k">P</span> pause · <span class="k">M</span> mute<br>press <b>1–5</b> or click a hero to enter the arena</p>
  </div>
</div>
<div class="ov" id="end-ov" role="dialog" aria-modal="true" aria-labelledby="e-h">
  <div class="card">
    <h1 id="e-h" class="end-h lose">FALLEN</h1>
    <p class="tag" id="end-text"></p>
    <button class="big" id="again-btn" type="button">choose a hero</button>
  </div>
</div>

<div id="joy" aria-hidden="true"><div class="ring"></div><div class="nub" id="nub"></div></div>
<button class="tbtn" id="t-atk" type="button" aria-label="Attack">ATK</button>
<button class="tbtn" id="t-q" type="button" aria-label="Skill Q">Q</button>
<button class="tbtn" id="t-e" type="button" aria-label="Skill E">E</button>
<button class="tbtn" id="t-r" type="button" aria-label="Skill R">R</button>
</main>

    var c=document.createElement('canvas'); c.width=w; c.height=h;

      }
    }
    return c;
  }
  return {f:[make(false),make(true)], w:w, h:h};
}

var AC=null, muted=false;
function au(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function tone(fr,dur,type,vol,slide){
  if(muted||!au()) return;
  try{
    var o=AC.createOscillator(),g=AC.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(fr,AC.currentTime);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(20,slide),AC.currentTime+dur);
    g.gain.setValueAtTime(vol||.08,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+dur);
    o.connect(g).connect(AC.destination); o.start(); o.stop(AC.currentTime+dur+.02);
  }catch(e){}
}
function noise(dur,vol,hp){
  if(muted||!au()) return;
  try{
    var n=AC.createBufferSource(),b=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate),d=b.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    n.buffer=b;
    var f=AC.createBiquadFilter(); f.type=hp?'highpass':'lowpass'; f.frequency.value=hp||900;
    var g=AC.createGain(); g.gain.value=vol||.1;
    n.connect(f).connect(g).connect(AC.destination); n.start();
  }catch(e){}
}

 {spr:'pillar', x:200, y:190, r:9},

/* ═══════════ state ═══════════ */
var state={mode:'select', paused:false, t:0, wave:0, score:0, kills:0, hitstop:0, interlude:0};
var P=null;              /* player */
var enemies=[], minions=[], projs=[], zones=[], meteors=[], novas=[], bolts=[], parts=[], floaters=[], spawnQ=[];
var keys={}, atkHeld=false;

function nearestEnemy(x,y,maxD){
  var best=null,bd=maxD||1e9;
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i], d=Math.hypot(e.x-x,e.y-y);
    if(d<bd){ bd=d; best=e; }
  }
  return best;
}
function aimDir(){
  var t=nearestEnemy(P.x,P.y,240);
  if(t){ var d=Math.hypot(t.x-P.x,t.y-P.y)||1; return {x:(t.x-P.x)/d, y:(t.y-P.y)/d, t:t}; }
  return {x:P.face, y:0, t:null};
}
function dmgEnemy(e,amount,kx,ky){
  e.hp-=amount; e.flash=.12;
  if(kx||ky){ e.kx=(kx||0); e.ky=(ky||0); }
  addFloater(e.x,e.y-e.sh-4,Math.round(amount),'#ffd27a');
  if(e.hp<=0) killEnemy(e);
  else SFX.hit();
}
function killEnemy(e){
  if(e.dead) return; e.dead=true;
  state.score+=e.score; state.kills++;
  $('score-num').textContent=state.score;
  burst(e.x,e.y-4,e.clr,10);
  SFX.die();
}
function addFloater(x,y,txt,clr){ floaters.push({x:x,y:y,txt:''+txt,clr:clr,life:.8}); }
function burst(x,y,clr,n){
  for(var i=0;i<n;i++){
    var a=Math.random()*6.283, s=20+Math.random()*50;
    parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s*.6,life:.3+Math.random()*.4,clr:clr,sz:1+Math.random()*2});
  }
}
function zoomPunch(amount){
  if(reduceMotion){ cam.punch=Math.min(cam.punch,1.04); return; }
  cam.punch=amount;
}
function shake(n){ if(!reduceMotion) cam.shake=Math.max(cam.shake,n); }
function hitstop(ms){ if(!reduceMotion) state.hitstop=Math.max(state.hitstop,ms/1000); }

/* ═══════════ hero actions ═══════════ */
function doAttack(){
  if(P.atkT>0||P.windup>0) return;
  P.atkT=P.def.atkCd/(P.buffT>0?2:1);
  var a=aimDir(), dmg=P.def.atkDmg, k=P.def.key;
  if(a.x<0) P.face=-1; else if(a.x>0) P.face=1;
  if(k==='blade'){
    SFX.slash(); P.swing=.18;
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i], dx=e.x-P.x, dy=e.y-P.y;
      if(Math.hypot(dx,dy*1.3)<26 && dx*a.x+dy*a.y>-4) dmgEnemy(e,dmg,a.x*40,a.y*24);
    }
  }else if(k==='volt'){
    var t=a.t && Math.hypot(a.t.x-P.x,a.t.y-P.y)<120 ? a.t : null;
    if(!t){ tone(120,.05,'square',.03); P.atkT=.12; return; }
    SFX.zap();
    zapChain(t,dmg,P.buffT>0?2:0);
  }else{
    SFX.shoot(k==='ember'?300:k==='grave'?220:520);
    projs.push({x:P.x, y:P.y-8, vx:a.x*(k==='thorn'?200:140), vy:a.y*(k==='thorn'?200:140),
      dmg:dmg, life:1.6, clr:P.def.clr, pierce:k==='grave', splash:k==='ember'?22:0, hit:{}, id:++uid});
  }
}
function zapChain(t,dmg,chains){
  bolts.push({x1:P.x,y1:P.y-10,x2:t.x,y2:t.y-6,life:.14});
  dmgEnemy(t,dmg,0,0);
  var from=t;
  for(var c=0;c<chains;c++){
    var nx=null,bd=70;
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i];
      if(e===from||e.dead||e.zapped) continue;
      var d=Math.hypot(e.x-from.x,e.y-from.y);
      if(d<bd){ bd=d; nx=e; }
    }
    if(!nx) break;
    nx.zapped=true;
    bolts.push({x1:from.x,y1:from.y-6,x2:nx.x,y2:nx.y-6,life:.14});
    dmgEnemy(nx,Math.round(dmg*.6),0,0);
    from=nx;
  }
  for(var j=0;j<enemies.length;j++) enemies[j].zapped=false;
}
var uid=0;
function castSkill(si){
  if(!P||state.mode!=='play'||P.windup>0) return;
  var sk=P.def.skills[si];
  if(P.cds[si]>0) return;
  P.cds[si]=sk.cd;
  var a=aimDir(), k=P.def.key;
  zoomPunch(si===2?1.5:1.3);
  SFX.cast();
  var name=k+si;
  if(name==='blade0'){        /* crescent dash */
    P.dashT=.22; P.dashX=a.x; P.dashY=a.y; P.inv=.35; P.dashHit={};
  }else if(name==='blade1'){  /* bladestorm */
    P.spinT=.6; hitstop(60);
  }else if(name==='blade2'){  /* executioner */
    P.windup=.32; P.execTarget=a.t; hitstop(70);
  }else if(name==='ember0'){  /* meteor */
    var mt=a.t||{x:P.x+a.x*60,y:P.y+a.y*36};
    meteors.push({x:mt.x,y:mt.y,t:.6});
  }else if(name==='ember1'){  /* flame wave */
    for(var i=0;i<10;i++){
      var sp=.35, ang=Math.atan2(a.y,a.x)+(Math.random()-.5)*sp*2;
      projs.push({x:P.x,y:P.y-6,vx:Math.cos(ang)*(90+Math.random()*70),vy:Math.sin(ang)*(60+Math.random()*40),
        dmg:7,life:.55,clr:'#ff9a3d',pierce:true,burn:true,hit:{},id:++uid,fire:true});
    }
    noise(.25,.12);
  }else if(name==='ember2'){  /* inferno ring */
    zones.push({type:'ring',x:P.x,y:P.y,r:30,life:5,dps:26,clr:'#ff7a2e',follow:true,tick:{}});
  }else if(name==='thorn0'){  /* volley */
    var base=Math.atan2(a.y,a.x);
    for(var v=0;v<8;v++){
      var va=base+(v-3.5)*.16;
      projs.push({x:P.x,y:P.y-8,vx:Math.cos(va)*200,vy:Math.sin(va)*200,dmg:8,life:1.4,clr:'#a8e05a',hit:{},id:++uid});
    }
    SFX.shoot(620);
  }else if(name==='thorn1'){  /* snare trap */
    zones.push({type:'trap',x:P.x+a.x*24,y:P.y+a.y*16,r:12,life:20,clr:'#7ed06a'});
  }else if(name==='thorn2'){  /* arrow rain */
    var rt=a.t||{x:P.x+a.x*70,y:P.y+a.y*40};
    zones.push({type:'rain',x:rt.x,y:rt.y,r:42,life:2.5,dps:30,clr:'#a8e05a',tick:{}});
  }else if(name==='volt0'){   /* storm nova */
    novas.push({x:P.x,y:P.y,r:6,max:78,hit:{}});
    SFX.zap();
  }else if(name==='volt1'){   /* blink */
    burst(P.x,P.y-8,'#54c8e0',8);
    var mv=moveDir(); var bx=mv.m>.1?mv.x:a.x, by=mv.m>.1?mv.y:a.y;
    P.x=Math.max(BX0,Math.min(BX1,P.x+bx*85));
    P.y=Math.max(BY0,Math.min(BY1,P.y+by*55));
    burst(P.x,P.y-8,'#a8ecf5',12);
    for(var b=0;b<enemies.length;b++){
      var be=enemies[b];
      if(Math.hypot(be.x-P.x,(be.y-P.y)*1.2)<26) dmgEnemy(be,14,(be.x-P.x)*3,(be.y-P.y)*3);
    }
  }else if(name==='volt2'){   /* overcharge */
    P.buffT=5; burst(P.x,P.y-10,'#ffe066',14);
  }else if(name==='grave0'){  /* raise dead */
    for(var s=0;s<2;s++)
      minions.push({x:P.x+(s?14:-14),y:P.y+6,hp:34,life:9,atkT:0,anim:0,face:1});
  }else if(name==='grave1'){  /* soul drain */
    var list=enemies.slice().sort(function(p,q){
      return Math.hypot(p.x-P.x,p.y-P.y)-Math.hypot(q.x-P.x,q.y-P.y); }).slice(0,3);
    list.forEach(function(e){
      if(Math.hypot(e.x-P.x,e.y-P.y)>140) return;
      bolts.push({x1:P.x,y1:P.y-10,x2:e.x,y2:e.y-6,life:.4,clr:'#b07ae0'});
      dmgEnemy(e,16,0,0);
      P.hp=Math.min(P.maxHp,P.hp+8);
      addFloater(P.x,P.y-22,'+8','#a8f0c0');
    });
    updateHP();
  }else if(name==='grave2'){  /* reaper field */
    zones.push({type:'reap',x:P.x+a.x*30,y:P.y+a.y*20,r:46,life:5,dps:18,slow:true,clr:'#b07ae0',tick:{}});
  }
  refreshSkillUI();
}
function moveDir(){
  var f=0,s=0;
  if(keys.w||keys.arrowup)f-=1; if(keys.s||keys.arrowdown)f+=1;
  if(keys.d||keys.arrowright)s+=1; if(keys.a||keys.arrowleft)s-=1;
  s+=joy.s; f+=joy.f;
  var m=Math.min(1,Math.hypot(s,f))||0;
  var mm=Math.hypot(s,f)||1;
  return {x:s/mm, y:f/mm, m:m};
}

/* ═══════════ enemies / waves ═══════════ */
function startWave(){
  state.wave++;
  $('wave-num').textContent=state.wave;
  announce('wave '+state.wave);
  SFX.wave();
  var w=state.wave, comp=[];
  var n=3+w*2;
  for(var i=0;i<n;i++){
    var roll=Math.random();
    if(w>=4&&roll<.14+w*.01) comp.push('brute');
    else if(w>=2&&roll<.5) comp.push('imp');
    else comp.push('slime');
  }
  comp.forEach(function(type,idx){
    spawnQ.push({type:type, t:.4+idx*(.5+Math.random()*.3)});
  });
}
function spawnEnemy(type){
  var d=ENEMY_DEFS[type], side=Math.floor(Math.random()*4), x,y;
  if(side===0){ x=BX0+4; y=BY0+Math.random()*(BY1-BY0); }
  else if(side===1){ x=BX1-4; y=BY0+Math.random()*(BY1-BY0); }
  else if(side===2){ x=BX0+Math.random()*(BX1-BX0); y=BY0+4; }
  else { x=BX0+Math.random()*(BX1-BX0); y=BY1-4; }
  var mul=1+(state.wave-1)*.12;
  enemies.push({type:type, x:x, y:y, hp:d.hp*mul, max:d.hp*mul, spd:d.spd, dmg:d.dmg, r:d.r,
    score:d.score, clr:d.clr, spr:SPR['e_'+type], sh:d.rows?d.rows.length:10,
    kx:0, ky:0, stun:0, slowT:0, flash:0, anim:Math.random()*10, hitCd:0, wob:Math.random()*6.283, dead:false});
  burst(x,y,'#8a7ab0',6);
}

/* ═══════════ update ═══════════ */
function update(dt){
  state.t+=dt;
  if(state.hitstop>0){ state.hitstop-=dt; return; }
  var i,e;

  /* spawn queue */
  for(i=spawnQ.length-1;i>=0;i--){
    spawnQ[i].t-=dt;
    if(spawnQ[i].t<=0){ spawnEnemy(spawnQ[i].type); spawnQ.splice(i,1); }
  }
  if(!spawnQ.length&&!enemies.length){
    state.interlude-=dt;
    if(state.interlude<=0){ startWave(); state.interlude=2.2; }
  }

  /* ── player ── */
  if(P.windup>0){
    P.windup-=dt;
    if(P.windup<=0){ /* executioner lands */
      var t=P.execTarget && !P.execTarget.dead ? P.execTarget : nearestEnemy(P.x,P.y,60);
      shake(6); SFX.boom();
      if(t){
        if(t.hp<t.max*.22){ addFloater(t.x,t.y-14,'EXECUTED','#ff5e6a'); killEnemy(t); }
        else dmgEnemy(t,45,(t.x-P.x)*6,(t.y-P.y)*6);
      }
      burst(P.x+P.face*16,P.y-6,'#ff5e6a',12);
    }
  }else{
    var mv=moveDir(), sp=P.def.spd;
    if(P.dashT>0){
      P.dashT-=dt;
      P.x+=P.dashX*340*dt; P.y+=P.dashY*230*dt;
      for(i=0;i<enemies.length;i++){
        e=enemies[i];
        if(!P.dashHit[i]&&Math.hypot(e.x-P.x,(e.y-P.y)*1.3)<18){
          P.dashHit[i]=1; dmgEnemy(e,26,P.dashX*50,P.dashY*30);
        }
      }
      parts.push({x:P.x,y:P.y-8,vx:0,vy:0,life:.25,clr:P.def.clr,sz:2});
    }else{
      P.x+=mv.x*sp*mv.m*dt; P.y+=mv.y*sp*mv.m*dt;
      if(mv.m>.1){ P.anim+=dt*9; if(mv.x<-.2)P.face=-1; if(mv.x>.2)P.face=1; }
    }
    P.x=Math.max(BX0,Math.min(BX1,P.x));
    P.y=Math.max(BY0,Math.min(BY1,P.y));
    for(i=0;i<OBST.length;i++) pushOut(P,OBST[i]);
    if(P.spinT>0){
      P.spinT-=dt;
      P.spinTick=(P.spinTick||0)-dt;
      if(P.spinTick<=0){
        P.spinTick=.2; SFX.slash();
        for(i=0;i<enemies.length;i++){
          e=enemies[i];
          if(Math.hypot(e.x-P.x,(e.y-P.y)*1.3)<34) dmgEnemy(e,11,(e.x-P.x)*4,(e.y-P.y)*4);
        }
      }
    }
    if(atkHeld) doAttack();
  }
  P.atkT-=dt; P.inv-=dt; P.swing-=dt; P.buffT-=dt;
  for(i=0;i<3;i++) if(P.cds[i]>0) P.cds[i]-=dt;

  /* ── enemies ── */
  for(i=enemies.length-1;i>=0;i--){
    e=enemies[i];
    if(e.dead){ enemies.splice(i,1); continue; }
    e.flash-=dt; e.stun-=dt; e.slowT-=dt; e.hitCd-=dt; e.anim+=dt*6; e.wob+=dt*2;
    e.x+=e.kx*dt; e.y+=e.ky*dt; e.kx*=Math.pow(.02,dt); e.ky*=Math.pow(.02,dt);
    if(e.stun<=0){
      /* target: nearest of player / minions */
      var tx=P.x, ty=P.y, td=Math.hypot(P.x-e.x,P.y-e.y);
      for(var m2=0;m2<minions.length;m2++){
        var mm2=minions[m2], md=Math.hypot(mm2.x-e.x,mm2.y-e.y);
        if(md<td*.8){ tx=mm2.x; ty=mm2.y; td=md; }
      }
      var sp2=e.spd*(e.slowT>0?.45:1), dd=td||1;
      e.x+=((tx-e.x)/dd)*sp2*dt + Math.cos(e.wob)*4*dt;
      e.y+=((ty-e.y)/dd)*sp2*dt*.8 + Math.sin(e.wob)*3*dt;
    }
    e.x=Math.max(BX0,Math.min(BX1,e.x));
    e.y=Math.max(BY0,Math.min(BY1,e.y));
    /* separation */
    for(var j=i+1;j<enemies.length;j++){
      var o=enemies[j], dx=o.x-e.x, dy=o.y-e.y, dl=Math.hypot(dx,dy);
      var min=e.r+o.r;
      if(dl<min&&dl>0){ var push=(min-dl)/2; e.x-=dx/dl*push; e.y-=dy/dl*push; o.x+=dx/dl*push; o.y+=dy/dl*push; }
    }
    /* contact damage to player */
    if(e.hitCd<=0 && P.inv<=0 && Math.hypot(e.x-P.x,(e.y-P.y)*1.35)<e.r+6){
      e.hitCd=.7; P.hp-=e.dmg; P.inv=.5; shake(4); SFX.hurt();
      addFloater(P.x,P.y-22,-e.dmg,'#ff5e6a');
      updateHP();
      if(P.hp<=0){ gameOver(); return; }
    }
    /* minion melee contact */
    for(var m3=minions.length-1;m3>=0;m3--){
      var mn=minions[m3];
      if(Math.hypot(e.x-mn.x,e.y-mn.y)<e.r+5 && e.hitCd<=-0.0){ /* enemy also chews minions */
        mn.hp-=e.dmg*dt*2;
      }
    }
  }

  /* ── minions ── */
  for(i=minions.length-1;i>=0;i--){
    var mn2=minions[i];
    mn2.life-=dt; mn2.atkT-=dt; mn2.anim+=dt*8;
    if(mn2.life<=0||mn2.hp<=0){ burst(mn2.x,mn2.y-4,'#e0dcc8',6); minions.splice(i,1); continue; }
    var mt2=nearestEnemy(mn2.x,mn2.y);
    if(mt2){
      var mdx=mt2.x-mn2.x, mdy=mt2.y-mn2.y, mdl=Math.hypot(mdx,mdy)||1;
      if(mdl>mt2.r+6){ mn2.x+=mdx/mdl*46*dt; mn2.y+=mdy/mdl*36*dt; mn2.face=mdx<0?-1:1; }
      else if(mn2.atkT<=0){ mn2.atkT=.7; dmgEnemy(mt2,9,mdx*2,mdy*2); }
    }
  }

  /* ── projectiles ── */
  for(i=projs.length-1;i>=0;i--){
    var p=projs[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    if(p.fire) parts.push({x:p.x,y:p.y-6,vx:0,vy:-14,life:.2,clr:'#ffcf5e',sz:1.5});
    var dead=p.life<=0||p.x<BX0-10||p.x>BX1+10||p.y<BY0-20||p.y>BY1+16;
    for(var k2=0;k2<enemies.length&&!dead;k2++){
      var e2=enemies[k2];
      if(p.hit[k2]) continue;
      if(Math.hypot(e2.x-p.x,(e2.y-6-p.y)*1.2)<e2.r+3){
        p.hit[k2]=1;
        dmgEnemy(e2,p.dmg,p.vx*.3,p.vy*.3);
        if(p.burn) e2.slowT=Math.max(e2.slowT,.6);
        if(p.splash){
          for(var s2=0;s2<enemies.length;s2++){
            var se=enemies[s2];
            if(s2!==k2&&Math.hypot(se.x-p.x,se.y-p.y)<p.splash) dmgEnemy(se,Math.round(p.dmg*.5),0,0);
          }
          burst(p.x,p.y,'#ff9a3d',8);
        }
        if(!p.pierce) dead=true;
      }
    }
    if(dead) projs.splice(i,1);
  }

  /* ── meteors ── */
  for(i=meteors.length-1;i>=0;i--){
    var mt3=meteors[i]; mt3.t-=dt;
    if(mt3.t<=0){
      shake(7); SFX.boom(); burst(mt3.x,mt3.y,'#ff9a3d',22);
      for(var b2=0;b2<enemies.length;b2++){
        var be2=enemies[b2];
        if(Math.hypot(be2.x-mt3.x,be2.y-mt3.y)<46) dmgEnemy(be2,40,(be2.x-mt3.x)*4,(be2.y-mt3.y)*4);
      }
      meteors.splice(i,1);
    }
  }

  /* ── novas ── */
  for(i=novas.length-1;i>=0;i--){
    var nv=novas[i]; nv.r+=240*dt;
    for(var n2=0;n2<enemies.length;n2++){
      var ne=enemies[n2];
      if(!nv.hit[n2]&&Math.abs(Math.hypot(ne.x-nv.x,ne.y-nv.y)-nv.r)<10){
        nv.hit[n2]=1; ne.stun=1.4; dmgEnemy(ne,22,(ne.x-nv.x)*3,(ne.y-nv.y)*3);
      }
    }
    if(nv.r>nv.max) novas.splice(i,1);
  }

  /* ── zones ── */
  for(i=zones.length-1;i>=0;i--){
    var z=zones[i]; z.life-=dt;
    if(z.follow){ z.x=P.x; z.y=P.y; }
    if(z.type==='rain'&&Math.random()<dt*30)
      parts.push({x:z.x+(Math.random()-.5)*z.r*2,y:z.y-40+Math.random()*10,vx:0,vy:170,life:.24,clr:'#a8e05a',sz:1.5});
    for(var z2=0;z2<enemies.length;z2++){
      var ze=enemies[z2], zd=Math.hypot(ze.x-z.x,ze.y-z.y);
      if(z.type==='trap'){
        if(zd<z.r){ ze.stun=2; dmgEnemy(ze,18,0,0); burst(z.x,z.y,'#7ed06a',8); z.life=0; break; }
      }else if(z.type==='ring'){
        if(Math.abs(zd-z.r)<8){ ze.slowT=Math.max(ze.slowT,.2); tickZone(z,z2,ze,dt); }
      }else if(zd<z.r){
        if(z.slow) ze.slowT=Math.max(ze.slowT,.25);
        tickZone(z,z2,ze,dt);
      }
    }
    if(z.life<=0) zones.splice(i,1);
  }

  /* ── bolts / particles / floaters ── */
  for(i=bolts.length-1;i>=0;i--){ bolts[i].life-=dt; if(bolts[i].life<=0) bolts.splice(i,1); }
  for(i=parts.length-1;i>=0;i--){
    var pt=parts[i]; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.life-=dt;
    if(pt.life<=0) parts.splice(i,1);
  }
  for(i=floaters.length-1;i>=0;i--){
    var fl=floaters[i]; fl.y-=22*dt; fl.life-=dt;
    if(fl.life<=0) floaters.splice(i,1);
  }
  refreshSkillUI();
}
function tickZone(z,idx,e,dt){
  z.tick[idx]=(z.tick[idx]||0)-dt;
  if(z.tick[idx]<=0){ z.tick[idx]=.4; dmgEnemy(e,Math.round(z.dps*.4),0,0); }
}
function pushOut(ent,ob){
  var dx=ent.x-ob.x, dy=(ent.y-ob.y)*1.4, dl=Math.hypot(dx,dy);
  if(dl<ob.r+5&&dl>0){
    var f=(ob.r+5-dl)/dl;
    ent.x+=dx*f; ent.y+=dy*f/1.4;
  }
}

/* ═══════════ render ═══════════ */
function render(){
  var cw=canvas.width, ch=canvas.height;
  ctx.imageSmoothingEnabled=false;
  ctx.fillStyle='#120e1a'; ctx.fillRect(0,0,cw,ch);
  var z=cam.z*cam.punch;
  var sx=cam.shake>0?(Math.random()-.5)*cam.shake:0;
  var sy=cam.shake>0?(Math.random()-.5)*cam.shake:0;
  cam.shake*=.86;
  ctx.save();
  ctx.translate(cw/2+sx, ch/2+sy);
  ctx.scale(z,z);
  ctx.translate(-cam.x,-cam.y);

  ctx.drawImage(ground,0,0);

  /* zones under everything */
  zones.forEach(function(zn){
    ctx.globalAlpha=.28+.1*Math.sin(state.t*6);
    ctx.strokeStyle=zn.clr; ctx.fillStyle=zn.clr;
    ctx.lineWidth=1.5;
    if(zn.type==='ring'){
      ctx.beginPath(); ctx.ellipse(zn.x,zn.y,zn.r,zn.r*.62,0,0,6.283); ctx.stroke();
      ctx.globalAlpha=.7;
      for(var f=0;f<8;f++){
        var fa=state.t*2.4+f*.785;
        ctx.fillRect(zn.x+Math.cos(fa)*zn.r-1.5, zn.y+Math.sin(fa)*zn.r*.62-4, 3,4);
      }
    }else if(zn.type==='trap'){
      ctx.globalAlpha=.55;
      ctx.strokeRect(zn.x-zn.r*.7,zn.y-zn.r*.45,zn.r*1.4,zn.r*.9);
    }else{
      ctx.beginPath(); ctx.ellipse(zn.x,zn.y,zn.r,zn.r*.62,0,0,6.283); ctx.fill();
    }
    ctx.globalAlpha=1;
  });
  /* meteor telegraphs */
  meteors.forEach(function(m){
    ctx.globalAlpha=.5; ctx.strokeStyle='#ff7a2e'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(m.x,m.y,46*(1-m.t),46*.62*(1-m.t),0,0,6.283); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle='#ffcf5e';
    var my=m.y-260*m.t;
    ctx.fillRect(m.x-3,my-6,6,6);
  });

  /* depth-sorted drawables */
  var draws=[];
  OBST.forEach(function(o){ draws.push({y:o.y, fn:function(){ drawShadow(o.x,o.y,8); ctx.drawImage(SPR[o.spr].f[0],o.x-SPR[o.spr].w/2,o.y-SPR[o.spr].h); }}); });
  TORCHES.forEach(function(t,ti){
    draws.push({y:t.y, fn:function(){
      ctx.drawImage(SPR.torch.f[0],t.x-3,t.y-10);
      var fl=.6+.4*Math.sin(state.t*9+ti*2.1);
      ctx.globalAlpha=.12*fl;
      ctx.fillStyle='#ffb454';
      ctx.beginPath(); ctx.ellipse(t.x,t.y-8,16+3*fl,12+2*fl,0,0,6.283); ctx.fill();
      ctx.globalAlpha=1;
    }});
  });
  enemies.forEach(function(e){
    draws.push({y:e.y, fn:function(){
      drawShadow(e.x,e.y,e.r);
      var fr=Math.floor(e.anim*2)%2;
      var sq=e.type==='slime'?1+.12*Math.sin(e.anim*3):1;
      ctx.save(); ctx.translate(e.x,e.y);
      if(e.flash>0){ ctx.globalAlpha=.55; }
      ctx.scale(1,sq);
      ctx.drawImage(e.spr.f[fr],-e.spr.w/2,-e.spr.h);
      ctx.restore(); ctx.globalAlpha=1;
      if(e.stun>0){ ctx.fillStyle='#ffe066'; ctx.fillRect(e.x-1+Math.sin(state.t*12)*4,e.y-e.spr.h-4,2,2); }
      if(e.hp<e.max){
        ctx.fillStyle='#000'; ctx.fillRect(e.x-7,e.y-e.spr.h-3,14,2);
        ctx.fillStyle='#ff5e6a'; ctx.fillRect(e.x-7,e.y-e.spr.h-3,14*Math.max(0,e.hp/e.max),2);
      }
    }});
  });
  minions.forEach(function(m){
    draws.push({y:m.y, fn:function(){
      drawShadow(m.x,m.y,4);
      var fr=Math.floor(m.anim*2)%2;
      ctx.save(); ctx.translate(m.x,m.y); ctx.scale(m.face,1);
      ctx.drawImage(SPR.skele.f[fr],-5,-12);
      ctx.restore();
    }});
  });
  if(P) draws.push({y:P.y, fn:drawPlayer});
  draws.sort(function(a,b){ return a.y-b.y; });
  draws.forEach(function(d){ d.fn(); });

  /* projectiles above */
  projs.forEach(function(p){
    ctx.fillStyle=p.clr;
    ctx.fillRect(p.x-1.5,p.y-7.5,3,3);
  });
  /* novas */
  novas.forEach(function(n){
    ctx.strokeStyle='#54c8e0'; ctx.lineWidth=2; ctx.globalAlpha=.8;
    ctx.beginPath(); ctx.ellipse(n.x,n.y,n.r,n.r*.62,0,0,6.283); ctx.stroke();
    ctx.globalAlpha=1;
  });
  /* bolts */
  bolts.forEach(function(b){
    ctx.strokeStyle=b.clr||'#aef';
    ctx.lineWidth=1.2; ctx.globalAlpha=Math.min(1,b.life*8);
    ctx.beginPath(); ctx.moveTo(b.x1,b.y1);
    var seg=4;
    for(var s3=1;s3<=seg;s3++){
      var bt=s3/seg;
      ctx.lineTo(b.x1+(b.x2-b.x1)*bt+(s3<seg?(Math.random()-.5)*6:0),
                 b.y1+(b.y2-b.y1)*bt+(s3<seg?(Math.random()-.5)*6:0));
    }
    ctx.stroke(); ctx.globalAlpha=1;
  });
  /* particles */
  parts.forEach(function(pt){
    ctx.globalAlpha=Math.min(1,pt.life*3);
    ctx.fillStyle=pt.clr; ctx.fillRect(pt.x-pt.sz/2,pt.y-pt.sz/2,pt.sz,pt.sz);
    ctx.globalAlpha=1;
  });
  /* floaters */
  ctx.font='5px Silkscreen, monospace'; ctx.textAlign='center';
  floaters.forEach(function(f){
    ctx.globalAlpha=Math.min(1,f.life*2.4);
    ctx.fillStyle='#000'; ctx.fillText(f.txt,f.x+.5,f.y+.5);
    ctx.fillStyle=f.clr; ctx.fillText(f.txt,f.x,f.y);
    ctx.globalAlpha=1;
  });
  ctx.restore();
}
function drawShadow(x,y,r){
  ctx.globalAlpha=.3; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(x,y+1,r,r*.4,0,0,6.283); ctx.fill();
  ctx.globalAlpha=1;
}
function drawPlayer(){
  drawShadow(P.x,P.y,6);
  var spr=SPR[P.def.key];
  var fr=P.anim%1<.5?0:1;
  if(P.inv>0&&Math.floor(state.t*20)%2) return;
  ctx.save(); ctx.translate(P.x,P.y);
  if(P.spinT>0) ctx.rotate(state.t*22%6.283);
  ctx.scale(P.face,1);
  ctx.drawImage(spr.f[fr],-spr.w/2,-spr.h);
  ctx.restore();
  if(P.buffT>0){
    ctx.strokeStyle='#ffe066'; ctx.globalAlpha=.6; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(P.x,P.y,9+Math.sin(state.t*8),5,0,0,6.283); ctx.stroke();
    ctx.globalAlpha=1;
  }
  if(P.swing>0){
    ctx.strokeStyle='#fff'; ctx.globalAlpha=P.swing*4; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(P.x+P.face*4,P.y-8,16,P.face>0?-1:2.2,P.face>0?.9:4.1); ctx.stroke();
    ctx.globalAlpha=1;
  }
  if(P.windup>0){
    ctx.fillStyle='#ff5e6a'; ctx.globalAlpha=.8;
    ctx.fillRect(P.x+P.face*10-2,P.y-22-P.windup*30,4,10);
    ctx.globalAlpha=1;
  }
}

/* ═══════════ loop ═══════════ */
var last=0;
function frame(ts){
  requestAnimationFrame(frame);
  var dt=Math.min(.04,(ts-last)/1000||.016); last=ts;
  cam.punch+=(1-cam.punch)*Math.min(1,dt*5);
  if(state.mode==='play'&&!state.paused){
    update(dt);
    if(P){
      cam.x+=(P.x-cam.x)*Math.min(1,dt*6);
      cam.y+=((P.y-14)-cam.y)*Math.min(1,dt*6);
      var vw=canvas.width/(cam.z*cam.punch)/2, vh=canvas.height/(cam.z*cam.punch)/2;
      cam.x=Math.max(Math.min(cam.x,W-vw),vw); if(vw*2>W) cam.x=W/2;
      cam.y=Math.max(Math.min(cam.y,WH-vh),vh); if(vh*2>WH) cam.y=WH/2;
    }
  }
  render();
}

/* ═══════════ UI ═══════════ */
function updateHP(){
  var pct=Math.max(0,P.hp/P.maxHp*100);
  var f=$('hp-fill');
  f.style.width=pct+'%';
  f.classList.toggle('low',pct<30);
}
function refreshSkillUI(){
  if(!P) return;
  for(var i=0;i<3;i++){
    var el=$('sk'+i), cd=P.cds[i], max=P.def.skills[i].cd;
    el.querySelector('.cd').style.height=cd>0?(cd/max*100)+'%':'0%';
    el.classList.toggle('ready',cd<=0);
  }
}
function announce(txt){ $('sr-status').textContent=txt; }
function buildRoster(){
  var ul=$('roster');
  HERO_DEFS.forEach(function(h,i){
    var li=document.createElement('li');
    var b=document.createElement('button');
    b.className='hero-card'; b.type='button';
    b.style.borderColor=h.clr;
    b.innerHTML='<canvas width="12" height="16" aria-hidden="true"></canvas>'+
      '<div class="hn" style="color:'+h.clr+'">'+h.name+'</div>'+
      '<div class="hr">'+h.role+' · '+h.hp+' hp</div>'+
      '<ul><li><b>Q</b> '+h.skills[0].d+'</li><li><b>E</b> '+h.skills[1].d+'</li><li><b>R</b> '+h.skills[2].d+'</li></ul>';
    b.addEventListener('click',function(){ pickHero(i); });
    li.appendChild(b); ul.appendChild(li);
    var pc=b.querySelector('canvas').getContext('2d');
    pc.imageSmoothingEnabled=false;
    pc.drawImage(SPR[h.key].f[0],0,0);
  });
}
function pickHero(i){
  var def=HERO_DEFS[i];
  P={def:def, x:W/2, y:WH/2+30, hp:def.hp, maxHp:def.hp, face:1, anim:0,
     atkT:0, inv:0, swing:0, spinT:0, dashT:0, windup:0, buffT:0, cds:[0,0,0], dashHit:{}};
  enemies.length=0; minions.length=0; projs.length=0; zones.length=0;
  meteors.length=0; novas.length=0; bolts.length=0; parts.length=0; floaters.length=0; spawnQ.length=0;
  state.mode='play'; state.paused=false; state.wave=0; state.score=0; state.kills=0; state.interlude=0;
  $('score-num').textContent='0';
  $('hero-name').textContent=def.name;
  $('hero-name').style.color=def.clr;
  var pc=$('portrait').getContext('2d');
  pc.imageSmoothingEnabled=false; pc.clearRect(0,0,12,16); pc.drawImage(SPR[def.key].f[0],0,0);
  for(var s=0;s<3;s++){
    var el=$('sk'+s);
    el.querySelector('.ic').textContent=def.skills[s].ic;
    el.querySelector('.nm').textContent=def.skills[s].nm;
  }
  updateHP(); refreshSkillUI();
  $('select-ov').classList.remove('on'); $('select-ov').setAttribute('aria-hidden','true');
  $('hud').classList.add('on');
  cam.x=P.x; cam.y=P.y;
  zoomPunch(1.35);
  announce('entered the arena as '+def.name);
  au(); SFX.ui();
  startWave(); state.interlude=2.2;
}
function gameOver(){
  state.mode='over';
  SFX.over(); shake(8);
  $('hud').classList.remove('on');
  $('end-text').innerHTML='<b>'+P.def.name+'</b> fell on wave <b>'+state.wave+'</b> · '+state.kills+' kills · score <b>'+state.score+'</b><br>each hero plays a different game — try another.';
  $('end-ov').classList.add('on');
  $('again-btn').focus();
}
$('again-btn').addEventListener('click',function(){
  $('end-ov').classList.remove('on');
  $('select-ov').classList.add('on'); $('select-ov').removeAttribute('aria-hidden');
  state.mode='select';
});

/* ═══════════ input ═══════════ */
addEventListener('keydown',function(e){
  var k=e.key.toLowerCase();
  keys[k]=true;
  if(state.mode==='select'&&k>='1'&&k<='5'){ pickHero(+k-1); return; }
  if(k==='m') muted=!muted;
  if(state.mode!=='play') return;
  if(k==='p'){ state.paused=!state.paused; announce(state.paused?'paused':'unpaused'); }
  if(state.paused) return;
  if(k==='j'||k==='x'){ e.preventDefault(); doAttack(); atkHeld=true; }
  if(k==='q') castSkill(0);
  if(k==='e') castSkill(1);
  if(k==='r') castSkill(2);
  if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' '].indexOf(k)>=0) e.preventDefault();
});
addEventListener('keyup',function(e){
  var k=e.key.toLowerCase();
  keys[k]=false;
  if(k==='j'||k==='x') atkHeld=false;
});
canvas.addEventListener('mousedown',function(){ if(state.mode==='play'&&!state.paused){ doAttack(); atkHeld=true; } });
addEventListener('mouseup',function(){ atkHeld=false; });
addEventListener('blur',function(){ if(state.mode==='play') state.paused=true; });

/* touch */
var joy={f:0,s:0,id:null};
var joyEl=$('joy'), nub=$('nub');
function jUpd(e){
  var r=joyEl.getBoundingClientRect(),t=null;
  for(var i=0;i<e.touches.length;i++) if(e.touches[i].identifier===joy.id) t=e.touches[i];
  if(!t) return;
  var dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2), mx=r.width/2;
  var m=Math.hypot(dx,dy); if(m>mx){ dx=dx/m*mx; dy=dy/m*mx; }
  joy.s=dx/mx; joy.f=dy/mx;
  nub.style.left='calc(50% + '+dx+'px)'; nub.style.top='calc(50% + '+dy+'px)';
}
joyEl.addEventListener('touchstart',function(e){ e.preventDefault(); joy.id=e.changedTouches[0].identifier; jUpd(e); },{passive:false});
joyEl.addEventListener('touchmove',function(e){ e.preventDefault(); jUpd(e); },{passive:false});
joyEl.addEventListener('touchend',function(e){ e.preventDefault(); joy.id=null; joy.f=joy.s=0; nub.style.left='50%'; nub.style.top='50%'; },{passive:false});
function bindBtn(id,down,up){
  var el=$(id);
  el.addEventListener('touchstart',function(e){ e.preventDefault(); down(); },{passive:false});
  if(up) el.addEventListener('touchend',function(e){ e.preventDefault(); up(); },{passive:false});
}
bindBtn('t-atk',function(){ doAttack(); atkHeld=true; },function(){ atkHeld=false; });
bindBtn('t-q',function(){ castSkill(0); });
bindBtn('t-e',function(){ castSkill(1); });
bindBtn('t-r',function(){ castSkill(2); });

buildRoster();
requestAnimationFrame(frame);

/* debug hook */
window.__qa={
  state:function(){ return {mode:state.mode, wave:state.wave, score:state.score, hp:P?P.hp:null, enemies:enemies.length, hero:P?P.def.key:null}; },
  pick:pickHero, cast:castSkill, attack:doAttack,
  spawn:spawnEnemy, step:function(dt){ update(dt||.016); },
  kill:function(){ enemies.forEach(killEnemy); }
};
})();
</script>
</body>
</html>
