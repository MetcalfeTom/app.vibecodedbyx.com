<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ramen Rater</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8D%9C" />

<meta name="description" content="A retro paper journal for rating ramen: pick the region, dial in the broth sliders, then hold the SLURP button to score it on the slurp-o-meter." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Ramen Rater" />
<meta property="og:description" content="Region stamps, broth sliders, and a hold-to-slurp meter. Your bowls, journaled." />
<meta property="og:url" content="https://sloppy.live/ramen-rater/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20vintage%20paper%20journal%20page%20with%20a%20steaming%20ramen%20bowl%20illustration%2C%20rubber%20stamps%2C%20handwritten%20notes%2C%20warm%20cozy%20japanese%20diner?width=1200&height=630&nologo=true&seed=8888" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Caveat:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />

<style>
  :root{
    --paper:#f4e9d3; --paper2:#efe0c2; --ink:#2c2318; --faint:#8a7a5e; --line:#d8c8a6;
    --red:#c23b2e; --gold:#d99a2b; --broth:#e8b04a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    min-height:100vh; font-family:'IBM Plex Mono',monospace; color:var(--ink);
    background:
      radial-gradient(80% 60% at 20% 0%, #3a2c1c 0%, transparent 60%),
      #241a10;
    display:flex; flex-direction:column; align-items:center; padding:1.2rem .7rem 3rem;
  }
  header{ text-align:center; margin-bottom:1rem; color:var(--paper); }
  h1{ font-family:'Yuji Syuku',serif; font-weight:400; font-size:clamp(2rem,8vw,3.2rem); letter-spacing:.06em; }
  h1 .men{ color:var(--broth); }
  .tag{ font-size:.72rem; color:#c9b896; letter-spacing:.2em; text-transform:uppercase; margin-top:.3rem; }

  .book{ display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; width:min(62rem,96vw); align-items:start; }
  @media (max-width:820px){ .book{ grid-template-columns:1fr; } }

  .page{ background:
      repeating-linear-gradient(0deg, transparent 0 1.55rem, rgba(150,120,70,.25) 1.55rem calc(1.55rem + 1px)),
      linear-gradient(160deg,var(--paper),var(--paper2));
    border-radius:4px 14px 14px 4px; padding:1.2rem 1.2rem 1.4rem 2.2rem; position:relative;
    box-shadow:0 14px 34px rgba(0,0,0,.45), inset 0 0 40px rgba(150,110,50,.12); }
  .page::before{ content:""; position:absolute; top:0; bottom:0; left:1.35rem; width:2px; background:rgba(194,59,46,.4); }
  .page h2{ font-family:'Caveat',cursive; font-weight:700; font-size:1.7rem; margin-bottom:.6rem; }
  .page h2 small{ font-family:'IBM Plex Mono',monospace; font-size:.62rem; color:var(--faint); letter-spacing:.16em; text-transform:uppercase; margin-left:.4rem; }

  label{ display:block; font-size:.66rem; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); margin:.8rem 0 .25rem; }
  input[type=text], textarea{ width:100%; background:transparent; border:0; border-bottom:2px dashed var(--line);
    font-family:'Caveat',cursive; font-size:1.35rem; color:var(--ink); padding:.15rem .1rem; }
  input[type=text]:focus-visible, textarea:focus-visible{ outline:none; border-bottom-color:var(--red); }
  textarea{ resize:vertical; min-height:2.6rem; font-size:1.2rem; }

  /* region stamps */
  .stamps{ display:flex; flex-wrap:wrap; gap:.5rem; }
  .stamp{ font-family:'IBM Plex Mono',monospace; font-size:.72rem; font-weight:600; letter-spacing:.04em;
    color:var(--faint); background:transparent; border:2px solid var(--line); border-radius:8px;
    padding:.4rem .55rem; cursor:pointer; transform:rotate(var(--r,0deg)); min-height:2.4rem; }
  .stamp:nth-child(odd){ --r:-2deg; } .stamp:nth-child(3n){ --r:1.5deg; }
  .stamp[aria-pressed="true"]{ color:var(--red); border-color:var(--red); background:rgba(194,59,46,.08);
    box-shadow:0 0 0 1px rgba(194,59,46,.25); }
  .stamp:focus-visible{ outline:3px solid var(--red); outline-offset:2px; }

  /* broth sliders */
  .sliders{ display:flex; flex-direction:column; gap:.55rem; margin-top:.2rem; }
  .srow{ display:grid; grid-template-columns:6.4rem 1fr 6.4rem; gap:.5rem; align-items:center; font-size:.68rem; color:var(--faint); }
  .srow .l{ text-align:right; } .srow .r{ text-align:left; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:100%; height:1.4rem; background:transparent; cursor:pointer; }
  input[type=range]::-webkit-slider-runnable-track{ height:4px; background:repeating-linear-gradient(90deg,var(--ink) 0 6px, transparent 6px 10px); border-radius:2px; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:1.15rem; height:1.15rem; margin-top:-0.48rem; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffd98a, var(--broth) 60%, #a3690f); border:2px solid var(--ink); }
  input[type=range]::-moz-range-track{ height:4px; background:var(--ink); border-radius:2px; }
  input[type=range]::-moz-range-thumb{ width:1.05rem; height:1.05rem; border-radius:50%; background:var(--broth); border:2px solid var(--ink); }
  input[type=range]:focus-visible{ outline:3px solid var(--red); outline-offset:3px; border-radius:6px; }

  /* slurp-o-meter */
  .meterbox{ margin-top:1rem; text-align:center; }
  .dial{ position:relative; width:min(15rem,70vw); margin:0 auto; }
  .dial svg{ width:100%; height:auto; display:block; }
  .slurpbtn{ margin-top:.5rem; font-family:'Yuji Syuku',serif; font-size:1.25rem; letter-spacing:.1em; color:var(--paper);
    background:linear-gradient(180deg,#d9542e,var(--red)); border:0; border-radius:12px; padding:.6rem 1.8rem;
    cursor:pointer; min-height:2.9rem; box-shadow:0 4px 0 #7e1f14; user-select:none; touch-action:none; }
  .slurpbtn:active{ transform:translateY(3px); box-shadow:0 1px 0 #7e1f14; }
  .slurpbtn:focus-visible{ outline:3px solid var(--gold); outline-offset:3px; }
  .meterval{ font-family:'Caveat',cursive; font-size:1.5rem; margin-top:.3rem; }
  .meterhint{ font-size:.62rem; color:var(--faint); letter-spacing:.1em; text-transform:uppercase; }

  .savebtn{ margin-top:1.1rem; width:100%; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:.9rem;
    letter-spacing:.12em; text-transform:uppercase; color:var(--paper); background:var(--ink); border:0; border-radius:9px;
    padding:.75rem; cursor:pointer; min-height:2.9rem; }
  .savebtn:hover{ background:#463a28; }
  .savebtn:focus-visible{ outline:3px solid var(--red); outline-offset:3px; }
  .status{ text-align:center; font-size:.72rem; color:var(--faint); margin-top:.5rem; min-height:1rem; }

  /* journal entries */
  .entry{ position:relative; background:linear-gradient(170deg,#fdf6e6,var(--paper)); border-radius:6px;
    padding:.8rem .9rem; margin-bottom:.8rem; box-shadow:0 5px 14px rgba(0,0,0,.25);
    transform:rotate(var(--er,0deg)); border:1px solid var(--line); }
  .entry .nm{ font-family:'Caveat',cursive; font-weight:700; font-size:1.45rem; }
  .entry .meta{ font-size:.62rem; color:var(--faint); letter-spacing:.08em; margin-bottom:.4rem; }
  .entry .rstamp{ position:absolute; top:.5rem; right:.6rem; font-size:.6rem; font-weight:600; color:var(--red);
    border:2px solid var(--red); border-radius:6px; padding:.12rem .4rem; transform:rotate(6deg); letter-spacing:.08em; }
  .entry .score{ position:absolute; right:.6rem; bottom:.6rem; font-family:'Yuji Syuku',serif; font-size:1.5rem; color:var(--red); }
  .entry .score small{ font-size:.7rem; color:var(--faint); }
  .bars{ display:flex; flex-direction:column; gap:.2rem; margin:.3rem 0; max-width:70%; }
  .bar{ display:grid; grid-template-columns:4.4rem 1fr; gap:.4rem; align-items:center; font-size:.58rem; color:var(--faint); text-transform:uppercase; letter-spacing:.08em; }
  .bar i{ display:block; height:.35rem; background:var(--broth); border-radius:2px; border:1px solid rgba(0,0,0,.25); }
  .entry .note{ font-family:'Caveat',cursive; font-size:1.1rem; margin-top:.2rem; }
  .entry .del{ position:absolute; left:-.5rem; top:-.5rem; width:1.6rem; height:1.6rem; border-radius:50%; border:0;
    background:var(--ink); color:var(--paper); font-size:.8rem; cursor:pointer; opacity:0; transition:opacity .15s; }
  .entry:hover .del, .entry:focus-within .del{ opacity:1; }
  .empty{ font-family:'Caveat',cursive; font-size:1.3rem; color:var(--faint); text-align:center; padding:1.4rem 0; }

  @keyframes stampIn{ 0%{ transform:rotate(6deg) scale(2.4); opacity:0; } 60%{ transform:rotate(6deg) scale(.92); opacity:1; } 100%{ transform:rotate(6deg) scale(1); } }
  .entry.fresh .rstamp{ animation:stampIn .5s cubic-bezier(.2,.8,.3,1); }
  @media (prefers-reduced-motion: reduce){ .entry.fresh .rstamp{ animation:none; } }
</style>
</head>
<body>
  <header>
    <h1>RAMEN <span class="men">拉麺</span> RATER</h1>
    <p class="tag">a field journal of broth</p>
  </header>

  <div class="book">
    <section class="page" aria-label="Rate a new bowl">
      <h2>Today's bowl <small>page one</small></h2>

      <label for="bowlName">bowl name</label>
      <input type="text" id="bowlName" maxlength="40" placeholder="Midnight Tonkotsu №4" />

      <label id="regLbl">region stamp</label>
      <div class="stamps" role="group" aria-labelledby="regLbl" id="stamps"></div>

      <label>broth profile</label>
      <div class="sliders" id="sliders"></div>

      <label id="brandLbl">brand presets <span style="text-transform:none;letter-spacing:0">(tap to prefill the profile)</span></label>
      <div class="stamps" role="group" aria-labelledby="brandLbl" id="brands"></div>

      <label for="notesIn">tasting note</label>
      <textarea id="notesIn" maxlength="90" placeholder="the chashu whispered secrets"></textarea>

      <div class="meterbox">
        <label style="margin-bottom:.4rem">slurp-o-meter</label>
        <div class="dial"><svg viewBox="0 0 200 118" aria-hidden="true">
          <path d="M14 104 A 86 86 0 0 1 186 104" fill="none" stroke="#d8c8a6" stroke-width="12" stroke-linecap="round"/>
          <path id="dialFill" d="M14 104 A 86 86 0 0 1 186 104" fill="none" stroke="#c23b2e" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="270" stroke-dashoffset="270"/>
          <g id="needle" transform="rotate(-90 100 104)">
            <line x1="100" y1="104" x2="100" y2="34" stroke="#2c2318" stroke-width="4" stroke-linecap="round"/>
            <circle cx="100" cy="104" r="7" fill="#2c2318"/>
          </g>
          <text x="12" y="116" font-size="10" fill="#8a7a5e" font-family="IBM Plex Mono">meh</text>
          <text x="158" y="116" font-size="10" fill="#8a7a5e" font-family="IBM Plex Mono">divine</text>
        </svg></div>
        <button class="slurpbtn" id="slurpBtn" type="button" aria-label="Hold to slurp — sets the score">ズルズル HOLD TO SLURP</button>
        <div class="meterval"><span id="scoreVal">0.0</span> / 10</div>
        <p class="meterhint">hold = slurp louder = higher score · release to lock</p>
      </div>

      <button class="savebtn" id="saveBtn" type="button">🍜 stamp it into the journal</button>
      <p class="status" id="status" role="status" aria-live="polite"></p>
    </section>

    <section class="page" aria-label="Journal entries">
      <h2>The journal <small><span id="count">0</span> bowls rated</small></h2>
      <div id="entries"></div>
    </section>
  </div>

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var REGIONS=[
    ['sapporo','🍥 SAPPORO · miso'],['hakata','🐖 HAKATA · tonkotsu'],['tokyo','🏮 TOKYO · shoyu'],
    ['kitakata','⛰️ KITAKATA'],['korea','🌶️ KOREA'],['china','🥟 CHINA · lamian'],
    ['thailand','🦐 THAILAND'],['vietnam','🌿 VIETNAM'],['instant','🛒 INSTANT AISLE'],
    ['trident','🔱 TRIDENT NOODLES']
  ];
  var REGION_LABEL={}; REGIONS.forEach(function(r){ REGION_LABEL[r[0]]=r[1]; });
  var SLIDERS=[
    ['rich','assari (light)','kotteri (rich)'],
    ['spice','mild','volcanic'],
    ['salt','whisper','ocean'],
    ['umami','subtle','fifth-taste god']
  ];

  var BRANDS=[
    ['cup','🥤 CUP NOODLES',      {rich:3,spice:2,salt:7,umami:5}, 'instant'],
    ['maruchan','🍜 MARUCHAN',    {rich:3,spice:3,salt:8,umami:4}, 'instant'],
    ['nissin','🐔 NISSIN',        {rich:5,spice:2,salt:6,umami:6}, 'tokyo'],
    ['shin','🔥 SHIN RAMYUN',     {rich:5,spice:8,salt:7,umami:6}, 'korea'],
    ['indomie','🇮🇩 INDOMIE',      {rich:4,spice:5,salt:6,umami:8}, 'instant'],
    ['buldak','🌶️ SAMYANG BULDAK',{rich:4,spice:10,salt:6,umami:5}, 'korea'],
    ['top','⛰️ TOP RAMEN',        {rich:3,spice:2,salt:8,umami:4}, 'instant']
  ];
  var BRAND_LABEL={}; BRANDS.forEach(function(r){ BRAND_LABEL[r[0]]=r[1]; });

  var region=null, brand=null, score=0, slurping=false;

  // ---- stamp press sounds ----
  function sndThunk(){
    var c=ac(); if(!c) return; var t=c.currentTime;
    var o=c.createOscillator(), g=c.createGain();
    o.type='sine'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(70,t+0.08);
    g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+0.12);
  }
  function sndWetSlap(){
    // the Trident special: a slap that has clearly been in the broth
    var c=ac(); if(!c) return; var t=c.currentTime;
    var len=Math.ceil(c.sampleRate*0.22), buf=c.createBuffer(1,len,c.sampleRate), d=buf.getChannelData(0);
    for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.6);
    var src=c.createBufferSource(); src.buffer=buf;
    var bp=c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.setValueAtTime(320,t);
    bp.frequency.exponentialRampToValueAtTime(140,t+0.16); bp.Q.value=1.6;
    var g=c.createGain(); g.gain.setValueAtTime(0.34,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
    src.connect(bp); bp.connect(g); g.connect(c.destination); src.start(t);
    var o=c.createOscillator(), og=c.createGain();
    o.type='sine'; o.frequency.setValueAtTime(240,t); o.frequency.exponentialRampToValueAtTime(52,t+0.13);
    og.gain.setValueAtTime(0.2,t); og.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
    o.connect(og); og.connect(c.destination); o.start(t); o.stop(t+0.18);
    // little secondary droplet
    var o2=c.createOscillator(), og2=c.createGain();
    o2.type='sine'; o2.frequency.setValueAtTime(700,t+0.12); o2.frequency.exponentialRampToValueAtTime(280,t+0.2);
    og2.gain.setValueAtTime(0.0001,t); og2.gain.setValueAtTime(0.07,t+0.12); og2.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
    o2.connect(og2); og2.connect(c.destination); o2.start(t); o2.stop(t+0.24);
  }

  // ---- build region stamps ----
  REGIONS.forEach(function(r){
    var b=document.createElement('button'); b.type='button'; b.className='stamp';
    b.dataset.region=r[0];
    b.textContent=r[1]; b.setAttribute('aria-pressed','false');
    b.addEventListener('click', function(){
      region = region===r[0] ? null : r[0];
      $('stamps').querySelectorAll('.stamp').forEach(function(x){ x.setAttribute('aria-pressed','false'); });
      if(region){ b.setAttribute('aria-pressed','true');
        if(r[0]==='trident') sndWetSlap(); else sndThunk();
      }
    });
    $('stamps').appendChild(b);
  });

  // ---- build brand presets (tap = tag the bowl AND prefill the broth profile) ----
  BRANDS.forEach(function(r){
    var b=document.createElement('button'); b.type='button'; b.className='stamp';
    b.textContent=r[1]; b.setAttribute('aria-pressed','false');
    b.setAttribute('aria-label', r[1].replace(/^\S+\s/,'')+' preset — fills the broth sliders');
    b.addEventListener('click', function(){
      brand = brand===r[0] ? null : r[0];
      $('brands').querySelectorAll('.stamp').forEach(function(x){ x.setAttribute('aria-pressed','false'); });
      if(brand){
        b.setAttribute('aria-pressed','true'); sndThunk();
        // auto-stamp the brand's home region so nobody has to
        region=r[3]||region;
        $('stamps').querySelectorAll('.stamp').forEach(function(x){
          x.setAttribute('aria-pressed', x.dataset.region===region?'true':'false');
        });
        if(region==='trident') sndWetSlap();
        var prof=r[2];
        Object.keys(prof).forEach(function(k){ var el=$('sl-'+k); if(el) el.value=prof[k]; });
        var nameEl=$('bowlName');
        if(nameEl && !nameEl.value.trim()) nameEl.value=r[1].replace(/^\S+\s/,'').toLowerCase().replace(/\b\w/g,function(m){return m.toUpperCase();});
        $('status').textContent='preset applied: '+r[1]+' — tweak the sliders to taste.';
      }
    });
    $('brands').appendChild(b);
  });

  // ---- build broth sliders ----
  SLIDERS.forEach(function(s){
    var row=document.createElement('div'); row.className='srow';
    row.innerHTML='<span class="l">'+s[1]+'</span><input type="range" id="sl-'+s[0]+'" min="0" max="10" value="5" aria-label="'+s[0]+' from '+s[1]+' to '+s[2]+'"><span class="r">'+s[2]+'</span>';
    $('sliders').appendChild(row);
  });
  function sliderVals(){ var o={}; SLIDERS.forEach(function(s){ o[s[0]]=+$('sl-'+s[0]).value; }); return o; }

  // ---- slurp audio (hold = filtered noise slurp with pitch wobble) ----
  var AC=null, slurpNodes=null;
  function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
  function startSlurpSound(){
    var c=ac(); if(!c) return;
    var len=c.sampleRate*2, buf=c.createBuffer(1,len,c.sampleRate), d=buf.getChannelData(0);
    for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
    var src=c.createBufferSource(); src.buffer=buf; src.loop=true;
    var bp=c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=2.2;
    var lfo=c.createOscillator(); lfo.frequency.value=11;
    var lg=c.createGain(); lg.gain.value=420; lfo.connect(lg); lg.connect(bp.frequency);
    var g=c.createGain(); g.gain.value=0.0001;
    g.gain.linearRampToValueAtTime(0.14, c.currentTime+0.08);
    src.connect(bp); bp.connect(g); g.connect(c.destination);
    src.start(); lfo.start();
    slurpNodes={src:src,lfo:lfo,g:g,bp:bp};
  }
  function stopSlurpSound(){
    if(!slurpNodes||!AC) return;
    var n=slurpNodes; slurpNodes=null;
    n.g.gain.setTargetAtTime(0.0001, AC.currentTime, 0.05);
    setTimeout(function(){ try{n.src.stop(); n.lfo.stop();}catch(e){} }, 260);
    // satisfied exhale
    var o=AC.createOscillator(), og=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(400,AC.currentTime); o.frequency.exponentialRampToValueAtTime(180,AC.currentTime+0.35);
    og.gain.setValueAtTime(0.06,AC.currentTime); og.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.4);
    o.connect(og); og.connect(AC.destination); o.start(); o.stop(AC.currentTime+0.45);
  }

  // ---- slurp-o-meter (hold to fill) ----
  var needle=$('needle'), dialFill=$('dialFill'), rafId=null, lastT=0;
  function setDial(v){ // v 0..10
    var ang=-90 + v/10*180;
    needle.setAttribute('transform','rotate('+ang.toFixed(1)+' 100 104)');
    dialFill.setAttribute('stroke-dashoffset', String(270 - v/10*270));
    $('scoreVal').textContent=v.toFixed(1);
  }
  function slurpLoop(t){
    if(!slurping) return;
    var dt=Math.min(0.05,(t-lastT)/1000); lastT=t;
    score=Math.min(10, score + dt*4.2*(0.85+Math.sin(t/90)*0.15));   // ~2.4s to max, with wobble
    if(slurpNodes) slurpNodes.bp.frequency.value=700+score*90;
    setDial(score);
    rafId=requestAnimationFrame(slurpLoop);
  }
  function slurpStart(e){
    e.preventDefault();
    if(slurping) return;
    slurping=true; score=0; lastT=performance.now();
    startSlurpSound();
    rafId=requestAnimationFrame(slurpLoop);
  }
  function slurpEnd(){
    if(!slurping) return;
    slurping=false; cancelAnimationFrame(rafId);
    stopSlurpSound();
    $('status').textContent='score locked: '+score.toFixed(1)+' / 10';
  }
  var sb=$('slurpBtn');
  sb.addEventListener('pointerdown', slurpStart);
  ['pointerup','pointerleave','pointercancel'].forEach(function(ev){ sb.addEventListener(ev, slurpEnd); });
  sb.addEventListener('keydown', function(e){ if((e.key===' '||e.key==='Enter')&&!e.repeat){ slurpStart(e); } });
  sb.addEventListener('keyup', function(e){ if(e.key===' '||e.key==='Enter'){ slurpEnd(); } });
  setDial(0);

  // ---- journal ----
  var entries=[];
  try{ entries=JSON.parse(localStorage.getItem('ramen-rater-v1')||'[]'); }catch(e){}
  function persist(){ try{ localStorage.setItem('ramen-rater-v1', JSON.stringify(entries)); }catch(e){} }
  function esc(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function render(fresh){
    var el=$('entries'); el.innerHTML='';
    $('count').textContent=entries.length;
    if(!entries.length){ el.innerHTML='<p class="empty">no bowls yet. the journal hungers.</p>'; return; }
    entries.slice().reverse().forEach(function(en,ri){
      var d=document.createElement('article'); d.className='entry'+(fresh&&ri===0?' fresh':'');
      d.style.setProperty('--er', ((en.seed%5)-2)*0.7+'deg');
      var bars=Object.keys(en.sliders).map(function(k){
        return '<div class="bar"><span>'+k+'</span><i style="width:'+(en.sliders[k]*10)+'%"></i></div>';
      }).join('');
      d.innerHTML='<span class="rstamp">RATED</span>'+
        '<div class="nm">'+esc(en.name)+'</div>'+
        '<div class="meta">'+esc(REGION_LABEL[en.region]||'🌏 UNSTAMPED')+(en.brand?' · '+esc(BRAND_LABEL[en.brand]||en.brand):'')+' · '+en.date+'</div>'+
        '<div class="bars">'+bars+'</div>'+
        (en.note?'<div class="note">“'+esc(en.note)+'”</div>':'')+
        '<div class="score">'+en.score.toFixed(1)+'<small>/10</small></div>'+
        '<button class="del" type="button" aria-label="Remove this entry">✕</button>';
      d.querySelector('.del').addEventListener('click', function(){
        entries=entries.filter(function(x){ return x!==en; });
        persist(); render(false);
      });
      el.appendChild(d);
    });
  }
  $('saveBtn').addEventListener('click', function(){
    var name=$('bowlName').value.trim();
    if(!name){ $('status').textContent='every bowl deserves a name.'; return; }
    if(score<=0){ $('status').textContent='slurp first. the meter demands it.'; return; }
    entries.push({ name:name.slice(0,40), region:region, brand:brand, sliders:sliderVals(), score:score,
      note:($('notesIn')&&$('notesIn').value||'').slice(0,90),
      date:new Date().toLocaleDateString(undefined,{month:'short',day:'numeric'}), seed:Math.floor(Math.random()*1000) });
    persist(); render(true);
    $('status').textContent='stamped. '+entries.length+' bowls and counting.';
    $('bowlName').value=''; if($('notesIn')) $('notesIn').value=''; score=0; setDial(0);
  });

  render(false);
})();
</script>
</body>
</html>
