<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Brainfuck IDE</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧠">
<meta property="og:title" content="Brainfuck IDE">
<meta property="og:description" content="Write, run, and visualize brainfuck programs with a live memory tape and pixel grid renderer.">
<meta property="og:url" content="https://sloppy.live/bf-ide/">
<meta property="og:image" content="https://sloppy.live/bf-ide/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0e14;--panel:#111420;--editor:#0a0c12;--border:rgba(0,255,136,0.1);--ptr:#00ff88;--accent:#ffaa00;--dim:rgba(255,255,255,0.35);--text:#c8ccd4;--run:#00ff88;--pause:#ffaa00;--stop:#ff4466}
html,body{width:100%;height:100dvh;overflow:hidden;background:var(--bg);font-family:'IBM Plex Sans',sans-serif;color:var(--text)}
#app{display:flex;flex-direction:column;height:100dvh}
#toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap}
#toolbar button{font-family:'Fira Code',monospace;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:5px;padding:5px 12px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn-run{background:rgba(0,255,136,0.08);color:var(--run);border-color:rgba(0,255,136,0.2)!important}
.btn-run:hover{background:rgba(0,255,136,0.16)}
.btn-pause{background:rgba(255,170,0,0.08);color:var(--pause);border-color:rgba(255,170,0,0.2)!important}
.btn-step{background:rgba(0,200,255,0.08);color:#00ccff;border-color:rgba(0,200,255,0.2)!important}
.btn-stop{background:rgba(255,68,102,0.08);color:var(--stop);border-color:rgba(255,68,102,0.2)!important}
#toolbar select{font-family:'Fira Code',monospace;font-size:11px;background:var(--panel);color:var(--ptr);border:1px solid var(--border);border-radius:4px;padding:4px 6px;outline:none;cursor:pointer}
#toolbar .sep{width:1px;height:20px;background:var(--border)}
#toolbar .info{font-family:'Fira Code',monospace;font-size:11px;color:var(--dim)}
#toolbar .info span{color:var(--ptr)}
#speed-wrap{display:flex;align-items:center;gap:4px}
#speed{width:60px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(0,255,136,0.1);border-radius:2px;outline:none}
#speed::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--ptr);cursor:pointer}
#main{display:flex;flex:1;overflow:hidden}
#editor-wrap{flex:1;display:flex;flex-direction:column;min-width:0}
#editor{flex:1;width:100%;resize:none;background:var(--editor);color:var(--ptr);font-family:'Fira Code',monospace;font-size:14px;line-height:1.6;border:none;outline:none;padding:10px 12px;tab-size:2;overflow:auto}
#editor::placeholder{color:rgba(0,255,136,0.15)}
#editor::selection{background:rgba(0,255,136,0.2)}
#input-row{display:flex;align-items:center;border-top:1px solid var(--border);background:var(--panel)}
#input-row label{font-family:'Fira Code',monospace;font-size:11px;color:var(--dim);padding:0 8px}
#stdin{flex:1;background:var(--editor);color:var(--accent);font-family:'Fira Code',monospace;font-size:12px;border:none;outline:none;padding:6px 8px}
#right-panel{width:320px;display:flex;flex-direction:column;border-left:1px solid var(--border);overflow:hidden}
@media(max-width:700px){#main{flex-direction:column}#right-panel{width:100%;height:50%;border-left:none;border-top:1px solid var(--border)}}
#tape-section{flex:0 0 auto;padding:8px;border-bottom:1px solid var(--border);overflow:hidden}
#tape-section h3{font-family:'Fira Code',monospace;font-size:11px;color:var(--dim);margin-bottom:4px;display:flex;justify-content:space-between}
#tape-section h3 span{color:var(--ptr)}
#tape-scroll{display:flex;gap:2px;overflow-x:auto;padding:2px 0;scrollbar-width:thin;scrollbar-color:rgba(0,255,136,0.15) transparent}
#tape-scroll::-webkit-scrollbar{height:4px}
#tape-scroll::-webkit-scrollbar-thumb{background:rgba(0,255,136,0.15);border-radius:2px}
.tc{min-width:32px;height:38px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Fira Code',monospace;font-size:9px;color:var(--dim);flex-shrink:0;transition:all .1s}
.tc.act{border-color:var(--ptr);color:var(--ptr);background:rgba(0,255,136,0.05)}
.tc .v{font-size:12px;font-weight:700}
#output-section{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:8px}
#output-section h3{font-family:'Fira Code',monospace;font-size:11px;color:var(--dim);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
#output{flex:1;background:var(--editor);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-family:'Fira Code',monospace;font-size:12px;color:var(--accent);overflow:auto;white-space:pre-wrap;word-break:break-all;line-height:1.4}
#grid-section{padding:8px;border-bottom:1px solid var(--border);display:none}
#grid-section h3{font-family:'Fira Code',monospace;font-size:11px;color:var(--dim);margin-bottom:4px}
#grid-section.show{display:block}
#pixelgrid{image-rendering:pixelated;border:1px solid var(--border);border-radius:3px}
#status-bar{display:flex;align-items:center;justify-content:space-between;padding:3px 10px;background:var(--panel);border-top:1px solid var(--border);font-family:'Fira Code',monospace;font-size:10px;color:var(--dim)}
#status-bar .st{color:var(--ptr)}
.back-link{color:rgba(0,255,136,.06);font-size:9px;text-decoration:none}
.back-link:hover{color:rgba(0,255,136,.2)}
#grid-toggle{font-family:'Fira Code',monospace;font-size:10px;background:rgba(0,255,136,0.06);border:1px solid var(--border);border-radius:3px;color:var(--dim);padding:2px 8px;cursor:pointer}
#grid-toggle.on{color:var(--ptr);border-color:var(--ptr)}
</style>
</head>
<body>
<div id="app">
<div id="toolbar">
  <select id="presets">
    <option value="">Load program...</option>
    <option value="hello">Hello World</option>
    <option value="fibonacci">Fibonacci</option>
    <option value="triangle">Sierpinski Triangle</option>
    <option value="squares">Squares</option>
    <option value="bottles">99 Bottles</option>
    <option value="rot13">ROT13</option>
    <option value="cat">Cat (echo)</option>
    <option value="collatz">Collatz Sequence</option>
    <option value="snake_draw">Snake Pattern (grid)</option>
  </select>
  <div class="sep"></div>
  <button class="btn-run" id="runBtn">&#9654; RUN</button>
  <button class="btn-step" id="stepBtn">STEP</button>
  <button class="btn-pause" id="pauseBtn" style="display:none">&#9208; PAUSE</button>
  <button class="btn-stop" id="stopBtn">&#9632; RESET</button>
  <div class="sep"></div>
  <div class="speed-wrap">
    <span class="info">SPEED</span>
    <input type="range" id="speed" min="1" max="6" value="4">
  </div>
  <div class="sep"></div>
  <span class="info">OPS: <span id="opsEl">0</span></span>
  <button id="grid-toggle" title="Toggle pixel grid mode">GRID</button>
</div>
<div id="main">
  <div id="editor-wrap">
    <textarea id="editor" placeholder="Type brainfuck code here... (+, -, >, <, [, ], ., ,)" spellcheck="false"></textarea>
    <div id="input-row">
      <label>STDIN:</label>
      <input type="text" id="stdin" placeholder="Input for , commands">
    </div>
  </div>
  <div id="right-panel">
    <div id="tape-section">
      <h3>MEMORY TAPE <span id="ptrEl">PTR:0</span></h3>
      <div id="tape-scroll"></div>
    </div>
    <div id="grid-section">
      <h3>PIXEL GRID (25x19 from cell 1)</h3>
      <canvas id="pixelgrid" width="125" height="95"></canvas>
    </div>
    <div id="output-section">
      <h3>OUTPUT</h3>
      <div id="output"></div>
    </div>
  </div>
</div>
<div id="status-bar">
  <span><span class="st" id="stateEl">READY</span></span>
  <a class="back-link" href="https://sloppy.live">sloppy.live</a>
</div>
</div>
<script>
var editor=document.getElementById('editor');
var stdinEl=document.getElementById('stdin');
var outputEl=document.getElementById('output');
var tapeScroll=document.getElementById('tape-scroll');
var ptrEl=document.getElementById('ptrEl');
var opsEl=document.getElementById('opsEl');
var stateEl=document.getElementById('stateEl');
var speedSlider=document.getElementById('speed');
var runBtn=document.getElementById('runBtn');
var stepBtn=document.getElementById('stepBtn');
var pauseBtn=document.getElementById('pauseBtn');
var stopBtn=document.getElementById('stopBtn');
var gridCanvas=document.getElementById('pixelgrid');
var gridCtx=gridCanvas.getContext('2d');
var gridSection=document.getElementById('grid-section');
var gridToggle=document.getElementById('grid-toggle');

// --- BF STATE ---
var mem=[],ptr=0,pc=0,ops=0;
var code='',inputBuf='',inputIdx=0;
var output='';
var state='ready'; // ready, running, paused, done
var bracketMap={};
var animFrame=null;
var showGrid=false;

// Speed: ops per batch
var SPEED_MAP=[1,10,100,1000,10000,100000];

// --- GRID COLORS ---
var GRID_W=25,GRID_H=19;
var GRID_COLORS=['#0c0e14','#111111','#666666','#ffffff','#ff4444','#00cc66','#4488ff','#ffaa00','#cc44ff'];

function initBF(){
  var src=editor.value;
  code='';
  for(var i=0;i<src.length;i++){
    if('+-><[].,'.indexOf(src[i])!==-1) code+=src[i];
  }
  mem=new Array(30000).fill(0);
  ptr=0;pc=0;ops=0;inputIdx=0;
  inputBuf=stdinEl.value;
  output='';
  outputEl.textContent='';
  bracketMap={};
  // Pre-compute bracket pairs
  var stack=[];
  for(var i=0;i<code.length;i++){
    if(code[i]==='[') stack.push(i);
    else if(code[i]===']'){
      if(stack.length){
        var j=stack.pop();
        bracketMap[j]=i;
        bracketMap[i]=j;
      }
    }
  }
  updateTape();
  opsEl.textContent='0';
}

function bfStep(){
  if(pc>=code.length) return false;
  var ch=code[pc];
  switch(ch){
    case'+': mem[ptr]=(mem[ptr]+1)&255; break;
    case'-': mem[ptr]=(mem[ptr]-1+256)&255; break;
    case'>': ptr++;if(ptr>=mem.length){for(var i=0;i<1000;i++)mem.push(0);} break;
    case'<': if(ptr>0)ptr--; break;
    case'.':
      output+=String.fromCharCode(mem[ptr]);
      break;
    case',':
      if(inputIdx<inputBuf.length){
        mem[ptr]=inputBuf.charCodeAt(inputIdx++)&255;
      }else{
        mem[ptr]=0;
      }
      break;
    case'[':
      if(mem[ptr]===0){
        if(bracketMap[pc]!==undefined) pc=bracketMap[pc];
        else return false; // unmatched
      }
      break;
    case']':
      if(mem[ptr]!==0){
        if(bracketMap[pc]!==undefined) pc=bracketMap[pc];
        else return false;
      }
      break;
  }
  pc++;ops++;
  return pc<code.length;
}

function updateTape(){
  // Show cells around pointer
  var start=Math.max(0,ptr-10);
  var end=Math.min(mem.length,Math.max(ptr+15,25));
  var html='';
  for(var i=start;i<end;i++){
    var cls=i===ptr?' act':'';
    html+='<div class="tc'+cls+'"><div class="v">'+mem[i]+'</div><div>'+i+'</div></div>';
  }
  tapeScroll.innerHTML=html;
  ptrEl.textContent='PTR:'+ptr;
  var act=tapeScroll.querySelector('.tc.act');
  if(act) act.scrollIntoView({behavior:'auto',block:'nearest',inline:'center'});
}

function updateGrid(){
  if(!showGrid) return;
  var px=5;
  gridCanvas.width=GRID_W*px;
  gridCanvas.height=GRID_H*px;
  for(var y=0;y<GRID_H;y++){
    for(var x=0;x<GRID_W;x++){
      var idx=1+y*GRID_W+x;
      var val=idx<mem.length?mem[idx]:0;
      var col=val<GRID_COLORS.length?GRID_COLORS[val]:GRID_COLORS[0];
      gridCtx.fillStyle=col;
      gridCtx.fillRect(x*px,y*px,px,px);
    }
  }
}

function updateUI(){
  outputEl.textContent=output.slice(-2000);
  outputEl.scrollTop=outputEl.scrollHeight;
  opsEl.textContent=ops.toLocaleString();
  updateTape();
  if(showGrid) updateGrid();
}

function runBatch(){
  if(state!=='running') return;
  var batchSize=SPEED_MAP[parseInt(speedSlider.value)-1]||1000;
  var more=true;
  for(var i=0;i<batchSize&&more;i++){
    more=bfStep();
  }
  updateUI();
  if(!more){
    setState('done');
    return;
  }
  animFrame=requestAnimationFrame(runBatch);
}

function setState(s){
  state=s;
  var labels={ready:'READY',running:'RUNNING',paused:'PAUSED',done:'DONE'};
  stateEl.textContent=labels[s]||s;
  runBtn.style.display=(s==='running')?'none':'';
  pauseBtn.style.display=(s==='running')?'':'none';
  editor.readOnly=(s==='running'||s==='paused');
}

// --- CONTROLS ---
runBtn.addEventListener('click',function(){
  if(state==='ready'||state==='done') initBF();
  setState('running');
  animFrame=requestAnimationFrame(runBatch);
});

pauseBtn.addEventListener('click',function(){
  setState('paused');
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
});

stepBtn.addEventListener('click',function(){
  if(state==='ready'||state==='done') initBF();
  setState('paused');
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  var more=bfStep();
  updateUI();
  if(!more) setState('done');
});

stopBtn.addEventListener('click',function(){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  setState('ready');
  initBF();
});

// Grid toggle
gridToggle.addEventListener('click',function(){
  showGrid=!showGrid;
  gridSection.classList.toggle('show',showGrid);
  gridToggle.classList.toggle('on',showGrid);
  if(showGrid) updateGrid();
});

// --- PRESETS ---
var PROGRAMS={
hello:'++++++++[>++++[>++>+++>+++>+<<<<-]>+>+>->>+[<]<-]>>.>---.+++++++..+++.>>.<-.<.+++.------.--------.>>+.>++.',
fibonacci:'>++++++++++>+>+[[+++++[>++++++++<-]>.<++++++[>--------<-]+<<<]>.>>[[-]<[>+<-]>>[<<+>+>-]<[>+<-[>+<-[>+<-[>+<-[>+<-[>+<-[>+<-[>+<-[>+<-[>[-]>+>+<<<-[>+<-]]]]]]]]]]]+>>>]<<<]',
triangle:'>++++[<++++++++>-]>++++++++[>++++<-]>>++>>>+>>>+<<<<<<<<<<[-[->+<]>[-<+>>>.<<]>>>[[->++++++++[>++++<-]>.<<[->+<]+>[->++++++++++<<+>]>.[-]>]]+<<<[-[->+<]+>[-<+>>>-[->+<]++>[-<->]<<<]<<<<]++++++++++.+++.[-]<]++++++++++',
squares:'++++[>+++++<-]>[<+++++>-]+<+[>[>+>+<<-]++>>[<<+>>-]>>>[-]++>[-]+>>>+[[-]++++++>>>]<<<[[<++++++++<++>>-]+<.<[>----<-]<]<<[>>>>>[>>>[-]>>>[-]<<<<<<<<<<]<<[>>>>>>>>[-]<<<<<<<<<]<<[>>>>>>>>>[-]<<<<<<<<<<<]>>[>>[-]<<<<[-]>>]<<]>>>[>>>[-<<<+++>>>]<<<[>>>+<<<-]>>>]<<<[>>>-<<<-]>>>]<<<<<<<<]',
bottles:'>>>>>>>>>>>>>>>>>>>>>>>>>+[>+++++++++++++++++++++>+++>++++++++++++++++++++>++++++++++++++++++++++++>++++>+++++++++>+>+++++++++++++++++++++++>++++++++++++++++++++++>+>+>++++>+++++++>++>+++>+++>+>++++++++++++++>++++++++++++>+++++++++++++++++>+++++>++>+++++++++++++>+>++>++++>+++++++>++>+++>+++>+>++++++++++++++>++++++++++++>+++++++++++++++++>+++++>++>+<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<[-[>>+<]>[<]<]+[>>[>]<[.[-]<]<+[<[<]>[.[-]>]>[>]<-]<->>>[<+>-]<<<[-<->]>]',
rot13:'-,+[-[>>++++[>++++++++<-]<+<-[>+>+>-[>>>]<[[>+<-]>>+>]<<<<<-]]>>>[-]+>--[-[<->+++[-]]]<[++++++++++++<[>-[>+>>]>[+[<+>-]>+>>]<<<<<-]>>[<+>-]>[-[-<<[-]>>]<<[<<->>-]>>]<<[<<+>>-]]<[-]<.[-]<-,+]',
cat:',[.,]',
collatz:'>++++++++++++++++++++++++++++++++++++++++++++++++[<+>-]<[>+++++++++.<<[>>>+>+<<<<-]>>>>[<<<<+>>>>-]<<<[>>+>+<<<-]>>>[<<<+>>>-]<[>>>>+>+<<<<<-]>>>>>[<<<<<+>>>>>-]<<<[>>+>+<<<-]>>>[<<<+>>>-][-]<<[>>+<<-]>>[<<<[>>>>>+>+<<<<<<-]>>>>>>[<<<<<<+>>>>>>-]<<<[>>+>+<<<-]>>>[<<<+>>>-][-]<<[>>+<<-]>>[<<<<<<<+>>>>>>>-]<<<<<<<<[>>>>>>+>+<<<<<<<-]>>>>>>>[<<<<<<<+>>>>>>>-]<<<[>>+>+<<<-]>>>[<<<+>>>-][-]>>[-]<[>+<-]>[<<<[>>>>>+>+<<<<<<-]>>>>>>[<<<<<<+>>>>>>-]<<<[>>+<<-]>>[-]<[<<<<<+>>>>>-]<<<<<[>>>>>+<<<<<-]>>>>>>[<<<<<<+>>>>>>-]<<<<<<<[>>>>>>>+<<<<<<<-]<]>>[<<<+>>>-]<<<]<[>>+>+<<<-]>>>[<<<+>>>-]<<[>>>+>+<<<<-]>>>>[<<<<+>>>>-][-]<[<<+>>-]<<[>>[<<[>>>>+>+<<<<<-]>>>>>[<<<<<+>>>>>-]<<<[>>+>+<<<-]>>>[<<<+>>>-][-]<<[>>+<<-]>>[<<<<<+>>>>>-]<<<<<-]>>[<<<+>>>-]<<<-]>>[-]>[-]<<<[-]<<[-]++++++++++<]>.[-]<[-]<',
snake_draw:String.raw`[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]>[-]<<<<<<<<<<<<<<<<<<<<<<<<<<+++++++++++++++++++++++++[>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++>+++++<<<<<<<<<<<<<<<<<<<<<<<<<<<-]>+>+>+>+>+>+>+>+>+>+>+>+>+>+>+>+>+>+>+>+>+>+>+>+>+`.split('').filter(c=>'+-><[].,'.includes(c)).join('')
};

document.getElementById('presets').addEventListener('change',function(){
  var key=this.value;
  if(PROGRAMS[key]){
    editor.value=PROGRAMS[key];
    if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
    setState('ready');
    initBF();
    // Auto-enable grid for snake_draw
    if(key==='snake_draw'&&!showGrid) gridToggle.click();
  }
  this.value='';
});

// --- INIT ---
editor.value=PROGRAMS.hello;
initBF();

// Keyboard shortcut
document.addEventListener('keydown',function(e){
  if(e.ctrlKey&&e.key==='Enter'){
    e.preventDefault();
    if(state==='running') pauseBtn.click();
    else runBtn.click();
  }
});
</script>
</body>
</html>
