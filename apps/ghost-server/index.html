<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Server Room</title>
<link rel="icon" href="https://emojicdn.elk.sh/👻">
<meta property="og:title" content="Ghost Server Room">
<meta property="og:description" content="Manage a haunted server room. Fix bugs, spawn demons, keep the uptime alive.">
<meta property="og:url" content="https://sloppy.live/ghost-server">
<meta property="og:image" content="https://sloppy.live/ghost-server/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--ghost:#88eeff;--demon:#ff4466;--bug:#44ff88;--warn:#ffaa22;--bg:#08080f;--panel:#0c0c18;--border:#1a1a2e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#c0c8e0;font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden}
.container{max-width:860px;margin:0 auto;padding:12px 14px 50px}
header{text-align:center;padding:16px 0 12px}
header h1{font-family:'Creepster',sans-serif;font-size:clamp(24px,5vw,40px);color:var(--ghost);text-shadow:0 0 15px rgba(136,238,255,0.3);letter-spacing:2px}
header .sub{font-size:12px;color:rgba(255,68,102,0.5);margin-top:2px}

/* Status bar */
.status-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;margin-bottom:10px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 10px;text-align:center}
.stat .label{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:0.4;margin-bottom:2px}
.stat .val{font-size:20px;font-weight:700}
.stat .val.green{color:var(--bug)}
.stat .val.red{color:var(--demon)}
.stat .val.cyan{color:var(--ghost)}
.stat .val.amber{color:var(--warn)}

/* Uptime bar */
.uptime-wrap{margin-bottom:10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.uptime-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;opacity:0.5}
.uptime-bar{height:10px;background:#111;border-radius:5px;overflow:hidden}
.uptime-fill{height:100%;border-radius:5px;transition:width .3s,background .3s}

/* Server room canvas */
#room{width:100%;height:260px;border:1px solid var(--border);border-radius:6px;background:#060610;display:block;margin-bottom:10px;cursor:pointer}

/* Panels */
.panels{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
@media(max-width:550px){.panels{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px}
.panel h3{font-family:'Creepster',sans-serif;font-size:14px;letter-spacing:1px;margin-bottom:8px;opacity:0.6}
.panel h3.ghost-h{color:var(--ghost)}.panel h3.demon-h{color:var(--demon)}
.entity-list{max-height:120px;overflow-y:auto;font-size:12px;line-height:1.8}
.entity{display:flex;justify-content:space-between;align-items:center;padding:2px 4px;border-bottom:1px solid rgba(26,26,46,0.5)}
.entity .name{opacity:0.7}
.entity button{font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 8px;border-radius:3px;cursor:pointer;border:1px solid;background:none;transition:all .15s}
.fix-btn{color:var(--bug);border-color:var(--bug)}
.fix-btn:hover{background:rgba(68,255,136,0.1)}
.banish-btn{color:var(--demon);border-color:var(--demon)}
.banish-btn:hover{background:rgba(255,68,102,0.1)}

/* Bug queue */
.bug-queue{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:10px}
.bug-queue h3{font-family:'Creepster',sans-serif;font-size:14px;color:var(--bug);letter-spacing:1px;margin-bottom:8px;opacity:0.6}
.bug-list{display:flex;flex-wrap:wrap;gap:6px}
.bug-card{background:rgba(68,255,136,0.05);border:1px solid rgba(68,255,136,0.2);border-radius:4px;padding:6px 10px;font-size:11px;cursor:pointer;transition:all .15s;position:relative}
.bug-card:hover{background:rgba(68,255,136,0.1);border-color:var(--bug)}
.bug-card .sev{position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%}
.bug-card .sev.crit{background:var(--demon)}.bug-card .sev.high{background:var(--warn)}.bug-card .sev.med{background:var(--bug)}

/* Upgrades */
.upgrades{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:10px}
.upgrades h3{font-family:'Creepster',sans-serif;font-size:14px;color:var(--warn);letter-spacing:1px;margin-bottom:8px;opacity:0.6}
.upgrade-grid{display:flex;flex-wrap:wrap;gap:6px}
.upg-btn{font-family:'Share Tech Mono',monospace;font-size:11px;padding:6px 12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:rgba(255,170,34,0.04);color:var(--warn);transition:all .15s}
.upg-btn:hover:not(:disabled){background:rgba(255,170,34,0.1);border-color:var(--warn)}
.upg-btn:disabled{opacity:0.25;cursor:not-allowed}
.upg-btn .cost{opacity:0.5;font-size:10px}

/* Log */
.event-log{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px;max-height:100px;overflow-y:auto}
.event-log .entry{font-size:11px;padding:1px 0;border-bottom:1px solid rgba(26,26,46,0.3);line-height:1.6}
.entry.ghost-e{color:var(--ghost)}.entry.demon-e{color:var(--demon)}.entry.bug-e{color:var(--bug)}.entry.warn-e{color:var(--warn)}

.backlink{text-align:center;margin-top:14px;font-size:10px;opacity:0.15}
.backlink a{color:var(--ghost);text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Ghost Server Room</h1>
    <div class="sub">every bug you fix spawns something worse</div>
  </header>
  <div class="status-bar">
    <div class="stat"><div class="label">Bugs</div><div class="val green" id="s-bugs">0</div></div>
    <div class="stat"><div class="label">Ghosts</div><div class="val cyan" id="s-ghosts">0</div></div>
    <div class="stat"><div class="label">Demons</div><div class="val red" id="s-demons">0</div></div>
    <div class="stat"><div class="label">Fixes</div><div class="val" id="s-fixes">0</div></div>
    <div class="stat"><div class="label">Souls</div><div class="val amber" id="s-souls">0</div></div>
    <div class="stat"><div class="label">Servers</div><div class="val" id="s-servers">3</div></div>
  </div>
  <div class="uptime-wrap">
    <div class="uptime-label"><span>SERVER UPTIME</span><span id="uptime-pct">100%</span></div>
    <div class="uptime-bar"><div class="uptime-fill" id="uptime-fill" style="width:100%;background:var(--bug)"></div></div>
  </div>
  <canvas id="room" height="260"></canvas>
  <div class="bug-queue">
    <h3>Bug Queue</h3>
    <div class="bug-list" id="bug-list"></div>
  </div>
  <div class="panels">
    <div class="panel"><h3 class="ghost-h">Ghosts in the Machine</h3><div class="entity-list" id="ghost-list"></div></div>
    <div class="panel"><h3 class="demon-h">Demons Spawned</h3><div class="entity-list" id="demon-list"></div></div>
  </div>
  <div class="upgrades">
    <h3>Upgrades</h3>
    <div class="upgrade-grid" id="upgrade-grid"></div>
  </div>
  <div class="event-log" id="log"></div>
</div>
<div class="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const roomCanvas = document.getElementById('room');
const rCtx = roomCanvas.getContext('2d');
let RW, RH;
function resizeRoom() {
  const rect = roomCanvas.getBoundingClientRect();
  RW = roomCanvas.width = rect.width;
  RH = roomCanvas.height = 260;
}
resizeRoom();
addEventListener('resize', resizeRoom);

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function sfx(f,d,t,v){if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'square';o.frequency.setValueAtTime(f,audioCtx.currentTime);g.gain.setValueAtTime(v||0.03,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}

// State
let bugs = [];
let ghosts = [];
let demons = [];
let souls = 0;
let totalFixes = 0;
let servers = 3;
let uptime = 100;
let frame = 0;
let autoFixRate = 0;
let demonResist = 0;
let soulMulti = 1;
let serverShield = 0;

// Bug names
const BUG_PREFIXES = ['Null','Seg','Stack','Heap','Race','Dead','Mem','Type','Off-by','Infinite'];
const BUG_SUFFIXES = ['Fault','Overflow','Leak','Lock','Panic','Error','Exception','Corruption','Loop','Void'];
const BUG_SEVS = ['med','high','crit'];

// Ghost names
const GHOST_NAMES = ['Phantom Process','Zombie Thread','Spectral Socket','Poltergeist PID','Wraith Worker','Shadow Service','Haunted Handler','Cursed Cron','Ethereal Event','Banshee Buffer'];

// Demon names
const DEMON_NAMES = ['Null Lord','Seg Fiend','Stack Devourer','Heap Destroyer','Race Demon','Deadlock Devil','Memory Eater','Type Corruptor','Infinite Imp','Void Walker','Crash Titan','Kernel Beast'];
const DEMON_TITLES = ['the Unpatched','the Recursive','of the Blue Screen','the Undocumented','from Legacy Code','the Deprecated','of Production','the Untested'];

function randFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function spawnBug() {
  const name = randFrom(BUG_PREFIXES) + ' ' + randFrom(BUG_SUFFIXES);
  const sev = BUG_SEVS[Math.floor(Math.random() * Math.min(3, 1 + demons.length * 0.3))];
  const dmg = sev === 'crit' ? 3 : sev === 'high' ? 1.5 : 0.5;
  bugs.push({ name, sev, dmg, age: 0, id: Math.random() });
}

function spawnGhost() {
  const name = randFrom(GHOST_NAMES);
  ghosts.push({
    name, x: Math.random() * RW, y: 30 + Math.random() * (RH - 60),
    vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 0.8,
    alpha: 0.6 + Math.random() * 0.3, size: 12 + Math.random() * 8,
    phase: Math.random() * Math.PI * 2, id: Math.random()
  });
}

function spawnDemon() {
  const name = randFrom(DEMON_NAMES) + ' ' + randFrom(DEMON_TITLES);
  const power = 1 + Math.floor(totalFixes / 10);
  demons.push({
    name, power, hp: 3 + power * 2, maxHp: 3 + power * 2,
    x: Math.random() * RW, y: 30 + Math.random() * (RH - 60),
    vx: (Math.random() - 0.5) * 0.8, vy: (Math.random() - 0.5) * 0.5,
    phase: Math.random() * Math.PI * 2, flash: 0, id: Math.random()
  });
  addLog('DEMON SPAWNED: ' + name + ' (power ' + power + ')', 'demon-e');
  sfx(120, 0.3, 'sawtooth', 0.06);
}

function fixBug(idx) {
  if (idx >= bugs.length) return;
  const bug = bugs.splice(idx, 1)[0];
  totalFixes++;
  const soulGain = Math.ceil((bug.sev === 'crit' ? 5 : bug.sev === 'high' ? 3 : 1) * soulMulti);
  souls += soulGain;
  addLog('FIXED: ' + bug.name + ' (+' + soulGain + ' souls)', 'bug-e');
  sfx(500, 0.08, 'sine', 0.04);

  // Spawn ghost
  if (Math.random() < 0.6) {
    spawnGhost();
    addLog('A ghost materialized from the fix...', 'ghost-e');
    sfx(800, 0.15, 'sine', 0.03);
  }

  // Spawn demon (chance increases with fixes)
  const demonChance = 0.3 + totalFixes * 0.01;
  if (Math.random() < demonChance - demonResist * 0.05) {
    spawnDemon();
  }

  // Crit bugs can spawn 2 demons
  if (bug.sev === 'crit' && Math.random() < 0.4) {
    spawnDemon();
    addLog('CRITICAL FIX TORE OPEN A SECOND RIFT!', 'demon-e');
  }

  renderBugs();
  renderEntities();
  updateStats();
}

function banishDemon(idx) {
  if (idx >= demons.length) return;
  const d = demons[idx];
  const cost = d.power * 3;
  if (souls < cost) { addLog('Need ' + cost + ' souls to banish ' + d.name, 'warn-e'); return; }
  souls -= cost;
  d.hp -= 3 + Math.floor(souls * 0.01);
  d.flash = 6;
  sfx(300, 0.1, 'sawtooth', 0.05);
  if (d.hp <= 0) {
    const bonus = d.power * 2;
    souls += bonus;
    addLog('BANISHED: ' + d.name + ' (+' + bonus + ' souls)', 'demon-e');
    demons.splice(idx, 1);
    sfx(600, 0.12, 'sine', 0.05);
    sfx(800, 0.1, 'sine', 0.04);
  } else {
    addLog('Weakened ' + d.name + ' (' + d.hp + '/' + d.maxHp + ' HP)', 'demon-e');
  }
  renderEntities();
  updateStats();
}

// Upgrades
const UPGRADES = [
  { id: 'autofix', name: 'Auto-Patcher', desc: '+1 auto fix/10s', cost: 15, scaling: 1.8, lv: 0, apply() { autoFixRate++; } },
  { id: 'ward', name: 'Demon Ward', desc: 'Reduce demon spawn chance', cost: 25, scaling: 2, lv: 0, apply() { demonResist++; } },
  { id: 'siphon', name: 'Soul Siphon', desc: '+50% soul gain', cost: 40, scaling: 2.2, lv: 0, apply() { soulMulti += 0.5; } },
  { id: 'server', name: 'New Server', desc: '+1 server rack', cost: 60, scaling: 2.5, lv: 0, apply() { servers++; } },
  { id: 'shield', name: 'Server Shield', desc: 'Reduce uptime drain', cost: 30, scaling: 1.9, lv: 0, apply() { serverShield++; } },
  { id: 'exorcism', name: 'Mass Exorcism', desc: 'Banish all ghosts', cost: 20, scaling: 1.6, lv: 0, apply() { const count = ghosts.length; ghosts = []; addLog('Exorcised ' + count + ' ghosts!', 'ghost-e'); } }
];

function getCost(u) { return Math.floor(u.cost * Math.pow(u.scaling, u.lv)); }

function buyUpgrade(idx) {
  const u = UPGRADES[idx];
  const cost = getCost(u);
  if (souls < cost) return;
  souls -= cost;
  u.lv++;
  u.apply();
  sfx(600, 0.08, 'sine', 0.04);
  renderUpgrades();
  updateStats();
}

function renderUpgrades() {
  const grid = document.getElementById('upgrade-grid');
  grid.innerHTML = '';
  UPGRADES.forEach((u, i) => {
    const cost = getCost(u);
    const btn = document.createElement('button');
    btn.className = 'upg-btn';
    btn.disabled = souls < cost;
    btn.innerHTML = u.name + ' <span class="cost">(' + cost + '&#x1F480;)</span>';
    btn.title = u.desc + ' [Lv.' + u.lv + ']';
    btn.onclick = () => buyUpgrade(i);
    grid.appendChild(btn);
  });
}

function renderBugs() {
  const list = document.getElementById('bug-list');
  list.innerHTML = '';
  bugs.forEach((b, i) => {
    const card = document.createElement('div');
    card.className = 'bug-card';
    card.innerHTML = b.name + '<div class="sev ' + b.sev + '"></div>';
    card.title = b.sev.toUpperCase() + ' — click to fix';
    card.onclick = () => fixBug(i);
    list.appendChild(card);
  });
}

function renderEntities() {
  // Ghosts
  const gl = document.getElementById('ghost-list');
  gl.innerHTML = '';
  ghosts.slice(0, 20).forEach((g, i) => {
    const row = document.createElement('div');
    row.className = 'entity';
    row.innerHTML = '<span class="name">' + g.name + '</span>';
    gl.appendChild(row);
  });
  if (ghosts.length > 20) gl.innerHTML += '<div style="opacity:0.3;font-size:11px">...and ' + (ghosts.length - 20) + ' more</div>';

  // Demons
  const dl = document.getElementById('demon-list');
  dl.innerHTML = '';
  demons.forEach((d, i) => {
    const row = document.createElement('div');
    row.className = 'entity';
    row.innerHTML = '<span class="name">' + d.name + ' <span style="opacity:0.4">[' + d.hp + '/' + d.maxHp + ']</span></span><button class="banish-btn" onclick="banishDemon(' + i + ')">BANISH (' + (d.power * 3) + '&#x1F480;)</button>';
    dl.appendChild(row);
  });
}

function updateStats() {
  document.getElementById('s-bugs').textContent = bugs.length;
  document.getElementById('s-ghosts').textContent = ghosts.length;
  document.getElementById('s-demons').textContent = demons.length;
  document.getElementById('s-fixes').textContent = totalFixes;
  document.getElementById('s-souls').textContent = souls;
  document.getElementById('s-servers').textContent = servers;
  document.getElementById('uptime-pct').textContent = Math.max(0, uptime).toFixed(1) + '%';
  const fill = document.getElementById('uptime-fill');
  fill.style.width = Math.max(0, uptime) + '%';
  fill.style.background = uptime > 60 ? 'var(--bug)' : uptime > 30 ? 'var(--warn)' : 'var(--demon)';
  // Update upgrade buttons
  UPGRADES.forEach((u, i) => {
    const btns = document.querySelectorAll('.upg-btn');
    if (btns[i]) btns[i].disabled = souls < getCost(u);
  });
}

function addLog(text, cls) {
  const log = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'entry ' + (cls || '');
  entry.textContent = text;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
  while (log.children.length > 60) log.children[0].remove();
}

// Game tick (every 2s)
function gameTick() {
  // Spawn bugs
  const bugRate = 1 + Math.floor(demons.length * 0.5) + Math.floor(ghosts.length * 0.2);
  for (let i = 0; i < bugRate; i++) {
    if (bugs.length < 30 + servers * 5) spawnBug();
  }

  // Bug aging — old bugs damage uptime more
  bugs.forEach(b => { b.age++; });

  // Uptime drain
  let drain = bugs.length * 0.15 + demons.length * 0.8 + ghosts.length * 0.05;
  drain = Math.max(0, drain - serverShield * 0.3 - servers * 0.1);
  uptime -= drain;

  // Uptime recovery from servers
  uptime += servers * 0.3;
  uptime = Math.min(100, Math.max(0, uptime));

  // Demons attack servers
  demons.forEach(d => {
    if (Math.random() < 0.15 * d.power) {
      uptime -= d.power * 0.5;
      if (Math.random() < 0.02 * d.power && servers > 1) {
        servers--;
        addLog('DEMON DESTROYED A SERVER! (' + servers + ' remaining)', 'demon-e');
        sfx(80, 0.4, 'sawtooth', 0.08);
      }
    }
  });

  // Ghosts randomly spawn bugs
  ghosts.forEach(g => {
    if (Math.random() < 0.1 && bugs.length < 40) {
      spawnBug();
    }
  });

  // Auto-fix
  for (let i = 0; i < autoFixRate && bugs.length > 0; i++) {
    fixBug(0);
  }

  // Game over check
  if (uptime <= 0) {
    addLog('=== TOTAL SYSTEM FAILURE === Fixes: ' + totalFixes + ' | Demons: ' + demons.length, 'demon-e');
    uptime = 0;
    // Reset partially — roguelike spirit
    setTimeout(() => {
      uptime = 50;
      bugs = bugs.slice(0, 3);
      addLog('Emergency reboot... systems partially restored', 'warn-e');
      updateStats();
    }, 3000);
  }

  renderBugs();
  renderEntities();
  renderUpgrades();
  updateStats();
}

// Room visualization
const roomParticles = [];
function drawRoom() {
  frame++;
  rCtx.fillStyle = '#060610';
  rCtx.fillRect(0, 0, RW, RH);

  // Server racks
  const rackW = 30, rackH = RH - 40, rackGap = Math.min(60, (RW - 40) / Math.max(1, servers));
  const startX = (RW - (servers * rackGap)) / 2;
  for (let i = 0; i < servers; i++) {
    const rx = startX + i * rackGap;
    const ry = 20;
    // Rack body
    rCtx.fillStyle = '#181828';
    rCtx.fillRect(rx, ry, rackW, rackH);
    rCtx.strokeStyle = '#2a2a44';
    rCtx.lineWidth = 1;
    rCtx.strokeRect(rx, ry, rackW, rackH);
    // Blinking lights
    for (let j = 0; j < 8; j++) {
      const ly = ry + 10 + j * (rackH / 9);
      const on = Math.sin(frame * 0.05 + i * 2 + j * 3) > 0;
      rCtx.fillStyle = on ? (uptime > 30 ? '#44ff88' : '#ff4466') : '#111';
      rCtx.fillRect(rx + 4, ly, 4, 3);
      rCtx.fillStyle = Math.sin(frame * 0.07 + j) > 0.3 ? '#4488ff' : '#111';
      rCtx.fillRect(rx + 10, ly, 4, 3);
    }
  }

  // Draw ghosts
  ghosts.forEach(g => {
    g.x += g.vx + Math.sin(g.phase) * 0.3;
    g.y += g.vy + Math.cos(g.phase) * 0.2;
    g.phase += 0.03;
    // Bounce
    if (g.x < 0 || g.x > RW) g.vx *= -1;
    if (g.y < 10 || g.y > RH - 10) g.vy *= -1;
    g.x = Math.max(0, Math.min(RW, g.x));
    g.y = Math.max(10, Math.min(RH - 10, g.y));

    const wobble = Math.sin(g.phase * 2) * 2;
    rCtx.save();
    rCtx.globalAlpha = g.alpha * (0.5 + Math.sin(frame * 0.03 + g.phase) * 0.2);
    rCtx.fillStyle = '#88eeff';
    rCtx.shadowColor = '#88eeff';
    rCtx.shadowBlur = 8;
    // Ghost body
    rCtx.beginPath();
    rCtx.arc(g.x, g.y - g.size * 0.2, g.size * 0.5, Math.PI, 0);
    rCtx.lineTo(g.x + g.size * 0.5, g.y + g.size * 0.3);
    for (let w = g.size * 0.5; w >= -g.size * 0.5; w -= g.size * 0.25) {
      rCtx.lineTo(g.x + w, g.y + g.size * 0.3 + Math.sin(w * 0.5 + g.phase * 3) * 3 + wobble);
    }
    rCtx.closePath();
    rCtx.fill();
    rCtx.shadowBlur = 0;
    // Eyes
    rCtx.fillStyle = '#000';
    rCtx.fillRect(g.x - 3, g.y - g.size * 0.25, 2, 2);
    rCtx.fillRect(g.x + 2, g.y - g.size * 0.25, 2, 2);
    rCtx.restore();
  });

  // Draw demons
  demons.forEach(d => {
    d.x += d.vx + Math.sin(d.phase) * 0.5;
    d.y += d.vy + Math.cos(d.phase * 0.7) * 0.3;
    d.phase += 0.04;
    if (d.x < 0 || d.x > RW) d.vx *= -1;
    if (d.y < 20 || d.y > RH - 20) d.vy *= -1;
    d.x = Math.max(0, Math.min(RW, d.x));
    d.y = Math.max(20, Math.min(RH - 20, d.y));
    if (d.flash > 0) d.flash--;

    const size = 14 + d.power * 2;
    rCtx.save();
    rCtx.fillStyle = d.flash > 0 ? '#fff' : '#ff4466';
    rCtx.shadowColor = '#ff4466';
    rCtx.shadowBlur = 12;
    // Demon body — angular
    rCtx.beginPath();
    rCtx.moveTo(d.x, d.y - size);
    rCtx.lineTo(d.x + size * 0.7, d.y - size * 0.3);
    rCtx.lineTo(d.x + size * 0.5, d.y + size * 0.5);
    rCtx.lineTo(d.x - size * 0.5, d.y + size * 0.5);
    rCtx.lineTo(d.x - size * 0.7, d.y - size * 0.3);
    rCtx.closePath();
    rCtx.fill();
    rCtx.shadowBlur = 0;
    // Horns
    rCtx.strokeStyle = '#cc2244';
    rCtx.lineWidth = 2;
    rCtx.beginPath();
    rCtx.moveTo(d.x - size * 0.3, d.y - size * 0.6);
    rCtx.lineTo(d.x - size * 0.5, d.y - size * 1.1);
    rCtx.moveTo(d.x + size * 0.3, d.y - size * 0.6);
    rCtx.lineTo(d.x + size * 0.5, d.y - size * 1.1);
    rCtx.stroke();
    // Eyes
    rCtx.fillStyle = '#ffaa00';
    rCtx.fillRect(d.x - 4, d.y - size * 0.2, 3, 3);
    rCtx.fillRect(d.x + 2, d.y - size * 0.2, 3, 3);
    rCtx.restore();

    // Fire particles from demons
    if (frame % 3 === 0) {
      roomParticles.push({
        x: d.x + (Math.random() - 0.5) * size,
        y: d.y + size * 0.5,
        vx: (Math.random() - 0.5) * 1,
        vy: 0.5 + Math.random(),
        life: 10 + Math.random() * 10,
        maxLife: 20,
        color: Math.random() > 0.5 ? '#ff4466' : '#ff8822'
      });
    }
  });

  // Room particles
  for (let i = roomParticles.length - 1; i >= 0; i--) {
    const p = roomParticles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    rCtx.globalAlpha = p.life / p.maxLife;
    rCtx.fillStyle = p.color;
    rCtx.fillRect(p.x - 1, p.y - 1, 2, 2);
    if (p.life <= 0) roomParticles.splice(i, 1);
  }
  rCtx.globalAlpha = 1;

  // Bug static noise
  if (bugs.length > 5) {
    const intensity = Math.min(40, bugs.length);
    for (let i = 0; i < intensity; i++) {
      rCtx.fillStyle = `rgba(68,255,136,${0.03 + Math.random() * 0.05})`;
      rCtx.fillRect(Math.random() * RW, Math.random() * RH, 2, 1);
    }
  }

  requestAnimationFrame(drawRoom);
}

// Click on room to swat ghosts
roomCanvas.addEventListener('click', e => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const rect = roomCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // Check ghost clicks
  for (let i = ghosts.length - 1; i >= 0; i--) {
    const g = ghosts[i];
    if (Math.hypot(mx - g.x, my - g.y) < g.size) {
      ghosts.splice(i, 1);
      souls += Math.ceil(1 * soulMulti);
      sfx(700, 0.06, 'sine', 0.03);
      for (let j = 0; j < 6; j++) {
        roomParticles.push({
          x: g.x, y: g.y,
          vx: (Math.random() - 0.5) * 3,
          vy: (Math.random() - 0.5) * 3,
          life: 15, maxLife: 15, color: '#88eeff'
        });
      }
      renderEntities();
      updateStats();
      return;
    }
  }
});

// Init
for (let i = 0; i < 3; i++) spawnBug();
for (let i = 0; i < 2; i++) spawnGhost();
renderBugs();
renderEntities();
renderUpgrades();
updateStats();
addLog('Server room online. Ghosts detected in the mainframe.', 'ghost-e');
addLog('Fix bugs to earn souls. But beware what follows...', 'warn-e');
drawRoom();
setInterval(gameTick, 2000);
</script>
</body>
