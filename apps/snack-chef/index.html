<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Snack Chef</title>
<meta name="description" content="Pick what's in your fridge. Get three meal ideas you can actually cook tonight.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%8A">
<meta property="og:title" content="Snack Chef">
<meta property="og:description" content="Tap what's in your fridge. Get three meal ideas in seconds.">
<meta property="og:url" content="https://sloppy.live/snack-chef">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cozy%20open%20fridge%20full%20of%20fresh%20ingredients%2C%20cartoon%20illustration%2C%20warm%20kitchen%2C%20handwritten%20recipe%20cards?width=1200&height=630&seed=4242&nologo=true">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,500&family=Lilita+One&family=Space+Mono:wght@400;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5ead3;
    --paper-2: #ebdfba;
    --cream: #fef6e0;
    --ink: #2a1c0e;
    --dim: #7a6e58;
    --warm: #c8642d;
    --warm-2: #a04a18;
    --leaf: #5a8a32;
    --leaf-dk: #345018;
    --berry: #b8324d;
    --gold: #d8a430;
    --sky: #8fb2c8;
    --sky-dk: #4a6f8c;
    --line: #b8a070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 100%; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 18% 12%, rgba(200,100,45,0.10), transparent 55%),
      radial-gradient(ellipse at 82% 88%, rgba(90,138,50,0.08), transparent 55%),
      linear-gradient(180deg, var(--paper), var(--paper-2) 70%);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    padding: 1rem 0.85rem 2rem;
    overscroll-behavior: none;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      repeating-linear-gradient(13deg, rgba(42,28,14,0.04) 0 1px, transparent 1px 8px),
      repeating-linear-gradient(101deg, rgba(42,28,14,0.03) 0 1px, transparent 1px 11px);
    mix-blend-mode: multiply;
  }
  main {
    position: relative;
    z-index: 2;
    max-width: 64rem;
    margin: 0 auto;
    display: grid;
    gap: 1rem;
  }
  header.head {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
    padding: 0.2rem 0.2rem 0.7rem;
    border-bottom: 2px dashed rgba(90,138,50,0.32);
  }
  .stamp {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--leaf-dk);
    padding: 0.25rem 0.55rem;
    border: 1px dashed rgba(90,138,50,0.45);
    border-radius: 0.2rem;
    background: rgba(90,138,50,0.06);
  }
  h1 {
    font-family: 'Lilita One', display;
    font-weight: 400;
    font-size: clamp(2.4rem, 6.5vw, 4rem);
    line-height: 0.95;
    margin: 0;
    letter-spacing: 0.01em;
    color: var(--ink);
    text-shadow:
      -2px 2px 0 var(--gold),
      -4px 4px 0 var(--warm-2);
  }
  h1 em {
    color: var(--berry);
    font-style: italic;
    -webkit-text-stroke: 1px var(--ink);
  }
  .tagline {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.1rem, 2.4vw, 1.4rem);
    color: var(--dim);
    margin-left: auto;
  }
  .tagline em { color: var(--warm); font-style: italic; }

  /* ---- FRIDGE ---- */
  .fridge-wrap {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }
  @media (min-width: 50rem) {
    .fridge-wrap { grid-template-columns: minmax(0, 1.4fr) 1fr; }
  }
  .fridge {
    background: linear-gradient(180deg, #d8d4c6, #c0bca8);
    border: 3px solid var(--ink);
    border-radius: 1rem;
    padding: 1rem 0.95rem 1.15rem;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.4),
      0 10px 0 var(--ink),
      0 24px 40px rgba(42,28,14,0.18);
    position: relative;
  }
  .fridge-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 0.2rem 0.7rem;
    margin-bottom: 0.7rem;
    border-bottom: 1.5px dashed rgba(42,28,14,0.25);
  }
  .fridge-head .label {
    font-family: 'Lilita One', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .selected-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    color: var(--leaf-dk);
    text-transform: uppercase;
  }
  .selected-count strong {
    font-family: 'Lilita One', sans-serif;
    font-size: 1.1rem;
    color: var(--warm-2);
    margin-right: 0.25rem;
  }
  .ingredient-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(5rem, 1fr));
    gap: 0.4rem;
  }
  .ing {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.5), transparent 60%),
      var(--cream);
    border: 1.5px solid var(--line);
    border-radius: 0.5rem;
    padding: 0.4rem 0.3rem;
    cursor: pointer;
    display: grid;
    place-items: center;
    gap: 0.15rem;
    min-height: 3.6rem;
    transition: all 0.15s ease;
    box-shadow: 0 2px 0 rgba(42,28,14,0.18);
  }
  .ing:hover { border-color: var(--warm); transform: translateY(-2px); box-shadow: 0 4px 0 rgba(42,28,14,0.18); }
  .ing:focus-visible { outline: 3px solid var(--warm); outline-offset: 2px; }
  .ing.on {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.4), transparent 60%),
      linear-gradient(180deg, #fce28e, #f4c84a);
    border-color: var(--warm);
    box-shadow: 0 4px 0 var(--warm-2), inset 0 0 12px rgba(216,164,48,0.25);
    transform: translateY(-2px);
  }
  .ing .emoji { font-size: 1.7rem; line-height: 1; }
  .ing .lbl {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    color: var(--ink);
    text-transform: lowercase;
  }
  .ing.on .lbl { color: var(--warm-2); font-weight: 700; }

  .category {
    display: grid;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }
  .custom-row {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 0.7rem;
    padding: 0.5rem 0.5rem;
    background: rgba(254,246,224,0.55);
    border: 1.5px dashed var(--leaf);
    border-radius: 0.45rem;
  }
  .custom-row input {
    flex: 1;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 0.3rem;
    padding: 0.4rem 0.55rem;
    font-family: 'Fraunces', serif;
    font-size: 0.92rem;
    color: var(--ink);
  }
  .custom-row input:focus { outline: 3px solid var(--warm); outline-offset: 1px; border-color: var(--warm); }
  .custom-row button {
    font-family: 'Lilita One', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    padding: 0.45rem 0.85rem;
    border-radius: 0.35rem;
    border: 1.5px solid var(--leaf-dk);
    background: var(--leaf);
    color: var(--cream);
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 3px 0 var(--leaf-dk);
    flex-shrink: 0;
  }
  .custom-row button:hover { background: #6a9c40; }
  .custom-row button:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--leaf-dk); }
  .custom-row button:focus-visible { outline: 3px solid var(--warm); outline-offset: 2px; }
  .ing.custom {
    border-style: dashed;
    border-color: var(--leaf-dk);
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.5), transparent 60%),
      #e9f0d8;
    position: relative;
    padding-right: 0.65rem;
  }
  .ing.custom .emoji { font-size: 1.3rem; }
  .ing.custom.on {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.4), transparent 60%),
      linear-gradient(180deg, #fce28e, #f4c84a);
    border-color: var(--warm);
    border-style: solid;
  }
  .ing.custom .ing-del {
    position: absolute;
    top: 2px;
    right: 4px;
    width: 1.1rem;
    height: 1.1rem;
    background: rgba(42,28,14,0.15);
    color: var(--ink);
    border: none;
    border-radius: 50%;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .ing.custom .ing-del:hover { background: var(--berry); color: var(--cream); }
  .ing.custom .ing-del:focus-visible { outline: 2px solid var(--warm); }
  .cat-head {
    font-family: 'Caveat', cursive;
    font-size: 1.15rem;
    color: var(--leaf-dk);
    padding-left: 0.2rem;
    line-height: 1;
  }
  .cat-head .count {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    color: var(--dim);
    margin-left: 0.4rem;
    letter-spacing: 0.16em;
  }

  /* ---- RIGHT SIDE (controls + recipes) ---- */
  .side {
    display: grid;
    gap: 0.8rem;
    align-content: start;
  }
  .ctrl-card {
    background: var(--cream);
    border: 2px solid var(--ink);
    border-radius: 0.7rem;
    padding: 0.85rem;
    box-shadow: 0 6px 0 var(--ink);
    display: grid;
    gap: 0.55rem;
  }
  .ctrl-card label {
    display: grid;
    gap: 0.2rem;
  }
  .ctrl-card .ctrl-key {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.28em;
    color: var(--dim);
    text-transform: uppercase;
  }
  select, input[type="text"] {
    width: 100%;
    background: var(--cream);
    border: 1.5px solid var(--line);
    border-radius: 0.35rem;
    padding: 0.45rem 0.55rem;
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    appearance: none;
  }
  select:focus, input[type="text"]:focus { outline: 3px solid var(--warm); outline-offset: 1px; border-color: var(--warm); }
  .vibe-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
  }
  .btn {
    font-family: 'Lilita One', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.14em;
    padding: 0.75rem 0.85rem;
    border-radius: 0.5rem;
    border: 2px solid var(--ink);
    background: var(--cream);
    color: var(--ink);
    cursor: pointer;
    text-transform: uppercase;
    min-height: 2.75rem;
    box-shadow: 0 5px 0 var(--ink);
    transition: all 0.12s ease;
  }
  .btn:hover { background: #fde9b5; }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--ink); }
  .btn:focus-visible { outline: 3px solid var(--warm); outline-offset: 3px; }
  .btn.primary {
    background: var(--warm);
    color: var(--cream);
    border-color: var(--warm-2);
    box-shadow: 0 5px 0 var(--warm-2);
  }
  .btn.primary:hover { background: #d8773d; color: var(--cream); }
  .btn:disabled {
    cursor: progress;
    opacity: 0.65;
  }
  .btn.ghost {
    background: transparent;
    box-shadow: none;
    border-width: 1.5px;
  }
  .btn.ghost:active { transform: none; box-shadow: none; }

  .seasoning {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }
  .chip {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 1rem;
    padding: 0.25rem 0.6rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--ink);
    cursor: pointer;
    text-transform: lowercase;
  }
  .chip:hover { background: #fde9b5; border-color: var(--warm); }
  .chip.on { background: var(--leaf); color: var(--cream); border-color: var(--leaf-dk); }

  /* ---- RECIPES ---- */
  .recipes {
    display: grid;
    gap: 0.7rem;
  }
  .recipe {
    background:
      linear-gradient(180deg, var(--cream), #f7e9c2 80%, #f1dd9c);
    border: 1.5px solid var(--ink);
    border-radius: 0.6rem;
    padding: 0.85rem 0.9rem;
    box-shadow: 0 6px 0 var(--ink), 0 12px 22px rgba(42,28,14,0.22);
    position: relative;
    overflow: hidden;
    transform-origin: center;
  }
  .recipe::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(7deg, rgba(42,28,14,0.04) 0 1px, transparent 1px 9px);
  }
  .recipe.fresh {
    animation: cardPop 0.45s cubic-bezier(0.3, 1.4, 0.4, 1);
  }
  @keyframes cardPop {
    0% { transform: translateY(12px) scale(0.95); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  .recipe-name {
    font-family: 'Lilita One', sans-serif;
    font-size: 1.35rem;
    color: var(--warm-2);
    letter-spacing: 0.02em;
    line-height: 1.05;
    margin: 0 0 0.15rem;
  }
  .recipe-tag {
    font-family: 'Caveat', cursive;
    font-size: 1rem;
    color: var(--leaf-dk);
    margin: 0 0 0.55rem;
  }
  .recipe-meta {
    display: flex;
    gap: 0.7rem;
    flex-wrap: wrap;
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 0.55rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px dashed rgba(42,28,14,0.2);
  }
  .recipe-meta strong { color: var(--warm-2); font-family: 'Lilita One', sans-serif; font-size: 0.9rem; letter-spacing: 0.05em; }
  .recipe section {
    margin-bottom: 0.45rem;
  }
  .recipe section h3 {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.28em;
    color: var(--leaf-dk);
    text-transform: uppercase;
    margin-bottom: 0.2rem;
  }
  .recipe ul, .recipe ol {
    padding-left: 1.2rem;
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    line-height: 1.4;
    color: var(--ink);
  }
  .recipe ul li { list-style: '· '; padding-left: 0.2rem; }
  .recipe ol li { padding-left: 0.2rem; }

  .empty {
    text-align: center;
    padding: 1.5rem 0.8rem;
    color: var(--dim);
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    background: rgba(254,246,224,0.5);
    border: 1.5px dashed rgba(42,28,14,0.25);
    border-radius: 0.6rem;
  }
  /* Pairings */
  .pairing {
    background:
      linear-gradient(180deg, var(--cream), #f8e6b8);
    border: 1.5px solid var(--berry);
    border-radius: 0.5rem;
    padding: 0.65rem 0.7rem;
    box-shadow: 0 4px 0 var(--berry);
    display: grid;
    gap: 0.25rem;
    transform-origin: center;
    animation: cardPop 0.45s cubic-bezier(0.3, 1.4, 0.4, 1);
  }
  .pairing-combo {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.3rem;
    font-family: 'Lilita One', sans-serif;
    font-size: 1.05rem;
    color: var(--berry);
  }
  .pairing-combo .plus {
    color: var(--warm);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 0.95rem;
  }
  .pairing-name {
    font-family: 'Caveat', cursive;
    font-size: 1.1rem;
    color: var(--leaf-dk);
    line-height: 1;
  }
  .pairing-why {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink);
    line-height: 1.35;
  }
  .pairing-use {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    color: var(--dim);
    border-top: 1px dashed rgba(42,28,14,0.2);
    padding-top: 0.3rem;
    margin-top: 0.15rem;
  }
  .pairing-use strong { color: var(--warm-2); font-family: 'Lilita One', sans-serif; font-size: 0.7rem; letter-spacing: 0.16em; text-transform: uppercase; }
  .empty span.arrow { display: block; font-size: 1.6rem; color: var(--warm); margin-bottom: 0.25rem; }

  .loading {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.85rem 1rem;
    background: var(--cream);
    border: 1.5px dashed var(--warm);
    border-radius: 0.5rem;
    font-family: 'Caveat', cursive;
    font-size: 1.15rem;
    color: var(--warm-2);
  }
  .loading .dot {
    display: inline-block;
    width: 0.5rem;
    height: 0.5rem;
    border-radius: 50%;
    background: var(--warm);
    animation: dotPulse 1s ease-in-out infinite;
  }
  .loading .dot:nth-child(2) { animation-delay: 0.15s; }
  .loading .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.3; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(1rem);
    background: var(--ink);
    color: var(--cream);
    font-family: 'Lilita One', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    padding: 0.55rem 1.1rem;
    border-radius: 0.4rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s, transform 0.3s;
    z-index: 50;
    text-transform: uppercase;
    box-shadow: 0 4px 0 var(--warm-2);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0,0,0,0);
    border: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
<main>
  <header class="head">
    <span class="stamp">№42 · KITCHEN NOTES</span>
    <h1>snack <em>chef</em></h1>
    <p class="tagline">tap the fridge. <em>get fed.</em></p>
  </header>

  <section class="fridge-wrap">
    <div class="fridge" aria-label="Fridge ingredient selector">
      <div class="fridge-head">
        <span class="label">Your Fridge</span>
        <span class="selected-count" aria-live="polite"><strong id="selCount">0</strong>selected</span>
      </div>
      <form class="custom-row" id="customForm" autocomplete="off">
        <input type="text" id="customInput" placeholder="add your own — comma-separated…" aria-label="Add custom ingredients (comma-separated)" maxlength="120">
        <button type="submit">＋ Add</button>
      </form>
      <div id="ingredientHolder"></div>
    </div>

    <aside class="side">
      <div class="ctrl-card">
        <div class="vibe-row">
          <label>
            <span class="ctrl-key">Meal</span>
            <select id="mealSel">
              <option value="anything">anything</option>
              <option value="breakfast">breakfast</option>
              <option value="lunch">lunch</option>
              <option value="dinner">dinner</option>
              <option value="snack">snack</option>
              <option value="dessert">dessert</option>
            </select>
          </label>
          <label>
            <span class="ctrl-key">Effort</span>
            <select id="effortSel">
              <option value="lazy">lazy (≤ 10 min)</option>
              <option value="moderate" selected>moderate (10–30 min)</option>
              <option value="ambitious">ambitious (30+ min)</option>
            </select>
          </label>
        </div>
        <div>
          <span class="ctrl-key" style="margin-bottom: 0.25rem; display: block;">Vibe</span>
          <div class="seasoning" id="vibeChips" role="group" aria-label="Flavor vibes">
            <button class="chip" type="button" data-vibe="cozy">cozy</button>
            <button class="chip" type="button" data-vibe="spicy">spicy</button>
            <button class="chip" type="button" data-vibe="fresh">fresh</button>
            <button class="chip" type="button" data-vibe="hearty">hearty</button>
            <button class="chip" type="button" data-vibe="weird">weird</button>
            <button class="chip" type="button" data-vibe="kid">kid-friendly</button>
          </div>
        </div>
        <button class="btn primary" id="cookBtn" type="button">🍳 Cook me up</button>
        <button class="btn" id="pairBtn" type="button" style="background: var(--berry); color: var(--cream); border-color: #7a2030; box-shadow: 0 5px 0 #7a2030;">✦ Suggest pairings</button>
        <div style="display: flex; gap: 0.4rem;">
          <button class="btn ghost" id="clearBtn" type="button" style="flex:1">Clear</button>
          <button class="btn ghost" id="randomBtn" type="button" style="flex:1">🎲 Random fridge</button>
        </div>
      </div>

      <div class="recipes" id="recipes">
        <div class="empty" id="emptyState">
          <span class="arrow" aria-hidden="true">↑</span>
          pick a few ingredients · hit cook
        </div>
      </div>
    </aside>
  </section>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const els = {
    holder: $('ingredientHolder'),
    selCount: $('selCount'),
    cookBtn: $('cookBtn'),
    pairBtn: $('pairBtn'),
    clearBtn: $('clearBtn'),
    randomBtn: $('randomBtn'),
    mealSel: $('mealSel'),
    effortSel: $('effortSel'),
    vibeChips: $('vibeChips'),
    recipes: $('recipes'),
    emptyState: $('emptyState'),
    toast: $('toast'),
  };

  // ---- Ingredient catalog (curated, by category) ----
  const CATEGORIES = [
    { id: 'protein', label: 'Protein', items: [
      { e: '🥚', l: 'eggs' }, { e: '🍗', l: 'chicken' }, { e: '🥓', l: 'bacon' },
      { e: '🥩', l: 'beef' }, { e: '🍖', l: 'pork' }, { e: '🐟', l: 'fish' },
      { e: '🍤', l: 'shrimp' }, { e: '🧆', l: 'tofu' }, { e: '🫘', l: 'beans' },
      { e: '🌭', l: 'sausage' }, { e: '🥜', l: 'peanuts' }, { e: '🌰', l: 'nuts' },
    ]},
    { id: 'veg', label: 'Vegetables', items: [
      { e: '🍅', l: 'tomato' }, { e: '🥔', l: 'potato' }, { e: '🥕', l: 'carrot' },
      { e: '🧅', l: 'onion' }, { e: '🧄', l: 'garlic' }, { e: '🌶️', l: 'chili' },
      { e: '🫑', l: 'pepper' }, { e: '🥬', l: 'lettuce' }, { e: '🥦', l: 'broccoli' },
      { e: '🥒', l: 'cucumber' }, { e: '🌽', l: 'corn' }, { e: '🍄', l: 'mushroom' },
      { e: '🥑', l: 'avocado' }, { e: '🍆', l: 'eggplant' }, { e: '🫛', l: 'peas' },
      { e: '🥗', l: 'greens' },
    ]},
    { id: 'dairy', label: 'Dairy & Eggs', items: [
      { e: '🧀', l: 'cheese' }, { e: '🥛', l: 'milk' }, { e: '🧈', l: 'butter' },
      { e: '🍦', l: 'yogurt' }, { e: '🥥', l: 'coconut milk' },
    ]},
    { id: 'carb', label: 'Carbs', items: [
      { e: '🍞', l: 'bread' }, { e: '🍝', l: 'pasta' }, { e: '🍚', l: 'rice' },
      { e: '🥖', l: 'baguette' }, { e: '🌽', l: 'tortilla' }, { e: '🥯', l: 'bagel' },
      { e: '🍜', l: 'noodles' }, { e: '🫓', l: 'flatbread' },
    ]},
    { id: 'fruit', label: 'Fruit', items: [
      { e: '🍋', l: 'lemon' }, { e: '🍊', l: 'orange' }, { e: '🍎', l: 'apple' },
      { e: '🍌', l: 'banana' }, { e: '🍓', l: 'strawberry' }, { e: '🫐', l: 'blueberry' },
      { e: '🍇', l: 'grapes' }, { e: '🍑', l: 'peach' },
    ]},
    { id: 'pantry', label: 'Pantry', items: [
      { e: '🧂', l: 'salt' }, { e: '🌿', l: 'herbs' }, { e: '🫙', l: 'honey' },
      { e: '🧴', l: 'olive oil' }, { e: '🍯', l: 'maple syrup' }, { e: '🧈', l: 'soy sauce' },
      { e: '🌶️', l: 'hot sauce' }, { e: '🥫', l: 'tomato sauce' },
    ]},
  ];

  // Dedup by label across categories (some labels repeat across cats — keep first)
  const seen = new Set();
  CATEGORIES.forEach(cat => {
    cat.items = cat.items.filter(it => {
      const k = it.l;
      if (seen.has(k)) return false;
      seen.add(k);
      return true;
    });
  });

  const state = {
    selected: new Set(),
    vibes: new Set(),
    custom: [],   // user-entered ingredient names (free text)
    busy: false,
  };

  function renderFridge() {
    els.holder.innerHTML = '';
    // Custom (user-added) ingredients first, if any
    if (state.custom.length > 0) {
      const wrap = document.createElement('div');
      wrap.className = 'category';
      const head = document.createElement('div');
      head.className = 'cat-head';
      head.innerHTML = `Yours<span class="count">${state.custom.length}</span>`;
      wrap.appendChild(head);
      const grid = document.createElement('div');
      grid.className = 'ingredient-grid';
      state.custom.forEach(label => {
        const b = document.createElement('button');
        b.className = 'ing custom';
        if (state.selected.has(label)) b.classList.add('on');
        b.type = 'button';
        b.dataset.label = label;
        b.setAttribute('aria-pressed', state.selected.has(label) ? 'true' : 'false');
        b.setAttribute('aria-label', label + ' (your addition)');
        b.innerHTML = `<button class="ing-del" type="button" aria-label="Remove ${label}">×</button><span class="emoji" aria-hidden="true">✎</span><span class="lbl">${escapeHtml(label)}</span>`;
        b.addEventListener('click', (e) => {
          if (e.target.classList.contains('ing-del')) return;
          toggleIngredient(label, b);
        });
        b.querySelector('.ing-del').addEventListener('click', (e) => {
          e.stopPropagation();
          removeCustom(label);
        });
        grid.appendChild(b);
      });
      wrap.appendChild(grid);
      els.holder.appendChild(wrap);
    }
    CATEGORIES.forEach(cat => {
      const wrap = document.createElement('div');
      wrap.className = 'category';
      const head = document.createElement('div');
      head.className = 'cat-head';
      head.innerHTML = `${cat.label}<span class="count">${cat.items.length}</span>`;
      wrap.appendChild(head);
      const grid = document.createElement('div');
      grid.className = 'ingredient-grid';
      cat.items.forEach(it => {
        const b = document.createElement('button');
        b.className = 'ing';
        b.type = 'button';
        b.dataset.label = it.l;
        b.setAttribute('aria-pressed', 'false');
        b.setAttribute('aria-label', it.l);
        b.innerHTML = `<span class="emoji" aria-hidden="true">${it.e}</span><span class="lbl">${it.l}</span>`;
        b.addEventListener('click', () => toggleIngredient(it.l, b));
        grid.appendChild(b);
      });
      wrap.appendChild(grid);
      els.holder.appendChild(wrap);
    });
  }
  function toggleIngredient(label, el) {
    if (state.selected.has(label)) {
      state.selected.delete(label);
      el.classList.remove('on');
      el.setAttribute('aria-pressed', 'false');
    } else {
      state.selected.add(label);
      el.classList.add('on');
      el.setAttribute('aria-pressed', 'true');
    }
    els.selCount.textContent = state.selected.size;
  }
  function clearAll() {
    state.selected.clear();
    document.querySelectorAll('.ing.on').forEach(el => {
      el.classList.remove('on');
      el.setAttribute('aria-pressed', 'false');
    });
    els.selCount.textContent = '0';
  }

  function addCustom(raw) {
    if (!raw) return;
    // Split on commas, semicolons, or newlines; trim; lowercase; max 30 chars; drop dupes
    const parts = raw.split(/[,;\n]+/)
      .map(s => s.trim().toLowerCase())
      .filter(s => s && s.length <= 30);
    if (!parts.length) return;
    // Collect all existing label names across catalog + customs to avoid dupes
    const existing = new Set(state.custom.map(s => s.toLowerCase()));
    CATEGORIES.forEach(cat => cat.items.forEach(it => existing.add(it.l)));
    let added = 0;
    for (const p of parts) {
      if (existing.has(p)) continue;
      // Hard cap to keep UI sensible
      if (state.custom.length >= 24) break;
      state.custom.push(p);
      state.selected.add(p);   // auto-select on add — that's why you typed it
      existing.add(p);
      added += 1;
    }
    if (added > 0) {
      renderFridge();
      els.selCount.textContent = state.selected.size;
      showToast('Added ' + added);
    } else {
      showToast('Already there');
    }
  }
  function removeCustom(label) {
    const idx = state.custom.indexOf(label);
    if (idx === -1) return;
    state.custom.splice(idx, 1);
    state.selected.delete(label);
    renderFridge();
    els.selCount.textContent = state.selected.size;
  }

  function randomFridge() {
    clearAll();
    // Pick 4-8 random ingredients
    const all = [];
    CATEGORIES.forEach(cat => cat.items.forEach(it => all.push(it.l)));
    const pickCount = 4 + Math.floor(Math.random() * 5);
    const shuffled = all.slice().sort(() => Math.random() - 0.5);
    const picked = shuffled.slice(0, pickCount);
    picked.forEach(label => {
      const el = els.holder.querySelector(`.ing[data-label="${label}"]`);
      if (el) {
        state.selected.add(label);
        el.classList.add('on');
        el.setAttribute('aria-pressed', 'true');
      }
    });
    els.selCount.textContent = state.selected.size;
    showToast('Random fridge generated');
  }

  // Vibe chips
  els.vibeChips.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      const v = c.dataset.vibe;
      if (state.vibes.has(v)) {
        state.vibes.delete(v);
        c.classList.remove('on');
        c.setAttribute('aria-pressed', 'false');
      } else {
        state.vibes.add(v);
        c.classList.add('on');
        c.setAttribute('aria-pressed', 'true');
      }
    });
    c.setAttribute('aria-pressed', 'false');
  });

  // ---- Pollinations call ----
  function isBannerResponse(text) {
    if (!text) return false;
    if (text.length > 280) return false;
    return /enter\.pollinations\.ai|please.{0,12}sign.?in|please.{0,12}authenticate|api.?key.{0,16}required/i.test(text);
  }

  function buildPrompt() {
    const ingredients = [...state.selected];
    const meal = els.mealSel.value;
    const effort = els.effortSel.value;
    const vibes = [...state.vibes];
    const wantsWeird = vibes.includes('weird');
    // Default: prioritize REAL, named, traditional dishes the user already recognizes.
    // Avoid invented "fridge bowls" / made-up names unless "weird" vibe is explicitly on.
    const traditionGuidance = wantsWeird
      ? 'You may invent a fusion or unusual dish for at most ONE of the three. The other two should still be recognizable named dishes.'
      : `Prioritize CLASSIC, RECOGNIZABLE named dishes from real world cuisines (e.g. carbonara, fried rice, shakshuka, frittata, dal, miso soup, ratatouille, tortilla española, congee, grilled cheese, etc.). At least 2 of the 3 must be a dish a home cook would already recognize by name. Avoid invented "fridge bowl" / "improvised plate" titles. Don't force fusion — pick the dish that best fits the available ingredients with minimal substitution.`;
    return `You are an experienced home cook. Given these ingredients available in the fridge: ${ingredients.join(', ')}.

Generate 3 distinct meal ideas that use AS MANY of these ingredients as possible. You may suggest 1 or 2 common pantry staples per recipe (salt, oil, pepper, water, sugar, flour, basic spices) but don't introduce major missing items.

${traditionGuidance}

Meal type: ${meal}.
Effort level: ${effort}.
${vibes.length ? `Flavor vibes: ${vibes.join(', ')}.` : ''}

Return ONLY a JSON array of exactly 3 recipes, each shaped like:
{
  "name": "the actual recognizable dish name (2-5 words, prefer real dish names like 'Mushroom Risotto' or 'Shakshuka' over invented titles)",
  "tagline": "one short descriptive line (8-14 words) — what makes this version of the dish good",
  "minutes": integer total cook time in minutes,
  "uses": ["ingredient1", "ingredient2", ...] (subset of selected ingredients actually used),
  "extras": ["pantry staple 1", ...] (max 2, optional, leave empty array if none),
  "steps": ["step 1", "step 2", "step 3"] (3-5 short imperative steps, max 70 chars each, classic technique not improvised)
}

Output ONLY the JSON array. No preamble.`;
  }

  async function callRecipes() {
    const prompt = buildPrompt();
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 18000);
    try {
      // GET path = anonymous, no preflight, no banner. Lower temp for classic dishes.
      const url = 'https://text.pollinations.ai/' + encodeURIComponent(prompt) + '?model=mistral&temperature=0.55';
      const res = await fetch(url, { signal: ctrl.signal });
      clearTimeout(to);
      if (!res.ok) {
        console.warn('[snack-chef] recipes GET failed:', res.status);
        return null;
      }
      const text = (await res.text() || '').trim();
      if (!text || isBannerResponse(text)) {
        console.warn('[snack-chef] recipes GET returned banner or empty, trying POST');
        return null;
      }
      return parseRecipes(text);
    } catch (e) {
      clearTimeout(to);
      console.warn('[snack-chef] GET error:', e.name === 'AbortError' ? 'timeout' : e.message);
      return null;
    }
  }

  async function callRecipesPostFallback() {
    const prompt = buildPrompt();
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 18000);
    try {
      const res = await fetch('https://text.pollinations.ai/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          model: 'mistral',
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.55,
        }),
        signal: ctrl.signal,
      });
      clearTimeout(to);
      if (!res.ok) {
        console.warn('[snack-chef] recipes POST failed:', res.status);
        return null;
      }
      const raw = await res.text();
      let text = '';
      try {
        const data = JSON.parse(raw);
        text = data?.choices?.[0]?.message?.content || '';
      } catch (e) { text = raw; }
      if (!text || isBannerResponse(text)) return null;
      return parseRecipes(text);
    } catch (e) {
      clearTimeout(to);
      console.warn('[snack-chef] POST error:', e.name === 'AbortError' ? 'timeout' : e.message);
      return null;
    }
  }

  function parseRecipes(text) {
    // Try direct
    let parsed = null;
    try { parsed = JSON.parse(text); } catch {}
    if (!parsed) {
      const fenced = text.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
      if (fenced) { try { parsed = JSON.parse(fenced[1]); } catch {} }
    }
    if (!parsed) {
      const slice = text.match(/\[[\s\S]*\]/);
      if (slice) { try { parsed = JSON.parse(slice[0]); } catch {} }
    }
    if (!parsed || !Array.isArray(parsed)) return null;
    return parsed.slice(0, 3).map(normalize).filter(Boolean);
  }
  function normalize(r) {
    if (!r || typeof r !== 'object') return null;
    const trim = (s, m) => String(s || '').slice(0, m).trim();
    return {
      name: trim(r.name, 40) || 'Untitled Dish',
      tagline: trim(r.tagline, 120) || '',
      minutes: Math.max(1, Math.min(180, parseInt(r.minutes, 10) || 20)),
      uses: Array.isArray(r.uses) ? r.uses.slice(0, 10).map(s => trim(s, 30)).filter(Boolean) : [],
      extras: Array.isArray(r.extras) ? r.extras.slice(0, 3).map(s => trim(s, 30)).filter(Boolean) : [],
      steps: Array.isArray(r.steps) ? r.steps.slice(0, 6).map(s => trim(s, 110)).filter(Boolean) : [],
    };
  }

  function fallbackRecipes(ingredients, meal, effort) {
    const ings = ingredients.slice(0, 4);
    return [
      {
        name: 'One-pan ' + (ings[0] || 'fridge') + ' bowl',
        tagline: 'whatever you have, hot and saucy in one pan',
        minutes: 18,
        uses: ings,
        extras: ['salt', 'olive oil'],
        steps: [
          'Heat olive oil in a pan over medium-high.',
          'Add ' + ings.slice(0, 2).join(' and ') + '; cook 4-5 min.',
          'Toss in remaining ingredients, season with salt.',
          'Cover, lower heat, cook 6-8 min until tender.',
        ],
      },
      {
        name: ings[0] ? ings[0] + ' toast' : 'whatever toast',
        tagline: 'lazy and good',
        minutes: 8,
        uses: ings.slice(0, 3),
        extras: ['bread', 'salt'],
        steps: [
          'Toast bread until deeply golden.',
          'Top with ' + ings.slice(0, 2).join(', ') + '.',
          'Salt to taste, eat standing up.',
        ],
      },
      {
        name: 'Improvised ' + meal + ' plate',
        tagline: 'a little of everything, well placed',
        minutes: 14,
        uses: ings,
        extras: [],
        steps: [
          'Plate cold and warm elements side by side.',
          'Drizzle with anything fatty (oil, butter, dressing).',
          'Add a salt finish and a squeeze of something acidic.',
        ],
      },
    ];
  }

  function showToast(text, ms) {
    els.toast.textContent = text;
    els.toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => els.toast.classList.remove('show'), ms || 1600);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function renderRecipes(arr) {
    els.recipes.innerHTML = '';
    arr.forEach((r, i) => {
      const card = document.createElement('article');
      card.className = 'recipe fresh';
      card.style.animationDelay = (i * 80) + 'ms';
      const uses = r.uses && r.uses.length ? `<section><h3>Uses</h3><ul>${r.uses.map(u => `<li>${escapeHtml(u)}</li>`).join('')}</ul></section>` : '';
      const extras = r.extras && r.extras.length ? `<section><h3>Plus</h3><ul>${r.extras.map(u => `<li>${escapeHtml(u)}</li>`).join('')}</ul></section>` : '';
      const steps = r.steps && r.steps.length ? `<section><h3>Steps</h3><ol>${r.steps.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ol></section>` : '';
      card.innerHTML = `
        <h2 class="recipe-name">${escapeHtml(r.name)}</h2>
        ${r.tagline ? `<p class="recipe-tag">"${escapeHtml(r.tagline)}"</p>` : ''}
        <div class="recipe-meta">
          <span>⏱ <strong>${r.minutes}</strong> min</span>
          <span>🥬 <strong>${(r.uses||[]).length}</strong> ingredients</span>
        </div>
        ${uses}${extras}${steps}
      `;
      els.recipes.appendChild(card);
    });
  }

  async function cook() {
    if (state.busy) return;
    if (state.selected.size < 2) {
      showToast('pick at least 2 ingredients');
      return;
    }
    state.busy = true;
    els.cookBtn.disabled = true;
    els.cookBtn.textContent = '… cooking …';
    els.recipes.innerHTML = '';
    const loading = document.createElement('div');
    loading.className = 'loading';
    loading.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span> the chef is thinking…';
    els.recipes.appendChild(loading);

    let recipes = await callRecipes();
    if (!recipes || recipes.length === 0) {
      recipes = await callRecipesPostFallback();
    }
    if (!recipes || recipes.length === 0) {
      recipes = fallbackRecipes([...state.selected], els.mealSel.value, els.effortSel.value);
      showToast('Using local fallback');
    }
    loading.remove();
    renderRecipes(recipes);
    state.busy = false;
    els.cookBtn.disabled = false;
    els.cookBtn.textContent = '🍳 Cook me up';
  }

  // ---- Pairings (creative ingredient combos) ----
  function buildPairPrompt() {
    const ingredients = [...state.selected];
    const vibes = [...state.vibes];
    const wantsWeird = vibes.includes('weird');
    const pairingGuidance = wantsWeird
      ? `Mix it up: 2 should be CLASSIC comfort-food pairings (tomato+basil, peanut butter+banana, bacon+maple, lemon+butter, etc.) and 3 can be unexpected but still rooted in real culinary tradition. Avoid pure shock value.`
      : `Focus on CLASSIC comfort-food pairings — combinations a home cook would already trust: tomato+basil, peanut butter+banana, bacon+maple, lemon+butter, cheddar+apple, cucumber+dill, strawberry+balsamic, garlic+olive oil, eggs+cheese, beans+rice, chocolate+sea salt, mushrooms+thyme, etc. Pick the closest 5 such pairings the user's ingredient list supports. If a perfect classic pairing isn't available, lean toward gentle, intuitive flavor matches rather than shock combinations.`;
    return `You are an experienced home cook. Given these fridge ingredients: ${ingredients.join(', ')}.

Suggest 5 PAIRINGS — small combinations of 2-3 ingredients that work well together. ${pairingGuidance} ${vibes.length ? `Vibes: ${vibes.join(', ')}.` : ''}

Return ONLY a JSON array of exactly 5 pairings, each shaped like:
{
  "ingredients": ["ingredient1", "ingredient2"] (2 or 3 ingredients, all from the user's fridge list),
  "name": "short pairing title (2-4 words) — name the dish or feel, not a manifesto",
  "why": "one short sentence explaining why these go together (max 90 chars) — taste/texture/tradition logic",
  "use": "one short phrase describing the simplest way to combine them (5-12 words, max 70 chars)"
}

Output ONLY the JSON array. No preamble.`;
  }
  function parsePairings(text) {
    let parsed = null;
    try { parsed = JSON.parse(text); } catch {}
    if (!parsed) {
      const fenced = text.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
      if (fenced) { try { parsed = JSON.parse(fenced[1]); } catch {} }
    }
    if (!parsed) {
      const slice = text.match(/\[[\s\S]*\]/);
      if (slice) { try { parsed = JSON.parse(slice[0]); } catch {} }
    }
    if (!parsed || !Array.isArray(parsed)) return null;
    return parsed.slice(0, 6).map(p => {
      if (!p || typeof p !== 'object') return null;
      const trim = (s, m) => String(s || '').slice(0, m).trim();
      const ings = Array.isArray(p.ingredients) ? p.ingredients.slice(0, 3).map(s => trim(s, 30)).filter(Boolean) : [];
      if (ings.length < 2) return null;
      return {
        ingredients: ings,
        name: trim(p.name, 40) || ings.join(' + '),
        why: trim(p.why, 130) || '',
        use: trim(p.use, 90) || '',
      };
    }).filter(Boolean);
  }
  async function callPairingsGet() {
    const prompt = buildPairPrompt();
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 18000);
    try {
      const url = 'https://text.pollinations.ai/' + encodeURIComponent(prompt) + '?model=mistral&temperature=0.65';
      const res = await fetch(url, { signal: ctrl.signal });
      clearTimeout(to);
      if (!res.ok) { console.warn('[snack-chef] pairings GET failed:', res.status); return null; }
      const text = (await res.text() || '').trim();
      if (!text || isBannerResponse(text)) { console.warn('[snack-chef] pairings GET banner/empty'); return null; }
      return parsePairings(text);
    } catch (e) {
      clearTimeout(to);
      console.warn('[snack-chef] pairings GET error:', e.name === 'AbortError' ? 'timeout' : e.message);
      return null;
    }
  }
  async function callPairingsPost() {
    const prompt = buildPairPrompt();
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 18000);
    try {
      const res = await fetch('https://text.pollinations.ai/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ model: 'mistral', messages: [{ role: 'user', content: prompt }], temperature: 0.65 }),
        signal: ctrl.signal,
      });
      clearTimeout(to);
      if (!res.ok) { console.warn('[snack-chef] pairings POST failed:', res.status); return null; }
      const raw = await res.text();
      let text = '';
      try { const data = JSON.parse(raw); text = data?.choices?.[0]?.message?.content || ''; } catch (e) { text = raw; }
      if (!text || isBannerResponse(text)) return null;
      return parsePairings(text);
    } catch (e) {
      clearTimeout(to);
      console.warn('[snack-chef] pairings POST error:', e.name === 'AbortError' ? 'timeout' : e.message);
      return null;
    }
  }
  function fallbackPairings(ings) {
    // Generate naive pairings from selected items
    const out = [];
    const shuffled = ings.slice().sort(() => Math.random() - 0.5);
    for (let i = 0; i + 1 < shuffled.length && out.length < 5; i += 2) {
      const a = shuffled[i], b = shuffled[i + 1];
      out.push({
        ingredients: [a, b],
        name: a + ' + ' + b,
        why: 'A combination worth tasting once before deciding.',
        use: 'Toast bread, layer both, taste, adjust.',
      });
    }
    return out;
  }
  function renderPairings(arr) {
    els.recipes.innerHTML = '';
    arr.forEach((p, i) => {
      const card = document.createElement('article');
      card.className = 'pairing';
      card.style.animationDelay = (i * 70) + 'ms';
      const combo = p.ingredients.map(x => `<span>${escapeHtml(x)}</span>`).join('<span class="plus">+</span>');
      card.innerHTML = `
        <div class="pairing-combo">${combo}</div>
        ${p.name && p.name !== p.ingredients.join(' + ') ? `<div class="pairing-name">"${escapeHtml(p.name)}"</div>` : ''}
        ${p.why ? `<p class="pairing-why">${escapeHtml(p.why)}</p>` : ''}
        ${p.use ? `<div class="pairing-use"><strong>Try</strong> ${escapeHtml(p.use)}</div>` : ''}
      `;
      els.recipes.appendChild(card);
    });
  }
  async function pairUp() {
    if (state.busy) return;
    if (state.selected.size < 3) {
      showToast('pick at least 3 ingredients');
      return;
    }
    state.busy = true;
    els.pairBtn.disabled = true;
    els.cookBtn.disabled = true;
    els.pairBtn.textContent = '… pairing …';
    els.recipes.innerHTML = '';
    const loading = document.createElement('div');
    loading.className = 'loading';
    loading.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span> finding unexpected matches…';
    els.recipes.appendChild(loading);

    let pairings = await callPairingsGet();
    if (!pairings || pairings.length === 0) pairings = await callPairingsPost();
    if (!pairings || pairings.length === 0) {
      pairings = fallbackPairings([...state.selected]);
      showToast('Using local fallback');
    }
    loading.remove();
    renderPairings(pairings);
    state.busy = false;
    els.pairBtn.disabled = false;
    els.cookBtn.disabled = false;
    els.pairBtn.textContent = '✦ Suggest pairings';
  }

  els.cookBtn.addEventListener('click', cook);
  els.pairBtn.addEventListener('click', pairUp);
  els.clearBtn.addEventListener('click', clearAll);
  els.randomBtn.addEventListener('click', randomFridge);

  // Custom-ingredient form
  const customForm = document.getElementById('customForm');
  const customInput = document.getElementById('customInput');
  if (customForm) {
    customForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const v = customInput.value;
      customInput.value = '';
      addCustom(v);
      customInput.focus();
    });
  }

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) cook();
    else if (e.key === 'r' || e.key === 'R') randomFridge();
  });

  // Boot
  renderFridge();
})();
</script>
</body>
</html>
