<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ballerina Brawl</title>
<link rel="icon" href="https://emojicdn.elk.sh/🩰">
<meta property="og:title" content="Ballerina Brawl">
<meta property="og:description" content="Pixel art fight club where ballerinas throw down. First rule: always pirouette.">
<meta property="og:url" content="https://sloppy.live/ballerina-brawl/">
<meta property="og:image" content="https://sloppy.live/ballerina-brawl/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0008;overflow:hidden;user-select:none}
canvas{display:block;width:100vw;height:100vh;image-rendering:pixelated}
#start{position:fixed;inset:0;z-index:20;background:rgba(10,0,8,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer}
#start h1{font-family:'Press Start 2P',monospace;font-size:clamp(16px,4vw,32px);color:#f4a;text-shadow:0 0 20px rgba(255,68,170,.5),0 4px 0 #800;letter-spacing:2px;text-align:center;line-height:1.4}
#start .sub{font-family:'Silkscreen',monospace;font-size:clamp(8px,1.5vw,12px);color:rgba(255,68,170,.3);letter-spacing:3px}
#start .controls{font-family:'Silkscreen',monospace;font-size:clamp(7px,1.2vw,10px);color:rgba(255,180,220,.15);text-align:center;line-height:2;margin-top:12px}
#start .controls span{color:rgba(255,68,170,.3)}
#hud{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 16px;pointer-events:none;opacity:0;transition:opacity .5s}
#hud.show{opacity:1}
.hp-wrap{width:35%;display:flex;flex-direction:column;gap:3px}
.hp-wrap.right{align-items:flex-end}
.hp-name{font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1px}
.hp-bar{width:100%;height:10px;background:#1a0010;border:1px solid #330020;overflow:hidden}
.hp-fill{height:100%;transition:width .2s}
.p1-fill{background:linear-gradient(90deg,#f4a,#f08);box-shadow:inset 0 0 6px #f4a}
.p2-fill{background:linear-gradient(90deg,#4af,#08f);box-shadow:inset 0 0 6px #4af}
#round-info{font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.5vw,12px);color:#ff0;text-shadow:0 0 10px rgba(255,255,0,.3);text-align:center}
#score-info{font-family:'Silkscreen',monospace;font-size:8px;color:rgba(255,255,255,.3);text-align:center;margin-top:2px}
a#backlink{position:fixed;bottom:6px;left:8px;color:rgba(255,255,255,.03);font-size:7px;text-decoration:none;z-index:5}
a#backlink:hover{color:rgba(255,255,255,.15)}
</style>
</head>
<body>
<div id="start">
 <h1>BALLERINA<br>BRAWL</h1>
 <div class="sub">FIGHT CLUB</div>
 <div class="controls">
  <span>P1:</span> A/D MOVE &middot; W JUMP &middot; F PUNCH &middot; G KICK &middot; R SPECIAL<br>
  <span>P2:</span> ←/→ MOVE &middot; ↑ JUMP &middot; J PUNCH &middot; K KICK &middot; U SPECIAL<br>
  <span>SOLO:</span> FIGHT THE AI<br><br>
  TAP TO START
 </div>
</div>
<canvas id="c"></canvas>
<div id="hud">
 <div class="hp-wrap">
  <div class="hp-name" style="color:#f4a" id="p1-name">PRIMA</div>
  <div class="hp-bar"><div class="hp-fill p1-fill" id="p1-hp" style="width:100%"></div></div>
 </div>
 <div style="text-align:center">
  <div id="round-info">ROUND 1</div>
  <div id="score-info">0 - 0</div>
 </div>
 <div class="hp-wrap right">
  <div class="hp-name" style="color:#4af" id="p2-name">TUTU</div>
  <div class="hp-bar"><div class="hp-fill p2-fill" id="p2-hp" style="width:100%"></div></div>
 </div>
</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
const CN=document.getElementById('c'),X=CN.getContext('2d');
let W,H,PW,PH;
const SCALE=3;
const GRAVITY=600;
const GROUND_Y_FRAC=.82;
let groundY;

// Audio
let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function sfx(type){
 if(!actx)return;const t=actx.currentTime;
 if(type==='hit'){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='square';o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(60,t+.08);
  g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.1);
 }else if(type==='kick'){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(40,t+.12);
  g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.15);
 }else if(type==='special'){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.setValueAtTime(800,t+.05);o.frequency.setValueAtTime(1200,t+.1);
  g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.2);
 }else if(type==='ko'){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(30,t+.5);
  g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.5);
 }else if(type==='round'){
  [600,800,1000].forEach((f,i)=>{
   const o=actx.createOscillator(),g=actx.createGain();
   o.type='square';o.frequency.value=f;
   g.gain.setValueAtTime(.08,t+i*.12);g.gain.exponentialRampToValueAtTime(.001,t+i*.12+.1);
   o.connect(g);g.connect(actx.destination);o.start(t+i*.12);o.stop(t+i*.12+.1);
  });
 }
}

// Game state
let started=false,gameOverState=false;
let round=1,p1Score=0,p2Score=0;
let roundMsg='',roundMsgTimer=0;
let shakeX=0,shakeY=0,shakeTimer=0;
let particles=[];
let koSlowmo=0;
const MAX_ROUNDS=3;
const MAX_HP=100;

// Keys
const keys={};
document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;keys[e.code]=true});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;keys[e.code]=false});

// Fighter
function createFighter(name,color,tutuColor,x,facing){
 return{
  name,color,tutuColor,x,y:0,vx:0,vy:0,facing,
  hp:MAX_HP,
  state:'idle',stateTimer:0,
  attackType:null,attackHit:false,
  animFrame:0,animTimer:0,
  hitstun:0,
  comboCount:0,comboTimer:0,
  specialCooldown:0,
  onGround:true,
  w:20,h:36
 };
}

let p1,p2;
function resetFighters(){
 p1=createFighter('PRIMA','#f4a','#f08',W/SCALE*.3,1);
 p2=createFighter('TUTU','#4af','#08f',W/SCALE*.7,-1);
 p1.hp=MAX_HP;p2.hp=MAX_HP;
 updateHUD();
}

function updateHUD(){
 document.getElementById('p1-hp').style.width=Math.max(0,p1.hp/MAX_HP*100)+'%';
 document.getElementById('p2-hp').style.width=Math.max(0,p2.hp/MAX_HP*100)+'%';
 document.getElementById('round-info').textContent='ROUND '+round;
 document.getElementById('score-info').textContent=p1Score+' - '+p2Score;
}

// Attack data
const ATTACKS={
 punch:{damage:8,range:22,startup:3,active:4,recovery:8,knockback:80,hitstun:.2,vy:0},
 kick:{damage:12,range:26,startup:5,active:4,recovery:12,knockback:120,hitstun:.3,vy:-60},
 special:{damage:20,range:30,startup:8,active:6,recovery:18,knockback:200,hitstun:.5,vy:-120}
};

function startAttack(fighter,type){
 if(fighter.state!=='idle'&&fighter.state!=='walk'&&fighter.state!=='jump')return;
 if(type==='special'&&fighter.specialCooldown>0)return;
 fighter.state='attack';fighter.attackType=type;
 fighter.stateTimer=0;fighter.attackHit=false;
 if(type==='special')fighter.specialCooldown=2;
}

function doAI(ai,target,dt){
 const dx=target.x-ai.x;
 const dist=Math.abs(dx);
 ai.facing=dx>0?1:-1;

 // Attack if in range
 if(dist<30&&ai.state==='idle'&&Math.random()<.04){
  const r=Math.random();
  if(r<.4)startAttack(ai,'punch');
  else if(r<.75)startAttack(ai,'kick');
  else if(ai.specialCooldown<=0)startAttack(ai,'special');
 }
 // Approach
 if(ai.state==='idle'||ai.state==='walk'){
  if(dist>35){ai.vx=ai.facing*100;ai.state='walk'}
  else if(dist<18){ai.vx=-ai.facing*60;ai.state='walk'}
  else{ai.vx=0;ai.state='idle'}
  // Random jump
  if(ai.onGround&&Math.random()<.01){ai.vy=-250;ai.onGround=false}
 }
 // Dodge: back away during hitstun
 if(ai.hitstun>0&&ai.onGround){ai.vx=-ai.facing*80}
}

function updateFighter(f,dt){
 const gY=groundY/SCALE;
 // Timers
 f.animTimer+=dt;
 if(f.animTimer>.12){f.animTimer=0;f.animFrame++}
 f.hitstun=Math.max(0,f.hitstun-dt);
 f.specialCooldown=Math.max(0,f.specialCooldown-dt);
 f.comboTimer=Math.max(0,f.comboTimer-dt);
 if(f.comboTimer<=0)f.comboCount=0;

 // Gravity
 if(!f.onGround){f.vy+=GRAVITY*dt;f.y+=f.vy*dt;
  if(f.y>=0){f.y=0;f.vy=0;f.onGround=true;if(f.state==='jump')f.state='idle'}
 }
 // Movement
 f.x+=f.vx*dt;
 // Clamp
 f.x=Math.max(10,Math.min(W/SCALE-10,f.x));
 // Attack state machine
 if(f.state==='attack'){
  const atk=ATTACKS[f.attackType];
  f.stateTimer+=dt*60;// frame-based timing
  const frame=Math.floor(f.stateTimer);
  if(frame>=atk.startup&&frame<atk.startup+atk.active){
   // Active frames — check hit
   if(!f.attackHit){
    const target=f===p1?p2:p1;
    const hx=f.x+f.facing*atk.range;
    if(Math.abs(hx-target.x)<16&&Math.abs(f.y-target.y)<20){
     // Hit!
     f.attackHit=true;
     target.hp-=atk.damage;
     target.hitstun=atk.hitstun;
     target.vx=f.facing*atk.knockback;
     target.vy=atk.vy;
     if(atk.vy<0)target.onGround=false;
     f.comboCount++;f.comboTimer=1;
     sfx(f.attackType==='special'?'special':f.attackType==='kick'?'kick':'hit');
     screenShake(f.attackType==='special'?6:3);
     spawnHitParticles(target.x,gY+target.y-18,f===p1?'#f4a':'#4af');
     if(f.comboCount>1)spawnComboText(target.x,gY+target.y-40,f.comboCount);
    }
   }
  }
  if(frame>=atk.startup+atk.active+atk.recovery){
   f.state='idle';f.attackType=null;
  }
 }
 // Friction
 if(f.onGround&&f.state!=='walk'){f.vx*=.85}
 if(f.hitstun>0&&f.onGround){f.vx*=.9}
}

function spawnHitParticles(x,y,color){
 for(let i=0;i<8;i++){
  const a=Math.random()*Math.PI*2,sp=40+Math.random()*100;
  particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-40,life:1,color,r:2+Math.random()*2,type:'spark'});
 }
}
function spawnComboText(x,y,count){
 particles.push({x,y,vx:0,vy:-30,life:1.2,color:'#ff0',r:0,type:'text',text:count+'x COMBO!'});
}
function screenShake(amount){shakeTimer=.15;shakeX=(Math.random()-.5)*amount;shakeY=(Math.random()-.5)*amount}

// Drawing pixel-art ballerinas
function drawBallerina(f){
 const gY=groundY/SCALE;
 const bx=Math.floor(f.x),by=Math.floor(gY+f.y);
 const dir=f.facing;
 const isHurt=f.hitstun>0;
 const flash=isHurt&&Math.floor(Date.now()/60)%2===0;

 X.save();X.translate(bx,by);X.scale(dir,1);

 const c=flash?'#fff':f.color;
 const tc=flash?'#fcc':f.tutuColor;

 // Shadow
 X.fillStyle='rgba(0,0,0,.3)';X.beginPath();X.ellipse(0,0,8,2,0,0,Math.PI*2);X.fill();

 // Legs
 const walkCycle=f.state==='walk'?Math.sin(f.animFrame*.8)*4:0;
 const kickLeg=f.state==='attack'&&f.attackType==='kick'&&f.stateTimer>3;
 X.fillStyle=c;
 // Left leg
 X.fillRect(-4,-2+walkCycle,3,-14);
 // Right leg (or kick)
 if(kickLeg){
  // Extended kick leg
  X.save();X.translate(2,-12);X.rotate(-.7);
  X.fillRect(0,0,3,16);X.restore();
 }else{
  X.fillRect(2,-2-walkCycle,3,-14);
 }
 // Tutu (triangle skirt)
 X.fillStyle=tc;
 X.beginPath();X.moveTo(-10,-14);X.lineTo(10,-14);X.lineTo(4,-20);X.lineTo(-4,-20);X.closePath();X.fill();
 // Tutu frills
 X.fillStyle=c;
 for(let i=-8;i<=8;i+=4){X.fillRect(i,-14,2,2)}
 // Body
 X.fillStyle=c;X.fillRect(-3,-20,6,-10);
 // Arms
 const punchArm=f.state==='attack'&&(f.attackType==='punch'||f.attackType==='special')&&f.stateTimer>2;
 const specialSpin=f.state==='attack'&&f.attackType==='special';
 if(punchArm){
  // Extended punch arm
  X.fillRect(3,-28,14,3);
  // Other arm back
  X.fillRect(-8,-26,5,2);
 }else if(specialSpin){
  // Pirouette arms — both extended
  const sa=Math.sin(f.stateTimer*.5)*3;
  X.fillRect(-10,-26+sa,7,2);X.fillRect(3,-26-sa,7,2);
 }else{
  // Ballet arms — graceful raised
  const anim=Math.sin(Date.now()*.003)*2;
  X.save();X.translate(-3,-26);X.rotate(-.4+anim*.05);X.fillRect(0,0,-8,2);X.restore();
  X.save();X.translate(3,-26);X.rotate(.4-anim*.05);X.fillRect(0,0,8,2);X.restore();
 }
 // Head
 X.fillStyle=c;X.fillRect(-4,-30,8,-8);
 // Hair bun
 X.fillStyle=flash?'#fdd':f.color==='#f4a'?'#c36':'#36c';
 X.beginPath();X.arc(0,-40,4,0,Math.PI*2);X.fill();
 // Hair detail
 X.fillRect(-3,-38,6,2);
 // Eyes
 if(isHurt){
  // X eyes
  X.fillStyle='#000';
  X.fillRect(-3,-36,2,2);X.fillRect(2,-36,2,2);
 }else{
  X.fillStyle='#000';
  X.fillRect(-2,-36,2,2);X.fillRect(2,-36,2,2);
  // Sparkle in eye
  X.fillStyle='#fff';X.fillRect(-2,-37,1,1);X.fillRect(2,-37,1,1);
 }
 // Mouth
 if(f.state==='attack'){X.fillStyle='#000';X.fillRect(-1,-33,3,1)}

 // Special effect: pirouette sparkles
 if(specialSpin){
  for(let i=0;i<4;i++){
   const sa=Date.now()*.01+i*1.5;
   const sr=12+Math.sin(Date.now()*.005)*3;
   X.fillStyle=i%2===0?'#ff0':'#fff';
   X.fillRect(Math.cos(sa)*sr,-20+Math.sin(sa)*sr,2,2);
  }
 }
 X.restore();
}

// Background: fight club basement
function drawArena(){
 // Ceiling
 X.fillStyle='#0a0008';X.fillRect(0,0,W/SCALE,H/SCALE);
 // Brick wall
 const gY=groundY/SCALE;
 const wallTop=gY-70;
 X.fillStyle='#1a0812';
 X.fillRect(0,wallTop,W/SCALE,70);
 // Brick pattern
 for(let row=0;row<8;row++){
  const offset=row%2===0?0:8;
  for(let col=-1;col<W/SCALE/16+1;col++){
   const bx=col*16+offset,by=wallTop+row*9;
   X.strokeStyle='rgba(80,20,40,.3)';X.lineWidth=.5;
   X.strokeRect(bx,by,16,9);
  }
 }
 // Hanging light
 X.fillStyle='#220010';X.fillRect(W/SCALE/2-1,0,2,wallTop-30);
 X.fillStyle='#ff8';X.globalAlpha=.6;
 X.beginPath();X.arc(W/SCALE/2,wallTop-28,4,0,Math.PI*2);X.fill();
 // Light cone
 X.globalAlpha=.03;X.fillStyle='#ff8';
 X.beginPath();X.moveTo(W/SCALE/2-4,wallTop-28);X.lineTo(W/SCALE/2-40,gY);X.lineTo(W/SCALE/2+40,gY);X.lineTo(W/SCALE/2+4,wallTop-28);X.closePath();X.fill();
 X.globalAlpha=1;
 // Floor
 X.fillStyle='#120810';X.fillRect(0,gY,W/SCALE,H/SCALE-gY);
 // Floor lines
 X.strokeStyle='rgba(100,20,50,.15)';X.lineWidth=.5;
 for(let i=0;i<W/SCALE;i+=12){X.beginPath();X.moveTo(i,gY);X.lineTo(i,H/SCALE);X.stroke()}
 // Ring ropes (crude)
 X.strokeStyle='rgba(255,68,170,.08)';X.lineWidth=1;
 X.beginPath();X.moveTo(8,gY-50);X.lineTo(W/SCALE-8,gY-50);X.stroke();
 X.beginPath();X.moveTo(8,gY-35);X.lineTo(W/SCALE-8,gY-35);X.stroke();
 // Corner posts
 X.fillStyle='#2a0818';
 X.fillRect(6,gY-55,4,55);X.fillRect(W/SCALE-10,gY-55,4,55);
 // "BRAWL" on wall
 X.font='700 8px Press Start 2P';X.textAlign='center';
 X.fillStyle='rgba(255,68,170,.06)';X.fillText('BRAWL',W/SCALE/2,wallTop+35);
}

// Game over screen — Johnny Bravo style
function drawGameOver(){
 const gY=groundY/SCALE;
 X.fillStyle='rgba(0,0,0,.7)';X.fillRect(0,0,W/SCALE,H/SCALE);

 const winner=p1Score>p2Score?p1:p2;
 const loser=p1Score>p2Score?p2:p1;

 // Johnny Bravo pose — winner doing a flex/comb hair pose
 const cx=W/SCALE/2,cy=gY-20;
 X.save();X.translate(cx,cy);

 // Spotlight
 X.fillStyle='rgba(255,255,100,.03)';
 X.beginPath();X.moveTo(-4,-50);X.lineTo(-35,10);X.lineTo(35,10);X.lineTo(4,-50);X.closePath();X.fill();

 // Big winner ballerina — exaggerated Bravo-style
 const wc=winner.color;
 const wtc=winner.tutuColor;
 // Legs — wide stance
 X.fillStyle=wc;
 X.fillRect(-8,0,4,-18);X.fillRect(5,0,4,-18);
 // Tutu — bigger
 X.fillStyle=wtc;
 X.beginPath();X.moveTo(-14,-16);X.lineTo(14,-16);X.lineTo(6,-22);X.lineTo(-6,-22);X.closePath();X.fill();
 // Body — buff/exaggerated
 X.fillStyle=wc;X.fillRect(-5,-22,10,-14);
 // Arms — flexing pose (Bravo style)
 X.fillRect(-5,-32,-10,3);X.fillRect(-15,-32,3,-8);// left arm up flex
 X.fillRect(5,-32,10,3);X.fillRect(12,-32,3,-8);// right arm up flex
 // Muscle bumps
 X.fillRect(-15,-40,5,3);X.fillRect(12,-40,5,3);
 // Head — big
 X.fillRect(-6,-36,12,-12);
 // Sunglasses (Bravo reference)
 X.fillStyle='#000';X.fillRect(-5,-44,4,3);X.fillRect(2,-44,4,3);X.fillRect(-1,-44,2,2);
 // Grin
 X.fillStyle='#fff';X.fillRect(-3,-40,7,2);
 // Hair — big pompadour
 X.fillStyle=winner.color==='#f4a'?'#c36':'#36c';
 X.fillRect(-7,-48,14,4);X.fillRect(-5,-52,10,4);X.fillRect(-3,-55,6,3);
 // Sparkle comb
 X.fillStyle='#ff0';
 X.fillRect(8,-38,5,2);X.fillRect(9,-40,3,2);X.fillRect(10,-36,1,2);
 // Stars around
 const st=Date.now()*.002;
 for(let i=0;i<5;i++){
  const sa=st+i*1.26,sr=25+Math.sin(st*2+i)*5;
  X.fillStyle=i%2?'#ff0':'#fff';
  X.fillRect(Math.cos(sa)*sr,-30+Math.sin(sa)*sr,2,2);
 }
 X.restore();

 // Loser — KO'd on ground
 X.save();X.translate(cx+30,gY-3);X.rotate(.2);
 X.fillStyle=loser.color;X.globalAlpha=.5;
 X.fillRect(-3,0,20,3);// body flat
 X.fillRect(-5,-2,5,5);// head
 // X eyes
 X.fillStyle='#000';X.fillRect(-4,-1,1,1);X.fillRect(-2,-1,1,1);
 // Dizzy stars
 for(let i=0;i<3;i++){
  const da=Date.now()*.005+i*2.1;
  X.fillStyle='#ff0';X.fillRect(-3+Math.cos(da)*5,-5+Math.sin(da)*3,1,1);
 }
 X.globalAlpha=1;X.restore();

 // Text
 X.font='700 6px Press Start 2P';X.textAlign='center';
 X.fillStyle='#ff0';X.fillText('K.O.!',cx,gY-65);
 X.font='700 4px Press Start 2P';
 X.fillStyle='#fff';X.fillText(winner.name+' WINS!',cx,gY-58);
 X.fillStyle='rgba(255,255,255,.3)';X.font='400 3px Silkscreen';
 X.fillText('"Do the monkey with me!"',cx,gY+10);
 X.fillText('TAP TO REMATCH',cx,gY+18);
}

// Round transition
let roundTransition=0,roundTransMsg='';
function startRound(){
 resetFighters();
 roundTransition=2;
 roundTransMsg='ROUND '+round;
 sfx('round');
}

function checkRoundEnd(){
 if(p1.hp<=0||p2.hp<=0){
  sfx('ko');koSlowmo=.8;
  if(p1.hp<=0)p2Score++;
  if(p2.hp<=0)p1Score++;
  updateHUD();
  if(p1Score>=2||p2Score>=2||round>=MAX_ROUNDS){
   // Game over
   setTimeout(()=>{gameOverState=true},1200);
  }else{
   round++;
   setTimeout(()=>startRound(),1500);
  }
  return true;
 }
 return false;
}

function update(dt){
 if(!started||gameOverState)return;
 // Slowmo
 if(koSlowmo>0){dt*=.3;koSlowmo-=dt*3}
 // Round transition
 if(roundTransition>0){roundTransition-=dt;return}
 // P1 input
 if(p1.hitstun<=0&&p1.state!=='attack'){
  if(keys['a']){p1.vx=-100;p1.state='walk';p1.facing=-1}
  else if(keys['d']){p1.vx=100;p1.state='walk';p1.facing=1}
  else if(p1.state==='walk'&&p1.onGround){p1.state='idle';p1.vx=0}
  if(keys['w']&&p1.onGround){p1.vy=-260;p1.onGround=false;p1.state='jump'}
 }
 if(keys['f']){keys['f']=false;startAttack(p1,'punch')}
 if(keys['g']){keys['g']=false;startAttack(p1,'kick')}
 if(keys['r']){keys['r']=false;startAttack(p1,'special')}
 // P2: check if anyone is pressing P2 keys, otherwise AI
 let p2Human=keys['arrowleft']||keys['arrowright']||keys['arrowup']||keys['j']||keys['k']||keys['u'];
 if(p2Human||keys['_p2active']){
  keys['_p2active']=true;
  if(p2.hitstun<=0&&p2.state!=='attack'){
   if(keys['arrowleft']){p2.vx=-100;p2.state='walk';p2.facing=-1}
   else if(keys['arrowright']){p2.vx=100;p2.state='walk';p2.facing=1}
   else if(p2.state==='walk'&&p2.onGround){p2.state='idle';p2.vx=0}
   if(keys['arrowup']&&p2.onGround){p2.vy=-260;p2.onGround=false;p2.state='jump'}
  }
  if(keys['j']){keys['j']=false;startAttack(p2,'punch')}
  if(keys['k']){keys['k']=false;startAttack(p2,'kick')}
  if(keys['u']){keys['u']=false;startAttack(p2,'special')}
 }else{
  doAI(p2,p1,dt);
 }
 // Face opponent (when idle)
 if(p1.state==='idle'){p1.facing=p2.x>p1.x?1:-1}
 if(p2.state==='idle'&&!keys['_p2active']){p2.facing=p1.x>p2.x?1:-1}

 updateFighter(p1,dt);updateFighter(p2,dt);
 // Check KO
 if(p1.hp<=0||p2.hp<=0)checkRoundEnd();
 // Shake
 if(shakeTimer>0){shakeTimer-=dt;shakeX*=.8;shakeY*=.8}else{shakeX=0;shakeY=0}
 // Particles
 particles.forEach(p=>{
  if(p.type==='text'){p.y+=p.vy*dt;p.life-=dt}
  else{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt*2}
 });
 particles=particles.filter(p=>p.life>0);
 updateHUD();
}

function draw(){
 PW=W/SCALE;PH=H/SCALE;
 X.save();
 X.setTransform(SCALE,0,0,SCALE,shakeX*SCALE,shakeY*SCALE);
 drawArena();
 // Fighters
 drawBallerina(p1);drawBallerina(p2);
 // Particles
 particles.forEach(p=>{
  X.globalAlpha=Math.min(1,p.life*2);
  if(p.type==='text'){
   X.font='700 4px Press Start 2P';X.textAlign='center';
   X.fillStyle=p.color;X.fillText(p.text,p.x,p.y);
  }else{
   X.fillStyle=p.color;X.fillRect(p.x-p.r/2,p.y-p.r/2,p.r,p.r);
  }
 });
 X.globalAlpha=1;
 // Round transition text
 if(roundTransition>0){
  X.fillStyle='rgba(0,0,0,.5)';X.fillRect(0,0,PW,PH);
  X.font='700 8px Press Start 2P';X.textAlign='center';
  X.fillStyle='#ff0';X.fillText(roundTransMsg,PW/2,PH/2-4);
  X.font='400 4px Silkscreen';X.fillStyle='rgba(255,255,255,.4)';
  X.fillText('GET READY',PW/2,PH/2+6);
 }
 // Game over
 if(gameOverState)drawGameOver();
 X.restore();
}

function resize(){
 W=CN.width=window.innerWidth;H=CN.height=window.innerHeight;
 groundY=H*GROUND_Y_FRAC;
}
resize();window.addEventListener('resize',resize);

// Start
document.getElementById('start').addEventListener('click',()=>{
 if(started)return;started=true;
 document.getElementById('start').style.display='none';
 document.getElementById('hud').classList.add('show');
 initAudio();
 round=1;p1Score=0;p2Score=0;gameOverState=false;
 startRound();
});
CN.addEventListener('click',()=>{
 if(gameOverState){
  gameOverState=false;round=1;p1Score=0;p2Score=0;koSlowmo=0;
  startRound();
 }
});

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.033);lastTime=t;
 update(dt);draw();
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
