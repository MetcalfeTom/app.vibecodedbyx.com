<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sugar Dungeon</title>
<link rel="icon" href="https://emojicdn.elk.sh/🍬">
<meta property="og:title" content="Sugar Dungeon">
<meta property="og:description" content="A candy roguelike with marshmallow bosses and peppermint fire. How deep can you go?">
<meta property="og:url" content="https://sloppy.live/sugar-dungeon">
<meta property="og:image" content="https://sloppy.live/sugar-dungeon/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#1a0a1e;overflow:hidden;font-family:'Bubblegum Sans',sans-serif;user-select:none;-webkit-user-select:none}
canvas{display:block}
#hud{position:fixed;top:0;left:0;right:0;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:10}
#hud-left{display:flex;gap:14px;align-items:center}
.hud-item{font-size:15px;color:#ffd4e8;text-shadow:0 0 6px rgba(255,100,180,0.4)}
.hud-item span{font-family:'DotGothic16',monospace;font-weight:400}
#hp-bar-bg{width:120px;height:12px;background:rgba(0,0,0,0.4);border-radius:6px;border:1px solid rgba(255,100,150,0.3);overflow:hidden}
#hp-bar{height:100%;background:linear-gradient(90deg,#ff4488,#ff88aa);border-radius:6px;transition:width .2s}
#hud-right{font-family:'DotGothic16',monospace;font-size:13px;color:rgba(255,200,230,0.5)}
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(26,10,30,0.92);z-index:20}
.overlay h1{font-size:clamp(28px,7vw,50px);color:#ff88cc;text-shadow:0 0 20px rgba(255,100,200,0.4),0 2px 0 #cc4488;margin-bottom:6px}
.overlay .sub{font-family:'DotGothic16',monospace;font-size:14px;color:rgba(255,200,230,0.5);margin-bottom:24px;letter-spacing:1px}
.overlay .controls{font-family:'DotGothic16',monospace;font-size:11px;color:rgba(255,200,230,0.3);margin-bottom:20px;text-align:center;line-height:2}
.overlay button{font-family:'Bubblegum Sans',sans-serif;font-size:18px;background:linear-gradient(135deg,#ff4488,#ff88cc);border:none;border-radius:20px;color:#fff;padding:12px 36px;cursor:pointer;text-shadow:0 1px 2px rgba(0,0,0,0.3);transition:transform .15s,box-shadow .15s}
.overlay button:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(255,100,200,0.3)}
#game-over{display:none}
#game-over h1{color:#ff4466}
#game-over .stats{font-size:16px;color:#ffd4e8;margin-bottom:20px;line-height:1.8}
#mobile-pad{position:fixed;bottom:14px;left:14px;z-index:15;display:none}
@media(pointer:coarse){#mobile-pad{display:block}}
.dpad{width:130px;height:130px;position:relative}
.dpad button{position:absolute;width:40px;height:40px;border-radius:8px;border:1px solid rgba(255,100,200,0.3);background:rgba(255,68,136,0.12);color:rgba(255,200,230,0.5);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.dpad .up{top:0;left:45px}
.dpad .down{bottom:0;left:45px}
.dpad .left{top:45px;left:0}
.dpad .right{top:45px;right:0}
#mobile-atk{position:fixed;bottom:30px;right:20px;z-index:15;display:none;width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,100,200,0.4);background:rgba(255,68,136,0.15);color:#ff88cc;font-size:22px;cursor:pointer}
@media(pointer:coarse){#mobile-atk{display:flex;align-items:center;justify-content:center}}
#backlink{position:fixed;bottom:3px;left:50%;transform:translateX(-50%);font-size:10px;z-index:5;opacity:0.15}
#backlink a{color:#ff88cc;text-decoration:none;font-family:'DotGothic16',monospace}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="hud-left">
    <div class="hud-item">HP <div id="hp-bar-bg"><div id="hp-bar" style="width:100%"></div></div></div>
    <div class="hud-item">LV <span id="h-lv">1</span></div>
    <div class="hud-item">ATK <span id="h-atk">3</span></div>
  </div>
  <div id="hud-right">
    <span id="h-floor">F1</span> | <span id="h-candy">0</span> candy | <span id="h-kills">0</span> kills
  </div>
</div>
<div class="overlay" id="start-screen">
  <h1>Sugar Dungeon</h1>
  <div class="sub">a candy roguelike</div>
  <div class="controls">WASD/Arrows — move &nbsp;|&nbsp; Space/F — attack<br>Collect candy, slay gummies, defeat marshmallow bosses</div>
  <button onclick="startGame()">Enter the Dungeon</button>
</div>
<div class="overlay" id="game-over">
  <h1>Sugar Crash!</h1>
  <div class="stats" id="go-stats"></div>
  <button onclick="startGame()">Try Again</button>
</div>
<div id="mobile-pad"><div class="dpad">
  <button class="up" id="m-up">▲</button>
  <button class="down" id="m-down">▼</button>
  <button class="left" id="m-left">◀</button>
  <button class="right" id="m-right">▶</button>
</div></div>
<button id="mobile-atk">⚔</button>
<div id="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);

const TILE=28;
const MAP_W=24,MAP_H=20;
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function sfx(f,d,t,v){if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'square';o.frequency.setValueAtTime(f,audioCtx.currentTime);g.gain.setValueAtTime(v||0.04,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}

// Tile types
const T_FLOOR=0,T_WALL=1,T_CANDY=2,T_STAIRS=3,T_LOLLIPOP=4,T_PEPFIRE=5;

let map,player,enemies,particles,floor,candy,kills,gameRunning,turnLock;
const keys={};
addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()});
addEventListener('keyup',e=>keys[e.code]=false);

// Mobile
const mobileMap={'m-up':'ArrowUp','m-down':'ArrowDown','m-left':'ArrowLeft','m-right':'ArrowRight'};
Object.entries(mobileMap).forEach(([id,key])=>{const el=document.getElementById(id);if(!el)return;el.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true});el.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false})});
document.getElementById('mobile-atk').addEventListener('touchstart',e=>{e.preventDefault();keys['Space']=true});
document.getElementById('mobile-atk').addEventListener('touchend',e=>{e.preventDefault();keys['Space']=false});

// Colors
const CANDY_COLORS=['#ff6699','#66ffcc','#ffcc33','#cc66ff','#66ccff','#ff9966'];
const FLOOR_COLORS=['#2a1530','#281432','#2c162e'];
const WALL_COLORS=['#6b3a7a','#7a4488','#5c2d6e'];

// Map generation — rooms and corridors
function generateMap(){
  map=[];
  for(let y=0;y<MAP_H;y++){map[y]=[];for(let x=0;x<MAP_W;x++)map[y][x]=T_WALL}

  const rooms=[];
  const attempts=60;
  for(let i=0;i<attempts;i++){
    const rw=3+Math.floor(Math.random()*5);
    const rh=3+Math.floor(Math.random()*4);
    const rx=1+Math.floor(Math.random()*(MAP_W-rw-2));
    const ry=1+Math.floor(Math.random()*(MAP_H-rh-2));
    let overlap=false;
    for(const r of rooms){
      if(rx<=r.x+r.w+1&&rx+rw>=r.x-1&&ry<=r.y+r.h+1&&ry+rh>=r.y-1){overlap=true;break}
    }
    if(overlap)continue;
    rooms.push({x:rx,y:ry,w:rw,h:rh});
    for(let dy=0;dy<rh;dy++)for(let dx=0;dx<rw;dx++)map[ry+dy][rx+dx]=T_FLOOR;
  }

  // Corridors
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1],b=rooms[i];
    let cx=Math.floor(a.x+a.w/2),cy=Math.floor(a.y+a.h/2);
    const tx=Math.floor(b.x+b.w/2),ty=Math.floor(b.y+b.h/2);
    while(cx!==tx){cx+=cx<tx?1:-1;if(cy>=0&&cy<MAP_H&&cx>=0&&cx<MAP_W)map[cy][cx]=T_FLOOR}
    while(cy!==ty){cy+=cy<ty?1:-1;if(cy>=0&&cy<MAP_H&&cx>=0&&cx<MAP_W)map[cy][cx]=T_FLOOR}
  }

  // Scatter candy
  let candyCount=5+floor*2;
  while(candyCount>0){
    const x=Math.floor(Math.random()*MAP_W),y=Math.floor(Math.random()*MAP_H);
    if(map[y][x]===T_FLOOR){map[y][x]=T_CANDY;candyCount--}
  }

  // Lollipop healing (rare)
  let lolliCount=1+Math.floor(floor/3);
  while(lolliCount>0){
    const x=Math.floor(Math.random()*MAP_W),y=Math.floor(Math.random()*MAP_H);
    if(map[y][x]===T_FLOOR){map[y][x]=T_LOLLIPOP;lolliCount--}
  }

  // Peppermint fire traps
  let fireCount=Math.floor(floor*1.5);
  while(fireCount>0){
    const x=Math.floor(Math.random()*MAP_W),y=Math.floor(Math.random()*MAP_H);
    if(map[y][x]===T_FLOOR){map[y][x]=T_PEPFIRE;fireCount--}
  }

  // Stairs in last room
  const lastRoom=rooms[rooms.length-1];
  const sx=lastRoom.x+Math.floor(lastRoom.w/2);
  const sy=lastRoom.y+Math.floor(lastRoom.h/2);
  map[sy][sx]=T_STAIRS;

  // Enemies
  enemies=[];
  const enemyCount=3+floor*2;
  const isBossFloor=floor%5===0;
  for(let i=0;i<enemyCount;i++){
    let ex,ey;
    do{ex=Math.floor(Math.random()*MAP_W);ey=Math.floor(Math.random()*MAP_H)}
    while(map[ey][ex]!==T_FLOOR||Math.hypot(ex-player.x,ey-player.y)<5);
    const types=['gummy','jellybean','licorice','caramel'];
    const type=types[Math.floor(Math.random()*Math.min(types.length,1+Math.floor(floor/2)))];
    const e=makeEnemy(type,ex,ey);
    enemies.push(e);
  }
  // Boss on boss floors
  if(isBossFloor){
    let bx,by;
    const bRoom=rooms[Math.floor(rooms.length/2)];
    bx=bRoom.x+Math.floor(bRoom.w/2);by=bRoom.y+Math.floor(bRoom.h/2);
    if(map[by][bx]===T_FLOOR||map[by][bx]===T_CANDY){
      map[by][bx]=T_FLOOR;
      enemies.push(makeEnemy('marshmallow',bx,by));
    }
  }

  return rooms[0]; // Start room
}

function makeEnemy(type,x,y){
  const base={x,y,type,stunned:0,flash:0};
  if(type==='gummy'){return{...base,hp:3+floor,maxHp:3+floor,atk:1+Math.floor(floor/3),color:'#ff4488',char:'G',xp:2}}
  if(type==='jellybean'){return{...base,hp:2+floor,maxHp:2+floor,atk:2+Math.floor(floor/2),color:'#44ddff',char:'J',xp:3}}
  if(type==='licorice'){return{...base,hp:5+floor*2,maxHp:5+floor*2,atk:2+Math.floor(floor/2),color:'#222',char:'L',xp:5}}
  if(type==='caramel'){return{...base,hp:4+floor,maxHp:4+floor,atk:3+Math.floor(floor/2),color:'#cc8833',char:'C',xp:4}}
  if(type==='marshmallow'){return{...base,hp:20+floor*5,maxHp:20+floor*5,atk:4+floor,color:'#fff0f5',char:'M',xp:20+floor*3,boss:true}}
  return base;
}

function startGame(){
  if(audioCtx.state==='suspended')audioCtx.resume();
  document.getElementById('start-screen').style.display='none';
  document.getElementById('game-over').style.display='none';
  floor=1;candy=0;kills=0;
  player={x:0,y:0,hp:20,maxHp:20,atk:3,lv:1,xp:0,xpNext:10,dir:{x:1,y:0}};
  particles=[];turnLock=0;
  const start=generateMap();
  player.x=start.x+Math.floor(start.w/2);
  player.y=start.y+Math.floor(start.h/2);
  gameRunning=true;
  updateHUD();
}

function updateHUD(){
  document.getElementById('hp-bar').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('h-lv').textContent=player.lv;
  document.getElementById('h-atk').textContent=player.atk;
  document.getElementById('h-floor').textContent='F'+floor;
  document.getElementById('h-candy').textContent=candy;
  document.getElementById('h-kills').textContent=kills;
}

function spawnParticles(x,y,count,color,speed){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*(speed||3);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:15+Math.random()*15,maxLife:30,color,size:2+Math.random()*3});
  }
}

function levelUp(){
  player.lv++;
  player.maxHp+=5;
  player.hp=player.maxHp;
  player.atk+=1+Math.floor(player.lv/3);
  player.xpNext=Math.floor(player.xpNext*1.6);
  player.xp=0;
  sfx(600,0.1,'sine',0.05);sfx(800,0.08,'sine',0.04);sfx(1000,0.1,'sine',0.03);
  const sc=toScreen(player.x,player.y);
  spawnParticles(sc.x,sc.y,20,'#ffcc00',4);
}

function attack(dx,dy){
  const tx=player.x+dx,ty=player.y+dy;
  const target=enemies.find(e=>e.x===tx&&e.y===ty&&e.hp>0);
  if(!target)return false;
  const dmg=player.atk+Math.floor(Math.random()*3);
  target.hp-=dmg;target.flash=4;
  target.stunned=2;
  sfx(300,0.08,'sawtooth',0.05);
  const sc=toScreen(tx,ty);
  spawnParticles(sc.x,sc.y,6,target.color,3);
  if(target.hp<=0){
    kills++;
    player.xp+=target.xp;
    if(player.xp>=player.xpNext)levelUp();
    sfx(500,0.1,'sine',0.04);sfx(700,0.08,'sine',0.03);
    spawnParticles(sc.x,sc.y,15,target.color,5);
    if(target.boss){
      spawnParticles(sc.x,sc.y,30,'#fff0f5',6);
      spawnParticles(sc.x,sc.y,20,'#ff88cc',4);
    }
  }
  return true;
}

function playerTurn(){
  let dx=0,dy=0,acted=false;
  if(keys['ArrowUp']||keys['KeyW']){dy=-1}
  else if(keys['ArrowDown']||keys['KeyS']){dy=1}
  else if(keys['ArrowLeft']||keys['KeyA']){dx=-1}
  else if(keys['ArrowRight']||keys['KeyD']){dx=1}
  else if(keys['Space']||keys['KeyF']){
    dx=player.dir.x;dy=player.dir.y;
    if(attack(dx,dy)){acted=true;dx=0;dy=0}
    else return false;
  }
  if(dx===0&&dy===0&&!acted)return false;
  if(dx||dy)player.dir={x:dx,y:dy};

  if(!acted){
    const nx=player.x+dx,ny=player.y+dy;
    if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H)return false;
    // Attack if enemy there
    if(enemies.some(e=>e.x===nx&&e.y===ny&&e.hp>0)){
      attack(dx,dy);
    } else if(map[ny][nx]!==T_WALL){
      player.x=nx;player.y=ny;
      sfx(200,0.03,'sine',0.02);
      // Pickup
      if(map[ny][nx]===T_CANDY){map[ny][nx]=T_FLOOR;candy++;sfx(800,0.06,'sine',0.04);const sc=toScreen(nx,ny);spawnParticles(sc.x,sc.y,8,'#ffcc33',3)}
      if(map[ny][nx]===T_LOLLIPOP){map[ny][nx]=T_FLOOR;player.hp=Math.min(player.maxHp,player.hp+8);sfx(600,0.1,'sine',0.05);const sc=toScreen(nx,ny);spawnParticles(sc.x,sc.y,10,'#ff66aa',3)}
      if(map[ny][nx]===T_PEPFIRE){
        map[ny][nx]=T_FLOOR;
        const dmg=2+Math.floor(floor/2);
        player.hp-=dmg;
        sfx(150,0.15,'sawtooth',0.06);
        const sc=toScreen(nx,ny);
        spawnParticles(sc.x,sc.y,12,'#ff2200',4);
        spawnParticles(sc.x,sc.y,8,'#fff',3);
        if(player.hp<=0){endGame();return true}
      }
      if(map[ny][nx]===T_STAIRS){
        floor++;
        const start=generateMap();
        player.x=start.x+Math.floor(start.w/2);
        player.y=start.y+Math.floor(start.h/2);
        sfx(400,0.1,'sine',0.04);sfx(500,0.08,'sine',0.03);
      }
    } else return false;
  }
  return true;
}

function enemyTurns(){
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    if(e.stunned>0){e.stunned--;return}
    // Move toward player
    const dx=Math.sign(player.x-e.x);
    const dy=Math.sign(player.y-e.y);
    // Adjacent? Attack
    if(Math.abs(player.x-e.x)+Math.abs(player.y-e.y)===1){
      const dmg=e.atk+Math.floor(Math.random()*2);
      player.hp-=dmg;
      sfx(180,0.1,'sawtooth',0.04);
      const sc=toScreen(player.x,player.y);
      spawnParticles(sc.x,sc.y,4,'#ff4466',2);
      if(player.hp<=0)endGame();
      return;
    }
    // Move
    const moves=[];
    if(dx!==0)moves.push({x:dx,y:0});
    if(dy!==0)moves.push({x:0,y:dy});
    // Shuffle for variety
    if(Math.random()>0.5&&moves.length>1)[moves[0],moves[1]]=[moves[1],moves[0]];
    for(const m of moves){
      const nx=e.x+m.x,ny=e.y+m.y;
      if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H)continue;
      if(map[ny][nx]===T_WALL)continue;
      if(enemies.some(o=>o!==e&&o.x===nx&&o.y===ny&&o.hp>0))continue;
      if(nx===player.x&&ny===player.y)continue;
      e.x=nx;e.y=ny;
      break;
    }
  });
  enemies=enemies.filter(e=>e.hp>0||e.flash>0);
}

function endGame(){
  gameRunning=false;
  document.getElementById('go-stats').innerHTML=
    `Floor ${floor} | Level ${player.lv}<br>${candy} candy | ${kills} kills`;
  document.getElementById('game-over').style.display='flex';
  sfx(150,0.4,'sawtooth',0.08);
}

// Rendering
function toScreen(tx,ty){
  const ox=W/2-(player.x+0.5)*TILE;
  const oy=H/2-(player.y+0.5)*TILE;
  return{x:ox+tx*TILE+TILE/2,y:oy+ty*TILE+TILE/2};
}

let animFrame=0;
function draw(){
  animFrame++;
  ctx.fillStyle='#1a0a1e';
  ctx.fillRect(0,0,W,H);

  if(!gameRunning&&document.getElementById('start-screen').style.display!=='none'){requestAnimationFrame(draw);return}

  const ox=Math.floor(W/2-(player.x+0.5)*TILE);
  const oy=Math.floor(H/2-(player.y+0.5)*TILE);

  // Visible range
  const startX=Math.max(0,Math.floor(-ox/TILE)-1);
  const startY=Math.max(0,Math.floor(-oy/TILE)-1);
  const endX=Math.min(MAP_W,Math.ceil((W-ox)/TILE)+1);
  const endY=Math.min(MAP_H,Math.ceil((H-oy)/TILE)+1);

  // Draw map
  for(let y=startY;y<endY;y++){
    for(let x=startX;x<endX;x++){
      const sx=ox+x*TILE,sy=oy+y*TILE;
      const dist=Math.hypot(x-player.x,y-player.y);
      const vis=Math.max(0,1-dist/8);
      if(vis<=0)continue;
      ctx.globalAlpha=vis;
      const tile=map[y][x];
      if(tile===T_WALL){
        const ci=(x*7+y*13)%WALL_COLORS.length;
        ctx.fillStyle=WALL_COLORS[ci];
        ctx.fillRect(sx,sy,TILE,TILE);
        // Wafer pattern
        ctx.strokeStyle='rgba(255,255,255,0.05)';
        ctx.lineWidth=1;
        ctx.strokeRect(sx+2,sy+2,TILE-4,TILE-4);
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+TILE,sy+TILE);ctx.stroke();
      } else {
        const ci=(x*3+y*5)%FLOOR_COLORS.length;
        ctx.fillStyle=FLOOR_COLORS[ci];
        ctx.fillRect(sx,sy,TILE,TILE);
        // Checkerboard
        if((x+y)%2===0){ctx.fillStyle='rgba(255,255,255,0.015)';ctx.fillRect(sx,sy,TILE,TILE)}
      }

      // Items
      if(tile===T_CANDY){
        const bob=Math.sin(animFrame*0.06+x+y)*2;
        const cc=CANDY_COLORS[(x*3+y*7)%CANDY_COLORS.length];
        ctx.fillStyle=cc;
        ctx.shadowColor=cc;ctx.shadowBlur=6;
        ctx.beginPath();ctx.arc(sx+TILE/2,sy+TILE/2+bob,5,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      }
      if(tile===T_LOLLIPOP){
        const bob=Math.sin(animFrame*0.05+x)*2;
        ctx.fillStyle='#ff66aa';
        ctx.shadowColor='#ff66aa';ctx.shadowBlur=8;
        ctx.beginPath();ctx.arc(sx+TILE/2,sy+TILE/2-3+bob,6,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffaacc';
        ctx.beginPath();ctx.arc(sx+TILE/2,sy+TILE/2-3+bob,3,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
        ctx.strokeStyle='#cc4488';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(sx+TILE/2,sy+TILE/2+3+bob);ctx.lineTo(sx+TILE/2,sy+TILE/2+10+bob);ctx.stroke();
      }
      if(tile===T_PEPFIRE){
        // Peppermint fire
        const flicker=Math.sin(animFrame*0.15+x*3+y*5)*3;
        ctx.fillStyle='#ff2200';ctx.shadowColor='#ff4400';ctx.shadowBlur=10;
        // Flame shape
        ctx.beginPath();
        ctx.moveTo(sx+TILE/2,sy+4+flicker);
        ctx.quadraticCurveTo(sx+TILE/2+8,sy+TILE/2,sx+TILE/2,sy+TILE-4);
        ctx.quadraticCurveTo(sx+TILE/2-8,sy+TILE/2,sx+TILE/2,sy+4+flicker);
        ctx.fill();
        // White peppermint stripe
        ctx.fillStyle='rgba(255,255,255,0.5)';
        ctx.fillRect(sx+TILE/2-1,sy+8+flicker,2,TILE-14);
        ctx.shadowBlur=0;
      }
      if(tile===T_STAIRS){
        ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=8;
        ctx.fillRect(sx+4,sy+TILE-8,TILE-8,4);
        ctx.fillRect(sx+6,sy+TILE-14,TILE-12,4);
        ctx.fillRect(sx+8,sy+TILE-20,TILE-16,4);
        ctx.shadowBlur=0;
      }
    }
  }
  ctx.globalAlpha=1;

  // Draw enemies
  enemies.forEach(e=>{
    if(e.hp<=0&&e.flash<=0)return;
    const dist=Math.hypot(e.x-player.x,e.y-player.y);
    const vis=Math.max(0,1-dist/8);
    if(vis<=0)return;
    const sx=ox+e.x*TILE,sy=oy+e.y*TILE;
    ctx.globalAlpha=vis*(e.hp<=0?0.4:1);
    if(e.flash>0){ctx.globalAlpha=1;e.flash--}

    if(e.boss){
      // Marshmallow boss — big squishy boi
      const squish=Math.sin(animFrame*0.04)*2;
      ctx.fillStyle=e.flash>0?'#fff':'#fff0f5';
      ctx.shadowColor='#ffaacc';ctx.shadowBlur=12;
      // Body
      ctx.beginPath();
      ctx.ellipse(sx+TILE/2,sy+TILE/2+squish,TILE*0.45,TILE*0.4-squish/2,0,0,Math.PI*2);
      ctx.fill();
      ctx.shadowBlur=0;
      // Face
      ctx.fillStyle='#cc4488';
      ctx.fillRect(sx+8,sy+10,3,3);
      ctx.fillRect(sx+17,sy+10,3,3);
      ctx.fillRect(sx+10,sy+16,8,2);
      // HP bar
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(sx,sy-6,TILE,4);
      ctx.fillStyle='#ff4488';ctx.fillRect(sx,sy-6,TILE*(e.hp/e.maxHp),4);
    } else {
      // Regular enemies
      ctx.fillStyle=e.flash>0?'#fff':e.color;
      ctx.shadowColor=e.color;ctx.shadowBlur=6;
      if(e.type==='gummy'){
        // Gummy bear shape
        ctx.beginPath();
        ctx.arc(sx+TILE/2,sy+TILE/2,TILE*0.35,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(sx+8,sy+6,3,0,Math.PI*2);ctx.fill(); // ear
        ctx.beginPath();ctx.arc(sx+20,sy+6,3,0,Math.PI*2);ctx.fill(); // ear
      } else if(e.type==='jellybean'){
        ctx.beginPath();
        ctx.ellipse(sx+TILE/2,sy+TILE/2,TILE*0.4,TILE*0.28,0,0,Math.PI*2);ctx.fill();
      } else if(e.type==='licorice'){
        ctx.fillRect(sx+6,sy+4,TILE-12,TILE-8);
        ctx.fillStyle='#444';ctx.fillRect(sx+8,sy+8,TILE-16,2);ctx.fillRect(sx+8,sy+14,TILE-16,2);
      } else {
        ctx.beginPath();ctx.arc(sx+TILE/2,sy+TILE/2,TILE*0.35,0,Math.PI*2);ctx.fill();
      }
      ctx.shadowBlur=0;
      // Eyes
      if(e.hp>0){
        ctx.fillStyle=e.type==='licorice'?'#ff4444':'#fff';
        ctx.fillRect(sx+9,sy+10,3,3);ctx.fillRect(sx+16,sy+10,3,3);
      }
    }
  });
  ctx.globalAlpha=1;

  // Draw player — candy warrior
  const px=ox+player.x*TILE,py=oy+player.y*TILE;
  const bob=Math.sin(animFrame*0.08)*1.5;
  ctx.fillStyle='#ff88cc';ctx.shadowColor='#ff88cc';ctx.shadowBlur=10;
  // Body
  ctx.beginPath();ctx.arc(px+TILE/2,py+TILE/2+bob,TILE*0.38,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Face
  ctx.fillStyle='#fff';
  ctx.fillRect(px+9,py+10+bob,3,3);ctx.fillRect(px+16,py+10+bob,3,3);
  ctx.fillStyle='#ff4488';
  ctx.fillRect(px+11,py+16+bob,6,2);
  // Direction indicator (weapon)
  const wx=px+TILE/2+player.dir.x*12;
  const wy=py+TILE/2+player.dir.y*12+bob;
  ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.shadowColor='#ffd700';ctx.shadowBlur=4;
  ctx.beginPath();ctx.moveTo(px+TILE/2,py+TILE/2+bob);ctx.lineTo(wx,wy);ctx.stroke();
  ctx.shadowBlur=0;

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    if(p.life<=0)particles.splice(i,1);
  }
  ctx.globalAlpha=1;

  requestAnimationFrame(draw);
}

// Turn-based input loop
let lastMove=0;
function inputLoop(){
  if(!gameRunning){requestAnimationFrame(inputLoop);return}
  const now=Date.now();
  if(now-lastMove>130){
    const moved=playerTurn();
    if(moved&&gameRunning){
      enemyTurns();
      updateHUD();
      lastMove=now;
    }
  }
  // Clear one-shot keys
  delete keys['Space'];delete keys['KeyF'];
  requestAnimationFrame(inputLoop);
}

draw();
inputLoop();
</script>
