<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Graffiti Chaos Wall · Permanent Unhinged Thoughts</title>
<meta name="description" content="A neon brick wall where every viewer can spray-paint a permanent unhinged thought. Live database. No takedowns." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%BB" />
<meta property="og:title" content="Graffiti Chaos Wall" />
<meta property="og:description" content="Spray a permanent unhinged thought onto a neon brick wall. Database-backed. Lives forever." />
<meta property="og:url" content="https://sloppy.live/graffiti-chaos-wall/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20pink%20cyan%20yellow%20graffiti%20on%20dark%20brick%20wall%20alley%20cyberpunk%20night?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Bungee+Shade&family=Permanent+Marker&family=Bowlby+One&family=Rubik+Mono+One&family=Black+Ops+One&family=Special+Elite&family=VT323&family=Major+Mono+Display&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --neonPink:#ff2bd6;
  --neonCyan:#00f0ff;
  --neonYellow:#fff04b;
  --neonGreen:#5dffb3;
  --neonOrange:#ff8a3d;
  --neonRed:#ff3a52;
  --neonViolet:#b86bff;
  --neonWhite:#fbf2dc;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Space Mono', monospace;
  color:var(--neonWhite);
  background:#050009;
  user-select:none;
}

/* === BRICK WALL === */
#wall{
  position:fixed;inset:0;
  background:
    /* mortar grout pattern */
    repeating-linear-gradient(0deg,
      rgba(0,0,0,0.55) 0 2px,
      transparent 2px 64px),
    repeating-linear-gradient(90deg,
      rgba(0,0,0,0.55) 0 2px,
      transparent 2px 130px),
    /* offset every other row */
    radial-gradient(ellipse at 30% 20%, rgba(255,43,214,0.18), transparent 55%),
    radial-gradient(ellipse at 75% 80%, rgba(0,240,255,0.14), transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(184,107,255,0.16), transparent 55%),
    linear-gradient(180deg, #1d0824 0%, #160418 60%, #0a0210 100%);
  background-size:
    100% 64px,
    260px 64px,
    auto, auto, auto, auto;
  cursor:crosshair;
}
/* offset alternating rows of bricks via pseudo-element */
#wall::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(90deg,
      transparent 0 130px,
      rgba(0,0,0,0.55) 130px 132px);
  background-size:130px 64px;
  background-position:65px 32px;
  /* stripe every other 64px row with the offset */
  mask:repeating-linear-gradient(0deg,
    #000 0 64px,
    transparent 64px 128px);
  -webkit-mask:repeating-linear-gradient(0deg,
    #000 0 64px,
    transparent 64px 128px);
  background-position:65px 64px;
}
#wall::after{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(90deg,
      transparent 0 130px,
      rgba(255,255,255,0.025) 130px 131px),
    repeating-linear-gradient(0deg,
      transparent 0 64px,
      rgba(255,255,255,0.025) 64px 65px);
  pointer-events:none;
  mix-blend-mode:screen;
}

/* tags */
.tag{
  position:absolute;
  pointer-events:auto;
  white-space:nowrap;
  cursor:default;
  user-select:none;
  transition:transform 0.15s ease;
  z-index:1;
}
.tag:hover{transform:translate(-50%, -50%) rotate(var(--rot)) scale(calc(var(--s) * 1.06))}
/* neon glow per color via --c */
.tag span{
  display:inline-block;
  color:var(--c);
  text-shadow:
    0 0 4px var(--c),
    0 0 10px var(--c),
    0 0 22px var(--c),
    0 0 40px rgba(255,255,255,0.18),
    2px 2px 0 #000,
    -1px -1px 0 #000;
  filter:drop-shadow(0 0 8px var(--c)) drop-shadow(0 0 18px rgba(0,0,0,0.6));
}
.tag .author{
  display:block;
  font-family:'Special Elite', monospace;
  font-size:11px;
  color:rgba(255,255,255,0.55);
  text-shadow:none;
  filter:none;
  margin-top:2px;
  letter-spacing:0.04em;
}
/* fonts */
.f-bungee{font-family:'Bungee Inline', sans-serif}
.f-shade{font-family:'Bungee Shade', cursive}
.f-marker{font-family:'Permanent Marker', cursive}
.f-bowlby{font-family:'Bowlby One', sans-serif}
.f-rubik{font-family:'Rubik Mono One', sans-serif}
.f-blackops{font-family:'Black Ops One', sans-serif}
/* spawn animation */
@keyframes spray {
  0%   { opacity:0; transform:translate(-50%,-50%) rotate(var(--rot)) scale(calc(var(--s) * 0.4)); filter:blur(8px); }
  60%  { opacity:1; transform:translate(-50%,-50%) rotate(var(--rot)) scale(calc(var(--s) * 1.18)); filter:blur(0px); }
  100% { opacity:1; transform:translate(-50%,-50%) rotate(var(--rot)) scale(var(--s));            filter:blur(0px); }
}
.tag.fresh{ animation:spray 0.55s cubic-bezier(.18,.9,.4,1.1) both; }

/* drips */
.drip{
  position:absolute;width:2px;border-radius:0 0 4px 4px;
  pointer-events:none;
  filter:blur(0.4px);
  opacity:0.85;
}

/* === HEADER MARQUEE === */
header{
  position:fixed;top:0;left:0;right:0;z-index:30;
  background:linear-gradient(180deg, rgba(8,2,16,0.94) 0%, rgba(8,2,16,0.65) 70%, transparent 100%);
  padding:12px 0 18px;
  pointer-events:none;
}
.title-row{
  text-align:center;padding:0 16px;pointer-events:none;
}
h1{
  font-family:'Bungee Shade', cursive;
  font-size:clamp(26px, 4.5vw, 60px);
  letter-spacing:0.02em;line-height:1;
  color:var(--neonPink);
  text-shadow:
    0 0 12px rgba(255,43,214,0.8),
    0 0 28px rgba(255,43,214,0.5),
    4px 4px 0 #000;
}
h1 .c{color:var(--neonCyan);text-shadow:0 0 12px rgba(0,240,255,0.8), 0 0 28px rgba(0,240,255,0.4), 4px 4px 0 #000}
h1 .y{color:var(--neonYellow);font-style:italic;font-family:'Bungee Inline', sans-serif;text-shadow:0 0 12px rgba(255,240,75,0.8), 4px 4px 0 #000}
.tag-line{
  margin-top:4px;
  font-family:'Special Elite', monospace;
  font-size:clamp(11px, 1.4vw, 14px);color:var(--neonWhite);opacity:0.7;
  letter-spacing:0.04em;
}
.tag-line em{color:var(--neonYellow);font-style:italic}

.marquee{
  margin-top:10px;
  position:relative;
  height:30px;overflow:hidden;
  border-top:1px solid rgba(255,43,214,0.3);
  border-bottom:1px solid rgba(0,240,255,0.3);
  background:rgba(0,0,0,0.5);
  pointer-events:none;
  mask:linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
  -webkit-mask:linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
}
.marquee-track{
  position:absolute;top:0;left:0;height:100%;
  display:flex;align-items:center;gap:48px;
  white-space:nowrap;
  font-family:'VT323', monospace;
  font-size:18px;color:var(--neonWhite);
  animation:scroll 90s linear infinite;
  padding:0 24px;
}
.marquee-track .dot{color:var(--neonPink)}
.marquee-track .by{color:var(--neonCyan);font-size:14px;opacity:0.75}
@keyframes scroll {
  from { transform:translateX(0); }
  to   { transform:translateX(-50%); }
}
@media (prefers-reduced-motion: reduce){
  .marquee-track{animation:none}
}

/* === BOTTOM TOOLBAR === */
.bar{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:linear-gradient(0deg, rgba(8,2,16,0.95) 0%, rgba(8,2,16,0.7) 70%, transparent 100%);
  padding:18px 16px 22px;
  display:flex;align-items:flex-end;justify-content:center;gap:10px;
  flex-wrap:wrap;
}
.input-card{
  background:rgba(13,3,20,0.85);
  border:1.5px solid rgba(255,43,214,0.5);
  border-radius:10px;
  padding:10px 12px;
  display:flex;flex-direction:column;gap:8px;
  width:100%;max-width:680px;
  backdrop-filter:blur(6px);
  box-shadow:0 0 22px rgba(255,43,214,0.18), 0 -4px 0 rgba(0,0,0,0.4);
}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.input-card input[type=text]{
  flex:1;min-width:160px;
  background:rgba(0,0,0,0.55);
  color:var(--neonWhite);
  border:1px solid rgba(0,240,255,0.45);
  border-radius:6px;
  padding:9px 12px;
  font-family:'Permanent Marker', cursive;
  font-size:18px;
  letter-spacing:0.02em;
  outline:none;
  transition:border-color 0.18s, box-shadow 0.18s;
}
.input-card input[type=text]:focus{
  border-color:var(--neonPink);
  box-shadow:0 0 0 3px rgba(255,43,214,0.18), 0 0 22px rgba(255,43,214,0.3);
}
.input-card .author-input{
  flex:0 0 140px;
  font-family:'Special Elite', monospace;
  font-size:13px;color:rgba(255,255,255,0.85);
}

.color-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.color-row .lbl{
  font-family:'Major Mono Display', monospace;
  font-size:9px;letter-spacing:0.32em;color:var(--neonPink);opacity:0.7;
  margin-right:4px;
}
.swatch{
  width:26px;height:26px;border-radius:50%;
  cursor:pointer;
  border:2px solid rgba(255,255,255,0.15);
  position:relative;transition:transform 0.12s;
  box-shadow:0 0 12px var(--sw);
}
.swatch::before{
  content:'';position:absolute;inset:4px;border-radius:50%;background:var(--sw);
}
.swatch:hover{transform:scale(1.12)}
.swatch.active{
  border-color:var(--neonWhite);
  box-shadow:0 0 0 2px rgba(255,255,255,0.35), 0 0 22px var(--sw);
  transform:scale(1.18);
}

.font-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.fontbtn{
  background:rgba(0,0,0,0.45);
  color:var(--neonWhite);
  border:1px solid rgba(184,107,255,0.4);
  padding:5px 10px;border-radius:5px;
  font-size:13px;cursor:pointer;
  transition:all 0.12s;
}
.fontbtn:hover{border-color:var(--neonViolet);box-shadow:0 0 14px rgba(184,107,255,0.4)}
.fontbtn.active{background:var(--neonViolet);color:#0a0210;border-color:var(--neonViolet)}
.fontbtn.f-bungee{font-family:'Bungee Inline', sans-serif}
.fontbtn.f-shade{font-family:'Bungee Shade', cursive}
.fontbtn.f-marker{font-family:'Permanent Marker', cursive}
.fontbtn.f-bowlby{font-family:'Bowlby One', sans-serif}
.fontbtn.f-rubik{font-family:'Rubik Mono One', sans-serif}
.fontbtn.f-blackops{font-family:'Black Ops One', sans-serif}

.size-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.size-row .lbl{
  font-family:'Major Mono Display', monospace;
  font-size:9px;letter-spacing:0.32em;color:var(--neonCyan);opacity:0.7;margin-right:4px;
}
.szbtn{
  background:rgba(0,0,0,0.45);color:var(--neonWhite);
  border:1px solid rgba(0,240,255,0.4);
  padding:5px 10px;border-radius:5px;
  font-family:'VT323', monospace;font-size:14px;letter-spacing:0.05em;
  cursor:pointer;transition:all 0.12s;
}
.szbtn.active{background:var(--neonCyan);color:#050009;border-color:var(--neonCyan)}
.szbtn:hover{border-color:var(--neonCyan)}

.spray-btn{
  background:linear-gradient(135deg, var(--neonPink), var(--neonViolet));
  color:#0a0210;
  border:0;
  font-family:'Bungee Inline', sans-serif;
  font-size:16px;letter-spacing:0.05em;
  padding:11px 22px;border-radius:6px;
  cursor:pointer;
  text-transform:uppercase;
  box-shadow:0 0 28px rgba(255,43,214,0.5), 0 4px 0 rgba(0,0,0,0.4);
  transition:all 0.15s;
  flex:0 0 auto;
}
.spray-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 36px rgba(255,43,214,0.7), 0 6px 0 rgba(0,0,0,0.5);
}
.spray-btn:active{transform:translateY(1px);box-shadow:0 0 18px rgba(255,43,214,0.4), 0 2px 0 rgba(0,0,0,0.4)}
.spray-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}

.audio-toggle{
  position:fixed;top:14px;right:14px;z-index:35;
  background:rgba(0,0,0,0.55);
  border:1px solid var(--neonCyan);
  color:var(--neonCyan);
  font-family:'VT323', monospace;
  font-size:13px;
  padding:6px 10px;border-radius:5px;
  cursor:pointer;
}
.audio-toggle:hover{box-shadow:0 0 18px rgba(0,240,255,0.5)}
.audio-toggle.muted{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.5)}

/* hint overlay */
.hint{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:5;pointer-events:none;
  text-align:center;
  font-family:'Permanent Marker', cursive;
  font-size:clamp(20px, 3.5vw, 36px);
  color:var(--neonYellow);
  text-shadow:0 0 16px rgba(255,240,75,0.7), 3px 3px 0 #000;
  opacity:0.7;
  transform-origin:center;
  transition:opacity 0.6s;
}
.hint.gone{opacity:0}
.hint .small{display:block;font-size:0.45em;color:var(--neonWhite);opacity:0.7;letter-spacing:0.2em;font-family:'Major Mono Display', monospace;margin-top:8px}

/* placement preview cursor */
#preview{
  position:fixed;pointer-events:none;z-index:25;
  font-family:'Permanent Marker', cursive;
  opacity:0.35;
  white-space:nowrap;
  transform:translate(-50%,-50%);
  display:none;
}
#preview.show{display:block}

.status{
  position:fixed;top:14px;left:14px;z-index:35;
  font-family:'VT323', monospace;font-size:14px;
  color:var(--neonGreen);
  background:rgba(0,0,0,0.55);
  padding:5px 10px;border-radius:5px;
  border:1px solid rgba(93,255,179,0.4);
  pointer-events:none;
}
.status.warn{color:var(--neonYellow);border-color:rgba(255,240,75,0.4)}
.status.err{color:var(--neonRed);border-color:rgba(255,58,82,0.4)}
.status .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--neonGreen);box-shadow:0 0 8px currentColor;margin-right:6px;vertical-align:middle;animation:bp 1.4s ease-in-out infinite}
@keyframes bp { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* mobile */
@media (max-width:680px){
  .input-card{padding:8px}
  .input-card .author-input{flex:1 1 100%}
  .spray-btn{flex:1 1 100%}
  h1{font-size:32px}
  .marquee{height:24px}
  .marquee-track{font-size:14px}
}
</style>
</head>
<body>
<div id="wall"></div>
<div id="preview"></div>

<header>
  <div class="title-row">
    <h1>GRAFFITI <span class="c">CHAOS</span> <span class="y">WALL</span></h1>
    <div class="tag-line">spray a permanent <em>unhinged thought</em> · everyone sees it forever</div>
  </div>
  <div class="marquee">
    <div class="marquee-track" id="marquee">
      <span class="dot">●</span><span style="opacity:0.6">loading the chaos…</span>
    </div>
  </div>
</header>

<button class="audio-toggle" id="audio">♪ ON</button>
<div class="status" id="status"><span class="pulse"></span>connecting…</div>

<div class="hint" id="hint">click anywhere to spray<span class="small">type below · pick a color · vandalize</span></div>

<div class="bar">
  <div class="input-card">
    <div class="row">
      <input id="txt" type="text" maxlength="80" placeholder="your unhinged thought…" autocomplete="off" />
      <input class="author-input" id="author" type="text" maxlength="16" placeholder="tag name" autocomplete="off" />
    </div>
    <div class="row">
      <div class="color-row" id="colorRow"><span class="lbl">CAN</span></div>
      <div class="font-row" id="fontRow"></div>
    </div>
    <div class="row">
      <div class="size-row" id="sizeRow"><span class="lbl">SIZE</span></div>
      <button class="spray-btn" id="spray">PSSSHHHT · SPRAY</button>
    </div>
  </div>
</div>

<script type="module">
import supabase, { supabaseSession } from '/supabase-config-fixed.js';

const COLORS = [
  { v:'#ff2bd6', n:'pink' },
  { v:'#00f0ff', n:'cyan' },
  { v:'#fff04b', n:'yellow' },
  { v:'#5dffb3', n:'green' },
  { v:'#ff8a3d', n:'orange' },
  { v:'#ff3a52', n:'red' },
  { v:'#b86bff', n:'violet' },
  { v:'#fbf2dc', n:'white' },
];
const FONTS = [
  { c:'f-marker',  l:'Marker' },
  { c:'f-bungee',  l:'Bungee' },
  { c:'f-shade',   l:'Shade' },
  { c:'f-bowlby',  l:'Block' },
  { c:'f-rubik',   l:'Rubik' },
  { c:'f-blackops',l:'OpsOne' },
];
const SIZES = [
  { v:1.0, l:'S' },
  { v:1.6, l:'M' },
  { v:2.4, l:'L' },
  { v:3.4, l:'XL' },
];

const wall = document.getElementById('wall');
const preview = document.getElementById('preview');
const hint = document.getElementById('hint');
const txt = document.getElementById('txt');
const authorInput = document.getElementById('author');
const sprayBtn = document.getElementById('spray');
const statusEl = document.getElementById('status');
const audioBtn = document.getElementById('audio');
const marquee = document.getElementById('marquee');

let state = {
  color: COLORS[0].v,
  font:  'f-marker',
  size:  1.6,
  pos:   null,   // {xPct, yPct}
  user:  null,
  posting: false,
  muted: false,
};
let allTags = [];

// === restore author ===
const savedAuthor = localStorage.getItem('graffiti-chaos-author');
if (savedAuthor) authorInput.value = savedAuthor;
authorInput.addEventListener('input', () => {
  localStorage.setItem('graffiti-chaos-author', authorInput.value);
});

// === build palettes ===
const colorRow = document.getElementById('colorRow');
COLORS.forEach((c, i) => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (i === 0 ? ' active' : '');
  sw.style.setProperty('--sw', c.v);
  sw.title = c.n;
  sw.addEventListener('click', () => {
    state.color = c.v;
    colorRow.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    sw.classList.add('active');
    updatePreview();
    sprayPshhh(0.35);
  });
  colorRow.appendChild(sw);
});

const fontRow = document.getElementById('fontRow');
FONTS.forEach((f, i) => {
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'fontbtn ' + f.c + (i === 0 ? ' active' : '');
  b.textContent = f.l;
  b.addEventListener('click', () => {
    state.font = f.c;
    fontRow.querySelectorAll('.fontbtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    updatePreview();
  });
  fontRow.appendChild(b);
});

const sizeRow = document.getElementById('sizeRow');
SIZES.forEach((s, i) => {
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'szbtn' + (s.v === state.size ? ' active' : '');
  b.textContent = s.l;
  b.addEventListener('click', () => {
    state.size = s.v;
    sizeRow.querySelectorAll('.szbtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    updatePreview();
  });
  sizeRow.appendChild(b);
});

// === audio ===
let ac = null, master = null;
function ensureAudio() {
  if (ac || state.muted) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  master = ac.createGain(); master.gain.value = 0.45;
  master.connect(ac.destination);
}
function sprayPshhh(intensity = 1) {
  if (state.muted) return;
  ensureAudio();
  if (!ac) return;
  if (ac.state === 'suspended') ac.resume();
  const t = ac.currentTime;
  const dur = 0.35 + intensity * 0.4;
  // noise burst through bandpass that sweeps
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const bp = ac.createBiquadFilter();
  bp.type = 'bandpass'; bp.Q.value = 1.4;
  bp.frequency.setValueAtTime(2200 + intensity * 800, t);
  bp.frequency.exponentialRampToValueAtTime(700, t + dur);
  const hp = ac.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 600;
  const g = ac.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.32 * intensity, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(bp); bp.connect(hp); hp.connect(g); g.connect(master);
  src.start(t); src.stop(t + dur);
  // sub click
  const o = ac.createOscillator(); o.type = 'square';
  o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(60, t + 0.05);
  const og = ac.createGain(); og.gain.setValueAtTime(0.06 * intensity, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
  o.connect(og); og.connect(master);
  o.start(t); o.stop(t + 0.08);
}

audioBtn.addEventListener('click', () => {
  state.muted = !state.muted;
  audioBtn.classList.toggle('muted', state.muted);
  audioBtn.textContent = state.muted ? '♪ OFF' : '♪ ON';
  if (!state.muted) sprayPshhh(0.4);
});

// === preview ===
function updatePreview() {
  if (!state.pos) { preview.classList.remove('show'); return; }
  preview.className = 'tag ' + state.font;
  preview.classList.add('show');
  preview.style.left = state.pos.xPct * window.innerWidth + 'px';
  preview.style.top  = state.pos.yPct * window.innerHeight + 'px';
  preview.style.transform = `translate(-50%,-50%) rotate(${state.pos.rot}deg) scale(${state.size})`;
  preview.innerHTML = `<span style="color:${state.color};text-shadow:0 0 12px ${state.color}">${escape(txt.value || 'your unhinged thought')}</span>`;
}
txt.addEventListener('input', updatePreview);

// === wall click → set position ===
wall.addEventListener('click', (e) => {
  const xPct = e.clientX / window.innerWidth;
  const yPct = e.clientY / window.innerHeight;
  const rot = Math.round(-12 + Math.random() * 24);
  state.pos = { xPct, yPct, rot };
  updatePreview();
  hideHint();
  txt.focus();
  sprayPshhh(0.25);
});

// === keyboard ===
window.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement === txt) {
    e.preventDefault();
    submitTag();
  }
});

function hideHint() { hint.classList.add('gone'); }

// === escape ===
function escape(t) {
  return String(t).replace(/[<>&"']/g, c => ({ '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;' }[c]));
}

// === render tag ===
function renderTag(t, fresh) {
  const el = document.createElement('div');
  el.className = 'tag ' + (t.font || 'f-marker') + (fresh ? ' fresh' : '');
  el.style.left = (t.x / 10000) * window.innerWidth + 'px';
  el.style.top  = (t.y / 10000) * window.innerHeight + 'px';
  el.style.setProperty('--rot', (t.rotation || 0) + 'deg');
  el.style.setProperty('--s', (t.scale / 100));
  el.style.transform = `translate(-50%,-50%) rotate(${t.rotation || 0}deg) scale(${t.scale / 100})`;
  el.style.zIndex = String(Math.floor(Date.parse(t.created_at || new Date().toISOString()) / 1000) % 1000000);
  el.style.setProperty('--c', t.color || '#ff2bd6');
  // body
  const span = document.createElement('span');
  span.style.setProperty('--c', t.color || '#ff2bd6');
  span.style.color = t.color || '#ff2bd6';
  span.textContent = t.text || '';
  el.appendChild(span);
  if (t.author) {
    const a = document.createElement('span');
    a.className = 'author';
    a.textContent = '— ' + t.author;
    el.appendChild(a);
  }
  // a few drips for fresh tags
  if (fresh) {
    setTimeout(() => spawnDrips(el, t.color || '#ff2bd6'), 480);
  }
  wall.appendChild(el);
  return el;
}

function spawnDrips(parent, color) {
  const rect = parent.getBoundingClientRect();
  const n = 1 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const drip = document.createElement('div');
    drip.className = 'drip';
    const startX = rect.left + (0.2 + Math.random() * 0.6) * rect.width;
    const startY = rect.top + rect.height * 0.85;
    drip.style.left = startX + 'px';
    drip.style.top  = startY + 'px';
    drip.style.background = color;
    drip.style.boxShadow = `0 0 8px ${color}`;
    drip.style.height = '0px';
    document.body.appendChild(drip);
    const finalH = 14 + Math.random() * 38;
    const dur = 700 + Math.random() * 700;
    drip.animate(
      [
        { height: '0px', opacity: 0.95 },
        { height: finalH + 'px', opacity: 0.85 },
      ],
      { duration: dur, easing: 'cubic-bezier(.6,.1,.9,.6)', fill: 'forwards' }
    );
    setTimeout(() => drip.remove(), dur + 400);
  }
}

// === marquee ===
function refreshMarquee() {
  // newest 24 message texts
  const recent = [...allTags].slice(-24).reverse();
  if (recent.length === 0) {
    marquee.innerHTML = '<span class="dot">●</span><span style="opacity:0.6">be the first to spray something unhinged</span>';
    return;
  }
  // duplicate to enable seamless scroll
  const items = recent.map(t =>
    `<span class="dot">●</span> <span>${escape(t.text || '')}</span>${t.author ? `<span class="by"> · ${escape(t.author)}</span>` : ''}`
  );
  marquee.innerHTML = (items.concat(items)).join(' ');
}

// === db ===
async function loadAll() {
  const { data, error } = await supabase
    .from('graffiti_wall')
    .select('id, text, color, font, rotation, x, y, scale, author, created_at')
    .order('created_at', { ascending: true })
    .limit(800);
  if (error) {
    setStatus('err', 'load failed: ' + error.message);
    return;
  }
  allTags = data || [];
  // clear wall + render
  wall.querySelectorAll('.tag').forEach(t => t.remove());
  allTags.forEach(t => renderTag(t, false));
  refreshMarquee();
  setStatus('ok', `${allTags.length} tag${allTags.length === 1 ? '' : 's'} on the wall · live`);
}

async function submitTag() {
  if (state.posting) return;
  const text = (txt.value || '').trim();
  if (!text) {
    flash(txt);
    return;
  }
  if (!state.pos) {
    // place randomly if user typed without clicking
    state.pos = {
      xPct: 0.18 + Math.random() * 0.64,
      yPct: 0.28 + Math.random() * 0.52,
      rot: Math.round(-12 + Math.random() * 24),
    };
  }
  if (!state.user) {
    setStatus('warn', 'connecting…');
    return;
  }
  state.posting = true;
  sprayBtn.disabled = true;
  sprayBtn.textContent = 'SPRAYING…';
  sprayPshhh(1);
  const author = (authorInput.value || '').trim().slice(0, 16);
  const payload = {
    text: text.slice(0, 80),
    color: state.color,
    font:  state.font,
    rotation: state.pos.rot,
    x: Math.round(state.pos.xPct * 10000),
    y: Math.round(state.pos.yPct * 10000),
    scale: Math.round(state.size * 100),
    author: author || 'anon',
    user_id: state.user.id,
  };
  const { data, error } = await supabase
    .from('graffiti_wall')
    .insert(payload)
    .select()
    .single();
  state.posting = false;
  sprayBtn.disabled = false;
  sprayBtn.textContent = 'PSSSHHHT · SPRAY';
  if (error) {
    setStatus('err', 'insert failed: ' + error.message);
    return;
  }
  // local optimistic render — realtime will dedupe
  if (!allTags.find(x => x.id === data.id)) {
    allTags.push(data);
    renderTag(data, true);
    refreshMarquee();
    setStatus('ok', `${allTags.length} tags on the wall · live`);
  }
  // reset input
  txt.value = '';
  state.pos = null;
  preview.classList.remove('show');
}
sprayBtn.addEventListener('click', submitTag);

function flash(el) {
  el.style.boxShadow = '0 0 0 3px rgba(255,58,82,0.5)';
  setTimeout(() => { el.style.boxShadow = ''; }, 360);
}

function setStatus(kind, msg) {
  statusEl.className = 'status ' + (kind === 'err' ? 'err' : kind === 'warn' ? 'warn' : '');
  statusEl.innerHTML = `<span class="pulse"></span>${escape(msg)}`;
}

// === auth ===
(async () => {
  try {
    setStatus('warn', 'authenticating…');
    const { session } = await supabaseSession();
    state.user = session.user;
    setStatus('ok', 'connected · loading wall…');
    await loadAll();
  } catch (e) {
    setStatus('err', 'auth failed: ' + (e.message || e));
  }
})();

// === realtime ===
supabase
  .channel('graffiti-chaos-wall-v1')
  .on('postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'graffiti_wall' },
    (payload) => {
      const t = payload.new;
      if (allTags.find(x => x.id === t.id)) return; // dedupe own insert
      allTags.push(t);
      renderTag(t, true);
      refreshMarquee();
      setStatus('ok', `${allTags.length} tags on the wall · live`);
      if (!state.muted) sprayPshhh(0.7);
    })
  .subscribe();

// === resize: rebuild positions ===
let resizeT;
window.addEventListener('resize', () => {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => {
    wall.querySelectorAll('.tag').forEach(t => t.remove());
    allTags.forEach(t => renderTag(t, false));
  }, 180);
});
</script>
</body>
</html>
