<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raine the Cat — Moonlit Rooftops</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐱">
<meta property="og:title" content="Raine the Cat — Moonlit Rooftops">
<meta property="og:description" content="Guide Raine across moonlit rooftops collecting fish and dodging crows!">
<meta property="og:url" content="https://sloppy.live/raine-cat">
<meta property="og:image" content="https://sloppy.live/raine-cat/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Lexend+Deca:wght@200;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Lexend Deca',sans-serif;color:#e0d8f0}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 20px;pointer-events:none;z-index:10}
#score-box{font-family:'Silkscreen',cursive;font-size:20px;color:#f0c060;text-shadow:0 0 12px rgba(240,192,96,0.6)}
#lives-box{font-family:'Silkscreen',cursive;font-size:18px;color:#ff6b8a}
#title-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:linear-gradient(180deg,#0a0a2e 0%,#1a1040 50%,#0d0d2a 100%)}
#title-screen h1{font-family:'Silkscreen',cursive;font-size:clamp(28px,6vw,52px);color:#c8b0ff;text-shadow:0 0 30px rgba(200,176,255,0.5);margin-bottom:8px}
#title-screen p{font-size:clamp(14px,2.5vw,18px);color:#8878a8;margin-bottom:32px;font-weight:200}
#start-btn{font-family:'Silkscreen',cursive;font-size:18px;padding:14px 40px;background:transparent;border:2px solid #c8b0ff;color:#c8b0ff;border-radius:8px;cursor:pointer;transition:all 0.3s}
#start-btn:hover{background:#c8b0ff;color:#0a0a2e}
#game-over{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(10,10,26,0.92)}
#game-over h2{font-family:'Silkscreen',cursive;font-size:clamp(24px,5vw,40px);color:#ff6b8a;margin-bottom:12px}
#game-over .final-score{font-family:'Silkscreen',cursive;font-size:28px;color:#f0c060;margin-bottom:8px}
#game-over .best{font-size:14px;color:#8878a8;margin-bottom:24px}
#restart-btn{font-family:'Silkscreen',cursive;font-size:16px;padding:12px 36px;background:transparent;border:2px solid #c8b0ff;color:#c8b0ff;border-radius:8px;cursor:pointer;transition:all 0.3s}
#restart-btn:hover{background:#c8b0ff;color:#0a0a2e}
#mobile-controls{position:fixed;bottom:20px;left:0;right:0;display:none;justify-content:space-between;padding:0 20px;z-index:15;pointer-events:none}
.m-btn{width:64px;height:64px;border-radius:50%;background:rgba(200,176,255,0.15);border:2px solid rgba(200,176,255,0.3);display:flex;align-items:center;justify-content:center;font-size:24px;pointer-events:all;-webkit-tap-highlight-color:transparent;user-select:none}
.m-left-group,.m-right-group{display:flex;gap:12px}
#back-link{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:11px;color:#4a4060;text-decoration:none;z-index:10}
#back-link:hover{color:#c8b0ff}
@media(max-width:768px){#mobile-controls{display:flex}}
</style>
</head>
<body>
<div id="title-screen">
  <h1>Raine the Cat</h1>
  <p>Moonlit Rooftops</p>
  <button id="start-btn">PLAY</button>
</div>
<div id="game-over">
  <h2>Raine fell!</h2>
  <div class="final-score" id="final-score">0</div>
  <div class="best" id="best-score"></div>
  <button id="restart-btn">TRY AGAIN</button>
</div>
<div id="ui">
  <div id="score-box">0</div>
  <div id="lives-box"></div>
</div>
<canvas id="c"></canvas>
<div id="mobile-controls">
  <div class="m-left-group">
    <button class="m-btn" id="m-left">◀</button>
    <button class="m-btn" id="m-right">▶</button>
  </div>
  <div class="m-right-group">
    <button class="m-btn" id="m-jump">▲</button>
  </div>
</div>
<a id="back-link" href="https://sloppy.live">sloppy.live</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Game State ──
const GRAVITY = 0.45;
const JUMP_POWER = -10.5;
const MOVE_SPEED = 4;
const T = 32; // tile size
let gameState = 'title'; // title, playing, over
let score = 0;
let lives = 9;
let bestScore = parseInt(localStorage.getItem('raine-best') || '0');
let camX = 0;
let distanceTraveled = 0;
let difficulty = 1;

// ── Raine ──
const raine = {
  x: 100, y: 0, vx: 0, vy: 0,
  w: 22, h: 26,
  onGround: false, facing: 1,
  jumps: 0, maxJumps: 2,
  tailPhase: 0, blinkTimer: 0, purring: false
};

// ── World Generation ──
let platforms = [];
let collectibles = []; // fish, yarn, mice
let hazards = []; // crows, puddles
let particles = [];
let stars = [];
let buildings = [];
let generatedUpTo = 0;

function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * 3000,
      y: Math.random() * H * 0.7,
      size: Math.random() * 2 + 0.5,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005
    });
  }
}

function initBuildings() {
  buildings = [];
  for (let i = 0; i < 40; i++) {
    buildings.push({
      x: i * 200 + Math.random() * 80 - 40,
      w: 60 + Math.random() * 100,
      h: 80 + Math.random() * 200,
      color: `hsl(${240 + Math.random()*30}, ${15 + Math.random()*15}%, ${8 + Math.random()*8}%)`,
      windows: Math.floor(Math.random() * 8) + 2
    });
  }
}

function generateWorld(fromX) {
  const startCol = Math.floor(fromX / T);
  const endCol = startCol + 80;
  if (endCol <= generatedUpTo) return;

  let lastPlatY = H * 0.65;
  let lastPlatEndX = generatedUpTo * T;

  // Find the last platform's position
  if (platforms.length > 0) {
    const last = platforms[platforms.length - 1];
    lastPlatY = last.y;
    lastPlatEndX = last.x + last.w;
  }

  for (let col = Math.max(generatedUpTo, startCol); col < endCol;) {
    const gapChance = 0.35 + difficulty * 0.05;
    const gap = Math.random() < gapChance ? Math.floor(Math.random() * 5 + 3) : Math.floor(Math.random() * 2 + 1);
    col += gap;

    const platWidth = Math.floor(Math.random() * 4 + 2) * T;
    const yVariation = (Math.random() - 0.5) * 80;
    let platY = Math.max(H * 0.3, Math.min(H * 0.8, lastPlatY + yVariation));

    const plat = {
      x: col * T,
      y: platY,
      w: platWidth,
      h: T,
      type: Math.random() < 0.08 ? 'crumbly' : 'solid',
      crumbleTimer: 0
    };
    platforms.push(plat);

    // Spawn collectibles on platforms
    const collectibleChance = 0.6;
    if (Math.random() < collectibleChance) {
      const cx = plat.x + Math.random() * (plat.w - 20) + 10;
      const types = ['fish', 'fish', 'fish', 'yarn', 'mouse'];
      collectibles.push({
        x: cx, y: plat.y - 30,
        type: types[Math.floor(Math.random() * types.length)],
        bobPhase: Math.random() * Math.PI * 2,
        collected: false
      });
    }

    // Spawn hazards (crows + scary cucumbers)
    if (Math.random() < 0.12 + difficulty * 0.04 && col > 20) {
      hazards.push({
        x: plat.x + plat.w / 2,
        y: plat.y - 60 - Math.random() * 40,
        type: 'crow',
        phase: Math.random() * Math.PI * 2,
        dir: Math.random() < 0.5 ? 1 : -1,
        range: 60 + Math.random() * 40
      });
    }
    // Scary cucumbers sitting on platforms — cats HATE these
    if (Math.random() < 0.18 + difficulty * 0.03 && col > 10) {
      hazards.push({
        x: plat.x + Math.random() * (plat.w - 20) + 10,
        y: plat.y - 14,
        type: 'cucumber',
        phase: Math.random() * Math.PI * 2,
        dir: 0, range: 0
      });
    }

    lastPlatY = platY;
    col += Math.ceil(platWidth / T) + 1;
  }

  generatedUpTo = endCol;
}

// ── Particles ──
function addParticles(x, y, color, count, type) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * (type === 'sparkle' ? 3 : 5),
      vy: -Math.random() * 4 - 1,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      color,
      size: type === 'sparkle' ? Math.random() * 3 + 1 : Math.random() * 4 + 2,
      type: type || 'circle'
    });
  }
}

// ── Input ──
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') && gameState === 'playing') {
    if (raine.jumps < raine.maxJumps) {
      raine.vy = JUMP_POWER;
      raine.jumps++;
      raine.onGround = false;
      { const rc = rainbowColor(performance.now()*0.001, Math.random()*360); addParticles(raine.x + raine.w / 2 - camX, raine.y + raine.h, rc, 6, 'sparkle'); }
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Mobile controls
let mLeft = false, mRight = false;
const ml = document.getElementById('m-left');
const mr = document.getElementById('m-right');
const mj = document.getElementById('m-jump');

function addMobileListeners(el, onDown, onUp) {
  el.addEventListener('touchstart', e => { e.preventDefault(); onDown(); }, { passive: false });
  el.addEventListener('touchend', e => { e.preventDefault(); onUp(); }, { passive: false });
  el.addEventListener('mousedown', onDown);
  el.addEventListener('mouseup', onUp);
}
addMobileListeners(ml, () => mLeft = true, () => mLeft = false);
addMobileListeners(mr, () => mRight = true, () => mRight = false);
addMobileListeners(mj, () => {
  if (gameState === 'playing' && raine.jumps < raine.maxJumps) {
    raine.vy = JUMP_POWER;
    raine.jumps++;
    raine.onGround = false;
    { const rc = rainbowColor(performance.now()*0.001, Math.random()*360); addParticles(raine.x + raine.w / 2 - camX, raine.y + raine.h, rc, 6, 'sparkle'); }
  }
}, () => {});

// ── Drawing Functions ──

function drawMoon() {
  const mx = W * 0.8, my = H * 0.12, mr = 40;
  const grad = ctx.createRadialGradient(mx, my, mr * 0.3, mx, my, mr * 2);
  grad.addColorStop(0, 'rgba(255,248,220,0.9)');
  grad.addColorStop(0.3, 'rgba(255,248,220,0.2)');
  grad.addColorStop(1, 'rgba(255,248,220,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(mx - mr * 2, my - mr * 2, mr * 4, mr * 4);
  ctx.fillStyle = '#fff8dc';
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fill();
  // Craters
  ctx.fillStyle = 'rgba(200,190,160,0.3)';
  ctx.beginPath(); ctx.arc(mx - 10, my - 8, 6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx + 12, my + 5, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx - 5, my + 12, 5, 0, Math.PI * 2); ctx.fill();
}

function drawStars(t) {
  for (const s of stars) {
    const sx = ((s.x - camX * 0.05) % (W + 100) + W + 100) % (W + 100);
    const alpha = 0.4 + 0.4 * Math.sin(s.twinkle + t * s.speed);
    ctx.fillStyle = `rgba(255,255,240,${alpha})`;
    ctx.fillRect(sx, s.y, s.size, s.size);
  }
}

function drawBuildings() {
  for (const b of buildings) {
    const bx = b.x - camX * 0.15;
    if (bx + b.w < -50 || bx > W + 50) continue;
    ctx.fillStyle = b.color;
    ctx.fillRect(bx, H - b.h, b.w, b.h);
    // Windows
    const wSize = 6;
    const wGap = 16;
    for (let wy = H - b.h + 15; wy < H - 15; wy += wGap) {
      for (let wx = bx + 10; wx < bx + b.w - 10; wx += wGap) {
        const lit = Math.sin(wx * 0.1 + wy * 0.2) > 0.2;
        ctx.fillStyle = lit ? 'rgba(255,220,120,0.6)' : 'rgba(30,25,50,0.5)';
        ctx.fillRect(wx, wy, wSize, wSize);
      }
    }
  }
}

function drawPlatform(p) {
  const px = p.x - camX;
  if (px + p.w < -20 || px > W + 20) return;

  // Rooftop style
  if (p.type === 'crumbly') {
    ctx.fillStyle = '#3a2828';
    ctx.globalAlpha = 1 - p.crumbleTimer * 0.3;
  } else {
    ctx.fillStyle = '#2a2040';
  }

  // Main roof
  ctx.fillRect(px, p.y, p.w, p.h);

  // Top edge — rainbow shimmer
  if (p.type === 'crumbly') {
    ctx.fillStyle = '#6a4040';
  } else {
    const hue = (px * 0.5 + performance.now() * 0.03) % 360;
    ctx.fillStyle = `hsl(${hue}, 60%, 45%)`;
  }
  ctx.fillRect(px, p.y, p.w, 3);

  // Chimney details
  if (p.w > T * 4 && p.type !== 'crumbly') {
    ctx.fillStyle = '#35284a';
    ctx.fillRect(px + p.w * 0.7, p.y - 18, 12, 18);
    ctx.fillStyle = '#4a3870';
    ctx.fillRect(px + p.w * 0.7 - 2, p.y - 18, 16, 3);
  }

  // Antenna
  if (p.w > T * 5) {
    ctx.strokeStyle = '#4a3870';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px + 15, p.y);
    ctx.lineTo(px + 15, p.y - 25);
    ctx.lineTo(px + 5, p.y - 30);
    ctx.moveTo(px + 15, p.y - 20);
    ctx.lineTo(px + 25, p.y - 28);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
}

function rainbowColor(t, offset) {
  return `hsl(${(t * 80 + offset) % 360}, 85%, 65%)`;
}

function drawRaine(t) {
  const sx = raine.x - camX;
  const sy = raine.y;
  const f = raine.facing;

  ctx.save();
  ctx.translate(sx + raine.w / 2, sy + raine.h / 2);
  if (f < 0) ctx.scale(-1, 1);

  // Body
  ctx.fillStyle = '#708090'; // slate gray cat
  ctx.beginPath();
  ctx.ellipse(0, 2, 11, 13, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#708090';
  ctx.beginPath();
  ctx.arc(6, -10, 9, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#607080';
  ctx.beginPath();
  ctx.moveTo(1, -17); ctx.lineTo(4, -24); ctx.lineTo(8, -16);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(8, -17); ctx.lineTo(12, -25); ctx.lineTo(14, -15);
  ctx.fill();
  // Inner ears — rainbow!
  ctx.fillStyle = rainbowColor(t, 0);
  ctx.beginPath();
  ctx.moveTo(3, -17); ctx.lineTo(5, -22); ctx.lineTo(7, -16);
  ctx.fill();
  ctx.fillStyle = rainbowColor(t, 120);
  ctx.beginPath();
  ctx.moveTo(9, -17); ctx.lineTo(11, -23); ctx.lineTo(13, -16);
  ctx.fill();

  // Eyes
  raine.blinkTimer += 0.03;
  const blinking = Math.sin(raine.blinkTimer) > 0.97;
  if (blinking) {
    ctx.strokeStyle = '#b8d8ff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(2, -11); ctx.lineTo(6, -10);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(8, -11); ctx.lineTo(12, -10);
    ctx.stroke();
  } else {
    // Big expressive eyes
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.ellipse(4, -11, 3, 3.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(10, -11, 3, 3.5, 0, 0, Math.PI * 2); ctx.fill();
    // Iris
    ctx.fillStyle = '#88ccff';
    ctx.beginPath(); ctx.ellipse(4.5, -11, 1.8, 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(10.5, -11, 1.8, 2, 0, 0, Math.PI * 2); ctx.fill();
    // Pupil
    ctx.fillStyle = '#0a0a1a';
    ctx.beginPath(); ctx.arc(4.8, -11, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(10.8, -11, 1, 0, Math.PI * 2); ctx.fill();
    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(3.5, -12.5, 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(9.5, -12.5, 0.8, 0, Math.PI * 2); ctx.fill();
  }

  // Nose
  ctx.fillStyle = '#dba0b0';
  ctx.beginPath();
  ctx.moveTo(7, -7); ctx.lineTo(5.5, -5.5); ctx.lineTo(8.5, -5.5);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#506070';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(5.5, -5); ctx.quadraticCurveTo(7, -3.5, 8.5, -5);
  ctx.stroke();

  // Whiskers
  ctx.strokeStyle = 'rgba(200,200,220,0.5)';
  ctx.lineWidth = 0.6;
  for (let i = 0; i < 3; i++) {
    const wy = -7 + i * 2;
    ctx.beginPath();
    ctx.moveTo(0, wy);
    ctx.lineTo(-10, wy - 2 + i);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(14, wy);
    ctx.lineTo(24, wy - 2 + i);
    ctx.stroke();
  }

  // Legs
  ctx.fillStyle = '#607080';
  const legBob = Math.sin(t * 8) * (Math.abs(raine.vx) > 0.5 ? 3 : 0);
  ctx.fillRect(-7, 8 + legBob, 5, 8);
  ctx.fillRect(3, 8 - legBob, 5, 8);
  // Paws — rainbow!
  ctx.fillStyle = rainbowColor(t, 240);
  ctx.fillRect(-8, 14 + legBob, 7, 3);
  ctx.fillStyle = rainbowColor(t, 300);
  ctx.fillRect(2, 14 - legBob, 7, 3);

  // Tail
  raine.tailPhase += 0.06;
  const tailWag = Math.sin(raine.tailPhase) * 8;
  ctx.strokeStyle = '#708090';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-9, 2);
  ctx.quadraticCurveTo(-16, -5 + tailWag, -18, -12 + tailWag);
  ctx.stroke();
  // Tail tip — rainbow!
  ctx.strokeStyle = rainbowColor(t, 60);
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-15, -6 + tailWag);
  ctx.quadraticCurveTo(-17, -10 + tailWag, -18, -14 + tailWag);
  ctx.stroke();

  // Rainbow collar
  for (let i = 0; i < 6; i++) {
    ctx.strokeStyle = rainbowColor(t, i * 60);
    ctx.lineWidth = 2;
    ctx.beginPath();
    const a0 = -0.3 + i * (Math.PI + 0.6) / 6;
    const a1 = -0.3 + (i + 1) * (Math.PI + 0.6) / 6;
    ctx.arc(3, -2, 10, a0, a1);
    ctx.stroke();
  }
  // Bell — rainbow shimmer
  ctx.fillStyle = rainbowColor(t, 180);
  ctx.beginPath();
  ctx.arc(3, 8, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.moveTo(2, 8);
  ctx.lineTo(4, 8);
  ctx.lineTo(3, 10);
  ctx.fill();

  ctx.restore();
}

function drawCollectible(c, t) {
  if (c.collected) return;
  const cx = c.x - camX;
  const cy = c.y + Math.sin(c.bobPhase + t * 2) * 4;
  if (cx < -30 || cx > W + 30) return;

  ctx.save();
  ctx.translate(cx, cy);

  if (c.type === 'fish') {
    // Cute fish
    ctx.fillStyle = '#60c8ff';
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-7, 0);
    ctx.lineTo(-13, -5);
    ctx.lineTo(-13, 5);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(4, -1, 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Shimmer
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(1, -2, 4, 2, -0.2, 0, Math.PI * 2);
    ctx.fill();
  } else if (c.type === 'yarn') {
    // Yarn ball
    ctx.fillStyle = '#ff6b8a';
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ff9bb0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0.5, 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, 6, 2, 5);
    ctx.stroke();
    // Trailing string
    ctx.strokeStyle = '#ff6b8a';
    ctx.beginPath();
    ctx.moveTo(5, 5);
    ctx.quadraticCurveTo(10, 10, 8, 15);
    ctx.stroke();
  } else if (c.type === 'mouse') {
    // Toy mouse
    ctx.fillStyle = '#a0a0a0';
    ctx.beginPath();
    ctx.ellipse(0, 0, 7, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#d0a0b0';
    ctx.beginPath();
    ctx.arc(-4, -4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, -5, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(-3, -1, 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#d0a0b0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(7, 0);
    ctx.quadraticCurveTo(14, -3, 16, 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawCucumber(h, t) {
  const cx = h.x - camX;
  const cy = h.y;
  if (cx < -30 || cx > W + 30) return;

  ctx.save();
  ctx.translate(cx, cy);

  // Menacing wobble
  const wobble = Math.sin(t * 3 + h.phase) * 0.08;
  ctx.rotate(wobble);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 10, 10, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Cucumber body — dark green, ominous
  ctx.fillStyle = '#2d6b1e';
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Lighter stripe
  ctx.fillStyle = '#3a8a28';
  ctx.beginPath();
  ctx.ellipse(2, 0, 3, 12, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Bumps
  ctx.fillStyle = '#246018';
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.arc(-4 + Math.sin(i) * 2, i * 3, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Scary eyes (they're watching Raine!)
  const eyeGlow = 0.6 + Math.sin(t * 5 + h.phase) * 0.4;
  ctx.fillStyle = `rgba(255,0,0,${eyeGlow})`;
  ctx.beginPath();
  ctx.arc(-2, -5, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(3, -5, 2, 0, Math.PI * 2);
  ctx.fill();
  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-2, -5, 0.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(3, -5, 0.8, 0, Math.PI * 2);
  ctx.fill();

  // Evil grin
  ctx.strokeStyle = `rgba(200,0,0,${eyeGlow * 0.7})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0.5, -1, 4, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // Danger aura
  ctx.strokeStyle = `rgba(255,50,50,${0.15 + Math.sin(t * 4) * 0.1})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 19, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();

  h._sx = cx;
  h._sy = cy;
}

function drawCrow(h, t) {
  const cx = h.x - camX + Math.sin(h.phase + t * 1.5) * h.range * h.dir;
  const cy = h.y + Math.cos(h.phase + t * 2) * 10;
  if (cx < -40 || cx > W + 40) return;

  ctx.save();
  ctx.translate(cx, cy);

  // Body
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.ellipse(0, 0, 10, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wings flapping
  const wingAngle = Math.sin(t * 10) * 0.4;
  ctx.fillStyle = '#252540';
  ctx.beginPath();
  ctx.moveTo(-5, -2);
  ctx.lineTo(-18, -8 + Math.sin(t * 10) * 6);
  ctx.lineTo(-8, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(5, -2);
  ctx.lineTo(18, -8 + Math.sin(t * 10 + 1) * 6);
  ctx.lineTo(8, 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(8, -4, 5, 0, Math.PI * 2);
  ctx.fill();

  // Eye - menacing red
  ctx.fillStyle = '#ff3030';
  ctx.beginPath();
  ctx.arc(10, -5, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#f0a030';
  ctx.beginPath();
  ctx.moveTo(12, -4);
  ctx.lineTo(17, -3);
  ctx.lineTo(12, -2);
  ctx.fill();

  ctx.restore();

  // Store screen position for collision
  h._sx = cx;
  h._sy = cy;
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.type === 'sparkle') {
      // Star sparkle
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.life * 3);
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    } else if (p.type === 'heart') {
      ctx.font = `${p.size * 3}px serif`;
      ctx.fillText('♥', p.x, p.y);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ── Game Logic ──
function resetGame() {
  raine.x = 100;
  raine.y = H * 0.5;
  raine.vx = 0;
  raine.vy = 0;
  raine.jumps = 0;
  raine.onGround = false;
  score = 0;
  lives = 9;
  camX = 0;
  distanceTraveled = 0;
  difficulty = 1;
  platforms = [];
  collectibles = [];
  hazards = [];
  particles = [];
  generatedUpTo = 0;

  // Starting platform
  platforms.push({ x: 50, y: H * 0.65, w: T * 8, h: T, type: 'solid', crumbleTimer: 0 });
  generateWorld(0);

  initStars();
  initBuildings();
  updateUI();
}

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-over').style.display = 'none';
  gameState = 'playing';
  resetGame();
}

function gameOver() {
  gameState = 'over';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('raine-best', bestScore.toString());
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('best-score').textContent = bestScore > 0 ? `Best: ${bestScore}` : '';
  document.getElementById('game-over').style.display = 'flex';
}

function updateUI() {
  document.getElementById('score-box').textContent = score;
  let hearts = '';
  for (let i = 0; i < lives; i++) hearts += '♥';
  document.getElementById('lives-box').textContent = hearts;
}

function takeDamage() {
  lives--;
  addParticles(raine.x + raine.w / 2 - camX, raine.y + raine.h / 2, '#ff6b8a', 10);
  updateUI();
  if (lives <= 0) {
    gameOver();
  }
  // Brief invincibility via flash
  raine._invincible = 60;
}

function update(t) {
  if (gameState !== 'playing') return;

  // Input
  if (keys['ArrowLeft'] || keys['KeyA'] || mLeft) {
    raine.vx = -MOVE_SPEED;
    raine.facing = -1;
  } else if (keys['ArrowRight'] || keys['KeyD'] || mRight) {
    raine.vx = MOVE_SPEED;
    raine.facing = 1;
  } else {
    raine.vx *= 0.8;
  }

  // Gravity
  raine.vy += GRAVITY;
  raine.x += raine.vx;
  raine.y += raine.vy;
  raine.onGround = false;

  // Platform collision
  for (const p of platforms) {
    if (raine.x + raine.w > p.x && raine.x < p.x + p.w) {
      // Landing on top
      if (raine.vy >= 0 && raine.y + raine.h >= p.y && raine.y + raine.h <= p.y + p.h + 8) {
        raine.y = p.y - raine.h;
        raine.vy = 0;
        raine.onGround = true;
        raine.jumps = 0;

        if (p.type === 'crumbly') {
          p.crumbleTimer += 0.02;
          if (p.crumbleTimer > 1) {
            p.y = 9999; // drop it
            addParticles(raine.x + raine.w / 2 - camX, raine.y + raine.h, '#6a4040', 8);
          }
        }
      }
    }
  }

  // Fell off screen
  if (raine.y > H + 100) {
    takeDamage();
    if (gameState === 'playing') {
      // Respawn on nearest platform
      let nearest = platforms[0];
      let minDist = Infinity;
      for (const p of platforms) {
        const d = Math.abs(p.x - raine.x);
        if (d < minDist && p.y < H) {
          minDist = d;
          nearest = p;
        }
      }
      raine.x = nearest.x + nearest.w / 2;
      raine.y = nearest.y - raine.h - 20;
      raine.vy = 0;
    }
  }

  // Camera
  const targetCamX = raine.x - W * 0.35;
  camX += (targetCamX - camX) * 0.08;
  if (camX < 0) camX = 0;

  // Distance / score
  const newDist = Math.floor(raine.x / 50);
  if (newDist > distanceTraveled) {
    score += newDist - distanceTraveled;
    distanceTraveled = newDist;
    updateUI();
  }

  // Difficulty ramp
  difficulty = 1 + Math.floor(distanceTraveled / 100) * 0.5;

  // Generate more world
  generateWorld(camX);

  // Collectibles
  for (const c of collectibles) {
    if (c.collected) continue;
    const dx = (raine.x + raine.w / 2) - c.x;
    const dy = (raine.y + raine.h / 2) - c.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
      c.collected = true;
      const pts = c.type === 'fish' ? 10 : c.type === 'yarn' ? 25 : 50;
      score += pts;
      updateUI();
      const colors = { fish: '#60c8ff', yarn: '#ff6b8a', mouse: '#f0c060' };
      addParticles(c.x - camX, c.y, colors[c.type], 8, 'sparkle');
      if (c.type === 'mouse') {
        addParticles(c.x - camX, c.y, '#ff6b8a', 4, 'heart');
      }
    }
  }

  // Hazard collision
  if (!raine._invincible) {
    for (const h of hazards) {
      if (h._sx === undefined) continue;
      const rx = raine.x - camX + raine.w / 2;
      const ry = raine.y + raine.h / 2;
      const dx = rx - h._sx;
      const dy = ry - h._sy;
      const hitDist = h.type === 'cucumber' ? 22 : 20;
      if (Math.sqrt(dx * dx + dy * dy) < hitDist) {
        takeDamage();
        // Cucumbers make Raine leap back in terror
        if (h.type === 'cucumber') {
          raine.vy = -9;
          raine.vx = (dx > 0 ? 1 : -1) * 8;
          addParticles(h._sx, h._sy - 10, '#44ff44', 6, 'sparkle');
        } else {
          raine.vy = -6;
        }
        break;
      }
    }
  }

  // Invincibility countdown
  if (raine._invincible) raine._invincible--;

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Clean up off-screen entities
  const cleanX = camX - 400;
  platforms = platforms.filter(p => p.x + p.w > cleanX);
  collectibles = collectibles.filter(c => c.x > cleanX);
  hazards = hazards.filter(h => h.x > cleanX - 100);
}

function draw(t) {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#0a0a2e');
  skyGrad.addColorStop(0.5, '#141035');
  skyGrad.addColorStop(1, '#1a1040');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  drawStars(t);
  drawMoon();
  drawBuildings();

  // Platforms
  for (const p of platforms) drawPlatform(p);

  // Collectibles
  for (const c of collectibles) drawCollectible(c, t);

  // Hazards
  for (const h of hazards) {
    if (h.type === 'cucumber') drawCucumber(h, t);
    else drawCrow(h, t);
  }

  // Raine with invincibility flash
  if (!raine._invincible || Math.floor(raine._invincible / 3) % 2 === 0) {
    drawRaine(t);
  }

  // Particles
  drawParticles();
}

// ── Main Loop ──
let lastTime = 0;
function loop(timestamp) {
  const t = timestamp * 0.001;
  if (gameState === 'playing') {
    update(t);
  }
  draw(t);
  requestAnimationFrame(loop);
}

// ── Start ──
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Title screen animation
resetGame();
gameState = 'title';
requestAnimationFrame(loop);
</script>
