<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitspeak — live binary translator terminal</title>
<meta name="description" content="Type anything and watch it turn into binary in real time on a phosphor CRT terminal. Decodes binary back to text too — emoji included.">
<link rel="icon" href="https://emojicdn.elk.sh/💾">
<meta property="og:title" content="Bitspeak — binary translator terminal">
<meta property="og:description" content="Type → binary, live, on a glowing CRT. Paste binary and it talks back. Emoji-proof UTF-8.">
<meta property="og:url" content="https://sloppy.live/bitspeak">
<meta property="og:image" content="https://image.pollinations.ai/prompt/retro%20CRT%20terminal%20screen%20glowing%20phosphor%20green%20binary%20digits%20streaming%2C%20scanlines%2C%20dark%20room%2C%20vintage%20computer%20monitor%2C%20moody?width=1200&height=630&seed=1010&nologo=true&model=flux&image=.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{ --void:#020803; --glass:#041104; --ph:#3aff6e; --ph-dim:#1d8a3e; --ph-dark:#0e3d1d;
  --amber:#ffb454; --err:#ff5e5e; --focus:#8fd4ff; }
*{box-sizing:border-box;}
html{font-size:100%;}
body{margin:0; min-height:100vh; background:var(--void); color:var(--ph); font-family:'Share Tech Mono',monospace;
  display:flex; align-items:center; justify-content:center; padding:1.2rem;}
/* CRT frame */
#crt{position:relative; width:min(60rem,100%); border-radius:18px; background:var(--glass);
  border:2px solid #0c2a12; box-shadow:0 0 0 8px #101410, 0 0 0 10px #1c241c, 0 2rem 4rem rgba(0,0,0,.7), inset 0 0 6rem rgba(10,60,25,.5);
  padding:1.4rem 1.5rem 1.1rem; overflow:hidden;}
#crt::before{content:''; position:absolute; inset:0; pointer-events:none; z-index:3;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 1px, transparent 1px 3px);}
#crt::after{content:''; position:absolute; inset:0; pointer-events:none; z-index:4;
  background:radial-gradient(ellipse at 50% 45%, transparent 55%, rgba(0,10,2,.55) 100%);}
@keyframes flick{0%,100%{opacity:1;} 96%{opacity:1;} 97%{opacity:.86;} 98%{opacity:1;}}
#crt .inner{animation:flick 7s infinite;}
h1{font-family:'VT323',monospace; font-weight:400; font-size:1.6rem; margin:0 0 .2rem; letter-spacing:.08em;
  text-shadow:0 0 8px rgba(58,255,110,.7);}
h1 .dim{color:var(--ph-dim);}
.boot{color:var(--ph-dim); font-size:.72rem; margin:0 0 .9rem; letter-spacing:.06em;}
.row{display:flex; gap:.6rem; align-items:center; flex-wrap:wrap; margin:.4rem 0 .6rem;}
button{font-family:'Share Tech Mono',monospace; font-size:.72rem; letter-spacing:.1em; cursor:pointer; min-height:2.75rem;
  background:transparent; color:var(--ph); border:1px solid var(--ph-dark); border-radius:6px; padding:.4rem .9rem; text-transform:uppercase;}
button:hover{border-color:var(--ph-dim); background:rgba(30,140,62,.12);}
button:focus-visible{outline:3px solid var(--focus); outline-offset:2px;}
button[aria-pressed="true"]{background:rgba(58,255,110,.16); border-color:var(--ph); text-shadow:0 0 6px rgba(58,255,110,.8);}
label.prompt{display:block; font-size:.72rem; color:var(--ph-dim); letter-spacing:.14em; text-transform:uppercase; margin-bottom:.25rem;}
textarea{width:100%; min-height:5.5rem; background:rgba(2,14,4,.6); color:var(--ph); border:1px solid var(--ph-dark); border-radius:8px;
  font-family:'Share Tech Mono',monospace; font-size:1rem; line-height:1.5; padding:.7rem .8rem; resize:vertical; caret-color:var(--ph);
  text-shadow:0 0 5px rgba(58,255,110,.45);}
textarea:focus-visible{outline:3px solid var(--focus); outline-offset:2px;}
textarea::placeholder{color:var(--ph-dark);}
#out-wrap{position:relative; margin-top:.7rem; background:rgba(2,14,4,.6); border:1px solid var(--ph-dark); border-radius:8px;
  min-height:9rem; max-height:20rem; overflow:auto; padding:.75rem .8rem;}
#out{font-family:'Share Tech Mono',monospace; font-size:.86rem; line-height:1.9; word-break:break-word;
  text-shadow:0 0 6px rgba(58,255,110,.5);}
#out .byte{margin-right:.45em; white-space:nowrap;}
#out .byte.tight{margin-right:0;}
#out .g{border-bottom:1px dotted transparent; cursor:default;}
#out .g:hover, #out .g.hl{background:rgba(58,255,110,.18); border-bottom-color:var(--ph); border-radius:3px;}
#out .sep{color:var(--ph-dark);}
#out .txt-ch{font-size:1.15rem;}
#out .bad{color:var(--err); text-shadow:0 0 6px rgba(255,94,94,.6);}
#cursor{display:inline-block; width:.55em; height:1.05em; background:var(--ph); vertical-align:text-bottom;
  box-shadow:0 0 8px rgba(58,255,110,.9); animation:blink 1.06s steps(1) infinite;}
@keyframes blink{50%{opacity:0;}}
#status{display:flex; gap:1.1rem; flex-wrap:wrap; margin-top:.7rem; font-size:.68rem; color:var(--ph-dim); letter-spacing:.08em;}
#status b{color:var(--ph);}
#status .warn{color:var(--amber);}
#copy-ok{color:var(--amber); opacity:0; transition:opacity .2s;}
#copy-ok.on{opacity:1;}
.hintline{margin:.8rem 0 0; font-size:.62rem; color:var(--ph-dark); letter-spacing:.1em; text-transform:uppercase;}
#sr-status{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}
@media (max-width:640px){ #crt{padding:1rem .8rem;} #out{font-size:.74rem;} }
@media (prefers-reduced-motion:reduce){ #crt .inner{animation:none;} #cursor{animation:none;} }
</style>
</head>
<body>
<main id="crt">
  <div class="inner">
    <h1>BITSPEAK <span class="dim">// binary translator v1.0</span></h1>
    <p class="boot">PHOSPHOR OK · UTF-8 CODEC LOADED · 8 BITS PER BYTE CONFIRMED · READY.</p>
    <div class="row" role="group" aria-label="Mode and options">
      <button id="mode-btn" type="button" aria-pressed="false">mode: text → binary</button>
      <button id="sep-btn" type="button" aria-pressed="true">spaces: on</button>
      <button id="copy-btn" type="button">copy output</button>
      <span id="copy-ok" aria-hidden="true">✓ copied</span>
    </div>
    <label class="prompt" for="src">&gt; input</label>
    <textarea id="src" spellcheck="false" autocomplete="off"
      placeholder="type something… it becomes binary as you type"></textarea>
    <div id="out-wrap"><div id="out" aria-hidden="true"></div></div>
    <div id="status">
      <span>chars <b id="st-ch">0</b></span>
      <span>bytes <b id="st-by">0</b></span>
      <span>bits <b id="st-bi">0</b></span>
      <span id="st-note"></span>
    </div>
    <p class="hintline">hover a byte to see its character · paste 0s and 1s and it auto-offers decode · emoji are multi-byte and beautiful</p>
  </div>
  <p id="sr-status" role="status" aria-live="polite"></p>
</main>

<script>
(function(){
"use strict";
var $=function(id){ return document.getElementById(id); };
var enc=new TextEncoder();
var mode='enc';        /* enc = text→binary · dec = binary→text */
var useSep=true;

/* ── core transforms (pure) ── */
function toBin(str, sep){
  /* returns {html-safe groups}: one group per code point, bytes inside */
  var groups=[];
  var chars=Array.from(str);
  for(var i=0;i<chars.length;i++){
    var ch=chars[i];
    var bytes=enc.encode(ch), bits=[];
    for(var b=0;b<bytes.length;b++) bits.push(bytes[b].toString(2).padStart(8,'0'));
    groups.push({ch:ch, cp:ch.codePointAt(0), bytes:bits});
  }
  return groups;
}
function binText(groups, sep){
  var parts=[];
  groups.forEach(function(g){ g.bytes.forEach(function(b){ parts.push(b); }); });
  return parts.join(sep?' ':'');
}
function fromBin(str){
  /* tolerant: accepts 0/1 with any separators; returns {text, leftover, byteCount, bad} */
  var clean=str.replace(/[^01]/g,'');
  var bytes=[], i;
  for(i=0;i+8<=clean.length;i+=8) bytes.push(parseInt(clean.slice(i,i+8),2));
  var leftover=clean.length-i;
  var text='', bad=false;
  try{ text=new TextDecoder('utf-8',{fatal:false}).decode(new Uint8Array(bytes)); }
  catch(e){ bad=true; }
  if(text.indexOf('�')>=0) bad=true;
  return {text:text, leftover:leftover, byteCount:bytes.length, bad:bad};
}
function looksBinary(str){
  var clean=str.replace(/[\s.,;:|/_-]/g,'');
  return clean.length>=8 && /^[01]+$/.test(clean);
}
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── render ── */
function render(){
  var src=$('src').value;
  var out=$('out'), html='';
  var chCount=0, byCount=0, note='';
  if(mode==='enc'){
    var groups=toBin(src);
    chCount=groups.length;
    groups.forEach(function(g,gi){
      byCount+=g.bytes.length;
      var label=g.ch==='\n'?'⏎':(g.ch===' '?'␠':g.ch);
      var tip=escapeHtml(label)+' · U+'+g.cp.toString(16).toUpperCase().padStart(4,'0')+' · '+g.bytes.length+' byte'+(g.bytes.length>1?'s':'');
      var bcls=useSep?'byte':'byte tight';
      html+='<span class="g" title="'+tip+'">';
      g.bytes.forEach(function(b){ html+='<span class="'+bcls+'">'+b+'</span>'; });
      html+='</span>';
    });
    if(src&&groups.some(function(g){return g.bytes.length>1;})) note='<span class="warn">multi-byte UTF-8 in stream</span>';
  }else{
    var r=fromBin(src);
    chCount=Array.from(r.text).length; byCount=r.byteCount;
    html='<span class="txt-ch">'+escapeHtml(r.text).replace(/�/g,'<span class="bad">�</span>').replace(/\n/g,'<br>')+'</span>';
    if(r.leftover) note='<span class="warn">'+r.leftover+' stray bit'+(r.leftover>1?'s':'')+' ignored (not a full byte)</span>';
    else if(r.bad) note='<span class="warn">some bytes were not valid UTF-8</span>';
  }
  out.innerHTML=html+'<span id="cursor" aria-hidden="true"></span>';
  $('st-ch').textContent=chCount;
  $('st-by').textContent=byCount;
  $('st-bi').textContent=byCount*8;
  $('st-note').innerHTML=note;
  /* auto-offer decode */
  if(mode==='enc'&&looksBinary(src)){
    $('st-note').innerHTML='<span class="warn">that looks like binary — press MODE to decode it</span>';
  }
  clearTimeout(srT);
  srT=setTimeout(function(){
    $('sr-status').textContent=mode==='enc'
      ? chCount+' characters encoded to '+byCount+' bytes'
      : byCount+' bytes decoded to '+chCount+' characters';
  },800);
}
var srT=null;

/* ── copy ── */
function outputString(){
  var src=$('src').value;
  if(mode==='enc') return binText(toBin(src), useSep);
  return fromBin(src).text;
}
$('copy-btn').addEventListener('click',function(){
  var s=outputString();
  function ok(){ var c=$('copy-ok'); c.classList.add('on'); setTimeout(function(){c.classList.remove('on');},1200); }
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(s).then(ok,function(){ fallback(); });
  else fallback();
  function fallback(){
    var ta=document.createElement('textarea'); ta.value=s; document.body.appendChild(ta);
    ta.select(); try{ document.execCommand('copy'); ok(); }catch(e){} ta.remove();
  }
});

/* ── controls ── */
$('mode-btn').addEventListener('click',function(){
  /* carry the conversation across: encoding output becomes decode input & vice versa */
  var carry=outputString();
  mode=(mode==='enc')?'dec':'enc';
  this.textContent='mode: '+(mode==='enc'?'text → binary':'binary → text');
  this.setAttribute('aria-pressed', mode==='dec'?'true':'false');
  $('src').value=carry;
  $('src').placeholder=mode==='enc'?'type something… it becomes binary as you type':'paste 0s and 1s… 01001000 01101001';
  render();
});
$('sep-btn').addEventListener('click',function(){
  useSep=!useSep;
  this.textContent='spaces: '+(useSep?'on':'off');
  this.setAttribute('aria-pressed',useSep?'true':'false');
  render();
});
$('src').addEventListener('input',render);

/* tiny key blips */
var AC=null, muted=false, lastBlip=0;
addEventListener('keydown',function(e){
  if(e.key.toLowerCase()==='m'&&e.target.tagName!=='TEXTAREA'){ muted=!muted; return; }
  if(e.target.id!=='src'||muted) return;
  var now=Date.now(); if(now-lastBlip<28) return; lastBlip=now;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    var o=AC.createOscillator(),g=AC.createGain();
    o.type='square'; o.frequency.value=1800+Math.random()*500;
    g.gain.setValueAtTime(.015,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+.045);
    o.connect(g).connect(AC.destination); o.start(); o.stop(AC.currentTime+.06);
  }catch(e2){}
});

$('src').value='Hello, world.';
render();
$('src').focus();

window.__bs={ toBin:toBin, binText:binText, fromBin:fromBin, looksBinary:looksBinary,
  setMode:function(m){ mode=m; }, render:render, out:outputString };
})();
</script>
</body>
</html>
