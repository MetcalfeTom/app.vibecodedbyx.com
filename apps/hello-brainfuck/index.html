<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hello, brainfuck</title>
<meta name="description" content="A working Brainfuck interpreter that steps through hello-world. Watch the tape, the pointer, the bytes." />
<meta property="og:title" content="hello, brainfuck" />
<meta property="og:description" content="A working Brainfuck interpreter that steps through hello-world. Watch the tape, the pointer, the bytes." />
<meta property="og:url" content="https://sloppy.live/hello-brainfuck" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/brainfuck%20esoteric%20programming%20language%20green%20phosphor%20terminal%20tape%20pointer%20cells%20cyberpunk%20minimal?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%A0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=Newsreader:ital,wght@1,300&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#03080a;
    --panel:#06100f;
    --green:#5fff8c;
    --green-dim:#2a9050;
    --green-glow:rgba(95,255,140,0.18);
    --amber:#ffaf3d;
    --magenta:#ff5fa1;
    --ink:#caf5d6;
    --dim:#3a6c4d;
    --line:rgba(95,255,140,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1100px 700px at 50% 10%, rgba(95,255,140,0.08), transparent 60%),
      radial-gradient(900px 600px at 50% 110%, rgba(95,255,140,0.04), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'VT323', monospace;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:24px 18px;
    align-items:center;
  }
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(0deg, rgba(95,255,140,0.025), rgba(95,255,140,0.025) 1px, transparent 1px, transparent 4px);
    pointer-events:none;
    z-index:1;
  }
  .stage{
    width:min(900px, 100%);
    display:flex;
    flex-direction:column;
    gap:18px;
    position:relative;
    z-index:2;
  }
  header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:14px;
    flex-wrap:wrap;
  }
  .brand{
    font-family:'Major Mono Display', monospace;
    font-size:clamp(28px, 5vw, 44px);
    color:var(--green);
    text-shadow:0 0 20px var(--green-glow);
    letter-spacing:0.04em;
  }
  .brand em{font-style:normal;color:var(--amber)}
  .tag{
    font-size:14px;
    letter-spacing:0.32em;
    color:var(--dim);
    text-transform:uppercase;
    font-family:'VT323', monospace;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    padding:14px 16px;
  }
  .panel-head{
    font-size:14px;
    letter-spacing:0.28em;
    color:var(--green-dim);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .program{
    font-size:18px;
    line-height:1.6;
    word-break:break-all;
    color:var(--ink);
    letter-spacing:0.02em;
  }
  .program .cur{
    background:var(--green);
    color:#000;
    padding:0 2px;
    box-shadow:0 0 12px var(--green-glow);
  }
  .program .done{color:var(--dim)}
  .tape-wrap{
    overflow-x:auto;
    padding-bottom:8px;
  }
  .tape{
    display:flex;
    gap:4px;
  }
  .cell{
    flex-shrink:0;
    width:54px;
    height:60px;
    border:1px solid var(--line);
    background:var(--bg);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'VT323', monospace;
    color:var(--ink);
    transition:all 0.15s;
    position:relative;
  }
  .cell.active{
    border-color:var(--green);
    box-shadow:0 0 16px var(--green-glow), inset 0 0 12px rgba(95,255,140,0.1);
    color:var(--green);
  }
  .cell .v{
    font-size:22px;
    line-height:1;
  }
  .cell .ch{
    font-size:11px;
    color:var(--amber);
    margin-top:3px;
    height:12px;
    letter-spacing:0.05em;
  }
  .cell .idx{
    position:absolute;
    top:2px;
    left:4px;
    font-size:10px;
    color:var(--dim);
  }
  .controls{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  button{
    background:transparent;
    border:1px solid var(--green-dim);
    color:var(--green);
    font-family:'VT323', monospace;
    font-size:16px;
    padding:6px 16px;
    cursor:pointer;
    letter-spacing:0.1em;
    text-transform:uppercase;
    transition:all 0.15s;
  }
  button:hover{
    background:rgba(95,255,140,0.08);
    border-color:var(--green);
    box-shadow:0 0 12px var(--green-glow);
  }
  button:disabled{opacity:0.35;cursor:not-allowed}
  .speed{
    margin-left:auto;
    display:flex;
    gap:8px;
    align-items:center;
    font-size:14px;
    color:var(--dim);
    letter-spacing:0.18em;
    text-transform:uppercase;
  }
  .speed input{
    accent-color:var(--green);
    width:120px;
  }
  .stats{
    display:flex;
    gap:24px;
    font-size:14px;
    color:var(--dim);
    letter-spacing:0.18em;
    text-transform:uppercase;
    flex-wrap:wrap;
  }
  .stats b{color:var(--amber);font-weight:normal;letter-spacing:0}
  .out{
    background:var(--panel);
    border:1px solid var(--line);
    padding:14px 16px;
    font-size:24px;
    color:var(--green);
    text-shadow:0 0 18px var(--green-glow);
    min-height:54px;
    word-break:break-all;
    letter-spacing:0.04em;
    line-height:1.4;
  }
  .out::after{
    content:'_';
    animation:blink 1s steps(1) infinite;
    color:var(--green);
    margin-left:2px;
  }
  @keyframes blink{50%{opacity:0}}
  .footer{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    color:var(--dim);
    font-size:13px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    align-items:baseline;
  }
  .footer em{
    font-family:'Newsreader', serif;
    font-style:italic;
    text-transform:none;
    letter-spacing:0;
    font-size:15px;
    color:var(--green);
  }
  @media (max-width:520px){
    .cell{width:42px;height:50px}
    .cell .v{font-size:16px}
  }
</style>
</head>
<body>
<div class="stage">
  <header>
    <div class="brand">hello,<em>·brainfuck</em></div>
    <div class="tag">№ 03 · 8-instruction set</div>
  </header>

  <div class="panel">
    <div class="panel-head">Program</div>
    <div class="program" id="program"></div>
  </div>

  <div class="panel">
    <div class="panel-head">Tape <span style="color:var(--dim)">— ptr <b id="ptrLbl" style="color:var(--green)">0</b></span></div>
    <div class="tape-wrap"><div class="tape" id="tape"></div></div>
  </div>

  <div class="controls">
    <button id="run">▸ run</button>
    <button id="step">step</button>
    <button id="reset">reset</button>
    <div class="speed">
      <span>speed</span>
      <input type="range" id="speed" min="1" max="200" value="60" />
    </div>
  </div>

  <div class="stats">
    <span>steps <b id="steps">0</b></span>
    <span>output <b id="outChars">0</b> ch</span>
    <span>state <b id="state">idle</b></span>
  </div>

  <div class="panel">
    <div class="panel-head">Stdout</div>
    <div class="out" id="out"></div>
  </div>

  <div class="footer">
    <span>8 INSTRUCTIONS · 30K CELL TAPE · TURING-COMPLETE</span>
    <em>simple grammar. cruel composition.</em>
  </div>
</div>

<script>
'use strict';
// Classic hello-world brainfuck program (Wikipedia canonical)
const SRC = '++++++++[>++++[>++>+++>+++>+<<<<-]>+>+>->>+[<]<-]>>.>---.+++++++..+++.>>.<-.<.+++.------.--------.>>+.>++.';

const tapeSize = 24;
let tape = new Uint8Array(tapeSize);
let ptr = 0;
let pc = 0;
let steps = 0;
let output = '';
let running = false;
let timer = null;
let bracketMap = {};

const programEl = document.getElementById('program');
const tapeEl = document.getElementById('tape');
const outEl = document.getElementById('out');
const ptrLbl = document.getElementById('ptrLbl');
const stepsLbl = document.getElementById('steps');
const outCharsLbl = document.getElementById('outChars');
const stateLbl = document.getElementById('state');
const runBtn = document.getElementById('run');
const stepBtn = document.getElementById('step');
const resetBtn = document.getElementById('reset');
const speedEl = document.getElementById('speed');

function buildBracketMap(){
  bracketMap = {};
  const stack = [];
  for(let i=0;i<SRC.length;i++){
    if(SRC[i] === '[') stack.push(i);
    else if(SRC[i] === ']'){
      const j = stack.pop();
      bracketMap[i] = j;
      bracketMap[j] = i;
    }
  }
}

function renderProgram(){
  let html = '';
  for(let i=0;i<SRC.length;i++){
    if(i === pc) html += `<span class="cur">${SRC[i]}</span>`;
    else if(i < pc) html += `<span class="done">${SRC[i]}</span>`;
    else html += SRC[i];
  }
  programEl.innerHTML = html;
}

function renderTape(){
  tapeEl.innerHTML = '';
  for(let i=0;i<tapeSize;i++){
    const v = tape[i];
    const ch = (v >= 32 && v < 127) ? String.fromCharCode(v) : '·';
    const active = i === ptr ? ' active' : '';
    const div = document.createElement('div');
    div.className = 'cell' + active;
    div.innerHTML = `<span class="idx">${i}</span><span class="v">${v}</span><span class="ch">${v === 10 ? '\\n' : (v === 0 ? '·' : ch)}</span>`;
    tapeEl.appendChild(div);
  }
  ptrLbl.textContent = ptr;
}

function renderOut(){
  outEl.textContent = output;
  outCharsLbl.textContent = output.length;
}

function renderStats(state){
  stepsLbl.textContent = steps;
  if(state) stateLbl.textContent = state;
}

function step(){
  if(pc >= SRC.length){
    stop('done');
    return false;
  }
  const c = SRC[pc];
  switch(c){
    case '+': tape[ptr] = (tape[ptr] + 1) & 0xff; break;
    case '-': tape[ptr] = (tape[ptr] - 1) & 0xff; break;
    case '>': ptr = (ptr + 1) % tapeSize; break;
    case '<': ptr = (ptr - 1 + tapeSize) % tapeSize; break;
    case '.': output += String.fromCharCode(tape[ptr]); break;
    case ',': /* no input in this demo */ break;
    case '[': if(tape[ptr] === 0) pc = bracketMap[pc]; break;
    case ']': if(tape[ptr] !== 0) pc = bracketMap[pc]; break;
  }
  pc++;
  steps++;
  return true;
}

function loop(){
  const speed = parseInt(speedEl.value, 10);
  // Run "speed" steps per frame for fast end of slider
  const stepsPerTick = Math.max(1, Math.floor(speed / 8));
  for(let i=0;i<stepsPerTick;i++){
    if(!step()){
      renderAll();
      return;
    }
  }
  renderAll();
  // tick interval inversely proportional to speed
  const delay = Math.max(0, 220 - speed);
  timer = setTimeout(loop, delay);
}

function renderAll(){
  renderProgram();
  renderTape();
  renderOut();
  renderStats();
}

function start(){
  if(running) return;
  running = true;
  stateLbl.textContent = 'running';
  runBtn.textContent = '∥ pause';
  loop();
}

function stop(state){
  running = false;
  if(timer){clearTimeout(timer);timer=null}
  runBtn.textContent = '▸ run';
  if(state) stateLbl.textContent = state;
}

function reset(){
  stop('idle');
  tape = new Uint8Array(tapeSize);
  ptr = 0;
  pc = 0;
  steps = 0;
  output = '';
  renderAll();
}

runBtn.addEventListener('click', () => {
  if(running) stop('paused');
  else start();
});
stepBtn.addEventListener('click', () => {
  if(running) stop('paused');
  step();
  renderAll();
});
resetBtn.addEventListener('click', reset);

buildBracketMap();
renderAll();
</script>
</body>
</html>
