<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Super Sloppy Bros</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%95%B9%EF%B8%8F" />
<meta name="description" content="Neon platformer. Jump between glowing platforms. Grab the stars. Reach the flag." />
<meta property="og:title" content="Super Sloppy Bros" />
<meta property="og:description" content="Neon platformer. Jump, bounce, grab stars, reach the flag." />
<meta property="og:url" content="https://sloppy.live/super-sloppy-bros" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/retro%20neon%20synthwave%20platformer%20game%20screenshot%2C%20glowing%20cyan%20and%20pink%20platforms%20floating%20in%20deep%20purple%20space%2C%20small%20teal%20blob%20character%20jumping%2C%20grid%20floor%2C%2080s%20arcade%20aesthetic?width=1200&height=630&nologo=true" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Press+Start+2P&family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #0d0420;
    --bg-1: #1a0838;
    --bg-2: #2a0b4e;
    --pink: #ff2ea6;
    --cyan: #00f0ff;
    --lime: #a7ff3f;
    --amber: #ffcb36;
    --violet: #c66dff;
    --teal: #3ce8c2;
    --white: #f6f6ff;
    --ink: #0a0415;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--bg-0);
    font-family: 'Space Mono', monospace;
    color: var(--white);
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  body {
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(255, 46, 166, 0.22) 0%, transparent 60%),
      radial-gradient(1000px 500px at 50% 110%, rgba(0, 240, 255, 0.18) 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 55%, var(--bg-2) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 0;
    position: fixed;
    inset: 0;
  }
  .stage {
    position: relative;
    width: min(96vw, 1100px);
    aspect-ratio: 16 / 9;
    max-height: 90vh;
    background: #05020f;
    border: 2px solid var(--pink);
    box-shadow:
      0 0 30px rgba(255, 46, 166, 0.4),
      0 0 80px rgba(0, 240, 255, 0.2),
      inset 0 0 40px rgba(255, 46, 166, 0.1);
    border-radius: 4px;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }
  .hud {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--cyan);
    text-shadow: 2px 2px 0 #000, 0 0 8px var(--cyan);
    z-index: 3;
    pointer-events: none;
  }
  .hud .pink { color: var(--pink); text-shadow: 2px 2px 0 #000, 0 0 8px var(--pink); }
  .hud .amber { color: var(--amber); text-shadow: 2px 2px 0 #000, 0 0 8px var(--amber); }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(13, 4, 32, 0.72);
    backdrop-filter: blur(3px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 4;
    padding: 24px;
    transition: opacity 0.3s;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-family: 'Bungee Shade', sans-serif;
    font-size: clamp(40px, 7vw, 88px);
    color: var(--pink);
    margin: 0 0 8px;
    line-height: 0.95;
    letter-spacing: 0.02em;
    text-shadow: 0 0 30px rgba(255, 46, 166, 0.7);
  }
  .overlay h1 .c { color: var(--cyan); text-shadow: 0 0 30px rgba(0, 240, 255, 0.7); }
  .overlay h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(18px, 2.8vw, 28px);
    color: var(--lime);
    margin: 14px 0 6px;
    text-shadow: 3px 3px 0 #000, 0 0 14px var(--lime);
    letter-spacing: 0.04em;
  }
  .overlay p {
    font-family: 'VT323', monospace;
    font-size: clamp(20px, 2.4vw, 28px);
    color: var(--white);
    margin: 4px 0;
    letter-spacing: 0.04em;
  }
  .blink {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(12px, 1.6vw, 14px);
    color: var(--amber);
    margin-top: 22px;
    animation: blink 1s steps(2, jump-none) infinite;
    text-shadow: 2px 2px 0 #000, 0 0 10px var(--amber);
  }
  @keyframes blink { 0%, 60% { opacity: 1; } 61%, 100% { opacity: 0; } }
  .keys {
    font-family: 'VT323', monospace;
    font-size: clamp(16px, 2vw, 22px);
    color: var(--cyan);
    margin: 18px 0 0;
    letter-spacing: 0.1em;
    opacity: 0.9;
  }
  .keys kbd {
    display: inline-block;
    padding: 2px 8px;
    margin: 0 2px;
    background: #1a0838;
    border: 1px solid var(--cyan);
    border-radius: 3px;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.55em;
    color: var(--cyan);
    text-shadow: 0 0 6px var(--cyan);
    box-shadow: 0 2px 0 rgba(0, 240, 255, 0.3);
  }

  .touch-controls {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    display: none;
  }
  .touch-controls.on { display: block; }
  .tc-btn {
    position: absolute;
    bottom: 28px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid var(--cyan);
    background: rgba(0, 240, 255, 0.22);
    color: var(--cyan);
    font-family: 'Press Start 2P', monospace;
    font-size: 32px;
    line-height: 140px;
    text-align: center;
    pointer-events: auto;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    backdrop-filter: blur(4px);
    box-shadow: 0 0 22px rgba(0, 240, 255, 0.55);
  }
  .tc-btn:active { background: rgba(0, 240, 255, 0.42); transform: scale(0.94); }
  .tc-left  { left: 24px; }
  .tc-right { left: 184px; }
  .tc-jump  {
    right: 24px;
    width: 170px; height: 170px;
    border-color: var(--pink);
    color: var(--pink);
    background: rgba(255, 46, 166, 0.22);
    font-size: 26px;
    line-height: 170px;
    box-shadow: 0 0 26px rgba(255, 46, 166, 0.55);
  }
  .tc-jump:active { background: rgba(255, 46, 166, 0.42); transform: scale(0.94); }
  @media (max-width: 620px) {
    .tc-btn   { width: 108px; height: 108px; line-height: 108px; font-size: 24px; }
    .tc-right { left: 148px; }
    .tc-jump  { width: 132px; height: 132px; line-height: 132px; font-size: 22px; }
  }

  .start-btn {
    margin-top: 26px;
    padding: 20px 44px;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(18px, 2.4vw, 26px);
    letter-spacing: 0.06em;
    color: #0d0420;
    background: var(--amber);
    border: 4px solid #0d0420;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 6px 0 #0d0420, 0 0 24px rgba(255, 197, 64, 0.6);
    text-shadow: 2px 2px 0 rgba(255,255,255,0.35);
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .start-btn:hover { transform: translateY(-2px); }
  .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0d0420, 0 0 18px rgba(255, 197, 64, 0.6); }

  @media (max-width: 820px), (pointer: coarse) {
    .touch-controls { display: block; }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <canvas id="game" width="960" height="540"></canvas>

    <div class="hud" id="hud">
      <span>★ <span id="coins">0</span>/<span id="coinsTotal">0</span></span>
      <span class="pink">♥ <span id="lives">3</span></span>
      <span class="amber"><span id="timer">0.0</span>s</span>
    </div>

    <div class="touch-controls" id="touchControls">
      <div class="tc-btn tc-left"  id="tcLeft">◀</div>
      <div class="tc-btn tc-right" id="tcRight">▶</div>
      <div class="tc-btn tc-jump"  id="tcJump">JUMP</div>
    </div>

    <div class="overlay" id="titleScreen">
      <h1>SUPER <span class="c">SLOPPY</span> BROS</h1>
      <p style="color: var(--violet); font-size: clamp(18px, 2.2vw, 24px); margin-top: 4px;">★ A NEON JUMP AFFAIR ★</p>
      <div class="keys">
        move <kbd>←</kbd><kbd>→</kbd> or <kbd>A</kbd><kbd>D</kbd> &nbsp;·&nbsp; jump <kbd>SPACE</kbd> or <kbd>↑</kbd>
      </div>
      <button class="start-btn" id="startBtn" type="button">▶ START</button>
      <div class="blink">tap or press any key</div>
    </div>

    <div class="overlay hidden" id="winScreen">
      <h2>STAGE CLEAR!</h2>
      <p>stars collected: <span id="winCoins">0</span>/<span id="winCoinsTotal">0</span></p>
      <p>time: <span id="winTime">0.0</span>s</p>
      <p>lives remaining: <span id="winLives">3</span></p>
      <button class="start-btn" id="winBtn" type="button">▶ PLAY AGAIN</button>
      <div class="blink">tap or press any key</div>
    </div>

    <div class="overlay hidden" id="loseScreen">
      <h2 style="color: var(--pink); text-shadow: 3px 3px 0 #000, 0 0 14px var(--pink);">GAME OVER</h2>
      <p>the sloppy bros will rise again</p>
      <button class="start-btn" id="loseBtn" type="button">▶ RESTART</button>
      <div class="blink">tap or press any key</div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const titleScreen = document.getElementById('titleScreen');
  const winScreen = document.getElementById('winScreen');
  const loseScreen = document.getElementById('loseScreen');
  const coinsEl = document.getElementById('coins');
  const coinsTotalEl = document.getElementById('coinsTotal');
  const livesEl = document.getElementById('lives');
  const timerEl = document.getElementById('timer');
  const winCoinsEl = document.getElementById('winCoins');
  const winCoinsTotalEl = document.getElementById('winCoinsTotal');
  const winTimeEl = document.getElementById('winTime');
  const winLivesEl = document.getElementById('winLives');

  // ---------- audio ----------
  let ac = null;
  function ensureAudio() {
    if (!ac) try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    if (ac && ac.state === 'suspended') ac.resume();
  }
  function tone({ freq, type = 'square', dur = 0.15, vol = 0.14, sweep = 0, filter = null }) {
    ensureAudio();
    if (!ac) return;
    const now = ac.currentTime;
    const o = ac.createOscillator();
    o.type = type;
    o.frequency.setValueAtTime(freq, now);
    if (sweep) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + sweep), now + dur);
    const g = ac.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    let last = o;
    if (filter) {
      const f = ac.createBiquadFilter();
      f.type = filter.type;
      f.frequency.value = filter.freq;
      last.connect(f);
      last = f;
    }
    last.connect(g).connect(ac.destination);
    o.start(now); o.stop(now + dur);
  }
  function sfxJump()   { tone({ freq: 420, type: 'square',   dur: 0.14, vol: 0.12, sweep: 260 }); }
  function sfxLand()   { tone({ freq: 180, type: 'triangle', dur: 0.08, vol: 0.08 }); }
  function sfxCoin()   { tone({ freq: 880, type: 'square', dur: 0.07, vol: 0.1 }); setTimeout(() => tone({ freq: 1320, type: 'square', dur: 0.12, vol: 0.1 }), 60); }
  function sfxDeath()  { tone({ freq: 440, type: 'sawtooth', dur: 0.45, vol: 0.16, sweep: -360 }); }
  function sfxWin()    {
    [523.25, 659.25, 783.99, 1046.5].forEach((f, i) =>
      setTimeout(() => tone({ freq: f, type: 'square', dur: 0.18, vol: 0.13 }), i * 120));
  }
  function sfxStep()   { tone({ freq: 70, type: 'triangle', dur: 0.05, vol: 0.04 }); }

  // ---------- level ----------
  const LEVEL = {
    width: 3200,
    height: H,
    pits: [
      { x: 880,  w: 240 },
      { x: 1720, w: 200 },
      { x: 2520, w: 140 }
    ],
    // y origin top; ground surface at y=470 typically
    platforms: [
      // Ground
      { x: 0,    y: 490, w: 880,  h: 60, color: 'cyan' },
      { x: 1120, y: 490, w: 600,  h: 60, color: 'cyan' },
      { x: 1920, y: 490, w: 600,  h: 60, color: 'cyan' },
      { x: 2660, y: 490, w: 540,  h: 60, color: 'cyan' },

      // Climb after first pit, floating platforms
      { x: 460,  y: 410, w: 80,   h: 16, color: 'pink' },
      { x: 600,  y: 340, w: 80,   h: 16, color: 'lime' },
      { x: 740,  y: 280, w: 100,  h: 16, color: 'amber' },
      { x: 920,  y: 340, w: 110,  h: 16, color: 'pink',
        move: { axis: 'x', amp: 90, period: 3.6 } },

      // Middle floating cluster
      { x: 1200, y: 410, w: 90,   h: 16, color: 'lime' },
      { x: 1340, y: 340, w: 90,   h: 16, color: 'pink' },
      { x: 1480, y: 280, w: 90,   h: 16, color: 'amber' },
      { x: 1620, y: 340, w: 90,   h: 16, color: 'lime' },
      { x: 1760, y: 400, w: 120,  h: 16, color: 'pink',
        move: { axis: 'y', amp: 50, period: 2.4 } },

      // After 2nd pit — staircase
      { x: 2000, y: 410, w: 90,   h: 16, color: 'amber' },
      { x: 2140, y: 350, w: 90,   h: 16, color: 'lime' },
      { x: 2280, y: 290, w: 90,   h: 16, color: 'pink' },
      { x: 2420, y: 230, w: 110,  h: 16, color: 'amber' },

      // After final pit — goal area
      { x: 2700, y: 390, w: 120,  h: 16, color: 'lime' },
      { x: 2880, y: 310, w: 120,  h: 16, color: 'pink' },
      { x: 3040, y: 230, w: 160,  h: 16, color: 'amber' },

      // Classic green pipes — solid, stand on top
      { x: 310,  y: 420, w: 58,   h: 70, kind: 'pipe' },
      { x: 1380, y: 440, w: 58,   h: 50, kind: 'pipe' },
      { x: 2080, y: 410, w: 58,   h: 80, kind: 'pipe' },
      { x: 2760, y: 430, w: 58,   h: 60, kind: 'pipe' }
    ],
    mushrooms: [
      // +1 life power-ups tucked in tricky spots
      { x: 840,  y: 258 },   // on top of the high amber platform
      { x: 1800, y: 370 },   // near moving platform
      { x: 2475, y: 210 }    // atop the staircase finale
    ],
    grumpies: [
      // Classic walking enemies — stomp from above to defeat
      { x: 340,  y: 464, minX: 170,  maxX: 430,  dir: 1,  speed: 60 },
      { x: 1280, y: 464, minX: 1140, maxX: 1580, dir: -1, speed: 75 },
      { x: 2350, y: 464, minX: 1970, maxX: 2500, dir: 1,  speed: 70 }
    ],
    coins: [
      // Climb coins
      { x: 500,  y: 370 }, { x: 640, y: 300 }, { x: 790, y: 240 },
      // Over moving platform
      { x: 975,  y: 290 },
      // Middle cluster
      { x: 1245, y: 360 }, { x: 1385, y: 290 }, { x: 1525, y: 230 }, { x: 1665, y: 290 },
      // After 2nd pit — staircase
      { x: 2045, y: 360 }, { x: 2185, y: 300 }, { x: 2325, y: 240 }, { x: 2475, y: 180 },
      // Final approach
      { x: 2760, y: 340 }, { x: 2940, y: 260 }
    ],
    hazards: [
      // Bouncing orb enemies on ground between pits
      { x: 1400, y: 470, minX: 1160, maxX: 1700, dir: 1, speed: 80, bounce: 28, phase: 0 },
      { x: 2200, y: 470, minX: 1960, maxX: 2500, dir: -1, speed: 100, bounce: 32, phase: 1.2 }
    ],
    spawn: { x: 60, y: 430 },
    goal: { x: 3140, y: 150 }
  };

  coinsTotalEl.textContent = LEVEL.coins.length;

  // ---------- game state ----------
  const COLORS = {
    cyan:  '#00f0ff',
    pink:  '#ff2ea6',
    lime:  '#a7ff3f',
    amber: '#ffcb36',
    violet:'#c66dff',
    teal:  '#3ce8c2'
  };

  const GRAVITY = 2400;
  const JUMP_V  = -720;
  const MOVE_ACCEL = 1800;
  const MOVE_MAX   = 260;
  const FRICTION   = 1400;
  const COYOTE_TIME = 0.12;
  const JUMP_BUFFER = 0.10;

  const input = { left: false, right: false, jump: false, jumpPressed: false };
  const keys = {};

  let mode = 'title'; // title | playing | win | lose
  let player;
  let coins;
  let hazards;
  let platforms;
  let mushrooms;
  let grumpies;
  let time;
  let cameraX;
  let shake;
  let particles;
  let stars;
  let bgT;

  function resetGame() {
    player = {
      x: LEVEL.spawn.x, y: LEVEL.spawn.y,
      vx: 0, vy: 0,
      w: 30, h: 34,
      onGround: false,
      coyote: 0,
      jumpBuf: 0,
      facing: 1,
      squash: 0,
      trail: [],
      lives: 3,
      dead: false,
      deadTimer: 0,
      standingOn: null,
      stepTimer: 0
    };
    coins = LEVEL.coins.map(c => ({ x: c.x, y: c.y, taken: false, phase: Math.random() * Math.PI * 2 }));
    hazards = LEVEL.hazards.map(h => ({ ...h, phase: h.phase || 0 }));
    platforms = LEVEL.platforms.map(p => ({ ...p, baseX: p.x, baseY: p.y, dx: 0, dy: 0 }));
    mushrooms = LEVEL.mushrooms.map(m => ({ x: m.x, y: m.y, taken: false, phase: Math.random() * Math.PI * 2 }));
    grumpies = LEVEL.grumpies.map(g => ({ ...g, w: 30, h: 26, alive: true, deadTimer: 0, walkPhase: 0 }));
    time = 0;
    cameraX = 0;
    shake = 0;
    particles = [];
    stars = [];
    for (let i = 0; i < 18; i++) {
      stars.push({
        x: Math.random() * LEVEL.width,
        y: 40 + Math.random() * 220,
        r: Math.random() * 1.4 + 0.5,
        phase: Math.random() * Math.PI * 2
      });
    }
    bgT = 0;
    coinsEl.textContent = 0;
    livesEl.textContent = player.lives;
    timerEl.textContent = '0.0';
  }

  function respawn() {
    player.x = LEVEL.spawn.x;
    player.y = LEVEL.spawn.y;
    player.vx = 0; player.vy = 0;
    player.dead = false;
    player.deadTimer = 0;
    player.facing = 1;
  }

  function startGame() {
    resetGame();
    mode = 'playing';
    titleScreen.classList.add('hidden');
    winScreen.classList.add('hidden');
    loseScreen.classList.add('hidden');
  }

  // Touch/click start buttons on each overlay
  ['startBtn', 'winBtn', 'loseBtn'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const begin = (e) => { e.preventDefault(); e.stopPropagation(); ensureAudio(); startGame(); };
    btn.addEventListener('click', begin);
    btn.addEventListener('touchstart', begin, { passive: false });
  });

  // ---------- input ----------
  window.addEventListener('keydown', (e) => {
    if (mode !== 'playing') {
      if (!e.repeat) { ensureAudio(); startGame(); }
      return;
    }
    if (['ArrowLeft','KeyA'].includes(e.code)) input.left = true;
    if (['ArrowRight','KeyD'].includes(e.code)) input.right = true;
    if (['Space','ArrowUp','KeyW'].includes(e.code)) {
      if (!input.jump) input.jumpPressed = true;
      input.jump = true;
      e.preventDefault();
    }
    keys[e.code] = true;
  });
  window.addEventListener('keyup', (e) => {
    if (['ArrowLeft','KeyA'].includes(e.code)) input.left = false;
    if (['ArrowRight','KeyD'].includes(e.code)) input.right = false;
    if (['Space','ArrowUp','KeyW'].includes(e.code)) input.jump = false;
    keys[e.code] = false;
  });

  // Touch controls
  const setupTouch = (id, onDown, onUp) => {
    const el = document.getElementById(id);
    const down = (e) => { e.preventDefault(); ensureAudio(); if (mode !== 'playing') { startGame(); return; } onDown(); };
    const up   = (e) => { e.preventDefault(); onUp(); };
    el.addEventListener('touchstart', down);
    el.addEventListener('touchend', up);
    el.addEventListener('touchcancel', up);
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
  };
  setupTouch('tcLeft',  () => input.left = true,  () => input.left = false);
  setupTouch('tcRight', () => input.right = true, () => input.right = false);
  setupTouch('tcJump',  () => { if (!input.jump) input.jumpPressed = true; input.jump = true; }, () => input.jump = false);

  // ---------- physics helpers ----------
  function inPit(x) {
    return LEVEL.pits.some(p => x > p.x && x < p.x + p.w);
  }

  function aabb(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function updatePlatforms(dt) {
    for (const p of platforms) {
      if (!p.move) continue;
      p.dx = 0; p.dy = 0;
      const freq = (2 * Math.PI) / p.move.period;
      const t = time;
      if (p.move.axis === 'x') {
        const nx = p.baseX + Math.sin(t * freq) * p.move.amp;
        p.dx = nx - p.x;
        p.x = nx;
      } else {
        const ny = p.baseY + Math.sin(t * freq) * p.move.amp;
        p.dy = ny - p.y;
        p.y = ny;
      }
    }
  }

  function updateHazards(dt) {
    for (const h of hazards) {
      h.x += h.dir * h.speed * dt;
      if (h.x < h.minX) { h.x = h.minX; h.dir = 1; }
      if (h.x > h.maxX) { h.x = h.maxX; h.dir = -1; }
      h.phase += dt * 6;
    }
  }

  function updateGrumpies(dt) {
    for (const g of grumpies) {
      if (!g.alive) {
        g.deadTimer += dt;
        continue;
      }
      g.x += g.dir * g.speed * dt;
      if (g.x < g.minX) { g.x = g.minX; g.dir = 1; }
      if (g.x > g.maxX) { g.x = g.maxX; g.dir = -1; }
      g.walkPhase += dt * 7;
    }
  }

  function updatePlayer(dt) {
    if (player.dead) {
      player.deadTimer += dt;
      player.vy += GRAVITY * 0.4 * dt;
      player.y += player.vy * dt;
      player.x += player.vx * dt;
      if (player.deadTimer > 1.1) {
        if (player.lives <= 0) {
          mode = 'lose';
          loseScreen.classList.remove('hidden');
        } else {
          respawn();
        }
      }
      return;
    }

    // Carry from moving platform standing on
    if (player.standingOn) {
      player.x += player.standingOn.dx;
      // Vertical follow (sticky)
      player.y += player.standingOn.dy;
    }

    // Horizontal input
    const accel = MOVE_ACCEL;
    if (input.left && !input.right) {
      player.vx -= accel * dt;
      player.facing = -1;
    } else if (input.right && !input.left) {
      player.vx += accel * dt;
      player.facing = 1;
    } else {
      // Friction
      if (player.vx > 0) player.vx = Math.max(0, player.vx - FRICTION * dt);
      else if (player.vx < 0) player.vx = Math.min(0, player.vx + FRICTION * dt);
    }
    player.vx = Math.max(-MOVE_MAX, Math.min(MOVE_MAX, player.vx));

    // Jump handling
    player.coyote = Math.max(0, player.coyote - dt);
    player.jumpBuf = Math.max(0, player.jumpBuf - dt);
    if (input.jumpPressed) { player.jumpBuf = JUMP_BUFFER; input.jumpPressed = false; }

    if (player.jumpBuf > 0 && (player.onGround || player.coyote > 0)) {
      player.vy = JUMP_V;
      player.onGround = false;
      player.coyote = 0;
      player.jumpBuf = 0;
      player.squash = -0.4;   // stretch
      sfxJump();
    }
    // Variable jump: release cuts vertical speed
    if (!input.jump && player.vy < -200) player.vy *= 0.92;

    // Gravity
    player.vy += GRAVITY * dt;
    if (player.vy > 1200) player.vy = 1200;

    // Step SFX
    if (player.onGround && Math.abs(player.vx) > 60) {
      player.stepTimer -= dt;
      if (player.stepTimer <= 0) { sfxStep(); player.stepTimer = 0.22; }
    } else {
      player.stepTimer = 0;
    }

    // Apply x then resolve
    player.x += player.vx * dt;
    for (const p of platforms) {
      if (aabb(player, p)) {
        if (player.vx > 0) player.x = p.x - player.w;
        else if (player.vx < 0) player.x = p.x + p.w;
        player.vx = 0;
      }
    }

    // Apply y then resolve
    const prevOnGround = player.onGround;
    player.y += player.vy * dt;
    player.onGround = false;
    player.standingOn = null;
    for (const p of platforms) {
      if (aabb(player, p)) {
        if (player.vy > 0) {
          player.y = p.y - player.h;
          if (!prevOnGround) { sfxLand(); player.squash = 0.35; }
          player.onGround = true;
          player.standingOn = p;
        } else if (player.vy < 0) {
          player.y = p.y + p.h;
        }
        player.vy = 0;
      }
    }
    if (prevOnGround && !player.onGround && player.vy >= 0) player.coyote = COYOTE_TIME;

    // Coin pickup
    for (const c of coins) {
      if (c.taken) continue;
      const dx = (player.x + player.w/2) - c.x;
      const dy = (player.y + player.h/2) - c.y;
      if (dx*dx + dy*dy < 28 * 28) {
        c.taken = true;
        coinsEl.textContent = coins.filter(x => x.taken).length;
        sfxCoin();
        for (let i = 0; i < 12; i++) {
          particles.push({
            x: c.x, y: c.y,
            vx: (Math.random() - 0.5) * 260,
            vy: (Math.random() - 0.8) * 240,
            life: 0.6, color: '#ffcb36'
          });
        }
      }
    }

    // Hazard collision
    for (const h of hazards) {
      const bounce = Math.abs(Math.sin(h.phase)) * h.bounce;
      const hx = h.x, hy = h.y - bounce;
      const dx = (player.x + player.w/2) - hx;
      const dy = (player.y + player.h/2) - hy;
      if (dx*dx + dy*dy < 26 * 26) die();
    }

    // Grumpy (classic walker) collision — stomp from above or die
    for (const g of grumpies) {
      if (!g.alive) continue;
      const gBox = { x: g.x - g.w/2, y: g.y - g.h, w: g.w, h: g.h };
      if (aabb(player, gBox)) {
        const playerBottom = player.y + player.h;
        const grumpyTop = gBox.y;
        if (player.vy > 0 && playerBottom - player.vy * dt <= grumpyTop + 6) {
          // Stomp!
          g.alive = false;
          player.vy = -480;                // bounce back up
          player.squash = 0.5;
          shake = 6;
          tone({ freq: 300, type: 'square', dur: 0.1, vol: 0.13, sweep: -180 });
          for (let i = 0; i < 10; i++) {
            particles.push({
              x: g.x, y: grumpyTop,
              vx: (Math.random() - 0.5) * 260,
              vy: (Math.random() - 1) * 180,
              life: 0.6, color: '#ff7b2e'
            });
          }
        } else {
          die();
          break;
        }
      }
    }

    // Mushroom pickup — +1 life
    for (const m of mushrooms) {
      if (m.taken) continue;
      const dx = (player.x + player.w/2) - m.x;
      const dy = (player.y + player.h/2) - (m.y);
      if (dx*dx + dy*dy < 26 * 26) {
        m.taken = true;
        player.lives += 1;
        livesEl.textContent = player.lives;
        // Cheerful ascending chime
        tone({ freq: 523.25, type: 'square', dur: 0.11, vol: 0.13 });
        setTimeout(() => tone({ freq: 659.25, type: 'square', dur: 0.11, vol: 0.13 }), 80);
        setTimeout(() => tone({ freq: 1046.5, type: 'square', dur: 0.18, vol: 0.13 }), 160);
        for (let i = 0; i < 14; i++) {
          particles.push({
            x: m.x, y: m.y,
            vx: (Math.random() - 0.5) * 300,
            vy: (Math.random() - 1.1) * 240,
            life: 0.7, color: '#ff4a68'
          });
        }
      }
    }

    // Pit / fall
    if (player.y > H + 80 || (player.onGround && inPit(player.x + player.w/2) && Math.abs(player.vy) < 1)) {
      die();
    }

    // Goal reached
    const goalBox = { x: LEVEL.goal.x - 14, y: LEVEL.goal.y - 10, w: 28, h: 80 };
    if (aabb(player, goalBox)) win();

    // Ease squash back to neutral
    player.squash += (0 - player.squash) * Math.min(1, dt * 10);
  }

  function die() {
    if (player.dead) return;
    player.dead = true;
    player.deadTimer = 0;
    player.vy = -420;
    player.vx = player.facing * -80;
    player.lives -= 1;
    livesEl.textContent = Math.max(0, player.lives);
    shake = 14;
    sfxDeath();
    for (let i = 0; i < 22; i++) {
      particles.push({
        x: player.x + player.w/2, y: player.y + player.h/2,
        vx: (Math.random() - 0.5) * 360,
        vy: (Math.random() - 0.8) * 360,
        life: 0.9, color: '#ff2ea6'
      });
    }
  }

  function win() {
    mode = 'win';
    winScreen.classList.remove('hidden');
    winCoinsEl.textContent = coins.filter(c => c.taken).length;
    winCoinsTotalEl.textContent = coins.length;
    winTimeEl.textContent = time.toFixed(1);
    winLivesEl.textContent = Math.max(0, player.lives);
    sfxWin();
  }

  function updateCamera() {
    const targetX = Math.max(0, Math.min(LEVEL.width - W, player.x + player.w/2 - W/2));
    cameraX += (targetX - cameraX) * 0.12;
  }

  function updateParticles(dt) {
    for (const p of particles) {
      p.vy += GRAVITY * 0.4 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);
  }

  // ---------- rendering ----------
  function drawBackground() {
    const shakeX = (Math.random() - 0.5) * shake;
    const shakeY = (Math.random() - 0.5) * shake;
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Classic sky blue
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#5c94fc');
    grd.addColorStop(1, '#8ab7ff');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // Pixel clouds (parallax, reuses `stars` array as cloud seeds)
    for (const s of stars) {
      const cx = (s.x - cameraX * 0.2);
      const wrapped = ((cx % LEVEL.width) + LEVEL.width) % LEVEL.width;
      if (wrapped < -80 || wrapped > W + 80) continue;
      const bob = Math.sin(bgT * 0.6 + s.phase) * 2;
      drawCloud(wrapped, s.y + bob, 10 + s.r * 6);
    }

    // Rolling hills (parallax mid layer)
    const horizon = H * 0.74;
    ctx.fillStyle = '#3aa84a';
    const offset = cameraX * 0.3;
    for (let i = -1; i < 6; i++) {
      const hx = (i * 340) - (offset % 340);
      ctx.beginPath();
      ctx.arc(hx + 170, horizon + 40, 170, Math.PI, 0);
      ctx.fill();
    }
    ctx.fillStyle = '#2e8a3a';
    const offset2 = cameraX * 0.45;
    for (let i = -1; i < 7; i++) {
      const hx = (i * 260) - (offset2 % 260);
      ctx.beginPath();
      ctx.arc(hx + 130, horizon + 75, 130, Math.PI, 0);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawCloud(x, y, s) {
    ctx.save();
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.95;
    // Classic 3-bump cloud
    ctx.beginPath();
    ctx.arc(x,         y,     s * 0.9, 0, Math.PI * 2);
    ctx.arc(x + s*0.9, y - 4, s * 0.7, 0, Math.PI * 2);
    ctx.arc(x - s*0.9, y - 2, s * 0.75, 0, Math.PI * 2);
    ctx.arc(x + s*1.6, y + 2, s * 0.55, 0, Math.PI * 2);
    ctx.arc(x - s*1.5, y + 4, s * 0.55, 0, Math.PI * 2);
    ctx.fill();
    // Subtle underside shadow
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#3a6fc2';
    ctx.fillRect(x - s*1.9, y + s*0.4, s * 3.8, 3);
    ctx.restore();
  }

  function drawPlatform(p) {
    if (p.kind === 'pipe') {
      drawPipe(p);
      return;
    }
    const color = COLORS[p.color] || '#fff';
    ctx.save();
    ctx.shadowBlur = 22;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    // Outer glow rect
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.restore();
    // Inner darker
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(p.x + 2, p.y + 3, p.w - 4, p.h - 4);
    // Top stripe
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.85;
    ctx.fillRect(p.x, p.y, p.w, 2);
    ctx.globalAlpha = 1;
    // Side rim on color
    ctx.fillStyle = color;
    ctx.fillRect(p.x, p.y, p.w, 4);
    ctx.fillRect(p.x, p.y + p.h - 3, p.w, 3);
  }

  function drawPipe(p) {
    // Classic green pipe: flared rim cap on top + narrower body
    const capH = 18;
    const capX = p.x - 4;
    const capW = p.w + 8;
    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(p.x + 6, p.y + p.h, p.w, 3);
    // Body shadow side
    ctx.fillStyle = '#0a7a2c';
    ctx.fillRect(p.x, p.y + capH, p.w, p.h - capH);
    // Body fill
    ctx.fillStyle = '#20bf4c';
    ctx.fillRect(p.x + 4, p.y + capH, p.w - 10, p.h - capH);
    // Body highlight stripe
    ctx.fillStyle = '#8df2a0';
    ctx.fillRect(p.x + 6, p.y + capH, 4, p.h - capH);
    // Rim cap (wider)
    ctx.fillStyle = '#0a7a2c';
    ctx.fillRect(capX, p.y, capW, capH);
    ctx.fillStyle = '#20bf4c';
    ctx.fillRect(capX + 4, p.y + 2, capW - 8, capH - 4);
    // Cap highlight
    ctx.fillStyle = '#8df2a0';
    ctx.fillRect(capX + 6, p.y + 3, 6, capH - 7);
    // Cap top dark rim
    ctx.fillStyle = '#054f1c';
    ctx.fillRect(capX, p.y, capW, 2);
    ctx.fillRect(capX, p.y + capH - 2, capW, 2);
    // Pipe opening (dark interior hint)
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(capX + 6, p.y + 3, capW - 12, 4);
  }

  function drawMushroom(m) {
    if (m.taken) return;
    const bob = Math.sin(bgT * 2.6 + m.phase) * 2;
    const x = m.x, y = m.y + bob;
    // Stem
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(x - 10, y - 2, 20, 16);
    ctx.fillStyle = '#fff1c4';
    ctx.fillRect(x - 8, y, 16, 12);
    // Stem face
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(x - 5, y + 4, 2, 2);
    ctx.fillRect(x + 3, y + 4, 2, 2);
    // Cap (red with dark outline)
    ctx.fillStyle = '#2a1a0a';
    ctx.beginPath();
    ctx.arc(x, y, 18, Math.PI, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ff2f3e';
    ctx.beginPath();
    ctx.arc(x, y, 16, Math.PI, 0);
    ctx.closePath();
    ctx.fill();
    // White spots
    ctx.fillStyle = '#fff1c4';
    ctx.beginPath(); ctx.arc(x - 7, y - 5, 3.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 7, y - 4, 3.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x, y - 11, 3.5, 0, Math.PI * 2); ctx.fill();
    // Cap underside band
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(x - 16, y, 32, 2);
  }

  function drawGrumpy(g) {
    const baseY = g.y;
    const x = g.x;
    if (!g.alive) {
      // Squished — flatten
      ctx.fillStyle = '#2a1a0a';
      ctx.fillRect(x - 18, baseY - 6, 36, 6);
      ctx.fillStyle = '#a84d1a';
      ctx.fillRect(x - 15, baseY - 5, 30, 4);
      // X eyes
      ctx.strokeStyle = '#2a1a0a';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x - 8, baseY - 5); ctx.lineTo(x - 4, baseY - 2);
      ctx.moveTo(x - 4, baseY - 5); ctx.lineTo(x - 8, baseY - 2);
      ctx.moveTo(x + 4, baseY - 5); ctx.lineTo(x + 8, baseY - 2);
      ctx.moveTo(x + 8, baseY - 5); ctx.lineTo(x + 4, baseY - 2);
      ctx.stroke();
      return;
    }
    const footFlip = Math.sin(g.walkPhase) > 0 ? 1 : -1;
    const w = g.w, h = g.h;
    // Feet (alternating)
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(x - 14, baseY - 4, 10, 4);
    ctx.fillRect(x + 4,  baseY - 4, 10, 4);
    // Shoe highlight alternation
    ctx.fillStyle = '#fff1c4';
    if (footFlip > 0) ctx.fillRect(x - 13, baseY - 3, 3, 1);
    else ctx.fillRect(x + 5, baseY - 3, 3, 1);
    // Body (dark outline + brown fill)
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(x - w/2 - 1, baseY - h, w + 2, h - 3);
    ctx.fillStyle = '#a84d1a';
    ctx.fillRect(x - w/2,     baseY - h + 1, w, h - 5);
    // Body shade
    ctx.fillStyle = '#7a3210';
    ctx.fillRect(x - w/2,     baseY - 6, w, 3);
    // Eye whites
    ctx.fillStyle = '#fff1c4';
    ctx.fillRect(x - 10, baseY - h + 7, 7, 6);
    ctx.fillRect(x + 3,  baseY - h + 7, 7, 6);
    // Angry eyebrows
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(x - 11, baseY - h + 5, 8, 2);
    ctx.fillRect(x + 3,  baseY - h + 5, 8, 2);
    ctx.fillRect(x - 7,  baseY - h + 6, 3, 1);
    ctx.fillRect(x + 4,  baseY - h + 6, 3, 1);
    // Pupils
    ctx.fillRect(x - 7, baseY - h + 9, 3, 3);
    ctx.fillRect(x + 5, baseY - h + 9, 3, 3);
    // Fangs
    ctx.fillStyle = '#fff1c4';
    ctx.fillRect(x - 5, baseY - 6, 2, 3);
    ctx.fillRect(x + 3, baseY - 6, 2, 3);
  }

  function drawCoin(c) {
    if (c.taken) return;
    const pulse = 1 + 0.18 * Math.sin(bgT * 5 + c.phase);
    const r = 10 * pulse;
    ctx.save();
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#ffcb36';
    // Outer star-ish circle
    ctx.fillStyle = '#ffcb36';
    ctx.beginPath();
    ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
    ctx.fill();
    // Inner
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff6d0';
    ctx.beginPath();
    ctx.arc(c.x, c.y, r * 0.5, 0, Math.PI * 2);
    ctx.fill();
    // Star sparkle (cross)
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(c.x - r - 3, c.y); ctx.lineTo(c.x + r + 3, c.y);
    ctx.moveTo(c.x, c.y - r - 3); ctx.lineTo(c.x, c.y + r + 3);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawHazard(h) {
    const bounce = Math.abs(Math.sin(h.phase)) * h.bounce;
    const hx = h.x, hy = h.y - bounce;
    ctx.save();
    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(hx, h.y + 16, 14, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Glow orb
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#c66dff';
    ctx.fillStyle = '#c66dff';
    ctx.beginPath();
    ctx.arc(hx, hy, 14, 0, Math.PI * 2);
    ctx.fill();
    // Spiky outline
    ctx.strokeStyle = '#ff2ea6';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff2ea6';
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 + h.phase * 0.5;
      const r = 14 + 4 * (i % 2 === 0 ? 1 : -1);
      const x = hx + Math.cos(a) * r;
      const y = hy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    // Eyes
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(hx - 4, hy - 2, 2.5, 0, Math.PI * 2);
    ctx.arc(hx + 4, hy - 2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0a0415';
    ctx.beginPath();
    ctx.arc(hx - 4, hy - 2, 1.2, 0, Math.PI * 2);
    ctx.arc(hx + 4, hy - 2, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawPlayer() {
    const p = player;
    if (p.dead) {
      // spinning blob on death
      const cx = p.x + p.w/2, cy = p.y + p.h/2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(p.deadTimer * 8 * p.facing);
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#ff2ea6';
      ctx.fillStyle = '#3ce8c2';
      ctx.globalAlpha = Math.max(0, 1 - p.deadTimer);
      ctx.beginPath();
      ctx.ellipse(0, 0, 16, 14, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      return;
    }
    const sq = p.squash;
    const scaleX = 1 + sq;
    const scaleY = 1 - sq;
    const cx = p.x + p.w/2, cy = p.y + p.h/2;

    // Trail
    for (let i = 0; i < p.trail.length; i++) {
      const t = p.trail[i];
      const a = (i / p.trail.length) * 0.3;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.shadowBlur = 14;
      ctx.shadowColor = '#3ce8c2';
      ctx.fillStyle = '#3ce8c2';
      ctx.beginPath();
      ctx.ellipse(t.x, t.y, 12, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scaleX, scaleY);

    // Shadow below
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, p.h/2 + 2, p.w/2 * 0.85, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body — rounded neon blob
    ctx.shadowBlur = 22;
    ctx.shadowColor = '#3ce8c2';
    const bodyGrad = ctx.createRadialGradient(-4, -6, 2, 0, 0, 22);
    bodyGrad.addColorStop(0, '#9fffe7');
    bodyGrad.addColorStop(0.6, '#3ce8c2');
    bodyGrad.addColorStop(1, '#1aa892');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-p.w/2 + 4, -p.h/2 + 4);
    ctx.bezierCurveTo(-p.w/2 - 3, -p.h/2 + 14, -p.w/2 - 3, p.h/2 - 8, -p.w/2 + 8, p.h/2);
    ctx.lineTo(p.w/2 - 8, p.h/2);
    ctx.bezierCurveTo(p.w/2 + 3, p.h/2 - 8, p.w/2 + 3, -p.h/2 + 14, p.w/2 - 4, -p.h/2 + 4);
    ctx.bezierCurveTo(p.w/2 - 10, -p.h/2 - 2, -p.w/2 + 10, -p.h/2 - 2, -p.w/2 + 4, -p.h/2 + 4);
    ctx.closePath();
    ctx.fill();

    // Antenna with pink orb
    ctx.strokeStyle = '#3ce8c2';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(0, -p.h/2 + 2);
    ctx.lineTo(2, -p.h/2 - 6);
    ctx.stroke();
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff2ea6';
    ctx.fillStyle = '#ff2ea6';
    ctx.beginPath();
    ctx.arc(2, -p.h/2 - 7, 3, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    const eyeOffX = p.facing > 0 ? 1 : -1;
    ctx.beginPath();
    ctx.ellipse(-6, -4, 4, 5, 0, 0, Math.PI * 2);
    ctx.ellipse(6, -4, 4, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0a0415';
    ctx.beginPath();
    ctx.arc(-6 + eyeOffX, -3, 2, 0, Math.PI * 2);
    ctx.arc(6 + eyeOffX, -3, 2, 0, Math.PI * 2);
    ctx.fill();
    // Eye sparkle
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-6 + eyeOffX - 0.7, -3.8, 0.7, 0, Math.PI * 2);
    ctx.arc(6 + eyeOffX - 0.7, -3.8, 0.7, 0, Math.PI * 2);
    ctx.fill();

    // Smile
    ctx.strokeStyle = '#0a0415';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 4, 4, 0.1, Math.PI - 0.1);
    ctx.stroke();

    ctx.restore();
  }

  function drawGoal() {
    const g = LEVEL.goal;
    ctx.save();
    // Pole
    ctx.shadowBlur = 14;
    ctx.shadowColor = '#a7ff3f';
    ctx.fillStyle = '#a7ff3f';
    ctx.fillRect(g.x - 2, g.y, 4, 100);
    // Base stub
    ctx.fillStyle = '#a7ff3f';
    ctx.beginPath();
    ctx.arc(g.x, g.y, 4, 0, Math.PI * 2);
    ctx.fill();
    // Flag
    ctx.shadowColor = '#ff2ea6';
    ctx.fillStyle = '#ff2ea6';
    const wave = Math.sin(bgT * 4) * 4;
    ctx.beginPath();
    ctx.moveTo(g.x + 2, g.y + 4);
    ctx.lineTo(g.x + 42 + wave, g.y + 14);
    ctx.lineTo(g.x + 2, g.y + 26);
    ctx.closePath();
    ctx.fill();
    // Star on flag
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    drawStar(g.x + 14, g.y + 15, 4, 8, 4);
    ctx.restore();
  }

  function drawStar(cx, cy, r1, r2, points) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? r2 : r1;
      const a = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  }

  function drawParticles() {
    for (const p of particles) {
      const a = Math.max(0, Math.min(1, p.life));
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 10;
      ctx.shadowColor = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // ---------- main loop ----------
  let lastT = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;

    if (mode === 'playing') {
      time += dt;
      bgT += dt;
      timerEl.textContent = time.toFixed(1);

      updatePlatforms(dt);
      updateHazards(dt);
      updateGrumpies(dt);
      updatePlayer(dt);
      updateParticles(dt);

      // Trail
      if (!player.onGround && !player.dead) {
        player.trail.push({ x: player.x + player.w/2, y: player.y + player.h/2 });
        if (player.trail.length > 6) player.trail.shift();
      } else if (player.trail.length > 0) {
        player.trail.shift();
      }

      updateCamera();
      shake *= 0.88;
    } else {
      bgT += dt;
    }

    // ---- draw ----
    ctx.clearRect(0, 0, W, H);
    drawBackground();

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Platforms
    for (const p of platforms) drawPlatform(p);
    // Pits: subtle darker strip (visual)
    for (const pit of LEVEL.pits) {
      const gradP = ctx.createLinearGradient(0, 490, 0, H);
      gradP.addColorStop(0, 'rgba(0,0,0,0.1)');
      gradP.addColorStop(1, 'rgba(198,109,255,0.15)');
      ctx.fillStyle = gradP;
      ctx.fillRect(pit.x, 490, pit.w, H - 490);
      // Spikes along top
      ctx.fillStyle = '#c66dff';
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#c66dff';
      const spikeW = 14;
      const count = Math.floor(pit.w / spikeW);
      for (let i = 0; i < count; i++) {
        const sx = pit.x + i * spikeW;
        ctx.beginPath();
        ctx.moveTo(sx, 500);
        ctx.lineTo(sx + spikeW/2, 482);
        ctx.lineTo(sx + spikeW, 500);
        ctx.closePath();
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    // Hazards
    for (const h of hazards) drawHazard(h);
    // Mushrooms
    for (const m of mushrooms) drawMushroom(m);
    // Coins
    for (const c of coins) drawCoin(c);
    // Grumpies (classic walkers)
    for (const g of grumpies) drawGrumpy(g);
    // Goal
    drawGoal();
    // Player
    drawPlayer();
    // Particles
    drawParticles();

    ctx.restore();

    requestAnimationFrame(loop);
  }
  requestAnimationFrame((t) => { lastT = t; loop(t); });

  // Initial state
  resetGame();

  // Prevent arrow-key scroll
  window.addEventListener('keydown', (e) => {
    if (['Space','ArrowUp','ArrowLeft','ArrowRight','ArrowDown'].includes(e.code)) e.preventDefault();
  }, { passive: false });
})();
</script>
</body>
