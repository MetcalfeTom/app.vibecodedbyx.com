<style>
  :root{
    --bone:#d6c5a0;
    --hot:#e02e2e;
    --sick:#7faa3e;
    --gold:#e2b94a;
    --rust:#7a1a18;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;color:var(--bone);font-family:'Special Elite', monospace}
  body{
    width:100vw;height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    padding:8px;gap:8px;cursor:crosshair;
    background:radial-gradient(circle at 50% 30%, rgba(122,26,24,0.18), transparent 60%), #050304;
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:30;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0) 0 2px, rgba(180,40,40,0.04) 2px 3px);
    mix-blend-mode:multiply;
  }
  header{
    width:100%;max-width:1080px;
    display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;
  }
  .brand{
    font-family:'Bungee Shade', sans-serif;font-size:32px;letter-spacing:0.04em;
    color:var(--bone);line-height:1;text-shadow:0 0 12px var(--hot), 3px 3px 0 #000;
  }
  .brand .b1{color:var(--sick)} .brand .b2{color:var(--hot)} .brand .b3{color:var(--gold)}
  .brand small{
    display:block;font-family:'Silkscreen', monospace;font-size:10px;letter-spacing:0.32em;
    color:rgba(214,197,160,0.55);margin-top:6px;text-shadow:none;text-transform:uppercase;
  }
  .pill{
    background:rgba(20,8,8,0.85);border:2px solid;border-radius:6px;
    padding:7px 12px;font-family:'Silkscreen', monospace;font-size:11px;
    letter-spacing:0.18em;text-transform:uppercase;
    display:inline-flex;align-items:center;gap:7px;
  }
  .pill .num{font-family:'VT323', monospace;font-size:22px;color:var(--bone);min-width:2ch;text-align:right}
  .pill.wave  {border-color:var(--hot);  color:var(--hot);  text-shadow:0 0 8px var(--hot)}
  .pill.health{border-color:var(--sick); color:var(--sick); text-shadow:0 0 8px var(--sick)}
  .pill.kills {border-color:var(--gold); color:var(--gold); text-shadow:0 0 8px var(--gold)}
  .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  .stage{
    width:100%;flex:1;min-height:0;
    display:flex;justify-content:center;align-items:center;
  }
  /* PS1 aesthetic: render at low res, scale up with nearest-neighbor.
     The canvas pixel buffer is 480×360 (set in JS). CSS lets it fill
     the stage while preserving aspect; image-rendering keeps the pixel
     blockiness instead of smoothing. */
  canvas{
    display:block;background:#0d0a08;cursor:crosshair;
    image-rendering:pixelated;image-rendering:crisp-edges;
    border:2px solid var(--rust);border-radius:6px;
    box-shadow:0 0 30px rgba(122,26,24,0.3), inset 0 0 22px rgba(0,0,0,0.7);
    max-width:100%;max-height:100%;touch-action:none;
  }

  .hint{
    font-family:'Silkscreen', monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
    color:rgba(214,197,160,0.55);text-align:center;line-height:1.7;
  }
  .hint kbd{
    display:inline-block;padding:3px 7px;margin:0 2px;
    border:1px solid rgba(214,197,160,0.30);border-radius:3px;
    font-family:'Silkscreen', monospace;color:var(--bone);background:rgba(20,8,8,0.6);
  }

  /* Wave banner */
  .banner{
    position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
    font-family:'Bungee Shade', sans-serif;font-size:62px;letter-spacing:0.04em;
    color:var(--hot);text-shadow:0 0 24px var(--hot), 4px 4px 0 #000;
    opacity:0;transition:opacity 0.4s ease;pointer-events:none;z-index:25;
    text-align:center;
  }
  .banner.show{opacity:1}
  .banner small{display:block;font-family:'Special Elite', monospace;font-size:18px;letter-spacing:0.12em;color:var(--sick);margin-top:6px}

  /* Title / End overlays */
  .overlay{
    position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 35%, rgba(122,26,24,0.18), transparent 60%), rgba(5,3,6,0.96);
    z-index:35;cursor:default;padding:24px;text-align:center;
  }
  .overlay.show{display:flex}
  .overlay h1{
    font-family:'Bungee Shade', sans-serif;font-size:clamp(56px, 9vw, 92px);
    color:var(--bone);text-shadow:0 0 22px var(--hot), 4px 4px 0 #000;
    margin:0;line-height:1;
  }
  .overlay h1 .b1{color:var(--sick)} .overlay h1 .b2{color:var(--hot)} .overlay h1 .b3{color:var(--gold)}
  .overlay .sub{
    font-family:'Special Elite', monospace;font-size:18px;color:rgba(214,197,160,0.7);margin-top:14px;
    letter-spacing:0.06em;
  }
  .overlay h2{
    font-family:'Bungee Shade', sans-serif;font-size:62px;color:var(--hot);
    text-shadow:0 0 24px var(--hot), 4px 4px 0 #000;margin:0;line-height:1;
  }
  .play{
    margin-top:28px;background:linear-gradient(180deg, var(--hot), #7a1a18);
    border:2px solid var(--bone);color:var(--bone);
    font-family:'Bungee', sans-serif;font-size:18px;letter-spacing:0.16em;text-transform:uppercase;
    padding:14px 32px;border-radius:6px;cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,0.5), 0 0 22px rgba(224,46,46,0.5);
  }
  .endstats{
    display:flex;flex-direction:column;gap:6px;margin:22px 0 4px;
    font-family:'Silkscreen', monospace;font-size:13px;letter-spacing:0.18em;
    color:rgba(214,197,160,0.7);text-transform:uppercase;line-height:1.7;
  }
  .endstats .v{font-family:'VT323', monospace;font-size:30px;color:var(--bone)}
</style>

<body>

<header>
  <div class="brand">
    <span class="b1">SLOPPY</span> <span class="b2">ZOMBIES</span> <span class="b3">3D</span>
    <small>PS1 · low-poly · third-person · mouse aim</small>
  </div>
  <div class="meta">
    <div class="pill wave">WAVE<span class="num" id="waveNum">1</span></div>
    <div class="pill health">HP<span class="num" id="hpNum">100</span></div>
    <div class="pill kills">KILLS<span class="num" id="killsNum">0</span></div>
  </div>
</header>

<div class="stage">
  <canvas id="game"></canvas>
</div>

<div class="hint">
  <kbd>WASD</kbd> move &nbsp;·&nbsp; <kbd>MOUSE</kbd> aim &nbsp;·&nbsp; <kbd>CLICK</kbd> fire &nbsp;·&nbsp; <kbd>SHIFT</kbd> sprint &nbsp;·&nbsp; <kbd>SPACE</kbd> dodge-roll
</div>

<div class="banner" id="banner"></div>

<!-- TITLE -->
<div class="overlay show" id="title">
  <h1><span class="b1">SLOPPY</span> <span class="b2">ZOMBIES</span> <span class="b3">3D</span></h1>
  <div class="sub">low-poly horde · ps1 vertex jitter · dithered fog</div>
  <button class="play" id="playBtn">▼ ENTER THE BUNKER</button>
</div>

<!-- END -->
<div class="overlay" id="end">
  <h2 id="endTitle">YOU DIED</h2>
  <div class="endstats">
    SURVIVED &nbsp; <span class="v" id="endWave">0</span> &nbsp; WAVES<br>
    KILLS &nbsp; <span class="v" id="endKills">0</span>
  </div>
  <button class="play" id="restartBtn">RETRY RUN</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ===== PS1 ENGINE BOILERPLATE =====
// Low-res render target — the canonical PS1 trick. We render the scene
// at 480×360 and let CSS upscale with nearest-neighbor (image-rendering:
// pixelated above) so every pixel blocks up. Combined with vertex snap
// and affine texture warping below this lands the era-correct look.
const RENDER_W = 480, RENDER_H = 360;

const cvs = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas: cvs, antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(1);                   // PS1 had ZERO subpixel — 1:1 only
renderer.setSize(RENDER_W, RENDER_H, false); // false = don't write CSS, we control that
cvs.width = RENDER_W; cvs.height = RENDER_H;
renderer.setClearColor(0x080510, 1);

function fitCanvas() {
  const stage = cvs.parentElement;
  if (!stage) return;
  const r = stage.getBoundingClientRect();
  if (r.width <= 0 || r.height <= 0) return;
  const aspect = RENDER_W / RENDER_H;
  let w = r.width, h = w / aspect;
  if (h > r.height) { h = r.height; w = h * aspect; }
  cvs.style.width  = w + 'px';
  cvs.style.height = h + 'px';
}
window.addEventListener('resize', fitCanvas);
requestAnimationFrame(fitCanvas);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0608);
// Heavy, low-distance fog — the PS1 way to hide pop-in from short
// draw distance. Color matches the bunker palette so the fog wash
// looks intentional instead of broken.
scene.fog = new THREE.Fog(0x100a0d, 14, 42);

// Third-person camera — sits behind+above the player and chases. We
// lerp toward a target slot each frame for the classic over-shoulder
// PS1 cam (Resident Evil / Silent Hill / Tomb Raider had similar).
const camera = new THREE.PerspectiveCamera(70, RENDER_W / RENDER_H, 0.1, 200);
camera.position.set(0, 6, 8);

// ===== PS1 MATERIAL HELPERS =====
// Vertex jitter shader chunk — snaps vertex positions to a coarse grid
// in screen space so geometry "wobbles" between frames the way PS1's
// lack of subpixel precision did. Applied to standard MeshBasicMaterial
// via onBeforeCompile so we keep three's lighting/uv pipeline.
function ps1ifyMaterial(mat) {
  mat.flatShading = true;
  mat.dithering = true;
  mat.onBeforeCompile = (shader) => {
    // Inject vertex snapping uniform + math
    shader.vertexShader = shader.vertexShader
      .replace('#include <common>',
        `#include <common>\nuniform vec2 uPs1Resolution;`)
      .replace('#include <project_vertex>',
        `#include <project_vertex>
         // Snap clip-space x/y to nearest pixel-grid coordinate. Half
         // resolution divisor controls jitter coarseness — smaller = more
         // wobbly. PS1 used 1/16th sub-pixel precision; we use 1.0 (full
         // pixel snap) for max wobble.
         vec4 _ps1pos = gl_Position;
         vec2 _ps1grid = uPs1Resolution * 0.5;
         _ps1pos.xy = floor((_ps1pos.xy / _ps1pos.w) * _ps1grid + 0.5) / _ps1grid * _ps1pos.w;
         gl_Position = _ps1pos;`);
    shader.uniforms.uPs1Resolution = { value: new THREE.Vector2(RENDER_W, RENDER_H) };
  };
  return mat;
}

// ===== ENVIRONMENT =====
// Floor — single big plane with a subtle grid texture so the player can
// gauge motion. Grid drawn into a canvas at 64×64, repeated, no filter
// (keeps the pixel-art look).
const floorTex = (() => {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const g = c.getContext('2d');
  g.fillStyle = '#1a120c'; g.fillRect(0, 0, 64, 64);
  g.fillStyle = '#241612';
  for (let y = 0; y < 64; y += 8) for (let x = 0; x < 64; x += 8) {
    if (((x + y) / 8) % 2 === 0) g.fillRect(x, y, 8, 8);
  }
  g.strokeStyle = '#0e0907'; g.lineWidth = 1;
  for (let i = 0; i < 64; i += 16) {
    g.beginPath(); g.moveTo(i, 0); g.lineTo(i, 64); g.stroke();
    g.beginPath(); g.moveTo(0, i); g.lineTo(64, i); g.stroke();
  }
  // grit speckles
  for (let i = 0; i < 30; i++) {
    g.fillStyle = Math.random() < 0.5 ? '#0a0605' : '#3a2a1a';
    g.fillRect(Math.floor(Math.random() * 64), Math.floor(Math.random() * 64), 1, 1);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(20, 20);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
})();
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  ps1ifyMaterial(new THREE.MeshBasicMaterial({ map: floorTex }))
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// Bunker walls — 4 perimeter walls with notched window gaps
const wallMat = ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0x2c333a }));
const ROOM_R = 14;     // half-width of the bunker
const WALL_H = 4;
const wallSegments = [];
function makeWall(x, z, w, h, d) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
  m.position.set(x, h / 2, z);
  scene.add(m);
  wallSegments.push({ x, z, w, d });
  return m;
}
// 4 walls broken into 3 segments each (left | gap | right) so each
// face has a window gap zombies stream through.
function makePerimeterWall(side) {
  const span = ROOM_R * 2;
  const segLen = (span - 4) / 2;     // 2 segments of (span/2 - 2), 4-unit gap
  if (side === 'N') {
    makeWall(-(segLen / 2 + 2), -ROOM_R, segLen, WALL_H, 0.6);
    makeWall(+(segLen / 2 + 2), -ROOM_R, segLen, WALL_H, 0.6);
  } else if (side === 'S') {
    makeWall(-(segLen / 2 + 2), +ROOM_R, segLen, WALL_H, 0.6);
    makeWall(+(segLen / 2 + 2), +ROOM_R, segLen, WALL_H, 0.6);
  } else if (side === 'W') {
    makeWall(-ROOM_R, -(segLen / 2 + 2), 0.6, WALL_H, segLen);
    makeWall(-ROOM_R, +(segLen / 2 + 2), 0.6, WALL_H, segLen);
  } else if (side === 'E') {
    makeWall(+ROOM_R, -(segLen / 2 + 2), 0.6, WALL_H, segLen);
    makeWall(+ROOM_R, +(segLen / 2 + 2), 0.6, WALL_H, segLen);
  }
}
for (const s of ['N','S','E','W']) makePerimeterWall(s);

// Window-gap markers (the 4 spawn points)
const SPAWN_POINTS = [
  { x:  0, z: -ROOM_R - 1 },   // N
  { x:  0, z: +ROOM_R + 1 },   // S
  { x: -ROOM_R - 1, z:  0 },   // W
  { x: +ROOM_R + 1, z:  0 },   // E
];
// Visual window frames so the player can see the gaps
for (const sp of SPAWN_POINTS) {
  const frame = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, WALL_H, 0.4),
    ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0x5a3018 }))
  );
  frame.position.set(sp.x * 0.92, WALL_H / 2, sp.z * 0.92);
  scene.add(frame);
}

// Pillar cover scattered inside the bunker
const pillarMat = ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0x3a2e22 }));
const pillars = [];
function spawnPillarsInRoom(n) {
  for (let i = 0; i < n; i++) {
    const x = (Math.random() - 0.5) * (ROOM_R * 1.6);
    const z = (Math.random() - 0.5) * (ROOM_R * 1.6);
    if (Math.hypot(x, z) < 3) continue;       // keep center clear for spawn
    const m = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 1.2), pillarMat);
    m.position.set(x, 0.7, z);
    scene.add(m);
    pillars.push({ mesh: m, x, z, r: 0.7 });
  }
}
spawnPillarsInRoom(8);

// Ambient red glow — no actual light needed since materials are
// MeshBasicMaterial, but we add a faint hemisphere effect via fog tint
// + scene.background already set. Skybox not needed at PS1 distance.

// ===== PLAYER =====
// Capsule body + box head + cylinder weapon, all PS1-low-poly.
const player = {
  pos: new THREE.Vector3(0, 0, 0),
  vel: new THREE.Vector3(),
  yaw: 0,                    // facing direction (radians)
  hp: 100, maxHp: 100,
  speed: 7,                  // units/sec — arcade snap, faster than realism
  rRadius: 0.45,
  invulnUntil: 0,
  lastFireT: 0,
  fireRate: 0.10,            // sec between shots — arcade auto-rifle feel
  chaoticUntil: 0,           // chaotic ammo timer
  alive: true,
};
const playerGroup = new THREE.Group();
const playerBody = new THREE.Mesh(
  new THREE.BoxGeometry(0.7, 1.0, 0.5),
  ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0xdbb47a }))
);
playerBody.position.y = 0.85;
playerGroup.add(playerBody);
const playerHead = new THREE.Mesh(
  new THREE.BoxGeometry(0.5, 0.5, 0.5),
  ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0xf0c898 }))
);
playerHead.position.y = 1.6;
playerGroup.add(playerHead);
// Weapon — small cylinder pointing forward (-Z in player local space)
const weaponMesh = new THREE.Mesh(
  new THREE.CylinderGeometry(0.08, 0.08, 0.7, 6),
  ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0x222628 }))
);
weaponMesh.rotation.x = Math.PI / 2;
weaponMesh.position.set(0.3, 1.05, -0.4);
playerGroup.add(weaponMesh);
scene.add(playerGroup);

// ===== MACHINE-GUN DRONE =====
// Per chat: a small autonomous drone orbits the player and auto-fires
// at the nearest zombie. Adds a constant rate of fire to the player's
// damage output so kiting + dodging is more viable. Rendered as a
// hovering low-poly diamond with a tiny red blinking eye.
const drone = {
  mesh: new THREE.Group(),
  pos: new THREE.Vector3(0, 2.2, -1),
  orbitT: 0,
  lastFireT: 0,
  fireRate: 0.18,    // sec between shots
  range: 14,
  dmg: 8,
};
{
  const body = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.32, 0),
    ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0x4d5388 }))
  );
  drone.mesh.add(body);
  // tiny barrel
  const barrel = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.06, 0.4, 6),
    ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0x222628 }))
  );
  barrel.rotation.x = Math.PI / 2;
  barrel.position.set(0, -0.05, 0.3);
  drone.mesh.add(barrel);
  // red eye
  const eye = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, 0.08, 0.04),
    ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0xff3030 }))
  );
  eye.position.set(0, 0, 0.18);
  drone.mesh.add(eye);
  scene.add(drone.mesh);
}
function updateDrone(dt) {
  drone.orbitT += dt;
  // Orbit ~1.6 units behind+above the player at 0.6Hz
  const orbAng = drone.orbitT * 1.4 + player.yaw + Math.PI;
  const ox = player.pos.x + Math.cos(orbAng) * 1.4;
  const oz = player.pos.z + Math.sin(orbAng) * 1.4;
  const oy = player.pos.y + 2.2 + Math.sin(drone.orbitT * 3) * 0.15;
  // smooth chase
  const k = Math.min(1, dt * 5);
  drone.pos.x += (ox - drone.pos.x) * k;
  drone.pos.y += (oy - drone.pos.y) * k;
  drone.pos.z += (oz - drone.pos.z) * k;
  drone.mesh.position.copy(drone.pos);
  // Find nearest zombie in range and aim/face it
  let nearest = null, nd = Infinity;
  for (const z of zombies) {
    const dx = z.pos.x - drone.pos.x, dz = z.pos.z - drone.pos.z;
    const d2 = dx * dx + dz * dz;
    if (d2 < nd && d2 < drone.range * drone.range) { nd = d2; nearest = z; }
  }
  if (nearest) {
    const dx = nearest.pos.x - drone.pos.x;
    const dz = nearest.pos.z - drone.pos.z;
    drone.mesh.rotation.y = Math.atan2(dx, dz);
    // Auto-fire
    const now = performance.now() / 1000;
    if (now - drone.lastFireT >= drone.fireRate && running) {
      drone.lastFireT = now;
      const len = Math.sqrt(nd);
      const sp = 28;
      const mesh = new THREE.Mesh(bulletGeo, ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0x7df0ff })));
      mesh.position.set(drone.pos.x, drone.pos.y, drone.pos.z);
      scene.add(mesh);
      bullets.push({
        mesh,
        vx: (dx / len) * sp,
        vz: (dz / len) * sp,
        life: 1.2,
        dmg: drone.dmg,
      });
      blip(720, 0.04, 'square', 0.10);
    }
  }
}

// ===== INPUT =====
const keys = new Set();
window.addEventListener('keydown', e => {
  keys.add(e.key.toLowerCase());
  if (e.key === ' ') tryDodge();
});
window.addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));

const mouse = { sx: RENDER_W / 2, sy: RENDER_H / 2, world: new THREE.Vector3() };
let firing = false;
cvs.addEventListener('pointermove', e => {
  const r = cvs.getBoundingClientRect();
  mouse.sx = ((e.clientX - r.left) / r.width)  * RENDER_W;
  mouse.sy = ((e.clientY - r.top ) / r.height) * RENDER_H;
});
cvs.addEventListener('pointerdown', () => { firing = true; tryFire(); });
cvs.addEventListener('pointerup',   () => firing = false);
cvs.addEventListener('pointerleave',() => firing = false);

// Mouse → world: raycast from camera through cursor onto the floor
// plane so the player aims at the cursor's ground position.
const aimRay = new THREE.Raycaster();
const aimNDC = new THREE.Vector2();
const FLOOR_PLANE = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
function updateAim() {
  aimNDC.x = (mouse.sx / RENDER_W) * 2 - 1;
  aimNDC.y = -((mouse.sy / RENDER_H) * 2 - 1);
  aimRay.setFromCamera(aimNDC, camera);
  aimRay.ray.intersectPlane(FLOOR_PLANE, mouse.world);
  // Player faces from its position toward the world cursor
  const dx = mouse.world.x - player.pos.x;
  const dz = mouse.world.z - player.pos.z;
  if (dx * dx + dz * dz > 0.01) player.yaw = Math.atan2(dx, dz);
}

// ===== ZOMBIES =====
const zombies = [];
function makeZombieMesh() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.7, 1.0, 0.5),
    ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0x4f6a3a }))
  );
  body.position.y = 0.85;
  g.add(body);
  const head = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.5, 0.5),
    ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0x6a7a48 }))
  );
  head.position.y = 1.6;
  g.add(head);
  // Glowing red eyes — small black blocks with red emissive faces
  const eyeMat = ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0xff3030 }));
  const lEye = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.05), eyeMat);
  const rEye = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.05), eyeMat);
  lEye.position.set(-0.12, 1.65, -0.26);
  rEye.position.set( 0.12, 1.65, -0.26);
  g.add(lEye); g.add(rEye);
  return g;
}
function spawnZombie() {
  const sp = SPAWN_POINTS[Math.floor(Math.random() * SPAWN_POINTS.length)];
  const wx = sp.x + (Math.random() - 0.5) * 0.5;
  const wz = sp.z + (Math.random() - 0.5) * 0.5;
  const mesh = makeZombieMesh();
  mesh.position.set(wx, 0, wz);
  scene.add(mesh);
  const baseHp = 40 + wave * 18;
  zombies.push({
    mesh, pos: mesh.position,
    yaw: 0,
    hp: baseHp, maxHp: baseHp,
    speed: 1.4 + Math.random() * 0.5 + wave * 0.08,
    rRadius: 0.4,
    attackT: 0.6,
    biteDmg: 8,
  });
}

// ===== PICKUPS =====
// Chaotic ammo — a spinning multicolored cube that drops randomly
// during a wave. On pickup the player's fire rate jumps to 25Hz for
// 12 seconds AND each shot rolls a random "weapon type" (color + dmg
// + spread). Visually telegraphs the chaos with a per-shot color
// flicker on the bullets.
const pickups = [];
function spawnChaoticAmmo(x, z) {
  const g = new THREE.Group();
  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.6, 0.6, 0.6),
    ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0xff5ea1 }))
  );
  g.add(cube);
  g.position.set(x, 0.8, z);
  scene.add(g);
  pickups.push({ kind:'chaotic', mesh: g, cube, x, y:0.8, z, t: 0, life: 18, r: 0.7 });
}
function tickPickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.t += dt;
    if (p.t > p.life) {
      scene.remove(p.mesh);
      pickups.splice(i, 1);
      continue;
    }
    // spin + bob + cycle through neon hues
    p.mesh.rotation.y += dt * 4;
    p.mesh.rotation.x += dt * 2.5;
    p.mesh.position.y = p.y + Math.sin(p.t * 4) * 0.15;
    const hue = ((p.t * 240) % 360) / 360;
    const c = new THREE.Color().setHSL(hue, 1, 0.6);
    p.cube.material.color.copy(c);
    // pickup on contact
    const dx = player.pos.x - p.x, dz = player.pos.z - p.z;
    if (dx * dx + dz * dz < (player.rRadius + p.r) ** 2) {
      if (p.kind === 'chaotic') {
        player.chaoticUntil = performance.now() + 12000;
        showBanner('CHAOTIC AMMO', 'random fire · ultra speed · 12s');
        blip(1320, 0.06, 'square', 0.16);
        setTimeout(() => blip(1760, 0.08, 'square', 0.14), 60);
      }
      scene.remove(p.mesh);
      pickups.splice(i, 1);
    }
  }
}

// ===== BULLETS =====
const bullets = [];
const bulletMat = ps1ifyMaterial(new THREE.MeshBasicMaterial({ color: 0xffe5a0 }));
const bulletGeo = new THREE.SphereGeometry(0.08, 6, 4);
function tryFire() {
  const nowMs = performance.now();
  const now = nowMs / 1000;
  // Chaotic ammo — fire rate jumps to 25Hz AND each shot rolls a random
  // weapon flavor (color + damage + spread) for a 12s arcade burst.
  const chaotic = (player.chaoticUntil || 0) > nowMs;
  const fireGate = chaotic ? 0.04 : player.fireRate;
  if (now - player.lastFireT < fireGate) return;
  if (!player.alive) return;
  player.lastFireT = now;
  // Spawn at weapon-tip world position, velocity = direction toward cursor
  const dirX = mouse.world.x - player.pos.x;
  const dirZ = mouse.world.z - player.pos.z;
  const len = Math.hypot(dirX, dirZ) || 1;
  let spd = 32, dmg = 22, color = 0xffe5a0;
  let spread = 0;
  if (chaotic) {
    const flavors = [
      { spd: 38, dmg: 14, color: 0xff5ea1, spread: 0.20 },   // pink scatter
      { spd: 26, dmg: 32, color: 0x7df0ff, spread: 0.04 },   // cyan slug
      { spd: 32, dmg: 18, color: 0x7df09d, spread: 0.10 },   // toxic
      { spd: 44, dmg:  9, color: 0xffd766, spread: 0.30 },   // gold buckshot
      { spd: 22, dmg: 50, color: 0xd680ff, spread: 0.02 },   // plasma slug
    ];
    const f = flavors[Math.floor(Math.random() * flavors.length)];
    spd = f.spd; dmg = f.dmg; color = f.color; spread = f.spread;
  }
  const a = Math.atan2(dirX, dirZ) + (Math.random() - 0.5) * spread;
  const mesh = new THREE.Mesh(bulletGeo, ps1ifyMaterial(new THREE.MeshBasicMaterial({ color })));
  mesh.position.set(player.pos.x + Math.sin(a) * 0.8, 1.0, player.pos.z + Math.cos(a) * 0.8);
  scene.add(mesh);
  bullets.push({
    mesh,
    vx: Math.sin(a) * spd,
    vz: Math.cos(a) * spd,
    life: 1.4,
    dmg,
  });
  sfx.shoot();
}

// ===== DODGE ROLL =====
function tryDodge() {
  const now = performance.now();
  if (now < (player.invulnUntil || 0)) return;
  if (!player.alive) return;
  // 0.3s i-frames + impulse in current move direction
  const moveX = (keys.has('d') ? 1 : 0) - (keys.has('a') ? 1 : 0);
  const moveZ = (keys.has('s') ? 1 : 0) - (keys.has('w') ? 1 : 0);
  const len = Math.hypot(moveX, moveZ) || 1;
  player.pos.x += (moveX / len) * 1.4;
  player.pos.z += (moveZ / len) * 1.4;
  player.invulnUntil = now + 350;
  sfx.dodge();
}

// ===== AUDIO =====
let actx = null;
function ensureAudio() { if (actx) return actx; try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} return actx; }
function blip(freq, dur, type, vol) {
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator(); const g = a.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol || 0.16, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(a.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
const sfx = {
  shoot()    { blip(640, 0.04, 'square', 0.14); setTimeout(() => blip(180, 0.07, 'sawtooth', 0.1), 8); },
  hit()      { blip(220, 0.05, 'sawtooth', 0.16); },
  bite()     { blip(120, 0.10, 'sawtooth', 0.18); },
  zDie()     { blip(180, 0.08, 'sawtooth', 0.16); setTimeout(() => blip(80, 0.18, 'sawtooth', 0.14), 60); },
  waveStart(){ blip(440, 0.18, 'sawtooth', 0.18); setTimeout(() => blip(330, 0.20, 'sawtooth', 0.16), 80); setTimeout(() => blip(220, 0.30, 'sawtooth', 0.14), 180); },
  dodge()    { blip(880, 0.06, 'triangle', 0.12); },
  end()      { blip(220, 0.2, 'sawtooth', 0.2); setTimeout(() => blip(140, 0.3, 'sawtooth', 0.18), 120); },
};

// ===== WAVE SYSTEM =====
let wave = 0, waveActive = false, spawnQueue = 0, spawnT = 0, interludeT = 0;
let kills = 0;
function startWave(n) {
  wave = n;
  waveActive = true;
  spawnQueue = 5 + Math.floor(n * 2);
  spawnT = 0.5;
  showBanner('WAVE ' + n, 'they are coming');
  sfx.waveStart();
}

const bannerEl = document.getElementById('banner');
let bannerT = 0;
function showBanner(big, sub) {
  bannerEl.innerHTML = big + (sub ? '<small>' + sub + '</small>' : '');
  bannerEl.classList.add('show');
  bannerT = 2.4;
}
function tickBanner(dt) {
  if (bannerT > 0) { bannerT -= dt; if (bannerT <= 0) bannerEl.classList.remove('show'); }
}

function updateHUD() {
  document.getElementById('waveNum').textContent = wave;
  document.getElementById('hpNum').textContent = Math.max(0, Math.floor(player.hp));
  document.getElementById('killsNum').textContent = kills;
}

// ===== GAME LOOP =====
let running = false;
let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (running) update(dt);
  render(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function update(dt) {
  updateAim();

  // === MOVEMENT ===
  // WASD relative to camera (which is roughly behind+above looking
  // toward +Z). w=forward (-z), s=back (+z), a=left (-x), d=right (+x).
  let mx = (keys.has('d') ? 1 : 0) - (keys.has('a') ? 1 : 0);
  let mz = (keys.has('s') ? 1 : 0) - (keys.has('w') ? 1 : 0);
  const len = Math.hypot(mx, mz);
  if (len > 0) { mx /= len; mz /= len; }
  const sprint = keys.has('shift') ? 1.55 : 1;
  const vSpeed = player.speed * sprint;
  const nx = player.pos.x + mx * vSpeed * dt;
  const nz = player.pos.z + mz * vSpeed * dt;
  // Clamp to bunker bounds (with wall padding)
  const limit = ROOM_R - player.rRadius - 0.4;
  player.pos.x = Math.max(-limit, Math.min(limit, nx));
  player.pos.z = Math.max(-limit, Math.min(limit, nz));
  // Push out of pillars
  for (const p of pillars) {
    const dx = player.pos.x - p.x, dz = player.pos.z - p.z;
    const d = Math.hypot(dx, dz);
    const minD = p.r + player.rRadius;
    if (d > 0 && d < minD) {
      player.pos.x += (dx / d) * (minD - d);
      player.pos.z += (dz / d) * (minD - d);
    }
  }
  // Apply transform — face cursor (yaw was set in updateAim)
  playerGroup.position.copy(player.pos);
  playerGroup.rotation.y = player.yaw;

  // Auto-fire if held
  if (firing) tryFire();

  // Drone tick — orbit + auto-aim + auto-fire on nearest zombie
  updateDrone(dt);
  // Pickups (chaotic ammo etc.)
  tickPickups(dt);
  // Random chance to drop a chaotic-ammo pickup mid-wave (~4% per
  // wave-clear interlude tick; keeps it rare but possible)
  if (waveActive && spawnQueue === 0 && pickups.length === 0 && Math.random() < 0.0007) {
    const px = (Math.random() - 0.5) * (ROOM_R * 1.4);
    const pz = (Math.random() - 0.5) * (ROOM_R * 1.4);
    spawnChaoticAmmo(px, pz);
  }

  // === CAMERA FOLLOW ===
  // Third-person: position behind player along -yaw direction, raised
  // and pulled back. Lerp toward target slot for smooth chase.
  const camDist = 7, camHeight = 5;
  const tx = player.pos.x - Math.sin(player.yaw) * camDist;
  const tz = player.pos.z - Math.cos(player.yaw) * camDist;
  const ty = player.pos.y + camHeight;
  const k = Math.min(1, dt * 6);
  camera.position.x += (tx - camera.position.x) * k;
  camera.position.y += (ty - camera.position.y) * k;
  camera.position.z += (tz - camera.position.z) * k;
  // Look at a point slightly ahead of the player so over-shoulder framing
  // shows the action zone the player is moving into.
  const lookX = player.pos.x + Math.sin(player.yaw) * 2;
  const lookZ = player.pos.z + Math.cos(player.yaw) * 2;
  camera.lookAt(lookX, player.pos.y + 1.0, lookZ);

  // === WAVE SPAWN ===
  if (waveActive) {
    if (spawnQueue > 0) {
      spawnT -= dt;
      if (spawnT <= 0) {
        spawnZombie();
        spawnQueue--;
        spawnT = Math.max(0.2, 0.9 - wave * 0.05) + Math.random() * 0.2;
      }
    } else if (zombies.length === 0) {
      waveActive = false;
      interludeT = 4.0;
      showBanner('WAVE ' + wave + ' CLEARED', '+200 PTS');
      // Guaranteed chaotic ammo drop every 3 waves so the arcade
      // power-up is always within reach for the player.
      if (wave % 3 === 0) {
        const px = (Math.random() - 0.5) * (ROOM_R * 1.2);
        const pz = (Math.random() - 0.5) * (ROOM_R * 1.2);
        spawnChaoticAmmo(px, pz);
      }
    }
  } else if (interludeT > 0) {
    interludeT -= dt;
    if (interludeT <= 0) startWave(wave + 1);
  }

  // === ZOMBIES ===
  for (let i = zombies.length - 1; i >= 0; i--) {
    const z = zombies[i];
    const dx = player.pos.x - z.pos.x, dz = player.pos.z - z.pos.z;
    const d = Math.hypot(dx, dz) || 1;
    z.pos.x += (dx / d) * z.speed * dt;
    z.pos.z += (dz / d) * z.speed * dt;
    z.mesh.rotation.y = Math.atan2(dx, dz);
    // push out of pillars
    for (const p of pillars) {
      const px = z.pos.x - p.x, pz = z.pos.z - p.z;
      const pd = Math.hypot(px, pz);
      const minD = p.r + z.rRadius;
      if (pd > 0 && pd < minD) {
        z.pos.x += (px / pd) * (minD - pd);
        z.pos.z += (pz / pd) * (minD - pd);
      }
    }
    // bite player on contact
    const pd = Math.hypot(dx, dz);
    if (pd < player.rRadius + z.rRadius) {
      z.attackT -= dt;
      if (z.attackT <= 0 && performance.now() > player.invulnUntil) {
        player.hp = Math.max(0, player.hp - z.biteDmg);
        sfx.bite();
        z.attackT = 0.9;
        if (player.hp <= 0) gameOver();
      }
    }
  }

  // === BULLETS ===
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.mesh.position.x += b.vx * dt;
    b.mesh.position.z += b.vz * dt;
    b.life -= dt;
    if (b.life <= 0 || Math.abs(b.mesh.position.x) > ROOM_R + 2 || Math.abs(b.mesh.position.z) > ROOM_R + 2) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
      continue;
    }
    // hit zombies
    let consumed = false;
    for (let j = zombies.length - 1; j >= 0; j--) {
      const z = zombies[j];
      const dx = b.mesh.position.x - z.pos.x;
      const dz = b.mesh.position.z - z.pos.z;
      if (dx * dx + dz * dz < (z.rRadius + 0.15) ** 2) {
        z.hp -= b.dmg;
        sfx.hit();
        if (z.hp <= 0) killZombie(z, j);
        consumed = true;
        break;
      }
    }
    if (consumed) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
    }
  }

  updateHUD();
}

function killZombie(z, idx) {
  scene.remove(z.mesh);
  zombies.splice(idx, 1);
  kills++;
  sfx.zDie();
}

function gameOver() {
  player.alive = false;
  running = false;
  document.getElementById('endTitle').textContent = 'YOU DIED';
  document.getElementById('endWave').textContent = wave;
  document.getElementById('endKills').textContent = kills;
  document.getElementById('end').classList.add('show');
  sfx.end();
}

function render(dt) {
  tickBanner(dt);
  renderer.render(scene, camera);
}

// ===== START =====
function startGame() {
  document.getElementById('title').classList.remove('show');
  document.getElementById('end').classList.remove('show');
  // wipe zombies + bullets + pickups from any previous run
  for (const z of zombies) scene.remove(z.mesh);
  for (const b of bullets) scene.remove(b.mesh);
  for (const p of pickups) scene.remove(p.mesh);
  zombies.length = 0;
  bullets.length = 0;
  pickups.length = 0;
  player.hp = player.maxHp;
  player.alive = true;
  player.invulnUntil = 0;
  player.chaoticUntil = 0;
  player.pos.set(0, 0, 0);
  player.yaw = 0;
  kills = 0;
  wave = 0;
  waveActive = false;
  spawnQueue = 0;
  interludeT = 0;
  running = true;
  updateHUD();
  setTimeout(() => startWave(1), 600);
}
document.getElementById('playBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// Initial fit + first paint
fitCanvas();
renderer.render(scene, camera);
</script>
</body>
