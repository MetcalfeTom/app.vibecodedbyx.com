<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Evo Sim</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧬">
<meta property="og:title" content="Evo Sim">
<meta property="og:description" content="Watch creatures evolve through natural selection. Speed, size, sense — who survives?">
<meta property="og:url" content="https://sloppy.live/evo-sim">
<meta property="og:image" content="https://emojicdn.elk.sh/🧬?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;500;700&family=Newsreader:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060810;--panel:#0c0e16;--border:#1a1c2e;--text:#c8ccd8;--dim:#4a4e5e;--green:#22dd88;--food:#44cc44;--danger:#dd3344;--gene:#ff8844}
html,body{height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace}
body{display:flex;flex-direction:column}
#top{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
#top h1{font-family:'Newsreader',serif;font-size:18px;font-weight:700;color:var(--green)}
#top .stats{display:flex;gap:16px;font-size:11px;color:var(--dim)}
#top .stats span{color:var(--text)}
#mid{flex:1;display:flex;overflow:hidden}
canvas{flex:1;display:block}
#side{width:220px;border-left:1px solid var(--border);background:var(--panel);padding:12px;overflow-y:auto;flex-shrink:0;font-size:11px}
#side h3{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin:10px 0 6px}
#side h3:first-child{margin-top:0}
.ctrl{margin-bottom:8px}
.ctrl label{display:flex;justify-content:space-between;color:var(--dim);margin-bottom:2px}
.ctrl label span{color:var(--text)}
.ctrl input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.ctrl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--green);cursor:pointer}
.btn{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 10px;border:1px solid var(--border);background:transparent;color:var(--dim);border-radius:4px;cursor:pointer;transition:all .15s;margin-right:4px;margin-bottom:4px}
.btn:hover{border-color:var(--green);color:var(--green)}
.btn.active{border-color:var(--green);color:var(--green);background:rgba(34,221,136,0.08)}
#legend{font-size:10px;color:var(--dim);line-height:1.6}
#legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
#best{margin-top:8px;padding:8px;background:rgba(34,221,136,0.04);border:1px solid var(--border);border-radius:6px;font-size:10px}
#best .trait{display:flex;justify-content:space-between;color:var(--dim)}
#best .trait span{color:var(--text)}
@media(max-width:640px){
  #side{width:180px;padding:8px;font-size:10px}
  #top h1{font-size:15px}
}
@media(max-width:480px){
  body{flex-direction:column}
  #mid{flex-direction:column}
  #side{width:100%;height:160px;border-left:none;border-top:1px solid var(--border);flex-direction:row;flex-wrap:wrap}
  canvas{height:50dvh}
}
</style>
</head>
<body>
<div id="top">
<h1>Evo Sim</h1>
<div class="stats">
Gen <span id="genEl">0</span> &nbsp;
Pop <span id="popEl">0</span> &nbsp;
Food <span id="foodEl">0</span> &nbsp;
Time <span id="tickEl">0</span>
</div>
</div>
<div id="mid">
<canvas id="c"></canvas>
<div id="side">
<h3>Controls</h3>
<div style="display:flex;flex-wrap:wrap">
<button class="btn active" id="playBtn">Play</button>
<button class="btn" id="fastBtn">2x</button>
<button class="btn" id="resetBtn">Reset</button>
</div>
<div class="ctrl">
<label>Mutation Rate <span id="v-mut">5%</span></label>
<input type="range" min="1" max="20" value="5" id="s-mut">
</div>
<div class="ctrl">
<label>Food Density <span id="v-food">30</span></label>
<input type="range" min="10" max="80" value="30" id="s-food">
</div>
<div class="ctrl">
<label>Predators <span id="v-pred">2</span></label>
<input type="range" min="0" max="8" value="2" id="s-pred">
</div>
<h3>Legend</h3>
<div id="legend">
<div><span class="dot" style="background:#22dd88"></span> Creatures</div>
<div><span class="dot" style="background:#44cc44"></span> Food</div>
<div><span class="dot" style="background:#dd3344"></span> Predators</div>
<div style="margin-top:4px;color:var(--dim)">Size = body size gene<br>Color = speed (blue=slow, red=fast)<br>Ring = sense range</div>
</div>
<h3>Fittest Creature</h3>
<div id="best">
<div class="trait">Speed <span id="b-spd">-</span></div>
<div class="trait">Size <span id="b-size">-</span></div>
<div class="trait">Sense <span id="b-sense">-</span></div>
<div class="trait">Efficiency <span id="b-eff">-</span></div>
<div class="trait">Age <span id="b-age">-</span></div>
</div>
</div>
</div>
<script>
(function(){
var C=document.getElementById('c'),X=C.getContext('2d');
var W,H;
function resize(){W=C.width=C.clientWidth;H=C.height=C.clientHeight;}
resize();window.addEventListener('resize',resize);

var genEl=document.getElementById('genEl'),popEl=document.getElementById('popEl');
var foodEl=document.getElementById('foodEl'),tickEl=document.getElementById('tickEl');
var sMut=document.getElementById('s-mut'),sFood=document.getElementById('s-food'),sPred=document.getElementById('s-pred');
var vMut=document.getElementById('v-mut'),vFood=document.getElementById('v-food'),vPred=document.getElementById('v-pred');
var playBtn=document.getElementById('playBtn'),fastBtn=document.getElementById('fastBtn'),resetBtn=document.getElementById('resetBtn');

var creatures=[],food=[],predators=[];
var gen=0,tick=0,paused=false,speed=1;

// Genes: speed, size, sense, efficiency
function randGene(){return 0.3+Math.random()*0.7;}
function clamp01(v){return Math.max(0.1,Math.min(1,v));}

function makeCreature(x,y,genes){
  return{
    x:x||Math.random()*W,y:y||Math.random()*H,
    vx:0,vy:0,
    genes:genes||{spd:randGene(),size:randGene(),sense:randGene(),eff:randGene()},
    energy:80,age:0,eaten:0,gen:gen
  };
}

function makePredator(){
  return{x:Math.random()*W,y:Math.random()*H,vx:0,vy:0,angle:Math.random()*Math.PI*2,turnT:0};
}

function spawnFood(){
  food.push({x:Math.random()*W,y:Math.random()*H,energy:20+Math.random()*15});
}

function init(){
  creatures=[];food=[];predators=[];gen=0;tick=0;
  for(var i=0;i<20;i++)creatures.push(makeCreature());
  for(var i=0;i<+sFood.value;i++)spawnFood();
  for(var i=0;i<+sPred.value;i++)predators.push(makePredator());
}

function mutate(g){
  var rate=+sMut.value/100;
  return{
    spd:clamp01(g.spd+(Math.random()-0.5)*rate*2),
    size:clamp01(g.size+(Math.random()-0.5)*rate*2),
    sense:clamp01(g.sense+(Math.random()-0.5)*rate*2),
    eff:clamp01(g.eff+(Math.random()-0.5)*rate*2)
  };
}

function reproduce(c){
  var child=makeCreature(
    c.x+(Math.random()-0.5)*20,
    c.y+(Math.random()-0.5)*20,
    mutate(c.genes)
  );
  child.gen=gen;
  return child;
}

function step(){
  tick++;
  // spawn food
  while(food.length<+sFood.value)spawnFood();
  // adjust predators
  while(predators.length<+sPred.value)predators.push(makePredator());
  while(predators.length>+sPred.value)predators.pop();

  // update creatures
  for(var i=creatures.length-1;i>=0;i--){
    var c=creatures[i];
    c.age++;
    // energy cost: speed and size cost energy, efficiency reduces cost
    var cost=0.08+c.genes.spd*0.12+c.genes.size*0.06-c.genes.eff*0.06;
    c.energy-=Math.max(0.02,cost);

    // sense food
    var senseR=40+c.genes.sense*120;
    var nearest=null,nd=Infinity;
    for(var j=0;j<food.length;j++){
      var dx=food[j].x-c.x,dy=food[j].y-c.y;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<senseR&&d<nd){nd=d;nearest=food[j];}
    }

    // flee predators
    var fleeX=0,fleeY=0;
    for(var j=0;j<predators.length;j++){
      var dx=c.x-predators[j].x,dy=c.y-predators[j].y;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<senseR*0.8&&d>0){
        fleeX+=dx/d/(d*0.01+1);
        fleeY+=dy/d/(d*0.01+1);
      }
    }

    var moveSpd=1+c.genes.spd*3;
    if(fleeX!==0||fleeY!==0){
      var fl=Math.sqrt(fleeX*fleeX+fleeY*fleeY);
      c.vx+=(fleeX/fl)*moveSpd*0.3;
      c.vy+=(fleeY/fl)*moveSpd*0.3;
    }else if(nearest){
      var dx=nearest.x-c.x,dy=nearest.y-c.y;
      var dl=Math.sqrt(dx*dx+dy*dy);
      c.vx+=(dx/dl)*moveSpd*0.15;
      c.vy+=(dy/dl)*moveSpd*0.15;
    }else{
      c.vx+=(Math.random()-0.5)*0.5;
      c.vy+=(Math.random()-0.5)*0.5;
    }

    c.vx*=0.9;c.vy*=0.9;
    c.x+=c.vx;c.y+=c.vy;
    // wrap
    if(c.x<0)c.x+=W;if(c.x>W)c.x-=W;
    if(c.y<0)c.y+=H;if(c.y>H)c.y-=H;

    // eat food
    var eatR=4+c.genes.size*10;
    for(var j=food.length-1;j>=0;j--){
      var dx=food[j].x-c.x,dy=food[j].y-c.y;
      if(dx*dx+dy*dy<eatR*eatR){
        c.energy+=food[j].energy*c.genes.eff;
        c.eaten++;
        food.splice(j,1);
      }
    }

    // reproduce
    if(c.energy>120&&c.eaten>=2){
      c.energy*=0.5;c.eaten=0;
      gen++;
      creatures.push(reproduce(c));
    }

    // death
    if(c.energy<=0){creatures.splice(i,1);continue;}
    // old age
    if(c.age>3000+c.genes.eff*2000){
      c.energy-=0.5;
    }
  }

  // predators — wander and kill
  for(var i=0;i<predators.length;i++){
    var p=predators[i];
    p.turnT--;
    if(p.turnT<=0){p.angle+=(Math.random()-0.5)*1.5;p.turnT=30+Math.random()*60;}
    // chase nearest creature
    var nearest=null,nd=Infinity;
    for(var j=0;j<creatures.length;j++){
      var dx=creatures[j].x-p.x,dy=creatures[j].y-p.y;
      var d=dx*dx+dy*dy;
      if(d<nd){nd=d;nearest=creatures[j];}
    }
    var ps=2.2;
    if(nearest&&nd<150*150){
      var dx=nearest.x-p.x,dy=nearest.y-p.y;
      var dl=Math.sqrt(dx*dx+dy*dy);
      p.vx=dx/dl*ps;p.vy=dy/dl*ps;
    }else{
      p.vx=Math.cos(p.angle)*ps*0.6;p.vy=Math.sin(p.angle)*ps*0.6;
    }
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x+=W;if(p.x>W)p.x-=W;
    if(p.y<0)p.y+=H;if(p.y>H)p.y-=H;

    // kill
    for(var j=creatures.length-1;j>=0;j--){
      var dx=creatures[j].x-p.x,dy=creatures[j].y-p.y;
      var cr=4+creatures[j].genes.size*10;
      if(dx*dx+dy*dy<(cr+8)*(cr+8)){
        // bigger creatures harder to kill
        if(Math.random()>creatures[j].genes.size*0.4){
          creatures.splice(j,1);
        }
      }
    }
  }

  // extinction recovery
  if(creatures.length===0){
    for(var i=0;i<10;i++)creatures.push(makeCreature());
    gen++;
  }

  // cap population
  if(creatures.length>200){
    creatures.sort(function(a,b){return a.energy-b.energy;});
    creatures.splice(0,creatures.length-150);
  }
}

function geneColor(spd){
  var r=Math.floor(80+spd*175);
  var b=Math.floor(200-spd*150);
  var g=Math.floor(60+spd*40);
  return'rgb('+r+','+g+','+b+')';
}

function draw(){
  X.fillStyle='#060810';X.fillRect(0,0,W,H);

  // subtle grid
  X.strokeStyle='#0c0e18';X.lineWidth=1;
  for(var x=0;x<W;x+=60){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(var y=0;y<H;y+=60){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}

  // food
  for(var i=0;i<food.length;i++){
    var f=food[i];
    X.fillStyle='#44cc44';X.globalAlpha=0.6;
    X.beginPath();X.arc(f.x,f.y,3,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // creatures
  var bestC=null,bestE=0;
  for(var i=0;i<creatures.length;i++){
    var c=creatures[i];
    var r=3+c.genes.size*8;
    var col=geneColor(c.genes.spd);

    // sense ring
    if(c.genes.sense>0.4){
      X.strokeStyle=col;X.globalAlpha=0.06;X.lineWidth=1;
      X.beginPath();X.arc(c.x,c.y,40+c.genes.sense*120,0,Math.PI*2);X.stroke();
    }
    X.globalAlpha=1;

    // body
    X.fillStyle=col;
    X.shadowColor=col;X.shadowBlur=6;
    X.beginPath();X.arc(c.x,c.y,r,0,Math.PI*2);X.fill();
    X.shadowBlur=0;

    // energy bar
    var barW=r*2;var barH=2;
    var ep=Math.min(c.energy/120,1);
    X.fillStyle='#222';X.fillRect(c.x-barW/2,c.y-r-5,barW,barH);
    X.fillStyle=ep>0.3?'#22dd88':'#dd3344';
    X.fillRect(c.x-barW/2,c.y-r-5,barW*ep,barH);

    if(c.energy>bestE){bestE=c.energy;bestC=c;}
  }

  // predators
  for(var i=0;i<predators.length;i++){
    var p=predators[i];
    X.fillStyle='#dd3344';X.shadowColor='#dd3344';X.shadowBlur=10;
    X.beginPath();
    // triangle
    var a=Math.atan2(p.vy,p.vx);
    X.moveTo(p.x+Math.cos(a)*10,p.y+Math.sin(a)*10);
    X.lineTo(p.x+Math.cos(a+2.5)*7,p.y+Math.sin(a+2.5)*7);
    X.lineTo(p.x+Math.cos(a-2.5)*7,p.y+Math.sin(a-2.5)*7);
    X.closePath();X.fill();
    X.shadowBlur=0;
  }

  // update stats
  genEl.textContent=gen;
  popEl.textContent=creatures.length;
  foodEl.textContent=food.length;
  tickEl.textContent=tick;

  // fittest
  if(bestC){
    document.getElementById('b-spd').textContent=bestC.genes.spd.toFixed(2);
    document.getElementById('b-size').textContent=bestC.genes.size.toFixed(2);
    document.getElementById('b-sense').textContent=bestC.genes.sense.toFixed(2);
    document.getElementById('b-eff').textContent=bestC.genes.eff.toFixed(2);
    document.getElementById('b-age').textContent=bestC.age;
  }
}

// controls
sMut.addEventListener('input',function(){vMut.textContent=this.value+'%';});
sFood.addEventListener('input',function(){vFood.textContent=this.value;});
sPred.addEventListener('input',function(){vPred.textContent=this.value;});

playBtn.addEventListener('click',function(){
  paused=!paused;
  this.textContent=paused?'Play':'Pause';
  this.classList.toggle('active',!paused);
});
fastBtn.addEventListener('click',function(){
  speed=speed===1?2:speed===2?4:1;
  this.textContent=speed+'x';
  this.classList.toggle('active',speed>1);
});
resetBtn.addEventListener('click',function(){init();});

function loop(){
  if(!paused){
    for(var i=0;i<speed;i++)step();
  }
  draw();
  requestAnimationFrame(loop);
}

init();loop();
})();
</script>
</body>
</html>
