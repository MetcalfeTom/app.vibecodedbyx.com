<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-Bit Soundboard</title>
<link rel="icon" href="https://emojicdn.elk.sh/🕹️">
<meta property="og:title" content="8-Bit Soundboard">
<meta property="og:description" content="Smash neon arcade buttons to blast crunchy 8-bit sounds.">
<meta property="og:url" content="https://sloppy.live/8bit-soundboard">
<meta property="og:image" content="https://sloppy.live/8bit-soundboard/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a12;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:'Press Start 2P',monospace;
  overflow-x:hidden;
  padding:20px 12px 40px;
}
h1{
  font-family:'Silkscreen',monospace;
  font-size:clamp(20px,5vw,36px);
  color:#fff;
  text-shadow:0 0 20px #ff00ff,0 0 40px #ff00ff,0 0 80px #8000ff;
  margin:16px 0 8px;
  text-align:center;
  letter-spacing:4px;
}
#subtitle{
  font-size:9px;
  color:rgba(255,255,255,0.3);
  letter-spacing:3px;
  margin-bottom:24px;
  text-align:center;
}
#grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  width:min(96vw,560px);
  padding:4px;
}
.btn{
  position:relative;
  aspect-ratio:1;
  border:none;
  border-radius:12px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,1.8vw,10px);
  color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,0.5);
  transition:transform 0.08s,box-shadow 0.08s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  overflow:hidden;
}
.btn::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:12px;
  background:linear-gradient(180deg,rgba(255,255,255,0.2) 0%,transparent 50%,rgba(0,0,0,0.2) 100%);
  pointer-events:none;
}
.btn::after{
  content:'';
  position:absolute;
  inset:2px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  border-bottom-color:transparent;
  border-right-color:transparent;
  pointer-events:none;
}
.btn:active,.btn.pressed{
  transform:scale(0.92) translateY(2px);
}
.btn .icon{font-size:clamp(20px,5vw,32px);filter:drop-shadow(0 0 4px currentColor)}
.btn .label{opacity:0.85;line-height:1.3}

/* Ripple */
.ripple{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.4);
  transform:scale(0);
  animation:ripple-out 0.5s ease-out forwards;
  pointer-events:none;
}
@keyframes ripple-out{to{transform:scale(3);opacity:0}}

/* Waveform visualizer */
#viz{
  width:min(96vw,560px);
  height:60px;
  margin-top:20px;
  border-radius:8px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
}

/* Key hints */
#keys{
  margin-top:16px;
  font-size:8px;
  color:rgba(255,255,255,0.2);
  letter-spacing:2px;
  text-align:center;
  line-height:1.8;
}

/* Scanlines */
#scanlines{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:100;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 6px);
}

/* Volume */
#vol-wrap{
  margin-top:16px;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:9px;
  color:rgba(255,255,255,0.3);
}
#vol{
  -webkit-appearance:none;appearance:none;
  width:120px;height:4px;
  background:rgba(255,255,255,0.15);
  border-radius:2px;
  outline:none;
}
#vol::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:#ff00ff;
  box-shadow:0 0 8px #ff00ff;
  cursor:pointer;
}
#vol::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:#ff00ff;border:none;
  box-shadow:0 0 8px #ff00ff;
  cursor:pointer;
}

@media(max-width:400px){
  #grid{gap:8px}
  .btn{border-radius:8px}
  .btn .icon{font-size:20px}
  .btn .label{font-size:6px}
}
</style>
</head>
<body>

<h1>8-BIT SOUNDBOARD</h1>
<div id="subtitle">SMASH BUTTONS · MAKE NOISE</div>

<div id="grid"></div>

<canvas id="viz"></canvas>

<div id="vol-wrap">
  <span>VOL</span>
  <input type="range" id="vol" min="0" max="100" value="60">
</div>

<div id="keys">KEYS: 1-9, 0, Q-W-E-R-T-Y</div>

<div id="scanlines"></div>

<script>
const SOUNDS = [
  { name:'LASER',     icon:'⚡', bg:'#ff0055', key:'1', gen:'laser' },
  { name:'JUMP',      icon:'🦘', bg:'#ff6600', key:'2', gen:'jump' },
  { name:'COIN',      icon:'🪙', bg:'#ffcc00', key:'3', gen:'coin' },
  { name:'EXPLODE',   icon:'💥', bg:'#ff2200', key:'4', gen:'explode' },
  { name:'POWERUP',   icon:'⭐', bg:'#00ff88', key:'5', gen:'powerup' },
  { name:'HURT',      icon:'💔', bg:'#cc00ff', key:'6', gen:'hurt' },
  { name:'BLIP',      icon:'🔵', bg:'#0088ff', key:'7', gen:'blip' },
  { name:'WARP',      icon:'🌀', bg:'#8800ff', key:'8', gen:'warp' },
  { name:'CHOMP',     icon:'👾', bg:'#00ccaa', key:'9', gen:'chomp' },
  { name:'SIREN',     icon:'🚨', bg:'#ff0088', key:'0', gen:'siren' },
  { name:'DRUM',      icon:'🥁', bg:'#ff4400', key:'Q', gen:'drum' },
  { name:'BEEP',      icon:'📡', bg:'#00ddff', key:'W', gen:'beep' },
  { name:'SWEEP',     icon:'🎵', bg:'#aa00ff', key:'E', gen:'sweep' },
  { name:'CRASH',     icon:'🔔', bg:'#ffaa00', key:'R', gen:'crash' },
  { name:'ZAP',       icon:'⚔️', bg:'#22ff44', key:'T', gen:'zap' },
  { name:'BASS',      icon:'🔊', bg:'#ff0077', key:'Y', gen:'bass' },
];

let audioCtx = null;
let masterGain = null;
let analyser = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.6;
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
  startViz();
}

function vol() { return masterGain ? masterGain.gain.value : 0.6; }

document.getElementById('vol').addEventListener('input', e => {
  if (masterGain) masterGain.gain.value = e.target.value / 100;
});

// === Sound generators — crunchy 8-bit style ===

function gen(type) {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const t = audioCtx.currentTime;
  const out = masterGain;

  switch(type) {
    case 'laser': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(1500, t);
      o.frequency.exponentialRampToValueAtTime(100, t + 0.3);
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.35);
      break;
    }
    case 'jump': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(200, t);
      o.frequency.exponentialRampToValueAtTime(800, t + 0.15);
      o.frequency.exponentialRampToValueAtTime(200, t + 0.3);
      g.gain.setValueAtTime(0.25, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.35);
      break;
    }
    case 'coin': {
      [880, 1320].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(f, t + i * 0.08);
        g.gain.setValueAtTime(0, t);
        g.gain.setValueAtTime(0.2, t + i * 0.08);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.2);
        o.connect(g); g.connect(out);
        o.start(t + i * 0.08); o.stop(t + i * 0.08 + 0.25);
      });
      break;
    }
    case 'explode': {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
        // Bitcrush
        d[i] = Math.round(d[i] * 8) / 8;
      }
      const s = audioCtx.createBufferSource();
      s.buffer = buf;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.35, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      const f = audioCtx.createBiquadFilter();
      f.type = 'lowpass';
      f.frequency.setValueAtTime(2000, t);
      f.frequency.exponentialRampToValueAtTime(100, t + 0.4);
      s.connect(f); f.connect(g); g.connect(out);
      s.start(t);
      break;
    }
    case 'powerup': {
      const steps = [260,330,390,520,660,780];
      steps.forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(f, t + i * 0.06);
        g.gain.setValueAtTime(0, t);
        g.gain.setValueAtTime(0.18, t + i * 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.12);
        o.connect(g); g.connect(out);
        o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.15);
      });
      break;
    }
    case 'hurt': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(400, t);
      o.frequency.exponentialRampToValueAtTime(80, t + 0.25);
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.3);
      // Second voice
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.type = 'sawtooth';
      o2.frequency.setValueAtTime(300, t);
      o2.frequency.exponentialRampToValueAtTime(50, t + 0.2);
      g2.gain.setValueAtTime(0.15, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      o2.connect(g2); g2.connect(out);
      o2.start(t); o2.stop(t + 0.25);
      break;
    }
    case 'blip': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(660, t);
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.1);
      break;
    }
    case 'warp': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(100, t);
      o.frequency.exponentialRampToValueAtTime(2000, t + 0.2);
      o.frequency.exponentialRampToValueAtTime(100, t + 0.5);
      g.gain.setValueAtTime(0.25, t);
      g.gain.setValueAtTime(0.25, t + 0.3);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.55);
      break;
    }
    case 'chomp': {
      for (let i = 0; i < 3; i++) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(i % 2 === 0 ? 400 : 300, t + i * 0.06);
        g.gain.setValueAtTime(0, t);
        g.gain.setValueAtTime(0.2, t + i * 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.05);
        o.connect(g); g.connect(out);
        o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.06);
      }
      break;
    }
    case 'siren': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(600, t);
      o.frequency.linearRampToValueAtTime(1200, t + 0.15);
      o.frequency.linearRampToValueAtTime(600, t + 0.3);
      o.frequency.linearRampToValueAtTime(1200, t + 0.45);
      o.frequency.linearRampToValueAtTime(600, t + 0.6);
      g.gain.setValueAtTime(0.2, t);
      g.gain.setValueAtTime(0.2, t + 0.5);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.65);
      break;
    }
    case 'drum': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(300, t);
      o.frequency.exponentialRampToValueAtTime(40, t + 0.1);
      g.gain.setValueAtTime(0.4, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.2);
      // Noise hit
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
      const s = audioCtx.createBufferSource(); s.buffer = buf;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.3, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      s.connect(ng); ng.connect(out); s.start(t);
      break;
    }
    case 'beep': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(1000, t);
      g.gain.setValueAtTime(0.15, t);
      g.gain.setValueAtTime(0.15, t + 0.1);
      g.gain.setValueAtTime(0, t + 0.12);
      g.gain.setValueAtTime(0.15, t + 0.18);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.35);
      break;
    }
    case 'sweep': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(80, t);
      o.frequency.exponentialRampToValueAtTime(1200, t + 0.4);
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.5);
      break;
    }
    case 'crash': {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.5);
      }
      const s = audioCtx.createBufferSource(); s.buffer = buf;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.3, t);
      const f = audioCtx.createBiquadFilter();
      f.type = 'highpass'; f.frequency.setValueAtTime(3000, t);
      f.frequency.exponentialRampToValueAtTime(500, t + 0.3);
      s.connect(f); f.connect(g); g.connect(out); s.start(t);
      break;
    }
    case 'zap': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(2000, t);
      o.frequency.exponentialRampToValueAtTime(50, t + 0.15);
      o.frequency.setValueAtTime(1500, t + 0.16);
      o.frequency.exponentialRampToValueAtTime(50, t + 0.3);
      g.gain.setValueAtTime(0.25, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.35);
      break;
    }
    case 'bass': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(80, t);
      o.frequency.setValueAtTime(60, t + 0.1);
      g.gain.setValueAtTime(0.4, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.4);
      // Sub layer
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(50, t);
      g2.gain.setValueAtTime(0.3, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o2.connect(g2); g2.connect(out);
      o2.start(t); o2.stop(t + 0.35);
      break;
    }
  }
}

// === Build grid ===
const grid = document.getElementById('grid');
const btnEls = [];

SOUNDS.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.style.background = s.bg;
  btn.style.boxShadow = `0 4px 20px ${s.bg}66, inset 0 -3px 6px rgba(0,0,0,0.3)`;
  btn.innerHTML = `<span class="icon">${s.icon}</span><span class="label">${s.name}</span><span style="font-size:8px;opacity:0.4;font-family:'Fira Code',monospace">[${s.key}]</span>`;

  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    initAudio();
    triggerBtn(i, e);
  });

  grid.appendChild(btn);
  btnEls.push(btn);
});

function triggerBtn(i, e) {
  const btn = btnEls[i];
  const s = SOUNDS[i];

  gen(s.gen);

  // Visual press
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 120);

  // Glow pulse
  btn.style.boxShadow = `0 0 40px ${s.bg}, 0 0 80px ${s.bg}88, inset 0 -3px 6px rgba(0,0,0,0.3)`;
  setTimeout(() => {
    btn.style.boxShadow = `0 4px 20px ${s.bg}66, inset 0 -3px 6px rgba(0,0,0,0.3)`;
  }, 200);

  // Ripple
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  let rx, ry;
  if (e && e.clientX) {
    rx = e.clientX - rect.left;
    ry = e.clientY - rect.top;
  } else {
    rx = rect.width / 2;
    ry = rect.height / 2;
  }
  ripple.style.left = rx - 25 + 'px';
  ripple.style.top = ry - 25 + 'px';
  ripple.style.width = ripple.style.height = '50px';
  btn.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

// Keyboard
const keyMap = {};
SOUNDS.forEach((s, i) => { keyMap[s.key.toLowerCase()] = i; });

window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const k = e.key.toLowerCase();
  if (keyMap[k] !== undefined) {
    initAudio();
    triggerBtn(keyMap[k], null);
  }
});

// === Waveform visualizer ===
const vizCanvas = document.getElementById('viz');
const vCtx = vizCanvas.getContext('2d');

function resizeViz() {
  vizCanvas.width = vizCanvas.clientWidth * (window.devicePixelRatio || 1);
  vizCanvas.height = vizCanvas.clientHeight * (window.devicePixelRatio || 1);
}
resizeViz();
window.addEventListener('resize', resizeViz);

function startViz() {
  const bufLen = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufLen);

  function drawViz() {
    requestAnimationFrame(drawViz);
    analyser.getByteFrequencyData(dataArray);

    const w = vizCanvas.width;
    const h = vizCanvas.height;
    vCtx.clearRect(0, 0, w, h);

    const barW = w / bufLen * 2;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = dataArray[i] / 255;
      const barH = v * h * 0.9;
      const hue = (i / bufLen) * 300;
      vCtx.fillStyle = `hsla(${hue}, 100%, 60%, ${0.5 + v * 0.5})`;
      vCtx.fillRect(x, h - barH, barW - 1, barH);
      x += barW;
      if (x > w) break;
    }
  }
  drawViz();
}
</script>
</body>
</html>
