<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Virality Tracker</title>
<link rel="icon" href="https://emojicdn.elk.sh/📈">
<meta property="og:title" content="Meme Virality Tracker">
<meta property="og:description" content="Track and rank trending memes by virality score with neon charts.">
<meta property="og:url" content="https://app.sloppy.live/meme-virality/">
<meta property="og:image" content="https://emojicdn.elk.sh/📈?style=google">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050a05;--surface:#0a140a;--border:#0f2a0f;
  --neon:#00ff41;--neon-dim:#00aa2a;--neon-glow:rgba(0,255,65,0.15);
  --text:#a0c8a0;--dim:#3a6a3a;--hot:#ff3333;--warm:#ffaa00;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Share Tech Mono',monospace;
  min-height:100vh;overflow-x:hidden;
}

/* Scanline overlay */
body::after{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.015) 2px,rgba(0,255,65,0.015) 4px);
}

.container{max-width:900px;margin:0 auto;padding:16px;position:relative;z-index:2}

header{text-align:center;margin-bottom:24px}
h1{
  font-family:'Orbitron',monospace;font-size:clamp(1.5rem,5vw,2.4rem);
  font-weight:900;color:var(--neon);letter-spacing:0.08em;
  text-shadow:0 0 20px var(--neon-glow),0 0 60px rgba(0,255,65,0.08);
}
.sub{color:var(--dim);font-size:0.7rem;margin-top:4px;letter-spacing:0.15em;text-transform:uppercase}

/* Stats bar */
.stats-bar{
  display:flex;gap:16px;justify-content:center;margin-bottom:20px;
  flex-wrap:wrap;
}
.stat{
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:8px 16px;text-align:center;min-width:100px;
}
.stat-val{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--neon);font-weight:700}
.stat-label{font-size:0.55rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px}

/* Chart container */
.chart-section{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:16px;margin-bottom:20px;position:relative;
}
.chart-title{
  font-family:'Orbitron',monospace;font-size:0.7rem;color:var(--neon-dim);
  text-transform:uppercase;letter-spacing:0.15em;margin-bottom:10px;
}
canvas{width:100%;border-radius:6px;display:block}

/* Submit form */
.submit-section{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:16px;margin-bottom:20px;
}
.submit-title{
  font-family:'Orbitron',monospace;font-size:0.7rem;color:var(--neon-dim);
  text-transform:uppercase;letter-spacing:0.15em;margin-bottom:12px;
}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-input{
  flex:1;min-width:120px;padding:9px 12px;border:1px solid var(--border);border-radius:6px;
  background:var(--bg);color:var(--neon);font-family:'Share Tech Mono',monospace;
  font-size:0.8rem;outline:none;
}
.form-input:focus{border-color:var(--neon);box-shadow:0 0 8px var(--neon-glow)}
.form-input::placeholder{color:var(--dim)}
select.form-input{cursor:pointer;appearance:none;-webkit-appearance:none}
.submit-btn{
  padding:10px 24px;border:1px solid var(--neon);border-radius:6px;
  background:transparent;color:var(--neon);font-family:'Orbitron',monospace;
  font-size:0.75rem;font-weight:700;cursor:pointer;transition:all 0.2s;
  text-transform:uppercase;letter-spacing:0.1em;
}
.submit-btn:hover{background:var(--neon);color:var(--bg);box-shadow:0 0 20px var(--neon-glow)}
.submit-btn:disabled{opacity:0.3;cursor:default}
.form-error{color:var(--hot);font-size:0.65rem;margin-top:4px;display:none}

/* Category filter */
.filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.filter-btn{
  padding:5px 12px;border:1px solid var(--border);border-radius:4px;
  background:transparent;color:var(--dim);font-family:'Share Tech Mono',monospace;
  font-size:0.65rem;cursor:pointer;transition:all 0.15s;text-transform:uppercase;
}
.filter-btn.active{border-color:var(--neon);color:var(--neon);background:rgba(0,255,65,0.05)}
.filter-btn:hover{border-color:var(--neon-dim);color:var(--neon-dim)}

/* Meme list */
.meme-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.meme-row{
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;transition:border-color 0.2s;
}
.meme-row:hover{border-color:var(--neon-dim)}
.meme-rank{
  font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;
  min-width:36px;text-align:center;
}
.meme-rank.gold{color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.3)}
.meme-rank.silver{color:#c0c0c0;text-shadow:0 0 10px rgba(192,192,192,0.2)}
.meme-rank.bronze{color:#cd7f32;text-shadow:0 0 10px rgba(205,127,50,0.2)}
.meme-rank.normal{color:var(--dim)}
.meme-info{flex:1;min-width:0}
.meme-name{font-size:0.9rem;color:var(--neon);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meme-meta{font-size:0.55rem;color:var(--dim);margin-top:2px}
.meme-cat{
  display:inline-block;padding:1px 6px;border:1px solid var(--border);
  border-radius:3px;font-size:0.5rem;color:var(--dim);text-transform:uppercase;
}
.meme-score-col{text-align:right;min-width:60px}
.meme-score{
  font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;
}
.meme-score.fire{color:var(--hot)}
.meme-score.hot{color:var(--warm)}
.meme-score.warm{color:var(--neon)}
.meme-score.cool{color:var(--neon-dim)}
.meme-score-label{font-size:0.45rem;color:var(--dim);text-transform:uppercase}
.vote-btn{
  padding:6px 10px;border:1px solid var(--border);border-radius:4px;
  background:transparent;color:var(--dim);font-size:0.75rem;cursor:pointer;
  transition:all 0.15s;display:flex;align-items:center;gap:3px;
}
.vote-btn:hover{border-color:var(--neon);color:var(--neon)}
.vote-btn.voted{border-color:var(--neon);color:var(--neon);background:rgba(0,255,65,0.05)}
.vote-count{font-family:'Orbitron',monospace;font-size:0.6rem}

.empty-msg{text-align:center;color:var(--dim);font-size:0.8rem;padding:30px;font-style:italic}
.loading{text-align:center;color:var(--dim);font-size:0.8rem;padding:40px}

.back-link{text-align:center;margin-top:8px;padding-bottom:20px}
.back-link a{color:var(--dim);text-decoration:none;font-size:0.6rem;letter-spacing:0.1em}
.back-link a:hover{color:var(--neon)}

/* Glow pulse on chart section */
@keyframes borderPulse{
  0%,100%{border-color:var(--border)}
  50%{border-color:var(--neon-dim)}
}
.chart-section{animation:borderPulse 4s ease-in-out infinite}

@media(max-width:500px){
  .meme-row{flex-wrap:wrap;gap:8px}
  .meme-score-col{min-width:auto}
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>MEME VIRALITY TRACKER</h1>
    <div class="sub">real-time meme trend analysis</div>
  </header>

  <div id="loading" class="loading">Initializing tracker...</div>

  <div id="app" style="display:none">
    <div class="stats-bar">
      <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-label">Tracked</div></div>
      <div class="stat"><div class="stat-val" id="s-votes">0</div><div class="stat-label">Total Votes</div></div>
      <div class="stat"><div class="stat-val" id="s-top">—</div><div class="stat-label">#1 Meme</div></div>
      <div class="stat"><div class="stat-val" id="s-hotcat">—</div><div class="stat-label">Hot Category</div></div>
    </div>

    <div class="chart-section">
      <div class="chart-title">Virality Rankings</div>
      <canvas id="bar-chart" height="220"></canvas>
    </div>

    <div class="chart-section">
      <div class="chart-title">Category Distribution</div>
      <canvas id="pie-chart" height="180"></canvas>
    </div>

    <div class="submit-section">
      <div class="submit-title">Submit a Meme</div>
      <div class="form-row">
        <input class="form-input" id="f-name" placeholder="Meme name..." maxlength="60">
        <select class="form-input" id="f-cat" style="max-width:160px">
          <option value="trending">Trending</option>
          <option value="classic">Classic</option>
          <option value="video">Video</option>
          <option value="image">Image</option>
          <option value="copypasta">Copypasta</option>
          <option value="sound">Sound</option>
          <option value="format">Format</option>
        </select>
      </div>
      <div class="form-row">
        <input class="form-input" id="f-user" placeholder="Your name..." maxlength="20" style="max-width:200px">
        <button class="submit-btn" id="submit-btn" onclick="submitMeme()">SUBMIT</button>
      </div>
      <div class="form-error" id="form-error"></div>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" data-cat="trending" onclick="setFilter('trending',this)">Trending</button>
      <button class="filter-btn" data-cat="classic" onclick="setFilter('classic',this)">Classic</button>
      <button class="filter-btn" data-cat="video" onclick="setFilter('video',this)">Video</button>
      <button class="filter-btn" data-cat="image" onclick="setFilter('image',this)">Image</button>
      <button class="filter-btn" data-cat="copypasta" onclick="setFilter('copypasta',this)">Copypasta</button>
      <button class="filter-btn" data-cat="sound" onclick="setFilter('sound',this)">Sound</button>
      <button class="filter-btn" data-cat="format" onclick="setFilter('format',this)">Format</button>
    </div>

    <div class="meme-list" id="meme-list"></div>
  </div>

  <div class="back-link"><a href="https://sloppy.live">sloppy.live</a></div>
</div>

<script type="module">
import supabase, { supabaseSession } from '/supabase-config-fixed.js';

let userId, memes = [], currentFilter = 'all';
let votedMemes = new Set();

function viralityScore(m) {
  const ageMs = Date.now() - new Date(m.created_at).getTime();
  const ageHours = ageMs / 3600000;
  const decay = Math.max(0.1, 1 - (ageHours / 168)); // decay over 1 week
  const voteWeight = (m.votes || 0) * 10;
  return Math.round((voteWeight + 5) * decay * 100) / 100;
}

function scoreClass(score) {
  if (score >= 80) return 'fire';
  if (score >= 40) return 'hot';
  if (score >= 15) return 'warm';
  return 'cool';
}

function rankClass(i) {
  if (i === 0) return 'gold';
  if (i === 1) return 'silver';
  if (i === 2) return 'bronze';
  return 'normal';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function init() {
  try {
    const { user } = await supabaseSession();
    userId = user.id;

    // Resolve username
    let username = '';
    try {
      const stored = localStorage.getItem('sloppy-profile');
      if (stored) { const p = JSON.parse(stored); if (p.username) username = p.username; }
    } catch(e) {}
    if (!username) {
      try {
        const { data: prof } = await supabase.from('sloppygram_profiles').select('username').eq('user_id', userId).limit(1);
        if (prof && prof[0]?.username) username = prof[0].username;
      } catch(e) {}
    }
    if (username) document.getElementById('f-user').value = username;

    // Load votes from localStorage
    try {
      const v = localStorage.getItem('meme-virality-votes');
      if (v) votedMemes = new Set(JSON.parse(v));
    } catch(e) {}

    await loadMemes();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // Auto-refresh every 30s
    setInterval(loadMemes, 30000);
  } catch(e) {
    document.getElementById('loading').textContent = 'Error: ' + e.message;
  }
}

async function loadMemes() {
  const { data, error } = await supabase.from('meme_virality').select('*');
  if (error) { console.error('Load error:', error.message); return; }
  memes = (data || []).map(m => ({ ...m, score: viralityScore(m) }));
  memes.sort((a, b) => b.score - a.score);
  updateStats();
  drawBarChart();
  drawPieChart();
  renderList();
}

function updateStats() {
  const totalVotes = memes.reduce((s, m) => s + (m.votes || 0), 0);
  document.getElementById('s-total').textContent = memes.length;
  document.getElementById('s-votes').textContent = totalVotes;
  document.getElementById('s-top').textContent = memes.length > 0 ? memes[0].meme_name.slice(0, 12) : '—';

  // Hottest category
  const catVotes = {};
  memes.forEach(m => { catVotes[m.category] = (catVotes[m.category] || 0) + m.score; });
  const hotCat = Object.entries(catVotes).sort((a, b) => b[1] - a[1])[0];
  document.getElementById('s-hotcat').textContent = hotCat ? hotCat[0] : '—';
}

function drawBarChart() {
  const canvas = document.getElementById('bar-chart');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 220 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 220;

  ctx.fillStyle = '#030803';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(0,255,65,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const y = 20 + i * (H - 50) / 4;
    ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(W - 10, y); ctx.stroke();
  }

  const top = memes.slice(0, 12);
  if (top.length === 0) {
    ctx.fillStyle = '#3a6a3a';
    ctx.font = '12px "Share Tech Mono"';
    ctx.textAlign = 'center';
    ctx.fillText('No memes tracked yet', W / 2, H / 2);
    return;
  }

  const maxScore = Math.max(...top.map(m => m.score), 1);
  const barW = Math.min(40, (W - 60) / top.length - 4);
  const startX = 50;
  const barArea = W - 60;
  const gap = barArea / top.length;

  top.forEach((m, i) => {
    const x = startX + i * gap + (gap - barW) / 2;
    const barH = (m.score / maxScore) * (H - 60);
    const y = H - 30 - barH;

    // Bar glow
    const grad = ctx.createLinearGradient(x, y, x, H - 30);
    if (m.score >= 80) {
      grad.addColorStop(0, '#ff3333');
      grad.addColorStop(1, '#aa0000');
    } else if (m.score >= 40) {
      grad.addColorStop(0, '#ffaa00');
      grad.addColorStop(1, '#886600');
    } else {
      grad.addColorStop(0, '#00ff41');
      grad.addColorStop(1, '#006618');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, barW, barH);

    // Glow effect
    ctx.shadowColor = m.score >= 80 ? '#ff3333' : m.score >= 40 ? '#ffaa00' : '#00ff41';
    ctx.shadowBlur = 8;
    ctx.fillRect(x, y, barW, barH);
    ctx.shadowBlur = 0;

    // Score label
    ctx.fillStyle = '#a0c8a0';
    ctx.font = '9px "Orbitron"';
    ctx.textAlign = 'center';
    ctx.fillText(Math.round(m.score), x + barW / 2, y - 4);

    // Name label
    ctx.fillStyle = '#3a6a3a';
    ctx.font = '8px "Share Tech Mono"';
    ctx.save();
    ctx.translate(x + barW / 2, H - 26);
    ctx.rotate(-0.5);
    const label = m.meme_name.length > 8 ? m.meme_name.slice(0, 7) + '..' : m.meme_name;
    ctx.fillText(label, 0, 0);
    ctx.restore();
  });

  // Y-axis labels
  ctx.fillStyle = '#3a6a3a';
  ctx.font = '8px "Share Tech Mono"';
  ctx.textAlign = 'right';
  for (let i = 0; i < 5; i++) {
    const y = 20 + i * (H - 50) / 4;
    const val = Math.round(maxScore * (1 - i / 4));
    ctx.fillText(val, 36, y + 3);
  }
}

function drawPieChart() {
  const canvas = document.getElementById('pie-chart');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 180 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 180;

  ctx.fillStyle = '#030803';
  ctx.fillRect(0, 0, W, H);

  const cats = {};
  memes.forEach(m => { cats[m.category] = (cats[m.category] || 0) + 1; });
  const entries = Object.entries(cats).sort((a, b) => b[1] - a[1]);

  if (entries.length === 0) {
    ctx.fillStyle = '#3a6a3a';
    ctx.font = '12px "Share Tech Mono"';
    ctx.textAlign = 'center';
    ctx.fillText('No data', W / 2, H / 2);
    return;
  }

  const total = memes.length;
  const cx = W * 0.35, cy = H / 2, r = Math.min(cx - 20, cy - 20, 65);
  const colors = ['#00ff41', '#00cc33', '#33ff77', '#00ff88', '#66ffaa', '#00aa55', '#22dd66'];

  let angle = -Math.PI / 2;
  entries.forEach(([cat, count], i) => {
    const slice = (count / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.shadowColor = colors[i % colors.length];
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Outline
    ctx.strokeStyle = '#050a05';
    ctx.lineWidth = 2;
    ctx.stroke();

    angle += slice;
  });

  // Inner circle for donut
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.45, 0, Math.PI * 2);
  ctx.fillStyle = '#030803';
  ctx.fill();

  // Center text
  ctx.fillStyle = '#00ff41';
  ctx.font = '700 16px "Orbitron"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(total, cx, cy);

  // Legend
  const legendX = W * 0.62;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  entries.slice(0, 7).forEach(([cat, count], i) => {
    const ly = 16 + i * 22;
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(legendX, ly + 2, 10, 10);
    ctx.fillStyle = '#a0c8a0';
    ctx.font = '10px "Share Tech Mono"';
    ctx.fillText(`${cat} (${count})`, legendX + 16, ly);
  });
}

function renderList() {
  const list = document.getElementById('meme-list');
  let filtered = currentFilter === 'all' ? memes : memes.filter(m => m.category === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-msg">No memes found. Submit the first one!</div>';
    return;
  }

  list.innerHTML = filtered.slice(0, 50).map((m, i) => {
    const isVoted = votedMemes.has(m.created_at);
    const isMine = m.user_id === userId;
    const sc = scoreClass(m.score);
    const rc = rankClass(i);
    const age = timeAgo(m.created_at);
    return `
      <div class="meme-row">
        <div class="meme-rank ${rc}">${i + 1}</div>
        <div class="meme-info">
          <div class="meme-name">${esc(m.meme_name)}</div>
          <div class="meme-meta">
            <span class="meme-cat">${esc(m.category)}</span>
            by ${esc(m.username || 'Anon')} · ${age}
          </div>
        </div>
        <div class="meme-score-col">
          <div class="meme-score ${sc}">${Math.round(m.score)}</div>
          <div class="meme-score-label">virality</div>
        </div>
        <button class="vote-btn${isVoted ? ' voted' : ''}" onclick="voteMeme('${m.created_at}', ${m.votes || 0})" ${isVoted ? 'disabled' : ''}>
          ▲ <span class="vote-count">${m.votes || 0}</span>
        </button>
        ${isMine ? `<button class="vote-btn" onclick="deleteMeme('${m.created_at}')" title="Delete" style="color:var(--hot);border-color:var(--border)">✕</button>` : ''}
      </div>`;
  }).join('');
}

function timeAgo(ts) {
  const ms = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

window.setFilter = function(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
};

window.submitMeme = async function() {
  const name = document.getElementById('f-name').value.trim();
  const cat = document.getElementById('f-cat').value;
  const username = document.getElementById('f-user').value.trim() || 'Anon';
  const errEl = document.getElementById('form-error');

  if (!name) { errEl.textContent = 'Enter a meme name.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'SUBMITTING...';

  const { error } = await supabase.from('meme_virality').insert({
    user_id: userId, meme_name: name, category: cat, votes: 0, username
  });

  if (error) {
    errEl.textContent = 'Error: ' + error.message;
    errEl.style.display = 'block';
  } else {
    document.getElementById('f-name').value = '';
    await loadMemes();
  }
  btn.disabled = false;
  btn.textContent = 'SUBMIT';
};

window.voteMeme = async function(createdAt, currentVotes) {
  if (votedMemes.has(createdAt)) return;
  votedMemes.add(createdAt);
  localStorage.setItem('meme-virality-votes', JSON.stringify([...votedMemes]));

  await supabase.from('meme_virality').update({ votes: currentVotes + 1 }).eq('created_at', createdAt);
  await loadMemes();
};

window.deleteMeme = async function(createdAt) {
  await supabase.from('meme_virality').delete().eq('created_at', createdAt).eq('user_id', userId);
  await loadMemes();
};

window.addEventListener('resize', () => { drawBarChart(); drawPieChart(); });

init();
</script>
</body>
</html>
