<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Neon Heart · Click to Quicken</title>
<meta name="description" content="A glowing neon heart you can click. The more you tap, the harder it pounds." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%97" />
<meta property="og:title" content="Neon Heart" />
<meta property="og:description" content="A glowing neon heart that beats faster every time you click. Calm, warm, racing, manic." />
<meta property="og:url" content="https://sloppy.live/neon-heart/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/glowing%20neon%20pink%20cyan%20heart%20pulsing%20on%20deep%20violet%20void%20synthwave%20bloom?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Cormorant+Garamond:ital,wght@1,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --void:#0a0414;
  --deep:#1a0a2a;
  --pink:#ff3da8;
  --hot:#ff7ed8;
  --cyan:#7be4ff;
  --gold:#ffce4a;
  --bone:#fdf2ff;
  --dim:rgba(253,242,255,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--void);color:var(--bone);font-family:'Space Mono',monospace}
body{
  background:
    radial-gradient(ellipse at 50% 50%, rgba(255,61,168,0.16), transparent 50%),
    radial-gradient(ellipse at 18% 12%, rgba(123,228,255,0.10), transparent 55%),
    radial-gradient(ellipse at 82% 88%, rgba(255,206,74,0.08), transparent 50%),
    linear-gradient(180deg, var(--void) 0%, var(--deep) 100%);
  display:flex;align-items:center;justify-content:center;
  cursor:crosshair;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:
    radial-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
    radial-gradient(rgba(255,200,255,0.014) 1px, transparent 1px);
  background-size: 220px 220px, 140px 140px;
  background-position: 0 0, 80px 60px;
  mix-blend-mode:screen;
}
.stage{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
.title{
  font-family:'Cormorant Garamond', serif;font-style:italic;font-weight:500;
  font-size:clamp(18px, 2.4vw, 26px);
  color:rgba(253,242,255,0.78);
  letter-spacing:0.18em;
  text-align:center;
  text-shadow:0 0 14px rgba(255,61,168,0.4);
}
.title .b{color:var(--pink)}
.heart-wrap{
  position:relative;width:min(56vw, 460px);height:min(56vw, 460px);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;
  filter:drop-shadow(0 0 30px rgba(255,61,168,calc(0.35 + 0.5 * var(--bpm-norm, 0))));
}
.heart-wrap svg{
  width:100%;height:100%;
  transform-origin:50% 55%;
  animation:beat var(--beat, 1s) cubic-bezier(.18,.7,.4,1.05) infinite;
}
@keyframes beat{
  0%, 100%{transform:scale(1)}
  10%{transform:scale(1.18)}
  18%{transform:scale(1.05)}
  28%{transform:scale(1.16)}
  44%{transform:scale(1)}
}
.heart-wrap.click-pop svg{animation:beat var(--beat, 1s) cubic-bezier(.18,.7,.4,1.05) infinite, popOnce 0.4s ease-out}
@keyframes popOnce{
  0%{filter:none}
  35%{filter:brightness(1.35) saturate(1.5)}
  100%{filter:none}
}
.heart-shell{
  position:absolute;inset:0;border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle at 50% 55%,
    rgba(255,61,168,calc(0.20 + 0.30 * var(--bpm-norm, 0))) 0%,
    rgba(255,61,168,0.04) 50%,
    transparent 70%);
  animation:shellPulse var(--beat, 1s) cubic-bezier(.4,0,.2,1) infinite;
  z-index:-1;
}
@keyframes shellPulse{
  0%, 100%{transform:scale(1);opacity:1}
  10%{transform:scale(1.12);opacity:0.85}
  44%{transform:scale(1);opacity:1}
}
.bpm{
  font-family:'Major Mono Display', monospace;
  font-size:clamp(36px, 5vw, 64px);
  color:var(--bone);
  letter-spacing:0.08em;
  text-shadow:0 0 20px rgba(255,61,168, calc(0.4 + 0.4 * var(--bpm-norm, 0)));
  line-height:1;
  display:flex;align-items:baseline;gap:10px;
}
.bpm .num{color:var(--pink);min-width:3ch;text-align:right}
.bpm .lbl{
  font-family:'Major Mono Display', monospace;
  font-size:clamp(11px, 1.2vw, 14px);
  letter-spacing:0.45em;color:var(--dim);
}
.mood{
  font-family:'Cormorant Garamond', serif;font-style:italic;
  font-size:clamp(15px, 2vw, 22px);
  color:var(--bone);
  letter-spacing:0.1em;
  opacity:0.8;
  text-align:center;
  min-height:1.6em;
  text-shadow:0 0 10px rgba(123,228,255,0.4);
}
.mood.calm{color:var(--cyan)}
.mood.warm{color:var(--gold)}
.mood.racing{color:var(--pink)}
.mood.manic{color:#ff5050;text-shadow:0 0 18px rgba(255,40,90,0.7)}

.hint{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  font-family:'Space Mono', monospace;font-size:11px;
  color:var(--dim);letter-spacing:0.16em;
  pointer-events:none;z-index:5;
  text-align:center;
}
.hint b{color:var(--cyan);font-weight:400}
.muted{
  position:fixed;top:18px;right:18px;z-index:5;
  background:transparent;border:1px solid rgba(255,255,255,0.18);
  color:var(--dim);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.18em;
  padding:6px 12px;border-radius:999px;cursor:pointer;
}
.muted:hover{color:var(--bone);border-color:var(--pink)}
.spark{
  position:absolute;pointer-events:none;width:4px;height:4px;border-radius:50%;
  background:radial-gradient(circle, #fff 0%, var(--pink) 60%, transparent 100%);
  box-shadow:0 0 8px var(--pink);
  animation:spark 0.8s cubic-bezier(.4,0,.6,1) forwards;
  z-index:3;
}
@keyframes spark{
  0%{opacity:1;transform:translate(-50%, -50%) scale(0.6)}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx, 0)), calc(-50% + var(--dy, -40px))) scale(1.4)}
}
@media (max-width:540px){
  .hint{bottom:10px;font-size:10px}
}
</style>
</head>
<body>
<div class="stage">
  <div class="title">— click the <span class="b">heart</span>. don't stop. —</div>
  <div class="heart-wrap" id="heartWrap">
    <div class="heart-shell"></div>
    <svg viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bodyGrad" cx="0.4" cy="0.35" r="0.7">
          <stop offset="0" stop-color="#ffd2ec"/>
          <stop offset="0.45" stop-color="#ff3da8"/>
          <stop offset="1" stop-color="#82105a"/>
        </radialGradient>
        <filter id="bloom">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="bigBloom">
          <feGaussianBlur stdDeviation="14"/>
        </filter>
      </defs>
      <!-- outer halo (huge blur) -->
      <path id="haloPath" filter="url(#bigBloom)"
        d="M 0 60 C -85 5 -85 -55 -45 -75 C -20 -88 -3 -75 0 -55 C 3 -75 20 -88 45 -75 C 85 -55 85 5 0 60 Z"
        fill="#ff3da8" opacity="0.55"/>
      <!-- main heart body -->
      <path id="bodyPath"
        d="M 0 60 C -85 5 -85 -55 -45 -75 C -20 -88 -3 -75 0 -55 C 3 -75 20 -88 45 -75 C 85 -55 85 5 0 60 Z"
        fill="url(#bodyGrad)" filter="url(#bloom)"/>
      <!-- bright neon outline -->
      <path id="outlinePath"
        d="M 0 60 C -85 5 -85 -55 -45 -75 C -20 -88 -3 -75 0 -55 C 3 -75 20 -88 45 -75 C 85 -55 85 5 0 60 Z"
        fill="none" stroke="#fff" stroke-width="3" filter="url(#bloom)"/>
      <!-- specular highlight -->
      <ellipse cx="-30" cy="-50" rx="14" ry="9" fill="#ffe4f4" opacity="0.7" filter="url(#bloom)"/>
      <ellipse cx="-22" cy="-58" rx="6" ry="3" fill="#ffffff" opacity="0.85"/>
    </svg>
  </div>
  <div class="bpm">
    <span class="lbl">BPM</span>
    <span class="num" id="bpmNum">60</span>
  </div>
  <div class="mood calm" id="mood">at rest</div>
</div>
<button class="muted" id="bMute">♪ on</button>
<div class="hint">click the <b>heart</b> · or press <b>SPACE</b></div>

<script>
(() => {
  const wrap = document.getElementById('heartWrap');
  const bpmNum = document.getElementById('bpmNum');
  const moodEl = document.getElementById('mood');

  const BPM_BASE = 60;
  const BPM_MAX = 220;
  const PER_CLICK = 7;
  const DECAY_PER_SEC = 4;       // how many bpm we lose per second
  let bpm = BPM_BASE;
  let lastBeatAt = performance.now();

  const MOODS = [
    { until: 70,  label: 'at rest',         cls: 'calm'   },
    { until: 95,  label: 'warming…',         cls: 'calm'   },
    { until: 130, label: 'fluttering',       cls: 'warm'   },
    { until: 165, label: 'racing',           cls: 'racing' },
    { until: 200, label: 'pounding',         cls: 'racing' },
    { until: Infinity, label: 'manic · stop', cls: 'manic'  },
  ];

  function applyBpm() {
    bpmNum.textContent = Math.round(bpm);
    // beat duration in seconds
    const beatSec = 60 / bpm;
    document.documentElement.style.setProperty('--beat', beatSec + 's');
    const norm = Math.min(1, (bpm - BPM_BASE) / (BPM_MAX - BPM_BASE));
    document.documentElement.style.setProperty('--bpm-norm', norm.toFixed(3));
    // mood
    const m = MOODS.find(x => bpm < x.until);
    if (m && moodEl.textContent !== m.label) {
      moodEl.textContent = m.label;
      moodEl.className = 'mood ' + m.cls;
    }
  }

  function clickHeart(x, y) {
    bpm = Math.min(BPM_MAX, bpm + PER_CLICK);
    applyBpm();
    wrap.classList.remove('click-pop');
    void wrap.offsetWidth;
    wrap.classList.add('click-pop');
    spawnSparks(x, y);
    clickSfx();
  }

  wrap.addEventListener('click', (e) => {
    audio();
    const r = wrap.getBoundingClientRect();
    clickHeart(e.clientX - r.left, e.clientY - r.top);
  });
  addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      audio();
      const r = wrap.getBoundingClientRect();
      clickHeart(r.width / 2 + (Math.random()-0.5)*60, r.height / 2 + (Math.random()-0.5)*60);
    }
  });

  // === sparks ===
  function spawnSparks(x, y) {
    const n = 6 + Math.floor(Math.random() * 5);
    for (let i = 0; i < n; i++) {
      const sp = document.createElement('div');
      sp.className = 'spark';
      sp.style.left = x + 'px';
      sp.style.top = y + 'px';
      sp.style.setProperty('--dx', ((Math.random() - 0.5) * 120) + 'px');
      sp.style.setProperty('--dy', (-30 - Math.random() * 80) + 'px');
      wrap.appendChild(sp);
      setTimeout(() => sp.remove(), 900);
    }
  }

  // === decay loop ===
  let lastTime = performance.now();
  function tick(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    if (bpm > BPM_BASE) {
      bpm = Math.max(BPM_BASE, bpm - DECAY_PER_SEC * dt);
      applyBpm();
    }
    // beat events for audio thump
    const beatSec = 60 / bpm;
    if ((now - lastBeatAt) / 1000 >= beatSec) {
      lastBeatAt = now;
      thumpSfx();
    }
    requestAnimationFrame(tick);
  }
  applyBpm();
  requestAnimationFrame(tick);

  // === audio ===
  let audioCtx = null, master = null, muted = true;
  function audio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      master = audioCtx.createGain();
      master.gain.value = 0.32;
      master.connect(audioCtx.destination);
      muted = false;
      document.getElementById('bMute').textContent = '♪ off';
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function thumpSfx() {
    if (muted || !audioCtx) return;
    const ac = audioCtx;
    const t = ac.currentTime;
    // double thump (lub-dub) — only emit on the lub
    const o = ac.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(80, t);
    o.frequency.exponentialRampToValueAtTime(35, t + 0.15);
    const g = ac.createGain();
    const intensity = 0.18 + 0.4 * ((bpm - BPM_BASE) / (BPM_MAX - BPM_BASE));
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(intensity, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.2);
    // dub — fainter, 80ms later
    const o2 = ac.createOscillator(); o2.type = 'sine';
    o2.frequency.setValueAtTime(96, t + 0.09);
    o2.frequency.exponentialRampToValueAtTime(48, t + 0.22);
    const g2 = ac.createGain();
    g2.gain.setValueAtTime(0.001, t + 0.09);
    g2.gain.exponentialRampToValueAtTime(intensity * 0.55, t + 0.095);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.24);
    o2.connect(g2); g2.connect(master);
    o2.start(t + 0.09); o2.stop(t + 0.26);
  }
  function clickSfx() {
    if (muted || !audioCtx) return;
    const ac = audioCtx;
    const t = ac.currentTime;
    const o = ac.createOscillator(); o.type = 'triangle';
    const f = 320 + Math.random() * 80 + (bpm - BPM_BASE) * 1.5;
    o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(f * 1.6, t + 0.08);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.08, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.14);
  }
  document.getElementById('bMute').addEventListener('click', () => {
    if (muted) {
      audio();   // also unmutes
    } else {
      muted = true;
      document.getElementById('bMute').textContent = '♪ on';
    }
  });
})();
</script>
</body>
</html>
