<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>3D Pipes</title>
<meta name="description" content="A faithful clone of the 1995 Windows 3D Pipes screensaver. Brass, copper, and chrome tubing winds through space.">
<meta property="og:title" content="3D Pipes">
<meta property="og:description" content="A faithful clone of the 1995 Windows 3D Pipes screensaver. Brass, copper, and chrome tubing winds through space.">
<meta property="og:url" content="https://sloppy.live/3d-pipes">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Classic%20Windows%2095%203D%20Pipes%20screensaver%20with%20brass%20copper%20and%20chrome%20tubing%20winding%20through%20black%20space%2C%20metallic%20joint%20spheres%2C%20retro%20OpenGL%20aesthetic%2C%20nostalgic%20CRT%20cabinet%20vibe?width=1200&height=630&model=flux&nologo=true&seed=1995">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%AA%88">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a14;
    --paper:#e8e0c8;
    --ink-3:#7a7280;
    --brass:#d8a648;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{
    width:100%; height:100dvh;
    background:var(--bg);
    color:var(--paper);
    font-family:'IBM Plex Mono', monospace;
    overflow:hidden;
    touch-action:none;
  }

  #stage{
    position:fixed;
    inset:0;
  }
  canvas{ display:block; }

  /* CRT scanline overlay — keep it light so the metal still reads */
  .scan{
    position:fixed; inset:0;
    pointer-events:none;
    z-index:5;
    background-image: repeating-linear-gradient(180deg,
      transparent 0 2px,
      rgba(0,0,0,0.10) 2px 3px);
    opacity:0.6;
    mix-blend-mode: multiply;
  }
  .vignette{
    position:fixed; inset:0;
    pointer-events:none;
    z-index:6;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
  }

  /* ── Watermark + tiny control toggle ── */
  .branding{
    position: fixed;
    bottom: 0.8rem;
    left: 1rem;
    z-index: 10;
    pointer-events: none;
    font-family:'Press Start 2P', monospace;
    font-size: 0.7rem;
    color: rgba(216, 166, 72, 0.55);
    letter-spacing: 0.12em;
    text-shadow: 0 0 6px rgba(216, 166, 72, 0.3);
  }
  .branding .sub{
    display: block;
    font-family:'VT323', monospace;
    font-size: 1rem;
    color: rgba(232, 224, 200, 0.4);
    margin-top: 0.2rem;
    letter-spacing: 0.18em;
  }

  /* ── Settings panel (auto-hides) ── */
  .panel{
    position: fixed;
    top: 0.8rem;
    right: 0.8rem;
    z-index: 10;
    background: rgba(15, 10, 30, 0.78);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(216, 166, 72, 0.35);
    border-radius: 4px;
    padding: 0.6rem 0.8rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--paper);
    font-size: 0.78rem;
    box-shadow: 0 4px 18px rgba(0,0,0,0.5);
    transition: opacity 0.3s ease, transform 0.3s ease;
    min-width: 14rem;
  }
  .panel.hidden{ opacity: 0; transform: translateX(20px); pointer-events: none; }
  .panel-head{
    font-family: 'Press Start 2P', monospace;
    font-size: 0.62rem;
    color: var(--brass);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid rgba(216, 166, 72, 0.25);
  }
  .panel .row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
    margin-bottom: 0.45rem;
  }
  .panel label{
    font-family: 'VT323', monospace;
    font-size: 1rem;
    color: rgba(232, 224, 200, 0.85);
    letter-spacing: 0.05em;
  }
  .panel input[type="range"]{
    -webkit-appearance: none;
    width: 6.5rem;
    height: 3px;
    background: rgba(216, 166, 72, 0.3);
    border-radius: 99px;
    outline: none;
  }
  .panel input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--brass);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(216,166,72,0.6);
    cursor: pointer;
  }
  .panel input[type="range"]::-moz-range-thumb{
    width: 12px; height: 12px;
    background: var(--brass); border-radius: 50%;
    border: none; cursor: pointer;
    box-shadow: 0 0 6px rgba(216,166,72,0.6);
  }
  .panel .v{ color: var(--brass); font-family: 'IBM Plex Mono', monospace; min-width: 2.5rem; text-align: right; }
  .panel .actions{
    display: flex;
    gap: 0.35rem;
    margin-top: 0.5rem;
    flex-wrap: wrap;
  }
  .panel button{
    flex: 1;
    background: transparent;
    color: var(--paper);
    border: 1px solid rgba(216, 166, 72, 0.5);
    padding: 0.35rem 0.6rem;
    font-family: 'VT323', monospace;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    border-radius: 3px;
    cursor: pointer;
    min-height: 1.9rem;
  }
  .panel button:hover{ background: rgba(216, 166, 72, 0.1); }
  .panel button:focus-visible{ outline: 2px solid var(--brass); outline-offset: 2px; }

  /* Toggle button — always visible, tiny */
  .toggle{
    position: fixed;
    top: 0.8rem;
    left: 0.8rem;
    z-index: 11;
    background: rgba(15, 10, 30, 0.7);
    border: 1px solid rgba(216, 166, 72, 0.4);
    color: var(--brass);
    width: 2.2rem; height: 2.2rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    opacity: 0.55;
    transition: opacity 0.2s ease;
  }
  .toggle:hover{ opacity: 1; }
  .toggle:focus-visible{ outline: 2px solid var(--brass); outline-offset: 2px; }
  /* idle hide — fade out after no mouse for 4s */
  body.idle .toggle, body.idle .panel, body.idle .branding{ opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }
  body.idle .branding{ opacity: 0.4; }   /* watermark stays faintly visible */

  @media (prefers-reduced-motion: reduce){
    .panel, .toggle, body.idle *{ transition: none !important; }
  }
</style>
</head>
<body>
<div id="stage" role="application" aria-label="3D Pipes screensaver"></div>

<div class="scan" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>

<button class="toggle" id="btn-toggle" type="button" aria-label="Toggle settings">⚙</button>

<div class="panel hidden" id="panel" aria-label="Pipe controls">
  <div class="panel-head">3D Pipes · v1995</div>
  <div class="row">
    <label for="r-pipes">pipes</label>
    <input type="range" id="r-pipes" min="1" max="6" step="1" value="3">
    <span class="v" id="v-pipes">3</span>
  </div>
  <div class="row">
    <label for="r-speed">speed</label>
    <input type="range" id="r-speed" min="2" max="30" step="1" value="11">
    <span class="v" id="v-speed">11</span>
  </div>
  <div class="row">
    <label for="r-turn">turn rate</label>
    <input type="range" id="r-turn" min="10" max="80" step="5" value="35">
    <span class="v" id="v-turn">35%</span>
  </div>
  <div class="row">
    <label for="r-orbit">camera</label>
    <input type="range" id="r-orbit" min="0" max="30" step="1" value="10">
    <span class="v" id="v-orbit">10</span>
  </div>
  <div class="actions">
    <button type="button" id="btn-reset">⟲ Reset</button>
    <button type="button" id="btn-fullscreen">⛶ Fullscreen</button>
  </div>
</div>

<div class="branding">
  3D PIPES
  <span class="sub">screensaver · MMXXVI</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ════════════════════════════════════════════════════════════
   3D PIPES — faithful clone of the 1995 Windows OpenGL Pipes
   screensaver. Grid-aligned tubing winds through a 14×14×10 cell
   volume; each pipe picks random valid directions (70% biased to
   continue straight) and drops a sphere joint when it turns. When
   a pipe corners out, a new one spawns elsewhere. Periodic full
   reset clears the volume so it doesn't fill up forever.
   ──────────────────────────────────────────────────────────── */

const stage = document.getElementById('stage');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a14);
scene.fog = new THREE.Fog(0x0a0a14, 18, 50);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
stage.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Lighting ── soft ambient + a directional sun + a coloured fill
scene.add(new THREE.AmbientLight(0xffffff, 0.40));
const sun = new THREE.DirectionalLight(0xfff0d8, 0.95);
sun.position.set(10, 12, 6);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x6688ff, 0.30);
fill.position.set(-8, -5, -8);
scene.add(fill);

/* ── Grid + occupancy ── pipes are aligned to a discrete grid.
   Each cell is 1 unit. Volume is 14×14×10 cells, centered at origin. */
const GRID = { x: 14, y: 14, z: 10 };
function inBounds(p){
  return p.x >= 0 && p.x < GRID.x && p.y >= 0 && p.y < GRID.y && p.z >= 0 && p.z < GRID.z;
}
const occupied = new Set();
function key(p){ return p.x + ',' + p.y + ',' + p.z; }

/* ── Procedural metallic materials ──
   Six classic-screensaver metal hues. MeshPhongMaterial with high
   specular gives the brushed-OpenGL-1995 vibe without textures. */
const METALS = [
  { name:'brass',   color:0xd8a648, specular:0xfff2c0, shininess:90,  emissive:0x1a1408 },
  { name:'copper',  color:0xc46028, specular:0xffc090, shininess:80,  emissive:0x1a0a04 },
  { name:'chrome',  color:0xc8d4e0, specular:0xffffff, shininess:120, emissive:0x0a0e12 },
  { name:'gunmetal',color:0x506068, specular:0xa8b8c0, shininess:60,  emissive:0x080808 },
  { name:'bronze',  color:0xa07030, specular:0xe0c080, shininess:75,  emissive:0x100804 },
  { name:'rosegold',color:0xe8a890, specular:0xffd8c8, shininess:100, emissive:0x180c08 },
];
const MATERIALS = METALS.map(m => new THREE.MeshPhongMaterial({
  color: m.color, specular: m.specular, shininess: m.shininess, emissive: m.emissive,
}));

// Shared cylinder + sphere geometries so we don't allocate per-segment
const CYL_RADIUS = 0.22;
const cylinderGeo = new THREE.CylinderGeometry(CYL_RADIUS, CYL_RADIUS, 1, 14, 1, false);
// rotate so cylinder default axis (Y) aligns to whatever direction we set
const sphereGeo = new THREE.SphereGeometry(CYL_RADIUS * 1.45, 16, 12);

// World group — single root we can wipe on reset
let world = new THREE.Group();
scene.add(world);

/* Convert grid cell coords (0..GRID.x-1 etc) to world space (centered) */
function cellToWorld(p){
  return new THREE.Vector3(
    p.x - (GRID.x - 1) / 2,
    p.y - (GRID.y - 1) / 2,
    p.z - (GRID.z - 1) / 2
  );
}

/* ── Pipe state ──
   Each pipe walks the grid one cell per tick. dir is a unit
   direction vector (one of 6 cardinals). When direction changes,
   we drop a sphere joint at the turn. */
const DIRS = [
  { x: 1, y: 0, z: 0 }, { x:-1, y: 0, z: 0 },
  { x: 0, y: 1, z: 0 }, { x: 0, y:-1, z: 0 },
  { x: 0, y: 0, z: 1 }, { x: 0, y: 0, z:-1 },
];

const pipes = [];
let totalCells = 0;
let totalSegs = 0;
const settings = {
  pipeCount: 3,
  speedHz: 11,        // cell extensions per second per pipe
  turnRate: 35,       // percent chance of turning at each step
  orbitRate: 10,      // 0-30, camera orbit speed (degrees/sec at 10 = 1deg/sec)
  resetCellThreshold: 0.55,  // fraction of volume filled before full reset
};

function spawnPipe(){
  // pick a random unoccupied starting cell
  let start = null;
  for (let tries = 0; tries < 200; tries++){
    const p = {
      x: Math.floor(Math.random() * GRID.x),
      y: Math.floor(Math.random() * GRID.y),
      z: Math.floor(Math.random() * GRID.z),
    };
    if (!occupied.has(key(p))){ start = p; break; }
  }
  if (!start) return null;
  occupied.add(key(start));
  totalCells++;
  const matIdx = Math.floor(Math.random() * MATERIALS.length);
  const dir = DIRS[Math.floor(Math.random() * DIRS.length)];
  // initial joint sphere
  addJoint(start, matIdx);
  return { pos: start, dir, mat: matIdx, alive: true, accum: 0 };
}

function addJoint(p, matIdx){
  const m = new THREE.Mesh(sphereGeo, MATERIALS[matIdx]);
  m.position.copy(cellToWorld(p));
  world.add(m);
  totalSegs++;
}
function addSegment(a, b, matIdx){
  // cylinder between cells a and b
  const wa = cellToWorld(a), wb = cellToWorld(b);
  const mid = new THREE.Vector3().addVectors(wa, wb).multiplyScalar(0.5);
  const dirVec = new THREE.Vector3().subVectors(wb, wa);
  const len = dirVec.length();
  const m = new THREE.Mesh(cylinderGeo, MATERIALS[matIdx]);
  m.position.copy(mid);
  m.scale.y = len;
  // align cylinder's Y axis with dirVec
  const up = new THREE.Vector3(0, 1, 0);
  const axis = new THREE.Vector3().crossVectors(up, dirVec).normalize();
  const angle = Math.acos(THREE.MathUtils.clamp(up.dot(dirVec) / len, -1, 1));
  if (axis.lengthSq() > 0.0001) m.quaternion.setFromAxisAngle(axis, angle);
  world.add(m);
  totalSegs++;
}

function extendPipe(p){
  // try to continue in current direction first (with turnRate% chance of
  // turning anyway), fall back to random valid direction
  const turnChance = settings.turnRate / 100;
  let candidates = [];
  if (Math.random() > turnChance){
    // try to go straight
    const next = { x: p.pos.x + p.dir.x, y: p.pos.y + p.dir.y, z: p.pos.z + p.dir.z };
    if (inBounds(next) && !occupied.has(key(next))){
      occupied.add(key(next));
      addSegment(p.pos, next, p.mat);
      p.pos = next;
      totalCells++;
      return true;
    }
  }
  // shuffled directions excluding the reverse of current dir
  const opts = DIRS.filter(d => !(d.x === -p.dir.x && d.y === -p.dir.y && d.z === -p.dir.z));
  for (let i = opts.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  for (const d of opts){
    const next = { x: p.pos.x + d.x, y: p.pos.y + d.y, z: p.pos.z + d.z };
    if (!inBounds(next) || occupied.has(key(next))) continue;
    // direction changed → drop a joint sphere at the corner
    if (d.x !== p.dir.x || d.y !== p.dir.y || d.z !== p.dir.z){
      addJoint(p.pos, p.mat);
    }
    occupied.add(key(next));
    addSegment(p.pos, next, p.mat);
    p.pos = next;
    p.dir = d;
    totalCells++;
    return true;
  }
  // no valid direction — pipe terminates with a final joint
  addJoint(p.pos, p.mat);
  return false;
}

function fullReset(){
  // remove world group + start a fresh one
  scene.remove(world);
  // dispose meshes' materials? Shared, so don't dispose materials.
  // Each mesh's geometry is also shared — no per-mesh allocation, so
  // just letting the GC reclaim the group is enough.
  world = new THREE.Group();
  scene.add(world);
  occupied.clear();
  totalCells = 0;
  totalSegs = 0;
  pipes.length = 0;
  // seed N pipes
  for (let i = 0; i < settings.pipeCount; i++){
    const p = spawnPipe();
    if (p) pipes.push(p);
  }
}
fullReset();

/* ── Camera orbit — slow rotation around the centre ── */
const cam = { theta: Math.PI / 4, phi: Math.PI / 4 * 1.2, radius: 26 };
function applyCam(){
  const r = cam.radius;
  camera.position.x = r * Math.sin(cam.phi) * Math.cos(cam.theta);
  camera.position.y = r * Math.cos(cam.phi);
  camera.position.z = r * Math.sin(cam.phi) * Math.sin(cam.theta);
  camera.lookAt(0, 0, 0);
}
applyCam();

/* ── Main loop ── */
let lastT = performance.now();
let stepAccum = 0;
function frame(now){
  const dt = Math.min(0.1, (now - lastT) / 1000);
  lastT = now;
  // camera drift
  cam.theta += (settings.orbitRate / 10) * 0.1 * dt;
  cam.phi += Math.sin(now * 0.00015) * 0.0008;
  cam.phi = Math.max(0.4, Math.min(Math.PI - 0.4, cam.phi));
  applyCam();

  // pipe stepping — Hz throttles per-pipe extension rate
  stepAccum += dt;
  const stepInterval = 1 / settings.speedHz;
  while (stepAccum >= stepInterval){
    stepAccum -= stepInterval;
    for (let i = pipes.length - 1; i >= 0; i--){
      const p = pipes[i];
      if (!extendPipe(p)){
        pipes.splice(i, 1);
        // spawn replacement to keep the world moving
        const n = spawnPipe();
        if (n) pipes.push(n);
      }
    }
    // periodic full reset when the volume gets crowded — classic 1995
    // behaviour: it would dramatically wipe and start over
    const cap = GRID.x * GRID.y * GRID.z;
    if (totalCells / cap > settings.resetCellThreshold){
      fullReset();
    }
  }

  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ── UI ── */
const panel = document.getElementById('panel');
const btnToggle = document.getElementById('btn-toggle');
btnToggle.addEventListener('click', () => panel.classList.toggle('hidden'));

function wireRange(id, varKey, suffix){
  const el = document.getElementById('r-' + id);
  const out = document.getElementById('v-' + id);
  el.addEventListener('input', () => {
    settings[varKey] = +el.value;
    out.textContent = el.value + (suffix || '');
  });
  out.textContent = el.value + (suffix || '');
}
wireRange('pipes', 'pipeCount');
wireRange('speed', 'speedHz');
wireRange('turn',  'turnRate', '%');
wireRange('orbit', 'orbitRate');
document.getElementById('btn-reset').addEventListener('click', fullReset);
document.getElementById('btn-fullscreen').addEventListener('click', () => {
  if (!document.fullscreenElement){
    document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen && document.exitFullscreen();
  }
});
document.getElementById('r-pipes').addEventListener('change', () => {
  // grow or trim active pipe count
  while (pipes.length < settings.pipeCount){
    const p = spawnPipe();
    if (!p) break;
    pipes.push(p);
  }
  pipes.length = Math.min(pipes.length, settings.pipeCount);
});

/* Idle-fade the controls so the screen really screensavers itself */
let idleTimer = null;
function bumpIdle(){
  document.body.classList.remove('idle');
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => document.body.classList.add('idle'), 4000);
}
window.addEventListener('pointermove', bumpIdle);
window.addEventListener('pointerdown', bumpIdle);
window.addEventListener('keydown', bumpIdle);
bumpIdle();
</script>
</body>
</html>
