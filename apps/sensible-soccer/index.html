<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sensible Soccer</title>
    <link rel="icon" href="https://emojicdn.elk.sh/⚽">

    <!-- OG Tags -->
    <meta property="og:title" content="Sensible Soccer">
    <meta property="og:description" content="Classic top-down arcade football. Score goals, beat the AI!">
    <meta property="og:url" content="https://app.sloppy.live/sensible-soccer">
    <meta property="og:image" content="https://image.pollinations.ai/prompt/retro%20pixel%20art%20soccer%20game%20top%20down%20view%20green%20pitch%20red%20vs%20blue%20players%2016bit%20style?width=1200&height=630&nologo=true&referrer=sloppy.live">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pitch-green: #2d8a2d;
            --pitch-light: #3da03d;
            --team-red: #e63946;
            --team-blue: #457b9d;
            --ball-white: #f1faee;
            --ui-dark: #1d3557;
            --gold: #ffd700;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .scoreboard {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px 30px;
            background: var(--ui-dark);
            border-radius: 8px;
            border: 3px solid var(--gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .team-score {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-label {
            font-size: 10px;
            text-transform: uppercase;
        }

        .team-label.red { color: var(--team-red); }
        .team-label.blue { color: var(--team-blue); }

        .score {
            font-size: 24px;
            color: var(--gold);
            min-width: 40px;
            text-align: center;
        }

        .timer {
            font-size: 14px;
            color: #fff;
            padding: 0 15px;
            border-left: 2px solid #333;
            border-right: 2px solid #333;
        }

        #gameCanvas {
            border: 4px solid #fff;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .controls-info {
            font-size: 8px;
            color: #888;
            text-align: center;
            margin-top: 10px;
        }

        .goal-flash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold);
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }

        .goal-flash.show {
            animation: goalFlash 1.5s ease-out;
        }

        @keyframes goalFlash {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }

        .start-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            z-index: 200;
        }

        .start-screen h1 {
            font-size: clamp(20px, 5vw, 36px);
            color: var(--gold);
            text-shadow: 3px 3px 0 var(--team-red);
            text-align: center;
            line-height: 1.5;
        }

        .start-screen .ball-icon {
            font-size: 64px;
            animation: bounce 0.6s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        .start-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            padding: 15px 40px;
            background: var(--pitch-green);
            color: white;
            border: 3px solid var(--gold);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .start-btn:hover {
            background: var(--pitch-light);
            transform: scale(1.05);
        }

        .start-controls {
            font-size: 8px;
            color: #888;
            text-align: center;
            line-height: 2;
        }

        .mobile-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 50;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 2px;
        }

        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            font-size: 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }

        .dpad-btn.empty {
            background: transparent;
            border: none;
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .action-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: white;
            border: 3px solid rgba(255,255,255,0.5);
            user-select: none;
            -webkit-user-select: none;
        }

        .kick-btn {
            background: var(--team-red);
        }

        .shoot-btn {
            background: var(--team-blue);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
            }
            .controls-info {
                display: none;
            }
        }


        /* ── Team picker (start-screen additions) ── */
        .picker-block{
            display:flex; flex-direction:column; gap:14px;
            margin:14px 0 18px; align-items:center;
            font-family:'Press Start 2P', monospace;
        }
        .picker-row{
            display:flex; flex-direction:column; gap:6px;
            align-items:center;
        }
        .picker-label{
            font-size:9px; letter-spacing:0.18em; opacity:0.75;
        }
        .picker-teams{
            display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
            max-width:520px;
        }
        .team-chip{
            background:transparent;
            border:2px solid rgba(255,255,255,0.25);
            color:#fff; cursor:pointer;
            font-family:'Press Start 2P', monospace;
            font-size:10px; letter-spacing:0.05em;
            padding:8px 10px; border-radius:4px;
            display:inline-flex; align-items:center; gap:6px;
            min-height:36px;
            transition:transform 0.12s, border-color 0.12s, box-shadow 0.12s;
        }
        .team-chip:hover{transform:translateY(-1px); border-color:rgba(255,255,255,0.55)}
        .team-chip[aria-pressed="true"]{
            border-color:#fff;
            box-shadow:0 0 0 2px rgba(255,255,255,0.12), 0 4px 0 rgba(0,0,0,0.25);
            transform:translateY(-1px);
        }
        .team-chip .flag{font-size:18px}
        .team-chip .kit{
            display:inline-block; width:14px; height:14px;
            border:1px solid rgba(0,0,0,0.4); border-radius:2px;
            background:linear-gradient(135deg, var(--c1) 50%, var(--c2) 50%);
        }
        .difficulty-row{
            display:flex; gap:6px; justify-content:center;
        }
        .diff-chip{
            background:transparent;
            border:2px solid rgba(255,255,255,0.25);
            color:#fff; cursor:pointer;
            font-family:'Press Start 2P', monospace;
            font-size:9px; letter-spacing:0.12em;
            padding:8px 14px; border-radius:4px; min-height:34px;
        }
        .diff-chip[aria-pressed="true"]{
            border-color:#f1c40f; color:#f1c40f;
            box-shadow:0 0 0 2px rgba(241,196,15,0.18);
        }
        .diff-chip:focus-visible, .team-chip:focus-visible{
            outline:2px solid #f1c40f; outline-offset:2px;
        }
        @media (max-width: 540px){
            .team-chip{font-size:8px; padding:6px 8px}
            .picker-teams{max-width:100%}
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <div class="ball-icon">⚽</div>
        <h1>SENSIBLE<br>SOCCER</h1>
        <div class="picker-block">
            <div class="picker-row">
                <div class="picker-label">YOUR TEAM</div>
                <div class="picker-teams" id="homePicker" role="radiogroup" aria-label="Choose your team"></div>
            </div>
            <div class="picker-row">
                <div class="picker-label">OPPONENT</div>
                <div class="picker-teams" id="awayPicker" role="radiogroup" aria-label="Choose opponent team"></div>
            </div>
            <div class="picker-row">
                <div class="picker-label">DIFFICULTY</div>
                <div class="difficulty-row" id="diffPicker" role="radiogroup" aria-label="Difficulty">
                    <button class="diff-chip" type="button" data-diff="easy">EASY</button>
                    <button class="diff-chip" type="button" data-diff="normal" aria-pressed="true">NORMAL</button>
                    <button class="diff-chip" type="button" data-diff="hard">HARD</button>
                </div>
            </div>
        </div>
        <button class="start-btn" onclick="startGame()">KICK OFF!</button>
        <div class="start-controls">
            ARROW KEYS / WASD - MOVE<br>
            SPACE - KICK / TACKLE<br>
            SHIFT - SHOOT (POWER)<br>
            HOLD A DIRECTION AFTER A KICK = CURVE THE BALL
        </div>
    </div>

    <div class="game-container">
        <div class="scoreboard">
            <div class="team-score">
                <span class="team-label red">RED</span>
                <span class="score" id="scoreRed">0</span>
            </div>
            <div class="timer" id="timer">90:00</div>
            <div class="team-score">
                <span class="score" id="scoreBlue">0</span>
                <span class="team-label blue">BLUE</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="controls-info">
            ARROWS/WASD: Move | SPACE: Kick/Tackle | SHIFT: Power Shot
        </div>
    </div>

    <div class="goal-flash" id="goalFlash">GOAL!</div>

    <div class="mobile-controls">
        <div class="dpad">
            <div class="dpad-btn empty"></div>
            <div class="dpad-btn" data-dir="up">▲</div>
            <div class="dpad-btn empty"></div>
            <div class="dpad-btn" data-dir="left">◄</div>
            <div class="dpad-btn empty"></div>
            <div class="dpad-btn" data-dir="right">►</div>
            <div class="dpad-btn empty"></div>
            <div class="dpad-btn" data-dir="down">▼</div>
            <div class="dpad-btn empty"></div>
        </div>
        <div class="action-btns">
            <button class="action-btn kick-btn" id="kickBtn">KICK</button>
            <button class="action-btn shoot-btn" id="shootBtn">SHOT</button>
        </div>
    </div>
<script>
        // ══════════════════════════════════════════════════════════════════
        // Teams, difficulty, audio — added on top of the original engine
        // so the existing redTeam/blueTeam arrays + AI loop keep working as
        // before, just with skinnable colours and proper crowd atmosphere.
        // ══════════════════════════════════════════════════════════════════

        const TEAMS = [
            { id: 'red',    name: 'IBERIA',    flag: '🇪🇸', color: '#e63946', c2: '#1d3557' },
            { id: 'azul',   name: 'AZUL',      flag: '🇫🇷', color: '#457b9d', c2: '#1d3557' },
            { id: 'verde',  name: 'VERDE',     flag: '🇮🇪', color: '#2a9d8f', c2: '#264653' },
            { id: 'gialli', name: 'GIALLI',    flag: '🇮🇹', color: '#f4a261', c2: '#000000' },
            { id: 'kuro',   name: 'KURO',      flag: '🇯🇵', color: '#222222', c2: '#e63946' },
            { id: 'roxo',   name: 'ROXO',      flag: '🇧🇷', color: '#7b2cbf', c2: '#ffd166' }
        ];
        const teams = { home: TEAMS[0], away: TEAMS[1] };
        const DIFFICULTY = { easy: 0.6, normal: 0.85, hard: 1.05 };
        let difficulty = 'normal';

        // ── Audio engine (Web Audio synth — no samples needed) ──
        let actx = null;
        let crowdGain = null;
        let crowdStarted = false;
        function ensureAudio(){
            if (actx) return actx;
            try {
                actx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(_){}
            return actx;
        }
        function startCrowd(){
            if (!actx || crowdStarted) return;
            crowdStarted = true;
            // Pink-ish noise loop for ambient crowd murmur
            const bufSize = actx.sampleRate * 2;
            const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
            const ch = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++){
                // Soft 1/f-ish noise with random walk
                ch[i] = (Math.random() * 2 - 1) * 0.6 + (i > 0 ? ch[i-1] * 0.35 : 0);
            }
            const src = actx.createBufferSource();
            src.buffer = buf; src.loop = true;
            const bp = actx.createBiquadFilter();
            bp.type = 'bandpass'; bp.frequency.value = 700; bp.Q.value = 0.7;
            crowdGain = actx.createGain();
            crowdGain.gain.value = 0;
            crowdGain.gain.linearRampToValueAtTime(0.045, actx.currentTime + 1.5);
            src.connect(bp); bp.connect(crowdGain); crowdGain.connect(actx.destination);
            src.start();
        }
        function crowdSwell(amount, dur){
            if (!crowdGain) return;
            const t = actx.currentTime;
            const base = 0.045;
            crowdGain.gain.cancelScheduledValues(t);
            crowdGain.gain.setValueAtTime(crowdGain.gain.value, t);
            crowdGain.gain.linearRampToValueAtTime(base + amount, t + 0.1);
            crowdGain.gain.linearRampToValueAtTime(base, t + dur);
        }
        function playKick(power){
            ensureAudio(); if (!actx) return;
            if (actx.state === 'suspended') actx.resume();
            const t = actx.currentTime;
            // Low thump
            const o = actx.createOscillator();
            const g = actx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(180, t);
            o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
            const vol = 0.18 + (power || 0) * 0.025;
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(vol, t + 0.005);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
            o.connect(g); g.connect(actx.destination);
            o.start(t); o.stop(t + 0.22);
            // Plus a short noise tick for the "thwack"
            const nBuf = actx.createBuffer(1, actx.sampleRate * 0.05, actx.sampleRate);
            const d = nBuf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
            const nSrc = actx.createBufferSource();
            nSrc.buffer = nBuf;
            const nFilt = actx.createBiquadFilter();
            nFilt.type = 'highpass'; nFilt.frequency.value = 1800;
            const nG = actx.createGain();
            nG.gain.setValueAtTime(0.12, t);
            nG.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
            nSrc.connect(nFilt); nFilt.connect(nG); nG.connect(actx.destination);
            nSrc.start(t);
        }
        function playWhistle(kind){
            ensureAudio(); if (!actx) return;
            if (actx.state === 'suspended') actx.resume();
            const t = actx.currentTime;
            // Two short pips for kickoff, one long for goal/end
            const pulses = kind === 'kickoff' ? [{at:0, dur:0.10}, {at:0.18, dur:0.10}]
                        : kind === 'goal'    ? [{at:0, dur:0.18}]
                        :                       [{at:0, dur:0.55}]; // full-time
            pulses.forEach(p => {
                const o = actx.createOscillator();
                const g = actx.createGain();
                o.type = 'sine';
                // Slight wobble for whistle character
                o.frequency.setValueAtTime(2500, t + p.at);
                o.frequency.linearRampToValueAtTime(2350, t + p.at + p.dur);
                g.gain.setValueAtTime(0, t + p.at);
                g.gain.linearRampToValueAtTime(0.18, t + p.at + 0.01);
                g.gain.setValueAtTime(0.18, t + p.at + p.dur - 0.02);
                g.gain.linearRampToValueAtTime(0, t + p.at + p.dur);
                o.connect(g); g.connect(actx.destination);
                o.start(t + p.at); o.stop(t + p.at + p.dur + 0.02);
            });
        }
        function playGoalOrgan(){
            ensureAudio(); if (!actx) return;
            const t = actx.currentTime;
            // Ascending major arp: C5 E5 G5 C6, organ-y triangle stack
            [523, 659, 784, 1047].forEach((freq, i) => {
                const tt = t + i * 0.12;
                ['triangle','sine'].forEach((wave, w) => {
                    const o = actx.createOscillator();
                    const g = actx.createGain();
                    o.type = wave;
                    o.frequency.value = freq * (w === 1 ? 2 : 1);
                    g.gain.setValueAtTime(0, tt);
                    g.gain.linearRampToValueAtTime(w === 1 ? 0.06 : 0.13, tt + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, tt + 0.7);
                    o.connect(g); g.connect(actx.destination);
                    o.start(tt); o.stop(tt + 0.75);
                });
            });
        }

        // ── Team picker wiring (runs immediately) ──
        function buildPicker(elId, side){
            const el = document.getElementById(elId);
            el.innerHTML = TEAMS.map(t => {
                const pressed = (teams[side].id === t.id) ? 'true' : 'false';
                return `<button class="team-chip" type="button" role="radio"
                          data-team="${t.id}" aria-pressed="${pressed}"
                          style="--c1:${t.color}; --c2:${t.c2}">
                          <span class="flag">${t.flag}</span>
                          <span class="kit" aria-hidden="true"></span>
                          ${t.name}
                        </button>`;
            }).join('');
            el.querySelectorAll('.team-chip').forEach(b => {
                b.addEventListener('click', () => {
                    const t = TEAMS.find(x => x.id === b.dataset.team);
                    if (!t) return;
                    // Don't allow both teams to be the same
                    const other = side === 'home' ? 'away' : 'home';
                    if (teams[other].id === t.id){
                        // Swap to avoid identical kits
                        const oldHome = teams.home, oldAway = teams.away;
                        teams[side] = t;
                        teams[other] = (side === 'home') ? oldHome : oldAway;
                        buildPicker('homePicker', 'home');
                        buildPicker('awayPicker', 'away');
                    } else {
                        teams[side] = t;
                        el.querySelectorAll('.team-chip').forEach(x =>
                            x.setAttribute('aria-pressed', x.dataset.team === t.id ? 'true' : 'false'));
                    }
                    // Live-update score labels colour
                    syncTeamColors();
                });
            });
        }
        function buildDiffPicker(){
            const el = document.getElementById('diffPicker');
            el.querySelectorAll('.diff-chip').forEach(b => {
                b.addEventListener('click', () => {
                    difficulty = b.dataset.diff;
                    el.querySelectorAll('.diff-chip').forEach(x =>
                        x.setAttribute('aria-pressed', x.dataset.diff === difficulty ? 'true' : 'false'));
                });
            });
        }
        function syncTeamColors(){
            const redLabel = document.querySelector('.team-label.red');
            const blueLabel = document.querySelector('.team-label.blue');
            if (redLabel){ redLabel.style.color = teams.home.color; redLabel.textContent = teams.home.name; }
            if (blueLabel){ blueLabel.style.color = teams.away.color; blueLabel.textContent = teams.away.name; }
        }
        // Wire on DOM ready (script runs after body so elements exist)
        buildPicker('homePicker', 'home');
        buildPicker('awayPicker', 'away');
        buildDiffPicker();
        syncTeamColors();

        // ── Aftertouch state ── time-windowed influence on the ball after a kick
        let aftertouchUntil = 0;
        function nowSec(){ return performance.now() / 1000; }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Responsive canvas sizing
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 600);
            const maxHeight = Math.min(window.innerHeight - 200, 400);
            const ratio = 3 / 2;

            if (maxWidth / ratio <= maxHeight) {
                canvas.width = maxWidth;
                canvas.height = maxWidth / ratio;
            } else {
                canvas.height = maxHeight;
                canvas.width = maxHeight * ratio;
            }
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game state
        let gameRunning = false;
        let scoreRed = 0;
        let scoreBlue = 0;
        let gameTime = 90;
        let lastTime = 0;

        // Field dimensions (in game units)
        const FIELD = {
            width: 300,
            height: 200,
            goalWidth: 40,
            goalDepth: 10
        };

        // Ball
        const ball = {
            x: FIELD.width / 2,
            y: FIELD.height / 2,
            vx: 0,
            vy: 0,
            radius: 4,
            friction: 0.98
        };

        // Players
        const PLAYER_RADIUS = 6;
        const PLAYER_SPEED = 2;

        // Red team (player controlled, attacking right)
        const redTeam = [
            { x: 30, y: FIELD.height / 2, vx: 0, vy: 0, isGoalkeeper: true },
            { x: 70, y: 50, vx: 0, vy: 0 },
            { x: 70, y: FIELD.height - 50, vx: 0, vy: 0 },
            { x: 120, y: FIELD.height / 2, vx: 0, vy: 0 },
            { x: 170, y: 70, vx: 0, vy: 0 },
            { x: 170, y: FIELD.height - 70, vx: 0, vy: 0 }
        ];

        // Blue team (AI controlled, attacking left)
        const blueTeam = [
            { x: FIELD.width - 30, y: FIELD.height / 2, vx: 0, vy: 0, isGoalkeeper: true },
            { x: FIELD.width - 70, y: 50, vx: 0, vy: 0 },
            { x: FIELD.width - 70, y: FIELD.height - 50, vx: 0, vy: 0 },
            { x: FIELD.width - 120, y: FIELD.height / 2, vx: 0, vy: 0 },
            { x: FIELD.width - 170, y: 70, vx: 0, vy: 0 },
            { x: FIELD.width - 170, y: FIELD.height - 70, vx: 0, vy: 0 }
        ];

        // Starting positions
        const redStartPos = redTeam.map(p => ({ x: p.x, y: p.y }));
        const blueStartPos = blueTeam.map(p => ({ x: p.x, y: p.y }));

        let controlledPlayer = redTeam[3]; // Start with midfielder

        // Input state
        const keys = {
            up: false,
            down: false,
            left: false,
            right: false,
            kick: false,
            shoot: false
        };

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = true;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === ' ') { keys.kick = true; e.preventDefault(); }
            if (e.key === 'Shift') keys.shoot = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.key === ' ') keys.kick = false;
            if (e.key === 'Shift') keys.shoot = false;
        });

        // Mobile controls
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            const dir = btn.dataset.dir;
            if (!dir) return;

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[dir] = true;
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[dir] = false;
            });
        });

        document.getElementById('kickBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys.kick = true;
        });
        document.getElementById('kickBtn').addEventListener('touchend', (e) => {
            e.preventDefault();
            keys.kick = false;
        });

        document.getElementById('shootBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys.shoot = true;
        });
        document.getElementById('shootBtn').addEventListener('touchend', (e) => {
            e.preventDefault();
            keys.shoot = false;
        });

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            scoreRed = 0;
            scoreBlue = 0;
            gameTime = 90;
            resetPositions();
            ensureAudio();
            if (actx && actx.state === 'suspended') actx.resume();
            startCrowd();
            playWhistle('kickoff');
            requestAnimationFrame(gameLoop);
        }

        function resetPositions(scoringTeam = null) {
            // Reset ball
            ball.x = FIELD.width / 2;
            ball.y = FIELD.height / 2;
            ball.vx = 0;
            ball.vy = 0;

            // Reset players
            redTeam.forEach((p, i) => {
                p.x = redStartPos[i].x;
                p.y = redStartPos[i].y;
                p.vx = 0;
                p.vy = 0;
            });

            blueTeam.forEach((p, i) => {
                p.x = blueStartPos[i].x;
                p.y = blueStartPos[i].y;
                p.vx = 0;
                p.vy = 0;
            });

            controlledPlayer = redTeam[3];
        }

        function distance(a, b) {
            return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
        }

        function findClosestToBall(team) {
            let closest = team[0];
            let minDist = distance(team[0], ball);

            team.forEach(p => {
                const d = distance(p, ball);
                if (d < minDist) {
                    minDist = d;
                    closest = p;
                }
            });

            return closest;
        }

        function updateControlledPlayer() {
            let vx = 0, vy = 0;

            if (keys.up) vy = -PLAYER_SPEED;
            if (keys.down) vy = PLAYER_SPEED;
            if (keys.left) vx = -PLAYER_SPEED;
            if (keys.right) vx = PLAYER_SPEED;

            // Normalize diagonal movement
            if (vx !== 0 && vy !== 0) {
                vx *= 0.707;
                vy *= 0.707;
            }

            controlledPlayer.vx = vx;
            controlledPlayer.vy = vy;
            controlledPlayer.x += vx;
            controlledPlayer.y += vy;

            // Keep in bounds
            controlledPlayer.x = Math.max(PLAYER_RADIUS, Math.min(FIELD.width - PLAYER_RADIUS, controlledPlayer.x));
            controlledPlayer.y = Math.max(PLAYER_RADIUS, Math.min(FIELD.height - PLAYER_RADIUS, controlledPlayer.y));

            // Auto-switch to closest player when not near ball
            if (distance(controlledPlayer, ball) > 50) {
                const closest = findClosestToBall(redTeam);
                if (closest !== controlledPlayer && distance(closest, ball) < 30) {
                    controlledPlayer = closest;
                }
            }
        }

        function updateAI() {
            blueTeam.forEach((player, i) => {
                if (player.isGoalkeeper) {
                    // Goalkeeper AI - stay near goal line, follow ball Y
                    const targetY = Math.max(FIELD.height / 2 - FIELD.goalWidth / 2 + 10,
                        Math.min(FIELD.height / 2 + FIELD.goalWidth / 2 - 10, ball.y));
                    player.vy = (targetY - player.y) * 0.1;
                    player.y += player.vy;
                    return;
                }

                const distToBall = distance(player, ball);

                // Move towards ball if close, otherwise hold position
                if (distToBall < 80 || (ball.x > FIELD.width / 2 && distToBall < 120)) {
                    const angle = Math.atan2(ball.y - player.y, ball.x - player.x);
                    const sp = PLAYER_SPEED * DIFFICULTY[difficulty];
                    player.vx = Math.cos(angle) * sp;
                    player.vy = Math.sin(angle) * sp;
                } else {
                    // Drift back to starting position
                    player.vx = (blueStartPos[i].x - player.x) * 0.02;
                    player.vy = (blueStartPos[i].y - player.y) * 0.02;
                }

                player.x += player.vx;
                player.y += player.vy;

                // Keep in bounds
                player.x = Math.max(PLAYER_RADIUS, Math.min(FIELD.width - PLAYER_RADIUS, player.x));
                player.y = Math.max(PLAYER_RADIUS, Math.min(FIELD.height - PLAYER_RADIUS, player.y));
            });

            // AI kicks ball when close
            blueTeam.forEach(player => {
                if (distance(player, ball) < PLAYER_RADIUS + ball.radius + 2) {
                    // Kick towards red goal
                    const goalX = 0;
                    const goalY = FIELD.height / 2 + (Math.random() - 0.5) * FIELD.goalWidth;
                    const angle = Math.atan2(goalY - ball.y, goalX - ball.x);
                    const power = 3 + Math.random() * 2;
                    ball.vx = Math.cos(angle) * power;
                    ball.vy = Math.sin(angle) * power;
                    playKick(power);
                }
            });

            // Red team AI (non-controlled players)
            redTeam.forEach((player, i) => {
                if (player === controlledPlayer) return;

                if (player.isGoalkeeper) {
                    // Goalkeeper AI
                    const targetY = Math.max(FIELD.height / 2 - FIELD.goalWidth / 2 + 10,
                        Math.min(FIELD.height / 2 + FIELD.goalWidth / 2 - 10, ball.y));
                    player.vy = (targetY - player.y) * 0.1;
                    player.y += player.vy;
                    return;
                }

                // Drift towards ball but maintain formation
                const targetX = redStartPos[i].x + (ball.x - FIELD.width / 2) * 0.3;
                const targetY = redStartPos[i].y + (ball.y - FIELD.height / 2) * 0.3;

                player.vx = (targetX - player.x) * 0.03;
                player.vy = (targetY - player.y) * 0.03;

                player.x += player.vx;
                player.y += player.vy;
            });
        }

        function updateBall() {
            // Aftertouch — hold a movement direction during the ~0.9s after a
            // kick to subtly curve the ball mid-flight. Classic Sensible
            // Soccer signature. Effect scales with current ball speed so it
             // fades as the ball slows.
            if (nowSec() < aftertouchUntil){
                let ax = 0, ay = 0;
                if (keys.up) ay -= 1;
                if (keys.down) ay += 1;
                if (keys.left) ax -= 1;
                if (keys.right) ax += 1;
                if (ax || ay){
                    const m = Math.hypot(ax, ay);
                    const speed = Math.hypot(ball.vx, ball.vy);
                    const k = 0.05 * Math.min(1, speed / 3);
                    ball.vx += (ax / m) * k;
                    ball.vy += (ay / m) * k;
                }
            }

            ball.x += ball.vx;
            ball.y += ball.vy;

            // Friction
            ball.vx *= ball.friction;
            ball.vy *= ball.friction;

            // Bounce off top/bottom
            if (ball.y < ball.radius || ball.y > FIELD.height - ball.radius) {
                ball.vy *= -0.8;
                ball.y = Math.max(ball.radius, Math.min(FIELD.height - ball.radius, ball.y));
            }

            // Check for goals
            const goalTop = FIELD.height / 2 - FIELD.goalWidth / 2;
            const goalBottom = FIELD.height / 2 + FIELD.goalWidth / 2;

            // Left goal (blue scores)
            if (ball.x < 0 && ball.y > goalTop && ball.y < goalBottom) {
                scoreBlue++;
                showGoal();
                updateScore();
                setTimeout(() => resetPositions('blue'), 1500);
                return;
            }

            // Right goal (red scores)
            if (ball.x > FIELD.width && ball.y > goalTop && ball.y < goalBottom) {
                scoreRed++;
                showGoal();
                updateScore();
                setTimeout(() => resetPositions('red'), 1500);
                return;
            }

            // Bounce off left/right (outside goal area)
            if (ball.x < ball.radius || ball.x > FIELD.width - ball.radius) {
                ball.vx *= -0.8;
                ball.x = Math.max(ball.radius, Math.min(FIELD.width - ball.radius, ball.x));
            }

            // Player kick/tackle
            if (keys.kick || keys.shoot) {
                const dist = distance(controlledPlayer, ball);
                if (dist < PLAYER_RADIUS + ball.radius + 5) {
                    const power = keys.shoot ? 6 : 3;
                    // Kick in direction player is facing/moving
                    let angle;
                    if (controlledPlayer.vx !== 0 || controlledPlayer.vy !== 0) {
                        angle = Math.atan2(controlledPlayer.vy, controlledPlayer.vx);
                    } else {
                        // Default kick towards enemy goal
                        angle = Math.atan2(
                            FIELD.height / 2 - ball.y,
                            FIELD.width - ball.x
                        );
                    }
                    ball.vx = Math.cos(angle) * power;
                    ball.vy = Math.sin(angle) * power;
                    playKick(power);
                    aftertouchUntil = nowSec() + 0.9;
                }
            }

            // Collision with all players
            [...redTeam, ...blueTeam].forEach(player => {
                const dist = distance(player, ball);
                if (dist < PLAYER_RADIUS + ball.radius) {
                    // Push ball away
                    const angle = Math.atan2(ball.y - player.y, ball.x - player.x);
                    const overlap = PLAYER_RADIUS + ball.radius - dist;
                    ball.x += Math.cos(angle) * overlap;
                    ball.y += Math.sin(angle) * overlap;

                    // Transfer some velocity
                    ball.vx += player.vx * 0.5;
                    ball.vy += player.vy * 0.5;
                }
            });
        }

        function showGoal() {
            const flash = document.getElementById('goalFlash');
            flash.classList.remove('show');
            void flash.offsetWidth; // Trigger reflow
            flash.classList.add('show');
            playWhistle('goal');
            playGoalOrgan();
            crowdSwell(0.18, 2.2);
        }

        function updateScore() {
            document.getElementById('scoreRed').textContent = scoreRed;
            document.getElementById('scoreBlue').textContent = scoreBlue;
        }

        function updateTimer() {
            const mins = Math.floor(gameTime);
            const secs = Math.floor((gameTime % 1) * 60);
            document.getElementById('timer').textContent =
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function drawField() {
            const scaleX = canvas.width / FIELD.width;
            const scaleY = canvas.height / FIELD.height;

            // Grass stripes
            ctx.fillStyle = '#2d8a2d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#3da03d';
            const stripeWidth = canvas.width / 10;
            for (let i = 0; i < 10; i += 2) {
                ctx.fillRect(i * stripeWidth, 0, stripeWidth, canvas.height);
            }

            // Field lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.lineWidth = 2;

            // Center line
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            // Center circle
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 30 * scaleX, 0, Math.PI * 2);
            ctx.stroke();

            // Goals
            const goalTop = (FIELD.height / 2 - FIELD.goalWidth / 2) * scaleY;
            const goalBottom = (FIELD.height / 2 + FIELD.goalWidth / 2) * scaleY;
            const goalDepth = FIELD.goalDepth * scaleX;

            // Left goal
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(0, goalTop, goalDepth, goalBottom - goalTop);
            ctx.strokeRect(0, goalTop, goalDepth, goalBottom - goalTop);

            // Right goal
            ctx.fillRect(canvas.width - goalDepth, goalTop, goalDepth, goalBottom - goalTop);
            ctx.strokeRect(canvas.width - goalDepth, goalTop, goalDepth, goalBottom - goalTop);

            // Penalty areas
            ctx.strokeRect(0, canvas.height * 0.25, canvas.width * 0.15, canvas.height * 0.5);
            ctx.strokeRect(canvas.width * 0.85, canvas.height * 0.25, canvas.width * 0.15, canvas.height * 0.5);
        }

        function drawPlayer(player, color, isControlled = false) {
            const scaleX = canvas.width / FIELD.width;
            const scaleY = canvas.height / FIELD.height;
            const x = player.x * scaleX;
            const y = player.y * scaleY;
            const r = PLAYER_RADIUS * scaleX;

            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.ellipse(x + 2, y + r, r * 0.8, r * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();

            // Highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(x - r * 0.3, y - r * 0.3, r * 0.4, 0, Math.PI * 2);
            ctx.fill();

            // Selection indicator
            if (isControlled) {
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(x, y, r + 4, 0, Math.PI * 2);
                ctx.stroke();

                // Direction indicator
                if (player.vx !== 0 || player.vy !== 0) {
                    const angle = Math.atan2(player.vy, player.vx);
                    ctx.beginPath();
                    ctx.moveTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
                    ctx.lineTo(x + Math.cos(angle) * (r + 8), y + Math.sin(angle) * (r + 8));
                    ctx.stroke();
                }
            }
        }

        function drawBall() {
            const scaleX = canvas.width / FIELD.width;
            const scaleY = canvas.height / FIELD.height;
            const x = ball.x * scaleX;
            const y = ball.y * scaleY;
            const r = ball.radius * scaleX;

            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.ellipse(x + 2, y + r + 2, r * 0.8, r * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();

            // Ball
            ctx.fillStyle = '#f1faee';
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();

            // Pattern
            ctx.fillStyle = '#1d3557';
            ctx.beginPath();
            ctx.arc(x - r * 0.3, y - r * 0.2, r * 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + r * 0.3, y + r * 0.3, r * 0.25, 0, Math.PI * 2);
            ctx.fill();
        }

        function draw() {
            drawField();

            // Draw all players
            redTeam.forEach(p => drawPlayer(p, teams.home.color, p === controlledPlayer));
            blueTeam.forEach(p => drawPlayer(p, teams.away.color));

            drawBall();
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            // Update timer
            const delta = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            if (delta < 0.5) { // Avoid large jumps
                gameTime -= delta * 0.5; // Game time passes at half real time
            }

            if (gameTime <= 0) {
                gameTime = 0;
                updateTimer();
                playWhistle('full');
                crowdSwell(0.10, 3.0);
                // Game over - show result
                setTimeout(() => {
                    alert(`Full Time!\n\n${teams.home.name} ${scoreRed} - ${scoreBlue} ${teams.away.name}\n\n${
                        scoreRed > scoreBlue ? 'YOU WIN!' :
                        scoreBlue > scoreRed ? 'AI Wins!' :
                        'Draw!'
                    }`);
                    document.getElementById('startScreen').style.display = 'flex';
                    gameRunning = false;
                }, 100);
                return;
            }

            updateTimer();
            updateControlledPlayer();
            updateAI();
            updateBall();
            draw();

            requestAnimationFrame(gameLoop);
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
