<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OBJ Forge · procedural 3D generator</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%A9">
  <meta name="description" content="Sculpt a procedural 3D shape or turn an image into a heightmap, then download it as .obj or .fbx — ready for Blender and Unreal.">
  <meta property="og:title" content="OBJ Forge — procedural meshes for Blender + Unreal">
  <meta property="og:description" content="Crystals, gears, asteroids, helixes, terrain, image-heightmaps — tweak parameters, download .obj or .fbx.">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/isometric%20orange%20wireframe%20crystal%20mesh%20on%20deep%20navy%20technical%20blueprint%20grid%20CAD%20render?width=1200&height=630&seed=4242&nologo=true&model=flux">
  <meta property="og:url" content="https://sloppy.live/obj-forge">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&family=Major+Mono+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --panel: #11161e;
      --panel-2: #161c26;
      --ink: #d8e3ee;
      --dim: #6c7c8c;
      --dimmer: #455160;
      --accent: #ff7a3d;
      --accent-2: #5ee3ff;
      --line: #1f2a3a;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font: 400 0.875rem/1.4 'JetBrains Mono', monospace;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      background-image:
        repeating-linear-gradient(0deg, transparent 0 47px, rgba(94,227,255,0.025) 47px 48px),
        repeating-linear-gradient(90deg, transparent 0 47px, rgba(94,227,255,0.025) 47px 48px);
    }
    header {
      display: flex;
      align-items: baseline;
      gap: 1.25rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      flex-wrap: wrap;
    }
    header h1 {
      font: 400 1.5rem 'Major Mono Display', monospace;
      margin: 0;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    header h1 span { color: var(--ink); }
    header .sub {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0;
    }
    header .badge {
      margin-left: auto;
      color: var(--accent-2);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.25rem 0.55rem;
      border: 1px solid var(--accent-2);
    }
    main {
      display: grid;
      grid-template-columns: 19rem 1fr;
      min-height: 0;
    }
    aside.panel {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    aside.panel h2 {
      font: 500 0.65rem 'JetBrains Mono', monospace;
      color: var(--dim);
      margin: 0 0 0.5rem 0;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .shapes-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.4rem;
    }
    .shape-btn {
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--ink);
      font-family: inherit;
      padding: 0.55rem 0.25rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      min-height: 3rem;
    }
    .shape-btn:hover { background: #1d2531; border-color: #2a3648; }
    .shape-btn.active {
      background: #1a2230;
      border-color: var(--accent);
      color: var(--accent);
    }
    .shape-btn .glyph { font-size: 1.35rem; line-height: 1; }
    .shape-btn .name {
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .shape-btn.active .name { color: var(--accent); }
    /* mark the heightmap shape with an upload pip so chat can spot the image-input shape */
    .shape-btn[data-shape="heightmap"] {
      position: relative;
      border-color: rgba(94, 227, 255, 0.35);
    }
    .shape-btn[data-shape="heightmap"]::after {
      content: "↑";
      position: absolute;
      top: 0.25rem;
      right: 0.4rem;
      font-size: 0.6rem;
      line-height: 1;
      color: var(--accent-2);
      font-weight: 700;
      letter-spacing: 0;
      pointer-events: none;
    }
    .shape-btn[data-shape="heightmap"].active {
      border-color: var(--accent);
    }
    .shape-btn[data-shape="heightmap"].active::after { color: var(--accent); }
    .param {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 0.55rem;
    }
    .param .lbl {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .param .val { color: var(--accent-2); font-weight: 500; }
    .param input[type=range] {
      width: 100%;
      accent-color: var(--accent);
      min-height: 1.6rem;
      background: transparent;
    }
    /* iOS-style toggle for boolean params (replaces the old on/off slider) */
    .toggle-btn {
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--dim);
      font: 500 0.7rem 'JetBrains Mono', monospace;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.7rem;
      cursor: pointer;
      min-height: 2.25rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .toggle-btn:hover { border-color: var(--accent-2); }
    .toggle-track {
      width: 1.8rem;
      height: 0.95rem;
      background: var(--line);
      border-radius: 0.5rem;
      position: relative;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 0.1rem;
      left: 0.1rem;
      width: 0.75rem;
      height: 0.75rem;
      background: var(--dim);
      border-radius: 50%;
      transition: transform 0.18s ease, background 0.15s;
    }
    .toggle-btn.on {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(255, 122, 61, 0.06);
    }
    .toggle-btn.on .toggle-track { background: var(--accent); }
    .toggle-btn.on .toggle-track::after {
      background: #0a0e14;
      transform: translateX(0.85rem);
    }
    .toggle-label { flex: 1; text-align: right; }
    .opts {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .opts label {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.72rem;
      color: var(--ink);
      cursor: pointer;
      min-height: 1.75rem;
    }
    .opts input[type=checkbox] {
      accent-color: var(--accent-2);
      width: 1rem;
      height: 1rem;
    }
    .ghost-btn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--dim);
      font-family: inherit;
      padding: 0.45rem 0.6rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.62rem;
      min-height: 2.25rem;
      transition: color 0.12s, border-color 0.12s;
    }
    .ghost-btn:hover { color: var(--accent-2); border-color: var(--accent-2); }
    .export-actions { margin-top: auto; display: flex; gap: 0.4rem; }
    .export-actions .export-btn { flex: 1; }
    .export-btn {
      background: var(--accent);
      color: #0a0e14;
      border: none;
      font: 700 0.85rem 'JetBrains Mono', monospace;
      padding: 0.85rem 0.5rem;
      cursor: pointer;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      min-height: 2.75rem;
      transition: filter 0.12s, transform 0.06s;
    }
    .export-btn:hover { filter: brightness(1.1); }
    .export-btn:active { transform: translateY(1px); }
    .export-btn.alt { background: var(--accent-2); }
    .viewport {
      position: relative;
      background: radial-gradient(ellipse at center, #0d1320 0%, #04060a 100%);
      min-width: 0;
    }
    canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      padding: 0.5rem 0.8rem;
      background: rgba(8, 12, 18, 0.85);
      border: 1px solid var(--line);
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.05em;
      pointer-events: none;
    }
    .viewport-exports {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      z-index: 5;
    }
    .viewport-export {
      background: var(--accent);
      color: #0a0e14;
      border: none;
      font: 700 0.85rem 'JetBrains Mono', monospace;
      padding: 0.85rem 1.2rem;
      cursor: pointer;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      min-height: 2.75rem;
      box-shadow: 0 6px 20px rgba(255, 122, 61, 0.4);
      transition: filter 0.12s, transform 0.06s, box-shadow 0.2s;
    }
    .viewport-export:hover { filter: brightness(1.1); }
    .viewport-export:active { transform: translateY(1px); }
    .viewport-export.alt {
      background: var(--accent-2);
      box-shadow: 0 6px 20px rgba(94, 227, 255, 0.4);
    }
    .viewport-export.alt:hover { box-shadow: 0 10px 28px rgba(94, 227, 255, 0.55); }
    .mask-debug {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 11rem;
      padding: 0.45rem 0.5rem 0.5rem;
      background: rgba(8, 12, 18, 0.92);
      border: 1px solid #e84c3d;
      box-shadow: 0 4px 20px rgba(232, 76, 61, 0.18);
      z-index: 6;
      pointer-events: none;
      display: none;
      font-family: 'JetBrains Mono', monospace;
    }
    .mask-debug.show { display: block; }
    .mask-debug-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e84c3d;
      margin-bottom: 0.35rem;
    }
    .mask-debug-head .stat { color: var(--dim); font-size: 0.55rem; letter-spacing: 0.06em; }
    .mask-debug canvas {
      display: block;
      width: 100%;
      height: 10rem;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      border: 1px solid #1a2330;
    }
    .mask-debug-foot {
      margin-top: 0.35rem;
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      color: var(--dim);
      text-align: center;
    }
    .mask-debug-foot .swatch {
      display: inline-block;
      width: 0.55rem;
      height: 0.55rem;
      background: #e84c3d;
      vertical-align: middle;
      margin-right: 0.25rem;
    }
    .hud strong { color: var(--accent-2); font-weight: 500; }
    .hint {
      position: absolute;
      top: 1rem;
      left: 1rem;
      font-size: 0.62rem;
      color: var(--dimmer);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
    }
    .toast {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.55rem 0.85rem;
      background: rgba(255, 122, 61, 0.95);
      color: #0a0e14;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .dropzone {
      border: 1px dashed var(--line);
      padding: 0.9rem 0.7rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: var(--dim);
      line-height: 1.5;
    }
    .dropzone:hover, .dropzone.drag {
      border-color: var(--accent-2);
      background: rgba(94, 227, 255, 0.04);
      color: var(--accent-2);
    }
    .dropzone .big { display: block; font-size: 0.78rem; color: var(--ink); margin-bottom: 0.3rem; }
    .dropzone.loaded {
      border-style: solid;
      border-color: var(--accent);
      color: var(--accent);
    }
    .dropzone .file-thumb {
      width: 64px;
      height: 64px;
      margin: 0.4rem auto 0.25rem;
      object-fit: cover;
      border: 1px solid var(--line);
      display: block;
      image-rendering: pixelated;
    }
    .dropzone input[type=file] { display: none; }
    .dropzone.drag-pulse {
      border-color: var(--accent-2);
      background: rgba(94, 227, 255, 0.08);
      color: var(--accent-2);
      animation: dragPulse 1.2s ease-in-out infinite;
    }
    @keyframes dragPulse { 50% { background: rgba(94, 227, 255, 0.16); } }
    .dz-wrap { display: flex; flex-direction: column; gap: 0.4rem; }
    .dz-clear { align-self: stretch; }
    .dz-clear:hover { color: var(--accent); border-color: var(--accent); }
    *:focus-visible { outline: 2px solid var(--accent-2); outline-offset: 2px; }
    @media (max-width: 760px) {
      main { grid-template-columns: 1fr; grid-template-rows: minmax(14rem, 40vh) 1fr; }
      aside.panel { order: 2; border-right: none; border-top: 1px solid var(--line); }
      .viewport { order: 1; }
      header h1 { font-size: 1.2rem; }
      .badge { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, .toast { transition: none !important; }
    }
  </style>
</head>
<body>
  <header>
    <h1>obj·<span>forge</span></h1>
    <p class="sub">procedural mesh generator · .obj for blender</p>
    <span class="badge">v1</span>
  </header>
  <main>
    <aside class="panel" aria-label="controls">
      <section>
        <h2>shape</h2>
        <div class="shapes-grid" id="shapes" role="radiogroup" aria-label="shape type"></div>
      </section>
      <section>
        <h2>parameters</h2>
        <div id="params"></div>
      </section>
      <section>
        <h2>view</h2>
        <div class="opts">
          <label><input type="checkbox" id="wireframe"> wireframe overlay</label>
          <label><input type="checkbox" id="autorotate" checked> auto-rotate</label>
          <label><input type="checkbox" id="maskDebugToggle"> mask debug overlay</label>
          <button type="button" class="ghost-btn" id="resetCam">reset camera</button>
          <button type="button" class="ghost-btn" id="reseed">reseed randomness</button>
        </div>
      </section>
      <div class="export-actions">
        <button class="export-btn" data-format="obj" type="button" aria-label="download as .obj">↓ .obj</button>
        <button class="export-btn alt" data-format="fbx" type="button" aria-label="download as .fbx">↓ .fbx</button>
      </div>
    </aside>
    <div class="viewport">
      <canvas id="canvas" role="application" aria-label="3D mesh preview · drag to orbit, scroll to zoom"></canvas>
      <div class="hint">drag · scroll · right-drag pan</div>
      <div class="toast" id="toast" role="status" aria-live="polite"></div>
      <div class="hud" id="hud">verts: <strong>—</strong> · tris: <strong>—</strong> · <strong>—</strong></div>
      <div class="viewport-exports">
        <button class="viewport-export" data-format="obj" type="button" aria-label="download as .obj">↓ .obj</button>
        <button class="viewport-export alt" data-format="fbx" type="button" aria-label="download as .fbx">↓ .fbx</button>
      </div>
      <div class="mask-debug" id="maskDebug" aria-live="polite">
        <div class="mask-debug-head">
          <span>mask debug</span>
          <span class="stat" id="maskStat">—</span>
        </div>
        <canvas id="maskCanvas"></canvas>
        <div class="mask-debug-foot"><span class="swatch" aria-hidden="true"></span>= cut by silhouette</div>
      </div>
    </div>
  </main>
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
  (() => {
    'use strict';

    /* ───────────── shape definitions ───────────── */
    const SHAPES = {
      crystal: { name: 'Crystal', glyph: '◆', params: [
        { id: 'detail',    label: 'Detail',    min: 0,   max: 3,   step: 1,    value: 1   },
        { id: 'jag',       label: 'Jagged',    min: 0,   max: 1,   step: 0.01, value: 0.35 },
        { id: 'scale',     label: 'Scale',     min: 0.3, max: 2,   step: 0.05, value: 1.2 },
      ]},
      gear: { name: 'Gear', glyph: '⚙', params: [
        { id: 'teeth',     label: 'Teeth',     min: 6,   max: 32,  step: 1,    value: 12  },
        { id: 'thickness', label: 'Thick',     min: 0.1, max: 1,   step: 0.02, value: 0.4 },
        { id: 'radius',    label: 'Radius',    min: 0.5, max: 1.6, step: 0.05, value: 1   },
      ]},
      rock: { name: 'Rock', glyph: '◈', params: [
        { id: 'radius',    label: 'Radius',    min: 0.4, max: 1.6, step: 0.05, value: 1   },
        { id: 'frequency', label: 'Freq',      min: 0.5, max: 4,   step: 0.1,  value: 1.4 },
        { id: 'bumpiness', label: 'Bumps',     min: 0,   max: 1,   step: 0.02, value: 0.45 },
      ]},
      helix: { name: 'Helix', glyph: '∮', params: [
        { id: 'turns',     label: 'Turns',     min: 1,   max: 8,   step: 0.5,  value: 3   },
        { id: 'radius',    label: 'Radius',    min: 0.4, max: 1.5, step: 0.05, value: 0.8 },
        { id: 'height',    label: 'Height',    min: 1,   max: 4,   step: 0.1,  value: 2   },
        { id: 'thickness', label: 'Wire',      min: 0.05, max: 0.4, step: 0.01, value: 0.12 },
      ]},
      twist: { name: 'Twist', glyph: '∞', params: [
        { id: 'height',    label: 'Height',    min: 1,   max: 4,   step: 0.1,  value: 2   },
        { id: 'twist',     label: 'Twist',     min: 0,   max: 4,   step: 0.05, value: 1.2 },
        { id: 'taper',     label: 'Taper',     min: 0,   max: 1,   step: 0.02, value: 0.3 },
        { id: 'segments',  label: 'Segs',      min: 4,   max: 64,  step: 1,    value: 24  },
      ]},
      terrain: { name: 'Terrain', glyph: '▲', params: [
        { id: 'detail',    label: 'Detail',    min: 16,  max: 96,  step: 4,    value: 48  },
        { id: 'frequency', label: 'Freq',      min: 0.3, max: 3,   step: 0.1,  value: 1   },
        { id: 'amplitude', label: 'Amp',       min: 0,   max: 1.5, step: 0.05, value: 0.6 },
      ]},
      shroom: { name: 'Shroom', glyph: '☂', params: [
        { id: 'cap',       label: 'Cap',       min: 0.4, max: 1.4, step: 0.05, value: 0.9 },
        { id: 'stem',      label: 'Stem',      min: 0.15, max: 0.6, step: 0.02, value: 0.3 },
        { id: 'stemHeight', label: 'Stem hgt', min: 0.4, max: 2,   step: 0.05, value: 1   },
      ]},
      pod: { name: 'Pod', glyph: '◯', params: [
        { id: 'n',         label: 'Sharpness', min: 1,   max: 8,   step: 0.1,  value: 2.5 },
        { id: 'a',         label: 'X-scale',   min: 0.4, max: 1.6, step: 0.05, value: 1   },
        { id: 'b',         label: 'Y-scale',   min: 0.4, max: 1.8, step: 0.05, value: 1.2 },
        { id: 'c',         label: 'Z-scale',   min: 0.4, max: 1.6, step: 0.05, value: 1   },
      ]},
      heightmap: { name: 'Heightmap', glyph: '▦', params: [
        { id: 'resolution', label: 'Res',         min: 16,  max: 256, step: 8,    value: 96  },
        { id: 'amplitude',  label: 'Height',      min: 0.05, max: 4,  step: 0.05, value: 2   },
        { id: 'size',       label: 'Size',        min: 1,   max: 5,   step: 0.1,  value: 3   },
        { id: 'invert',     label: 'Invert',      min: 0,   max: 1,   step: 1,    value: 0   },
        { id: 'flatExtrude', label: 'Flat extrude · skip pixel depth', min: 0, max: 1, step: 1, value: 0 },
        { id: 'alphaMask',  label: 'Silhouette only', min: 0, max: 1, step: 1,    value: 0   },
      ]},
    };

    /* ───────────── state ───────────── */
    const state = {
      shape: 'crystal',
      params: {},
      seed: 1337,
      wireframe: false,
      autorotate: true,
      showMaskDebug: false,
      lastMaskInfo: null,     // { res, alphas, heights, strategy, threshold, skippedQuads, totalQuads, masked }
      heightmapImage: null,   // HTMLImageElement when loaded
      heightmapName: '',
    };
    // initialize default params per shape
    for (const k in SHAPES) {
      state.params[k] = {};
      SHAPES[k].params.forEach(p => state.params[k][p.id] = p.value);
    }

    /* ───────────── three.js scene ───────────── */
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x070b13, 1);

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x070b13, 8, 22);

    const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
    const CAMERA_HOME = new THREE.Vector3(3.2, 2.3, 4.2);
    camera.position.copy(CAMERA_HOME);

    const controls = new THREE.OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 1.2;
    controls.maxDistance = 14;

    // lights
    scene.add(new THREE.AmbientLight(0x223040, 0.55));
    const keyLight = new THREE.DirectionalLight(0xff7a3d, 1.0);
    keyLight.position.set(4, 5, 3);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0x5ee3ff, 0.55);
    fillLight.position.set(-3, 2, -4);
    scene.add(fillLight);
    const rim = new THREE.DirectionalLight(0xffffff, 0.25);
    rim.position.set(0, -3, 2);
    scene.add(rim);

    // floor grid
    const grid = new THREE.GridHelper(20, 20, 0x1a2330, 0x131b27);
    grid.position.y = -1.5;
    scene.add(grid);

    // axis hint (faint)
    const axes = new THREE.AxesHelper(0.6);
    axes.position.y = -1.49;
    scene.add(axes);

    // mesh holder
    let mesh = null;
    let wireMesh = null;
    const solidMat = new THREE.MeshStandardMaterial({
      color: 0xd8e3ee,
      metalness: 0.05,
      roughness: 0.55,
      flatShading: true,
      side: THREE.DoubleSide,
    });
    const wireMat = new THREE.LineBasicMaterial({ color: 0x5ee3ff, transparent: true, opacity: 0.45 });

    /* ───────────── noise (seeded value noise) ───────────── */
    function hash3(x, y, z, seed) {
      const n = Math.sin(x * 374.761 + y * 668.265 + z * 274.126 + seed * 13.7) * 43758.5453;
      return n - Math.floor(n);
    }
    function smooth(t) { return t * t * (3 - 2 * t); }
    function noise3(x, y, z, seed) {
      const xi = Math.floor(x), yi = Math.floor(y), zi = Math.floor(z);
      const xf = x - xi, yf = y - yi, zf = z - zi;
      const u = smooth(xf), v = smooth(yf), w = smooth(zf);
      const lerp = (a, b, t) => a + (b - a) * t;
      return lerp(
        lerp(lerp(hash3(xi,yi,zi,seed),       hash3(xi+1,yi,zi,seed),   u),
             lerp(hash3(xi,yi+1,zi,seed),     hash3(xi+1,yi+1,zi,seed), u), v),
        lerp(lerp(hash3(xi,yi,zi+1,seed),     hash3(xi+1,yi,zi+1,seed), u),
             lerp(hash3(xi,yi+1,zi+1,seed),   hash3(xi+1,yi+1,zi+1,seed), u), v),
        w
      );
    }
    function fbm(x, y, z, seed, oct) {
      let n = 0, amp = 1, freq = 1, max = 0;
      for (let i = 0; i < oct; i++) {
        n += noise3(x * freq, y * freq, z * freq, seed + i * 7) * amp;
        max += amp;
        amp *= 0.5; freq *= 2.07;
      }
      return n / max;
    }

    /* ───────────── shape builders ───────────── */
    const BUILDERS = {
      crystal(p, seed) {
        const geo = new THREE.IcosahedronGeometry(p.scale, Math.round(p.detail));
        const pos = geo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
          const h = hash3(x * 5.3, y * 5.3, z * 5.3, seed);
          const k = 1 + (h - 0.5) * p.jag * 0.85;
          pos.setXYZ(i, x * k, y * k, z * k);
        }
        geo.computeVertexNormals();
        return geo;
      },
      gear(p) {
        const teeth = Math.round(p.teeth);
        const r = p.radius, R = r * 1.22;
        const shape = new THREE.Shape();
        const step = (Math.PI * 2) / teeth;
        for (let i = 0; i < teeth; i++) {
          const a1 = i * step;
          const a2 = a1 + step * 0.30;
          const a3 = a1 + step * 0.5;
          const a4 = a1 + step * 0.7;
          const fn = i === 0 ? 'moveTo' : 'lineTo';
          shape[fn](Math.cos(a1) * r, Math.sin(a1) * r);
          shape.lineTo(Math.cos(a2) * R, Math.sin(a2) * R);
          shape.lineTo(Math.cos(a3) * R, Math.sin(a3) * R);
          shape.lineTo(Math.cos(a4) * r, Math.sin(a4) * r);
        }
        shape.closePath();
        const hole = new THREE.Path();
        hole.absarc(0, 0, r * 0.32, 0, Math.PI * 2, true);
        shape.holes.push(hole);
        const geo = new THREE.ExtrudeGeometry(shape, {
          depth: p.thickness, bevelEnabled: true,
          bevelThickness: 0.04, bevelSize: 0.04, bevelSegments: 2, curveSegments: 6,
        });
        geo.center();
        geo.rotateX(-Math.PI / 2);
        geo.computeVertexNormals();
        return geo;
      },
      rock(p, seed) {
        const geo = new THREE.SphereGeometry(p.radius, 48, 32);
        const pos = geo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
          const f = p.frequency;
          const n = fbm(x * f, y * f, z * f, seed, 4);
          const k = 1 + (n - 0.5) * p.bumpiness * 1.4;
          pos.setXYZ(i, x * k, y * k, z * k);
        }
        geo.computeVertexNormals();
        return geo;
      },
      helix(p) {
        const segs = Math.max(48, Math.round(60 * p.turns));
        const pts = [];
        for (let i = 0; i <= segs; i++) {
          const t = i / segs;
          const ang = t * p.turns * Math.PI * 2;
          pts.push(new THREE.Vector3(
            Math.cos(ang) * p.radius,
            t * p.height - p.height / 2,
            Math.sin(ang) * p.radius
          ));
        }
        const curve = new THREE.CatmullRomCurve3(pts);
        return new THREE.TubeGeometry(curve, segs, p.thickness, 14, false);
      },
      twist(p) {
        const segs = Math.round(p.segments);
        const geo = new THREE.BoxGeometry(1, p.height, 1, 6, segs, 6);
        const pos = geo.attributes.position;
        const tw = p.twist * Math.PI;
        for (let i = 0; i < pos.count; i++) {
          const y = pos.getY(i);
          const t = (y + p.height / 2) / p.height;
          const a = tw * t;
          const x = pos.getX(i), z = pos.getZ(i);
          const taper = 1 - t * p.taper * 0.7;
          pos.setX(i, (x * Math.cos(a) - z * Math.sin(a)) * taper);
          pos.setZ(i, (x * Math.sin(a) + z * Math.cos(a)) * taper);
        }
        geo.computeVertexNormals();
        return geo;
      },
      terrain(p, seed) {
        const seg = Math.round(p.detail);
        const geo = new THREE.PlaneGeometry(3, 3, seg, seg);
        geo.rotateX(-Math.PI / 2);
        const pos = geo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const n = fbm(x * p.frequency, 0, z * p.frequency, seed, 5);
          pos.setY(i, (n - 0.5) * p.amplitude * 2);
        }
        geo.computeVertexNormals();
        return geo;
      },
      shroom(p) {
        const cap = new THREE.SphereGeometry(p.cap, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
        // round under-cap with a small ring
        cap.translate(0, p.stemHeight - 0.02, 0);
        const stem = new THREE.CylinderGeometry(p.stem * 0.55, p.stem, p.stemHeight, 24, 1);
        stem.translate(0, p.stemHeight / 2 - 0.75, 0);
        cap.translate(0, -0.75, 0);
        const merged = mergeGeometries([cap, stem]);
        merged.computeVertexNormals();
        return merged;
      },
      pod(p) {
        const segs = 56, rings = 32;
        const pos = [], idx = [];
        const e = 2 / p.n;
        const sgn = (x) => x < 0 ? -1 : 1;
        const pw = (x, k) => sgn(x) * Math.pow(Math.abs(x), k);
        for (let i = 0; i <= rings; i++) {
          const v = (i / rings) * Math.PI - Math.PI / 2;
          const cv = Math.cos(v), sv = Math.sin(v);
          for (let j = 0; j <= segs; j++) {
            const u = (j / segs) * Math.PI * 2;
            const cu = Math.cos(u), su = Math.sin(u);
            pos.push(
              p.a * pw(cv, e) * pw(cu, e),
              p.b * pw(sv, e),
              p.c * pw(cv, e) * pw(su, e),
            );
          }
        }
        for (let i = 0; i < rings; i++) {
          for (let j = 0; j < segs; j++) {
            const a = i * (segs + 1) + j;
            const b = a + 1;
            const c = a + segs + 1;
            const d = c + 1;
            idx.push(a, c, b, b, c, d);
          }
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
        geo.setIndex(idx);
        geo.computeVertexNormals();
        return geo;
      },
      heightmap(p) {
        // prefer the pre-downsampled cache; fall back to original image; finally placeholder
        const src = state.heightmapSource || state.heightmapImage;
        if (!src) {
          // Demo placeholder · radial ripple that uses the user's amp/size/invert
          // settings so picking the Heightmap shape (before uploading) shows
          // visible extrusion instead of a flat plane.
          return buildDemoHeightmap(p);
        }
        const res = Math.min(Math.max(4, Math.round(p.resolution)), 256);
        const cv = document.createElement('canvas');
        cv.width = res; cv.height = res;
        const cx = cv.getContext('2d', { willReadFrequently: true });
        cx.drawImage(src, 0, 0, res, res);
        let data;
        try {
          data = cx.getImageData(0, 0, res, res).data;
        } catch (err) {
          console.warn('[obj-forge] getImageData failed — canvas tainted?', err);
          toast('cannot read pixels · ' + (err.message || 'tainted canvas'));
          const ph = new THREE.PlaneGeometry(p.size, p.size, 8, 8);
          ph.rotateX(-Math.PI / 2);
          return ph;
        }
        const size = p.size;
        const invert = !!p.invert;
        const alphaMask = !!p.alphaMask;
        const flatExtrude = !!p.flatExtrude;
        const ALPHA_THRESHOLD = 0.5;
        const HEIGHT_THRESHOLD_FRAC = 0.05; // fraction of amp below which we treat a region as "background"
        const amp = p.amplitude;
        const pos = new Float32Array(res * res * 3);
        const uv  = new Float32Array(res * res * 2);
        // Always allocate alphas + lums — the debug overlay + silhouette mask
        // both need the underlying signal even when the silhouette toggle is
        // off OR when flatExtrude overrides the per-vertex height with `amp`.
        const alphas = new Float32Array(res * res);
        const lums   = new Float32Array(res * res); // post-invert, before flatExtrude — drives silhouette + debug
        const idx = [];
        // alpha distribution stats so we can pick the right silhouette strategy
        // and tell the user exactly what's happening (computed always — needed
        // by the debug overlay even when the silhouette toggle is off)
        let aMin = 255, aMax = 0, opaque = 0, partial = 0, fullTransparent = 0;
        for (let i = 0; i < data.length; i += 4) {
          const al = data[i + 3];
          if (al < aMin) aMin = al;
          if (al > aMax) aMax = al;
          if (al === 255) opaque++;
          else if (al === 0) fullTransparent++;
          else partial++;
        }
        const totalPx = res * res;
        const hasAlphaVariation = (aMax - aMin) > 10;
        // displacement-map convention: black = ground (y=0), white = peak (y=amp).
        for (let i = 0; i < res; i++) {
          for (let j = 0; j < res; j++) {
            const k4 = (i * res + j) * 4;
            // composite over black so transparent png pixels read as ground level
            const a = data[k4 + 3] / 255;
            const r = data[k4]     * a;
            const g = data[k4 + 1] * a;
            const b = data[k4 + 2] * a;
            const lum = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
            const adjLum = invert ? (1 - lum) : lum;
            // flatExtrude bypasses the per-pixel depth math entirely — every
            // kept vertex gets the same y=amp so the result is a uniform-depth
            // slab in the shape of the silhouette (pair with Silhouette only
            // for a cookie-cutter / 3D-printed-sticker look).
            const h = flatExtrude ? amp : adjLum * amp;
            const off = (i * res + j) * 3;
            const off2 = (i * res + j) * 2;
            const u = j / (res - 1), v = i / (res - 1);
            pos[off    ] = (u - 0.5) * size;
            pos[off + 1] = h;
            pos[off + 2] = (v - 0.5) * size;
            uv[off2]     = u;
            uv[off2 + 1] = v;
            alphas[i * res + j] = a;
            lums[i * res + j] = adjLum;
          }
        }
        let skippedQuads = 0;
        // Silhouette-only mode: skip both triangles of any quad we treat as
        // "background". Primary signal is alpha when the image actually has
        // alpha variation. Fallback (uniform-alpha images: JPGs, flat PNGs)
        // cuts on the COMPUTED HEIGHT, which combined with the Invert toggle
        // handles both dark-bg and light-bg images.
        const heightCutoff = amp * HEIGHT_THRESHOLD_FRAC;
        for (let i = 0; i < res - 1; i++) {
          for (let j = 0; j < res - 1; j++) {
            const a = i * res + j;
            const b = a + 1;
            const c = a + res;
            const d = c + 1;
            if (alphaMask) {
              let skip;
              if (hasAlphaVariation) {
                const maxA = Math.max(alphas[a], alphas[b], alphas[c], alphas[d]);
                skip = maxA < ALPHA_THRESHOLD;
              } else {
                // Always use the LUMINANCE-derived height for the silhouette test,
                // not pos.y — so the mask still works when flatExtrude flattens
                // every kept pixel to amp.
                const maxL = Math.max(lums[a], lums[b], lums[c], lums[d]);
                skip = (maxL * amp) < heightCutoff;
              }
              if (skip) { skippedQuads++; continue; }
            }
            idx.push(a, c, b, b, c, d);
          }
        }
        const totalQuads = (res - 1) * (res - 1);
        // Snapshot the per-pixel signals the silhouette math operates on so the
        // debug overlay can render exactly what's being (or would be) cut.
        // Snapshot the LUM-derived would-be height (not pos.y) so the debug
        // overlay still shows the source-image relief even when flatExtrude
        // has clamped every vertex y to amp.
        const heightSnap = new Float32Array(res * res);
        for (let i = 0; i < res * res; i++) heightSnap[i] = lums[i] * amp;
        state.lastMaskInfo = {
          res,
          alphas: new Float32Array(alphas),
          heights: heightSnap,
          strategy: hasAlphaVariation ? 'alpha' : 'height',
          threshold: hasAlphaVariation ? ALPHA_THRESHOLD : heightCutoff,
          skippedQuads,
          totalQuads,
          masked: alphaMask,
          aMin, aMax, opaque, partial, fullTransparent, totalPx,
        };
        if (alphaMask) {
          console.info('[obj-forge] silhouette mask · strategy=' + (hasAlphaVariation ? 'alpha' : 'height-fallback') +
            ' · alpha range=' + aMin + '..' + aMax +
            ' · opaque=' + opaque + ' partial=' + partial + ' transparent=' + fullTransparent + ' / ' + totalPx +
            ' · skipped ' + skippedQuads + '/' + totalQuads + ' quads');
          if (!hasAlphaVariation && skippedQuads === 0) {
            toast('image has no alpha · try Invert + Silhouette for light-bg images');
          } else if (!hasAlphaVariation) {
            toast('no alpha · cutting on darkness (toggle Invert if subject is light)');
          } else if (skippedQuads === 0) {
            toast('silhouette mask matched nothing · image is fully opaque');
          }
        }
        updateMaskOverlay();
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
        geo.setIndex(idx);
        geo.computeVertexNormals();
        return geo;
      },
    };

    /* ───────────── demo heightmap (visible empty state for heightmap shape) ───────────── */
    function buildDemoHeightmap(p) {
      const res = 56;
      const pos = new Float32Array(res * res * 3);
      const uv = new Float32Array(res * res * 2);
      const idx = [];
      const invert = !!p.invert;
      const flatExtrude = !!p.flatExtrude;
      for (let i = 0; i < res; i++) {
        for (let j = 0; j < res; j++) {
          const u = j / (res - 1), v = i / (res - 1);
          const x = (u - 0.5) * p.size;
          const z = (v - 0.5) * p.size;
          const r = Math.sqrt(x * x + z * z);
          // radial ripple + a small cross-modulation for visual variety
          const base = Math.cos(r * 4) * Math.exp(-r * 0.55);
          const mod  = Math.sin(x * 1.8) * Math.cos(z * 1.8) * 0.18;
          const ripple = ((base + mod) + 1) * 0.5; // [0, 1]
          const lum = invert ? (1 - ripple) : ripple;
          const off3 = (i * res + j) * 3;
          const off2 = (i * res + j) * 2;
          pos[off3]     = x;
          pos[off3 + 1] = flatExtrude ? p.amplitude : lum * p.amplitude;
          pos[off3 + 2] = z;
          uv[off2]     = u;
          uv[off2 + 1] = v;
        }
      }
      for (let i = 0; i < res - 1; i++) {
        for (let j = 0; j < res - 1; j++) {
          const a = i * res + j;
          const b = a + 1;
          const c = a + res;
          const d = c + 1;
          idx.push(a, c, b, b, c, d);
        }
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
      geo.setIndex(idx);
      geo.computeVertexNormals();
      return geo;
    }

    /* ───────────── geometry merging (for shroom) ───────────── */
    function mergeGeometries(geos) {
      let vCount = 0, iCount = 0;
      geos.forEach(g => {
        if (!g.index) {
          const idx = new Uint32Array(g.attributes.position.count);
          for (let i = 0; i < idx.length; i++) idx[i] = i;
          g.setIndex(new THREE.BufferAttribute(idx, 1));
        }
        vCount += g.attributes.position.count;
        iCount += g.index.count;
      });
      const pos = new Float32Array(vCount * 3);
      const nrm = new Float32Array(vCount * 3);
      const ind = new Uint32Array(iCount);
      let vOff = 0, iOff = 0;
      geos.forEach(g => {
        const gp = g.attributes.position.array;
        const gn = g.attributes.normal ? g.attributes.normal.array : null;
        pos.set(gp, vOff * 3);
        if (gn) nrm.set(gn, vOff * 3);
        const gi = g.index.array;
        for (let i = 0; i < gi.length; i++) ind[iOff + i] = gi[i] + vOff;
        vOff += g.attributes.position.count;
        iOff += gi.length;
      });
      const out = new THREE.BufferGeometry();
      out.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      out.setAttribute('normal', new THREE.BufferAttribute(nrm, 3));
      out.setIndex(new THREE.BufferAttribute(ind, 1));
      return out;
    }

    /* ───────────── rebuild ───────────── */
    function rebuild() {
      const builder = BUILDERS[state.shape];
      const params = state.params[state.shape];
      const geo = builder(params, state.seed);
      if (mesh) {
        scene.remove(mesh);
        mesh.geometry.dispose();
      }
      if (wireMesh) {
        scene.remove(wireMesh);
        wireMesh.geometry.dispose();
      }
      mesh = new THREE.Mesh(geo, solidMat);
      scene.add(mesh);
      if (state.wireframe) addWireOverlay();
      updateHUD(geo);
    }

    function addWireOverlay() {
      if (!mesh) return;
      const wireGeo = new THREE.WireframeGeometry(mesh.geometry);
      wireMesh = new THREE.LineSegments(wireGeo, wireMat);
      mesh.add(wireMesh);
    }

    function updateHUD(geo) {
      const verts = geo.attributes.position.count;
      const tris  = geo.index ? geo.index.count / 3 : verts / 3;
      const bytes = verts * 50 + tris * 30;
      const kb    = (bytes / 1024).toFixed(1);
      document.getElementById('hud').innerHTML =
        `verts: <strong>${verts.toLocaleString()}</strong> · tris: <strong>${tris.toLocaleString()}</strong> · <strong>~${kb}KB</strong>`;
    }

    /* ───────────── render loop ───────────── */
    function resize() {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      if (canvas.width !== w * renderer.getPixelRatio() || canvas.height !== h * renderer.getPixelRatio()) {
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
    }
    function tick() {
      resize();
      if (state.autorotate && mesh) mesh.rotation.y += 0.005;
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();

    /* ───────────── UI: shape grid ───────────── */
    const shapesGrid = document.getElementById('shapes');
    Object.entries(SHAPES).forEach(([key, def]) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'shape-btn' + (key === state.shape ? ' active' : '');
      btn.dataset.shape = key;
      btn.setAttribute('role', 'radio');
      btn.setAttribute('aria-checked', key === state.shape ? 'true' : 'false');
      btn.innerHTML = `<span class="glyph" aria-hidden="true">${def.glyph}</span><span class="name">${def.name}</span>`;
      btn.addEventListener('click', () => selectShape(key));
      shapesGrid.appendChild(btn);
    });

    function selectShape(key) {
      state.shape = key;
      document.querySelectorAll('.shape-btn').forEach(b => {
        const on = b.dataset.shape === key;
        b.classList.toggle('active', on);
        b.setAttribute('aria-checked', on ? 'true' : 'false');
      });
      // For heightmap, retarget the orbit centre at the mesh centroid (amp/2)
      // so the camera actually frames the extruded surface instead of looking
      // at the floor underneath it.
      if (key === 'heightmap') {
        controls.target.set(0, state.params.heightmap.amplitude * 0.5, 0);
      } else {
        controls.target.set(0, 0, 0);
      }
      controls.update();
      renderParams();
      rebuild();
      updateMaskOverlay();
    }

    /* ───────────── UI: parameter sliders ───────────── */
    const paramsEl = document.getElementById('params');
    function renderParams() {
      paramsEl.innerHTML = '';
      const def = SHAPES[state.shape];
      def.params.forEach(p => {
        const wrap = document.createElement('div');
        wrap.className = 'param';
        const val = state.params[state.shape][p.id];
        const isBool = p.min === 0 && p.max === 1 && p.step === 1;
        if (isBool) {
          // Real toggle button — much harder to miss than a 0..1 slider
          wrap.innerHTML = `
            <button type="button" class="toggle-btn ${val ? 'on' : ''}"
                    data-pid="${p.id}" aria-pressed="${val ? 'true' : 'false'}">
              <span class="toggle-track" aria-hidden="true"></span>
              <span class="toggle-label">${p.label}</span>
            </button>
          `;
          paramsEl.appendChild(wrap);
          const btn = wrap.querySelector('button');
          btn.addEventListener('click', () => {
            const cur = state.params[state.shape][p.id];
            const nxt = cur ? 0 : 1;
            state.params[state.shape][p.id] = nxt;
            btn.classList.toggle('on', !!nxt);
            btn.setAttribute('aria-pressed', nxt ? 'true' : 'false');
            scheduleRebuild();
          });
        } else {
          wrap.innerHTML = `
            <div class="lbl">
              <span>${p.label}</span>
              <span class="val" data-val="${p.id}">${formatVal(val, p.step)}</span>
            </div>
            <input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}"
                   data-pid="${p.id}" aria-label="${p.label}">
          `;
          paramsEl.appendChild(wrap);
          const slider = wrap.querySelector('input');
          const readout = wrap.querySelector('.val');
          slider.addEventListener('input', () => {
            const v = parseFloat(slider.value);
            state.params[state.shape][p.id] = v;
            readout.textContent = formatVal(v, p.step);
            scheduleRebuild();
          });
        }
      });
      if (state.shape === 'heightmap') renderDropzone();
    }

    function formatVal(v, step) {
      if (step >= 1) return Math.round(v).toString();
      const dec = step < 0.05 ? 2 : (step < 0.5 ? 2 : 1);
      return Number(v.toFixed(dec)).toString();
    }

    let rebuildTimer = null;
    function scheduleRebuild() {
      clearTimeout(rebuildTimer);
      rebuildTimer = setTimeout(rebuild, 30);
    }

    /* ───────────── heightmap dropzone ───────────── */
    // — file constraints —
    const MAX_BYTES = 32 * 1024 * 1024;   // 32 MB raw file cap (bumped from 12)
    const MAX_PREVIEW_EDGE = 1024;        // pre-downsample so per-slider rebuilds are fast
    const MAX_INTERMEDIATE = 8192;        // safe drawImage intermediate (Chrome/FF/Safari all >= 4096)
    const DECODE_TIMEOUT_MS = 15000;
    const SUPPORTED_EXT = /\.(png|jpe?g|webp|gif|bmp|avif|svg)$/i;
    const KNOWN_BAD_EXT = /\.(heic|heif|tiff?|raw|cr2|nef|arw|dng|psd)$/i;
    const KNOWN_BAD_MIME = /^image\/(heic|heif|tiff|x-canon-|x-nikon-|x-adobe-)/i;

    function escapeHTML(s) {
      return String(s).replace(/[&<>"']/g, ch => (
        { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]
      ));
    }
    function isImageFile(f) {
      if (!f) return false;
      if (KNOWN_BAD_EXT.test(f.name || '') || KNOWN_BAD_MIME.test(f.type || '')) return false;
      if (f.type && f.type.startsWith('image/')) return true;
      return SUPPORTED_EXT.test(f.name || '');
    }
    function rejectionReason(f) {
      if (!f) return 'no file';
      if (KNOWN_BAD_EXT.test(f.name || '') || KNOWN_BAD_MIME.test(f.type || '')) {
        return 'unsupported · browsers can\'t decode HEIC/TIFF/RAW · re-save as PNG or JPG';
      }
      return 'not an image · try PNG, JPG, WebP, GIF, BMP, AVIF, or SVG';
    }
    function pickFirstImage(dt) {
      // prefer the standard files list, then walk dataTransfer.items for nested cases
      if (dt && dt.files && dt.files.length) {
        for (let i = 0; i < dt.files.length; i++) {
          if (isImageFile(dt.files[i])) return dt.files[i];
        }
      }
      if (dt && dt.items && dt.items.length) {
        for (let i = 0; i < dt.items.length; i++) {
          const it = dt.items[i];
          if (it.kind === 'file') {
            const f = it.getAsFile();
            if (isImageFile(f)) return f;
          }
        }
      }
      return null;
    }
    function clearHeightmap() {
      // close ImageBitmap explicitly to release GPU memory
      if (state.heightmapImage && typeof state.heightmapImage.close === 'function') {
        try { state.heightmapImage.close(); } catch(_) {}
      }
      state.heightmapImage = null;
      state.heightmapSource = null;
      state.heightmapName = '';
      state.heightmapBytes = 0;
      state.heightmapOrigSize = null;
      state.heightmapThumbURL = '';
      state.lastMaskInfo = null;  // wipe any stale mask debug data
      renderParams();
      rebuild();
      updateMaskOverlay();
      toast('image cleared');
    }

    /* — fast async decoder · createImageBitmap → <img> fallback · with timeout — */
    async function decodeImage(file) {
      let timeoutId;
      const timeout = new Promise((_, rej) => {
        timeoutId = setTimeout(() => rej(new Error('decode timed out')), DECODE_TIMEOUT_MS);
      });
      const decode = (async () => {
        // Fast path: createImageBitmap (off-thread on Chrome/FF, no base64 round-trip)
        if (window.createImageBitmap) {
          try {
            return await createImageBitmap(file, { imageOrientation: 'from-image' });
          } catch (e) {
            console.warn('[obj-forge] createImageBitmap with orient option failed, retrying plain', e);
            try { return await createImageBitmap(file); }
            catch (e2) { console.warn('[obj-forge] plain createImageBitmap failed, falling back to <img>', e2); }
          }
        }
        // Fallback: Blob URL + <img> (skips the dataURL base64 stage entirely)
        return await new Promise((resolve, reject) => {
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.decoding = 'async';
          img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
          img.onerror = (ev) => {
            URL.revokeObjectURL(url);
            console.warn('[obj-forge] <img> fallback decode failed', ev);
            reject(new Error('<img> decode failed'));
          };
          img.src = url;
        });
      })();
      try {
        const r = await Promise.race([decode, timeout]);
        clearTimeout(timeoutId);
        return r;
      } catch (e) {
        clearTimeout(timeoutId);
        throw e;
      }
    }

    function downsampleSource(source, maxEdge) {
      const w = source.width || source.naturalWidth || 0;
      const h = source.height || source.naturalHeight || 0;
      if (!w || !h) throw new Error('source has no intrinsic dimensions');
      // Cap intermediate at MAX_INTERMEDIATE to stay under per-browser canvas-size limits
      const safe = Math.min(maxEdge, MAX_INTERMEDIATE);
      const scale = Math.min(1, safe / Math.max(w, h));
      const cw = Math.max(4, Math.round(w * scale));
      const ch = Math.max(4, Math.round(h * scale));
      const c = document.createElement('canvas');
      c.width = cw; c.height = ch;
      const ctx = c.getContext('2d', { willReadFrequently: true });
      if (!ctx) throw new Error('2d context unavailable');
      ctx.drawImage(source, 0, 0, cw, ch);
      // Verify pixels are actually readable (defensive against tainted canvas)
      ctx.getImageData(0, 0, 1, 1);
      return c;
    }

    function canvasToThumb(canvas, max) {
      const w = canvas.width, h = canvas.height;
      const scale = max / Math.max(w, h);
      const t = document.createElement('canvas');
      t.width = Math.max(1, Math.round(w * scale));
      t.height = Math.max(1, Math.round(h * scale));
      t.getContext('2d').drawImage(canvas, 0, 0, t.width, t.height);
      return t.toDataURL('image/png');
    }
    function renderDropzone() {
      const wrap = document.createElement('div');
      wrap.className = 'dz-wrap';

      const dz = document.createElement('label');
      dz.className = 'dropzone' + (state.heightmapImage ? ' loaded' : '');
      dz.htmlFor = 'hmFile';
      if (state.heightmapImage) {
        const kb = state.heightmapBytes ? (state.heightmapBytes / 1024).toFixed(0) + ' KB · ' : '';
        const o = state.heightmapOrigSize || { w: state.heightmapImage.width, h: state.heightmapImage.height };
        const c = state.heightmapSource || { width: 0, height: 0 };
        const isDown = o.w > c.width || o.h > c.height;
        const dims = isDown
          ? `${o.w}×${o.h} → ${c.width}×${c.height} cached`
          : `${o.w}×${o.h}`;
        const thumb = state.heightmapThumbURL
          ? `<img class="file-thumb" src="${state.heightmapThumbURL}" alt="loaded heightmap thumbnail">`
          : '';
        dz.innerHTML = `
          <span class="big">✓ ${escapeHTML(state.heightmapName || 'image loaded')}</span>
          <span>${kb}${dims} · click to replace</span>
          ${thumb}
        `;
      } else {
        dz.innerHTML = `
          <span class="big">+ drop or pick an image</span>
          <span>black = ground · white = peak · png · jpg · webp · gif · bmp · avif · svg</span>
        `;
      }
      const input = document.createElement('input');
      input.type = 'file';
      input.id = 'hmFile';
      input.accept = 'image/png,image/jpeg,image/webp,image/gif,image/bmp,image/avif,image/svg+xml,image/*';
      input.addEventListener('change', e => {
        const f = e.target.files && e.target.files[0];
        if (f) loadHeightmapFile(f);
        input.value = ''; // re-picking the same file should still fire change
      });
      dz.appendChild(input);
      wrap.appendChild(dz);

      if (state.heightmapImage) {
        const clearBtn = document.createElement('button');
        clearBtn.type = 'button';
        clearBtn.className = 'ghost-btn dz-clear';
        clearBtn.textContent = '× clear image';
        clearBtn.setAttribute('aria-label', 'clear loaded heightmap image');
        clearBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          clearHeightmap();
        });
        wrap.appendChild(clearBtn);
      }

      paramsEl.appendChild(wrap);

      // drag-depth counter — dragleave fires when crossing into child elements
      // (the thumbnail img inside the label), so a naive remove-on-leave flickers.
      let depth = 0;
      dz.addEventListener('dragenter', (e) => {
        e.preventDefault();
        depth++;
        dz.classList.add('drag-pulse');
      });
      dz.addEventListener('dragover', (e) => {
        e.preventDefault();
        try { e.dataTransfer.dropEffect = 'copy'; } catch(_) {}
      });
      dz.addEventListener('dragleave', () => {
        depth = Math.max(0, depth - 1);
        if (depth === 0) dz.classList.remove('drag-pulse');
      });
      dz.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        depth = 0;
        dz.classList.remove('drag-pulse');
        const f = pickFirstImage(e.dataTransfer);
        if (f) loadHeightmapFile(f);
        else toast('not an image · png/jpg/webp/gif/bmp');
      });
    }

    async function loadHeightmapFile(file) {
      console.info('[obj-forge] loadHeightmapFile:', {
        name: file && file.name,
        type: file && file.type,
        size: file && file.size,
      });
      if (!isImageFile(file)) {
        toast(rejectionReason(file));
        console.warn('[obj-forge] rejected:', rejectionReason(file));
        return;
      }
      if (file.size > MAX_BYTES) {
        toast('too big · max ' + Math.round(MAX_BYTES / 1024 / 1024) + ' MB');
        console.warn('[obj-forge] size cap hit:', file.size, '>', MAX_BYTES);
        return;
      }
      const sizeMB = (file.size / 1024 / 1024).toFixed(1);
      toast('decoding · ' + file.name + ' (' + sizeMB + 'MB)');
      let decoded;
      try {
        decoded = await decodeImage(file);
      } catch (err) {
        console.warn('[obj-forge] decode failed:', err);
        toast('decode failed · ' + (err.message || 'try PNG/JPG/WebP'));
        return;
      }
      const origW = decoded.width || decoded.naturalWidth || 0;
      const origH = decoded.height || decoded.naturalHeight || 0;
      console.info('[obj-forge] decoded:', origW + '×' + origH, '· kind:', decoded.constructor && decoded.constructor.name);
      if (!origW || !origH || origW < 4 || origH < 4) {
        toast('image has no usable size · need ≥ 4×4');
        if (decoded.close) decoded.close();
        return;
      }
      let cached;
      try {
        cached = downsampleSource(decoded, MAX_PREVIEW_EDGE);
      } catch (err) {
        console.warn('[obj-forge] downsample failed:', err);
        toast('cannot sample image · ' + (err.message || 'canvas error'));
        if (decoded.close) decoded.close();
        return;
      }
      console.info('[obj-forge] cached canvas:', cached.width + '×' + cached.height);
      state.heightmapSource = cached;
      state.heightmapImage = decoded;
      state.heightmapOrigSize = { w: origW, h: origH };
      state.heightmapName = file.name;
      state.heightmapBytes = file.size;
      try {
        state.heightmapThumbURL = canvasToThumb(cached, 96);
      } catch (err) {
        console.warn('[obj-forge] thumb failed:', err);
        state.heightmapThumbURL = '';
      }
      // free the full-res ImageBitmap now we have the cached canvas
      if (decoded.close && decoded !== cached) {
        try { decoded.close(); } catch(_) {}
        state.heightmapImage = cached; // keep a non-bitmap reference for the dropzone metadata
      }
      const isDown = origW > cached.width || origH > cached.height;
      toast(isDown
        ? 'loaded · ' + origW + '×' + origH + ' → cached ' + cached.width + '×' + cached.height
        : 'loaded · ' + origW + '×' + origH);
      renderParams();
      rebuild();
    }

    /* ───────────── mask debug overlay ───────────── */
    function updateMaskOverlay() {
      const dbg = document.getElementById('maskDebug');
      const canvas = document.getElementById('maskCanvas');
      const stat = document.getElementById('maskStat');
      const info = state.lastMaskInfo;
      // Only show for the heightmap shape, when toggled on, and when we have data
      if (!state.showMaskDebug || state.shape !== 'heightmap' || !info) {
        dbg.classList.remove('show');
        return;
      }
      dbg.classList.add('show');
      const res = info.res;
      canvas.width = res;
      canvas.height = res;
      const ctx = canvas.getContext('2d');
      const img = ctx.createImageData(res, res);
      // Normalise heights to [0,1] for visualisation regardless of amplitude
      let hMin = Infinity, hMax = -Infinity;
      for (let i = 0; i < res * res; i++) {
        if (info.heights[i] < hMin) hMin = info.heights[i];
        if (info.heights[i] > hMax) hMax = info.heights[i];
      }
      const hRange = Math.max(0.0001, hMax - hMin);
      for (let i = 0; i < res * res; i++) {
        const a = info.alphas[i];
        const h = info.heights[i];
        const wouldCut = info.strategy === 'alpha'
          ? a < info.threshold
          : h < info.threshold;
        const off = i * 4;
        if (wouldCut) {
          // Bright red overlay so the cut area is unmistakable
          img.data[off]     = 232;
          img.data[off + 1] = 76;
          img.data[off + 2] = 61;
          img.data[off + 3] = 255;
        } else {
          // Greyscale representation of the underlying signal we cut on
          let g;
          if (info.strategy === 'alpha') {
            g = Math.round(a * 255);
          } else {
            g = Math.round(((h - hMin) / hRange) * 255);
          }
          img.data[off]     = g;
          img.data[off + 1] = g;
          img.data[off + 2] = g;
          img.data[off + 3] = 255;
        }
      }
      ctx.putImageData(img, 0, 0);
      const cutPct = info.totalQuads ? (info.skippedQuads / info.totalQuads * 100).toFixed(0) : '0';
      const maskedNote = info.masked ? '' : ' (preview)';
      stat.textContent = info.strategy + ' · ' + info.skippedQuads + '/' + info.totalQuads + ' (' + cutPct + '%)' + maskedNote;
    }

    /* ───────────── view options ───────────── */
    document.getElementById('wireframe').addEventListener('change', (e) => {
      state.wireframe = e.target.checked;
      if (wireMesh) {
        scene.remove(wireMesh);
        wireMesh.geometry.dispose();
        wireMesh = null;
      }
      if (mesh && state.wireframe) addWireOverlay();
    });
    document.getElementById('autorotate').addEventListener('change', (e) => {
      state.autorotate = e.target.checked;
    });
    document.getElementById('maskDebugToggle').addEventListener('change', (e) => {
      state.showMaskDebug = e.target.checked;
      updateMaskOverlay();
    });
    document.getElementById('resetCam').addEventListener('click', () => {
      camera.position.copy(CAMERA_HOME);
      controls.target.set(0, 0, 0);
      controls.update();
    });
    document.getElementById('reseed').addEventListener('click', () => {
      state.seed = Math.floor(Math.random() * 1e6);
      rebuild();
      toast('seed: ' + state.seed);
    });

    /* ───────────── export ───────────── */
    function doExport(format) {
      if (!mesh) return;
      const geo = mesh.geometry;
      const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      let content, filename;
      try {
        if (format === 'fbx') {
          content = meshToFBX(geo, state.shape);
          filename = state.shape + '-' + stamp + '.fbx';
        } else {
          content = meshToOBJ(geo, state.shape);
          filename = state.shape + '-' + stamp + '.obj';
        }
      } catch (err) {
        console.warn('[obj-forge] export failed', err);
        toast('export failed · ' + (err.message || format));
        return;
      }
      const blob = new Blob([content], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      toast('downloaded ' + filename);
    }
    document.querySelectorAll('[data-format]').forEach(btn => {
      btn.addEventListener('click', () => doExport(btn.dataset.format));
    });

    function fmt(n) {
      if (Math.abs(n) < 1e-6) return '0';
      return parseFloat(n.toFixed(6)).toString();
    }
    function faceRef(i, hasUV, hasN) {
      if (hasUV && hasN) return i + '/' + i + '/' + i;
      if (hasN)          return i + '//' + i;
      if (hasUV)         return i + '/' + i;
      return '' + i;
    }
    function meshToOBJ(geo, name) {
      const pos = geo.attributes.position;
      const nrm = geo.attributes.normal;
      const uvs = geo.attributes.uv;
      const hasN = !!nrm, hasUV = !!uvs;
      const out = [];
      out.push('# OBJ Forge · ' + new Date().toISOString());
      out.push('# https://sloppy.live/obj-forge');
      out.push('# shape: ' + name + ' · v:' + pos.count + ' · t:' + (geo.index ? geo.index.count / 3 : pos.count / 3));
      out.push('o ' + name);
      // vertices
      for (let i = 0; i < pos.count; i++) {
        out.push('v ' + fmt(pos.getX(i)) + ' ' + fmt(pos.getY(i)) + ' ' + fmt(pos.getZ(i)));
      }
      // texture coords (OBJ origin is bottom-left, three.js is bottom-left too → no flip needed)
      if (hasUV) {
        for (let i = 0; i < uvs.count; i++) {
          out.push('vt ' + fmt(uvs.getX(i)) + ' ' + fmt(uvs.getY(i)));
        }
      }
      // normals
      if (hasN) {
        for (let i = 0; i < nrm.count; i++) {
          out.push('vn ' + fmt(nrm.getX(i)) + ' ' + fmt(nrm.getY(i)) + ' ' + fmt(nrm.getZ(i)));
        }
      }
      // faces (1-indexed, triangles only)
      if (geo.index) {
        const idx = geo.index;
        for (let i = 0; i < idx.count; i += 3) {
          const a = idx.getX(i) + 1, b = idx.getX(i + 1) + 1, c = idx.getX(i + 2) + 1;
          out.push('f ' + faceRef(a, hasUV, hasN) + ' ' + faceRef(b, hasUV, hasN) + ' ' + faceRef(c, hasUV, hasN));
        }
      } else {
        for (let i = 0; i < pos.count; i += 3) {
          const a = i + 1, b = i + 2, c = i + 3;
          out.push('f ' + faceRef(a, hasUV, hasN) + ' ' + faceRef(b, hasUV, hasN) + ' ' + faceRef(c, hasUV, hasN));
        }
      }
      return out.join('\n') + '\n';
    }

    /* ───────────── FBX (ASCII 7.4) writer ───────────── */
    // Minimal ASCII FBX 7.4 single-mesh exporter. Imports cleanly into Blender
    // (File → Import → FBX) and Unreal Engine (Content Browser → Import). Uses
    // ByPolygonVertex/Direct for normals + UVs by first converting the geometry
    // to non-indexed, which keeps the layout 1:1 with the polygon-vertex order
    // and avoids any IndexToDirect translation tables.
    function fbxPushArray(lines, indent, key, arr, isFloat) {
      lines.push(indent + key + ': *' + arr.length + ' {');
      const inner = indent + '\t';
      if (arr.length === 0) { lines.push(inner + 'a: '); lines.push(indent + '}'); return; }
      const per = 12;
      const chunks = [];
      for (let i = 0; i < arr.length; i += per) {
        const slice = arr.slice(i, i + per).map(v => isFloat ? fmt(v) : v);
        chunks.push(slice.join(','));
      }
      lines.push(inner + 'a: ' + chunks.join(',\n' + inner));
      lines.push(indent + '}');
    }
    function meshToFBX(originalGeo, name) {
      // toNonIndexed makes every triangle carry its own pos/normal/uv, so we
      // can map all layer elements as ByPolygonVertex/Direct.
      let g = originalGeo;
      if (g.index) g = g.toNonIndexed();
      const pos = g.attributes.position;
      const nrm = g.attributes.normal;
      const uvs = g.attributes.uv;
      const triCount = pos.count / 3;

      // Flatten attribute buffers.
      const verts = new Array(pos.count * 3);
      for (let i = 0; i < pos.count; i++) {
        verts[i*3]   = pos.getX(i);
        verts[i*3+1] = pos.getY(i);
        verts[i*3+2] = pos.getZ(i);
      }
      // PolygonVertexIndex · 1-complement the last vertex of each triangle to
      // mark the polygon end (FBX convention: `~i = -(i+1)`).
      const polyIdx = new Array(pos.count);
      for (let t = 0; t < triCount; t++) {
        const base = t * 3;
        polyIdx[base]     = base;
        polyIdx[base + 1] = base + 1;
        polyIdx[base + 2] = ~(base + 2);
      }
      const norms = nrm ? new Array(nrm.count * 3) : null;
      if (nrm) for (let i = 0; i < nrm.count; i++) {
        norms[i*3]   = nrm.getX(i);
        norms[i*3+1] = nrm.getY(i);
        norms[i*3+2] = nrm.getZ(i);
      }
      const uvArr = uvs ? new Array(uvs.count * 2) : null;
      if (uvs) for (let i = 0; i < uvs.count; i++) {
        uvArr[i*2]   = uvs.getX(i);
        uvArr[i*2+1] = uvs.getY(i);
      }

      // Stable but unique-ish IDs (FBX wants 64-bit ints; ~9-digit ints are fine)
      const geoId   = 100000000 + Math.floor(Math.random() * 899999999);
      const modelId = 100000000 + Math.floor(Math.random() * 899999999);
      const now = new Date();
      const lines = [];

      lines.push('; FBX 7.4.0 project file');
      lines.push('; Generated by OBJ Forge · ' + now.toISOString());
      lines.push('; https://sloppy.live/obj-forge');
      lines.push('');

      // — Header
      lines.push('FBXHeaderExtension:  {');
      lines.push('\tFBXHeaderVersion: 1003');
      lines.push('\tFBXVersion: 7400');
      lines.push('\tCreationTimeStamp:  {');
      lines.push('\t\tVersion: 1000');
      lines.push('\t\tYear: ' + now.getFullYear());
      lines.push('\t\tMonth: ' + (now.getMonth() + 1));
      lines.push('\t\tDay: ' + now.getDate());
      lines.push('\t\tHour: ' + now.getHours());
      lines.push('\t\tMinute: ' + now.getMinutes());
      lines.push('\t\tSecond: ' + now.getSeconds());
      lines.push('\t\tMillisecond: ' + now.getMilliseconds());
      lines.push('\t}');
      lines.push('\tCreator: "OBJ Forge"');
      lines.push('}');

      // — Axis settings (Y-up, matches Three.js · Blender/Unreal will rotate on import)
      lines.push('GlobalSettings:  {');
      lines.push('\tVersion: 1000');
      lines.push('\tProperties70:  {');
      lines.push('\t\tP: "UpAxis", "int", "Integer", "",1');
      lines.push('\t\tP: "UpAxisSign", "int", "Integer", "",1');
      lines.push('\t\tP: "FrontAxis", "int", "Integer", "",2');
      lines.push('\t\tP: "FrontAxisSign", "int", "Integer", "",1');
      lines.push('\t\tP: "CoordAxis", "int", "Integer", "",0');
      lines.push('\t\tP: "CoordAxisSign", "int", "Integer", "",1');
      lines.push('\t\tP: "UnitScaleFactor", "double", "Number", "",1');
      lines.push('\t}');
      lines.push('}');

      // — Definitions
      lines.push('Definitions:  {');
      lines.push('\tVersion: 100');
      lines.push('\tCount: 3');
      lines.push('\tObjectType: "GlobalSettings" { Count: 1 }');
      lines.push('\tObjectType: "Geometry" { Count: 1 }');
      lines.push('\tObjectType: "Model" { Count: 1 }');
      lines.push('}');

      // — Objects: geometry + model
      lines.push('Objects:  {');
      lines.push('\tGeometry: ' + geoId + ', "Geometry::' + name + '", "Mesh" {');
      fbxPushArray(lines, '\t\t', 'Vertices', verts, true);
      fbxPushArray(lines, '\t\t', 'PolygonVertexIndex', polyIdx, false);
      lines.push('\t\tGeometryVersion: 124');
      if (norms) {
        lines.push('\t\tLayerElementNormal: 0 {');
        lines.push('\t\t\tVersion: 102');
        lines.push('\t\t\tName: ""');
        lines.push('\t\t\tMappingInformationType: "ByPolygonVertex"');
        lines.push('\t\t\tReferenceInformationType: "Direct"');
        fbxPushArray(lines, '\t\t\t', 'Normals', norms, true);
        lines.push('\t\t}');
      }
      if (uvArr) {
        lines.push('\t\tLayerElementUV: 0 {');
        lines.push('\t\t\tVersion: 101');
        lines.push('\t\t\tName: "UVMap"');
        lines.push('\t\t\tMappingInformationType: "ByPolygonVertex"');
        lines.push('\t\t\tReferenceInformationType: "Direct"');
        fbxPushArray(lines, '\t\t\t', 'UV', uvArr, true);
        lines.push('\t\t}');
      }
      lines.push('\t\tLayer: 0 {');
      lines.push('\t\t\tVersion: 100');
      if (norms) {
        lines.push('\t\t\tLayerElement:  {');
        lines.push('\t\t\t\tType: "LayerElementNormal"');
        lines.push('\t\t\t\tTypedIndex: 0');
        lines.push('\t\t\t}');
      }
      if (uvArr) {
        lines.push('\t\t\tLayerElement:  {');
        lines.push('\t\t\t\tType: "LayerElementUV"');
        lines.push('\t\t\t\tTypedIndex: 0');
        lines.push('\t\t\t}');
      }
      lines.push('\t\t}');
      lines.push('\t}');

      lines.push('\tModel: ' + modelId + ', "Model::' + name + '", "Mesh" {');
      lines.push('\t\tVersion: 232');
      lines.push('\t\tShading: T');
      lines.push('\t\tCulling: "CullingOff"');
      lines.push('\t}');
      lines.push('}');

      // — Connections: Geometry → Model → RootNode (id 0)
      lines.push('Connections:  {');
      lines.push('\tC: "OO", ' + geoId + ', ' + modelId);
      lines.push('\tC: "OO", ' + modelId + ', 0');
      lines.push('}');

      return lines.join('\n') + '\n';
    }

    /* ───────────── toast ───────────── */
    let toastTimer = null;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    /* ───────────── init ───────────── */
    renderParams();
    rebuild();

    // window-level guard so accidental drops outside the dropzone don't navigate
    // the tab to the dropped file. The dropzone's own handlers run first
    // (target-phase before bubble), so this never swallows real drops.
    ['dragover', 'drop'].forEach(ev => {
      window.addEventListener(ev, (e) => {
        if (!e.target.closest || !e.target.closest('.dropzone')) e.preventDefault();
      });
    });

    // keyboard shortcut: e to export, w wireframe, r reset cam, space rotate
    window.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'e') doExport('obj');
      else if (e.key === 'f') doExport('fbx');
      else if (e.key === 'w') {
        const cb = document.getElementById('wireframe'); cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change'));
      }
      else if (e.key === 'r') document.getElementById('resetCam').click();
      else if (e.key === ' ') {
        e.preventDefault();
        const cb = document.getElementById('autorotate'); cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change'));
      }
    });
  })();
  </script>
</body>
</html>
