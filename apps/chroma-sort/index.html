<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Chroma Sort</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎨" />
<meta name="description" content="Click the colors in alphabetical order. Fast." />
<meta property="og:title" content="Chroma Sort" />
<meta property="og:description" content="Click the colors in alphabetical order. Fast." />
<meta property="og:url" content="https://sloppy.live/chroma-sort" />
<meta property="og:image" content="https://sloppy.live/screenshots/chroma-sort.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #222235;
    --dim: #555570;
    --text: #e0dff0;
    --accent: #ff3366;
    --good: #33ff88;
    --warn: #ffaa22;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Anybody', sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow-x: hidden;
  }
  body {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,51,102,0.06), transparent 50%),
      var(--bg);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 16px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-weight: 800;
    font-size: clamp(22px, 4vw, 32px);
    color: var(--accent);
    letter-spacing: 0.04em;
  }
  header a {
    color: var(--dim);
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  header a:hover { color: var(--accent); }

  .hud {
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 14px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .hud .v { color: var(--text); font-weight: 400; }
  .hud .timer { color: var(--warn); }
  .hud .timer.danger { color: var(--accent); animation: timerPulse 0.4s infinite alternate; }
  @keyframes timerPulse {
    from { opacity: 1; }
    to { opacity: 0.5; }
  }

  /* target order display */
  .order-bar {
    display: flex;
    justify-content: center;
    gap: 4px;
    padding: 8px 16px;
    flex-wrap: wrap;
  }
  .order-pip {
    width: clamp(10px, 3vw, 28px);
    height: 6px;
    border-radius: 3px;
    opacity: 0.3;
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .order-pip.done { opacity: 1; transform: scaleY(1.3); box-shadow: 0 0 8px currentColor; }
  .order-pip.next { opacity: 0.8; animation: pipPulse 0.6s infinite alternate; }
  @keyframes pipPulse {
    from { transform: scaleY(1); }
    to { transform: scaleY(1.5); box-shadow: 0 0 10px currentColor; }
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .board {
    display: grid;
    gap: 10px;
    width: 100%;
    max-width: 500px;
  }
  .board.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .board.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .board.cols-5 { grid-template-columns: repeat(5, 1fr); }
  .board.cols-6 { grid-template-columns: repeat(6, 1fr); }
  .board.cols-7 { grid-template-columns: repeat(7, 1fr); }

  .tile {
    aspect-ratio: 1;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: clamp(11px, 2.5vw, 14px);
    font-weight: 400;
    color: rgba(0,0,0,0.6);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: transform 0.1s, box-shadow 0.15s, opacity 0.3s;
    position: relative;
    border: 2px solid transparent;
  }
  .tile:hover { transform: scale(1.04); }
  .tile:active { transform: scale(0.96); }
  .tile.cleared {
    opacity: 0.15;
    pointer-events: none;
    transform: scale(0.9);
  }
  .tile.wrong {
    animation: wrongShake 0.3s;
    border-color: #fff;
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .tile.correct {
    animation: correctPop 0.25s;
  }
  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(0.9); opacity: 0.15; }
  }

  /* overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay .card {
    background: var(--surface);
    border: 2px solid var(--border);
    padding: 32px 28px;
    max-width: 400px;
    text-align: center;
    border-radius: 12px;
  }
  .overlay h2 {
    font-weight: 800;
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .overlay p {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--dim);
    line-height: 1.6;
    margin: 10px 0 18px;
    letter-spacing: 0.04em;
  }
  .overlay .stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin: 16px 0 22px;
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    color: var(--text);
  }
  .overlay .stats span {
    color: var(--dim);
    font-size: 11px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 4px;
  }
  .overlay select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 8px 14px;
    margin: 8px 6px;
    border-radius: 6px;
    cursor: pointer;
  }
  .overlay button {
    font-family: 'Anybody', sans-serif;
    font-weight: 800;
    font-size: 16px;
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 12px 32px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.15s, transform 0.1s;
    margin-top: 10px;
  }
  .overlay button:hover { background: #ff1144; transform: scale(1.03); }

  .flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 90;
    mix-blend-mode: screen;
  }
  .flash.good { background: var(--good); opacity: 0.1; transition: opacity 0.05s; }
  .flash.bad { background: var(--accent); opacity: 0.15; transition: opacity 0.05s; }

  .board.cols-6 .tile, .board.cols-7 .tile {
    font-size: clamp(8px, 1.8vw, 11px);
    border-radius: 6px;
    letter-spacing: 0;
  }
  .board.cols-6, .board.cols-7 { max-width: 620px; gap: 6px; }

  @media (max-width: 480px) {
    .board { max-width: 360px; gap: 8px; }
    .board.cols-6, .board.cols-7 { max-width: 100%; gap: 4px; }
    .tile { font-size: 10px; border-radius: 8px; }
    .board.cols-6 .tile, .board.cols-7 .tile { font-size: 8px; border-radius: 4px; }
  }
</style>
</head>
<body>
  <header>
    <h1>Chroma Sort</h1>
    <a href="https://sloppy.live">← sloppy.live</a>
  </header>

  <div class="hud">
    <div>round <span class="v" id="roundNum">1</span>/<span class="v" id="totalRounds">5</span></div>
    <div>score <span class="v" id="scoreNum">0</span></div>
    <div>time <span class="v timer" id="timerNum">0.0</span>s</div>
    <div>streak <span class="v" id="streakNum">0</span></div>
  </div>

  <div class="order-bar" id="orderBar"></div>

  <main>
    <div class="board" id="board"></div>
  </main>

  <div class="flash" id="flash"></div>

  <div class="overlay" id="overlay">
    <div class="card">
      <h2 id="overlayTitle">Chroma Sort</h2>
      <p id="overlayMsg">Click the color tiles in alphabetical order.<br/>Fast fingers. Sharp eyes. No mercy.</p>
      <div id="overlaySettings">
        <div style="margin-bottom:8px">
          <select id="difficultySelect">
            <option value="easy">Easy — 6 colors</option>
            <option value="medium" selected>Medium — 9 colors</option>
            <option value="hard">Hard — 12 colors</option>
            <option value="insane">Insane — 16 colors</option>
            <option value="extreme">Extreme — 36 colors</option>
            <option value="ultra">Ultra — 49 colors</option>
          </select>
        </div>
      </div>
      <div class="stats" id="overlayStats" style="display:none"></div>
      <button id="overlayBtn">Start</button>
    </div>
  </div>

<script>
(() => {
  // All available colors — name must be unique, sorted alphabetically for verification
  const COLOR_POOL = [
    { name: 'Amber',     hex: '#ffc04a' },
    { name: 'Aqua',      hex: '#00ffcc' },
    { name: 'Azure',     hex: '#007fff' },
    { name: 'Berry',     hex: '#8e4585' },
    { name: 'Blood',     hex: '#cc1122' },
    { name: 'Bronze',    hex: '#cd7f32' },
    { name: 'Canary',    hex: '#ffef00' },
    { name: 'Cerulean',  hex: '#0085ca' },
    { name: 'Charcoal',  hex: '#555555' },
    { name: 'Cobalt',    hex: '#0047ab' },
    { name: 'Coral',     hex: '#ff6f61' },
    { name: 'Crimson',   hex: '#dc143c' },
    { name: 'Cyan',      hex: '#00e5ff' },
    { name: 'Denim',     hex: '#1560bd' },
    { name: 'Ember',     hex: '#ff5533' },
    { name: 'Emerald',   hex: '#50c878' },
    { name: 'Flamingo',  hex: '#ff6ec7' },
    { name: 'Forest',    hex: '#228b22' },
    { name: 'Fuchsia',   hex: '#ff00ff' },
    { name: 'Gold',      hex: '#ffd700' },
    { name: 'Honey',     hex: '#ebb02d' },
    { name: 'Indigo',    hex: '#6e7bff' },
    { name: 'Iron',      hex: '#808080' },
    { name: 'Jade',      hex: '#00a86b' },
    { name: 'Khaki',     hex: '#c3b091' },
    { name: 'Lava',      hex: '#ff4500' },
    { name: 'Lemon',     hex: '#fff44f' },
    { name: 'Lilac',     hex: '#c8a2c8' },
    { name: 'Lime',      hex: '#c6ff2e' },
    { name: 'Magenta',   hex: '#ff3dd4' },
    { name: 'Mauve',     hex: '#e0b0ff' },
    { name: 'Mint',      hex: '#a4ffd6' },
    { name: 'Moss',      hex: '#8a9a5b' },
    { name: 'Navy',      hex: '#001f6e' },
    { name: 'Neon',      hex: '#39ff14' },
    { name: 'Ochre',     hex: '#cc7722' },
    { name: 'Olive',     hex: '#a0a226' },
    { name: 'Onyx',      hex: '#353839' },
    { name: 'Orange',    hex: '#ff7a1f' },
    { name: 'Peach',     hex: '#ffaa88' },
    { name: 'Pine',      hex: '#01796f' },
    { name: 'Plasma',    hex: '#cc33ff' },
    { name: 'Plum',      hex: '#8e4585' },
    { name: 'Rose',      hex: '#ff5e8a' },
    { name: 'Ruby',      hex: '#e0115f' },
    { name: 'Rust',      hex: '#b7410e' },
    { name: 'Sage',      hex: '#b2ac88' },
    { name: 'Salmon',    hex: '#fa8072' },
    { name: 'Sand',      hex: '#c2b280' },
    { name: 'Sapphire',  hex: '#1a5cff' },
    { name: 'Scarlet',   hex: '#ff2400' },
    { name: 'Slate',     hex: '#708090' },
    { name: 'Steel',     hex: '#4682b4' },
    { name: 'Tangerine', hex: '#ff9966' },
    { name: 'Teal',      hex: '#2effb5' },
    { name: 'Turquoise', hex: '#40e0d0' },
    { name: 'Umber',     hex: '#635147' },
    { name: 'Violet',    hex: '#df73ff' },
    { name: 'Wine',      hex: '#722f37' },
    { name: 'Yellow',    hex: '#fff24d' },
  ];

  const DIFFICULTIES = {
    easy:    { count: 6,  cols: 3, rounds: 5, penalty: 1 },
    medium:  { count: 9,  cols: 3, rounds: 5, penalty: 2 },
    hard:    { count: 12, cols: 4, rounds: 5, penalty: 3 },
    insane:  { count: 16, cols: 4, rounds: 5, penalty: 4 },
    extreme: { count: 36, cols: 6, rounds: 3, penalty: 5 },
    ultra:   { count: 49, cols: 7, rounds: 3, penalty: 6 },
  };

  const state = {
    phase: 'idle',
    difficulty: 'medium',
    round: 0,
    totalRounds: 5,
    score: 0,
    streak: 0,
    bestStreak: 0,
    totalTime: 0,
    roundStart: 0,
    colors: [],      // shuffled tiles for this round
    sortedOrder: [],  // alphabetical target order
    nextIdx: 0,       // which sorted color to click next
    timerRAF: null,
    mistakes: 0,
  };

  const boardEl = document.getElementById('board');
  const orderBarEl = document.getElementById('orderBar');
  const roundNumEl = document.getElementById('roundNum');
  const totalRoundsEl = document.getElementById('totalRounds');
  const scoreNumEl = document.getElementById('scoreNum');
  const timerNumEl = document.getElementById('timerNum');
  const streakNumEl = document.getElementById('streakNum');
  const overlayEl = document.getElementById('overlay');
  const overlayTitleEl = document.getElementById('overlayTitle');
  const overlayMsgEl = document.getElementById('overlayMsg');
  const overlayBtnEl = document.getElementById('overlayBtn');
  const overlayStatsEl = document.getElementById('overlayStats');
  const overlaySettingsEl = document.getElementById('overlaySettings');
  const difficultySelectEl = document.getElementById('difficultySelect');
  const flashEl = document.getElementById('flash');

  // Audio
  let audioCtx = null;
  function audio() {
    if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; }
    return audioCtx;
  }
  function beep(freq, dur, type = 'square', gain = 0.06) {
    const ctx = audio(); if (!ctx) return;
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(gain, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    o.connect(g).connect(ctx.destination); o.start(); o.stop(ctx.currentTime + dur);
  }

  function sample(arr, n) {
    const pool = [...arr];
    const out = [];
    for (let i = 0; i < n && pool.length; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      out.push(pool.splice(idx, 1)[0]);
    }
    return out;
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function textColor(hex) {
    // Simple luminance check
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    return lum > 0.6 ? 'rgba(0,0,0,0.65)' : 'rgba(255,255,255,0.7)';
  }

  function renderOrderBar() {
    orderBarEl.innerHTML = '';
    state.sortedOrder.forEach((c, i) => {
      const pip = document.createElement('div');
      pip.className = 'order-pip';
      pip.style.background = c.hex;
      pip.style.color = c.hex;
      if (i < state.nextIdx) pip.classList.add('done');
      else if (i === state.nextIdx) pip.classList.add('next');
      pip.title = c.name;
      orderBarEl.appendChild(pip);
    });
  }

  function renderBoard() {
    const diff = DIFFICULTIES[state.difficulty];
    boardEl.innerHTML = '';
    boardEl.className = 'board cols-' + diff.cols;

    state.colors.forEach((c, i) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.style.background = c.hex;
      tile.style.color = textColor(c.hex);
      tile.style.boxShadow = `0 4px 16px ${c.hex}33`;
      tile.textContent = c.name;
      tile.dataset.idx = i;
      tile.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handleTap(c, tile);
      });
      boardEl.appendChild(tile);
    });
  }

  function updateHud() {
    roundNumEl.textContent = state.round;
    totalRoundsEl.textContent = state.totalRounds;
    scoreNumEl.textContent = state.score;
    streakNumEl.textContent = state.streak;
  }

  function startTimer() {
    state.roundStart = performance.now();
    function tick() {
      if (state.phase !== 'playing') return;
      const elapsed = (performance.now() - state.roundStart) / 1000;
      timerNumEl.textContent = elapsed.toFixed(1);
      timerNumEl.classList.toggle('danger', elapsed > 15);
      state.timerRAF = requestAnimationFrame(tick);
    }
    tick();
  }

  function stopTimer() {
    if (state.timerRAF) cancelAnimationFrame(state.timerRAF);
    return (performance.now() - state.roundStart) / 1000;
  }

  function flash(type) {
    flashEl.className = 'flash ' + type;
    setTimeout(() => flashEl.className = 'flash', 150);
  }

  function handleTap(color, tileEl) {
    if (state.phase !== 'playing') return;
    const expected = state.sortedOrder[state.nextIdx];

    if (color.name === expected.name) {
      // Correct!
      state.nextIdx++;
      state.streak++;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;

      // Score: base + speed bonus + streak bonus
      const elapsed = (performance.now() - state.roundStart) / 1000;
      const speedBonus = Math.max(0, Math.floor((20 - elapsed) * 2));
      const streakBonus = Math.min(state.streak * 2, 20);
      state.score += 10 + speedBonus + streakBonus;

      tileEl.classList.add('correct');
      setTimeout(() => tileEl.classList.add('cleared'), 200);
      flash('good');
      // Rising pitch per correct tap
      beep(400 + state.nextIdx * 60, 0.06, 'square', 0.06);
      renderOrderBar();
      updateHud();

      if (state.nextIdx >= state.sortedOrder.length) {
        // Round complete
        const roundTime = stopTimer();
        state.totalTime += roundTime;
        state.score += Math.max(0, Math.floor((30 - roundTime) * 5)); // time bonus
        beep(880, 0.1, 'square', 0.08);
        setTimeout(() => beep(1100, 0.12, 'square', 0.08), 100);

        setTimeout(() => {
          if (state.round < state.totalRounds) {
            newRound();
          } else {
            endGame();
          }
        }, 500);
      }
    } else {
      // Wrong!
      state.streak = 0;
      state.mistakes++;
      const diff = DIFFICULTIES[state.difficulty];
      state.score = Math.max(0, state.score - diff.penalty * 5);
      tileEl.classList.add('wrong');
      setTimeout(() => tileEl.classList.remove('wrong'), 300);
      flash('bad');
      beep(150, 0.15, 'sawtooth', 0.1);
      updateHud();
    }
  }

  function newRound() {
    state.round++;
    state.phase = 'playing';
    const diff = DIFFICULTIES[state.difficulty];

    // Pick random colors, shuffle for board, sort alphabetically for target
    state.colors = shuffle(sample(COLOR_POOL, diff.count));
    state.sortedOrder = [...state.colors].sort((a, b) => a.name.localeCompare(b.name));
    state.nextIdx = 0;

    renderBoard();
    renderOrderBar();
    updateHud();
    startTimer();
  }

  function startGame() {
    state.difficulty = difficultySelectEl.value;
    state.round = 0;
    state.score = 0;
    state.streak = 0;
    state.bestStreak = 0;
    state.totalTime = 0;
    state.mistakes = 0;
    state.totalRounds = DIFFICULTIES[state.difficulty].rounds;
    overlayEl.classList.add('hidden');
    newRound();
  }

  function endGame() {
    state.phase = 'done';
    overlayEl.classList.remove('hidden');
    overlayTitleEl.textContent = 'Sorted!';
    overlayMsgEl.textContent = `${state.totalRounds} rounds complete.`;
    overlayStatsEl.style.display = 'flex';
    overlayStatsEl.innerHTML = `
      <div>${state.score}<span>score</span></div>
      <div>${state.totalTime.toFixed(1)}s<span>total time</span></div>
      <div>${state.bestStreak}<span>best streak</span></div>
      <div>${state.mistakes}<span>mistakes</span></div>
    `;
    overlaySettingsEl.style.display = '';
    overlayBtnEl.textContent = 'Play Again';
  }

  overlayBtnEl.addEventListener('click', startGame);

  // Keyboard: press first letter of color name as shortcut
  window.addEventListener('keydown', (e) => {
    if (state.phase !== 'playing') {
      if (e.code === 'Space' || e.code === 'Enter') startGame();
      return;
    }
  });

  updateHud();
})();
</script>
</body>
</html>
