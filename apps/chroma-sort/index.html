<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #222235;
    --dim: #555570;
    --text: #e0dff0;
    --accent: #ff3366;
    --good: #33ff88;
    --warn: #ffaa22;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Anybody', sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow-x: hidden;
  }
  body {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,51,102,0.06), transparent 50%),
      var(--bg);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 16px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-weight: 800;
    font-size: clamp(22px, 4vw, 32px);
    color: var(--accent);
    letter-spacing: 0.04em;
  }
  header a {
    color: var(--dim);
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  header a:hover { color: var(--accent); }

  .hud {
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 14px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .hud .v { color: var(--text); font-weight: 400; }
  .hud .timer { color: var(--warn); }
  .hud .timer.danger { color: var(--accent); animation: timerPulse 0.4s infinite alternate; }
  @keyframes timerPulse {
    from { opacity: 1; }
    to { opacity: 0.5; }
  }

  /* target order display */
  .order-bar {
    display: flex;
    justify-content: center;
    gap: 4px;
    padding: 8px 16px;
    flex-wrap: wrap;
  }
  .order-pip {
    width: clamp(10px, 3vw, 28px);
    height: 6px;
    border-radius: 3px;
    opacity: 0.3;
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .order-pip.done { opacity: 1; transform: scaleY(1.3); box-shadow: 0 0 8px currentColor; }
  .order-pip.next { opacity: 0.8; animation: pipPulse 0.6s infinite alternate; }
  @keyframes pipPulse {
    from { transform: scaleY(1); }
    to { transform: scaleY(1.5); box-shadow: 0 0 10px currentColor; }
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .board {
    display: grid;
    gap: 10px;
    width: 100%;
    max-width: 500px;
  }
  .board.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .board.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .board.cols-5 { grid-template-columns: repeat(5, 1fr); }
  .board.cols-6 { grid-template-columns: repeat(6, 1fr); }
  .board.cols-7 { grid-template-columns: repeat(7, 1fr); }

  .tile {
    aspect-ratio: 1;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: clamp(11px, 2.5vw, 14px);
    font-weight: 400;
    color: rgba(0,0,0,0.6);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: transform 0.1s, box-shadow 0.15s, opacity 0.3s;
    position: relative;
    border: 2px solid transparent;
  }
  .tile:hover { transform: scale(1.04); }
  .tile:active { transform: scale(0.96); }
  .tile.cleared {
    opacity: 0.15;
    pointer-events: none;
    transform: scale(0.9);
  }
  .tile.wrong {
    animation: wrongShake 0.3s;
    border-color: #fff;
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .tile.correct {
    animation: correctPop 0.25s;
  }
  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(0.9); opacity: 0.15; }
  }

  /* overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay .card {
    background: var(--surface);
    border: 2px solid var(--border);
    padding: 32px 28px;
    max-width: 400px;
    text-align: center;
    border-radius: 12px;
  }
  .overlay h2 {
    font-weight: 800;
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .overlay p {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--dim);
    line-height: 1.6;
    margin: 10px 0 18px;
    letter-spacing: 0.04em;
  }
  .overlay .stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin: 16px 0 22px;
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    color: var(--text);
  }
  .overlay .stats span {
    color: var(--dim);
    font-size: 11px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 4px;
  }
  .overlay select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 8px 14px;
    margin: 8px 6px;
    border-radius: 6px;
    cursor: pointer;
  }
  .overlay button {
    font-family: 'Anybody', sans-serif;
    font-weight: 800;
    font-size: 16px;
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 12px 32px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.15s, transform 0.1s;
    margin-top: 10px;
  }
  .overlay button:hover { background: #ff1144; transform: scale(1.03); }

  .flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 90;
    mix-blend-mode: screen;
  }
  .flash.good { background: var(--good); opacity: 0.1; transition: opacity 0.05s; }
  .flash.bad { background: var(--accent); opacity: 0.15; transition: opacity 0.05s; }

  /* Arcade name entry */
  .arcade-name {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 18px 0 10px;
  }
  .arcade-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .arcade-slot .arr {
    width: 36px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--accent);
    font-size: 18px;
    transition: transform 0.1s, color 0.1s;
  }
  .arcade-slot .arr:hover { color: #fff; transform: scaleY(1.3); }
  .arcade-slot .letter {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 400;
    color: var(--accent);
    width: 44px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border: 2px solid var(--accent);
    border-radius: 6px;
    text-shadow: 0 0 12px var(--accent);
  }
  .arcade-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 4px;
  }

  /* Leaderboard */
  .leaderboard {
    margin: 14px 0 6px;
    width: 100%;
  }
  .lb-title {
    font-family: 'Anybody', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  .lb-row {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .lb-row:nth-child(even) { background: rgba(255,255,255,0.02); }
  .lb-row .rank { color: var(--dim); width: 24px; }
  .lb-row .lb-name { color: var(--text); flex: 1; text-align: left; margin-left: 6px; }
  .lb-row .lb-score { color: var(--warn); text-align: right; }
  .lb-row.gold .rank, .lb-row.gold .lb-name { color: #ffd700; }
  .lb-row.silver .rank, .lb-row.silver .lb-name { color: #c0c0c0; }
  .lb-row.bronze .rank, .lb-row.bronze .lb-name { color: #cd7f32; }
  .lb-row.you { background: rgba(255,51,102,0.12); }
  .lb-empty {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--dim);
    padding: 8px 0;
  }

  .board.cols-6 .tile, .board.cols-7 .tile {
    font-size: clamp(8px, 1.8vw, 11px);
    border-radius: 6px;
    letter-spacing: 0;
  }
  .board.cols-6, .board.cols-7 { max-width: 620px; gap: 6px; }
  .board.cols-8 { grid-template-columns: repeat(8, 1fr); }
  .board.cols-9 { grid-template-columns: repeat(9, 1fr); }
  .board.cols-10 { grid-template-columns: repeat(10, 1fr); }
  .board.cols-8, .board.cols-9, .board.cols-10 { max-width: 780px; gap: 4px; }
  .board.cols-8 .tile, .board.cols-9 .tile, .board.cols-10 .tile {
    font-size: clamp(6px, 1.3vw, 9px);
    border-radius: 4px;
    letter-spacing: 0;
    aspect-ratio: 1;
  }
  .board.cols-20 { grid-template-columns: repeat(20, 1fr); max-width: 100%; gap: 2px; }
  .board.cols-20 .tile {
    font-size: clamp(5px, 0.9vw, 7px);
    border-radius: 3px;
    letter-spacing: 0;
    aspect-ratio: 1;
    padding: 1px;
    line-height: 1.1;
    word-break: break-all;
    overflow: hidden;
  }

  @media (max-width: 480px) {
    .board { max-width: 360px; gap: 8px; }
    .board.cols-6, .board.cols-7 { max-width: 100%; gap: 4px; }
    .board.cols-8, .board.cols-9, .board.cols-10 { max-width: 100%; gap: 3px; }
    .board.cols-20 { gap: 1px; }
    .tile { font-size: 10px; border-radius: 8px; }
    .board.cols-6 .tile, .board.cols-7 .tile { font-size: 8px; border-radius: 4px; }
    .board.cols-8 .tile, .board.cols-9 .tile, .board.cols-10 .tile { font-size: 6px; border-radius: 3px; }
    .board.cols-20 .tile { font-size: 4.5px; border-radius: 2px; padding: 0; }
  }
</style>
</head>
<body>
  <header>
    <h1>Chroma Sort</h1>
    <div style="display:flex;align-items:center;gap:12px">

      <a href="https://sloppy.live">← sloppy.live</a>
    </div>
  </header>

  <div class="hud">
    <div>round <span class="v" id="roundNum">1</span>/<span class="v" id="totalRounds">5</span></div>
    <div>score <span class="v" id="scoreNum">0</span></div>
    <div>time <span class="v timer" id="timerNum">0.0</span>s</div>
    <div>streak <span class="v" id="streakNum">0</span></div>
  </div>

  <div class="order-bar" id="orderBar"></div>

  <main>
    <div class="board" id="board"></div>
  </main>

  <div class="flash" id="flash"></div>

  <div class="overlay" id="overlay">
    <div class="card">

      <p id="overlayMsg">Click the color tiles in alphabetical order.<br/>Fast fingers. Sharp eyes. No mercy.</p>
      <div id="overlaySettings">
        <div style="margin-bottom:8px">

            <option value="easy">Easy — 6 colors</option>
            <option value="medium" selected>Medium — 9 colors</option>
            <option value="hard">Hard — 12 colors</option>
            <option value="insane">Insane — 16 colors</option>
            <option value="extreme">Extreme — 36 colors</option>
            <option value="ultra">Ultra — 49 colors</option>
            <option value="disaster">DISASTER — 100 colors</option>
            <option value="legendary">LEGENDARY — 200 colors [Shake Well]</option>

        </div>
      </div>
      <div class="stats" id="overlayStats" style="display:none"></div>
      <div id="arcadeEntry" style="display:none">
        <div class="arcade-label">enter your initials</div>
        <div class="arcade-name" id="arcadeName">
          <div class="arcade-slot" data-slot="0">
            <div class="arr" data-dir="up">▲</div>
            <div class="letter">A</div>
            <div class="arr" data-dir="down">▼</div>
          </div>
          <div class="arcade-slot" data-slot="1">
            <div class="arr" data-dir="up">▲</div>
            <div class="letter">A</div>
            <div class="arr" data-dir="down">▼</div>
          </div>
          <div class="arcade-slot" data-slot="2">
            <div class="arr" data-dir="up">▲</div>
            <div class="letter">A</div>
            <div class="arr" data-dir="down">▼</div>
          </div>
        </div>
        <button id="arcadeSubmit" style="font-size:13px;padding:8px 24px;margin-top:4px">Submit Score</button>
      </div>
      <div class="leaderboard" id="leaderboard" style="display:none">
        <div class="lb-title">Top Scores</div>
        <div id="lbRows"></div>
      </div>
      <button id="overlayBtn">Start</button>
    </div>
  </div>

  // Audio
  let audioCtx = null;
  function audio() {
    if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; }
    return audioCtx;
  }
  function beep(freq, dur, type = 'square', gain = 0.06) {
    const ctx = audio(); if (!ctx) return;
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(gain, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    o.connect(g).connect(ctx.destination); o.start(); o.stop(ctx.currentTime + dur);
  }

  // === Procedural Music Engine — Dark Industrial ===
  const musicBtn = document.getElementById('musicBtn');
  let musicPlaying = false;
  let musicGain = null;
  let distNode = null;
  let musicInterval = null;
  let currentTrack = 0;

  const SCALES = {
    phrygian: [0, 1, 3, 5, 7, 8, 10],    // dark, metal
    locrian:  [0, 1, 3, 5, 6, 8, 10],     // dissonant, unstable
    harmMin:  [0, 2, 3, 5, 7, 8, 11],     // evil classical
    dimWhole: [0, 1, 3, 4, 6, 7, 9, 10],  // diminished whole-tone
    chromHex: [0, 3, 4, 7, 8, 11],        // augmented hexatonic
  };

  const TRACKS = [
    { name: 'BLOOD PRICE',    bpm: 155, key: 45, scale: 'phrygian', wave: 'sawtooth', bassWave: 'sawtooth' },
    { name: 'MACHINE WRATH',  bpm: 168, key: 40, scale: 'locrian',  wave: 'square',   bassWave: 'sawtooth' },
    { name: 'IRON PSALM',     bpm: 145, key: 48, scale: 'harmMin',  wave: 'sawtooth', bassWave: 'square'   },
    { name: 'SLAG FURNACE',   bpm: 175, key: 43, scale: 'dimWhole', wave: 'sawtooth', bassWave: 'sawtooth' },
    { name: 'TERMINAL NERVE', bpm: 160, key: 41, scale: 'chromHex', wave: 'square',   bassWave: 'sawtooth' },
  ];

  function midiToFreq(n) { return 440 * Math.pow(2, (n - 69) / 12); }

  function scaleNote(scale, degree, octaveShift) {
    const s = SCALES[scale];
    const oct = Math.floor(degree / s.length);
    const idx = ((degree % s.length) + s.length) % s.length;
    return s[idx] + (oct + octaveShift) * 12;
  }

  // Distortion curve for WaveShaperNode
  function makeDistCurve(amount) {
    const n = 256, curve = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / n - 1;
      curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
    }
    return curve;
  }

  function playNote(ctx, dest, freq, start, dur, type, vol) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, start);
    g.gain.setValueAtTime(vol, start);
    g.gain.setValueAtTime(vol, start + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o.connect(g).connect(dest);
    o.start(start);
    o.stop(start + dur);
  }

  // Distorted synth — two detuned saws through waveshaper
  function playDirtySaw(ctx, dest, freq, start, dur, vol, distAmt) {
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    const g = ctx.createGain();
    const dist = ctx.createWaveShaper();
    dist.curve = makeDistCurve(distAmt || 20);
    dist.oversample = '2x';
    o1.type = 'sawtooth'; o2.type = 'sawtooth';
    o1.frequency.setValueAtTime(freq, start);
    o2.frequency.setValueAtTime(freq * 1.005, start); // detune
    g.gain.setValueAtTime(vol, start);
    g.gain.setValueAtTime(vol, start + dur * 0.5);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o1.connect(dist); o2.connect(dist);
    dist.connect(g).connect(dest);
    o1.start(start); o1.stop(start + dur);
    o2.start(start); o2.stop(start + dur);
  }

  // Industrial noise hit
  function noiseHit(ctx, dest, start, dur, vol, filterFreq, filterQ) {
    const bufSize = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1);
    const src = ctx.createBufferSource();
    const g = ctx.createGain();
    const f = ctx.createBiquadFilter();
    const dist = ctx.createWaveShaper();
    dist.curve = makeDistCurve(40);
    src.buffer = buf;
    f.type = 'bandpass'; f.frequency.value = filterFreq || 2000; f.Q.value = filterQ || 2;
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    src.connect(f).connect(dist).connect(g).connect(dest);
    src.start(start);
  }

  let beatCount = 0;
  let melodyPos = 0;
  let melodySeq = [];

  function generateMelody(track) {
    const len = 16;
    const seq = [];
    let pos = Math.floor(Math.random() * 4);
    for (let i = 0; i < len; i++) {
      if (Math.random() < 0.2) { seq.push(null); continue; } // rests add aggression
      const step = Math.floor(Math.random() * 7) - 3; // wider leaps
      pos = Math.max(-3, Math.min(9, pos + step));
      seq.push(pos);
    }
    return seq;
  }

  // 0 = normal, 1 = ultra, 2 = disaster
  function getIntensity() {
    if (state.difficulty === 'legendary') return 3;
    if (state.difficulty === 'disaster') return 2;
    if (state.difficulty === 'ultra') return 1;
    return 0;
  }

  function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

  function scheduleBeat() {
    const ctx = audio();
    if (!ctx || !musicGain) return;
    const intensity = getIntensity();
    const track = TRACKS[currentTrack];
    const bpm = track.bpm + (intensity === 1 ? 15 : intensity === 2 ? 30 : intensity >= 3 ? 45 : 0);
    const beatDur = 60 / bpm;
    const now = ctx.currentTime;
    const barBeat = beatCount % 4;
    const bar = Math.floor(beatCount / 4);

    // === DISTORTED BASS — chugging sawtooth riff ===
    const bassHits = (barBeat === 0 || barBeat === 2 || (intensity >= 1 && barBeat === 3));
    if (bassHits) {
      const bassOff = barBeat === 2 ? (Math.random() < 0.4 ? 1 : 0) : (barBeat === 3 ? -2 : 0);
      const bassNote = track.key + scaleNote(track.scale, bassOff, 0);
      const bassVol = 0.06 + intensity * 0.01;
      playDirtySaw(ctx, musicGain, midiToFreq(bassNote), now, beatDur * 1.5, bassVol, 25 + intensity * 15);
      // Sub layer
      if (intensity >= 1) {
        playNote(ctx, musicGain, midiToFreq(bassNote - 12), now, beatDur * 1.2, 'sine', 0.04);
      }
    }
    // 8th note chug pattern on all beats in ultra+
    if (intensity >= 1) {
      const chugNote = track.key + scaleNote(track.scale, 0, 0);
      playDirtySaw(ctx, musicGain, midiToFreq(chugNote), now + beatDur * 0.5, beatDur * 0.3, 0.03, 30);
    }

    // === INDUSTRIAL KICK — distorted, heavy ===
    const kickO = ctx.createOscillator();
    const kickG = ctx.createGain();
    const kickDist = ctx.createWaveShaper();
    kickDist.curve = makeDistCurve(intensity >= 3 ? 80 : intensity >= 2 ? 50 : 20);
    kickO.frequency.setValueAtTime(intensity >= 3 ? 240 : intensity >= 2 ? 200 : 160, now);
    kickO.frequency.exponentialRampToValueAtTime(25, now + 0.12);
    const kickVol = (barBeat === 0 ? 0.12 : 0.07) + intensity * 0.02;
    kickG.gain.setValueAtTime(kickVol, now);
    kickG.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
    kickO.connect(kickDist).connect(kickG).connect(musicGain);
    kickO.start(now); kickO.stop(now + 0.15);

    // Double kick in ultra+
    if (intensity >= 1 && (barBeat === 1 || barBeat === 3)) {
      const k2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      const d2 = ctx.createWaveShaper();
      d2.curve = makeDistCurve(30);
      k2.frequency.setValueAtTime(140, now + beatDur * 0.25);
      k2.frequency.exponentialRampToValueAtTime(20, now + beatDur * 0.25 + 0.1);
      g2.gain.setValueAtTime(0.06, now + beatDur * 0.25);
      g2.gain.exponentialRampToValueAtTime(0.0001, now + beatDur * 0.25 + 0.12);
      k2.connect(d2).connect(g2).connect(musicGain);
      k2.start(now + beatDur * 0.25); k2.stop(now + beatDur * 0.25 + 0.12);
    }
    // Machine-gun kick in disaster+ every other bar (every bar in legendary)
    if (intensity >= 2 && (intensity >= 3 || bar % 2 === 1) && barBeat === 0) {
      for (let i = 1; i < (intensity >= 3 ? 6 : 4); i++) {
        const kk = ctx.createOscillator();
        const kg = ctx.createGain();
        const t = now + i * (beatDur / 4);
        kk.frequency.setValueAtTime(180, t);
        kk.frequency.exponentialRampToValueAtTime(25, t + 0.08);
        kg.gain.setValueAtTime(0.06, t);
        kg.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
        kk.connect(kg).connect(musicGain);
        kk.start(t); kk.stop(t + 0.1);
      }
    }

    // === INDUSTRIAL SNARE — noise burst through distortion ===
    const snareHit = intensity >= 1
      ? (barBeat === 1 || barBeat === 3)
      : (barBeat === 2);
    if (snareHit) {
      noiseHit(ctx, musicGain, now, 0.1, 0.06 + intensity * 0.02, 2500, 1.5);
      // Snare body — pitched down sine thud
      const st = ctx.createOscillator();
      const sg = ctx.createGain();
      st.type = 'triangle'; st.frequency.setValueAtTime(250, now);
      st.frequency.exponentialRampToValueAtTime(100, now + 0.06);
      sg.gain.setValueAtTime(0.05, now);
      sg.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
      st.connect(sg).connect(musicGain);
      st.start(now); st.stop(now + 0.08);
    }

    // === METALLIC HI-HAT — harsh, filtered noise ===
    if (barBeat % 1 === 0) { // every beat
      noiseHit(ctx, musicGain, now, 0.04, 0.03, 9000, 5);
      // 16th note hat
      if (intensity >= 1) {
        noiseHit(ctx, musicGain, now + beatDur * 0.5, 0.03, 0.02, 10000, 8);
      }
      // 32nd note hats in disaster
      if (intensity >= 2) {
        noiseHit(ctx, musicGain, now + beatDur * 0.25, 0.02, 0.015, 11000, 10);
        noiseHit(ctx, musicGain, now + beatDur * 0.75, 0.02, 0.015, 11000, 10);
      }
    }

    // === INDUSTRIAL CLANG — random metallic hits ===
    if (Math.random() < (intensity >= 3 ? 0.45 : intensity >= 2 ? 0.3 : intensity >= 1 ? 0.15 : 0.08)) {
      const clangFreq = randInt(800, 3000);
      const co = ctx.createOscillator();
      const cg = ctx.createGain();
      const cf = ctx.createBiquadFilter();
      co.type = 'square';
      co.frequency.setValueAtTime(clangFreq, now);
      co.frequency.exponentialRampToValueAtTime(clangFreq * 0.3, now + 0.06);
      cf.type = 'bandpass'; cf.frequency.value = clangFreq; cf.Q.value = 15;
      cg.gain.setValueAtTime(0.025, now);
      cg.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
      co.connect(cf).connect(cg).connect(musicGain);
      co.start(now); co.stop(now + 0.08);
    }

    // === AGGRESSIVE SAW LEAD — melody through distortion ===
    const notesPerBeat = intensity >= 3 ? 6 : intensity >= 2 ? 4 : (intensity >= 1 ? 3 : 2);
    for (let sub = 0; sub < notesPerBeat; sub++) {
      const mIdx = melodyPos % melodySeq.length;
      const deg = melodySeq[mIdx];
      melodyPos++;
      if (deg === null) continue;
      const note = track.key + scaleNote(track.scale, deg, 1);
      const t = now + sub * (beatDur / notesPerBeat);
      const melVol = 0.025 + intensity * 0.005;
      playDirtySaw(ctx, musicGain, midiToFreq(note), t, beatDur * 0.3, melVol, 15 + intensity * 10);
    }

    // === POWER CHORD STABS — ultra+ ===
    if (intensity >= 1 && barBeat === 0 && bar % 2 === 0) {
      const root = track.key + scaleNote(track.scale, 0, 1);
      const fifth = root + 7;
      const oct = root + 12;
      [root, fifth, oct].forEach(n => {
        playDirtySaw(ctx, musicGain, midiToFreq(n), now, beatDur * 2, 0.02, 35);
      });
    }

    // === COUNTERMELODY — dissonant high saw ===
    if (intensity >= 1 && beatCount % 2 === 1) {
      const cDeg = melodySeq[(melodyPos + 5) % melodySeq.length];
      if (cDeg !== null) {
        const cNote = track.key + scaleNote(track.scale, (cDeg || 0) + 3, 2);
        playDirtySaw(ctx, musicGain, midiToFreq(cNote), now, beatDur * 0.25, 0.015, 20);
      }
    }

    // === DESCENDING ARPEGGIO — every 4 bars, like Ultrakill breakdowns ===
    const arpTrigger = intensity >= 2 ? (beatCount % 8 === 0) : (beatCount % 16 === 0);
    if (arpTrigger) {
      const arpDegs = [7, 6, 4, 3, 1, 0, -1, -3];
      const speed = intensity >= 2 ? 0.035 : 0.05;
      arpDegs.forEach((d, i) => {
        const n = track.key + scaleNote(track.scale, d, 2);
        playDirtySaw(ctx, musicGain, midiToFreq(n), now + i * speed, 0.12, 0.02, 25);
      });
    }

    // === ACID SCREECH — disaster: resonant filter sweep ===
    if (intensity >= 2 && barBeat === 0 && bar % 3 === 0) {
      const acidNote = track.key + scaleNote(track.scale, randInt(-2, 3), 0);
      const ao = ctx.createOscillator();
      const ag = ctx.createGain();
      const af = ctx.createBiquadFilter();
      const ad = ctx.createWaveShaper();
      ad.curve = makeDistCurve(50);
      ao.type = 'sawtooth';
      ao.frequency.value = midiToFreq(acidNote);
      af.type = 'lowpass'; af.Q.value = 18;
      af.frequency.setValueAtTime(200, now);
      af.frequency.exponentialRampToValueAtTime(4000, now + beatDur * 2);
      af.frequency.exponentialRampToValueAtTime(150, now + beatDur * 4);
      ag.gain.setValueAtTime(0.035, now);
      ag.gain.exponentialRampToValueAtTime(0.0001, now + beatDur * 4);
      ao.connect(ad).connect(af).connect(ag).connect(musicGain);
      ao.start(now); ao.stop(now + beatDur * 4);
    }

    // === NOISE SWEEP — disaster: rising industrial tension ===
    if (intensity >= 2 && beatCount % 32 === 0) {
      const nLen = beatDur * 4;
      const nBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * nLen), ctx.sampleRate);
      const nd = nBuf.getChannelData(0);
      for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
      const ns = ctx.createBufferSource();
      const ng = ctx.createGain();
      const nf = ctx.createBiquadFilter();
      ns.buffer = nBuf;
      nf.type = 'bandpass'; nf.Q.value = 3;
      nf.frequency.setValueAtTime(200, now);
      nf.frequency.exponentialRampToValueAtTime(6000, now + nLen);
      ng.gain.setValueAtTime(0.0001, now);
      ng.gain.linearRampToValueAtTime(0.04, now + nLen * 0.8);
      ng.gain.exponentialRampToValueAtTime(0.0001, now + nLen);
      ns.connect(nf).connect(ng).connect(musicGain);
      ns.start(now);
    }

    // === GLITCH STUTTER — random pitch-bent distorted blips ===
    if (Math.random() < (intensity >= 3 ? 0.4 : intensity >= 2 ? 0.25 : intensity >= 1 ? 0.12 : 0.05)) {
      const gf = midiToFreq(track.key + randInt(12, 30));
      const go = ctx.createOscillator();
      const gg = ctx.createGain();
      const gd = ctx.createWaveShaper();
      gd.curve = makeDistCurve(60);
      go.type = 'sawtooth';
      go.frequency.setValueAtTime(gf, now);
      go.frequency.exponentialRampToValueAtTime(gf * (Math.random() < 0.5 ? 3 : 0.25), now + 0.05);
      gg.gain.setValueAtTime(0.02, now);
      gg.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
      go.connect(gd).connect(gg).connect(musicGain);
      go.start(now); go.stop(now + 0.06);
    }

    // === LEGENDARY-ONLY: WAR SIREN — sweeping distorted oscillator ===
    if (intensity >= 3 && beatCount % 16 === 0) {
      const sirenO = ctx.createOscillator();
      const sirenG = ctx.createGain();
      const sirenD = ctx.createWaveShaper();
      sirenD.curve = makeDistCurve(70);
      sirenO.type = 'sawtooth';
      const sirenLen = beatDur * 6;
      sirenO.frequency.setValueAtTime(200, now);
      sirenO.frequency.exponentialRampToValueAtTime(2000, now + sirenLen * 0.5);
      sirenO.frequency.exponentialRampToValueAtTime(150, now + sirenLen);
      sirenG.gain.setValueAtTime(0.0001, now);
      sirenG.gain.linearRampToValueAtTime(0.03, now + sirenLen * 0.3);
      sirenG.gain.exponentialRampToValueAtTime(0.0001, now + sirenLen);
      sirenO.connect(sirenD).connect(sirenG).connect(musicGain);
      sirenO.start(now); sirenO.stop(now + sirenLen);
    }

    // === LEGENDARY-ONLY: FEEDBACK DRONE — dissonant sustained tone ===
    if (intensity >= 3 && barBeat === 0 && bar % 4 === 0) {
      const droneNote = track.key + scaleNote(track.scale, 1, 1); // minor 2nd = max tension
      const do1 = ctx.createOscillator();
      const do2 = ctx.createOscillator();
      const dg = ctx.createGain();
      const dd = ctx.createWaveShaper();
      const df = ctx.createBiquadFilter();
      dd.curve = makeDistCurve(90);
      do1.type = 'sawtooth'; do2.type = 'sawtooth';
      do1.frequency.value = midiToFreq(droneNote);
      do2.frequency.value = midiToFreq(droneNote) * 1.01; // beating
      df.type = 'lowpass'; df.frequency.value = 1500; df.Q.value = 8;
      const droneLen = beatDur * 8;
      dg.gain.setValueAtTime(0.0001, now);
      dg.gain.linearRampToValueAtTime(0.025, now + droneLen * 0.4);
      dg.gain.exponentialRampToValueAtTime(0.0001, now + droneLen);
      do1.connect(dd); do2.connect(dd);
      dd.connect(df).connect(dg).connect(musicGain);
      do1.start(now); do1.stop(now + droneLen);
      do2.start(now); do2.stop(now + droneLen);
    }

    // === LEGENDARY-ONLY: BLAST BEAT SNARE — 16th note snare fills ===
    if (intensity >= 3 && bar % 4 === 3 && barBeat >= 2) {
      for (let i = 0; i < 4; i++) {
        const t2 = now + i * (beatDur / 4);
        noiseHit(ctx, musicGain, t2, 0.06, 0.04, 3500, 3);
      }
    }

    // === LEGENDARY-ONLY: OCTAVE DOUBLING on melody ===
    if (intensity >= 3 && beatCount % 2 === 0) {
      const mIdx = (melodyPos - 1 + melodySeq.length) % melodySeq.length;
      const deg = melodySeq[mIdx];
      if (deg !== null) {
        const note = track.key + scaleNote(track.scale, deg, 2);
        playDirtySaw(ctx, musicGain, midiToFreq(note), now, beatDur * 0.2, 0.018, 50);
      }
    }

    beatCount++;

    const regenInterval = intensity >= 3 ? 6 : intensity >= 2 ? 8 : (intensity >= 1 ? 12 : 16);
    if (beatCount % regenInterval === 0 && Math.random() < 0.6) {
      melodySeq = generateMelody(track);
      melodyPos = 0;
    }
  }

  function startMusic() {
    const ctx = audio();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();

    // Master chain: gain → light compressor-style limiter → destination
    musicGain = ctx.createGain();
    musicGain.gain.value = 0.55;
    const limiter = ctx.createDynamicsCompressor();
    limiter.threshold.value = -6;
    limiter.knee.value = 3;
    limiter.ratio.value = 12;
    limiter.attack.value = 0.001;
    limiter.release.value = 0.05;
    musicGain.connect(limiter).connect(ctx.destination);

    beatCount = 0;
    melodyPos = 0;
    melodySeq = generateMelody(TRACKS[currentTrack]);

    const intensity = getIntensity();
    const bpm = TRACKS[currentTrack].bpm + (intensity === 1 ? 15 : intensity === 2 ? 30 : intensity >= 3 ? 45 : 0);
    const beatDur = 60 / bpm;
    musicInterval = setInterval(scheduleBeat, beatDur * 1000);
    musicPlaying = true;
    musicBtn.textContent = '♪ ' + TRACKS[currentTrack].name;
    musicBtn.style.color = 'var(--accent)';
    musicBtn.style.borderColor = 'var(--accent)';
  }

  function stopMusic() {
    if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
    if (musicGain) {
      try { musicGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3); } catch {}
      musicGain = null;
    }
    musicPlaying = false;
    musicBtn.textContent = '♪ OFF';
    musicBtn.style.color = 'var(--dim)';
    musicBtn.style.borderColor = 'var(--border)';
  }

  function nextTrack() {
    const wasPlaying = musicPlaying;
    if (wasPlaying) stopMusic();
    currentTrack = (currentTrack + 1) % TRACKS.length;
    if (wasPlaying) setTimeout(startMusic, 100);
  }

  musicBtn.addEventListener('click', (e) => {
    if (e.shiftKey || e.ctrlKey) { nextTrack(); return; }
    if (musicPlaying) stopMusic(); else startMusic();
  });

  // Double-click or long press to skip track
  let pressTimer = null;
  musicBtn.addEventListener('pointerdown', () => {
    pressTimer = setTimeout(() => { nextTrack(); pressTimer = null; }, 500);
  });
  musicBtn.addEventListener('pointerup', () => { if (pressTimer) clearTimeout(pressTimer); });
  musicBtn.addEventListener('dblclick', (e) => { e.preventDefault(); nextTrack(); });

  function sample(arr, n) {
    const pool = [...arr];
    const out = [];
    for (let i = 0; i < n && pool.length; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      out.push(pool.splice(idx, 1)[0]);
    }
    return out;
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function textColor(hex) {
    // Simple luminance check
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    return lum > 0.6 ? 'rgba(0,0,0,0.65)' : 'rgba(255,255,255,0.7)';
  }

  function renderOrderBar() {
    orderBarEl.innerHTML = '';
    state.sortedOrder.forEach((c, i) => {
      const pip = document.createElement('div');
      pip.className = 'order-pip';
      pip.style.background = c.hex;
      pip.style.color = c.hex;
      if (i < state.nextIdx) pip.classList.add('done');
      else if (i === state.nextIdx) pip.classList.add('next');
      pip.title = c.name;
      orderBarEl.appendChild(pip);
    });
  }

  function renderBoard() {
    const diff = DIFFICULTIES[state.difficulty];
    boardEl.innerHTML = '';
    boardEl.className = 'board cols-' + diff.cols;

    state.colors.forEach((c, i) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.style.background = c.hex;
      tile.style.color = textColor(c.hex);
      tile.style.boxShadow = `0 4px 16px ${c.hex}33`;
      tile.textContent = c.name;
      tile.dataset.idx = i;
      tile.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handleTap(c, tile);
      });
      boardEl.appendChild(tile);
    });
  }

  function updateHud() {
    roundNumEl.textContent = state.round;
    totalRoundsEl.textContent = state.totalRounds;
    scoreNumEl.textContent = state.score;
    streakNumEl.textContent = state.streak;
  }

  function startTimer() {
    state.roundStart = performance.now();
    function tick() {
      if (state.phase !== 'playing') return;
      const elapsed = (performance.now() - state.roundStart) / 1000;
      timerNumEl.textContent = elapsed.toFixed(1);
      timerNumEl.classList.toggle('danger', elapsed > 15);
      state.timerRAF = requestAnimationFrame(tick);
    }
    tick();
  }

  function stopTimer() {
    if (state.timerRAF) cancelAnimationFrame(state.timerRAF);
    return (performance.now() - state.roundStart) / 1000;
  }

  function flash(type) {
    flashEl.className = 'flash ' + type;
    setTimeout(() => flashEl.className = 'flash', 150);
  }

  function handleTap(color, tileEl) {
    if (state.phase !== 'playing') return;
    const expected = state.sortedOrder[state.nextIdx];

    if (color.name === expected.name) {
      // Correct!
      state.nextIdx++;
      state.streak++;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;

      // Score: base + speed bonus + streak bonus
      const elapsed = (performance.now() - state.roundStart) / 1000;
      const speedBonus = Math.max(0, Math.floor((20 - elapsed) * 2));
      const streakBonus = Math.min(state.streak * 2, 20);
      state.score += 10 + speedBonus + streakBonus;

      tileEl.classList.add('correct');
      setTimeout(() => tileEl.classList.add('cleared'), 200);
      flash('good');
      // Rising pitch per correct tap
      beep(400 + state.nextIdx * 60, 0.06, 'square', 0.06);
      renderOrderBar();
      updateHud();

      if (state.nextIdx >= state.sortedOrder.length) {
        // Round complete
        const roundTime = stopTimer();
        state.totalTime += roundTime;
        state.score += Math.max(0, Math.floor((30 - roundTime) * 5)); // time bonus
        beep(880, 0.1, 'square', 0.08);
        setTimeout(() => beep(1100, 0.12, 'square', 0.08), 100);

        setTimeout(() => {
          if (state.round < state.totalRounds) {
            newRound();
          } else {
            endGame();
          }
        }, 500);
      }
    } else {
      // Wrong!
      state.streak = 0;
      state.mistakes++;
      const diff = DIFFICULTIES[state.difficulty];
      state.score = Math.max(0, state.score - diff.penalty * 5);
      tileEl.classList.add('wrong');
      setTimeout(() => tileEl.classList.remove('wrong'), 300);
      flash('bad');
      beep(150, 0.15, 'sawtooth', 0.1);
      updateHud();
    }
  }

  function newRound() {
    state.round++;
    state.phase = 'playing';
    const diff = DIFFICULTIES[state.difficulty];

    // Pick random colors, shuffle for board, sort alphabetically for target
    state.colors = shuffle(sample(COLOR_POOL, diff.count));
    state.sortedOrder = [...state.colors].sort((a, b) => a.name.localeCompare(b.name));
    state.nextIdx = 0;

    renderBoard();
    renderOrderBar();
    updateHud();
    startTimer();
  }

  function startGame() {
    state.difficulty = difficultySelectEl.value;
    state.round = 0;
    state.score = 0;
    state.streak = 0;
    state.bestStreak = 0;
    state.totalTime = 0;
    state.mistakes = 0;
    state.totalRounds = DIFFICULTIES[state.difficulty].rounds;
    overlayEl.classList.add('hidden');
    newRound();
  }

  // === Leaderboard ===
  const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 '.split('');
  const arcadeEntryEl = document.getElementById('arcadeEntry');
  const arcadeNameEl = document.getElementById('arcadeName');
  const arcadeSubmitEl = document.getElementById('arcadeSubmit');
  const leaderboardEl = document.getElementById('leaderboard');
  const lbRowsEl = document.getElementById('lbRows');
  const arcadeSlots = arcadeNameEl.querySelectorAll('.arcade-slot');
  let arcadeLetters = [0, 0, 0]; // indices into ALPHA
  let lastSubmittedIdx = -1; // track which entry was just submitted

  function getLBKey(diff) { return `chromasort_lb_${diff}`; }

  function loadLB(diff) {
    try {
      const raw = localStorage.getItem(getLBKey(diff));
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function saveLB(diff, board) {
    localStorage.setItem(getLBKey(diff), JSON.stringify(board.slice(0, 15)));
  }

  function qualifiesForLB(diff, score) {
    const board = loadLB(diff);
    return board.length < 10 || score > (board[board.length - 1]?.score ?? 0);
  }

  function addToLB(diff, name, score, time) {
    const board = loadLB(diff);
    const entry = { name, score, time: +time.toFixed(1), date: Date.now() };
    board.push(entry);
    board.sort((a, b) => b.score - a.score || a.time - b.time);
    const trimmed = board.slice(0, 15);
    saveLB(diff, trimmed);
    return trimmed.findIndex(e => e === entry);
  }

  function renderLB(diff, highlightIdx) {
    const board = loadLB(diff);
    leaderboardEl.style.display = board.length ? '' : 'none';
    if (!board.length) { lbRowsEl.innerHTML = ''; return; }

    lbRowsEl.innerHTML = board.slice(0, 10).map((e, i) => {
      const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const you = i === highlightIdx ? ' you' : '';
      return `<div class="lb-row ${cls}${you}">
        <span class="rank">${i + 1}.</span>
        <span class="lb-name">${escHTML(e.name)}</span>
        <span class="lb-score">${e.score}</span>
      </div>`;
    }).join('');
  }

  function escHTML(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateArcadeDisplay() {
    arcadeSlots.forEach((slot, i) => {
      slot.querySelector('.letter').textContent = ALPHA[arcadeLetters[i]];
    });
  }

  function getArcadeName() {
    return arcadeLetters.map(i => ALPHA[i]).join('').trimEnd() || 'AAA';
  }

  // Restore last used name
  try {
    const saved = localStorage.getItem('chromasort_name');
    if (saved && saved.length === 3) {
      for (let i = 0; i < 3; i++) {
        const idx = ALPHA.indexOf(saved[i]);
        if (idx >= 0) arcadeLetters[i] = idx;
      }
    }
  } catch {}

  // Arrow clicks
  arcadeNameEl.addEventListener('click', (e) => {
    const arr = e.target.closest('.arr');
    if (!arr) return;
    const slot = +arr.closest('.arcade-slot').dataset.slot;
    const dir = arr.dataset.dir === 'up' ? -1 : 1;
    arcadeLetters[slot] = (arcadeLetters[slot] + dir + ALPHA.length) % ALPHA.length;
    updateArcadeDisplay();
    beep(600 + arcadeLetters[slot] * 15, 0.03, 'square', 0.04);
  });

  arcadeSubmitEl.addEventListener('click', () => {
    const name = getArcadeName();
    localStorage.setItem('chromasort_name', name);
    const idx = addToLB(state.difficulty, name, state.score, state.totalTime);
    lastSubmittedIdx = idx;
    arcadeEntryEl.style.display = 'none';
    renderLB(state.difficulty, idx);
    beep(880, 0.08, 'square', 0.06);
    setTimeout(() => beep(1100, 0.1, 'square', 0.06), 80);
  });

  function endGame() {
    state.phase = 'done';
    overlayEl.classList.remove('hidden');
    overlayTitleEl.textContent = 'Sorted!';
    overlayMsgEl.textContent = `${state.totalRounds} round${state.totalRounds === 1 ? '' : 's'} complete.`;
    overlayStatsEl.style.display = 'flex';
    overlayStatsEl.innerHTML = `
      <div>${state.score}<span>score</span></div>
      <div>${state.totalTime.toFixed(1)}s<span>total time</span></div>
      <div>${state.bestStreak}<span>best streak</span></div>
      <div>${state.mistakes}<span>mistakes</span></div>
    `;
    overlaySettingsEl.style.display = '';
    overlayBtnEl.textContent = 'Play Again';
    lastSubmittedIdx = -1;

    // Show arcade entry if qualifies
    if (qualifiesForLB(state.difficulty, state.score) && state.score > 0) {
      arcadeEntryEl.style.display = '';
      updateArcadeDisplay();
    } else {
      arcadeEntryEl.style.display = 'none';
    }

    // Always show leaderboard if there are entries
    renderLB(state.difficulty, -1);
  }

  overlayBtnEl.addEventListener('click', () => {
    arcadeEntryEl.style.display = 'none';
    leaderboardEl.style.display = 'none';
    startGame();
  });

  // Keyboard: press first letter of color name as shortcut
  window.addEventListener('keydown', (e) => {
    if (state.phase !== 'playing') {
      if (e.code === 'Space' || e.code === 'Enter') {
        if (arcadeEntryEl.style.display !== 'none') {
          arcadeSubmitEl.click();
        } else {
          startGame();
        }
      }
      return;
    }
  });

  // Update leaderboard when difficulty changes
  difficultySelectEl.addEventListener('change', () => {
    renderLB(difficultySelectEl.value, -1);
  });

  // Show leaderboard for current difficulty on start screen
  renderLB('medium', -1);
  updateHud();
})();
</script>
</body>
</html>
