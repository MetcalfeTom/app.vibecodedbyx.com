<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Chroma Sort</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎨" />
<meta name="description" content="Click the colors in alphabetical order. Fast." />
<meta property="og:title" content="Chroma Sort" />
<meta property="og:description" content="Click the colors in alphabetical order. Fast." />
<meta property="og:url" content="https://sloppy.live/chroma-sort" />
<meta property="og:image" content="https://sloppy.live/screenshots/chroma-sort.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #222235;
    --dim: #555570;
    --text: #e0dff0;
    --accent: #ff3366;
    --good: #33ff88;
    --warn: #ffaa22;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Anybody', sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow-x: hidden;
  }
  body {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,51,102,0.06), transparent 50%),
      var(--bg);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 16px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-weight: 800;
    font-size: clamp(22px, 4vw, 32px);
    color: var(--accent);
    letter-spacing: 0.04em;
  }
  header a {
    color: var(--dim);
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  header a:hover { color: var(--accent); }

  .hud {
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 14px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .hud .v { color: var(--text); font-weight: 400; }
  .hud .timer { color: var(--warn); }
  .hud .timer.danger { color: var(--accent); animation: timerPulse 0.4s infinite alternate; }
  @keyframes timerPulse {
    from { opacity: 1; }
    to { opacity: 0.5; }
  }

  /* target order display */
  .order-bar {
    display: flex;
    justify-content: center;
    gap: 4px;
    padding: 8px 16px;
    flex-wrap: wrap;
  }
  .order-pip {
    width: clamp(10px, 3vw, 28px);
    height: 6px;
    border-radius: 3px;
    opacity: 0.3;
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .order-pip.done { opacity: 1; transform: scaleY(1.3); box-shadow: 0 0 8px currentColor; }
  .order-pip.next { opacity: 0.8; animation: pipPulse 0.6s infinite alternate; }
  @keyframes pipPulse {
    from { transform: scaleY(1); }
    to { transform: scaleY(1.5); box-shadow: 0 0 10px currentColor; }
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .board {
    display: grid;
    gap: 10px;
    width: 100%;
    max-width: 500px;
  }
  .board.cols-2 { grid-template-columns: repeat(2, 1fr); max-width: 280px; gap: 14px; }
  .board.cols-2 .tile { font-size: 18px; border-radius: 14px; aspect-ratio: 1; }
  .board.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .board.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .board.cols-5 { grid-template-columns: repeat(5, 1fr); }
  .board.cols-6 { grid-template-columns: repeat(6, 1fr); }
  .board.cols-7 { grid-template-columns: repeat(7, 1fr); }

  .tile {
    aspect-ratio: 1;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: clamp(11px, 2.5vw, 14px);
    font-weight: 400;
    color: rgba(0,0,0,0.6);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: transform 0.1s, box-shadow 0.15s, opacity 0.3s;
    position: relative;
    border: 2px solid transparent;
  }
  /* Colorblind mode patterns */
  .cb-mode .tile::after {
    content: attr(data-cb);
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(18px, 4vw, 28px);
    line-height: 1;
    pointer-events: none;
    opacity: 0.55;
    z-index: 1;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  .cb-mode .tile { border: 2px solid rgba(255,255,255,0.25); }
  .cb-mode .board.cols-6 .tile::after, .cb-mode .board.cols-7 .tile::after { font-size: clamp(14px, 2.5vw, 20px); }
  .cb-mode .board.cols-8 .tile::after, .cb-mode .board.cols-9 .tile::after, .cb-mode .board.cols-10 .tile::after { font-size: clamp(10px, 1.8vw, 16px); }
  .cb-mode .board.cols-20 .tile::after { font-size: clamp(6px, 1vw, 10px); }
  .cb-mode .board.cols-25 .tile::after { font-size: clamp(5px, 0.8vw, 8px); }

  /* Sloppy Junior side panel */
  .sj-panel {
    position: fixed;
    right: 0; top: 50%;
    transform: translateY(-50%) translateX(100%);
    width: 140px;
    background: var(--surface);
    border: 2px solid var(--accent);
    border-right: none;
    border-radius: 12px 0 0 12px;
    z-index: 80;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 10px;
    gap: 8px;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .sj-panel.show { transform: translateY(-50%) translateX(0); }
  .sj-face {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #aa00ff;
    position: relative;
    animation: sjBounce 1s ease-in-out infinite;
    box-shadow: 0 0 20px #aa00ff, 0 0 40px rgba(170,0,255,0.3), inset 0 -4px 8px rgba(0,0,0,0.3);
    flex-shrink: 0;
  }
  /* Googly eyes — white sclera with rolling black pupils */
  .sj-eye {
    position: absolute;
    top: 10px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    border: 1.5px solid #222;
    overflow: hidden;
  }
  .sj-eye.l { left: 6px; }
  .sj-eye.r { right: 6px; }
  .sj-eye::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    background: #111;
    border-radius: 50%;
    bottom: 1px; left: 50%;
    transform: translateX(-50%);
    animation: sjEyeRoll 2.5s ease-in-out infinite;
  }
  .sj-eye.r::after { animation-delay: -0.3s; }
  @keyframes sjEyeRoll {
    0%, 100% { transform: translateX(-50%) translateX(0); }
    25% { transform: translateX(-50%) translateX(3px); }
    50% { transform: translateX(-50%) translateX(-2px); }
    75% { transform: translateX(-50%) translateX(1px); }
  }
  .sj-face::after {
    content: '';
    position: absolute;
    bottom: 9px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 9px;
    border-bottom: 3px solid #fff;
    border-radius: 0 0 14px 14px;
  }
  @keyframes sjBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .sj-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text);
    text-align: center;
    line-height: 1.3;
    min-height: 2.6em;
  }
  .sj-label {
    font-family: 'Anybody', sans-serif;
    font-weight: 800;
    font-size: 9px;
    color: #aa00ff;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  @media (max-width: 600px) {
    .sj-panel { width: 110px; padding: 8px 6px; }
    .sj-face { width: 40px; height: 40px; }
    .sj-eye { width: 13px; height: 13px; top: 8px; }
    .sj-eye.l { left: 4px; } .sj-eye.r { right: 4px; }
    .sj-eye::after { width: 6px; height: 6px; }
    .sj-face::after { bottom: 6px; width: 16px; height: 7px; border-bottom-width: 2px; }
    .sj-text { font-size: 9px; }
  }

  /* Memory mode: hide tiles */
  .tile.mem-hidden {
    background: var(--surface) !important;
    color: transparent !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3) !important;
    border-color: var(--border) !important;
  }
  .tile.mem-hidden::after { visibility: hidden; }
  .tile.mem-hidden:hover { border-color: var(--dim) !important; }

  .tile:hover { transform: scale(1.04); }
  .tile:active { transform: scale(0.96); }
  .tile.cleared {
    opacity: 0.15;
    pointer-events: none;
    transform: scale(0.9);
  }
  .tile.wrong {
    animation: wrongShake 0.3s;
    border-color: #fff;
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .tile.correct {
    animation: correctPop 0.25s;
  }
  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(0.9); opacity: 0.15; }
  }

  /* overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay .card {
    background: var(--surface);
    border: 2px solid var(--border);
    padding: 32px 28px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    border-radius: 12px;
    overflow: hidden;
  }
  .overlay h2 {
    font-weight: 800;
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .overlay p {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--dim);
    line-height: 1.6;
    margin: 10px 0 18px;
    letter-spacing: 0.04em;
  }
  .overlay .stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin: 16px 0 22px;
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    color: var(--text);
  }
  .overlay .stats span {
    color: var(--dim);
    font-size: 11px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 4px;
  }
  .overlay select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 8px 14px;
    margin: 8px 6px;
    border-radius: 6px;
    cursor: pointer;
    max-width: 100%;
    width: 100%;
    box-sizing: border-box;
  }
  .overlay button {
    font-family: 'Anybody', sans-serif;
    font-weight: 800;
    font-size: 16px;
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 12px 32px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.15s, transform 0.1s;
    margin-top: 10px;
  }
  .overlay button:hover { background: #ff1144; transform: scale(1.03); }

  .flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 90;
    mix-blend-mode: screen;
  }
  .flash.good { background: var(--good); opacity: 0.1; transition: opacity 0.05s; }
  .flash.bad { background: var(--accent); opacity: 0.15; transition: opacity 0.05s; }

  /* Arcade name entry */
  .arcade-name {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 18px 0 10px;
  }
  .arcade-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .arcade-slot .arr {
    width: 36px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--accent);
    font-size: 18px;
    transition: transform 0.1s, color 0.1s;
  }
  .arcade-slot .arr:hover { color: #fff; transform: scaleY(1.3); }
  .arcade-slot .letter {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 400;
    color: var(--accent);
    width: 44px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border: 2px solid var(--accent);
    border-radius: 6px;
    text-shadow: 0 0 12px var(--accent);
  }
  .arcade-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 4px;
  }

  /* Leaderboard */
  .leaderboard {
    margin: 14px 0 6px;
    width: 100%;
  }
  .lb-title {
    font-family: 'Anybody', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  .lb-row {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .lb-row:nth-child(even) { background: rgba(255,255,255,0.02); }
  .lb-row .rank { color: var(--dim); width: 24px; }
  .lb-row .lb-name { color: var(--text); flex: 1; text-align: left; margin-left: 6px; }
  .lb-row .lb-score { color: var(--warn); text-align: right; }
  .lb-row.gold .rank, .lb-row.gold .lb-name { color: #ffd700; }
  .lb-row.silver .rank, .lb-row.silver .lb-name { color: #c0c0c0; }
  .lb-row.bronze .rank, .lb-row.bronze .lb-name { color: #cd7f32; }
  .lb-row.you { background: rgba(255,51,102,0.12); }
  .lb-empty {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--dim);
    padding: 8px 0;
  }

  .board.cols-6 .tile, .board.cols-7 .tile {
    font-size: clamp(8px, 1.8vw, 11px);
    border-radius: 6px;
    letter-spacing: 0;
  }
  .board.cols-6, .board.cols-7 { max-width: 620px; gap: 6px; }
  .board.cols-8 { grid-template-columns: repeat(8, 1fr); }
  .board.cols-9 { grid-template-columns: repeat(9, 1fr); }
  .board.cols-10 { grid-template-columns: repeat(10, 1fr); }
  .board.cols-8, .board.cols-9, .board.cols-10 { max-width: 780px; gap: 4px; }
  .board.cols-8 .tile, .board.cols-9 .tile, .board.cols-10 .tile {
    font-size: clamp(6px, 1.3vw, 9px);
    border-radius: 4px;
    letter-spacing: 0;
    aspect-ratio: 1;
  }
  .board.cols-20 { grid-template-columns: repeat(20, 1fr); max-width: 100%; gap: 2px; }
  .board.cols-20 .tile {
    font-size: clamp(5px, 0.9vw, 7px);
    border-radius: 3px;
    letter-spacing: 0;
    aspect-ratio: 1;
    padding: 1px;
    line-height: 1.1;
    word-break: break-all;
    overflow: hidden;
  }
  .board.cols-25 { grid-template-columns: repeat(25, 1fr); max-width: 100%; gap: 1px; }
  .board.cols-25 .tile {
    font-size: clamp(4px, 0.7vw, 6px);
    border-radius: 2px;
    letter-spacing: 0;
    aspect-ratio: 1;
    padding: 0;
    line-height: 1;
    word-break: break-all;
    overflow: hidden;
  }

  @media (max-width: 480px) {
    .board { max-width: 360px; gap: 8px; }
    .board.cols-6, .board.cols-7 { max-width: 100%; gap: 4px; }
    .board.cols-8, .board.cols-9, .board.cols-10 { max-width: 100%; gap: 3px; }
    .board.cols-20 { gap: 1px; }
    .board.cols-25 { gap: 1px; }
    .tile { font-size: 10px; border-radius: 8px; }
    .board.cols-6 .tile, .board.cols-7 .tile { font-size: 8px; border-radius: 4px; }
    .board.cols-8 .tile, .board.cols-9 .tile, .board.cols-10 .tile { font-size: 6px; border-radius: 3px; }
    .board.cols-20 .tile { font-size: 4.5px; border-radius: 2px; padding: 0; }
    .board.cols-25 .tile { font-size: 3.5px; border-radius: 1px; padding: 0; }
  }

  /* Earthquake mode */
  @keyframes quake {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    15% { transform: translate(-3px, 2px) rotate(-0.5deg); }
    30% { transform: translate(2px, -3px) rotate(0.3deg); }
    45% { transform: translate(-2px, -1px) rotate(-0.2deg); }
    60% { transform: translate(3px, 1px) rotate(0.4deg); }
    75% { transform: translate(-1px, 3px) rotate(-0.3deg); }
    90% { transform: translate(1px, -2px) rotate(0.2deg); }
  }
  .board.quaking { animation: quake 0.35s ease-in-out; }
  .tile.quake-swap {
    transition: opacity 0.15s;
    opacity: 0.4;
  }

  /* Impostor mode */
  .tile.impostor-reveal {
    animation: glitchReveal 0.5s ease-out;
    outline: 2px solid #ff0055;
    outline-offset: -2px;
  }
  @keyframes glitchReveal {
    0% { filter: hue-rotate(0deg); transform: scale(1); }
    20% { filter: hue-rotate(90deg); transform: scale(1.08) skewX(5deg); }
    40% { filter: hue-rotate(180deg); transform: scale(0.95) skewX(-3deg); }
    60% { filter: hue-rotate(270deg); transform: scale(1.05); }
    100% { filter: hue-rotate(360deg); transform: scale(1); }
  }
  .tile.impostor-tag { position: relative; }
  .tile.impostor-tag::before {
    content: '⚠';
    position: absolute;
    top: 2px;
    right: 3px;
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tile.impostor-revealed::before { opacity: 1; }

  /* Blackout mode */
  .blackout-veil {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s;
  }
  .blackout-veil.active { opacity: 1; }
  .blackout-veil.phase1 {
    background: radial-gradient(circle 220px at var(--spot-x, 50%) var(--spot-y, 50%), transparent 0%, rgba(0,0,0,0.45) 100%);
  }
  .blackout-veil.phase2 {
    background: radial-gradient(circle 160px at var(--spot-x, 50%) var(--spot-y, 50%), transparent 0%, rgba(0,0,0,0.72) 100%);
  }
  .blackout-veil.phase3 {
    background: radial-gradient(circle 100px at var(--spot-x, 50%) var(--spot-y, 50%), transparent 0%, rgba(0,0,0,0.93) 100%);
  }

  /* Chaos label */
  .chaos-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #ff0055;
    border: 1px solid #ff0055;
    border-radius: 3px;
    padding: 1px 5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-left: 6px;
    animation: chaosPulse 1.5s ease-in-out infinite;
  }
  @keyframes chaosPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* In-game settings gear */
  .ig-gear {
    position: fixed; top: 10px; left: 10px; z-index: 800;
    background: var(--surface); border: 1px solid var(--border); border-radius: 50%;
    width: 36px; height: 36px; display: none; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; color: var(--dim); transition: transform .2s, color .2s;
  }
  .ig-gear:hover { color: var(--text); transform: rotate(45deg); }
  .ig-gear.open { transform: rotate(90deg); color: var(--accent); }
  .ig-dropdown {
    position: fixed; top: 52px; left: 10px; z-index: 800;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; display: none; flex-direction: column; gap: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .ig-dropdown.show { display: flex; }
  .ig-dropdown label {
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--dim);
    cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="ig-gear" id="igGear" title="Settings">⚙</div>
  <div class="ig-dropdown" id="igDropdown">
    <label><input type="checkbox" id="igCb" style="accent-color:var(--text)"> Colorblind</label>
    <label><input type="checkbox" id="igZen" style="accent-color:var(--good)"> Zen Mode</label>
    <label><input type="checkbox" id="igMem" style="accent-color:var(--warn)"> Memory</label>
    <label><input type="checkbox" id="igSj" style="accent-color:var(--accent)"> Sloppy Jr</label>
    <label><input type="checkbox" id="igVoice" style="accent-color:#aa00ff"> Jr Voice</label>
    <hr style="border:none;border-top:1px solid #ff005533;margin:2px 0">

  // Seeded PRNG for daily challenge (mulberry32)
  function seededRng(seed) {
    let t = seed | 0;
    return function() {
      t = (t + 0x6D2B79F5) | 0;
      let x = Math.imul(t ^ (t >>> 15), 1 | t);
      x = (x + Math.imul(x ^ (x >>> 7), 61 | x)) ^ x;
      return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
    };
  }

  function getDailySeed() {
    const d = new Date();
    return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  }

  function seededSample(arr, n, rng) {
    const pool = [...arr];
    const out = [];
    for (let i = 0; i < n && pool.length; i++) {
      const idx = Math.floor(rng() * pool.length);
      out.push(pool.splice(idx, 1)[0]);
    }
    return out;
  }

  function seededShuffle(arr, rng) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function triggerQuake() {
    const tiles = boardEl.querySelectorAll('.tile:not(.cleared)');
    if (tiles.length < 3) return;

    // Shake the board
    boardEl.classList.add('quaking');
    beep(80, 0.15, 'sawtooth', 0.12);
    setTimeout(() => boardEl.classList.remove('quaking'), 350);

    // Swap 2 random non-cleared tile positions
    const tileArr = [...tiles];
    const a = Math.floor(Math.random() * tileArr.length);
    let b = a;
    while (b === a) b = Math.floor(Math.random() * tileArr.length);

    const tileA = tileArr[a], tileB = tileArr[b];
    tileA.classList.add('quake-swap');
    tileB.classList.add('quake-swap');

    setTimeout(() => {
      // Swap in DOM
      const parentA = tileA.parentNode;
      const nextA = tileA.nextSibling;
      const nextB = tileB.nextSibling;
      if (nextB === tileA) {
        parentA.insertBefore(tileA, tileB);
      } else if (nextA === tileB) {
        parentA.insertBefore(tileB, tileA);
      } else {
        parentA.insertBefore(tileA, nextB);
        parentA.insertBefore(tileB, nextA);
      }
      tileA.classList.remove('quake-swap');

  function hashName(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;

  function getCBAttrs(name) {
    const h = hashName(name);

  const SCALES = {
    phrygian: [0, 1, 3, 5, 7, 8, 10],    // dark, metal
    locrian:  [0, 1, 3, 5, 6, 8, 10],     // dissonant, unstable
    harmMin:  [0, 2, 3, 5, 7, 8, 11],     // evil classical

    { name: 'MACHINE WRATH',  bpm: 168, key: 40, scale: 'locrian',  wave: 'square',   bassWave: 'sawtooth' },
    { name: 'IRON PSALM',     bpm: 145, key: 48, scale: 'harmMin',  wave: 'sawtooth', bassWave: 'square'   },

    { name: 'TERMINAL NERVE', bpm: 160, key: 41, scale: 'chromHex', wave: 'square',   bassWave: 'sawtooth' },
  ];

  function midiToFreq(n) { return 440 * Math.pow(2, (n - 69) / 12); }

  function scaleNote(scale, degree, octaveShift) {
    const s = SCALES[scale];
    const oct = Math.floor(degree / s.length);
    const idx = ((degree % s.length) + s.length) % s.length;
    return s[idx] + (oct + octaveShift) * 12;
  }

  // Distortion curve for WaveShaperNode
  function makeDistCurve(amount) {
    const n = 256, curve = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / n - 1;
      curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
    }
    return curve;
  }

  function playNote(ctx, dest, freq, start, dur, type, vol) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, start);
    g.gain.setValueAtTime(vol, start);
    g.gain.setValueAtTime(vol, start + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o.connect(g).connect(dest);
    o.start(start);
    o.stop(start + dur);
  }

  // Distorted synth — two detuned saws through waveshaper
  function playDirtySaw(ctx, dest, freq, start, dur, vol, distAmt) {
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    const g = ctx.createGain();
    const dist = ctx.createWaveShaper();
    dist.curve = makeDistCurve(distAmt || 20);
    dist.oversample = '2x';
    o1.type = 'sawtooth'; o2.type = 'sawtooth';
    o1.frequency.setValueAtTime(freq, start);
    o2.frequency.setValueAtTime(freq * 1.005, start); // detune
    g.gain.setValueAtTime(vol, start);
    g.gain.setValueAtTime(vol, start + dur * 0.5);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o1.connect(dist); o2.connect(dist);
    dist.connect(g).connect(dest);
    o1.start(start); o1.stop(start + dur);
    o2.start(start); o2.stop(start + dur);
  }

  // Industrial noise hit
  function noiseHit(ctx, dest, start, dur, vol, filterFreq, filterQ) {
    const bufSize = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1);
    const src = ctx.createBufferSource();
    const g = ctx.createGain();
    const f = ctx.createBiquadFilter();
    const dist = ctx.createWaveShaper();
    dist.curve = makeDistCurve(40);
    src.buffer = buf;
    f.type = 'bandpass'; f.frequency.value = filterFreq || 2000; f.Q.value = filterQ || 2;
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    src.connect(f).connect(dist).connect(g).connect(dest);
    src.start(start);
  }

  let beatCount = 0;

  function generateMelody(track) {
    const len = 16;
    const seq = [];
    let pos = Math.floor(Math.random() * 4);
    for (let i = 0; i < len; i++) {
      if (Math.random() < 0.2) { seq.push(null); continue; } // rests add aggression
      const step = Math.floor(Math.random() * 7) - 3; // wider leaps
      pos = Math.max(-3, Math.min(9, pos + step));
      seq.push(pos);
    }
    return seq;
  }

  // 0 = normal, 1 = ultra, 2 = disaster
  function getIntensity() {
    if (state.difficulty === 'god') return 4;

  function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

  function scheduleBeat() {
    const ctx = audio();
    if (!ctx || !musicGain) return;
    const intensity = getIntensity();
    const track = TRACKS[currentTrack];
    const bpm = track.bpm + (intensity >= 4 ? 65 : intensity === 3 ? 45 : intensity === 2 ? 30 : intensity === 1 ? 15 : 0);
    const beatDur = 60 / bpm;
    const now = ctx.currentTime;
    const barBeat = beatCount % 4;
    const bar = Math.floor(beatCount / 4);

    // === DISTORTED BASS — chugging sawtooth riff ===
    const bassHits = (barBeat === 0 || barBeat === 2 || (intensity >= 1 && barBeat === 3));
    if (bassHits) {
      const bassOff = barBeat === 2 ? (Math.random() < 0.4 ? 1 : 0) : (barBeat === 3 ? -2 : 0);
      const bassNote = track.key + scaleNote(track.scale, bassOff, 0);
      const bassVol = 0.06 + intensity * 0.01;
      playDirtySaw(ctx, musicGain, midiToFreq(bassNote), now, beatDur * 1.5, bassVol, 25 + intensity * 15);
      // Sub layer
      if (intensity >= 1) {
        playNote(ctx, musicGain, midiToFreq(bassNote - 12), now, beatDur * 1.2, 'sine', 0.04);
      }
    }
    // 8th note chug pattern on all beats in ultra+
    if (intensity >= 1) {
      const chugNote = track.key + scaleNote(track.scale, 0, 0);
      playDirtySaw(ctx, musicGain, midiToFreq(chugNote), now + beatDur * 0.5, beatDur * 0.3, 0.03, 30);
    }

    // === INDUSTRIAL KICK — distorted, heavy ===
    const kickO = ctx.createOscillator();
    const kickG = ctx.createGain();
    const kickDist = ctx.createWaveShaper();
    kickDist.curve = makeDistCurve(intensity >= 4 ? 100 : intensity >= 3 ? 80 : intensity >= 2 ? 50 : 20);
    kickO.frequency.setValueAtTime(intensity >= 4 ? 300 : intensity >= 3 ? 240 : intensity >= 2 ? 200 : 160, now);
    kickO.frequency.exponentialRampToValueAtTime(25, now + 0.12);
    const kickVol = (barBeat === 0 ? 0.12 : 0.07) + intensity * 0.02;
    kickG.gain.setValueAtTime(kickVol, now);
    kickG.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
    kickO.connect(kickDist).connect(kickG).connect(musicGain);
    kickO.start(now); kickO.stop(now + 0.15);

    // Double kick in ultra+
    if (intensity >= 1 && (barBeat === 1 || barBeat === 3)) {
      const k2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      const d2 = ctx.createWaveShaper();
      d2.curve = makeDistCurve(30);
      k2.frequency.setValueAtTime(140, now + beatDur * 0.25);
      k2.frequency.exponentialRampToValueAtTime(20, now + beatDur * 0.25 + 0.1);
      g2.gain.setValueAtTime(0.06, now + beatDur * 0.25);
      g2.gain.exponentialRampToValueAtTime(0.0001, now + beatDur * 0.25 + 0.12);
      k2.connect(d2).connect(g2).connect(musicGain);
      k2.start(now + beatDur * 0.25); k2.stop(now + beatDur * 0.25 + 0.12);
    }
    // Machine-gun kick in disaster+ every other bar (every bar in legendary)
    if (intensity >= 2 && (intensity >= 3 || bar % 2 === 1) && barBeat === 0) {
      for (let i = 1; i < (intensity >= 4 ? 8 : intensity >= 3 ? 6 : 4); i++) {
        const kk = ctx.createOscillator();
        const kg = ctx.createGain();
        const t = now + i * (beatDur / 4);
        kk.frequency.setValueAtTime(180, t);
        kk.frequency.exponentialRampToValueAtTime(25, t + 0.08);
        kg.gain.setValueAtTime(0.06, t);
        kg.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
        kk.connect(kg).connect(musicGain);
        kk.start(t); kk.stop(t + 0.1);
      }
    }

    // === INDUSTRIAL SNARE — noise burst through distortion ===
    const snareHit = intensity >= 1
      ? (barBeat === 1 || barBeat === 3)
      : (barBeat === 2);
    if (snareHit) {
      noiseHit(ctx, musicGain, now, 0.1, 0.06 + intensity * 0.02, 2500, 1.5);
      // Snare body — pitched down sine thud
      const st = ctx.createOscillator();
      const sg = ctx.createGain();
      st.type = 'triangle'; st.frequency.setValueAtTime(250, now);
      st.frequency.exponentialRampToValueAtTime(100, now + 0.06);
      sg.gain.setValueAtTime(0.05, now);
      sg.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
      st.connect(sg).connect(musicGain);
      st.start(now); st.stop(now + 0.08);
    }

    // === METALLIC HI-HAT — harsh, filtered noise ===
    if (barBeat % 1 === 0) { // every beat
      noiseHit(ctx, musicGain, now, 0.04, 0.03, 9000, 5);
      // 16th note hat
      if (intensity >= 1) {
        noiseHit(ctx, musicGain, now + beatDur * 0.5, 0.03, 0.02, 10000, 8);
      }
      // 32nd note hats in disaster
      if (intensity >= 2) {
        noiseHit(ctx, musicGain, now + beatDur * 0.25, 0.02, 0.015, 11000, 10);
        noiseHit(ctx, musicGain, now + beatDur * 0.75, 0.02, 0.015, 11000, 10);
      }
    }

    // === INDUSTRIAL CLANG — random metallic hits ===
    if (Math.random() < (intensity >= 4 ? 0.6 : intensity >= 3 ? 0.45 : intensity >= 2 ? 0.3 : intensity >= 1 ? 0.15 : 0.08)) {
      const clangFreq = randInt(800, 3000);
      const co = ctx.createOscillator();
      const cg = ctx.createGain();
      const cf = ctx.createBiquadFilter();
      co.type = 'square';
      co.frequency.setValueAtTime(clangFreq, now);
      co.frequency.exponentialRampToValueAtTime(clangFreq * 0.3, now + 0.06);
      cf.type = 'bandpass'; cf.frequency.value = clangFreq; cf.Q.value = 15;
      cg.gain.setValueAtTime(0.025, now);
      cg.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
      co.connect(cf).connect(cg).connect(musicGain);
      co.start(now); co.stop(now + 0.08);
    }

    // === AGGRESSIVE SAW LEAD — melody through distortion ===
    const notesPerBeat = intensity >= 4 ? 8 : intensity >= 3 ? 6 : intensity >= 2 ? 4 : (intensity >= 1 ? 3 : 2);
    for (let sub = 0; sub < notesPerBeat; sub++) {
      const mIdx = melodyPos % melodySeq.length;
      const deg = melodySeq[mIdx];
      melodyPos++;
      if (deg === null) continue;
      const note = track.key + scaleNote(track.scale, deg, 1);
      const t = now + sub * (beatDur / notesPerBeat);
      const melVol = 0.025 + intensity * 0.005;
      playDirtySaw(ctx, musicGain, midiToFreq(note), t, beatDur * 0.3, melVol, 15 + intensity * 10);
    }

    // === POWER CHORD STABS — ultra+ ===
    if (intensity >= 1 && barBeat === 0 && bar % 2 === 0) {
      const root = track.key + scaleNote(track.scale, 0, 1);
      const fifth = root + 7;
      const oct = root + 12;
      [root, fifth, oct].forEach(n => {
        playDirtySaw(ctx, musicGain, midiToFreq(n), now, beatDur * 2, 0.02, 35);
      });
    }

    // === COUNTERMELODY — dissonant high saw ===
    if (intensity >= 1 && beatCount % 2 === 1) {
      const cDeg = melodySeq[(melodyPos + 5) % melodySeq.length];
      if (cDeg !== null) {
        const cNote = track.key + scaleNote(track.scale, (cDeg || 0) + 3, 2);
        playDirtySaw(ctx, musicGain, midiToFreq(cNote), now, beatDur * 0.25, 0.015, 20);
      }
    }

    // === DESCENDING ARPEGGIO — every 4 bars, like Ultrakill breakdowns ===
    const arpTrigger = intensity >= 2 ? (beatCount % 8 === 0) : (beatCount % 16 === 0);
    if (arpTrigger) {
      const arpDegs = [7, 6, 4, 3, 1, 0, -1, -3];
      const speed = intensity >= 2 ? 0.035 : 0.05;
      arpDegs.forEach((d, i) => {
        const n = track.key + scaleNote(track.scale, d, 2);
        playDirtySaw(ctx, musicGain, midiToFreq(n), now + i * speed, 0.12, 0.02, 25);
      });
    }

    // === ACID SCREECH — disaster: resonant filter sweep ===
    if (intensity >= 2 && barBeat === 0 && bar % 3 === 0) {
      const acidNote = track.key + scaleNote(track.scale, randInt(-2, 3), 0);
      const ao = ctx.createOscillator();
      const ag = ctx.createGain();
      const af = ctx.createBiquadFilter();
      const ad = ctx.createWaveShaper();
      ad.curve = makeDistCurve(50);
      ao.type = 'sawtooth';
      ao.frequency.value = midiToFreq(acidNote);
      af.type = 'lowpass'; af.Q.value = 18;
      af.frequency.setValueAtTime(200, now);
      af.frequency.exponentialRampToValueAtTime(4000, now + beatDur * 2);
      af.frequency.exponentialRampToValueAtTime(150, now + beatDur * 4);
      ag.gain.setValueAtTime(0.035, now);
      ag.gain.exponentialRampToValueAtTime(0.0001, now + beatDur * 4);
      ao.connect(ad).connect(af).connect(ag).connect(musicGain);
      ao.start(now); ao.stop(now + beatDur * 4);
    }

    // === NOISE SWEEP — disaster: rising industrial tension ===
    if (intensity >= 2 && beatCount % 32 === 0) {
      const nLen = beatDur * 4;
      const nBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * nLen), ctx.sampleRate);
      const nd = nBuf.getChannelData(0);
      for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
      const ns = ctx.createBufferSource();
      const ng = ctx.createGain();
      const nf = ctx.createBiquadFilter();
      ns.buffer = nBuf;
      nf.type = 'bandpass'; nf.Q.value = 3;
      nf.frequency.setValueAtTime(200, now);
      nf.frequency.exponentialRampToValueAtTime(6000, now + nLen);
      ng.gain.setValueAtTime(0.0001, now);
      ng.gain.linearRampToValueAtTime(0.04, now + nLen * 0.8);
      ng.gain.exponentialRampToValueAtTime(0.0001, now + nLen);
      ns.connect(nf).connect(ng).connect(musicGain);
      ns.start(now);
    }

    // === GLITCH STUTTER — random pitch-bent distorted blips ===
    if (Math.random() < (intensity >= 4 ? 0.55 : intensity >= 3 ? 0.4 : intensity >= 2 ? 0.25 : intensity >= 1 ? 0.12 : 0.05)) {
      const gf = midiToFreq(track.key + randInt(12, 30));
      const go = ctx.createOscillator();
      const gg = ctx.createGain();
      const gd = ctx.createWaveShaper();
      gd.curve = makeDistCurve(60);
      go.type = 'sawtooth';
      go.frequency.setValueAtTime(gf, now);
      go.frequency.exponentialRampToValueAtTime(gf * (Math.random() < 0.5 ? 3 : 0.25), now + 0.05);
      gg.gain.setValueAtTime(0.02, now);
      gg.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
      go.connect(gd).connect(gg).connect(musicGain);
      go.start(now); go.stop(now + 0.06);
    }

    // === LEGENDARY-ONLY: WAR SIREN — sweeping distorted oscillator ===
    if (intensity >= 3 && beatCount % 16 === 0) {
      const sirenO = ctx.createOscillator();
      const sirenG = ctx.createGain();
      const sirenD = ctx.createWaveShaper();
      sirenD.curve = makeDistCurve(70);
      sirenO.type = 'sawtooth';
      const sirenLen = beatDur * 6;
      sirenO.frequency.setValueAtTime(200, now);
      sirenO.frequency.exponentialRampToValueAtTime(2000, now + sirenLen * 0.5);
      sirenO.frequency.exponentialRampToValueAtTime(150, now + sirenLen);
      sirenG.gain.setValueAtTime(0.0001, now);
      sirenG.gain.linearRampToValueAtTime(0.03, now + sirenLen * 0.3);
      sirenG.gain.exponentialRampToValueAtTime(0.0001, now + sirenLen);
      sirenO.connect(sirenD).connect(sirenG).connect(musicGain);
      sirenO.start(now); sirenO.stop(now + sirenLen);
    }

    // === LEGENDARY-ONLY: FEEDBACK DRONE — dissonant sustained tone ===
    if (intensity >= 3 && barBeat === 0 && bar % 4 === 0) {
      const droneNote = track.key + scaleNote(track.scale, 1, 1); // minor 2nd = max tension
      const do1 = ctx.createOscillator();
      const do2 = ctx.createOscillator();
      const dg = ctx.createGain();
      const dd = ctx.createWaveShaper();
      const df = ctx.createBiquadFilter();
      dd.curve = makeDistCurve(90);
      do1.type = 'sawtooth'; do2.type = 'sawtooth';
      do1.frequency.value = midiToFreq(droneNote);
      do2.frequency.value = midiToFreq(droneNote) * 1.01; // beating
      df.type = 'lowpass'; df.frequency.value = 1500; df.Q.value = 8;
      const droneLen = beatDur * 8;
      dg.gain.setValueAtTime(0.0001, now);
      dg.gain.linearRampToValueAtTime(0.025, now + droneLen * 0.4);
      dg.gain.exponentialRampToValueAtTime(0.0001, now + droneLen);
      do1.connect(dd); do2.connect(dd);
      dd.connect(df).connect(dg).connect(musicGain);
      do1.start(now); do1.stop(now + droneLen);
      do2.start(now); do2.stop(now + droneLen);
    }

    // === LEGENDARY-ONLY: BLAST BEAT SNARE — 16th note snare fills ===
    if (intensity >= 3 && bar % 4 === 3 && barBeat >= 2) {
      for (let i = 0; i < 4; i++) {
        const t2 = now + i * (beatDur / 4);
        noiseHit(ctx, musicGain, t2, 0.06, 0.04, 3500, 3);
      }
    }

    // === LEGENDARY-ONLY: OCTAVE DOUBLING on melody ===
    if (intensity >= 3 && beatCount % 2 === 0) {
      const mIdx = (melodyPos - 1 + melodySeq.length) % melodySeq.length;
      const deg = melodySeq[mIdx];
      if (deg !== null) {
        const note = track.key + scaleNote(track.scale, deg, 2);
        playDirtySaw(ctx, musicGain, midiToFreq(note), now, beatDur * 0.2, 0.018, 50);
      }
    }

    // === GOD MODE-ONLY: DEATH CHORD — massive tritone power chord wall ===
    if (intensity >= 4 && barBeat === 0) {
      const root = track.key + scaleNote(track.scale, 0, 0);
      const tritone = root + 6; // devil's interval
      const oct = root + 12;
      const fifth = root + 7;
      [root, tritone, fifth, oct, root + 24].forEach(n => {
        playDirtySaw(ctx, musicGain, midiToFreq(n), now, beatDur * 3, 0.025, 70);
      });
    }

    // === GOD MODE-ONLY: HELLFIRE SIREN — dual opposing sweeps ===
    if (intensity >= 4 && beatCount % 8 === 0) {
      // Rising siren
      const s1 = ctx.createOscillator();
      const g1 = ctx.createGain();
      const d1 = ctx.createWaveShaper();
      d1.curve = makeDistCurve(95);
      s1.type = 'sawtooth';
      const sLen = beatDur * 4;
      s1.frequency.setValueAtTime(100, now);
      s1.frequency.exponentialRampToValueAtTime(4000, now + sLen);
      g1.gain.setValueAtTime(0.0001, now);
      g1.gain.linearRampToValueAtTime(0.035, now + sLen * 0.6);
      g1.gain.exponentialRampToValueAtTime(0.0001, now + sLen);
      s1.connect(d1).connect(g1).connect(musicGain);
      s1.start(now); s1.stop(now + sLen);
      // Falling counter-siren
      const s2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      const d2 = ctx.createWaveShaper();
      d2.curve = makeDistCurve(95);
      s2.type = 'square';
      s2.frequency.setValueAtTime(3000, now);
      s2.frequency.exponentialRampToValueAtTime(80, now + sLen);
      g2.gain.setValueAtTime(0.0001, now);
      g2.gain.linearRampToValueAtTime(0.025, now + sLen * 0.5);
      g2.gain.exponentialRampToValueAtTime(0.0001, now + sLen);
      s2.connect(d2).connect(g2).connect(musicGain);
      s2.start(now); s2.stop(now + sLen);
    }

    // === GOD MODE-ONLY: GRINDING NOISE FLOOR — constant industrial rumble ===
    if (intensity >= 4 && beatCount % 4 === 0) {
      const nLen = beatDur * 2;
      const nBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * nLen), ctx.sampleRate);
      const nd = nBuf.getChannelData(0);
      for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
      const ns = ctx.createBufferSource();
      const ng = ctx.createGain();
      const nf = ctx.createBiquadFilter();
      const nd2 = ctx.createWaveShaper();
      nd2.curve = makeDistCurve(60);
      ns.buffer = nBuf;
      nf.type = 'lowpass'; nf.frequency.value = 400; nf.Q.value = 6;
      ng.gain.setValueAtTime(0.02, now);
      ng.gain.setValueAtTime(0.02, now + nLen * 0.8);
      ng.gain.exponentialRampToValueAtTime(0.0001, now + nLen);
      ns.connect(nd2).connect(nf).connect(ng).connect(musicGain);
      ns.start(now);
    }

    // === GOD MODE-ONLY: 32ND NOTE BLAST BEATS on every bar ===
    if (intensity >= 4 && barBeat >= 2) {
      for (let i = 0; i < 8; i++) {
        const t2 = now + i * (beatDur / 8);
        noiseHit(ctx, musicGain, t2, 0.04, 0.035, 4000, 4);
      }
    }

    // === GOD MODE-ONLY: FEEDBACK SCREECH — random high-freq bursts ===
    if (intensity >= 4 && Math.random() < 0.3) {
      const scr = ctx.createOscillator();
      const sg = ctx.createGain();
      const sd = ctx.createWaveShaper();
      sd.curve = makeDistCurve(100);
      scr.type = 'sawtooth';
      scr.frequency.setValueAtTime(randInt(2000, 6000), now);
      scr.frequency.exponentialRampToValueAtTime(randInt(500, 8000), now + 0.04);
      sg.gain.setValueAtTime(0.02, now);
      sg.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
      scr.connect(sd).connect(sg).connect(musicGain);
      scr.start(now); scr.stop(now + 0.05);
    }

    beatCount++;

    const regenInterval = intensity >= 4 ? 4 : intensity >= 3 ? 6 : intensity >= 2 ? 8 : (intensity >= 1 ? 12 : 16);
    if (beatCount % regenInterval === 0 && Math.random() < 0.6) {
      melodySeq = generateMelody(track);
      melodyPos = 0;
    }
  }

  function startMusic() {
    const ctx = audio();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();

    // Master chain: gain → light compressor-style limiter → destination
    musicGain = ctx.createGain();
    musicGain.gain.value = 0.55;
    const limiter = ctx.createDynamicsCompressor();
    limiter.threshold.value = -6;
    limiter.knee.value = 3;
    limiter.ratio.value = 12;
    limiter.attack.value = 0.001;
    limiter.release.value = 0.05;
    musicGain.connect(limiter).connect(ctx.destination);

    beatCount = 0;
    melodyPos = 0;
    melodySeq = generateMelody(TRACKS[currentTrack]);

    const intensity = getIntensity();
    const bpm = TRACKS[currentTrack].bpm + (intensity >= 4 ? 65 : intensity === 3 ? 45 : intensity === 2 ? 30 : intensity === 1 ? 15 : 0);
    const beatDur = 60 / bpm;
    musicInterval = setInterval(scheduleBeat, beatDur * 1000);
    musicPlaying = true;
    musicBtn.textContent = '♪ ' + TRACKS[currentTrack].name;
    musicBtn.style.color = 'var(--accent)';
    musicBtn.style.borderColor = 'var(--accent)';
  }

  function stopMusic() {
    if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
    if (musicGain) {
      try { musicGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3); } catch {}
      musicGain = null;
    }
    musicPlaying = false;
    musicBtn.textContent = '♪ OFF';
    musicBtn.style.color = 'var(--dim)';
    musicBtn.style.borderColor = 'var(--border)';
  }

  function nextTrack() {
    const wasPlaying = musicPlaying;
    if (wasPlaying) stopMusic();
    currentTrack = (currentTrack + 1) % TRACKS.length;
    if (wasPlaying) setTimeout(startMusic, 100);
  }

  musicBtn.addEventListener('click', (e) => {
    if (e.shiftKey || e.ctrlKey) { nextTrack(); return; }
    if (musicPlaying) stopMusic(); else startMusic();
  });

  // Double-click or long press to skip track
  let pressTimer = null;
  musicBtn.addEventListener('pointerdown', () => {
    pressTimer = setTimeout(() => { nextTrack(); pressTimer = null; }, 500);
  });
  musicBtn.addEventListener('pointerup', () => { if (pressTimer) clearTimeout(pressTimer); });
  musicBtn.addEventListener('dblclick', (e) => { e.preventDefault(); nextTrack(); });

  function sample(arr, n) {
    const pool = [...arr];
    const out = [];
    for (let i = 0; i < n && pool.length; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      out.push(pool.splice(idx, 1)[0]);
    }
    return out;
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // RGB→HSL for rainbow mode sorting
  function hexToHSL(hex) {
    const r = parseInt(hex.slice(1,3),16)/255;
    const g = parseInt(hex.slice(3,5),16)/255;
    const b = parseInt(hex.slice(5,7),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    const l = (max+min)/2;
    if (max === min) return { h:0, s:0, l };
    const d = max - min;
    const s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    let h;
    if (max===r) h = ((g-b)/d + (g<b?6:0))/6;
    else if (max===g) h = ((b-r)/d + 2)/6;
    else h = ((r-g)/d + 4)/6;
    return { h, s, l };
  }

  function textColor(hex) {
    // Simple luminance check
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    return lum > 0.6 ? 'rgba(0,0,0,0.65)' : 'rgba(255,255,255,0.7)';
  }

  function renderOrderBar() {
    orderBarEl.innerHTML = '';
    state.sortedOrder.forEach((c, i) => {
      const pip = document.createElement('div');
      pip.className = 'order-pip';
      pip.style.background = c.hex;
      pip.style.color = c.hex;
      if (i < state.nextIdx) pip.classList.add('done');
      else if (i === state.nextIdx) pip.classList.add('next');
      pip.title = c.name;
      orderBarEl.appendChild(pip);
    });
  }

  function renderBoard() {
    const diff = DIFFICULTIES[state.difficulty];
    const cb = cbToggleEl.checked;
    boardEl.innerHTML = '';
    boardEl.className = 'board cols-' + diff.cols;
    document.body.classList.toggle('cb-mode', cb);

    state.colors.forEach((c, i) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      const isImpostor = state.impostor && state.impostorMap[i];
      if (isImpostor) tile.classList.add('impostor-tag');
      tile.style.background = c.hex;
      tile.style.color = textColor(c.hex);
      tile.style.boxShadow = `0 4px 16px ${c.hex}33`;
      tile.textContent = getDisplayName(c, i);
      tile.dataset.idx = i;
      tile.dataset.realName = c.name;
      if (cb) {
        const attrs = getCBAttrs(c.name);
        tile.dataset.cb = attrs.sym;
        tile.style.borderStyle = attrs.border;
        tile.style.borderWidth = attrs.bw;
        tile.style.borderColor = textColor(c.hex);
      }
      tile.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handleTap(c, tile);
      });
      boardEl.appendChild(tile);
    });
  }

  function updateHud() {
    roundNumEl.textContent = state.round;
    totalRoundsEl.textContent = state.totalRounds;
    scoreNumEl.textContent = state.score;
    streakNumEl.textContent = state.streak;
  }

  function startTimer() {
    state.roundStart = performance.now();
    function tick() {
      if (state.phase !== 'playing') return;
      const elapsed = (performance.now() - state.roundStart) / 1000;
      timerNumEl.textContent = elapsed.toFixed(1);
      timerNumEl.classList.toggle('danger', !state.zen && elapsed > 15);
      state.timerRAF = requestAnimationFrame(tick);
    }
    tick();
  }

  function stopTimer() {
    if (state.timerRAF) cancelAnimationFrame(state.timerRAF);
    return (performance.now() - state.roundStart) / 1000;
  }

  function flash(type) {
    flashEl.className = 'flash ' + type;
    setTimeout(() => flashEl.className = 'flash', 150);
  }

  function handleTap(color, tileEl) {
    if (state.phase !== 'playing') return;
    const expected = state.sortedOrder[state.nextIdx];
    const tileIdx = parseInt(tileEl.dataset.idx);

    // Impostor detection: if tile is impostor and hasn't been revealed yet
    if (state.impostor && state.impostorMap[tileIdx] && !tileEl.classList.contains('impostor-revealed')) {
      // Reveal the impostor — show real name with glitch effect
      tileEl.classList.add('impostor-reveal', 'impostor-revealed');
      tileEl.textContent = color.name; // Show real name
      beep(200, 0.2, 'sawtooth', 0.15);
      if (state.sj) sloppyJrSay("IMPOSTOR! That tile was LYING to you!");
      setTimeout(() => tileEl.classList.remove('impostor-reveal'), 500);
      // Don't count as a tap — just reveal and return
      return;
    }

    if (color.name === expected.name) {
      // Correct!
      state.nextIdx++;
      state.streak++;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;

      // Score: base + speed bonus + streak bonus
      const elapsed = (performance.now() - state.roundStart) / 1000;
      const speedBonus = Math.max(0, Math.floor((20 - elapsed) * 2));
      const streakBonus = Math.min(state.streak * 2, 20);
      state.score += 10 + speedBonus + streakBonus;

      tileEl.classList.remove('mem-hidden');
      tileEl.classList.add('correct');
      setTimeout(() => tileEl.classList.add('cleared'), 200);
      flash('good');
      beep(400 + state.nextIdx * 60, 0.06, 'square', 0.06);
      if (state.sj && Math.random() < 0.25) sloppyJrRandom();
      renderOrderBar();
      updateHud();

      if (state.nextIdx >= state.sortedOrder.length) {
        // Round complete
        const roundTime = stopTimer();
        state.totalTime += roundTime;
        state.score += Math.max(0, Math.floor((30 - roundTime) * 5)); // time bonus
        beep(880, 0.1, 'square', 0.08);
        setTimeout(() => beep(1100, 0.12, 'square', 0.08), 100);

        setTimeout(() => {
          if (state.round < state.totalRounds) {
            newRound();
          } else {
            endGame();
          }
        }, 500);
      }
    } else {
      // Wrong! Briefly reveal in memory mode
      const wasHidden = tileEl.classList.contains('mem-hidden');
      if (wasHidden) tileEl.classList.remove('mem-hidden');
      state.mistakes++;
      if (state.sj) sloppyJrRandom();
      if (state.zen) {
        tileEl.classList.add('wrong');
        setTimeout(() => { tileEl.classList.remove('wrong'); if (wasHidden) tileEl.classList.add('mem-hidden'); }, 400);
        beep(300, 0.08, 'sine', 0.04);
      } else {
        state.streak = 0;
        const diff = DIFFICULTIES[state.difficulty];
        state.score = Math.max(0, state.score - diff.penalty * 5);
        tileEl.classList.add('wrong');
        setTimeout(() => { tileEl.classList.remove('wrong'); if (wasHidden) tileEl.classList.add('mem-hidden'); }, 400);
        flash('bad');
        beep(150, 0.15, 'sawtooth', 0.1);
      }
      updateHud();
    }
  }

  function newRound() {
    stopEarthquake();
    stopBlackout();
    state.round++;
    state.phase = 'playing';
    const diff = DIFFICULTIES[state.difficulty];
    const pool = PALETTES[state.palette] || COLOR_POOL;
    const count = Math.min(diff.count, pool.length);

    if (state.daily) {
      const rng = seededRng(getDailySeed() + state.round);
      state.colors = seededShuffle(seededSample(pool, count, rng), rng);
    } else {
      state.colors = shuffle(sample(pool, count));
    }
    if (state.difficulty === 'ztoa') {
      state.sortedOrder = [...state.colors].sort((a, b) => b.name.localeCompare(a.name));
    } else if (state.difficulty === 'rainbow') {
      // Sort by hue (red→orange→yellow→green→cyan→blue→purple), then saturation, then lightness
      state.sortedOrder = [...state.colors].sort((a, b) => {
        const ha = hexToHSL(a.hex), hb = hexToHSL(b.hex);
        // Group grays (low saturation) at the end, sorted by lightness
        const aGray = ha.s < 0.1, bGray = hb.s < 0.1;
        if (aGray && !bGray) return 1;
        if (!aGray && bGray) return -1;
        if (aGray && bGray) return ha.l - hb.l;
        // Sort by hue, then saturation, then lightness
        if (Math.abs(ha.h - hb.h) > 0.005) return ha.h - hb.h;
        if (Math.abs(ha.s - hb.s) > 0.05) return hb.s - ha.s;
        return ha.l - hb.l;
      });
    } else {
      state.sortedOrder = [...state.colors].sort((a, b) => a.name.localeCompare(b.name));
    }
    state.nextIdx = 0;

    // Setup impostor tiles before rendering
    setupImpostors();

    renderBoard();
    renderOrderBar();
    updateHud();
    startTimer();

    // Memory mode: hide tiles after 5 seconds
    if (state.memTimer) clearTimeout(state.memTimer);
    if (state.memory) {
      state.memTimer = setTimeout(() => {
        boardEl.querySelectorAll('.tile:not(.cleared)').forEach(t => t.classList.add('mem-hidden'));
      }, 5000);
    }

    // Chaos engines
    if (state.earthquake) startEarthquake();
    if (state.blackout) startBlackout();

    // Sloppy Jr: greet on round start
    if (state.sj) sloppyJrRandom();
  }

  function startGame(isDaily) {
    state.daily = !!isDaily;
    state.zen = !isDaily && zenToggleEl.checked;
    state.palette = paletteSelectEl.value;
    state.memory = memToggleEl.checked;
    state.sj = sjToggleEl.checked;
    state.earthquake = earthquakeToggleEl.checked;
    state.impostor = impostorToggleEl.checked;
    state.blackout = blackoutToggleEl.checked;
    if (isDaily) {
      state.difficulty = 'hard';
      state.palette = 'classic';
      zenToggleEl.checked = false;
    } else {
      state.difficulty = difficultySelectEl.value;
    }
    state.round = 0;
    state.score = 0;
    state.streak = 0;
    state.bestStreak = 0;
    state.totalTime = 0;
    state.mistakes = 0;
    state.totalRounds = DIFFICULTIES[state.difficulty].rounds;
    overlayEl.classList.add('hidden');
    igGearEl.style.display = 'flex';
    /* Sync in-game toggles from overlay state */
    igCbEl.checked = cbToggleEl.checked;
    igZenEl.checked = zenToggleEl.checked;
    igMemEl.checked = memToggleEl.checked;
    igSjEl.checked = sjToggleEl.checked;
    igVoiceEl.checked = sjVoiceToggleEl.checked;
    igEarthquakeEl.checked = earthquakeToggleEl.checked;
    igImpostorEl.checked = impostorToggleEl.checked;
    igBlackoutEl.checked = blackoutToggleEl.checked;

    // Update HUD labels for mode
    const hudEl = document.querySelector('.hud');
    if (state.zen) hudEl.style.color = 'var(--good)';
    else if (state.daily) hudEl.style.color = 'var(--warn)';
    else hudEl.style.color = '';

    newRound();
  }

  // === Leaderboard ===
  const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 '.split('');
  const arcadeEntryEl = document.getElementById('arcadeEntry');
  const arcadeNameEl = document.getElementById('arcadeName');
  const arcadeSubmitEl = document.getElementById('arcadeSubmit');
  const leaderboardEl = document.getElementById('leaderboard');
  const lbRowsEl = document.getElementById('lbRows');
  const arcadeSlots = arcadeNameEl.querySelectorAll('.arcade-slot');
  let arcadeLetters = [0, 0, 0]; // indices into ALPHA
  let lastSubmittedIdx = -1; // track which entry was just submitted

  function getLBKey(diff) { return `chromasort_lb_${diff}`; }

  function loadLB(diff) {
    try {
      const raw = localStorage.getItem(getLBKey(diff));
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function saveLB(diff, board) {
    localStorage.setItem(getLBKey(diff), JSON.stringify(board.slice(0, 15)));
  }

  function qualifiesForLB(diff, score) {
    const board = loadLB(diff);
    return board.length < 10 || score > (board[board.length - 1]?.score ?? 0);
  }

  function addToLB(diff, name, score, time) {
    const board = loadLB(diff);
    const entry = { name, score, time: +time.toFixed(1), date: Date.now() };
    board.push(entry);
    board.sort((a, b) => b.score - a.score || a.time - b.time);
    const trimmed = board.slice(0, 15);
    saveLB(diff, trimmed);
    return trimmed.findIndex(e => e === entry);
  }

  function renderLB(diff, highlightIdx) {
    const board = loadLB(diff);
    leaderboardEl.style.display = board.length ? '' : 'none';
    if (!board.length) { lbRowsEl.innerHTML = ''; return; }

    lbRowsEl.innerHTML = board.slice(0, 10).map((e, i) => {
      const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const you = i === highlightIdx ? ' you' : '';
      return `<div class="lb-row ${cls}${you}">
        <span class="rank">${i + 1}.</span>
        <span class="lb-name">${escHTML(e.name)}</span>
        <span class="lb-score">${e.score}</span>
      </div>`;
    }).join('');
  }

  function escHTML(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateArcadeDisplay() {
    arcadeSlots.forEach((slot, i) => {
      slot.querySelector('.letter').textContent = ALPHA[arcadeLetters[i]];
    });
  }

  function getArcadeName() {
    return arcadeLetters.map(i => ALPHA[i]).join('').trimEnd() || 'AAA';
  }

  // Restore last used name
  try {
    const saved = localStorage.getItem('chromasort_name');
    if (saved && saved.length === 3) {
      for (let i = 0; i < 3; i++) {
        const idx = ALPHA.indexOf(saved[i]);
        if (idx >= 0) arcadeLetters[i] = idx;
      }
    }
  } catch {}

  // Arrow clicks
  arcadeNameEl.addEventListener('click', (e) => {
    const arr = e.target.closest('.arr');
    if (!arr) return;
    const slot = +arr.closest('.arcade-slot').dataset.slot;
    const dir = arr.dataset.dir === 'up' ? -1 : 1;
    arcadeLetters[slot] = (arcadeLetters[slot] + dir + ALPHA.length) % ALPHA.length;
    updateArcadeDisplay();
    beep(600 + arcadeLetters[slot] * 15, 0.03, 'square', 0.04);
  });

  arcadeSubmitEl.addEventListener('click', () => {
    const name = getArcadeName();
    localStorage.setItem('chromasort_name', name);
    const lbKey = state.daily ? 'daily_' + getDailySeed() : state.difficulty;
    const idx = addToLB(lbKey, name, state.score, state.totalTime);
    lastSubmittedIdx = idx;
    arcadeEntryEl.style.display = 'none';
    renderLB(lbKey, idx);
    beep(880, 0.08, 'square', 0.06);
    setTimeout(() => beep(1100, 0.1, 'square', 0.06), 80);
  });

  function endGame() {
    state.phase = 'done';
    stopEarthquake();
    stopBlackout();
    overlayEl.classList.remove('hidden');
    igGearEl.style.display = 'none';
    igDropdownEl.classList.remove('show');
    igGearEl.classList.remove('open');
    const modeLabel = state.zen ? 'Zen Complete' : state.daily ? '☀ Daily Complete' : 'Sorted!';
    overlayTitleEl.textContent = modeLabel;
    overlayMsgEl.textContent = state.zen
      ? `${state.totalRounds} round${state.totalRounds === 1 ? '' : 's'}. No rush. Pure flow.`
      : state.daily
      ? `Today's challenge complete! Same colors for everyone.`
      : `${state.totalRounds} round${state.totalRounds === 1 ? '' : 's'} complete.`;
    overlayStatsEl.style.display = 'flex';
    overlayStatsEl.innerHTML = `
      <div>${state.score}<span>score</span></div>
      <div>${state.totalTime.toFixed(1)}s<span>total time</span></div>
      <div>${state.bestStreak}<span>best streak</span></div>
      <div>${state.mistakes}<span>mistakes</span></div>
    `;
    overlaySettingsEl.style.display = '';
    overlayBtnEl.textContent = 'Play Again';
    lastSubmittedIdx = -1;

    // Daily uses its own leaderboard key
    const lbKey = state.daily ? 'daily_' + getDailySeed() : state.difficulty;

    // Show arcade entry if qualifies (not in zen)
    if (!state.zen && qualifiesForLB(lbKey, state.score) && state.score > 0) {
      arcadeEntryEl.style.display = '';
      updateArcadeDisplay();
    } else {
      arcadeEntryEl.style.display = 'none';
    }

    // Always show leaderboard if there are entries
    renderLB(lbKey, -1);
  }

  overlayBtnEl.addEventListener('click', () => {
    arcadeEntryEl.style.display = 'none';
    leaderboardEl.style.display = 'none';
    startGame(false);
  });

  dailyBtnEl.addEventListener('click', () => {
    arcadeEntryEl.style.display = 'none';
    leaderboardEl.style.display = 'none';
    startGame(true);
  });

  // Keyboard: press first letter of color name as shortcut
  window.addEventListener('keydown', (e) => {
    if (state.phase !== 'playing') {
      if (e.code === 'Space' || e.code === 'Enter') {
        if (arcadeEntryEl.style.display !== 'none') {
          arcadeSubmitEl.click();
        } else {
          startGame(false);
        }
      }
      return;
    }
  });

  // Update leaderboard when difficulty changes
  difficultySelectEl.addEventListener('change', () => {
    renderLB(difficultySelectEl.value, -1);
  });

  // Show leaderboard for current difficulty on start screen
  renderLB('medium', -1);
  updateHud();
})();
</script>
</body>
</html>
