<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Lava</title>
<link rel="icon" href="https://emojicdn.elk.sh/🫧">
<meta property="og:title" content="Neon Lava">
<meta property="og:description" content="Mesmerizing neon lava lamp — press any key to shift colors and make blobs pulsate.">
<meta property="og:url" content="https://sloppy.live/neon-lava/">
<meta property="og:image" content="https://sloppy.live/neon-lava/og-image.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;cursor:none}
canvas{display:block}
#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-family:'Segoe UI',sans-serif;font-size:13px;letter-spacing:1px;pointer-events:none;transition:opacity 1.5s;z-index:10}
#backlink{position:fixed;bottom:8px;right:12px;color:rgba(255,255,255,.1);font-size:10px;font-family:sans-serif;text-decoration:none;z-index:10}
#backlink:hover{color:rgba(255,255,255,.3)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">press any key to shift the vibe</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  CV.width=W;CV.height=H;
}
resize();
window.addEventListener('resize',resize);

// Color palettes
const palettes=[
  ['#ff00ff','#ff44aa','#cc00ff','#ff0088','#aa00ff'],
  ['#00ffff','#00ccff','#0088ff','#00ffaa','#44ffff'],
  ['#ff6600','#ff3300','#ffaa00','#ff0044','#ff8800'],
  ['#00ff66','#00ff00','#44ff88','#00ffcc','#88ff00'],
  ['#ffff00','#ffcc00','#ff9900','#ffee44','#aaff00'],
  ['#ff0055','#ff0000','#ff4444','#cc0033','#ff2266'],
  ['#8800ff','#6600ff','#aa44ff','#cc00ff','#5500cc'],
  ['#00ffff','#ff00ff','#ffff00','#00ff00','#ff4400'],
];

let currentPalette=0;
let targetPalette=0;
let paletteBlend=1;
let pulseEnergy=0;
let keyFlash=0;
let hueShift=0;
let interacted=false;

// Metaballs / blobs
const blobs=[];
const BLOB_COUNT=12;

for(let i=0;i<BLOB_COUNT;i++){
  blobs.push({
    x:W*0.3+Math.random()*W*0.4,
    y:H*0.2+Math.random()*H*0.6,
    vx:(Math.random()-0.5)*0.8,
    vy:(Math.random()-0.5)*0.5-0.3,
    baseR:40+Math.random()*60,
    r:40+Math.random()*60,
    phase:Math.random()*Math.PI*2,
    speed:0.003+Math.random()*0.005,
    colorIdx:Math.floor(Math.random()*5),
    pulsePhase:Math.random()*Math.PI*2,
    wobble:0.15+Math.random()*0.2,
  });
}

// Offscreen buffer for metaball field
const buf=document.createElement('canvas');
const bx=buf.getContext('2d');
let bufScale=3; // render at 1/3 for performance
let bW,bH;

function resizeBuf(){
  bW=Math.ceil(W/bufScale);
  bH=Math.ceil(H/bufScale);
  buf.width=bW;buf.height=bH;
}
resizeBuf();
window.addEventListener('resize',resizeBuf);

// Key input
const keyMap={};
document.addEventListener('keydown',e=>{
  if(keyMap[e.key])return;
  keyMap[e.key]=true;
  pulseEnergy=Math.min(pulseEnergy+0.4,1.5);
  keyFlash=1;
  hueShift+=15+Math.random()*20;
  // Cycle palette
  targetPalette=(targetPalette+1)%palettes.length;
  paletteBlend=0;
  // Kick blobs
  for(const b of blobs){
    b.vx+=(Math.random()-0.5)*2;
    b.vy+=(Math.random()-0.5)*2-0.5;
    b.pulsePhase=Math.random()*Math.PI*2;
  }
  if(!interacted){
    interacted=true;
    document.getElementById('hint').style.opacity='0';
  }
});
document.addEventListener('keyup',e=>{keyMap[e.key]=false;});

// Touch support
CV.addEventListener('touchstart',e=>{
  e.preventDefault();
  pulseEnergy=Math.min(pulseEnergy+0.4,1.5);
  keyFlash=1;
  hueShift+=15+Math.random()*20;
  targetPalette=(targetPalette+1)%palettes.length;
  paletteBlend=0;
  for(const b of blobs){
    b.vx+=(Math.random()-0.5)*2;
    b.vy+=(Math.random()-0.5)*2-0.5;
    b.pulsePhase=Math.random()*Math.PI*2;
  }
  if(!interacted){interacted=true;document.getElementById('hint').style.opacity='0';}
},{passive:false});

function lerpColor(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
  return'rgb('+r+','+g+','+b+')';
}

function getColor(idx){
  const p1=palettes[currentPalette];
  const p2=palettes[targetPalette];
  const i=idx%5;
  return lerpColor(p1[i],p2[i],paletteBlend);
}

function update(dt){
  // Palette transition
  if(paletteBlend<1){
    paletteBlend=Math.min(1,paletteBlend+dt*1.2);
    if(paletteBlend>=1)currentPalette=targetPalette;
  }

  // Decay energy
  pulseEnergy*=0.97;
  keyFlash*=0.92;

  // Update blobs
  for(const b of blobs){
    b.phase+=b.speed*60*dt;
    b.pulsePhase+=0.04*60*dt;

    // Lava-like buoyancy
    const buoy=(b.y>H*0.6)?-0.15:(b.y<H*0.3)?0.1:0;
    b.vy+=buoy*dt*60;

    // Wobble
    b.vx+=Math.sin(b.phase*1.3)*b.wobble*0.1;
    b.vy+=Math.cos(b.phase*0.7)*b.wobble*0.08;

    // Damping
    b.vx*=0.995;
    b.vy*=0.995;

    // Speed limit
    const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(spd>3){b.vx=b.vx/spd*3;b.vy=b.vy/spd*3;}

    b.x+=b.vx*dt*60;
    b.y+=b.vy*dt*60;

    // Pulse radius
    const pulse=1+Math.sin(b.pulsePhase)*0.15*(1+pulseEnergy*2);
    b.r=b.baseR*pulse;

    // Walls (soft bounce within lamp shape)
    const margin=b.r*0.5;
    const lampLeft=W*0.15,lampRight=W*0.85;
    const lampTop=H*0.05,lampBot=H*0.95;

    // Narrower at top and bottom (lamp shape)
    const yNorm=(b.y-lampTop)/(lampBot-lampTop);
    const squeeze=1-0.4*Math.pow(Math.abs(yNorm-0.5)*2,2);
    const effLeft=W*0.5-squeeze*(W*0.35);
    const effRight=W*0.5+squeeze*(W*0.35);

    if(b.x<effLeft+margin){b.x=effLeft+margin;b.vx=Math.abs(b.vx)*0.4;}
    if(b.x>effRight-margin){b.x=effRight-margin;b.vx=-Math.abs(b.vx)*0.4;}
    if(b.y<lampTop+margin){b.y=lampTop+margin;b.vy=Math.abs(b.vy)*0.4;}
    if(b.y>lampBot-margin){b.y=lampBot-margin;b.vy=-Math.abs(b.vy)*0.4;}
  }
}

function renderMetaballs(){
  const imgData=bx.createImageData(bW,bH);
  const data=imgData.data;

  for(let py=0;py<bH;py++){
    for(let px=0;px<bW;px++){
      const wx=px*bufScale,wy=py*bufScale;
      let totalField=0;
      let rSum=0,gSum=0,bSum=0,wSum=0;

      for(const bl of blobs){
        const dx=wx-bl.x,dy=wy-bl.y;
        const distSq=dx*dx+dy*dy;
        const field=(bl.r*bl.r)/distSq;
        totalField+=field;

        if(field>0.01){
          const col=getColor(bl.colorIdx);
          const m=col.match(/\d+/g);
          const cr=+m[0],cg=+m[1],cb=+m[2];
          rSum+=cr*field;gSum+=cg*field;bSum+=cb*field;
          wSum+=field;
        }
      }

      const idx=(py*bW+px)*4;
      if(totalField>0.8){
        const t=Math.min(1,(totalField-0.8)*3);
        const brightness=0.6+t*0.4+keyFlash*0.3;
        if(wSum>0){
          data[idx]=Math.min(255,Math.round(rSum/wSum*brightness));
          data[idx+1]=Math.min(255,Math.round(gSum/wSum*brightness));
          data[idx+2]=Math.min(255,Math.round(bSum/wSum*brightness));
        }
        data[idx+3]=Math.round(t*255);
      } else {
        data[idx+3]=0;
      }
    }
  }
  bx.putImageData(imgData,0,0);
}

function drawLampShape(){
  // Glass outline
  X.save();
  X.beginPath();
  const cx=W/2,topY=H*0.03,botY=H*0.97;
  const midY=H*0.5;
  const topW=W*0.18,midW=W*0.38,botW=W*0.2;

  X.moveTo(cx-topW,topY);
  X.bezierCurveTo(cx-midW,H*0.2,cx-midW,H*0.35,cx-midW,midY);
  X.bezierCurveTo(cx-midW,H*0.65,cx-midW,H*0.8,cx-botW,botY);
  X.lineTo(cx+botW,botY);
  X.bezierCurveTo(cx+midW,H*0.8,cx+midW,H*0.65,cx+midW,midY);
  X.bezierCurveTo(cx+midW,H*0.35,cx+midW,H*0.2,cx+topW,topY);
  X.closePath();

  // Subtle glass reflection
  const glassGrad=X.createLinearGradient(cx-midW,0,cx+midW,0);
  glassGrad.addColorStop(0,'rgba(255,255,255,.03)');
  glassGrad.addColorStop(0.3,'rgba(255,255,255,.01)');
  glassGrad.addColorStop(0.7,'rgba(255,255,255,.0)');
  glassGrad.addColorStop(1,'rgba(255,255,255,.02)');
  X.fillStyle=glassGrad;
  X.fill();

  X.strokeStyle='rgba(255,255,255,.06)';
  X.lineWidth=1.5;
  X.stroke();
  X.restore();

  // Cap top
  X.fillStyle='rgba(40,40,50,.8)';
  X.beginPath();
  X.ellipse(cx,topY,topW+5,12,0,0,Math.PI*2);
  X.fill();
  X.strokeStyle='rgba(255,255,255,.08)';X.stroke();

  // Base bottom
  X.fillStyle='rgba(40,40,50,.9)';
  X.beginPath();
  X.ellipse(cx,botY,botW+8,14,0,0,Math.PI*2);
  X.fill();
  X.strokeStyle='rgba(255,255,255,.08)';X.stroke();
}

function drawGlow(){
  // Background glow from blobs
  for(const b of blobs){
    const col=getColor(b.colorIdx);
    const grad=X.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*3);
    grad.addColorStop(0,col.replace('rgb','rgba').replace(')',',0.04)'));
    grad.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=grad;
    X.fillRect(b.x-b.r*3,b.y-b.r*3,b.r*6,b.r*6);
  }
}

let lastTime=performance.now();
function loop(now){
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  update(dt);

  // Clear
  X.fillStyle='#0a0a0f';
  X.fillRect(0,0,W,H);

  // Ambient glow
  drawGlow();

  // Lamp glass outline (behind blobs)
  drawLampShape();

  // Render metaballs to buffer
  renderMetaballs();

  // Draw buffer scaled up with smooth interpolation
  X.imageSmoothingEnabled=true;
  X.imageSmoothingQuality='high';
  X.globalCompositeOperation='lighter';
  X.drawImage(buf,0,0,bW,bH,0,0,W,H);
  X.globalCompositeOperation='source-over';

  // Key flash overlay
  if(keyFlash>0.05){
    const col=getColor(0);
    X.fillStyle=col.replace('rgb','rgba').replace(')',','+keyFlash*0.08+')');
    X.fillRect(0,0,W,H);
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
