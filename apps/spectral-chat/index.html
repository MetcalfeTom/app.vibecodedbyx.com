<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Spectral Chat</title>
<meta name="description" content="Whisper into the void. Every message drifts up the screen as a ghost emoji until it dissolves into the mist.">
<meta property="og:title" content="Spectral Chat">
<meta property="og:description" content="Whisper into the void. Every message drifts up the screen as a ghost emoji until it dissolves into the mist.">
<meta property="og:url" content="https://sloppy.live/spectral-chat">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Spectral%20séance%20chat%20screen%20with%20floating%20ghostly%20translucent%20emoji%20bubbles%20rising%20through%20deep%20violet%20mist%2C%20cormorant%20italic%20text%2C%20vintage%20spirit%20photograph%20vibe?width=1200&height=630&model=flux&nologo=true&seed=2666">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%91%BB">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Cormorant+Garamond:ital,wght@1,300;1,500&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0612;
    --mist:#1a1226;
    --paper:#e8dfe8;
    --plum:#8a64c8;
    --violet:#a78fff;
    --moss:#7ec88a;
    --rose:#ff9ad8;
    --amber:#ffc870;
    --ink-3:#7a7080;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{
    width:100%; height:100dvh;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(138,100,200,0.18), transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(255,154,216,0.10), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(126,200,138,0.08), transparent 50%),
      linear-gradient(180deg, #0a0612 0%, #1a0e2c 100%);
    color: var(--paper);
    font-family:'Cormorant Garamond', serif;
    overflow:hidden;
    touch-action:none;
  }

  /* Drifting mist overlay — two layers at different parallax */
  .mist{
    position:fixed; inset:0;
    pointer-events:none;
    z-index:1;
    background-image:
      radial-gradient(ellipse at 20% 60%, rgba(167,143,255,0.08), transparent 45%),
      radial-gradient(ellipse at 80% 30%, rgba(232,223,232,0.06), transparent 50%),
      radial-gradient(ellipse at 50% 90%, rgba(138,100,200,0.10), transparent 55%);
    animation: mist-drift 36s ease-in-out infinite alternate;
  }
  @keyframes mist-drift{
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(-3%, 2%) scale(1.05); }
  }
  /* Vintage spirit-photograph grain */
  .grain{
    position:fixed; inset:0;
    pointer-events:none;
    z-index:2;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.5   0 0 0 0 0.4   0 0 0 0 0.55   0 0 0 0.6 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/></svg>");
    background-size: 220px 220px;
    mix-blend-mode: screen;
    opacity: 0.32;
  }
  .vignette{
    position:fixed; inset:0;
    pointer-events:none;
    z-index:3;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  }

  /* ── Masthead ── */
  header{
    position:fixed;
    top:0; left:0; right:0;
    z-index:8;
    padding:1rem 1.2rem 0.6rem;
    text-align:center;
    pointer-events:none;
  }
  h1{
    font-family:'Major Mono Display', monospace;
    font-weight:400;
    font-size:clamp(1.4rem, 3vw, 2.4rem);
    letter-spacing:0.16em;
    color: var(--paper);
    line-height:1;
    text-shadow:
      0 0 14px rgba(167, 143, 255, 0.55),
      0 0 36px rgba(138, 100, 200, 0.35);
  }
  h1 .dot{ color: var(--rose); }
  .tagline{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:300;
    margin-top:0.3rem;
    color: rgba(232, 223, 232, 0.7);
    font-size: clamp(0.92rem, 1.4vw, 1.15rem);
    text-shadow: 0 0 12px rgba(167,143,255,0.35);
  }
  .news-strip{
    margin-top: 0.4rem;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    color: var(--ink-3);
    text-transform: uppercase;
  }

  /* ── Floating message layer (between mist and UI) ── */
  #ghost-layer{
    position:fixed;
    inset:0;
    z-index:4;
    pointer-events:none;
    overflow:hidden;
  }
  .ghost{
    position:absolute;
    transform: translate(-50%, 0);
    color: var(--paper);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 0.25rem;
    pointer-events: auto;
    cursor: pointer;
    user-select: none;
  }
  .ghost .em{
    font-size: 2.2rem;
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(167, 143, 255, 0.6));
    transition: transform 0.2s ease;
  }
  .ghost:hover .em{ transform: scale(1.15); }
  .ghost .msg{
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    line-height: 1.2;
    color: var(--paper);
    background: rgba(10, 6, 18, 0.35);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    padding: 0.18rem 0.65rem;
    border-radius: 11px;
    border: 1px solid rgba(167, 143, 255, 0.25);
    max-width: 22rem;
    text-align: center;
    word-wrap: break-word;
    text-shadow: 0 0 6px rgba(0,0,0,0.65);
  }
  .ghost .who{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: rgba(232,223,232,0.55);
    letter-spacing: 0.12em;
    margin-top: 0.1rem;
  }
  .ghost.wail .em{
    animation: wail 0.8s ease-out;
  }
  @keyframes wail{
    0%   { transform: scale(1) rotate(0); filter: drop-shadow(0 0 12px rgba(167,143,255,0.6)); }
    25%  { transform: scale(1.4) rotate(-8deg); filter: drop-shadow(0 0 28px rgba(255,154,216,0.9)); }
    50%  { transform: scale(1.5) rotate(7deg); filter: drop-shadow(0 0 32px rgba(255,200,112,0.9)); }
    100% { transform: scale(1) rotate(0); filter: drop-shadow(0 0 12px rgba(167,143,255,0.6)); }
  }

  /* ── Input bar (bottom) ── */
  .composer{
    position:fixed;
    bottom: 1rem; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: min(620px, calc(100vw - 1.5rem));
    background: rgba(10, 6, 18, 0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(167, 143, 255, 0.35);
    border-radius: 99px;
    padding: 0.45rem 0.5rem 0.45rem 1rem;
    display:flex;
    align-items:center;
    gap: 0.55rem;
    box-shadow: 0 8px 28px rgba(0,0,0,0.55);
  }
  .composer input{
    flex: 1;
    background: transparent;
    border: none;
    color: var(--paper);
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    outline: none;
    padding: 0.45rem 0.4rem;
    min-height: 2rem;
  }
  .composer input::placeholder{ color: rgba(232,223,232,0.45); font-style: italic; }
  .composer button{
    background: linear-gradient(135deg, rgba(138,100,200,0.6), rgba(255,154,216,0.5));
    color: var(--paper);
    border: 1px solid rgba(255,154,216,0.5);
    border-radius: 99px;
    padding: 0.4rem 1rem;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    min-height: 2rem;
    text-shadow: 0 0 6px rgba(255,154,216,0.6);
  }
  .composer button:hover{ background: linear-gradient(135deg, rgba(138,100,200,0.85), rgba(255,154,216,0.7)); }
  .composer button:focus-visible{ outline: 2px solid var(--rose); outline-offset: 2px; }

  /* ── Settings (top-right tiny) ── */
  .settings{
    position: fixed;
    top: 0.9rem; right: 0.9rem;
    z-index: 9;
    display:flex;
    gap: 0.4rem;
    flex-direction: column;
    align-items: flex-end;
  }
  .pill{
    background: rgba(10, 6, 18, 0.7);
    color: var(--paper);
    border: 1px solid rgba(167, 143, 255, 0.3);
    border-radius: 99px;
    padding: 0.32rem 0.7rem;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    min-height: 1.8rem;
  }
  .pill:hover{ background: rgba(167, 143, 255, 0.15); }
  .pill:focus-visible{ outline: 2px solid var(--violet); outline-offset: 2px; }
  .pill .dot{
    display:inline-block;
    width:0.5rem; height:0.5rem;
    border-radius:50%;
    background: var(--ink-3);
    margin-right: 0.35rem;
    vertical-align: middle;
  }
  .pill .dot.live{ background: var(--moss); box-shadow: 0 0 6px var(--moss); animation: pulse 1.4s ease-in-out infinite; }
  .pill .dot.connecting{ background: var(--amber); animation: pulse 0.8s ease-in-out infinite; }
  .pill .dot.error{ background: var(--rose); }
  @keyframes pulse{ 50% { opacity: 0.45; } }

  /* Twitch panel — slides down when active */
  .twitch-panel{
    background: rgba(10, 6, 18, 0.92);
    border: 1px solid rgba(167, 143, 255, 0.4);
    border-radius: 8px;
    padding: 0.6rem 0.7rem;
    display: none;
    gap: 0.45rem;
    align-items: center;
    box-shadow: 0 4px 18px rgba(0,0,0,0.5);
  }
  .twitch-panel.show{ display:flex; }
  .twitch-panel input{
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(167,143,255,0.3);
    color: var(--paper);
    padding: 0.32rem 0.55rem;
    border-radius: 4px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    width: 8rem;
  }
  .twitch-panel button{
    background: rgba(167,143,255,0.18);
    color: var(--violet);
    border: 1px solid var(--violet);
    border-radius: 4px;
    padding: 0.3rem 0.65rem;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    text-transform: uppercase;
  }
  .twitch-panel button:hover{ background: rgba(167,143,255,0.3); }

  @media (max-width: 640px){
    .composer{ width: calc(100vw - 1rem); padding: 0.4rem 0.45rem 0.4rem 0.85rem; }
    .composer input{ font-size: 1rem; }
    .composer button{ padding: 0.35rem 0.7rem; font-size: 0.72rem; }
  }
  @media (prefers-reduced-motion: reduce){
    .mist, .pill .dot.live, .pill .dot.connecting, .ghost.wail .em{ animation: none !important; }
  }
</style>
</head>
<body>
<div class="mist" aria-hidden="true"></div>
<div class="grain" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>

<header>
  <h1>spectral<span class="dot">·</span>chat</h1>
  <p class="tagline">Whisper into the void. Every message drifts up the screen as a ghost until it dissolves into the mist.</p>
  <div class="news-strip">⛧ a séance · 8s drift · click a ghost to wail ⛧</div>
</header>

<div id="ghost-layer" aria-label="Floating spectral messages" role="log" aria-live="polite"></div>

<div class="settings">
  <button class="pill" id="btn-twitch" type="button" aria-expanded="false">
    <span class="dot" id="tw-dot"></span><span id="tw-label">Twitch</span>
  </button>
  <div class="twitch-panel" id="tw-panel">
    <input type="text" id="tw-input" placeholder="channel name" autocomplete="off">
    <button type="button" id="tw-join">JOIN</button>
    <button type="button" id="tw-leave">LEAVE</button>
  </div>
</div>

<form class="composer" id="composer" autocomplete="off">
  <input type="text" id="msg-input" placeholder="whisper something into the mist…" maxlength="140" autocomplete="off" aria-label="Your message">
  <button type="submit">⛧ Send</button>
</form>

<script>
/* ════════════════════════════════════════════════════════════
   SPECTRAL CHAT — messages drift up as ghost emojis
   ──────────────────────────────────────────────────────────── */

const ghostLayer = document.getElementById('ghost-layer');
const GHOST_EMOJIS = ['👻','🕯️','💀','🦇','⚰️','🪦','🔮','☠️','🌫️','🩸','🕸️','🌙'];

// FNV-1a hash → deterministic per name (so the same chatter
// always gets the same ghost emoji + drift hue)
function fnv1a(s){
  let h = 0x811c9dc5;
  for (let i = 0; i < s.length; i++){
    h ^= s.charCodeAt(i);
    h = (h + ((h<<1) + (h<<4) + (h<<7) + (h<<8) + (h<<24))) >>> 0;
  }
  return h;
}
function emojiFor(name){
  return GHOST_EMOJIS[fnv1a(name.toLowerCase()) % GHOST_EMOJIS.length];
}
function hueFor(name){
  return fnv1a(name.toLowerCase() + 'tint') % 360;
}

let nextGhostId = 0;
const liveGhosts = [];

function summonGhost(text, who){
  if (!text) return;
  const id = ++nextGhostId;
  const em = who ? emojiFor(who) : GHOST_EMOJIS[Math.floor(Math.random() * GHOST_EMOJIS.length)];
  const hue = who ? hueFor(who) : (260 + Math.random() * 60);

  const el = document.createElement('div');
  el.className = 'ghost';
  el.style.left = (10 + Math.random() * 80) + '%';   // start somewhere across the bottom
  el.style.bottom = '-3rem';                          // start just off-screen
  el.innerHTML =
    '<span class="em" aria-hidden="true">' + em + '</span>' +
    '<span class="msg">' + escapeHtml(text.slice(0, 140)) + '</span>' +
    (who ? '<span class="who">— ' + escapeHtml(who) + '</span>' : '');
  el.style.color = 'hsl(' + hue + ', 70%, 78%)';
  ghostLayer.appendChild(el);

  // record state for the animation loop
  const startY = window.innerHeight + 50;  // CSS bottom:-3rem → roughly off-screen
  const driftSeconds = 9 + Math.random() * 4;
  const wobbleAmp = 14 + Math.random() * 22;
  const wobbleFreq = 0.7 + Math.random() * 0.7;
  const startX = parseFloat(el.style.left) / 100 * window.innerWidth;
  liveGhosts.push({
    el, id,
    bornAt: performance.now(),
    duration: driftSeconds * 1000,
    startX, wobbleAmp, wobbleFreq,
    em,
  });
  // click handler — wail
  el.addEventListener('click', () => {
    el.classList.remove('wail'); void el.offsetWidth; el.classList.add('wail');
    playWail();
  });
  // ambient summon chime
  playSummon(em);
}
function escapeHtml(s){
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

/* ── Animation loop: drift ghosts upward + wobble + fade ── */
function frame(){
  const now = performance.now();
  const H = window.innerHeight;
  for (let i = liveGhosts.length - 1; i >= 0; i--){
    const g = liveGhosts[i];
    const t = (now - g.bornAt) / g.duration;     // 0 → 1
    if (t >= 1){
      g.el.remove();
      liveGhosts.splice(i, 1);
      continue;
    }
    // ease-out: faster at start, slower at top
    const ease = 1 - Math.pow(1 - t, 1.6);
    const y = (H + 60) - ease * (H + 100);
    const wx = Math.sin(t * Math.PI * 2 * g.wobbleFreq) * g.wobbleAmp;
    g.el.style.transform = 'translate(calc(-50% + ' + wx + 'px), 0)';
    g.el.style.top = y + 'px';
    g.el.style.bottom = 'auto';
    // fade in over first 8%, hold, fade out over last 25%
    let alpha = 1;
    if (t < 0.08) alpha = t / 0.08;
    else if (t > 0.75) alpha = (1 - t) / 0.25;
    g.el.style.opacity = alpha.toFixed(3);
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ── Composer ── */
const form = document.getElementById('composer');
const input = document.getElementById('msg-input');
form.addEventListener('submit', e => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  let me = '';
  try { me = localStorage.getItem('spectral-chat-name') || ''; } catch(_){}
  if (!me){
    me = 'wanderer-' + Math.random().toString(36).slice(2, 6);
    try { localStorage.setItem('spectral-chat-name', me); } catch(_){}
  }
  summonGhost(text, me);
  input.value = '';
});

/* ── Audio (very minimal — Web Audio) ── */
let audioCtx = null;
function ensureAudio(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
// soft sine chime when a ghost is summoned (pitch derived from emoji)
function playSummon(em){
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const code = em.codePointAt(0) % 12;
  const freq = 440 * Math.pow(2, code / 12) * 0.5;
  const o = audioCtx.createOscillator();
  o.type = 'sine'; o.frequency.value = freq;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.05, t + 0.03);
  g.gain.exponentialRampToValueAtTime(0.001, t + 1.4);
  // gentle convolver-less reverb via three slightly-delayed copies
  o.connect(g).connect(audioCtx.destination);
  o.start(t); o.stop(t + 1.6);
}
// "wail" on click — descending saw with vibrato
function playWail(){
  ensureAudio();
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(420, t);
  o.frequency.exponentialRampToValueAtTime(120, t + 1.2);
  const lfo = audioCtx.createOscillator();
  lfo.frequency.value = 5.5;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 16;
  lfo.connect(lfoGain).connect(o.detune);
  lfo.start(t); lfo.stop(t + 1.4);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.08, t + 0.04);
  g.gain.exponentialRampToValueAtTime(0.001, t + 1.3);
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 900;
  o.connect(lp).connect(g).connect(audioCtx.destination);
  o.start(t); o.stop(t + 1.4);
}
// unlock audio on first interaction
document.addEventListener('pointerdown', () => ensureAudio(), { once: true });
document.addEventListener('keydown', () => ensureAudio(), { once: true });

/* ── Twitch IRC integration (anonymous read-only)
   Same wss + justinfan pattern used elsewhere on sloppy.live so any
   livestream chat lights up the séance. */
const twBtn   = document.getElementById('btn-twitch');
const twPanel = document.getElementById('tw-panel');
const twInput = document.getElementById('tw-input');
const twJoin  = document.getElementById('tw-join');
const twLeave = document.getElementById('tw-leave');
const twDot   = document.getElementById('tw-dot');
const twLabel = document.getElementById('tw-label');
let ws = null, currentChannel = '';
twBtn.addEventListener('click', () => {
  const open = twPanel.classList.toggle('show');
  twBtn.setAttribute('aria-expanded', String(open));
});
twJoin.addEventListener('click', () => connectTwitch());
twLeave.addEventListener('click', () => disconnectTwitch());
twInput.addEventListener('keydown', e => { if (e.key === 'Enter') connectTwitch(); });
try { twInput.value = localStorage.getItem('spectral-chat-channel') || ''; } catch(_){}

function setTwitchStatus(state, label){
  twDot.className = 'dot ' + state;
  twLabel.textContent = label;
}
function connectTwitch(){
  const ch = (twInput.value || '').trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
  if (!ch){ setTwitchStatus('error', 'enter a channel'); return; }
  if (ws){ try { ws.close(); } catch(_){} }
  currentChannel = ch;
  setTwitchStatus('connecting', '#' + ch);
  try { localStorage.setItem('spectral-chat-channel', ch); } catch(_){}
  try {
    ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
    ws.addEventListener('open', () => {
      ws.send('PASS SCHMOOPIIE');
      ws.send('NICK justinfan' + Math.floor(Math.random() * 99999));
      ws.send('JOIN #' + ch);
      setTwitchStatus('live', '#' + ch);
    });
    ws.addEventListener('message', e => {
      for (const line of e.data.split(/\r?\n/)){
        if (!line) continue;
        if (line.startsWith('PING')){ ws.send('PONG :tmi.twitch.tv'); continue; }
        const m = line.match(/^:([A-Za-z0-9_]+)![^ ]+ PRIVMSG #[^ ]+ :(.*)$/);
        if (!m) continue;
        summonGhost(m[2].trim().slice(0, 140), m[1]);
      }
    });
    ws.addEventListener('close', () => {
      setTwitchStatus('', 'Twitch');
      // auto-reconnect if still in a channel
      if (currentChannel){ setTimeout(() => { if (!ws && currentChannel) connectTwitch(); }, 3500); }
    });
    ws.addEventListener('error', () => setTwitchStatus('error', 'error'));
  } catch(e){ setTwitchStatus('error', 'failed'); }
}
function disconnectTwitch(){
  currentChannel = '';
  if (ws){ try { ws.close(); } catch(_){} }
  setTwitchStatus('', 'Twitch');
}

/* ── Boot ─────────────────────────────────────────────────── */
// seed a couple of welcome ghosts so the void isn't empty on arrival
setTimeout(() => summonGhost('the veil thins…', 'orpheus'), 600);
setTimeout(() => summonGhost('whisper, and i will rise.', 'the witness'), 2200);
</script>
</body>
</html>
