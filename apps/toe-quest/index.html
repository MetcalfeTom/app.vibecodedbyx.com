<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Toe Quest — Fight the Mold</title>
<link rel="icon" href="https://emojicdn.elk.sh/🦶">
<meta property="og:title" content="Toe Quest">
<meta property="og:description" content="A tiny RPG where your toe fights mold. It's exactly what it sounds like.">
<meta property="og:url" content="https://sloppy.live/toe-quest">
<meta property="og:image" content="https://sloppy.live/toe-quest/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1812;--panel:#22201a;--border:#3a3628;
  --skin:#e8c498;--mold:#5a8a40;--poison:#8a6ac0;
  --text:#8a8068;--bright:#d0c8a8;--dim:#4a4638;--red:#c04848;--blue:#4888c0;
}
body{background:var(--bg);color:var(--text);font-family:'Silkscreen',cursive;
  min-height:100vh;display:flex;flex-direction:column;align-items:center}
#game{width:min(480px,95vw);margin:0 auto}
#scene{background:var(--panel);border:2px solid var(--border);border-radius:6px;
  padding:16px;margin:8px 0;min-height:200px;position:relative;overflow:hidden}
#battleField{display:flex;justify-content:space-between;align-items:flex-end;min-height:140px;padding:0 20px}
.combatant{text-align:center;position:relative}
.combatant canvas{display:block;image-rendering:pixelated;margin:0 auto}
.combatant .name{font-size:10px;margin-top:4px;color:var(--dim)}
.hp-bar{width:80px;height:6px;background:#1a1510;border-radius:3px;margin:4px auto;overflow:hidden}
.hp-fill{height:100%;border-radius:3px;transition:width .3s}
.hp-fill.player{background:linear-gradient(90deg,#c04848,#e06060)}
.hp-fill.enemy{background:linear-gradient(90deg,var(--mold),#80c060)}
#narrative{background:var(--bg);border:1px solid var(--border);border-radius:4px;
  padding:10px;margin:8px 0;min-height:50px;font-family:'DotGothic16',cursive;
  font-size:12px;line-height:1.6;color:var(--text)}
#actions{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0}
#actions button{flex:1;min-width:90px;background:var(--panel);border:2px solid var(--border);
  color:var(--bright);font-family:'Silkscreen',cursive;font-size:11px;padding:10px 8px;
  border-radius:4px;cursor:pointer;transition:all .15s}
#actions button:hover{border-color:var(--bright);background:var(--border)}
#actions button:disabled{opacity:.3;cursor:default}
#actions button .cost{font-size:8px;color:var(--dim);display:block}
#stats{display:flex;gap:12px;padding:6px 8px;font-size:10px;flex-wrap:wrap;justify-content:center}
.stat{display:flex;align-items:center;gap:3px}
.stat .val{color:var(--bright);font-weight:700}
#header{font-size:clamp(18px,4vw,26px);color:var(--skin);padding:12px 0 2px;text-align:center;
  text-shadow:1px 1px 0 #2a1800}
#sub{font-family:'DotGothic16',cursive;font-size:10px;color:var(--dim);margin-bottom:4px;text-align:center}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,24,18,.94);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20}
#overlay.hidden{display:none}
#overlay h1{font-size:clamp(22px,5vw,36px);color:var(--skin);margin-bottom:4px;text-shadow:1px 1px 0 #2a1800}
#overlay .sub{font-family:'DotGothic16',cursive;font-size:11px;color:var(--dim);margin-bottom:16px}
#overlay .stats{font-size:11px;color:var(--text);line-height:2;margin-bottom:16px;text-align:center}
#overlay .stats span{color:var(--skin)}
#playBtn{background:transparent;border:2px solid var(--skin);color:var(--skin);
  font-family:'Silkscreen',cursive;font-size:14px;padding:12px 32px;border-radius:4px;
  cursor:pointer;transition:all .2s}
#playBtn:hover{background:var(--skin);color:var(--bg)}
.shake{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.flash{animation:flash .2s}
@keyframes flash{0%{filter:brightness(3)}100%{filter:brightness(1)}}
</style>
</head>
<body>
<div id="header">🦶 TOE QUEST</div>
<div id="sub">a tiny RPG about fighting mold</div>
<div id="game">
  <div id="stats">
    <div class="stat">❤️ <span class="val" id="hpStat">30/30</span></div>
    <div class="stat">⚔️ <span class="val" id="atkStat">5</span></div>
    <div class="stat">🧴 <span class="val" id="potionStat">3</span></div>
    <div class="stat">🏆 <span class="val" id="winStat">0</span></div>
    <div class="stat">🧫 Floor <span class="val" id="floorStat">1</span></div>
  </div>
  <div id="scene">
    <div id="battleField">
      <div class="combatant" id="playerSide">
        <canvas id="toeCanvas" width="64" height="64"></canvas>
        <div class="hp-bar"><div class="hp-fill player" id="playerHpBar"></div></div>
        <div class="name">BIG TOE</div>
      </div>
      <div class="combatant" id="enemySide">
        <canvas id="moldCanvas" width="64" height="64"></canvas>
        <div class="hp-bar"><div class="hp-fill enemy" id="enemyHpBar"></div></div>
        <div class="name" id="enemyName">???</div>
      </div>
    </div>
  </div>
  <div id="narrative"></div>
  <div id="actions">
    <button id="btnKick">🦶 Kick<span class="cost">basic atk</span></button>
    <button id="btnStomp">💥 Stomp<span class="cost">heavy, 70% hit</span></button>
    <button id="btnCream">🧴 Cream<span class="cost">heal 12</span></button>
    <button id="btnFile">🪚 Nail File<span class="cost">+3 atk 2 turns</span></button>
  </div>
</div>
<div id="overlay">
  <h1>🦶 TOE QUEST</h1>
  <div class="sub">your toe vs the mold kingdom</div>
  <div class="stats" id="finalStats"></div>
  <button id="playBtn">ENTER THE BATHROOM</button>
</div>
<script>
const toeC = document.getElementById('toeCanvas');
const moldC = document.getElementById('moldCanvas');
const toeCtx = toeC.getContext('2d');
const moldCtx = moldC.getContext('2d');
const narrative = document.getElementById('narrative');
const overlay = document.getElementById('overlay');

// Mold bestiary
const MOLDS = [
  {name:'Green Fuzz',hp:15,atk:3,def:0,color:'#5a8a40',desc:'A patch of common bathroom mold. It jiggles menacingly.'},
  {name:'Black Spot',hp:20,atk:4,def:1,color:'#2a2a2a',desc:'Dark mold with attitude. Smells like old shower curtain.'},
  {name:'Pink Slime',hp:18,atk:5,def:0,color:'#c06080',desc:'Bubblegum-colored horror from behind the toilet.'},
  {name:'Fuzzy Terror',hp:25,atk:5,def:2,color:'#6a8a5a',desc:'A furry mass of spores. It breathes. Why does it breathe?'},
  {name:'Tile Creep',hp:22,atk:6,def:1,color:'#4a6a6a',desc:'Mold that has become one with the grout. Permanent resident.'},
  {name:'Spore Lord',hp:30,atk:7,def:2,color:'#8a6a40',desc:'Ancient mold royalty. Has been here longer than the lease.'},
  {name:'Toxic Bloom',hp:28,atk:8,def:2,color:'#6a40a0',desc:'Psychedelic mold. The colors are beautiful but deadly.'},
  {name:'Damp King',hp:35,atk:6,def:4,color:'#3a5a5a',desc:'Ruler of moisture. The shower weeps at its presence.'},
  {name:'Mildew God',hp:45,atk:9,def:3,color:'#4a4a4a',desc:'The final form. It has transcended moldhood.'},
  {name:'MEGA MOLD',hp:60,atk:10,def:4,color:'#1a3a1a',desc:'Floor boss. It IS the bathroom now.'},
];

const BATTLE_QUOTES = [
  'The mold quivers!', 'Spores fly everywhere!', 'A damp breeze blows...',
  'The tile cracks beneath you!', 'You smell victory (and feet)!',
  'The mold hisses!', 'Your nail gleams!', 'Fungal rage intensifies!',
];

let player, enemy, floor, wins, inBattle, playerTurn, buffTurns;

function initPlayer(){
  player = { hp:30, maxHp:30, atk:5, def:1, potions:3 };
  floor = 1; wins = 0; buffTurns = 0;
}

function spawnEnemy(){
  const tier = Math.min(MOLDS.length-1, Math.floor((floor-1)/2) + Math.floor(Math.random()*2));
  const scale = 1 + (floor-1)*0.12;
  const template = MOLDS[tier];
  enemy = {
    name: template.name,
    hp: Math.ceil(template.hp * scale),
    maxHp: Math.ceil(template.hp * scale),
    atk: Math.ceil(template.atk * scale),
    def: Math.floor(template.def * scale),
    color: template.color,
    desc: template.desc,
  };
  document.getElementById('enemyName').textContent = enemy.name;
  narrate(`A wild ${enemy.name} appears! ${enemy.desc}`);
  inBattle = true;
  playerTurn = true;
  updateUI();
  drawMold();
}

function narrate(text){
  narrative.innerHTML = text;
}

function updateUI(){
  document.getElementById('hpStat').textContent = `${player.hp}/${player.maxHp}`;
  document.getElementById('atkStat').textContent = player.atk + (buffTurns>0?3:0);
  document.getElementById('potionStat').textContent = player.potions;
  document.getElementById('winStat').textContent = wins;
  document.getElementById('floorStat').textContent = floor;
  document.getElementById('playerHpBar').style.width = (player.hp/player.maxHp*100)+'%';
  if(enemy){
    document.getElementById('enemyHpBar').style.width = (Math.max(0,enemy.hp)/enemy.maxHp*100)+'%';
  }
  // Disable buttons when not player turn
  document.querySelectorAll('#actions button').forEach(b => b.disabled = !playerTurn);
  document.getElementById('btnCream').disabled = !playerTurn || player.potions <= 0;
}

function playerAttack(type){
  if(!playerTurn || !inBattle) return;
  playerTurn = false;
  const atk = player.atk + (buffTurns > 0 ? 3 : 0);

  if(type === 'kick'){
    const dmg = Math.max(1, atk - enemy.def + Math.floor(Math.random()*3) - 1);
    enemy.hp -= dmg;
    narrate(`🦶 You kick the ${enemy.name} for <b>${dmg}</b> damage! ${BATTLE_QUOTES[Math.floor(Math.random()*BATTLE_QUOTES.length)]}`);
    document.getElementById('enemySide').classList.add('shake');
    setTimeout(()=>document.getElementById('enemySide').classList.remove('shake'),300);
  } else if(type === 'stomp'){
    if(Math.random() < 0.7){
      const dmg = Math.max(1, Math.floor(atk * 1.8) - enemy.def + Math.floor(Math.random()*3));
      enemy.hp -= dmg;
      narrate(`💥 STOMP! Massive hit for <b>${dmg}</b> damage! The bathroom shakes!`);
      document.getElementById('enemySide').classList.add('shake');
      setTimeout(()=>document.getElementById('enemySide').classList.remove('shake'),300);
    } else {
      narrate(`💨 You stomp but MISS! Your foot slips on the wet tile!`);
    }
  } else if(type === 'cream'){
    if(player.potions > 0){
      player.potions--;
      const heal = 12;
      player.hp = Math.min(player.maxHp, player.hp + heal);
      narrate(`🧴 You apply antifungal cream! Healed <b>${heal}</b> HP! Ahhhh, minty.`);
      document.getElementById('playerSide').classList.add('flash');
      setTimeout(()=>document.getElementById('playerSide').classList.remove('flash'),200);
    }
  } else if(type === 'file'){
    buffTurns = 3;
    narrate(`🪚 You sharpen your toenail! ATK +3 for 2 turns! It gleams dangerously.`);
  }

  if(buffTurns > 0) buffTurns--;
  updateUI();
  drawMold();

  if(enemy.hp <= 0){
    setTimeout(()=> enemyDefeated(), 600);
    return;
  }

  // Enemy turn after delay
  setTimeout(()=> enemyTurn(), 800);
}

function enemyTurn(){
  if(!inBattle) return;
  const dmg = Math.max(1, enemy.atk - player.def + Math.floor(Math.random()*3) - 1);
  const special = Math.random();

  if(special < 0.15){
    // Spore cloud
    const sporeDmg = Math.max(1, Math.floor(dmg * 0.6));
    player.hp -= sporeDmg;
    narrate(`🟢 ${enemy.name} releases a spore cloud! <b>${sporeDmg}</b> toxic damage! You cough violently.`);
  } else if(special < 0.25){
    // Heal
    const heal = Math.floor(enemy.maxHp * 0.15);
    enemy.hp = Math.min(enemy.maxHp, enemy.hp + heal);
    narrate(`🧫 ${enemy.name} absorbs moisture and regenerates <b>${heal}</b> HP! Disgusting.`);
  } else {
    player.hp -= dmg;
    const attacks = [
      `${enemy.name} slaps you with a moldy tendril for <b>${dmg}</b>!`,
      `${enemy.name} oozes onto you for <b>${dmg}</b> damage! Gross!`,
      `${enemy.name} flings spores for <b>${dmg}</b>! Your toe stings!`,
      `${enemy.name} bites with fungal fangs for <b>${dmg}</b>!`,
    ];
    narrate(attacks[Math.floor(Math.random()*attacks.length)]);
  }

  document.getElementById('playerSide').classList.add('shake');
  setTimeout(()=>document.getElementById('playerSide').classList.remove('shake'),300);

  updateUI();
  drawToe();

  if(player.hp <= 0){
    setTimeout(()=> gameOver(), 600);
    return;
  }

  playerTurn = true;
  updateUI();
}

function enemyDefeated(){
  wins++;
  inBattle = false;
  const goldish = 3 + floor * 2;
  player.maxHp += 3;
  player.hp = Math.min(player.maxHp, player.hp + 8);
  player.atk += 1;
  if(wins % 3 === 0) player.potions = Math.min(5, player.potions + 1);

  narrate(`🏆 ${enemy.name} dissolves into the drain! +3 max HP, +1 ATK, healed 8.${wins%3===0?' +1 cream!':''} Your toe grows stronger.`);

  // Next floor every 2 wins
  if(wins % 2 === 0) floor++;

  updateUI();

  // Next battle button
  setTimeout(()=>{
    narrate(narrative.innerHTML + `<br><br>🚪 <b style="cursor:pointer;color:var(--skin)" onclick="nextBattle()">Continue deeper into the bathroom →</b>`);
  }, 500);
}

function nextBattle(){
  spawnEnemy();
  drawToe();
}

function gameOver(){
  inBattle = false;
  narrate(`💀 The mold consumes your toe... Your quest ends here.`);
  setTimeout(()=>{
    document.getElementById('finalStats').innerHTML = `
      Victories: <span>${wins}</span><br>
      Floor: <span>${floor}</span><br>
      Final ATK: <span>${player.atk}</span>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('playBtn').textContent = 'TRY AGAIN';
  }, 1500);
}

// Pixel art drawing
function drawToe(){
  const c = toeCtx;
  c.clearRect(0,0,64,64);
  const px = 4;
  function p(x,y,col){ c.fillStyle=col; c.fillRect(x*px,y*px,px,px); }

  // Toe body (rounded pink/skin shape)
  const hurtTint = player.hp < player.maxHp*0.3 ? 30 : 0;
  const skin = `rgb(${220-hurtTint},${180-hurtTint*0.5},${140-hurtTint*0.3})`;
  const skinL = `rgb(${240-hurtTint},${200-hurtTint*0.5},${160-hurtTint*0.3})`;
  const skinD = `rgb(${180-hurtTint},${140-hurtTint*0.5},${100-hurtTint*0.3})`;

  // Toe shape
  for(let dy=0;dy<8;dy++){
    const w = dy < 2 ? 3 : dy < 6 ? 4 : 3;
    const ox = dy < 2 ? 1 : dy < 6 ? 0 : 1;
    for(let dx=0;dx<w;dx++){
      const shade = dy<2 ? skinL : dy>5 ? skinD : skin;
      p(4+ox+dx, 4+dy, shade);
    }
  }

  // Toenail
  p(5,4,'#e8dcc0'); p(6,4,'#e8dcc0');
  p(5,5,'#ddd0b0'); p(6,5,'#ddd0b0');
  // Buff glow
  if(buffTurns > 0){
    c.fillStyle = 'rgba(255,255,100,0.2)';
    c.fillRect(4*px,3*px,5*px,2*px);
  }
  // Bandage if hurt
  if(player.hp < player.maxHp*0.5){
    p(4,8,'#ddd'); p(5,8,'#eee'); p(6,8,'#ddd'); p(7,8,'#eee');
  }
}

function drawMold(){
  if(!enemy) return;
  const c = moldCtx;
  c.clearRect(0,0,64,64);
  const px = 4;
  const t = Date.now()/500;
  function p(x,y,col){ c.fillStyle=col; c.fillRect(x*px,y*px,px,px); }

  const col = enemy.color;
  // Parse color for variations
  const r = parseInt(col.slice(1,3),16);
  const g = parseInt(col.slice(3,5),16);
  const b = parseInt(col.slice(5,7),16);
  const light = `rgb(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)})`;
  const dark = `rgb(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)})`;

  // Blob body (irregular)
  const hpRatio = enemy.hp / enemy.maxHp;
  for(let dy=-3;dy<=3;dy++){
    for(let dx=-3;dx<=3;dx++){
      const dist = Math.sqrt(dx*dx+dy*dy);
      const wobble = Math.sin(t+dx*2+dy*3)*0.4;
      if(dist + wobble < 3.2 * hpRatio + 1){
        const shade = dist < 1.5 ? light : dist < 2.5 ? col : dark;
        p(7+dx, 7+dy, shade);
      }
    }
  }

  // Eyes
  if(hpRatio > 0){
    p(6,6,'#fff'); p(8,6,'#fff');
    p(6,6,'#111'); p(8,6,'#111');
    // Angry eyes when low hp
    if(hpRatio < 0.3){
      p(6,5,'#f00'); p(8,5,'#f00');
    }
  }

  // Spore particles
  for(let i=0;i<4;i++){
    const sx = 7 + Math.floor(Math.sin(t*2+i*1.5)*4);
    const sy = 3 + Math.floor(Math.cos(t*1.5+i*2)*2);
    if(sy>=0 && sy<16 && sx>=0 && sx<16){
      p(sx, sy, `rgba(${r},${g},${b},0.4)`);
    }
  }
}

// Button handlers
document.getElementById('btnKick').onclick = ()=> playerAttack('kick');
document.getElementById('btnStomp').onclick = ()=> playerAttack('stomp');
document.getElementById('btnCream').onclick = ()=> playerAttack('cream');
document.getElementById('btnFile').onclick = ()=> playerAttack('file');

document.getElementById('playBtn').onclick = ()=>{
  initPlayer();
  overlay.classList.add('hidden');
  drawToe();
  spawnEnemy();
};

// Animate mold
function animLoop(){ drawMold(); requestAnimationFrame(animLoop); }
animLoop();
</script>
</body>
</html>
