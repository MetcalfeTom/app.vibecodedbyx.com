<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Boop Gallery</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%91%83">
<meta property="og:title" content="Boop Gallery">
<meta property="og:description" content="Boop the snoots! Anthropomorphic animals pop up — click their noses before they disappear.">
<meta property="og:url" content="https://sloppy.live/boop-gallery">
<meta property="og:image" content="https://sloppy.live/boop-gallery/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a2e;font-family:'Fredoka',sans-serif}
canvas{display:block;width:100%;height:100%;cursor:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><circle cx='16' cy='16' r='10' fill='%23ff69b4' opacity='0.6'/><circle cx='16' cy='16' r='4' fill='white'/></svg>") 16 16, pointer}
#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;pointer-events:none;z-index:10}
#score-box{background:rgba(26,10,46,0.85);border:2px solid rgba(255,105,180,0.3);border-radius:12px;padding:6px 14px;color:#ff69b4;font-family:'Silkscreen',monospace;font-size:14px;letter-spacing:1px}
#score-box span{color:#fff;font-weight:700}
#timer-box{background:rgba(26,10,46,0.85);border:2px solid rgba(139,92,246,0.3);border-radius:12px;padding:6px 14px;color:#8b5cf6;font-family:'Silkscreen',monospace;font-size:14px}
#combo-display{position:fixed;top:50px;left:50%;transform:translateX(-50%);font-family:'Fredoka',sans-serif;font-size:28px;font-weight:700;color:#fbbf24;text-shadow:0 0 20px rgba(251,191,36,0.5);opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:10}
#combo-display.show{opacity:1}
#start-screen,#end-screen{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,4,20,0.95)}
#end-screen{display:none}
#end-screen.open{display:flex}
#start-screen.hidden{display:none}
h1{font-family:'Fredoka',sans-serif;font-size:clamp(36px,8vw,64px);font-weight:700;color:#ff69b4;text-shadow:0 0 40px rgba(255,105,180,0.4);margin-bottom:4px}
.sub{color:#c084fc;font-size:clamp(14px,3vw,18px);margin-bottom:24px;text-align:center;max-width:300px;line-height:1.4}
.btn{font-family:'Fredoka',sans-serif;font-size:18px;font-weight:600;padding:12px 32px;border:none;border-radius:12px;cursor:pointer;pointer-events:all;transition:transform 0.1s,box-shadow 0.1s}
.btn:active{transform:scale(0.95)}
.btn-play{background:linear-gradient(135deg,#ff69b4,#ec4899);color:#fff;box-shadow:0 4px 20px rgba(255,105,180,0.4)}
.btn-play:hover{box-shadow:0 4px 30px rgba(255,105,180,0.6)}
.stat-line{color:#c084fc;font-family:'Silkscreen',monospace;font-size:13px;margin-top:8px}
.stat-line span{color:#fbbf24}
#final-score{font-size:clamp(48px,10vw,72px);color:#fbbf24;font-weight:700;text-shadow:0 0 30px rgba(251,191,36,0.4);margin:12px 0 4px}
#final-label{color:#ff69b4;font-size:16px;margin-bottom:8px}
a#backlink{position:fixed;bottom:8px;right:12px;color:rgba(139,92,246,0.4);text-decoration:none;font-size:11px;font-family:'Silkscreen',monospace;z-index:5}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="score-box">BOOPS <span id="h-score">0</span></div>
  <div id="timer-box" id="h-timer">0:30</div>
</div>
<div id="combo-display"></div>

<div id="start-screen">
  <h1>Boop Gallery</h1>
  <p class="sub">Anthropomorphic animals pop up — boop their noses before they vanish!</p>
  <button class="btn btn-play" id="btn-play">BOOP!</button>
</div>

<div id="end-screen">
  <div id="final-label">BOOPS</div>
  <div id="final-score">0</div>
  <div class="stat-line">Best combo: <span id="stat-combo">0</span>x</div>
  <div class="stat-line">Accuracy: <span id="stat-acc">0</span>%</div>
  <div class="stat-line">Missed: <span id="stat-miss">0</span></div>
  <br>
  <button class="btn btn-play" id="btn-retry">AGAIN!</button>
</div>

<a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

/* ── Animals ── */
const ANIMALS = [
  { name:'Cat', bodyColor:'#3b3b3b', earColor:'#3b3b3b', noseColor:'#ff69b4', eyeColor:'#7dd87d', whiskers:true,
    drawHead(x,y,s,blink){
      // Ears
      ctx.fillStyle=this.earColor;
      tri(x-s*0.55,y-s*0.95,x-s*0.85,y-s*1.55,x-s*0.15,y-s*1.25,this.earColor);
      tri(x+s*0.55,y-s*0.95,x+s*0.85,y-s*1.55,x+s*0.15,y-s*1.25,this.earColor);
      // Inner ears
      tri(x-s*0.5,y-s*0.95,x-s*0.72,y-s*1.35,x-s*0.22,y-s*1.15,'#ff8ec4');
      tri(x+s*0.5,y-s*0.95,x+s*0.72,y-s*1.35,x+s*0.22,y-s*1.15,'#ff8ec4');
      // Face
      ctx.fillStyle=this.bodyColor;
      ellipse(x,y,s*0.9,s*0.75);
      // Eyes
      if(blink){ctx.fillStyle='#222';ctx.fillRect(x-s*0.35-3,y-s*0.15,6,2);ctx.fillRect(x+s*0.35-3,y-s*0.15,6,2)}
      else{ctx.fillStyle=this.eyeColor;ellipse(x-s*0.35,y-s*0.15,5,6);ellipse(x+s*0.35,y-s*0.15,5,6);ctx.fillStyle='#111';ellipse(x-s*0.35,y-s*0.12,2.5,3);ellipse(x+s*0.35,y-s*0.12,2.5,3);ctx.fillStyle='#fff';ellipse(x-s*0.32,y-s*0.18,1.5,1.5);ellipse(x+s*0.32,y-s*0.18,1.5,1.5)}
      // Nose
      ctx.fillStyle=this.noseColor;
      ellipse(x,y+s*0.15,5,4);
      // Mouth
      ctx.strokeStyle='#222';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x,y+s*0.19);ctx.lineTo(x-4,y+s*0.3);ctx.moveTo(x,y+s*0.19);ctx.lineTo(x+4,y+s*0.3);ctx.stroke();
      // Whiskers
      ctx.strokeStyle='rgba(200,200,200,0.5)';ctx.lineWidth=1;
      for(let i=-1;i<=1;i+=2){ctx.beginPath();ctx.moveTo(x+i*s*0.3,y+s*0.1);ctx.lineTo(x+i*s*0.9,y+s*0.05);ctx.stroke();ctx.beginPath();ctx.moveTo(x+i*s*0.3,y+s*0.18);ctx.lineTo(x+i*s*0.85,y+s*0.22);ctx.stroke()}
    }},
  { name:'Dog', bodyColor:'#8B6914', earColor:'#6B4F12', noseColor:'#222', eyeColor:'#4a3520',
    drawHead(x,y,s,blink){
      // Floppy ears
      ctx.fillStyle=this.earColor;
      ellipse(x-s*0.7,y-s*0.3,s*0.35,s*0.65);
      ellipse(x+s*0.7,y-s*0.3,s*0.35,s*0.65);
      // Face
      ctx.fillStyle=this.bodyColor;
      ellipse(x,y,s*0.85,s*0.8);
      // Snout
      ctx.fillStyle='#c9a84c';
      ellipse(x,y+s*0.2,s*0.45,s*0.35);
      // Eyes
      if(blink){ctx.fillStyle='#222';ctx.fillRect(x-s*0.3-3,y-s*0.2,6,2);ctx.fillRect(x+s*0.3-3,y-s*0.2,6,2)}
      else{ctx.fillStyle='#fff';ellipse(x-s*0.3,y-s*0.15,6,6);ellipse(x+s*0.3,y-s*0.15,6,6);ctx.fillStyle=this.eyeColor;ellipse(x-s*0.3,y-s*0.13,3.5,3.5);ellipse(x+s*0.3,y-s*0.13,3.5,3.5);ctx.fillStyle='#fff';ellipse(x-s*0.27,y-s*0.17,1.5,1.5);ellipse(x+s*0.27,y-s*0.17,1.5,1.5)}
      // Nose
      ctx.fillStyle=this.noseColor;
      ellipse(x,y+s*0.12,7,5);
      // Tongue
      ctx.fillStyle='#ff6b8a';
      ellipse(x+2,y+s*0.42,4,7);
      // Mouth
      ctx.strokeStyle='#222';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y+s*0.25,s*0.2,0.1,Math.PI-0.1);ctx.stroke();
    }},
  { name:'Bunny', bodyColor:'#e8d5c4', earColor:'#e8d5c4', noseColor:'#ffb6c1', eyeColor:'#ff6b9d',
    drawHead(x,y,s,blink){
      // Long ears
      ctx.fillStyle=this.earColor;
      roundRect(x-s*0.35,y-s*2.1,s*0.3,s*1.2,8);
      roundRect(x+s*0.1,y-s*2.0,s*0.3,s*1.15,8);
      // Inner ears
      ctx.fillStyle='#ffb6c1';
      roundRect(x-s*0.28,y-s*1.9,s*0.16,s*0.85,5);
      roundRect(x+s*0.17,y-s*1.8,s*0.16,s*0.8,5);
      // Face
      ctx.fillStyle=this.bodyColor;
      ellipse(x,y,s*0.8,s*0.75);
      // Cheeks
      ctx.fillStyle='rgba(255,182,193,0.35)';
      ellipse(x-s*0.5,y+s*0.1,s*0.2,s*0.15);
      ellipse(x+s*0.5,y+s*0.1,s*0.2,s*0.15);
      // Eyes
      if(blink){ctx.fillStyle='#222';ctx.fillRect(x-s*0.3-3,y-s*0.15,6,2);ctx.fillRect(x+s*0.3-3,y-s*0.15,6,2)}
      else{ctx.fillStyle=this.eyeColor;ellipse(x-s*0.28,y-s*0.12,5,7);ellipse(x+s*0.28,y-s*0.12,5,7);ctx.fillStyle='#fff';ellipse(x-s*0.25,y-s*0.18,2,2);ellipse(x+s*0.25,y-s*0.18,2,2)}
      // Nose
      ctx.fillStyle=this.noseColor;
      ellipse(x,y+s*0.15,4,3);
      // Mouth — Y shape
      ctx.strokeStyle='#999';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y+s*0.18);ctx.lineTo(x,y+s*0.28);ctx.moveTo(x-3,y+s*0.32);ctx.lineTo(x,y+s*0.28);ctx.lineTo(x+3,y+s*0.32);ctx.stroke();
      // Buck teeth
      ctx.fillStyle='#fff';ctx.fillRect(x-3,y+s*0.28,3,5);ctx.fillRect(x+0.5,y+s*0.28,3,5);
    }},
  { name:'Fox', bodyColor:'#d45d1e', earColor:'#d45d1e', noseColor:'#1a1a1a', eyeColor:'#fbbf24',
    drawHead(x,y,s,blink){
      // Pointy ears
      tri(x-s*0.55,y-s*0.8,x-s*0.85,y-s*1.6,x-s*0.2,y-s*1.1,this.earColor);
      tri(x+s*0.55,y-s*0.8,x+s*0.85,y-s*1.6,x+s*0.2,y-s*1.1,this.earColor);
      // Inner ears
      tri(x-s*0.5,y-s*0.85,x-s*0.7,y-s*1.35,x-s*0.28,y-s*1.05,'#1a1a1a');
      tri(x+s*0.5,y-s*0.85,x+s*0.7,y-s*1.35,x+s*0.28,y-s*1.05,'#1a1a1a');
      // Face
      ctx.fillStyle=this.bodyColor;
      ellipse(x,y,s*0.85,s*0.78);
      // White face patch
      ctx.fillStyle='#f5e6d3';
      ellipse(x,y+s*0.15,s*0.5,s*0.55);
      // Eyes — sly/narrow
      if(blink){ctx.fillStyle='#222';ctx.fillRect(x-s*0.32-4,y-s*0.15,8,2);ctx.fillRect(x+s*0.32-4,y-s*0.15,8,2)}
      else{ctx.fillStyle=this.eyeColor;
        ctx.beginPath();ctx.moveTo(x-s*0.38,y-s*0.15);ctx.quadraticCurveTo(x-s*0.32,y-s*0.28,x-s*0.22,y-s*0.15);ctx.quadraticCurveTo(x-s*0.32,y-s*0.05,x-s*0.38,y-s*0.15);ctx.fill();
        ctx.beginPath();ctx.moveTo(x+s*0.22,y-s*0.15);ctx.quadraticCurveTo(x+s*0.32,y-s*0.28,x+s*0.38,y-s*0.15);ctx.quadraticCurveTo(x+s*0.32,y-s*0.05,x+s*0.22,y-s*0.15);ctx.fill();
        ctx.fillStyle='#111';ellipse(x-s*0.31,y-s*0.15,2,3);ellipse(x+s*0.31,y-s*0.15,2,3)}
      // Nose
      ctx.fillStyle=this.noseColor;
      ellipse(x,y+s*0.15,6,4);
      // Smirk
      ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x+s*0.1,y+s*0.25,s*0.15,0.2,Math.PI*0.7);ctx.stroke();
    }},
  { name:'Bear', bodyColor:'#5c3d2e', earColor:'#5c3d2e', noseColor:'#1a1a1a', eyeColor:'#222',
    drawHead(x,y,s,blink){
      // Round ears
      ctx.fillStyle=this.earColor;
      ellipse(x-s*0.6,y-s*0.85,s*0.3,s*0.3);
      ellipse(x+s*0.6,y-s*0.85,s*0.3,s*0.3);
      ctx.fillStyle='#8b6b4f';
      ellipse(x-s*0.6,y-s*0.85,s*0.18,s*0.18);
      ellipse(x+s*0.6,y-s*0.85,s*0.18,s*0.18);
      // Face
      ctx.fillStyle=this.bodyColor;
      ellipse(x,y,s*0.9,s*0.85);
      // Snout
      ctx.fillStyle='#8b6b4f';
      ellipse(x,y+s*0.18,s*0.4,s*0.32);
      // Eyes
      if(blink){ctx.fillStyle='#222';ctx.fillRect(x-s*0.3-2,y-s*0.2,4,2);ctx.fillRect(x+s*0.3-2,y-s*0.2,4,2)}
      else{ctx.fillStyle=this.eyeColor;ellipse(x-s*0.3,y-s*0.15,4,5);ellipse(x+s*0.3,y-s*0.15,4,5);ctx.fillStyle='#fff';ellipse(x-s*0.28,y-s*0.18,1.5,1.5);ellipse(x+s*0.28,y-s*0.18,1.5,1.5)}
      // Nose
      ctx.fillStyle=this.noseColor;
      ellipse(x,y+s*0.1,7,5);
      // Mouth
      ctx.strokeStyle='#3a2518';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x,y+s*0.15);ctx.lineTo(x-5,y+s*0.26);ctx.moveTo(x,y+s*0.15);ctx.lineTo(x+5,y+s*0.26);ctx.stroke();
    }},
  { name:'Frog', bodyColor:'#22a55e', earColor:'#22a55e', noseColor:'#1b8c4e', eyeColor:'#ffe44d',
    drawHead(x,y,s,blink){
      // Bulging eyes on top
      ctx.fillStyle=this.bodyColor;
      ellipse(x-s*0.4,y-s*0.65,s*0.32,s*0.32);
      ellipse(x+s*0.4,y-s*0.65,s*0.32,s*0.32);
      // Face
      ellipse(x,y,s*0.9,s*0.7);
      // Eye whites
      ctx.fillStyle='#fff';
      ellipse(x-s*0.4,y-s*0.65,s*0.22,s*0.22);
      ellipse(x+s*0.4,y-s*0.65,s*0.22,s*0.22);
      // Pupils
      if(blink){ctx.fillStyle='#222';ctx.fillRect(x-s*0.4-4,y-s*0.65,8,2);ctx.fillRect(x+s*0.4-4,y-s*0.65,8,2)}
      else{ctx.fillStyle=this.eyeColor;ellipse(x-s*0.4,y-s*0.65,s*0.14,s*0.16);ellipse(x+s*0.4,y-s*0.65,s*0.14,s*0.16);ctx.fillStyle='#111';ellipse(x-s*0.4,y-s*0.63,s*0.06,s*0.1);ellipse(x+s*0.4,y-s*0.63,s*0.06,s*0.1)}
      // Cheeks
      ctx.fillStyle='rgba(255,150,150,0.25)';ellipse(x-s*0.55,y+s*0.05,s*0.15,s*0.12);ellipse(x+s*0.55,y+s*0.05,s*0.15,s*0.12);
      // Nostrils (nose)
      ctx.fillStyle=this.noseColor;ellipse(x-4,y+s*0.05,3,2.5);ellipse(x+4,y+s*0.05,3,2.5);
      // Wide smile
      ctx.strokeStyle='#156b3d';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y+s*0.15,s*0.45,0.15,Math.PI-0.15);ctx.stroke();
    }},
  { name:'Pig', bodyColor:'#f5a0b5', earColor:'#e8899e', noseColor:'#d4708a', eyeColor:'#333',
    drawHead(x,y,s,blink){
      // Floppy ears
      ctx.fillStyle=this.earColor;
      ctx.beginPath();ctx.moveTo(x-s*0.5,y-s*0.7);ctx.quadraticCurveTo(x-s*0.9,y-s*0.4,x-s*0.6,y-s*0.2);ctx.quadraticCurveTo(x-s*0.3,y-s*0.5,x-s*0.5,y-s*0.7);ctx.fill();
      ctx.beginPath();ctx.moveTo(x+s*0.5,y-s*0.7);ctx.quadraticCurveTo(x+s*0.9,y-s*0.4,x+s*0.6,y-s*0.2);ctx.quadraticCurveTo(x+s*0.3,y-s*0.5,x+s*0.5,y-s*0.7);ctx.fill();
      // Face
      ctx.fillStyle=this.bodyColor;
      ellipse(x,y,s*0.85,s*0.8);
      // Snout
      ctx.fillStyle=this.noseColor;
      ellipse(x,y+s*0.12,s*0.35,s*0.22);
      // Nostrils
      ctx.fillStyle='#b8557a';ellipse(x-5,y+s*0.14,4,3);ellipse(x+5,y+s*0.14,4,3);
      // Eyes
      if(blink){ctx.fillStyle='#333';ctx.fillRect(x-s*0.28-3,y-s*0.18,6,2);ctx.fillRect(x+s*0.28-3,y-s*0.18,6,2)}
      else{ctx.fillStyle=this.eyeColor;ellipse(x-s*0.28,y-s*0.15,4,5);ellipse(x+s*0.28,y-s*0.15,4,5);ctx.fillStyle='#fff';ellipse(x-s*0.26,y-s*0.18,1.5,1.5);ellipse(x+s*0.26,y-s*0.18,1.5,1.5)}
      // Cheeks
      ctx.fillStyle='rgba(255,130,170,0.3)';ellipse(x-s*0.48,y+s*0.05,s*0.15,s*0.12);ellipse(x+s*0.48,y+s*0.05,s*0.15,s*0.12);
      // Smile
      ctx.strokeStyle='#b8557a';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y+s*0.28,s*0.15,0.2,Math.PI-0.2);ctx.stroke();
    }},
  { name:'Owl', bodyColor:'#6b5b4f', earColor:'#6b5b4f', noseColor:'#d4a040', eyeColor:'#ff8c00',
    drawHead(x,y,s,blink){
      // Ear tufts
      ctx.fillStyle=this.earColor;
      tri(x-s*0.45,y-s*0.8,x-s*0.7,y-s*1.55,x-s*0.15,y-s*0.9,this.earColor);
      tri(x+s*0.45,y-s*0.8,x+s*0.7,y-s*1.55,x+s*0.15,y-s*0.9,this.earColor);
      // Face
      ctx.fillStyle=this.bodyColor;
      ellipse(x,y,s*0.85,s*0.82);
      // Face disc
      ctx.fillStyle='#8c7a6a';
      ellipse(x-s*0.28,y-s*0.1,s*0.32,s*0.35);
      ellipse(x+s*0.28,y-s*0.1,s*0.32,s*0.35);
      // Eyes — big circles
      if(blink){ctx.fillStyle='#444';ctx.fillRect(x-s*0.28-5,y-s*0.1,10,2);ctx.fillRect(x+s*0.28-5,y-s*0.1,10,2)}
      else{ctx.fillStyle=this.eyeColor;ellipse(x-s*0.28,y-s*0.1,s*0.2,s*0.2);ellipse(x+s*0.28,y-s*0.1,s*0.2,s*0.2);ctx.fillStyle='#111';ellipse(x-s*0.28,y-s*0.08,s*0.1,s*0.12);ellipse(x+s*0.28,y-s*0.08,s*0.1,s*0.12);ctx.fillStyle='#fff';ellipse(x-s*0.24,y-s*0.14,2,2);ellipse(x+s*0.24,y-s*0.14,2,2)}
      // Beak (nose)
      ctx.fillStyle=this.noseColor;
      ctx.beginPath();ctx.moveTo(x,y+s*0.1);ctx.lineTo(x-5,y+s*0.22);ctx.lineTo(x+5,y+s*0.22);ctx.fill();
      // Chest feather V
      ctx.fillStyle='#a08e7e';
      for(let i=-2;i<=2;i++){ellipse(x+i*6,y+s*0.45+Math.abs(i)*3,4,6)}
    }},
];

/* ── Drawing helpers ── */
function ellipse(x,y,rx,ry){ctx.beginPath();ctx.ellipse(x,y,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2);ctx.fill()}
function tri(x1,y1,x2,y2,x3,y3,col){ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.fill()}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill()}

/* ── Game state ── */
let state = 'menu';
let scoreVal = 0, combo = 0, bestCombo = 0, totalClicks = 0, boopHits = 0, missed = 0;
let timer = 30;
let lastTime = 0;
let critters = []; // active critters on screen
let boopFX = [];   // boop sparkle effects
let bgStars = [];
let frameCount = 0;

// Spawn timing
let spawnTimer = 0;
const BASE_SPAWN_INTERVAL = 1.2; // seconds
let spawnInterval = BASE_SPAWN_INTERVAL;

for(let i=0;i<40;i++) bgStars.push({x:Math.random()*2000,y:Math.random()*2000,r:Math.random()*2+0.5,a:Math.random()*0.3+0.1,sp:Math.random()*0.3+0.05});

/* ── Critter object ── */
function spawnCritter() {
  const animal = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
  const size = 30 + Math.random() * 20; // head radius factor
  const pad = size * 1.5;
  const x = pad + Math.random() * (W - pad * 2);
  const y = H * 0.25 + Math.random() * (H * 0.55);
  const lifespan = 2.2 + Math.random() * 1.5; // seconds visible
  critters.push({
    animal, x, y, size,
    life: lifespan,
    maxLife: lifespan,
    age: 0,
    booped: false,
    blinkTimer: Math.random() * 3,
    blinking: false,
    popIn: 0, // 0-1 entrance animation
    noseX: x, // nose hitbox center (updated during draw)
    noseY: y + size * 0.13,
    noseR: 12 + size * 0.12,
    exitTimer: 0,
  });
}

/* ── Boop FX ── */
function addBoopFX(x, y) {
  // Hearts
  for (let i = 0; i < 6; i++) {
    const a = -Math.PI/2 + (Math.random() - 0.5) * 2;
    const sp = 1.5 + Math.random() * 2;
    boopFX.push({ type:'heart', x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2, life:1, decay:0.018, size:6+Math.random()*6 });
  }
  // Stars
  for (let i = 0; i < 5; i++) {
    const a = Math.random()*Math.PI*2;
    const sp = 2+Math.random()*3;
    boopFX.push({ type:'star', x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, decay:0.025, size:3+Math.random()*3 });
  }
  // Text
  boopFX.push({ type:'text', x, y:y-20, vx:0, vy:-1.5, life:1, decay:0.02, size:0, text:'BOOP!' });
}

/* ── Draw FX ── */
function drawHeart(px, py, size, alpha) {
  ctx.save();
  ctx.translate(px, py);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ff69b4';
  ctx.shadowColor = '#ff69b4';
  ctx.shadowBlur = 6;
  const s = size;
  ctx.beginPath();
  ctx.moveTo(0, s*0.3);
  ctx.bezierCurveTo(-s,-s*0.3,-s*0.5,-s,0,-s*0.4);
  ctx.bezierCurveTo(s*0.5,-s,s,-s*0.3,0,s*0.3);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawStar(px, py, size, alpha) {
  ctx.save();
  ctx.translate(px, py);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fbbf24';
  ctx.shadowColor = '#fbbf24';
  ctx.shadowBlur = 5;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = -Math.PI/2 + i * Math.PI * 2 / 5;
    const ai = a + Math.PI / 5;
    ctx.lineTo(Math.cos(a)*size, Math.sin(a)*size);
    ctx.lineTo(Math.cos(ai)*size*0.4, Math.sin(ai)*size*0.4);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ── Nose glow indicator ── */
function drawNoseGlow(x, y, r, pulse) {
  ctx.save();
  const glowR = r + 4 + pulse * 3;
  const grad = ctx.createRadialGradient(x, y, 0, x, y, glowR);
  grad.addColorStop(0, 'rgba(255,105,180,0.25)');
  grad.addColorStop(0.6, 'rgba(255,105,180,0.08)');
  grad.addColorStop(1, 'rgba(255,105,180,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, glowR, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

/* ── Background ── */
function drawBG() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(0.5, '#15082a');
  grad.addColorStop(1, '#0d0520');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of bgStars) {
    const sx = ((s.x + frameCount * s.sp * 0.5) % (W + 20)) - 10;
    const tw = 0.6 + Math.sin(frameCount * 0.02 + s.x) * 0.4;
    ctx.fillStyle = `rgba(200,180,255,${s.a * tw})`;
    ctx.beginPath();
    ctx.arc(sx, s.y % H, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ── Main update ── */
function update(dt) {
  if (state !== 'playing') return;
  frameCount++;

  timer -= dt;
  if (timer <= 0) {
    timer = 0;
    endGame();
    return;
  }

  // Speed up spawns as time goes on
  const elapsed = 30 - timer;
  spawnInterval = Math.max(0.5, BASE_SPAWN_INTERVAL - elapsed * 0.025);

  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnCritter();
    spawnTimer = spawnInterval;
  }

  // Update critters
  for (const c of critters) {
    c.age += dt;
    c.popIn = Math.min(1, c.age / 0.25); // pop in over 0.25s

    // Blink
    c.blinkTimer -= dt;
    if (c.blinkTimer <= 0) {
      if (c.blinking) { c.blinking = false; c.blinkTimer = 2 + Math.random() * 3; }
      else { c.blinking = true; c.blinkTimer = 0.12; }
    }

    if (c.booped) {
      c.exitTimer += dt;
    } else {
      c.life -= dt;
      if (c.life <= 0) {
        missed++;
        combo = 0;
        c.exitTimer = 10; // remove immediately
      }
    }

    // Update nose position
    c.noseY = c.y + c.size * 0.13;
    c.noseX = c.x;
  }

  // Remove exited critters
  critters = critters.filter(c => c.exitTimer < 0.4);

  // Update FX
  for (const f of boopFX) {
    f.x += f.vx;
    f.y += f.vy;
    f.vy += 0.03;
    f.life -= f.decay;
  }
  boopFX = boopFX.filter(f => f.life > 0);

  // Update HUD
  document.getElementById('h-score').textContent = scoreVal;
  const secs = Math.ceil(timer);
  document.getElementById('h-timer').textContent = `0:${secs < 10 ? '0' : ''}${secs}`;
}

/* ── Main draw ── */
function draw() {
  drawBG();

  const pulse = Math.sin(frameCount * 0.08) * 0.5 + 0.5;

  // Draw critters
  for (const c of critters) {
    ctx.save();
    // Pop-in scale
    let scale = c.popIn;
    // Exit: shrink + fade
    if (c.exitTimer > 0) {
      const t = c.exitTimer / 0.4;
      scale *= 1 - t;
      ctx.globalAlpha = 1 - t;
    }
    // Warning flash when about to disappear
    if (!c.booped && c.life < 0.8 && c.life > 0) {
      const flash = Math.sin(c.life * 20) * 0.3 + 0.7;
      ctx.globalAlpha *= flash;
    }

    ctx.translate(c.x, c.y);
    ctx.scale(scale, scale);
    ctx.translate(-c.x, -c.y);

    // Nose glow hint
    if (!c.booped) {
      drawNoseGlow(c.noseX, c.noseY, c.noseR, pulse);
    }

    // Draw body hint (shoulders)
    ctx.fillStyle = c.animal.bodyColor;
    ellipse(c.x, c.y + c.size * 0.8, c.size * 0.7, c.size * 0.4);

    // Draw head
    c.animal.drawHead(c.x, c.y, c.size, c.blinking);

    // Booped reaction
    if (c.booped && c.exitTimer < 0.3) {
      ctx.fillStyle = 'rgba(255,105,180,0.15)';
      ellipse(c.x, c.y, c.size * 1.2, c.size * 1.1);
      // Happy squint
      ctx.strokeStyle = '#ff69b4';
      ctx.lineWidth = 2;
      const ey = c.y - c.size * 0.15;
      ctx.beginPath(); ctx.moveTo(c.x-c.size*0.4, ey); ctx.quadraticCurveTo(c.x-c.size*0.3, ey-5, c.x-c.size*0.2, ey); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(c.x+c.size*0.2, ey); ctx.quadraticCurveTo(c.x+c.size*0.3, ey-5, c.x+c.size*0.4, ey); ctx.stroke();
    }

    ctx.restore();
  }

  // Draw FX
  for (const f of boopFX) {
    if (f.type === 'heart') drawHeart(f.x, f.y, f.size, f.life);
    else if (f.type === 'star') drawStar(f.x, f.y, f.size, f.life);
    else if (f.type === 'text') {
      ctx.save();
      ctx.globalAlpha = f.life;
      ctx.font = `bold 22px 'Fredoka', sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff69b4';
      ctx.shadowColor = '#ff69b4';
      ctx.shadowBlur = 10;
      ctx.fillText(f.text, f.x, f.y);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }
}

/* ── Click handler ── */
function handleBoop(mx, my) {
  if (state !== 'playing') return;
  totalClicks++;

  let hit = false;
  for (const c of critters) {
    if (c.booped || c.life <= 0) continue;
    const dx = mx - c.noseX;
    const dy = my - c.noseY;
    if (Math.sqrt(dx*dx + dy*dy) < c.noseR) {
      c.booped = true;
      hit = true;
      combo++;
      if (combo > bestCombo) bestCombo = combo;
      const points = 10 * combo;
      scoreVal += points;
      boopHits++;
      addBoopFX(c.noseX, c.noseY);

      // Combo display
      if (combo >= 2) {
        const cd = document.getElementById('combo-display');
        cd.textContent = `${combo}x COMBO!`;
        cd.classList.add('show');
        clearTimeout(cd._t);
        cd._t = setTimeout(() => cd.classList.remove('show'), 800);
      }
      break; // one boop per click
    }
  }
  if (!hit) {
    combo = 0;
  }
}

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  handleBoop(e.clientX - r.left, e.clientY - r.top);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const r = canvas.getBoundingClientRect();
  handleBoop(t.clientX - r.left, t.clientY - r.top);
}, { passive: false });

/* ── Game flow ── */
function startGame() {
  scoreVal = 0; combo = 0; bestCombo = 0; totalClicks = 0; boopHits = 0; missed = 0;
  timer = 30; spawnTimer = 0.3;
  critters = []; boopFX = [];
  state = 'playing';
}

function endGame() {
  state = 'end';
  document.getElementById('final-score').textContent = scoreVal;
  document.getElementById('stat-combo').textContent = bestCombo;
  document.getElementById('stat-acc').textContent = totalClicks > 0 ? Math.round(boopHits / totalClicks * 100) : 0;
  document.getElementById('stat-miss').textContent = missed;
  document.getElementById('end-screen').classList.add('open');
}

document.getElementById('btn-play').onclick = () => {
  document.getElementById('start-screen').classList.add('hidden');
  startGame();
};
document.getElementById('btn-retry').onclick = () => {
  document.getElementById('end-screen').classList.remove('open');
  startGame();
};

/* ── Loop ── */
function loop(ts) {
  const dt = lastTime ? Math.min((ts - lastTime) / 1000, 0.1) : 0.016;
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
