<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Capybara Onsen</title>
<meta name="description" content="A zen capybara hot-spring simulator. Stack oranges on capybara heads. Balance the water temperature. Earn calm.">
<meta property="og:title" content="Capybara Onsen">
<meta property="og:description" content="A zen capybara hot-spring simulator. Stack oranges on capybara heads. Balance the water temperature. Earn calm.">
<meta property="og:url" content="https://sloppy.live/capybara-onsen">
<meta property="og:image" content="https://image.pollinations.ai/prompt/zen%20capybara%20hot%20spring%20onsen%20oranges%20on%20head%20snow%20bamboo%20pastel%20peach%20editorial?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A6%AB">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --sky:#f7d6c2;
  --sky-2:#d2a9b8;
  --sky-3:#9c7a8f;
  --water:#f0a4b0;
  --water-deep:#c46e84;
  --steam:rgba(255,250,245,0.55);
  --orange:#f57c2a;
  --orange-dark:#c4581a;
  --leaf:#5a8c4e;
  --capy:#a07658;
  --capy-dark:#6e4d36;
  --capy-light:#c89878;
  --wood:#7a4a26;
  --wood-light:#a06a36;
  --paper:#fff8ef;
  --ink:#3a2818;
  --ink-mute:#8a6b56;
  --rule:rgba(58,40,24,0.18);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--sky);color:var(--ink);font-family:'Cormorant Garamond',serif;font-size:16px;-webkit-font-smoothing:antialiased}
html{font-size:100%}
.skip{position:absolute;left:-9999px;top:auto}
.skip:focus{left:1rem;top:1rem;background:var(--ink);color:var(--paper);padding:0.5rem;z-index:100}

#stage{ position:fixed; inset:0; width:100%; height:100%; display:block; cursor: grab; touch-action:none }
#stage.dragging{ cursor: grabbing }

/* HUD top */
.hud{
  position:fixed; top:0; left:0; right:0;
  z-index:5;
  pointer-events:none;
  padding:0.85rem 1rem;
  display:grid;
  grid-template-columns: auto 1fr auto;
  gap: 1rem;
  align-items:start;
}
.hud-card{
  background: rgba(255,248,239,0.78);
  border: 1px solid var(--rule);
  padding: 0.55rem 0.95rem;
  pointer-events: auto;
  backdrop-filter: blur(4px);
  border-radius: 0.25rem;
}
.hud-card .label{
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
}
.hud-card .v{
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 1.4rem;
  margin-top: 0.18rem;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.hud-card .v.good{ color: #5a8c4e }
.hud-card .v.warn{ color: #c4581a }

/* center title block with kanji */
.brand{
  text-align: center;
  pointer-events: auto;
  background: rgba(255,248,239,0.65);
  border: 1px solid var(--rule);
  padding: 0.45rem 1rem;
  backdrop-filter: blur(4px);
  border-radius: 0.25rem;
}
.brand .kanji{
  font-family:'Noto Serif JP', serif;
  font-size: 1rem; letter-spacing: 0.16em;
  color: var(--ink);
}
.brand .romaji{
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--ink-mute);
  margin-top: 0.2rem;
}
.brand .romaji b{ color: var(--orange-dark); font-weight: 500 }

/* bottom controls — temperature dial + log/ice + reset */
.controls{
  position:fixed; bottom: 1rem; left: 0; right: 0;
  z-index: 6;
  padding: 0 1rem;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 1rem;
  align-items: end;
  pointer-events: none;
}
.panel{
  background: rgba(255,248,239,0.85);
  border: 1px solid var(--rule);
  padding: 0.75rem 0.95rem;
  pointer-events: auto;
  backdrop-filter: blur(6px);
  border-radius: 0.25rem;
  box-shadow: 0 6px 18px rgba(58,40,24,0.10);
}
.panel h3{
  margin: 0 0 0.4rem;
  font-family:'IBM Plex Mono', monospace;
  font-weight: 400;
  font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
}

.basket{
  text-align: center;
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink);
}
.basket .count{
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.2rem;
  color: var(--orange-dark);
  font-variant-numeric: tabular-nums;
}
.basket .hint{
  display: block;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.16em;
  color: var(--ink-mute);
  margin-top: 0.18rem;
  text-transform: uppercase;
}

.temp-controls{
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  justify-content: center;
}
.btn{
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.95rem;
  background: linear-gradient(180deg, #ffeed8, #f5d8b8);
  color: var(--ink);
  border: 1px solid var(--rule);
  padding: 0.55rem 1rem;
  cursor: pointer;
  border-radius: 999px;
  display: inline-flex; align-items: center; gap: 0.4rem;
  min-height: 2.6rem;
  transition: transform 0.08s ease, box-shadow 0.18s ease, background 0.18s ease;
  box-shadow: 0 2px 0 rgba(58,40,24,0.10);
}
.btn:hover{ transform: translateY(-1px); box-shadow: 0 6px 14px rgba(58,40,24,0.15) }
.btn:active{ transform: translateY(1px); box-shadow: 0 1px 0 rgba(58,40,24,0.10) }
.btn:focus-visible{ outline: 3px solid var(--orange); outline-offset: 2px }
.btn .ico{ font-style: normal }
.btn.warm{
  background: linear-gradient(180deg, #ffd0a0, #f7984a);
  color: var(--paper);
  border-color: rgba(0,0,0,0.18);
}
.btn.cool{
  background: linear-gradient(180deg, #c8e0e8, #92b8c8);
  color: var(--ink);
  border-color: rgba(0,0,0,0.18);
}
.btn.ghost{
  background: transparent;
  box-shadow: none;
  color: var(--ink-mute);
  font-size: 0.78rem;
  font-style: normal;
  font-family:'IBM Plex Mono', monospace;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0.5rem 0.85rem;
  border-color: var(--rule);
  border-radius: 0.2rem;
  min-height: 2.4rem;
}

.thermo{
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0.5rem;
  align-items: center;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.14em;
  color: var(--ink-mute);
  margin-top: 0.4rem;
}
.thermo .bar{
  position: relative;
  height: 0.6rem;
  background: linear-gradient(90deg, #92b8c8 0%, #9fc4a3 35%, #f7c47b 60%, #f7984a 80%, #d6463a 100%);
  border-radius: 0.3rem;
  overflow: hidden;
}
.thermo .bar > i{
  position: absolute; top: -2px; bottom: -2px; width: 4px;
  background: var(--ink);
  border-radius: 2px;
  transform: translateX(-50%);
  transition: left 0.2s ease;
}
.thermo .bar > .sweet{
  position: absolute; top: 0; bottom: 0;
  background: rgba(58,140,78,0.32);
  pointer-events: none;
}
.thermo b{ color: var(--ink); font-weight: 500; font-variant-numeric: tabular-nums }

@media (prefers-reduced-motion: reduce){
  .btn{ transition: none }
}
</style>
</head>
<body>
<a href="#stage" class="skip">Skip to canvas</a>

<canvas id="stage" role="application" aria-label="Capybara onsen — drag oranges from the basket on the right onto a capybara's head to stack them. Use the warm and cool buttons at the bottom to balance the spring's temperature into the green sweet spot. Earn calm."></canvas>

<div class="hud">
  <div class="hud-card" role="status" aria-live="polite">
    <div class="label">Calm</div>
    <div class="v good" id="calmEl">0</div>
  </div>
  <div class="brand">
    <div class="kanji">温 泉 · 蛙 鼠</div>
    <div class="romaji"><b>onsen · capybara</b> · stack oranges</div>
  </div>
  <div class="hud-card">
    <div class="label">Best</div>
    <div class="v" id="bestEl">0</div>
  </div>
</div>

<div class="controls">
  <div class="panel basket" id="basketPanel" aria-label="Orange basket">
    <h3>Basket</h3>
    <div>oranges in stock · <span class="count" id="basketCount">12</span></div>
    <span class="hint">drag from the basket on the right edge</span>
  </div>
  <div class="panel" aria-label="Temperature controls">
    <h3>Temperature</h3>
    <div class="temp-controls">
      <button type="button" class="btn warm" id="warmBtn" aria-label="Add a log to the fire">
        <span class="ico">🔥</span><span>add log</span>
      </button>
      <button type="button" class="btn cool" id="coolBtn" aria-label="Add ice">
        <span class="ico">❄</span><span>add ice</span>
      </button>
      <button type="button" class="btn ghost" id="resetBtn" aria-label="Reset session">↻ reset</button>
    </div>
    <div class="thermo">
      <span>cool</span>
      <div class="bar" id="tempBar"><div class="sweet" id="tempSweet"></div><i id="tempTick" style="left:50%"></i></div>
      <span>hot</span>
    </div>
    <div style="text-align:center;margin-top:0.3rem;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.14em;color:var(--ink-mute)">
      <b id="tempReadout" style="color:var(--ink);font-weight:500">—°</b> · sweet spot · <b style="color:var(--ink)">95–105°</b>
    </div>
  </div>
  <div class="panel" aria-label="Status">
    <h3>Capybaras</h3>
    <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.95rem;color:var(--ink);text-align:center">
      <span id="happyCountEl">0</span> blissful
    </div>
    <span style="display:block;font-family:'IBM Plex Mono',monospace;font-size:0.55rem;letter-spacing:0.16em;color:var(--ink-mute);margin-top:0.18rem;text-align:center;text-transform:uppercase">earn calm in the green</span>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//   CAPYBARA ONSEN — zen hot-spring simulator
// ════════════════════════════════════════════════════════════════

const $ = (s) => document.querySelector(s);
const cvs = $('#stage');
const ctx = cvs.getContext('2d');
let W = 0, H = 0, DPR = 1;
function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  cvs.width = Math.floor(W * DPR); cvs.height = Math.floor(H * DPR);
  cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
fit();

// ──────── audio (web audio synth) ────────
let actx = null, audioOn = false;
function ac(){
  if (!actx){ try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch{ return null; } }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function plopSfx(pitch=420){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(pitch, t);
  o.frequency.exponentialRampToValueAtTime(pitch * 0.5, t + 0.16);
  const g = c.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.07, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.2);
}
function woodSfx(){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  for (let i = 0; i < 3; i++){
    const o = c.createOscillator(); o.type = 'square';
    o.frequency.value = 220 + Math.random() * 200;
    const g = c.createGain();
    g.gain.setValueAtTime(0.04, t + i * 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.06);
    o.connect(g); g.connect(c.destination);
    o.start(t + i * 0.04); o.stop(t + i * 0.04 + 0.07);
  }
}
function iceSfx(){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  // sparkle: two-note triangle
  [1320, 1760].forEach((f, i) => {
    const o = c.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
    const g = c.createGain();
    g.gain.setValueAtTime(0, t + i * 0.05);
    g.gain.linearRampToValueAtTime(0.05, t + i * 0.05 + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.05 + 0.16);
    o.connect(g); g.connect(c.destination);
    o.start(t + i * 0.05); o.stop(t + i * 0.05 + 0.18);
  });
}
function tumbleSfx(){
  if (!audioOn) return;
  // gentle thud
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(180, t); o.frequency.exponentialRampToValueAtTime(80, t + 0.18);
  const g = c.createGain();
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.1, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.24);
}
// soft water bubble loop
let bubbleNode = null;
function startBubble(){
  if (bubbleNode || !audioOn) return;
  const c = ac(); if (!c) return;
  const buf = c.createBuffer(1, c.sampleRate * 2, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1);
  const ns = c.createBufferSource(); ns.buffer = buf; ns.loop = true;
  const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 380; f.Q.value = 0.7;
  const g = c.createGain(); g.gain.value = 0.018;
  ns.connect(f); f.connect(g); g.connect(c.destination);
  ns.start();
  bubbleNode = { ns, g };
}

// ──────── world state ────────
const game = {
  temp: 95,           // °F-ish; sweet spot 95-105
  basket: 12,
  calm: 0,
  best: 0,
  happyCount: 0,
};
try { game.best = +localStorage.getItem('capybara-onsen-best') || 0; } catch{}

const SWEET_LO = 95, SWEET_HI = 105;
const TEMP_MIN = 50, TEMP_MAX = 130;

// ──────── capybaras ────────
// Each capy floats on the water with a slight drift. The flat top of its
// head is the "platter" oranges stack on. Oranges are tracked per-capy.
const capys = [];
function seedCapys(){
  capys.length = 0;
  const N = 4;
  for (let i = 0; i < N; i++){
    const t = (i + 0.5) / N;
    capys.push({
      cx: W * (0.18 + 0.64 * t),
      baseCx: W * (0.18 + 0.64 * t),
      cy: H * 0.65,
      bob: Math.random() * Math.PI * 2,
      driftPhase: Math.random() * Math.PI * 2,
      driftSpeed: 0.18 + Math.random() * 0.22,
      r: 70 + Math.random() * 14,    // body half-width
      headTop: 0,                     // computed each frame: y of head's top surface
      headLeftX: 0,                   // x of head's flat platter left edge
      headRightX: 0,
      facing: i % 2 === 0 ? 1 : -1,
      blinkT: Math.random() * 6,
      happiness: 60,
      oranges: [],                    // {ox: offset from head center, oy: stack y, settled, color}
      noteT: 0,                       // music-note pulse when blissful
    });
  }
}
seedCapys();

// ──────── snow + steam particles ────────
const snow = [];
const steam = [];
function seedAtmos(){
  snow.length = 0; steam.length = 0;
  for (let i = 0; i < 70; i++){
    snow.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vy: 18 + Math.random() * 30,
      vx: (Math.random() - 0.5) * 14,
      r: 1.4 + Math.random() * 2,
      sway: Math.random() * Math.PI * 2,
    });
  }
}
seedAtmos();

function spawnSteam(x, y){
  if (steam.length > 80) return;
  steam.push({
    x: x + (Math.random() - 0.5) * 14,
    y, r: 6 + Math.random() * 8,
    vy: -22 - Math.random() * 18,
    vx: (Math.random() - 0.5) * 6,
    life: 1, maxLife: 2.6 + Math.random() * 1.5,
  });
}

window.addEventListener('resize', () => { fit(); seedCapys(); seedAtmos(); });

// ──────── orange dragging ────────
const heldOrange = { active: false, x: 0, y: 0, color: '#f57c2a' };
function startDrag(x, y){
  if (game.basket <= 0) return;
  heldOrange.active = true;
  heldOrange.x = x; heldOrange.y = y;
  heldOrange.color = pickOrangeColor();
  cvs.classList.add('dragging');
}
function moveDrag(x, y){
  if (!heldOrange.active) return;
  heldOrange.x = x; heldOrange.y = y;
}
function endDrag(x, y){
  if (!heldOrange.active) return;
  heldOrange.active = false;
  cvs.classList.remove('dragging');
  // Find the closest capy whose head's top-surface is near the drop point
  let best = null, bestD = 9999;
  for (const c of capys){
    if (y < c.headTop - 60 || y > c.headTop + 70) continue;
    if (x < c.headLeftX - 30 || x > c.headRightX + 30) continue;
    const d = Math.hypot(x - c.cx, y - (c.headTop));
    if (d < bestD){ bestD = d; best = c; }
  }
  if (best){
    placeOrangeOn(best, x);
    return;
  }
  // miss → orange falls into the spring with a plop
  spawnFallingOrange(x, y, heldOrange.color);
}

const ORANGE_R = 18;
function placeOrangeOn(c, dropX){
  const offset = (dropX - c.cx) / 1.0;     // raw lateral offset from capy center
  const stackY = c.oranges.length;          // how high in the stack (0 = bottom)
  // Snap onto the stack with a slight wobble — perfect drop = small offset
  const wobbleHere = Math.max(-c.r * 0.55, Math.min(c.r * 0.55, offset + (Math.random() - 0.5) * 6));
  c.oranges.push({
    ox: wobbleHere,           // visual offset from head center
    iy: stackY,               // index in stack
    settled: 0.4,             // 0 = just dropped, 1 = settled
    color: heldOrange.color,
    bobPhase: Math.random() * Math.PI * 2,
  });
  game.basket = Math.max(0, game.basket - 1);
  $('#basketCount').textContent = game.basket;
  plopSfx(420 + stackY * 60);
  // calm bonus for a perfect (centered) drop
  if (Math.abs(wobbleHere) < 6){
    game.calm += 8;
    spawnNote(c);
  } else {
    game.calm += 2;
  }
  // check balance — if cumulative offset too far, topple after a moment
  const cumulative = c.oranges.reduce((s, o) => s + o.ox, 0);
  if (Math.abs(cumulative) > c.r * 0.85){
    setTimeout(() => topple(c), 280);
  }
}

const ORANGE_PALETTE = ['#f57c2a','#ff944a','#e26818','#ffaf5b','#f08c1a','#ee6f3d'];
function pickOrangeColor(){ return ORANGE_PALETTE[(Math.random() * ORANGE_PALETTE.length) | 0]; }

// falling oranges (off-stack debris)
const debris = [];
function spawnFallingOrange(x, y, color){
  debris.push({
    x, y, vx: (Math.random()-0.5) * 60, vy: -40,
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 4,
    color: color || pickOrangeColor(),
    life: 3.0,
  });
  // light splash
  for (let i = 0; i < 4; i++) spawnSteam(x, H * 0.55);
  tumbleSfx();
}
function topple(c){
  // all oranges fall off, capy looks dismayed for a moment
  for (let i = c.oranges.length - 1; i >= 0; i--){
    const o = c.oranges[i];
    const x = c.cx + o.ox + (Math.random()-0.5)*8;
    const y = c.headTop - i * (ORANGE_R * 1.7) - ORANGE_R;
    debris.push({
      x, y,
      vx: Math.sign(o.ox || (Math.random()-0.5)) * (60 + Math.random()*120),
      vy: -120 - Math.random() * 80,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 6,
      color: o.color,
      life: 3,
    });
  }
  c.oranges.length = 0;
  c.happiness = Math.max(20, c.happiness - 14);
  game.calm = Math.max(0, game.calm - 18);
  tumbleSfx();
}

// musical note when very happy
const notes = [];
function spawnNote(c){
  notes.push({
    x: c.cx + (Math.random()-0.5) * 30,
    y: c.headTop - 30,
    vy: -30 - Math.random() * 14,
    life: 2,
  });
}

// ──────── basket region (right edge of screen) ────────
function basketRect(){
  return { x: W - 90, y: H * 0.5 - 90, w: 70, h: 180 };
}
function inBasket(x, y){
  const r = basketRect();
  return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

// ──────── pointer wiring ────────
cvs.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (!audioOn){ audioOn = true; ac(); startBubble(); }
  // basket pickup
  if (inBasket(e.clientX, e.clientY)){
    startDrag(e.clientX, e.clientY);
    return;
  }
  // also allow picking up an existing orange off a capy stack
  for (const c of capys){
    if (!c.oranges.length) continue;
    const top = c.oranges[c.oranges.length - 1];
    const tx = c.cx + top.ox;
    const ty = c.headTop - (c.oranges.length - 1) * (ORANGE_R * 1.7) - ORANGE_R;
    if (Math.hypot(e.clientX - tx, e.clientY - ty) < ORANGE_R + 4){
      heldOrange.color = top.color;
      c.oranges.pop();
      heldOrange.active = true;
      heldOrange.x = e.clientX; heldOrange.y = e.clientY;
      cvs.classList.add('dragging');
      return;
    }
  }
});
cvs.addEventListener('pointermove', (e) => {
  if (heldOrange.active){ moveDrag(e.clientX, e.clientY); }
});
cvs.addEventListener('pointerup', (e) => {
  endDrag(e.clientX, e.clientY);
});
cvs.addEventListener('pointercancel', () => { heldOrange.active = false; cvs.classList.remove('dragging'); });

// ──────── temp control buttons ────────
$('#warmBtn').addEventListener('click', () => {
  game.temp = Math.min(TEMP_MAX, game.temp + 8);
  woodSfx();
  // emit a warm steam burst from the spring center
  for (let i = 0; i < 14; i++) spawnSteam(W/2 + (Math.random()-0.5)*200, H * 0.55);
});
$('#coolBtn').addEventListener('click', () => {
  game.temp = Math.max(TEMP_MIN, game.temp - 6);
  iceSfx();
  // little blue snowflake burst
  for (let i = 0; i < 10; i++){
    snow.push({
      x: W/2 + (Math.random()-0.5)*120,
      y: H * 0.5,
      vy: 60 + Math.random() * 40,
      vx: (Math.random() - 0.5) * 30,
      r: 2 + Math.random() * 2,
      sway: Math.random() * Math.PI * 2,
    });
  }
});
$('#resetBtn').addEventListener('click', () => {
  if (!confirm('Reset the onsen? Calm + capybara stacks return to zero (your best score is preserved).')) return;
  game.calm = 0; game.basket = 12; game.temp = 95;
  for (const c of capys){ c.oranges.length = 0; c.happiness = 60; }
  $('#basketCount').textContent = game.basket;
});

// ──────── main loop ────────
let last = performance.now();
let bgT = 0;

function tick(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  bgT += dt;

  // Temperature drifts toward 70 (room temp) over time — 0.4 per second
  game.temp += (70 - game.temp) * 0.04 * dt;

  // capybara physics
  let happy = 0;
  for (const c of capys){
    c.bob += dt * 1.4;
    c.driftPhase += dt * c.driftSpeed;
    c.cx = c.baseCx + Math.sin(c.driftPhase) * 22;
    c.cy = H * 0.66 + Math.sin(c.bob) * 3;
    // happiness driven by water temp
    const inSweet = game.temp >= SWEET_LO && game.temp <= SWEET_HI;
    if (inSweet){ c.happiness = Math.min(100, c.happiness + 4 * dt); }
    else if (game.temp < SWEET_LO - 5 || game.temp > SWEET_HI + 5){
      c.happiness = Math.max(0, c.happiness - 5 * dt);
    } else {
      c.happiness += (60 - c.happiness) * 0.1 * dt;
    }
    if (c.happiness > 75) happy++;
    // bliss notes every few seconds
    if (c.happiness > 78){
      c.noteT += dt;
      if (c.noteT > 3){ c.noteT = 0; spawnNote(c); }
    }
    // orange wobble — settle over time
    for (const o of c.oranges){
      if (o.settled < 1) o.settled = Math.min(1, o.settled + dt * 2.4);
      o.bobPhase += dt * 1.6;
    }
    // very high temp shakes oranges off
    if (game.temp > SWEET_HI + 18 && c.oranges.length > 0 && Math.random() < dt * 0.4){
      topple(c);
    }
    c.blinkT = (c.blinkT + dt) % 7;
  }
  game.happyCount = happy;

  // calm accumulates when temp is in sweet spot (and capys are content)
  if (game.temp >= SWEET_LO && game.temp <= SWEET_HI){
    let oranges = 0;
    for (const c of capys) oranges += c.oranges.length;
    game.calm += dt * (4 + happy * 2.5) * (1 + oranges * 0.12);
  }
  if (game.calm > game.best){
    game.best = Math.floor(game.calm);
    try { localStorage.setItem('capybara-onsen-best', String(game.best)); } catch{}
  }

  // particles
  spawnSteamFromSpring(dt);
  for (let i = steam.length - 1; i >= 0; i--){
    const s = steam[i];
    s.life -= dt;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.r += dt * 6;
    s.vy += dt * 6;     // slight upward decel
    if (s.life <= 0) steam.splice(i, 1);
  }
  for (const f of snow){
    f.sway += dt * 1.4;
    f.x += f.vx * dt + Math.sin(f.sway) * 6 * dt;
    f.y += f.vy * dt;
    if (f.y > H + 6){ f.y = -8; f.x = Math.random() * W; }
    if (f.x > W + 8) f.x -= W + 16;
    if (f.x < -8) f.x += W + 16;
  }
  for (let i = debris.length - 1; i >= 0; i--){
    const d = debris[i];
    d.life -= dt;
    if (d.life <= 0){ debris.splice(i, 1); continue; }
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    d.vy += 700 * dt;
    d.vx *= Math.pow(0.96, dt * 60);
    d.rot += d.rotV * dt;
    // splash into water
    if (d.y > H * 0.74){
      d.vy *= -0.4; d.vx *= 0.6; d.y = H * 0.74;
      if (Math.abs(d.vy) < 80){ d.life = 0; }   // settle
      spawnSteam(d.x, H * 0.55);
    }
  }
  for (let i = notes.length - 1; i >= 0; i--){
    notes[i].y += notes[i].vy * dt;
    notes[i].life -= dt;
    if (notes[i].life <= 0) notes.splice(i, 1);
  }

  // render
  render();
  // hud
  renderHud();
  requestAnimationFrame(tick);
}
function spawnSteamFromSpring(dt){
  if (Math.random() < dt * (3 + Math.max(0, (game.temp - 80) * 0.18))){
    const x = W * 0.2 + Math.random() * W * 0.6;
    spawnSteam(x, H * 0.55);
  }
}

// ──────── HUD ────────
function renderHud(){
  $('#calmEl').textContent = Math.floor(game.calm);
  $('#bestEl').textContent = game.best;
  $('#happyCountEl').textContent = game.happyCount;
  // temp readout
  $('#tempReadout').textContent = Math.round(game.temp) + '°';
  // tick: position 0% at TEMP_MIN, 100% at TEMP_MAX
  const tFrac = Math.max(0, Math.min(1, (game.temp - TEMP_MIN) / (TEMP_MAX - TEMP_MIN)));
  $('#tempTick').style.left = (tFrac * 100).toFixed(1) + '%';
  // sweet-spot overlay (fixed position)
  const sweet = $('#tempSweet');
  const lo = ((SWEET_LO - TEMP_MIN) / (TEMP_MAX - TEMP_MIN)) * 100;
  const hi = ((SWEET_HI - TEMP_MIN) / (TEMP_MAX - TEMP_MIN)) * 100;
  sweet.style.left = lo + '%';
  sweet.style.width = (hi - lo) + '%';
  // calm tint
  const calmEl = $('#calmEl');
  if (game.temp >= SWEET_LO && game.temp <= SWEET_HI) calmEl.classList.replace('warn','good');
  else if (Math.abs(game.temp - (SWEET_LO + SWEET_HI)/2) > 18) calmEl.classList.replace('good','warn');
}

// ──────── rendering ────────
function render(){
  // sky — peach gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, getCss('--sky'));
  sky.addColorStop(0.55, getCss('--sky-2'));
  sky.addColorStop(1, getCss('--sky-3'));
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);
  // moon
  const mx = W * 0.78, my = H * 0.18;
  const mGrad = ctx.createRadialGradient(mx, my, 6, mx, my, 80);
  mGrad.addColorStop(0, 'rgba(255,250,235,0.85)');
  mGrad.addColorStop(0.4, 'rgba(255,210,210,0.20)');
  mGrad.addColorStop(1, 'rgba(255,180,180,0)');
  ctx.fillStyle = mGrad;
  ctx.fillRect(0, 0, W, H * 0.5);
  ctx.fillStyle = 'rgba(255,250,235,0.92)';
  ctx.beginPath(); ctx.arc(mx, my, 24, 0, Math.PI*2); ctx.fill();
  // distant mountain silhouette
  ctx.fillStyle = 'rgba(120,80,100,0.4)';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.42);
  for (let x = 0; x <= W; x += 12){
    const y = H * 0.36 - Math.abs(Math.sin(x * 0.005)) * 80 + Math.sin(x * 0.01 + 1) * 30;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H * 0.55); ctx.lineTo(0, H * 0.55); ctx.closePath();
  ctx.fill();

  // bamboo silhouettes left + right
  drawBamboo(28, H * 0.10);
  drawBamboo(76, H * 0.18);
  drawBamboo(W - 50, H * 0.12);
  drawBamboo(W - 110, H * 0.22);

  // wooden deck rim around the spring (a flattened oval)
  const sx = W / 2, sy = H * 0.74, sw = W * 0.78, sh = H * 0.22;
  ctx.fillStyle = getCss('--wood');
  ctx.beginPath(); ctx.ellipse(sx, sy, sw / 2, sh / 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = getCss('--wood-light');
  ctx.beginPath(); ctx.ellipse(sx, sy - 6, sw / 2 - 16, sh / 2 - 14, 0, 0, Math.PI * 2); ctx.fill();
  // water surface
  const water = ctx.createRadialGradient(sx, sy - 30, 30, sx, sy, sw / 2);
  water.addColorStop(0, getCss('--water'));
  water.addColorStop(1, getCss('--water-deep'));
  ctx.fillStyle = water;
  ctx.beginPath(); ctx.ellipse(sx, sy - 18, sw / 2 - 26, sh / 2 - 24, 0, 0, Math.PI * 2); ctx.fill();
  // ripples
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++){
    const r = 30 + i * 22 + (Math.sin(bgT * 1.2 + i) * 3);
    ctx.globalAlpha = 0.4 - i * 0.08;
    ctx.beginPath(); ctx.ellipse(sx + 80, sy - 26, r, r * 0.32, 0, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // capybaras — back-to-front by cy
  const sortedCapys = [...capys].sort((a, b) => a.cy - b.cy);
  for (const c of sortedCapys){
    drawCapybara(c);
  }

  // steam particles (in front of capys)
  for (const s of steam){
    const a = Math.max(0, Math.min(1, s.life * 0.7));
    ctx.globalAlpha = a * 0.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // debris (falling oranges)
  for (const d of debris){
    drawOrangeAt(d.x, d.y, d.color, d.rot);
  }

  // basket on the right edge
  drawBasket();

  // notes
  ctx.font = 'italic 22px "Cormorant Garamond", serif';
  for (const n of notes){
    ctx.globalAlpha = Math.max(0, Math.min(1, n.life * 0.6));
    ctx.fillStyle = getCss('--orange-dark');
    ctx.fillText('♪', n.x, n.y);
  }
  ctx.globalAlpha = 1;

  // snow on top
  ctx.fillStyle = '#fff';
  for (const f of snow){
    ctx.globalAlpha = 0.85;
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // held orange (under cursor)
  if (heldOrange.active){
    drawOrangeAt(heldOrange.x, heldOrange.y, heldOrange.color, bgT * 0.8);
  }
}

function drawBamboo(x, baseY){
  const segH = 32;
  const w = 14;
  const h = H * 0.5;
  ctx.fillStyle = 'rgba(60,90,55,0.55)';
  ctx.fillRect(x - w/2, H - h, w, h);
  ctx.fillStyle = 'rgba(110,150,90,0.55)';
  for (let yy = H - h + 4; yy < H; yy += segH){
    ctx.fillRect(x - w/2, yy, w, 3);
  }
  // leaves
  ctx.fillStyle = 'rgba(80,130,70,0.7)';
  ctx.beginPath(); ctx.ellipse(x - w/2 - 12, H - h + baseY * 0.4, 16, 4, -0.6, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + w/2 + 14, H - h + baseY * 0.5, 14, 3, 0.5, 0, Math.PI*2); ctx.fill();
}

function drawCapybara(c){
  // Body submerged — only top half visible above water
  const bodyW = c.r * 2;
  const bodyH = c.r * 1.0;
  const topY = c.cy - bodyH * 0.35;
  // floating shadow on water
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(c.cx + 6, c.cy + 8, c.r, 8, 0, 0, Math.PI*2); ctx.fill();

  // body (ellipse)
  ctx.fillStyle = getCss('--capy');
  ctx.beginPath();
  ctx.ellipse(c.cx, topY, bodyW / 2, bodyH / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  // body lighter top
  ctx.fillStyle = getCss('--capy-light');
  ctx.globalAlpha = 0.55;
  ctx.beginPath();
  ctx.ellipse(c.cx - 4, topY - 6, bodyW / 2 - 6, bodyH / 2 - 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // head (round-rect with FLAT top so oranges have a real platter)
  const headW = c.r * 0.95;
  const headH = c.r * 0.7;
  const headCx = c.cx + (c.facing > 0 ? c.r * 0.45 : -c.r * 0.45);
  const headTopY = topY - bodyH * 0.45;
  c.headTop = headTopY - headH * 0.5;     // y of the platter
  c.headLeftX = headCx - headW * 0.4;
  c.headRightX = headCx + headW * 0.4;
  // head main
  ctx.fillStyle = getCss('--capy');
  roundRect(ctx, headCx - headW/2, c.headTop, headW, headH, 12);
  ctx.fill();
  // top platter highlight
  ctx.fillStyle = getCss('--capy-light');
  ctx.globalAlpha = 0.3;
  ctx.fillRect(headCx - headW/2 + 4, c.headTop + 1, headW - 8, 4);
  ctx.globalAlpha = 1;

  // ears (tiny rounded blobs, top corners)
  ctx.fillStyle = getCss('--capy-dark');
  ctx.beginPath(); ctx.arc(headCx - headW * 0.32, c.headTop + 2, 6, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headCx + headW * 0.32, c.headTop + 2, 6, 0, Math.PI*2); ctx.fill();

  // eyes (closed if happy; open if cold/hot)
  const eyeY = c.headTop + headH * 0.45;
  const eyeOff = headW * 0.15 * c.facing;
  if (c.happiness > 70 && c.blinkT < 0.18 || c.happiness <= 70 && c.blinkT > 5.8){
    // brief blink — closed
    ctx.strokeStyle = getCss('--capy-dark');
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(headCx - eyeOff - 4, eyeY); ctx.lineTo(headCx - eyeOff + 4, eyeY);
    ctx.moveTo(headCx + eyeOff - 4, eyeY); ctx.lineTo(headCx + eyeOff + 4, eyeY);
    ctx.stroke();
  } else if (c.happiness > 75){
    // blissful — closed-curve eyes (smile)
    ctx.strokeStyle = getCss('--capy-dark');
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.arc(headCx - eyeOff, eyeY + 2, 3, Math.PI, 2 * Math.PI);
    ctx.arc(headCx + eyeOff, eyeY + 2, 3, Math.PI, 2 * Math.PI);
    ctx.stroke();
  } else {
    // open dot eyes
    ctx.fillStyle = getCss('--capy-dark');
    ctx.beginPath(); ctx.arc(headCx - eyeOff, eyeY, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(headCx + eyeOff, eyeY, 2.2, 0, Math.PI*2); ctx.fill();
  }

  // nose (small oval)
  ctx.fillStyle = getCss('--capy-dark');
  ctx.beginPath(); ctx.ellipse(headCx + headW * 0.32 * c.facing, c.headTop + headH * 0.7, 3, 2, 0, 0, Math.PI*2); ctx.fill();

  // happiness aura when very content
  if (c.happiness > 78){
    ctx.strokeStyle = 'rgba(154,196,162,0.5)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(c.cx, c.cy - 8, c.r + 8 + Math.sin(bgT * 2) * 2, 0, Math.PI * 2);
    ctx.stroke();
  }

  // orange stack (drawn last so it sits ON TOP of everything)
  for (let i = 0; i < c.oranges.length; i++){
    const o = c.oranges[i];
    const wob = (1 - o.settled) * 6 + Math.sin(o.bobPhase) * 0.6;
    const ox = c.cx + o.ox + Math.sin(o.bobPhase + i) * 0.4;
    const oy = c.headTop - i * (ORANGE_R * 1.7) - ORANGE_R - wob;
    drawOrangeAt(ox, oy, o.color, 0);
  }
}

function drawOrangeAt(x, y, color, rot){
  ctx.save();
  ctx.translate(x, y);
  if (rot) ctx.rotate(rot);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.arc(2, 3, ORANGE_R, 0, Math.PI*2); ctx.fill();
  // body — radial gradient
  const grad = ctx.createRadialGradient(-ORANGE_R*0.35, -ORANGE_R*0.35, 2, 0, 0, ORANGE_R);
  grad.addColorStop(0, '#ffcc88');
  grad.addColorStop(0.6, color);
  grad.addColorStop(1, '#a04412');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, ORANGE_R, 0, Math.PI*2); ctx.fill();
  // dimples for texture
  ctx.fillStyle = 'rgba(160,68,18,0.18)';
  for (let i = 0; i < 5; i++){
    const a = i / 5 * Math.PI * 2;
    ctx.beginPath(); ctx.arc(Math.cos(a) * ORANGE_R * 0.55, Math.sin(a) * ORANGE_R * 0.55, 1.6, 0, Math.PI*2); ctx.fill();
  }
  // leaf + stem
  ctx.fillStyle = '#5a8c4e';
  ctx.beginPath();
  ctx.ellipse(2, -ORANGE_R - 3, 7, 3, -0.6, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#3a5a30';
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(0, -ORANGE_R); ctx.lineTo(0, -ORANGE_R - 3); ctx.stroke();
  // highlight
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.ellipse(-ORANGE_R*0.4, -ORANGE_R*0.4, ORANGE_R*0.25, ORANGE_R*0.18, -0.6, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBasket(){
  const r = basketRect();
  // wicker basket — dark brown rounded rect with rim + 3 oranges peeking out
  ctx.save();
  ctx.translate(r.x + r.w/2, r.y + r.h/2);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(ctx, -r.w/2 + 3, -r.h/2 + 6, r.w, r.h, 14);
  ctx.fill();
  // basket body
  ctx.fillStyle = getCss('--wood');
  roundRect(ctx, -r.w/2, -r.h/2, r.w, r.h, 14);
  ctx.fill();
  // weave lines
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1;
  for (let yy = -r.h/2 + 8; yy < r.h/2 - 8; yy += 12){
    ctx.beginPath(); ctx.moveTo(-r.w/2 + 4, yy); ctx.lineTo(r.w/2 - 4, yy); ctx.stroke();
  }
  for (let xx = -r.w/2 + 8; xx < r.w/2 - 8; xx += 12){
    ctx.beginPath(); ctx.moveTo(xx, -r.h/2 + 4); ctx.lineTo(xx, r.h/2 - 4); ctx.stroke();
  }
  // rim
  ctx.fillStyle = getCss('--wood-light');
  roundRect(ctx, -r.w/2, -r.h/2, r.w, 8, 4);
  ctx.fill();
  ctx.restore();
  // oranges piled in the basket
  if (game.basket > 0){
    drawOrangeAt(r.x + r.w/2 - 8, r.y - 4, '#f57c2a', 0);
    if (game.basket > 1) drawOrangeAt(r.x + r.w/2 + 10, r.y - 2, '#ff944a', 0.3);
    if (game.basket > 2) drawOrangeAt(r.x + r.w/2, r.y - 18, '#e26818', -0.2);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = 'italic 12px "Cormorant Garamond", serif';
    ctx.textAlign = 'center';
    ctx.fillText('empty', r.x + r.w/2, r.y - 8);
  }
  // count badge
  ctx.fillStyle = getCss('--ink');
  ctx.font = 'bold 11px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('×' + game.basket, r.x + r.w/2, r.y + r.h - 16);
}

// helpers
function roundRect(c, x, y, w, h, r){
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}
function getCss(name){
  return getComputedStyle(document.body).getPropertyValue(name).trim() || '#000';
}

// passive basket refill — slow trickle
setInterval(() => {
  if (game.basket < 12){ game.basket++; $('#basketCount').textContent = game.basket; }
}, 4500);

// boot
requestAnimationFrame(tick);
</script>
