<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Goat</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐐">
<meta property="og:title" content="Code Goat">
<meta property="og:description" content="Feed code to your goat. Complex syntax makes it grow. Simple code gives it gas.">
<meta property="og:url" content="https://app.sloppy.live/code-goat/">
<meta property="og:image" content="https://emojicdn.elk.sh/🐐?style=google">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4efe6;--surface:#fff;--border:#e0d8c8;
  --text:#2d2a24;--dim:#8a8477;--accent:#5d8c3e;
  --accent2:#8b5e3c;--gold:#c49b2a;--pink:#d4637a;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Gaegu',cursive;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:16px;
}
.container{max-width:520px;width:100%}

header{text-align:center;margin-bottom:16px}
h1{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:700;color:var(--accent2);letter-spacing:-0.02em}
.sub{color:var(--dim);font-size:0.85rem;font-weight:300}

.goat-area{
  background:var(--surface);border:2px solid var(--border);
  border-radius:16px;padding:20px;margin-bottom:16px;
  text-align:center;position:relative;overflow:hidden;
  min-height:220px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.goat-area canvas{display:block}
.goat-name{font-size:1.1rem;font-weight:700;color:var(--accent2);margin-top:8px}
.goat-mood{font-size:0.8rem;color:var(--dim);font-style:italic}

.stats-bar{
  display:flex;justify-content:space-around;
  background:var(--surface);border:2px solid var(--border);
  border-radius:12px;padding:12px;margin-bottom:16px;
}
.stat{text-align:center}
.stat-label{font-size:0.7rem;color:var(--dim);font-weight:300}
.stat-val{font-family:'Fira Code',monospace;font-size:1.1rem;font-weight:700}
.stat-val.green{color:var(--accent)}
.stat-val.gold{color:var(--gold)}
.stat-val.pink{color:var(--pink)}

.xp-bar-wrap{
  background:var(--border);border-radius:6px;height:8px;
  margin-bottom:16px;overflow:hidden;position:relative;
}
.xp-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:6px;transition:width 0.5s}
.xp-label{
  position:absolute;right:6px;top:-16px;font-family:'Fira Code',monospace;
  font-size:0.55rem;color:var(--dim);
}

.feed-section{
  background:var(--surface);border:2px solid var(--border);
  border-radius:14px;padding:16px;margin-bottom:16px;
}
.feed-label{font-size:0.85rem;font-weight:700;color:var(--accent2);margin-bottom:8px}
.code-input{
  width:100%;min-height:100px;padding:10px;border:2px solid var(--border);
  border-radius:10px;background:var(--bg);color:var(--text);
  font-family:'Fira Code',monospace;font-size:0.7rem;
  resize:vertical;outline:none;line-height:1.5;
}
.code-input:focus{border-color:var(--accent)}
.code-input::placeholder{color:var(--dim);font-family:'Gaegu',cursive;font-size:0.85rem}
.feed-btn{
  margin-top:10px;width:100%;padding:12px;
  border:2px solid var(--accent);border-radius:10px;
  background:var(--accent);color:#fff;font-family:inherit;
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:all 0.2s;
}
.feed-btn:hover{background:#4a7a2e;border-color:#4a7a2e}
.feed-btn:disabled{opacity:0.4;cursor:default}

.analysis{
  margin-top:10px;padding:10px;border-radius:8px;
  background:var(--bg);font-family:'Fira Code',monospace;
  font-size:0.6rem;line-height:1.6;display:none;color:var(--dim);
}
.analysis .good{color:var(--accent)}
.analysis .meh{color:var(--gold)}
.analysis .bad{color:var(--pink)}

.history{
  background:var(--surface);border:2px solid var(--border);
  border-radius:14px;padding:14px;margin-bottom:16px;
}
.history-title{font-size:0.85rem;font-weight:700;color:var(--accent2);margin-bottom:8px}
.meal{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--border);
  font-size:0.75rem;
}
.meal:last-child{border:none}
.meal .lang{color:var(--dim);font-family:'Fira Code',monospace;font-size:0.6rem}
.meal .xp{font-family:'Fira Code',monospace;font-weight:500}
.meal .xp.pos{color:var(--accent)}
.meal .xp.neg{color:var(--pink)}

.speech{
  position:absolute;top:10px;right:10px;
  background:#fff;border:2px solid var(--border);
  border-radius:10px 10px 10px 2px;padding:6px 10px;
  font-size:0.75rem;max-width:160px;
  opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.speech.show{opacity:1}

.back-link{text-align:center;margin-top:8px}
.back-link a{color:var(--dim);text-decoration:none;font-size:0.7rem}
.back-link a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Code Goat</h1>
    <div class="sub">feed it code. watch it grow. or suffer.</div>
  </header>

  <div class="goat-area" id="goat-area">
    <canvas id="goat" width="240" height="180"></canvas>
    <div class="goat-name" id="goat-name">Kid</div>
    <div class="goat-mood" id="goat-mood">hungry...</div>
    <div class="speech" id="speech"></div>
  </div>

  <div style="position:relative;margin-bottom:16px">
    <div class="xp-label" id="xp-label">0 / 50 XP</div>
    <div class="xp-bar-wrap"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-label">Level</div><div class="stat-val green" id="s-level">1</div></div>
    <div class="stat"><div class="stat-label">Size</div><div class="stat-val gold" id="s-size">Tiny</div></div>
    <div class="stat"><div class="stat-label">Meals</div><div class="stat-val pink" id="s-meals">0</div></div>
    <div class="stat"><div class="stat-label">Total XP</div><div class="stat-val" id="s-xp">0</div></div>
  </div>

  <div class="feed-section">
    <div class="feed-label">Feed Code</div>
    <textarea class="code-input" id="code-input" placeholder="Paste or type code here... the goat awaits"></textarea>
    <button class="feed-btn" id="feed-btn" onclick="feedGoat()">Feed the Goat</button>
    <div class="analysis" id="analysis"></div>
  </div>

  <div class="history">
    <div class="history-title">Meal History</div>
    <div id="meal-list"><div class="meal" style="color:var(--dim);font-style:italic">No meals yet</div></div>
  </div>

  <div class="back-link"><a href="https://sloppy.live">sloppy.live</a></div>
</div>

<script>
const goatCanvas = document.getElementById('goat');
const gCtx = goatCanvas.getContext('2d');

let level = 1, xp = 0, totalXp = 0, meals = 0;
let mood = 'hungry', moodTimer = 0;
let goatScale = 1;
let chewing = 0, gasTimer = 0, hearts = [];
let idlePhase = 0;

const SIZES = ['Tiny','Small','Medium','Chunky','Large','Huge','Massive','Legendary','Cosmic','Absolute Unit'];
const LEVEL_XP = [50,80,120,180,260,360,500,700,1000,1500];
const MOODS = {
  hungry: 'hungry...',
  chewing: '*munch munch*',
  happy: 'satisfied!',
  gas: '*BRRAAAP*',
  disgusted: 'what was THAT?',
  enlightened: 'I see the matrix...',
  growing: 'I feel... bigger',
  sleeping: 'zzz...',
};

function xpForLevel() { return LEVEL_XP[Math.min(level - 1, LEVEL_XP.length - 1)]; }

function analyzeCode(code) {
  const lines = code.split('\n').filter(l => l.trim().length > 0);
  if (lines.length === 0) return { xp: 0, verdict: 'empty', details: [] };

  let score = 0;
  const details = [];
  const src = code.toLowerCase();

  // Length bonus
  const charCount = code.length;
  if (charCount > 500) { score += 15; details.push({ t: 'Substantial meal (+15)', c: 'good' }); }
  else if (charCount > 200) { score += 8; details.push({ t: 'Decent portion (+8)', c: 'good' }); }
  else if (charCount > 50) { score += 3; details.push({ t: 'Light snack (+3)', c: 'meh' }); }
  else { score += 1; details.push({ t: 'Crumb (+1)', c: 'bad' }); }

  // Line count
  if (lines.length > 20) { score += 10; details.push({ t: `${lines.length} lines — filling (+10)`, c: 'good' }); }
  else if (lines.length > 5) { score += 4; details.push({ t: `${lines.length} lines (+4)`, c: 'meh' }); }

  // Nesting depth (curly braces)
  let maxDepth = 0, depth = 0;
  for (const ch of code) {
    if (ch === '{') { depth++; maxDepth = Math.max(maxDepth, depth); }
    if (ch === '}') depth--;
  }
  if (maxDepth >= 4) { score += 20; details.push({ t: `Nesting depth ${maxDepth} — RICH flavor (+20)`, c: 'good' }); }
  else if (maxDepth >= 2) { score += 8; details.push({ t: `Nesting depth ${maxDepth} (+8)`, c: 'meh' }); }

  // Parentheses complexity
  let parenDepth = 0, maxParen = 0;
  for (const ch of code) {
    if (ch === '(') { parenDepth++; maxParen = Math.max(maxParen, parenDepth); }
    if (ch === ')') parenDepth--;
  }
  if (maxParen >= 3) { score += 10; details.push({ t: `Deep parens (${maxParen}) — crunchy (+10)`, c: 'good' }); }

  // Keywords detection
  const keywords = ['function','class','async','await','import','export','interface','type','enum',
    'def','lambda','yield','struct','impl','trait','pub','fn','match',
    'SELECT','FROM','WHERE','JOIN','CREATE','ALTER',
    'for','while','switch','try','catch','throw','return','const','let','var'];
  const found = keywords.filter(k => new RegExp('\\b' + k + '\\b', 'i').test(code));
  if (found.length >= 8) { score += 18; details.push({ t: `${found.length} keywords — gourmet! (+18)`, c: 'good' }); }
  else if (found.length >= 4) { score += 8; details.push({ t: `${found.length} keywords (+8)`, c: 'meh' }); }
  else if (found.length >= 1) { score += 3; details.push({ t: `${found.length} keyword(s) (+3)`, c: 'meh' }); }

  // Special syntax bonuses
  if (/=>/.test(code)) { score += 3; details.push({ t: 'Arrow functions — tangy (+3)', c: 'good' }); }
  if (/\?\?|\.\.\.|\?\.|<[A-Z]/.test(code)) { score += 5; details.push({ t: 'Modern syntax — spicy (+5)', c: 'good' }); }
  if (/regex|\/[^/]+\/[gim]/.test(code)) { score += 7; details.push({ t: 'Regex detected — EXOTIC (+7)', c: 'good' }); }
  if (/recursive|recursion/i.test(code) || /function\s+\w+[\s\S]*?\1/i.test(code)) {
    score += 12; details.push({ t: 'Recursion — mind-bending flavor (+12)', c: 'good' });
  }

  // Penalties for boring code
  if (/^(hello|hi|test|foo|bar|console\.log|print)\b/i.test(code.trim())) {
    score -= 5; details.push({ t: 'Boring starter code (-5)', c: 'bad' });
  }
  if (/^\/\/.*$/m.test(code) && lines.length <= 2) {
    score -= 3; details.push({ t: 'Just a comment? Really? (-3)', c: 'bad' });
  }
  if (/todo|fixme|hack/i.test(code)) {
    score += 2; details.push({ t: 'Found TODOs — seasoned with guilt (+2)', c: 'meh' });
  }

  // Language detection for flavor
  let lang = 'unknown';
  if (/\b(def |import |print\(|elif |self\.)/.test(code)) lang = 'python';
  else if (/\b(fn |let mut |impl |pub fn|->)/.test(code)) lang = 'rust';
  else if (/\b(func |fmt\.|package |:=)/.test(code)) lang = 'go';
  else if (/\b(function|const |let |var |=>|console\.)/.test(code)) lang = 'javascript';
  else if (/\b(interface |type |enum )/.test(code) && /:\s*\w+/.test(code)) lang = 'typescript';
  else if (/\b(public |private |class |void |static )/.test(code)) lang = 'java';
  else if (/<[a-z]+[\s>]|<\/[a-z]+>/i.test(code)) lang = 'html';
  else if (/[{;]\s*(color|display|margin|padding)\s*:/.test(code)) lang = 'css';
  else if (/SELECT|INSERT|CREATE TABLE/i.test(code)) lang = 'sql';

  if (lang === 'rust') { score += 8; details.push({ t: 'Rust — the goat\'s favorite delicacy (+8)', c: 'good' }); }
  else if (lang === 'python') { score += 2; details.push({ t: 'Python — palatable (+2)', c: 'meh' }); }
  else if (lang === 'html') { score -= 2; details.push({ t: 'HTML — it\'s not real code... (-2)', c: 'bad' }); }
  else if (lang === 'css') { score -= 3; details.push({ t: 'CSS — gives the goat indigestion (-3)', c: 'bad' }); }

  score = Math.max(1, score);

  let verdict = 'decent';
  if (score >= 40) verdict = 'gourmet';
  else if (score >= 20) verdict = 'tasty';
  else if (score >= 10) verdict = 'decent';
  else if (score >= 5) verdict = 'bland';
  else verdict = 'terrible';

  return { xp: score, verdict, details, lang };
}

function feedGoat() {
  const input = document.getElementById('code-input');
  const code = input.value.trim();
  if (!code) return;

  const result = analyzeCode(code);
  meals++;

  // Show analysis
  const anEl = document.getElementById('analysis');
  anEl.style.display = 'block';
  let html = result.details.map(d => `<span class="${d.c}">${d.t}</span>`).join('<br>');
  html += `<br><strong>Total: ${result.xp} XP (${result.verdict})</strong>`;
  anEl.innerHTML = html;

  // Add XP
  xp += result.xp;
  totalXp += result.xp;

  // Check level up
  while (xp >= xpForLevel() && level < 10) {
    xp -= xpForLevel();
    level++;
    goatScale = 1 + (level - 1) * 0.15;
    setMood('growing');
    say(level >= 8 ? 'I AM BECOME GOAT' : 'I\'m GROWING!');
  }
  if (level >= 10 && xp >= xpForLevel()) xp = xpForLevel();

  // Mood based on verdict
  if (result.verdict === 'gourmet') {
    setMood('enlightened');
    say(randomFrom(['DIVINE.','I can see through time.','This code... it speaks to me.','*ascends briefly*']));
    hearts.push({ x: 120, y: 60, life: 1 });
    hearts.push({ x: 100, y: 40, life: 1 });
  } else if (result.verdict === 'tasty') {
    setMood('happy');
    say(randomFrom(['Mmm, crunchy brackets.','Good nesting depth!','*happy goat noises*']));
    hearts.push({ x: 110, y: 50, life: 1 });
  } else if (result.verdict === 'decent') {
    setMood('chewing');
    say(randomFrom(['It\'ll do.','*chews thoughtfully*','Needs more recursion.']));
  } else if (result.verdict === 'bland') {
    setMood('gas');
    gasTimer = 60;
    say(randomFrom(['*burp*','That was... basic.','My stomach feels weird.','More keywords next time.']));
  } else {
    setMood('disgusted');
    gasTimer = 90;
    say(randomFrom(['I\'m going to be sick.','Was that even code?','*visible disgust*','You call that syntax?!']));
  }

  chewing = 40;

  // Meal history
  addMeal(result.lang, result.xp, result.verdict);
  updateDisplay();

  input.value = '';
  setTimeout(() => { anEl.style.display = 'none'; }, 6000);
}

function addMeal(lang, xpGain, verdict) {
  const list = document.getElementById('meal-list');
  if (meals === 1) list.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'meal';
  div.innerHTML = `
    <span>${verdict} <span class="lang">${lang}</span></span>
    <span class="xp ${xpGain >= 10 ? 'pos' : xpGain >= 5 ? '' : 'neg'}">${xpGain >= 0 ? '+' : ''}${xpGain} XP</span>
  `;
  list.prepend(div);
  if (list.children.length > 15) list.lastChild.remove();
}

function setMood(m) {
  mood = m;
  document.getElementById('goat-mood').textContent = MOODS[m] || m;
  moodTimer = 120;
}

function say(text) {
  const el = document.getElementById('speech');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function updateDisplay() {
  document.getElementById('s-level').textContent = level;
  document.getElementById('s-size').textContent = SIZES[Math.min(level - 1, SIZES.length - 1)];
  document.getElementById('s-meals').textContent = meals;
  document.getElementById('s-xp').textContent = totalXp;
  const needed = xpForLevel();
  const pct = Math.min(100, (xp / needed) * 100);
  document.getElementById('xp-bar').style.width = pct + '%';
  document.getElementById('xp-label').textContent = `${xp} / ${needed} XP`;
}

// Goat drawing
function drawGoat() {
  const w = goatCanvas.width, h = goatCanvas.height;
  gCtx.clearRect(0, 0, w, h);

  const cx = w / 2, cy = h / 2 + 10;
  const s = goatScale;
  const t = performance.now() * 0.001;
  idlePhase = t;

  const bobY = Math.sin(t * 1.5) * 2;
  const breathe = 1 + Math.sin(t * 2) * 0.02;

  gCtx.save();
  gCtx.translate(cx, cy + bobY);
  gCtx.scale(s * breathe, s);

  // Shadow
  gCtx.fillStyle = 'rgba(0,0,0,0.06)';
  gCtx.beginPath();
  gCtx.ellipse(0, 40, 28, 6, 0, 0, Math.PI * 2);
  gCtx.fill();

  // Legs
  const legKick = chewing > 0 ? Math.sin(t * 12) * 3 : 0;
  gCtx.strokeStyle = '#8b7355';
  gCtx.lineWidth = 4;
  gCtx.lineCap = 'round';
  // Back legs
  gCtx.beginPath(); gCtx.moveTo(-14, 20); gCtx.lineTo(-16, 38 + legKick); gCtx.stroke();
  gCtx.beginPath(); gCtx.moveTo(-6, 20); gCtx.lineTo(-4, 38 - legKick); gCtx.stroke();
  // Front legs
  gCtx.beginPath(); gCtx.moveTo(10, 20); gCtx.lineTo(8, 38 + legKick); gCtx.stroke();
  gCtx.beginPath(); gCtx.moveTo(18, 20); gCtx.lineTo(20, 38 - legKick); gCtx.stroke();
  // Hooves
  gCtx.fillStyle = '#5c4a3a';
  [[-16,38+legKick],[-4,38-legKick],[8,38+legKick],[20,38-legKick]].forEach(([hx,hy])=>{
    gCtx.beginPath(); gCtx.ellipse(hx, hy, 3, 2, 0, 0, Math.PI*2); gCtx.fill();
  });

  // Tail
  const tailWag = Math.sin(t * 4) * 15;
  gCtx.strokeStyle = '#a89070';
  gCtx.lineWidth = 3;
  gCtx.beginPath();
  gCtx.moveTo(-18, 5);
  gCtx.quadraticCurveTo(-28, -5 + tailWag * 0.3, -25, -15 + tailWag * 0.5);
  gCtx.stroke();
  // Tail tuft
  gCtx.fillStyle = '#c4b090';
  gCtx.beginPath(); gCtx.arc(-25, -16 + tailWag * 0.5, 4, 0, Math.PI*2); gCtx.fill();

  // Body
  gCtx.fillStyle = '#c4b090';
  gCtx.beginPath();
  gCtx.ellipse(2, 10, 26, 18, -0.1, 0, Math.PI * 2);
  gCtx.fill();
  // Belly highlight
  gCtx.fillStyle = '#d4c8a8';
  gCtx.beginPath();
  gCtx.ellipse(4, 16, 16, 8, -0.05, 0, Math.PI * 2);
  gCtx.fill();

  // Neck
  gCtx.fillStyle = '#c4b090';
  gCtx.beginPath();
  gCtx.ellipse(22, -2, 10, 14, 0.3, 0, Math.PI * 2);
  gCtx.fill();

  // Head
  const chewBob = chewing > 0 ? Math.sin(t * 15) * 2 : 0;
  gCtx.save();
  gCtx.translate(30, -18 + chewBob);

  // Head shape
  gCtx.fillStyle = '#c4b090';
  gCtx.beginPath();
  gCtx.ellipse(0, 0, 14, 11, 0.2, 0, Math.PI * 2);
  gCtx.fill();

  // Snout
  gCtx.fillStyle = '#b8a888';
  gCtx.beginPath();
  gCtx.ellipse(10, 3, 7, 6, 0.1, 0, Math.PI * 2);
  gCtx.fill();
  // Nostrils
  gCtx.fillStyle = '#8b7355';
  gCtx.beginPath(); gCtx.arc(12, 1, 1.5, 0, Math.PI*2); gCtx.fill();
  gCtx.beginPath(); gCtx.arc(12, 5, 1.5, 0, Math.PI*2); gCtx.fill();

  // Mouth
  if (chewing > 0) {
    const openAmt = Math.abs(Math.sin(t * 15)) * 3;
    gCtx.strokeStyle = '#6b5a44';
    gCtx.lineWidth = 1.5;
    gCtx.beginPath();
    gCtx.arc(13, 6 + openAmt, 3, 0, Math.PI);
    gCtx.stroke();
  }

  // Eyes
  const blinkCycle = Math.sin(t * 0.7);
  const blink = blinkCycle > 0.95;
  const eyeX = -2, eyeY = -4;
  if (blink) {
    gCtx.strokeStyle = '#3d3225';
    gCtx.lineWidth = 1.5;
    gCtx.beginPath(); gCtx.moveTo(eyeX-3, eyeY); gCtx.lineTo(eyeX+3, eyeY); gCtx.stroke();
  } else {
    // Eye white
    gCtx.fillStyle = '#fff';
    gCtx.beginPath(); gCtx.ellipse(eyeX, eyeY, 4, 4.5, 0, 0, Math.PI*2); gCtx.fill();
    // Iris
    gCtx.fillStyle = mood === 'enlightened' ? '#d4a017' : mood === 'disgusted' ? '#6a7a3a' : '#5a7a3e';
    gCtx.beginPath(); gCtx.arc(eyeX + 1, eyeY, 2.5, 0, Math.PI*2); gCtx.fill();
    // Pupil
    gCtx.fillStyle = '#1a1a1a';
    const pupilSize = mood === 'enlightened' ? 0.8 : 1.5;
    gCtx.beginPath(); gCtx.arc(eyeX + 1, eyeY, pupilSize, 0, Math.PI*2); gCtx.fill();
    // Shine
    gCtx.fillStyle = 'rgba(255,255,255,0.6)';
    gCtx.beginPath(); gCtx.arc(eyeX, eyeY - 1, 1, 0, Math.PI*2); gCtx.fill();
  }

  // Ears
  gCtx.fillStyle = '#b8a888';
  // Left ear
  gCtx.beginPath();
  gCtx.moveTo(-8, -8); gCtx.lineTo(-18, -16); gCtx.lineTo(-6, -12);
  gCtx.fill();
  // Right ear (forward)
  gCtx.beginPath();
  gCtx.moveTo(2, -10); gCtx.lineTo(8, -20); gCtx.lineTo(6, -8);
  gCtx.fill();
  // Inner ear
  gCtx.fillStyle = '#d4a0a0';
  gCtx.beginPath();
  gCtx.moveTo(-9, -9); gCtx.lineTo(-15, -14); gCtx.lineTo(-7, -11);
  gCtx.fill();

  // Horns
  if (level >= 3) {
    gCtx.strokeStyle = '#8b7355';
    gCtx.lineWidth = 3;
    gCtx.lineCap = 'round';
    const hornSize = Math.min(1, (level - 3) * 0.2 + 0.4);
    gCtx.beginPath();
    gCtx.moveTo(-4, -10);
    gCtx.quadraticCurveTo(-10, -22 * hornSize, -2, -28 * hornSize);
    gCtx.stroke();
    gCtx.beginPath();
    gCtx.moveTo(4, -10);
    gCtx.quadraticCurveTo(14, -22 * hornSize, 8, -28 * hornSize);
    gCtx.stroke();
  }

  // Beard
  if (level >= 2) {
    gCtx.fillStyle = '#a89070';
    const beardLen = Math.min(12, (level - 1) * 2);
    gCtx.beginPath();
    gCtx.moveTo(8, 8);
    gCtx.quadraticCurveTo(10, 8 + beardLen, 6, 10 + beardLen);
    gCtx.quadraticCurveTo(4, 8 + beardLen * 0.5, 6, 8);
    gCtx.fill();
  }

  gCtx.restore(); // head

  // Gas cloud
  if (gasTimer > 0) {
    gasTimer--;
    const ga = gasTimer / 90;
    gCtx.fillStyle = `rgba(120,140,80,${ga * 0.3})`;
    for (let i = 0; i < 3; i++) {
      const gx = -22 + Math.sin(t * 2 + i * 2) * 8;
      const gy = 10 + Math.cos(t * 1.5 + i) * 6 - (90 - gasTimer) * 0.3;
      gCtx.beginPath();
      gCtx.arc(gx, gy, 6 + i * 2, 0, Math.PI * 2);
      gCtx.fill();
    }
  }

  gCtx.restore(); // main transform

  // Hearts
  for (let i = hearts.length - 1; i >= 0; i--) {
    const hr = hearts[i];
    hr.y -= 0.8;
    hr.life -= 0.015;
    if (hr.life <= 0) { hearts.splice(i, 1); continue; }
    gCtx.fillStyle = `rgba(212,99,122,${hr.life})`;
    gCtx.font = `${14 * hr.life + 6}px sans-serif`;
    gCtx.fillText('\u2665', hr.x + Math.sin(t * 3 + i) * 8, hr.y);
  }

  if (chewing > 0) chewing--;
  if (moodTimer > 0) {
    moodTimer--;
    if (moodTimer === 0 && mood !== 'hungry') {
      mood = meals > 0 ? 'sleeping' : 'hungry';
      document.getElementById('goat-mood').textContent = MOODS[mood];
    }
  }

  requestAnimationFrame(drawGoat);
}
drawGoat();
updateDisplay();
</script>
</body>
</html>
