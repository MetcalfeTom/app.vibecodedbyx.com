<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zen Garden</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌸">
<meta property="og:title" content="Zen Garden">
<meta property="og:description" content="Cherry blossoms drift over a calm pond. Breathe.">
<meta property="og:url" content="https://sloppy.live/zen-garden/">
<meta property="og:image" content="https://sloppy.live/zen-garden/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1812}
canvas{display:block;width:100%;height:100%}
#koan{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Noto Serif JP',serif;font-weight:200;color:rgba(255,245,230,.08);font-size:clamp(1.2rem,3vw,2rem);pointer-events:none;z-index:5;text-align:center;letter-spacing:.15em;transition:opacity 8s;line-height:1.8;white-space:pre-line}
</style>
</head>
<body>
<div id="koan"></div>
<canvas id="cv"></canvas>
<script>
const CV=document.getElementById('cv');
const X=CV.getContext('2d');
let W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

const KOANS=[
'What is the sound of\none hand coding?',
'The pond does not try\nto reflect the sky.',
'Be still.\nThe blossoms will find you.',
'Empty your cup.\nThen write the function.',
'The stone in the garden\nwas always there.',
'A flower falls,\neven with our love.',
'Sitting quietly,\ndoing nothing,\nspring comes.',
'Before enlightenment:\nchop wood, write code.\nAfter enlightenment:\nchop wood, write code.',
];
let koanEl=document.getElementById('koan');
let koanIdx=0;
function showKoan(){
  koanEl.style.opacity='0';
  setTimeout(function(){
    koanIdx=(koanIdx+1)%KOANS.length;
    koanEl.textContent=KOANS[koanIdx];
    koanEl.style.opacity='1';
    koanEl.style.transition='opacity 3s';
    setTimeout(function(){koanEl.style.transition='opacity 6s';koanEl.style.opacity='0';},12000);
  },2000);
}
showKoan();
setInterval(showKoan,22000);

let pondY=0.62;
let mx=0,my=0;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});
document.addEventListener('touchmove',function(e){mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:true});
document.addEventListener('click',function(e){if(e.clientY>H*pondY)spawnRipple(e.clientX,e.clientY);});
document.addEventListener('touchstart',function(e){
  var t=e.touches[0];if(t.clientY>H*pondY)spawnRipple(t.clientX,t.clientY);
});

var rocks=[];
function initRocks(){
  rocks=[
    {x:W*0.18,y:H*0.72,w:40,h:28,shade:0.3},
    {x:W*0.75,y:H*0.68,w:55,h:35,shade:0.25},
    {x:W*0.45,y:H*0.80,w:30,h:20,shade:0.35},
    {x:W*0.85,y:H*0.78,w:25,h:18,shade:0.28},
    {x:W*0.32,y:H*0.75,w:15,h:10,shade:0.32},
    {x:W*0.62,y:H*0.82,w:18,h:12,shade:0.3}
  ];
}
initRocks();
window.addEventListener('resize',function(){resize();initRocks();});

var petals=[];
var PETAL_COLORS=['#ffb7c5','#ff9eb5','#ffc8d6','#ffa0b8','#ffd4de','#f7a8b8'];
var MAX_PETALS=120;
function spawnPetal(){
  var size=3+Math.random()*5;
  petals.push({
    x:Math.random()*W*1.3-W*0.15,y:-size-Math.random()*80,
    size:size,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-.5)*2,
    vx:8+Math.random()*15,vy:15+Math.random()*25,
    wobblePhase:Math.random()*Math.PI*2,wobbleAmp:20+Math.random()*30,
    wobbleFreq:0.8+Math.random()*1.2,
    color:PETAL_COLORS[Math.floor(Math.random()*PETAL_COLORS.length)],
    alpha:0.5+Math.random()*0.5,landed:false,landTimer:0,
    type:Math.floor(Math.random()*3)
  });
}

var ripples=[];
function spawnRipple(x,y){
  ripples.push({x:x,y:y,r:2,maxR:30+Math.random()*40,alpha:0.35,speed:25+Math.random()*15});
}

function drawSky(now){
  var grd=X.createLinearGradient(0,0,0,H*pondY);
  grd.addColorStop(0,'#2a2035');grd.addColorStop(1,'#483848');
  X.fillStyle=grd;X.fillRect(0,0,W,H*pondY);
  var moonX=W*0.78,moonY=H*0.15;
  var mg=X.createRadialGradient(moonX,moonY,0,moonX,moonY,105);
  mg.addColorStop(0,'rgba(255,250,230,0.12)');mg.addColorStop(0.3,'rgba(255,245,220,0.04)');mg.addColorStop(1,'transparent');
  X.fillStyle=mg;X.beginPath();X.arc(moonX,moonY,105,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,250,235,0.15)';X.beginPath();X.arc(moonX,moonY,35,0,Math.PI*2);X.fill();
}

function drawTree(tx,ty,s){
  X.fillStyle='#3d2b1f';
  X.beginPath();X.moveTo(tx-3*s,ty);X.quadraticCurveTo(tx-6*s,ty-30*s,tx-2*s,ty-50*s);
  X.lineTo(tx+2*s,ty-50*s);X.quadraticCurveTo(tx+4*s,ty-30*s,tx+3*s,ty);X.fill();
  X.beginPath();X.moveTo(tx-2*s,ty-35*s);X.quadraticCurveTo(tx-25*s,ty-50*s,tx-35*s,ty-45*s);
  X.lineTo(tx-33*s,ty-47*s);X.quadraticCurveTo(tx-22*s,ty-48*s,tx-1*s,ty-37*s);X.fill();
  X.beginPath();X.moveTo(tx+1*s,ty-40*s);X.quadraticCurveTo(tx+20*s,ty-55*s,tx+30*s,ty-48*s);
  X.lineTo(tx+28*s,ty-50*s);X.quadraticCurveTo(tx+18*s,ty-53*s,tx+2*s,ty-42*s);X.fill();
  var clusters=[{x:tx-30*s,y:ty-46*s,r:18*s},{x:tx-15*s,y:ty-52*s,r:14*s},{x:tx+5*s,y:ty-54*s,r:16*s},
    {x:tx+25*s,y:ty-49*s,r:15*s},{x:tx-8*s,y:ty-44*s,r:12*s},{x:tx+15*s,y:ty-52*s,r:13*s}];
  for(var i=0;i<clusters.length;i++){var c=clusters[i];
    var grd=X.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
    grd.addColorStop(0,'rgba(255,183,197,0.5)');grd.addColorStop(0.5,'rgba(255,160,180,0.3)');grd.addColorStop(1,'rgba(255,140,165,0)');
    X.fillStyle=grd;X.beginPath();X.arc(c.x,c.y,c.r,0,Math.PI*2);X.fill();
  }
}

function drawGround(){
  var bankTop=H*pondY-H*0.04;
  var grd=X.createLinearGradient(0,bankTop,0,H*0.85);
  grd.addColorStop(0,'#283020');grd.addColorStop(0.3,'#2a3520');grd.addColorStop(1,'#3a4530');
  X.fillStyle=grd;X.beginPath();X.moveTo(0,bankTop);
  for(var x=0;x<=W;x+=W/20){X.lineTo(x,bankTop+Math.sin(x/W*Math.PI)*H*0.02);}
  X.lineTo(W,H);X.lineTo(0,H);X.fill();
}

function drawPond(now){
  var py=H*pondY,ph=H*0.23;
  X.save();X.beginPath();
  X.moveTo(W*0.05,py);X.quadraticCurveTo(W*0.5,py-15,W*0.95,py);
  X.lineTo(W*0.95,py+ph);X.quadraticCurveTo(W*0.5,py+ph+10,W*0.05,py+ph);X.closePath();X.clip();
  var grd=X.createLinearGradient(0,py,0,py+ph);
  grd.addColorStop(0,'#1a2535');grd.addColorStop(0.5,'#152030');grd.addColorStop(1,'#101a28');
  X.fillStyle=grd;X.fillRect(0,py-20,W,ph+40);
  var rg=X.createLinearGradient(0,py,0,py+ph*0.4);
  rg.addColorStop(0,'rgba(72,56,72,0.15)');rg.addColorStop(1,'transparent');
  X.fillStyle=rg;X.fillRect(0,py-20,W,ph*0.4);
  X.fillStyle='rgba(255,250,235,0.04)';X.beginPath();
  X.ellipse(W*0.78,py+30,25,8+Math.sin(now/2000)*2,0,0,Math.PI*2);X.fill();
  X.strokeStyle='rgba(255,255,255,0.03)';X.lineWidth=1;
  for(var i=0;i<6;i++){var wy=py+15+i*(ph/7);X.beginPath();
    for(var x=0;x<W;x+=3){var y=wy+Math.sin(now/3000+x*0.008+i)*3+Math.sin(now/1500+x*0.015)*1.5;x===0?X.moveTo(x,y):X.lineTo(x,y);}X.stroke();}
  for(var r=0;r<ripples.length;r++){var rp=ripples[r];
    X.strokeStyle='rgba(255,255,255,'+rp.alpha+')';X.lineWidth=1.5;
    X.beginPath();X.arc(rp.x,rp.y,rp.r,0,Math.PI*2);X.stroke();
    if(rp.r>10){X.strokeStyle='rgba(255,255,255,'+rp.alpha*0.5+')';X.beginPath();X.arc(rp.x,rp.y,rp.r*0.6,0,Math.PI*2);X.stroke();}
  }
  drawLilyPad(W*0.25,py+ph*0.35,18,now);
  drawLilyPad(W*0.6,py+ph*0.25,14,now+1000);
  drawLilyPad(W*0.42,py+ph*0.55,12,now+2000);
  X.restore();
  X.strokeStyle='rgba(60,80,60,0.3)';X.lineWidth=2;X.beginPath();
  X.moveTo(W*0.05,py);X.quadraticCurveTo(W*0.5,py-15,W*0.95,py);X.stroke();
}

function drawLilyPad(lx,ly,r,now){
  var bob=Math.sin(now/2500)*2;
  X.fillStyle='rgba(30,80,30,0.5)';X.beginPath();X.arc(lx,ly+bob,r,0.2,Math.PI*2-0.2);X.lineTo(lx,ly+bob);X.fill();
  X.strokeStyle='rgba(50,120,50,0.3)';X.lineWidth=1;X.stroke();
  if(r>15){X.fillStyle='rgba(255,200,220,0.6)';
    for(var a=0;a<Math.PI*2;a+=Math.PI/3){X.beginPath();X.ellipse(lx+Math.cos(a)*5,ly+bob+Math.sin(a)*3,4,2,a,0,Math.PI*2);X.fill();}
    X.fillStyle='rgba(255,220,100,0.7)';X.beginPath();X.arc(lx,ly+bob,2.5,0,Math.PI*2);X.fill();
  }
}

function drawSandRakes(){
  var sandTop=H*0.85;
  var grd=X.createLinearGradient(0,sandTop,0,H);
  grd.addColorStop(0,'#b8a47a');grd.addColorStop(1,'#a8946a');
  X.fillStyle=grd;X.fillRect(0,sandTop,W,H-sandTop);
  X.strokeStyle='rgba(160,140,100,0.4)';X.lineWidth=1.5;
  for(var i=0;i<12;i++){var y=sandTop+8+i*((H-sandTop-16)/12);
    X.beginPath();X.moveTo(0,y);
    for(var x=0;x<W;x+=4){var offset=0;
      for(var ri=0;ri<rocks.length;ri++){var r=rocks[ri];if(r.y>sandTop-10){
        var dx=x-r.x,dy=y-(r.y+r.h*0.3),dist=Math.sqrt(dx*dx+dy*dy),inf=r.w*1.8;
        if(dist<inf)offset+=(1-dist/inf)*12*(dy>0?1:-1);}}
      X.lineTo(x,y+offset);}X.stroke();}
}

function drawRocks(){
  for(var i=0;i<rocks.length;i++){var r=rocks[i];
    var grd=X.createRadialGradient(r.x-r.w*0.15,r.y-r.h*0.2,0,r.x,r.y,r.w*0.7);
    grd.addColorStop(0,'rgba(120,110,95,'+r.shade*1.4+')');grd.addColorStop(0.6,'rgba(80,75,65,'+r.shade+')');
    grd.addColorStop(1,'rgba(50,48,42,'+r.shade*0.6+')');
    X.fillStyle=grd;X.beginPath();X.ellipse(r.x,r.y,r.w/2,r.h/2,0,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(180,170,150,0.08)';X.beginPath();X.ellipse(r.x-r.w*0.15,r.y-r.h*0.15,r.w*0.25,r.h*0.2,-.3,0,Math.PI*2);X.fill();
  }
}

function drawPetal(p){
  X.save();X.translate(p.x,p.y);X.rotate(p.rot);X.globalAlpha=p.alpha;X.fillStyle=p.color;
  if(p.type===0){X.beginPath();X.ellipse(0,0,p.size,p.size*0.7,0,0,Math.PI*2);X.fill();}
  else if(p.type===1){X.beginPath();X.moveTo(0,-p.size);X.quadraticCurveTo(p.size*0.8,0,0,p.size*0.6);X.quadraticCurveTo(-p.size*0.8,0,0,-p.size);X.fill();}
  else{X.beginPath();for(var i=0;i<5;i++){var a=(i/5)*Math.PI*2-Math.PI/2;X.lineTo(Math.cos(a)*p.size,Math.sin(a)*p.size);
    var a2=a+Math.PI/5;X.lineTo(Math.cos(a2)*p.size*0.4,Math.sin(a2)*p.size*0.4);}X.closePath();X.fill();
    X.fillStyle='rgba(255,220,150,'+p.alpha*0.8+')';X.beginPath();X.arc(0,0,p.size*0.2,0,Math.PI*2);X.fill();}
  X.restore();X.globalAlpha=1;
}

function update(dt,now){
  while(petals.length<MAX_PETALS)spawnPetal();
  for(var i=petals.length-1;i>=0;i--){var p=petals[i];
    if(p.landed){p.landTimer+=dt;p.alpha=Math.max(0,p.alpha-dt*0.08);
      if(p.alpha<=0){petals.splice(i,1);continue;}p.x+=2*dt;p.y+=Math.sin(now/2000+p.x)*0.3*dt;continue;}
    p.wobblePhase+=p.wobbleFreq*dt;
    p.x+=p.vx*dt+Math.sin(p.wobblePhase)*p.wobbleAmp*dt;p.y+=p.vy*dt;p.rot+=p.rotSpeed*dt;
    var dx=p.x-mx,dy=p.y-my,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<120&&dist>1){p.vx+=(dx/dist)*15*dt;p.vy+=(dy/dist)*8*dt;}
    var pondTop=H*pondY;
    if(p.y>pondTop&&p.x>W*0.08&&p.x<W*0.92&&!p.landed){
      p.landed=true;p.vy=0;p.vx=2;p.rotSpeed*=0.1;spawnRipple(p.x,p.y);}
    if(p.y>H*0.85&&!p.landed){p.landed=true;p.vy=0;p.vx=0;p.rotSpeed=0;}
    if(p.x>W+50||p.y>H+50)petals.splice(i,1);
  }
  for(var i=ripples.length-1;i>=0;i--){var r=ripples[i];r.r+=r.speed*dt;r.alpha-=dt*0.3;
    if(r.alpha<=0||r.r>=r.maxR)ripples.splice(i,1);}
  if(Math.random()<0.008){spawnRipple(W*0.1+Math.random()*W*0.8,H*pondY+Math.random()*H*0.2);}
}

var lastTime=performance.now();
function loop(now){
  var dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;
  update(dt,now);
  X.fillStyle='#1a1812';X.fillRect(0,0,W,H);
  drawSky(now);
  drawTree(W*0.12,H*pondY-H*0.02,Math.min(W,H)*0.003);
  drawTree(W*0.88,H*pondY+H*0.01,Math.min(W,H)*0.0025);
  drawGround();drawPond(now);drawSandRakes();drawRocks();
  for(var i=0;i<petals.length;i++){if(petals[i].landed)drawPetal(petals[i]);}
  for(var i=0;i<petals.length;i++){if(!petals[i].landed)drawPetal(petals[i]);}
  var vig=X.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);
  vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(10,8,6,0.4)');
  X.fillStyle=vig;X.fillRect(0,0,W,H);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
