<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexi-Void — Tiles Decay, Words Don't Wait</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔤">
<meta property="og:title" content="Lexi-Void">
<meta property="og:description" content="High-stakes word game where your tiles crumble if you don't use them fast enough.">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0910;--card:#141119;--border:#2a2535;
  --gold:#d4a855;--red:#cc4455;--green:#55cc77;
  --cyan:#55bbcc;--text:#d0c8dd;--muted:#6a6278;
  --tile:#1e1a28;--tileHi:#2a2440;
}
body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;
  overflow-x:hidden;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(212,168,85,.04),transparent 50%);
}
.wrap{max-width:480px;width:100%;padding:12px}
#hud{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;margin-bottom:8px;font-size:12px;color:var(--muted);
}
#hud .score{color:var(--gold);font-size:16px;font-family:'Instrument Serif',serif}
#hud .round{color:var(--cyan)}
#board{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px;margin-bottom:10px;min-height:120px;
}
#board-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
#word-display{
  display:flex;flex-wrap:wrap;gap:6px;min-height:52px;
  align-items:center;justify-content:center;padding:6px 0;
}
.placed-tile{
  width:44px;height:44px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--tileHi);border:1px solid var(--gold);border-radius:6px;
  font-family:'Instrument Serif',serif;font-size:22px;color:var(--gold);
  position:relative;cursor:pointer;transition:all .15s;
}
.placed-tile:hover{border-color:var(--red);color:var(--red)}
.placed-tile .pts{font-size:8px;color:var(--muted);position:absolute;bottom:2px;right:4px;font-family:'DM Mono',monospace}
#rack-area{margin-bottom:10px}
#rack-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
#rack{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;
  padding:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;
}
.tile{
  width:48px;height:56px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--tile);border:2px solid var(--border);border-radius:8px;
  font-family:'Instrument Serif',serif;font-size:24px;color:var(--text);
  cursor:pointer;transition:all .15s;position:relative;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
.tile:hover{border-color:var(--cyan);transform:translateY(-2px)}
.tile:active{transform:translateY(1px)}
.tile .pts{font-size:9px;color:var(--muted);margin-top:-2px}
.tile .decay-bar{
  position:absolute;bottom:0;left:0;height:3px;
  background:var(--green);border-radius:0 0 6px 6px;
  transition:width .3s linear,background .3s;
}
.tile .decay-bar.warn{background:var(--gold)}
.tile .decay-bar.crit{background:var(--red)}
.tile.dead{opacity:.2;border-color:transparent;cursor:default;pointer-events:none}
.tile.dead::after{
  content:'💀';position:absolute;font-size:14px;
}
#controls{display:flex;gap:8px;margin-bottom:10px;justify-content:center}
.ctrl-btn{
  padding:10px 18px;background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:'DM Mono',monospace;font-size:12px;
  cursor:pointer;transition:all .15s;letter-spacing:1px;
}
.ctrl-btn:hover{background:rgba(255,255,255,.08)}
.ctrl-btn.submit{border-color:rgba(85,204,119,.3);color:var(--green)}
.ctrl-btn.submit:hover{background:rgba(85,204,119,.1)}
.ctrl-btn.clear{border-color:rgba(204,68,85,.2);color:var(--red)}
.ctrl-btn.shuffle{border-color:rgba(85,187,204,.2);color:var(--cyan)}
#feedback{
  text-align:center;font-size:14px;min-height:22px;
  margin-bottom:8px;transition:opacity .3s;
}
#feedback.good{color:var(--green)}
#feedback.bad{color:var(--red)}
#feedback.info{color:var(--muted)}
#history{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px;margin-bottom:10px;
}
#history-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
#history-list{display:flex;flex-wrap:wrap;gap:6px}
.hist-word{
  font-family:'Instrument Serif',serif;font-size:14px;
  padding:3px 8px;background:rgba(85,204,119,.06);
  border:1px solid rgba(85,204,119,.15);border-radius:4px;
  color:var(--green);
}
.hist-word .hw-pts{font-size:10px;color:var(--muted);margin-left:4px;font-family:'DM Mono',monospace}
#overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:30;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(11,9,16,.96);gap:10px;
}
#overlay h1{font-family:'Instrument Serif',serif;font-size:32px;color:var(--gold)}
#overlay p{font-size:13px;color:var(--muted);max-width:320px;text-align:center;line-height:1.6}
#play-btn{
  margin-top:6px;padding:12px 32px;background:rgba(212,168,85,.15);
  border:1px solid rgba(212,168,85,.3);border-radius:8px;
  color:var(--gold);font-family:'Instrument Serif',serif;font-size:20px;
  cursor:pointer;transition:transform .15s;
}
#play-btn:hover{transform:scale(1.05)}
#game-over{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:30;
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(11,9,16,.96);gap:10px;
}
#game-over h2{font-family:'Instrument Serif',serif;font-size:28px;color:var(--gold)}
#game-over p{font-size:14px;color:var(--muted);text-align:center}
#game-over button{
  margin-top:6px;padding:10px 28px;background:rgba(212,168,85,.12);
  border:1px solid rgba(212,168,85,.3);border-radius:8px;
  color:var(--gold);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;
}
.bl{text-align:center;padding:6px 0 16px;font-size:10px;opacity:.25}
.bl a{color:var(--muted);text-decoration:none}
.hidden{display:none!important}
</style>

<div class="wrap">
  <div id="hud">
    <span class="round" id="roundLabel">Round 1 / 10</span>

<script>
// ── Letter distribution & values ──
const LETTERS={
  A:{v:1,f:9},B:{v:3,f:2},C:{v:3,f:2},D:{v:2,f:4},E:{v:1,f:12},
  F:{v:4,f:2},G:{v:2,f:3},H:{v:4,f:2},I:{v:1,f:9},J:{v:8,f:1},
  K:{v:5,f:1},L:{v:1,f:4},M:{v:3,f:2},N:{v:1,f:6},O:{v:1,f:8},
  P:{v:3,f:2},Q:{v:10,f:1},R:{v:1,f:6},S:{v:1,f:4},T:{v:1,f:6},
  U:{v:1,f:4},V:{v:4,f:2},W:{v:4,f:2},X:{v:8,f:1},Y:{v:4,f:2},Z:{v:10,f:1},

// Build weighted bag
const BAG=[];
Object.entries(LETTERS).forEach(([l,{f}])=>{for(let i=0;i<f;i++)BAG.push(l)});

function drawTile(){return BAG[Math.floor(Math.random()*BAG.length)]}

// ── Common word list (compact) ──
// We'll use a validation approach: 3+ letter words checked against a set
const VALID=new Set();
const WORD_SRC=[

  'each','ear','earn','ease','east','easy','eat','edge','edit','eel','egg','ego','eight','else','emit','end','epic','era','even','ever','evil','exam','exit','eye',

  'gain','gale','game','gang','gap','gas','gate','gave','gaze','gear','gem','gene','get','gift','gig','girl','give','glad','glow','glue','gnaw','goal','goat','god','goes','gold','golf','gone','good','got','grab','gram','gray','grew','grid','grim','grin','grip','grow','gulf','gum','gun','guru','gust','gut',
  'had','hair','half','hall','halt','ham','hand','hang','hard','harm','has','hat','hate','haul','have','hay','haze','head','heal','heap','hear','heat','heel','held','help','hem','hen','her','herb','herd','here','hero','hew','hid','hide','high','hike','hill','him','hint','hip','hire','his','hit','hive','hog','hold','hole','home','hood','hook','hope','horn','host','hot','hour','how','howl','hub','hue','hug','huge','hull','hum','hung','hunt','hurl','hurt','hut',
  'ice','icy','idea','idle','idol','ill','inch','ink','inn','into','ion','ire','iris','iron','isle','item','its','ivy',
  'jab','jack','jade','jail','jam','jar','jaw','jazz','jet','job','jog','join','joke','joy','jug','jump','june','jury','just','jut',
  'keen','keep','kept','key','kick','kid','kill','kind','king','kiss','kit','kite','knee','knew','knit','knob','knot','know',
  'lab','lace','lack','lad','laid','lake','lamb','lame','lamp','land','lane','lap','lard','lark','lash','lass','last','late','lava','law','lawn','lay','lazy','lead','leaf','leak','lean','leap','left','lend','lens','less','lest','let','levy','liar','lick','lid','lie','life','lift','like','limb','lime','limp','line','link','lint','lion','lip','list','lit','live','load','loaf','loan','lock','loft','log','lone','long','look','loop','loot','lord','lore','lose','loss','lost','lot','loud','love','low','luck','lump','lung','lure','lurk','lush','lust',
  'mad','made','maid','mail','main','make','male','mall','malt','mane','map','mare','mark','mars','mash','mask','mass','mast','mate','math','may','maze','meal','mean','meat','meet','meld','melt','memo','mend','menu','mere','mesh','mess','met','mice','mild','mile','milk','mill','mime','mind','mine','mint','miss','mist','mix','moan','moat','mob','mock','mode','moist','mold','mole','mom','monk','mood','moon','moor','mop','more','moss','most','moth','move','much','mud','mug','mule','mum','murk','muse','mush','must','mute','myth',
  'nag','nail','name','nap','near','neat','neck','need','nest','net','new','news','next','nice','nine','nit','nod','none','noon','norm','nose','note','noun','now','nude','null','numb','nurse','nut',
  'oak','oar','oath','obey','odd','odds','ode','off','oil','old','omen','omit','once','one','onto','ooze','open','opt','oral','orb','ore','ours','out','oven','over','owe','owl','own',
  'pace','pack','pact','pad','page','paid','pail','pain','pair','pale','palm','pan','pane','pang','pant','park','part','pass','past','pat','path','pave','paw','pay','peak','peal','pear','peat','peck','peel','peer','peg','pen','per','perk','pest','pet','pick','pier','pig','pike','pile','pill','pin','pine','pink','pipe','pit','plan','play','plea','plod','plot','plow','ploy','plug','plum','plus','pod','poem','poet','pole','poll','polo','pond','pool','poor','pop','pore','pork','port','pose','post','pot','pour','pray','prep','prey','prod','prop','prow','pull','pulp','pump','punk','pure','push','put',
  'quit','quiz',
  'race','rack','raft','rage','raid','rail','rain','rake','ramp','ran','rang','rank','rant','rap','rare','rash','rate','raw','ray','raze','read','real','reap','rear','reed','reef','reel','rely','rend','rent','rest','rich','rid','ride','rift','rig','rim','rind','ring','riot','rip','rise','risk','rite','road','roam','roar','robe','rock','rod','rode','role','roll','roof','room','root','rope','rose','rot','rote','rough','round','rout','row','rub','rude','rug','ruin','rule','rum','rump','run','rung','ruse','rush','rust','rut',
  'sack','sad','safe','sage','said','sail','sake','sale','salt','same','sand','sane','sang','sank','sap','sash','sat','save','saw','say','scab','scan','scar','sea','seal','seam','sear','seat','sect','seed','seek','seem','seen','self','sell','send','sent','sept','set','shed','shin','ship','shoe','shoo','shop','shore','short','shot','show','shut','sick','side','sift','sigh','sign','silk','sill','silt','sin','sing','sink','sip','sir','sit','site','six','size','ski','skid','skim','skin','skip','skit','slab','slag','slam','slap','slat','slaw','slay','sled','slew','slid','slim','sling','slip','slit','slob','slot','slow','slug','slum','smog','snap','snag','snip','snow','snub','snug','soak','soap','soar','sob','sock','sod','sofa','soft','soil','sold','sole','some','son','song','soon','soot','sore','sort','soul','soup','sour','sow','span','spar','spat','spec','sped','spin','spit','spot','spud','spur','stab','stag','star','stay','stem','step','stew','stir','stop','stub','stud','stun','sub','such','suck','sue','suit','sulk','sum','sun','sung','sunk','sure','surf','swan','swap','swim','swirl',
  'tab','tack','tact','tag','tail','take','tale','talk','tall','tame','tan','tang','tank','tap','tape','tar','tarn','task','tax','tea','teal','team','tear','tell','ten','tend','tent','term','test','text','than','that','thaw','them','then','they','thin','this','thorn','those','three','threw','tick','tide','tidy','tie','tier','tile','till','tilt','time','tin','tiny','tip','tire','toad','toe','toil','told','toll','tomb','tome','tone','tongue','took','tool','top','tore','torn','toss','tour','tow','town','toy','trap','tray','tree','trek','trim','trio','trip','trod','trot','true','try','tub','tuck','tug','tulip','tune','turf','turn','tusk','tutor','twig','twin','type',
  'ugly','undo','unit','unto','up','upon','urge','urn','use','used',
  'vain','vale','van','vane','vary','vase','vast','vault','veil','vein','vent','verb','very','vest','veto','vex','via','vibe','vice','view','vine','visa','void','volt','vote','vow',
  'wade','wage','wail','wait','wake','walk','wall','wand','want','war','ward','warm','warn','warp','wart','wary','wash','wasp','wave','wax','way','weak','weal','wean','wear','web','wed','weed','week','well','went','wept','were','west','wet','wham','what','wheat','wheel','when','where','which','while','whim','whip','who','wick','wide','wife','wild','will','wilt','wily','win','wind','wine','wing','wink','wipe','wire','wise','wish','wisp','with','woe','woke','wolf','won','wood','wool','word','wore','work','worm','worn','wort','wove','wrap','wren','wrist','writ','wrote',
  'yak','yam','yank','yard','yarn','yawn','year','yell','yet','yew','yield','yoke','you','your','yowl',
  'zap','zeal','zero','zest','zinc','zip','zone','zoo','zoom',
];
WORD_SRC.forEach(w=>VALID.add(w.toUpperCase()));

// ── State ──
const RACK_SIZE=9;
const DECAY_TIME=18; // seconds per tile
const ROUNDS=10;
let rack=[],word=[],score=0,round=1,wordsFound=[];
let playing=false,tickInterval=null;

// ── Audio ──
let ac=null;
function ia(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)()}
function tone(f,d,t,v){
  if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=t||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(v||.06,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
  o.start();o.stop(ac.currentTime+d);
}
function sndPlace(){tone(500+Math.random()*200,.06,'triangle',.05)}
function sndSubmit(){[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.12,'triangle',.05),i*60))}
function sndBad(){tone(200,.2,'square',.06)}
function sndDecay(){tone(100,.15,'sawtooth',.04)}

// ── Tile management ──
function makeTile(){
  return{letter:drawTile(),decay:DECAY_TIME,dead:false,id:Math.random().toString(36).slice(2)};
}

function fillRack(){
  while(rack.length<RACK_SIZE) rack.push(makeTile());
}

function renderRack(){
  const el=document.getElementById('rack');
  el.innerHTML='';
  rack.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='tile'+(t.dead?' dead':'');
    const pct=Math.max(0,t.decay/DECAY_TIME*100);
    const cls=pct<25?'crit':pct<50?'warn':'';
    d.innerHTML=`
      <span>${t.letter}</span>
      <span class="pts">${LETTERS[t.letter].v}</span>
      <div class="decay-bar ${cls}" style="width:${pct}%"></div>
    `;
    if(!t.dead) d.addEventListener('click',()=>placeTile(i));
    el.appendChild(d);
  });
}

function renderWord(){
  const el=document.getElementById('word-display');
  el.innerHTML='';
  if(word.length===0){
    el.innerHTML='<span style="color:var(--muted);font-size:14px">click tiles to build a word</span>';
    return;
  }
  word.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='placed-tile';
    d.innerHTML=`${t.letter}<span class="pts">${LETTERS[t.letter].v}</span>`;
    d.addEventListener('click',()=>unplaceTile(i));
    el.appendChild(d);
  });
}

function placeTile(rackIdx){
  if(!playing) return;
  const t=rack[rackIdx];
  if(t.dead) return;
  ia();sndPlace();
  word.push({...t,rackIdx});
  rack[rackIdx]={...t,dead:true,placeholder:true};
  renderRack();renderWord();
}

function unplaceTile(wordIdx){
  if(!playing) return;
  const t=word[wordIdx];
  // return to rack
  if(t.rackIdx!==undefined&&rack[t.rackIdx]&&rack[t.rackIdx].placeholder){
    rack[t.rackIdx]={letter:t.letter,decay:t.decay,dead:false,id:t.id};
  }
  word.splice(wordIdx,1);
  renderRack();renderWord();
}

function clearWord(){
  word.slice().reverse().forEach((_,i)=>unplaceTile(word.length-1));
  renderWord();
}

function shuffleRack(){
  // shuffle only alive tiles
  const alive=rack.filter(t=>!t.dead&&!t.placeholder);
  for(let i=alive.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [alive[i],alive[j]]=[alive[j],alive[i]];
  }
  let ai=0;
  rack=rack.map(t=>{
    if(!t.dead&&!t.placeholder) return alive[ai++];
    return t;
  });
  renderRack();
}

// ── Scoring ──
function calcWordScore(tiles){
  let base=0;
  tiles.forEach(t=>base+=LETTERS[t.letter].v);
  const lenBonus=tiles.length>=6?tiles.length*3:tiles.length>=5?tiles.length*2:tiles.length>=4?tiles.length:0;
  return base+lenBonus;
}

function submitWord(){
  if(!playing) return;
  ia();
  const fb=document.getElementById('feedback');
  const str=word.map(t=>t.letter).join('');

  if(str.length<3){
    fb.textContent='Need at least 3 letters';fb.className='bad';
    sndBad();return;
  }
  if(wordsFound.find(w=>w.word===str)){
    fb.textContent='Already found!';fb.className='bad';
    sndBad();return;
  }
  if(!VALID.has(str)){
    fb.textContent='"'+str+'" — not a word!';fb.className='bad';
    sndBad();
    // penalty: return tiles but lose 1s on each
    word.forEach(t=>{
      if(t.rackIdx!==undefined&&rack[t.rackIdx]){
        rack[t.rackIdx]={letter:t.letter,decay:Math.max(0,t.decay-2),dead:false,id:t.id};
      }
    });
    word=[];
    renderRack();renderWord();
    return;
  }

  // valid!
  const pts=calcWordScore(word);
  score+=pts;
  sndSubmit();

  wordsFound.push({word:str,pts});
  fb.textContent='✓ '+str+' — +'+pts+' pts'+(str.length>=5?' 🔥':'');
  fb.className='good';
  document.getElementById('scoreLabel').textContent=score;

  // remove used tiles permanently, refill
  word.forEach(t=>{
    const idx=rack.findIndex(r=>r.id===t.id);
    if(idx>=0) rack.splice(idx,1);
  });
  word=[];
  fillRack();
  renderRack();renderWord();renderHistory();
}

function renderHistory(){
  const el=document.getElementById('history-list');
  el.innerHTML='';
  wordsFound.forEach(w=>{
    const d=document.createElement('span');
    d.className='hist-word';
    d.innerHTML=w.word+'<span class="hw-pts">+'+w.pts+'</span>';
    el.appendChild(d);
  });
}

// ── Decay tick ──
function tick(){
  if(!playing) return;
  let decayed=false;
  rack.forEach(t=>{
    if(t.dead||t.placeholder) return;
    t.decay-=0.5;
    if(t.decay<=0){
      t.dead=true;
      t.decay=0;
      decayed=true;
    }
  });

  // also decay tiles in current word
  word.forEach(t=>{
    t.decay-=0.5;
  });

  if(decayed){sndDecay();fillRack()}
  renderRack();

  // check round end: all tiles dead and no alive ones
  const alive=rack.filter(t=>!t.dead&&!t.placeholder).length;
  const inWord=word.length;
  if(alive===0&&inWord===0){
    nextRound();
  }
}

function nextRound(){
  // return word tiles
  word=[];
  round++;
  if(round>ROUNDS){
    endGame();return;
  }
  document.getElementById('roundLabel').textContent='Round '+round+' / '+ROUNDS;
  document.getElementById('feedback').textContent='Round '+round+' — new tiles!';
  document.getElementById('feedback').className='info';
  rack=[];
  fillRack();
  renderRack();renderWord();
}

function endGame(){
  playing=false;
  clearInterval(tickInterval);
  document.getElementById('game-over').style.display='flex';
  document.getElementById('go-msg').textContent=
    'Score: '+score+' | Words: '+wordsFound.length+
    (wordsFound.length>0?' | Best: '+wordsFound.sort((a,b)=>b.pts-a.pts)[0].word:'');
}

// ── Start ──
function startGame(){
  score=0;round=1;wordsFound=[];word=[];rack=[];
  document.getElementById('scoreLabel').textContent='0';
  document.getElementById('roundLabel').textContent='Round 1 / '+ROUNDS;
  document.getElementById('feedback').textContent='Form words before tiles crumble';
  document.getElementById('feedback').className='info';
  document.getElementById('game-over').style.display='none';
  document.getElementById('history-list').innerHTML='';
  fillRack();
  renderRack();renderWord();
  playing=true;
  clearInterval(tickInterval);
  tickInterval=setInterval(tick,500);
}

document.getElementById('play-btn').addEventListener('click',()=>{
  ia();document.getElementById('overlay').classList.add('hidden');startGame();
});
document.getElementById('submitBtn').addEventListener('click',submitWord);
document.getElementById('clearBtn').addEventListener('click',clearWord);
document.getElementById('shuffleBtn').addEventListener('click',shuffleRack);
document.getElementById('retry-btn').addEventListener('click',startGame);

// keyboard
document.addEventListener('keydown',e=>{
  if(!playing) return;
  if(e.key==='Enter') submitWord();
  if(e.key==='Backspace'){e.preventDefault();if(word.length>0)unplaceTile(word.length-1)}
  if(e.key===' '){e.preventDefault();shuffleRack()}
  const k=e.key.toUpperCase();
  if(k.length===1&&k>='A'&&k<='Z'){
    const idx=rack.findIndex(t=>!t.dead&&!t.placeholder&&t.letter===k);
    if(idx>=0) placeTile(idx);
  }
});
</script>
