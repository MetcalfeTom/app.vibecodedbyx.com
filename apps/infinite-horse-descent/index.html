<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Horse Descent — scroll down forever with a degrading horse</title>
<meta name="description" content="An infinite downward scroll. A floor counter. A pixel horse that gets grainier the deeper you go. A button that teleports you to floor 666. That's it. That's the descent.">
<meta property="og:title" content="Infinite Horse Descent">
<meta property="og:description" content="Scroll down forever. The horse degrades with you. Floor 666 is waiting.">
<meta property="og:url" content="https://sloppy.live/infinite-horse-descent">
<meta property="og:image" content="https://image.pollinations.ai/prompt/pixel%20art%20horse%20dissolving%20into%20static%20noise%2C%20descending%20dark%20staircase%2C%20eerie%20glitch%20art%2C%20deep%20red%20glow%20below?width=1200&height=630&nologo=true&seed=666&model=flux">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/🐴">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
:root{ --ink:#e8e0d0; --dim:#8a8478; --red:#c22436; }
*{ box-sizing:border-box; margin:0; padding:0; }
html{ font-size:100%; scroll-behavior:auto; }
body{
  background:#7ec4e8;   /* updated by JS as you sink */
  color:var(--ink); font-family:'VT323', monospace;
  transition:background 0.6s linear;
}
/* HUD */
#hud{
  position:fixed; top:.7rem; left:50%; transform:translateX(-50%); z-index:10; text-align:center;
}
#floor-no{
  font-family:'Pixelify Sans', monospace; font-weight:700; font-size:clamp(1.4rem, 6vw, 2.2rem);
  background:rgba(0,0,0,.55); padding:.15rem 1.1rem; border-radius:.4rem; letter-spacing:.06em;
  text-shadow:0 0 .6rem rgba(232,224,208,.3);
}
#tp{
  position:fixed; bottom:1rem; left:50%; transform:translateX(-50%); z-index:10;
  min-height:2.75rem; padding:.5rem 1.4rem; cursor:pointer; border-radius:.4rem;
  font-family:'Pixelify Sans', monospace; font-weight:700; font-size:.95rem; letter-spacing:.06em;
  background:var(--red); color:#ffe8d6; border:2px solid #6e0f18;
  box-shadow:0 .25rem 0 #6e0f18, 0 0 1.2rem rgba(194,36,54,.5);
}
#tp:active{ transform:translate(-50%,.15rem); box-shadow:0 .1rem 0 #6e0f18; }
#tp:focus-visible{ outline:3px solid #ffe8d6; outline-offset:3px; }
/* the horse */
#horse-box{ position:fixed; right:1rem; bottom:4.6rem; z-index:9; text-align:center; }
#horse{ width:144px; height:120px; image-rendering:pixelated; display:block;
  filter:drop-shadow(0 .3rem .5rem rgba(0,0,0,.5)); }
#horse-cap{ font-size:.85rem; color:var(--dim); background:rgba(0,0,0,.4); border-radius:.3rem; padding:0 .4rem; }
/* floors */
.floor{
  height:46vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-bottom:1px dashed rgba(232,224,208,.12); padding:0 1.2rem; text-align:center;
}
.floor .n{ font-family:'Pixelify Sans', monospace; font-size:.85rem; color:var(--dim); letter-spacing:.2em; }
.floor .t{ font-size:clamp(1.15rem, 4vw, 1.6rem); max-width:34rem; line-height:1.4; }
.floor.special .t{ color:#ffb3a0; }
.floor.the666{ background:radial-gradient(24rem 14rem at 50% 50%, rgba(194,36,54,.3), transparent 70%); }
.floor.the666 .t{ color:var(--red); font-size:clamp(1.5rem, 6vw, 2.4rem); text-shadow:0 0 1rem rgba(194,36,54,.8); }
#flash{ position:fixed; inset:0; background:var(--red); opacity:0; pointer-events:none; z-index:20; }
#flash.go{ animation:tpFlash .6s ease-out; }
@keyframes tpFlash{ 0%{ opacity:.9; } 100%{ opacity:0; } }
footer{ position:fixed; bottom:.35rem; left:.6rem; z-index:10; font-size:.7rem; color:rgba(232,224,208,.4); }
@media (prefers-reduced-motion: reduce){ #flash.go{ animation:none; } body{ transition:none; } }
</style>
</head>
<body>
<div id="hud"><div id="floor-no" role="status" aria-live="off">FLOOR 0</div></div>
<button type="button" id="tp">⛧ TELEPORT TO FLOOR 666</button>
<div id="horse-box"><canvas id="horse" width="24" height="20" role="img" aria-label="a pixel horse, degrading with depth"></canvas><div id="horse-cap">the horse</div></div>
<div id="flash" aria-hidden="true"></div>
<div id="floors"></div>
<footer><span id="build-info">build <b>v1.0</b> · commit <code id="build-hash">ceedb929a</code></span></footer>

<script>
/* ═══ pure descent logic (node-testable) ═══ */
function frng(seed){
  var s=(seed*2654435761)>>>0;
  return function(){ s^=s<<13; s^=s>>>17; s^=s<<5; s>>>=0; return s/4294967296; };
}
var PHRASES={
  shallow:['the elevator never came, so you took the stairs','someone left a saddle here. still warm','a window shows sky that is definitely below you','the wallpaper repeats. the wallpaper repeats','you hear hooves one floor down. always one floor down','a vending machine sells only sugar cubes','the fire-exit map is just a spiral'],
  mid:['the hoofprints on the ceiling are fresh','a sign: NO GRAZING BEYOND THIS POINT','the stairs are softer here. do not think about it','someone has been counting on the wall. they stopped at your floor number','the air smells of hay and static','a pay phone rings. it is a whinny','the numbers on the doors are in horse years now'],
  deep:['the horse remembers being whole','light behaves like it is being ridden','you pass yourself going up. neither of you mentions it','the walls are the same color as the sound of galloping','a mane of cables hangs from the ceiling','it has been raining down-stairs for forty floors','the emergency lighting gallops'],
  abyss:['the grain is not damage. the grain is memory','four legs good. floor legs better','somewhere above, the surface forgets you','the horse is mostly noise now. it does not mind','静 — even the static holds its breath','hoofbeats in morse: KEEP GOING','you are deeper than any stable has ever been']
};
var SPECIALS={
  0:'ground floor. the descent begins. the horse follows.',
  13:'floor 13 exists here. someone had to take it in.',
  100:'floor 100. a small ceremony. no one came. the horse ate the cake.',
  333:'halfway to the place the button goes.',
  500:'floor 500. the elevator shaft ends. it kept going anyway.',
  665:'one more. breathe. the horse is already there.',
  666:'⛧ FLOOR 666 ⛧ — the horse is 66.6% static and completely at peace. it was never about arriving.',
  667:'oh. it keeps going. of course it keeps going.',
  1000:'floor 1000. the grain won. long live the grain.'
};
function floorPhrase(n){
  if(SPECIALS[n]!==undefined) return SPECIALS[n];
  var r=frng(n+1);
  var pool=n<100?PHRASES.shallow:n<300?PHRASES.mid:n<600?PHRASES.deep:PHRASES.abyss;
  return pool[Math.floor(r()*pool.length)];
}
function grainFor(n){ return Math.min(0.88, n*0.00135); }   /* 0 at surface → ~0.9 in the abyss; 666 ≈ 0.9 */
function bgFor(n){
  /* sky → dusk → dark → abyss; red tint approaching 666 */
  var stops=[[0,[126,196,232]],[60,[90,120,160]],[180,[45,50,80]],[400,[18,16,32]],[650,[26,8,12]],[900,[5,3,6]]];
  var a=stops[0], b=stops[stops.length-1];
  for(var i=0;i<stops.length-1;i++){ if(n>=stops[i][0]&&n<=stops[i+1][0]){ a=stops[i]; b=stops[i+1]; break; } }
  if(n>stops[stops.length-1][0]){ a=b=stops[stops.length-1]; }
  var t=a===b?0:(n-a[0])/(b[0]-a[0]);
  var c=[0,1,2].map(function(k){ return Math.round(a[1][k]+(b[1][k]-a[1][k])*t); });
  return 'rgb('+c[0]+','+c[1]+','+c[2]+')';
}
/* ═══ end pure ═══ */

/* pixel horse: 24×20 sprite map (b=body brown, d=dark, m=mane, .=empty) */
var HORSE=[
'........................',
'..............mm........',
'.............mdd........',
'.............ddd.d......',
'......mmmm..dddddd......',
'.....mbbbbbbbbddd.......',
'....mbbbbbbbbbbd........',
'...mbbbbbbbbbbbb........',
'...bbbbbbbbbbbbb........',
'...bbbbbbbbbbbbb........',
'...bb...bbb...bb........',
'...bb...bbb...bb........',
'...bb...bb....bb........',
'...dd...dd....dd........',
'...dd...dd....dd........',
'........................',
'........................',
'........................',
'........................',
'........................'];
var COLORS={ b:[138,90,44], d:[74,46,20], m:[40,24,10] };
var cv=document.getElementById('horse'), ctx=cv.getContext('2d');
function drawHorse(floor){
  var g=grainFor(floor);
  var r=frng(floor+7);
  var img=ctx.createImageData(24,20);
  for(var y=0;y<20;y++) for(var x=0;x<24;x++){
    var ch=HORSE[y][x], i=(y*24+x)*4;
    if(ch==='.'){ img.data[i+3]=0; continue; }
    var c=COLORS[ch];
    if(r()<g){
      /* the grain: pixel forgets itself */
      if(floor>=600&&r()<0.3){ c=[160+r()*60|0, 20, 30]; }         /* near 666: some pixels bleed red */
      else{ var v=(r()*220)|0; c=[v,v,v]; }
      if(r()<g*0.25){ img.data[i+3]=0; continue; }                 /* deep grain: pixels go missing */
    }
    img.data[i]=c[0]; img.data[i+1]=c[1]; img.data[i+2]=c[2]; img.data[i+3]=255;
  }
  ctx.putImageData(img,0,0);
}

/* infinite floors */
var FLOOR_H=Math.round(innerHeight*0.46);
var floorsEl=document.getElementById('floors');
var made=0;
function ensureFloors(upTo){
  var frag=document.createDocumentFragment();
  while(made<=upTo){
    var d=document.createElement('section');
    d.className='floor'+(SPECIALS[made]!==undefined?' special':'')+(made===666?' the666':'');
    d.innerHTML='<p class="n">FLOOR '+made+'</p><p class="t">'+floorPhrase(made)+'</p>';
    frag.appendChild(d);
    made++;
  }
  floorsEl.appendChild(frag);
}
ensureFloors(12);

var curFloor=-1, ticking=false;
function onScroll(){
  if(ticking) return;
  ticking=true;
  requestAnimationFrame(function(){
    ticking=false;
    var f=Math.max(0, Math.floor(scrollY/FLOOR_H));
    if(f+8>made) ensureFloors(f+12);
    if(f!==curFloor){
      curFloor=f;
      document.getElementById('floor-no').textContent='FLOOR '+f;
      document.body.style.background=bgFor(f);
      drawHorse(f);
      document.getElementById('horse-cap').textContent=
        f===0?'the horse': f<100?'the horse (fine)': f<300?'the horse (fuzzy)': f<600?'the horse (dissolving)': f===666?'the horse (at peace)':'mostly grain';
    }
  });
}
addEventListener('scroll', onScroll, {passive:true});
addEventListener('resize', function(){ FLOOR_H=Math.round(innerHeight*0.46); onScroll(); });

/* teleport */
var actx=null;
document.getElementById('tp').onclick=function(){
  ensureFloors(680);
  document.getElementById('flash').classList.remove('go');
  void document.getElementById('flash').offsetWidth;
  document.getElementById('flash').classList.add('go');
  scrollTo(0, 666*FLOOR_H+2);
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    var t=actx.currentTime;
    var o=actx.createOscillator(), g=actx.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(66.6,t); o.frequency.exponentialRampToValueAtTime(33,t+1.4);
    g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+1.5);
    o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+1.6);
  }catch(e){}
  onScroll();
};

drawHorse(0);
onScroll();
</script>
</body>
</html>
