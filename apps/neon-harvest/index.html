<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>neon harvest · chill growth cycles</title>
<meta name="description" content="A cozy neon garden. Plant seeds, water plots, watch crops grow in real time. Coins persist in your browser. No login.">
<meta property="og:title" content="neon harvest · chill growth cycles">
<meta property="og:description" content="Plant seeds, water plots, watch your crops grow on a neon grid. Real-time growth, persistent garden.">
<meta property="og:url" content="https://sloppy.live/neon-harvest">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20pink%20and%20cyan%20glowing%20garden%20grid%20with%20cute%20pixel%20plants%20growing%20on%20a%20dark%20purple%20soil%20background%2C%20no%20text%20no%20logo?width=1200&height=630&nologo=true">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%B1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #0a0420;
    --soil:      #1a0d3a;
    --soil-2:    #251448;
    --text:      #ece6ff;
    --dim:       #b3a8d6;
    --mute:      #6e6595;
    --pink:      #ff4dc8;
    --magenta:   #ff5fbf;
    --cyan:      #7af0ff;
    --gold:      #ffd45e;
    --lime:      #9aff5e;
    --rose:      #ff7e9e;
    --violet:    #b46bff;
  }
  *,*::before,*::after{box-sizing:border-box}
  html{font-size:100%}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:'Bricolage Grotesque',sans-serif}
  body{
    background-image:
      radial-gradient(ellipse at 20% 12%, rgba(255,77,200,0.18), transparent 55%),
      radial-gradient(ellipse at 82% 88%, rgba(122,240,255,0.16), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(180,107,255,0.14), transparent 55%);
    background-attachment:fixed;
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      linear-gradient(rgba(255,77,200,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(122,240,255,0.04) 1px, transparent 1px);
    background-size:40px 40px;
    mask-image:radial-gradient(ellipse at 50% 40%, black 30%, transparent 80%);
    -webkit-mask-image:radial-gradient(ellipse at 50% 40%, black 30%, transparent 80%);
  }
  .skip{position:absolute;left:-100vw;top:0;background:#000;color:var(--text);padding:.5rem .9rem;border:1px solid var(--pink);z-index:99}
  .skip:focus{left:1rem;top:1rem}

  main{position:relative;z-index:1;max-width:46rem;margin:0 auto;padding:1.4rem 1.1rem 2rem}

  /* MASTHEAD */
  header.brand{ text-align:center;margin-bottom:1.1rem }
  header.brand .gutter{
    display:flex;justify-content:space-between;
    font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.34em;
    color:var(--dim);text-transform:uppercase;margin-bottom:.4rem;
  }
  header.brand h1{
    margin:0;font-family:'Fraunces',serif;font-weight:500;font-style:italic;
    font-size:clamp(2.2rem, 8.4vw, 4rem);letter-spacing:-0.02em;line-height:.95;
    color:#fff;
    text-shadow:0 0 .55rem rgba(255,77,200,0.5),
                0 0 1.4rem rgba(154,255,94,0.18),
                .14rem .14rem 0 rgba(122,240,255,0.4);
  }
  header.brand h1 .accent{color:var(--lime);font-style:normal;font-weight:600}
  header.brand .tagline{
    font-family:'Bricolage Grotesque',sans-serif;font-size:.92rem;color:var(--rose);
    margin-top:.4rem;font-style:italic;
  }

  /* HUD */
  .hud{
    display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.85rem;
  }
  .pill{
    background:rgba(15,8,40,0.78);backdrop-filter:blur(8px);
    border:1px solid rgba(255,77,200,0.22);border-radius:.32rem;
    padding:.5rem .75rem;color:var(--dim);
    font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.18em;
    text-transform:uppercase;line-height:1;display:inline-flex;align-items:center;gap:.4rem;
  }
  .pill b{color:var(--gold);font-weight:700;letter-spacing:.04em;text-shadow:0 0 .35rem rgba(255,212,94,0.45)}
  .pill.coins b{ color:var(--gold) }
  .pill.crops b{ color:var(--lime); text-shadow:0 0 .35rem rgba(154,255,94,0.45) }

  /* SEED PICKER */
  .seeds{
    display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;
    margin:0 0 .85rem;
  }
  .seed-btn{
    background:rgba(15,8,40,0.78);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.14);border-radius:.4rem;
    padding:.45rem .65rem;cursor:pointer;color:var(--text);
    font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.12em;
    text-transform:uppercase;font-weight:500;
    display:inline-flex;align-items:center;gap:.4rem;min-height:2.4rem;
    transition:transform .12s, box-shadow .14s, border-color .14s, background .14s;
  }
  .seed-btn .glyph{ font-size:1.3rem;line-height:1 }
  .seed-btn .name{ color:var(--text) }
  .seed-btn .meta{ color:var(--mute);font-size:.58rem }
  .seed-btn:hover{ transform:translateY(-1px);border-color:var(--pink);box-shadow:0 0 .55rem rgba(255,77,200,0.32) }
  .seed-btn[aria-pressed="true"]{
    border-color:var(--lime);background:rgba(154,255,94,0.10);
    box-shadow:0 0 .65rem rgba(154,255,94,0.35);
  }
  .seed-btn[aria-pressed="true"] .meta{ color:var(--lime) }
  .seed-btn:disabled{ opacity:.45;cursor:not-allowed;transform:none }
  .seed-btn:focus-visible{ outline:.18rem solid var(--cyan);outline-offset:2px }
  .seed-btn.tool{ border-style:dashed }

  /* GARDEN GRID */
  .garden{
    display:grid;grid-template-columns:repeat(5, 1fr);gap:.55rem;
    background:linear-gradient(180deg, rgba(26,13,58,0.82) 0%, rgba(37,20,72,0.7) 100%);
    border:1px solid rgba(255,77,200,0.22);border-radius:.65rem;
    padding:.7rem;
    box-shadow:inset 0 0 1.4rem rgba(0,0,0,0.5), 0 0 1rem rgba(255,77,200,0.12);
    margin-bottom:.85rem;
  }
  .plot{
    aspect-ratio:1;position:relative;
    background:radial-gradient(circle at 50% 40%, rgba(122,240,255,0.05), rgba(15,8,40,0.6) 70%);
    border:1px solid rgba(255,255,255,0.10);border-radius:.45rem;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:1.9rem;line-height:1;
    transition:transform .14s, box-shadow .14s, border-color .14s, background .2s;
    overflow:hidden;
  }
  .plot:hover{ transform:translateY(-2px);border-color:var(--pink);box-shadow:0 0 .55rem rgba(255,77,200,0.25) }
  .plot:focus-visible{ outline:.18rem solid var(--cyan);outline-offset:2px }
  .plot .glyph{
    position:relative;z-index:2;
    filter:drop-shadow(0 0 .35rem var(--glow, rgba(255,77,200,0.5)));
    transition:transform .3s, font-size .3s, filter .3s;
  }
  /* growth animation: subtle bob when ready */
  .plot.ready .glyph{ animation:bob 1.6s ease-in-out infinite }
  @keyframes bob{ 50%{ transform:translateY(-.16rem) scale(1.04) } }
  .plot.ready{
    background:radial-gradient(circle at 50% 40%, rgba(154,255,94,0.20), rgba(15,8,40,0.6) 70%);
    border-color:var(--lime);
    box-shadow:inset 0 0 .8rem rgba(154,255,94,0.30), 0 0 .8rem rgba(154,255,94,0.32);
  }
  .plot.watered{
    border-color:var(--cyan);
    box-shadow:inset 0 0 .6rem rgba(122,240,255,0.25), 0 0 .55rem rgba(122,240,255,0.25);
  }
  /* growth progress ring rendered via conic-gradient on a pseudo-element */
  .plot::before{
    content:'';position:absolute;inset:.16rem;border-radius:.36rem;pointer-events:none;
    background:conic-gradient(from -90deg, var(--ring, transparent) calc(var(--prog, 0) * 1%), transparent 0);
    mask:radial-gradient(circle, transparent 70%, black 70%);
    -webkit-mask:radial-gradient(circle, transparent 70%, black 70%);
    opacity:.85;
    z-index:1;
  }
  .plot.empty .glyph{ font-size:1.2rem;opacity:.32;color:var(--dim) }
  /* float-up coin animation when harvesting */
  .floater{
    position:absolute;pointer-events:none;font-family:'JetBrains Mono',monospace;
    font-size:.84rem;font-weight:700;color:var(--gold);
    text-shadow:0 0 .4rem rgba(255,212,94,0.6);
    animation:floatUp 1.05s ease-out forwards;z-index:3;
  }
  @keyframes floatUp{
    0%   { opacity:0;transform:translateY(.4rem) scale(.85) }
    25%  { opacity:1 }
    100% { opacity:0;transform:translateY(-2.6rem) scale(1.1) }
  }
  @media (prefers-reduced-motion: reduce){
    .plot.ready .glyph{ animation:none }
    .floater{ animation:none;opacity:1 }
  }

  /* LOG */
  .log{
    background:rgba(15,8,40,0.78);backdrop-filter:blur(8px);
    border:1px solid rgba(255,77,200,0.18);border-radius:.4rem;
    padding:.5rem .7rem;
    font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--dim);
    letter-spacing:.06em;line-height:1.55;min-height:3rem;
    display:flex;flex-direction:column;gap:.18rem;
    max-height:7rem;overflow-y:auto;
  }
  .log .line{ }
  .log .line.ok   { color:var(--lime) }
  .log .line.gold { color:var(--gold) }
  .log .line.cyan { color:var(--cyan) }
  .log .line.dim  { color:var(--mute) }

  .footer{
    text-align:center;font-family:'JetBrains Mono',monospace;font-size:.6rem;
    color:var(--mute);letter-spacing:.18em;text-transform:uppercase;margin-top:.85rem;
  }
  .footer button{
    background:transparent;border:1px solid rgba(255,255,255,0.14);color:var(--mute);
    border-radius:.22rem;padding:.32rem .55rem;cursor:pointer;
    font-family:inherit;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;
    margin-left:.4rem;
  }
  .footer button:hover{ color:var(--rose);border-color:var(--rose) }
</style>
</head>
<body>
<a class="skip" href="#main">skip to garden</a>

<main id="main">
  <header class="brand" role="banner">
    <div class="gutter"><span>chill growth · cycle 1</span><span id="dateStamp">today</span></div>
    <h1>neon <span class="accent">harvest</span></h1>
    <div class="tagline">plant. wait. tend. reap.</div>
  </header>

  <div class="hud" aria-label="Stats">
    <span class="pill coins"  aria-live="polite">coins · <b id="coinAmt">50</b></span>
    <span class="pill crops"  aria-live="polite">harvested · <b id="cropAmt">0</b></span>
    <span class="pill"        aria-live="polite">growing · <b id="growAmt" style="color:var(--cyan)">0</b></span>
  </div>

  <div class="seeds" id="seeds" role="group" aria-label="Seeds and tools"></div>

  <div class="garden" id="garden" role="grid" aria-label="Garden plots"></div>

  <div class="log" id="log" aria-live="polite" aria-label="Activity log"></div>

  <p class="footer">
    real-time growth · garden persists in your browser
    <button type="button" id="resetBtn" title="Wipe the garden and reset coins to 50">↺ reset garden</button>
  </p>
</main>

<script>
(() => {
'use strict';

// =====================================================================
// neon-harvest — cozy real-time garden. Plant a seed, walk away, come
// back when the plot's ring fills. Growth is wall-clock based (stored
// `plantedAt` timestamps) so closing the tab and reopening continues
// growth where it left off — no idle-game grinding required.
// =====================================================================

const SEEDS = [
  // id        glyph  name        seedCost  growMs    payout  glow
  { id:'sprout',  glyph:'🌱', name:'sprout',    cost:2,  ms: 30 * 1000, pay: 4,  glow:'rgba(154,255,94,0.55)' },
  { id:'sun',     glyph:'🌻', name:'sunflower', cost:6,  ms: 90 * 1000, pay: 14, glow:'rgba(255,212,94,0.55)' },
  { id:'shroom',  glyph:'🍄', name:'mushroom',  cost:8,  ms:120 * 1000, pay: 22, glow:'rgba(255,77,200,0.55)' },
  { id:'rose',    glyph:'🌹', name:'rose',      cost:14, ms:180 * 1000, pay: 38, glow:'rgba(255,126,158,0.55)' },
  { id:'berry',   glyph:'🍓', name:'berry',     cost:20, ms:240 * 1000, pay: 60, glow:'rgba(255,77,128,0.6)' },
];
const SEED_BY_ID = {}; for (const s of SEEDS) SEED_BY_ID[s.id] = s;
// Stage glyphs for a generic seedling → sapling progression. We mix
// these with each crop's final glyph so plots visually tell a story
// (·sprout → ⌃sapling → CROP) regardless of what's planted.
const STAGE_GLYPHS = ['·', '⋅', '↟', '↟'];

const SK = 'neon-harvest-v1';
const PLOT_COUNT = 20;

const state = {
  coins: 50,
  cropsHarvested: 0,
  plots: Array(PLOT_COUNT).fill(null),       // null OR { seedId, plantedAt, watered, wateredUntil }
  selectedSeed: 'sprout',                    // selected seed id, OR 'water' for watering can
};
load();

function save(){
  try {
    localStorage.setItem(SK, JSON.stringify({
      coins: state.coins,
      cropsHarvested: state.cropsHarvested,
      plots: state.plots,
      selectedSeed: state.selectedSeed,
    }));
  } catch(e){}
}
function load(){
  try {
    const raw = localStorage.getItem(SK);
    if (!raw) return;
    const j = JSON.parse(raw);
    if (typeof j.coins === 'number') state.coins = j.coins;
    if (typeof j.cropsHarvested === 'number') state.cropsHarvested = j.cropsHarvested;
    if (Array.isArray(j.plots)) {
      // pad / truncate to current PLOT_COUNT in case we ever change it
      for (let i = 0; i < PLOT_COUNT; i++) state.plots[i] = j.plots[i] || null;
    }
    if (typeof j.selectedSeed === 'string') state.selectedSeed = j.selectedSeed;
  } catch(e){}
}

// today stamp
(function dateStamp(){
  const d = new Date();
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('dateStamp').textContent =
    months[d.getMonth()] + ' ' + d.getDate() + ' · ' +
    String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
})();

// ── AUDIO (gentle) ──────────────────────────────────────────────────
let audioCtx = null, masterGain = null;
function ensureAudio(){
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.14;
    masterGain.connect(audioCtx.destination);
  } catch(e){}
}
function blip(freq, dur, type, vol){
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol || 0.15, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + dur + 0.05);
}
function sndPlant(){ blip(440, 0.18, 'triangle', 0.12); blip(660, 0.14, 'sine', 0.08); }
function sndWater(){ blip(900, 0.06, 'triangle', 0.08); setTimeout(() => blip(720, 0.06, 'triangle', 0.07), 60); }
function sndHarvest(){
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [523.25, 659.25, 987.77].forEach((f, i) => {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.05);
    g.gain.linearRampToValueAtTime(0.16, t + i * 0.05 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.05 + 0.4);
    o.connect(g); g.connect(masterGain);
    o.start(t + i * 0.05); o.stop(t + i * 0.05 + 0.45);
  });
}
function sndError(){ blip(220, 0.15, 'sawtooth', 0.10); }

// ── LOG ─────────────────────────────────────────────────────────────
function logLine(text, cls){
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  el.appendChild(div);
  // keep the last 8 lines on screen
  while (el.children.length > 8) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

// ── GROWTH MATH ────────────────────────────────────────────────────
function plotProgress(plot, now){
  if (!plot) return 0;
  const seed = SEED_BY_ID[plot.seedId];
  if (!seed) return 0;
  // Watered plots grow 50% faster while the wateredUntil window is active.
  // We approximate by computing two phases instead of integrating; for the
  // chill scope this is plenty accurate.
  const planted = plot.plantedAt;
  const waterEnd = plot.wateredUntil || 0;
  const baseMs = seed.ms;
  if (waterEnd <= planted){
    return Math.min(1, (now - planted) / baseMs);
  }
  const wateredMs = Math.max(0, Math.min(now, waterEnd) - planted);
  const dryMs     = Math.max(0, now - Math.max(planted, waterEnd));
  // Effective ms accumulated = wateredMs * 1.5 + dryMs * 1.0
  const effective = wateredMs * 1.5 + dryMs;
  return Math.min(1, effective / baseMs);
}
function isReady(plot, now){ return plotProgress(plot, now) >= 1; }
function plotStageGlyph(plot, prog){
  const seed = SEED_BY_ID[plot.seedId];
  if (!seed) return '?';
  if (prog >= 1) return seed.glyph;
  // < 1: pick a stage glyph based on progress quartiles
  const idx = Math.min(STAGE_GLYPHS.length - 1, Math.floor(prog * STAGE_GLYPHS.length));
  return STAGE_GLYPHS[idx];
}

// ── ACTIONS ────────────────────────────────────────────────────────
function plant(idx){
  if (state.plots[idx]){ sndError(); logLine('plot ' + (idx + 1) + ' already has something growing', 'dim'); return; }
  const sel = state.selectedSeed;
  if (sel === 'water'){
    sndError();
    logLine('the watering can needs a planted plot · pick a seed first', 'dim');
    return;
  }
  const seed = SEED_BY_ID[sel];
  if (!seed){ sndError(); return; }
  if (state.coins < seed.cost){
    sndError();
    logLine('not enough coins for ' + seed.name + ' (need ' + seed.cost + ')', 'gold');
    return;
  }
  state.coins -= seed.cost;
  state.plots[idx] = { seedId: seed.id, plantedAt: Date.now(), wateredUntil: 0 };
  ensureAudio(); sndPlant();
  logLine('planted ' + seed.glyph + ' ' + seed.name + ' in plot ' + (idx + 1), 'cyan');
  save();
  rerenderPlot(idx);
  rerenderHud();
}

function water(idx){
  const plot = state.plots[idx];
  if (!plot){ sndError(); logLine('plot ' + (idx + 1) + ' is empty', 'dim'); return; }
  const now = Date.now();
  if (isReady(plot, now)){ sndError(); logLine('already ripe — harvest it', 'dim'); return; }
  // 30s of accelerated growth from now (re-watering refreshes the window)
  plot.wateredUntil = now + 30 * 1000;
  ensureAudio(); sndWater();
  logLine('watered plot ' + (idx + 1) + ' · +50% growth for 30s', 'cyan');
  save();
  rerenderPlot(idx);
}

function harvest(idx){
  const plot = state.plots[idx];
  const now = Date.now();
  if (!plot || !isReady(plot, now)){ sndError(); return; }
  const seed = SEED_BY_ID[plot.seedId];
  state.plots[idx] = null;
  state.coins += seed.pay;
  state.cropsHarvested += 1;
  ensureAudio(); sndHarvest();
  logLine('harvested ' + seed.glyph + ' ' + seed.name + ' · +' + seed.pay + ' coins', 'ok');
  save();
  // floating coin readout on the plot we just harvested
  const tile = document.querySelector('[data-plot="' + idx + '"]');
  if (tile){
    const f = document.createElement('div');
    f.className = 'floater';
    f.textContent = '+' + seed.pay;
    tile.appendChild(f);
    setTimeout(() => f.remove(), 1100);
  }
  rerenderPlot(idx);
  rerenderHud();
}

function tilePointer(idx){
  const plot = state.plots[idx];
  const now = Date.now();
  if (!plot){
    // empty plot: plant currently-selected seed (but only if a seed is selected, not the can)
    if (state.selectedSeed === 'water'){ sndError(); logLine('switch to a seed to plant', 'dim'); return; }
    plant(idx);
    return;
  }
  if (isReady(plot, now)){ harvest(idx); return; }
  // already growing: watering can waters it; selecting a seed is a no-op
  if (state.selectedSeed === 'water'){ water(idx); return; }
  logLine('plot ' + (idx + 1) + ' is still growing · ' + Math.round(plotProgress(plot, now) * 100) + '%', 'dim');
}

// ── RENDER ─────────────────────────────────────────────────────────
function buildSeedPicker(){
  const wrap = document.getElementById('seeds');
  wrap.innerHTML = '';
  for (const seed of SEEDS){
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'seed-btn';
    btn.dataset.seed = seed.id;
    btn.setAttribute('aria-pressed', state.selectedSeed === seed.id ? 'true' : 'false');
    btn.innerHTML = '<span class="glyph">' + seed.glyph + '</span>' +
      '<span class="name">' + seed.name + '</span>' +
      '<span class="meta">' + seed.cost + 'c · ' + Math.round(seed.ms / 1000) + 's</span>';
    btn.addEventListener('click', () => selectSeed(seed.id));
    wrap.appendChild(btn);
  }
  // watering can
  const can = document.createElement('button');
  can.type = 'button';
  can.className = 'seed-btn tool';
  can.dataset.seed = 'water';
  can.setAttribute('aria-pressed', state.selectedSeed === 'water' ? 'true' : 'false');
  can.innerHTML = '<span class="glyph">💧</span><span class="name">watering can</span><span class="meta">+50% / 30s</span>';
  can.addEventListener('click', () => selectSeed('water'));
  wrap.appendChild(can);
}
function selectSeed(id){
  state.selectedSeed = id;
  document.querySelectorAll('.seed-btn').forEach(b => {
    b.setAttribute('aria-pressed', b.dataset.seed === id ? 'true' : 'false');
  });
  save();
}

function buildGarden(){
  const wrap = document.getElementById('garden');
  wrap.innerHTML = '';
  for (let i = 0; i < PLOT_COUNT; i++){
    const tile = document.createElement('button');
    tile.type = 'button';
    tile.className = 'plot empty';
    tile.dataset.plot = String(i);
    tile.setAttribute('aria-label', 'Plot ' + (i + 1));
    tile.innerHTML = '<span class="glyph">·</span>';
    tile.addEventListener('click', () => tilePointer(i));
    wrap.appendChild(tile);
  }
}
function rerenderPlot(i){
  const tile = document.querySelector('[data-plot="' + i + '"]');
  if (!tile) return;
  const plot = state.plots[i];
  const now = Date.now();
  tile.classList.remove('empty', 'ready', 'watered');
  const glyphEl = tile.querySelector('.glyph');
  if (!plot){
    tile.classList.add('empty');
    glyphEl.textContent = '·';
    glyphEl.style.fontSize = '';
    tile.style.setProperty('--prog', 0);
    tile.style.setProperty('--ring', 'transparent');
    tile.style.setProperty('--glow', 'rgba(255,77,200,0.4)');
    return;
  }
  const seed = SEED_BY_ID[plot.seedId];
  const prog = plotProgress(plot, now);
  const ready = prog >= 1;
  glyphEl.textContent = plotStageGlyph(plot, prog);
  glyphEl.style.fontSize = ready ? '2rem' : (prog > 0.5 ? '1.5rem' : '');
  tile.style.setProperty('--prog', Math.round(prog * 100));
  tile.style.setProperty('--ring', ready ? 'rgba(154,255,94,0.85)' : 'rgba(122,240,255,0.65)');
  tile.style.setProperty('--glow', seed.glow);
  if (ready) tile.classList.add('ready');
  if (plot.wateredUntil && plot.wateredUntil > now && !ready) tile.classList.add('watered');
}
function rerenderAllPlots(){
  for (let i = 0; i < PLOT_COUNT; i++) rerenderPlot(i);
}
function rerenderHud(){
  document.getElementById('coinAmt').textContent = state.coins;
  document.getElementById('cropAmt').textContent = state.cropsHarvested;
  let growing = 0; const now = Date.now();
  for (const p of state.plots){ if (p && !isReady(p, now)) growing++; }
  document.getElementById('growAmt').textContent = growing;
  // disable seed buttons we can't afford so the user can see at a glance
  for (const seed of SEEDS){
    const b = document.querySelector('.seed-btn[data-seed="' + seed.id + '"]');
    if (b) b.disabled = state.coins < seed.cost;
  }
}

// Tick render: rebuild progress rings + flip ready states without
// touching any DOM that hasn't changed. Runs every 1000ms.
function tick(){
  rerenderAllPlots();
  rerenderHud();
}

// ── BOOT ───────────────────────────────────────────────────────────
buildSeedPicker();
buildGarden();
rerenderAllPlots();
rerenderHud();
logLine('★ neon harvest · plant a seed to begin ★', 'gold');
setInterval(tick, 1000);

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('wipe the garden and reset coins to 50?')) return;
  state.coins = 50;
  state.cropsHarvested = 0;
  state.plots = Array(PLOT_COUNT).fill(null);
  save();
  rerenderAllPlots();
  rerenderHud();
  logLine('garden reset · go again', 'cyan');
});

})();
</script>
</body>
</html>
