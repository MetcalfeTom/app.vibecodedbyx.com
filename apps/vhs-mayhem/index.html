<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B-Movie VHS Mayhem</title>
<link rel="icon" href="https://emojicdn.elk.sh/📼">
<meta property="og:title" content="B-Movie VHS Mayhem">
<meta property="og:description" content="Click the VHS tape to generate absurd B-movie titles. How many can you collect?">
<meta property="og:url" content="https://sloppy.live/vhs-mayhem/">
<meta property="og:image" content="https://sloppy.live/vhs-mayhem/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;height:100dvh;display:flex;flex-direction:column;align-items:center;font-family:'VT323',monospace}
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)}
#static{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0;transition:opacity .1s;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><rect width="4" height="4" fill="%23fff" opacity=".03"/></svg>')}
#header{padding:16px;text-align:center;z-index:5}
#header h1{font-family:'Creepster',cursive;font-size:clamp(24px,5vw,44px);color:#f40;text-shadow:0 0 20px rgba(255,60,0,.4),0 3px 0 #800;letter-spacing:3px}
#header .sub{font-size:clamp(10px,2vw,14px);color:rgba(255,200,50,.3);letter-spacing:4px;margin-top:2px}
#score-bar{display:flex;gap:20px;justify-content:center;margin-top:8px;font-size:14px;color:rgba(255,200,50,.4)}
#score-bar span{color:#ff0;text-shadow:0 0 6px rgba(255,255,0,.3)}
#stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5;min-height:0}
/* VHS Tape */
#tape{width:clamp(180px,40vw,280px);height:clamp(110px,24vw,170px);background:#111;border:3px solid #333;border-radius:6px;position:relative;cursor:pointer;transition:transform .08s;box-shadow:0 4px 20px rgba(0,0,0,.5),inset 0 0 30px rgba(0,0,0,.5)}
#tape:hover{transform:scale(1.03)}
#tape:active{transform:scale(.97)}
#tape .label{position:absolute;top:8%;left:10%;right:10%;bottom:35%;background:linear-gradient(135deg,#2a1a0a,#1a0a00);border:1px solid #4a3020;border-radius:3px;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px 8px;overflow:hidden}
#tape .label-text{font-family:'Creepster',cursive;font-size:clamp(11px,2.5vw,18px);color:#f80;text-shadow:0 0 8px rgba(255,120,0,.4);line-height:1.2;word-wrap:break-word}
#tape .reels{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);display:flex;gap:clamp(20px,6vw,40px)}
#tape .reel{width:clamp(28px,7vw,44px);height:clamp(28px,7vw,44px);border-radius:50%;border:2px solid #333;background:radial-gradient(circle,#1a1a1a 30%,#0a0a0a 70%);position:relative}
#tape .reel::after{content:'';position:absolute;inset:35%;border-radius:50%;border:1px solid #444;background:#0a0a0a}
#tape .window{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);width:50%;height:15%;background:#050505;border:1px solid #2a2a2a;border-radius:2px}
/* Rating badge */
#rating{position:absolute;top:-8px;right:-8px;font-family:'VT323',monospace;font-size:12px;background:#f00;color:#fff;padding:2px 6px;border-radius:3px;transform:rotate(8deg);box-shadow:0 2px 6px rgba(255,0,0,.3)}
/* Generated title display */
#title-display{min-height:60px;max-width:80%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
#title-text{font-family:'Creepster',cursive;font-size:clamp(18px,4vw,36px);color:#f40;text-shadow:0 0 20px rgba(255,60,0,.4),0 0 40px rgba(255,0,0,.2);transition:all .2s;min-height:1.2em}
#tagline{font-size:clamp(10px,2vw,14px);color:rgba(255,200,50,.3);font-style:italic;min-height:1em}
#year{font-size:11px;color:rgba(255,255,255,.15)}
/* Collection */
#collection{position:fixed;bottom:0;left:0;right:0;z-index:10;background:linear-gradient(to top,rgba(10,10,10,.95),transparent);padding:8px 12px 6px;max-height:30vh;overflow-y:auto}
#collection-title{font-size:10px;color:rgba(255,60,0,.3);letter-spacing:3px;text-align:center;margin-bottom:4px}
#shelf{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.mini-tape{font-size:9px;padding:3px 8px;background:rgba(30,15,5,.8);border:1px solid #3a2010;border-radius:3px;color:rgba(255,120,0,.5);cursor:default;transition:all .15s;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-tape:hover{border-color:#f80;color:#f80;text-shadow:0 0 6px rgba(255,120,0,.3)}
a#backlink{position:fixed;bottom:4px;right:8px;color:rgba(255,255,255,.03);font-size:7px;text-decoration:none;z-index:20}
a#backlink:hover{color:rgba(255,255,255,.15)}
</style>
</head>
<body>
<div id="scanlines"></div>
<div id="static"></div>
<div id="header">
 <h1>B-MOVIE VHS MAYHEM</h1>
 <div class="sub">CLICK THE TAPE</div>
 <div id="score-bar">COLLECTION: <span id="count">0</span> &middot; BEST RATING: <span id="best-rating">—</span></div>
</div>
<div id="stage">
 <div id="title-display">
  <div id="title-text">???</div>
  <div id="tagline"></div>
  <div id="year"></div>
 </div>
 <div id="tape" onclick="generateMovie()">
  <div class="label"><div class="label-text" id="tape-label">PRESS PLAY</div></div>
  <div class="reels"><div class="reel"></div><div class="reel"></div></div>
  <div class="window"></div>
  <div id="rating">NR</div>
 </div>
</div>
<div id="collection">
 <div id="collection-title">YOUR SHELF</div>
 <div id="shelf"></div>
</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
// Title fragments
const ADJ1=['Radioactive','Atomic','Mutant','Killer','Giant','Cyber','Toxic','Undead','Forbidden','Cursed','Demonic','Rampaging','Blood-Soaked','Hypnotic','Zombie','Vampire','Invisible','Flaming','Screaming','Exploding','Psycho','Mega','Turbo','Laser','Thunder','Swamp','Alien','Cannibal','Revenge of the','Attack of the','Night of the','Return of the','Son of the','Bride of the','Escape from the','Invasion of the'];
const NOUN1=['Shark','Dinosaur','Spider','Werewolf','Blob','Brain','Cheerleader','Trucker','Robot','Clown','Mummy','Sasquatch','Piranha','Slug','Cockroach','Lizard','Squid','Bat','Rat','Gator','Mosquito','Mantis','Scorpion','Snake','Ape','Plant','Fungus','Worm','Centipede','Jellyfish'];
const VERB=['vs.','Meets','Destroys','Eats','Fights','Marries','Devours','Conquers','Haunts','Stalks','Crushes','Absorbs','Infects','Terrorizes','Kidnaps'];
const NOUN2=['Mars','Tokyo','the Pentagon','Prom Night','Summer Camp','the Mall','the Sewer','Dimension X','Your Brain','the Future','the Moon','Las Vegas','Hollywood','Texas','a Submarine','the Highway','the Beach','the Graveyard','an RV Park','the Diner','the Hospital','Space Station 7'];
const TAGLINES=[
 'They came from below.',
 'No one can hear you scream... in a van.',
 'This summer, the terror is REAL bad.',
 'Two heads. Zero budget.',
 'Based on absolutely nothing true.',
 'The VHS the government tried to hide.',
 'Rated R for Ridiculous.',
 'You will NOT believe what happens next.',
 'They said it couldn\'t be filmed. They were right.',
 'Straight to video. Straight to your nightmares.',
 'One tape. One chance. Zero stars.',
 'The sequel nobody asked for.',
 'Now in terrifying mono sound.',
 'Shot in 3 days. Edited in none.',
 'Warning: May cause uncontrollable laughter.',
 'From the director of nothing you\'ve seen.',
 'The creature feature that ate the budget.',
 'So bad it\'s... still bad.',
 'Contains scenes of extreme cheapness.',
 'They were warned. They didn\'t listen. They never do.',
];
const RATINGS=['R','PG-13','X','NR','TV-MA','UNRATED','BANNED'];
const YEARS_MIN=1957,YEARS_MAX=1996;

let collection=JSON.parse(localStorage.getItem('vhs_collection')||'[]');
let bestRating='—';
let totalGenerated=0;

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function generateTitle(){
 const patterns=[
  ()=>pick(ADJ1)+' '+pick(NOUN1)+' '+pick(VERB)+' '+pick(NOUN2),
  ()=>pick(ADJ1)+' '+pick(NOUN1),
  ()=>pick(NOUN1)+' '+pick(VERB)+' '+pick(ADJ1)+' '+pick(NOUN1),
  ()=>'The '+pick(ADJ1)+' '+pick(NOUN1)+' of '+pick(NOUN2),
  ()=>pick(ADJ1)+' '+pick(NOUN1)+' II: The '+pick(NOUN1)+'ing',
  ()=>pick(NOUN1)+'nado: '+pick(ADJ1)+' Edition',
  ()=>pick(ADJ1)+' '+pick(NOUN1)+' From '+pick(NOUN2),
  ()=>'I Was a Teenage '+pick(ADJ1)+' '+pick(NOUN1),
 ];
 return pick(patterns)();
}

function generateMovie(){
 // VHS static flash
 const staticEl=document.getElementById('static');
 staticEl.style.opacity='.3';
 setTimeout(()=>staticEl.style.opacity='0',100);

 const title=generateTitle();
 const tagline=pick(TAGLINES);
 const rating=pick(RATINGS);
 const year=YEARS_MIN+Math.floor(Math.random()*(YEARS_MAX-YEARS_MIN));

 document.getElementById('title-text').textContent=title;
 document.getElementById('tape-label').textContent=title;
 document.getElementById('tagline').textContent='"'+tagline+'"';
 document.getElementById('year').textContent='© '+year+' Sloppy Pictures Inc.';
 document.getElementById('rating').textContent=rating;

 // Add to collection
 collection.push({title,year,rating});
 if(collection.length>100)collection.shift();
 localStorage.setItem('vhs_collection',JSON.stringify(collection));
 totalGenerated++;

 // Update shelf
 updateShelf();
 document.getElementById('count').textContent=collection.length;

 // Best rating tracking (most ridiculous)
 if(rating==='BANNED'||rating==='X')bestRating=rating;
 else if(bestRating==='—')bestRating=rating;
 document.getElementById('best-rating').textContent=bestRating;

 // Animate tape
 const tape=document.getElementById('tape');
 tape.style.transform='scale(.95) rotate('+(Math.random()*4-2)+'deg)';
 setTimeout(()=>tape.style.transform='',100);

 // Play SFX
 playSfx();
}

function updateShelf(){
 const shelf=document.getElementById('shelf');
 shelf.innerHTML='';
 collection.slice(-30).reverse().forEach(m=>{
  const el=document.createElement('div');
  el.className='mini-tape';
  el.textContent=m.title;
  el.title=m.title+' ('+m.year+') ['+m.rating+']';
  shelf.appendChild(el);
 });
}

// Audio
let actx;
function playSfx(){
 if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
 const t=actx.currentTime;
 // VCR click + whir
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='square';o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(40,t+.05);
 g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);
 o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.06);
 // Tape noise
 const sz=actx.sampleRate*.08,buf=actx.createBuffer(1,sz,actx.sampleRate);
 const d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*.15*(1-i/sz);
 const s=actx.createBufferSource(),hp=actx.createBiquadFilter(),g2=actx.createGain();
 hp.type='highpass';hp.frequency.value=2000;
 g2.gain.setValueAtTime(.08,t+.03);g2.gain.exponentialRampToValueAtTime(.001,t+.1);
 s.buffer=buf;s.connect(hp);hp.connect(g2);g2.connect(actx.destination);s.start(t+.03);
}

// Init
updateShelf();
document.getElementById('count').textContent=collection.length;
</script>
</body>
</html>
