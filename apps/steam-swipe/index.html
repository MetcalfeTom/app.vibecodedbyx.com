<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SteamSwipe</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Swipe through games like a dating app. Right to favorite, left to pass, up to shortlist. Your favorites persist across visits.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%AE">
<meta property="og:title" content="SteamSwipe">
<meta property="og:description" content="Swipe through games like a dating app. Right to favorite, left to pass, up to shortlist.">
<meta property="og:url" content="https://sloppy.live/steam-swipe">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/tinder-style%20game%20discovery%20cards%20on%20deep%20steam%20blue%20background%2C%20arcade%20cartridge%20covers%2C%20editorial%20wide%20cinematic?width=1200&height=630&nologo=true">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1a26;
  --bg-2:#1b2838;
  --panel:#22384c;
  --panel-2:#1a2a3a;
  --accent:#66c0f4;
  --accent-deep:#1a9fff;
  --green:#5ba32b;
  --red:#c62828;
  --gold:#f5c453;
  --foam:#dff5fb;
  --ink:#0a121a;
  --rule:#2c4661;
  --pos:#5ba32b;
  --neg:#c62828;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100vh;background:var(--bg);color:var(--foam);
  font-family:'IBM Plex Sans',ui-sans-serif,system-ui,sans-serif;
  font-size:1rem;line-height:1.5;overflow:hidden;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(102,192,244,0.07), transparent 50%),
    radial-gradient(circle at 80% 90%, rgba(26,159,255,0.07), transparent 55%);
}
a.skip-link{position:absolute;left:0.5rem;top:-3rem;z-index:200;
  background:var(--accent);color:var(--ink);padding:0.5rem 0.75rem;
  text-decoration:none;border-radius:0.25rem;
  font-family:'Bowlby One SC',cursive;font-size:0.875rem}
a.skip-link:focus{top:0.5rem;outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

main{position:fixed;inset:0;display:grid;grid-template-rows:auto 1fr}

header.deck{
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;padding:0.625rem 1rem;flex-wrap:wrap;
  background:linear-gradient(180deg, rgba(10,18,26,0.85), transparent);
  z-index:6;border-bottom:0.0625rem solid rgba(102,192,244,0.10);
}
.brand{display:flex;flex-direction:column;gap:0.125rem}
h1{
  font-family:'Bowlby One SC',cursive;
  font-size:clamp(1.25rem, 3vw, 1.75rem);
  letter-spacing:0.02em;line-height:1;color:var(--foam);text-transform:uppercase;
}
h1 .accent{color:var(--accent)}
.tag{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1rem;color:rgba(223,245,251,0.65);
}
.hud{display:flex;gap:0.4375rem;flex-wrap:wrap;font-size:0.6875rem;align-items:center}
.hud .pill{
  background:var(--panel-2);
  border:0.0625rem solid rgba(102,192,244,0.30);
  border-radius:0.25rem;padding:0.4375rem 0.625rem;letter-spacing:0.16em;
  text-transform:uppercase;display:flex;gap:0.4375rem;align-items:center;
  min-height:2.25rem;color:var(--foam);
}
.hud b{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:0.875rem;font-weight:700}
.hud .pill[role="button"]{cursor:pointer;background:var(--accent);color:var(--ink);border-color:var(--accent)}
.hud .pill[role="button"]:hover{background:var(--accent-deep);border-color:var(--accent-deep);color:var(--foam)}
.hud .pill[role="button"]:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

.stage{
  position:relative;display:grid;
  grid-template-columns:1fr;
  align-items:center;justify-items:center;overflow:hidden;
}

/* Card stack — chat ask: 20% larger.
   width  22rem  → 26.4rem
   height 34rem  → 40.8rem
   The min(*, 92vw) caps prevent overflow on phones; on narrow screens
   the card naturally shrinks to fit. */
.deck-wrap{
  position:relative;
  width:min(26.4rem, 92vw);
  height:min(40.8rem, calc(100vh - 12rem));
  margin-top:1rem;
}

.card{
  position:absolute;inset:0;
  background:var(--panel);
  border:0.125rem solid var(--rule);
  /* Top corners stay rounded; bottom is taken over by the 8-bit
     jagged mask below, so we zero the bottom corners and skip the
     bottom border so the mask edge isn't double-stamped. */
  border-radius:0.75rem 0.75rem 0 0;
  border-bottom:0;
  box-shadow:0 0.5rem 2rem rgba(0,0,0,0.55);
  overflow:hidden;
  display:flex;flex-direction:column;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
  will-change:transform;
  /* === 8-bit jagged broken bottom edge (chat ask) ============
     Two-layer mask:
       1. solid rectangle from top down to (height - 18px)  → the body
       2. tiled SVG of varied-height pixel teeth on the last 18px → the
          jagged edge
     The SVG mask is 32×18 logical units (one "tooth set") and tiles
     repeat-x, so any card width gets a continuous chunky edge that
     stays crisp. The shadow inherits the same shape, giving the
     pixel-shadow halo a torn-cardstock vibe.
     ============================================================= */
  -webkit-mask:
    linear-gradient(#000, #000) top    / 100% calc(100% - 18px) no-repeat,
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 18' preserveAspectRatio='none'><rect width='32' height='18' fill='black'/><rect x='0' y='0' width='4' height='15' fill='white'/><rect x='4' y='0' width='4' height='7' fill='white'/><rect x='8' y='0' width='4' height='12' fill='white'/><rect x='12' y='0' width='4' height='3' fill='white'/><rect x='16' y='0' width='4' height='10' fill='white'/><rect x='20' y='0' width='4' height='16' fill='white'/><rect x='24' y='0' width='4' height='2' fill='white'/><rect x='28' y='0' width='4' height='8' fill='white'/></svg>") bottom / 32px 18px repeat-x;
  mask:
    linear-gradient(#000, #000) top    / 100% calc(100% - 18px) no-repeat,
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 18' preserveAspectRatio='none'><rect width='32' height='18' fill='black'/><rect x='0' y='0' width='4' height='15' fill='white'/><rect x='4' y='0' width='4' height='7' fill='white'/><rect x='8' y='0' width='4' height='12' fill='white'/><rect x='12' y='0' width='4' height='3' fill='white'/><rect x='16' y='0' width='4' height='10' fill='white'/><rect x='20' y='0' width='4' height='16' fill='white'/><rect x='24' y='0' width='4' height='2' fill='white'/><rect x='28' y='0' width='4' height='8' fill='white'/></svg>") bottom / 32px 18px repeat-x;
}
.card .cover{
  position:relative;
  /* Was 1 1 60% — bumped to 65% so the cover takes a bit more of the
     larger card and the pixel sprite has more vertical room. */
  flex:1 1 65%;
  display:flex;align-items:flex-end;justify-content:flex-start;
  padding:1.5rem 1.5rem 1.25rem;
  overflow:hidden;
  background:#0a121a;
}
.card .cover canvas.pixel{
  position:absolute;left:50%;top:40%;
  transform:translate(-50%, -50%);
  /* Chat ask: more room to breathe. Sprite scales modestly with the
     bigger card (9rem → 10rem) but sits inside a much larger cover,
     so there's substantially more empty halo around it. Also lifted
     a touch (top 46% → 40%) so the title below gets clear air. */
  width:10rem;height:10rem;
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
  -ms-interpolation-mode:nearest-neighbor;
  pointer-events:none;z-index:2;
  filter:drop-shadow(0 0.25rem 0 rgba(0,0,0,0.6));
}
.card .cover .title{
  font-family:'Bowlby One SC',cursive;
  font-size:clamp(1.5rem, 4.5vw, 2.25rem);
  letter-spacing:0.02em;line-height:0.95;color:var(--foam);
  text-shadow:0 0.125rem 0.375rem rgba(0,0,0,0.7);
  position:relative;z-index:2;text-transform:uppercase;
  max-width:100%;word-break:break-word;
}
.card .cover svg.art{
  position:absolute;inset:0;width:100%;height:100%;z-index:1;
}
.card .cover .badge{
  position:absolute;top:0.875rem;right:0.875rem;z-index:3;
  background:rgba(10,18,26,0.85);
  border:0.0625rem solid rgba(102,192,244,0.4);
  color:var(--accent);
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
  letter-spacing:0.18em;text-transform:uppercase;
  padding:0.25rem 0.4375rem;border-radius:0.125rem;
  backdrop-filter:blur(2px);
}
.card .body{
  background:var(--panel-2);
  padding:0.875rem 1rem 1rem;
  display:flex;flex-direction:column;gap:0.5rem;
  border-top:0.0625rem solid var(--rule);
}
.card .tags{display:flex;flex-wrap:wrap;gap:0.3125rem}
.card .tags .tg{
  background:rgba(102,192,244,0.12);
  border:0.0625rem solid rgba(102,192,244,0.3);
  color:var(--accent);
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
  letter-spacing:0.08em;text-transform:uppercase;
  padding:0.1875rem 0.4375rem;border-radius:0.125rem;
}
.card .desc{
  font-family:'IBM Plex Sans',sans-serif;font-size:0.875rem;
  line-height:1.45;color:rgba(223,245,251,0.85);
  font-style:italic;
}
.card .meta-row{
  display:flex;justify-content:space-between;align-items:center;
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  letter-spacing:0.06em;
  margin-top:0.125rem;
}
.card .meta-row .rating{color:var(--pos)}
.card .meta-row .rating.mid{color:var(--gold)}
.card .meta-row .rating.bad{color:var(--neg)}
.card .meta-row .price{
  font-family:'Bowlby One SC',cursive;color:var(--gold);font-size:1rem;letter-spacing:0.02em;
}
.card .meta-row .price.free{color:var(--accent)}

/* Verdict overlay (LIKE / NOPE / SHORT) */
.card .verdict{
  position:absolute;top:1.5rem;
  font-family:'Bowlby One SC',cursive;
  font-size:2rem;letter-spacing:0.10em;text-transform:uppercase;
  padding:0.375rem 0.75rem;border:0.25rem solid currentColor;
  border-radius:0.375rem;opacity:0;pointer-events:none;
  z-index:5;transition:opacity 0.05s linear;
}
.card .verdict.like{right:1.25rem;color:var(--pos);transform:rotate(14deg)}
.card .verdict.nope{left:1.25rem;color:var(--neg);transform:rotate(-14deg)}
.card .verdict.short{
  left:50%;top:auto;bottom:8rem;color:var(--accent);
  transform:translateX(-50%) rotate(-2deg);
}

/* Action button row */
.actions{
  position:absolute;left:0;right:0;bottom:1.25rem;z-index:8;
  display:flex;gap:0.875rem;justify-content:center;align-items:center;
  pointer-events:none;
}
.actions button{
  pointer-events:auto;
  width:3.5rem;height:3.5rem;border-radius:50%;
  background:var(--panel-2);
  border:0.1875rem solid var(--rule);
  cursor:pointer;
  font-family:'Bowlby One SC',cursive;font-size:1.25rem;
  display:flex;align-items:center;justify-content:center;
  color:var(--foam);
  box-shadow:0 0.375rem 0 rgba(0,0,0,0.45);
  transition:transform 0.08s, box-shadow 0.08s, border-color 0.08s;
}
.actions button:active{transform:translateY(0.125rem);box-shadow:0 0.25rem 0 rgba(0,0,0,0.45)}
.actions button:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.1875rem}
.actions .nope:hover{border-color:var(--neg);color:var(--neg)}
.actions .like:hover{border-color:var(--pos);color:var(--pos)}
.actions .short:hover{border-color:var(--accent);color:var(--accent)}
.actions .undo:hover{border-color:var(--gold);color:var(--gold)}
.actions .nope, .actions .like{width:4.25rem;height:4.25rem;font-size:1.5rem}
.actions .short{background:var(--panel-2)}
.actions .short[disabled], .actions .undo[disabled]{
  opacity:0.4;cursor:not-allowed;border-color:var(--rule)
}

/* Empty state */
.empty{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:1.5rem;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(223,245,251,0.65);font-size:1.25rem;line-height:1.4;
}
.empty button{
  margin-top:1rem;
  font-family:'Bowlby One SC',cursive;font-size:1rem;
  background:var(--accent);color:var(--ink);
  border:0.1875rem solid var(--ink);padding:0.5rem 1.25rem;
  cursor:pointer;border-radius:0.25rem;letter-spacing:0.04em;
  min-height:2.75rem;
  box-shadow:0.25rem 0.25rem 0 var(--ink);text-transform:uppercase;
}
.empty button:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.1875rem}

/* Favorites drawer */
.fav-drawer{
  position:fixed;top:0;right:0;bottom:0;width:min(22rem, 90vw);
  background:var(--bg-2);
  border-left:0.125rem solid var(--rule);
  z-index:30;display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform 0.22s ease-out;
  box-shadow:-0.5rem 0 1.5rem rgba(0,0,0,0.45);
}
.fav-drawer.show{transform:translateX(0)}
.fav-drawer header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0.875rem 1rem;border-bottom:0.0625rem solid var(--rule);
}
.fav-drawer h2{
  font-family:'Bowlby One SC',cursive;font-size:1.125rem;
  letter-spacing:0.04em;text-transform:uppercase;color:var(--foam);
}
.fav-drawer h2 .ct{color:var(--accent);font-family:'IBM Plex Mono',monospace}
.fav-drawer .close{
  background:transparent;border:0.0625rem solid var(--rule);
  color:var(--foam);font-family:'Bowlby One SC',cursive;
  padding:0.3125rem 0.5625rem;border-radius:0.25rem;cursor:pointer;
  min-height:2.25rem;
}
.fav-drawer .close:hover{border-color:var(--accent);color:var(--accent)}
.fav-drawer .close:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}
.fav-drawer .list{
  flex:1;overflow-y:auto;padding:0.625rem;
  display:flex;flex-direction:column;gap:0.5rem;
}
.fav-drawer .empty-fav{
  text-align:center;padding:2rem 1rem;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(223,245,251,0.55);
}
.fav-item{
  display:grid;grid-template-columns:3rem 1fr auto;gap:0.625rem;
  align-items:center;
  background:var(--panel);
  border:0.0625rem solid var(--rule);
  border-radius:0.375rem;padding:0.5rem 0.625rem;
}
.fav-item.shortlist{border-color:var(--accent);box-shadow:0 0 0.5rem rgba(102,192,244,0.20)}
.fav-item .thumb{
  width:3rem;height:3rem;border-radius:0.25rem;overflow:hidden;
  flex-shrink:0;
}
.fav-item .meta{display:flex;flex-direction:column;min-width:0}
.fav-item .nm{
  font-family:'Bowlby One SC',cursive;font-size:0.9375rem;
  color:var(--foam);letter-spacing:0.02em;line-height:1.05;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  text-transform:uppercase;
}
.fav-item .sub{
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
  color:rgba(223,245,251,0.6);letter-spacing:0.06em;
}
.fav-item .sub .star{color:var(--accent)}
.fav-item .rm{
  background:transparent;border:0.0625rem solid var(--rule);
  color:rgba(223,245,251,0.6);
  font-family:'Bowlby One SC',cursive;font-size:0.875rem;
  width:1.875rem;height:1.875rem;border-radius:0.25rem;cursor:pointer;
}
.fav-item .rm:hover{color:var(--neg);border-color:var(--neg)}
.fav-item .rm:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}
.fav-drawer .footer{
  border-top:0.0625rem solid var(--rule);padding:0.5rem 0.75rem;
  display:flex;gap:0.4375rem;flex-wrap:wrap;
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
  letter-spacing:0.16em;color:rgba(223,245,251,0.55);text-transform:uppercase;
}
.fav-drawer .footer button{
  background:transparent;border:0.0625rem solid var(--rule);
  color:rgba(223,245,251,0.7);font-family:inherit;font-size:inherit;
  letter-spacing:inherit;padding:0.375rem 0.5625rem;border-radius:0.125rem;
  cursor:pointer;text-transform:uppercase;
}
.fav-drawer .footer button:hover{color:var(--accent);border-color:var(--accent)}
.fav-drawer .footer button:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

/* Hint */
.hint{
  position:absolute;bottom:6.5rem;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(223,245,251,0.45);font-size:0.9375rem;
  pointer-events:none;text-align:center;
  text-shadow:0 0.125rem 0.5rem rgba(0,0,0,0.7);
  transition:opacity 0.4s;
}
.hint.fade{opacity:0}

@media (max-width:560px){
  .brand .tag{display:none}
}

/* === Desktop redesign (chat ask) ===
   ≥1024px : larger cards (30rem × 46rem) with extra cover height for
             the now-bigger pixel sprites.
   ≥1280px : favorites drawer becomes a persistent right sidebar; the
             stage shifts left by the sidebar width so the deck stays
             centered in the remaining space. The CLOSE / OPEN buttons
             hide because the panel is always visible. */
@media (min-width:1024px){
  .deck-wrap{
    width:min(30rem, 92vw);
    height:min(46rem, calc(100vh - 11rem));
  }
  .card .cover canvas.pixel{
    width:11.5rem;height:11.5rem;
  }
  .card .cover .title{
    font-size:clamp(1.75rem, 2.5vw, 2.75rem);
  }
}
@media (min-width:1280px){
  main{
    grid-template-columns:1fr 22rem;
    grid-template-rows:auto 1fr;
  }
  header.deck{grid-column:1 / -1}
  .stage{grid-column:1; grid-row:2}
  .fav-drawer{
    position:relative;top:auto;right:auto;bottom:auto;
    grid-column:2;grid-row:2;
    width:auto;
    transform:none !important;
    transition:none;
    box-shadow:none;
    border-left:0.0625rem solid var(--rule);
  }
  .fav-drawer .close{display:none}
  /* Hide the OPEN-favorites HUD pill — drawer is always there */
  #favBtn{display:none}
}
/* punchy press animation for the action buttons */
@keyframes btnPunch {
  0%  { transform: scale(1); }
  35% { transform: scale(0.86) translateY(0.125rem); }
  70% { transform: scale(1.10); }
  100%{ transform: scale(1); }
}
.actions button.punch{ animation: btnPunch 0.22s ease-out; }

@media (prefers-reduced-motion: reduce){
  .card{transition:none}
  .fav-drawer{transition:none}
  .hint{transition:none}
  .actions button:active{transform:none}
  .actions button.punch{animation:none}
}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
</style>
</head>
<body>

<a href="#deck" class="skip-link">Skip to deck</a>

<main>
  <header class="deck">
    <div class="brand">
      <h1>STEAM<span class="accent">SWIPE</span></h1>
      <div class="tag">— swipe like you mean it · ❤ favorite · ✕ pass · ⭐ shortlist —</div>
    </div>
    <div class="hud" role="status" aria-live="polite">
      <div class="pill" aria-label="Cards remaining"><span>QUEUE</span> <b id="hQueue">0</b></div>
      <div class="pill" aria-label="Favorites"><span>FAVS</span> <b id="hFavs">0</b></div>
      <div class="pill" id="favBtn" role="button" tabindex="0" aria-label="Open favorites"><span>♥</span> <b>OPEN</b></div>
      <div class="pill" id="reshuffleBtn" role="button" tabindex="0" aria-label="Reshuffle deck"><span>↻</span> <b>NEW DECK</b></div>
    </div>
  </header>

  <section class="stage" id="deck">
    <div class="deck-wrap" id="deckWrap" role="application"
         aria-label="Card deck. Drag right to favorite, left to pass, up to shortlist. Or use the buttons or arrow keys.">
      <!-- cards injected -->
    </div>

    <div class="hint" id="hint">drag the card · ← pass · → favorite · ↑ shortlist</div>

    <div class="actions" aria-label="Card actions">
      <button id="undoBtn" class="undo" type="button" aria-label="Undo last swipe" disabled>↶</button>
      <button id="nopeBtn" class="nope" type="button" aria-label="Pass (left)">✕</button>
      <button id="shortBtn" class="short" type="button" aria-label="Shortlist (up)">⭐</button>
      <button id="likeBtn" class="like" type="button" aria-label="Favorite (right)">♥</button>
    </div>
  </section>

  <aside class="fav-drawer" id="favDrawer" aria-label="Favorites" inert>
    <header>
      <h2>FAVORITES <span class="ct" id="favCt">0</span></h2>
      <button class="close" id="closeFavBtn" type="button" aria-label="Close favorites">CLOSE</button>
    </header>
    <div class="list" id="favList"></div>
    <div class="footer">

// Map a game's tag mix to a sprite name. Falls back to `generic`.
function pickSprite(g){
  const t = g.tags.map(x => x.toLowerCase()).join(' ');
  if (g.title.toLowerCase().includes('portal')) return 'portal';
  if (/sim|cozy|farm|life/.test(t))             return 'farm';
  if (/horror|dread|liminal/.test(t))           return 'ghost';
  if (/card|roguelike|deck/.test(t))            return 'card';
  if (/rpg|narrative|medieval/.test(t))         return 'crown';
  if (/sci-fi|space|exploration/.test(t))       return 'rocket';
  if (/automation|sandbox|building/.test(t))    return 'gear';
  if (/punishing|cult|survival/.test(t))        return 'skull';
  if (/metroidvania|action|stealth|pirate|shooter/.test(t)) return 'sword';
  if (/platformer|climbing|adventure/.test(t))  return 'helmet';
  if (/free|funny|goofy|pixel/.test(t))         return 'coin';
  if (/music|toy|typing/.test(t))               return 'music';
  if (/multiplayer|social|co-op/.test(t))       return 'arrow';
  if (/puzzle|indie/.test(t))                   return 'mushroom';
  return 'generic';
}

// Render a sprite into a small canvas — one cell = 1 pixel, then CSS
// upscales it crisp via `image-rendering: pixelated` for chunky retro feel.
function renderSpriteToCanvas(spriteName, accent){
  const map = SPRITES[spriteName] || SPRITES.generic;
  const W = 16, H = 16;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  cv.className = 'pixel';
  cv.setAttribute('aria-hidden', 'true');
  const c = cv.getContext('2d');
  // Build palette from the game's accent — derive shadow + body + hi
  const pal = palFromAccent(accent);
  for (let y = 0; y < H; y++){
    const row = map[y] || '';
    for (let x = 0; x < W; x++){
      const ch = row[x] || '0';
      if (ch === '0') continue;
      const k = +ch;
      c.fillStyle = pal[k] || pal[2];
      c.fillRect(x, y, 1, 1);
    }
  }
  return cv;
}
function palFromAccent(hex){
  const m = hex.match(/^#([0-9a-f]{6})$/i);
  if (!m) return ['transparent', '#0a121a', '#66c0f4', '#dff5fb'];
  const v = parseInt(m[1], 16);
  const r = (v >> 16) & 0xff, gN = (v >> 8) & 0xff, b = v & 0xff;
  // Body = accent, shadow = darker, highlight = lighter
  const dim   = `rgb(${(r*0.30)|0},${(gN*0.30)|0},${(b*0.30)|0})`;
  const body  = hex;
  const light = `rgb(${Math.min(255,(r*1.45)|0)},${Math.min(255,(gN*1.45)|0)},${Math.min(255,(b*1.45)|0)})`;
  return ['transparent', dim, body, light];
}

        <path d="M120,140 Q60,200 130,250 Q220,290 250,210 Q300,160 230,120 Q170,90 120,140Z" fill="${accent}" fill-opacity="0.4"/>

    case 'rune':

        <ellipse cx="200" cy="170" rx="100" ry="35" fill="none" stroke="${accent}" stroke-opacity="0.30" stroke-width="1.5"/>

        <circle cx="280" cy="120" r="20" fill="${accent}" fill-opacity="0.55"/>
        <circle cx="320" cy="220" r="35" fill="${accent}" fill-opacity="0.35"/>
        <ellipse cx="120" cy="180" rx="80" ry="14" fill="none" stroke="${accent}" stroke-opacity="0.30"/>

        <polygon points="20,260 140,80 220,180 280,120 380,260" fill="${accent}" fill-opacity="0.45"/>
        <polygon points="80,260 200,140 320,260" fill="${accent}" fill-opacity="0.30"/>
      `; break;
    case 'arrows':
      shape = `
        <path d="M40,180 L120,180 L120,140 L200,200 L120,260 L120,220 L40,220 Z" fill="${accent}" fill-opacity="0.40"/>
        <path d="M260,140 L340,140 L340,100 L420,160 L340,220 L340,180 L260,180 Z" fill="${accent}" fill-opacity="0.30"/>
      `; break;
    case 'gears':
      shape = `
        <g fill="${accent}" fill-opacity="0.40">
          <circle cx="120" cy="170" r="48"/>
          <circle cx="120" cy="170" r="20" fill="${bg}"/>
          <circle cx="270" cy="200" r="36"/>
          <circle cx="270" cy="200" r="14" fill="${bg}"/>
        </g>
      `; break;
    case 'bones':
      shape = `
        <g fill="${accent}" fill-opacity="0.45">
          <ellipse cx="100" cy="120" rx="14" ry="20"/>
          <rect x="90" y="120" width="20" height="80" rx="6"/>
          <ellipse cx="100" cy="200" rx="14" ry="20"/>
          <ellipse cx="280" cy="180" rx="14" ry="20"/>
          <rect x="270" y="180" width="20" height="80" rx="6"/>
          <ellipse cx="280" cy="260" rx="14" ry="20"/>
        </g>
      `; break;
    case 'stars':
      shape = '';
      for (let i = 0; i < 24; i++){
        const x = (i * 71) % 400;
        const y = ((i * 137) % 280);
        const r = 1.5 + ((i * 7) % 3);
        shape += `<circle cx="${x}" cy="${y}" r="${r}" fill="${accent}" fill-opacity="0.55"/>`;

    case 'fox':

        <circle cx="180" cy="200" r="6" fill="${bg}"/>
        <circle cx="220" cy="200" r="6" fill="${bg}"/>
      `; break;
    case 'desert':
      shape = `
        <rect x="0" y="200" width="400" height="100" fill="${accent}" fill-opacity="0.30"/>
        <polygon points="0,200 80,160 160,210 240,170 320,210 400,180 400,200" fill="${accent}" fill-opacity="0.20"/>
        <circle cx="320" cy="80" r="32" fill="${accent}" fill-opacity="0.55"/>
      `; break;
    case 'walls':
      shape = `
        <g fill="${accent}" fill-opacity="0.40">
          <rect x="60" y="180" width="80" height="100"/>
          <rect x="160" y="160" width="60" height="120"/>
          <rect x="240" y="200" width="100" height="80"/>
          <polygon points="60,180 100,140 140,180"/>
          <polygon points="160,160 190,120 220,160"/>
        </g>
      `; break;
    case 'puzzle':
      shape = `
        <g fill="${accent}" fill-opacity="0.45" stroke="${bg}" stroke-width="2">

      shape = `<circle cx="50%" cy="40%" r="80" fill="${accent}" fill-opacity="0.40"/>`;
  }
  return `<svg class="art" viewBox="0 0 400 320" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <linearGradient id="${id2}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${bg}" stop-opacity="0.0"/>
        <stop offset="60%" stop-color="${bg}" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="${bg}" stop-opacity="0.95"/>
      </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="${bg}"/>
    ${shape}
    <rect width="100%" height="100%" fill="url(#${id2})"/>
  </svg>`;
}

// === Deck state ===
const STORAGE_KEY = 'steamswipe-favs-v1';
const SEEN_KEY    = 'steamswipe-seen-v1';
let deck = [];                    // queue of game indices
let topCard = null;               // the card element currently being dragged
let deckPos = 0;                  // position into the deck
let lastSwipe = null;             // { game, action } for undo
let favorites = loadFavs();

function loadFavs(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return [];
    return arr.filter(x => x && typeof x === 'object' && typeof x.title === 'string');
  } catch (e){ return []; }
}
function saveFavs(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites)); } catch (e){}
}
function isFavorited(g){
  return favorites.some(f => f.title === g.title);
}
function addFavorite(g, kind){
  if (isFavorited(g)){
    // Promote to shortlist if was just-favorited
    const f = favorites.find(x => x.title === g.title);
    if (kind === 'shortlist') f.shortlist = true;
    saveFavs();
    return;
  }
  favorites.unshift({
    title: g.title, tags: g.tags, year: g.year, price: g.price, rating: g.rating,
    accent: g.accent, bg: g.bg, shape: g.shape, blurb: g.blurb,
    shortlist: kind === 'shortlist',
    addedAt: Date.now(),
  });
  saveFavs();
}
function removeFavorite(title){
  favorites = favorites.filter(f => f.title !== title);
  saveFavs();
  refreshFavList();
  refreshHud();
}
function clearFavorites(){
  if (favorites.length === 0) return;
  if (!confirm('Clear all favorites? This cannot be undone.')) return;
  favorites = [];
  saveFavs();
  refreshFavList();
  refreshHud();
}

function shuffleDeck(){
  // Fresh shuffled order of all GAMES indices
  deck = GAMES.map((_, i) => i);
  for (let i = deck.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  deckPos = 0;
  lastSwipe = null;
  document.getElementById('undoBtn').disabled = true;
  buildStack();
  refreshHud();
}

// === Card stack rendering ===
const deckWrap = document.getElementById('deckWrap');
const STACK_VISIBLE = 3;
function buildStack(){
  // Clear and rebuild the visible stack of up to STACK_VISIBLE cards
  deckWrap.innerHTML = '';
  if (deckPos >= deck.length){
    showEmptyState();
    return;
  }
  for (let i = Math.min(deck.length - deckPos, STACK_VISIBLE) - 1; i >= 0; i--){
    const idx = deck[deckPos + i];
    const g = GAMES[idx];
    const card = buildCardEl(g, i);
    deckWrap.appendChild(card);
  }
  topCard = deckWrap.lastElementChild;
  if (topCard) bindDrag(topCard);
}

function buildCardEl(g, depth){
  const card = document.createElement('article');
  card.className = 'card';
  // Stagger behind the top card
  const scale = 1 - depth * 0.04;
  const offsetY = depth * 8;
  card.style.transform = `translate(-50%, -50%) translate(0px, ${offsetY}px) scale(${scale})`;
  card.style.left = '50%'; card.style.top = '50%';
  card.style.zIndex = String(100 - depth);
  card.style.opacity = depth >= STACK_VISIBLE ? '0' : (1 - depth * 0.10);
  // Cover
  const ratingClass = ratingTone(g.rating);
  const priceClass = g.price === 'FREE' ? 'free' : '';
  card.innerHTML = `
    <div class="cover">
      ${makeCoverArtSVG(g)}
      <div class="badge">${g.year}</div>
      <div class="title">${escapeHtml(g.title)}</div>
    </div>
    <div class="body">
      <div class="tags">
        ${g.tags.map(t => '<span class="tg">' + escapeHtml(t) + '</span>').join('')}
      </div>
      <p class="desc">${escapeHtml(g.blurb)}</p>
      <div class="meta-row">
        <span class="rating ${ratingClass}">★ ${escapeHtml(g.rating)}</span>
        <span class="price ${priceClass}">${escapeHtml(g.price)}</span>
      </div>
    </div>
    <div class="verdict like" aria-hidden="true">FAV</div>
    <div class="verdict nope" aria-hidden="true">PASS</div>
    <div class="verdict short" aria-hidden="true">SHORTLIST</div>
  `;
  // Inject 8-bit pixel sprite over the SVG art
  const cover = card.querySelector('.cover');
  const titleEl = cover.querySelector('.title');
  cover.insertBefore(renderSpriteToCanvas(pickSprite(g), g.accent), titleEl);
  card._game = g;
  return card;
}
function ratingTone(r){
  if (/Negative|Mixed/.test(r)) return /Negative/.test(r) ? 'bad' : 'mid';
  return '';
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

// === Drag-to-swipe ===
function bindDrag(card){
  let dragging = false;
  let startX = 0, startY = 0;
  let dx = 0, dy = 0;
  card.addEventListener('pointerdown', e => {
    if (state === 'animating') return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    card.setPointerCapture(e.pointerId);
    card.style.transition = 'none';
    fadeHint();
  });
  card.addEventListener('pointermove', e => {
    if (!dragging) return;
    dx = e.clientX - startX;
    dy = e.clientY - startY;
    applyDragVisual(card, dx, dy);
  });
  card.addEventListener('pointerup',  finish);
  card.addEventListener('pointercancel', finish);
  card.addEventListener('lostpointercapture', finish);
  function finish(){
    if (!dragging) return;
    dragging = false;
    const TH_X = 90, TH_Y = 100;
    if (dy < -TH_Y && Math.abs(dx) < 130){
      flyOff(card, 'shortlist');
    } else if (dx > TH_X){
      flyOff(card, 'like');
    } else if (dx < -TH_X){
      flyOff(card, 'nope');
    } else {
      // Snap back
      card.style.transition = 'transform 0.2s ease-out';
      card.style.transform = 'translate(-50%, -50%) translate(0px, 0px) rotate(0deg)';
      const v = card.querySelectorAll('.verdict');
      v.forEach(x => x.style.opacity = '0');
    }
    dx = 0; dy = 0;
  }
}

function applyDragVisual(card, dx, dy){
  const rot = dx / 16;       // ~6° at 100px
  card.style.transform = `translate(-50%, -50%) translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
  // Verdict overlays
  const likeEl  = card.querySelector('.verdict.like');
  const nopeEl  = card.querySelector('.verdict.nope');
  const shortEl = card.querySelector('.verdict.short');
  if (dy < -50 && Math.abs(dx) < 130){
    shortEl.style.opacity = String(Math.min(1, (-dy - 50) / 60));
    likeEl.style.opacity  = '0';
    nopeEl.style.opacity  = '0';
  } else {
    shortEl.style.opacity = '0';
    if (dx > 0){
      likeEl.style.opacity = String(Math.min(1, dx / 100));
      nopeEl.style.opacity = '0';
    } else {
      nopeEl.style.opacity = String(Math.min(1, -dx / 100));
      likeEl.style.opacity = '0';
    }
  }
}

function flyOff(card, action){
  state = 'animating';
  const dir = action === 'like' ? 1 : action === 'nope' ? -1 : 0;
  const upY = action === 'shortlist' ? -1 : 0;
  const tx  = dir * (window.innerWidth + 200);
  const ty  = upY * (window.innerHeight + 200);
  const rot = dir * 30;
  card.style.transition = 'transform 0.32s ease-in, opacity 0.32s ease-in';
  card.style.transform  = `translate(-50%, -50%) translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
  card.style.opacity    = '0';
  // Apply action
  const g = card._game;
  if (action === 'like' || action === 'shortlist'){
    addFavorite(g, action);
    sndLike(action === 'shortlist');
  } else {
    sndPass();
  }
  lastSwipe = { game: g, action, idx: deck[deckPos] };
  document.getElementById('undoBtn').disabled = false;
  setTimeout(() => {
    deckPos++;
    state = 'idle';
    buildStack();
    refreshHud();
    refreshFavList();
  }, 320);
}

function actionButtonSwipe(action){
  if (!topCard || state === 'animating') return;
  flyOff(topCard, action);
}

function undoSwipe(){
  if (!lastSwipe || state === 'animating') return;
  // Roll back the deck position
  deckPos = Math.max(0, deckPos - 1);
  // If we'd added a favorite, remove it (only if it's the freshest one)
  if (lastSwipe.action === 'like' || lastSwipe.action === 'shortlist'){
    const f = favorites.find(x => x.title === lastSwipe.game.title);
    if (f) favorites = favorites.filter(x => x !== f);
    saveFavs();
  }
  lastSwipe = null;
  document.getElementById('undoBtn').disabled = true;
  buildStack();
  refreshHud();
  refreshFavList();
  sndUndo();
}

// === Empty state ===
let state = 'idle';
function showEmptyState(){
  const empty = document.createElement('div');
  empty.className = 'empty';
  empty.innerHTML = `
    <div>You've swiped through every game in the deck.</div>
    <div style="margin-top:0.5rem;font-size:1rem">favorites saved · ${favorites.length} kept · ${favorites.filter(f=>f.shortlist).length} shortlisted</div>
    <button id="reshuffleEmpty" type="button">↻ NEW DECK</button>
  `;
  deckWrap.appendChild(empty);
  document.getElementById('reshuffleEmpty').addEventListener('click', shuffleDeck);
}

// === HUD ===
const hQueue = document.getElementById('hQueue');
const hFavs  = document.getElementById('hFavs');
function refreshHud(){
  hQueue.textContent = Math.max(0, deck.length - deckPos);
  hFavs.textContent  = favorites.length;
}

// === Favorites drawer ===
const favDrawer = document.getElementById('favDrawer');
const favList   = document.getElementById('favList');
const favCt     = document.getElementById('favCt');
const favStats  = document.getElementById('favStats');
function refreshFavList(){
  favList.innerHTML = '';
  favCt.textContent = favorites.length;
  const shorts = favorites.filter(f => f.shortlist).length;
  favStats.textContent = '★ ' + shorts + ' SHORTLISTED';
  if (favorites.length === 0){
    favList.innerHTML = '<div class="empty-fav">no favorites yet — go swipe right.</div>';
    return;
  }
  for (const f of favorites){
    const item = document.createElement('div');
    item.className = 'fav-item' + (f.shortlist ? ' shortlist' : '');
    item.innerHTML = `
      <div class="thumb" style="background:linear-gradient(135deg, ${f.bg}, ${f.accent})"></div>
      <div class="meta">
        <div class="nm">${escapeHtml(f.title)}</div>
        <div class="sub">${f.shortlist ? '<span class="star">★ SHORTLIST · </span>' : ''}${escapeHtml(f.tags.slice(0,2).join(' · '))} · ${escapeHtml(f.price)}</div>
      </div>
      <button class="rm" type="button" aria-label="Remove ${escapeHtml(f.title)}">✕</button>
    `;
    item.querySelector('.rm').addEventListener('click', () => removeFavorite(f.title));
    favList.appendChild(item);
  }
}
function openFav(){
  favDrawer.classList.add('show');
  favDrawer.inert = false;
  refreshFavList();
}
function closeFav(){
  favDrawer.classList.remove('show');
  favDrawer.inert = true;
}
document.getElementById('favBtn').addEventListener('click', openFav);
document.getElementById('favBtn').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openFav(); }
});
document.getElementById('closeFavBtn').addEventListener('click', closeFav);
document.getElementById('clearFavBtn').addEventListener('click', clearFavorites);
document.getElementById('exportBtn').addEventListener('click', async () => {
  if (!favorites.length){ alert('No favorites to copy.'); return; }
  const lines = [
    'STEAMSWIPE · YOUR FAVORITES',
    new Date().toISOString().slice(0, 10),
    '────────────────────────',
    ...favorites.map(f => (f.shortlist ? '★ ' : '  ') + f.title + ' (' + f.year + ') · ' + f.tags.join(', ') + ' · ' + f.price),
  ].join('\n');
  try {
    await navigator.clipboard.writeText(lines);
    const btn = document.getElementById('exportBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ COPIED';
    setTimeout(() => { btn.textContent = orig; }, 1300);
  } catch (e){
    alert(lines);
  }
});

// === Reshuffle ===
document.getElementById('reshuffleBtn').addEventListener('click', shuffleDeck);
document.getElementById('reshuffleBtn').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); shuffleDeck(); }
});

// === Action buttons (with snappy click + punch animation) ===
function punch(btn){
  btn.classList.remove('punch');
  void btn.offsetWidth;       // reflow to retrigger animation
  btn.classList.add('punch');
  sndClick();
}
function bindAction(id, fn){
  const b = document.getElementById(id);
  b.addEventListener('click', () => { punch(b); fn(); });
}
bindAction('nopeBtn',  () => actionButtonSwipe('nope'));
bindAction('likeBtn',  () => actionButtonSwipe('like'));
bindAction('shortBtn', () => actionButtonSwipe('shortlist'));
bindAction('undoBtn',  undoSwipe);

// === Keyboard ===
window.addEventListener('keydown', e => {
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if (e.code === 'ArrowLeft')  { actionButtonSwipe('nope'); e.preventDefault(); }
  if (e.code === 'ArrowRight') { actionButtonSwipe('like'); e.preventDefault(); }
  if (e.code === 'ArrowUp')    { actionButtonSwipe('shortlist'); e.preventDefault(); }
  if (e.code === 'KeyZ')       { undoSwipe(); }
  if (e.code === 'KeyF')       { favDrawer.classList.contains('show') ? closeFav() : openFav(); }
  if (e.code === 'Escape' && favDrawer.classList.contains('show')) closeFav();
});

// === Audio (small synth) ===
let actx = null, masterGain = null;
function ensureAudio(){
  if (actx) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = actx.createGain();
    masterGain.gain.value = 0.18;
    masterGain.connect(actx.destination);
  } catch (e){}
}
function blip(freq, dur, type, vol, slide){
  ensureAudio();
  if (!actx) return;
  const o = actx.createOscillator(); o.type = type || 'triangle';
  o.frequency.setValueAtTime(freq, actx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, actx.currentTime + dur);
  const g = actx.createGain(); g.gain.value = 0;
  o.connect(g); g.connect(masterGain);
  const t = actx.currentTime;
  g.gain.linearRampToValueAtTime(vol || 0.15, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
}
// === NES-flavoured snappy SFX (chat ask) — square waves with short
// envelopes, fast arpeggios. Each event is a few cents and fires
// instantly on click for that crisp 8-bit punch.
function sndLike(big){
  blip(523, 0.05, 'square', 0.15, 660);
  setTimeout(() => blip(784,  0.05, 'square', 0.13, 880),  35);
  setTimeout(() => blip(1047, 0.06, 'square', 0.12, 1320), 70);
  if (big){
    setTimeout(() => blip(1568, 0.08, 'square', 0.12, 1976), 110);
    setTimeout(() => blip(2093, 0.10, 'square', 0.10, 2637), 160);
  }
}
function sndPass(){
  blip(330, 0.05, 'square', 0.12, 220);
  setTimeout(() => blip(220, 0.06, 'square', 0.11, 165), 30);
  setTimeout(() => blip(165, 0.07, 'square', 0.10, 110), 60);
}
function sndUndo(){
  blip(880, 0.04, 'square', 0.10, 1320);
  setTimeout(() => blip(660, 0.05, 'square', 0.10, 990), 25);
}
function sndClick(){
  blip(1760, 0.025, 'square', 0.08);
}

// === Hint fade ===
let hintFaded = false;
function fadeHint(){
  if (hintFaded) return;
  hintFaded = true;
  const el = document.getElementById('hint');
  el.classList.add('fade');
  setTimeout(() => el && el.remove(), 800);
}

// === Wide-screen sync — favorites drawer is permanent at ≥1280px,
// so we strip its inert flag so it stays keyboard-reachable even
// though we never "opened" it via openFav().
const _wideMQ = window.matchMedia('(min-width: 1280px)');
function syncWide(){
  if (_wideMQ.matches){
    favDrawer.inert = false;
    favDrawer.classList.add('show');
  } else {
    if (!favDrawer.classList.contains('show')) favDrawer.inert = true;
  }
}
_wideMQ.addEventListener
  ? _wideMQ.addEventListener('change', syncWide)
  : _wideMQ.addListener(syncWide);
syncWide();

// === Boot ===
shuffleDeck();
refreshFavList();
</script>
