<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Expert Match</title>
<meta name="description" content="A minimal expert-matching dashboard. Type a brief, see ranked experts, view each one's skills radar.">
<meta property="og:title" content="Expert Match">
<meta property="og:description" content="A minimal expert-matching dashboard. Type a brief, see ranked experts, view each one's skills radar.">
<meta property="og:url" content="https://sloppy.live/consultant-dashboard">
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimalist%20editorial%20expert%20matching%20dashboard%20skills%20radar%20chart%20paper%20teal%20navy%20IBM%20plex%20typography?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%8A">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f4f1ea;
  --paper:#ffffff;
  --paper-2:#faf7f0;
  --ink:#1a1f2e;
  --ink-2:#3a4456;
  --ink-mute:#6b7383;
  --rule:rgba(26,31,46,0.08);
  --rule-strong:rgba(26,31,46,0.18);
  --teal:#2c5f5d;
  --teal-soft:rgba(44,95,93,0.18);
  --teal-fill:rgba(44,95,93,0.22);
  --teal-deep:#1c403e;
  --warm:#c66e2e;
  --warm-soft:rgba(198,110,46,0.20);
  --sage:#5a8c5a;
  --rose:#b94a5a;
  --gold:#c89a37;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
html{font-size:100%}

body{
  min-height:100vh;
  background:
    repeating-linear-gradient(11deg, rgba(26,31,46,0.018) 0 1px, transparent 1px 5px),
    var(--bg);
}
.skip{position:absolute;left:-9999px;top:auto}
.skip:focus{left:1rem;top:1rem;background:var(--teal);color:#fff;padding:0.5rem;z-index:100}

.app{
  display:grid;
  grid-template-columns: 22rem minmax(0, 1fr);
  grid-template-rows: auto 1fr;
  min-height:100vh;
  gap:1rem;
  padding:1rem;
  max-width:84rem;
  margin:0 auto;
}
@media (max-width: 920px){
  .app{ grid-template-columns: 1fr; min-height:auto }
}

/* ── HEADER ── */
header.brand{
  grid-column: 1 / -1;
  background: var(--paper);
  border:1px solid var(--rule);
  padding: 1rem 1.2rem;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap:1rem;
  align-items:center;
}
header.brand .mark{
  width:2.6rem; height:2.6rem;
  background: linear-gradient(160deg, var(--teal), var(--teal-deep));
  color:#f4f1ea;
  display:flex; align-items:center; justify-content:center;
  font-family:'Crimson Pro',serif; font-weight:600;
  font-size:1.5rem;
  line-height:1;
  letter-spacing:-0.02em;
  border-radius:2px;
}
header.brand h1{
  margin:0;
  font-family:'Crimson Pro',serif;
  font-weight:500;
  font-size:1.5rem;
  color: var(--ink);
  letter-spacing:-0.01em;
}
header.brand h1 em{ font-style:italic; color: var(--warm); font-weight:400 }
header.brand .sub{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.6rem; letter-spacing:0.22em; text-transform:uppercase;
  color: var(--ink-mute);
  margin-top:0.18rem;
}
header.brand .meta{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.62rem; letter-spacing:0.16em; text-transform:uppercase;
  color: var(--ink-mute);
  text-align:right;
}
header.brand .meta b{ color: var(--ink); font-weight:500 }

/* ── LEFT: brief + match list ── */
.left{
  background: var(--paper);
  border:1px solid var(--rule);
  display:flex; flex-direction:column;
  min-height:0;
  overflow:hidden;
}
.left .brief-wrap{
  padding: 1rem;
  border-bottom: 1px solid var(--rule);
  background: var(--paper-2);
}
.left .brief-wrap label{
  display:block;
  font-family:'IBM Plex Mono',monospace;
  font-weight:400;
  font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 0.45rem;
}
.left .brief-wrap textarea{
  font: inherit;
  font-size: 0.92rem;
  line-height: 1.55;
  resize: none;
  width: 100%;
  min-height: 4.4rem;
  max-height: 10rem;
  padding: 0.55rem 0.75rem;
  background: var(--paper);
  border: 1px solid var(--rule);
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.left .brief-wrap textarea:focus-visible{
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(44,95,93,0.12);
}
.left .brief-foot{
  display:flex; gap:0.5rem; align-items:center;
  margin-top: 0.55rem;
}
.btn-go{
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.7rem; letter-spacing: 0.16em; text-transform: uppercase;
  background: var(--teal);
  color:#f4f1ea;
  border: 1px solid var(--teal);
  padding: 0.55rem 1rem;
  cursor: pointer;
  transition: background 0.15s ease;
}
.btn-go:hover{ background: var(--teal-deep) }
.btn-go:focus-visible{ outline: 3px solid var(--warm); outline-offset: 2px }
.btn-go:disabled{ opacity:0.5; cursor: not-allowed }
.brief-foot .hint{
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.55rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-mute);
  margin-left:auto;
}

.list-head{
  padding: 0.7rem 1rem;
  font-family:'IBM Plex Mono',monospace;
  font-weight: 400;
  font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
  display:flex; align-items:center; gap:0.6rem;
  border-bottom: 1px solid var(--rule);
}
.list-head .count{
  margin-left:auto;
  background: rgba(44,95,93,0.08);
  color: var(--teal);
  border:1px solid rgba(44,95,93,0.22);
  padding: 0.18rem 0.45rem;
  font-size:0.55rem;
}

.match-list{
  flex: 1 1 auto;
  overflow-y: auto;
}
.match-row{
  display:grid;
  grid-template-columns: 2.4rem 1fr auto;
  gap: 0.6rem;
  align-items: center;
  padding: 0.7rem 1rem;
  cursor: pointer;
  border-bottom: 1px solid var(--rule);
  background: transparent;
  transition: background 0.15s ease;
  text-align: left;
  font: inherit;
  color: var(--ink);
  width: 100%;
}
.match-row:hover{ background: var(--paper-2) }
.match-row.active{
  background: rgba(44,95,93,0.06);
  box-shadow: inset 3px 0 0 var(--teal);
}
.match-row:focus-visible{ outline: 2px solid var(--teal); outline-offset: -2px }
.match-row .avatar{
  width:2.4rem; height:2.4rem;
  background: var(--paper-2);
  border: 1px solid var(--rule-strong);
  color: var(--ink);
  font-family:'Crimson Pro',serif;
  font-weight: 600;
  font-size: 1.1rem;
  display:flex; align-items:center; justify-content:center;
  letter-spacing: -0.02em;
}
.match-row.active .avatar{
  background: var(--teal);
  border-color: var(--teal);
  color: #f4f1ea;
}
.match-row .info{ min-width: 0 }
.match-row .nm{
  font-family:'Crimson Pro',serif;
  font-weight: 500;
  font-size: 1rem;
  color: var(--ink);
  white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
}
.match-row .role{
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.58rem; letter-spacing: 0.12em;
  color: var(--ink-mute);
  margin-top: 0.15rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.match-row .fit{
  text-align: right;
  font-family:'IBM Plex Mono', monospace;
}
.match-row .fit b{
  display: block;
  font-family:'Crimson Pro',serif;
  font-weight: 600;
  font-size: 1.3rem;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.match-row .fit .label{
  font-size: 0.5rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-mute);
  margin-top: 0.15rem;
}
.match-row.active .fit b{ color: var(--teal) }

/* ── RIGHT: detail panel ── */
.right{
  background: var(--paper);
  border:1px solid var(--rule);
  padding: 1.2rem 1.4rem;
  display: flex; flex-direction: column;
  min-height: 0;
  overflow-y: auto;
}
.detail-head{
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 1rem;
  align-items: start;
  padding-bottom: 0.85rem;
  border-bottom: 1px solid var(--rule);
}
.detail-head .avatar-lg{
  width:3.6rem; height:3.6rem;
  background: linear-gradient(160deg, var(--teal), var(--teal-deep));
  color:#f4f1ea;
  display:flex; align-items:center; justify-content:center;
  font-family:'Crimson Pro',serif;
  font-weight: 600;
  font-size: 1.7rem;
  letter-spacing: -0.02em;
  border-radius: 2px;
}
.detail-head h2{
  margin:0;
  font-family:'Crimson Pro',serif;
  font-weight: 500;
  font-size: 1.55rem;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.detail-head .role-line{
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-mute);
  margin-top: 0.18rem;
}
.detail-head .fit-large{
  text-align: right;
  font-family:'Crimson Pro',serif;
}
.detail-head .fit-large b{
  font-weight: 600;
  font-size: 2.4rem;
  color: var(--teal);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.detail-head .fit-large .label{
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-mute);
  margin-top: 0.2rem;
}

.detail-body{
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
  gap: 1.4rem;
  padding-top: 1rem;
}
@media (max-width: 720px){
  .detail-body{ grid-template-columns: 1fr }
}

/* ── RADAR ── */
.radar-host{
  background: var(--paper-2);
  border: 1px solid var(--rule);
  padding: 1rem;
  display: flex; flex-direction: column; gap: 0.4rem;
  min-width: 0;
}
.radar-host h3{
  margin: 0;
  font-family:'IBM Plex Mono',monospace;
  font-weight: 400;
  font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
}
.radar-host .radar-svg{
  width: 100%;
  height: auto;
  aspect-ratio: 1 / 1;
  max-width: 28rem;
  margin: 0 auto;
}
.radar-svg .ring{ fill: none; stroke: rgba(26,31,46,0.10); stroke-width: 0.6; }
.radar-svg .ring.outer{ stroke: rgba(26,31,46,0.22) }
.radar-svg .axis{ stroke: rgba(26,31,46,0.16); stroke-width: 0.6 }
.radar-svg .axis-label{
  font-family:'IBM Plex Mono',monospace;
  font-size: 8px; letter-spacing: 0.12em;
  fill: var(--ink-mute);
  text-transform: uppercase;
}
.radar-svg .axis-label.active{ fill: var(--ink); font-weight: 500 }
.radar-svg .stat-poly{
  fill: var(--teal-fill);
  stroke: var(--teal);
  stroke-width: 1.4;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.radar-svg .stat-dot{
  fill: var(--teal);
}
.radar-svg .ring-label{
  font-family:'IBM Plex Mono',monospace;
  font-size: 6.5px;
  fill: rgba(26,31,46,0.32);
}

.radar-host .stats-row{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.3rem 0.6rem;
  margin-top: 0.3rem;
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.66rem;
}
.radar-host .stats-row .stat{
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.4rem;
  padding: 0.18rem 0;
  color: var(--ink-mute);
}
.radar-host .stats-row .stat b{
  color: var(--ink); font-weight: 500;
  font-variant-numeric: tabular-nums;
}
.radar-host .stats-row .stat.peak b{ color: var(--teal) }

/* ── BIO ── */
.bio-block{
  display: flex; flex-direction: column; gap: 0.85rem;
  min-width: 0;
}
.bio-block h3{
  margin: 0;
  font-family:'IBM Plex Mono',monospace;
  font-weight: 400;
  font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
}
.bio-block p{
  margin: 0;
  font-family:'Crimson Pro',serif;
  font-size: 1.02rem;
  line-height: 1.55;
  color: var(--ink-2);
}
.bio-block .topics{
  display:flex; flex-wrap: wrap; gap: 0.32rem;
}
.bio-block .topic{
  display:inline-block;
  padding: 0.22rem 0.5rem;
  background: rgba(26,31,46,0.05);
  border: 1px solid var(--rule);
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.6rem; letter-spacing: 0.06em;
  color: var(--ink-mute);
}
.bio-block .topic.match{
  background: rgba(198,110,46,0.10);
  border-color: rgba(198,110,46,0.4);
  color: var(--warm);
  font-weight: 500;
}
.bio-block .reasons{
  list-style: none; margin: 0; padding: 0;
  display:flex; flex-direction: column; gap: 0.3rem;
}
.bio-block .reasons li{
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.7rem; line-height: 1.5;
  color: var(--ink-2);
  padding-left: 1rem;
  position: relative;
}
.bio-block .reasons li::before{
  content: '◆';
  position: absolute; left: 0; top: 0.05rem;
  color: var(--teal);
  font-size: 0.55rem;
}
.actions{
  display: flex; gap: 0.5rem; margin-top: 0.4rem;
}
.act-btn{
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase;
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--rule-strong);
  padding: 0.55rem 0.85rem;
  cursor: pointer;
  flex: 1;
  min-height: 2.5rem;
}
.act-btn.primary{
  background: var(--teal);
  color: #f4f1ea;
  border-color: var(--teal);
}
.act-btn.primary:hover{ background: var(--teal-deep) }
.act-btn:hover{ border-color: var(--teal); color: var(--teal) }
.act-btn:focus-visible{ outline: 3px solid var(--warm); outline-offset: 2px }

@media (prefers-reduced-motion: reduce){
  .radar-svg .stat-poly{ transition: none }
}
</style>
</head>
<body>
<a href="#matchList" class="skip">Skip to expert matches</a>

<div class="app">

  <header class="brand">
    <div class="mark" aria-hidden="true">M</div>
    <div>
      <h1>expert · <em>match</em></h1>
      <div class="sub">consultant directory · skills radar · briefs in, candidates out</div>
    </div>
    <div class="meta">
      <div>experts · <b id="totalExperts">8</b></div>
      <div>brief · <b id="briefStatus">empty</b></div>
    </div>
  </header>

  <!-- LEFT: brief + match list -->
  <aside class="left" aria-label="Briefs and matches">
    <div class="brief-wrap">
      <label for="briefInput">Your brief</label>
      <textarea id="briefInput" rows="3" placeholder="A few lines on the situation you need help framing — markets, decisions, constraints. The list below re-ranks as you type."></textarea>
      <div class="brief-foot">
        <button type="button" class="btn-go" id="rankBtn">Rank matches</button>
        <span class="hint">enter to rank</span>
      </div>
    </div>
    <div class="list-head">
      <span>Matches</span>
      <span class="count" id="rankedCount">8 ranked</span>
    </div>
    <nav class="match-list" id="matchList" aria-label="Matched experts"></nav>
  </aside>

  <!-- RIGHT: detail with radar -->
  <main class="right" id="detail" aria-label="Expert detail">
    <!-- populated by JS -->
  </main>

</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//   EXPERT MATCH — minimal directory + skills-radar
// ════════════════════════════════════════════════════════════════

const $ = (s) => document.querySelector(s);

// ──────── 6 skill axes (in display order, clockwise starting at 12) ────────
const SKILLS = [
  { key: 'strategy',     label: 'Strategy' },
  { key: 'execution',    label: 'Execution' },
  { key: 'domain',       label: 'Domain depth' },
  { key: 'communication',label: 'Communication' },
  { key: 'velocity',     label: 'Velocity' },
  { key: 'storytelling', label: 'Storytelling' },
];

// ──────── 8 hand-curated experts ────────
const EXPERTS = [
  {
    id: 'mara',  name: 'Mara Voss',     role: 'Strategy & Market Entry',
    initials: 'MV',
    stats: { strategy: 92, execution: 65, domain: 78, communication: 82, velocity: 60, storytelling: 70 },
    topics: ['go-to-market', 'pricing', 'competitive', 'positioning', 'segmentation', 'wedge'],
    bio: 'Twelve years across enterprise SaaS launches and B2B repositioning. Brings a structured wedge-and-expand framework that tends to halve the time companies spend chasing the wrong segment.',
  },
  {
    id: 'theo',  name: 'Theo Chen',     role: 'Operations & Throughput',
    initials: 'TC',
    stats: { strategy: 60, execution: 95, domain: 80, communication: 65, velocity: 78, storytelling: 50 },
    topics: ['operations', 'throughput', 'scale', 'process', 'cost', 'efficiency', 'supply'],
    bio: 'Ex-ops lead at two scaleups, both 10×ed throughput in under a year under his cadence. Treats process the way a good editor treats a manuscript — ruthless cuts, tight pacing.',
  },
  {
    id: 'sarah', name: 'Sarah Meek',    role: 'Brand & Storytelling',
    initials: 'SM',
    stats: { strategy: 70, execution: 55, domain: 70, communication: 92, velocity: 60, storytelling: 96 },
    topics: ['brand', 'narrative', 'story', 'message', 'positioning', 'voice', 'content', 'launch'],
    bio: 'Former staff writer turned brand consultant. Quietly behind three brand pivots you have probably heard of. Will rewrite your one-liner four times before you notice the room change.',
  },
  {
    id: 'felix', name: 'Felix Naranjo', role: 'Finance & Unit Economics',
    initials: 'FN',
    stats: { strategy: 75, execution: 70, domain: 96, communication: 70, velocity: 55, storytelling: 60 },
    topics: ['finance', 'unit economics', 'capital', 'runway', 'fundraising', 'pricing', 'cohort'],
    bio: 'CFO twice, fractional advisor for the rest. Reads cohort tables the way a sommelier reads vintage. Is famously calm about cash; famously pointed about pricing.',
  },
  {
    id: 'ravi',  name: 'Ravi Khoury',   role: 'Product Discovery',
    initials: 'RK',
    stats: { strategy: 78, execution: 76, domain: 72, communication: 80, velocity: 92, storytelling: 70 },
    topics: ['product', 'discovery', 'roadmap', 'user', 'research', 'validation', 'experimentation'],
    bio: 'Formerly led discovery at two design-led product orgs. Strong opinion: most roadmaps are not too long, they are too unsequenced. Loves a one-week killable experiment.',
  },
  {
    id: 'tess',  name: 'Tess Lindgren', role: 'Cloud Architecture',
    initials: 'TL',
    stats: { strategy: 65, execution: 88, domain: 95, communication: 62, velocity: 80, storytelling: 45 },
    topics: ['architecture', 'cloud', 'tech', 'engineering', 'reliability', 'scale', 'platform', 'migration'],
    bio: 'Previously Principal at a hyperscaler. Has migrated more workloads off legacy than she can recount; remembers the exact bill on most of them. Strong on tradeoffs, allergic to vendor pitches.',
  },
  {
    id: 'nora',  name: 'Nora Park',     role: 'Org Design & Change',
    initials: 'NP',
    stats: { strategy: 84, execution: 70, domain: 72, communication: 94, velocity: 60, storytelling: 78 },
    topics: ['org', 'change', 'team', 'leadership', 'restructure', 'culture', 'stakeholder'],
    bio: 'Specialises in the awkward year between Series B and C, when the org chart breaks twice. Brings a quiet meeting-design practice that makes hard conversations actually happen.',
  },
  {
    id: 'akira', name: 'Akira Sato',    role: 'Data & Experimentation',
    initials: 'AS',
    stats: { strategy: 70, execution: 82, domain: 92, communication: 65, velocity: 90, storytelling: 60 },
    topics: ['data', 'experimentation', 'analytics', 'metrics', 'a/b', 'instrumentation', 'measurement'],
    bio: 'Twelve years of A/B test design and instrumentation, with a long tail of post-mortems on tests that should never have shipped. Will sketch your decision tree in eight minutes.',
  },
];

// ──────── matching — bag of words + dominant-skill weighting ────────
function tokenize(s){
  return String(s || '').toLowerCase().match(/[a-z0-9]+/g) || [];
}
function rankExperts(brief){
  const tokens = new Set(tokenize(brief));
  // baseline: each expert gets a "global average competence" score so the
  // list is never empty even on a blank brief.
  const out = [];
  for (const e of EXPERTS){
    let topicHits = 0;
    let matchedTopics = [];
    for (const topic of e.topics){
      // either the full topic phrase appears in the brief, or any of its
      // tokens overlaps. Multi-word topics get a bigger bump.
      const tt = tokenize(topic);
      const allHit = tt.every(t => tokens.has(t));
      const anyHit = tt.some(t => tokens.has(t));
      if (allHit){ topicHits += 2.5; matchedTopics.push(topic); }
      else if (anyHit){ topicHits += 1; matchedTopics.push(topic); }
    }
    const avg = SKILLS.reduce((s, sk) => s + (e.stats[sk.key] || 0), 0) / SKILLS.length;
    // Fit score: average competence weighted by topic alignment.
    // Empty brief → fit ≈ avg, ranks experts by all-around competence.
    const topicScore = topicHits === 0 ? 0 : Math.min(1, topicHits / 4); // 0..1
    const fit = Math.round(avg * 0.55 + topicScore * 100 * 0.45);
    out.push({ expert: e, fit, matchedTopics });
  }
  out.sort((a, b) => b.fit - a.fit);
  return out;
}

// ──────── persistence ────────
const SAVE_KEY = 'consultant-dashboard-v2';
let state = { brief: '', selected: 'mara' };
try {
  const j = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}');
  if (j.brief) state.brief = j.brief;
  if (j.selected && EXPERTS.some(e => e.id === j.selected)) state.selected = j.selected;
} catch {}
function save(){ try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch {} }

// ──────── render: match list ────────
let lastRanked = [];
function renderMatchList(){
  const ranked = rankExperts(state.brief);
  lastRanked = ranked;
  $('#rankedCount').textContent = `${ranked.length} ranked`;
  $('#briefStatus').textContent = state.brief.trim() ? 'parsed' : 'empty';
  const host = $('#matchList');
  host.innerHTML = '';
  for (const r of ranked){
    const e = r.expert;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'match-row' + (state.selected === e.id ? ' active' : '');
    btn.dataset.id = e.id;
    btn.innerHTML = `
      <div class="avatar" aria-hidden="true">${e.initials}</div>
      <div class="info">
        <div class="nm">${e.name}</div>
        <div class="role">${e.role}</div>
      </div>
      <div class="fit"><b>${r.fit}</b><div class="label">fit</div></div>
    `;
    btn.addEventListener('click', () => {
      state.selected = e.id;
      save();
      renderMatchList();
      renderDetail();
    });
    host.appendChild(btn);
  }
}

// ──────── render: skills radar (SVG) ────────
function renderRadar(stats, matchedTopics){
  const N = SKILLS.length;       // 6 axes
  const VB = 200;                // viewBox edge
  const cx = VB / 2, cy = VB / 2;
  const r = 78;
  // Each axis angle: starting at top (-90°) and going clockwise
  const angleFor = (i) => -Math.PI / 2 + (i / N) * Math.PI * 2;

  // Concentric rings (4)
  const ringSvgs = [];
  for (let k = 1; k <= 4; k++){
    const rk = (r * k) / 4;
    const points = [];
    for (let i = 0; i < N; i++){
      const a = angleFor(i);
      points.push(`${(cx + Math.cos(a) * rk).toFixed(2)},${(cy + Math.sin(a) * rk).toFixed(2)}`);
    }
    ringSvgs.push(`<polygon class="ring${k===4?' outer':''}" points="${points.join(' ')}"></polygon>`);
  }

  // Axes
  const axisSvgs = [];
  const labelSvgs = [];
  for (let i = 0; i < N; i++){
    const a = angleFor(i);
    const x2 = cx + Math.cos(a) * r;
    const y2 = cy + Math.sin(a) * r;
    axisSvgs.push(`<line class="axis" x1="${cx}" y1="${cy}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}"></line>`);
    // label position outside the axis end
    const lx = cx + Math.cos(a) * (r + 12);
    const ly = cy + Math.sin(a) * (r + 12);
    // text-anchor by quadrant for cleaner alignment
    let anchor = 'middle';
    if (Math.cos(a) > 0.4) anchor = 'start';
    else if (Math.cos(a) < -0.4) anchor = 'end';
    // active class if the axis is the expert's peak skill
    const skKey = SKILLS[i].key;
    const peak = isPeakSkill(stats, skKey);
    labelSvgs.push(`<text class="axis-label${peak ? ' active' : ''}" x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle">${SKILLS[i].label}</text>`);
  }

  // Stat polygon
  const statPts = [];
  const statDots = [];
  for (let i = 0; i < N; i++){
    const v = Math.max(0, Math.min(100, stats[SKILLS[i].key] || 0));
    const a = angleFor(i);
    const dr = (r * v) / 100;
    const x = cx + Math.cos(a) * dr;
    const y = cy + Math.sin(a) * dr;
    statPts.push(`${x.toFixed(2)},${y.toFixed(2)}`);
    statDots.push(`<circle class="stat-dot" cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="2.4"></circle>`);
  }

  // Ring labels (25/50/75/100)
  const ringLabels = [25, 50, 75, 100].map((v, i) => {
    const rk = (r * (i + 1)) / 4;
    return `<text class="ring-label" x="${(cx + 2).toFixed(1)}" y="${(cy - rk + 2.5).toFixed(1)}">${v}</text>`;
  });

  return `
    <svg class="radar-svg" viewBox="0 0 ${VB} ${VB}" role="img" aria-label="Skills radar chart">
      ${ringSvgs.join('\n')}
      ${axisSvgs.join('\n')}
      <polygon class="stat-poly" points="${statPts.join(' ')}"></polygon>
      ${statDots.join('\n')}
      ${labelSvgs.join('\n')}
      ${ringLabels.join('\n')}
    </svg>
  `;
}
function isPeakSkill(stats, key){
  const max = Math.max(...SKILLS.map(s => stats[s.key] || 0));
  return (stats[key] || 0) >= max - 4;   // top skills (within 4 of max) are highlighted
}

// ──────── render: detail panel ────────
function renderDetail(){
  const r = lastRanked.find(x => x.expert.id === state.selected) || lastRanked[0];
  if (!r){ $('#detail').innerHTML = ''; return; }
  const e = r.expert;
  const sortedSkills = [...SKILLS].sort((a, b) => (e.stats[b.key] || 0) - (e.stats[a.key] || 0));
  const topPair = sortedSkills.slice(0, 2);

  // build the topics list with chat-matched ones highlighted
  const briefTokens = new Set(tokenize(state.brief));
  const topicsHtml = e.topics.map(t => {
    const tt = tokenize(t);
    const matched = tt.some(x => briefTokens.has(x));
    return `<span class="topic${matched ? ' match' : ''}">${escapeHtml(t)}</span>`;
  }).join('');

  // generate human-readable match reasons
  const reasons = [];
  if (r.matchedTopics && r.matchedTopics.length){
    reasons.push(`Brief overlaps with ${r.matchedTopics.length} of ${e.topics.length} topic anchors${r.matchedTopics.length ? ': ' + r.matchedTopics.slice(0, 3).join(', ') : ''}.`);
  }
  reasons.push(`Strongest axes: <b>${topPair[0].label}</b> (${e.stats[topPair[0].key]}) and <b>${topPair[1].label}</b> (${e.stats[topPair[1].key]}).`);
  const avg = Math.round(SKILLS.reduce((s, sk) => s + (e.stats[sk.key] || 0), 0) / SKILLS.length);
  reasons.push(`Composite competence: <b>${avg} / 100</b> across the six axes.`);
  if (!state.brief.trim()){
    reasons.unshift(`Surfaced by all-around competence — <i>add a brief to get topic-aware ranking.</i>`);
  }

  $('#detail').innerHTML = `
    <div class="detail-head">
      <div class="avatar-lg" aria-hidden="true">${e.initials}</div>
      <div>
        <h2>${escapeHtml(e.name)}</h2>
        <div class="role-line">${escapeHtml(e.role)}</div>
      </div>
      <div class="fit-large">
        <b>${r.fit}</b>
        <div class="label">fit · /100</div>
      </div>
    </div>

    <div class="detail-body">
      <div class="radar-host">
        <h3>Skills radar · 6 axes</h3>
        ${renderRadar(e.stats, r.matchedTopics)}
        <div class="stats-row">
          ${SKILLS.map(s => `
            <div class="stat${isPeakSkill(e.stats, s.key) ? ' peak' : ''}">
              <span>${s.label.toLowerCase()}</span>
              <b>${e.stats[s.key] || 0}</b>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="bio-block">
        <div>
          <h3>About</h3>
          <p>${escapeHtml(e.bio)}</p>
        </div>
        <div>
          <h3>Topics</h3>
          <div class="topics">${topicsHtml}</div>
        </div>
        <div>
          <h3>Why this match</h3>
          <ul class="reasons">
            ${reasons.map(r => `<li>${r}</li>`).join('')}
          </ul>
        </div>
        <div class="actions">
          <button type="button" class="act-btn primary" id="connectBtn" aria-label="Connect with ${e.name}">Connect</button>
          <button type="button" class="act-btn" id="briefBtn" aria-label="Send brief to ${e.name}">Send brief</button>
        </div>
      </div>
    </div>
  `;
  $('#connectBtn').addEventListener('click', () => alert('Connection request sent (demo).'));
  $('#briefBtn').addEventListener('click', () => alert(`Brief routed to ${e.name} (demo).`));
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// ──────── input wiring ────────
const briefEl = $('#briefInput');
briefEl.value = state.brief;
let typeT = 0;
function reRank(){
  state.brief = briefEl.value;
  save();
  renderMatchList();
  renderDetail();
}
briefEl.addEventListener('input', () => {
  clearTimeout(typeT);
  typeT = setTimeout(reRank, 200);
});
briefEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); reRank(); }
});
$('#rankBtn').addEventListener('click', reRank);

// ──────── boot ────────
$('#totalExperts').textContent = String(EXPERTS.length);
renderMatchList();
renderDetail();
</script>
</body>
