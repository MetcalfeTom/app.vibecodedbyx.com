<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hangman</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0518">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%80">
<meta name="description" content="Neon hangman with 6 built-in word categories and a custom-category builder — save your own word lists, play with keyboard or click.">
<meta property="og:title" content="Hangman">
<meta property="og:description" content="Neon hangman with 6 built-in word categories and a custom-category builder — save your own word lists, play with keyboard or click.">
<meta property="og:url" content="https://sloppy.live/hangman">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20cyberpunk%20hangman%20gallows%20glowing%20pink%20cyan%20on%20deep%20void%2C%20stick%20figure%20wireframe%2C%20arcade%20alphabet%20keyboard%2C%20scanlines?width=1200&height=630&model=flux&seed=6622&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=JetBrains+Mono:wght@400;500;700&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0518;
    --void-2:#150a2e;
    --panel:#1a0e3a;
    --panel-2:#251548;
    --border:#3a1f6e;
    --border-strong:#6b3eb8;
    --ink:#f5ecff;
    --silver:#a89cc8;
    --silver-dim:#6b5d8c;
    --pink:#ff2bd6;
    --cyan:#5ce6ff;
    --lime:#a5ff52;
    --amber:#ffd454;
    --red:#ff4848;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{
    min-height:100%;background:var(--void);color:var(--ink);
    font-family:'Space Mono', monospace;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  body{
    background:
      radial-gradient(ellipse 60% 50% at 80% 0%, rgba(255,43,214,0.12), transparent 65%),
      radial-gradient(ellipse 60% 50% at 20% 100%, rgba(92,230,255,0.10), transparent 65%),
      var(--void);
    min-height:100vh;
    display:flex;flex-direction:column;
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:99;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 3px);
  }

  header{
    padding:1.1rem 1.5rem 0.9rem;
    border-bottom:1px solid var(--border);
    background:rgba(21,10,46,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;
    position:relative;z-index:5;
  }
  .title{
    font-family:'Audiowide', sans-serif;
    font-size:clamp(1.6rem, 4vw, 2.6rem);letter-spacing:0.06em;line-height:1;
    color:var(--ink);
    text-shadow:0 0 12px var(--pink), 0 0 24px rgba(255,43,214,0.5);
  }
  .title .accent{color:var(--cyan);text-shadow:0 0 12px var(--cyan), 0 0 24px rgba(92,230,255,0.5)}
  .tag{
    font-family:'JetBrains Mono', monospace;font-size:0.72rem;
    color:var(--silver);margin-top:0.35rem;letter-spacing:0.14em;text-transform:uppercase;
  }
  .stat-pills{display:flex;gap:0.4rem;flex-wrap:wrap}
  .pill{
    background:var(--panel);border:1px solid var(--border-strong);
    color:var(--silver);
    font-family:'JetBrains Mono', monospace;font-size:0.66rem;
    padding:0.4rem 0.7rem;border-radius:999px;
    letter-spacing:0.14em;text-transform:uppercase;
    min-height:2.25rem;display:inline-flex;align-items:center;gap:0.4rem;
  }
  .pill .v{color:var(--ink);font-weight:700}
  .pill.streak .v{color:var(--lime);text-shadow:0 0 6px rgba(165,255,82,0.5)}
  .pill.wins .v{color:var(--cyan);text-shadow:0 0 6px rgba(92,230,255,0.5)}
  .pill.losses .v{color:var(--red)}

  main{
    flex:1;display:grid;grid-template-columns:14rem minmax(0,1fr);gap:1rem;
    padding:1rem 1.5rem 1.5rem;min-height:0;position:relative;z-index:5;
  }
  @media (max-width: 880px){ main{grid-template-columns:1fr} }

  .cat-panel{
    background:var(--panel);border:1px solid var(--border);border-radius:0.6rem;
    padding:0.85rem 0.95rem;
    display:flex;flex-direction:column;gap:0.6rem;
    box-shadow:0 0 18px rgba(107,62,184,0.18) inset;
  }
  .cat-panel h2{
    font-family:'Audiowide', sans-serif;font-size:0.72rem;
    color:var(--cyan);letter-spacing:0.2em;text-transform:uppercase;
    border-bottom:1px solid var(--border);padding-bottom:0.4rem;
  }
  .cat-list{display:flex;flex-direction:column;gap:0.3rem}
  .cat-btn{
    background:transparent;border:1px solid var(--border);color:var(--silver);
    font-family:'JetBrains Mono', monospace;font-size:0.74rem;
    padding:0.55rem 0.65rem;border-radius:0.35rem;cursor:pointer;
    letter-spacing:0.04em;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:0.4rem;
    min-height:2.5rem;
  }
  .cat-btn:hover{border-color:var(--pink);color:var(--ink)}
  .cat-btn[aria-pressed="true"]{
    background:linear-gradient(180deg, rgba(255,43,214,0.18), rgba(255,43,214,0.05));
    border-color:var(--pink);color:var(--pink);
    box-shadow:0 0 12px rgba(255,43,214,0.3) inset;
  }
  .cat-btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .cat-btn .ct{
    font-size:0.62rem;color:var(--silver-dim);font-weight:400;
  }
  .cat-btn[aria-pressed="true"] .ct{color:var(--pink)}
  .cat-btn.custom .ct{color:var(--lime)}
  .cat-btn .x{
    background:transparent;border:1px solid var(--border);color:var(--silver-dim);
    font-family:'JetBrains Mono', monospace;font-size:0.55rem;
    padding:0.1rem 0.3rem;border-radius:0.2rem;cursor:pointer;
    margin-left:0.3rem;line-height:1;
  }
  .cat-btn .x:hover{border-color:var(--red);color:var(--red)}
  .add-btn{
    background:linear-gradient(180deg, rgba(165,255,82,0.18), rgba(165,255,82,0.04));
    border:1px dashed var(--lime);color:var(--lime);
    font-family:'JetBrains Mono', monospace;font-size:0.7rem;font-weight:700;
    padding:0.6rem;border-radius:0.35rem;cursor:pointer;
    letter-spacing:0.14em;text-transform:uppercase;
    min-height:2.5rem;
  }
  .add-btn:hover{background:rgba(165,255,82,0.25);box-shadow:0 0 12px rgba(165,255,82,0.3)}
  .add-btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  .game-panel{
    background:var(--panel);border:1px solid var(--border);border-radius:0.6rem;
    padding:1rem 1.1rem 1.1rem;
    display:flex;flex-direction:column;gap:0.9rem;
    box-shadow:0 0 24px rgba(255,43,214,0.1) inset;
    min-height:0;
  }
  .game-header{
    display:flex;justify-content:space-between;align-items:center;gap:0.6rem;flex-wrap:wrap;
  }
  .current-cat{
    font-family:'Audiowide', sans-serif;font-size:0.82rem;color:var(--cyan);
    letter-spacing:0.2em;text-transform:uppercase;
    text-shadow:0 0 8px rgba(92,230,255,0.4);
  }
  .new-btn{
    background:linear-gradient(180deg, rgba(92,230,255,0.18), rgba(92,230,255,0.04));
    border:1px solid var(--cyan);color:var(--cyan);
    font-family:'JetBrains Mono', monospace;font-size:0.7rem;font-weight:700;
    padding:0.45rem 0.85rem;border-radius:0.3rem;cursor:pointer;
    letter-spacing:0.16em;text-transform:uppercase;
    min-height:2.25rem;
  }
  .new-btn:hover{background:rgba(92,230,255,0.3);box-shadow:0 0 12px rgba(92,230,255,0.4)}
  .new-btn:focus-visible{outline:2px solid var(--pink);outline-offset:2px}

  .play-area{
    display:grid;grid-template-columns:auto minmax(0,1fr);gap:1.2rem;align-items:center;
  }
  @media (max-width: 720px){ .play-area{grid-template-columns:1fr} }

  .gallows-wrap{
    background:#04020e;border:1px solid var(--border);border-radius:0.4rem;
    padding:0.4rem;width:18rem;max-width:100%;
    box-shadow:inset 0 0 22px rgba(255,43,214,0.12);
  }
  .gallows-wrap canvas{display:block;width:100%;height:auto;aspect-ratio:1}

  .word-area{
    display:flex;flex-direction:column;gap:0.9rem;min-width:0;
  }
  .word-display{
    font-family:'VT323', monospace;
    font-size:clamp(1.6rem, 5vw, 2.8rem);letter-spacing:0.25em;
    color:var(--lime);
    text-shadow:0 0 8px rgba(165,255,82,0.6), 0 0 16px rgba(165,255,82,0.3);
    line-height:1.1;
    word-break:break-word;
    min-height:3rem;
  }
  .word-display .letter{display:inline-block;min-width:0.6em;transition:transform 0.3s}
  .word-display .letter.revealed{animation:revealFlip 0.35s ease-out}
  .word-display .letter.hidden{color:var(--silver-dim);text-shadow:none}
  .word-display .space{display:inline-block;width:0.9em}
  @keyframes revealFlip{
    0%{transform:rotateY(90deg);color:var(--cyan)}
    100%{transform:rotateY(0);color:var(--lime)}
  }

  .wrong-letters{
    font-family:'JetBrains Mono', monospace;font-size:0.78rem;
    color:var(--silver);letter-spacing:0.08em;
    display:flex;gap:0.55rem;align-items:center;flex-wrap:wrap;
    min-height:1.5rem;
  }
  .wrong-letters .label{font-size:0.62rem;color:var(--silver-dim);letter-spacing:0.18em;text-transform:uppercase}
  .wrong-letters .wrong{
    color:var(--red);text-shadow:0 0 4px rgba(255,72,72,0.5);
    text-transform:uppercase;font-weight:700;
  }

  .keyboard{
    display:grid;
    grid-template-columns:repeat(13, 1fr);
    gap:0.35rem;
  }
  @media (max-width: 540px){ .keyboard{grid-template-columns:repeat(9, 1fr)} }
  .key{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--border-strong);color:var(--ink);
    font-family:'JetBrains Mono', monospace;font-weight:700;font-size:0.92rem;
    padding:0.65rem 0;border-radius:0.3rem;cursor:pointer;
    min-height:2.5rem;
    transition:all 0.12s;
    box-shadow:0 1px 0 rgba(0,0,0,0.4);
  }
  .key:hover:not(:disabled){
    border-color:var(--cyan);color:var(--cyan);
    box-shadow:0 0 10px rgba(92,230,255,0.4), 0 1px 0 rgba(0,0,0,0.4);
  }
  .key:focus-visible{outline:2px solid var(--pink);outline-offset:2px}
  .key.hit{
    background:linear-gradient(180deg, rgba(165,255,82,0.3), rgba(165,255,82,0.08));
    border-color:var(--lime);color:var(--lime);
    box-shadow:0 0 12px rgba(165,255,82,0.4);
  }
  .key.miss{
    background:linear-gradient(180deg, rgba(255,72,72,0.22), rgba(255,72,72,0.06));
    border-color:var(--red);color:var(--red);opacity:0.7;
  }
  .key:disabled{cursor:not-allowed}

  .end-overlay{
    position:absolute;inset:0;
    background:rgba(10,5,24,0.92);
    display:none;align-items:center;justify-content:center;
    flex-direction:column;gap:1rem;text-align:center;padding:1.5rem;
    border-radius:0.6rem;z-index:10;
    backdrop-filter:blur(4px);
  }
  .end-overlay.show{display:flex;animation:overlayIn 0.4s ease-out}
  @keyframes overlayIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
  .end-overlay .verdict{
    font-family:'Audiowide', sans-serif;font-size:clamp(1.8rem, 5vw, 3rem);
    letter-spacing:0.08em;line-height:1;
  }
  .end-overlay.win .verdict{color:var(--lime);text-shadow:0 0 14px rgba(165,255,82,0.6), 0 0 30px rgba(165,255,82,0.3)}
  .end-overlay.lose .verdict{color:var(--red);text-shadow:0 0 14px rgba(255,72,72,0.6), 0 0 30px rgba(255,72,72,0.3)}
  .end-overlay .reveal{
    font-family:'VT323', monospace;font-size:clamp(1.5rem, 4vw, 2.4rem);
    color:var(--cyan);letter-spacing:0.2em;
    text-shadow:0 0 8px rgba(92,230,255,0.5);
  }
  .end-overlay .reveal .lab{color:var(--silver-dim);font-size:0.55em;letter-spacing:0.3em;display:block;margin-bottom:0.3rem}

  /* Modal */
  .modal{
    position:fixed;inset:0;z-index:200;
    background:rgba(10,5,24,0.85);backdrop-filter:blur(8px);
    display:none;align-items:center;justify-content:center;padding:1rem;
  }
  .modal.show{display:flex;animation:overlayIn 0.25s ease-out}
  .modal-card{
    background:var(--panel);border:1px solid var(--pink);border-radius:0.6rem;
    padding:1.3rem 1.4rem 1.2rem;
    box-shadow:0 0 30px rgba(255,43,214,0.4);
    width:100%;max-width:30rem;
  }
  .modal-card h3{
    font-family:'Audiowide', sans-serif;font-size:1.1rem;color:var(--pink);
    letter-spacing:0.1em;margin-bottom:0.6rem;
    text-shadow:0 0 8px rgba(255,43,214,0.5);
  }
  .modal-card .desc{
    font-family:'JetBrains Mono', monospace;font-size:0.72rem;color:var(--silver);
    margin-bottom:0.8rem;line-height:1.4;
  }
  .modal-card label{
    font-family:'JetBrains Mono', monospace;font-size:0.65rem;
    color:var(--silver);letter-spacing:0.14em;text-transform:uppercase;
    display:block;margin-top:0.7rem;margin-bottom:0.25rem;
  }
  .modal-card input, .modal-card textarea{
    width:100%;background:#04020e;border:1px solid var(--border);
    color:var(--ink);font-family:'JetBrains Mono', monospace;font-size:0.85rem;
    padding:0.5rem 0.65rem;border-radius:0.3rem;
  }
  .modal-card input:focus, .modal-card textarea:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 2px rgba(92,230,255,0.25)}
  .modal-card textarea{min-height:8rem;resize:vertical;font-family:'JetBrains Mono', monospace;font-size:0.78rem;line-height:1.5}
  .modal-actions{
    margin-top:1rem;display:flex;gap:0.5rem;justify-content:flex-end;
  }
  .modal-actions button{
    background:transparent;border:1px solid var(--border-strong);color:var(--silver);
    font-family:'JetBrains Mono', monospace;font-size:0.72rem;font-weight:700;
    padding:0.55rem 0.95rem;border-radius:0.3rem;cursor:pointer;
    letter-spacing:0.14em;text-transform:uppercase;min-height:2.5rem;
  }
  .modal-actions button.primary{
    background:linear-gradient(180deg, var(--pink), #c01b9e);color:var(--ink);
    border-color:var(--pink);
    box-shadow:0 0 14px rgba(255,43,214,0.4);
  }
  .modal-actions button:hover{color:var(--ink);border-color:var(--ink)}
  .modal-actions button.primary:hover{filter:brightness(1.15)}
  .modal-actions button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  @media (prefers-reduced-motion: reduce){
    .word-display .letter.revealed, .end-overlay.show, .modal.show{animation:none}
  }
  @media (max-width: 540px){
    header{padding:0.85rem 0.9rem 0.7rem}
    main{padding:0.85rem 0.9rem 1rem}
  }
</style>
</head>
<body>
  <header>
    <div>
      <h1 class="title">hang<span class="accent">man</span></h1>
      <div class="tag">neon edition · 6 categories · build your own word lists</div>
    </div>
    <div class="stat-pills" role="status" aria-live="polite">
      <span class="pill streak">streak <span class="v" id="pStreak">0</span></span>
      <span class="pill wins">wins <span class="v" id="pWins">0</span></span>
      <span class="pill losses">losses <span class="v" id="pLosses">0</span></span>
    </div>
  </header>

  <main>
    <aside class="cat-panel" aria-label="Category picker">
      <h2>categories</h2>
      <div class="cat-list" id="catList" role="listbox"></div>
      <button class="add-btn" type="button" id="addCatBtn">+ custom list</button>
    </aside>

    <section class="game-panel" aria-label="Game board" style="position:relative">
      <div class="game-header">
        <div class="current-cat" id="currentCat">— select category —</div>
        <button class="new-btn" type="button" id="newBtn">↻ new word</button>
      </div>

      <div class="play-area">
        <div class="gallows-wrap">
          <canvas id="gallows" width="400" height="400" aria-label="Hangman gallows"></canvas>
        </div>
        <div class="word-area">
          <div class="word-display" id="wordDisplay" role="status" aria-live="polite" aria-atomic="true"></div>
          <div class="wrong-letters" id="wrongLetters" aria-label="Wrong guesses">
            <span class="label">misses</span>
            <span id="wrongList">—</span>
          </div>
        </div>
      </div>

      <div class="keyboard" id="keyboard" role="group" aria-label="Letter keyboard"></div>

      <div class="end-overlay" id="endOverlay" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="verdict" id="endVerdict"></div>
        <div class="reveal" id="endReveal"></div>
        <button class="new-btn" type="button" id="overlayNewBtn">↻ next word</button>
      </div>
    </section>
  </main>

  <div class="modal" id="catModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-card">
      <h3 id="modalTitle">+ custom category</h3>
      <div class="desc">give it a name + paste your word list (one per line · letters and spaces only, 2-20 chars per word). saved locally to your browser.</div>
      <label for="catName">category name</label>
      <input type="text" id="catName" maxlength="32" placeholder="e.g. board games" autocomplete="off">
      <label for="catWords">words (one per line)</label>
      <textarea id="catWords" placeholder="catan&#10;wingspan&#10;azul&#10;ticket to ride"></textarea>
      <div class="modal-actions">
        <button type="button" id="modalCancel">cancel</button>
        <button type="button" class="primary" id="modalSave">save list</button>
      </div>
    </div>
  </div>

<script>
'use strict';
(function(){
  function showError(msg){
    try{
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a061f;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff8ac0;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    }catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  // ── Built-in word categories ──
  // Words are picked at random per round, then revealed letter-by-letter as
  // the player guesses. Multi-word entries kept (spaces are revealed for free)
  // because they make for richer titles.
  const BUILTIN = [
    { id: 'movies',    name: 'Movies', words: [
      'PULP FICTION','THE GODFATHER','INCEPTION','INTERSTELLAR','GOODFELLAS',
      'FIGHT CLUB','BLADE RUNNER','ROCKY','JAWS','PSYCHO','MEMENTO','THE MATRIX',
      'CASABLANCA','SEVEN SAMURAI','PARASITE','EVERYTHING EVERYWHERE','MAD MAX',
      'NOSFERATU','TENET','WHIPLASH'
    ]},
    { id: 'animals',   name: 'Animals', words: [
      'ELEPHANT','GIRAFFE','OCTOPUS','PENGUIN','CHEETAH','PLATYPUS','DOLPHIN',
      'KANGAROO','AXOLOTL','NARWHAL','OKAPI','PANGOLIN','CAPYBARA','QUOKKA',
      'TARDIGRADE','MANTA RAY','SLOTH','TAPIR','LEMUR','MEERKAT','WOMBAT','OWL'
    ]},
    { id: 'tech',      name: 'Tech', words: [
      'KEYBOARD','MONITOR','ALGORITHM','COMPILER','REGEX','FIREWALL','DATABASE',
      'KERNEL','BANDWIDTH','ENCRYPTION','PROTOCOL','RECURSION','CHECKSUM',
      'BINARY','GIGABYTE','REFACTOR','RASTER','PIXEL','GRAPH','HASHMAP','CACHE',
      'LATENCY','PACKET','SUBROUTINE','BOOTLOADER'
    ]},
    { id: 'food',      name: 'Foods', words: [
      'SUSHI','CARBONARA','BAKLAVA','KIMCHI','GUACAMOLE','RAMEN','SHAWARMA',
      'FALAFEL','MOCHI','BIRYANI','GOULASH','TIRAMISU','PIEROGI','TAGINE',
      'PHO','CEVICHE','EMPANADA','BANH MI','SAMOSA','POUTINE','OKONOMIYAKI',
      'BOUILLABAISSE','MAPLE SYRUP','SOURDOUGH'
    ]},
    { id: 'geo',       name: 'Geography', words: [
      'PATAGONIA','SAHARA','EVEREST','AMAZON','KILIMANJARO','REYKJAVIK',
      'ANTARCTICA','GALAPAGOS','MONGOLIA','FJORDS','SIBERIA','ANDES',
      'YUCATAN','MADAGASCAR','BORNEO','ICELAND','TASMANIA','GREENLAND',
      'PYRENEES','URAL','KAMCHATKA','BAIKAL','MISSISSIPPI','NILE'
    ]},
    { id: 'scifi',     name: 'Sci-Fi', words: [
      'HYPERSPACE','ANDROID','NEBULA','WORMHOLE','TARDIS','SARLACC','KLINGON',
      'REPLICANT','METROID','GAMORA','CYBORG','MEGATRON','PROTOSS','LIGHTSABER',
      'ZERG','EWOK','CYLON','VULCAN','DALEK','BORG','MUAD DIB','SHAI HULUD'
    ]},
    { id: 'synthwave', name: 'Synthwave', words: [
      'NEON','CHROME','OUTRUN','MIAMI VICE','MIDNIGHT DRIVE','TRON','GRID',
      'LASERS','RETROFUTURE','KAVINSKY','CHROMATICS','DREAMSCAPE','SUNSET',
      'ARCADE','SYNTHESIZER','PALM TREES','MIRAGE','VAPORWAVE','GLITCH',
      'CASSETTE','VHS','HORIZON','DELOREAN','HOTLINE MIAMI','AESTHETIC',
      'NIGHTCALL','MAGNETIC'
    ]},
    { id: 'robots',    name: 'Robots', words: [
      'ROBOT','ANDROID','CIRCUITS','SERVO','ACTUATOR','MECHA','AUTOMATON',
      'TERMINATOR','BENDER','OPTIMUS PRIME','BAYMAX','WALL E','GRIPPER',
      'SENSOR','ROBOTICS','NEURAL NETWORK','EXOSKELETON','HUMANOID',
      'GUNDAM','ROOMBA','ASIMO','CHAPPIE','MARVIN','SONNY','DATA',
      'CHASSIS','GYROSCOPE','POSITRONIC','SOLENOID','MANIPULATOR',
      'TELEMETRY','FIRMWARE'
    ]}
  ];

  // ── State ──
  const STORAGE_KEY = 'hangman-state-v1';
  const state = {
    categories: BUILTIN.slice(),    // includes BUILTIN + persisted custom ones
    currentCatId: 'movies',
    word: '',
    revealed: new Set(),
    guessed: new Set(),
    wrong: 0,
    maxWrong: 6,
    status: 'playing',              // 'playing' | 'won' | 'lost'
    streak: 0,
    wins: 0,
    losses: 0
  };

  function loadState(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (Array.isArray(data.custom)){
        data.custom.forEach(c => {
          if (c && c.id && c.name && Array.isArray(c.words)){
            // Avoid id collisions with BUILTIN
            if (!state.categories.find(x => x.id === c.id)){
              state.categories.push({ ...c, custom: true });
            }
          }
        });
      }
      if (typeof data.streak === 'number') state.streak = data.streak;
      if (typeof data.wins === 'number') state.wins = data.wins;
      if (typeof data.losses === 'number') state.losses = data.losses;
      if (typeof data.currentCatId === 'string' && state.categories.find(c => c.id === data.currentCatId)){
        state.currentCatId = data.currentCatId;
      }
    } catch(e){ /* ignore corrupt storage */ }
  }
  function saveState(){
    try {
      const custom = state.categories.filter(c => c.custom).map(c => ({ id:c.id, name:c.name, words:c.words }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        custom, streak: state.streak, wins: state.wins, losses: state.losses, currentCatId: state.currentCatId
      }));
    } catch(_){}
  }

  // ── Audio (small synth blips) ──
  let actx = null;
  function ensureAudio(){
    if (actx) return;
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){}
  }
  function blip(freq, type, dur, vol){
    ensureAudio();
    if (!actx) return;
    if (actx.state === 'suspended') actx.resume();
    const t = actx.currentTime;
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol || 0.16, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.18));
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + (dur || 0.18) + 0.02);
  }
  function arpUp(){
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 'triangle', 0.22, 0.18), i * 75));
  }
  function arpDown(){
    [440, 330, 247, 180].forEach((f, i) => setTimeout(() => blip(f, 'sawtooth', 0.28, 0.15), i * 110));
  }

  // ── Game logic ──
  function currentCategory(){
    return state.categories.find(c => c.id === state.currentCatId) || state.categories[0];
  }
  function newRound(){
    const cat = currentCategory();
    if (!cat || !cat.words.length){
      state.word = '?';
      state.status = 'playing';
      return;
    }
    state.word = cat.words[Math.floor(Math.random() * cat.words.length)].toUpperCase();
    state.revealed = new Set();
    state.guessed = new Set();
    state.wrong = 0;
    state.status = 'playing';
    // Auto-reveal spaces + non-letter chars
    for (const ch of state.word){
      if (!/[A-Z]/.test(ch)) state.revealed.add(ch);
    }
    document.getElementById('endOverlay').classList.remove('show');
    document.getElementById('endOverlay').setAttribute('aria-hidden', 'true');
    renderAll();
  }
  function guess(letter){
    if (state.status !== 'playing') return;
    letter = letter.toUpperCase();
    if (!/^[A-Z]$/.test(letter)) return;
    if (state.guessed.has(letter)) return;
    state.guessed.add(letter);
    if (state.word.includes(letter)){
      state.revealed.add(letter);
      blip(660 + (letter.charCodeAt(0) - 65) * 6, 'triangle', 0.14, 0.13);
      if (allRevealed()){
        state.status = 'won';
        state.wins++;
        state.streak++;
        saveState();
        setTimeout(arpUp, 50);
      }
    } else {
      state.wrong++;
      blip(160, 'sawtooth', 0.28, 0.15);
      if (state.wrong >= state.maxWrong){
        state.status = 'lost';
        state.losses++;
        state.streak = 0;
        saveState();
        setTimeout(arpDown, 50);
      }
    }
    renderAll();
  }
  function allRevealed(){
    for (const ch of state.word){
      if (/[A-Z]/.test(ch) && !state.revealed.has(ch)) return false;
    }
    return true;
  }

  // ── Render ──
  const wordEl = document.getElementById('wordDisplay');
  const wrongListEl = document.getElementById('wrongList');
  const keyboardEl = document.getElementById('keyboard');
  const catListEl = document.getElementById('catList');
  const currentCatEl = document.getElementById('currentCat');
  const endOverlay = document.getElementById('endOverlay');
  const endVerdict = document.getElementById('endVerdict');
  const endReveal = document.getElementById('endReveal');

  function renderWord(){
    let html = '';
    for (const ch of state.word){
      if (ch === ' '){
        html += '<span class="space"></span>';
      } else if (!/[A-Z]/.test(ch)){
        html += '<span class="letter revealed">' + escapeHtml(ch) + '</span>';
      } else if (state.revealed.has(ch) || state.status === 'lost'){
        html += '<span class="letter revealed">' + ch + '</span>';
      } else {
        html += '<span class="letter hidden">_</span>';
      }
    }
    wordEl.innerHTML = html;
  }
  function renderWrong(){
    const wrong = [...state.guessed].filter(l => !state.word.includes(l));
    wrongListEl.innerHTML = wrong.length
      ? wrong.map(l => '<span class="wrong">' + l + '</span>').join(' ') + ' <span style="color:var(--silver-dim)">· ' + (state.maxWrong - state.wrong) + ' left</span>'
      : '—';
  }
  function renderKeyboard(){
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    keyboardEl.innerHTML = letters.split('').map(l => {
      let cls = 'key';
      let disabled = '';
      if (state.guessed.has(l)){
        cls += state.word.includes(l) ? ' hit' : ' miss';
        disabled = 'disabled';
      }
      if (state.status !== 'playing') disabled = 'disabled';
      return '<button type="button" class="' + cls + '" data-letter="' + l + '" ' + disabled + ' aria-label="Guess ' + l + '">' + l + '</button>';
    }).join('');
    keyboardEl.querySelectorAll('.key').forEach(btn => {
      btn.addEventListener('click', () => guess(btn.dataset.letter));
    });
  }
  function renderCats(){
    catListEl.innerHTML = state.categories.map(c => {
      const pressed = c.id === state.currentCatId;
      const xBtn = c.custom ? '<button type="button" class="x" data-del="' + escapeAttr(c.id) + '" aria-label="Delete custom category ' + escapeAttr(c.name) + '">✕</button>' : '';
      return '<button type="button" class="cat-btn ' + (c.custom ? 'custom' : '') + '" role="option" data-cat="' + escapeAttr(c.id) + '" aria-pressed="' + pressed + '">' +
        '<span>' + escapeHtml(c.name) + '</span>' +
        '<span style="display:flex;align-items:center;gap:0.3rem"><span class="ct">' + c.words.length + (c.custom ? ' · custom' : '') + '</span>' + xBtn + '</span>' +
        '</button>';
    }).join('');
    catListEl.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        // Don't trigger select if the inner X was clicked
        if (e.target.closest('[data-del]')) return;
        state.currentCatId = btn.dataset.cat;
        saveState();
        renderCats();   // refresh aria-pressed on the new active chip
        newRound();
      });
    });
    catListEl.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = btn.dataset.del;
        const cat = state.categories.find(c => c.id === id);
        if (!cat) return;
        if (!confirm('delete custom category "' + cat.name + '"?')) return;
        state.categories = state.categories.filter(c => c.id !== id);
        if (state.currentCatId === id) state.currentCatId = state.categories[0].id;
        saveState();
        renderCats();
        newRound();
      });
    });
  }
  function renderStats(){
    document.getElementById('pStreak').textContent = state.streak;
    document.getElementById('pWins').textContent = state.wins;
    document.getElementById('pLosses').textContent = state.losses;
    const cat = currentCategory();
    currentCatEl.textContent = cat ? cat.name : '—';
  }
  function renderEndOverlay(){
    if (state.status === 'playing'){
      endOverlay.classList.remove('show');
      endOverlay.setAttribute('aria-hidden', 'true');
      return;
    }
    endOverlay.classList.remove('win', 'lose');
    endOverlay.classList.add('show', state.status === 'won' ? 'win' : 'lose');
    endOverlay.setAttribute('aria-hidden', 'false');
    endVerdict.textContent = state.status === 'won' ? 'GOTCHA!' : 'STRUNG UP';
    endReveal.innerHTML = '<span class="lab">the word was</span>' + escapeHtml(state.word);
  }
  function renderGallows(){
    const canvas = document.getElementById('gallows');
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const w = canvas.offsetWidth, h = canvas.offsetHeight;
    if (canvas.width !== w * dpr || canvas.height !== h * dpr){
      canvas.width = w * dpr; canvas.height = h * dpr;
    }
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    // Faint grid backdrop
    ctx.strokeStyle = 'rgba(255,43,214,0.05)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 20 * dpr){
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 20 * dpr){
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Gallows always visible — cyan
    ctx.strokeStyle = '#5ce6ff';
    ctx.lineWidth = 4 * dpr;
    ctx.shadowColor = '#5ce6ff';
    ctx.shadowBlur = 12 * dpr;
    ctx.lineCap = 'round';
    // Base
    ctx.beginPath();
    ctx.moveTo(0.10 * W, 0.92 * H); ctx.lineTo(0.55 * W, 0.92 * H);
    ctx.stroke();
    // Vertical post
    ctx.beginPath();
    ctx.moveTo(0.20 * W, 0.92 * H); ctx.lineTo(0.20 * W, 0.10 * H);
    ctx.stroke();
    // Top beam
    ctx.beginPath();
    ctx.moveTo(0.20 * W, 0.10 * H); ctx.lineTo(0.65 * W, 0.10 * H);
    ctx.stroke();
    // Brace
    ctx.beginPath();
    ctx.moveTo(0.20 * W, 0.22 * H); ctx.lineTo(0.32 * W, 0.10 * H);
    ctx.stroke();
    // Rope
    ctx.beginPath();
    ctx.moveTo(0.65 * W, 0.10 * H); ctx.lineTo(0.65 * W, 0.22 * H);
    ctx.stroke();

    // Body parts in pink — drawn progressively
    ctx.strokeStyle = '#ff2bd6';
    ctx.shadowColor = '#ff2bd6';
    ctx.shadowBlur = 14 * dpr;
    ctx.lineWidth = 3.5 * dpr;
    const cx = 0.65 * W;
    if (state.wrong >= 1){
      // Head
      ctx.beginPath();
      ctx.arc(cx, 0.30 * H, 0.07 * H, 0, Math.PI * 2);
      ctx.stroke();
    }
    if (state.wrong >= 2){
      // Body
      ctx.beginPath();
      ctx.moveTo(cx, 0.37 * H); ctx.lineTo(cx, 0.62 * H);
      ctx.stroke();
    }
    if (state.wrong >= 3){
      // Left arm
      ctx.beginPath();
      ctx.moveTo(cx, 0.45 * H); ctx.lineTo(0.55 * W, 0.55 * H);
      ctx.stroke();
    }
    if (state.wrong >= 4){
      // Right arm
      ctx.beginPath();
      ctx.moveTo(cx, 0.45 * H); ctx.lineTo(0.75 * W, 0.55 * H);
      ctx.stroke();
    }
    if (state.wrong >= 5){
      // Left leg
      ctx.beginPath();
      ctx.moveTo(cx, 0.62 * H); ctx.lineTo(0.55 * W, 0.78 * H);
      ctx.stroke();
    }
    if (state.wrong >= 6){
      // Right leg
      ctx.beginPath();
      ctx.moveTo(cx, 0.62 * H); ctx.lineTo(0.75 * W, 0.78 * H);
      ctx.stroke();
      // X eyes on death
      ctx.strokeStyle = '#ff4848';
      ctx.shadowColor = '#ff4848';
      ctx.lineWidth = 2.5 * dpr;
      const exr = 0.018 * H;
      [[cx - 0.025*H, 0.295*H], [cx + 0.025*H, 0.295*H]].forEach(([ex, ey]) => {
        ctx.beginPath();
        ctx.moveTo(ex - exr, ey - exr); ctx.lineTo(ex + exr, ey + exr);
        ctx.moveTo(ex + exr, ey - exr); ctx.lineTo(ex - exr, ey + exr);
        ctx.stroke();
      });
    }
    ctx.shadowBlur = 0;
  }
  function renderAll(){
    renderWord();
    renderWrong();
    renderKeyboard();
    renderStats();
    renderGallows();
    renderEndOverlay();
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }
  function escapeAttr(s){ return escapeHtml(s); }

  // ── Custom-category modal ──
  const modal = document.getElementById('catModal');
  const catNameInput = document.getElementById('catName');
  const catWordsInput = document.getElementById('catWords');
  document.getElementById('addCatBtn').addEventListener('click', () => {
    catNameInput.value = '';
    catWordsInput.value = '';
    modal.classList.add('show');
    modal.setAttribute('aria-hidden', 'false');
    setTimeout(() => catNameInput.focus(), 50);
  });
  document.getElementById('modalCancel').addEventListener('click', () => {
    modal.classList.remove('show');
    modal.setAttribute('aria-hidden', 'true');
  });
  document.getElementById('modalSave').addEventListener('click', () => {
    const name = (catNameInput.value || '').trim().slice(0, 32);
    if (!name){ alert('please give the category a name'); return; }
    const words = (catWordsInput.value || '')
      .split('\n')
      .map(w => w.trim().toUpperCase().replace(/[^A-Z ]/g, ''))
      .filter(w => w.length >= 2 && w.length <= 30);
    if (words.length < 2){ alert('need at least 2 words (letters + spaces only, 2-30 chars)'); return; }
    // Generate a unique id
    let id = 'custom-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 20);
    let suffix = 1;
    while (state.categories.find(c => c.id === id)){
      id = 'custom-' + Date.now() + '-' + suffix++;
    }
    state.categories.push({ id, name, words, custom: true });
    state.currentCatId = id;
    saveState();
    renderCats();
    newRound();
    modal.classList.remove('show');
    modal.setAttribute('aria-hidden', 'true');
  });
  modal.addEventListener('click', e => {
    if (e.target === modal){
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
    }
  });

  // ── Wire game controls ──
  document.getElementById('newBtn').addEventListener('click', newRound);
  document.getElementById('overlayNewBtn').addEventListener('click', newRound);
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (modal.classList.contains('show')){
      if (e.key === 'Escape'){
        modal.classList.remove('show');
        modal.setAttribute('aria-hidden', 'true');
      }
      return;
    }
    if (/^[a-zA-Z]$/.test(e.key)){
      guess(e.key.toUpperCase());
    } else if (e.key === 'Enter' && state.status !== 'playing'){
      newRound();
    }
  });
  window.addEventListener('resize', renderGallows);

  // Boot
  loadState();
  renderCats();
  newRound();
})();
</script>
</body>
</html>
