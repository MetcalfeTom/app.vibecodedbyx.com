<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>block brawl · neon 3d fighting</title>
<meta name="description" content="A low-poly 3D fighting sandbox in three.js. Two blocky avatars, punches, blocks, a neon-grid arena, and a side-view camera." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A5%8A" />
<meta property="og:title" content="Block Brawl — neon 3D fighting" />
<meta property="og:description" content="Two blocky avatars, punches, blocks, a neon-grid arena. WASD + F to fight." />
<meta property="og:url" content="https://sloppy.live/block-brawl/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/low%20poly%20blocky%20cube%20fighters%20on%20neon%20synthwave%20grid%20arena%20pink%20cyan%20glow%20side%20view%203d?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Major+Mono+Display&family=Audiowide&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-deep: #050018;
    --pink: #ff2d96;
    --cyan: #5ff5ff;
    --magenta: #ff5ec3;
    --yellow: #ffe44a;
    --red: #ff4262;
    --violet: #b894ff;
    --bone: #fff4f6;
    --ink-soft: rgba(244, 240, 246, 0.65);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--bone);
    font-family: 'Share Tech Mono', monospace;
    user-select: none;
    touch-action: none;
  }
  #stage {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255, 45, 150, 0.32) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(95, 245, 255, 0.28) 0%, transparent 60%),
      linear-gradient(180deg, #06022e 0%, #100632 50%, #ff2885 100%);
  }
  canvas { display: block; }
  /* keep three.js's canvas behind the HUD overlays */
  #three-canvas { position: absolute; inset: 0; z-index: 1; }
  .ui { position: fixed; z-index: 5; pointer-events: none; }
  .ui > * { pointer-events: auto; }

  header.ui {
    top: 0.9rem; left: 0; right: 0;
    text-align: center;
    line-height: 1;
  }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.9rem, 2.3vw, 1.4rem);
    letter-spacing: 0.08em;
    color: var(--bone);
    text-shadow:
      3px 0 0 var(--pink),
      -3px 0 0 var(--cyan),
      0 0 18px rgba(255, 45, 150, 0.5),
      0 0 24px rgba(95, 245, 255, 0.5);
  }
  h1 .block { color: var(--pink); text-shadow: 0 0 14px rgba(255, 45, 150, 0.9); }
  h1 .brawl { color: var(--cyan); text-shadow: 0 0 14px rgba(95, 245, 255, 0.9); }
  .sub {
    font-family: 'Major Mono Display', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.32em;
    text-transform: lowercase;
    color: var(--ink-soft);
    margin-top: 0.5rem;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
  }

  /* ── HP / hud bars ────────────────────────────────────────── */
  .hp-row {
    position: fixed;
    top: 4.4rem; left: 1rem; right: 1rem;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1rem;
    z-index: 4;
    pointer-events: none;
  }
  .hp-bar {
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 4px;
    padding: 0.4rem 0.6rem;
    box-shadow: 0 0 18px rgba(255, 255, 255, 0.05);
    min-width: 0;
  }
  .hp-bar .name {
    font-family: 'Audiowide', cursive;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-shadow: 0 0 8px currentColor;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.4rem;
  }
  .hp-bar .name .pct {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.66rem;
    color: var(--ink-soft);
    text-shadow: none;
  }
  .hp-bar .track {
    height: 0.7rem;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 3px;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.7);
  }
  .hp-bar .fill {
    height: 100%;
    width: 100%;
    box-shadow: 0 0 12px currentColor;
    transition: width 0.18s ease;
  }
  .hp-bar.p1 { color: var(--cyan); }
  .hp-bar.p1 .fill { background: linear-gradient(90deg, var(--cyan), var(--violet)); }
  .hp-bar.p2 { color: var(--pink); text-align: right; }
  .hp-bar.p2 .fill { background: linear-gradient(90deg, var(--violet), var(--pink)); }
  .hp-bar.p2 .name { flex-direction: row-reverse; }

  .vs {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.95rem;
    color: var(--yellow);
    text-shadow: 0 0 14px rgba(255, 228, 74, 0.85), 2px 0 0 var(--red);
    align-self: center;
    padding: 0 0.4rem;
  }

  /* ── round timer + status ─────────────────────────────────── */
  .timer {
    position: fixed;
    top: 9rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    font-family: 'Press Start 2P', monospace;
    font-size: 1.4rem;
    color: var(--yellow);
    text-shadow: 0 0 12px rgba(255, 228, 74, 0.7), 2px 0 0 var(--red);
    pointer-events: none;
  }
  .timer.low { color: var(--red); text-shadow: 0 0 16px rgba(255, 66, 98, 0.9); }

  /* ── center text overlays (start / ko) ────────────────────── */
  .center-text {
    position: fixed;
    inset: 0;
    z-index: 6;
    display: grid;
    place-items: center;
    pointer-events: none;
    text-align: center;
    background: radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.45), transparent 70%);
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .center-text.show { opacity: 1; }
  .center-text h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(2.4rem, 6vw, 4rem);
    color: var(--bone);
    text-shadow:
      4px 0 0 var(--pink),
      -4px 0 0 var(--cyan),
      0 0 24px rgba(255, 255, 255, 0.6);
    letter-spacing: 0.04em;
    margin-bottom: 0.6rem;
    animation: textPulse 1.4s ease-in-out infinite;
  }
  @keyframes textPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .center-text p {
    font-family: 'Audiowide', cursive;
    color: var(--cyan);
    font-size: 0.85rem;
    letter-spacing: 0.22em;
    text-shadow: 0 0 12px rgba(95, 245, 255, 0.8);
  }

  /* ── controls hint ────────────────────────────────────────── */
  .controls {
    position: fixed;
    bottom: 1rem; left: 1rem;
    z-index: 4;
    pointer-events: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.74rem;
    color: var(--ink-soft);
    line-height: 1.6;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
  }
  .controls .key {
    display: inline-block;
    border: 1px solid rgba(95, 245, 255, 0.4);
    color: var(--cyan);
    padding: 0.05rem 0.42rem;
    margin: 0 0.18rem;
    border-radius: 3px;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.6rem;
    text-shadow: 0 0 6px rgba(95, 245, 255, 0.6);
  }

  /* ── touch controls ───────────────────────────────────────── */
  .touchpad {
    position: fixed;
    inset: auto 0 0 0;
    z-index: 7;
    display: none;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 0.8rem 0.8rem;
    pointer-events: none;
  }
  .touchpad.show { display: flex; }
  .touchpad .cluster {
    display: flex;
    gap: 0.5rem;
    pointer-events: none;
  }
  .touchpad .pad {
    pointer-events: auto;
    width: 4.4rem; height: 4.4rem;
    border-radius: 50%;
    border: 3px solid var(--cyan);
    background: rgba(8, 4, 28, 0.65);
    color: var(--cyan);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.9rem;
    display: grid;
    place-items: center;
    box-shadow: 0 0 18px rgba(95, 245, 255, 0.5), inset 0 0 12px rgba(95, 245, 255, 0.16);
    -webkit-tap-highlight-color: transparent;
  }
  .touchpad .pad.pink   { border-color: var(--pink); color: var(--pink); box-shadow: 0 0 18px rgba(255, 45, 150, 0.5), inset 0 0 12px rgba(255, 45, 150, 0.16); }
  .touchpad .pad.yellow { border-color: var(--yellow); color: var(--yellow); box-shadow: 0 0 18px rgba(255, 228, 74, 0.5), inset 0 0 12px rgba(255, 228, 74, 0.16); font-size: 0.7rem; }
  .touchpad .pad.pressed { transform: scale(0.94); background: rgba(95, 245, 255, 0.25); }

  /* footer fingerprint */
  footer {
    position: fixed;
    bottom: 0.7rem; right: 1rem;
    z-index: 4;
    pointer-events: none;
    font-family: 'Major Mono Display', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
  }

  @media (hover: none) and (pointer: coarse) {
    .touchpad { display: flex; }
    .controls { display: none; }
  }
  @media (max-width: 720px) {
    .hp-row { top: 4rem; }
    .hp-bar .name { font-size: 0.66rem; }
    .vs { font-size: 0.78rem; }
    .timer { top: 8.6rem; font-size: 1rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    .center-text h2 { animation: none; }
  }
</style>
</head>
<body>

<div id="stage" role="application" aria-label="3D fighting sandbox. Move with A and D, jump with W, punch with F, block by holding Space. Defeat the red AI opponent.">
  <canvas id="three-canvas"></canvas>
</div>

<header class="ui">
  <h1><span class="block">BLOCK</span> · <span class="brawl">BRAWL</span></h1>
  <p class="sub">·· low · poly · neon · arena ··</p>
</header>

<div class="hp-row" aria-live="polite">
  <div class="hp-bar p1">
    <div class="name"><span>SLOPPY · P1</span><span class="pct" id="p1Pct">100%</span></div>
    <div class="track"><div class="fill" id="p1Fill"></div></div>
  </div>
  <div class="vs">VS</div>
  <div class="hp-bar p2">
    <div class="name"><span>VOID · CPU</span><span class="pct" id="p2Pct">100%</span></div>
    <div class="track"><div class="fill" id="p2Fill"></div></div>
  </div>
</div>

<div class="timer" id="timer">90</div>

<div class="controls">
  <span class="key">A</span><span class="key">D</span> move &nbsp;
  <span class="key">W</span> jump &nbsp;
  <span class="key">F</span> punch &nbsp;
  <span class="key">SPACE</span> block
</div>

<div class="center-text show" id="startOverlay">
  <div>
    <h2>READY?</h2>
    <p>press space to fight</p>
  </div>
</div>

<div class="center-text" id="endOverlay" aria-hidden="true">
  <div>
    <h2 id="endTitle">K.O.</h2>
    <p>press space to rematch</p>
  </div>
</div>

<div class="touchpad" id="touchpad" aria-hidden="true">
  <div class="cluster">
    <button class="pad" id="padLeft" aria-label="move left">◀</button>
    <button class="pad" id="padRight" aria-label="move right">▶</button>
    <button class="pad" id="padJump" aria-label="jump">▲</button>
  </div>
  <div class="cluster">
    <button class="pad yellow" id="padBlock" aria-label="block">BLOCK</button>
    <button class="pad pink" id="padPunch" aria-label="punch">PUNCH</button>
  </div>
</div>

<footer>three.js r128 · raycast-free combat</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═════════════════════════════════════════════════════════════════════════
// block brawl — 3D side-view neon fighting sandbox
// two low-poly blocky avatars on a neon-grid arena. left fighter = WASD+F+Space.
// right fighter = simple state-machine AI. punches and blocks resolve via
// distance + arm-extension checks, no raycasting needed.
// ═════════════════════════════════════════════════════════════════════════

if (typeof THREE === 'undefined'){
  document.body.innerHTML = '<div style="color:#ff5ec3;font-family:monospace;padding:2rem">three.js failed to load. check connection.</div>';
  throw new Error('three.js missing');
}

const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x100632, 80, 320);

// camera: side view, slightly elevated
const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(0, 22, 86);
camera.lookAt(0, 10, 0);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── LIGHTING ────────────────────────────────────────────────────────────
const amb = new THREE.AmbientLight(0xb29cff, 0.45);
scene.add(amb);
const sun = new THREE.DirectionalLight(0xfff0ee, 0.85);
sun.position.set(20, 60, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -40;
sun.shadow.camera.right = 40;
sun.shadow.camera.top = 40;
sun.shadow.camera.bottom = -40;
sun.shadow.camera.near = 5;
sun.shadow.camera.far = 120;
scene.add(sun);
// pink and cyan accent point lights at the back corners
const pinkLight = new THREE.PointLight(0xff2d96, 1.4, 140, 1.4);
pinkLight.position.set(-40, 18, -20);
scene.add(pinkLight);
const cyanLight = new THREE.PointLight(0x5ff5ff, 1.4, 140, 1.4);
cyanLight.position.set(40, 18, -20);
scene.add(cyanLight);

// ── NEON GRID ARENA ─────────────────────────────────────────────────────
// floor — dark base, then a grid helper on top for the neon lines
const floorGeo = new THREE.PlaneGeometry(200, 200);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0a0428,
  metalness: 0.2,
  roughness: 0.4,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
floor.receiveShadow = true;
scene.add(floor);
// pink + cyan checkered grid
const gridA = new THREE.GridHelper(200, 40, 0xff2d96, 0xff2d96);
gridA.position.y = 0.01;
gridA.material.transparent = true;
gridA.material.opacity = 0.42;
scene.add(gridA);
const gridB = new THREE.GridHelper(200, 8, 0x5ff5ff, 0x5ff5ff);
gridB.position.y = 0.02;
gridB.material.transparent = true;
gridB.material.opacity = 0.70;
scene.add(gridB);

// arena rim — four thin glowing beams marking the fight zone
const ARENA_HALF = 38;     // fighters clamped to ±ARENA_HALF on X
function neonBeam(x1, x2, color){
  const geo = new THREE.BoxGeometry(x2 - x1, 1.6, 1.6);
  const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.85 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set((x1 + x2) / 2, 0.6, 0);
  return m;
}
const beamLeft  = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.6, 80), new THREE.MeshBasicMaterial({ color: 0xff2d96 }));
beamLeft.position.set(-ARENA_HALF - 0.5, 0.6, 0);
scene.add(beamLeft);
const beamRight = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.6, 80), new THREE.MeshBasicMaterial({ color: 0x5ff5ff }));
beamRight.position.set(ARENA_HALF + 0.5, 0.6, 0);
scene.add(beamRight);
const beamFront = new THREE.Mesh(new THREE.BoxGeometry(ARENA_HALF * 2 + 2, 1.6, 1.6), new THREE.MeshBasicMaterial({ color: 0xb894ff }));
beamFront.position.set(0, 0.6, 40);
scene.add(beamFront);
const beamBack  = new THREE.Mesh(new THREE.BoxGeometry(ARENA_HALF * 2 + 2, 1.6, 1.6), new THREE.MeshBasicMaterial({ color: 0xffe44a }));
beamBack.position.set(0, 0.6, -40);
scene.add(beamBack);

// distant skyline silhouette — a row of dark "buildings" behind the arena
const skylineGroup = new THREE.Group();
for (let i = 0; i < 18; i++){
  const w = 6 + Math.random() * 12;
  const h = 18 + Math.random() * 38;
  const buildingMat = new THREE.MeshBasicMaterial({ color: 0x0a0418 });
  const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, 6), buildingMat);
  b.position.set((i - 9) * 13, h / 2, -120);
  skylineGroup.add(b);
  // window lights — a few magenta/cyan rectangles on the face
  for (let j = 0; j < 4; j++){
    const wx = (Math.random() - 0.5) * (w - 2);
    const wy = 4 + Math.random() * (h - 8);
    const winMat = new THREE.MeshBasicMaterial({
      color: Math.random() < 0.5 ? 0xff2d96 : 0x5ff5ff,
      transparent: true,
      opacity: 0.6 + Math.random() * 0.3,
    });
    const win = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.1), winMat);
    win.position.set(wx, wy, 3.05);
    b.add(win);
  }
}
scene.add(skylineGroup);

// distant synthwave sun
const sunDisc = new THREE.Mesh(
  new THREE.CircleGeometry(36, 32),
  new THREE.MeshBasicMaterial({ color: 0xff2d96 })
);
sunDisc.position.set(0, 30, -180);
scene.add(sunDisc);
// stripes across the sun
for (let i = 1; i < 6; i++){
  const stripe = new THREE.Mesh(
    new THREE.PlaneGeometry(80, 2.4),
    new THREE.MeshBasicMaterial({ color: 0x100632 })
  );
  stripe.position.set(0, 30 + 28 - i * 8, -179.9);
  scene.add(stripe);
}

// ── FIGHTER FACTORY ────────────────────────────────────────────────────
// Build a low-poly blocky humanoid out of BoxGeometry parts. Returns a
// THREE.Group containing references to the limb sub-groups so we can
// rotate them for punch/block animations.
function makeFighter(opts){
  const { bodyColor, accentColor, isP2 } = opts;
  const fighter = new THREE.Group();
  fighter.position.y = 0;
  // userData carries the gameplay state — hp, animator timers, facing, etc.
  fighter.userData = {
    hp: 100,
    facing: isP2 ? -1 : 1,        // +1 faces right (toward +x)
    vx: 0, vy: 0,
    onGround: true,
    isBlocking: false,
    punchT: 0,                     // 0 when idle; counts down per frame
    PUNCH_DURATION: 0.32,
    punchCooldown: 0,
    canHit: false,                 // becomes true at the active frame mid-punch
    hitThisPunch: false,
    walkPhase: 0,
    hurtFlash: 0,
    isP2,
  };

  const mats = {
    body:    new THREE.MeshStandardMaterial({ color: bodyColor, metalness: 0.25, roughness: 0.42, emissive: bodyColor, emissiveIntensity: 0.18 }),
    head:    new THREE.MeshStandardMaterial({ color: bodyColor, metalness: 0.25, roughness: 0.42, emissive: bodyColor, emissiveIntensity: 0.22 }),
    limb:    new THREE.MeshStandardMaterial({ color: accentColor, metalness: 0.30, roughness: 0.45, emissive: accentColor, emissiveIntensity: 0.30 }),
    foot:    new THREE.MeshStandardMaterial({ color: 0x0a0418, roughness: 0.85 }),
    face:    new THREE.MeshBasicMaterial({ color: 0xfff4f6 }),
    glow:    new THREE.MeshBasicMaterial({ color: accentColor, transparent: true, opacity: 0.85 }),
  };
  fighter.userData.mats = mats;

  // ── torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(6, 8, 3), mats.body);
  torso.position.y = 12;
  torso.castShadow = true;
  fighter.add(torso);
  fighter.userData.torso = torso;

  // chest accent stripe
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(6.05, 1, 3.05), mats.limb);
  stripe.position.set(0, 11, 0);
  torso.add(stripe);
  stripe.position.y = -1;     // local space, relative to torso

  // ── head
  const head = new THREE.Mesh(new THREE.BoxGeometry(4.4, 4.4, 4.0), mats.head);
  head.position.y = 19;
  head.castShadow = true;
  fighter.add(head);
  fighter.userData.head = head;
  // eyes — 2 small bright cubes
  const eyeGeo = new THREE.BoxGeometry(0.6, 0.6, 0.1);
  const leftEye = new THREE.Mesh(eyeGeo, mats.face);
  const rightEye = new THREE.Mesh(eyeGeo, mats.face);
  leftEye.position.set(-1, 0.4, 2.01);
  rightEye.position.set(1, 0.4, 2.01);
  head.add(leftEye);
  head.add(rightEye);
  // mouth bar
  const mouth = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.36, 0.1), mats.glow);
  mouth.position.set(0, -1.0, 2.01);
  head.add(mouth);

  // ── arms — each arm is a Group pivoting at the shoulder
  function makeArm(side){
    // side: -1 = left (from fighter's POV), +1 = right
    const arm = new THREE.Group();
    arm.position.set(side * 3.4, 15.4, 0);
    // upper arm
    const upper = new THREE.Mesh(new THREE.BoxGeometry(2, 5, 2), mats.body);
    upper.position.y = -2.5;
    upper.castShadow = true;
    arm.add(upper);
    // forearm group at the elbow
    const fore = new THREE.Group();
    fore.position.y = -5;
    arm.add(fore);
    const foreMesh = new THREE.Mesh(new THREE.BoxGeometry(2, 4.5, 2), mats.limb);
    foreMesh.position.y = -2.25;
    foreMesh.castShadow = true;
    fore.add(foreMesh);
    // fist
    const fist = new THREE.Mesh(new THREE.BoxGeometry(2.6, 2.6, 2.6), mats.limb);
    fist.position.y = -5.3;
    fist.castShadow = true;
    fore.add(fist);
    // sub-state for punch animator
    arm.userData = { side, fore, fist, baseRotX: 0, baseRotZ: side * 0.05 };
    arm.rotation.z = arm.userData.baseRotZ;
    return arm;
  }
  const leftArm  = makeArm(-1);
  const rightArm = makeArm(+1);
  fighter.add(leftArm);
  fighter.add(rightArm);
  fighter.userData.leftArm = leftArm;
  fighter.userData.rightArm = rightArm;

  // ── legs
  function makeLeg(side){
    const leg = new THREE.Group();
    leg.position.set(side * 1.5, 8, 0);
    const upper = new THREE.Mesh(new THREE.BoxGeometry(2.5, 5, 2.5), mats.body);
    upper.position.y = -2.5;
    upper.castShadow = true;
    leg.add(upper);
    const shin = new THREE.Group();
    shin.position.y = -5;
    const shinMesh = new THREE.Mesh(new THREE.BoxGeometry(2.4, 4.5, 2.4), mats.limb);
    shinMesh.position.y = -2.25;
    shinMesh.castShadow = true;
    shin.add(shinMesh);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(2.6, 1.2, 3.4), mats.foot);
    foot.position.y = -5.2;
    foot.castShadow = true;
    shin.add(foot);
    leg.add(shin);
    leg.userData = { side, shin, baseRotX: 0 };
    return leg;
  }
  const leftLeg  = makeLeg(-1);
  const rightLeg = makeLeg(+1);
  fighter.add(leftLeg);
  fighter.add(rightLeg);
  fighter.userData.leftLeg = leftLeg;
  fighter.userData.rightLeg = rightLeg;

  // block guard — a faint shield mesh in front of the torso that shows on block
  const shieldMat = new THREE.MeshBasicMaterial({ color: 0xffe44a, transparent: true, opacity: 0 });
  const shield = new THREE.Mesh(new THREE.PlaneGeometry(8, 9), shieldMat);
  shield.position.set(0, 12, 2.5);
  fighter.add(shield);
  fighter.userData.shield = shield;
  fighter.userData.shieldMat = shieldMat;

  fighter.scale.set(0.9, 0.9, 0.9);
  return fighter;
}

const p1 = makeFighter({ bodyColor: 0x5ff5ff, accentColor: 0xb894ff, isP2: false });
p1.position.set(-15, 0, 0);
p1.rotation.y = Math.PI / 2;   // face +x (toward the right side)
scene.add(p1);

const p2 = makeFighter({ bodyColor: 0xff2d96, accentColor: 0xff4262, isP2: true });
p2.position.set(15, 0, 0);
p2.rotation.y = -Math.PI / 2;  // face -x
scene.add(p2);

// ── PARTICLES (spark burst on hit) ─────────────────────────────────────
const sparks = [];   // {mesh, vx, vy, vz, life, age}
function sparkBurst(x, y, z, color){
  const count = 14;
  for (let i = 0; i < count; i++){
    const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, z);
    scene.add(m);
    const ang = Math.random() * Math.PI * 2;
    const sp = 12 + Math.random() * 22;
    sparks.push({
      mesh: m, mat,
      vx: Math.cos(ang) * sp,
      vy: 6 + Math.random() * 12,
      vz: Math.sin(ang) * sp,
      life: 0.45 + Math.random() * 0.35,
      age: 0,
    });
  }
}

// ── AUDIO (Web Audio synth — punch thuds + KO chord) ─────────────────
let actx = null;
function ensureAudio(){
  if (actx) return actx;
  try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch(e){ return null; }
  return actx;
}
function sfxPunch(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  // low-freq thud + bandpass noise crack
  const o = a.createOscillator();
  const g = a.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(160, t);
  o.frequency.exponentialRampToValueAtTime(36, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.32, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + 0.24);
  // noise crack
  const len = Math.floor(a.sampleRate * 0.08);
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.6);
  const src = a.createBufferSource(); src.buffer = buf;
  const bp = a.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 1.2;
  const ng = a.createGain(); ng.gain.value = 0.22;
  src.connect(bp); bp.connect(ng); ng.connect(a.destination);
  src.start(t); src.stop(t + 0.1);
}
function sfxBlock(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator();
  const g = a.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(420, t);
  o.frequency.exponentialRampToValueAtTime(620, t + 0.14);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.18, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + 0.18);
}
function sfxKO(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  // chiptune descending chord
  let f = 480;
  for (let i = 0; i < 5; i++){
    const o = a.createOscillator();
    const g = a.createGain();
    o.type = 'square';
    o.frequency.value = f;
    const dt = i * 0.16;
    g.gain.setValueAtTime(0.0001, t + dt);
    g.gain.exponentialRampToValueAtTime(0.18, t + dt + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dt + 0.2);
    o.connect(g); g.connect(a.destination);
    o.start(t + dt); o.stop(t + dt + 0.22);
    f *= 0.75;
  }
}
function sfxWhoosh(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  const len = Math.floor(a.sampleRate * 0.18);
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
  const src = a.createBufferSource(); src.buffer = buf;
  const bp = a.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 900; bp.Q.value = 0.7;
  const g = a.createGain(); g.gain.value = 0.06;
  src.connect(bp); bp.connect(g); g.connect(a.destination);
  src.start(t); src.stop(t + 0.2);
}

// ── INPUT ────────────────────────────────────────────────────────────
const input = { left: 0, right: 0, jump: 0, punch: 0, block: 0 };
let punchJustPressed = false;
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  switch (e.code){
    case 'ArrowLeft': case 'KeyA':  input.left = 1; break;
    case 'ArrowRight': case 'KeyD': input.right = 1; break;
    case 'ArrowUp': case 'KeyW': case 'Space':
      if (gameState === 'menu' || gameState === 'ended'){
        e.preventDefault();
        ensureAudio();
        if (actx && actx.state === 'suspended') actx.resume();
        startRound();
        return;
      }
      if (e.code === 'Space'){ input.block = 1; e.preventDefault(); }
      else                    input.jump = 1;
      break;
    case 'KeyF': input.punch = 1; punchJustPressed = true; break;
  }
});
document.addEventListener('keyup', (e) => {
  switch (e.code){
    case 'ArrowLeft': case 'KeyA': input.left = 0; break;
    case 'ArrowRight': case 'KeyD': input.right = 0; break;
    case 'ArrowUp': case 'KeyW': input.jump = 0; break;
    case 'Space': input.block = 0; break;
    case 'KeyF': input.punch = 0; break;
  }
});

function bindTouch(el, set, isPunch){
  if (!el) return;
  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (gameState === 'menu' || gameState === 'ended'){
      ensureAudio(); if (actx && actx.state === 'suspended') actx.resume();
      startRound(); return;
    }
    if (isPunch) punchJustPressed = true;
    set(1); el.classList.add('pressed');
  }, { passive: false });
  el.addEventListener('touchend',   (e) => { e.preventDefault(); set(0); el.classList.remove('pressed'); }, { passive: false });
  el.addEventListener('mousedown',  (e) => {
    e.preventDefault();
    if (gameState === 'menu' || gameState === 'ended'){
      ensureAudio(); if (actx && actx.state === 'suspended') actx.resume();
      startRound(); return;
    }
    if (isPunch) punchJustPressed = true;
    set(1); el.classList.add('pressed');
  });
  el.addEventListener('mouseup',    (e) => { e.preventDefault(); set(0); el.classList.remove('pressed'); });
  el.addEventListener('mouseleave', () => { set(0); el.classList.remove('pressed'); });
}
bindTouch(document.getElementById('padLeft'),  (v) => input.left = v, false);
bindTouch(document.getElementById('padRight'), (v) => input.right = v, false);
bindTouch(document.getElementById('padJump'),  (v) => input.jump = v, false);
bindTouch(document.getElementById('padPunch'), (v) => input.punch = v, true);
bindTouch(document.getElementById('padBlock'), (v) => input.block = v, false);

// ── GAME STATE ──────────────────────────────────────────────────────
let gameState = 'menu';     // menu | playing | ended
let roundTime = 90;
const startOverlay = document.getElementById('startOverlay');
const endOverlay = document.getElementById('endOverlay');
const endTitle = document.getElementById('endTitle');
const timerEl = document.getElementById('timer');

function startRound(){
  // reset both fighters
  p1.position.set(-15, 0, 0);
  p2.position.set(15, 0, 0);
  p1.rotation.y =  Math.PI / 2;
  p2.rotation.y = -Math.PI / 2;
  for (const f of [p1, p2]){
    f.userData.hp = 100;
    f.userData.vx = 0; f.userData.vy = 0;
    f.userData.onGround = true;
    f.userData.isBlocking = false;
    f.userData.punchT = 0;
    f.userData.punchCooldown = 0;
    f.userData.hitThisPunch = false;
    f.userData.hurtFlash = 0;
  }
  roundTime = 90;
  gameState = 'playing';
  startOverlay.classList.remove('show');
  endOverlay.classList.remove('show');
  updateHud();
}

function endRound(winner){
  if (gameState === 'ended') return;
  gameState = 'ended';
  if (winner === 'p1') endTitle.textContent = 'YOU WIN';
  else if (winner === 'p2') endTitle.textContent = 'K.O.';
  else endTitle.textContent = 'TIME OUT';
  endOverlay.classList.add('show');
  sfxKO();
}

function updateHud(){
  const p1Pct = Math.max(0, p1.userData.hp);
  const p2Pct = Math.max(0, p2.userData.hp);
  document.getElementById('p1Fill').style.width = p1Pct + '%';
  document.getElementById('p2Fill').style.width = p2Pct + '%';
  document.getElementById('p1Pct').textContent = Math.round(p1Pct) + '%';
  document.getElementById('p2Pct').textContent = Math.round(p2Pct) + '%';
  timerEl.textContent = Math.ceil(roundTime);
  timerEl.classList.toggle('low', roundTime < 15);
}

// ── FIGHTER UPDATE ─────────────────────────────────────────────────
const GRAVITY = -80;
const MOVE_SPEED = 18;
const JUMP_VEL = 28;

function tryPunch(fighter){
  if (fighter.userData.punchT > 0 || fighter.userData.punchCooldown > 0) return;
  fighter.userData.punchT = fighter.userData.PUNCH_DURATION;
  fighter.userData.punchCooldown = fighter.userData.PUNCH_DURATION + 0.18;
  fighter.userData.hitThisPunch = false;
  sfxWhoosh();
}

function updateFighter(fighter, dt, opp, isPlayer){
  const u = fighter.userData;

  // ── input → desired actions ──
  let moveDir = 0;
  let wantsJump = false;
  let wantsPunch = false;
  let wantsBlock = false;
  if (isPlayer && gameState === 'playing'){
    moveDir = input.right - input.left;
    wantsJump = !!input.jump && u.onGround;
    wantsPunch = punchJustPressed;
    wantsBlock = !!input.block;
  } else if (gameState === 'playing'){
    // simple AI: walk toward player, punch when close, block sometimes
    const dx = opp.position.x - fighter.position.x;
    const dist = Math.abs(dx);
    if (dist > 7){
      moveDir = dx > 0 ? 1 : -1;
    } else if (dist > 5.5){
      moveDir = dx > 0 ? 0.6 : -0.6;
    } else {
      moveDir = 0;
    }
    // AI block timing — block when player's arm is extended (i.e. punching)
    const oppPunching = opp.userData.punchT > 0;
    if (oppPunching && dist < 12){
      // 65% chance to be in block during enemy punch active window
      wantsBlock = Math.random() < (u.aiBlockBias = (u.aiBlockBias ?? 0.65));
    } else {
      wantsBlock = false;
    }
    // AI punch — random throws when in range
    if (dist < 7.5 && u.punchT === 0 && u.punchCooldown <= 0 && Math.random() < 0.045){
      wantsPunch = true;
    }
    // AI jump — rare, when opp jumps
    if (opp.userData.vy > 5 && u.onGround && Math.random() < 0.02){
      wantsJump = true;
    }
  }

  // facing — always face the opponent
  u.facing = (opp.position.x >= fighter.position.x) ? 1 : -1;
  // rotate the model to face the opponent (smooth lerp)
  const targetRotY = u.facing > 0 ? Math.PI / 2 : -Math.PI / 2;
  fighter.rotation.y += (targetRotY - fighter.rotation.y) * Math.min(1, dt * 12);

  // block
  u.isBlocking = wantsBlock && u.onGround && u.punchT === 0;
  u.shieldMat.opacity = Math.max(0, u.shieldMat.opacity - dt * 5);
  if (u.isBlocking) u.shieldMat.opacity = 0.45 + Math.sin(performance.now() * 0.025) * 0.1;

  // movement
  if (u.isBlocking) moveDir *= 0.25;
  u.vx = moveDir * MOVE_SPEED;
  // jump
  if (wantsJump){
    u.vy = JUMP_VEL;
    u.onGround = false;
  }
  // gravity
  u.vy += GRAVITY * dt;
  fighter.position.x += u.vx * dt;
  fighter.position.y += u.vy * dt;
  // arena bounds (X)
  if (fighter.position.x < -ARENA_HALF){ fighter.position.x = -ARENA_HALF; u.vx = 0; }
  if (fighter.position.x > +ARENA_HALF){ fighter.position.x = +ARENA_HALF; u.vx = 0; }
  // ground
  if (fighter.position.y <= 0){
    fighter.position.y = 0;
    u.vy = 0;
    u.onGround = true;
  } else {
    u.onGround = false;
  }

  // punch
  if (wantsPunch) tryPunch(fighter);
  if (u.punchT > 0){
    u.punchT -= dt;
    if (u.punchT < 0) u.punchT = 0;
    // mid-punch active window — check for hits
    const progress = 1 - u.punchT / u.PUNCH_DURATION;
    if (progress > 0.25 && progress < 0.6 && !u.hitThisPunch){
      // resolve hit: opp center vs our fist position
      const fistOffset = 5 * u.facing;  // approximate forward fist reach
      const fistX = fighter.position.x + fistOffset;
      const fistY = fighter.position.y + 14;
      const dx = opp.position.x - fistX;
      const dy = opp.position.y + 12 - fistY;   // opp torso center y ≈ +12
      const d2 = dx * dx + dy * dy;
      if (d2 < 36){  // hit radius 6
        u.hitThisPunch = true;
        const oppU = opp.userData;
        if (oppU.isBlocking){
          oppU.hp -= 3;   // chip damage through block
          sfxBlock();
          sparkBurst(opp.position.x - u.facing * 2.5, 12, 0, 0xffe44a);
          oppU.shieldMat.opacity = 1;
        } else {
          oppU.hp -= 10 + Math.random() * 4;
          oppU.hurtFlash = 0.25;
          // small knockback
          opp.position.x += u.facing * 0.6;
          sfxPunch();
          sparkBurst(opp.position.x - u.facing * 2.5, 12, 0, u.isP2 ? 0xff2d96 : 0x5ff5ff);
          // brief camera shake via offset on the next render
          camShake = Math.min(0.9, camShake + 0.4);
        }
        if (oppU.hp <= 0){
          oppU.hp = 0;
          endRound(u.isP2 ? 'p2' : 'p1');
        }
      }
    }
  }
  if (u.punchCooldown > 0) u.punchCooldown -= dt;

  // ── animations ──
  // walk cycle phase advances with movement speed
  if (u.onGround) u.walkPhase += Math.abs(moveDir) * dt * 8;
  // legs swing on walk
  const legSwing = Math.sin(u.walkPhase) * 0.5;
  u.leftLeg.rotation.x = legSwing;
  u.rightLeg.rotation.x = -legSwing;

  // punching arm — front arm (the one closer to opponent) animates
  const punchArm = u.facing > 0 ? u.rightArm : u.leftArm;
  const guardArm = u.facing > 0 ? u.leftArm  : u.rightArm;
  // reset arms
  for (const arm of [u.leftArm, u.rightArm]){
    arm.rotation.x = arm.userData.baseRotX;
    arm.rotation.z = arm.userData.baseRotZ;
    arm.userData.fore.rotation.x = 0;
  }
  // walking arm swing
  u.leftArm.rotation.x  += -legSwing * 0.7;
  u.rightArm.rotation.x +=  legSwing * 0.7;
  // active punch — interpolate arm forward + extend forearm
  if (u.punchT > 0){
    const progress = 1 - u.punchT / u.PUNCH_DURATION;
    // ease: out then back
    const k = progress < 0.4
      ? progress / 0.4
      : 1 - (progress - 0.4) / 0.6;
    punchArm.rotation.x = -k * 1.55;   // swing forward (negative X rotation)
    punchArm.userData.fore.rotation.x = -k * 0.35;
  }
  // blocking — both forearms come up across the chest
  if (u.isBlocking){
    u.leftArm.rotation.x  = -0.8;
    u.rightArm.rotation.x = -0.8;
    u.leftArm.rotation.z  = -0.7;
    u.rightArm.rotation.z =  0.7;
    u.leftArm.userData.fore.rotation.x  = -1.4;
    u.rightArm.userData.fore.rotation.x = -1.4;
  }
  // hurt — flash material emissive red briefly
  if (u.hurtFlash > 0){
    u.hurtFlash -= dt;
    const flashK = u.hurtFlash / 0.25;
    u.mats.body.emissiveIntensity = 0.18 + flashK * 1.4;
    u.mats.head.emissiveIntensity = 0.22 + flashK * 1.4;
    if (u.hurtFlash <= 0){
      u.mats.body.emissiveIntensity = 0.18;
      u.mats.head.emissiveIntensity = 0.22;
    }
  }
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────
let last = performance.now();
let camShake = 0;
function frame(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  if (gameState === 'playing'){
    updateFighter(p1, dt, p2, true);
    updateFighter(p2, dt, p1, false);
    punchJustPressed = false;
    roundTime -= dt;
    if (roundTime <= 0){
      roundTime = 0;
      // time-up: higher HP wins
      const w = p1.userData.hp > p2.userData.hp ? 'p1' : (p2.userData.hp > p1.userData.hp ? 'p2' : 'draw');
      endRound(w);
    }
    updateHud();
  }

  // update particles
  for (let i = sparks.length - 1; i >= 0; i--){
    const p = sparks[i];
    p.age += dt;
    if (p.age >= p.life){
      scene.remove(p.mesh);
      p.mat.dispose();
      p.mesh.geometry.dispose();
      sparks.splice(i, 1);
      continue;
    }
    p.vy -= 36 * dt;
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.mesh.position.z += p.vz * dt;
    p.mesh.rotation.x += dt * 8;
    p.mesh.rotation.y += dt * 6;
    p.mat.opacity = 1 - (p.age / p.life);
  }

  // camera follow + shake — center between fighters with shake offset
  const midX = (p1.position.x + p2.position.x) / 2;
  // gently lerp camera toward the midpoint
  camera.position.x += (midX * 0.4 - camera.position.x) * Math.min(1, dt * 2);
  if (camShake > 0){
    camera.position.x += (Math.random() - 0.5) * camShake * 0.8;
    camera.position.y += (Math.random() - 0.5) * camShake * 0.6 + 22 - camera.position.y;
    camShake = Math.max(0, camShake - dt * 4);
  } else {
    camera.position.y += (22 - camera.position.y) * Math.min(1, dt * 4);
  }
  camera.lookAt(midX * 0.3, 10, 0);

  // pulse the accent lights to the music-less beat
  const t = now * 0.001;
  pinkLight.intensity = 1.0 + Math.sin(t * 1.8) * 0.45;
  cyanLight.intensity = 1.0 + Math.sin(t * 1.8 + Math.PI) * 0.45;

  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
updateHud();
</script>
