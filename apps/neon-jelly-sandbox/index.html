<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{
    height:100%;
    background:#08051a;
    color:#e6e0ff;

    -webkit-user-select:none;

  canvas#stage{
    position:fixed; inset:0;

      radial-gradient(80vw 80vh at 50% 60%, #1a0d3a 0%, #08051a 60%, #03020a 100%);

<body>

<canvas id="stage"></canvas>

<div class="toolbar">
  <h2>Neon Jelly<span class="sub">SANDBOX</span></h2>

  <div class="section">

<div id="status">jellies: <b id="jelly-count">0</b> · fps: <b id="fps-val">—</b></div>

<script>
/* =================================================================
   Neon Jelly Sandbox
   Verlet soft-body physics: each jelly is a perimeter ring of mass
   points joined by perimeter springs + center spokes + a couple of
   diagonal braces. Inter-body collision = circle vs circle push
   apart; the spring net does the wobble. Rendered with shadowBlur
   neon glow + a closed bezier through midpoint-smoothed perimeter.
   ================================================================= */

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

/* ── audio (synth) ────────────────────────── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function tone(freq, dur=0.08, type='sine', vol=0.06, delay=0){
  const t0 = audioCtx.currentTime + delay;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function sndPlop(freq){ tone(freq || (420 + Math.random()*240), 0.08, 'triangle', 0.06); tone((freq||420)*0.5, 0.10, 'sine', 0.04, 0.02); }
function sndPop(){ tone(880, 0.05, 'square', 0.05); }
function sndShake(){ tone(180, 0.18, 'sawtooth', 0.10); tone(260, 0.10, 'sine', 0.08, 0.04); }
window.addEventListener('pointerdown', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

/* ── palette ──────────────────────────────── */
const PALETTE = [
  '#ff5ea8',  // hot pink
  '#c060ff',  // violet
  '#00d2ff',  // cyan
  '#4cff80',  // lime
  '#ffd03c',  // amber
  '#ff8050',  // coral
  '#ffffff',  // white
  '#5096ff',  // blue
  '#ff3c64',  // red
  '#80ffea',  // mint
  '#ff60d0',  // magenta
  '#bfff60',  // chartreuse
];
const SHAPES = [
  { id:'blob',   icon:'●', segments:16, irreg:0    },
  { id:'slime',  icon:'~', segments:18, irreg:0.32 },
  { id:'square', icon:'■', segments:16, mode:'square' },
  { id:'star',   icon:'✦', segments:20, mode:'star'   },
];

const ui = {
  color: PALETTE[0],
  shapeIdx: 0,
  size: 38,
  gravity: 0.60,
  bounce: 0.45,
};

/* ── render swatches + shapes ─────────────── */
const swatchEl = document.getElementById('swatches');
PALETTE.forEach((c, i) => {
  const d = document.createElement('div');
  d.className = 'swatch' + (i === 0 ? ' active' : '');
  d.style.background = c;
  d.style.color = c;
  d.style.boxShadow = '0 0 8px ' + c + '88';
  d.addEventListener('click', () => {
    ui.color = c;
    swatchEl.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    d.classList.add('active');
  });
  swatchEl.appendChild(d);
});
const shapeEl = document.getElementById('shapes');
SHAPES.forEach((s, i) => {
  const b = document.createElement('button');
  b.className = 'shape-btn' + (i === 0 ? ' active' : '');
  b.textContent = s.icon;
  b.title = s.id;
  b.addEventListener('click', () => {
    ui.shapeIdx = i;
    shapeEl.querySelectorAll('.shape-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  });
  shapeEl.appendChild(b);
});
// slider wiring
const sizeS = document.getElementById('size-slider'), sizeV = document.getElementById('size-val');
sizeS.addEventListener('input', () => { ui.size = +sizeS.value; sizeV.textContent = ui.size; });
const gravS = document.getElementById('grav-slider'), gravV = document.getElementById('grav-val');
gravS.addEventListener('input', () => { ui.gravity = (+gravS.value) / 100; gravV.textContent = ui.gravity.toFixed(2); });
const bounceS = document.getElementById('bounce-slider'), bounceV = document.getElementById('bounce-val');
bounceS.addEventListener('input', () => { ui.bounce = (+bounceS.value) / 100; bounceV.textContent = ui.bounce.toFixed(2); });

/* ── SoftBody class (verlet integration) ───── */
class SoftBody {
  constructor(cx, cy, radius, shape, color){
    this.color = color;
    this.shape = shape;
    this.r = radius;
    this.points = [];   // {x, y, ox, oy, isCenter}
    this.springs = [];  // {a, b, restLen, stiffness}
    this._jiggleT = 0;
    this._dragPoint = null;
    this._squashAmount = 0;
    const seg = shape.segments;
    // perimeter points
    for (let i = 0; i < seg; i++){
      const a = (i / seg) * Math.PI * 2 - Math.PI/2;
      let rr = radius;
      if (shape.mode === 'square'){
        // square: project onto a square edge
        const cs = Math.cos(a), sn = Math.sin(a);
        const m = Math.max(Math.abs(cs), Math.abs(sn));
        rr = radius / m;
      } else if (shape.mode === 'star'){
        rr = radius * (i % 2 === 0 ? 1.0 : 0.55);
      } else if (shape.irreg){
        rr = radius * (1 + (Math.sin(i * 2.4) * shape.irreg * 0.5));
      }
      const x = cx + Math.cos(a) * rr;
      const y = cy + Math.sin(a) * rr;
      this.points.push({ x, y, ox: x, oy: y });
    }
    // center point
    this.center = { x: cx, y: cy, ox: cx, oy: cy, isCenter: true };
    this.points.push(this.center);
    const centerIdx = this.points.length - 1;
    // perimeter springs
    for (let i = 0; i < seg; i++){
      const j = (i + 1) % seg;
      const a = this.points[i], b = this.points[j];
      const restLen = Math.hypot(a.x - b.x, a.y - b.y);
      this.springs.push({ a: i, b: j, restLen, stiffness: 0.42 });
    }
    // spokes — perimeter to center
    for (let i = 0; i < seg; i++){
      const a = this.points[i];
      const restLen = Math.hypot(a.x - this.center.x, a.y - this.center.y);
      this.springs.push({ a: i, b: centerIdx, restLen, stiffness: 0.18 });
    }
    // diagonal braces
    const half = Math.floor(seg / 2);
    for (let i = 0; i < half; i += 2){
      const j = (i + half) % seg;
      const a = this.points[i], b = this.points[j];
      const restLen = Math.hypot(a.x - b.x, a.y - b.y);
      this.springs.push({ a: i, b: j, restLen, stiffness: 0.06 });
    }
  }
  get cx(){ return this.center.x; }
  get cy(){ return this.center.y; }
  update(dt, gravity, damping){
    for (const p of this.points){
      if (p === this._dragPoint) continue;
      const vx = (p.x - p.ox) * damping;
      const vy = (p.y - p.oy) * damping;
      p.ox = p.x;
      p.oy = p.y;
      p.x += vx;
      p.y += vy + gravity * dt * dt;
    }
    if (this._dragPoint){
      // pin: snap drag point exactly to target
      this._dragPoint.x = this._dragTarget.x;
      this._dragPoint.y = this._dragTarget.y;
      this._dragPoint.ox = this._dragPoint.x;
      this._dragPoint.oy = this._dragPoint.y;
    }
    this._jiggleT += dt;
    this._squashAmount = Math.max(0, this._squashAmount - dt * 4);
  }
  solveSprings(){
    for (let iter = 0; iter < 3; iter++){
      for (const s of this.springs){
        const a = this.points[s.a], b = this.points[s.b];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = Math.hypot(dx, dy) || 1;
        const diff = (d - s.restLen) / d * s.stiffness;
        const ox = dx * diff * 0.5;
        const oy = dy * diff * 0.5;
        a.x += ox; a.y += oy;
        b.x -= ox; b.y -= oy;
      }
    }
  }
  constrainBounds(w, h, bounce){
    for (const p of this.points){
      // floor
      if (p.y > h){
        const vy = p.y - p.oy;
        p.y = h;
        p.oy = p.y + vy * bounce;
        // friction on floor
        const vx = p.x - p.ox;
        p.ox = p.x - vx * 0.95;
        this._squashAmount = Math.min(1, this._squashAmount + Math.abs(vy) * 0.04);
      }
      // ceiling
      if (p.y < 0){
        const vy = p.y - p.oy;
        p.y = 0;
        p.oy = p.y + vy * bounce;
      }
      // walls
      if (p.x < 0){
        const vx = p.x - p.ox;
        p.x = 0;
        p.ox = p.x + vx * bounce;
      }
      if (p.x > w){
        const vx = p.x - p.ox;
        p.x = w;
        p.ox = p.x + vx * bounce;
      }
    }
  }
  applyImpulse(vx, vy){
    for (const p of this.points){
      p.ox -= vx;
      p.oy -= vy;
    }
  }
  draw(ctx){
    const perim = this.points.slice(0, -1); // last is center
    ctx.save();
    // outer glow halo via heavy shadowBlur
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 28;
    // fill with translucent gradient for that gel look
    const grd = ctx.createRadialGradient(this.cx, this.cy, this.r * 0.2, this.cx, this.cy, this.r * 1.1);
    grd.addColorStop(0,   hexToRgba(this.color, 0.95));
    grd.addColorStop(0.65, hexToRgba(this.color, 0.55));
    grd.addColorStop(1,   hexToRgba(this.color, 0.05));
    ctx.fillStyle = grd;
    ctx.beginPath();
    const first = perim[0], second = perim[1];
    ctx.moveTo((first.x + second.x) / 2, (first.y + second.y) / 2);
    for (let i = 0; i < perim.length; i++){
      const cur = perim[i];
      const next = perim[(i + 1) % perim.length];
      ctx.quadraticCurveTo(cur.x, cur.y, (cur.x + next.x) / 2, (cur.y + next.y) / 2);
    }
    ctx.closePath();
    ctx.fill();
    // bright outline
    ctx.shadowBlur = 0;
    ctx.strokeStyle = hexToRgba(this.color, 0.95);
    ctx.lineWidth = 1.8;
    ctx.stroke();
    // inner specular highlight
    ctx.fillStyle = 'rgba(255,255,255,0.30)';
    ctx.beginPath();
    ctx.ellipse(
      this.cx - this.r * 0.35, this.cy - this.r * 0.45,
      this.r * 0.22, this.r * 0.12, -0.35, 0, Math.PI*2
    );
    ctx.fill();
    ctx.restore();
  }
}

function hexToRgba(hex, a){
  const h = hex.replace('#', '');
  const r = parseInt(h.substr(0,2), 16);
  const g = parseInt(h.substr(2,2), 16);
  const b = parseInt(h.substr(4,2), 16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ── world ────────────────────────────────── */
const world = {
  bodies: [],
  maxBodies: 60,
};

function spawnJelly(x, y, opts={}){
  const shape = SHAPES[opts.shapeIdx ?? ui.shapeIdx];
  const color = opts.color || ui.color;
  const size  = opts.size  || ui.size;
  const b = new SoftBody(x, y, size, shape, color);
  // initial random tiny impulse
  b.applyImpulse((Math.random() - 0.5) * 1.4, -1 - Math.random() * 2);
  world.bodies.push(b);
  // cap
  while (world.bodies.length > world.maxBodies){
    world.bodies.shift();
  }
  sndPlop(420 + Math.random() * 240);
  return b;
}

/* ── input ────────────────────────────────── */
let drag = null;   // { body, point, target }
let mouseDownAt = 0;
let mouseDownPos = null;

function findBodyAt(x, y){
  // check from topmost (last) to bottom (first)
  for (let i = world.bodies.length - 1; i >= 0; i--){
    const b = world.bodies[i];
    const dx = x - b.cx, dy = y - b.cy;
    const d = Math.hypot(dx, dy);
    if (d < b.r * 1.05) return b;
  }
  return null;
}

canvas.addEventListener('pointerdown', (e) => {
  if (e.target !== canvas) return;
  if (e.button === 2) {
    // right-click → pop nearest
    const b = findBodyAt(e.clientX, e.clientY);
    if (b){
      sndPop();
      const idx = world.bodies.indexOf(b);
      world.bodies.splice(idx, 1);
      spawnPopParticles(b);
    }
    return;
  }
  mouseDownAt = performance.now();
  mouseDownPos = { x: e.clientX, y: e.clientY };
  const b = findBodyAt(e.clientX, e.clientY);
  if (b){
    drag = {
      body: b,
      point: b.center,
      target: { x: e.clientX, y: e.clientY },
    };
    b._dragPoint = b.center;
    b._dragTarget = drag.target;
  }
  // hide hint after first interaction
  document.getElementById('hint').classList.add('faded');
});
canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); });
window.addEventListener('pointermove', (e) => {
  if (drag){
    drag.target.x = e.clientX;
    drag.target.y = e.clientY;
  }
});
window.addEventListener('pointerup', (e) => {
  if (drag){
    // release drag
    drag.body._dragPoint = null;
    drag.body._dragTarget = null;
    drag = null;
    return;
  }
  // no drag → spawn at click position if it was a click (not a long-press)
  if (!mouseDownPos) return;
  const dt = performance.now() - mouseDownAt;
  const moved = Math.hypot(e.clientX - mouseDownPos.x, e.clientY - mouseDownPos.y);
  if (dt < 250 && moved < 6){
    spawnJelly(e.clientX, e.clientY);
  }
  mouseDownPos = null;
});

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space'){
    e.preventDefault();
    shakeAll();
  }
  if (e.key === 'c' || e.key === 'C') clearAll();
});

/* ── interactions: shake / rain / clear ───── */
function shakeAll(){
  for (const b of world.bodies){
    b.applyImpulse((Math.random() - 0.5) * 12, -4 - Math.random() * 8);
  }
  sndShake();
  document.getElementById('hint').classList.add('faded');
}
function rainJellies(){
  for (let i = 0; i < 14; i++){
    setTimeout(() => {
      spawnJelly(
        40 + Math.random() * (W - 80),
        -30 - Math.random() * 60,
        { color: PALETTE[Math.floor(Math.random() * PALETTE.length)] }
      );
    }, i * 100);
  }
  document.getElementById('hint').classList.add('faded');
}
function clearAll(){
  world.bodies.length = 0;
  particles.length = 0;
  tone(120, 0.20, 'sine', 0.08);
}
document.getElementById('btn-shake').addEventListener('click', shakeAll);
document.getElementById('btn-rain').addEventListener('click', rainJellies);
document.getElementById('btn-clear').addEventListener('click', clearAll);

/* ── particles (for pop burst) ────────────── */
const particles = [];
function spawnPopParticles(b){
  const N = 18;
  for (let i = 0; i < N; i++){
    const a = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 4;
    particles.push({
      x: b.cx, y: b.cy,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 1.5,
      color: b.color,
      life: 0.9 + Math.random() * 0.5,
      r: 2 + Math.random() * 4,
    });
  }
}
function updateParticles(dt){
  for (const p of particles){
    p.vy += 0.25;
    p.x += p.vx;
    p.y += p.vy;
    p.life -= dt;
  }
  for (let i = particles.length - 1; i >= 0; i--){
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
}
function drawParticles(ctx){
  for (const p of particles){
    const a = Math.max(0, Math.min(1, p.life));
    ctx.save();
    ctx.globalAlpha = a;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

/* ── physics + render loop ────────────────── */
let lastT = performance.now();
let frameCount = 0;
let fpsSampleT = lastT;
let fpsVal = 0;

function loop(now){
  const dt = Math.min(0.033, (now - lastT) / 1000);
  lastT = now;
  // physics step
  const damping = 0.98;
  const gravity = ui.gravity * 1800;
  for (const b of world.bodies){
    b.update(dt, gravity, damping);
    b.solveSprings();
    b.constrainBounds(W, H, ui.bounce);
  }
  // inter-body collisions (simple circle vs circle)
  for (let i = 0; i < world.bodies.length; i++){
    const a = world.bodies[i];
    for (let j = i + 1; j < world.bodies.length; j++){
      const c = world.bodies[j];
      const dx = c.cx - a.cx, dy = c.cy - a.cy;
      const d = Math.hypot(dx, dy);
      const minD = (a.r + c.r) * 0.92;
      if (d < minD && d > 0){
        const overlap = (minD - d) * 0.5;
        const nx = dx / d, ny = dy / d;
        a.center.x -= nx * overlap;
        a.center.y -= ny * overlap;
        c.center.x += nx * overlap;
        c.center.y += ny * overlap;
        // small impulse for jiggle
        a._squashAmount = Math.min(1, a._squashAmount + overlap * 0.05);
        c._squashAmount = Math.min(1, c._squashAmount + overlap * 0.05);
      }
    }
  }
  updateParticles(dt);

  // render
  // motion trail
  ctx.fillStyle = 'rgba(8, 5, 26, 0.36)';
  ctx.fillRect(0, 0, W, H);
  // draw all bodies — sort by area so smaller jellies draw on top
  const sorted = world.bodies.slice().sort((x, y) => y.r - x.r);
  for (const b of sorted) b.draw(ctx);
  drawParticles(ctx);

  // FPS sample
  frameCount++;
  if (now - fpsSampleT > 500){
    fpsVal = Math.round(frameCount * 1000 / (now - fpsSampleT));
    frameCount = 0;
    fpsSampleT = now;
    document.getElementById('fps-val').textContent = fpsVal;
  }
  document.getElementById('jelly-count').textContent = world.bodies.length;

  requestAnimationFrame(loop);
}

// seed a few jellies on load so the sandbox isn't empty
setTimeout(() => {
  for (let i = 0; i < 5; i++){
    setTimeout(() => spawnJelly(
      120 + Math.random() * (W - 240),
      80  + Math.random() * 120,
      { color: PALETTE[i % PALETTE.length], shapeIdx: i % SHAPES.length, size: 28 + Math.random() * 24 }
    ), i * 220);
  }
}, 400);

requestAnimationFrame(loop);
</script>
