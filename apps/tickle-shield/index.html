<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>tickle shield</title>
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9A%A1" />
<meta name="description" content="A neon brick breaker. Glowing particles, multi-ball power-ups, paddle that tickles." />
<meta property="og:title" content="tickle shield" />
<meta property="og:description" content="A neon brick breaker. Glowing particles, multi-ball power-ups, paddle that tickles." />
<meta property="og:url" content="https://sloppy.live/tickle-shield/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20brick%20breaker%20arcade%20game%20glowing%20particle%20trails%20cyan%20pink%20violet%2C%201200x630?width=1200&height=630&nofeed=true&format=png" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bungee&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
<style>
:root{
  --pink:#ff37c8;
  --cyan:#3affff;
  --violet:#a455ff;
  --amber:#ffce4a;
  --green:#7dff8a;
  --hot:#ff5070;
  --bone:#f0e6d6;
  --bg:#04030a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;background:var(--bg);color:var(--bone);font-family:'VT323', monospace;overflow:hidden;touch-action:none}
body{
  background:
    radial-gradient(ellipse at 50% 0%, rgba(58,255,255,0.06), transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(255,55,200,0.08), transparent 55%),
    var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px;
}

.head{
  width:100%;max-width:880px;
  display:flex;justify-content:space-between;align-items:baseline;
  padding:6px 8px 10px;
  font-family:'Audiowide', sans-serif;
}
.brand{
  font-family:'Bungee', sans-serif;font-size:26px;letter-spacing:0.10em;
  color:#fff;
  text-shadow:
    0 0 8px var(--cyan),
    0 0 16px var(--pink),
    2px 2px 0 #000;
}
.brand .b{color:var(--pink)}
.brand .y{color:var(--cyan)}
.brand small{
  display:block;font-family:'VT323', monospace;font-size:13px;letter-spacing:0.20em;
  color:rgba(240,230,214,0.50);margin-top:1px;font-weight:400;text-shadow:none;
}
.hud{
  display:flex;gap:14px;
  font-family:'Press Start 2P', monospace;font-size:11px;letter-spacing:0.06em;
  color:rgba(240,230,214,0.55);
}
.hud .num{
  display:block;font-family:'Bungee', sans-serif;font-size:18px;letter-spacing:0.04em;
  color:#fff;text-shadow:0 0 8px var(--cyan);
}
.hud .num.score{text-shadow:0 0 8px var(--amber);color:var(--amber)}
.hud .num.lives{text-shadow:0 0 8px var(--hot);color:var(--hot)}
.hud .num.level{text-shadow:0 0 8px var(--green);color:var(--green)}
.hud .num.combo{text-shadow:0 0 8px var(--pink);color:var(--pink)}

.stage-wrap{
  position:relative;width:100%;max-width:880px;flex:1;
  border:2px solid rgba(58,255,255,0.30);border-radius:6px;
  background:radial-gradient(ellipse at 50% 100%, rgba(58,255,255,0.06), transparent 60%), #02040a;
  box-shadow:0 0 24px rgba(58,255,255,0.18), inset 0 0 32px rgba(255,55,200,0.04);
  overflow:hidden;
  aspect-ratio:11/14;
  max-height:calc(100vh - 130px);
}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.tip{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  z-index:10;text-align:center;pointer-events:none;
  font-family:'Press Start 2P', monospace;font-size:13px;letter-spacing:0.08em;
  color:rgba(240,230,214,0.85);line-height:2.2;
  text-shadow:0 0 10px var(--cyan), 0 0 18px var(--cyan);
}
.tip .big{
  font-family:'Bungee', sans-serif;font-size:30px;letter-spacing:0.06em;
  color:var(--pink);text-shadow:0 0 14px var(--pink), 0 0 28px var(--pink);
  display:block;margin-bottom:6px;
}
.tip kbd{
  background:rgba(58,255,255,0.10);border:1px solid var(--cyan);
  padding:2px 8px;border-radius:3px;color:var(--cyan);font-family:inherit;font-size:11px;
}
.tip.gone{display:none}

.foot{
  font-family:'VT323', monospace;font-size:14px;letter-spacing:0.20em;
  color:rgba(240,230,214,0.40);padding:6px 0 4px;
}
.foot kbd{
  background:rgba(58,255,255,0.10);border:1px solid rgba(58,255,255,0.40);border-radius:2px;
  padding:1px 6px;color:var(--cyan);font-family:inherit;
}

.audio-toggle{
  position:fixed;top:8px;right:8px;z-index:11;
  background:rgba(0,0,0,0.5);border:1px solid var(--cyan);border-radius:50%;
  width:32px;height:32px;cursor:pointer;color:var(--cyan);
  font-family:'Bungee', sans-serif;font-size:13px;
}

@media (max-width:560px){
  .brand{font-size:18px}
  .brand small{font-size:10px;letter-spacing:0.16em}
  .hud{gap:8px;font-size:9px}
  .hud .num{font-size:14px}
  .tip .big{font-size:22px}
  .foot{font-size:11px}
}
</style>
</head>
<body>

<div class="head">
  <div class="brand"><span class="b">TICKLE</span> <span class="y">SHIELD</span><small>the shield that tickles</small></div>
  <div class="hud">
    <div>SCORE<span class="num score" id="hudScore">0</span></div>
    <div>LIVES<span class="num lives" id="hudLives">3</span></div>
    <div>LEVEL<span class="num level" id="hudLevel">1</span></div>
    <div>COMBO<span class="num combo" id="hudCombo">×1</span></div>
  </div>
</div>

<div class="stage-wrap">
  <canvas id="stage"></canvas>
  <div class="tip" id="tip">
    <span class="big">TICKLE SHIELD</span>
    move with <kbd>← →</kbd> or your mouse<br>
    <kbd>SPACE</kbd> to launch · <kbd>P</kbd> to pause<br>
    <span style="color:var(--amber);text-shadow:0 0 10px var(--amber)">press SPACE to begin</span>
  </div>
</div>

<div class="foot">
  <kbd>← →</kbd> shield · <kbd>SPACE</kbd> launch / pause · <kbd>R</kbd> restart
</div>
<button class="audio-toggle" id="audioToggle" title="audio">♪</button>

<script>
(() => {
  // ===== CANVAS + DPR =====
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = 1;
  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    dpr = Math.min(2, window.devicePixelRatio || 1);
    W = rect.width;  H = rect.height;
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ===== STATE =====
  const STATE = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, WIN: 4 };
  const state = {
    phase: STATE.TITLE,
    score: 0,
    lives: 3,
    level: 1,
    combo: 1,
    comboDecay: 0,
    audio: true,
    shake: 0,
    tickleWords: [],
  };

  // ===== ENTITIES =====
  const ROWS = 6, COLS = 10;
  let bricks = [];
  let balls = [];
  let particles = [];
  let pickups = [];
  let lasers = [];
  const paddle = {
    x: 0, y: 0, w: 110, h: 12, baseW: 110, vx: 0,
    laserUntil: 0, wideUntil: 0,
  };
  let mouseTarget = null;
  let keys = {};
  let powerUps = { slow: 0, wide: 0, laser: 0 };

  // ===== AUDIO =====
  let actx;
  function audio() { if (!actx && state.audio) try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} return actx; }
  function tone(f, dur, type='triangle', g=0.10) {
    if (!state.audio) return;
    const ac = audio(); if (!ac) return;
    const o = ac.createOscillator(), gain = ac.createGain();
    o.type = type; o.frequency.value = f;
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.linearRampToValueAtTime(g, ac.currentTime + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(gain); gain.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur + 0.05);
  }
  const sfx = {
    bounce: () => tone(420, 0.06, 'square', 0.05),
    brick:  (hp) => { tone(720 + hp * 80, 0.08, 'triangle', 0.10); if (hp <= 0) tone(960, 0.14, 'sine', 0.10); },
    pickup: () => { [880, 1175, 1568].forEach((f, i) => setTimeout(() => tone(f, 0.10, 'triangle', 0.10), i * 50)); },
    laser:  () => tone(1400, 0.06, 'sawtooth', 0.06),
    die:    () => { [330, 250, 180].forEach((f, i) => setTimeout(() => tone(f, 0.20, 'sawtooth', 0.10), i * 90)); },
    win:    () => { [523, 659, 784, 1047, 1318].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'triangle', 0.12), i * 70)); },
  };
  document.getElementById('audioToggle').addEventListener('click', () => {
    state.audio = !state.audio;
    document.getElementById('audioToggle').style.opacity = state.audio ? 1 : 0.4;
    if (state.audio) sfx.bounce();
  });

  // ===== UTILS =====
  function rand(a, b) { return a + Math.random() * (b - a); }
  function pick(a) { return a[Math.floor(Math.random()*a.length)]; }

  // ===== LEVEL =====
  const BRICK_COLORS = [
    { hp: 1, hue: 50  },  // amber
    { hp: 1, hue: 320 },  // pink
    { hp: 2, hue: 280 },  // violet
    { hp: 2, hue: 180 },  // cyan
    { hp: 3, hue: 0   },  // hot
    { hp: 5, hue: 120, boss: true },
  ];
  function makeLevel(n) {
    bricks = [];
    const rows = Math.min(8, ROWS + Math.floor((n - 1) / 2));
    const cols = COLS;
    const padX = W * 0.04;
    const padTop = H * 0.10;
    const cellW = (W - padX * 2) / cols;
    const cellH = Math.min(28, H * 0.045);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        // skip pattern based on level for variety
        const skip = ((n + r) % 4 === 0) && (c === 0 || c === cols - 1) ? Math.random() < 0.5 : false;
        if (skip) continue;
        // boss row at top of higher levels
        let tier;
        if (r === 0 && n >= 3) tier = BRICK_COLORS[5];
        else if (r < 2)        tier = BRICK_COLORS[r];
        else if (r < 4)        tier = BRICK_COLORS[2 + (r % 2)];
        else                   tier = BRICK_COLORS[Math.min(4, r - 1)];
        bricks.push({
          x: padX + c * cellW + 2,
          y: padTop + r * cellH + 2,
          w: cellW - 4,
          h: cellH - 4,
          hp: tier.hp,
          maxHp: tier.hp,
          hue: tier.hue,
          boss: !!tier.boss,
          flash: 0,
          dead: false,
        });
      }
    }
  }
  function totalBreakable() { return bricks.filter(b => !b.dead).length; }

  // ===== BALL =====
  function spawnBall(stick = false, x = paddle.x, y = paddle.y - 14) {
    const ball = {
      x, y,
      vx: 0, vy: 0,
      r: 7,
      stick,
      trail: [],
    };
    if (!stick) {
      const ang = -Math.PI / 2 + rand(-0.3, 0.3);
      const speed = baseSpeed();
      ball.vx = Math.cos(ang) * speed;
      ball.vy = Math.sin(ang) * speed;
    }
    balls.push(ball);
    return ball;
  }
  function baseSpeed() {
    return Math.min(720, 380 + state.level * 28) * (powerUps.slow > performance.now() ? 0.55 : 1);
  }

  // ===== START / RESET =====
  function startGame() {
    state.phase = STATE.PLAYING;
    state.score = 0;
    state.lives = 3;
    state.level = 1;
    state.combo = 1;
    powerUps = { slow: 0, wide: 0, laser: 0 };
    paddle.x = W / 2;
    paddle.y = H - 38;
    paddle.w = paddle.baseW;
    balls = []; particles = []; pickups = []; lasers = [];
    makeLevel(1);
    spawnBall(true);
    document.getElementById('tip').classList.add('gone');
    updateHUD();
  }
  function nextLevel() {
    state.level++;
    paddle.w = paddle.baseW;
    powerUps.wide = 0; powerUps.slow = 0; powerUps.laser = 0;
    makeLevel(state.level);
    balls = []; pickups = []; lasers = [];
    spawnBall(true);
    addTickle('LEVEL ' + state.level + '!', W / 2, H / 2, 'var(--green)', 1.6);
    sfx.win();
    updateHUD();
  }

  // ===== INPUT =====
  document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === ' ') {
      e.preventDefault();
      if (state.phase === STATE.TITLE) startGame();
      else if (state.phase === STATE.GAMEOVER) startGame();
      else if (state.phase === STATE.PLAYING) {
        // launch sticky balls
        const stuck = balls.find(b => b.stick);
        if (stuck) {
          const ang = -Math.PI / 2 + rand(-0.25, 0.25);
          const sp = baseSpeed();
          stuck.vx = Math.cos(ang) * sp; stuck.vy = Math.sin(ang) * sp;
          stuck.stick = false;
        }
      }
    }
    if (e.key.toLowerCase() === 'p') {
      if (state.phase === STATE.PLAYING) state.phase = STATE.PAUSED;
      else if (state.phase === STATE.PAUSED) state.phase = STATE.PLAYING;
    }
    if (e.key.toLowerCase() === 'r') startGame();
  });
  document.addEventListener('keyup', (e) => { keys[e.key] = false; });

  function pointerXY(ev) {
    const rect = canvas.getBoundingClientRect();
    const x = (ev.touches ? ev.touches[0].clientX : ev.clientX) - rect.left;
    return x;
  }
  canvas.addEventListener('pointermove', (ev) => { mouseTarget = pointerXY(ev); });
  canvas.addEventListener('pointerdown', (ev) => {
    mouseTarget = pointerXY(ev);
    if (state.phase === STATE.TITLE || state.phase === STATE.GAMEOVER) return startGame();
    // tap also launches sticky ball
    const stuck = balls.find(b => b.stick);
    if (stuck) {
      const ang = -Math.PI / 2 + rand(-0.25, 0.25);
      const sp = baseSpeed();
      stuck.vx = Math.cos(ang) * sp; stuck.vy = Math.sin(ang) * sp;
      stuck.stick = false;
    }
  });
  canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });

  // ===== PICKUPS =====
  const PICKUP_KINDS = [
    { k: 'multi', em: 'M', color: '#ff37c8', desc: 'multi-ball' },
    { k: 'wide',  em: 'W', color: '#3affff', desc: 'wide shield' },
    { k: 'slow',  em: 'S', color: '#7dff8a', desc: 'slo-mo' },
    { k: 'laser', em: 'L', color: '#ffce4a', desc: 'tickle laser' },
    { k: 'life',  em: '+', color: '#ff5070', desc: '+1 life' },
  ];
  function spawnPickup(x, y) {
    if (Math.random() > 0.18) return;
    const kind = pick(PICKUP_KINDS);
    pickups.push({ x, y, vy: 90, ...kind });
  }
  function applyPickup(p) {
    const now = performance.now();
    sfx.pickup();
    addTickle(p.desc.toUpperCase(), p.x, p.y - 14, p.color, 1.4);
    if (p.k === 'multi') {
      const sources = balls.filter(b => !b.stick).slice(0, 3);
      const seed = sources.length ? sources[0] : balls[0];
      if (!seed) return;
      for (let i = 0; i < 2; i++) {
        const ang = Math.atan2(seed.vy, seed.vx) + rand(-0.6, 0.6);
        const sp  = Math.hypot(seed.vx, seed.vy);
        const b2 = { x: seed.x, y: seed.y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, r: 7, stick: false, trail: [] };
        balls.push(b2);
      }
    }
    if (p.k === 'wide')  { paddle.w = paddle.baseW * 1.7; powerUps.wide = now + 8000; }
    if (p.k === 'slow')  { powerUps.slow = now + 8000; }
    if (p.k === 'laser') { powerUps.laser = now + 6000; }
    if (p.k === 'life')  { state.lives++; updateHUD(); }
  }

  // ===== PARTICLES =====
  function burst(x, y, hue, count = 16, opts = {}) {
    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      const sp = rand(60, 280) * (opts.power || 1);
      particles.push({
        x, y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp - 30,
        life: rand(0.45, 0.95),
        age: 0,
        hue,
        r: rand(2, 4),
      });
    }
  }
  function trail(x, y, hue, vx = 0, vy = 0) {
    particles.push({
      x, y,
      vx: vx * 0.05 + rand(-10, 10),
      vy: vy * 0.05 + rand(-10, 10),
      life: 0.5,
      age: 0,
      hue,
      r: rand(2, 4),
      isTrail: true,
    });
  }
  function addTickle(text, x, y, color, scale = 1) {
    state.tickleWords.push({ text, x, y, color, scale, age: 0, life: 1.4, vy: -28 });
  }
  const TICKLE_WORDS = ['hee!','ha!','hoo!','tee!','BOP','POP!','✨','★'];

  // ===== UPDATE =====
  let lastT = 0;
  function update(dt) {
    if (state.phase !== STATE.PLAYING) return;
    // paddle
    const speed = 720;
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) paddle.x -= speed * dt;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) paddle.x += speed * dt;
    if (mouseTarget != null) paddle.x = mouseTarget;
    paddle.x = Math.max(paddle.w / 2 + 4, Math.min(W - paddle.w / 2 - 4, paddle.x));
    paddle.y = H - 38;
    // power-up timeouts
    const now = performance.now();
    if (powerUps.wide && now > powerUps.wide) { paddle.w = paddle.baseW; powerUps.wide = 0; }
    // lasers
    if (powerUps.laser && now < powerUps.laser) {
      paddle._laserT = (paddle._laserT || 0) - dt;
      if (paddle._laserT <= 0) {
        paddle._laserT = 0.12;
        lasers.push({ x: paddle.x - paddle.w * 0.30, y: paddle.y - 6, vy: -780, life: 1.4 });
        lasers.push({ x: paddle.x + paddle.w * 0.30, y: paddle.y - 6, vy: -780, life: 1.4 });
        sfx.laser();
      }
    }
    // balls
    for (const b of balls) {
      if (b.stick) {
        b.x = paddle.x;
        b.y = paddle.y - 14;
        continue;
      }
      // trail
      b.trail.push({ x: b.x, y: b.y });
      if (b.trail.length > 12) b.trail.shift();
      if (Math.random() < 0.5) trail(b.x, b.y, 320, b.vx, b.vy);
      // step
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      // walls
      if (b.x < b.r) { b.x = b.r; b.vx = -b.vx; sfx.bounce(); }
      if (b.x > W - b.r) { b.x = W - b.r; b.vx = -b.vx; sfx.bounce(); }
      if (b.y < b.r) { b.y = b.r; b.vy = -b.vy; sfx.bounce(); }
      // paddle collision
      if (b.vy > 0 && b.y + b.r >= paddle.y - paddle.h / 2 && b.y - b.r <= paddle.y + paddle.h / 2 &&
          b.x >= paddle.x - paddle.w / 2 - 4 && b.x <= paddle.x + paddle.w / 2 + 4) {
        b.y = paddle.y - paddle.h / 2 - b.r - 0.5;
        const offset = (b.x - paddle.x) / (paddle.w / 2);
        const sp = Math.hypot(b.vx, b.vy) * 1.02;
        const ang = -Math.PI / 2 + offset * 0.95;
        b.vx = Math.cos(ang) * sp;
        b.vy = Math.sin(ang) * sp;
        // tickle word!
        if (Math.random() < 0.30) addTickle(pick(TICKLE_WORDS), b.x, b.y - 16, '#fff', 1);
        sfx.bounce();
        state.combo = 1;          // paddle resets combo
        state.comboDecay = 0;
      }
      // brick collision (find closest)
      for (const br of bricks) {
        if (br.dead) continue;
        if (b.x + b.r < br.x || b.x - b.r > br.x + br.w ||
            b.y + b.r < br.y || b.y - b.r > br.y + br.h) continue;
        // figure out which side hit
        const dxLeft   = (b.x + b.r) - br.x;
        const dxRight  = (br.x + br.w) - (b.x - b.r);
        const dyTop    = (b.y + b.r) - br.y;
        const dyBottom = (br.y + br.h) - (b.y - b.r);
        const minOverlap = Math.min(dxLeft, dxRight, dyTop, dyBottom);
        if (minOverlap === dxLeft)        { b.vx = -Math.abs(b.vx); b.x = br.x - b.r; }
        else if (minOverlap === dxRight)  { b.vx =  Math.abs(b.vx); b.x = br.x + br.w + b.r; }
        else if (minOverlap === dyTop)    { b.vy = -Math.abs(b.vy); b.y = br.y - b.r; }
        else                              { b.vy =  Math.abs(b.vy); b.y = br.y + br.h + b.r; }
        damageBrick(br, b.x, b.y);
        break;
      }
      // dead?
      if (b.y - b.r > H + 20) b._dead = true;
    }
    balls = balls.filter(b => !b._dead);
    if (balls.length === 0) {
      loseLife();
    }
    // pickups
    for (const p of pickups) {
      p.y += p.vy * dt;
      if (p.y > paddle.y - paddle.h / 2 - 6 &&
          p.x > paddle.x - paddle.w / 2 && p.x < paddle.x + paddle.w / 2) {
        applyPickup(p);
        p._dead = true;
      }
      if (p.y > H + 20) p._dead = true;
    }
    pickups = pickups.filter(p => !p._dead);
    // lasers
    for (const l of lasers) {
      l.y += l.vy * dt;
      l.life -= dt;
      // hit bricks
      for (const br of bricks) {
        if (br.dead) continue;
        if (l.x >= br.x && l.x <= br.x + br.w && l.y >= br.y && l.y <= br.y + br.h) {
          damageBrick(br, l.x, l.y, 1);
          l._dead = true;
          break;
        }
      }
      if (l.life <= 0 || l.y < -20) l._dead = true;
    }
    lasers = lasers.filter(l => !l._dead);
    // particles
    for (const p of particles) {
      p.age += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += (p.isTrail ? 0 : 380) * dt;
      p.vx *= 0.98; p.vy *= 0.98;
    }
    particles = particles.filter(p => p.age < p.life);
    // tickles
    for (const t of state.tickleWords) {
      t.age += dt;
      t.y += t.vy * dt;
      t.vy *= 0.96;
    }
    state.tickleWords = state.tickleWords.filter(t => t.age < t.life);
    // combo decay
    state.comboDecay += dt;
    if (state.comboDecay > 2.5 && state.combo > 1) { state.combo = 1; state.comboDecay = 0; updateHUD(); }
    // shake decay
    state.shake *= 0.85;
    // win check
    if (totalBreakable() === 0) {
      nextLevel();
    }
  }
  function damageBrick(br, x, y, amount = 1) {
    br.hp -= amount;
    br.flash = 1;
    state.combo = Math.min(20, state.combo + 1);
    state.comboDecay = 0;
    burst(x, y, br.hue, 6 + br.maxHp * 2);
    sfx.brick(br.hp);
    if (br.hp <= 0) {
      br.dead = true;
      const points = (br.boss ? 200 : 50) * state.combo;
      state.score += points;
      addTickle('+' + points, x, y - 16, `hsl(${br.hue}, 100%, 70%)`, 1);
      burst(x, y, br.hue, 22 + (br.boss ? 18 : 0), { power: br.boss ? 1.8 : 1 });
      spawnPickup(x, y);
      state.shake = Math.min(8, state.shake + 2 + (br.boss ? 4 : 0));
    }
    updateHUD();
  }
  function loseLife() {
    state.lives--;
    state.combo = 1;
    state.shake = 12;
    sfx.die();
    addTickle('OUCH', W / 2, H / 2, '#ff5070', 1.6);
    powerUps.wide = 0; paddle.w = paddle.baseW;
    powerUps.slow = 0; powerUps.laser = 0;
    if (state.lives <= 0) {
      state.phase = STATE.GAMEOVER;
      const tip = document.getElementById('tip');
      tip.classList.remove('gone');
      tip.innerHTML = `<span class="big" style="color:var(--hot);text-shadow:0 0 14px var(--hot),0 0 28px var(--hot)">GAME OVER</span>
        score · ${state.score}<br>level reached · ${state.level}<br><br>
        <span style="color:var(--cyan);text-shadow:0 0 10px var(--cyan)">press SPACE or click to try again</span>`;
    } else {
      spawnBall(true);
    }
    updateHUD();
  }
  function updateHUD() {
    document.getElementById('hudScore').textContent = state.score;
    document.getElementById('hudLives').textContent = state.lives;
    document.getElementById('hudLevel').textContent = state.level;
    document.getElementById('hudCombo').textContent = '×' + state.combo;
  }

  // ===== RENDER =====
  function render() {
    // motion-trail wash for glow persistence
    ctx.fillStyle = 'rgba(2,4,12,0.30)';
    ctx.fillRect(0, 0, W, H);

    // shake offset
    const sx = state.shake ? (Math.random() - 0.5) * state.shake : 0;
    const sy = state.shake ? (Math.random() - 0.5) * state.shake : 0;
    ctx.save();
    ctx.translate(sx, sy);

    // grid floor
    ctx.strokeStyle = 'rgba(58,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= W; x += 32) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y <= H; y += 32) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    // bricks
    for (const br of bricks) {
      if (br.dead) continue;
      const t = br.hp / br.maxHp;
      const lit = 0.85 + br.flash * 0.15;
      const sat = br.boss ? 95 : 80;
      const fill = `hsla(${br.hue}, ${sat}%, ${50 + t * 12}%, ${0.25 + t * 0.45})`;
      ctx.shadowColor = `hsl(${br.hue}, 100%, 65%)`;
      ctx.shadowBlur  = 12 + br.flash * 18;
      ctx.fillStyle   = fill;
      ctx.fillRect(br.x, br.y, br.w, br.h);
      ctx.shadowBlur = 0;
      // bright top edge
      ctx.fillStyle = `hsla(${br.hue}, 100%, ${75 + br.flash * 15}%, ${lit})`;
      ctx.fillRect(br.x, br.y, br.w, 2);
      // outline
      ctx.strokeStyle = `hsl(${br.hue}, 100%, 70%)`;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(br.x + 0.5, br.y + 0.5, br.w - 1, br.h - 1);
      // boss skull glyph
      if (br.boss) {
        ctx.fillStyle = `hsla(${br.hue}, 100%, 92%, 0.85)`;
        ctx.font = 'bold 12px Press Start 2P, monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('☠', br.x + br.w / 2, br.y + br.h / 2);
        ctx.textAlign = 'start';
      }
      br.flash *= 0.86;
    }

    // particles (additive)
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles) {
      const a = 1 - (p.age / p.life);
      ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${a * 0.85})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';

    // pickups
    for (const p of pickups) {
      ctx.shadowColor = p.color; ctx.shadowBlur = 18;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#000';
      ctx.font = 'bold 11px Press Start 2P, monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.em, p.x, p.y + 1);
      ctx.textAlign = 'start';
    }

    // lasers
    for (const l of lasers) {
      ctx.shadowColor = '#ffce4a'; ctx.shadowBlur = 12;
      ctx.fillStyle = '#ffce4a';
      ctx.fillRect(l.x - 1.5, l.y, 3, 14);
      ctx.shadowBlur = 0;
    }

    // balls + trail
    for (const b of balls) {
      // tail
      for (let i = 0; i < b.trail.length; i++) {
        const t = b.trail[i];
        const a = (i + 1) / b.trail.length;
        ctx.fillStyle = `rgba(255,55,200,${a * 0.18})`;
        ctx.beginPath(); ctx.arc(t.x, t.y, b.r * a, 0, Math.PI * 2); ctx.fill();
      }
      // glow halo
      const grad = ctx.createRadialGradient(b.x, b.y, 1, b.x, b.y, b.r * 4);
      grad.addColorStop(0, 'rgba(255,255,255,0.95)');
      grad.addColorStop(0.4, 'rgba(255,55,200,0.5)');
      grad.addColorStop(1, 'rgba(255,55,200,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 4, 0, Math.PI * 2); ctx.fill();
      // core
      ctx.shadowColor = '#fff'; ctx.shadowBlur = 12;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // paddle
    const pw = paddle.w, ph = paddle.h;
    const grad = ctx.createLinearGradient(paddle.x - pw/2, 0, paddle.x + pw/2, 0);
    grad.addColorStop(0,    '#ff37c8');
    grad.addColorStop(0.5,  '#ffffff');
    grad.addColorStop(1,    '#3affff');
    ctx.shadowColor = '#ff37c8'; ctx.shadowBlur = 22;
    ctx.fillStyle = grad;
    ctx.fillRect(paddle.x - pw/2, paddle.y - ph/2, pw, ph);
    ctx.shadowColor = '#3affff'; ctx.shadowBlur = 12;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(paddle.x - pw/2, paddle.y - ph/2, pw, 2);
    ctx.shadowBlur = 0;

    // tickle words
    ctx.textAlign = 'center';
    for (const t of state.tickleWords) {
      const a = 1 - (t.age / t.life);
      ctx.font = `bold ${Math.round(14 * t.scale)}px Press Start 2P, monospace`;
      ctx.shadowColor = t.color; ctx.shadowBlur = 8 * t.scale;
      ctx.fillStyle = t.color;
      ctx.fillText(t.text, t.x, t.y);
    }
    ctx.textAlign = 'start';
    ctx.shadowBlur = 0;

    // pause overlay
    if (state.phase === STATE.PAUSED) {
      ctx.fillStyle = 'rgba(2,4,12,0.65)';
      ctx.fillRect(0, 0, W, H);
      ctx.font = 'bold 22px Bungee, sans-serif';
      ctx.fillStyle = '#3affff';
      ctx.shadowColor = '#3affff'; ctx.shadowBlur = 14;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('PAUSED', W/2, H/2);
      ctx.shadowBlur = 0;
      ctx.font = 'bold 12px Press Start 2P, monospace';
      ctx.fillStyle = '#f0e6d6';
      ctx.fillText('press P to resume', W/2, H/2 + 32);
    }
    ctx.restore();
  }

  // ===== LOOP =====
  function loop(now) {
    requestAnimationFrame(loop);
    const dt = Math.min(0.05, (now - (lastT || now)) / 1000);
    lastT = now;
    update(dt);
    render();
  }
  requestAnimationFrame(loop);

  // ===== INIT =====
  paddle.x = W / 2; paddle.y = H - 38;
  updateHUD();
})();
</script>
</body>
</html>
