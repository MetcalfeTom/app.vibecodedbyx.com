<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Block World — 3D voxel sandbox</title>
<meta name="description" content="A small 3D world. Click to place blocks. Shift-click to remove. Eight block colors, orbit camera, save your build to localStorage.">
<meta property="og:title" content="Block World">
<meta property="og:description" content="A small 3D world. Click to place blocks. Shift-click to remove. Eight colors, orbit camera, autosave.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/block-world/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/3d%20voxel%20block%20world%20isometric%20cube%20landscape%20colorful%20cubes%20stacked%20cyan%20sky%20clean%20centered%20render?width=1200&height=630&model=flux&nologo=true&seed=46336">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%B1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a1828;
  --paper:#f3f6fa;
  --line: rgba(10,24,40,0.18);
  --accent: #ff5c8a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100vh;overflow:hidden;background:#85d2f4;color:var(--ink);font-family:'IBM Plex Mono', monospace}
body{ touch-action: none; }

#three-stage{ position:fixed; inset:0; z-index:0; cursor: crosshair; }

/* HUD */
.hud{
  position:fixed; top:.7rem; left:.7rem; z-index:10;
  display:flex; flex-direction:column; gap:.3rem;
  pointer-events:none;
}
.hud .eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:.62rem; letter-spacing:.4em;
  color: rgba(10,24,40,0.55); text-transform: uppercase;
}
.hud h1{
  margin:0;
  font-family:'Silkscreen', monospace; font-weight:700;
  font-size: clamp(1.4rem, 3.6vw, 2rem);
  color: var(--paper);
  text-shadow: 2px 2px 0 var(--ink), 0 0 10px rgba(10,24,40,0.18);
  letter-spacing: .03em;
}

.stats{
  position:fixed; top:.7rem; right:.7rem; z-index:10;
  background: var(--paper);
  border:2px solid var(--ink);
  padding:.45rem .65rem;
  font-family:'IBM Plex Mono', monospace; font-size:.7rem;
  letter-spacing:.12em; text-transform:uppercase;
  color: var(--ink);
  display:flex; gap:.8rem; flex-wrap:wrap;
  box-shadow: 3px 3px 0 var(--ink);
  pointer-events:none;
}
.stats b{ font-family:'Silkscreen', monospace; font-size:.85rem; letter-spacing:.04em; }

/* palette */
.palette{
  position:fixed; bottom:.8rem; left:50%; transform:translateX(-50%);
  z-index:10;
  display:flex; gap: .35rem;
  background: var(--paper);
  border: 2px solid var(--ink);
  padding: .4rem;
  border-radius: 4px;
  box-shadow: 3px 3px 0 var(--ink);
}
.swatch{
  appearance:none; cursor:pointer;
  width: 44px; height: 44px;
  border: 2px solid var(--ink);
  border-radius: 4px;
  position: relative;
  box-shadow: 2px 2px 0 var(--ink);
  transition: transform .07s;
  display:grid; place-items:end;
  font-family:'Silkscreen', monospace; font-size: .55rem;
  color: rgba(10,24,40,0.65);
  padding: 0 3px 1px 0;
  font-weight: 700;
}
.swatch:hover{ transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
.swatch:active{ transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }
.swatch[aria-pressed="true"]{
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}
.swatch.eraser{
  background: repeating-linear-gradient(45deg, var(--paper) 0 6px, var(--ink) 6px 12px);
  color: var(--paper);
  text-shadow: 1px 1px 0 var(--ink);
}

/* controls dock */
.dock{
  position:fixed; bottom:.8rem; right:.8rem; z-index:10;
  display:flex; flex-direction:column; gap:.35rem; align-items:flex-end;
}
.btn{
  appearance:none;
  background: var(--paper);
  border:2px solid var(--ink);
  color: var(--ink);
  font-family:'IBM Plex Mono', monospace; font-weight:700;
  font-size:.65rem; letter-spacing:.18em; text-transform:uppercase;
  padding:.4rem .6rem;
  border-radius: 4px;
  cursor:pointer;
  box-shadow: 2px 2px 0 var(--ink);
  min-height: 36px;
}
.btn:hover{ background: #fffbe5; }
.btn:active{ transform: translate(2px,2px); box-shadow: 0 0 0 var(--ink); }
.btn.danger{ background: #ffd0d0; }

/* help card */
.help{
  position:fixed; bottom: 5.4rem; left:.7rem; z-index:10;
  background: var(--paper);
  border:2px solid var(--ink);
  padding: .5rem .65rem;
  font-family:'IBM Plex Mono', monospace; font-size:.62rem;
  letter-spacing: .1em; color: var(--ink);
  box-shadow: 3px 3px 0 var(--ink);
  max-width: 240px; line-height: 1.5;
}
.help kbd{
  display:inline-block; padding:.05rem .35rem;
  border:1.5px solid var(--ink); border-radius: 2px;
  background: #fffbe5; font-family: inherit; font-size:.62rem;
  font-weight: 700;
}
.help b{ color: var(--accent); }

@media (max-width: 600px){
  .help{ display:none; }
  .swatch{ width: 36px; height: 36px; }
}
</style>
</head>
<body>
<canvas id="three-stage" role="application" aria-label="3D voxel sandbox. Click to place blocks. Shift-click or right-click to remove. Drag to orbit camera. Scroll to zoom."></canvas>

<header class="hud">
  <div class="eyebrow">▣ voxel · sandbox · build</div>
  <h1>BLOCK WORLD</h1>
</header>

<div class="stats" role="status" aria-live="polite">
  <span>blocks <b id="m-blocks">0</b></span>
  <span>tool <b id="m-tool">grass</b></span>
</div>

<div class="help">
  <div><b>L-click</b> place · <b>R-click / shift</b> remove</div>
  <div><b>drag</b> orbit · <b>wheel</b> zoom · <b>R-drag</b> pan</div>
  <div><b>1-8</b> color · <b>0</b> eraser · <b>S</b> save · <b>L</b> load</div>
</div>

<nav class="palette" id="palette" aria-label="Block palette"></nav>

<div class="dock">
  <button class="btn" type="button" id="btn-save">▼ save</button>
  <button class="btn" type="button" id="btn-load">▲ load</button>
  <button class="btn danger" type="button" id="btn-clear">↺ clear</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
'use strict';

// ── palette ────────────────────────────────────────────────────────
const BLOCKS = [
  { id: 'grass',  name: 'grass',  color: 0x6cba47 },
  { id: 'dirt',   name: 'dirt',   color: 0x8b5a2b },
  { id: 'stone',  name: 'stone',  color: 0x8a8e93 },
  { id: 'sand',   name: 'sand',   color: 0xe8d18a },
  { id: 'wood',   name: 'wood',   color: 0xb47a3a },
  { id: 'water',  name: 'water',  color: 0x3a8ad9 },
  { id: 'lava',   name: 'lava',   color: 0xff5a2b },
  { id: 'snow',   name: 'snow',   color: 0xf3f6fa },
];
let toolIdx = 0;     // index into BLOCKS, or -1 for eraser

// ── three.js setup ─────────────────────────────────────────────────
const canvas = document.getElementById('three-stage');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x85d2f4);
scene.fog = new THREE.Fog(0x85d2f4, 80, 220);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(20, 22, 28);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// orbit controls
const controls = new THREE.OrbitControls(camera, canvas);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 6;
controls.maxDistance = 120;
controls.maxPolarAngle = Math.PI / 2 - 0.05;   // don't go below horizon
controls.update();

// lights
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(40, 60, 30);
sun.castShadow = true;
sun.shadow.mapSize.width = 1024;
sun.shadow.mapSize.height = 1024;
sun.shadow.camera.left = -50;
sun.shadow.camera.right = 50;
sun.shadow.camera.top = 50;
sun.shadow.camera.bottom = -50;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 200;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xa0d8f0, 0x4a6a3a, 0.55));
scene.add(new THREE.AmbientLight(0xffffff, 0.18));

// ground (flat green plane)
const groundGeom = new THREE.PlaneGeometry(200, 200);
const groundMat  = new THREE.MeshLambertMaterial({ color: 0x4a8a3a });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
ground.userData.isGround = true;
scene.add(ground);

// grid helper
const grid = new THREE.GridHelper(40, 40, 0x6cba47, 0x6cba47);
grid.material.transparent = true;
grid.material.opacity = 0.35;
grid.position.y = -0.49;
scene.add(grid);

// shared box geometry
const BOX = new THREE.BoxGeometry(1, 1, 1);
function materialForId(id){
  const def = BLOCKS.find(b => b.id === id) || BLOCKS[0];
  // water + lava get a small emissive glow
  if (id === 'water'){
    return new THREE.MeshLambertMaterial({ color: def.color, transparent: true, opacity: 0.78 });
  }
  if (id === 'lava'){
    return new THREE.MeshStandardMaterial({ color: def.color, emissive: 0xff8a3a, emissiveIntensity: 0.35, roughness: 0.5 });
  }
  return new THREE.MeshLambertMaterial({ color: def.color });
}
const matCache = new Map();
for (const b of BLOCKS) matCache.set(b.id, materialForId(b.id));

// block storage: key "x,y,z" → mesh
const blocks = new Map();
const $blockCount = document.getElementById('m-blocks');
const $toolName   = document.getElementById('m-tool');

function key(x, y, z){ return x + ',' + y + ',' + z; }
function makeBlock(x, y, z, id){
  const k = key(x, y, z);
  if (blocks.has(k)) return null;
  const mesh = new THREE.Mesh(BOX, matCache.get(id));
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData.blockId = id;
  scene.add(mesh);
  blocks.set(k, mesh);
  $blockCount.textContent = blocks.size;
  return mesh;
}
function removeBlock(x, y, z){
  const k = key(x, y, z);
  const m = blocks.get(k);
  if (!m) return false;
  scene.remove(m);
  blocks.delete(k);
  $blockCount.textContent = blocks.size;
  return true;
}

// procedural terrain seed (chat ask: minecraft-2 with mountains)
// Lightweight stacked-sine pseudo-noise; deterministic per session seed so
// the terrain looks consistent within a play but varies on reload. Each
// column gets a base height; the column is then filled top-down with
// grass → dirt → stone, with snow caps above height 6 and sand near
// water-level depressions.
function generateTerrain(size){
  const half = Math.floor(size / 2);
  const seed = Math.random() * 100;
  function noise(x, z){
    // 3 octaves of sin/cos noise. Range roughly [-1.6, 1.6].
    return (
      Math.sin(x * 0.22 + seed) * Math.cos(z * 0.27 + seed * 1.3) * 0.6 +
      Math.sin(x * 0.48 + z * 0.12 + seed * 2.1) * 0.35 +
      Math.cos(x * 0.08 + z * 0.31 - seed * 0.7) * 0.7
    );
  }
  let maxH = 0, minH = 99;
  const heights = new Map();
  for (let x = -half; x <= half; x++){
    for (let z = -half; z <= half; z++){
      // mild center-bias: peaks toward the middle so the player has a
      // mountain to climb but the edges fall away
      const r = Math.hypot(x, z) / half;
      const centerBias = (1 - r) * 1.4;
      const h = Math.max(0, Math.round(noise(x, z) * 3.6 + centerBias + 1.2));
      heights.set(x + ',' + z, h);
      if (h > maxH) maxH = h;
      if (h < minH) minH = h;
    }
  }
  // emit blocks
  for (const [k, h] of heights){
    const [x, z] = k.split(',').map(Number);
    for (let y = 0; y <= h; y++){
      let id;
      if (y === h){
        if (h >= 7) id = 'snow';
        else if (h <= 0) id = 'sand';
        else id = 'grass';
      } else if (y >= h - 2){
        id = 'dirt';
      } else {
        id = 'stone';
      }
      makeBlock(x, y, z, id);
    }
  }
  // a couple of trees: pick 4 random grass tops and stack wood + snow
  const grassTops = [];
  for (const [k, h] of heights){
    if (h >= 1 && h <= 4) grassTops.push([k, h]);
  }
  for (let i = 0; i < 5 && grassTops.length; i++){
    const idx = Math.floor(Math.random() * grassTops.length);
    const [k, h] = grassTops.splice(idx, 1)[0];
    const [x, z] = k.split(',').map(Number);
    makeBlock(x, h + 1, z, 'wood');
    makeBlock(x, h + 2, z, 'wood');
    makeBlock(x, h + 3, z, 'wood');
    // leafy bit using snow color since we lack a green-leaf block — looks plausible
    makeBlock(x, h + 4, z, 'grass');
    makeBlock(x + 1, h + 3, z, 'grass');
    makeBlock(x - 1, h + 3, z, 'grass');
    makeBlock(x, h + 3, z + 1, 'grass');
    makeBlock(x, h + 3, z - 1, 'grass');
  }
}
generateTerrain(28);

// ── highlight ghost (preview where block will go) ──────────────────
const ghost = new THREE.Mesh(BOX, new THREE.MeshBasicMaterial({
  color: 0xffffff, transparent: true, opacity: 0.32, depthWrite: false,
}));
ghost.visible = false;
scene.add(ghost);
// ghost outline (wireframe edges)
const ghostEdge = new THREE.LineSegments(
  new THREE.EdgesGeometry(BOX),
  new THREE.LineBasicMaterial({ color: 0x0a1828, transparent: true, opacity: 0.7 }),
);
ghostEdge.visible = false;
scene.add(ghostEdge);

// raycaster for placement
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hoverPlace = null;        // { x, y, z } where ghost would place
let hoverRemove = null;       // { x, y, z } existing block being hovered

function pickAt(clientX, clientY){
  const r = canvas.getBoundingClientRect();
  pointer.x =  ((clientX - r.left) / r.width)  * 2 - 1;
  pointer.y = -((clientY - r.top)  / r.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const targets = [...blocks.values(), ground];
  const hits = raycaster.intersectObjects(targets, false);
  return hits[0] || null;
}

function updateGhost(clientX, clientY){
  const hit = pickAt(clientX, clientY);
  ghost.visible = false; ghostEdge.visible = false;
  hoverPlace = null; hoverRemove = null;
  if (!hit) return;
  if (hit.object.userData.isGround){
    // place on ground
    const x = Math.round(hit.point.x);
    const z = Math.round(hit.point.z);
    hoverPlace = { x, y: 0, z };
  } else {
    // adjacent face
    const n = hit.face.normal.clone();
    const p = hit.object.position.clone();
    hoverPlace = { x: Math.round(p.x + n.x), y: Math.round(p.y + n.y), z: Math.round(p.z + n.z) };
    hoverRemove = { x: Math.round(p.x), y: Math.round(p.y), z: Math.round(p.z) };
  }
  if (toolIdx >= 0 && hoverPlace){
    // show place ghost (skip if collides with camera target ish — not worth it)
    ghost.position.set(hoverPlace.x, hoverPlace.y, hoverPlace.z);
    ghost.material.color.setHex(BLOCKS[toolIdx].color);
    ghost.material.opacity = 0.32;
    ghost.visible = true;
    ghostEdge.position.copy(ghost.position);
    ghostEdge.visible = true;
  } else if (toolIdx === -1 && hoverRemove){
    // show eraser ghost on the block we'd remove (red tint)
    ghost.position.set(hoverRemove.x, hoverRemove.y, hoverRemove.z);
    ghost.material.color.setHex(0xff5a2b);
    ghost.material.opacity = 0.45;
    ghost.visible = true;
    ghostEdge.position.copy(ghost.position);
    ghostEdge.visible = true;
  }
}

// pointer interaction (with a small drag threshold so orbit doesn't trigger placement)
let downPos = null, downBtn = -1, dragged = false;
canvas.addEventListener('pointerdown', (e) => {
  downPos = { x: e.clientX, y: e.clientY };
  downBtn = e.button;
  dragged = false;
});
canvas.addEventListener('pointermove', (e) => {
  if (downPos){
    const d = Math.hypot(e.clientX - downPos.x, e.clientY - downPos.y);
    if (d > 5) dragged = true;
  }
  updateGhost(e.clientX, e.clientY);
});
canvas.addEventListener('pointerup', (e) => {
  if (!downPos || dragged){ downPos = null; return; }
  const isRemove = (downBtn === 2) || e.shiftKey || toolIdx === -1;
  if (isRemove){
    if (hoverRemove) removeBlock(hoverRemove.x, hoverRemove.y, hoverRemove.z);
  } else {
    if (hoverPlace){
      const id = BLOCKS[toolIdx].id;
      makeBlock(hoverPlace.x, hoverPlace.y, hoverPlace.z, id);
    }
  }
  downPos = null;
  // refresh ghost after placement
  updateGhost(e.clientX, e.clientY);
});
canvas.addEventListener('pointerleave', () => { ghost.visible = false; ghostEdge.visible = false; });
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// keyboard tool selection
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const k = e.key.toLowerCase();
  if (k >= '1' && k <= '8'){
    selectTool(parseInt(k, 10) - 1);
  } else if (k === '0'){
    selectTool(-1);
  } else if (k === 's'){
    saveWorld();
  } else if (k === 'l'){
    loadWorld();
  }
});

// ── palette UI ──
function selectTool(idx){
  toolIdx = idx;
  for (const el of document.querySelectorAll('.swatch')){
    el.setAttribute('aria-pressed', String(+el.dataset.idx === idx));
  }
  $toolName.textContent = idx === -1 ? 'eraser' : BLOCKS[idx].name;
}
function buildPalette(){
  const $p = document.getElementById('palette');
  for (let i = 0; i < BLOCKS.length; i++){
    const b = BLOCKS[i];
    const sw = document.createElement('button');
    sw.className = 'swatch';
    sw.dataset.idx = i;
    sw.style.background = '#' + b.color.toString(16).padStart(6, '0');
    sw.setAttribute('aria-pressed', i === 0 ? 'true' : 'false');
    sw.setAttribute('aria-label', b.name + ' (key ' + (i+1) + ')');
    sw.title = b.name;
    sw.textContent = String(i + 1);
    sw.addEventListener('click', () => selectTool(i));
    $p.appendChild(sw);
  }
  // eraser
  const eraser = document.createElement('button');
  eraser.className = 'swatch eraser';
  eraser.dataset.idx = -1;
  eraser.setAttribute('aria-label', 'eraser (key 0)');
  eraser.setAttribute('aria-pressed', 'false');
  eraser.title = 'eraser';
  eraser.textContent = '0';
  eraser.addEventListener('click', () => selectTool(-1));
  $p.appendChild(eraser);
}
buildPalette();

// ── save / load (localStorage JSON) ──
const STORE_KEY = 'block-world-v1';
function saveWorld(){
  const arr = [];
  for (const [k, m] of blocks){
    arr.push([m.position.x, m.position.y, m.position.z, m.userData.blockId]);
  }
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({ blocks: arr, savedAt: Date.now() }));
    flash('saved · ' + arr.length + ' blocks');
  } catch(e){ flash('save failed', true); }
}
function loadWorld(){
  let raw;
  try { raw = localStorage.getItem(STORE_KEY); } catch(_){}
  if (!raw){ flash('no saved world'); return; }
  let data;
  try { data = JSON.parse(raw); } catch(_){ flash('save corrupt', true); return; }
  if (!data || !Array.isArray(data.blocks)){ flash('save corrupt', true); return; }
  // wipe current blocks
  for (const m of blocks.values()) scene.remove(m);
  blocks.clear();
  for (const [x, y, z, id] of data.blocks){
    if (BLOCKS.some(b => b.id === id)) makeBlock(x, y, z, id);
  }
  flash('loaded · ' + blocks.size + ' blocks');
}
document.getElementById('btn-save').addEventListener('click', saveWorld);
document.getElementById('btn-load').addEventListener('click', loadWorld);
document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm('clear the world? this is undoable.')) return;
  for (const m of blocks.values()) scene.remove(m);
  blocks.clear();
  $blockCount.textContent = 0;
});

// ── tiny ephemeral flash banner (for save/load) ──
let flashEl = null;
function flash(text, bad){
  if (flashEl) flashEl.remove();
  const div = document.createElement('div');
  div.style.cssText = `
    position:fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 20; pointer-events: none;
    background: ${bad ? '#ffd0d0' : '#fffbe5'};
    border: 2px solid var(--ink); box-shadow: 3px 3px 0 var(--ink);
    padding: .55rem 1rem;
    font-family: 'Silkscreen', monospace; font-size: 0.9rem;
    color: ${bad ? '#a02222' : '#1a1408'};
    border-radius: 4px;
    transition: opacity .25s;
  `;
  div.textContent = text;
  document.body.appendChild(div);
  flashEl = div;
  setTimeout(() => { div.style.opacity = '0'; }, 900);
  setTimeout(() => { div.remove(); flashEl = null; }, 1300);
}

// ── render loop ──
function loop(){
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();

// resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// initial tool
selectTool(0);
// auto-load any previous world (overrides procedural terrain if save exists)
setTimeout(() => {
  try { if (localStorage.getItem(STORE_KEY)) loadWorld(); } catch(_){}
}, 60);
</script>
</body>
</html>
