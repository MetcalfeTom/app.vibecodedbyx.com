<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Stocks</title>
<link rel="icon" href="https://emojicdn.elk.sh/📈">
<meta property="og:title" content="Neon Stocks">
<meta property="og:description" content="Live-updating financial dashboard with glowing neon charts and simulated market data.">
<meta property="og:url" content="https://sloppy.live/neon-stocks/">
<meta property="og:image" content="https://sloppy.live/neon-stocks/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080e;--card:#0a0e18;--border:rgba(0,220,255,0.08);--cyan:#00ddff;--green:#00ff88;--red:#ff3366;--gold:#ffcc00;--purple:#aa55ff;--dim:rgba(255,255,255,0.25)}
html,body{width:100%;height:100%;overflow-x:hidden;background:var(--bg);font-family:'Chakra Petch',sans-serif;color:#dde}
.dash{max-width:1200px;margin:0 auto;padding:12px;display:grid;gap:10px;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto 1fr auto}
@media(max-width:800px){.dash{grid-template-columns:1fr;}}
.header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:8px 4px}
.header h1{font-size:clamp(.9rem,2.5vw,1.3rem);font-weight:700;color:var(--cyan);text-shadow:0 0 12px rgba(0,220,255,0.3);letter-spacing:.1em}
.header .clock{font-family:'Fira Code',monospace;font-size:clamp(.6rem,1.5vw,.8rem);color:var(--dim)}
.ticker-strip{grid-column:1/-1;display:flex;gap:12px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.ticker-strip::-webkit-scrollbar{display:none}
.ticker-card{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 14px;min-width:140px;cursor:pointer;transition:border-color .2s}
.ticker-card.active{border-color:var(--cyan)}
.ticker-card .sym{font-weight:600;font-size:.85rem;letter-spacing:.05em}
.ticker-card .price{font-family:'Fira Code',monospace;font-size:1rem;margin:2px 0}
.ticker-card .change{font-family:'Fira Code',monospace;font-size:.7rem}
.up{color:var(--green)}.down{color:var(--red)}
.chart-panel{grid-column:1/-1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;min-height:280px;position:relative}
.chart-panel canvas{width:100%;height:100%;display:block}
.chart-label{position:absolute;top:8px;left:12px;font-size:.75rem;color:var(--dim);pointer-events:none}
.chart-label span{color:var(--cyan);font-weight:600}
.bottom-row{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:800px){.bottom-row{grid-template-columns:1fr}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px}
.stat-card .label{font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.stat-card .val{font-family:'Fira Code',monospace;font-size:1.1rem}
.stat-card canvas{width:100%;height:40px;display:block;margin-top:6px}
</style>
</head>
<body>
<div class="dash">
  <div class="header">
    <h1>NEON STOCKS</h1>
    <div class="clock" id="clock"></div>
  </div>
  <div class="ticker-strip" id="tickers"></div>
  <div class="chart-panel">
    <div class="chart-label" id="chartLabel"></div>
    <canvas id="mainChart"></canvas>
  </div>
  <div class="bottom-row" id="stats"></div>
</div>
<script>
// --- MOCK STOCKS ---
var STOCKS=[
  {sym:'SLPY',name:'Sloppy Inc',color:'#00ddff',price:142.50,vol:0.012},
  {sym:'VIBE',name:'VibeSpace',color:'#00ff88',price:89.30,vol:0.015},
  {sym:'NEON',name:'NeonCorp',color:'#ff3366',price:234.80,vol:0.018},
  {sym:'GLOW',name:'GlowTech',color:'#ffcc00',price:56.12,vol:0.022},
  {sym:'CRYO',name:'CryoNet',color:'#aa55ff',price:178.90,vol:0.014},
  {sym:'FLUX',name:'FluxDAO',color:'#ff6600',price:312.44,vol:0.025},
  {sym:'PIXL',name:'PixelForge',color:'#00ffcc',price:45.60,vol:0.02},
  {sym:'VOID',name:'VoidLabs',color:'#ff00aa',price:99.99,vol:0.016}
];

var HISTORY_LEN=120;
var selected=0;

// Generate price history
for(var i=0;i<STOCKS.length;i++){
  var s=STOCKS[i];
  s.history=[];s.volumes=[];
  var p=s.price*(0.85+Math.random()*0.3);
  for(var h=0;h<HISTORY_LEN;h++){
    p+=p*s.vol*(Math.random()-0.48);
    p=Math.max(p*0.5,p);
    s.history.push(p);
    s.volumes.push(500000+Math.random()*2000000);
  }
  s.price=s.history[HISTORY_LEN-1];
  s.open=s.history[0];
  s.high=Math.max.apply(null,s.history);
  s.low=Math.min.apply(null,s.history);
  s.prevClose=s.history[HISTORY_LEN-2];
}

// --- TICKER STRIP ---
var tickerEl=document.getElementById('tickers');
function renderTickers(){
  tickerEl.innerHTML='';
  for(var i=0;i<STOCKS.length;i++){
    var s=STOCKS[i];
    var change=((s.price-s.open)/s.open*100);
    var up=change>=0;
    var card=document.createElement('div');
    card.className='ticker-card'+(i===selected?' active':'');
    card.innerHTML='<div class="sym" style="color:'+s.color+'">'+s.sym+'</div>'+
      '<div class="price '+(up?'up':'down')+'">$'+s.price.toFixed(2)+'</div>'+
      '<div class="change '+(up?'up':'down')+'">'+(up?'+':'')+change.toFixed(2)+'%</div>';
    card.dataset.idx=i;
    card.addEventListener('click',function(){
      selected=parseInt(this.dataset.idx);
      renderTickers();
    });
    tickerEl.appendChild(card);
  }
}
renderTickers();

// --- MAIN CHART ---
var mainCV=document.getElementById('mainChart');
var mainX=mainCV.getContext('2d');
var chartLabelEl=document.getElementById('chartLabel');

function drawMainChart(now){
  var rect=mainCV.parentElement.getBoundingClientRect();
  var w=mainCV.width=rect.width-20;
  var h=mainCV.height=Math.max(200,rect.height-30);
  var s=STOCKS[selected];
  var data=s.history;
  var vols=s.volumes;

  chartLabelEl.innerHTML='<span>'+s.sym+'</span> '+s.name+' &bull; '+data.length+' ticks';

  var X=mainX;
  X.clearRect(0,0,w,h);

  var chartH=h*0.72;
  var volH=h*0.2;
  var volTop=chartH+10;

  // Price range
  var min=Infinity,max=-Infinity;
  for(var i=0;i<data.length;i++){if(data[i]<min)min=data[i];if(data[i]>max)max=data[i];}
  var range=max-min||1;
  var pad=range*0.08;min-=pad;max+=pad;range=max-min;

  // Grid lines
  X.strokeStyle='rgba(0,220,255,0.04)';X.lineWidth=0.5;
  for(var g=0;g<5;g++){
    var gy=chartH*(g/4);
    X.beginPath();X.moveTo(0,gy);X.lineTo(w,gy);X.stroke();
  }
  // Price labels
  X.fillStyle='rgba(255,255,255,0.15)';X.font='10px "Fira Code",monospace';X.textAlign='right';
  for(var g=0;g<5;g++){
    var gy=chartH*(g/4);
    var pv=max-range*(g/4);
    X.fillText('$'+pv.toFixed(2),w-4,gy+12);
  }

  // Area fill gradient
  var up=data[data.length-1]>=data[0];
  var lineColor=up?s.color:'#ff3366';
  var fillGrd=X.createLinearGradient(0,0,0,chartH);
  fillGrd.addColorStop(0,lineColor.replace(')',',0.12)').replace('rgb','rgba').replace('#','')); 
  // Simpler approach
  X.globalAlpha=0.08;
  X.fillStyle=lineColor;
  X.beginPath();
  X.moveTo(0,chartH);
  for(var i=0;i<data.length;i++){
    var px=i/(data.length-1)*w;
    var py=chartH-(data[i]-min)/range*chartH;
    X.lineTo(px,py);
  }
  X.lineTo(w,chartH);X.closePath();X.fill();
  X.globalAlpha=1;

  // Glow line
  X.shadowColor=lineColor;X.shadowBlur=8;
  X.strokeStyle=lineColor;X.lineWidth=2;
  X.beginPath();
  for(var i=0;i<data.length;i++){
    var px=i/(data.length-1)*w;
    var py=chartH-(data[i]-min)/range*chartH;
    if(i===0) X.moveTo(px,py); else X.lineTo(px,py);
  }
  X.stroke();
  X.shadowBlur=0;

  // Current price dot
  var lastPx=w;
  var lastPy=chartH-(data[data.length-1]-min)/range*chartH;
  X.fillStyle=lineColor;X.shadowColor=lineColor;X.shadowBlur=12;
  X.beginPath();X.arc(lastPx,lastPy,4,0,Math.PI*2);X.fill();
  // Pulse ring
  var pulseR=4+Math.sin(now/300)*3;
  X.strokeStyle=lineColor;X.lineWidth=1;X.globalAlpha=0.3+Math.sin(now/300)*0.2;
  X.beginPath();X.arc(lastPx,lastPy,pulseR+4,0,Math.PI*2);X.stroke();
  X.globalAlpha=1;X.shadowBlur=0;

  // Volume bars
  var maxVol=0;
  for(var i=0;i<vols.length;i++) if(vols[i]>maxVol) maxVol=vols[i];
  for(var i=0;i<vols.length;i++){
    var bx=i/(vols.length-1)*w;
    var bh=vols[i]/maxVol*volH;
    var bup=i>0?data[i]>=data[i-1]:true;
    X.fillStyle=bup?'rgba(0,255,136,0.15)':'rgba(255,51,102,0.15)';
    X.fillRect(bx-1,volTop+volH-bh,3,bh);
  }

  // Volume label
  X.fillStyle='rgba(255,255,255,0.1)';X.font='9px "Fira Code",monospace';X.textAlign='left';
  X.fillText('VOL',4,volTop+10);
}

// --- STAT CARDS ---
var statsEl=document.getElementById('stats');
var sparkCVs=[];

function renderStats(){
  var s=STOCKS[selected];
  var change=s.price-s.open;
  var changePct=change/s.open*100;
  var up=change>=0;

  var marketCap=(s.price*Math.floor(1e6+s.price*3e4)).toLocaleString();
  var vol24=Math.floor(s.volumes[s.volumes.length-1]).toLocaleString();

  var cards=[
    {label:'Market Cap',val:'$'+marketCap,spark:false},
    {label:'24h Volume',val:'$'+vol24,spark:false},
    {label:'Day Range',val:'$'+s.low.toFixed(2)+' — $'+s.high.toFixed(2),spark:false},
    {label:'Open',val:'$'+s.open.toFixed(2),spark:true,data:s.history.slice(0,40)},
    {label:'Day Change',val:(up?'+':'')+change.toFixed(2)+' ('+(up?'+':'')+changePct.toFixed(2)+'%)',cls:up?'up':'down',spark:true,data:s.history.slice(-40)},
    {label:'Volatility',val:(s.vol*100).toFixed(1)+'%',spark:true,data:generateVolSparkline(s)}
  ];

  statsEl.innerHTML='';sparkCVs=[];
  for(var i=0;i<cards.length;i++){
    var c=cards[i];
    var div=document.createElement('div');div.className='stat-card';
    var valCls=c.cls?' class="'+c.cls+'"':'';
    div.innerHTML='<div class="label">'+c.label+'</div><div class="val"'+valCls+'>'+c.val+'</div>';
    if(c.spark){
      var cv=document.createElement('canvas');cv.height=40;
      div.appendChild(cv);
      sparkCVs.push({cv:cv,data:c.data,color:c.cls==='down'?'#ff3366':STOCKS[selected].color});
    }
    statsEl.appendChild(div);
  }
  drawSparklines();
}

function generateVolSparkline(s){
  var d=[];var v=s.vol;
  for(var i=0;i<40;i++){v+=v*(Math.random()-0.5)*0.3;v=Math.max(0.005,v);d.push(v);}
  return d;
}

function drawSparklines(){
  for(var si=0;si<sparkCVs.length;si++){
    var sp=sparkCVs[si];
    var cv=sp.cv;var data=sp.data;
    cv.width=cv.offsetWidth||200;cv.height=40;
    var sx=cv.getContext('2d');
    var min=Infinity,max=-Infinity;
    for(var i=0;i<data.length;i++){if(data[i]<min)min=data[i];if(data[i]>max)max=data[i];}
    var range=max-min||1;
    sx.strokeStyle=sp.color;sx.lineWidth=1.5;sx.shadowColor=sp.color;sx.shadowBlur=4;
    sx.beginPath();
    for(var i=0;i<data.length;i++){
      var px=i/(data.length-1)*cv.width;
      var py=cv.height-(data[i]-min)/range*(cv.height-4)-2;
      if(i===0) sx.moveTo(px,py); else sx.lineTo(px,py);
    }
    sx.stroke();sx.shadowBlur=0;
  }
}

renderStats();

// --- LIVE UPDATES ---
function tickPrices(){
  for(var i=0;i<STOCKS.length;i++){
    var s=STOCKS[i];
    var dp=s.price*s.vol*(Math.random()-0.48)*0.3;
    s.price=Math.max(1,s.price+dp);
    s.history.push(s.price);
    s.volumes.push(500000+Math.random()*2000000);
    if(s.history.length>HISTORY_LEN){s.history.shift();s.volumes.shift();}
    s.high=Math.max(s.high,s.price);
    s.low=Math.min(s.low,s.price);
  }
  renderTickers();
  renderStats();
}

setInterval(tickPrices,1500);

// --- CLOCK ---
function updateClock(){
  var d=new Date();
  var h=d.getHours(),m=d.getMinutes(),sec=d.getSeconds();
  document.getElementById('clock').textContent=
    (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec+' UTC'+
    (d.getTimezoneOffset()>0?'-':'+')+Math.abs(d.getTimezoneOffset()/60);
}
updateClock();setInterval(updateClock,1000);

// --- CHART ANIMATION ---
function chartLoop(now){
  drawMainChart(now);
  requestAnimationFrame(chartLoop);
}
requestAnimationFrame(chartLoop);

// --- RESIZE ---
window.addEventListener('resize',function(){renderStats();});
</script>
</body>
</html>
