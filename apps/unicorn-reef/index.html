<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Unicorn Reef · Neon Jellyfish &amp; Rainbow Seahorses</title>
<meta name="description" content="A glowing aquarium of neon jellyfish and rainbow unicorn seahorses drifting through god-ray sunbeams." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A6%84" />
<meta property="og:title" content="Unicorn Reef" />
<meta property="og:description" content="Drift through a glowing reef of neon jellyfish and rainbow unicorn seahorses. Click to summon." />
<meta property="og:url" content="https://sloppy.live/unicorn-reef/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/glowing%20rainbow%20unicorn%20seahorses%20with%20spiral%20horns%20pastel%20rainbow%20scales%20neon%20jellyfish%20deep%20blue%20violet%20underwater%20god%20rays%20sparkles?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Cormorant+Garamond:ital,wght@1,500&family=Space+Mono:wght@400&family=Major+Mono+Display&display=swap" rel="stylesheet" />
<style>
:root{
  --abyss:#040818;
  --deep:#0c1738;
  --mid:#1a2960;
  --shallow:#2c3aa0;
  --pink:#ff7eea;
  --cyan:#7be4ff;
  --gold:#ffd66a;
  --bone:#fdf3ff;
  --dim:rgba(253,243,255,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--abyss);color:var(--bone);font-family:'Space Mono',monospace}
body{
  background:
    radial-gradient(ellipse at 50% -10%, rgba(255,222,255,0.18), transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(70,30,120,0.5), transparent 70%),
    linear-gradient(180deg, var(--abyss) 0%, var(--deep) 35%, var(--mid) 68%, var(--shallow) 92%, #4d52c8 100%);
}
body::before{
  /* sparkle dust */
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:
    radial-gradient(rgba(255,255,255,0.18) 1px, transparent 1.5px),
    radial-gradient(rgba(180,220,255,0.12) 1px, transparent 1.5px);
  background-size: 220px 220px, 140px 140px;
  background-position: 0 0, 80px 60px;
  mix-blend-mode:screen;
  animation:sparkleDrift 90s linear infinite;
}
@keyframes sparkleDrift{
  from{background-position: 0 0, 80px 60px}
  to{background-position: -440px -220px, -360px -300px}
}
#tank{position:fixed;inset:0;z-index:2;display:block;cursor:pointer}

.title{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Pacifico', cursive;
  font-size:clamp(28px, 4.4vw, 56px);
  background:linear-gradient(90deg, #ff7eea 0%, #ffd66a 25%, #7be4ff 55%, #b27bff 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 24px rgba(255,150,255,0.5)) drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  letter-spacing:0.01em;
  pointer-events:none;
  line-height:1;
}
.tagline{
  position:fixed;top:calc(18px + 4vw + 32px);left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Cormorant Garamond', serif;font-style:italic;
  font-size:clamp(13px, 1.6vw, 18px);
  color:rgba(253,243,255,0.62);
  letter-spacing:0.16em;text-align:center;
  pointer-events:none;
  text-shadow:0 0 8px rgba(123,228,255,0.4);
}
.hud{
  position:fixed;top:18px;left:18px;z-index:5;
  font-family:'Major Mono Display', monospace;font-size:11px;letter-spacing:0.18em;
  color:var(--dim);
  pointer-events:none;line-height:1.7;
}
.hud b{color:var(--bone);font-weight:400}

.toolbar{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:6;
  display:flex;gap:6px;
  background:rgba(10,15,40,0.55);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,200,255,0.28);
  padding:8px;border-radius:999px;
  box-shadow:0 0 28px rgba(178,123,255,0.22), inset 0 0 18px rgba(123,228,255,0.08);
}
.tb{
  background:transparent;border:1px solid rgba(255,255,255,0.14);
  color:var(--bone);
  font-family:'Pacifico', cursive;font-size:13px;
  padding:8px 16px;cursor:pointer;border-radius:999px;
  transition:all 0.14s ease;letter-spacing:0.02em;
}
.tb:hover{background:rgba(255,200,255,0.12);border-color:var(--pink);box-shadow:0 0 14px rgba(255,126,234,0.45)}
.tb.cyan:hover{border-color:var(--cyan);box-shadow:0 0 14px rgba(123,228,255,0.5);color:var(--cyan)}
.tb.gold:hover{border-color:var(--gold);box-shadow:0 0 14px rgba(255,214,106,0.5);color:var(--gold)}
.tb.active{background:rgba(255,126,234,0.22);border-color:var(--pink);color:var(--bone);box-shadow:0 0 14px rgba(255,126,234,0.55)}
.tb .k{color:var(--dim);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.1em;display:block;margin-top:-2px}

.muted{
  position:fixed;bottom:18px;left:18px;z-index:6;
  background:transparent;border:1px solid rgba(255,255,255,0.18);color:var(--dim);
  font-family:'Pacifico', cursive;font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer;
}
.muted:hover{color:var(--bone);border-color:var(--cyan)}

.kbd{
  position:fixed;bottom:18px;right:18px;z-index:5;
  font-family:'Space Mono', monospace;font-size:10px;color:var(--dim);
  text-align:right;line-height:1.6;pointer-events:none;
  text-shadow:0 0 4px rgba(0,0,0,0.7);
}
.kbd b{color:var(--cyan);font-weight:400}
@media (max-width:560px){
  .kbd{display:none}
  .tagline{display:none}
  .tb{font-size:11px;padding:6px 12px}
}
</style>
</head>
<body>
<canvas id="tank"></canvas>

<div class="title">unicorn reef</div>
<div class="tagline">— a kingdom of glow and curl —</div>

<div class="hud">
  <div>JELLIES · <b id="hJ">0</b></div>
  <div>SEAHORSES · <b id="hS">0</b></div>
</div>

<div class="toolbar">
  <button class="tb cyan" id="bJelly">+ jelly<span class="k">J</span></button>
  <button class="tb gold" id="bSea">+ seahorse<span class="k">S</span></button>
  <button class="tb" id="bClear">tide pool<span class="k">R</span></button>
</div>
<button class="muted" id="bMute">♪ off</button>
<div class="kbd">click tank · summon &nbsp; <b>J</b>/<b>S</b> · spawn &nbsp; <b>R</b> · reset &nbsp; <b>M</b> · sound</div>

<script>
(() => {
  const canvas = document.getElementById('tank');
  const ctx = canvas.getContext('2d');
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let W = innerWidth, H = innerHeight;
  function resize(){
    W = innerWidth; H = innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  addEventListener('resize', resize);

  // === time ===
  let t0 = performance.now();
  let lastFrame = t0;

  // === bubbles ===
  const bubbles = [];
  function spawnBubble() {
    bubbles.push({
      x: Math.random() * W, y: H + 10,
      r: 1 + Math.random() * 4,
      vy: 12 + Math.random() * 28,
      sway: 8 + Math.random() * 18,
      phase: Math.random() * Math.PI * 2,
      a: 0.3 + Math.random() * 0.4,
    });
  }
  for (let i = 0; i < 30; i++) { spawnBubble(); bubbles[bubbles.length - 1].y = Math.random() * H; }

  // === sparkles ===
  const sparkles = [];
  function spawnSparkle(x, y, c) {
    sparkles.push({ x, y, life: 0.6 + Math.random() * 0.6, max: 0.6 + Math.random() * 0.6, color: c, r: 1 + Math.random() * 2 });
  }

  // === seafloor kelp ===
  const kelps = [];
  function buildKelp() {
    kelps.length = 0;
    const n = Math.floor(W / 90) + 4;
    for (let i = 0; i < n; i++) {
      const x = Math.random() * W;
      const h = 90 + Math.random() * 220;
      const segs = Math.floor(8 + h / 22);
      const hue = 140 + Math.random() * 100; // sea greens / teals
      kelps.push({ x, h, segs, hue, phase: Math.random() * Math.PI * 2, sway: 0.4 + Math.random() * 0.6 });
    }
  }
  buildKelp();
  addEventListener('resize', buildKelp);

  // === light shafts ===
  const shafts = [];
  for (let i = 0; i < 6; i++) {
    shafts.push({ x: 0.05 + i * 0.18 + Math.random() * 0.05, w: 0.06 + Math.random() * 0.08, phase: Math.random() * Math.PI * 2 });
  }

  // === jellyfish ===
  class Jelly {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.size = 32 + Math.random() * 40;
      this.hue = Math.random() * 360;
      this.tentCount = 6 + Math.floor(Math.random() * 5);
      this.frillCount = 8 + Math.floor(Math.random() * 6);
      this.pulsePhase = Math.random() * Math.PI * 2;
      this.pulseSpeed = 1.4 + Math.random() * 0.9;
      this.vy = -8 - Math.random() * 14;
      this.vx = (Math.random() - 0.5) * 14;
      this.born = performance.now();
    }
    update(dt) {
      this.pulsePhase += this.pulseSpeed * dt;
      // pulse-driven thrust
      const pulse = Math.max(0, Math.sin(this.pulsePhase));
      this.y += (this.vy - pulse * 60) * dt;
      this.x += this.vx * dt;
      // gravity-like settling (very gentle)
      this.vy += 6 * dt;
      this.vx *= Math.pow(0.985, dt * 60);
      // wrap
      if (this.x < -120) this.x = W + 120;
      if (this.x > W + 120) this.x = -120;
      if (this.y < -120) { this.y = H + 80; this.vy = -10 - Math.random() * 14; }
      if (this.y > H + 120) { this.y = -80; this.vy = -10 - Math.random() * 14; }
    }
    draw(ctx, time) {
      const pulse = Math.sin(this.pulsePhase) * 0.5 + 0.5;
      const bellW = this.size * (1.05 + pulse * 0.18);
      const bellH = this.size * (0.78 - pulse * 0.16);
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.globalCompositeOperation = 'lighter';
      // outer halo
      const halo = ctx.createRadialGradient(0, 0, bellW * 0.4, 0, 0, bellW * 1.6);
      halo.addColorStop(0, `hsla(${this.hue}, 90%, 65%, 0.22)`);
      halo.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(0, 0, bellW * 1.6, 0, Math.PI * 2);
      ctx.fill();
      // bell
      const bell = ctx.createRadialGradient(0, -bellH * 0.4, 2, 0, 0, bellW);
      bell.addColorStop(0, `hsla(${this.hue}, 90%, 80%, 0.95)`);
      bell.addColorStop(0.55, `hsla(${(this.hue + 40) % 360}, 88%, 60%, 0.7)`);
      bell.addColorStop(1, `hsla(${(this.hue + 80) % 360}, 92%, 36%, 0.05)`);
      ctx.fillStyle = bell;
      ctx.beginPath();
      ctx.ellipse(0, 0, bellW, bellH, 0, Math.PI, 0); // top half
      ctx.lineTo(-bellW, 0);
      ctx.closePath();
      ctx.fill();
      // bell rim ribbons
      ctx.lineWidth = 1.4;
      for (let i = 0; i < 3; i++) {
        ctx.strokeStyle = `hsla(${this.hue + i * 30}, 85%, 70%, ${0.6 - i * 0.18})`;
        ctx.beginPath();
        ctx.ellipse(0, 0, bellW * (1 - i * 0.18), bellH * (0.55 - i * 0.08), 0, Math.PI, 0);
        ctx.stroke();
      }
      // frills (under-bell wavy edge)
      ctx.lineWidth = 1.6;
      ctx.strokeStyle = `hsla(${this.hue + 20}, 85%, 70%, 0.85)`;
      ctx.beginPath();
      for (let i = 0; i <= this.frillCount; i++) {
        const u = i / this.frillCount;
        const x = -bellW + u * bellW * 2;
        const wob = Math.sin(time * 4 + i * 0.7) * 4;
        ctx.lineTo(x, 4 + wob + Math.sin(u * Math.PI) * 2);
      }
      ctx.stroke();
      // tentacles
      for (let i = 0; i < this.tentCount; i++) {
        const ix = -bellW * 0.7 + (i / (this.tentCount - 1)) * bellW * 1.4;
        const len = bellH * 3.4 + Math.random() * 4 + i % 2 * 8;
        ctx.strokeStyle = `hsla(${this.hue + i * 14}, 90%, 70%, ${0.55 - Math.abs(i - this.tentCount / 2) * 0.04})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(ix, 6);
        for (let s = 1; s <= 14; s++) {
          const u = s / 14;
          const sway = Math.sin(time * 1.6 + i + u * 6) * (10 + u * 14);
          ctx.lineTo(ix + sway, 6 + u * len);
        }
        ctx.stroke();
      }
      // oral arms (frillier center streamers)
      for (let i = 0; i < 3; i++) {
        ctx.strokeStyle = `hsla(${(this.hue + 50) % 360}, 95%, 85%, 0.7)`;
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        const ox = (i - 1) * bellW * 0.18;
        ctx.moveTo(ox, 6);
        for (let s = 1; s <= 10; s++) {
          const u = s / 10;
          const sway = Math.sin(time * 2 + i * 1.7 + u * 5) * (6 + u * 12);
          ctx.lineTo(ox + sway, 6 + u * bellH * 2.2);
        }
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  // === rainbow unicorn seahorse ===
  class Seahorse {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.t = Math.random() * 100;
      this.scale = 0.85 + Math.random() * 0.55;
      this.dir = Math.random() < 0.5 ? 1 : -1;
      this.driftX = (Math.random() - 0.5) * 18;
      this.driftY = (Math.random() - 0.5) * 6;
      this.bobPhase = Math.random() * Math.PI * 2;
      this.swayPhase = Math.random() * Math.PI * 2;
      this.hueOffset = Math.random() * 360;
      this.tailCurl = 1 + Math.random() * 0.4;
    }
    update(dt) {
      this.t += dt;
      // gentle horizontal meander
      this.x += (this.driftX + Math.sin(this.t * 0.5 + this.swayPhase) * 8) * dt;
      this.y += (this.driftY + Math.sin(this.t * 0.7 + this.bobPhase) * 5) * dt;
      // wrap
      if (this.x < -160) { this.x = W + 160; }
      if (this.x > W + 160) { this.x = -160; }
      if (this.y < 80) this.y = 80;
      if (this.y > H - 80) this.y = H - 80;
      // occasional flip
      if (Math.random() < 0.0003) this.dir *= -1;
    }
    draw(ctx, time) {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.scale(this.dir * this.scale, this.scale);

      // body spline — iconic seahorse "?" curve
      // Anchored on shape with light per-frame breathing
      const breath = Math.sin(time * 1.4 + this.bobPhase) * 2.4;
      const sway = Math.sin(time * 1.1 + this.swayPhase) * 0.06;
      // 12 spline points, head→tail
      const N = 12;
      const pts = [];
      for (let i = 0; i < N; i++) {
        const u = i / (N - 1);
        // base curve (in local space). Head at top, tail curling back.
        // x oscillates as a sin to make the "S"
        const cx = Math.sin(u * Math.PI * 1.4 + sway) * 22 - 6;
        const cy = -38 + u * 78;
        // additional curl at the tail (last 30% u > 0.7)
        const tailU = Math.max(0, (u - 0.7) / 0.3);
        const curlAng = tailU * Math.PI * 1.3 * this.tailCurl;
        const curlR = 16 * tailU;
        const tx = cx + Math.cos(curlAng + Math.PI * 1.5) * curlR - curlR;
        const ty = cy + Math.sin(curlAng + Math.PI * 1.5) * curlR + 2;
        const finalX = (1 - tailU) * cx + tailU * tx;
        const finalY = (1 - tailU) * cy + tailU * ty;
        // taper width
        const w = (1 - u) * 14 + 4;
        pts.push({ x: finalX, y: finalY + breath * (1 - u), w, u });
      }

      // === body fill: rainbow bands along the curve ===
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      // outer halo glow
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.lineWidth = 30;
      ctx.strokeStyle = `hsla(${(this.hueOffset + 320) % 360}, 100%, 75%, 0.18)`;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.stroke();
      ctx.restore();

      // dark base body (gives definition under the rainbow)
      ctx.lineWidth = 16;
      ctx.strokeStyle = 'rgba(20,8,40,0.55)';
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.stroke();

      // rainbow segments — each segment between consecutive points stroked with hue based on u
      for (let i = 0; i < pts.length - 1; i++) {
        const a = pts[i], b = pts[i + 1];
        const u = (a.u + b.u) / 2;
        const hue = (this.hueOffset + u * 320) % 360;
        ctx.lineWidth = (a.w + b.w);
        ctx.strokeStyle = `hsl(${hue}, 92%, 72%)`;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
      // shimmer pass: lighter inner stroke on top
      for (let i = 0; i < pts.length - 1; i++) {
        const a = pts[i], b = pts[i + 1];
        const u = (a.u + b.u) / 2;
        const hue = (this.hueOffset + u * 320 + 30) % 360;
        ctx.lineWidth = (a.w + b.w) * 0.45;
        ctx.strokeStyle = `hsla(${hue}, 100%, 90%, 0.7)`;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      // bony segment plates — small dark dashes perpendicular to body
      for (let i = 1; i < pts.length - 1; i++) {
        const a = pts[i - 1], c = pts[i], b = pts[i + 1];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = Math.hypot(dx, dy) || 0.01;
        const nx = -dy / d, ny = dx / d;
        const len = c.w * 0.55;
        ctx.strokeStyle = 'rgba(20,8,40,0.5)';
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        ctx.moveTo(c.x - nx * len, c.y - ny * len);
        ctx.lineTo(c.x + nx * len, c.y + ny * len);
        ctx.stroke();
      }

      // dorsal fin — fluttering rainbow fan along upper-back middle
      const finCenter = pts[Math.floor(N * 0.35)];
      const finSegs = 12;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (let i = 0; i < finSegs; i++) {
        const u = i / (finSegs - 1);
        const flick = Math.sin(time * 9 + u * 4) * 3;
        const fx = finCenter.x - 14 + u * 28;
        const fy = finCenter.y - 14 + flick;
        ctx.strokeStyle = `hsla(${(this.hueOffset + u * 360) % 360}, 100%, 80%, 0.55)`;
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(finCenter.x - 14 + u * 28, finCenter.y);
        ctx.lineTo(fx, fy);
        ctx.stroke();
      }
      ctx.restore();

      // mane — flowing rainbow strands at neck/top of back
      const manePts = [];
      for (let i = 0; i < 7; i++) {
        const baseT = 0.05 + i * 0.05;
        const idx = Math.floor(baseT * N);
        const base = pts[Math.min(N - 1, idx)];
        manePts.push({ base, hue: (this.hueOffset + i * 50) % 360, ph: i * 0.7 });
      }
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.lineCap = 'round';
      ctx.lineWidth = 2.2;
      for (const m of manePts) {
        ctx.strokeStyle = `hsla(${m.hue}, 100%, 80%, 0.85)`;
        ctx.beginPath();
        ctx.moveTo(m.base.x - 8, m.base.y - 4);
        for (let s = 1; s <= 6; s++) {
          const u = s / 6;
          const wob = Math.sin(time * 2.4 + m.ph + u * 4) * 8;
          ctx.lineTo(m.base.x - 8 - u * 22 + wob, m.base.y - 4 - u * 18);
        }
        ctx.stroke();
      }
      ctx.restore();

      // === head + horn + eye ===
      const head = pts[0];
      ctx.save();
      ctx.translate(head.x, head.y);
      // head bulge
      ctx.fillStyle = `hsl(${(this.hueOffset + 340) % 360}, 92%, 80%)`;
      ctx.strokeStyle = 'rgba(20,8,40,0.55)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.ellipse(0, 0, 12, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // snout
      ctx.fillStyle = `hsl(${(this.hueOffset + 340) % 360}, 95%, 85%)`;
      ctx.beginPath();
      ctx.moveTo(8, 0);
      ctx.quadraticCurveTo(18, -2, 24, 1);
      ctx.quadraticCurveTo(20, 4, 8, 5);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(2, -2, 3.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a0a3a';
      ctx.beginPath();
      ctx.arc(2.6, -2, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(3.4, -2.7, 0.8, 0, Math.PI * 2);
      ctx.fill();
      // eyelash
      ctx.strokeStyle = '#1a0a3a';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(0, -5); ctx.lineTo(-1, -7);
      ctx.moveTo(2, -6); ctx.lineTo(2, -8);
      ctx.moveTo(4, -5.5); ctx.lineTo(5, -7.5);
      ctx.stroke();

      // === unicorn horn ===
      const hornHeight = 26;
      const hornBaseX = -2, hornBaseY = -8;
      // base shimmer
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const hornGrad = ctx.createLinearGradient(hornBaseX, hornBaseY, hornBaseX, hornBaseY - hornHeight);
      hornGrad.addColorStop(0, '#fff8c4');
      hornGrad.addColorStop(0.5, '#ffd66a');
      hornGrad.addColorStop(1, '#ff7eea');
      ctx.fillStyle = hornGrad;
      ctx.beginPath();
      ctx.moveTo(hornBaseX - 4, hornBaseY);
      ctx.lineTo(hornBaseX + 4, hornBaseY);
      ctx.lineTo(hornBaseX + 1, hornBaseY - hornHeight);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      // horn outline
      ctx.strokeStyle = 'rgba(40,15,80,0.7)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(hornBaseX - 4, hornBaseY);
      ctx.lineTo(hornBaseX + 1, hornBaseY - hornHeight);
      ctx.lineTo(hornBaseX + 4, hornBaseY);
      ctx.stroke();
      // spiral grooves
      ctx.strokeStyle = 'rgba(40,15,80,0.6)';
      ctx.lineWidth = 0.8;
      for (let s = 0; s < 5; s++) {
        const sy = hornBaseY - (s + 0.5) * (hornHeight / 5);
        const off = (s % 2 === 0) ? 1 : -1;
        ctx.beginPath();
        ctx.moveTo(hornBaseX - 3.5 + s * 0.6, sy);
        ctx.quadraticCurveTo(hornBaseX + off * 1, sy - 1, hornBaseX + 3.5 - s * 0.6, sy);
        ctx.stroke();
      }
      // tip sparkle
      const sparkleA = 0.5 + 0.5 * Math.sin(time * 6 + this.bobPhase);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = `rgba(255,240,200,${0.6 + sparkleA * 0.4})`;
      ctx.beginPath();
      ctx.arc(hornBaseX + 1, hornBaseY - hornHeight, 3 + sparkleA * 1.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.restore(); // head

      ctx.restore(); // seahorse
    }
  }

  // === coral hideout ===
  const coral = {
    x: 0, y: 0,         // set on resize
    tendrils: 14,
    hue: 12,            // warm orange-red anemone
    phase: Math.random() * Math.PI * 2,
  };
  function placeCoral() {
    coral.x = W * 0.78;
    coral.y = H - 60;
  }
  placeCoral();
  addEventListener('resize', placeCoral);

  function drawCoral(time) {
    ctx.save();
    ctx.translate(coral.x, coral.y);
    // base mound — purple-pink coral rock
    ctx.fillStyle = 'rgba(120,40,140,0.7)';
    ctx.beginPath();
    ctx.ellipse(0, 4, 60, 18, 0, Math.PI, 0);
    ctx.lineTo(60, 12);
    ctx.lineTo(-60, 12);
    ctx.closePath();
    ctx.fill();
    // little pock dots
    for (let i = 0; i < 7; i++) {
      const x = -50 + i * 16;
      ctx.fillStyle = 'rgba(255,180,220,0.4)';
      ctx.beginPath();
      ctx.arc(x, -2 - (i % 3) * 2, 2 + (i % 3), 0, Math.PI * 2);
      ctx.fill();
    }
    // anemone tendrils (sway)
    ctx.lineCap = 'round';
    for (let i = 0; i < coral.tendrils; i++) {
      const u = (i / (coral.tendrils - 1)) - 0.5;
      const baseX = u * 70;
      const baseY = -4;
      const len = 32 + Math.sin(i * 1.3) * 10 + (1 - Math.abs(u)) * 18;
      ctx.strokeStyle = `hsla(${coral.hue + i * 6}, 90%, ${60 + (i % 3) * 6}%, 0.85)`;
      ctx.lineWidth = 3.6 - Math.abs(u) * 1.2;
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      for (let s = 1; s <= 8; s++) {
        const v = s / 8;
        const sway = Math.sin(time * 1.6 + coral.phase + i * 0.5 + v * 3) * (3 + v * 8);
        ctx.lineTo(baseX + sway, baseY - v * len);
      }
      ctx.stroke();
      // tip dot
      ctx.fillStyle = `hsla(${coral.hue + i * 6 + 30}, 100%, 80%, 0.9)`;
      ctx.beginPath();
      const tipSway = Math.sin(time * 1.6 + coral.phase + i * 0.5 + 3) * (3 + 8);
      ctx.arc(baseX + tipSway, baseY - len, 2.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // === Nemo the neon clownfish ===
  // Behavior: idles inside coral (hidden), peeks out, sometimes ventures into a small loop, then returns home.
  const nemo = {
    name: 'Nemo',
    x: coral.x, y: coral.y - 16,
    homeX: coral.x, homeY: coral.y - 16,
    state: 'hide',           // 'hide' | 'peek' | 'venture' | 'return'
    stateUntil: performance.now() + 2500,
    targetX: coral.x, targetY: coral.y - 16,
    facing: -1,              // facing left toward open water by default
    phase: Math.random() * Math.PI * 2,
    showName: 0,             // 0..1 fade
  };
  function nemoUpdate(dt) {
    nemo.homeX = coral.x; nemo.homeY = coral.y - 16;
    const now = performance.now();
    if (now > nemo.stateUntil) {
      // pick next state with weighted random
      const r = Math.random();
      if (nemo.state === 'hide') {
        if (r < 0.55) { nemo.state = 'peek'; nemo.stateUntil = now + 1800 + Math.random() * 1800;
          nemo.targetX = nemo.homeX - 22; nemo.targetY = nemo.homeY - 6; }
        else { nemo.state = 'venture'; nemo.stateUntil = now + 4500 + Math.random() * 3000;
          nemo.targetX = nemo.homeX - 80 - Math.random() * 60;
          nemo.targetY = nemo.homeY - 30 - Math.random() * 40; }
      } else if (nemo.state === 'peek') {
        if (r < 0.4) { nemo.state = 'venture'; nemo.stateUntil = now + 3500 + Math.random() * 2500;
          nemo.targetX = nemo.homeX - 80 - Math.random() * 60;
          nemo.targetY = nemo.homeY - 30 - Math.random() * 40; }
        else { nemo.state = 'hide'; nemo.stateUntil = now + 1200 + Math.random() * 2400;
          nemo.targetX = nemo.homeX; nemo.targetY = nemo.homeY; }
      } else if (nemo.state === 'venture') {
        nemo.state = 'return'; nemo.stateUntil = now + 2400;
        nemo.targetX = nemo.homeX; nemo.targetY = nemo.homeY;
      } else { // return
        nemo.state = 'hide'; nemo.stateUntil = now + 1500 + Math.random() * 2200;
        nemo.targetX = nemo.homeX; nemo.targetY = nemo.homeY;
      }
    }
    // ease toward target
    const dx = nemo.targetX - nemo.x, dy = nemo.targetY - nemo.y;
    const sp = (nemo.state === 'venture' || nemo.state === 'return') ? 1.4 : 0.9;
    nemo.x += dx * Math.min(1, sp * dt);
    nemo.y += dy * Math.min(1, sp * dt);
    nemo.x += Math.sin(performance.now() * 0.005 + nemo.phase) * 0.5;
    nemo.y += Math.sin(performance.now() * 0.004 + nemo.phase + 1) * 0.4;
    // facing follows target
    if (Math.abs(dx) > 4) nemo.facing = dx < 0 ? -1 : 1;
    // name label fades in when ventured
    const wantsName = nemo.state === 'venture' || nemo.state === 'return';
    nemo.showName += ((wantsName ? 1 : 0) - nemo.showName) * Math.min(1, dt * 3);
  }
  function nemoDraw(time) {
    // partial hide: when state is 'hide', clip the fish behind the anemone tendrils
    const inHiding = (nemo.state === 'hide');
    const peeking = (nemo.state === 'peek');
    ctx.save();
    if (inHiding) {
      // clip to area outside the anemone — only show parts that poke out
      ctx.beginPath();
      ctx.rect(0, 0, W, coral.y - 30);  // top half visible
      ctx.rect(0, coral.y - 30, coral.x - 30, H);  // left
      ctx.rect(coral.x + 30, coral.y - 30, W, H);  // right
      ctx.clip();
    }
    ctx.translate(nemo.x, nemo.y);
    ctx.scale(nemo.facing, 1);

    const bodyW = 18, bodyH = 11;
    // outer neon glow halo
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const halo = ctx.createRadialGradient(0, 0, bodyW * 0.4, 0, 0, bodyW * 2);
    halo.addColorStop(0, 'rgba(255,140,40,0.45)');
    halo.addColorStop(0.5, 'rgba(255,90,30,0.18)');
    halo.addColorStop(1, 'rgba(255,90,30,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(0, 0, bodyW * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // body — orange ellipse w/ slight tail taper
    const bodyGrad = ctx.createRadialGradient(-2, -2, 1, 0, 0, bodyW);
    bodyGrad.addColorStop(0, '#ffd166');
    bodyGrad.addColorStop(0.45, '#ff8a3d');
    bodyGrad.addColorStop(1, '#e54e12');
    ctx.fillStyle = bodyGrad;
    ctx.strokeStyle = '#1a0810';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.ellipse(0, 0, bodyW, bodyH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // tail wag
    const wag = Math.sin(time * 12) * 4;
    ctx.fillStyle = '#ff8a3d';
    ctx.beginPath();
    ctx.moveTo(bodyW - 2, 0);
    ctx.lineTo(bodyW + 12, -7 + wag);
    ctx.lineTo(bodyW + 14, 0);
    ctx.lineTo(bodyW + 12, 7 + wag);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // 3 white stripes outlined in black (clownfish signature)
    function stripe(cx, w) {
      ctx.save();
      // clip to body ellipse
      ctx.beginPath();
      ctx.ellipse(0, 0, bodyW - 0.4, bodyH - 0.4, 0, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = '#fff8e8';
      ctx.beginPath();
      ctx.ellipse(cx, 0, w, bodyH * 1.3, 0.06, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#1a0810';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }
    stripe(-bodyW * 0.55, 2.6);  // head stripe
    stripe(-bodyW * 0.05, 3.2);  // mid stripe
    stripe( bodyW * 0.55, 2.4);  // tail stripe

    // top fin
    ctx.fillStyle = '#ff8a3d';
    ctx.beginPath();
    ctx.moveTo(-2, -bodyH + 1);
    ctx.quadraticCurveTo(0, -bodyH - 8 + Math.sin(time * 9) * 1.5, 4, -bodyH + 1);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // pec fin
    ctx.fillStyle = '#ffb061';
    ctx.beginPath();
    ctx.moveTo(-bodyW * 0.2, 2);
    ctx.quadraticCurveTo(-bodyW * 0.5, 8 + Math.sin(time * 10) * 1.8, -bodyW * 0.05, 5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-bodyW * 0.55, -1, 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a0810';
    ctx.beginPath();
    ctx.arc(-bodyW * 0.55 - 0.3, -1, 1.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-bodyW * 0.55 - 0.7, -1.4, 0.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // name label
    if (nemo.showName > 0.04) {
      ctx.save();
      ctx.globalAlpha = nemo.showName * 0.85;
      ctx.font = "italic 14px 'Cormorant Garamond', serif";
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.shadowColor = 'rgba(255,140,40,0.9)';
      ctx.shadowBlur = 10;
      ctx.fillText(nemo.name, nemo.x, nemo.y - 22);
      ctx.restore();
    }
  }

  // === collections ===
  const jellies = [];
  const seahorses = [];

  function addJelly(x, y) {
    if (jellies.length >= 18) jellies.shift();
    jellies.push(new Jelly(x ?? Math.random() * W, y ?? H * 0.5 + Math.random() * H * 0.4));
    document.getElementById('hJ').textContent = jellies.length;
  }
  function addSeahorse(x, y) {
    if (seahorses.length >= 14) seahorses.shift();
    seahorses.push(new Seahorse(x ?? Math.random() * W, y ?? 100 + Math.random() * (H - 200)));
    document.getElementById('hS').textContent = seahorses.length;
  }

  // seed the reef
  for (let i = 0; i < 5; i++) addJelly();
  for (let i = 0; i < 4; i++) addSeahorse();

  // === audio ===
  let audioCtx = null, master = null, drone = null, muted = true;
  function audio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      master = audioCtx.createGain();
      master.gain.value = 0.3;
      master.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function startDrone() {
    if (!audioCtx || drone) return;
    const t = audioCtx.currentTime;
    drone = audioCtx.createGain();
    drone.gain.value = 0;
    drone.gain.linearRampToValueAtTime(0.18, t + 2);
    drone.connect(master);
    [55, 82.4, 110, 164.8].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      o.type = i % 2 ? 'sine' : 'triangle';
      o.frequency.value = f;
      const lp = audioCtx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 520; lp.Q.value = 0.6;
      const lfo = audioCtx.createOscillator();
      lfo.type = 'sine'; lfo.frequency.value = 0.04 + i * 0.018;
      const lfoG = audioCtx.createGain();
      lfoG.gain.value = 4 + i * 1.2;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      lfo.start();
      o.connect(lp); lp.connect(drone);
      o.start();
    });
  }
  function chime(hue) {
    if (muted || !audioCtx) return;
    const t = audioCtx.currentTime;
    const f = 320 + (hue / 360) * 480;
    [f, f * 1.5, f * 2].forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      o.type = i === 0 ? 'triangle' : 'sine';
      o.frequency.setValueAtTime(freq, t);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.05 - i * 0.015, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 1.4);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t + 1.5);
    });
  }
  document.getElementById('bMute').onclick = () => {
    muted = !muted;
    document.getElementById('bMute').textContent = muted ? '♪ off' : '♪ on';
    if (!muted) { audio(); startDrone(); } else if (drone) { drone.gain.cancelScheduledValues(audioCtx.currentTime); drone.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2); setTimeout(() => { drone && drone.disconnect(); drone = null; }, 1400); }
  };

  // === interaction ===
  let spawnMode = 'random'; // pick what to spawn from a click
  canvas.addEventListener('click', (e) => {
    audio();
    const x = e.clientX, y = e.clientY;
    const choice = spawnMode === 'jelly' ? 'jelly' :
                   spawnMode === 'seahorse' ? 'seahorse' :
                   (Math.random() < 0.55 ? 'seahorse' : 'jelly');
    if (choice === 'jelly') {
      addJelly(x, y);
      const j = jellies[jellies.length - 1];
      for (let i = 0; i < 10; i++) spawnSparkle(x + (Math.random()-0.5)*30, y + (Math.random()-0.5)*30, `hsl(${j.hue}, 90%, 80%)`);
      chime(j.hue);
    } else {
      addSeahorse(x, y);
      const s = seahorses[seahorses.length - 1];
      for (let i = 0; i < 14; i++) spawnSparkle(x + (Math.random()-0.5)*40, y + (Math.random()-0.5)*40, `hsl(${(s.hueOffset + i * 40) % 360}, 100%, 82%)`);
      chime(s.hueOffset);
    }
  });

  document.getElementById('bJelly').onclick = () => { audio(); for (let i = 0; i < 2; i++) addJelly(); chime(120); };
  document.getElementById('bSea').onclick = () => { audio(); for (let i = 0; i < 2; i++) addSeahorse(); chime(280); };
  document.getElementById('bClear').onclick = () => {
    audio();
    jellies.length = 0; seahorses.length = 0;
    document.getElementById('hJ').textContent = 0;
    document.getElementById('hS').textContent = 0;
    for (let i = 0; i < 4; i++) addJelly();
    for (let i = 0; i < 3; i++) addSeahorse();
  };

  addEventListener('keydown', (e) => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    if (e.key === 'j' || e.key === 'J') { audio(); addJelly(); }
    else if (e.key === 's' || e.key === 'S') { audio(); addSeahorse(); }
    else if (e.key === 'r' || e.key === 'R') document.getElementById('bClear').click();
    else if (e.key === 'm' || e.key === 'M') document.getElementById('bMute').click();
  });

  // === main loop ===
  function frame(now) {
    const dt = Math.min(0.05, (now - lastFrame) / 1000);
    lastFrame = now;
    const time = (now - t0) / 1000;

    // soft motion-trail wash for slight ghosting
    ctx.fillStyle = 'rgba(4,8,24,0.18)';
    ctx.fillRect(0, 0, W, H);

    // === light shafts (god rays) ===
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const s of shafts) {
      const baseX = (s.x + Math.sin(time * 0.1 + s.phase) * 0.02) * W;
      const w = s.w * W;
      const grad = ctx.createLinearGradient(baseX, 0, baseX + w * 0.4, H);
      grad.addColorStop(0, `rgba(255,240,210,${0.04 + Math.sin(time * 0.3 + s.phase) * 0.018})`);
      grad.addColorStop(0.5, 'rgba(120,180,255,0.04)');
      grad.addColorStop(1, 'rgba(120,180,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(baseX, 0);
      ctx.lineTo(baseX + w, 0);
      ctx.lineTo(baseX + w + w * 0.6, H);
      ctx.lineTo(baseX - w * 0.4, H);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // === seafloor + kelp ===
    // sandy mound
    const floorY = H - 60;
    ctx.fillStyle = 'rgba(70,40,90,0.65)';
    ctx.beginPath();
    ctx.moveTo(0, floorY);
    for (let x = 0; x <= W; x += 60) {
      ctx.lineTo(x, floorY + Math.sin(x * 0.02) * 8 + Math.sin(x * 0.005 + 1) * 4);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    // kelp swaying
    for (const k of kelps) {
      const seg = k.h / k.segs;
      let x = k.x, y = floorY;
      ctx.lineCap = 'round';
      ctx.lineWidth = 4;
      ctx.strokeStyle = `hsla(${k.hue}, 70%, 38%, 0.85)`;
      ctx.beginPath();
      ctx.moveTo(x, y);
      for (let i = 1; i <= k.segs; i++) {
        const u = i / k.segs;
        const sway = Math.sin(time * k.sway + k.phase + u * 3) * (4 + u * 14);
        x = k.x + sway;
        y = floorY - i * seg;
        ctx.lineTo(x, y);
      }
      ctx.stroke();
      // kelp tip glow
      ctx.fillStyle = `hsla(${k.hue + 30}, 90%, 78%, 0.5)`;
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // === bubbles ===
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      b.y -= b.vy * dt;
      const wob = Math.sin(time * 1.4 + b.phase) * b.sway;
      ctx.fillStyle = `rgba(220,240,255,${b.a * 0.4})`;
      ctx.strokeStyle = `rgba(220,240,255,${b.a})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(b.x + wob, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      if (b.y < -10) bubbles.splice(i, 1);
    }
    if (bubbles.length < 50 && Math.random() < 0.4) spawnBubble();

    // === sparkles (click bursts) ===
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = sparkles.length - 1; i >= 0; i--) {
      const s = sparkles[i];
      s.life -= dt;
      const a = Math.max(0, s.life / s.max);
      ctx.globalAlpha = a;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
      // 4-pointed twinkle
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(s.x - s.r * 3, s.y); ctx.lineTo(s.x + s.r * 3, s.y);
      ctx.moveTo(s.x, s.y - s.r * 3); ctx.lineTo(s.x, s.y + s.r * 3);
      ctx.stroke();
      if (s.life <= 0) sparkles.splice(i, 1);
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // === coral (behind Nemo when he's hiding, since clip uses tendril area) ===
    drawCoral(time);

    // === Nemo + jellies + seahorses (back to front by y) ===
    nemoUpdate(dt);
    const all = [];
    for (const j of jellies) { j.update(dt); all.push({ kind:'j', e:j, y:j.y }); }
    for (const s of seahorses) { s.update(dt); all.push({ kind:'s', e:s, y:s.y }); }
    all.push({ kind:'nemo', y: nemo.y });
    all.sort((a, b) => a.y - b.y);
    for (const o of all) {
      if (o.kind === 'j') o.e.draw(ctx, time);
      else if (o.kind === 's') o.e.draw(ctx, time);
      else if (o.kind === 'nemo') nemoDraw(time);
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
