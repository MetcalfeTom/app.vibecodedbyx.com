<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plus Minus</title>
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9E%95" />

<meta name="description" content="A counter. Two buttons, one number. That's the whole app, and it's a nice one." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Plus Minus" />
<meta property="og:description" content="Two buttons. One number. No gimmicks." />
<meta property="og:url" content="https://sloppy.live/plus-minus/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimalist%20poster%20of%20a%20plus%20and%20minus%20button%20with%20a%20large%20elegant%20number%2C%20swiss%20design%2C%20cream%20background%2C%20editorial?width=1200&height=630&nologo=true&seed=11" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Azeret+Mono:wght@400&display=swap" rel="stylesheet" />

<style>
  :root{ --bg:#f6f1e7; --ink:#1d1a15; --line:#d9d0bd; --accent:#c8502e; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    min-height:100vh; background:var(--bg); color:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Azeret Mono',monospace; padding:2rem 1rem;
  }
  main{ text-align:center; }
  .label{ font-size:.68rem; letter-spacing:.34em; text-transform:uppercase; color:#9a8f78; }
  .num{
    font-family:'Fraunces',serif; font-weight:300; font-variation-settings:'opsz' 144;
    font-size:clamp(6rem,30vw,13rem); line-height:1.05; font-variant-numeric:tabular-nums;
    letter-spacing:-.02em; margin:.5rem 0 1.5rem; min-width:2ch;
  }
  .num.neg{ color:var(--accent); }
  .btns{ display:flex; gap:1rem; justify-content:center; }
  button{
    width:5.5rem; height:5.5rem; border-radius:50%; cursor:pointer;
    font-family:'Fraunces',serif; font-weight:300; font-size:2.6rem; line-height:1;
    color:var(--ink); background:transparent; border:1.5px solid var(--ink);
    transition:background .12s, color .12s, transform .05s;
  }
  button:hover{ background:var(--ink); color:var(--bg); }
  button:active{ transform:scale(.96); }
  button:focus-visible{ outline:3px solid var(--accent); outline-offset:4px; }
  footer{ position:fixed; bottom:1.2rem; font-size:.62rem; letter-spacing:.18em; text-transform:uppercase; color:#b3a88f; }
  @media (prefers-reduced-motion: reduce){ button{ transition:none; } }
</style>
</head>
<body>
  <main>
    <p class="label">count</p>
    <p class="num" id="num" aria-live="polite">0</p>
    <div class="btns">
      <button id="minus" type="button" aria-label="Decrease">−</button>
      <button id="plus" type="button" aria-label="Increase">+</button>
    </div>
  </main>
  <footer>two buttons · one number</footer>

<script>
(function(){
  "use strict";
  var n=0;
  try{ n=parseInt(localStorage.getItem('plus-minus'),10)||0; }catch(e){}
  var el=document.getElementById('num');
  function paint(){
    el.textContent=n;
    el.classList.toggle('neg', n<0);
    try{ localStorage.setItem('plus-minus', String(n)); }catch(e){}
  }
  document.getElementById('plus').addEventListener('click', function(){ n++; paint(); });
  document.getElementById('minus').addEventListener('click', function(){ n--; paint(); });
  document.addEventListener('keydown', function(e){
    if(e.key==='ArrowUp'||e.key==='+'){ n++; paint(); }
    else if(e.key==='ArrowDown'||e.key==='-'){ n--; paint(); }
  });
  paint();
})();
</script>
</body>
</html>
