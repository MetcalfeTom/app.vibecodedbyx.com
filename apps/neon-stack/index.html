<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08080f;touch-action:none;user-select:none}
canvas{display:block;position:absolute;top:0;left:0}

#score-display{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10;
  font-family:'Russo One',sans-serif;font-size:64px;color:#fff;
  text-shadow:0 0 30px rgba(255,255,255,0.3);
  pointer-events:none;opacity:0.9;
  transition:transform .1s;
}
#score-display.bump{transform:translateX(-50%) scale(1.15)}

#combo-display{
  position:fixed;top:90px;left:50%;transform:translateX(-50%);z-index:10;
  font-family:'Share Tech Mono',monospace;font-size:18px;
  color:#ff0;text-shadow:0 0 12px rgba(255,255,0,0.5);
  pointer-events:none;opacity:0;transition:opacity .3s;
}
#combo-display.show{opacity:1}

#best-display{
  position:fixed;top:8px;right:12px;z-index:10;
  font-family:'Share Tech Mono',monospace;font-size:12px;
  color:rgba(255,255,255,0.3);pointer-events:none;
}

#overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,8,15,0.88);backdrop-filter:blur(6px);
  transition:opacity .4s;overflow-y:auto;padding:20px 0;
}
#overlay.hidden{opacity:0;pointer-events:none}

#overlay h1{
  font-family:'Russo One',sans-serif;font-size:clamp(36px,8vw,72px);
  color:#fff;letter-spacing:4px;
  background:linear-gradient(135deg,#ff0066,#00ffcc,#ffcc00,#6600ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:8px;
}
#overlay .sub{
  font-family:'Share Tech Mono',monospace;font-size:14px;
  color:rgba(255,255,255,0.4);margin-bottom:20px;
}
.final-score{
  font-family:'Russo One',sans-serif;font-size:48px;color:#fff;
  text-shadow:0 0 20px rgba(255,255,255,0.3);margin-bottom:4px;
}
.final-label{
  font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:12px;
}
#save-block{
  display:none;margin-bottom:16px;text-align:center;
}
#save-block input{
  font-family:'Share Tech Mono',monospace;font-size:14px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.2);
  color:#fff;padding:8px 12px;border-radius:4px;width:160px;text-align:center;
  outline:none;
}
#save-block input::placeholder{color:rgba(255,255,255,0.25)}
#save-block input:focus{border-color:rgba(0,255,204,0.5)}
#save-row{display:flex;gap:8px;justify-content:center;margin-top:8px}
.save-btn{
  font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:1px;
  background:none;border:1px solid rgba(0,255,204,0.4);
  color:#00ffcc;padding:6px 16px;border-radius:4px;cursor:pointer;transition:all .15s;
}
.save-btn:hover{background:rgba(0,255,204,0.1)}
.skip-btn{
  font-family:'Share Tech Mono',monospace;font-size:11px;
  background:none;border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.4);padding:6px 12px;border-radius:4px;cursor:pointer;
}
.skip-btn:hover{color:rgba(255,255,255,0.6)}
#save-error{font-size:10px;color:#ff4444;margin-top:4px;display:none}

#play-btn{
  font-family:'Russo One',sans-serif;font-size:18px;letter-spacing:3px;
  background:none;border:2px solid rgba(255,255,255,0.5);
  color:#fff;padding:14px 48px;border-radius:6px;cursor:pointer;
  transition:all .2s;
}
#play-btn:hover{border-color:#fff;background:rgba(255,255,255,0.08);transform:scale(1.04)}
#play-btn:active{transform:scale(0.97)}

#leaderboard{
  margin-top:16px;width:280px;max-width:90vw;
}
#leaderboard h3{
  font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:2px;
  color:rgba(255,255,255,0.3);text-align:center;margin-bottom:8px;
}
.lb-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.04);
  font-family:'Share Tech Mono',monospace;font-size:12px;
  color:rgba(255,255,255,0.5);
}
.lb-row.header{color:rgba(255,255,255,0.25);font-size:10px;border-bottom:1px solid rgba(255,255,255,0.1)}
.lb-rank{width:24px;text-align:center}
.lb-name{flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-score{font-family:'Russo One',sans-serif;color:#fff}
.lb-rank.gold{color:#ffcc00;text-shadow:0 0 8px rgba(255,204,0,0.4)}
.lb-rank.silver{color:#c0c0c0}
.lb-rank.bronze{color:#cd7f32}

.perfect-flash{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:5;
  background:rgba(255,255,255,0.08);pointer-events:none;
  animation:flash .15s ease-out;
}
@keyframes flash{from{opacity:1}to{opacity:0}}

a</style>

<body>

<canvas id="c"></canvas>
<div id="score-display">0</div>
<div id="combo-display">PERFECT x1</div>
<div id="best-display"></div>

<div id="overlay">
  <h1 id="title">NEON STACK</h1>
  <div class="sub" id="sub-text">tap to stack blocks perfectly</div>
  <div class="final-score" id="final-score" style="display:none"></div>
  <div class="final-label" id="final-label" style="display:none"></div>
  <div id="save-block">
    <input type="text" id="player-name" placeholder="Your name" maxlength="20">
    <div id="save-row">
      <button class="save-btn" id="save-btn">SAVE SCORE</button>
      <button class="skip-btn" id="skip-btn">SKIP</button>
    </div>
    <div id="save-error"></div>
  </div>
  <button id="play-btn">PLAY</button>
  <div id="leaderboard">
    <h3>TOP SCORES</h3>
    <div id="lb-body"></div>
  </div>
</div>
<script type="module">
import supabase, { supabaseSession } from './supabase-config.js';

var currentUser=null;

async function initAuth(){
  try{var r=await supabaseSession();currentUser=r.user}catch(e){console.log('Auth:',e.message)}
  loadLeaderboard();
}

async function loadLeaderboard(){
  var body=document.getElementById('lb-body');
  try{
    var res=await supabase.from('neon_stack_scores').select('score,display_name').order('score',{ascending:false}).limit(10);
    if(res.error)throw res.error;
    var data=res.data;
    if(!data||data.length===0){
      body.innerHTML='<div class="lb-row"><span style="opacity:0.3;margin:0 auto">No scores yet</span></div>';
      return;
    }
    body.innerHTML=data.map(function(r,i){
      var rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      var name=escapeHtml(r.display_name||'Anon');
      return '<div class="lb-row"><span class="lb-rank '+rc+'">'+(i+1)+'</span><span class="lb-name">'+name+'</span><span class="lb-score">'+r.score+'</span></div>';
    }).join('');
  }catch(e){
    body.innerHTML='<div class="lb-row"><span style="opacity:0.2;margin:0 auto;font-size:10px">Leaderboard unavailable</span></div>';
  }
}

async function saveScore(score){
  var errEl=document.getElementById('save-error');
  errEl.style.display='none';
  try{
    var name=(document.getElementById('player-name').value||'Player').slice(0,20);
    var res=await supabase.from('neon_stack_scores').insert([{score:score,display_name:name,user_id:currentUser?currentUser.id:null}]);
    if(res.error)throw res.error;
    document.getElementById('save-block').style.display='none';
    loadLeaderboard();
  }catch(e){
    errEl.textContent='Error: '+e.message;
    errEl.style.display='block';
  }
}

function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Expose to game
window._lbSave=saveScore;
window._lbLoad=loadLeaderboard;

initAuth();
</script>

<script>
(function(){
'use strict';

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H,dpr;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize',resize);

// Audio
var actx=null;
function initAudio(){if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}

function playTone(freq,dur,vol,type){
  if(!actx)return;
  var t=actx.currentTime;
  var o=actx.createOscillator();var g=actx.createGain();
  o.type=type||'square';o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol||0.04,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(actx.destination);
  o.start(t);o.stop(t+dur);
}

function sfxPlace(perfect){
  if(perfect){
    playTone(523,0.12,0.06,'square');
    playTone(659,0.12,0.05,'square');
    setTimeout(function(){playTone(784,0.15,0.06,'square')},60);
  }else{
    playTone(330,0.08,0.04,'triangle');
  }
}
function sfxSlice(){playTone(180,0.15,0.05,'sawtooth');playTone(120,0.2,0.03,'sawtooth')}
function sfxGameOver(){
  playTone(220,0.3,0.06,'sawtooth');
  setTimeout(function(){playTone(165,0.4,0.06,'sawtooth')},150);
  setTimeout(function(){playTone(110,0.6,0.07,'sawtooth')},300);
}

// Game constants
var BLOCK_H=28;
var BASE_SPEED=2.2;
var SPEED_INC=0.08;
var MAX_SPEED=9;
var PERFECT_THRESHOLD=3;
var PERFECT_GROW=2;

// Game state
var state='menu';
var stack=[];
var movingBlock=null;
var score=0;
var combo=0;
var maxCombo=0;
var bestScore=parseInt(localStorage.getItem('neonstack_best'))||0;
var cameraY=0;
var targetCamY=0;
var particles=[];
var fallingPieces=[];
var trailParticles=[];
var screenShake=0;
var time=0;
var bgStars=[];

var COLORS=[
  {h:340,s:100,l:55},{h:15,s:100,l:55},{h:45,s:100,l:55},{h:150,s:100,l:50},
  {h:175,s:100,l:50},{h:220,s:100,l:60},{h:270,s:100,l:60},{h:310,s:100,l:55}
];

function getColor(i){var c=COLORS[i%COLORS.length];return'hsl('+c.h+','+c.s+'%,'+c.l+'%)'}
function getColorDark(i){var c=COLORS[i%COLORS.length];return'hsl('+c.h+','+c.s+'%,'+(c.l-15)+'%)'}
function getGlow(i){var c=COLORS[i%COLORS.length];return'hsla('+c.h+','+c.s+'%,'+c.l+'%,0.5)'}

for(var i=0;i<80;i++){
  bgStars.push({x:Math.random(),y:Math.random(),s:Math.random()*1.5+0.5,p:Math.random()*Math.PI*2,sp:Math.random()*0.02+0.005});
}

function initGame(){
  stack=[];fallingPieces=[];particles=[];trailParticles=[];
  score=0;combo=0;maxCombo=0;
  cameraY=0;targetCamY=0;screenShake=0;

  var baseW=W*0.4;
  if(baseW>200)baseW=200;
  if(baseW<100)baseW=100;
  stack.push({x:W/2-baseW/2,y:H-BLOCK_H-40,w:baseW,colorIdx:0});
  spawnMoving();
  updateScoreDisplay();
  updateBest();
}

function spawnMoving(){
  var prev=stack[stack.length-1];
  var speed=Math.min(BASE_SPEED+stack.length*SPEED_INC,MAX_SPEED);
  var dir=stack.length%2===0?1:-1;
  var startX=dir>0?-prev.w:W;
  movingBlock={x:startX,y:prev.y-BLOCK_H,w:prev.w,speed:speed*dir,colorIdx:stack.length};
  targetCamY=Math.max(0,(stack.length-5)*BLOCK_H);
}

function placeBlock(){
  if(!movingBlock)return;
  initAudio();

  var prev=stack[stack.length-1];
  var mx=movingBlock.x;
  var mw=movingBlock.w;

  var overlapLeft=Math.max(mx,prev.x);
  var overlapRight=Math.min(mx+mw,prev.x+prev.w);
  var overlapW=overlapRight-overlapLeft;

  if(overlapW<=0){gameOver();return}

  var diff=Math.abs(mx-prev.x);
  var isPerfect=diff<=PERFECT_THRESHOLD;

  if(isPerfect){
    combo++;
    if(combo>maxCombo)maxCombo=combo;
    overlapW=prev.w;
    if(combo>1)overlapW=Math.min(prev.w+PERFECT_GROW,W*0.5);
    var placed={x:prev.x-(overlapW-prev.w)/2,y:movingBlock.y,w:overlapW,colorIdx:movingBlock.colorIdx};
    stack.push(placed);
    sfxPlace(true);
    spawnPerfectParticles(placed);
    showCombo();
    screenShake=4;
    var flash=document.createElement('div');
    flash.className='perfect-flash';
    document.body.appendChild(flash);
    setTimeout(function(){flash.remove()},200);
  }else{
    combo=0;hideCombo();
    var placed={x:overlapLeft,y:movingBlock.y,w:overlapW,colorIdx:movingBlock.colorIdx};
    stack.push(placed);

    if(mx<prev.x){
      var sliceW=prev.x-mx;
      fallingPieces.push({x:mx,y:movingBlock.y,w:sliceW,vy:0,colorIdx:movingBlock.colorIdx,rot:0,rv:(Math.random()-0.5)*0.05});
    }
    if(mx+mw>prev.x+prev.w){
      var sliceX=prev.x+prev.w;
      var sliceW2=mx+mw-sliceX;
      fallingPieces.push({x:sliceX,y:movingBlock.y,w:sliceW2,vy:0,colorIdx:movingBlock.colorIdx,rot:0,rv:(Math.random()-0.5)*0.05});
    }
    sfxPlace(false);sfxSlice();screenShake=2;
  }

  score=stack.length-1;
  updateScoreDisplay();
  spawnMoving();
}

function gameOver(){
  sfxGameOver();
  state='gameover';
  movingBlock=null;
  screenShake=8;

  var isNewBest=score>bestScore;
  if(isNewBest){
    bestScore=score;
    localStorage.setItem('neonstack_best',bestScore);
  }

  setTimeout(function(){showOverlay(true,isNewBest)},800);
}

function spawnPerfectParticles(block){
  var cx=block.x+block.w/2,cy=block.y+BLOCK_H/2;
  for(var i=0;i<20;i++){
    var a=Math.PI*2*Math.random();
    var sp=Math.random()*3+1;
    particles.push({x:cx+(Math.random()-0.5)*block.w,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,color:getColor(block.colorIdx),size:Math.random()*3+2});
  }
}

// UI
var scoreEl=document.getElementById('score-display');
var comboEl=document.getElementById('combo-display');
var bestEl=document.getElementById('best-display');
var overlay=document.getElementById('overlay');

function updateScoreDisplay(){
  scoreEl.textContent=score;
  scoreEl.classList.add('bump');
  setTimeout(function(){scoreEl.classList.remove('bump')},100);
}
function updateBest(){bestEl.textContent=bestScore?'BEST: '+bestScore:''}
function showCombo(){
  comboEl.textContent='PERFECT x'+combo;
  comboEl.classList.add('show');
  comboEl.style.color=combo>=5?'#f0f':combo>=3?'#0ff':'#ff0';
}
function hideCombo(){comboEl.classList.remove('show')}

function showOverlay(isGameover,isNewBest){
  var titleEl=document.getElementById('title');
  var subEl=document.getElementById('sub-text');
  var fsEl=document.getElementById('final-score');
  var flEl=document.getElementById('final-label');
  var saveBlock=document.getElementById('save-block');

  if(isGameover){
    fsEl.textContent=score;
    fsEl.style.display='block';
    flEl.textContent=isNewBest?'NEW BEST!':'YOUR SCORE';
    flEl.style.display='block';
    titleEl.style.display='none';
    subEl.textContent='tap to try again';
    // Show save block if score > 0
    if(score>0){
      saveBlock.style.display='block';
      var nameInput=document.getElementById('player-name');
      var saved=localStorage.getItem('neonstack_name');
      if(saved)nameInput.value=saved;
    }else{
      saveBlock.style.display='none';
    }
  }else{
    fsEl.style.display='none';
    flEl.style.display='none';
    titleEl.style.display='block';
    subEl.textContent='tap to stack blocks perfectly';
    saveBlock.style.display='none';
  }
  overlay.classList.remove('hidden');
  updateBest();
  if(window._lbLoad)window._lbLoad();
}

function hideOverlay(){overlay.classList.add('hidden')}

function startGame(){
  hideOverlay();
  document.getElementById('save-block').style.display='none';
  state='playing';
  initGame();
}

// Save score button
document.getElementById('save-btn').addEventListener('click',function(){
  var name=document.getElementById('player-name').value.trim()||'Player';
  localStorage.setItem('neonstack_name',name);
  if(window._lbSave)window._lbSave(score);
});
document.getElementById('skip-btn').addEventListener('click',function(){
  document.getElementById('save-block').style.display='none';
});

// Events
document.getElementById('play-btn').addEventListener('click',function(e){
  e.stopPropagation();startGame();
});

function handleTap(){if(state==='playing')placeBlock()}

document.addEventListener('keydown',function(e){
  if(e.key===' '||e.key==='Enter'){
    e.preventDefault();
    if(state==='menu'||state==='gameover')startGame();
    else handleTap();
  }
});

canvas.addEventListener('mousedown',function(){handleTap()});
canvas.addEventListener('touchstart',function(e){e.preventDefault();handleTap()},{passive:false});

// Drawing
function draw(){
  time+=0.016;
  ctx.clearRect(0,0,W,H);

  cameraY+=(targetCamY-cameraY)*0.08;
  var shake=0;
  if(screenShake>0){
    shake=(Math.random()-0.5)*screenShake;
    screenShake*=0.88;
    if(screenShake<0.3)screenShake=0;
  }

  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#08080f');grad.addColorStop(0.5,'#0c0c1a');grad.addColorStop(1,'#10101f');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  for(var i=0;i<bgStars.length;i++){
    var st=bgStars[i];st.p+=st.sp;
    var sx=st.x*W,sy=(st.y*H+cameraY*0.1)%H;
    ctx.save();ctx.globalAlpha=0.3+Math.sin(st.p)*0.25;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy,st.s,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  ctx.save();
  ctx.translate(shake,cameraY+shake);

  for(var i=0;i<stack.length;i++)drawBlock(stack[i]);

  if(movingBlock){
    movingBlock.x+=movingBlock.speed;
    if(movingBlock.x+movingBlock.w>W&&movingBlock.speed>0)movingBlock.speed=-Math.abs(movingBlock.speed);
    if(movingBlock.x<0&&movingBlock.speed<0)movingBlock.speed=Math.abs(movingBlock.speed);
    drawBlock(movingBlock);
    if(Math.random()<0.3){
      var ty=movingBlock.y+BLOCK_H/2;
      var tx=movingBlock.speed>0?movingBlock.x:movingBlock.x+movingBlock.w;
      trailParticles.push({x:tx,y:ty,life:1,color:getColor(movingBlock.colorIdx),size:2});
    }
  }

  for(var i=fallingPieces.length-1;i>=0;i--){
    var fp=fallingPieces[i];
    fp.vy+=0.25;fp.y+=fp.vy;fp.rot+=fp.rv;
    if(fp.y>H+cameraY+200){fallingPieces.splice(i,1);continue}
    ctx.save();
    ctx.translate(fp.x+fp.w/2,fp.y+BLOCK_H/2);ctx.rotate(fp.rot);
    ctx.globalAlpha=Math.max(0,1-fp.vy*0.03);
    ctx.fillStyle=getColor(fp.colorIdx);
    ctx.fillRect(-fp.w/2,-BLOCK_H/2,fp.w,BLOCK_H);
    ctx.restore();
  }

  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=0.02;
    if(p.life<=0){particles.splice(i,1);continue}
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  for(var i=trailParticles.length-1;i>=0;i--){
    var tp=trailParticles[i];tp.life-=0.04;
    if(tp.life<=0){trailParticles.splice(i,1);continue}
    ctx.save();ctx.globalAlpha=tp.life*0.4;ctx.fillStyle=tp.color;
    ctx.beginPath();ctx.arc(tp.x,tp.y,tp.size*tp.life,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  ctx.restore();

  if(state==='playing'&&stack.length>1){
    var prev=stack[stack.length-1];
    ctx.save();ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.setLineDash([4,8]);
    ctx.beginPath();ctx.moveTo(prev.x,0);ctx.lineTo(prev.x,H);ctx.stroke();
    ctx.moveTo(prev.x+prev.w,0);ctx.lineTo(prev.x+prev.w,H);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }

  if(state==='playing'&&score>0){
    ctx.save();ctx.globalAlpha=0.08;ctx.fillStyle='#fff';
    ctx.font='10px Share Tech Mono,monospace';ctx.textAlign='right';
    for(var h=5;h<=score;h+=5){
      var my=stack[0].y+BLOCK_H-h*BLOCK_H+cameraY;
      ctx.fillText(h+'',W-8,my+BLOCK_H/2+4);
    }
    ctx.restore();
  }

  requestAnimationFrame(draw);
}

function drawBlock(b){
  var col=getColor(b.colorIdx);
  var colDark=getColorDark(b.colorIdx);
  var glow=getGlow(b.colorIdx);
  ctx.save();
  ctx.shadowColor=glow;ctx.shadowBlur=12;
  ctx.fillStyle=col;ctx.fillRect(b.x,b.y,b.w,BLOCK_H);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(b.x,b.y,b.w,3);
  ctx.fillStyle=colDark;ctx.fillRect(b.x,b.y+BLOCK_H-4,b.w,4);
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(b.x+0.5,b.y);ctx.lineTo(b.x+0.5,b.y+BLOCK_H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(b.x+b.w-0.5,b.y);ctx.lineTo(b.x+b.w-0.5,b.y+BLOCK_H);ctx.stroke();
  ctx.strokeStyle=col;ctx.lineWidth=1;
  ctx.globalAlpha=0.4+Math.sin(time*4+b.colorIdx)*0.15;
  ctx.strokeRect(b.x,b.y,b.w,BLOCK_H);
  ctx.restore();
}

updateBest();
showOverlay(false);
draw();

})();
</script>
