<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Radar</title>
<meta name="description" content="A live storm map. Two hours of past radar plus a 30-minute nowcast, glowing in neon over a dark synthwave basemap. Powered by RainViewer.">
<meta property="og:title" content="Neon Radar">
<meta property="og:description" content="A live storm map. Two hours of past radar plus a 30-minute nowcast, glowing in neon over a dark synthwave basemap.">
<meta property="og:url" content="https://sloppy.live/neon-radar">
<meta property="og:image" content="https://image.pollinations.ai/prompt/synthwave%20neon%20radar%20storm%20map%20pink%20cyan%20glow%20dark%20editorial?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%A9%EF%B8%8F">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=IBM+Plex+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">

<!-- Leaflet 1.9 — small, no token needed, CORS-friendly with our chosen tile providers -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>

<style>
:root{
  --bg:#07041a;
  --panel:rgba(12,8,32,0.78);
  --rule:rgba(255,255,255,0.16);
  --ink:#f4f0ff;
  --ink-mute:#9c95c4;
  --pink:#ff2e9c;
  --cyan:#00f0ff;
  --lime:#9aff5e;
  --gold:#ffd03e;
  --violet:#b13eff;
  --rose:#ff7a9c;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:16px;-webkit-font-smoothing:antialiased}
html{font-size:100%}

.skip{position:absolute;left:-9999px;top:auto}
.skip:focus{left:1rem;top:1rem;background:var(--pink);color:var(--bg);padding:0.5rem;z-index:9999}

#map{ position:fixed; inset:0; background: var(--bg) }
.leaflet-container{ background: #06031a !important; outline: none }
.leaflet-control-attribution{
  background: rgba(7,4,26,0.65) !important;
  color: var(--ink-mute) !important;
  font-family:'IBM Plex Mono', monospace !important;
  font-size: 0.55rem !important;
  letter-spacing: 0.06em !important;
}
.leaflet-control-attribution a{ color: var(--cyan) !important }
.leaflet-control-zoom a{
  background: rgba(12,8,32,0.85) !important;
  color: var(--ink) !important;
  border: 1px solid var(--rule) !important;
  font-family:'IBM Plex Mono', monospace !important;
}
.leaflet-control-zoom a:hover{ background: rgba(255,46,156,0.18) !important }

/* Neon glow on the RADAR tile layer (we set className on the tile layer) */
.radar-tiles{
  mix-blend-mode: screen;
  filter:
    saturate(1.6)
    brightness(1.18)
    contrast(1.12)
    drop-shadow(0 0 6px rgba(255, 46, 156, 0.55))
    drop-shadow(0 0 14px rgba(0, 240, 255, 0.40));
  transition: opacity 0.45s ease;
  pointer-events: none;
}
/* The bloom layer below — same tiles, blurred + extra-bright, screen blend for halo */
.radar-bloom{
  mix-blend-mode: screen;
  filter: blur(7px) saturate(2.0) brightness(1.6);
  opacity: 0.48;
  transition: opacity 0.45s ease;
  pointer-events: none;
}

/* HUD — top brand */
.hud-top{
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 800;
  pointer-events: none;
  padding: 0.85rem 1rem;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 1rem;
  align-items: start;
}
.brand{
  pointer-events: auto;
  background: var(--panel);
  border: 1px solid var(--rule);
  padding: 0.55rem 0.95rem;
  backdrop-filter: blur(8px);
  border-radius: 0.18rem;
}
.brand h1{
  margin: 0;
  font-family:'Audiowide', sans-serif;
  font-size: 1.1rem; letter-spacing: 0.06em;
  color: #fff;
  text-shadow: 0 0 12px var(--pink), 0 0 24px var(--pink), 2px 2px 0 var(--violet);
}
.brand h1 em{
  font-style: normal;
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan), 0 0 24px var(--cyan), 2px 2px 0 var(--violet);
}
.brand .tagline{
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.85rem;
  color: var(--ink-mute);
  margin-top: 0.18rem;
}

.center-pill{
  text-align: center;
  pointer-events: auto;
  background: var(--panel);
  border: 1px solid var(--rule);
  padding: 0.45rem 0.95rem;
  backdrop-filter: blur(6px);
  border-radius: 0.18rem;
  min-width: 12rem;
}
.center-pill .label{
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
}
.center-pill .stamp{
  font-family:'Audiowide', sans-serif;
  font-size: 1.05rem;
  color: var(--gold);
  text-shadow: 0 0 10px rgba(255,208,62,0.5);
  margin-top: 0.18rem;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
}
.center-pill .stamp.future{ color: var(--rose); text-shadow: 0 0 10px rgba(255,122,156,0.5) }

.right-actions{
  pointer-events: auto;
  display: flex; gap: 0.4rem;
}
.btn-mini{
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
  background: var(--panel);
  color: var(--ink);
  border: 1px solid var(--rule);
  padding: 0.5rem 0.7rem;
  cursor: pointer;
  min-height: 2.6rem;
  border-radius: 0.18rem;
  backdrop-filter: blur(4px);
}
.btn-mini:hover{ border-color: var(--pink); color: var(--pink) }
.btn-mini[aria-pressed="true"]{ border-color: var(--lime); color: var(--lime) }
.btn-mini:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px }

/* Bottom: timeline + playback */
.dock{
  position: fixed; left: 1rem; right: 1rem; bottom: 1rem;
  z-index: 800;
  pointer-events: none;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0.6rem;
  align-items: center;
  max-width: 64rem;
  margin: 0 auto;
}
.dock .panel{
  background: var(--panel);
  border: 1px solid var(--rule);
  padding: 0.55rem 0.85rem;
  backdrop-filter: blur(6px);
  border-radius: 0.18rem;
  pointer-events: auto;
}
.dock .play{
  font-family:'Audiowide', sans-serif;
  font-size: 1.1rem;
  background: linear-gradient(180deg, var(--pink), #a01160);
  color: #fff;
  border: 1px solid var(--cyan);
  padding: 0;
  cursor: pointer;
  width: 3rem; height: 3rem;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 0 #5a0e3a, 0 8px 22px rgba(255,46,156,0.35);
  transition: transform 0.08s ease;
  pointer-events: auto;
}
.dock .play:hover{ background: linear-gradient(180deg, #ff5dbc, var(--pink)) }
.dock .play:active{ transform: translateY(2px); box-shadow: 0 4px 0 #5a0e3a }
.dock .play:focus-visible{ outline: 3px solid var(--cyan); outline-offset: 3px }

.timeline{
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.4rem;
  padding: 0.55rem 0.95rem;
}
.timeline .ticks{
  position: relative;
  height: 1.4rem;
  display: flex;
  align-items: stretch;
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--rule);
  overflow: hidden;
}
.timeline .ticks .tick{
  flex: 1 1 0;
  border-right: 1px solid rgba(255,255,255,0.04);
  position: relative;
  cursor: pointer;
}
.timeline .ticks .tick:last-child{ border-right: none }
.timeline .ticks .tick::after{
  content: '';
  position: absolute; left: 0; right: 0; bottom: 0; top: 50%;
  background: linear-gradient(180deg, transparent, rgba(0,240,255,0.18));
}
.timeline .ticks .tick.future::after{
  background: linear-gradient(180deg, transparent, rgba(255,122,156,0.22));
}
.timeline .ticks .tick.now{
  background: rgba(154,255,94,0.14);
}
.timeline .ticks .tick.now::after{
  background: rgba(255,46,156,0.55);
  box-shadow: 0 0 12px var(--pink);
  top: 0;
}
.timeline .ticks .tick:hover{ background: rgba(255,255,255,0.08) }
.timeline .meta{
  display: flex; gap: 0.6rem; flex-wrap: wrap;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-mute);
  align-items: center;
}
.timeline .meta b{ color: var(--ink); font-weight: 500 }
.timeline .meta .future{ color: var(--rose) }
.timeline .meta .past{ color: var(--cyan) }

.dock .right-controls{
  display: flex; flex-direction: column; gap: 0.35rem;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-mute);
  text-align: right;
}
.dock .right-controls input[type=range]{
  width: 6rem;
  accent-color: var(--pink);
}

/* Legend */
.legend{
  position: fixed; right: 1rem; top: 5.6rem;
  z-index: 800;
  background: var(--panel);
  border: 1px solid var(--rule);
  padding: 0.55rem 0.7rem;
  border-radius: 0.18rem;
  backdrop-filter: blur(6px);
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-mute);
  max-width: 12rem;
}
.legend h3{
  margin: 0 0 0.3rem;
  font-weight: 400;
  font-size: 0.55rem; letter-spacing: 0.22em;
  color: var(--cyan);
}
.legend .strip{
  height: 0.4rem;
  background: linear-gradient(90deg, #2a1a4a 0%, #3072c8 25%, #5fc2a4 45%, #9aff5e 60%, #ffd03e 75%, #ff7a3e 88%, #ff2e9c 100%);
  border-radius: 999px;
  margin: 0.25rem 0;
  box-shadow: 0 0 12px rgba(255,46,156,0.3);
}
.legend .scale{
  display: flex; justify-content: space-between;
  font-size: 0.5rem;
  color: var(--ink);
}
.legend .src{
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.7rem;
  color: var(--ink-mute);
  margin-top: 0.4rem;
  text-transform: none;
  letter-spacing: 0.02em;
}
.legend .src a{ color: var(--cyan); text-decoration: none }
.legend .src a:hover{ text-decoration: underline }

/* Status toast */
.toast{
  position: fixed; left: 50%; top: 5.5rem; transform: translateX(-50%);
  z-index: 900;
  background: var(--panel);
  border: 1px solid var(--rule);
  padding: 0.5rem 0.95rem;
  border-radius: 0.18rem;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.toast.show{ opacity: 1 }
.toast.error{ border-color: rgba(255,46,156,0.5); color: var(--pink) }

/* Responsive */
@media (max-width: 720px){
  .dock{ grid-template-columns: 1fr; gap: 0.4rem }
  .dock .right-controls{ display: none }
  .legend{ display: none }
  .center-pill{ display: none }
  .right-actions{ flex-direction: column }
}

@media (prefers-reduced-motion: reduce){
  .radar-tiles, .radar-bloom{ transition: none }
}
</style>
</head>
<body>
<a href="#map" class="skip">Skip to map</a>

<div id="map" role="application" aria-label="Live storm radar map. Use the timeline at the bottom to scrub through the past two hours plus a 30-minute nowcast. Press play to animate."></div>

<div class="hud-top">
  <div class="brand">
    <h1>neon · <em>radar</em></h1>
    <div class="tagline">live storm map · 2h past + 30m nowcast</div>
  </div>
  <div class="center-pill" role="status" aria-live="polite">
    <div class="label" id="frameLabel">Current frame</div>
    <div class="stamp" id="frameStamp">—</div>
  </div>
  <div class="right-actions">
    <button type="button" class="btn-mini" id="locateBtn" aria-label="Center on my location">⌖ locate</button>
    <button type="button" class="btn-mini" id="paletteBtn" aria-label="Cycle radar palette" title="Cycle radar color scheme">◑ palette</button>
  </div>
</div>

<div class="legend" aria-label="Radar intensity legend">
  <h3>Intensity · dBZ</h3>
  <div class="strip" aria-hidden="true"></div>
  <div class="scale"><span>5</span><span>30</span><span>50</span><span>65+</span></div>
  <div class="src">via <a href="https://www.rainviewer.com/api.html" target="_blank" rel="noopener">rainviewer</a></div>
</div>

<div class="dock">
  <button type="button" class="play" id="playBtn" aria-label="Play or pause animation" aria-pressed="false">▶</button>
  <div class="panel timeline">
    <div class="ticks" id="ticks" role="slider" aria-label="Radar timeline" aria-valuemin="0" aria-valuemax="0" aria-valuenow="0"></div>
    <div class="meta">
      <span class="past">past · <b id="pastCount">0</b></span>
      <span class="future">forecast · <b id="futCount">0</b></span>
      <span style="margin-left:auto">frame <b id="curIdx">0</b> / <b id="totIdx">0</b></span>
    </div>
  </div>
  <div class="panel right-controls">
    <label>
      <span style="display:block;margin-bottom:0.18rem">cadence</span>
      <input type="range" id="speedSlider" min="160" max="900" step="20" value="380" aria-label="Animation speed (ms per frame)">
    </label>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//   NEON RADAR — RainViewer tiles on a synthwave dark basemap with
//   blur-bloom + screen-blend for the neon glow effect
// ════════════════════════════════════════════════════════════════

const $ = (s) => document.querySelector(s);

// ──────── map init ────────
// Default view: continental US-ish (will recenter on geolocation if permitted)
const map = L.map('map', {
  center: [39.5, -96.5],
  zoom: 4,
  zoomControl: true,
  attributionControl: true,
  worldCopyJump: true,
  preferCanvas: true,
});

// Dark synthwave basemap — CARTO Dark Matter (free, no token, CORS-friendly)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  maxZoom: 19,
  attribution: '&copy; <a href="https://carto.com/attributions">CARTO</a> &middot; &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &middot; radar &copy; <a href="https://www.rainviewer.com/">RainViewer</a>',
}).addTo(map);

// ──────── RainViewer state ────────
// frames: { time, path, kind: 'past'|'nowcast' }
let frames = [];
let host = '';
let currentIdx = 0;
let isPlaying = false;
let playTimer = null;
let cadence = 380;        // ms between frames during playback
const TILE_SIZE = 512;
const SMOOTH = 1;          // 1 = smooth tiles
const SNOW = 1;            // 1 = render snow
const PALETTES = [6, 4, 7, 8, 2];   // RainViewer color schemes — 6 NEXRAD III, 4 TWC, 7 Rainbow, 8 Dark Sky, 2 Univ Blue
let paletteIdx = 0;        // index into PALETTES; 6 (NEXRAD III) by default

// Two stacked tile layers per frame — sharp on top, blurred bloom underneath.
// We pre-create one pair per frame and swap visibility by opacity.
const radarSharp = [];     // L.TileLayer or null
const radarBloom = [];

function tileURL(path, color){
  return `${host}${path}/${TILE_SIZE}/{z}/{x}/{y}/${color}/${SMOOTH}_${SNOW}.png`;
}

function buildLayers(){
  // tear down existing
  for (const l of radarSharp) if (l) map.removeLayer(l);
  for (const l of radarBloom) if (l) map.removeLayer(l);
  radarSharp.length = 0; radarBloom.length = 0;

  const color = PALETTES[paletteIdx];
  for (const f of frames){
    const url = tileURL(f.path, color);
    const bloom = L.tileLayer(url, {
      tileSize: TILE_SIZE,
      zoomOffset: -1,
      opacity: 0,
      className: 'radar-bloom',
      crossOrigin: true,
      pane: 'overlayPane',
    }).addTo(map);
    const sharp = L.tileLayer(url, {
      tileSize: TILE_SIZE,
      zoomOffset: -1,
      opacity: 0,
      className: 'radar-tiles',
      crossOrigin: true,
      pane: 'overlayPane',
    }).addTo(map);
    radarBloom.push(bloom);
    radarSharp.push(sharp);
  }
  showFrame(currentIdx, true);
}

function showFrame(idx, instant){
  if (!frames.length) return;
  currentIdx = ((idx % frames.length) + frames.length) % frames.length;
  for (let i = 0; i < frames.length; i++){
    const op = i === currentIdx ? 1 : 0;
    if (radarSharp[i]) radarSharp[i].setOpacity(op);
    if (radarBloom[i]) radarBloom[i].setOpacity(op * 0.95);
  }
  renderHud();
}

// ──────── fetch RainViewer manifest ────────
async function loadFrames(){
  toast('connecting to rainviewer…');
  try {
    const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
    if (!res.ok) throw new Error('http ' + res.status);
    const j = await res.json();
    host = j.host;
    const past = (j.radar && j.radar.past) || [];
    const nowcast = (j.radar && j.radar.nowcast) || [];
    frames = [
      ...past.map(f => ({ time: f.time, path: f.path, kind: 'past' })),
      ...nowcast.map(f => ({ time: f.time, path: f.path, kind: 'nowcast' })),
    ];
    if (!frames.length) throw new Error('no frames returned');
    // start at the latest "past" frame (the genuine "now")
    currentIdx = past.length ? past.length - 1 : 0;
    buildLayers();
    renderTimeline();
    renderHud();
    toast('connected · ' + frames.length + ' frames');
  } catch (err){
    console.error('[neon-radar]', err);
    toast('rainviewer unreachable · ' + (err.message || err), 'error');
  }
}

// ──────── timeline ────────
function renderTimeline(){
  const ticks = $('#ticks');
  ticks.innerHTML = '';
  ticks.setAttribute('aria-valuemax', String(frames.length - 1));
  let pastN = 0, futN = 0;
  for (let i = 0; i < frames.length; i++){
    const f = frames[i];
    const t = document.createElement('div');
    t.className = 'tick' + (f.kind === 'nowcast' ? ' future' : '');
    t.title = fmtStamp(f.time) + ' · ' + (f.kind === 'past' ? 'past' : 'nowcast');
    t.addEventListener('click', () => { showFrame(i); });
    ticks.appendChild(t);
    if (f.kind === 'past') pastN++; else futN++;
  }
  $('#pastCount').textContent = pastN;
  $('#futCount').textContent = futN;
}

function renderHud(){
  if (!frames.length) return;
  const f = frames[currentIdx];
  const stamp = $('#frameStamp');
  stamp.textContent = fmtStamp(f.time);
  stamp.classList.toggle('future', f.kind === 'nowcast');
  $('#frameLabel').textContent = f.kind === 'past' ? 'Past frame' : 'Nowcast';
  $('#curIdx').textContent = currentIdx + 1;
  $('#totIdx').textContent = frames.length;
  $('#ticks').setAttribute('aria-valuenow', String(currentIdx));
  // active tick highlight
  const ticks = $('#ticks').children;
  for (let i = 0; i < ticks.length; i++){
    ticks[i].classList.toggle('now', i === currentIdx);
  }
}

function fmtStamp(unixSec){
  const d = new Date(unixSec * 1000);
  // local time, "HH:MM"
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}

// ──────── playback ────────
function play(){
  if (isPlaying) return;
  isPlaying = true;
  $('#playBtn').setAttribute('aria-pressed', 'true');
  $('#playBtn').textContent = '❚❚';
  scheduleNext();
}
function pause(){
  if (!isPlaying) return;
  isPlaying = false;
  $('#playBtn').setAttribute('aria-pressed', 'false');
  $('#playBtn').textContent = '▶';
  clearTimeout(playTimer);
}
function togglePlay(){ isPlaying ? pause() : play(); }
function scheduleNext(){
  clearTimeout(playTimer);
  playTimer = setTimeout(() => {
    if (!isPlaying) return;
    showFrame(currentIdx + 1);
    scheduleNext();
  }, cadence);
}

$('#playBtn').addEventListener('click', togglePlay);
$('#speedSlider').addEventListener('input', (e) => { cadence = +e.target.value; });

// keyboard
document.addEventListener('keydown', (e) => {
  if (e.target instanceof HTMLInputElement) return;
  if (e.code === 'Space'){ e.preventDefault(); togglePlay(); }
  else if (e.key === 'ArrowLeft'){ pause(); showFrame(currentIdx - 1); }
  else if (e.key === 'ArrowRight'){ pause(); showFrame(currentIdx + 1); }
  else if (e.key === 'p' || e.key === 'P'){ cyclePalette(); }
});

// ──────── locate ────────
$('#locateBtn').addEventListener('click', () => {
  if (!navigator.geolocation){ toast('geolocation not supported'); return; }
  toast('locating…');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 7, { animate: true });
      toast('centered on you');
    },
    (err) => { toast('location denied · ' + (err.message || ''), 'error'); },
    { enableHighAccuracy: false, timeout: 8000, maximumAge: 60_000 }
  );
});

// ──────── palette cycle ────────
function cyclePalette(){
  paletteIdx = (paletteIdx + 1) % PALETTES.length;
  toast('palette · scheme ' + PALETTES[paletteIdx]);
  buildLayers();
}
$('#paletteBtn').addEventListener('click', cyclePalette);

// ──────── toast ────────
let toastTimer = 0;
function toast(msg, kind){
  const el = $('#toast');
  el.textContent = msg;
  el.className = 'toast show' + (kind === 'error' ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ──────── boot ────────
loadFrames();
// soft auto-refresh manifest every 5 min so we pick up new RainViewer frames
setInterval(loadFrames, 5 * 60 * 1000);
// auto-play after first load (gentle)
setTimeout(() => { if (frames.length) play(); }, 1800);
</script>
</body>
</html>
