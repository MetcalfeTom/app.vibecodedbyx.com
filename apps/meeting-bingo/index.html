<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meeting Bingo</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%8A" />

<meta name="description" content="Corporate meeting bingo. Random buzzwords, click to daub each square, hear it spoken aloud, and hit BINGO when the jargon lines up. Survive your next sync in style." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Meeting Bingo" />
<meta property="og:description" content="Buzzword bingo for your next meeting. Daub the jargon, hear it spoken, hit BINGO." />
<meta property="og:url" content="https://sloppy.live/meeting-bingo/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20corporate%20buzzword%20bingo%20card%20on%20a%20whiteboard%2C%20yellow%20highlighter%20daubs%2C%20playful%20office%20flat%20design?width=1200&height=630&nologo=true&seed=2424" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Permanent+Marker&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#eef1f4; --board:#ffffff; --ink:#1c2433; --line:#cdd5df; --dim:#6b7688;
    --navy:#2b4a8b; --teal:#2aa39a; --coral:#ef6f5e; --hi:#ffe14d; --hi-d:#f4c01e; --free:#bfe3df;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    min-height:100vh; font-family:'Space Mono',monospace; color:var(--ink);
    background:
      radial-gradient(120% 70% at 50% -10%, #f7f9fb 0%, transparent 55%),
      repeating-linear-gradient(0deg, rgba(40,60,100,.03) 0 1px, transparent 1px 26px),
      repeating-linear-gradient(90deg, rgba(40,60,100,.03) 0 1px, transparent 1px 26px),
      var(--bg);
    display:flex; flex-direction:column; align-items:center; padding:1.1rem .8rem 2.4rem;
    -webkit-font-smoothing:antialiased;
  }
  header{ text-align:center; margin-bottom:.5rem; }
  h1{ font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(2rem,8vw,3.4rem);
    line-height:.95; letter-spacing:-.02em; color:var(--navy); }
  h1 .b{ color:var(--coral); }
  .tag{ font-size:.62rem; letter-spacing:.2em; text-transform:uppercase; color:var(--dim); margin-top:.45rem; }

  .toolbar{ display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; align-items:center; margin:.7rem 0 .3rem; }
  .btn{ font-family:'Space Mono',monospace; font-weight:700; font-size:.78rem; letter-spacing:.04em; cursor:pointer;
    background:var(--board); color:var(--ink); border:2px solid var(--ink); border-radius:10px; padding:.5rem .85rem;
    box-shadow:3px 3px 0 rgba(28,36,51,.2); min-height:2.6rem; transition:transform .1s; }
  .btn:hover{ transform:translate(1px,1px); box-shadow:2px 2px 0 rgba(28,36,51,.2); }
  .btn:active{ transform:translate(3px,3px); box-shadow:none; }
  .btn:focus-visible{ outline:3px solid var(--teal); outline-offset:2px; }
  .btn.call{ background:var(--navy); color:#fff; border-color:#13294f; }
  .btn.win{ background:var(--coral); color:#fff; border-color:#b03f30; }
  .count{ font-family:'Space Mono',monospace; font-size:.68rem; color:var(--dim); }
  .count b{ color:var(--coral); }

  .caller{ font-family:'Permanent Marker',cursive; font-size:1.05rem; color:var(--navy); min-height:1.4rem;
    text-align:center; margin:.2rem 0 .5rem; }

  /* board */
  .board{ position:relative; width:min(560px,96vw); background:var(--board); border:3px solid var(--ink);
    border-radius:14px; box-shadow:7px 7px 0 rgba(28,36,51,.18); padding:.6rem; }
  .head-row{ display:grid; grid-template-columns:repeat(5,1fr); gap:.4rem; margin-bottom:.45rem; }
  .head-row span{ font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(1.1rem,4.4vw,1.8rem);
    text-align:center; color:#fff; border-radius:8px; padding:.15rem 0; }
  .head-row span:nth-child(1){ background:var(--navy); }
  .head-row span:nth-child(2){ background:var(--teal); }
  .head-row span:nth-child(3){ background:var(--coral); }
  .head-row span:nth-child(4){ background:#caa32e; }
  .head-row span:nth-child(5){ background:#7a55b5; }

  .grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:.4rem; }
  .cell{ position:relative; aspect-ratio:1/1; border:2px solid var(--line); border-radius:9px; background:#fafbfc;
    display:flex; align-items:center; justify-content:center; text-align:center; cursor:pointer;
    font-family:'Bricolage Grotesque',sans-serif; font-weight:600; line-height:1.05; padding:.2rem;
    font-size:clamp(.5rem,1.9vw,.82rem); color:var(--ink); overflow:hidden; transition:transform .12s, border-color .12s; }
  .cell:hover{ border-color:var(--navy); }
  .cell:focus-visible{ outline:3px solid var(--teal); outline-offset:2px; }
  .cell.marked{ color:#3a2f00; transform:rotate(var(--rot,-1deg)); border-color:var(--hi-d); }
  .cell.marked::before{ content:""; position:absolute; inset:8% 4%; background:var(--hi); border-radius:40% 60% 55% 45%;
    transform:rotate(var(--rot2,3deg)); opacity:.78; mix-blend-mode:multiply; z-index:0; }
  .cell.marked span{ position:relative; z-index:1; }
  .cell span{ position:relative; z-index:1; }
  .cell.free{ background:var(--free); border-color:#7fc4bc; font-family:'Permanent Marker',cursive; }
  .cell.win{ animation:pop .5s ease; box-shadow:0 0 0 3px var(--coral) inset; }
  @keyframes pop{ 0%{transform:scale(1)}40%{transform:scale(1.08) rotate(var(--rot,-1deg))}100%{transform:scale(1) rotate(var(--rot,-1deg))} }

  /* bingo banner */
  .banner{ position:fixed; inset:0; z-index:30; display:none; align-items:center; justify-content:center; pointer-events:none; }
  .banner.show{ display:flex; }
  .banner .word{ font-family:'Permanent Marker',cursive; font-size:clamp(3rem,18vw,9rem); color:var(--coral);
    text-shadow:4px 4px 0 #fff, 7px 7px 0 rgba(28,36,51,.25); animation:slam .6s cubic-bezier(.2,1.4,.4,1); }
  @keyframes slam{ 0%{transform:scale(.2) rotate(-12deg); opacity:0} 60%{transform:scale(1.15) rotate(3deg); opacity:1} 100%{transform:scale(1) rotate(-3deg)} }
  .confetti{ position:fixed; top:-12px; width:9px; height:14px; z-index:29; pointer-events:none; border-radius:2px; }

  footer{ margin-top:1rem; font-size:.6rem; color:var(--dim); text-align:center; line-height:1.6; }
  .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>
  <header>
    <h1>Meeting <span class="b">Bingo</span></h1>
    <div class="tag">daub the jargon · survive the sync</div>
  </header>

  <div class="toolbar">
    <button class="btn call" id="callBtn" type="button">📢 Call a buzzword</button>
    <button class="btn" id="newBtn" type="button">🔀 New card</button>
    <button class="btn" id="muteBtn" type="button" aria-pressed="false">🔊 Sound on</button>
    <span class="count">marked <b id="markCount">1</b>/25 · bingos <b id="bingoCount">0</b></span>
  </div>
  <div class="caller" id="caller" role="status" aria-live="polite">click squares as the buzzwords fly…</div>

  <div class="board">
    <div class="head-row" aria-hidden="true"><span>B</span><span>I</span><span>N</span><span>G</span><span>O</span></div>
    <div class="grid" id="grid" role="grid" aria-label="Buzzword bingo card"></div>
  </div>

  <div class="banner" id="banner" aria-hidden="true"><div class="word">BINGO!</div></div>
  <p class="sr-only" id="live" role="status" aria-live="assertive"></p>

  <footer>
    A satirical buzzword bingo board. No actual synergy was harmed.<br>
    Tip: click a square the moment someone says it out loud.
  </footer>

<script>
(function(){
  "use strict";
  var grid=document.getElementById('grid'), caller=document.getElementById('caller'),
      callBtn=document.getElementById('callBtn'), newBtn=document.getElementById('newBtn'),
      muteBtn=document.getElementById('muteBtn'), markCount=document.getElementById('markCount'),
      bingoCount=document.getElementById('bingoCount'), banner=document.getElementById('banner'), live=document.getElementById('live');
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var BUZZ = [
    "Synergy","Leverage","Circle Back","Deep Dive","Low-Hanging Fruit","Move the Needle","Bandwidth",
    "Touch Base","Take it Offline","Drill Down","Paradigm Shift","Value-Add","Action Items","Deliverables",
    "Stakeholders","KPIs","Core Competency","Holistic","Ideate","Vertical","Boil the Ocean","Ping Me",
    "Run it up the Flagpole","Pivot","Scalable","Disrupt","Streamline","Best Practice","Win-Win",
    "Game Changer","Outside the Box","Same Page","Quick Win","Bleeding Edge","North Star","Double-Click",
    "Table That","Hard Stop","You're on Mute","Per My Last Email","Let's Sync","ROI","Bottom Line",
    "Granular","Optics","Cadence","Socialize","Boots on the Ground","30,000-Foot View","Net-Net",
    "Going Forward","Empower","Robust","Mission-Critical","Wheelhouse","Circle of Trust"
  ];
  // 5 columns × 5 rows; center (index 12) is FREE
  var WIN_LINES = (function(){
    var lines=[];
    for(var r=0;r<5;r++){ var row=[]; for(var c=0;c<5;c++) row.push(r*5+c); lines.push(row); }
    for(var c2=0;c2<5;c2++){ var col=[]; for(var r2=0;r2<5;r2++) col.push(r2*5+c2); lines.push(col); }
    lines.push([0,6,12,18,24]); lines.push([4,8,12,16,20]);
    return lines;
  })();

  var cells=[], wonLines={}, bingos=0, muted=false;

  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

  function newCard(){
    var picks=shuffle(BUZZ).slice(0,24);
    cells=[]; wonLines={};
    grid.innerHTML='';
    for(var i=0;i<25;i++){
      var free=(i===12);
      var cell=document.createElement('button'); cell.type='button'; cell.className='cell'+(free?' free marked':'');
      cell.setAttribute('role','gridcell');
      cell.style.setProperty('--rot', (Math.random()*4-2).toFixed(2)+'deg');
      cell.style.setProperty('--rot2', (Math.random()*10-5).toFixed(2)+'deg');
      var word = free ? 'FREE' : picks[i<12?i:i-1];
      cell.innerHTML='<span>'+esc(word)+'</span>';
      cell.dataset.word=word;
      (function(idx){ cell.addEventListener('click', function(){ toggle(idx); }); })(i);
      var obj={ el:cell, word:word, marked:free, free:free };
      cells.push(obj); grid.appendChild(cell);
    }
    bingos=0; bingoCount.textContent='0'; updateCount();
    banner.classList.remove('show');
    caller.textContent='click squares as the buzzwords fly…';
  }
  function esc(s){ return String(s).replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'})[c];}); }

  function toggle(i){
    var c=cells[i]; if(c.free) return;     // FREE stays marked
    c.marked=!c.marked;
    c.el.classList.toggle('marked', c.marked);
    c.el.setAttribute('aria-pressed', c.marked?'true':'false');
    if(c.marked){ stamp(); speak(c.word); } else { sndUnmark(); }
    updateCount();
    checkBingo();
  }
  function updateCount(){ var n=0; cells.forEach(function(c){ if(c.marked) n++; }); markCount.textContent=n; }

  function checkBingo(){
    var newWins=[];
    WIN_LINES.forEach(function(line, li){
      if(wonLines[li]) return;
      if(line.every(function(idx){ return cells[idx].marked; })){
        wonLines[li]=true; newWins.push(line);
      }
    });
    if(newWins.length){
      newWins.forEach(function(line){ line.forEach(function(idx){ cells[idx].el.classList.add('win'); }); });
      bingos+=newWins.length; bingoCount.textContent=bingos;
      celebrate();
    }
  }

  function celebrate(){
    banner.classList.add('show'); live.textContent='BINGO!';
    sndFanfare(); speak('Bingo!');
    if(!reduce) confetti();
    setTimeout(function(){ banner.classList.remove('show'); }, 1600);
  }

  function confetti(){
    var colors=['#ef6f5e','#2aa39a','#2b4a8b','#ffe14d','#7a55b5'];
    for(var i=0;i<90;i++){
      var d=document.createElement('div'); d.className='confetti';
      d.style.left=(Math.random()*100)+'vw';
      d.style.background=colors[i%colors.length];
      d.style.transform='rotate('+(Math.random()*360)+'deg)';
      document.body.appendChild(d);
      var fall=1200+Math.random()*1400, drift=(Math.random()*240-120);
      d.animate([
        { transform:'translate(0,0) rotate(0deg)', opacity:1 },
        { transform:'translate('+drift+'px,108vh) rotate('+(Math.random()*900)+'deg)', opacity:.9 }
      ], { duration:fall, easing:'cubic-bezier(.3,.6,.5,1)' });
      (function(el){ setTimeout(function(){ el.remove(); }, fall+50); })(d);
    }
  }

  // ---- caller ----
  callBtn.addEventListener('click', function(){
    var pool=cells.filter(function(c){ return !c.free; });
    var pick=pool[Math.floor(Math.random()*pool.length)];
    caller.textContent='“'+pick.word+'”';
    speak(pick.word);
    pulse();
  });
  function pulse(){ caller.style.transform='scale(1.08)'; setTimeout(function(){ caller.style.transform='scale(1)'; }, 180); }
  caller.style.transition='transform .18s';

  newBtn.addEventListener('click', newCard);
  muteBtn.addEventListener('click', function(){ muted=!muted; muteBtn.textContent=muted?'🔇 Sound off':'🔊 Sound on';
    muteBtn.setAttribute('aria-pressed', muted?'true':'false'); });

  // ---- audio ----
  var AC=null;
  function actx(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
  function stamp(){ if(muted) return; var a=actx(); if(!a) return; var t=a.currentTime;
    var o=a.createOscillator(),g=a.createGain(); o.type='square'; o.frequency.setValueAtTime(520,t); o.frequency.exponentialRampToValueAtTime(180,t+0.09);
    g.gain.setValueAtTime(0.16,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12); o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.13);
    var nb=a.createBuffer(1,a.sampleRate*0.05,a.sampleRate),d=nb.getChannelData(0); for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    var ns=a.createBufferSource(); ns.buffer=nb; var ng=a.createGain(); ng.gain.value=0.12; ns.connect(ng); ng.connect(a.destination); ns.start(t); }
  function sndUnmark(){ if(muted) return; var a=actx(); if(!a) return; var t=a.currentTime;
    var o=a.createOscillator(),g=a.createGain(); o.type='sine'; o.frequency.setValueAtTime(260,t); o.frequency.exponentialRampToValueAtTime(120,t+0.1);
    g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12); o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.13); }
  function sndFanfare(){ if(muted) return; var a=actx(); if(!a) return; var t=a.currentTime;
    [523,659,784,1047,1319].forEach(function(f,i){ var o=a.createOscillator(),g=a.createGain(); o.type='triangle'; o.frequency.value=f;
      g.gain.setValueAtTime(0.0001,t+i*0.1); g.gain.linearRampToValueAtTime(0.2,t+i*0.1+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.4);
      o.connect(g); g.connect(a.destination); o.start(t+i*0.1); o.stop(t+i*0.1+0.45); }); }

  // ---- TTS (the soundboard: speak each buzzword) ----
  var synth=window.speechSynthesis, voices=[];
  function loadVoices(){ if(synth) voices=synth.getVoices()||[]; }
  if(synth){ loadVoices(); if(typeof synth.onvoiceschanged!=='undefined') synth.onvoiceschanged=loadVoices; }
  function speak(text){
    if(muted||!synth) return;
    try{
      synth.cancel();
      var u=new SpeechSynthesisUtterance(text);
      var en=voices.filter(function(v){ return /^en/i.test(v.lang); });
      if(en.length) u.voice=en[0];
      u.rate=0.98; u.pitch=0.92;
      synth.speak(u);
    }catch(e){}
  }

  newCard();
})();
</script>
</body>
</html>
