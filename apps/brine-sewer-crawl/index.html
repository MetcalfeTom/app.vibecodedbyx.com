<style>
  :root {
    --bg-1:#04080a;
    --bg-2:#020405;
    --brine-1:#9ef07a;
    --brine-2:#5e8a3e;
    --brine-3:#2e3e1e;
    --pickle:#7ab94a;
    --pickle-2:#4d7e2a;
    --paper:#dfecd0;
    --bug:#5e3a1f;
    --moss:#3a5d3a;
    --blood:#a01030;
    --frame:#0c1418;
    --frame-h:#1a2a30;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  html { font-size: 100%; }
  body {
    min-height: 100vh;
    color: var(--paper);
    font-family: 'Cormorant Garamond', serif;
    background: var(--bg-2);
    background-image:
      radial-gradient(circle at 20% 24%, rgba(94,138,62,0.10), transparent 55%),
      radial-gradient(circle at 80% 86%, rgba(160,16,48,0.10), transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    overflow-x: hidden;
  }
  .skip { position:absolute; left:-1000px; }
  .skip:focus-visible {
    left: 0.5rem; top: 0.5rem;
    background: var(--paper); color: var(--bg-1);
    padding:0.5rem 0.8rem; z-index:100; text-decoration:none;
  }
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0.6rem 0.9rem 1.4rem 0.9rem;
  }
  header {
    text-align: center;
    padding: 0.4rem 0 0.5rem 0;
  }
  .eyebrow {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.32em;
    color: var(--brine-1);
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(158,240,122,0.6);
  }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    margin: 0.4rem 0 0 0;
    line-height: 1;
    color: var(--paper);
    text-shadow:
      0 0 16px rgba(158,240,122,0.5),
      3px 3px 0 var(--frame-h),
      6px 6px 0 var(--bg-1);
    letter-spacing: 0.04em;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--paper);
    opacity: 0.78;
    margin-top: 0.4rem;
  }
  .hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.4rem;
    margin: 0.7rem 0 0.4rem 0;
  }
  .stat {
    background: rgba(4,8,10,0.92);
    border: 2px solid var(--brine-2);
    border-radius: 6px;
    padding: 0.4rem 0.55rem;
    text-align: center;
    box-shadow: inset 0 0 18px rgba(94,138,62,0.06);
  }
  .stat .lab {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.16em;
    color: var(--brine-1);
    text-transform: uppercase;
    opacity: 0.85;
  }
  .stat .val {
    font-family: 'VT323', monospace;
    font-size: 1.6rem;
    line-height: 1;
    color: var(--paper);
    margin-top: 0.15rem;
  }
  .stat.hp .val      { color: #ff8060; }
  .stat.parts .val   { color: var(--brine-1); }
  .stat.stamina .val { color: var(--brine-1); }
  .stat.depth .val   { color: var(--paper); opacity: 0.8; }
  .bar {
    height: 0.45rem;
    background: rgba(255,255,255,0.10);
    margin-top: 0.25rem;
    border-radius: 2px;
    overflow: hidden;
  }
  .bar > span { display: block; height: 100%; transition: width 200ms ease; }
  .bar.hp > span      { background: #ff8060; }
  .bar.stamina > span { background: var(--brine-1); }
  .bar.parts > span   { background: var(--brine-2); }
  .stage {
    margin-top: 0.4rem;
    border: 4px solid var(--frame-h);
    background: #000;
    box-shadow: 6px 6px 0 var(--bg-1), 0 0 0 1px rgba(94,138,62,0.4) inset;
    overflow: hidden;
    position: relative;
    border-radius: 8px;
  }
  canvas#stage {
    display: block;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #04080a;
    cursor: crosshair;
  }
  .controls {
    margin-top: 0.7rem;
    display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.62rem;
    background: var(--paper);
    color: var(--frame);
    border: 3px solid var(--frame);
    padding: 0.55rem 0.8rem;
    box-shadow: 3px 3px 0 var(--brine-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    min-height: 2.75rem;
    transition: transform 80ms, box-shadow 80ms;
  }
  .btn:hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--brine-3); }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--brine-3); }
  .btn:focus-visible { outline: 3px solid var(--brine-1); outline-offset: 2px; }
  .help {
    margin-top: 0.5rem;
    text-align: center;
    font-family: 'VT323', monospace;
    font-size: 1.05rem;
    color: var(--paper);
    opacity: 0.75;
  }
  .help kbd {
    background: rgba(158,240,122,0.10);
    border: 1px solid var(--brine-2);
    color: var(--brine-1);
    padding: 0.05rem 0.4rem;
    border-radius: 3px;
    font-family: 'VT323', monospace;
  }
  .pad {
    display: none;
    position: fixed;
    bottom: 0.6rem; left: 0.6rem; right: 0.6rem;
    z-index: 10;
    justify-content: space-between;
    pointer-events: none;
  }
  @media (pointer: coarse), (max-width: 760px) {
    .pad { display: flex; }
    .help { display: none; }
  }
  .pad-btn {
    pointer-events: auto;
    width: 4.4rem; height: 4.4rem;
    background: rgba(223,236,208,0.92);
    border: 3px solid var(--frame);
    color: var(--frame);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.7rem;
    box-shadow: 3px 3px 0 var(--brine-3);
    user-select: none;
    touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
  }
  .pad-actions { display: flex; flex-direction: column; gap: 0.4rem; pointer-events: auto; }
  .pad-actions .pad-btn { width: 4.6rem; height: 4.6rem; border-radius: 50%; }
  .pad-actions .pad-btn.run { background: var(--brine-1); color: var(--frame); }
  .overlay {
    position: absolute; inset: 0;
    background: rgba(2,4,5,0.9);
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 1rem;
    z-index: 20;
  }
  .overlay[hidden] { display: none !important; }
  .overlay-inner {
    background: var(--paper);
    color: var(--frame);
    border: 4px solid var(--frame);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    max-width: 26rem;
    box-shadow: 8px 8px 0 var(--brine-3);
  }
  .overlay-inner h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 1rem;
    margin: 0 0 0.5rem 0;
    color: var(--blood);
    letter-spacing: 0.04em;
  }
  .overlay-inner.win h2 { color: #2e7a3e; }
  .overlay-inner .body {
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    margin-bottom: 0.7rem;
  }
  .overlay-inner .stats {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.06em;
    margin-bottom: 0.7rem;
  }
</style>

<body>
<a class="skip" href="#stage">skip to game</a>
<main>
  <header>
    <div class="eyebrow">★ FLOOR -3 · CUCURBIT INVESTIGATIONS ★</div>
    <h1>BRINE SEWER CRAWL</h1>
    <div class="tagline">a pickle in the dark · scavenge eight bug parts · don't get drained</div>
  </header>

  <section class="hud" role="status" aria-live="polite">
    <div class="stat hp"><div class="lab">SHELL</div><div class="val" id="hudHp">3</div><div class="bar hp"><span id="hudHpBar"></span></div></div>
    <div class="stat stamina"><div class="lab">BRINE</div><div class="val" id="hudStam">100</div><div class="bar stamina"><span id="hudStamBar"></span></div></div>
    <div class="stat parts"><div class="lab">PARTS</div><div class="val" id="hudParts">0/8</div><div class="bar parts"><span id="hudPartsBar"></span></div></div>
    <div class="stat depth"><div class="lab">DEPTH</div><div class="val" id="hudDepth">0m</div></div>
  </section>

  <div class="stage">
    <canvas id="stage" role="application" aria-label="Top-down sewer view. Use WASD to move, mouse to aim flashlight, hold Shift to sprint (drains brine), walk over bug parts to collect, reach the green hatch when you have all 8."></canvas>
    <div class="overlay" id="overlay" hidden>
      <div class="overlay-inner" id="overlayInner">
        <h2 id="ovTitle">·</h2>
        <div class="body" id="ovBody">·</div>
        <div class="stats" id="ovStats">·</div>
        <button class="btn" id="ovBtn" type="button">DESCEND</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="muteBtn" type="button" aria-pressed="false">♪ ON</button>
    <button class="btn" id="resetBtn" type="button">↺ NEW DESCENT</button>
  </div>
  <div class="help">
    <kbd>WASD</kbd> · move · <kbd>MOUSE</kbd> · aim · <kbd>SPACE</kbd> · jab · <kbd>SHIFT</kbd> · sprint
  </div>
</main>

<div class="pad" aria-hidden="true">
  <div style="display:flex; gap: 0.4rem; pointer-events:auto;">
    <button class="pad-btn" id="padLeft"  type="button">◀</button>
    <button class="pad-btn" id="padRight" type="button">▶</button>
  </div>
  <div class="pad-actions">
    <button class="pad-btn" id="padUp"   type="button">▲</button>
    <button class="pad-btn" id="padDown" type="button">▼</button>
  </div>
</div>

<script>
'use strict';
// ──────────────────────────────────────────────────────────────
// BRINE SEWER CRAWL — top-down 2D-canvas survival.
// Player: a pickle. Flashlight cone of vision (canvas mask via
// destination-out gradient sweep). Stamina-gated sprint. 1600×900
// sewer world with brick walls, brine puddles, scattered bug
// parts, and roach/spider/larva enemies that wake when the cone
// hits them. Collect 8 parts + reach the green hatch to escape.
// (Going 2D canvas instead of three.js — flashlight cone masking
// is much cleaner here than building a shadow shader in webgl.)
// ──────────────────────────────────────────────────────────────

const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
let VW = 960, VH = 540;
function resizeCanvas(){
  const r = cv.getBoundingClientRect();
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  cv.width = Math.round(r.width * dpr);
  cv.height = Math.round(r.height * dpr);
  VW = r.width; VH = r.height;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

// ── WORLD ─────────────────────────────────────────────────────
const W = 1600, H = 900;
const TILE = 40;
// Pickle battle cries — chat ask: "make sure there is a text
// pop up for the pickle rick battle cry when scavenging parts."
// Riffs on the energy without quoting verbatim.
const BATTLE_CRIES = [
  "I'M PICKLE BRINE!",
  "BRINE TIME!",
  "GHERKIN MODE!",
  "I'M IN THE WALLS!",
  "PICKLEFIED!",
  "ASCEND, CUCURBIT!",
  "FERMENTATION COMPLETE!",
  "DILL WITH IT!",
  "MORTY, IT'S ME, A PICKLE!",
  "CRUNCH ENGAGED!",
];
const COL = {
  // Significantly brighter palette per chat ask — was almost-black
  // teal/brown that needed the flashlight cone just to read at all.
  floor:    '#1f3230',         // was #0e1716
  floorAlt: '#172725',         // was #0a1110
  grout:    '#0a1010',         // was #040608
  brick:    '#5a4530',         // was #2a2018
  brickH:   '#7a5d40',         // was #3d2e22
  brickL:   '#3a2c1e',         // was #1a1410
  moss:     '#4a7a4a',         // was #2a4d2a
  brine:    '#7ec45a',         // was #5e8a3e
  brineH:   '#cdf7b5',         // was #9ef07a
  pickle:   '#9ed060',         // was #7ab94a
  pickleD:  '#6ea03a',         // was #4d7e2a
  pickleS:  '#4a7625',         // was #3a5e1d
  bug:      '#8a5a30',         // was #5e3a1f
  bugLeg:   '#5a3a1c',         // was #3d2510
  spider:   '#2a1a14',         // was #1a0e08
  larva:    '#e8b88a',         // was #d4a070
  hatchA:   '#7ec45a',
  hatchB:   '#cdf7b5',
};

// ── STATE ─────────────────────────────────────────────────────
const state = {
  ended: false,
  endedWin: false,
  muted: false,
  player: {
    x: 80, y: 80, vx: 0, vy: 0,
    hp: 3, hpMax: 3,
    stamina: 100, stamMax: 100,
    aim: 0,
    aimFromMouse: 0,
    sprinting: false,
    iframes: 0,
    moveAng: 0,
    attackCD: 0,    // seconds until next jab is allowed
    attackT:  0,    // seconds remaining on the jab visual / hit window
  },
  walls: [],           // {x,y,w,h} rectangles
  parts: [],           // {x,y,kind,collected}
  enemies: [],
  fx: [],
  exit: null,          // {x, y} — green hatch
  cam: { x: 0, y: 0 },
  partsCollected: 0,
  partsTotal: 8,
  flicker: 0,
  startedAt: 0,
};

const keys = new Set();
const mouse = { x: VW/2, y: VH/2, lastAt: 0 };

// ── INPUT ─────────────────────────────────────────────────────
window.addEventListener('keydown', (ev) => {
  const k = ev.key.toLowerCase();
  keys.add(k);
  if (ev.repeat) return;
  if (k === 'shift') state.player.sprinting = true;
  if (k === ' ' || k === 'enter' || k === 'z'){ attackJab(); ev.preventDefault(); }
  if (k === 'r' && state.ended) reset();
  if (k === 'm') toggleMute();
});
window.addEventListener('keyup', (ev) => {
  const k = ev.key.toLowerCase();
  keys.delete(k);
  if (k === 'shift') state.player.sprinting = false;
});
cv.addEventListener('mousemove', (ev) => {
  const r = cv.getBoundingClientRect();
  mouse.x = (ev.clientX - r.left) * (VW / r.width);
  mouse.y = (ev.clientY - r.top)  * (VH / r.height);
  mouse.lastAt = performance.now();
});
cv.addEventListener('pointerdown', () => ensureAudio());

function bindPad(id, onDown, onUp){
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('pointerdown', (e) => { e.preventDefault(); ensureAudio(); onDown(); });
  el.addEventListener('pointerup',     () => onUp && onUp());
  el.addEventListener('pointercancel', () => onUp && onUp());
  el.addEventListener('pointerleave',  () => onUp && onUp());
}
bindPad('padLeft',  () => keys.add('a'), () => keys.delete('a'));
bindPad('padRight', () => keys.add('d'), () => keys.delete('d'));
bindPad('padUp',    () => keys.add('w'), () => keys.delete('w'));
bindPad('padDown',  () => keys.add('s'), () => keys.delete('s'));

// ── AUDIO ─────────────────────────────────────────────────────
let actx = null;
function ensureAudio(){
  if (state.muted) return null;
  if (!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e){ actx = null; }
  }
  return actx;
}
function blip(freq, dur, type, vol){
  const a = ensureAudio(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  g.gain.value = vol == null ? 0.05 : vol;
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + (dur || 0.1));
  o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime + (dur || 0.1) + 0.02);
}
function noiseBurst(dur, vol, lp){
  const a = ensureAudio(); if (!a) return;
  const buf = a.createBuffer(1, Math.floor(a.sampleRate * dur), a.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1)*(1 - i/data.length);
  const src = a.createBufferSource(); src.buffer = buf;
  const f = a.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp || 800;
  const g = a.createGain(); g.gain.value = vol == null ? 0.05 : vol;
  src.connect(f).connect(g).connect(a.destination); src.start();
}
const sfx = {
  step:   () => blip(120, 0.04, 'square',   0.025),
  pickup: () => { blip(660, 0.08, 'triangle', 0.05); blip(990, 0.10, 'triangle', 0.04); },
  hurt:   () => { noiseBurst(0.18, 0.07, 800); blip(120, 0.16, 'sawtooth', 0.06); },
  bug:    () => noiseBurst(0.06, 0.04, 600),
  jab:    () => { blip(360, 0.05, 'square', 0.05); blip(220, 0.06, 'square', 0.04); },
  squish: () => { noiseBurst(0.14, 0.07, 700); blip(110, 0.12, 'sawtooth', 0.05); },
  whiff:  () => blip(180, 0.06, 'sine', 0.03),
  win:    () => { for (const f of [523,659,784,1047,1318]) setTimeout(()=>blip(f,0.18,'triangle',0.06), (f-523)*0.55); },
  lose:   () => { for (const f of [220,164,110,82]) setTimeout(()=>blip(f,0.6,'sawtooth',0.07), (220-f)*1.2); },
};

// ── WORLD GENERATION ──────────────────────────────────────────
function genWorld(){
  state.walls = [];
  // outer walls
  state.walls.push({ x: 0, y: 0, w: W, h: TILE });
  state.walls.push({ x: 0, y: H - TILE, w: W, h: TILE });
  state.walls.push({ x: 0, y: 0, w: TILE, h: H });
  state.walls.push({ x: W - TILE, y: 0, w: TILE, h: H });
  // a maze of internal walls — handcrafted for clean corridors
  const layout = [
    // [x, y, w, h] all in pixels
    [180, 80, 30, 220],
    [320, 220, 220, 30],
    [560, 80, 30, 360],
    [720, 250, 280, 30],
    [1040, 80, 30, 280],
    [1180, 250, 200, 30],
    [120, 380, 360, 30],
    [520, 480, 30, 280],
    [680, 480, 240, 30],
    [960, 580, 30, 240],
    [1100, 480, 280, 30],
    [1320, 580, 30, 240],
    [200, 580, 240, 30],
    [80, 720, 200, 30],
    [320, 760, 30, 80],
    [780, 720, 220, 30],
    [1180, 760, 30, 80],
  ];
  for (const w of layout) state.walls.push({ x: w[0], y: w[1], w: w[2], h: w[3] });

  // bug parts — scattered in non-wall positions
  state.parts = [];
  const partSpots = [
    [240, 140, 'leg'],
    [620, 140, 'wing'],
    [880, 180, 'mandible'],
    [1280, 140, 'leg'],
    [380, 540, 'carapace'],
    [720, 620, 'wing'],
    [1080, 380, 'mandible'],
    [1480, 460, 'carapace'],
  ];
  for (const p of partSpots){
    state.parts.push({ x: p[0], y: p[1], kind: p[2], collected: false });
  }
  state.partsTotal = state.parts.length;

  // exit hatch (visible only when you have everything)
  state.exit = { x: 1480, y: 820, r: 22 };

  // enemies — 6 wandering bugs
  state.enemies = [];
  const enemySpots = [
    [400, 180, 'roach'],
    [820, 380, 'spider'],
    [340, 660, 'roach'],
    [1100, 660, 'larva'],
    [1280, 380, 'spider'],
    [620, 760, 'roach'],
  ];
  for (const e of enemySpots){
    state.enemies.push({
      kind: e[2],
      x: e[0], y: e[1],
      vx: 0, vy: 0,
      hp: e[2] === 'roach' ? 8 : e[2] === 'spider' ? 18 : 25,
      alertedT: 0,
      wanderT: 0,
      wanderDir: Math.random() * Math.PI * 2,
      animT: Math.random() * 6,
      hitFlash: 0,
    });
  }
}

function reset(){
  state.ended = false;
  state.endedWin = false;
  state.partsCollected = 0;
  state.startedAt = performance.now();
  state.player = {
    x: 80, y: 80, vx: 0, vy: 0,
    hp: 3, hpMax: 3,
    stamina: 100, stamMax: 100,
    aim: 0, aimFromMouse: 0,
    sprinting: false,
    iframes: 0,
    moveAng: 0,
    attackCD: 0,
    attackT: 0,
  };
  state.fx = [];
  genWorld();
  document.getElementById('overlay').hidden = true;
}

// ── COLLISION ─────────────────────────────────────────────────
function collidesAt(x, y, r){
  for (const w of state.walls){
    // closest point inside rect to circle center
    const cx = Math.max(w.x, Math.min(x, w.x + w.w));
    const cy = Math.max(w.y, Math.min(y, w.y + w.h));
    const dx = x - cx, dy = y - cy;
    if (dx * dx + dy * dy < r * r) return w;
  }
  return null;
}
function lineHitsWall(x1, y1, x2, y2){
  // sample the segment and check tile-rect collision
  const steps = Math.max(2, Math.floor(Math.hypot(x2 - x1, y2 - y1) / 8));
  for (let i = 1; i <= steps; i++){
    const t = i / steps;
    const x = x1 + (x2 - x1) * t;
    const y = y1 + (y2 - y1) * t;
    for (const w of state.walls){
      if (x > w.x && x < w.x + w.w && y > w.y && y < w.y + w.h) return true;
    }
  }
  return false;
}

// ── TICK PLAYER ───────────────────────────────────────────────
const SPEED = 130;
const SPRINT = 220;
const STAM_DRAIN = 25;        // /s while sprinting
const STAM_REGEN = 12;        // /s while not sprinting
const SPRINT_FLOOR = 6;       // can only start sprint above this
function tickPlayer(dt){
  const p = state.player;
  let mx = 0, my = 0;
  if (keys.has('a') || keys.has('arrowleft'))  mx -= 1;
  if (keys.has('d') || keys.has('arrowright')) mx += 1;
  if (keys.has('w') || keys.has('arrowup'))    my -= 1;
  if (keys.has('s') || keys.has('arrowdown'))  my += 1;
  if (mx || my){
    const len = Math.hypot(mx, my);
    mx /= len; my /= len;
    p.moveAng = Math.atan2(my, mx);
  }
  let speed = SPEED;
  // sprint logic
  const wantSprint = p.sprinting && p.stamina > SPRINT_FLOOR && (mx || my);
  if (wantSprint){
    speed = SPRINT;
    p.stamina = Math.max(0, p.stamina - STAM_DRAIN * dt);
    if (Math.random() < dt * 6) sfx.step();
  } else {
    p.stamina = Math.min(p.stamMax, p.stamina + STAM_REGEN * dt);
  }
  // axis-separated movement vs walls
  const dx = mx * speed * dt;
  const dy = my * speed * dt;
  let nx = p.x + dx;
  let ny = p.y + dy;
  if (collidesAt(nx, p.y, 10)) nx = p.x;
  if (collidesAt(p.x, ny, 10)) ny = p.y;
  p.x = nx; p.y = ny;
  // bounds
  p.x = Math.max(20, Math.min(W - 20, p.x));
  p.y = Math.max(20, Math.min(H - 20, p.y));
  // aim: prefer mouse if moved recently, else movement direction
  const sinceMouse = (performance.now() - mouse.lastAt) / 1000;
  if (sinceMouse < 2.0){
    // mouse target in screen px → world coords
    const wx = mouse.x + state.cam.x;
    const wy = mouse.y + state.cam.y;
    p.aim = Math.atan2(wy - p.y, wx - p.x);
  } else if (mx || my){
    p.aim = p.moveAng;
  }
  // i-frames + attack cooldowns
  if (p.iframes > 0) p.iframes -= dt;
  if (p.attackCD > 0) p.attackCD -= dt;
  if (p.attackT  > 0) p.attackT  -= dt;
  // pick up parts
  for (const part of state.parts){
    if (part.collected) continue;
    if (Math.hypot(p.x - part.x, p.y - part.y) < 18){
      part.collected = true;
      state.partsCollected++;
      sfx.pickup();
      // small +kind tag at the part location
      state.fx.push({ kind:'text', x: part.x, y: part.y - 12, vx: 0, vy: -30,
                      life: 1, max: 1, color: '#9ef07a', text: '+' + part.kind });
      // PICKLE BATTLE CRY pop-up over the player — nods to the
      // pickle-rick energy without quoting verbatim
      const cry = BATTLE_CRIES[Math.floor(Math.random() * BATTLE_CRIES.length)];
      state.fx.push({ kind:'cry', x: p.x, y: p.y - 26, vx: 0, vy: -40,
                      life: 1.3, max: 1.3, color: '#9ef07a', text: cry });
    }
  }
  // exit reached
  if (state.partsCollected >= state.partsTotal && state.exit
   && Math.hypot(p.x - state.exit.x, p.y - state.exit.y) < state.exit.r + 8){
    endRun(true);
  }
}

// ── PLAYER ATTACK — RAZORBLADE JAB ───────────────────────────
// Pickle Rick canon: a razor blade strapped to the front of the
// pickle. Spacebar thrusts it in the aim direction. Hits enemies
// in a 38u front arc (±0.7 rad) for 12 damage. On kill, spawns a
// fresh LEG part at the bug's position — pickle-rick "harvest the
// armor from the body" energy. Picked-up legs count toward the
// 8-part win condition like scavenged ones.
const ATTACK_RANGE = 38;
const ATTACK_ARC   = 0.7;
const ATTACK_DMG   = 12;
const ATTACK_CD    = 0.45;
const ATTACK_DUR   = 0.22;
function attackJab(){
  const p = state.player;
  if (state.ended || p.attackCD > 0) return;
  p.attackCD = ATTACK_CD;
  p.attackT  = ATTACK_DUR;
  let connected = false;
  for (const e of state.enemies){
    if (e._dead) continue;
    const dx = e.x - p.x, dy = e.y - p.y;
    const d = Math.hypot(dx, dy);
    if (d > ATTACK_RANGE + 12) continue;
    const ang = Math.atan2(dy, dx);
    const da = Math.atan2(Math.sin(ang - p.aim), Math.cos(ang - p.aim));
    if (Math.abs(da) > ATTACK_ARC) continue;
    e.hp -= ATTACK_DMG;
    e.hitFlash = 0.22;
    e.alertedT = 4.0;
    connected = true;
    if (e.hp <= 0){
      e._dead = true;
      sfx.squish();
      // FX: red splat text + a leg-part DROP that the pickle can
      // walk over to collect (counts toward the 8). Mark as
      // .dropped so the renderer can give it a fresh red ring.
      state.fx.push({ kind:'text', x: e.x, y: e.y - 14, vx: 0, vy: -34,
                      life: 0.9, max: 0.9, color: '#ff6060', text: 'CRUSHED' });
      state.parts.push({
        x: e.x + (Math.random() - 0.5) * 8,
        y: e.y + (Math.random() - 0.5) * 8,
        kind: 'leg',
        collected: false,
        dropped: true,
      });
      // (partsTotal intentionally NOT bumped — drops give the
      // player extra options without raising the win quota above 8)
    }
  }
  if (connected) sfx.jab(); else sfx.whiff();
}

// ── TICK ENEMIES ─────────────────────────────────────────────
function tickEnemies(dt){
  const p = state.player;
  const t = performance.now() / 1000;
  // sweep dead bugs at the top of each tick (jab kills are marked
  // with e._dead during attackJab)
  state.enemies = state.enemies.filter(e => !e._dead);
  for (const e of state.enemies){
    e.animT += dt * 8;
    e.hitFlash = Math.max(0, e.hitFlash - dt);
    // detection: in flashlight cone OR within 60u alert radius OR was alerted recently
    const dx = e.x - p.x, dy = e.y - p.y;
    const d = Math.hypot(dx, dy);
    const ang = Math.atan2(dy, dx);
    const conef = Math.cos(ang - p.aim);
    const inCone = (conef > Math.cos(0.62)) && d < 280 && !lineHitsWall(p.x, p.y, e.x, e.y);
    const closeAlert = d < 60;
    if (inCone || closeAlert){
      e.alertedT = 4.0;
      if (Math.random() < dt * 0.6) sfx.bug();
    } else {
      e.alertedT = Math.max(0, e.alertedT - dt);
    }
    // movement
    let mx = 0, my = 0;
    let sp = (e.kind === 'roach') ? 95 : (e.kind === 'spider') ? 80 : 50;
    if (e.alertedT > 0){
      // chase
      const dl = d || 1;
      mx = -dx / dl; my = -dy / dl;
    } else {
      // wander
      e.wanderT -= dt;
      if (e.wanderT <= 0){
        e.wanderDir = Math.random() * Math.PI * 2;
        e.wanderT = 1.4 + Math.random() * 2.5;
      }
      mx = Math.cos(e.wanderDir);
      my = Math.sin(e.wanderDir);
      sp *= 0.45;
    }
    let nx = e.x + mx * sp * dt;
    let ny = e.y + my * sp * dt;
    if (collidesAt(nx, e.y, 9)) nx = e.x;
    if (collidesAt(e.x, ny, 9)) ny = e.y;
    e.x = Math.max(28, Math.min(W - 28, nx));
    e.y = Math.max(28, Math.min(H - 28, ny));
    // contact damage
    if (d < 22 && p.iframes <= 0){
      const dmg = (e.kind === 'roach') ? 1 : (e.kind === 'spider') ? 1 : 1;
      p.hp -= dmg;
      p.iframes = 1.2;
      sfx.hurt();
      // knockback
      const kx = -dx / (d || 1), ky = -dy / (d || 1);
      p.x += kx * 18; p.y += ky * 18;
      state.fx.push({ kind:'text', x: p.x, y: p.y - 14, vx:0, vy:-30, life: 0.8, max: 0.8, color: '#ff6060', text: '-' + dmg });
      if (p.hp <= 0) endRun(false);
    }
  }
}

// ── TICK FX ──────────────────────────────────────────────────
function tickFx(dt){
  const out = [];
  for (const f of state.fx){
    f.life -= dt;
    if (f.life <= 0) continue;
    f.x += (f.vx || 0) * dt;
    f.y += (f.vy || 0) * dt;
    out.push(f);
  }
  state.fx = out;
}

// ── CAMERA ────────────────────────────────────────────────────
function updateCamera(){
  const p = state.player;
  state.cam.x = Math.max(0, Math.min(W - VW, p.x - VW / 2));
  state.cam.y = Math.max(0, Math.min(H - VH, p.y - VH / 2));
}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  ctx.clearRect(0, 0, VW, VH);
  // floor (always rendered, dark base — flashlight reveals it)
  drawFloor();
  ctx.save();
  ctx.translate(-state.cam.x, -state.cam.y);
  drawWalls();
  drawBrinePuddles();
  drawParts();
  drawExit();
  drawEnemies();
  drawPlayer();
  drawFx();
  ctx.restore();
  // FLASHLIGHT MASK — dark overlay with cone cutout
  drawFlashlightMask();
  // HUD-on-canvas: low brine warning, status
  drawCanvasOverlays();
  // CRT scanline overlay — softened 0.18 -> 0.10 so the brighter
  // base palette isn't immediately re-darkened
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  for (let y = 0; y < VH; y += 3) ctx.fillRect(0, y, VW, 1);
}

function drawFloor(){
  // base wash
  ctx.fillStyle = COL.floor;
  ctx.fillRect(0, 0, VW, VH);
  // tile grid (visible only because flashlight will reveal it)
  const off = state.cam;
  const x0 = Math.floor(off.x / TILE) * TILE - off.x;
  const y0 = Math.floor(off.y / TILE) * TILE - off.y;
  ctx.fillStyle = COL.floorAlt;
  for (let y = y0; y < VH; y += TILE){
    for (let x = x0; x < VW; x += TILE){
      const wx = (x + off.x) / TILE | 0;
      const wy = (y + off.y) / TILE | 0;
      if (((wx + wy) % 2) === 0) ctx.fillRect(x, y, TILE, TILE);
    }
  }
  // grout lines
  ctx.strokeStyle = COL.grout;
  ctx.lineWidth = 1;
  for (let y = y0; y < VH; y += TILE){
    ctx.beginPath(); ctx.moveTo(0, y + 0.5); ctx.lineTo(VW, y + 0.5); ctx.stroke();
  }
  for (let x = x0; x < VW; x += TILE){
    ctx.beginPath(); ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, VH); ctx.stroke();
  }
}

function drawWalls(){
  for (const w of state.walls){
    ctx.fillStyle = COL.brick;
    ctx.fillRect(w.x, w.y, w.w, w.h);
    // brick courses
    ctx.fillStyle = COL.brickL;
    for (let y = w.y; y < w.y + w.h; y += 8){
      ctx.fillRect(w.x, y, w.w, 1);
    }
    // alternating brick offsets
    ctx.fillStyle = COL.brickH;
    for (let y = w.y; y < w.y + w.h; y += 8){
      const offset = ((y / 8) | 0) % 2 ? 12 : 0;
      for (let x = w.x + offset; x < w.x + w.w; x += 24){
        ctx.fillRect(x, y, 1, 7);
      }
    }
    // moss on top edge
    ctx.fillStyle = COL.moss;
    for (let i = 0; i < w.w; i += 6){
      if (((i + w.x) * 13) % 11 < 4) ctx.fillRect(w.x + i, w.y, 2, 2);
    }
  }
}

function drawBrinePuddles(){
  // 6 fixed-position puddles (procedural enough — same each run but distinct shapes)
  const puddles = [
    [260, 320, 36], [620, 380, 28], [880, 540, 42],
    [1180, 360, 30], [340, 740, 34], [1340, 720, 28],
  ];
  for (const p of puddles){
    const grad = ctx.createRadialGradient(p[0], p[1], 4, p[0], p[1], p[2]);
    grad.addColorStop(0, 'rgba(158,240,122,0.55)');
    grad.addColorStop(0.6, 'rgba(94,138,62,0.35)');
    grad.addColorStop(1, 'rgba(46,62,30,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(p[0], p[1], p[2], 0, Math.PI*2); ctx.fill();
    // shimmer
    ctx.fillStyle = 'rgba(158,240,122,0.65)';
    const sh = Math.sin(performance.now() / 400 + p[0]) * 2;
    ctx.fillRect(p[0] - 6, p[1] - 1 + sh, 12, 1);
  }
}

function drawParts(){
  for (const part of state.parts){
    if (part.collected) continue;
    // dropped legs (combat drops) get a faint red ring so the
    // player can tell harvested-from-corpse from scattered
    if (part.dropped){
      const pulse = (Math.sin(performance.now() / 220) + 1) / 2;
      ctx.strokeStyle = 'rgba(255,80,80,' + (0.25 + pulse * 0.25).toFixed(2) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(part.x, part.y, 14, 0, Math.PI*2); ctx.stroke();
    }
    drawPart(part.x, part.y, part.kind);
  }
}

function drawPart(x, y, kind){
  ctx.save();
  ctx.translate(x, y);
  if (kind === 'leg'){
    // segmented insect leg
    ctx.strokeStyle = COL.bugLeg;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-8, 0); ctx.lineTo(-2, -4); ctx.lineTo(4, 2); ctx.lineTo(10, -1);
    ctx.stroke();
    // joint dots
    ctx.fillStyle = COL.bug;
    ctx.beginPath(); ctx.arc(-2, -4, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, 2, 1.5, 0, Math.PI*2); ctx.fill();
  } else if (kind === 'wing'){
    // translucent triangle wing
    ctx.fillStyle = 'rgba(220,240,200,0.55)';
    ctx.beginPath();
    ctx.moveTo(-9, -1);
    ctx.quadraticCurveTo(-2, -8, 8, -3);
    ctx.quadraticCurveTo(0, -1, -9, 1);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(80,100,60,0.7)';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    // veins
    ctx.beginPath();
    ctx.moveTo(-7, 0); ctx.lineTo(6, -2); ctx.moveTo(-5, -3); ctx.lineTo(4, -4);
    ctx.stroke();
  } else if (kind === 'mandible'){
    // V-shaped mandible pair
    ctx.strokeStyle = COL.bug;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-7, 4); ctx.lineTo(0, -5); ctx.lineTo(7, 4);
    ctx.stroke();
    ctx.lineCap = 'butt';
    // tip dots
    ctx.fillStyle = COL.spider;
    ctx.beginPath(); ctx.arc(-7, 4, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7, 4, 1.8, 0, Math.PI*2); ctx.fill();
  } else if (kind === 'carapace'){
    // curved chitin shard
    ctx.fillStyle = COL.bug;
    ctx.beginPath();
    ctx.moveTo(-9, 4);
    ctx.quadraticCurveTo(0, -10, 9, 4);
    ctx.lineTo(7, 5);
    ctx.quadraticCurveTo(0, -6, -7, 5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = COL.bugLeg;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // sheen
    ctx.strokeStyle = 'rgba(220,180,120,0.4)';
    ctx.beginPath();
    ctx.moveTo(-5, 0); ctx.quadraticCurveTo(0, -4, 5, 0); ctx.stroke();
  }
  // glow halo
  ctx.fillStyle = 'rgba(158,240,122,0.18)';
  ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawExit(){
  if (!state.exit) return;
  const e = state.exit;
  const ready = state.partsCollected >= state.partsTotal;
  // grate plate
  ctx.fillStyle = ready ? COL.hatchA : '#1a2a1a';
  ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = ready ? COL.hatchB : '#3a5d3a';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  // grate bars
  ctx.strokeStyle = ready ? COL.hatchB : '#1a2a1a';
  ctx.lineWidth = 1.5;
  for (let i = -2; i <= 2; i++){
    ctx.beginPath();
    ctx.moveTo(e.x - e.r + 2, e.y + i * 6);
    ctx.lineTo(e.x + e.r - 2, e.y + i * 6);
    ctx.stroke();
  }
  // arrow up if not ready
  if (!ready){
    ctx.fillStyle = 'rgba(94,138,62,0.5)';
    ctx.beginPath();
    ctx.moveTo(e.x, e.y - e.r - 12);
    ctx.lineTo(e.x - 6, e.y - e.r - 4);
    ctx.lineTo(e.x + 6, e.y - e.r - 4);
    ctx.closePath();
    ctx.fill();
  } else {
    // pulsing halo
    const pulse = (Math.sin(performance.now() / 250) + 1) / 2;
    ctx.strokeStyle = 'rgba(158,240,122,' + (0.3 + pulse * 0.4) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r + 6 + pulse * 4, 0, Math.PI*2);
    ctx.stroke();
  }
}

function drawEnemies(){
  for (const e of state.enemies){
    drawEnemy(e);
  }
}

function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x, e.y);
  const ang = Math.atan2(state.player.y - e.y, state.player.x - e.x);
  ctx.rotate(ang);
  const flash = e.hitFlash > 0;
  if (e.kind === 'roach'){
    // small skittering bug
    ctx.fillStyle = flash ? '#fff5d8' : COL.bug;
    ctx.beginPath();
    ctx.ellipse(0, 0, 10, 7, 0, 0, Math.PI*2);
    ctx.fill();
    // legs (animated)
    ctx.strokeStyle = COL.bugLeg;
    ctx.lineWidth = 1;
    const legPhase = Math.sin(e.animT) * 2;
    for (let i = -1; i <= 1; i++){
      ctx.beginPath();
      ctx.moveTo(0, i * 4);
      ctx.lineTo(-7 + legPhase, i * 8 + (i * 2));
      ctx.moveTo(0, i * 4);
      ctx.lineTo(7 - legPhase, i * 8 + (i * 2));
      ctx.stroke();
    }
    // antennae
    ctx.beginPath();
    ctx.moveTo(8, -2); ctx.lineTo(14, -5);
    ctx.moveTo(8, 2);  ctx.lineTo(14, 5);
    ctx.stroke();
    // eyes
    ctx.fillStyle = flash ? '#a01030' : '#ffd040';
    ctx.fillRect(7, -2, 1.5, 1.5); ctx.fillRect(7, 1, 1.5, 1.5);
  } else if (e.kind === 'spider'){
    // 8-legged dark form
    ctx.fillStyle = flash ? '#fff5d8' : COL.spider;
    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 8, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#0a0608';
    ctx.beginPath();
    ctx.arc(6, 0, 5, 0, Math.PI*2);
    ctx.fill();
    // 8 legs
    ctx.strokeStyle = COL.spider;
    ctx.lineWidth = 1.4;
    const legP = Math.sin(e.animT * 1.2) * 2;
    for (let i = 0; i < 4; i++){
      const a = (i - 1.5) * 0.45;
      const lr = 16 + (i % 2 === 0 ? legP : -legP);
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a + Math.PI/2) * lr, Math.sin(a + Math.PI/2) * lr);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(Math.cos(-a - Math.PI/2) * lr, Math.sin(-a - Math.PI/2) * lr);
      ctx.stroke();
    }
    // 8 eye-cluster
    ctx.fillStyle = flash ? '#a01030' : '#a01030';
    for (let i = 0; i < 4; i++){
      ctx.fillRect(8 + (i % 2), -2 + Math.floor(i / 2) * 4, 1, 1);
    }
  } else if (e.kind === 'larva'){
    // bloated grub
    ctx.fillStyle = flash ? '#fff5d8' : COL.larva;
    ctx.beginPath();
    ctx.ellipse(0, 0, 14, 9, 0, 0, Math.PI*2);
    ctx.fill();
    // segments
    ctx.strokeStyle = '#a8784a';
    ctx.lineWidth = 0.8;
    for (let i = -2; i <= 2; i++){
      ctx.beginPath();
      ctx.ellipse(i * 4, 0, 2, 8, 0, 0, Math.PI*2);
      ctx.stroke();
    }
    // head + tiny eyes
    ctx.fillStyle = '#7a4a2a';
    ctx.beginPath(); ctx.arc(11, 0, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a0e08';
    ctx.fillRect(12, -2, 1.5, 1.5); ctx.fillRect(12, 1, 1.5, 1.5);
  }
  // alert ring
  if (e.alertedT > 0){
    ctx.strokeStyle = 'rgba(255,80,60,' + Math.min(1, e.alertedT / 1) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.stroke();
    // exclamation mark above
    ctx.save();
    ctx.rotate(-ang);
    ctx.fillStyle = 'rgba(255,60,80,0.9)';
    ctx.fillRect(-1, -22, 2, 6);
    ctx.fillRect(-1, -14, 2, 2);
    ctx.restore();
  }
  ctx.restore();
}

function drawPlayer(){
  const p = state.player;
  ctx.save();
  ctx.translate(p.x, p.y);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(0, 6, 12, 4, 0, 0, Math.PI*2); ctx.fill();
  // pickle body — long cucumber oval, oriented along aim
  ctx.rotate(p.aim);
  const flash = p.iframes > 0 && (Math.floor(p.iframes * 12) % 2 === 0);
  ctx.fillStyle = flash ? '#fff5d8' : COL.pickle;
  ctx.beginPath();
  ctx.ellipse(0, 0, 16, 9, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = COL.pickleS;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // pickle stripes (longitudinal warty texture)
  ctx.fillStyle = COL.pickleD;
  for (let i = -10; i <= 10; i += 5){
    ctx.fillRect(i, -3, 1, 6);
  }
  // warts (tiny dots)
  ctx.fillStyle = COL.pickleS;
  for (let i = 0; i < 6; i++){
    const wx = (i * 5 - 12) % 24 - 8;
    const wy = ((i * 7) % 11) - 5;
    ctx.fillRect(wx, wy, 1.5, 1.5);
  }
  // tiny eye on the pointed end
  ctx.fillStyle = '#fff5d8';
  ctx.beginPath(); ctx.arc(11, -2, 1.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0608';
  ctx.beginPath(); ctx.arc(11.5, -2, 0.8, 0, Math.PI*2); ctx.fill();
  // flashlight bezel — small disc at the front emitting the cone
  ctx.fillStyle = '#dadfe7';
  ctx.beginPath(); ctx.arc(15, 0, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff5d8';
  ctx.beginPath(); ctx.arc(15, 0, 1, 0, Math.PI*2); ctx.fill();
  // RAZORBLADE — chrome blade thrusts from the front of the
  // pickle during the attack window. Telescopes out, glints, then
  // retracts. Faint warm swipe arc trails behind the blade tip
  // for impact feel.
  if (p.attackT > 0){
    const k = 1 - (p.attackT / ATTACK_DUR);     // 0..1 progress
    const reach = ATTACK_RANGE * (0.55 + k * 0.6);
    // trailing warm swipe arc
    ctx.strokeStyle = 'rgba(255,248,200,' + (0.45 * (1 - k * 0.5)).toFixed(2) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const halfArc = ATTACK_ARC * 0.55 * (1 - k * 0.4);
    ctx.arc(8, 0, reach, -halfArc, halfArc);
    ctx.stroke();
    // razorblade shaft (chrome rectangle)
    ctx.save();
    ctx.translate(8, 0);
    // shadow underside
    ctx.fillStyle = '#5a6172';
    ctx.fillRect(0, 1, reach, 2);
    // body
    ctx.fillStyle = '#dadfe7';
    ctx.fillRect(0, -2, reach, 4);
    // top highlight
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, -2, reach, 1);
    // tip — pointed triangle
    ctx.fillStyle = '#fff5d8';
    ctx.beginPath();
    ctx.moveTo(reach, -3);
    ctx.lineTo(reach + 5, 0);
    ctx.lineTo(reach,  3);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#9ea4b3';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    // glint streak that races down the blade
    const glintX = reach * (0.2 + k * 0.6);
    ctx.fillStyle = 'rgba(255,255,255,' + (0.85 * (1 - k)).toFixed(2) + ')';
    ctx.fillRect(glintX, -1, Math.min(8, reach * 0.25), 1);
    ctx.restore();
  }
  ctx.restore();
}

function drawFx(){
  for (const f of state.fx){
    if (f.kind === 'text'){
      const a = Math.min(1, f.life / f.max);
      ctx.fillStyle = f.color;
      ctx.globalAlpha = a;
      ctx.font = '14px VT323, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y);
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
    } else if (f.kind === 'cry'){
      // PICKLE BATTLE CRY — chunky, glowing, jiggly
      const t = (f.max - f.life) / f.max;          // 0..1 progress
      const a = Math.min(1, f.life / f.max);
      const scale = 1.0 + Math.sin(t * Math.PI * 6) * 0.05 * (1 - t);
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.scale(scale, scale);
      ctx.globalAlpha = a;
      // outer glow
      ctx.font = "bold 14px 'Press Start 2P', monospace";
      ctx.textAlign = 'center';
      ctx.shadowBlur = 14;
      ctx.shadowColor = 'rgba(158,240,122,0.85)';
      ctx.fillStyle = '#0a0608';
      ctx.fillText(f.text, 1, 1);                  // dark drop shadow
      ctx.shadowBlur = 18;
      ctx.shadowColor = 'rgba(158,240,122,1)';
      ctx.fillStyle = '#9ef07a';
      ctx.fillText(f.text, 0, 0);
      ctx.shadowBlur = 0;
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }
}

// ── FLASHLIGHT MASK ──────────────────────────────────────────
// New approach (chat ask): instead of an opaque dark overlay with
// a hole cut via destination-out, dim the world with a moderate
// black overlay and ADD light back into the cone with a warm
// gradient using `lighter` blend. The cone is now a real bright
// gradient — additive, with hue — instead of a punched-out window
// onto the world's natural color.
function drawFlashlightMask(){
  const p = state.player;
  const sx = p.x - state.cam.x;
  const sy = p.y - state.cam.y;
  ctx.save();

  // 1. Moderate ambient darkness over the whole scene
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, VW, VH);

  // 2. Additive WARM AMBIENT POOL around the player (small lantern halo)
  ctx.globalCompositeOperation = 'lighter';
  const amb = ctx.createRadialGradient(sx, sy, 6, sx, sy, 80);
  amb.addColorStop(0,   'rgba(255, 240, 180, 0.55)');
  amb.addColorStop(0.6, 'rgba(255, 220, 130, 0.18)');
  amb.addColorStop(1,   'rgba(255, 200, 100, 0)');
  ctx.fillStyle = amb;
  ctx.beginPath(); ctx.arc(sx, sy, 80, 0, Math.PI * 2); ctx.fill();

  // 3. Additive BRIGHT FLASHLIGHT CONE in front of the player
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(p.aim);
  const coneW = 0.62;
  const lowBr = p.stamina < 25 ? Math.random() * 0.15 : 0;
  const coneR = 300 - lowBr * 80;
  // warm flashlight gradient: bright core -> amber mid -> fade to 0
  const grad = ctx.createRadialGradient(0, 0, 4, 0, 0, coneR);
  grad.addColorStop(0,    'rgba(255, 248, 200, 0.95)');
  grad.addColorStop(0.35, 'rgba(255, 230, 160, 0.65)');
  grad.addColorStop(0.7,  'rgba(255, 200, 110, 0.30)');
  grad.addColorStop(1,    'rgba(255, 180, 80, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, coneR, -coneW, coneW);
  ctx.closePath();
  ctx.fill();
  // bright hot-spot at mid-cone — sells the bulb's focal cone
  const hot = ctx.createRadialGradient(coneR * 0.32, 0, 2, coneR * 0.32, 0, coneR * 0.45);
  hot.addColorStop(0, 'rgba(255, 252, 220, 0.55)');
  hot.addColorStop(1, 'rgba(255, 252, 220, 0)');
  ctx.fillStyle = hot;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, coneR * 0.7, -coneW * 0.7, coneW * 0.7);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();
}

function drawCanvasOverlays(){
  // low-brine warning text
  if (state.player.stamina < 20){
    ctx.fillStyle = 'rgba(255,60,80,' + (0.45 + Math.sin(performance.now()/120) * 0.25) + ')';
    ctx.font = 'bold 12px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('LOW BRINE', VW / 2, VH - 10);
    ctx.textAlign = 'left';
  }
  // exit prompt
  if (state.partsCollected >= state.partsTotal && state.exit){
    const sx = state.exit.x - state.cam.x;
    const sy = state.exit.y - state.cam.y;
    if (sx > -20 && sx < VW + 20 && sy > -20 && sy < VH + 20){
      ctx.fillStyle = 'rgba(158,240,122,0.85)';
      ctx.font = 'bold 11px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('★ EXIT ★', sx, sy - 32);
      ctx.textAlign = 'left';
    }
  }
}

// ── HUD ──────────────────────────────────────────────────────
const hudHp = document.getElementById('hudHp');
const hudHpBar = document.getElementById('hudHpBar');
const hudStam = document.getElementById('hudStam');
const hudStamBar = document.getElementById('hudStamBar');
const hudParts = document.getElementById('hudParts');
const hudPartsBar = document.getElementById('hudPartsBar');
const hudDepth = document.getElementById('hudDepth');
function refreshHud(){
  const p = state.player;
  hudHp.textContent = Math.max(0, p.hp);
  hudHpBar.style.width = (p.hp / p.hpMax * 100) + '%';
  hudStam.textContent = Math.round(p.stamina);
  hudStamBar.style.width = (p.stamina / p.stamMax * 100) + '%';
  hudParts.textContent = state.partsCollected + '/' + state.partsTotal;
  hudPartsBar.style.width = (state.partsCollected / state.partsTotal * 100) + '%';
  // depth = distance from spawn (NW corner) in m where 1m = ~30 px
  const dist = Math.hypot(p.x - 80, p.y - 80) / 30;
  hudDepth.textContent = dist.toFixed(1) + 'm';
}

// ── END / RESET ──────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const overlayInner = document.getElementById('overlayInner');
const ovTitle = document.getElementById('ovTitle');
const ovBody = document.getElementById('ovBody');
const ovStats = document.getElementById('ovStats');
const ovBtn = document.getElementById('ovBtn');
function endRun(win){
  if (state.ended) return;
  state.ended = true;
  state.endedWin = win;
  if (win){
    overlayInner.className = 'overlay-inner win';
    ovTitle.textContent = 'OUT OF THE BRINE';
    ovBody.textContent  = 'eight parts in the jar. the jar is the way home.';
    sfx.win();
  } else {
    overlayInner.className = 'overlay-inner';
    ovTitle.textContent = 'PICKLED';
    ovBody.textContent  = 'they finished the brining for you.';
    sfx.lose();
  }
  const t = ((performance.now() - state.startedAt) / 1000) | 0;
  ovStats.textContent = 'PARTS ' + state.partsCollected + '/' + state.partsTotal + ' · TIME ' + t + 's';
  ovBtn.textContent = win ? 'AGAIN' : 'TRY AGAIN';
  overlay.hidden = false;
}
ovBtn.addEventListener('click', () => { reset(); ensureAudio(); });
document.getElementById('resetBtn').addEventListener('click', () => { reset(); ensureAudio(); });
document.getElementById('muteBtn').addEventListener('click', toggleMute);
function toggleMute(){
  state.muted = !state.muted;
  const b = document.getElementById('muteBtn');
  b.textContent = '♪ ' + (state.muted ? 'OFF' : 'ON');
  b.setAttribute('aria-pressed', String(state.muted));
}

// ── MAIN LOOP ────────────────────────────────────────────────
let lastTs = 0;
function loop(ts){
  if (!lastTs) lastTs = ts;
  const dt = Math.min(0.06, (ts - lastTs) / 1000);
  lastTs = ts;
  if (!state.ended){
    tickPlayer(dt);
    tickEnemies(dt);
    tickFx(dt);
  }
  updateCamera();
  render();
  refreshHud();
  requestAnimationFrame(loop);
}

// ── BOOT ─────────────────────────────────────────────────────
resizeCanvas();
reset();
state.startedAt = performance.now();
requestAnimationFrame(loop);
</script>
