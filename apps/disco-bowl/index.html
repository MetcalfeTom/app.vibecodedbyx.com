<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Disco Bowl</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪩">
<meta property="og:title" content="Disco Bowl">
<meta property="og:description" content="Bowl a glowing disco ball into neon pins that explode into glitter. Strikes have never been this fabulous.">
<meta property="og:url" content="https://app.sloppy.live/disco-bowl/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/3D%20disco%20bowling%20alley%20neon%20lights%20glowing%20pins%20disco%20ball%20glitter%20explosion?width=1200&height=630&nologo=true&referrer=sloppy.live">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Lexend+Mega:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0010;font-family:'Lexend Mega',sans-serif;touch-action:none;user-select:none}
canvas{display:block}
#hud{position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:12px 20px;pointer-events:none;z-index:10}
.hud-box{text-align:center}
.hud-label{font-size:9px;color:#666;letter-spacing:2px;text-transform:uppercase}
.hud-val{font-family:'Bungee Shade',cursive;font-size:clamp(18px,4vw,30px);background:linear-gradient(135deg,#f0f,#ff0,#0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#msg{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-family:'Bungee Shade',cursive;font-size:clamp(28px,7vw,56px);z-index:20;pointer-events:none;opacity:0;transition:opacity 0.4s;text-align:center;line-height:1.3}
#msg.strike{background:linear-gradient(135deg,#f0f,#ff0,#0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none}
#msg.spare{color:#0ff;text-shadow:0 0 30px rgba(0,255,255,0.5)}
#msg.normal{color:#fff;text-shadow:0 0 15px rgba(255,255,255,0.3)}
#aim-ui{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;pointer-events:all}
#aim-ui .inst{font-size:10px;color:#555;letter-spacing:1px;margin-bottom:8px}
#power-bar{width:clamp(200px,50vw,300px);height:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;margin:0 auto 8px;overflow:hidden;position:relative}
#power-fill{height:100%;width:0%;background:linear-gradient(90deg,#0ff,#f0f,#ff0);border-radius:6px;transition:none}
#bowl-btn{font-family:'Lexend Mega',sans-serif;font-size:14px;font-weight:900;padding:10px 30px;border:2px solid #f0f;background:rgba(255,0,255,0.08);color:#f0f;cursor:pointer;letter-spacing:2px;border-radius:6px;transition:all .2s}
#bowl-btn:hover{background:#f0f;color:#0a0010;box-shadow:0 0 30px rgba(255,0,255,0.4)}
#bowl-btn:disabled{opacity:0.3;cursor:default}
#scoreboard{position:absolute;top:50px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10;pointer-events:none}
.frame-box{width:clamp(24px,5vw,36px);text-align:center;border:1px solid rgba(255,255,255,0.08);padding:2px;border-radius:3px;background:rgba(255,255,255,0.02)}
.frame-num{font-size:7px;color:#444}
.frame-score{font-size:clamp(8px,1.5vw,11px);color:#888;min-height:14px}
</style>
</head>
<body>
<div id="hud">
  <div class="hud-box"><div class="hud-label">Frame</div><div class="hud-val" id="h-frame">1</div></div>
  <div class="hud-box"><div class="hud-label">Score</div><div class="hud-val" id="h-score">0</div></div>
  <div class="hud-box"><div class="hud-label">Pins</div><div class="hud-val" id="h-pins">10</div></div>
</div>
<div id="scoreboard"></div>
<div id="msg"></div>
<div id="aim-ui">
  <div class="inst" id="aim-inst">← → to aim · hold SPACE or tap BOWL for power</div>
  <div id="power-bar"><div id="power-fill"></div></div>
  <button id="bowl-btn">BOWL</button>
</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

const msgEl = document.getElementById('msg');
const powerFill = document.getElementById('power-fill');
const bowlBtn = document.getElementById('bowl-btn');

// Audio
const AC = new (window.AudioContext||window.webkitAudioContext)();
function playBowl(){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sine';o.frequency.setValueAtTime(100,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(50,AC.currentTime+0.3);
  g.gain.setValueAtTime(0.08,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.3);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.3);
}
function playHit(loud){
  const n=AC.createBufferSource(),b=AC.createBuffer(1,AC.sampleRate*0.15,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);n.buffer=b;
  const g=AC.createGain();g.gain.setValueAtTime(loud?0.12:0.06,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.15);
  n.connect(g);g.connect(AC.destination);n.start();n.stop(AC.currentTime+0.15);
  const o=AC.createOscillator(),og=AC.createGain();
  o.type='triangle';o.frequency.value=800+Math.random()*400;
  og.gain.setValueAtTime(0.04,AC.currentTime);og.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);
  o.connect(og);og.connect(AC.destination);o.start();o.stop(AC.currentTime+0.1);
}
function playStrike(){
  [523,659,784,1047,1318].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.06,AC.currentTime+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.08+0.3);
    o.connect(g);g.connect(AC.destination);o.start(AC.currentTime+i*0.08);o.stop(AC.currentTime+i*0.08+0.3);
  });
}

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0010);
scene.fog = new THREE.FogExp2(0x0a0010, 0.008);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 6, 22);
camera.lookAt(0, 1, -10);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.prepend(renderer.domElement);
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

// Lighting
scene.add(new THREE.AmbientLight(0x221133, 0.5));
const spot1 = new THREE.SpotLight(0xff00ff, 1, 60, Math.PI/5, 0.5);
spot1.position.set(-8, 15, -5); spot1.castShadow = true; scene.add(spot1);
const spot2 = new THREE.SpotLight(0x00ffff, 1, 60, Math.PI/5, 0.5);
spot2.position.set(8, 15, -5); spot2.castShadow = true; scene.add(spot2);
const spot3 = new THREE.SpotLight(0xffff00, 0.5, 40, Math.PI/4, 0.5);
spot3.position.set(0, 12, 10); scene.add(spot3);

// Lane
const laneMat = new THREE.MeshPhongMaterial({color:0x1a0a2a, shininess:80});
const lane = new THREE.Mesh(new THREE.BoxGeometry(5, 0.2, 50), laneMat);
lane.position.set(0, -0.1, -10); lane.receiveShadow = true; scene.add(lane);

// Lane lines
const lineGeo = new THREE.BoxGeometry(0.03, 0.01, 50);
[-2.2,-1.1,0,1.1,2.2].forEach(x=>{
  const l = new THREE.Mesh(lineGeo, new THREE.MeshBasicMaterial({color:0x331155}));
  l.position.set(x, 0.02, -10); scene.add(l);
});

// Gutters
[-2.8,2.8].forEach(x=>{
  const g = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.3,50), new THREE.MeshPhongMaterial({color:0x0a0515}));
  g.position.set(x, -0.05, -10); scene.add(g);
});

// Approach dots
for(let z = 12; z <= 18; z += 2){
  [-1,0,1].forEach(x=>{
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8), new THREE.MeshBasicMaterial({color:0x440066}));
    dot.position.set(x, 0.02, z); scene.add(dot);
  });
}

// Disco ball
const discoBall = new THREE.Group();
const ballGeo = new THREE.IcosahedronGeometry(1.5, 2);
const ballMat = new THREE.MeshPhongMaterial({color:0xcccccc, shininess:200, envMap:null});
const ball = new THREE.Mesh(ballGeo, ballMat);
discoBall.add(ball);
// Mirror facets
const facetGeo = new THREE.PlaneGeometry(0.15, 0.15);
const facetMat = new THREE.MeshBasicMaterial({color:0xffffff, side:THREE.DoubleSide});
const positions = ballGeo.attributes.position;
for(let i = 0; i < positions.count; i += 3){
  const x = positions.getX(i), y = positions.getY(i), z = positions.getZ(i);
  const facet = new THREE.Mesh(facetGeo, facetMat.clone());
  const dir = new THREE.Vector3(x,y,z).normalize();
  facet.position.copy(dir.multiplyScalar(1.52));
  facet.lookAt(dir.clone().multiplyScalar(3));
  facet.material.color.setHSL(Math.random(), 0.5, 0.8);
  discoBall.add(facet);
}
const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,4), new THREE.MeshBasicMaterial({color:0x444444}));
wire.position.y = 3.5; discoBall.add(wire);
discoBall.position.set(0, 10, -15);
scene.add(discoBall);

// Disco light rays
const discoLight = new THREE.PointLight(0xff88ff, 0.8, 30);
discoLight.position.copy(discoBall.position);
scene.add(discoLight);

// Pin colors
const PIN_COLORS = [0xff00ff,0x00ffff,0xffff00,0xff3300,0x00ff66,0xff0088,0x8800ff,0x00aaff,0xff6600,0xaaff00];

// Create pin
function createPin(color, idx) {
  const group = new THREE.Group();
  // Body
  const bodyGeo = new THREE.CylinderGeometry(0.15, 0.2, 1, 8);
  const bodyMat = new THREE.MeshPhongMaterial({color, emissive:color, emissiveIntensity:0.3});
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.5; body.castShadow = true;
  group.add(body);
  // Neck
  const neckGeo = new THREE.CylinderGeometry(0.1, 0.15, 0.3, 8);
  const neck = new THREE.Mesh(neckGeo, bodyMat);
  neck.position.y = 1.15; group.add(neck);
  // Head
  const headGeo = new THREE.SphereGeometry(0.15, 8, 8);
  const head = new THREE.Mesh(headGeo, bodyMat);
  head.position.y = 1.4; group.add(head);
  // Glow
  const light = new THREE.PointLight(color, 0.15, 3);
  light.position.y = 0.7; group.add(light);

  group.userData = {
    color, bodyMat, light, idx,
    standing: true, vy: 0, vx: 0, vz: 0,
    rotVx: 0, rotVz: 0,
    origPos: new THREE.Vector3()
  };
  return group;
}

// Pin layout (standard triangle)
const PIN_POSITIONS = [
  [0, -30],
  [-0.6, -31.2], [0.6, -31.2],
  [-1.2, -32.4], [0, -32.4], [1.2, -32.4],
  [-1.8, -33.6], [-0.6, -33.6], [0.6, -33.6], [1.8, -33.6]
];

let pins = [];
let glitterParticles = [];

function setupPins() {
  pins.forEach(p => scene.remove(p));
  pins = [];
  glitterParticles.forEach(g => scene.remove(g.mesh));
  glitterParticles = [];
  PIN_POSITIONS.forEach(([x,z], i) => {
    const pin = createPin(PIN_COLORS[i], i);
    pin.position.set(x, 0, z);
    pin.userData.origPos.set(x, 0, z);
    pin.userData.standing = true;
    pin.userData.vy = 0; pin.userData.vx = 0; pin.userData.vz = 0;
    pin.userData.rotVx = 0; pin.userData.rotVz = 0;
    pin.rotation.set(0,0,0);
    scene.add(pin);
    pins.push(pin);
  });
}

// Bowling ball
const bowlBallGeo = new THREE.SphereGeometry(0.4, 16, 16);
const bowlBallMat = new THREE.MeshPhongMaterial({
  color:0xff00ff, emissive:0xff00ff, emissiveIntensity:0.2, shininess:120
});
const bowlBall = new THREE.Mesh(bowlBallGeo, bowlBallMat);
bowlBall.castShadow = true;
bowlBall.position.set(0, 0.4, 18);
scene.add(bowlBall);
// Ball mirror facets
for(let i = 0; i < 30; i++){
  const f = new THREE.Mesh(new THREE.PlaneGeometry(0.06,0.06), new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide}));
  const phi = Math.acos(1-2*Math.random());
  const theta = Math.random()*Math.PI*2;
  f.position.set(Math.sin(phi)*Math.cos(theta)*0.42, Math.sin(phi)*Math.sin(theta)*0.42, Math.cos(phi)*0.42);
  f.lookAt(f.position.clone().multiplyScalar(2));
  bowlBall.add(f);
}

// Glitter explosion
function spawnGlitter(x, y, z, color) {
  const count = 25;
  for(let i = 0; i < count; i++){
    const geo = new THREE.BoxGeometry(0.06, 0.06, 0.01);
    const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:1});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    const a = Math.random()*Math.PI*2, e = Math.random()*Math.PI-Math.PI/2;
    const spd = 2+Math.random()*4;
    scene.add(mesh);
    glitterParticles.push({
      mesh, mat,
      vx: Math.cos(a)*Math.cos(e)*spd,
      vy: Math.sin(e)*spd + 2,
      vz: Math.sin(a)*Math.cos(e)*spd,
      life: 1,
      rotSpeed: (Math.random()-0.5)*10
    });
  }
}

// Game state
let gamePhase = 'aim'; // aim, power, rolling, settle, result
let aimAngle = 0, aimDir = 1;
let power = 0, powerDir = 1;
let ballVX = 0, ballVZ = 0, ballSpin = 0;
let settleTimer = 0;
let frameNum = 1, rollNum = 1, totalScore = 0;
let frameScores = Array(10).fill(null).map(()=>({r1:null,r2:null,total:null}));
let pinsDown = 0, prevPinsDown = 0;

setupPins();
buildScoreboard();

function buildScoreboard(){
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  for(let i = 0; i < 10; i++){
    const box = document.createElement('div');
    box.className = 'frame-box';
    box.innerHTML = '<div class="frame-num">'+(i+1)+'</div><div class="frame-score" id="fs'+i+'"></div>';
    sb.appendChild(box);
  }
}

function resetBall(){
  bowlBall.position.set(0, 0.4, 18);
  ballVX = 0; ballVZ = 0; ballSpin = 0;
  bowlBall.rotation.set(0,0,0);
}

function showMsg(text, cls, dur){
  msgEl.textContent = text;
  msgEl.className = cls || 'normal';
  msgEl.style.opacity = 1;
  setTimeout(()=> msgEl.style.opacity = 0, dur||2000);
}

function countStanding(){
  return pins.filter(p => p.userData.standing).length;
}

function startBowl(){
  if(AC.state==='suspended')AC.resume();
  if(gamePhase !== 'aim') return;
  gamePhase = 'power';
  power = 0; powerDir = 1;
}

function releaseBowl(){
  if(gamePhase !== 'power') return;
  gamePhase = 'rolling';
  const spd = 0.3 + power * 0.5;
  const angle = aimAngle * 0.03;
  ballVX = Math.sin(angle) * spd * 0.3;
  ballVZ = -spd;
  ballSpin = angle * 2;
  playBowl();
  bowlBtn.disabled = true;
  prevPinsDown = 10 - countStanding();
}

// Input
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if(e.code === 'Space'){
    e.preventDefault();
    if(gamePhase === 'aim') startBowl();
  }
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if(e.code === 'Space' && gamePhase === 'power') releaseBowl();
});

bowlBtn.addEventListener('mousedown', startBowl);
bowlBtn.addEventListener('mouseup', releaseBowl);
bowlBtn.addEventListener('touchstart', e=>{e.preventDefault();startBowl();},{passive:false});
bowlBtn.addEventListener('touchend', releaseBowl);

// Tilt aim on mobile
let tiltAim = 0;
window.addEventListener('deviceorientation', e => { if(e.gamma) tiltAim = e.gamma * 0.5; });

function update(dt){
  const t = performance.now() * 0.001;

  // Disco ball rotate
  discoBall.rotation.y += 0.005;
  // Disco light color cycle
  discoLight.color.setHSL((t*0.1)%1, 0.8, 0.5);
  spot1.color.setHSL((t*0.15)%1, 0.9, 0.5);
  spot2.color.setHSL((t*0.15+0.33)%1, 0.9, 0.5);

  if(gamePhase === 'aim'){
    // Aim oscillation
    if(keys['ArrowLeft']||keys['KeyA']) aimAngle = Math.max(-15, aimAngle-0.3);
    else if(keys['ArrowRight']||keys['KeyD']) aimAngle = Math.min(15, aimAngle+0.3);
    else if(Math.abs(tiltAim) > 2) aimAngle = Math.max(-15, Math.min(15, aimAngle + tiltAim*0.05));
    else { aimAngle += aimDir * 0.15; if(Math.abs(aimAngle)>12){aimDir*=-1;} }
    bowlBall.position.x = aimAngle * 0.12;
  }

  if(gamePhase === 'power'){
    power += powerDir * 0.02;
    if(power >= 1){power=1;powerDir=-1;}
    if(power <= 0){power=0;powerDir=1;}
    powerFill.style.width = (power*100)+'%';
  }

  if(gamePhase === 'rolling'){
    bowlBall.position.x += ballVX;
    bowlBall.position.z += ballVZ;
    bowlBall.rotation.x += ballVZ * 2;
    bowlBall.rotation.z -= ballVX * 2;
    // Curve
    ballVX += ballSpin * 0.0005;
    ballSpin *= 0.995;

    // Pin collision
    pins.forEach(pin => {
      if(!pin.userData.standing) return;
      const dx = bowlBall.position.x - pin.position.x;
      const dz = bowlBall.position.z - pin.position.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      if(dist < 0.65){
        pin.userData.standing = false;
        const force = Math.sqrt(ballVX*ballVX + ballVZ*ballVZ);
        pin.userData.vx = dx/dist * force * 3 + (Math.random()-0.5)*2;
        pin.userData.vz = dz/dist * force * 3 + (Math.random()-0.5)*2;
        pin.userData.vy = 3 + Math.random()*3;
        pin.userData.rotVx = (Math.random()-0.5)*8;
        pin.userData.rotVz = (Math.random()-0.5)*8;
        playHit(true);
        spawnGlitter(pin.position.x, pin.position.y+0.7, pin.position.z, pin.userData.color);
      }
    });

    // Pin-pin collision
    pins.forEach(p1 => {
      if(p1.userData.standing) return;
      pins.forEach(p2 => {
        if(p2 === p1 || !p2.userData.standing) return;
        const dx = p1.position.x - p2.position.x;
        const dz = p1.position.z - p2.position.z;
        const dist = Math.sqrt(dx*dx+dz*dz);
        if(dist < 0.5){
          p2.userData.standing = false;
          p2.userData.vx = -dx/dist*2 + (Math.random()-0.5);
          p2.userData.vz = -dz/dist*2 + (Math.random()-0.5);
          p2.userData.vy = 2+Math.random()*2;
          p2.userData.rotVx = (Math.random()-0.5)*6;
          p2.userData.rotVz = (Math.random()-0.5)*6;
          playHit(false);
          spawnGlitter(p2.position.x, p2.position.y+0.5, p2.position.z, p2.userData.color);
        }
      });
    });

    // Ball out of range
    if(bowlBall.position.z < -38 || Math.abs(bowlBall.position.x) > 3.5){
      gamePhase = 'settle';
      settleTimer = 90;
    }
  }

  // Animate fallen pins
  pins.forEach(pin => {
    if(pin.userData.standing) return;
    pin.userData.vy -= 0.15;
    pin.position.x += pin.userData.vx * dt * 2;
    pin.position.y += pin.userData.vy * dt * 2;
    pin.position.z += pin.userData.vz * dt * 2;
    pin.rotation.x += pin.userData.rotVx * dt;
    pin.rotation.z += pin.userData.rotVz * dt;
    if(pin.position.y < 0){
      pin.position.y = 0;
      pin.userData.vy *= -0.3;
      pin.userData.vx *= 0.7;
      pin.userData.vz *= 0.7;
      pin.userData.rotVx *= 0.8;
      pin.userData.rotVz *= 0.8;
    }
    // Fade glow
    pin.userData.light.intensity *= 0.98;
  });

  // Glitter
  for(let i = glitterParticles.length-1; i>=0; i--){
    const g = glitterParticles[i];
    g.mesh.position.x += g.vx*dt;
    g.mesh.position.y += g.vy*dt;
    g.mesh.position.z += g.vz*dt;
    g.vy -= 6*dt;
    g.mesh.rotation.x += g.rotSpeed*dt;
    g.mesh.rotation.y += g.rotSpeed*dt*0.7;
    g.life -= dt*0.8;
    g.mat.opacity = Math.max(0, g.life);
    if(g.life <= 0){scene.remove(g.mesh);glitterParticles.splice(i,1);}
  }

  // Settle phase
  if(gamePhase === 'settle'){
    settleTimer--;
    if(settleTimer <= 0) endRoll();
  }

  // HUD
  document.getElementById('h-frame').textContent = frameNum;
  document.getElementById('h-score').textContent = totalScore;
  document.getElementById('h-pins').textContent = countStanding();

  // Camera
  if(gamePhase === 'rolling'){
    camera.position.z = Math.max(5, camera.position.z - 0.1);
    camera.position.y = 5;
  } else {
    camera.position.z += (22 - camera.position.z) * 0.03;
    camera.position.y += (6 - camera.position.y) * 0.03;
  }
  camera.lookAt(0, 1, bowlBall.position.z < 10 ? bowlBall.position.z * 0.5 : -5);
}

function endRoll(){
  const standing = countStanding();
  const knocked = 10 - standing - prevPinsDown;
  const totalKnocked = 10 - standing;
  const fi = frameNum - 1;

  if(rollNum === 1){
    frameScores[fi].r1 = knocked;
    if(standing === 0){
      // Strike
      showMsg('STRIKE!', 'strike', 2500);
      playStrike();
      // Mega glitter
      for(let i=0;i<5;i++) spawnGlitter((Math.random()-0.5)*4, 2, -31+Math.random()*4, PIN_COLORS[Math.floor(Math.random()*10)]);
      frameScores[fi].r2 = 0;
      advanceFrame();
    } else {
      rollNum = 2;
      resetBall();
      gamePhase = 'aim';
      bowlBtn.disabled = false;
      powerFill.style.width = '0%';
    }
  } else {
    frameScores[fi].r2 = knocked;
    if(standing === 0){
      showMsg('SPARE!', 'spare', 2000);
      playStrike();
      for(let i=0;i<3;i++) spawnGlitter((Math.random()-0.5)*3, 2, -31, PIN_COLORS[Math.floor(Math.random()*10)]);
    } else {
      showMsg(totalKnocked + ' pins', 'normal', 1500);
    }
    advanceFrame();
  }

  // Calculate score
  calcScore();
}

function advanceFrame(){
  frameNum++;
  rollNum = 1;
  if(frameNum > 10){
    showMsg('GAME OVER\nScore: '+totalScore, 'strike', 4000);
    setTimeout(()=>{
      frameNum = 1; totalScore = 0;
      frameScores = Array(10).fill(null).map(()=>({r1:null,r2:null,total:null}));
      buildScoreboard();
      setupPins(); resetBall();
      gamePhase = 'aim'; bowlBtn.disabled = false; powerFill.style.width='0%';
    }, 4000);
    return;
  }
  setupPins();
  resetBall();
  gamePhase = 'aim';
  bowlBtn.disabled = false;
  powerFill.style.width = '0%';
}

function calcScore(){
  let running = 0;
  for(let i = 0; i < 10; i++){
    const f = frameScores[i];
    if(f.r1 === null) break;
    const total = (f.r1||0) + (f.r2||0);
    running += total;
    const el = document.getElementById('fs'+i);
    if(total === 10 && f.r2 === 0 && f.r1 === 10) el.textContent = 'X';
    else if(total === 10) el.textContent = '/';
    else el.textContent = total;
  }
  totalScore = running;
}

// Render
const clock = new THREE.Clock();
function animate(){
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
