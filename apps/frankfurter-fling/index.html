<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>frankfurter fling</title>
<meta name="description" content="Drag, aim, release. Splat the white wall in mustard and ketchup." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%AD" />

<meta property="og:description" content="Drag, aim, release. Splat the white wall in mustard and ketchup." />
<meta property="og:url" content="https://sloppy.live/frankfurter-fling/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/hotdog%20splatting%20against%20a%20white%20diner%20wall%20mustard%20ketchup%20splash%20chrome%20accents%20checker%20floor%20cartoon%20physics%20bright?width=1200&height=630&nologo=true" />

<style>
  :root {
    --wall: #f6efe1;
    --wall-shadow: #d8cdb7;
    --bun: #e8b56b;
    --bun-dark: #b87832;
    --sausage: #c25a3a;
    --sausage-dark: #7a2d18;
    --ketchup: #c8261a;
    --mustard: #f5c042;
    --relish: #6fa54a;
    --diner-red: #b3231a;
    --diner-mint: #66c5b9;
    --chrome: #cfd6dc;
    --ink: #1c150c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 20% 100%, #2d191a 0%, #0f0808 70%);
    color: var(--wall);
    font-family: 'JetBrains Mono', monospace;
    user-select: none;
    touch-action: none;
  }
  #stage {
    position: fixed;
    inset: 0;
    display: block;
  }
  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  /* z-order: bgCanvas (wall+room), splatCanvas (persistent gunk), gameCanvas (hotdogs+launcher) */
  #bgCanvas { z-index: 1; }
  #splatCanvas { z-index: 2; mix-blend-mode: multiply; }
  #gameCanvas { z-index: 3; }

  .ui {
    position: fixed;
    z-index: 5;
    pointer-events: none;
  }
  .ui > * { pointer-events: auto; }

  header.ui {
    top: 1rem;
    left: 1.4rem;
    line-height: 1;
  }
  h1 {
    font-family: 'Bungee Shade', cursive;
    font-size: clamp(1.8rem, 4.4vw, 3rem);
    color: var(--mustard);
    text-shadow:
      3px 3px 0 var(--diner-red),
      6px 6px 0 var(--ink);
    letter-spacing: 0.02em;
    line-height: 0.95;
  }
  h1 .frank { color: var(--ketchup); }
  .sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1rem;
    color: rgba(246, 239, 225, 0.7);
    margin-top: 0.45rem;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }

  .hud {
    position: fixed;
    top: 1rem;
    right: 1.4rem;
    text-align: right;
    z-index: 5;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(246, 239, 225, 0.7);
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    line-height: 1.7;
  }
  .hud .val {
    color: var(--mustard);
    font-family: 'Bowlby One SC', sans-serif;
    font-weight: 400;
    font-size: 1.4rem;
    letter-spacing: 0.02em;
    text-shadow: 2px 2px 0 var(--ink);
  }
  .hud .val.k { color: var(--ketchup); }
  .hud .val.m { color: var(--mustard); }

  .controls {
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.55rem;
    z-index: 5;
    background: rgba(8, 6, 4, 0.65);
    border: 1px solid rgba(245, 192, 66, 0.3);
    padding: 0.5rem 0.6rem;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
    flex-wrap: wrap;
    justify-content: center;
    max-width: calc(100vw - 1.6rem);
  }
  .btn {
    appearance: none;
    border: 1.5px solid rgba(245, 192, 66, 0.55);
    background: rgba(20, 14, 8, 0.6);
    color: var(--wall);
    font-family: 'Bungee', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    padding: 0.55rem 0.95rem;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.1s, background 0.12s, border-color 0.12s, box-shadow 0.12s;
    min-height: 2.55rem;
  }
  .btn:hover {
    transform: translateY(-1px);
    background: rgba(245, 192, 66, 0.16);
    box-shadow: 0 0 18px rgba(245, 192, 66, 0.3);
  }
  .btn.on {
    background: linear-gradient(135deg, var(--diner-red), #d44a2a);
    border-color: var(--mustard);
    color: var(--wall);
  }
  .btn.ghost { border-color: rgba(207, 214, 220, 0.4); }
  .btn:focus-visible { outline: 3px solid var(--mustard); outline-offset: 2px; }

  .hint {
    position: fixed;
    bottom: 4.2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: rgba(246, 239, 225, 0.55);
    font-size: 0.95rem;
    text-align: center;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    pointer-events: none;
    transition: opacity 0.6s ease;
    white-space: nowrap;
  }
  .hint.fade { opacity: 0; }

  .toast {
    position: fixed;
    top: 6.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    font-family: 'Bungee', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.16em;
    color: var(--wall);
    text-shadow: 2px 2px 0 var(--diner-red), 4px 4px 0 var(--ink);
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    animation: toastPop 1.1s ease-out forwards;
  }
  @keyframes toastPop {
    0% { transform: translate(-50%, 8px); opacity: 0; }
    20% { transform: translate(-50%, 0); opacity: 1; }
    100% { transform: translate(-50%, -22px); opacity: 0; }
  }

  @media (max-width: 720px) {
    header.ui { top: 0.6rem; left: 0.8rem; }
    .hud { top: 0.6rem; right: 0.8rem; font-size: 0.62rem; }
    .hud .val { font-size: 1.1rem; }
    .sub { display: none; }
    .controls { gap: 0.35rem; padding: 0.4rem 0.5rem; }
    .btn { font-size: 0.62rem; padding: 0.45rem 0.7rem; letter-spacing: 0.14em; }
    .hint { font-size: 0.85rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    .toast.show { animation: none; opacity: 1; }
  }
</style>
</head>
<body>

<div id="stage" role="application" aria-label="Drag the hotdog slingshot, aim at the white wall, release to fling. Splats accumulate on the wall.">
  <canvas id="bgCanvas"></canvas>
  <canvas id="splatCanvas"></canvas>
  <canvas id="gameCanvas"></canvas>
</div>

<header class="ui">
  <h1><span class="frank">frank</span>furter<br>fling</h1>
  <p class="sub">drag the dog · aim · release</p>
</header>

<div class="hud" aria-live="polite">
  <div>splats <span class="val" id="splats">0</span></div>
  <div>thrown <span class="val k" id="thrown">0</span></div>
  <div>combo <span class="val m" id="combo">×1</span></div>
</div>

<div class="hint" id="hint">drag the hotdog backwards · release to fling</div>
<div class="toast" id="toast"></div>

<div class="controls" role="toolbar" aria-label="game controls">
  <button class="btn on" id="topMustard" aria-pressed="true" title="Mustard topping">mustard</button>
  <button class="btn on" id="topKetchup" aria-pressed="true" title="Ketchup topping">ketchup</button>
  <button class="btn" id="topRelish" aria-pressed="false" title="Relish topping">relish</button>
  <button class="btn" id="topChili" aria-pressed="false" title="Chili topping">chili</button>
  <button class="btn ghost" id="wipeBtn" title="Wipe the wall">⟲ wipe wall</button>
  <button class="btn ghost" id="muteBtn" title="Mute audio (M)">♪ on</button>
</div>

<script>
'use strict';

const bgCanvas = document.getElementById('bgCanvas');
const splatCanvas = document.getElementById('splatCanvas');
const gameCanvas = document.getElementById('gameCanvas');
const bg = bgCanvas.getContext('2d');
const sp = splatCanvas.getContext('2d');
const ctx = gameCanvas.getContext('2d');

let W = 0, H = 0, DPR = 1;
function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  for (const c of [bgCanvas, splatCanvas, gameCanvas]){
    c.width = Math.floor(W * DPR);
    c.height = Math.floor(H * DPR);
    c.style.width = W + 'px';
    c.style.height = H + 'px';
  }
  bg.setTransform(DPR, 0, 0, DPR, 0, 0);
  sp.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  drawBackground();
  // re-render existing splats since splatCanvas got cleared by resize
  redrawSplats();
}

// ───────────────────────── TOPPING STATE ─────────────────────────
const toppings = { mustard: true, ketchup: true, relish: false, chili: false };
function bindTopping(btnId, key){
  const b = document.getElementById(btnId);
  b.addEventListener('click', () => {
    toppings[key] = !toppings[key];
    b.classList.toggle('on', toppings[key]);
    b.setAttribute('aria-pressed', toppings[key] ? 'true' : 'false');
  });
}
bindTopping('topMustard', 'mustard');
bindTopping('topKetchup', 'ketchup');
bindTopping('topRelish', 'relish');
bindTopping('topChili', 'chili');

// ───────────────────────── AUDIO ─────────────────────────
let actx = null, muted = false, userGestured = false;
function ensureAudio(){
  if (!userGestured || muted) return null;
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function sfxSplat(intensity){
  const a = ensureAudio();
  if (!a) return;
  const t = a.currentTime;
  const dur = 0.42 + intensity * 0.12;
  const n = Math.floor(a.sampleRate * dur);
  const buf = a.createBuffer(1, n, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++){
    const env = Math.pow(1 - i / n, 1.6);
    d[i] = (Math.random() * 2 - 1) * env;
  }
  const src = a.createBufferSource();
  src.buffer = buf;
  const bp = a.createBiquadFilter();
  bp.type = 'lowpass';
  bp.frequency.value = 360 + intensity * 220;
  bp.Q.value = 0.7;
  const g = a.createGain();
  g.gain.value = 0.35 + intensity * 0.2;
  src.connect(bp); bp.connect(g); g.connect(a.destination);
  src.start(t); src.stop(t + dur + 0.05);
  // sub-thump
  const o = a.createOscillator();
  const og = a.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(160 - intensity * 40, t);
  o.frequency.exponentialRampToValueAtTime(48, t + 0.18);
  og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.18 + intensity * 0.08, t + 0.01);
  og.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(og); og.connect(a.destination);
  o.start(t); o.stop(t + 0.25);
}
function sfxSling(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator();
  const g = a.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(420, t);
  o.frequency.exponentialRampToValueAtTime(180, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.12, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + 0.24);
}
function sfxStretch(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator();
  const g = a.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(200, t);
  o.frequency.linearRampToValueAtTime(310, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.04, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + 0.24);
}
document.getElementById('muteBtn').addEventListener('click', (e) => {
  muted = !muted;
  e.currentTarget.textContent = muted ? '♪ off' : '♪ on';
});

// ───────────────────────── BACKGROUND ─────────────────────────
function drawBackground(){
  bg.clearRect(0, 0, W, H);
  // floor (lower 22%)
  const floorTop = H * 0.78;
  // wall behind (top 78%)
  const wallGrad = bg.createLinearGradient(0, 0, 0, floorTop);
  wallGrad.addColorStop(0, '#fbf6e9');
  wallGrad.addColorStop(0.6, '#f4ecd6');
  wallGrad.addColorStop(1, '#e3d7b8');
  bg.fillStyle = wallGrad;
  bg.fillRect(0, 0, W, floorTop);

  // subtle wall scuffs
  bg.save();
  for (let i = 0; i < 36; i++){
    const x = Math.random() * W;
    const y = Math.random() * floorTop;
    bg.fillStyle = 'rgba(80,50,20,0.04)';
    bg.beginPath();
    bg.ellipse(x, y, 2 + Math.random() * 12, 1 + Math.random() * 4, Math.random() * 6, 0, Math.PI * 2);
    bg.fill();
  }
  bg.restore();

  // wallpaper stripes (very subtle)
  bg.strokeStyle = 'rgba(120, 60, 30, 0.07)';
  bg.lineWidth = 1;
  for (let x = 24; x < W; x += 56){
    bg.beginPath();
    bg.moveTo(x, 0);
    bg.lineTo(x, floorTop);
    bg.stroke();
  }

  // wall shadow / floor moulding
  bg.fillStyle = '#b8a784';
  bg.fillRect(0, floorTop - 3, W, 3);
  bg.fillStyle = '#5a3a14';
  bg.fillRect(0, floorTop, W, 6);

  // checkered floor
  const checkSize = 44;
  for (let y = floorTop + 6; y < H; y += checkSize){
    for (let x = 0; x < W; x += checkSize){
      const r = Math.floor((x / checkSize) + (y / checkSize));
      bg.fillStyle = (r % 2 === 0) ? '#1c1c1c' : '#e8e3d5';
      bg.fillRect(x, y, checkSize + 1, checkSize + 1);
    }
  }

  // chrome diner accent line above floor moulding
  bg.fillStyle = '#cfd6dc';
  bg.fillRect(0, floorTop - 6, W, 1.5);

  // launcher base (slingshot) on left
  drawLauncherBase();

  // wall label "TARGET" upper-right corner
  bg.save();
  bg.font = "bold 11px 'JetBrains Mono', monospace";
  bg.fillStyle = 'rgba(80, 40, 10, 0.22)';
  bg.textAlign = 'right';
  bg.fillText('· DINER WALL · NEWLY PAINTED ·', W - 16, 22);
  bg.restore();
}

function drawLauncherBase(){
  const lx = launcher.x;
  const floor = H * 0.78;
  bg.save();
  // shadow puddle under launcher
  bg.fillStyle = 'rgba(20,10,0,0.28)';
  bg.beginPath();
  bg.ellipse(lx, floor + 2, 38, 8, 0, 0, Math.PI * 2);
  bg.fill();
  // y-fork posts
  bg.strokeStyle = '#3a1f0c';
  bg.lineWidth = 8;
  bg.lineCap = 'round';
  bg.beginPath();
  bg.moveTo(lx, floor);
  bg.lineTo(lx, launcher.y + 8);
  bg.stroke();
  bg.lineWidth = 6;
  bg.beginPath();
  bg.moveTo(lx, launcher.y + 6);
  bg.lineTo(lx - 22, launcher.y - 30);
  bg.moveTo(lx, launcher.y + 6);
  bg.lineTo(lx + 22, launcher.y - 30);
  bg.stroke();
  // wood grain
  bg.strokeStyle = 'rgba(120, 70, 20, 0.4)';
  bg.lineWidth = 1;
  for (let i = 0; i < 5; i++){
    bg.beginPath();
    bg.moveTo(lx - 3 + i, floor - 4);
    bg.lineTo(lx - 3 + i, launcher.y + 8);
    bg.stroke();
  }
  // tip nubs
  bg.fillStyle = '#3a1f0c';
  bg.beginPath(); bg.arc(lx - 22, launcher.y - 30, 4, 0, Math.PI * 2); bg.fill();
  bg.beginPath(); bg.arc(lx + 22, launcher.y - 30, 4, 0, Math.PI * 2); bg.fill();
  bg.restore();
}

// ───────────────────────── PHYSICS ─────────────────────────
const G = 1900;          // px/s²
const AIR_DRAG = 0.992;  // per-frame factor (scaled with dt)
const WALL_X_FRAC = 0;   // entire upper region is "wall"; we use floorTop as ground

const launcher = { x: 140, y: 0, pouchX: 140, pouchY: 0 };
function placeLauncher(){
  launcher.y = H * 0.78 - 90;
  launcher.pouchX = launcher.x;
  launcher.pouchY = launcher.y - 22;
}

let dogs = [];        // active in-flight
let toFlash = null;   // recent splat flash
let nextDog = null;   // the one sitting in the slingshot pouch
let dragging = false;
let dragX = 0, dragY = 0;
const MAX_PULL = 180;

function newDog(){
  return {
    x: launcher.pouchX,
    y: launcher.pouchY,
    vx: 0, vy: 0,
    angle: 0,
    spin: 0,
    age: 0,
    state: 'pouch',   // pouch | flying | stuck | gone
    topping: snapshotTopping(),
    width: 64, height: 22,
  };
}
function snapshotTopping(){
  return {
    mustard: toppings.mustard,
    ketchup: toppings.ketchup,
    relish: toppings.relish,
    chili: toppings.chili,
  };
}

// ───────────────────────── HOTDOG DRAW ─────────────────────────
function drawHotdog(c, dog){
  c.save();
  c.translate(dog.x, dog.y);
  c.rotate(dog.angle);
  const w = dog.width, h = dog.height;
  // bun (lower half)
  c.fillStyle = '#e8b56b';
  roundedRect(c, -w/2, -h/2, w, h, h/2);
  c.fill();
  // bun darker bottom
  c.fillStyle = '#c9923f';
  roundedRect(c, -w/2 + 2, h/2 - 8, w - 4, 6, 3);
  c.fill();
  // bun outline
  c.strokeStyle = '#7c5118';
  c.lineWidth = 1.2;
  roundedRect(c, -w/2, -h/2, w, h, h/2);
  c.stroke();
  // sausage on top (slight peek above bun)
  c.fillStyle = '#c25a3a';
  roundedRect(c, -w/2 + 6, -h/2 - 4, w - 12, h - 4, (h - 4) / 2);
  c.fill();
  // sausage highlight
  c.fillStyle = 'rgba(255, 180, 130, 0.55)';
  roundedRect(c, -w/2 + 10, -h/2 - 2, w - 20, 3, 1.5);
  c.fill();
  // grill marks
  c.strokeStyle = 'rgba(80, 28, 10, 0.6)';
  c.lineWidth = 1.2;
  for (let i = -1; i <= 1; i++){
    c.beginPath();
    c.moveTo(i * (w/4), -h/2 - 4 + 1);
    c.lineTo(i * (w/4) + 3, h/2 - 8 - 1);
    c.stroke();
  }
  // toppings drizzled
  if (dog.topping.mustard){
    c.strokeStyle = '#f5c042';
    c.lineWidth = 3;
    c.lineCap = 'round';
    c.beginPath();
    let prev = -w/2 + 10;
    for (let i = 0; i < 8; i++){
      const x = -w/2 + 10 + i * (w - 20) / 8;
      const y = -h/2 + (i % 2 === 0 ? -1 : -5);
      if (i === 0) c.moveTo(x, y); else c.quadraticCurveTo(prev + 2, y - 4, x, y);
      prev = x;
    }
    c.stroke();
  }
  if (dog.topping.ketchup){
    c.strokeStyle = '#c8261a';
    c.lineWidth = 3;
    c.lineCap = 'round';
    c.beginPath();
    for (let i = 0; i < 8; i++){
      const x = -w/2 + 12 + i * (w - 24) / 8;
      const y = -h/2 + (i % 2 === 0 ? -4 : -2);
      if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
    }
    c.stroke();
  }
  if (dog.topping.relish){
    c.fillStyle = '#6fa54a';
    for (let i = 0; i < 12; i++){
      const x = -w/2 + 10 + (i / 12) * (w - 20) + (Math.random() - 0.5) * 3;
      const y = -h/2 - 3 + (Math.random() - 0.5) * 2;
      c.fillRect(x, y, 2.5, 1.4);
    }
  }
  if (dog.topping.chili){
    c.fillStyle = '#6e2f15';
    for (let i = 0; i < 16; i++){
      const x = -w/2 + 10 + Math.random() * (w - 20);
      const y = -h/2 - 4 + Math.random() * 3;
      c.beginPath();
      c.arc(x, y, 1.4 + Math.random() * 1.4, 0, Math.PI * 2);
      c.fill();
    }
  }
  c.restore();
}

function roundedRect(c, x, y, w, h, r){
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// ───────────────────────── SPLATS ─────────────────────────
const splatLog = []; // { x, y, palette, seed, size, n }
const SPLAT_CAP = 220;

function addSplat(x, y, intensity, topping){
  const palette = [];
  if (topping.mustard) palette.push('#f5c042', '#e8a52a');
  if (topping.ketchup) palette.push('#c8261a', '#9a190e');
  if (topping.relish) palette.push('#6fa54a', '#4a7a2e');
  if (topping.chili) palette.push('#6e2f15', '#a84a22', '#f5c042');
  if (palette.length === 0) palette.push('#c25a3a', '#e8b56b'); // bare dog grease
  const size = 38 + intensity * 110;
  const n = 18 + Math.floor(intensity * 36);
  const seed = Math.floor(Math.random() * 1e6);
  const entry = { x, y, palette, seed, size, n };
  splatLog.push(entry);
  while (splatLog.length > SPLAT_CAP) splatLog.shift();
  paintSplat(sp, entry);
}
function redrawSplats(){
  sp.clearRect(0, 0, W, H);
  for (const s of splatLog) paintSplat(sp, s);
}
function paintSplat(c, s){
  const rnd = mulberry32(s.seed);
  c.save();
  // main central blob
  for (let i = 0; i < 5; i++){
    const ang = rnd() * Math.PI * 2;
    const r = s.size * (0.55 + rnd() * 0.35);
    const ox = Math.cos(ang) * (rnd() - 0.5) * s.size * 0.3;
    const oy = Math.sin(ang) * (rnd() - 0.5) * s.size * 0.3;
    c.fillStyle = s.palette[Math.floor(rnd() * s.palette.length)];
    c.beginPath();
    irregularBlob(c, s.x + ox, s.y + oy, r * 0.55, rnd);
    c.globalAlpha = 0.85;
    c.fill();
  }
  // outer splatter droplets
  c.globalAlpha = 0.92;
  for (let i = 0; i < s.n; i++){
    const ang = rnd() * Math.PI * 2;
    const dist = s.size * (0.4 + rnd() * 1.4);
    const dx = Math.cos(ang) * dist;
    const dy = Math.sin(ang) * dist;
    const r = 2 + rnd() * 7;
    c.fillStyle = s.palette[Math.floor(rnd() * s.palette.length)];
    c.beginPath();
    irregularBlob(c, s.x + dx, s.y + dy, r, rnd);
    c.fill();
  }
  // drips dripping DOWN from main blob
  c.globalAlpha = 0.78;
  const drips = 2 + Math.floor(rnd() * 4);
  for (let i = 0; i < drips; i++){
    const ox = (rnd() - 0.5) * s.size * 0.7;
    const len = 12 + rnd() * 60;
    c.fillStyle = s.palette[Math.floor(rnd() * s.palette.length)];
    c.beginPath();
    c.moveTo(s.x + ox - 3, s.y + s.size * 0.15);
    c.lineTo(s.x + ox + 3, s.y + s.size * 0.15);
    c.lineTo(s.x + ox + 1.8, s.y + s.size * 0.15 + len);
    c.arc(s.x + ox, s.y + s.size * 0.15 + len, 2.5 + rnd() * 2, 0, Math.PI * 2);
    c.lineTo(s.x + ox - 1.8, s.y + s.size * 0.15 + len);
    c.closePath();
    c.fill();
  }
  c.globalAlpha = 1;
  c.restore();
}
function irregularBlob(c, cx, cy, r, rnd){
  const pts = 9 + Math.floor(rnd() * 5);
  c.moveTo(cx + r, cy);
  for (let i = 1; i <= pts; i++){
    const a = (i / pts) * Math.PI * 2;
    const rr = r * (0.7 + rnd() * 0.55);
    c.lineTo(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr);
  }
  c.closePath();
}
function mulberry32(seed){
  return function(){
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ───────────────────────── INPUT ─────────────────────────
function eventXY(e){
  if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches[0]) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
function dist(ax, ay, bx, by){ const dx = ax - bx, dy = ay - by; return Math.sqrt(dx*dx + dy*dy); }

function onDown(e){
  if (e.cancelable) e.preventDefault();
  userGestured = true;
  const p = eventXY(e);
  if (!nextDog || nextDog.state !== 'pouch') return;
  // only start dragging when grabbing near the pouch
  if (dist(p.x, p.y, nextDog.x, nextDog.y) > 110) return;
  dragging = true;
  dragX = p.x; dragY = p.y;
  fadeHint();
  sfxStretch();
}
function onMove(e){
  if (!dragging) return;
  const p = eventXY(e);
  let dx = p.x - launcher.pouchX;
  let dy = p.y - launcher.pouchY;
  const d = Math.sqrt(dx*dx + dy*dy);
  const m = Math.min(d, MAX_PULL);
  if (d > 0){ dx = dx / d * m; dy = dy / d * m; }
  // pull only allowed leftward/downward (behind launcher)
  if (dx > 0) dx = 0;
  if (dy < -MAX_PULL) dy = -MAX_PULL;
  nextDog.x = launcher.pouchX + dx;
  nextDog.y = launcher.pouchY + dy;
  nextDog.angle = Math.atan2(-dy, -dx); // points roughly toward release direction
}
function onUp(e){
  if (!dragging) return;
  dragging = false;
  const dx = nextDog.x - launcher.pouchX;
  const dy = nextDog.y - launcher.pouchY;
  const pull = Math.sqrt(dx*dx + dy*dy);
  if (pull < 8){
    // snap back, no launch
    nextDog.x = launcher.pouchX;
    nextDog.y = launcher.pouchY;
    nextDog.angle = 0;
    return;
  }
  // velocity: opposite of drag vector, scaled by pull
  const power = pull / MAX_PULL; // 0..1
  const launchSpeed = 380 + power * 1480; // px/s
  const a = Math.atan2(-dy, -dx);
  nextDog.vx = Math.cos(a) * launchSpeed;
  nextDog.vy = Math.sin(a) * launchSpeed;
  nextDog.state = 'flying';
  nextDog.spin = (Math.random() - 0.3) * 14;
  dogs.push(nextDog);
  thrownCount++;
  thrownEl.textContent = thrownCount;
  sfxSling();
  // queue next dog in pouch
  nextDog = newDog();
}

window.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
window.addEventListener('touchstart', onDown, { passive: false });
window.addEventListener('touchmove', onMove, { passive: false });
window.addEventListener('touchend', onUp);

document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyM') document.getElementById('muteBtn').click();
  if (e.code === 'KeyR') document.getElementById('wipeBtn').click();
});

let hintFaded = false;
function fadeHint(){
  if (hintFaded) return;
  hintFaded = true;
  setTimeout(() => document.getElementById('hint').classList.add('fade'), 1400);
}

// ───────────────────────── COMBOS ─────────────────────────
let combo = 1;
let comboTimer = 0;
const comboEl = document.getElementById('combo');
const splatsEl = document.getElementById('splats');
const thrownEl = document.getElementById('thrown');
const toastEl = document.getElementById('toast');
let splatCount = 0;
let thrownCount = 0;

function bumpCombo(impactPower){
  combo = Math.min(9, combo + 1);
  comboTimer = 3.2;
  comboEl.textContent = '×' + combo;
  if (combo >= 3){
    const msgs = ['NICE!', 'JUICY!', 'SLOPPY!', 'CHEF\'S KISS!', 'SAUCY!', 'OBLITERATED'];
    showToast(msgs[Math.min(msgs.length - 1, combo - 3)] + ' ×' + combo);
  }
}
function resetCombo(){
  combo = 1;
  comboEl.textContent = '×1';
}
function showToast(text){
  toastEl.textContent = text;
  toastEl.classList.remove('show');
  void toastEl.offsetWidth;
  toastEl.classList.add('show');
}

document.getElementById('wipeBtn').addEventListener('click', () => {
  splatLog.length = 0;
  sp.clearRect(0, 0, W, H);
  splatCount = 0; splatsEl.textContent = '0';
  resetCombo();
  showToast('FRESH PAINT');
});

// ───────────────────────── MAIN LOOP ─────────────────────────
let last = performance.now();
function loop(now){
  const dt = Math.min(0.04, (now - last) / 1000);
  last = now;

  if (comboTimer > 0){
    comboTimer -= dt;
    if (comboTimer <= 0) resetCombo();
  }

  ctx.clearRect(0, 0, W, H);
  const floorTop = H * 0.78;

  // update + draw dogs in flight
  for (let i = dogs.length - 1; i >= 0; i--){
    const d = dogs[i];
    if (d.state !== 'flying'){ dogs.splice(i, 1); continue; }
    d.age += dt;
    // physics
    d.vy += G * dt;
    const dragK = Math.pow(AIR_DRAG, dt * 60);
    d.vx *= dragK;
    d.vy *= dragK;
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    d.angle += d.spin * dt;

    // wall hit (when we cross into the "back wall" plane — we treat ANY area above the floor
    // and away from the launcher zone as wall once the dog is past peak / on descent).
    // To keep it satisfying we splat whenever the dog crosses certain conditions:
    //  - hits the floor → also splat (and the splat snaps to floor level)
    //  - hits a "wall plane" at depth (we treat it 2D as a single back wall — every collision
    //    with floor or arena edge counts as a wall splat)
    let impacted = false;
    let impactX = d.x, impactY = d.y;
    let impactSpeed = Math.sqrt(d.vx*d.vx + d.vy*d.vy);

    if (d.x > W - 10){
      impacted = true;
      impactX = W - 16;
      impactY = d.y;
    } else if (d.x < 14){
      impacted = true;
      impactX = 16; impactY = d.y;
    } else if (d.y < 14){
      impacted = true;
      impactX = d.x; impactY = 16;
    } else if (d.y > floorTop - 8){
      impacted = true;
      impactX = d.x; impactY = floorTop - 4;
    }

    if (impacted){
      const intensity = Math.min(1.6, impactSpeed / 1200 + 0.25);
      addSplat(impactX, impactY, intensity, d.topping);
      sfxSplat(intensity);
      splatCount++;
      splatsEl.textContent = splatCount;
      bumpCombo(intensity);
      // burst particles
      spawnBurst(impactX, impactY, intensity, d.topping);
      dogs.splice(i, 1);
      continue;
    }

    drawHotdog(ctx, d);
  }

  // burst particles
  updateAndDrawBursts(dt);

  // pouch dog (the one currently loaded)
  if (nextDog){
    // sling bands when drawn back
    drawSlingBands(ctx, nextDog);
    // trajectory preview while dragging
    if (dragging){
      const dx = nextDog.x - launcher.pouchX;
      const dy = nextDog.y - launcher.pouchY;
      const pull = Math.sqrt(dx*dx + dy*dy);
      const power = pull / MAX_PULL;
      const speed = 380 + power * 1480;
      const a = Math.atan2(-dy, -dx);
      const vx = Math.cos(a) * speed;
      const vy = Math.sin(a) * speed;
      drawTrajectory(launcher.pouchX, launcher.pouchY, vx, vy);
    }
    drawHotdog(ctx, nextDog);
  }

  requestAnimationFrame(loop);
}

function drawSlingBands(c, dog){
  const lx = launcher.x;
  const ly = launcher.y - 30;
  const leftX = lx - 22, leftY = ly;
  const rightX = lx + 22, rightY = ly;
  c.save();
  c.strokeStyle = '#3a1812';
  c.lineWidth = 4;
  c.lineCap = 'round';
  // left band
  c.beginPath();
  c.moveTo(leftX, leftY);
  c.lineTo(dog.x - 8, dog.y);
  c.stroke();
  // right band passes BEHIND the dog visually — draw last so it sits above
  c.beginPath();
  c.moveTo(rightX, rightY);
  c.lineTo(dog.x + 8, dog.y);
  c.stroke();
  c.restore();
}

function drawTrajectory(x0, y0, vx, vy){
  ctx.save();
  ctx.strokeStyle = 'rgba(245, 192, 66, 0.55)';
  ctx.fillStyle = 'rgba(245, 192, 66, 0.55)';
  let x = x0, y = y0;
  let vxx = vx, vyy = vy;
  const step = 0.04;
  for (let i = 0; i < 26; i++){
    vyy += G * step;
    vxx *= Math.pow(AIR_DRAG, step * 60);
    vyy *= Math.pow(AIR_DRAG, step * 60);
    x += vxx * step;
    y += vyy * step;
    if (y > H * 0.78 || x > W || x < 0 || y < 0) break;
    if (i % 2 === 0){
      ctx.beginPath();
      ctx.arc(x, y, 2.2 - i * 0.04, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

// burst particles after impact
const bursts = [];
function spawnBurst(x, y, intensity, topping){
  const palette = [];
  if (topping.mustard) palette.push('#f5c042');
  if (topping.ketchup) palette.push('#c8261a');
  if (topping.relish) palette.push('#6fa54a');
  if (topping.chili) palette.push('#6e2f15', '#a84a22');
  if (palette.length === 0) palette.push('#c25a3a', '#e8b56b');
  const n = 14 + Math.floor(intensity * 26);
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2;
    const s = 80 + Math.random() * 260 * intensity;
    bursts.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 40,
      r: 2 + Math.random() * 3,
      color: palette[Math.floor(Math.random() * palette.length)],
      life: 0.4 + Math.random() * 0.45,
      age: 0,
    });
  }
}
function updateAndDrawBursts(dt){
  for (let i = bursts.length - 1; i >= 0; i--){
    const p = bursts[i];
    p.age += dt;
    if (p.age >= p.life){ bursts.splice(i, 1); continue; }
    p.vy += G * dt * 0.7;
    p.vx *= 0.985;
    p.vy *= 0.985;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    const k = 1 - p.age / p.life;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = k;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * k, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ───────────────────────── BOOT ─────────────────────────
window.addEventListener('resize', () => {
  fit();
  placeLauncher();
  if (nextDog && nextDog.state === 'pouch'){
    nextDog.x = launcher.pouchX;
    nextDog.y = launcher.pouchY;
  }
});
fit();
placeLauncher();
if (nextDog === null) nextDog = newDog();
nextDog.x = launcher.pouchX;
nextDog.y = launcher.pouchY;
requestAnimationFrame(loop);
</script>
</body>
