<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Cryptogram тАФ Decode Colors into Words</title>
<link rel="icon" href="https://emojicdn.elk.sh/ЁЯОи">
<meta property="og:title" content="Color Cryptogram">
<meta property="og:description" content="Every letter is a color. Crack the code to reveal hidden words and phrases.">
<meta property="og:url" content="https://sloppy.live/color-cryptogram">
<meta property="og:image" content="https://sloppy.live/color-cryptogram/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=DM+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08070e;--card:#110f1a;--border:#1e1c2e;
  --text:#e4e0f0;--muted:#5a5472;--accent:#f472b6;
  --correct:#34d399;--wrong:#ef4444;
}
body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
}
.wrap{max-width:700px;width:100%;padding:16px}
header{text-align:center;padding:16px 0 8px}
header h1{
  font-size:28px;font-weight:800;letter-spacing:3px;
  background:linear-gradient(90deg,#f472b6,#818cf8,#34d399,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
header .sub{font-size:11px;color:var(--muted);font-family:'Syne Mono',monospace;margin-top:4px}

#controls{display:flex;justify-content:center;gap:8px;margin:10px 0;flex-wrap:wrap}
.ctrl-btn{
  padding:6px 14px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:12px;cursor:pointer;transition:all .15s;
}
.ctrl-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(244,114,182,.08)}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}

#info-bar{
  display:flex;justify-content:center;gap:16px;margin:6px 0 14px;
  font-family:'Syne Mono',monospace;font-size:11px;color:var(--muted);
}
#info-bar b{color:var(--text)}

/* Color key reference */
#color-key{
  display:flex;flex-wrap:wrap;justify-content:center;gap:4px;
  margin:0 0 14px;padding:10px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
}
.ck-item{
  display:flex;align-items:center;gap:4px;
  font-family:'Syne Mono',monospace;font-size:12px;color:var(--muted);
  padding:3px 6px;border-radius:4px;transition:all .2s;
}
.ck-item.revealed{color:var(--correct)}
.ck-swatch{width:16px;height:16px;border-radius:3px;border:1px solid rgba(255,255,255,.1)}

/* Puzzle area */
#puzzle{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;
  margin-bottom:16px;
}
.word-group{display:flex;gap:3px;margin:0 6px 6px 0}
.letter-slot{
  width:40px;height:48px;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;gap:2px;position:relative;cursor:pointer;
}
.color-block{
  width:36px;height:28px;border-radius:5px;border:2px solid rgba(255,255,255,.08);
  transition:all .2s;
}
.color-block:hover{transform:scale(1.1);border-color:rgba(255,255,255,.25)}
.letter-input{
  width:36px;height:18px;text-align:center;
  background:transparent;border:none;border-bottom:2px solid var(--border);
  color:var(--text);font-family:'Syne Mono',monospace;font-size:14px;
  font-weight:600;text-transform:uppercase;outline:none;
  caret-color:var(--accent);
}
.letter-input:focus{border-bottom-color:var(--accent)}
.letter-input.correct{color:var(--correct);border-bottom-color:var(--correct)}
.letter-input.wrong{color:var(--wrong);border-bottom-color:var(--wrong);animation:shake .3s}
.letter-slot.space{width:16px;cursor:default}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes solvedPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.letter-input.solved-pop{animation:solvedPop .3s ease}

#msg{
  text-align:center;min-height:24px;font-size:14px;
  font-family:'Syne Mono',monospace;margin-bottom:10px;
}
#msg.win{color:var(--correct)}
#msg.lose{color:var(--wrong)}

#hint-area{display:flex;justify-content:center;gap:8px;margin-bottom:12px}
#hint-btn{
  padding:8px 20px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);color:var(--muted);font-family:'Syne Mono',monospace;
  font-size:12px;cursor:pointer;transition:all .15s;
}
#hint-btn:hover{border-color:var(--accent);color:var(--accent)}
#new-btn{
  padding:8px 20px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);color:var(--muted);font-family:'Syne Mono',monospace;
  font-size:12px;cursor:pointer;transition:all .15s;
}
#new-btn:hover{border-color:var(--correct);color:var(--correct)}

#stats-bar{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px;text-align:center;font-family:'Syne Mono',monospace;
  font-size:11px;color:var(--muted);margin-bottom:10px;
}
#stats-bar b{color:var(--text)}
.bl{text-align:center;padding:6px 0 16px;font-size:10px;opacity:.25}
.bl a{color:var(--muted);text-decoration:none}
/* Colorblind mode */
.color-block{position:relative;overflow:hidden}
.cb-symbol{
  display:none;position:absolute;inset:0;
  font-size:14px;font-weight:800;line-height:28px;text-align:center;
  color:rgba(0,0,0,.55);pointer-events:none;
  font-family:'Syne Mono',monospace;
  text-shadow:0 0 2px rgba(255,255,255,.3);
}
body.colorblind .cb-symbol{display:block}
.ck-swatch{position:relative;overflow:hidden}
.ck-sym{
  display:none;position:absolute;inset:0;
  font-size:9px;font-weight:800;line-height:16px;text-align:center;
  color:rgba(0,0,0,.6);pointer-events:none;
  font-family:'Syne Mono',monospace;
}
body.colorblind .ck-sym{display:block}
body.colorblind #cb-toggle{border-color:var(--correct);color:var(--correct);background:rgba(52,211,153,.08)}
@media(max-width:480px){
  .letter-slot{width:34px;height:42px}
  .color-block{width:30px;height:24px}
  .letter-input{width:30px;font-size:12px}
  header h1{font-size:22px}
  .ck-item{font-size:10px;padding:2px 4px}
  .ck-swatch{width:13px;height:13px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>COLOR CRYPTOGRAM</h1>
    <div class="sub">each color = one letter тАв crack the code</div>
  </header>
  <div id="controls">
    <button class="ctrl-btn active" data-mode="words">Words</button>
    <button class="ctrl-btn" data-mode="phrases">Phrases</button>
    <button class="ctrl-btn" data-mode="quotes">Quotes</button>
    <button class="ctrl-btn" data-mode="pangrams">Pangrams</button>
    <button class="ctrl-btn" id="cb-toggle" title="Colorblind mode">&#9673; A11y</button>
  </div>
  <div id="info-bar">
    <span>Hints: <b id="hint-count">3</b></span>
    <span>Letters: <b id="letter-count">0/0</b></span>
    <span>Streak: <b id="streak-count">0</b></span>
  </div>
  <div id="color-key"></div>
  <div id="puzzle"></div>
  <div id="msg"></div>
  <div id="hint-area">
    <button id="hint-btn">REVEAL HINT</button>
    <button id="new-btn">NEW PUZZLE</button>
  </div>
  <div id="stats-bar">
    Solved: <b id="st-solved">0</b> &nbsp; Attempted: <b id="st-attempted">0</b> &nbsp; Best Streak: <b id="st-best">0</b>
  </div>
</div>
<div class="bl"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
// тФАтФА Puzzle data тФАтФА
const PUZZLE_WORDS=[
  "symphony","midnight","paradise","wanderer","silhouette","labyrinth","whisper","phantom",
  "twilight","horizon","mystique","obsidian","zenith","eclipse","alchemy","sapphire",
  "enigma","glacier","nebula","cascade","ethereal","vortex","mirage","crimson",
  "dynasty","fortress","compass","spectrum","paradox","serpent","thunder","velvet",
  "crystal","phoenix","tempest","mercury","voltage","orchid","cipher","quantum",
  "prism","voyage","aurora","cobalt","dagger","falcon","goblet","harbor",
  "ignite","jungle","kindle","lantern","mosaic","nectar","oracle","puzzle",
  "riddle","shadow","trophy","unique","virtue","winter","xyloid","zodiac",
  "anchor","beacon","bronze","chapel","desert","exotic","frozen","gentle",
  "hollow","island","justice","legend","marble","nature","oxygen","pirate",
  "quartz","rescue","silver","temple","uplift","viking","wander","yellow"
];

const PUZZLE_PHRASES=[
  "break the ice","bite the dust","piece of cake","hit the road","under the sun",
  "once in a blue moon","back to square one","think outside the box",
  "burning the midnight oil","heart of gold","cold shoulder","silver lining",
  "brave new world","wild at heart","lost in thought","time will tell",
  "sharp as a tack","clear as crystal","free as a bird","light the way",
  "chase the dream","walk the line","ride the wave","find your voice",
  "break new ground","turn the page","hold your ground","play it cool",
  "take the leap","start from scratch","eye of the storm","against all odds",
  "forge ahead","shoot for the stars","night and day","rise and shine",
  "paint the town","cross the bridge","feel the rhythm","spark of genius"
];

const PUZZLE_QUOTES=[
  "the only way out is through","fortune favors the bold",
  "still waters run deep","knowledge is power",
  "actions speak louder than words","every cloud has a silver lining",
  "time heals all wounds","the pen is mightier than the sword",
  "where there is a will there is a way","all that glitters is not gold",
  "life is what happens when you are busy making plans",
  "be the change you wish to see","to thine own self be true",
  "not all who wander are lost","in the middle of difficulty lies opportunity",
  "the best is yet to come","what you seek is seeking you",
  "do or do not there is no try","stars cannot shine without darkness",
  "the journey of a thousand miles begins with a single step"
];

const PUZZLE_PANGRAMS=[
  "the quick brown fox jumps over a lazy dog",
  "pack my box with five dozen liquor jugs",
  "how vexingly quick daft zebras jump",
  "the five boxing wizards jump quickly",
  "bright vixens jump dozy fowl quack",
  "sphinx of black quartz judge my vow",
  "two driven jocks help fax my big quiz",
  "the jay pig fox zebra and my wolves quack",
  "quick zephyrs blow vexing daft jim",
  "waltz bad nymph for quick jigs vex",
  "glib jocks quiz nymph to vex dwarf",
  "my faxed joke won a pager in the cable tv quiz show",
  "few quips galvanized the mock jury box",
  "the quick brown fox jumped over the lazy sleeping dog",
  "six big juicy steaks sizzled in a pan as five workmen left the quarry",
  "crazy frederick bought many very exquisite opal jewels",
  "we promptly judged antique ivory buckles for the next prize",
  "a quivering texas zombie fought republic jeep kamikazes by wielding nun chucks",
  "grumpy wizards make toxic brew for the jovial queen",
  "jived fox nymph grabs quick waltz",
  "cozy sphinx waves quart jug of bad milk",
  "a large fawn jumped quickly over white zinc boxes",
  "sixty zippers were quickly picked from the woven jute bag",
  "big fjords vex quick waltz nymph",
  "vexed nymphs go for quick waltz job",
  "jumpy halfback frozen quarterback vexed girl with size",
  "exquisite farm wench gives body jolt to prize stinker",
  "back in june we delivered oxygen equipment of the same size"
];

const PUZZLES={words:PUZZLE_WORDS,phrases:PUZZLE_PHRASES,quotes:PUZZLE_QUOTES,pangrams:PUZZLE_PANGRAMS};

// тФАтФА Color generation тАФ distinct, vivid colors тФАтФА
function generateColors(count){
  const colors=[];
  const goldenAngle=137.508;
  const startHue=Math.random()*360;
  for(let i=0;i<count;i++){
    const hue=(startHue+i*goldenAngle)%360;
    const sat=65+Math.random()*20;
    const lit=50+Math.random()*15;
    colors.push(`hsl(${hue.toFixed(0)},${sat.toFixed(0)}%,${lit.toFixed(0)}%)`);
  }
  return colors;
}

// тФАтФА Colorblind symbols тАФ 26 visually distinct glyphs тФАтФА
const CB_SYMBOLS=[
  'тЧЖ','тЦ▓','тЧП','тЦа','тШЕ','тЧЗ','тЦ│','тЧЛ','тЦб','тШЖ',
  'тЩж','тЩа','тЩг','тЩе','тмЯ','тмб','тКХ','тКЧ','тКЮ','тКа',
  'тЦ╝','тЧА','тЦ╢','тме','тПг','тОФ'
];
let symbolMap={};
let colorblindOn=false;

// тФАтФА State тФАтФА
let mode='words', puzzle='', colorMap={}, reverseMap={};
let hintsLeft=3, solved=false, guessedLetters={}, keyOrder=[];
let stats={solved:0,attempted:0,bestStreak:0,streak:0};

function loadStats(){try{const s=JSON.parse(localStorage.getItem('color_crypto_stats'));if(s)stats=s}catch(e){}}
function saveStats(){localStorage.setItem('color_crypto_stats',JSON.stringify(stats))}

// тФАтФА Build puzzle тФАтФА
function newPuzzle(){
  const list=PUZZLES[mode];
  puzzle=list[Math.floor(Math.random()*list.length)].toLowerCase();

  // Get unique letters
  const uniqueLetters=[...new Set(puzzle.replace(/[^a-z]/g,'').split(''))].sort();
  const colors=generateColors(uniqueLetters.length);

  colorMap={};reverseMap={};guessedLetters={};symbolMap={};
  // Shuffle symbols for this puzzle
  const shuffledSymbols=[...CB_SYMBOLS].sort(()=>Math.random()-.5);
  uniqueLetters.forEach((l,i)=>{
    colorMap[l]=colors[i];
    reverseMap[colors[i]]=l;
    symbolMap[l]=shuffledSymbols[i%shuffledSymbols.length];
  });

  // Shuffled order for the color key legend
  keyOrder=[...Object.keys(colorMap)].sort(()=>Math.random()-.5);

  hintsLeft=mode==='pangrams'?5:3;solved=false;
  document.getElementById('msg').textContent='';
  document.getElementById('msg').className='';

  buildColorKey();
  buildPuzzleGrid();
  updateInfo();
}

function buildColorKey(){
  const key=document.getElementById('color-key');
  key.innerHTML='';
  keyOrder.forEach(l=>{
    const item=document.createElement('div');
    item.className='ck-item';
    if(guessedLetters[l]) item.classList.add('revealed');
    const swatch=document.createElement('div');
    swatch.className='ck-swatch';
    swatch.style.background=colorMap[l];
    const sym=document.createElement('span');
    sym.className='ck-sym';
    sym.textContent=symbolMap[l]||'';
    swatch.appendChild(sym);
    item.appendChild(swatch);
    const label=document.createElement('span');
    label.textContent=guessedLetters[l]?l.toUpperCase():'?';
    item.appendChild(label);
    key.appendChild(item);
  });
}

function buildPuzzleGrid(){
  const container=document.getElementById('puzzle');
  container.innerHTML='';

  // Split by spaces for word groups
  const words=puzzle.split(' ');
  let globalIdx=0;

  words.forEach((word,wi)=>{
    const group=document.createElement('div');
    group.className='word-group';

    for(let ci=0;ci<word.length;ci++){
      const ch=word[ci];
      const slot=document.createElement('div');
      slot.className='letter-slot';

      if(/[a-z]/.test(ch)){
        const block=document.createElement('div');
        block.className='color-block';
        block.style.background=colorMap[ch];
        block.title='Click to focus';
        const cbSym=document.createElement('span');
        cbSym.className='cb-symbol';
        cbSym.textContent=symbolMap[ch]||'';
        block.appendChild(cbSym);
        slot.appendChild(block);

        const input=document.createElement('input');
        input.className='letter-input';
        input.maxLength=1;
        input.dataset.letter=ch;
        input.dataset.idx=globalIdx;

        if(guessedLetters[ch]){
          input.value=ch;
          input.classList.add('correct');
          input.readOnly=true;
        }

        input.addEventListener('input',handleInput);
        input.addEventListener('keydown',handleNav);

        block.addEventListener('click',()=>input.focus());
        slot.appendChild(input);
      } else {
        // punctuation тАФ show as-is
        slot.classList.add('space');
        const span=document.createElement('span');
        span.style.cssText='font-size:16px;color:var(--muted)';
        span.textContent=ch;
        slot.appendChild(span);
      }

      group.appendChild(slot);
      globalIdx++;
    }

    container.appendChild(group);

    // Add space gap between words
    if(wi<words.length-1) globalIdx++; // account for space
  });
}

function handleInput(e){
  if(solved) return;
  const input=e.target;
  const val=input.value.toLowerCase();
  const correctLetter=input.dataset.letter;

  if(!val||!/[a-z]/.test(val)){
    input.value='';
    input.classList.remove('correct','wrong');
    return;
  }

  input.value=val;

  if(val===correctLetter){
    // Correct! Fill ALL instances of this letter
    guessedLetters[correctLetter]=true;
    fillAllInstances(correctLetter);
    buildColorKey();
    checkWin();
  } else {
    input.classList.remove('correct');
    input.classList.add('wrong');
    // Clear wrong after brief flash
    setTimeout(()=>{
      input.value='';
      input.classList.remove('wrong');
    },600);
  }

  updateInfo();
}

function handleNav(e){
  if(solved) return;
  const inputs=[...document.querySelectorAll('.letter-input:not([readonly])')];
  const idx=inputs.indexOf(e.target);

  if(e.key==='ArrowRight'||e.key==='Tab'&&!e.shiftKey){
    e.preventDefault();
    if(idx<inputs.length-1) inputs[idx+1].focus();
  } else if(e.key==='ArrowLeft'||(e.key==='Tab'&&e.shiftKey)){
    e.preventDefault();
    if(idx>0) inputs[idx-1].focus();
  } else if(e.key==='Backspace'&&!e.target.value){
    e.preventDefault();
    if(idx>0) inputs[idx-1].focus();
  }
}

function fillAllInstances(letter){
  document.querySelectorAll('.letter-input').forEach(input=>{
    if(input.dataset.letter===letter){
      input.value=letter;
      input.classList.remove('wrong');
      input.classList.add('correct','solved-pop');
      input.readOnly=true;
    }
  });
}

function checkWin(){
  const uniqueLetters=Object.keys(colorMap);
  const allGuessed=uniqueLetters.every(l=>guessedLetters[l]);
  if(allGuessed){
    solved=true;
    const msg=document.getElementById('msg');
    msg.textContent='ЁЯОи Decoded! "'+puzzle+'"';
    msg.className='win';
    stats.solved++;stats.streak++;
    if(stats.streak>stats.bestStreak) stats.bestStreak=stats.streak;
    saveStats();renderStats();
  }
}

function revealHint(){
  if(solved||hintsLeft<=0) return;
  const unrevealed=Object.keys(colorMap).filter(l=>!guessedLetters[l]);
  if(unrevealed.length===0) return;

  const letter=unrevealed[Math.floor(Math.random()*unrevealed.length)];
  guessedLetters[letter]=true;
  hintsLeft--;
  fillAllInstances(letter);
  buildColorKey();
  updateInfo();
  checkWin();
}

function updateInfo(){
  const total=Object.keys(colorMap).length;
  const found=Object.keys(guessedLetters).length;
  document.getElementById('hint-count').textContent=hintsLeft;
  document.getElementById('letter-count').textContent=found+'/'+total;
  document.getElementById('streak-count').textContent=stats.streak;
}

function renderStats(){
  loadStats();
  document.getElementById('st-solved').textContent=stats.solved;
  document.getElementById('st-attempted').textContent=stats.attempted;
  document.getElementById('st-best').textContent=stats.bestStreak;
}

// тФАтФА Event listeners тФАтФА
document.querySelectorAll('.ctrl-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.ctrl-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    mode=btn.dataset.mode;
    stats.attempted++;saveStats();renderStats();
    newPuzzle();
  });
});

document.getElementById('cb-toggle').addEventListener('click',()=>{
  colorblindOn=!colorblindOn;
  document.body.classList.toggle('colorblind',colorblindOn);
  localStorage.setItem('color_crypto_cb',colorblindOn?'1':'0');
});
// Restore colorblind pref
if(localStorage.getItem('color_crypto_cb')==='1'){
  colorblindOn=true;
  document.body.classList.add('colorblind');
}

document.getElementById('hint-btn').addEventListener('click',revealHint);
document.getElementById('new-btn').addEventListener('click',()=>{
  stats.attempted++;stats.streak=0;saveStats();renderStats();
  newPuzzle();
});

// тФАтФА Init тФАтФА
loadStats();
stats.attempted++;saveStats();
newPuzzle();
renderStats();
</script>
</body>
</html>
