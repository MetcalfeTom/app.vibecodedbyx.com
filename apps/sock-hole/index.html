<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Sock Hole</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧦" />
<meta name="description" content="Catch falling socks before they hit the floor. Don't let laundry day win." />
<meta property="og:title" content="Sock Hole" />
<meta property="og:description" content="Catch falling socks before they hit the floor. Don't let laundry day win." />
<meta property="og:url" content="https://sloppy.live/sock-hole" />
<meta property="og:image" content="https://sloppy.live/screenshots/sock-hole.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Azeret+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
:root{--bg:#1a1028;--surface:#241838;--border:#3a2858;--dim:#786898;--text:#e8daf8;--accent:#ff6b9d;--good:#6bffa0;--warn:#ffd86b}
*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none}
*::-webkit-scrollbar{display:none}
html,body{height:100vh;background:var(--bg);color:var(--text);font-family:'Azeret Mono',monospace;user-select:none;overflow:hidden;position:fixed;width:100%;touch-action:none}
body{display:flex;flex-direction:column;align-items:center}

header{width:100%;max-width:500px;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
header h1{font-family:'Lilita One',cursive;font-size:24px;color:var(--accent);letter-spacing:0.03em}
header a{color:var(--dim);font-size:10px;text-decoration:none;letter-spacing:0.08em}

.hud{width:100%;max-width:500px;display:flex;justify-content:space-around;padding:8px 16px;font-size:12px;color:var(--dim);letter-spacing:0.06em;flex-shrink:0;z-index:10}
.hud .val{color:var(--text);font-weight:600}

.game-wrap{flex:1;width:100%;max-width:500px;position:relative;min-height:0}
canvas{width:100%;height:100%;display:block}

.overlay{position:absolute;inset:0;background:rgba(26,16,40,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;gap:16px;padding:20px}
.overlay.hidden{display:none}
.overlay h2{font-family:'Lilita One',cursive;font-size:clamp(28px,6vw,42px);color:var(--accent);text-align:center}
.overlay p{font-size:13px;color:var(--dim);text-align:center;line-height:1.6;max-width:300px}
.overlay .score-big{font-family:'Lilita One',cursive;font-size:48px;color:var(--warn)}
.overlay .best{font-size:12px;color:var(--dim)}
.btn{font-family:'Lilita One',cursive;font-size:18px;padding:12px 36px;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;letter-spacing:0.04em;transition:transform .1s}
.btn:active{transform:scale(0.95)}

.lives{display:flex;gap:6px;justify-content:center}
.lives span{font-size:18px;transition:opacity .3s}
.lives span.lost{opacity:0.2}
</style>
</head>
<body>

<header>
  <h1>Sock Hole</h1>
</header>

<div class="hud">
  <div>Score <span class="val" id="hScore">0</span></div>
  <div>Wave <span class="val" id="hWave">1</span></div>
  <div id="hLives" class="lives">
    <span>🧦</span><span>🧦</span><span>🧦</span>
  </div>
</div>

<div class="game-wrap" id="gameWrap">
  <canvas id="c"></canvas>

  <div class="overlay" id="startScreen">
    <h2>Sock Hole</h2>
    <p>Catch the falling socks in your laundry basket.<br/>Move with mouse, touch, or arrow keys.<br/>Don't let them hit the floor!</p>
    <button class="btn" id="startBtn">START</button>
    <div class="best" id="startBest"></div>
  </div>

  <div class="overlay hidden" id="overScreen">
    <h2>Laundry Day Over</h2>
    <div class="score-big" id="finalScore">0</div>
    <p id="overMsg">You dropped too many socks.</p>
    <button class="btn" id="retryBtn">TRY AGAIN</button>
    <div class="best" id="overBest"></div>
  </div>
</div>

<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const gameWrap = document.getElementById('gameWrap');
const startScreen = document.getElementById('startScreen');
const overScreen = document.getElementById('overScreen');
const hScore = document.getElementById('hScore');
const hWave = document.getElementById('hWave');
const hLives = document.getElementById('hLives');

// Audio
let actx;
function au(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sfx(freq, dur, type, vol){
  try{
    const c=au(); if(c.state==='suspended')c.resume();
    const o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine';
    o.frequency.setValueAtTime(freq,c.currentTime);
    g.gain.setValueAtTime(vol||0.04,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.connect(g).connect(c.destination);
    o.start();o.stop(c.currentTime+dur);
  }catch(e){}
}
function catchSfx(){ sfx(600,0.08,'sine',0.05); sfx(900,0.06,'triangle',0.03); }
function missSfx(){ sfx(150,0.2,'sawtooth',0.06); }
function bonusSfx(){ sfx(800,0.05,'sine',0.04); sfx(1000,0.05,'sine',0.03); sfx(1200,0.08,'sine',0.04); }
function gameOverSfx(){ sfx(300,0.15,'sawtooth',0.05); sfx(200,0.2,'sawtooth',0.04); sfx(100,0.3,'sawtooth',0.05); }

// Sock types
const SOCKS = [
  { emoji:'🧦', color:'#ff6b9d', name:'Red Sock', pts:1 },
  { emoji:'🧦', color:'#6bffa0', name:'Green Sock', pts:1 },
  { emoji:'🧦', color:'#6bb8ff', name:'Blue Sock', pts:1 },
  { emoji:'🧦', color:'#ffd86b', name:'Gold Sock', pts:2 },
  { emoji:'🧦', color:'#ff9d6b', name:'Orange Sock', pts:1 },
  { emoji:'🧦', color:'#d86bff', name:'Purple Sock', pts:1 },
  { emoji:'🧦', color:'#ffffff', name:'White Sock', pts:1 },
  { emoji:'👟', color:'#ff4444', name:'Sneaker', pts:0, isBad:true },
];

// Bonus items (rare)
const BONUS_ITEMS = [
  { emoji:'👑', color:'#ffd700', name:'Crown', pts:5 },
  { emoji:'⭐', color:'#ffee00', name:'Star', pts:3 },
  { emoji:'💎', color:'#00eeff', name:'Diamond', pts:10 },
];

const state = {
  phase:'idle', // idle, playing, over
  score:0, lives:3, maxLives:3,
  wave:1, socksCaught:0, socksForWave:10,
  basket:{ x:0, y:0, w:70, h:40 },
  socks:[], particles:[],
  spawnTimer:0, spawnInterval:60,
  baseSpeed:1.5, speedMult:1,
  comboCount:0, comboTimer:0,
};

let W, H, animId;
let mouseX = -1;
let keys = {};

function resize(){
  const r = gameWrap.getBoundingClientRect();
  W = canvas.width = Math.floor(r.width * devicePixelRatio);
  H = canvas.height = Math.floor(r.height * devicePixelRatio);
  canvas.style.width = r.width+'px';
  canvas.style.height = r.height+'px';
  state.basket.y = H - 60;
  state.basket.w = Math.min(80, W*0.18);
  state.basket.h = 36;
  if(mouseX < 0) mouseX = W/2;
}
window.addEventListener('resize', resize);
resize();

// Input
function getX(e){
  const r = canvas.getBoundingClientRect();
  const sx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  return sx * (W / r.width);
}
canvas.addEventListener('mousemove', e=>{ if(state.phase==='playing') mouseX = getX(e); });
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); if(state.phase==='playing') mouseX = getX(e); }, {passive:false});
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); if(state.phase==='playing') mouseX = getX(e); }, {passive:false});
window.addEventListener('keydown', e=>{ keys[e.key]=true; });
window.addEventListener('keyup', e=>{ keys[e.key]=false; });

// Best score
function getBest(){ return parseInt(localStorage.getItem('sockhole_best'))||0; }
function setBest(s){ if(s>getBest()) localStorage.setItem('sockhole_best', s); }

function showBest(){
  const b = getBest();
  const t = b ? `Best: ${b}` : '';
  document.getElementById('startBest').textContent = t;
  document.getElementById('overBest').textContent = t;
}

// Spawn sock
function spawnSock(){
  const wave = state.wave;
  // Chance of bad item increases with wave
  let pool;
  const r = Math.random();
  if(r < 0.03 && wave >= 3){
    // Rare bonus
    const bi = BONUS_ITEMS[Math.floor(Math.random()*BONUS_ITEMS.length)];
    pool = bi;
  } else if(r < 0.08 + wave*0.02){
    // Bad item (sneaker)
    pool = SOCKS[SOCKS.length-1];
  } else {
    pool = SOCKS[Math.floor(Math.random()*(SOCKS.length-1))];
  }

  const size = 28 + Math.random()*8;
  const x = size + Math.random()*(W - size*2);
  const speed = (state.baseSpeed + Math.random()*0.8) * state.speedMult;
  // Some socks wobble
  const wobble = Math.random() < 0.3 ? (1 + Math.random()*2) : 0;

  state.socks.push({
    x, y: -size,
    size, speed, wobble,
    wobblePhase: Math.random()*Math.PI*2,
    ...pool,
    rotation: (Math.random()-0.5)*0.5,
    rotSpeed: (Math.random()-0.5)*0.03,
  });
}

// Particles
function spawnParticles(x, y, color, count){
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 1 + Math.random()*3;
    state.particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 2,
      life: 1,
      decay: 0.02 + Math.random()*0.02,
      size: 2 + Math.random()*4,
      color,
    });
  }
}

function updateLivesUI(){
  const spans = hLives.querySelectorAll('span');
  spans.forEach((s,i)=>{
    s.classList.toggle('lost', i >= state.lives);
  });
}

function startGame(){
  state.phase = 'playing';
  state.score = 0; state.lives = state.maxLives;
  state.wave = 1; state.socksCaught = 0; state.socksForWave = 10;
  state.socks = []; state.particles = [];
  state.spawnTimer = 0; state.spawnInterval = 55;
  state.baseSpeed = 1.5; state.speedMult = 1;
  state.comboCount = 0; state.comboTimer = 0;
  mouseX = W/2;
  hScore.textContent = '0';
  hWave.textContent = '1';
  updateLivesUI();
  startScreen.classList.add('hidden');
  overScreen.classList.add('hidden');
  if(!animId) loop();
}

function nextWave(){
  state.wave++;
  state.socksCaught = 0;
  state.socksForWave = 10 + state.wave * 2;
  state.spawnInterval = Math.max(15, 55 - state.wave * 3);
  state.speedMult = 1 + state.wave * 0.12;
  hWave.textContent = state.wave;
  // Flash wave text
  bonusSfx();
}

function gameOver(){
  state.phase = 'over';
  setBest(state.score);
  document.getElementById('finalScore').textContent = state.score;
  const msgs = [
    "The washing machine wins this round.",
    "Your socks are all over the floor.",
    "Laundry day has defeated you.",
    "The dryer ate your dignity.",
    "Somewhere, a sock is crying.",
    "You'll never find the matching pair.",
  ];
  document.getElementById('overMsg').textContent = msgs[Math.floor(Math.random()*msgs.length)];
  overScreen.classList.remove('hidden');
  showBest();
  gameOverSfx();
}

// Main loop
function update(){
  const b = state.basket;

  // Keyboard movement
  const moveSpeed = 8;
  if(keys['ArrowLeft']||keys['a']) mouseX -= moveSpeed;
  if(keys['ArrowRight']||keys['d']) mouseX += moveSpeed;
  mouseX = Math.max(b.w/2, Math.min(W-b.w/2, mouseX));

  // Smooth basket follow
  b.x += (mouseX - b.x) * 0.18;

  // Combo timer
  if(state.comboTimer > 0) state.comboTimer--;
  if(state.comboTimer <= 0) state.comboCount = 0;

  // Spawn
  state.spawnTimer++;
  if(state.spawnTimer >= state.spawnInterval){
    state.spawnTimer = 0;
    spawnSock();
  }

  // Update socks
  for(let i=state.socks.length-1; i>=0; i--){
    const s = state.socks[i];
    s.y += s.speed;
    s.rotation += s.rotSpeed;
    if(s.wobble) s.x += Math.sin(s.wobblePhase + s.y*0.02) * s.wobble;

    // Check catch
    const dx = Math.abs(s.x - b.x);
    const dy = s.y - b.y;
    if(dy > -10 && dy < b.h && dx < (b.w/2 + s.size/2)){
      state.socks.splice(i,1);
      if(s.isBad){
        // Caught a bad item — lose a life
        state.lives--;
        updateLivesUI();
        missSfx();
        spawnParticles(s.x, s.y, '#ff4444', 8);
        if(state.lives <= 0){ gameOver(); return; }
      } else {
        // Good catch
        state.comboCount++;
        state.comboTimer = 90; // 1.5s combo window
        const comboMult = Math.min(state.comboCount, 5);
        const pts = s.pts * comboMult;
        state.score += pts;
        state.socksCaught++;
        hScore.textContent = state.score;
        catchSfx();
        spawnParticles(s.x, s.y, s.color, 6);

        // Wave progression
        if(state.socksCaught >= state.socksForWave) nextWave();
      }
      continue;
    }

    // Missed — fell off bottom
    if(s.y > H + s.size){
      state.socks.splice(i,1);
      if(!s.isBad){
        state.lives--;
        updateLivesUI();
        missSfx();
        if(state.lives <= 0){ gameOver(); return; }
      }
      // Bad items falling off is fine
    }
  }

  // Particles
  for(let i=state.particles.length-1; i>=0; i--){
    const p = state.particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life -= p.decay;
    if(p.life <= 0) state.particles.splice(i,1);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // Background — subtle gradient
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a1028');
  bg.addColorStop(1,'#120a1e');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Floor line
  const floorY = H - 18;
  ctx.strokeStyle = 'rgba(120,104,152,0.3)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8,6]);
  ctx.beginPath(); ctx.moveTo(0,floorY); ctx.lineTo(W,floorY); ctx.stroke();
  ctx.setLineDash([]);

  // Socks
  const fontSize = 28;
  ctx.font = `${fontSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for(const s of state.socks){
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rotation);
    // Color tint behind emoji
    ctx.fillStyle = s.color + '30';
    ctx.beginPath();
    ctx.arc(0, 0, s.size*0.6, 0, Math.PI*2);
    ctx.fill();
    // Emoji
    ctx.fillText(s.emoji, 0, 2);
    // Bad item warning
    if(s.isBad){
      ctx.fillStyle = '#ff4444';
      ctx.font = '10px "Azeret Mono"';
      ctx.fillText('✕', 0, -18);
      ctx.font = `${fontSize}px serif`;
    }
    ctx.restore();
  }

  // Basket
  const b = state.basket;
  const bx = b.x - b.w/2;
  const by = b.y;

  // Basket glow
  ctx.shadowColor = 'rgba(255,107,157,0.4)';
  ctx.shadowBlur = 15;

  // Basket body
  ctx.fillStyle = '#3a2050';
  ctx.strokeStyle = '#ff6b9d';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  // Trapezoid basket shape
  const inset = 6;
  ctx.moveTo(bx + inset, by);
  ctx.lineTo(bx + b.w - inset, by);
  ctx.lineTo(bx + b.w + 4, by + b.h);
  ctx.lineTo(bx - 4, by + b.h);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Basket rim
  ctx.fillStyle = '#ff6b9d';
  ctx.fillRect(bx - 2, by - 3, b.w + 4, 5);

  // Basket grid lines
  ctx.strokeStyle = 'rgba(255,107,157,0.25)';
  ctx.lineWidth = 1;
  for(let i=1;i<4;i++){
    const lx = bx + (b.w/4)*i;
    ctx.beginPath(); ctx.moveTo(lx, by+2); ctx.lineTo(lx, by+b.h-2); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(bx+2, by+b.h/2); ctx.lineTo(bx+b.w-2, by+b.h/2); ctx.stroke();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // Combo display
  if(state.comboCount > 1){
    ctx.font = 'bold 16px "Lilita One"';
    ctx.fillStyle = state.comboCount >= 5 ? '#ffd700' : state.comboCount >= 3 ? '#ff6b9d' : '#6bffa0';
    ctx.globalAlpha = Math.min(1, state.comboTimer / 30);
    ctx.fillText(`${state.comboCount}x COMBO`, b.x, by - 20);
    ctx.globalAlpha = 1;
  }

  // Particles
  for(const p of state.particles){
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Wave progress bar
  if(state.phase === 'playing'){
    const prog = state.socksCaught / state.socksForWave;
    const barW = W * 0.6;
    const barH = 4;
    const barX = (W - barW)/2;
    const barY = 6;
    ctx.fillStyle = 'rgba(120,104,152,0.2)';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = '#ff6b9d';
    ctx.fillRect(barX, barY, barW * prog, barH);
  }
}

function loop(){
  if(state.phase === 'playing'){
    update();
    draw();
  }
  animId = requestAnimationFrame(loop);
}

// Events
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);

showBest();

// Draw idle background
draw();

})();
</script>
</body>
</html>
