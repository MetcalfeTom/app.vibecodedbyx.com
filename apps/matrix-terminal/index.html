<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Matrix Terminal</title>
<meta name="description" content="Neon-green code rain with a real interactive hacker terminal. Type help to begin." />
<meta property="og:title" content="Matrix Terminal" />
<meta property="og:description" content="Neon-green code rain with a real interactive hacker terminal. Type help to begin." />
<meta property="og:image" content="https://image.pollinations.ai/prompt/dark%20room%20glowing%20green%20matrix%20code%20rain%20behind%20a%20vintage%20crt%20terminal%20with%20command%20prompt%20cinematic%20cyberpunk?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%9F%A2" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#000;
    --green:#00ff66;
    --green-dim:#0a8a3e;
    --green-bright:#d2ffe6;
    --amber:#ffb86b;
    --red:#ff3344;
    --blue:#5fc0e0;
    --line:rgba(0,255,102,0.18);
    --term-bg:rgba(0,8,4,0.78);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{
    height:100%; width:100%;
    background:#000;
    color:var(--green);
    font-family:'VT323', 'JetBrains Mono', monospace;
    overflow:hidden;
    cursor: default;
  }

  /* fullscreen rain canvas */
  #rain{
    position:fixed; inset:0; z-index:0;
    display:block;
  }

  /* CRT overlay: scanlines + vignette + slight bend */
  .crt-fx{
    position:fixed; inset:0; z-index:5;
    pointer-events:none;
  }
  .crt-fx::before{
    content:""; position:absolute; inset:0;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }
  .crt-fx::after{
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
  }
  .flicker{
    position:fixed; inset:0; z-index:6; pointer-events:none;
    background:rgba(0,255,102,0.025);
    mix-blend-mode:screen;
    animation:flicker 4.6s steps(2) infinite;
  }
  @keyframes flicker{
    0%, 95%, 100%{ opacity:0.6; }
    96%{ opacity:0.2; }
    97%{ opacity:0.85; }
    98%{ opacity:0.45; }
  }

  /* Terminal panel */
  .term{
    position:fixed; z-index:10;
    left:50%; top:50%; transform:translate(-50%, -50%);
    width:min(820px, 94vw);
    height:min(640px, 86vh);
    display:flex; flex-direction:column;
    background:var(--term-bg);
    border:1px solid var(--green);
    border-radius:6px;
    box-shadow:
      0 0 0 1px rgba(0,255,102,0.16),
      0 0 32px rgba(0,255,102,0.18),
      0 0 80px rgba(0,255,102,0.10),
      inset 0 0 60px rgba(0,255,102,0.05);
    backdrop-filter:blur(2px);
    overflow:hidden;
  }
  .term-head{
    display:flex; align-items:center;
    padding:8px 14px;
    border-bottom:1px solid var(--line);
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--green-dim);
    letter-spacing:0.12em;
    text-transform:uppercase;
    background:linear-gradient(180deg, rgba(0,255,102,0.06), transparent);
    user-select:none;
  }
  .term-head .dots{
    display:flex; gap:6px; margin-right:14px;
  }
  .term-head .dot{
    width:9px; height:9px; border-radius:50%;
    background:#1a1a1a;
    border:1px solid var(--green-dim);
  }
  .term-head .dot.r{ border-color:#7a2222; }
  .term-head .dot.y{ border-color:#7a6622; }
  .term-head .dot.g{ border-color:var(--green-dim); }
  .term-head .title{ flex:1; }
  .term-head .meta{
    color:var(--green);
    font-size:10px;
    text-shadow:0 0 4px rgba(0,255,102,0.6);
  }
  .term-head .meta .pulse{
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background:var(--green);
    box-shadow:0 0 6px var(--green);
    margin-right:4px; vertical-align:middle;
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.4; transform:scale(0.7); }
  }

  .term-body{
    flex:1;
    padding:14px 18px 6px;
    overflow-y:auto;
    font-family:'VT323', monospace;
    font-size:18px;
    line-height:1.25;
    color:var(--green);
    text-shadow:0 0 4px rgba(0,255,102,0.55);
    scrollbar-width:thin;
    scrollbar-color:var(--green-dim) transparent;
  }
  .term-body::-webkit-scrollbar{ width:8px; }
  .term-body::-webkit-scrollbar-thumb{ background:var(--green-dim); border-radius:4px; }
  .term-body::-webkit-scrollbar-track{ background:transparent; }

  .line{ white-space:pre-wrap; word-break:break-word; }
  .line.cmd .prompt{ color:var(--green-bright); margin-right:6px; }
  .line.cmd .input{ color:var(--green-bright); }
  .line.sys{ color:var(--green-dim); }
  .line.warn{ color:var(--amber); text-shadow:0 0 4px rgba(255,184,107,0.5); }
  .line.err{ color:var(--red); text-shadow:0 0 4px rgba(255,51,68,0.5); }
  .line.hi{ color:var(--green-bright); text-shadow:0 0 6px rgba(0,255,102,0.7); }
  .line.dim{ color:var(--green-dim); }
  .line.ascii{ font-family:'JetBrains Mono', monospace; font-size:11px; line-height:1.2; color:var(--green); white-space:pre; }
  .line.ghost{ color:var(--green-bright); font-style:italic; opacity:0.85; }

  .bar{
    display:inline-block;
    background:rgba(0,255,102,0.16);
    color:var(--green-bright);
    padding:0 1ch;
  }

  /* Input row */
  .term-input-row{
    display:flex; align-items:center;
    padding:10px 18px 14px;
    border-top:1px solid var(--line);
    font-family:'VT323', monospace;
    font-size:18px;
    background:rgba(0,30,12,0.45);
  }
  .term-input-row .prompt{
    color:var(--green-bright);
    margin-right:8px;
    text-shadow:0 0 6px rgba(210,255,230,0.6);
    user-select:none;
    white-space:nowrap;
  }
  #cmd{
    flex:1;
    background:transparent; border:none; outline:none;
    color:var(--green-bright);
    font-family:'VT323', monospace;
    font-size:18px;
    text-shadow:0 0 4px rgba(0,255,102,0.55);
    caret-color:var(--green-bright);
    padding:0;
  }

  .term-foot{
    padding:6px 18px 8px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color:var(--green-dim);
    letter-spacing:0.16em;
    text-transform:uppercase;
    border-top:1px dashed var(--line);
    text-align:center;
    user-select:none;
  }

  /* Glitch shake */
  .shake{ animation:shake 0.35s cubic-bezier(.36,.07,.19,.97); }
  @keyframes shake{
    10%, 90% { transform: translate(-50%, -50%) translate3d(-1px, 0, 0); }
    20%, 80% { transform: translate(-50%, -50%) translate3d(2px, 0, 0); }
    30%, 50%, 70% { transform: translate(-50%, -50%) translate3d(-3px, 1px, 0); }
    40%, 60% { transform: translate(-50%, -50%) translate3d(3px, -1px, 0); }
  }

  .reveal{
    display:inline-block;
    animation:reveal 1.4s steps(40);
    overflow:hidden; white-space:nowrap;
  }
  @keyframes reveal{ from{ width:0; } to{ width:100%; } }

  /* Theme: red pill mode swaps the rain palette via CSS var hooked into JS */
  body.red-pill{
    --green:#ff3838;
    --green-dim:#7a1818;
    --green-bright:#ffd0d0;
    --line:rgba(255,56,56,0.18);
    --term-bg:rgba(20,0,0,0.78);
  }

  @media (max-width:540px){
    .term{ width:96vw; height:88vh; }
    .term-body{ font-size:16px; padding:10px 12px 4px; }
    .term-input-row{ font-size:16px; padding:8px 12px 12px; }
    .term-head .title{ display:none; }
  }
</style>
</head>
<body>

<canvas id="rain"></canvas>

<div class="term" id="term">
  <header class="term-head">
    <div class="dots">
      <span class="dot r"></span>
      <span class="dot y"></span>
      <span class="dot g"></span>
    </div>
    <div class="title">root@matrix:~ — uplink//ssh -p 1337</div>
    <div class="meta"><span class="pulse"></span><span id="uplinkLabel">uplink stable</span></div>
  </header>
  <div class="term-body" id="body"></div>
  <form class="term-input-row" id="form" autocomplete="off">
    <span class="prompt" id="prompt">root@matrix:~#</span>
    <input id="cmd" type="text" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus />
  </form>
  <div class="term-foot">type <span style="color:var(--green-bright)">help</span> · ↑↓ history · ctrl+l clear · esc focus</div>
</div>

<div class="crt-fx"></div>
<div class="flicker"></div>

<script>
// =====================================================================
// MATRIX RAIN
// =====================================================================
const canvas = document.getElementById('rain');
const ctx = canvas.getContext('2d');
const RAIN_CHARS = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜｦﾝ0123456789:.+-*=<>|/\\@#$%&';
const FONT_SIZE = 16;
let cols = 0;
let drops = [];
let fadeAlpha = 0.06;       // trail fade strength
let speedMul = 1;           // slowed during 'wake_up'
let theme = 'green';        // 'green' | 'red' | 'blue' | 'amber'
const themePalettes = {
  green:  { head:'#d2ffe6', body:'#00ff66', dim:'#0a8a3e' },
  red:    { head:'#ffd0d0', body:'#ff3838', dim:'#7a1818' },
  blue:   { head:'#cfeeff', body:'#5fc0e0', dim:'#1d5a72' },
  amber:  { head:'#fff0c8', body:'#ffb86b', dim:'#7a4f1b' },
};

function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = innerWidth  * dpr;
  canvas.height = innerHeight * dpr;
  canvas.style.width  = innerWidth  + 'px';
  canvas.style.height = innerHeight + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cols = Math.ceil(innerWidth / FONT_SIZE);
  drops = new Array(cols).fill(0).map(() => ({
    y: Math.random() * -innerHeight / FONT_SIZE,
    speed: 0.3 + Math.random() * 0.9,
    len: 8 + Math.floor(Math.random() * 22),
    char: pickChar(),
    swap: 0.02 + Math.random() * 0.08,
  }));
}
function pickChar(){ return RAIN_CHARS[(Math.random() * RAIN_CHARS.length) | 0]; }

function step(){
  const pal = themePalettes[theme];
  // Trail fade
  ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`;
  ctx.fillRect(0, 0, innerWidth, innerHeight);
  ctx.font = `${FONT_SIZE}px VT323, monospace`;
  ctx.textBaseline = 'top';

  for (let i = 0; i < cols; i++){
    const d = drops[i];
    if (Math.random() < d.swap) d.char = pickChar();

    const headY = d.y * FONT_SIZE;
    // Tail
    for (let k = 1; k < d.len; k++){
      const ty = headY - k * FONT_SIZE;
      if (ty < -FONT_SIZE) break;
      const fade = 1 - k / d.len;
      ctx.fillStyle = withAlpha(pal.body, 0.18 + fade * 0.62);
      ctx.fillText(pickChar(), i * FONT_SIZE, ty);
    }
    // Head — bright
    if (headY >= 0 && headY < innerHeight){
      ctx.fillStyle = pal.head;
      ctx.shadowColor = pal.body;
      ctx.shadowBlur = 12;
      ctx.fillText(d.char, i * FONT_SIZE, headY);
      ctx.shadowBlur = 0;
    }

    d.y += d.speed * speedMul;
    if (d.y * FONT_SIZE > innerHeight + d.len * FONT_SIZE){
      if (Math.random() < 0.97){
        d.y = Math.random() * -40 - 4;
        d.speed = 0.3 + Math.random() * 0.9;
        d.len = 8 + Math.floor(Math.random() * 22);
      }
    }
  }
  requestAnimationFrame(step);
}
function withAlpha(hex, a){
  const v = parseInt(hex.slice(1), 16);
  const r = (v >> 16) & 0xff, g = (v >> 8) & 0xff, b = v & 0xff;
  return `rgba(${r},${g},${b},${a})`;
}

window.addEventListener('resize', resize);
resize();
step();


// =====================================================================
// TERMINAL
// =====================================================================
const body = document.getElementById('body');
const form = document.getElementById('form');
const cmdInput = document.getElementById('cmd');
const term = document.getElementById('term');
const promptEl = document.getElementById('prompt');

const HOSTNAME = 'matrix';
const USER = 'root';
function getPrompt(){ return `${USER}@${HOSTNAME}:~#`; }

const FILES = {
  'red_pill.txt':
`>> RED PILL <<
You stay in Wonderland. I show you how deep the rabbit hole goes.
ROOT_KEY: ${randHex(40)}`,
  'blue_pill.txt':
`>> BLUE PILL <<
The story ends. You wake up in your bed and believe whatever you want.`,
  'agents.log':
`[03:11:42] AGENT_SMITH connected from 198.51.100.7
[03:11:43] AGENT_BROWN connected from 198.51.100.8
[03:11:48] AGENT_JONES connected from 198.51.100.9
[03:12:01] anomaly: subject 'NEO' refusing protocol
[03:12:14] DISPATCH: pursue. all units.`,
  'manifest.txt':
`There is no spoon.
There is only the bend.
And the bend has a pulse.`,
  'readme':
`MATRIX OS · v2.71 (build 7.7.7)
authorised personnel only.
type 'help' for command list.`,
};

const COMMANDS = [
  { name:'help',     desc:'list available commands' },
  { name:'whoami',   desc:'identify the operator' },
  { name:'ls',       desc:'list files in cwd' },
  { name:'cat',      desc:'display contents of <file>' },
  { name:'scan',     desc:'scan local subnet for live hosts' },
  { name:'ping',     desc:'ping <host>' },
  { name:'crack',    desc:'attempt to crack <target>' },
  { name:'decrypt',  desc:'decrypt <ciphertext>' },
  { name:'connect',  desc:'open uplink to <host>' },
  { name:'tail',     desc:'follow a log file in realtime' },
  { name:'sudo',     desc:'(restricted)' },
  { name:'theme',    desc:'rain palette: green | red | blue | amber' },
  { name:'glitch',   desc:'inject controlled chromatic glitch' },
  { name:'wake_up',  desc:'???' },
  { name:'date',     desc:'show simulation timestamp' },
  { name:'history',  desc:'show command history' },
  { name:'clear',    desc:'wipe the terminal' },
];

const HOSTS = [
  'zion-gate-01', 'zion-relay-04', 'sentinel-cluster-7', 'machine-city.mc',
  'mainframe.matrix', 'oracle.kitchen', 'merovingian.club', 'logos.dock',
  'nebuchadnezzar.shp', 'icarus.shp', 'osiris.shp',
];
const PORTS = [22, 23, 80, 443, 1337, 4444, 6667, 8080, 31337];

let history = [];
let histIndex = -1;

function appendLine(text, cls = ''){
  const line = document.createElement('div');
  line.className = 'line ' + cls;
  line.textContent = text;
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
  return line;
}
function appendHTML(html, cls = ''){
  const line = document.createElement('div');
  line.className = 'line ' + cls;
  line.innerHTML = html;
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
  return line;
}
function appendBlank(){ appendLine('\u00A0'); }

function streamLines(lines, delay = 90, cls = '', done){
  let i = 0;
  function next(){
    if (i >= lines.length){ done && done(); return; }
    appendLine(lines[i], cls);
    i++;
    setTimeout(next, delay);
  }
  next();
}
function progress(label, ms = 1800, cls = '', done){
  const line = appendLine(label + ' [                    ]   0%', cls);
  const start = performance.now();
  function tick(now){
    const t = Math.min(1, (now - start) / ms);
    const filled = Math.floor(t * 20);
    const bar = '█'.repeat(filled) + ' '.repeat(20 - filled);
    line.textContent = label + ' [' + bar + '] ' + Math.floor(t * 100).toString().padStart(3, ' ') + '%';
    if (t < 1) requestAnimationFrame(tick);
    else done && done();
  }
  requestAnimationFrame(tick);
}

function randHex(n){
  const s = '0123456789abcdef';
  let r = '';
  for (let i = 0; i < n; i++) r += s[(Math.random()*16)|0];
  return r;
}
function randIp(){
  return [10, (Math.random()*255)|0, (Math.random()*255)|0, (Math.random()*254)|0+1].join('.');
}
function randHost(){ return HOSTS[(Math.random()*HOSTS.length)|0]; }
function randPort(){ return PORTS[(Math.random()*PORTS.length)|0]; }

function runCommand(raw){
  const trimmed = raw.trim();
  appendHTML(`<span class="prompt">${getPrompt()}</span><span class="input">${escapeHtml(trimmed)}</span>`, 'cmd');
  if (!trimmed) return;
  history.push(trimmed);
  histIndex = history.length;

  const parts = trimmed.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const arg = parts.slice(1).join(' ');

  switch (cmd){
    case 'help':       return cmdHelp();
    case 'whoami':     return cmdWhoami();
    case 'ls':         return cmdLs();
    case 'cat':        return cmdCat(arg);
    case 'scan':       return cmdScan();
    case 'ping':       return cmdPing(arg);
    case 'crack':      return cmdCrack(arg);
    case 'decrypt':    return cmdDecrypt(arg);
    case 'connect':    return cmdConnect(arg);
    case 'tail':       return cmdTail(arg);
    case 'sudo':       return cmdSudo(arg);
    case 'theme':      return cmdTheme(arg);
    case 'glitch':     return cmdGlitch();
    case 'wake_up':
    case 'wakeup':     return cmdWakeUp();
    case 'date':       return cmdDate();
    case 'history':    return cmdHistory();
    case 'clear':
    case 'cls':        return cmdClear();
    case 'exit':
    case 'quit':       return appendLine('there is no exit.', 'warn');
    default:           return appendLine(`bash: ${cmd}: command not found`, 'err');
  }
}

function escapeHtml(s){
  return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

// ---------- Commands ----------
function cmdHelp(){
  appendLine('available commands:', 'hi');
  for (const c of COMMANDS){
    appendLine('  ' + c.name.padEnd(10, ' ') + '  ' + c.desc, 'sys');
  }
  appendBlank();
}
function cmdWhoami(){
  appendLine(`uid=0(root) gid=0(root) operator=neo  clearance=Ω`, 'hi');
  appendLine(`real-name: <redacted>   alias: NEO`, 'sys');
  appendLine(`vessel: nebuchadnezzar   captain: morpheus`, 'sys');
}
function cmdLs(){
  const names = Object.keys(FILES).sort();
  appendHTML(names.map(n => `<span class="hi">${n}</span>`).join('  '));
}
function cmdCat(arg){
  if (!arg){ appendLine('usage: cat <file>', 'warn'); return; }
  if (!FILES[arg]){ appendLine(`cat: ${arg}: no such file`, 'err'); return; }
  const lines = FILES[arg].split('\n');
  for (const l of lines) appendLine(l);
}
function cmdScan(){
  appendLine('# scanning 10.0.0.0/24 for live hosts ...', 'sys');
  let n = 0;
  const total = 7 + ((Math.random()*4)|0);
  function tick(){
    if (n >= total){
      appendLine(`# scan complete: ${total} hosts up.`, 'hi');
      return;
    }
    const host = randHost();
    const ip = randIp();
    const port = randPort();
    const services = ['ssh', 'http', 'oracle', 'gnostic', 'sentinel-rpc', 'redpill'][((Math.random()*6)|0)];
    appendLine(`  [+] ${ip.padEnd(15,' ')}  ${host.padEnd(22,' ')}  :${port}  ${services}`);
    n++;
    setTimeout(tick, 220 + Math.random()*180);
  }
  tick();
}
function cmdPing(arg){
  const host = arg || randHost();
  appendLine(`PING ${host} 56(84) bytes of data.`, 'sys');
  let i = 0;
  function tick(){
    if (i >= 4){
      appendLine(`--- ${host} ping statistics ---`, 'sys');
      appendLine(`4 packets transmitted, 4 received, 0% packet loss, time ${(800+Math.random()*200).toFixed(0)}ms`);
      return;
    }
    const tm = (12 + Math.random()*22).toFixed(1);
    appendLine(`64 bytes from ${host}: icmp_seq=${i+1} ttl=64 time=${tm} ms`);
    i++;
    setTimeout(tick, 350);
  }
  tick();
}
function cmdCrack(arg){
  const target = arg || 'sentinel-cluster-7';
  appendLine(`# initiating brute-force handshake on ${target} ...`, 'sys');
  appendLine(`# wordlist: rockyou.matrix (14,344,392 entries)`, 'dim');
  let attempts = 0;
  const probe = appendLine('  trying ▒▒▒▒▒▒▒▒  ', '');
  const interval = setInterval(() => {
    attempts++;
    probe.textContent = '  trying ' + randHex(8) + '  attempts: ' + attempts.toLocaleString();
  }, 60);
  setTimeout(() => {
    clearInterval(interval);
    progress('  [decrypt]', 1600, 'sys', () => {
      appendLine(`  [✓] handshake forged.`, 'hi');
      appendLine(`  password: ${["follow_the_white_rabbit","there_is_no_spoon","wake_up_neo","blue_pill_is_a_lie","construct_42"][((Math.random()*5)|0)]}`, 'hi');
      appendLine(`  shell access granted on ${target}.`, 'hi');
    });
  }, 1400);
}
function cmdDecrypt(arg){
  const cipher = arg || randHex(32);
  appendLine(`# attempting cipher decode: ${cipher}`, 'sys');
  progress('  [aes-256]', 1400, 'sys', () => {
    progress('  [rsa-4096]', 1400, 'sys', () => {
      const phrases = [
        'the answer is unfolding around you',
        'follow the white rabbit',
        'do not bend the spoon',
        'free your mind',
        'this is the construct',
        'all i am offering is the truth',
      ];
      const out = phrases[(Math.random()*phrases.length)|0];
      appendHTML(`  <span class="hi">⟶ ${out}</span>`);
    });
  });
}
function cmdConnect(arg){
  const target = arg || 'mainframe.matrix';
  appendLine(`# opening uplink to ${target}:1337 ...`, 'sys');
  const stages = [
    '  TCP SYN     →',
    '  TCP SYN/ACK ←',
    '  TCP ACK     →',
    '  TLS handshake … ok',
    '  authenticating with ed25519 key … ok',
    '  spawning shell … done',
  ];
  let i = 0;
  function next(){
    if (i >= stages.length){
      appendLine(`# uplink stable. you are inside ${target}.`, 'hi');
      return;
    }
    appendLine(stages[i]);
    i++;
    setTimeout(next, 250);
  }
  next();
}
function cmdTail(arg){
  const f = arg || 'agents.log';
  if (FILES[f]){
    for (const l of FILES[f].split('\n')) appendLine(l);
  }
  appendLine(`# following ${f} (ctrl+l to clear)`, 'sys');
  let n = 0;
  const interval = setInterval(() => {
    n++;
    const events = [
      `[${nowStamp()}] heartbeat from ${randHost()}`,
      `[${nowStamp()}] AGENT_SMITH probe @ ${randIp()}`,
      `[${nowStamp()}] anomaly id=${randHex(6)} reality_drift=${(Math.random()*0.04).toFixed(4)}`,
      `[${nowStamp()}] subject NEO seen at sector ${(Math.random()*12|0)+1}`,
      `[${nowStamp()}] sentinel pursuit vector ${(Math.random()*360|0)}°`,
      `[${nowStamp()}] kernel tick · constructs=${4096 + (Math.random()*512|0)}`,
    ];
    appendLine(events[(Math.random()*events.length)|0], 'dim');
    if (n >= 8){ clearInterval(interval); appendLine('# tail timed out — relax. they are watching.', 'warn'); }
  }, 700);
}
function nowStamp(){
  const d = new Date();
  return [d.getHours(), d.getMinutes(), d.getSeconds()].map(n => String(n).padStart(2,'0')).join(':');
}
function cmdSudo(arg){
  appendLine(`[sudo] password for root: `, 'sys');
  setTimeout(() => appendLine(`Sorry, ${USER}. There is no escalation here. The kernel is the dream.`, 'warn'), 800);
}
function cmdTheme(arg){
  const t = (arg || '').toLowerCase().trim();
  if (!t){
    appendLine('current theme: ' + theme, 'sys');
    appendLine('options: green · red · blue · amber', 'dim');
    return;
  }
  if (!themePalettes[t]){ appendLine(`theme: unknown palette "${t}"`, 'err'); return; }
  theme = t;
  document.body.classList.toggle('red-pill', t === 'red');
  appendLine(`# rain palette → ${t}`, 'hi');
}
function cmdGlitch(){
  term.classList.add('shake');
  document.body.style.filter = 'hue-rotate(180deg) contrast(1.2)';
  setTimeout(() => {
    term.classList.remove('shake');
    document.body.style.filter = '';
    appendLine('# reality stabilised.', 'sys');
  }, 360);
  appendLine('# ░░░ chromatic glitch injected ░░░', 'warn');
}
function cmdWakeUp(){
  appendLine('Wake up, Neo...', 'ghost');
  speedMul = 0.18;
  setTimeout(() => appendLine('The Matrix has you...', 'ghost'), 1500);
  setTimeout(() => appendLine('Follow the white rabbit.', 'ghost'), 3200);
  setTimeout(() => {
    appendLine('Knock, knock, Neo.', 'hi');
    speedMul = 1;
  }, 5200);
}
function cmdDate(){
  const d = new Date();
  appendLine(d.toUTCString().replace('GMT','UTC') + '   ·   simulation tick: ' + Math.floor(d.getTime()/1000));
}
function cmdHistory(){
  if (!history.length){ appendLine('(no history)', 'dim'); return; }
  history.slice(-30).forEach((h, i) => appendLine('  ' + String(i+1).padStart(3,' ') + '  ' + h, 'sys'));
}
function cmdClear(){
  body.innerHTML = '';
}

// ---------- Boot sequence ----------
function boot(){
  const banner = [
'  ███╗   ███╗ █████╗ ████████╗██████╗ ██╗██╗  ██╗',
'  ████╗ ████║██╔══██╗╚══██╔══╝██╔══██╗██║╚██╗██╔╝',
'  ██╔████╔██║███████║   ██║   ██████╔╝██║ ╚███╔╝ ',
'  ██║╚██╔╝██║██╔══██║   ██║   ██╔══██╗██║ ██╔██╗ ',
'  ██║ ╚═╝ ██║██║  ██║   ██║   ██║  ██║██║██╔╝ ██╗',
'  ╚═╝     ╚═╝╚═╝  ╚═╝   ╚═╝   ╚═╝  ╚═╝╚═╝╚═╝  ╚═╝',
  ];
  for (const line of banner) appendLine(line, 'ascii hi');
  appendLine('  matrix os · build 7.7.7 · authorised personnel only', 'dim');
  appendBlank();
  const steps = [
    '[ ok ] reactor online · constructs nominal',
    '[ ok ] sentinel firewall: passive',
    '[ ok ] uplink to zion: encrypted',
    '[ ok ] code rain calibrated · 0.97 hz',
    '[ .. ] scanning for anomalies ......... none',
  ];
  streamLines(steps, 240, 'sys', () => {
    appendBlank();
    appendLine('Welcome back, operator.', 'hi');
    appendLine('Type \'help\' for available commands. Try \'wake_up\' if you must.', 'dim');
    appendBlank();
  });
}

// ---------- Wiring ----------
form.addEventListener('submit', e => {
  e.preventDefault();
  const v = cmdInput.value;
  cmdInput.value = '';
  runCommand(v);
});
cmdInput.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp'){
    if (history.length === 0) return;
    histIndex = Math.max(0, histIndex - 1);
    cmdInput.value = history[histIndex] || '';
    e.preventDefault();
  } else if (e.key === 'ArrowDown'){
    if (history.length === 0) return;
    histIndex = Math.min(history.length, histIndex + 1);
    cmdInput.value = history[histIndex] || '';
    e.preventDefault();
  } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'l'){
    e.preventDefault();
    cmdClear();
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape'){ cmdInput.focus(); }
});
// Refocus input when clicking anywhere in terminal panel
term.addEventListener('click', e => {
  if (e.target.tagName !== 'A') cmdInput.focus();
});

boot();
</script>
