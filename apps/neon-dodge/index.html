<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Space Dodge</title>
<link rel="icon" href="https://emojicdn.elk.sh/🚀">
<meta property="og:title" content="Neon Space Dodge">
<meta property="og:description" content="Dodge neon asteroids in a synthwave void. How long can you survive?">
<meta property="og:url" content="https://sloppy.live/neon-dodge/">
<meta property="og:image" content="https://sloppy.live/neon-dodge/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#120024;font-family:'Share Tech Mono',monospace}
canvas{display:block;width:100%;height:100%}
#start-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:radial-gradient(ellipse at 50% 80%,#220045 0%,#120024 70%)}
#start-screen h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(2.5rem,8vw,5rem);background:linear-gradient(180deg,#ff2d95,#7b2fff 40%,#00f0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 60px rgba(255,45,149,.4);letter-spacing:.1em;margin-bottom:.2em}
#start-screen .sub{color:#00f0ff;font-size:clamp(.8rem,2.5vw,1.1rem);opacity:.7;margin-bottom:2em;letter-spacing:.15em}
#start-btn{font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(1rem,3vw,1.4rem);padding:.8em 2.5em;background:transparent;border:2px solid #ff2d95;color:#ff2d95;cursor:pointer;letter-spacing:.2em;transition:all .2s;text-transform:uppercase}
#start-btn:hover{background:#ff2d95;color:#120024;box-shadow:0 0 30px #ff2d95}
.controls-hint{color:rgba(255,255,255,.3);font-size:.75rem;margin-top:1.5em;letter-spacing:.1em}
#game-over{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(10,0,18,.85);backdrop-filter:blur(8px)}
#game-over h2{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(2rem,6vw,3.5rem);color:#ff2d95;letter-spacing:.1em;margin-bottom:.3em}
#game-over .final-score{font-family:'Orbitron',sans-serif;font-size:clamp(1.2rem,4vw,2rem);color:#00f0ff;margin-bottom:.3em}
#game-over .best-score{color:rgba(255,255,255,.4);font-size:.9rem;margin-bottom:1.5em}
#retry-btn{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1rem;padding:.7em 2em;background:transparent;border:2px solid #00f0ff;color:#00f0ff;cursor:pointer;letter-spacing:.2em;text-transform:uppercase;transition:all .2s}
#retry-btn:hover{background:#00f0ff;color:#120024;box-shadow:0 0 30px #00f0ff}
#hud{position:fixed;top:0;left:0;right:0;padding:12px 20px;display:none;justify-content:space-between;align-items:center;z-index:5;pointer-events:none}
#hud .score{font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(1rem,3vw,1.6rem);color:#00f0ff;text-shadow:0 0 15px rgba(0,240,255,.5)}
#hud .wave{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:#ff2d95;opacity:.8}
#mute-btn{position:fixed;top:12px;right:12px;z-index:20;background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);font-size:.8rem;padding:4px 10px;cursor:pointer;font-family:'Share Tech Mono',monospace;border-radius:2px}
#mute-btn:hover{border-color:#00f0ff;color:#00f0ff}
.back-link{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:20;color:rgba(255,255,255,.2);font-size:.7rem;text-decoration:none;letter-spacing:.1em}
.back-link:hover{color:#ff2d95}
</style>
</head>
<body>

<div id="start-screen">
  <h1>NEON DODGE</h1>
  <div class="sub">SURVIVE THE SYNTHWAVE VOID</div>
  <button id="start-btn" onclick="startGame()">LAUNCH</button>
  <div class="controls-hint">ARROW KEYS / WASD / TOUCH TO MOVE</div>
</div>

<div id="game-over">
  <h2>SIGNAL LOST</h2>
  <div class="final-score" id="final-score">0</div>
  <div class="best-score" id="best-score"></div>
  <button id="retry-btn" onclick="startGame()">RETRY</button>
</div>

<div id="hud">
  <div class="score" id="score-display">0</div>
  <div class="wave" id="wave-display">WAVE 1</div>
</div>

<button id="mute-btn" onclick="toggleMute()">SOUND: ON</button>
<canvas id="cv"></canvas>
<a class="back-link" href="https://sloppy.live">sloppy.live</a>

<script>
const CV=document.getElementById('cv');
const X=CV.getContext('2d');
let W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// --- SYNTHWAVE AUDIO ---
let audioCtx=null, masterGain=null, muted=false;
let synthNodes=[];

function initAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=0.3;
  masterGain.connect(audioCtx.destination);
}

function startSynthwave(){
  if(!audioCtx) initAudio();
  stopSynthwave();

  // Bass line - deep pulsing synth
  const bassOsc=audioCtx.createOscillator();
  const bassGain=audioCtx.createGain();
  const bassFilter=audioCtx.createBiquadFilter();
  bassOsc.type='sawtooth';
  bassOsc.frequency.value=55;
  bassFilter.type='lowpass';
  bassFilter.frequency.value=200;
  bassFilter.Q.value=8;
  bassGain.gain.value=0.35;
  bassOsc.connect(bassFilter);
  bassFilter.connect(bassGain);
  bassGain.connect(masterGain);
  bassOsc.start();

  // Bass LFO for pulsing
  const bassLfo=audioCtx.createOscillator();
  const bassLfoGain=audioCtx.createGain();
  bassLfo.type='sine';
  bassLfo.frequency.value=2;
  bassLfoGain.gain.value=0.15;
  bassLfo.connect(bassLfoGain);
  bassLfoGain.connect(bassGain.gain);
  bassLfo.start();

  // Pad - wide detuned saw
  const padOsc1=audioCtx.createOscillator();
  const padOsc2=audioCtx.createOscillator();
  const padGain=audioCtx.createGain();
  const padFilter=audioCtx.createBiquadFilter();
  padOsc1.type='sawtooth';
  padOsc2.type='sawtooth';
  padOsc1.frequency.value=220;
  padOsc2.frequency.value=220.8;
  padFilter.type='lowpass';
  padFilter.frequency.value=600;
  padFilter.Q.value=2;
  padGain.gain.value=0.08;
  padOsc1.connect(padFilter);
  padOsc2.connect(padFilter);
  padFilter.connect(padGain);
  padGain.connect(masterGain);
  padOsc1.start();
  padOsc2.start();

  // Pad chord sweep
  const sweepLfo=audioCtx.createOscillator();
  const sweepGain=audioCtx.createGain();
  sweepLfo.type='triangle';
  sweepLfo.frequency.value=0.15;
  sweepGain.gain.value=400;
  sweepLfo.connect(sweepGain);
  sweepGain.connect(padFilter.frequency);
  sweepLfo.start();

  // Arpeggio
  const arpOsc=audioCtx.createOscillator();
  const arpGain=audioCtx.createGain();
  const arpFilter=audioCtx.createBiquadFilter();
  arpOsc.type='square';
  arpOsc.frequency.value=440;
  arpFilter.type='lowpass';
  arpFilter.frequency.value=2000;
  arpFilter.Q.value=5;
  arpGain.gain.value=0.06;
  arpOsc.connect(arpFilter);
  arpFilter.connect(arpGain);
  arpGain.connect(masterGain);
  arpOsc.start();

  // Arp note sequencer
  const arpNotes=[220,330,440,550,660,550,440,330];
  let arpIdx=0;
  const arpInterval=setInterval(()=>{
    if(!audioCtx||muted) return;
    arpOsc.frequency.setTargetAtTime(arpNotes[arpIdx],audioCtx.currentTime,0.02);
    arpGain.gain.setTargetAtTime(0.07,audioCtx.currentTime,0.01);
    arpGain.gain.setTargetAtTime(0.02,audioCtx.currentTime+0.08,0.05);
    arpIdx=(arpIdx+1)%arpNotes.length;
  },200);

  // Hi-hat noise
  const noiseLen=audioCtx.sampleRate*2;
  const noiseBuf=audioCtx.createBuffer(1,noiseLen,audioCtx.sampleRate);
  const noiseData=noiseBuf.getChannelData(0);
  for(let i=0;i<noiseLen;i++) noiseData[i]=Math.random()*2-1;
  const noiseSrc=audioCtx.createBufferSource();
  const noiseGain=audioCtx.createGain();
  const noiseFilter=audioCtx.createBiquadFilter();
  noiseSrc.buffer=noiseBuf;
  noiseSrc.loop=true;
  noiseFilter.type='highpass';
  noiseFilter.frequency.value=8000;
  noiseGain.gain.value=0.03;
  noiseSrc.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(masterGain);
  noiseSrc.start();

  // Hi-hat rhythm
  const hatInterval=setInterval(()=>{
    if(!audioCtx||muted) return;
    noiseGain.gain.setTargetAtTime(0.04,audioCtx.currentTime,0.005);
    noiseGain.gain.setTargetAtTime(0.01,audioCtx.currentTime+0.03,0.03);
  },250);

  synthNodes=[bassOsc,bassLfo,padOsc1,padOsc2,sweepLfo,arpOsc,noiseSrc];
  synthNodes._intervals=[arpInterval,hatInterval];
  synthNodes._gains=[bassGain,padGain,arpGain,noiseGain];
}

function stopSynthwave(){
  if(synthNodes.length){
    for(let n of synthNodes) try{n.stop();}catch(e){}
    if(synthNodes._intervals) for(let i of synthNodes._intervals) clearInterval(i);
    synthNodes=[];
  }
}

function toggleMute(){
  muted=!muted;
  document.getElementById('mute-btn').textContent='SOUND: '+(muted?'OFF':'ON');
  if(masterGain) masterGain.gain.value=muted?0:0.3;
}

// --- SOUND EFFECTS ---
function playHit(){
  if(!audioCtx||muted) return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type='sawtooth';o.frequency.value=150;
  o.frequency.exponentialRampToValueAtTime(30,audioCtx.currentTime+0.3);
  g.gain.value=0.3;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
  o.connect(g);g.connect(masterGain);
  o.start();o.stop(audioCtx.currentTime+0.3);
}

function playDodge(){
  if(!audioCtx||muted) return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type='sine';o.frequency.value=800+Math.random()*400;
  g.gain.value=0.04;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
  o.connect(g);g.connect(masterGain);
  o.start();o.stop(audioCtx.currentTime+0.1);
}

// --- GAME STATE ---
let playing=false, gameOver=false;
let score=0, bestScore=parseInt(localStorage.getItem('neondodge_best'))||0;
let wave=1, waveTimer=0;
let ship={x:0,y:0,w:28,h:36,trail:[]};
let obstacles=[], particles=[], stars=[];
let gridOffset=0;
let lastTime=0, shakeTimer=0, shakeX=0, shakeY=0;
let nearMissTimer=0;

const keys={};
let touchTarget=null;
document.addEventListener('keydown',e=>{keys[e.key]=true;});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
CV.addEventListener('touchstart',e=>{e.preventDefault();let t=e.touches[0];touchTarget={x:t.clientX,y:t.clientY};},{passive:false});
CV.addEventListener('touchmove',e=>{e.preventDefault();let t=e.touches[0];touchTarget={x:t.clientX,y:t.clientY};},{passive:false});
CV.addEventListener('touchend',()=>{touchTarget=null;},{passive:false});

// --- STARS ---
function initStars(){
  stars=[];
  for(let i=0;i<120;i++){
    stars.push({x:Math.random()*2000-500,y:Math.random()*2000-500,s:Math.random()*2+0.5,sp:Math.random()*80+20,a:Math.random()});
  }
}
initStars();

// --- OBSTACLE TYPES ---
function spawnObstacle(){
  let spd=120+wave*15+Math.random()*60;
  let type=Math.random();
  if(type<0.5){
    // Asteroid - circle
    let r=12+Math.random()*18+wave*1.5;
    obstacles.push({type:'asteroid',x:Math.random()*(W-r*2)+r,y:-r*2,r,vy:spd,vx:(Math.random()-.5)*60,rot:0,rotSpd:(Math.random()-.5)*4,
      color:Math.random()<0.3?'#ff2d95':'#00f0ff',vertices:genAsteroidVerts(r)});
  } else if(type<0.8){
    // Laser beam - horizontal line
    let lw=80+Math.random()*120+wave*8;
    obstacles.push({type:'laser',x:Math.random()*(W-lw),y:-20,w:lw,h:4,vy:spd*0.7,warn:1.0,color:'#ff2d95'});
  } else {
    // Seeker - slow homing triangle
    obstacles.push({type:'seeker',x:Math.random()*W,y:-30,r:14,vy:spd*0.5,vx:0,rot:0,life:4,color:'#ffd700'});
  }
}

function genAsteroidVerts(r){
  let verts=[];
  let n=6+Math.floor(Math.random()*4);
  for(let i=0;i<n;i++){
    let a=(i/n)*Math.PI*2;
    let rr=r*(0.7+Math.random()*0.4);
    verts.push({x:Math.cos(a)*rr,y:Math.sin(a)*rr});
  }
  return verts;
}

// --- PARTICLES ---
function spawnExplosion(x,y,color,count){
  for(let i=0;i<count;i++){
    let a=Math.random()*Math.PI*2;
    let sp=60+Math.random()*200;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.5+Math.random()*0.5,maxLife:0.5+Math.random()*0.5,r:2+Math.random()*3,color});
  }
}

function spawnTrail(x,y){
  particles.push({x:x+(Math.random()-.5)*8,y:y+10,vx:(Math.random()-.5)*20,vy:20+Math.random()*30,life:0.3+Math.random()*0.2,maxLife:0.5,r:2+Math.random()*2,color:'#00f0ff'});
}

// --- GAME LOGIC ---
function startGame(){
  initAudio();
  document.getElementById('start-screen').style.display='none';
  document.getElementById('game-over').style.display='none';
  document.getElementById('hud').style.display='flex';
  playing=true;gameOver=false;
  score=0;wave=1;waveTimer=0;
  ship.x=W/2;ship.y=H*0.8;ship.trail=[];
  obstacles=[];particles=[];
  shakeTimer=0;nearMissTimer=0;
  lastTime=performance.now();
  startSynthwave();
  requestAnimationFrame(loop);
}

function endGame(){
  playing=false;gameOver=true;
  stopSynthwave();
  playHit();
  spawnExplosion(ship.x,ship.y,'#ff2d95',40);
  spawnExplosion(ship.x,ship.y,'#00f0ff',25);
  shakeTimer=0.4;
  if(score>bestScore){bestScore=score;localStorage.setItem('neondodge_best',bestScore);}
  setTimeout(()=>{
    document.getElementById('game-over').style.display='flex';
    document.getElementById('final-score').textContent=score;
    document.getElementById('best-score').textContent='BEST: '+bestScore;
  },800);
}

let spawnTimer=0;
function updateGame(dt){
  waveTimer+=dt;
  if(waveTimer>15){waveTimer=0;wave++;document.getElementById('wave-display').textContent='WAVE '+wave;}

  // Score
  score=Math.floor(score+dt*(10+wave*3));
  document.getElementById('score-display').textContent=score;

  // Ship movement
  let spd=400+wave*8;
  let ax=0,ay=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) ax=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) ax=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) ay=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']) ay=1;
  if(touchTarget){
    let dx=touchTarget.x-ship.x,dy=touchTarget.y-ship.y;
    let dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>15){ax=dx/dist;ay=dy/dist;}
  }
  ship.x+=ax*spd*dt;
  ship.y+=ay*spd*dt;
  ship.x=Math.max(ship.w/2,Math.min(W-ship.w/2,ship.x));
  ship.y=Math.max(ship.h/2,Math.min(H-ship.h/2,ship.y));

  // Trail
  if(Math.random()<0.6) spawnTrail(ship.x,ship.y+ship.h/2);
  ship.trail.push({x:ship.x,y:ship.y,a:1});
  if(ship.trail.length>20) ship.trail.shift();
  for(let t of ship.trail) t.a*=0.92;

  // Spawn obstacles
  let spawnRate=Math.max(0.15,1.2-wave*0.08);
  spawnTimer+=dt;
  if(spawnTimer>=spawnRate){spawnTimer=0;spawnObstacle();}

  // Update obstacles
  let nearMiss=false;
  for(let i=obstacles.length-1;i>=0;i--){
    let o=obstacles[i];
    o.y+=o.vy*dt;

    if(o.type==='asteroid'){
      o.x+=o.vx*dt;
      o.rot+=o.rotSpd*dt;
      if(o.x<-50||o.x>W+50||o.y>H+50){obstacles.splice(i,1);continue;}
      // Collision
      let dx=ship.x-o.x,dy=ship.y-o.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<o.r+12){endGame();return;}
      if(dist<o.r+35) nearMiss=true;
    }
    else if(o.type==='laser'){
      o.warn-=dt*2;
      if(o.y>H+20){obstacles.splice(i,1);continue;}
      if(o.warn<=0){
        // Collision - rect vs point
        if(ship.x>o.x-10&&ship.x<o.x+o.w+10&&ship.y>o.y-14&&ship.y<o.y+o.h+14){endGame();return;}
      }
    }
    else if(o.type==='seeker'){
      o.life-=dt;
      if(o.life<=0||o.y>H+50){obstacles.splice(i,1);continue;}
      // Gentle homing
      let dx=ship.x-o.x,dy=ship.y-o.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>1){o.vx+=(dx/dist)*80*dt;}
      o.x+=o.vx*dt;
      o.rot=Math.atan2(o.vy,o.vx||0.01);
      if(dist<o.r+12){endGame();return;}
      if(dist<o.r+30) nearMiss=true;
    }
  }

  if(nearMiss&&nearMissTimer<=0){nearMissTimer=0.4;playDodge();score+=5;}
  nearMissTimer-=dt;

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }

  // Screen shake
  if(shakeTimer>0){
    shakeTimer-=dt;
    shakeX=(Math.random()-.5)*12;
    shakeY=(Math.random()-.5)*12;
  } else {shakeX=0;shakeY=0;}
}

// --- DRAWING ---
function drawGrid(){
  gridOffset=(gridOffset+120*0.016)%60;
  X.save();
  X.strokeStyle='rgba(123,47,255,0.12)';
  X.lineWidth=1;
  // Perspective grid on bottom half
  let horizon=H*0.35;
  // Vertical lines
  let cx=W/2;
  for(let i=-15;i<=15;i++){
    let topX=cx+i*25;
    let botX=cx+i*120;
    X.beginPath();
    X.moveTo(topX,horizon);
    X.lineTo(botX,H);
    X.stroke();
  }
  // Horizontal lines
  for(let i=0;i<20;i++){
    let t=(i*50+gridOffset)/1000;
    let yy=horizon+Math.pow(t,1.5)*3200;
    if(yy>H) continue;
    let alpha=0.06+t*0.1;
    X.strokeStyle='rgba(123,47,255,'+Math.min(alpha,0.2)+')';
    X.beginPath();
    X.moveTo(0,yy);
    X.lineTo(W,yy);
    X.stroke();
  }
  X.restore();
}

function drawStars(dt){
  for(let s of stars){
    s.y+=s.sp*dt;
    if(s.y>H+10){s.y=-10;s.x=Math.random()*W;}
    let a=0.3+s.a*0.5+Math.sin(performance.now()/1000+s.x)*0.2;
    X.fillStyle='rgba(255,255,255,'+a+')';
    X.fillRect(s.x,s.y,s.s,s.s);
  }
}

function drawShip(){
  let x=ship.x,y=ship.y;
  // Glow
  let grd=X.createRadialGradient(x,y,0,x,y,50);
  grd.addColorStop(0,'rgba(0,240,255,0.15)');
  grd.addColorStop(1,'rgba(0,240,255,0)');
  X.fillStyle=grd;
  X.fillRect(x-50,y-50,100,100);

  // Trail glow
  for(let t of ship.trail){
    X.fillStyle='rgba(0,240,255,'+t.a*0.2+')';
    X.beginPath();X.arc(t.x,t.y,4,0,Math.PI*2);X.fill();
  }

  // Ship body - angular wedge
  X.save();
  X.translate(x,y);
  X.strokeStyle='#00f0ff';
  X.lineWidth=2;
  X.shadowColor='#00f0ff';
  X.shadowBlur=15;
  X.beginPath();
  X.moveTo(0,-ship.h/2);
  X.lineTo(-ship.w/2,ship.h/2);
  X.lineTo(-4,ship.h/4);
  X.lineTo(0,ship.h/3);
  X.lineTo(4,ship.h/4);
  X.lineTo(ship.w/2,ship.h/2);
  X.closePath();
  X.stroke();
  X.fillStyle='rgba(0,240,255,0.1)';
  X.fill();

  // Cockpit
  X.fillStyle='#00f0ff';
  X.beginPath();X.arc(0,-4,3,0,Math.PI*2);X.fill();

  // Engine glow
  X.fillStyle='rgba(255,45,149,0.7)';
  X.beginPath();
  X.moveTo(-6,ship.h/3);
  X.lineTo(0,ship.h/2+8+Math.random()*6);
  X.lineTo(6,ship.h/3);
  X.fill();
  X.shadowBlur=0;
  X.restore();
}

function drawObstacles(){
  for(let o of obstacles){
    X.save();
    if(o.type==='asteroid'){
      X.translate(o.x,o.y);
      X.rotate(o.rot);
      X.strokeStyle=o.color;
      X.lineWidth=2;
      X.shadowColor=o.color;
      X.shadowBlur=10;
      X.beginPath();
      X.moveTo(o.vertices[0].x,o.vertices[0].y);
      for(let v of o.vertices) X.lineTo(v.x,v.y);
      X.closePath();
      X.stroke();
      X.fillStyle=o.color.replace(')',',0.08)').replace('rgb','rgba');
      X.fill();
    }
    else if(o.type==='laser'){
      let a=o.warn>0?Math.max(0,1-o.warn):1;
      if(o.warn>0){
        // Warning line
        X.strokeStyle='rgba(255,45,149,'+(0.3+Math.sin(performance.now()/50)*0.2)+')';
        X.lineWidth=1;
        X.setLineDash([8,8]);
        X.beginPath();X.moveTo(o.x,o.y);X.lineTo(o.x+o.w,o.y);X.stroke();
        X.setLineDash([]);
      } else {
        X.shadowColor='#ff2d95';
        X.shadowBlur=20;
        X.fillStyle='#ff2d95';
        X.fillRect(o.x,o.y,o.w,o.h);
        // Core
        X.fillStyle='rgba(255,255,255,0.6)';
        X.fillRect(o.x,o.y+1,o.w,2);
      }
    }
    else if(o.type==='seeker'){
      X.translate(o.x,o.y);
      X.shadowColor='#ffd700';
      X.shadowBlur=12;
      X.strokeStyle='#ffd700';
      X.lineWidth=2;
      let r=o.r;
      X.beginPath();
      X.moveTo(0,-r);
      X.lineTo(-r*0.7,r*0.6);
      X.lineTo(r*0.7,r*0.6);
      X.closePath();
      X.stroke();
      X.fillStyle='rgba(255,215,0,0.1)';
      X.fill();
      // Eye
      X.fillStyle='#ffd700';
      X.beginPath();X.arc(0,0,3,0,Math.PI*2);X.fill();
    }
    X.restore();
  }
}

function drawParticles(){
  for(let p of particles){
    let a=p.life/p.maxLife;
    X.fillStyle=p.color;
    X.globalAlpha=a;
    X.beginPath();X.arc(p.x,p.y,p.r*a,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}

function drawSun(){
  let cx=W/2,cy=H*0.32;
  // Sun lines
  let grd=X.createLinearGradient(cx-100,cy-60,cx+100,cy+60);
  grd.addColorStop(0,'#ff2d95');
  grd.addColorStop(1,'#ffd700');
  X.fillStyle=grd;
  X.beginPath();X.arc(cx,cy,55,0,Math.PI*2);X.fill();
  // Horizontal slice lines through sun
  X.fillStyle='#120024';
  for(let i=0;i<6;i++){
    let yy=cy+10+i*8;
    let hw=Math.sqrt(Math.max(0,55*55-Math.pow(yy-cy,2)));
    X.fillRect(cx-hw,yy,hw*2,3+i);
  }
}

function drawVignette(){
  let grd=X.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.9);
  grd.addColorStop(0,'rgba(10,0,18,0)');
  grd.addColorStop(1,'rgba(10,0,18,0.6)');
  X.fillStyle=grd;
  X.fillRect(0,0,W,H);
}

// --- IDLE ANIMATION ---
function drawIdle(now){
  let dt=0.016;
  X.fillStyle='#120024';
  X.fillRect(0,0,W,H);
  drawStars(dt);
  drawSun();
  drawGrid();
  drawVignette();
  if(!playing&&!gameOver) requestAnimationFrame(drawIdle);
}

// --- MAIN LOOP ---
function loop(now){
  if(!playing){
    // Still draw particles for death effect
    let dt=Math.min((now-lastTime)/1000,0.05);
    lastTime=now;
    X.fillStyle='#120024';X.fillRect(0,0,W,H);
    drawStars(dt);drawSun();drawGrid();
    for(let i=particles.length-1;i>=0;i--){
      let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
      if(p.life<=0){particles.splice(i,1);continue;}
      let a=p.life/p.maxLife;
      X.fillStyle=p.color;X.globalAlpha=a;
      X.beginPath();X.arc(p.x,p.y,p.r*a,0,Math.PI*2);X.fill();
    }
    X.globalAlpha=1;
    drawVignette();
    if(particles.length>0) requestAnimationFrame(loop);
    return;
  }

  let dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  updateGame(dt);

  X.save();
  X.translate(shakeX,shakeY);
  X.fillStyle='#120024';
  X.fillRect(-10,-10,W+20,H+20);

  drawStars(dt);
  drawSun();
  drawGrid();
  drawObstacles();
  drawShip();
  drawParticles();
  drawVignette();
  X.restore();

  requestAnimationFrame(loop);
}

// Start idle animation
requestAnimationFrame(drawIdle);
</script>
