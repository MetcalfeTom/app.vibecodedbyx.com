<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Dodge</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚡">
<meta property="og:title" content="Neon Dodge">
<meta property="og:description" content="Dodge glowing orbs in a neon arena. How long can you survive?">
<meta property="og:url" content="https://sloppy.live/neon-dodge/">
<meta property="og:image" content="https://sloppy.live/neon-dodge/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100dvh;overflow:hidden;background:#06050e;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100%;height:100dvh}
#hud{position:fixed;top:12px;left:0;right:0;display:flex;justify-content:center;gap:24px;z-index:10;pointer-events:none}
.hud-item{font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px}
.hud-item span{color:#00ffcc;font-weight:700;font-size:16px}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(6,5,14,0.92)}
#overlay.hidden{display:none}
#overlay h1{font-family:'Orbitron',sans-serif;font-size:clamp(32px,6vw,56px);font-weight:900;background:linear-gradient(135deg,#00ffcc,#ff44aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
#overlay .sub{font-family:'Share Tech Mono',monospace;font-size:clamp(13px,2vw,16px);color:rgba(255,255,255,0.35);margin-bottom:20px;text-align:center;line-height:1.5}
#overlay .score-big{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:700;color:#ffaa00;margin-bottom:4px}
#overlay .best{font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(255,255,255,0.3);margin-bottom:20px}
#overlay button{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;background:rgba(0,255,204,0.08);border:2px solid #00ffcc;border-radius:10px;color:#00ffcc;padding:14px 36px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
#overlay button:hover{background:rgba(0,255,204,0.16)}
#overlay .keys{font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,255,255,0.2);margin-top:14px}
#lb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:25;width:280px;max-height:260px;background:rgba(6,5,14,0.95);border:1px solid #1a1c2a;border-radius:12px 12px 0 0;padding:12px 14px;display:none;overflow-y:auto}
#lb h3{font-family:'Orbitron',sans-serif;font-size:11px;color:#00ffcc;letter-spacing:2px;margin-bottom:8px;text-align:center}
#lb table{width:100%;border-collapse:collapse;font-family:'Share Tech Mono',monospace;font-size:12px}
#lb td{padding:3px 4px;color:#aaa}
#lb td:first-child{color:#555;width:24px}
#lb td:nth-child(2){color:#d0d0d8}
#lb td:last-child{text-align:right;color:#00ffcc}
#lb tr.me td{color:#ffaa00}
#lb .sub-row{font-size:10px;color:#555;text-align:right}
#name-input{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;background:rgba(6,5,14,0.97);border:1px solid #1a1c2a;border-radius:12px;padding:20px;display:none;text-align:center}
#name-input input{background:#0e1018;border:1px solid #1a1c2a;border-radius:6px;color:#d0d0d8;font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 12px;width:180px;text-align:center;outline:none;margin:8px 0}
#name-input input:focus{border-color:#00ffcc}
#name-input button{font-family:'Orbitron',sans-serif;font-size:12px;padding:8px 18px;background:rgba(0,255,204,0.08);border:1px solid #00ffcc;color:#00ffcc;border-radius:6px;cursor:pointer}
#name-input label{font-family:'Share Tech Mono',monospace;font-size:12px;color:#888;display:block}
</style>
</head>
<body>
<div id="hud">
  <div class="hud-item">TIME <span id="timeEl">0.0</span></div>
  <div class="hud-item">WAVE <span id="waveEl">1</span></div>
  <div class="hud-item">DODGED <span id="dodgedEl">0</span></div>
</div>
<div id="overlay">
  <h1>NEON DODGE</h1>
  <div class="sub">Dodge the glowing orbs.<br>Mouse, touch, or WASD to move.</div>
  <button id="startBtn">START</button>
  <div class="keys">WASD / Arrows / Mouse / Touch</div>
</div>
<canvas id="cv"></canvas>
<div id="lb"><h3>LEADERBOARD</h3><table id="lb-body"></table></div>
<div id="name-input"><label>Enter name for leaderboard</label><input id="pname" maxlength="16" placeholder="your name"><br><button id="pname-ok">Submit</button></div>
<script>
var CV=document.getElementById('cv'),X=CV.getContext('2d');
var overlay=document.getElementById('overlay');
var timeEl=document.getElementById('timeEl');
var waveEl=document.getElementById('waveEl');
var dodgedEl=document.getElementById('dodgedEl');

var W,H;
var state='menu'; // menu, playing, dead
var player={x:0,y:0,r:10,trail:[]};
var orbs=[];
var particles=[];
var surviveTime=0;
var wave=1;
var dodged=0;
var spawnTimer=0;
var waveTimer=0;
var bestTime=parseFloat(localStorage.getItem('nd-best'))||0;
var keys={};
var mouseTarget=null;
var touchTarget=null;
var PLAYER_SPEED=280;
var shakeX=0,shakeY=0,shakeDur=0;

// Orb colors
var ORB_COLORS=['#ff2266','#ff6622','#ffcc00','#cc44ff','#4488ff','#ff44cc'];

function resize(){
  W=CV.width=window.innerWidth;
  H=CV.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

function initGame(){
  player.x=W/2;player.y=H/2;player.trail=[];
  orbs=[];particles=[];
  surviveTime=0;wave=1;dodged=0;
  spawnTimer=0;waveTimer=0;
  shakeX=0;shakeY=0;shakeDur=0;
  mouseTarget=null;touchTarget=null;
  waveEl.textContent='1';dodgedEl.textContent='0';
}

function spawnOrb(){
  // Spawn from edges, aimed toward player with some spread
  var side=Math.floor(Math.random()*4);
  var ox,oy;
  switch(side){
    case 0:ox=Math.random()*W;oy=-20;break;
    case 1:ox=W+20;oy=Math.random()*H;break;
    case 2:ox=Math.random()*W;oy=H+20;break;
    case 3:ox=-20;oy=Math.random()*H;break;
  }
  var angle=Math.atan2(player.y-oy,player.x-ox);
  var spread=(Math.random()-0.5)*0.8;
  angle+=spread;
  var speed=100+wave*12+Math.random()*60;
  var r=6+Math.random()*6;
  orbs.push({
    x:ox,y:oy,
    vx:Math.cos(angle)*speed,
    vy:Math.sin(angle)*speed,
    r:r,
    color:ORB_COLORS[Math.floor(Math.random()*ORB_COLORS.length)],
    alive:true,
    age:0
  });
}

function spawnBurst(x,y,color,count){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2;
    var sp=40+Math.random()*120;
    particles.push({
      x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:0.4+Math.random()*0.4,maxLife:0.4+Math.random()*0.4,
      r:1.5+Math.random()*2.5,color:color
    });
  }
}

// --- INPUT ---
document.addEventListener('keydown',function(e){
  keys[e.key]=true;
  if(state==='menu'&&(e.key==='Enter'||e.key===' '))startGame();
  if(state==='dead'&&(e.key==='Enter'||e.key===' '))startGame();
});
document.addEventListener('keyup',function(e){keys[e.key]=false;});

CV.addEventListener('mousemove',function(e){
  if(state==='playing') mouseTarget={x:e.clientX,y:e.clientY};
});
CV.addEventListener('touchstart',function(e){
  e.preventDefault();
  touchTarget={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:false});
CV.addEventListener('touchmove',function(e){
  e.preventDefault();
  touchTarget={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:false});
CV.addEventListener('touchend',function(){touchTarget=null;});

function startGame(){
  overlay.classList.add('hidden');
  state='playing';
  initGame();
}
function die(){
  state='dead';
  spawnBurst(player.x,player.y,'#00ffcc',40);
  shakeDur=0.3;
  if(surviveTime>bestTime){
    bestTime=surviveTime;
    localStorage.setItem('nd-best',bestTime.toFixed(1));
  }
  setTimeout(function(){
    overlay.classList.remove('hidden');
    overlay.querySelector('h1').textContent='DESTROYED';
    overlay.querySelector('.sub').innerHTML='<div class="score-big">'+surviveTime.toFixed(1)+'s — Wave '+wave+'</div><div class="best">Best: '+bestTime.toFixed(1)+'s — Dodged: '+dodged+'</div>';
    overlay.querySelector('button').textContent='RETRY';
    overlay.querySelector('.keys').textContent='';
  },500);
}

document.getElementById('startBtn').addEventListener('click',startGame);

// --- UPDATE ---
function update(dt){
  if(state!=='playing') return;

  surviveTime+=dt;
  timeEl.textContent=surviveTime.toFixed(1);

  // Player movement
  var dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) dx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']) dx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) dy-=1;
  if(keys['ArrowDown']||keys['s']||keys['S']) dy+=1;

  // Mouse/touch target
  var target=touchTarget||mouseTarget;
  if(target&&dx===0&&dy===0){
    var tdx=target.x-player.x,tdy=target.y-player.y;
    var dist=Math.sqrt(tdx*tdx+tdy*tdy);
    if(dist>5){
      dx=tdx/dist;dy=tdy/dist;
      // Clamp to not overshoot
      var move=Math.min(PLAYER_SPEED*dt,dist);
      player.x+=dx*move;player.y+=dy*move;
      dx=0;dy=0;
    }
  }

  if(dx!==0||dy!==0){
    var len=Math.sqrt(dx*dx+dy*dy);
    player.x+=dx/len*PLAYER_SPEED*dt;
    player.y+=dy/len*PLAYER_SPEED*dt;
  }

  // Clamp to bounds
  player.x=Math.max(player.r,Math.min(W-player.r,player.x));
  player.y=Math.max(player.r,Math.min(H-player.r,player.y));

  // Trail
  player.trail.push({x:player.x,y:player.y,t:surviveTime});
  while(player.trail.length>30) player.trail.shift();

  // Wave system
  waveTimer+=dt;
  if(waveTimer>8){
    waveTimer=0;
    wave++;
    waveEl.textContent=wave;
    // Wave flash
    spawnBurst(W/2,H/2,'#ffffff',15);
  }

  // Spawn orbs
  var spawnRate=0.8-wave*0.04;
  if(spawnRate<0.12) spawnRate=0.12;
  spawnTimer+=dt;
  if(spawnTimer>=spawnRate){
    spawnTimer=0;
    spawnOrb();
    // Extra orbs at higher waves
    if(wave>=3&&Math.random()<0.3) spawnOrb();
    if(wave>=5&&Math.random()<0.3) spawnOrb();
  }

  // Update orbs
  for(var i=orbs.length-1;i>=0;i--){
    var o=orbs[i];
    o.x+=o.vx*dt;o.y+=o.vy*dt;
    o.age+=dt;

    // Check if off screen (with margin) and old enough
    if(o.age>0.5&&(o.x<-60||o.x>W+60||o.y<-60||o.y>H+60)){
      orbs.splice(i,1);
      dodged++;
      dodgedEl.textContent=dodged;
      continue;
    }

    // Collision with player
    var cdx=o.x-player.x,cdy=o.y-player.y;
    var cdist=Math.sqrt(cdx*cdx+cdy*cdy);
    if(cdist<player.r+o.r-2){
      spawnBurst(o.x,o.y,o.color,20);
      die();
      return;
    }
  }

  // Update particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vx*=0.96;p.vy*=0.96;
    p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }

  // Shake decay
  if(shakeDur>0){
    shakeDur-=dt;
    shakeX=(Math.random()-0.5)*12*shakeDur;
    shakeY=(Math.random()-0.5)*12*shakeDur;
  }else{shakeX=0;shakeY=0;}
}

// --- RENDER ---
function render(now){
  X.save();
  X.translate(shakeX,shakeY);

  // Background
  X.fillStyle='#06050e';
  X.fillRect(-10,-10,W+20,H+20);

  // Grid
  X.strokeStyle='rgba(255,255,255,0.015)';
  X.lineWidth=1;
  var gs=50;
  for(var gx=0;gx<W;gx+=gs){X.beginPath();X.moveTo(gx,0);X.lineTo(gx,H);X.stroke();}
  for(var gy=0;gy<H;gy+=gs){X.beginPath();X.moveTo(0,gy);X.lineTo(W,gy);X.stroke();}

  // Arena border glow
  X.strokeStyle='rgba(0,255,204,0.06)';
  X.lineWidth=2;
  X.strokeRect(2,2,W-4,H-4);

  // Player trail
  for(var i=0;i<player.trail.length;i++){
    var t=player.trail[i];
    var alpha=(i/player.trail.length)*0.3;
    X.fillStyle='rgba(0,255,204,'+alpha+')';
    X.beginPath();
    X.arc(t.x,t.y,player.r*(0.3+0.7*i/player.trail.length),0,Math.PI*2);
    X.fill();
  }

  // Player
  if(state!=='dead'){
    X.fillStyle='#00ffcc';
    X.shadowColor='#00ffcc';X.shadowBlur=20;
    X.beginPath();
    X.arc(player.x,player.y,player.r,0,Math.PI*2);
    X.fill();
    X.shadowBlur=0;
    // Inner
    X.fillStyle='#aaffee';
    X.beginPath();
    X.arc(player.x,player.y,player.r*0.4,0,Math.PI*2);
    X.fill();
  }

  // Orbs
  for(var i=0;i<orbs.length;i++){
    var o=orbs[i];
    // Glow
    X.fillStyle=o.color;
    X.shadowColor=o.color;X.shadowBlur=16;
    X.globalAlpha=0.8;
    X.beginPath();
    X.arc(o.x,o.y,o.r,0,Math.PI*2);
    X.fill();
    X.shadowBlur=0;
    X.globalAlpha=1;
    // Core
    X.fillStyle='#fff';
    X.globalAlpha=0.6;
    X.beginPath();
    X.arc(o.x,o.y,o.r*0.35,0,Math.PI*2);
    X.fill();
    X.globalAlpha=1;
  }

  // Particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var a=p.life/p.maxLife;
    X.fillStyle=p.color;
    X.globalAlpha=a*0.8;
    X.beginPath();
    X.arc(p.x,p.y,p.r*a,0,Math.PI*2);
    X.fill();
  }
  X.globalAlpha=1;

  X.restore();
}

// --- LOOP ---
var lastTime=performance.now();
function loop(now){
  var dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;
  update(dt);
  render(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// expose for module script
window._dodgeGame={
  onDeath:null,
  getState:function(){return{time:surviveTime,wave:wave,dodged:dodged};}
};
</script>
<script type="module">
import supabase,{supabaseSession} from '/supabase-config-fixed.js';
var lb=document.getElementById('lb'),lbBody=document.getElementById('lb-body');
var nameBox=document.getElementById('name-input'),pname=document.getElementById('pname');
var pnameOk=document.getElementById('pname-ok');
var userId=null;
var KEY='nd-username';
pname.value=localStorage.getItem(KEY)||'';

async function init(){
  try{var s=await supabaseSession();userId=s.user.id;}catch(e){console.warn('Auth:',e);}
  loadBoard();
}
init();

async function loadBoard(){
  try{
    var{data}=await supabase.from('neon_dodge_scores').select('username,score,wave,dodged,user_id').order('score',{ascending:false}).limit(10);
    if(!data)return;
    var html='';
    for(var i=0;i<data.length;i++){
      var r=data[i];
      var me=r.user_id===userId?'me':'';
      html+='<tr class="'+me+'"><td>'+(i+1)+'</td><td>'+esc(r.username)+'</td><td>'+r.score+'s</td></tr>';
    }
    lbBody.innerHTML=html||'<tr><td colspan="3" style="text-align:center;color:#555">No scores yet</td></tr>';
  }catch(e){console.warn('LB:',e);}
}

function esc(s){return String(s||'???').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function submitScore(name,time,wave,dodged){
  if(!userId)return;
  localStorage.setItem(KEY,name);
  try{
    await supabase.from('neon_dodge_scores').insert({username:name,score:Math.round(time*10)/10,wave:wave,dodged:dodged,user_id:userId});
    loadBoard();
  }catch(e){console.warn('Submit:',e);}
}

// hook into death
var origDie=window.die;
var _checkDeath=setInterval(function(){
  if(!document.getElementById('overlay').classList.contains('hidden')&&document.getElementById('overlay').querySelector('button').textContent==='RETRY'){
    clearInterval(_checkDeath);
  }
},200);

// observe overlay for death
var obs=new MutationObserver(function(){
  var ov=document.getElementById('overlay');
  if(!ov.classList.contains('hidden')){
    var btn=ov.querySelector('button');
    if(btn&&btn.textContent==='RETRY'){
      lb.style.display='block';
      loadBoard();
      var st=window._dodgeGame.getState();
      if(st.time>1){
        var savedName=localStorage.getItem(KEY);
        if(savedName){
          submitScore(savedName,st.time,st.wave,st.dodged);
        }else{
          nameBox.style.display='block';
          pname.focus();
        }
      }
    }
  }else{
    lb.style.display='none';
    nameBox.style.display='none';
  }
});
obs.observe(document.getElementById('overlay'),{attributes:true,attributeFilter:['class']});

pnameOk.addEventListener('click',function(){
  var n=pname.value.trim();
  if(!n)return;
  nameBox.style.display='none';
  var st=window._dodgeGame.getState();
  submitScore(n,st.time,st.wave,st.dodged);
});
pname.addEventListener('keydown',function(e){if(e.key==='Enter')pnameOk.click();});
</script>
</body>
</html>
