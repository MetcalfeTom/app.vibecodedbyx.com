<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Soup Weather Forecast</title>
<link rel="icon" href="https://emojicdn.elk.sh/🍜">
<meta property="og:title" content="Soup Weather Forecast">
<meta property="og:description" content="Today's forecast: broth gales with a chance of meatball tornadoes and crouton hail.">
<meta property="og:url" content="https://app.sloppy.live/soup-weather/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/weather%20forecast%20map%20made%20of%20soup%20meatball%20tornadoes%20noodle%20lightning%20broth%20ocean%20cartoon?width=1200&height=630&nologo=true&referrer=sloppy.live">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;900&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden;background:#1a0e04;font-family:'Crimson Pro',serif;color:#f0e0c0}
body{display:flex;flex-direction:column;min-height:100vh}

#header{text-align:center;padding:20px 16px 10px;background:linear-gradient(180deg,#2a1808,#1a0e04)}
h1{font-family:'Anybody',sans-serif;font-size:clamp(22px,5vw,38px);font-weight:900;color:#ff8c00;text-shadow:0 2px 12px rgba(255,140,0,0.3);letter-spacing:2px}
#subtitle{font-size:clamp(11px,2vw,14px);color:#996633;margin-top:4px;letter-spacing:1px}
#ticker{width:100%;overflow:hidden;background:rgba(255,60,0,0.08);border-top:1px solid rgba(255,100,0,0.15);border-bottom:1px solid rgba(255,100,0,0.15);padding:6px 0;white-space:nowrap}
#ticker-text{display:inline-block;animation:scroll 30s linear infinite;font-family:'Anybody',sans-serif;font-size:12px;font-weight:700;color:#ff4400;letter-spacing:1px}
@keyframes scroll{0%{transform:translateX(100vw)}100%{transform:translateX(-200%)}}

#main{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 16px;max-width:900px;margin:0 auto;width:100%}
@media(max-width:600px){#main{grid-template-columns:1fr}}

.card{background:rgba(40,22,8,0.6);border:1px solid rgba(255,140,0,0.1);border-radius:8px;padding:16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,140,0,0.3),transparent)}
.card-title{font-family:'Anybody',sans-serif;font-size:11px;font-weight:700;color:#cc6600;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}

#current{grid-column:1/-1}
#current-inner{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center}
#current-icon{font-size:clamp(48px,12vw,80px);line-height:1}
#current-info{text-align:center}
#current-temp{font-family:'Anybody',sans-serif;font-size:clamp(36px,8vw,60px);font-weight:900;color:#ff8c00;line-height:1}
#current-temp span{font-size:0.5em;color:#996633}
#current-desc{font-size:clamp(14px,3vw,18px);color:#cc9966;margin-top:4px}
#current-detail{font-size:12px;color:#886644;margin-top:6px;line-height:1.8}

.forecast-day{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,140,0,0.06)}
.forecast-day:last-child{border:none}
.fd-icon{font-size:28px;width:36px;text-align:center}
.fd-name{font-family:'Anybody',sans-serif;font-size:12px;font-weight:700;color:#cc8844;width:50px}
.fd-desc{flex:1;font-size:12px;color:#aa8866;line-height:1.4}
.fd-temp{font-family:'Anybody',sans-serif;font-size:16px;font-weight:900;color:#ff8c00;white-space:nowrap}

#alerts .alert-item{padding:8px 10px;margin-bottom:6px;border-radius:4px;font-size:12px;line-height:1.5}
.alert-red{background:rgba(255,40,0,0.1);border-left:3px solid #ff2800;color:#ff8866}
.alert-orange{background:rgba(255,140,0,0.08);border-left:3px solid #ff8c00;color:#ddaa66}
.alert-yellow{background:rgba(255,220,0,0.06);border-left:3px solid #ffcc00;color:#ccaa44}

#soup-map{position:relative;overflow:hidden;min-height:180px}
#soup-map canvas{width:100%;height:100%;border-radius:4px}

#stats .stat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,140,0,0.05);font-size:13px}
.stat-label{color:#886644}
.stat-val{color:#ff8c00;font-family:'Anybody',sans-serif;font-weight:700}

#backlink{text-align:center;padding:8px;font-size:10px}
#backlink a{color:#553322;text-decoration:none}
#backlink a:hover{color:#ff8c00}
</style>
</head>
<body>
<div id="header">
  <h1>🍜 SOUP WEATHER SERVICE</h1>
  <div id="subtitle">National Broth-eological Administration — Est. 1847</div>
</div>
<div id="ticker"><div id="ticker-text"></div></div>
<div id="main">
  <div class="card" id="current">
    <div class="card-title">Current Conditions</div>
    <div id="current-inner">
      <div id="current-icon"></div>
      <div id="current-info">
        <div id="current-temp"></div>
        <div id="current-desc"></div>
        <div id="current-detail"></div>
      </div>
    </div>
  </div>
  <div class="card" id="forecast">
    <div class="card-title">5-Day Forecast</div>
    <div id="forecast-list"></div>
  </div>
  <div class="card" id="alerts">
    <div class="card-title">⚠ Soup Advisories</div>
    <div id="alert-list"></div>
  </div>
  <div class="card" id="soup-map">
    <div class="card-title">Broth Pressure Map</div>
    <canvas id="map-canvas"></canvas>
  </div>
  <div class="card" id="stats">
    <div class="card-title">Soup Metrics</div>
    <div id="stats-list"></div>
  </div>
</div>
<div id="backlink"><a href="https://sloppy.live" target="_blank">sloppy.live</a></div>

<script>
// Soup weather data generator
const ICONS = ['🍲','🥣','🍜','🫕','🥘','🌪️','⛈️','🌊','❄️','☀️','🌶️','🧅','🥕','🫘','🧄'];

const CONDITIONS = [
  { icon:'🍲', name:'Thick Broth Fog', detail:'Visibility reduced to one ladle. Chicken stock advisory in effect.' },
  { icon:'🌪️', name:'Meatball Tornado Warning', detail:'Category 3 meatball cyclone approaching from the east. Seek pasta shelter immediately.' },
  { icon:'🥣', name:'Clear Consommé Skies', detail:'Beautiful day for a picnic. Low broth humidity. Crouton UV index: moderate.' },
  { icon:'⛈️', name:'Noodle Lightning Storm', detail:'Spaghetti bolts expected through the evening. Ramen thunder advisory.' },
  { icon:'🌊', name:'Broth Gale Force Winds', detail:'Sustained broth winds at 45 ladles/hr. Small bowls should remain indoors.' },
  { icon:'🫕', name:'Fondue Heat Wave', detail:'Extreme cheese temperatures. Molten broth warnings for low-lying bowls.' },
  { icon:'❄️', name:'Gazpacho Cold Front', detail:'Temperatures plummeting to chilled. Expect frozen pea precipitation.' },
  { icon:'🌶️', name:'Spice Hurricane', detail:'Capsaicin levels off the charts. Scoville winds gusting to 500,000 SHU.' },
  { icon:'🥘', name:'Stew Pressure System', detail:'High pressure stewfront moving in. Thick and hearty conditions through Tuesday.' },
  { icon:'☀️', name:'Warm Minestrone Morning', detail:'Pleasant vegetable sunshine with light herb breezes. Perfect simmering weather.' },
];

const FORECASTS = [
  { icon:'🍲', desc:'Broth showers, clearing by noon', hi:212, lo:185 },
  { icon:'🌪️', desc:'MEATBALL TORNADO — stay indoors', hi:240, lo:200 },
  { icon:'🥣', desc:'Partly cloudy with dumpling clusters', hi:195, lo:170 },
  { icon:'⛈️', desc:'Heavy noodle precipitation, 90%', hi:208, lo:190 },
  { icon:'🌊', desc:'Broth gales subsiding by evening', hi:200, lo:178 },
  { icon:'🫕', desc:'Molten fondue advisory til 6PM', hi:350, lo:280 },
  { icon:'❄️', desc:'Vichyssoise freeze warning', hi:40, lo:28 },
  { icon:'🌶️', desc:'Extreme spice — evacuation possible', hi:999, lo:500 },
  { icon:'🥘', desc:'Thick stew, slow moving fronts', hi:215, lo:195 },
  { icon:'☀️', desc:'Clear broth, beautiful simmer day', hi:190, lo:165 },
  { icon:'🧅', desc:'Onion soup fog rolling in at dusk', hi:200, lo:182 },
  { icon:'🥕', desc:'Root vegetable hail expected', hi:188, lo:160 },
  { icon:'🫘', desc:'Bean front collision — flatulence risk', hi:205, lo:185 },
];

const ALERTS = [
  { level:'red', text:'🔴 MEATBALL TORNADO WARNING: Massive meatball rotation detected over the Broth Basin. All residents should seek shelter in the nearest bread bowl IMMEDIATELY.' },
  { level:'red', text:'🔴 EXTREME SPICE ALERT: Capsaicin levels have exceeded safe thresholds. Do NOT consume outdoor soup without protective bread.' },
  { level:'orange', text:'🟠 BROTH GALE ADVISORY: Sustained broth winds exceeding 40 ladles/hour. Secure all croutons and garnishes.' },
  { level:'orange', text:'🟠 NOODLE FLOOD WATCH: Excessive ramen accumulation expected. Pasta drainage systems may overflow.' },
  { level:'yellow', text:'🟡 CROUTON HAIL NOTICE: Small to medium crouton hail expected this afternoon. Parmesan accumulation of 2-4 inches.' },
  { level:'yellow', text:'🟡 DUMPLING FOG ADVISORY: Dense dumpling fog reducing visibility to under 3 ladles through tomorrow morning.' },
  { level:'orange', text:'🟠 FONDUE OVERFLOW RISK: Cheese levels in the western basin are critically high. Bread reserves at 40%.' },
  { level:'yellow', text:'🟡 HERB POLLEN ALERT: High basil and cilantro counts. Individuals with seasoning sensitivities should stay indoors.' },
  { level:'red', text:'🔴 BOILING POINT EXCEEDED: Soup surface temperatures have crossed critical threshold. Rolling boil imminent across all sectors.' },
];

const TICKER_ITEMS = [
  '🍲 BREAKING: Meatball tornado touches down in Brothville, 14 bowls displaced',
  '⚠️ Crouton hail accumulation reaches record 6 inches in Soupsburg County',
  '🌡️ Broth temperatures hit all-time high of 215°F in the Noodle District',
  '🫘 Bean front collision creates 40-mile-wide flatulence zone — masks advised',
  '🧅 French Onion fog causes 12-bowl pileup on Highway Soup-1',
  '🌶️ Scoville Index off the charts — ghost pepper squall approaching',
  '🥕 ROOT VEGETABLES falling from sky in western provinces — 3 inch carrot chunks reported',
  '🍜 Ramen tidal wave warning issued for entire coast — noodle surge up to 8 feet',
  '📡 NOAA (National Oceanic & Aromatic Administration) upgrades broth storm to Category 4',
  '🧄 Garlic bread shortage declared as citizens stockpile ahead of approaching stewfront',
  '❄️ Gazpacho snap freezes outdoor dining areas — cold soup advisory extended through Friday',
  '🫕 Fondue volcano eruption in Swiss Alps sends cheese flows into neighboring valleys',
];

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function seededRandom(seed) {
  let s = seed;
  return function() { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; };
}

function generateWeather() {
  // Seed based on date so it changes daily
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
  const rng = seededRandom(seed);

  // Current conditions
  const current = CONDITIONS[Math.floor(rng() * CONDITIONS.length)];
  const temp = Math.floor(150 + rng() * 200);
  document.getElementById('current-icon').textContent = current.icon;
  document.getElementById('current-temp').innerHTML = temp + '<span>°F</span>';
  document.getElementById('current-desc').textContent = current.name;
  document.getElementById('current-detail').textContent = current.detail;

  // 5-day forecast
  const list = document.getElementById('forecast-list');
  list.innerHTML = '';
  const dayIdx = today.getDay();
  for (let i = 1; i <= 5; i++) {
    const f = FORECASTS[Math.floor(rng() * FORECASTS.length)];
    const day = DAYS[(dayIdx + i) % 7];
    const div = document.createElement('div');
    div.className = 'forecast-day';
    div.innerHTML = '<div class="fd-icon">'+f.icon+'</div><div class="fd-name">'+day.slice(0,3)+'</div><div class="fd-desc">'+f.desc+'</div><div class="fd-temp">'+f.hi+'°/'+f.lo+'°</div>';
    list.appendChild(div);
  }

  // Alerts
  const alertList = document.getElementById('alert-list');
  alertList.innerHTML = '';
  const numAlerts = 2 + Math.floor(rng() * 3);
  const used = new Set();
  for (let i = 0; i < numAlerts; i++) {
    let idx;
    do { idx = Math.floor(rng() * ALERTS.length); } while (used.has(idx));
    used.add(idx);
    const a = ALERTS[idx];
    const div = document.createElement('div');
    div.className = 'alert-item alert-' + a.level;
    div.textContent = a.text;
    alertList.appendChild(div);
  }

  // Stats
  const statsList = document.getElementById('stats-list');
  const stats = [
    ['Broth Humidity', Math.floor(40+rng()*55) + '%'],
    ['Noodle Density', (rng()*10).toFixed(1) + ' strands/cm³'],
    ['Crouton Wind Speed', Math.floor(5+rng()*50) + ' ladles/hr'],
    ['Meatball Barometric', (28+rng()*4).toFixed(2) + ' mBowls'],
    ['Parmesan UV Index', Math.floor(1+rng()*11) + '/10'],
    ['Simmer Probability', Math.floor(50+rng()*50) + '%'],
    ['Seasoning Pollen Count', Math.floor(rng()*800) + ' ppm'],
    ['Bread Bowl Reserves', Math.floor(20+rng()*80) + '%'],
  ];
  statsList.innerHTML = '';
  stats.forEach(([label, val]) => {
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = '<span class="stat-label">'+label+'</span><span class="stat-val">'+val+'</span>';
    statsList.appendChild(row);
  });

  // Ticker
  const shuffled = [...TICKER_ITEMS].sort(() => rng()-0.5);
  document.getElementById('ticker-text').textContent = shuffled.slice(0,6).join('  ·  ') + '  ·  ';
}

// Broth pressure map
const mapCanvas = document.getElementById('map-canvas');
const mCtx = mapCanvas.getContext('2d');

function resizeMap() {
  const rect = mapCanvas.parentElement.getBoundingClientRect();
  mapCanvas.width = Math.floor(rect.width - 32);
  mapCanvas.height = Math.max(150, Math.floor(rect.height - 40));
  drawMap();
}

let mapFrame = 0;
function drawMap() {
  const w = mapCanvas.width, h = mapCanvas.height;
  mCtx.clearRect(0,0,w,h);

  // Background - broth ocean
  const grad = mCtx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0, '#2a1a08');
  grad.addColorStop(0.5, '#332010');
  grad.addColorStop(1, '#2a1808');
  mCtx.fillStyle = grad;
  mCtx.fillRect(0,0,w,h);

  // Pressure contours
  const time = mapFrame * 0.01;
  for (let i = 0; i < 5; i++) {
    const cx = w*(0.2+i*0.15) + Math.sin(time+i*2)*w*0.08;
    const cy = h*(0.3+Math.sin(time*0.7+i)*0.2);
    const r = 30 + Math.sin(time+i)*15;
    mCtx.strokeStyle = i%2===0 ? 'rgba(255,140,0,0.2)' : 'rgba(255,60,0,0.15)';
    mCtx.lineWidth = 1;
    for (let ring = 0; ring < 3; ring++) {
      mCtx.beginPath();
      mCtx.arc(cx, cy, r+ring*15, 0, Math.PI*2);
      mCtx.stroke();
    }
    // Label
    mCtx.fillStyle = 'rgba(255,140,0,0.4)';
    mCtx.font = '9px Anybody';
    mCtx.textAlign = 'center';
    mCtx.fillText(i%2===0?'H':'L', cx, cy+3);
  }

  // Meatball icons
  const meatballEmoji = '🟤';
  mCtx.font = '14px serif';
  for (let i = 0; i < 3; i++) {
    const mx = w*0.2 + Math.sin(time*0.5+i*3)*w*0.3;
    const my = h*0.3 + Math.cos(time*0.4+i*2)*h*0.25;
    mCtx.fillText(meatballEmoji, mx, my);
  }

  // Noodle fronts (wavy lines)
  mCtx.strokeStyle = 'rgba(255,200,100,0.2)';
  mCtx.lineWidth = 2;
  mCtx.setLineDash([4,4]);
  for (let f = 0; f < 2; f++) {
    mCtx.beginPath();
    for (let x = 0; x < w; x += 3) {
      const y = h*(0.3+f*0.35) + Math.sin(x*0.03+time+f*2)*15 + Math.sin(x*0.07+time*1.5)*8;
      if (x===0) mCtx.moveTo(x,y); else mCtx.lineTo(x,y);
    }
    mCtx.stroke();
  }
  mCtx.setLineDash([]);

  // Tornado symbol
  const tx = w*0.6+Math.sin(time*0.3)*w*0.15;
  const ty = h*0.5+Math.cos(time*0.4)*h*0.15;
  mCtx.strokeStyle = 'rgba(255,40,0,0.4)';
  mCtx.lineWidth = 2;
  mCtx.beginPath();
  for (let a = 0; a < Math.PI*6; a += 0.1) {
    const r2 = 15 - a*0.7;
    if (r2 < 2) break;
    const px = tx + Math.cos(a+time)*r2;
    const py = ty + a*2.5 - 15;
    if (a===0) mCtx.moveTo(px,py); else mCtx.lineTo(px,py);
  }
  mCtx.stroke();
  mCtx.fillStyle = 'rgba(255,60,0,0.3)';
  mCtx.font = '8px Anybody';
  mCtx.fillText('MEATBALL', tx-18, ty+25);
  mCtx.fillText('TORNADO', tx-16, ty+34);

  // Wind arrows
  mCtx.strokeStyle = 'rgba(200,160,100,0.15)';
  mCtx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const ax = w*0.1 + (i%4)*w*0.25;
    const ay = h*0.2 + Math.floor(i/4)*h*0.5;
    const angle = Math.sin(time+i)*0.5 + i*0.3;
    const len = 12;
    mCtx.beginPath();
    mCtx.moveTo(ax, ay);
    mCtx.lineTo(ax+Math.cos(angle)*len, ay+Math.sin(angle)*len);
    mCtx.lineTo(ax+Math.cos(angle)*len-Math.cos(angle-0.5)*4, ay+Math.sin(angle)*len-Math.sin(angle-0.5)*4);
    mCtx.stroke();
  }

  mapFrame++;
}

resizeMap();
window.addEventListener('resize', resizeMap);
generateWeather();

function animateMap() {
  drawMap();
  requestAnimationFrame(animateMap);
}
animateMap();
</script>
</body>
</html>
