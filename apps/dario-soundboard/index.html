<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Dario Soundboard</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🎙️">
  <meta property="og:title" content="The Dario Soundboard">
  <meta property="og:description" content="Press a button. Hear Dario wisdom. Notable quotes from public talks and interviews.">
  <meta property="og:url" content="https://app.sloppy.live/dario-soundboard">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/minimalist%20portrait%20silhouette%20at%20podium%20with%20microphone%20warm%20amber%20spotlight%20dark%20background%20editorial?width=1200&height=630&seed=4217&nologo=true">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 100%; }

    :root {
      --bg: #0e0c10;
      --surface: #1a171e;
      --card: #201d25;
      --border: #2e2a34;
      --accent: #e8a44a;
      --accent2: #d4783a;
      --text: #ece6f0;
      --dim: #7a7282;
      --safety: #5ec4a8;
      --scaling: #7ba4e8;
      --vision: #c78be8;
      --real: #e87b7b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Newsreader', serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(232,164,74,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(199,139,232,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 52rem;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .eyebrow {
      font-family: 'Azeret Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 0.4rem;
    }

    h1 {
      font-size: clamp(2.2rem, 5.5vw, 3.8rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    .subtitle {
      font-style: italic;
      font-size: 1rem;
      color: var(--dim);
      margin-top: 0.4rem;
    }

    .disclaimer {
      font-family: 'Azeret Mono', monospace;
      font-size: 0.55rem;
      color: var(--dim);
      margin-top: 0.75rem;
      line-height: 1.6;
      max-width: 28rem;
      margin-left: auto;
      margin-right: auto;
    }

    /* Category filter */
    .filters {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'Azeret Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      min-height: 2.75rem;
    }

    .filter-btn:hover { border-color: var(--dim); color: var(--text); }
    .filter-btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,164,74,0.08);
    }

    /* Quote grid */
    .quote-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(14rem, 1fr));
      gap: 0.75rem;
    }

    .quote-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem 1rem 0.75rem;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .quote-card:hover {
      transform: translateY(-2px);
      border-color: var(--cat-color, var(--accent));
    }

    .quote-card:active, .quote-card.speaking {
      transform: scale(0.97);
      border-color: var(--cat-color, var(--accent));
      box-shadow: 0 0 1.2rem color-mix(in srgb, var(--cat-color, var(--accent)) 25%, transparent);
    }

    .quote-card .ripple {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle, var(--cat-color, var(--accent)) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
    }

    .quote-card.speaking .ripple {
      animation: qRipple 0.4s ease-out;
    }

    @keyframes qRipple {
      0% { opacity: 0.15; transform: scale(0.6); }
      100% { opacity: 0; transform: scale(1.2); }
    }

    .quote-card .cat-tag {
      font-family: 'Azeret Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cat-color, var(--dim));
      align-self: flex-start;
    }

    .quote-card .quote-text {
      font-size: 0.95rem;
      line-height: 1.45;
      flex: 1;
    }

    .quote-card .quote-src {
      font-family: 'Azeret Mono', monospace;
      font-size: 0.5rem;
      color: var(--dim);
      margin-top: auto;
    }

    /* Speaking indicator */
    .quote-card.speaking::after {
      content: '🔊';
      position: absolute;
      top: 0.6rem;
      right: 0.7rem;
      font-size: 0.9rem;
      animation: speakBounce 0.5s ease-in-out infinite alternate;
    }

    @keyframes speakBounce {
      0% { transform: scale(1); }
      100% { transform: scale(1.15); }
    }

    /* Voice controls */
    .voice-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .voice-controls label {
      font-family: 'Azeret Mono', monospace;
      font-size: 0.55rem;
      color: var(--dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .voice-slider {
      -webkit-appearance: none;
      width: 5rem;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    .voice-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    .stop-btn {
      font-family: 'Azeret Mono', monospace;
      font-size: 0.6rem;
      padding: 0.4rem 0.8rem;
      border-radius: 0.4rem;
      border: 1px solid var(--real);
      background: transparent;
      color: var(--real);
      cursor: pointer;
      min-height: 2.75rem;
      transition: background 0.15s;
    }

    .stop-btn:hover {
      background: rgba(232,123,123,0.1);
    }

    .stop-btn:focus-visible {
      outline: 3px solid var(--real);
      outline-offset: 2px;
    }

    .status-line {
      text-align: center;
      font-family: 'Azeret Mono', monospace;
      font-size: 0.55rem;
      color: var(--dim);
      margin-top: 1rem;
      min-height: 1.2em;
    }

    /* SFX row */
    .sfx-row {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }

    .sfx-btn {
      font-family: 'Azeret Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.7rem 1.2rem;
      border-radius: 0.6rem;
      border: 2px solid var(--accent2);
      background: rgba(212,120,58,0.08);
      color: var(--accent2);
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.15s, background 0.15s;
      min-height: 2.75rem;
      user-select: none;
    }

    .sfx-btn:hover {
      background: rgba(212,120,58,0.15);
      box-shadow: 0 0 1rem rgba(212,120,58,0.2);
    }

    .sfx-btn:active, .sfx-btn.firing {
      transform: scale(0.93);
      background: rgba(212,120,58,0.22);
      box-shadow: 0 0 1.5rem rgba(212,120,58,0.35);
    }

    .sfx-btn:focus-visible {
      outline: 3px solid var(--accent2);
      outline-offset: 2px;
    }

    .sfx-label {
      font-family: 'Azeret Mono', monospace;
      font-size: 0.5rem;
      color: var(--dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    @media (max-width: 600px) {
      main { padding: 1.5rem 0.75rem 2rem; }
      .quote-grid { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      .quote-card { transition: none; }
      .quote-card.speaking .ripple { animation: none; }
      .quote-card.speaking::after { animation: none; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">soundboard &middot; text-to-speech edition</p>
      <h1>The Dario <em>Soundboard</em></h1>
      <p class="subtitle">Notable quotes from public talks, essays &amp; interviews</p>
      <p class="disclaimer">Quotes are sourced from public interviews, essays, and congressional testimony.
        Audio is generated by your browser's text-to-speech engine, not real recordings.</p>
    </header>

    <div class="filters" role="group" aria-label="Filter by category" id="filters"></div>

    <p class="sfx-label">Sound Effects</p>
    <div class="sfx-row">
      <button type="button" class="sfx-btn" id="sighBtn" aria-label="Dramatic sigh">😮‍💨 Dramatic Sigh</button>
      <button type="button" class="sfx-btn" id="chuckleBtn" aria-label="Nervous chuckle">😅 Nervous Chuckle</button>
    </div>

    <div class="quote-grid" id="quoteGrid"></div>

    <div class="voice-controls">
      <label for="rateSlider">Speed</label>
      <input type="range" class="voice-slider" id="rateSlider" min="0.6" max="1.6" step="0.1" value="1.0">
      <label for="pitchSlider">Pitch</label>
      <input type="range" class="voice-slider" id="pitchSlider" min="0.7" max="1.3" step="0.1" value="0.9">
      <button type="button" class="stop-btn" id="stopBtn">STOP</button>
    </div>

    <p class="status-line" id="statusLine" role="status" aria-live="polite"></p>
  </main>

<script>
(function(){
  'use strict';

  var CATS = {
    safety:  { label: 'Safety',  color: 'var(--safety)' },
    scaling: { label: 'Scaling', color: 'var(--scaling)' },
    vision:  { label: 'Vision',  color: 'var(--vision)'  },
    real:    { label: 'Real Talk', color: 'var(--real)' }
  };

  var QUOTES = [
    // Safety
    { cat:'safety', text:"The companies that are building the most powerful AI systems should be the most worried about safety. If you're not worried, you don't understand what you're building.", src:'Interview, 2024' },
    { cat:'safety', text:"I think the responsible thing to do is to try to build these systems and make them safe, rather than to stand on the sidelines.", src:'Lex Fridman, 2023' },
    { cat:'safety', text:"If we do our jobs right, we won't just avoid catastrophe — we'll build AI systems that genuinely help humanity flourish.", src:'Machines of Loving Grace, 2024' },
    { cat:'safety', text:"The thing that I lose sleep over is: what if we get the alignment problem wrong? What if we build something smarter than us and it doesn't share our values?", src:'Interview, 2023' },
    { cat:'safety', text:"We test our models like we test bridges — not because we expect them to fail, but because the consequences of failure are so severe.", src:'Congressional testimony, 2023' },
    { cat:'safety', text:"Safety and capability are not at odds. The safest systems will also be the most capable and useful ones.", src:'Anthropic blog, 2024' },

    // Scaling
    { cat:'scaling', text:"There's a fairly predictable relationship between the amount of compute you put in and how capable the model is. That's the scaling law.", src:'Interview, 2023' },
    { cat:'scaling', text:"The models are getting better and better. And they're getting better at a pace that I think most people outside the field don't fully appreciate.", src:'Lex Fridman, 2023' },
    { cat:'scaling', text:"We're in an era where if you train a bigger model on more data, it just... works better. That's a remarkable and somewhat unsettling empirical fact.", src:'Interview, 2024' },
    { cat:'scaling', text:"I think there's something deeply important about the fact that intelligence can emerge from relatively simple training objectives applied at scale.", src:'Interview, 2024' },
    { cat:'scaling', text:"The scaling curves don't show signs of stopping. That's exciting and terrifying in roughly equal measure.", src:'Interview, 2023' },

    // Vision
    { cat:'vision', text:"Imagine a world where every person has access to a brilliant, patient tutor, a knowledgeable doctor, a skilled lawyer — that's what AI can be.", src:'Machines of Loving Grace, 2024' },
    { cat:'vision', text:"The most powerful use of AI will be in biology and medicine. We could compress a hundred years of progress into five or ten.", src:'Machines of Loving Grace, 2024' },
    { cat:'vision', text:"I think we are building one of the most transformative and potentially dangerous technologies in human history. And I think we should act like it.", src:'Interview, 2023' },
    { cat:'vision', text:"The best case scenario is not just avoiding bad outcomes. It's creating genuinely amazing, wonderful outcomes for humanity.", src:'Machines of Loving Grace, 2024' },
    { cat:'vision', text:"If powerful AI is coming regardless, I'd rather be at the table trying to build it responsibly than watching from the sidelines.", src:'Interview, 2024' },
    { cat:'vision', text:"I actually think the world in which AI goes well is so radically good that it's hard to even imagine.", src:'Machines of Loving Grace, 2024' },

    // Real Talk
    { cat:'real', text:"I am not a doomer. I am not an accelerationist. I'm just trying to navigate this as carefully and honestly as I can.", src:'Interview, 2024' },
    { cat:'real', text:"Starting Anthropic was in many ways an act of desperation. We felt like the most important technology in the world was being developed without enough attention to safety.", src:'Interview, 2023' },
    { cat:'real', text:"People ask me if I think AI will take their job. I think the honest answer is: I don't know, and anyone who tells you they do is not being straight with you.", src:'Interview, 2024' },
    { cat:'real', text:"Running an AI company sometimes feels like building a plane while flying it while also trying to write the aviation regulations.", src:'Interview, 2024' },
    { cat:'real', text:"My background is in biophysics. I fell into AI because I realized it was going to be the most consequential technology of our era.", src:'Lex Fridman, 2023' },
    { cat:'real', text:"We named the company Anthropic because we wanted to keep the focus on what matters most: humans.", src:'Interview, 2023' }
  ];

  // ─── Build UI ───
  var filtersEl = document.getElementById('filters');
  var gridEl = document.getElementById('quoteGrid');
  var statusEl = document.getElementById('statusLine');
  var activeFilter = 'all';

  // Filter buttons
  var allBtn = document.createElement('button');
  allBtn.type = 'button';
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'ALL';
  allBtn.addEventListener('click', function(){ setFilter('all'); });
  filtersEl.appendChild(allBtn);

  Object.keys(CATS).forEach(function(k) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'filter-btn';
    btn.textContent = CATS[k].label;
    btn.dataset.cat = k;
    btn.addEventListener('click', function(){ setFilter(k); });
    filtersEl.appendChild(btn);
  });

  function setFilter(cat) {
    activeFilter = cat;
    filtersEl.querySelectorAll('.filter-btn').forEach(function(b) {
      b.classList.toggle('active',
        cat === 'all' ? !b.dataset.cat : b.dataset.cat === cat
      );
    });
    renderGrid();
  }

  // Quote cards
  function renderGrid() {
    gridEl.innerHTML = '';
    QUOTES.forEach(function(q, i) {
      if (activeFilter !== 'all' && q.cat !== activeFilter) return;

      var card = document.createElement('div');
      card.className = 'quote-card';
      card.style.setProperty('--cat-color', CATS[q.cat].color);
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', CATS[q.cat].label + ' quote: ' + q.text.slice(0, 50) + '…');
      card.dataset.idx = i;

      card.innerHTML =
        '<div class="ripple"></div>' +
        '<span class="cat-tag">' + CATS[q.cat].label + '</span>' +
        '<p class="quote-text">"' + q.text + '"</p>' +
        '<span class="quote-src">— ' + q.src + '</span>';

      card.addEventListener('click', function() { speak(i, card); });
      card.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); speak(i, card); }
      });

      gridEl.appendChild(card);
    });
  }

  // ─── Speech ───
  var synth = window.speechSynthesis;
  var currentCard = null;

  function speak(idx, card) {
    synth.cancel();
    if (currentCard) currentCard.classList.remove('speaking');

    var q = QUOTES[idx];
    var utter = new SpeechSynthesisUtterance(q.text);
    utter.rate = parseFloat(document.getElementById('rateSlider').value);
    utter.pitch = parseFloat(document.getElementById('pitchSlider').value);

    // Try to pick a deeper male voice
    var voices = synth.getVoices();
    var preferred = voices.find(function(v) {
      return /daniel|james|david|google us english|aaron/i.test(v.name);
    }) || voices.find(function(v) {
      return v.lang.startsWith('en') && /male/i.test(v.name);
    }) || voices.find(function(v) {
      return v.lang.startsWith('en');
    });
    if (preferred) utter.voice = preferred;

    card.classList.add('speaking');
    currentCard = card;
    statusEl.textContent = 'speaking…';

    utter.onend = function() {
      card.classList.remove('speaking');
      currentCard = null;
      statusEl.textContent = '';
    };

    utter.onerror = function() {
      card.classList.remove('speaking');
      currentCard = null;
      statusEl.textContent = 'speech unavailable in this browser';
    };

    synth.speak(utter);
  }

  document.getElementById('stopBtn').addEventListener('click', function() {
    synth.cancel();
    if (currentCard) currentCard.classList.remove('speaking');
    currentCard = null;
    statusEl.textContent = '';
  });

  // Preload voices (Chrome fires voiceschanged async)
  if (synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = function() { synth.getVoices(); };
  }
  synth.getVoices();

  // Keyboard: Escape = stop
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      synth.cancel();
      if (currentCard) currentCard.classList.remove('speaking');
      currentCard = null;
      statusEl.textContent = '';
    }
  });

  renderGrid();

  // ─── SFX: Web Audio synthesized sigh & chuckle ───
  var aCtx = null;

  function getACtx() {
    if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
    return aCtx;
  }

  function fireBtn(btn) {
    btn.classList.remove('firing');
    void btn.offsetWidth;
    btn.classList.add('firing');
    setTimeout(function(){ btn.classList.remove('firing'); }, 400);
  }

  // Dramatic sigh: breathy noise sweep down + pitched sine descend
  function playSigh() {
    var ac = getACtx();
    var t = ac.currentTime;
    var dur = 1.4;

    // Breathy noise (the exhale)
    var len = ac.sampleRate * dur;
    var buf = ac.createBuffer(1, len, ac.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    var src = ac.createBufferSource();
    src.buffer = buf;

    var bp = ac.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(1400, t);
    bp.frequency.exponentialRampToValueAtTime(500, t + dur);
    bp.Q.value = 0.8;

    var lp = ac.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(3200, t);
    lp.frequency.exponentialRampToValueAtTime(800, t + dur);

    var ng = ac.createGain();
    ng.gain.setValueAtTime(0, t);
    ng.gain.linearRampToValueAtTime(0.28, t + 0.08);
    ng.gain.setValueAtTime(0.28, t + 0.15);
    ng.gain.linearRampToValueAtTime(0.22, t + 0.5);
    ng.gain.exponentialRampToValueAtTime(0.001, t + dur);

    src.connect(bp); bp.connect(lp); lp.connect(ng); ng.connect(ac.destination);
    src.start(t); src.stop(t + dur);

    // Vocal tone (pitched descent, slightly nasal)
    var o = ac.createOscillator();
    var o2 = ac.createOscillator();
    var vg = ac.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(280, t);
    o.frequency.exponentialRampToValueAtTime(140, t + dur * 0.9);
    o2.type = 'sine';
    o2.frequency.setValueAtTime(560, t);
    o2.frequency.exponentialRampToValueAtTime(280, t + dur * 0.9);
    var o2g = ac.createGain();
    o2g.gain.value = 0.12;

    vg.gain.setValueAtTime(0, t);
    vg.gain.linearRampToValueAtTime(0.14, t + 0.06);
    vg.gain.setValueAtTime(0.14, t + 0.12);
    vg.gain.linearRampToValueAtTime(0.09, t + 0.6);
    vg.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.85);

    o.connect(vg); o2.connect(o2g); o2g.connect(vg); vg.connect(ac.destination);
    o.start(t); o.stop(t + dur);
    o2.start(t); o2.stop(t + dur);
  }

  // Nervous chuckle: rapid staccato bursts of pitched noise + sine pops
  function playChuckle() {
    var ac = getACtx();
    var t = ac.currentTime;

    // 5-6 rapid "ha" bursts
    var bursts = [0, 0.11, 0.21, 0.29, 0.38, 0.50];
    var pitches = [310, 340, 320, 350, 300, 280];

    bursts.forEach(function(off, i) {
      var bt = t + off;
      var burstDur = 0.065;

      // Noise burst (breathy "h")
      var nLen = ac.sampleRate * burstDur;
      var buf = ac.createBuffer(1, nLen, ac.sampleRate);
      var d = buf.getChannelData(0);
      for (var j = 0; j < nLen; j++) d[j] = Math.random() * 2 - 1;
      var src = ac.createBufferSource();
      src.buffer = buf;
      var f = ac.createBiquadFilter();
      f.type = 'bandpass';
      f.frequency.value = 2200;
      f.Q.value = 0.6;
      var g = ac.createGain();
      var vol = i < 2 ? 0.18 : (i < 4 ? 0.14 : 0.08);
      g.gain.setValueAtTime(0, bt);
      g.gain.linearRampToValueAtTime(vol, bt + 0.008);
      g.gain.exponentialRampToValueAtTime(0.001, bt + burstDur);
      src.connect(f); f.connect(g); g.connect(ac.destination);
      src.start(bt); src.stop(bt + burstDur);

      // Vocal "a" tone
      var o = ac.createOscillator();
      var og = ac.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(pitches[i], bt);
      o.frequency.exponentialRampToValueAtTime(pitches[i] * 0.85, bt + burstDur);
      og.gain.setValueAtTime(0, bt);
      og.gain.linearRampToValueAtTime(0.1, bt + 0.005);
      og.gain.exponentialRampToValueAtTime(0.001, bt + burstDur);
      o.connect(og); og.connect(ac.destination);
      o.start(bt); o.stop(bt + burstDur + 0.01);
    });
  }

  document.getElementById('sighBtn').addEventListener('click', function() {
    fireBtn(this);
    playSigh();
    statusEl.textContent = '*sighs dramatically*';
    setTimeout(function(){ statusEl.textContent = ''; }, 1800);
  });

  document.getElementById('chuckleBtn').addEventListener('click', function() {
    fireBtn(this);
    playChuckle();
    statusEl.textContent = '*nervous chuckle*';
    setTimeout(function(){ statusEl.textContent = ''; }, 1200);
  });
})();
</script>
