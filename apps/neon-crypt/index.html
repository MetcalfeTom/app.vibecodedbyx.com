<html lang="en">
<head>

<link rel="icon" href="https://emojicdn.elk.sh/💀">
<meta property="og:title" content="Neon Crypt">
<meta property="og:description" content="Descend into neon-lit crypts. Fight glowing skeletons. Die in 8-bit.">
<meta property="og:url" content="https://app.sloppy.live/neon-crypt/">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#000;touch-action:none}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
#ui{position:fixed;top:8px;left:8px;color:#0f0;font-size:8px;line-height:1.8;z-index:5;text-shadow:0 0 6px #0f0}
#msg{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);color:#ff0;font-size:8px;text-align:center;z-index:5;opacity:0;transition:opacity 0.3s;text-shadow:0 0 8px #ff0;white-space:nowrap}
#msg.show{opacity:1}
#controls{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);display:none;z-index:5}
.d-btn{width:44px;height:44px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#0f0;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer}
.d-btn:active{background:rgba(0,255,0,0.2)}
.d-pad{display:grid;grid-template-columns:44px 44px 44px;grid-template-rows:44px 44px 44px;gap:2px}
.d-pad .c{grid-column:2;grid-row:2}
#title-screen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:16px}
#title-screen h1{color:#0ff;font-size:clamp(16px,5vw,28px);text-shadow:0 0 20px #0ff,0 0 40px #0ff;letter-spacing:2px}
#title-screen .sub{color:#888;font-size:8px;letter-spacing:2px}
#title-screen .start-btn{margin-top:16px;padding:12px 24px;background:transparent;border:2px solid #0f0;color:#0f0;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;text-shadow:0 0 8px #0f0;animation:blink 1.2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
#title-screen .controls-hint{color:#555;font-size:7px;margin-top:20px;text-align:center;line-height:2}
#death-screen{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:12px}
#death-screen.show{display:flex}
#death-screen h2{color:#f00;font-size:20px;text-shadow:0 0 20px #f00}
#death-screen .stats{color:#888;font-size:8px;line-height:2.2;text-align:center}
#death-screen .retry{padding:10px 20px;background:transparent;border:2px solid #0ff;color:#0ff;font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;margin-top:8px}
.back-link{position:fixed;bottom:2px;right:8px;color:#222;font-size:7px;text-decoration:none;z-index:5;font-family:'Press Start 2P',monospace}
.back-link:hover{color:#444}
@media(pointer:coarse){#controls{display:block}}

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const TILE=16,MAP_W=32,MAP_H=32,VIEW=15;
const NEON=['#0ff','#f0f','#0f0','#ff0','#f60','#f06','#60f'];
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function sfx(type){
  initAudio();const t=audioCtx.currentTime;
  if(type==='hit'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='square';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+0.1);
    g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.1);
  }else if(type==='kill'){
    [400,300,200].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='square';o.frequency.value=f;
      g.gain.setValueAtTime(0.08,t+i*0.06);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.06+0.08);
      o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.06);o.stop(t+i*0.06+0.08);
    });
  }else if(type==='hurt'){
    const b=audioCtx.createBuffer(1,audioCtx.sampleRate*0.1,audioCtx.sampleRate);
    const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.2));
    const s=audioCtx.createBufferSource();s.buffer=b;const g=audioCtx.createGain();g.gain.value=0.15;
    s.connect(g);g.connect(audioCtx.destination);s.start(t);
  }else if(type==='step'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='triangle';o.frequency.value=100+Math.random()*50;
    g.gain.setValueAtTime(0.02,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.04);
  }else if(type==='pickup'){
    [800,1000,1200].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0.06,t+i*0.07);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.07+0.12);
      o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.07);o.stop(t+i*0.07+0.12);
    });
  }else if(type==='stairs'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(800,t+0.3);
    g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=600;f.Q.value=2;
    o.connect(f);f.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.35);
  }else if(type==='death'){
    [300,250,200,150,100].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='square';o.frequency.value=f;
      g.gain.setValueAtTime(0.1,t+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.15);
      o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.12);o.stop(t+i*0.12+0.15);
    });
  }
}

const COLOR_MAP={
  '0':'#000','f':'#0ff','C':'#0ff','K':'#f0f','M':'#f60','L':'#ff0',
  'B':'#f0f','S':'#0f0','G':'#60f','Y':'#ff0','r':'#f44','w':'#888',
};

function drawSprite(sx,sy,sprite,colors,glow,flip){
  const px=2; // 2 canvas px per sprite px = 16px sprite
  for(let r=0;r<8;r++){
    const row=sprite[r];
    for(let c=0;c<8;c++){
      const ch=flip?row[7-c]:row[c];
      if(ch==='.')continue;
      let col=colors&&colors[ch]?colors[ch]:(COLOR_MAP[ch]||'#fff');
      if(glow){
        X.shadowColor=col;X.shadowBlur=6;
      }
      X.fillStyle=col;
      X.fillRect(sx+c*px,sy+r*px,px,px);
    }
  }
  X.shadowBlur=0;
}

// Dungeon generation
let map,rooms,enemies,items,stairsPos,player,floor,kills,gameRunning,shake,particles,msgTimer;

const ENEMY_TYPES=[
  {name:'Skeleton',sprite:'skeleton',hp:3,atk:1,xp:5,speed:0.5,color:'#0ff'},
  {name:'Bat',sprite:'bat',hp:2,atk:1,xp:3,speed:1,color:'#f0f'},
  {name:'Slime',sprite:'slime',hp:4,atk:1,xp:4,speed:0.3,color:'#0f0'},
  {name:'Ghost',sprite:'ghost',hp:3,atk:2,xp:7,speed:0.6,color:'#60f'},
  {name:'Skeleton Mage',sprite:'skeleton_mage',hp:5,atk:3,xp:10,speed:0.4,color:'#f60'},
  {name:'Skeleton Knight',sprite:'skeleton_knight',hp:8,atk:2,xp:12,speed:0.35,color:'#f0f'},
  {name:'Skeleton Lord',sprite:'skeleton_lord',hp:12,atk:4,xp:20,speed:0.3,color:'#ff0'},
];

function generate(){
  map=Array.from({length:MAP_H},()=>new Uint8Array(MAP_W)); // 0=wall,1=floor,2=corridor
  rooms=[];
  // Place rooms
  for(let i=0;i<12;i++){
    const w=4+Math.floor(Math.random()*5);
    const h=4+Math.floor(Math.random()*4);
    const rx=2+Math.floor(Math.random()*(MAP_W-w-4));
    const ry=2+Math.floor(Math.random()*(MAP_H-h-4));
    let overlap=false;
    for(const r of rooms){
      if(rx<r.x+r.w+1&&rx+w+1>r.x&&ry<r.y+r.h+1&&ry+h+1>r.y){overlap=true;break}
    }
    if(overlap)continue;
    rooms.push({x:rx,y:ry,w,h});
    for(let y=ry;y<ry+h;y++)for(let x=rx;x<rx+w;x++)map[y][x]=1;
  }
  // Connect rooms with corridors
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1],b=rooms[i];
    let cx=Math.floor(a.x+a.w/2),cy=Math.floor(a.y+a.h/2);
    const tx=Math.floor(b.x+b.w/2),ty=Math.floor(b.y+b.h/2);
    while(cx!==tx){cx+=cx<tx?1:-1;if(map[cy][cx]===0)map[cy][cx]=2}
    while(cy!==ty){cy+=cy<ty?1:-1;if(map[cy][cx]===0)map[cy][cx]=2}
  }
  // Place stairs in last room
  const lastRoom=rooms[rooms.length-1];
  stairsPos={x:Math.floor(lastRoom.x+lastRoom.w/2),y:Math.floor(lastRoom.y+lastRoom.h/2)};
  // Place player in first room
  const firstRoom=rooms[0];
  player.x=Math.floor(firstRoom.x+firstRoom.w/2);
  player.y=Math.floor(firstRoom.y+firstRoom.h/2);
  // Place enemies
  enemies=[];
  const numEnemies=4+floor*2;
  for(let i=0;i<numEnemies;i++){
    const room=rooms[1+Math.floor(Math.random()*(rooms.length-1))];
    if(!room)continue;
    const ex=room.x+1+Math.floor(Math.random()*(room.w-2));
    const ey=room.y+1+Math.floor(Math.random()*(room.h-2));
    if(ex===stairsPos.x&&ey===stairsPos.y)continue;
    // Pick enemy type based on floor
    const maxType=Math.min(ENEMY_TYPES.length-1,Math.floor(floor/2));
    const typeIdx=Math.floor(Math.random()*(maxType+1));
    const type=ENEMY_TYPES[typeIdx];
    const hpScale=1+floor*0.15;
    enemies.push({
      x:ex,y:ey,type:type.name,sprite:type.sprite,
      hp:Math.ceil(type.hp*hpScale),maxHp:Math.ceil(type.hp*hpScale),
      atk:type.atk+Math.floor(floor/3),xp:type.xp,
      speed:type.speed,color:type.color,
      moveTimer:0,hitFlash:0,dir:1,
    });
  }
  // Place items
  items=[];
  const numItems=2+Math.floor(floor*0.5);
  for(let i=0;i<numItems;i++){
    const room=rooms[1+Math.floor(Math.random()*(rooms.length-1))];
    if(!room)continue;
    const ix=room.x+1+Math.floor(Math.random()*(room.w-2));
    const iy=room.y+1+Math.floor(Math.random()*(room.h-2));
    const type=Math.random()<0.6?'potion':'chest';
    items.push({x:ix,y:iy,type});
  }
}

function initPlayer(){
  return{x:0,y:0,hp:10,maxHp:10,atk:2,def:0,xp:0,level:1,xpNext:15,
    facing:1,attackTimer:0,invuln:0,moveCD:0};
}

function startGame(){
  document.getElementById('title-screen').style.display='none';
  document.getElementById('death-screen').classList.remove('show');
  floor=1;kills=0;shake={x:0,y:0,t:0};particles=[];
  player=initPlayer();
  generate();
  gameRunning=true;
  resize();
  loop();
}

// Resize
let scale=1,cw,ch;
function resize(){
  const vw=VIEW*TILE,vh=VIEW*TILE;
  scale=Math.min(Math.floor(window.innerWidth/vw),Math.floor((window.innerHeight-60)/vh),4);
  scale=Math.max(scale,2);
  cw=vw*scale;ch=vh*scale;
  C.width=vw;C.height=vh;
  C.style.width=cw+'px';C.style.height=ch+'px';
}
window.addEventListener('resize',resize);

// Input
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()))e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
let touchDir=null,touchAtk=false;
function mTouch(d){if(d==='a')touchAtk=true;else touchDir=d}
function mTouchEnd(){touchDir=null;touchAtk=false}
window.mTouch=mTouch;window.mTouchEnd=mTouchEnd;

function canWalk(x,y){return x>=0&&x<MAP_W&&y>=0&&y<MAP_H&&map[y][x]>0}

function showMsg(text){
  const el=document.getElementById('msg');
  clearTimeout(msgTimer);
  el.textContent=text;el.classList.add('show');
  msgTimer=setTimeout(()=>el.classList.remove('show'),2000);
}

function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    particles.push({
      x:x*TILE+8,y:y*TILE+8,
      vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,
      life:15+Math.random()*10,color,size:1+Math.random(),
    });
  }
}

function tryAttack(){
  if(player.attackTimer>0)return;
  player.attackTimer=12;
  const tx=player.x+player.facing,ty=player.y;
  let hit=false;
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const dx=Math.abs(e.x-player.x),dy=Math.abs(e.y-player.y);
    if(dx<=1&&dy<=1&&dx+dy<=1){
      const dmg=Math.max(1,player.atk+Math.floor(Math.random()*2));
      e.hp-=dmg;e.hitFlash=6;
      spawnParticles(e.x,e.y,e.color,6);
      sfx('hit');hit=true;
      if(e.hp<=0){
        player.xp+=e.xp;kills++;
        spawnParticles(e.x,e.y,e.color,12);
        sfx('kill');
        enemies.splice(i,1);
        // Level up
        while(player.xp>=player.xpNext){
          player.level++;
          player.maxHp+=3;player.hp=Math.min(player.hp+3,player.maxHp);
          player.atk+=1;
          player.xpNext=Math.floor(player.xpNext*1.6);
          showMsg('LEVEL '+player.level+'!');
          sfx('pickup');
        }
      }
      break;
    }
  }
  if(!hit)sfx('step');
}

function tryMove(dx,dy){
  if(player.moveCD>0)return;
  if(dx!==0)player.facing=dx;
  const nx=player.x+dx,ny=player.y+dy;
  // Check enemies blocking
  for(const e of enemies)if(e.x===nx&&e.y===ny)return;
  if(canWalk(nx,ny)){
    player.x=nx;player.y=ny;player.moveCD=6;
    sfx('step');
    // Check items
    for(let i=items.length-1;i>=0;i--){
      const it=items[i];
      if(it.x===player.x&&it.y===player.y){
        if(it.type==='potion'){
          const heal=3+player.level;
          player.hp=Math.min(player.maxHp,player.hp+heal);
          showMsg('+'+heal+' HP');
          spawnParticles(player.x,player.y,'#f44',4);
        }else{
          const gold=5+floor*3+Math.floor(Math.random()*10);
          player.xp+=Math.floor(gold/2);
          showMsg('CHEST: +'+gold+' GOLD');
          spawnParticles(player.x,player.y,'#ff0',6);
        }
        sfx('pickup');items.splice(i,1);
      }
    }
  }
}

function updateEnemies(){
  for(const e of enemies){
    if(e.hitFlash>0)e.hitFlash--;
    e.moveTimer+=e.speed;
    if(e.moveTimer<1)continue;
    e.moveTimer=0;
    const dx=player.x-e.x,dy=player.y-e.y;
    const dist=Math.abs(dx)+Math.abs(dy);
    if(dist<=1){
      // Attack player
      if(player.invuln<=0){
        const dmg=Math.max(1,e.atk-player.def);
        player.hp-=dmg;player.invuln=20;
        shake.t=8;
        spawnParticles(player.x,player.y,'#f00',4);
        sfx('hurt');
        if(player.hp<=0){
          gameRunning=false;
          sfx('death');
          setTimeout(()=>{
            const ds=document.getElementById('death-screen');
            document.getElementById('death-stats').innerHTML=
              `FLOOR: ${floor}<br>LEVEL: ${player.level}<br>KILLS: ${kills}`;
            ds.classList.add('show');
          },800);
        }
      }
    }else if(dist<8){
      // Move toward player
      let mx=0,my=0;
      if(Math.abs(dx)>Math.abs(dy))mx=dx>0?1:-1;
      else my=dy>0?1:-1;
      const nx=e.x+mx,ny=e.y+my;
      if(canWalk(nx,ny)&&!enemies.some(o=>o!==e&&o.x===nx&&o.y===ny)&&!(nx===player.x&&ny===player.y)){
        e.x=nx;e.y=ny;
      }
      e.dir=dx>0?1:-1;
    }
  }
}

function update(){
  if(!gameRunning)return;
  if(player.moveCD>0)player.moveCD--;
  if(player.attackTimer>0)player.attackTimer--;
  if(player.invuln>0)player.invuln--;
  if(shake.t>0){shake.x=(Math.random()-0.5)*4;shake.y=(Math.random()-0.5)*4;shake.t--}
  else{shake.x=0;shake.y=0}

  // Input
  const up=keys['w']||keys['arrowup']||touchDir==='u';
  const dn=keys['s']||keys['arrowdown']||touchDir==='d';
  const lt=keys['a']||keys['arrowleft']||touchDir==='l';
  const rt=keys['d']||keys['arrowright']||touchDir==='r';
  const atk=keys[' ']||touchAtk;

  if(atk)tryAttack();
  else if(up)tryMove(0,-1);
  else if(dn)tryMove(0,1);
  else if(lt)tryMove(-1,0);
  else if(rt)tryMove(1,0);

  // Stairs
  if((keys['e']||keys['enter'])&&player.x===stairsPos.x&&player.y===stairsPos.y){
    floor++;
    generate();
    showMsg('FLOOR '+floor);
    sfx('stairs');
    keys['e']=false;keys['enter']=false;
  }

  updateEnemies();

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

function draw(){
  const vw=VIEW*TILE,vh=VIEW*TILE;
  X.fillStyle='#000';X.fillRect(0,0,vw,vh);

  // Camera centered on player
  const camX=player.x*TILE-Math.floor(vw/2)+8+shake.x;
  const camY=player.y*TILE-Math.floor(vh/2)+8+shake.y;

  X.save();
  X.translate(-Math.floor(camX),-Math.floor(camY));

  // Visible tile range
  const sx=Math.max(0,Math.floor(camX/TILE)-1);
  const sy=Math.max(0,Math.floor(camY/TILE)-1);
  const ex=Math.min(MAP_W,sx+VIEW+3);
  const ey=Math.min(MAP_H,sy+VIEW+3);

  // FOV - simple distance-based
  const vis=new Set();
  const fovR=7;
  for(let y=sy;y<ey;y++){
    for(let x=sx;x<ex;x++){
      const dx=x-player.x,dy=y-player.y;
      if(dx*dx+dy*dy<=fovR*fovR)vis.add(y*MAP_W+x);
    }
  }

  // Draw tiles
  for(let y=sy;y<ey;y++){
    for(let x=sx;x<ex;x++){
      const key=y*MAP_W+x;
      if(!vis.has(key))continue;
      const tx=x*TILE,ty=y*TILE;
      const dist=Math.sqrt((x-player.x)**2+(y-player.y)**2);
      const bright=Math.max(0.15,1-dist/fovR);
      if(map[y][x]===0){
        // Wall
        const wb=Math.floor(25*bright);
        X.fillStyle=`rgb(${wb},${wb},${Math.floor(35*bright)})`;
        X.fillRect(tx,ty,TILE,TILE);
        // Wall top edge highlight
        if(y>0&&map[y-1][x]>0){
          X.fillStyle=`rgba(0,255,255,${0.15*bright})`;
          X.fillRect(tx,ty,TILE,2);
        }
      }else{
        // Floor
        const fb=Math.floor(12*bright);
        const checker=(x+y)%2===0;
        X.fillStyle=checker?`rgb(${fb+4},${fb+4},${fb+8})`:`rgb(${fb},${fb},${fb+4})`;
        X.fillRect(tx,ty,TILE,TILE);
        // Subtle grid lines
        X.fillStyle=`rgba(0,255,255,${0.03*bright})`;
        X.fillRect(tx,ty,TILE,1);
        X.fillRect(tx,ty,1,TILE);
      }
    }
  }

  // Draw stairs
  if(vis.has(stairsPos.y*MAP_W+stairsPos.x)){
    drawSprite(stairsPos.x*TILE,stairsPos.y*TILE,SPRITES.stairs,null,false);
  }

  // Draw items
  for(const it of items){
    if(!vis.has(it.y*MAP_W+it.x))continue;
    const sp=it.type==='potion'?SPRITES.potion:SPRITES.chest;
    drawSprite(it.x*TILE,it.y*TILE,sp,null,true);
  }

  // Draw enemies
  for(const e of enemies){
    if(!vis.has(e.y*MAP_W+e.x))continue;
    const sp=SPRITES[e.sprite];
    if(!sp)continue;
    if(e.hitFlash>0&&e.hitFlash%2===0){
      // Flash white on hit
      const white={};
      for(const k of Object.keys(COLOR_MAP))white[k]='#fff';
      drawSprite(e.x*TILE,e.y*TILE,sp,white,true,e.dir<0);
    }else{
      drawSprite(e.x*TILE,e.y*TILE,sp,null,true,e.dir<0);
    }
    // HP bar
    if(e.hp<e.maxHp){
      const bx=e.x*TILE+2,by=e.y*TILE-2;
      X.fillStyle='#300';X.fillRect(bx,by,12,2);
      X.fillStyle=e.color;X.fillRect(bx,by,Math.max(1,Math.floor(12*e.hp/e.maxHp)),2);
    }
  }

  // Draw player
  if(player.invuln<=0||player.invuln%3!==0){
    const pcols={'f':player.invuln>0?'#f66':'#0ff'};
    drawSprite(player.x*TILE,player.y*TILE,SPRITES.player,pcols,true,player.facing<0);
    // Attack slash
    if(player.attackTimer>6){
      const ax=(player.x+player.facing)*TILE;
      X.strokeStyle='#fff';X.lineWidth=1;
      X.beginPath();
      X.moveTo(ax+4,player.y*TILE+2);
      X.lineTo(ax+12,player.y*TILE+14);
      X.stroke();
      X.strokeStyle='rgba(0,255,255,0.5)';X.lineWidth=2;X.stroke();
    }
  }

  // Draw particles
  for(const p of particles){
    const a=p.life/25;
    X.fillStyle=p.color;
    X.globalAlpha=a;
    X.fillRect(Math.floor(p.x),Math.floor(p.y),Math.ceil(p.size),Math.ceil(p.size));
  }
  X.globalAlpha=1;

  X.restore();

  // Minimap
  const mmScale=2,mmX=vw-MAP_W*mmScale-4,mmY=4;
  X.fillStyle='rgba(0,0,0,0.6)';
  X.fillRect(mmX-1,mmY-1,MAP_W*mmScale+2,MAP_H*mmScale+2);
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      if(!vis.has(y*MAP_W+x))continue;
      if(map[y][x]>0){
        X.fillStyle='#1a1a2a';
        X.fillRect(mmX+x*mmScale,mmY+y*mmScale,mmScale,mmScale);
      }
    }
  }
  // Player on minimap
  X.fillStyle='#0ff';
  X.fillRect(mmX+player.x*mmScale,mmY+player.y*mmScale,mmScale,mmScale);
  // Stairs on minimap
  if(vis.has(stairsPos.y*MAP_W+stairsPos.x)){
    X.fillStyle='#ff0';
    X.fillRect(mmX+stairsPos.x*mmScale,mmY+stairsPos.y*mmScale,mmScale,mmScale);
  }
  // Enemies on minimap
  for(const e of enemies){
    if(!vis.has(e.y*MAP_W+e.x))continue;
    X.fillStyle=e.color;
    X.fillRect(mmX+e.x*mmScale,mmY+e.y*mmScale,mmScale,mmScale);
  }
}

function updateUI(){
  const ui=document.getElementById('ui');
  const hpPct=Math.max(0,player.hp/player.maxHp);
  const hpColor=hpPct>0.5?'#0f0':hpPct>0.25?'#ff0':'#f00';
  const bar='█'.repeat(Math.ceil(hpPct*10))+'░'.repeat(10-Math.ceil(hpPct*10));
  ui.innerHTML=`<span style="color:${hpColor}">HP ${player.hp}/${player.maxHp}</span> <span style="color:${hpColor}">${bar}</span><br>`+
    `LV ${player.level} · ATK ${player.atk} · XP ${player.xp}/${player.xpNext}<br>`+
    `<span style="color:#888">FLOOR ${floor} · KILLS ${kills}</span>`;
}

let lastTime=0;
function loop(ts=0){
  if(!gameRunning&&player.hp<=0){draw();return}
  const dt=ts-lastTime;
  if(dt>=1000/20){// 20 tps
    lastTime=ts;
    update();
    draw();
    updateUI();
  }
  requestAnimationFrame(loop);
}
</script>
