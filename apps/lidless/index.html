<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lidless · It Watches You</title>
<meta name="description" content="An eye watches your cursor. It has opinions. Move carefully." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%91%81" />
<meta property="og:title" content="Lidless" />
<meta property="og:description" content="A sentient eye watches every move your cursor makes — and judges. Try not to disappoint it." />
<meta property="og:url" content="https://sloppy.live/lidless/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20single%20enormous%20unblinking%20eyeball%20floating%20in%20cosmic%20void%20red%20veins%20glowing%20amber%20iris%20unsettling%20occult%20sigil?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500;1,700&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=IBM+Plex+Mono:wght@400;500&family=Major+Mono+Display&display=swap" rel="stylesheet" />
<style>
:root{
  --void:#040206;
  --pit:#0c0509;
  --sclera:#e9dcc0;
  --vein:#7a1a1a;
  --iris:#c08124;
  --hot:#ffb14a;
  --cold:#3a89c9;
  --blood:#9b1b1b;
  --ink:#1a0d05;
  --bone:#f3e9d0;
  --whisper:rgba(243,233,208,0.55);
  --dim:rgba(243,233,208,0.32);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--void);color:var(--bone);font-family:'IM Fell English', serif}
body{
  background:
    radial-gradient(ellipse at 50% 50%, rgba(192,129,36,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 18% 12%, rgba(155,27,27,0.10), transparent 50%),
    radial-gradient(ellipse at 82% 88%, rgba(58,137,201,0.07), transparent 55%),
    linear-gradient(180deg, var(--void) 0%, var(--pit) 100%);
  cursor:crosshair;
}
body::before{
  /* film grain */
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:
    radial-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px, 7px 7px;
  background-position: 0 0, 1px 2px;
  mix-blend-mode:screen;
}
body::after{
  /* vignette */
  content:'';position:fixed;inset:0;pointer-events:none;z-index:2;
  background:radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.6) 100%);
}
#eye{position:fixed;inset:0;z-index:3;display:block;cursor:crosshair}
.hud{
  position:fixed;top:18px;left:20px;z-index:5;
  font-family:'IM Fell English SC', serif;
  letter-spacing:0.36em;
  font-size:11px;color:var(--whisper);
  pointer-events:none;
  text-shadow:0 0 6px rgba(0,0,0,0.8);
  line-height:1.9;
}
.hud b{color:var(--bone);font-family:'Major Mono Display', monospace;letter-spacing:0;font-weight:400}
.hud .verdict{color:var(--hot);font-family:'IM Fell English', serif;font-style:italic;letter-spacing:0.28em;font-size:13px}
.hud .verdict.sus{color:var(--blood)}
.hud .verdict.calm{color:var(--cold)}
.hud .verdict.amused{color:var(--bone)}

.crest{
  position:fixed;top:18px;right:20px;z-index:5;
  font-family:'Major Mono Display', monospace;
  font-size:10px;letter-spacing:0.42em;color:var(--whisper);
  text-align:right;line-height:1.7;
  pointer-events:none;
  text-shadow:0 0 6px rgba(0,0,0,0.8);
}
.crest .eyebrow{font-family:'IM Fell English SC',serif;color:var(--dim)}
.dialogue{
  position:fixed;left:50%;bottom:9%;transform:translateX(-50%);z-index:5;
  max-width:min(720px, 88vw);text-align:center;
  font-family:'Cormorant Garamond', serif;font-style:italic;font-weight:500;
  font-size:clamp(20px, 2.6vw, 32px);
  color:var(--bone);
  text-shadow:0 0 18px rgba(192,129,36,0.45), 0 2px 8px rgba(0,0,0,0.7);
  pointer-events:none;
  line-height:1.35;
  min-height:2.4em;
}
.dialogue.swap{animation:dialogueSwap 0.55s cubic-bezier(.2,.8,.4,1.05)}
@keyframes dialogueSwap{
  0%{opacity:0;transform:translateX(-50%) translateY(8px) blur(4px)}
  60%{opacity:1;transform:translateX(-50%) translateY(0) blur(0)}
  100%{opacity:1}
}
.title{
  position:fixed;left:50%;top:6%;transform:translateX(-50%);z-index:5;
  font-family:'IM Fell English SC', serif;
  letter-spacing:1.1em;
  font-size:clamp(11px, 1.6vw, 14px);
  color:var(--whisper);
  pointer-events:none;
  text-indent:1.1em; /* offset to compensate trailing letter-space */
}
.title b{color:var(--hot);font-weight:400}

.intro{
  position:fixed;inset:0;z-index:9;
  background:radial-gradient(ellipse at center, var(--pit), var(--void) 70%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond', serif;font-style:italic;
  font-size:clamp(18px, 2.4vw, 26px);
  color:var(--bone);
  letter-spacing:0.05em;
  cursor:pointer;
  text-shadow:0 0 14px rgba(192,129,36,0.4);
  text-align:center;padding:32px;
}
.intro span{
  border-bottom:1px solid var(--whisper);padding-bottom:6px;
  animation:enterPulse 2.6s ease-in-out infinite;
}
@keyframes enterPulse{
  0%,100%{opacity:0.65;letter-spacing:0.05em}
  50%{opacity:1;letter-spacing:0.18em}
}

@media (max-width:560px){
  .hud{font-size:9px;letter-spacing:0.24em;line-height:1.7}
  .crest{font-size:9px;letter-spacing:0.24em}
  .dialogue{font-size:18px;bottom:14%}
  .title{letter-spacing:0.6em}
}
</style>
</head>
<body>
<canvas id="eye"></canvas>

<div class="title"><b>※</b> &nbsp;LIDLESS&nbsp; <b>※</b></div>
<div class="hud">
  <div>WATCHED FOR · <b id="hTime">00:00</b></div>
  <div>MOVEMENTS · <b id="hMoves">0</b></div>
  <div>CLICKS · <b id="hClicks">0</b></div>
  <div>JUDGMENT · <span class="verdict" id="hVerdict">observing</span></div>
</div>
<div class="crest">
  <div class="eyebrow">VOL · I · ANNO MMXXVI</div>
  <div>oculus indagator</div>
  <div>· nothing escapes ·</div>
</div>
<div class="dialogue" id="dialogue">…</div>

<div class="intro" id="intro"><span>open the eye</span></div>

<script>
(() => {
  const canvas = document.getElementById('eye');
  const ctx = canvas.getContext('2d');
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let W = innerWidth, H = innerHeight;
  function resize(){
    W = innerWidth; H = innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  addEventListener('resize', resize);

  // === lines ===
  // pools by mood. lines fired at intervals, with cooldown to prevent spam.
  const LINES = {
    waking: [
      "you opened me. that was a choice.",
      "i was waiting.",
      "again. you came back.",
      "you must want to be seen.",
    ],
    idle: [
      "are you still here?",
      "still there?",
      "your stillness is unsettling.",
      "blink. i dare you.",
      "i can outwait you.",
      "is this a stand-off?",
      "you went quiet. it suits you.",
      "is this all you do?",
      "i have seen better paint dry.",
    ],
    fast: [
      "stop moving. it hurts.",
      "frantic. why?",
      "what are you running from.",
      "you move like prey.",
      "the cursor is not a leash.",
      "slow down. it is rude to flee.",
      "every twitch is a confession.",
    ],
    erratic: [
      "pick a direction.",
      "this is embarrassing for both of us.",
      "indecision is also a decision.",
      "you scribble. i read it anyway.",
      "is this all you do?",
      "stop moving. it hurts.",
    ],
    slow: [
      "deliberate. or merely slow?",
      "you crawl. i appreciate it.",
      "do you think i can't see you at this speed?",
    ],
    clicking: [
      "every click is logged.",
      "stop poking me.",
      "that is not a button. that is my pupil.",
      "calm down.",
      "you click as if i would yield.",
    ],
    leaving: [
      "running won't help.",
      "the periphery is still inside me.",
      "you cannot leave the frame. only your cursor.",
      "i can see your hand on the trackpad.",
    ],
    returning: [
      "back already?",
      "you missed me.",
      "you couldn't help it.",
      "i knew you'd return.",
    ],
    tabAway: [
      "go ahead. switch tabs.",
      "i will be here.",
      "the other tabs are watching too.",
    ],
    tabBack: [
      "welcome back. seven seconds longer than expected.",
      "i timed you.",
      "did the other tab judge you better?",
    ],
    rightclick: [
      "looking for help in there?",
      "no menu can save you.",
      "the inspector won't show me to you.",
    ],
    refreshAttempt: [
      "you cannot un-see me.",
      "refresh. i will simply re-open.",
      "F5 does not unmake me.",
    ],
    devtools: [
      "the inspector is open. so am i.",
      "you can read my pixels but not my intent.",
    ],
    bored: [
      "i am almost bored.",
      "you are repeating yourself.",
      "i have seen this pattern before.",
    ],
    pleased: [
      "that was nice.",
      "good cursor.",
      "you almost have rhythm.",
    ],
    judgement: [
      "i have decided.",
      "the verdict has been entered.",
      "you have been weighed.",
    ],
    longSession: [
      "are you still here? why.",
      "this is no longer a curiosity. it is a habit.",
      "we are friends now. terrible.",
      "is this all you do?",
      "go outside. i won't follow.",
    ],
  };

  const VERDICTS = [
    { id:'observing',   l:'observing' },
    { id:'amused',      l:'amused' },
    { id:'unsettled',   l:'unsettled', cls:'sus' },
    { id:'patient',     l:'patient', cls:'calm' },
    { id:'suspicious',  l:'suspicious', cls:'sus' },
    { id:'pleased',     l:'pleased', cls:'amused' },
    { id:'tired',       l:'tired', cls:'calm' },
    { id:'wrathful',    l:'wrathful', cls:'sus' },
  ];

  // === state ===
  const state = {
    mouseX: W/2, mouseY: H/2,
    targetX: W/2, targetY: H/2,
    lastMoveAt: 0,
    moveCount: 0,
    clickCount: 0,
    speed: 0,
    avgSpeed: 0,
    erraticness: 0,
    veerHistory: [],
    bornAt: performance.now(),
    awoken: false,
    inViewport: true,
    tabHidden: false,
    blinkAt: performance.now() + 4000 + Math.random() * 6000,
    blinking: 0,    // 0 → 1 → 0 over a blink
    blinkPhase: 'open', // 'open' | 'closing' | 'closed' | 'opening'
    pupilDilate: 1,    // multiplier
    moodTilt: 0,       // -1 .. 1 (negative = cold, positive = hot)
    irisRot: 0,
    lastLineAt: 0,
    lastBucket: '',
    suppressUntil: 0,  // cooldown to prevent dialogue spam
    verdict: 'observing',
  };

  function setVerdict(v) {
    state.verdict = v;
    const el = document.getElementById('hVerdict');
    const conf = VERDICTS.find(x => x.id === v) || VERDICTS[0];
    el.textContent = conf.l;
    el.className = 'verdict' + (conf.cls ? ' ' + conf.cls : '');
  }

  // === input listening ===
  let lastMoveSample = { x: W/2, y: H/2, t: performance.now() };
  function onPointerMove(e) {
    const now = performance.now();
    const x = e.clientX, y = e.clientY;
    const dx = x - lastMoveSample.x, dy = y - lastMoveSample.y;
    const dt = (now - lastMoveSample.t) / 1000;
    if (dt > 0) {
      const sp = Math.hypot(dx, dy) / dt; // px/s
      state.speed = sp;
      state.avgSpeed = state.avgSpeed * 0.85 + sp * 0.15;
      // erraticness: how often does the angle flip?
      if (state.veerHistory.length) {
        const prev = state.veerHistory[state.veerHistory.length - 1];
        const prevAng = Math.atan2(prev.dy, prev.dx);
        const curAng = Math.atan2(dy, dx);
        let diff = Math.abs(curAng - prevAng);
        if (diff > Math.PI) diff = Math.PI * 2 - diff;
        state.erraticness = state.erraticness * 0.88 + (diff / Math.PI) * 0.12;
      }
      state.veerHistory.push({ dx, dy, t: now });
      if (state.veerHistory.length > 18) state.veerHistory.shift();
    }
    lastMoveSample = { x, y, t: now };
    state.targetX = x; state.targetY = y;
    state.lastMoveAt = now;
    state.moveCount++;
    state.inViewport = true;
    document.getElementById('hMoves').textContent = state.moveCount;
  }
  addEventListener('pointermove', onPointerMove);
  addEventListener('mouseleave', () => { state.inViewport = false; trigger('leaving'); });
  addEventListener('mouseenter', () => {
    if (!state.inViewport) trigger('returning');
    state.inViewport = true;
  });
  addEventListener('click', (e) => {
    state.clickCount++;
    document.getElementById('hClicks').textContent = state.clickCount;
    state.pupilDilate = Math.min(1.5, state.pupilDilate + 0.18);
  });
  addEventListener('contextmenu', (e) => {
    e.preventDefault();
    trigger('rightclick');
  });
  addEventListener('keydown', (e) => {
    // F5 / Ctrl+R / Cmd+R
    if (e.key === 'F5' || ((e.ctrlKey || e.metaKey) && (e.key === 'r' || e.key === 'R'))) {
      trigger('refreshAttempt');
    } else if (e.key === 'F12') {
      trigger('devtools');
    }
  });
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      state.tabHidden = true;
      state.tabHiddenAt = performance.now();
      trigger('tabAway');
    } else {
      const dt = state.tabHidden ? (performance.now() - state.tabHiddenAt) / 1000 : 0;
      state.tabHidden = false;
      if (dt > 1) trigger('tabBack');
    }
  });

  // intro click → wake
  document.getElementById('intro').addEventListener('click', () => {
    document.getElementById('intro').style.display = 'none';
    state.awoken = true;
    state.bornAt = performance.now();
    state.lastMoveAt = performance.now();
    setTimeout(() => trigger('waking'), 400);
  });

  // === dialogue ===
  const dialogueEl = document.getElementById('dialogue');
  function say(line) {
    dialogueEl.textContent = line;
    dialogueEl.classList.remove('swap');
    void dialogueEl.offsetWidth; // restart animation
    dialogueEl.classList.add('swap');
    state.lastLineAt = performance.now();
    state.suppressUntil = performance.now() + 2400; // min 2.4s between lines
  }
  function trigger(bucket) {
    const now = performance.now();
    if (now < state.suppressUntil) return;
    const pool = LINES[bucket];
    if (!pool || !pool.length) return;
    // avoid back-to-back same line: pick at random but exclude current
    const cur = dialogueEl.textContent;
    let line = pool[Math.floor(Math.random() * pool.length)];
    if (pool.length > 1 && line === cur) {
      line = pool[(pool.indexOf(cur) + 1) % pool.length];
    }
    say(line);
    state.lastBucket = bucket;
  }

  // === verdict + pacing logic ===
  let lastTriggerScan = 0;
  function judgeTick() {
    const now = performance.now();
    const idleFor = (now - state.lastMoveAt) / 1000;
    const lifeFor = (now - state.bornAt) / 1000;

    // verdict computation
    if (!state.awoken) {
      setVerdict('patient');
    } else if (state.clickCount > 18) {
      setVerdict('wrathful');
    } else if (state.avgSpeed > 1500) {
      setVerdict('unsettled');
    } else if (state.erraticness > 0.45) {
      setVerdict('suspicious');
    } else if (idleFor > 8) {
      setVerdict('tired');
    } else if (state.avgSpeed < 80 && state.moveCount > 50) {
      setVerdict('observing');
    } else if (state.avgSpeed > 400 && state.moveCount > 30) {
      setVerdict('amused');
    } else if (lifeFor > 60) {
      setVerdict('pleased');
    } else {
      setVerdict('observing');
    }

    // mood tilt drives iris color
    state.moodTilt =
      (state.avgSpeed > 800 ? 0.7 : 0) +
      (state.clickCount > 10 ? 0.4 : 0) -
      (idleFor > 10 ? 0.6 : 0) -
      (state.erraticness > 0.5 ? 0.3 : 0);
    state.moodTilt = Math.max(-1, Math.min(1, state.moodTilt));

    // pupil dilation: shrinks toward 1, but events spike it
    state.pupilDilate += (1 - state.pupilDilate) * 0.04;
    if (idleFor > 6) state.pupilDilate = Math.min(1.6, state.pupilDilate + 0.0018); // dilates in idleness
    if (state.avgSpeed > 1000) state.pupilDilate = Math.max(0.65, state.pupilDilate - 0.005);

    // dialogue triggers based on detected behavior
    if (now - lastTriggerScan > 1200) {
      lastTriggerScan = now;
      if (!state.awoken) return;
      if (idleFor > 6 && state.moveCount > 4) trigger('idle');
      else if (state.avgSpeed > 1400 && state.speed > 800) trigger('fast');
      else if (state.erraticness > 0.55) trigger('erratic');
      else if (state.avgSpeed < 60 && state.moveCount > 30 && idleFor < 3) trigger('slow');
      else if (state.clickCount > 0 && state.clickCount % 6 === 0 && now - state.lastLineAt > 4000) trigger('clicking');
      else if (lifeFor > 90 && Math.random() < 0.18) trigger('longSession');
      else if (lifeFor > 45 && state.avgSpeed < 400 && Math.random() < 0.1) trigger('bored');
    }

    // hud time
    const t = Math.floor(lifeFor);
    const mm = String(Math.floor(t/60)).padStart(2,'0');
    const ss = String(t%60).padStart(2,'0');
    document.getElementById('hTime').textContent = mm + ':' + ss;
  }

  // === eye render ===
  function renderEye(now) {
    // smooth follow
    state.mouseX += (state.targetX - state.mouseX) * 0.18;
    state.mouseY += (state.targetY - state.mouseY) * 0.18;
    const cx = W / 2, cy = H / 2;
    // size: bigger of 60% min(W,H), capped
    const eyeR = Math.min(W, H) * 0.32;
    const eyeRX = eyeR * 1.6;
    const eyeRY = eyeR * 1.0;

    // backdrop wash for trails / motion
    ctx.fillStyle = 'rgba(4,2,6,0.55)';
    ctx.fillRect(0, 0, W, H);

    // outer glow halo (mood-tinted)
    const haloHue = state.moodTilt > 0 ? 28 + state.moodTilt * 12 : 200 - state.moodTilt * 14;
    const haloSat = 60 + Math.abs(state.moodTilt) * 24;
    const halo = ctx.createRadialGradient(cx, cy, eyeRX * 0.6, cx, cy, eyeRX * 1.6);
    halo.addColorStop(0, `hsla(${haloHue}, ${haloSat}%, 50%, 0.18)`);
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.fillRect(0, 0, W, H);

    // === sclera (eye whites) ===
    ctx.save();
    ctx.translate(cx, cy);
    // shadow under
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 80;
    // sclera body (almond shape via ellipse + path subtract is messy — just a flattened ellipse)
    ctx.beginPath();
    ctx.ellipse(0, 0, eyeRX, eyeRY, 0, 0, Math.PI * 2);
    const sclGrad = ctx.createRadialGradient(0, eyeRY * 0.2, eyeRY * 0.2, 0, 0, eyeRX);
    sclGrad.addColorStop(0, '#f6ead0');
    sclGrad.addColorStop(0.6, '#e9dcc0');
    sclGrad.addColorStop(1, '#a89570');
    ctx.fillStyle = sclGrad;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();

    // === red veins on sclera (procedural, deterministic) ===
    ctx.save();
    ctx.translate(cx, cy);
    // clip to sclera
    ctx.beginPath();
    ctx.ellipse(0, 0, eyeRX - 4, eyeRY - 4, 0, 0, Math.PI * 2);
    ctx.clip();
    // 18 vein roots seeded by index
    for (let i = 0; i < 18; i++) {
      const seed = i * 9301 + 49297;
      const r = ((seed % 23) / 23) * 0.4 + 0.45;
      const baseAng = (i / 18) * Math.PI * 2 + Math.sin(i * 1.7) * 0.4;
      let x = Math.cos(baseAng) * eyeRX * 0.95;
      let y = Math.sin(baseAng) * eyeRY * 0.95;
      drawVein(x, y, baseAng + Math.PI, eyeRX * 0.3 * (0.6 + (i % 4) * 0.18), 0, i);
    }
    ctx.restore();

    function drawVein(x, y, dir, len, depth, seed) {
      if (len < 8 || depth > 3) return;
      const segs = 6;
      const wobble = 0.36 - depth * 0.08;
      const lineW = Math.max(0.6, 1.6 - depth * 0.4);
      ctx.strokeStyle = `rgba(155, 27, 27, ${0.55 - depth * 0.12 + state.moodTilt * 0.18})`;
      ctx.lineWidth = lineW;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x, y);
      let ang = dir;
      for (let s = 0; s < segs; s++) {
        ang += (Math.sin(seed * 0.31 + s + depth * 1.7) * wobble);
        const stepLen = len / segs;
        x += Math.cos(ang) * stepLen;
        y += Math.sin(ang) * stepLen;
        ctx.lineTo(x, y);
      }
      ctx.stroke();
      // branch
      if (depth < 2 && (seed + depth) % 3 === 0) {
        drawVein(x, y, ang + 0.7, len * 0.55, depth + 1, seed * 31 + 7);
        drawVein(x, y, ang - 0.7, len * 0.45, depth + 1, seed * 17 + 11);
      }
    }

    // === iris + pupil tracking cursor ===
    // Pupil is offset toward cursor, clamped to stay inside sclera
    const dx = state.mouseX - cx, dy = state.mouseY - cy;
    const maxOffsetX = eyeRX * 0.55, maxOffsetY = eyeRY * 0.50;
    const dist = Math.hypot(dx, dy);
    const norm = dist > 0 ? Math.min(1, dist / Math.max(W, H) * 1.4) : 0;
    const irisX = (dx / (dist || 1)) * Math.min(maxOffsetX, dist) * Math.min(1, (W * 0.5) / Math.max(1, dist) * norm * 2);
    const irisY = (dy / (dist || 1)) * Math.min(maxOffsetY, dist) * Math.min(1, (H * 0.5) / Math.max(1, dist) * norm * 2);
    // simpler: clamp to ellipse
    let ix = dx, iy = dy;
    const k = Math.min(1, eyeRX * 0.55 / Math.max(0.001, Math.abs(dx)), eyeRY * 0.50 / Math.max(0.001, Math.abs(dy)));
    ix = dx * Math.min(1, k);
    iy = dy * Math.min(1, k);

    const pupilCx = cx + ix, pupilCy = cy + iy;
    const irisR = eyeRY * 0.62;

    // iris: stack of layered rings
    state.irisRot += (state.moodTilt * 0.001 + 0.0006);
    ctx.save();
    ctx.translate(pupilCx, pupilCy);

    // outer rim
    const outerRim = ctx.createRadialGradient(0, 0, irisR * 0.75, 0, 0, irisR);
    outerRim.addColorStop(0, 'rgba(0,0,0,0)');
    outerRim.addColorStop(0.85, 'rgba(40,18,4,0.5)');
    outerRim.addColorStop(1, 'rgba(20,8,2,0.95)');
    ctx.beginPath();
    ctx.arc(0, 0, irisR, 0, Math.PI * 2);
    ctx.fillStyle = outerRim;
    ctx.fill();

    // base iris fill
    const baseHue = state.moodTilt > 0
      ? 32 + state.moodTilt * 6        // amber → hot
      : 28 - state.moodTilt * -10;     // amber drift to deeper amber when calm
    const irisGrad = ctx.createRadialGradient(0, 0, irisR * 0.18, 0, 0, irisR * 0.95);
    irisGrad.addColorStop(0, `hsl(${baseHue}, 75%, 38%)`);
    irisGrad.addColorStop(0.5, `hsl(${baseHue + 6}, 65%, 28%)`);
    irisGrad.addColorStop(1, `hsl(${baseHue + 14}, 55%, 14%)`);
    ctx.beginPath();
    ctx.arc(0, 0, irisR * 0.95, 0, Math.PI * 2);
    ctx.fillStyle = irisGrad;
    ctx.fill();

    // iris fibers — radial spikes, deterministic
    ctx.save();
    ctx.rotate(state.irisRot);
    ctx.lineCap = 'round';
    for (let i = 0; i < 96; i++) {
      const a = (i / 96) * Math.PI * 2;
      const len = irisR * (0.2 + ((i * 7) % 11) / 11 * 0.7);
      const inner = irisR * 0.18;
      const outer = inner + len;
      ctx.strokeStyle = `hsla(${baseHue + (i % 6) * 4 - 6}, ${65 + (i % 4) * 6}%, ${36 + (i % 5) * 4}%, ${0.4 + (i % 3) * 0.12})`;
      ctx.lineWidth = 0.7 + ((i * 3) % 5) * 0.2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * inner, Math.sin(a) * inner);
      ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
      ctx.stroke();
    }
    ctx.restore();

    // collarette ring
    ctx.beginPath();
    ctx.arc(0, 0, irisR * 0.42, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${baseHue - 6}, 65%, 22%, 0.7)`;
    ctx.lineWidth = 1.6;
    ctx.stroke();

    // === pupil ===
    const pupilR = irisR * 0.30 * state.pupilDilate;
    ctx.beginPath();
    ctx.arc(0, 0, pupilR, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
    // pupil rim halo
    ctx.beginPath();
    ctx.arc(0, 0, pupilR + 1.5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // catch-light on iris (specular)
    const lx = -irisR * 0.42, ly = -irisR * 0.42;
    const cl = ctx.createRadialGradient(lx, ly, 1, lx, ly, irisR * 0.34);
    cl.addColorStop(0, 'rgba(255,255,235,0.9)');
    cl.addColorStop(0.4, 'rgba(255,240,200,0.35)');
    cl.addColorStop(1, 'rgba(255,240,200,0)');
    ctx.fillStyle = cl;
    ctx.beginPath();
    ctx.arc(lx, ly, irisR * 0.34, 0, Math.PI * 2);
    ctx.fill();

    // small offset secondary catch-light
    const cl2 = ctx.createRadialGradient(irisR * 0.18, -irisR * 0.18, 0.5, irisR * 0.18, -irisR * 0.18, irisR * 0.12);
    cl2.addColorStop(0, 'rgba(255,255,250,0.6)');
    cl2.addColorStop(1, 'rgba(255,255,250,0)');
    ctx.fillStyle = cl2;
    ctx.beginPath();
    ctx.arc(irisR * 0.18, -irisR * 0.18, irisR * 0.12, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // === eyelid blink ===
    if (now > state.blinkAt && state.blinkPhase === 'open') {
      state.blinkPhase = 'closing';
      state.blinkStart = now;
    }
    if (state.blinkPhase !== 'open') {
      const phaseT = (now - state.blinkStart) / 1000;
      let close;
      if (state.blinkPhase === 'closing') {
        close = phaseT / 0.12;
        if (close >= 1) { close = 1; state.blinkPhase = 'closed'; state.blinkClosedAt = now; }
      } else if (state.blinkPhase === 'closed') {
        close = 1;
        if (now - state.blinkClosedAt > 60) state.blinkPhase = 'opening';
      } else {
        const op = (now - state.blinkClosedAt - 60) / 220;
        close = Math.max(0, 1 - op);
        if (op >= 1) {
          state.blinkPhase = 'open';
          state.blinkAt = now + 4500 + Math.random() * 7000;
        }
      }
      state.blinking = close;
      drawLid(cx, cy, eyeRX, eyeRY, close);
    } else {
      state.blinking *= 0.92; // ease back
    }

    // === outer eye outline (gives the almond definition) ===
    ctx.save();
    ctx.translate(cx, cy);
    ctx.beginPath();
    ctx.ellipse(0, 0, eyeRX, eyeRY, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(20,10,4,0.85)';
    ctx.lineWidth = 3;
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 18;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // upper lash hint
    ctx.strokeStyle = 'rgba(8,4,2,0.85)';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.ellipse(0, -2, eyeRX * 0.96, eyeRY * 0.94, 0, Math.PI * 1.05, Math.PI * 1.95);
    ctx.stroke();
    ctx.restore();
  }

  function drawLid(cx, cy, rx, ry, close) {
    // close 0..1, 0 = open, 1 = closed
    if (close <= 0) return;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    ctx.clip();
    // top lid
    const topY = -ry + 2 * ry * close * 0.5;
    ctx.fillStyle = '#1a0e08';
    ctx.beginPath();
    ctx.moveTo(-rx - 4, -ry - 4);
    ctx.lineTo(rx + 4, -ry - 4);
    ctx.lineTo(rx + 4, topY);
    ctx.bezierCurveTo(rx * 0.5, topY + ry * 0.18 * close, -rx * 0.5, topY + ry * 0.18 * close, -rx - 4, topY);
    ctx.closePath();
    ctx.fill();
    // bottom lid
    const botY = ry - 2 * ry * close * 0.5;
    ctx.beginPath();
    ctx.moveTo(-rx - 4, ry + 4);
    ctx.lineTo(rx + 4, ry + 4);
    ctx.lineTo(rx + 4, botY);
    ctx.bezierCurveTo(rx * 0.5, botY - ry * 0.18 * close, -rx * 0.5, botY - ry * 0.18 * close, -rx - 4, botY);
    ctx.closePath();
    ctx.fill();
    // crease
    ctx.strokeStyle = 'rgba(0,0,0,0.65)';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(-rx, topY);
    ctx.bezierCurveTo(-rx * 0.4, topY + ry * 0.18 * close, rx * 0.4, topY + ry * 0.18 * close, rx, topY);
    ctx.stroke();
    ctx.restore();
  }

  function frame(now) {
    judgeTick();
    renderEye(now);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
