<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Tumble Pixels</title>
<meta name="description" content="A neon gravity sandbox. Drag to spray colorful pixels. Watch them tumble, bounce, and pile in glowing chaos." />
<meta property="og:title" content="Tumble Pixels" />
<meta property="og:description" content="A neon gravity sandbox. Drag to spray colorful pixels. Watch them tumble, bounce, and pile in glowing chaos." />
<meta property="og:url" content="https://sloppy.live/tumble-pixels" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20tumbling%20colorful%20pixel%20cubes%20falling%20gravity%20sandbox%20glowing%20cyan%20magenta%20yellow%20particles%20dark%20void?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%88" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Space+Mono:wght@400;700&family=Major+Mono+Display&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#06030f;
    --bg-2:#0d0820;
    --ink:#f0e8ff;
    --dim:#7a6e95;
    --magenta:#ff2bd6;
    --cyan:#26e6ff;
    --yellow:#fff03a;
    --lime:#7cff5a;
    --violet:#a566ff;
    --pink:#ff5a8a;
    --orange:#ff7a3a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:
      radial-gradient(900px 600px at 80% 12%, rgba(38,230,255,0.12), transparent 60%),
      radial-gradient(1100px 700px at 12% 100%, rgba(255,43,214,0.10), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Space Mono', monospace;
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
  }
  #canvas{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    cursor:crosshair;
    display:block;
  }
  .overlay{
    position:fixed;
    pointer-events:none;
    z-index:5;
  }
  .brand{
    top:18px;
    left:22px;
    font-family:'Audiowide', monospace;
    font-size:clamp(20px, 3vw, 28px);
    letter-spacing:0.08em;
    text-shadow:
      0 0 8px rgba(38,230,255,0.85),
      0 0 22px rgba(38,230,255,0.55),
      0 0 38px rgba(255,43,214,0.45);
  }
  .brand .alt{
    color:var(--magenta);
    text-shadow:
      0 0 8px rgba(255,43,214,0.9),
      0 0 22px rgba(255,43,214,0.55);
  }
  .brand .sub{
    display:block;
    font-family:'Major Mono Display', monospace;
    font-size:11px;
    letter-spacing:0.32em;
    color:var(--dim);
    text-shadow:none;
    margin-top:5px;
  }
  .hud{
    top:20px;
    right:22px;
    text-align:right;
    font-size:11px;
    color:var(--dim);
    letter-spacing:0.18em;
    text-transform:uppercase;
    line-height:1.7;
  }
  .hud b{
    color:var(--cyan);
    font-weight:400;
    letter-spacing:0.05em;
    text-transform:none;
    font-family:'Major Mono Display', monospace;
    font-size:14px;
  }
  .toolbar{
    pointer-events:auto;
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    z-index:6;
    display:flex;
    gap:8px;
    padding:8px 10px;
    background:rgba(13,8,32,0.7);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:48px;
    box-shadow:
      0 0 0 1px rgba(38,230,255,0.12) inset,
      0 8px 32px rgba(0,0,0,0.6);
  }
  .pill{
    pointer-events:auto;
    background:transparent;
    border:1px solid rgba(255,255,255,0.10);
    color:var(--ink);
    font-family:'Space Mono', monospace;
    font-size:11px;
    letter-spacing:0.18em;
    padding:8px 14px;
    border-radius:32px;
    text-transform:uppercase;
    cursor:pointer;
    transition:all 0.15s;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .pill .key{
    font-size:9px;
    color:var(--dim);
    border:1px solid rgba(255,255,255,0.12);
    padding:1px 4px;
    border-radius:3px;
    letter-spacing:0;
  }
  .pill:hover{
    border-color:var(--cyan);
    color:var(--cyan);
    box-shadow:0 0 12px rgba(38,230,255,0.3);
  }
  .pill.active{
    background:linear-gradient(135deg, rgba(38,230,255,0.18), rgba(255,43,214,0.18));
    border-color:var(--cyan);
    color:var(--ink);
    text-shadow:0 0 8px rgba(38,230,255,0.7);
  }
  .pill.danger:hover{
    border-color:var(--magenta);
    color:var(--magenta);
    box-shadow:0 0 12px rgba(255,43,214,0.4);
  }
  .gravarrow{
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    color:var(--cyan);
    font-family:'Major Mono Display', monospace;
    font-size:10px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    text-align:center;
    opacity:0.6;
    transition:opacity 0.3s;
  }
  .gravarrow .arr{
    display:block;
    font-size:22px;
    margin-bottom:2px;
    text-shadow:0 0 8px currentColor;
    transition:transform 0.4s cubic-bezier(.6,.1,.3,1.4);
  }
  .gravarrow.zerog{
    color:var(--yellow);
  }
  .hint{
    bottom:88px;
    right:22px;
    font-size:10px;
    color:var(--dim);
    letter-spacing:0.18em;
    text-transform:uppercase;
    line-height:1.7;
    text-align:right;
    opacity:0.7;
    transition:opacity 0.6s;
  }
  .hint kbd{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.10);
    padding:0 4px;
    border-radius:3px;
    font-family:'Space Mono', monospace;
    color:var(--cyan);
  }
  .hint.faded{opacity:0.18}
  @media(max-width:680px){
    .hint{display:none}
    .brand .sub{display:none}
    .toolbar{padding:6px 8px;gap:5px}
    .pill{font-size:10px;padding:6px 10px}
    .pill .key{display:none}
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="overlay brand">
  <div>tumble<span class="alt">·</span><span class="alt">pixels</span></div>
  <span class="sub">neon · gravity · sandbox</span>
</div>

<div class="overlay hud">
  <div><b id="countLbl">0</b> alive</div>
  <div><span id="modeLbl">spray</span></div>
</div>

<div class="overlay gravarrow" id="gravIndicator">
  <span class="arr" id="gravArrow">↓</span>
  <span id="gravLbl">gravity ↓</span>
</div>

<div class="overlay hint" id="hint">
  <div><kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd> spray · pull · push</div>
  <div><kbd>↑↓←→</kbd> rotate gravity</div>
  <div><kbd>space</kbd> zero-g · <kbd>b</kbd> burst · <kbd>c</kbd> clear</div>
</div>

<div class="toolbar">
  <button class="pill active" data-mode="spray">spray<span class="key">1</span></button>
  <button class="pill" data-mode="pull">pull<span class="key">2</span></button>
  <button class="pill" data-mode="push">push<span class="key">3</span></button>
  <button class="pill" id="burstBtn">burst<span class="key">b</span></button>
  <button class="pill danger" id="clearBtn">clear<span class="key">c</span></button>
</div>

<script>
// ============================================================
// TUMBLE PIXELS — neon gravity sandbox
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
let DPR = Math.min(window.devicePixelRatio || 1, 2);
let W = 0, H = 0;

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// PALETTE — vibrant neon, picked at random per spawn
// ============================================================
const PALETTE = [
  { c:'#ff2bd6', g:'rgba(255,43,214,0.9)' },   // magenta
  { c:'#26e6ff', g:'rgba(38,230,255,0.9)' },   // cyan
  { c:'#fff03a', g:'rgba(255,240,58,0.85)' },  // yellow
  { c:'#7cff5a', g:'rgba(124,255,90,0.85)' },  // lime
  { c:'#ff5a8a', g:'rgba(255,90,138,0.9)' },   // pink
  { c:'#a566ff', g:'rgba(165,102,255,0.9)' },  // violet
  { c:'#ff7a3a', g:'rgba(255,122,58,0.9)' },   // orange
  { c:'#3affb0', g:'rgba(58,255,176,0.85)' },  // mint
];

// ============================================================
// PARTICLES
// ============================================================
const MAX = 700;
const particles = [];

function spawn(x, y, opts){
  if(particles.length >= MAX){
    // recycle oldest
    particles.shift();
  }
  const pal = PALETTE[(Math.random() * PALETTE.length) | 0];
  const size = 5 + Math.random() * 9;
  const baseV = (opts && opts.v) || 90;
  const angA = Math.random() * Math.PI * 2;
  particles.push({
    x, y,
    vx: Math.cos(angA) * baseV * Math.random() + (opts?.vx || 0),
    vy: Math.sin(angA) * baseV * Math.random() + (opts?.vy || 0),
    angle: Math.random() * Math.PI * 2,
    angV: (Math.random() - 0.5) * 8,
    size,
    color: pal.c,
    glow: pal.g,
    life: 1.0,
  });
}

function burst(x, y, n){
  for(let i = 0; i < n; i++){
    const a = (i / n) * Math.PI * 2 + Math.random() * 0.2;
    const v = 200 + Math.random() * 380;
    spawn(x, y, { vx: Math.cos(a) * v, vy: Math.sin(a) * v, v: 0 });
  }
}

// ============================================================
// STATE
// ============================================================
const state = {
  mode: 'spray',          // 'spray' | 'pull' | 'push'
  pointerDown: false,
  px: 0, py: 0,
  ppx: 0, ppy: 0,         // previous pointer for velocity inheritance
  spawnAcc: 0,
  gravX: 0,
  gravY: 600,
  zeroG: false,
  gravFlash: 0,
};

// ============================================================
// PHYSICS
// ============================================================
function step(dt){
  const gx = state.zeroG ? 0 : state.gravX;
  const gy = state.zeroG ? 0 : state.gravY;
  const damp = Math.pow(0.992, dt * 60);

  // forces from cursor (pull/push)
  const cursorActive = state.pointerDown && (state.mode === 'pull' || state.mode === 'push');
  const cursorSign = state.mode === 'pull' ? 1 : -1;
  const CURSOR_R = 240;
  const CURSOR_F = 1800;

  for(let i = 0; i < particles.length; i++){
    const p = particles[i];
    p.vx += gx * dt;
    p.vy += gy * dt;

    if(cursorActive){
      const dx = state.px - p.x;
      const dy = state.py - p.y;
      const d2 = dx*dx + dy*dy;
      if(d2 < CURSOR_R * CURSOR_R && d2 > 16){
        const d = Math.sqrt(d2);
        const f = CURSOR_F * (1 - d / CURSOR_R) / d;
        p.vx += dx * f * cursorSign * dt;
        p.vy += dy * f * cursorSign * dt;
        // induce extra tumble
        p.angV += (Math.random() - 0.5) * 0.4;
      }
    }

    p.vx *= damp;
    p.vy *= damp;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.angle += p.angV * dt;
    // angular damping (subtle)
    p.angV *= Math.pow(0.985, dt * 60);
  }

  // walls + floor (bounce + tumble kick)
  for(let i = 0; i < particles.length; i++){
    const p = particles[i];
    const r = p.size * 0.6;

    if(p.x < r){
      p.x = r;
      p.vx = -p.vx * 0.55;
      p.vy *= 0.86;
      p.angV += (Math.random() - 0.3) * 5;
    } else if(p.x > W - r){
      p.x = W - r;
      p.vx = -p.vx * 0.55;
      p.vy *= 0.86;
      p.angV += (Math.random() - 0.7) * 5;
    }

    if(p.y < r){
      p.y = r;
      p.vy = -p.vy * 0.55;
      p.vx *= 0.86;
      p.angV += (Math.random() - 0.5) * 5;
    } else if(p.y > H - r){
      p.y = H - r;
      // floor friction + bounce — gives the pile-up feel
      const impact = Math.abs(p.vy);
      p.vy = -p.vy * 0.4;
      p.vx *= 0.78;
      // tumble proportional to impact
      p.angV += (Math.random() - 0.5) * Math.min(12, impact * 0.04);
      // when slow, snap to rest with tiny angV decay
      if(impact < 30){
        p.vy = 0;
        p.angV *= 0.92;
      }
    }
  }

  // particle-particle separation via spatial hash
  const CELL = 24;
  const cells = new Map();
  for(let i = 0; i < particles.length; i++){
    const p = particles[i];
    const cx = (p.x / CELL) | 0;
    const cy = (p.y / CELL) | 0;
    const k = cx + ',' + cy;
    let arr = cells.get(k);
    if(!arr){ arr = []; cells.set(k, arr); }
    arr.push(i);
  }
  for(const [k, arr] of cells){
    const [cxs, cys] = k.split(',');
    const cx = +cxs, cy = +cys;
    for(let dx = 0; dx <= 1; dx++){
      for(let dy = -1; dy <= 1; dy++){
        if(dx === 0 && dy === -1) continue;
        const k2 = (cx + dx) + ',' + (cy + dy);
        const other = (dx === 0 && dy === 0) ? arr : cells.get(k2);
        if(!other) continue;
        for(let a = 0; a < arr.length; a++){
          const i = arr[a];
          const jStart = (other === arr) ? a + 1 : 0;
          for(let b = jStart; b < other.length; b++){
            const j = other[b];
            const p = particles[i], q = particles[j];
            const ddx = q.x - p.x;
            const ddy = q.y - p.y;
            const minD = (p.size + q.size) * 0.55;
            const d2 = ddx*ddx + ddy*ddy;
            if(d2 > 0 && d2 < minD * minD){
              const d = Math.sqrt(d2);
              const ovr = (minD - d) * 0.5;
              const nx = ddx / d, ny = ddy / d;
              p.x -= nx * ovr;
              p.y -= ny * ovr;
              q.x += nx * ovr;
              q.y += ny * ovr;
              // velocity exchange (soft)
              const rvx = q.vx - p.vx;
              const rvy = q.vy - p.vy;
              const rvDotN = rvx * nx + rvy * ny;
              if(rvDotN < 0){
                const imp = rvDotN * 0.4;
                p.vx += nx * imp;
                p.vy += ny * imp;
                q.vx -= nx * imp;
                q.vy -= ny * imp;
                // tumble kick from impact
                const kk = Math.abs(rvDotN) * 0.012;
                p.angV += (Math.random() - 0.5) * kk;
                q.angV += (Math.random() - 0.5) * kk;
              }
            }
          }
        }
      }
    }
  }
}

// ============================================================
// RENDER
// ============================================================
function render(dt){
  // fade trail
  ctx.fillStyle = 'rgba(6, 3, 15, 0.22)';
  ctx.fillRect(0, 0, W, H);

  // gravity flash overlay
  if(state.gravFlash > 0){
    state.gravFlash = Math.max(0, state.gravFlash - dt * 1.6);
    ctx.fillStyle = `rgba(38, 230, 255, ${0.06 * state.gravFlash})`;
    ctx.fillRect(0, 0, W, H);
  }

  // subtle grid
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.018)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  const grid = 48;
  for(let x = 0; x < W; x += grid){
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, H);
  }
  for(let y = 0; y < H; y += grid){
    ctx.moveTo(0, y + 0.5);
    ctx.lineTo(W, y + 0.5);
  }
  ctx.stroke();

  // cursor field visualization
  if(state.pointerDown && (state.mode === 'pull' || state.mode === 'push')){
    const grad = ctx.createRadialGradient(state.px, state.py, 4, state.px, state.py, 240);
    const tint = state.mode === 'pull' ? '38, 230, 255' : '255, 43, 214';
    grad.addColorStop(0, `rgba(${tint}, 0.18)`);
    grad.addColorStop(1, `rgba(${tint}, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(state.px, state.py, 240, 0, Math.PI * 2);
    ctx.fill();
    // pulse ring
    const t = performance.now() / 1000;
    ctx.strokeStyle = `rgba(${tint}, 0.45)`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(state.px, state.py, 60 + Math.sin(t * 6) * 12, 0, Math.PI * 2);
    ctx.stroke();
  }

  // particles
  for(let i = 0; i < particles.length; i++){
    const p = particles[i];
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    // outer glow
    ctx.shadowColor = p.glow;
    ctx.shadowBlur = 14;
    ctx.fillStyle = p.color;
    const s = p.size;
    ctx.fillRect(-s / 2, -s / 2, s, s);
    // inner highlight (no glow, brighter corner)
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
    ctx.fillRect(-s / 2, -s / 2, s * 0.35, s * 0.35);
    // dark inner shadow corner for depth
    ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
    ctx.fillRect(s * 0.15, s * 0.15, s * 0.35, s * 0.35);
    ctx.restore();
  }
}

// ============================================================
// LOOP
// ============================================================
let lastT = performance.now();
function frame(now){
  const dt = Math.min(0.04, (now - lastT) / 1000);
  lastT = now;

  // continuous spray while pointer held
  if(state.pointerDown && state.mode === 'spray'){
    state.spawnAcc += dt;
    const rate = 0.012; // seconds between spawns
    const dx = state.px - state.ppx;
    const dy = state.py - state.ppy;
    while(state.spawnAcc > rate){
      state.spawnAcc -= rate;
      // inherit pointer velocity for a "throw" feel
      spawn(
        state.px + (Math.random() - 0.5) * 8,
        state.py + (Math.random() - 0.5) * 8,
        { vx: dx * 8, vy: dy * 8, v: 60 }
      );
    }
  }

  step(dt);
  render(dt);
  document.getElementById('countLbl').textContent = particles.length;
  state.ppx = state.px;
  state.ppy = state.py;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ============================================================
// POINTER
// ============================================================
function pos(e){
  if(e.touches && e.touches[0]){
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}
canvas.addEventListener('pointerdown', (e) => {
  state.pointerDown = true;
  const p = pos(e);
  state.px = p.x; state.py = p.y;
  state.ppx = p.x; state.ppy = p.y;
  if(state.mode === 'spray'){
    // initial pop
    spawn(p.x, p.y, { v: 100 });
  }
  canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
  hideHintSoon();
});
canvas.addEventListener('pointermove', (e) => {
  const p = pos(e);
  state.px = p.x; state.py = p.y;
});
window.addEventListener('pointerup', () => {
  state.pointerDown = false;
});
window.addEventListener('pointercancel', () => {
  state.pointerDown = false;
});

// ============================================================
// MODE / GRAVITY CONTROLS
// ============================================================
const modePills = document.querySelectorAll('[data-mode]');
function setMode(m){
  state.mode = m;
  modePills.forEach(p => p.classList.toggle('active', p.dataset.mode === m));
  document.getElementById('modeLbl').textContent = m;
}
modePills.forEach(p => p.addEventListener('click', () => setMode(p.dataset.mode)));

document.getElementById('clearBtn').addEventListener('click', () => particles.length = 0);
document.getElementById('burstBtn').addEventListener('click', () => {
  burst(W / 2, H / 2, 64);
});

const gravArrow = document.getElementById('gravArrow');
const gravLbl = document.getElementById('gravLbl');
const gravIndicator = document.getElementById('gravIndicator');
function setGravity(gx, gy, label, arrow){
  state.gravX = gx;
  state.gravY = gy;
  state.zeroG = (gx === 0 && gy === 0);
  state.gravFlash = 1.0;
  gravArrow.textContent = arrow;
  gravLbl.textContent = label;
  gravIndicator.classList.toggle('zerog', state.zeroG);
}

window.addEventListener('keydown', (e) => {
  if(e.key === '1'){ setMode('spray'); }
  else if(e.key === '2'){ setMode('pull'); }
  else if(e.key === '3'){ setMode('push'); }
  else if(e.key === 'b' || e.key === 'B'){ burst(W / 2, H / 2, 64); }
  else if(e.key === 'c' || e.key === 'C'){ particles.length = 0; }
  else if(e.key === ' '){
    e.preventDefault();
    if(state.zeroG){
      setGravity(0, 600, 'gravity ↓', '↓');
    } else {
      setGravity(0, 0, 'zero-g', '·');
    }
  }
  else if(e.key === 'ArrowDown'){ setGravity(0, 600, 'gravity ↓', '↓'); }
  else if(e.key === 'ArrowUp'){ setGravity(0, -600, 'gravity ↑', '↑'); }
  else if(e.key === 'ArrowLeft'){ setGravity(-600, 0, 'gravity ←', '←'); }
  else if(e.key === 'ArrowRight'){ setGravity(600, 0, 'gravity →', '→'); }
});

// ============================================================
// HINT FADE (after first interaction)
// ============================================================
const hint = document.getElementById('hint');
let hinted = false;
function hideHintSoon(){
  if(hinted) return;
  hinted = true;
  setTimeout(() => hint.classList.add('faded'), 2500);
}
