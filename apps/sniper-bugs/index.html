<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sniper Bugs — Neon Terrarium</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐛">
<meta property="og:title" content="Sniper Bugs">
<meta property="og:description" content="A neon terrarium full of bugs that snipe each other with lasers.">
<meta property="og:url" content="https://app.sloppy.live/sniper-bugs/">
<meta property="og:image" content="https://emojicdn.elk.sh/🐛?style=google">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06080a;color:#88aa88;font-family:'DotGothic16',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden}
h1{font-family:'Silkscreen',monospace;font-size:clamp(18px,4vw,26px);color:#44ff88;text-shadow:0 0 15px rgba(68,255,136,0.5);letter-spacing:3px;margin:10px 0 4px}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;border:1px solid #112218;cursor:crosshair;touch-action:none}
.controls{display:flex;gap:8px;padding:6px;flex-wrap:wrap;justify-content:center;font-size:11px}
.btn{font-family:'Silkscreen',monospace;font-size:10px;background:#0a1210;color:#44ff88;border:1px solid #22aa55;padding:5px 10px;cursor:pointer;letter-spacing:1px}
.btn:hover{background:#22aa55;color:#06080a}
.hud{font-family:'Silkscreen',monospace;font-size:10px;color:#336644;text-align:center;padding:2px;letter-spacing:1px}
a{color:#336644;text-decoration:none}a:hover{color:#44ff88}
</style>
</head>
<body>
<h1>SNIPER BUGS</h1>
<canvas id="c"></canvas>
<div class="controls">
<button class="btn" onclick="spawnBug()">+ Bug</button>
<button class="btn" onclick="spawnPlant()">+ Plant</button>
<button class="btn" onclick="toggleNight()">Day/Night</button>
<button class="btn" onclick="resetTerrarium()">Reset</button>
</div>
<div class="hud" id="hud">BUGS: 0 | KILLS: 0 | PLANTS: 0</div>
<div class="hud"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');

// Pixel art scale
const SCALE = 3;
const NW = 260, NH = 200;
C.width = NW; C.height = NH;
C.style.width = NW * SCALE + 'px';
C.style.height = NH * SCALE + 'px';

// World
const SOIL_Y = NH - 24;
const JAR_L = 14, JAR_R = NW - 14;
const JAR_T = 16;

let bugs = [];
let plants = [];
let lasers = [];
let particles = [];
let corpses = [];
let kills = 0;
let frame = 0;
let isNight = false;

// Bug types with neon colors
const BUG_TYPES = [
  { name:'scout',   color:'#44ff88', eyeColor:'#ffffff', size:4, speed:0.6, hp:2, damage:1, range:60, cooldown:90,  aimTime:30 },
  { name:'sniper',  color:'#ff4488', eyeColor:'#ffff44', size:5, speed:0.3, hp:3, damage:2, range:100,cooldown:150, aimTime:50 },
  { name:'tank',    color:'#4488ff', eyeColor:'#ff8844', size:6, speed:0.2, hp:6, damage:1, range:50, cooldown:60,  aimTime:20 },
  { name:'assassin',color:'#ff8844', eyeColor:'#ff44ff', size:3, speed:0.9, hp:1, damage:3, range:40, cooldown:120, aimTime:15 },
  { name:'ghost',   color:'#aa44ff', eyeColor:'#44ffff', size:4, speed:0.5, hp:2, damage:1, range:70, cooldown:80,  aimTime:25 },
];

function rng(a, b) { return a + Math.random() * (b - a); }

function spawnBug(x) {
  const type = BUG_TYPES[Math.floor(Math.random() * BUG_TYPES.length)];
  const bx = x != null ? x : rng(JAR_L + 10, JAR_R - 10);
  bugs.push({
    x: bx, y: SOIL_Y - type.size,
    vx: (Math.random() < 0.5 ? -1 : 1) * type.speed,
    type, hp: type.hp, maxHp: type.hp,
    cooldown: 0, aimTarget: null, aimTimer: 0,
    legPhase: Math.random() * Math.PI * 2,
    facing: Math.random() < 0.5 ? -1 : 1,
    flash: 0, energy: 50 + Math.random() * 50
  });
}

function spawnPlant(x) {
  const px = x != null ? x : rng(JAR_L + 8, JAR_R - 8);
  const hue = Math.floor(Math.random() * 360);
  plants.push({
    x: px, y: SOIL_Y,
    height: 0, maxHeight: 8 + Math.random() * 16,
    hue, growth: 0, swayPhase: Math.random() * Math.PI * 2,
    type: Math.floor(Math.random() * 3) // 0=stalk, 1=mushroom, 2=crystal
  });
}

function toggleNight() { isNight = !isNight; }

function resetTerrarium() {
  bugs = []; plants = []; lasers = []; particles = []; corpses = []; kills = 0;
  for (let i = 0; i < 8; i++) spawnBug();
  for (let i = 0; i < 6; i++) spawnPlant();
}

// --- Input ---
C.addEventListener('click', e => {
  const r = C.getBoundingClientRect();
  const sx = NW / r.width, sy = NH / r.height;
  const mx = (e.clientX - r.left) * sx;
  const my = (e.clientY - r.top) * sy;
  if (my > SOIL_Y - 5) spawnPlant(mx);
  else spawnBug(mx);
});

// --- Audio ---
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playZap() {
  const ctx = ensureAudio(); const now = ctx.currentTime;
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.type = 'sawtooth'; o.frequency.setValueAtTime(1800 + Math.random()*600, now);
  o.frequency.exponentialRampToValueAtTime(200, now + 0.06);
  g.gain.setValueAtTime(0.06, now); g.gain.linearRampToValueAtTime(0, now + 0.06);
  o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now + 0.06);
}
function playDeath() {
  const ctx = ensureAudio(); const now = ctx.currentTime;
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.type = 'square'; o.frequency.setValueAtTime(300, now);
  o.frequency.exponentialRampToValueAtTime(50, now + 0.2);
  g.gain.setValueAtTime(0.05, now); g.gain.linearRampToValueAtTime(0, now + 0.2);
  o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now + 0.2);
}

// --- Simulation ---
function simulate() {
  // Bugs
  bugs.forEach(b => {
    // Movement
    b.legPhase += Math.abs(b.vx) * 0.3;
    b.x += b.vx;
    b.facing = b.vx > 0 ? 1 : -1;

    // Bounce off jar walls
    if (b.x < JAR_L + 6) { b.x = JAR_L + 6; b.vx = Math.abs(b.vx); }
    if (b.x > JAR_R - 6) { b.x = JAR_R - 6; b.vx = -Math.abs(b.vx); }

    // Random direction change
    if (Math.random() < 0.01) b.vx = -b.vx;

    // Energy drain — eat plants to restore
    b.energy -= 0.01;
    plants.forEach(p => {
      if (p.growth > 0.5 && Math.abs(b.x - p.x) < 6 && Math.random() < 0.005) {
        b.energy = Math.min(100, b.energy + 10);
        p.growth = Math.max(0, p.growth - 0.2);
        p.height = p.maxHeight * p.growth;
      }
    });

    // Cooldown
    if (b.cooldown > 0) { b.cooldown--; b.aimTarget = null; b.aimTimer = 0; return; }

    // Find target — closest enemy bug
    let closest = null, closestDist = b.type.range;
    bugs.forEach(other => {
      if (other === b) return;
      const dx = other.x - b.x, dy = other.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < closestDist) { closest = other; closestDist = dist; }
    });

    if (closest) {
      // Stop to aim
      b.vx = 0;
      if (b.aimTarget !== closest) { b.aimTarget = closest; b.aimTimer = 0; }
      b.aimTimer++;
      b.facing = closest.x > b.x ? 1 : -1;

      // Fire!
      if (b.aimTimer >= b.type.aimTime) {
        lasers.push({
          x1: b.x + b.facing * b.type.size,
          y1: b.y - 1,
          x2: closest.x,
          y2: closest.y - 1,
          color: b.type.color,
          life: 8
        });
        closest.hp -= b.type.damage;
        closest.flash = 6;
        b.cooldown = b.type.cooldown;
        b.aimTarget = null;
        b.aimTimer = 0;
        b.vx = b.facing * b.type.speed;
        playZap();

        // Hit particles
        for (let i = 0; i < 6; i++) {
          particles.push({
            x: closest.x, y: closest.y - 2,
            vx: (Math.random()-0.5)*2, vy: -Math.random()*2,
            life: 10+Math.random()*10, maxLife: 20,
            color: b.type.color
          });
        }
      }
    } else {
      // Resume wandering
      if (b.vx === 0) b.vx = b.facing * b.type.speed;
    }

    b.flash = Math.max(0, b.flash - 1);
  });

  // Kill dead bugs
  bugs = bugs.filter(b => {
    if (b.hp <= 0 || b.energy <= 0) {
      kills++;
      playDeath();
      corpses.push({ x: b.x, y: SOIL_Y - 1, color: b.type.color, life: 300 });
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: b.x, y: b.y - 2,
          vx: (Math.random()-0.5)*3, vy: -Math.random()*3,
          life: 15+Math.random()*20, maxLife: 35,
          color: b.type.color
        });
      }
      return false;
    }
    return true;
  });

  // Plants grow
  plants.forEach(p => {
    if (p.growth < 1) {
      p.growth += 0.0008 * (isNight ? 0.3 : 1);
      p.height = p.maxHeight * p.growth;
    }
    p.swayPhase += 0.02;
  });

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--; });
  particles = particles.filter(p => p.life > 0);

  // Lasers
  lasers.forEach(l => l.life--);
  lasers = lasers.filter(l => l.life > 0);

  // Corpses fade
  corpses.forEach(c => c.life--);
  corpses = corpses.filter(c => c.life > 0);

  // Auto-spawn if bugs get low
  if (bugs.length < 3 && frame % 120 === 0) spawnBug();

  // HUD
  document.getElementById('hud').textContent = `BUGS: ${bugs.length} | KILLS: ${kills} | PLANTS: ${plants.length}`;
}

// --- Render ---
function render() {
  // Background
  const bgBright = isNight ? 0.3 : 1;
  ctx.fillStyle = isNight ? '#020304' : '#06080a';
  ctx.fillRect(0, 0, NW, NH);

  // Stars (night)
  if (isNight) {
    for (let i = 0; i < 20; i++) {
      const sx = ((i * 37 + 13) % (NW - 30)) + 15;
      const sy = ((i * 53 + 7) % (JAR_T + 20));
      const blink = Math.sin(frame * 0.05 + i) > 0.3;
      if (blink) { ctx.fillStyle = '#445566'; ctx.fillRect(sx, sy, 1, 1); }
    }
  }

  // Jar glass
  ctx.strokeStyle = `rgba(68,255,136,${0.15 * bgBright})`;
  ctx.lineWidth = 1;
  // Left wall
  ctx.beginPath(); ctx.moveTo(JAR_L, JAR_T); ctx.lineTo(JAR_L, NH - 4); ctx.stroke();
  // Right wall
  ctx.beginPath(); ctx.moveTo(JAR_R, JAR_T); ctx.lineTo(JAR_R, NH - 4); ctx.stroke();
  // Bottom
  ctx.beginPath(); ctx.moveTo(JAR_L, NH - 4); ctx.lineTo(JAR_R, NH - 4); ctx.stroke();
  // Rim
  ctx.beginPath(); ctx.moveTo(JAR_L - 3, JAR_T); ctx.lineTo(JAR_R + 3, JAR_T); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(JAR_L - 3, JAR_T - 3); ctx.lineTo(JAR_R + 3, JAR_T - 3); ctx.stroke();
  // Reflection
  ctx.fillStyle = `rgba(68,255,136,${0.03 * bgBright})`;
  ctx.fillRect(JAR_L + 4, JAR_T + 4, 3, NH - JAR_T - 20);

  // Soil
  for (let x = JAR_L + 1; x < JAR_R; x++) {
    const h = SOIL_Y + ((x * 7 + 3) % 4);
    const shade = 20 + ((x * 13 + 5) % 8);
    ctx.fillStyle = `rgb(${shade+10},${shade},${shade-5})`;
    ctx.fillRect(x, h, 1, NH - 4 - h);
  }
  // Soil top line
  ctx.fillStyle = '#2a2218';
  for (let x = JAR_L + 1; x < JAR_R; x++) {
    const h = SOIL_Y + ((x * 7 + 3) % 4) - 1;
    ctx.fillRect(x, h, 1, 1);
  }

  // Corpses
  corpses.forEach(c => {
    const a = Math.min(1, c.life / 60);
    ctx.fillStyle = c.color + Math.floor(a * 40).toString(16).padStart(2,'0');
    ctx.fillRect(c.x - 2, c.y, 4, 1);
  });

  // Plants
  plants.forEach(p => {
    const sway = Math.sin(p.swayPhase) * 1.5 * p.growth;
    const h = p.height;
    if (h < 1) return;
    const col = `hsl(${p.hue},80%,${50 * bgBright}%)`;
    const glowCol = `hsl(${p.hue},90%,60%)`;

    ctx.strokeStyle = col;
    ctx.lineWidth = 1;

    if (p.type === 0) {
      // Stalk with leaves
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + sway, p.y - h); ctx.stroke();
      if (h > 5) {
        ctx.beginPath(); ctx.moveTo(p.x + sway*0.4, p.y - h*0.4); ctx.lineTo(p.x + sway*0.4 + 4, p.y - h*0.4 - 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(p.x + sway*0.7, p.y - h*0.7); ctx.lineTo(p.x + sway*0.7 - 3, p.y - h*0.7 - 2); ctx.stroke();
      }
      if (p.growth > 0.8) {
        ctx.shadowColor = glowCol; ctx.shadowBlur = 4;
        ctx.fillStyle = glowCol;
        ctx.fillRect(p.x + sway - 1, p.y - h - 2, 2, 2);
        ctx.shadowBlur = 0;
      }
    } else if (p.type === 1) {
      // Mushroom
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + sway*0.5, p.y - h + 3); ctx.stroke();
      if (p.growth > 0.5) {
        ctx.shadowColor = glowCol; ctx.shadowBlur = 3;
        ctx.fillStyle = col;
        const capW = 3 + p.growth * 3;
        ctx.beginPath();
        ctx.arc(p.x + sway*0.5, p.y - h + 2, capW, Math.PI, 0);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Spots
        ctx.fillStyle = `hsl(${p.hue},60%,80%)`;
        ctx.fillRect(p.x + sway*0.5 - 1, p.y - h, 1, 1);
        ctx.fillRect(p.x + sway*0.5 + 1, p.y - h + 1, 1, 1);
      }
    } else {
      // Crystal
      ctx.shadowColor = glowCol; ctx.shadowBlur = 2;
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(p.x + sway, p.y - h);
      ctx.lineTo(p.x + sway + 2, p.y - h*0.4);
      ctx.lineTo(p.x + sway - 2, p.y - h*0.4);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + sway + 2, p.y - h*0.4);
      ctx.lineTo(p.x + sway - 2, p.y - h*0.4);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  });

  // Bugs
  bugs.forEach(b => {
    const t = b.type;
    const s = t.size;
    const bx = Math.round(b.x), by = Math.round(b.y);
    const legY = Math.sin(b.legPhase) * 1.5;

    // Flash on hit
    const col = b.flash > 0 ? '#ffffff' : t.color;

    // Aim line (laser sight)
    if (b.aimTarget && b.aimTimer > 0) {
      const progress = b.aimTimer / t.aimTime;
      ctx.strokeStyle = t.color + Math.floor(progress * 60).toString(16).padStart(2,'0');
      ctx.lineWidth = 0.5;
      ctx.setLineDash([2, 2]);
      ctx.beginPath();
      ctx.moveTo(bx + b.facing * s, by - 1);
      ctx.lineTo(b.aimTarget.x, b.aimTarget.y - 1);
      ctx.stroke();
      ctx.setLineDash([]);
      // Scope dot
      if (progress > 0.5) {
        ctx.fillStyle = t.color;
        ctx.fillRect(b.aimTarget.x - 0.5, b.aimTarget.y - 1.5, 1, 1);
      }
    }

    ctx.shadowColor = col;
    ctx.shadowBlur = isNight ? 6 : 3;

    // Body
    ctx.fillStyle = col;
    ctx.fillRect(bx - s/2, by - s/2 - 1, s, Math.ceil(s * 0.6));

    // Head
    ctx.fillRect(bx + b.facing * (s/2), by - s/2, Math.ceil(s*0.4) * b.facing, Math.ceil(s * 0.4));

    // Eye
    ctx.fillStyle = t.eyeColor;
    ctx.fillRect(bx + b.facing * (s/2 + 1), by - s/2 + 1, 1, 1);

    // Legs
    ctx.fillStyle = col;
    const legOff = Math.round(legY);
    ctx.fillRect(bx - s/2 + 1, by + 1 + legOff, 1, 2);
    ctx.fillRect(bx + s/2 - 2, by + 1 - legOff, 1, 2);
    if (s > 4) {
      ctx.fillRect(bx - 1, by + 1 - legOff, 1, 2);
    }

    ctx.shadowBlur = 0;

    // HP bar
    if (b.hp < b.maxHp) {
      const barW = s + 2;
      ctx.fillStyle = '#220000';
      ctx.fillRect(bx - barW/2, by - s/2 - 4, barW, 1);
      ctx.fillStyle = '#ff2222';
      ctx.fillRect(bx - barW/2, by - s/2 - 4, barW * (b.hp / b.maxHp), 1);
    }
  });

  // Lasers
  lasers.forEach(l => {
    const a = l.life / 8;
    ctx.strokeStyle = l.color;
    ctx.lineWidth = 1;
    ctx.shadowColor = l.color;
    ctx.shadowBlur = 6 * a;
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.moveTo(l.x1, l.y1);
    ctx.lineTo(l.x2, l.y2);
    ctx.stroke();
    // Thick glow
    ctx.lineWidth = 2;
    ctx.globalAlpha = a * 0.3;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.lineWidth = 1;
  });

  // Particles
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = a;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 4;
    ctx.fillRect(p.x, p.y, 1, 1);
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Ambient fog (night)
  if (isNight) {
    ctx.fillStyle = 'rgba(0,20,10,0.15)';
    ctx.fillRect(0, 0, NW, NH);
  }
}

// --- Loop ---
function loop() {
  frame++;
  simulate();
  render();
  requestAnimationFrame(loop);
}

// Init
for (let i = 0; i < 8; i++) spawnBug();
for (let i = 0; i < 6; i++) spawnPlant();
loop();
</script>
</body>
</html>
