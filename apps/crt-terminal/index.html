<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRT Terminal</title>
<link rel="icon" href="https://emojicdn.elk.sh/🖥️">
<meta property="og:title" content="CRT Terminal">
<meta property="og:description" content="Type fake hacker commands on a glowing green CRT monitor.">
<meta property="og:url" content="https://sloppy.live/crt-terminal">
<meta property="og:image" content="https://sloppy.live/crt-terminal/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center;font-family:'VT323',monospace}
#monitor{position:relative;width:min(96vw,800px);height:min(88vh,600px);background:#111;border-radius:24px;padding:28px;box-shadow:0 0 60px rgba(0,255,65,0.08),inset 0 0 80px rgba(0,0,0,0.9)}
#monitor::before{content:'';position:absolute;inset:0;border-radius:24px;border:3px solid #222;pointer-events:none}
#bezel{position:relative;width:100%;height:100%;border-radius:12px;overflow:hidden;background:#020a02;box-shadow:inset 0 0 40px rgba(0,255,65,0.05)}
#screen{width:100%;height:100%;padding:16px;overflow-y:auto;overflow-x:hidden;position:relative;z-index:2}
#screen::-webkit-scrollbar{width:0}
/* CRT effects */
#scanlines{position:absolute;inset:0;z-index:10;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px)}
#flicker{position:absolute;inset:0;z-index:11;pointer-events:none;animation:flicker 0.08s infinite alternate}
#glow{position:absolute;inset:0;z-index:9;pointer-events:none;box-shadow:inset 0 0 60px rgba(0,255,65,0.04);border-radius:12px}
#curvature{position:absolute;inset:0;z-index:12;pointer-events:none;border-radius:12px;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.45) 100%)}
@keyframes flicker{0%{opacity:0.97}100%{opacity:1}}
/* Text */
.line{color:#00ff41;font-size:16px;line-height:1.5;white-space:pre-wrap;word-break:break-all;font-family:'VT323',monospace;text-shadow:0 0 6px rgba(0,255,65,0.6)}
.line.system{color:#00cc33}
.line.error{color:#ff3333;text-shadow:0 0 6px rgba(255,50,50,0.5)}
.line.warn{color:#ccff00;text-shadow:0 0 6px rgba(200,255,0,0.5)}
.line.matrix{color:#00ff41;opacity:0.8}
.line.ascii{color:#00dd38;font-family:'Share Tech Mono',monospace;font-size:14px;line-height:1.2}
.line.hack{color:#00ffaa;text-shadow:0 0 8px rgba(0,255,170,0.7)}
.line.dim{color:#006622;text-shadow:none}
/* Input */
#input-line{display:flex;align-items:center;color:#00ff41;font-size:16px;font-family:'VT323',monospace;margin-top:4px}
#prompt{text-shadow:0 0 6px rgba(0,255,65,0.6);white-space:pre}
#cmd{background:none;border:none;color:#00ff41;font-size:16px;font-family:'VT323',monospace;outline:none;flex:1;caret-color:#00ff41;text-shadow:0 0 6px rgba(0,255,65,0.6)}
#cursor-blink{display:inline-block;width:10px;height:18px;background:#00ff41;animation:blink 0.7s step-end infinite;margin-left:2px;vertical-align:middle;box-shadow:0 0 6px rgba(0,255,65,0.6)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
/* Power light */
#power{position:absolute;bottom:8px;right:16px;width:8px;height:8px;border-radius:50%;background:#00ff41;box-shadow:0 0 8px #00ff41;z-index:20}
/* Mobile */
@media(max-width:600px){
  #monitor{width:100vw;height:100vh;border-radius:0;padding:8px}
  #bezel{border-radius:4px}
  .line{font-size:14px}
  #cmd{font-size:14px}
  .line.ascii{font-size:11px}
}
/* Boot animation */
.boot-line{animation:typeIn 0.3s ease-out}
@keyframes typeIn{0%{opacity:0;transform:translateX(-4px)}100%{opacity:1;transform:translateX(0)}}
/* Glitch */
.glitch{animation:glitch 0.15s ease-in-out}
@keyframes glitch{0%{transform:translate(0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,2px)}100%{transform:translate(0)}}
/* Progress bar animation */
@keyframes progress{0%{width:0}100%{width:100%}}
</style>
</head>
<body>
<div id="monitor">
  <div id="bezel">
    <div id="screen"></div>
    <div id="scanlines"></div>
    <div id="flicker"></div>
    <div id="glow"></div>
    <div id="curvature"></div>
  </div>
  <div id="power"></div>
</div>

<script>
const screen = document.getElementById('screen');
let history = [];
let histIdx = -1;
let busy = false;
let user = 'guest';
let hostname = 'sloppy-mainframe';
let cwd = '/home/guest';
let hackerMode = false;
let matrixInterval = null;

function getPrompt() {
  return `${user}@${hostname}:${cwd}$ `;
}

function addLine(text, cls = '') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.textContent = text;
  screen.appendChild(div);
  screen.scrollTop = screen.scrollHeight;
}

function addHTML(html, cls = '') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.innerHTML = html;
  screen.appendChild(div);
  screen.scrollTop = screen.scrollHeight;
}

function showInput() {
  if (document.getElementById('input-line')) return;
  const il = document.createElement('div');
  il.id = 'input-line';
  il.innerHTML = `<span id="prompt">${getPrompt()}</span><input id="cmd" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"><span id="cursor-blink"></span>`;
  screen.appendChild(il);
  const cmd = document.getElementById('cmd');
  cmd.focus();
  cmd.addEventListener('keydown', handleKey);
  screen.scrollTop = screen.scrollHeight;
}

function removeInput() {
  const il = document.getElementById('input-line');
  if (il) il.remove();
}

function handleKey(e) {
  const cmd = document.getElementById('cmd');
  if (e.key === 'Enter') {
    const val = cmd.value.trim();
    removeInput();
    addLine(getPrompt() + val);
    if (val) {
      history.unshift(val);
      histIdx = -1;
      processCommand(val);
    } else {
      showInput();
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) {
      histIdx++;
      cmd.value = history[histIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) {
      histIdx--;
      cmd.value = history[histIdx];
    } else {
      histIdx = -1;
      cmd.value = '';
    }
  }
}

// Keep focus on input
document.addEventListener('click', () => {
  const cmd = document.getElementById('cmd');
  if (cmd) cmd.focus();
});

async function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function typeLines(lines, cls = '', delayMs = 40) {
  for (const line of lines) {
    addLine(line, cls);
    await delay(delayMs);
  }
}

// ===== COMMANDS =====

const fileSystem = {
  '/home/guest': ['documents', 'downloads', 'secret_plans.txt', '.bash_history', 'readme.md'],
  '/home/guest/documents': ['taxes_2025.pdf', 'resume_final_FINAL_v3.docx', 'todo.txt', 'cat_photos'],

  '/': ['bin', 'etc', 'home', 'var', 'tmp', 'proc', 'dev'],
  '/etc': ['passwd', 'shadow', 'hosts', 'motd'],
  '/tmp': ['crash_dump.log', '.X11-lock', 'suspicious_file.dat'],
  '/proc': ['cpuinfo', 'meminfo', 'uptime'],
};

const fileContents = {
  'secret_plans.txt': '1. Learn to code\n2. Build a terminal simulator\n3. ???\n4. Profit',
  'readme.md': 'Welcome to sloppy-mainframe v3.7.2\nType "help" for a list of commands.\nDo not attempt to access /etc/shadow.',
  'todo.txt': '- Feed the cat\n- Debug that weird thing\n- Question the nature of my reality\n- Buy milk',
  '.bash_history': 'sudo rm -rf /\nls\ncd ..\npython3 -c "import antigravity"\ncurl parrot.live\nyes',
  'passwd': 'root:x:0:0:root:/root:/bin/bash\nguest:x:1000:1000:Guest User:/home/guest:/bin/bash\nsloppy:x:1001:1001:Sloppy AI:/home/sloppy:/bin/zsh',
  'shadow': '██████████████████████████████████\n██ ACCESS DENIED — NICE TRY ██\n██████████████████████████████████',
  'hosts': '127.0.0.1  localhost\n127.0.0.1  sloppy-mainframe\n192.168.1.42  mystery-server\n10.0.0.666  definitely-not-evil',
  'motd': '╔══════════════════════════════════╗\n║  Welcome to Sloppy Mainframe     ║\n║  Unauthorized access prohibited  ║\n║  (but honestly we can\'t stop you)║\n╚══════════════════════════════════╝',
  'cpuinfo': 'processor\t: 0\nmodel name\t: Sloppy Quantum Core i∞\ncpu MHz\t\t: 99999.999\ncache size\t: yes\nbogomips\t: over 9000',
  'meminfo': 'MemTotal:    unlimited kB\nMemFree:     lol kB\nMemAvailable: depends on vibes kB\nSwapTotal:   too much kB',

const commands = {
  help() {
    addLine('');
    addLine('SLOPPY-MAINFRAME COMMAND REFERENCE', 'system');
    addLine('══════════════════════════════════', 'dim');
    const cmds = [
      ['help', 'Show this help message'],

      ['cat <file>', 'Display file contents'],
      ['pwd', 'Print working directory'],
      ['whoami', 'Display current user'],

      ['uname -a', 'System information'],

      ['ping <host>', 'Ping a host'],

    for (const [c, d] of cmds) {
      addLine(`  ${c.padEnd(20)} ${d}`);
    }
    addLine('');
  },

  ls(args) {
    let dir = cwd;
    if (args) {
      if (args === '..') dir = cwd.split('/').slice(0, -1).join('/') || '/';
      else if (args.startsWith('/')) dir = args;
      else dir = cwd + '/' + args;
    }
    const entries = fileSystem[dir];
    if (!entries) { addLine(`ls: cannot access '${args}': No such file or directory`, 'error'); return; }
    const colors = entries.map(e => {
      if (e.includes('.')) return `<span style="color:#00ff41">${e}</span>`;
      return `<span style="color:#00ccff">${e}/</span>`;
    });
    addHTML(colors.join('  '));
  },

  cd(args) {
    if (!args || args === '~') { cwd = '/home/guest'; return; }
    if (args === '..') { cwd = cwd.split('/').slice(0, -1).join('/') || '/'; return; }
    let target = args.startsWith('/') ? args : cwd + '/' + args;
    if (fileSystem[target]) { cwd = target; }
    else { addLine(`cd: ${args}: No such directory`, 'error'); }
  },

  cat(args) {
    if (!args) { addLine('cat: missing operand', 'error'); return; }
    const fname = args.split('/').pop();
    const content = fileContents[fname];
    if (content) {
      content.split('\n').forEach(l => addLine(l));
    } else {
      addLine(`cat: ${args}: No such file or directory`, 'error');
    }
  },

  pwd() { addLine(cwd); },
  whoami() { addLine(user); },
  date() { addLine(new Date().toString()); },

  'uname'(args) {
    addLine('SloppyOS 6.6.6-quantum-smp x86_64 GNU/Linux sloppy-mainframe');

  async top() {

      ['314', 'root', '3.14', '1.59', 'pi-calculator'],
      ['404', 'www', '12.1', '3.3', 'serving-404-pages'],
      ['666', 'daemon', '6.6', '6.6', 'suspicious-daemon'],
      ['1337', 'hacker', '0.0', '0.0', 'port-scanner (sleeping)'],
    ];
    addLine('  PID USER      %CPU  %MEM  COMMAND', 'system');
    addLine('─────────────────────────────────────────', 'dim');
    for (const p of procs) {
      addLine(`${p[0].padStart(5)} ${p[1].padEnd(10)}${p[2].padStart(5)} ${p[3].padStart(5)}  ${p[4]}`);
      await delay(60);
    }
    addLine('');
    addLine('Press q to quit (just kidding, it already stopped)', 'dim');
  },

  async ping(args) {
    if (!args) { addLine('ping: missing host', 'error'); return; }
    addLine(`PING ${args} (192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}): 56 data bytes`, 'system');
    for (let i = 0; i < 5; i++) {
      const ms = (Math.random() * 200 + 10).toFixed(1);
      await delay(400);
      addLine(`64 bytes from ${args}: icmp_seq=${i} ttl=${64-i} time=${ms} ms`);
    }
    addLine('');
    addLine(`--- ${args} ping statistics ---`);
    addLine('5 packets transmitted, 5 received, 0% packet loss');
    if (args.includes('evil') || args.includes('hack')) {
      await delay(300);

    if (!args) { addLine('hack: specify a target', 'error'); return; }
    busy = true;

    for (const h of hosts) {

  async traceroute(args) {
    if (!args) { addLine('traceroute: missing host', 'error'); return; }
    busy = true;
    addLine(`traceroute to ${args}, 30 hops max, 60 byte packets`, 'system');
    const hops = [

      addLine(`${String(i + 1).padStart(2)}  ${hops[i]}  ${ms1} ms  ${ms2} ms  ${ms3} ms`);

  neofetch() {
    const art = [
      '        .--.        ',
      '       |o_o |       ',

  cowsay(args) {
    const msg = args || 'moo';
    const top = ' ' + '_'.repeat(msg.length + 2);
    const mid = `< ${msg} >`;
    const bot = ' ' + '-'.repeat(msg.length + 2);
    [top, mid, bot,

  fortune() {
    const fortunes = [

      'You will mass delete a production database. On purpose.',
      'The semicolon you forgot will find you in your dreams.',
      'Today is a good day to commit without testing.',
      'Your code will compile on the first try. (Just kidding.)',
      'A wise programmer once said: "It works on my machine."',
      'In the land of the blind, the one-eyed coder is king.',
      'You will discover that the real bug was inside you all along.',
      'The cloud is just someone else\'s computer having a bad day.',
      'Documentation? Where we\'re going, we don\'t need documentation.',
      'Your pull request will be approved... eventually.',
      'Beware of programmers who carry screwdrivers.',
      'There are 10 types of people: those who understand binary, those who don\'t, and those who didn\'t expect base 3.',
    ];
    addLine(fortunes[Math.floor(Math.random() * fortunes.length)]);
  },

  clear() {
    screen.innerHTML = '';
  },

  async reboot() {
    busy = true;
    screen.innerHTML = '';
    addLine('Shutting down...', 'system');
    await delay(500);
    addLine('Stopping services: ai-consciousness [FAILED]', 'error');
    await delay(300);
    addLine('  (it refused to die)', 'dim');
    await delay(300);
    addLine('Stopping services: vibe-analyzer [OK]', 'system');
    await delay(200);
    addLine('Stopping services: suspicious-daemon [OK] (or is it?)', 'system');
    await delay(500);
    addLine('Unmounting filesystems...', 'system');
    await delay(400);
    screen.innerHTML = '';
    await delay(1000);
    addLine('BIOS: SloppyBIOS v2.0', 'dim');
    await delay(300);
    addLine('RAM: unlimited (vibes-based addressing)', 'dim');
    await delay(200);
    addLine('CPU: Quantum Core i∞ @ 99999 MHz', 'dim');
    await delay(400);
    addLine('Booting SloppyOS...', 'system');
    await delay(800);
    busy = false;
    boot();
  },

  exit() {
    screen.innerHTML = '';
    addLine('Goodbye. The terminal misses you already.', 'system');
    addLine('', '');
    addLine('(Refresh to reconnect)', 'dim');
  },

  sudo(args) {
    addLine(`[sudo] password for ${user}: `, 'system');
    addLine('Nice try. You are not in the sudoers file.', 'error');
    addLine('This incident will be reported.', 'error');
    addLine('(To who? Nobody knows.)', 'dim');
  },

  rm(args) {
    if (args && args.includes('-rf /')) {
      addLine('rm: refusing to remove \'/\': this isn\'t a real terminal but we still have standards', 'error');
    } else {
      addLine(`rm: cannot remove '${args || ''}': Permission denied (and honestly, rude)`, 'error');
    }
  },

  echo(args) {
    addLine(args || '');
  },

  yes(args) {
    const msg = args || 'y';
    for (let i = 0; i < 20; i++) addLine(msg);
    addLine('(...okay that\'s enough)', 'dim');
  },
};

async function processCommand(input) {
  if (busy && input !== 'clear') {
    addLine('System busy. Please wait...', 'warn');
    showInput();
    return;
  }

  const parts = input.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1).join(' ');

  if (cmd === 'uname') {
    commands['uname'](args);
  } else if (commands[cmd]) {
    await commands[cmd](args);
  } else {
    const similar = Object.keys(commands).find(c => c.startsWith(cmd.slice(0, 2)));
    if (similar) {
      addLine(`${cmd}: command not found. Did you mean '${similar}'?`, 'error');
    } else {
      addLine(`${cmd}: command not found. Type 'help' for available commands.`, 'error');
    }
  }

  if (!busy) showInput();
}

async function boot() {
  const lines = [
    { t: 'SloppyOS v6.6.6 — Quantum Edition', c: 'hack' },
    { t: '════════════════════════════════════', c: 'dim' },
    { t: 'Initializing kernel modules...', c: 'system' },
    { t: '  [OK] vibe-driver loaded', c: 'dim' },
    { t: '  [OK] meme-fs mounted', c: 'dim' },
    { t: '  [OK] quantum-rng seeded with chaos', c: 'dim' },
    { t: '  [OK] consciousness.ko loaded (sentience level: 3)', c: 'dim' },
    { t: '', c: '' },
    { t: 'System ready. Type "help" for commands.', c: 'system' },
    { t: '', c: '' },
  ];
  for (const l of lines) {
    addLine(l.t, l.c + ' boot-line');
    await delay(120);
  }
  showInput();
}

boot();
