<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Koi Pond</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐟">
<meta property="og:title" content="Koi Pond">
<meta property="og:description" content="A serene koi pond. Click the water to make ripples — the fish will come.">
<meta property="og:url" content="https://sloppy.live/koi-pond">
<meta property="og:image" content="https://sloppy.live/koi-pond/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a2820;overflow:hidden;font-family:'Shippori Mincho',serif;color:#d4d4c8;touch-action:none;cursor:crosshair}
canvas{display:block;position:fixed;inset:0}
.title{position:fixed;top:20px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;font-size:clamp(14px,3vw,20px);letter-spacing:6px;color:rgba(255,255,255,0.35);font-weight:400}
.haiku{position:fixed;bottom:24px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;font-size:11px;color:rgba(255,255,255,0.2);font-style:italic;line-height:1.8;letter-spacing:1px}
.count{position:fixed;top:20px;right:24px;z-index:10;pointer-events:none;font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:2px}
.zen-tools{position:fixed;bottom:18px;right:20px;z-index:11;display:flex;gap:8px;opacity:0.45;transition:opacity 0.4s;font-size:11px}
.zen-tools:hover{opacity:1}
.zen-tools button{background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.65);font-family:'Shippori Mincho',serif;letter-spacing:0.18em;padding:4px 10px;border-radius:14px;cursor:pointer;font-size:10px;text-transform:uppercase}
.zen-tools button:hover{color:#fff;border-color:rgba(255,255,255,0.4)}
.zen-tools button[aria-pressed="true"]{color:#ffd9a8;border-color:#ffd9a8}
body.screensaver{cursor:none}
body.screensaver .title,body.screensaver .haiku,body.screensaver .count,body.screensaver .zen-tools{opacity:0;pointer-events:none;transition:opacity 1.4s}
body.screensaver:hover .zen-tools{opacity:0.45;pointer-events:auto}
@media (prefers-reduced-motion: reduce){.zen-tools button{transition:none}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="title">鯉 KOI POND 鯉</div>
<div class="count" id="count">0 koi</div>
<div class="haiku">click the still water<br>colorful fish drift toward you<br>find your own quiet</div>
<div class="zen-tools" aria-label="ambient controls">
  <button type="button" id="btn-zen" aria-pressed="false" title="screensaver mode · hides UI">⊙ zen</button>
  <button type="button" id="btn-sound" aria-pressed="false" title="soft chimes on ripples">♪ chimes</button>
</div>

<script>
var c=document.getElementById('c'),ctx=c.getContext('2d');
var W,H;
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

var ripples=[];
var fish=[];
var leaves=[];
var sparkles=[];
var lotuses=[];          // pink lotus blooms drifting on the surface
var lilypads=[];         // additional lily pads spawned by ambient events
var fireflies=[];        // small glowing dots that drift across at "dusk"
var jumpers=[];          // active koi-jump animations (sprite + arc)
var t=0;
var soundOn=false;
var muteUntil=0;

// Koi color palettes
var KOI_PALETTES=[
  {body:'#ff6b3d',spot:'#fff5e6',accent:'#cc3300'}, // classic orange/white
  {body:'#fff5e6',spot:'#ff3322',accent:'#cc2200'}, // white with red
  {body:'#1a1a1a',spot:'#ffaa44',accent:'#000'}, // black with gold
  {body:'#ffd700',spot:'#fff5e6',accent:'#cc9900'}, // gold
  {body:'#e8e8f0',spot:'#3a3a4a',accent:'#222'}, // silver
  {body:'#ff4488',spot:'#fff0f5',accent:'#cc1155'}, // pink
  {body:'#5a8aa8',spot:'#e0f0ff',accent:'#2a4a68'}, // blue
  {body:'#aa6b3d',spot:'#fff0d8',accent:'#663311'}, // bronze
  {body:'#88cc55',spot:'#f0ffe0',accent:'#446622'}, // green
];

// Spawn initial koi
function spawnFish(x,y){
  var pal=KOI_PALETTES[Math.floor(Math.random()*KOI_PALETTES.length)];
  fish.push({
    x:x===undefined?Math.random()*W:x,
    y:y===undefined?Math.random()*H:y,
    angle:Math.random()*Math.PI*2,
    targetAngle:Math.random()*Math.PI*2,
    speed:0.5+Math.random()*0.4,
    size:14+Math.random()*10,
    palette:pal,
    wiggle:Math.random()*Math.PI*2,
    target:null,
    targetTime:0,
    spotPattern:Math.floor(Math.random()*4)
  });
  updateCount();
}

function updateCount(){
  document.getElementById('count').textContent=fish.length+' koi';
}

// Initial fish
for(var i=0;i<5;i++)spawnFish();

// Initial floating leaves
for(var i=0;i<8;i++){
  leaves.push({
    x:Math.random()*W,
    y:Math.random()*H,
    rot:Math.random()*Math.PI*2,
    vrot:(Math.random()-0.5)*0.005,
    drift:Math.random()*Math.PI*2,
    size:6+Math.random()*8,
    color:Math.random()>0.5?'#3d5a3d':'#2a4530'
  });
}

function addRipple(x,y){
  ripples.push({
    x:x,y:y,
    radius:0,
    maxRadius:60+Math.random()*40,
    opacity:0.7,
    speed:1.2+Math.random()*0.5
  });
  // Inner ripple
  setTimeout(function(){
    if(ripples.length<60)ripples.push({x:x,y:y,radius:0,maxRadius:50,opacity:0.4,speed:1.0});
  },120);
  setTimeout(function(){
    if(ripples.length<60)ripples.push({x:x,y:y,radius:0,maxRadius:35,opacity:0.3,speed:0.9});
  },240);

  // Sparkles
  for(var i=0;i<6;i++){
    var a=Math.random()*Math.PI*2;
    var d=Math.random()*15;
    sparkles.push({
      x:x+Math.cos(a)*d,
      y:y+Math.sin(a)*d,
      vx:Math.cos(a)*0.5,
      vy:Math.sin(a)*0.5-0.3,
      life:30+Math.random()*20,
      size:1+Math.random()*1.5
    });
  }

  // Attract nearby fish
  fish.forEach(function(f){
    var dx=x-f.x,dy=y-f.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<400){
      f.target={x:x,y:y};
      f.targetTime=120+Math.random()*60;
      f.targetAngle=Math.atan2(dy,dx);
    }
  });
}

function drawWater(){
  // Pond background — deep teal with gradient
  var g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  g.addColorStop(0,'#1a3540');
  g.addColorStop(0.5,'#0f2228');
  g.addColorStop(1,'#06141a');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);

  // Caustic light patches
  for(var i=0;i<5;i++){
    var cx=W*0.2+i*W*0.18+Math.sin(t*0.001+i)*30;
    var cy=H*0.3+Math.cos(t*0.0008+i*1.3)*40;
    var r=80+Math.sin(t*0.002+i)*20;
    var cg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    cg.addColorStop(0,'rgba(120,200,200,0.04)');
    cg.addColorStop(1,'rgba(120,200,200,0)');
    ctx.fillStyle=cg;
    ctx.fillRect(0,0,W,H);
  }
}

function drawRipple(r){
  ctx.beginPath();
  ctx.arc(r.x,r.y,r.radius,0,Math.PI*2);
  ctx.strokeStyle='rgba(180,220,230,'+r.opacity+')';
  ctx.lineWidth=1.5;
  ctx.stroke();
  // Highlight
  ctx.beginPath();
  ctx.arc(r.x,r.y,r.radius+1,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,'+(r.opacity*0.4)+')';
  ctx.lineWidth=0.8;
  ctx.stroke();
}

function drawKoi(f){
  ctx.save();
  ctx.translate(f.x,f.y);
  ctx.rotate(f.angle);

  var s=f.size;
  var wiggle=Math.sin(f.wiggle)*0.3;

  // Tail
  ctx.fillStyle=f.palette.body;
  ctx.beginPath();
  ctx.moveTo(-s*0.8,0);
  ctx.quadraticCurveTo(-s*1.4,-s*0.5+wiggle*s,-s*1.6,-s*0.2+wiggle*s);
  ctx.quadraticCurveTo(-s*1.3,0,-s*1.6,s*0.2+wiggle*s);
  ctx.quadraticCurveTo(-s*1.4,s*0.5+wiggle*s,-s*0.8,0);
  ctx.closePath();
  ctx.fill();

  // Body shadow under
  ctx.shadowColor='rgba(0,0,0,0.4)';
  ctx.shadowBlur=8;
  ctx.shadowOffsetY=2;

  // Body — elongated ellipse
  ctx.fillStyle=f.palette.body;
  ctx.beginPath();
  ctx.ellipse(0,0,s,s*0.45,0,0,Math.PI*2);
  ctx.fill();

  ctx.shadowColor='transparent';
  ctx.shadowBlur=0;

  // Spots / pattern
  ctx.fillStyle=f.palette.spot;
  if(f.spotPattern===0){
    // Two big spots
    ctx.beginPath();ctx.ellipse(-s*0.2,-s*0.1,s*0.3,s*0.2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(s*0.3,s*0.1,s*0.25,s*0.18,0,0,Math.PI*2);ctx.fill();
  }else if(f.spotPattern===1){
    // Stripe down back
    ctx.beginPath();ctx.ellipse(0,-s*0.15,s*0.7,s*0.12,0,0,Math.PI*2);ctx.fill();
  }else if(f.spotPattern===2){
    // Many small spots
    ctx.beginPath();ctx.ellipse(-s*0.4,0,s*0.12,s*0.1,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(0,-s*0.15,s*0.13,s*0.1,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(s*0.3,s*0.12,s*0.12,s*0.1,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(s*0.5,-s*0.05,s*0.1,s*0.08,0,0,Math.PI*2);ctx.fill();
  }else{
    // Head spot
    ctx.beginPath();ctx.ellipse(s*0.5,0,s*0.25,s*0.18,0,0,Math.PI*2);ctx.fill();
  }

  // Side fins
  ctx.fillStyle=f.palette.body;
  var finWiggle=Math.sin(f.wiggle*1.2)*0.2;
  ctx.beginPath();
  ctx.ellipse(s*0.1,-s*0.4,s*0.25,s*0.12,Math.PI/4+finWiggle,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(s*0.1,s*0.4,s*0.25,s*0.12,-Math.PI/4-finWiggle,0,Math.PI*2);
  ctx.fill();

  // Eye
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.arc(s*0.7,-s*0.12,s*0.06,0,Math.PI*2);
  ctx.fill();
  // Eye highlight
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(s*0.72,-s*0.13,s*0.02,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawLeaf(l){
  ctx.save();
  ctx.translate(l.x,l.y);
  ctx.rotate(l.rot);
  ctx.fillStyle=l.color;
  ctx.beginPath();
  ctx.ellipse(0,0,l.size,l.size*0.4,0,0,Math.PI*2);
  ctx.fill();
  // Vein
  ctx.strokeStyle='rgba(0,0,0,0.3)';
  ctx.lineWidth=0.5;
  ctx.beginPath();
  ctx.moveTo(-l.size,0);
  ctx.lineTo(l.size,0);
  ctx.stroke();
  ctx.restore();
}

/* ── AMBIENT EVENTS ── periodic "signs of life" so the pond never feels dead.
   Every 6-12s a random event fires: a lotus opens, a koi jumps with a
   splash, fireflies drift across at dusk, a lily pad sprouts, or a soft
   rain shower drops ~12 ripples across the surface. Each event has its
   own update + draw and self-cleans when done. */
function spawnLotus(){
  // lotus pad with 8 pink petals that opens over 1.4s, holds, then closes
  lotuses.push({
    x: 80 + Math.random() * (W - 160),
    y: 80 + Math.random() * (H - 160),
    age: 0, life: 14, openK: 0,
    seed: Math.random(),
  });
}
function spawnLilypad(){
  // simple round pad that fades in over 2s, drifts for 25s, fades out
  lilypads.push({
    x: 60 + Math.random() * (W - 120),
    y: 60 + Math.random() * (H - 120),
    age: 0, life: 25,
    r: 28 + Math.random() * 22,
    rot: Math.random() * Math.PI * 2,
    drift: Math.random() * Math.PI * 2,
    tint: ['#3d5a3d', '#2a4530', '#4a6a48'][(Math.random()*3)|0],
  });
}
function spawnFireflies(){
  // 3-6 fireflies enter from a random edge, drift across the screen, exit
  var n = 3 + ((Math.random() * 4) | 0);
  var edge = (Math.random() * 4) | 0;
  for (var i = 0; i < n; i++){
    var x, y, vx, vy;
    var sp = 0.4 + Math.random() * 0.5;
    if (edge === 0){ x = -20; y = Math.random() * H; vx = sp; vy = (Math.random() - 0.5) * 0.3; }
    else if (edge === 1){ x = W + 20; y = Math.random() * H; vx = -sp; vy = (Math.random() - 0.5) * 0.3; }
    else if (edge === 2){ x = Math.random() * W; y = -20; vx = (Math.random() - 0.5) * 0.3; vy = sp; }
    else { x = Math.random() * W; y = H + 20; vx = (Math.random() - 0.5) * 0.3; vy = -sp; }
    fireflies.push({ x: x, y: y, vx: vx, vy: vy, ph: Math.random() * Math.PI * 2, life: 1200 + Math.random() * 400 });
  }
}
function spawnKoiJump(){
  // pick a random koi, animate it briefly above the water then splash back
  if (!fish.length) return;
  var f = fish[(Math.random() * fish.length) | 0];
  jumpers.push({ x: f.x, y: f.y, palette: f.palette, age: 0, life: 50, srcAngle: f.angle });
  // splash ripple
  addRipple(f.x, f.y);
  setTimeout(function(){ addRipple(f.x, f.y); }, 280);
  if (soundOn) chime(660 + Math.random() * 200);
}
function spawnRain(){
  // 12 soft ripples scattered over 2.5 seconds
  for (var i = 0; i < 12; i++){
    setTimeout((function(idx){ return function(){
      if (Math.random() < 0.7) addRipple(40 + Math.random() * (W - 80), 40 + Math.random() * (H - 80));
    }; })(i), i * 220 + Math.random() * 80);
  }
}

var AMBIENT_EVENTS = [spawnLotus, spawnKoiJump, spawnLilypad, spawnFireflies, spawnRain, spawnLotus, spawnKoiJump];
function scheduleAmbient(){
  var wait = 6000 + Math.random() * 6000;
  setTimeout(function(){
    var ev = AMBIENT_EVENTS[(Math.random() * AMBIENT_EVENTS.length) | 0];
    try { ev(); } catch(e){}
    scheduleAmbient();
  }, wait);
}
scheduleAmbient();

function drawLotus(lo){
  lo.age += 1/60;
  // open over 1.4s, hold, close over last 1.4s
  if (lo.age < 1.4) lo.openK = lo.age / 1.4;
  else if (lo.age > lo.life - 1.4) lo.openK = Math.max(0, (lo.life - lo.age) / 1.4);
  else lo.openK = 1;
  if (lo.age > lo.life) return false;
  ctx.save();
  ctx.translate(lo.x, lo.y);
  // green pad under
  ctx.fillStyle = 'rgba(45, 80, 50, 0.85)';
  ctx.beginPath(); ctx.arc(0, 0, 22 + lo.openK * 4, 0, Math.PI * 2); ctx.fill();
  // 8 petals fanned out + opening
  var petalLen = 8 + lo.openK * 16;
  var petalW = 4 + lo.openK * 3;
  ctx.fillStyle = 'rgba(255, 195, 220, ' + (0.55 + lo.openK * 0.30) + ')';
  for (var i = 0; i < 8; i++){
    var a = (i / 8) * Math.PI * 2 + lo.seed * Math.PI;
    ctx.save();
    ctx.rotate(a);
    ctx.beginPath();
    ctx.ellipse(0, -petalLen * 0.6, petalW, petalLen, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // gold centre
  ctx.fillStyle = 'rgba(255, 220, 120, ' + (0.4 + lo.openK * 0.5) + ')';
  ctx.beginPath(); ctx.arc(0, 0, 3 + lo.openK * 2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  return true;
}
function drawLilypad(lp){
  lp.age += 1/60;
  if (lp.age > lp.life) return false;
  var fadeIn = Math.min(1, lp.age / 2);
  var fadeOut = Math.min(1, (lp.life - lp.age) / 2);
  var alpha = Math.min(fadeIn, fadeOut) * 0.85;
  lp.drift += 0.003;
  lp.x += Math.sin(lp.drift) * 0.04;
  lp.y += Math.cos(lp.drift * 0.7) * 0.03;
  ctx.save();
  ctx.translate(lp.x, lp.y);
  ctx.rotate(lp.rot);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = lp.tint;
  ctx.beginPath(); ctx.arc(0, 0, lp.r, 0.32, Math.PI * 2 + 0.32); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
  // veins
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.30)';
  ctx.lineWidth = 0.8;
  for (var i = 0; i < 5; i++){
    var a = -Math.PI * 0.5 + i * 0.32;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a) * lp.r * 0.96, Math.sin(a) * lp.r * 0.96); ctx.stroke();
  }
  ctx.restore();
  ctx.globalAlpha = 1;
  return true;
}
function drawFirefly(ff){
  ff.x += ff.vx; ff.y += ff.vy;
  ff.ph += 0.12;
  ff.life--;
  if (ff.life <= 0 || ff.x < -40 || ff.x > W + 40 || ff.y < -40 || ff.y > H + 40) return false;
  var glow = 0.55 + 0.45 * Math.sin(ff.ph);
  var rg = ctx.createRadialGradient(ff.x, ff.y, 0, ff.x, ff.y, 16);
  rg.addColorStop(0, 'rgba(255, 240, 160, ' + (0.85 * glow) + ')');
  rg.addColorStop(0.4, 'rgba(255, 220, 90, ' + (0.35 * glow) + ')');
  rg.addColorStop(1, 'rgba(255, 220, 90, 0)');
  ctx.fillStyle = rg;
  ctx.beginPath(); ctx.arc(ff.x, ff.y, 16, 0, Math.PI * 2); ctx.fill();
  // pinprick core
  ctx.fillStyle = 'rgba(255, 250, 200, ' + glow + ')';
  ctx.beginPath(); ctx.arc(ff.x, ff.y, 1.4, 0, Math.PI * 2); ctx.fill();
  return true;
}
function drawJumper(j){
  j.age++;
  if (j.age > j.life) return false;
  // arc — peak at j.age = life/2
  var k = j.age / j.life;
  var arc = Math.sin(k * Math.PI);
  var lift = arc * 28;
  // forward motion
  var fx = j.x + Math.cos(j.srcAngle) * (k * 60);
  var fy = j.y + Math.sin(j.srcAngle) * (k * 60) - lift;
  // shadow on water (oval, scales with lift)
  ctx.fillStyle = 'rgba(0, 0, 0, ' + (0.30 - arc * 0.20) + ')';
  ctx.beginPath();
  ctx.ellipse(j.x + Math.cos(j.srcAngle) * (k * 60), j.y + Math.sin(j.srcAngle) * (k * 60), 14 + arc * 8, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // koi body in the air — scaled by lift
  ctx.save();
  ctx.translate(fx, fy);
  ctx.rotate(j.srcAngle + (0.5 - k) * 0.8);
  ctx.scale(1 + arc * 0.25, 1 + arc * 0.25);
  ctx.fillStyle = j.palette.body;
  ctx.beginPath(); ctx.ellipse(0, 0, 14, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = j.palette.spot;
  ctx.beginPath(); ctx.ellipse(-2, 0, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
  // tail
  ctx.fillStyle = j.palette.body;
  ctx.beginPath();
  ctx.moveTo(-12, 0); ctx.lineTo(-22, -6); ctx.lineTo(-22, 6); ctx.closePath();
  ctx.fill();
  ctx.restore();
  return true;
}

/* ── AUDIO — soft chime on click/jump if sound is enabled ── */
var audioCtx = null;
function ensureAudio(){
  if (audioCtx) return audioCtx;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  return audioCtx;
}
function chime(freq){
  if (!soundOn) return;
  ensureAudio();
  if (!audioCtx) return;
  var t0 = audioCtx.currentTime;
  // 3-note minor-triad chime (singing bowl-ish)
  function n(f, delay, vol){
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t0 + delay);
    g.gain.linearRampToValueAtTime(vol || 0.06, t0 + delay + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + delay + 1.4);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t0 + delay); o.stop(t0 + delay + 1.5);
  }
  n(freq, 0, 0.06);
  n(freq * 1.20, 0.10, 0.04);
  n(freq * 1.50, 0.22, 0.025);
}

/* ── UI hooks ── */
document.getElementById('btn-zen').addEventListener('click', function(e){
  var on = document.body.classList.toggle('screensaver');
  e.currentTarget.setAttribute('aria-pressed', on ? 'true' : 'false');
});
document.getElementById('btn-sound').addEventListener('click', function(e){
  soundOn = !soundOn;
  e.currentTarget.setAttribute('aria-pressed', soundOn ? 'true' : 'false');
  if (soundOn){ ensureAudio(); if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); chime(660); }
});
// keyboard: F or Z toggles zen mode; M toggles chimes
window.addEventListener('keydown', function(e){
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if (e.key === 'f' || e.key === 'F' || e.key === 'z' || e.key === 'Z') document.getElementById('btn-zen').click();
  else if (e.key === 'm' || e.key === 'M') document.getElementById('btn-sound').click();
});

function update(){
  t++;
  drawWater();

  // Leaves
  for(var i=0;i<leaves.length;i++){
    var l=leaves[i];
    l.drift+=0.005;
    l.x+=Math.sin(l.drift)*0.15;
    l.y+=Math.cos(l.drift*0.7)*0.1;
    l.rot+=l.vrot;
    if(l.x<-20)l.x=W+20;if(l.x>W+20)l.x=-20;
    if(l.y<-20)l.y=H+20;if(l.y>H+20)l.y=-20;
    drawLeaf(l);
  }

  // Ambient lily pads (sprouted by events)
  for(var i=lilypads.length-1;i>=0;i--){ if(!drawLilypad(lilypads[i])) lilypads.splice(i,1); }
  // Ambient lotus blooms
  for(var i=lotuses.length-1;i>=0;i--){ if(!drawLotus(lotuses[i])) lotuses.splice(i,1); }

  // Update + draw fish
  for(var i=0;i<fish.length;i++){
    var f=fish[i];
    f.wiggle+=0.15;

    // Target seeking
    if(f.target&&f.targetTime>0){
      f.targetTime--;
      var dx=f.target.x-f.x,dy=f.target.y-f.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<20){f.target=null}
      else{
        f.targetAngle=Math.atan2(dy,dx);
      }
    }else if(Math.random()<0.005){
      f.targetAngle+=(Math.random()-0.5)*1.5;
    }

    // Smooth angle interpolation
    var diff=f.targetAngle-f.angle;
    while(diff>Math.PI)diff-=Math.PI*2;
    while(diff<-Math.PI)diff+=Math.PI*2;
    f.angle+=diff*0.05;

    // Speed boost when seeking
    var spd=f.speed*(f.target?2.2:1);
    f.x+=Math.cos(f.angle)*spd;
    f.y+=Math.sin(f.angle)*spd;

    // Wrap or bounce off edges softly
    if(f.x<30){f.targetAngle=0;f.x=30}
    if(f.x>W-30){f.targetAngle=Math.PI;f.x=W-30}
    if(f.y<30){f.targetAngle=Math.PI/2;f.y=30}
    if(f.y>H-30){f.targetAngle=-Math.PI/2;f.y=H-30}

    drawKoi(f);
  }

  // Ripples
  for(var i=ripples.length-1;i>=0;i--){
    var r=ripples[i];
    r.radius+=r.speed;
    r.opacity*=0.985;
    if(r.radius>r.maxRadius||r.opacity<0.02){
      ripples.splice(i,1);continue;
    }
    drawRipple(r);
  }

  // Sparkles
  for(var i=sparkles.length-1;i>=0;i--){
    var s=sparkles[i];
    s.x+=s.vx;s.y+=s.vy;
    s.vy+=0.02;
    s.life--;
    if(s.life<=0){sparkles.splice(i,1);continue}
    ctx.globalAlpha=s.life/40;
    ctx.fillStyle='#cce8f0';
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }

  // Ambient: jumping koi (drawn above water + casts a shadow on it)
  for(var i=jumpers.length-1;i>=0;i--){ if(!drawJumper(jumpers[i])) jumpers.splice(i,1); }
  // Ambient: fireflies (drift over the surface — additive glow)
  if (fireflies.length){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for(var i=fireflies.length-1;i>=0;i--){ if(!drawFirefly(fireflies[i])) fireflies.splice(i,1); }
    ctx.restore();
  }

  requestAnimationFrame(update);
}
update();

// Input
function handleClick(x,y){
  addRipple(x,y);
  if (soundOn) chime(440 + Math.random() * 220);
  // Spawn a new fish occasionally
  if(Math.random()<0.18&&fish.length<25){
    var edge=Math.floor(Math.random()*4);
    var fx,fy;
    if(edge===0){fx=-30;fy=Math.random()*H}
    else if(edge===1){fx=W+30;fy=Math.random()*H}
    else if(edge===2){fx=Math.random()*W;fy=-30}
    else{fx=Math.random()*W;fy=H+30}
    spawnFish(fx,fy);
    // New fish heads toward click
    var newF=fish[fish.length-1];
    newF.target={x:x,y:y};
    newF.targetTime=200;
    newF.targetAngle=Math.atan2(y-newF.y,x-newF.x);
    newF.angle=newF.targetAngle;
  }
}

c.addEventListener('click',function(e){handleClick(e.clientX,e.clientY)});
c.addEventListener('touchstart',function(e){
  e.preventDefault();
  for(var i=0;i<e.touches.length;i++){
    handleClick(e.touches[i].clientX,e.touches[i].clientY);
  }
},{passive:false});
</script>
