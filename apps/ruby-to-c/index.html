<html lang="en">

<style>
:root{
  --bg:#1a1018;
  --bg-deep:#0f0a10;
  --panel:#221620;
  --panel-soft:#2a1c28;
  --ink:#0a0608;
  --cream:#f0e3d3;
  --dim:#8a7878;
  --ruby:#d83a4a;
  --c-blue:#5ec0e0;
  --gold:#e8b454;
  --green:#7dc97a;
  --magenta:#c986e0;
  --err:#ff5a64;
  --line:rgba(232,180,84,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg-deep);color:var(--cream);font-family:'IBM Plex Sans',sans-serif;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 0% 0%, #2a1820 0%, transparent 50%),
    radial-gradient(ellipse at 100% 100%, #1a1828 0%, transparent 60%),
    var(--bg-deep);
  min-height:100vh;
  display:flex;flex-direction:column;
}
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0.8rem 1.4rem;border-bottom:1px solid var(--line);
  background:rgba(15,10,16,0.6);
}
h1{
  font-family:'Crimson Pro',serif;
  font-weight:600;font-style:italic;
  font-size:1.5rem;color:var(--cream);
  letter-spacing:-0.01em;
}
h1 .ruby{color:var(--ruby)}
h1 .arrow{color:var(--gold);font-family:'JetBrains Mono',monospace;font-style:normal;margin:0 0.3rem}
h1 .c{color:var(--c-blue);font-family:'JetBrains Mono',monospace;font-weight:700;font-style:normal}
.tag{
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  letter-spacing:0.22em;color:var(--dim);text-transform:uppercase;
}
.controls{display:flex;gap:0.5rem;align-items:center}
.btn{
  background:var(--ruby);color:#fff;
  border:none;
  font-family:'JetBrains Mono',monospace;
  font-size:0.72rem;font-weight:600;
  letter-spacing:0.18em;text-transform:uppercase;
  padding:0.4rem 0.95rem;cursor:pointer;
  border-radius:2px;min-height:2.2rem;
  transition:background 0.14s;
}
.btn:hover{background:#e8505a}
.btn.secondary{background:transparent;color:var(--dim);border:1px solid var(--line)}
.btn.secondary:hover{color:var(--cream);border-color:var(--gold)}
.btn.secondary[aria-pressed="true"]{color:var(--gold);border-color:var(--gold)}

main{
  flex:1;display:grid;
  grid-template-columns:1fr 16rem 1fr;
  gap:1px;background:var(--ink);
  min-height:0;
}
.panel{
  background:var(--panel);
  display:flex;flex-direction:column;min-height:0;
}
.panel-head{
  padding:0.6rem 0.9rem;
  border-bottom:1px solid var(--line);

}
.panel-head .lab{
  font-family:'Crimson Pro',serif;font-style:italic;
  font-size:1.05rem;color:var(--cream);font-weight:600;
}
.panel-head .lab.ruby{color:var(--ruby)}
.panel-head .lab.c{color:var(--c-blue)}
.panel-head .meta{
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;

}

.editor{
  flex:1;overflow:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:0.84rem;

  padding:0.8rem 1rem;

  white-space:pre;
  tab-size:2;
  caret-color:var(--gold);
  min-height:0;
}
.editor:focus{background:rgba(232,180,84,0.02)}

.output{
  flex:1;overflow:auto;
  font-family:'JetBrains Mono',monospace;font-size:0.84rem;line-height:1.5;
  padding:0.8rem 1rem;
  white-space:pre;color:var(--cream);
  min-height:0;
}

.token-list{
  flex:1;overflow:auto;
  padding:0.6rem 0.7rem;
  display:flex;flex-direction:column;gap:0.18rem;
  min-height:0;
}
.token{
  font-family:'JetBrains Mono',monospace;
  font-size:0.7rem;
  padding:0.2rem 0.45rem;
  background:rgba(232,180,84,0.05);
  border-left:2px solid var(--gold);
  border-radius:2px;
  color:var(--cream);
  display:flex;justify-content:space-between;align-items:center;gap:0.4rem;
}
.token .type{color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;font-size:0.6rem;font-weight:600}
.token .val{color:var(--cream);font-weight:500;text-align:right;overflow:hidden;text-overflow:ellipsis}
.token.newline{border-left-color:var(--dim);opacity:0.5;background:transparent}
.token.eof{border-left-color:var(--magenta);background:rgba(201,134,224,0.06)}
.token.keyword{border-left-color:var(--ruby);background:rgba(216,58,74,0.08)}
.token.num{border-left-color:var(--green);background:rgba(125,201,122,0.06)}
.token.str{border-left-color:var(--c-blue);background:rgba(94,192,224,0.06)}
.token.op{border-left-color:var(--magenta)}
.token.paren{border-left-color:var(--dim)}

/* Syntax highlighting (output) */
.tok-key{color:var(--ruby);font-weight:600}
.tok-type{color:var(--c-blue);font-weight:600}
.tok-num{color:var(--green)}
.tok-str{color:var(--gold)}
.tok-com{color:var(--dim);font-style:italic}
.tok-fn{color:var(--magenta)}
.tok-punct{color:var(--dim)}
.tok-pre{color:var(--magenta);font-weight:600}

footer{
  border-top:1px solid var(--line);
  padding:0.4rem 1rem;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(15,10,16,0.7);
  font-family:'JetBrains Mono',monospace;font-size:0.7rem;
  color:var(--dim);
  gap:0.8rem;flex-wrap:wrap;
  min-height:2.2rem;
}
.status{flex:1;color:var(--dim)}
.status.ok{color:var(--green)}
.status.err{color:var(--err)}
.foot-info{letter-spacing:0.16em;text-transform:uppercase}

@media (max-width:920px){
  main{grid-template-columns:1fr;grid-template-rows:1fr 10rem 1fr}
}

<body>
<header>
  <h1>
    <span class="ruby">ruby</span><span class="arrow">→</span><span class="c">C</span>
  </h1>
  <span class="tag">lexer · parser · codegen</span>
  <div class="controls">
    <button class="btn secondary" id="autoBtn" type="button" aria-pressed="true">auto</button>
    <button class="btn secondary" id="exampleBtn" type="button">example</button>
    <button class="btn" id="compileBtn" type="button">compile</button>
  </div>
</header>

<main>
  <section class="panel" aria-label="Ruby source">
    <div class="panel-head">
      <span class="lab ruby">source · ruby</span>
      <span class="meta" id="srcMeta">0 lines</span>
    </div>
    <textarea class="editor" id="src" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
  </section>

  <section class="panel" aria-label="Tokens from lexer">
    <div class="panel-head">
      <span class="lab" style="color:var(--gold)">tokens</span>
      <span class="meta" id="tokMeta">0</span>
    </div>
    <div class="token-list" id="tokenList" aria-live="polite"></div>
  </section>

  <section class="panel" aria-label="Compiled C output">
    <div class="panel-head">
      <span class="lab c">output · C</span>
      <span class="meta" id="outMeta">0 bytes</span>
    </div>
    <pre class="output" id="out"></pre>
  </section>
</main>

<footer>
  <span class="status ok" id="status">ready</span>
  <span class="foot-info">int · double · const char* &nbsp;·&nbsp; +  −  ×  ÷  %  =  puts</span>
</footer>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// RUBY → C — a teaching compiler. Lexer, recursive-descent
// parser, code generator. Supports a small subset:
//   int/float literals, string literals
//   arithmetic: + - * / %, unary -, parens
//   assignment: x = expr
//   output: puts expr
//   line comments: # foo
// ─────────────────────────────────────────────────────────────

// ── TOKEN TYPES ──────────────────────────────────────────────
const TT = {
  INT:'INT', FLOAT:'FLOAT', STRING:'STRING', IDENT:'IDENT',
  ASSIGN:'ASSIGN',
  PLUS:'PLUS', MINUS:'MINUS', STAR:'STAR', SLASH:'SLASH', PERCENT:'PERCENT',
  LPAREN:'LPAREN', RPAREN:'RPAREN',
  PUTS:'PUTS',
  NEWLINE:'NEWLINE', EOF:'EOF',
};

// ── LEXER ────────────────────────────────────────────────────
function tokenize(src){
  const tokens = [];
  let i = 0, line = 1, col = 1;
  const len = src.length;
  function emit(type, value){ tokens.push({ type, value, line, col }); }
  function adv(n = 1){
    for (let k = 0; k < n; k++){
      if (src[i] === '\n'){ line++; col = 1; } else { col++; }
      i++;
    }
  }
  while (i < len){
    const c = src[i];
    // line comment
    if (c === '#'){
      while (i < len && src[i] !== '\n') adv();
      continue;
    }
    // whitespace except newline
    if (c === ' ' || c === '\t' || c === '\r'){ adv(); continue; }
    // newline
    if (c === '\n'){ emit(TT.NEWLINE, '\\n'); adv(); continue; }
    // number
    if (c >= '0' && c <= '9'){
      let s = '';
      while (i < len && /[0-9]/.test(src[i])){ s += src[i]; adv(); }
      if (src[i] === '.' && src[i+1] && /[0-9]/.test(src[i+1])){
        s += '.'; adv();
        while (i < len && /[0-9]/.test(src[i])){ s += src[i]; adv(); }
        emit(TT.FLOAT, parseFloat(s));
      } else {
        emit(TT.INT, parseInt(s, 10));
      }
      continue;
    }
    // string
    if (c === '"'){
      adv();
      let s = '';
      while (i < len && src[i] !== '"'){
        if (src[i] === '\\' && i + 1 < len){
          // pass through escape sequences (n, t, ", \, etc.)
          s += src[i] + src[i+1];
          adv(2);
        } else {
          s += src[i]; adv();
        }
      }
      if (src[i] === '"') adv();
      else throw new Error('unterminated string at line ' + line);
      emit(TT.STRING, s);
      continue;
    }
    // identifier / keyword
    if (/[a-zA-Z_]/.test(c)){
      let s = '';
      while (i < len && /[a-zA-Z0-9_]/.test(src[i])){ s += src[i]; adv(); }
      if (s === 'puts') emit(TT.PUTS, s);
      else emit(TT.IDENT, s);
      continue;
    }
    // operators
    switch (c){
      case '+': emit(TT.PLUS, c); adv(); continue;
      case '-': emit(TT.MINUS, c); adv(); continue;
      case '*': emit(TT.STAR, c); adv(); continue;
      case '/': emit(TT.SLASH, c); adv(); continue;
      case '%': emit(TT.PERCENT, c); adv(); continue;
      case '(': emit(TT.LPAREN, c); adv(); continue;
      case ')': emit(TT.RPAREN, c); adv(); continue;
      case '=': emit(TT.ASSIGN, c); adv(); continue;
    }
    throw new Error("unexpected character '" + c + "' at line " + line + ", col " + col);
  }
  emit(TT.EOF, null);
  return tokens;
}

// ── PARSER (recursive descent) ───────────────────────────────
class Parser {
  constructor(tokens){ this.tokens = tokens; this.pos = 0; }
  peek(o = 0){ return this.tokens[this.pos + o]; }
  match(...types){ return types.includes(this.peek().type); }
  eat(type){
    const t = this.peek();
    if (t.type !== type){
      throw new Error("expected " + type + ", got " + t.type + " '" + t.value + "' at line " + t.line);
    }
    this.pos++;
    return t;
  }

  parseProgram(){
    const body = [];
    while (this.peek().type !== TT.EOF){
      if (this.match(TT.NEWLINE)){ this.pos++; continue; }
      body.push(this.parseStmt());
      while (this.match(TT.NEWLINE)) this.pos++;
    }
    return { type:'Program', body };
  }

  parseStmt(){
    if (this.match(TT.PUTS)){
      this.pos++;
      const arg = this.parseExpr();
      return { type:'Puts', arg };
    }
    if (this.match(TT.IDENT) && this.peek(1) && this.peek(1).type === TT.ASSIGN){
      const name = this.eat(TT.IDENT).value;
      this.eat(TT.ASSIGN);
      const value = this.parseExpr();
      return { type:'Assign', name, value };
    }
    const expr = this.parseExpr();
    return { type:'ExprStmt', expr };
  }

  parseExpr(){
    let left = this.parseTerm();
    while (this.match(TT.PLUS, TT.MINUS)){
      const op = this.tokens[this.pos++].type === TT.PLUS ? '+' : '-';
      const right = this.parseTerm();
      left = { type:'BinOp', op, left, right };
    }
    return left;
  }
  parseTerm(){
    let left = this.parseUnary();
    while (this.match(TT.STAR, TT.SLASH, TT.PERCENT)){
      const tt = this.tokens[this.pos++].type;
      const op = tt === TT.STAR ? '*' : tt === TT.SLASH ? '/' : '%';
      const right = this.parseUnary();
      left = { type:'BinOp', op, left, right };
    }
    return left;
  }
  parseUnary(){
    if (this.match(TT.MINUS)){
      this.pos++;
      return { type:'Unary', op:'-', operand: this.parseUnary() };
    }
    return this.parsePrimary();
  }
  parsePrimary(){
    const t = this.peek();
    if (t.type === TT.INT){    this.pos++; return { type:'IntLit',   value: t.value }; }
    if (t.type === TT.FLOAT){  this.pos++; return { type:'FloatLit', value: t.value }; }
    if (t.type === TT.STRING){ this.pos++; return { type:'StrLit',   value: t.value }; }
    if (t.type === TT.IDENT){  this.pos++; return { type:'Ident',    name:  t.value }; }
    if (t.type === TT.LPAREN){
      this.pos++;
      const e = this.parseExpr();
      this.eat(TT.RPAREN);
      return { type:'Group', expr: e };
    }
    throw new Error("unexpected '" + t.value + "' at line " + t.line);
  }
}

// ── CODE GEN (Ruby AST → C) ──────────────────────────────────
class CGen {
  constructor(){
    this.vars = {};   // name → 'int' | 'double' | 'const char*'
    this.lines = [];
  }

  // type-inference: walk an expression and decide the C type
  exprType(n){
    if (n.type === 'IntLit')   return 'int';
    if (n.type === 'FloatLit') return 'double';
    if (n.type === 'StrLit')   return 'const char*';
    if (n.type === 'Ident')    return this.vars[n.name] || 'int';
    if (n.type === 'Unary')    return this.exprType(n.operand);
    if (n.type === 'Group')    return this.exprType(n.expr);
    if (n.type === 'BinOp'){
      const lt = this.exprType(n.left), rt = this.exprType(n.right);
      if (lt === 'const char*' || rt === 'const char*'){
        throw new Error("can't apply '" + n.op + "' to a string");
      }
      // numeric promotion: any double in the mix → double result
      return (lt === 'double' || rt === 'double') ? 'double' : 'int';
    }
    return 'int';
  }

  emitExpr(n){
    if (n.type === 'IntLit')   return String(n.value);
    if (n.type === 'FloatLit'){
      const s = String(n.value);
      return s.includes('.') ? s : s + '.0';
    }
    if (n.type === 'StrLit')   return '"' + n.value + '"';
    if (n.type === 'Ident')    return n.name;
    if (n.type === 'Unary')    return n.op + this.emitExpr(n.operand);
    if (n.type === 'Group')    return '(' + this.emitExpr(n.expr) + ')';
    if (n.type === 'BinOp')    return this.emitExpr(n.left) + ' ' + n.op + ' ' + this.emitExpr(n.right);
    return '';
  }

  emitStmt(stmt){
    if (stmt.type === 'Assign'){
      const valType = this.exprType(stmt.value);
      const exists = this.vars[stmt.name];
      if (!exists){
        this.vars[stmt.name] = valType;
        this.lines.push('    ' + valType + ' ' + stmt.name + ' = ' + this.emitExpr(stmt.value) + ';');
      } else {
        // Variable already declared. If new value-type widens int→double,
        // bump the declared type by editing the earlier line. (Simple impl —
        // we just leave the original declaration and cast on assignment.)
        if (exists === 'int' && valType === 'double'){
          this.lines.push('    ' + stmt.name + ' = (int)(' + this.emitExpr(stmt.value) + ');');
        } else {
          this.lines.push('    ' + stmt.name + ' = ' + this.emitExpr(stmt.value) + ';');
        }
      }
    } else if (stmt.type === 'Puts'){
      const at = this.exprType(stmt.arg);
      const fmt = at === 'double' ? '%f' : at === 'const char*' ? '%s' : '%d';
      this.lines.push('    printf("' + fmt + '\\n", ' + this.emitExpr(stmt.arg) + ');');
    } else if (stmt.type === 'ExprStmt'){
      // bare expression — emit as a statement; compiler may warn, that's fine
      this.lines.push('    (void)(' + this.emitExpr(stmt.expr) + ');');
    }
  }

  generate(program){
    for (const s of program.body) this.emitStmt(s);
    const body = this.lines.length ? this.lines.join('\n') + '\n' : '';
    return '#include <stdio.h>\n\nint main(void) {\n' + body + '    return 0;\n}\n';
  }
}

// ── compile pipeline ─────────────────────────────────────────
function compile(src){
  const tokens = tokenize(src);
  const ast = new Parser(tokens).parseProgram();
  const c = new CGen().generate(ast);
  return { tokens, c };
}

// ── highlighting for the C output ────────────────────────────
const C_KEYWORDS = new Set(['return']);
const C_TYPES    = new Set(['int','double','char','void','const','long','float','short','unsigned','signed','size_t']);
const C_FNS      = new Set(['printf']);

function highlightC(src){
  // Tokenize for highlighting (independent of the actual lexer)
  const out = [];
  const re = /(#[a-zA-Z]+|\/\/[^\n]*|\/\*[\s\S]*?\*\/|"[^"\\]*(?:\\.[^"\\]*)*"|\b\d+(?:\.\d+)?\b|\b[a-zA-Z_][a-zA-Z0-9_]*\b|[(){};,]|\S)/g;
  let last = 0; let m;
  while ((m = re.exec(src)) !== null){
    if (m.index > last) out.push(escapeHtml(src.slice(last, m.index)));
    const tok = m[0];
    if (tok.startsWith('#')){
      out.push('<span class="tok-pre">' + escapeHtml(tok) + '</span>');
    } else if (tok.startsWith('"')){
      out.push('<span class="tok-str">' + escapeHtml(tok) + '</span>');
    } else if (/^\d/.test(tok)){
      out.push('<span class="tok-num">' + escapeHtml(tok) + '</span>');
    } else if (C_TYPES.has(tok)){
      out.push('<span class="tok-type">' + tok + '</span>');
    } else if (C_KEYWORDS.has(tok)){
      out.push('<span class="tok-key">' + tok + '</span>');
    } else if (C_FNS.has(tok)){
      out.push('<span class="tok-fn">' + tok + '</span>');
    } else if (/^[(){};,]$/.test(tok)){
      out.push('<span class="tok-punct">' + tok + '</span>');
    } else {
      out.push(escapeHtml(tok));
    }
    last = m.index + tok.length;
  }
  if (last < src.length) out.push(escapeHtml(src.slice(last)));
  return out.join('');
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── DOM wiring ───────────────────────────────────────────────
const srcEl  = document.getElementById('src');
const tokEl  = document.getElementById('tokenList');
const outEl  = document.getElementById('out');
const srcMeta= document.getElementById('srcMeta');
const tokMeta= document.getElementById('tokMeta');
const outMeta= document.getElementById('outMeta');
const status = document.getElementById('status');
const autoBtn= document.getElementById('autoBtn');
const compileBtn = document.getElementById('compileBtn');
const exampleBtn = document.getElementById('exampleBtn');

const EXAMPLE = `# a tiny ruby program
# computes the area of a glowing circle
r = 4
pi = 3.14159
area = pi * r * r
puts area

# integer arithmetic and a greeting
n = (10 + 5) * 2 - 3
puts n
puts "hello, c"
`;

let auto = true;
let timer = null;

function render(){
  const src = srcEl.value;
  srcMeta.textContent = src.split('\n').length + ' lines';
  try {
    const { tokens, c } = compile(src);
    tokEl.innerHTML = '';
    for (const t of tokens){
      const div = document.createElement('div');
      let cls = 'token';
      if (t.type === 'NEWLINE') cls += ' newline';
      else if (t.type === 'EOF') cls += ' eof';
      else if (t.type === 'PUTS') cls += ' keyword';
      else if (t.type === 'INT' || t.type === 'FLOAT') cls += ' num';
      else if (t.type === 'STRING') cls += ' str';
      else if (['PLUS','MINUS','STAR','SLASH','PERCENT','ASSIGN'].includes(t.type)) cls += ' op';
      else if (t.type === 'LPAREN' || t.type === 'RPAREN') cls += ' paren';
      div.className = cls;
      const valStr = t.value === null ? '—' : (typeof t.value === 'string' ? JSON.stringify(t.value).slice(1, -1) : String(t.value));
      div.innerHTML = '<span class="type">' + t.type + '</span><span class="val">' + escapeHtml(valStr) + '</span>';
      tokEl.appendChild(div);
    }
    tokMeta.textContent = tokens.length + ' tokens';
    outEl.innerHTML = highlightC(c);
    outMeta.textContent = new Blob([c]).size + ' bytes';
    status.textContent = '✓ compiled · ' + tokens.length + ' tokens · ' + c.split('\n').length + ' lines of C';
    status.classList.remove('err'); status.classList.add('ok');
  } catch (e){
    status.textContent = '✗ ' + e.message;
    status.classList.remove('ok'); status.classList.add('err');
  }
}

function scheduleRender(){
  if (!auto) return;
  clearTimeout(timer);
  timer = setTimeout(render, 120);
}

srcEl.addEventListener('input', scheduleRender);

compileBtn.addEventListener('click', render);
autoBtn.addEventListener('click', () => {
  auto = !auto;
  autoBtn.setAttribute('aria-pressed', String(auto));
  autoBtn.textContent = auto ? 'auto' : 'manual';
  if (auto) render();
});
exampleBtn.addEventListener('click', () => {
  srcEl.value = EXAMPLE;
  render();
});

// init
srcEl.value = EXAMPLE;
render();
srcEl.focus();
</script>
</body>
</html>
