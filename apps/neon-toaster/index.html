<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Neon Toaster</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🍞">
  <meta property="og:title" content="Neon Toaster">
  <meta property="og:description" content="Catch falling bread in a glowing interdimensional toaster. Toast or die.">
  <meta property="og:url" content="https://sloppy.live/neon-toaster">
  <meta property="og:image" content="https://sloppy.live/neon-toaster/og-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Overpass+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0812;
      overflow: hidden;
      height: 100dvh;
      font-family: 'Overpass Mono', monospace;
      color: #998;
      touch-action: none;
      user-select: none;
    }
    canvas { display: block; position: fixed; inset: 0; }
    #hud {
      position: fixed; top: 10px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 28px;
      font-family: 'Bungee Shade', cursive;
      font-size: 14px; z-index: 10; pointer-events: none;
    }
    .hud-val { color: #ff9922; text-shadow: 0 0 8px #ff992244; }
    .hud-lives { color: #ff3355; }
    .hud-toast { color: #ffdd44; }
    .hud-label { color: #554; font-size: 11px; font-family: 'Overpass Mono', monospace; }

    #screens {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20; background: rgba(11,8,18,0.94);
    }
    #screens.hidden { display: none; }
    #screens h1 {
      font-family: 'Bungee Shade', cursive;
      font-size: clamp(24px, 6vw, 48px);
      color: #ff9922;
      text-shadow: 0 0 30px #ff992244, 0 0 60px #ff992222;
      margin-bottom: 6px;
    }
    #screens .sub {
      font-size: clamp(11px, 2.5vw, 14px);
      color: #554; margin-bottom: 20px;
      text-align: center; padding: 0 20px; line-height: 1.6;
    }
    #screens .final { font-family: 'Bungee Shade', cursive; font-size: 36px; color: #ff9922; margin: 8px 0; }
    #screens .detail { color: #ffdd44; font-size: 14px; margin-bottom: 16px; }
    .play-btn {
      font-family: 'Bungee Shade', cursive;
      font-size: 16px; padding: 12px 28px;
      background: none; border: 2px solid #ff9922;
      color: #ff9922; cursor: pointer; letter-spacing: 2px;
      transition: all .2s;
    }
    .play-btn:hover { background: #ff9922; color: #0b0812; }
    .hint {
      font-size: 10px; color: #443; margin-top: 14px;
      text-align: center; line-height: 1.7;
    }
    #mobile-lr {
      position: fixed; bottom: 16px;
      left: 0; right: 0;
      display: none; justify-content: center; gap: 24px;
      z-index: 15; pointer-events: none;
    }
    .mb {
      width: 68px; height: 68px; border-radius: 50%;
      border: 2px solid #ff992233; background: rgba(255,153,34,0.06);
      color: #ff9922; font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all; font-family: 'Bungee Shade', cursive;
      -webkit-tap-highlight-color: transparent;
    }
    .mb:active { background: rgba(255,153,34,0.2); }
    @media (pointer: coarse) { #mobile-lr { display: flex; } }
          </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div id="hud" style="display:none">
    <span><span class="hud-label">SCORE</span> <span class="hud-val" id="h-score">0</span></span>
    <span><span class="hud-label">TOAST</span> <span class="hud-toast" id="h-toast">0</span></span>
    <span><span class="hud-label">LIVES</span> <span class="hud-lives" id="h-lives">♥♥♥</span></span>
  </div>

  <div id="screens">
    <h1>NEON TOASTER</h1>
    <p class="sub">Catch falling bread in the interdimensional 4D toaster slot.<br>Golden toast = bonus points. Burnt = lose a life.</p>
    <button class="play-btn" id="btn-start">TOAST IT</button>
    <div class="hint">← → or A/D to move toaster &middot; Mobile: buttons below</div>
  </div>

  <div id="mobile-lr">
    <div class="mb" id="m-left">◀</div>
    <div class="mb" id="m-right">▶</div>
  </div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

/* ── Constants ── */
const TOASTER_W_RATIO = 0.18; // fraction of screen width
const SLOT_H = 14;
const BREAD_W = 36, BREAD_H = 42;

/* ── State ── */
let state = 'menu'; // menu | play | dead
let score = 0, lives = 3, toastCount = 0, frame = 0;
let difficulty = 1;

/* ── Toaster (the player) ── */
const toaster = {
  x: 0, y: 0, w: 0, h: 0, speed: 0,
  slotGlow: 0, // 0-1 glow intensity when catching
  wobble: 0 // visual wobble on catch
};

function resetToaster() {
  toaster.w = Math.max(80, Math.floor(W * TOASTER_W_RATIO));
  toaster.h = Math.floor(toaster.w * 0.65);
  toaster.x = (W - toaster.w) / 2;
  toaster.y = H * 0.78;
  toaster.speed = W * 0.012;
  toaster.slotGlow = 0;
  toaster.wobble = 0;
}
resetToaster();

/* ── 4D rotation for the toaster wireframe ── */
let rot4d = 0; // the "4th dimension" rotation angle

/* ── Bread types ── */
const BREAD_TYPES = [
  { name: 'white',    color: '#ffe4b5', crustColor: '#d4a050', pts: 10, weight: 5 },
  { name: 'wheat',    color: '#d4a060', crustColor: '#8b6914', pts: 15, weight: 4 },
  { name: 'rye',      color: '#a08050', crustColor: '#6b4420', pts: 20, weight: 3 },
  { name: 'golden',   color: '#ffd700', crustColor: '#daa520', pts: 50, weight: 1, special: true },
  { name: 'burnt',    color: '#2a2018', crustColor: '#1a1008', pts: -20, weight: 2, bad: true },
  { name: 'bagel',    color: '#e8c880', crustColor: '#b89840', pts: 25, weight: 2, round: true },
];

function pickBreadType() {
  let pool = [];
  for (const bt of BREAD_TYPES) {
    for (let i = 0; i < bt.weight; i++) pool.push(bt);
  }
  // More burnt bread at higher difficulty
  if (difficulty > 3) {
    for (let i = 0; i < difficulty - 2; i++) pool.push(BREAD_TYPES[4]);
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

/* ── Falling bread ── */
let breads = [];
let particles = [];

function spawnBread() {
  const type = pickBreadType();
  const bw = BREAD_W + Math.random() * 10;
  const bh = type.round ? bw : BREAD_H + Math.random() * 8;
  breads.push({
    x: Math.random() * (W - bw - 40) + 20,
    y: -bh - 10,
    w: bw, h: bh,
    vy: 1.5 + Math.random() * 1.5 + difficulty * 0.3,
    vx: (Math.random() - 0.5) * 1.5,
    rot: (Math.random() - 0.5) * 0.3,
    rotV: (Math.random() - 0.5) * 0.02,
    type,
    caught: false, missed: false
  });
}

let spawnTimer = 0;
let spawnInterval = 70;

/* ── Particles ── */
function burstAt(x, y, hue, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 1.5) * 6,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      size: 1 + Math.random() * 3,
      hue
    });
  }
}

/* ── Input ── */
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code === 'Space' || e.code === 'Enter') && state !== 'play') startGame();
});
window.addEventListener('keyup', e => keys[e.code] = false);

document.getElementById('m-left').addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowLeft'] = true; });
document.getElementById('m-left').addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; });
document.getElementById('m-right').addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; });
document.getElementById('m-right').addEventListener('touchend', e => { e.preventDefault(); keys['ArrowRight'] = false; });

document.getElementById('btn-start').onclick = startGame;

function startGame() {
  state = 'play';
  score = 0; lives = 3; toastCount = 0; frame = 0; difficulty = 1;
  breads = []; particles = [];
  spawnTimer = 40; spawnInterval = 70;
  resetToaster();
  document.getElementById('screens').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
}

function gameOver() {
  state = 'dead';
  const el = document.getElementById('screens');
  el.innerHTML = `
    <h1>BURNT OUT</h1>
    <div class="final">${score}</div>
    <div class="detail">${toastCount} slices toasted</div>
    <button class="play-btn" onclick="document.getElementById('btn-start').click()">RETRY</button>
  `;
  // Re-attach start handler to new button
  el.querySelector('.play-btn').onclick = startGame;
  el.classList.remove('hidden');
}

/* ── Update ── */
function update() {
  if (state !== 'play') return;
  frame++;

  // 4D rotation
  rot4d += 0.012;

  // Difficulty ramp
  difficulty = 1 + Math.floor(toastCount / 8);
  spawnInterval = Math.max(20, 70 - difficulty * 5);

  // Move toaster
  let dir = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dir = -1;
  if (keys['ArrowRight'] || keys['KeyD']) dir = 1;
  toaster.x += dir * toaster.speed;
  toaster.x = Math.max(5, Math.min(W - toaster.w - 5, toaster.x));

  // Toaster visual effects decay
  toaster.slotGlow *= 0.9;
  toaster.wobble *= 0.85;

  // Spawn bread
  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnBread();
    spawnTimer = spawnInterval + Math.floor(Math.random() * 20);
  }

  // Update bread
  for (let i = breads.length - 1; i >= 0; i--) {
    const b = breads[i];
    b.y += b.vy;
    b.x += b.vx;
    b.rot += b.rotV;
    // Bounce off walls
    if (b.x < 0 || b.x + b.w > W) b.vx *= -1;

    // Check catch: bread overlaps toaster slot
    const slotX = toaster.x + toaster.w * 0.2;
    const slotW = toaster.w * 0.6;
    const slotY = toaster.y + 4;
    const bCenterX = b.x + b.w / 2;
    const bBottom = b.y + b.h;

    if (!b.caught && bBottom >= slotY && bBottom <= slotY + 30 &&
        bCenterX >= slotX && bCenterX <= slotX + slotW) {
      b.caught = true;
      toaster.slotGlow = 1;
      toaster.wobble = 5;

      if (b.type.bad) {
        // Burnt bread hurts!
        lives--;
        score = Math.max(0, score + b.type.pts);
        burstAt(bCenterX, slotY, 0, 15); // dark red burst
        if (lives <= 0) { gameOver(); return; }
      } else {
        score += b.type.pts * difficulty;
        toastCount++;
        const hue = b.type.special ? 45 : 30;
        burstAt(bCenterX, slotY, hue, b.type.special ? 25 : 12);
      }
      breads.splice(i, 1);
      continue;
    }

    // Missed — fell past screen
    if (b.y > H + 50) {
      if (!b.type.bad) {
        // Missed good bread = lose life
        lives--;
        burstAt(b.x + b.w / 2, H, 0, 8);
        if (lives <= 0) { gameOver(); return; }
      }
      breads.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.2;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  if (particles.length > 300) particles.splice(0, particles.length - 300);

  // HUD
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-toast').textContent = toastCount;
  document.getElementById('h-lives').textContent = '♥'.repeat(Math.max(0, lives));
}

/* ── Draw ── */
function draw() {
  ctx.fillStyle = '#0b0812';
  ctx.fillRect(0, 0, W, H);

  // Background: subtle grid for "4D" feel
  const gridAlpha = 0.04;
  ctx.strokeStyle = `rgba(255,153,34,${gridAlpha})`;
  ctx.lineWidth = 0.5;
  const gridSize = 50;
  const offsetX = (frame * 0.3) % gridSize;
  const offsetY = (frame * 0.2) % gridSize;
  for (let x = -gridSize + offsetX; x < W + gridSize; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = -gridSize + offsetY; y < H + gridSize; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // 4D hypercube wireframe behind toaster (decorative)
  draw4DCube();

  // Falling breads
  for (const b of breads) {
    ctx.save();
    ctx.translate(b.x + b.w / 2, b.y + b.h / 2);
    ctx.rotate(b.rot);

    if (b.type.round) {
      // Bagel
      ctx.fillStyle = b.type.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = b.type.crustColor;
      ctx.beginPath();
      ctx.ellipse(0, 0, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
      ctx.lineWidth = 3;
      ctx.strokeStyle = b.type.crustColor;
      ctx.stroke();
      // Hole
      ctx.fillStyle = '#0b0812';
      ctx.beginPath();
      ctx.ellipse(0, 0, b.w * 0.18, b.h * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Bread slice
      const hw = b.w / 2, hh = b.h / 2;
      // Crust outline
      ctx.fillStyle = b.type.crustColor;
      ctx.beginPath();
      ctx.moveTo(-hw, hh);
      ctx.lineTo(-hw, -hh * 0.6);
      ctx.quadraticCurveTo(-hw * 0.8, -hh, 0, -hh);
      ctx.quadraticCurveTo(hw * 0.8, -hh, hw, -hh * 0.6);
      ctx.lineTo(hw, hh);
      ctx.closePath();
      ctx.fill();
      // Inner bread
      ctx.fillStyle = b.type.color;
      ctx.beginPath();
      const m = 3;
      ctx.moveTo(-hw + m, hh - m);
      ctx.lineTo(-hw + m, -hh * 0.6 + m);
      ctx.quadraticCurveTo(-hw * 0.7, -hh + m * 2, 0, -hh + m * 2);
      ctx.quadraticCurveTo(hw * 0.7, -hh + m * 2, hw - m, -hh * 0.6 + m);
      ctx.lineTo(hw - m, hh - m);
      ctx.closePath();
      ctx.fill();
      // Specks for wheat/rye
      if (b.type.name === 'wheat' || b.type.name === 'rye') {
        ctx.fillStyle = b.type.crustColor;
        for (let s = 0; s < 6; s++) {
          const sx = (Math.sin(s * 47) * 0.6) * hw;
          const sy = (Math.cos(s * 31) * 0.5) * hh;
          ctx.fillRect(sx - 1, sy - 1, 2, 2);
        }
      }
      // Golden shimmer
      if (b.type.special) {
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 15 + Math.sin(frame * 0.2) * 5;
        ctx.strokeStyle = '#ffd70088';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      // Burnt smoke
      if (b.type.bad) {
        ctx.fillStyle = `rgba(60,40,20,${0.3 + Math.sin(frame * 0.15 + b.x) * 0.15})`;
        for (let s = 0; s < 3; s++) {
          const sx = (Math.random() - 0.5) * b.w * 0.6;
          const sy = -hh - 5 - Math.random() * 10;
          ctx.beginPath();
          ctx.arc(sx, sy, 3 + Math.random() * 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    ctx.restore();
  }

  // Toaster
  drawToaster();

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = `hsla(${p.hue}, 100%, ${55 + (1 - alpha) * 30}%, ${alpha})`;
    ctx.shadowColor = `hsla(${p.hue}, 100%, 60%, ${alpha * 0.5})`;
    ctx.shadowBlur = 5;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.shadowBlur = 0;
}

function drawToaster() {
  const t = toaster;
  const cx = t.x + t.w / 2;
  const cy = t.y + t.h / 2;
  const wobX = Math.sin(frame * 0.5) * t.wobble;

  ctx.save();
  ctx.translate(cx + wobX, cy);

  const hw = t.w / 2, hh = t.h / 2;

  // Body glow
  ctx.shadowColor = `rgba(255,153,34,${0.2 + t.slotGlow * 0.5})`;
  ctx.shadowBlur = 15 + t.slotGlow * 20;

  // Body — chrome/dark metal
  const bodyGrad = ctx.createLinearGradient(-hw, -hh, -hw, hh);
  bodyGrad.addColorStop(0, '#3a3040');
  bodyGrad.addColorStop(0.3, '#2a2230');
  bodyGrad.addColorStop(0.7, '#221a28');
  bodyGrad.addColorStop(1, '#1a1220');
  ctx.fillStyle = bodyGrad;
  roundRect(ctx, -hw, -hh, t.w, t.h, 8);
  ctx.fill();

  // Neon border
  ctx.strokeStyle = `rgba(255,153,34,${0.3 + t.slotGlow * 0.5})`;
  ctx.lineWidth = 2;
  roundRect(ctx, -hw, -hh, t.w, t.h, 8);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Slot opening — THE catch zone
  const slotW = t.w * 0.6;
  const slotX = -slotW / 2;
  const slotY = -hh + 2;

  // Slot glow (inner heat)
  const heatGrad = ctx.createLinearGradient(slotX, slotY, slotX, slotY + SLOT_H);
  const gl = t.slotGlow;
  heatGrad.addColorStop(0, `rgba(255,${100 + gl * 100},${20 + gl * 80},${0.3 + gl * 0.6})`);
  heatGrad.addColorStop(0.5, `rgba(255,${60 + gl * 80},0,${0.15 + gl * 0.4})`);
  heatGrad.addColorStop(1, `rgba(100,30,0,${0.1 + gl * 0.2})`);
  ctx.fillStyle = heatGrad;
  ctx.fillRect(slotX, slotY, slotW, SLOT_H);

  // Slot border
  ctx.strokeStyle = `rgba(255,120,20,${0.5 + gl * 0.5})`;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(slotX, slotY, slotW, SLOT_H);

  // Heating coil lines inside slot
  ctx.strokeStyle = `rgba(255,80,20,${0.2 + gl * 0.5 + Math.sin(frame * 0.1) * 0.1})`;
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    const ly = slotY + 3 + i * 4;
    ctx.beginPath();
    ctx.moveTo(slotX + 4, ly);
    for (let px = slotX + 4; px < slotX + slotW - 4; px += 6) {
      ctx.lineTo(px + 3, ly + (((px / 6 | 0) % 2) ? 1.5 : -1.5));
    }
    ctx.stroke();
  }

  // Side knob
  ctx.fillStyle = '#443850';
  ctx.fillRect(hw - 10, -4, 8, 20);
  ctx.fillStyle = '#ff992266';
  ctx.fillRect(hw - 8, 0, 4, 4);

  // "4D" label
  ctx.fillStyle = `rgba(255,153,34,${0.25 + Math.sin(frame * 0.05) * 0.1})`;
  ctx.font = 'bold 10px "Overpass Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('4D', 0, hh - 6);

  ctx.restore();
}

function draw4DCube() {
  // Tesseract wireframe projection behind toaster
  const cx = W / 2;
  const cy = toaster.y - 20;
  const scale = Math.min(toaster.w * 0.6, 60);
  const a = rot4d;
  const b = rot4d * 0.7;

  // 4D vertices of a hypercube
  const verts4 = [];
  for (let i = 0; i < 16; i++) {
    verts4.push([
      (i & 1) ? 1 : -1,
      (i & 2) ? 1 : -1,
      (i & 4) ? 1 : -1,
      (i & 8) ? 1 : -1
    ]);
  }

  // Rotate in ZW and XW planes
  function rot(v) {
    let [x, y, z, w] = v;
    // ZW rotation
    const z2 = z * Math.cos(a) - w * Math.sin(a);
    const w2 = z * Math.sin(a) + w * Math.cos(a);
    // XW rotation
    const x2 = x * Math.cos(b) - w2 * Math.sin(b);
    const w3 = x * Math.sin(b) + w2 * Math.cos(b);
    // Perspective projection from 4D to 3D
    const d4 = 3 / (3 - w3);
    const px = x2 * d4;
    const py = y * d4;
    const pz = z2 * d4;
    // 3D to 2D perspective
    const d3 = 2.5 / (2.5 - pz);
    return [cx + px * d3 * scale, cy + py * d3 * scale, d3 * d4];
  }

  const projected = verts4.map(rot);

  // Edges: connect vertices that differ by exactly one bit
  ctx.lineWidth = 0.7;
  for (let i = 0; i < 16; i++) {
    for (let j = i + 1; j < 16; j++) {
      const xor = i ^ j;
      if (xor && (xor & (xor - 1)) === 0) {
        // One bit difference = edge
        const [x1, y1, d1] = projected[i];
        const [x2, y2, d2] = projected[j];
        const alpha = (d1 + d2) * 0.04;
        ctx.strokeStyle = `rgba(255,153,34,${Math.min(alpha, 0.12)})`;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    }
  }

  // Vertices
  for (const [x, y, d] of projected) {
    ctx.fillStyle = `rgba(255,153,34,${Math.min(d * 0.06, 0.2)})`;
    ctx.beginPath();
    ctx.arc(x, y, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* ── Loop ── */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
