<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Laugh Keys — MissMeowD's Ticklish Giggle Piano</title>
<link rel="icon" href="https://emojicdn.elk.sh/😹">
<meta property="og:title" content="Laugh Keys">
<meta property="og:description" content="Every key plays a pitch-shifted slice of a ticklish giggle. Play a melody with laughter.">
<meta property="og:url" content="https://sloppy.live/laugh-keys">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20piano%20keys%20with%20laughing%20emoji%20faces%20floating%20sparkles%20pink%20and%20gold%20dark%20background?width=1200&height=630&seed=8888&nologo=true">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Azeret+Mono:wght@400;600&family=Instrument+Serif:ital@1&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:100%;background:#0c080f}
body{min-height:100vh;font-family:'Azeret Mono',monospace;color:#d4c8d0;overflow-x:hidden;
  background:#0c080f;
  background-image:radial-gradient(ellipse at 50% 80%,rgba(255,140,200,.05) 0%,transparent 60%)}

#app{max-width:820px;margin:0 auto;padding:1rem;text-align:center}

header{padding:.5rem 0 .3rem}
header h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(1.6rem,5vw,2.6rem);
  background:linear-gradient(135deg,#ff8ec8,#ffd93d,#ff6b9d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{font-family:'Instrument Serif',serif;font-style:italic;font-size:.82rem;color:#665;margin-top:.1rem}
header .credit{font-size:.6rem;color:#553;margin-top:.15rem}

/* ── Visualizer ── */
#viz-wrap{height:80px;margin:.5rem 0;border-radius:10px;overflow:hidden;
  background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.04)}
#viz{width:100%;height:100%;display:block}

/* ── Keyboard ── */
#keyboard{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;padding:.5rem 0}
.key{width:56px;height:110px;border-radius:0 0 8px 8px;cursor:pointer;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8px;
  border:1.5px solid rgba(255,255,255,.08);transition:transform .08s,box-shadow .12s;
  user-select:none;-webkit-tap-highlight-color:transparent}
.key:active,.key.active{transform:scaleY(.96)}
.key .note-name{font-family:'Fredoka',sans-serif;font-size:.6rem;font-weight:600;margin-bottom:2px}
.key .key-hint{font-size:.48rem;color:rgba(255,255,255,.25);font-family:'Azeret Mono',monospace}
.key .emoji{font-size:1.3rem;margin-bottom:4px;filter:drop-shadow(0 0 4px rgba(255,200,100,.3))}

/* White keys */
.key.white{background:linear-gradient(180deg,#1a141e,#0f0b13);border-color:rgba(255,200,230,.08)}
.key.white:hover{background:linear-gradient(180deg,#241a28,#150f18);border-color:rgba(255,200,230,.18)}
.key.white.active{background:linear-gradient(180deg,#3a2040,#1f1028);
  border-color:rgba(255,140,200,.4);box-shadow:0 0 20px rgba(255,140,200,.15)}
.key.white .note-name{color:#ff8ec8}

/* Black keys (sharps) */
.key.black{width:40px;height:80px;background:linear-gradient(180deg,#0a070c,#060408);
  border-color:rgba(255,217,61,.06);border-radius:0 0 6px 6px;margin:0 -6px;z-index:2}
.key.black:hover{background:linear-gradient(180deg,#14101a,#0a080c);border-color:rgba(255,217,61,.15)}
.key.black.active{background:linear-gradient(180deg,#2a1a10,#18100a);
  border-color:rgba(255,217,61,.4);box-shadow:0 0 16px rgba(255,217,61,.15)}
.key.black .note-name{color:#ffd93d;font-size:.5rem}
.key.black .emoji{font-size:1rem}
.key.black .key-hint{font-size:.4rem}

/* ── Laugh-o-meter ── */
#meter-wrap{margin:.5rem 0;padding:.4rem .8rem;border-radius:8px;
  background:rgba(255,140,200,.04);border:1px solid rgba(255,140,200,.06);
  display:flex;align-items:center;gap:.6rem}
#meter-label{font-family:'Fredoka',sans-serif;font-size:.65rem;color:#ff8ec8;white-space:nowrap}
#meter-bar-wrap{flex:1;height:8px;background:rgba(0,0,0,.3);border-radius:4px;overflow:hidden}
#meter-bar{height:100%;width:0;border-radius:4px;transition:width .3s ease;
  background:linear-gradient(90deg,#ff8ec8,#ffd93d,#ff6b9d)}
#meter-count{font-size:.6rem;color:#886;min-width:3em;text-align:right}

/* ── Controls ── */
#controls{display:flex;justify-content:center;gap:.8rem;margin:.4rem 0;flex-wrap:wrap}
.ctrl-btn{padding:.35rem .8rem;border:1px solid rgba(255,255,255,.08);border-radius:6px;
  background:rgba(255,255,255,.03);color:#888;font-family:'Azeret Mono',monospace;font-size:.55rem;
  cursor:pointer;transition:background .15s,color .15s}
.ctrl-btn:hover{background:rgba(255,255,255,.06);color:#ccc}
.ctrl-btn.on{border-color:rgba(255,140,200,.3);color:#ff8ec8;background:rgba(255,140,200,.06)}

/* ── Giggles float ── */
.giggle-float{position:fixed;pointer-events:none;font-size:1.5rem;z-index:50;
  animation:giggleUp 1.2s ease-out forwards}
@keyframes giggleUp{0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(1.3) rotate(15deg)}}

/* ── Legend ── */
#legend{font-size:.5rem;color:#443;padding:.3rem 0;line-height:1.6}

@media(max-width:600px){
  .key{width:42px;height:85px}
  .key.black{width:30px;height:60px;margin:0 -4px}
  .key .emoji{font-size:1rem}
  .key .note-name{font-size:.5rem}
  #viz-wrap{height:60px}
}
@media(prefers-reduced-motion:reduce){
  .key{transition:none}.giggle-float{animation:none;opacity:0}
  #meter-bar{transition:none}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>laugh keys</h1>
    <p>every key plays a ticklish giggle, pitch-shifted across the scale</p>
    <div class="credit">inspired by MissMeowD's infectious laugh</div>
  </header>

  <div id="viz-wrap"><canvas id="viz"></canvas></div>

  <div id="keyboard"></div>

  <div id="meter-wrap">
    <span id="meter-label">giggle-o-meter</span>
    <div id="meter-bar-wrap"><div id="meter-bar"></div></div>
    <span id="meter-count">0</span>
  </div>

  <div id="controls">
    <button class="ctrl-btn on" id="btn-sustain">sustain: on</button>
    <button class="ctrl-btn" id="btn-reverb">reverb: off</button>
    <button class="ctrl-btn" id="btn-chaos">chaos: off</button>
  </div>

  <div id="legend">
    keyboard: Z S X D C V G B H N J M , &middot; two octaves of giggles
  </div>
</div>

<script>
(function(){
"use strict";

// ─── Note layout: 2 octaves, C4-B5 ───
// White: C D E F G A B × 2 octaves
// Key mapping: Z=C4, X=D4, C=E4, V=F4, B=G4, N=A4, M=B4, ,=C5, .=D5 ...
// Sharps: S=C#4, D=D#4, G=F#4, H=G#4, J=A#4, ...

var NOTES=[
  {name:'C4',  freq:261.63, type:'white', key:'z'},
  {name:'C#4', freq:277.18, type:'black', key:'s'},
  {name:'D4',  freq:293.66, type:'white', key:'x'},
  {name:'D#4', freq:311.13, type:'black', key:'d'},
  {name:'E4',  freq:329.63, type:'white', key:'c'},
  {name:'F4',  freq:349.23, type:'white', key:'v'},
  {name:'F#4', freq:369.99, type:'black', key:'g'},
  {name:'G4',  freq:392.00, type:'white', key:'b'},
  {name:'G#4', freq:415.30, type:'black', key:'h'},
  {name:'A4',  freq:440.00, type:'white', key:'n'},
  {name:'A#4', freq:466.16, type:'black', key:'j'},
  {name:'B4',  freq:493.88, type:'white', key:'m'},
  {name:'C5',  freq:523.25, type:'white', key:','},
  {name:'C#5', freq:554.37, type:'black', key:'l'},
  {name:'D5',  freq:587.33, type:'white', key:'.'},
  {name:'D#5', freq:622.25, type:'black', key:';'},
  {name:'E5',  freq:659.25, type:'white', key:'/'},
  {name:'F5',  freq:698.46, type:'white', key:'q'},
  {name:'F#5', freq:739.99, type:'black', key:'2'},
  {name:'G5',  freq:783.99, type:'white', key:'w'},
  {name:'G#5', freq:830.61, type:'black', key:'3'},
  {name:'A5',  freq:880.00, type:'white', key:'e'},
  {name:'A#5', freq:932.33, type:'black', key:'4'},
  {name:'B5',  freq:987.77, type:'white', key:'r'}
];

var EMOJIS=['😹','🤭','😆','😂','🤣','😸','😝','🫠','😜','✨','💫','🎀'];
var BASE_FREQ=440; // A4 is our "natural" laugh pitch

// ─── Audio ───
var aCtx, masterGain, reverbNode, analyser, reverbOn=false, chaosOn=false, sustainOn=true;
var laughBuf=null; // pre-rendered laugh buffer

function getAC(){
  if(!aCtx){
    aCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=aCtx.createGain();masterGain.gain.value=0.7;
    analyser=aCtx.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=0.8;
    masterGain.connect(analyser);analyser.connect(aCtx.destination);
    buildReverbNode();
    buildLaughBuffer();
  }
  return aCtx;
}

function buildReverbNode(){
  var ac=getAC();
  reverbNode=ac.createConvolver();
  var len=ac.sampleRate*1.8|0;
  var buf=ac.createBuffer(2,len,ac.sampleRate);
  for(var ch=0;ch<2;ch++){
    var d=buf.getChannelData(ch);
    for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5);
  }
  reverbNode.buffer=buf;
  // Reverb is mixed via a wet gain
  reverbNode._wetGain=ac.createGain();reverbNode._wetGain.gain.value=0;
  reverbNode.connect(reverbNode._wetGain);reverbNode._wetGain.connect(analyser);
}

// ─── Build a synthetic "ticklish laugh" buffer ───
// This is the core sample that gets pitch-shifted per key.
// Structure: 6 rapid "ha" bursts with formant-shaped noise + pitched oscillators
function buildLaughBuffer(){
  var ac=getAC();
  var sr=ac.sampleRate;
  var dur=0.55; // total duration of one laugh "slice"
  var len=sr*dur|0;
  var buf=ac.createBuffer(1,len,sr);
  var d=buf.getChannelData(0);

  // 6 "ha" bursts
  var bursts=[
    {start:0,    dur:.065, pitch:420, vol:0.7},
    {start:.075, dur:.055, pitch:460, vol:0.9},
    {start:.14,  dur:.060, pitch:440, vol:1.0},
    {start:.21,  dur:.050, pitch:480, vol:0.85},
    {start:.27,  dur:.055, pitch:450, vol:0.7},
    {start:.34,  dur:.070, pitch:500, vol:0.5}
  ];

  // Formant frequencies for "ha" / "he" / "hi" sounds
  var formants=[
    {f1:720, f2:1240},  // ha
    {f1:580, f2:1800},  // he
    {f1:400, f2:2200},  // hi
    {f1:720, f2:1240},
    {f1:580, f2:1800},
    {f1:400, f2:2200}
  ];

  for(var b=0;b<bursts.length;b++){
    var burst=bursts[b];
    var form=formants[b];
    var bStart=burst.start*sr|0;
    var bLen=burst.dur*sr|0;

    for(var i=0;i<bLen;i++){
      if(bStart+i>=len) break;
      var t=i/sr;
      // Glottal pulse (sawtooth-ish with breathiness)
      var phase=(t*burst.pitch)%1;
      var glottal=(phase<0.4?phase/0.4:-1+(phase-0.4)/0.6)*0.6;
      // Breathy noise
      var noise=(Math.random()*2-1)*0.35;
      // Simple formant simulation via amplitude modulation
      var f1mod=Math.sin(2*Math.PI*form.f1*t)*0.4+0.6;
      var f2mod=Math.sin(2*Math.PI*form.f2*t)*0.25+0.75;
      // Envelope: quick attack, short decay
      var env=Math.min(1,i/(sr*0.008))*Math.pow(1-i/bLen,1.2);
      var sample=(glottal*f1mod+noise*f2mod)*env*burst.vol;
      d[bStart+i]+=sample*0.4;
    }
  }

  // Add a subtle "wheeze" tail (breathy noise fading out)
  var wheezeStart=0.38*sr|0;
  var wheezeLen=0.15*sr|0;
  for(var w=0;w<wheezeLen;w++){
    if(wheezeStart+w>=len) break;
    var wEnv=Math.pow(1-w/wheezeLen,2);
    d[wheezeStart+w]+=(Math.random()*2-1)*0.08*wEnv;
  }

  laughBuf=buf;
}

// ─── Play a laugh at a given pitch ───
var activeVoices={};

function playLaugh(noteIdx){
  var ac=getAC();
  if(!laughBuf) return;

  var note=NOTES[noteIdx];
  var rate=note.freq/BASE_FREQ; // pitch shift ratio
  if(chaosOn) rate*=0.9+Math.random()*0.2; // slight random detune

  // Stop previous voice on this key if sustain is off
  if(!sustainOn && activeVoices[noteIdx]){
    try{activeVoices[noteIdx].stop();}catch(e){}
  }

  var src=ac.createBufferSource();
  src.buffer=laughBuf;
  src.playbackRate.value=rate;

  var gain=ac.createGain();
  var vol=0.6;
  gain.gain.setValueAtTime(vol,ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+laughBuf.duration/rate+0.1);

  src.connect(gain);
  gain.connect(masterGain);
  if(reverbOn) gain.connect(reverbNode);

  src.start();
  activeVoices[noteIdx]=src;

  // Giggle count
  giggleCount++;
  updateMeter();
  spawnGiggle(noteIdx);
}

// ─── Giggle-o-meter ───
var giggleCount=0;
var $meterBar=document.getElementById('meter-bar');
var $meterCount=document.getElementById('meter-count');

function updateMeter(){
  var pct=Math.min(100,(giggleCount/50)*100);
  $meterBar.style.width=pct+'%';
  $meterCount.textContent=giggleCount;
}

// ─── Floating emoji ───
function spawnGiggle(noteIdx){
  var el=document.createElement('div');
  el.className='giggle-float';
  el.textContent=EMOJIS[noteIdx%EMOJIS.length];
  var keyEl=document.querySelectorAll('.key')[noteIdx];
  if(keyEl){
    var rect=keyEl.getBoundingClientRect();
    el.style.left=(rect.left+rect.width/2-12)+'px';
    el.style.top=(rect.top-10)+'px';
  } else {
    el.style.left='50%';el.style.top='40%';
  }
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},1200);
}

// ─── Build keyboard UI ───
var $kb=document.getElementById('keyboard');
NOTES.forEach(function(note,idx){
  var key=document.createElement('div');
  key.className='key '+note.type;
  key.dataset.idx=idx;
  key.innerHTML=
    '<div class="emoji">'+EMOJIS[idx%EMOJIS.length]+'</div>'+
    '<div class="note-name">'+note.name+'</div>'+
    '<div class="key-hint">'+note.key.toUpperCase()+'</div>';

  key.addEventListener('pointerdown',function(e){
    e.preventDefault();
    playLaugh(idx);
    key.classList.add('active');
  });
  key.addEventListener('pointerup',function(){key.classList.remove('active');});
  key.addEventListener('pointerleave',function(){key.classList.remove('active');});

  $kb.appendChild(key);
});

// ─── Keyboard input ───
var keyMap={};
NOTES.forEach(function(note,idx){keyMap[note.key]=idx;});
var heldKeys={};

document.addEventListener('keydown',function(e){
  if(e.repeat) return;
  var idx=keyMap[e.key.toLowerCase()];
  if(idx!==undefined&&!heldKeys[e.key.toLowerCase()]){
    e.preventDefault();
    heldKeys[e.key.toLowerCase()]=true;
    playLaugh(idx);
    var keyEl=document.querySelectorAll('.key')[idx];
    if(keyEl) keyEl.classList.add('active');
  }
});
document.addEventListener('keyup',function(e){
  var k=e.key.toLowerCase();
  heldKeys[k]=false;
  var idx=keyMap[k];
  if(idx!==undefined){
    var keyEl=document.querySelectorAll('.key')[idx];
    if(keyEl) keyEl.classList.remove('active');
  }
});

// ─── Controls ───
document.getElementById('btn-sustain').addEventListener('click',function(){
  sustainOn=!sustainOn;
  this.textContent='sustain: '+(sustainOn?'on':'off');
  this.classList.toggle('on',sustainOn);
});
document.getElementById('btn-reverb').addEventListener('click',function(){
  reverbOn=!reverbOn;
  this.textContent='reverb: '+(reverbOn?'on':'off');
  this.classList.toggle('on',reverbOn);
  if(aCtx&&reverbNode._wetGain){
    reverbNode._wetGain.gain.setTargetAtTime(reverbOn?0.35:0,aCtx.currentTime,0.1);
  }
});
document.getElementById('btn-chaos').addEventListener('click',function(){
  chaosOn=!chaosOn;
  this.textContent='chaos: '+(chaosOn?'on':'off');
  this.classList.toggle('on',chaosOn);
});

// ─── Visualizer ───
var vizCv=document.getElementById('viz');
var vizCtx=vizCv.getContext('2d');

function drawViz(){
  requestAnimationFrame(drawViz);
  if(!analyser) return;

  var rect=vizCv.parentElement.getBoundingClientRect();
  var dpr=window.devicePixelRatio||1;
  if(vizCv.width!==rect.width*dpr||vizCv.height!==rect.height*dpr){
    vizCv.width=rect.width*dpr;vizCv.height=rect.height*dpr;
    vizCtx.setTransform(dpr,0,0,dpr,0,0);
  }
  var W=rect.width,H=rect.height;

  vizCtx.fillStyle='rgba(12,8,15,.35)';vizCtx.fillRect(0,0,W,H);

  var bufLen=analyser.frequencyBinCount;
  var data=new Uint8Array(bufLen);
  analyser.getByteFrequencyData(data);

  var barW=W/bufLen*2.5;
  for(var i=0;i<bufLen;i++){
    var v=data[i]/255;
    var bh=v*H*.85;
    var hue=300+i/bufLen*60; // pink to gold
    vizCtx.fillStyle='hsla('+hue+',80%,65%,'+(0.3+v*0.5)+')';
    vizCtx.fillRect(i*barW,H-bh,barW-1,bh);
  }
}

// Init visualizer + audio on first interaction
var inited=false;
function ensureInit(){
  if(inited) return;inited=true;
  getAC();
  drawViz();
}
document.addEventListener('pointerdown',ensureInit,{once:false});
document.addEventListener('keydown',ensureInit,{once:false});

})();
</script>
</body>
</html>
