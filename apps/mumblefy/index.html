<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mumblefy</title>
  <meta name="description" content="Paste lyrics, pick a singer, and read them the way that singer actually sings them. Bon Iver mumble, Thom Yorke warble, and more.">
  <meta property="og:title" content="Mumblefy">
  <meta property="og:description" content="A phonetic lyric converter. Rewrites your lyrics the way a singer actually pronounces them — mumble, warble, croon, growl.">
  <meta property="og:url" content="https://sloppy.live/mumblefy">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/A%20vintage%20studio%20microphone%20with%20phonetic%20symbols%20swirling%20around%20it,%20moody%20amber%20stage%20light,%20editorial%20music%20poster?model=flux&seed=3737&width=1200&height=630&nologo=true">
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%A4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,800&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:      #16110e;
      --bg-2:    #211913;
      --paper:   #2a201a;
      --paper-2: #34281f;
      --ink:     #f4e9d8;
      --ink-dim: rgba(244,233,216,0.55);
      --amber:   #f2a93b;
      --amber-d: #c47a1c;
      --rose:    #e8607a;
      --teal:    #45c4b8;
      --gold:    #f6d06a;
      --line:    rgba(244,233,216,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 50% -10%, rgba(242,169,59,0.16), transparent 55%),
        radial-gradient(ellipse at 100% 100%, rgba(232,96,122,0.10), transparent 55%),
        var(--bg);
      color: var(--ink);
      font-family: 'Bricolage Grotesque', sans-serif;
      padding: 1.2rem 1rem 4rem;
    }
    main { max-width: 56rem; margin: 0 auto; }

    /* ============ MASTHEAD ============ */
    header.mast {
      text-align: center;
      margin-bottom: 1.2rem;
    }
    header.mast .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }
    header.mast h1 {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: clamp(3rem, 9vw, 5rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin: 0.2rem 0 0.1rem;
    }
    header.mast h1 em {
      font-style: italic;
      color: var(--amber);
      text-shadow: 0 0 30px rgba(242,169,59,0.4);
    }
    header.mast .tag {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--ink-dim);
    }

    /* ============ SINGER PICKER ============ */
    .singers {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(9.5rem, 1fr));
      gap: 0.55rem;
      margin-bottom: 1rem;
    }
    .singer {
      text-align: left;
      padding: 0.7rem 0.8rem 0.75rem;
      background: var(--paper);
      border: 1.5px solid var(--line);
      border-left: 3px solid var(--singer-c, var(--amber));
      border-radius: 9px;
      cursor: pointer;
      transition: transform 0.1s, filter 0.12s, box-shadow 0.14s, background 0.15s;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: var(--ink);
    }
    .singer:hover  { transform: translateY(-2px); filter: brightness(1.06); }
    .singer.active {
      background: var(--paper-2);
      border-color: var(--singer-c, var(--amber));
      box-shadow: 0 0 0 1px var(--singer-c, var(--amber)), 0 8px 24px -12px var(--singer-c, var(--amber));
    }
    .singer:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
    .singer .s-emoji { font-size: 1.4rem; line-height: 1; }
    .singer .s-name {
      font-weight: 800;
      font-size: 0.98rem;
      line-height: 1.1;
      margin-top: 0.25rem;
      color: var(--singer-c, var(--amber));
    }
    .singer .s-desc {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.04em;
      color: var(--ink-dim);
      margin-top: 0.2rem;
      line-height: 1.3;
    }

    /* ============ EDITOR PANES ============ */
    .panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 640px) {
      .panes { grid-template-columns: 1fr; }
    }
    .pane {
      background: var(--paper);
      border: 1.5px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      display: flex; flex-direction: column;
      min-height: 16rem;
    }
    .pane .pane-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 0.8rem;
      border-bottom: 1.5px solid var(--line);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }
    .pane .pane-head .out-name { color: var(--amber); }
    .pane textarea {
      flex: 1;
      width: 100%;
      resize: none;
      border: none;
      background: none;
      color: var(--ink);
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      line-height: 1.55;
      padding: 0.9rem 1rem;
      outline: none;
    }
    .pane textarea::placeholder { color: var(--ink-dim); font-style: italic; }
    .pane .out {
      flex: 1;
      padding: 0.9rem 1rem;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1.18rem;
      line-height: 1.6;
      color: var(--gold);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-y: auto;
      text-shadow: 0 0 18px rgba(246,208,106,0.18);
    }
    .pane .out .empty { color: var(--ink-dim); font-style: italic; opacity: 0.7; }

    /* ============ ACTION ROW ============ */
    .actions {
      display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
      justify-content: center;
    }
    .btn {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      border: 1.5px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      transition: transform 0.1s, filter 0.12s, box-shadow 0.12s;
      min-height: 2.75rem;
    }
    .btn:hover  { transform: translateY(-1px); filter: brightness(1.1); }
    .btn:active { transform: translateY(1px); }
    .btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }
    .btn.primary {
      background: linear-gradient(135deg, var(--amber), var(--rose));
      color: var(--bg);
      border: none;
      box-shadow: 0 0 22px rgba(242,169,59,0.4);
    }
    .btn .copied { color: var(--teal); }

    .seed {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 0.92rem;
      color: var(--ink-dim);
      text-align: center;
      margin-top: 1rem;
    }
    .seed a {
      color: var(--amber);
      cursor: pointer;
      text-decoration: underline dotted;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition: none !important; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <main>
    <header class="mast">
      <div class="eyebrow">phonetic lyric converter</div>
      <h1>mumble<em>fy</em></h1>
      <div class="tag">paste lyrics. pick a voice. read them the way they're actually sung.</div>
    </header>

    <section class="singers" id="singers" role="radiogroup" aria-label="Choose a singing style"></section>

    <div class="panes">
      <div class="pane">
        <div class="pane-head"><span>your lyrics</span><span id="char-count">0</span></div>
        <textarea id="input" placeholder="paste or type your lyrics here…&#10;&#10;the quick brown fox&#10;jumped over the moon" aria-label="Input lyrics"></textarea>
      </div>
      <div class="pane">
        <div class="pane-head"><span>as sung by</span><span class="out-name" id="out-name">bon iver</span></div>
        <div class="out" id="output"><span class="empty">…the rewritten version appears here…</span></div>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn primary" id="btn-convert">🎤 mumblefy</button>
      <button type="button" class="btn" id="btn-copy">copy</button>
      <button type="button" class="btn" id="btn-clear">clear</button>
    </div>

    <p class="seed">no lyrics handy? <a id="try-sample">drop in a sample verse</a>.</p>
  </main>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // HELPERS
    // ============================================================
    const VOWELS = 'aeiou';
    const isVowel = c => VOWELS.indexOf(c.toLowerCase()) !== -1;
    // Deterministic-ish PRNG seeded per-word so output is stable per input
    function hashStr(s) {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
      return h;
    }
    function mulberry32(a) {
      return function() {
        a |= 0; a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    // Apply a per-word transform while preserving punctuation + line breaks
    function transformWords(text, fn) {
      // Split into tokens that are either word-chunks or non-word (spaces/punct)
      return text.replace(/[A-Za-z']+/g, (word, offset) => {
        const rng = mulberry32(hashStr(word.toLowerCase()) ^ (offset * 2654435761 >>> 0));
        return fn(word, rng);
      });
    }
    function stretchVowels(word, rng, minStretch, maxStretch, extra) {
      let out = '';
      for (const ch of word) {
        out += ch;
        if (isVowel(ch)) {
          const n = minStretch + Math.floor(rng() * (maxStretch - minStretch + 1));
          for (let i = 0; i < n; i++) out += (extra ? pick(extra, rng) : ch.toLowerCase());
        }
      }
      return out;
    }
    function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }

    // ============================================================
    // SINGER STYLES — each returns a transformed string
    // ============================================================
    const STYLES = {
      boniver: function(text) {
        // Soft, slurred, blurry. Drop hard endings, soften consonants,
        // lowercase everything, blur vowels, trail hums on long lines.
        let out = text.toLowerCase();
        out = transformWords(out, (word, rng) => {
          let w = word.toLowerCase();
          // drop trailing g in -ing
          w = w.replace(/ing\b/g, "in'");
          // soften t→d between vowels, final hard consonants vanish
          w = w.replace(/([aeiou])t([aeiou])/g, '$1d$2');
          w = w.replace(/(?:t|d|k|p)\b/g, '');           // drop some final stops
          // blur double-letters into one
          w = w.replace(/(.)\1+/g, '$1');
          // soften 'you' / 'the' / 'and'
          w = w.replace(/\byou\b/g, 'yuh').replace(/\bthe\b/g, "th'").replace(/\band\b/g, "'n");
          // gentle vowel doubling on stressed long words
          if (w.length > 4 && rng() < 0.5) w = stretchVowels(w, rng, 0, 1);
          return w;
        });
        // Trail a soft hum at the end of longer lines
        out = out.split('\n').map(line => {
          if (line.trim().length > 12 && Math.random() < 0.6) {
            return line + ' mm' + 'm'.repeat(1 + Math.floor(Math.random() * 2));
          }
          return line;
        }).join('\n');
        return out;
      },

      thomyorke: function(text) {
        // Wavering falsetto. Stretch vowels with tremolo, add wobble,
        // float "oh"s, keep the words but make them shiver.
        let out = transformWords(text, (word, rng) => {
          let w = word;
          // wobble-stretch every vowel
          w = w.split('').map(ch => {
            if (isVowel(ch)) {
              const n = 1 + Math.floor(rng() * 3);
              const base = ch.toLowerCase();
              let s = ch;
              for (let i = 0; i < n; i++) s += (rng() < 0.4 ? base.toUpperCase() : base);
              return s;
            }
            return ch;
          }).join('');
          return w;
        });
        // Drop floating "oh-oh"s after some lines
        out = out.split('\n').map(line => {
          if (line.trim().length > 8 && Math.random() < 0.5) {
            return line + '  ' + pick(['oh-oh-oh', 'aa-aah', 'mm-ah-ah', 'ooh-oh'], mulberry32(hashStr(line)));
          }
          return line;
        }).join('\n');
        return out;
      },

      sinatra: function(text) {
        // Smooth crooner. Elongate ends of phrases, drop in "baby",
        // jazzy phrasing, keep diction crisp but lengthen vowels warmly.
        let out = transformWords(text, (word, rng) => {
          let w = word;
          // lengthen the LAST vowel of longer words for that croon
          if (w.length > 3 && rng() < 0.5) {
            const idxs = [];
            for (let i = 0; i < w.length; i++) if (isVowel(w[i])) idxs.push(i);
            if (idxs.length) {
              const li = idxs[idxs.length - 1];
              w = w.slice(0, li + 1) + w[li].toLowerCase().repeat(1 + Math.floor(rng() * 2)) + w.slice(li + 1);
            }
          }
          return w;
        });
        // Insert a jazzy "baby" / "now" at end of some lines
        out = out.split('\n').map(line => {
          if (line.trim().length > 10 && Math.random() < 0.45) {
            return line + ', ' + pick(['baby', 'now', 'oh yeah', 'mm-hmm'], mulberry32(hashStr(line) ^ 99));
          }
          return line;
        }).join('\n');
        return out;
      },

      metal: function(text) {
        // Death-metal growl. ALL CAPS, harsh doubled consonants, guttural
        // inserts, vowels crushed.
        let out = text.toUpperCase();
        out = transformWords(out, (word, rng) => {
          let w = word.toUpperCase();
          // double harsh consonants
          w = w.replace(/([RGKBDTGRRGH])/gi, m => (rng() < 0.5 ? m + m : m));
          // crush some vowels to harsher forms
          w = w.replace(/EE/g, 'EH').replace(/OO/g, 'UH');
          return w;
        });
        out = out.split('\n').map(line => {
          if (line.trim().length > 6 && Math.random() < 0.5) {
            return line + ' ' + pick(['BLEAGH', 'RRRAARGH', 'BRUTAL', 'GRRR', 'HRAAH'], mulberry32(hashStr(line)));
          }
          return line;
        }).join('\n');
        return out;
      },

      tpain: function(text) {
        // Autotune. Vowels become pitch-bent runs, "-ooo-oo", repeated
        // melisma, every long word gets a vocal run.
        let out = transformWords(text, (word, rng) => {
          let w = word.toLowerCase();
          // melisma on the last vowel: run up and down
          const idxs = [];
          for (let i = 0; i < w.length; i++) if (isVowel(w[i])) idxs.push(i);
          if (idxs.length && (w.length > 2) && rng() < 0.7) {
            const li = idxs[idxs.length - 1];
            const v = w[li];
            const run = '-' + (v + 'o-o' + v + '-' + v).slice(0, 5 + Math.floor(rng() * 4));
            w = w.slice(0, li + 1) + run + w.slice(li + 1);
          }
          return w;
        });
        return out;
      },

      opera: function(text) {
        // Operatic. Rolled R's, dramatic "ah" stretches on open vowels,
        // grandiose elongation, capitalized for projection.
        let out = transformWords(text, (word, rng) => {
          let w = word;
          // roll the R's
          w = w.replace(/r/gi, m => m + m.toLowerCase().repeat(1 + Math.floor(rng() * 2)));
          // dramatic stretch on 'a' and 'o'
          w = w.replace(/[ao]/gi, m => m + m.toLowerCase().repeat(2 + Math.floor(rng() * 2)));
          return w;
        });
        out = out.split('\n').map(line => {
          if (line.trim().length > 8 && Math.random() < 0.5) {
            return line + ' ' + pick(['AAAH', 'oh-oh-OH', 'bravissimo', 'mi-mi-MIII'], mulberry32(hashStr(line)));
          }
          return line;
        }).join('\n');
        return out;
      },

      drunk: function(text) {
        // Drunk karaoke. Slur, drop letters, random caps, woo!, lose the
        // thread halfway through a line.
        let out = transformWords(text, (word, rng) => {
          let w = word.toLowerCase();
          // drop a random consonant
          if (w.length > 3 && rng() < 0.4) {
            const ci = [];
            for (let i = 0; i < w.length; i++) if (!isVowel(w[i])) ci.push(i);
            if (ci.length) { const d = pick(ci, rng); w = w.slice(0, d) + w.slice(d + 1); }
          }
          // slur s→sh, smush double letters
          w = w.replace(/s/g, rng() < 0.5 ? 'sh' : 's');
          // random caps
          w = w.split('').map(c => rng() < 0.2 ? c.toUpperCase() : c).join('');
          return w;
        });
        out = out.split('\n').map(line => {
          const r = Math.random();
          if (r < 0.3) return line + ' WOOOO';
          if (r < 0.45) return line + '... wait how doesh it go';
          return line;
        }).join('\n');
        return out;
      }
    };

    // ============================================================
    // SINGER ROSTER (UI)
    // ============================================================
    const SINGERS = [
      { id: 'boniver',  name: 'Bon Iver',   emoji: '🌲', color: '#9ad0c0', desc: 'soft falsetto mumble · slurs & hums' },
      { id: 'thomyorke',name: 'Thom Yorke',  emoji: '👁', color: '#c89aff', desc: 'wavering falsetto warble' },
      { id: 'sinatra',  name: 'Sinatra',     emoji: '🍸', color: '#f6d06a', desc: 'smooth crooner · jazzy phrasing' },
      { id: 'metal',    name: 'Death Metal', emoji: '💀', color: '#e8607a', desc: 'guttural growl · BLEAGH' },
      { id: 'tpain',    name: 'T-Pain',      emoji: '🎛', color: '#45c4b8', desc: 'autotune melisma runs' },
      { id: 'opera',    name: 'Opera',       emoji: '🎭', color: '#f2a93b', desc: 'rolled Rs · dramatic stretch' },
      { id: 'drunk',    name: 'Drunk Karaoke', emoji: '🍺', color: '#f4a94b', desc: 'slurred · random caps · WOO' }
    ];
    let activeSinger = 'boniver';

    const singersEl = document.getElementById('singers');
    SINGERS.forEach((s, i) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'singer' + (i === 0 ? ' active' : '');
      b.style.setProperty('--singer-c', s.color);
      b.setAttribute('role', 'radio');
      b.setAttribute('aria-checked', i === 0 ? 'true' : 'false');
      b.innerHTML =
        '<div class="s-emoji" aria-hidden="true">' + s.emoji + '</div>' +
        '<div class="s-name">' + s.name + '</div>' +
        '<div class="s-desc">' + s.desc + '</div>';
      b.addEventListener('click', () => {
        activeSinger = s.id;
        document.querySelectorAll('.singer').forEach((el, j) => {
          el.classList.toggle('active', j === i);
          el.setAttribute('aria-checked', j === i ? 'true' : 'false');
        });
        document.getElementById('out-name').textContent = s.name.toLowerCase();
        convert();
      });
      singersEl.appendChild(b);
    });

    // ============================================================
    // EDITOR WIRING
    // ============================================================
    const input  = document.getElementById('input');
    const output = document.getElementById('output');
    const charCount = document.getElementById('char-count');

    function convert() {
      const text = input.value;
      if (!text.trim()) {
        output.innerHTML = '<span class="empty">…the rewritten version appears here…</span>';
        return;
      }
      const fn = STYLES[activeSinger] || STYLES.boniver;
      let result;
      try { result = fn(text); }
      catch (e) { result = text; console.warn('[mumblefy] transform failed', e); }
      output.textContent = result;
    }
    input.addEventListener('input', () => {
      charCount.textContent = input.value.length;
      convert();
    });
    document.getElementById('btn-convert').addEventListener('click', convert);
    document.getElementById('btn-clear').addEventListener('click', () => {
      input.value = '';
      charCount.textContent = '0';
      convert();
      input.focus();
    });
    document.getElementById('btn-copy').addEventListener('click', () => {
      const txt = output.textContent;
      if (!txt || txt.indexOf('appears here') !== -1) return;
      navigator.clipboard.writeText(txt).then(() => {
        const btn = document.getElementById('btn-copy');
        const orig = btn.textContent;
        btn.innerHTML = '<span class="copied">copied ✓</span>';
        setTimeout(() => { btn.textContent = orig; }, 1400);
      }).catch(() => {});
    });

    // Sample verse
    const SAMPLE =
`i found a love for me
darling just dive right in
follow my lead
i found a girl beautiful and sweet
i never knew you were the someone waiting for me`;
    document.getElementById('try-sample').addEventListener('click', () => {
      input.value = SAMPLE;
      charCount.textContent = input.value.length;
      convert();
    });

    // Boot
    convert();
  })();
  </script>
</body>
</html>
