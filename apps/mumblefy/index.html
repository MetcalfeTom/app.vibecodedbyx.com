<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mumblefy · Singer Flow Coach</title>
  <meta name="description" content="A singer flow coach. Paste lyrics and see the connected-speech links singers use — vowel glides, consonant drops, syllable blending. Input left, flow-optimized right.">
  <meta property="og:title" content="Mumblefy">
  <meta property="og:description" content="A singer flow coach. Rewrites lyrics with the connected-speech links singers actually use — vowel glides, consonant drops, syllable blending.">
  <meta property="og:url" content="https://sloppy.live/mumblefy">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/A%20vintage%20studio%20microphone%20with%20phonetic%20symbols%20swirling%20around%20it,%20moody%20amber%20stage%20light,%20editorial%20music%20poster?model=flux&seed=3737&width=1200&height=630&nologo=true">
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%A4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,800&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:      #16110e;
      --bg-2:    #211913;
      --paper:   #2a201a;
      --paper-2: #34281f;
      --ink:     #f4e9d8;
      --ink-dim: rgba(244,233,216,0.55);
      --amber:   #f2a93b;
      --amber-d: #c47a1c;
      --rose:    #e8607a;
      --teal:    #45c4b8;
      --gold:    #f6d06a;
      --line:    rgba(244,233,216,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 50% -10%, rgba(242,169,59,0.16), transparent 55%),
        radial-gradient(ellipse at 100% 100%, rgba(232,96,122,0.10), transparent 55%),
        var(--bg);
      color: var(--ink);
      font-family: 'Bricolage Grotesque', sans-serif;
      padding: 1.2rem 1rem 4rem;
    }
    main { max-width: 56rem; margin: 0 auto; }

    /* ============ MASTHEAD ============ */
    header.mast {
      text-align: center;
      margin-bottom: 1.2rem;
    }
    header.mast .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }
    header.mast h1 {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: clamp(3rem, 9vw, 5rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin: 0.2rem 0 0.1rem;
    }
    header.mast h1 em {
      font-style: italic;
      color: var(--amber);
      text-shadow: 0 0 30px rgba(242,169,59,0.4);
    }
    header.mast .tag {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--ink-dim);
    }

    /* ============ SINGER PICKER ============ */
    .singers {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(9.5rem, 1fr));
      gap: 0.55rem;
      margin-bottom: 1rem;
    }
    .singer {
      text-align: left;
      padding: 0.7rem 0.8rem 0.75rem;
      background: var(--paper);
      border: 1.5px solid var(--line);
      border-left: 3px solid var(--singer-c, var(--amber));
      border-radius: 9px;
      cursor: pointer;
      transition: transform 0.1s, filter 0.12s, box-shadow 0.14s, background 0.15s;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: var(--ink);
    }
    .singer:hover  { transform: translateY(-2px); filter: brightness(1.06); }
    .singer.active {
      background: var(--paper-2);
      border-color: var(--singer-c, var(--amber));
      box-shadow: 0 0 0 1px var(--singer-c, var(--amber)), 0 8px 24px -12px var(--singer-c, var(--amber));
    }
    .singer:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
    .singer .s-emoji { font-size: 1.4rem; line-height: 1; }
    .singer .s-name {
      font-weight: 800;
      font-size: 0.98rem;
      line-height: 1.1;
      margin-top: 0.25rem;
      color: var(--singer-c, var(--amber));
    }
    .singer .s-desc {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.04em;
      color: var(--ink-dim);
      margin-top: 0.2rem;
      line-height: 1.3;
    }

    /* ============ EDITOR PANES ============ */
    .panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 640px) {
      .panes { grid-template-columns: 1fr; }
    }
    .pane {
      background: var(--paper);
      border: 1.5px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      display: flex; flex-direction: column;
      min-height: 16rem;
    }
    .pane .pane-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 0.8rem;
      border-bottom: 1.5px solid var(--line);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }
    .pane .pane-head .out-name { color: var(--amber); }
    .pane textarea {
      flex: 1;
      width: 100%;
      resize: none;
      border: none;
      background: none;
      color: var(--ink);
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      line-height: 1.55;
      padding: 0.9rem 1rem;
      outline: none;
    }
    .pane textarea::placeholder { color: var(--ink-dim); font-style: italic; }
    .pane .out {
      flex: 1;
      padding: 0.9rem 1rem;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1.18rem;
      line-height: 1.6;
      color: var(--gold);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-y: auto;
      text-shadow: 0 0 18px rgba(246,208,106,0.18);
    }
    .pane .out .empty { color: var(--ink-dim); font-style: italic; opacity: 0.7; }

    /* ============ ACTION ROW ============ */
    .actions {
      display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
      justify-content: center;
    }
    .btn {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      border: 1.5px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      transition: transform 0.1s, filter 0.12s, box-shadow 0.12s;
      min-height: 2.75rem;
    }
    .btn:hover  { transform: translateY(-1px); filter: brightness(1.1); }
    .btn:active { transform: translateY(1px); }
    .btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }
    .btn.primary {
      background: linear-gradient(135deg, var(--amber), var(--rose));
      color: var(--bg);
      border: none;
      box-shadow: 0 0 22px rgba(242,169,59,0.4);
    }
    .btn .copied { color: var(--teal); }
    .intensity {
      display: inline-flex; align-items: center; gap: 0.3rem;
      margin-left: 0.3rem;
    }
    .intensity .int-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-dim);
    }
    .int-pip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.66rem; letter-spacing: 0.02em;
      padding: 0.4rem 0.7rem;
      border-radius: 999px;
      border: 1.5px solid var(--line);
      background: rgba(244,233,216,0.04);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.13s;
      min-height: 2.2rem;
    }
    .int-pip:hover { filter: brightness(1.15); }
    .int-pip.active {
      background: rgba(242,169,59,0.18);
      border-color: var(--amber);
      color: var(--amber);
      box-shadow: 0 0 12px rgba(242,169,59,0.3);
    }
    .int-pip:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    .seed {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 0.92rem;
      color: var(--ink-dim);
      text-align: center;
      margin-top: 1rem;
    }
    .seed a {
      color: var(--amber);
      cursor: pointer;
      text-decoration: underline dotted;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition: none !important; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <main>
    <header class="mast">
      <div class="eyebrow">singer flow coach</div>
      <h1>mumble<em>fy</em></h1>
      <div class="tag">paste lyrics. pick a flow. see how to connect them when you sing.</div>
    </header>

    <section class="singers" id="singers" role="radiogroup" aria-label="Choose a flow style"></section>

    <div class="panes">
      <div class="pane">
        <div class="pane-head"><span>your lyrics</span><span id="char-count">0</span></div>
        <textarea id="input" placeholder="paste or type your lyrics here…&#10;&#10;the quick brown fox&#10;jumped over the moon" aria-label="Input lyrics"></textarea>
      </div>
      <div class="pane">
        <div class="pane-head"><span>flow-optimized</span><span class="out-name" id="out-name">singer flow</span></div>
        <div class="out" id="output"><span class="empty">…the rewritten version appears here…</span></div>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn primary" id="btn-convert">🎤 mumblefy</button>
      <button type="button" class="btn" id="btn-copy">copy</button>
      <button type="button" class="btn" id="btn-clear">clear</button>
      <div class="intensity" role="group" aria-label="Slur intensity">
        <span class="int-label">marks:</span>
        <button type="button" class="int-pip" data-int="1">clean</button>
        <button type="button" class="int-pip active" data-int="2">show links ‿</button>
        <button type="button" class="int-pip" data-int="3">annotate</button>
      </div>
    </div>

    <p class="seed">no lyrics handy? <a id="try-sample">drop in a sample verse</a>.</p>
  </main>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // HELPERS
    // ============================================================
    const VOWELS = 'aeiou';
    const isVowel = c => VOWELS.indexOf(c.toLowerCase()) !== -1;
    // Deterministic-ish PRNG seeded per-word so output is stable per input
    function hashStr(s) {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
      return h;
    }
    function mulberry32(a) {
      return function() {
        a |= 0; a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    // Apply a per-word transform while preserving punctuation + line breaks
    function transformWords(text, fn) {
      // Split into tokens that are either word-chunks or non-word (spaces/punct)
      return text.replace(/[A-Za-z']+/g, (word, offset) => {
        const rng = mulberry32(hashStr(word.toLowerCase()) ^ (offset * 2654435761 >>> 0));
        return fn(word, rng);
      });
    }
    function stretchVowels(word, rng, minStretch, maxStretch, extra) {
      let out = '';
      for (const ch of word) {
        out += ch;
        if (isVowel(ch)) {
          const n = minStretch + Math.floor(rng() * (maxStretch - minStretch + 1));
          for (let i = 0; i < n; i++) out += (extra ? pick(extra, rng) : ch.toLowerCase());
        }
      }
      return out;
    }
    function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }

    // ============================================================
    // FLOW MARKS — controls how the connected-speech links are shown.
    //   1 = clean     · blended text, no link marks
    //   2 = show links· insert a ‿ undertie at every link point (default,
    //                   it is a coach — the ties teach where to connect)
    //   3 = annotate  · ties + dropped letters shown as apostrophes
    // ============================================================
    let intensity = 2;    // re-used as the "marks" level (1 clean / 2 links / 3 annotate)

    // ============================================================
    // FLOW ENGINE — rewrites lyrics the way a singer connects them:
    //   • VOWEL GLIDES  — vowel→vowel across a word boundary gets a
    //     linking /w/ or /y/ glide ("go on"→"go‿won", "the end"→"the‿yend")
    //   • CONSONANT DROPS — final t/d in a cluster before a consonant is
    //     dropped ("best friend"→"bes' friend", "and then"→"an' then")
    //   • SYLLABLE BLENDING — a final consonant ties onto a following
    //     vowel ("pick it up"→"pick‿it‿up", "an apple"→"an‿apple")
    // 3 styles scale how aggressively the rules fire.
    // ============================================================
    const VSET = 'aeiou';
    function lastLetter(s){ const m = (s||'').match(/[A-Za-z']+$/); const t = m?m[0]:''; return t.length?t[t.length-1].toLowerCase():''; }
    function firstLetter(s){ const m = (s||'').match(/[A-Za-z']+/); const t = m?m[0]:''; return t.length?t[0].toLowerCase():''; }
    function coreWord(s){ const m = (s||'').match(/[A-Za-z']+/); return m?m[0]:''; }
    function leadPunc(s){ const m = (s||'').match(/^[^A-Za-z']*/); return m?m[0]:''; }
    function trailPunc(s){ const m = (s||'').match(/[^A-Za-z']*$/); return m?m[0]:''; }
    // A real cluster = an actual consonant before the t/d (so "head"/"bed"
    // — vowel + d — are NOT clusters and never reduce).
    function endsCluster(core){ return /[bcdfghjklmnpqrstvwxz][td]$/i.test(core); }
    function glideFor(vowel){
      if ('ouw'.indexOf(vowel) !== -1) return 'w';   // back/round vowel -> w-glide
      if ('eiy'.indexOf(vowel) !== -1) return 'y';   // front vowel -> y-glide
      return '';                                      // open a/ah -> no inserted glide, just a tie
    }
    // VOWEL SQUEEZE — collapse an unstressed interior syllable by dropping
    // the short vowel between a consonant and a following liquid/nasal
    // (l/m/n/r), turning the sonorant syllabic. Applies across ALL flow
    // styles. Examples: every→ev'ry · family→fam'ly · travelling→trav'ling
    // · different→diff'rent · camera→cam'ra · chocolate→choc'late.
    // Manual left-to-right scan (handles overlapping windows that a single
    // /g regex would miss) — only reduces past the first vowel so the
    // stressed opening syllable is never squeezed.
    function isCons(ch){ return ch && 'bcdfghjklmnpqrstvwxz'.indexOf(ch.toLowerCase()) !== -1; }
    function isVow(ch){  return ch && 'aeiou'.indexOf(ch.toLowerCase()) !== -1; }
    function isLiq(ch){  return ch && 'lmnr'.indexOf(ch.toLowerCase()) !== -1; }
    function reduceVowels(word){
      for (var i = 1; i + 3 <= word.length; i++) {
        var c = word[i], v = word[i+1], r = word[i+2];
        if (!isCons(c) || !isVow(v) || !isLiq(r)) continue;
        // need a vowel somewhere before i → don't squeeze the stressed
        // first syllable
        if (!/[aeiou]/i.test(word.slice(0, i))) continue;
        var after = word[i+3];
        // double-liquid collapse: C V R R V → C ' R V  (travelling→trav'ling)
        if (after && after.toLowerCase() === r.toLowerCase() && isVow(word[i+4])) {
          return word.slice(0, i) + c + "'" + r + word.slice(i + 4);
        }
        // C V R V|y → C ' R V  (every→ev'ry, family→fam'ly)
        if (isVow(after) || (after && after.toLowerCase() === 'y')) {
          return word.slice(0, i) + c + "'" + word.slice(i + 2);
        }
      }
      return word;
    }
    var TIE = '‿';   // the undertie

    // style: 1 convo, 2 singer, 3 rap | marks: 1 clean, 2 links, 3 annotate
    function flow(text, style, marks) {
      return text.split('\n').map(function(line){ return flowLine(line, style, marks); }).join('\n');
    }
    function flowLine(line, style, marks) {
      var showTie = marks >= 2;
      // Build a flat list of word "segments". Whitespace-separated tokens
      // are split further on INTERNAL hyphens so a compound like
      // "fried-out" becomes two segments — but the second segment is
      // flagged hyphen:true so we keep it joined (never split by a space
      // and never eaten by the old single-run coreWord regex). The flow
      // rules then link the two halves like any adjacent pair.
      var parts = [];
      var toks = line.split(/(\s+)/);
      for (var t = 0; t < toks.length; t++) {
        var tk = toks[t];
        if (tk === '' || /^\s+$/.test(tk)) continue;
        // Split a token on internal hyphens between letters (keep edge
        // hyphens/dashes as their own punctuation-only segments).
        var segs = tk.split(/(?<=[A-Za-z'])-(?=[A-Za-z'])/);
        for (var sgi = 0; sgi < segs.length; sgi++) {
          parts.push({ raw: segs[sgi], hyphen: sgi > 0 });
        }
      }
      var out = [];
      for (var i = 0; i < parts.length; i++) {
        var raw = parts[i].raw;
        var lead = leadPunc(raw), trail = trailPunc(raw), core = coreWord(raw);
        var next = parts[i+1];
        var joinHyphen = next && next.hyphen;     // next seg is a hyphen-half
        if (!core) {
          out.push(raw);
          if (next) out.push(joinHyphen ? '-' : ' ');
          continue;
        }
        // intra-word: vowel squeeze (unstressed syllable collapse) — all styles
        core = reduceVowels(core);
        // intra-word: -ing -> in' in rap flow
        if (style >= 3 && /ing$/i.test(core)) core = core.replace(/ing$/i, "in'");
        // default separator: hyphen-halves stay glued with '-', else space
        var sep = joinHyphen ? '-' : ' ';
        if (next) {
          var nCore = coreWord(next.raw);
          var a = lastLetter(core), b = firstLetter(nCore);
          var bVowel = VSET.indexOf(b) !== -1;
          // 1) CONSONANT DROP / UNRELEASED STOP: a t/d cluster before a
          //    consonant. Final T is elided (best→bes', next→nex'); final
          //    D is UNRELEASED — the letter is kept (held, not released),
          //    so "head"→"head", "and then"→"and then", "old man"→"old man".
          if (style >= 1 && endsCluster(core) && b && !bVowel) {
            if (/t$/i.test(core)) core = core.slice(0, -1) + "'";
            // d → unreleased: keep the letter unchanged
          }
          var a2 = lastLetter(core);
          var a2Vowel = VSET.indexOf(a2) !== -1;
          // 2) VOWEL GLIDE: vowel <-> vowel
          if (style >= 2 && a2Vowel && bVowel) {
            var g = glideFor(a2);
            sep = showTie ? (TIE + g) : (g ? g : sep);
          }
          // 3) SYLLABLE BLEND / LIAISON: consonant -> vowel
          else if (style >= 2 && a2 && !a2Vowel && bVowel) {
            sep = showTie ? TIE : sep;
          }
          // when no flow rule fires, sep stays as joinHyphen ? '-' : ' '
          // so the compound keeps its hyphen and both halves survive.
        }
        out.push(lead + core + trail);
        if (next) out.push(sep);
      }
      return out.join('');
    }

    // ============================================================
    // SINGER ROSTER (UI)
    // ============================================================
    const SINGERS = [
      { id: 1, name: 'Conversational', emoji: '💬', color: '#9ad0c0', desc: 'natural drops · gentle flow' },
      { id: 2, name: 'Singer Flow',    emoji: '🎶', color: '#f6d06a', desc: 'glides + liaison · the sweet spot' },
      { id: 3, name: 'Rap Flow',       emoji: '🎤', color: '#e8607a', desc: 'max blend · drops · -in\' endings' }
    ];
    let activeSinger = 2;   // Singer Flow default (the flow-style level 1/2/3)

    const singersEl = document.getElementById('singers');
    SINGERS.forEach((s, i) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'singer' + (i === 0 ? ' active' : '');
      b.style.setProperty('--singer-c', s.color);
      b.setAttribute('role', 'radio');
      b.setAttribute('aria-checked', i === 0 ? 'true' : 'false');
      b.innerHTML =
        '<div class="s-emoji" aria-hidden="true">' + s.emoji + '</div>' +
        '<div class="s-name">' + s.name + '</div>' +
        '<div class="s-desc">' + s.desc + '</div>';
      b.addEventListener('click', () => {
        activeSinger = s.id;
        document.querySelectorAll('.singer').forEach((el, j) => {
          el.classList.toggle('active', j === i);
          el.setAttribute('aria-checked', j === i ? 'true' : 'false');
        });
        document.getElementById('out-name').textContent = s.name.toLowerCase();
        convert();
      });
      singersEl.appendChild(b);
    });

    // ============================================================
    // EDITOR WIRING
    // ============================================================
    const input  = document.getElementById('input');
    const output = document.getElementById('output');
    const charCount = document.getElementById('char-count');

    function convert() {
      const text = input.value;
      if (!text.trim()) {
        output.innerHTML = '<span class="empty">…the rewritten version appears here…</span>';
        return;
      }
      let result;
      try { result = flow(text, activeSinger, intensity); }
      catch (e) { result = text; console.warn('[mumblefy] flow failed', e); }
      output.textContent = result;
    }
    // Intensity pips
    document.querySelectorAll('.int-pip').forEach(pip => {
      pip.addEventListener('click', () => {
        document.querySelectorAll('.int-pip').forEach(p => p.classList.remove('active'));
        pip.classList.add('active');
        intensity = parseInt(pip.dataset.int, 10) || 2;
        convert();
      });
    });
    input.addEventListener('input', () => {
      charCount.textContent = input.value.length;
      convert();
    });
    document.getElementById('btn-convert').addEventListener('click', convert);
    document.getElementById('btn-clear').addEventListener('click', () => {
      input.value = '';
      charCount.textContent = '0';
      convert();
      input.focus();
    });
    document.getElementById('btn-copy').addEventListener('click', () => {
      const txt = output.textContent;
      if (!txt || txt.indexOf('appears here') !== -1) return;
      navigator.clipboard.writeText(txt).then(() => {
        const btn = document.getElementById('btn-copy');
        const orig = btn.textContent;
        btn.innerHTML = '<span class="copied">copied ✓</span>';
        setTimeout(() => { btn.textContent = orig; }, 1400);
      }).catch(() => {});
    });

    // Sample verse
    const SAMPLE =
`i found a love for me
darling just dive right in
follow my lead
i found a girl beautiful and sweet
i never knew you were the someone waiting for me`;
    document.getElementById('try-sample').addEventListener('click', () => {
      input.value = SAMPLE;
      charCount.textContent = input.value.length;
      convert();
    });

    // Boot
    convert();
  })();
  </script>
</body>
</html>
