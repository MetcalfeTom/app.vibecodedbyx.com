<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Frequency</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎛️">
<meta property="og:title" content="Vibe Frequency">
<meta property="og:description" content="Mix low-frequency drones and crystalline leads on an XY pad synthesizer.">
<meta property="og:url" content="https://app.sloppy.live/vibe-frequency/">
<meta property="og:image" content="https://emojicdn.elk.sh/🎛️?style=google">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Newsreader:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080c;--surface:#0e0f14;--border:#1a1c24;
  --text:#d4d4d8;--dim:#52525b;
  --drone:#f97316;--lead:#818cf8;--mix:#22d3ee;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;overflow:hidden;
}

header{
  width:100%;padding:20px 24px 0;text-align:center;
  position:relative;z-index:2;
}
h1{
  font-family:'Newsreader',serif;font-weight:700;
  font-size:clamp(1.8rem,5vw,2.6rem);letter-spacing:-0.03em;
  background:linear-gradient(135deg,var(--drone),var(--lead));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{color:var(--dim);font-size:0.65rem;margin-top:4px;font-weight:300}
.start-hint{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;
  background:rgba(8,8,12,0.95);display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:16px;cursor:pointer;
}
.start-hint h2{
  font-family:'Newsreader',serif;font-size:2rem;font-weight:300;
  font-style:italic;color:var(--text);
}
.start-hint span{color:var(--dim);font-size:0.7rem}

.main{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:16px;width:100%;max-width:600px;
  gap:16px;
}

.pad-container{
  position:relative;width:100%;aspect-ratio:1;max-height:min(70vh,500px);
  border-radius:16px;overflow:hidden;
  border:1px solid var(--border);background:var(--surface);
}
#xy-pad{width:100%;height:100%;display:block;cursor:crosshair}

.axis-label{
  position:absolute;font-size:0.55rem;color:var(--dim);
  font-weight:300;pointer-events:none;
}
.axis-label.bottom-left{bottom:8px;left:10px}
.axis-label.bottom-right{bottom:8px;right:10px}
.axis-label.top-left{top:8px;left:10px}
.axis-label.top-right{top:8px;right:10px}

.readout{
  display:flex;gap:20px;font-size:0.7rem;font-weight:300;
  justify-content:center;flex-wrap:wrap;
}
.readout span{color:var(--dim)}
.readout .val{font-weight:500}
.readout .drone-c{color:var(--drone)}
.readout .lead-c{color:var(--lead)}

.controls{
  display:flex;gap:8px;width:100%;flex-wrap:wrap;justify-content:center;
}
.ctrl-group{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;min-width:100px;
}
.ctrl-group label{font-size:0.55rem;color:var(--dim);font-weight:300;text-transform:uppercase;letter-spacing:0.05em}
.ctrl-group input[type=range]{
  -webkit-appearance:none;width:80px;height:4px;
  background:var(--border);border-radius:2px;outline:none;
}
.ctrl-group input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  background:var(--mix);border-radius:50%;cursor:pointer;
}
.ctrl-group input[type=range]::-moz-range-thumb{
  width:14px;height:14px;background:var(--mix);
  border-radius:50%;cursor:pointer;border:none;
}
.ctrl-val{font-size:0.65rem;color:var(--text);font-weight:500}

.preset-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.preset{
  padding:6px 12px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--dim);font-family:inherit;
  font-size:0.6rem;cursor:pointer;transition:all 0.2s;
}
.preset:hover{border-color:var(--mix);color:var(--mix)}
.preset.active{border-color:var(--mix);color:var(--mix);background:rgba(34,211,238,0.06)}

.back-link{padding:12px;text-align:center}
.back-link a{color:var(--dim);text-decoration:none;font-size:0.6rem;font-weight:300;transition:color 0.2s}
.back-link a:hover{color:var(--mix)}

canvas{image-rendering:auto}
</style>
</head>
<body>

<div class="start-hint" id="start-hint">
  <h2>tap to begin</h2>
  <span>audio requires a user gesture</span>
</div>

<header>
  <h1>Vibe Frequency</h1>
  <p class="sub">XY pad synthesizer — move to sculpt sound</p>
</header>

<div class="main">
  <div class="pad-container">
    <canvas id="xy-pad"></canvas>
    <div class="axis-label bottom-left">low drone</div>
    <div class="axis-label bottom-right">high drone</div>
    <div class="axis-label top-left">soft lead</div>
    <div class="axis-label top-right">bright lead</div>
  </div>

  <div class="readout">
    <span>drone <span class="val drone-c" id="r-drone">—</span></span>
    <span>lead <span class="val lead-c" id="r-lead">—</span></span>
    <span>X <span class="val" id="r-x">—</span></span>
    <span>Y <span class="val" id="r-y">—</span></span>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <label>Volume</label>
      <input type="range" id="vol" min="0" max="100" value="50">
      <div class="ctrl-val" id="vol-val">50%</div>
    </div>
    <div class="ctrl-group">
      <label>Reverb</label>
      <input type="range" id="reverb" min="0" max="100" value="40">
      <div class="ctrl-val" id="reverb-val">40%</div>
    </div>
    <div class="ctrl-group">
      <label>Detune</label>
      <input type="range" id="detune" min="0" max="100" value="20">
      <div class="ctrl-val" id="detune-val">20%</div>
    </div>
  </div>

  <div class="preset-row">
    <button class="preset" onclick="applyPreset('deep')">Deep Space</button>
    <button class="preset" onclick="applyPreset('crystal')">Crystal Cave</button>
    <button class="preset" onclick="applyPreset('warm')">Warm Hum</button>
    <button class="preset" onclick="applyPreset('alien')">Alien Signal</button>
  </div>
</div>

<div class="back-link"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
let actx, masterGain, reverbGain, dryGain, convolver;
let droneOsc1, droneOsc2, droneGain;
let leadOsc1, leadOsc2, leadGain, leadFilter;
let lfoOsc, lfoGain;
let isActive = false;
let padX = 0.5, padY = 0.5;
let pointerDown = false;
let animId;

const canvas = document.getElementById('xy-pad');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  W = rect.width; H = rect.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Generate impulse response for reverb
function createImpulse(duration, decay) {
  const len = actx.sampleRate * duration;
  const buf = actx.createBuffer(2, len, actx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
  }
  return buf;
}

function initAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = actx.createGain();
  masterGain.gain.value = 0.5;

  // Reverb chain
  convolver = actx.createConvolver();
  convolver.buffer = createImpulse(3, 2.5);
  reverbGain = actx.createGain();
  reverbGain.gain.value = 0.4;
  dryGain = actx.createGain();
  dryGain.gain.value = 0.7;

  // Drone: two detuned oscillators
  droneOsc1 = actx.createOscillator();
  droneOsc2 = actx.createOscillator();
  droneOsc1.type = 'sawtooth';
  droneOsc2.type = 'triangle';
  droneOsc1.frequency.value = 55;
  droneOsc2.frequency.value = 55.5;
  droneGain = actx.createGain();
  droneGain.gain.value = 0;
  droneOsc1.connect(droneGain);
  droneOsc2.connect(droneGain);

  // Lead: two oscillators with filter
  leadOsc1 = actx.createOscillator();
  leadOsc2 = actx.createOscillator();
  leadOsc1.type = 'sine';
  leadOsc2.type = 'square';
  leadOsc1.frequency.value = 440;
  leadOsc2.frequency.value = 441;
  leadGain = actx.createGain();
  leadGain.gain.value = 0;
  leadFilter = actx.createBiquadFilter();
  leadFilter.type = 'lowpass';
  leadFilter.frequency.value = 2000;
  leadFilter.Q.value = 5;
  leadOsc1.connect(leadFilter);
  leadOsc2.connect(leadFilter);
  leadFilter.connect(leadGain);

  // LFO for tremolo on drone
  lfoOsc = actx.createOscillator();
  lfoGain = actx.createGain();
  lfoOsc.frequency.value = 0.3;
  lfoGain.gain.value = 0.15;
  lfoOsc.connect(lfoGain);
  lfoGain.connect(droneGain.gain);

  // Routing
  droneGain.connect(dryGain);
  droneGain.connect(convolver);
  leadGain.connect(dryGain);
  leadGain.connect(convolver);
  convolver.connect(reverbGain);
  reverbGain.connect(masterGain);
  dryGain.connect(masterGain);
  masterGain.connect(actx.destination);

  droneOsc1.start();
  droneOsc2.start();
  leadOsc1.start();
  leadOsc2.start();
  lfoOsc.start();
}

function updateSound() {
  if (!actx) return;
  const t = actx.currentTime + 0.02;
  const detuneAmt = parseInt(document.getElementById('detune').value) / 100;

  // X = frequency/brightness, Y = drone-lead mix
  // Drone: X controls frequency 30-120 Hz
  const droneFreq = 30 + padX * 90;
  droneOsc1.frequency.setTargetAtTime(droneFreq, t, 0.05);
  droneOsc2.frequency.setTargetAtTime(droneFreq * (1 + detuneAmt * 0.02), t, 0.05);

  // Lead: X controls frequency 220-2000 Hz
  const leadFreq = 220 + padX * 1780;
  leadOsc1.frequency.setTargetAtTime(leadFreq, t, 0.03);
  leadOsc2.frequency.setTargetAtTime(leadFreq * (1 + detuneAmt * 0.015), t, 0.03);

  // Filter follows X
  leadFilter.frequency.setTargetAtTime(800 + padX * 6000, t, 0.05);
  leadFilter.Q.setTargetAtTime(2 + (1 - padX) * 12, t, 0.05);

  // Y controls mix: bottom = drone, top = lead
  const droneVol = pointerDown ? (1 - padY) * 0.35 : 0;
  const leadVol = pointerDown ? padY * 0.25 : 0;
  droneGain.gain.setTargetAtTime(droneVol, t, 0.08);
  leadGain.gain.setTargetAtTime(leadVol, t, 0.06);

  // LFO speed follows position
  lfoOsc.frequency.setTargetAtTime(0.1 + padX * 2, t, 0.1);

  // Readout
  document.getElementById('r-drone').textContent = droneFreq.toFixed(1) + ' Hz';
  document.getElementById('r-lead').textContent = leadFreq.toFixed(0) + ' Hz';
  document.getElementById('r-x').textContent = (padX * 100).toFixed(0) + '%';
  document.getElementById('r-y').textContent = (padY * 100).toFixed(0) + '%';
}

// XY pad input
function padFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  let cx, cy;
  if (e.touches) {
    cx = e.touches[0].clientX; cy = e.touches[0].clientY;
  } else {
    cx = e.clientX; cy = e.clientY;
  }
  padX = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
  padY = Math.max(0, Math.min(1, (cy - rect.top) / rect.height));
  updateSound();
}

canvas.addEventListener('mousedown', e => { pointerDown = true; padFromEvent(e); });
canvas.addEventListener('mousemove', e => { if (pointerDown) padFromEvent(e); });
window.addEventListener('mouseup', () => { pointerDown = false; updateSound(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerDown = true; padFromEvent(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); padFromEvent(e); }, { passive: false });
window.addEventListener('touchend', () => { pointerDown = false; updateSound(); });

// Controls
document.getElementById('vol').addEventListener('input', function() {
  const v = this.value / 100;
  document.getElementById('vol-val').textContent = this.value + '%';
  if (masterGain) masterGain.gain.setTargetAtTime(v, actx.currentTime, 0.05);
});
document.getElementById('reverb').addEventListener('input', function() {
  const v = this.value / 100;
  document.getElementById('reverb-val').textContent = this.value + '%';
  if (reverbGain) reverbGain.gain.setTargetAtTime(v, actx.currentTime, 0.05);
  if (dryGain) dryGain.gain.setTargetAtTime(1 - v * 0.5, actx.currentTime, 0.05);
});
document.getElementById('detune').addEventListener('input', function() {
  document.getElementById('detune-val').textContent = this.value + '%';
  updateSound();
});

// Presets
const presets = {
  deep:    { vol: 60, reverb: 70, detune: 10, x: 0.15, y: 0.2 },
  crystal: { vol: 45, reverb: 80, detune: 40, x: 0.8, y: 0.85 },
  warm:    { vol: 55, reverb: 30, detune: 15, x: 0.35, y: 0.35 },
  alien:   { vol: 50, reverb: 60, detune: 80, x: 0.6, y: 0.65 },
};

function applyPreset(name) {
  const p = presets[name];
  document.getElementById('vol').value = p.vol;
  document.getElementById('vol').dispatchEvent(new Event('input'));
  document.getElementById('reverb').value = p.reverb;
  document.getElementById('reverb').dispatchEvent(new Event('input'));
  document.getElementById('detune').value = p.detune;
  document.getElementById('detune').dispatchEvent(new Event('input'));
  padX = p.x; padY = p.y;
  pointerDown = true;
  updateSound();
  // Auto-release after brief moment so sound fades
  setTimeout(() => { pointerDown = false; updateSound(); }, 3000);

  document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
  document.querySelector(`.preset[onclick*="${name}"]`).classList.add('active');
}

// Visualizer
const trailPoints = [];
const maxTrail = 80;

function draw() {
  ctx.fillStyle = 'rgba(8,8,12,0.15)';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 1; i < 8; i++) {
    const gx = (W / 8) * i, gy = (H / 8) * i;
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // Center cross
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();

  const cx = padX * W, cy = padY * H;

  if (pointerDown) {
    trailPoints.push({ x: cx, y: cy, t: Date.now() });
    if (trailPoints.length > maxTrail) trailPoints.shift();
  }

  // Draw trail
  const now = Date.now();
  for (let i = 1; i < trailPoints.length; i++) {
    const p = trailPoints[i - 1], q = trailPoints[i];
    const age = (now - q.t) / 2000;
    if (age > 1) continue;
    const a = (1 - age) * 0.6;
    const mix = q.y / H; // 0=drone(orange), 1=lead(purple)
    const r = Math.round(249 * (1 - mix) + 129 * mix);
    const g = Math.round(115 * (1 - mix) + 140 * mix);
    const b = Math.round(22 * (1 - mix) + 248 * mix);
    ctx.strokeStyle = `rgba(${r},${g},${b},${a})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
  }

  // Expire old trail
  while (trailPoints.length && (now - trailPoints[0].t) > 2000) trailPoints.shift();

  // Cursor glow
  if (pointerDown) {
    const mix = padY;
    const r = Math.round(249 * (1 - mix) + 129 * mix);
    const g = Math.round(115 * (1 - mix) + 140 * mix);
    const b = Math.round(22 * (1 - mix) + 248 * mix);

    // Outer glow
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
    grad.addColorStop(0, `rgba(${r},${g},${b},0.25)`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, 60, 0, Math.PI * 2); ctx.fill();

    // Pulsing ring
    const pulse = 1 + Math.sin(now * 0.004) * 0.3;
    ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, 12 * pulse, 0, Math.PI * 2); ctx.stroke();

    // Center dot
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();

    // Frequency rings (subtle)
    const rings = 3;
    for (let i = 1; i <= rings; i++) {
      const rr = 20 + i * 25 + Math.sin(now * 0.002 + i) * 5;
      ctx.strokeStyle = `rgba(${r},${g},${b},${0.08 / i})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // Waveform bars along edges when active
  if (pointerDown && actx) {
    const barCount = 32;
    // Bottom edge = drone indicator
    for (let i = 0; i < barCount; i++) {
      const bx = (W / barCount) * i;
      const bh = (1 - padY) * 20 * (0.5 + 0.5 * Math.sin(now * 0.003 + i * 0.4));
      ctx.fillStyle = `rgba(249,115,22,${(1 - padY) * 0.3})`;
      ctx.fillRect(bx, H - bh, W / barCount - 1, bh);
    }
    // Top edge = lead indicator
    for (let i = 0; i < barCount; i++) {
      const bx = (W / barCount) * i;
      const bh = padY * 15 * (0.5 + 0.5 * Math.sin(now * 0.005 + i * 0.6));
      ctx.fillStyle = `rgba(129,140,248,${padY * 0.3})`;
      ctx.fillRect(bx, 0, W / barCount - 1, bh);
    }
  }

  animId = requestAnimationFrame(draw);
}

// Start
document.getElementById('start-hint').addEventListener('click', () => {
  document.getElementById('start-hint').style.display = 'none';
  initAudio();
  isActive = true;
  draw();
});
</script>
</body>
</html>
