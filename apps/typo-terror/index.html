<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Typo Terror</title>
<link rel="icon" href="https://emojicdn.elk.sh/👾">
<meta property="og:title" content="Typo Terror">
<meta property="og:description" content="Feed misspelled words to a fuzzy static creature. It grows. It watches. It judges your grammar.">
<meta property="og:url" content="https://sloppy.live/typo-terror/">
<meta property="og:image" content="https://sloppy.live/typo-terror/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@300;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08060e;overflow:hidden;font-family:'Space Mono',monospace;color:#c8b0ff}
canvas{display:block;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}

#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;flex-direction:column;align-items:center;padding:16px;gap:8px}
#input-row{display:flex;gap:8px;width:100%;max-width:500px}
#feed-input{flex:1;background:rgba(140,100,255,.06);border:1px solid rgba(140,100,255,.15);color:#c8b0ff;font-family:'Space Mono',monospace;font-size:14px;padding:10px 14px;outline:none;border-radius:0}
#feed-input::placeholder{color:rgba(140,100,255,.2)}
#feed-input:focus{border-color:rgba(140,100,255,.4);background:rgba(140,100,255,.1)}
#feed-btn{background:rgba(140,100,255,.1);border:1px solid rgba(140,100,255,.25);color:#c8b0ff;font-family:'Anybody',sans-serif;font-weight:700;font-size:13px;padding:10px 18px;cursor:pointer;letter-spacing:1px}
#feed-btn:hover{background:rgba(140,100,255,.2);border-color:rgba(140,100,255,.5)}

#status{font-size:10px;color:rgba(140,100,255,.25);text-align:center;min-height:14px;font-weight:300}
#mood{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:10;font-family:'Anybody',sans-serif;font-weight:900;font-size:clamp(14px,3vw,22px);color:rgba(140,100,255,.12);letter-spacing:4px;text-align:center;pointer-events:none}
#size-bar{position:fixed;top:10px;right:14px;z-index:10;text-align:right}
#size-bar .label{font-size:8px;color:rgba(140,100,255,.15);letter-spacing:2px}
#size-bar .val{font-family:'Anybody',sans-serif;font-weight:900;font-size:20px;color:rgba(140,100,255,.2)}

#history{position:fixed;top:50px;right:14px;z-index:10;max-height:40vh;overflow:hidden;text-align:right;pointer-events:none}
.hist-word{font-size:9px;padding:1px 0;animation:histFade 6s forwards;white-space:nowrap}
.hist-word.bad{color:rgba(255,80,120,.4)}
.hist-word.good{color:rgba(80,255,160,.3)}
@keyframes histFade{0%{opacity:1}70%{opacity:0.6}100%{opacity:0}}

a#backlink{position:fixed;bottom:10px;left:10px;color:rgba(140,100,255,.06);font-size:8px;text-decoration:none;z-index:10}
a#backlink:hover{color:rgba(140,100,255,.3)}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="mood">TYPO TERROR</div>
<div id="size-bar"><div class="label">SIZE</div><div class="val" id="size-val">1.0</div></div>
<div id="history"></div>

<div id="ui">
  <div id="status"></div>
  <div id="input-row">
    <input type="text" id="feed-input" placeholder="type words to feed the creature..." maxlength="200" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="feed-btn">FEED</button>
  </div>
</div>

<a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H;
function resize(){W=CV.width=innerWidth;H=CV.height=innerHeight;}
resize();addEventListener('resize',resize);

// === DICTIONARY — common English words (spell check) ===
// ~800 common words. Words not in this list = "misspelled"
const DICT=new Set(`a about above after again against all am an and any are as at be because been before being below between both but by can could did do does doing down during each few for from further get got had has have having he her here hers herself him himself his how i if in into is it its itself just know let like make me might more most much must my myself need no nor not now of off on once only or other our ours ourselves out over own point said same say she should so some still such take than that the their theirs them themselves then there these they this those through time to too two under until up us use very want was way we well were what when where which while who whom why will with would yes yet you your yours yourself yourselves
able about above accept across act add afraid after afternoon again ago agree air all almost along already also always am among an and angry animal answer any appear apple arm around arrive art as ask at away back bad bag ball banana bank base basket bath be bear beautiful because bed been before began begin behind believe below beside best better between big bird bit bite black blood blue board boat body bone book both bottom box boy brain brave bread break breakfast bring brother brown build burn bus business busy but buy by cake call came can car care careful carry cat catch chair change child children city class clean clear climb close clothes cloud coat cold come common computer cook cool copy correct could count country course cover cross cry cup cut dance danger dark daughter day dead dear deep did die different difficult dinner do doctor does dog door down draw dream dress drink drive drop dry during each ear early earth east eat egg eight either else empty end enemy enough even evening ever every example eye face fall family far fast fat father fear feed feel feet few fight fill find fine finger fire first fish five flat floor fly follow food foot for foreign forest forget fork four free fresh friend from front fruit full fun game garden gate get girl give glad glass go god gold gone good grass great green grew ground group grow gun hair half hand happen happy hard hat hate have he head hear heart heavy hello help her here high hill him his hit hold hole home hope horse hospital hot hotel house how hundred hungry hurry hurt husband ice idea if important in inside into iron is island it its join journey juice jump just keep key kill kind king kitchen knee knife knock know land large last late laugh lay lead learn leave left leg less lesson let lie life lift light like line lion lip list listen little live long look lose lot love low luck lunch machine make man many map mark market may me meal mean meet milk million mind minute miss mistake mix money month moon more morning most mother mountain mouth move much music must my name narrow near neck need never new news next nice night nine no noise none nor north nose not nothing now number of off often oh oil old on one only open or orange order other our out outside over own page pair pan paper park part past pay people perhaps period person pick piece place plan plant plate play please point poor postman pot pound power practice present pretty price print prize problem promise provide pull push put quarter queen question quick quiet quite radio rain raise ran reach read ready real really receive record red remember rest result rich ride right ring rise road room round rubber rule run sad safe sail salt same sat save say school seat second see seem self sell send sentence set seven shall shape she shine ship shirt shoe shoot short should show shut side since sing sister sit six size sleep small smell smile smoke so some son soon sorry sound speak special speed spend spoon stand star start station stay step still stone stop story street strong student study such sugar summer sun sure sweet swim table take talk tall tea teach tell ten test than thank that the their them then there these they thing think third this those though thousand three through throw tie time tired to today together tomorrow too top touch town train travel tree trouble true try turn twelve two type uncle under unit until up upon us use usual very visit voice wait walk wall want warm was wash watch water we wear weather week welcome well went were west western what wheel when where which white who whole whose why wide wife will win wind window winter wish with without woman wonder word work world worry would write wrong year yes yesterday you young zero`.split(/\s+/));

// add more tricky words that are valid
'the their there they them these those through thought though think thing three together tomorrow today always already another because before between could should would every everything everyone enough different difficult important interesting beautiful necessary possible probably remember something sometimes understand'.split(' ').forEach(w=>DICT.add(w));
'restaurant rhythm definitely separate receive believe necessary accommodate occurrence acquiesce mischievous supersede millennium pronunciation hierarchy bureaucracy conscientious idiosyncrasy onomatopoeia pharaoh chrysanthemum bougainvillea diphtheria fluorescent hemorrhage liaison vacuum weird foreign gauge seize cemetery privilege license environment government independent argument February Wednesday January February library secretary miniature temperature exaggerate recommend immediately occasionally unfortunately'.split(' ').forEach(w=>DICT.add(w.toLowerCase()));

function checkWord(w){
  const clean=w.toLowerCase().replace(/[^a-z'-]/g,'');
  if(clean.length<=1)return null; // skip single chars
  if(/^\d+$/.test(w))return null; // skip numbers
  return DICT.has(clean)?'good':'bad';
}

// === CREATURE STATE ===
let creatureSize=1; // 0.3 to 5.0
let targetSize=1;
let mood='neutral'; // neutral, happy, excited, sleepy, angry
let moodTimer=0;
let eyeState={blink:0,pupilX:0,pupilY:0,targetPX:0,targetPY:0,wide:0};
let mouthOpen=0,targetMouth=0;
let shakeAmount=0;
let particles=[];
let staticNoise=[]; // pre-generated noise field
let t=0;
let totalFed=0,totalTypos=0,totalCorrect=0;

// restore
try{
  const d=JSON.parse(localStorage.getItem('tt-state'));
  if(d){creatureSize=targetSize=d.size||1;totalFed=d.fed||0;totalTypos=d.typos||0;totalCorrect=d.correct||0;}
}catch(e){}
function saveState(){
  try{localStorage.setItem('tt-state',JSON.stringify({size:creatureSize,fed:totalFed,typos:totalTypos,correct:totalCorrect}));}catch(e){}
}

// generate static noise texture
for(let i=0;i<2000;i++){
  staticNoise.push({
    ox:Math.random()*2-1, // offset from center, normalized
    oy:Math.random()*2-1,
    dist:Math.random(), // 0=center, 1=edge
    speed:0.5+Math.random()*2,
    phase:Math.random()*Math.PI*2,
    size:1+Math.random()*3,
    bright:0.3+Math.random()*0.7,
  });
}

// === FEED THE CREATURE ===
function feedText(text){
  const words=text.trim().split(/\s+/).filter(w=>w.length>0);
  if(!words.length)return;

  let typos=0,correct=0;
  const histEl=document.getElementById('history');

  for(const w of words){
    const result=checkWord(w);
    if(!result)continue; // skip non-words
    totalFed++;
    const div=document.createElement('div');
    div.className='hist-word '+result;
    if(result==='bad'){
      typos++;totalTypos++;
      div.textContent='✗ '+w;
      // grow!
      targetSize=Math.min(6,targetSize+0.08+creatureSize*0.02);
      // excited particles
      for(let i=0;i<5;i++){
        particles.push({
          x:W/2+(Math.random()-0.5)*creatureSize*40,
          y:H*0.42+(Math.random()-0.5)*creatureSize*30,
          vx:(Math.random()-0.5)*3,vy:-1-Math.random()*3,
          life:40+Math.random()*30,maxLife:70,
          hue:280+Math.random()*60,size:2+Math.random()*4,
        });
      }
    } else {
      correct++;totalCorrect++;
      div.textContent='✓ '+w;
      // shrink!
      targetSize=Math.max(0.3,targetSize-0.05);
    }
    histEl.appendChild(div);
    if(histEl.children.length>15)histEl.firstChild.remove();
    setTimeout(()=>{if(div.parentNode)div.remove();},6000);
  }

  // set mood
  if(typos>correct){
    mood=typos>3?'excited':'happy';
    moodTimer=180;shakeAmount=typos*2;
    targetMouth=0.6+typos*0.1;
  } else if(correct>typos){
    mood=correct>3?'angry':'sleepy';
    moodTimer=180;
    targetMouth=0.1;
  } else {
    mood='neutral';moodTimer=120;
    targetMouth=0.3;
  }

  // status message
  const st=document.getElementById('status');
  if(typos>0&&correct===0)st.textContent='mmm... delicious typos. '+typos+' misspelling'+(typos>1?'s':'')+' devoured!';
  else if(correct>0&&typos===0)st.textContent='ugh... perfect grammar. shrinking...';
  else if(typos>correct)st.textContent=typos+' typo'+(typos>1?'s':'')+' vs '+correct+' correct. net growth!';
  else if(correct>typos)st.textContent=correct+' correct vs '+typos+' typo'+(typos>1?'s':'')+'. shrinking!';
  else st.textContent='balanced diet. no change.';

  saveState();
}

document.getElementById('feed-btn').addEventListener('click',()=>{
  const inp=document.getElementById('feed-input');
  if(inp.value.trim()){feedText(inp.value);inp.value='';inp.focus();}
});
document.getElementById('feed-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const inp=e.target;
    if(inp.value.trim()){feedText(inp.value);inp.value='';}
  }
});

// === MOOD LABELS ===
const MOOD_LABELS={
  neutral:['TYPO TERROR','WATCHING...','HUNGRY','FEED ME','...'],
  happy:['NOM NOM','YESSS','TASTY TYPOS','MORE!','DELICIOUS'],
  excited:['AAAA!','SO MANY ERRORS','GROWING!','UNLIMITED POWER','FEAST!'],
  sleepy:['ugh...','no...','too correct...','boring...','*shrinks*'],
  angry:['STOP THAT','NO GRAMMAR','I HATE THIS','SHRINKING!','WHY'],
};

// === RENDER ===
function drawCreature(){
  const cx=W/2,cy=H*0.42;
  const baseR=50*creatureSize;

  // === STATIC CLOUD BODY ===
  // Draw fuzzy static noise cloud
  for(const n of staticNoise){
    // position noise particles within an elliptical boundary
    const angle=Math.atan2(n.oy,n.ox);
    const maxDist=0.85+Math.sin(t*0.02*n.speed+n.phase)*0.15;
    if(n.dist>maxDist)continue;

    const wobble=Math.sin(t*0.03*n.speed+n.phase)*0.08;
    const nx=cx+n.ox*baseR*(1+wobble)+Math.sin(t*0.05+n.phase)*2;
    const ny=cy+n.oy*baseR*0.85*(1+wobble)+Math.cos(t*0.04+n.phase)*2;

    // flickering brightness
    const flicker=0.4+Math.sin(t*0.1*n.speed+n.phase*3)*0.3+Math.random()*0.3;
    const edgeFade=1-n.dist*0.7;
    const alpha=flicker*edgeFade*n.bright*0.35;

    // purple-ish static
    const hue=260+Math.sin(n.phase)*30+Math.sin(t*0.01)*10;
    const sat=30+n.dist*40;
    const lum=50+flicker*30;
    X.fillStyle='hsla('+hue+','+sat+'%,'+lum+'%,'+alpha+')';
    const s=n.size*(0.7+creatureSize*0.15);
    X.fillRect(Math.floor(nx),Math.floor(ny),Math.ceil(s),Math.ceil(s));
  }

  // outer glow
  const glow=X.createRadialGradient(cx,cy,baseR*0.3,cx,cy,baseR*1.3);
  glow.addColorStop(0,'rgba(140,80,255,'+0.04*creatureSize+')');
  glow.addColorStop(0.6,'rgba(140,80,255,'+0.02*creatureSize+')');
  glow.addColorStop(1,'rgba(140,80,255,0)');
  X.fillStyle=glow;
  X.fillRect(cx-baseR*1.5,cy-baseR*1.5,baseR*3,baseR*3);

  // === BIG EYES ===
  const eyeSpacing=baseR*0.35;
  const eyeY=cy-baseR*0.1;
  const eyeR=baseR*0.22;
  const blink=eyeState.blink;

  for(let side=-1;side<=1;side+=2){
    const ex=cx+side*eyeSpacing;
    const ey=eyeY;

    // eye white (slightly blue-tinted)
    X.fillStyle='rgba(220,210,255,0.9)';
    X.beginPath();
    if(blink>0.5){
      // squished during blink
      const squish=1-((blink-0.5)*2);
      X.ellipse(ex,ey,eyeR,eyeR*Math.max(0.05,squish),0,0,Math.PI*2);
    } else {
      const wide=1+eyeState.wide*0.2;
      X.ellipse(ex,ey,eyeR,eyeR*wide,0,0,Math.PI*2);
    }
    X.fill();

    // eye outline
    X.strokeStyle='rgba(80,40,140,0.6)';
    X.lineWidth=1.5;
    X.stroke();

    if(blink<0.5){
      // pupil
      const pupilR=eyeR*0.5;
      const px=ex+eyeState.pupilX*eyeR*0.3;
      const py=ey+eyeState.pupilY*eyeR*0.25;
      X.fillStyle='#1a0030';
      X.beginPath();X.arc(px,py,pupilR,0,Math.PI*2);X.fill();

      // pupil highlight
      X.fillStyle='rgba(200,180,255,0.8)';
      X.beginPath();X.arc(px-pupilR*0.3,py-pupilR*0.3,pupilR*0.25,0,Math.PI*2);X.fill();

      // iris ring
      X.strokeStyle='hsla('+(260+Math.sin(t*0.01)*20)+',70%,50%,0.4)';
      X.lineWidth=1;
      X.beginPath();X.arc(px,py,pupilR*0.8,0,Math.PI*2);X.stroke();

      // angry eyebrow when shrinking
      if(mood==='angry'||mood==='sleepy'){
        X.strokeStyle='rgba(140,60,200,0.5)';
        X.lineWidth=eyeR*0.15;
        X.beginPath();
        const browY=ey-eyeR*1.2;
        if(mood==='angry'){
          X.moveTo(ex-eyeR*0.8,browY+side*eyeR*0.3);
          X.lineTo(ex+eyeR*0.8,browY-side*eyeR*0.1);
        } else {
          X.moveTo(ex-eyeR*0.8,browY-eyeR*0.1);
          X.lineTo(ex+eyeR*0.8,browY-eyeR*0.1);
        }
        X.stroke();
      }
    }
  }

  // === MOUTH ===
  const mouthY=cy+baseR*0.25;
  const mouthW=baseR*0.3;
  const mOpen=mouthOpen*baseR*0.2;

  if(mOpen>1){
    // open mouth
    X.fillStyle='rgba(40,0,60,0.8)';
    X.beginPath();
    X.ellipse(cx,mouthY,mouthW,mOpen,0,0,Math.PI*2);
    X.fill();
    // inner glow
    X.fillStyle='hsla(280,60%,30%,0.4)';
    X.beginPath();
    X.ellipse(cx,mouthY,mouthW*0.5,mOpen*0.5,0,0,Math.PI*2);
    X.fill();
  } else {
    // closed — small line
    X.strokeStyle='rgba(100,50,160,0.4)';
    X.lineWidth=1.5;
    X.beginPath();
    if(mood==='happy'||mood==='excited'){
      // smile
      X.arc(cx,mouthY-baseR*0.05,mouthW*0.6,0.1,Math.PI-0.1);
    } else if(mood==='angry'){
      // frown
      X.arc(cx,mouthY+baseR*0.15,mouthW*0.6,Math.PI+0.1,Math.PI*2-0.1);
    } else {
      // neutral line
      X.moveTo(cx-mouthW*0.4,mouthY);X.lineTo(cx+mouthW*0.4,mouthY);
    }
    X.stroke();
  }

  // === TINY ARMS (when big enough) ===
  if(creatureSize>1.5){
    const armLen=baseR*0.3;
    for(let side=-1;side<=1;side+=2){
      const ax=cx+side*baseR*0.7;
      const ay=cy+baseR*0.15;
      const wave=Math.sin(t*0.03+side)*0.3;
      X.strokeStyle='rgba(140,80,255,0.2)';
      X.lineWidth=2+creatureSize*0.5;
      X.beginPath();
      X.moveTo(ax,ay);
      X.quadraticCurveTo(ax+side*armLen*0.5,ay+armLen*0.3+wave*10,ax+side*armLen,ay+Math.sin(t*0.05+side*2)*armLen*0.3);
      X.stroke();
      // tiny hand
      X.fillStyle='rgba(160,100,255,0.15)';
      X.beginPath();
      X.arc(ax+side*armLen,ay+Math.sin(t*0.05+side*2)*armLen*0.3,3+creatureSize,0,Math.PI*2);
      X.fill();
    }
  }
}

function drawBackground(){
  X.fillStyle='#08060e';
  X.fillRect(0,0,W,H);

  // subtle grid
  X.strokeStyle='rgba(140,100,255,0.015)';
  X.lineWidth=0.5;
  const gridSize=60;
  for(let x=0;x<W;x+=gridSize){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(let y=0;y<H;y+=gridSize){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}

  // floor shadow under creature
  const cx=W/2,cy=H*0.42;
  const shadowR=50*creatureSize*1.2;
  const shadow=X.createRadialGradient(cx,cy+50*creatureSize*0.6,0,cx,cy+50*creatureSize*0.6,shadowR);
  shadow.addColorStop(0,'rgba(60,20,100,0.08)');
  shadow.addColorStop(1,'rgba(60,20,100,0)');
  X.fillStyle=shadow;
  X.fillRect(cx-shadowR,cy,shadowR*2,shadowR);
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    const a=p.life/p.maxLife;
    X.fillStyle='hsla('+p.hue+',60%,60%,'+a*0.5+')';
    X.fillRect(p.x,p.y,p.size*a,p.size*a);
  }
}

// ambient floating dust
let dust=[];
for(let i=0;i<25;i++){
  dust.push({x:Math.random()*2-1,y:Math.random()*2-1,speed:0.2+Math.random()*0.5,phase:Math.random()*Math.PI*2,size:0.5+Math.random()});
}

function updateDust(){
  for(const d of dust){
    const dx=W/2+d.x*W*0.4+Math.sin(t*0.001*d.speed+d.phase)*30;
    const dy=H*0.3+d.y*H*0.3+Math.cos(t*0.0015*d.speed+d.phase)*20;
    const a=0.04+Math.sin(t*0.002+d.phase)*0.02;
    X.fillStyle='rgba(140,100,255,'+a+')';
    X.fillRect(dx,dy,d.size,d.size);
  }
}

// === UPDATE ===
function update(){
  t++;

  // smooth size
  creatureSize+=(targetSize-creatureSize)*0.02;
  document.getElementById('size-val').textContent=creatureSize.toFixed(1);

  // mood timer
  if(moodTimer>0){moodTimer--;if(moodTimer<=0)mood='neutral';}

  // eye tracking — follow mouse or wander
  const inp=document.getElementById('feed-input');
  if(document.activeElement===inp){
    // look down at input
    eyeState.targetPX=0;
    eyeState.targetPY=0.8;
  } else {
    // slow wander
    eyeState.targetPX=Math.sin(t*0.005)*0.5;
    eyeState.targetPY=Math.cos(t*0.007)*0.3;
  }
  eyeState.pupilX+=(eyeState.targetPX-eyeState.pupilX)*0.05;
  eyeState.pupilY+=(eyeState.targetPY-eyeState.pupilY)*0.05;

  // blink
  if(Math.random()<0.005){eyeState.blink=1;}
  if(eyeState.blink>0)eyeState.blink=Math.max(0,eyeState.blink-0.08);

  // eye wideness based on mood
  const wideTarget=mood==='excited'?0.4:mood==='happy'?0.2:mood==='angry'?-0.2:0;
  eyeState.wide+=(wideTarget-eyeState.wide)*0.05;

  // mouth
  mouthOpen+=(targetMouth-mouthOpen)*0.06;
  if(moodTimer<=0)targetMouth=0.05+Math.sin(t*0.01)*0.03;

  // shake
  if(shakeAmount>0)shakeAmount*=0.92;

  // mood label
  if(t%120===0){
    const labels=MOOD_LABELS[mood]||MOOD_LABELS.neutral;
    document.getElementById('mood').textContent=labels[Math.floor(Math.random()*labels.length)];
  }
}

function loop(){
  update();
  drawBackground();
  X.save();
  if(shakeAmount>0.1){
    X.translate(Math.sin(t*0.5)*shakeAmount,Math.cos(t*0.7)*shakeAmount*0.5);
  }
  drawCreature();
  X.restore();
  updateParticles();
  updateDust();
  requestAnimationFrame(loop);
}
loop();

// mouse tracking for eyes
addEventListener('mousemove',e=>{
  const cx=W/2,cy=H*0.42;
  eyeState.targetPX=Math.max(-1,Math.min(1,(e.clientX-cx)/(W*0.3)));
  eyeState.targetPY=Math.max(-1,Math.min(1,(e.clientY-cy)/(H*0.3)));
});
</script>
</body>
</html>
