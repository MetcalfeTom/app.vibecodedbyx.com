<style>

body{background:#08060e;overflow:hidden;font-family:'Space Mono',monospace;color:#c8b0ff}
canvas{display:block;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}

#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;flex-direction:column;align-items:center;padding:16px;gap:8px}
#input-row{display:flex;gap:8px;width:100%;max-width:500px}

<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H;

resize();addEventListener('resize',resize);

// === AUDIO ENGINE ===
let audioCtx=null;
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}
function sfx(type){
  if(!audioCtx)return;
  const t0=audioCtx.currentTime;
  if(type==='nom'){
    // happy chomp — quick pitch bend down
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='square';o.frequency.setValueAtTime(400,t0);o.frequency.exponentialRampToValueAtTime(150,t0+0.08);
    g.gain.setValueAtTime(0.15,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.1);
    o.start(t0);o.stop(t0+0.1);
  } else if(type==='shrink'){
    // sad descending whine
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='sine';o.frequency.setValueAtTime(600,t0);o.frequency.exponentialRampToValueAtTime(100,t0+0.3);
    g.gain.setValueAtTime(0.1,t0);g.gain.linearRampToValueAtTime(0,t0+0.3);
    o.start(t0);o.stop(t0+0.3);
  } else if(type==='fart'){
    // filtered noise burst — flatulent!
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.3,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()-0.5);
    const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=buf;flt.type='lowpass';flt.frequency.setValueAtTime(200,t0);
    flt.frequency.exponentialRampToValueAtTime(80,t0+0.25);flt.Q.value=5;
    g.gain.setValueAtTime(0.2,t0);g.gain.linearRampToValueAtTime(0,t0+0.3);
    src.connect(flt);flt.connect(g);g.connect(audioCtx.destination);
    src.start(t0);src.stop(t0+0.3);
    // add a low rumble undertone
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.connect(g2);g2.connect(audioCtx.destination);
    o2.type='sawtooth';o2.frequency.setValueAtTime(60,t0);o2.frequency.exponentialRampToValueAtTime(35,t0+0.25);
    g2.gain.setValueAtTime(0.12,t0);g2.gain.linearRampToValueAtTime(0,t0+0.25);
    o2.start(t0);o2.stop(t0+0.25);
  } else if(type==='squelch'){
    // wet squelch — fast sweep with resonance
    const o=audioCtx.createOscillator(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    o.connect(flt);flt.connect(g);g.connect(audioCtx.destination);
    o.type='sawtooth';o.frequency.setValueAtTime(300,t0);o.frequency.exponentialRampToValueAtTime(60,t0+0.12);
    flt.type='bandpass';flt.frequency.setValueAtTime(800,t0);flt.frequency.exponentialRampToValueAtTime(200,t0+0.12);flt.Q.value=8;
    g.gain.setValueAtTime(0.18,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.15);
    o.start(t0);o.stop(t0+0.15);
    // pop at the start
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.connect(g2);g2.connect(audioCtx.destination);
    o2.type='sine';o2.frequency.setValueAtTime(500,t0);o2.frequency.exponentialRampToValueAtTime(100,t0+0.03);
    g2.gain.setValueAtTime(0.2,t0);g2.gain.exponentialRampToValueAtTime(0.001,t0+0.04);
    o2.start(t0);o2.stop(t0+0.04);
  } else if(type==='rumble'){
    // deep sustained rumble
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.6,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()-0.5);
    const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=buf;flt.type='lowpass';flt.frequency.value=100;flt.Q.value=3;
    g.gain.setValueAtTime(0.15,t0);g.gain.linearRampToValueAtTime(0,t0+0.6);
    src.connect(flt);flt.connect(g);g.connect(audioCtx.destination);
    src.start(t0);src.stop(t0+0.6);
    // sub bass
    const o=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o.connect(g2);g2.connect(audioCtx.destination);
    o.type='sine';o.frequency.setValueAtTime(40,t0);o.frequency.setValueAtTime(30,t0+0.3);
    g2.gain.setValueAtTime(0.15,t0);g2.gain.linearRampToValueAtTime(0,t0+0.6);
    o.start(t0);o.stop(t0+0.6);
  } else if(type==='explode'){
    // death explosion — noise burst + descending tone
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.8,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()-0.5);
    const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=buf;flt.type='lowpass';flt.frequency.setValueAtTime(3000,t0);
    flt.frequency.exponentialRampToValueAtTime(80,t0+0.6);
    g.gain.setValueAtTime(0.25,t0);g.gain.linearRampToValueAtTime(0,t0+0.8);
    src.connect(flt);flt.connect(g);g.connect(audioCtx.destination);
    src.start(t0);src.stop(t0+0.8);
    const o=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o.connect(g2);g2.connect(audioCtx.destination);
    o.type='sawtooth';o.frequency.setValueAtTime(300,t0);o.frequency.exponentialRampToValueAtTime(20,t0+0.7);
    g2.gain.setValueAtTime(0.2,t0);g2.gain.linearRampToValueAtTime(0,t0+0.7);
    o.start(t0);o.stop(t0+0.7);
  } else if(type==='quake'){
    // earthquake — long low rumble with cracking
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*1.2,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const env=1-i/d.length;
      d[i]=(Math.random()-0.5)*env;
    }
    const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=buf;flt.type='lowpass';flt.frequency.value=120;flt.Q.value=2;
    g.gain.setValueAtTime(0.2,t0);g.gain.linearRampToValueAtTime(0,t0+1.2);
    src.connect(flt);flt.connect(g);g.connect(audioCtx.destination);
    src.start(t0);src.stop(t0+1.2);
    // sub bass drone
    const o=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o.connect(g2);g2.connect(audioCtx.destination);
    o.type='sine';o.frequency.setValueAtTime(25,t0);
    g2.gain.setValueAtTime(0.2,t0);g2.gain.linearRampToValueAtTime(0,t0+1.5);
    o.start(t0);o.stop(t0+1.5);
  } else if(type==='clean'){
    // sparkly clean sound
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='sine';o.frequency.setValueAtTime(800,t0);o.frequency.exponentialRampToValueAtTime(1600,t0+0.1);
    g.gain.setValueAtTime(0.08,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.15);
    o.start(t0);o.stop(t0+0.15);
  } else if(type==='revive'){
    // ascending chime
    [400,600,800,1000].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);
      o.type='sine';o.frequency.value=f;
      const d=t0+i*0.1;
      g.gain.setValueAtTime(0,d);g.gain.linearRampToValueAtTime(0.1,d+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,d+0.2);
      o.start(d);o.stop(d+0.2);
    });
  }
}

const DICT=new Set(`a about above after again against all am an and any are as at be because been before being below between both but by can could did do does doing down during each few for from further get got had has have having he her here hers herself him himself his how i if in into is it its itself just know let like make me might more most much must my myself need no nor not now of off on once only or other our ours ourselves out over own point said same say she should so some still such take than that the their theirs them themselves then there these they this those through time to too two under until up us use very want was way we well were what when where which while who whom why will with would yes yet you your yours yourself yourselves
able about above accept across act add afraid after afternoon again ago agree air all almost along already also always am among an and angry animal answer any appear apple arm around arrive art as ask at away back bad bag ball banana bank base basket bath be bear beautiful because bed been before began begin behind believe below beside best better between big bird bit bite black blood blue board boat body bone book both bottom box boy brain brave bread break breakfast bring brother brown build burn bus business busy but buy by cake call came can car care careful carry cat catch chair change child children city class clean clear climb close clothes cloud coat cold come common computer cook cool copy correct could count country course cover cross cry cup cut dance danger dark daughter day dead dear deep did die different difficult dinner do doctor does dog door down draw dream dress drink drive drop dry during each ear early earth east eat egg eight either else empty end enemy enough even evening ever every example eye face fall family far fast fat father fear feed feel feet few fight fill find fine finger fire first fish five flat floor fly follow food foot for foreign forest forget fork four free fresh friend from front fruit full fun game garden gate get girl give glad glass go god gold gone good grass great green grew ground group grow gun hair half hand happen happy hard hat hate have he head hear heart heavy hello help her here high hill him his hit hold hole home hope horse hospital hot hotel house how hundred hungry hurry hurt husband ice idea if important in inside into iron is island it its join journey juice jump just keep key kill kind king kitchen knee knife knock know land large last late laugh lay lead learn leave left leg less lesson let lie life lift light like line lion lip list listen little live long look lose lot love low luck lunch machine make man many map mark market may me meal mean meet milk million mind minute miss mistake mix money month moon more morning most mother mountain mouth move much music must my name narrow near neck need never new news next nice night nine no noise none nor north nose not nothing now number of off often oh oil old on one only open or orange order other our out outside over own page pair pan paper park part past pay people perhaps period person pick piece place plan plant plate play please point poor postman pot pound power practice present pretty price print prize problem promise provide pull push put quarter queen question quick quiet quite radio rain raise ran reach read ready real really receive record red remember rest result rich ride right ring rise road room round rubber rule run sad safe sail salt same sat save say school seat second see seem self sell send sentence set seven shall shape she shine ship shirt shoe shoot short should show shut side since sing sister sit six size sleep small smell smile smoke so some son soon sorry sound speak special speed spend spoon stand star start station stay step still stone stop story street strong student study such sugar summer sun sure sweet swim table take talk tall tea teach tell ten test than thank that the their them then there these they thing think third this those though thousand three through throw tie time tired to today together tomorrow too top touch town train travel tree trouble true try turn twelve two type uncle under unit until up upon us use usual very visit voice wait walk wall want warm was wash watch water we wear weather week welcome well went were west western what wheel when where which white who whole whose why wide wife will win wind window winter wish with without woman wonder word work world worry would write wrong year yes yesterday you young zero`.split(/\s+/));

// add more tricky words that are valid
'the their there they them these those through thought though think thing three together tomorrow today always already another because before between could should would every everything everyone enough different difficult important interesting beautiful necessary possible probably remember something sometimes understand'.split(' ').forEach(w=>DICT.add(w));
'poop poo pee poopy pooping pooped peed peeing wee weewee peepee restaurant rhythm definitely separate receive believe necessary accommodate occurrence acquiesce mischievous supersede millennium pronunciation hierarchy bureaucracy conscientious idiosyncrasy onomatopoeia pharaoh chrysanthemum bougainvillea diphtheria fluorescent hemorrhage liaison vacuum weird foreign gauge seize cemetery privilege license environment government independent argument February Wednesday January February library secretary miniature temperature exaggerate recommend immediately occasionally unfortunately'.split(' ').forEach(w=>DICT.add(w.toLowerCase()));

function checkWord(w){
  const clean=w.toLowerCase().replace(/[^a-z'-]/g,'');
  if(clean.length<=1)return null; // skip single chars
  if(/^\d+$/.test(w))return null; // skip numbers
  return DICT.has(clean)?'good':'bad';
}

// === TOXIC DETECTION — Fuzz is sensitive! ===
const _tw=['fuck','shit','damn','hell','ass','bitch','bastard','crap','dick','piss',
  'cock','cunt','whore','slut','fag','retard','nigger','nigga','kill yourself','kys',
  'stfu','gtfo','die','hate you','stupid','idiot','moron','dumb','loser','trash',
  'suck','ugly','fat','shut up','screw you','prick','douche','wanker','twat','arse'];
// build a Set of roots for matching (also catches plurals, -ing, -ed, -er variants)
const TOXIC=new Set(_tw);
function isToxic(text){
  const lower=text.toLowerCase().replace(/[^a-z\s]/g,'');
  // check multi-word phrases first
  for(const tw of _tw){if(tw.includes(' ')&&lower.includes(tw))return tw;}
  // check individual words
  const words=lower.split(/\s+/);
  for(const w of words){
    if(TOXIC.has(w))return w;
    // strip common suffixes to catch variants
    for(const suf of ['s','ed','ing','er','ers','es']){
      if(w.endsWith(suf)&&TOXIC.has(w.slice(0,-suf.length)))return w;
    }
  }
  return null;
}

let fuzzDead=false;
let deathTimer=0;
let explosionParts=[];
const DEATH_MESSAGES=[
  'The toxicity was too much. Fuzz has exploded.',
  'Fuzz could not survive such language.',
  'You killed Fuzz with words. Are you happy?',
  'Fuzz was a gentle creature. Was.',
  'That word hit Fuzz right in the static.',
  'Fuzz has left the mortal plane.',
];

function killFuzz(word){
  if(fuzzDead)return;
  fuzzDead=true;deathTimer=0;
  mood='dead';
  shakeAmount=30;
  sfx('explode');

  // massive explosion particles from creature center
  const cx=W/2,cy=H*0.42;
  const baseR=50*creatureSize;
  for(let i=0;i<200;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*8;
    explosionParts.push({
      x:cx+(Math.random()-0.5)*baseR,
      y:cy+(Math.random()-0.5)*baseR*0.8,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-2,
      life:60+Math.random()*80,maxLife:140,
      hue:260+Math.random()*80,
      size:2+Math.random()*6,
      bright:0.5+Math.random()*0.5,
    });
  }

  // show death screen after brief delay
  document.getElementById('status').textContent='';
  document.getElementById('mood').textContent='';
  const msg=DEATH_MESSAGES[Math.floor(Math.random()*DEATH_MESSAGES.length)];
  document.getElementById('death-msg').innerHTML=msg+'<br><span class="death-word">'+word+'</span> was the fatal blow.';
  setTimeout(()=>{
    document.getElementById('death-overlay').style.display='flex';
  },1500);
}

function reviveFuzz(){
  fuzzDead=false;deathTimer=0;explosionParts=[];
  creatureSize=targetSize=Math.max(0.5,creatureSize*0.5);
  sfx('revive'); // lose half size as penalty
  mood='neutral';moodTimer=0;
  document.getElementById('death-overlay').style.display='none';
  document.getElementById('mood').textContent='FUZZ';
  document.getElementById('status').textContent='Fuzz has returned... smaller, but wiser.';
  saveState();
}
document.getElementById('revive-btn').addEventListener('click',reviveFuzz);

// === CREATURE STATE ===
let creatureSize=1; // 0.3 to 5.0
let targetSize=1;
let mood='neutral'; // neutral, happy, excited, sleepy, angry, dead
let moodTimer=0;
let eyeState={blink:0,pupilX:0,pupilY:0,targetPX:0,targetPY:0,wide:0};
let mouthOpen=0,targetMouth=0;
let shakeAmount=0;
let particles=[];
let staticNoise=[]; // pre-generated noise field
let t=0;
let totalFed=0,totalTypos=0,totalCorrect=0;

// restore
try{
  const d=JSON.parse(localStorage.getItem('tt-state'));
  if(d){creatureSize=targetSize=d.size||1;totalFed=d.fed||0;totalTypos=d.typos||0;totalCorrect=d.correct||0;}
}catch(e){}
function saveState(){
  try{localStorage.setItem('tt-state',JSON.stringify({size:creatureSize,fed:totalFed,typos:totalTypos,correct:totalCorrect}));}catch(e){}
}

// === POOP/PEE PILES ===
let piles=[]; // {x, y, type:'poop'|'pee', scale}
const POTTY_WORDS={poop:'poop',poopy:'poop',pooping:'poop',pooped:'poop',poo:'poop',
  pee:'pee',peeing:'pee',peed:'pee',peepee:'pee',wee:'pee',weewee:'pee'};

function checkPotty(text){
  const words=text.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/);
  const found=[];
  for(const w of words){if(POTTY_WORDS[w])found.push(POTTY_WORDS[w]);}
  return found;
}

let cascadeParts=[]; // falling waste particles for cascade effect
let cascadeActive=false;

function dropPile(type,ox,oy){
  sfx(type==='poop'?'fart':'squelch');
  const cx=W/2,cy=H*0.42;
  const baseR=50*creatureSize;
  piles.push({
    x:(ox!==undefined?ox:cx)+(Math.random()-0.5)*baseR*0.8,
    y:(oy!==undefined?oy:cy+baseR*0.6)+Math.random()*20,
    type,
    scale:0.6+creatureSize*0.2,
    age:0,
  });
  document.getElementById('clean-btn').style.display='block';

function updateEarthquake(){
  if(earthquakeTimer<=0)return;
  earthquakeTimer--;
  // sustained heavy shake with variation
  shakeAmount=20+Math.sin(t*0.15)*15+Math.sin(t*0.37)*10;
  // Fuzz tilts back and forth, losing balance
  quakeTilt=Math.sin(t*0.12)*0.15+Math.sin(t*0.31)*0.08+Math.cos(t*0.19)*0.05;

  // spawn extra debris over time
  if(t%6===0){
    quakeDebris.push({
      x:Math.random()*W,y:-10,
      vx:(Math.random()-0.5)*3,vy:1+Math.random()*2,
      size:1+Math.random()*4,rot:0,rotV:(Math.random()-0.5)*0.15,
      life:80+Math.random()*60,maxLife:140,
      gray:Math.floor(40+Math.random()*50),
    });
  }

  // wind down
  if(earthquakeTimer<=60)shakeAmount*=0.95;
  if(earthquakeTimer<=0){
    quakeTilt=0;quakeCracks=[];
    document.getElementById('ui').style.animation='';
    document.getElementById('mood').style.animation='';
    document.getElementById('size-bar').style.animation='';
    document.getElementById('status').textContent='The tremors subside... Fuzz is shaken.';
    mood='sleepy';moodTimer=180;
  }
}

function drawEarthquakeEffects(){
  // ground cracks
  if(quakeCracks.length){
    for(const crack of quakeCracks){
      X.strokeStyle='rgba(100,60,30,'+(0.2+Math.sin(t*0.1)*0.1)+')';
      X.lineWidth=1+Math.random();
      X.beginPath();
      X.moveTo(crack[0].x,crack[0].y);
      for(let i=1;i<crack.length;i++){
        X.lineTo(crack[i].x+Math.sin(t*0.2+i)*2,crack[i].y);
      }
      X.stroke();
      // orange glow in cracks
      X.strokeStyle='rgba(200,80,20,'+(0.08+Math.sin(t*0.08)*0.04)+')';
      X.lineWidth=0.5;
      X.stroke();
    }
  }
  // debris
  for(let i=quakeDebris.length-1;i>=0;i--){
    const d=quakeDebris[i];
    d.x+=d.vx;d.y+=d.vy;d.vy+=0.04;d.rot+=d.rotV;d.life--;
    if(d.life<=0||d.y>H+20){quakeDebris.splice(i,1);continue;}
    const a=Math.min(1,d.life/40)*0.6;

    X.rotate(d.rot);
    X.fillStyle='rgba('+d.gray+','+Math.floor(d.gray*0.7)+','+Math.floor(d.gray*0.5)+','+a+')';
    X.fillRect(-d.size/2,-d.size/2,d.size,d.size*0.7);
    X.restore();
  }
}

let cleanBot=null; // {x, y, targetIdx, state:'moving'|'scrubbing'|'done', scrubTimer}
let sparkles=[]; // cleaning sparkle particles

function startClean(){
  if(!piles.length||cleanBot)return;
  sfx('clean');
  cleanBot={x:0,y:H*0.6,targetIdx:0,state:'moving',scrubTimer:0};
  document.getElementById('status').textContent='CleanBot deployed!';
}
document.getElementById('clean-btn').addEventListener('click',startClean);

function updateCleanBot(){
  if(!cleanBot)return;
  const bot=cleanBot;

  if(bot.state==='done'||bot.targetIdx>=piles.length){
    // exit stage right
    bot.x+=3;
    if(bot.x>W+30){cleanBot=null;document.getElementById('clean-btn').style.display=piles.length?'block':'none';}
    return;
  }

  const target=piles[bot.targetIdx];
  const dx=target.x-bot.x,dy=target.y-bot.y;
  const dist=Math.sqrt(dx*dx+dy*dy);

  if(bot.state==='moving'){
    if(dist<10){
      bot.state='scrubbing';bot.scrubTimer=0;
    } else {
      bot.x+=dx/dist*3;bot.y+=dy/dist*3;
    }
  } else if(bot.state==='scrubbing'){
    bot.scrubTimer++;
    // wobble while scrubbing
    bot.x=target.x+Math.sin(bot.scrubTimer*0.3)*4;
    // sparkles
    if(bot.scrubTimer%4===0){
      sparkles.push({
        x:target.x+(Math.random()-0.5)*12,
        y:target.y+(Math.random()-0.5)*8,
        life:20+Math.random()*15,maxLife:35,
        size:1+Math.random()*2,
      });
    }
    if(bot.scrubTimer>50){
      // pile cleaned!
      sfx('clean');
      piles.splice(bot.targetIdx,1);
      bot.state='moving';
      // don't increment targetIdx since array shifted
      if(!piles.length){bot.state='done';document.getElementById('status').textContent='All clean! CleanBot exits.';}
    }
  }
}

function drawCleanBot(){
  if(!cleanBot)return;
  const bx=Math.floor(cleanBot.x),by=Math.floor(cleanBot.y);
  const wobble=cleanBot.state==='scrubbing'?Math.sin(t*0.3)*1:0;

  // body (small boxy robot)
  X.fillStyle='#3a6080';
  X.fillRect(bx-6,by-8+wobble,12,10);
  // head

  X.fillRect(bx-5,by-12+wobble,10,5);

  X.fillStyle='#0ff';
  X.fillRect(bx-3,by-11+wobble,2,2);
  X.fillRect(bx+2,by-11+wobble,2,2);
  // antenna
  X.fillStyle='#5a8aa0';
  X.fillRect(bx,by-15+wobble,1,4);
  X.fillStyle=t%20<10?'#0ff':'#0aa';
  X.fillRect(bx-1,by-16+wobble,2,2);
  // wheels
  X.fillStyle='#2a3a4a';
  X.fillRect(bx-7,by+1,4,3);
  X.fillRect(bx+3,by+1,4,3);
  // brush (when scrubbing)
  if(cleanBot.state==='scrubbing'){
    X.fillStyle='#8cf';
    const brushX=bx+Math.sin(t*0.5)*3;
    X.fillRect(brushX-4,by+3,8,2);
    for(let i=0;i<4;i++)X.fillRect(brushX-3+i*2,by+5,1,2);

  // sparkles

  }
}

// === FEED THE CREATURE ===
function feedText(text){
  if(fuzzDead)return;

  // check for toxic language FIRST
  const toxic=isToxic(text);
  if(toxic){killFuzz(toxic);return;}

  // STORMS — the nuclear options
  const lower=text.toLowerCase().replace(/[^a-z]/g,'');
  if(lower.includes('poopstorm')){triggerPoopstorm();return;}
  if(lower.includes('peestorm')){triggerPeestorm();return;}
  if(lower.includes('earthquake')){triggerEarthquake();return;}

  // check for potty words — Fuzz drops a pile (or a cascade)
  const potty=checkPotty(text);
  if(potty.length)triggerPotty(potty);

  const words=text.trim().split(/\s+/).filter(w=>w.length>0);
  if(!words.length)return;

  let typos=0,correct=0;
  const histEl=document.getElementById('history');

  for(const w of words){
    const result=checkWord(w);
    if(!result)continue; // skip non-words
    totalFed++;
    const div=document.createElement('div');
    div.className='hist-word '+result;
    if(result==='bad'){
      typos++;totalTypos++;sfx('nom');
      div.textContent='✗ '+w;
      // grow!
      targetSize=Math.min(6,targetSize+0.08+creatureSize*0.02);
      // excited particles
      for(let i=0;i<5;i++){
        particles.push({
          x:W/2+(Math.random()-0.5)*creatureSize*40,
          y:H*0.42+(Math.random()-0.5)*creatureSize*30,
          vx:(Math.random()-0.5)*3,vy:-1-Math.random()*3,
          life:40+Math.random()*30,maxLife:70,
          hue:280+Math.random()*60,size:2+Math.random()*4,
        });
      }
    } else {
      correct++;totalCorrect++;sfx('shrink');
      div.textContent='✓ '+w;
      // shrink!
      targetSize=Math.max(0.3,targetSize-0.05);
    }
    histEl.appendChild(div);
    if(histEl.children.length>15)histEl.firstChild.remove();
    setTimeout(()=>{if(div.parentNode)div.remove();},6000);
  }

  // set mood
  if(typos>correct){
    mood=typos>3?'excited':'happy';
    moodTimer=180;shakeAmount=typos*2;
    targetMouth=0.6+typos*0.1;
  } else if(correct>typos){
    mood=correct>3?'angry':'sleepy';
    moodTimer=180;
    targetMouth=0.1;
  } else {
    mood='neutral';moodTimer=120;
    targetMouth=0.3;
  }

  // status message
  const st=document.getElementById('status');
  if(typos>0&&correct===0)st.textContent='Fuzz devours '+typos+' misspelling'+(typos>1?'s':'')+'! *happy static noises*';
  else if(correct>0&&typos===0)st.textContent='Fuzz recoils from perfect grammar... shrinking...';
  else if(typos>correct)st.textContent='Fuzz ate '+typos+' typo'+(typos>1?'s':'')+' vs '+correct+' correct. Fuzz grows!';
  else if(correct>typos)st.textContent=correct+' correct words hurt Fuzz... it shrinks!';
  else st.textContent='balanced diet. Fuzz is confused.';

  saveState();
}

function drawCreature(){
  const cx=W/2,cy=H*0.42;
  const baseR=50*creatureSize;

  // === STATIC CLOUD BODY ===
  // Draw fuzzy static noise cloud
  for(const n of staticNoise){
    // position noise particles within an elliptical boundary
    const angle=Math.atan2(n.oy,n.ox);
    const maxDist=0.85+Math.sin(t*0.02*n.speed+n.phase)*0.15;
    if(n.dist>maxDist)continue;

    const wobble=Math.sin(t*0.03*n.speed+n.phase)*0.08;
    const nx=cx+n.ox*baseR*(1+wobble)+Math.sin(t*0.05+n.phase)*2;
    const ny=cy+n.oy*baseR*0.85*(1+wobble)+Math.cos(t*0.04+n.phase)*2;

    // flickering brightness
    const flicker=0.4+Math.sin(t*0.1*n.speed+n.phase*3)*0.3+Math.random()*0.3;
    const edgeFade=1-n.dist*0.7;
    const alpha=flicker*edgeFade*n.bright*0.35;

    // purple-ish static
    const hue=260+Math.sin(n.phase)*30+Math.sin(t*0.01)*10;
    const sat=30+n.dist*40;
    const lum=50+flicker*30;
    X.fillStyle='hsla('+hue+','+sat+'%,'+lum+'%,'+alpha+')';
    const s=n.size*(0.7+creatureSize*0.15);
    X.fillRect(Math.floor(nx),Math.floor(ny),Math.ceil(s),Math.ceil(s));
  }

  // outer glow
  const glow=X.createRadialGradient(cx,cy,baseR*0.3,cx,cy,baseR*1.3);
  glow.addColorStop(0,'rgba(140,80,255,'+0.04*creatureSize+')');
  glow.addColorStop(0.6,'rgba(140,80,255,'+0.02*creatureSize+')');
  glow.addColorStop(1,'rgba(140,80,255,0)');
  X.fillStyle=glow;
  X.fillRect(cx-baseR*1.5,cy-baseR*1.5,baseR*3,baseR*3);

  // === BIG EYES ===
  const eyeSpacing=baseR*0.35;
  const eyeY=cy-baseR*0.1;
  const eyeR=baseR*0.22;
  const blink=eyeState.blink;

  for(let side=-1;side<=1;side+=2){
    const ex=cx+side*eyeSpacing;
    const ey=eyeY;

    // eye white (slightly blue-tinted)
    X.fillStyle='rgba(220,210,255,0.9)';
    X.beginPath();
    if(blink>0.5){
      // squished during blink
      const squish=1-((blink-0.5)*2);
      X.ellipse(ex,ey,eyeR,eyeR*Math.max(0.05,squish),0,0,Math.PI*2);
    } else {
      const wide=1+eyeState.wide*0.2;
      X.ellipse(ex,ey,eyeR,eyeR*wide,0,0,Math.PI*2);
    }
    X.fill();

    // eye outline
    X.strokeStyle='rgba(80,40,140,0.6)';
    X.lineWidth=1.5;
    X.stroke();

    if(blink<0.5){
      // pupil
      const pupilR=eyeR*0.5;
      const px=ex+eyeState.pupilX*eyeR*0.3;
      const py=ey+eyeState.pupilY*eyeR*0.25;
      X.fillStyle='#1a0030';
      X.beginPath();X.arc(px,py,pupilR,0,Math.PI*2);X.fill();

      // pupil highlight
      X.fillStyle='rgba(200,180,255,0.8)';
      X.beginPath();X.arc(px-pupilR*0.3,py-pupilR*0.3,pupilR*0.25,0,Math.PI*2);X.fill();

      // iris ring
      X.strokeStyle='hsla('+(260+Math.sin(t*0.01)*20)+',70%,50%,0.4)';
      X.lineWidth=1;
      X.beginPath();X.arc(px,py,pupilR*0.8,0,Math.PI*2);X.stroke();

      // angry eyebrow when shrinking
      if(mood==='angry'||mood==='sleepy'){
        X.strokeStyle='rgba(140,60,200,0.5)';
        X.lineWidth=eyeR*0.15;
        X.beginPath();
        const browY=ey-eyeR*1.2;
        if(mood==='angry'){
          X.moveTo(ex-eyeR*0.8,browY+side*eyeR*0.3);
          X.lineTo(ex+eyeR*0.8,browY-side*eyeR*0.1);
        } else {
          X.moveTo(ex-eyeR*0.8,browY-eyeR*0.1);
          X.lineTo(ex+eyeR*0.8,browY-eyeR*0.1);
        }
        X.stroke();
      }
    }
  }

  // === MOUTH ===
  const mouthY=cy+baseR*0.25;
  const mouthW=baseR*0.3;
  const mOpen=mouthOpen*baseR*0.2;

  if(mOpen>1){
    // open mouth
    X.fillStyle='rgba(40,0,60,0.8)';
    X.beginPath();
    X.ellipse(cx,mouthY,mouthW,mOpen,0,0,Math.PI*2);
    X.fill();
    // inner glow
    X.fillStyle='hsla(280,60%,30%,0.4)';
    X.beginPath();
    X.ellipse(cx,mouthY,mouthW*0.5,mOpen*0.5,0,0,Math.PI*2);
    X.fill();
  } else {
    // closed — small line
    X.strokeStyle='rgba(100,50,160,0.4)';
    X.lineWidth=1.5;
    X.beginPath();
    if(mood==='happy'||mood==='excited'){
      // smile
      X.arc(cx,mouthY-baseR*0.05,mouthW*0.6,0.1,Math.PI-0.1);
    } else if(mood==='angry'){
      // frown
      X.arc(cx,mouthY+baseR*0.15,mouthW*0.6,Math.PI+0.1,Math.PI*2-0.1);
    } else {
      // neutral line
      X.moveTo(cx-mouthW*0.4,mouthY);X.lineTo(cx+mouthW*0.4,mouthY);
    }
    X.stroke();
  }

  // === TINY ARMS (when big enough) ===
  if(creatureSize>1.5){
    const armLen=baseR*0.3;
    for(let side=-1;side<=1;side+=2){
      const ax=cx+side*baseR*0.7;
      const ay=cy+baseR*0.15;
      const wave=Math.sin(t*0.03+side)*0.3;
      X.strokeStyle='rgba(140,80,255,0.2)';
      X.lineWidth=2+creatureSize*0.5;
      X.beginPath();
      X.moveTo(ax,ay);
      X.quadraticCurveTo(ax+side*armLen*0.5,ay+armLen*0.3+wave*10,ax+side*armLen,ay+Math.sin(t*0.05+side*2)*armLen*0.3);
      X.stroke();
      // tiny hand
      X.fillStyle='rgba(160,100,255,0.15)';
      X.beginPath();
      X.arc(ax+side*armLen,ay+Math.sin(t*0.05+side*2)*armLen*0.3,3+creatureSize,0,Math.PI*2);
      X.fill();
    }
  }

  // === NAME TAG ===
  const nameY=cy+baseR*0.85;
  X.font='700 '+Math.max(10,Math.floor(12+creatureSize*2))+'px "Anybody"';
  X.textAlign='center';
  X.fillStyle='rgba(140,100,255,'+(0.08+creatureSize*0.02)+')';
  X.fillText('FUZZ',cx,nameY);
}

function drawBackground(){
  X.fillStyle='#08060e';
  X.fillRect(0,0,W,H);

  // subtle grid
  X.strokeStyle='rgba(140,100,255,0.015)';
  X.lineWidth=0.5;
  const gridSize=60;
  for(let x=0;x<W;x+=gridSize){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(let y=0;y<H;y+=gridSize){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}

  // floor shadow under creature
  const cx=W/2,cy=H*0.42;
  const shadowR=50*creatureSize*1.2;
  const shadow=X.createRadialGradient(cx,cy+50*creatureSize*0.6,0,cx,cy+50*creatureSize*0.6,shadowR);
  shadow.addColorStop(0,'rgba(60,20,100,0.08)');
  shadow.addColorStop(1,'rgba(60,20,100,0)');
  X.fillStyle=shadow;
  X.fillRect(cx-shadowR,cy,shadowR*2,shadowR);
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    const a=p.life/p.maxLife;
    X.fillStyle='hsla('+p.hue+',60%,60%,'+a*0.5+')';
    X.fillRect(p.x,p.y,p.size*a,p.size*a);
  }
}

// ambient floating dust
let dust=[];
for(let i=0;i<25;i++){
  dust.push({x:Math.random()*2-1,y:Math.random()*2-1,speed:0.2+Math.random()*0.5,phase:Math.random()*Math.PI*2,size:0.5+Math.random()});
}

function updateDust(){
  for(const d of dust){
    const dx=W/2+d.x*W*0.4+Math.sin(t*0.001*d.speed+d.phase)*30;
    const dy=H*0.3+d.y*H*0.3+Math.cos(t*0.0015*d.speed+d.phase)*20;
    const a=0.04+Math.sin(t*0.002+d.phase)*0.02;
    X.fillStyle='rgba(140,100,255,'+a+')';
    X.fillRect(dx,dy,d.size,d.size);
  }
}

// === UPDATE ===
function update(){
  t++;

  // smooth size
  creatureSize+=(targetSize-creatureSize)*0.02;
  document.getElementById('size-val').textContent=creatureSize.toFixed(1);

  // mood timer
  if(moodTimer>0){moodTimer--;if(moodTimer<=0)mood='neutral';}

  // eye tracking — follow mouse or wander
  const inp=document.getElementById('feed-input');
  if(document.activeElement===inp){
    // look down at input
    eyeState.targetPX=0;
    eyeState.targetPY=0.8;
  } else {
    // slow wander
    eyeState.targetPX=Math.sin(t*0.005)*0.5;
    eyeState.targetPY=Math.cos(t*0.007)*0.3;
  }
  eyeState.pupilX+=(eyeState.targetPX-eyeState.pupilX)*0.05;
  eyeState.pupilY+=(eyeState.targetPY-eyeState.pupilY)*0.05;

  // blink
  if(Math.random()<0.005){eyeState.blink=1;}
  if(eyeState.blink>0)eyeState.blink=Math.max(0,eyeState.blink-0.08);

  // eye wideness based on mood
  const wideTarget=mood==='excited'?0.4:mood==='happy'?0.2:mood==='angry'?-0.2:0;
  eyeState.wide+=(wideTarget-eyeState.wide)*0.05;

  // mouth
  mouthOpen+=(targetMouth-mouthOpen)*0.06;
  if(moodTimer<=0)targetMouth=0.05+Math.sin(t*0.01)*0.03;

  // shake (earthquake overrides normal decay)
  if(earthquakeTimer>0)updateEarthquake();
  else if(shakeAmount>0)shakeAmount*=0.92;

  // mood label
  if(t%120===0){
    const labels=MOOD_LABELS[mood]||MOOD_LABELS.neutral;
    document.getElementById('mood').textContent=labels[Math.floor(Math.random()*labels.length)];
  }
}

function updateExplosion(){
  for(let i=explosionParts.length-1;i>=0;i--){
    const p=explosionParts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.vx*=0.98;p.life--;
    if(p.life<=0){explosionParts.splice(i,1);continue;}
    const a=(p.life/p.maxLife)*p.bright;
    const flicker=0.5+Math.random()*0.5;
    X.fillStyle='hsla('+p.hue+',60%,'+Math.floor(40+flicker*30)+'%,'+a*0.6+')';
    const s=p.size*(p.life/p.maxLife);
    X.fillRect(Math.floor(p.x),Math.floor(p.y),Math.ceil(s),Math.ceil(s));
  }
}

function loop(){
  update();
  drawBackground();
  drawPiles();
  updateCascade();
  updateCleanBot();
  drawCleanBot();
  drawEarthquakeEffects();
  if(!fuzzDead){
    X.save();
    if(shakeAmount>0.1){
      X.translate(Math.sin(t*0.5)*shakeAmount,Math.cos(t*0.7)*shakeAmount*0.5);
    }
    if(quakeTilt){
      X.translate(W/2,H*0.42);
      X.rotate(quakeTilt);
      X.translate(-W/2,-H*0.42);
    }
    drawCreature();
    X.restore();
  }
  updateExplosion();
  updateParticles();
  updateDust();
  requestAnimationFrame(loop);
}
loop();

// mouse tracking for eyes
addEventListener('mousemove',e=>{
  const cx=W/2,cy=H*0.42;
  eyeState.targetPX=Math.max(-1,Math.min(1,(e.clientX-cx)/(W*0.3)));
  eyeState.targetPY=Math.max(-1,Math.min(1,(e.clientY-cy)/(H*0.3)));
});
</script>
