<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Gravity Type — chat falls as heavy blocks</title>
<meta name="description" content="A physics-based word-pile simulation. Every chat message becomes a heavy block. Watch the pile grow.">
<meta property="og:title" content="Gravity Type">
<meta property="og:description" content="A physics-based word-pile simulation. Every chat message becomes a heavy block. Watch the pile grow.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/gravity-type/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/3d%20rendering%20heavy%20wooden%20text%20blocks%20stacked%20chaotically%20physics%20simulation%20dramatic%20lighting%20cinema%20centered?width=1200&height=630&model=flux&nologo=true&seed=88811">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%A6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=IBM+Plex+Mono:wght@400;500;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0a0710; --jet:#150f1f;
  --paper:#fcf6e8;
  --pink:#ff5dc8; --cyan:#5cf0ff; --gold:#ffd770; --violet:#a06bff; --jade:#82e6a4;
  --shadow: rgba(0,0,0,0.55);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:var(--void);color:var(--paper);font-family:'Outfit',sans-serif}
body{
  background:
    radial-gradient(80vmin 70vmin at 50% 10%, rgba(255,93,200,0.12), transparent 65%),
    radial-gradient(60vmin 60vmin at 20% 90%, rgba(92,240,255,0.10), transparent 65%),
    linear-gradient(180deg, #1a1029 0%, #0a0710 100%);
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:50;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.13) 0 1px, transparent 1px 3px);
  mix-blend-mode: multiply;
}
body::after{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:51;
  background: radial-gradient(120vmin 120vmin at 50% 50%, transparent 55%, rgba(0,0,0,0.6) 100%);
}

#stage{
  position:fixed; inset:0; z-index:1;
  display:block; cursor: pointer;
}

.hud{
  position:fixed; top:1rem; left:1rem; z-index:11;
  display:flex; flex-direction:column; gap:.3rem;
  pointer-events:none;
}
.hud .eyebrow{
  font-family:'IBM Plex Mono', monospace; font-size:.65rem;
  letter-spacing:.4em; color: rgba(252,246,232,0.5);
  text-transform:uppercase;
}
.hud h1{
  margin:0;
  font-family:'Bungee', cursive; font-weight:400;
  font-size: clamp(1.6rem, 4vw, 2.4rem); line-height:1;
  background: linear-gradient(90deg, var(--gold), var(--pink), var(--cyan), var(--gold));
  background-size: 250% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  animation: shimmer 6s linear infinite;
  letter-spacing: .02em;
}
@keyframes shimmer{ 0%{background-position:0 0} 100%{background-position:200% 0} }

.stats{
  position:fixed; top:1rem; right:1rem; z-index:11;
  font-family:'IBM Plex Mono', monospace; font-size:.7rem;
  letter-spacing:.18em; text-transform:uppercase;
  color: rgba(252,246,232,0.6);
  background: rgba(15,10,30,0.65);
  border: 1px solid rgba(255,255,255,0.10);
  padding: .5rem .75rem;
  display: flex; flex-direction:column; gap:.2rem;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  pointer-events:none;
}
.stats b{ color: var(--paper); font-family:'Bungee', cursive; font-size:.9rem; letter-spacing:.05em; }
.stats .dot{
  display:inline-block; width:.45em; height:.45em; border-radius:50%;
  background:#777; margin-right:.3em; vertical-align: middle;
}
.stats .dot.live{ background: var(--jade); box-shadow: 0 0 6px var(--jade);
  animation: blink 1.6s steps(2,end) infinite; }
.stats .dot.err{ background: var(--pink); }
@keyframes blink { 0% { opacity:1 } 50% { opacity:.3 } }

.dock{
  position:fixed; bottom:1rem; left:50%; transform:translateX(-50%);
  z-index:11; display:flex; gap:.4rem;
  background: rgba(15,10,30,0.7);
  border: 1px solid rgba(255,255,255,0.16);
  padding: .4rem;
  border-radius: 14px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  flex-wrap: wrap; justify-content:center;
  max-width: calc(100vw - 1.5rem);
}
.dock input[type=text]{
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.18);
  color: var(--paper);
  font-family:'IBM Plex Mono', monospace; font-size:.78rem;
  padding:.55rem .7rem;
  border-radius: 8px;
  outline:none;
  min-width: 160px;
}
.dock input[type=text]::placeholder{ color: rgba(252,246,232,0.4); }
.dock input[type=text]:focus{ border-color: var(--cyan); }
.btn{
  appearance:none; background: transparent;
  border:1px solid rgba(255,255,255,0.25);
  color: var(--paper);
  font-family:'IBM Plex Mono', monospace; font-size:.7rem;
  font-weight:700; letter-spacing:.2em; text-transform:uppercase;
  padding: .55rem .8rem;
  border-radius: 8px;
  cursor: pointer;
  min-height: 44px;
}
.btn:hover{ background:rgba(255,93,200,0.16); border-color: var(--pink); }
.btn:active{ transform: translateY(1px); }
.btn[aria-pressed="true"]{ background: rgba(255,215,112,0.18); color: var(--gold); border-color: var(--gold); }
.btn.shake{ color: var(--pink); border-color: rgba(255,93,200,0.4); }
.btn.shake:hover{ background: rgba(255,93,200,0.16); }
.btn.clear{ color: var(--cyan); border-color: rgba(92,240,255,0.4); }
.btn.clear:hover{ background: rgba(92,240,255,0.16); }

.feed{
  position:fixed; bottom: 5.2rem; left:1rem; z-index:10;
  display:flex; flex-direction:column-reverse; gap:.25rem;
  pointer-events:none;
  max-width: min(320px, 60vw);
}
.feed .ln{
  background: rgba(15,10,30,0.55);
  border-left: 2px solid rgba(255,255,255,0.4);
  padding: .25rem .55rem;
  font-family:'IBM Plex Mono', monospace; font-size:.7rem;
  color: rgba(252,246,232,0.75);
  opacity:0;
  animation: feedIn 4.5s forwards;
}
.feed .ln b{ color: var(--gold); margin-right:.3em; font-weight:700; }
@keyframes feedIn{
  0%{ opacity:0; transform: translateX(-6px); }
  6%{ opacity:1; transform: translateX(0); }
  90%{ opacity:.9; }
  100%{ opacity:0; transform: translateX(0); }
}

@media (max-width: 600px){
  .feed{ max-width: 50vw; font-size:.65rem; }
  .dock input[type=text]{ min-width: 110px; }
}
@media (prefers-reduced-motion: reduce){
  .hud h1{ animation: none; }
}
</style>
</head>
<body>
<canvas id="stage" role="application" aria-label="Physics word pile. Chat messages fall as heavy 3D blocks and stack at the bottom."></canvas>

<header class="hud">
  <div class="eyebrow">▒ physics · word pile · 3D blocks</div>
  <h1>GRAVITY TYPE</h1>
</header>

<div class="stats" role="status" aria-live="polite">
  <div><span class="dot" id="tw-dot"></span><span id="tw-state">idle</span></div>
  <div>blocks · <b id="m-blocks">0</b></div>
  <div>chat · <b id="m-msgs">0</b></div>
</div>

<div class="feed" id="feed" aria-hidden="true"></div>

<nav class="dock" aria-label="Controls">
  <input type="text" id="tw-ch" maxlength="25" placeholder="twitch channel" autocomplete="off" aria-label="Twitch channel name">
  <button class="btn" type="button" id="tw-conn" aria-pressed="false">Connect</button>
  <button class="btn" type="button" id="btn-demo">+ Drop test</button>
  <button class="btn shake" type="button" id="btn-shake">⌖ Shake pile</button>
  <button class="btn clear" type="button" id="btn-clear">↺ Clear</button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script>
(function(){
  const { Engine, World, Bodies, Body, Composite, Common } = Matter;

  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0;
  let DPR = Math.min(window.devicePixelRatio || 1, 2);

  function fit(){
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  fit();
  window.addEventListener('resize', () => { fit(); resetWalls(); });

  // --- engine ---
  const engine = Engine.create();
  engine.world.gravity.y = 1.4;      // heavier than default 1.0 — these blocks feel weighty
  engine.timing.timeScale = 1.0;

  // ground + walls (recreated on resize)
  let walls = [];
  function resetWalls(){
    if (walls.length) World.remove(engine.world, walls);
    const t = 200;
    walls = [
      Bodies.rectangle(W / 2, H + t / 2 - 8, W * 2, t, { isStatic: true, label: 'ground' }),
      Bodies.rectangle(-t/2, H/2, t, H * 2,  { isStatic: true, label: 'wallL' }),
      Bodies.rectangle(W + t/2, H/2, t, H * 2, { isStatic: true, label: 'wallR' }),
    ];
    World.add(engine.world, walls);
  }
  resetWalls();

  // --- block state ---
  const BLOCK_PALETTE = [
    { fill:'#ffd770', side:'#a4862f', text:'#1a0e06' },   // gold
    { fill:'#ff5dc8', side:'#8a2570', text:'#26031a' },   // pink
    { fill:'#5cf0ff', side:'#1a8aa8', text:'#02212a' },   // cyan
    { fill:'#a06bff', side:'#4a2a8a', text:'#100422' },   // violet
    { fill:'#82e6a4', side:'#2a8a4a', text:'#02220c' },   // jade
    { fill:'#ff8a5a', side:'#a0421a', text:'#220a02' },   // ember
    { fill:'#fcf6e8', side:'#988a72', text:'#1a0e06' },   // bone
  ];
  function fnv1a(s){
    let h = 2166136261 >>> 0;
    for (let i = 0; i < s.length; i++){
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }
  function colorFor(name){
    const h = fnv1a((name || 'anon').toLowerCase());
    return BLOCK_PALETTE[h % BLOCK_PALETTE.length];
  }

  // measure text width on a probe canvas
  const probe = document.createElement('canvas').getContext('2d');
  function measureText(text, size){
    probe.font = `700 ${size}px 'Bungee', cursive`;
    return probe.measureText(text).width;
  }

  const blocks = [];     // [{body, text, user, palette, size}]
  let blockCount = 0;
  let msgCount = 0;
  const $blocks = document.getElementById('m-blocks');
  const $msgs   = document.getElementById('m-msgs');

  // soft cap so the world doesn't choke; oldest fall through floor on overflow
  const BLOCK_CAP = 110;

  function makeBlock(text, user){
    // sanitize
    text = String(text || '').replace(/\s+/g, ' ').trim().slice(0, 80);
    if (!text) return;
    // size + density scale gently with text length so very long messages
    // become heavy slabs you can see fall
    const fontSize = Math.max(14, Math.min(28, 26 - text.length * 0.12));
    const padX = 16, padY = 12;
    const textW = measureText(text, fontSize);
    const w = Math.max(56, Math.min(360, textW + padX * 2));
    const h = Math.max(38, Math.min(72, fontSize * 1.7 + padY));
    // spawn position: random near top, biased slightly toward center
    const x = W * 0.18 + Math.random() * W * 0.64;
    const y = -h - 20;
    const pal = colorFor(user);
    // matter body
    const body = Bodies.rectangle(x, y, w, h, {
      restitution: 0.08,    // low bounce — these are heavy
      friction: 0.6,
      frictionStatic: 0.8,
      density: 0.0028 + Math.min(0.0035, text.length * 0.00006),
      angle: (Math.random() - 0.5) * 0.6,
      angularVelocity: (Math.random() - 0.5) * 0.04,
    });
    Body.setVelocity(body, { x: (Math.random() - 0.5) * 2.4, y: 1.6 + Math.random() * 1.5 });
    body.gtRender = { text, user, palette: pal, w, h, fontSize };
    World.add(engine.world, body);
    blocks.push(body);
    blockCount++;
    $blocks.textContent = blocks.length;
    msgCount++;
    $msgs.textContent = msgCount;
    // trim oldest if past cap
    while (blocks.length > BLOCK_CAP){
      const old = blocks.shift();
      World.remove(engine.world, old);
    }
    // also drop any body that has fallen >2000px below floor (overflow)
  }

  // --- main loop ---
  let lastT = performance.now();
  function frame(now){
    const dt = Math.min(40, now - lastT);
    lastT = now;
    Engine.update(engine, dt);

    // clean blocks that fell off the world
    for (let i = blocks.length - 1; i >= 0; i--){
      const b = blocks[i];
      if (b.position.y > H + 2200){
        World.remove(engine.world, b);
        blocks.splice(i, 1);
      }
    }

    // render
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    for (const b of blocks) drawBlock(b);
    drawForegroundFog();
    $blocks.textContent = blocks.length;

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  function drawBackground(){
    // floor strip
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(0, H - 4, W, 4);
    // ground shadow line
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, H - 4, W, 1);
  }
  function drawForegroundFog(){
    // light gradient fog at the top to hide block-spawn pop-in
    const g = ctx.createLinearGradient(0, 0, 0, 80);
    g.addColorStop(0, 'rgba(10,7,16,0.95)');
    g.addColorStop(1, 'rgba(10,7,16,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, 80);
  }

  // Draw one block with a pseudo-3D extrusion.
  // Approach: render the block at its physics angle, draw the top face
  // and right face as parallelograms offset by a fixed (dx, dy) so every
  // block reads as having the same overhead/right-side light direction.
  // Text is on the front face only.
  function drawBlock(body){
    const r = body.gtRender;
    if (!r) return;
    const { text, palette, w, h, fontSize } = r;
    const x = body.position.x, y = body.position.y;
    const ang = body.angle;
    // 3D-ish extrusion: depth in pixels along world axes (NOT block axes)
    const dx = 8, dy = 8;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(ang);

    // soft drop shadow (in world axes — undo rotation for the shadow)
    ctx.save();
    ctx.rotate(-ang);
    ctx.fillStyle = 'rgba(0,0,0,0.32)';
    ctx.beginPath();
    ctx.ellipse(dx, dy + h * 0.45, w * 0.52, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // back/side faces — we approximate by drawing a darker parallelogram
    // offset from the front face along world (dx, dy). Easiest: undo
    // rotation, draw side-strip rects at offset, redo rotation. Visually
    // approximate but reads as 3D.
    ctx.save();
    ctx.rotate(-ang);
    // re-apply rotation around current local origin to get the corners
    // of the rotated rectangle in world coords
    const cosA = Math.cos(ang), sinA = Math.sin(ang);
    const corners = [
      { x: -w/2, y: -h/2 },
      { x:  w/2, y: -h/2 },
      { x:  w/2, y:  h/2 },
      { x: -w/2, y:  h/2 },
    ].map(p => ({
      x: cosA * p.x - sinA * p.y,
      y: sinA * p.x + cosA * p.y,
    }));
    // side face (right): polygon from top-right → bottom-right → bottom-right+offset → top-right+offset
    ctx.fillStyle = palette.side;
    ctx.beginPath();
    ctx.moveTo(corners[1].x, corners[1].y);
    ctx.lineTo(corners[2].x, corners[2].y);
    ctx.lineTo(corners[2].x + dx, corners[2].y + dy);
    ctx.lineTo(corners[1].x + dx, corners[1].y + dy);
    ctx.closePath(); ctx.fill();
    // bottom face
    ctx.fillStyle = palette.side;
    ctx.beginPath();
    ctx.moveTo(corners[2].x, corners[2].y);
    ctx.lineTo(corners[3].x, corners[3].y);
    ctx.lineTo(corners[3].x + dx, corners[3].y + dy);
    ctx.lineTo(corners[2].x + dx, corners[2].y + dy);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // front face (rotated frame)
    ctx.fillStyle = palette.fill;
    ctx.beginPath();
    roundRect(ctx, -w/2, -h/2, w, h, 4);
    ctx.fill();
    // inner top highlight stripe
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(-w/2 + 2, -h/2 + 2, w - 4, 2);
    // 1-px outline
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    roundRect(ctx, -w/2 + 0.5, -h/2 + 0.5, w - 1, h - 1, 4);
    ctx.stroke();

    // text
    ctx.fillStyle = palette.text;
    ctx.font = `700 ${fontSize}px 'Bungee', cursive`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 0, 1);

    ctx.restore();
  }
  function roundRect(ctx, x, y, w, h, r){
    if (r > w / 2) r = w / 2;
    if (r > h / 2) r = h / 2;
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
  }

  // --- input + controls ---
  // Demo: click canvas drops a random word; demo button drops one too.
  const DEMO_WORDS = [
    'hello', 'gravity', 'sloppy', 'chat', 'block', 'oh no', 'beautiful',
    'physics', 'down!', 'word pile', 'one more', 'top of the heap',
    'pancake', 'incoming', 'sloppy.live', 'this is fine', 'pile up',
    'engineering', 'weighty', '~tilt~', 'matter.js', 'falling', 'kpi'
  ];
  function randomMessage(){
    const w = DEMO_WORDS[Math.floor(Math.random() * DEMO_WORDS.length)];
    const u = 'demo_' + Math.floor(Math.random() * 999);
    addMessage(w, u);
  }
  function addMessage(text, user){
    makeBlock(text, user);
    // feed line
    const feed = document.getElementById('feed');
    const ln = document.createElement('div');
    ln.className = 'ln';
    ln.innerHTML = `<b>${escapeHTML(user)}:</b> ${escapeHTML(text)}`;
    feed.appendChild(ln);
    while (feed.children.length > 6) feed.removeChild(feed.firstChild);
    setTimeout(() => { if (ln.parentNode) ln.parentNode.removeChild(ln); }, 4600);
  }
  function escapeHTML(s){
    return String(s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
  }

  canvas.addEventListener('click', randomMessage);
  document.getElementById('btn-demo').addEventListener('click', randomMessage);
  document.getElementById('btn-shake').addEventListener('click', () => {
    for (const b of blocks){
      const fx = (Math.random() - 0.5) * 0.15;
      const fy = - (Math.random() * 0.08 + 0.05);
      Body.applyForce(b, b.position, { x: fx * b.mass, y: fy * b.mass });
      Body.setAngularVelocity(b, b.angularVelocity + (Math.random() - 0.5) * 0.3);
    }
  });
  document.getElementById('btn-clear').addEventListener('click', () => {
    for (const b of blocks) World.remove(engine.world, b);
    blocks.length = 0;
    $blocks.textContent = 0;
  });

  // --- twitch IRC (anonymous) ---
  let twWS = null, twChannel = '', twAlive = false, twReconnT = null;
  const $twDot = document.getElementById('tw-dot');
  const $twState = document.getElementById('tw-state');
  const $twBtn = document.getElementById('tw-conn');
  const $twCh = document.getElementById('tw-ch');
  function twSet(state, mode){
    $twState.textContent = state;
    $twDot.classList.remove('live', 'err');
    if (mode) $twDot.classList.add(mode);
  }
  function twConn(){
    if (twAlive){ twDisc(); return; }
    const ch = $twCh.value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
    if (!ch){ twSet('type a channel', 'err'); return; }
    twChannel = ch;
    twSet('connecting…');
    try { twWS = new WebSocket('wss://irc-ws.chat.twitch.tv:443'); }
    catch(e){ twSet('socket blocked', 'err'); return; }
    twWS.onopen = () => {
      twWS.send('PASS SCHMOOPIIE');
      twWS.send('NICK justinfan' + Math.floor(10000 + Math.random() * 89999));
      twWS.send('JOIN #' + ch);
      twAlive = true;
      twSet('live · #' + ch, 'live');
      $twBtn.textContent = 'Disconnect';
      $twBtn.setAttribute('aria-pressed', 'true');
      try { localStorage.setItem('gravity-type-ch', ch); } catch(_){}
    };
    twWS.onmessage = ev => {
      if (!ev.data) return;
      const lines = ev.data.split('\r\n');
      for (const line of lines){
        if (!line) continue;
        if (line.startsWith('PING')) { try { twWS.send('PONG' + line.slice(4)); } catch(_){} continue; }
        const pm = line.indexOf(' PRIVMSG ');
        if (pm > 0){
          const us = line.indexOf(':') + 1, ue = line.indexOf('!');
          if (ue < 0 || ue > pm) continue;
          const user = line.slice(us, ue);
          const mst = line.indexOf(' :', pm);
          if (mst < 0) continue;
          const msg = line.slice(mst + 2);
          addMessage(msg, user);
        }
      }
    };
    twWS.onerror = () => twSet('connection error', 'err');
    twWS.onclose = () => {
      if (twAlive){
        twSet('reconnecting…');
        twReconnT = setTimeout(() => twConn(), 3500);
      } else {
        twSet('disconnected');
      }
      twAlive = false;
    };
  }
  function twDisc(){
    twAlive = false;
    if (twWS){ try { twWS.close(); } catch(_){} twWS = null; }
    if (twReconnT){ clearTimeout(twReconnT); twReconnT = null; }
    $twBtn.textContent = 'Connect';
    $twBtn.setAttribute('aria-pressed', 'false');
    twSet('idle');
  }
  $twBtn.addEventListener('click', twConn);
  $twCh.addEventListener('keydown', e => { if (e.key === 'Enter') twConn(); });
  try {
    const saved = localStorage.getItem('gravity-type-ch');
    if (saved) $twCh.value = saved;
  } catch(_){}
})();
</script>
</body>
</html>
