<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Stone Cat Garden</title>
  <meta name="description" content="A massive stone cat watches over a midnight zen garden. Rake glowing neon lines through the sand. Make the cat purr.">
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%97%BF">
  <meta property="og:title" content="Stone Cat Garden">
  <meta property="og:description" content="A massive stone cat watches over a midnight zen garden. Rake glowing neon lines through the sand.">
  <meta property="og:url" content="https://sloppy.live/neon-zen-cat">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/giant%20ancient%20stone%20cat%20statue%20with%20glowing%20cyan%20eyes%20sitting%20in%20a%20midnight%20zen%20garden%2C%20glowing%20neon%20raked%20sand%20patterns%2C%20deep%20indigo%20void%2C%20synthwave%20temple?width=1200&height=630&model=flux&nologo=true&seed=神">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Major+Mono+Display&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

  <style>
    :root {
      --void:  #050216;
      --void-deep: #02000a;
      --neon-cyan: #3effc9;
      --neon-cyan-deep: #1da785;
      --neon-magenta: #ff5dc4;
      --neon-amber: #ffd066;
      --stone-cool: #2a2530;
      --stone-warm: #5a4f55;
      --sand-deep: #3a2e1c;
      --ink: #f1e8d0;
      --ink-soft: rgba(241, 232, 208, 0.55);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; font-size: 100%; }
    body {
      margin: 0;
      background: var(--void-deep);
      color: var(--ink);
      font-family: 'Shippori Mincho', serif;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    main {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* ============ HEADER ============ */
    header {
      padding: 0.85rem 1.1rem 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 5;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .kanji {
      font-family: 'Shippori Mincho', serif;
      font-weight: 700;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--neon-cyan);
      text-shadow: 0 0 10px rgba(62, 255, 201, 0.65), 0 0 24px rgba(62, 255, 201, 0.35);
      line-height: 1;
    }
    h1 {
      font-family: 'Major Mono Display', monospace;
      font-weight: 400;
      font-size: clamp(0.95rem, 2vw, 1.4rem);
      letter-spacing: 0.12em;
      margin: 0;
      color: var(--ink);
      text-transform: lowercase;
    }
    h1 em {
      font-style: normal;
      color: var(--neon-magenta);
    }
    .tag {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.85rem, 1.7vw, 1.05rem);
      color: var(--ink-soft);
      letter-spacing: 0.03em;
    }
    .stats {
      font-family: 'Major Mono Display', monospace;
      font-size: 0.7rem;
      color: var(--ink-soft);
      letter-spacing: 0.06em;
      display: flex;
      gap: 0.9rem;
      flex-wrap: wrap;
    }
    .stats strong {
      color: var(--neon-cyan);
      font-weight: 400;
      text-shadow: 0 0 6px rgba(62, 255, 201, 0.4);
    }

    /* ============ STAGE ============ */
    .stage {
      position: relative;
      margin: 0 0.6rem;
      overflow: hidden;
      background: var(--void-deep);
      border: 1px solid rgba(62, 255, 201, 0.18);
      box-shadow:
        0 0 40px rgba(62, 255, 201, 0.08) inset,
        0 0 80px rgba(255, 93, 196, 0.05) inset,
        0 8px 30px rgba(0, 0, 0, 0.5);
      border-radius: 6px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }
    /* Ambient corner glow + subtle vignette */
    .stage::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 30% 100%, rgba(62, 255, 201, 0.08) 0, transparent 45%),
        radial-gradient(ellipse at 70% 100%, rgba(255, 93, 196, 0.06) 0, transparent 45%),
        radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.55) 100%);
      z-index: 2;
    }
    .stage-label {
      position: absolute;
      top: 14px;
      left: 18px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--ink-soft);
      z-index: 3;
      pointer-events: none;
      letter-spacing: 0.02em;
    }
    .stage-koan {
      position: absolute;
      top: 14px;
      right: 18px;
      max-width: 18rem;
      text-align: right;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--ink-soft);
      z-index: 3;
      pointer-events: none;
      transition: opacity 1.2s ease;
      letter-spacing: 0.01em;
      line-height: 1.35;
    }
    .stage-koan.fade { opacity: 0; }
    .stage-hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Major Mono Display', monospace;
      font-size: 0.7rem;
      color: var(--neon-cyan);
      background: rgba(2, 0, 10, 0.65);
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(62, 255, 201, 0.3);
      z-index: 3;
      pointer-events: none;
      transition: opacity 0.6s ease;
      text-align: center;
      text-shadow: 0 0 6px rgba(62, 255, 201, 0.4);
    }
    .stage-hint.fade { opacity: 0; }

    /* ============ CONTROLS ============ */
    .controls {
      padding: 0.6rem 1.1rem 0.9rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.55rem;
      background: rgba(62, 255, 201, 0.04);
      border: 1px solid rgba(62, 255, 201, 0.18);
      border-radius: 6px;
    }
    .group-label {
      font-family: 'Major Mono Display', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      color: var(--ink-soft);
      margin-right: 0.2rem;
    }
    button {
      font-family: 'Major Mono Display', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 0.4rem 0.7rem;
      min-height: 2.75rem;
      min-width: 2.75rem;
      border: 1px solid rgba(62, 255, 201, 0.4);
      background: transparent;
      color: var(--neon-cyan);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: lowercase;
      text-shadow: 0 0 4px rgba(62, 255, 201, 0.4);
    }
    button:hover {
      background: rgba(62, 255, 201, 0.1);
      box-shadow: 0 0 10px rgba(62, 255, 201, 0.25);
    }
    button:active { transform: translate(1px, 1px); }
    button:focus-visible {
      outline: 2px solid var(--neon-magenta);
      outline-offset: 2px;
    }
    button[aria-pressed="true"] {
      background: var(--neon-cyan);
      color: var(--void-deep);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(62, 255, 201, 0.6);
      text-shadow: none;
    }
    button.danger {
      color: var(--neon-magenta);
      border-color: rgba(255, 93, 196, 0.4);
      text-shadow: 0 0 4px rgba(255, 93, 196, 0.4);
    }
    button.danger:hover {
      background: rgba(255, 93, 196, 0.12);
      box-shadow: 0 0 10px rgba(255, 93, 196, 0.3);
    }

    .swatch-row { display: flex; gap: 0.3rem; }
    .swatch {
      width: 1.6rem;
      height: 1.6rem;
      min-width: 0;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      box-shadow: 0 0 8px currentColor;
      transition: transform 0.12s;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch[aria-pressed="true"] {
      transform: scale(1.25);
      box-shadow: 0 0 12px currentColor, 0 0 0 2px var(--void), 0 0 0 3px currentColor;
    }
    .swatch.cyan    { background: #3effc9; color: #3effc9; }
    .swatch.magenta { background: #ff5dc4; color: #ff5dc4; }
    .swatch.amber   { background: #ffd066; color: #ffd066; }
    .swatch.violet  { background: #a26dff; color: #a26dff; }
    .swatch.crimson { background: #ff5d6c; color: #ff5d6c; }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0);
      white-space: nowrap; border: 0;
    }

    @media (max-width: 640px) {
      header { padding: 0.55rem 0.7rem 0.35rem; }
      .stats { font-size: 0.62rem; gap: 0.6rem; }
      .stage { margin: 0 0.3rem; border-radius: 4px; }
      .stage-koan { max-width: 11rem; font-size: 0.75rem; top: 10px; right: 12px; }
      .stage-label { top: 10px; left: 12px; font-size: 0.75rem; }
      .controls { padding: 0.45rem 0.6rem 0.7rem; gap: 0.4rem; }
      .group { padding: 0.25rem 0.4rem; }
      button { font-size: 0.7rem; padding: 0.3rem 0.5rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      .stage-koan { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand">
        <span class="kanji" aria-hidden="true">神猫</span>
        <div>
          <h1>stone cat <em>·</em> garden</h1>
          <div class="tag">a quiet beast watches the sand glow</div>
        </div>
      </div>
      <div class="stats" role="status" aria-live="polite" aria-atomic="true">
        <div>strokes <strong id="stat-strokes">0</strong></div>
        <div>stones <strong id="stat-stones">0</strong></div>
        <div>purr <strong id="stat-purr">0%</strong></div>
      </div>
    </header>

    <section class="stage" aria-label="Zen garden canvas">
      <span class="stage-label">midnight garden · sample 神</span>
      <p class="stage-koan" id="koan">the cat does not move. the sand remembers everything.</p>
      <canvas id="canvas" role="application" aria-label="Zen garden. Drag to rake glowing neon lines in the sand. Click to place stones. The cat watches."></canvas>
      <div class="stage-hint" id="hint">drag to rake · click to place a stone · the cat is listening</div>
    </section>

    <nav class="controls" aria-label="Garden controls">
      <div class="group" role="group" aria-label="Tool selection">
        <span class="group-label">tool</span>
        <button type="button" data-tool="rake" aria-pressed="true" title="Rake (1)">⟂ rake</button>
        <button type="button" data-tool="stone" aria-pressed="false" title="Place stone (2)">◌ stone</button>
        <button type="button" data-tool="erase" aria-pressed="false" title="Erase (3)">⌫ smooth</button>
      </div>

      <div class="group" role="group" aria-label="Rake color">
        <span class="group-label">glow</span>
        <div class="swatch-row" id="swatches">
          <button type="button" class="swatch cyan"    data-color="#3effc9" aria-pressed="true"  aria-label="Cyan glow"></button>
          <button type="button" class="swatch magenta" data-color="#ff5dc4" aria-pressed="false" aria-label="Magenta glow"></button>
          <button type="button" class="swatch amber"   data-color="#ffd066" aria-pressed="false" aria-label="Amber glow"></button>
          <button type="button" class="swatch violet"  data-color="#a26dff" aria-pressed="false" aria-label="Violet glow"></button>
          <button type="button" class="swatch crimson" data-color="#ff5d6c" aria-pressed="false" aria-label="Crimson glow"></button>
        </div>
      </div>

      <div class="group" role="group" aria-label="Actions">
        <span class="group-label">do</span>
        <button type="button" id="btn-smooth" class="danger" title="Smooth the sand (clear rake lines)">✕ smooth all</button>
        <button type="button" id="btn-stones" class="danger" title="Remove all stones">✕ clear stones</button>
        <button type="button" id="btn-blink" title="Make the cat blink">◑ blink</button>
        <button type="button" id="btn-pet" title="Pet the cat (it purrs)">♥ pet</button>
      </div>
    </nav>
  </main>

  <p class="sr-only" id="sr-status" aria-live="polite"></p>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // Setup
    // ============================================================
    const stage = document.querySelector('.stage');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    const statStrokes = document.getElementById('stat-strokes');
    const statStones = document.getElementById('stat-stones');
    const statPurr = document.getElementById('stat-purr');
    const koanEl = document.getElementById('koan');
    const hintEl = document.getElementById('hint');

    let DPR = Math.min(window.devicePixelRatio || 1, 2);
    let W = 0, H = 0;
    function resize() {
      const r = stage.getBoundingClientRect();
      W = Math.max(320, r.width);
      H = Math.max(280, r.height);
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      computeCatGeometry();
    }
    window.addEventListener('resize', resize, { passive: true });

    // ============================================================
    // State
    // ============================================================
    let tool = 'rake';
    let rakeColor = '#3effc9';
    let purr = 0; // 0..1 — how much the cat is waking up
    let strokeCount = 0;

    // Rake strokes: list of polylines, each with color + per-segment alpha
    // Each tine is its own line; we store the centerline + 5 offset tines.
    const strokes = []; // {color, points:[{x,y,t}], dies}
    let currentStroke = null;

    // Stones (small rocks that influence rake lines + physically obstruct)
    const stones = []; // {x, y, r, shape: array of vertex offsets}

    // Background particles (slow drifting motes for atmosphere)
    const motes = [];
    for (let i = 0; i < 60; i++) {
      motes.push({
        x: Math.random(),
        y: Math.random(),
        r: 0.4 + Math.random() * 1.4,
        vx: (Math.random() - 0.5) * 0.0001,
        vy: -(0.00005 + Math.random() * 0.0001),
        hue: Math.random() < 0.6 ? 165 : (Math.random() < 0.5 ? 320 : 50),
        phase: Math.random() * Math.PI * 2
      });
    }

    // Stars (subtle backdrop)
    const stars = [];
    for (let i = 0; i < 110; i++) {
      stars.push({
        x: Math.random(),
        y: Math.random() * 0.55,
        r: 0.4 + Math.random() * 0.9,
        twinkle: Math.random() * Math.PI * 2,
        speed: 0.6 + Math.random() * 1.4
      });
    }

    // ============================================================
    // Cat geometry — sphinx pose. All coords in fractions of W,H so it resizes.
    // ============================================================
    let cat = null;
    function computeCatGeometry() {
      const cx = W * 0.5;
      const baseY = H * 0.82;          // ground line (where sand meets statue base)
      const scale = Math.min(W * 0.85, H * 1.15);
      cat = {
        cx,
        baseY,
        scale,
        bodyW: scale * 0.50,
        bodyH: scale * 0.32,
        headW: scale * 0.22,
        headH: scale * 0.20,
        eyeR: scale * 0.022,
        // eye positions (relative to head center, computed later)
      };
    }

    // ============================================================
    // Draw pipeline
    // ============================================================
    function clear() {
      ctx.clearRect(0, 0, W, H);
      // base void background gradient
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#0a0218');
      g.addColorStop(0.55, '#0a0218');
      g.addColorStop(1, '#02000a');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    function drawStars(now) {
      for (const s of stars) {
        const a = 0.25 + (Math.sin(now / 1000 * s.speed + s.twinkle) * 0.5 + 0.5) * 0.55;
        ctx.fillStyle = `rgba(241,232,208,${a.toFixed(3)})`;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawMotes(now) {
      for (const m of motes) {
        m.x += m.vx;
        m.y += m.vy;
        if (m.y < -0.05) { m.y = 1.05; m.x = Math.random(); }
        if (m.x < -0.05) m.x = 1.05; else if (m.x > 1.05) m.x = -0.05;
        const tw = 0.4 + Math.sin(now / 600 + m.phase) * 0.3;
        ctx.save();
        ctx.shadowBlur = 12;
        ctx.shadowColor = `hsl(${m.hue}, 100%, 60%)`;
        ctx.fillStyle = `hsla(${m.hue}, 95%, 65%, ${tw.toFixed(3)})`;
        ctx.beginPath();
        ctx.arc(m.x * W, m.y * H, m.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawSand() {
      // The sand area: bottom 50% of canvas, slightly trapezoidal (perspective)
      const top = H * 0.50;
      const grad = ctx.createLinearGradient(0, top, 0, H);
      grad.addColorStop(0, 'rgba(58, 46, 28, 0.5)');
      grad.addColorStop(0.5, 'rgba(74, 58, 36, 0.75)');
      grad.addColorStop(1, 'rgba(40, 28, 14, 0.95)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, top);
      ctx.lineTo(W, top);
      ctx.lineTo(W, H);
      ctx.lineTo(0, H);
      ctx.closePath();
      ctx.fill();
      // subtle grain (fixed offset noise simulated with sparse dots)
      ctx.save();
      ctx.globalAlpha = 0.15;
      for (let i = 0; i < 110; i++) {
        const sx = (sandSeed(i, 0) % 1) * W;
        const sy = top + (sandSeed(i, 1) % 1) * (H - top);
        ctx.fillStyle = sandSeed(i, 2) > 0.5 ? '#d8c293' : '#1a0e02';
        ctx.fillRect(sx, sy, 1, 1);
      }
      ctx.restore();
    }
    function sandSeed(i, k) {
      // deterministic pseudo-random (so grain doesn't shimmer per-frame)
      const s = Math.sin((i * 911 + k * 137) * 0.7321) * 43758.5453;
      return Math.abs(s - Math.floor(s));
    }

    // ============================================================
    // Stone cat statue draw
    // ============================================================
    function drawCat(now) {
      if (!cat) return;
      const { cx, baseY, scale, bodyW, bodyH, headW, headH, eyeR } = cat;

      // CAT SHADOW on the sand
      ctx.save();
      ctx.translate(cx, baseY + scale * 0.045);
      ctx.scale(1.2, 0.18);
      const sg = ctx.createRadialGradient(0, 0, 4, 0, 0, bodyW * 0.7);
      sg.addColorStop(0, 'rgba(0,0,0,0.55)');
      sg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(0, 0, bodyW * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Cat aura (warms slowly with purr level)
      if (purr > 0.05) {
        ctx.save();
        const auraR = scale * (0.5 + purr * 0.3);
        const ag = ctx.createRadialGradient(cx, baseY - scale * 0.18, auraR * 0.1, cx, baseY - scale * 0.18, auraR);
        const hue = 165 + purr * 20;
        ag.addColorStop(0, `hsla(${hue}, 100%, 55%, ${(0.10 + purr * 0.18).toFixed(3)})`);
        ag.addColorStop(1, `hsla(${hue}, 100%, 55%, 0)`);
        ctx.fillStyle = ag;
        ctx.fillRect(cx - auraR, baseY - scale * 0.18 - auraR, auraR * 2, auraR * 2);
        ctx.restore();
      }

      // ----- BODY (sitting/sphinx pose) -----
      // The body is a rough rounded trapezoid (wider at bottom)
      const bodyTop = baseY - bodyH;
      ctx.save();
      const bodyGrad = ctx.createLinearGradient(cx, bodyTop, cx, baseY);
      bodyGrad.addColorStop(0, '#48424f');
      bodyGrad.addColorStop(0.5, '#36303a');
      bodyGrad.addColorStop(1, '#1a1620');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      // body: rounded trapezoid
      ctx.moveTo(cx - bodyW * 0.42, bodyTop + bodyH * 0.18);
      ctx.quadraticCurveTo(cx - bodyW * 0.55, bodyTop, cx - bodyW * 0.30, bodyTop - bodyH * 0.04);
      ctx.lineTo(cx + bodyW * 0.30, bodyTop - bodyH * 0.04);
      ctx.quadraticCurveTo(cx + bodyW * 0.55, bodyTop, cx + bodyW * 0.42, bodyTop + bodyH * 0.18);
      // sides down to base
      ctx.lineTo(cx + bodyW * 0.50, baseY);
      ctx.lineTo(cx - bodyW * 0.50, baseY);
      ctx.closePath();
      ctx.fill();
      // top highlight
      ctx.strokeStyle = 'rgba(110, 100, 120, 0.35)';
      ctx.lineWidth = 1.6;
      ctx.stroke();
      // crack lines (procedural-fixed)
      ctx.strokeStyle = 'rgba(15, 10, 22, 0.55)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx - bodyW * 0.25, bodyTop + bodyH * 0.18);
      ctx.lineTo(cx - bodyW * 0.18, bodyTop + bodyH * 0.65);
      ctx.lineTo(cx - bodyW * 0.10, baseY - bodyH * 0.10);
      ctx.moveTo(cx + bodyW * 0.18, bodyTop + bodyH * 0.30);
      ctx.lineTo(cx + bodyW * 0.22, bodyTop + bodyH * 0.85);
      ctx.stroke();
      ctx.restore();

      // ----- PAWS (two front paws extending forward) -----
      const pawW = bodyW * 0.18;
      const pawH = bodyH * 0.28;
      const pawY = baseY - pawH;
      for (const side of [-1, 1]) {
        const pcx = cx + side * bodyW * 0.27;
        ctx.save();
        const pg = ctx.createLinearGradient(pcx, pawY, pcx, baseY);
        pg.addColorStop(0, '#3a3340');
        pg.addColorStop(1, '#1a1620');
        ctx.fillStyle = pg;
        ctx.beginPath();
        ctx.moveTo(pcx - pawW * 0.5, baseY);
        ctx.quadraticCurveTo(pcx - pawW * 0.55, pawY + pawH * 0.2, pcx - pawW * 0.4, pawY);
        ctx.lineTo(pcx + pawW * 0.4, pawY);
        ctx.quadraticCurveTo(pcx + pawW * 0.55, pawY + pawH * 0.2, pcx + pawW * 0.5, baseY);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = 'rgba(100, 90, 110, 0.3)';
        ctx.lineWidth = 1.2;
        ctx.stroke();
        // toe dividers
        ctx.strokeStyle = 'rgba(15, 10, 22, 0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pcx - pawW * 0.18, baseY - pawH * 0.5);
        ctx.lineTo(pcx - pawW * 0.18, baseY);
        ctx.moveTo(pcx + pawW * 0.18, baseY - pawH * 0.5);
        ctx.lineTo(pcx + pawW * 0.18, baseY);
        ctx.stroke();
        ctx.restore();
      }

      // ----- HEAD -----
      const headCy = bodyTop - headH * 0.05;
      const headTop = headCy - headH * 0.5;
      ctx.save();
      const headGrad = ctx.createLinearGradient(cx, headTop, cx, headTop + headH);
      headGrad.addColorStop(0, '#52495a');
      headGrad.addColorStop(0.55, '#3a3340');
      headGrad.addColorStop(1, '#221d28');
      ctx.fillStyle = headGrad;
      ctx.beginPath();
      // head: pentagonal cat-head outline
      ctx.moveTo(cx - headW * 0.55, headCy + headH * 0.35);
      ctx.lineTo(cx - headW * 0.5,  headCy - headH * 0.05);
      // left ear
      ctx.lineTo(cx - headW * 0.42, headCy - headH * 0.32);
      ctx.lineTo(cx - headW * 0.20, headCy - headH * 0.10);
      // top center notch
      ctx.lineTo(cx,                 headCy - headH * 0.05);
      ctx.lineTo(cx + headW * 0.20, headCy - headH * 0.10);
      // right ear
      ctx.lineTo(cx + headW * 0.42, headCy - headH * 0.32);
      ctx.lineTo(cx + headW * 0.5,  headCy - headH * 0.05);
      ctx.lineTo(cx + headW * 0.55, headCy + headH * 0.35);
      // jaw
      ctx.quadraticCurveTo(cx, headCy + headH * 0.55, cx - headW * 0.55, headCy + headH * 0.35);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(120, 105, 130, 0.4)';
      ctx.lineWidth = 1.6;
      ctx.stroke();
      // inner ear shadows
      ctx.fillStyle = 'rgba(15, 10, 22, 0.5)';
      ctx.beginPath();
      ctx.moveTo(cx - headW * 0.39, headCy - headH * 0.28);
      ctx.lineTo(cx - headW * 0.27, headCy - headH * 0.11);
      ctx.lineTo(cx - headW * 0.42, headCy - headH * 0.10);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + headW * 0.39, headCy - headH * 0.28);
      ctx.lineTo(cx + headW * 0.27, headCy - headH * 0.11);
      ctx.lineTo(cx + headW * 0.42, headCy - headH * 0.10);
      ctx.closePath(); ctx.fill();
      // crack lines on face
      ctx.strokeStyle = 'rgba(15, 10, 22, 0.5)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(cx - headW * 0.15, headCy - headH * 0.02);
      ctx.lineTo(cx - headW * 0.05, headCy + headH * 0.30);
      ctx.moveTo(cx + headW * 0.20, headCy + headH * 0.08);
      ctx.lineTo(cx + headW * 0.05, headCy + headH * 0.42);
      ctx.stroke();
      ctx.restore();

      // ----- EYES -----
      const eyeOffX = headW * 0.18;
      const eyeY = headCy + headH * 0.02;

      // Cursor tracking + blink
      let lookX = 0, lookY = 0;
      if (lastPointer.active && cat) {
        const dx = lastPointer.x - cx;
        const dy = lastPointer.y - (headCy);
        const d = Math.hypot(dx, dy) + 0.001;
        lookX = (dx / d) * eyeR * 0.55;
        lookY = (dy / d) * eyeR * 0.45;
      }
      const blinkPhase = (now - blinkStart) / blinkDuration;
      const blink = blinkPhase < 1 ? Math.max(0, 1 - Math.abs(blinkPhase - 0.5) * 4) : 0;
      const eyeOpen = 1 - blink;

      for (const side of [-1, 1]) {
        const ex = cx + side * eyeOffX;
        // eye socket (deep shadow)
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.95)';
        ctx.beginPath();
        ctx.ellipse(ex, eyeY, eyeR * 1.6, eyeR * 1.2 * eyeOpen + 0.5, 0, 0, Math.PI * 2);
        ctx.fill();

        if (eyeOpen > 0.05) {
          // iris glow color shifts with purr
          const hue = purr > 0.5 ? 165 + (purr - 0.5) * 80 : 180;
          const sat = 100;
          const lit = 60;
          ctx.shadowBlur = 16 + purr * 18;
          ctx.shadowColor = `hsl(${hue}, ${sat}%, ${lit}%)`;
          ctx.fillStyle = `hsl(${hue}, ${sat}%, ${lit}%)`;
          ctx.beginPath();
          ctx.ellipse(ex + lookX, eyeY + lookY, eyeR * 0.95, eyeR * 1.05 * eyeOpen, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          // pupil (vertical slit)
          ctx.fillStyle = 'rgba(0,0,0,0.95)';
          ctx.beginPath();
          ctx.ellipse(ex + lookX, eyeY + lookY, eyeR * 0.18, eyeR * 0.85 * eyeOpen, 0, 0, Math.PI * 2);
          ctx.fill();
          // bright sparkle
          ctx.fillStyle = 'rgba(255, 255, 220, 0.85)';
          ctx.beginPath();
          ctx.arc(ex + lookX - eyeR * 0.35, eyeY + lookY - eyeR * 0.35, eyeR * 0.22, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      // ----- NOSE + MOUTH (subtle) -----
      ctx.save();
      ctx.fillStyle = 'rgba(15, 10, 22, 0.7)';
      const noseY = eyeY + headH * 0.22;
      ctx.beginPath();
      ctx.moveTo(cx - headW * 0.045, noseY);
      ctx.lineTo(cx + headW * 0.045, noseY);
      ctx.lineTo(cx,                 noseY + headH * 0.045);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(15, 10, 22, 0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx, noseY + headH * 0.045);
      ctx.quadraticCurveTo(cx - headW * 0.05, noseY + headH * 0.11, cx - headW * 0.07, noseY + headH * 0.08);
      ctx.moveTo(cx, noseY + headH * 0.045);
      ctx.quadraticCurveTo(cx + headW * 0.05, noseY + headH * 0.11, cx + headW * 0.07, noseY + headH * 0.08);
      ctx.stroke();
      // whiskers (very subtle)
      ctx.globalAlpha = 0.25;
      ctx.beginPath();
      for (const side of [-1, 1]) {
        for (let i = 0; i < 3; i++) {
          const sy = noseY + (i - 1) * 4;
          ctx.moveTo(cx + side * headW * 0.06, sy);
          ctx.lineTo(cx + side * headW * (0.32 + i * 0.04), sy + (i - 1) * 3);
        }
      }
      ctx.stroke();
      ctx.restore();

      // ----- BASE / pedestal sliver where statue meets sand -----
      ctx.save();
      const pg = ctx.createLinearGradient(0, baseY - 4, 0, baseY + 6);
      pg.addColorStop(0, 'rgba(80,70,90,0.5)');
      pg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = pg;
      ctx.fillRect(cx - bodyW * 0.55, baseY - 4, bodyW * 1.1, 10);
      ctx.restore();
    }

    // ============================================================
    // Stones
    // ============================================================
    function drawStones() {
      for (const s of stones) {
        ctx.save();
        // shadow
        ctx.translate(s.x, s.y + s.r * 0.4);
        ctx.scale(1.1, 0.3);
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.beginPath();
        ctx.arc(0, 0, s.r * 1.05, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        // body
        ctx.save();
        ctx.translate(s.x, s.y);
        const g = ctx.createRadialGradient(-s.r * 0.3, -s.r * 0.4, s.r * 0.05, 0, 0, s.r * 1.05);
        g.addColorStop(0, '#7a6f80');
        g.addColorStop(0.55, '#3e3744');
        g.addColorStop(1, '#1e1a24');
        ctx.fillStyle = g;
        ctx.beginPath();
        for (let i = 0; i < s.shape.length; i++) {
          const v = s.shape[i];
          const a = (i / s.shape.length) * Math.PI * 2;
          const r = s.r * (0.85 + v);
          const x = Math.cos(a) * r;
          const y = Math.sin(a) * r * 0.85;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = 'rgba(120,105,135,0.35)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
      }
    }

    // ============================================================
    // Rake strokes
    // ============================================================
    function drawStrokes(now) {
      // Each stroke = a center-line polyline with 5 tine offsets. Lines glow.
      const tines = 5;
      const spacing = 5; // px between tines, perpendicular to direction
      for (let s = 0; s < strokes.length; s++) {
        const stroke = strokes[s];
        if (stroke.points.length < 2) continue;
        // age-based alpha (newer = stronger glow)
        const ageS = (now - stroke.bornAt) / 1000;
        const baseAlpha = Math.min(1, 0.55 + Math.sin(now / 700 + s) * 0.05);
        const fade = Math.max(0.45, 1 - ageS * 0.005); // very slow fade

        for (let t = 0; t < tines; t++) {
          const offset = (t - (tines - 1) / 2) * spacing;
          ctx.save();
          ctx.beginPath();
          for (let i = 0; i < stroke.points.length; i++) {
            const p = stroke.points[i];
            // compute perpendicular at this segment
            const prev = stroke.points[Math.max(0, i - 1)];
            const next = stroke.points[Math.min(stroke.points.length - 1, i + 1)];
            const dx = next.x - prev.x;
            const dy = next.y - prev.y;
            const d = Math.hypot(dx, dy) || 1;
            const px = -dy / d, py = dx / d;
            const x = p.x + px * offset;
            const y = p.y + py * offset;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          // outer glow (wider, low alpha)
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.strokeStyle = stroke.color;
          ctx.globalAlpha = baseAlpha * 0.35 * fade;
          ctx.shadowBlur = 14;
          ctx.shadowColor = stroke.color;
          ctx.lineWidth = 4;
          ctx.stroke();
          // inner crisp line
          ctx.globalAlpha = baseAlpha * 0.95 * fade;
          ctx.shadowBlur = 0;
          ctx.lineWidth = 1.4;
          ctx.strokeStyle = lightenColor(stroke.color, 0.4);
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    function lightenColor(hex, amt) {
      // hex like "#3effc9"
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      const lr = Math.min(255, r + (255 - r) * amt);
      const lg = Math.min(255, g + (255 - g) * amt);
      const lb = Math.min(255, b + (255 - b) * amt);
      return `rgb(${lr | 0},${lg | 0},${lb | 0})`;
    }

    // ============================================================
    // Loop
    // ============================================================
    let blinkStart = -9999;
    const blinkDuration = 280;
    let lastPointer = { x: 0, y: 0, active: false };

    function loop(now) {
      clear();
      drawStars(now);
      drawSand();
      drawStrokes(now);
      drawStones();
      drawCat(now);
      drawMotes(now);

      // purr smoothly approaches a target based on rake density + recent strokes
      // active strokes pull purr UP; stones add a small bonus; no activity decays it slowly.
      let activity = 0;
      const cutoff = now - 8000;
      for (const s of strokes) if (s.bornAt > cutoff) activity++;
      const targetPurr = Math.min(1, activity / 12 + stones.length / 60);
      purr += (targetPurr - purr) * 0.02;
      if (purr < 0) purr = 0;
      if (purr > 1) purr = 1;
      statPurr.textContent = Math.round(purr * 100) + '%';

      // auto-blink occasionally
      if (now - blinkStart > 4500 + Math.random() * 2500 && Math.random() < 0.012) {
        blinkStart = now;
      }

      requestAnimationFrame(loop);
    }

    // ============================================================
    // Stone helpers
    // ============================================================
    function makeStone(x, y) {
      const r = 10 + Math.random() * 14;
      const verts = 8 + (Math.random() * 4 | 0);
      const shape = [];
      for (let i = 0; i < verts; i++) shape.push((Math.random() - 0.5) * 0.4);
      stones.push({ x, y, r, shape });
      statStones.textContent = stones.length;
    }

    // Hit-test stone (returns index or -1)
    function stoneAt(x, y) {
      for (let i = stones.length - 1; i >= 0; i--) {
        const s = stones[i];
        if (Math.hypot(x - s.x, y - s.y) <= s.r + 4) return i;
      }
      return -1;
    }

    // Adjust a rake point to be pushed out of stones (curve around them)
    function adjustForStones(x, y) {
      for (const s of stones) {
        const dx = x - s.x;
        const dy = y - s.y;
        const d = Math.hypot(dx, dy);
        const buf = s.r + 4;
        if (d < buf && d > 0.001) {
          const push = (buf - d) / d;
          x += dx * push;
          y += dy * push;
        }
      }
      return { x, y };
    }

    // ============================================================
    // Input
    // ============================================================
    let pointerDown = false;
    function localPt(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function inSand(y) {
      return y > H * 0.50;
    }

    canvas.addEventListener('pointerdown', (e) => {
      canvas.setPointerCapture(e.pointerId);
      pointerDown = true;
      const p = localPt(e);
      lastPointer = { x: p.x, y: p.y, active: true };

      if (tool === 'rake') {
        if (!inSand(p.y)) return; // only rake sand
        const adj = adjustForStones(p.x, p.y);
        currentStroke = {
          color: rakeColor,
          points: [adj],
          bornAt: performance.now()
        };
        strokes.push(currentStroke);
        strokeCount++;
        statStrokes.textContent = strokeCount;
      } else if (tool === 'stone') {
        if (!inSand(p.y)) return;
        // don't place inside another stone
        if (stoneAt(p.x, p.y) >= 0) return;
        makeStone(p.x, p.y);
      } else if (tool === 'erase') {
        eraseAt(p.x, p.y, 26);
      }
      hideHint();
    });

    canvas.addEventListener('pointermove', (e) => {
      const p = localPt(e);
      lastPointer = { x: p.x, y: p.y, active: true };
      if (!pointerDown) return;
      if (tool === 'rake' && currentStroke) {
        if (!inSand(p.y)) return;
        const last = currentStroke.points[currentStroke.points.length - 1];
        const d = Math.hypot(p.x - last.x, p.y - last.y);
        if (d > 4) {
          const adj = adjustForStones(p.x, p.y);
          currentStroke.points.push(adj);
        }
      } else if (tool === 'erase') {
        eraseAt(p.x, p.y, 28);
      }
    });

    function endPointer() {
      pointerDown = false;
      currentStroke = null;
    }
    canvas.addEventListener('pointerup', endPointer);
    canvas.addEventListener('pointercancel', endPointer);
    canvas.addEventListener('pointerleave', (e) => {
      lastPointer.active = false;
    });

    function eraseAt(x, y, r) {
      // remove rake-stroke points within radius; if a stroke loses too many points, drop it
      for (let i = strokes.length - 1; i >= 0; i--) {
        const s = strokes[i];
        const kept = s.points.filter(p => Math.hypot(p.x - x, p.y - y) > r);
        if (kept.length < 2) {
          strokes.splice(i, 1);
        } else if (kept.length !== s.points.length) {
          s.points = kept;
        }
      }
      // remove stones in radius (smaller hit)
      for (let i = stones.length - 1; i >= 0; i--) {
        if (Math.hypot(stones[i].x - x, stones[i].y - y) <= r) {
          stones.splice(i, 1);
          statStones.textContent = stones.length;
        }
      }
    }

    // ============================================================
    // Tools + actions wiring
    // ============================================================
    function setTool(t) {
      tool = t;
      document.querySelectorAll('[data-tool]').forEach(b => {
        b.setAttribute('aria-pressed', String(b.dataset.tool === t));
      });
      announce('Tool: ' + t);
    }
    function setColor(c) {
      rakeColor = c;
      document.querySelectorAll('[data-color]').forEach(b => {
        b.setAttribute('aria-pressed', String(b.dataset.color === c));
      });
    }
    document.querySelectorAll('[data-tool]').forEach(b => b.addEventListener('click', () => setTool(b.dataset.tool)));
    document.querySelectorAll('[data-color]').forEach(b => b.addEventListener('click', () => setColor(b.dataset.color)));

    document.getElementById('btn-smooth').addEventListener('click', () => {
      strokes.length = 0;
      strokeCount = 0;
      statStrokes.textContent = '0';
      announce('Sand smoothed.');
    });
    document.getElementById('btn-stones').addEventListener('click', () => {
      stones.length = 0;
      statStones.textContent = '0';
      announce('Stones cleared.');
    });
    document.getElementById('btn-blink').addEventListener('click', () => {
      blinkStart = performance.now();
      announce('The cat blinks.');
    });
    document.getElementById('btn-pet').addEventListener('click', () => {
      purr = Math.min(1, purr + 0.25);
      announce('The cat purrs.');
    });

    // ============================================================
    // Koan rotation (slow ambient text changes)
    // ============================================================
    const KOANS = [
      'the cat does not move. the sand remembers everything.',
      'when the sand is still, even the gods listen.',
      'a stone has no opinions. a rake leaves only questions.',
      'the cat is asleep, and yet, somehow, watching.',
      'every line you draw was already there.',
      'the garden is older than the gods. older than the cat. nearly.',
      'the moonlight is not yours. but you may borrow it.',
      'rake gently. the cat is patient, not deaf.',
      'the void is not empty. it is full of waiting cats.',
      'a stone moved is a thousand small calamities.'
    ];
    let koanIdx = 0;
    function rotateKoan() {
      koanEl.classList.add('fade');
      setTimeout(() => {
        koanIdx = (koanIdx + 1) % KOANS.length;
        koanEl.textContent = KOANS[koanIdx];
        koanEl.classList.remove('fade');
      }, 1200);
    }
    setInterval(rotateKoan, 18000);

    // Hint fade
    let hintTimer = setTimeout(hideHint, 9000);
    function hideHint() { hintEl.classList.add('fade'); clearTimeout(hintTimer); }

    function announce(msg) {
      document.getElementById('sr-status').textContent = msg;
    }

    // Keyboard
    window.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const k = e.key.toLowerCase();
      if (k === '1') setTool('rake');
      else if (k === '2') setTool('stone');
      else if (k === '3') setTool('erase');
      else if (k === 'b') { blinkStart = performance.now(); }
      else if (k === 'p') { purr = Math.min(1, purr + 0.25); }
      else if (k === 'c') { strokes.length = 0; strokeCount = 0; statStrokes.textContent = '0'; }
    });

    // ============================================================
    // Seed + boot
    // ============================================================
    resize();
    // a few seed stones to demo the curve-around behavior
    setTimeout(() => {
      makeStone(W * 0.18, H * 0.78);
      makeStone(W * 0.83, H * 0.74);
      makeStone(W * 0.25, H * 0.92);
    }, 50);
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
