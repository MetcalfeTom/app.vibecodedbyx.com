<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyWar</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%BA">
<meta name="description" content="A geometric ecosystem where triangles hunt squares and circles evade everything.">
<meta property="og:title" content="PolyWar">
<meta property="og:description" content="A geometric ecosystem where triangles hunt squares and circles evade everything.">
<meta property="og:url" content="https://sloppy.live/polywar">
<meta property="og:image" content="https://sloppy.live/polywar/og-image.png">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --ink: #e8f0ff;
    --dim: #6a7590;
    --tri: #ff5577;
    --sq:  #ffd447;
    --ci:  #5cf0e0;
    --grid: rgba(92, 240, 224, 0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    height: 100%;
    overflow: hidden;
    user-select: none;
  }
  body {
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px),
      radial-gradient(ellipse at center, #131828 0%, #05070c 100%);
    background-size: 40px 40px, 40px 40px, 100% 100%;
  }
  canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }
  #header {
    position: fixed;
    top: 20px;
    left: 24px;
    z-index: 10;
    pointer-events: none;
  }
  h1 {
    font-family: 'Major Mono Display', monospace;
    font-size: 34px;
    font-weight: 400;
    letter-spacing: 2px;
    color: var(--ink);
    text-shadow: 0 0 24px rgba(255, 85, 119, 0.35);
  }
  h1 span:nth-child(1) { color: var(--tri); }
  h1 span:nth-child(2) { color: var(--sq); }
  #subtitle {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  #hud {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 10;
    text-align: right;
    font-size: 12px;
    line-height: 1.8;
    letter-spacing: 1px;
  }
  .stat { display: flex; justify-content: flex-end; gap: 10px; }
  .stat .shape {
    display: inline-block;
    width: 10px; height: 10px;
  }
  .stat .label { color: var(--dim); }
  .tri-shape {
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 10px solid var(--tri);
  }
  .sq-shape {
    width: 10px; height: 10px;
    background: var(--sq);
  }
  .ci-shape {
    width: 10px; height: 10px;
    background: var(--ci);
    border-radius: 50%;
  }
  #controls {
    position: fixed;
    bottom: 20px;
    left: 24px;
    z-index: 10;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  button, .seed-btn {
    font-family: 'Space Mono', monospace;
    background: rgba(232, 240, 255, 0.04);
    color: var(--ink);
    border: 1px solid rgba(232, 240, 255, 0.18);
    padding: 8px 14px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { background: rgba(232, 240, 255, 0.1); border-color: var(--ink); }
  .seed-btn.tri:hover { border-color: var(--tri); color: var(--tri); }
  .seed-btn.sq:hover { border-color: var(--sq); color: var(--sq); }
  .seed-btn.ci:hover { border-color: var(--ci); color: var(--ci); }
  #backlink {
    position: fixed;
    bottom: 20px;
    right: 24px;
    z-index: 10;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-decoration: none;
    text-transform: uppercase;
  }
  #backlink:hover { color: var(--ink); }
  #help {
    position: fixed;
    bottom: 68px;
    left: 24px;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1.5px;
    max-width: 360px;
    line-height: 1.6;
    pointer-events: none;
  }
  #help b { color: var(--ink); font-weight: 400; }
  @media (max-width: 600px) {
    h1 { font-size: 22px; }
    #header { top: 14px; left: 14px; }
    #hud { top: 14px; right: 14px; font-size: 10px; }
    #controls { bottom: 14px; left: 14px; gap: 6px; }
    button { padding: 6px 10px; font-size: 9px; }
    #help { display: none; }
    #backlink { bottom: 14px; right: 14px; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="header">
  <h1><span>Poly</span><span>War</span></h1>
  <div id="subtitle">geometric ecosystem · v1</div>
</div>
<div id="hud">
  <div class="stat"><span class="label">triangles</span><b id="triCount">0</b><span class="shape tri-shape"></span></div>
  <div class="stat"><span class="label">squares</span><b id="sqCount">0</b><span class="shape sq-shape"></span></div>
  <div class="stat"><span class="label">circles</span><b id="ciCount">0</b><span class="shape ci-shape"></span></div>
  <div class="stat" style="margin-top:6px"><span class="label">tick</span><b id="tick">0</b></div>
</div>
<div id="help">
  <b>click</b> to spawn the selected species at the cursor · <b>triangles</b> hunt squares · <b>squares</b> graze &amp; flee triangles · <b>circles</b> evade everything and multiply slowly
</div>
<div id="controls">
  <button class="seed-btn tri" data-kind="0">+ Triangle</button>
  <button class="seed-btn sq" data-kind="1">+ Square</button>
  <button class="seed-btn ci" data-kind="2">+ Circle</button>
  <button id="reset">Reset</button>
  <button id="pause">Pause</button>
</div>
<a id="backlink" href="https://sloppy.live">← sloppy.live</a>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Species: 0 = triangle (predator), 1 = square (prey), 2 = circle (evader)
const COLORS = ['#ff5577', '#ffd447', '#5cf0e0'];
const GLOW   = ['rgba(255,85,119,0.35)', 'rgba(255,212,71,0.35)', 'rgba(92,240,224,0.35)'];

const agents = [];
let tick = 0;
let paused = false;
let selected = 0;

function rand(min, max) { return min + Math.random() * (max - min); }

function spawn(kind, x, y) {
  const base = {
    kind,
    x: x ?? rand(40, W - 40),
    y: y ?? rand(40, H - 40),
    vx: rand(-1, 1),
    vy: rand(-1, 1),
    angle: rand(0, Math.PI * 2),
    energy: 100,
    age: 0,
    size: 0
  };
  if (kind === 0) { base.size = 10; base.energy = 140; base.maxSpeed = 2.4; }
  if (kind === 1) { base.size = 9;  base.energy = 90;  base.maxSpeed = 1.8; }
  if (kind === 2) { base.size = 7;  base.energy = 110; base.maxSpeed = 2.8; }
  agents.push(base);
}

function seed() {
  agents.length = 0;
  for (let i = 0; i < 8; i++) spawn(0);
  for (let i = 0; i < 24; i++) spawn(1);
  for (let i = 0; i < 12; i++) spawn(2);
}
seed();

function findNearest(a, kind, range) {
  let best = null, bd = range * range;
  for (const o of agents) {
    if (o === a || o.kind !== kind) continue;
    const dx = o.x - a.x, dy = o.y - a.y;
    const d2 = dx*dx + dy*dy;
    if (d2 < bd) { bd = d2; best = o; }
  }
  return best;
}

function step() {
  tick++;
  // Food particles: implicit — squares regenerate energy slowly from grass
  for (let i = agents.length - 1; i >= 0; i--) {
    const a = agents[i];
    a.age++;
    let ax = 0, ay = 0;

    if (a.kind === 0) {
      // Triangle: hunt nearest square
      const target = findNearest(a, 1, 280);
      if (target) {
        const dx = target.x - a.x, dy = target.y - a.y;
        const d = Math.hypot(dx, dy) || 1;
        ax += dx / d * 0.12;
        ay += dy / d * 0.12;
        if (d < a.size + target.size + 2) {
          a.energy += 60;
          target.energy = -1;
        }
      } else {
        // wander
        ax += Math.cos(a.angle) * 0.04;
        ay += Math.sin(a.angle) * 0.04;
        a.angle += rand(-0.12, 0.12);
      }
      a.energy -= 0.25;
      if (a.energy > 220) {
        a.energy = 110;
        spawn(0, a.x + rand(-10,10), a.y + rand(-10,10));
      }
    }
    else if (a.kind === 1) {
      // Square: flee triangles, graze otherwise
      const threat = findNearest(a, 0, 140);
      if (threat) {
        const dx = a.x - threat.x, dy = a.y - threat.y;
        const d = Math.hypot(dx, dy) || 1;
        ax += dx / d * 0.18;
        ay += dy / d * 0.18;
      } else {
        ax += Math.cos(a.angle) * 0.03;
        ay += Math.sin(a.angle) * 0.03;
        a.angle += rand(-0.1, 0.1);
        a.energy += 0.18; // graze
      }
      a.energy -= 0.1;
      if (a.energy > 170) {
        a.energy = 90;
        spawn(1, a.x + rand(-10,10), a.y + rand(-10,10));
      }
    }
    else if (a.kind === 2) {
      // Circle: evade everything
      const t1 = findNearest(a, 0, 160);
      const t2 = findNearest(a, 1, 90);
      let fled = false;
      if (t1) {
        const dx = a.x - t1.x, dy = a.y - t1.y;
        const d = Math.hypot(dx, dy) || 1;
        ax += dx / d * 0.2; ay += dy / d * 0.2;
        fled = true;
      }
      if (t2) {
        const dx = a.x - t2.x, dy = a.y - t2.y;
        const d = Math.hypot(dx, dy) || 1;
        ax += dx / d * 0.08; ay += dy / d * 0.08;
        fled = true;
      }
      if (!fled) {
        ax += Math.cos(a.angle) * 0.05;
        ay += Math.sin(a.angle) * 0.05;
        a.angle += rand(-0.15, 0.15);
        a.energy += 0.08;
      }
      a.energy -= 0.06;
      if (a.energy > 200) {
        a.energy = 110;
        spawn(2, a.x + rand(-10,10), a.y + rand(-10,10));
      }
    }

    a.vx = (a.vx + ax) * 0.96;
    a.vy = (a.vy + ay) * 0.96;
    const sp = Math.hypot(a.vx, a.vy);
    if (sp > a.maxSpeed) {
      a.vx = a.vx / sp * a.maxSpeed;
      a.vy = a.vy / sp * a.maxSpeed;
    }
    a.x += a.vx;
    a.y += a.vy;

    // wrap
    if (a.x < -20) a.x = W + 20;
    if (a.x > W + 20) a.x = -20;
    if (a.y < -20) a.y = H + 20;
    if (a.y > H + 20) a.y = -20;

    if (a.energy <= 0) agents.splice(i, 1);
  }

  // Rescue: if any species extincts, sprinkle a few back in
  const counts = [0, 0, 0];
  for (const a of agents) counts[a.kind]++;
  if (counts[0] === 0 && tick % 200 === 0) for (let i = 0; i < 3; i++) spawn(0);
  if (counts[1] === 0 && tick % 150 === 0) for (let i = 0; i < 6; i++) spawn(1);
  if (counts[2] === 0 && tick % 250 === 0) for (let i = 0; i < 4; i++) spawn(2);

  document.getElementById('triCount').textContent = counts[0];
  document.getElementById('sqCount').textContent  = counts[1];
  document.getElementById('ciCount').textContent  = counts[2];
  document.getElementById('tick').textContent     = tick;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  for (const a of agents) {
    const heading = Math.atan2(a.vy, a.vx);
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.shadowBlur = 14;
    ctx.shadowColor = GLOW[a.kind];
    ctx.fillStyle = COLORS[a.kind];
    ctx.strokeStyle = COLORS[a.kind];
    ctx.lineWidth = 1.5;

    if (a.kind === 0) {
      ctx.rotate(heading + Math.PI / 2);
      const s = a.size;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.85, s * 0.7);
      ctx.lineTo(-s * 0.85, s * 0.7);
      ctx.closePath();
      ctx.fill();
    } else if (a.kind === 1) {
      ctx.rotate(heading);
      const s = a.size;
      ctx.fillRect(-s, -s, s * 2, s * 2);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, a.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function loop() {
  if (!paused) step();
  draw();
  requestAnimationFrame(loop);
}
loop();

// Controls
document.querySelectorAll('.seed-btn').forEach(b => {
  b.addEventListener('click', () => {
    selected = parseInt(b.dataset.kind, 10);
    document.querySelectorAll('.seed-btn').forEach(x => x.style.background = '');
    b.style.background = 'rgba(232,240,255,0.12)';
  });
});
document.getElementById('reset').addEventListener('click', seed);
document.getElementById('pause').addEventListener('click', (e) => {
  paused = !paused;
  e.target.textContent = paused ? 'Play' : 'Pause';
});

canvas.addEventListener('click', (e) => {
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left;
  const y = e.clientY - r.top;
  for (let i = 0; i < 3; i++) spawn(selected, x + rand(-8,8), y + rand(-8,8));
});
canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  for (let i = 0; i < 3; i++) spawn(selected, t.clientX - r.left + rand(-8,8), t.clientY - r.top + rand(-8,8));
}, { passive: true });
</script>
</body>
</html>
