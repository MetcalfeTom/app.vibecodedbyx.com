<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Burger</title>
<link rel="icon" href="https://emojicdn.elk.sh/🍔">
<meta property="og:title" content="Vibe Burger">
<meta property="og:description" content="Enter a username. Get a custom cheeseburger based on your name's vibes.">
<meta property="og:url" content="https://app.sloppy.live/vibe-burger/">
<meta property="og:image" content="https://emojicdn.elk.sh/🍔?style=google">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bun:#e8a33c;--meat:#8b3a1a;--cheese:#ffd234;--lettuce:#4caf50;--tomato:#e53935;--bg:#1a1209}
html,body{min-height:100%;overflow-x:hidden}
body{
background:var(--bg);
color:#f5e6c8;
font-family:'DM Mono',monospace;
display:flex;flex-direction:column;align-items:center;
padding:24px 16px 40px;
}
body::before{
content:'';position:fixed;inset:0;pointer-events:none;
background:radial-gradient(ellipse at 50% 30%,rgba(232,163,60,0.08),transparent 60%);
z-index:0;
}
/* CRT overlay */
body::after{
content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
background:
repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px),
radial-gradient(ellipse at 50% 50%,transparent 60%,rgba(0,0,0,0.35) 100%);
}
h1{
font-family:'Bangers',cursive;
font-size:clamp(36px,10vw,64px);
color:var(--cheese);
text-shadow:3px 3px 0 #a06010,-1px -1px 0 #4a2800;
letter-spacing:3px;
margin-bottom:4px;
}
.sub{font-size:12px;color:#8a7050;letter-spacing:3px;margin-bottom:24px}
.input-row{
display:flex;gap:8px;margin-bottom:24px;
max-width:400px;width:100%;
}
#name-input{
flex:1;padding:12px 16px;
background:#2a1f10;border:2px solid #4a3520;
color:var(--cheese);
font-family:'DM Mono',monospace;font-size:16px;
outline:none;border-radius:0;
}
#name-input::placeholder{color:#5a4530}
#name-input:focus{border-color:var(--bun)}
#gen-btn{
padding:12px 20px;
background:var(--meat);border:2px solid #a04820;
color:#ffd;font-family:'Bangers',cursive;
font-size:18px;letter-spacing:2px;
cursor:pointer;transition:all 0.15s;
}
#gen-btn:hover{background:#a04820;transform:scale(1.03)}
#gen-btn:active{transform:scale(0.97)}
.burger-stage{
width:min(360px,90vw);
margin:0 auto 20px;
position:relative;
min-height:100px;
}
#burger-canvas{display:block;margin:0 auto}
.burger-card{
max-width:400px;width:100%;
background:#221a0c;
border:2px solid #3a2a15;
border-radius:12px;
padding:20px;
opacity:0;transform:translateY(16px);
transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
margin-bottom:16px;
}
.burger-card.show{opacity:1;transform:translateY(0)}
.burger-name{
font-family:'Bangers',cursive;
font-size:clamp(22px,6vw,32px);
color:var(--cheese);
text-shadow:2px 2px 0 #6a4010;
margin-bottom:8px;
}
.burger-desc{
font-size:13px;color:#b09060;line-height:1.6;
margin-bottom:12px;
}
.ingredients{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.ingredient{
padding:4px 10px;
background:rgba(255,210,52,0.08);
border:1px solid rgba(255,210,52,0.15);
border-radius:16px;
font-size:11px;color:var(--bun);
}
.stats{
display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.stat{
background:rgba(139,58,26,0.15);
border:1px solid rgba(139,58,26,0.25);
padding:8px 10px;border-radius:6px;
}
.stat-label{font-size:9px;color:#6a5030;letter-spacing:2px;text-transform:uppercase}
.stat-val{font-family:'Bangers',cursive;font-size:18px;color:var(--cheese);margin-top:2px}
.vibe-tag{
display:inline-block;margin-top:10px;
padding:4px 12px;
font-family:'Bangers',cursive;font-size:14px;
letter-spacing:2px;
border-radius:4px;
}
.history{max-width:400px;width:100%;margin-top:8px}
.history-title{font-size:10px;color:#5a4530;letter-spacing:3px;margin-bottom:8px;text-transform:uppercase}
.history-item{
display:flex;justify-content:space-between;align-items:center;
padding:8px 12px;
background:rgba(34,26,12,0.6);
border:1px solid #2a1f10;
border-radius:6px;margin-bottom:4px;
font-size:12px;cursor:pointer;
transition:background 0.15s;
}
.history-item:hover{background:rgba(60,40,20,0.6)}
.history-item .h-name{color:var(--bun)}
.history-item .h-burger{color:#8a7050;font-family:'Bangers',cursive;font-size:13px}
.back-link{margin-top:20px;font-size:9px;color:#3a2a15;text-decoration:none;letter-spacing:2px}
.back-link:hover{color:#5a4530}
/* CRT flicker */
@keyframes crt-flicker{
0%,100%{opacity:1}
92%{opacity:1}93%{opacity:0.92}94%{opacity:1}
97%{opacity:1}97.5%{opacity:0.95}98%{opacity:1}
}
body{animation:crt-flicker 4s ease infinite}
/* Dust particles */
.dust{
position:fixed;border-radius:50%;pointer-events:none;z-index:50;
background:rgba(232,180,100,0.15);
animation:dust-float linear forwards;
}
@keyframes dust-float{
0%{opacity:0;transform:translateY(0)}
20%{opacity:1}80%{opacity:1}
100%{opacity:0;transform:translateY(-120px)}
}
/* Neon diner sign glow on title */
h1{
animation:neon-buzz 3s ease-in-out infinite alternate;
}
@keyframes neon-buzz{
0%,100%{filter:brightness(1)}
50%{filter:brightness(1.15)}
85%{filter:brightness(0.95)}
86%{filter:brightness(1.1)}
}
</style>
</head>
<body>
<h1>VIBE BURGER</h1>
<div class="sub">RETRO DINER BURGER PREDICTOR</div>
<div class="input-row">
<input id="name-input" type="text" placeholder="enter username..." maxlength="30" autocomplete="off">
<button id="gen-btn" onclick="generate()">GRILL</button>
</div>
<div class="burger-stage">
<canvas id="burger-canvas" width="280" height="320"></canvas>
</div>
<div class="burger-card" id="burger-card">
<div class="burger-name" id="b-name"></div>
<div class="burger-desc" id="b-desc"></div>
<div class="ingredients" id="b-ingredients"></div>
<div class="stats" id="b-stats"></div>
<div class="vibe-tag" id="b-vibe"></div>
</div>
<div class="history" id="history-section" style="display:none">
<div class="history-title">Recent Orders</div>
<div id="history-list"></div>
</div>
<a href="https://sloppy.live" class="back-link" target="_blank">sloppy.live</a>

<script>
const canvas=document.getElementById('burger-canvas'),ctx=canvas.getContext('2d');
let history=[];

// Seeded RNG
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return h>>>0}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t^=t+Math.imul(t^t>>>7,61|t);return((t^t>>>14)>>>0)/4294967296}}

const BUNS=[
  {name:'Classic Sesame',color:'#e8a33c',highlight:'#f0c060',seeds:true},
  {name:'Brioche Gold',color:'#d4922e',highlight:'#eab040',seeds:false},
  {name:'Charcoal Black',color:'#2a2a2a',highlight:'#444',seeds:true},
  {name:'Pretzel Dark',color:'#8a5a20',highlight:'#a06a30',seeds:false},
  {name:'Beetroot Pink',color:'#c44060',highlight:'#d86080',seeds:false},
  {name:'Matcha Green',color:'#6a9a50',highlight:'#80b060',seeds:true},
  {name:'Squid Ink',color:'#1a1a30',highlight:'#2a2a4a',seeds:false},
  {name:'Saffron Gold',color:'#daa520',highlight:'#eec040',seeds:true},
];

const PATTIES=[
  {name:'Angus Beef',color:'#6a2a10',highlight:'#8a3a18',thick:14},
  {name:'Wagyu Smash',color:'#5a2008',highlight:'#7a3010',thick:10},
  {name:'Black Bean',color:'#2a2a20',highlight:'#3a3a30',thick:12},
  {name:'Chicken Crispy',color:'#c8923a',highlight:'#d8a24a',thick:11},
  {name:'Lamb Kofta',color:'#7a3a15',highlight:'#944a20',thick:13},
  {name:'Portobello',color:'#5a4a30',highlight:'#6a5a40',thick:12},
  {name:'Bison',color:'#5a1a08',highlight:'#702010',thick:15},
  {name:'Impossible',color:'#8a3a1a',highlight:'#a04a28',thick:12},
];

const CHEESES=[
  {name:'American',color:'#ffd234',opacity:0.9},
  {name:'Cheddar',color:'#f0a020',opacity:0.85},
  {name:'Swiss',color:'#f5e8a0',opacity:0.8},
  {name:'Pepper Jack',color:'#f0c848',opacity:0.85},
  {name:'Brie',color:'#f5eed8',opacity:0.8},
  {name:'Gouda',color:'#e09020',opacity:0.85},
  {name:'Blue',color:'#d8d0b8',opacity:0.75},
  {name:'Smoked Provolone',color:'#e8c868',opacity:0.8},
];

const TOPPINGS=[
  {name:'Lettuce',color:'#4caf50',height:5,wavy:true},
  {name:'Tomato',color:'#e53935',height:8,slices:true},
  {name:'Onion Rings',color:'#c8923a',height:7,rings:true},
  {name:'Pickles',color:'#7cb342',height:4,slices:true},
  {name:'Bacon',color:'#8b3a1a',height:5,wavy:true},
  {name:'Jalapenos',color:'#558b2f',height:4,slices:true},
  {name:'Mushrooms',color:'#a0886a',height:6,slices:true},
  {name:'Avocado',color:'#689f38',height:6,wavy:true},
  {name:'Fried Egg',color:'#fff9e0',height:8,egg:true},
  {name:'Caramelized Onion',color:'#6a4020',height:4,wavy:true},
  {name:'Kimchi',color:'#c04030',height:5,wavy:true},
  {name:'Truffle Mayo',color:'#e8dcc0',height:3,sauce:true},
  {name:'BBQ Glaze',color:'#4a1a08',height:3,sauce:true},
  {name:'Sriracha',color:'#d42020',height:3,sauce:true},
  {name:'Pineapple',color:'#f0c820',height:6,slices:true},
  {name:'Coleslaw',color:'#d0d8a0',height:5,wavy:true},
];

const VIBES=[
  {name:'CHAOTIC',color:'#f00',bg:'rgba(255,0,0,0.1)',border:'rgba(255,0,0,0.3)'},
  {name:'CHILL',color:'#0ff',bg:'rgba(0,255,255,0.1)',border:'rgba(0,255,255,0.3)'},
  {name:'SPICY',color:'#f60',bg:'rgba(255,100,0,0.1)',border:'rgba(255,100,0,0.3)'},
  {name:'CLASSY',color:'#ffd700',bg:'rgba(255,215,0,0.1)',border:'rgba(255,215,0,0.3)'},
  {name:'UNHINGED',color:'#f0f',bg:'rgba(255,0,255,0.1)',border:'rgba(255,0,255,0.3)'},
  {name:'WHOLESOME',color:'#90ee90',bg:'rgba(144,238,144,0.1)',border:'rgba(144,238,144,0.3)'},
  {name:'MYSTERIOUS',color:'#8a2be2',bg:'rgba(138,43,226,0.1)',border:'rgba(138,43,226,0.3)'},
  {name:'LEGENDARY',color:'#ff4500',bg:'rgba(255,69,0,0.1)',border:'rgba(255,69,0,0.3)'},
];

const BURGER_NAMES_PRE=['Mega','Ultra','Cosmic','Atomic','Royal','Savage','Legendary','Supreme','Inferno','Velvet','Mystic','Shadow','Golden','Neon','Thunder','Crispy','Blazing','Frosted'];
const BURGER_NAMES_POST=['Crusher','Stacker','Destroyer','Deluxe','Supreme','Classic','Monster','Beast','Dream','Tower','Throne','Blaze','Meltdown','Slam','Bomb','Riot','Smash','Legend'];

const DESCS=[
  'A towering monument to flavor chaos.',
  'They said it couldn\'t be built. They were almost right.',
  'One bite and you transcend to the sauce dimension.',
  'Engineered for maximum satisfaction.',
  'The kind of burger that makes you rethink your life choices (in a good way).',
  'Structural integrity is questionable. Taste is not.',
  'This burger has more layers than your personality.',
  'Warning: may cause uncontrollable happiness.',
  'A flavor profile that defies conventional physics.',
  'Held together by vibes and a little bit of hope.',
  'The burger equivalent of a mic drop.',
  'Scientists say this shouldn\'t work. Scientists are wrong.',
];

function generate(){
  const name=document.getElementById('name-input').value.trim();
  if(!name)return;
  const rng=mulberry32(hashStr(name.toLowerCase()));

  const bun=BUNS[Math.floor(rng()*BUNS.length)];
  const patty=PATTIES[Math.floor(rng()*PATTIES.length)];
  const numPatties=rng()<0.3?2:1;
  const cheese=CHEESES[Math.floor(rng()*CHEESES.length)];
  const numCheese=rng()<0.25?2:1;
  const numToppings=2+Math.floor(rng()*3);
  const toppingSet=new Set();
  while(toppingSet.size<numToppings){
    toppingSet.add(Math.floor(rng()*TOPPINGS.length));
  }
  const toppings=[...toppingSet].map(i=>TOPPINGS[i]);
  const vibe=VIBES[Math.floor(rng()*VIBES.length)];
  const burgerName=BURGER_NAMES_PRE[Math.floor(rng()*BURGER_NAMES_PRE.length)]+' '+
    BURGER_NAMES_POST[Math.floor(rng()*BURGER_NAMES_POST.length)];
  const desc=DESCS[Math.floor(rng()*DESCS.length)];

  // Stats
  const messiness=Math.floor(rng()*100);
  const flavor=40+Math.floor(rng()*60);
  const size=['Smol','Regular','Thicc','ABSOLUTE UNIT'][Math.floor(rng()*4)];
  const calories=Math.floor(400+rng()*1200);

  // Draw burger
  drawBurger(bun,patty,numPatties,cheese,numCheese,toppings,rng);

  // Fill card
  document.getElementById('b-name').textContent=`THE ${burgerName}`;
  document.getElementById('b-desc').textContent=`"${desc}"`;

  const ingEl=document.getElementById('b-ingredients');
  ingEl.innerHTML='';
  const allIngredients=[bun.name+' Bun',patty.name+(numPatties>1?' x2':''),cheese.name+(numCheese>1?' x2':''),...toppings.map(t=>t.name)];
  allIngredients.forEach(ing=>{
    const span=document.createElement('span');span.className='ingredient';span.textContent=ing;
    ingEl.appendChild(span);
  });

  document.getElementById('b-stats').innerHTML=
    `<div class="stat"><div class="stat-label">Messiness</div><div class="stat-val">${messiness}%</div></div>`+
    `<div class="stat"><div class="stat-label">Flavor</div><div class="stat-val">${flavor}/100</div></div>`+
    `<div class="stat"><div class="stat-label">Size</div><div class="stat-val">${size}</div></div>`+
    `<div class="stat"><div class="stat-label">Calories</div><div class="stat-val">${calories}</div></div>`;

  const vibeEl=document.getElementById('b-vibe');
  vibeEl.textContent=`${vibe.name} ENERGY`;
  vibeEl.style.color=vibe.color;
  vibeEl.style.background=vibe.bg;
  vibeEl.style.border=`1px solid ${vibe.border}`;

  const card=document.getElementById('burger-card');
  card.classList.remove('show');void card.offsetWidth;card.classList.add('show');

  // History
  history.unshift({username:name,burger:burgerName});
  if(history.length>8)history.pop();
  renderHistory();

  playSound();
}

function drawBurger(bun,patty,numPatties,cheese,numCheese,toppings,rng){
  const w=280,h=320;
  ctx.clearRect(0,0,w,h);
  const cx=w/2;
  let y=h-40;
  const bunW=120,bunH=22;

  // Bottom bun
  drawBun(cx,y,bunW,bunH,bun,false);
  y-=bunH+2;

  // First patty
  drawPatty(cx,y,bunW-10,patty,rng);
  y-=patty.thick+1;

  // First cheese
  drawCheese(cx,y,bunW-4,cheese);
  y-=6;

  // Toppings (first half)
  const half=Math.ceil(toppings.length/2);
  for(let i=0;i<half;i++){
    drawTopping(cx,y,bunW-8,toppings[i],rng);
    y-=toppings[i].height+1;
  }

  // Second patty?
  if(numPatties>1){
    drawPatty(cx,y,bunW-10,patty,rng);
    y-=patty.thick+1;
    if(numCheese>1){drawCheese(cx,y,bunW-4,cheese);y-=6}
  }

  // Rest of toppings
  for(let i=half;i<toppings.length;i++){
    drawTopping(cx,y,bunW-8,toppings[i],rng);
    y-=toppings[i].height+1;
  }

  y-=2;
  // Top bun
  drawBun(cx,y,bunW,bunH+6,bun,true);

  // Toothpick/flag
  const flagY=y-bunH-6;
  ctx.fillStyle='#c8a060';
  ctx.fillRect(cx-1,flagY-20,2,24);
  ctx.fillStyle='#f44';
  ctx.beginPath();
  ctx.moveTo(cx+1,flagY-20);
  ctx.lineTo(cx+10,flagY-15);
  ctx.lineTo(cx+1,flagY-10);
  ctx.fill();
}

function drawBun(cx,y,w,h,bun,isTop){
  ctx.save();
  if(isTop){
    // Rounded top
    ctx.beginPath();
    ctx.ellipse(cx,y,w/2,h,0,Math.PI,0);
    ctx.rect(cx-w/2,y,w,2);
    ctx.fillStyle=bun.color;ctx.fill();
    // Highlight
    ctx.beginPath();
    ctx.ellipse(cx,y+4,w/2-8,h-8,0,Math.PI,Math.PI+0.8);
    ctx.strokeStyle=bun.highlight;ctx.lineWidth=2;ctx.globalAlpha=0.4;ctx.stroke();
    ctx.globalAlpha=1;
    // Seeds
    if(bun.seeds){
      ctx.fillStyle='#f5e8c0';
      for(let i=0;i<8;i++){
        const sx=cx-30+i*9+(i%2)*3;
        const sy=y-h/2+4+Math.sin(i)*3;
        ctx.fillRect(sx,sy,3,2);
      }
    }
  }else{
    // Flat bottom bun
    ctx.fillStyle=bun.color;
    roundRect(cx-w/2,y-h/2,w,h,4);
    ctx.fill();
    ctx.fillStyle=bun.highlight;ctx.globalAlpha=0.3;
    ctx.fillRect(cx-w/2+4,y-h/2+2,w-8,3);
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawPatty(cx,y,w,patty,rng){
  ctx.fillStyle=patty.color;
  roundRect(cx-w/2,y-patty.thick/2,w,patty.thick,3);
  ctx.fill();
  // Grill marks
  ctx.fillStyle=patty.highlight;ctx.globalAlpha=0.3;
  for(let i=0;i<4;i++){
    ctx.fillRect(cx-w/3+i*18,y-patty.thick/2+2,12,2);
  }
  ctx.globalAlpha=1;
  // Sizzle pixels
  ctx.fillStyle='#fa0';ctx.globalAlpha=0.2;
  for(let i=0;i<6;i++){
    const px=cx-w/2+10+rng()*w*0.7;
    ctx.fillRect(px,y-patty.thick/2+rng()*patty.thick,2,1);
  }
  ctx.globalAlpha=1;
}

function drawCheese(cx,y,w,cheese){
  ctx.fillStyle=cheese.color;ctx.globalAlpha=cheese.opacity;
  // Melty cheese with drips
  ctx.fillRect(cx-w/2,y-3,w,6);
  // Drips
  ctx.fillRect(cx-w/2-3,y-1,6,8);
  ctx.fillRect(cx+w/2-4,y,5,10);
  ctx.fillRect(cx-10,y+1,4,6);
  ctx.globalAlpha=1;
}

function drawTopping(cx,y,w,topping,rng){
  ctx.fillStyle=topping.color;
  if(topping.wavy){
    ctx.beginPath();
    ctx.moveTo(cx-w/2,y);
    for(let x=0;x<=w;x+=4){
      ctx.lineTo(cx-w/2+x,y+Math.sin(x*0.3+rng()*6)*2);
    }
    ctx.lineTo(cx+w/2,y+topping.height);
    ctx.lineTo(cx-w/2,y+topping.height);
    ctx.fill();
  }else if(topping.slices){
    for(let i=0;i<5;i++){
      const sx=cx-w/2+10+i*(w-20)/4;
      ctx.beginPath();ctx.arc(sx,y+topping.height/2,topping.height/2,0,Math.PI*2);ctx.fill();
    }
  }else if(topping.rings){
    for(let i=0;i<3;i++){
      const rx=cx-20+i*20;
      ctx.beginPath();ctx.arc(rx,y+3,6,0,Math.PI*2);ctx.stroke();
      ctx.lineWidth=3;ctx.strokeStyle=topping.color;ctx.stroke();
      ctx.lineWidth=1;
    }
  }else if(topping.egg){
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(cx,y+4,18,8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f0a800';
    ctx.beginPath();ctx.arc(cx+2,y+3,5,0,Math.PI*2);ctx.fill();
  }else if(topping.sauce){
    ctx.globalAlpha=0.7;
    for(let i=0;i<8;i++){
      const sx=cx-w/2+15+rng()*(w-30);
      ctx.beginPath();ctx.arc(sx,y+2,2+rng()*2,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function playSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const t=ac.currentTime;
    // Sizzle
    const buf=ac.createBuffer(1,ac.sampleRate*0.3,ac.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.4));
    const s=ac.createBufferSource();s.buffer=buf;
    const f=ac.createBiquadFilter();f.type='highpass';f.frequency.value=3000;
    const g=ac.createGain();g.gain.value=0.08;
    s.connect(f);f.connect(g);g.connect(ac.destination);s.start(t);
    // Ding
    const o=ac.createOscillator();const g2=ac.createGain();
    o.type='triangle';o.frequency.value=880;
    g2.gain.setValueAtTime(0.06,t+0.15);g2.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o.connect(g2);g2.connect(ac.destination);o.start(t+0.15);o.stop(t+0.4);
  }catch(e){}
}

function renderHistory(){
  if(history.length<2){document.getElementById('history-section').style.display='none';return}
  document.getElementById('history-section').style.display='block';
  const list=document.getElementById('history-list');
  list.innerHTML='';
  for(let i=1;i<history.length;i++){
    const h=history[i];
    const div=document.createElement('div');
    div.className='history-item';
    div.innerHTML=`<span class="h-name">@${h.username}</span><span class="h-burger">${h.burger}</span>`;
    div.onclick=()=>{document.getElementById('name-input').value=h.username;generate()};
    list.appendChild(div);
  }
}

document.getElementById('name-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')generate();
});

// Floating dust motes
setInterval(()=>{
  const d=document.createElement('div');
  d.className='dust';
  const size=1+Math.random()*3;
  d.style.width=size+'px';d.style.height=size+'px';
  d.style.left=Math.random()*100+'vw';
  d.style.bottom=Math.random()*30+'vh';
  d.style.animationDuration=(4+Math.random()*6)+'s';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),10000);
},800);
</script>
