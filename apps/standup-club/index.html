<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Standup Club</title>
<meta name="description" content="A stand-up comedy club game. Walk to the spotlight, pick your jokes, read the room. Heat meter, hecklers, audience reactions.">
<meta property="og:title" content="Standup Club">
<meta property="og:description" content="A stand-up comedy club game. Walk to the spotlight, pick your jokes, read the room.">
<meta property="og:url" content="https://sloppy.live/standup-club">
<meta property="og:image" content="https://image.pollinations.ai/prompt/stand-up%20comedy%20club%20stage%20spotlight%20brick%20wall%20microphone%20red%20gold%20smoke?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Crimson+Pro:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0e0606;
  --bg-2:#1a0a0a;
  --brick:#3a1818;
  --ink:#f4e8c8;
  --ink-mute:#a08c70;
  --rule:rgba(244,232,200,0.14);
  --rule-strong:rgba(244,232,200,0.32);
  --gold:#e6b34a;
  --warm:#ff7a3e;
  --red:#c8362c;
  --good:#74e07a;
  --cool:#5fa5d4;
  --rose:#d4709a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'Crimson Pro',serif;font-size:16px;-webkit-font-smoothing:antialiased}
html{font-size:100%}

body{
  background:
    radial-gradient(800px 600px at 50% 20%, rgba(230,179,74,0.10), transparent 65%),
    radial-gradient(900px 600px at 50% 100%, rgba(200,54,44,0.08), transparent 60%),
    var(--bg);
}
.skip{position:absolute;left:-9999px;top:auto}
.skip:focus{left:1rem;top:1rem;background:var(--gold);color:var(--bg);padding:0.5rem;z-index:100}

#stage{ position:fixed; inset:0; width:100%; height:100%; display:block; }

/* HUD top */
.hud-top{
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 5;
  pointer-events: none;
  padding: 0.85rem 1rem;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 1rem;
  align-items: start;
}
.hud-card{
  background: rgba(14,6,6,0.78);
  border: 1px solid var(--rule);
  padding: 0.55rem 0.95rem;
  pointer-events: auto;
  backdrop-filter: blur(4px);
}
.hud-card .label{
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
}
.hud-card .v{
  font-family:'Bungee', sans-serif;
  font-size: 1.45rem;
  margin-top: 0.18rem;
  color: var(--gold);
  font-variant-numeric: tabular-nums;
}
.hud-card .v.red{ color: var(--red) }

/* center heat meter */
.heat{
  text-align:center;
  pointer-events: auto;
  background: rgba(14,6,6,0.78);
  border: 1px solid var(--rule);
  padding: 0.45rem 1rem;
  min-width: 14rem;
  backdrop-filter: blur(4px);
}
.heat .label{
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
}
.heat .label b{ color: var(--gold) }
.heat .bar{
  margin-top: 0.4rem;
  height: 0.6rem;
  background: rgba(0,0,0,0.45);
  border: 1px solid var(--rule);
  position: relative;
  overflow: hidden;
}
.heat .bar > i{
  position: absolute; left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, #5fa5d4 0%, #e6b34a 50%, #ff7a3e 80%, #c8362c 100%);
  transition: width 0.3s ease;
}

/* CHOICE CARDS BOTTOM */
.choices{
  position: fixed; bottom: 1rem; left: 0; right: 0;
  z-index: 6;
  padding: 0 1rem;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.6rem;
  max-width: 64rem;
  margin: 0 auto;
}
@media (max-width: 720px){
  .choices{ grid-template-columns: 1fr; max-height: 60vh; overflow-y: auto }
}
.card{
  background: linear-gradient(180deg, rgba(20,8,8,0.92), rgba(14,6,6,0.85));
  border: 1px solid var(--rule);
  padding: 0.75rem 0.95rem;
  text-align: left;
  cursor: pointer;
  font: inherit;
  color: var(--ink);
  transition: transform 0.08s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  display: flex; flex-direction: column; gap: 0.45rem;
  min-height: 5.5rem;
  backdrop-filter: blur(2px);
}
.card:hover{
  border-color: var(--gold);
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(230,179,74,0.18);
}
.card:active{ transform: translateY(0) }
.card:focus-visible{ outline: 3px solid var(--warm); outline-offset: 2px }
.card[disabled]{ opacity:0.4; cursor: not-allowed }
.card .kind{
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
  display: flex; gap: 0.4rem; align-items: center;
}
.card .kind .tag{
  background: rgba(230,179,74,0.12);
  color: var(--gold);
  padding: 0.12rem 0.42rem;
  border: 1px solid rgba(230,179,74,0.32);
}
.card .kind .tag.spicy{ background: rgba(200,54,44,0.12); color: var(--red); border-color: rgba(200,54,44,0.32) }
.card .kind .tag.callback{ background: rgba(95,165,212,0.12); color: var(--cool); border-color: rgba(95,165,212,0.32) }
.card .kind .tag.crowd{ background: rgba(116,224,122,0.12); color: var(--good); border-color: rgba(116,224,122,0.32) }
.card .kind .tag.dad{ background: rgba(212,112,154,0.14); color: var(--rose); border-color: rgba(212,112,154,0.34) }
.card .kind .tag.dark{ background: rgba(150,80,200,0.16); color: #c89aff; border-color: rgba(150,80,200,0.4) }
.card .kind .tag.surreal{ background: rgba(95,210,224,0.14); color: #5fd2e0; border-color: rgba(95,210,224,0.36) }
.card .text{
  font-family:'Crimson Pro', serif;
  font-size: 1rem;
  color: var(--ink);
  line-height: 1.4;
}
.card .meta{
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.16em; color: var(--ink-mute);
  display: flex; gap: 0.5rem; margin-top: auto;
}
.card .meta .grow{ flex:1 }

/* HECKLER PROMPT (in place of normal cards) */
.heckler-banner{
  text-align: center;
  padding: 0.4rem 0.5rem 0.6rem;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--red);
  background: rgba(40,8,8,0.6);
  border: 1px solid rgba(200,54,44,0.4);
  margin: 0 1rem 0.5rem;
}
.heckler-banner em{
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--ink);
  letter-spacing: 0.04em;
  text-transform: none;
  display: block;
  margin-top: 0.3rem;
}

/* JOKE-NOW DISPLAY (the joke being told, briefly above stage) */
.joke-now{
  position: fixed;
  left: 50%;
  top: 28%;
  transform: translate(-50%, -50%);
  z-index: 4;
  pointer-events: none;
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1.4rem, 3.6vw, 2.2rem);
  color: var(--ink);
  text-align: center;
  max-width: 38rem;
  padding: 0 1rem;
  text-shadow: 0 2px 12px rgba(0,0,0,0.85);
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.joke-now.show{ opacity: 1; transform: translate(-50%, -50%) }

/* OVERLAYS */
.overlay{
  position: fixed; inset: 0;
  z-index: 30;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  background: radial-gradient(ellipse at center, rgba(14,6,6,0.0) 0%, rgba(14,6,6,0.92) 70%);
  padding: 1rem;
  transition: opacity 0.4s ease;
}
.overlay.gone{ opacity: 0; pointer-events: none }
.overlay h1{
  margin: 0 0 0.4rem;
  font-family:'Bungee', sans-serif;
  font-size: clamp(2.4rem, 6vw, 4.4rem);
  letter-spacing: 0.04em;
  color: var(--gold);
  text-shadow:
    0 0 14px rgba(230,179,74,0.5),
    4px 4px 0 var(--red);
}
.overlay h1 em{
  font-style: normal;
  color: var(--warm);
  text-shadow: 0 0 14px rgba(255,122,62,0.5), 4px 4px 0 var(--red);
}
.overlay .tag{
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1rem, 2vw, 1.4rem);
  color: rgba(244,232,200,0.78);
  margin: 0 0 1.2rem;
  max-width: 36rem;
}
.overlay .results{
  display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center;
  margin-bottom: 1rem;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-mute);
}
.overlay .results .pill{
  background: rgba(40,15,15,0.6);
  border: 1px solid var(--rule);
  padding: 0.4rem 0.85rem;
  display: flex; flex-direction: column; gap: 0.18rem;
}
.overlay .results .pill .vv{
  font-family:'Bungee', sans-serif;
  font-size: 1.4rem;
  color: var(--gold);
}
.overlay .results .pill .vv.red{ color: var(--red) }
.overlay .results .pill .vv.good{ color: var(--good) }
.overlay .room-card{
  display:flex; flex-direction: column; gap: 0.4rem;
  background: rgba(40,15,15,0.55);
  border: 1px solid var(--rule);
  padding: 0.85rem 1.1rem;
  margin-bottom: 1.2rem;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink);
  max-width: 32rem;
}
.overlay .room-card b{ color: var(--gold); font-weight: 500 }
.overlay button.primary{
  font-family:'Bungee', sans-serif;
  font-size: 1.05rem; letter-spacing: 0.1em; text-transform: uppercase;
  background: linear-gradient(180deg, var(--red), #6a1a14);
  color: var(--ink);
  border: 1px solid var(--gold);
  padding: 0.95rem 1.7rem;
  cursor: pointer;
  box-shadow: 0 6px 0 #4a0e08, 0 8px 22px rgba(200,54,44,0.4);
  transition: transform 0.08s ease;
}
.overlay button.primary:hover{ background: linear-gradient(180deg, #d8463c, var(--red)) }
.overlay button.primary:active{ transform: translateY(2px); box-shadow: 0 4px 0 #4a0e08 }
.overlay button.primary:focus-visible{ outline: 3px solid var(--gold); outline-offset: 3px }

@media (prefers-reduced-motion: reduce){
  .joke-now{ transition: none }
  .card{ transition: none }
}
</style>
</head>
<body>
<a href="#choices" class="skip">Skip to joke choices</a>

<canvas id="stage" role="img" aria-label="Comedy club stage with a spotlight, microphone stand, and audience silhouettes that react to your set."></canvas>

<div class="hud-top">
  <div class="hud-card" role="status" aria-live="polite">
    <div class="label">Beat</div>
    <div class="v" id="beatEl">1 / 8</div>
  </div>
  <div class="heat">
    <div class="label">Room <b id="audienceName">—</b></div>
    <div class="bar" aria-label="Heat meter"><i id="heatFill" style="width:50%"></i></div>
  </div>
  <div class="hud-card" role="status">
    <div class="label">Set rating</div>
    <div class="v" id="ratingEl">—</div>
  </div>
</div>

<div class="joke-now" id="jokeNow" aria-live="polite"></div>

<div class="choices" id="choices" role="group" aria-label="Pick your next joke"></div>

<div class="overlay" id="title">
  <h1>standup · <em>club</em></h1>
  <p class="tag">8 beats. one mic. read the room and pick the next joke. callbacks land harder. cold rooms get colder.</p>
  <div class="room-card" id="roomCardTitle">tonight's room is rolling…</div>
  <button type="button" class="primary" id="startBtn">TAKE THE STAGE</button>
</div>

<div class="overlay gone" id="curtain">
  <h1 id="finalLabel">set · cleared</h1>
  <p class="tag" id="finalSub">—</p>
  <div class="results">
    <div class="pill"><span>Laughs</span><span class="vv good" id="finalLaughs">0</span></div>
    <div class="pill"><span>Groans</span><span class="vv red" id="finalGroans">0</span></div>
    <div class="pill"><span>Heat</span><span class="vv" id="finalHeat">—</span></div>
    <div class="pill"><span>Best</span><span class="vv" id="finalBest">—</span></div>
  </div>
  <button type="button" class="primary" id="againBtn">▶ NEXT SET</button>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//   STANDUP CLUB — pick your jokes, read the room
// ════════════════════════════════════════════════════════════════

const $ = (s) => document.querySelector(s);
const cvs = $('#stage');
const ctx = cvs.getContext('2d');
let W = 0, H = 0, DPR = 1;
function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  cvs.width = Math.floor(W * DPR); cvs.height = Math.floor(H * DPR);
  cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
fit();
window.addEventListener('resize', fit);

// ──────── audio (web audio synth) ────────
let actx = null;
function ac(){
  if (!actx){ try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch{ return null; } }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function laughSfx(intensity=1){
  // Multiple short bandpass-noise bursts simulate a crowd laugh
  const c = ac(); if (!c) return;
  const t0 = c.currentTime;
  const bursts = 4 + Math.floor(intensity * 3);
  for (let i = 0; i < bursts; i++){
    const start = t0 + i * (0.05 + Math.random() * 0.06);
    const dur = 0.08 + Math.random() * 0.08;
    const buf = c.createBuffer(1, c.sampleRate * (dur + 0.05), c.sampleRate);
    const d = buf.getChannelData(0);
    for (let k = 0; k < d.length; k++) d[k] = (Math.random()*2 - 1) * (1 - k/d.length);
    const ns = c.createBufferSource(); ns.buffer = buf;
    const f = c.createBiquadFilter(); f.type = 'bandpass';
    f.frequency.value = 700 + Math.random() * 1400;
    f.Q.value = 2 + Math.random() * 4;
    const g = c.createGain(); g.gain.value = 0.04 + intensity * 0.04;
    ns.connect(f); f.connect(g); g.connect(c.destination);
    ns.start(start);
  }
}
function groanSfx(){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(180, t);
  o.frequency.exponentialRampToValueAtTime(80, t + 0.5);
  const g = c.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.08, t + 0.05);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.6);
}
function applauseSfx(){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const buf = c.createBuffer(1, c.sampleRate * 1.6, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++){
    const env = Math.sin((i/d.length) * Math.PI);
    d[i] = (Math.random()*2-1) * env * 0.6;
  }
  const ns = c.createBufferSource(); ns.buffer = buf;
  const f = c.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2200; f.Q.value = 1.2;
  const g = c.createGain(); g.gain.value = 0.18;
  ns.connect(f); f.connect(g); g.connect(c.destination);
  ns.start(t);
}
function micFeedbackSfx(){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(2200, t);
  o.frequency.exponentialRampToValueAtTime(3200, t + 0.4);
  const g = c.createGain();
  g.gain.setValueAtTime(0.02, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.5);
}
function bumpSfx(){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = 200;
  o.frequency.exponentialRampToValueAtTime(80, t + 0.18);
  const g = c.createGain();
  g.gain.setValueAtTime(0.06, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.22);
}

// ──────── audience profiles ────────
const AUDIENCES = [
  { id:'tourists',     name: 'Tourists',           tag: 'love absurdism, hate political',
    bonus: { absurd: 12, surreal: 8, observational: 4, crowdwork: 2, dad: 6 }, penalty: { political: -10, dark: -8, blue: -4 } },
  { id:'regulars',     name: 'Regulars',           tag: 'love callbacks, drink slowly',
    bonus: { callback: 14, observational: 6, blue: 4, dark: 6, surreal: 4 }, penalty: { absurd: -2, dad: -4 } },
  { id:'corporate',    name: 'Corporate Friday',   tag: 'safe is safe',
    bonus: { clean: 10, observational: 6, crowdwork: 2, dad: 12 }, penalty: { blue: -10, political: -8, dark: -14, absurd: -2, surreal: -6 } },
  { id:'bachelorette', name: 'Bachelorette Party', tag: 'loud, very ready',
    bonus: { blue: 12, crowdwork: 8, absurd: 4, dark: 4 }, penalty: { political: -4, observational: -2, dad: -2 } },
  { id:'hipsters',     name: 'Brooklyn Hipsters',  tag: 'irony or death',
    bonus: { absurd: 10, political: 6, callback: 6, dark: 14, surreal: 16 }, penalty: { clean: -6, crowdwork: -2, dad: -10 } },
  { id:'boomers',      name: 'Boomers Out Late',   tag: 'remember when',
    bonus: { observational: 10, clean: 6, callback: 4, dad: 14 }, penalty: { absurd: -8, political: -4, dark: -10, surreal: -6 } },
  { id:'goth-poets',   name: 'Goth Poets',         tag: 'love the abyss',
    bonus: { dark: 18, surreal: 10, callback: 4, blue: 4 }, penalty: { dad: -16, clean: -6, crowdwork: -4 } },
  { id:'open-mic',     name: 'Open-Mic Hopefuls',  tag: 'too kind to boo',
    bonus: { surreal: 8, callback: 6, dad: 4, observational: 4, dark: 6, absurd: 6, clean: 4 }, penalty: {} },
];

// ──────── joke pool ────────
// Each joke: { id, text (the line you tell), shortTag (card label), kind (1-2 tags), heat (delta on success), bomb (delta on bomb) }
const JOKES = [
  // observational
  { id: 'o-airline',  text: 'I love how airplane safety cards are basically pamphlets that say "if anything goes wrong, the brace position will not save you."', tag: 'airline horror', kinds: ['observational'] },
  { id: 'o-self',     text: 'I made eye contact with myself in a window today and we both pretended not to know each other.', tag: 'window strangers', kinds: ['observational'] },
  { id: 'o-grocer',   text: 'Self-checkout was supposed to free us. Now I work part-time at the supermarket without benefits.', tag: 'self-checkout', kinds: ['observational'] },
  { id: 'o-meeting',  text: 'Every meeting with no agenda is just nine adults pretending they understand the document on screen.', tag: 'meeting culture', kinds: ['observational', 'clean'] },
  { id: 'o-dating',   text: 'Dating apps invented a new feeling: the silent grief of being ghosted by someone who said "good morning sunshine" two days ago.', tag: 'dating apps', kinds: ['observational'] },
  { id: 'o-grocery',  text: 'I bought "active dry yeast" three years ago, and my pantry now has its own moon.', tag: 'pantry archaeology', kinds: ['observational', 'clean'] },
  // absurd
  { id: 'a-pigeon',   text: 'I think pigeons walk like that on purpose. They\'re showing off. Nobody else can do that with their head.', tag: 'pigeon flex', kinds: ['absurd'] },
  { id: 'a-elevator', text: 'Elevators have one job and they have invented seventeen sounds to do it. Why does the door also "ding"? I see the door, sir.', tag: 'elevator over-engineering', kinds: ['absurd'] },
  { id: 'a-cilantro', text: 'Cilantro is basically a personality test the food court uses to find out who is loyal to which side of the family.', tag: 'cilantro factions', kinds: ['absurd'] },
  { id: 'a-stair',    text: 'Stairs ask too much of us. There is a country where the stairs go sideways and they are doing fine.', tag: 'stair reform', kinds: ['absurd'] },
  { id: 'a-traffic',  text: 'Every crosswalk button in the city is connected to absolutely nothing. The button is for our feelings.', tag: 'placebo button', kinds: ['absurd'] },
  // crowdwork (uses lighter/specific lines that imply the room)
  { id: 'c-front',    text: 'You sir, in the front row — that\'s a lot of confidence for a Tuesday.', tag: 'front-row tap', kinds: ['crowdwork'] },
  { id: 'c-couple',   text: 'You two look very freshly in love. Three months? Six? The wallpaper says new apartment.', tag: 'new-couple read', kinds: ['crowdwork'] },
  { id: 'c-late',     text: 'Whoever just walked in — welcome. The second-best seat in the house is yours, free of judgement, mostly.', tag: 'late arrival', kinds: ['crowdwork'] },
  // clean
  { id: 'cl-dad',     text: 'My dad still calls every device "the machine." "Get the machine, the machine is doing it again."', tag: 'dad and his machines', kinds: ['clean', 'observational'] },

// ──────── data lookups ────────
function jokeById(id){ return JOKES.find(j => j.id === id); }
function jokesByKind(k){ return JOKES.filter(j => j.kinds.includes(k)); }

// ──────── score model ────────
function scoreJoke(joke, audience, heat, lastJoke, recentIds){
  // base laughs/groans
  let laughs = 22 + Math.random() * 8;
  let groans = 8 + Math.random() * 6;
  // audience modifiers
  for (const k of joke.kinds){
    if (audience.bonus[k])  laughs += audience.bonus[k];
    if (audience.penalty[k]) groans += -audience.penalty[k];
  }
  // heat: hot rooms forgive more, cold rooms groan harder
  const heatBoost = (heat - 50) * 0.25;
  laughs += heatBoost;
  groans -= heatBoost * 0.6;
  // callback bonus when the required setup (or recent referent) is in our recent
  if (joke.kinds.includes('callback')){
    if (joke.requires && recentIds.includes(joke.requires)){
      laughs += 22;     // huge spike when the specific setup landed earlier
    } else if (lastJoke){
      laughs += 8;      // generic callback gets a smaller bump if any joke happened before
    } else {
      laughs -= 8;      // tried to call back without any setup
      groans += 4;
    }
  }
  // crowdwork penalty if cold (room doesn't engage)
  if (joke.kinds.includes('crowdwork') && heat < 35){
    laughs -= 8;
    groans += 4;
  }
  // repeat penalty
  if (recentIds.includes(joke.id)){ laughs -= 12; groans += 6; }
  // small RNG
  laughs += (Math.random() - 0.5) * 6;
  groans += (Math.random() - 0.5) * 4;
  return {
    laughs: Math.max(0, Math.round(laughs)),
    groans: Math.max(0, Math.round(groans)),
    netHeat: Math.round(((laughs - groans * 1.4) * 0.5)),
  };
}

// ──────── audience silhouettes ────────
const heads = [];
function seedHeads(){
  heads.length = 0;
  // 7 silhouettes spread across the lower-mid stage
  const N = 7;
  for (let i = 0; i < N; i++){
    const t = (i + 0.5) / N;
    heads.push({
      cx: W * t,
      cy: H * 0.74 + (Math.random() - 0.5) * 18,
      r: 28 + Math.random() * 10,
      bob: Math.random() * Math.PI * 2,
      reactionT: 0,
      reactionEmoji: '',
      smileT: 0,
    });
  }
}
seedHeads();
window.addEventListener('resize', seedHeads);

// ──────── canvas render ────────
let bgT = 0;
function drawScene(){
  // brick wall background
  ctx.fillStyle = '#1a0a0a';
  ctx.fillRect(0, 0, W, H);
  // brick rows
  ctx.fillStyle = '#2a1212';
  const brickW = 60, brickH = 24;
  for (let y = 0; y < H; y += brickH){
    const offset = ((y / brickH) | 0) % 2 === 0 ? 0 : brickW / 2;
    for (let x = -brickW; x < W + brickW; x += brickW){
      ctx.fillRect(x + offset + 1, y + 1, brickW - 2, brickH - 2);
    }
  }
  // mortar shading
  ctx.fillStyle = 'rgba(58,24,24,0.3)';
  for (let y = 0; y < H; y += brickH) ctx.fillRect(0, y, W, 1);
  // smoky overlay
  ctx.fillStyle = 'rgba(14,6,6,0.55)';
  ctx.fillRect(0, 0, W, H);
  // back curtain (top half) with vignette
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
  grad.addColorStop(0, 'rgba(20,8,8,0.85)');
  grad.addColorStop(1, 'rgba(20,8,8,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H * 0.7);

  // SPOTLIGHT — wide cone from top-center down to mic area
  const spotX = W / 2;
  const spotTop = -40;
  const spotMid = H * 0.55;
  const halfW = 200;
  ctx.save();
  const sg = ctx.createRadialGradient(spotX, spotMid, 30, spotX, spotMid, halfW * 1.4);
  sg.addColorStop(0, 'rgba(255,210,140,0.55)');
  sg.addColorStop(0.5, 'rgba(255,170,80,0.18)');
  sg.addColorStop(1, 'rgba(255,140,60,0)');
  ctx.globalCompositeOperation = 'screen';
  // cone polygon
  ctx.fillStyle = 'rgba(255,200,120,0.10)';
  ctx.beginPath();
  ctx.moveTo(spotX - 15, spotTop);
  ctx.lineTo(spotX + 15, spotTop);
  ctx.lineTo(spotX + halfW, H * 0.7);
  ctx.lineTo(spotX - halfW, H * 0.7);
  ctx.closePath();
  ctx.fill();
  // glow disc
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(spotX, spotMid, halfW * 1.4, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // STAGE FLOOR
  const floorY = H * 0.78;
  ctx.fillStyle = '#0a0404';
  ctx.fillRect(0, floorY, W, H - floorY);
  // edge of stage
  ctx.fillStyle = '#3a1a14';
  ctx.fillRect(0, floorY, W, 4);

  // COMEDIAN SILHOUETTE — center on the spotlight
  drawComedian(spotX, floorY);

  // MIC STAND
  drawMic(spotX + 6, floorY);

  // AUDIENCE silhouettes (in front of stage, lower half)
  for (const h of heads){
    h.bob += 0.015;
    drawHead(h);
    if (h.reactionT > 0) drawReaction(h);
  }

  // smoke lines drifting up across the spotlight
  for (let i = 0; i < 12; i++){
    const sx = spotX + Math.sin(bgT * 0.3 + i) * 80 + (i - 6) * 20;
    const sy = (bgT * 30 + i * 80) % (H * 0.7);
    ctx.fillStyle = `rgba(244,232,200,${0.04 + Math.sin(bgT + i) * 0.02})`;
    ctx.beginPath(); ctx.ellipse(sx, sy, 60, 14, 0, 0, Math.PI*2); ctx.fill();
  }
}

let comedianBob = 0;
function drawComedian(x, baseY){
  const headR = 22;
  const bodyW = 36;
  const bodyH = 78;
  comedianBob = Math.sin(bgT * 1.6) * 1.2;
  const cy = baseY - bodyH - headR + comedianBob;
  // body
  ctx.fillStyle = '#0a0404';
  ctx.beginPath();
  ctx.moveTo(x - bodyW/2, baseY);
  ctx.lineTo(x + bodyW/2, baseY);
  ctx.lineTo(x + bodyW/2 - 4, cy + headR);
  ctx.quadraticCurveTo(x, cy + headR - 6, x - bodyW/2 + 4, cy + headR);
  ctx.closePath();
  ctx.fill();
  // shoulders
  ctx.fillStyle = '#0e0606';
  ctx.beginPath(); ctx.ellipse(x, cy + headR + 4, bodyW/2 + 4, 8, 0, 0, Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle = '#0a0404';
  ctx.beginPath(); ctx.arc(x, cy, headR, 0, Math.PI*2); ctx.fill();
  // hair tuft
  ctx.fillStyle = '#1c0a0a';
  ctx.beginPath(); ctx.ellipse(x + 4, cy - headR + 4, 18, 8, 0.3, 0, Math.PI*2); ctx.fill();
  // arm holding mic — rises up
  ctx.strokeStyle = '#0a0404'; ctx.lineWidth = 8; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x + bodyW/2 - 6, cy + headR + 8);
  ctx.quadraticCurveTo(x + 22, cy + headR + 4, x + 14, cy + 4);
  ctx.stroke();
}
function drawMic(x, baseY){
  // stand
  ctx.fillStyle = '#1a0a0a';
  ctx.fillRect(x + 22, baseY - 80, 3, 80);
  ctx.fillStyle = '#2a1414';
  ctx.fillRect(x + 12, baseY - 4, 24, 4);
  // mic head (in comedian's hand offset)
  ctx.save();
  ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(255,200,120,0.5)';
  ctx.fillStyle = '#3a2010';
  ctx.beginPath(); ctx.ellipse(x + 12, baseY - 92, 7, 11, 0.2, 0, Math.PI*2); ctx.fill();
  // mic mesh dots
  ctx.fillStyle = 'rgba(255,200,120,0.5)';
  for (let i = 0; i < 5; i++) ctx.fillRect(x + 8 + i, baseY - 96, 1, 1);
  ctx.restore();
}
function drawHead(h){
  const dy = Math.sin(h.bob) * 1.5;
  ctx.save();
  // head silhouette
  ctx.fillStyle = '#0a0404';
  ctx.beginPath(); ctx.arc(h.cx, h.cy + dy, h.r, 0, Math.PI*2); ctx.fill();
  // shoulder shadow
  ctx.beginPath(); ctx.ellipse(h.cx, h.cy + h.r * 0.6 + dy, h.r * 1.5, h.r * 0.45, 0, 0, Math.PI*2); ctx.fill();
  // tiny rim light (catches the spotlight)
  ctx.strokeStyle = 'rgba(255,200,120,0.16)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(h.cx - h.r * 0.2, h.cy + dy, h.r * 0.95, Math.PI * 0.7, Math.PI * 1.3); ctx.stroke();
  ctx.restore();
}
function drawReaction(h){
  const t = 1 - (h.reactionT / 1.6);   // 0 → 1
  const yOff = -t * 60;
  const alpha = Math.max(0, 1 - t * 1.2);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = '26px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(h.reactionEmoji, h.cx, h.cy - h.r - 8 + yOff);
  ctx.restore();
}

// ──────── reactions ────────
function emitReactions(emoji, count){
  // distribute across audience heads
  const indices = [];
  for (let i = 0; i < heads.length; i++) indices.push(i);
  // shuffle, take count
  for (let i = indices.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  for (let i = 0; i < Math.min(count, heads.length); i++){
    const h = heads[indices[i]];
    h.reactionT = 1.6;
    h.reactionEmoji = emoji;
  }
}

// ──────── tick ────────
let last = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  bgT += dt;
  for (const h of heads) if (h.reactionT > 0) h.reactionT -= dt;
  drawScene();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ──────── joke choice generation ────────
function pickChoices(){
  const out = [];
  // base pool: not-recently-told
  const fresh = JOKES.filter(j => !game.recent.includes(j.id));
  function pickOne(filter){
    const pool = fresh.filter(filter).filter(j => !out.includes(j));
    if (!pool.length) return null;
    return pool[Math.floor(Math.random() * pool.length)];
  }
  // slot 1 — a "warm" tone (observational / clean / dad / absurd / surreal)
  const warm = pickOne(j => j.kinds.some(k => ['observational','clean','dad','absurd','surreal'].includes(k)));
  if (warm) out.push(warm);
  // slot 2 — an "edgy" tone (crowdwork / blue / political / dark)
  const edgy = pickOne(j => j.kinds.some(k => ['crowdwork','blue','political','dark'].includes(k)));
  if (edgy) out.push(edgy);
  // slot 3 — callback if a setup is in recent, else any remaining variety
  let cb = null;
  const callbackPool = fresh.filter(j => j.kinds.includes('callback') && (!j.requires || game.recent.includes(j.requires)));
  if (callbackPool.length) cb = callbackPool[Math.floor(Math.random() * callbackPool.length)];
  if (!cb) cb = pickOne(j => !out.includes(j));
  if (cb) out.push(cb);
  // pad if anything missing
  while (out.length < 3 && fresh.length > out.length){
    const remaining = fresh.filter(j => !out.includes(j));
    if (!remaining.length) break;
    out.push(remaining[Math.floor(Math.random() * remaining.length)]);
  }
  return out;
}

// ──────── beat flow ────────
function nextBeat(){
  if (game.beat >= game.beats){ endSet(); return; }
  game.beat += 1;
  // chance of heckler after beat 3 (room is established) — 20% per beat
  if (game.beat >= 3 && Math.random() < 0.22){
    spawnHeckler();
    return;
  }
  game.phase = 'choosing';
  const choices = pickChoices();
  renderChoices(choices);
  renderHud();
}

function tellJoke(joke){
  game.phase = 'telling';
  $('#choices').innerHTML = '';
  const j = $('#jokeNow');
  j.textContent = '"' + joke.text + '"';
  j.classList.add('show');
  // after a beat, score it
  setTimeout(() => {
    const r = scoreJoke(joke, game.audience, game.heat, game.lastJoke, game.recent);
    game.laughs += r.laughs;
    game.groans += r.groans;
    game.heat = Math.max(0, Math.min(100, game.heat + r.netHeat));
    game.recent.push(joke.id);
    if (game.recent.length > 8) game.recent.shift();
    game.lastJoke = joke;
    // emit reactions + audio
    if (r.laughs > r.groans * 1.2){
      emitReactions(r.laughs > 35 ? '🤣' : '😂', Math.min(7, Math.ceil(r.laughs / 10)));
      laughSfx(Math.min(2, r.laughs / 30));
      if (r.laughs > 38) applauseSfx();
    } else if (r.groans > r.laughs){
      emitReactions(r.groans > 18 ? '🙄' : '😐', Math.min(5, Math.ceil(r.groans / 6)));
      groanSfx();
    } else {
      emitReactions('🙂', 3);
      bumpSfx();
    }
    renderHud();
    setTimeout(() => {
      j.classList.remove('show');
      setTimeout(nextBeat, 400);
    }, 1500);
  }, 1700);
}

// ──────── heckler ────────
function spawnHeckler(){
  game.phase = 'heckler';
  const line = HECKLER_LINES[Math.floor(Math.random() * HECKLER_LINES.length)];
  const banner = document.createElement('div');
  banner.className = 'heckler-banner';
  banner.innerHTML = `▣ HECKLER FROM TABLE 7 ▣<em>"${escapeHtml(line)}"</em>`;
  $('#choices').innerHTML = '';
  $('#choices').appendChild(banner);
  // 3 random comeback choices
  const responses = [...HECKLER_RESPONSES].sort(() => Math.random() - 0.5).slice(0, 3);
  responses.push({ text: '(Ignore. Sip from the bottle. Move on.)', risk: -2, heat: -8, ignore: true });
  const cardsRow = document.createElement('div');
  cardsRow.style.cssText = 'display:grid; grid-template-columns: repeat(2, 1fr); gap:0.55rem; padding: 0 1rem; margin: 0;';
  for (const r of responses){
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'card';
    const tagClass = r.ignore ? 'tag' : (r.risk > 0 ? 'tag spicy' : 'tag');
    card.innerHTML = `
      <div class="kind"><span class="${tagClass}">${r.ignore ? 'IGNORE' : r.risk > 0 ? 'RISKY' : 'SAFE'}</span></div>
      <div class="text">${escapeHtml(r.text)}</div>
      <div class="meta"><span>heat impact · ${r.heat > 0 ? '+' : ''}${r.heat}</span></div>
    `;
    card.addEventListener('click', () => respondHeckler(r));
    cardsRow.appendChild(card);
  }
  $('#choices').appendChild(cardsRow);
}
function respondHeckler(r){
  $('#choices').innerHTML = '';
  // outcome variance: risky comebacks have ±50% landing rate; safe almost always lands
  const land = r.ignore ? false : (r.risk > 0 ? Math.random() < 0.55 : true);
  const dh = land ? r.heat : (r.risk > 0 ? -10 : 0);
  game.heat = Math.max(0, Math.min(100, game.heat + dh));
  if (r.ignore){
    emitReactions('😐', 3);
    bumpSfx();
  } else if (land){
    emitReactions('😂', 5);
    laughSfx(1.3);
    applauseSfx();
    game.laughs += Math.round(r.heat * 1.5);
  } else {
    emitReactions('🙄', 4);
    groanSfx();
    micFeedbackSfx();
    game.groans += 12;
  }
  const j = $('#jokeNow');
  j.textContent = land ? '"' + r.text + '"' : '… ' + r.text + ' (silence)';
  j.classList.add('show');
  setTimeout(() => j.classList.remove('show'), 1400);
  renderHud();
  setTimeout(nextBeat, 1500);
}

// ──────── render: choice cards ────────
function renderChoices(choices){
  const host = $('#choices');
  host.innerHTML = '';
  for (const j of choices){
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'card';
    const primary = j.kinds[0] || 'joke';
    const tagClassMap = {
      callback: 'tag callback',
      crowdwork: 'tag crowd',
      blue: 'tag spicy', political: 'tag spicy',
      dad: 'tag dad',
      dark: 'tag dark',
      surreal: 'tag surreal',
    };
    const tagClass = tagClassMap[primary] || 'tag';
    const tagText = primary.toUpperCase();
    card.innerHTML = `
      <div class="kind">
        <span class="${tagClass}">${tagText}</span>
        ${j.kinds[1] ? `<span class="tag">${j.kinds[1].toUpperCase()}</span>` : ''}
      </div>
      <div class="text">${escapeHtml(j.tag)}</div>
      <div class="meta">
        <span>${j.text.length > 80 ? j.text.slice(0, 80) + '…' : j.text}</span>
      </div>
    `;
    card.setAttribute('aria-label', `Pick ${j.tag}: ${j.text}`);
    card.addEventListener('click', () => tellJoke(j));
    host.appendChild(card);
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// ──────── render: HUD ────────
function renderHud(){
  $('#beatEl').textContent = game.beat + ' / ' + game.beats;
  $('#audienceName').textContent = game.audience.name;
  $('#heatFill').style.width = game.heat + '%';
  const rating = Math.round((game.laughs - game.groans * 1.5) * 0.6 + game.heat * 0.4);
  game.rating = Math.max(0, rating);
  $('#ratingEl').textContent = game.rating;
}

// ──────── set start / end ────────
function startSet(){
  $('#title').classList.add('gone');
  $('#curtain').classList.add('gone');
  if (!actx){ ac(); }
  game.phase = 'choosing';
  game.beat = 0;
  game.laughs = 0;
  game.groans = 0;
  game.heat = 50;
  game.recent = [];
  game.lastJoke = null;
  game.audience = AUDIENCES[Math.floor(Math.random() * AUDIENCES.length)];
  $('#roomCardTitle').innerHTML = `tonight's room: <b>${game.audience.name}</b> · <em>${game.audience.tag}</em>`;
  renderHud();
  nextBeat();
}
function endSet(){
  game.phase = 'over';
  if (game.rating > game.best){
    game.best = game.rating;
    try { localStorage.setItem('standup-club-best', String(game.best)); } catch{}
  }
  // labels
  let label, sub;
  if (game.rating >= 75){ label = 'set · <em>nailed</em>'; sub = 'tape it. send it. they will book you again.'; applauseSfx(); }
  else if (game.rating >= 50){ label = 'set · <em>landed</em>'; sub = 'a few sticky bits. mostly the room with you.'; laughSfx(1); }
  else if (game.rating >= 25){ label = 'set · <em>survived</em>'; sub = 'they did not boo. some of them looked up.'; bumpSfx(); }
  else { label = 'set · <em>bombed</em>'; sub = 'thank the host. take the back exit.'; micFeedbackSfx(); }
  $('#finalLabel').innerHTML = label;
  $('#finalSub').textContent = sub;
  $('#finalLaughs').textContent = game.laughs;
  $('#finalGroans').textContent = game.groans;
  $('#finalHeat').textContent = Math.round(game.heat);
  $('#finalBest').textContent = game.best;
  $('#curtain').classList.remove('gone');
  $('#choices').innerHTML = '';
}

// ──────── boot ────────
$('#startBtn').addEventListener('click', startSet);
$('#againBtn').addEventListener('click', startSet);
// preview tonight's room on the title overlay
(function previewRoom(){
  const r = AUDIENCES[Math.floor(Math.random() * AUDIENCES.length)];
  $('#roomCardTitle').innerHTML = `tonight's room: <b>${r.name}</b> · <em>${r.tag}</em>`;
})();
</script>
</body>
