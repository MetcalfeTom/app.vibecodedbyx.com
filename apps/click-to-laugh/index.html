<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLICK TO LAUGH</title>
<meta name="description" content="One giant button. Infinite randomized laughter. haHA! hehe~ hoO! Your daily cackle quota, one click at a time.">
<link rel="icon" href="https://emojicdn.elk.sh/😂">
<meta property="og:title" content="CLICK TO LAUGH">
<meta property="og:description" content="A giant button that erupts in randomized ASCII laughter — chain clicks into a full laughing fit.">
<meta property="og:url" content="https://sloppy.live/click-to-laugh/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/giant%20red%20button%20surrounded%20by%20chaotic%20floating%20comic%20laughter%20text%20haha%20hehe%20in%20many%20fonts%20and%20colors%2C%20pop%20art%20explosion%2C%20joyful.png?width=1200&height=630&seed=5555&model=flux&nologo=true">
<style>
  :root{
    --paper:#fff3dd;
    --ink:#2b1c33;
    --red:#ff4757;
    --pop1:#ff6b81; --pop2:#ffa502; --pop3:#2ed573; --pop4:#1e90ff; --pop5:#a55eea; --pop6:#ff7f50;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Bungee", sans-serif;
    background:
      radial-gradient(circle at 50% 55%, #fff9ec, var(--paper) 60%),
      var(--paper);
    color:var(--ink);
    height:100dvh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    user-select:none; -webkit-user-select:none;
  }
  body.shake{ animation:bodyshake 0.3s ease; }
  @keyframes bodyshake{
    25%{ transform:translate(0.5rem,-0.3rem) rotate(0.5deg); }
    75%{ transform:translate(-0.5rem,0.3rem) rotate(-0.5deg); }
  }
  header{ position:fixed; top:1rem; text-align:center; z-index:3; pointer-events:none; }
  h1{
    font-size:clamp(1rem, 3vw, 1.5rem);
    letter-spacing:0.1em;
    color:var(--ink);
    opacity:0.75;
  }
  .tag{ font-family:"Caveat", cursive; font-size:1.1rem; color:#8a7a63; }
  #snortWrap{
    position:fixed; bottom:3.4rem;
    width:min(22rem, 80vw);
    text-align:center;
    z-index:3;
    pointer-events:none;
  }
  #snortWrap .lbl{
    font-size:0.6rem;
    letter-spacing:0.18em;
    color:#8a7a63;
    margin-bottom:0.3rem;
  }
  #snortBar{
    height:0.9rem;
    background:#f3e2c4;
    border:2px solid var(--ink);
    border-radius:999px;
    overflow:hidden;
  }
  #snortFill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--pop2), var(--red));
    transition:width 0.15s ease;
  }
  #snort{
    position:fixed;
    top:40%;
    left:50%;
    font-family:"Rubik Bubbles", cursive;
    font-size:clamp(2.6rem, 11vw, 6rem);
    color:var(--red);
    text-shadow:4px 4px 0 var(--ink);
    transform:translate(-50%,-50%) scale(0) rotate(-12deg);
    opacity:0;
    z-index:6;
    pointer-events:none;
    white-space:nowrap;
  }
  #snort.go{ animation:snortIn 1.6s ease forwards; }
  @keyframes snortIn{
    12%{ transform:translate(-50%,-50%) scale(1.25) rotate(3deg); opacity:1; }
    30%{ transform:translate(-50%,-50%) scale(1) rotate(-2deg); opacity:1; }
    80%{ transform:translate(-50%,-50%) scale(1.05) rotate(1deg); opacity:1; }
    100%{ transform:translate(-50%,-56%) scale(1.4) rotate(0deg); opacity:0; }
  }
  #stats{
    position:fixed; bottom:1rem;
    display:flex; gap:2rem;
    font-size:0.8rem;
    color:#8a7a63;
    z-index:3;
    pointer-events:none;
  }
  #stats b{ color:var(--red); font-size:1.1rem; }
  #big{
    position:relative;
    z-index:2;
    font-family:"Bungee", sans-serif;
    font-size:clamp(1.4rem, 5vw, 2.6rem);
    padding:clamp(1.6rem, 5vw, 3rem) clamp(2.4rem, 8vw, 5rem);
    background:linear-gradient(180deg, #ff6b81, var(--red) 55%, #d63447);
    color:#fff;
    border:none;
    border-radius:2.2rem;
    cursor:pointer;
    box-shadow:0 0.7rem 0 #a02334, 0 1.6rem 3rem rgba(214,52,71,0.4);
    transition:transform 0.06s ease, box-shadow 0.06s ease;
    text-shadow:0 3px 0 rgba(0,0,0,0.25);
  }
  #big:active{
    transform:translateY(0.5rem);
    box-shadow:0 0.2rem 0 #a02334, 0 0.7rem 1.4rem rgba(214,52,71,0.4);
  }
  #big:focus-visible{ outline:5px solid var(--pop4); outline-offset:4px; }
  #combo{
    position:fixed;
    top:22%;
    font-family:"Rubik Bubbles", cursive;
    font-size:clamp(1.4rem, 5vw, 2.4rem);
    color:var(--pop2);
    text-shadow:2px 2px 0 var(--ink);
    opacity:0;
    transform:scale(0.6);
    transition:opacity 0.2s ease, transform 0.2s ease;
    z-index:3;
    pointer-events:none;
  }
  #combo.show{ opacity:1; transform:scale(1); }
  .laugh{
    position:fixed;
    z-index:1;
    pointer-events:none;
    white-space:nowrap;
    will-change:transform, opacity;
  }
  @media (prefers-reduced-motion: reduce){
    body.shake{ animation:none; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Rubik+Bubbles&family=Caveat:wght@700&family=Special+Elite&family=Bowlby+One+SC&family=Gloria+Hallelujah&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <h1>THE LAUGHING GAME</h1>
  <p class="tag">warning: laughter is stored in the button</p>
</header>

<p id="combo" aria-hidden="true"></p>

<button type="button" id="big" aria-label="Click to laugh">CLICK TO LAUGH</button>

<div id="snortWrap" aria-hidden="true">
  <div class="lbl">LEGENDARY SNORT PROGRESS</div>
  <div id="snortBar"><div id="snortFill"></div></div>
</div>
<p id="snort" role="status" aria-live="polite"></p>

<div id="stats" aria-live="off">
  <span>LAUGHS <b id="sN">0</b></span>
  <span>BEST FIT <b id="sBest">0</b></span>
  <span>SNORTS <b id="sSnort">0</b></span>
</div>

<script>
(function(){
'use strict';

var SYL = ['ha','HA','he','He','ho','hO','hi','hu','tee','hee','kek','lol','pff','bwa','MWA','snrk','njehe','wa','KYA','ho ho','heh'];
var TAIL = ['!','!!','~','?!','...','!?','~!','','!!!','xD',' :D'];
var FONTS = ['Bungee','Rubik Bubbles','Caveat','Special Elite','Bowlby One SC','Gloria Hallelujah'];
var COLORS = ['#ff6b81','#ffa502','#2ed573','#1e90ff','#a55eea','#ff7f50','#ff4757','#12a4a6'];

function makeLaugh(intensity){
  var parts = 1 + Math.floor(Math.random() * (2 + Math.min(3, intensity / 5)));
  var s = '';
  for(var i = 0; i < parts; i++){
    var syl = SYL[Math.floor(Math.random() * SYL.length)];
    if(Math.random() < 0.3) syl = syl + syl.slice(-1).repeat(1 + Math.floor(Math.random() * 3));
    s += syl;
  }
  if(Math.random() < 0.25) s = s.charAt(0).toUpperCase() + s.slice(1);
  return s + TAIL[Math.floor(Math.random() * TAIL.length)];
}

var n = 0, best = 0, combo = 0, comboT = 0, snorts = 0;
try{
  var sv = JSON.parse(localStorage.getItem('click-to-laugh') || 'null');
  if(sv){ n = sv.n || 0; best = sv.best || 0; snorts = sv.snorts || 0; }
}catch(e){}
function save(){ try{ localStorage.setItem('click-to-laugh', JSON.stringify({ n: n, best: best, snorts: snorts })); }catch(e){} }

var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var live = [];
function spawn(x, y, intensity){
  var el = document.createElement('div');
  el.className = 'laugh';
  el.textContent = makeLaugh(intensity);
  var size = 1 + Math.random() * 1.6 + Math.min(2.4, intensity * 0.09);
  el.style.fontFamily = '"' + FONTS[Math.floor(Math.random() * FONTS.length)] + '", cursive';
  el.style.fontSize = size + 'rem';
  el.style.color = COLORS[Math.floor(Math.random() * COLORS.length)];
  el.style.left = '0px';
  el.style.top = '0px';
  document.body.appendChild(el);
  var ang = -Math.PI/2 + (Math.random() - 0.5) * 2.4;
  var sp = 130 + Math.random() * 260 + intensity * 6;
  live.push({
    el: el, x: x, y: y,
    vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
    rot: (Math.random() - 0.5) * 40,
    vr: (Math.random() - 0.5) * 180,
    life: 1.4 + Math.random() * 0.8
  });
  if(live.length > 90){ var d = live.shift(); d.el.remove(); }
}
var last = performance.now();
function tick(now){
  requestAnimationFrame(tick);
  var dt = Math.min(0.06, (now - last) / 1000);
  last = now;
  for(var i = live.length - 1; i >= 0; i--){
    var L = live[i];
    L.life -= dt;
    if(L.life <= 0){ L.el.remove(); live.splice(i, 1); continue; }
    L.x += L.vx * dt;
    L.y += L.vy * dt;
    L.vy += 210 * dt;
    L.rot += L.vr * dt;
    L.el.style.transform = 'translate(' + L.x + 'px,' + L.y + 'px) rotate(' + L.rot + 'deg)' + (reduceMotion ? '' : ' scale(' + Math.min(1, L.life) + ')');
    L.el.style.opacity = Math.min(1, L.life * 1.4);
  }
}
requestAnimationFrame(tick);

/* the legendary snort */
var SNORT_N = 50;
function snortSound(){
  try{
    if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    var t = ac.currentTime;
    var len = ac.sampleRate * 0.5 | 0, buf = ac.createBuffer(1, len, ac.sampleRate), d = buf.getChannelData(0);
    for(var i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 0.6);
    var nz = ac.createBufferSource(); nz.buffer = buf;
    var bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 3;
    bp.frequency.setValueAtTime(300, t);
    bp.frequency.exponentialRampToValueAtTime(1400, t + 0.16);
    bp.frequency.exponentialRampToValueAtTime(220, t + 0.5);
    var g = ac.createGain(); g.gain.value = 0.22;
    nz.connect(bp); bp.connect(g); g.connect(ac.destination); nz.start(t);
    var o = ac.createOscillator(), g2 = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(140, t);
    o.frequency.exponentialRampToValueAtTime(60, t + 0.4);
    g2.gain.setValueAtTime(0.14, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
    o.connect(g2); g2.connect(ac.destination); o.start(t); o.stop(t + 0.5);
  }catch(e){}
}
function legendarySnort(){
  snorts++;
  save();
  var el = document.getElementById('snort');
  var S = ['SNRRRK—!!', 'SNOOORRT!!', '*LEGENDARY SNORT*', 'SNRK-HONK!!'];
  el.textContent = S[Math.floor(Math.random() * S.length)];
  el.classList.remove('go');
  void el.offsetWidth;
  el.classList.add('go');
  snortSound();
  for(var i = 0; i < 34; i++){
    spawn(Math.random() * innerWidth, Math.random() * innerHeight * 0.8 + innerHeight * 0.1, 20);
  }
  if(!reduceMotion){
    document.body.classList.remove('shake');
    void document.body.offsetWidth;
    document.body.classList.add('shake');
  }
  document.getElementById('sSnort').textContent = snorts;
}

/* giggle synth */
var ac = null;
function giggle(intensity){
  try{
    if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    var t = ac.currentTime;
    var notes = 2 + Math.floor(Math.random() * 3);
    for(var i = 0; i < notes; i++){
      var o = ac.createOscillator(), g = ac.createGain();
      o.type = Math.random() < 0.5 ? 'triangle' : 'square';
      var f = 320 + Math.random() * 500 + Math.min(500, intensity * 14);
      o.frequency.setValueAtTime(f, t + i * 0.07);
      o.frequency.exponentialRampToValueAtTime(f * (0.7 + Math.random() * 0.5), t + i * 0.07 + 0.06);
      g.gain.setValueAtTime(0.0001, t + i * 0.07);
      g.gain.linearRampToValueAtTime(0.06, t + i * 0.07 + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.07 + 0.09);
      o.connect(g); g.connect(ac.destination);
      o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.1);
    }
  }catch(e){}
}

var FIT_LINES = ['GIGGLE FIT!', 'FULL CACKLE!!', 'UNHINGED!!!', 'CALL A DOCTOR!!', 'LAUGHING FIT ×'];
var big = document.getElementById('big');
var comboEl = document.getElementById('combo');
big.addEventListener('click', function(e){
  n++;
  combo++;
  if(combo > best){ best = combo; }
  save();
  clearTimeout(comboT);
  comboT = setTimeout(function(){ combo = 0; comboEl.classList.remove('show'); }, 1200);
  var r = big.getBoundingClientRect();
  var cx = e.clientX || r.left + r.width / 2;
  var cy = e.clientY || r.top + r.height / 2;
  var burst = 2 + Math.floor(Math.random() * 3) + Math.min(8, combo >> 2);
  for(var i = 0; i < burst; i++){
    spawn(cx + (Math.random() - 0.5) * r.width * 0.7, cy + (Math.random() - 0.5) * 40, combo);
  }
  giggle(combo);
  if(combo >= 5){
    var idx = Math.min(FIT_LINES.length - 1, Math.floor(combo / 5) - 1);
    comboEl.textContent = idx === FIT_LINES.length - 1 ? 'LAUGHING FIT ×' + combo : FIT_LINES[idx];
    comboEl.classList.add('show');
  }
  if(combo % 10 === 0 && !reduceMotion){
    document.body.classList.remove('shake');
    void document.body.offsetWidth;
    document.body.classList.add('shake');
  }
  document.getElementById('sN').textContent = n;
  document.getElementById('sBest').textContent = best;
  document.getElementById('snortFill').style.width = (n % SNORT_N) / SNORT_N * 100 + '%';
  if(n % SNORT_N === 0) legendarySnort();
});
document.getElementById('sN').textContent = n;
document.getElementById('sBest').textContent = best;
document.getElementById('sSnort').textContent = snorts;
document.getElementById('snortFill').style.width = (n % SNORT_N) / SNORT_N * 100 + '%';

/* debug/testing */
window.__laugh = function(){ return { n: n, combo: combo, best: best, live: live.length, snorts: snorts, fill: document.getElementById('snortFill').style.width }; };
})();
</script>
</body>
</html>
