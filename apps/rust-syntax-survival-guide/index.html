<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>rust-syntax-survival-guide · the pocket reference</title>
<link rel="icon" href="https://emojicdn.elk.sh/🦀">
<meta name="description" content="A clean terminal-flavoured pocket reference for Rust syntax. 24 chapters, interactive snippets, expected output, common errors, and one-click hand-off to the Rust Playground.">
<meta property="og:title" content="rust-syntax-survival-guide · the pocket reference">
<meta property="og:description" content="24 chapters of Rust syntax with interactive snippets and one-click Playground hand-off.">
<meta property="og:url" content="https://sloppy.live/rust-syntax-survival-guide">
<meta property="og:image" content="https://image.pollinations.ai/prompt/dark%20terminal%20with%20rust%20code%20syntax%20highlighted%20orange%20amber%20crab%20mascot%20minimalist%20cinematic%20studio?width=1200&height=630&nologo=true">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=JetBrains+Mono:wght@400;500;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #0d0f12;
    --bg-2:      #14181d;
    --bg-3:      #1c2128;
    --line:      #262d35;
    --ink:       #e4dcc8;
    --dim:       #7d8590;
    --rust:      #ce7041;       /* the canonical "rust" tone */
    --rust-2:    #f0996a;
    --amber:     #e5c46b;
    --green:     #7ee787;
    --red:       #ff7b72;
    --blue:      #7ab1ff;
    --pink:      #ff7ed9;
    --purple:    #c9a5ff;
    --kw:        #ce7041;
    --type:      #7ab1ff;
    --str:       #7ee787;
    --num:       #f0996a;
    --com:       #5a6470;
    --macro:     #c9a5ff;
    --fn-name:   #e5c46b;
    --punct:     #b9c0c9;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{font-size:100%}
  body{
    min-height:100vh;
    background:
      radial-gradient(900px 600px at 50% -120px, rgba(206,112,65,0.05), transparent 70%),
      var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;
  }
  /* faint terminal grain */
  body::before{
    content:''; position: fixed; inset: 0; pointer-events: none; z-index: 40;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    mix-blend-mode: overlay;
  }

  .shell{
    display: grid;
    grid-template-columns: 17rem 1fr;
    min-height: 100vh;
  }

  /* ── sidebar ─────────────────────────────────────────── */
  aside.side{
    background: var(--bg-2);
    border-right: 1px solid var(--line);
    padding: 1.4rem 0.9rem 6rem;
    overflow-y: auto;
    max-height: 100vh;
    position: sticky; top: 0;
  }
  .brand{
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 1.25rem;
    letter-spacing: -0.01em;
    color: var(--ink);
    line-height: 1.15;
  }
  .brand .crab{ color: var(--rust); }
  .brand-sub{
    font-family: 'Special Elite', serif;
    font-size: .72rem;
    color: var(--dim);
    letter-spacing: .14em;
    margin-top: .25rem;
  }
  .crumbs{
    font-family: 'JetBrains Mono', monospace;
    font-size: .62rem;
    letter-spacing: .22em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 1rem;
    padding-bottom: .35rem;
    border-bottom: 1px dashed var(--line);
  }

  ol.chapters{
    list-style: none;
    margin-top: .65rem;
    counter-reset: chap;
  }
  ol.chapters li{
    counter-increment: chap;
  }
  ol.chapters button{
    width: 100%;
    background: transparent;
    border: 0;
    color: var(--ink);
    text-align: left;
    font: inherit;
    font-size: .82rem;
    padding: .42rem .55rem;
    border-radius: .22rem;
    cursor: pointer;
    transition: background .14s, color .14s;
    display: flex; align-items: center; gap: .55rem;
    min-height: 2rem;
  }
  ol.chapters button::before{
    content: counter(chap, decimal-leading-zero);
    color: var(--dim);
    font-size: .68rem;
    letter-spacing: .04em;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  ol.chapters button:hover{ background: var(--bg-3); color: var(--rust-2); }
  ol.chapters button[aria-current="true"]{
    background: rgba(206,112,65,0.18);
    color: var(--rust-2);
    box-shadow: inset 3px 0 0 var(--rust);
  }
  ol.chapters button:focus-visible{ outline: 2px solid var(--rust); outline-offset: 1px; }

  .key-hint{
    margin-top: 1.6rem;
    padding: .7rem .55rem;
    background: var(--bg);
    border: 1px dashed var(--line);
    border-radius: .25rem;
    color: var(--dim);
    font-size: .65rem;
    letter-spacing: .08em;
    line-height: 1.7;
  }
  .key-hint kbd{
    background: var(--bg-3);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: .06rem .35rem;
    border-radius: .18rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
  }

  /* ── main content ─────────────────────────────────────── */
  main.book{
    padding: 2rem 2.2rem 6rem;
    max-width: 56rem;
  }
  .chapter-head{
    display: flex; align-items: baseline; gap: .7rem;
    border-bottom: 1px solid var(--line);
    padding-bottom: .85rem;
    margin-bottom: 1.2rem;
  }
  .chapter-head .num{
    font-family: 'JetBrains Mono', monospace;
    color: var(--rust);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: .06em;
    flex-shrink: 0;
  }
  .chapter-head h1{
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: clamp(1.45rem, 4vw, 2rem);
    color: var(--ink);
    letter-spacing: -0.015em;
    line-height: 1.15;
    flex: 1; min-width: 0;
  }
  .chapter-head .nav{
    display: flex; gap: .35rem;
  }
  .chapter-head .nav button{
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--dim);
    width: 2.2rem; height: 2.2rem;
    border-radius: .22rem;
    cursor: pointer;
    font: inherit; font-size: .95rem;
    transition: all .12s;
  }
  .chapter-head .nav button:hover{ color: var(--rust-2); border-color: var(--rust); }
  .chapter-head .nav button:focus-visible{ outline: 2px solid var(--rust); outline-offset: 1px; }

  .lede{
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: .98rem;
    line-height: 1.55;
    margin-bottom: 1.4rem;
  }
  .lede code{
    background: var(--bg-3);
    color: var(--rust-2);
    padding: .05rem .35rem;
    border-radius: .15rem;
    font-size: .9rem;
  }
  .lede em{ color: var(--amber); font-style: italic; }
  .lede strong{ color: var(--ink); font-weight: 600; }

  /* ── code blocks ─────────────────────────────────────── */
  .snippet{
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-left: 3px solid var(--rust);
    border-radius: .22rem;
    margin: .85rem 0;
    overflow: hidden;
  }
  .snippet .bar{
    display: flex; align-items: center;
    background: var(--bg-3);
    padding: .42rem .7rem;
    border-bottom: 1px solid var(--line);
    font-size: .68rem;
    letter-spacing: .14em;
    color: var(--dim);
    text-transform: uppercase;
    gap: .55rem;
  }
  .snippet .bar .file{ color: var(--rust-2); font-weight: 500; }
  .snippet .bar .actions{ margin-left: auto; display: flex; gap: .35rem; }
  .snippet .bar button{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink);
    font: inherit; font-size: .65rem;
    letter-spacing: .12em; text-transform: uppercase;
    padding: .25rem .55rem; cursor: pointer; border-radius: .15rem;
    min-height: 1.9rem;
  }
  .snippet .bar button:hover{ color: var(--rust-2); border-color: var(--rust); }
  .snippet .bar button.active{ background: rgba(206,112,65,0.18); color: var(--rust-2); border-color: var(--rust); }
  .snippet .bar button:focus-visible{ outline: 2px solid var(--rust); outline-offset: 1px; }
  .snippet pre{
    margin: 0;
    padding: .85rem 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: .88rem;
    line-height: 1.55;
    overflow-x: auto;
    white-space: pre;
    color: var(--ink);
    counter-reset: ln;
  }
  .snippet pre code{
    display: block;
    position: relative;
  }
  .snippet pre .ln{
    display: inline-block;
    color: var(--dim);
    font-size: .72rem;
    width: 2rem;
    text-align: right;
    margin-right: .9rem;
    user-select: none;
    font-variant-numeric: tabular-nums;
  }
  /* syntax highlight */
  .kw  { color: var(--kw);   font-weight: 600; }
  .ty  { color: var(--type); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .com { color: var(--com); font-style: italic; }
  .mac { color: var(--macro); }
  .fn  { color: var(--fn-name); }
  .pn  { color: var(--punct); }

  /* output / error panels */
  .reveal{
    background: var(--bg);
    border-top: 1px dashed var(--line);
    padding: .65rem 1rem .85rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: .82rem;
    line-height: 1.55;
    color: var(--green);
    display: none;
    white-space: pre-wrap;
  }
  .reveal.show{ display: block; }
  .reveal.err{ color: var(--red); }
  .reveal .lbl{
    display: block;
    font-size: .62rem;
    letter-spacing: .2em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: .35rem;
  }
  .reveal.err .lbl{ color: var(--red); }

  /* topic notes / boxes */
  .note{
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-left: 3px solid var(--amber);
    border-radius: .22rem;
    padding: .65rem .9rem;
    margin: .85rem 0;
    font-size: .9rem;
    line-height: 1.5;
    color: var(--ink);
  }
  .note.warn{ border-left-color: var(--red); }
  .note.tip{ border-left-color: var(--blue); }
  .note .lbl{
    font-size: .6rem;
    letter-spacing: .22em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: .25rem;
    display: block;
  }
  .note.warn .lbl{ color: var(--red); }
  .note.tip .lbl{ color: var(--blue); }
  .note code{
    background: var(--bg-3);
    color: var(--rust-2);
    padding: .05rem .3rem;
    border-radius: .15rem;
    font-size: .82rem;
  }

  .progress{
    margin-top: 2rem;
    color: var(--dim);
    font-size: .7rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding-top: .85rem;
    border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: .85rem; flex-wrap: wrap;
  }
  .progress .bar{
    flex: 1; min-width: 8rem; height: .25rem;
    background: var(--bg-3);
    border-radius: .125rem;
    overflow: hidden;
  }
  .progress .bar .fill{
    height: 100%;
    background: linear-gradient(90deg, var(--rust), var(--amber));
    transition: width .25s;
  }
  .progress .ch{ color: var(--rust-2); font-weight: 600; }

  @media (max-width: 760px){
    .shell{ grid-template-columns: 1fr; }
    aside.side{ position: static; max-height: none; border-right: 0; border-bottom: 1px solid var(--line); }
    main.book{ padding: 1.4rem 1rem 4rem; }
  }
  @media (prefers-reduced-motion: reduce){
    * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
</style>
</head>
<body>
  <div class="shell">
    <aside class="side" aria-label="chapters">
      <div class="brand">rust <span class="crab">🦀</span> survival</div>
      <div class="brand-sub">syntax field-guide · 24 chapters</div>
      <div class="crumbs">chapters</div>
      <ol class="chapters" id="chapters" role="list"></ol>
      <div class="key-hint">
        <b style="color:var(--ink)">keys</b><br>
        <kbd>j</kbd>/<kbd>k</kbd> · next/prev<br>
        <kbd>r</kbd> · reveal output<br>
        <kbd>e</kbd> · reveal error<br>
        <kbd>p</kbd> · open in Playground
      </div>
    </aside>

    <main class="book" id="book">
      <!-- chapter renders here -->
    </main>
  </div>

<script>
/* ────────────────────────────────────────────────────────────────
   RUST · syntax field-guide, 24 chapters.
   Each chapter is {title, lede (html), snippets: [...], notes (optional)}.
   A snippet has { code, run? (string output), err? (string error message),
                   notes? (string) }.
   ──────────────────────────────────────────────────────────────── */
const CHAPTERS = [
  {
    title: 'hello, world',
    lede: 'Every Rust program starts at <code>fn main()</code>. <code>println!</code> is a <em>macro</em>, not a function — note the <code>!</code>.',
    snippets: [{
      code:
`fn main() {
    println!("hello, world");
}`,
      run: 'hello, world',
    }],
  },
  {
    title: 'let, mut, const',
    lede: 'Bindings are <strong>immutable by default</strong>. Use <code>mut</code> to opt in to mutation. <code>const</code> is for compile-time-known constants and requires an explicit type.',
    snippets: [{
      code:
`fn main() {
    let x = 5;       // immutable
    let mut y = 5;   // mutable
    y += 1;
    const TAU: f64 = 6.2831853;
    println!("{x} {y} {TAU}");
}`,
      run: '5 6 6.2831853',
    }, {
      code:
`fn main() {
    let x = 5;
    x = 6;           // ← won't compile
}`,
      err: `error[E0384]: cannot assign twice to immutable variable \`x\`
 --> src/main.rs:3:5
  |
2 |     let x = 5;
  |         - first assignment to \`x\`
3 |     x = 6;
  |     ^^^^^ cannot assign twice to immutable variable`,
    }],
  },
  {
    title: 'scalar types',
    lede: 'Signed integers <code>i8 i16 i32 i64 i128 isize</code>, unsigned <code>u…</code>, floats <code>f32 f64</code>, <code>bool</code>, and <code>char</code> (a 4-byte Unicode scalar). Default int is <code>i32</code>, default float is <code>f64</code>.',
    snippets: [{
      code:
`fn main() {
    let a: i32 = -42;
    let b: u64 = 1_000_000;     // _ as thousands separator
    let pi: f64 = 3.14159;
    let yes: bool = true;
    let ch: char = '🦀';        // 4 bytes, any unicode scalar
    println!("{a} {b} {pi} {yes} {ch}");
}`,
      run: '-42 1000000 3.14159 true 🦀',
    }],
  },
  {
    title: 'ownership',
    lede: 'Every value has <strong>one owner</strong>. When the owner goes out of scope, the value is dropped. Moves transfer ownership — the original binding is no longer usable.',
    snippets: [{
      code:
`fn main() {
    let s1 = String::from("hi");
    let s2 = s1;             // ownership moves into s2
    println!("{s2}");        // ok
    // println!("{s1}");     // ← would not compile, s1 was moved
}`,
      run: 'hi',
    }, {
      code:
`fn main() {
    let s1 = String::from("hi");
    let s2 = s1;
    println!("{s1}");        // ← won't compile
}`,
      err: `error[E0382]: borrow of moved value: \`s1\`
 --> src/main.rs:4:16
  |
2 |     let s1 = String::from("hi");
  |         -- move occurs because \`s1\` has type \`String\`, which does not implement the \`Copy\` trait
3 |     let s2 = s1;
  |              -- value moved here
4 |     println!("{s1}");
  |                ^^ value borrowed here after move`,
    }],
    note: 'Primitive scalar types (integers, floats, bool, char) implement <code>Copy</code>, so they are <strong>copied</strong> instead of moved.',
  },
  {
    title: 'references & borrowing',
    lede: 'Pass <code>&T</code> for a shared (read-only) borrow, <code>&mut T</code> for an exclusive (writable) borrow. <strong>Many shared OR one mutable, never both.</strong>',
    snippets: [{
      code:
`fn shout(s: &String) {       // shared borrow — won't take ownership
    println!("{}!!!", s);
}
fn capitalise(s: &mut String) {
    *s = s.to_uppercase();
}
fn main() {
    let mut name = String::from("ferris");
    shout(&name);
    capitalise(&mut name);
    shout(&name);
}`,
      run: 'ferris!!!\nFERRIS!!!',
    }, {
      code:
`fn main() {
    let mut v = vec![1, 2, 3];
    let r1 = &v;
    let r2 = &mut v;          // ← two simultaneous borrows, one mutable
    println!("{:?} {:?}", r1, r2);
}`,
      err: `error[E0502]: cannot borrow \`v\` as mutable because it is also borrowed as immutable
 --> src/main.rs:4:14
  |
3 |     let r1 = &v;
  |              -- immutable borrow occurs here
4 |     let r2 = &mut v;
  |              ^^^^^^ mutable borrow occurs here
5 |     println!("{:?} {:?}", r1, r2);
  |                           -- immutable borrow later used here`,
    }],
  },
  {
    title: 'lifetimes',
    lede: "Lifetimes are <em>compile-time only</em> tags that connect references to the scope of the data they point at. You annotate them with <code>'a</code> when the compiler can't infer them.",
    snippets: [{
      code:
`fn longest<'a>(x: &'a str, y: &'a str) -> &'a str {
    if x.len() >= y.len() { x } else { y }
}
fn main() {
    let a = String::from("loooong");
    let b = "short";
    println!("{}", longest(&a, b));
}`,
      run: 'loooong',
    }],
    note: 'Most function signatures don\'t need explicit lifetimes — the compiler applies <strong>lifetime elision</strong> rules. The <code>longest</code> example needs them because the compiler can\'t guess which input the return value comes from.',
  },
  {
    title: 'slices: &str and &[T]',
    lede: 'A slice is a reference to a contiguous run of a collection — <code>&str</code> is a string slice, <code>&[T]</code> is a generic slice. Both carry a pointer and a length.',
    snippets: [{
      code:
`fn main() {
    let s = String::from("hello world");
    let hello: &str = &s[0..5];
    let world: &str = &s[6..];
    let nums = vec![10, 20, 30, 40, 50];
    let mid: &[i32] = &nums[1..4];
    println!("{hello} / {world} / {:?}", mid);
}`,
      run: 'hello / world / [20, 30, 40]',
    }],
  },
  {
    title: 'structs',
    lede: 'Three flavours — named-field <code>struct</code>, tuple-struct, and unit-struct. Derive common traits with <code>#[derive(...)]</code>.',
    snippets: [{
      code:
`#[derive(Debug)]
struct Crab { name: String, legs: u8 }

impl Crab {
    fn new(name: &str) -> Crab { Crab { name: name.into(), legs: 10 } }
    fn pinch(&self) -> String { format!("{} pinches you with {} legs!", self.name, self.legs) }
}
fn main() {
    let ferris = Crab::new("ferris");
    println!("{}", ferris.pinch());
    println!("{:?}", ferris);
}`,
      run: 'ferris pinches you with 10 legs!\nCrab { name: "ferris", legs: 10 }',
    }],
  },
  {
    title: 'enums + Option/Result',
    lede: '<code>enum</code>s in Rust are <em>sum types</em> — each variant can carry its own data. Two ship in the prelude: <code>Option&lt;T&gt;</code> for maybe-a-value, <code>Result&lt;T,E&gt;</code> for fallible operations.',
    snippets: [{
      code:
`enum Shape { Circle(f64), Square(f64), Rect(f64, f64) }

fn area(s: &Shape) -> f64 {
    match s {
        Shape::Circle(r) => std::f64::consts::PI * r * r,
        Shape::Square(s) => s * s,
        Shape::Rect(w, h) => w * h,
    }
}
fn main() {
    let s = Shape::Rect(3.0, 4.0);
    println!("{}", area(&s));
}`,
      run: '12',
    }],
  },
  {
    title: 'pattern matching',
    lede: '<code>match</code> is exhaustive — the compiler will refuse to compile if you miss a case. <code>if let</code> and <code>while let</code> are sugar for the single-case version.',
    snippets: [{
      code:
`fn main() {
    let n: Option<i32> = Some(7);
    match n {
        Some(x) if x % 2 == 0 => println!("even: {x}"),
        Some(x)               => println!("odd: {x}"),
        None                  => println!("nothing"),
    }
    if let Some(x) = n {
        println!("if-let pulled: {x}");
    }
}`,
      run: 'odd: 7\nif-let pulled: 7',
    }],
  },
  {
    title: 'iterators',
    lede: 'Iterators are <em>lazy</em>. Chain adapters (<code>map</code>, <code>filter</code>, <code>take</code>, …) and pull values out with a consumer (<code>collect</code>, <code>sum</code>, <code>fold</code>, …).',
    snippets: [{
      code:
`fn main() {
    let evens: Vec<i32> = (1..=10)
        .filter(|n| n % 2 == 0)
        .map(|n| n * n)
        .collect();
    let sum: i32 = evens.iter().sum();
    println!("{evens:?} -> {sum}");
}`,
      run: '[4, 16, 36, 64, 100] -> 220',
    }],
  },
  {
    title: 'closures · Fn, FnMut, FnOnce',
    lede: 'Closures auto-capture variables from their environment. The trait they implement depends on how they use those captures — <code>Fn</code> (immut), <code>FnMut</code> (mut), <code>FnOnce</code> (consumes).',
    snippets: [{
      code:
`fn apply<F: Fn(i32) -> i32>(x: i32, f: F) -> i32 { f(x) }

fn main() {
    let add_two = |n| n + 2;            // Fn
    let mut tally = 0;
    let mut bump = |n| { tally += n; tally };   // FnMut, captures tally by &mut

/* ────────────────────────────────────────────────────────────────
   MINIMAL RUST SYNTAX HIGHLIGHTER
   Tokens: comment / string / char / number / macro / keyword /
   type-ish (capitalised) / fn-call / punct. Conservative — won't
   match every edge case, but renders well for snippet teaching.
   ──────────────────────────────────────────────────────────────── */
const KEYWORDS = new Set([
  'as','async','await','box','break','const','continue','crate','dyn','else','enum',
  'extern','false','fn','for','if','impl','in','let','loop','match','mod','move',
  'mut','pub','ref','return','self','Self','static','struct','super','trait','true',
  'type','unsafe','use','where','while','union','yield',
]);

function esc(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlightRust(src){
  // Comment-aware single-pass tokenizer. We scan char-by-char so we
  // never break a string boundary or interpret a comment marker that
  // sits inside a string literal.
  let out = '';
  let i = 0;
  const n = src.length;
  while (i < n){
    const c = src[i];
    // line comment
    if (c === '/' && src[i+1] === '/'){
      let j = i;
      while (j < n && src[j] !== '\n') j++;
      out += `<span class="com">${esc(src.slice(i, j))}</span>`;
      i = j;
      continue;
    }
    // block comment
    if (c === '/' && src[i+1] === '*'){
      let j = i + 2;
      while (j < n && !(src[j] === '*' && src[j+1] === '/')) j++;
      j = Math.min(n, j + 2);
      out += `<span class="com">${esc(src.slice(i, j))}</span>`;
      i = j;
      continue;
    }
    // string literal
    if (c === '"'){
      let j = i + 1;
      while (j < n){
        if (src[j] === '\\' && j + 1 < n) { j += 2; continue; }
        if (src[j] === '"') { j++; break; }
        j++;
      }
      out += `<span class="str">${esc(src.slice(i, j))}</span>`;
      i = j;
      continue;
    }
    // char literal · 'x' / '\\n' / 'a'  — but NOT lifetime 'a (no closing quote)
    if (c === "'" && (i + 2 < n)){
      // lifetime detection: 'a, 'static, 'b, …  followed by non-quote
      let j = i + 1;
      // skip backslash escape if present
      if (src[j] === '\\' && j + 1 < n) j += 2;
      else j += 1;
      if (j < n && src[j] === "'"){
        j++;
        out += `<span class="str">${esc(src.slice(i, j))}</span>`;
        i = j;
        continue;
      }
      // otherwise treat as lifetime (style as a type)
      let k = i + 1;
      while (k < n && /[a-zA-Z_0-9]/.test(src[k])) k++;
      out += `<span class="ty">${esc(src.slice(i, k))}</span>`;
      i = k;
      continue;
    }
    // number
    if (/[0-9]/.test(c)){
      let j = i;
      while (j < n && /[0-9_]/.test(src[j])) j++;
      if (src[j] === '.' && /[0-9]/.test(src[j+1])){
        j++; while (j < n && /[0-9_]/.test(src[j])) j++;
      }
      // type suffix · i32, u64, f64, …
      const suf = /^(i8|i16|i32|i64|i128|isize|u8|u16|u32|u64|u128|usize|f32|f64)/.exec(src.slice(j));
      if (suf) j += suf[0].length;
      out += `<span class="num">${esc(src.slice(i, j))}</span>`;
      i = j;
      continue;
    }
    // identifier / keyword / macro / type / fn-call
    if (/[a-zA-Z_]/.test(c)){
      let j = i;
      while (j < n && /[a-zA-Z_0-9]/.test(src[j])) j++;
      const word = src.slice(i, j);
      // attribute / derive
      if (word === 'derive' || word === 'cfg' || word === 'test' || word === 'allow' || word === 'tokio'){
        // no-op marker — fall through to identifier styling
      }
      if (src[j] === '!'){
        // macro
        out += `<span class="mac">${esc(word)}!</span>`;
        i = j + 1;
        continue;
      }
      if (KEYWORDS.has(word)){
        out += `<span class="kw">${esc(word)}</span>`;
      } else if (/^[A-Z]/.test(word)){
        out += `<span class="ty">${esc(word)}</span>`;
      } else if (src[j] === '('){
        out += `<span class="fn">${esc(word)}</span>`;
      } else {
        out += esc(word);
      }
      i = j;
      continue;
    }
    // attribute opener  #[ … ]
    if (c === '#' && src[i+1] === '['){
      let j = i;
      while (j < n && src[j] !== ']') j++;
      j = Math.min(n, j + 1);
      out += `<span class="mac">${esc(src.slice(i, j))}</span>`;
      i = j;
      continue;
    }
    // punctuation passthrough
    if (/[{}()\[\];,.:&|=+\-*\/<>?!@#]/.test(c)){
      out += `<span class="pn">${esc(c)}</span>`;
      i++;
      continue;
    }
    // whitespace + everything else
    out += esc(c);
    i++;
  }
  return out;
}

function renderSnippet(snippet, idx){
  const highlighted = highlightRust(snippet.code);
  const lines = highlighted.split('\n');
  const numbered = lines.map((ln, i) => `<span class="ln">${i + 1}</span>${ln}`).join('\n');
  const file = snippet.code.startsWith('#') || snippet.code.startsWith('cargo') || snippet.code.startsWith('# ') ? 'terminal' : 'src/main.rs';
  const hasRun = !!snippet.run;
  const hasErr = !!snippet.err;
  const playgroundUrl = 'https://play.rust-lang.org/?version=stable&mode=' +
    (hasErr ? 'debug' : 'debug') +
    '&edition=2021&code=' + encodeURIComponent(snippet.code);
  return `
    <div class="snippet" data-idx="${idx}">
      <div class="bar">
        <span>📄 <span class="file">${file}</span></span>
        <span class="actions">
          ${hasRun ? `<button data-act="run">▶ run</button>` : ''}
          ${hasErr ? `<button data-act="err">! error</button>` : ''}
          <a href="${playgroundUrl}" target="_blank" rel="noopener"><button data-act="play">↗ playground</button></a>
        </span>
      </div>
      <pre><code>${numbered}</code></pre>
      ${hasRun ? `<div class="reveal" data-reveal="run"><span class="lbl">stdout</span>${esc(snippet.run)}</div>` : ''}
      ${hasErr ? `<div class="reveal err" data-reveal="err"><span class="lbl">compiler error</span>${esc(snippet.err)}</div>` : ''}
    </div>
  `;
}

/* ────────────────────────────────────────────────────────────────
   STATE + RENDER
   ──────────────────────────────────────────────────────────────── */
const STORAGE_KEY = 'rust-survival-guide-v1';
let current = +localStorage.getItem(STORAGE_KEY) || 0;
if (current < 0 || current >= CHAPTERS.length) current = 0;

const sideList = document.getElementById('chapters');
const book = document.getElementById('book');

function renderChapterList(){
  sideList.innerHTML = CHAPTERS.map((c, i) => `
    <li><button data-ch="${i}" ${i === current ? 'aria-current="true"' : ''}>${esc(c.title)}</button></li>
  `).join('');
}
function renderChapter(){
  const c = CHAPTERS[current];
  const snippets = (c.snippets || []).map((s, i) => renderSnippet(s, i)).join('');
  const note = c.note ? `<div class="note tip"><span class="lbl">notes</span>${c.note}</div>` : '';
  const noNum = (current + 1).toString().padStart(2, '0');
  book.innerHTML = `
    <header class="chapter-head">
      <span class="num">CH ${noNum}</span>
      <h1>${esc(c.title)}</h1>
      <div class="nav">
        <button id="prevBtn" title="previous chapter (k)">◀</button>
        <button id="nextBtn" title="next chapter (j)">▶</button>
      </div>
    </header>
    <p class="lede">${c.lede}</p>
    ${snippets}
    ${note}
    <div class="progress">
      <span class="ch">CH ${noNum} / ${CHAPTERS.length.toString().padStart(2, '0')}</span>
      <div class="bar"><div class="fill" style="width:${((current + 1) / CHAPTERS.length) * 100}%"></div></div>
      <span>${c.title}</span>
    </div>
  `;
  document.getElementById('prevBtn').addEventListener('click', () => goto(current - 1));
  document.getElementById('nextBtn').addEventListener('click', () => goto(current + 1));
  for (const snip of book.querySelectorAll('.snippet')){
    snip.querySelectorAll('button[data-act]').forEach(btn => {
      const act = btn.dataset.act;
      if (act === 'play') return;
      btn.addEventListener('click', () => {
        const r = snip.querySelector(`[data-reveal="${act}"]`);
        if (!r) return;
        r.classList.toggle('show');
        btn.classList.toggle('active');
      });
    });
  }
  // re-mark sidebar
  for (const b of sideList.querySelectorAll('button')){
    b.setAttribute('aria-current', b.dataset.ch == current ? 'true' : 'false');
  }
  // scroll the selected chapter into view in the sidebar
  const selected = sideList.querySelector(`button[data-ch="${current}"]`);
  if (selected && selected.scrollIntoView){
    selected.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
  // scroll main to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // persist
  try { localStorage.setItem(STORAGE_KEY, String(current)); } catch(_){}
}
function goto(idx){
  if (idx < 0) idx = 0;
  if (idx >= CHAPTERS.length) idx = CHAPTERS.length - 1;
  current = idx;
  renderChapter();
}

sideList.addEventListener('click', (e) => {
  const b = e.target.closest('button[data-ch]');
  if (!b) return;
  goto(+b.dataset.ch);
});

document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea')) return;
  if (e.key === 'j' || e.key === 'ArrowDown'){ e.preventDefault(); goto(current + 1); }
  else if (e.key === 'k' || e.key === 'ArrowUp'){ e.preventDefault(); goto(current - 1); }
  else if (e.key === 'r'){
    const btn = book.querySelector('.snippet button[data-act="run"]');
    if (btn) btn.click();
  } else if (e.key === 'e'){
    const btn = book.querySelector('.snippet button[data-act="err"]');
    if (btn) btn.click();
  } else if (e.key === 'p'){
    const a = book.querySelector('.snippet a[href*="play.rust-lang.org"]');
    if (a) window.open(a.href, '_blank', 'noopener');
  }
});

renderChapterList();
renderChapter();
</script>
