<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Dog</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐕">
<meta property="og:title" content="Pixel Dog">
<meta property="og:description" content="A tiny pixel dog that barks, wags, and loves you unconditionally.">
<meta property="og:url" content="https://app.sloppy.live/pixel-dog/">
<meta property="og:image" content="https://emojicdn.elk.sh/🐕?style=apple&size=512">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#87ceeb;font-family:'Silkscreen',monospace;
  display:flex;flex-direction:column;align-items:center;overflow:hidden;
  background:linear-gradient(180deg,#87ceeb 0%,#b0e0ff 60%,#7ec850 60%,#5da040 100%)}
h1{font-size:clamp(1.2rem,4vw,1.8rem);color:#4a3520;margin-top:16px;
  text-shadow:2px 2px 0 rgba(255,255,255,0.3);letter-spacing:0.1em}
#stage{position:relative;width:min(400px,95vw);height:min(350px,50vh);margin:10px auto;cursor:pointer}
canvas{width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
#bark{position:absolute;top:10%;left:50%;transform:translateX(-50%);
  font-family:'Silkscreen',monospace;font-size:clamp(1.2rem,4vw,1.8rem);font-weight:700;
  color:#fff;text-shadow:2px 2px 0 #4a3520;pointer-events:none;opacity:0;
  transition:opacity 0.15s}
#bark.show{opacity:1;animation:barkBounce 0.4s ease}
@keyframes barkBounce{0%{transform:translateX(-50%) scale(0.5)}
  50%{transform:translateX(-50%) scale(1.2)}100%{transform:translateX(-50%) scale(1)}}
#mood{text-align:center;font-family:'DotGothic16',monospace;font-size:clamp(0.8rem,2.5vw,1rem);
  color:#4a3520;min-height:1.4em;margin:4px 0}
#actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0}
.act{cursor:pointer;background:#fff;border:3px solid #4a3520;border-radius:8px;
  padding:8px 16px;font-family:'Silkscreen',monospace;font-size:0.7rem;color:#4a3520;
  box-shadow:3px 3px 0 #3a2510;transition:transform 0.1s}
.act:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #3a2510}
#stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.stat{display:flex;align-items:center;gap:4px;font-family:'DotGothic16',monospace;
  font-size:0.7rem;color:#4a3520}
.bar{width:60px;height:8px;background:#2a1a10;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.3s}
#name-area{margin:4px 0}
#dogName{background:transparent;border:none;border-bottom:2px dashed #8a7a5a;
  font-family:'Silkscreen',monospace;font-size:0.9rem;color:#4a3520;
  text-align:center;width:140px;outline:none;padding:2px 6px}
#dogName::placeholder{color:#a09070}
#backlink{margin-top:auto;padding:10px;font-size:0.6rem;opacity:0.3}
#backlink a{color:#4a3520;text-decoration:none;font-family:'Silkscreen',monospace}
</style>
</head>
<body>
<h1>PIXEL DOG</h1>
<div id="name-area"><input id="dogName" type="text" placeholder="name me!" maxlength="12" autocomplete="off"></div>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="bark">WOOF!</div>
</div>
<div id="mood">happy and wagging!</div>
<div id="stats">
  <div class="stat">❤️<div class="bar"><div class="bar-fill" id="happyBar" style="width:80%;background:#ff6b6b"></div></div></div>
  <div class="stat">🍖<div class="bar"><div class="bar-fill" id="hungerBar" style="width:60%;background:#ffaa33"></div></div></div>
  <div class="stat">⚡<div class="bar"><div class="bar-fill" id="energyBar" style="width:90%;background:#44cc44"></div></div></div>
</div>
<div id="actions">
  <button class="act" onclick="feedDog()">Feed 🍖</button>
  <button class="act" onclick="playBall()">Ball 🎾</button>
  <button class="act" onclick="petDog()">Pet 🤚</button>
  <button class="act" onclick="sleepDog()">Sleep 😴</button>
</div>
<div id="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const barkEl = document.getElementById('bark');
const moodEl = document.getElementById('mood');
const happyBar = document.getElementById('happyBar');
const hungerBar = document.getElementById('hungerBar');
const energyBar = document.getElementById('energyBar');
const nameInput = document.getElementById('dogName');

const PX = 4; // pixel size
let CW, CH;
function resize(){
  const s = document.getElementById('stage');
  CW = Math.floor(s.offsetWidth / PX);
  CH = Math.floor(s.offsetHeight / PX);
  canvas.width = CW; canvas.height = CH;
}
resize(); window.addEventListener('resize', resize);

// Audio
let actx=null;
function initAudio(){if(!actx)actx=new AudioContext();}
function playBark(){
  if(!actx)return;
  // Two-tone bark
  [350,280].forEach((freq,i)=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='square';o.frequency.value=freq;
    g.gain.setValueAtTime(0,actx.currentTime+i*0.1);
    g.gain.linearRampToValueAtTime(0.2,actx.currentTime+i*0.1+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+i*0.1+0.12);
    o.connect(g).connect(actx.destination);
    o.start(actx.currentTime+i*0.1);o.stop(actx.currentTime+i*0.1+0.12);
  });
}
function playWhimper(){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.setValueAtTime(600,actx.currentTime);
  o.frequency.linearRampToValueAtTime(400,actx.currentTime+0.2);
  g.gain.setValueAtTime(0.12,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.25);
  o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+0.25);
}
function playHappy(){
  if(!actx)return;
  [500,600,700].forEach((f,i)=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0,actx.currentTime+i*0.07);
    g.gain.linearRampToValueAtTime(0.1,actx.currentTime+i*0.07+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+i*0.07+0.15);
    o.connect(g).connect(actx.destination);o.start(actx.currentTime+i*0.07);o.stop(actx.currentTime+i*0.07+0.15);
  });
}
function playMunch(){
  if(!actx)return;
  for(let i=0;i<3;i++){
    const dur=0.05;
    const buf=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate);
    const d=buf.getChannelData(0);
    for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*0.15*(1-j/d.length);
    const s=actx.createBufferSource();s.buffer=buf;
    const g=actx.createGain();g.gain.value=0.3;
    s.connect(g).connect(actx.destination);s.start(actx.currentTime+i*0.12);
  }
}

// State
let happy=80, hunger=60, energy=90;
let state='idle'; // idle, bark, eat, play, pet, sleep, ball
let stateTimer=0;
let wagPhase=0, wagSpeed=3;
let legPhase=0;
let tailWag=0;
let tongueOut=false;
let eyeState='open'; // open, happy, closed, wide
let mouthOpen=false;
let particles=[];
let ballObj=null;
let barkTexts=['WOOF!','BARK!','ARF!','BORK!','YAP!','RUFF!','WOOF WOOF!','*BORK*'];
let facingRight=true;
let walkTarget=null;
let dogX=50, dogY=55; // grid position

// Dog colors
const FUR='#c8943c';
const FUR_DARK='#a07030';
const FUR_LIGHT='#e0b050';
const BELLY='#e8d0a0';
const NOSE='#2a1a10';
const EYE='#1a1a1a';
const EYE_WHITE='#ffffff';
const TONGUE='#ee5555';
const COLLAR='#cc3333';

function setPixel(x,y,color){
  ctx.fillStyle=color;
  ctx.fillRect(x,y,1,1);
}

function drawDog(t){
  const cx=Math.floor(dogX), cy=Math.floor(dogY);
  const dir=facingRight?1:-1;

  // Tail wag
  wagPhase+=wagSpeed*0.016;
  const tailSwing=Math.sin(wagPhase)*3*tailWag;

  // Leg animation
  const walking=!!walkTarget;
  if(walking) legPhase+=0.15;
  const legOff=walking?Math.sin(legPhase)*1.5:0;

  ctx.save();
  ctx.translate(cx,cy);
  if(!facingRight){ctx.scale(-1,1);}

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.fillRect(-5,7,12,2);

  // Tail
  ctx.fillStyle=FUR;
  const tx=-6, ty=-2+Math.sin(wagPhase)*0.5;
  ctx.fillRect(tx,ty+tailSwing*0.3,2,1);
  ctx.fillRect(tx-1,ty-1+tailSwing*0.5,1,2);
  ctx.fillRect(tx-2,ty-2+tailSwing*0.7,1,1);

  // Back legs
  ctx.fillStyle=FUR_DARK;
  ctx.fillRect(-3,5+Math.sin(legPhase+Math.PI)*legOff*0.5,2,3);
  ctx.fillRect(3,5+Math.sin(legPhase)*legOff*0.5,2,3);

  // Body
  ctx.fillStyle=FUR;
  ctx.fillRect(-4,-1,10,6);
  ctx.fillRect(-3,-2,8,1);
  ctx.fillRect(-3,5,8,1);
  // Belly
  ctx.fillStyle=BELLY;
  ctx.fillRect(-2,2,7,3);

  // Front legs
  ctx.fillStyle=FUR;
  ctx.fillRect(-2,5-Math.sin(legPhase)*legOff*0.5,2,3);
  ctx.fillRect(4,5-Math.sin(legPhase+Math.PI)*legOff*0.5,2,3);
  // Paws
  ctx.fillStyle=FUR_LIGHT;
  ctx.fillRect(-2,7-Math.sin(legPhase)*legOff*0.5,2,1);
  ctx.fillRect(4,7-Math.sin(legPhase+Math.PI)*legOff*0.5,2,1);

  // Collar
  ctx.fillStyle=COLLAR;
  ctx.fillRect(3,-1,1,4);
  // Tag
  ctx.fillStyle='#ffcc00';
  ctx.fillRect(3,2,1,1);

  // Head
  ctx.fillStyle=FUR;
  ctx.fillRect(4,-4,6,6);
  ctx.fillRect(5,-5,4,1);
  ctx.fillRect(3,-3,2,4);
  // Snout
  ctx.fillStyle=FUR_LIGHT;
  ctx.fillRect(8,-2,3,3);
  ctx.fillRect(9,-1,2,2);
  // Nose
  ctx.fillStyle=NOSE;
  ctx.fillRect(10,-2,1,1);

  // Ears
  ctx.fillStyle=FUR_DARK;
  ctx.fillRect(4,-6,2,2);
  ctx.fillRect(8,-6,2,2);
  ctx.fillStyle=FUR;
  ctx.fillRect(5,-5,1,1);
  ctx.fillRect(8,-5,1,1);

  // Eyes
  if(eyeState==='open'){
    ctx.fillStyle=EYE_WHITE;
    ctx.fillRect(6,-3,2,2);
    ctx.fillStyle=EYE;
    ctx.fillRect(7,-3,1,1);
  } else if(eyeState==='happy'){
    ctx.fillStyle=EYE;
    ctx.fillRect(6,-3,2,1);
  } else if(eyeState==='closed'){
    ctx.fillStyle=EYE;
    ctx.fillRect(6,-2,2,1);
  } else if(eyeState==='wide'){
    ctx.fillStyle=EYE_WHITE;
    ctx.fillRect(5,-4,3,3);
    ctx.fillStyle=EYE;
    ctx.fillRect(6,-3,2,2);
    ctx.fillStyle=EYE_WHITE;
    ctx.fillRect(6,-4,1,1);
  }

  // Mouth
  if(mouthOpen){
    ctx.fillStyle='#3a1a10';
    ctx.fillRect(9,0,2,2);
    if(tongueOut){
      ctx.fillStyle=TONGUE;
      ctx.fillRect(10,1,1,2);
      ctx.fillRect(10,2+Math.sin(t*6)*0.5,1,1);
    }
  }

  ctx.restore();
}

function drawBall(t){
  if(!ballObj) return;
  ctx.fillStyle='#aadd00';
  ctx.fillRect(Math.floor(ballObj.x),Math.floor(ballObj.y),3,3);
  ctx.fillStyle='#ccff44';
  ctx.fillRect(Math.floor(ballObj.x),Math.floor(ballObj.y),1,1);
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=0.03;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(Math.floor(p.x),Math.floor(p.y),1,1);
  }
  ctx.globalAlpha=1;
}

function drawGround(){
  // Grass tufts
  ctx.fillStyle='#4a8830';
  for(let i=0;i<CW;i+=6){
    const h=CH*0.7+Math.sin(i*0.7)*2;
    ctx.fillRect(i,Math.floor(h),1,2);
    ctx.fillRect(i+2,Math.floor(h)-1,1,3);
  }
  // Flowers
  ctx.fillStyle='#ff6688';
  ctx.fillRect(10,Math.floor(CH*0.72),1,1);
  ctx.fillStyle='#ffdd44';
  ctx.fillRect(30,Math.floor(CH*0.71),1,1);
  ctx.fillStyle='#aa88ff';
  ctx.fillRect(70,Math.floor(CH*0.73),1,1);
}

function drawClouds(t){
  ctx.fillStyle='rgba(255,255,255,0.7)';
  const cx1=(t*2)%CW;
  ctx.fillRect(Math.floor(cx1),8,6,2);
  ctx.fillRect(Math.floor(cx1)+1,7,4,1);
  const cx2=(t*1.3+40)%CW;
  ctx.fillRect(Math.floor(cx2),12,8,2);
  ctx.fillRect(Math.floor(cx2)+2,11,4,1);
}

// Actions
function doBark(){
  initAudio();playBark();
  state='bark';stateTimer=0.5;
  mouthOpen=true;tongueOut=false;eyeState='wide';
  tailWag=1;wagSpeed=8;
  const txt=barkTexts[Math.floor(Math.random()*barkTexts.length)];
  barkEl.textContent=txt;
  barkEl.classList.add('show');
  setTimeout(()=>barkEl.classList.remove('show'),500);
  // Bark particles
  for(let i=0;i<4;i++){
    particles.push({x:dogX+(facingRight?10:-5),y:dogY-3,
      vx:(facingRight?1:-1)*(0.5+Math.random()),vy:-0.5-Math.random(),
      life:1,color:'#fff'});
  }
  happy=Math.min(100,happy+2);
}

function feedDog(){
  initAudio();playMunch();
  state='eat';stateTimer=1.5;
  mouthOpen=true;tongueOut=false;eyeState='happy';
  tailWag=1;wagSpeed=5;
  hunger=Math.min(100,hunger+25);
  happy=Math.min(100,happy+5);
  moodEl.textContent='*munch munch munch*';
  for(let i=0;i<6;i++){
    particles.push({x:dogX+(facingRight?8:0),y:dogY,
      vx:(Math.random()-0.5)*1.5,vy:-0.5-Math.random()*1.5,
      life:1,color:['#c8943c','#ffaa33','#e8d0a0'][Math.floor(Math.random()*3)]});
  }
}
window.feedDog=feedDog;

function playBall(){
  initAudio();playHappy();
  state='ball';stateTimer=3;
  eyeState='wide';tongueOut=true;mouthOpen=true;
  tailWag=1;wagSpeed=10;
  energy=Math.max(0,energy-15);
  happy=Math.min(100,happy+15);
  moodEl.textContent='BALL!! BALL BALL BALL!!';
  ballObj={x:facingRight?dogX+20:dogX-15,y:dogY-8,vx:0,vy:-1.5};
  walkTarget={x:facingRight?dogX+20:dogX-15};
}
window.playBall=playBall;

function petDog(){
  initAudio();playHappy();
  state='pet';stateTimer=2;
  eyeState='happy';tongueOut=true;mouthOpen=true;
  tailWag=1;wagSpeed=6;
  happy=Math.min(100,happy+10);
  moodEl.textContent='*tail wagging intensifies*';
  for(let i=0;i<5;i++){
    particles.push({x:dogX+Math.random()*8,y:dogY-6,
      vx:(Math.random()-0.5)*0.5,vy:-0.8-Math.random()*0.8,
      life:1,color:'#ff88aa'});
  }
}
window.petDog=petDog;

function sleepDog(){
  initAudio();playWhimper();
  state='sleep';stateTimer=4;
  eyeState='closed';tongueOut=false;mouthOpen=false;
  tailWag=0;wagSpeed=1;
  energy=Math.min(100,energy+30);
  moodEl.textContent='zzz...';
}
window.sleepDog=sleepDog;

// Click to bark
document.getElementById('stage').addEventListener('click',e=>{
  if(state==='sleep') return;
  doBark();
});

// Stat decay
setInterval(()=>{
  hunger=Math.max(0,hunger-1);
  energy=Math.max(0,energy-0.5);
  if(hunger<30) happy=Math.max(0,happy-1);
  if(energy<20) happy=Math.max(0,happy-0.5);
  happyBar.style.width=happy+'%';
  hungerBar.style.width=hunger+'%';
  energyBar.style.width=energy+'%';

  // Mood text when idle
  if(state==='idle'){
    if(hunger<20) moodEl.textContent='hungry...';
    else if(energy<20) moodEl.textContent='sleepy...';
    else if(happy>80) moodEl.textContent='happy and wagging!';
    else if(happy>50) moodEl.textContent='content.';
    else if(happy>20) moodEl.textContent='needs attention...';
    else moodEl.textContent='sad...';
  }
},2000);

// Save/load name
const savedName=localStorage.getItem('pixel-dog-name');
if(savedName) nameInput.value=savedName;
nameInput.addEventListener('input',()=>localStorage.setItem('pixel-dog-name',nameInput.value));

// Random idle walk
setInterval(()=>{
  if(state==='idle'&&!walkTarget&&Math.random()<0.3){
    walkTarget={x:15+Math.random()*(CW-30)};
    facingRight=walkTarget.x>dogX;
  }
},3000);

// Main loop
function loop(ts){
  requestAnimationFrame(loop);
  const t=ts/1000;

  ctx.clearRect(0,0,CW,CH);

  // Sky is transparent (CSS gradient handles it)
  drawClouds(t);
  drawGround();

  // State timer
  if(stateTimer>0){
    stateTimer-=0.016;
    if(stateTimer<=0){
      state='idle';
      mouthOpen=false;tongueOut=false;
      eyeState='open';
      tailWag=0.3;wagSpeed=3;
    }
  }

  // Walk toward target
  if(walkTarget){
    const dx=walkTarget.x-dogX;
    if(Math.abs(dx)<1){
      walkTarget=null;
    } else {
      dogX+=Math.sign(dx)*0.4;
      facingRight=dx>0;
    }
  }

  // Ball physics
  if(ballObj){
    ballObj.vy+=0.08;
    ballObj.x+=ballObj.vx;
    ballObj.y+=ballObj.vy;
    if(ballObj.y>dogY+5){
      ballObj.vy*=-0.6;
      ballObj.y=dogY+5;
      if(Math.abs(ballObj.vy)<0.3) ballObj=null;
    }
  }

  // Idle behaviors
  if(state==='idle'){
    tailWag=Math.max(0.1,tailWag*0.99);
    // Occasional tongue
    tongueOut=happy>60&&Math.sin(t*0.5)>0.7;
    mouthOpen=tongueOut;
    // Blink
    if(Math.sin(t*2)>0.97) eyeState='closed';
    else eyeState='open';
  }

  // Zzz particles
  if(state==='sleep'&&Math.random()<0.05){
    particles.push({x:dogX+5,y:dogY-8,vx:0.2,vy:-0.5,life:1.5,color:'#aaccff'});
  }

  drawBall(t);
  drawDog(t);
  drawParticles();
}
requestAnimationFrame(loop);
</script>
</body>
</html>
