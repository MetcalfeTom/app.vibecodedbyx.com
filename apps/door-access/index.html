<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Door Access</title>
<link rel="icon" href="https://emojicdn.elk.sh/🚪">
<meta property="og:title" content="Door Access">
<meta property="og:description" content="Elo-ranked door access. Only the top 10% get in. Challenge others to climb.">
<meta property="og:url" content="https://app.sloppy.live/door-access/">
<meta property="og:image" content="https://emojicdn.elk.sh/🚪?style=google">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;500;700;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--surface:#111113;--border:#1c1c20;
  --text:#e4e4e7;--dim:#52525b;--muted:#3f3f46;
  --green:#22c55e;--red:#ef4444;--gold:#eab308;
  --cyan:#06b6d4;--denied:#ef4444;--granted:#22c55e;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Geist Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:20px 16px;
}
.container{max-width:560px;width:100%}

header{text-align:center;margin-bottom:28px}
h1{
  font-family:'Instrument Serif',serif;font-weight:400;
  font-size:clamp(2rem,5vw,3rem);letter-spacing:-0.03em;
  color:var(--text);margin-bottom:4px;
}
.sub{color:var(--dim);font-size:0.65rem;font-weight:300}

/* Access Status Card */
.access-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:28px 24px;margin-bottom:20px;
  text-align:center;position:relative;overflow:hidden;
}
.access-card.granted{border-color:rgba(34,197,94,0.2)}
.access-card.denied{border-color:rgba(239,68,68,0.15)}

.access-status{
  font-size:0.6rem;font-weight:700;letter-spacing:0.15em;
  text-transform:uppercase;padding:4px 14px;border-radius:20px;
  display:inline-block;margin-bottom:16px;
}
.access-status.granted{background:rgba(34,197,94,0.1);color:var(--granted)}
.access-status.denied{background:rgba(239,68,68,0.08);color:var(--denied)}

.elo-display{font-size:clamp(2.5rem,8vw,4rem);font-weight:900;line-height:1;margin-bottom:6px}
.elo-display.granted{color:var(--granted);text-shadow:0 0 30px rgba(34,197,94,0.2)}
.elo-display.denied{color:var(--denied);text-shadow:0 0 20px rgba(239,68,68,0.15)}

.rank-info{color:var(--dim);font-size:0.65rem;font-weight:300}
.rank-info strong{color:var(--text);font-weight:700}

.stats-row{
  display:flex;justify-content:center;gap:24px;margin-top:16px;
  font-size:0.6rem;color:var(--dim);
}
.stats-row .val{font-weight:700;color:var(--text)}
.stats-row .w{color:var(--green)}
.stats-row .l{color:var(--red)}

.name-row{
  display:flex;gap:8px;align-items:center;justify-content:center;
  margin-top:14px;
}
.name-input{
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-family:inherit;font-size:0.7rem;
  padding:6px 10px;width:140px;outline:none;
}
.name-input:focus{border-color:var(--cyan)}
.name-save{
  background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--dim);font-family:inherit;font-size:0.6rem;
  padding:6px 10px;cursor:pointer;transition:all 0.2s;
}
.name-save:hover{border-color:var(--cyan);color:var(--cyan)}
.name-saved{color:var(--green);font-size:0.65rem;opacity:0;transition:opacity 0.3s}

/* Challenge Section */
.challenge-section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:20px;margin-bottom:20px;
}
.section-title{font-size:0.6rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px}

.challenge-btn{
  width:100%;padding:14px;border:1px solid var(--border);border-radius:10px;
  background:var(--bg);color:var(--text);font-family:inherit;
  font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;
}
.challenge-btn:hover:not(:disabled){border-color:var(--cyan);color:var(--cyan)}
.challenge-btn:disabled{opacity:0.3;cursor:not-allowed}

.challenge-result{
  margin-top:14px;padding:14px;border-radius:8px;
  font-size:0.7rem;line-height:1.6;display:none;
}
.challenge-result.win{background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);color:var(--green)}
.challenge-result.lose{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);color:var(--red)}

.cooldown-bar{
  height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden;display:none;
}
.cooldown-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width 0.1s linear}

/* Leaderboard */
.leaderboard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:20px;margin-bottom:20px;
}
.lb-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;
}
.lb-count{font-size:0.55rem;color:var(--dim);font-weight:300}

.lb-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:8px;margin-bottom:2px;
  font-size:0.7rem;transition:background 0.15s;
}
.lb-row:hover{background:rgba(255,255,255,0.02)}
.lb-row.me{background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.1)}
.lb-row.top10{border-left:2px solid var(--granted)}

.lb-rank{width:28px;text-align:right;color:var(--dim);font-weight:500;font-size:0.6rem}
.lb-rank.gold{color:var(--gold)}
.lb-rank.silver{color:#a8a29e}
.lb-rank.bronze{color:#c2884d}
.lb-name{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-elo{font-weight:900;min-width:48px;text-align:right}
.lb-elo.granted{color:var(--granted)}
.lb-badge{
  font-size:0.5rem;padding:2px 6px;border-radius:10px;font-weight:700;
  letter-spacing:0.05em;
}
.lb-badge.in{background:rgba(34,197,94,0.1);color:var(--granted)}
.lb-badge.out{background:rgba(239,68,68,0.06);color:var(--muted)}

.door-visual{
  width:100%;height:120px;position:relative;margin-bottom:20px;
  border-radius:14px;overflow:hidden;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}
.door-frame{
  width:60px;height:90px;border:2px solid var(--muted);border-radius:4px 4px 0 0;
  position:relative;transition:all 0.5s;display:flex;align-items:center;justify-content:center;
}
.door-frame.open{border-color:var(--granted);box-shadow:0 0 30px rgba(34,197,94,0.15)}
.door-frame.closed{border-color:var(--denied)}
.door-knob{
  width:6px;height:6px;border-radius:50%;border:1.5px solid var(--muted);
  position:absolute;right:6px;top:50%;
}
.door-frame.open .door-knob{border-color:var(--granted);box-shadow:0 0 8px rgba(34,197,94,0.4)}
.door-label{
  position:absolute;bottom:8px;font-size:0.5rem;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;
}
.door-label.open{color:var(--granted)}
.door-label.closed{color:var(--denied)}

.door-glow{
  position:absolute;width:100%;height:100%;
  background:radial-gradient(ellipse at center, transparent 60%, var(--bg) 100%);
  pointer-events:none;
}
.door-glow.open{background:radial-gradient(ellipse at center, rgba(34,197,94,0.04) 0%, transparent 60%, var(--bg) 100%)}

.back-link{text-align:center;margin-top:12px}
.back-link a{color:var(--dim);text-decoration:none;font-size:0.55rem;font-weight:300;transition:color 0.2s}
.back-link a:hover{color:var(--cyan)}

.loading{text-align:center;color:var(--dim);font-size:0.7rem;padding:40px}

/* Riddle Section */
.riddle-section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:20px;margin-bottom:20px;
}
.riddle-q{
  font-size:0.8rem;font-weight:500;line-height:1.6;margin-bottom:14px;
  color:var(--text);
}
.riddle-options{display:flex;flex-direction:column;gap:6px}
.riddle-opt{
  padding:10px 14px;border:1px solid var(--border);border-radius:8px;
  background:var(--bg);color:var(--text);font-family:inherit;
  font-size:0.7rem;cursor:pointer;transition:all 0.2s;text-align:left;
}
.riddle-opt:hover:not(:disabled){border-color:var(--cyan);color:var(--cyan)}
.riddle-opt:disabled{opacity:0.4;cursor:default}
.riddle-opt.correct{border-color:var(--green);color:var(--green);background:rgba(34,197,94,0.06)}
.riddle-opt.wrong{border-color:var(--red);color:var(--red);background:rgba(239,68,68,0.06)}
.riddle-feedback{
  margin-top:12px;padding:10px 14px;border-radius:8px;
  font-size:0.7rem;line-height:1.5;display:none;
}
.riddle-feedback.pass{background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);color:var(--green)}
.riddle-feedback.fail{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);color:var(--red)}
.riddle-cooldown{color:var(--dim);font-size:0.6rem;margin-top:8px;font-weight:300}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Door Access</h1>
    <div class="sub">Elo-ranked entry system — only the top 10% get through</div>
  </header>

  <div id="loading" class="loading">Authenticating...</div>

  <div id="app" style="display:none">
    <div class="door-visual" id="door-visual">
      <div class="door-glow" id="door-glow"></div>
      <div class="door-frame" id="door-frame">
        <div class="door-knob"></div>
      </div>
      <div class="door-label" id="door-label">LOCKED</div>
    </div>

    <div class="access-card" id="access-card">
      <div class="access-status" id="access-status">CHECKING</div>
      <div class="elo-display" id="elo-display">—</div>
      <div class="rank-info" id="rank-info"></div>
      <div class="stats-row">
        <span>W <span class="val w" id="s-wins">0</span></span>
        <span>L <span class="val l" id="s-losses">0</span></span>
        <span>MATCHES <span class="val" id="s-matches">0</span></span>
      </div>
      <div class="name-row">
        <input class="name-input" id="name-input" type="text" maxlength="20" placeholder="Enter name" spellcheck="false">
        <button class="name-save" onclick="saveName()">Save</button>
        <span class="name-saved" id="name-saved">ok</span>
      </div>
    </div>

    <div class="challenge-section">
      <div class="section-title">Challenge</div>
      <button class="challenge-btn" id="challenge-btn" onclick="challenge()">Find Opponent</button>
      <div class="challenge-result" id="challenge-result"></div>
      <div class="cooldown-bar" id="cooldown-bar"><div class="cooldown-fill" id="cooldown-fill"></div></div>
    </div>

    <div class="riddle-section" id="riddle-section">
      <div class="section-title">Etiquette Riddle</div>
      <div class="riddle-q" id="riddle-q"></div>
      <div class="riddle-options" id="riddle-options"></div>
      <div class="riddle-feedback" id="riddle-feedback"></div>
      <div class="riddle-cooldown" id="riddle-cooldown"></div>
    </div>

    <div class="leaderboard" id="leaderboard">
      <div class="lb-header">
        <div class="section-title" style="margin-bottom:0">Rankings</div>
        <div class="lb-count" id="lb-count">0 players</div>
      </div>
      <div id="lb-list"></div>
    </div>
  </div>

  <div class="back-link"><a href="https://sloppy.live">sloppy.live</a></div>
</div>

<script type="module">
import supabase, { supabaseSession } from '/supabase-config-fixed.js';

let userId, myRow, allPlayers = [];
let cooldownEnd = 0;
let riddleCooldownEnd = 0;

const RIDDLES = [
  { q: "Someone shares an unpopular opinion in a group chat. What's the best response?",
    opts: ["Roast them publicly","Engage respectfully or move on","Screenshot and share","Leave the group"],
    answer: 1, tip: "Respectful engagement builds trust and Elo." },
  { q: "You receive a message at 2 AM. What do you do?",
    opts: ["Reply immediately with ALL CAPS","Wait until morning to respond","Send 47 follow-up messages","Call them back repeatedly"],
    answer: 1, tip: "Respecting others' time shows digital maturity." },
  { q: "A friend posts something embarrassing. The right move?",
    opts: ["Screenshot and meme it","Privately let them know","Repost with commentary","Ignore and pretend you didn't see"],
    answer: 1, tip: "A private heads-up protects trust." },
  { q: "You disagree with a take online. Best approach?",
    opts: ["Type a 12-paragraph rebuttal","Engage with one thoughtful point","Ratio them","Subtweet about it"],
    answer: 1, tip: "Concise, thoughtful replies earn respect." },
  { q: "Someone new joins the community. What do you do?",
    opts: ["Ignore them until they prove themselves","Welcome them and share helpful info","Test them with inside jokes","Gate-keep the best channels"],
    answer: 1, tip: "Welcoming newcomers strengthens communities." },
  { q: "You accidentally send a message to the wrong person. What now?",
    opts: ["Pretend it never happened","Acknowledge the mistake honestly","Delete your account","Blame autocorrect aggressively"],
    answer: 1, tip: "Owning mistakes builds credibility." },
  { q: "Your friend's stream has 2 viewers. You should...",
    opts: ["Tell them to give up","Drop in, chat, and encourage them","Ignore it completely","Mock the view count publicly"],
    answer: 1, tip: "Supporting others' efforts costs nothing." },
  { q: "Someone asks a question that's easily searchable. Best response?",
    opts: ["LMGTFY link","Answer helpfully or point to a resource","Ignore them","Publicly shame them for not searching"],
    answer: 1, tip: "Helpful answers make communities welcoming." },
  { q: "You see misinformation being shared. What do you do?",
    opts: ["Share it too, it's viral","Politely correct with a source","Start a flame war about it","Report the person and move on"],
    answer: 1, tip: "Polite corrections with sources are most effective." },
  { q: "A conversation is getting heated. Best de-escalation?",
    opts: ["Add fuel with hot takes","Suggest taking a break or changing topic","Pick a side loudly","Leave without saying anything"],
    answer: 1, tip: "Cool heads keep communities intact." },
  { q: "Someone gives you constructive criticism. You should...",
    opts: ["Get defensive immediately","Consider it thoughtfully and thank them","Block them","Write a callout post"],
    answer: 1, tip: "Gracefully receiving feedback shows strength." },
  { q: "You notice someone's mic is on and they don't know. You...",
    opts: ["Record and share it","Privately DM them about it","Announce it for laughs","Mute them without telling"],
    answer: 1, tip: "A quiet DM prevents embarrassment." },
  { q: "A thread is going off-topic. Best move?",
    opts: ["Keep derailing it further","Gently steer back or start a new thread","Complain loudly about it","Tag a moderator immediately"],
    answer: 1, tip: "Self-moderation keeps spaces organized." },
  { q: "You're about to send an angry reply. What first?",
    opts: ["Send it raw and unfiltered","Take a breath and rewrite calmly","Save as draft forever","Type it, delete, type again, send"],
    answer: 1, tip: "A pause before sending prevents regret." },
];

let currentRiddle = null;

async function init() {
  try {
    const { user } = await supabaseSession();
    userId = user.id;
    console.log('[door-access] authed as', userId);

    // Check for existing row
    const { data, error: selErr } = await supabase.from('door_elo').select('*').eq('user_id', userId).limit(1);
    if (selErr) console.warn('[door-access] select error:', selErr.message);

    if (!data || data.length === 0) {
      // Resolve username
      let username = 'Anon';
      try {
        const stored = localStorage.getItem('sloppy-profile');
        if (stored) { const p = JSON.parse(stored); if (p.username) username = p.username; }
      } catch(e) {}
      if (username === 'Anon') {
        try {
          const { data: prof } = await supabase.from('sloppygram_profiles').select('username').eq('user_id', userId).limit(1);
          if (prof && prof[0]?.username) username = prof[0].username;
        } catch(e) {}
      }

      const { error: insErr } = await supabase.from('door_elo').insert({
        user_id: userId, username, elo: 1000, wins: 0, losses: 0, challenges: 0
      });
      if (insErr) {
        console.error('[door-access] insert error:', insErr.message);
        // If insert failed due to duplicate, that's fine — row exists from another tab/session
        if (!insErr.message.includes('duplicate')) {
          document.getElementById('loading').textContent = 'Error creating profile: ' + insErr.message;
          return;
        }
      }
    }

    await refresh();

    // Load name into input
    if (myRow) document.getElementById('name-input').value = myRow.username || '';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadRiddle();
  } catch(e) {
    console.error('[door-access] init error:', e);
    document.getElementById('loading').textContent = 'Error: ' + e.message;
  }
}

async function refresh() {
  const { data: all, error: refErr } = await supabase.from('door_elo').select('*').order('elo', { ascending: false });
  if (refErr) { console.error('[door-access] refresh error:', refErr.message); return; }
  allPlayers = all || [];
  myRow = allPlayers.find(p => p.user_id === userId);
  if (!myRow) { console.warn('[door-access] user row not found in leaderboard'); }

  const totalPlayers = allPlayers.length;
  const myRank = allPlayers.findIndex(p => p.user_id === userId) + 1;
  const cutoff = Math.max(1, Math.ceil(totalPlayers * 0.1));
  const hasAccess = myRank > 0 && myRank <= cutoff;

  // Update access card
  const card = document.getElementById('access-card');
  const status = document.getElementById('access-status');
  const eloDisp = document.getElementById('elo-display');
  const rankInfo = document.getElementById('rank-info');

  card.className = 'access-card ' + (hasAccess ? 'granted' : 'denied');
  status.className = 'access-status ' + (hasAccess ? 'granted' : 'denied');
  status.textContent = hasAccess ? 'ACCESS GRANTED' : 'ACCESS DENIED';
  eloDisp.className = 'elo-display ' + (hasAccess ? 'granted' : 'denied');
  eloDisp.textContent = myRow ? myRow.elo : '—';

  if (myRow) {
    const needed = hasAccess ? 0 : (allPlayers[cutoff - 1]?.elo || 1000) - myRow.elo + 1;
    rankInfo.innerHTML = `Rank <strong>#${myRank}</strong> of ${totalPlayers}` +
      (hasAccess ? ' — you are in the top 10%' : ` — need <strong>+${needed}</strong> Elo for access`);
    document.getElementById('s-wins').textContent = myRow.wins;
    document.getElementById('s-losses').textContent = myRow.losses;
    document.getElementById('s-matches').textContent = myRow.challenges;
  }

  // Door visual
  const frame = document.getElementById('door-frame');
  const glow = document.getElementById('door-glow');
  const label = document.getElementById('door-label');
  frame.className = 'door-frame ' + (hasAccess ? 'open' : 'closed');
  glow.className = 'door-glow ' + (hasAccess ? 'open' : '');
  label.className = 'door-label ' + (hasAccess ? 'open' : 'closed');
  label.textContent = hasAccess ? 'OPEN' : 'LOCKED';

  // Leaderboard
  document.getElementById('lb-count').textContent = totalPlayers + ' player' + (totalPlayers !== 1 ? 's' : '');
  const list = document.getElementById('lb-list');
  list.innerHTML = '';

  // Show top 20 + current user if not in top 20
  const shown = allPlayers.slice(0, 20);
  const meInTop = shown.some(p => p.user_id === userId);

  for (let i = 0; i < shown.length; i++) {
    const p = shown[i];
    const rank = i + 1;
    const isMe = p.user_id === userId;
    const isTop10 = rank <= cutoff;

    let rankClass = '';
    if (rank === 1) rankClass = 'gold';
    else if (rank === 2) rankClass = 'silver';
    else if (rank === 3) rankClass = 'bronze';

    list.innerHTML += `
      <div class="lb-row${isMe ? ' me' : ''}${isTop10 ? ' top10' : ''}">
        <div class="lb-rank ${rankClass}">#${rank}</div>
        <div class="lb-name">${esc(p.username || 'Anon')}</div>
        <div class="lb-elo${isTop10 ? ' granted' : ''}">${p.elo}</div>
        <div class="lb-badge ${isTop10 ? 'in' : 'out'}">${isTop10 ? 'IN' : 'OUT'}</div>
      </div>`;
  }

  if (!meInTop && myRank > 0) {
    list.innerHTML += `
      <div style="text-align:center;color:var(--dim);font-size:0.55rem;padding:6px">...</div>
      <div class="lb-row me">
        <div class="lb-rank">#${myRank}</div>
        <div class="lb-name">${esc(myRow.username || 'Anon')}</div>
        <div class="lb-elo">${myRow.elo}</div>
        <div class="lb-badge out">OUT</div>
      </div>`;
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

window.saveName = async function() {
  const name = document.getElementById('name-input').value.trim();
  if (!name || !userId) return;
  await supabase.from('door_elo').update({ username: name }).eq('user_id', userId);
  const saved = document.getElementById('name-saved');
  saved.style.opacity = '1';
  setTimeout(() => saved.style.opacity = '0', 1500);
  await refresh();
};

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.saveName();
});

window.challenge = async function() {
  if (Date.now() < cooldownEnd) return;
  if (!myRow) { await refresh(); if (!myRow) return; }
  if (allPlayers.length < 2) return;

  const btn = document.getElementById('challenge-btn');
  btn.disabled = true;
  btn.textContent = 'Matching...';

  // Pick a random opponent (not self)
  const opponents = allPlayers.filter(p => p.user_id !== userId);
  if (opponents.length === 0) { btn.disabled = false; btn.textContent = 'Find Opponent'; return; }
  const opp = opponents[Math.floor(Math.random() * opponents.length)];

  // Elo expected scores
  const myElo = myRow.elo;
  const oppElo = opp.elo;
  const expectedMe = 1 / (1 + Math.pow(10, (oppElo - myElo) / 400));

  // Outcome — weighted random (skill matters but upsets happen)
  const roll = Math.random();
  const iWin = roll < expectedMe;

  // K-factor
  const K = 32;
  const myNew = Math.round(myElo + K * ((iWin ? 1 : 0) - expectedMe));
  const oppNew = Math.round(oppElo + K * ((iWin ? 0 : 1) - (1 - expectedMe)));

  // Update both (we can only update our own row due to RLS)
  const myFields = {
    elo: myNew,
    wins: myRow.wins + (iWin ? 1 : 0),
    losses: myRow.losses + (iWin ? 0 : 1),
    challenges: myRow.challenges + 1,
    last_challenge: new Date().toISOString()
  };
  const { error: updErr } = await supabase.from('door_elo').update(myFields).eq('user_id', userId);
  if (updErr) { console.error('[door-access] challenge update error:', updErr.message); btn.disabled = false; btn.textContent = 'Find Opponent'; return; }

  // Show result
  const delta = myNew - myElo;
  const result = document.getElementById('challenge-result');
  result.style.display = 'block';
  result.className = 'challenge-result ' + (iWin ? 'win' : 'lose');
  result.innerHTML = iWin
    ? `<strong>Victory!</strong> You beat <strong>${esc(opp.username || 'Anon')}</strong> (${oppElo})<br>Elo: ${myElo} → ${myNew} <strong>(+${delta})</strong>`
    : `<strong>Defeat.</strong> Lost to <strong>${esc(opp.username || 'Anon')}</strong> (${oppElo})<br>Elo: ${myElo} → ${myNew} <strong>(${delta})</strong>`;

  // Cooldown (5s)
  cooldownEnd = Date.now() + 5000;
  const cdBar = document.getElementById('cooldown-bar');
  const cdFill = document.getElementById('cooldown-fill');
  cdBar.style.display = 'block';

  function tickCooldown() {
    const remaining = cooldownEnd - Date.now();
    if (remaining <= 0) {
      cdBar.style.display = 'none';
      btn.disabled = false;
      btn.textContent = 'Find Opponent';
      return;
    }
    cdFill.style.width = ((remaining / 5000) * 100) + '%';
    requestAnimationFrame(tickCooldown);
  }
  tickCooldown();

  await refresh();
};

function loadRiddle() {
  const now = Date.now();
  const cdEl = document.getElementById('riddle-cooldown');
  const fb = document.getElementById('riddle-feedback');
  fb.style.display = 'none';

  if (now < riddleCooldownEnd) {
    const secs = Math.ceil((riddleCooldownEnd - now) / 1000);
    cdEl.textContent = `Next riddle in ${secs}s`;
    setTimeout(loadRiddle, 1000);
    return;
  }
  cdEl.textContent = '';

  currentRiddle = RIDDLES[Math.floor(Math.random() * RIDDLES.length)];
  document.getElementById('riddle-q').textContent = currentRiddle.q;
  const optBox = document.getElementById('riddle-options');
  optBox.innerHTML = '';
  currentRiddle.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'riddle-opt';
    btn.textContent = opt;
    btn.onclick = () => answerRiddle(i);
    optBox.appendChild(btn);
  });
}

async function answerRiddle(idx) {
  if (!currentRiddle) return;
  if (!myRow) { await refresh(); if (!myRow) return; }
  const correct = idx === currentRiddle.answer;
  const btns = document.querySelectorAll('.riddle-opt');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === currentRiddle.answer) b.classList.add('correct');
    if (i === idx && !correct) b.classList.add('wrong');
  });

  const fb = document.getElementById('riddle-feedback');
  const eloChange = correct ? 15 : -8;
  const newElo = myRow.elo + eloChange;

  const { error: rUpdErr } = await supabase.from('door_elo').update({
    elo: newElo,
    wins: myRow.wins + (correct ? 1 : 0),
    losses: myRow.losses + (correct ? 0 : 1),
    challenges: myRow.challenges + 1,
    last_challenge: new Date().toISOString()
  }).eq('user_id', userId);
  if (rUpdErr) console.error('[door-access] riddle update error:', rUpdErr.message);

  fb.style.display = 'block';
  if (correct) {
    fb.className = 'riddle-feedback pass';
    fb.innerHTML = `<strong>Correct!</strong> +${eloChange} Elo. ${currentRiddle.tip}`;
  } else {
    fb.className = 'riddle-feedback fail';
    fb.innerHTML = `<strong>Wrong.</strong> ${eloChange} Elo. ${currentRiddle.tip}`;
  }

  riddleCooldownEnd = Date.now() + 15000;
  await refresh();
  setTimeout(loadRiddle, 15000);
  document.getElementById('riddle-cooldown').textContent = 'Next riddle in 15s';
}

init();
</script>
</body>
</html>
