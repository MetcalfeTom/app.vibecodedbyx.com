<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sloppy Sketch</title>
<meta name="description" content="A minimalist shared canvas. Pick a neon brush, scribble together. Share a 4-letter room code with chat.">
<meta property="og:title" content="Sloppy Sketch">
<meta property="og:description" content="A minimalist shared canvas. Pick a neon brush, scribble together. Share a 4-letter room code with chat.">
<meta property="og:url" content="https://sloppy.live/sloppy-sketch">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Minimalist%20dark%20collaborative%20drawing%20canvas%20with%20multiple%20neon%20cursors%20leaving%20glowing%20cyan%20magenta%20and%20lime%20brush%20strokes%2C%20clean%20glass%20toolbar%2C%20vaporwave%20aesthetic?width=1200&height=630&model=flux&nologo=true&seed=4242">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%96%8D">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=IBM+Plex+Mono:wght@400;600&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0612;
    --paper:#f4ede0;
    --ink-3:#7a7280;
    --cyan:#5ec2ff;
    --magenta:#ff5ea1;
    --lime:#9bff5e;
    --amber:#ffb15e;
    --plum:#a86bff;
    --blood:#ff5e5e;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{
    width:100%; min-height:100dvh;
    background:
      radial-gradient(ellipse at 15% 0%, rgba(168,107,255,0.10), transparent 50%),
      radial-gradient(ellipse at 85% 100%, rgba(255,94,161,0.08), transparent 55%),
      var(--void);
    color:var(--paper);
    font-family:'IBM Plex Mono', monospace;
    overflow:hidden;
    touch-action:none;
  }

  .stage{
    position:fixed;
    inset:0;
    display:grid;
    grid-template-columns: 200px 1fr;
    grid-template-rows: auto 1fr;
    grid-template-areas:
      "head head"
      "side canvas";
    gap: 0.8rem;
    padding: 0.9rem 1rem;
  }
  @media (max-width: 720px){
    .stage{
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
      grid-template-areas: "head" "side" "canvas";
    }
  }

  /* ── Masthead ── */
  header{
    grid-area: head;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:1rem;
    flex-wrap:wrap;
  }
  h1{
    font-family:'Major Mono Display', monospace;
    font-weight:400;
    font-size:clamp(1.2rem, 2.4vw, 1.9rem);
    letter-spacing:0.14em;
    line-height:1;
    color:var(--paper);
    text-shadow: 0 0 12px rgba(94,194,255,0.45);
  }
  h1 .dot{ color:var(--magenta); }
  .room-row{
    display:flex;
    gap: 0.4rem;
    align-items:center;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: rgba(244,237,224,0.7);
    letter-spacing: 0.08em;
  }
  .room-row .status{
    display:inline-flex;
    align-items:center;
    gap:0.35rem;
  }
  .live-dot{
    width: 0.5rem; height: 0.5rem; border-radius:50%;
    background: var(--ink-3);
    box-shadow: 0 0 4px currentColor;
  }
  .live-dot.live{ background: var(--lime); color: var(--lime); animation: pulse 1.4s ease-in-out infinite; }
  .live-dot.connecting{ background: var(--amber); color: var(--amber); }
  .live-dot.error{ background: var(--blood); color: var(--blood); }
  @keyframes pulse{ 50% { opacity: 0.5; } }
  .room-row input{
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(244,237,224,0.25);
    color: var(--paper);
    padding: 0.4rem 0.6rem;
    border-radius: 4px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    width: 5.5rem;
    text-transform: uppercase;
    text-align: center;
    letter-spacing: 0.25em;
    min-height: 2rem;
  }
  .room-row input:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 1px; }
  .room-row .pill-btn{
    background: rgba(94,194,255,0.12);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 0.4rem 0.7rem;
    border-radius: 4px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    min-height: 2rem;
  }
  .room-row .pill-btn:hover{ background: rgba(94,194,255,0.22); }
  .room-row .pill-btn:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px; }
  .room-row .pill-btn.ghost{ background: transparent; color: rgba(244,237,224,0.7); border-color: rgba(244,237,224,0.35); }
  .room-row .pill-btn.ghost:hover{ background: rgba(244,237,224,0.08); }
  .room-row b{ color: var(--paper); letter-spacing: 0.3em; }

  /* ── Sidebar toolbar ── */
  aside{
    grid-area: side;
    background: rgba(15, 10, 30, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(244,237,224,0.10);
    border-radius: 6px;
    padding: 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  @media (max-width: 720px){
    aside{ flex-direction: row; gap: 0.6rem; flex-wrap: wrap; padding: 0.55rem; }
  }
  .tool-section{ display: flex; flex-direction: column; gap: 0.4rem; }
  .tool-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    color: var(--ink-3);
    text-transform: uppercase;
  }
  .swatches{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.4rem;
  }
  .swatch{
    aspect-ratio: 1;
    border-radius: 50%;
    border: 2px solid rgba(244,237,224,0.15);
    cursor: pointer;
    transition: transform 0.1s ease, border-color 0.1s ease, box-shadow 0.1s ease;
    min-width: 2rem;
  }
  .swatch:hover{ transform: scale(1.08); }
  .swatch:focus-visible{ outline: 2px solid var(--paper); outline-offset: 2px; }
  .swatch.active{
    border-color: var(--paper);
    transform: scale(1.1);
    box-shadow: 0 0 10px currentColor;
  }
  .sizes{
    display: flex;
    gap: 0.4rem;
    align-items: center;
  }
  .size-btn{
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(244,237,224,0.2);
    color: var(--paper);
    padding: 0.5rem;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s ease;
    min-height: 2.25rem;
  }
  .size-btn:hover{ background: rgba(244,237,224,0.08); }
  .size-btn:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px; }
  .size-btn.active{ background: rgba(94,194,255,0.15); border-color: var(--cyan); }
  .size-btn .dot{
    background: currentColor;
    border-radius: 50%;
  }
  .actions{
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-top: auto;
  }
  @media (max-width: 720px){
    .actions{ flex-direction: row; margin-top: 0; }
  }
  .action-btn{
    background: transparent;
    color: var(--paper);
    border: 1px solid rgba(244,237,224,0.3);
    padding: 0.5rem 0.7rem;
    border-radius: 4px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 2.25rem;
  }
  .action-btn:hover{ background: rgba(244,237,224,0.06); }
  .action-btn:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px; }
  .action-btn.danger{ color: var(--blood); border-color: var(--blood); }
  .action-btn.danger:hover{ background: rgba(255,94,94,0.1); }
  .roster{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--ink-3);
    border-top: 1px dashed rgba(244,237,224,0.15);
    padding-top: 0.6rem;
  }
  .roster ul{ list-style: none; padding: 0; margin: 0.3rem 0 0; }
  .roster li{
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.1rem 0;
    color: var(--paper);
  }
  .roster li .dot{
    width: 0.6rem; height: 0.6rem; border-radius: 50%;
    background: var(--ink-3);
    box-shadow: 0 0 4px currentColor;
  }
  .roster li.me .name{ font-weight: 600; }

  /* ── Canvas area ── */
  .canvas-wrap{
    grid-area: canvas;
    position: relative;
    background: #050505;
    border: 1px solid rgba(244,237,224,0.10);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 6px 30px rgba(0,0,0,0.5);
  }
  canvas{
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }
  /* radial vignette overlay */
  .canvas-wrap::after{
    content:'';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.4) 100%);
  }
  /* remote cursors layer (drawn on top via separate canvas) */
  .cursor-layer{
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  /* small floating toast for status messages */
  .toast{
    position: fixed;
    bottom: 1rem; left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: rgba(10, 6, 18, 0.92);
    color: var(--paper);
    padding: 0.55rem 1rem;
    border-radius: 6px;
    border: 1px solid rgba(168,107,255,0.4);
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    box-shadow: 0 4px 18px rgba(0,0,0,0.5);
    transition: transform 0.25s ease;
    z-index: 50;
    pointer-events: none;
  }
  .toast.show{ transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce){
    .live-dot.live{ animation: none !important; }
    .swatch, .toast{ transition: none !important; transform: none !important; }
  }
</style>
</head>
<body>
<main class="stage">
  <header>
    <h1>sloppy<span class="dot">·</span>sketch</h1>
    <div class="room-row">
      <span class="status"><span class="live-dot" id="dot"></span><span id="conn">solo · pick a room</span></span>
      <input type="text" id="room-input" placeholder="ROOM" maxlength="4" autocomplete="off" aria-label="Room code">
      <button type="button" class="pill-btn" id="btn-join">JOIN</button>
      <button type="button" class="pill-btn ghost" id="btn-new">NEW</button>
    </div>
  </header>

  <aside aria-label="Brush toolbar">
    <div class="tool-section">
      <div class="tool-label">brush</div>
      <div class="swatches" role="radiogroup" aria-label="Brush color">
        <button class="swatch active" type="button" data-color="#5ec2ff" style="background:#5ec2ff; color:#5ec2ff" aria-label="cyan"></button>
        <button class="swatch" type="button" data-color="#ff5ea1" style="background:#ff5ea1; color:#ff5ea1" aria-label="magenta"></button>
        <button class="swatch" type="button" data-color="#9bff5e" style="background:#9bff5e; color:#9bff5e" aria-label="lime"></button>
        <button class="swatch" type="button" data-color="#ffb15e" style="background:#ffb15e; color:#ffb15e" aria-label="amber"></button>
        <button class="swatch" type="button" data-color="#a86bff" style="background:#a86bff; color:#a86bff" aria-label="plum"></button>
        <button class="swatch" type="button" data-color="#ff5e5e" style="background:#ff5e5e; color:#ff5e5e" aria-label="blood-red"></button>
      </div>
    </div>
    <div class="tool-section">
      <div class="tool-label">size</div>
      <div class="sizes" role="radiogroup" aria-label="Brush size">
        <button class="size-btn" type="button" data-size="2" aria-label="thin">
          <span class="dot" style="width:6px; height:6px;"></span>
        </button>
        <button class="size-btn active" type="button" data-size="5" aria-label="medium">
          <span class="dot" style="width:11px; height:11px;"></span>
        </button>
        <button class="size-btn" type="button" data-size="10" aria-label="thick">
          <span class="dot" style="width:18px; height:18px;"></span>
        </button>
      </div>
    </div>
    <div class="actions">
      <button class="action-btn" id="btn-save" type="button">Save PNG</button>
      <button class="action-btn danger" id="btn-clear" type="button">Clear canvas</button>
    </div>
    <div class="roster" id="roster" hidden>
      <div class="tool-label">artists</div>
      <ul id="roster-list"></ul>
    </div>
  </aside>

  <div class="canvas-wrap">
    <canvas id="cv"></canvas>
    <canvas class="cursor-layer" id="cursors"></canvas>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
/* ════════════════════════════════════════════════════════════
   SLOPPY SKETCH — minimalist shared canvas with neon brushes
   ──────────────────────────────────────────────────────────── */

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const SUPABASE_URL = 'https://yjyxteqzhhmtrgcaekgz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqeXh0ZXF6aGhtdHJnY2Fla2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTg3NDIsImV4cCI6MjA3MjkzNDc0Mn0.G8SRde7IN2QFW1EnASM8IS32IUYR2eenCCjdDdioiBU';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ── DPR-aware canvas setup ── */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const cursorCv = document.getElementById('cursors');
const curCtx = cursorCv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const wrap = cv.parentElement;
  W = wrap.clientWidth; H = wrap.clientHeight;
  for (const c of [cv, cursorCv]){
    c.width = Math.floor(W * DPR);
    c.height = Math.floor(H * DPR);
    c.style.width = W + 'px';
    c.style.height = H + 'px';
    c.getContext('2d').setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  // re-replay any strokes that already exist so resize doesn't lose them
  redrawAll();
}
window.addEventListener('resize', resize);
setTimeout(resize, 0);

/* ── Brush state ── */
const brush = { color: '#5ec2ff', size: 5 };
document.querySelectorAll('.swatch').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    brush.color = el.dataset.color;
  });
});
document.querySelectorAll('.size-btn').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.size-btn').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    brush.size = +el.dataset.size;
  });
});

/* ── Stroke storage (local replay buffer for resize) ── */
// Each stroke: { id, color, size, points: [[x,y], [x,y], ...] }
// Points are stored as 0-1 normalised so resize re-replays correctly.
const allStrokes = [];

function drawStrokeSegment(color, size, x0, y0, x1, y1){
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = color;
  ctx.shadowBlur = Math.max(4, size * 1.4);
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.stroke();
  ctx.restore();
}
function drawStrokeFull(s){
  for (let i = 1; i < s.points.length; i++){
    const [x0, y0] = s.points[i - 1];
    const [x1, y1] = s.points[i];
    drawStrokeSegment(s.color, s.size, x0 * W, y0 * H, x1 * W, y1 * H);
  }
  // single-point stroke = dot
  if (s.points.length === 1){
    const [x, y] = s.points[0];
    ctx.save();
    ctx.fillStyle = s.color;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = Math.max(4, s.size * 1.4);
    ctx.beginPath();
    ctx.arc(x * W, y * H, s.size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}
function redrawAll(){
  ctx.clearRect(0, 0, W, H);
  for (const s of allStrokes) drawStrokeFull(s);
}

/* ── Local drawing input ── */
let currentStroke = null;     // { id, color, size, points, lastSent, lastBroadcastIdx }
let drawing = false;
let nextStrokeNum = 0;
function evtXY(e){
  const r = cv.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX - r.left) / r.width * W, y: (t.clientY - r.top) / r.height * H };
}
function startStroke(x, y){
  const id = ME.id + ':' + (nextStrokeNum++);
  currentStroke = {
    id, color: brush.color, size: brush.size,
    points: [[x / W, y / H]],
    lastBroadcastIdx: 0,
  };
  allStrokes.push(currentStroke);
  // draw the initial dot
  drawStrokeFull(currentStroke);
  // broadcast stroke-start
  mpSend('stroke-start', { id, color: brush.color, size: brush.size, x: x/W, y: y/H });
}
function contStroke(x, y){
  if (!currentStroke) return;
  const last = currentStroke.points[currentStroke.points.length - 1];
  const x0 = last[0] * W, y0 = last[1] * H;
  drawStrokeSegment(currentStroke.color, currentStroke.size, x0, y0, x, y);
  currentStroke.points.push([x / W, y / H]);
  // flush new points to other clients every ~80ms
  mpFlushCurrentStrokeIfDue();
}
function endStroke(){
  if (!currentStroke) return;
  // flush any tail points
  mpFlushCurrentStrokeIfDue(true);
  mpSend('stroke-end', { id: currentStroke.id });
  currentStroke = null;
  drawing = false;
}

cv.addEventListener('pointerdown', e => {
  cv.setPointerCapture(e.pointerId);
  drawing = true;
  const { x, y } = evtXY(e);
  startStroke(x, y);
  e.preventDefault();
});
cv.addEventListener('pointermove', e => {
  const { x, y } = evtXY(e);
  if (drawing) contStroke(x, y);
  mpQueueCursor(x, y);
});
cv.addEventListener('pointerup', e => { endStroke(); cv.releasePointerCapture(e.pointerId); });
cv.addEventListener('pointercancel', endStroke);
cv.addEventListener('pointerleave', () => { if (drawing) endStroke(); });

/* ── Toolbar actions ── */
document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm('Wipe the entire canvas for everyone in the room? (Solo wipes only yours.)')) return;
  allStrokes.length = 0;
  redrawAll();
  mpSend('clear', { by: ME.id });
  toast('canvas wiped');
});
document.getElementById('btn-save').addEventListener('click', () => {
  // build a composite at current size with a dark background baked in
  const out = document.createElement('canvas');
  out.width = cv.width; out.height = cv.height;
  const oc = out.getContext('2d');
  oc.fillStyle = '#050505';
  oc.fillRect(0, 0, out.width, out.height);
  oc.drawImage(cv, 0, 0);
  const url = out.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = 'sloppy-sketch-' + Date.now() + '.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('saved sloppy-sketch.png');
});

/* ── Toast ── */
const toastEl = document.getElementById('toast');
let toastT = null;
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => toastEl.classList.remove('show'), 2000);
}

/* ── Multiplayer ── */
const ROOM_ALPHA = 'ABCDEFGHJKLMNPRSTUVWXYZ23456789';
function randomRoom(){
  let s = '';
  for (let i = 0; i < 4; i++) s += ROOM_ALPHA[Math.floor(Math.random() * ROOM_ALPHA.length)];
  return s;
}
function nameFromId(id){
  const adj = ['SWIFT','BOLD','CALM','VEX','NOVA','HOLLOW','GHOST','PRISM','WIRE','DRIFT','MOSS','EMBER','SAGE','NEON'];
  let h = 0; for (let i = 0; i < id.length; i++) h = ((h<<5)-h + id.charCodeAt(i))|0;
  return adj[Math.abs(h) % adj.length] + '-' + (Math.abs(h) % 90 + 10);
}
function colorFromId(id){
  let h = 0; for (let i = 0; i < id.length; i++) h = ((h<<5)-h + id.charCodeAt(i))|0;
  return 'hsl(' + (Math.abs(h) % 360) + ', 80%, 70%)';
}
const ME = {
  id: 'a_' + Math.random().toString(36).slice(2, 10),
  name: '',
  color: '',
};
ME.name = nameFromId(ME.id);
ME.color = colorFromId(ME.id);
const MP = {
  channel: null,
  room: null,
  enabled: false,
  artists: new Map(),     // id → { name, color, lastCursor:{x,y,t}, lastSeen }
  remoteStrokes: new Map(), // id → live stroke being drawn by a remote artist
  lastCursorBroadcast: 0,
};

function setStatus(state, label){
  document.getElementById('dot').className = 'live-dot ' + state;
  document.getElementById('conn').textContent = label;
}
function joinRoom(rawCode){
  const code = (rawCode || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 4);
  if (code.length !== 4){ toast('room codes are 4 letters/numbers'); return; }
  setStatus('connecting', 'connecting · ' + code);
  if (MP.channel){ try { supabase.removeChannel(MP.channel); } catch(_){} MP.channel = null; }
  MP.room = code;
  MP.artists.clear();
  MP.remoteStrokes.clear();
  document.getElementById('room-input').value = code;
  try { localStorage.setItem('sloppy-sketch-room', code); } catch(_){}
  const ch = supabase.channel('sloppy-sketch:room:' + code, {
    config: { broadcast: { self: false }, presence: { key: ME.id } },
  });
  ch.on('broadcast', { event: 'stroke-start' }, msg => {
    const p = msg.payload;
    if (!p || p.from === ME.id) return;
    const s = { id: p.id, color: p.color, size: p.size, points: [[p.x, p.y]] };
    MP.remoteStrokes.set(p.id, s);
    allStrokes.push(s);
    drawStrokeFull(s);
    bumpArtistSeen(p.from);
  });
  ch.on('broadcast', { event: 'stroke-cont' }, msg => {
    const p = msg.payload;
    if (!p || p.from === ME.id) return;
    const s = MP.remoteStrokes.get(p.id);
    if (!s) return; // start hasn't arrived yet — drop
    for (const pt of p.points){
      const last = s.points[s.points.length - 1];
      drawStrokeSegment(s.color, s.size, last[0] * W, last[1] * H, pt[0] * W, pt[1] * H);
      s.points.push(pt);
    }
    bumpArtistSeen(p.from);
  });
  ch.on('broadcast', { event: 'stroke-end' }, msg => {
    const p = msg.payload;
    if (!p || p.from === ME.id) return;
    MP.remoteStrokes.delete(p.id);
  });
  ch.on('broadcast', { event: 'clear' }, msg => {
    if (!msg.payload || msg.payload.by === ME.id) return;
    allStrokes.length = 0;
    MP.remoteStrokes.clear();
    redrawAll();
    toast('canvas wiped by ' + (MP.artists.get(msg.payload.by)?.name || 'someone'));
  });
  ch.on('broadcast', { event: 'cursor' }, msg => {
    const p = msg.payload;
    if (!p || p.from === ME.id) return;
    let a = MP.artists.get(p.from);
    if (!a){
      a = { name: p.name || nameFromId(p.from), color: colorFromId(p.from), lastSeen: 0, lastCursor: null };
      MP.artists.set(p.from, a);
      renderRoster();
    }
    a.lastCursor = { x: p.x * W, y: p.y * H, t: performance.now() };
    a.lastSeen = performance.now();
  });
  ch.on('broadcast', { event: 'history-req' }, async msg => {
    // when a new artist joins, the OLDEST member of the room replays
    // every stroke that exists locally. Sent as chunks of 8 strokes to
    // avoid huge single payloads. Only the lex-smallest ID responds so
    // a new joiner doesn't get 4 copies.
    if (!msg.payload || msg.payload.from === ME.id) return;
    const ids = [ME.id, ...Array.from(MP.artists.keys())].sort();
    if (ids[0] !== ME.id) return;
    const chunkSize = 8;
    for (let i = 0; i < allStrokes.length; i += chunkSize){
      const chunk = allStrokes.slice(i, i + chunkSize).map(s => ({
        id: s.id, color: s.color, size: s.size, points: s.points,
      }));
      ch.send({ type:'broadcast', event:'history', payload:{ from: ME.id, to: msg.payload.from, strokes: chunk } });
    }
  });
  ch.on('broadcast', { event: 'history' }, msg => {
    const p = msg.payload;
    if (!p || p.to !== ME.id) return;
    for (const s of p.strokes){
      if (allStrokes.some(x => x.id === s.id)) continue; // dedup
      allStrokes.push({ id: s.id, color: s.color, size: s.size, points: s.points });
      drawStrokeFull(s);
    }
  });
  ch.on('presence', { event: 'sync' }, () => {
    const present = new Set(Object.keys(ch.presenceState() || {}));
    for (const aid of MP.artists.keys()) if (!present.has(aid)) MP.artists.delete(aid);
    renderRoster();
  });
  ch.subscribe(async (status) => {
    if (status === 'SUBSCRIBED'){
      MP.channel = ch;
      MP.enabled = true;
      setStatus('live', 'live · room ' + code);
      document.getElementById('roster').hidden = false;
      await ch.track({ id: ME.id, name: ME.name, joinedAt: Date.now() });
      // request canvas history from existing members
      ch.send({ type:'broadcast', event:'history-req', payload:{ from: ME.id } });
      renderRoster();
      toast('joined room ' + code);
    } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT'){
      setStatus('error', 'connection failed');
    }
  });
}
function mpSend(event, payload){
  if (!MP.enabled || !MP.channel) return;
  MP.channel.send({ type: 'broadcast', event, payload: { ...payload, from: ME.id } });
}
function mpFlushCurrentStrokeIfDue(force){
  if (!MP.enabled || !currentStroke) return;
  const newCount = currentStroke.points.length - currentStroke.lastBroadcastIdx;
  if (!force && newCount < 4) return;
  if (newCount === 0) return;
  const pts = currentStroke.points.slice(currentStroke.lastBroadcastIdx);
  mpSend('stroke-cont', { id: currentStroke.id, points: pts });
  currentStroke.lastBroadcastIdx = currentStroke.points.length;
}
function bumpArtistSeen(id){
  let a = MP.artists.get(id);
  if (!a){
    a = { name: nameFromId(id), color: colorFromId(id), lastSeen: 0, lastCursor: null };
    MP.artists.set(id, a);
    renderRoster();
  }
  a.lastSeen = performance.now();
}

/* Cursor presence — throttled to ~8Hz */
let lastCursorQueued = null;
function mpQueueCursor(x, y){
  lastCursorQueued = { x: x / W, y: y / H };
}
setInterval(() => {
  if (!MP.enabled || !lastCursorQueued) return;
  if (performance.now() - MP.lastCursorBroadcast < 110) return;
  MP.lastCursorBroadcast = performance.now();
  mpSend('cursor', { x: lastCursorQueued.x, y: lastCursorQueued.y, name: ME.name });
  lastCursorQueued = null;
}, 90);

/* Roster panel */
function renderRoster(){
  const list = document.getElementById('roster-list');
  const rows = [];
  rows.push('<li class="me"><span class="dot" style="color:' + ME.color + ';background:' + ME.color + ';"></span><span class="name">' + escapeHtml(ME.name) + ' · YOU</span></li>');
  for (const [id, a] of MP.artists){
    rows.push('<li><span class="dot" style="color:' + a.color + ';background:' + a.color + ';"></span><span class="name">' + escapeHtml(a.name) + '</span></li>');
  }
  list.innerHTML = rows.join('');
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* Remote-cursor draw loop (separate canvas layer so it doesn't dirty the stroke canvas) */
function renderCursors(){
  curCtx.clearRect(0, 0, W, H);
  const now = performance.now();
  for (const [id, a] of MP.artists){
    if (!a.lastCursor) continue;
    if (now - a.lastCursor.t > 4000) continue;
    const { x, y } = a.lastCursor;
    // small triangle pointer in the artist's color
    curCtx.save();
    curCtx.fillStyle = a.color;
    curCtx.strokeStyle = '#0a0612';
    curCtx.lineWidth = 1.5;
    curCtx.shadowColor = a.color;
    curCtx.shadowBlur = 8;
    curCtx.beginPath();
    curCtx.moveTo(x, y);
    curCtx.lineTo(x + 12, y + 10);
    curCtx.lineTo(x + 6,  y + 11);
    curCtx.lineTo(x + 4,  y + 16);
    curCtx.closePath();
    curCtx.fill();
    curCtx.stroke();
    // name label
    curCtx.shadowBlur = 0;
    curCtx.font = '11px "IBM Plex Mono", monospace';
    curCtx.fillStyle = a.color;
    curCtx.fillText(a.name, x + 18, y + 16);
    curCtx.restore();
  }
  requestAnimationFrame(renderCursors);
}
requestAnimationFrame(renderCursors);

/* Buttons + boot */
document.getElementById('btn-join').addEventListener('click', () => {
  joinRoom(document.getElementById('room-input').value);
});
document.getElementById('btn-new').addEventListener('click', () => {
  const code = randomRoom();
  joinRoom(code);
});
document.getElementById('room-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom(e.target.value);
});

try {
  const saved = localStorage.getItem('sloppy-sketch-room');
  if (saved) document.getElementById('room-input').value = saved;
} catch(_){}

setStatus('', 'solo · pick a room');
toast('drag to draw · pick a colour · share a room code to co-doodle');

window.addEventListener('beforeunload', () => {
  if (MP.channel){ try { MP.channel.send({ type:'broadcast', event:'leave', payload:{ from: ME.id } }); } catch(_){} }
});
</script>
</body>
