<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The NO Button — it always says no</title>
<meta name="description" content="One enormous red button. It says NO. It will always say NO. People keep pressing it anyway.">
<link rel="icon" href="https://emojicdn.elk.sh/🚫">
<meta property="og:title" content="The NO Button">
<meta property="og:description" content="One enormous red button. It always says NO. How many times will you press it?">
<meta property="og:url" content="https://sloppy.live/no-button">
<meta property="og:image" content="https://image.pollinations.ai/prompt/one%20giant%20glossy%20red%20arcade%20button%20on%20a%20cream%20pedestal%2C%20dramatic%20studio%20lighting%2C%20the%20word%20NO%20embossed%2C%20claymation%20style%2C%20playful?width=1200&height=630&seed=4242&nologo=true&model=flux&image=.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{ --cream:#f4ead6; --ink:#2a1f18; --red:#d43326; --red-dk:#8a1c12; --red-hi:#f06a55; --dim:#9a8a72; --focus:#2456c8; }
*{box-sizing:border-box;}
html{font-size:100%;}
body{margin:0; min-height:100vh; background:var(--cream); color:var(--ink); font-family:'Space Mono',monospace;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.2rem; padding:1.5rem; overflow-x:hidden;
  background-image:radial-gradient(ellipse at 50% 30%, rgba(212,51,38,.06), transparent 55%),
    repeating-linear-gradient(9deg, transparent 0 16px, rgba(120,90,40,.03) 16px 17px);}
body.shake{animation:sh .35s linear;}
@keyframes sh{0%,100%{transform:translate(0)}20%{transform:translate(-8px,3px) rotate(-.5deg)}40%{transform:translate(7px,-4px)}60%{transform:translate(-5px,2px) rotate(.4deg)}80%{transform:translate(4px,-2px)}}
h1{font-family:'Bricolage Grotesque',sans-serif; font-weight:300; font-size:clamp(1.2rem,4vw,1.7rem); margin:0; letter-spacing:.02em; text-align:center;}
h1 b{font-weight:800;}
#answer{font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(2.4rem,9vw,5rem); line-height:1.05; margin:0;
  min-height:2.2em; display:flex; align-items:center; text-align:center; max-width:44rem; justify-content:center;}
#answer.pop{animation:pop .3s ease-out;}
@keyframes pop{0%{transform:scale(.7); opacity:0;} 100%{transform:scale(1); opacity:1;}}
#big-no{position:relative; width:min(17rem,62vw); height:min(17rem,62vw); border-radius:50%; border:0; cursor:pointer;
  background:radial-gradient(circle at 34% 28%, var(--red-hi), var(--red) 46%, var(--red-dk) 100%);
  box-shadow:0 .9rem 0 var(--red-dk), 0 1.6rem 2.4rem rgba(90,20,10,.35), inset 0 -0.6rem 1.6rem rgba(0,0,0,.25), inset 0 .5rem 1rem rgba(255,255,255,.28);
  color:#fff; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(3.4rem,16vw,6.5rem); letter-spacing:.04em;
  text-shadow:0 4px 0 rgba(0,0,0,.28); transition:transform .06s, box-shadow .06s;}
#big-no:hover{filter:brightness(1.05);}
#big-no:active,#big-no.pressed{transform:translateY(.7rem); box-shadow:0 .2rem 0 var(--red-dk), 0 .7rem 1.2rem rgba(90,20,10,.3), inset 0 -0.3rem 1rem rgba(0,0,0,.3), inset 0 .4rem .8rem rgba(255,255,255,.2);}
#big-no:focus-visible{outline:4px solid var(--focus); outline-offset:6px;}
#counter{font-size:.8rem; color:var(--dim);}
#counter b{color:var(--ink); font-size:1.05rem;}
#milestone{font-family:'Bricolage Grotesque',sans-serif; font-weight:800; color:var(--red); font-size:1rem; min-height:1.4rem; text-align:center;}
.fly{position:fixed; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; color:var(--red); pointer-events:none; z-index:5; animation:fly 1.2s ease-out forwards;}
@keyframes fly{0%{opacity:1; transform:translate(0,0) rotate(0) scale(1);} 100%{opacity:0; transform:translate(var(--dx),var(--dy)) rotate(var(--rr)) scale(1.6);}}
#yes-q{position:fixed; bottom:1rem; right:1.2rem; font-size:.62rem; background:none; border:1px dashed var(--dim); border-radius:8px;
  color:var(--dim); padding:.4rem .7rem; cursor:pointer; min-height:2.75rem; display:none;}
#yes-q.on{display:block;}
#yes-q:focus-visible{outline:3px solid var(--focus); outline-offset:2px;}
footer{font-size:.6rem; color:var(--dim); text-align:center; letter-spacing:.1em; text-transform:uppercase;}
#sr-live{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}
/* the flood: one click = the entire viewport becomes NO */
#flood{position:fixed; inset:0; z-index:50; background:var(--red); display:none; place-items:center; cursor:pointer; overflow:hidden;}
#flood.on{display:grid;}
#flood .word{font-family:'Bricolage Grotesque',sans-serif; font-weight:800; color:var(--cream); line-height:.8;
  font-size:min(56vw,86vh); letter-spacing:-.02em; text-shadow:0 1.2rem 0 rgba(0,0,0,.18); user-select:none;}
#flood.on .word{animation:slam .22s cubic-bezier(.2,1.6,.4,1);}
@keyframes slam{0%{transform:scale(2.6); opacity:0;} 100%{transform:scale(1); opacity:1;}}
#flood .echo{position:absolute; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; color:rgba(244,234,214,.14); pointer-events:none; line-height:1;}
@media (prefers-reduced-motion:reduce){ body.shake{animation:none;} #answer.pop{animation:none;} .fly{display:none;} #flood.on .word{animation:none;} }
</style>
</head>
<body>
<main style="display:contents">
  <h1>ask it <b>anything</b>. the answer is prepared.</h1>
  <p id="answer" aria-live="off">press the button.</p>
  <button id="big-no" type="button" aria-label="The NO button. Press it. The answer will be no.">NO</button>
  <p id="counter">you have been told no <b id="n">0</b> times · world record for accepting it: still unclaimed</p>
  <p id="milestone" aria-hidden="true"></p>
  <button id="yes-q" type="button">…yes?</button>
</main>
<footer>it is not personal. it is policy. · M mute</footer>
<div id="flood" aria-hidden="true"><span class="word">NO</span></div>
<p id="sr-live" role="status" aria-live="polite"></p>

<script>
(function(){
"use strict";
var $=function(id){ return document.getElementById(id); };
var POOLS=[
 ["No.","Nope.","No, thank you.","Still no.","No — but great enthusiasm.","Mm… no.","That's a no.","No, and that's final. (press again)"],
 ["No, with respect.","I've thought about it. No.","The committee met. It's a no.","No — even on weekends.","We took a vote. 1–0, no.","No, in all timezones.","My lawyer also says no.","No. My hands are tied. By me."],
 ["NO — and the caps lock is intentional.","The prophecy said you'd keep pressing.","No³.","Have you tried accepting no for an answer?","This is press #%N%. The answer hasn't changed.","No, but you're building real character here.","Somewhere, a door just closed. That was this. This is no.","The button union has filed a complaint. Also: no."],
 ["The ancient texts contain one word. Guess.","Entropy increases. The answer doesn't.","No — echoed across the void, forever.","In an infinite multiverse, every version of this button says no.","The heat death of the universe arrives before the yes does.","Deep beneath the mountain, monks chant it: no… no… no…","You have unlocked the secret ending. It is no.","The stars spell it out tonight: N-O."]
];
var MILESTONES={10:"ten. the button admires your persistence.",25:"twenty-five. a support group is forming.",50:"FIFTY. the button is genuinely flattered.",100:"one hundred. you and this button are family now.",250:"250?! the button will remember you when it is famous.",500:"five hundred. seek water. the answer remains no."};
var n=0;
try{ n=parseInt(localStorage.getItem('no-button-count')||'0',10)||0; }catch(e){}
$('n').textContent=n;
var lastIdx=-1, muted=false, AC=null;
function beep(f1,f2){
  if(muted) return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    [f1,f2].forEach(function(f,k){
      var o=AC.createOscillator(),g=AC.createGain();
      o.type='triangle'; o.frequency.value=f;
      var t=AC.currentTime+k*0.11;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.linearRampToValueAtTime(.14,t+.02);
      g.gain.exponentialRampToValueAtTime(.0001,t+.16);
      o.connect(g).connect(AC.destination); o.start(t); o.stop(t+.2);
    });
  }catch(e){}
}
function phase(){ return n>=60?3 : n>=25?2 : n>=8?1 : 0; }
function pressNo(){
  n++;
  try{ localStorage.setItem('no-button-count',''+n); }catch(e){}
  $('n').textContent=n;
  var pool=POOLS[phase()];
  var idx;
  do{ idx=Math.floor(Math.random()*pool.length); }while(idx===lastIdx&&pool.length>1);
  lastIdx=idx;
  var msg=pool[idx].replace('%N%',n);
  var a=$('answer');
  a.textContent=msg;
  a.classList.remove('pop'); void a.offsetWidth; a.classList.add('pop');
  $('sr-live').textContent=msg+' ('+n+' times)';
  beep(392,311);   /* descending "uh-uh" */
  if(phase()>=2){ document.body.classList.remove('shake'); void document.body.offsetWidth; document.body.classList.add('shake'); }
  flyNo();
  flood();
  if(MILESTONES[n]){ $('milestone').textContent=MILESTONES[n]; beep(523,392); }
  if(n>=15) $('yes-q').classList.add('on');
}
/* click → the whole viewport IS the word NO for a beat */
var floodTimer=null;
function flood(){
  var f=$('flood');
  /* faint echo NOs pile up with the count (cap 14) */
  var echoes=f.querySelectorAll('.echo');
  if(echoes.length<Math.min(14,Math.floor(n/5))){
    var e=document.createElement('span');
    e.className='echo';
    e.textContent='NO';
    e.style.fontSize=(8+Math.random()*22)+'vmin';
    e.style.left=(Math.random()*80)+'%';
    e.style.top=(Math.random()*84)+'%';
    e.style.transform='rotate('+((Math.random()-.5)*40)+'deg)';
    f.appendChild(e);
  }
  f.classList.remove('on'); void f.offsetWidth; f.classList.add('on');
  clearTimeout(floodTimer);
  floodTimer=setTimeout(function(){ f.classList.remove('on'); },phase()>=2?650:900);
}
$('flood').addEventListener('click',function(){ pressNo(); });
addEventListener('keydown',function(e){ if(e.key==='Escape'){ clearTimeout(floodTimer); $('flood').classList.remove('on'); } });
function flyNo(){
  var b=$('big-no').getBoundingClientRect();
  var el=document.createElement('span');
  el.className='fly'; el.textContent='NO';
  el.style.left=(b.left+b.width/2-14+(Math.random()-.5)*60)+'px';
  el.style.top=(b.top+10)+'px';
  el.style.fontSize=(0.9+Math.random()*1.4)+'rem';
  el.style.setProperty('--dx',((Math.random()-.5)*260)+'px');
  el.style.setProperty('--dy',(-120-Math.random()*180)+'px');
  el.style.setProperty('--rr',((Math.random()-.5)*140)+'deg');
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); },1300);
}
$('big-no').addEventListener('click',pressNo);
$('yes-q').addEventListener('click',function(){
  $('answer').textContent='That little button also says no. It just says it quieter.';
  $('sr-live').textContent='That little button also says no.';
  beep(311,247);
  this.classList.remove('on');
  setTimeout(function(){ if(n>=15) $('yes-q').classList.add('on'); },8000);
});
addEventListener('keydown',function(e){
  if(e.key.toLowerCase()==='m') muted=!muted;
  if((e.key===' '||e.key==='Enter')&&document.activeElement!==$('big-no')&&document.activeElement!==$('yes-q')){
    e.preventDefault(); $('big-no').classList.add('pressed'); pressNo();
    setTimeout(function(){ $('big-no').classList.remove('pressed'); },90);
  }
});
window.__no={count:function(){return n;}, press:pressNo, phase:phase};
})();
</script>
</body>
</html>
