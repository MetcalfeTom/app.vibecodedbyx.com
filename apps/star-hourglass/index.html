<style>

<body>
<canvas id="stage"></canvas>

<div class="title">★ STAR <span class="b">HOURGLASS</span> ★</div>
<div class="tagline">— sand of light. drag to spin. click to flip. —</div>

<div class="hud">

</div>

<div class="toolbar">

  <button class="tb cyan" id="bReset">RESET</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('stage');

// === scene ===
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040214);
scene.fog = new THREE.Fog(0x040214, 60, 220);

const camera = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 600);
camera.position.set(0, 0, 50);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(2, devicePixelRatio || 1));
renderer.setSize(innerWidth, innerHeight);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// === lighting ===
scene.add(new THREE.AmbientLight(0x202840, 0.6));
const sun = new THREE.DirectionalLight(0xffe9b8, 1.2);
sun.position.set(20, 30, 30);
scene.add(sun);
const rim = new THREE.PointLight(0x9b6bff, 1.4, 200);
rim.position.set(-30, -10, -20);
scene.add(rim);

// === starfield ===
{
  const N = 1800;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 200 + Math.random() * 80;
    const phi = Math.random() * Math.PI * 2;
    const theta = Math.acos(Math.random() * 2 - 1);
    pos[i*3]   = r * Math.sin(theta) * Math.cos(phi);
    pos[i*3+1] = r * Math.cos(theta);
    pos[i*3+2] = r * Math.sin(theta) * Math.sin(phi);
    const tint = Math.random();
    col[i*3]   = 0.85 + Math.random() * 0.15;
    col[i*3+1] = 0.85 + Math.random() * 0.15 * tint;
    col[i*3+2] = 0.7 + Math.random() * 0.3;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const m = new THREE.PointsMaterial({ size: 1.2, vertexColors: true, sizeAttenuation: false, fog: false });
  scene.add(new THREE.Points(g, m));
}

// === HOURGLASS PROFILE ===
// Internal r(y) where y in [-H, +H], waist at y=0
const HALF_H = 14;        // half-height of hourglass interior
const WIDE_R = 9;         // widest interior radius (top + bottom of bulbs)
const NARROW_R = 1.3;     // throat radius
const PINCH_K = 1.8;      // power of the pinch curve (higher = more cone-like)

function innerRadius(y) {
  // y normalized to [0,1] from waist to bulb top
  const u = Math.min(1, Math.abs(y) / HALF_H);
  return NARROW_R + (WIDE_R - NARROW_R) * Math.pow(u, 1 / PINCH_K);
}

// === build the glass shell as LatheGeometry ===
const profile = [];
const SEGS = 64;
for (let i = 0; i <= SEGS; i++) {
  const u = i / SEGS;
  const y = -HALF_H * 1.06 + u * HALF_H * 2.12;
  // outer radius slightly larger than inner; capped near top/bottom by spheroid endcaps
  const rIn = innerRadius(y);
  const r = rIn + 0.42;
  profile.push(new THREE.Vector2(r, y));
}
// close caps with small flat radii at the top/bottom
profile.unshift(new THREE.Vector2(0.01, profile[0].y - 0.4));
profile.push(new THREE.Vector2(0.01, profile[profile.length - 1].y + 0.4));

const lathe = new THREE.LatheGeometry(profile, 64);
lathe.computeVertexNormals();
const glassMat = new THREE.MeshStandardMaterial({
  color: 0xffefc4,
  emissive: 0x331c00,
  emissiveIntensity: 0.4,
  metalness: 0.2,
  roughness: 0.18,
  transparent: true,
  opacity: 0.18,
  side: THREE.DoubleSide,
  depthWrite: false,
});
const glass = new THREE.Mesh(lathe, glassMat);
const hourglass = new THREE.Group();
hourglass.add(glass);

// gold rim circles at top and bottom of bulbs (and at the waist)
function goldRing(yPos, radius, thickness = 0.15) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(radius, thickness, 8, 60),
    new THREE.MeshStandardMaterial({ color: 0xffce4a, emissive: 0xc28a18, emissiveIntensity: 0.7, metalness: 0.85, roughness: 0.25 })
  );
  ring.rotation.x = Math.PI / 2;
  ring.position.y = yPos;
  hourglass.add(ring);
  return ring;
}
goldRing(HALF_H + 0.4, WIDE_R + 0.4, 0.22);
goldRing(-HALF_H - 0.4, WIDE_R + 0.4, 0.22);
goldRing(0, NARROW_R + 0.45, 0.08);

// gold pillars connecting top and bottom rings (4 of them, on outside)
for (let k = 0; k < 4; k++) {
  const a = (k / 4) * Math.PI * 2;
  const r = WIDE_R + 0.5;
  const pillar = new THREE.Mesh(
    new THREE.CylinderGeometry(0.16, 0.16, HALF_H * 2 + 1, 8),
    new THREE.MeshStandardMaterial({ color: 0xffce4a, emissive: 0x553210, emissiveIntensity: 0.6, metalness: 0.85, roughness: 0.25 })
  );
  pillar.position.set(Math.cos(a) * r, 0, Math.sin(a) * r);
  hourglass.add(pillar);
}

// gold caps at top + bottom (spheroidal lids)
[HALF_H + 0.7, -HALF_H - 0.7].forEach(y => {
  const cap = new THREE.Mesh(
    new THREE.SphereGeometry(WIDE_R + 0.45, 24, 8, 0, Math.PI * 2, y > 0 ? 0 : Math.PI/2, Math.PI/2),
    new THREE.MeshStandardMaterial({ color: 0xffce4a, emissive: 0x553210, emissiveIntensity: 0.5, metalness: 0.85, roughness: 0.3 })
  );
  cap.position.y = y;
  cap.scale.y = 0.35;
  hourglass.add(cap);
});

// === decorative 5-point stars on the outside of bulbs ===
function starShape(outerR, innerR) {
  const s = new THREE.Shape();
  for (let i = 0; i < 10; i++) {
    const a = -Math.PI/2 + (i / 10) * Math.PI * 2;
    const r = i % 2 === 0 ? outerR : innerR;
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (i === 0) s.moveTo(x, y); else s.lineTo(x, y);
  }
  s.closePath();
  return s;
}
const starGeom = new THREE.ExtrudeGeometry(starShape(0.85, 0.36), { depth: 0.18, bevelEnabled: true, bevelThickness: 0.06, bevelSize: 0.06, bevelSegments: 2, curveSegments: 6 });
const starMat = new THREE.MeshStandardMaterial({ color: 0xffe184, emissive: 0xffd66a, emissiveIntensity: 0.9, metalness: 0.6, roughness: 0.2 });
const decoStars = [];
function placeStarsOnBulb(yCenter) {
  // 8 stars around each bulb at varying heights, sit just outside the glass
  const N = 8;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2 + (yCenter > 0 ? 0 : Math.PI / N);
    const yOff = (Math.random() - 0.5) * (HALF_H * 0.7);
    const yPos = yCenter + yOff;
    // place on outside of glass at this y
    const rOut = innerRadius(yPos) + 0.85;
    const sx = Math.cos(a) * rOut;
    const sz = Math.sin(a) * rOut;
    const star = new THREE.Mesh(starGeom, starMat);
    star.position.set(sx, yPos, sz);
    star.lookAt(0, yPos, 0);
    star.rotateY(Math.PI); // flip so visible face points outward
    star.userData = { spinSpeed: 0.4 + Math.random() * 0.5, baseY: yPos };
    hourglass.add(star);
    decoStars.push(star);
  }
}
placeStarsOnBulb(HALF_H * 0.55);
placeStarsOnBulb(-HALF_H * 0.55);

// big star on top of the cap
const crownStar = new THREE.Mesh(starGeom, starMat.clone());
crownStar.scale.setScalar(2.0);
crownStar.position.set(0, HALF_H + 2.4, 0);
crownStar.userData = { spinSpeed: 0.6, isCrown: true };
hourglass.add(crownStar);

scene.add(hourglass);

// === SAND PARTICLES ===
// We model:
//   - topBulbCount  (settled in top bulb, rendered as Points filling top up to fill level)
//   - bottomBulbCount (settled in bottom)
//   - falling particles (in transit, with vy and pos)
const TOTAL = 2400;
let topCount = TOTAL;
let bottomCount = 0;
let flipped = false; // when flipped, sand pours from "bottom" (now-top) into "top" (now-bottom)
let elapsed = 0;     // seconds since last reset

// Settled top bulb cloud
const topBuf = new Float32Array(TOTAL * 3);
const topGeom = new THREE.BufferGeometry();
topGeom.setAttribute('position', new THREE.BufferAttribute(topBuf, 3));
const sandMat = new THREE.PointsMaterial({
  color: 0xffce4a, size: 0.16, transparent: true, opacity: 0.95,
  sizeAttenuation: true, fog: false, depthWrite: false, blending: THREE.AdditiveBlending,
});
const topPoints = new THREE.Points(topGeom, sandMat);
hourglass.add(topPoints);

// Settled bottom bulb cloud
const botBuf = new Float32Array(TOTAL * 3);
const botGeom = new THREE.BufferGeometry();
botGeom.setAttribute('position', new THREE.BufferAttribute(botBuf, 3));
const botPoints = new THREE.Points(botGeom, sandMat);
hourglass.add(botPoints);

// Falling particles
const FALL_CAP = 200;
const fallBuf = new Float32Array(FALL_CAP * 3);
const fallGeom = new THREE.BufferGeometry();
fallGeom.setAttribute('position', new THREE.BufferAttribute(fallBuf, 3));
const fallMat = new THREE.PointsMaterial({
  color: 0xffe184, size: 0.22, transparent: true, opacity: 1,
  sizeAttenuation: true, fog: false, depthWrite: false, blending: THREE.AdditiveBlending,
});
const fallPoints = new THREE.Points(fallGeom, fallMat);
hourglass.add(fallPoints);

const falling = []; // {x, y, z, vx, vy, vz}

function clearFalling() {
  falling.length = 0;
  for (let i = 0; i < FALL_CAP * 3; i++) fallBuf[i] = 0;
  fallGeom.attributes.position.needsUpdate = true;
}

function fillBulbPositions(buf, count, yCenter, yMin, fillLevel) {
  // sample `count` positions inside the bulb section
  // bulb extends from yCenter-something to ±HALF_H. fillLevel ∈ [0,1] determines top of pile.
  // For top bulb (yCenter > 0): fill from yMax DOWN to (yMax - fillLevel*range)?
  //   Actually for top bulb settled sand sits at the TOP, so we sample y ∈ [yWaist + (1-fillLevel)*range, yMax].
  //   Wait — sand sits at the BOTTOM of the bulb due to gravity. For the top bulb this means sand sits on top of the neck (at the waist).
  // For top bulb sand: it sits at the BOTTOM of the top bulb (just above the waist), filling upward.
  //   sample y ∈ [waist, waist + fillLevel * (yMax - waist)]
  // For bottom bulb sand: it sits at the BOTTOM of the bottom bulb, filling upward.
  //   sample y ∈ [bottom, bottom + fillLevel * (waist - bottom)]
  // x,z within innerRadius(y).
  const inv = (yCenter > 0); // is this the "top" bulb in canonical orientation?
  for (let i = 0; i < count; i++) {
    let y;
    if (inv) {
      // top bulb — sand from waist up
      const range = HALF_H;
      y = 0.6 + (fillLevel * range) * Math.random();
    } else {
      // bottom bulb — sand from bottom up
      const range = HALF_H;
      y = -HALF_H + (fillLevel * range) * Math.random();
    }
    const r = innerRadius(y) * 0.92 * Math.sqrt(Math.random());
    const a = Math.random() * Math.PI * 2;
    buf[i*3]     = Math.cos(a) * r;
    buf[i*3 + 1] = y;
    buf[i*3 + 2] = Math.sin(a) * r;
  }
  // hide unused slots
  for (let i = count; i < TOTAL; i++) {
    buf[i*3]     = 0;
    buf[i*3 + 1] = -200;
    buf[i*3 + 2] = 0;
  }
}

function rebuildSettled() {
  const topRel = topCount / TOTAL;     // fraction filled
  const botRel = bottomCount / TOTAL;
  fillBulbPositions(topBuf, topCount, +1, 0, topRel);
  fillBulbPositions(botBuf, bottomCount, -1, -HALF_H, botRel);
  topGeom.attributes.position.needsUpdate = true;
  botGeom.attributes.position.needsUpdate = true;
}

function reset() {
  topCount = TOTAL; bottomCount = 0;
  elapsed = 0;
  clearFalling();
  flipped = false;
  rebuildSettled();
}
reset();

// === flip ===
function flip() {
  // visual: rotate the whole hourglass 180° around the X axis (so the bottom becomes top)
  const targetRot = (Math.abs(hourglass.rotation.x) < 0.01) ? Math.PI : 0;
  flipping = { from: hourglass.rotation.x, to: targetRot, t: 0, dur: 0.9 };
  // swap counts
  const tmp = topCount; topCount = bottomCount; bottomCount = tmp;
  clearFalling();
  rebuildSettled();
  flipped = !flipped;
  // play soft chime
  chimeSfx();
}
let flipping = null;

// === sand spawn rate ===
const SPAWN_PER_SEC = 80;  // particles released per second from the top bulb
let spawnAccumulator = 0;

function spawnFalling(dt) {
  if (topCount <= 0) return;
  spawnAccumulator += SPAWN_PER_SEC * dt;
  while (spawnAccumulator >= 1 && topCount > 0 && falling.length < FALL_CAP) {
    spawnAccumulator -= 1;
    // spawn at the bottom of the top bulb (just above the waist) at random radius within waist*0.7
    const r = NARROW_R * 0.7 * Math.sqrt(Math.random());
    const a = Math.random() * Math.PI * 2;
    falling.push({
      x: Math.cos(a) * r,
      y: 0.4,                           // just above the waist
      z: Math.sin(a) * r,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -0.5 - Math.random() * 0.6,
      vz: (Math.random() - 0.5) * 0.4,
    });
    topCount--;
  }
}

const GRAVITY = 8;
function tickFalling(dt) {
  for (let i = falling.length - 1; i >= 0; i--) {
    const p = falling[i];
    p.vy -= GRAVITY * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.z += p.vz * dt;
    // radius constraint
    const r = Math.hypot(p.x, p.z);
    const maxR = innerRadius(p.y);
    if (r > maxR) {
      const k = maxR / (r || 0.001);
      p.x *= k; p.z *= k;
      p.vx *= -0.3; p.vz *= -0.3;
    }
    // landed in bottom bulb? trigger when y < bottom-pile top
    const fillRel = bottomCount / TOTAL;
    const pileTopY = -HALF_H + fillRel * HALF_H;
    if (p.y <= pileTopY + 0.1) {
      bottomCount++;
      falling.splice(i, 1);
    }
  }
}

function syncFallingBuffer() {
  for (let i = 0; i < FALL_CAP; i++) {
    if (i < falling.length) {
      const p = falling[i];
      fallBuf[i*3]   = p.x;
      fallBuf[i*3+1] = p.y;
      fallBuf[i*3+2] = p.z;
    } else {
      fallBuf[i*3]   = 0;
      fallBuf[i*3+1] = -300;
      fallBuf[i*3+2] = 0;
    }
  }
  fallGeom.attributes.position.needsUpdate = true;
}

// === drag-to-rotate ===
let yaw = 0, pitch = 0.05;
let dragging = false, lastX = 0, lastY = 0;
canvas.addEventListener('pointerdown', (e) => {
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  document.body.classList.add('dragging');
});
addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  yaw += dx * 0.005;
  pitch = Math.max(-1.2, Math.min(1.2, pitch + dy * 0.004));
});
addEventListener('pointerup', () => { dragging = false; document.body.classList.remove('dragging'); });
addEventListener('pointercancel', () => { dragging = false; });

// === click to flip (when not dragging much) ===
let downAt = null;
canvas.addEventListener('pointerdown', (e) => { downAt = { x: e.clientX, y: e.clientY, t: performance.now() }; });
canvas.addEventListener('pointerup', (e) => {
  if (!downAt) return;
  const dx = e.clientX - downAt.x, dy = e.clientY - downAt.y;
  const dt = performance.now() - downAt.t;
  if (Math.hypot(dx, dy) < 6 && dt < 280) flip();
  downAt = null;
});

document.getElementById('bFlip').addEventListener('click', flip);
document.getElementById('bReset').addEventListener('click', () => { reset(); });
addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flip(); }
  if (e.key === 'r' || e.key === 'R') reset();
});

// === audio ===
let audioCtx = null, master = null;
function audio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    master = audioCtx.createGain();
    master.gain.value = 0.18;
    master.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function chimeSfx() {
  audio();
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = audioCtx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(f, t + i * 0.06);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.001, t + i*0.06);
    g.gain.exponentialRampToValueAtTime(0.06, t + 0.01 + i*0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.9 + i*0.06);
    o.connect(g); g.connect(master);
    o.start(t + i*0.06); o.stop(t + 1.0 + i*0.06);
  });
}

// === HUD ===
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  return String(m).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}
function tickHud() {
  document.getElementById('hTop').textContent = Math.round(topCount / TOTAL * 100) + '%';
  document.getElementById('hBot').textContent = Math.round(bottomCount / TOTAL * 100) + '%';
  document.getElementById('hTime').textContent = fmtTime(elapsed);
}

// === main loop ===
const clock = new THREE.Clock();
function loop() {
  const dt = Math.min(0.05, clock.getDelta());
  elapsed += dt;
  // hourglass rotation (drag)
  hourglass.rotation.y += (yaw - hourglass.rotation.y) * Math.min(1, dt * 6);
  // flip animation
  if (flipping) {
    flipping.t += dt;
    const u = Math.min(1, flipping.t / flipping.dur);
    const e = u * u * (3 - 2 * u); // smoothstep
    hourglass.rotation.x = flipping.from + (flipping.to - flipping.from) * e;
    if (u >= 1) flipping = null;
  }
  // pitch tilt
  hourglass.rotation.z = pitch * 0.3;
  // spin decorative stars
  for (const s of decoStars) {
    s.rotation.y += dt * (s.userData.spinSpeed || 0.3);
  }
  crownStar.rotation.y += dt * 0.6;

  // sand simulation
  spawnFalling(dt);
  tickFalling(dt);
  syncFallingBuffer();
  // refresh settled clouds when counts change. We can rebuild every frame cheap.
  rebuildSettled();
  tickHud();

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();
</script>
