<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Neon Shooter</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔫">
<meta property="og:title" content="Neon Shooter">
<meta property="og:description" content="Blast through waves of neon enemies and upgrade your lasers to devastating power.">
<meta property="og:url" content="https://sloppy.live/neon-shooter">
<meta property="og:image" content="https://emojicdn.elk.sh/🔫?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;user-select:none;touch-action:none}
canvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;pointer-events:none;z-index:5}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:4px}
.hud-left{align-items:flex-start}
.hud-right{align-items:flex-end}
.hud-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase}
.hud-val{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:#0ff;text-shadow:0 0 8px #0ff}
.hud-val.score{color:#ff0;text-shadow:0 0 8px #ff0}
.hud-val.wave{color:#f0f;text-shadow:0 0 8px #f0f}
#hp-bar{width:120px;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-top:2px}
#hp-fill{height:100%;background:linear-gradient(90deg,#f00,#0f0);border-radius:3px;transition:width .2s}
#upgrade-panel{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);display:none;z-index:10;pointer-events:auto}
#upgrade-panel.show{display:flex;gap:8px}
.upg-btn{font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px 14px;border:1px solid rgba(0,255,255,0.3);background:rgba(0,255,255,0.06);color:#0ff;border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap}
.upg-btn:hover{background:rgba(0,255,255,0.15);border-color:#0ff}
.upg-btn .cost{color:#ff0;font-size:9px;display:block;margin-top:2px}
#start-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(5,5,16,0.95)}
#start-screen h1{font-family:'Orbitron',sans-serif;font-size:clamp(28px,6vw,52px);font-weight:900;color:#0ff;text-shadow:0 0 30px #0ff,0 0 60px rgba(0,255,255,0.3);letter-spacing:4px;margin-bottom:8px}
#start-screen p{font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(255,255,255,0.3);margin-bottom:30px}
#start-btn{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;padding:14px 40px;border:2px solid #0ff;background:transparent;color:#0ff;border-radius:6px;cursor:pointer;letter-spacing:3px;transition:all .2s}
#start-btn:hover{background:rgba(0,255,255,0.1);box-shadow:0 0 20px rgba(0,255,255,0.3)}
#game-over{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(5,5,16,0.92)}
#game-over.show{display:flex}
#game-over h2{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:900;color:#f44;text-shadow:0 0 20px #f44;margin-bottom:6px}
#game-over .final{font-family:'Share Tech Mono',monospace;font-size:14px;color:rgba(255,255,255,0.4);margin-bottom:20px}
#retry-btn{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;padding:12px 30px;border:2px solid #f44;background:transparent;color:#f44;border-radius:6px;cursor:pointer;letter-spacing:2px}
#mobile-controls{position:fixed;bottom:8px;left:0;right:0;display:none;justify-content:space-between;align-items:flex-end;padding:0 10px;z-index:8;pointer-events:none}
.mob-zone{pointer-events:auto;display:flex;gap:6px}
.mob-btn{width:48px;height:48px;border-radius:50%;border:1px solid rgba(0,255,255,0.2);background:rgba(0,255,255,0.05);display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:16px;color:rgba(0,255,255,0.4)}
.mob-btn.fire{border-color:rgba(255,0,100,0.3);background:rgba(255,0,100,0.08);color:rgba(255,0,100,0.5);width:64px;height:64px;font-size:12px}
a@media(max-width:600px){
  #mobile-controls{display:flex}
  .hud-val{font-size:14px}
  .upg-btn{font-size:10px;padding:6px 10px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="hud-left">
    <span class="hud-label">Score</span>
    <span class="hud-val score" id="score-val">0</span>
    <span class="hud-label" style="margin-top:4px">HP</span>
    <div id="hp-bar"><div id="hp-fill" style="width:100%"></div></div>
  </div>
  <div class="hud-right">
    <span class="hud-label">Wave</span>
    <span class="hud-val wave" id="wave-val">1</span>
    <span class="hud-label" style="margin-top:4px">Laser</span>
    <span class="hud-val" id="laser-val">LV1</span>
  </div>
</div>

<div id="upgrade-panel">
  <button class="upg-btn" id="upg-spread">+Spread<span class="cost">200</span></button>
  <button class="upg-btn" id="upg-power">+Power<span class="cost">150</span></button>
  <button class="upg-btn" id="upg-speed">+FireRate<span class="cost">100</span></button>
  <button class="upg-btn" id="upg-heal">Repair<span class="cost">120</span></button>
</div>

<div id="start-screen">
  <h1>NEON SHOOTER</h1>
  <p>Destroy enemies. Collect energy. Upgrade lasers.</p>
  <button id="start-btn">LAUNCH</button>
</div>

<div id="game-over">
  <h2>DESTROYED</h2>
  <div class="final" id="final-score"></div>
  <button id="retry-btn">RETRY</button>
</div>

<div id="mobile-controls">
  <div class="mob-zone">
    <div class="mob-btn" data-key="left">&#9664;</div>
    <div class="mob-btn" data-key="right">&#9654;</div>
  </div>
  <div class="mob-zone">
    <div class="mob-btn fire" data-key="fire">FIRE</div>
  </div>
</div>
<script>
(function(){
'use strict';

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H;
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

// State
var running=false;
var score=0;
var wave=1;
var hp=100;
var maxHp=100;
var playerX,playerY;
var playerW=28,playerH=20;
var playerVx=0;
var bullets=[];
var enemies=[];
var particles=[];
var pickups=[];
var stars=[];
var shakeTimer=0;

// Upgrades
var spreadLevel=1; // 1=single,2=double,3=triple,4=quad,5=five
var powerLevel=1;  // damage multiplier
var fireRateLevel=1; // lower = faster
var laserLevel=1;

var fireInterval=180; // ms
var lastFire=0;
var autoFire=true;

// Costs
var spreadCost=200;
var powerCost=150;
var speedCost=100;
var healCost=120;

// Wave state
var enemiesRemaining=0;
var waveActive=false;
var waveDelay=0;
var showUpgrades=false;

// Input
var keys={left:false,right:false,fire:false};

// Stars
for(var i=0;i<80;i++){
  stars.push({x:Math.random()*2000,y:Math.random()*2000,s:Math.random()*1.5+0.3,sp:Math.random()*0.5+0.2});
}

// HUD elements
var scoreEl=document.getElementById('score-val');
var waveEl=document.getElementById('wave-val');
var laserEl=document.getElementById('laser-val');
var hpFill=document.getElementById('hp-fill');
var upgradePanel=document.getElementById('upgrade-panel');
var gameOverEl=document.getElementById('game-over');
var finalScoreEl=document.getElementById('final-score');
var startScreen=document.getElementById('start-screen');

function updateHUD(){
  scoreEl.textContent=score;
  waveEl.textContent=wave;
  laserLevel=spreadLevel+powerLevel+fireRateLevel-2;
  laserEl.textContent='LV'+laserLevel;
  hpFill.style.width=Math.max(0,hp/maxHp*100)+'%';
  // Update costs
  document.querySelector('#upg-spread .cost').textContent=spreadLevel>=5?'MAX':spreadCost;
  document.querySelector('#upg-power .cost').textContent=powerLevel>=5?'MAX':powerCost;
  document.querySelector('#upg-speed .cost').textContent=fireRateLevel>=5?'MAX':speedCost;
  document.querySelector('#upg-heal .cost').textContent=hp>=maxHp?'FULL':healCost;
}

function startGame(){
  score=0;wave=1;hp=100;maxHp=100;
  spreadLevel=1;powerLevel=1;fireRateLevel=1;
  fireInterval=180;
  spreadCost=200;powerCost=150;speedCost=100;healCost=120;
  playerX=W/2;playerY=H-60;playerVx=0;
  bullets=[];enemies=[];particles=[];pickups=[];
  shakeTimer=0;showUpgrades=false;
  upgradePanel.classList.remove('show');
  gameOverEl.classList.remove('show');
  startScreen.style.display='none';
  running=true;
  waveActive=false;
  waveDelay=60;
  updateHUD();
}

function gameOver(){
  running=false;
  finalScoreEl.textContent='Score: '+score+' | Wave: '+wave+' | Laser LV'+laserLevel;
  gameOverEl.classList.add('show');
}

// Spawning
function spawnWave(){
  var count=4+wave*2;
  if(count>30)count=30;
  enemiesRemaining=count;
  waveActive=true;

  for(var i=0;i<count;i++){
    var type=0; // basic
    if(wave>=3&&Math.random()<0.3)type=1; // fast
    if(wave>=5&&Math.random()<0.2)type=2; // tank
    if(wave>=7&&Math.random()<0.1)type=3; // shooter

    var ex=40+Math.random()*(W-80);
    var ey=-30-Math.random()*300;
    var espd=0.5+Math.random()*0.5+wave*0.05;
    var ehp=1;
    var esize=16;
    var ecolor='#f44';

    if(type===1){espd*=1.8;ecolor='#ff0';esize=12;ehp=1;}
    if(type===2){espd*=0.5;ecolor='#f80';esize=24;ehp=3+Math.floor(wave/3);}
    if(type===3){espd*=0.7;ecolor='#f0f';esize=18;ehp=2;}

    enemies.push({
      x:ex,y:ey,vx:(Math.random()-0.5)*0.8,vy:espd,
      hp:ehp,maxHp:ehp,size:esize,type:type,color:ecolor,
      shootTimer:type===3?60+Math.random()*120:0,
      wobble:Math.random()*Math.PI*2
    });
  }
}

function fireBullet(){
  var now=performance.now();
  var interval=fireInterval-fireRateLevel*25;
  if(interval<50)interval=50;
  if(now-lastFire<interval)return;
  lastFire=now;

  var dmg=powerLevel;
  var bspd=-8;
  var col=powerLevel>=4?'#ff0':powerLevel>=3?'#0f0':powerLevel>=2?'#0ff':'#0af';
  var bw=powerLevel>=3?4:2;

  if(spreadLevel===1){
    bullets.push({x:playerX,y:playerY-playerH/2,vx:0,vy:bspd,dmg:dmg,col:col,w:bw,h:10,friendly:true});
  }else if(spreadLevel===2){
    bullets.push({x:playerX-6,y:playerY-playerH/2,vx:0,vy:bspd,dmg:dmg,col:col,w:bw,h:10,friendly:true});
    bullets.push({x:playerX+6,y:playerY-playerH/2,vx:0,vy:bspd,dmg:dmg,col:col,w:bw,h:10,friendly:true});
  }else if(spreadLevel===3){
    bullets.push({x:playerX,y:playerY-playerH/2,vx:0,vy:bspd,dmg:dmg,col:col,w:bw,h:10,friendly:true});
    bullets.push({x:playerX-8,y:playerY-playerH/2,vx:-1.2,vy:bspd,dmg:dmg,col:col,w:bw,h:10,friendly:true});
    bullets.push({x:playerX+8,y:playerY-playerH/2,vx:1.2,vy:bspd,dmg:dmg,col:col,w:bw,h:10,friendly:true});
  }else if(spreadLevel===4){
    bullets.push({x:playerX-5,y:playerY-playerH/2,vx:-0.4,vy:bspd,dmg:dmg,col:col,w:bw,h:10,friendly:true});
    bullets.push({x:playerX+5,y:playerY-playerH/2,vx:0.4,vy:bspd,dmg:dmg,col:col,w:bw,h:10,friendly:true});
    bullets.push({x:playerX-12,y:playerY-playerH/2,vx:-2,vy:bspd*0.9,dmg:dmg,col:col,w:bw,h:10,friendly:true});
    bullets.push({x:playerX+12,y:playerY-playerH/2,vx:2,vy:bspd*0.9,dmg:dmg,col:col,w:bw,h:10,friendly:true});
  }else{
    bullets.push({x:playerX,y:playerY-playerH/2,vx:0,vy:bspd,dmg:dmg,col:col,w:bw,h:10,friendly:true});
    bullets.push({x:playerX-6,y:playerY-playerH/2,vx:-0.8,vy:bspd,dmg:dmg,col:col,w:bw,h:10,friendly:true});
    bullets.push({x:playerX+6,y:playerY-playerH/2,vx:0.8,vy:bspd,dmg:dmg,col:col,w:bw,h:10,friendly:true});
    bullets.push({x:playerX-14,y:playerY-playerH/2,vx:-2.5,vy:bspd*0.85,dmg:dmg,col:col,w:bw,h:10,friendly:true});
    bullets.push({x:playerX+14,y:playerY-playerH/2,vx:2.5,vy:bspd*0.85,dmg:dmg,col:col,w:bw,h:10,friendly:true});
  }
}

function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    var angle=Math.random()*Math.PI*2;
    var speed=1+Math.random()*3;
    particles.push({
      x:x,y:y,
      vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:1,decay:0.015+Math.random()*0.02,
      size:1+Math.random()*3,
      color:color
    });
  }
}

function spawnPickup(x,y){
  if(Math.random()<0.4){
    pickups.push({x:x,y:y,vy:0.8,size:6,life:300,type:'energy'});
  }
}

// Drawing
function drawPlayer(){
  ctx.save();
  ctx.translate(playerX,playerY);
  // Ship body
  ctx.beginPath();
  ctx.moveTo(0,-playerH/2);
  ctx.lineTo(-playerW/2,playerH/2);
  ctx.lineTo(0,playerH/4);
  ctx.lineTo(playerW/2,playerH/2);
  ctx.closePath();
  ctx.fillStyle='rgba(0,200,255,0.15)';
  ctx.fill();
  ctx.strokeStyle='#0cf';
  ctx.lineWidth=1.5;
  ctx.shadowColor='#0cf';
  ctx.shadowBlur=12;
  ctx.stroke();
  // Engine glow
  ctx.beginPath();
  ctx.moveTo(-6,playerH/4);
  ctx.lineTo(0,playerH/2+4+Math.random()*6);
  ctx.lineTo(6,playerH/4);
  ctx.strokeStyle='#0ff';
  ctx.shadowColor='#0ff';
  ctx.shadowBlur=8;
  ctx.stroke();
  ctx.restore();
}

function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x,e.y);
  ctx.shadowColor=e.color;
  ctx.shadowBlur=10;

  if(e.type===0){
    // Diamond
    ctx.beginPath();
    ctx.moveTo(0,-e.size);ctx.lineTo(e.size,0);ctx.lineTo(0,e.size);ctx.lineTo(-e.size,0);ctx.closePath();
    ctx.strokeStyle=e.color;ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=e.color.replace(')',',0.15)').replace('rgb','rgba');ctx.fill();
  }else if(e.type===1){
    // Fast triangle
    ctx.beginPath();
    ctx.moveTo(0,e.size);ctx.lineTo(-e.size,-e.size*0.6);ctx.lineTo(e.size,-e.size*0.6);ctx.closePath();
    ctx.strokeStyle=e.color;ctx.lineWidth=1.5;ctx.stroke();
  }else if(e.type===2){
    // Tank hexagon
    ctx.beginPath();
    for(var i=0;i<6;i++){
      var a=i*Math.PI/3;
      var px=Math.cos(a)*e.size,py=Math.sin(a)*e.size;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.strokeStyle=e.color;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='rgba(255,136,0,0.12)';ctx.fill();
    // HP bar
    if(e.hp<e.maxHp){
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.fillRect(-e.size,-e.size-6,e.size*2,3);
      ctx.fillStyle=e.color;
      ctx.fillRect(-e.size,-e.size-6,e.size*2*(e.hp/e.maxHp),3);
    }
  }else if(e.type===3){
    // Shooter circle with cross
    ctx.beginPath();ctx.arc(0,0,e.size,0,Math.PI*2);
    ctx.strokeStyle=e.color;ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.moveTo(-e.size*0.5,0);ctx.lineTo(e.size*0.5,0);
    ctx.moveTo(0,-e.size*0.5);ctx.lineTo(0,e.size*0.5);
    ctx.strokeStyle=e.color;ctx.lineWidth=1;ctx.stroke();
  }
  ctx.restore();
}

function drawBullet(b){
  ctx.save();
  ctx.shadowColor=b.col;
  ctx.shadowBlur=b.friendly?6:4;
  ctx.fillStyle=b.col;
  if(b.friendly){
    ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
    // Trail
    ctx.fillStyle=b.col.replace(')',',0.3)').replace('#','rgba(');
    ctx.globalAlpha=0.3;
    ctx.fillRect(b.x-b.w/2,b.y+b.h/2,b.w,6);
    ctx.globalAlpha=1;
  }else{
    ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// Update
function update(){
  if(!running)return;

  // Player movement
  var speed=5;
  if(keys.left)playerVx-=0.8;
  if(keys.right)playerVx+=0.8;
  playerVx*=0.88;
  playerX+=playerVx;
  if(playerX<20)playerX=20;
  if(playerX>W-20)playerX=W-20;

  // Auto fire
  if(keys.fire||autoFire){
    fireBullet();
  }

  // Bullets
  for(var i=bullets.length-1;i>=0;i--){
    var b=bullets[i];
    b.x+=b.vx;b.y+=b.vy;
    if(b.y<-20||b.y>H+20||b.x<-20||b.x>W+20){
      bullets.splice(i,1);continue;
    }

    if(b.friendly){
      // Hit enemies
      for(var j=enemies.length-1;j>=0;j--){
        var e=enemies[j];
        var dx=b.x-e.x,dy=b.y-e.y;
        if(Math.abs(dx)<e.size+4&&Math.abs(dy)<e.size+4){
          e.hp-=b.dmg;
          bullets.splice(i,1);
          spawnParticles(b.x,b.y,e.color,3);
          if(e.hp<=0){
            var pts=e.type===2?30:e.type===3?25:e.type===1?15:10;
            score+=pts*wave;
            spawnParticles(e.x,e.y,e.color,12);
            spawnPickup(e.x,e.y);
            enemies.splice(j,1);
            enemiesRemaining--;
          }
          break;
        }
      }
    }else{
      // Enemy bullet hits player
      var dx2=b.x-playerX,dy2=b.y-playerY;
      if(Math.abs(dx2)<playerW/2+4&&Math.abs(dy2)<playerH/2+4){
        hp-=10;
        shakeTimer=8;
        spawnParticles(playerX,playerY,'#f44',6);
        bullets.splice(i,1);
        if(hp<=0){gameOver();return;}
      }
    }
  }

  // Enemies
  for(var i=enemies.length-1;i>=0;i--){
    var e=enemies[i];
    e.wobble+=0.03;
    e.x+=e.vx+Math.sin(e.wobble)*0.3;
    e.y+=e.vy;

    // Bounce X
    if(e.x<e.size){e.x=e.size;e.vx=Math.abs(e.vx)}
    if(e.x>W-e.size){e.x=W-e.size;e.vx=-Math.abs(e.vx)}

    // Shooter fires
    if(e.type===3){
      e.shootTimer--;
      if(e.shootTimer<=0){
        e.shootTimer=80+Math.random()*60;
        var ang=Math.atan2(playerY-e.y,playerX-e.x);
        bullets.push({x:e.x,y:e.y,vx:Math.cos(ang)*3.5,vy:Math.sin(ang)*3.5,dmg:0,col:'#f0f',w:4,h:4,friendly:false});
      }
    }

    // Collision with player
    var dx3=e.x-playerX,dy3=e.y-playerY;
    if(Math.abs(dx3)<(e.size+playerW/2)*0.7&&Math.abs(dy3)<(e.size+playerH/2)*0.7){
      hp-=15;
      shakeTimer=10;
      spawnParticles(playerX,playerY,'#f44',8);
      enemies.splice(i,1);
      enemiesRemaining--;
      if(hp<=0){gameOver();return;}
      continue;
    }

    // Off screen
    if(e.y>H+50){
      enemies.splice(i,1);
      enemiesRemaining--;
    }
  }

  // Pickups
  for(var i=pickups.length-1;i>=0;i--){
    var p=pickups[i];
    p.y+=p.vy;
    p.life--;
    if(p.life<=0||p.y>H+20){pickups.splice(i,1);continue}
    var dx4=p.x-playerX,dy4=p.y-playerY;
    if(Math.abs(dx4)<20&&Math.abs(dy4)<20){
      score+=5;
      spawnParticles(p.x,p.y,'#0f0',5);
      pickups.splice(i,1);
    }
  }

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vx*=0.97;p.vy*=0.97;
    p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }

  // Wave management
  if(waveActive&&enemiesRemaining<=0&&enemies.length===0){
    waveActive=false;
    showUpgrades=true;
    upgradePanel.classList.add('show');
    waveDelay=0;
  }
  if(!waveActive&&!showUpgrades){
    waveDelay++;
    if(waveDelay>60){
      spawnWave();
    }
  }

  // Shake decay
  if(shakeTimer>0)shakeTimer--;

  updateHUD();
}

function render(){
  ctx.clearRect(0,0,W,H);

  ctx.save();
  if(shakeTimer>0){
    ctx.translate((Math.random()-0.5)*shakeTimer,(Math.random()-0.5)*shakeTimer);
  }

  // Stars
  ctx.fillStyle='rgba(255,255,255,0.4)';
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    s.y+=s.sp;
    if(s.y>H+10)s.y=-10;
    var sx=s.x%W;
    ctx.globalAlpha=0.2+s.s*0.3;
    ctx.fillRect(sx,s.y,s.s,s.s);
  }
  ctx.globalAlpha=1;

  // Pickups
  for(var i=0;i<pickups.length;i++){
    var p=pickups[i];
    ctx.save();
    ctx.shadowColor='#0f0';
    ctx.shadowBlur=8;
    ctx.fillStyle='#0f0';
    ctx.globalAlpha=0.5+Math.sin(p.life*0.1)*0.3;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Bullets
  for(var i=0;i<bullets.length;i++)drawBullet(bullets[i]);

  // Enemies
  for(var i=0;i<enemies.length;i++)drawEnemy(enemies[i]);

  // Player
  if(running)drawPlayer();

  // Particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;
    ctx.shadowBlur=4;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
  ctx.shadowBlur=0;

  // Wave banner
  if(!waveActive&&!showUpgrades&&waveDelay>10&&waveDelay<50&&running){
    ctx.save();
    ctx.globalAlpha=(1-Math.abs(waveDelay-30)/20)*0.8;
    ctx.font='900 36px Orbitron';
    ctx.fillStyle='#f0f';
    ctx.textAlign='center';
    ctx.shadowColor='#f0f';
    ctx.shadowBlur=20;
    ctx.fillText('WAVE '+wave,W/2,H/2);
    ctx.restore();
  }

  ctx.restore();
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

// Upgrades
document.getElementById('upg-spread').addEventListener('click',function(e){
  e.stopPropagation();
  if(spreadLevel>=5||score<spreadCost)return;
  score-=spreadCost;spreadLevel++;spreadCost=Math.floor(spreadCost*1.6);
  closeUpgrades();
});
document.getElementById('upg-power').addEventListener('click',function(e){
  e.stopPropagation();
  if(powerLevel>=5||score<powerCost)return;
  score-=powerCost;powerLevel++;powerCost=Math.floor(powerCost*1.6);
  closeUpgrades();
});
document.getElementById('upg-speed').addEventListener('click',function(e){
  e.stopPropagation();
  if(fireRateLevel>=5||score<speedCost)return;
  score-=speedCost;fireRateLevel++;speedCost=Math.floor(speedCost*1.5);
  closeUpgrades();
});
document.getElementById('upg-heal').addEventListener('click',function(e){
  e.stopPropagation();
  if(hp>=maxHp||score<healCost)return;
  score-=healCost;hp=Math.min(maxHp,hp+30);healCost=Math.floor(healCost*1.3);
  closeUpgrades();
});

function closeUpgrades(){
  showUpgrades=false;
  upgradePanel.classList.remove('show');
  wave++;
  waveDelay=0;
  updateHUD();
}

// Input
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=true;
  if(e.key===' ')keys.fire=true;
  if(e.key==='Escape'&&showUpgrades)closeUpgrades();
});
document.addEventListener('keyup',function(e){
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=false;
  if(e.key===' ')keys.fire=false;
});

// Mobile
var mobBtns=document.querySelectorAll('.mob-btn');
for(var i=0;i<mobBtns.length;i++){
  (function(btn){
    var k=btn.getAttribute('data-key');
    btn.addEventListener('touchstart',function(e){e.preventDefault();keys[k]=true},{passive:false});
    btn.addEventListener('touchend',function(e){e.preventDefault();keys[k]=false},{passive:false});
    btn.addEventListener('touchcancel',function(){keys[k]=false});
  })(mobBtns[i]);
}

// Mouse/touch to move player
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  var t=e.touches[0];
  if(t.clientY>H*0.3){
    playerX=t.clientX;
  }
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  var t=e.touches[0];
  if(t.clientY>H*0.3){
    playerX=t.clientX;
  }
},{passive:false});

// Start
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('retry-btn').addEventListener('click',startGame);

loop();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
