<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Boiler Rave</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎧">
<meta property="og:title" content="Boiler Rave">
<meta property="og:description" content="Top-down rave visualizer. 200 ravers, strobes, lasers, and bass you can feel.">
<meta property="og:url" content="https://sloppy.live/boiler-rave/">
<meta property="og:image" content="https://sloppy.live/boiler-rave/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Azeret+Mono:wght@300;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none}
canvas{display:block;width:100vw;height:100vh}
#start{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;cursor:pointer}
#start h1{font-family:'Orbitron',sans-serif;font-size:clamp(28px,6vw,60px);font-weight:900;color:#fff;text-shadow:0 0 40px #f0f,0 0 80px #0ff;letter-spacing:6px}
#start p{font-family:'Azeret Mono',monospace;font-size:clamp(10px,2vw,14px);color:rgba(255,255,255,.3);letter-spacing:4px}
#hud{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;align-items:center;padding:8px 14px;pointer-events:none;opacity:0;transition:opacity 1s}
#hud.show{opacity:1}
#bpm-wrap{text-align:left}
#bpm-label{font-family:'Azeret Mono',monospace;font-size:7px;color:rgba(255,0,255,.3);letter-spacing:3px}
#bpm-val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;color:#f0f;text-shadow:0 0 15px rgba(255,0,255,.4)}
#crowd-wrap{text-align:center}
#crowd-label{font-family:'Azeret Mono',monospace;font-size:7px;color:rgba(0,255,255,.3);letter-spacing:3px}
#crowd-val{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:400;color:#0ff;text-shadow:0 0 10px rgba(0,255,255,.3)}
#controls{text-align:right}
#controls span{font-family:'Azeret Mono',monospace;font-size:8px;color:rgba(255,255,255,.15);letter-spacing:2px}
a#backlink{position:fixed;bottom:6px;left:8px;color:rgba(255,255,255,.03);font-size:7px;text-decoration:none;z-index:5}
a#backlink:hover{color:rgba(255,255,255,.15)}
</style>
</head>
<body>
<div id="start"><h1>BOILER RAVE</h1><p>TAP TO ENTER</p></div>
<canvas id="c"></canvas>
<div id="hud">
 <div id="bpm-wrap"><div id="bpm-label">BPM</div><div id="bpm-val">128</div></div>
 <div id="crowd-wrap"><div id="crowd-label">RAVERS</div><div id="crowd-val">200</div></div>
 <div id="controls"><span>← → BPM &nbsp; SPACE DROP</span></div>
</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,started=false,audioReady=false;
let bpm=128,beat=0,beatT=0,lastBeat=0,dropMode=false,dropTimer=0;
let strobeOn=false,strobeTimer=0;
const COLORS=['#f0f','#0ff','#ff0','#f60','#0f0','#f06','#60f','#0ff'];
const LASER_COLORS=['#f0f','#0ff','#ff0','#f00','#0f0','#f60'];

// Audio
let actx,kick,hihat,bass,masterGain;
function initAudio(){
 actx=new(window.AudioContext||window.webkitAudioContext)();
 masterGain=actx.createGain();masterGain.gain.value=.6;masterGain.connect(actx.destination);
 // bass drone
 bass=actx.createOscillator();bass.type='sawtooth';bass.frequency.value=55;
 const bf=actx.createBiquadFilter();bf.type='lowpass';bf.frequency.value=120;bf.Q.value=8;
 const bg=actx.createGain();bg.gain.value=.25;
 bass.connect(bf);bf.connect(bg);bg.connect(masterGain);bass.start();
 // sub pulse
 const sub=actx.createOscillator();sub.type='sine';sub.frequency.value=36;
 const sg=actx.createGain();sg.gain.value=.15;
 sub.connect(sg);sg.connect(masterGain);sub.start();
 audioReady=true;
}
function playKick(){
 if(!audioReady)return;
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='sine';o.frequency.setValueAtTime(150,actx.currentTime);
 o.frequency.exponentialRampToValueAtTime(30,actx.currentTime+.15);
 g.gain.setValueAtTime(dropMode?.8:.5,actx.currentTime);
 g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.3);
 o.connect(g);g.connect(masterGain);o.start();o.stop(actx.currentTime+.3);
}
function playHihat(){
 if(!audioReady)return;
 const bufSz=actx.sampleRate*.05,buf=actx.createBuffer(1,bufSz,actx.sampleRate);
 const d=buf.getChannelData(0);for(let i=0;i<bufSz;i++)d[i]=(Math.random()*2-1)*.3;
 const s=actx.createBufferSource(),f=actx.createBiquadFilter(),g=actx.createGain();
 f.type='highpass';f.frequency.value=8000;
 g.gain.setValueAtTime(.12,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.05);
 s.buffer=buf;s.connect(f);f.connect(g);g.connect(masterGain);s.start();
}
function playClap(){
 if(!audioReady)return;
 const bufSz=actx.sampleRate*.08,buf=actx.createBuffer(1,bufSz,actx.sampleRate);
 const d=buf.getChannelData(0);
 for(let i=0;i<bufSz;i++){const env=1-i/bufSz;d[i]=(Math.random()*2-1)*env*.4}
 const s=actx.createBufferSource(),bp=actx.createBiquadFilter(),g=actx.createGain();
 bp.type='bandpass';bp.frequency.value=1200;bp.Q.value=2;
 g.gain.setValueAtTime(.2,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.08);
 s.buffer=buf;s.connect(bp);bp.connect(g);g.connect(masterGain);s.start();
}

// Ravers
const RAVER_COUNT=200;
let ravers=[];
function initRavers(){
 ravers=[];
 for(let i=0;i<RAVER_COUNT;i++){
  const angle=Math.random()*Math.PI*2;
  const dist=Math.random()*.38+.05;
  ravers.push({
   x:W/2+Math.cos(angle)*dist*Math.min(W,H),
   y:H/2+Math.sin(angle)*dist*Math.min(W,H),
   baseX:0,baseY:0,
   radius:3+Math.random()*3,
   color:COLORS[Math.floor(Math.random()*COLORS.length)],
   phase:Math.random()*Math.PI*2,
   bounceAmp:2+Math.random()*4,
   swayAmp:1+Math.random()*3,
   armPhase:Math.random()*Math.PI*2,
   handsUp:Math.random()>.5,
   energy:Math.random()
  });
 }
 ravers.forEach(r=>{r.baseX=r.x;r.baseY=r.y});
}

// Lasers
let lasers=[];
function spawnLasers(){
 lasers=[];
 const count=4+Math.floor(Math.random()*4);
 for(let i=0;i<count;i++){
  lasers.push({
   x:Math.random()*W,y:Math.random()*H,
   angle:Math.random()*Math.PI*2,
   speed:.01+Math.random()*.02,
   color:LASER_COLORS[Math.floor(Math.random()*LASER_COLORS.length)],
   width:1+Math.random()*2,
   len:Math.max(W,H)*.8
  });
 }
}

// Smoke particles
let smoke=[];
function spawnSmoke(){
 for(let i=0;i<3;i++){
  smoke.push({
   x:Math.random()*W,y:Math.random()*H,
   vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
   radius:30+Math.random()*60,
   alpha:.02+Math.random()*.03,
   life:1
  });
 }
}

// Floor tiles
let floorTiles=[];
function initFloor(){
 floorTiles=[];
 const sz=40;
 for(let gx=0;gx<Math.ceil(W/sz)+1;gx++){
  for(let gy=0;gy<Math.ceil(H/sz)+1;gy++){
   floorTiles.push({x:gx*sz,y:gy*sz,w:sz,h:sz,color:'#000',targetColor:'#000',phase:Math.random()*Math.PI*2});
  }
 }
}

// Spotlight circles
let spots=[];
function initSpots(){
 spots=[
  {x:W*.25,y:H*.3,radius:80,color:'#f0f',phase:0,speed:.015},
  {x:W*.75,y:H*.3,radius:70,color:'#0ff',phase:1,speed:.012},
  {x:W*.5,y:H*.7,radius:90,color:'#ff0',phase:2,speed:.018},
  {x:W*.3,y:H*.7,radius:60,color:'#f60',phase:3,speed:.02}
 ];
}

function resize(){
 W=C.width=window.innerWidth;H=C.height=window.innerHeight;
 if(started){initRavers();spawnLasers();initFloor();initSpots()}
}
resize();window.addEventListener('resize',resize);

// Start
document.getElementById('start').addEventListener('click',()=>{
 if(started)return;
 started=true;
 document.getElementById('start').style.display='none';
 document.getElementById('hud').classList.add('show');
 initAudio();initRavers();spawnLasers();initFloor();initSpots();
});

// Controls
document.addEventListener('keydown',e=>{
 if(!started)return;
 if(e.key==='ArrowRight'){bpm=Math.min(200,bpm+4);document.getElementById('bpm-val').textContent=bpm}
 if(e.key==='ArrowLeft'){bpm=Math.max(80,bpm-4);document.getElementById('bpm-val').textContent=bpm}
 if(e.code==='Space'){e.preventDefault();dropMode=!dropMode;dropTimer=dropMode?3:0}
});
C.addEventListener('click',()=>{if(started)dropMode=!dropMode;dropTimer=dropMode?3:0});

function update(dt){
 if(!started)return;
 const beatInterval=60/bpm;
 beatT+=dt;
 if(beatT>=beatInterval){
  beatT-=beatInterval;beat++;
  onBeat();
 }
 // Drop mode timer
 if(dropMode){dropTimer-=dt;if(dropTimer<=0)dropMode=false}
 // Strobe
 strobeTimer-=dt;
 if(strobeTimer<=0){strobeOn=!strobeOn;strobeTimer=dropMode?.03:.06+Math.random()*.04}
 // Update ravers
 const beatPhase=beatT/beatInterval;
 const bounce=Math.sin(beatPhase*Math.PI*2);
 const intensity=dropMode?1.8:1;
 ravers.forEach(r=>{
  const b=bounce*r.bounceAmp*intensity;
  const sway=Math.sin(beat*.5+r.phase)*r.swayAmp*intensity;
  r.x=r.baseX+sway+Math.sin(beat*.3+r.phase)*(dropMode?4:1);
  r.y=r.baseY+b*.5;
  r.energy=.5+bounce*.5;
  // Slowly drift
  r.baseX+=Math.sin(beat*.01+r.phase)*.1;
  r.baseY+=Math.cos(beat*.01+r.phase*.7)*.1;
  // Keep in bounds
  const margin=40;
  if(r.baseX<margin)r.baseX=margin;if(r.baseX>W-margin)r.baseX=W-margin;
  if(r.baseY<margin)r.baseY=margin;if(r.baseY>H-margin)r.baseY=H-margin;
 });
 // Update lasers
 lasers.forEach(l=>{
  l.angle+=l.speed*(dropMode?2:1);
 });
 // Update spots
 spots.forEach(s=>{
  s.phase+=s.speed*(dropMode?1.5:1);
  s.x=W/2+Math.cos(s.phase)*W*.3;
  s.y=H/2+Math.sin(s.phase*1.3)*H*.3;
 });
 // Update smoke
 smoke.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.life-=dt*.1});
 smoke=smoke.filter(s=>s.life>0);
 if(Math.random()<.15)spawnSmoke();
 // Floor tiles pulse on beat
 const beatPulse=Math.max(0,1-beatT/beatInterval*4);
 floorTiles.forEach(t=>{
  if(beatPulse>.5&&Math.random()<.08){
   const c=COLORS[Math.floor(Math.random()*COLORS.length)];
   t.targetColor=c;
  }
  if(beatPulse<.2)t.targetColor='#000';
 });
}

function onBeat(){
 playKick();
 if(beat%2===0)playClap();
 if(beat%1===0)playHihat();
 // Re-randomize some lasers
 if(beat%4===0)spawnLasers();
 // Burst energy
 ravers.forEach(r=>{
  if(Math.random()<.3)r.handsUp=!r.handsUp;
 });
}

function draw(){
 // Floor
 X.fillStyle='#050508';X.fillRect(0,0,W,H);
 // Dance floor tiles
 floorTiles.forEach(t=>{
  if(t.targetColor!=='#000'){
   X.globalAlpha=.15;X.fillStyle=t.targetColor;
   X.fillRect(t.x,t.y,t.w,t.h);
   X.globalAlpha=1;
  }
 });
 // Floor grid lines
 X.strokeStyle='rgba(255,255,255,.02)';X.lineWidth=.5;
 const sz=40;
 for(let gx=0;gx<W;gx+=sz){X.beginPath();X.moveTo(gx,0);X.lineTo(gx,H);X.stroke()}
 for(let gy=0;gy<H;gy+=sz){X.beginPath();X.moveTo(0,gy);X.lineTo(W,gy);X.stroke()}

 // Spotlight circles on floor
 spots.forEach(s=>{
  const grad=X.createRadialGradient(s.x,s.y,0,s.x,s.y,s.radius*(dropMode?1.5:1));
  grad.addColorStop(0,s.color+'40');
  grad.addColorStop(.5,s.color+'15');
  grad.addColorStop(1,'transparent');
  X.fillStyle=grad;
  X.beginPath();X.arc(s.x,s.y,s.radius*(dropMode?1.5:1),0,Math.PI*2);X.fill();
 });

 // Lasers
 X.globalAlpha=dropMode?.4:.2;
 lasers.forEach(l=>{
  const ex=l.x+Math.cos(l.angle)*l.len;
  const ey=l.y+Math.sin(l.angle)*l.len;
  X.strokeStyle=l.color;X.lineWidth=l.width;
  X.shadowColor=l.color;X.shadowBlur=15;
  X.beginPath();X.moveTo(l.x,l.y);X.lineTo(ex,ey);X.stroke();
 });
 X.shadowBlur=0;X.globalAlpha=1;

 // Smoke
 smoke.forEach(s=>{
  X.globalAlpha=s.alpha*s.life;
  const grad=X.createRadialGradient(s.x,s.y,0,s.x,s.y,s.radius);
  grad.addColorStop(0,'rgba(200,200,255,.03)');
  grad.addColorStop(1,'transparent');
  X.fillStyle=grad;
  X.beginPath();X.arc(s.x,s.y,s.radius,0,Math.PI*2);X.fill();
 });
 X.globalAlpha=1;

 // Draw ravers (top-down view — circles with arms)
 const beatInterval=60/bpm;
 const beatPulse=Math.sin(beatT/beatInterval*Math.PI*2);
 ravers.forEach(r=>{
  const sz=r.radius*(1+beatPulse*.15*(dropMode?2:1));
  // Shadow/glow under raver
  X.globalAlpha=.3;
  X.fillStyle=r.color;
  X.beginPath();X.arc(r.x,r.y,sz+2,0,Math.PI*2);X.fill();
  // Head (top-down circle)
  X.globalAlpha=.9;
  X.fillStyle=r.color;
  X.beginPath();X.arc(r.x,r.y,sz,0,Math.PI*2);X.fill();
  // Highlight
  X.globalAlpha=.4;
  X.fillStyle='#fff';
  X.beginPath();X.arc(r.x-sz*.2,r.y-sz*.2,sz*.35,0,Math.PI*2);X.fill();
  X.globalAlpha=1;
  // Arms (small lines extending from body)
  if(r.handsUp){
   const armLen=sz*1.5+beatPulse*2*(dropMode?2:1);
   const armAngle=Math.sin(beat*.8+r.armPhase)*.4;
   X.strokeStyle=r.color;X.lineWidth=1.5;X.globalAlpha=.5;
   // Left arm
   X.beginPath();
   X.moveTo(r.x-sz*.6,r.y);
   X.lineTo(r.x-sz*.6-Math.cos(armAngle)*armLen,r.y-Math.sin(armAngle+.8)*armLen);
   X.stroke();
   // Right arm
   X.beginPath();
   X.moveTo(r.x+sz*.6,r.y);
   X.lineTo(r.x+sz*.6+Math.cos(armAngle)*armLen,r.y-Math.sin(-armAngle+.8)*armLen);
   X.stroke();
   X.globalAlpha=1;
  }
 });

 // Strobe flash
 if(strobeOn&&dropMode){
  X.globalAlpha=.08+Math.random()*.06;
  X.fillStyle='#fff';X.fillRect(0,0,W,H);
  X.globalAlpha=1;
 }

 // DJ booth (top center)
 const boothW=120,boothH=40;
 const bx=W/2-boothW/2,by=20;
 X.fillStyle='#111';X.fillRect(bx,by,boothW,boothH);
 X.strokeStyle='#f0f';X.lineWidth=1;X.strokeRect(bx,by,boothW,boothH);
 // Turntables
 const discR=10;
 X.fillStyle='#222';
 X.beginPath();X.arc(bx+30,by+boothH/2,discR,0,Math.PI*2);X.fill();
 X.beginPath();X.arc(bx+boothW-30,by+boothH/2,discR,0,Math.PI*2);X.fill();
 X.strokeStyle='#f0f';X.lineWidth=.5;
 X.beginPath();X.arc(bx+30,by+boothH/2,discR,0,Math.PI*2);X.stroke();
 X.beginPath();X.arc(bx+boothW-30,by+boothH/2,discR,0,Math.PI*2);X.stroke();
 // Spinning indicator
 const spinAngle=beat*.5;
 X.strokeStyle='#f0f';X.lineWidth=1;
 X.beginPath();X.moveTo(bx+30,by+boothH/2);
 X.lineTo(bx+30+Math.cos(spinAngle)*discR,by+boothH/2+Math.sin(spinAngle)*discR);X.stroke();
 X.beginPath();X.moveTo(bx+boothW-30,by+boothH/2);
 X.lineTo(bx+boothW-30+Math.cos(-spinAngle)*discR,by+boothH/2+Math.sin(-spinAngle)*discR);X.stroke();
 // DJ label
 X.fillStyle='#f0f';X.globalAlpha=.4;
 X.font='700 8px Orbitron';X.textAlign='center';
 X.fillText('DJ SLOPPY',W/2,by+boothH+12);
 X.globalAlpha=1;

 // Vignette
 const vg=X.createRadialGradient(W/2,H/2,Math.min(W,H)*.2,W/2,H/2,Math.max(W,H)*.7);
 vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.6)');
 X.fillStyle=vg;X.fillRect(0,0,W,H);

 // Drop mode indicator
 if(dropMode){
  X.globalAlpha=.15+Math.sin(Date.now()*.01)*.1;
  X.font='900 '+Math.min(60,W*.06)+'px Orbitron';X.textAlign='center';
  X.fillStyle='#fff';X.fillText('DROP',W/2,H/2);
  X.globalAlpha=1;
 }
}

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.05);lastTime=t;
 update(dt);draw();
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
