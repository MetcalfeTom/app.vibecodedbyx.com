<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Haiku Button · turn any text into a haiku, live</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%B8">
  <meta name="description" content="Paste anything — a rant, an email, an error log — and watch it become a 5-7-5 haiku as you type. One button, endless recuts.">
  <meta property="og:title" content="Haiku Button — your words, 5·7·5">
  <meta property="og:description" content="Paste anything and watch it become a haiku live as you type. Press the button for another cut.">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/minimal%20japanese%20ink%20brush%20enso%20circle%20on%20washi%20paper%20cherry%20blossom%20petal%20haiku%20zen?width=1200&height=630&seed=575&nologo=true&model=flux">
  <meta property="og:url" content="https://sloppy.live/haiku-button">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Zen+Kurenaido&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
  <style>
    :root{
      --washi:#f6f1e6;
      --washi-deep:#efe7d5;
      --ink:#26221c;
      --ink-soft:#5c5344;
      --dim:#9a8f7a;
      --vermilion:#c73e2e;
      --moss:#5e7350;
      --line:#ddd2ba;
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; min-height:100%; }
    body{
      background:var(--washi);
      color:var(--ink);
      font:400 1rem/1.6 'Zen Kurenaido', 'Shippori Mincho', serif;
      background-image:
        radial-gradient(ellipse 60rem 30rem at 85% -5%, rgba(199,62,46,0.05), transparent 60%),
        radial-gradient(ellipse 50rem 40rem at 0% 110%, rgba(94,115,80,0.06), transparent 55%),
        repeating-linear-gradient(4deg, transparent 0 7px, rgba(122,104,70,0.02) 7px 8px),
        repeating-linear-gradient(94deg, transparent 0 11px, rgba(122,104,70,0.02) 11px 12px);
      display:flex; flex-direction:column; align-items:center;
      padding:2rem 1.25rem 4rem;
    }
    a{ color:var(--vermilion); }
    header{ text-align:center; margin-bottom:1.6rem; max-width:34rem; }
    h1{
      font:800 clamp(2.4rem,7vw,3.6rem)/1.05 'Shippori Mincho', serif;
      margin:0 0 0.3rem;
      letter-spacing:-0.01em;
    }
    h1 .bloom{ color:var(--vermilion); }
    .tag{
      font:italic 300 1.05rem 'Fraunces', serif;
      color:var(--ink-soft); margin:0;
    }
    .tag b{ font-weight:600; }
    main{
      width:100%; max-width:34rem;
      display:flex; flex-direction:column; gap:1.4rem;
    }
    .paper{
      background:#fffdf6;
      border:1px solid var(--line);
      box-shadow:0 1px 0 rgba(38,34,28,0.04), 0 6px 24px rgba(38,34,28,0.06);
      position:relative;
    }
    label.sr{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); }
    #inputText{
      display:block; width:100%; min-height:8.5rem; resize:vertical;
      background:transparent; border:none; padding:1.1rem 1.2rem;
      font:400 1.05rem/1.65 'Zen Kurenaido', sans-serif;
      color:var(--ink);
    }
    #inputText:focus{ outline:none; }
    .paper:focus-within{ border-color:var(--vermilion); box-shadow:0 0 0 3px rgba(199,62,46,0.14), 0 6px 24px rgba(38,34,28,0.06); }
    #inputText::placeholder{ color:var(--dim); font-style:italic; }
    .meta-strip{
      display:flex; justify-content:space-between; align-items:center;
      border-top:1px dashed var(--line);
      padding:0.45rem 1.2rem;
      font:400 0.78rem 'Zen Kurenaido', sans-serif;
      color:var(--dim);
    }
    /* — the button — */
    .press-row{ display:flex; justify-content:center; }
    #haikuBtn{
      position:relative;
      min-width:11rem; min-height:3.4rem;
      background:var(--ink); color:var(--washi);
      border:none; cursor:pointer;
      font:600 1.1rem 'Shippori Mincho', serif;
      letter-spacing:0.14em;
      padding:0.8rem 2.2rem;
      box-shadow:0 3px 0 rgba(38,34,28,0.55), 0 8px 22px rgba(38,34,28,0.22);
      transition:transform 0.08s, box-shadow 0.08s;
    }
    #haikuBtn:hover{ background:#161310; }
    #haikuBtn:active{ transform:translateY(3px); box-shadow:0 0 0 rgba(38,34,28,0.55), 0 3px 10px rgba(38,34,28,0.2); }
    #haikuBtn:focus-visible{ outline:3px solid var(--vermilion); outline-offset:3px; }
    #haikuBtn .jp{ color:var(--vermilion); margin-right:0.55rem; font-weight:800; }
    #haikuBtn:disabled{ opacity:0.45; cursor:default; }
    /* — the haiku — */
    .haiku-card{
      padding:2rem 1.6rem 1.4rem;
      text-align:center;
      min-height:11rem;
      display:flex; flex-direction:column; justify-content:center; gap:0.4rem;
    }
    .haiku-card.empty{ color:var(--dim); font-style:italic; }
    .h-line{
      font:600 clamp(1.25rem,4.4vw,1.7rem)/1.5 'Shippori Mincho', serif;
      margin:0;
      opacity:0; transform:translateY(8px);
      animation:inkIn 0.6s forwards;
    }
    .h-line:nth-child(2){ animation-delay:0.12s; }
    .h-line:nth-child(3){ animation-delay:0.24s; }
    @keyframes inkIn{ to{ opacity:1; transform:none; } }
    .h-counts{
      margin:0.9rem 0 0;
      font:400 0.78rem 'Zen Kurenaido', sans-serif;
      color:var(--dim);
      letter-spacing:0.22em;
    }
    .h-counts .exact{ color:var(--moss); font-weight:600; }
    .h-counts .off{ color:var(--vermilion); }
    .stamp{
      position:absolute; right:0.9rem; bottom:0.9rem;
      width:2.1rem; height:2.1rem;
      border:2px solid rgba(199,62,46,0.65);
      color:rgba(199,62,46,0.8);
      display:flex; align-items:center; justify-content:center;
      font:800 1rem 'Shippori Mincho', serif;
      transform:rotate(-7deg);
      user-select:none;
      opacity:0.85;
    }
    .tools{
      display:flex; gap:0.5rem; justify-content:center;
      border-top:1px dashed var(--line); padding:0.6rem;
    }
    .tools button{
      background:transparent; border:1px solid var(--line);
      color:var(--ink-soft); cursor:pointer;
      font:400 0.82rem 'Zen Kurenaido', sans-serif;
      padding:0.5rem 1rem; min-height:2.75rem; min-width:2.75rem;
      transition:border-color 0.12s, color 0.12s;
    }
    .tools button:hover{ border-color:var(--vermilion); color:var(--vermilion); }
    .tools button:focus-visible{ outline:3px solid var(--vermilion); outline-offset:2px; }
    footer{
      margin-top:2.2rem; max-width:34rem; text-align:center;
      font:italic 300 0.85rem 'Fraunces', serif; color:var(--dim);
    }
    @media (prefers-reduced-motion: reduce){
      .h-line{ animation:none; opacity:1; transform:none; }
      #haikuBtn{ transition:none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Haiku <span class="bloom">Button</span></h1>
    <p class="tag">paste anything — a rant, an error log, a breakup text — it becomes <b>5 · 7 · 5</b> as you type</p>
  </header>
  <main>
    <div class="paper">
      <label class="sr" for="inputText">Text to turn into a haiku</label>
      <textarea id="inputText" placeholder="the deploy failed again because someone force pushed to main on a friday afternoon and now the pager is screaming and the coffee machine is broken too…" autocomplete="off"></textarea>
      <div class="meta-strip">
        <span id="wordCount" aria-live="off">0 words</span>
        <span id="sylCount">0 syllables</span>
      </div>
    </div>

    <div class="press-row">
      <button id="haikuBtn" type="button" title="cut another haiku from the same text (Ctrl+Enter)"><span class="jp" aria-hidden="true">俳句</span>another cut</button>
    </div>

    <div class="paper">
      <div class="haiku-card empty" id="haikuCard" aria-live="polite">
        <p style="margin:0">your haiku appears here, live —<br>start typing above</p>
      </div>
      <div class="stamp" aria-hidden="true" id="stamp" hidden>句</div>
      <div class="tools">
        <button type="button" id="copyBtn">copy haiku</button>
        <button type="button" id="shuffleBtn" title="same as the big button">recut ↺</button>
      </div>
    </div>
  </main>
  <footer>every word is yours — the button only finds the 5·7·5 hiding inside. no cloud, no model, just syllables.</footer>

  <script>
  (() => {
    'use strict';
    /* ───── syllable counter — classic English heuristic ─────
       vowel-group counting with the usual corrections: silent trailing -e
       (unless -le/-les after a consonant), -ed endings that don't voice a
       syllable, y as a vowel, common diphthongs collapsed by the grouping
       itself, and a floor of 1 for any word with letters. */
    function syllables(word){
      let w = word.toLowerCase().replace(/[^a-zà-öø-ÿ']/g, '');
      if (!w) return 0;
      if (w.length <= 2) return 1;
      const groups = w.match(/[aeiouyà-öø-ÿ]+/g);
      if (!groups) return 1;
      let n = groups.length;
      if (/[^aeiouy]e$/.test(w) && !/[^aeiouy]le$/.test(w)) n--;          /* silent -e (bake) but not table */
      if (/[^aeiouy]es$/.test(w) && !/[sxzc]es$|[^aeiouy]les$/.test(w)) n--; /* bakes, but not boxes/tables */
      if (/[^aeiouydt]ed$/.test(w)) n--;                                   /* jumped, but not wanted/added */
      if (/ia|io|ua|eo/.test(w)) { /* hiatus pairs the grouping merged — radio, create */
        const hits = w.match(/i[ao]|ua|eo/g);
        if (hits) n += hits.length;
      }
      return Math.max(1, n);
    }

    /* tokenize keeping order; each token = {t: word-as-typed, s: syllables} */
    function tokenize(text){
      return (text.match(/[A-Za-zà-öø-ÿ0-9']+/g) || [])
        .map(t => ({ t, s: /^\d+$/.test(t) ? String(t).length : syllables(t) }))
        .filter(x => x.s > 0);
    }

    /* ───── the cutter ─────
       find runs of CONSECUTIVE words that sum to exactly 5, 7, 5 syllables.
       For every start index, greedily pack lines; collect every distinct
       exact match. If no exact cut exists, fall back to the least-wrong cut
       (minimal total |deviation|), so the button always answers. */
    function cutHaikus(tokens){
      const TARGET = [5,7,5];
      const exact = [], loose = [];
      for (let start = 0; start < tokens.length; start++){
        let i = start; const lines = []; let dev = 0; let ok = true;
        for (const want of TARGET){
          const line = []; let sum = 0;
          while (i < tokens.length && sum < want){
            sum += tokens[i].s; line.push(tokens[i].t); i++;
          }
          if (!line.length){ ok = false; break; }
          dev += Math.abs(sum - want);
          lines.push({ words: line, syl: sum });
        }
        if (!ok) continue;
        const cut = { lines, dev, start };
        if (dev === 0) exact.push(cut); else loose.push(cut);
      }
      loose.sort((a,b) => a.dev - b.dev || a.start - b.start);
      /* exact cuts lead, best near-misses follow — the button always has
         somewhere to go even when only one true 5·7·5 hides in the text */
      return exact.concat(loose.slice(0, 8)).slice(0, 16);
    }

    /* ───── state + render ───── */
    const input = document.getElementById('inputText');
    const card = document.getElementById('haikuCard');
    const stamp = document.getElementById('stamp');
    const btn = document.getElementById('haikuBtn');
    const copyBtn = document.getElementById('copyBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const wordCountEl = document.getElementById('wordCount');
    const sylCountEl = document.getElementById('sylCount');
    let cuts = [], cutIdx = 0, current = null;

    function esc(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function render(){
      if (!current){
        card.className = 'haiku-card empty';
        card.innerHTML = '<p style="margin:0">' + (input.value.trim()
          ? 'need a few more words —<br>haikus are hungry little things'
          : 'your haiku appears here, live —<br>start typing above') + '</p>';
        stamp.hidden = true;
        return;
      }
      card.className = 'haiku-card';
      const counts = current.lines.map((l,i) => {
        const want = [5,7,5][i];
        return '<span class="' + (l.syl === want ? 'exact' : 'off') + '">' + l.syl + '</span>';
      }).join(' · ');
      card.innerHTML =
        current.lines.map(l => '<p class="h-line">' + esc(l.words.join(' ')) + '</p>').join('') +
        '<p class="h-counts">' + counts + (current.dev === 0 ? ' <span class="exact">— true 5·7·5</span>' : ' — closest cut') + '</p>';
      stamp.hidden = false;
    }

    function recompute(fresh){
      const tokens = tokenize(input.value);
      const totalSyl = tokens.reduce((a,x) => a + x.s, 0);
      wordCountEl.textContent = tokens.length + ' word' + (tokens.length === 1 ? '' : 's');
      sylCountEl.textContent = totalSyl + ' syllable' + (totalSyl === 1 ? '' : 's');
      cuts = tokens.length >= 3 ? cutHaikus(tokens) : [];
      if (fresh) cutIdx = 0;
      current = cuts.length ? cuts[cutIdx % cuts.length] : null;
      btn.disabled = cuts.length < 2;
      render();
    }

    let debounce = null;
    input.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => recompute(true), 140);
    });

    function another(){
      if (!cuts.length) return;
      cutIdx = (cutIdx + 1) % cuts.length;
      current = cuts[cutIdx];
      render();
    }
    btn.addEventListener('click', another);
    shuffleBtn.addEventListener('click', another);
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter'){ e.preventDefault(); another(); }
    });

    copyBtn.addEventListener('click', async () => {
      if (!current) return;
      const text = current.lines.map(l => l.words.join(' ')).join('\n');
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = 'copied ✓';
      } catch(e){ copyBtn.textContent = 'copy failed'; }
      setTimeout(() => copyBtn.textContent = 'copy haiku', 1300);
    });

    recompute(true);
  })();
  </script>
</body>
</html>
