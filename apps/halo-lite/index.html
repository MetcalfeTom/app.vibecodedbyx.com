<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Halo Lite · top-down plasma wars</title>
<link rel="icon" href="https://emojicdn.elk.sh/🛡️">
<meta name="description" content="Top-down sci-fi arena shooter. Recharge armor shields, switch energy weapons, and hold back waves of Covenant drones.">
<meta property="og:title" content="Halo Lite" />
<meta property="og:description" content="Top-down arena shooter. Recharge armor shields, swap plasma weapons, survive the waves." />
<meta property="og:image" content="https://image.pollinations.ai/prompt/top%20down%20sci%20fi%20arena%20shooter%20scene%20with%20green%20armored%20space%20marine%20firing%20glowing%20plasma%20bolts%20at%20purple%20alien%20drones%20on%20a%20metallic%20grid%20floor%2C%20cyan%20energy%20shield%20flare%2C%20neon%20lights%2C%20cinematic?width=1200&height=630&nologo=true&seed=33091" />
<meta property="og:url" content="https://sloppy.live/halo-lite" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #03070b;
    --bg1: #071223;
    --steel: #1a2130;
    --steel-light: #2e3a4f;
    --shield: #3cefff;
    --shield-dark: #0e99ad;
    --chief: #2d6e3a;
    --chief-light: #6dd178;
    --visor: #f2b32e;
    --hp: #ff3838;
    --plasma-green: #b9ff4a;
    --plasma-blue: #42b6ff;
    --plasma-purple: #c569ff;
    --purple: #8a3cff;
    --grunt: #ff9a36;
    --jackal: #31c49a;
    --elite: #8a3cff;
    --covenant: #ff2e89;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg0); color: #c8e5ff; font-family: 'Share Tech Mono', monospace; user-select: none; -webkit-user-select: none; }
  body {
    background:
      radial-gradient(ellipse at 50% 110%, rgba(60, 239, 255, 0.12), transparent 60%),
      radial-gradient(ellipse at 10% -10%, rgba(138, 60, 255, 0.14), transparent 55%),
      linear-gradient(180deg, #03070b, #071223);
  }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; cursor: crosshair; touch-action: none; }

  .hud {
    position: fixed;
    left: 18px;
    bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 5;
    pointer-events: none;
  }
  .bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: rgba(200, 229, 255, 0.65);
  }
  .bar-wrap .k { width: 62px; text-transform: uppercase; }
  .bar {
    width: 260px;
    height: 14px;
    background: rgba(5, 12, 22, 0.75);
    border: 1px solid rgba(255, 255, 255, 0.13);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .bar .fill {
    height: 100%;
    transition: width 0.1s;
    position: relative;
  }
  .bar .fill.shield {
    background: linear-gradient(90deg, #0e99ad, #3cefff);
    box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5);
  }
  .bar .fill.health {
    background: linear-gradient(90deg, #b91f1f, #ff3838);
  }
  .bar.flash { box-shadow: 0 0 16px var(--shield); }

  .topbar {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-family: 'Orbitron', sans-serif;
    z-index: 5;
    pointer-events: none;
    text-align: center;
  }
  .wave {
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 0.32em;
    color: var(--shield);
    text-shadow: 0 0 10px rgba(60, 239, 255, 0.6);
  }
  .score {
    font-family: 'VT323', monospace;
    font-size: 24px;
    color: var(--visor);
    letter-spacing: 0.1em;
    text-shadow: 0 0 8px rgba(242, 179, 46, 0.55);
  }

  .weaponHUD {
    position: fixed;
    right: 18px;
    bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 5;
    pointer-events: none;
    align-items: flex-end;
  }
  .weapon {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.22em;
    color: rgba(200, 229, 255, 0.4);
    padding: 5px 10px;
    border-radius: 3px;
    border: 1px solid transparent;
    background: rgba(5, 12, 22, 0.5);
    text-transform: uppercase;
  }
  .weapon .n {
    width: 14px;
    height: 14px;
    line-height: 14px;
    background: rgba(255,255,255,0.08);
    text-align: center;
    font-size: 10px;
    border-radius: 2px;
  }
  .weapon.active {
    color: var(--shield);
    border-color: var(--shield-dark);
    background: rgba(60, 239, 255, 0.08);
    box-shadow: 0 0 16px rgba(60, 239, 255, 0.25);
  }
  .weapon.active .n { background: var(--shield); color: #001018; }

  .center-msg {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 20;
    padding: 28px;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, rgba(5, 12, 22, 0.75), rgba(3, 7, 11, 0.95));
    backdrop-filter: blur(4px);
    transition: opacity 0.4s;
  }
  .center-msg.hidden { display: none; }
  .center-msg h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(40px, 7vw, 80px);
    letter-spacing: 0.14em;
    color: var(--shield);
    text-shadow: 0 0 30px rgba(60, 239, 255, 0.5), 0 0 8px rgba(138, 60, 255, 0.5);
    margin-bottom: 4px;
  }
  .center-msg h1 .alt { color: var(--visor); text-shadow: 0 0 30px rgba(242, 179, 46, 0.6); }
  .center-msg h2 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(18px, 2.4vw, 28px);
    letter-spacing: 0.22em;
    color: rgba(200, 229, 255, 0.65);
    margin-bottom: 18px;
  }
  .center-msg p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.14em;
    color: rgba(200, 229, 255, 0.55);
    line-height: 1.9;
    max-width: 520px;
  }
  .center-msg kbd {
    font-family: 'Share Tech Mono', monospace;
    background: rgba(60, 239, 255, 0.1);
    border: 1px solid rgba(60, 239, 255, 0.4);
    padding: 2px 8px;
    margin: 0 2px;
    border-radius: 3px;
    color: var(--shield);
    font-size: 13px;
  }
  .center-msg .go-btn {
    pointer-events: auto;
    margin-top: 28px;
    padding: 16px 36px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 0.32em;
    color: #001018;
    background: linear-gradient(160deg, #3cefff, #0e99ad);
    border: none;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 6px 0 rgba(0, 0, 0, 0.55), 0 0 28px rgba(60, 239, 255, 0.45);
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .center-msg .go-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 rgba(0,0,0,0.55), 0 0 38px rgba(60, 239, 255, 0.7); }
  .center-msg .go-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.55), 0 0 18px rgba(60, 239, 255, 0.45); }

  .mobile-hint { display: none; font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 0.12em; color: rgba(200, 229, 255, 0.55); margin-top: 10px; }

  .touch {
    position: fixed;
    inset: 0;
    z-index: 6;
    pointer-events: none;
    display: none;
  }
  .touch.on { display: block; }
  .joy {
    position: absolute;
    bottom: 100px;
    left: 30px;
    width: 130px;
    height: 130px;
    border: 2px solid rgba(60, 239, 255, 0.4);
    background: rgba(60, 239, 255, 0.05);
    border-radius: 50%;
    pointer-events: auto;
    touch-action: none;
  }
  .joy .knob {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 50px; height: 50px;
    background: rgba(60, 239, 255, 0.25);
    border: 2px solid rgba(60, 239, 255, 0.7);
    border-radius: 50%;
  }
  .fire {
    position: absolute;
    bottom: 110px;
    right: 30px;
    width: 140px;
    height: 140px;
    background: rgba(242, 179, 46, 0.12);
    border: 2px solid rgba(242, 179, 46, 0.5);
    border-radius: 50%;
    color: var(--visor);
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 0.2em;
    pointer-events: auto;
    touch-action: none;
  }
  .fire:active { background: rgba(242, 179, 46, 0.28); }
  .wswap {
    position: absolute;
    bottom: 30px;
    right: 40px;
    padding: 12px 22px;
    background: rgba(60, 239, 255, 0.12);
    border: 2px solid rgba(60, 239, 255, 0.5);
    border-radius: 26px;
    color: var(--shield);
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.2em;
    pointer-events: auto;
    touch-action: none;
  }

  @media (pointer: coarse), (max-width: 720px) {
    .touch { display: block; }
    .mobile-hint { display: block; }
    .bar { width: 180px; }
    .hud { left: 10px; bottom: 10px; }
    .weaponHUD { right: 10px; bottom: 170px; }
  }
</style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="bar-wrap"><span class="k">SHIELD</span><div class="bar" id="shieldBar"><div class="fill shield" id="shieldFill" style="width:100%"></div></div></div>
    <div class="bar-wrap"><span class="k">ARMOR</span><div class="bar" id="hpBar"><div class="fill health" id="hpFill" style="width:100%"></div></div></div>
  </div>

  <div class="topbar">
    <div class="wave" id="waveLabel">WAVE 1</div>
    <div class="score" id="scoreLabel">0000</div>
  </div>

  <div class="weaponHUD" id="weaponHUD"></div>

  <div class="center-msg" id="intro">
    <h1>HALO <span class="alt">LITE</span></h1>
    <h2>ARMOR ONLINE</h2>
    <p>
      <kbd>W A S D</kbd> move &nbsp;·&nbsp; <kbd>MOUSE</kbd> aim &nbsp;·&nbsp; <kbd>CLICK</kbd> fire<br>
      <kbd>1</kbd> plasma pistol &nbsp;<kbd>2</kbd> plasma rifle &nbsp;<kbd>3</kbd> energy sword<br>
      <kbd>SHIFT</kbd> dash &nbsp;·&nbsp; <kbd>Q</kbd> switch weapon
    </p>
    <div class="mobile-hint">left stick = move · right button = fire · top-right = swap</div>
    <button class="go-btn" id="startBtn">ENGAGE</button>
  </div>

  <div class="center-msg hidden" id="gameover">
    <h1 style="color: var(--hp); text-shadow: 0 0 30px rgba(255,56,56,0.5);">ARMOR OFFLINE</h1>
    <h2>SIGNAL LOST</h2>
    <p>
      final wave: <span id="goWave">1</span> &nbsp;·&nbsp; score: <span id="goScore">0</span><br>
      kills: <span id="goKills">0</span>
    </p>
    <button class="go-btn" id="restartBtn">REDEPLOY</button>
  </div>

  <div class="touch" id="touch">
    <div class="joy" id="joy"><div class="knob" id="knob"></div></div>
    <button class="fire" id="fireBtn">FIRE</button>
    <button class="wswap" id="wswapBtn">SWAP</button>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const shieldFill = document.getElementById('shieldFill');
  const hpFill = document.getElementById('hpFill');
  const shieldBar = document.getElementById('shieldBar');
  const waveLabel = document.getElementById('waveLabel');
  const scoreLabel = document.getElementById('scoreLabel');
  const weaponHUD = document.getElementById('weaponHUD');
  const intro = document.getElementById('intro');
  const gameover = document.getElementById('gameover');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const goWave = document.getElementById('goWave');
  const goScore = document.getElementById('goScore');
  const goKills = document.getElementById('goKills');

  let W = 0, H = 0, DPR = 1;
  let cx = 0, cy = 0;
  let t = 0;
  let shake = 0;

  // ---------- World ----------
  const ARENA = { w: 1800, h: 1200 };

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    cx = W / 2;
    cy = H / 2;
  }
  window.addEventListener('resize', resize);

  // ---------- Weapons ----------
  const WEAPONS = [
    {
      key: 'pistol',
      label: 'PLASMA PISTOL',
      color: '#b9ff4a',
      trail: '#f4ff8c',
      damage: 12,
      rate: 280,    // ms between shots
      speed: 620,
      spread: 0.02,
      bolts: 1,
      radius: 5,
      life: 1.4,
      kind: 'ranged',
      sfx: 'pistol'
    },
    {
      key: 'rifle',
      label: 'PLASMA RIFLE',
      color: '#42b6ff',
      trail: '#8ddcff',
      damage: 7,
      rate: 90,
      speed: 780,
      spread: 0.065,
      bolts: 1,
      radius: 3.5,
      life: 1.1,
      kind: 'ranged',
      sfx: 'rifle'
    },
    {
      key: 'sword',
      label: 'ENERGY SWORD',
      color: '#c569ff',
      trail: '#e4a7ff',
      damage: 58,
      rate: 360,
      speed: 0,
      spread: 0,
      bolts: 0,
      radius: 0,
      life: 0,
      kind: 'melee',
      reach: 82,
      arc: Math.PI * 0.45,
      sfx: 'sword'
    }
  ];

  // ---------- Enemy Archetypes ----------
  const ENEMY_TYPES = {
    grunt: {
      name: 'GRUNT',
      radius: 13,
      color: '#ff9a36',
      dark: '#a65a0d',
      hp: 22,
      shield: 0,
      speed: 70,
      attackRange: 300,
      fireRate: 1100,
      boltSpeed: 360,
      boltDamage: 7,
      boltColor: '#b9ff4a',
      score: 15
    },
    jackal: {
      name: 'JACKAL',
      radius: 15,
      color: '#31c49a',
      dark: '#0f6a52',
      hp: 30,
      shield: 35,
      shieldArc: Math.PI * 0.9,   // frontal arc
      speed: 90,
      attackRange: 340,
      fireRate: 720,
      boltSpeed: 460,
      boltDamage: 10,
      boltColor: '#a2d6ff',
      score: 35
    },
    elite: {
      name: 'ELITE',
      radius: 22,
      color: '#8a3cff',
      dark: '#3b138e',
      hp: 70,
      shield: 90,
      speed: 120,
      attackRange: 380,
      fireRate: 160,
      boltSpeed: 520,
      boltDamage: 6,
      boltColor: '#42b6ff',
      burst: 4,
      score: 100
    }
  };

  // ---------- Game State ----------
  let mode = 'title'; // title | playing | gameover
  let player, bullets, enemyBolts, enemies, particles, floaters;
  let camX, camY;
  let score, kills, waveNum, waveState, waveTimer, waveSpawnQueue;
  let weaponIdx = 0;
  let dashTimer = 0;
  let dashCooldown = 0;
  let swordSwing = null;
  let mouse = { x: 0, y: 0, worldX: 0, worldY: 0, down: false, rightDown: false };
  const keys = new Set();

  function newGame() {
    player = {
      x: ARENA.w / 2, y: ARENA.h / 2,
      vx: 0, vy: 0,
      angle: 0,
      radius: 16,
      health: 100, healthMax: 100,
      shield: 100, shieldMax: 100,
      shieldRegenDelay: 0,
      shieldBreakFlash: 0,
      fireCooldown: 0,
      alive: true
    };
    bullets = [];
    enemyBolts = [];
    enemies = [];
    particles = [];
    floaters = [];
    camX = player.x - W/2;
    camY = player.y - H/2;
    score = 0;
    kills = 0;
    waveNum = 0;
    weaponIdx = 0;
    dashTimer = 0;
    dashCooldown = 0;
    swordSwing = null;
    startWave(1);
    renderWeaponHUD();
    updateBars();
  }

  // ---------- Waves ----------
  function startWave(n) {
    waveNum = n;
    waveLabel.textContent = 'WAVE ' + n;
    waveSpawnQueue = [];
    const baseCount = Math.min(22, 4 + Math.floor(n * 1.4));
    // Composition scales with wave
    for (let i = 0; i < baseCount; i++) {
      let type = 'grunt';
      const roll = Math.random();
      if (n >= 3 && roll > 0.72) type = 'jackal';
      if (n >= 5 && roll > 0.92) type = 'elite';
      waveSpawnQueue.push({ type, delay: 400 + i * 360 + Math.random() * 180 });
    }
    waveState = 'spawning';
    waveTimer = 1200; // brief pause before first spawn
    // Restore shields/health between waves
    player.shield = player.shieldMax;
    if (n > 1) player.health = Math.min(player.healthMax, player.health + 25);
    updateBars();
  }

  function spawnEnemy(type) {
    const edge = Math.floor(Math.random() * 4);
    let x, y;
    const margin = 40;
    if (edge === 0) { x = Math.random() * ARENA.w; y = margin; }
    else if (edge === 1) { x = ARENA.w - margin; y = Math.random() * ARENA.h; }
    else if (edge === 2) { x = Math.random() * ARENA.w; y = ARENA.h - margin; }
    else { x = margin; y = Math.random() * ARENA.h; }
    const def = ENEMY_TYPES[type];
    enemies.push({
      type,
      def,
      x, y,
      vx: 0, vy: 0,
      hp: def.hp,
      shield: def.shield,
      shieldMax: def.shield,
      angle: 0,
      fireTimer: def.fireRate + Math.random() * 600,
      burstLeft: 0,
      spawnFade: 0
    });
  }

  // ---------- Input ----------
  window.addEventListener('keydown', (e) => {
    keys.add(e.key.toLowerCase());
    if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.key === '1') switchWeapon(0);
    if (e.key === '2') switchWeapon(1);
    if (e.key === '3') switchWeapon(2);
    if (e.key.toLowerCase() === 'q') switchWeapon((weaponIdx + 1) % WEAPONS.length);
    if (e.key === 'Shift') tryDash();
    if (mode === 'title' && (e.key === 'Enter' || e.key === ' ')) startGame();
    if (mode === 'gameover' && (e.key === 'Enter' || e.key === ' ')) startGame();
  });
  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));

  canvas.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  canvas.addEventListener('mousedown', (e) => {
    ensureAudio();
    if (e.button === 0) mouse.down = true;
    if (e.button === 2) mouse.rightDown = true;
  });
  canvas.addEventListener('mouseup', (e) => {
    if (e.button === 0) mouse.down = false;
    if (e.button === 2) mouse.rightDown = false;
  });
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());

  function switchWeapon(i) {
    if (i < 0 || i >= WEAPONS.length) return;
    weaponIdx = i;
    player.fireCooldown = 120;
    renderWeaponHUD();
  }

  function tryDash() {
    if (dashCooldown > 0 || !player.alive) return;
    // dash direction from movement input, fallback to facing
    let dx = 0, dy = 0;
    if (keys.has('w') || keys.has('arrowup')) dy -= 1;
    if (keys.has('s') || keys.has('arrowdown')) dy += 1;
    if (keys.has('a') || keys.has('arrowleft')) dx -= 1;
    if (keys.has('d') || keys.has('arrowright')) dx += 1;
    // touch dir
    if (touchState.on && (touchState.dx || touchState.dy)) {
      dx = touchState.dx; dy = touchState.dy;
    }
    if (Math.abs(dx) + Math.abs(dy) < 0.01) {
      dx = Math.cos(player.angle);
      dy = Math.sin(player.angle);
    }
    const l = Math.sqrt(dx*dx + dy*dy) || 1;
    dx /= l; dy /= l;
    player.vx = dx * 820;
    player.vy = dy * 820;
    dashTimer = 0.22;
    dashCooldown = 1.15;
    playSFX('dash');
    // dash particles
    for (let i = 0; i < 14; i++) {
      particles.push({
        x: player.x, y: player.y,
        vx: -dx * 180 + (Math.random() - 0.5) * 140,
        vy: -dy * 180 + (Math.random() - 0.5) * 140,
        life: 0.5, maxLife: 0.5,
        color: '#3cefff', r: 3 + Math.random() * 2
      });
    }
  }

  // ---------- Touch ----------
  const touchState = { on: false, dx: 0, dy: 0, firing: false };
  const touchEl = document.getElementById('touch');
  const joy = document.getElementById('joy');
  const knob = document.getElementById('knob');
  const fireBtn = document.getElementById('fireBtn');
  const wswapBtn = document.getElementById('wswapBtn');
  if (window.matchMedia('(pointer: coarse)').matches || window.innerWidth < 720) {
    touchState.on = true;
    touchEl.classList.add('on');
  }

  function bindJoy() {
    let active = false;
    let cx0 = 0, cy0 = 0;
    const start = (e) => {
      e.preventDefault();
      ensureAudio();
      const rect = joy.getBoundingClientRect();
      cx0 = rect.left + rect.width/2;
      cy0 = rect.top + rect.height/2;
      active = true;
      move(e);
    };
    const move = (e) => {
      if (!active) return;
      e.preventDefault();
      const t = e.touches ? e.touches[0] : e;
      const dx = t.clientX - cx0;
      const dy = t.clientY - cy0;
      const max = 50;
      const d = Math.sqrt(dx*dx+dy*dy);
      const clamped = Math.min(d, max);
      const angle = Math.atan2(dy, dx);
      const kx = Math.cos(angle) * clamped;
      const ky = Math.sin(angle) * clamped;
      knob.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;
      touchState.dx = Math.cos(angle) * (clamped / max);
      touchState.dy = Math.sin(angle) * (clamped / max);
    };
    const end = (e) => {
      active = false;
      touchState.dx = 0; touchState.dy = 0;
      knob.style.transform = 'translate(-50%, -50%)';
    };
    joy.addEventListener('touchstart', start, { passive: false });
    joy.addEventListener('touchmove', move, { passive: false });
    joy.addEventListener('touchend', end);
    joy.addEventListener('touchcancel', end);
  }
  bindJoy();
  fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); ensureAudio(); touchState.firing = true; mouse.down = true; }, { passive: false });
  fireBtn.addEventListener('touchend', (e) => { e.preventDefault(); touchState.firing = false; mouse.down = false; });
  wswapBtn.addEventListener('touchstart', (e) => { e.preventDefault(); switchWeapon((weaponIdx + 1) % WEAPONS.length); });

  // ---------- Audio ----------
  let audioCtx = null;
  let masterGain = null;
  function ensureAudio() {
    if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.75;
      const comp = audioCtx.createDynamicsCompressor();
      comp.threshold.value = -14;
      comp.ratio.value = 6;
      masterGain.connect(comp);
      comp.connect(audioCtx.destination);
    } catch(e) {}
  }
  function tone({ freq = 440, type = 'sine', dur = 0.2, vol = 0.1, sweep = 0, delay = 0, q = 0, filter = null }) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime + delay;
    const o = audioCtx.createOscillator();
    o.type = type;
    o.frequency.setValueAtTime(freq, now);
    if (sweep) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + sweep), now + dur);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.004);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    let dest = g;
    if (filter) {
      const f = audioCtx.createBiquadFilter();
      f.type = filter.type || 'bandpass';
      f.frequency.value = filter.freq || 1000;
      f.Q.value = q || 1;
      o.connect(f); f.connect(g); dest = g;
    } else {
      o.connect(g);
    }
    g.connect(masterGain);
    o.start(now);
    o.stop(now + dur + 0.05);
  }
  function noise({ dur = 0.2, vol = 0.1, filterFreq = 800, q = 1.5, bandpass = true }) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/ch.length, 1.3);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const f = audioCtx.createBiquadFilter();
    f.type = bandpass ? 'bandpass' : 'lowpass';
    f.frequency.value = filterFreq;
    f.Q.value = q;
    const g = audioCtx.createGain();
    g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(masterGain);
    src.start(now);
  }
  function playSFX(kind) {
    if (!audioCtx) return;
    switch(kind) {
      case 'pistol':
        tone({ freq: 620, type: 'triangle', dur: 0.14, vol: 0.11, sweep: -340 });
        noise({ dur: 0.09, vol: 0.05, filterFreq: 1800, q: 2 });
        break;
      case 'rifle':
        tone({ freq: 880, type: 'square', dur: 0.06, vol: 0.07, sweep: -380 });
        break;
      case 'sword':
        tone({ freq: 440, type: 'sawtooth', dur: 0.28, vol: 0.09, sweep: 420 });
        noise({ dur: 0.18, vol: 0.06, filterFreq: 2200, q: 3 });
        break;
      case 'shieldHit':
        tone({ freq: 1600, type: 'sine', dur: 0.15, vol: 0.1, sweep: 380 });
        break;
      case 'shieldBreak':
        noise({ dur: 0.5, vol: 0.18, filterFreq: 1100, q: 1, bandpass: false });
        tone({ freq: 300, type: 'sine', dur: 0.4, vol: 0.09, sweep: -180 });
        break;
      case 'hit':
        tone({ freq: 220, type: 'square', dur: 0.11, vol: 0.1, sweep: -120 });
        break;
      case 'enemyDeath':
        tone({ freq: 420, type: 'sawtooth', dur: 0.26, vol: 0.1, sweep: -340 });
        noise({ dur: 0.24, vol: 0.08, filterFreq: 620, q: 1.2 });
        break;
      case 'eliteDeath':
        tone({ freq: 640, type: 'sawtooth', dur: 0.45, vol: 0.12, sweep: -560 });
        noise({ dur: 0.5, vol: 0.12, filterFreq: 400, q: 0.8, bandpass: false });
        break;
      case 'dash':
        noise({ dur: 0.18, vol: 0.08, filterFreq: 2400, q: 2 });
        tone({ freq: 520, type: 'sine', dur: 0.2, vol: 0.06, sweep: 480 });
        break;
      case 'waveStart':
        tone({ freq: 523, type: 'sine', dur: 0.3, vol: 0.08 });
        tone({ freq: 659, type: 'sine', dur: 0.3, vol: 0.08, delay: 0.12 });
        tone({ freq: 784, type: 'sine', dur: 0.45, vol: 0.09, delay: 0.24 });
        break;
      case 'gameover':
        tone({ freq: 420, type: 'sawtooth', dur: 0.5, vol: 0.12, sweep: -320 });
        tone({ freq: 210, type: 'sawtooth', dur: 0.9, vol: 0.11, sweep: -160, delay: 0.3 });
        break;
    }
  }

  // ---------- Shooting ----------
  function fireWeapon() {
    const w = WEAPONS[weaponIdx];
    if (w.kind === 'melee') {
      // sword swing
      if (swordSwing) return;
      swordSwing = {
        angleStart: player.angle - w.arc/2,
        angleEnd: player.angle + w.arc/2,
        progress: 0,
        duration: 0.18,
        hit: new Set()
      };
      playSFX('sword');
      return;
    }
    // ranged
    const angle = player.angle + (Math.random() - 0.5) * w.spread;
    const vx = Math.cos(angle) * w.speed;
    const vy = Math.sin(angle) * w.speed;
    const mx = player.x + Math.cos(player.angle) * 22;
    const my = player.y + Math.sin(player.angle) * 22;
    bullets.push({
      x: mx, y: my,
      vx, vy, angle,
      life: w.life,
      damage: w.damage,
      radius: w.radius,
      color: w.color,
      trail: w.trail,
      weapon: w.key
    });
    // Muzzle flash particles
    for (let i = 0; i < 4; i++) {
      particles.push({
        x: mx, y: my,
        vx: vx * 0.1 + (Math.random() - 0.5) * 80,
        vy: vy * 0.1 + (Math.random() - 0.5) * 80,
        life: 0.15, maxLife: 0.15,
        color: w.color, r: 2 + Math.random()
      });
    }
    playSFX(w.sfx);
  }

  // ---------- Update ----------
  function update(dt) {
    if (mode !== 'playing') return;

    t += dt;
    dashTimer = Math.max(0, dashTimer - dt);
    dashCooldown = Math.max(0, dashCooldown - dt);

    // Player movement
    let ix = 0, iy = 0;
    if (keys.has('w') || keys.has('arrowup')) iy -= 1;
    if (keys.has('s') || keys.has('arrowdown')) iy += 1;
    if (keys.has('a') || keys.has('arrowleft')) ix -= 1;
    if (keys.has('d') || keys.has('arrowright')) ix += 1;
    if (touchState.on) {
      ix = touchState.dx;
      iy = touchState.dy;
    }
    const il = Math.sqrt(ix*ix + iy*iy);
    if (il > 0.01) { ix /= il; iy /= il; }
    const targetVX = ix * 280;
    const targetVY = iy * 280;
    if (dashTimer > 0) {
      // dash overrides velocity (already set on activation), decay
      player.vx *= Math.pow(0.0015, dt);
      player.vy *= Math.pow(0.0015, dt);
    } else {
      const accel = 14;
      player.vx += (targetVX - player.vx) * Math.min(1, dt * accel);
      player.vy += (targetVY - player.vy) * Math.min(1, dt * accel);
    }
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Clamp to arena
    player.x = Math.max(player.radius + 8, Math.min(ARENA.w - player.radius - 8, player.x));
    player.y = Math.max(player.radius + 8, Math.min(ARENA.h - player.radius - 8, player.y));

    // Aim
    // Convert mouse → world
    mouse.worldX = mouse.x + camX;
    mouse.worldY = mouse.y + camY;
    const dx = mouse.worldX - player.x;
    const dy = mouse.worldY - player.y;
    if (!touchState.on) {
      player.angle = Math.atan2(dy, dx);
    } else {
      // Auto-aim: find nearest enemy
      let nearest = null, ndist = 1e9;
      for (const e of enemies) {
        const dd = (e.x - player.x)**2 + (e.y - player.y)**2;
        if (dd < ndist) { nearest = e; ndist = dd; }
      }
      if (nearest) player.angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
      else if (il > 0.01) player.angle = Math.atan2(iy, ix);
    }

    // Shield regen
    player.shieldRegenDelay = Math.max(0, player.shieldRegenDelay - dt);
    if (player.shieldRegenDelay <= 0 && player.shield < player.shieldMax) {
      player.shield = Math.min(player.shieldMax, player.shield + 28 * dt);
      updateBars();
    }
    if (player.shieldBreakFlash > 0) player.shieldBreakFlash -= dt;

    // Fire
    player.fireCooldown -= dt * 1000;
    if (mouse.down && player.fireCooldown <= 0 && player.alive) {
      fireWeapon();
      player.fireCooldown = WEAPONS[weaponIdx].rate;
    }

    // Sword swing update
    if (swordSwing) {
      swordSwing.progress += dt;
      const w = WEAPONS[weaponIdx];
      const tnorm = Math.min(1, swordSwing.progress / swordSwing.duration);
      const reach = w.reach;
      // Check hits during swing
      for (const e of enemies) {
        if (swordSwing.hit.has(e)) continue;
        const edx = e.x - player.x, edy = e.y - player.y;
        const d = Math.sqrt(edx*edx + edy*edy);
        if (d > reach + e.def.radius) continue;
        const eAngle = Math.atan2(edy, edx);
        const currentAngle = swordSwing.angleStart + (swordSwing.angleEnd - swordSwing.angleStart) * tnorm;
        const diff = Math.abs(angleDiff(eAngle, currentAngle));
        if (diff < 0.5) {
          damageEnemy(e, w.damage, true);
          swordSwing.hit.add(e);
          pushEnemy(e, edx/d, edy/d, 240);
        }
      }
      if (swordSwing.progress >= swordSwing.duration) swordSwing = null;
    }

    // Update bullets
    for (const b of bullets) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt;
      // Arena bounds
      if (b.x < 0 || b.x > ARENA.w || b.y < 0 || b.y > ARENA.h) b.life = 0;
      // Enemy collision
      for (const e of enemies) {
        const edx = b.x - e.x, edy = b.y - e.y;
        const rr = e.def.radius + b.radius;
        if (edx*edx + edy*edy < rr*rr) {
          damageEnemy(e, b.damage, false);
          // Extra knockback on hit
          const l = Math.sqrt(edx*edx + edy*edy) || 1;
          pushEnemy(e, -edx/l, -edy/l, 40);
          b.life = 0;
          break;
        }
      }
    }
    for (let i = bullets.length - 1; i >= 0; i--) if (bullets[i].life <= 0) bullets.splice(i, 1);

    // Update enemies (AI)
    for (const e of enemies) {
      e.spawnFade = Math.min(1, e.spawnFade + dt * 4);
      const edx = player.x - e.x, edy = player.y - e.y;
      const d = Math.sqrt(edx*edx + edy*edy);
      const nx = d > 0.1 ? edx/d : 0, ny = d > 0.1 ? edy/d : 0;
      // Move toward player until within attackRange * 0.8
      let targetSpeed = e.def.speed;
      let mx = 0, my = 0;
      if (d > e.def.attackRange * 0.75) {
        mx = nx * targetSpeed;
        my = ny * targetSpeed;
      } else if (d < e.def.attackRange * 0.5) {
        // strafe / back off
        mx = -nx * targetSpeed * 0.4 + -ny * targetSpeed * 0.4;
        my = -ny * targetSpeed * 0.4 + nx * targetSpeed * 0.4;
      } else {
        // strafe
        mx = -ny * targetSpeed * 0.6;
        my = nx * targetSpeed * 0.6;
      }
      e.vx += (mx - e.vx) * Math.min(1, dt * 6);
      e.vy += (my - e.vy) * Math.min(1, dt * 6);
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      e.angle = Math.atan2(ny, nx);

      // Separation (don't pile up)
      for (const o of enemies) {
        if (o === e) continue;
        const odx = e.x - o.x, ody = e.y - o.y;
        const dd = odx*odx + ody*ody;
        const min = (e.def.radius + o.def.radius);
        if (dd < min*min && dd > 0.01) {
          const ddd = Math.sqrt(dd);
          const push = (min - ddd) * 0.5;
          e.x += (odx/ddd) * push;
          e.y += (ody/ddd) * push;
        }
      }

      // Clamp to arena
      e.x = Math.max(e.def.radius, Math.min(ARENA.w - e.def.radius, e.x));
      e.y = Math.max(e.def.radius, Math.min(ARENA.h - e.def.radius, e.y));

      // Attack
      e.fireTimer -= dt * 1000;
      if (e.fireTimer <= 0 && d < e.def.attackRange && e.spawnFade > 0.8) {
        if (e.def.burst && e.burstLeft <= 0) {
          e.burstLeft = e.def.burst;
        }
        enemyFire(e);
        if (e.def.burst) {
          e.burstLeft--;
          e.fireTimer = e.burstLeft > 0 ? 110 : (e.def.fireRate + Math.random() * 240);
        } else {
          e.fireTimer = e.def.fireRate + Math.random() * 360;
        }
      }
    }

    // Enemy bolts
    for (const b of enemyBolts) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt;
      if (b.x < 0 || b.x > ARENA.w || b.y < 0 || b.y > ARENA.h) b.life = 0;
      // Player collision
      if (player.alive) {
        const ddx = b.x - player.x, ddy = b.y - player.y;
        const rr = player.radius + 5;
        if (ddx*ddx + ddy*ddy < rr*rr) {
          hitPlayer(b.damage);
          b.life = 0;
        }
      }
    }
    for (let i = enemyBolts.length - 1; i >= 0; i--) if (enemyBolts[i].life <= 0) enemyBolts.splice(i, 1);

    // Particles
    for (const p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= Math.pow(0.92, dt * 60);
      p.vy *= Math.pow(0.92, dt * 60);
      p.life -= dt;
    }
    for (let i = particles.length - 1; i >= 0; i--) if (particles[i].life <= 0) particles.splice(i, 1);

    // Floaters (score pop-ups)
    for (const f of floaters) {
      f.y -= 30 * dt;
      f.life -= dt;
    }
    for (let i = floaters.length - 1; i >= 0; i--) if (floaters[i].life <= 0) floaters.splice(i, 1);

    // Wave state
    if (waveState === 'spawning') {
      waveTimer -= dt * 1000;
      while (waveSpawnQueue.length > 0 && waveSpawnQueue[0].delay <= (1200 - waveTimer)) {
        const ent = waveSpawnQueue.shift();
        spawnEnemy(ent.type);
      }
      if (waveSpawnQueue.length === 0) waveState = 'holding';
    } else if (waveState === 'holding') {
      if (enemies.length === 0) {
        waveState = 'interlude';
        waveTimer = 1600;
        addFloater(player.x, player.y - 40, 'WAVE CLEAR', '#3cefff', 1.5);
        playSFX('waveStart');
      }
    } else if (waveState === 'interlude') {
      waveTimer -= dt * 1000;
      if (waveTimer <= 0) {
        startWave(waveNum + 1);
      }
    }

    // Camera follow
    const targetCamX = player.x - W / 2;
    const targetCamY = player.y - H / 2;
    camX += (targetCamX - camX) * Math.min(1, dt * 6);
    camY += (targetCamY - camY) * Math.min(1, dt * 6);
    // Clamp camera so we don't show beyond arena
    camX = Math.max(-40, Math.min(ARENA.w - W + 40, camX));
    camY = Math.max(-40, Math.min(ARENA.h - H + 40, camY));

    if (shake > 0) shake *= Math.pow(0.001, dt);
  }

  function enemyFire(e) {
    const dx = player.x - e.x, dy = player.y - e.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < 0.1) return;
    const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.08;
    enemyBolts.push({
      x: e.x + Math.cos(angle) * e.def.radius + 4,
      y: e.y + Math.sin(angle) * e.def.radius + 4,
      vx: Math.cos(angle) * e.def.boltSpeed,
      vy: Math.sin(angle) * e.def.boltSpeed,
      life: 2.2,
      damage: e.def.boltDamage,
      color: e.def.boltColor,
      radius: 3.5
    });
  }

  function angleDiff(a, b) {
    let d = a - b;
    while (d > Math.PI) d -= Math.PI * 2;
    while (d < -Math.PI) d += Math.PI * 2;
    return d;
  }

  function pushEnemy(e, dx, dy, strength) {
    e.vx += dx * strength;
    e.vy += dy * strength;
  }

  function damageEnemy(e, damage, melee) {
    // Jackal frontal shield check
    if (e.shield > 0 && e.def.shieldArc) {
      const facingX = player.x - e.x;
      const facingY = player.y - e.y;
      const facingAngle = Math.atan2(facingY, facingX);
      const incoming = Math.atan2(e.y - player.y, e.x - player.x);
      const diff = Math.abs(angleDiff(incoming, facingAngle + Math.PI));
      if (diff < e.def.shieldArc/2 && !melee) {
        // blocked by shield
        e.shield -= damage;
        spawnShieldSparks(e.x + Math.cos(facingAngle) * e.def.radius, e.y + Math.sin(facingAngle) * e.def.radius, '#a2d6ff');
        playSFX('shieldHit');
        if (e.shield <= 0) {
          e.shield = 0;
          spawnShieldBreak(e.x, e.y, '#a2d6ff');
          playSFX('shieldBreak');
        }
        return;
      }
    }
    // Regular shield absorption
    if (e.shield > 0) {
      const pre = e.shield;
      e.shield -= damage;
      spawnShieldSparks(e.x, e.y, '#b06cff');
      playSFX('shieldHit');
      if (e.shield <= 0) {
        const leak = -e.shield;
        e.shield = 0;
        e.hp -= leak * 0.5;
        spawnShieldBreak(e.x, e.y, '#c569ff');
        playSFX('shieldBreak');
      }
      return;
    }
    e.hp -= damage;
    spawnHitSpark(e.x, e.y, e.def.color);
    if (e.hp <= 0) killEnemy(e);
  }

  function spawnShieldSparks(x, y, color) {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 240,
        vy: (Math.random() - 0.5) * 240,
        life: 0.32, maxLife: 0.32,
        color, r: 2 + Math.random()
      });
    }
  }
  function spawnShieldBreak(x, y, color) {
    for (let i = 0; i < 22; i++) {
      const a = Math.random() * Math.PI * 2;
      particles.push({
        x, y,
        vx: Math.cos(a) * (120 + Math.random() * 140),
        vy: Math.sin(a) * (120 + Math.random() * 140),
        life: 0.55, maxLife: 0.55,
        color, r: 2.5 + Math.random() * 2
      });
    }
  }
  function spawnHitSpark(x, y, color) {
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: x + (Math.random() - 0.5) * 14,
        y: y + (Math.random() - 0.5) * 14,
        vx: (Math.random() - 0.5) * 320,
        vy: (Math.random() - 0.5) * 320,
        life: 0.3, maxLife: 0.3,
        color, r: 1.8 + Math.random() * 1.5
      });
    }
  }

  function killEnemy(e) {
    enemies.splice(enemies.indexOf(e), 1);
    kills++;
    score += e.def.score;
    scoreLabel.textContent = String(score).padStart(4, '0');
    const big = e.type === 'elite';
    playSFX(big ? 'eliteDeath' : 'enemyDeath');
    addFloater(e.x, e.y, '+' + e.def.score, '#ffd34a', 1.1);
    // Explosion particles
    const count = big ? 34 : 18;
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 140 + Math.random() * (big ? 360 : 220);
      particles.push({
        x: e.x, y: e.y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 0.6 + Math.random() * 0.5,
        maxLife: 1.0,
        color: Math.random() < 0.5 ? e.def.color : e.def.dark,
        r: 2 + Math.random() * 3
      });
    }
    if (big) shake = Math.max(shake, 14);
  }

  function hitPlayer(damage) {
    if (!player.alive) return;
    player.shieldRegenDelay = 2.6;
    if (player.shield > 0) {
      const pre = player.shield;
      player.shield -= damage;
      shake = Math.max(shake, 4);
      playSFX('shieldHit');
      shieldBar.classList.add('flash');
      setTimeout(() => shieldBar.classList.remove('flash'), 120);
      spawnShieldSparks(player.x, player.y, '#3cefff');
      if (player.shield <= 0) {
        const leak = -player.shield;
        player.shield = 0;
        player.health -= leak * 0.75;
        player.shieldBreakFlash = 0.5;
        spawnShieldBreak(player.x, player.y, '#3cefff');
        playSFX('shieldBreak');
        shake = Math.max(shake, 9);
      }
    } else {
      player.health -= damage;
      shake = Math.max(shake, 7);
      playSFX('hit');
      spawnHitSpark(player.x, player.y, '#ff3838');
    }
    updateBars();
    if (player.health <= 0 && player.alive) {
      player.alive = false;
      for (let i = 0; i < 42; i++) {
        const a = Math.random() * Math.PI * 2;
        particles.push({
          x: player.x, y: player.y,
          vx: Math.cos(a) * (180 + Math.random() * 300),
          vy: Math.sin(a) * (180 + Math.random() * 300),
          life: 1.1, maxLife: 1.1,
          color: i < 22 ? '#ff3838' : '#3cefff', r: 3 + Math.random() * 2
        });
      }
      shake = 20;
      playSFX('gameover');
      setTimeout(() => {
        mode = 'gameover';
        goWave.textContent = waveNum;
        goScore.textContent = score;
        goKills.textContent = kills;
        gameover.classList.remove('hidden');
      }, 1200);
    }
  }

  function addFloater(x, y, text, color, life = 1.0) {
    floaters.push({ x, y, text, color, life, maxLife: life });
  }

  function updateBars() {
    shieldFill.style.width = (player.shield / player.shieldMax * 100) + '%';
    hpFill.style.width = (player.health / player.healthMax * 100) + '%';
  }

  // ---------- Render ----------
  function render() {
    ctx.clearRect(0, 0, W, H);
    const sx = shake > 0.2 ? (Math.random() - 0.5) * shake : 0;
    const sy = shake > 0.2 ? (Math.random() - 0.5) * shake : 0;
    ctx.save();
    ctx.translate(-camX + sx, -camY + sy);

    drawArena();

    // Enemies
    for (const e of enemies) drawEnemy(e);

    // Bullets
    for (const b of bullets) drawBullet(b);
    for (const b of enemyBolts) drawEnemyBolt(b);

    // Particles (behind player)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles) {
      const a = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * a + 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // Player
    if (player.alive) drawPlayer();

    // Sword swing
    if (swordSwing) drawSwordSwing();

    // Floaters
    for (const f of floaters) {
      ctx.font = 'bold 18px "Orbitron", sans-serif';
      ctx.textAlign = 'center';
      ctx.globalAlpha = Math.max(0, f.life / f.maxLife);
      ctx.fillStyle = f.color;
      ctx.fillText(f.text, f.x, f.y);
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    // Screen-space minimap
    drawMinimap();
    // Wave interlude banner
    if (waveState === 'interlude') {
      ctx.save();
      ctx.font = 'bold 54px "Orbitron", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(60, 239, 255, 0.9)';
      ctx.shadowBlur = 24;
      ctx.shadowColor = 'rgba(60, 239, 255, 0.8)';
      ctx.fillText('WAVE ' + (waveNum + 1) + ' INCOMING', cx, cy - 20);
      ctx.font = '16px "Share Tech Mono", monospace';
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(200, 229, 255, 0.6)';
      ctx.fillText('reloading armor systems...', cx, cy + 14);
      ctx.restore();
    }
  }

  function drawArena() {
    // Floor tile pattern
    ctx.fillStyle = '#0a1322';
    ctx.fillRect(0, 0, ARENA.w, ARENA.h);
    // Grid
    ctx.strokeStyle = 'rgba(60, 239, 255, 0.08)';
    ctx.lineWidth = 1;
    const tile = 80;
    for (let x = 0; x < ARENA.w; x += tile) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ARENA.h); ctx.stroke();
    }
    for (let y = 0; y < ARENA.h; y += tile) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(ARENA.w, y); ctx.stroke();
    }
    // Cross-hatch highlights
    ctx.strokeStyle = 'rgba(138, 60, 255, 0.05)';
    for (let x = 0; x < ARENA.w; x += tile * 3) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ARENA.h); ctx.stroke();
    }
    // Arena border
    ctx.strokeStyle = 'rgba(60, 239, 255, 0.3)';
    ctx.lineWidth = 3;
    ctx.shadowBlur = 22;
    ctx.shadowColor = 'rgba(60, 239, 255, 0.5)';
    ctx.strokeRect(4, 4, ARENA.w - 8, ARENA.h - 8);
    ctx.shadowBlur = 0;

    // Chevron symbols for UNSC vibe
    ctx.fillStyle = 'rgba(60, 239, 255, 0.04)';
    for (const pos of [{x:220, y:220}, {x:ARENA.w-220, y:220}, {x:220, y:ARENA.h-220}, {x:ARENA.w-220, y:ARENA.h-220}, {x:ARENA.w/2, y:ARENA.h/2}]) {
      drawChevron(pos.x, pos.y, 90);
    }
  }

  function drawChevron(cx, cy, size) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.beginPath();
    ctx.moveTo(0, -size * 0.6);
    ctx.lineTo(size * 0.55, size * 0.45);
    ctx.lineTo(0, size * 0.25);
    ctx.lineTo(-size * 0.55, size * 0.45);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawPlayer() {
    ctx.save();
    ctx.translate(player.x, player.y);
    // Shield ring
    if (player.shield > 0) {
      const a = player.shield / player.shieldMax;
      ctx.strokeStyle = `rgba(60, 239, 255, ${0.35 + 0.4 * a})`;
      ctx.lineWidth = 2 + 2 * a;
      ctx.shadowBlur = 18 * a;
      ctx.shadowColor = 'rgba(60, 239, 255, 0.8)';
      ctx.beginPath();
      ctx.arc(0, 0, player.radius + 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
      // Inner shimmer ring
      ctx.strokeStyle = `rgba(180, 250, 255, ${0.18 * a})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, player.radius + 10 + Math.sin(t * 6) * 1.2, 0, Math.PI * 2);
      ctx.stroke();
    }
    if (player.shieldBreakFlash > 0) {
      ctx.strokeStyle = `rgba(255, 255, 255, ${player.shieldBreakFlash})`;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, player.radius + 14, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.rotate(player.angle);

    // Armor body
    // Legs/boots
    ctx.fillStyle = '#1d4b2a';
    ctx.fillRect(-player.radius * 0.6, -player.radius * 0.3, player.radius * 1.2, player.radius * 0.6);
    // Torso
    ctx.fillStyle = '#2d6e3a';
    ctx.beginPath();
    ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
    ctx.fill();
    // Shoulder pads
    ctx.fillStyle = '#1d4b2a';
    ctx.beginPath();
    ctx.arc(0, -player.radius * 0.7, player.radius * 0.55, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, player.radius * 0.7, player.radius * 0.55, 0, Math.PI * 2);
    ctx.fill();
    // Helmet / visor stripe
    ctx.fillStyle = '#6dd178';
    ctx.fillRect(player.radius * 0.3, -player.radius * 0.55, player.radius * 0.55, player.radius * 1.1);
    // Visor
    ctx.fillStyle = '#f2b32e';
    ctx.shadowBlur = 8;
    ctx.shadowColor = 'rgba(242, 179, 46, 0.7)';
    ctx.fillRect(player.radius * 0.6, -player.radius * 0.28, player.radius * 0.45, player.radius * 0.56);
    ctx.shadowBlur = 0;

    // Weapon
    const w = WEAPONS[weaponIdx];
    if (w.key === 'sword') {
      // Energy sword glow
      ctx.fillStyle = 'rgba(197, 105, 255, 0.85)';
      ctx.shadowBlur = 14;
      ctx.shadowColor = 'rgba(197, 105, 255, 0.9)';
      ctx.beginPath();
      ctx.moveTo(player.radius + 2, -3);
      ctx.lineTo(player.radius + 26, -8);
      ctx.lineTo(player.radius + 36, 0);
      ctx.lineTo(player.radius + 26, 8);
      ctx.lineTo(player.radius + 2, 3);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      // Dual blade
      ctx.fillStyle = 'rgba(240, 210, 255, 0.6)';
      ctx.fillRect(player.radius + 4, -1, 28, 2);
    } else {
      // Generic rifle
      ctx.fillStyle = '#1a2130';
      ctx.fillRect(player.radius + 2, -4, 22, 8);
      ctx.fillStyle = w.color;
      ctx.shadowBlur = 6;
      ctx.shadowColor = w.color;
      ctx.fillRect(player.radius + 18, -2, 6, 4);
      ctx.shadowBlur = 0;
    }

    ctx.restore();
  }

  function drawSwordSwing() {
    if (!swordSwing) return;
    const w = WEAPONS[weaponIdx];
    const tnorm = Math.min(1, swordSwing.progress / swordSwing.duration);
    const alpha = (1 - tnorm);
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.fillStyle = `rgba(197, 105, 255, ${0.35 * alpha})`;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, w.reach, swordSwing.angleStart, swordSwing.angleEnd);
    ctx.closePath();
    ctx.fill();
    // Edge trail
    ctx.strokeStyle = `rgba(228, 168, 255, ${0.8 * alpha})`;
    ctx.lineWidth = 4;
    const angleAt = swordSwing.angleStart + (swordSwing.angleEnd - swordSwing.angleStart) * tnorm;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(angleAt) * w.reach, Math.sin(angleAt) * w.reach);
    ctx.stroke();
    ctx.restore();
  }

  function drawEnemy(e) {
    const alpha = e.spawnFade;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(e.x, e.y);

    // Shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
    ctx.beginPath();
    ctx.ellipse(0, e.def.radius * 0.85, e.def.radius * 0.9, e.def.radius * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // Shield: full ring or frontal arc
    if (e.shield > 0) {
      ctx.save();
      ctx.rotate(e.angle);
      const sRatio = e.shield / e.shieldMax;
      if (e.def.shieldArc) {
        // Arc jackal-style
        ctx.strokeStyle = `rgba(162, 214, 255, ${0.55 + 0.3 * sRatio})`;
        ctx.lineWidth = 4;
        ctx.shadowBlur = 12;
        ctx.shadowColor = 'rgba(162, 214, 255, 0.7)';
        ctx.beginPath();
        ctx.arc(0, 0, e.def.radius + 8, -e.def.shieldArc/2, e.def.shieldArc/2);
        ctx.stroke();
        // Inner fill
        ctx.fillStyle = `rgba(162, 214, 255, ${0.12 * sRatio})`;
        ctx.beginPath();
        ctx.arc(0, 0, e.def.radius + 6, -e.def.shieldArc/2, e.def.shieldArc/2);
        ctx.lineTo(0, 0);
        ctx.fill();
        ctx.shadowBlur = 0;
      } else {
        // Full bubble shield
        ctx.strokeStyle = `rgba(197, 105, 255, ${0.45 + 0.3 * sRatio})`;
        ctx.lineWidth = 2.5;
        ctx.shadowBlur = 14;
        ctx.shadowColor = 'rgba(197, 105, 255, 0.6)';
        ctx.beginPath();
        ctx.arc(0, 0, e.def.radius + 8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    }

    // Body
    ctx.rotate(e.angle);
    ctx.fillStyle = e.def.color;
    ctx.strokeStyle = e.def.dark;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, e.def.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Eye
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 6;
    ctx.shadowColor = e.def.color;
    ctx.beginPath();
    ctx.arc(e.def.radius * 0.45, -e.def.radius * 0.15, e.def.radius * 0.22, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Plasma emitter
    ctx.fillStyle = e.def.boltColor;
    ctx.shadowBlur = 6;
    ctx.shadowColor = e.def.boltColor;
    ctx.fillRect(e.def.radius * 0.6, -2.5, 8, 5);
    ctx.shadowBlur = 0;

    // Type letter (subtle label)
    if (e.type === 'elite') {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.font = 'bold 11px "Orbitron", sans-serif';
      ctx.textAlign = 'center';
      ctx.rotate(-e.angle);
      ctx.fillText('ELITE', 0, -e.def.radius - 12);
    }

    ctx.restore();
  }

  function drawBullet(b) {
    ctx.save();
    // Glow core
    ctx.shadowBlur = 18;
    ctx.shadowColor = b.color;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius * 0.9, 0, Math.PI * 2);
    ctx.fill();
    // Outer bolt
    ctx.shadowBlur = 22;
    ctx.shadowColor = b.color;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    ctx.fill();
    // Streak tail
    ctx.strokeStyle = b.trail;
    ctx.lineWidth = b.radius * 1.2;
    ctx.globalAlpha = 0.45;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x - Math.cos(b.angle) * 16, b.y - Math.sin(b.angle) * 16);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawEnemyBolt(b) {
    ctx.save();
    ctx.shadowBlur = 14;
    ctx.shadowColor = b.color;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius * 0.55, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawMinimap() {
    const s = 0.09;
    const mw = ARENA.w * s;
    const mh = ARENA.h * s;
    const mx = W - mw - 18;
    const my = 56;
    ctx.save();
    ctx.fillStyle = 'rgba(5, 12, 22, 0.6)';
    ctx.strokeStyle = 'rgba(60, 239, 255, 0.35)';
    ctx.lineWidth = 1;
    ctx.fillRect(mx, my, mw, mh);
    ctx.strokeRect(mx, my, mw, mh);
    // Enemies
    for (const e of enemies) {
      ctx.fillStyle = e.def.color;
      ctx.fillRect(mx + e.x * s - 1, my + e.y * s - 1, 3, 3);
    }
    // Player
    ctx.fillStyle = '#3cefff';
    ctx.fillRect(mx + player.x * s - 2, my + player.y * s - 2, 4, 4);
    ctx.restore();
  }

  function renderWeaponHUD() {
    weaponHUD.innerHTML = '';
    WEAPONS.forEach((w, i) => {
      const el = document.createElement('div');
      el.className = 'weapon' + (i === weaponIdx ? ' active' : '');
      el.innerHTML = `<span class="n">${i+1}</span><span>${w.label}</span>`;
      weaponHUD.appendChild(el);
    });
  }

  // ---------- Main loop ----------
  let last = 0;
  function loop(now) {
    const dt = Math.min(0.035, (now - last) / 1000 || 0.016);
    last = now;
    if (mode === 'playing') update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function startGame() {
    ensureAudio();
    intro.classList.add('hidden');
    gameover.classList.add('hidden');
    newGame();
    mode = 'playing';
    playSFX('waveStart');
  }

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  resize();
  // Initial draw loop
  requestAnimationFrame((t0) => { last = t0; loop(t0); });

  // Minimal idle state: show a dim arena in background
  newGame();
  mode = 'title';
})();
</script>
</body>
