<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Jelly Jam</title>
  <meta name="description" content="A squishy physics playground where gravity refuses to behave.">
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8D%AE">
  <meta property="og:title" content="Jelly Jam">
  <meta property="og:description" content="Drop wobbly jellies. Twist gravity. Make a mess.">
  <meta property="og:url" content="https://sloppy.live/jelly-jam">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/risograph%20poster%20of%20colorful%20gelatin%20blobs%20bouncing%20in%20chaotic%20gravity%2C%20warm%20cream%20background%2C%20bold%20flat%20color%2C%20CMYK%20misregistration%2C%20zine%20aesthetic%2C%20playful?width=1200&height=630&model=flux&nologo=true&seed=8181">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #f4e8d0;
      --paper-deep: #ebd9b4;
      --ink: #1a1612;
      --ink-soft: #4d3f2a;
      --berry: #e8556b;
      --lemon: #f7c33d;
      --lime: #7ec241;
      --plum: #9b6dc7;
      --sky: #4ec4d8;
      --orange: #ff8a3d;
      --shadow: rgba(26, 22, 18, 0.18);
    }

    * { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; font-size: 100%; }

    body {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
      background: var(--paper);
      background-image:
        radial-gradient(circle at 20% 25%, rgba(232,85,107,0.06) 0, transparent 45%),
        radial-gradient(circle at 80% 75%, rgba(78,196,216,0.06) 0, transparent 45%),
        repeating-linear-gradient(0deg, rgba(26,22,18,0.025) 0 1px, transparent 1px 22px),
        repeating-linear-gradient(90deg, rgba(26,22,18,0.025) 0 1px, transparent 1px 22px);
      overflow: hidden;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    main {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0.85rem 1.1rem 0.6rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }

    h1 {
      font-family: 'Bowlby One SC', sans-serif;
      font-size: clamp(1.6rem, 4.5vw, 2.6rem);
      letter-spacing: 0.01em;
      margin: 0;
      color: var(--ink);
      text-shadow: 3px 3px 0 var(--berry), 5px 5px 0 var(--sky);
      line-height: 0.95;
    }

    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .stats {
      display: flex;
      gap: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--ink-soft);
    }
    .stats strong {
      display: block;
      font-size: 0.95rem;
      color: var(--ink);
      font-weight: 700;
    }

    .stage {
      position: relative;
      margin: 0 0.6rem;
      border: 2px solid var(--ink);
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(170deg, #fbf2dd 0%, #ecddba 100%);
      box-shadow: 6px 6px 0 var(--ink);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    .gravity-arrow {
      position: absolute;
      top: 14px;
      left: 14px;
      width: 56px;
      height: 56px;
      pointer-events: none;
      opacity: 0.85;
      transition: transform 0.32s cubic-bezier(.6,1.6,.4,1);
    }

    .stage-label {
      position: absolute;
      top: 14px;
      right: 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink-soft);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(244,232,208,0.85);
      padding: 0.3rem 0.6rem;
      border-radius: 999px;
      border: 1px solid rgba(26,22,18,0.18);
      pointer-events: none;
    }
    .stage-label strong { color: var(--berry); font-weight: 700; }

    .hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink-soft);
      background: rgba(244,232,208,0.85);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(26,22,18,0.15);
      transition: opacity 0.6s ease;
      pointer-events: none;
      text-align: center;
      max-width: calc(100% - 32px);
    }
    .hint.fade { opacity: 0; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.7rem 1.1rem 1rem;
      align-items: center;
    }

    .group {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      padding: 0.3rem 0.5rem 0.3rem 0.7rem;
      border: 1.5px solid var(--ink);
      border-radius: 12px;
      background: var(--paper-deep);
      box-shadow: 3px 3px 0 var(--ink);
    }
    .group-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-right: 0.25rem;
    }

    button {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      padding: 0.45rem 0.75rem;
      min-height: 2.75rem;
      min-width: 2.75rem;
      border: 1.5px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s;
      box-shadow: 2px 2px 0 var(--ink);
      letter-spacing: 0.02em;
    }
    button:hover { background: #fffaee; }
    button:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }
    button:focus-visible {
      outline: 3px solid var(--berry);
      outline-offset: 2px;
    }
    button[aria-pressed="true"] {
      background: var(--ink);
      color: var(--paper);
    }
    button.danger { background: var(--berry); color: var(--paper); }
    button.danger:hover { background: #d33b53; }
    button.pop { background: var(--lemon); }
    button.pop:hover { background: #ffd14d; }

    .kbd {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      padding: 0.05rem 0.3rem;
      background: rgba(26,22,18,0.1);
      border-radius: 4px;
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0);
      white-space: nowrap; border: 0;
    }

    @media (max-width: 640px) {
      .topbar { padding: 0.55rem 0.7rem 0.4rem; }
      .stats { gap: 0.5rem; font-size: 0.65rem; }
      .stage { margin: 0 0.3rem; border-radius: 14px; box-shadow: 4px 4px 0 var(--ink); }
      .controls { padding: 0.5rem 0.6rem 0.7rem; gap: 0.35rem; }
      .group { padding: 0.25rem 0.4rem; }
      button { font-size: 0.72rem; padding: 0.35rem 0.55rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .gravity-arrow { transition: none; }
      h1 { text-shadow: 2px 2px 0 var(--berry); }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <div class="brand">
        <h1>Jelly&nbsp;Jam</h1>
        <span class="tagline">soft-body lab · gravity misbehaving</span>
      </div>
      <div class="stats" role="status" aria-live="polite" aria-atomic="true">
        <div><span>jellies</span><strong id="stat-count">0</strong></div>
        <div><span>chaos</span><strong id="stat-chaos">0.0</strong></div>
        <div><span>squish</span><strong id="stat-squish">0</strong></div>
      </div>
    </header>

    <section class="stage" aria-label="Jelly playground">
      <canvas id="canvas" role="application" aria-label="Physics canvas. Click to spawn a jelly. Drag a jelly to pull it. Use the gravity buttons or number keys 1-5 to change gravity."></canvas>
      <svg class="gravity-arrow" id="gravity-arrow" viewBox="0 0 56 56" aria-hidden="true">
        <circle cx="28" cy="28" r="24" fill="rgba(244,232,208,0.85)" stroke="#1a1612" stroke-width="1.5"/>
        <g id="arrow-g">
          <line x1="28" y1="14" x2="28" y2="40" stroke="#e8556b" stroke-width="3.5" stroke-linecap="round"/>
          <polyline points="20,32 28,42 36,32" fill="none" stroke="#e8556b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </svg>
      <div class="stage-label">gravity · <strong id="stage-mode">DOWN</strong></div>
      <div class="hint" id="hint">click anywhere to drop a jelly · drag to fling · press <span class="kbd">space</span> to shake</div>
    </section>

    <nav class="controls" aria-label="Playground controls">
      <div class="group" role="group" aria-label="Gravity direction">
        <span class="group-label">gravity</span>
        <button type="button" data-grav="down" aria-pressed="true" title="Down (1)">⬇ down</button>
        <button type="button" data-grav="up" aria-pressed="false" title="Up (2)">⬆ up</button>
        <button type="button" data-grav="cursor" aria-pressed="false" title="Toward cursor (3)">⊕ cursor</button>
        <button type="button" data-grav="vortex" aria-pressed="false" title="Vortex (4)">↻ vortex</button>
        <button type="button" data-grav="zero" aria-pressed="false" title="Zero G (5)">∅ zero</button>
        <button type="button" data-grav="chaos" aria-pressed="false" title="Auto-shifting chaos (C)">⚡ chaos</button>
      </div>
      <div class="group" role="group" aria-label="Actions">
        <span class="group-label">do</span>
        <button type="button" id="btn-drop" class="pop" title="Drop a random jelly (D)">＋ drop</button>
        <button type="button" id="btn-rain" title="Rain 12 jellies (R)">☂ rain</button>
        <button type="button" id="btn-shake" title="Shake the world (Space)">↯ shake</button>
        <button type="button" id="btn-clear" class="danger" title="Clear all (X)">✕ clear</button>
      </div>
      <div class="group" role="group" aria-label="Audio">
        <span class="group-label">audio</span>
        <button type="button" id="btn-mute" aria-pressed="false" title="Toggle squish sounds (M)">🔊 on</button>
      </div>
    </nav>
  </main>

  <p class="sr-only" id="sr-status" aria-live="polite"></p>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // Setup
    // ============================================================
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    const stage = canvas.parentElement;
    const statCount = document.getElementById('stat-count');
    const statChaos = document.getElementById('stat-chaos');
    const statSquish = document.getElementById('stat-squish');
    const stageMode = document.getElementById('stage-mode');
    const arrowG = document.getElementById('arrow-g');
    const hintEl = document.getElementById('hint');
    const srStatus = document.getElementById('sr-status');

    let DPR = Math.min(window.devicePixelRatio || 1, 2);
    let W = 0, H = 0;
    function resize() {
      const r = stage.getBoundingClientRect();
      W = Math.max(280, r.width);
      H = Math.max(280, r.height);
      canvas.width  = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize, { passive: true });

    // ============================================================
    // Palette + jelly creation
    // ============================================================
    const PALETTE = [
      { name: 'berry',  body: '#e8556b', hi: '#ff8094', lo: '#a82a3e', face: '#3a0c14' },
      { name: 'lemon',  body: '#f7c33d', hi: '#ffe084', lo: '#b88800', face: '#3a2700' },
      { name: 'lime',   body: '#7ec241', hi: '#b7e87a', lo: '#4d8a18', face: '#0d2a04' },
      { name: 'plum',   body: '#9b6dc7', hi: '#c89af0', lo: '#5d3a85', face: '#1f0d36' },
      { name: 'sky',    body: '#4ec4d8', hi: '#9be4ee', lo: '#1d8294', face: '#08323a' },
      { name: 'orange', body: '#ff8a3d', hi: '#ffb87a', lo: '#c25411', face: '#3a1503' }
    ];

    const PERIM = 14;
    const SPRING_K = 28;
    const COHESION_K = 0.22;
    const DAMP = 0.88;       // perimeter damp (per frame, scaled by dt)
    const BODY_DAMP = 0.998; // body damp

    function makeJelly(x, y, r, paletteIdx) {
      const p = paletteIdx == null ? Math.floor(Math.random() * PALETTE.length) : paletteIdx;
      const radius = r || (22 + Math.random() * 16);
      const j = {
        x, y,
        vx: (Math.random() - 0.5) * 60,
        vy: -Math.random() * 60,
        r: radius,
        mass: radius * radius * 0.012,
        palette: PALETTE[p],
        wobblePhase: Math.random() * Math.PI * 2,
        rest: [],   // {ax,ay,len} rest positions relative to center
        pts: [],    // {x,y,vx,vy} actual perimeter points
        blink: 3 + Math.random() * 5,
        squishHits: 0,
        born: performance.now(),
        held: false
      };
      for (let i = 0; i < PERIM; i++) {
        const a = (i / PERIM) * Math.PI * 2;
        const len = radius;
        const ax = Math.cos(a) * len;
        const ay = Math.sin(a) * len;
        j.rest.push({ ax, ay, len, ang: a });
        j.pts.push({ x: x + ax, y: y + ay, vx: 0, vy: 0 });
      }
      return j;
    }

    const jellies = [];
    const MAX_JELLIES = 50;

    function dropJelly(x, y, opts) {
      opts = opts || {};
      if (jellies.length >= MAX_JELLIES) jellies.shift();
      const j = makeJelly(x, y, opts.r, opts.palette);
      if (opts.vx != null) j.vx = opts.vx;
      if (opts.vy != null) j.vy = opts.vy;
      jellies.push(j);
      // spawn pop
      spawnRipple(x, y, j.palette.body);
      return j;
    }

    // ============================================================
    // Gravity
    // ============================================================
    const GRAVS = ['down','up','cursor','vortex','zero','chaos'];
    const GRAV_LABEL = { down:'DOWN', up:'UP', cursor:'CURSOR', vortex:'VORTEX', zero:'ZERO-G', chaos:'CHAOS' };
    let gravMode = 'down';
    let mouseX = 0, mouseY = 0;
    let chaosT = 0;
    let chaosAngle = 0;
    const G_BASE = 720; // px/s^2

    function gravityAt(x, y, t) {
      if (gravMode === 'down')   return { gx: 0, gy: G_BASE };
      if (gravMode === 'up')     return { gx: 0, gy: -G_BASE };
      if (gravMode === 'zero')   return { gx: 0, gy: 0 };
      if (gravMode === 'cursor') {
        const dx = mouseX - x, dy = mouseY - y;
        const d = Math.hypot(dx, dy) + 0.001;
        return { gx: dx / d * G_BASE * 1.1, gy: dy / d * G_BASE * 1.1 };
      }
      if (gravMode === 'vortex') {
        // tangential (swirl) + slight pull toward center
        const cx = W * 0.5, cy = H * 0.5;
        const dx = cx - x, dy = cy - y;
        const d = Math.hypot(dx, dy) + 0.001;
        const tangent = -G_BASE * 0.95;
        return {
          gx: (-dy / d) * tangent + (dx / d) * G_BASE * 0.18,
          gy: ( dx / d) * tangent + (dy / d) * G_BASE * 0.18
        };
      }
      if (gravMode === 'chaos') {
        // gravity vector smoothly rotates + occasionally pulses harder
        const mag = G_BASE * (0.9 + Math.sin(t * 0.7) * 0.45);
        return { gx: Math.cos(chaosAngle) * mag, gy: Math.sin(chaosAngle) * mag };
      }
      return { gx: 0, gy: G_BASE };
    }

    function setGravity(mode, viaKey) {
      if (!GRAVS.includes(mode)) return;
      gravMode = mode;
      document.querySelectorAll('[data-grav]').forEach(b => {
        b.setAttribute('aria-pressed', String(b.dataset.grav === mode));
      });
      stageMode.textContent = GRAV_LABEL[mode];
      updateArrow();
      announce(`Gravity: ${GRAV_LABEL[mode]}`);
    }

    function updateArrow() {
      let angle = 90; // down
      if (gravMode === 'up') angle = -90;
      else if (gravMode === 'cursor') {
        const dx = mouseX - W/2, dy = mouseY - H/2;
        angle = Math.atan2(dy, dx) * 180 / Math.PI;
        angle = angle - 90; // adjust because arrow points down at 0
      } else if (gravMode === 'vortex') angle = (performance.now() / 8) % 360 - 90;
      else if (gravMode === 'chaos') angle = chaosAngle * 180 / Math.PI - 90;
      else if (gravMode === 'zero') {
        arrowG.style.transform = 'scale(0.4)';
        arrowG.parentElement.style.transform = 'rotate(0deg)';
        arrowG.parentElement.style.opacity = '0.35';
        return;
      }
      arrowG.style.transform = 'scale(1)';
      arrowG.parentElement.style.transform = `rotate(${angle}deg)`;
      arrowG.parentElement.style.opacity = '0.85';
    }

    // ============================================================
    // Physics step
    // ============================================================
    function physicsStep(dt, now) {
      // chaos angle continuously rotates
      if (gravMode === 'chaos') {
        chaosT += dt;
        chaosAngle += dt * (1.1 + Math.sin(chaosT * 0.6) * 0.7);
        if (Math.random() < 0.012) chaosAngle += (Math.random() - 0.5) * 1.4; // random jolt
      }
      if (gravMode === 'vortex') updateArrow(); // continuously spin
      if (gravMode === 'chaos') updateArrow();
      if (gravMode === 'cursor') updateArrow();

      const dtFactor = Math.pow(BODY_DAMP, dt * 60);
      const perimDampFactor = Math.pow(DAMP, dt * 60);

      let totalSquish = 0;

      for (let i = 0; i < jellies.length; i++) {
        const j = jellies[i];

        // gravity on center
        if (!j.held) {
          const g = gravityAt(j.x, j.y, now / 1000);
          j.vx += g.gx * dt;
          j.vy += g.gy * dt;
        }

        // held jelly: rubber-band toward held target
        if (j.held) {
          const tx = j.holdX, ty = j.holdY;
          j.vx += (tx - j.x) * 18 * dt;
          j.vy += (ty - j.y) * 18 * dt;
          j.vx *= 0.82;
          j.vy *= 0.82;
        }

        // integrate body
        j.x += j.vx * dt;
        j.y += j.vy * dt;
        j.vx *= dtFactor;
        j.vy *= dtFactor;

        // wall collisions (AABB) with squash injection
        let landed = false;
        if (j.x - j.r < 0) {
          j.x = j.r;
          if (j.vx < 0) { kickPerim(j, 1, 0, Math.abs(j.vx)); j.vx = -j.vx * 0.5; landed = true; }
        } else if (j.x + j.r > W) {
          j.x = W - j.r;
          if (j.vx > 0) { kickPerim(j, -1, 0, Math.abs(j.vx)); j.vx = -j.vx * 0.5; landed = true; }
        }
        if (j.y - j.r < 0) {
          j.y = j.r;
          if (j.vy < 0) { kickPerim(j, 0, 1, Math.abs(j.vy)); j.vy = -j.vy * 0.5; landed = true; }
        } else if (j.y + j.r > H) {
          j.y = H - j.r;
          if (j.vy > 0) { kickPerim(j, 0, -1, Math.abs(j.vy)); j.vy = -j.vy * 0.5; landed = true; }
        }
        if (landed && Math.hypot(j.vx, j.vy) > 80) {
          playSquish(Math.hypot(j.vx, j.vy));
          j.squishHits++;
          totalSquish++;
        }
      }

      // jelly-jelly collisions (soft sphere)
      for (let i = 0; i < jellies.length; i++) {
        for (let k = i + 1; k < jellies.length; k++) {
          const a = jellies[i], b = jellies[k];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d2 = dx*dx + dy*dy;
          const minD = (a.r + b.r) * 0.92;
          if (d2 < minD * minD && d2 > 0.01) {
            const d = Math.sqrt(d2);
            const nx = dx / d, ny = dy / d;
            const overlap = minD - d;
            const massSum = a.mass + b.mass;
            const aShare = b.mass / massSum;
            const bShare = a.mass / massSum;
            a.x -= nx * overlap * aShare; a.y -= ny * overlap * aShare;
            b.x += nx * overlap * bShare; b.y += ny * overlap * bShare;
            // soft velocity transfer
            const rvx = b.vx - a.vx, rvy = b.vy - a.vy;
            const relVel = rvx * nx + rvy * ny;
            if (relVel < 0) {
              const imp = -relVel * 0.55;
              a.vx -= nx * imp * aShare; a.vy -= ny * imp * aShare;
              b.vx += nx * imp * bShare; b.vy += ny * imp * bShare;
              const impactMag = Math.abs(relVel);
              if (impactMag > 60) {
                kickPerim(a, -nx, -ny, impactMag * 0.7);
                kickPerim(b,  nx,  ny, impactMag * 0.7);
                playSquish(impactMag * 0.6);
                totalSquish++;
              }
            }
          }
        }
      }

      // perimeter springs (deformation rig)
      for (let i = 0; i < jellies.length; i++) {
        const j = jellies[i];
        for (let p = 0; p < PERIM; p++) {
          const pt = j.pts[p];
          const rest = j.rest[p];
          // target = center + rest offset
          const tx = j.x + rest.ax;
          const ty = j.y + rest.ay;
          // spring to rest
          pt.vx += (tx - pt.x) * SPRING_K * dt;
          pt.vy += (ty - pt.y) * SPRING_K * dt;
          // cohesion with neighbors (keep nice round shape)
          const prev = j.pts[(p - 1 + PERIM) % PERIM];
          const next = j.pts[(p + 1) % PERIM];
          const cx = (prev.x + next.x) * 0.5;
          const cy = (prev.y + next.y) * 0.5;
          pt.vx += (cx - pt.x) * COHESION_K * SPRING_K * dt;
          pt.vy += (cy - pt.y) * COHESION_K * SPRING_K * dt;
        }
        for (let p = 0; p < PERIM; p++) {
          const pt = j.pts[p];
          pt.x += pt.vx * dt;
          pt.y += pt.vy * dt;
          pt.vx *= perimDampFactor;
          pt.vy *= perimDampFactor;
        }
      }

      if (totalSquish > 0) squishCounter += totalSquish;
    }

    function kickPerim(j, nx, ny, mag) {
      // Push the perimeter points along (nx,ny) by magnitude weighted by alignment with their offset
      // ("squash" inward against the impact direction)
      const k = Math.min(0.5, mag * 0.0035);
      for (let i = 0; i < PERIM; i++) {
        const rest = j.rest[i];
        const ox = rest.ax, oy = rest.ay;
        const olen = Math.hypot(ox, oy) + 0.001;
        const align = (ox * nx + oy * ny) / olen; // -1..1
        // points pointing into the impact get pushed back
        if (align < 0) {
          const push = mag * 0.35 * (-align);
          j.pts[i].vx += nx * push;
          j.pts[i].vy += ny * push;
        }
        // small outward wobble on perpendicular points
        if (Math.abs(align) < 0.4) {
          const px = -ny, py = nx;
          const sign = (i % 2 === 0) ? 1 : -1;
          j.pts[i].vx += px * mag * 0.08 * sign;
          j.pts[i].vy += py * mag * 0.08 * sign;
        }
      }
    }

    // ============================================================
    // Rendering
    // ============================================================
    const ripples = [];
    function spawnRipple(x, y, color) {
      ripples.push({ x, y, r: 4, maxR: 38, color, alpha: 0.5, life: 0.5, born: performance.now() });
    }

    function drawBackground() {
      // Subtle play-mat texture (gentle radial gradient already in CSS, but add a soft inner shading)
      const grad = ctx.createRadialGradient(W * 0.5, H * 0.4, 30, W * 0.5, H * 0.5, Math.max(W, H));
      grad.addColorStop(0, 'rgba(255,250,234,0.6)');
      grad.addColorStop(1, 'rgba(220,200,170,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    function drawJelly(j, now) {
      const pts = j.pts;
      if (pts.length < 3) return;

      // smoothed midpoints for nice closed Bézier
      const mids = [];
      for (let i = 0; i < pts.length; i++) {
        const a = pts[i], b = pts[(i + 1) % pts.length];
        mids.push({ x: (a.x + b.x) * 0.5, y: (a.y + b.y) * 0.5 });
      }

      // shadow first
      ctx.save();
      ctx.beginPath();
      const shadowOff = 5;
      const sx0 = mids[mids.length - 1].x + shadowOff, sy0 = mids[mids.length - 1].y + shadowOff;
      ctx.moveTo(sx0, sy0);
      for (let i = 0; i < pts.length; i++) {
        const cp = pts[i];
        const next = mids[i];
        ctx.quadraticCurveTo(cp.x + shadowOff, cp.y + shadowOff, next.x + shadowOff, next.y + shadowOff);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(26,22,18,0.16)';
      ctx.filter = 'blur(2.5px)';
      ctx.fill();
      ctx.restore();

      // body fill (radial gradient for plump look)
      const grad = ctx.createRadialGradient(
        j.x - j.r * 0.3, j.y - j.r * 0.35, j.r * 0.1,
        j.x, j.y, j.r * 1.15
      );
      grad.addColorStop(0, j.palette.hi);
      grad.addColorStop(0.55, j.palette.body);
      grad.addColorStop(1, j.palette.lo);

      ctx.beginPath();
      ctx.moveTo(mids[mids.length - 1].x, mids[mids.length - 1].y);
      for (let i = 0; i < pts.length; i++) {
        const cp = pts[i];
        const next = mids[i];
        ctx.quadraticCurveTo(cp.x, cp.y, next.x, next.y);
      }
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // outline
      ctx.lineWidth = 1.4;
      ctx.strokeStyle = 'rgba(26,22,18,0.65)';
      ctx.stroke();

      // glossy highlight (solid white-ish ellipse top-left)
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(j.x - j.r * 0.35, j.y - j.r * 0.45, j.r * 0.35, j.r * 0.18, -0.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fill();
      ctx.restore();

      // eyes (cute, blink occasionally)
      const blinking = (now / 1000 - j.born / 1000) % j.blink < 0.18;
      const eyeY = j.y - j.r * 0.05;
      const eyeDX = j.r * 0.28;
      const eyeR = Math.max(2.2, j.r * 0.10);
      // pupils track velocity direction slightly
      const vm = Math.hypot(j.vx, j.vy);
      const lookX = vm > 1 ? (j.vx / vm) * eyeR * 0.4 : 0;
      const lookY = vm > 1 ? (j.vy / vm) * eyeR * 0.4 : 0;
      for (const side of [-1, 1]) {
        ctx.beginPath();
        ctx.fillStyle = j.palette.face;
        if (blinking) {
          // closed eye = horizontal line
          ctx.moveTo(j.x + side * eyeDX - eyeR, eyeY);
          ctx.lineTo(j.x + side * eyeDX + eyeR, eyeY);
          ctx.lineWidth = 2;
          ctx.strokeStyle = j.palette.face;
          ctx.stroke();
        } else {
          ctx.arc(j.x + side * eyeDX + lookX, eyeY + lookY, eyeR, 0, Math.PI * 2);
          ctx.fill();
          // tiny sparkle
          ctx.beginPath();
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          ctx.arc(j.x + side * eyeDX + lookX - eyeR * 0.3, eyeY + lookY - eyeR * 0.3, eyeR * 0.32, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // tiny smile (curves up if rising, down if falling fast)
      ctx.beginPath();
      ctx.strokeStyle = j.palette.face;
      ctx.lineWidth = Math.max(1.6, j.r * 0.06);
      ctx.lineCap = 'round';
      const smileY = j.y + j.r * 0.30;
      const smileW = j.r * 0.45;
      const curveDir = j.vy < -50 ? -1 : (j.vy > 200 ? -1 : 1); // wide-eyed surprise when launched/falling fast
      ctx.moveTo(j.x - smileW, smileY);
      ctx.quadraticCurveTo(j.x, smileY + smileW * 0.35 * curveDir, j.x + smileW, smileY);
      ctx.stroke();
    }

    function drawRipples(dt) {
      for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];
        r.r += dt * 90;
        r.alpha -= dt * 1.3;
        if (r.alpha <= 0 || r.r > r.maxR) { ripples.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.strokeStyle = r.color;
        ctx.globalAlpha = Math.max(0, r.alpha);
        ctx.lineWidth = 2;
        ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    function drawHeldRubberBand() {
      for (const j of jellies) {
        if (!j.held) continue;
        ctx.beginPath();
        ctx.moveTo(j.x, j.y);
        ctx.lineTo(j.holdX, j.holdY);
        ctx.strokeStyle = 'rgba(26,22,18,0.4)';
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // ============================================================
    // Loop
    // ============================================================
    let lastT = performance.now();
    let squishCounter = 0;
    let chaosScore = 0;

    function loop(now) {
      const dt = Math.min(0.033, (now - lastT) / 1000);
      lastT = now;

      ctx.clearRect(0, 0, W, H);
      drawBackground();

      physicsStep(dt, now);

      drawRipples(dt);
      for (const j of jellies) drawJelly(j, now);
      drawHeldRubberBand();

      // stats
      statCount.textContent = jellies.length;
      // chaos = avg speed normalized
      let sumV = 0;
      for (const j of jellies) sumV += Math.hypot(j.vx, j.vy);
      const avgV = jellies.length ? sumV / jellies.length : 0;
      chaosScore = chaosScore * 0.9 + Math.min(1, avgV / 600) * 0.1;
      statChaos.textContent = chaosScore.toFixed(2);
      statSquish.textContent = squishCounter;

      requestAnimationFrame(loop);
    }

    // ============================================================
    // Audio
    // ============================================================
    let audioCtx = null;
    let muted = false;
    let lastSquish = 0;
    function ensureAudio() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        audioCtx = new AC();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function playSquish(impact) {
      if (muted) return;
      const ac = ensureAudio();
      if (!ac) return;
      const now = ac.currentTime;
      if (now - lastSquish < 0.035) return; // throttle
      lastSquish = now;
      const intensity = Math.min(1, impact / 600);
      // sub thump
      const o1 = ac.createOscillator();
      const g1 = ac.createGain();
      o1.type = 'sine';
      o1.frequency.setValueAtTime(160 + intensity * 80, now);
      o1.frequency.exponentialRampToValueAtTime(70, now + 0.18);
      g1.gain.setValueAtTime(0.12 * (0.4 + intensity * 0.7), now);
      g1.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      o1.connect(g1).connect(ac.destination);
      o1.start(now); o1.stop(now + 0.25);
      // splat (bandpass-filtered noise burst)
      const len = Math.floor(ac.sampleRate * 0.15);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 1.6);
      const src = ac.createBufferSource();
      src.buffer = buf;
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 800 + intensity * 1200;
      bp.Q.value = 1.4;
      const g2 = ac.createGain();
      g2.gain.value = 0.06 * (0.3 + intensity);
      src.connect(bp).connect(g2).connect(ac.destination);
      src.start(now);
    }
    function playPop() {
      if (muted) return;
      const ac = ensureAudio();
      if (!ac) return;
      const now = ac.currentTime;
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(420 + Math.random() * 200, now);
      o.frequency.exponentialRampToValueAtTime(180, now + 0.12);
      g.gain.setValueAtTime(0.10, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
      o.connect(g).connect(ac.destination);
      o.start(now); o.stop(now + 0.16);
    }

    // ============================================================
    // Input
    // ============================================================
    let pointerDown = false;
    let pointerStart = null;
    let heldJelly = null;
    let dragMoved = false;

    function getLocal(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function findJelly(x, y) {
      // top-most first
      for (let i = jellies.length - 1; i >= 0; i--) {
        const j = jellies[i];
        const d = Math.hypot(x - j.x, y - j.y);
        if (d <= j.r + 4) return j;
      }
      return null;
    }

    canvas.addEventListener('pointerdown', (e) => {
      canvas.setPointerCapture(e.pointerId);
      pointerDown = true;
      dragMoved = false;
      const p = getLocal(e);
      mouseX = p.x; mouseY = p.y;
      pointerStart = p;
      heldJelly = findJelly(p.x, p.y);
      if (heldJelly) {
        heldJelly.held = true;
        heldJelly.holdX = p.x;
        heldJelly.holdY = p.y;
      }
      hideHint();
      ensureAudio();
    });
    canvas.addEventListener('pointermove', (e) => {
      const p = getLocal(e);
      mouseX = p.x; mouseY = p.y;
      if (pointerDown) {
        if (Math.hypot(p.x - pointerStart.x, p.y - pointerStart.y) > 4) dragMoved = true;
        if (heldJelly) {
          heldJelly.holdX = p.x;
          heldJelly.holdY = p.y;
        }
      }
    });
    function endPointer(e) {
      if (!pointerDown) return;
      pointerDown = false;
      const p = getLocal(e);
      if (heldJelly) {
        heldJelly.held = false;
        // throw it: imprint velocity from recent holdX/Y delta (already velocity-driven)
        heldJelly = null;
      } else if (!dragMoved) {
        // tap = spawn
        dropJelly(p.x, p.y);
        playPop();
      }
    }
    canvas.addEventListener('pointerup', endPointer);
    canvas.addEventListener('pointercancel', endPointer);

    // Hint fades after first interaction
    let hintTimer = setTimeout(hideHint, 7000);
    function hideHint() {
      hintEl.classList.add('fade');
      clearTimeout(hintTimer);
    }

    // ============================================================
    // Keyboard
    // ============================================================
    window.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const k = e.key.toLowerCase();
      if (k === '1') setGravity('down');
      else if (k === '2') setGravity('up');
      else if (k === '3') setGravity('cursor');
      else if (k === '4') setGravity('vortex');
      else if (k === '5') setGravity('zero');
      else if (k === 'c') setGravity('chaos');
      else if (k === ' ') { shake(); e.preventDefault(); }
      else if (k === 'd') { dropRandom(); }
      else if (k === 'r') { rain(); }
      else if (k === 'x') { clearAll(); }
      else if (k === 'm') { toggleMute(); }
    });

    // ============================================================
    // Action helpers
    // ============================================================
    function shake() {
      for (const j of jellies) {
        const a = Math.random() * Math.PI * 2;
        const force = 180 + Math.random() * 240;
        j.vx += Math.cos(a) * force;
        j.vy += Math.sin(a) * force;
        j.held = false;
      }
      heldJelly = null;
      announce('Shook the jar.');
      playSquish(420);
    }
    function dropRandom() {
      const x = 30 + Math.random() * Math.max(60, W - 60);
      const y = 30 + Math.random() * Math.max(60, H * 0.4);
      dropJelly(x, y);
      playPop();
    }
    function rain() {
      for (let i = 0; i < 12; i++) {
        setTimeout(() => {
          const x = 30 + Math.random() * Math.max(60, W - 60);
          dropJelly(x, -20, { vy: 80 + Math.random() * 60 });
          playPop();
        }, i * 70);
      }
      announce('Raining jellies.');
    }
    function clearAll() {
      jellies.length = 0;
      ripples.length = 0;
      squishCounter = 0;
      announce('Cleared.');
    }
    function toggleMute() {
      muted = !muted;
      const btn = document.getElementById('btn-mute');
      btn.setAttribute('aria-pressed', String(muted));
      btn.textContent = muted ? '🔇 off' : '🔊 on';
      announce(muted ? 'Audio off.' : 'Audio on.');
    }

    function announce(msg) {
      srStatus.textContent = msg;
    }

    // ============================================================
    // Wire up buttons
    // ============================================================
    document.querySelectorAll('[data-grav]').forEach(b => {
      b.addEventListener('click', () => setGravity(b.dataset.grav));
    });
    document.getElementById('btn-drop').addEventListener('click', dropRandom);
    document.getElementById('btn-rain').addEventListener('click', rain);
    document.getElementById('btn-shake').addEventListener('click', shake);
    document.getElementById('btn-clear').addEventListener('click', clearAll);
    document.getElementById('btn-mute').addEventListener('click', toggleMute);

    // ============================================================
    // Seed
    // ============================================================
    resize();
    updateArrow();
    // 5 seed jellies for instant joy
    for (let i = 0; i < 5; i++) {
      dropJelly(W * 0.2 + (W * 0.6) * Math.random(), H * 0.2 + Math.random() * H * 0.3, { palette: i % PALETTE.length });
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
