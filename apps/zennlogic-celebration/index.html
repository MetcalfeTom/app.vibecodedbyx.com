<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zennlogic Celebration · Fireworks &amp; Confetti</title>
<meta name="description" content="A high-energy celebration page for zennlogic — procedural fireworks, confetti rain, animated banner." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%87" />
<meta property="og:title" content="Zennlogic Celebration" />
<meta property="og:description" content="Fireworks. Confetti. A rainbow ZENNLOGIC banner. Click anywhere to launch more." />
<meta property="og:url" content="https://sloppy.live/zennlogic-celebration/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/explosive%20colorful%20fireworks%20confetti%20rain%20celebration%20rainbow%20banner%20zennlogic%20night%20sky%20synthwave?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Bungee&family=Major+Mono+Display&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --void:#04020e;
  --bone:#fff8e2;
  --dim:rgba(255,248,226,0.5);
  --cyan:#7be4ff;
  --pink:#ff5ea1;
  --amber:#ffce4a;
  --violet:#9b6bff;
  --green:#5dffb3;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--void);color:var(--bone);font-family:'Space Mono',monospace}
body{
  background:
    radial-gradient(ellipse at 50% 100%, rgba(155,107,255,0.18), transparent 55%),
    radial-gradient(ellipse at 50% 0%, rgba(255,94,161,0.12), transparent 55%),
    radial-gradient(ellipse at 0% 50%, rgba(123,228,255,0.08), transparent 55%),
    linear-gradient(180deg, #04020e 0%, #0a0420 80%, #1a0a2a 100%);
  cursor:crosshair;
}
#stage{position:fixed;inset:0;z-index:2;display:block}

.banner{
  position:fixed;top:6vh;left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Bungee Shade', cursive;
  font-size:clamp(48px, 11vw, 132px);
  letter-spacing:0.05em;
  background:linear-gradient(90deg, #ff5ea1 0%, #ffce4a 25%, #5dffb3 50%, #7be4ff 75%, #9b6bff 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 30px rgba(255,150,255,0.5)) drop-shadow(0 4px 0 #000);
  animation:bannerShine 3.6s linear infinite, bannerPop 0.9s cubic-bezier(.18,.7,.4,1.05);
  pointer-events:none;text-align:center;line-height:1;
  text-shadow:none;
}
@keyframes bannerShine{from{background-position:0% 50%}to{background-position:200% 50%}}
@keyframes bannerPop{0%{opacity:0;transform:translateX(-50%) scale(0.6) rotate(-4deg)}60%{opacity:1;transform:translateX(-50%) scale(1.06) rotate(2deg)}100%{opacity:1;transform:translateX(-50%) scale(1)}}

.subtitle{
  position:fixed;top:calc(6vh + clamp(48px, 11vw, 132px) + 18px);left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Bungee', cursive;font-size:clamp(14px, 1.8vw, 22px);
  letter-spacing:0.32em;
  color:var(--bone);
  text-shadow:0 0 14px rgba(255,206,74,0.55), 2px 2px 0 #000;
  pointer-events:none;text-align:center;
  animation:subFade 1.6s ease-out 0.4s both;
}
.subtitle .b{color:var(--amber)}
@keyframes subFade{from{opacity:0;letter-spacing:0.6em}to{opacity:1;letter-spacing:0.32em}}

.hud{
  position:fixed;top:18px;right:18px;z-index:5;
  font-family:'Major Mono Display', monospace;font-size:11px;letter-spacing:0.2em;
  color:var(--dim);text-align:right;line-height:1.7;pointer-events:none;
  text-shadow:0 0 6px rgba(0,0,0,0.6);
}
.hud b{color:var(--bone);font-size:14px}

.hint{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Bungee', cursive;font-size:13px;letter-spacing:0.16em;
  color:var(--bone);
  text-shadow:0 0 10px rgba(123,228,255,0.55), 2px 2px 0 #000;
  text-align:center;pointer-events:none;
}
.hint b{color:var(--cyan)}

.muted{
  position:fixed;bottom:18px;right:18px;z-index:6;
  background:rgba(10,4,22,0.55);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,206,74,0.4);
  color:var(--bone);
  font-family:'Bungee', cursive;font-size:11px;letter-spacing:0.18em;
  padding:8px 14px;border-radius:999px;cursor:pointer;
}
.muted:hover{border-color:var(--cyan);color:var(--cyan)}

@media (max-width:640px){.hint{font-size:11px;letter-spacing:0.1em}}
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div class="banner">ZENNLOGIC</div>
<div class="subtitle"><span class="b">★</span> CELEBRATION ★ MMXXVI <span class="b">★</span></div>

<div class="hud">
  <span style="color:var(--dim)">FIREWORKS</span> <b id="hFw">0</b><br>
  <span style="color:var(--dim)">CONFETTI</span> <b id="hCf">0</b><br>
  <span style="color:var(--dim)">SPARKS</span> <b id="hSp">0</b>
</div>

<div class="hint">
  click anywhere · launch a rocket &nbsp; · &nbsp; <b>SPACE</b> · barrage &nbsp; · &nbsp; <b>C</b> · confetti dump
</div>
<button class="muted" id="bMute">♪ ON</button>

<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  let W = innerWidth, H = innerHeight;
  const dpr = Math.max(1, Math.min(2, devicePixelRatio || 1));
  function resize() {
    W = innerWidth; H = innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  addEventListener('resize', resize);

  // === COLORS ===
  const HUES = [
    [255, 94, 161],   // pink
    [255, 206, 74],   // amber
    [93, 255, 179],   // green
    [123, 228, 255],  // cyan
    [155, 107, 255],  // violet
    [255, 255, 255],  // white
    [255, 138, 61],   // orange
  ];
  function pickHue() { return HUES[Math.floor(Math.random() * HUES.length)]; }
  function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }

  // === STATE ===
  const rockets = [];
  const sparks = [];
  const confetti = [];
  const trails = [];

  // === PHYSICS CONSTANTS ===
  const G = 0.05;        // gravity for sparks (per ms factor — we use frame-based)
  const ROCKET_G = 0.04;
  const DRAG = 0.985;

  // === ROCKET ===
  // shoots from bottom up to a target altitude, then explodes into a pattern
  function launchRocket(tx, ty) {
    const sx = W * (0.18 + Math.random() * 0.64);
    const sy = H + 8;
    if (tx == null) tx = sx + (Math.random() - 0.5) * W * 0.4;
    if (ty == null) ty = H * (0.15 + Math.random() * 0.35);
    const dx = tx - sx, dy = ty - sy;
    const dist = Math.hypot(dx, dy);
    const speed = 11 + Math.random() * 5;   // px/frame
    const vx = (dx / dist) * speed;
    const vy = (dy / dist) * speed;
    const hue = pickHue();
    const pattern = ['burst', 'ring', 'willow', 'star', 'crackle'][Math.floor(Math.random() * 5)];
    rockets.push({ x: sx, y: sy, vx, vy, hue, pattern, ageF: 0, fuse: Math.floor(dist / speed) - 4 });
    rocketSfx();
  }

  // === EXPLOSION ===
  function explode(x, y, hue, pattern) {
    const baseSpd = 5 + Math.random() * 3;
    if (pattern === 'ring') {
      const N = 36;
      for (let i = 0; i < N; i++) {
        const a = (i / N) * Math.PI * 2;
        sparks.push(makeSpark(x, y, Math.cos(a) * baseSpd * 1.2, Math.sin(a) * baseSpd * 1.2, hue, 1.4));
      }
    } else if (pattern === 'star') {
      // 5-point star — spokes of dense particles
      for (let p = 0; p < 5; p++) {
        const a = -Math.PI/2 + p * (Math.PI * 2 / 5);
        for (let k = 0; k < 8; k++) {
          const sp = baseSpd * (0.5 + k * 0.16);
          sparks.push(makeSpark(x, y, Math.cos(a) * sp, Math.sin(a) * sp, hue, 1.2));
        }
      }
      // gap fillers
      for (let i = 0; i < 24; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = baseSpd * (0.5 + Math.random() * 0.5);
        sparks.push(makeSpark(x, y, Math.cos(a)*sp, Math.sin(a)*sp, hue, 0.9));
      }
    } else if (pattern === 'willow') {
      // long-trail droplets — slow, heavy gravity
      const N = 60;
      for (let i = 0; i < N; i++) {
        const a = -Math.PI/2 + (Math.random() - 0.5) * Math.PI * 1.4;
        const sp = baseSpd * (0.4 + Math.random() * 0.6);
        sparks.push(makeSpark(x, y, Math.cos(a)*sp, Math.sin(a)*sp, hue, 2.2, true));
      }
    } else if (pattern === 'crackle') {
      // chaotic sparks of mixed colors
      for (let i = 0; i < 80; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = baseSpd * (0.3 + Math.random() * 0.9);
        const h = Math.random() < 0.5 ? hue : pickHue();
        const s = makeSpark(x, y, Math.cos(a)*sp, Math.sin(a)*sp, h, 0.7);
        s.crackle = true;
        sparks.push(s);
      }
    } else {
      // standard burst — uniform sphere
      const N = 70;
      for (let i = 0; i < N; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = baseSpd * (0.3 + Math.random() * 0.9);
        sparks.push(makeSpark(x, y, Math.cos(a)*sp, Math.sin(a)*sp, hue, 1.0));
      }
    }
    // shockwave ring
    trails.push({ kind: 'shock', x, y, r: 0, max: 90 + Math.random() * 60, life: 0.55, hue });
    boomSfx();
  }
  function makeSpark(x, y, vx, vy, hue, lifeMul, willow) {
    return {
      x, y, vx, vy, hue,
      life: 0.9 * (lifeMul || 1) + Math.random() * 0.6,
      age: 0,
      gravity: willow ? 0.08 : 0.04,
      willow,
      sparkleAt: 0,
    };
  }

  // === CONFETTI ===
  function spawnConfetti(amount, x, y) {
    for (let i = 0; i < amount; i++) {
      confetti.push({
        x: x != null ? x + (Math.random() - 0.5) * 80 : Math.random() * W,
        y: y != null ? y : -10 - Math.random() * 80,
        vx: (Math.random() - 0.5) * 4,
        vy: 1 + Math.random() * 3,
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.3,
        hue: pickHue(),
        w: 6 + Math.random() * 6,
        h: 3 + Math.random() * 4,
        sway: Math.random() * Math.PI * 2,
        swayRate: 1.6 + Math.random() * 1.2,
      });
    }
  }
  spawnConfetti(120);

  // === MAIN TICK ===
  let lastTime = performance.now();
  let bargBurstAt = 0;
  function tick(now) {
    const dt = Math.min(50, now - lastTime);  // ms
    lastTime = now;
    const f = dt / 16.67;  // frame multiplier (1 at 60fps)

    // update rockets
    for (let i = rockets.length - 1; i >= 0; i--) {
      const r = rockets[i];
      r.x += r.vx * f;
      r.y += r.vy * f;
      r.vy += ROCKET_G * f;
      r.vx *= Math.pow(0.997, f);
      r.ageF += f;
      // trail
      trails.push({ kind: 'trail', x: r.x, y: r.y, hue: r.hue, life: 0.45 });
      if (r.ageF >= r.fuse) {
        explode(r.x, r.y, r.hue, r.pattern);
        rockets.splice(i, 1);
      }
    }
    // update sparks
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.x += s.vx * f;
      s.y += s.vy * f;
      s.vy += s.gravity * f;
      s.vx *= Math.pow(DRAG, f);
      s.vy *= Math.pow(DRAG, f);
      s.age += dt / 1000;
      if (s.age >= s.life) {
        if (s.crackle && Math.random() < 0.3) {
          // crackle splits into 2 mini-sparks
          for (let k = 0; k < 2; k++) {
            const a = Math.random() * Math.PI * 2;
            sparks.push(makeSpark(s.x, s.y, Math.cos(a)*1.2, Math.sin(a)*1.2, s.hue, 0.4));
          }
        }
        sparks.splice(i, 1);
      }
    }
    // update confetti
    for (let i = confetti.length - 1; i >= 0; i--) {
      const c = confetti[i];
      c.sway += c.swayRate * (dt / 1000);
      c.x += (c.vx + Math.sin(c.sway) * 0.6) * f;
      c.y += c.vy * f;
      c.rot += c.rotSpeed * f;
      c.vy = Math.min(c.vy + 0.04 * f, 4);
      // recycle confetti past bottom
      if (c.y > H + 20) {
        c.y = -10;
        c.x = Math.random() * W;
        c.hue = pickHue();
      }
      if (c.x < -20) c.x = W + 10;
      if (c.x > W + 20) c.x = -10;
    }
    // update trails (fading)
    for (let i = trails.length - 1; i >= 0; i--) {
      const t = trails[i];
      t.life -= dt / 1000;
      if (t.kind === 'shock') t.r += (t.max - t.r) * Math.min(1, dt / 60);
      if (t.life <= 0) trails.splice(i, 1);
    }
    // auto-launch rockets occasionally
    if (rockets.length < 4 && Math.random() < 0.04 * f) launchRocket();
    // barrage on space
    if (bargBurstAt > 0) {
      bargBurstAt--;
      if (bargBurstAt % 4 === 0) launchRocket();
    }

    render(now);
    document.getElementById('hFw').textContent = rockets.length;
    document.getElementById('hCf').textContent = confetti.length;
    document.getElementById('hSp').textContent = sparks.length;
    requestAnimationFrame(tick);
  }

  // === RENDER ===
  function render(now) {
    // motion-trail wash for soft afterimages (additive bloom feel)
    ctx.fillStyle = 'rgba(4,2,14,0.30)';
    ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = 'lighter';

    // shockwave rings
    for (const t of trails) {
      if (t.kind === 'shock') {
        const a = Math.max(0, t.life / 0.55);
        ctx.strokeStyle = rgba(t.hue, a * 0.5);
        ctx.lineWidth = 2;
        ctx.shadowColor = rgba(t.hue, 1);
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
        ctx.stroke();
      } else if (t.kind === 'trail') {
        const a = Math.max(0, t.life / 0.45);
        ctx.fillStyle = rgba(t.hue, a * 0.7);
        ctx.shadowColor = rgba(t.hue, a);
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.shadowBlur = 0;

    // rockets — bright leading dot + small streak
    for (const r of rockets) {
      ctx.fillStyle = rgba(r.hue, 1);
      ctx.shadowColor = rgba(r.hue, 1);
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(r.x, r.y, 2.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // sparks
    for (const s of sparks) {
      const a = Math.max(0, 1 - s.age / s.life);
      const r = 1.6 + a * 1.4;
      ctx.fillStyle = rgba(s.hue, a);
      ctx.shadowColor = rgba(s.hue, a * 0.8);
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.fill();
      // willow has a faint trail
      if (s.willow && a > 0.2) {
        ctx.fillStyle = rgba(s.hue, a * 0.4);
        ctx.beginPath();
        ctx.arc(s.x - s.vx * 1.5, s.y - s.vy * 1.5, r * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.shadowBlur = 0;

    ctx.globalCompositeOperation = 'source-over';

    // confetti
    for (const c of confetti) {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);
      ctx.fillStyle = rgba(c.hue, 1);
      ctx.fillRect(-c.w/2, -c.h/2, c.w, c.h);
      // back-side darker stripe for that "spinning paper" look
      const dark = [c.hue[0]*0.5|0, c.hue[1]*0.5|0, c.hue[2]*0.5|0];
      ctx.fillStyle = rgba(dark, 0.6);
      ctx.fillRect(-c.w/2, -c.h/2 + c.h * 0.6, c.w, c.h * 0.4);
      ctx.restore();
    }
  }

  // === input ===
  canvas.addEventListener('click', (e) => {
    audio();
    launchRocket(e.clientX, e.clientY);
    spawnConfetti(20, e.clientX, e.clientY);
  });
  canvas.addEventListener('touchstart', (e) => {
    audio();
    if (e.touches[0]) {
      launchRocket(e.touches[0].clientX, e.touches[0].clientY);
      spawnConfetti(20, e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: true });
  addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); audio(); bargBurstAt = 28; }
    if (e.key === 'c' || e.key === 'C') { audio(); spawnConfetti(150); }
  });

  // === audio ===
  let audioCtx = null, master = null, muted = false;
  function audio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      master = audioCtx.createGain();
      master.gain.value = 0.28;
      master.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function rocketSfx() {
    if (muted || !audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(2400 + Math.random()*200, t);
    o.frequency.exponentialRampToValueAtTime(180, t + 0.7);
    const bp = audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=4;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.05, t + 0.1);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.78);
    o.connect(bp); bp.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.8);
  }
  function boomSfx() {
    if (muted || !audioCtx) return;
    const t = audioCtx.currentTime;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.7, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2 - 1) * Math.pow(1 - i/d.length, 1.1);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const lp = audioCtx.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.setValueAtTime(2200, t);
    lp.frequency.exponentialRampToValueAtTime(150, t + 0.65);
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.55, t);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
    src.connect(lp); lp.connect(ng); ng.connect(master);
    src.start(t);
    // sub thump
    const o = audioCtx.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(110, t); o.frequency.exponentialRampToValueAtTime(28, t + 0.55);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.55, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.65);
    // sparkle high partials
    for (let i = 0; i < 4; i++) {
      const o2 = audioCtx.createOscillator(); o2.type='triangle';
      const f = 1800 + Math.random() * 1800;
      o2.frequency.setValueAtTime(f, t + 0.04 + i * 0.03);
      o2.frequency.exponentialRampToValueAtTime(f * 0.5, t + 0.4);
      const g2 = audioCtx.createGain();
      g2.gain.setValueAtTime(0.001, t + 0.04 + i * 0.03);
      g2.gain.exponentialRampToValueAtTime(0.04, t + 0.06 + i * 0.03);
      g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
      o2.connect(g2); g2.connect(master); o2.start(t + 0.04 + i * 0.03); o2.stop(t + 0.55);
    }
  }
  document.getElementById('bMute').addEventListener('click', () => {
    muted = !muted;
    document.getElementById('bMute').textContent = muted ? '♪ OFF' : '♪ ON';
    if (!muted) audio();
  });

  // === boot — initial barrage ===
  audio();
  for (let i = 0; i < 6; i++) setTimeout(launchRocket, 200 + i * 350);

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
