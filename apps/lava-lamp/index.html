<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Neon Lava Lamp</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🫧">
  <meta name="description" content="Mesmerizing neon lava lamp with gooey physics">
  <meta property="og:title" content="Neon Lava Lamp">
  <meta property="og:description" content="Mesmerizing neon lava lamp with gooey physics">
  <meta property="og:image" content="https://emojicdn.elk.sh/🫧?style=google">
  <meta property="og:url" content="https://app.sloppy.live/lava-lamp">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a1a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
    }
    .lamp-container { position: relative; width: 280px; height: 500px; }
    #lavaCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .lamp-glass {
      position: absolute;
      top: 50px; left: 40px;
      width: 200px; height: 380px;
      border-radius: 100px / 30px;
      background: transparent;
      box-shadow: inset 0 0 60px rgba(255,255,255,0.05), inset 2px 0 10px rgba(255,255,255,0.1), 0 0 40px rgba(0,0,0,0.5);
      pointer-events: none; z-index: 10;
    }
    .lamp-glass::before {
      content: '';
      position: absolute;
      top: 10px; left: 15px;
      width: 40px; height: 150px;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
      border-radius: 20px;
      transform: rotate(-5deg);
    }
    .lamp-cap {
      position: absolute;
      top: 0; left: 20px;
      width: 240px; height: 70px;
      background: linear-gradient(180deg, #333 0%, #1a1a1a 50%, #0d0d0d 100%);
      border-radius: 20px 20px 50% 50%;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.1);
      z-index: 20;
    }
    .lamp-cap::after {
      content: '';
      position: absolute;
      top: 5px; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 15px;
      background: linear-gradient(180deg, #444 0%, #222 100%);
      border-radius: 10px;
    }
    .lamp-base {
      position: absolute;
      bottom: 0; left: 10px;
      width: 260px; height: 80px;
      background: linear-gradient(180deg, #0d0d0d 0%, #1a1a1a 30%, #333 100%);
      border-radius: 50% 50% 30px 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 -5px 15px rgba(255,255,255,0.05);
      z-index: 20;
    }
    .lamp-base::before {
      content: '';
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 30px;
      background: radial-gradient(ellipse, rgba(255,100,50,0.3) 0%, transparent 70%);
      filter: blur(5px);
    }
    .glow {
      position: absolute;
      top: 50px; left: 40px;
      width: 200px; height: 380px;
      border-radius: 100px / 30px;
      pointer-events: none; z-index: 5;
      filter: blur(30px);
      opacity: 0.5;
    }
    h1 {
      position: fixed; top: 20px;
      color: #ff66aa;
      font-size: 1.5rem;
      text-shadow: 0 0 20px #ff66aa, 0 0 40px #ff0066;
      letter-spacing: 4px;
      z-index: 100;
    }
    .controls {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 12px;
      align-items: center;
      background: rgba(10, 5, 15, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px 20px;
      border-radius: 18px;
      z-index: 100;
    }
    .control-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .control-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 8px 16px;
      min-height: 38px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .control-btn:hover {
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 20px rgba(255,100,200,0.3);
    }
    .picker-group {
      display: flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 0.62rem;
      letter-spacing: 0.15em;
    }
    .picker-group input[type="color"] {
      width: 32px; height: 32px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }
    .picker-group input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .picker-group input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
    .slider-group {
      display: flex; align-items: center; gap: 10px;
      color: rgba(255,255,255,0.7);
      font-size: 0.62rem;
      letter-spacing: 0.15em;
    }
    .slider-group input[type="range"] {
      width: 100px;
      accent-color: #ff66aa;
    }
    .presets { display: flex; gap: 8px; }
    .preset-chip {
      width: 22px; height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.2);
      transition: transform 0.15s, border-color 0.15s;
    }
    .preset-chip:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.6); }
        .hint {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: #666;
      font-size: 0.7rem;
      text-align: center;
      opacity: 1;
      transition: opacity 1s;
      z-index: 100;
    }
    .hint.hidden { opacity: 0; }
    #lavaCanvas { cursor: pointer; }
    @media (max-width: 600px) {
      .control-btn { padding: 12px 24px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
<h1>NEON LAVA</h1>
  <p class="hint" id="hint">Click inside the lamp to create bubbles</p>
  <div class="lamp-container">
    <div class="glow" id="glow"></div>
    <div class="lamp-cap"></div>
    <canvas id="lavaCanvas"></canvas>
    <div class="lamp-glass"></div>
    <div class="lamp-base"></div>
  </div>
  <div class="controls">
    <div class="control-row presets" id="presets"></div>
    <div class="control-row">
      <div class="picker-group">
        <span>WAX</span>
        <input type="color" id="waxColor" value="#ff3296">
      </div>
      <div class="picker-group">
        <span>GLOW</span>
        <input type="color" id="glowColor" value="#ff64c8">
      </div>
      <div class="picker-group">
        <span>FLUID</span>
        <input type="color" id="bgColor" value="#280019">
      </div>
    </div>
    <div class="control-row">
      <div class="slider-group">
        <span>HEAT</span>
        <input type="range" id="heatSlider" min="0" max="200" value="100">
      </div>
      <button class="control-btn" onclick="addBlob()">+ BLOB</button>
      <button class="control-btn" onclick="resetBlobs()">RESET</button>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('lavaCanvas');
    const ctx = canvas.getContext('2d');
    const glow = document.getElementById('glow');
    // Canvas now fills the whole .lamp-container (280x500). Blob physics still
    // lives in a 200x380 "fluid" subspace at offset (FLUID_X, FLUID_Y).
    // NOTE: do NOT ctx.scale() — putImageData ignores transforms.
    const CONTAINER_W = 280, CONTAINER_H = 500;
    const FLUID_X = 40, FLUID_Y = 50, FLUID_W = 200, FLUID_H = 380;
    canvas.width = CONTAINER_W;
    canvas.height = CONTAINER_H;

    // Custom colors: wax (primary), glow (secondary/highlight), bg (fluid)
    const presets = [
      { name: 'magenta',  wax: '#ff3296', glow: '#ff9ae0', bg: '#200018' },
      { name: 'cyan',     wax: '#32c8ff', glow: '#9afbff', bg: '#001a2e' },
      { name: 'orange',   wax: '#ff6e14', glow: '#ffb864', bg: '#1e0800' },
      { name: 'violet',   wax: '#9a3cff', glow: '#d79dff', bg: '#14002e' },
      { name: 'emerald',  wax: '#28e080', glow: '#9affc4', bg: '#001a10' },
      { name: 'amber',    wax: '#ffcd28', glow: '#fff096', bg: '#1e1600' },
      { name: 'blood',    wax: '#ff1e28', glow: '#ff7878', bg: '#1a0000' },
      { name: 'classic',  wax: '#ff5a1e', glow: '#ffa048', bg: '#1a0a00' },
    ];
    function hexToRgb(h) {
      const v = h.replace('#','');
      return [parseInt(v.slice(0,2),16), parseInt(v.slice(2,4),16), parseInt(v.slice(4,6),16)];
    }
    let targetColors = {
      primary:   hexToRgb('#ff3296'),
      secondary: hexToRgb('#ff9ae0'),
      bg:        hexToRgb('#200018'),
    };
    let currentColors = JSON.parse(JSON.stringify(targetColors));

    let heatIntensity = 1;
    const GRAVITY = 0.028;
    const HEAT_FORCE = 0.11;
    const DAMPING = 0.975;
    const BLOB_REPEL = 0.22;

    const blobs = [];

    class Blob {
      constructor(x, y, radius) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = radius;
        this.baseRadius = radius;
        this.temperature = Math.random();
        this.colorOffset = Math.random();
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.wobblePhase = Math.random() * Math.PI * 2;
      }
      update() {
        this.pulsePhase += 0.02;
        this.wobblePhase += 0.025;
        this.radius = this.baseRadius + Math.sin(this.pulsePhase) * 2.5;

        // Thermal gradient: lamp bulb is hot at the bottom, air cool at the top.
        // Heating / cooling scale with distance from the respective end,
        // so a blob slowly swaps temperature as it rises/sinks.
        const normalizedY = this.y / FLUID_H; // 0 = top, 1 = bottom
        const heatAbsorb = Math.max(0, normalizedY - 0.45) * 0.045 * heatIntensity;
        const cooling   = Math.max(0, 0.55 - normalizedY) * 0.035;
        this.temperature += heatAbsorb - cooling;
        this.temperature = Math.max(0, Math.min(1, this.temperature));

        // Buoyancy: stronger asymmetry so hot blobs really do climb and cool ones drop.
        const netBuoyancy = (this.temperature - 0.5) * HEAT_FORCE * heatIntensity;
        this.vy -= netBuoyancy;
        // Gravity, weakened a lot when hot so hot blobs aren't dragged back down.
        this.vy += GRAVITY * (1 - this.temperature * 0.85);

        // gentle horizontal wobble drift
        this.vx += Math.sin(this.wobblePhase + this.colorOffset * 6) * 0.02;

        // integrate
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= DAMPING;
        this.vy *= DAMPING;

        // walls
        const centerX = FLUID_W / 2;
        const width = this.getWidthAtY(this.y);
        const minX = centerX - width / 2 + this.radius;
        const maxX = centerX + width / 2 - this.radius;
        if (this.x < minX) { this.x = minX; this.vx = Math.abs(this.vx) * 0.35; }
        if (this.x > maxX) { this.x = maxX; this.vx = -Math.abs(this.vx) * 0.35; }

        // Floor — heat up and ALWAYS leave with a tiny upward nudge so we can't
        // sit there forever. Also kill any lingering downward velocity.
        const floorY = FLUID_H - 12 - this.radius;
        if (this.y > floorY) {
          this.y = floorY;
          if (this.vy > 0) this.vy = 0;
          this.vy -= 0.08;                 // unconditional pop-off force
          this.temperature = Math.min(1, this.temperature + 0.06);
        }
        // Ceiling — cool off and sink
        const ceilY = this.radius + 12;
        if (this.y < ceilY) {
          this.y = ceilY;
          if (this.vy < 0) this.vy = 0;
          this.vy += 0.05;
          this.temperature = Math.max(0, this.temperature - 0.06);
        }
      }
      getWidthAtY(y) {
        // Lamp profile — narrower top/bottom, wider middle, but not too squeezed
        // at the bottom so clumps can actually separate.
        const n = y / FLUID_H;
        if (n < 0.08) return 140 + n * 500;       // 140..180
        if (n > 0.92) return 180 - (n - 0.92) * 500; // 180..140
        return 180;
      }
      getColor() {
        const t = (Math.sin(this.colorOffset * Math.PI * 2 + Date.now() * 0.001) + 1) / 2;
        return {
          r: Math.round(currentColors.primary[0] + (currentColors.secondary[0] - currentColors.primary[0]) * t),
          g: Math.round(currentColors.primary[1] + (currentColors.secondary[1] - currentColors.primary[1]) * t),
          b: Math.round(currentColors.primary[2] + (currentColors.secondary[2] - currentColors.primary[2]) * t)
        };
      }
    }

    function initBlobs() {
      blobs.length = 0;
      for (let i = 0; i < 10; i++) {
        blobs.push(new Blob(50 + Math.random() * 100, 50 + Math.random() * 280, 7.5 + Math.random() * 10));
      }
    }

    function addBlob() {
      if (blobs.length < 15) {
        blobs.push(new Blob(50 + Math.random() * 100, 300 + Math.random() * 50, 7.5 + Math.random() * 10));
      }
    }

    function handleBlobInteractions() {
      for (let i = 0; i < blobs.length; i++) {
        for (let j = i + 1; j < blobs.length; j++) {
          const b1 = blobs[i], b2 = blobs[j];
          const dx = b2.x - b1.x, dy = b2.y - b1.y;
          const distSq = dx * dx + dy * dy;
          const minDist = (b1.radius + b2.radius) * 1.05;
          if (distSq < minDist * minDist && distSq > 0.0001) {
            const dist = Math.sqrt(distSq);
            const overlap = (minDist - dist) / minDist; // 0..1
            // quadratic falloff so touching blobs push hard, far ones barely nudge
            const force = overlap * overlap * BLOB_REPEL;
            // Slight vertical bias when clumped at floor: preferentially push
            // the upper blob up and the lower one further down-sideways so
            // they separate vertically instead of just jittering.
            const nx = dx / dist, ny = dy / dist;
            const fx = nx * force;
            const fy = ny * force;
            b1.vx -= fx; b1.vy -= fy;
            b2.vx += fx; b2.vy += fy;
          }
        }
      }
    }

    function renderMetaballs() {
      const threshold = 1;
      const imageData = ctx.createImageData(CONTAINER_W, CONTAINER_H);
      const data = imageData.data;
      const bgR = currentColors.bg[0], bgG = currentColors.bg[1], bgB = currentColors.bg[2];
      // warm tint for the bulb bottom (lamp light from below)
      const bulbR = Math.min(255, bgR + 80), bulbG = Math.min(255, bgG + 40), bulbB = Math.min(255, bgB + 20);

      // Fluid area only — [FLUID_X .. FLUID_X+FLUID_W) x [FLUID_Y .. FLUID_Y+FLUID_H)
      for (let fy = 0; fy < FLUID_H; fy++) {
        const ty = fy / FLUID_H;
        const bulbFall = Math.max(0, Math.pow(1 - Math.max(0, ty - 0.4) / 0.6, 2));
        const lineBgR = bgR + (bulbR - bgR) * bulbFall * 0.7;
        const lineBgG = bgG + (bulbG - bgG) * bulbFall * 0.7;
        const lineBgB = bgB + (bulbB - bgB) * bulbFall * 0.7;
        const cy = fy + FLUID_Y;

        for (let fx = 0; fx < FLUID_W; fx++) {
          let sum = 0, colorR = 0, colorG = 0, colorB = 0, totalWeight = 0;
          let nearestDy = 0, nearestR = 20, hasNearest = false;
          let nearestDist = Infinity;
          for (const blob of blobs) {
            const dx = fx - blob.x, dy = fy - blob.y;
            const distSq = dx * dx + dy * dy;
            const r = blob.radius * 1.5;
            const contribution = (r * r) / (distSq + 1);
            sum += contribution;
            if (contribution > 0.1) {
              const color = blob.getColor();
              colorR += color.r * contribution;
              colorG += color.g * contribution;
              colorB += color.b * contribution;
              totalWeight += contribution;
              if (distSq < nearestDist) {
                nearestDist = distSq; nearestDy = dy; nearestR = blob.radius; hasNearest = true;
              }
            }
          }
          const cx = fx + FLUID_X;
          const idx = (cy * CONTAINER_W + cx) * 4;
          if (sum > threshold) {
            if (totalWeight > 0) { colorR /= totalWeight; colorG /= totalWeight; colorB /= totalWeight; }
            const edgeFactor = Math.min((sum - threshold) * 2, 1);
            let shade = 0.85;
            if (hasNearest) {
              const ny = nearestDy / nearestR; // -1 top, +1 bottom relative to blob
              shade = 0.55 + 0.6 * Math.max(0, (ny + 1) * 0.5); // lit from below
            }
            let rOut = colorR * shade;
            let gOut = colorG * shade;
            let bOut = colorB * shade;
            const rim = (1 - edgeFactor) * 0.55;
            rOut += (255 - rOut) * rim * 0.5;
            gOut += (255 - gOut) * rim * 0.5;
            bOut += (255 - bOut) * rim * 0.5;
            data[idx]     = Math.min(255, rOut);
            data[idx + 1] = Math.min(255, gOut);
            data[idx + 2] = Math.min(255, bOut);
            data[idx + 3] = 255;
          } else if (sum > threshold * 0.45) {
            const glowIntensity = (sum - threshold * 0.45) / (threshold * 0.55);
            if (totalWeight > 0) { colorR /= totalWeight; colorG /= totalWeight; colorB /= totalWeight; }
            else { colorR = currentColors.primary[0]; colorG = currentColors.primary[1]; colorB = currentColors.primary[2]; }
            data[idx]     = lineBgR + (colorR - lineBgR) * glowIntensity * 0.45;
            data[idx + 1] = lineBgG + (colorG - lineBgG) * glowIntensity * 0.45;
            data[idx + 2] = lineBgB + (colorB - lineBgB) * glowIntensity * 0.45;
            data[idx + 3] = 255;
          } else {
            data[idx] = lineBgR; data[idx + 1] = lineBgG; data[idx + 2] = lineBgB; data[idx + 3] = 255;
          }
        }
      }
      // Outside the fluid region, leave alpha = 0 (cap/base/glass sit above anyway).
      ctx.putImageData(imageData, 0, 0);
    }

    function updateColors() {
      const speed = 0.02;
      for (let i = 0; i < 3; i++) {
        currentColors.primary[i] += (targetColors.primary[i] - currentColors.primary[i]) * speed;
        currentColors.secondary[i] += (targetColors.secondary[i] - currentColors.secondary[i]) * speed;
        currentColors.bg[i] += (targetColors.bg[i] - currentColors.bg[i]) * speed;
      }
      const r = Math.round(currentColors.primary[0]), g = Math.round(currentColors.primary[1]), b = Math.round(currentColors.primary[2]);
      glow.style.background = `radial-gradient(ellipse, rgba(${r}, ${g}, ${b}, 0.4) 0%, transparent 70%)`;
    }

    function setColors(waxHex, glowHex, bgHex) {
      targetColors = {
        primary:   hexToRgb(waxHex),
        secondary: hexToRgb(glowHex),
        bg:        hexToRgb(bgHex),
      };
    }
    function resetBlobs() { initBlobs(); }

    // Build preset chips
    const presetsEl = document.getElementById('presets');
    presets.forEach(p => {
      const chip = document.createElement('div');
      chip.className = 'preset-chip';
      chip.style.background = `radial-gradient(circle at 30% 30%, ${p.glow}, ${p.wax} 70%)`;
      chip.title = p.name;
      chip.addEventListener('click', () => {
        document.getElementById('waxColor').value = p.wax;
        document.getElementById('glowColor').value = p.glow;
        document.getElementById('bgColor').value = p.bg;
        setColors(p.wax, p.glow, p.bg);
      });
      presetsEl.appendChild(chip);
    });

    // Wire inputs
    const waxInput = document.getElementById('waxColor');
    const glowInput = document.getElementById('glowColor');
    const bgInput = document.getElementById('bgColor');
    const heatSlider = document.getElementById('heatSlider');
    function syncColors() { setColors(waxInput.value, glowInput.value, bgInput.value); }
    waxInput.addEventListener('input', syncColors);
    glowInput.addEventListener('input', syncColors);
    bgInput.addEventListener('input', syncColors);
    heatSlider.addEventListener('input', () => {
      heatIntensity = parseFloat(heatSlider.value) / 100;
    });

    function animate() {
      blobs.forEach(blob => blob.update());
      handleBlobInteractions();
      updateColors();
      renderMetaballs();
      requestAnimationFrame(animate);
    }

    // Click interaction - create bubbles where you click
    const hint = document.getElementById('hint');
    let clickCount = 0;

    function canvasToFluid(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = (clientX - rect.left) * (CONTAINER_W / rect.width) - FLUID_X;
      const y = (clientY - rect.top)  * (CONTAINER_H / rect.height) - FLUID_Y;
      return { x, y, inside: x >= 0 && x < FLUID_W && y >= 0 && y < FLUID_H };
    }

    canvas.addEventListener('click', (e) => {
      const p = canvasToFluid(e.clientX, e.clientY);
      if (!p.inside) return;
      const x = p.x, y = p.y;

      clickCount++;
      if (clickCount >= 2) hint.classList.add('hidden');

      // Create 2-4 bubbles at click position
      const count = 2 + Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) {
        if (blobs.length < 20) {
          const newBlob = new Blob(
            x + (Math.random() - 0.5) * 30,
            y + (Math.random() - 0.5) * 30,
            6 + Math.random() * 9
          );
          newBlob.temperature = 0.8; // Hot from the click energy
          newBlob.vy = -2 - Math.random() * 2; // Burst upward
          newBlob.vx = (Math.random() - 0.5) * 3;
          blobs.push(newBlob);
        }
      }

      // Push nearby blobs away from click
      blobs.forEach(blob => {
        const dx = blob.x - x;
        const dy = blob.y - y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 80 && dist > 0) {
          const force = (80 - dist) / 80 * 3;
          blob.vx += (dx / dist) * force;
          blob.vy += (dy / dist) * force;
          blob.temperature += 0.2;
        }
      });
    });

    // Touch support for mobile
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const p = canvasToFluid(touch.clientX, touch.clientY);
      if (!p.inside) return;
      const x = p.x, y = p.y;

      const count = 2 + Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) {
        if (blobs.length < 20) {
          const newBlob = new Blob(
            x + (Math.random() - 0.5) * 30,
            y + (Math.random() - 0.5) * 30,
            6 + Math.random() * 9
          );
          newBlob.temperature = 0.8;
          newBlob.vy = -2 - Math.random() * 2;
          newBlob.vx = (Math.random() - 0.5) * 3;
          blobs.push(newBlob);
        }
      }

      blobs.forEach(blob => {
        const dx = blob.x - x;
        const dy = blob.y - y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 80 && dist > 0) {
          const force = (80 - dist) / 80 * 3;
          blob.vx += (dx / dist) * force;
          blob.vy += (dy / dist) * force;
          blob.temperature += 0.2;
        }
      });
    });

    initBlobs();
    animate();
  </script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
