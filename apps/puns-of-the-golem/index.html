<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Puns of the Golem</title>
<link rel="icon" href="https://emojicdn.elk.sh/🗿">
<meta property="og:title" content="Puns of the Golem">
<meta property="og:description" content="Tell puns to an ancient stone golem. It judges you. With voice.">
<meta property="og:url" content="https://sloppy.live/puns-of-the-golem">
<meta property="og:image" content="https://sloppy.live/puns-of-the-golem/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Crimson+Pro:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0e0c08;--stone:#3a3428;--gold:#c8a840;--text:#7a6e58;--bright:#d8c8a0;--glow:#e0c060}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;user-select:none}

#scene{position:relative;width:100%;max-width:700px;flex-shrink:0}
#scene canvas{display:block;width:100%;aspect-ratio:7/5}

#speech-bubble{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);
  background:rgba(14,12,8,0.92);border:2px solid var(--stone);border-radius:8px;
  padding:12px 20px;color:var(--bright);font-size:clamp(14px,2.5vw,18px);
  font-style:italic;text-align:center;max-width:85%;min-height:40px;
  line-height:1.4;pointer-events:none;display:none;
  box-shadow:0 0 20px rgba(200,168,64,0.08)}
#speech-bubble::after{content:'';position:absolute;top:-10px;left:50%;
  transform:translateX(-50%);border:6px solid transparent;
  border-bottom-color:var(--stone)}

#ui{width:100%;max-width:700px;padding:12px 16px;display:flex;flex-direction:column;gap:10px}

#title-bar{display:flex;justify-content:space-between;align-items:center}
#title-bar h1{font-family:'Uncial Antiqua',cursive;font-size:clamp(16px,3vw,24px);
  color:var(--gold);letter-spacing:2px}
#title-bar .stats{font-size:13px;color:var(--text);display:flex;gap:12px}
#title-bar .stats span{color:var(--gold);font-weight:600}

#prompt-area{background:rgba(58,52,40,0.15);border:1px solid var(--stone);
  border-radius:6px;padding:10px 14px;font-size:13px;color:var(--bright);
  text-align:center;min-height:40px;display:flex;align-items:center;justify-content:center}
#prompt-area .topic{color:var(--gold);font-weight:600;font-size:15px}

#input-row{display:flex;gap:8px}
#pun-input{flex:1;background:rgba(20,18,12,0.8);border:1px solid var(--stone);
  color:var(--bright);font-family:'Crimson Pro',serif;font-size:15px;
  padding:10px 14px;border-radius:4px;outline:none}
#pun-input:focus{border-color:var(--gold)}
#pun-input::placeholder{color:rgba(122,110,88,0.4);font-style:italic}
#submit-btn{padding:10px 20px;background:var(--stone);border:1px solid rgba(200,168,64,0.2);
  color:var(--bright);font-family:'Uncial Antiqua',cursive;font-size:14px;
  border-radius:4px;cursor:pointer;transition:all .2s;letter-spacing:1px;white-space:nowrap}
#submit-btn:hover:not(:disabled){background:rgba(200,168,64,0.15);border-color:var(--gold);color:var(--gold)}
#submit-btn:disabled{opacity:0.3;cursor:default}

#history{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;
  padding-right:4px}
.history-entry{background:rgba(58,52,40,0.1);border:1px solid rgba(58,52,40,0.3);
  border-radius:4px;padding:8px 12px;font-size:12px;display:flex;gap:10px;align-items:flex-start}
.history-entry .h-score{font-size:18px;flex-shrink:0}
.history-entry .h-body{flex:1}
.history-entry .h-pun{color:var(--bright);font-style:italic}
.history-entry .h-reaction{color:var(--text);font-size:11px;margin-top:2px}
.history-entry .h-pts{color:var(--gold);font-weight:600;font-size:11px;flex-shrink:0}

#controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
#controls button{padding:6px 12px;background:rgba(58,52,40,0.2);border:1px solid var(--stone);
  color:var(--text);font-family:'Crimson Pro',serif;font-size:12px;border-radius:3px;
  cursor:pointer;transition:all .15s}
#controls button:hover{border-color:var(--gold);color:var(--bright)}

</style>
</head>
<body>
<div id="scene">
  <canvas id="golem-canvas"></canvas>
  <div id="speech-bubble"></div>
</div>
<div id="ui">
  <div id="title-bar">
    <h1>🗿 Puns of the Golem</h1>
    <div class="stats">
      <div>Score: <span id="score">0</span></div>
      <div>Streak: <span id="streak">0</span>🔥</div>
      <div>Round: <span id="round">1</span></div>
    </div>
  </div>
  <div id="prompt-area">The Golem stirs...</div>
  <div id="input-row">
    <input id="pun-input" type="text" placeholder="Type your pun here..." maxlength="200" autocomplete="off">
    <button id="submit-btn">SPEAK</button>
  </div>
  <div id="history"></div>
  <div id="controls">
    <button id="btn-hint">💡 Hint</button>
    <button id="btn-skip">⏭ New Topic</button>
    <button id="btn-mute">🔊 Voice</button>
  </div>
</div>

<script>
// === GOLEM CANVAS ===
const gc = document.getElementById('golem-canvas');
const gctx = gc.getContext('2d');
let GW, GHC;
function resizeGolem(){
  const r = gc.getBoundingClientRect();
  GW = gc.width = Math.floor(r.width * 2);
  GHC = gc.height = Math.floor(r.width * 2 * 5/7);
}
resizeGolem();
window.addEventListener('resize', resizeGolem);

let golemMood = 'neutral'; // neutral, thinking, amused, groan, angry, laughing
let golemMoodTimer = 0;
let eyeGlow = 0;
let mouthOpen = 0;
let shakeAmt = 0;

function drawGolem(t){
  const w = GW, h = GHC;
  const cx = w/2, baseY = h*0.85;

  // Background — dark cave
  const bgGrad = gctx.createLinearGradient(0,0,0,h);
  bgGrad.addColorStop(0, '#0a0806');
  bgGrad.addColorStop(0.5, '#12100a');
  bgGrad.addColorStop(1, '#1a1610');
  gctx.fillStyle = bgGrad;
  gctx.fillRect(0,0,w,h);

  // Cave ceiling stalactites
  gctx.fillStyle = '#1a1610';
  for(let i = 0; i < 12; i++){
    const sx = (i*w/11);
    const sh = 20 + Math.sin(i*2.3)*30;
    gctx.beginPath();
    gctx.moveTo(sx-15, 0);
    gctx.lineTo(sx, sh);
    gctx.lineTo(sx+15, 0);
    gctx.fill();
  }

  // Torch glow (left and right)
  for(const side of [-1, 1]){
    const tx = cx + side * w*0.38;
    const ty = h*0.3;
    // Flame
    const fIdx = Math.floor(t*8)%3;
    const flames = ['#ff8020','#ffaa30','#ff6010'];
    gctx.fillStyle = flames[fIdx];
    gctx.beginPath();
    gctx.ellipse(tx, ty-10+Math.sin(t*6)*3, 8, 14+Math.sin(t*8)*4, 0, 0, Math.PI*2);
    gctx.fill();
    // Glow
    const tGrad = gctx.createRadialGradient(tx, ty, 5, tx, ty, w*0.2);
    tGrad.addColorStop(0, 'rgba(255,140,40,0.08)');
    tGrad.addColorStop(1, 'transparent');
    gctx.fillStyle = tGrad;
    gctx.fillRect(0,0,w,h);
    // Bracket
    gctx.fillStyle = '#3a3020';
    gctx.fillRect(tx-3, ty, 6, 30);
  }

  // Ground stones
  gctx.fillStyle = '#1a1610';
  gctx.fillRect(0, baseY, w, h-baseY);
  gctx.fillStyle = '#222018';
  for(let i = 0; i < 8; i++){
    const sx = i*w/7 - 10;
    gctx.beginPath();
    gctx.ellipse(sx+40, baseY+5, 50, 12, 0, 0, Math.PI*2);
    gctx.fill();
  }

  // Screen shake
  gctx.save();
  if(shakeAmt > 0){
    gctx.translate(Math.random()*shakeAmt*2-shakeAmt, Math.random()*shakeAmt*2-shakeAmt);
    shakeAmt *= 0.9;
    if(shakeAmt < 0.5) shakeAmt = 0;
  }

  // === GOLEM BODY ===
  const gx = cx, gy = baseY - h*0.08;
  const gScale = w/700;

  // Shoulders/torso
  gctx.fillStyle = '#3a3428';
  gctx.beginPath();
  gctx.moveTo(gx-120*gScale, gy);
  gctx.quadraticCurveTo(gx-140*gScale, gy-80*gScale, gx-100*gScale, gy-140*gScale);
  gctx.lineTo(gx+100*gScale, gy-140*gScale);
  gctx.quadraticCurveTo(gx+140*gScale, gy-80*gScale, gx+120*gScale, gy);
  gctx.closePath();
  gctx.fill();

  // Cracks on body
  gctx.strokeStyle = '#2a2418';
  gctx.lineWidth = 1.5*gScale;
  gctx.beginPath(); gctx.moveTo(gx-40*gScale,gy-60*gScale); gctx.lineTo(gx-20*gScale,gy-100*gScale); gctx.stroke();
  gctx.beginPath(); gctx.moveTo(gx+30*gScale,gy-50*gScale); gctx.lineTo(gx+50*gScale,gy-110*gScale); gctx.stroke();

  // Rune on chest
  const runeGlow = 0.2 + eyeGlow * 0.4;
  gctx.strokeStyle = `rgba(200,168,64,${runeGlow})`;
  gctx.lineWidth = 2*gScale;
  gctx.beginPath();
  gctx.moveTo(gx, gy-40*gScale);
  gctx.lineTo(gx-15*gScale, gy-70*gScale);
  gctx.lineTo(gx+15*gScale, gy-70*gScale);
  gctx.closePath();
  gctx.stroke();
  gctx.beginPath(); gctx.arc(gx, gy-60*gScale, 5*gScale, 0, Math.PI*2);
  gctx.fillStyle = `rgba(200,168,64,${runeGlow*0.5})`;
  gctx.fill();

  // Head
  const headY = gy - 180*gScale;
  const headW = 85*gScale, headH = 75*gScale;
  gctx.fillStyle = '#3a3428';
  gctx.beginPath();
  gctx.moveTo(gx-headW, headY+headH*0.3);
  gctx.quadraticCurveTo(gx-headW*1.05, headY-headH*0.5, gx-headW*0.4, headY-headH);
  gctx.lineTo(gx+headW*0.4, headY-headH);
  gctx.quadraticCurveTo(gx+headW*1.05, headY-headH*0.5, gx+headW, headY+headH*0.3);
  gctx.quadraticCurveTo(gx+headW*0.8, headY+headH*0.8, gx, headY+headH*0.6);
  gctx.quadraticCurveTo(gx-headW*0.8, headY+headH*0.8, gx-headW, headY+headH*0.3);
  gctx.closePath();
  gctx.fill();

  // Brow ridge
  gctx.fillStyle = '#2e2820';
  gctx.beginPath();
  gctx.moveTo(gx-headW*0.9, headY-headH*0.15);
  gctx.quadraticCurveTo(gx, headY-headH*0.35, gx+headW*0.9, headY-headH*0.15);
  gctx.quadraticCurveTo(gx, headY-headH*0.05, gx-headW*0.9, headY-headH*0.15);
  gctx.fill();

  // Eyes
  const eyeY = headY - headH*0.05;
  const eyeSpacing = 32*gScale;
  const glowColor = golemMood === 'angry' ? [255,60,40] :
                    golemMood === 'laughing' ? [100,255,80] :
                    golemMood === 'amused' ? [200,220,80] :
                    golemMood === 'groan' ? [200,120,40] :
                    [200,168,64];
  const eGlow = 0.4 + eyeGlow * 0.6;

  for(const side of [-1, 1]){
    const ex = gx + side*eyeSpacing;
    // Eye socket
    gctx.fillStyle = '#1a1610';
    gctx.beginPath();
    gctx.ellipse(ex, eyeY, 14*gScale, 10*gScale, 0, 0, Math.PI*2);
    gctx.fill();
    // Eye glow
    const eGrad = gctx.createRadialGradient(ex, eyeY, 0, ex, eyeY, 12*gScale);
    eGrad.addColorStop(0, `rgba(${glowColor[0]},${glowColor[1]},${glowColor[2]},${eGlow})`);
    eGrad.addColorStop(1, 'transparent');
    gctx.fillStyle = eGrad;
    gctx.beginPath();
    gctx.ellipse(ex, eyeY, 14*gScale, 10*gScale, 0, 0, Math.PI*2);
    gctx.fill();
    // Pupil
    gctx.fillStyle = `rgba(${glowColor[0]},${glowColor[1]},${glowColor[2]},${eGlow*1.5})`;
    gctx.beginPath();
    gctx.arc(ex, eyeY, 4*gScale, 0, Math.PI*2);
    gctx.fill();
  }

  // Eyebrows based on mood
  gctx.strokeStyle = '#2e2820';
  gctx.lineWidth = 4*gScale;
  const browAnger = golemMood === 'angry' ? 0.3 : golemMood === 'groan' ? 0.15 : 0;
  for(const side of [-1, 1]){
    const bx = gx + side*eyeSpacing;
    gctx.beginPath();
    gctx.moveTo(bx - side*18*gScale, eyeY - 16*gScale + browAnger*20*gScale*side);
    gctx.lineTo(bx + side*12*gScale, eyeY - 18*gScale - browAnger*10*gScale*side);
    gctx.stroke();
  }

  // Mouth
  const mouthY = headY + headH*0.25;
  const mOpen = mouthOpen * 12 * gScale;
  gctx.fillStyle = '#1a1610';
  gctx.beginPath();
  if(golemMood === 'laughing' || golemMood === 'amused'){
    // Smile
    gctx.moveTo(gx-25*gScale, mouthY);
    gctx.quadraticCurveTo(gx, mouthY + 15*gScale + mOpen, gx+25*gScale, mouthY);
    gctx.quadraticCurveTo(gx, mouthY + 5*gScale, gx-25*gScale, mouthY);
  } else if(golemMood === 'groan'){
    // Wavy frown
    gctx.moveTo(gx-20*gScale, mouthY+5*gScale);
    gctx.bezierCurveTo(gx-10*gScale, mouthY-5*gScale, gx+10*gScale, mouthY+10*gScale, gx+20*gScale, mouthY);
    gctx.lineTo(gx+20*gScale, mouthY+3*gScale+mOpen);
    gctx.bezierCurveTo(gx+10*gScale, mouthY+13*gScale+mOpen, gx-10*gScale, mouthY-2*gScale+mOpen, gx-20*gScale, mouthY+8*gScale+mOpen);
  } else if(golemMood === 'angry'){
    // Grimace
    gctx.rect(gx-22*gScale, mouthY, 44*gScale, 6*gScale+mOpen);
  } else {
    // Neutral line
    gctx.rect(gx-18*gScale, mouthY, 36*gScale, 3*gScale+mOpen);
  }
  gctx.fill();

  // Stone teeth if mouth open
  if(mOpen > 4*gScale){
    gctx.fillStyle = '#4a4438';
    for(let i = -2; i <= 2; i++){
      gctx.fillRect(gx + i*9*gScale - 3*gScale, mouthY+1, 5*gScale, Math.min(mOpen*0.4, 6*gScale));
    }
  }

  // Head cracks
  gctx.strokeStyle = '#2a2418';
  gctx.lineWidth = 1*gScale;
  gctx.beginPath(); gctx.moveTo(gx+20*gScale, headY-headH*0.8); gctx.lineTo(gx+35*gScale, headY-headH*0.3); gctx.stroke();
  gctx.beginPath(); gctx.moveTo(gx-50*gScale, headY); gctx.lineTo(gx-30*gScale, headY+headH*0.3); gctx.stroke();

  gctx.restore();

  // Ambient dust particles
  gctx.fillStyle = 'rgba(200,180,140,0.06)';
  for(let i = 0; i < 8; i++){
    const dx = (Math.sin(t*0.3+i*3)*0.5+0.5)*w;
    const dy = (Math.sin(t*0.2+i*2)*0.5+0.5)*h*0.7;
    gctx.beginPath();
    gctx.arc(dx, dy, 1.5+Math.sin(t+i)*0.5, 0, Math.PI*2);
    gctx.fill();
  }
}

// Animate mood transitions
function updateGolemAnim(dt){
  const targetEye = golemMood === 'neutral' ? 0.2 : golemMood === 'thinking' ? 0.5 :
    golemMood === 'laughing' ? 1 : golemMood === 'amused' ? 0.7 :
    golemMood === 'groan' ? 0.6 : golemMood === 'angry' ? 0.9 : 0.3;
  eyeGlow += (targetEye - eyeGlow) * 0.08;

  const targetMouth = (golemMood === 'laughing' || golemMood === 'angry') ? 1 :
    golemMood === 'groan' ? 0.5 : golemMood === 'amused' ? 0.3 : 0;
  mouthOpen += (targetMouth - mouthOpen) * 0.1;

  if(golemMoodTimer > 0){
    golemMoodTimer -= dt;
    if(golemMoodTimer <= 0){
      golemMood = 'neutral';
    }
  }
}

// === SPEECH SYNTHESIS ===
let synthVoices = [];
let voiceMuted = false;
function loadVoices(){ synthVoices = speechSynthesis.getVoices(); }
if(typeof speechSynthesis !== 'undefined'){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function findVoice(prefs){
  if(!synthVoices.length) return null;
  for(const p of prefs){
    const match = synthVoices.find(v => v.name.toLowerCase().includes(p.toLowerCase()));
    if(match) return match;
  }
  return synthVoices.find(v => v.lang.startsWith('en')) || synthVoices[0];
}

function golemSpeak(text, mood){
  if(voiceMuted || typeof speechSynthesis === 'undefined') return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.pitch = 0.4;
  utter.rate = 0.75;
  utter.volume = 0.9;
  const voice = findVoice(['daniel','david','google uk male','alex','male']);
  if(voice) utter.voice = voice;
  // Animate mouth while speaking
  utter.onstart = () => { golemMood = mood || 'neutral'; mouthOpen = 0.8; };
  utter.onend = () => { mouthOpen = 0; golemMoodTimer = 2; };
  utter.onboundary = () => { mouthOpen = 0.3 + Math.random()*0.7; };
  speechSynthesis.speak(utter);
}

document.getElementById('btn-mute').onclick = function(){
  voiceMuted = !voiceMuted;
  this.textContent = voiceMuted ? '🔇 Voice' : '🔊 Voice';
  if(voiceMuted) speechSynthesis.cancel();
};

// === GAME DATA ===
const TOPICS = [
  {topic:'rock', hint:'geology, stones, minerals, hard things'},
  {topic:'fire', hint:'flames, heat, burning, dragons'},
  {topic:'water', hint:'ocean, rain, rivers, swimming'},
  {topic:'magic', hint:'spells, wizards, wands, potions'},
  {topic:'food', hint:'cooking, eating, ingredients, taste'},
  {topic:'time', hint:'clocks, history, aging, waiting'},

  {topic:'books', hint:'reading, stories, pages, libraries'},

];

// Golem reactions by score tier
const REACTIONS = {
  masterpiece: [
    "BY THE ANCIENT RUNES! That was... magnificent. I haven't laughed in four thousand years.",
    "The stones themselves crack with laughter! You are a pun MASTER.",
    "I... I think a tear just formed. From solid granite. That's how good that was.",

  ],
  great: [

  ],

// === PUN SCORING ENGINE ===
function scorePun(text, topic){
  const t = text.toLowerCase().trim();
  if(t.length < 5) return {score:0, tier:'notapun', reason:'Too short'};

  let score = 0;
  let reasons = [];

  // Check if topic word or related words appear
  const topicLower = topic.toLowerCase();
  const topicPresent = t.includes(topicLower);
  if(topicPresent){ score += 15; reasons.push('On topic'); }

  // Check for common pun patterns
  // Homophone/wordplay indicators
  const punIndicators = [
    /\b\w+(?:ly|ing|ed|er|est|tion|ness|ment|ful|less)\b/,  // modified words
    /\b\w+-\w+\b/,   // hyphenated words (compound puns)
  ];
  for(const pat of punIndicators){
    if(pat.test(t)){ score += 5; }
  }

  // Question-answer format (classic pun setup)
  if(t.includes('?')){ score += 10; reasons.push('Classic setup'); }

  // "Because" — punchline pattern
  if(t.includes('because')){ score += 8; reasons.push('Has punchline'); }

  // Check for words that sound like topic (crude similarity)
  const words = t.split(/\s+/);
  for(const word of words){
    if(word.length >= 3 && word !== topicLower){
      // Simple phonetic similarity — shared starting/ending sounds with topic
      if(word.slice(0,3) === topicLower.slice(0,3) || word.slice(-3) === topicLower.slice(-3)){
        score += 20; reasons.push('Wordplay detected');
        break;
      }
      // Substring overlap
      if(topicLower.length >= 4 && word.includes(topicLower.slice(0, Math.ceil(topicLower.length*0.6)))){
        score += 15; reasons.push('Word embedding');
        break;
      }
    }
  }

  // Length sweet spot (not too short, not too long)
  if(t.length >= 20 && t.length <= 120){ score += 10; reasons.push('Good length'); }
  else if(t.length > 120){ score += 3; }

  // Humor structure — contains setup words
  const setupWords = ['why','what','how','when','where','did','do','does','knock','hear'];
  if(setupWords.some(w => t.startsWith(w))){ score += 12; reasons.push('Joke structure'); }

  // Exclamation or emphasis
  if(t.includes('!') || t.includes('...')){ score += 3; }

  // Penalty for just the topic word alone
  if(words.length <= 2 && topicPresent){ score = Math.max(5, score - 20); }

  // Check for effort (multiple words, proper sentence)
  if(words.length >= 5){ score += 5; }
  if(words.length >= 8){ score += 5; }

  // Bonus for rhyming hints (words ending similarly)
  for(let i = 0; i < words.length-1; i++){
    if(words[i].length >= 3 && words[i+1] && words[i+1].length >= 3){
      if(words[i].slice(-2) === words[i+1].slice(-2)){
        score += 8; reasons.push('Rhyme'); break;
      }
    }
  }

  // Random golem mood factor (±10)
  score += Math.floor(Math.random()*10) - 3;
  score = Math.max(0, Math.min(100, score));

  let tier;
  if(score >= 75) tier = 'masterpiece';
  else if(score >= 55) tier = 'great';
  else if(score >= 35) tier = 'okay';
  else if(score >= 20) tier = 'bad';
  else if(score >= 5) tier = 'terrible';
  else tier = 'notapun';

  return {score, tier, reason: reasons.join(', ') || 'Hmm...'};
}

// === GAME STATE ===
let score = 0;
let streak = 0;
let round = 1;
let currentTopic = null;
let judging = false;

function pickTopic(){
  const prev = currentTopic;
  do { currentTopic = TOPICS[Math.floor(Math.random()*TOPICS.length)]; }
  while(currentTopic === prev && TOPICS.length > 1);
  document.getElementById('prompt-area').innerHTML =
    `The Golem demands a pun about: <span class="topic">${currentTopic.topic.toUpperCase()}</span>`;
}

function submitPun(){
  const input = document.getElementById('pun-input');
  const text = input.value.trim();
  if(!text || judging) return;
  judging = true;
  input.value = '';
  document.getElementById('submit-btn').disabled = true;

  // Golem thinking
  golemMood = 'thinking';
  showBubble('Hmm... let me consider this...');
  golemSpeak('Hmm. Let me consider this.', 'thinking');

  setTimeout(() => {
    const result = scorePun(text, currentTopic.topic);

    // Mood
    const moodMap = {masterpiece:'laughing', great:'amused', okay:'neutral', bad:'groan', terrible:'angry', notapun:'angry'};
    golemMood = moodMap[result.tier];
    golemMoodTimer = 4;
    if(result.tier === 'masterpiece' || result.tier === 'angry') shakeAmt = 8;

    // Score
    const tierPoints = {masterpiece:50, great:30, okay:15, bad:5, terrible:0, notapun:0};
    const pts = tierPoints[result.tier];
    const streakBonus = result.tier === 'masterpiece' || result.tier === 'great' ? streak * 5 : 0;
    const totalPts = pts + streakBonus;
    score += totalPts;

    if(result.tier === 'masterpiece' || result.tier === 'great') streak++;
    else streak = 0;

    round++;

    // Reaction
    const reactions = REACTIONS[result.tier];
    const reaction = reactions[Math.floor(Math.random()*reactions.length)];
    showBubble(reaction);
    golemSpeak(reaction, golemMood);

    // Emoji for tier
    const emojis = {masterpiece:'🏆', great:'😄', okay:'😐', bad:'😒', terrible:'💀', notapun:'❓'};

    // Add to history
    addHistory(emojis[result.tier], text, reaction, totalPts > 0 ? '+'+totalPts : '0');

    updateStats();

    setTimeout(() => {
      judging = false;
      document.getElementById('submit-btn').disabled = false;
      pickTopic();
    }, 3000);
  }, 1500);
}

function showBubble(text){
  const el = document.getElementById('speech-bubble');
  el.textContent = text;
  el.style.display = 'block';
}

function addHistory(emoji, pun, reaction, pts){
  const el = document.getElementById('history');
  const div = document.createElement('div');
  div.className = 'history-entry';
  div.innerHTML = `<span class="h-score">${emoji}</span>
    <div class="h-body"><div class="h-pun">"${pun}"</div><div class="h-reaction">${reaction}</div></div>
    <span class="h-pts">${pts}</span>`;
  el.prepend(div);
  if(el.children.length > 20) el.lastChild.remove();
}

function updateStats(){
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
  document.getElementById('round').textContent = round;
}

// Hint
document.getElementById('btn-hint').onclick = () => {
  if(!currentTopic) return;
  const hint = `💡 Think about: ${currentTopic.hint}`;
  showBubble(hint);
  golemSpeak(`Here is a hint. Think about ${currentTopic.hint}.`, 'neutral');
};

// Skip
document.getElementById('btn-skip').onclick = () => {
  if(judging) return;
  streak = 0;
  pickTopic();
  showBubble('Very well. A new topic. Do not disappoint me again.');
  golemSpeak('Very well. A new topic. Do not disappoint me again.', 'groan');
  updateStats();
};

// Submit
document.getElementById('submit-btn').onclick = submitPun;
document.getElementById('pun-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') submitPun();
});

// === MAIN LOOP ===
let lastTime = 0;
function frame(timestamp){
  const dt = Math.min(0.05, (timestamp - lastTime)/1000);
  lastTime = timestamp;
  const t = timestamp * 0.001;
  updateGolemAnim(dt);
  drawGolem(t);
  requestAnimationFrame(frame);
}

// Init
pickTopic();
showBubble('I am the Golem. Carved from ancient stone. Powered by puns. AMUSE ME.');
setTimeout(() => {
  golemSpeak('I am the Golem. Carved from ancient stone. Powered by puns. Amuse me, mortal.', 'neutral');
}, 500);
requestAnimationFrame(frame);
</script>
