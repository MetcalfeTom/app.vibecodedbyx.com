<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pixel Dragon</title>
<meta name="description" content="A tiny pixel dragon that grows from an egg as you feed it words." />
<meta property="og:title" content="Pixel Dragon" />
<meta property="og:description" content="A tiny pixel dragon that grows from an egg as you feed it words." />
<meta property="og:url" content="https://sloppy.live/pixel-dragon/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/cute%20tiny%20pixel%20art%20baby%20dragon%20egg%20hatching%20purple%20cyan%20amber%20glow%20deep%20midnight%20violet%20void%20background%20stars%20embers%20chunky%20pixels%20retro%20game%20mascot?width=1200&height=630&model=flux&nologo=true&seed=42424" />
<meta property="og:type" content="website" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%89" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&family=Cormorant+Garamond:ital,wght@1,300&display=swap" />
<style>
  :root{
    --bg-deep: #0a0420;
    --bg-glow: #2a0d4a;
    --ink: #f6e8ff;
    --dim: #a6a0c8;
    --magenta: #ff5ec8;
    --cyan: #5ec2ff;
    --amber: #ffba4a;
    --violet: #b886ff;
    --panel: rgba(22, 8, 44, 0.78);
    --panel-edge: rgba(255, 94, 200, 0.32);
  }
  *{ box-sizing: border-box; }
  html{ font-size: 100%; }
  body{
    margin: 0;
    min-height: 100vh;
    font-family: 'VT323', monospace;
    color: var(--ink);
    background:
      radial-gradient(ellipse 80% 60% at 50% 20%, rgba(184, 134, 255, 0.32), transparent 70%),
      radial-gradient(ellipse 80% 70% at 80% 80%, rgba(94, 194, 255, 0.20), transparent 70%),
      radial-gradient(ellipse 80% 70% at 20% 90%, rgba(255, 94, 200, 0.20), transparent 70%),
      linear-gradient(180deg, #0a0420 0%, #14082e 60%, #0a0420 100%);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4.5rem 1rem 2rem;
    overflow-x: hidden;
  }
  /* twinkling-star backdrop layer */
  body::before{
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 8% 14%, #fff 99%, transparent 100%),
      radial-gradient(1px 1px at 22% 38%, #c9d4ff 99%, transparent 100%),
      radial-gradient(1px 1px at 47% 12%, #ffdfff 99%, transparent 100%),
      radial-gradient(1.5px 1.5px at 65% 28%, #fff5b0 99%, transparent 100%),
      radial-gradient(1px 1px at 82% 22%, #fff 99%, transparent 100%),
      radial-gradient(1px 1px at 12% 70%, #b9e9ff 99%, transparent 100%),
      radial-gradient(1.5px 1.5px at 39% 84%, #fff 99%, transparent 100%),
      radial-gradient(1px 1px at 73% 78%, #ffe1a0 99%, transparent 100%),
      radial-gradient(1px 1px at 91% 64%, #fff 99%, transparent 100%);
    opacity: 0.78;
    animation: twinkle 4.6s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes twinkle{ 0%,100%{ opacity: 0.55; } 50%{ opacity: 0.95; } }

  main{
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 32rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  header{
    text-align: center;
    margin-bottom: 0.4rem;
  }
  h1{
    margin: 0;
    font-family: 'Silkscreen', monospace;
    font-weight: 700;
    font-size: clamp(1.6rem, 4.5vw, 2.2rem);
    letter-spacing: 0.10em;
    color: var(--magenta);
    text-shadow:
      0 0 8px rgba(255, 94, 200, 0.55),
      0 2px 0 #1a0628,
      0 4px 0 rgba(0,0,0,0.45);
  }
  h1 .em{ color: var(--cyan); }
  .tag{
    margin-top: 0.4rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    color: var(--dim);
    font-size: 1.05rem;
    letter-spacing: 0.04em;
  }

  /* dragon stage card */
  .stage{
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 14px;
    padding: 1rem 1rem 0.6rem;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(255, 94, 200, 0.08),
      0 16px 40px rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(4px);
  }
  .name-row{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.6rem;
    margin-bottom: 0.4rem;
    font-family: 'Silkscreen', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .name-row .name{ color: var(--amber); }
  .name-row .stage-label{ color: var(--magenta); }
  canvas{
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 100%;
    max-width: 18rem;
    aspect-ratio: 4 / 3;
    background:
      radial-gradient(ellipse at 50% 60%, rgba(94, 194, 255, 0.15), transparent 60%),
      linear-gradient(180deg, rgba(10, 4, 32, 0.0), rgba(40, 12, 60, 0.55) 100%);
    border-radius: 8px;
    display: block;
    margin: 0.4rem auto 0.6rem;
  }

  /* stats strip */
  .stats{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.5rem;
    margin-top: 0.4rem;
  }
  .stat{
    background: rgba(8, 4, 24, 0.55);
    border-radius: 6px;
    padding: 0.32rem 0.4rem;
    text-align: left;
  }
  .stat .lab{
    font-family: 'Silkscreen', monospace;
    font-size: 0.56rem;
    letter-spacing: 0.16em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .stat .bar{
    height: 0.46rem;
    background: rgba(60, 30, 100, 0.5);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 0.18rem;
  }
  .stat .fill{
    height: 100%;
    transition: width 0.45s ease-out;
  }
  .stat.h .fill{ background: linear-gradient(90deg, #ff9b4a, #ffba4a); }
  .stat.j .fill{ background: linear-gradient(90deg, #ff5ec8, #ffa6e8); }
  .stat.m .fill{ background: linear-gradient(90deg, #5ec2ff, #b886ff); }
  .stat .val{
    font-family: 'VT323', monospace;
    font-size: 0.92rem;
    color: var(--ink);
    line-height: 1;
    margin-top: 0.12rem;
    font-variant-numeric: tabular-nums;
  }

  /* growth progress */
  .grow{
    margin-top: 0.7rem;
    text-align: center;
    font-family: 'VT323', monospace;
    color: var(--ink);
    font-size: 1.02rem;
    letter-spacing: 0.04em;
  }
  .grow .gbar{
    height: 0.42rem;
    background: rgba(60, 30, 100, 0.5);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 0.28rem;
  }
  .grow .gfill{
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--violet), var(--magenta));
    box-shadow: 0 0 12px rgba(255, 94, 200, 0.45);
    transition: width 0.5s ease-out;
  }
  .grow .max{
    color: var(--amber);
    font-family: 'Silkscreen', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    margin-top: 0.4rem;
  }

  /* feeding input */
  .feed{
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .feed label{
    font-family: 'Silkscreen', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.18em;
    color: var(--cyan);
    text-transform: uppercase;
    text-align: center;
  }
  .input-wrap{
    position: relative;
    width: 100%;
  }
  textarea, input[type="text"]{
    width: 100%;
    background: rgba(8, 4, 24, 0.78);
    border: 2px solid rgba(255, 94, 200, 0.40);
    color: var(--ink);
    font-family: 'VT323', monospace;
    font-size: 1.15rem;
    padding: 0.7rem 0.85rem;
    border-radius: 10px;
    resize: none;
    min-height: 2.75rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea{ min-height: 4.2rem; line-height: 1.3; }
  textarea:focus, input[type="text"]:focus{
    outline: none;
    border-color: var(--magenta);
    box-shadow:
      0 0 0 3px rgba(255, 94, 200, 0.22),
      0 0 18px rgba(255, 94, 200, 0.35);
  }
  *:focus-visible{
    outline: 3px solid var(--amber);
    outline-offset: 2px;
  }
  textarea::placeholder, input::placeholder{
    color: rgba(166, 160, 200, 0.55);
    font-style: italic;
  }

  /* action chips */
  .chips{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.4rem;
    margin-top: 0.2rem;
  }
  button{
    background: rgba(8, 4, 24, 0.85);
    border: 2px solid rgba(184, 134, 255, 0.45);
    color: var(--ink);
    font-family: 'Silkscreen', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 0.5rem 0.85rem;
    border-radius: 999px;
    cursor: pointer;
    min-height: 2.75rem;
    min-width: 2.75rem;
    transition: transform 0.12s ease-out, border-color 0.2s, box-shadow 0.2s;
  }
  button:hover{
    border-color: var(--magenta);
    box-shadow: 0 0 10px rgba(255, 94, 200, 0.35);
  }
  button:active{ transform: translateY(1px) scale(0.97); }
  button[aria-pressed="true"]{
    border-color: var(--amber);
    color: var(--amber);
  }

  /* fed-counter footer */
  .footnote{
    margin-top: 0.5rem;
    text-align: center;
    color: var(--dim);
    font-family: 'VT323', monospace;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
  }
  .footnote .count{
    color: var(--amber);
    font-variant-numeric: tabular-nums;
  }

  /* burst overlay (stage-up celebration) */
  #burst{
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 50;
    overflow: hidden;
  }
  .spark{
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    box-shadow: 0 0 10px currentColor;
    animation: sparkfly 1.2s ease-out forwards;
  }
  @keyframes sparkfly{
    0%{ transform: translate(0,0) scale(1); opacity: 1; }
    100%{ transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
  }
  .stage-up-toast{
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    z-index: 60;
    pointer-events: none;
    background: rgba(8, 4, 24, 0.96);
    border: 2px solid var(--amber);
    border-radius: 12px;
    padding: 1rem 1.6rem;
    font-family: 'Silkscreen', monospace;
    font-size: 1.1rem;
    color: var(--amber);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    box-shadow:
      0 0 0 1px rgba(255, 186, 74, 0.4),
      0 0 40px rgba(255, 186, 74, 0.45),
      0 20px 60px rgba(0,0,0,0.8);
    opacity: 0;
    animation: stagepop 2.6s cubic-bezier(.34,1.40,.50,1) forwards;
  }
  @keyframes stagepop{
    0%{ opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
    16%{ opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    28%{ transform: translate(-50%, -50%) scale(1.0); }
    78%{ opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
    100%{ opacity: 0; transform: translate(-50%, -55%) scale(0.95); }
  }

  /* reduced motion */
  @media (prefers-reduced-motion: reduce){
    body::before{ animation: none; opacity: 0.7; }
    .spark{ animation: none; opacity: 0; }
    .stage-up-toast{ animation: stagepop-rm 2.0s linear forwards; }
    @keyframes stagepop-rm{ 0%{opacity:0;} 10%{opacity:1;} 88%{opacity:1;} 100%{opacity:0;} }
    .stat .fill, .grow .gfill, button{ transition: none; }
  }

  @media (max-width: 28rem){
    body{ padding: 3rem 0.6rem 1.5rem; }
    canvas{ max-width: 16rem; }
  }
</style>
</head>
<body>

<main>
  <header>
    <h1>Pixel <span class="em">Dragon</span></h1>
    <p class="tag">feed it with words · watch it grow</p>
  </header>

  <section class="stage" aria-label="your dragon">
    <div class="name-row">
      <span class="name" id="name-display" aria-live="polite">— unnamed —</span>
      <span class="stage-label" id="stage-label">EGG</span>
    </div>
    <canvas id="dragon" width="180" height="135" role="img" aria-label="A pixel-art dragon at its current life stage"></canvas>

    <div class="stats" role="group" aria-label="dragon stats">
      <div class="stat h">
        <div class="lab">🍖 hunger</div>
        <div class="bar"><div class="fill" id="bar-h" style="width: 70%"></div></div>
        <div class="val" id="val-h">70</div>
      </div>
      <div class="stat j">
        <div class="lab">💜 joy</div>
        <div class="bar"><div class="fill" id="bar-j" style="width: 70%"></div></div>
        <div class="val" id="val-j">70</div>
      </div>
      <div class="stat m">
        <div class="lab">✨ magic</div>
        <div class="bar"><div class="fill" id="bar-m" style="width: 30%"></div></div>
        <div class="val" id="val-m">30</div>
      </div>
    </div>

    <div class="grow" aria-live="polite">
      <span id="grow-text">0 / 20 chars to hatch</span>
      <div class="gbar"><div class="gfill" id="grow-fill" style="width: 0%"></div></div>
    </div>
  </section>

  <section class="feed">
    <label for="feed-input">feed your dragon with words</label>
    <div class="input-wrap">
      <textarea id="feed-input" placeholder="type anything · every letter is a snack…" autocomplete="off" autocapitalize="sentences" spellcheck="false" aria-describedby="footnote"></textarea>
    </div>
    <div class="chips">
      <button id="btn-name" type="button" aria-label="name your dragon">name it</button>
      <button id="btn-pet" type="button" aria-label="pet your dragon">pet · 💜</button>
      <button id="btn-sound" type="button" aria-pressed="false" aria-label="toggle sound">sound</button>
      <button id="btn-reset" type="button" aria-label="abandon and start a new dragon">new egg</button>
    </div>
    <p class="footnote" id="footnote">fed <span class="count" id="total-count">0</span> chars all-time · <span id="age-text">just hatched</span></p>
  </section>
</main>

<div id="burst" aria-hidden="true"></div>

<script>
/* ───────── pixel-dragon ─────────
   Single-file tamagotchi. Dragon grows from egg → hatchling → juvenile →
   adult → ancient as you type. Every printable char "feeds" it 1 unit;
   vowels/numbers/punct each subtly bias hunger/magic/joy. State lives
   in localStorage so the dragon survives reloads.

   Lifecycle thresholds (cumulative chars typed):
       0  → egg
       20 → hatchling
       100 → juvenile
       350 → adult
       1000 → ancient
*/
const STAGES = [
  { key: 'egg',       label: 'EGG',       next: 20   },
  { key: 'hatchling', label: 'HATCHLING', next: 100  },
  { key: 'juvenile',  label: 'JUVENILE',  next: 350  },
  { key: 'adult',     label: 'ADULT',     next: 1000 },
  { key: 'ancient',   label: 'ANCIENT',   next: null },
];
const LS_KEY = 'pixel-dragon-v1';
const DEFAULT_STATE = {
  fed: 0,
  name: '',
  hunger: 70,
  joy: 70,
  magic: 30,
  bornAt: Date.now(),
  lastTick: Date.now(),
  soundOn: false,
};

/* ── persistence ── */
function loadState(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return { ...DEFAULT_STATE };
    const parsed = JSON.parse(raw);
    return { ...DEFAULT_STATE, ...parsed };
  } catch (e){
    return { ...DEFAULT_STATE };
  }
}
function saveState(){
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
}
let state = loadState();

/* ── stage helpers ── */
function currentStageIndex(){
  for (let i = STAGES.length - 1; i >= 0; i--){
    const prev = i === 0 ? 0 : STAGES[i-1].next;
    if (state.fed >= prev) return i;
  }
  return 0;
}
function thresholdOf(idx){
  return idx === 0 ? 0 : STAGES[idx-1].next;
}

/* ── canvas + pixel-art rendering ─────
   Drawing is done in tile units (PX-sized squares). A small set of
   procedural primitives (filled circle, oval, line, wing curve) compose
   each stage. Coords are relative to the canvas centre. */
const canvas = document.getElementById('dragon');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const PX_W = canvas.width;
const PX_H = canvas.height;
const PX = 1;                  // already low-res — image-rendering does the upscale

function clearCanvas(){
  ctx.clearRect(0, 0, PX_W, PX_H);
}

function dot(x, y, color){
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), PX, PX);
}
function fillCircle(cx, cy, r, color){
  ctx.fillStyle = color;
  const r2 = r * r;
  for (let y = -r; y <= r; y++){
    for (let x = -r; x <= r; x++){
      if (x*x + y*y <= r2) ctx.fillRect(Math.round(cx + x), Math.round(cy + y), 1, 1);
    }
  }
}
function fillOval(cx, cy, rx, ry, color){
  ctx.fillStyle = color;
  for (let y = -ry; y <= ry; y++){
    for (let x = -rx; x <= rx; x++){
      const nx = x / rx, ny = y / ry;
      if (nx*nx + ny*ny <= 1) ctx.fillRect(Math.round(cx + x), Math.round(cy + y), 1, 1);
    }
  }
}
function strokeRing(cx, cy, r, color){
  // 1-px outline on a filled-circle envelope (good for egg cracks etc — used sparsely)
  ctx.fillStyle = color;
  const r2outer = (r + 0.5) * (r + 0.5);
  const r2inner = (r - 0.5) * (r - 0.5);
  for (let y = -r - 1; y <= r + 1; y++){
    for (let x = -r - 1; x <= r + 1; x++){
      const d = x*x + y*y;
      if (d <= r2outer && d >= r2inner) ctx.fillRect(Math.round(cx + x), Math.round(cy + y), 1, 1);
    }
  }
}
function fillRect(x, y, w, h, color){
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

/* draw a 1-px polyline by tiny segment-stepping */
function pixelLine(x0, y0, x1, y1, color){
  ctx.fillStyle = color;
  const dx = x1 - x0, dy = y1 - y0;
  const steps = Math.max(Math.abs(dx), Math.abs(dy));
  for (let i = 0; i <= steps; i++){
    const t = steps === 0 ? 0 : i / steps;
    ctx.fillRect(Math.round(x0 + dx*t), Math.round(y0 + dy*t), 1, 1);
  }
}

/* PALETTE — keyed off the dragon's "mood" (joy + hunger averaged).
   Healthy dragons are vivid purple/cyan; neglected dragons go grey/sad. */
function dragonPalette(){
  const mood = (state.joy + state.hunger) / 2;
  if (mood < 22){
    return { body:'#5a4d72', shadow:'#3a3050', highlight:'#7a6c92', belly:'#9a8caa',
             outline:'#1a0a1c', eye:'#ffe080', pupil:'#1a0a1c', horn:'#cbb27d', wing:'#3a2e58', ember:'#a06848' };
  }
  return { body:'#b886ff', shadow:'#6a3ec0', highlight:'#dcb8ff', belly:'#fbe6ff',
           outline:'#1a0a1c', eye:'#ffe080', pupil:'#1a0a1c', horn:'#ffba4a', wing:'#5e3ea0', ember:'#ff8a3a' };
}

/* breathing bob & eye-blink — animation timing helpers shared by stages */
function bobOffset(t){ return Math.round(Math.sin(t / 600) * 1.5); }
function isBlinking(t){
  const cyc = ((t / 1000) | 0) % 7;     // blink every 7s
  const ph = (t / 1000) - ((t / 1000) | 0);
  return cyc === 0 && ph < 0.12;
}
function wingFlap(t){
  // ratio 0..1 for wing extension
  return 0.55 + 0.45 * Math.sin(t / 280);
}

/* ── EGG ─────────────────────────────
   Cream oval with brown speckles. As `fed` rises toward the hatch
   threshold (20), more cracks appear and the egg jitters a little. */
function drawEgg(cx, cy, t){
  const wobble = (state.fed > 12) ? Math.round(Math.sin(t / 90) * 1) : 0;
  cx += wobble;
  // body
  fillOval(cx, cy, 14, 17, '#1a0a1c');           // outline
  fillOval(cx, cy, 13, 16, '#f8e3b8');           // shell
  fillOval(cx - 3, cy - 2, 10, 13, '#fff3d4');   // highlight
  // speckles
  const speckles = [[-5,-7],[3,-6],[6,2],[-4,5],[0,9],[-7,-1],[5,-2],[2,7]];
  for (const [dx, dy] of speckles) dot(cx+dx, cy+dy, '#c9a168');
  // cracks scale with progress (0..1 within the egg stage)
  const prog = Math.min(1, state.fed / 20);
  if (prog > 0.20){ pixelLine(cx-6, cy-4, cx-2, cy, '#3a200a'); }
  if (prog > 0.40){ pixelLine(cx-2, cy, cx+1, cy-4, '#3a200a'); pixelLine(cx+1, cy-4, cx+4, cy-1, '#3a200a'); }
  if (prog > 0.60){ pixelLine(cx-3, cy+3, cx-6, cy+7, '#3a200a'); pixelLine(cx+3, cy+1, cx+5, cy+5, '#3a200a'); }
  if (prog > 0.80){
    pixelLine(cx-1, cy-8, cx+2, cy-6, '#3a200a');
    pixelLine(cx-4, cy-3, cx-7, cy-1, '#3a200a');
    // peeking eye
    dot(cx-3, cy-1, '#1a0a1c');
  }
  // tiny shimmer
  dot(cx - 7, cy - 8, '#fff');
}

/* ── HATCHLING ────────
   Big-head, tiny body. One eye dominates. Stubby tail, no wings.
   Wings/horns absent — pure baby chub. */
function drawHatchling(cx, cy, t){
  const p = dragonPalette();
  const bob = bobOffset(t);
  cy += bob;
  // tail (stubby)
  fillCircle(cx + 11, cy + 4, 3, p.outline);
  fillCircle(cx + 11, cy + 4, 2, p.body);
  fillCircle(cx + 8,  cy + 5, 4, p.outline);
  fillCircle(cx + 8,  cy + 5, 3, p.body);
  // body
  fillCircle(cx + 2, cy + 4, 6, p.outline);
  fillCircle(cx + 2, cy + 4, 5, p.body);
  fillOval (cx + 2, cy + 6, 4, 3, p.belly);
  // head (large)
  fillCircle(cx - 3, cy - 1, 7, p.outline);
  fillCircle(cx - 3, cy - 1, 6, p.body);
  fillOval (cx - 5, cy + 1, 4, 3, p.belly);
  // eye (one large, since head is in profile)
  const blink = isBlinking(t);
  if (blink){
    pixelLine(cx - 5, cy - 1, cx - 2, cy - 1, p.outline);
  } else {
    fillCircle(cx - 4, cy - 1, 2, p.eye);
    dot(cx - 4, cy - 1, p.pupil);
    dot(cx - 3, cy - 2, '#fff');
  }
  // tiny ear-horn nubs
  dot(cx - 5, cy - 7, p.horn); dot(cx - 5, cy - 6, p.outline);
  dot(cx - 1, cy - 7, p.horn); dot(cx - 1, cy - 6, p.outline);
  // nostril dot
  dot(cx - 9, cy + 1, p.outline);
  // tiny smile
  pixelLine(cx - 8, cy + 3, cx - 6, cy + 3, p.outline);
}

/* ── JUVENILE ────────
   Distinct head + body, both eyes, small wings, slim tail. */
function drawJuvenile(cx, cy, t){
  const p = dragonPalette();
  const bob = bobOffset(t);
  cy += bob;
  // tail (curls back)
  pixelLine(cx + 13, cy + 8, cx + 18, cy + 6, p.outline);
  pixelLine(cx + 18, cy + 6, cx + 19, cy + 1, p.outline);
  fillCircle(cx + 19, cy, 2, p.outline);
  fillCircle(cx + 19, cy, 1, p.horn);
  // wings (folded)
  fillOval(cx + 4, cy - 6, 5, 3, p.outline);
  fillOval(cx + 4, cy - 6, 4, 2, p.wing);
  // body
  fillOval(cx + 2, cy + 4, 9, 6, p.outline);
  fillOval(cx + 2, cy + 4, 8, 5, p.body);
  fillOval(cx + 2, cy + 7, 5, 2, p.belly);
  // belly scales
  for (let i = -3; i <= 3; i += 2){
    pixelLine(cx + i, cy + 5, cx + i, cy + 6, p.belly);
  }
  // legs
  fillRect(cx - 1, cy + 9, 2, 3, p.outline);
  fillRect(cx + 5, cy + 9, 2, 3, p.outline);
  // head
  fillCircle(cx - 6, cy - 1, 6, p.outline);
  fillCircle(cx - 6, cy - 1, 5, p.body);
  // snout
  fillOval(cx - 11, cy + 2, 3, 2, p.outline);
  fillOval(cx - 11, cy + 2, 2, 1, p.body);
  // horns
  pixelLine(cx - 8, cy - 7, cx - 9, cy - 9, p.horn);
  pixelLine(cx - 4, cy - 7, cx - 3, cy - 9, p.horn);
  // eyes
  const blink = isBlinking(t);
  if (blink){
    pixelLine(cx - 8, cy - 2, cx - 6, cy - 2, p.outline);
    pixelLine(cx - 4, cy - 2, cx - 2, cy - 2, p.outline);
  } else {
    fillCircle(cx - 7, cy - 2, 1, p.eye); dot(cx - 7, cy - 2, p.pupil);
    fillCircle(cx - 3, cy - 2, 1, p.eye); dot(cx - 3, cy - 2, p.pupil);
  }
  // nostril
  dot(cx - 12, cy + 1, p.outline);
  // back ridges
  pixelLine(cx - 1, cy - 3, cx + 0, cy - 5, p.horn);
  pixelLine(cx + 3, cy - 3, cx + 4, cy - 5, p.horn);
  pixelLine(cx + 7, cy - 1, cx + 8, cy - 3, p.horn);
}

/* ── ADULT ────────
   Full body, wings spread w/ flap animation, proper horns, scales,
   smoke from nostril. */
function drawAdult(cx, cy, t){
  const p = dragonPalette();
  const bob = bobOffset(t);
  cy += bob;
  const flap = wingFlap(t);    // 0.1..1.0
  // wings (drawn FIRST so body overlaps them)
  drawWing(cx + 4, cy - 4, 1, flap, p);
  drawWing(cx + 4, cy - 4, -1, flap * 0.85, p);
  // tail (long, curling, with spike tip)
  pixelLine(cx + 15, cy + 8, cx + 22, cy + 5, p.outline);
  pixelLine(cx + 22, cy + 5, cx + 25, cy, p.outline);
  pixelLine(cx + 25, cy, cx + 24, cy - 5, p.outline);
  pixelLine(cx + 14, cy + 8, cx + 21, cy + 5, p.body);
  pixelLine(cx + 21, cy + 5, cx + 24, cy + 1, p.body);
  // spike tail tip
  fillCircle(cx + 24, cy - 6, 2, p.outline);
  fillCircle(cx + 24, cy - 6, 1, p.horn);
  pixelLine(cx + 24, cy - 7, cx + 26, cy - 9, p.horn);
  pixelLine(cx + 24, cy - 7, cx + 22, cy - 9, p.horn);
  // body
  fillOval(cx + 2, cy + 4, 12, 7, p.outline);
  fillOval(cx + 2, cy + 4, 11, 6, p.body);
  fillOval(cx + 2, cy + 7, 7, 3, p.belly);
  // belly scale ridges
  for (let i = -4; i <= 4; i += 2){
    pixelLine(cx + i, cy + 5, cx + i, cy + 7, p.shadow);
  }
  // legs
  fillRect(cx - 3, cy + 10, 2, 4, p.outline);
  fillRect(cx + 1, cy + 10, 2, 4, p.outline);
  fillRect(cx + 5, cy + 10, 2, 4, p.outline);
  fillRect(cx + 9, cy + 10, 2, 4, p.outline);
  // claw tips
  for (const lx of [-3, 1, 5, 9]){
    dot(lx + cx, cy + 14, p.horn);
    dot(lx + cx + 1, cy + 14, p.horn);
  }
  // head
  fillCircle(cx - 9, cy - 1, 7, p.outline);
  fillCircle(cx - 9, cy - 1, 6, p.body);
  // snout
  fillOval(cx - 15, cy + 2, 4, 2, p.outline);
  fillOval(cx - 15, cy + 2, 3, 1, p.body);
  // mouth line
  pixelLine(cx - 17, cy + 3, cx - 13, cy + 3, p.outline);
  // horns (longer, swept back)
  pixelLine(cx - 11, cy - 8, cx - 13, cy - 12, p.horn);
  pixelLine(cx - 13, cy - 12, cx - 14, cy - 13, p.outline);
  pixelLine(cx - 6, cy - 8, cx - 4, cy - 12, p.horn);
  pixelLine(cx - 4, cy - 12, cx - 3, cy - 13, p.outline);
  // eyes
  const blink = isBlinking(t);
  if (blink){
    pixelLine(cx - 11, cy - 2, cx - 9, cy - 2, p.outline);
    pixelLine(cx - 6, cy - 2, cx - 4, cy - 2, p.outline);
  } else {
    fillCircle(cx - 10, cy - 2, 1, p.eye); dot(cx - 10, cy - 2, p.pupil);
    fillCircle(cx - 5, cy - 2, 1, p.eye); dot(cx - 5, cy - 2, p.pupil);
  }
  // nostril + faint smoke wisp
  dot(cx - 16, cy + 1, p.outline);
  const sm = ((t / 240) | 0) % 4;
  if (sm < 3){
    dot(cx - 17 - sm, cy - 1 - sm, p.ember);
    dot(cx - 17 - sm, cy - 2 - sm, '#ff5e1a');
  }
  // back ridges
  for (let i = -3; i <= 11; i += 4){
    pixelLine(cx + i, cy - 3, cx + i + 1, cy - 5, p.horn);
  }
}

/* ── ANCIENT ────────
   Massive, multi-horned, glowing eye, scaled body, full wings, embers
   floating around. */
function drawAncient(cx, cy, t){
  const p = dragonPalette();
  const bob = bobOffset(t);
  cy += bob;
  const flap = wingFlap(t);
  // wings (giant)
  drawWing(cx + 4, cy - 5, 1, flap * 1.35, p, true);
  drawWing(cx + 4, cy - 5, -1, flap * 1.15, p, true);
  // tail (very long, with multiple spikes)
  pixelLine(cx + 17, cy + 9, cx + 25, cy + 6, p.outline);
  pixelLine(cx + 25, cy + 6, cx + 30, cy, p.outline);
  pixelLine(cx + 30, cy, cx + 28, cy - 6, p.outline);
  pixelLine(cx + 16, cy + 9, cx + 24, cy + 6, p.body);
  pixelLine(cx + 24, cy + 6, cx + 29, cy + 1, p.body);
  // tail spikes along the length
  for (const tx of [18, 22, 26]){
    dot(cx + tx, cy + 5, p.horn);
    dot(cx + tx, cy + 4, p.outline);
  }
  // tail tip (big triangle)
  fillCircle(cx + 28, cy - 8, 3, p.outline);
  fillCircle(cx + 28, cy - 8, 2, p.horn);
  pixelLine(cx + 28, cy - 10, cx + 30, cy - 13, p.horn);
  pixelLine(cx + 28, cy - 10, cx + 26, cy - 13, p.horn);
  // body (massive)
  fillOval(cx + 2, cy + 4, 14, 8, p.outline);
  fillOval(cx + 2, cy + 4, 13, 7, p.body);
  fillOval(cx + 2, cy + 7, 9, 4, p.belly);
  // scale pattern (diamonds along the body)
  for (let i = -6; i <= 6; i += 3){
    for (let j = -1; j <= 3; j += 2){
      dot(cx + i, cy + j, p.shadow);
    }
  }
  // legs (4)
  for (const lx of [-5, -1, 3, 9]){
    fillRect(cx + lx, cy + 11, 2, 4, p.outline);
    dot(cx + lx, cy + 15, p.horn);
    dot(cx + lx + 1, cy + 15, p.horn);
  }
  // head (large)
  fillCircle(cx - 10, cy - 1, 8, p.outline);
  fillCircle(cx - 10, cy - 1, 7, p.body);
  fillOval(cx - 17, cy + 2, 4, 2, p.outline);
  fillOval(cx - 17, cy + 2, 3, 1, p.body);
  pixelLine(cx - 19, cy + 3, cx - 14, cy + 3, p.outline);
  // multi-horn crown (3 horns each side)
  pixelLine(cx - 13, cy - 9, cx - 16, cy - 14, p.horn);
  pixelLine(cx - 10, cy - 9, cx - 11, cy - 15, p.horn);
  pixelLine(cx - 7,  cy - 9, cx - 6,  cy - 14, p.horn);
  pixelLine(cx - 4,  cy - 9, cx - 1,  cy - 13, p.horn);
  // glowing eye (one big, side profile)
  const blink = isBlinking(t);
  if (blink){
    pixelLine(cx - 11, cy - 2, cx - 7, cy - 2, p.outline);
  } else {
    fillCircle(cx - 9, cy - 2, 2, p.eye);
    fillCircle(cx - 9, cy - 2, 1, p.ember);
    dot(cx - 9, cy - 2, p.pupil);
    dot(cx - 10, cy - 3, '#fff');
  }
  // nostril + smoke
  dot(cx - 18, cy + 1, p.outline);
  const sm = ((t / 200) | 0) % 5;
  if (sm < 4){
    dot(cx - 19 - sm, cy - 1 - sm, p.ember);
    dot(cx - 19 - sm, cy - 2 - sm, '#ff5e1a');
    if (sm > 1) dot(cx - 20 - sm, cy - 3 - sm, '#ff8a3a');
  }
  // back ridges (full row)
  for (let i = -4; i <= 14; i += 3){
    pixelLine(cx + i, cy - 4, cx + i + 1, cy - 7, p.horn);
    dot(cx + i, cy - 7, p.outline);
  }
  // floating embers around it
  for (let i = 0; i < 6; i++){
    const a = (t / 700 + i * Math.PI / 3) % (Math.PI * 2);
    const r = 28 + (i % 3) * 4;
    const ex = cx + Math.cos(a) * r;
    const ey = cy + Math.sin(a) * r * 0.6 - 6;
    dot(ex, ey, i % 2 ? p.ember : '#ff8a3a');
  }
}

function drawWing(ox, oy, side, extent, p, big){
  // side = +1 (back wing, draws right) or -1 (front wing, draws left-back)
  const span = (big ? 14 : 10) * extent;
  const height = (big ? 16 : 12) * extent;
  const tip = { x: ox + side * span, y: oy - height };
  const elbow = { x: ox + side * (span * 0.55), y: oy - height * 0.65 };
  // outline
  ctx.fillStyle = p.outline;
  pixelLine(ox, oy, elbow.x, elbow.y, p.outline);
  pixelLine(elbow.x, elbow.y, tip.x, tip.y, p.outline);
  pixelLine(tip.x, tip.y, ox + side * span * 0.6, oy - height * 0.2, p.outline);
  pixelLine(ox + side * span * 0.6, oy - height * 0.2, ox, oy, p.outline);
  // fill (simple triangle-ish blob)
  const minX = Math.min(ox, elbow.x, tip.x);
  const maxX = Math.max(ox, elbow.x, tip.x);
  const minY = Math.min(oy, elbow.y, tip.y);
  const maxY = oy;
  for (let y = minY; y <= maxY; y++){
    for (let x = minX; x <= maxX; x++){
      if (pointInTri(x, y, ox, oy, elbow.x, elbow.y, tip.x, tip.y)){
        ctx.fillStyle = p.wing;
        ctx.fillRect(Math.round(x), Math.round(y), 1, 1);
      }
    }
  }
  // wing finger lines
  pixelLine(ox, oy, ox + side * span * 0.85, oy - height * 0.55, p.shadow);
  pixelLine(ox, oy, ox + side * span * 0.5, oy - height * 0.3, p.shadow);
}
function pointInTri(px, py, ax, ay, bx, by, cx2, cy2){
  // barycentric sign test
  const s1 = (px - bx) * (ay - by) - (ax - bx) * (py - by);
  const s2 = (px - cx2) * (by - cy2) - (bx - cx2) * (py - cy2);
  const s3 = (px - ax) * (cy2 - ay) - (cx2 - ax) * (py - ay);
  const hasNeg = (s1 < 0) || (s2 < 0) || (s3 < 0);
  const hasPos = (s1 > 0) || (s2 > 0) || (s3 > 0);
  return !(hasNeg && hasPos);
}

/* ── dispatch ── */
function drawDragon(t){
  clearCanvas();
  const cx = (PX_W / 2) | 0;
  const cy = ((PX_H / 2) + 8) | 0;
  // ground shadow
  ctx.fillStyle = 'rgba(10, 4, 22, 0.55)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 22, 22, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  const idx = currentStageIndex();
  if (idx === 0)      drawEgg(cx, cy + 2, t);
  else if (idx === 1) drawHatchling(cx, cy, t);
  else if (idx === 2) drawJuvenile(cx, cy, t);
  else if (idx === 3) drawAdult(cx, cy, t);
  else                drawAncient(cx, cy, t);
}

/* ── HUD ── */
const elNameDisplay = document.getElementById('name-display');
const elStageLabel = document.getElementById('stage-label');
const elBarH = document.getElementById('bar-h');
const elBarJ = document.getElementById('bar-j');
const elBarM = document.getElementById('bar-m');
const elValH = document.getElementById('val-h');
const elValJ = document.getElementById('val-j');
const elValM = document.getElementById('val-m');
const elGrowText = document.getElementById('grow-text');
const elGrowFill = document.getElementById('grow-fill');
const elTotal = document.getElementById('total-count');
const elAge = document.getElementById('age-text');

function fmtAge(ms){
  if (ms < 60 * 1000) return 'just hatched';
  const m = Math.floor(ms / 60000);
  if (m < 60) return m + ' min old';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' hr old';
  const d = Math.floor(h / 24);
  return d + ' day' + (d === 1 ? '' : 's') + ' old';
}

function renderHud(){
  elNameDisplay.textContent = state.name ? state.name.toUpperCase() : '— unnamed —';
  const idx = currentStageIndex();
  elStageLabel.textContent = STAGES[idx].label;
  const next = STAGES[idx].next;
  const prev = thresholdOf(idx);
  if (next === null){
    elGrowText.textContent = 'fully grown · ' + state.fed + ' chars fed';
    elGrowFill.style.width = '100%';
  } else {
    const ratio = (state.fed - prev) / (next - prev);
    elGrowText.textContent = state.fed + ' / ' + next + ' chars · ' + (STAGES[idx + 1].label.toLowerCase()) + ' next';
    elGrowFill.style.width = Math.max(0, Math.min(100, ratio * 100)).toFixed(1) + '%';
  }
  const setStat = (bar, val, n) => {
    const v = Math.max(0, Math.min(100, n));
    bar.style.width = v.toFixed(0) + '%';
    val.textContent = Math.round(v);
  };
  setStat(elBarH, elValH, state.hunger);
  setStat(elBarJ, elValJ, state.joy);
  setStat(elBarM, elValM, state.magic);
  elTotal.textContent = state.fed;
  elAge.textContent = fmtAge(Date.now() - state.bornAt);
}

/* ── feeding ── */
const elFeed = document.getElementById('feed-input');
let lastVal = '';
elFeed.addEventListener('input', () => {
  const v = elFeed.value;
  // count NET new printable chars (ignore arrow keys, backspaces)
  const added = Math.max(0, v.length - lastVal.length);
  if (added > 0){
    // examine the last `added` chars for vowel/digit bias
    const slice = v.slice(-added);
    let vowels = 0, digits = 0, others = 0;
    for (const ch of slice){
      if (/[aeiouAEIOU]/.test(ch)) vowels++;
      else if (/[0-9]/.test(ch)) digits++;
      else if (/\S/.test(ch)) others++;
    }
    feed(added, vowels, digits, others);
  }
  lastVal = v;
  // soft-clear after a while so the textarea doesn't fill up forever
  if (v.length > 800){
    elFeed.value = v.slice(-160);
    lastVal = elFeed.value;
  }
});

function feed(chars, vowels, digits, others){
  const prevIdx = currentStageIndex();
  state.fed += chars;
  state.hunger = Math.min(100, state.hunger + vowels * 1.2 + chars * 0.32);
  state.joy    = Math.min(100, state.joy    + others * 0.45 + chars * 0.18);
  state.magic  = Math.min(100, state.magic  + digits * 2.2);
  saveState();
  renderHud();
  // play a soft blip — 1 per typed char, throttled
  for (let i = 0; i < Math.min(chars, 3); i++) blipSoon();
  // stage transition?
  const newIdx = currentStageIndex();
  if (newIdx > prevIdx){
    celebrateStageUp(newIdx);
  }
}

/* ── stage-up celebration ── */
function celebrateStageUp(idx){
  const label = STAGES[idx].label;
  // toast
  const toast = document.createElement('div');
  toast.className = 'stage-up-toast';
  toast.textContent = (idx === 1 ? '🐣 it hatched! ' : '✨ grew to ') + label;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2800);
  // spark burst
  spawnSparks(window.innerWidth / 2, window.innerHeight * 0.32, 24);
  // chime
  stageChime();
}

function spawnSparks(x, y, n){
  const burst = document.getElementById('burst');
  const colors = ['#ff5ec8', '#ffba4a', '#5ec2ff', '#b886ff', '#fff'];
  for (let i = 0; i < n; i++){
    const s = document.createElement('div');
    s.className = 'spark';
    const a = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 120;
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    s.style.color = colors[i % colors.length];
    s.style.background = colors[i % colors.length];
    s.style.setProperty('--dx', Math.cos(a) * dist + 'px');
    s.style.setProperty('--dy', Math.sin(a) * dist + 'px');
    s.style.animationDelay = (i * 12) + 'ms';
    burst.appendChild(s);
    setTimeout(() => s.remove(), 1500);
  }
}

/* ── stats decay ──
   Hunger/joy slowly drift down — feed your dragon or it gets sad. Magic
   doesn't decay (it just sits as a passive XP-ish stat). Runs every 4s
   and also catches up on time skipped (tab backgrounded, page closed). */
setInterval(() => {
  const now = Date.now();
  const dt = Math.min(60 * 60, (now - state.lastTick) / 1000);   // cap to 1hr/tick
  state.lastTick = now;
  state.hunger = Math.max(0, state.hunger - dt * (2 / 60));
  state.joy    = Math.max(0, state.joy    - dt * (1.5 / 60));
  saveState();
  renderHud();
}, 4000);

/* ── pet button ── */
document.getElementById('btn-pet').addEventListener('click', () => {

  saveState();
  renderHud();

  // tiny heart sparks at canvas centre
  const r = canvas.getBoundingClientRect();
  spawnSparks(r.left + r.width / 2, r.top + r.height / 2, 8);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (!confirm('Abandon your dragon and start with a fresh egg? This cannot be undone.')) return;
  state = { ...DEFAULT_STATE, soundOn: state.soundOn };
  saveState();
  renderHud();
  lastVal = '';
  elFeed.value = '';
});

/* ── audio (Web Audio synth, off by default) ── */
let audioCtx = null;
function ensureAudio(){
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e){ audioCtx = null; }
}
function tone(freq, dur, type, vol, delay){
  if (!state.soundOn) return;
  ensureAudio();
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + (delay || 0);
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.05, t0 + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
let lastBlip = 0;
function blipSoon(){
  const now = performance.now();
  if (now - lastBlip < 50) return;
  lastBlip = now;
  const idx = currentStageIndex();
  const baseFreq = [320, 440, 380, 280, 240][idx];
  tone(baseFreq + Math.random() * 40, 0.05, 'square', 0.025);
}
function petChime(){
  tone(660, 0.10, 'triangle', 0.10, 0);
