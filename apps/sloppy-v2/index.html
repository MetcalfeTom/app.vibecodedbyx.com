<html lang="en">
<head>

  <meta property="og:description" content="Prototype real-time chat. Type and watch the words appear on every other client, character by character, in real time.">

  <!-- Inline Supabase client (no session persistence, same pattern as A Hero's Story) -->
  <script type="module">
    import { createBrowserClient } from "https://cdn.jsdelivr.net/npm/@supabase/ssr@0.7.0/+esm";
    const SUPABASE_URL = 'https://yjyxteqzhhmtrgcaekgz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqeXh0ZXF6aGhtdHJnY2Fla2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTg3NDIsImV4cCI6MjA3MjkzNDc0Mn0.G8SRde7IN2QFW1EnASM8IS32IUYR2eenCCjdDdioiBU';
    const memStore = new Map();
    const memStorage = {
      getItem: (k) => memStore.has(k) ? memStore.get(k) : null,
      setItem: (k, v) => { memStore.set(k, String(v)); },
      removeItem: (k) => { memStore.delete(k); }
    };
    const supabase = createBrowserClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false, storage: memStorage, storageKey: 'sv2-mem' },
      cookieOptions: { name: 'sv2-no-cookie', path: '/', sameSite: 'lax' }
    });
    window._sv2_supabase = supabase;
    try { window.dispatchEvent(new Event('sv2-ready')); } catch {}
  </script>

  <style>
    :root {
      --bg:        #0d1117;
      --bg-2:      #161b22;
      --panel:     #1c232e;
      --ink:       #e6edf3;
      --ink-dim:   #9da7b3;
      --line:      rgba(230,237,243,0.10);
      --mint:      #6cf2c1;
      --mint-d:    #2fc89a;
      --amber:     #f6c870;
      --rose:      #f599a6;
      --me:        rgba(108,242,193,0.10);
      --them:      rgba(230,237,243,0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background:
        radial-gradient(ellipse at 0% 0%, rgba(108,242,193,0.06), transparent 55%),
        radial-gradient(ellipse at 100% 100%, rgba(246,200,112,0.04), transparent 55%),
        var(--bg);

    }
    main {
      display: flex;

      height: 100%;
      background: var(--bg-2);
      border: 1px solid var(--line);

    header.bar .title .sub {

    header.bar .status {

    @keyframes pulse-dot {

    /* ============ FEED ============ */
    .feed {

    .msg .head .when { opacity: 0.7; }
    .msg .body {

    /* ============ COMPOSER ============ */
    .composer {
      border-top: 1px solid var(--line);
      padding: 0.7rem 0.85rem 0.8rem;
      background: linear-gradient(0deg, rgba(28,35,46,0.95), rgba(22,27,34,0.95));
      display: flex; gap: 0.5rem; align-items: flex-end;
    }
    .composer .name-input {
      width: 7rem;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      padding: 0.55rem 0.6rem;
      border-radius: 8px;
      outline: none;
      flex-shrink: 0;
    }
    .composer .name-input:focus { border-color: var(--mint-d); }
    .composer textarea {
      flex: 1;
      min-height: 2.6rem;
      max-height: 9rem;
      resize: none;
      background: var(--panel);
      border: 1px solid var(--line);

    }
    .composer textarea:focus { border-color: var(--mint-d); box-shadow: 0 0 0 3px rgba(108,242,193,0.08); }
    .composer textarea::placeholder { color: var(--ink-dim); opacity: 0.7; }
    .composer button {

      background: linear-gradient(135deg, var(--mint), var(--mint-d));

    .composer button:hover  { filter: brightness(1.08); box-shadow: 0 0 24px rgba(108,242,193,0.6); transform: translateY(-1px); }
    .composer button:active { transform: translateY(1px); }
    .composer button:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }

    .hint {
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;

      padding: 0.3rem 0 0.5rem;
      opacity: 0.6;
    }
    .hint kbd {
      font-family: 'IBM Plex Mono', monospace;

    @media (prefers-reduced-motion: reduce) {

    }
  </style>

<body>
  <main>
    <header class="bar">
      <div class="logo" aria-hidden="true">s2</div>
      <div class="title">
        <h1>sloppy · v2</h1>
        <div class="sub">streaming chat prototype · public lobby</div>
      </div>
      <div class="status" id="status" aria-live="polite">
        <span class="dot connecting" id="status-dot"></span>
        <span id="status-text">connecting…</span>
      </div>
    </header>

    <section class="feed" id="feed" aria-label="Chat feed" role="log" aria-live="polite">
      <div class="empty" id="empty">
        the lobby is quiet.
        <span class="hint">type below — every character is broadcast in real time</span>
      </div>
    </section>

    <form class="composer" id="composer" autocomplete="off" aria-label="Compose a message">
      <input type="text" class="name-input" id="name-input" placeholder="name" maxlength="16" aria-label="Your display name">
      <textarea id="text-input" placeholder="say something… (enter to send)" maxlength="500" rows="1" aria-label="Message text"></textarea>
      <button type="submit" id="send-btn">send</button>
    </form>
    <p class="hint">
      <kbd>Enter</kbd> send · <kbd>Shift</kbd>+<kbd>Enter</kbd> newline
    </p>
  </main>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // CLIENT STATE
    // ============================================================
    const CHANNEL = 'sloppy-v2-lobby-v1';
    const NAME_KEY = 'sloppy_v2_name';
    const CLIENT_ID = (() => {
      try { return localStorage.getItem('sloppy_v2_cid') || ''; } catch { return ''; }
    })() || (() => {
      const id = 'c-' + Math.random().toString(36).slice(2, 10);
      try { localStorage.setItem('sloppy_v2_cid', id); } catch {}
      return id;
    })();
    let supabase = null;
    let channel = null;
    let connected = false;
    let myMessages = {};      // local id -> msg DOM node (for our own streams)
    let remoteMessages = {};  // sender_clientId + msg_id -> msg DOM node

    // ============================================================
    // DOM
    // ============================================================
    const feed     = document.getElementById('feed');
    const empty    = document.getElementById('empty');
    const form     = document.getElementById('composer');
    const nameIn   = document.getElementById('name-input');
    const textIn   = document.getElementById('text-input');
    const sendBtn  = document.getElementById('send-btn');
    const statDot  = document.getElementById('status-dot');
    const statText = document.getElementById('status-text');

    // Persist name across sessions
    try { nameIn.value = localStorage.getItem(NAME_KEY) || ''; } catch {}
    nameIn.addEventListener('change', () => {
      const v = (nameIn.value || '').trim().slice(0, 16);
      if (v) try { localStorage.setItem(NAME_KEY, v); } catch {}
    });

    let lastErr = '';
    function setStatus(state, txt, err) {
      statDot.classList.remove('online', 'connecting', 'err');
      statDot.classList.add(state);
      statText.textContent = txt;
      if (err) {
        lastErr = String(err.message || err);
        statText.parentElement.title = 'Error: ' + lastErr + ' (hover or check console)';
      } else if (state === 'online') {
        statText.parentElement.title = 'Connected to ' + CHANNEL;
        lastErr = '';
      }
    }

    // ============================================================
    // SCROLL / FEED HELPERS
    // ============================================================
    function clearEmpty() {
      if (empty && empty.parentNode === feed) empty.remove();
    }
    function appendMessage(opts) {
      clearEmpty();
      const wrap = document.createElement('div');
      wrap.className = 'msg' + (opts.mine ? ' me' : '');
      const when = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      wrap.innerHTML =
        '<div class="head"><span class="name"></span><span class="when">' + when + '</span></div>' +
        '<div class="body"></div>';
      wrap.querySelector('.name').textContent = opts.name;
      wrap.querySelector('.body').textContent = opts.text || '';
      if (opts.streaming) {
        const caret = document.createElement('span');
        caret.className = 'caret';
        wrap.querySelector('.body').appendChild(caret);
      }
      feed.appendChild(wrap);
      feed.scrollTop = feed.scrollHeight;
      return wrap;
    }
    function setMessageText(node, text, stillStreaming) {
      const body = node.querySelector('.body');
      body.textContent = text;
      if (stillStreaming) {
        const caret = document.createElement('span');
        caret.className = 'caret';
        body.appendChild(caret);
      }
      // Keep scrolled to bottom if user hasn't scrolled up
      const nearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 100;
      if (nearBottom) feed.scrollTop = feed.scrollHeight;
    }

    // ============================================================
    // REALTIME — Supabase broadcast on a public lobby channel.
    // Two event types:
    //   't' (typing)   payload: {cid, name, mid, text, done:false}
    //   'd' (delivered) payload: {cid, name, mid, text, done:true}
    // Streaming: while a user types, we send 't' deltas at ~20Hz so
    // peers see the text materialize character-by-character. On Enter,
    // we send a final 'd' to mark the message committed.
    // ============================================================
    // ============================================================
    // SAME-ORIGIN FALLBACK — if Supabase Realtime is unreachable
    // (CORS reject on the project's allowed-origin list, jsdelivr
    // blocked, websocket through corp proxy fails, etc.), we still
    // want two tabs / two windows on the same browser to talk so
    // the prototype is testable. BroadcastChannel is built into
    // every modern browser, requires zero network, and has the
    // same publish/subscribe shape we need.
    // ============================================================
    const localBus = (typeof BroadcastChannel !== 'undefined')
      ? new BroadcastChannel('sloppy-v2-local-fallback-v1')
      : null;
    if (localBus) {
      localBus.addEventListener('message', e => {
        const m = e && e.data;
        if (!m || !m.event || m.cid === CLIENT_ID) return;
        if (m.event === 't') onRemoteStream(m.payload, false);
        else if (m.event === 'd') onRemoteStream(m.payload, true);
      });
    }
    function emitOnBoth(event, payload) {
      // Realtime broadcast (peers on other devices)
      if (channel && connected) {
        try { channel.send({ type: 'broadcast', event, payload }).catch(() => {}); }
        catch (e) { console.warn('[sv2] channel.send threw', e); }
      }
      // Local BroadcastChannel (same browser, other tabs) — always fires
      if (localBus) {
        try { localBus.postMessage({ event, cid: CLIENT_ID, payload }); }
        catch (e) { console.warn('[sv2] localBus.postMessage threw', e); }
      }
    }

    let retryAttempt = 0;
    function bootRealtime() {
      supabase = window._sv2_supabase;
      if (!supabase || !supabase.channel) {
        retryAttempt++;
        const wait = Math.min(8000, 1000 * Math.pow(1.5, retryAttempt));
        console.warn('[sv2] no supabase client (jsdelivr blocked? module load failed?). retry in', wait, 'ms');
        setStatus('err', localBus ? 'offline · local tabs only' : 'offline · no client', new Error('Supabase client unavailable. Likely cause: CDN (@supabase/ssr) blocked by network, or the inline module script failed to load.'));
        setTimeout(bootRealtime, wait);
        return;
      }
      setStatus('connecting', 'connecting…');
      try {
        channel = supabase.channel(CHANNEL, {
          config: { broadcast: { self: false, ack: false } }
        });
      } catch (e) {
        console.error('[sv2] channel() threw:', e);
        setStatus('err', 'channel init failed', e);
        setTimeout(bootRealtime, 3000);
        return;
      }
      channel.on('broadcast', { event: 't' }, ({ payload }) => onRemoteStream(payload, false));
      channel.on('broadcast', { event: 'd' }, ({ payload }) => onRemoteStream(payload, true));
      // Race the subscribe callback against an 8s timeout so we don't
      // hang on a CORS preflight that never resolves
      let resolved = false;
      const timeout = setTimeout(() => {
        if (resolved) return;
        resolved = true;
        console.warn('[sv2] subscribe timed out after 8s — falling back to local-only');
        setStatus('err', localBus ? 'realtime timeout · local tabs only' : 'realtime timeout', new Error('Subscribe never resolved. Possible CORS / WebSocket reject from Supabase. Same-browser tabs still work via BroadcastChannel.'));
        retryAttempt++;
        const wait = Math.min(15000, 2000 * Math.pow(1.4, retryAttempt));
        setTimeout(() => { try { channel.unsubscribe(); } catch {}; bootRealtime(); }, wait);
      }, 8000);
      channel.subscribe((status, err) => {
        console.log('[sv2] sub status:', status, err || '');
        if (status === 'SUBSCRIBED') {
          if (resolved) return;
          resolved = true;
          clearTimeout(timeout);
          connected = true;
          retryAttempt = 0;
          setStatus('online', 'online · ' + CLIENT_ID.slice(2, 6));
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
          if (resolved) {
            // Lost connection AFTER we were online — try to reconnect
            connected = false;
            setStatus('err', localBus ? 'reconnecting · local tabs only' : 'reconnecting…', err);
            setTimeout(() => { try { channel.unsubscribe(); } catch {}; bootRealtime(); }, 2500);
            return;
          }
          resolved = true;
          clearTimeout(timeout);
          connected = false;
          console.error('[sv2] subscribe failed:', status, err);
          setStatus('err', localBus ? 'realtime ' + status.toLowerCase() + ' · local tabs only' : 'realtime ' + status.toLowerCase(), err);
          retryAttempt++;
          const wait = Math.min(20000, 2500 * Math.pow(1.4, retryAttempt));
          setTimeout(() => { try { channel.unsubscribe(); } catch {}; bootRealtime(); }, wait);
        }
      });
    }
    if (window._sv2_supabase) bootRealtime();
    else { window.addEventListener('sv2-ready', bootRealtime, { once: true }); setTimeout(bootRealtime, 1500); }

    function onRemoteStream(p, finalDelivery) {
      if (!p || !p.cid || p.cid === CLIENT_ID) return;
      const key = p.cid + ':' + p.mid;
      let node = remoteMessages[key];
      if (!node) {
        node = appendMessage({
          name: String(p.name || 'anon').slice(0, 16),
          text: String(p.text || ''),
          mine: false,
          streaming: !finalDelivery
        });
        remoteMessages[key] = node;
      } else {
        setMessageText(node, String(p.text || ''), !finalDelivery);
      }
      if (finalDelivery) {
        // Remove caret + drop tracking after a brief grace so the message settles
        setTimeout(() => {
          const caret = node.querySelector('.caret');
          if (caret) caret.remove();
        }, 80);
        setTimeout(() => { delete remoteMessages[key]; }, 4000);
      }
    }

    // ============================================================
    // LOCAL STREAMING — as the user types, throttle to ~20Hz and
    // broadcast deltas. On Enter, send a final 'd' to commit.
    // ============================================================
    let activeMid = null;
    let activeNode = null;
    let lastBroadcastAt = 0;
    let lastSentText = '';
    const STREAM_INTERVAL_MS = 50;   // 20 Hz

    function newMid() {
      return 'm-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    }
    function maybeStream() {
      if (!connected || !channel) return;
      const now = Date.now();
      const text = textIn.value;
      if (!text) {
        // If we emptied the input mid-stream, broadcast a final empty
        // 'd' so the peer's bubble clears. (Edge case: user backspaced
        // every character before sending.)
        if (activeMid) {
          emitOnBoth('d', { cid: CLIENT_ID, name: nameOrAnon(), mid: activeMid, text: '', done: true });
          if (activeNode) activeNode.remove();
          activeMid = null; activeNode = null; lastSentText = '';
        }
        return;
      }
      if (text === lastSentText) return;
      if (now - lastBroadcastAt < STREAM_INTERVAL_MS) return;
      lastBroadcastAt = now;
      if (!activeMid) {
        activeMid = newMid();
        activeNode = appendMessage({ name: nameOrAnon(), text, mine: true, streaming: true });
      } else {
        setMessageText(activeNode, text, true);
      }
      lastSentText = text;
      emitOnBoth('t', { cid: CLIENT_ID, name: nameOrAnon(), mid: activeMid, text });
    }
    function nameOrAnon() {
      const v = (nameIn.value || '').trim().slice(0, 16);
      return v || 'anon';
    }
    // Hook every keystroke (debounced via the interval check inside)
    textIn.addEventListener('input', maybeStream);

    // ============================================================
    // SEND / SUBMIT
    // ============================================================
    function sendCurrent() {
      const text = (textIn.value || '').trim();
      if (!text) return;
      // Even offline: still let the local-tab fallback fire so two
      // tabs on the same browser can chat without Supabase
      const mid = activeMid || newMid();
      const name = nameOrAnon();
      emitOnBoth('d', { cid: CLIENT_ID, name, mid, text, done: true });
      // Finalize local bubble
      if (activeNode) {
        const caret = activeNode.querySelector('.caret');
        if (caret) caret.remove();
        activeNode.querySelector('.body').textContent = text;
      } else {
        appendMessage({ name, text, mine: true, streaming: false });
      }
      activeMid = null; activeNode = null; lastSentText = '';
      textIn.value = '';
      autoResize();
    }
    form.addEventListener('submit', e => { e.preventDefault(); sendCurrent(); });
    textIn.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendCurrent(); }
    });
    // Auto-resize the textarea up to its max-height
    function autoResize() {
      textIn.style.height = 'auto';
      textIn.style.height = Math.min(textIn.scrollHeight, 144) + 'px';
    }
    textIn.addEventListener('input', autoResize);
  })();
  </script>
</body>
</html>
