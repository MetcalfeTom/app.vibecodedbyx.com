<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brutal Weather — Zero Color Forecast</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌧️">
<meta property="og:title" content="Brutal Weather">
<meta property="og:description" content="Weather stripped to the bone. No colors. No icons. Just data.">
<meta property="og:url" content="https://app.sloppy.live/brutal-weather/">
<meta property="og:image" content="https://emojicdn.elk.sh/🌧️?style=google">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#000;font-family:'IBM Plex Mono',monospace;min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:24px 20px}
h1{font-family:'Archivo Black',sans-serif;font-size:clamp(48px,12vw,96px);line-height:0.9;text-transform:uppercase;letter-spacing:-3px;border-bottom:6px solid #000;padding-bottom:12px;margin-bottom:20px}
.location-row{display:flex;align-items:baseline;gap:12px;margin-bottom:24px;flex-wrap:wrap}
#locationInput{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;border:3px solid #000;background:#fff;color:#000;padding:8px 12px;flex:1;min-width:200px;outline:none}
#locationInput:focus{background:#000;color:#fff}
#fetchBtn{font-family:'Archivo Black',sans-serif;font-size:14px;background:#000;color:#fff;border:none;padding:10px 20px;cursor:pointer;text-transform:uppercase;letter-spacing:2px}
#fetchBtn:hover{background:#fff;color:#000;outline:3px solid #000}
#fetchBtn:active{transform:translate(2px,2px)}
.status{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:20px;min-height:16px}
.hero{border:6px solid #000;padding:24px;margin-bottom:24px}
.hero-temp{font-family:'Archivo Black',sans-serif;font-size:clamp(72px,20vw,160px);line-height:0.85;letter-spacing:-5px}
.hero-desc{font-family:'Archivo Black',sans-serif;font-size:clamp(20px,5vw,36px);text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.hero-loc{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:12px;padding-top:12px;border-top:2px solid #000}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0;border:3px solid #000;margin-bottom:24px}
.cell{padding:16px;border:1.5px solid #000}
.cell-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.cell-value{font-family:'Archivo Black',sans-serif;font-size:clamp(24px,5vw,36px);line-height:1}
.cell-unit{font-size:11px;font-weight:400;letter-spacing:1px}
.forecast{margin-bottom:24px}
.forecast-title{font-family:'Archivo Black',sans-serif;font-size:18px;text-transform:uppercase;letter-spacing:3px;border-bottom:3px solid #000;padding-bottom:6px;margin-bottom:0}
.forecast-row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1.5px solid #000;font-weight:700}
.forecast-day{font-size:13px;text-transform:uppercase;letter-spacing:1px;flex:1}
.forecast-cond{font-size:11px;text-transform:uppercase;letter-spacing:1px;flex:1;text-align:center}
.forecast-temps{font-family:'Archivo Black',sans-serif;font-size:18px;text-align:right;flex:1}
.forecast-lo{font-weight:400;font-family:'IBM Plex Mono',monospace;font-size:13px}
.sun{margin-bottom:24px}
.sun-title{font-family:'Archivo Black',sans-serif;font-size:18px;text-transform:uppercase;letter-spacing:3px;border-bottom:3px solid #000;padding-bottom:6px;margin-bottom:12px}
.sun-row{display:flex;gap:24px;flex-wrap:wrap}
.sun-item{flex:1;min-width:120px}
.sun-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.sun-value{font-family:'Archivo Black',sans-serif;font-size:28px}
.bar{height:8px;background:#000;margin-top:12px;position:relative}
.bar-fill{height:100%;background:#fff;border:1px solid #000;position:absolute;top:-1px;left:0}
.bar-label{font-size:9px;font-weight:700;letter-spacing:1px;margin-top:4px}
footer{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-top:3px solid #000;padding-top:12px;text-align:center}
footer a{color:#000;text-decoration:none;border-bottom:2px solid #000}
footer a:hover{background:#000;color:#fff}
.hidden{display:none}
@media(max-width:480px){
  h1{font-size:48px;letter-spacing:-2px}
  .hero-temp{font-size:72px;letter-spacing:-3px}
  .grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="container">
<h1>WEATHER</h1>

<div class="location-row">
<input type="text" id="locationInput" placeholder="ENTER CITY" autocomplete="off">
<button id="fetchBtn" onclick="fetchWeather()">GET</button>
</div>
<div class="status" id="status"></div>

<div id="weatherData" class="hidden">
<div class="hero">
<div class="hero-temp" id="heroTemp">--°</div>
<div class="hero-desc" id="heroDesc">---</div>
<div class="hero-loc" id="heroLoc">---</div>
</div>

<div class="grid">
<div class="cell">
<div class="cell-label">Feels Like</div>
<div class="cell-value" id="feelsLike">--°</div>
</div>
<div class="cell">
<div class="cell-label">Humidity</div>
<div class="cell-value" id="humidity">--%</div>
</div>
<div class="cell">
<div class="cell-label">Wind</div>
<div class="cell-value" id="wind">--</div>
<div class="cell-unit" id="windDir">---</div>
</div>
<div class="cell">
<div class="cell-label">Pressure</div>
<div class="cell-value" id="pressure">--</div>
<div class="cell-unit">hPa</div>
</div>
<div class="cell">
<div class="cell-label">Visibility</div>
<div class="cell-value" id="visibility">--</div>
<div class="cell-unit">km</div>
</div>
<div class="cell">
<div class="cell-label">Clouds</div>
<div class="cell-value" id="clouds">--%</div>
</div>
</div>

<div class="humidity-bar" id="humidityBar">
<div class="bar"><div class="bar-fill" id="humFill"></div></div>
<div class="bar-label">HUMIDITY LEVEL</div>
</div>

<div class="forecast" id="forecastSection">
<div class="forecast-title">7-Day Outlook</div>
<div id="forecastList"></div>
</div>

<div class="sun">
<div class="sun-title">Sun</div>
<div class="sun-row">
<div class="sun-item">
<div class="sun-label">Sunrise</div>
<div class="sun-value" id="sunrise">--:--</div>
</div>
<div class="sun-item">
<div class="sun-label">Sunset</div>
<div class="sun-value" id="sunset">--:--</div>
</div>
<div class="sun-item">
<div class="sun-label">Daylight</div>
<div class="sun-value" id="daylight">--h</div>
</div>
</div>
</div>
</div>

<footer>
<a href="https://sloppy.live">SLOPPY.LIVE</a> — DATA VIA OPEN-METEO
</footer>
</div>

<script>
const $ = id => document.getElementById(id);
const input = $('locationInput');
input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchWeather(); });

const WMO_CODES = {
  0:'Clear Sky',1:'Mainly Clear',2:'Partly Cloudy',3:'Overcast',
  45:'Fog',48:'Rime Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',
  56:'Freezing Drizzle',57:'Heavy Freezing Drizzle',
  61:'Light Rain',63:'Rain',65:'Heavy Rain',66:'Freezing Rain',67:'Heavy Freezing Rain',
  71:'Light Snow',73:'Snow',75:'Heavy Snow',77:'Snow Grains',
  80:'Light Showers',81:'Showers',82:'Heavy Showers',
  85:'Light Snow Showers',86:'Heavy Snow Showers',
  95:'Thunderstorm',96:'Thunderstorm + Hail',99:'Heavy Thunderstorm + Hail'
};

const WIND_DIR = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
function degToDir(deg) { return WIND_DIR[Math.round(deg / 22.5) % 16]; }
function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}

const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

async function fetchWeather() {
  const city = input.value.trim();
  if (!city) { $('status').textContent = 'TYPE A CITY NAME.'; return; }
  $('status').textContent = 'LOCATING...';
  $('weatherData').classList.add('hidden');

  try {
    // Geocode
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en`);
    const geoData = await geoRes.json();
    if (!geoData.results || geoData.results.length === 0) {
      $('status').textContent = 'CITY NOT FOUND. TRY AGAIN.';
      return;
    }
    const loc = geoData.results[0];
    const { latitude, longitude, name, country } = loc;
    const admin = loc.admin1 || '';

    $('status').textContent = 'FETCHING DATA...';

    // Weather
    const wxRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}` +
      `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,cloud_cover` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset` +
      `&timezone=auto&forecast_days=7`
    );
    const wx = await wxRes.json();
    const c = wx.current;

    // Hero
    $('heroTemp').textContent = Math.round(c.temperature_2m) + '°';
    $('heroDesc').textContent = WMO_CODES[c.weather_code] || 'UNKNOWN';
    $('heroLoc').textContent = `${name.toUpperCase()}${admin ? ', ' + admin.toUpperCase() : ''}, ${country.toUpperCase()} — ${latitude.toFixed(2)}°N ${longitude.toFixed(2)}°E`;

    // Grid
    $('feelsLike').textContent = Math.round(c.apparent_temperature) + '°';
    $('humidity').textContent = c.relative_humidity_2m + '%';
    $('wind').textContent = Math.round(c.wind_speed_10m);
    $('windDir').textContent = 'KM/H ' + degToDir(c.wind_direction_10m);
    $('pressure').textContent = Math.round(c.surface_pressure);
    $('clouds').textContent = c.cloud_cover + '%';

    // Visibility — not in open-meteo current, estimate from clouds
    const visEst = Math.max(1, Math.round(20 - c.cloud_cover * 0.15));
    $('visibility').textContent = visEst;

    // Humidity bar
    $('humFill').style.width = (100 - c.relative_humidity_2m) + '%';

    // Sunrise/sunset
    const rise = wx.daily.sunrise[0];
    const set = wx.daily.sunset[0];
    $('sunrise').textContent = fmtTime(rise);
    $('sunset').textContent = fmtTime(set);
    const dayMs = new Date(set) - new Date(rise);
    const dayH = Math.floor(dayMs / 3600000);
    const dayM = Math.floor((dayMs % 3600000) / 60000);
    $('daylight').textContent = dayH + 'H' + String(dayM).padStart(2,'0');

    // Forecast
    const list = $('forecastList');
    list.innerHTML = '';
    for (let i = 0; i < wx.daily.time.length; i++) {
      const d = new Date(wx.daily.time[i] + 'T12:00:00');
      const day = i === 0 ? 'TODAY' : DAYS[d.getDay()];
      const row = document.createElement('div');
      row.className = 'forecast-row';
      row.innerHTML = `<span class="forecast-day">${day}</span>` +
        `<span class="forecast-cond">${WMO_CODES[wx.daily.weather_code[i]] || '—'}</span>` +
        `<span class="forecast-temps">${Math.round(wx.daily.temperature_2m_max[i])}° <span class="forecast-lo">${Math.round(wx.daily.temperature_2m_min[i])}°</span></span>`;
      list.appendChild(row);
    }

    $('status').textContent = 'LAST UPDATED: ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    $('weatherData').classList.remove('hidden');

  } catch (err) {
    $('status').textContent = 'FETCH FAILED. CHECK CONNECTION.';
  }
}

// Auto-focus
input.focus();
</script>
</body>
</html>
