<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gravity Wells</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌀">
<meta property="og:title" content="Gravity Wells">
<meta property="og:description" content="Place gravity spheres and watch glowing debris swirl into neon orbits.">
<meta property="og:url" content="https://sloppy.live/gravity-wells/">
<meta property="og:image" content="https://sloppy.live/gravity-wells/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05050a;overflow:hidden;font-family:'Share Tech Mono',monospace;cursor:crosshair;user-select:none}
canvas{display:block}
#ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:8px;flex-wrap:wrap}
#ui button{background:rgba(10,10,30,.85);color:#0ff;border:1px solid rgba(0,255,255,.25);padding:8px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;cursor:pointer;border-radius:4px;backdrop-filter:blur(6px);transition:all .15s}
#ui button:hover{background:rgba(0,255,255,.12);border-color:#0ff}
#ui button.active{background:rgba(0,255,255,.2);border-color:#0ff;box-shadow:0 0 12px rgba(0,255,255,.3)}
#stats{position:fixed;top:12px;right:12px;color:rgba(0,255,255,.4);font-size:11px;font-family:'Share Tech Mono',monospace;text-align:right;pointer-events:none;z-index:10}
#instructions{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:12px;font-family:'Share Tech Mono',monospace;text-align:center;pointer-events:none;z-index:10;transition:opacity .5s}
#backlink{position:fixed;bottom:8px;right:12px;color:rgba(255,255,255,.15);font-size:10px;font-family:'Share Tech Mono',monospace;text-decoration:none;z-index:10}
#backlink:hover{color:rgba(0,255,255,.5)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <button id="btn-attract" class="active" title="Left-click to place attractor">Attractor</button>
  <button id="btn-repulse" title="Left-click to place repulsor">Repulsor</button>
  <button id="btn-burst" title="Click to spray debris">Spray</button>
  <button id="btn-bomb">Detonate</button>
  <button id="btn-clear">Clear All</button>
</div>
<div id="stats"></div>
<div id="instructions">Click to place gravity wells — hold to spray debris — scroll to resize</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H,dpr;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  CV.width=W*dpr;CV.height=H*dpr;
  CV.style.width=W+'px';CV.style.height=H+'px';
  X.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize',resize);

// State
const wells=[];
const debris=[];
const sparks=[];
const MAX_DEBRIS=1500;
const MAX_SPARKS=3000;
const MAX_WELLS=30;

const NEON_COLORS=[
  '#ff00ff','#00ffff','#ff3366','#33ff99','#ffff00','#ff6600','#6633ff','#00ff66','#ff0099','#33ccff'
];
const ATTRACT_COLOR='#00ffff';
const REPULSE_COLOR='#ff3366';

let mode='attract'; // attract, repulse, spray
let mouseX=0,mouseY=0,mouseDown=false;
let spawnRadius=30;
let shakeX=0,shakeY=0,shakeDecay=0;
let interacted=false;
let frame=0;

// Wells
function addWell(x,y,type){
  if(wells.length>=MAX_WELLS)wells.shift();
  const strength=type==='attract'?1:-1;
  wells.push({
    x,y,type,strength,
    radius:40+Math.random()*20,
    color:type==='attract'?ATTRACT_COLOR:REPULSE_COLOR,
    pulse:Math.random()*Math.PI*2,
    age:0
  });
  // Spawn ring of debris around new well
  const count=25+Math.floor(Math.random()*15);
  for(let i=0;i<count;i++){
    const a=Math.PI*2*i/count+Math.random()*0.3;
    const r=50+Math.random()*30;
    spawnDebris(x+Math.cos(a)*r,y+Math.sin(a)*r,Math.cos(a)*1.5,Math.sin(a)*1.5);
  }
  triggerShake(8);
}

// Debris
function spawnDebris(x,y,vx,vy,color){
  if(debris.length>=MAX_DEBRIS)debris.shift();
  debris.push({
    x,y,vx:vx||0,vy:vy||0,
    size:1.5+Math.random()*3,
    color:color||NEON_COLORS[Math.floor(Math.random()*NEON_COLORS.length)],
    life:1,
    decay:0.0005+Math.random()*0.001,
    trail:[],
    maxTrail:6+Math.floor(Math.random()*6)
  });
}

function spawnBurst(x,y,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const spd=2+Math.random()*5;
    spawnDebris(x+Math.random()*10-5,y+Math.random()*10-5,Math.cos(a)*spd,Math.sin(a)*spd);
  }
}

// Sparks
function addSpark(x,y,vx,vy,color){
  if(sparks.length>=MAX_SPARKS)sparks.shift();
  sparks.push({x,y,vx,vy,color,life:1,decay:0.02+Math.random()*0.03,size:1+Math.random()*2});
}

function triggerShake(amt){shakeDecay=Math.max(shakeDecay,amt);}

function detonate(){
  const cx=W/2,cy=H/2;
  // Push all debris outward from center
  for(const d of debris){
    const dx=d.x-cx,dy=d.y-cy;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const force=800/dist;
    d.vx+=dx/dist*force*0.3;
    d.vy+=dy/dist*force*0.3;
  }
  // Burst sparks from center
  for(let i=0;i<80;i++){
    const a=Math.random()*Math.PI*2;
    const spd=4+Math.random()*8;
    addSpark(cx,cy,Math.cos(a)*spd,Math.sin(a)*spd,NEON_COLORS[Math.floor(Math.random()*NEON_COLORS.length)]);
  }
  // Spawn new debris ring
  spawnBurst(cx,cy,60);
  triggerShake(18);
}

// Physics
function update(){
  frame++;
  // Shake decay
  if(shakeDecay>0){
    shakeX=(Math.random()-0.5)*shakeDecay;
    shakeY=(Math.random()-0.5)*shakeDecay;
    shakeDecay*=0.88;
    if(shakeDecay<0.3)shakeDecay=0;
  }else{shakeX=0;shakeY=0;}

  // Age wells
  for(const w of wells) w.age++;

  // Update debris
  for(let i=debris.length-1;i>=0;i--){
    const d=debris[i];
    // Gravity from wells
    for(const w of wells){
      const dx=w.x-d.x,dy=w.y-d.y;
      const distSq=dx*dx+dy*dy;
      const dist=Math.sqrt(distSq)||1;
      if(dist<12){
        // Absorbed — burst sparks
        for(let s=0;s<4;s++){
          const a=Math.random()*Math.PI*2;
          addSpark(d.x,d.y,Math.cos(a)*3,Math.sin(a)*3,d.color);
        }
        debris.splice(i,1);
        continue;
      }
      const G=180*w.strength;
      const force=G/(distSq+200);
      d.vx+=dx/dist*force;
      d.vy+=dy/dist*force;
    }

    // Damping
    d.vx*=0.997;
    d.vy*=0.997;

    // Speed cap
    const spd=Math.sqrt(d.vx*d.vx+d.vy*d.vy);
    if(spd>15){d.vx=d.vx/spd*15;d.vy=d.vy/spd*15;}

    // Move
    d.x+=d.vx;d.y+=d.vy;

    // Trail
    d.trail.push({x:d.x,y:d.y});
    if(d.trail.length>d.maxTrail)d.trail.shift();

    // Wall bounce
    if(d.x<0){d.x=0;d.vx*=-0.5;}
    if(d.x>W){d.x=W;d.vx*=-0.5;}
    if(d.y<0){d.y=0;d.vy*=-0.5;}
    if(d.y>H){d.y=H;d.vy*=-0.5;}

    // Life decay
    d.life-=d.decay;
    if(d.life<=0){debris.splice(i,1);}
  }

  // Update sparks
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.x+=s.vx;s.y+=s.vy;
    s.vx*=0.95;s.vy*=0.95;
    s.life-=s.decay;
    if(s.life<=0)sparks.splice(i,1);
  }

  // Mouse spray
  if(mouseDown&&mode==='spray'&&frame%2===0){
    const a=Math.random()*Math.PI*2;
    const spd=1+Math.random()*3;
    spawnDebris(mouseX+Math.random()*20-10,mouseY+Math.random()*20-10,Math.cos(a)*spd,Math.sin(a)*spd);
  }
}

// Render
function draw(){
  X.save();
  X.translate(shakeX,shakeY);

  // Fade trail
  X.fillStyle='rgba(5,5,10,0.15)';
  X.fillRect(-10,-10,W+20,H+20);

  // Grid
  X.strokeStyle='rgba(0,255,255,0.015)';
  X.lineWidth=1;
  const gridSize=60;
  for(let gx=0;gx<W;gx+=gridSize){X.beginPath();X.moveTo(gx,0);X.lineTo(gx,H);X.stroke();}
  for(let gy=0;gy<H;gy+=gridSize){X.beginPath();X.moveTo(0,gy);X.lineTo(W,gy);X.stroke();}

  // Draw debris trails & particles
  for(const d of debris){
    const alpha=d.life*0.6;
    // Trail
    if(d.trail.length>1){
      X.beginPath();
      X.moveTo(d.trail[0].x,d.trail[0].y);
      for(let t=1;t<d.trail.length;t++){
        X.lineTo(d.trail[t].x,d.trail[t].y);
      }
      X.strokeStyle=d.color.replace(')',','+alpha*0.3+')').replace('rgb','rgba').replace('#','');
      // Use hex with alpha
      const c=hexToRgba(d.color,alpha*0.3);
      X.strokeStyle=c;
      X.lineWidth=d.size*0.6;
      X.stroke();
    }
    // Particle
    X.beginPath();
    X.arc(d.x,d.y,d.size,0,Math.PI*2);
    X.fillStyle=hexToRgba(d.color,alpha);
    X.fill();
    // Glow
    X.shadowColor=d.color;
    X.shadowBlur=d.size*4;
    X.beginPath();
    X.arc(d.x,d.y,d.size*0.5,0,Math.PI*2);
    X.fillStyle=hexToRgba(d.color,alpha*0.8);
    X.fill();
    X.shadowBlur=0;
  }

  // Draw sparks
  for(const s of sparks){
    X.beginPath();
    X.arc(s.x,s.y,s.size*s.life,0,Math.PI*2);
    X.fillStyle=hexToRgba(s.color,s.life*0.9);
    X.fill();
  }

  // Draw wells
  for(const w of wells){
    w.pulse+=0.04;
    const pulseR=w.radius+Math.sin(w.pulse)*8;
    const alpha=Math.min(w.age/30,1);

    // Gravitational field rings
    for(let r=0;r<3;r++){
      const ringR=pulseR*(1.5+r*0.8)+Math.sin(w.pulse+r*1.2)*5;
      X.beginPath();
      X.arc(w.x,w.y,ringR,0,Math.PI*2);
      X.strokeStyle=hexToRgba(w.color,0.06*alpha);
      X.lineWidth=1;
      X.stroke();
    }

    // Core glow
    const grad=X.createRadialGradient(w.x,w.y,0,w.x,w.y,pulseR);
    grad.addColorStop(0,hexToRgba(w.color,0.4*alpha));
    grad.addColorStop(0.4,hexToRgba(w.color,0.12*alpha));
    grad.addColorStop(1,'rgba(0,0,0,0)');
    X.beginPath();
    X.arc(w.x,w.y,pulseR,0,Math.PI*2);
    X.fillStyle=grad;
    X.fill();

    // Center sphere
    X.beginPath();
    X.arc(w.x,w.y,8+Math.sin(w.pulse)*2,0,Math.PI*2);
    const coreGrad=X.createRadialGradient(w.x-2,w.y-2,0,w.x,w.y,10);
    coreGrad.addColorStop(0,'#fff');
    coreGrad.addColorStop(0.3,w.color);
    coreGrad.addColorStop(1,hexToRgba(w.color,0.3));
    X.fillStyle=coreGrad;
    X.shadowColor=w.color;
    X.shadowBlur=25;
    X.fill();
    X.shadowBlur=0;

    // Type label
    X.fillStyle=hexToRgba(w.color,0.5*alpha);
    X.font='9px "Share Tech Mono"';
    X.textAlign='center';
    X.fillText(w.type==='attract'?'PULL':'PUSH',w.x,w.y+pulseR+14);
  }

  X.restore();
}

function hexToRgba(hex,a){
  if(hex.startsWith('rgba'))return hex;
  let r=0,g=0,b=0;
  if(hex.length===7){
    r=parseInt(hex.slice(1,3),16);
    g=parseInt(hex.slice(3,5),16);
    b=parseInt(hex.slice(5,7),16);
  }else if(hex.length===4){
    r=parseInt(hex[1]+hex[1],16);
    g=parseInt(hex[2]+hex[2],16);
    b=parseInt(hex[3]+hex[3],16);
  }
  return 'rgba('+r+','+g+','+b+','+Math.max(0,Math.min(1,a))+')';
}

// HUD
function updateStats(){
  document.getElementById('stats').innerHTML=
    'WELLS: '+wells.length+' / '+MAX_WELLS+'<br>'+
    'DEBRIS: '+debris.length+'<br>'+
    'SPARKS: '+sparks.length;
}

// Input
function setMode(m){
  mode=m;
  document.querySelectorAll('#ui button').forEach(b=>b.classList.remove('active'));
  if(m==='attract')document.getElementById('btn-attract').classList.add('active');
  if(m==='repulse')document.getElementById('btn-repulse').classList.add('active');
  if(m==='spray')document.getElementById('btn-burst').classList.add('active');
}

document.getElementById('btn-attract').onclick=()=>setMode('attract');
document.getElementById('btn-repulse').onclick=()=>setMode('repulse');
document.getElementById('btn-burst').onclick=()=>setMode('spray');
document.getElementById('btn-bomb').onclick=detonate;
document.getElementById('btn-clear').onclick=()=>{wells.length=0;debris.length=0;sparks.length=0;};

CV.addEventListener('mousedown',e=>{
  mouseDown=true;
  mouseX=e.clientX;mouseY=e.clientY;
  if(!interacted){interacted=true;document.getElementById('instructions').style.opacity='0';}
  if(mode==='attract'||mode==='repulse'){
    addWell(mouseX,mouseY,mode);
  }else if(mode==='spray'){
    spawnBurst(mouseX,mouseY,20);
  }
});
CV.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
CV.addEventListener('mouseup',()=>{mouseDown=false;});

// Touch
CV.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;mouseDown=true;
  if(!interacted){interacted=true;document.getElementById('instructions').style.opacity='0';}
  if(mode==='attract'||mode==='repulse'){
    addWell(mouseX,mouseY,mode);
  }else if(mode==='spray'){
    spawnBurst(mouseX,mouseY,20);
  }
},{passive:false});
CV.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;
},{passive:false});
CV.addEventListener('touchend',()=>{mouseDown=false;});

// Scroll to adjust spray radius (future) — currently just a fun interaction
CV.addEventListener('wheel',e=>{
  e.preventDefault();
  // Spawn mini burst on scroll
  const count=5+Math.floor(Math.abs(e.deltaY)/20);
  spawnBurst(mouseX,mouseY,Math.min(count,15));
},{passive:false});

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.key==='1')setMode('attract');
  if(e.key==='2')setMode('repulse');
  if(e.key==='3')setMode('spray');
  if(e.key===' '||e.key==='d'){e.preventDefault();detonate();}
  if(e.key==='c'){wells.length=0;debris.length=0;sparks.length=0;}
});

// Seed some initial content
setTimeout(()=>{
  addWell(W*0.35,H*0.45,'attract');
  addWell(W*0.65,H*0.55,'repulse');
  spawnBurst(W*0.5,H*0.5,80);
},100);

// Loop
function loop(){
  update();
  draw();
  if(frame%15===0)updateStats();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
