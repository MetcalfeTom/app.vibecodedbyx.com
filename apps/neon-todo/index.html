<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Todo</title>
<link rel="icon" href="https://emojicdn.elk.sh/✅">
<meta property="og:title" content="Neon Todo">
<meta property="og:description" content="Sleek neon task list. Add, check off, filter, all saved locally.">
<meta property="og:url" content="https://sloppy.live/neon-todo">
<meta property="og:image" content="https://emojicdn.elk.sh/✅?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@200;400;700&family=IBM+Plex+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0b12;--card:#10111a;--border:#1a1b2e;--accent:#00ffc8;--accent2:#ff3c7d;--text:#d0d0d8;--dim:#555568;--done:#2a2b3a}
html,body{min-height:100dvh;background:var(--bg);color:var(--text);font-family:'Lexend Deca',sans-serif}
body{display:flex;justify-content:center;padding:40px 16px 80px}
#app{width:100%;max-width:520px}
h1{font-weight:200;font-size:clamp(28px,6vw,42px);letter-spacing:-1px;margin-bottom:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);margin-bottom:28px;font-weight:300}
#input-row{display:flex;gap:8px;margin-bottom:20px}
#input-row input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'Lexend Deca',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s}
#input-row input:focus{border-color:var(--accent)}
#input-row input::placeholder{color:var(--dim)}
#input-row button{background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:0 20px;font-family:'Lexend Deca',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:opacity 0.2s;white-space:nowrap}
#input-row button:hover{opacity:0.85}
#filters{display:flex;gap:6px;margin-bottom:16px}
.filt{background:transparent;border:1px solid var(--border);border-radius:20px;padding:6px 14px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s}
.filt.active{border-color:var(--accent);color:var(--accent)}
.filt:hover{border-color:var(--accent);color:var(--accent)}
#list{display:flex;flex-direction:column;gap:6px}
.todo{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;transition:all 0.3s;animation:slideIn 0.25s ease-out}
.todo.done{opacity:0.45;border-color:transparent}
.todo.done .todo-text{text-decoration:line-through;color:var(--dim)}
.todo.removing{opacity:0;transform:translateX(40px);pointer-events:none}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;background:transparent}
.check:hover{border-color:var(--accent)}
.todo.done .check{border-color:var(--accent);background:var(--accent)}
.check svg{width:12px;height:12px;opacity:0;transition:opacity 0.2s}
.todo.done .check svg{opacity:1}
.todo-text{flex:1;font-size:15px;font-weight:400;word-break:break-word}
.del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:4px 6px;border-radius:4px;transition:color 0.2s;opacity:0}
.todo:hover .del{opacity:1}
.del:hover{color:var(--accent2)}
#count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);margin-top:16px;text-align:center}
#clear-done{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;margin-top:8px;display:block;margin-left:auto;margin-right:auto;transition:all 0.2s}
#clear-done:hover{border-color:var(--accent2);color:var(--accent2)}
#back{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;opacity:0.35;color:var(--dim);text-decoration:none;font-family:'IBM Plex Mono',monospace}
#back:hover{opacity:0.7}
@media(max-width:500px){
  .del{opacity:0.6}
  body{padding:24px 12px 70px}
}
</style>
</head>
<body>
<div id="app">
<h1>neon todo</h1>
<p class="sub">tasks saved locally</p>
<div id="input-row">
<input id="inp" type="text" placeholder="add a task..." maxlength="200" autocomplete="off">
<button id="addBtn">Add</button>
</div>
<div id="filters">
<button class="filt active" data-f="all">All</button>
<button class="filt" data-f="active">Active</button>
<button class="filt" data-f="done">Done</button>
</div>
<div id="list"></div>
<div id="count"></div>
<button id="clear-done" class="hidden">Clear completed</button>
</div>
<a id="back" href="https://sloppy.live">sloppy.live</a>
<script>
(function(){
var KEY='neon-todo-v1';
var todos=[];
var filter='all';
var listEl=document.getElementById('list');
var countEl=document.getElementById('count');
var clearBtn=document.getElementById('clear-done');
var inp=document.getElementById('inp');
var addBtn=document.getElementById('addBtn');
var filts=document.querySelectorAll('.filt');

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

function save(){try{localStorage.setItem(KEY,JSON.stringify(todos));}catch(e){}}
function load(){try{var d=localStorage.getItem(KEY);if(d)todos=JSON.parse(d);}catch(e){todos=[];}}

function render(){
  var visible=todos.filter(function(t){
    if(filter==='active')return !t.done;
    if(filter==='done')return t.done;
    return true;
  });
  listEl.innerHTML='';
  for(var i=0;i<visible.length;i++){
    var t=visible[i];
    var el=document.createElement('div');
    el.className='todo'+(t.done?' done':'');
    el.dataset.id=t.id;
    el.innerHTML='<div class="check"><svg viewBox="0 0 12 12" fill="none" stroke="#0a0b12" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg></div>'
      +'<span class="todo-text">'+escHtml(t.text)+'</span>'
      +'<button class="del" title="Delete">&times;</button>';
    listEl.appendChild(el);
  }
  var active=todos.filter(function(t){return !t.done;}).length;
  var done=todos.length-active;
  countEl.textContent=active+' remaining'+(done?' · '+done+' done':'');
  clearBtn.style.display=done>0?'block':'none';
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function addTodo(){
  var text=inp.value.trim();
  if(!text)return;
  todos.unshift({id:uid(),text:text,done:false,created:Date.now()});
  inp.value='';save();render();inp.focus();
}

addBtn.addEventListener('click',addTodo);
inp.addEventListener('keydown',function(e){if(e.key==='Enter')addTodo();});

listEl.addEventListener('click',function(e){
  var todoEl=e.target.closest('.todo');
  if(!todoEl)return;
  var id=todoEl.dataset.id;
  if(e.target.closest('.del')){
    todoEl.classList.add('removing');
    setTimeout(function(){
      todos=todos.filter(function(t){return t.id!==id;});
      save();render();
    },250);
    return;
  }
  if(e.target.closest('.check')){
    for(var i=0;i<todos.length;i++){
      if(todos[i].id===id){todos[i].done=!todos[i].done;break;}
    }
    save();render();
  }
});

for(var i=0;i<filts.length;i++){
  filts[i].addEventListener('click',function(){
    for(var j=0;j<filts.length;j++)filts[j].classList.remove('active');
    this.classList.add('active');
    filter=this.dataset.f;
    render();
  });
}

clearBtn.addEventListener('click',function(){
  todos=todos.filter(function(t){return !t.done;});
  save();render();
});

load();render();inp.focus();
})();
</script>
</body>
</html>
