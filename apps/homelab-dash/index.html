<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Homelab Dashboard</title>
<link rel="icon" href="https://emojicdn.elk.sh/🖥️">
<meta property="og:title" content="Homelab Dashboard">
<meta property="og:description" content="Simulated high-tech server monitoring with live stats, health rings, and neon indicators.">
<meta property="og:url" content="https://sloppy.live/homelab-dash/">
<meta property="og:image" content="https://sloppy.live/homelab-dash/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080c;--card:#0b0f16;--border:rgba(0,200,255,.08);
  --cyan:#00d4ff;--green:#00ff88;--amber:#ffaa00;--red:#ff3355;--purple:#aa66ff;
  --dim:rgba(180,200,220,.25);--text:rgba(200,215,230,.8);--muted:rgba(150,170,190,.4);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Chakra Petch',sans-serif;overflow-x:hidden}
body{background:var(--bg) radial-gradient(ellipse at 20% 0%,rgba(0,212,255,.03) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(170,102,255,.02) 0%,transparent 50%)}

#top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);backdrop-filter:blur(4px);position:sticky;top:0;z-index:10;background:rgba(6,8,12,.85)}
#top-bar h1{font-size:14px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--cyan)}
#top-bar h1 span{color:var(--muted);font-weight:300}
#clock{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted)}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse-dot 2s infinite;display:inline-block;margin-right:6px}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}

#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:16px 20px;max-width:1400px;margin:0 auto}

.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;position:relative;overflow:hidden;transition:border-color .3s}
.card:hover{border-color:rgba(0,200,255,.2)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.15),transparent)}
.card-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-title .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* Server cards */
.server{display:flex;gap:14px;align-items:flex-start}
.server .ring-wrap{flex-shrink:0}
.server .ring-wrap canvas{display:block}
.server .info{flex:1;min-width:0}
.server .name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px}
.server .role{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.server .metrics{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin-top:8px}
.metric{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim)}
.metric .val{color:var(--text);font-size:13px;font-weight:500}
.metric.warn .val{color:var(--amber)}
.metric.crit .val{color:var(--red)}

/* Bar charts */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{width:40px;font-size:10px;color:var(--muted);font-family:'Share Tech Mono',monospace;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,.03);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
.bar-val{width:32px;font-size:10px;font-family:'Share Tech Mono',monospace;color:var(--dim);flex-shrink:0}

/* Sparkline */
.sparkline{display:block;margin-top:6px}

/* Network */
.net-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.net-stat{text-align:center;padding:6px;background:rgba(0,0,0,.2);border-radius:4px;border:1px solid var(--border)}
.net-stat .big{font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:600;display:block}
.net-stat .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* Service list */
.svc-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.svc-row:last-child{border:none}
.svc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.svc-name{flex:1;font-size:12px}
.svc-ms{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim)}

/* Log */
.log-lines{font-family:'Share Tech Mono',monospace;font-size:10px;line-height:1.7;max-height:140px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.05) transparent}
.log-lines::-webkit-scrollbar{width:3px}
.log-lines::-webkit-scrollbar-thumb{background:rgba(255,255,255,.05)}
.log-line{color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-line .lt{color:var(--muted);margin-right:4px}
.log-line.warn{color:var(--amber)}
.log-line.err{color:var(--red)}
.log-line.ok{color:var(--green)}

/* Alerts */
.alert-strip{display:flex;gap:8px;padding:10px 20px;overflow-x:auto;scrollbar-width:none}
.alert-strip::-webkit-scrollbar{display:none}
.alert{flex-shrink:0;padding:5px 12px;border-radius:4px;font-size:10px;font-family:'Share Tech Mono',monospace;letter-spacing:.5px;border:1px solid;animation:fadeSlide .5s ease}
.alert.ok{color:var(--green);border-color:rgba(0,255,136,.15);background:rgba(0,255,136,.04)}
.alert.warn{color:var(--amber);border-color:rgba(255,170,0,.15);background:rgba(255,170,0,.04)}
.alert.crit{color:var(--red);border-color:rgba(255,51,85,.15);background:rgba(255,51,85,.04)}
@keyframes fadeSlide{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

@media(max-width:640px){
  #grid{grid-template-columns:1fr;padding:10px}
  .net-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="top-bar">
  <h1><span id="status-dot"></span>HOMELAB <span>// CONTROL PANEL</span></h1>
  <div id="clock"></div>
</div>

<div class="alert-strip" id="alerts"></div>
<div id="grid"></div>
<script>
// === SIMULATED HOMELAB DATA ===
const SERVERS=[
  {id:'atlas',name:'Atlas',role:'Proxmox Host',os:'Debian 12',cores:16,ram:64,disk:2000,ip:'10.0.1.10'},
  {id:'nexus',name:'Nexus',role:'Docker Swarm',os:'Ubuntu 24.04',cores:8,ram:32,disk:1000,ip:'10.0.1.20'},
  {id:'vault',name:'Vault',role:'NAS / Backup',os:'TrueNAS',cores:4,ram:16,disk:8000,ip:'10.0.1.30'},
  {id:'edge',name:'Edge',role:'Reverse Proxy',os:'Alpine 3.19',cores:2,ram:4,disk:120,ip:'10.0.1.1'},
  {id:'lab',name:'Lab',role:'Dev / CI Runner',os:'Fedora 40',cores:6,ram:24,disk:500,ip:'10.0.1.40'},
];

const SERVICES=[
  {name:'Nginx Proxy',port:443},{name:'Portainer',port:9443},{name:'Grafana',port:3000},
  {name:'Home Assistant',port:8123},{name:'Pi-hole',port:80},{name:'Jellyfin',port:8096},
  {name:'Gitea',port:3001},{name:'Nextcloud',port:8080},{name:'Uptime Kuma',port:3002},
  {name:'Vaultwarden',port:8843},{name:'Authelia',port:9091},{name:'Wireguard',port:51820},
];

const LOG_TEMPLATES=[
  {msg:'Container {c} health check passed',lvl:'ok'},
  {msg:'Backup job {c} completed ({n}GB)',lvl:'ok'},
  {msg:'SSL certificate renewed for {d}',lvl:'ok'},
  {msg:'Disk usage on {s} exceeded 80%',lvl:'warn'},
  {msg:'Memory pressure on {s} — swapping',lvl:'warn'},
  {msg:'Connection timeout to {svc}:{p}',lvl:'warn'},
  {msg:'Failed login attempt from {ip}',lvl:'err'},
  {msg:'Container {c} OOM killed — restarting',lvl:'err'},
  {msg:'SMART warning on /dev/sd{x} ({s})',lvl:'warn'},
  {msg:'Cron job {j} completed successfully',lvl:'ok'},
  {msg:'New device detected: {mac}',lvl:'ok'},
  {msg:'DNS query rate spike: {n}q/s',lvl:'warn'},
  {msg:'ZFS scrub completed — 0 errors',lvl:'ok'},
  {msg:'Firmware update available for {s}',lvl:'ok'},
];

const CONTAINERS=['grafana','jellyfin','nextcloud','pihole','nginx','gitea','authelia','vaultwarden','uptime-kuma','homeassistant','wireguard','portainer'];
const DOMAINS=['home.lab','media.lab','git.lab','cloud.lab','auth.lab','mon.lab'];
const CRON_JOBS=['daily-backup','cert-renew','db-vacuum','log-rotate','snapshot-prune'];

// State
const state={servers:{},services:{},netIn:[],netOut:[],logs:[],alerts:[],uptime:0};

function initState(){
  for(const s of SERVERS){
    state.servers[s.id]={
      cpu:15+Math.random()*30,ram:30+Math.random()*40,disk:20+Math.random()*50,
      temp:35+Math.random()*20,load:[0,0,0],iops:Math.random()*200,
      cpuHistory:Array.from({length:30},()=>10+Math.random()*40),
      up:true
    };
  }
  for(const svc of SERVICES){
    state.services[svc.name]={up:Math.random()>.05,latency:2+Math.random()*80};
  }
  for(let i=0;i<30;i++){state.netIn.push(Math.random()*500);state.netOut.push(Math.random()*200);}
}
initState();

function rnd(a,b){return a+Math.random()*(b-a);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function drift(val,min,max,d){return clamp(val+(Math.random()-0.5)*d,min,max);}

function tick(){
  state.uptime++;
  for(const s of SERVERS){
    const st=state.servers[s.id];
    st.cpu=drift(st.cpu,3,98,8);
    st.ram=drift(st.ram,20,95,3);
    st.disk=drift(st.disk,st.disk-0.1,Math.min(99,st.disk+0.2),0.3);
    st.temp=drift(st.temp,28,82,2);
    st.load=[st.cpu/100*s.cores*rnd(0.8,1.2),st.cpu/100*s.cores*rnd(0.6,1),st.cpu/100*s.cores*rnd(0.5,0.9)];
    st.iops=drift(st.iops,5,800,40);
    st.cpuHistory.push(st.cpu);if(st.cpuHistory.length>30)st.cpuHistory.shift();
    if(Math.random()<0.002)st.up=!st.up;
  }
  for(const svc of SERVICES){
    const st=state.services[svc.name];
    st.latency=drift(st.latency,1,200,15);
    if(Math.random()<0.005)st.up=!st.up;
    else if(!st.up&&Math.random()<0.1)st.up=true;
  }
  state.netIn.push(rnd(50,800));state.netOut.push(rnd(20,300));
  if(state.netIn.length>30)state.netIn.shift();
  if(state.netOut.length>30)state.netOut.shift();

  // random log
  if(Math.random()<0.3)genLog();
  // random alert
  if(Math.random()<0.04)genAlert();
}

function genLog(){
  const t=LOG_TEMPLATES[Math.floor(Math.random()*LOG_TEMPLATES.length)];
  let msg=t.msg
    .replace('{c}',CONTAINERS[Math.floor(Math.random()*CONTAINERS.length)])
    .replace('{s}',SERVERS[Math.floor(Math.random()*SERVERS.length)].name)
    .replace('{d}',DOMAINS[Math.floor(Math.random()*DOMAINS.length)])
    .replace('{svc}',SERVICES[Math.floor(Math.random()*SERVICES.length)].name)
    .replace('{p}',String(1000+Math.floor(Math.random()*9000)))
    .replace('{ip}','192.168.'+Math.floor(Math.random()*255)+'.'+Math.floor(Math.random()*255))
    .replace('{n}',String(Math.floor(Math.random()*500)))
    .replace('{x}',String.fromCharCode(97+Math.floor(Math.random()*6)))
    .replace('{mac}','aa:bb:cc:'+Math.floor(Math.random()*100).toString(16)+':'+Math.floor(Math.random()*100).toString(16))
    .replace('{j}',CRON_JOBS[Math.floor(Math.random()*CRON_JOBS.length)]);
  state.logs.unshift({msg,lvl:t.lvl,ts:new Date()});
  if(state.logs.length>50)state.logs.pop();
}

function genAlert(){
  const types=[
    {msg:'All systems nominal',lvl:'ok'},
    {msg:'CPU spike on '+SERVERS[Math.floor(Math.random()*SERVERS.length)].name,lvl:'warn'},
    {msg:'Disk I/O bottleneck detected',lvl:'warn'},
    {msg:'Service restored: '+SERVICES[Math.floor(Math.random()*SERVICES.length)].name,lvl:'ok'},
    {msg:'Memory threshold exceeded',lvl:'crit'},
    {msg:'Backup verification passed',lvl:'ok'},
    {msg:'Intrusion attempt blocked',lvl:'crit'},
    {msg:'Certificate expiry in 7 days',lvl:'warn'},
  ];
  const a=types[Math.floor(Math.random()*types.length)];
  state.alerts.unshift(a);
  if(state.alerts.length>6)state.alerts.pop();
}

// === RENDERING ===
const grid=document.getElementById('grid');

function healthColor(pct){
  if(pct<60)return'var(--green)';if(pct<80)return'var(--amber)';return'var(--red)';
}
function healthClass(pct){
  if(pct<60)return'';if(pct<80)return'warn';return'crit';
}

function drawRing(canvas,pct,color,size){
  const ctx=canvas.getContext('2d');
  const s=size||56;canvas.width=s;canvas.height=s;
  const cx=s/2,cy=s/2,r=s/2-4,lw=3;
  ctx.clearRect(0,0,s,s);
  // bg ring
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=lw;ctx.stroke();
  // value arc
  const start=-Math.PI/2,end=start+(pct/100)*Math.PI*2;
  ctx.beginPath();ctx.arc(cx,cy,r,start,end);
  ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
  // glow
  ctx.shadowColor=color;ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(cx,cy,r,start,end);
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.stroke();
  ctx.shadowBlur=0;
  // center text
  ctx.fillStyle=color;ctx.font='600 '+(s*0.28)+'px Chakra Petch';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(Math.round(pct)+'%',cx,cy);
}

function drawSparkline(canvas,data,color,w,h){
  const ctx=canvas.getContext('2d');
  canvas.width=w;canvas.height=h;ctx.clearRect(0,0,w,h);
  if(data.length<2)return;
  const max=Math.max(...data,1),min=Math.min(...data,0);
  const range=max-min||1;
  // fill
  ctx.beginPath();ctx.moveTo(0,h);
  for(let i=0;i<data.length;i++){
    const x=i/(data.length-1)*w,y=h-(data[i]-min)/range*h;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(w,h);ctx.closePath();
  const grd=ctx.createLinearGradient(0,0,0,h);
  grd.addColorStop(0,color+'33');grd.addColorStop(1,color+'00');
  ctx.fillStyle=grd;ctx.fill();
  // line
  ctx.beginPath();
  for(let i=0;i<data.length;i++){
    const x=i/(data.length-1)*w,y=h-(data[i]-min)/range*h;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
}

function buildServerCard(s){
  const st=state.servers[s.id];
  const col=st.up?healthColor(st.cpu):'var(--red)';
  let html='<div class="card"><div class="card-title"><span class="dot" style="background:'+(st.up?'var(--green)':'var(--red)')+';box-shadow:0 0 6px '+(st.up?'var(--green)':'var(--red)')+'"></span>'+s.name.toUpperCase()+' — '+s.role+'</div>';
  html+='<div class="server">';
  html+='<div class="ring-wrap"><canvas id="ring-'+s.id+'" width="56" height="56"></canvas></div>';
  html+='<div class="info"><div class="name">'+s.name+'</div><div class="role">'+s.os+' · '+s.ip+'</div>';
  html+='<div class="metrics">';
  html+='<div class="metric '+healthClass(st.cpu)+'"><div class="val">'+st.cpu.toFixed(1)+'%</div>CPU</div>';
  html+='<div class="metric '+healthClass(st.ram)+'"><div class="val">'+st.ram.toFixed(1)+'%</div>RAM</div>';
  html+='<div class="metric '+healthClass(st.disk)+'"><div class="val">'+st.disk.toFixed(1)+'%</div>DISK</div>';
  html+='<div class="metric '+(st.temp>65?'warn':st.temp>75?'crit':'')+'"><div class="val">'+st.temp.toFixed(0)+'°C</div>TEMP</div>';
  html+='</div>';
  html+='<canvas id="spark-'+s.id+'" class="sparkline" width="160" height="28"></canvas>';
  html+='</div></div></div>';
  return html;
}

function buildNetCard(){
  let html='<div class="card"><div class="card-title"><span class="dot" style="background:var(--cyan);box-shadow:0 0 6px var(--cyan)"></span>NETWORK THROUGHPUT</div>';
  html+='<div class="net-grid">';
  const inNow=state.netIn[state.netIn.length-1];
  const outNow=state.netOut[state.netOut.length-1];
  html+='<div class="net-stat"><span class="big" style="color:var(--cyan)">↓ '+inNow.toFixed(0)+'</span><span class="lbl">Mbps In</span></div>';
  html+='<div class="net-stat"><span class="big" style="color:var(--purple)">↑ '+outNow.toFixed(0)+'</span><span class="lbl">Mbps Out</span></div>';
  html+='</div>';
  html+='<canvas id="spark-netin" class="sparkline" width="280" height="32"></canvas>';
  html+='<canvas id="spark-netout" class="sparkline" width="280" height="32"></canvas>';
  html+='</div>';
  return html;
}

function buildServicesCard(){
  let html='<div class="card"><div class="card-title"><span class="dot" style="background:var(--green);box-shadow:0 0 6px var(--green)"></span>SERVICES</div>';
  for(const svc of SERVICES){
    const st=state.services[svc.name];
    const col=st.up?'var(--green)':'var(--red)';
    const ms=st.up?st.latency.toFixed(0)+'ms':'DOWN';
    html+='<div class="svc-row"><span class="svc-dot" style="background:'+col+';box-shadow:0 0 4px '+col+'"></span><span class="svc-name">'+svc.name+'</span><span class="svc-ms" style="color:'+(st.up&&st.latency>80?'var(--amber)':st.up?'var(--dim)':'var(--red)')+'">'+ms+'</span></div>';
  }
  html+='</div>';
  return html;
}

function buildStorageCard(){
  let html='<div class="card"><div class="card-title"><span class="dot" style="background:var(--amber);box-shadow:0 0 6px var(--amber)"></span>STORAGE POOLS</div>';
  for(const s of SERVERS){
    const st=state.servers[s.id];
    const used=st.disk/100*s.disk;
    const col=healthColor(st.disk);
    html+='<div class="bar-row"><span class="bar-label">'+s.name.slice(0,4)+'</span><div class="bar-track"><div class="bar-fill" style="width:'+st.disk+'%;background:'+col+';box-shadow:0 0 6px '+col+'"></div></div><span class="bar-val">'+used.toFixed(0)+'G</span></div>';
  }
  html+='</div>';
  return html;
}

function buildLogCard(){
  let html='<div class="card"><div class="card-title"><span class="dot" style="background:var(--cyan);box-shadow:0 0 6px var(--cyan)"></span>SYSTEM LOG</div><div class="log-lines" id="log-lines">';
  for(const l of state.logs.slice(0,20)){
    const t=l.ts.toTimeString().slice(0,8);
    html+='<div class="log-line '+l.lvl+'"><span class="lt">['+t+']</span>'+escHtml(l.msg)+'</div>';
  }
  html+='</div></div>';
  return html;
}

function buildUptimeCard(){
  const d=Math.floor(state.uptime/3600);
  const h=Math.floor((state.uptime%3600)/60);
  const m=state.uptime%60;
  const totalSvc=SERVICES.length;
  const upSvc=SERVICES.filter(s=>state.services[s.name].up).length;
  const upServers=SERVERS.filter(s=>state.servers[s.id].up).length;
  let html='<div class="card"><div class="card-title"><span class="dot" style="background:var(--green);box-shadow:0 0 6px var(--green)"></span>CLUSTER STATUS</div>';
  html+='<div class="net-grid">';
  html+='<div class="net-stat"><span class="big" style="color:var(--green)">'+upServers+'/'+SERVERS.length+'</span><span class="lbl">Hosts Up</span></div>';
  html+='<div class="net-stat"><span class="big" style="color:'+(upSvc===totalSvc?'var(--green)':'var(--amber)')+'">'+upSvc+'/'+totalSvc+'</span><span class="lbl">Services</span></div>';
  html+='<div class="net-stat"><span class="big" style="color:var(--cyan)">'+d+'d '+h+'h</span><span class="lbl">Uptime</span></div>';
  html+='<div class="net-stat"><span class="big" style="color:var(--purple)">'+state.logs.length+'</span><span class="lbl">Log Events</span></div>';
  html+='</div></div>';
  return html;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderAlerts(){
  const el=document.getElementById('alerts');
  el.innerHTML=state.alerts.map(a=>'<div class="alert '+a.lvl+'">'+escHtml(a.msg)+'</div>').join('');
}

function renderAll(){
  let html='';
  for(const s of SERVERS)html+=buildServerCard(s);
  html+=buildUptimeCard();
  html+=buildNetCard();
  html+=buildStorageCard();
  html+=buildServicesCard();
  html+=buildLogCard();
  grid.innerHTML=html;

  // draw canvases
  for(const s of SERVERS){
    const st=state.servers[s.id];
    const col=st.up?healthColor(st.cpu):'var(--red)';
    const rc=document.getElementById('ring-'+s.id);
    if(rc)drawRing(rc,st.cpu,col);
    const sc=document.getElementById('spark-'+s.id);
    if(sc)drawSparkline(sc,st.cpuHistory,col,160,28);
  }
  const ni=document.getElementById('spark-netin');
  if(ni)drawSparkline(ni,state.netIn,'#00d4ff',280,32);
  const no=document.getElementById('spark-netout');
  if(no)drawSparkline(no,state.netOut,'#aa66ff',280,32);

  renderAlerts();
}

function updateClock(){
  const d=new Date();
  document.getElementById('clock').textContent=
    d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+' '+
    d.toTimeString().slice(0,8);
}

// Init logs
for(let i=0;i<15;i++)genLog();
genAlert();

// Main loop
setInterval(()=>{tick();renderAll();},2000);
setInterval(updateClock,1000);
updateClock();
renderAll();
</script>
</body>
</html>
