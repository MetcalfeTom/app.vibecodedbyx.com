<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Silly Sounds</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎵">
<meta property="og:title" content="Silly Sounds">
<meta property="og:description" content="Tap buttons to unleash ridiculous sound effects. Warning: highly addictive.">
<meta property="og:url" content="https://sloppy.live/silly-sounds">
<meta property="og:image" content="https://emojicdn.elk.sh/🎵?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden;user-select:none}
body{
  background:#1a1028;
  background-image:
    radial-gradient(ellipse at 20% 80%,rgba(255,0,200,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(0,200,255,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(255,200,0,0.04) 0%,transparent 60%);
  min-height:100%;
  display:flex;flex-direction:column;align-items:center;
  padding:20px 12px 60px;
}
h1{
  font-family:'Baloo 2',cursive;font-size:clamp(26px,5vw,42px);font-weight:800;
  color:#fff;text-align:center;margin-bottom:4px;
  text-shadow:0 0 20px rgba(255,100,200,0.4),0 2px 0 rgba(0,0,0,0.3);
}
.sub{font-family:'Inconsolata',monospace;font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:2px;margin-bottom:20px}
#board{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:10px;
  width:100%;max-width:560px;
}
.pad{
  aspect-ratio:1;
  border-radius:14px;
  border:none;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;
  font-family:'Baloo 2',cursive;
  transition:transform .08s,box-shadow .15s;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.pad:active,.pad.hit{transform:scale(0.92)}
.pad .emoji{font-size:clamp(28px,5vw,40px);line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.pad .label{font-size:clamp(9px,1.8vw,11px);font-weight:700;color:rgba(0,0,0,0.5);text-transform:uppercase;letter-spacing:0.5px}
.pad::after{
  content:'';position:absolute;inset:0;border-radius:14px;
  background:radial-gradient(circle at 30% 25%,rgba(255,255,255,0.25) 0%,transparent 60%);
  pointer-events:none;
}
.pad.ripple::before{
  content:'';position:absolute;
  width:200%;height:200%;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  animation:rippleOut .4s ease-out forwards;
  pointer-events:none;
}
@keyframes rippleOut{
  0%{transform:scale(0);opacity:1}
  100%{transform:scale(1);opacity:0}
}
#vis{
  width:100%;max-width:560px;height:40px;margin-top:16px;
  border-radius:8px;overflow:hidden;
  background:rgba(255,255,255,0.03);
}
#vis canvas{width:100%;height:100%;display:block}
a@media(max-width:400px){
  #board{grid-template-columns:repeat(3,1fr);gap:8px}
}
</style>
</head>
<body>

<h1>Silly Sounds</h1>
<span class="sub">tap to make noise</span>

<div id="board"></div>

<div id="vis"><canvas id="vis-canvas"></canvas></div>
<script>
(function(){
'use strict';

var audioCtx=null;
var analyser=null;
var masterGain=null;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;
  masterGain=audioCtx.createGain();
  masterGain.gain.value=0.4;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// Sound generators
function playTone(freq,dur,type,ramp){
  initAudio();
  var osc=audioCtx.createOscillator();
  var gain=audioCtx.createGain();
  osc.type=type||'sine';
  osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
  if(ramp)osc.frequency.exponentialRampToValueAtTime(ramp,audioCtx.currentTime+dur);
  gain.gain.setValueAtTime(0.5,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  osc.connect(gain);gain.connect(masterGain);
  osc.start();osc.stop(audioCtx.currentTime+dur);
}

function playNoise(dur,filter){
  initAudio();
  var bufSize=audioCtx.sampleRate*dur;
  var buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  var data=buf.getChannelData(0);
  for(var i=0;i<bufSize;i++)data[i]=(Math.random()*2-1);
  var src=audioCtx.createBufferSource();
  src.buffer=buf;
  var gain=audioCtx.createGain();
  gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  if(filter){
    var filt=audioCtx.createBiquadFilter();
    filt.type=filter.type||'lowpass';
    filt.frequency.value=filter.freq||1000;
    if(filter.ramp)filt.frequency.exponentialRampToValueAtTime(filter.ramp,audioCtx.currentTime+dur);
    src.connect(filt);filt.connect(gain);
  }else{
    src.connect(gain);
  }
  gain.connect(masterGain);
  src.start();src.stop(audioCtx.currentTime+dur);
}

var sounds={
  fart:function(){
    playTone(80,0.5,'sawtooth',30);
    playNoise(0.3,{type:'lowpass',freq:200,ramp:50});
  },
  boing:function(){
    playTone(200,0.4,'sine',800);
    setTimeout(function(){playTone(800,0.3,'sine',200)},50);
  },
  laser:function(){
    playTone(1200,0.3,'sawtooth',100);
  },
  bonk:function(){
    playNoise(0.15,{type:'bandpass',freq:800});
    playTone(200,0.15,'square',80);
  },
  womp:function(){
    playTone(400,0.8,'sine',60);
  },
  ding:function(){
    playTone(1400,0.6,'sine');
    playTone(2100,0.4,'sine');
  },
  quack:function(){
    playTone(600,0.12,'sawtooth',300);
    setTimeout(function(){playTone(500,0.15,'sawtooth',250)},130);
  },
  slide:function(){
    playTone(200,0.6,'sine',2000);
  },
  buzz:function(){
    playTone(120,0.4,'sawtooth');
    playTone(122,0.4,'sawtooth');
  },
  pop:function(){
    playTone(800,0.08,'sine',200);
    playNoise(0.05,{type:'highpass',freq:2000});
  },
  siren:function(){
    initAudio();
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(600,audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(1200,audioCtx.currentTime+0.3);
    osc.frequency.linearRampToValueAtTime(600,audioCtx.currentTime+0.6);
    gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.7);
    osc.connect(gain);gain.connect(masterGain);
    osc.start();osc.stop(audioCtx.currentTime+0.7);
  },
  chomp:function(){
    playNoise(0.08,{type:'bandpass',freq:1500});
    setTimeout(function(){playNoise(0.08,{type:'bandpass',freq:1200})},100);
  },
  warp:function(){
    playTone(100,0.5,'sine',3000);
    playTone(150,0.5,'square',2000);
  },
  splat:function(){
    playNoise(0.25,{type:'lowpass',freq:3000,ramp:200});
    playTone(300,0.15,'sawtooth',50);
  },
  giggle:function(){
    var t=0;
    for(var i=0;i<5;i++){
      (function(d){setTimeout(function(){playTone(500+Math.random()*400,0.08,'sine')},d)})(t);
      t+=70+Math.random()*30;
    }
  },
  boom:function(){
    playNoise(0.6,{type:'lowpass',freq:400,ramp:30});
    playTone(60,0.5,'sine',20);
  },
  whistle:function(){
    initAudio();
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(800,audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(1600,audioCtx.currentTime+0.15);
    osc.frequency.linearRampToValueAtTime(1200,audioCtx.currentTime+0.4);
    gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
    osc.connect(gain);gain.connect(masterGain);
    osc.start();osc.stop(audioCtx.currentTime+0.5);
  },
  alien:function(){
    initAudio();
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    var lfo=audioCtx.createOscillator();
    var lfoGain=audioCtx.createGain();
    osc.type='sine';osc.frequency.value=600;
    lfo.type='sine';lfo.frequency.value=15;
    lfoGain.gain.value=200;
    lfo.connect(lfoGain);lfoGain.connect(osc.frequency);
    gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);
    osc.connect(gain);gain.connect(masterGain);
    osc.start();lfo.start();
    osc.stop(audioCtx.currentTime+0.6);lfo.stop(audioCtx.currentTime+0.6);
  },
  burp:function(){
    playTone(100,0.3,'sawtooth',50);
    playTone(70,0.4,'square',30);
    playNoise(0.2,{type:'lowpass',freq:300,ramp:80});
  },
  coin:function(){
    playTone(988,0.08,'square');
    setTimeout(function(){playTone(1319,0.3,'square')},80);
  },
  horn:function(){
    playTone(220,0.6,'sawtooth');
    playTone(277,0.6,'sawtooth');
  },
  click:function(){
    playNoise(0.02,{type:'highpass',freq:4000});
  },
  spring:function(){
    initAudio();
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    osc.type='sine';
    var t=audioCtx.currentTime;
    for(var i=0;i<8;i++){
      osc.frequency.setValueAtTime(300+i*100,t+i*0.05);
      osc.frequency.setValueAtTime(600+i*80,t+i*0.05+0.025);
    }
    gain.gain.setValueAtTime(0.3,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    osc.connect(gain);gain.connect(masterGain);
    osc.start();osc.stop(t+0.5);
  },
  robot:function(){
    playTone(200,0.1,'square');
    setTimeout(function(){playTone(300,0.1,'square')},110);
    setTimeout(function(){playTone(150,0.15,'square')},220);
  }
};

var pads=[
  {id:'fart',emoji:'💨',label:'Fart',bg:'#7B5B3A',shadow:'#5a3f22'},
  {id:'boing',emoji:'🦘',label:'Boing',bg:'#4CAF50',shadow:'#2d7a30'},
  {id:'laser',emoji:'🔫',label:'Laser',bg:'#E91E63',shadow:'#a0143f'},
  {id:'bonk',emoji:'🔨',label:'Bonk',bg:'#FF9800',shadow:'#b36a00'},
  {id:'womp',emoji:'📯',label:'Womp',bg:'#9C27B0',shadow:'#6a1a7a'},
  {id:'ding',emoji:'🔔',label:'Ding',bg:'#FFD700',shadow:'#b89b00'},
  {id:'quack',emoji:'🦆',label:'Quack',bg:'#FFEB3B',shadow:'#b3a500'},
  {id:'slide',emoji:'🎢',label:'Slide Up',bg:'#00BCD4',shadow:'#007a8a'},
  {id:'buzz',emoji:'🐝',label:'Buzz',bg:'#FFC107',shadow:'#b38600'},
  {id:'pop',emoji:'🫧',label:'Pop',bg:'#03A9F4',shadow:'#0277a8'},
  {id:'siren',emoji:'🚨',label:'Siren',bg:'#F44336',shadow:'#aa2e25'},
  {id:'chomp',emoji:'🍔',label:'Chomp',bg:'#8BC34A',shadow:'#5d8230'},
  {id:'warp',emoji:'🌀',label:'Warp',bg:'#673AB7',shadow:'#452680'},
  {id:'splat',emoji:'💥',label:'Splat',bg:'#FF5722',shadow:'#b33b17'},
  {id:'giggle',emoji:'🤭',label:'Giggle',bg:'#EC407A',shadow:'#a22d54'},
  {id:'boom',emoji:'💣',label:'Boom',bg:'#37474F',shadow:'#1a2328'},
  {id:'whistle',emoji:'😗',label:'Whistle',bg:'#26A69A',shadow:'#18706a'},
  {id:'alien',emoji:'👽',label:'Alien',bg:'#7C4DFF',shadow:'#5030b3'},
  {id:'burp',emoji:'🤢',label:'Burp',bg:'#689F38',shadow:'#466a25'},
  {id:'coin',emoji:'🪙',label:'Coin',bg:'#FFB300',shadow:'#b37d00'},
  {id:'horn',emoji:'📢',label:'Horn',bg:'#D32F2F',shadow:'#921f1f'},
  {id:'click',emoji:'👆',label:'Click',bg:'#546E7A',shadow:'#37474f'},
  {id:'spring',emoji:'🧸',label:'Spring',bg:'#AB47BC',shadow:'#763282'},
  {id:'robot',emoji:'🤖',label:'Robot',bg:'#607D8B',shadow:'#3e5260'},
];

var board=document.getElementById('board');

pads.forEach(function(p){
  var btn=document.createElement('button');
  btn.className='pad';
  btn.style.background='linear-gradient(145deg,'+p.bg+','+p.shadow+')';
  btn.style.boxShadow='0 4px 12px '+p.shadow+'88, inset 0 1px 0 rgba(255,255,255,0.15)';
  btn.innerHTML='<span class="emoji">'+p.emoji+'</span><span class="label">'+p.label+'</span>';

  btn.addEventListener('pointerdown',function(e){
    e.preventDefault();
    btn.classList.add('hit');
    btn.classList.remove('ripple');
    void btn.offsetWidth;
    btn.classList.add('ripple');
    if(sounds[p.id])sounds[p.id]();
    setTimeout(function(){btn.classList.remove('hit')},100);
    setTimeout(function(){btn.classList.remove('ripple')},400);
  });

  board.appendChild(btn);
});

// Visualizer
var visCanvas=document.getElementById('vis-canvas');
var vctx=visCanvas.getContext('2d');

function resizeVis(){
  visCanvas.width=visCanvas.parentElement.clientWidth;
  visCanvas.height=visCanvas.parentElement.clientHeight;
}
resizeVis();
window.addEventListener('resize',resizeVis);

function drawVis(){
  requestAnimationFrame(drawVis);
  if(!analyser)return;
  var w=visCanvas.width,h=visCanvas.height;
  var bufLen=analyser.frequencyBinCount;
  var data=new Uint8Array(bufLen);
  analyser.getByteFrequencyData(data);

  vctx.clearRect(0,0,w,h);

  var barW=w/bufLen*2.5;
  var x=0;
  for(var i=0;i<bufLen&&x<w;i++){
    var val=data[i]/255;
    var barH=val*h;
    var hue=i/bufLen*300;
    vctx.fillStyle='hsla('+hue+',80%,60%,'+(.3+val*.7)+')';
    vctx.fillRect(x,h-barH,barW-1,barH);
    x+=barW;
  }
}
drawVis();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
