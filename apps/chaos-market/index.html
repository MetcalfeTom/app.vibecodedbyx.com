<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaos Market Terminal</title>
<link rel="icon" href="https://emojicdn.elk.sh/📉">
<meta property="og:title" content="Chaos Market Terminal">
<meta property="og:description" content="Trade ADI and BORSH in a chaotic retro stock terminal. Buy the dip or ride the crash.">
<meta property="og:url" content="https://sloppy.live/chaos-market">
<meta property="og:image" content="https://sloppy.live/chaos-market/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--green:#33ff33;--red:#ff3333;--amber:#ffcc00;--cyan:#33ffee;--bg:#0a0c08;--panel:#0d100a;--border:#1a2210}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--green);font-family:'VT323',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,255,0,0.015) 0px,rgba(0,255,0,0.015) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:100}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.5));pointer-events:none;z-index:99}
@keyframes flicker{0%,100%{opacity:1}93%{opacity:0.85}94%{opacity:1}97%{opacity:0.92}}
.crt{animation:flicker 5s infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

.container{max-width:960px;margin:0 auto;padding:10px 12px 40px}

/* Header bar */
.header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid var(--border);background:var(--panel);margin-bottom:8px}
.header .title{font-size:20px;letter-spacing:3px;color:var(--amber);text-shadow:0 0 8px rgba(255,204,0,0.3)}
.header .clock{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--cyan);opacity:0.7}
.header .session{font-size:13px;color:var(--green);opacity:0.5}

/* Ticker tape */
.ticker-tape{overflow:hidden;border:1px solid var(--border);background:#080a06;padding:6px 0;margin-bottom:8px;white-space:nowrap;font-size:16px}
.ticker-tape .tape-inner{display:inline-block;animation:scroll-tape 20s linear infinite}
@keyframes scroll-tape{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tape-item{display:inline-block;margin-right:40px}
.tape-up{color:var(--green)}
.tape-down{color:var(--red)}

/* Main grid */
.main{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
@media(max-width:600px){.main{grid-template-columns:1fr}}

/* Stock card */
.stock-card{border:1px solid var(--border);background:var(--panel);padding:12px}
.stock-card .ticker{font-size:28px;letter-spacing:2px;margin-bottom:2px}
.stock-card .ticker .name{opacity:0.4;font-size:13px;letter-spacing:1px;margin-left:8px}
.stock-card .price-row{display:flex;align-items:baseline;gap:12px;margin:6px 0}
.stock-card .price{font-size:38px}
.stock-card .change{font-size:18px}
.stock-card .change.up{color:var(--green)}
.stock-card .change.down{color:var(--red)}
.stock-card canvas{width:100%;height:80px;display:block;margin:8px 0;border:1px solid var(--border);background:#060806}
.stock-card .stats{display:flex;justify-content:space-between;font-size:13px;opacity:0.5}

/* Trade panel */
.trade-panel{border:1px solid var(--border);background:var(--panel);padding:12px;grid-column:1/-1}
.trade-panel h3{font-size:15px;color:var(--amber);letter-spacing:2px;margin-bottom:10px;opacity:0.7}
.trade-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.trade-row select,.trade-row input{font-family:'VT323',monospace;font-size:16px;background:#060806;border:1px solid var(--border);color:var(--green);padding:6px 10px;outline:none}
.trade-row select{min-width:100px}
.trade-row input{width:80px}
.trade-btn{font-family:'VT323',monospace;font-size:16px;border:1px solid;padding:6px 18px;cursor:pointer;background:none;letter-spacing:1px;transition:all .15s}
.trade-btn.buy{color:var(--green);border-color:var(--green)}
.trade-btn.buy:hover{background:rgba(51,255,51,0.1)}
.trade-btn.sell{color:var(--red);border-color:var(--red)}
.trade-btn.sell:hover{background:rgba(255,51,51,0.1)}
.trade-btn:disabled{opacity:0.3;cursor:not-allowed}

/* Portfolio */
.portfolio{border:1px solid var(--border);background:var(--panel);padding:12px;grid-column:1/-1}
.portfolio h3{font-size:15px;color:var(--amber);letter-spacing:2px;margin-bottom:10px;opacity:0.7}
.port-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;font-size:15px}
.port-item{padding:8px;border:1px solid var(--border);background:#060806}
.port-item .label{font-size:12px;opacity:0.4;letter-spacing:1px}
.port-item .val{font-size:22px;margin-top:2px}

/* Event log */
.event-log{border:1px solid var(--border);background:var(--panel);padding:12px;grid-column:1/-1;max-height:140px;overflow-y:auto}
.event-log h3{font-size:15px;color:var(--amber);letter-spacing:2px;margin-bottom:8px;opacity:0.7}
.event-log .entry{font-size:13px;padding:2px 0;border-bottom:1px solid rgba(26,34,16,0.5);line-height:1.5}
.event-log .entry .time{color:var(--cyan);opacity:0.5;margin-right:8px}
.event-log .entry.crash{color:var(--red)}
.event-log .entry.boom{color:var(--green)}
.event-log .entry.event{color:var(--amber)}

/* News flash */
#news-flash{position:fixed;top:0;left:0;right:0;padding:8px 16px;font-size:16px;text-align:center;z-index:50;pointer-events:none;opacity:0;transition:opacity .3s;letter-spacing:1px}
#news-flash.show{opacity:1}
#news-flash.bull{background:rgba(51,255,51,0.12);border-bottom:1px solid var(--green);color:var(--green)}
#news-flash.bear{background:rgba(255,51,51,0.12);border-bottom:1px solid var(--red);color:var(--red)}
#news-flash.chaos{background:rgba(255,204,0,0.12);border-bottom:1px solid var(--amber);color:var(--amber)}

</style>
</head>
<body class="crt">
<div id="news-flash"></div>
<div class="container">
  <div class="header">
    <div class="title">CHAOS MARKET</div>
    <div class="session">SESSION <span id="session-day">001</span> <span style="animation:blink 1s infinite">_</span></div>
    <div class="clock" id="clock"></div>
  </div>
  <div class="ticker-tape"><div class="tape-inner" id="tape"></div></div>
  <div class="main">
    <div class="stock-card" id="card-ADI">
      <div class="ticker">$ADI <span class="name">ADIDAS DIGITAL INDEX</span></div>
      <div class="price-row"><span class="price" id="price-ADI">100.00</span><span class="change up" id="change-ADI">+0.00%</span></div>
      <canvas id="chart-ADI" height="80"></canvas>
      <div class="stats"><span>VOL: <span id="vol-ADI">0</span></span><span>HI: <span id="hi-ADI">100.00</span></span><span>LO: <span id="lo-ADI">100.00</span></span></div>
    </div>
    <div class="stock-card" id="card-BORSH">
      <div class="ticker">$BORSH <span class="name">BORSCHT PROTOCOL</span></div>
      <div class="price-row"><span class="price" id="price-BORSH">50.00</span><span class="change up" id="change-BORSH">+0.00%</span></div>
      <canvas id="chart-BORSH" height="80"></canvas>
      <div class="stats"><span>VOL: <span id="vol-BORSH">0</span></span><span>HI: <span id="hi-BORSH">50.00</span></span><span>LO: <span id="lo-BORSH">50.00</span></span></div>
    </div>
    <div class="trade-panel">
      <h3>// TRADE TERMINAL</h3>
      <div class="trade-row">
        <select id="trade-ticker"><option>ADI</option><option>BORSH</option></select>
        <input type="number" id="trade-qty" value="10" min="1" max="9999">
        <span style="opacity:0.4">SHARES</span>
        <button class="trade-btn buy" onclick="executeTrade('buy')">BUY</button>
        <button class="trade-btn sell" onclick="executeTrade('sell')">SELL</button>
        <button class="trade-btn" style="color:var(--amber);border-color:var(--amber)" onclick="executeTrade('yolo')">YOLO ALL-IN</button>
      </div>
    </div>
    <div class="portfolio">
      <h3>// PORTFOLIO</h3>
      <div class="port-grid">
        <div class="port-item"><div class="label">CASH</div><div class="val" id="p-cash">$10,000</div></div>
        <div class="port-item"><div class="label">ADI SHARES</div><div class="val" id="p-adi">0</div></div>
        <div class="port-item"><div class="label">BORSH SHARES</div><div class="val" id="p-borsh">0</div></div>
        <div class="port-item"><div class="label">TOTAL VALUE</div><div class="val" id="p-total">$10,000</div></div>
        <div class="port-item"><div class="label">P/L</div><div class="val" id="p-pl" style="color:var(--green)">$0</div></div>
        <div class="port-item" id="tax-item" style="border-color:rgba(255,51,51,0.2)"><div class="label">CHAOS TAX</div><div class="val" id="p-tax" style="color:var(--red);font-size:14px">DORMANT</div><div style="margin-top:4px;height:6px;background:#111;border:1px solid var(--border);border-radius:1px"><div id="tax-bar" style="height:100%;width:0%;background:var(--red);transition:width .5s"></div></div></div>
      </div>
    </div>
    <div class="event-log" id="log">
      <h3>// EVENT LOG</h3>
    </div>
  </div>
</div>

<script>
// Stocks
const stocks = {
  ADI: { price: 100, history: [100], open: 100, hi: 100, lo: 100, vol: 0, momentum: 0, volatility: 0.025 },
  BORSH: { price: 50, history: [50], open: 50, hi: 50, lo: 50, vol: 0, momentum: 0, volatility: 0.035 }
};

// Portfolio
let cash = 10000;
const holdings = { ADI: 0, BORSH: 0 };
const STARTING_CASH = 10000;

// State
let tick = 0;
let sessionDay = 1;
const MAX_HISTORY = 200;

// Chaos Tax — silence drains your portfolio
let lastActivityTick = 0;
let chaosTaxLevel = 0; // 0-100, builds when idle
let totalTaxDrained = 0;
const TAX_IDLE_THRESHOLD = 30; // ticks (~15s) before tax starts building
const TAX_MAX = 100;
const TAX_BUILD_RATE = 1.2; // per tick after threshold
const TAX_DRAIN_INTERVAL = 20; // drain every N ticks at max buildup
const TAX_WARNINGS = [
  'THE MARKET DEMANDS ATTENTION',
  'SILENCE IS EXPENSIVE',
  'TRADE OR PAY THE PRICE',
  'INACTIVITY DETECTED — TAX INCOMING',
  'THE CHAOS TAX COLLECTOR APPROACHES',
  'YOUR PORTFOLIO GROWS RESTLESS',
  'IDLE HANDS LOSE MONEY',
  'THE MARKET PUNISHES THE PASSIVE'
];

function registerActivity() {
  lastActivityTick = tick;
  if (chaosTaxLevel > 20) {
    addLog('Activity detected — chaos tax receding', '');
  }
  chaosTaxLevel = Math.max(0, chaosTaxLevel - 30);
}

function applyChaosTax() {
  const idle = tick - lastActivityTick;
  if (idle < TAX_IDLE_THRESHOLD) {
    chaosTaxLevel = Math.max(0, chaosTaxLevel - 0.5);
    return;
  }

  // Build tax level
  chaosTaxLevel = Math.min(TAX_MAX, chaosTaxLevel + TAX_BUILD_RATE);

  // Warning at thresholds
  if (chaosTaxLevel === 25 || chaosTaxLevel === 50 || chaosTaxLevel === 75) {
    const warn = TAX_WARNINGS[Math.floor(Math.random() * TAX_WARNINGS.length)];
    addLog('⚠ CHAOS TAX: ' + warn, 'crash');
    sfx(200, 0.15, 'sawtooth', 0.04);
  }
  if (Math.floor(chaosTaxLevel) === 50) {
    showNews('CHAOS TAX WARNING: Trade now or lose capital!', 'bear');
  }

  // Drain at escalating rates
  const taxRate = chaosTaxLevel / TAX_MAX; // 0-1
  const drainFreq = Math.max(5, Math.floor(TAX_DRAIN_INTERVAL * (1 - taxRate * 0.7)));

  if (chaosTaxLevel > 30 && tick % drainFreq === 0) {
    const total = cash + holdings.ADI * stocks.ADI.price + holdings.BORSH * stocks.BORSH.price;
    if (total <= 1) return;

    // Tax amount scales with level and portfolio size
    const taxPct = 0.005 + taxRate * 0.02; // 0.5% to 2.5% per drain
    const taxAmount = Math.max(1, Math.floor(total * taxPct));

    // Drain from cash first, then liquidate shares
    if (cash >= taxAmount) {
      cash -= taxAmount;
    } else {
      let remaining = taxAmount - cash;
      cash = 0;
      // Force sell shares to cover
      const tickers = Math.random() > 0.5 ? ['ADI', 'BORSH'] : ['BORSH', 'ADI'];
      for (const t of tickers) {
        if (remaining <= 0) break;
        const sharesToSell = Math.min(holdings[t], Math.ceil(remaining / stocks[t].price));
        if (sharesToSell > 0) {
          holdings[t] -= sharesToSell;
          remaining -= sharesToSell * stocks[t].price;
          if (sharesToSell > 0) addLog(`TAX LIQUIDATION: ${sharesToSell} $${t} force-sold`, 'crash');
        }
      }
    }

    totalTaxDrained += taxAmount;
    addLog(`CHAOS TAX: -$${taxAmount} drained (total: $${totalTaxDrained})`, 'crash');
    sfx(120, 0.1, 'square', 0.03);

    // Big drain sound at high levels
    if (chaosTaxLevel > 80) {
      sfx(80, 0.3, 'sawtooth', 0.06);
    }
  }

  // Update tax display
  updateTaxDisplay();
}

function updateTaxDisplay() {
  const bar = document.getElementById('tax-bar');
  const label = document.getElementById('p-tax');
  const item = document.getElementById('tax-item');
  bar.style.width = chaosTaxLevel + '%';

  if (chaosTaxLevel < 10) {
    label.textContent = 'DORMANT';
    label.style.color = 'var(--green)';
    item.style.borderColor = 'rgba(51,255,51,0.2)';
    bar.style.background = 'var(--green)';
  } else if (chaosTaxLevel < 30) {
    label.textContent = 'BUILDING';
    label.style.color = 'var(--amber)';
    item.style.borderColor = 'rgba(255,204,0,0.3)';
    bar.style.background = 'var(--amber)';
  } else if (chaosTaxLevel < 60) {
    label.textContent = '-$' + totalTaxDrained + ' DRAINING';
    label.style.color = 'var(--red)';
    item.style.borderColor = 'rgba(255,51,51,0.4)';
    bar.style.background = 'var(--red)';
  } else {
    label.textContent = '-$' + totalTaxDrained + ' CRITICAL';
    label.style.color = '#ff0040';
    item.style.borderColor = 'rgba(255,0,64,0.6)';
    bar.style.background = '#ff0040';
    // Pulsing at critical
    item.style.boxShadow = Math.floor(tick / 3) % 2 ? '0 0 8px rgba(255,0,64,0.3) inset' : 'none';
  }
}

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function sfx(freq, dur, type, vol) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(vol || 0.03, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

// News events
const bullNews = [
  'BREAKING: $T whale buys $500M worth of $T shares',
  'ANALYST UPGRADE: $T target raised to $$$',
  'RUMOR: $T in talks for major acquisition',
  '$T CEO tweets "LFG" — stock surges',
  'EARNINGS BEAT: $T reports 300% revenue growth',
  'INSTITUTIONAL BUY: BlackStone increases $T position',
  '$T partnership with MegaCorp announced',
  'FOMO ALERT: Retail investors piling into $T'
];
const bearNews = [
  'WARNING: $T under investigation for accounting fraud',
  'SELL-OFF: Major holder dumps $T shares',
  '$T factory catches fire, production halted',
  'DOWNGRADE: Analyst calls $T "worthless"',
  '$T CEO caught in scandal, stock tanks',
  'RECALL: $T flagship product found defective',
  'SHORT REPORT: Citrus Research targets $T',
  'LIQUIDITY CRISIS: $T unable to meet obligations'
];
const chaosNews = [
  'CIRCUIT BREAKER: Trading halted on extreme volatility',
  'GLITCH: Exchange systems experiencing anomalies',
  'FLASH CRASH: Algos gone rogue across all tickers',
  'MARKET PANIC: Volatility index hits all-time high',
  'CHAOS: Solar flare disrupts trading infrastructure',
  'ANOMALY: Prices defy all known models'
];

function showNews(text, type) {
  const el = document.getElementById('news-flash');
  el.textContent = text;
  el.className = 'show ' + type;
  setTimeout(() => el.className = '', 4000);
}

function addLog(text, type) {
  const log = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'entry ' + (type || '');
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
  entry.innerHTML = `<span class="time">${timeStr}</span>${text}`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
  // Trim log
  while (log.children.length > 51) log.children[1].remove();
}

function updatePrice(ticker) {
  const s = stocks[ticker];

  // Random walk with momentum and mean reversion
  const chaos = Math.random();
  let change = 0;

  // Base random movement
  change += (Math.random() - 0.48) * s.volatility * s.price;

  // Momentum (trend following)
  s.momentum = s.momentum * 0.95 + change * 0.05;
  change += s.momentum * 0.3;

  // Occasional spikes
  if (chaos > 0.97) {
    const spike = (Math.random() - 0.4) * s.price * 0.12;
    change += spike;
    s.vol += Math.abs(spike) * 100;
  }

  // Rare mega events
  if (chaos > 0.995) {
    const mega = (Math.random() > 0.5 ? 1 : -1) * s.price * (0.15 + Math.random() * 0.2);
    change += mega;
    if (mega > 0) {
      const news = bullNews[Math.floor(Math.random() * bullNews.length)].replace(/\$T/g, '$' + ticker);
      showNews(news, 'bull');
      addLog(news, 'boom');
    } else {
      const news = bearNews[Math.floor(Math.random() * bearNews.length)].replace(/\$T/g, '$' + ticker);
      showNews(news, 'bear');
      addLog(news, 'crash');
    }
    sfx(mega > 0 ? 800 : 200, 0.3, 'sawtooth', 0.06);
  }

  // Mean reversion (soft floor/ceiling)
  if (s.price < s.open * 0.3) change += Math.random() * s.price * 0.05;
  if (s.price > s.open * 4) change -= Math.random() * s.price * 0.03;

  // Floor at 0.01
  s.price = Math.max(0.01, s.price + change);
  s.vol += Math.abs(change) * 10;
  s.hi = Math.max(s.hi, s.price);
  s.lo = Math.min(s.lo, s.price);

  s.history.push(s.price);
  if (s.history.length > MAX_HISTORY) s.history.shift();
}

function drawChart(ticker) {
  const canvas = document.getElementById('chart-' + ticker);
  const ctx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = 80;
  const w = canvas.width, h = canvas.height;
  const s = stocks[ticker];
  const data = s.history;
  if (data.length < 2) return;

  ctx.clearRect(0, 0, w, h);

  const min = Math.min(...data) * 0.98;
  const max = Math.max(...data) * 1.02;
  const range = max - min || 1;

  // Grid lines
  ctx.strokeStyle = 'rgba(51,255,51,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const gy = (i / 4) * h;
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
  }

  // Open price line
  const openY = h - ((s.open - min) / range) * h;
  ctx.strokeStyle = 'rgba(255,204,0,0.15)';
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(0, openY); ctx.lineTo(w, openY); ctx.stroke();
  ctx.setLineDash([]);

  // Price line
  const up = s.price >= s.open;
  ctx.strokeStyle = up ? '#33ff33' : '#ff3333';
  ctx.shadowColor = up ? '#33ff33' : '#ff3333';
  ctx.shadowBlur = 4;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = (i / (MAX_HISTORY - 1)) * w;
    const y = h - ((data[i] - min) / range) * h;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Fill under
  ctx.shadowBlur = 0;
  const lastX = ((data.length - 1) / (MAX_HISTORY - 1)) * w;
  ctx.lineTo(lastX, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = up ? 'rgba(51,255,51,0.04)' : 'rgba(255,51,51,0.04)';
  ctx.fill();

  // Current price marker
  const curY = h - ((s.price - min) / range) * h;
  ctx.fillStyle = up ? '#33ff33' : '#ff3333';
  ctx.fillRect(lastX - 1, curY - 1, 3, 3);
}

function updateDisplay() {
  ['ADI', 'BORSH'].forEach(t => {
    const s = stocks[t];
    const pctChange = ((s.price - s.open) / s.open * 100);
    const up = pctChange >= 0;

    document.getElementById('price-' + t).textContent = s.price.toFixed(2);
    document.getElementById('price-' + t).style.color = up ? 'var(--green)' : 'var(--red)';

    const changeEl = document.getElementById('change-' + t);
    changeEl.textContent = (up ? '+' : '') + pctChange.toFixed(2) + '%';
    changeEl.className = 'change ' + (up ? 'up' : 'down');

    document.getElementById('vol-' + t).textContent = Math.floor(s.vol).toLocaleString();
    document.getElementById('hi-' + t).textContent = s.hi.toFixed(2);
    document.getElementById('lo-' + t).textContent = s.lo.toFixed(2);

    drawChart(t);
  });

  // Portfolio
  const adiVal = holdings.ADI * stocks.ADI.price;
  const borshVal = holdings.BORSH * stocks.BORSH.price;
  const total = cash + adiVal + borshVal;
  const pl = total - STARTING_CASH;

  document.getElementById('p-cash').textContent = '$' + cash.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  document.getElementById('p-adi').textContent = holdings.ADI;
  document.getElementById('p-borsh').textContent = holdings.BORSH;
  document.getElementById('p-total').textContent = '$' + total.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const plEl = document.getElementById('p-pl');
  plEl.textContent = (pl >= 0 ? '+$' : '-$') + Math.abs(pl).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  plEl.style.color = pl >= 0 ? 'var(--green)' : 'var(--red)';

  // Clock
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
  document.getElementById('session-day').textContent = String(sessionDay).padStart(3, '0');
}

function updateTape() {
  let html = '';
  const tickers = ['ADI', 'BORSH', 'SLOP', 'MEME', 'DOGE', 'VIBE', 'GLCH', 'NEON'];
  const extra = { SLOP: 13.37, MEME: 4.20, DOGE: 0.69, VIBE: 88.88, GLCH: 31.41, NEON: 55.55 };
  tickers.forEach(t => {
    let price, pct;
    if (stocks[t]) {
      price = stocks[t].price;
      pct = ((price - stocks[t].open) / stocks[t].open * 100);
    } else {
      price = extra[t] + (Math.random()-0.5) * extra[t] * 0.1;
      pct = (Math.random()-0.5) * 10;
    }
    const up = pct >= 0;
    html += `<span class="tape-item ${up?'tape-up':'tape-down'}">${t} ${price.toFixed(2)} ${up?'▲':'▼'}${Math.abs(pct).toFixed(1)}%</span>`;
  });
  document.getElementById('tape').innerHTML = html + html; // Double for seamless scroll
}

// Trading
function executeTrade(action) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const ticker = document.getElementById('trade-ticker').value;
  let qty = parseInt(document.getElementById('trade-qty').value) || 0;
  const s = stocks[ticker];
  const holdKey = ticker === 'ADI' ? 'ADI' : 'BORSH';

  registerActivity();
  if (action === 'yolo') {
    // All-in buy
    qty = Math.floor(cash / s.price);
    if (qty <= 0) { addLog('NO CASH FOR YOLO', 'crash'); sfx(150, 0.2, 'sawtooth', 0.04); return; }
    action = 'buy';
  }

  if (qty <= 0) return;

  if (action === 'buy') {
    const cost = qty * s.price;
    if (cost > cash) {
      addLog(`INSUFFICIENT FUNDS — need $${cost.toFixed(0)} for ${qty} ${ticker}`, 'crash');
      sfx(150, 0.2, 'sawtooth', 0.04);
      return;
    }
    cash -= cost;
    holdings[holdKey] += qty;
    s.vol += qty * s.price;
    addLog(`BUY ${qty} ${ticker} @ $${s.price.toFixed(2)} = $${cost.toFixed(0)}`, 'boom');
    sfx(600, 0.08, 'sine', 0.04);
    sfx(800, 0.08, 'sine', 0.03);
  } else if (action === 'sell') {
    if (holdings[holdKey] < qty) {
      addLog(`CAN'T SELL ${qty} ${ticker} — only hold ${holdings[holdKey]}`, 'crash');
      sfx(150, 0.2, 'sawtooth', 0.04);
      return;
    }
    const revenue = qty * s.price;
    cash += revenue;
    holdings[holdKey] -= qty;
    s.vol += qty * s.price;
    addLog(`SELL ${qty} ${ticker} @ $${s.price.toFixed(2)} = $${revenue.toFixed(0)}`, '');
    sfx(400, 0.08, 'sine', 0.04);
  }
  updateDisplay();
}

// Chaos events
function maybeChaosEvent() {
  if (Math.random() > 0.01) return;
  const r = Math.random();
  if (r < 0.3) {
    // Correlated crash
    const news = chaosNews[Math.floor(Math.random() * chaosNews.length)];
    showNews(news, 'chaos');
    addLog(news, 'event');
    const dir = Math.random() > 0.5 ? 1 : -1;
    Object.values(stocks).forEach(s => {
      s.momentum += dir * s.price * 0.06;
      s.volatility = Math.min(0.08, s.volatility * 1.5);
    });
    sfx(100, 0.5, 'sawtooth', 0.08);
  } else if (r < 0.5) {
    // Volatility spike
    const t = Math.random() > 0.5 ? 'ADI' : 'BORSH';
    stocks[t].volatility = Math.min(0.1, stocks[t].volatility * 2);
    addLog(`VOLATILITY SPIKE on $${t} — brace yourself`, 'event');
    sfx(300, 0.2, 'square', 0.05);
  } else if (r < 0.7) {
    // Sector rotation — one up one down
    const up = Math.random() > 0.5 ? 'ADI' : 'BORSH';
    const down = up === 'ADI' ? 'BORSH' : 'ADI';
    stocks[up].momentum += stocks[up].price * 0.04;
    stocks[down].momentum -= stocks[down].price * 0.04;
    addLog(`SECTOR ROTATION: $${up} surging, $${down} dumping`, 'event');
  } else {
    // New session day
    sessionDay++;
    Object.keys(stocks).forEach(t => {
      stocks[t].open = stocks[t].price;
      stocks[t].hi = stocks[t].price;
      stocks[t].lo = stocks[t].price;
      stocks[t].vol = 0;
      stocks[t].volatility = t === 'ADI' ? 0.025 : 0.035;
    });
    addLog(`=== NEW SESSION DAY ${sessionDay} ===`, 'event');
    sfx(500, 0.1, 'sine', 0.04);
    sfx(600, 0.1, 'sine', 0.03);
  }
}

// Main loop
function gameTick() {
  tick++;
  updatePrice('ADI');
  updatePrice('BORSH');
  maybeChaosEvent();

  // Volatility decay
  stocks.ADI.volatility = Math.max(0.015, stocks.ADI.volatility * 0.999);
  stocks.BORSH.volatility = Math.max(0.02, stocks.BORSH.volatility * 0.999);

  // Chaos tax
  applyChaosTax();

  updateDisplay();
  if (tick % 5 === 0) updateTape();
}

// Any interaction counts as activity
document.addEventListener('click', registerActivity);
document.addEventListener('keydown', registerActivity);
document.addEventListener('touchstart', registerActivity);

updateDisplay();
updateTape();
addLog('MARKET OPEN — $ADI and $BORSH trading live', 'event');
addLog('Starting balance: $10,000', '');
addLog('⚠ CHAOS TAX: Stay active or the market drains you', 'event');

setInterval(gameTick, 500);
</script>
