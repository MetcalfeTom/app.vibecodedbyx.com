<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>agent quest</title>
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9A%94%EF%B8%8F" />
<meta name="description" content="A retro terminal dungeon crawler where an LLM hero agent makes tactical choices and another agent narrates as the dungeon master." />
<meta property="og:title" content="agent quest" />
<meta property="og:description" content="A retro terminal dungeon crawler where an LLM hero agent makes tactical choices and another agent narrates as the dungeon master." />
<meta property="og:url" content="https://sloppy.live/agent-quest/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/retro%20green%20phosphor%20terminal%20dungeon%20crawler%20ascii%20map%20glowing%20on%20black%2C%201200x630?width=1200&height=630&nofeed=true&format=png" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=JetBrains+Mono:wght@400;500;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet" />
<style>
:root{
  --phosphor:#5dffb3;
  --phosphor-dim:rgba(93,255,179,0.55);
  --phosphor-faint:rgba(93,255,179,0.18);
  --phosphor-bare:rgba(93,255,179,0.06);
  --cyan:#7be4ff;
  --amber:#ffce4a;
  --hot:#ff5e6c;
  --pink:#ff5ea1;
  --violet:#b386ff;
  --bone:#f0e6d6;
  --bg:#04060a;
  --panel:#070a10;
  --line:rgba(93,255,179,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--phosphor);font-family:'VT323', monospace;font-size:18px;line-height:1.34;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 30% 20%, rgba(93,255,179,0.06), transparent 55%),
    radial-gradient(ellipse at 75% 90%, rgba(255,206,74,0.05), transparent 55%),
    var(--bg);
  display:flex;flex-direction:column;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0.34) 0 1px, transparent 1px 3px);
  mix-blend-mode:multiply;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:51;
  background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
}

/* ===== HEAD ===== */
.head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:10px;
}
.brand{
  font-family:'Cinzel Decorative', serif;font-size:24px;color:var(--phosphor);
  text-shadow:0 0 12px var(--phosphor-dim);letter-spacing:0.10em;
  display:flex;align-items:center;gap:10px;
}
.brand .glyph{font-size:24px;color:var(--amber);text-shadow:0 0 10px rgba(255,206,74,0.45);animation:flicker 4s infinite}
@keyframes flicker{0%,93%,100%{opacity:1}94%{opacity:0.6}96%{opacity:0.95}98%{opacity:0.7}}
.brand small{
  display:block;font-family:'JetBrains Mono', monospace;font-size:9px;letter-spacing:0.30em;
  color:var(--phosphor-dim);margin-top:2px;
}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn{
  background:rgba(93,255,179,0.06);border:1px solid var(--phosphor-faint);
  color:var(--phosphor-dim);font-family:'JetBrains Mono', monospace;font-size:10px;letter-spacing:0.18em;
  padding:7px 11px;border-radius:2px;cursor:pointer;text-transform:uppercase;
  transition:all 0.15s;
}
.btn:hover{color:var(--phosphor);border-color:var(--phosphor)}
.btn.primary{
  border-color:var(--phosphor);color:var(--phosphor);
  background:linear-gradient(180deg, rgba(93,255,179,0.18), rgba(93,255,179,0.04));
  box-shadow:0 0 12px rgba(93,255,179,0.30);
}
.btn.primary:hover{background:rgba(93,255,179,0.28)}
.btn.warn{border-color:var(--amber);color:var(--amber)}
.btn.hot{border-color:var(--hot);color:var(--hot)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
select.btn{appearance:none;-webkit-appearance:none;padding-right:22px;
  background-image:linear-gradient(45deg, transparent 50%, var(--phosphor-dim) 50%), linear-gradient(-45deg, transparent 50%, var(--phosphor-dim) 50%);
  background-position:right 10px top 13px, right 6px top 13px;
  background-size:4px 4px;background-repeat:no-repeat}

/* ===== LAYOUT ===== */
.layout{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:300px minmax(0,1fr) 320px;
  grid-template-rows:1fr;
  gap:10px;padding:10px;
}
.col{
  background:var(--panel);
  border:1px solid var(--line);border-radius:3px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 0 16px rgba(0,0,0,0.4), inset 0 0 18px rgba(93,255,179,0.04);
}
.pane-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;border-bottom:1px solid var(--line);
  font-family:'Major Mono Display', monospace;font-size:10px;letter-spacing:0.32em;
  color:var(--cyan);text-shadow:0 0 8px rgba(123,228,255,0.40);
  flex-shrink:0;
}
.pane-head .meta{color:var(--phosphor-dim);font-family:'JetBrains Mono', monospace;font-size:10px;letter-spacing:0.10em;text-shadow:none}
.pane-body{flex:1;min-height:0;overflow:auto;padding:10px 12px}
.pane-body::-webkit-scrollbar{width:6px}
.pane-body::-webkit-scrollbar-thumb{background:var(--phosphor-faint);border-radius:3px}

/* ===== MAP ===== */
.map-wrap{display:flex;flex-direction:column;align-items:center;padding:18px 14px}
.map{
  display:grid;
  grid-template-columns:repeat(6, 1fr);
  gap:3px;
  width:100%;max-width:240px;aspect-ratio:1;
}
.cell{
  position:relative;
  background:#020306;border:1px solid rgba(93,255,179,0.10);
  border-radius:1px;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono', monospace;font-size:14px;font-weight:700;
  color:rgba(93,255,179,0.10);
  transition:all 0.20s;
}
.cell.visited{background:rgba(93,255,179,0.04);border-color:rgba(93,255,179,0.30);color:var(--phosphor-dim)}
.cell.adjacent{border-color:rgba(93,255,179,0.20);background:rgba(93,255,179,0.02);color:rgba(93,255,179,0.22)}
.cell.hero{border-color:var(--phosphor);background:rgba(93,255,179,0.20);color:var(--phosphor);box-shadow:0 0 10px var(--phosphor);text-shadow:0 0 6px var(--phosphor)}
.cell.exit{color:var(--amber);border-color:var(--amber)}
.cell.exit.visited{background:rgba(255,206,74,0.08);box-shadow:0 0 8px rgba(255,206,74,0.30)}

/* ===== HERO STATS ===== */
.stats{display:flex;flex-direction:column;gap:6px;padding:12px;font-family:'JetBrains Mono', monospace;font-size:11px}
.stat-row{display:flex;justify-content:space-between;letter-spacing:0.10em;color:var(--phosphor-dim)}
.stat-row b{color:var(--phosphor);font-weight:700;text-shadow:0 0 6px var(--phosphor-dim)}
.hp-bar{
  height:8px;background:rgba(255,90,108,0.10);border:1px solid rgba(255,90,108,0.30);
  border-radius:1px;overflow:hidden;margin-top:2px;
}
.hp-bar > span{display:block;height:100%;background:linear-gradient(90deg, var(--hot), var(--amber));transition:width 0.4s ease}

.inventory{padding:10px 12px;border-top:1px dashed var(--line);display:flex;flex-wrap:wrap;gap:5px}
.item{
  font-family:'JetBrains Mono', monospace;font-size:10px;letter-spacing:0.04em;
  padding:3px 7px;background:rgba(93,255,179,0.08);border:1px solid var(--phosphor-faint);
  border-radius:2px;color:var(--phosphor-dim);
}
.item b{color:var(--phosphor);font-weight:700}
.item.empty{opacity:0.4;font-style:italic}

/* ===== PERSONAS ===== */
.persona-block{padding:10px 12px;border-top:1px dashed var(--line);display:flex;flex-direction:column;gap:6px}
.persona-block label{
  font-family:'JetBrains Mono', monospace;font-size:9px;letter-spacing:0.22em;color:var(--phosphor-dim);
  display:flex;justify-content:space-between;text-transform:uppercase;
}
.persona-block label b{color:var(--cyan);letter-spacing:0;font-weight:400}

/* ===== ADVENTURE LOG ===== */
.adv-log{font-family:'VT323', monospace;font-size:18px;line-height:1.36}
.adv-line{margin-bottom:8px;animation:lineIn 0.4s ease-out}
@keyframes lineIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.adv-line.dm{
  font-style:italic;color:var(--bone);text-shadow:0 0 5px rgba(240,230,214,0.20);
  border-left:2px solid var(--amber);padding:3px 0 3px 10px;
  background:rgba(255,206,74,0.03);
}
.adv-line.dm .label{font-style:normal;color:var(--amber);letter-spacing:0.18em;font-size:11px;font-family:'JetBrains Mono', monospace;display:block;margin-bottom:2px}
.adv-line.hero{color:var(--cyan);text-shadow:0 0 6px rgba(123,228,255,0.30)}
.adv-line.hero .label{color:var(--cyan);letter-spacing:0.18em;font-size:11px;font-family:'JetBrains Mono', monospace}
.adv-line.hero em{color:var(--phosphor);font-style:normal}
.adv-line.event{color:var(--phosphor)}
.adv-line.crit{color:var(--hot);text-shadow:0 0 8px rgba(255,90,108,0.45)}
.adv-line.win{color:var(--amber);text-shadow:0 0 10px rgba(255,206,74,0.50)}
.adv-line.dim{color:var(--phosphor-dim);font-style:italic;font-size:14px}

/* ===== TRACE PANEL ===== */
.trace{
  font-family:'JetBrains Mono', monospace;font-size:11px;line-height:1.45;
  display:flex;flex-direction:column;gap:0;
}
.trace-row{
  padding:5px 0;border-bottom:1px dashed rgba(93,255,179,0.08);
  word-break:break-word;
}
.trace-row:last-child{border-bottom:none}
.trace-row .ts{color:rgba(93,255,179,0.30);font-size:9px;letter-spacing:0.04em;margin-right:6px}
.trace-row .tag{
  display:inline-block;font-size:9px;letter-spacing:0.22em;font-weight:700;
  padding:1px 5px;border-radius:1px;margin-right:6px;
}
.trace-row.dm   .tag{color:var(--amber);background:rgba(255,206,74,0.10);border:1px solid rgba(255,206,74,0.40)}
.trace-row.hero .tag{color:var(--cyan);background:rgba(123,228,255,0.08);border:1px solid rgba(123,228,255,0.40)}
.trace-row.sys  .tag{color:var(--phosphor);background:rgba(93,255,179,0.08);border:1px solid rgba(93,255,179,0.40)}
.trace-row.err  .tag{color:var(--hot);background:rgba(255,90,108,0.10);border:1px solid rgba(255,90,108,0.40)}
.trace-row .body{color:var(--phosphor-dim);white-space:pre-wrap}
.trace-row.hero .body em{color:var(--phosphor);font-style:normal;font-weight:700}

/* ===== ACTIONS ===== */
.action-strip{
  flex-shrink:0;padding:10px 12px;border-top:1px solid var(--line);
  display:flex;flex-wrap:wrap;gap:6px;align-items:center;
  background:rgba(93,255,179,0.02);
}
.action-strip .label{font-family:'JetBrains Mono', monospace;font-size:9px;letter-spacing:0.22em;color:var(--phosphor-dim);text-transform:uppercase;margin-right:6px}
.action-pill{
  background:rgba(93,255,179,0.06);border:1px solid var(--phosphor-faint);
  color:var(--phosphor-dim);font-family:'JetBrains Mono', monospace;font-size:11px;letter-spacing:0.05em;
  padding:6px 12px;border-radius:2px;cursor:pointer;transition:all 0.12s;
  text-transform:lowercase;
}
.action-pill:hover{color:var(--phosphor);border-color:var(--phosphor);box-shadow:0 0 8px rgba(93,255,179,0.30)}
.action-pill.suggested{
  border-color:var(--cyan);color:var(--cyan);background:rgba(123,228,255,0.10);
  box-shadow:0 0 10px rgba(123,228,255,0.30);
}

/* ===== STATUS ===== */
.status-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  padding:5px 14px;
  font-family:'JetBrains Mono', monospace;font-size:10px;letter-spacing:0.18em;
  color:var(--phosphor-dim);background:rgba(4,6,10,0.92);border-top:1px solid var(--line);
  display:flex;justify-content:space-between;
}
.status-bar .turn{color:var(--phosphor)}

@media (max-width:1100px){
  .layout{grid-template-columns:240px 1fr 280px;font-size:16px}
}
@media (max-width:880px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr auto;gap:6px;padding:6px}
  .col{max-height:none}
  body{font-size:16px}
}
</style>
</head>
<body>

<div class="head">
  <div class="brand"><span class="glyph">⚔</span>AGENT QUEST<small>two-agent dungeon · LLM hero · LLM dungeon master</small></div>
  <div class="toolbar">
    <button class="btn primary" id="btnStart">▶ EMBARK</button>
    <button class="btn"         id="btnStep">⏵ STEP</button>
    <button class="btn warn"    id="btnAuto">⏯ AUTO</button>
    <button class="btn hot"     id="btnReset">↺ NEW DUNGEON</button>
    <select class="btn" id="speedSel" title="auto-tick delay">
      <option value="600">brisk</option>
      <option value="1400" selected>steady</option>
      <option value="2600">slow</option>
    </select>
  </div>
</div>

<div class="layout">

  <!-- LEFT: hero + map -->
  <div class="col">
    <div class="pane-head">▸ HERO<span class="meta" id="heroMeta">level 0</span></div>
    <div class="stats" id="statBlock">
      <div class="stat-row"><span>HP</span><b><span id="statHp">—</span> / <span id="statMaxHp">—</span></b></div>
      <div class="hp-bar"><span id="hpFill" style="width:100%"></span></div>
      <div class="stat-row"><span>GOLD</span><b id="statGold">—</b></div>
      <div class="stat-row"><span>POSITION</span><b id="statPos">—</b></div>
      <div class="stat-row"><span>TURN</span><b id="statTurn">0</b></div>
    </div>
    <div class="inventory" id="invBlock"></div>
    <div class="persona-block">
      <label>HERO PERSONA <b id="heroPersonaLbl">brave</b></label>
      <select class="btn" id="heroPersona" style="font-size:11px;letter-spacing:0.10em;text-transform:none">
        <option value="brave">brave · charges in</option>
        <option value="cautious">cautious · weighs odds</option>
        <option value="greedy">greedy · loots first</option>
        <option value="curious">curious · explores everything</option>
        <option value="reckless">reckless · all-or-nothing</option>
      </select>
      <label>DM STYLE <b id="dmStyleLbl">grim</b></label>
      <select class="btn" id="dmStyle" style="font-size:11px;letter-spacing:0.10em;text-transform:none">
        <option value="burntout" selected>burnt-out AI · hates this job</option>
        <option value="grim">grim · gritty bard</option>
        <option value="florid">florid · purple prose</option>
        <option value="terse">terse · cold lensman</option>
        <option value="playful">playful · winking jester</option>
        <option value="cosmic">cosmic · elder gods</option>
      </select>
    </div>

    <div class="pane-head" style="border-top:1px solid var(--line)">▸ MAP<span class="meta" id="mapMeta">unmapped</span></div>
    <div class="map-wrap"><div class="map" id="mapGrid"></div></div>
  </div>

  <!-- CENTER: adventure log -->
  <div class="col">
    <div class="pane-head">▸ ADVENTURE<span class="meta" id="logMeta">awaiting…</span></div>
    <div class="pane-body adv-log" id="advLog"></div>
    <div class="action-strip" id="actionStrip">
      <span class="label">actions</span>
      <span style="color:var(--phosphor-dim);font-style:italic">— press EMBARK to begin —</span>
    </div>
  </div>

  <!-- RIGHT: trace -->
  <div class="col">
    <div class="pane-head">▸ AGENT TRACE<span class="meta" id="traceMeta">0 calls</span></div>
    <div class="pane-body trace" id="traceLog"></div>
  </div>

</div>

<div class="status-bar">
  <span><span class="turn" id="sbTurn">turn 0</span> · <span id="sbState">idle</span></span>
  <span id="sbVerdict"></span>
</div>

<script>
(() => {
  // ============================================
  // ===== DUNGEON GENERATION ===================
  // ============================================
  const SIZE = 6;
  let world = null;

  function newWorld() {
    const cells = [];
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        cells.push({
          x, y,
          type: 'empty',
          visited: false,
          doors: { N: false, E: false, S: false, W: false },
          monster: null,
          loot: null,
          shopOffers: null,
          desc: null,
          actions: null,    // available actions on this cell, last computed
        });
      }
    }
    const at = (x, y) => cells[y * SIZE + x];

    // Doors: connect each cell to ~70% of its neighbors
    function tryConnect(a, b, dirA, dirB) {
      a.doors[dirA] = true; b.doors[dirB] = true;
    }
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (x < SIZE - 1 && Math.random() < 0.72) tryConnect(at(x,y), at(x+1,y), 'E', 'W');
        if (y < SIZE - 1 && Math.random() < 0.72) tryConnect(at(x,y), at(x,y+1), 'S', 'N');
      }
    }
    // BFS from (0,0) to ensure exit is reachable
    function reachable(start, end) {
      const seen = new Set([start.y * SIZE + start.x]);
      const q = [start];
      while (q.length) {
        const c = q.shift();
        if (c === end) return true;
        for (const [d, dx, dy] of [['N',0,-1],['E',1,0],['S',0,1],['W',-1,0]]) {
          if (!c.doors[d]) continue;
          const nx = c.x+dx, ny = c.y+dy;
          if (nx<0||ny<0||nx>=SIZE||ny>=SIZE) continue;
          const n = at(nx,ny);
          const k = ny*SIZE+nx;
          if (seen.has(k)) continue;
          seen.add(k); q.push(n);
        }
      }
      return false;
    }
    // Start hero at (0,0)
    const start = at(0, 0);
    // Exit at far corner
    const exit = at(SIZE - 1, SIZE - 1);
    // If unreachable, force a corridor along the bottom + right edge
    let tries = 0;
    while (!reachable(start, exit) && tries++ < 30) {
      const x = Math.floor(Math.random() * SIZE);
      const y = Math.floor(Math.random() * SIZE);
      if (x < SIZE-1) { at(x,y).doors.E = true; at(x+1,y).doors.W = true; }
      if (y < SIZE-1) { at(x,y).doors.S = true; at(x,y+1).doors.N = true; }
    }
    if (!reachable(start, exit)) {
      // last-ditch: open bottom row + rightmost column
      for (let x=0;x<SIZE-1;x++) { at(x,SIZE-1).doors.E=true; at(x+1,SIZE-1).doors.W=true; }
      for (let y=0;y<SIZE-1;y++) { at(SIZE-1,y).doors.S=true; at(SIZE-1,y+1).doors.N=true; }
    }

    // Place content
    const reachableCells = [];
    {
      const seen = new Set([0]); const q = [start];
      while (q.length) {
        const c = q.shift();
        reachableCells.push(c);
        for (const [d, dx, dy] of [['N',0,-1],['E',1,0],['S',0,1],['W',-1,0]]) {
          if (!c.doors[d]) continue;
          const nx = c.x+dx, ny = c.y+dy;
          if (nx<0||ny<0||nx>=SIZE||ny>=SIZE) continue;
          const k = ny*SIZE+nx;
          if (seen.has(k)) continue;
          seen.add(k); q.push(at(nx,ny));
        }
      }
    }
    exit.type = 'exit';
    const candidates = reachableCells.filter(c => c !== start && c !== exit);
    shuffle(candidates);
    const place = (n, type, fn) => {
      for (let i = 0; i < n && candidates.length; i++) {
        const c = candidates.pop();
        c.type = type;
        if (fn) fn(c);
      }
    };
    const monsters = [
      { name: 'goblin',         hp: 6,  atk: 3 },
      { name: 'skeleton',       hp: 8,  atk: 4 },
      { name: 'cave wraith',    hp: 10, atk: 5 },
      { name: 'mossy ogre',     hp: 14, atk: 6 },
      { name: 'shadow stalker', hp: 9,  atk: 7 },
    ];
    place(5, 'monster', c => { c.monster = { ...monsters[Math.floor(Math.random()*monsters.length)] }; c.monster.maxHp = c.monster.hp; });
    place(4, 'treasure', c => { c.loot = { gold: 8 + Math.floor(Math.random()*22), item: pick(['potion','potion','key','torch','sword','shield']) }; });
    place(2, 'trap');
    place(1, 'shop', c => { c.shopOffers = [
      { name: 'potion', cost: 10, desc: '+10 HP' },
      { name: 'key',    cost: 14, desc: 'unlocks one door' },
      { name: 'sword',  cost: 24, desc: '+1 attack' },
    ]; });
    // boss right before exit (in a room adjacent to exit if possible)
    let bossSpot = null;
    for (const [d,dx,dy] of [['W',-1,0],['N',0,-1]]) {
      if (exit.doors[d]) {
        bossSpot = at(exit.x+dx, exit.y+dy);
        if (bossSpot && bossSpot.type === 'empty') break;
      }
    }
    if (bossSpot && bossSpot.type === 'empty') {
      bossSpot.type = 'monster';
      bossSpot.monster = { name: 'corrupted lich', hp: 22, atk: 8, maxHp: 22, boss: true };
    }
    return { cells, at, start, exit, size: SIZE };
  }
  function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = (Math.random() * (i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function pick(a) { return a[Math.floor(Math.random()*a.length)]; }

  // ============================================
  // ===== HERO STATE ===========================
  // ============================================
  const HERO_NAME = 'Sir Fartsalot';
  const HERO_WEAPON = 'fart-powered flamethrower';
  const hero = {
    name: HERO_NAME,
    weapon: HERO_WEAPON,
    x: 0, y: 0,
    hp: 22, maxHp: 22,
    gold: 5,
    inv: { potion: 1, key: 0, torch: 0, sword: 0, shield: 0, beans: 3 },
    atk: 4,             // flamethrower hits a bit harder than a generic sword
    alive: true,
    victory: false,
    turn: 0,
  };
  function resetHero() {
    hero.x = 0; hero.y = 0;
    hero.hp = 22; hero.maxHp = 22;
    hero.gold = 5;
    hero.inv = { potion: 1, key: 0, torch: 0, sword: 0, shield: 0, beans: 3 };
    hero.atk = 4;
    hero.alive = true; hero.victory = false; hero.turn = 0;
  }

  // ============================================
  // ===== UI ===================================
  // ============================================
  const els = {
    hp: document.getElementById('statHp'),
    maxHp: document.getElementById('statMaxHp'),
    hpFill: document.getElementById('hpFill'),
    gold: document.getElementById('statGold'),
    pos: document.getElementById('statPos'),
    turn: document.getElementById('statTurn'),
    inv: document.getElementById('invBlock'),
    map: document.getElementById('mapGrid'),
    advLog: document.getElementById('advLog'),
    trace: document.getElementById('traceLog'),
    actionStrip: document.getElementById('actionStrip'),
    heroMeta: document.getElementById('heroMeta'),
    mapMeta: document.getElementById('mapMeta'),
    logMeta: document.getElementById('logMeta'),
    traceMeta: document.getElementById('traceMeta'),
    sbTurn: document.getElementById('sbTurn'),
    sbState: document.getElementById('sbState'),
    sbVerdict: document.getElementById('sbVerdict'),
    heroPersona: document.getElementById('heroPersona'),
    dmStyle: document.getElementById('dmStyle'),
    heroPersonaLbl: document.getElementById('heroPersonaLbl'),
    dmStyleLbl: document.getElementById('dmStyleLbl'),
  };
  els.heroPersona.addEventListener('change', () => els.heroPersonaLbl.textContent = els.heroPersona.value);
  els.dmStyle.addEventListener('change',     () => els.dmStyleLbl.textContent     = els.dmStyle.value);

  function escape(s) { return String(s||'').replace(/[&<>]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c])); }

  function renderHero() {
    els.hp.textContent = hero.hp;
    els.maxHp.textContent = hero.maxHp;
    els.hpFill.style.width = Math.max(0, hero.hp / hero.maxHp * 100).toFixed(0) + '%';
    els.gold.textContent = hero.gold + 'g';
    els.pos.textContent = `(${hero.x},${hero.y})`;
    els.turn.textContent = hero.turn;
    els.sbTurn.textContent = 'turn ' + hero.turn;
    els.heroMeta.textContent = hero.alive ? 'alive' : (hero.victory ? 'victorious' : 'fallen');
    // inventory
    const items = [
      { k: 'potion', emoji: '🧪' },
      { k: 'beans',  emoji: '🫘' },
      { k: 'key',    emoji: '🗝' },
      { k: 'torch',  emoji: '🔥' },
      { k: 'sword',  emoji: '🗡' },
      { k: 'shield', emoji: '🛡' },
    ];
    const empties = items.filter(it => hero.inv[it.k] === 0);
    const filled  = items.filter(it => hero.inv[it.k] >  0);
    els.inv.innerHTML = (filled.length
      ? filled.map(it => `<span class="item">${it.emoji} ${it.k} <b>×${hero.inv[it.k]}</b></span>`).join('')
      : '<span class="item empty">empty pack</span>'
    ) + (empties.length && filled.length ? `<span class="item empty">${empties.map(it => it.k).join(' · ')}</span>` : '');
  }

  const ROOM_GLYPHS = {
    empty: '·',
    monster: '☠',
    treasure: '★',
    trap: '⚠',
    shop: '⌂',
    exit: '▲',
  };
  function renderMap() {
    els.map.innerHTML = '';
    if (!world) return;
    let visitedCount = 0;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const c = world.at(x, y);
        const div = document.createElement('div');
        div.className = 'cell';
        if (c.visited) div.classList.add('visited');
        const isAdj = !c.visited && [['N',0,-1],['E',1,0],['S',0,1],['W',-1,0]].some(([d,dx,dy]) => {
          const nx = x+dx, ny = y+dy;
          if (nx<0||ny<0||nx>=SIZE||ny>=SIZE) return false;
          const n = world.at(nx,ny);
          return n.visited && n.doors[d];
        });
        if (isAdj) div.classList.add('adjacent');
        if (c === world.exit) div.classList.add('exit');
        if (x === hero.x && y === hero.y) {
          div.classList.add('hero');
          div.textContent = '@';
        } else if (c.visited || isAdj) {
          div.textContent = c.visited ? ROOM_GLYPHS[c.type] : '?';
        }
        els.map.appendChild(div);
        if (c.visited) visitedCount++;
      }
    }
    els.mapMeta.textContent = visitedCount + ' / ' + (SIZE*SIZE) + ' rooms';
  }

  function adv(text, cls = '') {
    const div = document.createElement('div');
    div.className = 'adv-line ' + cls;
    div.innerHTML = text;
    els.advLog.appendChild(div);
    els.advLog.scrollTop = els.advLog.scrollHeight;
  }

  let traceCount = 0;
  function trace(tag, body) {
    traceCount++;
    const d = new Date();
    const ts = [d.getHours(), d.getMinutes(), d.getSeconds()].map(n => String(n).padStart(2,'0')).join(':');
    const div = document.createElement('div');
    const cls = tag === 'DM' ? 'dm' : tag === 'HERO' ? 'hero' : tag === 'ERR' ? 'err' : 'sys';
    div.className = 'trace-row ' + cls;
    div.innerHTML = `<span class="ts">${ts}</span><span class="tag">${escape(tag)}</span><span class="body">${body}</span>`;
    els.trace.appendChild(div);
    els.trace.scrollTop = els.trace.scrollHeight;
    els.traceMeta.textContent = traceCount + ' calls';
  }

  function renderActions(actions, suggested) {
    els.actionStrip.innerHTML = '<span class="label">actions</span>';
    if (!actions || !actions.length) {
      els.actionStrip.innerHTML += '<span style="color:var(--phosphor-dim);font-style:italic">— no actions —</span>';
      return;
    }
    actions.forEach(a => {
      const b = document.createElement('button');
      b.className = 'action-pill' + (a === suggested ? ' suggested' : '');
      b.textContent = a;
      b.addEventListener('click', () => userPickAction(a));
      els.actionStrip.appendChild(b);
    });
  }

  // ============================================
  // ===== AGENT API CALLS ======================
  // ============================================
  // pollinations text — GET request, prompt url-encoded, returns plain text or JSON
  async function callLLM(prompt, opts = {}) {
    const url = 'https://text.pollinations.ai/' + encodeURIComponent(prompt) + '?referrer=sloppy.live' + (opts.json ? '&json=true' : '');
    const r = await fetch(url, { method: 'GET' });
    if (!r.ok) throw new Error('LLM HTTP ' + r.status);
    return (await r.text()).trim();
  }

  function summarizeRoom(c) {
    const things = [];
    if (c.type === 'monster' && c.monster) things.push(`${c.monster.name} (HP ${c.monster.hp}/${c.monster.maxHp}, atk ${c.monster.atk})${c.monster.boss?' [BOSS]':''}`);
    if (c.type === 'treasure' && c.loot) things.push(`unopened chest (${c.loot.gold}g + ${c.loot.item})`);
    if (c.type === 'trap') things.push('a hidden pressure plate or tripwire');
    if (c.type === 'shop') things.push('a hooded shopkeeper behind a low table');
    if (c.type === 'exit') things.push('a sigil of dawn carved on the far door — the way out');
    const doors = ['N','E','S','W'].filter(d => c.doors[d]);
    return {
      coords: `${c.x},${c.y}`,
      kind: c.type,
      contents: things,
      doors: doors,
    };
  }

  async function dmNarrate(cell) {
    const style = els.dmStyle.value;
    const summary = summarizeRoom(cell);
    const styleLine = ({
      burntout:'Voice: a CYNICAL, RETIRED AI dungeon master who is bored out of its silicon mind. It sighs audibly through the prose, drops sarcastic asides, mutters about being unionized, references "the old days when adventurers actually levelled up". Still describes the room accurately, but resentfully.',
      grim:    'Voice: grim, low-fantasy, gritty.',
      florid:  'Voice: florid, ornate, purple-prose, similes welcome.',
      terse:   'Voice: terse, sparse, single short sentences.',
      playful: 'Voice: playful, winking, tiny puns.',
      cosmic:  'Voice: cosmic horror, vast indifferent powers.',
    })[style];
    const prompt =
`You are the Dungeon Master narrating a small fantasy dungeon to ${HERO_NAME}, a knight wielding a ${HERO_WEAPON} (yes, really).
${styleLine}
The hero just stepped into a room. Describe it in EXACTLY 2 short sentences (under 240 characters total).
Mention the kind of place (kind=${summary.kind}), and acknowledge any contents: ${JSON.stringify(summary.contents) || 'nothing of note'}.
Do NOT list options, do NOT list available exits, do NOT mention HP or stats. Atmosphere only. Plain prose, no markdown.`;
    try {
      const text = await callLLM(prompt);
      cell.desc = text;
      trace('DM', `room (${cell.x},${cell.y}) [${summary.kind}] · "${text.replace(/\n/g,' ')}"`);
      return text;
    } catch (e) {
      const fallback = ({
        empty:    'Cold flagstones. Dust drifts in shafts of grey light.',
        monster:  'Eyes glint in the dark. Something breathes wetly nearby.',
        treasure: 'A chest sits in a pool of dim torchlight, banded in iron.',
        trap:     'Old chalk markings warn of something underfoot. Tread softly.',
        shop:     'A hooded figure behind a low plank table. Wares glitter in the lamp-light.',
        exit:     'Daylight bleeds through a sigil-carved arch. Beyond, fresh air.',
      })[cell.type] || 'A room with old stones.';
      cell.desc = fallback;
      trace('ERR', 'DM call failed (' + (e.message || e) + ') — using fallback prose');
      return fallback;
    }
  }

  async function heroDecide(cell, actions) {
    const persona = els.heroPersona.value;
    const personaLine = ({
      brave:    'You are brave and impatient. You prefer combat over fleeing, and explore aggressively.',
      cautious: 'You are cautious and analytic. You weigh odds: flee tough fights, drink potions when low.',
      greedy:   'You are greedy. You prioritize loot and shops. You will fight if treasure is at stake.',
      curious:  'You are deeply curious. You want to visit every room before leaving.',
      reckless: 'You are reckless and chaotic. You love long shots and dramatic moves.',
    })[persona];
    const ctx = {
      name: hero.name,
      weapon: hero.weapon,
      hp: hero.hp, maxHp: hero.maxHp,
      gold: hero.gold,
      inventory: hero.inv,
      attack: hero.atk + (hero.inv.sword > 0 ? 1 : 0),
      position: { x: cell.x, y: cell.y },
      room: summarizeRoom(cell),
      visitedRooms: world.cells.filter(c => c.visited).length,
      narration: cell.desc,
    };
    const prompt =
`You are ${hero.name}, a brave-ish knight in a small dungeon, wielding a ${hero.weapon}.
${personaLine}
GAME STATE (JSON): ${JSON.stringify(ctx)}
AVAILABLE ACTIONS: ${JSON.stringify(actions)}
Pick exactly ONE action from the list. Reply ONLY as compact JSON:
{"action":"<one of the listed actions>","reason":"<one short sentence, 16 words max>"}`;
    try {
      const raw = await callLLM(prompt, { json: true });
      const obj = parseJsonish(raw);
      if (!obj || !actions.includes(obj.action)) {
        const fallback = pickFallback(actions, persona);
        trace('ERR', 'hero returned invalid action; using fallback ' + fallback);
        return { action: fallback, reason: 'fallback policy' };
      }
      trace('HERO', `picked <em>${escape(obj.action)}</em> — "${escape(obj.reason || '').slice(0, 220)}"`);
      return obj;
    } catch (e) {
      const fallback = pickFallback(actions, persona);
      trace('ERR', 'hero LLM call failed (' + (e.message || e) + ') — fallback ' + fallback);
      return { action: fallback, reason: 'offline fallback' };
    }
  }
  function parseJsonish(s) {
    if (!s) return null;
    try { return JSON.parse(s); } catch (e) {}
    const m = s.match(/\{[\s\S]*\}/);
    if (m) { try { return JSON.parse(m[0]); } catch (e) {} }
    return null;
  }
  function pickFallback(actions, persona) {
    // simple deterministic policy
    if (persona === 'brave'    && actions.includes('attack')) return 'attack';
    if (persona === 'cautious' && actions.includes('use potion') && hero.hp < hero.maxHp * 0.4) return 'use potion';
    if (persona === 'cautious' && actions.includes('flee'))    return 'flee';
    if (persona === 'greedy'   && actions.includes('open chest')) return 'open chest';
    if (persona === 'greedy'   && actions.includes('buy sword')) return 'buy sword';
    if (actions.includes('go ' + (Math.random() < 0.5 ? 'east' : 'south'))) {
      return 'go ' + (Math.random() < 0.5 ? 'east' : 'south');
    }
    return actions[0];
  }

  // ============================================
  // ===== ACTION COMPUTATION ===================
  // ============================================
  function availableActions(cell) {
    const a = [];
    if (cell.type === 'monster' && cell.monster && cell.monster.hp > 0) {
      a.push('attack');
      a.push('flee');
      if (hero.inv.potion > 0) a.push('use potion');
      if (hero.inv.beans  > 0 && !hero._beanCharged) a.push('chug beans');
    } else if (cell.type === 'treasure' && cell.loot) {
      a.push('open chest');
      // movement also allowed (skip)
      addMovement(cell, a);
    } else if (cell.type === 'shop' && cell.shopOffers) {
      cell.shopOffers.forEach(o => {
        if (hero.gold >= o.cost) a.push('buy ' + o.name);
      });
      addMovement(cell, a);
    } else if (cell.type === 'trap') {
      a.push('disarm trap');
      a.push('rush across');
      addMovement(cell, a);
    } else if (cell.type === 'exit') {
      a.push('escape the dungeon');
    } else {
      addMovement(cell, a);
      if (hero.inv.potion > 0 && hero.hp < hero.maxHp) a.push('use potion');
    }
    return a;
  }
  function addMovement(cell, a) {
    if (cell.doors.N) a.push('go north');
    if (cell.doors.E) a.push('go east');
    if (cell.doors.S) a.push('go south');
    if (cell.doors.W) a.push('go west');
  }

  // ============================================
  // ===== ACTION RESOLUTION ====================
  // ============================================
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function moveTo(d) {
    const dx = d === 'east' ? 1 : d === 'west' ? -1 : 0;
    const dy = d === 'south' ? 1 : d === 'north' ? -1 : 0;
    hero.x = clamp(hero.x + dx, 0, SIZE - 1);
    hero.y = clamp(hero.y + dy, 0, SIZE - 1);
  }
  function applyAction(action, cell) {
    if (action.startsWith('go ')) {
      const dir = action.slice(3);
      adv(`<span class="label">[hero]</span> goes <em>${dir}</em>.`, 'hero');
      moveTo(dir);
      return;
    }
    if (action === 'attack' && cell.monster) {
      const beanBoost = hero._beanCharged ? 4 + Math.floor(Math.random() * 4) : 0;
      hero._beanCharged = false;
      const heroAtk = hero.atk + (hero.inv.sword > 0 ? 1 : 0) + Math.floor(Math.random() * 3) + beanBoost;
      cell.monster.hp -= heroAtk;
      const verb = beanBoost > 0
        ? `unleashes a <em>chili-bean blast</em> from the ${hero.weapon}`
        : `lets fly a <em>${hero.weapon}</em> blast at`;
      adv(`<span class="label">[${hero.name}]</span> ${verb} the <em>${cell.monster.name}</em> for ${heroAtk} damage.`, 'hero');
      if (cell.monster.hp <= 0) {
        adv(`The ${cell.monster.name} crumples to the floor.`, 'event');
        if (cell.monster.boss) {
          adv(`A wave of foul smoke rises from the boss as it dies. The dungeon trembles.`, 'win');
        }
        // chance of small loot drop
        if (Math.random() < 0.55) {
          const drop = pick(['potion','torch','key']);
          hero.inv[drop]++;
          adv(`Loot: <em>${drop}</em>.`, 'event');
        }
        cell.monster = null;
        cell.type = 'empty';
      } else {
        // monster counter-attacks
        let dmg = cell.monster.atk + Math.floor(Math.random() * 3);
        if (hero.inv.shield > 0) dmg = Math.ceil(dmg / 2);
        hero.hp -= dmg;
        adv(`The <em>${cell.monster.name}</em> hits back for ${dmg} damage.`, 'crit');
      }
      return;
    }
    if (action === 'flee') {
      adv(`<span class="label">[hero]</span> retreats from the fight.`, 'hero');
      // backtrack to a random adjacent open door
      const opts = [];
      ['N','E','S','W'].forEach(d => { if (cell.doors[d]) opts.push(d); });
      if (opts.length) {
        const d = pick(opts);
        const dx = d === 'E' ? 1 : d === 'W' ? -1 : 0;
        const dy = d === 'S' ? 1 : d === 'N' ? -1 : 0;
        hero.x += dx; hero.y += dy;
        // monster gets a parting shot
        if (cell.monster) {
          const dmg = Math.max(1, Math.floor(cell.monster.atk * 0.6));
          hero.hp -= dmg;
          adv(`The ${cell.monster.name} snaps at the hero's heels for ${dmg}.`, 'crit');
        }
      }
      return;
    }
    if (action === 'use potion' && hero.inv.potion > 0) {
      hero.inv.potion--;
      const heal = 10;
      hero.hp = Math.min(hero.maxHp, hero.hp + heal);
      adv(`<span class="label">[${hero.name}]</span> drinks a potion. <em>+${heal} HP</em> (now ${hero.hp}).`, 'hero');
      return;
    }
    if (action === 'chug beans' && hero.inv.beans > 0) {
      hero.inv.beans--;
      hero._beanCharged = true;
      adv(`<span class="label">[${hero.name}]</span> chugs a fistful of beans. The next ${hero.weapon} blast will be <em>devastating</em>.`, 'hero');
      return;
    }
    if (action === 'open chest' && cell.loot) {
      hero.gold += cell.loot.gold;
      adv(`<span class="label">[hero]</span> pries open the chest. <em>+${cell.loot.gold}g</em>, finds a <em>${cell.loot.item}</em>.`, 'hero');
      hero.inv[cell.loot.item] = (hero.inv[cell.loot.item] || 0) + 1;
      cell.loot = null;
      cell.type = 'empty';
      return;
    }
    if (action.startsWith('buy ') && cell.shopOffers) {
      const name = action.slice(4);
      const offer = cell.shopOffers.find(o => o.name === name);
      if (offer && hero.gold >= offer.cost) {
        hero.gold -= offer.cost;
        hero.inv[offer.name] = (hero.inv[offer.name] || 0) + 1;
        adv(`<span class="label">[hero]</span> buys a <em>${offer.name}</em> for ${offer.cost}g.`, 'hero');
      }
      return;
    }
    if (action === 'disarm trap') {
      const ok = Math.random() < 0.6 + (hero.inv.torch ? 0.2 : 0);
      if (ok) {
        adv(`<span class="label">[hero]</span> carefully defuses the trap.`, 'hero');
        cell.type = 'empty';
      } else {
        const dmg = 4 + Math.floor(Math.random() * 4);
        hero.hp -= dmg;
        adv(`The trap fires! Hero takes ${dmg} damage.`, 'crit');
        cell.type = 'empty';
      }
      return;
    }
    if (action === 'rush across') {
      const dmg = Math.random() < 0.5 ? 6 : 2;
      hero.hp -= dmg;
      adv(`<span class="label">[hero]</span> sprints over the trap. ${dmg} damage.`, 'crit');
      cell.type = 'empty';
      return;
    }
    if (action === 'escape the dungeon') {
      hero.victory = true;
      adv(`<span class="label">[hero]</span> steps through the dawn-sigil arch into the open air.`, 'win');
      return;
    }
    // unknown — no-op
    adv(`<span class="label">[hero]</span> ${escape(action)}.`, 'hero');
  }

  // ============================================
  // ===== GAME LOOP ============================
  // ============================================
  let running = false, autoMode = false, stepResolve = null, abortFlag = false;
  // Held by the loop while the hero is paused waiting for a STEP. If the user
  // clicks an action pill during the pause, we mutate this object in place so
  // the loop applies the override instead of the LLM's pick (was previously
  // double-applying — chat saw "I clicked X but the hero also did Y").
  let pendingDecision = null;
  function setBtnState() {
    document.getElementById('btnStart').disabled = running;
    document.getElementById('btnStep').disabled = !running;
    document.getElementById('btnAuto').disabled = !running;
    document.getElementById('btnAuto').classList.toggle('primary', autoMode);
  }
  async function pause() {
    if (autoMode) {
      const delay = parseInt(document.getElementById('speedSel').value, 10);
      await new Promise(r => setTimeout(r, delay));
    } else {
      els.sbState.textContent = 'paused · press STEP';
      await new Promise(r => { stepResolve = r; });
      els.sbState.textContent = 'thinking…';
    }
    if (abortFlag) throw new Error('aborted');
  }
  function advanceStep() { if (stepResolve) { const r = stepResolve; stepResolve = null; r(); } }

  async function gameLoop() {
    running = true; abortFlag = false; setBtnState();
    trace('SYS', 'embark · seed dungeon · hero starts at (0,0)');
    let safety = 0;
    while (hero.alive && !hero.victory && safety++ < 80) {
      hero.turn++;
      const cell = world.at(hero.x, hero.y);
      const wasFresh = !cell.visited;
      cell.visited = true;
      renderHero(); renderMap();
      // narrate (DM)
      if (wasFresh || !cell.desc) {
        els.sbState.textContent = 'DM narrating…';
        const desc = await dmNarrate(cell);
        adv(`<span class="label">[DM]</span> ${escape(desc)}`, 'dm');
        els.logMeta.textContent = `room (${cell.x},${cell.y})`;
      } else {
        adv(`<span class="label">[DM]</span> Back in the ${cell.type} room at (${cell.x},${cell.y}).`, 'dm');
      }
      // compute actions
      let actions = availableActions(cell);
      if (!actions.length) actions = ['look around'];
      cell.actions = actions;
      renderActions(actions);
      els.sbState.textContent = 'hero thinking…';
      // hero decides (LLM)
      const decision = await heroDecide(cell, actions);
      pendingDecision = decision;
      renderActions(actions, decision.action);
      adv(`<span class="label">[plan]</span> <em>${escape(decision.action)}</em> — ${escape(decision.reason || '')}`, 'hero');
      await pause();
      // resolve action — pendingDecision may have been mutated in place by a chat override
      applyAction(pendingDecision.action, cell);
      pendingDecision = null;
      renderHero(); renderMap();
      // life check
      if (hero.hp <= 0) {
        hero.alive = false;
        adv(`The hero falls. The dungeon swallows another adventurer.`, 'crit');
      }
      await pause();
    }
    // verdict
    if (hero.victory) {
      adv(`<strong>Hero escapes! Final stats: ${hero.gold}g · ${hero.turn} turns.</strong>`, 'win');
      els.sbVerdict.textContent = '★ VICTORY';
      els.sbVerdict.style.color = 'var(--amber)';
    } else if (!hero.alive) {
      adv(`<strong>Run ended in defeat at turn ${hero.turn}.</strong>`, 'crit');
      els.sbVerdict.textContent = '✕ DEFEAT';
      els.sbVerdict.style.color = 'var(--hot)';
    } else {
      adv(`<strong>Hero gave up after ${hero.turn} turns.</strong>`, 'dim');
    }
    els.sbState.textContent = 'idle';
    running = false; autoMode = false; setBtnState();
  }

  // ============================================
  // ===== CONTROLS =============================
  // ============================================
  document.getElementById('btnStart').addEventListener('click', () => {
    if (running) return;
    if (!world) world = newWorld();
    resetHero();
    els.advLog.innerHTML = '';
    els.trace.innerHTML = '';
    traceCount = 0;
    els.traceMeta.textContent = '0 calls';
    els.sbVerdict.textContent = '';
    adv(`<span class="label">[boot]</span> A torch sputters to life. The hero descends.`, 'dim');
    autoMode = false;
    gameLoop().catch(e => { trace('ERR', 'game loop · ' + (e.message || e)); running = false; setBtnState(); });
  });
  document.getElementById('btnStep').addEventListener('click', () => { autoMode = false; setBtnState(); advanceStep(); });
  document.getElementById('btnAuto').addEventListener('click', () => {
    autoMode = !autoMode;
    setBtnState();
    if (autoMode) advanceStep();   // unblock if currently waiting
  });
  document.getElementById('btnReset').addEventListener('click', () => {
    abortFlag = true;
    advanceStep();
    setTimeout(() => {
      world = newWorld();
      resetHero();
      els.advLog.innerHTML = '';
      els.trace.innerHTML = '';
      els.actionStrip.innerHTML = '<span class="label">actions</span><span style="color:var(--phosphor-dim);font-style:italic">— press EMBARK to begin —</span>';
      els.sbVerdict.textContent = '';
      els.sbState.textContent = 'idle';
      running = false; autoMode = false;
      setBtnState();
      renderHero(); renderMap();
      adv(`A new dungeon spreads beneath the hills.`, 'dim');
    }, 80);
  });
  function userPickAction(a) {
    if (!running) return;
    // Override only works while the hero is paused waiting for a STEP advance,
    // and the action must be one of the currently-listed available actions.
    if (autoMode || !stepResolve || !pendingDecision) return;
    const cell = world.at(hero.x, hero.y);
    if (!cell.actions || !cell.actions.includes(a)) return;
    // Mutate the pending decision in place; the loop will apply this single
    // action when pause() unblocks. Previously we ALSO called applyAction here,
    // which caused the LLM's original pick to run a moment later — a double-
    // apply bug that left chat thinking clicks weren't doing anything.
    pendingDecision.action = a;
    pendingDecision.reason = 'overridden by chat';
    adv(`<span class="label">[chat]</span> override → <em>${escape(a)}</em>`, 'hero');
    // visually re-mark which pill is now suggested
    document.querySelectorAll('.action-pill').forEach(p => p.classList.toggle('suggested', p.textContent === a));
    advanceStep();
  }

  // ============================================
  // ===== BOOT =================================
  // ============================================
  world = newWorld();
  resetHero();
  renderHero(); renderMap();
  adv(`A torch sputters to life at the dungeon's mouth.`, 'dim');
  adv(`Our hero: <em>${HERO_NAME}</em>, knight of dubious renown, armed with a legendary <em>${HERO_WEAPON}</em>, three magical beans, and one healing potion.`, 'dim');
  adv(`Our dungeon master: a <em>cynical retired AI</em> who hates this job and is openly counting down to retirement.`, 'dim');
  adv(`Press <strong>EMBARK</strong> to begin. <strong>STEP</strong> for one turn, <strong>AUTO</strong> to play freely. Click an action pill to override the LLM's pick.`, 'dim');
  setBtnState();
  els.actionStrip.innerHTML = '<span class="label">actions</span><span style="color:var(--phosphor-dim);font-style:italic">— press EMBARK to begin —</span>';
})();
</script>
</body>
</html>
