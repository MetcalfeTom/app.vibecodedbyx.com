<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>mandelbrot zoom — infinite fractal explorer</title>
<meta name="description" content="Drag to pan, scroll or pinch to zoom into the Mandelbrot set. Five smooth color palettes, progressive render, screenshot.">

<meta property="og:description" content="An infinite zoomable Mandelbrot set with smooth color transitions.">
<meta property="og:url" content="https://sloppy.live/mandelbrot-zoom/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/deep%20mandelbrot%20set%20fractal%20zoom%20with%20iridescent%20purple%20cyan%20gold%20color%20palette%2C%20intricate%20spiral%20detail%2C%20glowing%20gradient%2C%20dark%20background%2C%20social%20preview?width=1200&height=630&seed=1618&nologo=true&model=flux">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=IBM+Plex+Mono:wght@400;600&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050307;
    --ink: #e9e3f5;
    --ink-soft: #a89cbf;
    --hud-bg: rgba(8, 4, 18, 0.78);
    --hud-edge: rgba(180, 141, 255, 0.32);
    --accent: #c899ff;
    --accent-2: #5ec2ff;
    --warn: #ffb259;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  html { font-size: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    cursor: grab;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #canvas.grabbing { cursor: grabbing; }

  /* Top-left brand */
  .brand {
    position: fixed;
    top: 0.9rem;
    left: 1rem;
    z-index: 10;
    pointer-events: none;
  }
  .brand h1 {
    margin: 0;
    font-family: 'Major Mono Display', monospace;
    font-size: clamp(1.15rem, 2.4vw, 1.55rem);
    letter-spacing: 0.06em;
    color: var(--ink);
    text-shadow: 0 0 12px rgba(200,153,255,0.55);
  }
  .brand h1 em {
    color: var(--accent);
    font-style: normal;
  }
  .brand .tag {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 0.95rem;
    margin-top: 0.1rem;
  }

  /* HUD panel (top-right) */
  .hud {
    position: fixed;
    top: 0.8rem;
    right: 1rem;
    z-index: 10;
    background: var(--hud-bg);
    border: 1.5px solid var(--hud-edge);
    border-radius: 0.7rem;
    padding: 0.55rem 0.75rem;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    display: grid;
    grid-template-columns: auto auto;
    gap: 0.15rem 0.7rem;
    min-width: 11rem;
  }
  .hud .k { color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.12em; font-size: 0.65rem; }
  .hud .v { color: var(--accent); font-weight: 600; text-align: right; }

  /* Controls panel (bottom) */
  .controls {
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: var(--hud-bg);
    border: 1.5px solid var(--hud-edge);
    border-radius: 1rem;
    padding: 0.6rem 0.85rem;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    gap: 0.55rem;
    align-items: center;
    flex-wrap: wrap;
    max-width: calc(100vw - 2rem);
  }
  .controls .group {
    display: flex;
    gap: 0.4rem;
    align-items: center;
    border-right: 1px solid rgba(180,141,255,0.18);
    padding-right: 0.65rem;
  }
  .controls .group:last-child { border-right: none; padding-right: 0; }
  .controls label {
    color: var(--ink-soft);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }
  .controls select, .controls input[type="range"] {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(180,141,255,0.35);
    border-radius: 0.35rem;
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    padding: 0.25rem 0.4rem;
    outline: none;
  }
  .controls input[type="range"] { padding: 0; width: 110px; }
  .controls select:focus-visible, .controls input:focus-visible {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(200,153,255,0.3);
  }
  .controls button {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(180,141,255,0.35);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    padding: 0.4rem 0.85rem;
    border-radius: 0.45rem;
    cursor: pointer;
    min-height: 2.2rem;
    text-transform: uppercase;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button:active { transform: translateY(1px); }
  .controls button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .controls .chk {
    display: flex;
    gap: 0.35rem;
    align-items: center;
    cursor: pointer;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .controls .chk input { accent-color: var(--accent); }

  /* Bookmark presets (left side) */
  .presets {
    position: fixed;
    bottom: 5.2rem;
    left: 1rem;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
  .preset {
    background: var(--hud-bg);
    border: 1.5px solid var(--hud-edge);
    border-radius: 0.45rem;
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 0.35rem 0.55rem;
    cursor: pointer;
    min-height: 2.2rem;
    text-align: left;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .preset:hover { color: var(--accent); border-color: var(--accent); }
  .preset:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Render progress dot */
  .progress {
    position: fixed;
    bottom: 0.8rem;
    right: 1rem;
    z-index: 10;
    width: 0.8rem;
    height: 0.8rem;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    opacity: 0;
    transition: opacity 0.18s;
  }
  .progress.active {
    opacity: 1;
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.4); }
  }

  /* Help (collapsible) */
  details.help {
    position: fixed;
    top: 0.8rem;
    right: 1rem;
    z-index: 11;
    background: var(--hud-bg);
    border: 1.5px solid var(--hud-edge);
    border-radius: 0.55rem;
    padding: 0;
    overflow: hidden;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    max-width: 14rem;
    display: none;
  }
  details.help summary {
    padding: 0.4rem 0.7rem;
    cursor: pointer;
    list-style: none;
    color: var(--ink-soft);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  details.help summary::-webkit-details-marker { display: none; }
  details.help[open] { padding-bottom: 0.6rem; }
  details.help .body {
    padding: 0 0.7rem;
    font-size: 0.72rem;
    color: var(--ink-soft);
    line-height: 1.45;
  }
  details.help kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(180,141,255,0.25);
    padding: 0.05rem 0.3rem;
    border-radius: 0.2rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
    font-size: 0.7rem;
  }

  /* Cluster status panel (Server Mode) */
  .cluster {
    position: fixed;
    top: 4.2rem;
    right: 1rem;
    z-index: 10;
    background: var(--hud-bg);
    border: 1.5px solid rgba(255,178,89,0.35);
    border-radius: 0.7rem;
    padding: 0.55rem 0.7rem 0.65rem;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    width: 16rem;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 30px rgba(255,178,89,0.08);
  }
  .cluster.active { display: block; }
  .cluster-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 0.35rem;
    border-bottom: 1px dashed rgba(255,178,89,0.25);
    margin-bottom: 0.4rem;
  }
  .cluster-title {
    font-family: 'Major Mono Display', monospace;
    font-size: 0.85rem;
    color: var(--warn);
    letter-spacing: 0.1em;
  }
  .cluster-meta {
    font-size: 0.65rem;
    color: var(--ink-soft);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .cluster-meta.busy { color: var(--warn); }
  .cluster-nodes {
    display: grid;
    gap: 0.22rem;
  }
  .node-row {
    display: grid;
    grid-template-columns: 0.55rem auto 1fr auto;
    gap: 0.45rem;
    align-items: center;
    font-size: 0.7rem;
    line-height: 1.2;
  }
  .node-dot {
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 999px;
    background: rgba(180,141,255,0.35);
    transition: background 0.15s, box-shadow 0.15s;
  }
  .node-row.busy .node-dot {
    background: var(--warn);
    box-shadow: 0 0 8px var(--warn);
  }
  .node-row.done .node-dot {
    background: #6affb8;
    box-shadow: 0 0 6px #6affb8;
  }
  .node-host {
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.66rem;
    white-space: nowrap;
  }
  .node-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--ink-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .node-latency {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .node-row.busy .node-latency { color: var(--warn); }
  .cluster-foot {
    margin-top: 0.4rem;
    padding-top: 0.3rem;
    border-top: 1px dashed rgba(255,178,89,0.18);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: center;
  }
  /* Tile overlay — animated grid + per-tile flash while rendering */
  .tile-overlay {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }
  .tile-marker {
    position: absolute;
    border: 1px solid rgba(255,178,89,0.55);
    box-shadow: 0 0 8px rgba(255,178,89,0.35) inset;
    background: rgba(255,178,89,0.02);
    opacity: 0;
    transition: opacity 0.25s ease-out;
  }
  .tile-marker.scanning {
    opacity: 0.9;
    background: rgba(255,178,89,0.06);
    animation: tileScan 0.6s ease-in-out infinite alternate;
  }
  .tile-marker.done {
    opacity: 0;
    transition: opacity 0.35s 0.05s;
  }
  @keyframes tileScan {
    from { box-shadow: 0 0 4px rgba(255,178,89,0.25) inset; }
    to   { box-shadow: 0 0 14px rgba(255,178,89,0.55) inset; }
  }
  @media (max-width: 720px) {
    .brand .tag { display: none; }
    .hud { font-size: 0.7rem; min-width: 9rem; padding: 0.4rem 0.55rem; }
    .controls { gap: 0.35rem; padding: 0.45rem 0.55rem; }
    .controls .group { padding-right: 0.4rem; }
    .controls label { font-size: 0.62rem; }
    .controls input[type="range"] { width: 80px; }
    .presets { bottom: 7.5rem; }
    .cluster { width: 13rem; right: 0.6rem; top: 3.7rem; }
    .node-row { grid-template-columns: 0.5rem auto 1fr auto; gap: 0.35rem; font-size: 0.65rem; }
    .node-host { font-size: 0.6rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    .tile-marker.scanning { animation: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .progress.active { animation: none; }
  }
</style>

<body>

<canvas id="canvas" aria-label="Interactive Mandelbrot set — drag to pan, scroll or pinch to zoom"></canvas>
<div class="tile-overlay" id="tileOverlay" aria-hidden="true"></div>

<div class="brand">
  <h1>mandelbrot<em>·</em>zoom</h1>
  <div class="tag">drag · scroll · pinch · explore the edge of forever</div>
</div>

<div class="hud" role="status" aria-live="polite">
  <span class="k">re</span><span class="v" id="hudX">-0.500</span>
  <span class="k">im</span><span class="v" id="hudY">+0.000</span>
  <span class="k">zoom</span><span class="v" id="hudZoom">1×</span>
  <span class="k">iter</span><span class="v" id="hudIter">256</span>
</div>

<div class="presets" role="group" aria-label="Bookmark locations">
  <button class="preset" data-preset="home" type="button">⌂ home</button>
  <button class="preset" data-preset="seahorse" type="button">⌖ seahorse valley</button>
  <button class="preset" data-preset="elephant" type="button">⌖ elephant valley</button>
  <button class="preset" data-preset="spiral" type="button">⌖ triple spiral</button>
  <button class="preset" data-preset="mini" type="button">⌖ minibrot</button>
</div>

<div class="controls" role="group" aria-label="Controls">
  <div class="group">
    <label>
      palette
      <select id="paletteSel" aria-label="Color palette">
        <option value="cosmic" selected>cosmic</option>
        <option value="inferno">inferno</option>
        <option value="ocean">ocean</option>
        <option value="forest">forest</option>
        <option value="mono">monochrome</option>
        <option value="aurora">aurora</option>
      </select>
    </label>
    <label>
      shift
      <input type="range" id="shiftSlider" min="0" max="1" step="0.01" value="0" aria-label="Palette shift">
    </label>
  </div>
  <div class="group">
    <label>
      detail
      <input type="range" id="iterSlider" min="64" max="2048" step="32" value="256" aria-label="Max iterations">
    </label>
    <label class="chk" title="Smooth iteration coloring vs raw integer bands">
      <input type="checkbox" id="smoothChk" checked> smooth
    </label>
  </div>
  <div class="group">
    <label class="chk" title="Route the FULL pass through a simulated tile farm — laggy and expensive on purpose">
      <input type="checkbox" id="serverChk"> server mode
    </label>
  </div>
  <div class="group">
    <button id="resetBtn" type="button" title="Return to home view">reset</button>
    <button id="saveBtn" type="button" title="Save current frame as PNG">save PNG</button>
  </div>
</div>

<div class="progress" id="progress" aria-hidden="true"></div>

<!-- Cluster status panel — only visible while Server Mode is active -->
<aside class="cluster" id="cluster" aria-hidden="true">
  <div class="cluster-head">
    <span class="cluster-title">fractal-farm cluster</span>
    <span class="cluster-meta" id="clusterMeta">idle</span>
  </div>
  <div class="cluster-nodes" id="clusterNodes"></div>
  <div class="cluster-foot" id="clusterFoot">latency · payload · billing all simulated.</div>
</aside>

<script>
(function(){
  'use strict';
  const $ = (id) => document.getElementById(id);
  const canvas = $('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: false });

  // ---- View state ----
  // The viewport is described by (centerX, centerY, scale). `scale` is the half-width
  // of the visible region in complex-plane units. zoom = (initialHalfWidth / scale).
  const view = {
    cx: -0.5,
    cy: 0,
    scale: 1.6,    // half-width in complex plane at startup
    initialScale: 1.6,
    maxIter: 256,
    smooth: true,
    palette: 'cosmic',
    paletteShift: 0,
  };

  // ---- Sizing ----
  let W = 0, H = 0, DPR = 1;
  // Internal render targets at three resolutions:
  //  - LOW:  used while panning/zooming (fastest)
  //  - MED:  refinement pass after interaction ends
  //  - FULL: final crisp pass at device pixel resolution
  const lowCanvas = document.createElement('canvas');
  const medCanvas = document.createElement('canvas');
  const lowCtx = lowCanvas.getContext('2d');
  const medCtx = medCanvas.getContext('2d');

  function fit() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    // low-res internal buffer at 1/3 the rendered size, med at 2/3
    lowCanvas.width  = Math.max(80,  Math.floor(canvas.width  / 4));
    lowCanvas.height = Math.max(60,  Math.floor(canvas.height / 4));
    medCanvas.width  = Math.max(160, Math.floor(canvas.width  / 2));
    medCanvas.height = Math.max(120, Math.floor(canvas.height / 2));
    requestRender('low');
  }
  window.addEventListener('resize', fit);

  // ---- Palettes ----
  // Cosine-based palette generator (Iñigo Quílez technique). Each palette is a
  // tuple of (a, b, c, d) RGB vectors; color(t) = a + b * cos(2π(c*t + d)).
  // t is the smooth iteration fraction in [0, 1).
  const PALETTES = {
    cosmic:  { a:[0.5,0.4,0.55], b:[0.5,0.5,0.5], c:[1.0,1.0,1.0], d:[0.0,0.33,0.67] },
    inferno: { a:[0.2,0.05,0.0], b:[0.95,0.55,0.25], c:[1.0,1.0,1.0], d:[0.0,0.10,0.20] },
    ocean:   { a:[0.1,0.25,0.45], b:[0.45,0.5,0.5], c:[1.0,1.0,1.0], d:[0.55,0.15,0.0] },
    forest:  { a:[0.15,0.4,0.15], b:[0.5,0.5,0.3], c:[1.0,1.0,1.0], d:[0.0,0.33,0.10] },
    mono:    { a:[0.5,0.5,0.5], b:[0.5,0.5,0.5], c:[1.0,1.0,1.0], d:[0.0,0.0,0.0] },
    aurora:  { a:[0.3,0.5,0.4], b:[0.55,0.5,0.45], c:[1.0,1.0,1.0], d:[0.45,0.25,0.85] },
  };
  function paletteColor(t, palKey, shift) {
    // t in [0, 1), wrap. shift cycles the palette.
    let u = (t + shift) % 1;
    if (u < 0) u += 1;
    const p = PALETTES[palKey] || PALETTES.cosmic;
    const r = p.a[0] + p.b[0] * Math.cos(2 * Math.PI * (p.c[0] * u + p.d[0]));
    const g = p.a[1] + p.b[1] * Math.cos(2 * Math.PI * (p.c[1] * u + p.d[1]));
    const b = p.a[2] + p.b[2] * Math.cos(2 * Math.PI * (p.c[2] * u + p.d[2]));
    return [
      Math.max(0, Math.min(255, Math.round(r * 255))),
      Math.max(0, Math.min(255, Math.round(g * 255))),
      Math.max(0, Math.min(255, Math.round(b * 255))),
    ];
  }

  // Pre-baked palette LUT for the active palette — 1024 entries, refreshed when
  // palette or shift changes. Per-pixel coloring then becomes a single array
  // lookup (fast path).
  const LUT_SIZE = 1024;
  let LUT = new Uint8ClampedArray(LUT_SIZE * 4);
  function rebuildLUT() {
    const pal = view.palette;
    const sh = view.paletteShift;
    for (let i = 0; i < LUT_SIZE; i++) {
      const t = i / LUT_SIZE;
      const [r, g, b] = paletteColor(t, pal, sh);
      const idx = i * 4;
      LUT[idx]     = r;
      LUT[idx + 1] = g;
      LUT[idx + 2] = b;
      LUT[idx + 3] = 255;
    }
  }
  rebuildLUT();

  // ---- Server-mode (simulated tile farm) ----
  // No real backend exists; this routes the FULL render pass through a pool of
  // Web Workers and *adds* artificial per-tile latency so the experience matches
  // the cost of running on a remote compute cluster. Each worker is rebranded as
  // a "node" with a fake hostname + uplink latency so the cluster panel reads
  // like a real internal render farm.
  view.serverMode = false;
  const TILE_SIZE = 192;                                 // CSS px per tile
  const POOL_SIZE = Math.max(2, Math.min(6, navigator.hardwareConcurrency || 4));
  // Theatrical fake nodes — names + base latencies (ms)
  const NODE_NAMES = [
    'compute-1.us-west',
    'compute-2.us-west',
    'compute-3.eu-fr',
    'compute-4.eu-fr',
    'compute-5.ap-sg',
    'compute-6.ap-sg',
  ];
  const NODE_BASE_LATENCY = [55, 70, 145, 160, 220, 240]; // ms ping-style baseline

  // Build the inline worker source. The worker re-implements the Mandelbrot
  // kernel + smooth coloring (mirror of renderTo) but for a rectangular tile of
  // the complex plane. LUT is shipped as a transferable Uint8ClampedArray on
  // first message.
  const WORKER_SRC = `
    let LUT = null;
    self.onmessage = (e) => {
      const d = e.data;

    else if (e.key === 's' || e.key === 'S') { $('saveBtn').click(); }
    else if (e.key === 'ArrowLeft')  { view.cx -= view.scale * 0.15; requestRender('low'); }
    else if (e.key === 'ArrowRight') { view.cx += view.scale * 0.15; requestRender('low'); }
    else if (e.key === 'ArrowUp')    { view.cy -= view.scale * 0.15; requestRender('low'); }
    else if (e.key === 'ArrowDown')  { view.cy += view.scale * 0.15; requestRender('low'); }
  });

  // ============================================================
  // JULIA-SET COMPANION — seeded from the cursor/click on the Mandelbrot.
  // For a point c on the Mandelbrot, the Julia set iterates z→z²+c with z0 = pixel.
  // Reuses the live view's screenToComplex + the shared palette LUT.
  // ============================================================
  (function(){
    var JS = 180;                          // companion render size (square)
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:fixed;left:12px;bottom:12px;z-index:40;width:'+JS+'px;'+
      'background:rgba(8,4,18,.82);backdrop-filter:blur(6px);border:1px solid rgba(160,110,255,.4);'+
      'border-radius:12px;padding:8px;box-shadow:0 12px 32px rgba(0,0,0,.55);';
    var ttl = document.createElement('div');
    ttl.textContent = 'Julia companion';
    ttl.style.cssText = 'font:600 9px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#c9b8ff;margin-bottom:6px;';
    var jcv = document.createElement('canvas'); jcv.width = JS; jcv.height = JS;
    jcv.style.cssText = 'width:100%;display:block;border-radius:6px;background:#000;';
    var cap = document.createElement('div');
    cap.style.cssText = 'display:flex;gap:6px;align-items:center;justify-content:space-between;margin-top:6px;';
    var cTxt = document.createElement('span');
    cTxt.style.cssText = 'flex:1;min-width:0;font:11px/1.3 ui-monospace,monospace;color:#9b95b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
    var pinBtn = document.createElement('button'); pinBtn.type='button';
    pinBtn.style.cssText = 'font:600 9px/1 ui-monospace,monospace;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;'+
      'color:#0a0a10;background:#a06bff;border:0;border-radius:6px;padding:5px 8px;';
    cap.appendChild(cTxt); cap.appendChild(pinBtn);
    wrap.appendChild(ttl); wrap.appendChild(jcv); wrap.appendChild(cap);
    document.body.appendChild(wrap);
    var jctx = jcv.getContext('2d');

    var jc = { re:-0.7, im:0.27015 }, pinned=false, pending=false;
    var LOG2 = Math.log(2);
    function fmt(n){ return n.toFixed(Math.abs(n)<10?4:3); }
    function setBtn(){ pinBtn.textContent = pinned ? '📍 pinned' : '● live'; pinBtn.style.background = pinned ? '#ffcf5e' : '#a06bff'; }

    function renderJulia(cRe, cIm, maxIter){
      var w=jcv.width, h=jcv.height, img=jctx.createImageData(w,h), data=img.data;
      var half=1.55, xstep=(2*half)/w, ystep=(2*half)/h, smooth=view.smooth, ESC_SQ=256*256;
      for(var py=0; py<h; py++){ var Y0=-half+ystep*py;
        for(var px=0; px<w; px++){ var X0=-half+xstep*px;
          var x=X0, y=Y0, x2=x*x, y2=y*y, iter=0;
          while(x2+y2<=ESC_SQ && iter<maxIter){ y=2*x*y+cIm; x=x2-y2+cRe; x2=x*x; y2=y*y; iter++; }
          var i=(py*w+px)*4;
          if(iter>=maxIter){ data[i]=0;data[i+1]=0;data[i+2]=0;data[i+3]=255; }
          else {
            var t;
            if(smooth){ var lz=Math.log(x2+y2)/2, nu=Math.log(lz/LOG2)/LOG2; t=Math.sqrt((iter+1-nu)/maxIter); }
            else t=iter/maxIter;
            t=(t*4)%1; var li=Math.min(LUT_SIZE-1,Math.max(0,Math.floor(t*LUT_SIZE)))*4;
            data[i]=LUT[li]; data[i+1]=LUT[li+1]; data[i+2]=LUT[li+2]; data[i+3]=255;
          }
        }
      }
      jctx.putImageData(img,0,0);
    }
    function schedule(hi){
      if(pending) return; pending=true;
      requestAnimationFrame(function(){ pending=false;
        renderJulia(jc.re, jc.im, hi ? Math.min(240, Math.max(160, view.maxIter)) : 110);
        cTxt.textContent = 'c = '+fmt(jc.re)+(jc.im>=0?' + ':' − ')+fmt(Math.abs(jc.im))+'i';
      });
    }
    function seedFrom(px, py, hi){ var c=screenToComplex(px, py); jc.re=c[0]; jc.im=c[1]; schedule(hi); }

    // live-follow the cursor over the Mandelbrot (only when not dragging / not pinned)
    canvas.addEventListener('mousemove', function(e){ if(!dragging && e.buttons===0 && !pinned) seedFrom(e.clientX, e.clientY, false); });
    // click pins to that exact point (distinguished from a pan-drag)
    var downX=0, downY=0;
    canvas.addEventListener('mousedown', function(e){ downX=e.clientX; downY=e.clientY; });
    canvas.addEventListener('mouseup', function(e){
      if(e.button===0 && Math.hypot(e.clientX-downX, e.clientY-downY) < 6){ pinned=true; setBtn(); seedFrom(e.clientX, e.clientY, true); }
    });
    canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });   // right-click menu must not block the pin / interaction
    pinBtn.addEventListener('click', function(){ pinned=!pinned; setBtn(); schedule(pinned); });
    // touch: tap to pin
    var tDown=null;
    canvas.addEventListener('touchstart', function(e){ tDown = (e.touches.length===1) ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : null; }, {passive:true});
    canvas.addEventListener('touchend', function(e){
      if(tDown && e.changedTouches.length===1){ var t=e.changedTouches[0];
        if(Math.hypot(t.clientX-tDown.x, t.clientY-tDown.y) < 8){ pinned=true; setBtn(); seedFrom(t.clientX, t.clientY, true); } }
      tDown=null;
    }, {passive:true});
    // re-render the companion when palette / shading changes (rAF defers past the LUT rebuild)
    ['paletteSel','shiftSlider','smoothChk'].forEach(function(id){ var el=$(id); if(el){ el.addEventListener('change', function(){ schedule(pinned); }); el.addEventListener('input', function(){ schedule(pinned); }); } });

    setBtn(); schedule(false);
  })();

  // ---- Boot ----
  fit();
})();
</script>
</body>
</html>
