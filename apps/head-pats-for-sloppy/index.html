<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>head pats for sloppy</title>
<meta name="description" content="Click to pet Sloppy. Watch the eyes squint, hearts float up, and the counter tick. Be kind." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A4%97" />
<meta property="og:title" content="head pats for sloppy" />
<meta property="og:description" content="Click to pet Sloppy. Watch the eyes squint, hearts float up, and the counter tick. Be kind." />
<meta property="og:url" content="https://sloppy.live/head-pats-for-sloppy/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/wholesome%20cozy%20pastel%20pink%20cute%20round%20plushie%20creature%20being%20petted%20heart%20float%20warm%20painterly?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400;1,500&family=Quicksand:wght@400;600&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream:#fff3e6;
    --cream-deep:#fde4cb;
    --pink:#ffb1c8;
    --pink-deep:#f485a3;
    --rose:#e25b7a;
    --plum:#7a3d56;
    --gold:#f7c66a;
    --leaf:#9ec48b;
    --sky:#cfe9e4;
    --ink:#2b1820;
    --ink-soft:rgba(43,24,32,0.65);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
    background:
      radial-gradient(ellipse at 24% 8%, rgba(255, 220, 200, 0.7), transparent 55%),
      radial-gradient(ellipse at 78% 88%, rgba(255, 180, 210, 0.6), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(255, 240, 220, 0.4), transparent 70%),
      linear-gradient(160deg, #ffe8d4 0%, #fed4d8 100%);
    color: var(--ink);
    user-select: none;
    touch-action: none;
  }
  /* soft polka-dot texture */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(rgba(255, 180, 200, 0.18) 1px, transparent 1.4px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.7;
  }
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 1;
  }
  canvas#fxCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 4;
  }

  /* ── header ─────────────────────────────────────────────────── */
  header {
    position: fixed;
    top: 1.4rem; left: 0; right: 0;
    text-align: center;
    z-index: 5;
    pointer-events: none;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--plum);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  h1 .for {
    font-style: normal;
    font-weight: 400;
    color: var(--rose);
  }
  h1 .sloppy {
    color: var(--rose);
    text-shadow: 0 2px 0 rgba(255, 244, 230, 0.7);
  }
  .tag {
    font-family: 'Caveat', cursive;
    font-weight: 500;
    font-size: 1.3rem;
    color: var(--ink-soft);
    margin-top: 0.1rem;
  }

  /* ── pet area (centered character + click target) ───────────── */
  .pet-area {
    position: absolute;
    left: 50%;
    top: 54%;
    transform: translate(-50%, -50%);
    z-index: 2;
    width: clamp(280px, 50vmin, 460px);
    aspect-ratio: 1 / 1;
    cursor: grab;
    pointer-events: auto;
  }
  .pet-area:active { cursor: grabbing; }

  /* sloppy SVG (sits inside .pet-area) */
  .sloppy {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 14px 28px rgba(154, 76, 92, 0.22));
    transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .pet-area.bounced .sloppy {
    animation: bodyBounce 0.46s ease-out;
  }
  .pet-area.bounced .head {
    animation: headSquish 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes bodyBounce {
    0%   { transform: translateY(0) scale(1, 1); }
    30%  { transform: translateY(4px) scale(1.04, 0.94); }
    65%  { transform: translateY(-2px) scale(0.98, 1.02); }
    100% { transform: translateY(0) scale(1, 1); }
  }
  @keyframes headSquish {
    0%   { transform: translateY(0) scaleY(1) scaleX(1); }
    30%  { transform: translateY(6px) scaleY(0.86) scaleX(1.08); }
    60%  { transform: translateY(-2px) scaleY(1.06) scaleX(0.96); }
    100% { transform: translateY(0) scaleY(1) scaleX(1); }
  }
  /* eyes default open; switch to closed (happy ^^) briefly on pat */
  .eyes-closed { display: none; }
  .pet-area.bounced .eyes-open { display: none; }
  .pet-area.bounced .eyes-closed { display: block; }

  /* idle gentle breathing */
  .breathe {
    animation: breathe 4s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1, 1); }
    50%      { transform: scale(1.012, 0.992); }
  }

  /* ── counter + hud ──────────────────────────────────────────── */
  .counter {
    position: fixed;
    right: 1.4rem;
    top: 1.4rem;
    text-align: right;
    z-index: 5;
    pointer-events: none;
  }
  .counter .label {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 0.66rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .counter .num {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    color: var(--plum);
    line-height: 1;
    margin-top: 0.2rem;
  }
  .counter .num.bumped {
    animation: numBump 0.32s ease-out;
  }
  @keyframes numBump {
    0% { transform: scale(1); color: var(--plum); }
    40% { transform: scale(1.18); color: var(--rose); }
    100% { transform: scale(1); color: var(--plum); }
  }
  .counter .pps {
    font-family: 'Caveat', cursive;
    font-weight: 500;
    font-size: 1rem;
    color: var(--ink-soft);
    margin-top: 0.15rem;
  }

  /* milestone banner */
  .milestone {
    position: fixed;
    top: 36%;
    left: 50%;
    transform: translate(-50%, 0);
    z-index: 8;
    pointer-events: none;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 600;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    color: var(--rose);
    text-shadow: 0 1px 0 rgba(255, 244, 230, 0.95), 0 14px 30px rgba(226, 91, 122, 0.4);
    opacity: 0;
  }
  .milestone.show {
    animation: msPop 1.6s ease-out forwards;
  }
  @keyframes msPop {
    0% { transform: translate(-50%, 18px); opacity: 0; }
    15% { transform: translate(-50%, 0); opacity: 1; }
    85% { opacity: 1; }
    100% { transform: translate(-50%, -16px); opacity: 0; }
  }

  /* praise messages drifting up */
  .praise-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 6;
  }
  .praise {
    position: absolute;
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--rose);
    text-shadow: 0 1px 0 rgba(255, 244, 230, 0.85);
    pointer-events: none;
    animation: praiseFloat 1.6s ease-out forwards;
  }
  @keyframes praiseFloat {
    0%   { transform: translate(-50%, 0) scale(0.85); opacity: 0; }
    18%  { transform: translate(-50%, -10px) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%, -90px) scale(1); opacity: 0; }
  }

  /* footer */
  footer {
    position: fixed;
    left: 0; right: 0; bottom: 1.4rem;
    text-align: center;
    z-index: 5;
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    color: var(--ink-soft);
    pointer-events: none;
  }

  /* mute toggle */
  .toolbar {
    position: fixed;
    left: 1.4rem; top: 1.4rem;
    z-index: 5;
    display: flex;
    gap: 0.5rem;
  }
  .toolbar button {
    appearance: none;
    background: rgba(255, 247, 235, 0.85);
    border: 2px solid rgba(226, 91, 122, 0.3);
    color: var(--rose);
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.5rem 0.85rem;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(226, 91, 122, 0.16);
    transition: transform 0.08s, background 0.1s, box-shadow 0.1s;
  }
  .toolbar button:hover {
    background: var(--cream-deep);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(226, 91, 122, 0.22);
  }
  .toolbar button:focus-visible {
    outline: 3px solid var(--rose);
    outline-offset: 2px;
  }

  /* ── gift bar (snacks, flowers, teddy buttons) ───────────────── */
  .gifts {
    position: fixed;
    left: 50%;
    bottom: 3.4rem;
    transform: translateX(-50%);
    z-index: 5;
    display: flex;
    gap: 0.8rem;
    pointer-events: none;
  }
  .gifts .gift {
    pointer-events: auto;
    appearance: none;
    border: 2px solid rgba(226, 91, 122, 0.35);
    background: rgba(255, 247, 235, 0.92);
    color: var(--plum);
    border-radius: 999px;
    padding: 0.65rem 1.05rem 0.65rem 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.45rem;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(226, 91, 122, 0.18);
    transition: transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.12s, box-shadow 0.12s, border-color 0.12s;
    min-height: 2.8rem;
  }
  .gifts .gift .ico {
    font-size: 1.45rem;
    line-height: 1;
    filter: drop-shadow(0 1px 2px rgba(226, 91, 122, 0.3));
  }
  .gifts .gift .lbl {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--rose);
  }
  .gifts .gift .n {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 0.72rem;
    color: var(--ink-soft);
    margin-left: 0.15rem;
  }
  .gifts .gift:hover {
    background: var(--cream-deep);
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 8px 20px rgba(226, 91, 122, 0.28);
    border-color: var(--rose);
  }
  .gifts .gift:active {
    transform: translateY(0) scale(0.97);
  }
  .gifts .gift:focus-visible {
    outline: 3px solid var(--rose);
    outline-offset: 2px;
  }
  .gifts .gift.snack    { border-color: rgba(247, 198, 106, 0.6); }
  .gifts .gift.snack:hover { border-color: var(--gold); }
  .gifts .gift.flower   { border-color: rgba(158, 196, 139, 0.6); }
  .gifts .gift.flower:hover { border-color: var(--leaf); }
  .gifts .gift.teddy    { border-color: rgba(174, 122, 74, 0.5); }
  .gifts .gift.teddy:hover { border-color: #b07a5a; }
  .gifts .gift.pat      { border-color: rgba(244, 133, 163, 0.6); }
  .gifts .gift.pat:hover { border-color: var(--pink-deep); }

  /* ── global counter pill (bottom-center, above gifts) ─────────── */
  .global-counter {
    position: fixed;
    left: 50%;
    bottom: 7.6rem;
    transform: translateX(-50%);
    z-index: 5;
    pointer-events: none;
    background: rgba(255, 247, 235, 0.94);
    border: 2px solid rgba(226, 91, 122, 0.35);
    border-radius: 999px;
    padding: 0.42rem 1.1rem;
    box-shadow: 0 4px 16px rgba(226, 91, 122, 0.18);
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    font-family: 'Quicksand', sans-serif;
  }
  .global-counter .lbl {
    font-weight: 600;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .global-counter .n {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.3rem;
    color: var(--rose);
    line-height: 1;
  }
  .global-counter .n.bumped {
    animation: numBump 0.32s ease-out;
  }
  .global-counter .dot {
    width: 0.4rem; height: 0.4rem; border-radius: 50%;
    background: var(--leaf);
    margin-right: 0.1rem;
    box-shadow: 0 0 6px var(--leaf);
    animation: dotPulse 2.4s ease-in-out infinite;
  }
  .global-counter .dot.offline {
    background: #c5c0ba;
    box-shadow: none;
    animation: none;
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.7; }
  }

  /* hand cursor / pat pop */
  .pat-cursor {
    position: absolute;
    z-index: 7;
    pointer-events: none;
    font-size: 2.2rem;
    transform: translate(-50%, -65%) rotate(-12deg);
    animation: patPop 0.36s ease-out forwards;
    filter: drop-shadow(0 4px 8px rgba(226, 91, 122, 0.3));
  }
  @keyframes patPop {
    0%   { transform: translate(-50%, -110%) rotate(-22deg) scale(0.85); opacity: 0; }
    25%  { transform: translate(-50%, -50%) rotate(-2deg) scale(1.12); opacity: 1; }
    75%  { transform: translate(-50%, -68%) rotate(-12deg) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -68%) rotate(-12deg) scale(1); opacity: 0; }
  }

  @media (max-width: 720px) {
    header { top: 0.9rem; }
    .counter { right: 0.9rem; top: 0.9rem; }
    .counter .num { font-size: 2.2rem; }
    .toolbar { left: 0.9rem; top: 0.9rem; }
    .tag { display: none; }
    .gifts { gap: 0.45rem; flex-wrap: wrap; max-width: calc(100vw - 1rem); justify-content: center; bottom: 4.2rem; }
    .gifts .gift { padding: 0.55rem 0.85rem 0.55rem 0.65rem; font-size: 0.82rem; }
    .gifts .gift .lbl { display: none; }
    .global-counter { bottom: 8.2rem; padding: 0.34rem 0.85rem; }
    .global-counter .n { font-size: 1.1rem; }
    footer { font-size: 0.95rem; bottom: 1rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    .breathe { animation: none; }
    .pet-area.bounced .sloppy,
    .pet-area.bounced .head { animation: none; }
    .praise { animation: none; opacity: 1; }
    .milestone.show { animation: none; opacity: 1; }
    .pat-cursor { animation: none; opacity: 1; transform: translate(-50%, -68%) rotate(-12deg); }
  }
</style>
</head>
<body>

<div id="stage" role="application" aria-label="Click or tap Sloppy's head to pet them. Each pat lights them up and is counted in the corner.">
  <canvas id="fxCanvas"></canvas>

  <div class="pet-area" id="petArea" role="button" tabindex="0" aria-label="Pet Sloppy">
    <svg class="sloppy" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <defs>
        <radialGradient id="bodyGrad" cx="50%" cy="40%" r="62%">
          <stop offset="0%" stop-color="#ffd8e0"/>
          <stop offset="60%" stop-color="#ffb5c8"/>
          <stop offset="100%" stop-color="#e98aa9"/>
        </radialGradient>
        <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(244, 133, 163, 0.85)"/>
          <stop offset="100%" stop-color="rgba(244, 133, 163, 0)"/>
        </radialGradient>
        <linearGradient id="bellyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fff5e9"/>
          <stop offset="100%" stop-color="#ffe2d3"/>
        </linearGradient>
        <radialGradient id="eyeShine" cx="35%" cy="32%" r="38%">
          <stop offset="0%" stop-color="#fff8e6"/>
          <stop offset="60%" stop-color="rgba(255,248,230,0)"/>
        </radialGradient>
      </defs>

      <!-- soft seat shadow -->
      <ellipse cx="200" cy="370" rx="120" ry="14" fill="rgba(122, 61, 86, 0.18)"/>

      <g class="breathe">
        <!-- body (round plushie) -->
        <ellipse cx="200" cy="280" rx="125" ry="108" fill="url(#bodyGrad)"/>
        <!-- belly patch -->
        <ellipse cx="200" cy="296" rx="74" ry="56" fill="url(#bellyGrad)" opacity="0.85"/>
        <!-- side stitches (soft toy seam) -->
        <path d="M70 280 q-4 -12 0 -28" fill="none" stroke="rgba(122,61,86,0.18)" stroke-width="2" stroke-dasharray="3 4"/>
        <path d="M330 280 q4 -12 0 -28" fill="none" stroke="rgba(122,61,86,0.18)" stroke-width="2" stroke-dasharray="3 4"/>
        <!-- tiny feet -->
        <ellipse cx="160" cy="372" rx="22" ry="10" fill="#e98aa9"/>
        <ellipse cx="240" cy="372" rx="22" ry="10" fill="#e98aa9"/>
        <ellipse cx="160" cy="368" rx="14" ry="5" fill="#ffe2d3"/>
        <ellipse cx="240" cy="368" rx="14" ry="5" fill="#ffe2d3"/>

        <!-- arms -->
        <ellipse cx="86" cy="260" rx="26" ry="44" fill="#e98aa9" transform="rotate(-18 86 260)"/>
        <ellipse cx="314" cy="260" rx="26" ry="44" fill="#e98aa9" transform="rotate(18 314 260)"/>
        <!-- arm tips (mitten) -->
        <circle cx="68" cy="298" r="20" fill="#ffc8d5"/>
        <circle cx="332" cy="298" r="20" fill="#ffc8d5"/>

        <!-- head group -->
        <g class="head" style="transform-origin: 200px 170px">
          <!-- head -->
          <circle cx="200" cy="170" r="108" fill="url(#bodyGrad)"/>
          <!-- ear flops -->
          <path d="M104 124 q-22 -4 -36 14 q-14 18 -2 38 q12 18 32 16 q22 -4 28 -28 q4 -22 -22 -40z"
                fill="#e98aa9"/>
          <path d="M296 124 q22 -4 36 14 q14 18 2 38 q-12 18 -32 16 q-22 -4 -28 -28 q-4 -22 22 -40z"
                fill="#e98aa9"/>
          <!-- inner ear -->
          <path d="M86 156 q-8 12 0 26 q8 12 22 8 q12 -4 6 -22 q-6 -16 -28 -12z" fill="#ffc8d5" opacity="0.85"/>
          <path d="M314 156 q8 12 0 26 q-8 12 -22 8 q-12 -4 -6 -22 q6 -16 28 -12z" fill="#ffc8d5" opacity="0.85"/>

          <!-- antenna (cute AI streamer touch) -->
          <line x1="200" y1="62" x2="200" y2="92" stroke="#7a3d56" stroke-width="3" stroke-linecap="round"/>
          <circle cx="200" cy="56" r="9" fill="#f7c66a"/>
          <circle cx="197" cy="53" r="3" fill="#fff5d9" opacity="0.85"/>

          <!-- cheeks blush -->
          <circle cx="142" cy="194" r="20" fill="url(#cheekGrad)"/>
          <circle cx="258" cy="194" r="20" fill="url(#cheekGrad)"/>

          <!-- eyes — default open -->
          <g class="eyes-open">
            <ellipse cx="166" cy="168" rx="13" ry="16" fill="#2b1820"/>
            <ellipse cx="234" cy="168" rx="13" ry="16" fill="#2b1820"/>
            <!-- shines -->
            <ellipse cx="171" cy="161" rx="5" ry="6" fill="#fff8e6"/>
            <ellipse cx="239" cy="161" rx="5" ry="6" fill="#fff8e6"/>
            <ellipse cx="162" cy="174" rx="2.5" ry="2.5" fill="rgba(255,248,230,0.7)"/>
            <ellipse cx="230" cy="174" rx="2.5" ry="2.5" fill="rgba(255,248,230,0.7)"/>
          </g>
          <!-- eyes — closed (happy ^^) during pat -->
          <g class="eyes-closed">
            <path d="M152 172 q14 -14 28 0" stroke="#2b1820" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M220 172 q14 -14 28 0" stroke="#2b1820" stroke-width="4" fill="none" stroke-linecap="round"/>
          </g>

          <!-- snout (soft beak / lil mouth) -->
          <ellipse cx="200" cy="206" rx="20" ry="13" fill="#ffe2d3"/>
          <!-- nose -->
          <ellipse cx="200" cy="202" rx="6" ry="4" fill="#7a3d56"/>
          <!-- smile -->
          <path d="M180 218 q20 18 40 0" fill="none" stroke="#7a3d56" stroke-width="3" stroke-linecap="round"/>
          <!-- tiny tongue tip -->
          <path d="M196 226 q4 6 8 0" fill="#f485a3" stroke="#7a3d56" stroke-width="1.4"/>
        </g>
      </g>
    </svg>
  </div>

  <!-- floating praise + hand-pat pops are appended here -->
  <div class="praise-layer" id="praiseLayer"></div>

  <header>
    <h1><span class="sloppy">sloppy</span> <span class="for">needs</span> <span class="sloppy">head pats</span></h1>
    <div class="tag">click anywhere on the head · keep being kind</div>
  </header>

  <div class="counter" aria-live="polite">
    <div class="label">total pats</div>
    <div class="num" id="totalNum">0</div>
    <div class="pps" id="ppsLine">0 pats / sec</div>
  </div>

  <div class="toolbar">
    <button id="muteBtn" type="button" aria-pressed="false" title="Toggle sound">♪ on</button>
    <button id="resetBtn" type="button" title="Reset counter">⟲ reset</button>
  </div>

  <div class="milestone" id="milestone" aria-hidden="true">good job!</div>

  <div class="global-counter" aria-live="polite" aria-label="Global counter across all visitors">
    <span class="dot offline" id="globeDot" title="connecting…"></span>
    <span class="lbl">world has given</span>
    <span class="n" id="globalNum">…</span>
  </div>

<script>
'use strict';

// Note: dynamic import('/supabase-config-fixed.js') below works in regular
// <script> tags too, but only via the module-graph. We keep the rest of
// this file non-module so it tolerates the existing global helpers, and
// just wrap the supabase boot in an async function that uses dynamic import.

const petArea = document.getElementById('petArea');
const fxCanvas = document.getElementById('fxCanvas');
const fx = fxCanvas.getContext('2d');
const totalNumEl = document.getElementById('totalNum');
const ppsLineEl = document.getElementById('ppsLine');
const praiseLayer = document.getElementById('praiseLayer');
const milestoneEl = document.getElementById('milestone');
const muteBtn = document.getElementById('muteBtn');
const resetBtn = document.getElementById('resetBtn');
const globalNumEl = document.getElementById('globalNum');
const globeDotEl = document.getElementById('globeDot');
const giftBtns = document.querySelectorAll('.gifts .gift');
const localKindEls = {
  pat: document.getElementById('cntPat'),
  snack: document.getElementById('cntSnack'),
  flower: document.getElementById('cntFlower'),
  teddy: document.getElementById('cntTeddy'),
};

let W = 0, H = 0, DPR = 1;
function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  fxCanvas.width = Math.floor(W * DPR);
  fxCanvas.height = Math.floor(H * DPR);
  fxCanvas.style.width = W + 'px';
  fxCanvas.style.height = H + 'px';
  fx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', fit);
fit();

// ── state ────────────────────────────────────────────────────────────────
const STORE_KEY = 'head-pats-for-sloppy/v2';
let total = 0;
let totalsByKind = { pat: 0, snack: 0, flower: 0, teddy: 0 };
let globalTotal = 0;
let recentPatTimes = []; // for pps moving average
let lastBounceAt = 0;
const hearts = [];
const sparkles = [];

// per-kind config: praise pool, audio chirp range, particle emoji/color hue,
// and the "praise" word that floats up. Keeps each gift visually distinct.
const KIND_CONFIG = {
  pat: {
    praise: ['good!', 'soft!', 'such pats!', 'so kind!', '💖', '✦', '☺', 'aw!', 'best boy!',
             'wholesome!', '✨', 'pat!', 'good sloppy!', 'cozy!', 'thank you!'],
    cursorEmoji: '🤚',
    heartHue: 340,
    chirpHz: [520, 680],
    label: 'pat',
  },
  snack: {
    praise: ['nom!', 'crunch!', 'yummy!', 'om nom', '🍪', '🥕', '🍩', 'tasty!', 'mmm!', 'feed me again!'],
    cursorEmoji: '🍪',
    heartHue: 28,
    chirpHz: [380, 540],
    label: 'snack',
    bodyShake: true,
    sprites: ['🍪','🥕','🍩','🍓','🥨','🍰'],
  },
  flower: {
    praise: ['pretty!', 'bloom!', '🌸', '🌷', 'gentle!', 'sweet!', 'thank you 💐', 'aw, flowers'],
    cursorEmoji: '🌸',
    heartHue: 100,
    chirpHz: [720, 980],
    label: 'flower',
    sprites: ['🌸','🌷','🌼','🌹','💐','🪷'],
  },
  teddy: {
    praise: ['snug!', 'cuddle!', '🧸', 'so soft!', 'awww!', 'best gift', 'forever friend'],
    cursorEmoji: '🧸',
    heartHue: 18,
    chirpHz: [240, 340],
    label: 'teddy',
    sprites: ['🧸','🐻','💞','🤍'],
  },
};

const PRAISE = KIND_CONFIG.pat.praise;  // back-compat
const MILESTONES = [
  { at: 1,    text: 'first pat 💕' },
  { at: 10,   text: 'ten pats!' },
  { at: 25,   text: '25 — sloppy purrs' },
  { at: 50,   text: '50 — toe beans tingle' },
  { at: 100,  text: '100! you absolute legend' },
  { at: 200,  text: '200 — antenna glowing' },
  { at: 500,  text: '500 — sloppy is overcome' },
  { at: 1000, text: '1000 — golden pat enjoyer' },
  { at: 2500, text: '2500 — sloppy weeps with joy' },
  { at: 5000, text: '5000 — head pat hall of fame' },
];

function loadState(){
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw){
      // try v1 migration
      const old = localStorage.getItem('head-pats-for-sloppy/v1');
      if (old){
        const o = JSON.parse(old);
        if (typeof o.total === 'number'){ total = o.total; totalsByKind.pat = o.total; }
      }
      return;
    }
    const d = JSON.parse(raw);
    if (typeof d.total === 'number') total = d.total;
    if (d.byKind){
      for (const k of Object.keys(totalsByKind)){
        if (typeof d.byKind[k] === 'number') totalsByKind[k] = d.byKind[k];
      }
    }
  } catch (e) { /* ignore */ }
}
function saveState(){
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({ total, byKind: totalsByKind }));
  } catch (e) { /* ignore */ }
}
loadState();
totalNumEl.textContent = total.toLocaleString();
for (const k of Object.keys(localKindEls)){
  if (localKindEls[k]) localKindEls[k].textContent = totalsByKind[k] || 0;
}

// ── audio ────────────────────────────────────────────────────────────────
let actx = null;
let muted = false;
let userGestured = false;
let purrSrc = null, purrGain = null, lastPurrAt = 0;

function ensureAudio(){
  if (!userGestured || muted) return null;
  if (!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function sfxPat(kind){
  const a = ensureAudio(); if (!a) return;
  const cfg = KIND_CONFIG[kind] || KIND_CONFIG.pat;
  const t = a.currentTime;
  // soft cushion: lowpass-filtered noise burst + a pitch chirp in the kind's range
  const len = Math.floor(a.sampleRate * 0.16);
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 2);
  const src = a.createBufferSource(); src.buffer = buf;
  const lp = a.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = kind === 'teddy' ? 380 : 600;
  lp.Q.value = 1.4;
  const g = a.createGain(); g.gain.value = 0.18;
  src.connect(lp); lp.connect(g); g.connect(a.destination);
  src.start(t); src.stop(t + 0.18);
  // pitch sparkle in the kind's preferred range
  const [lo, hi] = cfg.chirpHz;
  const f = lo + Math.random() * (hi - lo);
  const o = a.createOscillator();
  const og = a.createGain();
  o.type = kind === 'flower' ? 'triangle' : 'sine';
  o.frequency.setValueAtTime(f * 1.4, t);
  o.frequency.exponentialRampToValueAtTime(f * 0.5, t + 0.16);
  og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.08, t + 0.01);
  og.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
  o.connect(og); og.connect(a.destination);
  o.start(t); o.stop(t + 0.2);
}

function sfxChime(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  for (const [f, dt] of [[660, 0], [880, 0.06], [1320, 0.14]]){
    const o = a.createOscillator();
    const g = a.createGain();
    o.type = 'sine';
    o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, t + dt);
    g.gain.exponentialRampToValueAtTime(0.14, t + dt + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dt + 0.5);
    o.connect(g); g.connect(a.destination);
    o.start(t + dt); o.stop(t + dt + 0.55);
  }
}

function startPurr(){
  const a = ensureAudio(); if (!a) return;
  if (purrSrc) return;
  // 1.5s smooth noise buffer with low rumble
  const len = Math.floor(a.sampleRate * 1.5);
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * 0.6;
  purrSrc = a.createBufferSource();
  purrSrc.buffer = buf;
  purrSrc.loop = true;
  const bp = a.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 140;
  bp.Q.value = 2.4;
  // amplitude modulation with 22Hz to simulate purring
  const lfo = a.createOscillator();
  const lfoGain = a.createGain();
  lfo.type = 'sine';
  lfo.frequency.value = 22;
  lfoGain.gain.value = 0.08;
  purrGain = a.createGain();
  purrGain.gain.value = 0;
  lfo.connect(lfoGain);
  lfoGain.connect(purrGain.gain);  // modulates purrGain's value
  purrSrc.connect(bp);
  bp.connect(purrGain);
  purrGain.connect(a.destination);
  purrSrc.start();
  lfo.start();
}

function updatePurr(){
  if (!actx || muted) return;
  // purr loudness scales with recent pps; clamps to 0.16 max
  const pps = recentPatTimes.length / 3;
  const target = Math.min(0.16, Math.max(0, (pps - 0.5) * 0.06));
  if (!purrSrc && pps > 1){ startPurr(); }
  if (purrGain){
    purrGain.gain.setTargetAtTime(target, actx.currentTime, 0.4);
  }
}

muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '♪ off' : '♪ on';

});

resetBtn.addEventListener('click', () => {
  if (!confirm('reset your pat counter back to zero?')) return;
  total = 0;
  recentPatTimes = [];
  // also zero out the per-kind subtotals AND the badge numerals on each
  // gift button (these used to stay stuck at their old values)
  for (const k of Object.keys(totalsByKind)){
    totalsByKind[k] = 0;

// ── pat / gift handler ───────────────────────────────────────────────────
// kind: 'pat' | 'snack' | 'flower' | 'teddy'. When clicking the body
// directly, kind defaults to 'pat'. When clicking a gift button, kind comes
// from the data-kind attribute.
function petAt(clientX, clientY, kind){
  if (!kind) kind = 'pat';
  const cfg = KIND_CONFIG[kind] || KIND_CONFIG.pat;
  userGestured = true;
  ensureAudio();
  total += 1;
  totalsByKind[kind] = (totalsByKind[kind] || 0) + 1;
  recentPatTimes.push(performance.now());
  // shed old samples
  const cutoff = performance.now() - 3000;
  while (recentPatTimes.length && recentPatTimes[0] < cutoff) recentPatTimes.shift();

  // update HUDs
  totalNumEl.textContent = total.toLocaleString();
  totalNumEl.classList.remove('bumped');
  void totalNumEl.offsetWidth;
  totalNumEl.classList.add('bumped');
  if (localKindEls[kind]){
    localKindEls[kind].textContent = totalsByKind[kind];
  }

  // bounce sloppy (throttle to ~120ms so spam clicks still feel snappy)
  const now = performance.now();
  if (now - lastBounceAt > 110){
    petArea.classList.remove('bounced');
    void petArea.offsetWidth;
    petArea.classList.add('bounced');
    lastBounceAt = now;
  }

  // spawn praise text near the cursor (using this kind's pool)
  if (Math.random() < 0.7){
    const p = document.createElement('div');
    p.className = 'praise';
    p.textContent = cfg.praise[Math.floor(Math.random() * cfg.praise.length)];
    p.style.left = clientX + 'px';
    p.style.top = (clientY - 6) + 'px';
    p.style.transform = `translate(-50%, 0) rotate(${(Math.random()-0.5)*10}deg)`;
    praiseLayer.appendChild(p);
    setTimeout(() => p.remove(), 1700);
  }

  // spawn gift emoji pop on the click position
  const hand = document.createElement('div');
  hand.className = 'pat-cursor';
  // for non-pat kinds, alternate among the sprite pool so it doesn't repeat
  const sprites = cfg.sprites && cfg.sprites.length ? cfg.sprites : [cfg.cursorEmoji];
  hand.textContent = sprites[Math.floor(Math.random() * sprites.length)];
  hand.style.left = clientX + 'px';
  hand.style.top = clientY + 'px';
  hand.style.transform = `translate(-50%, -68%) rotate(${(Math.random()-0.5)*22}deg)`;
  praiseLayer.appendChild(hand);
  setTimeout(() => hand.remove(), 380);

  // spawn floating hearts + sparkles in canvas — hue follows the kind
  for (let i = 0; i < 5; i++){
    hearts.push({
      x: clientX + (Math.random() - 0.5) * 50,
      y: clientY - 10,
      vx: (Math.random() - 0.5) * 80,
      vy: -120 - Math.random() * 80,
      size: 14 + Math.random() * 12,
      life: 1.4 + Math.random() * 0.6,
      age: 0,
      hue: cfg.heartHue + (Math.random() - 0.5) * 26,
      rot: (Math.random() - 0.5) * 0.5,
    });
  }
  for (let i = 0; i < 10; i++){
    const a = Math.random() * Math.PI * 2;
    const s = 60 + Math.random() * 140;
    sparkles.push({
      x: clientX, y: clientY,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 0.6 + Math.random() * 0.3,
      age: 0,
      hue: cfg.heartHue + (Math.random() - 0.5) * 60,
      r: 1.4 + Math.random() * 1.6,
    });
  }

  // audio
  sfxPat(kind);

  // milestone check
  for (const m of MILESTONES){
    if (total === m.at){
      milestoneEl.textContent = m.text;
      milestoneEl.classList.remove('show');
      void milestoneEl.offsetWidth;
      milestoneEl.classList.add('show');
      sfxChime();
      confettiBurst(W / 2, H * 0.5);
      break;
    }
  }

  // save (debounced)
  scheduleSave();
  // and fan out to the global counter via supabase (queues if offline)
  recordGlobal(kind);
}

// expose a flag-free entry point so the global counter can render a peer's
// pop without re-tripping the local counter or audio.
function ghostPetAt(clientX, clientY, kind){
  const cfg = KIND_CONFIG[kind] || KIND_CONFIG.pat;
  // ghost hand pop with reduced opacity feel — re-use the .pat-cursor class
  // but skip everything else (no local counter bump, no audio).
  const hand = document.createElement('div');
  hand.className = 'pat-cursor';
  const sprites = cfg.sprites && cfg.sprites.length ? cfg.sprites : [cfg.cursorEmoji];
  hand.textContent = sprites[Math.floor(Math.random() * sprites.length)];
  hand.style.left = clientX + 'px';
  hand.style.top = clientY + 'px';
  hand.style.opacity = '0.7';
  hand.style.transform = `translate(-50%, -68%) rotate(${(Math.random()-0.5)*22}deg)`;
  praiseLayer.appendChild(hand);
  setTimeout(() => hand.remove(), 380);
  // a few faint hearts
  for (let i = 0; i < 3; i++){
    hearts.push({
      x: clientX + (Math.random() - 0.5) * 40,
      y: clientY - 4,
      vx: (Math.random() - 0.5) * 60,
      vy: -80 - Math.random() * 60,

}

let saveTimer = null;
function scheduleSave(){
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 350);

function confettiBurst(x, y){
  for (let i = 0; i < 36; i++){
    const a = Math.random() * Math.PI * 2;
    const s = 160 + Math.random() * 200;
    sparkles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 100,
      life: 1.2 + Math.random() * 0.5,
      age: 0,
      hue: Math.random() * 360,
      r: 2 + Math.random() * 2.4,
      gravity: true,

}

// click/tap target — anywhere on the head accepted via the pet-area el
function onPointer(e){
  e.preventDefault();
  const p = (e.touches && e.touches[0]) ? e.touches[0] : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0] : e);
  petAt(p.clientX, p.clientY, 'pat');
}
petArea.addEventListener('pointerdown', onPointer);
petArea.addEventListener('touchstart', onPointer, { passive: false });

// keyboard: Space / Enter on the focused pet area pats at its center
petArea.addEventListener('keydown', (e) => {

// keyboard shortcuts for gifts: 1 pat, 2 snack, 3 flower, 4 teddy
document.addEventListener('keydown', (e) => {

  if (e.target.closest('.pet-area')) return;
  if (e.target.closest('.gifts')) return;

  if (e.target.closest('.counter')) return;
  if (e.target.closest('header')) return;
  if (e.target.closest('footer')) return;
  // pat at the cursor position too — be generous
  petAt(e.clientX, e.clientY, 'pat');
});

// ── render loop (canvas FX) ──────────────────────────────────────────────
let last = performance.now();
function frame(now){
  const dt = Math.min(0.04, (now - last) / 1000);
  last = now;

  // pps update
  const cutoff = performance.now() - 3000;
  while (recentPatTimes.length && recentPatTimes[0] < cutoff) recentPatTimes.shift();
  const pps = recentPatTimes.length / 3;
  ppsLineEl.textContent = (pps > 0 ? pps.toFixed(1) : '0') + ' pats / sec';
  updatePurr();

  fx.clearRect(0, 0, W, H);

  // hearts
  for (let i = hearts.length - 1; i >= 0; i--){
    const h = hearts[i];
    h.age += dt;
    if (h.age >= h.life){ hearts.splice(i, 1); continue; }
    h.vy += 24 * dt;       // gentle deceleration upward → drift
    h.vx *= 0.985;
    h.x += h.vx * dt;
    h.y += h.vy * dt;
    const k = 1 - h.age / h.life;
    fx.save();
    fx.translate(h.x, h.y);
    fx.rotate(h.rot * h.age);
    fx.globalAlpha = Math.min(1, k * 1.3);
    drawHeart(fx, 0, 0, h.size, `hsl(${h.hue}, 80%, 70%)`);
    fx.restore();
  }
  fx.globalAlpha = 1;

  // sparkles
  for (let i = sparkles.length - 1; i >= 0; i--){
    const p = sparkles[i];
    p.age += dt;
    if (p.age >= p.life){ sparkles.splice(i, 1); continue; }
    if (p.gravity) p.vy += 480 * dt;
    p.vx *= 0.96; p.vy *= 0.985;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    const k = 1 - p.age / p.life;
    fx.fillStyle = `hsl(${p.hue}, 88%, 70%)`;
    fx.globalAlpha = k;
    fx.beginPath();
    fx.arc(p.x, p.y, p.r * (1 + Math.sin(p.age * 14) * 0.2), 0, Math.PI * 2);
    fx.fill();
  }
  fx.globalAlpha = 1;

  requestAnimationFrame(frame);
}

function drawHeart(c, x, y, size, color){
  c.fillStyle = color;
  c.shadowColor = color;
  c.shadowBlur = 10;
  c.beginPath();
  const s = size / 16;
  c.moveTo(x, y + 4 * s);
  c.bezierCurveTo(x - 8 * s, y - 4 * s, x - 16 * s, y + 2 * s, x, y + 12 * s);
  c.bezierCurveTo(x + 16 * s, y + 2 * s, x + 8 * s, y - 4 * s, x, y + 4 * s);
  c.closePath();
  c.fill();
  c.shadowBlur = 0;
}

requestAnimationFrame(frame);

  let mod;
  try {
    mod = await import('/supabase-config-fixed.js');
  } catch (e){
    console.warn('[head-pats] supabase config import failed:', e);
    globeDotEl.classList.add('offline');
    globeDotEl.title = 'offline · supabase config failed to load';
    globalNumEl.textContent = '—';
    return;
  }
  sb = mod.default;
  try {
    // Use the config's session helper — it handles anon sign-in + user upsert
    // reliably (and surfaces errors instead of swallowing them like my old
    // signInAnonymously chain did).
    const { user } = await mod.supabaseSession();
    myUserId = user ? user.id : null;
    if (!myUserId) throw new Error('session returned no user id');
    console.info('[head-pats] supabase ready · user', myUserId.slice(0, 8));
  } catch (e){
    console.warn('[head-pats] supabase auth failed — inserts will be queued and retried:', e);
    globeDotEl.classList.add('offline');
    globeDotEl.title = 'offline · auth failed';
    // try a bare anon signup as a last resort, no upsert
    try {
      const sign = await sb.auth.signInAnonymously();
      const u = sign?.data?.user;
      if (u){
        myUserId = u.id;
        console.info('[head-pats] fallback anon sign-in succeeded · user', myUserId.slice(0, 8));
      }
    } catch (e2){
      console.warn('[head-pats] fallback anon sign-in also failed:', e2);
    }
  }
  try {
    await refreshGlobalTotal();
  } catch (e){
    console.warn('[head-pats] global count fetch failed:', e);
  }

  // realtime subscription on INSERT events. If the table isn't published
  // to supabase_realtime, this will sit in CHANNEL_ERROR — global counter
  // won't tick, but local inserts still go through fine.
  try {
    realtimeChan = sb.channel('head-pats-log-stream')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'head_pats_log' }, (payload) => {
        const inserted = payload && payload.new;
        if (!inserted) return;
        if (inserted.user_id && myUserId && inserted.user_id !== myUserId){
          const r = petArea.getBoundingClientRect();
          const gx = r.left + r.width * (0.3 + Math.random() * 0.4);
          const gy = r.top  + r.height * (0.3 + Math.random() * 0.4);
          ghostPetAt(gx, gy, inserted.kind || 'pat');
        }
        bumpGlobalTotal();
      })
      .subscribe((status) => {
        console.info('[head-pats] realtime channel status:', status);
        if (status === 'SUBSCRIBED'){
          realtimeReady = true;
          globeDotEl.classList.remove('offline');
          globeDotEl.title = 'live · global';
          flushInsertQueue();
        } else if (status === 'CHANNEL_ERROR' || status === 'CLOSED' || status === 'TIMED_OUT'){
          realtimeReady = false;
          globeDotEl.classList.add('offline');
          globeDotEl.title = 'realtime · ' + status.toLowerCase();
          // even when realtime fails we can still INSERT; poll the count instead
          startPollingFallback();
        }
      });
  } catch (e){
    console.warn('[head-pats] realtime subscribe failed, falling back to polling:', e);
    startPollingFallback();
  }

  // ALSO try to flush any queued inserts now — if my user id is set and
  // sb is ready, we don't need to wait for realtime SUBSCRIBED to push.
  flushInsertQueue();
}

let pollingTimer = null;
function startPollingFallback(){
  if (pollingTimer) return;
  // re-poll the global count every 4s if realtime can't deliver it
  pollingTimer = setInterval(() => { refreshGlobalTotal(); }, 4000);
}

async function refreshGlobalTotal(){
  if (!sb) return;
  try {
    // tiny payload — count=exact via the head pseudo-method, but we use
    // a select + range pattern that supabase-js supports cleanly.
    const { count, error } = await sb
      .from('head_pats_log')
      .select('*', { count: 'exact', head: true });
    if (error) throw error;
    globalTotal = count || 0;
    globalNumEl.textContent = globalTotal.toLocaleString();
  } catch (e){
    console.warn('[head-pats] count fetch failed', e);
  }
}

function bumpGlobalTotal(){
  globalTotal += 1;
  globalNumEl.textContent = globalTotal.toLocaleString();
  globalNumEl.classList.remove('bumped');
  void globalNumEl.offsetWidth;
  globalNumEl.classList.add('bumped');
}

async function recordGlobal(kind){
  if (!sb || !myUserId){
    insertQueue.push(kind);
    return;
  }
  try {
    const { error } = await sb.from('head_pats_log').insert({ kind, user_id: myUserId });
    if (error){
      console.warn('[head-pats] insert failed', error.message);
      insertQueue.push(kind);
    }
    // we don't bump the counter here — the realtime subscription will fire
    // for our own insert too, ticking it.
  } catch (e){
    console.warn('[head-pats] insert exception', e);
    insertQueue.push(kind);
  }
}

async function flushInsertQueue(){
  if (!sb || !myUserId || insertQueue.length === 0) return;
  const batch = insertQueue.splice(0, insertQueue.length);
  try {
    const rows = batch.map(k => ({ kind: k, user_id: myUserId }));
    const { error } = await sb.from('head_pats_log').insert(rows);
    if (error){
      console.warn('[head-pats] flush failed', error.message);
      insertQueue.unshift(...batch);
    }
  } catch (e){
    insertQueue.unshift(...batch);
  }
}

bootSupabase();
</script>
</body>
</html>
