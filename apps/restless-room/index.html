<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Restless Room — it rearranges when you arrive</title>
<meta name="description" content="A dark surreal 3D room that rearranges itself the moment you land. Walls slide, the ceiling breathes, the floor turns beneath you. Drag to look. Nothing is where you left it.">
<meta property="og:title" content="The Restless Room">
<meta property="og:description" content="Walls shift, the ceiling breathes, the floor turns slightly beneath you. The room knows you arrived.">

<style>
:root{ --ink:#0a0812; --violet:#8a6ee0; --amber:#e0a458; --ox:#6e1f2e; --bone:#d8d0e8; }
*{ box-sizing:border-box; margin:0; padding:0; }
html{ font-size:100%; }
body{ background:var(--ink); color:var(--bone); font-family:'Cormorant Garamond', serif; overflow:hidden; min-height:100vh; }
#stage{ position:fixed; inset:0; cursor:grab; touch-action:none; }
#stage:active{ cursor:grabbing; }
.title{
  position:fixed; top:12%; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none; z-index:2;
  transition:opacity 2.5s ease;
}
.title h1{ font-weight:400; font-style:italic; font-size:clamp(1.8rem, 6vw, 3.2rem); color:var(--bone); text-shadow:0 0 2rem rgba(138,110,224,.5); }
.title p{ font-family:'Space Mono', monospace; font-size:.66rem; letter-spacing:.28em; text-transform:uppercase; color:var(--violet); margin-top:.4rem; }
.title.gone{ opacity:0; }
#whisper{
  position:fixed; bottom:1.4rem; left:50%; transform:translateX(-50%); z-index:2; pointer-events:none;
  font-style:italic; font-size:1.05rem; color:rgba(216,208,232,.75); text-align:center; padding:0 1rem;
  transition:opacity 1.4s ease; opacity:0;
}
#whisper.show{ opacity:1; }
footer{
  position:fixed; bottom:.35rem; right:.6rem; z-index:2; pointer-events:none;
  font-family:'Space Mono', monospace; font-size:.55rem; letter-spacing:.1em; color:rgba(216,208,232,.4);
}
@media (prefers-reduced-motion: reduce){ .title{ transition:none; } #whisper{ transition:none; } }
</style>
</head>
<body>
<div id="stage" role="application" aria-label="a surreal 3D room. drag to look around. the room rearranges itself periodically."></div>
<div class="title" id="title">
  <h1>The Restless Room</h1>
  <p>drag to look · it already knows you're here</p>
</div>
<p id="whisper" role="status" aria-live="polite"></p>
<footer><span id="build-info">build <b>v1.0</b> · 2026-07-15 · commit <code id="build-hash">22e177d4a</code></span></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ═══ pure layout brain (node-testable) ═══ */
function genLayout(rnd){
  rnd=rnd||Math.random;
  return {
    n: 5.2+rnd()*3.4,           /* wall distances from center, 5.2..8.6 — never crushing the camera */
    s: 5.2+rnd()*3.4,
    e: 4.6+rnd()*3.2,
    w: 4.6+rnd()*3.2,
    ceil: 3.4+rnd()*2.2,        /* ceiling height 3.4..5.6 */
    floorSpin: (rnd()-0.5)*0.16,/* resting floor angle ±0.08 rad — slight, as commissioned */
    doorWall: Math.floor(rnd()*4),
    doorSlide: 0.15+rnd()*0.7,  /* fraction along its wall, kept off the corners */
    chairAng: rnd()*Math.PI*2,
    chairR: 1.2+rnd()*2.4,
    chairOnCeiling: rnd()<0.22, /* sometimes the chair forgets which way is down */
    hue: 0.68+ (rnd()-0.5)*0.1  /* wall hue wanders around deep violet */
  };
}
/* ═══ scene ═══ */
var W=innerWidth, H=innerHeight;
var renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H); renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
renderer.shadowMap.enabled=true;
document.getElementById('stage').appendChild(renderer.domElement);
var scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x0a0812, 0.055);
var cam=new THREE.PerspectiveCamera(64, W/H, 0.1, 60);
cam.position.set(0, 1.5, 0);

var amb=new THREE.AmbientLight(0x3a2e5c, 0.55); scene.add(amb);
var lamp=new THREE.PointLight(0xe0a458, 1.15, 18, 1.6); lamp.position.set(1.6,2.2,-1.2); lamp.castShadow=true; scene.add(lamp);
var under=new THREE.PointLight(0x6e1f2e, 0.5, 12); under.position.set(-2,0.3,2); scene.add(under);

function mat(c, rough){ return new THREE.MeshStandardMaterial({color:c, roughness:rough===undefined?0.92:rough, metalness:0.05}); }
var wallMat=mat(0x241a3d), wallMat2=mat(0x1d1533), ceilMat=mat(0x160f28), floorMat=mat(0x2e1b26, 0.85);

/* walls: 4 planes we slide in/out */
var walls={};
[['n',0,0,-1,0],['s',0,0,1,Math.PI],['e',1,0,0,-Math.PI/2],['w',-1,0,0,Math.PI/2]].forEach(function(d,i){
  var m=new THREE.Mesh(new THREE.PlaneGeometry(26, 14), i%2?wallMat2:wallMat);
  m.rotation.y=d[4]; m.receiveShadow=true;
  scene.add(m); walls[d[0]]={mesh:m, dir:[d[1],d[3]]};
});
var ceil=new THREE.Mesh(new THREE.PlaneGeometry(30,30), ceilMat);
ceil.rotation.x=Math.PI/2; scene.add(ceil);
var floorG=new THREE.Group();
var floor=new THREE.Mesh(new THREE.CircleGeometry(16, 48), floorMat);
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; floorG.add(floor);
/* rug — concentric surreal rings */
var rug=new THREE.Mesh(new THREE.RingGeometry(0.6,2.6,48), new THREE.MeshStandardMaterial({color:0x6e1f2e, roughness:1, side:THREE.DoubleSide}));
rug.rotation.x=-Math.PI/2; rug.position.y=0.01; floorG.add(rug);
var rug2=new THREE.Mesh(new THREE.RingGeometry(1.4,1.7,48), new THREE.MeshStandardMaterial({color:0x8a6ee0, roughness:1, side:THREE.DoubleSide}));
rug2.rotation.x=-Math.PI/2; rug2.position.y=0.012; floorG.add(rug2);
scene.add(floorG);

/* the door that never opens */
var door=new THREE.Group();
var frame=mat(0x120c20, 0.7);
[[-0.62,1.1,0.08,2.3],[0.62,1.1,0.08,2.3]].forEach(function(f){
  var p=new THREE.Mesh(new THREE.BoxGeometry(f[2], f[3], 0.14), frame); p.position.set(f[0], f[1], 0); door.add(p);
});
var lintel=new THREE.Mesh(new THREE.BoxGeometry(1.34,0.1,0.14), frame); lintel.position.set(0,2.28,0); door.add(lintel);
var panel=new THREE.Mesh(new THREE.BoxGeometry(1.12,2.2,0.06), mat(0x3d1f4a, 0.6)); panel.position.set(0,1.1,0); door.add(panel);
var knob=new THREE.Mesh(new THREE.SphereGeometry(0.045,12,12), new THREE.MeshStandardMaterial({color:0xe0a458, metalness:0.9, roughness:0.25}));
knob.position.set(0.42,1.05,0.06); door.add(knob);
scene.add(door);

/* a chair with doubts about gravity */
var chair=new THREE.Group();
var seatM=mat(0x1d1533, 0.75);
var seat=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.06,0.5), seatM); seat.position.y=0.45; chair.add(seat);
var back=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.6,0.05), seatM); back.position.set(0,0.78,-0.22); chair.add(back);
[[-0.21,-0.21],[0.21,-0.21],[-0.21,0.21],[0.21,0.21]].forEach(function(l){
  var leg=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,0.45), seatM);
  leg.position.set(l[0],0.22,l[1]); chair.add(leg);
});
chair.castShadow=true; scene.add(chair);

/* lamp cone + glowing frame + wrong clock */
var shade=new THREE.Mesh(new THREE.ConeGeometry(0.34,0.5,24,1,true), new THREE.MeshStandardMaterial({color:0x160f28, side:THREE.DoubleSide, roughness:0.6}));
shade.position.copy(lamp.position); shade.position.y+=0.22; scene.add(shade);
var pic=new THREE.Mesh(new THREE.PlaneGeometry(1.1,1.5), new THREE.MeshBasicMaterial({color:0x8a6ee0}));
pic.material.transparent=true; pic.material.opacity=0.35; scene.add(pic);
var clock=new THREE.Group();
var face=new THREE.Mesh(new THREE.CircleGeometry(0.42,32), new THREE.MeshStandardMaterial({color:0xd8d0e8, roughness:0.9}));
clock.add(face);
var hand1=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.3,0.01), new THREE.MeshBasicMaterial({color:0x0a0812}));
hand1.position.y=0.13; hand1.position.z=0.01; var h1g=new THREE.Group(); h1g.add(hand1); clock.add(h1g);
var hand2=new THREE.Mesh(new THREE.BoxGeometry(0.02,0.38,0.01), new THREE.MeshBasicMaterial({color:0x6e1f2e}));
hand2.position.y=0.17; hand2.position.z=0.012; var h2g=new THREE.Group(); h2g.add(hand2); clock.add(h2g);
scene.add(clock);
/* a cube that shouldn't be here */
var cube=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.55,0.55), new THREE.MeshStandardMaterial({color:0x8a6ee0, roughness:0.4, metalness:0.3, emissive:0x2a1a55}));
cube.castShadow=true; scene.add(cube);

/* ═══ tweens: everything eases to layout targets ═══ */
var cur=genLayout(), tgt=cur, tweenT=1, TWEEN_DUR=3.2;
function ease(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function lerp(a,b,t){ return a+(b-a)*t; }
function applyLayout(L, prev, k){
  function m(key){ return lerp(prev[key], L[key], k); }
  walls.n.mesh.position.set(0, m('ceil')/2, -m('n'));
  walls.s.mesh.position.set(0, m('ceil')/2, m('s'));
  walls.e.mesh.position.set(m('e'), m('ceil')/2, 0);
  walls.w.mesh.position.set(-m('w'), m('ceil')/2, 0);
  ceil.position.y=m('ceil');
  /* door lives on one wall, sliding along it */
  var dw=k<0.5?prev.doorWall:L.doorWall;
  var slide=m('doorSlide');
  var dn=m('n'), ds=m('s'), de=m('e'), dwst=m('w');
  if(dw===0){ door.position.set(lerp(-de,dwst===undefined?de:de, slide)*-1+2*slide*de-de, 0, -dn+0.09); door.rotation.y=0; }
  else if(dw===1){ door.position.set(-de+2*slide*de, 0, ds-0.09); door.rotation.y=Math.PI; }
  else if(dw===2){ door.position.set(de-0.09, 0, -dn+2*slide*(dn+ds)-0); door.rotation.y=-Math.PI/2; door.position.z=-dn+slide*(dn+ds); }
  else { door.position.set(-dwst+0.09, 0, -dn+slide*(dn+ds)); door.rotation.y=Math.PI/2; }
  /* chair: floor or ceiling */
  var ca=m('chairAng'), cr=m('chairR');
  var onCeil=(k<0.5?prev:L).chairOnCeiling;
  chair.position.set(Math.cos(ca)*cr, onCeil?m('ceil'):0, Math.sin(ca)*cr);
  chair.rotation.z=onCeil?Math.PI:0;
  chair.rotation.y=ca*1.7;
  /* picture + clock cling to north / east walls */
  pic.position.set(-1.4, 1.9, -dn+0.05);
  clock.position.set(de-0.05, 2.1, 1.2); clock.rotation.y=-Math.PI/2;
  /* wall hue drift */
  var h=m('hue');
  wallMat.color.setHSL(h, 0.42, 0.16);
  wallMat2.color.setHSL(h+0.04, 0.45, 0.12);
}
function rearrange(msg){
  var from=JSON.parse(JSON.stringify(tgt));
  cur=from; tgt=genLayout(); tweenT=0;
  creak();
  if(msg) whisper(msg);
}
var WHISPERS=['the walls were not like this a moment ago','the ceiling is thinking','the floor turned while you blinked',
  'the chair has changed its mind about gravity','the door leads nowhere new','it rearranges because it can',
  'you are the only fixed point here','the clock is not for telling time'];
var wIdx=0, whisperT=null;
function whisper(m){
  var el=document.getElementById('whisper');
  el.textContent=m; el.classList.add('show');
  clearTimeout(whisperT); whisperT=setTimeout(function(){ el.classList.remove('show'); }, 4200);
}
/* creak on rearrange */
var actx=null;
function creak(){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') return;   /* silent until the user has gestured — fine */
    var t=actx.currentTime;
    var o=actx.createOscillator(), g=actx.createGain(), f=actx.createBiquadFilter();
    o.type='sawtooth'; o.frequency.setValueAtTime(70,t); o.frequency.linearRampToValueAtTime(48,t+1.1);
    f.type='lowpass'; f.frequency.value=240; f.Q.value=6;
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.05,t+0.2); g.gain.exponentialRampToValueAtTime(0.0001,t+1.3);
    o.connect(f); f.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+1.4);
  }catch(e){}
}

/* look controls: drag to look, gentle idle drift */
var yaw=0, pitch=0, tyaw=0, tpitch=0, dragging=false, px=0, py=0, interacted=false;
var st=document.getElementById('stage');
st.addEventListener('pointerdown', function(e){ dragging=true; interacted=true; px=e.clientX; py=e.clientY; if(actx&&actx.state==='suspended') actx.resume(); });
addEventListener('pointerup', function(){ dragging=false; });
addEventListener('pointermove', function(e){
  if(!dragging) return;
  tyaw-=(e.clientX-px)*0.004; tpitch-=(e.clientY-py)*0.003;
  tpitch=Math.max(-0.9, Math.min(0.9, tpitch));
  px=e.clientX; py=e.clientY;
});
addEventListener('resize', function(){
  W=innerWidth; H=innerHeight; cam.aspect=W/H; cam.updateProjectionMatrix(); renderer.setSize(W,H);
});

var reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches;
var t0=performance.now(), lastRe=0;
/* the landing rearrange: the room reacts to your arrival almost immediately */
setTimeout(function(){ rearrange('the room noticed you'); }, 900);
setTimeout(function(){ document.getElementById('title').classList.add('gone'); }, 5200);

(function loop(now){
  requestAnimationFrame(loop);
  var t=(now-t0)/1000;
  var dt=1/60;
  if(tweenT<1){ tweenT=Math.min(1, tweenT+dt/TWEEN_DUR); applyLayout(tgt, cur, ease(tweenT)); }
  /* perpetual unease: breathing on top of the layout */
  if(!reduceMotion){
    ceil.position.y+=Math.sin(t*0.4)*0.004;                       /* the ceiling breathes */
    floorG.rotation.y=tgt.floorSpin*ease(Math.min(1,tweenT))+Math.sin(t*0.11)*0.05;  /* the floor turns, slightly */
    walls.n.mesh.position.z+=Math.sin(t*0.23)*0.006;
    walls.e.mesh.position.x+=Math.sin(t*0.19+2)*0.005;
    cube.rotation.x=t*0.21; cube.rotation.y=t*0.17;
    cube.position.set(Math.sin(t*0.13)*2.2, 1.4+Math.sin(t*0.31)*0.5, Math.cos(t*0.17)*2.2);
    h1g.rotation.z=-t*0.4;            /* hours sprint */
    h2g.rotation.z=t*0.07;            /* minutes crawl backward-ish */
    lamp.intensity=1.15+Math.sin(t*7.3)*0.03+Math.sin(t*1.7)*0.05;
    if(!interacted){ tyaw=Math.sin(t*0.07)*0.4; tpitch=Math.sin(t*0.05)*0.08; }
  }
  /* scheduled restlessness */
  if(t-lastRe>14){ lastRe=t; rearrange(WHISPERS[wIdx++%WHISPERS.length]); }
  yaw+=(tyaw-yaw)*0.06; pitch+=(tpitch-pitch)*0.06;
  cam.rotation.set(pitch, yaw, 0, 'YXZ');
  renderer.render(scene, cam);
})(t0);
console.log('[restless-room] scene up · '+scene.children.length+' children · first rearrange at ~0.9s');
</script>
</body>
</html>
