<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Synth Waves</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070418">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%8A">
<meta name="description" content="A generative lo-fi beat engine + neon FFT visualizer. Tweak the oscillating frequencies, key, swing, and let it drift.">
<meta property="og:title" content="Synth Waves">
<meta property="og:description" content="A generative lo-fi beat engine + neon FFT visualizer. Tweak the oscillating frequencies, key, swing, and let it drift.">
<meta property="og:url" content="https://sloppy.live/synth-waves">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20synthwave%20audio%20visualizer%20with%20glowing%20cyan%20magenta%20FFT%20spectrum%20bars%20and%20oscilloscope%2C%20lo-fi%20chillwave%20aesthetic%2C%20dark%20void?width=1200&height=630&model=flux&seed=4848&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Share+Tech+Mono&family=Rubik+Mono+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070418;
    --void-2:#120832;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --lime:#a5ff52;
    --violet:#9b5bff;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Space Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,43,214,0.15), transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(92,230,255,0.12), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;
  }
  header{text-align:center;padding:0.7rem 1rem 0.2rem;position:relative;z-index:3;pointer-events:none}
  h1{
    font-family:'Audiowide', monospace;
    font-size:clamp(1.4rem, 3.4vw, 2.2rem);letter-spacing:0.08em;
    background:linear-gradient(180deg, var(--cyan), var(--magenta) 70%, var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 10px rgba(255,43,214,0.4));line-height:1;
  }
  .tag{font-family:'Major Mono Display', monospace;font-size:clamp(0.6rem, 1.2vw, 0.85rem);letter-spacing:0.35em;color:var(--silver);margin-top:0.2rem;text-transform:lowercase}

  main{
    flex:1;display:grid;
    grid-template-columns:1fr 16rem;
    gap:0.8rem;padding:0.4rem 0.8rem 6rem;min-height:0;
  }
  .stage{
    position:relative;display:flex;align-items:center;justify-content:center;
    min-height:0;
  }
  canvas{
    display:block;
    width:100%;height:100%;
    background:#02011a;
    border:1px solid rgba(92,230,255,0.18);
    box-shadow:0 0 36px rgba(255,43,214,0.18), inset 0 0 22px rgba(0,0,0,0.6);
  }

  .panel{
    background:rgba(7,4,24,0.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(92,230,255,0.25);border-radius:0.4rem;
    padding:0.7rem 0.8rem;
    display:flex;flex-direction:column;gap:0.65rem;
    overflow-y:auto;font-family:'Share Tech Mono', monospace;
    box-shadow:0 0 18px rgba(92,230,255,0.10);
  }
  .panel h2{
    font-family:'Audiowide', monospace;font-size:0.75rem;
    color:var(--lime);letter-spacing:0.22em;text-transform:uppercase;
    border-bottom:1px solid rgba(165,255,82,0.25);padding-bottom:0.35rem;margin-bottom:0.1rem;
    text-shadow:0 0 8px rgba(165,255,82,0.35);
  }
  .knob{display:flex;flex-direction:column;gap:0.2rem}
  .knob .row{display:flex;justify-content:space-between;align-items:baseline;font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--silver)}
  .knob .row .val{
    font-family:'Rubik Mono One', monospace;font-size:0.85rem;color:var(--cyan);letter-spacing:0.02em;
    text-shadow:0 0 6px rgba(92,230,255,0.4);
  }
  .knob input[type="range"]{
    accent-color:var(--cyan);width:100%;height:2.25rem;cursor:pointer;
  }
  .knob.key-row{flex-direction:row;flex-wrap:wrap;gap:0.25rem}
  .knob.key-row .row{width:100%;margin-bottom:0.2rem}
  .key-btn{
    background:rgba(7,4,24,0.7);color:var(--silver);
    border:1px solid rgba(155,91,255,0.35);
    font-family:'Audiowide', monospace;font-size:0.7rem;
    padding:0.4rem 0.5rem;border-radius:0.22rem;cursor:pointer;
    min-width:2.2rem;min-height:2.2rem;flex:1;
  }
  .key-btn:hover{border-color:var(--violet);color:var(--ink)}
  .key-btn[aria-pressed="true"]{background:rgba(155,91,255,0.25);color:var(--ink);border-color:var(--violet);box-shadow:0 0 10px rgba(155,91,255,0.45)}
  .key-btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  /* swing chips */
  .swing-row{display:flex;gap:0.3rem}
  .swing-chip{
    background:transparent;color:var(--silver);
    border:1px solid rgba(255,212,84,0.3);
    font-family:'Share Tech Mono', monospace;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;
    padding:0.4rem 0.5rem;border-radius:0.22rem;cursor:pointer;flex:1;min-height:2.4rem;
  }
  .swing-chip[aria-pressed="true"]{background:rgba(255,212,84,0.16);color:var(--gold);border-color:var(--gold)}
  .swing-chip:hover{border-color:var(--gold);color:var(--gold)}
  .swing-chip:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  /* transport */
  .transport{
    position:fixed;bottom:0.8rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(7,4,24,0.86);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(92,230,255,0.32);
    padding:0.55rem 0.85rem;border-radius:0.5rem;z-index:6;
    box-shadow:0 0 24px rgba(255,43,214,0.18);max-width:calc(100% - 1rem);
  }
  .transport button{
    background:transparent;color:var(--cyan);border:1.5px solid var(--cyan);
    font-family:'Audiowide', monospace;font-size:0.8rem;letter-spacing:0.12em;text-transform:uppercase;
    padding:0.55rem 0.9rem;border-radius:0.3rem;cursor:pointer;min-height:2.75rem;min-width:2.75rem;
    box-shadow:0 0 12px rgba(92,230,255,0.25);
  }
  .transport button:hover{background:rgba(92,230,255,0.14)}
  .transport button:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .transport button.play{color:var(--lime);border-color:var(--lime);box-shadow:0 0 16px rgba(165,255,82,0.35)}
  .transport button.play[data-on="true"]{background:rgba(165,255,82,0.22)}
  .transport .grp{display:flex;align-items:center;gap:0.4rem;font-size:0.65rem;letter-spacing:0.14em;color:var(--silver);text-transform:uppercase}
  .transport .grp input[type="range"]{accent-color:var(--magenta);width:6rem;height:2.4rem}
  .transport .grp .v{color:var(--magenta);font-family:'Rubik Mono One', monospace;font-size:0.78rem;min-width:1.8rem;text-align:center}
  .transport .sep{width:1px;background:rgba(92,230,255,0.2);height:1.4rem}

  /* mobile reflow */
  @media (max-width: 900px){
    main{grid-template-columns:1fr;padding-bottom:9.5rem}
    .panel{max-height:14rem}
  }
  @media (max-width: 540px){
    .panel{font-size:0.85rem}
    .knob input[type="range"]{height:2rem}
  }
  @media (prefers-reduced-motion: reduce){
    canvas{filter:none}
  }
</style>
</head>
<body>
  <header>
    <h1>SYNTH WAVES</h1>
    <div class="tag">generative lo-fi · neon spectrum · drift</div>
  </header>

  <main>
    <div class="stage">
      <canvas id="vis" role="img" aria-label="Neon FFT spectrum analyzer and oscilloscope visualizing a generative lo-fi beat. Use the controls on the right to adjust the oscillating frequencies, key, swing, and density."></canvas>
    </div>
    <aside class="panel" id="panel" aria-label="Synthesis parameters">
      <h2>Oscillators</h2>
      <div class="knob">
        <div class="row"><span>Pad Cutoff</span><span class="val" id="cutoffVal">1200 Hz</span></div>
        <input id="cutoffInput" type="range" min="220" max="3200" step="20" value="1200" aria-label="Pad lowpass cutoff frequency">
      </div>
      <div class="knob">
        <div class="row"><span>LFO Rate</span><span class="val" id="lfoRateVal">0.40 Hz</span></div>
        <input id="lfoRateInput" type="range" min="0.05" max="2.5" step="0.05" value="0.40" aria-label="Filter LFO rate">
      </div>
      <div class="knob">
        <div class="row"><span>LFO Depth</span><span class="val" id="lfoDepthVal">55%</span></div>
        <input id="lfoDepthInput" type="range" min="0" max="100" step="1" value="55" aria-label="Filter LFO depth percent">
      </div>
      <div class="knob">
        <div class="row"><span>Detune</span><span class="val" id="detuneVal">14 ¢</span></div>
        <input id="detuneInput" type="range" min="0" max="40" step="1" value="14" aria-label="Pad oscillator detune in cents">
      </div>

      <h2>Beat</h2>
      <div class="knob">
        <div class="row"><span>Lead density</span><span class="val" id="leadVal">35%</span></div>
        <input id="leadInput" type="range" min="0" max="100" step="1" value="35" aria-label="Lead pentatonic blip density">
      </div>
      <div class="knob">
        <div class="row"><span>Vinyl</span><span class="val" id="vinylVal">25%</span></div>
        <input id="vinylInput" type="range" min="0" max="100" step="1" value="25" aria-label="Vinyl noise level">
      </div>
      <div class="knob">
        <div class="row"><span>Reverb</span><span class="val" id="revVal">45%</span></div>
        <input id="revInput" type="range" min="0" max="100" step="1" value="45" aria-label="Reverb wet mix">
      </div>
      <div class="knob">
        <div class="row"><span>Swing</span></div>
        <div class="swing-row" role="group" aria-label="Swing amount">
          <button class="swing-chip" data-swing="0" aria-pressed="true" type="button">straight</button>
          <button class="swing-chip" data-swing="0.18" aria-pressed="false" type="button">soft</button>
          <button class="swing-chip" data-swing="0.32" aria-pressed="false" type="button">jazz</button>
        </div>
      </div>

      <h2>Key</h2>
      <div class="knob key-row" role="group" aria-label="Musical key">
        <button class="key-btn" data-key="0" aria-pressed="true" type="button">C</button>
        <button class="key-btn" data-key="2" aria-pressed="false" type="button">D</button>
        <button class="key-btn" data-key="4" aria-pressed="false" type="button">E</button>
        <button class="key-btn" data-key="5" aria-pressed="false" type="button">F</button>
        <button class="key-btn" data-key="7" aria-pressed="false" type="button">G</button>
        <button class="key-btn" data-key="9" aria-pressed="false" type="button">A</button>
        <button class="key-btn" data-key="11" aria-pressed="false" type="button">B</button>
      </div>
    </aside>
  </main>

  <div class="transport" role="group" aria-label="Transport controls">
    <button class="play" id="playBtn" type="button" aria-pressed="false" aria-label="Play or pause">▶ play</button>
    <span class="sep" aria-hidden="true"></span>
    <span class="grp">BPM <input id="bpmInput" type="range" min="60" max="110" step="1" value="78" aria-label="Tempo in beats per minute"><span class="v" id="bpmVal">78</span></span>
    <span class="sep" aria-hidden="true"></span>
    <span class="grp">VOL <input id="volInput" type="range" min="0" max="100" step="1" value="70" aria-label="Master volume"><span class="v" id="volVal">70</span></span>
    <span class="sep" aria-hidden="true"></span>
    <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle mute">♪</button>
  </div>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  var canvas = document.getElementById('vis');
  var ctx;
  try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); return; }
  if (!ctx){ showError('canvas 2d unavailable'); return; }

  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var W = 800, H = 500;
  function resize(){
    try {
      var rect = canvas.getBoundingClientRect();
      W = Math.max(200, Math.floor(rect.width));
      H = Math.max(200, Math.floor(rect.height));
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    } catch(e){ showError('resize: ' + e.message); }
  }
  resize();
  window.addEventListener('resize', resize);
  setTimeout(resize, 100);

  // ── Synth state ──
  var params = {
    bpm: 78,
    keyOffset: 0,   // semitones above C
    padCutoff: 1200,
    lfoRate: 0.40,
    lfoDepth: 0.55, // 0-1 (fraction of cutoff)
    detune: 14,     // cents
    leadDensity: 0.35,
    vinyl: 0.25,
    reverb: 0.45,
    swing: 0,       // 0=straight, 0.18=soft, 0.32=jazz
    volume: 0.70,
    muted: false,
    playing: false
  };

  // ── Audio engine ──
  var audioCtx = null;
  var master = null, masterGain = null, compressor = null, analyser = null;
  var reverbConvolver = null, reverbSend = null;
  var vinylNoiseSource = null, vinylGain = null;
  var lfoOsc = null, lfoGain = null;
  var fftData = null, timeData = null;
  var nodes = [];   // for cleanup of active oscillators

  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ showError('audio init: ' + e.message); audioCtx = null; return null; }
    setupAudioGraph();
    return audioCtx;
  }

  function setupAudioGraph(){
    var c = audioCtx;
    masterGain = c.createGain(); masterGain.gain.value = params.muted ? 0 : params.volume;
    compressor = c.createDynamicsCompressor();
    compressor.threshold.value = -14;
    compressor.knee.value = 18;
    compressor.ratio.value = 4;
    compressor.attack.value = 0.005;
    compressor.release.value = 0.18;
    analyser = c.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.78;

    masterGain.connect(compressor).connect(analyser).connect(c.destination);
    master = masterGain;

    fftData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);

    // Reverb (procedural impulse response — 2s)
    var len = c.sampleRate * 2.0;
    var imp = c.createBuffer(2, len, c.sampleRate);
    for (var ch = 0; ch < 2; ch++){
      var d = imp.getChannelData(ch);
      for (var i = 0; i < len; i++){
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
      }
    }
    reverbConvolver = c.createConvolver();
    reverbConvolver.buffer = imp;
    reverbSend = c.createGain();
    reverbSend.gain.value = params.reverb;
    reverbConvolver.connect(reverbSend).connect(master);

    // Vinyl rumble + crackle bus
    var vBufLen = c.sampleRate * 2;
    var vBuf = c.createBuffer(1, vBufLen, c.sampleRate);
    var vd = vBuf.getChannelData(0);
    for (var i2 = 0; i2 < vBufLen; i2++){
      // pink-ish: filtered random
      vd[i2] = (Math.random() * 2 - 1) * 0.4;
      // sparse pops
      if (Math.random() < 0.0008) vd[i2] += (Math.random() - 0.5) * 1.4;
    }
    var vSrc = c.createBufferSource(); vSrc.buffer = vBuf; vSrc.loop = true;
    var vLP = c.createBiquadFilter(); vLP.type = 'lowpass'; vLP.frequency.value = 2400;
    var vHP = c.createBiquadFilter(); vHP.type = 'highpass'; vHP.frequency.value = 70;
    vinylGain = c.createGain(); vinylGain.gain.value = params.vinyl * 0.10;
    vSrc.connect(vLP).connect(vHP).connect(vinylGain).connect(master);
    vSrc.start();
    vinylNoiseSource = vSrc;

    // Filter LFO (modulates pad cutoff during voices)
    lfoOsc = c.createOscillator();
    lfoOsc.type = 'sine';
    lfoOsc.frequency.value = params.lfoRate;
    lfoGain = c.createGain();
    lfoGain.gain.value = params.padCutoff * params.lfoDepth;
    lfoOsc.connect(lfoGain);
    lfoOsc.start();
  }

  // ── Music theory ──
  // Chord progression: ii7 - V7 - I9 - vi7 (lo-fi-ish ii-V-I-vi) over 4 bars
  // Expressed as scale degree offsets from key root (in semitones)
  // C major progression: Dm7 - G7 - Cmaj7 - Am7
  var CHORDS = [
    { root: 2,  notes: [2, 5, 9, 12], name: 'ii7' },  // Dm7: D F A C
    { root: 7,  notes: [7, 11, 14, 17], name: 'V7' }, // G7:  G B D F
    { root: 0,  notes: [0, 4, 7, 11], name: 'Imaj7' },// Cmaj7: C E G B
    { root: 9,  notes: [9, 12, 16, 19], name: 'vi7' } // Am7: A C E G
  ];
  // Pentatonic scale degrees (C major pentatonic offsets)
  var PENT = [0, 2, 4, 7, 9];

  // Convert semitones (relative to A4=440) to Hz. A4 is midi 69.
  // We'll express our notes as semitones above C2 (midi 24), then add 24 to get midi.
  function midiToHz(midi){
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  // ── Scheduler ──
  var STEPS_PER_BAR = 16;
  var schedulerInterval = null;
  var nextStepTime = 0;
  var currentStep = 0;
  var currentBar = 0;
  var SCHED_LOOKAHEAD = 0.12;

  function secondsPerStep(){
    // 16 steps per bar, 4 beats per bar
    return 60 / params.bpm / 4;
  }

  function scheduler(){
    if (!audioCtx) return;
    while (nextStepTime < audioCtx.currentTime + SCHED_LOOKAHEAD){
      scheduleStep(currentStep, nextStepTime);
      var s = secondsPerStep();
      // Apply swing to odd 8th positions
      // 16th-step indices: every 2nd step is an "8th"; swing pushes off-beats
      var nextIsSwung = (params.swing > 0) && ((currentStep + 1) % 2 === 1);
      var delta = s;
      if (nextIsSwung) delta = s * (1 + params.swing);
      else if (currentStep % 2 === 1) delta = s * (1 - params.swing);
      nextStepTime += delta;
      currentStep++;
      if (currentStep >= STEPS_PER_BAR){
        currentStep = 0;
        currentBar++;
      }
    }
  }

  // ── Voices ──
  // Note: pad voices play continuously across each chord. Drums/bass/lead schedule per step.

  var lastKickT = 0;

  function scheduleStep(step, time){
    var sBar = secondsPerStep() * STEPS_PER_BAR;

    // ── Drums (boom-bap, lo-fi feel) ──
    // Kick on beats 1 and 3 (steps 0, 8); ghost on step 6
    if (step === 0 || step === 8) playKick(time, 1.0);
    if (step === 6 && Math.random() < 0.6) playKick(time, 0.45); // syncopated ghost
    // Snare on beats 2 and 4 (steps 4, 12)
    if (step === 4 || step === 12) playSnare(time, 1.0);
    if (step === 14 && Math.random() < 0.25) playSnare(time, 0.55); // occasional snare flam
    // Closed hat every 8th, open hat occasional
    if (step % 2 === 0) playHat(time, false, step === 0 || step === 8 ? 0.8 : 0.55);
    if (step === 14 && Math.random() < 0.4) playHat(time, true);

    // ── Bass on every beat at chord root ──
    if (step % 4 === 0){
      var chordIdx = currentBar % CHORDS.length;
      var chord = CHORDS[chordIdx];
      // bass = root in octave 2 (midi 24 + keyOffset + chord.root - 12 = octave shift down 1)
      var bassMidi = 36 + params.keyOffset + chord.root;
      playBass(time, midiToHz(bassMidi), 60 / params.bpm * 0.95);
    }

    // ── Pad: once per bar, hold for ~95% of bar ──
    if (step === 0){
      var chordIdx2 = currentBar % CHORDS.length;
      var chord2 = CHORDS[chordIdx2];
      var freqs = chord2.notes.map(function(n){
        return midiToHz(60 + params.keyOffset + n - 12); // mid octave-down
      });
      playPad(time, freqs, sBar * 0.95);
    }

    // ── Lead pentatonic blips ──
    if (Math.random() < params.leadDensity * 0.18 && (step % 2 === 0)){
      var degree = PENT[Math.floor(Math.random() * PENT.length)];
      var octShift = Math.random() < 0.65 ? 0 : 12;
      var leadMidi = 72 + params.keyOffset + degree + octShift; // around C5
      var dur = 60 / params.bpm * (0.5 + Math.random() * 1.5);
      playLead(time, midiToHz(leadMidi), dur);
    }
  }

  // ── Voice builders ──
  function playKick(time, vel){
    var c = audioCtx;
    var o = c.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(125, time);
    o.frequency.exponentialRampToValueAtTime(40, time + 0.14);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, time);
    g.gain.exponentialRampToValueAtTime(0.75 * vel, time + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, time + 0.22);
    o.connect(g).connect(master);
    o.start(time); o.stop(time + 0.24);
    // click transient (mid)
    var b = createNoiseBuf(0.012);
    var bs = c.createBufferSource(); bs.buffer = b;
    var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 1.5;
    var bg = c.createGain(); bg.gain.value = 0.07 * vel;
    bs.connect(bp).connect(bg).connect(master);
    bs.start(time);
    lastKickT = time;
  }

  function playSnare(time, vel){
    var c = audioCtx;
    var bufLen = Math.floor(c.sampleRate * 0.20);
    var b = c.createBuffer(1, bufLen, c.sampleRate);
    var d = b.getChannelData(0);
    for (var i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 1.4);
    var s = c.createBufferSource(); s.buffer = b;
    var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1700; bp.Q.value = 1.2;
    var g = c.createGain(); g.gain.value = 0.30 * vel;
    s.connect(bp).connect(g).connect(master);
    s.start(time);
    // body tone (low triangle for thump)
    var bt = c.createOscillator(); bt.type = 'triangle';
    bt.frequency.setValueAtTime(220, time);
    bt.frequency.exponentialRampToValueAtTime(140, time + 0.10);
    var bg2 = c.createGain();
    bg2.gain.setValueAtTime(0.0001, time);
    bg2.gain.exponentialRampToValueAtTime(0.18 * vel, time + 0.004);
    bg2.gain.exponentialRampToValueAtTime(0.0001, time + 0.12);
    bt.connect(bg2).connect(master);
    bt.start(time); bt.stop(time + 0.14);
  }

  function playHat(time, open, vel){
    var c = audioCtx;
    var dur = open ? 0.18 : 0.05;
    var bufLen = Math.floor(c.sampleRate * dur);
    var b = c.createBuffer(1, bufLen, c.sampleRate);
    var d = b.getChannelData(0);
    for (var i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, open ? 1.0 : 2.4);
    var s = c.createBufferSource(); s.buffer = b;
    var hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6500;
    var g = c.createGain(); g.gain.value = (open ? 0.10 : 0.06) * (vel || 0.6);
    s.connect(hp).connect(g).connect(master);
    s.start(time);
  }

  function playBass(time, freq, dur){
    var c = audioCtx;
    var o = c.createOscillator(); o.type = 'sine';
    o.frequency.value = freq;
    var o2 = c.createOscillator(); o2.type = 'triangle';
    o2.frequency.value = freq * 2;
    o2.detune.value = -8;
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, time);
    g.gain.exponentialRampToValueAtTime(0.32, time + 0.025);
    g.gain.exponentialRampToValueAtTime(0.08, time + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    var g2 = c.createGain(); g2.gain.value = 0.08;
    o.connect(g).connect(master);
    o2.connect(g2).connect(g).connect(master);
    o.start(time); o.stop(time + dur + 0.05);
    o2.start(time); o2.stop(time + dur + 0.05);
  }

  function playPad(time, freqs, dur){
    var c = audioCtx;
    // shared filter on the pad bus for this voice
    var filter = c.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = params.padCutoff;
    filter.Q.value = 1.6;
    // LFO modulates filter cutoff
    // Create per-voice LFO so it stops with the voice
    var lfo = c.createOscillator(); lfo.type = 'sine';
    lfo.frequency.value = params.lfoRate;
    var lfoMod = c.createGain();
    lfoMod.gain.value = params.padCutoff * params.lfoDepth;
    lfo.connect(lfoMod).connect(filter.frequency);
    lfo.start(time); lfo.stop(time + dur + 0.2);

    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(0.045, time + 0.55);
    g.gain.linearRampToValueAtTime(0.045, time + dur - 0.5);
    g.gain.linearRampToValueAtTime(0.0001, time + dur);

    // Wet send (to reverb)
    var sendG = c.createGain(); sendG.gain.value = 0.55;
    g.connect(sendG).connect(reverbConvolver);
    g.connect(master);
    filter.connect(g);

    freqs.forEach(function(f){
      // Three voices per chord note: saw + triangle (octave) + saw (detuned)
      var o1 = c.createOscillator(); o1.type = 'sawtooth';
      o1.frequency.value = f;
      o1.detune.value = -params.detune;
      var o2 = c.createOscillator(); o2.type = 'sawtooth';
      o2.frequency.value = f;
      o2.detune.value = +params.detune;
      var o3 = c.createOscillator(); o3.type = 'triangle';
      o3.frequency.value = f * 2;
      var voiceG = c.createGain(); voiceG.gain.value = 0.18;
      o1.connect(voiceG); o2.connect(voiceG); o3.connect(voiceG);
      voiceG.connect(filter);
      o1.start(time); o1.stop(time + dur + 0.2);
      o2.start(time); o2.stop(time + dur + 0.2);
      o3.start(time); o3.stop(time + dur + 0.2);
    });
  }

  function playLead(time, freq, dur){
    var c = audioCtx;
    var o = c.createOscillator(); o.type = 'triangle';
    o.frequency.value = freq;
    var filter = c.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2800;
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, time);
    g.gain.exponentialRampToValueAtTime(0.10, time + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    var sendG = c.createGain(); sendG.gain.value = 0.55;
    o.connect(filter).connect(g);
    g.connect(master);
    g.connect(sendG).connect(reverbConvolver);
    o.start(time); o.stop(time + dur + 0.05);
  }

  function createNoiseBuf(durSec){
    var c = audioCtx;
    var n = Math.floor(c.sampleRate * durSec);
    var b = c.createBuffer(1, n, c.sampleRate);
    var d = b.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1);
    return b;
  }

  // ── Transport ──
  function play(){
    ensureAudio();
    if (!audioCtx) return;
    if (params.playing) return;
    params.playing = true;
    currentStep = 0;
    currentBar = 0;
    nextStepTime = audioCtx.currentTime + 0.08;
    if (schedulerInterval) clearInterval(schedulerInterval);
    schedulerInterval = setInterval(scheduler, 25);
    var btn = document.getElementById('playBtn');
    btn.textContent = '◼ pause';
    btn.setAttribute('aria-pressed', 'true');
    btn.dataset.on = 'true';
  }
  function pause(){
    params.playing = false;
    if (schedulerInterval){ clearInterval(schedulerInterval); schedulerInterval = null; }
    var btn = document.getElementById('playBtn');
    btn.textContent = '▶ play';
    btn.setAttribute('aria-pressed', 'false');
    btn.dataset.on = 'false';
  }

  // ── Visualizer ──
  var kickPulse = 0;
  var lastKickPulseT = 0;
  var bgPhase = 0;
  function render(){
    requestAnimationFrame(render);
    if (audioCtx && analyser){
      analyser.getByteFrequencyData(fftData);
      analyser.getByteTimeDomainData(timeData);
      // kick detection by sub-bass energy
      var subEnergy = 0;
      for (var k = 0; k < 4; k++) subEnergy += fftData[k];
      subEnergy /= 4;
      if (subEnergy > 180 && performance.now() - lastKickPulseT > 220){
        kickPulse = 1.0;
        lastKickPulseT = performance.now();
      }
    }
    kickPulse *= 0.92;
    bgPhase += 0.008;

    // Background
    ctx.fillStyle = '#02011a';
    ctx.fillRect(0, 0, W, H);
    // Synthwave sun + perspective grid
    drawBackground();

    if (fftData){
      drawOscilloscope();
      drawSpectrum();
    }
    drawHUD();
  }

  function drawBackground(){
    // sky gradient
    var sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#070418');
    sky.addColorStop(0.45, '#1d0d4a');
    sky.addColorStop(0.65, '#5c1a72');
    sky.addColorStop(0.85, '#a0307a');
    sky.addColorStop(1, '#1f0a30');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // sun
    var sunR = Math.min(W, H) * 0.18 + kickPulse * 8;
    var sunX = W * 0.5;
    var sunY = H * 0.42;
    var grad = ctx.createRadialGradient(sunX, sunY, sunR * 0.1, sunX, sunY, sunR * 2.8);
    grad.addColorStop(0, 'rgba(255,235,140,0.85)');
    grad.addColorStop(0.45, 'rgba(255,90,160,0.55)');
    grad.addColorStop(1, 'rgba(255,40,140,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // sun disc with horizontal scan lines
    ctx.save();
    ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
    ctx.clip();
    var sg = ctx.createLinearGradient(sunX - sunR, sunY - sunR, sunX + sunR, sunY + sunR);
    sg.addColorStop(0, '#ffd454');
    sg.addColorStop(1, '#ff2bd6');
    ctx.fillStyle = sg;
    ctx.fillRect(sunX - sunR, sunY - sunR, sunR * 2, sunR * 2);
    // horizontal scan slits
    ctx.fillStyle = 'rgba(2,1,26,0.85)';
    var slitGap = sunR * 0.10;
    var slitStart = sunY + sunR * 0.05;
    var slitNum = 0;
    while (slitStart < sunY + sunR){
      var h = 2 + slitNum * 0.4;
      ctx.fillRect(sunX - sunR, slitStart, sunR * 2, h);
      slitStart += slitGap;
      slitNum++;
    }
    ctx.restore();

    // perspective grid floor
    var horizonY = H * 0.55;
    var floorH = H - horizonY;
    ctx.strokeStyle = 'rgba(92,230,255,' + (0.18 + kickPulse * 0.18) + ')';
    ctx.lineWidth = 1;
    ctx.shadowColor = '#5ce6ff'; ctx.shadowBlur = 6 + kickPulse * 6;
    // horizontal grid lines (recede toward horizon)
    var lines = 16;
    var scrollOffset = (bgPhase * 80) % (floorH / lines);
    for (var i = 0; i < lines; i++){
      var t = (i + 1) / lines;
      var y = horizonY + (t * t) * floorH - scrollOffset;
      if (y < horizonY) continue;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    // vanishing-point verticals
    var vpX = W / 2;
    for (var k = -10; k <= 10; k++){
      var x = vpX + k * (W / 16);
      ctx.beginPath();
      ctx.moveTo(vpX, horizonY);
      ctx.lineTo(vpX + (x - vpX) * 4, H);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  function drawOscilloscope(){
    var oscH = H * 0.18;
    var oscY = H * 0.04;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    // chromatic-aberration 3-pass
    var passes = [
      { off: -1, color: 'rgba(255,43,214,0.55)' },
      { off: 1, color: 'rgba(92,230,255,0.55)' },
      { off: 0, color: 'rgba(244,240,255,0.85)' }
    ];
    var step = Math.max(1, Math.floor(timeData.length / W));
    passes.forEach(function(p){
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.off === 0 ? 1.5 : 1;
      ctx.shadowColor = p.color; ctx.shadowBlur = 6;
      ctx.beginPath();
      for (var i = 0; i < W; i++){
        var idx = Math.min(timeData.length - 1, i * step);
        var v = timeData[idx] / 128 - 1; // -1..1
        var y = oscY + oscH / 2 + v * oscH * 0.45;
        if (i === 0) ctx.moveTo(i + p.off, y);
        else ctx.lineTo(i + p.off, y);
      }
      ctx.stroke();
    });
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawSpectrum(){
    var specY = H * 0.78;
    var specH = H * 0.20;
    var bars = 64;
    var barW = W / bars;
    var binStep = Math.floor(fftData.length / bars);
    for (var i = 0; i < bars; i++){
      // average a few bins for smoother bars
      var sum = 0, count = 0;
      for (var j = 0; j < binStep; j++){
        sum += fftData[i * binStep + j];
        count++;
      }
      var amp = sum / count / 255;
      var h = amp * specH;
      var hue = 200 + (i / bars) * 160;
      var x = i * barW;
      var grad = ctx.createLinearGradient(x, specY + specH, x, specY + specH - h);
      grad.addColorStop(0, 'hsla(' + hue + ',95%,40%,0.95)');
      grad.addColorStop(0.5, 'hsla(' + hue + ',95%,55%,0.95)');
      grad.addColorStop(1, 'hsla(' + hue + ',100%,75%,0.95)');
      ctx.fillStyle = grad;
      ctx.shadowColor = 'hsl(' + hue + ',100%,60%)';
      ctx.shadowBlur = 8;
      ctx.fillRect(x + 1, specY + specH - h, barW - 2, h);
    }
    ctx.shadowBlur = 0;
  }

  function drawHUD(){
    if (!audioCtx) return;
    // current step indicator (16-step strip)
    var stripY = H - 6;
    var stripW = W * 0.6;
    var stripX = (W - stripW) / 2;
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    for (var i = 0; i < 16; i++){
      var x = stripX + i * (stripW / 16);
      var on = (i === currentStep && params.playing);
      ctx.fillStyle = on ? '#5ce6ff' : 'rgba(255,255,255,0.10)';
      if (on){ ctx.shadowColor = '#5ce6ff'; ctx.shadowBlur = 8; }
      ctx.fillRect(x + 1, stripY, stripW / 16 - 2, 3);
      ctx.shadowBlur = 0;
    }
  }

  requestAnimationFrame(render);

  // ── Controls wiring ──
  function bindKnob(inputId, valueId, fmt, applyFn){
    var inp = document.getElementById(inputId);
    var v = document.getElementById(valueId);
    function sync(){
      var raw = parseFloat(inp.value);
      v.textContent = fmt(raw);
      applyFn(raw);
    }
    inp.addEventListener('input', sync);
    sync();
  }

  bindKnob('cutoffInput', 'cutoffVal', function(v){ return Math.round(v) + ' Hz'; }, function(v){ params.padCutoff = v; });
  bindKnob('lfoRateInput', 'lfoRateVal', function(v){ return v.toFixed(2) + ' Hz'; }, function(v){
    params.lfoRate = v;
    if (lfoOsc) lfoOsc.frequency.setTargetAtTime(v, audioCtx.currentTime, 0.05);
  });
  bindKnob('lfoDepthInput', 'lfoDepthVal', function(v){ return Math.round(v) + '%'; }, function(v){
    params.lfoDepth = v / 100;
    if (lfoGain) lfoGain.gain.setTargetAtTime(params.padCutoff * params.lfoDepth, audioCtx.currentTime, 0.05);
  });
  bindKnob('detuneInput', 'detuneVal', function(v){ return Math.round(v) + ' ¢'; }, function(v){ params.detune = v; });
  bindKnob('leadInput', 'leadVal', function(v){ return Math.round(v) + '%'; }, function(v){ params.leadDensity = v / 100; });
  bindKnob('vinylInput', 'vinylVal', function(v){ return Math.round(v) + '%'; }, function(v){
    params.vinyl = v / 100;
    if (vinylGain) vinylGain.gain.setTargetAtTime(params.vinyl * 0.10, audioCtx.currentTime, 0.05);
  });
  bindKnob('revInput', 'revVal', function(v){ return Math.round(v) + '%'; }, function(v){
    params.reverb = v / 100;
    if (reverbSend) reverbSend.gain.setTargetAtTime(params.reverb, audioCtx.currentTime, 0.05);
  });
  bindKnob('bpmInput', 'bpmVal', function(v){ return Math.round(v); }, function(v){ params.bpm = v; });
  bindKnob('volInput', 'volVal', function(v){ return Math.round(v); }, function(v){
    params.volume = v / 100;
    if (masterGain && !params.muted) masterGain.gain.setTargetAtTime(params.volume, audioCtx.currentTime, 0.05);
  });

  // Key buttons
  document.querySelectorAll('.key-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      params.keyOffset = parseInt(btn.dataset.key, 10) || 0;
      document.querySelectorAll('.key-btn').forEach(function(b){
        b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
      });
    });
  });
  document.querySelectorAll('.swing-chip').forEach(function(btn){
    btn.addEventListener('click', function(){
      params.swing = parseFloat(btn.dataset.swing) || 0;
      document.querySelectorAll('.swing-chip').forEach(function(b){
        b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
      });
    });
  });

  // Transport
  document.getElementById('playBtn').addEventListener('click', function(){
    if (params.playing) pause(); else play();
  });
  document.getElementById('muteBtn').addEventListener('click', function(){
    params.muted = !params.muted;
    this.setAttribute('aria-pressed', params.muted ? 'true' : 'false');
    if (masterGain){
      masterGain.gain.setTargetAtTime(params.muted ? 0 : params.volume, audioCtx.currentTime, 0.05);
    }
    this.textContent = params.muted ? '♪ off' : '♪';
  });

  // Keyboard shortcuts
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    if (e.code === 'Space'){ e.preventDefault(); document.getElementById('playBtn').click(); }
    else if (e.code === 'KeyM'){ document.getElementById('muteBtn').click(); }
  });
})();
</script>
</body>
</html>
