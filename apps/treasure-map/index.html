<html lang="en">

<meta property="og:description" content="Procedurally-generated treasure maps with hidden chests, sea monsters, and cursed islands. Dig where you dare.">

<style>
  :root{
    --parchment-1:  #f2dcb2;
    --parchment-2:  #e8c98a;
    --parchment-3:  #d9b572;
    --stain:        #8a5a2a;
    --ink:          #1d1108;
    --ink-2:        #3a2410;
    --sepia:        #6b3e16;
    --wax-red:      #9a1a1e;
    --gold:         #b88a2a;
    --gold-bright:  #d9a83a;
    --bone:         #f5ecc8;
    --depth:        #3a4a48;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{
    background: #1a0e06;
    color: var(--ink);
    overflow-x: hidden;
  }
  body{
    font-family: 'IM Fell English', 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, #2a1808 0%, #0a0402 80%),
      #1a0e06;
    padding: 20px 16px 40px;
  }

  /* ── Top bar ────────────────────────────────────────────── */
  .top{
    max-width: 1280px; margin: 0 auto 16px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    background:
      linear-gradient(180deg, var(--parchment-1), var(--parchment-3));
    border: 1px solid rgba(0,0,0,0.4);
    border-radius: 4px;
    padding: 10px 18px;
    box-shadow:
      0 2px 0 rgba(0,0,0,0.3),
      0 8px 24px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .top h1{
    font-family: 'UnifrakturCook', serif;
    font-size: clamp(22px, 3.4vw, 32px);
    color: var(--wax-red);
    letter-spacing: 0.02em;
    line-height: 1;
    text-shadow: 0 1px 0 rgba(255,255,255,0.3);
  }
  .top h1 em{
    color: var(--ink);
    font-style: italic;
    font-family: 'IM Fell English', serif;
    font-size: 0.6em;
    margin-left: 6px;
    letter-spacing: 0.04em;
  }
  .top .seed-row{
    display: flex; align-items: center; gap: 8px;
    font-family: 'IM Fell English', serif;
    font-size: 14px;
    color: var(--ink-2);
  }
  .top .seed-input{
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--ink-2);
    border-radius: 2px;
    padding: 4px 10px;
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    width: 100px;
    outline: none;
  }
  .top .seed-input:focus{ border-color: var(--wax-red); box-shadow: 0 0 0 2px rgba(154,26,30,0.2); }
  .top button{
    background: var(--wax-red);
    color: #fdf6e8;
    border: 1px solid #5a0c10;
    padding: 5px 14px;
    font-family: 'IM Fell English SC', 'IM Fell English', serif;
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 2px;
    cursor: pointer;
    box-shadow: 0 2px 0 #5a0c10, inset 0 1px 0 rgba(255,255,255,0.18);
    transition: transform 80ms;
  }
  .top button:hover{ transform: translateY(-1px); }
  .top button:active{ transform: translateY(1px); box-shadow: 0 0 0 #5a0c10, inset 0 1px 0 rgba(255,255,255,0.18); }
  .top button.ghost{
    background: rgba(255,255,255,0.5);
    color: var(--ink);
    border-color: var(--ink-2);
    box-shadow: 0 2px 0 var(--ink-2), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .top .stats{ margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; font-family: 'IM Fell English SC', serif; font-size: 13px; }
  .top .stats .item b{ color: var(--wax-red); }

  /* ── Map container ──────────────────────────────────────── */
  .stage{
    position: relative;
    max-width: 1280px; margin: 0 auto;
    aspect-ratio: 3 / 2;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, var(--parchment-1) 0%, var(--parchment-2) 50%, var(--parchment-3) 90%);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.35),
      0 4px 0 rgba(0,0,0,0.35),
      0 18px 56px rgba(0,0,0,0.7),
      inset 0 0 80px rgba(160,100,30,0.35),
      inset 0 0 0 2px rgba(0,0,0,0.15);
    overflow: hidden;
    cursor: crosshair;
    transition: filter 0.3s;
  }
  .stage::before{
    /* paper fibre grain */
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(7deg,
        rgba(60,30,10,0.04) 0 1px,
        transparent 1px 4px),
      repeating-linear-gradient(97deg,
        rgba(60,30,10,0.05) 0 1px,
        transparent 1px 6px);
    pointer-events: none;
    z-index: 1;
  }
  .stage::after{
    /* burnt-edge vignette */
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 100% 100% at 50% 50%, transparent 50%, rgba(40,20,4,0.35) 100%),
      radial-gradient(ellipse 30% 22% at 12% 18%, rgba(60,30,10,0.28), transparent 70%),
      radial-gradient(ellipse 22% 28% at 88% 88%, rgba(60,30,10,0.32), transparent 70%),
      radial-gradient(ellipse 28% 18% at 80% 22%, rgba(80,50,20,0.22), transparent 70%),
      radial-gradient(ellipse 22% 26% at 18% 78%, rgba(80,50,20,0.20), transparent 70%);
    pointer-events: none;
    z-index: 2;
  }
  .stage svg.map{
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
    z-index: 1;
  }
  .stage.shaking{
    animation: stageShake 0.3s ease-in-out;
  }
  @keyframes stageShake{
    0%, 100%{ transform: translateX(0); }
    25%     { transform: translateX(-4px); }
    75%     { transform: translateX(4px); }
  }

  /* ── Floating reveal toasts ─────────────────────────────── */
  .reveal-toast{
    position: absolute;
    background: rgba(245,236,200,0.96);
    border: 1px solid var(--ink-2);
    border-radius: 3px;
    padding: 8px 14px;
    font-family: 'IM Fell English', serif;
    color: var(--ink);
    font-size: 14px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.35);
    transform: translate(-50%, -110%);
    z-index: 12;
    pointer-events: none;
    animation: revealFloat 2.6s ease-out forwards;
    max-width: 240px;
    text-align: center;
  }
  .reveal-toast .what{
    font-family: 'UnifrakturCook', serif;
    font-size: 18px;
    color: var(--wax-red);
    display: block;
    margin-bottom: 2px;
  }
  .reveal-toast.bad .what{ color: var(--depth); }
  .reveal-toast.monster .what{ color: var(--wax-red); }
  .reveal-toast .flavor{
    font-style: italic; color: var(--sepia); font-size: 12px;
  }
  @keyframes revealFloat{
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    14%  { opacity: 1; transform: translate(-50%, -110%) scale(1); }
    78%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -170%) scale(1); }
  }

  /* ── Loot panel (top-right floating, collapsible) ───────── */
  .loot-panel{
    position: fixed;
    top: 90px; right: 16px;
    width: 280px;
    background:
      linear-gradient(180deg, var(--parchment-1), var(--parchment-3));
    border: 1px solid var(--ink-2);
    border-radius: 4px;
    padding: 10px 14px 12px;
    box-shadow:
      0 2px 0 rgba(0,0,0,0.3),
      0 10px 26px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.35);
    z-index: 20;
    font-family: 'IM Fell English', serif;
    transform-origin: top right;
    transition: transform 0.2s, opacity 0.2s;
  }
  .loot-panel.hidden{
    transform: scale(0.7) translate(20px, -20px);
    opacity: 0;
    pointer-events: none;
  }
  .loot-panel h2{
    font-family: 'UnifrakturCook', serif;
    font-size: 22px;
    color: var(--wax-red);
    margin-bottom: 4px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--ink-2);
    display: flex; align-items: baseline; gap: 8px;
  }
  .loot-panel h2 small{
    font-family: 'IM Fell English SC', serif;
    color: var(--ink-2);
    font-size: 11px;
    margin-left: auto;
    letter-spacing: 0.08em;
  }
  .loot-panel .empty{
    color: var(--sepia); font-style: italic;
    padding: 16px 8px;
    text-align: center;
    font-size: 14px;
  }
  .loot-list{ list-style: none; padding: 0; max-height: 50vh; overflow-y: auto; }
  .loot-list li{
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0;
    border-bottom: 1px dashed rgba(0,0,0,0.15);
    font-size: 14px;
    animation: lootAdd 0.5s ease-out;
  }
  .loot-list li .ic{ font-size: 22px; line-height: 1; width: 28px; text-align: center; }
  .loot-list li .nm{ flex: 1; color: var(--ink); }
  .loot-list li .val{ color: var(--gold); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; }
  .loot-list li.bad .val{ color: var(--depth); }
  @keyframes lootAdd{
    0%   { opacity: 0; transform: translateX(40px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  .loot-panel .total{
    margin-top: 10px;
    border-top: 1px dashed var(--ink-2);
    padding-top: 6px;
    font-family: 'IM Fell English SC', serif;
    display: flex; align-items: center; gap: 8px;
    font-size: 14px;
  }
  .loot-panel .total .v{
    margin-left: auto; font-family: 'JetBrains Mono', monospace;
    color: var(--wax-red); font-size: 16px; font-weight: 700;
  }
  .loot-panel-toggle{
    position: fixed;
    top: 90px; right: 16px;
    background:
      linear-gradient(180deg, var(--parchment-1), var(--parchment-3));
    border: 1px solid var(--ink-2);
    border-radius: 4px;
    padding: 6px 12px;
    font-family: 'IM Fell English SC', serif;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 2px 0 rgba(0,0,0,0.3), 0 6px 16px rgba(0,0,0,0.4);
    z-index: 19;
    display: none;
  }
  .loot-panel-toggle.show{ display: block; }

  /* ── Hint card (bottom) ────────────────────────────────── */
  .hint{
    max-width: 1280px;
    margin: 14px auto 0;
    padding: 8px 18px;
    background: rgba(245,236,200,0.08);
    border: 1px dashed rgba(245,236,200,0.25);
    border-radius: 4px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--parchment-1);
    font-size: 14px;
    text-align: center;
  }
  .hint b{ color: var(--gold-bright); font-style: normal; font-family: 'IM Fell English SC', serif; letter-spacing: 0.04em; }

  /* SVG element classes */
  .ink-line   { stroke: var(--ink); fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .ink-thin   { stroke-width: 0.6; }
  .ink-thick  { stroke-width: 1.4; }
  .ink-vthick { stroke-width: 2.2; }
  .island-fill{ fill: var(--parchment-2); }
  .island-shade{ fill: rgba(110,70,30,0.18); }
  .water-line { stroke: rgba(60,80,90,0.45); stroke-width: 0.7; fill: none; stroke-linecap: round; }
  .compass-fill{ fill: rgba(40,20,8,0.85); }
  .route-line { stroke: var(--wax-red); stroke-width: 1.4; stroke-dasharray: 4 3; fill: none; stroke-linecap: round; }
  .x-mark     { stroke: var(--wax-red); stroke-width: 2.6; stroke-linecap: round; fill: none; }
  .x-mark.found{ stroke: var(--gold-bright); }
  .ink-text{
    font-family: 'IM Fell English SC', 'IM Fell English', serif;
    fill: var(--ink-2);
    letter-spacing: 0.06em;
  }
  .ink-text.label{
    font-size: 12px;
    text-anchor: middle;
  }
  .ink-text.note{
    font-size: 9px;
    font-style: italic;
    fill: var(--sepia);
    font-family: 'IM Fell English', serif;
  }
  .dig-mark{
    stroke: rgba(60,30,10,0.65); stroke-width: 1.4; fill: none; stroke-linecap: round;
  }
  .ship-body{ fill: #6b4520; stroke: var(--ink); stroke-width: 0.8; }
  .sail{ fill: rgba(245,236,200,0.85); stroke: var(--ink-2); stroke-width: 0.6; }
  .monster-ink{ stroke: var(--ink); stroke-width: 1.2; fill: rgba(40,20,8,0.55); stroke-linecap: round; stroke-linejoin: round; }
  .monster-eye{ fill: var(--wax-red); }

  /* Responsive */
  @media (max-width: 820px){
    .loot-panel{ width: 220px; top: 80px; right: 8px; padding: 8px 10px 10px; }
    .top{ padding: 8px 12px; }
    .stage{ aspect-ratio: 1 / 1; }
  }
  @media (max-width: 520px){
    .loot-panel{ width: 200px; }
    .top h1{ font-size: 20px; }
    .top .stats{ font-size: 11px; }
  }
  /* Focus */
  button:focus-visible, input:focus-visible{
    outline: 2px solid var(--wax-red); outline-offset: 2px;
  }
  /* Reduced motion */
  @media (prefers-reduced-motion: reduce){
    .stage.shaking{ animation: none; }
    .reveal-toast, .loot-list li{ animation: none; }
  }
</style>

<body>

<div class="top">
  <h1>Pirate Treasure Map <em>· chart no. <span id="chart-num">001</span></em></h1>

<script>
'use strict';

/* ── Seeded PRNG (mulberry32) + FNV-1a hash for string seeds ───── */
function fnv1a(str){
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h >>> 0;
}
function mulberry32(a){
  return function(){
    let t = (a += 0x6D2B79F5) >>> 0;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function pick(rng, arr){ return arr[Math.floor(rng() * arr.length)]; }
function range(rng, lo, hi){ return lo + rng() * (hi - lo); }

/* ── Name pools ────────────────────────────────────────────────── */
const ISLAND_NAMES = [
  'Skull Isle', 'Bone Cay', 'Rotten Reef', 'Captains Folly', 'The Devils Knee',
  'Mermaids Veil', 'Crows Crag', 'Old Mans Tooth', 'Drowned Hope', 'Goldfingers Rest',
  'Black Sail Spit', 'Thunder Hook', 'The Widows Apron', 'Singing Cliffs', 'Cursed Cradle',
  'The Drunk Compass', 'Wet Powder Bay', 'Iron Belch', 'Ghost Salt Atoll', 'The Last Bottle',
];
const SEA_NAMES = [
  'Sea of Sighs', 'The Forsaken Strait', 'Drowners Bight', 'The Cursed Channel',
  'Maelstrom Reach', 'Tooth and Tail Bay', 'The Black Boil',
];
const TREASURE_TYPES = [
  { ic: '💰', name: 'Doubloons',         min: 80,  max: 240, flavor: 'a heavy purse of Spanish gold' },
  { ic: '💎', name: 'Bloodgem',          min: 200, max: 500, flavor: 'a single ruby the size of an eye' },
  { ic: '💍', name: 'Cursed Ring',       min: 40,  max: 90,  flavor: "the giver of which you'll meet, eventually" },
  { ic: '⚱️', name: 'Burial Urn',        min: 30,  max: 110, flavor: 'previous owner is still listening' },
  { ic: '🏺', name: 'Ancient Amphora',   min: 90,  max: 220, flavor: 'olive oil, still good. (it is not still good.)' },
  { ic: '📜', name: 'Coded Map',         min: 50,  max: 180, flavor: 'leads to another map. of course.' },
  { ic: '🗡️', name: 'Officer’s Cutlass', min: 60,  max: 150, flavor: 'nicked but eager' },
  { ic: '⚜️', name: 'Royal Seal',        min: 110, max: 280, flavor: 'the royal in question being long dead' },
  { ic: '🔱', name: 'Trident Pendant',   min: 70,  max: 190, flavor: 'looted from a temple no map names' },
  { ic: '🦴', name: 'Ivory Carving',     min: 50,  max: 130, flavor: 'depicts a ship, going down' },
];
const RED_HERRINGS = [
  { ic: '🥾', name: 'An Old Boot',        flavor: 'still slightly warm. you dont ask.' },
  { ic: '🦀', name: 'A Dead Crab',        flavor: 'staring at you with great judgement' },
  { ic: '🪨', name: 'Just Rocks',         flavor: 'a heart-shaped one. you keep it.' },
  { ic: '🐟', name: 'A Salted Herring',   flavor: 'still in the wrapper. brand: "BOB’S"' },
  { ic: '📰', name: 'Old Newsprint',      flavor: '"KING’S NOSE STILL OFF" — 1671' },
  { ic: '🍖', name: 'Salt Pork (lifetime supply)', flavor: 'the lifetime of the pig was last Wednesday' },
  { ic: '🎵', name: 'A Sea Shanty',       flavor: 'half-remembered. ends in tears.' },
  { ic: '🧦', name: 'A Single Wet Sock',  flavor: 'belongs to no known sailor' },
];
const MONSTERS = [
  { id: 'kraken',  ic: '🐙', name: 'Kraken',         loss: 'ink-stained logbook',     gold: 60 },
  { id: 'serpent', ic: '🐍', name: 'Sea Serpent',    loss: 'a sock, a finger',         gold: 40 },
  { id: 'shark',   ic: '🦈', name: 'White Shark',    loss: 'rowing boat',              gold: 30 },
  { id: 'mermaid', ic: '🧜‍♀️', name: 'Mermaid',         loss: 'three days of memory',     gold: -20 },
  { id: 'whirlpool', ic: '🌀', name: 'Whirlpool',    loss: 'half the rum stores',      gold: 50 },
];

/* ── State ─────────────────────────────────────────────────────── */
const state = {
  seed: null,
  rng: null,
  map: null,
  found: [],      // [{ ix, ...treasure }] discovered treasures
  digs: [],       // [{x, y, t}] dig markers
  monstersFought: 0,
};

/* ── Map generator ─────────────────────────────────────────────── */
const W = 1200, H = 800;

function generateMap(seedStr){
  const seed = fnv1a(String(seedStr).toUpperCase());
  const rng = mulberry32(seed);
  // 4-7 islands
  const islandCount = 4 + Math.floor(rng() * 4);
  const islands = [];
  for (let i = 0; i < islandCount; i++){
    let cx, cy, r, attempts = 0;
    // try to space them out
    do {
      cx = range(rng, 140, W - 140);
      cy = range(rng, 110, H - 110);
      r  = range(rng, 50, 110);
      attempts++;
    } while (
      attempts < 60 &&
      islands.some(o => Math.hypot(o.cx - cx, o.cy - cy) < o.r + r + 60)
    );
    // build organic outline (24-32 points)
    const N = 24 + Math.floor(rng() * 9);
    const outline = [];
    for (let k = 0; k < N; k++){
      const a = (k / N) * Math.PI * 2;
      const rr = r * (0.7 + rng() * 0.55);
      outline.push([cx + Math.cos(a) * rr, cy + Math.sin(a) * rr]);
    }
    // mountains: 1-3 small peaks
    const peaks = [];
    const peakCount = 1 + Math.floor(rng() * 3);
    for (let p = 0; p < peakCount; p++){
      peaks.push({
        x: cx + (rng() - 0.5) * r * 0.9,
        y: cy + (rng() - 0.5) * r * 0.5 - r * 0.1,
        h: 18 + rng() * 22,
      });
    }
    // palm trees: 1-4
    const palms = [];
    const palmCount = 1 + Math.floor(rng() * 4);
    for (let p = 0; p < palmCount; p++){
      palms.push({
        x: cx + (rng() - 0.5) * r * 1.2,
        y: cy + (rng() - 0.5) * r * 0.8 + r * 0.2,
        h: 10 + rng() * 8,
      });
    }
    islands.push({
      id: 'isl-' + i,
      cx, cy, r, outline, peaks, palms,
      name: pick(rng, ISLAND_NAMES),
    });
  }
  // pick treasure locations: ~70% on islands, ~30% in open water
  const treasures = [];
  const trCount = 6 + Math.floor(rng() * 4); // 6-9 treasures
  for (let t = 0; t < trCount; t++){
    let x, y, onIsland = false;
    if (rng() < 0.7 && islands.length){
      const isl = pick(rng, islands);
      const a = rng() * Math.PI * 2;
      const rr = rng() * isl.r * 0.7;
      x = isl.cx + Math.cos(a) * rr;
      y = isl.cy + Math.sin(a) * rr;
      onIsland = true;
    } else {
      // open water, not too close to any island
      let attempts = 0;
      do {
        x = range(rng, 80, W - 80);
        y = range(rng, 80, H - 80);
        attempts++;
      } while (
        attempts < 40 &&
        islands.some(o => Math.hypot(o.cx - x, o.cy - y) < o.r + 30)
      );
    }
    const type = pick(rng, TREASURE_TYPES);
    const value = Math.floor(type.min + rng() * (type.max - type.min));
    treasures.push({
      id: 'tr-' + t,
      x, y, onIsland,
      // Show X mark on map ONLY for island treasures (more visible hint).
      // Underwater treasures are pure mystery.
      visibleX: onIsland,
      type, value,
      foundIdx: -1,
    });
  }
  // sea monsters: 2-4 in open water
  const monsters = [];
  const monsterCount = 2 + Math.floor(rng() * 3);
  for (let m = 0; m < monsterCount; m++){
    let x, y, attempts = 0;
    do {
      x = range(rng, 120, W - 120);
      y = range(rng, 120, H - 120);
      attempts++;
    } while (
      attempts < 40 &&
      islands.some(o => Math.hypot(o.cx - x, o.cy - y) < o.r + 40)
    );
    const m_type = pick(rng, MONSTERS);
    monsters.push({
      id: 'm-' + m,
      x, y, type: m_type,
      rot: rng() * Math.PI * 2,
    });
  }
  // route: connect ship-port island → 2-3 islands in order
  const route = islands.length >= 2
    ? islands.slice(0, Math.min(4, islands.length))
      .map(i => ({ x: i.cx, y: i.cy }))
    : [];
  // ship at the first island
  const ship = islands.length ? {
    x: islands[0].cx + islands[0].r + 20,
    y: islands[0].cy + 8,
  } : { x: 100, y: 100 };
  // compass position: top-right corner that isn't covered by an island
  let compass = { x: W - 110, y: 110 };
  // sea names sprinkled in gaps (1-2)
  const seaLabels = [];
  for (let s = 0; s < 1 + Math.floor(rng() * 2); s++){
    let x, y, attempts = 0;
    do {
      x = range(rng, 200, W - 200);
      y = range(rng, 200, H - 200);
      attempts++;
    } while (
      attempts < 30 &&
      islands.some(o => Math.hypot(o.cx - x, o.cy - y) < o.r + 60)
    );
    seaLabels.push({ x, y, name: pick(rng, SEA_NAMES) });
  }
  return { seed, seedStr, islands, treasures, monsters, route, ship, compass, seaLabels };
}

/* ── SVG helpers ─────────────────────────────────────────────── */
function svgEl(tag, attrs, parent){
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const k in attrs){
    if (attrs[k] !== null && attrs[k] !== undefined) el.setAttribute(k, attrs[k]);
  }
  if (parent) parent.appendChild(el);
  return el;
}
function clearLayer(id){
  const el = document.getElementById(id);
  while (el.firstChild) el.removeChild(el.firstChild);
}
// Smooth catmull-rom-ish closed path
function smoothClosedPath(points){
  if (points.length < 2) return '';
  let d = 'M ' + points[0][0] + ' ' + points[0][1];
  for (let i = 0; i < points.length; i++){
    const p0 = points[(i - 1 + points.length) % points.length];
    const p1 = points[i];
    const p2 = points[(i + 1) % points.length];
    const p3 = points[(i + 2) % points.length];
    const c1x = p1[0] + (p2[0] - p0[0]) / 6;
    const c1y = p1[1] + (p2[1] - p0[1]) / 6;
    const c2x = p2[0] - (p3[0] - p1[0]) / 6;
    const c2y = p2[1] - (p3[1] - p1[1]) / 6;
    d += ' C ' + c1x + ' ' + c1y + ', ' + c2x + ' ' + c2y + ', ' + p2[0] + ' ' + p2[1];
  }
  return d + ' Z';
}

function renderIslands(islands){
  clearLayer('layer-islands');
  const layer = document.getElementById('layer-islands');
  islands.forEach(isl => {
    // shadow underneath
    svgEl('ellipse', {
      cx: isl.cx, cy: isl.cy + isl.r * 0.6,
      rx: isl.r * 0.95, ry: isl.r * 0.18,
      fill: 'rgba(0,0,0,0.10)',
    }, layer);
    // shore halo (offset bigger outline)
    const haloPts = isl.outline.map(([x, y]) => {
      const dx = x - isl.cx, dy = y - isl.cy;
      const len = Math.hypot(dx, dy) || 1;
      return [isl.cx + dx * 1.08, isl.cy + dy * 1.08];
    });
    svgEl('path', {
      d: smoothClosedPath(haloPts),
      fill: 'none',
      stroke: 'rgba(60,80,90,0.35)',
      'stroke-width': 0.6,
      'stroke-dasharray': '2 2',
    }, layer);
    // island body
    svgEl('path', {
      d: smoothClosedPath(isl.outline),
      class: 'island-fill',
    }, layer);
    // island outline (inked)
    svgEl('path', {
      d: smoothClosedPath(isl.outline),
      class: 'ink-line ink-thick',
    }, layer);
    // shading splotch
    svgEl('ellipse', {
      cx: isl.cx + isl.r * 0.2, cy: isl.cy + isl.r * 0.25,
      rx: isl.r * 0.55, ry: isl.r * 0.35,
      class: 'island-shade',
    }, layer);
    // mountains
    isl.peaks.forEach(p => {
      const half = p.h * 0.55;
      svgEl('path', {
        d: 'M ' + (p.x - half) + ' ' + p.y +
           ' L ' + p.x + ' ' + (p.y - p.h) +
           ' L ' + (p.x + half) + ' ' + p.y,
        class: 'ink-line ink-thick',
      }, layer);
      // shading line
      svgEl('path', {
        d: 'M ' + (p.x + 1) + ' ' + (p.y - p.h * 0.5) +
           ' L ' + (p.x + half * 0.7) + ' ' + p.y,
        class: 'ink-line ink-thin',
      }, layer);
    });
    // palm trees
    isl.palms.forEach(t => {
      // trunk
      svgEl('path', {
        d: 'M ' + t.x + ' ' + t.y +
           ' q -2 -' + (t.h * 0.4) + ' 0 -' + t.h,
        class: 'ink-line ink-thick',
      }, layer);
      // fronds: 4 arcs
      const top = { x: t.x, y: t.y - t.h };
      for (let f = 0; f < 4; f++){
        const ang = (-Math.PI / 2) + (f - 1.5) * 0.6;
        const fx = top.x + Math.cos(ang) * t.h * 0.6;
        const fy = top.y + Math.sin(ang) * t.h * 0.6;
        const mx = top.x + Math.cos(ang) * t.h * 0.3;
        const my = top.y + Math.sin(ang) * t.h * 0.3 - 2;
        svgEl('path', {
          d: 'M ' + top.x + ' ' + top.y + ' Q ' + mx + ' ' + my + ' ' + fx + ' ' + fy,
          class: 'ink-line ink-thick',
        }, layer);
      }
    });
    // island name label
    const labelY = isl.cy + isl.r + 18;
    svgEl('text', {
      x: isl.cx, y: labelY,
      class: 'ink-text label',
      'text-anchor': 'middle',
    }, layer).textContent = isl.name;
  });
}

function drawMonster(g, id){
  if (id === 'kraken'){
    // 5 tentacles emerging from a small wave
    for (let i = 0; i < 5; i++){
      const ang = -Math.PI / 2 + (i - 2) * 0.6;
      const tipX = Math.cos(ang) * 32;
      const tipY = Math.sin(ang) * 32;
      const midX = Math.cos(ang) * 18 - Math.sin(ang) * 8;
      const midY = Math.sin(ang) * 18 + Math.cos(ang) * 8;
      svgEl('path', {
        d: 'M 0 0 Q ' + midX + ' ' + midY + ' ' + tipX + ' ' + tipY,
        class: 'monster-ink',
        'stroke-width': 3,
      }, g);
      // suction dots
      for (let s = 0; s < 3; s++){
        const f = (s + 1) / 4;
        const sx = midX * f + tipX * (1 - f);
        const sy = midY * f + tipY * (1 - f);
        svgEl('circle', { cx: sx + Math.sin(ang) * 1.5, cy: sy - Math.cos(ang) * 1.5, r: 0.9, fill: 'var(--ink)' }, g);
      }
    }
    // base wave splash
    svgEl('ellipse', { cx: 0, cy: 5, rx: 14, ry: 3, class: 'water-line', 'stroke-width': 1.2 }, g);
    svgEl('ellipse', { cx: 0, cy: 10, rx: 22, ry: 4, class: 'water-line', 'stroke-width': 0.8 }, g);
  } else if (id === 'serpent'){
    // S-curve body
    svgEl('path', {
      d: 'M -28 8 Q -16 -12 0 0 Q 16 12 28 -8 Q 36 -16 30 -22',
      class: 'monster-ink',
      'stroke-width': 3.5,
      fill: 'none',
    }, g);
    // spines (small triangles along the back)
    for (let i = -22; i <= 22; i += 8){
      svgEl('path', {
        d: 'M ' + i + ' -6 L ' + (i + 1) + ' -10 L ' + (i + 3) + ' -6 Z',
        class: 'monster-ink', fill: 'var(--ink)',
      }, g);
    }
    // head with eye + fangs
    svgEl('circle', { cx: 30, cy: -22, r: 3.5, fill: 'rgba(40,20,8,0.85)', stroke: 'var(--ink)', 'stroke-width': 0.8 }, g);
    svgEl('circle', { cx: 31, cy: -22, r: 1, class: 'monster-eye' }, g);
    svgEl('path', { d: 'M 33 -19 L 33.5 -16 M 31 -19 L 30.5 -16',
      class: 'ink-line ink-thin', stroke: 'var(--bone)', 'stroke-width': 1 }, g);
    // tail fin
    svgEl('path', { d: 'M -28 8 L -38 4 L -36 12 Z',
      class: 'monster-ink', fill: 'var(--ink)' }, g);
  } else if (id === 'shark'){
    // dorsal fin above water
    svgEl('path', {
      d: 'M -14 6 L 0 -14 L 14 6 Z',
      class: 'monster-ink', 'stroke-width': 2, fill: 'rgba(40,20,8,0.85)',
    }, g);
    // water disturbance
    svgEl('path', { d: 'M -24 8 Q 0 4 24 8', class: 'water-line', 'stroke-width': 1.2 }, g);
    svgEl('path', { d: 'M -30 14 Q 0 11 30 14', class: 'water-line', 'stroke-width': 0.8 }, g);
  } else if (id === 'mermaid'){
    // tail flicking out of water
    svgEl('path', {
      d: 'M 0 18 Q -4 0 -6 -12 Q 4 -8 14 -16 L 22 -8 Q 14 0 6 4 Q 4 14 0 18',
      class: 'monster-ink', 'stroke-width': 2,
      fill: 'rgba(60,90,80,0.55)',
    }, g);
    // tail scales (small arcs)
    for (let i = 0; i < 3; i++){
      svgEl('path', {
        d: 'M ' + (-4 + i * 4) + ' ' + (-4 - i * 3) + ' q 2 1 4 0',
        class: 'ink-line ink-thin',
      }, g);
    }
    // splash
    svgEl('path', { d: 'M -16 16 q 16 -6 32 0', class: 'water-line', 'stroke-width': 1.2 }, g);
  } else if (id === 'whirlpool'){
    // spiral
    let d = 'M 0 0';
    for (let t = 0; t < 7; t += 0.2){
      const r = 2 + t * 3;
      const a = t * 1.6;
      d += ' L ' + (Math.cos(a) * r) + ' ' + (Math.sin(a) * r);
    }
    svgEl('path', { d, class: 'water-line', 'stroke-width': 1.4, fill: 'none' }, g);
    svgEl('circle', { cx: 0, cy: 0, r: 22, class: 'water-line', 'stroke-width': 0.8 }, g);
    svgEl('circle', { cx: 0, cy: 0, r: 28, class: 'water-line', 'stroke-width': 0.6, 'stroke-dasharray': '3 2' }, g);
  }
}
function renderRoute(route){
  clearLayer('layer-route');
  const layer = document.getElementById('layer-route');
  if (route.length < 2) return;
  let d = 'M ' + route[0].x + ' ' + route[0].y;
  for (let i = 1; i < route.length; i++){
    const p = route[i - 1], q = route[i];
    // gentle curve via control point offset perpendicular
    const dx = q.x - p.x, dy = q.y - p.y;
    const mx = (p.x + q.x) / 2 + dy * 0.16;
    const my = (p.y + q.y) / 2 - dx * 0.16;
    d += ' Q ' + mx + ' ' + my + ' ' + q.x + ' ' + q.y;
  }
  svgEl('path', { d, class: 'route-line' }, layer);
}
function renderCompass(compass){
  clearLayer('layer-compass');
  const layer = document.getElementById('layer-compass');
  const cx = compass.x, cy = compass.y, R = 50;
  // outer ring
  svgEl('circle', { cx, cy, r: R, fill: 'none', class: 'ink-line ink-thick' }, layer);
  svgEl('circle', { cx, cy, r: R - 8, fill: 'none', class: 'ink-line ink-thin' }, layer);
  // 8 points
  for (let i = 0; i < 8; i++){
    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    const major = (i % 2 === 0);
    const r1 = R - 8, r2 = R;
    svgEl('line', {
      x1: cx + Math.cos(a) * r1, y1: cy + Math.sin(a) * r1,
      x2: cx + Math.cos(a) * r2, y2: cy + Math.sin(a) * r2,
      class: 'ink-line ' + (major ? 'ink-thick' : 'ink-thin'),
    }, layer);
  }
  // cardinal star
  ['N','E','S','W'].forEach((c, i) => {
    const a = (i / 4) * Math.PI * 2 - Math.PI / 2;
    const r = R + 12;
    const tx = cx + Math.cos(a) * r;
    const ty = cy + Math.sin(a) * r + 4;
    const tt = svgEl('text', { x: tx, y: ty,
      class: 'ink-text', 'font-size': 13,
      'text-anchor': 'middle',
    }, layer);
    tt.textContent = c;
    tt.style.fill = c === 'N' ? 'var(--wax-red)' : 'var(--ink-2)';
    tt.style.fontWeight = 700;
  });
  // 4-pointed rose (filled triangles)
  const rosePts = [
    [cx, cy - (R - 12)],   [cx + 6, cy],
    [cx, cy + (R - 12)],   [cx - 6, cy],
  ];
  svgEl('path', {
    d: 'M ' + rosePts.map(p => p.join(' ')).join(' L ') + ' Z',
    fill: 'rgba(154,26,30,0.78)',
    stroke: 'var(--ink)', 'stroke-width': 0.8,
  }, layer);
  // perpendicular rose (smaller)
  const rosePts2 = [
    [cx + (R - 18), cy],   [cx, cy - 5],
    [cx - (R - 18), cy],   [cx, cy + 5],
  ];
  svgEl('path', {
    d: 'M ' + rosePts2.map(p => p.join(' ')).join(' L ') + ' Z',
    fill: 'rgba(40,20,8,0.5)',
    stroke: 'var(--ink)', 'stroke-width': 0.5,
  }, layer);
  // center pin
  svgEl('circle', { cx, cy, r: 2.5, fill: 'var(--ink)' }, layer);
}

function dig(svgX, svgY){
  // Already-dug spot check (don't double-credit)
  for (const d of state.digs){
    if (Math.hypot(d.x - svgX, d.y - svgY) < 12){
      return; // ignore very close re-clicks
    }
  }
  state.digs.push({ x: svgX, y: svgY, t: Date.now() });
  renderDigs();
  updateStats();

  // 1) Check for sea monster within 40
  for (const m of state.map.monsters){
    if (Math.hypot(m.x - svgX, m.y - svgY) < 44){
      encounterMonster(m, svgX, svgY);
      return;
    }
  }
  // 2) Check for an undiscovered treasure within 24
  let nearestTr = null, nearestD = Infinity;
  for (const t of state.map.treasures){
    if (t.foundIdx >= 0) continue;
    const d = Math.hypot(t.x - svgX, t.y - svgY);
    // X-marked treasures: 28u radius (the X is visible)
    // hidden underwater treasures: 14u radius (you must guess)
    const rad = t.visibleX ? 28 : 14;
    if (d < rad && d < nearestD){ nearestD = d; nearestTr = t; }
  }
  if (nearestTr){
    findTreasure(nearestTr, svgX, svgY);
    return;
  }
  // 3) Red herring
  redHerring(svgX, svgY);
}

function findTreasure(t, dx, dy){
  t.foundIdx = state.found.length;
  state.found.push({
    id: t.id, x: t.x, y: t.y,
    ic: t.type.ic, name: t.type.name,
    value: t.value, flavor: t.type.flavor,
  });
  renderXMarks(state.map.treasures); // hides the X
  renderFound();
  updateLoot();
  updateStats();
  showRevealToast(dx, dy, {
    icon: t.type.ic,
    what: t.type.name + ' · ' + t.value + 'd',
    flavor: t.type.flavor,
  });
  shakeStage();
}
function redHerring(dx, dy){
  const rng = mulberry32(state.seed + state.digs.length);
  const item = pick(rng, RED_HERRINGS);
  showRevealToast(dx, dy, {
    icon: item.ic,
    what: item.name,
    flavor: item.flavor,
    bad: true,
  });
}
function encounterMonster(m, dx, dy){
  state.monstersFought++;
  updateStats();
  showRevealToast(dx, dy, {
    icon: m.type.ic,
    what: m.type.name + '!',
    flavor: 'lost: ' + m.type.loss + (m.type.gold > 0 ? ' (+' + m.type.gold + 'd looted)' : (m.type.gold < 0 ? ' (' + m.type.gold + 'd)' : '')),
    monster: true,
  });
  shakeStage();
  // monster grants some doubloons (or takes them away in the mermaid case)
  if (m.type.gold !== 0){
    state.found.push({
      id: 'm-loot-' + state.found.length,
      x: m.x, y: m.y,
      ic: m.type.gold > 0 ? '🪙' : '💧',
      name: (m.type.gold > 0 ? 'salvaged from ' : 'lost to ') + m.type.name,
      value: m.type.gold,
      flavor: m.type.loss,
      isMonster: true,
    });
    updateLoot();
  }
}
function showRevealToast(dx, dy, opts){
  const stage = document.getElementById('stage');
  const rect = stage.getBoundingClientRect();
  // Convert SVG coords → pixel coords (viewBox 1200×800 stretched to rect)
  const px = (dx / W) * rect.width;
  const py = (dy / H) * rect.height;
  const el = document.createElement('div');
  el.className = 'reveal-toast' + (opts.bad ? ' bad' : '') + (opts.monster ? ' monster' : '');
  el.style.left = px + 'px';
  el.style.top  = py + 'px';
  el.innerHTML = '<span class="what">' + (opts.icon || '') + ' ' + opts.what + '</span>'
    + (opts.flavor ? '<span class="flavor">' + opts.flavor + '</span>' : '');
  stage.appendChild(el);
  setTimeout(() => el.remove(), 2700);
}
function shakeStage(){
  const s = document.getElementById('stage');
  s.classList.remove('shaking');
  void s.offsetWidth;
  s.classList.add('shaking');
  setTimeout(() => s.classList.remove('shaking'), 320);
}

/* ── UI updates ──────────────────────────────────────────────── */
function updateLoot(){
  const list = document.getElementById('loot-list');
  const empty = document.getElementById('loot-empty');
  if (!state.found.length){
    list.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    list.innerHTML = state.found.map(f =>
      '<li class="' + (f.value < 0 ? 'bad' : '') + '" title="' + (f.flavor || '') + '">'
      + '<span class="ic">' + f.ic + '</span>'
      + '<span class="nm">' + f.name + '</span>'
      + '<span class="val">' + (f.value > 0 ? '+' : '') + f.value + 'd</span>'
      + '</li>'
    ).join('');
  }
  const total = state.found.reduce((a, f) => a + f.value, 0);
  document.getElementById('loot-summary').textContent =
    state.found.length + ' item' + (state.found.length === 1 ? '' : 's');
  document.getElementById('loot-total').textContent = total + 'd';
  // pulse if items added
}
function updateStats(){
  const treasures = state.map ? state.map.treasures.length : 0;
  const foundCount = state.found.filter(f => !f.isMonster).length;
  document.getElementById('stat-found').textContent = foundCount;
  document.getElementById('stat-total').textContent = treasures;
  document.getElementById('stat-monsters').textContent = state.monstersFought;
  document.getElementById('stat-digs').textContent = state.digs.length;
}

/* ── Main entry: generate new map ───────────────────────────── */
function newMap(seedStr){
  state.map = generateMap(seedStr);
  state.seed = state.map.seed;
  state.found = [];
  state.digs = [];
  state.monstersFought = 0;
  document.getElementById('seed-input').value = String(seedStr).toUpperCase();
  document.getElementById('chart-num').textContent =
    String((state.seed % 999) + 1).padStart(3, '0');
  renderWater();
  renderIslands(state.map.islands);
  renderMonsters(state.map.monsters);
  renderRoute(state.map.route);
  renderCompass(state.map.compass);
  renderShip(state.map.ship);
  renderXMarks(state.map.treasures);
  renderLabels(state.map.seaLabels);
  renderDigs();
  renderFound();
  updateLoot();
  updateStats();
  // sync URL hash
  try{
    location.hash = encodeURIComponent(String(seedStr).toUpperCase());
  }catch(_){}
}

/* ── Click handler on the stage ─────────────────────────────── */
const stage = document.getElementById('stage');
const map = document.getElementById('map');
stage.addEventListener('click', e => {
  // ignore clicks on overlay panels (defensive: stage is parent of map+toasts only)
  const rect = stage.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  // Convert pixel coords → SVG viewBox coords
  const sx = (px / rect.width) * W;
  const sy = (py / rect.height) * H;
  dig(sx, sy);
});

/* ── Random seed generator ───────────────────────────────────── */
function randomSeed(){
  const A = 'BCDFGHJKLMNPQRSTVWXYZ';
  const V = 'AEIOU';
  let s = '';
  for (let i = 0; i < 4 + Math.floor(Math.random() * 5); i++){
    s += (i % 2 === 0) ? A[Math.floor(Math.random() * A.length)] : V[Math.floor(Math.random() * V.length)];
  }
  return s;
}

/* ── Buttons ──────────────────────────────────────────────── */
document.getElementById('btn-generate').addEventListener('click', () => {
  const s = (document.getElementById('seed-input').value || '').trim().toUpperCase();
  newMap(s || 'BLACKBEARD');
});
document.getElementById('btn-random').addEventListener('click', () => {
  newMap(randomSeed());
});
document.getElementById('seed-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-generate').click();
});

/* ── Loot panel toggle (mobile-friendly) ────────────────────── */
const lootPanel = document.getElementById('loot-panel');
const lootToggle = document.getElementById('loot-toggle');
function checkLootPanelLayout(){
  // collapse on small screens by default
  if (window.innerWidth < 720 && !lootPanel.dataset.userToggled){
    lootPanel.classList.add('hidden');
    lootToggle.classList.add('show');
  }
}
checkLootPanelLayout();
window.addEventListener('resize', checkLootPanelLayout);
lootToggle.addEventListener('click', () => {
  lootPanel.classList.remove('hidden');
  lootToggle.classList.remove('show');
  lootPanel.dataset.userToggled = '1';
});
// Click outside to collapse on mobile
document.addEventListener('click', e => {
  if (window.innerWidth >= 720) return;
  if (e.target === lootToggle || lootPanel.contains(e.target)) return;
  if (lootPanel.dataset.userToggled){
    lootPanel.classList.add('hidden');
    lootToggle.classList.add('show');
  }
});

/* ── Init ─────────────────────────────────────────────────── */
(function init(){
  // resize the map's logical size to keep aspect (handled by aspect-ratio CSS)
  // read seed from URL hash
  let seed = 'BLACKBEARD';
  if (location.hash && location.hash.length > 1){
    try { seed = decodeURIComponent(location.hash.slice(1)) || 'BLACKBEARD'; }
    catch(_){}
  }
  newMap(seed);
})();
</script>
