<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Magnet Playground — Neon Physics</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧲">
<meta property="og:title" content="Magnet Playground">
<meta property="og:description" content="Drag magnets around and watch glowing balls bounce and orbit.">
<meta property="og:url" content="https://sloppy.live/magnet-playground">
<meta property="og:image" content="https://sloppy.live/magnet-playground/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08060e;overflow:hidden;font-family:'Fira Code',monospace;
  width:100vw;height:100vh;cursor:crosshair;user-select:none}
canvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:12px;left:14px;color:#4a4060;font-size:11px;z-index:10;
  pointer-events:none;letter-spacing:1px}
#hud .title{font-family:'Orbitron',sans-serif;font-weight:800;font-size:clamp(14px,2.5vw,22px);
  color:#c060ff;text-shadow:0 0 20px rgba(192,96,255,0.4);margin-bottom:2px}
#controls{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:10}
#controls button{background:rgba(20,16,30,0.85);border:1px solid #302848;color:#8070a0;
  font-family:'Fira Code',monospace;font-size:11px;padding:7px 14px;border-radius:4px;
  cursor:pointer;transition:all .15s;backdrop-filter:blur(6px)}
#controls button:hover{border-color:#c060ff;color:#d0b0ff;box-shadow:0 0 10px rgba(192,96,255,0.2)}
#controls button.active{border-color:#60ffa0;color:#60ffa0}
#info{position:fixed;top:12px;right:14px;color:#352a48;font-size:10px;z-index:10;
  text-align:right;pointer-events:none;transition:opacity 2s}
</style>
</head>
<body>
<div id="hud">
  <div class="title">MAGNET PLAYGROUND</div>
  <span id="stats"></span>
</div>
<div id="info">click: add ball · right-click: add magnet · drag magnets · scroll: magnet strength</div>
<div id="controls">
  <button id="btn-add-ball">+ Ball</button>
  <button id="btn-add-magnet">+ Magnet</button>
  <button id="btn-gravity" class="active">Gravity</button>
  <button id="btn-clear">Clear</button>
</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Neon colors for balls
const NEON = [
  {r:255,g:60,b:120,hex:'#ff3c78'},
  {r:60,g:255,b:160,hex:'#3cffa0'},
  {r:80,g:160,b:255,hex:'#50a0ff'},
  {r:255,g:200,b:60,hex:'#ffc83c'},
  {r:200,g:80,b:255,hex:'#c850ff'},
  {r:60,g:255,b:255,hex:'#3cffff'},
  {r:255,g:120,b:60,hex:'#ff783c'},
  {r:160,g:255,b:80,hex:'#a0ff50'},
];

let gravity = true;
const BOUNCE = 0.72;
const FRICTION = 0.998;
const BALL_MIN_R = 8, BALL_MAX_R = 18;

const balls = [];
const magnets = [];

let dragMagnet = null;
let dragOffset = {x:0, y:0};
let infoVisible = true;

class Ball {
  constructor(x, y, vx, vy){
    this.x = x; this.y = y;
    this.vx = vx || (Math.random()-0.5)*4;
    this.vy = vy || (Math.random()-0.5)*4;
    this.r = BALL_MIN_R + Math.random()*(BALL_MAX_R - BALL_MIN_R);
    this.mass = this.r * this.r * 0.01;
    const c = NEON[Math.floor(Math.random()*NEON.length)];
    this.color = c;
    this.trail = [];
    this.maxTrail = 12;
  }
  update(dt){
    // Gravity
    if(gravity) this.vy += 0.32 * dt;

    // Magnet forces
    for(const m of magnets){
      const dx = m.x - this.x;
      const dy = m.y - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 5) continue;
      const force = (m.strength * 800) / (dist * dist);
      const cap = 2.5;
      const fx = Math.max(-cap, Math.min(cap, (dx/dist) * force * dt));
      const fy = Math.max(-cap, Math.min(cap, (dy/dist) * force * dt));
      this.vx += fx / this.mass;
      this.vy += fy / this.mass;
    }

    this.vx *= FRICTION;
    this.vy *= FRICTION;
    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Walls
    if(this.x - this.r < 0){ this.x = this.r; this.vx = Math.abs(this.vx)*BOUNCE; }
    if(this.x + this.r > W){ this.x = W - this.r; this.vx = -Math.abs(this.vx)*BOUNCE; }
    if(this.y - this.r < 0){ this.y = this.r; this.vy = Math.abs(this.vy)*BOUNCE; }
    if(this.y + this.r > H){ this.y = H - this.r; this.vy = -Math.abs(this.vy)*BOUNCE; }

    // Trail
    this.trail.push({x:this.x, y:this.y});
    if(this.trail.length > this.maxTrail) this.trail.shift();
  }
  draw(){
    const c = this.color;
    // Trail
    for(let i = 0; i < this.trail.length - 1; i++){
      const a = (i / this.trail.length) * 0.3;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.r * 0.4 * (i/this.trail.length), 0, Math.PI*2);
      ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${a})`;
      ctx.fill();
    }
    // Glow
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 2.5);
    grad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},0.25)`);
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 2.5, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
    // Body
    const bGrad = ctx.createRadialGradient(this.x - this.r*0.3, this.y - this.r*0.3, 0, this.x, this.y, this.r);
    bGrad.addColorStop(0, `rgba(${Math.min(255,c.r+60)},${Math.min(255,c.g+60)},${Math.min(255,c.b+60)},0.95)`);
    bGrad.addColorStop(1, c.hex);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = bGrad;
    ctx.fill();
    // Highlight
    ctx.beginPath();
    ctx.arc(this.x - this.r*0.25, this.y - this.r*0.25, this.r*0.35, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();
  }
}

class Magnet {
  constructor(x, y){
    this.x = x; this.y = y;
    this.r = 22;
    this.strength = 1; // positive = attract
    this.pulsePhase = Math.random() * Math.PI * 2;
  }
  draw(t){
    const pulse = 0.8 + 0.2 * Math.sin(t * 3 + this.pulsePhase);
    const isAttract = this.strength > 0;
    const baseR = isAttract ? 180 : 60;
    const baseG = isAttract ? 60 : 200;
    const baseB = isAttract ? 255 : 80;
    const str = Math.abs(this.strength);
    const ringCount = 3;
    // Field rings
    for(let i = ringCount; i >= 1; i--){
      const ringR = this.r + i * 28 * str;
      const a = (0.08 / i) * pulse * str;
      ctx.beginPath();
      ctx.arc(this.x, this.y, ringR, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(${baseR},${baseG},${baseB},${a})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    // Glow
    const glowR = this.r * (2 + str);
    const gGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
    gGrad.addColorStop(0, `rgba(${baseR},${baseG},${baseB},${0.2 * pulse * str})`);
    gGrad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowR, 0, Math.PI*2);
    ctx.fillStyle = gGrad;
    ctx.fill();
    // Body
    const bGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
    bGrad.addColorStop(0, `rgba(${Math.min(255,baseR+40)},${Math.min(255,baseG+40)},${Math.min(255,baseB+40)},0.95)`);
    bGrad.addColorStop(0.7, `rgb(${baseR},${baseG},${baseB})`);
    bGrad.addColorStop(1, `rgba(${baseR>>1},${baseG>>1},${baseB>>1},0.9)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * pulse, 0, Math.PI*2);
    ctx.fillStyle = bGrad;
    ctx.fill();
    // Symbol
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = `bold ${Math.floor(this.r*0.9)}px 'Orbitron',sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(isAttract ? '⊕' : '⊖', this.x, this.y + 1);
    // Strength label
    if(str !== 1){
      ctx.fillStyle = `rgba(${baseR},${baseG},${baseB},0.6)`;
      ctx.font = "10px 'Fira Code',monospace";
      ctx.fillText(str.toFixed(1)+'x', this.x, this.y + this.r + 14);
    }
  }
}

// Ball-ball collision
function collideBalls(){
  for(let i = 0; i < balls.length; i++){
    for(let j = i+1; j < balls.length; j++){
      const a = balls[i], b = balls[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minD = a.r + b.r;
      if(dist < minD && dist > 0.01){
        const nx = dx/dist, ny = dy/dist;
        const overlap = minD - dist;
        const totalM = a.mass + b.mass;
        a.x -= nx * overlap * (b.mass/totalM);
        a.y -= ny * overlap * (b.mass/totalM);
        b.x += nx * overlap * (a.mass/totalM);
        b.y += ny * overlap * (a.mass/totalM);
        // Elastic-ish collision
        const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
        const dvDotN = dvx*nx + dvy*ny;
        if(dvDotN > 0){
          const impulse = dvDotN * BOUNCE / totalM;
          a.vx -= impulse * b.mass * nx;
          a.vy -= impulse * b.mass * ny;
          b.vx += impulse * a.mass * nx;
          b.vy += impulse * a.mass * ny;
        }
      }
    }
  }
}

// Draw force lines from magnets to nearby balls
function drawFieldLines(t){
  for(const m of magnets){
    for(const b of balls){
      const dx = b.x - m.x, dy = b.y - m.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist > 300 * Math.abs(m.strength) || dist < m.r + b.r) continue;
      const a = Math.max(0, 0.08 * (1 - dist/(300*Math.abs(m.strength)))) * Math.abs(m.strength);
      if(a < 0.005) continue;
      const isAttract = m.strength > 0;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      // Curved line
      const mx = (m.x+b.x)/2 + Math.sin(t*2+dist*0.01)*20;
      const my = (m.y+b.y)/2 + Math.cos(t*2+dist*0.01)*20;
      ctx.quadraticCurveTo(mx, my, b.x, b.y);
      ctx.strokeStyle = isAttract ? `rgba(180,60,255,${a})` : `rgba(60,200,80,${a})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
  }
}

// Spawn initial setup
function spawnInitial(){
  // 3 magnets
  magnets.push(new Magnet(W*0.3, H*0.4));
  magnets.push(new Magnet(W*0.7, H*0.4));
  magnets.push(new Magnet(W*0.5, H*0.65));
  magnets[2].strength = -0.8; // repel
  // 15 balls
  for(let i = 0; i < 15; i++){
    balls.push(new Ball(
      W*0.2 + Math.random()*W*0.6,
      H*0.1 + Math.random()*H*0.3,
      (Math.random()-0.5)*6,
      (Math.random()-0.5)*3
    ));
  }
}

// Input
function getMagnetAt(x, y){
  for(let i = magnets.length-1; i >= 0; i--){
    const m = magnets[i];
    const dx = x - m.x, dy = y - m.y;
    if(dx*dx + dy*dy < (m.r+10)*(m.r+10)) return m;
  }
  return null;
}

function getPos(e){
  if(e.touches) return {x: e.touches[0].clientX, y: e.touches[0].clientY};
  return {x: e.clientX, y: e.clientY};
}

canvas.addEventListener('mousedown', e => {
  hideInfo();
  const p = getPos(e);
  const m = getMagnetAt(p.x, p.y);
  if(m){
    dragMagnet = m;
    dragOffset.x = m.x - p.x;
    dragOffset.y = m.y - p.y;
    e.preventDefault();
    return;
  }
  // Left click = ball, right click = magnet
  if(e.button === 2) return; // handled by contextmenu
  balls.push(new Ball(p.x, p.y, (Math.random()-0.5)*8, -3 - Math.random()*4));
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  hideInfo();
  magnets.push(new Magnet(e.clientX, e.clientY));
});

canvas.addEventListener('mousemove', e => {
  if(dragMagnet){
    dragMagnet.x = e.clientX + dragOffset.x;
    dragMagnet.y = e.clientY + dragOffset.y;
  }
});

canvas.addEventListener('mouseup', () => { dragMagnet = null; });

// Touch
canvas.addEventListener('touchstart', e => {
  hideInfo();
  const p = getPos(e);
  const m = getMagnetAt(p.x, p.y);
  if(m){
    dragMagnet = m;
    dragOffset.x = m.x - p.x;
    dragOffset.y = m.y - p.y;
    e.preventDefault();
    return;
  }
  balls.push(new Ball(p.x, p.y, (Math.random()-0.5)*6, -2 - Math.random()*3));
  e.preventDefault();
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  if(dragMagnet){
    const p = getPos(e);
    dragMagnet.x = p.x + dragOffset.x;
    dragMagnet.y = p.y + dragOffset.y;
    e.preventDefault();
  }
}, {passive:false});

canvas.addEventListener('touchend', () => { dragMagnet = null; });

// Scroll to change magnet strength
canvas.addEventListener('wheel', e => {
  const m = getMagnetAt(e.clientX, e.clientY);
  if(m){
    e.preventDefault();
    m.strength += e.deltaY > 0 ? -0.2 : 0.2;
    m.strength = Math.max(-3, Math.min(3, m.strength));
    // Flip sign: negative = repel
  }
}, {passive:false});

// Double-click magnet to toggle attract/repel
canvas.addEventListener('dblclick', e => {
  const m = getMagnetAt(e.clientX, e.clientY);
  if(m) m.strength *= -1;
});

function hideInfo(){
  if(infoVisible){
    infoVisible = false;
    setTimeout(() => {
      document.getElementById('info').style.opacity = '0';
    }, 4000);
  }
}

// Buttons
document.getElementById('btn-add-ball').onclick = () => {
  hideInfo();
  for(let i = 0; i < 5; i++){
    balls.push(new Ball(
      W*0.2 + Math.random()*W*0.6,
      H*0.15,
      (Math.random()-0.5)*6,
      Math.random()*3
    ));
  }
};

document.getElementById('btn-add-magnet').onclick = () => {
  hideInfo();
  magnets.push(new Magnet(W*0.3 + Math.random()*W*0.4, H*0.3 + Math.random()*H*0.3));
};

document.getElementById('btn-gravity').onclick = function(){
  gravity = !gravity;
  this.classList.toggle('active', gravity);
};

document.getElementById('btn-clear').onclick = () => {
  balls.length = 0;
  magnets.length = 0;
};

// Grid background
function drawGrid(){
  ctx.strokeStyle = 'rgba(40,30,60,0.2)';
  ctx.lineWidth = 0.5;
  const step = 50;
  for(let x = 0; x < W; x += step){
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for(let y = 0; y < H; y += step){
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

// Main loop
let lastT = 0;
function frame(timestamp){
  const t = timestamp * 0.001;
  const dt = Math.min(3, Math.max(0.5, (timestamp - lastT) * 0.06));
  lastT = timestamp;

  // Clear with fade
  ctx.fillStyle = 'rgba(8,6,14,0.35)';
  ctx.fillRect(0, 0, W, H);
  drawGrid();

  // Update
  for(const b of balls) b.update(dt);
  collideBalls();

  // Cap balls
  if(balls.length > 200) balls.splice(0, balls.length - 200);

  // Draw
  drawFieldLines(t);
  for(const m of magnets) m.draw(t);
  for(const b of balls) b.draw();

  // Stats
  document.getElementById('stats').textContent =
    `${balls.length} balls · ${magnets.length} magnets`;

  requestAnimationFrame(frame);
}

spawnInitial();
requestAnimationFrame(frame);
</script>
</body>
</html>
